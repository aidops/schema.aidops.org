id: lcs-strategy
maturity: draft
label:
  en: Livelihood Coping Strategy
  fr: "Stratégie d'adaptation des moyens d'existence"
  es: "Estrategia de afrontamiento de medios de vida"
definition:
  en: "An illustrative set of household coping strategies drawn from the WFP Livelihood Coping Strategies (LCS) module, grouped into three severity tiers: stress strategies are reversible and indicate reduced ability to deal with future shocks; crisis strategies directly reduce future productive capacity; emergency strategies are harder to reverse and affect long-term welfare. Under CARI, a household's LCS output is the highest tier reported to have been adopted. WFP VAM expects operations to contextualise the strategy list and tier assignments per country; the codes below should be read as a canonical reference set, not a closed list."
  fr: "Un ensemble illustratif de stratégies d'adaptation des ménages tiré du module Livelihood Coping Strategies (LCS) du PAM, regroupées en trois niveaux de gravité : les stratégies de stress sont réversibles et indiquent une capacité réduite à faire face aux chocs futurs ; les stratégies de crise réduisent directement la capacité productive future ; les stratégies d'urgence sont plus difficiles à inverser et affectent le bien-être à long terme. Sous CARI, la sortie LCS d'un ménage est le niveau le plus élevé déclaré avoir été adopté. VAM du PAM attend que les opérations contextualisent la liste des stratégies et les affectations de niveau par pays ; les codes ci-dessous sont un ensemble de référence canonique, non une liste fermée."
  es: "Un conjunto ilustrativo de estrategias de afrontamiento de los hogares extraído del módulo Livelihood Coping Strategies (LCS) del PMA, agrupadas en tres niveles de gravedad: las estrategias de estrés son reversibles e indican capacidad reducida para enfrentar choques futuros; las estrategias de crisis reducen directamente la capacidad productiva futura; las estrategias de emergencia son más difíciles de revertir y afectan el bienestar a largo plazo. Bajo CARI, la salida LCS de un hogar es el nivel más alto reportado como adoptado. VAM del PMA espera que las operaciones contextualicen la lista de estrategias y las asignaciones de nivel por país; los códigos a continuación son un conjunto de referencia canónico, no una lista cerrada."
standard:
  name: "WFP CARI Guidelines (3rd edition, 2021)"
  uri: "https://docs.wfp.org/api/documents/WFP-0000134704/download/"
  notes: "The exact list of strategies and their tier assignments are contextualized per country by WFP VAM. The codes below are a canonical reference set most frequently deployed; country-specific adaptations extend or substitute strategies within each tier."
values:
- code: spent_savings
  label:
    en: Spent savings
    fr: "A puisé dans l'épargne"
    es: "Usó los ahorros"
  definition:
    en: "The household spent savings to meet food needs. Stress tier."
    fr: "Le ménage a puisé dans son épargne pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar usó sus ahorros para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: sold_household_items
  label:
    en: Sold household items (non-productive assets)
    fr: "A vendu des biens du ménage (actifs non productifs)"
    es: "Vendió bienes del hogar (activos no productivos)"
  definition:
    en: "The household sold household items such as furniture, radio, jewellery to meet food needs. Stress tier."
    fr: "Le ménage a vendu des biens du ménage tels que meubles, radio, bijoux pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar vendió bienes del hogar como muebles, radio, joyas para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: reduced_nonfood_expenses
  label:
    en: Reduced non-essential non-food spending
    fr: "A réduit les dépenses non alimentaires non essentielles"
    es: "Redujo gastos no alimentarios no esenciales"
  definition:
    en: "The household reduced non-essential non-food spending, such as recreation or non-urgent purchases, to afford food. Stress tier: reversible reductions that do not by themselves create lasting welfare harm."
    fr: "Le ménage a réduit les dépenses non alimentaires non essentielles, telles que les loisirs ou les achats non urgents, pour se permettre la nourriture. Niveau stress : réductions réversibles qui ne créent pas en elles-mêmes de préjudice durable au bien-être."
    es: "El hogar redujo gastos no alimentarios no esenciales, como recreación o compras no urgentes, para poder pagar alimentos. Nivel estrés: reducciones reversibles que por sí mismas no generan daño duradero al bienestar."
  notes:
    en: "LCS tier = stress. Country adaptations vary on whether reductions in education spending sit in the stress tier or the crisis tier, depending on local context and whether the reduction compromises schooling; operations should contextualise the assignment per country."
    fr: "Niveau LCS = stress. Les adaptations par pays varient sur le positionnement des réductions de dépenses d'éducation entre niveau stress et niveau crise, selon le contexte local et selon que la réduction compromet la scolarité ; les opérations doivent contextualiser l'affectation par pays."
    es: "Nivel LCS = estrés. Las adaptaciones por país varían sobre si las reducciones del gasto en educación se ubican en el nivel estrés o en el nivel crisis, según el contexto local y según si la reducción compromete la escolarización; las operaciones deben contextualizar la asignación por país."
- code: borrowed_money_food
  label:
    en: Borrowed money or bought food on credit
    fr: "A emprunté de l'argent ou acheté de la nourriture à crédit"
    es: "Pidió dinero prestado o compró alimentos a crédito"
  definition:
    en: "The household borrowed money or purchased food on credit to meet food needs. Stress tier."
    fr: "Le ménage a emprunté de l'argent ou acheté de la nourriture à crédit pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar pidió dinero prestado o compró alimentos a crédito para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: sold_productive_assets
  label:
    en: Sold productive assets (tools, livestock)
    fr: "A vendu des actifs productifs (outils, bétail)"
    es: "Vendió activos productivos (herramientas, ganado)"
  definition:
    en: "The household sold productive assets such as tools, sewing machine, wheelbarrow, or livestock to meet food needs. Crisis tier: directly reduces future productive capacity."
    fr: "Le ménage a vendu des actifs productifs tels qu'outils, machine à coudre, brouette ou bétail pour couvrir ses besoins alimentaires. Niveau crise : réduit directement la capacité productive future."
    es: "El hogar vendió activos productivos como herramientas, máquina de coser, carretilla o ganado para cubrir las necesidades alimentarias. Nivel crisis: reduce directamente la capacidad productiva futura."
  notes:
    en: "LCS tier = crisis"
- code: withdrew_children_from_school
  label:
    en: Withdrew children from school
    fr: "A retiré des enfants de l'école"
    es: "Retiró a los niños de la escuela"
  definition:
    en: "The household withdrew children from school to save on fees or free their time for work. Crisis tier."
    fr: "Le ménage a retiré des enfants de l'école pour économiser sur les frais ou libérer leur temps pour le travail. Niveau crise."
    es: "El hogar retiró a los niños de la escuela para ahorrar en matrículas o liberar su tiempo para trabajar. Nivel crisis."
  notes:
    en: "LCS tier = crisis"
- code: reduced_essential_nonfood
  label:
    en: Reduced essential non-food spending (health care)
    fr: "A réduit les dépenses non alimentaires essentielles (soins de santé)"
    es: "Redujo gastos no alimentarios esenciales (atención sanitaria)"
  definition:
    en: "The household reduced essential non-food spending, specifically health care, preventing access to needed treatment. Crisis tier: the reduction creates lasting welfare harm by denying necessary services."
    fr: "Le ménage a réduit les dépenses non alimentaires essentielles, plus précisément les soins de santé, empêchant l'accès aux traitements nécessaires. Niveau crise : la réduction crée un préjudice durable au bien-être en privant l'accès à des services nécessaires."
    es: "El hogar redujo gastos no alimentarios esenciales, específicamente la atención sanitaria, impidiendo el acceso al tratamiento necesario. Nivel crisis: la reducción genera un daño duradero al bienestar al negar el acceso a servicios necesarios."
  notes:
    en: "LCS tier = crisis. Country adaptations vary on whether reductions in education spending sit in the crisis tier (when the reduction compromises schooling) or the stress tier; operations should contextualise the assignment per country."
    fr: "Niveau LCS = crise. Les adaptations par pays varient sur le positionnement des réductions de dépenses d'éducation au niveau crise (lorsque la réduction compromet la scolarité) ou au niveau stress ; les opérations doivent contextualiser l'affectation par pays."
    es: "Nivel LCS = crisis. Las adaptaciones por país varían sobre si las reducciones del gasto en educación se ubican en el nivel crisis (cuando la reducción compromete la escolarización) o en el nivel estrés; las operaciones deben contextualizar la asignación por país."
- code: consumed_seed_stock
  label:
    en: Consumed seed stock
    fr: "A consommé les stocks de semences"
    es: "Consumió las reservas de semillas"
  definition:
    en: "The household consumed seed stocks held for the next planting season. Crisis tier: compromises the next production cycle."
    fr: "Le ménage a consommé les stocks de semences conservés pour la prochaine saison. Niveau crise : compromet le prochain cycle de production."
    es: "El hogar consumió reservas de semillas guardadas para la próxima siembra. Nivel crisis: compromete el próximo ciclo productivo."
  notes:
    en: "LCS tier = crisis"
- code: harvested_immature_crops
  label:
    en: Harvested immature crops
    fr: "A récolté des cultures immatures"
    es: "Cosechó cultivos inmaduros"
  definition:
    en: "The household harvested crops before maturity. Crisis tier: reduces yield and compromises the current production cycle."
    fr: "Le ménage a récolté des cultures avant maturité. Niveau crise : réduit le rendement et compromet le cycle de production en cours."
    es: "El hogar cosechó cultivos antes de su madurez. Nivel crisis: reduce el rendimiento y compromete el ciclo productivo actual."
  notes:
    en: "LCS tier = crisis"
- code: sold_house_or_land
  label:
    en: Sold house or land
    fr: "A vendu la maison ou la terre"
    es: "Vendió la casa o la tierra"
  definition:
    en: "The household sold its house or land to meet food needs. Emergency tier: irreversible loss of productive or sheltering asset."
    fr: "Le ménage a vendu sa maison ou sa terre pour couvrir ses besoins alimentaires. Niveau urgence : perte irréversible d'un actif productif ou de logement."
    es: "El hogar vendió su casa o tierra para cubrir las necesidades alimentarias. Nivel emergencia: pérdida irreversible de activo productivo o de vivienda."
  notes:
    en: "LCS tier = emergency"
- code: migrated_whole_household
  label:
    en: Migrated as a whole household
    fr: "A migré en tant que ménage entier"
    es: "Migró como hogar entero"
  definition:
    en: "The whole household migrated to find food or income. Emergency tier: distinct from normal seasonal labour migration, which is not coping."
    fr: "Le ménage entier a migré pour trouver de la nourriture ou un revenu. Niveau urgence : distinct de la migration de main-d'œuvre saisonnière normale, qui ne relève pas de l'adaptation de crise."
    es: "El hogar entero migró para buscar alimentos o ingresos. Nivel emergencia: distinto de la migración laboral estacional normal, que no constituye afrontamiento de crisis."
  notes:
    en: "LCS tier = emergency"
- code: child_labor
  label:
    en: Engaged in child labour or high-risk work
    fr: "A eu recours au travail des enfants ou au travail à haut risque"
    es: "Recurrió al trabajo infantil o trabajo de alto riesgo"
  definition:
    en: "Household members, including children, engaged in exploitative or high-risk work to meet food needs. Emergency tier: long-term welfare harm, protection red flag."
    fr: "Des membres du ménage, y compris des enfants, ont eu recours à un travail exploitant ou à haut risque pour couvrir les besoins alimentaires. Niveau urgence : préjudice de bien-être à long terme, signal d'alerte en matière de protection."
    es: "Miembros del hogar, incluidos niños, recurrieron a trabajo de explotación o de alto riesgo para cubrir las necesidades alimentarias. Nivel emergencia: daño al bienestar de largo plazo, señal de alerta de protección."
  notes:
    en: "LCS tier = emergency"
- code: early_marriage
  label:
    en: Arranged early marriage for a household member
    fr: "A organisé un mariage précoce pour un membre du ménage"
    es: "Concertó el matrimonio precoz de un miembro del hogar"
  definition:
    en: "The household arranged the early marriage of one or more members (typically a girl) to reduce household burden or obtain bride price. Emergency tier: long-term welfare harm, protection red flag."
    fr: "Le ménage a organisé le mariage précoce d'un ou plusieurs membres (typiquement une fille) pour alléger la charge du ménage ou obtenir une dot. Niveau urgence : préjudice de bien-être à long terme, signal d'alerte en matière de protection."
    es: "El hogar concertó el matrimonio precoz de uno o más miembros (típicamente una niña) para reducir la carga familiar u obtener una dote. Nivel emergencia: daño al bienestar de largo plazo, señal de alerta de protección."
  notes:
    en: "LCS tier = emergency"
- code: begging
  label:
    en: Begged for food or money
    fr: "A mendié de la nourriture ou de l'argent"
    es: "Mendigó comida o dinero"
  definition:
    en: "Household members begged for food or money. Emergency tier."
    fr: "Des membres du ménage ont mendié de la nourriture ou de l'argent. Niveau urgence."
    es: "Miembros del hogar mendigaron comida o dinero. Nivel emergencia."
  notes:
    en: "LCS tier = emergency"
