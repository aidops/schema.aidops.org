id: hazard-type
maturity: draft
label:
  en: Hazard Type
  fr: Type de danger
  es: Tipo de peligro

definition:
  en: "The category of hazard or disruptive event, based on the Sendai Framework classification with extensions for social and economic shocks."
  fr: "La catégorie de risque ou d'événement perturbateur, basée sur la classification du Cadre de Sendai avec des extensions pour les chocs sociaux et économiques."
  es: "La categoría de peligro o evento perturbador, basada en la clasificación del Marco de Sendai con extensiones para choques sociales y económicos."

values:
  - code: geophysical
    label:
      en: Geophysical
      fr: Géophysique
      es: Geofísico
    definition:
      en: "Earthquakes, landslides, tsunamis, or volcanic activity."
      fr: "Tremblements de terre, glissements de terrain, tsunamis ou activité volcanique."
      es: "Terremotos, deslizamientos de tierra, tsunamis o actividad volcánica."

  - code: meteorological
    label:
      en: Meteorological
      fr: Météorologique
      es: Meteorológico
    definition:
      en: "Floods, storms, extreme temperatures, or drought."
      fr: "Inondations, tempêtes, températures extrêmes ou sécheresse."
      es: "Inundaciones, tormentas, temperaturas extremas o sequía."

  - code: biological
    label:
      en: Biological
      fr: Biologique
      es: Biológico
    definition:
      en: "Disease outbreaks, epidemics, pest infestations, or biological contamination."
      fr: "Épidémies, infestations de ravageurs ou contamination biologique."
      es: "Brotes de enfermedades, epidemias, infestaciones de plagas o contaminación biológica."

  - code: environmental
    label:
      en: Environmental
      fr: Environnemental
      es: Ambiental
    definition:
      en: "Pollution, deforestation, desertification, or ecological degradation."
      fr: "Pollution, déforestation, désertification ou dégradation écologique."
      es: "Contaminación, deforestación, desertificación o degradación ecológica."

  - code: technological
    label:
      en: Technological
      fr: Technologique
      es: Tecnológico
    definition:
      en: "Industrial accidents, infrastructure failures, or chemical spills."
      fr: "Accidents industriels, défaillances d'infrastructure ou déversements chimiques."
      es: "Accidentes industriales, fallas de infraestructura o derrames químicos."

  - code: conflict
    label:
      en: Conflict
      fr: Conflit
      es: Conflicto
    definition:
      en: "Armed conflict, civil unrest, or forced displacement."
      fr: "Conflit armé, troubles civils ou déplacement forcé."
      es: "Conflicto armado, disturbios civiles o desplazamiento forzado."

  - code: economic
    label:
      en: Economic
      fr: Économique
      es: Económico
    definition:
      en: "Economic shocks such as price spikes, currency collapse, or market disruption."
      fr: "Chocs économiques tels que flambée des prix, effondrement monétaire ou perturbation des marchés."
      es: "Choques económicos como alzas de precios, colapso monetario o perturbación de mercados."

  - code: other
    label:
      en: Other
      fr: Autre
      es: Otro
    definition:
      en: "Events not covered by any other category."
      fr: "Événements non couverts par aucune autre catégorie."
      es: "Eventos no cubiertos por ninguna otra categoría."
