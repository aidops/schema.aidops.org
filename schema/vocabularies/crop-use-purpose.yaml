id: crop-use-purpose
maturity: draft
label:
  en: "Crop Use Purpose (household)"
  fr: "Usage des cultures (ménage)"
  es: "Propósito del uso de cultivos (hogar)"
definition:
  en: "Household-level orientation of crop production: the degree to which last season's production was consumed by the household (subsistence) versus sold (market). Coarse three-band scale plus 'don't know'. Designed to characterise household livelihood orientation without quantifying market volumes, which are out of scope for this profile. Based on MICS6 Agriculture and Food Production module and the LSMS-ISA crop-disposition module."
  fr: "Orientation au niveau du ménage de la production végétale : dans quelle mesure la production de la saison dernière a été consommée par le ménage (subsistance) par rapport à la part vendue (marché). Échelle grossière à trois bandes plus « ne sait pas ». Conçue pour caractériser l'orientation des moyens d'existence du ménage sans quantifier les volumes de marché, qui sortent du cadre de ce profil. Basée sur le module Agriculture et production alimentaire du MICS6 et sur le module de disposition des cultures du LSMS-ISA."
  es: "Orientación a nivel del hogar de la producción de cultivos: el grado en que la producción de la temporada pasada fue consumida por el hogar (subsistencia) frente a vendida (mercado). Escala gruesa de tres bandas más 'no sabe'. Diseñada para caracterizar la orientación del medio de vida del hogar sin cuantificar los volúmenes de mercado, que están fuera del alcance de este perfil. Basada en el módulo Agricultura y Producción de Alimentos de MICS6 y en el módulo de disposición de cultivos de LSMS-ISA."
standard:
  name: "MICS6 Agriculture and Food Production module / LSMS-ISA crop disposition module"
  uri: "https://mics.unicef.org/tools"
  notes: "The three-band subsistence / mixed / market scale is widely used in multi-topic household surveys to characterise household crop orientation without requiring detailed market-volume quantification."
values:
  - code: mostly_subsistence
    label:
      en: "Mostly for household consumption"
      fr: "Principalement pour la consommation du ménage"
      es: "Principalmente para consumo del hogar"
    definition:
      en: "Most of the household's crop production is consumed by the household."
      fr: "La majeure partie de la production végétale du ménage est consommée par le ménage."
      es: "La mayor parte de la producción de cultivos del hogar es consumida por el hogar."
  - code: mixed_subsistence_market
    label:
      en: "Mixed — consumption and sale"
      fr: "Mixte — consommation et vente"
      es: "Mixto — consumo y venta"
    definition:
      en: "Significant portions of production are both consumed by the household and sold."
      fr: "Des parts importantes de la production sont à la fois consommées par le ménage et vendues."
      es: "Partes significativas de la producción se consumen en el hogar y se venden."
  - code: mostly_market
    label:
      en: "Mostly for sale"
      fr: "Principalement pour la vente"
      es: "Principalmente para venta"
    definition:
      en: "Most of the household's crop production is sold."
      fr: "La majeure partie de la production végétale du ménage est vendue."
      es: "La mayor parte de la producción de cultivos del hogar se vende."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot characterize the purpose of the household's crop production. Retained as a distinct valid response."
      fr: "Le répondant ne peut pas caractériser l'usage de la production végétale du ménage. Conservée comme réponse valide distincte."
      es: "El encuestado no puede caracterizar el propósito de la producción de cultivos del hogar. Se mantiene como respuesta válida distinta."
