id: stove-type
maturity: draft
label:
  en: Stove Type
  fr: "Type de foyer de cuisson"
  es: "Tipo de cocina"
definition:
  en: >
    The type of cookstove or cooking appliance primarily used by the household.
    Stove type combined with cooking fuel determines the MTF cooking emission tier
    more accurately than fuel type alone. WHO clean-household-energy classification
    distinguishes clean, transitional, and polluting stove types.
  fr: >
    Le type de foyer de cuisson ou d'appareil de cuisson principalement utilisé par
    le ménage. Le type de foyer combiné au combustible de cuisson détermine le niveau
    MTF d'émissions de cuisine plus précisément que le seul type de combustible.
    La classification OMS des énergies domestiques propres distingue les foyers
    propres, de transition et polluants.
  es: >
    El tipo de cocina o aparato de cocción principalmente utilizado por el hogar.
    El tipo de cocina combinado con el combustible de cocción determina el nivel MTF
    de emisiones de cocción con mayor precisión que solo el tipo de combustible.
    La clasificación de la OMS sobre energía doméstica limpia distingue cocinas
    limpias, de transición y contaminantes.
standard:
  name: "WHO Clean Household Energy Solutions Toolkit / MICS6 EU1 stove codes"
  uri: "https://www.who.int/tools/clean-household-energy-solutions-toolkit/module-7-defining-clean"
  notes: >
    WHO clean classification (clean / transitional / polluting) from Module 7 of the
    WHO Clean Household Energy Solutions Toolkit (2021). MICS6 EU1 code crosswalk
    from the UNICEF Multiple Indicator Cluster Surveys Round 6 household questionnaire
    (2016, surveys conducted 2017-2020).
values:
- code: electric_stove
  label:
    en: Electric stove
    fr: "Cuisinière électrique"
    es: "Cocina eléctrica"
  definition:
    en: "Electric stove, induction cooktop, or other electrically powered cooking appliance. WHO classification: clean."
    fr: "Cuisinière électrique, plaque à induction ou autre appareil de cuisson électrique. Classification OMS : propre."
    es: "Cocina eléctrica, placa de inducción u otro electrodoméstico de cocción eléctrico. Clasificación OMS: limpia."
- code: solar_cooker
  label:
    en: Solar cooker
    fr: "Cuiseur solaire"
    es: "Cocina solar"
  definition:
    en: "Parabolic, box, or panel solar cooker. WHO classification: clean."
    fr: "Cuiseur solaire parabolique, en boîte ou à panneaux. Classification OMS : propre."
    es: "Cocina solar parabólica, de caja o de panel. Clasificación OMS: limpia."
- code: lpg_stove
  label:
    en: LPG / cooking gas stove
    fr: "Réchaud GPL / gaz de cuisine"
    es: "Cocina de GLP / gas de cocina"
  definition:
    en: "Stove burning liquefied petroleum gas (LPG) or bottled cooking gas. WHO classification: clean."
    fr: "Réchaud fonctionnant au gaz de pétrole liquéfié (GPL) ou au gaz en bouteille. Classification OMS : propre."
    es: "Cocina que quema gas licuado de petróleo (GLP) o gas embotellado de cocina. Clasificación OMS: limpia."
- code: biogas_stove
  label:
    en: Biogas stove
    fr: "Réchaud au biogaz"
    es: "Cocina de biogás"
  definition:
    en: "Stove connected to a biogas digester or biogas supply. WHO classification: clean."
    fr: "Réchaud raccordé à un digesteur ou une alimentation en biogaz. Classification OMS : propre."
    es: "Cocina conectada a un digestor de biogás o suministro de biogás. Clasificación OMS: limpia."
- code: piped_natural_gas_stove
  label:
    en: Piped natural gas stove
    fr: "Cuisinière au gaz naturel canalisé"
    es: "Cocina de gas natural por tubería"
  definition:
    en: "Stove connected to piped natural gas distribution network. WHO classification: clean."
    fr: "Cuisinière raccordée au réseau de distribution de gaz naturel. Classification OMS : propre."
    es: "Cocina conectada a la red de distribución de gas natural por tubería. Clasificación OMS: limpia."
- code: liquid_fuel_stove
  label:
    en: Liquid fuel stove
    fr: "Réchaud à combustible liquide"
    es: "Cocina de combustible líquido"
  definition:
    en: "Stove burning kerosene, alcohol, gasoline, or diesel. Fuel type determines exact WHO classification; kerosene is polluting. WHO classification: polluting."
    fr: "Réchaud fonctionnant au pétrole lampant, à l'alcool, à l'essence ou au diesel. Le type de combustible détermine la classification OMS exacte ; le pétrole lampant est polluant. Classification OMS : polluant."
    es: "Cocina que quema queroseno, alcohol, gasolina o diésel. El tipo de combustible determina la clasificación exacta de la OMS; el queroseno es contaminante. Clasificación OMS: contaminante."
- code: manufactured_solid_fuel_stove
  label:
    en: Manufactured solid fuel stove
    fr: "Foyer amélioré à combustible solide (industriel)"
    es: "Cocina mejorada de combustible sólido (fabricada)"
  definition:
    en: "Manufactured stove with grate and combustion chamber designed for solid fuels. May meet ISO Voluntary Performance Target (VPT) Tier 3 depending on laboratory testing. WHO classification: transitional or polluting depending on test results."
    fr: "Foyer fabriqué avec grille et chambre de combustion conçu pour les combustibles solides. Peut satisfaire aux niveaux ISO VPT selon les tests en laboratoire. Classification OMS : transitoire ou polluant selon les résultats des tests."
    es: "Cocina fabricada con rejilla y cámara de combustión diseñada para combustibles sólidos. Puede cumplir los niveles ISO VPT según pruebas de laboratorio. Clasificación OMS: de transición o contaminante según los resultados."
- code: traditional_solid_fuel_stove
  label:
    en: Traditional solid fuel stove
    fr: "Foyer traditionnel à combustible solide"
    es: "Cocina tradicional de combustible sólido"
  definition:
    en: "Ceramic or mud stove with enclosed firebox, used with solid fuels. WHO classification: polluting."
    fr: "Foyer en céramique ou en terre avec boîte à feu fermée, utilisé avec des combustibles solides. Classification OMS : polluant."
    es: "Cocina de cerámica o barro con cámara de combustión cerrada, usada con combustibles sólidos. Clasificación OMS: contaminante."
- code: three_stone_open_fire
  label:
    en: Three stone fire / open fire
    fr: "Feu à trois pierres / feu ouvert"
    es: "Fuego de tres piedras / fuego abierto"
  definition:
    en: "Three stone fire or other open fire arrangement with no enclosed firebox. Most common in rural Sub-Saharan Africa and South Asia. WHO classification: polluting (highest PM2.5 emissions)."
    fr: "Feu à trois pierres ou autre aménagement de feu ouvert sans boîte à feu. Le plus répandu en Afrique subsaharienne rurale et en Asie du Sud. Classification OMS : polluant (émissions PM2,5 les plus élevées)."
    es: "Fuego de tres piedras u otro arreglo de fuego abierto sin cámara de combustión. El más común en el África subsahariana rural y el sur de Asia. Clasificación OMS: contaminante (emisiones de PM2,5 más altas)."
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: "A cookstove type not covered by the other categories. Requires additional specification."
    fr: "Un type de foyer de cuisson non couvert par les autres catégories. Nécessite une spécification supplémentaire."
    es: "Un tipo de cocina no cubierto por las otras categorías. Requiere especificación adicional."

