id: phq9-frequency-4pt
maturity: draft
label:
  en: PHQ-9 / GAD-7 Frequency (4-point)
  fr: "Fréquence PHQ-9 / GAD-7 (4 niveaux)"
  es: "Frecuencia PHQ-9 / GAD-7 (4 niveles)"
definition:
  en: "A four-point frequency scale running from 'not at all' to 'nearly every day', used on every item of the PHQ-9 (Patient Health Questionnaire) and the GAD-7 (Generalized Anxiety Disorder) screeners. The standard scoring convention assigns ascending numeric values 0 through 3, where higher values indicate more frequent symptom occurrence (0 = not at all, 3 = nearly every day). The recall period is the last two weeks."
  fr: "Une échelle de fréquence à quatre niveaux allant de « pas du tout » à « presque tous les jours », utilisée pour chaque item des dépistages PHQ-9 (Patient Health Questionnaire) et GAD-7 (trouble d'anxiété généralisée). La convention de notation standard attribue des valeurs numériques croissantes de 0 à 3, où les valeurs plus élevées indiquent une occurrence plus fréquente des symptômes (0 = pas du tout, 3 = presque tous les jours). La période de rappel est les deux dernières semaines."
  es: "Una escala de frecuencia de cuatro niveles que va desde «en absoluto» hasta «casi todos los días», usada en cada ítem de los tamizajes PHQ-9 (Patient Health Questionnaire) y GAD-7 (Trastorno de Ansiedad Generalizada). La convención de puntuación estándar asigna valores numéricos ascendentes de 0 a 3, donde los valores más altos indican ocurrencia de síntomas más frecuente (0 = en absoluto, 3 = casi todos los días). El período de recordatorio es las últimas dos semanas."
standard:
  name: "Patient Health Questionnaire (PHQ-9) and Generalized Anxiety Disorder (GAD-7), Pfizer-sponsored distribution"
  uri: https://www.phqscreeners.com/
  notes: "Shared response scale across PHQ-9 and GAD-7 items. Value assignments: not_at_all=0, several_days=1, more_than_half_the_days=2, nearly_every_day=3. PHQ-9 sum range 0-27; GAD-7 sum range 0-21."
values:
- code: not_at_all
  label:
    en: Not at all
    fr: "Pas du tout"
    es: "En absoluto"
  definition:
    en: "The symptom did not occur at any point during the last two weeks. Scoring value: 0."
    fr: "Le symptôme ne s'est produit à aucun moment au cours des deux dernières semaines. Valeur de notation : 0."
    es: "El síntoma no ocurrió en ningún momento durante las últimas dos semanas. Valor de puntuación: 0."
- code: several_days
  label:
    en: Several days
    fr: "Plusieurs jours"
    es: "Varios días"
  definition:
    en: "The symptom occurred on several days (but less than half of the last two weeks). Scoring value: 1."
    fr: "Le symptôme s'est produit plusieurs jours (mais moins de la moitié des deux dernières semaines). Valeur de notation : 1."
    es: "El síntoma ocurrió durante varios días (pero menos de la mitad de las últimas dos semanas). Valor de puntuación: 1."
- code: more_than_half_the_days
  label:
    en: More than half the days
    fr: "Plus de la moitié des jours"
    es: "Más de la mitad de los días"
  definition:
    en: "The symptom occurred on more than half of the last two weeks. Scoring value: 2."
    fr: "Le symptôme s'est produit plus de la moitié des deux dernières semaines. Valeur de notation : 2."
    es: "El síntoma ocurrió más de la mitad de las últimas dos semanas. Valor de puntuación: 2."
- code: nearly_every_day
  label:
    en: Nearly every day
    fr: "Presque tous les jours"
    es: "Casi todos los días"
  definition:
    en: "The symptom occurred nearly every day of the last two weeks. Scoring value: 3."
    fr: "Le symptôme s'est produit presque tous les jours au cours des deux dernières semaines. Valeur de notation : 3."
    es: "El síntoma ocurrió casi todos los días de las últimas dos semanas. Valor de puntuación: 3."
