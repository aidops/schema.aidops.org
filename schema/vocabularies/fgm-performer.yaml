id: fgm-performer
maturity: draft
label:
  en: "FGM/C Performer"
  fr: "Exécutant de MGF/E"
  es: "Ejecutor de MGF/A"
definition:
  en: "Type of person who performed the female genital mutilation / cutting on a daughter (FG18 in MICS 6 Women's Questionnaire FG module). Distinguishes traditional practitioners from medical providers; used for the medicalization-of-FGM/C sub-indicator (share of cuttings performed by a health professional)."
  fr: "Type de personne ayant pratiqué la mutilation génitale féminine / excision sur une fille (FG18 du module FG du questionnaire femme MICS 6). Distingue les praticiens traditionnels des prestataires médicaux ; utilisé pour le sous-indicateur de médicalisation des MGF/E (part des excisions réalisées par un professionnel de santé)."
  es: "Tipo de persona que realizó la mutilación genital femenina / ablación a una hija (FG18 en el módulo FG del cuestionario de mujeres MICS 6). Distingue los profesionales tradicionales de los proveedores médicos; usado para el subindicador de medicalización de MGF/A (proporción de ablaciones realizadas por un profesional de salud)."
values:
  - code: traditional_practitioner
    label:
      en: "Traditional practitioner / traditional circumciser"
      fr: "Praticien traditionnel / exciseuse traditionnelle"
      es: "Profesional tradicional / circuncidadora tradicional"
    definition:
      en: "The cutting was performed by a traditional practitioner (traditional circumciser)."
      fr: "L'excision a été pratiquée par un praticien traditionnel (exciseuse traditionnelle)."
      es: "La ablación fue realizada por un profesional tradicional (circuncidadora tradicional)."
  - code: traditional_birth_attendant
    label:
      en: "Traditional birth attendant"
      fr: "Accoucheuse traditionnelle"
      es: "Partera tradicional"
    definition:
      en: "The cutting was performed by a traditional birth attendant (TBA)."
      fr: "L'excision a été pratiquée par une accoucheuse traditionnelle."
      es: "La ablación fue realizada por una partera tradicional."
  - code: doctor
    label:
      en: "Doctor"
      fr: "Médecin"
      es: "Médico"
    definition:
      en: "The cutting was performed by a medical doctor. Counts toward the medicalization-of-FGM/C sub-indicator."
      fr: "L'excision a été pratiquée par un médecin. Compte pour le sous-indicateur de médicalisation des MGF/E."
      es: "La ablación fue realizada por un médico. Cuenta para el subindicador de medicalización de MGF/A."
  - code: nurse_midwife
    label:
      en: "Nurse or midwife"
      fr: "Infirmière ou sage-femme"
      es: "Enfermera o partera"
    definition:
      en: "The cutting was performed by a nurse or trained midwife. Counts toward the medicalization-of-FGM/C sub-indicator."
      fr: "L'excision a été pratiquée par une infirmière ou une sage-femme formée. Compte pour le sous-indicateur de médicalisation des MGF/E."
      es: "La ablación fue realizada por una enfermera o partera capacitada. Cuenta para el subindicador de medicalización de MGF/A."
  - code: other_health_worker
    label:
      en: "Other health worker"
      fr: "Autre agent de santé"
      es: "Otro trabajador de salud"
    definition:
      en: "The cutting was performed by another health worker not classified above. Counts toward the medicalization-of-FGM/C sub-indicator."
      fr: "L'excision a été pratiquée par un autre agent de santé non classé ci-dessus. Compte pour le sous-indicateur de médicalisation des MGF/E."
      es: "La ablación fue realizada por otro trabajador de salud no clasificado anteriormente. Cuenta para el subindicador de medicalización de MGF/A."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "The cutting was performed by someone else not captured above."
      fr: "L'excision a été pratiquée par quelqu'un d'autre non décrit ci-dessus."
      es: "La ablación fue realizada por otra persona no descrita anteriormente."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "The respondent does not know who performed the cutting."
      fr: "La répondante ne sait pas qui a pratiqué l'excision."
      es: "La encuestada no sabe quién realizó la ablación."
