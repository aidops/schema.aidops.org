id: service-disruption-type
maturity: draft
label:
  en: Service Disruption Type
  fr: "Type d'interruption de service"
  es: "Tipo de interrupción de servicio"
definition:
  en: "Essential services that may be disrupted in a post-shock context. Multi-select vocabulary: a record lists every service currently disrupted at the household's dwelling. Codes cover both full interruption (service not functioning at all) and partial interruption such as intermittent supply or unsafe water, so a record can describe present-but-non-functional and present-but-contaminated cases in addition to complete outages. This captures functional status after the shock; the household's usual service infrastructure type is recorded separately by water_source, sanitation_facility, and electricity_access."
  fr: "Services essentiels susceptibles d'être interrompus dans un contexte post-choc. Vocabulaire multi-sélection : un enregistrement liste chaque service actuellement interrompu au logement du ménage. Les codes couvrent l'interruption complète (service non fonctionnel) et l'interruption partielle telle qu'un approvisionnement intermittent ou une eau non potable, de sorte qu'un enregistrement peut décrire les cas présents-mais-non-fonctionnels et présents-mais-contaminés en plus des coupures totales. Ceci consigne l'état fonctionnel après le choc ; le type d'infrastructure de service habituel du ménage est consigné séparément par water_source, sanitation_facility et electricity_access."
  es: "Servicios esenciales que pueden interrumpirse en un contexto post-choque. Vocabulario de selección múltiple: un registro enumera cada servicio actualmente interrumpido en la vivienda del hogar. Los códigos cubren tanto la interrupción total (servicio que no funciona) como la interrupción parcial, como suministro intermitente o agua no apta, de modo que un registro puede describir casos presentes-pero-no-funcionales y presentes-pero-contaminados además de los cortes totales. Esto capta el estado funcional después del choque; el tipo de infraestructura de servicio habitual del hogar se registra por separado por water_source, sanitation_facility y electricity_access."
values:
- code: water
  label:
    en: Water
    fr: "Eau"
    es: "Agua"
  definition:
    en: "Drinking-water supply is not functioning or not available."
    fr: "L'approvisionnement en eau potable ne fonctionne pas ou n'est pas disponible."
    es: "El suministro de agua potable no funciona o no está disponible."
- code: sanitation
  label:
    en: Sanitation
    fr: "Assainissement"
    es: "Saneamiento"
  definition:
    en: "Sanitation facility (toilet, latrine, greywater disposal) is damaged or unusable."
    fr: "L'installation d'assainissement (toilette, latrine, évacuation des eaux grises) est endommagée ou inutilisable."
    es: "La instalación de saneamiento (inodoro, letrina, evacuación de aguas grises) está dañada o inutilizable."
- code: electricity
  label:
    en: Electricity
    fr: "Électricité"
    es: "Electricidad"
  definition:
    en: "Grid or off-grid electricity supply is not functioning."
    fr: "L'alimentation électrique du réseau ou hors réseau ne fonctionne pas."
    es: "El suministro eléctrico de la red o fuera de red no funciona."
- code: telecommunications
  label:
    en: Telecommunications
    fr: "Télécommunications"
    es: "Telecomunicaciones"
  definition:
    en: "Mobile or fixed-line telecommunications (voice, SMS, data) are not functioning."
    fr: "Les télécommunications mobiles ou fixes (voix, SMS, données) ne fonctionnent pas."
    es: "Las telecomunicaciones móviles o de línea fija (voz, SMS, datos) no funcionan."
- code: water_unsafe
  label:
    en: Water present but unsafe
    fr: "Eau disponible mais non potable"
    es: "Agua disponible pero no apta"
  definition:
    en: "Drinking-water supply is physically available but contaminated or otherwise not safe to drink without further treatment (for example, visibly turbid, microbiologically unsafe, or mixed with sewage). Use alongside the water code when both outage and safety issues are relevant."
    fr: "L'approvisionnement en eau potable est physiquement disponible mais contaminé ou non sûr à boire sans traitement supplémentaire (par exemple, visiblement trouble, microbiologiquement non sûr, ou mélangé aux eaux usées). À utiliser aux côtés du code water lorsque les deux problèmes de coupure et de salubrité sont pertinents."
    es: "El suministro de agua potable está físicamente disponible pero contaminado o no es seguro para beber sin tratamiento adicional (por ejemplo, visiblemente turbio, microbiológicamente no seguro o mezclado con aguas residuales). Usar junto al código water cuando sean relevantes tanto la interrupción como los problemas de salubridad."
- code: water_intermittent
  label:
    en: Water intermittent
    fr: "Eau intermittente"
    es: "Agua intermitente"
  definition:
    en: "Drinking-water supply is functioning only part of the time (scheduled rationing, pressure drops, or unreliable source), such that household access is not continuous."
    fr: "L'approvisionnement en eau potable ne fonctionne qu'une partie du temps (rationnement programmé, baisses de pression ou source non fiable), de sorte que l'accès du ménage n'est pas continu."
    es: "El suministro de agua potable funciona solo parte del tiempo (racionamiento programado, caídas de presión o fuente poco fiable), de modo que el acceso del hogar no es continuo."
- code: electricity_intermittent
  label:
    en: Electricity intermittent
    fr: "Électricité intermittente"
    es: "Electricidad intermitente"
  definition:
    en: "Grid or off-grid electricity supply is functioning only part of the time (scheduled load shedding, partial-day outages, unreliable source), such that continuous household use is not possible."
    fr: "L'alimentation électrique du réseau ou hors réseau ne fonctionne qu'une partie du temps (délestage programmé, coupures partielles de journée, source non fiable), de sorte qu'un usage domestique continu n'est pas possible."
    es: "El suministro eléctrico de la red o fuera de red funciona solo parte del tiempo (cortes programados de carga, apagones parciales del día, fuente poco fiable), de modo que el uso continuo en el hogar no es posible."
- code: sanitation_overflowing
  label:
    en: Sanitation overflowing or unsanitary
    fr: "Assainissement débordant ou insalubre"
    es: "Saneamiento desbordado o insalubre"
  definition:
    en: "Sanitation facility is physically present but overflowing, flooded, or otherwise in an unsanitary state that makes safe use impossible (e.g., a pit latrine inundated after flooding). Use alongside the sanitation code when both full breakdown and unsanitary state are relevant."
    fr: "L'installation d'assainissement est physiquement présente mais débordante, inondée ou dans un état insalubre qui rend un usage sûr impossible (par exemple, une latrine à fosse inondée après une inondation). À utiliser aux côtés du code sanitation lorsque l'effondrement complet et l'état insalubre sont tous deux pertinents."
    es: "La instalación de saneamiento está físicamente presente pero desbordándose, inundada o en un estado insalubre que hace imposible su uso seguro (por ejemplo, una letrina de pozo inundada tras una inundación). Usar junto al código sanitation cuando sean relevantes tanto la avería total como el estado insalubre."
- code: none
  label:
    en: No service disruption
    fr: "Aucune interruption de service"
    es: "Sin interrupción de servicio"
  definition:
    en: "Recorded explicitly to distinguish from missing observation when the household reports that all services are currently functioning."
    fr: "Consigné explicitement pour distinguer d'une observation absente lorsque le ménage rapporte que tous les services fonctionnent actuellement."
    es: "Registrado explícitamente para distinguirse de una observación ausente cuando el hogar reporta que todos los servicios funcionan actualmente."
