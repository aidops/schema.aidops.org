id: climate-insurance-type
maturity: draft
label:
  en: "Climate insurance type"
  fr: "Type d'assurance climatique"
  es: "Tipo de seguro climático"
definition:
  en: >
    Types of insurance products that cover climate-related risks, used for
    climate_insurance_coverage_type. Includes 'none' as a mutually exclusive
    option. Sources: GCF results framework (risk transfer); IPCC AR6 WGII
    Chapter 17 (insurance as climate adaptation mechanism); UNFCCC NAP M&E
    (financial resilience); Adaptation Fund M&E (financial resilience dimension).
  fr: >
    Types de produits d'assurance couvrant les risques liés au climat, utilisés
    pour climate_insurance_coverage_type. Inclut 'none' comme option mutuellement
    exclusive. Sources : FVC ; GIEC AR6 WGII Chapitre 17 ; CCNUCC PNA ; Fonds
    d'adaptation.
  es: >
    Tipos de productos de seguros que cubren riesgos relacionados con el clima,
    usados para climate_insurance_coverage_type. Incluye 'none' como opción
    mutuamente excluyente. Fuentes: FVC; IPCC AR6 WGII Capítulo 17; CMNUCC
    PNA; Fondo de Adaptación.
values:
  - code: crop_insurance_traditional
    label:
      en: "Traditional crop insurance"
      fr: "Assurance récolte traditionnelle"
      es: "Seguro de cultivos tradicional"
    definition:
      en: "An indemnity-based insurance product that pays out based on actual assessed crop losses from drought, flood, or other perils."
      fr: "Un produit d'assurance basé sur l'indemnité qui verse des prestations sur la base des pertes de récolte réellement évaluées dues à la sécheresse, aux inondations ou à d'autres risques."
      es: "Un producto de seguro basado en indemnizaciones que paga según las pérdidas de cosecha realmente evaluadas por sequía, inundaciones u otros peligros."
  - code: weather_index_insurance
    label:
      en: "Weather-index or parametric insurance"
      fr: "Assurance indicielle météorologique ou paramétrique"
      es: "Seguro de índice meteorológico o paramétrico"
    definition:
      en: "An insurance product that pays out automatically when a weather variable (e.g., rainfall below a threshold, temperature above a threshold) is triggered at a monitoring station, without individual loss assessment."
      fr: "Un produit d'assurance qui verse des prestations automatiquement lorsqu'une variable météorologique (p. ex., précipitations en dessous d'un seuil, température au-dessus d'un seuil) est déclenchée à une station de surveillance, sans évaluation individuelle des pertes."
      es: "Un producto de seguro que paga automáticamente cuando una variable meteorológica (p. ej., lluvia por debajo de un umbral, temperatura por encima de un umbral) se activa en una estación de monitoreo, sin evaluación individual de pérdidas."
  - code: livestock_insurance
    label:
      en: "Livestock insurance"
      fr: "Assurance bétail"
      es: "Seguro ganadero"
    definition:
      en: "Insurance covering livestock mortality or losses due to drought, flood, disease exacerbated by climate, or extreme temperatures."
      fr: "Assurance couvrant la mortalité du bétail ou les pertes dues à la sécheresse, aux inondations, aux maladies exacerbées par le climat ou aux températures extrêmes."
      es: "Seguro que cubre la mortalidad del ganado o las pérdidas por sequía, inundaciones, enfermedades agravadas por el clima o temperaturas extremas."
  - code: asset_or_property_insurance
    label:
      en: "Asset or property insurance"
      fr: "Assurance des biens ou actifs"
      es: "Seguro de activos o propiedades"
    definition:
      en: "Insurance covering household assets or the dwelling from weather-related damage (wind, flood)."
      fr: "Assurance couvrant les actifs ménagers ou le logement contre les dommages liés aux conditions météorologiques (vent, inondation)."
      es: "Seguro que cubre los activos del hogar o la vivienda frente a daños relacionados con el tiempo (viento, inundación)."
  - code: health_insurance
    label:
      en: "Health insurance"
      fr: "Assurance maladie"
      es: "Seguro de salud"
    definition:
      en: "A health insurance product — included because climate-related illnesses (heatstroke, flood-borne disease, malnutrition) are covered and health insurance functions as a partial adaptive capacity buffer."
      fr: "Un produit d'assurance maladie — inclus car les maladies liées au climat (coup de chaleur, maladie hydrique post-inondation, malnutrition) sont couvertes et l'assurance maladie fonctionne comme un tampon partiel de capacité d'adaptation."
      es: "Un producto de seguro de salud — incluido porque las enfermedades relacionadas con el clima (golpe de calor, enfermedad por inundación, desnutrición) están cubiertas y el seguro de salud funciona como un amortiguador parcial de capacidad de adaptación."
  - code: community_based_insurance
    label:
      en: "Community-based or mutual insurance scheme"
      fr: "Assurance communautaire ou mutuelle"
      es: "Seguro comunitario o mutual"
    definition:
      en: "An informal or semi-formal community mutual arrangement — such as a cooperative or savings group that pools climate disaster recovery funds."
      fr: "Un arrangement mutuel communautaire informel ou semi-formel — tel qu'une coopérative ou un groupe d'épargne qui mutualise des fonds de récupération après une catastrophe climatique."
      es: "Un arreglo mutuo comunitario informal o semi-formal — como una cooperativa o grupo de ahorro que agrupa fondos de recuperación ante desastres climáticos."
  - code: none
    label:
      en: "No insurance"
      fr: "Aucune assurance"
      es: "Sin seguro"
    definition:
      en: "The household does not hold any form of insurance. Mutually exclusive with all other codes."
      fr: "Le ménage ne détient aucune forme d'assurance. Mutuellement exclusif avec tous les autres codes."
      es: "El hogar no tiene ningún tipo de seguro. Mutuamente exclusivo con todos los demás códigos."
