id: handwashing-facility-type
maturity: draft
label:
  en: Handwashing Facility Type
  fr: "Type de dispositif de lavage des mains"
  es: "Tipo de instalación para lavado de manos"
definition:
  en: "Type of handwashing facility present in the household. Both fixed and mobile facilities are valid for JMP basic hygiene service classification. A tippy-tap, designated bucket with tap, or jug set aside for handwashing qualifies as a handwashing facility."
  fr: "Type de dispositif de lavage des mains présent dans le ménage. Les installations fixes et mobiles sont toutes deux valides pour la classification du service d'hygiène de base JMP. Un tippy-tap, un seau désigné avec robinet, ou une cruche mise de côté pour le lavage des mains est considéré comme un dispositif de lavage des mains."
  es: "Tipo de instalación para lavado de manos presente en el hogar. Tanto las instalaciones fijas como las móviles son válidas para la clasificación del servicio de higiene básico del JMP. Un tippy-tap, un cubo designado con grifo, o una jarra reservada para lavado de manos califica como instalación para lavado de manos."
standard:
  name: "JMP Core Questions for Household Surveys (2018 Update)"
  uri: "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"
  notes: "JMP H1 expanded. MICS observation protocol. Mobile facilities are as valid as fixed ones for JMP basic service."
values:
- code: fixed_sink_with_tap
  label:
    en: Fixed sink with tap
    fr: "Évier fixe avec robinet"
    es: "Fregadero fijo con grifo"
  definition:
    en: "A permanently installed basin or sink with a running water tap."
    fr: "Un lavabo ou évier installé en permanence avec un robinet à eau courante."
    es: "Un lavabo o fregadero instalado permanentemente con un grifo de agua corriente."
- code: bucket_with_tap
  label:
    en: Bucket or container with tap/spigot
    fr: "Seau ou récipient avec robinet"
    es: "Cubo o recipiente con grifo"
  definition:
    en: "A bucket or large container fitted with a tap or spigot, placed near the handwashing area. A designated and accessible handwashing facility."
    fr: "Seau ou grand récipient équipé d'un robinet ou d'un robinet de soutireur, placé près de la zone de lavage des mains. Un dispositif de lavage des mains désigné et accessible."
    es: "Un cubo o recipiente grande equipado con un grifo o espita, colocado cerca del área de lavado de manos. Una instalación designada y accesible para lavado de manos."
- code: tippy_tap
  label:
    en: Tippy-tap
    fr: Tippy-tap
    es: Tippy-tap
  definition:
    en: "A low-cost hands-free handwashing device made from a jug or container suspended on a pivot; tilting a foot lever tips the container to release a small amount of water."
    fr: "Un dispositif de lavage des mains sans contact peu coûteux, fabriqué à partir d'une cruche ou d'un récipient suspendu sur un pivot ; incliner un levier à pied fait basculer le récipient pour libérer une petite quantité d'eau."
    es: "Un dispositivo de lavado de manos sin contacto de bajo costo hecho de una jarra o recipiente suspendido en un pivote; inclinar una palanca de pie inclina el recipiente para liberar una pequeña cantidad de agua."
- code: jug_or_basin
  label:
    en: Jug, basin, or bowl designated for handwashing
    fr: "Cruche, bassine ou cuvette désignée pour le lavage des mains"
    es: "Jarra, palangana o tazón designado para lavado de manos"
  definition:
    en: "A jug, basin, or bowl that is specifically set aside and used for handwashing, not shared with other household tasks."
    fr: "Cruche, bassine ou cuvette spécialement mise de côté et utilisée pour le lavage des mains, non partagée avec d'autres tâches ménagères."
    es: "Una jarra, palangana o tazón reservado específicamente y utilizado para lavado de manos, no compartido con otras tareas del hogar."
- code: shared_with_neighbours
  label:
    en: Shared facility with neighbours
    fr: "Installation partagée avec les voisins"
    es: "Instalación compartida con vecinos"
  definition:
    en: "A handwashing facility located outside the household compound that is shared with neighbouring households."
    fr: "Un dispositif de lavage des mains situé à l'extérieur de la concession du ménage et partagé avec les ménages voisins."
    es: "Una instalación para lavado de manos ubicada fuera del recinto del hogar que se comparte con hogares vecinos."
- code: other
  label:
    en: Other facility type
    fr: "Autre type de dispositif"
    es: "Otro tipo de instalación"
  definition:
    en: "A handwashing facility type not covered by the other categories."
    fr: "Un type de dispositif de lavage des mains non couvert par les autres catégories."
    es: "Un tipo de instalación para lavado de manos no cubierto por las otras categorías."
