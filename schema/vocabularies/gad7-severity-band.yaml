id: gad7-severity-band
maturity: draft
label:
  en: GAD-7 Severity Band
  fr: "Niveau de sévérité GAD-7"
  es: "Nivel de severidad GAD-7"
definition:
  en: "The anxiety severity classification derived from the GAD-7 total score using the Spitzer et al. (2006) cut-points. Four bands: none/minimal (0-4), mild (5-9), moderate (10-14), severe (15-21). A total score of 10 or higher is the standard clinical screening cut-off for probable generalized anxiety disorder."
  fr: "La classification de la sévérité de l'anxiété dérivée du score total GAD-7 en utilisant les seuils de Spitzer et al. (2006). Quatre niveaux : aucune/minimale (0-4), légère (5-9), modérée (10-14), sévère (15-21). Un score total de 10 ou plus est le seuil de dépistage clinique standard pour un trouble d'anxiété généralisée probable."
  es: "La clasificación de severidad de la ansiedad derivada del puntaje total del GAD-7 usando los puntos de corte de Spitzer et al. (2006). Cuatro niveles: ninguna/mínima (0-4), leve (5-9), moderada (10-14), severa (15-21). Un puntaje total de 10 o más es el punto de corte de tamizaje clínico estándar para un trastorno de ansiedad generalizada probable."
standard:
  name: "Spitzer, Kroenke, Williams, and Löwe (2006), 'A Brief Measure for Assessing Generalized Anxiety Disorder: The GAD-7'"
  uri: "https://doi.org/10.1001/archinte.166.10.1092"
  notes: "Standard severity bands published with the original GAD-7 validation. Sensitivity 89%, specificity 82% at the >=10 cut-off for generalized anxiety disorder."
values:
- code: none_minimal
  label:
    en: None / minimal
    fr: "Aucune / minimale"
    es: "Ninguna / mínima"
  definition:
    en: "GAD-7 total score 0-4. None or minimal anxiety symptoms."
    fr: "Score total GAD-7 de 0 à 4. Aucun ou des symptômes anxieux minimaux."
    es: "Puntaje total GAD-7 de 0 a 4. Ningún síntoma de ansiedad o síntomas mínimos."
- code: mild
  label:
    en: Mild
    fr: "Légère"
    es: "Leve"
  definition:
    en: "GAD-7 total score 5-9. Mild anxiety symptoms."
    fr: "Score total GAD-7 de 5 à 9. Symptômes anxieux légers."
    es: "Puntaje total GAD-7 de 5 a 9. Síntomas de ansiedad leves."
- code: moderate
  label:
    en: Moderate
    fr: "Modérée"
    es: "Moderada"
  definition:
    en: "GAD-7 total score 10-14. Moderate anxiety symptoms. Standard clinical cut-off (>=10) for probable generalized anxiety disorder."
    fr: "Score total GAD-7 de 10 à 14. Symptômes anxieux modérés. Seuil clinique standard (>=10) pour un trouble d'anxiété généralisée probable."
    es: "Puntaje total GAD-7 de 10 a 14. Síntomas de ansiedad moderados. Punto de corte clínico estándar (>=10) para un trastorno de ansiedad generalizada probable."
- code: severe
  label:
    en: Severe
    fr: "Sévère"
    es: "Severa"
  definition:
    en: "GAD-7 total score 15-21. Severe anxiety symptoms."
    fr: "Score total GAD-7 de 15 à 21. Symptômes anxieux sévères."
    es: "Puntaje total GAD-7 de 15 a 21. Síntomas de ansiedad severos."
