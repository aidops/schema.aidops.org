id: hazard-type-climate
maturity: draft
label:
  en: "Climate hazard type"
  fr: "Type d'aléa climatique"
  es: "Tipo de peligro climático"
definition:
  en: >
    Climate-relevant hazard types for ClimateAdaptationProfile. Narrower than
    any general hazard-type vocabulary: geophysical hazards (earthquake, volcanic
    eruption, tsunami), biological hazards (epidemic/pandemic), and technological
    hazards are excluded because they are not climate-driver hazards in the IPCC
    sense. Sources: IPCC AR6 WGII Chapter 16 key risks taxonomy; WMO hazard
    classification (climate hazards subset); IFRC PCVA hazard list; CARE CVCA
    community hazard matrix.
  fr: >
    Types d'aléas climatiques pour ClimateAdaptationProfile. Plus étroit que
    tout vocabulaire général de type d'aléa : les aléas géophysiques
    (séisme, éruption volcanique, tsunami), biologiques (épidémie/pandémie) et
    technologiques sont exclus car ils ne sont pas des aléas à pilote climatique
    au sens du GIEC. Sources : GIEC AR6 WGII Chapitre 16 ; WMO ; FICR PCVA ;
    CARE CVCA.
  es: >
    Tipos de peligros climáticos para ClimateAdaptationProfile. Más estrecho
    que cualquier vocabulario general de tipo de peligro: los peligros geofísicos
    (terremoto, erupción volcánica, tsunami), biológicos (epidemia/pandemia) y
    tecnológicos están excluidos porque no son peligros de tipo climático en el
    sentido del IPCC. Fuentes: IPCC AR6 WGII Capítulo 16; OMM; FICR PCVA;
    CARE CVCA.
values:
  - code: drought
    label:
      en: Drought
      fr: "Sécheresse"
      es: "Sequía"
    definition:
      en: "A prolonged period of abnormally low rainfall that leads to water shortage, crop failure, or pasture degradation. Includes multi-year droughts and single poor-season dry spells significant enough to affect the household."
      fr: "Une période prolongée de précipitations anormalement faibles entraînant une pénurie d'eau, une mauvaise récolte ou une dégradation des pâturages. Inclut les sécheresses pluriannuelles et les saisons sèches insuffisantes."
      es: "Un período prolongado de precipitaciones anormalmente bajas que conduce a escasez de agua, pérdida de cosecha o degradación de pastizales. Incluye sequías plurianuales y temporadas de lluvias insuficientes."
  - code: flood_riverine
    label:
      en: "Riverine flood"
      fr: "Crue fluviale"
      es: "Inundación fluvial"
    definition:
      en: "Flooding caused by rivers or streams overflowing their banks, including slow-onset seasonal floods and rapid-onset flash floods."
      fr: "Inondation causée par le débordement des rivières ou ruisseaux, y compris les crues saisonnières à début lent et les crues soudaines."
      es: "Inundación causada por el desbordamiento de ríos o arroyos, incluidas inundaciones estacionales de inicio lento y de inicio rápido."
  - code: flood_surface
    label:
      en: "Surface water or flash flood"
      fr: "Inondation de surface ou crue soudaine"
      es: "Inundación superficial o inundación repentina"
    definition:
      en: "Flooding caused by heavy rainfall exceeding ground absorption capacity, or by a flash flood not primarily driven by river overflow. Includes urban pluvial flooding."
      fr: "Inondation causée par des précipitations intenses dépassant la capacité d'absorption du sol, ou par une crue soudaine non principalement due au débordement d'une rivière. Inclut les inondations pluviales urbaines."
      es: "Inundación causada por lluvias intensas que superan la capacidad de absorción del suelo, o por una inundación repentina no impulsada principalmente por el desbordamiento del río. Incluye inundaciones pluviales urbanas."
  - code: coastal_flood_surge
    label:
      en: "Coastal flooding or storm surge"
      fr: "Inondation côtière ou onde de tempête"
      es: "Inundación costera o marejada ciclónica"
    definition:
      en: "Flooding caused by elevated sea levels, storm surges, or wave action in coastal or delta areas."
      fr: "Inondation causée par l'élévation du niveau de la mer, les ondes de tempête ou l'action des vagues dans les zones côtières ou deltaïques."
      es: "Inundación causada por elevación del nivel del mar, marejadas ciclónicas o acción de las olas en zonas costeras o deltaicas."
  - code: cyclone_tropical_storm
    label:
      en: "Cyclone, tropical storm, or typhoon"
      fr: "Cyclone, tempête tropicale ou typhon"
      es: "Ciclón, tormenta tropical o tifón"
    definition:
      en: "A tropical rotating storm system with sustained high winds. Includes cyclone (Indian Ocean, South Pacific), typhoon (North Pacific), and hurricane (Atlantic, Caribbean, East Pacific)."
      fr: "Système tempêtueux tropical rotatif avec des vents soutenus élevés. Inclut le cyclone (océan Indien, Pacifique Sud), le typhon (Pacifique Nord) et l'ouragan (Atlantique, Caraïbes, Pacifique Est)."
      es: "Sistema de tormenta tropical rotatoria con vientos sostenidos altos. Incluye ciclón (océano Índico, Pacífico Sur), tifón (Pacífico Norte) y huracán (Atlántico, Caribe, Pacífico Oriental)."
  - code: heatwave
    label:
      en: Heatwave
      fr: "Vague de chaleur"
      es: "Ola de calor"
    definition:
      en: "A prolonged period of abnormally high temperatures that poses health risks, reduces agricultural productivity, or strains water resources."
      fr: "Une période prolongée de températures anormalement élevées qui pose des risques sanitaires, réduit la productivité agricole ou sollicite les ressources en eau."
      es: "Un período prolongado de temperaturas anormalmente altas que representa riesgos para la salud, reduce la productividad agrícola o tensa los recursos hídricos."
  - code: cold_wave_frost
    label:
      en: "Cold wave or frost"
      fr: "Vague de froid ou gel"
      es: "Ola de frío o helada"
    definition:
      en: "A prolonged period of abnormally low temperatures including frost events that damage crops, livestock, or human health."
      fr: "Une période prolongée de températures anormalement basses, y compris les épisodes de gel qui endommagent les cultures, le bétail ou la santé humaine."
      es: "Un período prolongado de temperaturas anormalmente bajas, incluidos eventos de heladas que dañan cultivos, ganado o la salud humana."
  - code: wildfire
    label:
      en: Wildfire
      fr: "Feu de brousse ou incendie de forêt"
      es: "Incendio forestal o de pastizal"
    definition:
      en: "An uncontrolled fire in vegetation — grassland, savanna, woodland, or forest — whether started naturally or accidentally, where the extent and behavior is worsened by dry or hot climate conditions."
      fr: "Incendie incontrôlé de végétation — prairie, savane, forêt ouverte ou forêt — démarré naturellement ou accidentellement, dont l'étendue et le comportement sont aggravés par des conditions climatiques sèches ou chaudes."
      es: "Incendio incontrolado en vegetación — pastizal, sabana, bosque abierto o bosque — iniciado natural o accidentalmente, cuya extensión y comportamiento empeoran por condiciones climáticas secas o calurosas."
  - code: landslide_climate
    label:
      en: "Landslide or mudslide (climate-triggered)"
      fr: "Glissement de terrain ou coulée de boue (déclenchement climatique)"
      es: "Deslizamiento de tierra o de lodo (desencadenado por el clima)"
    definition:
      en: "A slope failure or mass movement triggered by extreme rainfall or soil erosion patterns associated with climate variability. Excludes earthquake-triggered landslides."
      fr: "Rupture de pente ou mouvement de masse déclenché par des précipitations extrêmes ou des schémas d'érosion du sol associés à la variabilité climatique. Exclut les glissements de terrain déclenchés par des séismes."
      es: "Falla de talud o movimiento en masa desencadenado por precipitaciones extremas o patrones de erosión del suelo asociados a la variabilidad climática. Excluye deslizamientos desencadenados por terremotos."
