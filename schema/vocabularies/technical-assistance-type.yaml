id: technical-assistance-type
maturity: draft
label:
  en: Technical Assistance Type
  fr: "Type d'assistance technique"
  es: "Tipo de asistencia técnica"
definition:
  en: "The type of shelter-related technical assistance or guidance the household received. Based on Sphere Standard 5 guidance and Global Shelter Cluster 5W reporting categories."
  fr: "Le type d'assistance technique ou d'orientation liée à l'abri reçue par le ménage. Basé sur les orientations de la Norme Sphère 5 et les catégories de rapport 5W du Cluster Abri Mondial."
  es: "El tipo de asistencia técnica o orientación relacionada con el refugio que recibió el hogar. Basado en la orientación de la Norma Esfera 5 y las categorías de reporte 5W del Clúster Global de Refugio."
standard:
  name: "Sphere Handbook 2018, Standard 5 — Technical Assistance and Shelter Support"
  uri: "https://spherestandards.org/handbook-2018/"
values:
- code: construction_training
  label:
    en: Construction training
    fr: "Formation en construction"
    es: "Capacitación en construcción"
  definition:
    en: "Training in safe building practices, use of tools, or construction techniques for shelter repair or improvement."
    fr: "Formation aux pratiques de construction sécurisée, à l'utilisation des outils ou aux techniques de construction pour la réparation ou l'amélioration de l'abri."
    es: "Capacitación en prácticas de construcción segura, uso de herramientas o técnicas de construcción para la reparación o mejora del refugio."
- code: design_planning
  label:
    en: Design or site planning support
    fr: "Appui à la conception ou à la planification du site"
    es: "Apoyo en diseño o planificación del sitio"
  definition:
    en: "Technical support for shelter design, layout planning, or site planning, including advice on structural form, orientation, or space allocation."
    fr: "Appui technique pour la conception de l'abri, la planification de l'aménagement ou la planification du site, incluant des conseils sur la forme structurale, l'orientation ou l'allocation d'espace."
    es: "Apoyo técnico para el diseño del refugio, planificación del diseño o planificación del sitio, incluidos consejos sobre la forma estructural, orientación o asignación de espacio."
- code: damage_assessment
  label:
    en: Structural damage assessment
    fr: "Évaluation des dommages structurels"
    es: "Evaluación de daños estructurales"
  definition:
    en: "Professional assessment of the structural safety of the household's existing dwelling by a qualified engineer or trained shelter assessor."
    fr: "Évaluation professionnelle de la sécurité structurale du logement existant du ménage par un ingénieur qualifié ou un évaluateur abri formé."
    es: "Evaluación profesional de la seguridad estructural de la vivienda existente del hogar por un ingeniero calificado o evaluador de refugio capacitado."
- code: material_provision
  label:
    en: Construction material provision
    fr: "Fourniture de matériaux de construction"
    es: "Provisión de materiales de construcción"
  definition:
    en: "Supply of building materials to the household accompanied by technical guidance on how to use them correctly and safely."
    fr: "Fourniture de matériaux de construction au ménage accompagnée d'une orientation technique sur la manière de les utiliser correctement et en toute sécurité."
    es: "Suministro de materiales de construcción al hogar acompañado de orientación técnica sobre cómo usarlos correcta y seguramente."
- code: cash_with_guidance
  label:
    en: Cash or voucher with technical guidance
    fr: "Argent liquide ou bon avec orientation technique"
    es: "Efectivo o cupón con orientación técnica"
  definition:
    en: "Cash transfer or voucher for shelter construction or repair, paired with technical advisory support to ensure appropriate use."
    fr: "Transfert monétaire ou bon pour la construction ou la réparation de l'abri, associé à un appui consultatif technique pour assurer une utilisation appropriée."
    es: "Transferencia de efectivo o cupón para construcción o reparación del refugio, combinado con apoyo de asesoría técnica para garantizar el uso apropiado."
- code: quality_monitoring
  label:
    en: Quality monitoring visits
    fr: "Visites de suivi de la qualité"
    es: "Visitas de monitoreo de calidad"
  definition:
    en: "Visits by technical programme staff to inspect and advise on the quality of shelter construction or repair work in progress or completed."
    fr: "Visites de personnel technique du programme pour inspecter et conseiller sur la qualité des travaux de construction ou de réparation d'abri en cours ou achevés."
    es: "Visitas del personal técnico del programa para inspeccionar y asesorar sobre la calidad de los trabajos de construcción o reparación del refugio en curso o completados."
- code: legal_tenure_support
  label:
    en: Legal or tenure support
    fr: "Appui juridique ou foncier"
    es: "Apoyo legal o de tenencia"
  definition:
    en: "Legal advice or documentation support related to housing, land and property rights, including assistance securing tenure documents."
    fr: "Conseil juridique ou appui à la documentation liés aux droits relatifs au logement, aux terres et à la propriété, y compris l'assistance pour l'obtention de documents fonciers."
    es: "Asesoría legal o apoyo de documentación relacionado con los derechos de vivienda, tierra y propiedad, incluida la asistencia para obtener documentos de tenencia."
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: "Type of technical assistance not covered by the above categories."
    fr: "Type d'assistance technique non couvert par les catégories ci-dessus."
    es: "Tipo de asistencia técnica no cubierto por las categorías anteriores."
