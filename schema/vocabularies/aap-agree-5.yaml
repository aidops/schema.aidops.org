id: aap-agree-5
maturity: draft
label:
  en: "AAP: Agreement (5 levels)"
  fr: "Redevabilité : Accord (5 niveaux)"
  es: "Rendición de cuentas: Acuerdo (5 niveles)"
definition:
  en: "Five-level Likert agreement scale parallel in structure to `aap-satisfaction-5` but labelled for agree/disagree items (for example, 'aid providers take my opinion into account', 'aid providers selected the right people', 'people are afraid to speak up'). Source: GTS HVI and OECD Guidelines on Measuring Trust (2017), which anchor five-level agreement scales as the standard for trust and perception measurement. A separate vocabulary (rather than reused codes) is provided because label semantics differ."
  fr: "Échelle d'accord de Likert à cinq niveaux de structure parallèle à `aap-satisfaction-5` mais étiquetée pour les items d'accord/désaccord (par exemple, « les intervenants tiennent compte de mon opinion », « les intervenants ont sélectionné les bonnes personnes », « les gens ont peur de s'exprimer »). Source : GTS HVI et Lignes directrices de l'OCDE sur la mesure de la confiance (2017), qui ancrent les échelles d'accord à cinq niveaux comme norme pour la mesure de la confiance et de la perception. Un vocabulaire séparé (plutôt que des codes réutilisés) est fourni car la sémantique des étiquettes diffère."
  es: "Escala de acuerdo de Likert de cinco niveles de estructura paralela a `aap-satisfaction-5` pero etiquetada para los ítems de acuerdo/desacuerdo (por ejemplo, «los actores humanitarios tienen en cuenta mi opinión», «los actores humanitarios seleccionaron a las personas correctas», «las personas tienen miedo de hablar»). Fuente: GTS HVI y Directrices de la OCDE sobre la Medición de la Confianza (2017), que anclan las escalas de acuerdo de cinco niveles como estándar para la medición de la confianza y la percepción. Se proporciona un vocabulario separado (en lugar de códigos reutilizados) porque la semántica de las etiquetas difiere."
standard:
  name: "Humanitarian Voice Index (Ground Truth Solutions)"
  uri: "https://humanitarianvoiceindex.org"
  notes: "Agreement 5-point scale matches GTS HVI convention and OECD 2017 guidance on trust measurement."
values:
  - code: strongly_agree
    label:
      en: "Strongly agree"
      fr: "Tout à fait d'accord"
      es: "Totalmente de acuerdo"
    definition:
      en: "The respondent endorses the statement with the highest confidence."
      fr: "Le répondant approuve l'affirmation avec la plus grande confiance."
      es: "El encuestado apoya la afirmación con la mayor confianza."
  - code: agree
    label:
      en: "Agree"
      fr: "D'accord"
      es: "De acuerdo"
    definition:
      en: "The respondent endorses the statement."
      fr: "Le répondant approuve l'affirmation."
      es: "El encuestado apoya la afirmación."
  - code: neither
    label:
      en: "Neither agree nor disagree"
      fr: "Ni d'accord ni en désaccord"
      es: "Ni de acuerdo ni en desacuerdo"
    definition:
      en: "The respondent is neutral."
      fr: "Le répondant est neutre."
      es: "El encuestado es neutral."
  - code: disagree
    label:
      en: "Disagree"
      fr: "Pas d'accord"
      es: "En desacuerdo"
    definition:
      en: "The respondent rejects the statement."
      fr: "Le répondant rejette l'affirmation."
      es: "El encuestado rechaza la afirmación."
  - code: strongly_disagree
    label:
      en: "Strongly disagree"
      fr: "Pas du tout d'accord"
      es: "Totalmente en desacuerdo"
    definition:
      en: "The respondent rejects the statement with the highest confidence."
      fr: "Le répondant rejette l'affirmation avec la plus grande confiance."
      es: "El encuestado rechaza la afirmación con la mayor confianza."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot assess."
      fr: "Le répondant ne peut pas évaluer."
      es: "El encuestado no puede evaluar."
  - code: prefer_not_to_answer
    label:
      en: "Prefer not to answer"
      fr: "Préfère ne pas répondre"
      es: "Prefiere no responder"
    definition:
      en: "Respondent declines to answer."
      fr: "Le répondant refuse de répondre."
      es: "El encuestado se niega a responder."
