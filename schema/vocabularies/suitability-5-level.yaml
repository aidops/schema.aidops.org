id: suitability-5-level
maturity: draft
label:
  en: Suitability (5-level with don't know)
  fr: "Adéquation (5 niveaux avec « ne sait pas »)"
  es: "Adecuación (5 niveles con 'no sabe')"
definition:
  en: "Four-point suitability scale plus 'don't know' used for perceived-adequacy questions where a bivalent yes/no collapses important middle ground. Used by `facility_open_hours_suitable` in HealthAccessProfile. 'mostly_yes' and 'mostly_no' allow respondents to signal partial adequacy (for example, the facility is open during the day but not at night)."
  fr: "Échelle d'adéquation à quatre niveaux plus « ne sait pas » utilisée pour les questions d'adéquation perçue où un oui/non binaire efface un juste milieu important. Utilisée par `facility_open_hours_suitable` dans HealthAccessProfile. « mostly_yes » et « mostly_no » permettent aux répondants de signaler une adéquation partielle (par exemple, l'établissement ouvre la journée mais pas la nuit)."
  es: "Escala de adecuación de cuatro niveles más 'no sabe' utilizada para preguntas de adecuación percibida donde un sí/no binario elimina un punto intermedio importante. Utilizada por `facility_open_hours_suitable` en HealthAccessProfile. 'mostly_yes' y 'mostly_no' permiten a los encuestados señalar una adecuación parcial (por ejemplo, el establecimiento abre durante el día pero no en la noche)."
values:
  - code: "yes"
    label:
      en: "Yes"
      fr: "Oui"
      es: "Sí"
    definition:
      en: "Fully suitable."
      fr: "Entièrement adéquat."
      es: "Totalmente adecuado."
  - code: mostly_yes
    label:
      en: "Mostly yes"
      fr: "Plutôt oui"
      es: "Mayormente sí"
    definition:
      en: "Suitable most of the time or for most needs, with minor gaps."
      fr: "Adéquat la plupart du temps ou pour la plupart des besoins, avec des lacunes mineures."
      es: "Adecuado la mayor parte del tiempo o para la mayoría de las necesidades, con lagunas menores."
  - code: mostly_no
    label:
      en: "Mostly no"
      fr: "Plutôt non"
      es: "Mayormente no"
    definition:
      en: "Not suitable most of the time or for most needs, with occasional adequacy."
      fr: "Inadéquat la plupart du temps ou pour la plupart des besoins, avec une adéquation occasionnelle."
      es: "Inadecuado la mayor parte del tiempo o para la mayoría de las necesidades, con adecuación ocasional."
  - code: "no"
    label:
      en: "No"
      fr: "Non"
      es: "No"
    definition:
      en: "Not suitable."
      fr: "Inadéquat."
      es: "No adecuado."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "The respondent cannot say. Valid response; must not be re-coded as missing or 'no'."
      fr: "Le répondant ne peut pas répondre. Réponse valide ; ne doit pas être recodée comme manquante ou « non »."
      es: "El encuestado no puede responder. Respuesta válida; no debe recodificarse como faltante o 'no'."
