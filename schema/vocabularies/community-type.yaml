id: community-type
maturity: draft
label:
  en: Community Type
  fr: "Type de communauté"
  es: "Tipo de comunidad"

definition:
  en: "Displacement-status composition of a community used for site-level coordination and targeting. Distinguishes host-only communities from displacement-site populations and from mixed host-plus-displaced settlements. Aligned with IOM DTM site-category conventions and UNHCR population-group typology."
  fr: "Composition d'une communauté en matière de statut de déplacement, utilisée pour la coordination et le ciblage au niveau du site. Distingue les communautés d'hôtes seules des populations de sites de déplacement et des établissements mixtes accueil-déplacés. Alignée sur les conventions de catégories de sites de la DTM de l'OIM et la typologie des groupes de population du HCR."
  es: "Composición de una comunidad en cuanto al estatus de desplazamiento, utilizada para la coordinación y focalización a nivel de sitio. Distingue las comunidades de acogida únicas de las poblaciones de sitios de desplazamiento y de los asentamientos mixtos de acogida y desplazados. Alineada con las convenciones de categorías de sitios de la DTM de la OIM y con la tipología de grupos poblacionales del ACNUR."

standard:
  name: "IOM Displacement Tracking Matrix (DTM) site-category typology"
  uri: "https://dtm.iom.int/"
  notes: "Aligns with DTM site assessment site-category codes and UNHCR Refugee Population Statistics Database population-group typology; deliberately kept short to support cross-system aggregation."

values:
- code: host
  label:
    en: Host community
    fr: "Communauté d'accueil"
    es: "Comunidad de acogida"
  definition:
    en: "Community composed predominantly of residents who have not been displaced from their normal place of residence."
    fr: "Communauté composée majoritairement de résidents qui n'ont pas été déplacés de leur lieu de résidence habituel."
    es: "Comunidad compuesta predominantemente por residentes que no han sido desplazados de su lugar habitual de residencia."
- code: displaced
  label:
    en: Displaced population (IDP or refugee)
    fr: "Population déplacée (PDI ou réfugiés)"
    es: "Población desplazada (desplazados internos o refugiados)"
  definition:
    en: "Community composed predominantly of internally displaced persons or refugees, typically residing in a displacement site, camp, or collective center."
    fr: "Communauté composée majoritairement de personnes déplacées internes ou de réfugiés, résidant généralement dans un site de déplacement, un camp ou un centre collectif."
    es: "Comunidad compuesta predominantemente por personas desplazadas internas o refugiados, que residen típicamente en un sitio de desplazamiento, campamento o centro colectivo."
- code: mixed
  label:
    en: Mixed host and displaced
    fr: "Mixte accueil et déplacés"
    es: "Mixta de acogida y desplazados"
  definition:
    en: "Community containing a significant share of both hosts and displaced persons (internally displaced persons, refugees, returnees) living in the same settlement or catchment."
    fr: "Communauté contenant une part importante à la fois d'hôtes et de personnes déplacées (personnes déplacées internes, réfugiés, retournés) vivant dans le même établissement ou bassin."
    es: "Comunidad que contiene una proporción significativa tanto de anfitriones como de personas desplazadas (desplazados internos, refugiados, retornados) que viven en el mismo asentamiento o área de cobertura."
- code: returnee
  label:
    en: Returnee community
    fr: "Communauté de retournés"
    es: "Comunidad de retornados"
  definition:
    en: "Community composed predominantly of returnees (former IDPs or refugees) who have returned to their place of origin or relocated to a new area of settlement."
    fr: "Communauté composée majoritairement de retournés (anciens PDI ou réfugiés) qui sont revenus à leur lieu d'origine ou se sont réinstallés dans une nouvelle zone d'établissement."
    es: "Comunidad compuesta predominantemente por retornados (antiguos desplazados internos o refugiados) que han regresado a su lugar de origen o se han reubicado en una nueva zona de asentamiento."
- code: pastoralist
  label:
    en: Pastoralist / nomadic community
    fr: "Communauté pastorale / nomade"
    es: "Comunidad pastoril / nómada"
  definition:
    en: "Community whose residence is characterized by seasonal or nomadic movement with livestock, without a single fixed settlement."
    fr: "Communauté dont la résidence est caractérisée par un déplacement saisonnier ou nomade avec du bétail, sans établissement fixe unique."
    es: "Comunidad cuya residencia se caracteriza por movimiento estacional o nómada con ganado, sin un asentamiento fijo único."
- code: other
  label:
    en: Other community type
    fr: "Autre type de communauté"
    es: "Otro tipo de comunidad"
  definition:
    en: "Community type not covered by the above categories; use the free-text context field to describe."
    fr: "Type de communauté non couvert par les catégories ci-dessus ; utiliser le champ contexte en texte libre pour décrire."
    es: "Tipo de comunidad no cubierto por las categorías anteriores; utilizar el campo de contexto en texto libre para describir."
