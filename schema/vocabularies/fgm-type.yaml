id: fgm-type
maturity: draft
label:
  en: "FGM/C Type"
  fr: "Type de MGF/E"
  es: "Tipo de MGF/A"
definition:
  en: "Classification of the type of female genital mutilation / cutting reported by a woman (FG6 / FG7 in MICS 6 Women's Questionnaire FG module). Maps approximately to the WHO FGM typology (Type I–IV). See UNFPA-UNICEF 2021 Compendium of Indicators for FGM Elimination."
  fr: "Classification du type de mutilation génitale féminine / excision rapportée par une femme (FG6 / FG7 dans le module FG du questionnaire femme MICS 6). Correspond approximativement à la typologie MGF de l'OMS (Type I–IV). Voir le Compendium d'indicateurs pour l'élimination des MGF UNFPA-UNICEF 2021."
  es: "Clasificación del tipo de mutilación genital femenina / ablación reportada por una mujer (FG6 / FG7 en el módulo FG del cuestionario de mujeres MICS 6). Corresponde aproximadamente a la tipología de MGF de la OMS (Tipo I–IV). Véase el Compendio de Indicadores para la Eliminación de MGF UNFPA-UNICEF 2021."
values:
  - code: nicked_no_flesh_removed
    label:
      en: "Nicked, no flesh removed"
      fr: "Entaillée, aucune chair retirée"
      es: "Cortada, sin tejido extraído"
    definition:
      en: "The genital area was nicked but no flesh was removed. Approximately WHO Type IV (symbolic/ritual nicking)."
      fr: "La zone génitale a été entaillée mais aucune chair n'a été retirée. Correspond approximativement au Type IV OMS (entaille symbolique/rituelle)."
      es: "El área genital fue cortada pero no se extrajo tejido. Corresponde aproximadamente al Tipo IV OMS (corte simbólico/ritual)."
  - code: flesh_partially_removed
    label:
      en: "Flesh removed from the genital area"
      fr: "Chair retirée de la zone génitale"
      es: "Tejido extraído del área genital"
    definition:
      en: "Flesh was removed. Approximately WHO Types I or II (partial/total removal of clitoris or labia minora)."
      fr: "De la chair a été retirée. Correspond approximativement aux Types I ou II OMS (ablation partielle/totale du clitoris ou des petites lèvres)."
      es: "Se extrajo tejido. Corresponde aproximadamente a los Tipos I o II OMS (extirpación parcial/total del clítoris o labios menores)."
  - code: genital_area_sewn_closed
    label:
      en: "Genital area sewn closed (infibulation)"
      fr: "Zone génitale cousue fermée (infibulation)"
      es: "Área genital cosida cerrada (infibulación)"
    definition:
      en: "The genital area was sewn closed. Approximately WHO Type III (infibulation)."
      fr: "La zone génitale a été cousue fermée. Correspond approximativement au Type III OMS (infibulation)."
      es: "El área genital fue cosida cerrada. Corresponde aproximadamente al Tipo III OMS (infibulación)."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "The respondent does not know what was done or does not remember."
      fr: "La répondante ne sait pas ce qui a été fait ou ne s'en souvient pas."
      es: "La encuestada no sabe lo que se hizo o no lo recuerda."
