id: iycf-food-group
maturity: draft
label:
  en: IYCF Food Group (MDD-C)
  fr: "Groupe alimentaire IYCF (MDD-C)"
  es: "Grupo alimentario IYCF (MDD-C)"
definition:
  en: "The eight food groups used by the WHO/UNICEF 2021 Minimum Dietary Diversity for Children (MDD-C) indicator. A child 6–23 months is considered to have achieved minimum dietary diversity if foods from at least five of the eight groups were consumed in the previous 24 hours. Breastmilk is group 1; the remaining seven groups cover solid and liquid foods."
  fr: "Les huit groupes alimentaires utilisés par l'indicateur de Diversité alimentaire minimale pour les enfants (MDD-C) de l'OMS/UNICEF 2021. Un enfant de 6 à 23 mois est considéré comme ayant atteint la diversité alimentaire minimale s'il a consommé des aliments d'au moins cinq des huit groupes au cours des 24 heures précédentes. Le lait maternel est le groupe 1 ; les sept autres groupes couvrent les aliments solides et liquides."
  es: "Los ocho grupos alimentarios utilizados por el indicador de Diversidad Dietética Mínima para Niños (MDD-C) de la OMS/UNICEF 2021. Se considera que un niño de 6 a 23 meses ha alcanzado la diversidad dietética mínima si consumió alimentos de al menos cinco de los ocho grupos en las 24 horas anteriores. La leche materna es el grupo 1; los siete grupos restantes cubren alimentos sólidos y líquidos."
standard:
  name: "Indicators for assessing infant and young child feeding practices: definitions and measurement methods"
  uri: "https://www.who.int/publications/i/item/9789240018389"
values:
- code: breastmilk
  label:
    en: Breast milk
    fr: Lait maternel
    es: Leche materna
  definition:
    en: "Breast milk received during the previous day (any breastfeeding yesterday). In practice this food group is derived from the breastfed-yesterday question rather than asked separately."
    fr: "Lait maternel reçu au cours de la journée précédente (tout allaitement maternel hier). En pratique, ce groupe alimentaire est dérivé de la question sur l'allaitement d'hier plutôt que posé séparément."
    es: "Leche materna recibida durante el día anterior (cualquier amamantamiento ayer). En la práctica, este grupo alimentario se deriva de la pregunta sobre amamantamiento de ayer en lugar de preguntarse por separado."
- code: grains
  label:
    en: Grains, roots, tubers, and plantains
    fr: "Céréales, racines, tubercules et bananes plantains"
    es: "Cereales, raíces, tubérculos y plátanos"
  definition:
    en: "Porridge, bread, rice, pasta, millet, white potato, cassava, yam, plantain, and similar starchy staples."
    fr: "Bouillie, pain, riz, pâtes, mil, pomme de terre blanche, manioc, igname, banane plantain et autres féculents similaires."
    es: "Gachas, pan, arroz, pasta, mijo, papa blanca, yuca, ñame, plátano y otros alimentos amiláceos similares."
- code: pulses_nuts_seeds
  label:
    en: Pulses, nuts, and seeds
    fr: "Légumineuses, noix et graines"
    es: "Legumbres, nueces y semillas"
  definition:
    en: "Beans, lentils, peas, groundnuts, peanut butter, sesame, and other seeds and nuts."
    fr: "Haricots, lentilles, pois, arachides, beurre d'arachide, sésame et autres graines et noix."
    es: "Frijoles, lentejas, guisantes, maní, mantequilla de maní, sésamo y otras semillas y nueces."
- code: dairy
  label:
    en: Dairy
    fr: Produits laitiers
    es: "Lácteos"
  definition:
    en: "Infant formula, animal milk (cow, goat, or other), yogurt, and cheese."
    fr: "Lait maternisé, lait animal (vache, chèvre ou autre), yaourt et fromage."
    es: "Fórmula infantil, leche animal (vaca, cabra u otra), yogur y queso."
- code: flesh
  label:
    en: Flesh foods
    fr: "Aliments carnés"
    es: "Alimentos cárnicos"
  definition:
    en: "Chicken, beef, pork, organ meat (liver, kidney), fish, shellfish, and other flesh foods."
    fr: "Poulet, bœuf, porc, abats (foie, rein), poisson, crustacés et autres aliments carnés."
    es: "Pollo, carne de res, cerdo, vísceras (hígado, riñón), pescado, mariscos y otros alimentos cárnicos."
- code: eggs
  label:
    en: Eggs
    fr: "Œufs"
    es: Huevos
  definition:
    en: "Eggs from any bird."
    fr: "Œufs de toute volaille."
    es: "Huevos de cualquier ave."
- code: vitamin_a_veg_fruit
  label:
    en: Vitamin-A-rich fruits and vegetables
    fr: "Fruits et légumes riches en vitamine A"
    es: "Frutas y verduras ricas en vitamina A"
  definition:
    en: "Ripe mango, ripe papaya, carrot, pumpkin, orange-fleshed sweet potato, red palm oil, and other vitamin-A-rich foods. Includes dark green leafy vegetables in this 8-group framework (unlike the MDD-W framework which separates them)."
    fr: "Mangue mûre, papaye mûre, carotte, citrouille, patate douce à chair orange, huile de palme rouge et autres aliments riches en vitamine A. Comprend les légumes-feuilles vert foncé dans ce cadre à 8 groupes (contrairement au cadre MDD-W qui les sépare)."
    es: "Mango maduro, papaya madura, zanahoria, calabaza, batata de pulpa anaranjada, aceite de palma rojo y otros alimentos ricos en vitamina A. Incluye las hortalizas de hoja verde oscuro en este marco de 8 grupos (a diferencia del marco MDD-W que las separa)."
- code: other_veg_fruit
  label:
    en: Other fruits and vegetables
    fr: "Autres fruits et légumes"
    es: "Otras frutas y verduras"
  definition:
    en: "Tomato, onion, eggplant, spinach (not vitamin-A-rich leafy vegetables), banana, apple, citrus, and other fruits and vegetables not captured in the vitamin-A-rich group."
    fr: "Tomate, oignon, aubergine, épinards (pas les légumes-feuilles riches en vitamine A), banane, pomme, agrumes et autres fruits et légumes non couverts par le groupe riche en vitamine A."
    es: "Tomate, cebolla, berenjena, espinacas (no hortalizas de hoja rica en vitamina A), banano, manzana, cítricos y otras frutas y verduras no cubiertas por el grupo rico en vitamina A."
