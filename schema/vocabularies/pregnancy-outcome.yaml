id: pregnancy-outcome
maturity: draft
label:
  en: Pregnancy Outcome
  fr: Issue de la grossesse
  es: Resultado del embarazo
definition:
  en: "The outcome of the most recent pregnancy within the recall period. Distinguishes live birth from stillbirth for denominator purposes in DHS-8 ANC and PNC indicators. Miscarriage and induced termination are excluded because this profile is indexed to the most recent birth (live or stillbirth); pregnancy losses without a birth event are out of scope and belong in a future MortalityProfile. DHS-8 m80: 1 = live birth, 3 = stillbirth."
  fr: "L'issue de la grossesse la plus récente dans la période de rappel. Distingue la naissance vivante de la mortinaissance aux fins du dénominateur dans les indicateurs ANC et PNC du DHS-8. La fausse couche et l'interruption volontaire de grossesse sont exclues car ce profil est indexé sur la naissance la plus récente (vivante ou mort-né) ; les pertes de grossesse sans événement de naissance sont hors du champ et relèvent d'un futur MortalityProfile. DHS-8 m80 : 1 = naissance vivante, 3 = mortinaissance."
  es: "El resultado del embarazo más reciente dentro del período de recordatorio. Distingue el nacimiento vivo del mortinato para propósitos del denominador en los indicadores APN y PPN del DHS-8. El aborto espontáneo y la interrupción del embarazo están excluidos porque este perfil está indexado al parto más reciente (vivo o mortinato); las pérdidas de embarazo sin evento de parto están fuera del alcance y pertenecen a un futuro MortalityProfile. DHS-8 m80: 1 = nacimiento vivo, 3 = mortinato."
values:
  - code: live_birth
    label:
      en: Live birth
      fr: Naissance vivante
      es: Nacimiento vivo
    definition:
      en: "The baby was born alive (showed any sign of life at birth: breathing, heartbeat, voluntary movement). DHS-8 m80 = 1."
      fr: "Le bébé est né vivant (a montré tout signe de vie à la naissance : respiration, battements cardiaques, mouvement volontaire). DHS-8 m80 = 1."
      es: "El bebé nació vivo (mostró algún signo de vida al nacer: respiración, latido cardíaco, movimiento voluntario). DHS-8 m80 = 1."
  - code: stillbirth
    label:
      en: Stillbirth
      fr: Mortinaissance
      es: Mortinato
    definition:
      en: "The baby was born dead (showed no sign of life at birth). DHS-8 m80 = 3. Stillbirths are included in the DHS-8 ANC and maternal PNC denominators. Newborn-specific PNC items are skipped for stillbirths."
      fr: "Le bébé est né mort (n'a montré aucun signe de vie à la naissance). DHS-8 m80 = 3. Les mortinaissances sont incluses dans les dénominateurs ANC et PNC maternel du DHS-8. Les items PNC spécifiques au nouveau-né sont ignorés pour les mortinaissances."
      es: "El bebé nació muerto (no mostró ningún signo de vida al nacer). DHS-8 m80 = 3. Los mortinatos se incluyen en los denominadores de APN y PPN materna del DHS-8. Los ítems de PPN específicos del recién nacido se omiten para los mortinatos."
