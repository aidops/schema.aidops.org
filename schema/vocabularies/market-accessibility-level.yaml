id: market-accessibility-level
maturity: draft
label:
  en: Market Accessibility Level
  fr: Niveau d'accessibilité du marché
  es: Nivel de accesibilidad del mercado
definition:
  en: >
    The degree to which the target population can physically reach the market
    at the time of the monitoring visit, as assessed by the enumerator from
    direct experience and key vendor informant input on catchment-area access.
    A six-level scale from fully accessible to not accessible, aligned with
    JMMI Lebanon market access variable, ICRC RAM 2014, and Sphere 2018 food
    security chapter (access to food in markets).
  fr: >
    Le degré auquel la population cible peut physiquement atteindre le marché
    au moment de la visite de suivi, tel qu'évalué par l'enquêteur à partir de
    son expérience directe et des informations des informateurs clés vendeurs
    sur l'accès à la zone de chalandise. Échelle à six niveaux allant de
    pleinement accessible à non accessible, alignée sur la variable d'accès
    au marché JMMI Liban, l'ICRC RAM 2014 et le chapitre de sécurité alimentaire
    du Manuel Sphere 2018.
  es: >
    El grado en que la población objetivo puede llegar físicamente al mercado
    en el momento de la visita de monitoreo, según la evaluación del enumerador
    a partir de su experiencia directa y la información de informantes clave
    vendedores sobre el acceso a la zona de captación. Escala de seis niveles
    desde completamente accesible hasta no accesible, alineada con la variable
    de acceso al mercado JMMI Líbano, ICRC RAM 2014 y el capítulo de seguridad
    alimentaria del Manual Sphere 2018.
values:
- code: fully_accessible
  label:
    en: Fully accessible
    fr: Pleinement accessible
    es: Completamente accesible
  definition:
    en: "Market is reachable by most of the target population by any normal means of transport without restriction, unusual cost, or safety risk."
    fr: "Le marché est accessible à la plupart de la population cible par tout moyen de transport normal sans restriction, coût inhabituel ou risque pour la sécurité."
    es: "El mercado es accesible para la mayor parte de la población objetivo por cualquier medio de transporte normal sin restricción, costo inusual o riesgo de seguridad."
- code: accessible_with_difficulty
  label:
    en: Accessible with difficulty
    fr: Accessible avec difficulté
    es: Accesible con dificultad
  definition:
    en: "Market is reachable but road conditions, checkpoints, flooding, transport cost increases, or security concerns significantly increase travel time or cost compared to pre-crisis. Access is possible but constrained."
    fr: "Le marché est accessible mais les conditions routières, les points de contrôle, les inondations, les augmentations des coûts de transport ou les préoccupations sécuritaires augmentent significativement le temps de trajet ou le coût par rapport à la période d'avant-crise. L'accès est possible mais contraint."
    es: "El mercado es accesible pero las condiciones viales, los puntos de control, las inundaciones, los aumentos en los costos de transporte o las preocupaciones de seguridad aumentan significativamente el tiempo de viaje o el costo en comparación con antes de la crisis. El acceso es posible pero restringido."
- code: seasonal_access_only
  label:
    en: Seasonal access only
    fr: Accès saisonnier uniquement
    es: Acceso solo estacional
  definition:
    en: "Market is accessible only during a specific season (typically dry season when unpaved roads are passable). The market is currently in a seasonally restricted period."
    fr: "Le marché n'est accessible qu'à une saison spécifique (généralement la saison sèche quand les routes non goudronnées sont praticables). Le marché se trouve actuellement dans une période de restriction saisonnière."
    es: "El mercado es accesible solo durante una estación específica (generalmente la estación seca cuando los caminos sin pavimentar son transitables). El mercado se encuentra actualmente en un período de restricción estacional."
- code: restricted_access
  label:
    en: Restricted access
    fr: Accès restreint
    es: Acceso restringido
  definition:
    en: "Access is administratively restricted, controlled by a non-state armed actor, or limited to specific population groups (e.g., residents only, specific documentation required). Part of the normal catchment population is excluded."
    fr: "L'accès est administrativement restreint, contrôlé par un acteur armé non étatique, ou limité à des groupes de population spécifiques (par ex. résidents uniquement, documentation spécifique requise). Une partie de la population de la zone de chalandise habituelle est exclue."
    es: "El acceso está administrativamente restringido, controlado por un actor armado no estatal, o limitado a grupos específicos de población (p. ej., solo residentes, documentación específica requerida). Parte de la población de captación normal está excluida."
- code: not_accessible
  label:
    en: Not accessible
    fr: Non accessible
    es: No accesible
  definition:
    en: "Market is not reachable for the assessed population at the time of this visit due to conflict, flooding, collapsed infrastructure, or administrative closure."
    fr: "Le marché n'est pas accessible pour la population évaluée au moment de cette visite en raison d'un conflit, d'inondations, d'une infrastructure effondrée ou d'une fermeture administrative."
    es: "El mercado no es accesible para la población evaluada en el momento de esta visita debido a conflicto, inundaciones, infraestructura colapsada o cierre administrativo."
- code: dont_know
  label:
    en: Don't know
    fr: Ne sait pas
    es: No sabe
  definition:
    en: "Accessibility status cannot be assessed from available information."
    fr: "Le statut d'accessibilité ne peut pas être évalué à partir des informations disponibles."
    es: "El estado de accesibilidad no puede evaluarse a partir de la información disponible."
