id: sanitation-emptying-timing
maturity: draft
label:
  en: Sanitation Pit Emptying Timing
  fr: "Calendrier de vidange de la fosse d'assainissement"
  es: "Momento de vaciado del pozo de saneamiento"
definition:
  en: "Time elapsed since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied or desludged. This is a proxy indicator for the safely managed sanitation rung: regular emptying and safe treatment of fecal sludge is required for the safely managed criterion. Based on MICS6 pilot question WS8A."
  fr: "Temps écoulé depuis le dernier vidange ou désodorisation du dispositif d'assainissement sur site (latrine à fosse, fosse septique ou toilettes à compostage). Il s'agit d'un indicateur proxy pour le niveau d'assainissement à gestion sécurisée : un vidange régulier et un traitement sûr des boues fécales sont nécessaires pour le critère de gestion sécurisée. Basé sur la question pilote MICS6 WS8A."
  es: "Tiempo transcurrido desde que se vació o desodorizó por última vez el contenedor de saneamiento en el sitio (letrina de fosa, fosa séptica o inodoro de compostaje). Es un indicador proxy para el peldaño de saneamiento con gestión segura: se requiere vaciado regular y tratamiento seguro de los lodos fecales para el criterio de gestión segura. Basado en la pregunta piloto MICS6 WS8A."
standard:
  name: "JMP Core Questions for Household Surveys (2018 Update)"
  uri: "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"
  notes: "MICS6 pilot question WS8A. Used for safely managed sanitation determination in the JMP expanded monitoring framework."
values:
- code: never
  label:
    en: Never emptied
    fr: "Jamais vidangée"
    es: "Nunca vaciada"
  definition:
    en: "The pit, tank, or container has never been emptied since installation or since the household has been using it."
    fr: "La fosse, le réservoir ou le récipient n'a jamais été vidangé depuis son installation ou depuis que le ménage l'utilise."
    es: "La fosa, el depósito o el recipiente nunca ha sido vaciado desde su instalación o desde que el hogar lo usa."
- code: less_than_1_year_ago
  label:
    en: Less than 1 year ago
    fr: "Il y a moins d'un an"
    es: "Hace menos de 1 año"
  definition:
    en: "The facility was last emptied within the past 12 months."
    fr: "L'installation a été vidangée pour la dernière fois au cours des 12 derniers mois."
    es: "La instalación fue vaciada por última vez en los últimos 12 meses."
- code: one_to_five_years_ago
  label:
    en: 1 to 5 years ago
    fr: "Il y a 1 à 5 ans"
    es: "Hace 1 a 5 años"
  definition:
    en: "The facility was last emptied between 1 and 5 years ago."
    fr: "L'installation a été vidangée pour la dernière fois entre 1 et 5 ans."
    es: "La instalación fue vaciada por última vez entre 1 y 5 años atrás."
- code: more_than_5_years_ago
  label:
    en: More than 5 years ago
    fr: "Il y a plus de 5 ans"
    es: "Hace más de 5 años"
  definition:
    en: "The facility was last emptied more than 5 years ago."
    fr: "L'installation a été vidangée pour la dernière fois il y a plus de 5 ans."
    es: "La instalación fue vaciada por última vez hace más de 5 años."
- code: dont_know
  label:
    en: Don't know
    fr: "Ne sait pas"
    es: "No sabe"
  definition:
    en: "The respondent does not know when the facility was last emptied."
    fr: "Le répondant ne sait pas quand l'installation a été vidangée pour la dernière fois."
    es: "El encuestado no sabe cuándo fue vaciada la instalación por última vez."
