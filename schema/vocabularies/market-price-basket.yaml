id: market-price-basket
maturity: draft
label:
  en: Market Price Basket
  fr: Panier de prix du marché
  es: Cesta de precios del mercado
definition:
  en: >
    The fixed list of candidate commodity codes for which price and availability
    are collected on market monitoring visits. The basket composition is a survey
    design decision made at deployment time; typically 10–12 codes are selected
    for a given operational context. Core food basket of 10 items is recommended
    for food-security monitoring contexts. Additional context-specific codes are
    included for regional deployments. Sources: WFP VAM standard food basket,
    JMMI country commodity lists (Lebanon, Syria, Libya, Nigeria, Somalia, South
    Sudan), Sphere Handbook 2018 minimum food basket quantities, and FAO GIEWS
    FPMA commodity coverage.
  fr: >
    La liste fixe de codes de produits candidats pour lesquels les prix et la
    disponibilité sont collectés lors des visites de suivi des marchés. La
    composition du panier est une décision de conception d'enquête prise au
    moment du déploiement ; généralement 10 à 12 codes sont sélectionnés pour
    un contexte opérationnel donné. Un panier alimentaire de base de 10 articles
    est recommandé pour les contextes de suivi de la sécurité alimentaire.
    Sources : panier alimentaire standard WFP VAM, listes de produits JMMI
    par pays, quantités minimales du panier alimentaire Sphere 2018 et
    couverture des produits FAO GIEWS FPMA.
  es: >
    La lista fija de códigos de productos candidatos para los cuales se recopilan
    precios y disponibilidad en las visitas de monitoreo de mercados. La
    composición de la cesta es una decisión de diseño de encuesta tomada en el
    momento del despliegue; normalmente se seleccionan 10 a 12 códigos para un
    contexto operacional dado. Se recomienda una cesta alimentaria básica de 10
    artículos para contextos de monitoreo de seguridad alimentaria. Fuentes:
    cesta alimentaria estándar WFP VAM, listas de productos JMMI por país,
    cantidades mínimas de la cesta alimentaria Sphere 2018 y cobertura de
    productos FAO GIEWS FPMA.
