id: mnh-breastfeeding-initiation-timing
maturity: draft
label:
  en: Breastfeeding Initiation Timing (MNH)
  fr: "Délai d'initiation à l'allaitement (SMN)"
  es: "Momento de inicio de la lactancia materna (SMN)"
definition:
  en: "The time elapsed between birth and the first breastfeed, as reported by the mother in the MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. The Early Initiation of Breastfeeding (EIBF) threshold is within 1 hour of birth. This vocabulary uses DHS m4 groupings, which differ slightly from the WHO/UNICEF 2021 IYCF groupings used in iycf-breastfeeding-initiation: DHS distinguishes 1–3 days from more than 3 days, while the IYCF vocabulary collapses these to after_24_hours."
  fr: "Le délai entre la naissance et la première tétée, tel que rapporté par la mère dans le MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. Le seuil d'allaitement précoce (EIBF) est dans l'heure suivant la naissance. Ce vocabulaire utilise les regroupements DHS m4, qui diffèrent légèrement des regroupements OMS/UNICEF 2021 IYCF utilisés dans iycf-breastfeeding-initiation : le DHS distingue 1–3 jours de plus de 3 jours, tandis que le vocabulaire IYCF regroupe ces deux catégories en after_24_hours."
  es: "El tiempo transcurrido entre el parto y la primera lactancia, según lo reportado por la madre en el MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. El umbral de inicio temprano de la lactancia materna (EIBF) es dentro de la primera hora del parto. Este vocabulario utiliza las agrupaciones DHS m4, que difieren ligeramente de las agrupaciones OMS/UNICEF 2021 IYCF utilizadas en iycf-breastfeeding-initiation: DHS distingue 1–3 días de más de 3 días, mientras que el vocabulario IYCF colapsa estas en after_24_hours."
standard:
  name: "DHS-8 Woman's Questionnaire m4 (breastfeeding initiation timing)"
  uri: "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"
  notes: "m4 = 1 (within 1 hour), 2 (1–23 hours), 3 (1–3 days), 4 (more than 3 days), 5 (never breastfed). EIBF = m4 = 1."
values:
  - code: within_1_hour
    label:
      en: Within 1 hour of birth
      fr: Dans l'heure suivant la naissance
      es: Dentro de la primera hora del parto
    definition:
      en: "The baby was first put to the breast within one hour of birth. Meets the EIBF threshold. DHS m4 = 1."
      fr: "Le bébé a été mis au sein pour la première fois dans l'heure suivant la naissance. Atteint le seuil EIBF. DHS m4 = 1."
      es: "El bebé fue puesto al pecho por primera vez dentro de la primera hora del parto. Cumple el umbral EIBF. DHS m4 = 1."
  - code: h1_to_23
    label:
      en: 1 to 23 hours after birth
      fr: 1 à 23 heures après la naissance
      es: De 1 a 23 horas después del parto
    definition:
      en: "The baby was first put to the breast between 1 and 23 hours after birth. Does not meet EIBF threshold. DHS m4 = 2."
      fr: "Le bébé a été mis au sein pour la première fois entre 1 et 23 heures après la naissance. Ne satisfait pas au seuil EIBF. DHS m4 = 2."
      es: "El bebé fue puesto al pecho por primera vez entre 1 y 23 horas después del parto. No cumple el umbral EIBF. DHS m4 = 2."
  - code: d1_to_3
    label:
      en: 1 to 3 days after birth
      fr: 1 à 3 jours après la naissance
      es: De 1 a 3 días después del parto
    definition:
      en: "The baby was first put to the breast 1 to 3 days after birth. DHS m4 = 3."
      fr: "Le bébé a été mis au sein pour la première fois 1 à 3 jours après la naissance. DHS m4 = 3."
      es: "El bebé fue puesto al pecho por primera vez de 1 a 3 días después del parto. DHS m4 = 3."
  - code: more_than_3_days
    label:
      en: More than 3 days after birth
      fr: Plus de 3 jours après la naissance
      es: Más de 3 días después del parto
    definition:
      en: "The baby was first put to the breast more than 3 days after birth. DHS m4 = 4."
      fr: "Le bébé a été mis au sein pour la première fois plus de 3 jours après la naissance. DHS m4 = 4."
      es: "El bebé fue puesto al pecho por primera vez más de 3 días después del parto. DHS m4 = 4."
  - code: never_breastfed
    label:
      en: Never breastfed
      fr: Jamais allaité
      es: Nunca amamantado
    definition:
      en: "The baby was never put to the breast. DHS m4 = 5. Only applicable when breastfeeding_ever_initiated = no."
      fr: "Le bébé n'a jamais été mis au sein. DHS m4 = 5. Applicable uniquement lorsque breastfeeding_ever_initiated = non."
      es: "El bebé nunca fue puesto al pecho. DHS m4 = 5. Solo aplicable cuando breastfeeding_ever_initiated = no."
