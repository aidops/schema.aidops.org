id: malnutrition-severity
maturity: draft
label:
  en: Malnutrition Severity
  fr: Sévérité de la malnutrition
  es: Gravedad de la desnutrición
definition:
  en: "The severity of malnutrition based on z-score classifications from the WHO Child Growth Standards, used for stunting (height-for-age), underweight (weight-for-age), and wasting (weight-for-height) assessments."
  fr: "La sévérité de la malnutrition selon les classifications par score z des normes de croissance de l'enfant de l'OMS, utilisée pour le retard de croissance (taille-pour-âge), l'insuffisance pondérale (poids-pour-âge) et l'émaciation (poids-pour-taille)."
  es: "La gravedad de la desnutrición según las clasificaciones por puntaje z de los estándares de crecimiento infantil de la OMS, utilizada para el retraso del crecimiento (talla-para-la-edad), la insuficiencia ponderal (peso-para-la-edad) y la emaciación (peso-para-la-talla)."
standard:
  name: "WHO Child Growth Standards (2006)"
  uri: https://www.who.int/tools/child-growth-standards
  notes: "Based on the WHO Multicentre Growth Reference Study. Z-score thresholds: moderate = between -3 and -2 SD, severe = below -3 SD."
values:
- code: normal
  label:
    en: Normal
    fr: Normal
    es: Normal
  definition:
    en: "Z-score >= -2 standard deviations from the WHO reference median."
    fr: "Score z supérieur ou égal à -2 écarts-types par rapport à la médiane de référence de l'OMS."
    es: "Puntaje z mayor o igual a -2 desviaciones estándar respecto a la mediana de referencia de la OMS."
- code: moderate
  label:
    en: Moderate
    fr: Modéré
    es: Moderado
  definition:
    en: "Z-score between -3 and -2 standard deviations from the WHO reference median."
    fr: "Score z compris entre -3 et -2 écarts-types par rapport à la médiane de référence de l'OMS."
    es: "Puntaje z entre -3 y -2 desviaciones estándar respecto a la mediana de referencia de la OMS."
- code: severe
  label:
    en: Severe
    fr: Sévère
    es: Grave
  definition:
    en: "Z-score < -3 standard deviations from the WHO reference median."
    fr: "Score z inférieur à -3 écarts-types par rapport à la médiane de référence de l'OMS."
    es: "Puntaje z inferior a -3 desviaciones estándar respecto a la mediana de referencia de la OMS."
