id: yes-no-na
maturity: draft
label:
  en: "Yes / No / Not applicable"
  fr: "Oui / Non / Sans objet"
  es: "Sí / No / No aplica"
definition:
  en: "Three-level response scale for questions that may not be relevant for all respondents due to their situation. 'Not applicable' captures skip logic contexts where asking yes/no would be meaningless or inappropriate."
  fr: "Échelle de réponse à trois niveaux pour les questions qui peuvent ne pas être pertinentes pour tous les répondants en raison de leur situation. 'Sans objet' capture les contextes de saut logique où poser oui/non serait dénué de sens ou inapproprié."
  es: "Escala de respuesta de tres niveles para preguntas que pueden no ser relevantes para todos los encuestados debido a su situación. 'No aplica' captura contextos de lógica de salto donde preguntar sí/no sería sin sentido o inapropiado."
values:
  - code: "yes"
    label:
      en: "Yes"
      fr: "Oui"
      es: "Sí"
    definition:
      en: "The respondent confirms the condition or item applies and is present."
      fr: "Le répondant confirme que la condition ou l'article s'applique et est présent."
      es: "El encuestado confirma que la condición o artículo aplica y está presente."
  - code: "no"
    label:
      en: "No"
      fr: "Non"
      es: "No"
    definition:
      en: "The respondent confirms the condition or item does not apply or is absent."
      fr: "Le répondant confirme que la condition ou l'article ne s'applique pas ou est absent."
      es: "El encuestado confirma que la condición o artículo no aplica o está ausente."
  - code: not_applicable
    label:
      en: "Not applicable"
      fr: "Sans objet"
      es: "No aplica"
    definition:
      en: "The question is not applicable to the respondent's situation (e.g., the event has never occurred, or a prerequisite condition is not met)."
      fr: "La question ne s'applique pas à la situation du répondant (p. ex., l'événement ne s'est jamais produit ou une condition préalable n'est pas remplie)."
      es: "La pregunta no aplica a la situación del encuestado (p. ej., el evento nunca ha ocurrido o no se cumple una condición previa)."
