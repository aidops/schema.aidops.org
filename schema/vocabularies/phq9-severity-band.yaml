id: phq9-severity-band
maturity: draft
label:
  en: PHQ-9 Severity Band
  fr: "Niveau de sévérité PHQ-9"
  es: "Nivel de severidad PHQ-9"
definition:
  en: "The depression severity classification derived from the PHQ-9 total score using the Kroenke et al. (2001) cut-points. Five bands: none/minimal (0-4), mild (5-9), moderate (10-14), moderately severe (15-19), severe (20-27). A total score of 10 or higher is the widely used clinical screening cut-off for probable major depressive disorder."
  fr: "La classification de la sévérité de la dépression dérivée du score total PHQ-9 en utilisant les seuils de Kroenke et al. (2001). Cinq niveaux : aucun/minimal (0-4), léger (5-9), modéré (10-14), modérément sévère (15-19), sévère (20-27). Un score total de 10 ou plus est le seuil de dépistage clinique largement utilisé pour un épisode dépressif majeur probable."
  es: "La clasificación de severidad de la depresión derivada del puntaje total del PHQ-9 usando los puntos de corte de Kroenke et al. (2001). Cinco niveles: ninguno/mínimo (0-4), leve (5-9), moderado (10-14), moderadamente severo (15-19), severo (20-27). Un puntaje total de 10 o más es el punto de corte de tamizaje clínico ampliamente utilizado para un episodio depresivo mayor probable."
standard:
  name: "Kroenke, Spitzer, and Williams (2001), 'The PHQ-9: Validity of a Brief Depression Severity Measure'"
  uri: "https://doi.org/10.1046/j.1525-1497.2001.016009606.x"
  notes: "Standard severity bands published with the original PHQ-9 validation. Sensitivity and specificity of the >=10 cut-off for major depression are both around 88% in primary-care samples."
values:
- code: none_minimal
  label:
    en: None / minimal
    fr: "Aucune / minimale"
    es: "Ninguna / mínima"
  definition:
    en: "PHQ-9 total score 0-4. None or minimal depressive symptoms."
    fr: "Score total PHQ-9 de 0 à 4. Aucun ou des symptômes dépressifs minimaux."
    es: "Puntaje total PHQ-9 de 0 a 4. Ningún síntoma depresivo o síntomas mínimos."
- code: mild
  label:
    en: Mild
    fr: "Légère"
    es: "Leve"
  definition:
    en: "PHQ-9 total score 5-9. Mild depressive symptoms."
    fr: "Score total PHQ-9 de 5 à 9. Symptômes dépressifs légers."
    es: "Puntaje total PHQ-9 de 5 a 9. Síntomas depresivos leves."
- code: moderate
  label:
    en: Moderate
    fr: "Modérée"
    es: "Moderada"
  definition:
    en: "PHQ-9 total score 10-14. Moderate depressive symptoms. Standard clinical cut-off (>=10) for probable major depressive disorder."
    fr: "Score total PHQ-9 de 10 à 14. Symptômes dépressifs modérés. Seuil clinique standard (>=10) pour un épisode dépressif majeur probable."
    es: "Puntaje total PHQ-9 de 10 a 14. Síntomas depresivos moderados. Punto de corte clínico estándar (>=10) para un episodio depresivo mayor probable."
- code: moderately_severe
  label:
    en: Moderately severe
    fr: "Modérément sévère"
    es: "Moderadamente severa"
  definition:
    en: "PHQ-9 total score 15-19. Moderately severe depressive symptoms."
    fr: "Score total PHQ-9 de 15 à 19. Symptômes dépressifs modérément sévères."
    es: "Puntaje total PHQ-9 de 15 a 19. Síntomas depresivos moderadamente severos."
- code: severe
  label:
    en: Severe
    fr: "Sévère"
    es: "Severa"
  definition:
    en: "PHQ-9 total score 20-27. Severe depressive symptoms."
    fr: "Score total PHQ-9 de 20 à 27. Symptômes dépressifs sévères."
    es: "Puntaje total PHQ-9 de 20 a 27. Síntomas depresivos severos."
