id: displacement-reason
maturity: draft
label:
  en: Displacement Reason
  fr: "Raison de déplacement"
  es: "Razón de desplazamiento"
definition:
  en: "The primary cause or motivating factor behind a household's forced departure from its place of habitual residence. Records the displaced person's reported reason rather than a hazard classification; for hazard taxonomy see hazard-type. Multiple reasons may apply; collect via multi-select."
  fr: "La cause principale ou le facteur déterminant du départ forcé d'un ménage de son lieu de résidence habituel. Consigne la raison déclarée par la personne déplacée plutôt qu'une classification des aléas ; pour la taxonomie des aléas, voir hazard-type. Plusieurs raisons peuvent s'appliquer ; collecter en sélection multiple."
  es: "La causa principal o el factor motivador detrás de la salida forzada de un hogar de su lugar de residencia habitual. Registra la razón declarada por la persona desplazada en lugar de una clasificación de peligros; para la taxonomía de peligros véase hazard-type. Pueden aplicarse múltiples razones; recopilar mediante selección múltiple."
standard:
  name: "IOM Displacement Tracking Matrix Mobility Tracking methodology; Guiding Principles on Internal Displacement; IDMC GRID categories"
  uri: "https://dtm.iom.int/about/methodological-framework"
  notes: "Partially overlaps hazard-type vocabulary; displacement-reason captures the displacement motivation as perceived by the affected household, while hazard-type classifies the triggering event objectively. The two are complementary. Persecution and GBV grounds align with the 1951 Refugee Convention Article 1A(2)."
values:
- code: armed_conflict
  label:
    en: Armed conflict
    fr: "Conflit armé"
    es: "Conflicto armado"
  definition:
    en: "Displacement caused by armed conflict between state and non-state actors, or between non-state actors, including civil war and interstate conflict."
    fr: "Déplacement causé par un conflit armé entre acteurs étatiques et non étatiques, ou entre acteurs non étatiques, y compris la guerre civile et le conflit interétatique."
    es: "Desplazamiento causado por conflicto armado entre actores estatales y no estatales, o entre actores no estatales, incluyendo guerra civil y conflicto interestatal."
- code: generalized_violence
  label:
    en: Generalized violence
    fr: "Violence généralisée"
    es: "Violencia generalizada"
  definition:
    en: "Displacement caused by widespread, indiscriminate violence not amounting to armed conflict, such as gang violence or communal clashes."
    fr: "Déplacement causé par une violence généralisée et indiscriminée ne constituant pas un conflit armé, comme la violence de gangs ou les affrontements communautaires."
    es: "Desplazamiento causado por violencia generalizada e indiscriminada que no constituye conflicto armado, como violencia de pandillas o enfrentamientos comunitarios."
- code: human_rights_violations
  label:
    en: Human rights violations
    fr: "Violations des droits de l'homme"
    es: "Violaciones de derechos humanos"
  definition:
    en: "Displacement caused by systematic violations of civil, political, economic, social, or cultural rights by state or non-state actors."
    fr: "Déplacement causé par des violations systématiques des droits civils, politiques, économiques, sociaux ou culturels par des acteurs étatiques ou non étatiques."
    es: "Desplazamiento causado por violaciones sistemáticas de derechos civiles, políticos, económicos, sociales o culturales por actores estatales o no estatales."
- code: persecution
  label:
    en: Persecution
    fr: "Persécution"
    es: "Persecución"
  definition:
    en: "Displacement caused by targeted persecution based on race, religion, nationality, political opinion, or membership of a particular social group, aligning with the 1951 Refugee Convention grounds. Note: properties referencing this code carry sensitivity: sensitive."
    fr: "Déplacement causé par la persécution ciblée fondée sur la race, la religion, la nationalité, l'opinion politique ou l'appartenance à un groupe social particulier, conformément aux motifs de la Convention de 1951 relative au statut des réfugiés."
    es: "Desplazamiento causado por persecución dirigida basada en raza, religión, nacionalidad, opinión política o pertenencia a un grupo social particular, alineado con los motivos de la Convención de Refugiados de 1951."
- code: natural_disaster
  label:
    en: Natural disaster
    fr: "Catastrophe naturelle"
    es: "Desastre natural"
  definition:
    en: "Displacement triggered by a sudden-onset or slow-onset natural hazard, including flood, earthquake, cyclone, drought, or landslide."
    fr: "Déplacement déclenché par un aléa naturel à déclenchement soudain ou lent, notamment inondation, tremblement de terre, cyclone, sécheresse ou glissement de terrain."
    es: "Desplazamiento desencadenado por un peligro natural de inicio repentino o lento, incluyendo inundación, terremoto, ciclón, sequía o deslizamiento de tierra."
- code: climate_environment
  label:
    en: Climate and environmental change
    fr: "Changements climatiques et environnementaux"
    es: "Cambio climático y ambiental"
  definition:
    en: "Displacement driven by progressive environmental degradation or climate change impacts such as sea-level rise, desertification, or land degradation, distinct from a discrete natural disaster event."
    fr: "Déplacement entraîné par la dégradation progressive de l'environnement ou les impacts du changement climatique tels que la montée du niveau de la mer, la désertification ou la dégradation des terres, distinct d'un événement de catastrophe naturelle ponctuel."
    es: "Desplazamiento impulsado por la degradación ambiental progresiva o los impactos del cambio climático como el aumento del nivel del mar, la desertificación o la degradación de la tierra, distinto de un evento de desastre natural discreto."
- code: economic_livelihood
  label:
    en: Economic or livelihood crisis
    fr: "Crise économique ou des moyens de subsistance"
    es: "Crisis económica o de medios de vida"
  definition:
    en: "Displacement caused primarily by economic collapse, loss of livelihood, or extreme poverty with no accompanying protection-related cause."
    fr: "Déplacement causé principalement par l'effondrement économique, la perte de moyens de subsistance ou l'extrême pauvreté sans cause liée à la protection."
    es: "Desplazamiento causado principalmente por colapso económico, pérdida de medios de vida o pobreza extrema sin causa relacionada con la protección."
- code: development_project
  label:
    en: Development project
    fr: "Projet de développement"
    es: "Proyecto de desarrollo"
  definition:
    en: "Displacement caused by a government or private infrastructure or development project such as a dam, road, or urban development initiative."
    fr: "Déplacement causé par un projet d'infrastructure ou de développement gouvernemental ou privé, tel qu'un barrage, une route ou une initiative de développement urbain."
    es: "Desplazamiento causado por un proyecto de infraestructura o desarrollo gubernamental o privado, como una presa, carretera o iniciativa de desarrollo urbano."
- code: gbv
  label:
    en: Gender-based violence
    fr: "Violence basée sur le genre"
    es: "Violencia basada en género"
  definition:
    en: "Displacement caused by or in flight from gender-based violence, including domestic violence, sexual violence, forced marriage, or female genital mutilation and cutting. Note: properties referencing this code carry sensitivity: sensitive."
    fr: "Déplacement causé par ou en fuite d'une violence basée sur le genre, incluant la violence domestique, la violence sexuelle, le mariage forcé ou les mutilations génitales féminines."
    es: "Desplazamiento causado por o en huida de violencia basada en género, incluyendo violencia doméstica, violencia sexual, matrimonio forzado o mutilación genital femenina."
- code: other
  label:
    en: Other
    fr: "Autre"
    es: "Otro"
  definition:
    en: "Cause of displacement not covered by other categories in this vocabulary."
    fr: "Cause de déplacement non couverte par les autres catégories de ce vocabulaire."
    es: "Causa de desplazamiento no cubierta por otras categorías de este vocabulario."
