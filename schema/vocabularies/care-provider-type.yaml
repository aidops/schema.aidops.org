id: care-provider-type
maturity: draft
label:
  en: Care Provider Type
  fr: "Type de prestataire de soins"
  es: "Tipo de proveedor de atención"
definition:
  en: "The type of care provider or facility from which a caregiver sought advice or treatment for a child's illness episode. Used for diarrhea, ARI, and fever care-seeking questions in ChildHealthProfile, and shared by MaternalNewbornHealthProfile and ReproductiveHealthProfile. Multi-select: a single illness episode may involve more than one provider type."
  fr: "Le type de prestataire de soins ou d'établissement auprès duquel un soignant a cherché des conseils ou un traitement pour un épisode de maladie de l'enfant. Utilisé pour les questions de recours aux soins pour la diarrhée, l'IRA et la fièvre dans le ChildHealthProfile, et partagé par le MaternalNewbornHealthProfile et le ReproductiveHealthProfile. Sélection multiple : un seul épisode de maladie peut impliquer plusieurs types de prestataires."
  es: "El tipo de proveedor de atención o establecimiento al que un cuidador acudió en busca de consejo o tratamiento para un episodio de enfermedad del niño. Usado en las preguntas de búsqueda de atención para diarrea, IRA y fiebre en ChildHealthProfile, y compartido por MaternalNewbornHealthProfile y ReproductiveHealthProfile. Selección múltiple: un solo episodio de enfermedad puede involucrar más de un tipo de proveedor."
values:
- code: public_hospital
  label:
    en: Public hospital
    fr: "Hôpital public"
    es: "Hospital público"
  definition:
    en: "A government-operated hospital providing inpatient and outpatient services."
    fr: "Un hôpital géré par l'État fournissant des services hospitaliers et ambulatoires."
    es: "Un hospital operado por el gobierno que proporciona servicios hospitalarios y ambulatorios."
- code: public_clinic
  label:
    en: Public health clinic or health centre
    fr: "Clinique de santé publique ou centre de santé"
    es: "Clínica de salud pública o centro de salud"
  definition:
    en: "A government-operated outpatient clinic or health centre below hospital level."
    fr: "Une clinique ambulatoire ou un centre de santé géré par l'État, de niveau inférieur à l'hôpital."
    es: "Una clínica ambulatoria o centro de salud operado por el gobierno, de nivel inferior al hospital."
- code: health_post
  label:
    en: Health post or dispensary
    fr: "Poste de santé ou dispensaire"
    es: "Puesto de salud o dispensario"
  definition:
    en: "A small public facility at community level, often staffed by a nurse or community health worker, providing basic preventive and curative services."
    fr: "Un petit établissement public au niveau communautaire, souvent doté d'un infirmier ou d'un agent de santé communautaire, fournissant des services de base préventifs et curatifs."
    es: "Una instalación pública pequeña a nivel comunitario, a menudo dotada de un enfermero o agente de salud comunitaria, que proporciona servicios básicos preventivos y curativos."
- code: private_hospital
  label:
    en: Private hospital
    fr: "Hôpital privé"
    es: "Hospital privado"
  definition:
    en: "A privately operated hospital providing inpatient and outpatient services, including faith-based or NGO-operated hospitals."
    fr: "Un hôpital privé fournissant des services hospitaliers et ambulatoires, y compris les hôpitaux confessionnels ou gérés par des ONG."
    es: "Un hospital privado que proporciona servicios hospitalarios y ambulatorios, incluidos hospitales confesionales o gestionados por ONG."
- code: private_clinic
  label:
    en: Private clinic or private doctor
    fr: "Clinique privée ou médecin privé"
    es: "Clínica privada o médico privado"
  definition:
    en: "A privately operated outpatient clinic or solo practitioner, including NGO medical clinics."
    fr: "Une clinique ambulatoire privée ou un praticien indépendant, y compris les cliniques médicales d'ONG."
    es: "Una clínica ambulatoria privada o un médico particular, incluidas las clínicas médicas de ONG."
- code: pharmacy
  label:
    en: Pharmacy or drug store
    fr: "Pharmacie ou droguerie"
    es: "Farmacia o droguería"
  definition:
    en: "A licensed pharmacy or drug retailer where medicines are purchased without a clinical consultation."
    fr: "Une pharmacie agréée ou un revendeur de médicaments où des médicaments sont achetés sans consultation clinique."
    es: "Una farmacia autorizada o minorista de medicamentos donde se adquieren medicamentos sin consulta clínica."
- code: community_health_worker
  label:
    en: Community health worker
    fr: "Agent de santé communautaire"
    es: "Agente de salud comunitaria"
  definition:
    en: "A lay health worker deployed in the community to provide basic health education, referrals, and selected treatments (e.g., oral rehydration, malaria RDT)."
    fr: "Un agent de santé bénévole déployé dans la communauté pour fournir une éducation sanitaire de base, des orientations et des traitements sélectionnés (par exemple, réhydratation orale, TDR paludisme)."
    es: "Un trabajador de salud comunitario desplegado en la comunidad para proporcionar educación sanitaria básica, referencias y tratamientos seleccionados (p. ej., rehidratación oral, TDR de malaria)."
- code: traditional_healer
  label:
    en: Traditional healer or traditional practitioner
    fr: "Guérisseur traditionnel ou praticien traditionnel"
    es: "Curandero tradicional o practicante tradicional"
  definition:
    en: "A practitioner of traditional or indigenous medicine, including herbalists, faith healers, and traditional birth attendants not formally trained in biomedical care."
    fr: "Un praticien de la médecine traditionnelle ou autochtone, notamment les herboristes, les guérisseurs religieux et les accoucheuses traditionnelles non formellement formées aux soins biomédicaux."
    es: "Un practicante de medicina tradicional o indígena, incluidos herbolarios, curanderos religiosos y parteras tradicionales sin formación formal en atención biomédica."
- code: home
  label:
    en: Home treatment only
    fr: "Traitement à domicile uniquement"
    es: "Tratamiento domiciliario únicamente"
  definition:
    en: "The caregiver treated the child at home without seeking care from any external provider."
    fr: "Le soignant a traité l'enfant à domicile sans recourir à un prestataire externe."
    es: "El cuidador trató al niño en casa sin buscar atención de ningún proveedor externo."
- code: other
  label:
    en: Other provider
    fr: "Autre prestataire"
    es: "Otro proveedor"
  definition:
    en: "Any provider type not captured by the codes above, including itinerant drug sellers, shops, or providers specific to a country context."
    fr: "Tout type de prestataire non couvert par les codes ci-dessus, notamment les vendeurs itinérants de médicaments, les boutiques ou les prestataires propres à un contexte national."
    es: "Cualquier tipo de proveedor no cubierto por los códigos anteriores, incluidos vendedores ambulantes de medicamentos, tiendas o proveedores específicos de un contexto nacional."
- code: no_care_sought
  label:
    en: No care sought
    fr: "Aucun soin recherché"
    es: "No se buscó atención"
  definition:
    en: "The caregiver did not seek care from any provider for this illness episode."
    fr: "Le soignant n'a recherché de soins auprès d'aucun prestataire pour cet épisode de maladie."
    es: "El cuidador no buscó atención de ningún proveedor para este episodio de enfermedad."
