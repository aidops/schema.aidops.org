id: cutoff-rule
maturity: draft
label:
  en: Cutoff Rule
  fr: "Règle de seuil"
  es: Regla de corte
definition:
  en: "A population-specific rule for classifying acute malnutrition from MUAC or other anthropometric measurements. MUAC cutoffs differ by age, sex, and physiological state; applying a rule outside its target population produces misclassification."
  fr: "Une règle spécifique à la population pour classer la malnutrition aiguë à partir du périmètre brachial ou d'autres mesures anthropométriques. Les seuils de périmètre brachial varient selon l'âge, le sexe et l'état physiologique ; appliquer une règle hors de sa population cible produit une mauvaise classification."
  es: "Una regla específica de la población para clasificar la desnutrición aguda a partir del perímetro braquial u otras mediciones antropométricas. Los cortes de perímetro braquial difieren por edad, sexo y estado fisiológico; aplicar una regla fuera de su población objetivo produce clasificación errónea."
standard:
  name: "WHO/UNICEF joint statement (2009) and Sphere Handbook (2018)"
  uri: https://www.who.int/publications/i/item/9789241598163
  notes: "Cutoffs for children 6-59 months are the WHO/UNICEF standard: SAM < 115 mm, MAM 115-124 mm, adequate >= 125 mm. School-age, adolescent, pregnant, lactating, and adult populations use different rules drawn from Sphere, national protocols, and humanitarian practice."
values:
- code: who_unicef_6_59m
  label:
    en: "WHO/UNICEF MUAC, children 6-59 months"
    fr: "Périmètre brachial OMS/UNICEF, enfants de 6 à 59 mois"
    es: "Perímetro braquial OMS/UNICEF, niños de 6 a 59 meses"
  definition:
    en: "MUAC < 115 mm = SAM, 115-124 mm = MAM, >= 125 mm = adequate. The canonical rule for under-five acute malnutrition."
    fr: "Périmètre brachial < 115 mm = MAS, 115-124 mm = MAM, >= 125 mm = adéquat. La règle canonique pour la malnutrition aiguë chez les moins de cinq ans."
    es: "Perímetro braquial < 115 mm = DAG, 115-124 mm = DAM, >= 125 mm = adecuado. La regla canónica para la desnutrición aguda en menores de cinco años."
- code: who_2007_school_age
  label:
    en: "WHO 2007 BMI-for-age, school-age and adolescents"
    fr: "IMC-pour-âge OMS 2007, âge scolaire et adolescents"
    es: "IMC-para-edad OMS 2007, edad escolar y adolescentes"
  definition:
    en: "Z-score classification from BMI-for-age rather than fixed MUAC cutoffs. Use for children and adolescents 5-19 years."
    fr: "Classification par z-score à partir de l'IMC-pour-âge plutôt que par des seuils de périmètre brachial fixes. À utiliser pour les enfants et adolescents de 5 à 19 ans."
    es: "Clasificación por puntaje z a partir de IMC-para-edad en lugar de cortes fijos de perímetro braquial. Utilice para niños y adolescentes de 5 a 19 años."
- code: sphere_pregnant
  label:
    en: "Sphere MUAC, pregnant and lactating women"
    fr: "Périmètre brachial Sphere, femmes enceintes et allaitantes"
    es: "Perímetro braquial Sphere, mujeres embarazadas y lactantes"
  definition:
    en: "MUAC thresholds for pregnant and lactating women vary by context; common cutoffs are < 210 mm or < 230 mm depending on national protocol."
    fr: "Les seuils de périmètre brachial pour les femmes enceintes et allaitantes varient selon le contexte ; les seuils courants sont < 210 mm ou < 230 mm selon le protocole national."
    es: "Los umbrales de perímetro braquial para mujeres embarazadas y lactantes varían según el contexto; los cortes comunes son < 210 mm o < 230 mm según el protocolo nacional."
- code: humanitarian_adult
  label:
    en: "Humanitarian adult MUAC"
    fr: "Périmètre brachial adulte humanitaire"
    es: "Perímetro braquial adulto humanitario"
  definition:
    en: "No universal cutoff exists for adults. Humanitarian contexts commonly use 185-220 mm ranges, selected per operation."
    fr: "Il n'existe pas de seuil universel pour les adultes. Les contextes humanitaires utilisent couramment des plages de 185 à 220 mm, choisies selon l'opération."
    es: "No existe un corte universal para adultos. Los contextos humanitarios utilizan comúnmente rangos de 185 a 220 mm, seleccionados según la operación."
- code: national_protocol
  label:
    en: "National protocol"
    fr: "Protocole national"
    es: "Protocolo nacional"
  definition:
    en: "A government or ministry-of-health protocol that defines its own thresholds. Use when the rule is a national standard not covered by the values above."
    fr: "Un protocole gouvernemental ou d'un ministère de la santé qui définit ses propres seuils. À utiliser lorsque la règle est une norme nationale non couverte par les valeurs ci-dessus."
    es: "Un protocolo gubernamental o del ministerio de salud que define sus propios umbrales. Utilice cuando la regla es un estándar nacional no cubierto por los valores anteriores."
