id: fp-nonuse-reason
maturity: draft
label:
  en: Reason for Non-Use of Contraception
  fr: "Raison de la non-utilisation de la contraception"
  es: "Razón de la no utilización de anticoncepción"
definition:
  en: "The main reason a woman in need of family planning gives for not using any contraceptive method. Based on DHS standard non-use questions. Enumerators record the spontaneous first response and probe for additional reasons; they do not prompt with option lists."
  fr: "La principale raison invoquée par une femme ayant besoin de planification familiale pour ne pas utiliser de méthode contraceptive. Basé sur les questions standard DHS sur la non-utilisation. Les enquêteurs enregistrent la première réponse spontanée et cherchent des raisons supplémentaires ; ils ne suggèrent pas de listes d'options."
  es: "La razón principal que da una mujer con necesidad de planificación familiar para no usar ningún método anticonceptivo. Basado en las preguntas estándar DHS sobre no uso. Los encuestadores registran la primera respuesta espontánea y buscan razones adicionales; no sugieren listas de opciones."
values:
  - code: not_having_sex
    label:
      en: Not having sex
      fr: "N'a pas de rapports sexuels"
      es: "No tiene relaciones sexuales"
    definition:
      en: "The respondent is not currently having sexual intercourse and therefore does not feel she needs a method."
      fr: "La répondante n'a actuellement pas de rapports sexuels et ne pense donc pas avoir besoin d'une méthode."
      es: "La encuestada no tiene relaciones sexuales actualmente y por lo tanto no siente que necesita un método."
  - code: not_married
    label:
      en: Not married
      fr: "Non mariée"
      es: "No casada"
    definition:
      en: "The respondent is not married and cites marital status as the reason for non-use."
      fr: "La répondante n'est pas mariée et cite son statut matrimonial comme raison de non-utilisation."
      es: "La encuestada no está casada y cita el estado civil como razón de no uso."
  - code: partner_away
    label:
      en: Partner is away
      fr: "Partenaire absent"
      es: "Pareja ausente"
    definition:
      en: "The respondent's partner is away (e.g., migrant labor) and she therefore does not see a current need for contraception."
      fr: "Le partenaire de la répondante est absent (p. ex. travail migrant) et elle n'estime donc pas avoir besoin de contraception pour le moment."
      es: "La pareja de la encuestada está ausente (p. ej., trabajo migrante) y por lo tanto no ve necesidad actual de anticoncepción."
  - code: infrequent_sex
    label:
      en: Infrequent sex
      fr: "Rapports sexuels peu fréquents"
      es: "Relaciones sexuales poco frecuentes"
    definition:
      en: "The respondent has infrequent sexual intercourse and does not consider herself at risk of pregnancy."
      fr: "La répondante a des rapports sexuels peu fréquents et ne se considère pas à risque de grossesse."
      es: "La encuestada tiene relaciones sexuales poco frecuentes y no se considera en riesgo de embarazo."
  - code: menopausal_or_hysterectomy
    label:
      en: Menopausal / hysterectomy
      fr: "Ménopausée / hystérectomie"
      es: "Menopáusica / histerectomía"
    definition:
      en: "The respondent is menopausal or has had a hysterectomy and therefore does not need contraception."
      fr: "La répondante est ménopausée ou a subi une hystérectomie et n'a donc pas besoin de contraception."
      es: "La encuestada está menopáusica o ha tenido una histerectomía y por lo tanto no necesita anticoncepción."
  - code: breastfeeding_or_ppa
    label:
      en: Breastfeeding / postpartum amenorrhea
      fr: "Allaitement / aménorrhée post-partum"
      es: "Lactancia / amenorrea posparto"
    definition:
      en: "The respondent is currently breastfeeding or has postpartum amenorrhea and believes she is protected from pregnancy."
      fr: "La répondante allaite actuellement ou présente une aménorrhée post-partum et pense être protégée contre la grossesse."
      es: "La encuestada está lactando actualmente o tiene amenorrea posparto y cree estar protegida del embarazo."
  - code: subfecund
    label:
      en: Subfecund / infecund (self-reported)
      fr: "Sous-féconde / inféconde (auto-déclarée)"
      es: "Subfecunda / infecunda (autodeclarada)"
    definition:
      en: "The respondent believes she has difficulty conceiving or is infecund based on past experience."
      fr: "La répondante estime avoir des difficultés à concevoir ou être inféconde sur la base de son expérience passée."
      es: "La encuestada cree que tiene dificultades para concebir o es infecunda basándose en su experiencia pasada."
  - code: fatalistic
    label:
      en: Fatalistic attitude
      fr: "Attitude fataliste"
      es: "Actitud fatalista"
    definition:
      en: "The respondent expresses fatalistic or religiously motivated acceptance of pregnancy (e.g., 'what God gives us')."
      fr: "La répondante exprime une acceptation fataliste ou religieusement motivée de la grossesse (p. ex. « ce que Dieu nous donne »)."
      es: "La encuestada expresa una aceptación fatalista o religiosamente motivada del embarazo (p. ej., 'lo que Dios nos dé')."
  - code: side_effects_concern
    label:
      en: Concerns about side effects
      fr: "Préoccupations concernant les effets secondaires"
      es: "Preocupaciones sobre efectos secundarios"
    definition:
      en: "The respondent does not use a method because she has experienced or fears side effects."
      fr: "La répondante n'utilise pas de méthode car elle a subi ou craint des effets secondaires."
      es: "La encuestada no usa un método porque ha experimentado o teme efectos secundarios."
  - code: health_risk_concern
    label:
      en: Concerns about health risks
      fr: "Préoccupations concernant les risques pour la santé"
      es: "Preocupaciones sobre riesgos para la salud"
    definition:
      en: "The respondent perceives a health risk from contraceptive use beyond specific side effects (e.g., cancer risk, infertility concerns)."
      fr: "La répondante perçoit un risque pour la santé lié à l'utilisation de contraceptifs au-delà des effets secondaires spécifiques (p. ex. risque de cancer, préoccupations concernant l'infertilité)."
      es: "La encuestada percibe un riesgo para la salud por el uso de anticonceptivos más allá de los efectos secundarios específicos (p. ej., riesgo de cáncer, preocupaciones sobre infertilidad)."
  - code: method_unavailable
    label:
      en: Method not available
      fr: "Méthode non disponible"
      es: "Método no disponible"
    definition:
      en: "The respondent wants to use a method but it is not available in her area or at an accessible facility."
      fr: "La répondante souhaite utiliser une méthode mais elle n'est pas disponible dans sa zone ou dans un établissement accessible."
      es: "La encuestada desea usar un método pero no está disponible en su área o en una instalación accesible."
  - code: cost
    label:
      en: Too expensive
      fr: "Trop cher"
      es: "Demasiado costoso"
    definition:
      en: "The respondent does not use a method because she cannot afford the cost."
      fr: "La répondante n'utilise pas de méthode car elle ne peut pas se permettre le coût."
      es: "La encuestada no usa un método porque no puede pagar el costo."
  - code: inconvenient
    label:
      en: Inconvenient to use
      fr: "Difficile à utiliser"
      es: "Inconveniente para usar"
    definition:
      en: "The respondent finds using a contraceptive method inconvenient or difficult (e.g., access distance, need to take daily pills)."
      fr: "La répondante trouve l'utilisation d'une méthode contraceptive difficile ou peu pratique (p. ex. distance d'accès, nécessité de prendre des pilules quotidiennes)."
      es: "La encuestada encuentra inconveniente o difícil usar un método anticonceptivo (p. ej., distancia de acceso, necesidad de tomar píldoras diariamente)."
  - code: partner_opposition
    label:
      en: Partner opposes use
      fr: "Opposition du partenaire"
      es: "El compañero se opone al uso"
    definition:
      en: "The respondent's partner or husband opposes the use of contraception."
      fr: "Le partenaire ou le mari de la répondante s'oppose à l'utilisation de la contraception."
      es: "La pareja o esposo de la encuestada se opone al uso de anticoncepción."
  - code: religious_prohibition
    label:
      en: Religious prohibition
      fr: "Interdiction religieuse"
      es: "Prohibición religiosa"
    definition:
      en: "The respondent does not use contraception due to her own religious beliefs."
      fr: "La répondante n'utilise pas de contraception en raison de ses propres croyances religieuses."
      es: "La encuestada no usa anticoncepción debido a sus propias creencias religiosas."
  - code: family_opposition
    label:
      en: Family opposes use
      fr: "Opposition de la famille"
      es: "La familia se opone al uso"
    definition:
      en: "The respondent does not use contraception due to opposition from other family members (not the partner)."
      fr: "La répondante n'utilise pas de contraception en raison de l'opposition d'autres membres de la famille (pas le partenaire)."
      es: "La encuestada no usa anticoncepción debido a la oposición de otros miembros de la familia (no la pareja)."
  - code: doesnt_know_method
    label:
      en: Does not know any method
      fr: "Ne connaît aucune méthode"
      es: "No conoce ningún método"
    definition:
      en: "The respondent is unaware of any contraceptive method. Signals unmet information need."
      fr: "La répondante n'est pas au courant de l'existence de méthodes contraceptives. Signale un besoin d'information non satisfait."
      es: "La encuestada desconoce cualquier método anticonceptivo. Indica una necesidad de información insatisfecha."
  - code: other
    label:
      en: Other reason
      fr: "Autre raison"
      es: "Otra razón"
    definition:
      en: "Any reason not captured by the codes above."
      fr: "Toute raison non couverte par les codes ci-dessus."
      es: "Cualquier razón no cubierta por los códigos anteriores."
