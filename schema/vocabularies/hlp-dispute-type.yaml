id: hlp-dispute-type
maturity: draft
label:
  en: "HLP dispute type"
  fr: "Type de litige LTP"
  es: "Tipo de disputa VTP"
definition:
  en: "Types of housing, land, and property (HLP) disputes faced by households. Based on NRC HLP Handbook (2013) typology; GSC HLP Checklist (2018); Pinheiro Principles (2005) typology of HLP rights violations. Sensitivity note on confiscation_by_armed_actor: this code is restricted-adjacent. Enumerators must not probe for actor identity if this code is selected."
  fr: "Types de litiges de logement, terres et propriété (LTP) auxquels sont confrontés les ménages. Fondé sur la typologie du Manuel HLP du NRC (2013) ; Liste de contrôle HLP du GSC (2018) ; Principes Pinheiro (2005) sur les types de violations des droits LTP. Note de sensibilité sur confiscation_by_armed_actor : ce code est de niveau sensibilité restreinte. Les enquêteurs ne doivent pas chercher à identifier l'acteur si ce code est sélectionné."
  es: "Tipos de disputas de vivienda, tierra y propiedad (VTP) que enfrentan los hogares. Basado en la tipología del Manual HLP del NRC (2013); Lista de Verificación HLP del GSC (2018); Principios Pinheiro (2005) tipos de violaciones de derechos VTP. Nota de sensibilidad sobre confiscation_by_armed_actor: este código es de nivel sensibilidad restringida. Los encuestadores no deben indagar sobre la identidad del actor si se selecciona este código."
values:
  - code: secondary_occupation
    label:
      en: "Secondary occupation of property"
      fr: "Occupation secondaire du bien"
      es: "Ocupación secundaria de la propiedad"
    definition:
      en: "Another person or group is living in or using the household's property without consent."
      fr: "Une autre personne ou un groupe vit dans la propriété du ménage ou l'utilise sans consentement."
      es: "Otra persona o grupo vive en o utiliza la propiedad del hogar sin consentimiento."
  - code: contested_title
    label:
      en: "Contested title or ownership"
      fr: "Titre ou propriété contesté(e)"
      es: "Título o propiedad en disputa"
    definition:
      en: "The household's ownership or right to the property is being contested by another party."
      fr: "La propriété du ménage ou son droit sur la propriété est contesté par une autre partie."
      es: "La propiedad del hogar o su derecho sobre la propiedad es contestado por otra parte."
  - code: boundary_dispute
    label:
      en: "Boundary dispute"
      fr: "Litige sur les limites de la propriété"
      es: "Disputa de límites"
    definition:
      en: "A dispute over the precise boundaries of a plot of land or property."
      fr: "Un litige sur les limites précises d'une parcelle de terrain ou d'un bien."
      es: "Una disputa sobre los límites precisos de una parcela de terreno o propiedad."
  - code: forced_sale
    label:
      en: "Forced or coerced sale"
      fr: "Vente forcée ou sous contrainte"
      es: "Venta forzada o bajo coacción"
    definition:
      en: "The household was forced or pressured to sell property below market value or without willing consent."
      fr: "Le ménage a été forcé ou contraint de vendre un bien en dessous de sa valeur marchande ou sans consentement volontaire."
      es: "El hogar fue obligado o presionado a vender propiedad por debajo del valor de mercado o sin consentimiento voluntario."
  - code: illegal_demolition
    label:
      en: "Illegal demolition or destruction"
      fr: "Démolition ou destruction illégale"
      es: "Demolición o destrucción ilegal"
    definition:
      en: "The household's property was demolished or destroyed without legal authorization or due process."
      fr: "Le bien du ménage a été démoli ou détruit sans autorisation légale ni procédure régulière."
      es: "La propiedad del hogar fue demolida o destruida sin autorización legal o debido proceso."
  - code: discriminatory_denial
    label:
      en: "Discriminatory denial of housing or land"
      fr: "Refus discriminatoire de logement ou de terres"
      es: "Denegación discriminatoria de vivienda o tierra"
    definition:
      en: "Access to housing or land was denied on discriminatory grounds (ethnicity, religion, origin). Based on Pinheiro Principles Principle 3 (non-discrimination)."
      fr: "L'accès au logement ou aux terres a été refusé pour des motifs discriminatoires (origine ethnique, religion, origine). Fondé sur le Principe 3 des Principes Pinheiro (non-discrimination)."
      es: "El acceso a vivienda o tierra fue negado por motivos discriminatorios (etnia, religión, origen). Basado en el Principio 3 de los Principios Pinheiro (no discriminación)."
  - code: confiscation_by_armed_actor
    label:
      en: "Confiscation by armed actor or authority"
      fr: "Confiscation par un acteur armé ou une autorité"
      es: "Confiscación por actor armado o autoridad"
    definition:
      en: "Property was seized or confiscated by an armed group, military force, or government authority. Restricted-adjacent: do not probe for actor identity or further details if this code is selected."
      fr: "Le bien a été saisi ou confisqué par un groupe armé, une force militaire ou une autorité gouvernementale. Niveau sensibilité restreinte : ne pas chercher à identifier l'acteur ni à obtenir plus de détails si ce code est sélectionné."
      es: "La propiedad fue incautada o confiscada por un grupo armado, fuerza militar o autoridad gubernamental. Nivel sensibilidad restringida: no indagar sobre la identidad del actor ni más detalles si se selecciona este código."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Dispute type not covered by the above categories."
      fr: "Type de litige non couvert par les catégories ci-dessus."
      es: "Tipo de disputa no cubierto por las categorías anteriores."
