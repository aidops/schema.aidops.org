id: gbv-perpetrator-type
maturity: draft
label:
  en: "GBV perpetrator type"
  fr: "Type d'auteur de VBG"
  es: "Tipo de perpetrador de VBG"
definition:
  en: "Category of perpetrator for violence during pregnancy (DHS DV21), non-partner sexual violence (DHS DV23), and other perpetrator-identity questions. Multiple codes may be selected where the instrument allows. Drawn from DHS DV21 and DV23 response options."
  fr: "Catégorie d'auteur pour les violences pendant la grossesse (DHS DV21), les violences sexuelles non conjugales (DHS DV23) et autres questions d'identité de l'auteur. Plusieurs codes peuvent être sélectionnés si l'instrument le permet."
  es: "Categoría de perpetrador para violencia durante el embarazo (DHS DV21), violencia sexual no conyugal (DHS DV23) y otras preguntas de identidad del perpetrador. Se pueden seleccionar varios códigos cuando el instrumento lo permite."

standard:
  name: dhs-domestic-violence-module-2022
  uri: "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"
  notes: "DV21 and DV23 (perpetrator identity)"

values:
  - code: current_partner
    label:
      en: "Current husband or partner"
      fr: "Mari ou partenaire actuel"
      es: "Marido o compañero actual"
    definition:
      en: "The respondent's current husband or intimate partner."
      fr: "Le mari ou partenaire intime actuel de la répondante."
      es: "El marido o compañero íntimo actual de la encuestada."
  - code: former_partner
    label:
      en: "Former husband or partner"
      fr: "Ex-mari ou ex-partenaire"
      es: "Ex marido o ex compañero"
    definition:
      en: "A previous husband or intimate partner."
      fr: "Un ex-mari ou partenaire intime précédent."
      es: "Un ex marido o compañero íntimo anterior."
  - code: current_former_boyfriend
    label:
      en: "Current or former boyfriend"
      fr: "Petit ami actuel ou ancien"
      es: "Novio actual o anterior"
    definition:
      en: "A current or former non-cohabiting intimate partner."
      fr: "Un partenaire intime actuel ou ancien sans cohabitation."
      es: "Un compañero íntimo actual o anterior sin cohabitar."
  - code: father_stepfather
    label:
      en: "Father or step-father"
      fr: "Père ou beau-père"
      es: "Padre o padrastro"
    definition:
      en: "The respondent's biological father or stepfather."
      fr: "Le père biologique ou beau-père de la répondante."
      es: "El padre biológico o padrastro de la encuestada."
  - code: brother_stepbrother
    label:
      en: "Brother or step-brother"
      fr: "Frère ou demi-frère"
      es: "Hermano o hermanastro"
    definition:
      en: "The respondent's biological brother or stepbrother."
      fr: "Le frère biologique ou demi-frère de la répondante."
      es: "El hermano biológico o hermanastro de la encuestada."
  - code: other_relative
    label:
      en: "Other relative"
      fr: "Autre parent"
      es: "Otro familiar"
    definition:
      en: "A family relative other than those specified above."
      fr: "Un parent de la famille autre que ceux spécifiés ci-dessus."
      es: "Un familiar distinto a los especificados anteriormente."
  - code: in_law
    label:
      en: "In-law"
      fr: "Beau-parent ou belle-famille"
      es: "Familiar político"
    definition:
      en: "A member of the respondent's in-law family (husband's or partner's family)."
      fr: "Un membre de la belle-famille de la répondante (famille du mari ou partenaire)."
      es: "Un miembro de la familia política de la encuestada (familia del marido o compañero)."
  - code: friend_acquaintance
    label:
      en: "Own friend or acquaintance"
      fr: "Ami(e) ou connaissance"
      es: "Amiga, amigo o conocido"
    definition:
      en: "A friend or acquaintance of the respondent."
      fr: "Un(e) ami(e) ou connaissance de la répondante."
      es: "Una amistad o conocido de la encuestada."
  - code: family_friend
    label:
      en: "Family friend"
      fr: "Ami de la famille"
      es: "Amigo de la familia"
    definition:
      en: "A friend of the family."
      fr: "Un ami de la famille."
      es: "Un amigo de la familia."
  - code: teacher
    label:
      en: "Teacher"
      fr: "Enseignant(e)"
      es: "Docente"
    definition:
      en: "A teacher or school authority."
      fr: "Un enseignant ou une autorité scolaire."
      es: "Un docente o autoridad escolar."
  - code: employer_work
    label:
      en: "Employer or someone at work"
      fr: "Employeur ou collègue de travail"
      es: "Empleador o alguien en el trabajo"
    definition:
      en: "An employer or person encountered in a work context."
      fr: "Un employeur ou une personne rencontrée dans un contexte de travail."
      es: "Un empleador o persona encontrada en un contexto laboral."
  - code: police_soldier
    label:
      en: "Police or soldier"
      fr: "Policier ou soldat"
      es: "Policía o soldado"
    definition:
      en: "A member of the police force or military."
      fr: "Un membre des forces de police ou des forces armées."
      es: "Un miembro de la policía o las fuerzas armadas."
  - code: religious_leader
    label:
      en: "Priest, pastor, or religious leader"
      fr: "Prêtre, pasteur ou leader religieux"
      es: "Sacerdote, pastor o líder religioso"
    definition:
      en: "A religious leader, pastor, priest, or imam."
      fr: "Un leader religieux, pasteur, prêtre ou imam."
      es: "Un líder religioso, pastor, sacerdote o imán."
  - code: stranger
    label:
      en: "Stranger"
      fr: "Inconnu"
      es: "Desconocido"
    definition:
      en: "A person unknown to the respondent."
      fr: "Une personne inconnue de la répondante."
      es: "Una persona desconocida para la encuestada."
  - code: multiple
    label:
      en: "Multiple perpetrators"
      fr: "Plusieurs auteurs"
      es: "Múltiples perpetradores"
    definition:
      en: "More than one perpetrator was involved."
      fr: "Plus d'un auteur était impliqué."
      es: "Más de un perpetrador estuvo involucrado."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Any other perpetrator category not listed above."
      fr: "Toute autre catégorie d'auteur non répertoriée ci-dessus."
      es: "Cualquier otra categoría de perpetrador no incluida en la lista anterior."
