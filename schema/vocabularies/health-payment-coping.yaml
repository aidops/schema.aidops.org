id: health-payment-coping
maturity: draft
label:
  en: Health Payment Coping Strategy
  fr: "Stratégie de financement des dépenses de santé"
  es: "Estrategia de financiamiento de gastos de salud"
definition:
  en: "Coping mechanisms used by a household to pay for health care in the last 12 months. Multi-select: households may combine several strategies. Derived from the WHO World Health Report 2010 financial protection framework and the DHS optional health expenditure module. Borrowing and asset sales are treated in the literature as key signals of financial hardship attributable to health spending."
  fr: "Mécanismes d'adaptation utilisés par un ménage pour payer les soins de santé au cours des 12 derniers mois. Sélection multiple : les ménages peuvent combiner plusieurs stratégies. Dérivé du cadre de protection financière du Rapport sur la santé dans le monde 2010 de l'OMS et du module optionnel de dépenses de santé du DHS. L'emprunt et la vente d'actifs sont traités dans la littérature comme des signaux clés de détresse financière attribuable aux dépenses de santé."
  es: "Mecanismos de afrontamiento utilizados por un hogar para pagar atención de salud en los últimos 12 meses. Selección múltiple: los hogares pueden combinar varias estrategias. Derivado del marco de protección financiera del Informe sobre la salud en el mundo 2010 de la OMS y del módulo opcional de gasto en salud del DHS. El endeudamiento y la venta de activos se tratan en la literatura como señales clave de dificultad financiera atribuible al gasto en salud."
values:
  - code: used_savings
    label:
      en: Used household savings
      fr: "Utilisation de l'épargne du ménage"
      es: "Uso de los ahorros del hogar"
    definition:
      en: "Drew down household savings or emergency funds to pay for health care."
      fr: "A puisé dans l'épargne du ménage ou les fonds d'urgence pour payer les soins."
      es: "Utilizó los ahorros del hogar o los fondos de emergencia para pagar la atención de salud."
  - code: borrowed_money
    label:
      en: Borrowed money
      fr: "Emprunt d'argent"
      es: "Préstamo de dinero"
    definition:
      en: "Borrowed money from a moneylender, bank, family member, or neighbor to cover health costs."
      fr: "A emprunté de l'argent auprès d'un prêteur, d'une banque, d'un membre de la famille ou d'un voisin pour couvrir les frais de santé."
      es: "Pidió prestado dinero a un prestamista, banco, familiar o vecino para cubrir los gastos de salud."
  - code: sold_assets
    label:
      en: Sold assets
      fr: "Vente d'actifs"
      es: "Venta de activos"
    definition:
      en: "Sold household assets (land, livestock, tools, jewelry, household goods) to cover health costs."
      fr: "A vendu des actifs du ménage (terres, bétail, outils, bijoux, biens ménagers) pour couvrir les frais de santé."
      es: "Vendió activos del hogar (tierras, ganado, herramientas, joyas, bienes del hogar) para cubrir los gastos de salud."
  - code: reduced_food
    label:
      en: Reduced food expenditure
      fr: "Réduction des dépenses alimentaires"
      es: "Reducción del gasto en alimentos"
    definition:
      en: "Cut back on food spending to redirect money toward health care."
      fr: "A réduit les dépenses alimentaires pour réorienter l'argent vers les soins de santé."
      es: "Redujo el gasto en alimentos para redirigir dinero hacia la atención de salud."
  - code: reduced_education
    label:
      en: Reduced education expenditure
      fr: "Réduction des dépenses d'éducation"
      es: "Reducción del gasto en educación"
    definition:
      en: "Withdrew a child from school or reduced education spending to redirect money toward health care."
      fr: "A retiré un enfant de l'école ou réduit les dépenses d'éducation pour réorienter l'argent vers les soins de santé."
      es: "Retiró a un niño de la escuela o redujo el gasto en educación para redirigir dinero hacia la atención de salud."
  - code: received_charity_or_transfer
    label:
      en: Received charity or transfer
      fr: "A reçu une aide caritative ou un transfert"
      es: "Recibió caridad o transferencia"
    definition:
      en: "Received a charitable contribution, community support, or cash transfer from an NGO or another household to cover health costs."
      fr: "A reçu une contribution caritative, un soutien communautaire ou un transfert monétaire d'une ONG ou d'un autre ménage pour couvrir les frais de santé."
      es: "Recibió una contribución caritativa, apoyo comunitario o una transferencia monetaria de una ONG u otro hogar para cubrir los gastos de salud."
  - code: skipped_care_due_to_cost
    label:
      en: Skipped or delayed care due to cost
      fr: "Renonciation ou report de soins pour cause de coût"
      es: "Se omitió o retrasó la atención por motivos de costo"
    definition:
      en: "Did not seek care that was needed because the household could not afford it. Aligned with the WHO People's Voice Survey 'foregone care' indicator."
      fr: "N'a pas recherché les soins nécessaires parce que le ménage ne pouvait pas se les permettre. Aligné sur l'indicateur « renoncement aux soins » de l'enquête People's Voice Survey de l'OMS."
      es: "No buscó atención necesaria porque el hogar no podía costearla. Alineado con el indicador 'atención no buscada' de la People's Voice Survey de la OMS."
  - code: other
    label:
      en: Other coping strategy
      fr: "Autre stratégie d'adaptation"
      es: "Otra estrategia de afrontamiento"
    definition:
      en: "Used another coping mechanism not listed above."
      fr: "A utilisé un autre mécanisme d'adaptation non énuméré ci-dessus."
      es: "Utilizó otro mecanismo de afrontamiento no enumerado anteriormente."
