id: weai-credit-decision
maturity: draft
label:
  en: WEAI Credit Decision Participation
  fr: "Participation à la décision de crédit WEAI"
  es: "Participación en decisión de crédito WEAI"
definition:
  en: "Three-code classification of a respondent's participation in a household credit or loan decision, used in pro-WEAI Indicator B3 (access to and decisions on financial services). Condition A adequacy requires yes_solely or yes_jointly."
  fr: "Classification à trois codes de la participation du répondant à une décision de crédit ou de prêt du ménage, utilisée dans l'indicateur B3 du pro-WEAI (accès aux services financiers et décisions). L'adéquation de la condition A requiert yes_solely ou yes_jointly."
  es: "Clasificación de tres códigos de la participación de un encuestado en una decisión de crédito o préstamo del hogar, utilizada en el indicador B3 del pro-WEAI (acceso a servicios financieros y decisiones). La adecuación de la condición A requiere yes_solely o yes_jointly."
standard:
  name: "pro-WEAI User Guide v3 (IFPRI 2026)"
  uri: "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"
values:
  - code: yes_solely
    label:
      en: "Yes, I decided alone"
      fr: "Oui, j'ai décidé seul(e)"
      es: "Sí, decidí solo/a"
    definition:
      en: "The respondent was the sole decision-maker for obtaining the credit. Meets B3 condition A adequacy."
      fr: "Le répondant était le seul décideur pour l'obtention du crédit. Satisfait à l'adéquation de la condition A de B3."
      es: "El encuestado fue el único tomador de decisiones para obtener el crédito. Cumple la adecuación de la condición A de B3."
  - code: yes_jointly
    label:
      en: "Yes, I participated jointly"
      fr: "Oui, j'ai participé conjointement"
      es: "Sí, participé conjuntamente"
    definition:
      en: "The respondent participated in the credit decision jointly with a spouse or other household member. Meets B3 condition A adequacy."
      fr: "Le répondant a participé à la décision de crédit conjointement avec un conjoint ou un autre membre du ménage. Satisfait à l'adéquation de la condition A de B3."
      es: "El encuestado participó en la decisión de crédito conjuntamente con un cónyuge u otro miembro del hogar. Cumple la adecuación de la condición A de B3."
  - code: "no"
    label:
      en: "No, I did not participate"
      fr: "Non, je n'ai pas participé"
      es: "No, no participé"
    definition:
      en: "The respondent did not participate in the credit decision. Does not meet B3 condition A adequacy."
      fr: "Le répondant n'a pas participé à la décision de crédit. Ne satisfait pas à l'adéquation de la condition A de B3."
      es: "El encuestado no participó en la decisión de crédito. No cumple la adecuación de la condición A de B3."
