id: desire-more-children
maturity: draft
label:
  en: Desire for More Children
  fr: "Désir d'avoir d'autres enfants"
  es: "Deseo de tener más hijos"
definition:
  en: "The woman's stated intention about whether and when she wants another child. The gateway question for fertility preference coding (DHS V601 / fertility preference section). For currently pregnant women, the question is rephrased to ask about intentions after the current pregnancy."
  fr: "L'intention déclarée d'une femme quant au fait d'avoir un autre enfant et au moment où elle le souhaiterait. La question d'entrée pour le codage des préférences de fécondité (DHS V601 / section des préférences de fécondité). Pour les femmes enceintes, la question est reformulée pour demander les intentions après la grossesse en cours."
  es: "La intención declarada de una mujer sobre si y cuándo quiere otro hijo. La pregunta de entrada para la codificación de preferencias de fecundidad (DHS V601 / sección de preferencias de fecundidad). Para mujeres actualmente embarazadas, la pregunta se reformula para preguntar sobre intenciones después del embarazo actual."
values:
  - code: want_soon
    label:
      en: Wants another child within 2 years
      fr: "Souhaite un autre enfant dans les 2 ans"
      es: "Desea otro hijo en menos de 2 años"
    definition:
      en: "The woman wants another child and would like to have the birth within the next two years."
      fr: "La femme souhaite un autre enfant et voudrait accoucher dans les deux prochaines années."
      es: "La mujer desea otro hijo y quisiera tenerlo en los próximos dos años."
  - code: want_later
    label:
      en: Wants another child but later (2+ years)
      fr: "Souhaite un autre enfant mais plus tard (2 ans ou plus)"
      es: "Desea otro hijo pero más adelante (2 años o más)"
    definition:
      en: "The woman wants another child but wants to wait at least two years before the next birth. Probe for desired waiting time if this response is given."
      fr: "La femme souhaite un autre enfant mais veut attendre au moins deux ans avant le prochain accouchement. Demander le délai d'attente souhaité si cette réponse est donnée."
      es: "La mujer desea otro hijo pero quiere esperar al menos dos años antes del próximo nacimiento. Preguntar por el tiempo de espera deseado si se da esta respuesta."
  - code: wants_no_more
    label:
      en: Wants no more children
      fr: "Ne veut plus d'enfants"
      es: "No desea más hijos"
    definition:
      en: "The woman does not want any more children (limiting preference)."
      fr: "La femme ne veut plus d'enfants (préférence de limitation)."
      es: "La mujer no desea más hijos (preferencia de limitación)."
  - code: sterilized
    label:
      en: Sterilized (self or partner)
      fr: "Stérilisée (elle-même ou partenaire)"
      es: "Esterilizada (ella o su pareja)"
    definition:
      en: "The woman or her partner has been voluntarily sterilized. She cannot have more children."
      fr: "La femme ou son partenaire a été stérilisé(e) volontairement. Elle ne peut plus avoir d'enfants."
      es: "La mujer o su pareja ha sido esterilizada voluntariamente. No puede tener más hijos."
  - code: infecund_declared
    label:
      en: Declared infecund
      fr: "Inféconde déclarée"
      es: "Infecunda declarada"
    definition:
      en: "The woman reports being unable to have children (infecund), not due to voluntary sterilization."
      fr: "La femme déclare ne pas pouvoir avoir d'enfants (inféconde), sans stérilisation volontaire."
      es: "La mujer reporta ser incapaz de tener hijos (infecunda), sin esterilización voluntaria."
  - code: undecided
    label:
      en: Undecided / unsure
      fr: "Indécise / incertaine"
      es: "Indecisa / no segura"
    definition:
      en: "The woman is unsure or unable to express a clear preference (e.g., 'up to God', 'as many as come', 'don't know')."
      fr: "La femme est incertaine ou incapable d'exprimer une préférence claire (p. ex. « c'est Dieu qui décide », « autant qu'il en vient », « je ne sais pas »)."
      es: "La mujer está indecisa o no puede expresar una preferencia clara (p. ej., 'lo que Dios quiera', 'los que vengan', 'no sé')."
