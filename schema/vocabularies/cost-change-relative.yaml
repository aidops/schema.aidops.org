id: cost-change-relative
maturity: draft
label:
  en: "Cost Change Relative to Seasonal Baseline"
  fr: "Variation du coût par rapport à la référence saisonnière"
  es: "Cambio de costo relativo a la línea base estacional"
definition:
  en: "Change in the cost of a purchased input (supplementary fodder, hay, straw, commercial feed) relative to the typical price for this time of year. Used in PastoralFoodSecurityProfile `fodder_cost_change` to capture supplementary feed cost burden on pastoral households when pasture is inadequate. The `not_applicable_did_not_purchase` code distinguishes households that did not need to buy supplementary fodder from those who could not afford it."
  fr: "Variation du coût d'un intrant acheté (fourrage supplémentaire, foin, paille, aliments commerciaux) par rapport au prix habituel à cette période de l'année. Utilisé dans `fodder_cost_change` pour saisir la charge du coût des aliments supplémentaires sur les ménages pastoraux."
  es: "Cambio en el costo de un insumo comprado (forraje suplementario, heno, paja, alimento comercial) relativo al precio típico para esta época del año. Usado en `fodder_cost_change` para capturar la carga del costo de alimento suplementario en hogares pastorales cuando los pastos son insuficientes."
values:
  - code: much_higher
    label:
      en: "Much higher than normal (more than 50% increase)"
      fr: "Bien plus élevé que la normale (plus de 50% de hausse)"
      es: "Mucho más alto que lo normal (más del 50% de aumento)"
    definition:
      en: "Severe price spike; major financial burden on the pastoral household."
      fr: "Forte hausse des prix ; charge financière majeure pour le ménage pastoral."
      es: "Pico de precio severo; carga financiera mayor para el hogar pastoral."
  - code: somewhat_higher
    label:
      en: "Somewhat higher than normal (10–50% increase)"
      fr: "Quelque peu plus élevé que la normale (10–50% de hausse)"
      es: "Algo más alto que lo normal (aumento del 10–50%)"
    definition:
      en: "Moderate price increase; creating financial stress for the household."
      fr: "Hausse modérée des prix ; crée un stress financier pour le ménage."
      es: "Aumento moderado de precios; genera estrés financiero para el hogar."
  - code: about_same
    label:
      en: "About the same as normal"
      fr: "À peu près le même qu'à la normale"
      es: "Aproximadamente igual que lo normal"
    definition:
      en: "No significant price change compared to the seasonal baseline."
      fr: "Pas de changement de prix significatif par rapport à la référence saisonnière."
      es: "Sin cambio significativo de precio comparado con la línea base estacional."
  - code: somewhat_lower
    label:
      en: "Somewhat lower than normal"
      fr: "Quelque peu plus bas que la normale"
      es: "Algo más bajo que lo normal"
    definition:
      en: "Prices slightly below baseline; favorable conditions for households that need to purchase supplementary fodder."
      fr: "Prix légèrement en dessous de la référence ; conditions favorables pour les ménages qui doivent acheter du fourrage supplémentaire."
      es: "Precios ligeramente por debajo de la línea base; condiciones favorables para hogares que necesitan comprar forraje suplementario."
  - code: not_applicable_did_not_purchase
    label:
      en: "Did not purchase — not applicable"
      fr: "N'a pas acheté — sans objet"
      es: "No compró — no aplica"
    definition:
      en: "Household did not purchase supplementary fodder in the recall period; the cost-change question does not apply."
      fr: "Le ménage n'a pas acheté de fourrage supplémentaire pendant la période de rappel ; la question sur la variation des coûts ne s'applique pas."
      es: "El hogar no compró forraje suplementario durante el período de recordatorio; la pregunta sobre cambio de costo no aplica."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot assess whether supplementary fodder costs have changed relative to the seasonal baseline."
      fr: "Le répondant ne peut pas évaluer si les coûts du fourrage supplémentaire ont changé par rapport à la référence saisonnière."
      es: "El encuestado no puede evaluar si los costos del forraje suplementario han cambiado relativo a la línea base estacional."
