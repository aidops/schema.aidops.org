id: structural-safety-tag
maturity: draft
label:
  en: Structural Safety Tag
  fr: "Étiquette de sécurité structurale"
  es: "Etiqueta de seguridad estructural"
definition:
  en: "Safe-to-occupy tag assigned to a structure by a qualified engineer or trained shelter assessor during a rapid post-disaster assessment, using the green/yellow/red taxonomy codified by ATC-20 and adopted by many national building-safety authorities. This is optional in a humanitarian administration: a household enumerator is not expected to assign a structural safety tag."
  fr: "Étiquette de sûreté d'occupation attribuée à une structure par un ingénieur qualifié ou un évaluateur abri formé lors d'une évaluation rapide post-catastrophe, en utilisant la taxonomie vert/jaune/rouge codifiée par ATC-20 et adoptée par de nombreuses autorités nationales de sécurité des bâtiments. Optionnel dans une administration humanitaire : un enquêteur de ménage n'est pas censé attribuer une étiquette de sécurité structurale."
  es: "Etiqueta de seguridad de ocupación asignada a una estructura por un ingeniero calificado o un evaluador de refugio capacitado durante una evaluación rápida post-desastre, usando la taxonomía verde/amarillo/rojo codificada por ATC-20 y adoptada por muchas autoridades nacionales de seguridad de edificios. Opcional en una administración humanitaria: un encuestador del hogar no se espera que asigne una etiqueta de seguridad estructural."
standard:
  name: "ATC-20 Post-Earthquake Safety Evaluation of Buildings"
  uri: "https://www.atcouncil.org/pdfs/ATC-20overview.pdf"
  notes: "The three-tag taxonomy is standard in rapid structural assessment across earthquake-prone jurisdictions and has been adopted for post-cyclone and post-flood assessments."
values:
- code: safe
  label:
    en: Safe (green tag)
    fr: "Sûr (étiquette verte)"
    es: "Seguro (etiqueta verde)"
  definition:
    en: "Building is structurally safe to occupy; no restrictions identified."
    fr: "Le bâtiment est structurellement sûr à occuper ; aucune restriction identifiée."
    es: "El edificio es estructuralmente seguro para ocupar; no se identifican restricciones."
- code: restricted_use
  label:
    en: Restricted use (yellow tag)
    fr: "Usage restreint (étiquette jaune)"
    es: "Uso restringido (etiqueta amarilla)"
  definition:
    en: "Building has identified hazards that restrict occupancy to specific areas or conditions; detailed evaluation required before full reoccupation."
    fr: "Le bâtiment présente des dangers identifiés qui restreignent l'occupation à des zones ou conditions spécifiques ; une évaluation détaillée est requise avant toute réoccupation complète."
    es: "El edificio presenta peligros identificados que restringen la ocupación a áreas o condiciones específicas; se requiere evaluación detallada antes de una reocupación completa."
- code: unsafe
  label:
    en: Unsafe (red tag)
    fr: "Dangereux (étiquette rouge)"
    es: "Inseguro (etiqueta roja)"
  definition:
    en: "Building poses imminent risk of collapse or is otherwise unsafe to occupy; entry is prohibited pending engineering intervention."
    fr: "Le bâtiment présente un risque imminent d'effondrement ou est par ailleurs dangereux à occuper ; l'entrée est interdite en attendant une intervention d'ingénierie."
    es: "El edificio presenta riesgo inminente de colapso o es de otro modo inseguro para ocupar; se prohíbe la entrada en espera de intervención de ingeniería."
