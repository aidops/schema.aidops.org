id: latrine-lock-status
maturity: draft
label:
  en: "Latrine lock status"
  fr: "Statut du verrou des latrines"
  es: "Estado del cerrojo de letrinas"
definition:
  en: "Whether the latrines or toilets used by the household have a door that can be locked from the inside. Distinguishes between communal and private facilities and between locked and unlocked private facilities. Based on Sphere 2018 WASH Standard 3.1 guidance that simple measures such as locks on toilet doors reduce abuse risk."
  fr: "Si les latrines ou toilettes utilisées par le ménage disposent d'une porte pouvant être verrouillée de l'intérieur. Distingue entre les installations communales et privées, et entre les installations privées avec et sans verrou. Fondé sur les orientations de la Norme WASH Sphère 2018 3.1 indiquant que des mesures simples telles que des verrous sur les portes des toilettes réduisent le risque d'abus."
  es: "Si las letrinas o baños utilizados por el hogar tienen una puerta que puede cerrarse con llave desde adentro. Distingue entre instalaciones comunales y privadas, y entre instalaciones privadas con y sin cerrojo. Basado en la orientación de la Norma WASH Esfera 2018 3.1 de que medidas simples como cerrojos en puertas de baños reducen el riesgo de abuso."
values:
  - code: "yes"
    label:
      en: "Yes — latrines have a lockable door"
      fr: "Oui — les latrines ont une porte verrouillable"
      es: "Sí — las letrinas tienen puerta con cerrojo"
    definition:
      en: "Communal or shared latrines have a door that can be locked from the inside."
      fr: "Les latrines communales ou partagées ont une porte pouvant être verrouillée de l'intérieur."
      es: "Las letrinas comunales o compartidas tienen una puerta que puede cerrarse con llave desde adentro."
  - code: "no"
    label:
      en: "No — latrines do not have a lockable door"
      fr: "Non — les latrines n'ont pas de porte verrouillable"
      es: "No — las letrinas no tienen puerta con cerrojo"
    definition:
      en: "Communal or shared latrines do not have a door that can be locked from the inside."
      fr: "Les latrines communales ou partagées n'ont pas de porte pouvant être verrouillée de l'intérieur."
      es: "Las letrinas comunales o compartidas no tienen una puerta que puede cerrarse con llave desde adentro."
  - code: household_private_with_lock
    label:
      en: "Private latrine with a lockable door"
      fr: "Latrine privée avec porte verrouillable"
      es: "Letrina privada con puerta con cerrojo"
    definition:
      en: "Household has a private latrine or toilet with a door that can be locked from the inside."
      fr: "Le ménage dispose d'une latrine ou toilette privée avec une porte pouvant être verrouillée de l'intérieur."
      es: "El hogar tiene una letrina o baño privado con una puerta que puede cerrarse con llave desde adentro."
  - code: household_private_no_lock
    label:
      en: "Private latrine without a lockable door"
      fr: "Latrine privée sans porte verrouillable"
      es: "Letrina privada sin puerta con cerrojo"
    definition:
      en: "Household has a private latrine or toilet but the door cannot be locked from the inside."
      fr: "Le ménage dispose d'une latrine ou toilette privée mais la porte ne peut pas être verrouillée de l'intérieur."
      es: "El hogar tiene una letrina o baño privado pero la puerta no puede cerrarse con llave desde adentro."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent does not know whether the latrines have a lockable door."
      fr: "Le répondant ne sait pas si les latrines ont une porte verrouillable."
      es: "El encuestado no sabe si las letrinas tienen puerta con cerrojo."
