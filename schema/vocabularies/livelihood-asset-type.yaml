id: livelihood-asset-type
maturity: draft
label:
  en: Livelihood Asset Type
  fr: "Type d'actif productif"
  es: "Tipo de activo productivo"
definition:
  en: "Productive assets held by the household, distinct from consumer durables (which are captured by the PublicSchema `household-asset` vocabulary). Synthesised from the FAO RIMA-II Assets, Productive Tools, and Technology (APT) pillar, the LSMS-ISA asset roster, and the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT) productive-resource framework. Used to inventory tools, equipment, stock, and productive land that enable household income generation."
  fr: "Actifs productifs détenus par le ménage, distincts des biens de consommation durables (capturés par le vocabulaire `household-asset` de PublicSchema). Synthétisé à partir du pilier Actifs, outils productifs et technologie (APT) de FAO RIMA-II, du registre des actifs LSMS-ISA et du cadre des ressources productives des Directives volontaires de la FAO pour une gouvernance responsable des régimes fonciers (VGGT). Utilisé pour inventorier les outils, équipements, stocks et terres productives qui permettent la génération de revenus du ménage."
  es: "Activos productivos en poder del hogar, distintos de los bienes de consumo duraderos (que son capturados por el vocabulario `household-asset` de PublicSchema). Sintetizado a partir del pilar Activos, Herramientas Productivas y Tecnología (APT) de FAO RIMA-II, el inventario de activos LSMS-ISA y el marco de recursos productivos de las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT). Se utiliza para inventariar herramientas, equipo, stock y tierras productivas que permiten la generación de ingresos del hogar."
standard:
  name: "Synthesised from FAO RIMA-II APT pillar, LSMS-ISA asset roster, and FAO VGGT"
  notes: "Distinct from PS `household-asset` (consumer durables / wealth proxies) and from `nfi-item-type` (distributed relief items)."
values:
  - code: hand_tools
    label:
      en: "Hand tools (hoe, spade, machete, etc.)"
      fr: "Outils manuels (houe, bêche, machette, etc.)"
      es: "Herramientas manuales (azadón, pala, machete, etc.)"
    definition:
      en: "Basic hand tools used for farming, construction, or craft production."
      fr: "Outils manuels de base utilisés pour l'agriculture, la construction ou la production artisanale."
      es: "Herramientas manuales básicas usadas para agricultura, construcción o producción artesanal."
  - code: mechanised_equipment
    label:
      en: "Mechanised equipment (pump, tractor, mill)"
      fr: "Équipement mécanisé (pompe, tracteur, moulin)"
      es: "Equipo mecanizado (bomba, tractor, molino)"
    definition:
      en: "Motorised or mechanically-powered productive equipment."
      fr: "Équipement productif motorisé ou à propulsion mécanique."
      es: "Equipo productivo motorizado o de propulsión mecánica."
  - code: sewing_tailoring_machine
    label:
      en: Sewing or tailoring machine
      fr: "Machine à coudre ou à tisser"
      es: "Máquina de coser o de costura"
    definition:
      en: "Sewing machine or other textile production equipment used for income generation."
      fr: "Machine à coudre ou autre équipement de production textile utilisé pour la génération de revenus."
      es: "Máquina de coser u otro equipo de producción textil utilizado para la generación de ingresos."
  - code: fishing_equipment
    label:
      en: "Fishing equipment (nets, lines, boat)"
      fr: "Équipement de pêche (filets, lignes, embarcation)"
      es: "Equipo de pesca (redes, líneas, embarcación)"
    definition:
      en: "Nets, fishing lines, traps, or a non-motorised boat used for subsistence or commercial fishing."
      fr: "Filets, lignes, pièges ou embarcation non motorisée utilisés pour la pêche de subsistance ou commerciale."
      es: "Redes, líneas de pesca, trampas o embarcación no motorizada usadas para pesca de subsistencia o comercial."
  - code: business_stock_inventory
    label:
      en: Business stock or trade inventory
      fr: "Stock ou inventaire commercial"
      es: "Stock o inventario comercial"
    definition:
      en: "Goods held for resale in petty trade or small business operations."
      fr: "Marchandises détenues pour la revente dans le petit commerce ou les petites entreprises."
      es: "Bienes mantenidos para reventa en pequeño comercio u operaciones de pequeña empresa."
  - code: productive_livestock
    label:
      en: "Productive livestock (cattle, goats, etc.)"
      fr: "Bétail productif (bovins, caprins, etc.)"
      es: "Ganado productivo (bovinos, caprinos, etc.)"
    definition:
      en: "Livestock kept primarily for income, traction, or milk/egg production. Specific species and counts belong to AgricultureProfile."
      fr: "Bétail détenu principalement pour le revenu, la traction, ou la production de lait/œufs. Les espèces spécifiques et les effectifs relèvent d'AgricultureProfile."
      es: "Ganado mantenido principalmente para ingresos, tracción o producción de leche/huevos. Las especies específicas y los recuentos pertenecen a AgricultureProfile."
  - code: land
    label:
      en: Agricultural or productive land
      fr: "Terres agricoles ou productives"
      es: "Tierras agrícolas o productivas"
    definition:
      en: "Access to cultivable land, pasture, or productive land. Tenure details belong to AgricultureProfile via `land_tenure`."
      fr: "Accès à des terres cultivables, des pâturages ou des terres productives. Les détails du régime foncier relèvent d'AgricultureProfile via `land_tenure`."
      es: "Acceso a tierra cultivable, pastos o tierra productiva. Los detalles de tenencia pertenecen a AgricultureProfile vía `land_tenure`."
  - code: workshop_workspace
    label:
      en: Workshop or workspace
      fr: "Atelier ou espace de travail"
      es: "Taller o espacio de trabajo"
    definition:
      en: "A dedicated space (rented or owned) used for productive activity (carpentry, metalwork, food processing, etc.)."
      fr: "Un espace dédié (loué ou possédé) utilisé pour une activité productive (menuiserie, métallurgie, transformation alimentaire, etc.)."
      es: "Un espacio dedicado (alquilado o propio) usado para actividad productiva (carpintería, metalurgia, procesamiento de alimentos, etc.)."
  - code: transport_asset
    label:
      en: Transport asset for livelihood use
      fr: "Véhicule de transport à usage productif"
      es: "Activo de transporte para uso productivo"
    definition:
      en: "A vehicle (cart, motorcycle, bicycle) used primarily to transport goods or provide transport services for income."
      fr: "Un véhicule (charrette, moto, bicyclette) utilisé principalement pour transporter des biens ou fournir des services de transport à des fins lucratives."
      es: "Un vehículo (carreta, motocicleta, bicicleta) usado principalmente para transportar bienes o proporcionar servicios de transporte por ingresos."
  - code: other
    label:
      en: Other productive asset
      fr: "Autre actif productif"
      es: "Otro activo productivo"
    definition:
      en: "Productive asset not covered by the above categories."
      fr: "Actif productif non couvert par les catégories ci-dessus."
      es: "Activo productivo no cubierto por las categorías anteriores."
