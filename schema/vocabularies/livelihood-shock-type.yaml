id: livelihood-shock-type
maturity: draft
label:
  en: Livelihood Shock Type
  fr: "Type de choc sur les moyens de subsistance"
  es: "Tipo de impacto sobre los medios de vida"
definition:
  en: "Types of income or livelihood shocks experienced by the household in a reference period. Synthesised from the FAO RIMA-II Adaptive Capacity module's shock exposure subcomponent, the LSMS-ISA household shock roster, and the Sphere 2018 Livelihoods and Protection chapters on risk exposure. Multi-select by design: households commonly experience multiple co-occurring shocks."
  fr: "Types de chocs sur les revenus ou les moyens de subsistance subis par le ménage dans une période de référence. Synthétisé à partir du sous-composant exposition aux chocs du module Capacité adaptative de FAO RIMA-II, du registre des chocs du ménage LSMS-ISA et des chapitres Moyens de subsistance et Protection de Sphère 2018 sur l'exposition aux risques. Sélection multiple par conception : les ménages subissent généralement plusieurs chocs concomitants."
  es: "Tipos de impactos sobre los ingresos o los medios de vida experimentados por el hogar en un período de referencia. Sintetizado a partir del subcomponente de exposición a choques del módulo de Capacidad Adaptativa de FAO RIMA-II, el inventario de choques del hogar LSMS-ISA y los capítulos de Medios de Vida y Protección de Esfera 2018 sobre exposición a riesgos. Selección múltiple por diseño: los hogares comúnmente experimentan múltiples choques concurrentes."
standard:
  name: "Synthesised from FAO RIMA-II, LSMS-ISA household shock roster, and Sphere 2018"
values:
  - code: conflict_insecurity
    label:
      en: Conflict or insecurity
      fr: "Conflit ou insécurité"
      es: "Conflicto o inseguridad"
    definition:
      en: "Household income or livelihoods were disrupted by armed conflict, violence, or insecurity."
      fr: "Les revenus ou moyens de subsistance du ménage ont été perturbés par un conflit armé, la violence ou l'insécurité."
      es: "Los ingresos o medios de vida del hogar fueron interrumpidos por conflicto armado, violencia o inseguridad."
  - code: displacement_forced_move
    label:
      en: Displacement or forced move
      fr: "Déplacement ou déménagement forcé"
      es: "Desplazamiento o mudanza forzada"
    definition:
      en: "Loss of income or assets caused directly by being forced to flee or relocate."
      fr: "Perte de revenus ou d'actifs causée directement par le fait d'être contraint de fuir ou de se déplacer."
      es: "Pérdida de ingresos o activos causada directamente por ser forzados a huir o reubicarse."
  - code: drought_poor_rains
    label:
      en: Drought or poor rainfall
      fr: "Sécheresse ou manque de pluies"
      es: "Sequía o malas lluvias"
    definition:
      en: "Crop failure or livestock loss due to insufficient rain or prolonged dry spell."
      fr: "Échec des cultures ou perte de bétail en raison de pluies insuffisantes ou d'une période de sécheresse prolongée."
      es: "Pérdida de cultivos o ganado debido a lluvias insuficientes o sequía prolongada."
  - code: flood_storm
    label:
      en: Flood or storm
      fr: "Inondation ou tempête"
      es: "Inundación o tormenta"
    definition:
      en: "Damage to crops, assets, or business caused by flooding or extreme weather."
      fr: "Dommages aux cultures, actifs ou entreprise causés par des inondations ou des intempéries."
      es: "Daños a cultivos, activos o negocio causados por inundaciones o clima extremo."
  - code: illness_injury_death
    label:
      en: "Serious illness, injury, or death of income earner"
      fr: "Maladie grave, blessure ou décès d'un actif"
      es: "Enfermedad grave, lesión o muerte de un generador de ingresos"
    definition:
      en: "Loss of income due to illness, injury, or death of a productive household member."
      fr: "Perte de revenus due à la maladie, à une blessure ou au décès d'un membre productif du ménage."
      es: "Pérdida de ingresos debido a enfermedad, lesión o muerte de un miembro productivo del hogar."
  - code: price_shock
    label:
      en: "Significant price change (food, inputs, or goods)"
      fr: "Choc de prix significatif (nourriture, intrants ou biens)"
      es: "Choque de precios significativo (alimentos, insumos o bienes)"
    definition:
      en: "Income reduced because the price of goods sold fell sharply or input costs increased sharply."
      fr: "Revenus réduits parce que le prix des biens vendus a fortement chuté ou que les coûts des intrants ont fortement augmenté."
      es: "Ingresos reducidos porque el precio de los bienes vendidos cayó bruscamente o los costos de los insumos aumentaron bruscamente."
  - code: job_or_market_loss
    label:
      en: Job loss or market collapse
      fr: "Perte d'emploi ou effondrement du marché"
      es: "Pérdida de empleo o colapso del mercado"
    definition:
      en: "Loss of employment or destruction of the market where the household sold products or labour."
      fr: "Perte d'emploi ou destruction du marché où le ménage vendait ses produits ou sa force de travail."
      es: "Pérdida de empleo o destrucción del mercado donde el hogar vendía productos o trabajo."
  - code: asset_theft_loss
    label:
      en: Theft or loss of assets
      fr: "Vol ou perte d'actifs"
      es: "Robo o pérdida de activos"
    definition:
      en: "Productive or financial assets stolen, destroyed, or lost."
      fr: "Actifs productifs ou financiers volés, détruits ou perdus."
      es: "Activos productivos o financieros robados, destruidos o perdidos."
  - code: other
    label:
      en: Other shock
      fr: "Autre choc"
      es: "Otro impacto"
    definition:
      en: "Shock not covered by the above categories."
      fr: "Choc non couvert par les catégories ci-dessus."
      es: "Choque no cubierto por las categorías anteriores."
