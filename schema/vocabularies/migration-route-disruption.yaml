id: migration-route-disruption
maturity: draft
label:
  en: "Migration Route Disruption Cause"
  fr: "Cause de perturbation de la route de migration"
  es: "Causa de interrupción de la ruta de migración"
definition:
  en: "Primary cause of disruption to a pastoral household's seasonal migration route. Used in PastoralFoodSecurityProfile `migration_route_disruption_cause`. Sensitivity: this vocabulary is SENSITIVE. Codes `conflict_armed_group` and `inter_community_conflict` constitute conflict-actor intelligence at fine geographic granularity; aggregate to livelihood-zone level before sharing with any non-humanitarian partner. The vocabulary deliberately does not ask respondents to name specific armed actors — only to categorize the type of cause — to reduce intelligence-collection risk."
  fr: "Cause principale de la perturbation de la route de migration saisonnière d'un ménage pastoral. Sensibilité : vocabulaire SENSIBLE. Les codes `conflict_armed_group` et `inter_community_conflict` constituent des renseignements sur les acteurs du conflit ; agréger au niveau de la zone de moyens d'existence avant tout partage."
  es: "Causa principal de la interrupción de la ruta de migración estacional de un hogar pastoral. Sensibilidad: vocabulario SENSIBLE. Los códigos `conflict_armed_group` e `inter_community_conflict` constituyen información de actores del conflicto; agregar al nivel de zona de medios de vida antes de compartir."
values:
  - code: conflict_armed_group
    label:
      en: "Armed group or armed conflict"
      fr: "Groupe armé ou conflit armé"
      es: "Grupo armado o conflicto armado"
    definition:
      en: "Route blocked or made unsafe by armed actors including non-state armed groups, militias, or military operations. SENSITIVE: aggregate to livelihood-zone level before sharing."
      fr: "Route bloquée ou rendue dangereuse par des acteurs armés, notamment des groupes armés non étatiques, des milices ou des opérations militaires. SENSIBLE."
      es: "Ruta bloqueada o hecha insegura por actores armados incluyendo grupos armados no estatales, milicias u operaciones militares. SENSIBLE."
  - code: inter_community_conflict
    label:
      en: "Inter-community conflict"
      fr: "Conflit intercommunautaire"
      es: "Conflicto intercomunal"
    definition:
      en: "Farmer-herder conflict, inter-clan dispute, or inter-ethnic conflict blocking traditional pastoral corridors. SENSITIVE: aggregate to livelihood-zone level before sharing."
      fr: "Conflit agriculteurs-éleveurs, dispute inter-clans ou conflit inter-ethnique bloquant les couloirs pastoraux traditionnels. SENSIBLE."
      es: "Conflicto agricultores-ganaderos, disputa entre clanes o conflicto interétnico que bloquea corredores pastorales tradicionales. SENSIBLE."
  - code: closed_by_authorities
    label:
      en: "Closed by authorities"
      fr: "Fermé par les autorités"
      es: "Cerrado por las autoridades"
    definition:
      en: "Migration route officially or de facto closed by government or administrative order."
      fr: "Route de migration officiellement ou de facto fermée par une décision gouvernementale ou administrative."
      es: "Ruta de migración cerrada oficial o de facto por orden gubernamental o administrativa."
  - code: agricultural_encroachment
    label:
      en: "Agricultural encroachment on pastoral corridor"
      fr: "Empiètement agricole sur le couloir pastoral"
      es: "Expansión agrícola sobre el corredor pastoral"
    definition:
      en: "Cropland expansion into traditional pastoral corridors blocking herd movement."
      fr: "Expansion des terres cultivées dans les couloirs pastoraux traditionnels, bloquant le mouvement des troupeaux."
      es: "Expansión de tierras de cultivo hacia corredores pastorales tradicionales que bloquean el movimiento del rebaño."
  - code: drought_no_water_pasture
    label:
      en: "Drought — no water or pasture along route"
      fr: "Sécheresse — pas d'eau ni de pâturage sur la route"
      es: "Sequía — sin agua ni pastos en la ruta"
    definition:
      en: "Route rendered impassable by absence of water or pasture due to drought, not by human actors."
      fr: "Route rendue impraticable par l'absence d'eau ou de pâturage due à la sécheresse, et non par des acteurs humains."
      es: "Ruta inaccesible por ausencia de agua o pastos debido a la sequía, no por actores humanos."
  - code: flood_physical_barrier
    label:
      en: "Flood or physical barrier"
      fr: "Inondation ou obstacle physique"
      es: "Inundación o barrera física"
    definition:
      en: "Route blocked by floodwater, washed-out tracks, or other physical obstacle not caused by human actors."
      fr: "Route bloquée par des inondations, des pistes emportées ou d'autres obstacles physiques non causés par des acteurs humains."
      es: "Ruta bloqueada por inundaciones, caminos destruidos u otros obstáculos físicos no causados por actores humanos."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Cause of migration route disruption not listed in the codes above."
      fr: "Cause de perturbation de la route de migration non répertoriée dans les codes ci-dessus."
      es: "Causa de interrupción de la ruta de migración no listada en los códigos anteriores."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot identify the primary cause of migration route disruption."
      fr: "Le répondant ne peut pas identifier la cause principale de la perturbation de la route de migration."
      es: "El encuestado no puede identificar la causa principal de la interrupción de la ruta de migración."
