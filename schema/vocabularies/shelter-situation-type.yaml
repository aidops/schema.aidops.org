id: shelter-situation-type
maturity: draft
label:
  en: Shelter Situation Type
  fr: "Type de situation d'abri"
  es: "Tipo de situación de refugio"
definition:
  en: "The type of shelter arrangement currently occupied by the household, particularly relevant when the original dwelling is damaged or unavailable. Complements dwelling_type (which records the household's usual dwelling) by recording what the household is actually living in at the moment of assessment."
  fr: "Le type d'arrangement d'abri actuellement occupé par le ménage, particulièrement pertinent lorsque le logement d'origine est endommagé ou indisponible. Complète dwelling_type (qui consigne le logement habituel du ménage) en consignant où le ménage vit réellement au moment de l'évaluation."
  es: "El tipo de arreglo de refugio actualmente ocupado por el hogar, particularmente relevante cuando la vivienda original está dañada o no disponible. Complementa dwelling_type (que consigna la vivienda habitual del hogar) al registrar dónde vive realmente el hogar al momento de la evaluación."
standard:
  name: "Global Shelter Cluster post-disaster shelter situation categories"
  uri: "https://sheltercluster.org/"
values:
- code: original_home
  label:
    en: Original home
    fr: "Logement d'origine"
    es: "Vivienda original"
  definition:
    en: "Household remains in its usual dwelling."
    fr: "Le ménage demeure dans son logement habituel."
    es: "El hogar permanece en su vivienda habitual."
- code: original_home_repaired
  label:
    en: Original home, partially repaired
    fr: "Logement d'origine, partiellement réparé"
    es: "Vivienda original, parcialmente reparada"
  definition:
    en: "Household is back in its usual dwelling after undertaking partial repairs."
    fr: "Le ménage est retourné dans son logement habituel après avoir effectué des réparations partielles."
    es: "El hogar ha regresado a su vivienda habitual tras realizar reparaciones parciales."
- code: tent_or_emergency_shelter
  label:
    en: Tent or emergency shelter
    fr: "Tente ou abri d'urgence"
    es: "Tienda o refugio de emergencia"
  definition:
    en: "Household is living in an emergency tent, plastic-sheeting shelter, or similar emergency structure."
    fr: "Le ménage vit dans une tente d'urgence, un abri en bâches plastiques ou une structure d'urgence similaire."
    es: "El hogar vive en una tienda de emergencia, un refugio de láminas plásticas o estructura de emergencia similar."
- code: transitional_shelter
  label:
    en: Transitional shelter
    fr: "Abri transitionnel"
    es: "Refugio transicional"
  definition:
    en: "Household is living in a transitional shelter unit provided by a humanitarian agency or government, intended as a bridge to permanent reconstruction."
    fr: "Le ménage vit dans une unité d'abri transitionnel fournie par une agence humanitaire ou un gouvernement, conçue comme passerelle vers la reconstruction permanente."
    es: "El hogar vive en una unidad de refugio transicional proporcionada por una agencia humanitaria o gobierno, concebida como puente hacia la reconstrucción permanente."
- code: collective_center
  label:
    en: Collective centre
    fr: "Centre collectif"
    es: "Centro colectivo"
  definition:
    en: "Household is sheltering in a collective centre such as a school, public hall, or place of worship being used as temporary accommodation."
    fr: "Le ménage est abrité dans un centre collectif tel qu'une école, une salle publique ou un lieu de culte utilisé comme hébergement temporaire."
    es: "El hogar se alberga en un centro colectivo como una escuela, salón público o lugar de culto usado como alojamiento temporal."
- code: host_family
  label:
    en: Hosted by another family
    fr: "Hébergé par une autre famille"
    es: "Alojado por otra familia"
  definition:
    en: "Household is staying with a host family (relatives, friends, or other hosts)."
    fr: "Le ménage séjourne chez une famille d'accueil (parents, amis ou autres hôtes)."
    es: "El hogar se aloja con una familia anfitriona (familiares, amigos u otros)."
- code: rented_accommodation
  label:
    en: Rented accommodation
    fr: "Logement loué"
    es: "Alojamiento alquilado"
  definition:
    en: "Household has rented a separate dwelling as temporary or continuing accommodation after the shock."
    fr: "Le ménage a loué un logement séparé comme hébergement temporaire ou continu après le choc."
    es: "El hogar ha alquilado una vivienda separada como alojamiento temporal o continuo tras el choque."
- code: displacement_site
  label:
    en: Displacement site or camp
    fr: "Site de déplacement ou camp"
    es: "Sitio de desplazamiento o campamento"
  definition:
    en: "Household is in a managed displacement site or camp."
    fr: "Le ménage se trouve dans un site de déplacement ou camp géré."
    es: "El hogar se encuentra en un sitio de desplazamiento o campamento gestionado."
- code: unsheltered
  label:
    en: Unsheltered / open air
    fr: "Sans abri / à l'air libre"
    es: "Sin refugio / a la intemperie"
  definition:
    en: "Household is without shelter (sleeping outside, under tarpaulin strung between trees, or in vehicles)."
    fr: "Le ménage est sans abri (dort dehors, sous une bâche tendue entre des arbres ou dans des véhicules)."
    es: "El hogar está sin refugio (duerme a la intemperie, bajo una lona tendida entre árboles, o en vehículos)."
