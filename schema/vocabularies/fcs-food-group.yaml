id: fcs-food-group
maturity: draft
label:
  en: FCS Food Group
  fr: "Groupe alimentaire FCS"
  es: "Grupo alimentario FCS"
definition:
  en: "The eight scored food groups used by the WFP Food Consumption Score (FCS), plus condiments as a non-scoring screener. Each group is scored by the number of days (0-7) the household consumed items from that group in the past seven days; the group's weight converts days-of-consumption into the composite FCS. Meat, fish, and eggs form a single combined protein group in the standard WFP FCS questionnaire. The weights below are the WFP VAM 2008 weights and are treated as part of the instrument definition, not a programming decision."
  fr: "Les huit groupes alimentaires notés utilisés par le Score de consommation alimentaire (FCS) du PAM, plus les condiments comme item de dépistage non noté. Chaque groupe est noté par le nombre de jours (0-7) de consommation par le ménage durant les sept derniers jours ; le poids du groupe convertit les jours de consommation en FCS composite. La viande, le poisson et les œufs forment un seul groupe protéique combiné dans le questionnaire FCS standard du PAM. Les poids ci-dessous sont les poids VAM 2008 du PAM et sont considérés comme partie intégrante de la définition de l'instrument, non comme une décision de programmation."
  es: "Los ocho grupos alimentarios puntuados utilizados por el Puntaje de Consumo de Alimentos (FCS) del PMA, más los condimentos como ítem de detección no puntuado. Cada grupo se puntúa por el número de días (0-7) que el hogar consumió alimentos de ese grupo durante los últimos siete días; el peso del grupo convierte los días de consumo en el FCS compuesto. La carne, el pescado y los huevos forman un único grupo proteico combinado en el cuestionario FCS estándar del PMA. Los pesos abajo son los pesos VAM 2008 del PMA y se consideran parte de la definición del instrumento, no una decisión de programación."
standard:
  name: "WFP VAM Food Consumption Analysis (2008)"
  uri: "https://www.wfp.org/publications/food-consumption-analysis-calculation-and-use-food-consumption-score-food-security"
  notes: "Weights and food-group definitions follow WFP VAM Technical Guidance 2008. Dairy is weighted the same as meat/fish/eggs at 4 because, in most contexts, dairy is a comparable source of protein and micronutrients when consumed at meal-contributing quantities."
values:
- code: staples
  label:
    en: Staples (cereals, tubers, roots)
    fr: "Aliments de base (céréales, tubercules, racines)"
    es: "Alimentos básicos (cereales, tubérculos, raíces)"
  definition:
    en: "Rice, pasta, bread, sorghum, millet, maize, wheat, potato, yam, cassava, other cereals and starchy roots. Weight: 2."
    fr: "Riz, pâtes, pain, sorgho, mil, maïs, blé, pomme de terre, igname, manioc, autres céréales et racines féculentes. Poids : 2."
    es: "Arroz, pasta, pan, sorgo, mijo, maíz, trigo, papa, ñame, yuca, otros cereales y raíces feculentas. Peso: 2."
  notes:
    en: "FCS weight = 2"
- code: pulses
  label:
    en: Pulses
    fr: "Légumineuses"
    es: "Legumbres"
  definition:
    en: "Beans, peas, lentils, groundnuts, cashews, other legumes and nuts. Weight: 3."
    fr: "Haricots, pois, lentilles, arachides, noix de cajou, autres légumineuses et noix. Poids : 3."
    es: "Frijoles, guisantes, lentejas, maní, marañones, otras legumbres y nueces. Peso: 3."
  notes:
    en: "FCS weight = 3"
- code: vegetables
  label:
    en: Vegetables and leaves
    fr: "Légumes et feuilles"
    es: "Verduras y hojas"
  definition:
    en: "All vegetables and green leaves, including wild-gathered leaves. Weight: 1."
    fr: "Tous les légumes et feuilles vertes, y compris les feuilles cueillies dans la nature. Poids : 1."
    es: "Todas las verduras y hojas verdes, incluidas las hojas recolectadas silvestres. Peso: 1."
  notes:
    en: "FCS weight = 1"
- code: fruit
  label:
    en: Fruit
    fr: "Fruits"
    es: "Frutas"
  definition:
    en: "All fruits, including wild-gathered. Weight: 1."
    fr: "Tous les fruits, y compris ceux cueillis dans la nature. Poids : 1."
    es: "Todas las frutas, incluidas las recolectadas silvestres. Peso: 1."
  notes:
    en: "FCS weight = 1"
- code: meat_fish_eggs
  label:
    en: Meat, fish, and eggs
    fr: "Viande, poisson et œufs"
    es: "Carne, pescado y huevos"
  definition:
    en: "Beef, goat, poultry, pork, bushmeat, fresh or dried fish and seafood, and eggs of any kind. Asked as a single combined protein question in the standard WFP FCS. Weight: 4."
    fr: "Bœuf, chèvre, volaille, porc, viande de brousse, poisson et fruits de mer frais ou séchés, et œufs de toute sorte. Interrogé comme une seule question protéique combinée dans le FCS standard du PAM. Poids : 4."
    es: "Res, cabra, aves, cerdo, carne de monte, pescado y mariscos frescos o secos, y huevos de cualquier tipo. Preguntado como una única pregunta combinada de proteínas en el FCS estándar del PMA. Peso: 4."
  notes:
    en: "FCS weight = 4"
- code: dairy
  label:
    en: Milk and dairy
    fr: "Lait et produits laitiers"
    es: "Leche y lácteos"
  definition:
    en: "Milk, yogurt, cheese, and other dairy products consumed at meal-contributing quantities. Small quantities used only as condiments (e.g., tea whitener) are counted as condiments. Weight: 4."
    fr: "Lait, yaourt, fromage et autres produits laitiers consommés en quantités contribuant au repas. Les petites quantités utilisées uniquement comme condiments (par exemple, pour blanchir le thé) sont comptées comme condiments. Poids : 4."
    es: "Leche, yogur, queso y otros lácteos consumidos en cantidades que contribuyen a la comida. Las cantidades pequeñas usadas solo como condimento (por ejemplo, para aclarar el té) se cuentan como condimentos. Peso: 4."
  notes:
    en: "FCS weight = 4"
- code: fat_oil
  label:
    en: Fat and oil
    fr: "Matière grasse et huile"
    es: "Grasa y aceite"
  definition:
    en: "Cooking oils, butter, ghee, lard, and other fats. Weight: 0.5."
    fr: "Huiles de cuisson, beurre, ghee, saindoux et autres matières grasses. Poids : 0,5."
    es: "Aceites de cocina, mantequilla, ghee, manteca y otras grasas. Peso: 0,5."
  notes:
    en: "FCS weight = 0.5"
- code: sugar
  label:
    en: Sugar and sweets
    fr: "Sucre et sucreries"
    es: "Azúcar y dulces"
  definition:
    en: "Sugar, honey, jam, cakes, candy, sweetened beverages. Weight: 0.5."
    fr: "Sucre, miel, confiture, gâteaux, bonbons, boissons sucrées. Poids : 0,5."
    es: "Azúcar, miel, mermelada, pasteles, dulces, bebidas azucaradas. Peso: 0,5."
  notes:
    en: "FCS weight = 0.5"
- code: condiments
  label:
    en: Condiments
    fr: "Condiments"
    es: "Condimentos"
  definition:
    en: "Salt, pepper, spices, tea, coffee, and other condiments used in small quantities to flavour food. Captured as a screener item: frequent consumption of only condiments is a warning signal even though this group does not contribute to the FCS composite. Weight: 0."
    fr: "Sel, poivre, épices, thé, café et autres condiments utilisés en petites quantités pour aromatiser les aliments. Saisi comme item de dépistage : la consommation fréquente de seuls condiments est un signal d'alerte même si ce groupe ne contribue pas au FCS composite. Poids : 0."
    es: "Sal, pimienta, especias, té, café y otros condimentos usados en pequeñas cantidades para dar sabor a los alimentos. Capturado como ítem de detección: el consumo frecuente solo de condimentos es una señal de alerta aunque este grupo no contribuya al FCS compuesto. Peso: 0."
  notes:
    en: "FCS weight = 0 (screener)"
