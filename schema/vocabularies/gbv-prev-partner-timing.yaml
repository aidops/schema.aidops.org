id: gbv-prev-partner-timing
maturity: draft
label:
  en: "Timing of violence by previous partner"
  fr: "Moment des violences par un partenaire précédent"
  es: "Momento de la violencia por un compañero anterior"
definition:
  en: "Timing of violence experienced from a previous husband or partner relative to the interview date, corresponding to DHS DV15B. Used to distinguish recent from historical partner violence for respondents who report experiencing violence from a previous partner."
  fr: "Moment des violences subies de la part d'un mari ou partenaire précédent par rapport à la date de l'entretien, correspondant au DHS DV15B. Utilisé pour distinguer les violences récentes des violences historiques d'un partenaire pour les répondantes qui signalent avoir subi des violences d'un partenaire précédent."
  es: "Momento de la violencia experimentada de un marido o compañero anterior en relación con la fecha de la entrevista, correspondiente al DHS DV15B. Se usa para distinguir violencia de pareja reciente de la histórica."

standard:
  name: dhs-domestic-violence-module-2022
  uri: "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"
  notes: "DV15B (timing of previous partner violence)"

values:
  - code: within_12m
    label:
      en: "Within the last 12 months"
      fr: "Au cours des 12 derniers mois"
      es: "En los últimos 12 meses"
    definition:
      en: "Violence by the previous partner occurred within the 12 months preceding the interview."
      fr: "La violence du partenaire précédent s'est produite dans les 12 mois précédant l'entretien."
      es: "La violencia del compañero anterior ocurrió en los 12 meses anteriores a la entrevista."
  - code: over_12m_ago
    label:
      en: "12 or more months ago"
      fr: "Il y a 12 mois ou plus"
      es: "Hace 12 o más meses"
    definition:
      en: "Violence by the previous partner last occurred 12 or more months before the interview."
      fr: "La violence du partenaire précédent s'est produite pour la dernière fois 12 mois ou plus avant l'entretien."
      es: "La violencia del compañero anterior ocurrió por última vez 12 o más meses antes de la entrevista."
  - code: dont_remember
    label:
      en: "Does not remember"
      fr: "Ne se souvient pas"
      es: "No recuerda"
    definition:
      en: "The respondent cannot recall when the violence by the previous partner last occurred."
      fr: "La répondante ne se souvient pas de la dernière occurrence de la violence du partenaire précédent."
      es: "La encuestada no recuerda cuándo ocurrió por última vez la violencia del compañero anterior."
