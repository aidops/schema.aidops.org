id: aap-yesno-dk
maturity: draft
label:
  en: "AAP: Yes / No / Don't know / Prefer not to answer"
  fr: "Redevabilité : Oui / Non / Ne sait pas / Préfère ne pas répondre"
  es: "Rendición de cuentas: Sí / No / No sabe / Prefiere no responder"
definition:
  en: "Four-code response scale used across binary awareness items in the AccountabilityToAffectedPopulationsProfile. Adds an explicit 'prefer not to answer' code to the standard yes/no/don't-know triad because AAP perception items (especially PSEA-adjacent ones) must permit non-response to reduce courtesy bias and fear-of-retaliation bias documented by Ground Truth Solutions. The distinction between 'don't know' and 'prefer not to answer' must be preserved in analysis: 'don't know' signals an information gap, 'prefer not to answer' signals a trust or safety concern."
  fr: "Échelle de réponse à quatre codes utilisée pour les items d'awareness binaires du Profil de redevabilité envers les populations affectées. Ajoute un code explicite « préfère ne pas répondre » à la triade standard oui/non/ne sait pas car les items de perception AAP (en particulier ceux liés à la PSEA) doivent permettre la non-réponse afin de réduire le biais de complaisance et le biais de peur de représailles documentés par Ground Truth Solutions. La distinction entre « ne sait pas » et « préfère ne pas répondre » doit être préservée dans l'analyse : « ne sait pas » signale une lacune d'information, « préfère ne pas répondre » signale une préoccupation de confiance ou de sécurité."
  es: "Escala de respuesta de cuatro códigos utilizada en los ítems binarios de conciencia del Perfil de Rendición de Cuentas a las Poblaciones Afectadas. Añade un código explícito «prefiere no responder» a la tríada estándar sí/no/no sabe porque los ítems de percepción AAP (especialmente los relacionados con PSEA) deben permitir la no respuesta para reducir el sesgo de cortesía y el sesgo de miedo a represalias documentados por Ground Truth Solutions. La distinción entre «no sabe» y «prefiere no responder» debe preservarse en el análisis: «no sabe» señala una brecha de información, «prefiere no responder» señala una preocupación de confianza o seguridad."
standard:
  name: "IASC / REACH Menu of AAP Questions for Needs Assessments 2018"
  uri: "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"
  notes: "Non-response codes convention adopted across the IASC / REACH AAP menu for perception items."
values:
  - code: "yes"
    label:
      en: "Yes"
      fr: "Oui"
      es: "Sí"
    definition:
      en: "The respondent confirms the condition or event."
      fr: "Le répondant confirme la condition ou l'événement."
      es: "El encuestado confirma la condición o el evento."
  - code: "no"
    label:
      en: "No"
      fr: "Non"
      es: "No"
    definition:
      en: "The respondent denies the condition or event."
      fr: "Le répondant nie la condition ou l'événement."
      es: "El encuestado niega la condición o el evento."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "The respondent does not know the answer. This is a valid response that signals an information gap and must not be re-coded as 'no' or missing."
      fr: "Le répondant ne connaît pas la réponse. Il s'agit d'une réponse valide qui signale une lacune d'information et ne doit pas être recodée comme « non » ou manquante."
      es: "El encuestado no sabe la respuesta. Esta es una respuesta válida que señala una brecha de información y no debe recodificarse como «no» o faltante."
  - code: prefer_not_to_answer
    label:
      en: "Prefer not to answer"
      fr: "Préfère ne pas répondre"
      es: "Prefiere no responder"
    definition:
      en: "The respondent declines to answer. On sensitive AAP items, this is itself a programmatic signal and should be tracked separately from 'don't know' and from missingness."
      fr: "Le répondant refuse de répondre. Sur les items AAP sensibles, il s'agit en soi d'un signal programmatique et doit être suivi séparément de « ne sait pas » et de la non-réponse."
      es: "El encuestado se niega a responder. En los ítems AAP sensibles, esto constituye en sí mismo una señal programática y debe rastrearse por separado de «no sabe» y de la no respuesta."
