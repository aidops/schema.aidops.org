id: muac-band
maturity: draft
label:
  en: MUAC Band
  fr: Bande PB
  es: Banda PB
definition:
  en: "The colour-coded MUAC screening band for children aged 6-59 months, derived from mid-upper arm circumference using WHO/UNICEF standard cutoffs."
  fr: "La bande de dépistage du périmètre brachial codée par couleur pour les enfants de 6 à 59 mois, dérivée de la mesure du périmètre brachial selon les seuils standard OMS/UNICEF."
  es: "La banda de tamizaje del perímetro braquial (PB) codificada por color para niños de 6 a 59 meses, derivada del perímetro braquial según los puntos de corte estándar OMS/UNICEF."
standard:
  name: "WHO/UNICEF/WFP/UNSCN Joint Statement on Community-based Management of Acute Malnutrition (2007/2009)"
  uri: https://www.who.int/publications/i/item/9789280641479
  notes: "Cutoffs for children 6-59 months: red < 115 mm, yellow 115-124 mm, green >= 125 mm."
values:
- code: red
  label:
    en: Red
    fr: Rouge
    es: Rojo
  definition:
    en: "MUAC < 115 mm. Severe acute malnutrition (SAM). Requires immediate referral for therapeutic treatment."
    fr: "PB < 115 mm. Malnutrition aiguë sévère (MAS). Nécessite une orientation immédiate pour un traitement thérapeutique."
    es: "PB < 115 mm. Desnutrición aguda grave (DAG). Requiere derivación inmediata para tratamiento terapéutico."
- code: yellow
  label:
    en: Yellow
    fr: Jaune
    es: Amarillo
  definition:
    en: "MUAC 115-124 mm. Moderate acute malnutrition (MAM). Typically requires supplementary feeding."
    fr: "PB 115-124 mm. Malnutrition aiguë modérée (MAM). Nécessite généralement une alimentation supplémentaire."
    es: "PB 115-124 mm. Desnutrición aguda moderada (MAM). Generalmente requiere alimentación suplementaria."
- code: green
  label:
    en: Green
    fr: Vert
    es: Verde
  definition:
    en: "MUAC >= 125 mm. Adequate nutritional status. No acute malnutrition detected."
    fr: "PB >= 125 mm. État nutritionnel adéquat. Aucune malnutrition aiguë détectée."
    es: "PB >= 125 mm. Estado nutricional adecuado. No se detecta desnutrición aguda."
