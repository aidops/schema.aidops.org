id: feeding-change
maturity: draft
label:
  en: Feeding Change During Illness
  fr: "Changement d'alimentation durant la maladie"
  es: "Cambio en la alimentación durante la enfermedad"
definition:
  en: "Whether and how the amount of food given to a child changed during a diarrhea episode compared to the child's usual intake. Used to assess continued feeding during diarrhea, an IMCI and DHS/MICS programmatic indicator."
  fr: "Si et comment la quantité de nourriture donnée à un enfant a changé pendant un épisode de diarrhée par rapport à l'alimentation habituelle de l'enfant. Utilisé pour évaluer le maintien de l'alimentation pendant la diarrhée, un indicateur programmatique PCIME et DHS/MICS."
  es: "Si y cómo la cantidad de alimentos dados a un niño cambió durante un episodio de diarrea en comparación con la ingesta habitual del niño. Usado para evaluar la alimentación continuada durante la diarrea, un indicador programático IMCI y DHS/MICS."
values:
- code: more_than_usual
  label:
    en: More than usual
    fr: "Plus qu'habituellement"
    es: "Más de lo habitual"
  definition:
    en: "The child was given more food than usual during the diarrhea episode."
    fr: "L'enfant a reçu plus de nourriture qu'habituellement durant l'épisode de diarrhée."
    es: "Al niño se le dio más comida de lo habitual durante el episodio de diarrea."
- code: same_as_usual
  label:
    en: Same as usual
    fr: "Autant qu'habituellement"
    es: "Igual que de costumbre"
  definition:
    en: "The child was given the same amount of food as usual during the diarrhea episode. Meets the IMCI continued-feeding recommendation."
    fr: "L'enfant a reçu la même quantité de nourriture qu'habituellement durant l'épisode de diarrhée. Répond à la recommandation PCIME de poursuite de l'alimentation."
    es: "Al niño se le dio la misma cantidad de comida que de costumbre durante el episodio de diarrea. Cumple la recomendación de alimentación continuada de IMCI."
- code: less_than_usual
  label:
    en: Less than usual
    fr: "Moins qu'habituellement"
    es: "Menos de lo habitual"
  definition:
    en: "The child was given less food than usual during the diarrhea episode."
    fr: "L'enfant a reçu moins de nourriture qu'habituellement durant l'épisode de diarrhée."
    es: "Al niño se le dio menos comida de lo habitual durante el episodio de diarrea."
- code: nothing_given
  label:
    en: Nothing given (food withheld)
    fr: "Rien donné (alimentation supprimée)"
    es: "Nada dado (alimentación retirada)"
  definition:
    en: "The child was given no food during the diarrhea episode. Withholding food during diarrhea is an IMCI-identified harmful practice."
    fr: "L'enfant n'a reçu aucune nourriture durant l'épisode de diarrhée. La suppression de l'alimentation pendant la diarrhée est une pratique néfaste identifiée par la PCIME."
    es: "Al niño no se le dio ningún alimento durante el episodio de diarrea. La retirada de alimentos durante la diarrea es una práctica perjudicial identificada por IMCI."
