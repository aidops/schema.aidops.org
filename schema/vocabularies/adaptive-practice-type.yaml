id: adaptive-practice-type
maturity: draft
label:
  en: "Adaptive practice type"
  fr: "Type de pratique d'adaptation climatique"
  es: "Tipo de práctica de adaptación climática"
definition:
  en: >
    Climate-smart and climate-adaptive practices adopted at household level.
    Used for climate_adaptive_practices_used. Sources: World Bank CSA Country
    Profiles methodology (CSA practices adoption module); IPCC AR6 WGII Chapter
    5 (adaptation options in food systems); FAO EX-ACT household practice list;
    CARE CVCA adaptive practice inventory; IFRC PCVA practice adoption module.
    Note on 'improved_irrigation': this is a domain term of art per the World
    Bank CSA Country Profiles and FAO EX-ACT, not an 'improved' naming
    convention in the sense of a software feature label.
  fr: >
    Pratiques climato-intelligentes et d'adaptation climatique adoptées au
    niveau du ménage. Utilisé pour climate_adaptive_practices_used. Sources :
    Profils pays CSA Banque mondiale ; GIEC AR6 WGII Chapitre 5 ; FAO EX-ACT ;
    CARE CVCA ; FICR PCVA.
  es: >
    Prácticas climáticamente inteligentes y de adaptación climática adoptadas
    a nivel del hogar. Usado para climate_adaptive_practices_used. Fuentes:
    Perfiles de países CSA del Banco Mundial; IPCC AR6 WGII Capítulo 5;
    FAO EX-ACT; CARE CVCA; FICR PCVA.
values:
  - code: drought_resistant_seeds
    label:
      en: "Drought-tolerant or early-maturing seed varieties"
      fr: "Semences résistantes à la sécheresse ou à maturation précoce"
      es: "Semillas tolerantes a la sequía o de maduración temprana"
    definition:
      en: "Growing crop varieties specifically bred or selected to tolerate water stress or to mature before the peak dry period."
      fr: "Cultures de variétés spécifiquement sélectionnées pour tolérer le stress hydrique ou mûrir avant la période sèche maximale."
      es: "Cultivo de variedades específicamente seleccionadas para tolerar el estrés hídrico o madurar antes del período seco máximo."
  - code: water_harvesting
    label:
      en: "Water harvesting or rainwater collection"
      fr: "Collecte des eaux de pluie ou captage des eaux de ruissellement"
      es: "Cosecha de agua o recolección de agua de lluvia"
    definition:
      en: "Techniques to capture and store rainwater or surface runoff for agricultural or domestic use — including half-moon bunds, zaï pits, and rooftop collection."
      fr: "Techniques de captage et stockage des eaux de pluie ou du ruissellement pour usage agricole ou domestique — y compris les demi-lunes, les puits zaï et la collecte en toiture."
      es: "Técnicas para capturar y almacenar agua de lluvia o escorrentía superficial para uso agrícola o doméstico — incluidas medias lunas, pozos zaï y recolección en techos."
  - code: agroforestry
    label:
      en: "Agroforestry (trees on farmland)"
      fr: "Agroforesterie (arbres sur terres agricoles)"
      es: "Agroforestería (árboles en tierras de cultivo)"
    definition:
      en: "Integrating trees or shrubs into farming systems to improve water retention, reduce erosion, provide shade, and improve soil carbon."
      fr: "Intégration d'arbres ou d'arbustes dans les systèmes agricoles pour améliorer la rétention d'eau, réduire l'érosion, fournir de l'ombre et améliorer le carbone du sol."
      es: "Integración de árboles o arbustos en sistemas agrícolas para mejorar la retención de agua, reducir la erosión, proporcionar sombra y mejorar el carbono del suelo."
  - code: soil_conservation_practices
    label:
      en: "Soil conservation or erosion control"
      fr: "Conservation du sol ou contrôle de l'érosion"
      es: "Conservación del suelo o control de la erosión"
    definition:
      en: "Practices to maintain soil quality and reduce erosion — including mulching, cover crops, contour bunding, and terracing."
      fr: "Pratiques de maintien de la qualité du sol et de réduction de l'érosion — y compris le paillage, les cultures de couverture, le billonnage en courbe de niveau et les terrasses."
      es: "Prácticas para mantener la calidad del suelo y reducir la erosión — incluidos el acolchado, cultivos de cobertura, banquetas en curva de nivel y terrazas."
  - code: improved_irrigation
    label:
      en: "Improved or supplemental irrigation"
      fr: "Irrigation améliorée ou complémentaire"
      es: "Riego mejorado o suplementario"
    definition:
      en: "Installing or using drip, sprinkler, or small-scale supplemental irrigation to cope with unreliable rainfall. 'Improved' is a CSA domain term of art per World Bank CSA Country Profiles and FAO EX-ACT."
      fr: "Installation ou utilisation de l'irrigation goutte à goutte, par aspersion ou d'appoint à petite échelle pour faire face aux précipitations peu fiables."
      es: "Instalación o uso de riego por goteo, aspersión o suplementario a pequeña escala para hacer frente a lluvias poco confiables."
  - code: diversified_crops
    label:
      en: "Crop diversification"
      fr: "Diversification des cultures"
      es: "Diversificación de cultivos"
    definition:
      en: "Growing multiple crop types or varieties to reduce the risk that one crop failure eliminates all food or income."
      fr: "Culture de plusieurs types ou variétés de cultures pour réduire le risque qu'une mauvaise récolte élimine toute la nourriture ou les revenus."
      es: "Cultivo de múltiples tipos o variedades de cultivos para reducir el riesgo de que una pérdida de cosecha elimine todos los alimentos o ingresos."
  - code: climate_smart_livestock
    label:
      en: "Climate-smart livestock practices"
      fr: "Pratiques d'élevage climato-intelligentes"
      es: "Prácticas ganaderas climáticamente inteligentes"
    definition:
      en: "Adapting livestock management to heat or drought — including destocking before drought, shifting to heat-tolerant breeds, improving water access for animals, and providing shade structures."
      fr: "Adaptation de la gestion du bétail à la chaleur ou à la sécheresse — y compris le déstockage avant la sécheresse, le passage à des races tolérantes à la chaleur, l'amélioration de l'accès à l'eau pour les animaux et la fourniture d'abris ombragés."
      es: "Adaptación del manejo ganadero al calor o la sequía — incluidos el destock antes de la sequía, el cambio a razas tolerantes al calor, la mejora del acceso al agua para los animales y la provisión de estructuras de sombra."
  - code: flood_defenses
    label:
      en: "Household flood defenses"
      fr: "Défenses contre les inondations au niveau du ménage"
      es: "Defensas contra inundaciones a nivel del hogar"
    definition:
      en: "Measures taken by the household to protect its dwelling or productive assets from flood damage — including elevated floors, flood barriers, and sandbagging."
      fr: "Mesures prises par le ménage pour protéger son logement ou ses actifs productifs contre les dommages liés aux inondations — y compris le rehaussement des planchers, les barrières anti-crue et les sacs de sable."
      es: "Medidas tomadas por el hogar para proteger su vivienda o activos productivos de daños por inundación — incluidos pisos elevados, barreras contra inundaciones y sacos de arena."
  - code: energy_efficient_cookstove
    label:
      en: "Energy-efficient or improved cookstove"
      fr: "Cuisinière économe en énergie ou cuisinière améliorée"
      es: "Cocina de bajo consumo energético o mejorada"
    definition:
      en: "Using a fuel-efficient cookstove that reduces firewood collection needs and dependence on forest resources, relevant when deforestation is worsening local climate risks."
      fr: "Utilisation d'une cuisinière économe en combustible qui réduit les besoins en bois de chauffe et la dépendance aux ressources forestières, pertinent lorsque la déforestation aggrave les risques climatiques locaux."
      es: "Uso de una cocina eficiente en combustible que reduce las necesidades de recolección de leña y la dependencia de recursos forestales, relevante cuando la deforestación empeora los riesgos climáticos locales."
  - code: renewable_energy
    label:
      en: "Renewable energy (solar, wind, biogas)"
      fr: "Énergie renouvelable (solaire, éolien, biogaz)"
      es: "Energía renovable (solar, eólica, biogás)"
    definition:
      en: "Using solar panels, solar lanterns, solar water pumps, wind power, or biogas for energy needs, reducing climate vulnerability from energy price shocks or wood-fuel scarcity."
      fr: "Utilisation de panneaux solaires, lanternes solaires, pompes à eau solaires, énergie éolienne ou biogaz pour les besoins énergétiques, réduisant la vulnérabilité climatique liée aux chocs de prix de l'énergie ou à la pénurie de bois."
      es: "Uso de paneles solares, linternas solares, bombas de agua solares, energía eólica o biogás para necesidades energéticas, reduciendo la vulnerabilidad climática ante choques en precios de energía o escasez de leña."
  - code: early_or_late_planting
    label:
      en: "Adjusted planting dates (early or late)"
      fr: "Dates de plantation ajustées (précoce ou tardive)"
      es: "Fechas de siembra ajustadas (temprana o tardía)"
    definition:
      en: "Changing the timing of crop planting in response to observed shifts in seasonal rainfall onset or temperature patterns."
      fr: "Modification du calendrier de plantation en réponse aux décalages observés dans l'onset des précipitations saisonnières ou les tendances de température."
      es: "Cambio en el calendario de siembra en respuesta a cambios observados en el inicio de las lluvias estacionales o patrones de temperatura."
  - code: post_harvest_storage
    label:
      en: "Improved post-harvest storage"
      fr: "Stockage post-récolte amélioré"
      es: "Almacenamiento post-cosecha mejorado"
    definition:
      en: "Using hermetic bags, silos, or treated storage to reduce post-harvest crop losses, which are exacerbated by higher temperatures and humidity variability."
      fr: "Utilisation de sacs hermétiques, silos ou stockage traité pour réduire les pertes post-récolte, aggravées par la hausse des températures et la variabilité de l'humidité."
      es: "Uso de bolsas herméticas, silos o almacenamiento tratado para reducir las pérdidas post-cosecha, agravadas por el aumento de temperaturas y la variabilidad de la humedad."
  - code: index_or_crop_insurance
    label:
      en: "Crop, livestock, or index insurance"
      fr: "Assurance récolte, bétail ou indicielle"
      es: "Seguro de cultivos, ganadería o índice"
    definition:
      en: "Purchasing weather-index, area-yield, or livestock insurance products to manage climate-related production risk."
      fr: "Achat de produits d'assurance indicielle météorologique, de rendement de zone ou de bétail pour gérer le risque de production lié au climat."
      es: "Compra de productos de seguro de índice meteorológico, rendimiento por área o ganadería para gestionar el riesgo de producción relacionado con el clima."
  - code: none_no_specific_practice
    label:
      en: "None of the above"
      fr: "Aucune de ces pratiques"
      es: "Ninguna de las anteriores"
    definition:
      en: "The household has not adopted any specific climate-smart or climate-adaptive practice. Mutually exclusive with all other codes."
      fr: "Le ménage n'a adopté aucune pratique climato-intelligente ou d'adaptation climatique spécifique. Mutuellement exclusif avec tous les autres codes."
      es: "El hogar no ha adoptado ninguna práctica climáticamente inteligente o de adaptación climática específica. Mutuamente exclusivo con todos los demás códigos."
