id: needs-severity-5
maturity: draft
label:
  en: "Needs severity (5-point JIAF scale)"
  fr: "Sévérité des besoins (échelle JIAF à 5 niveaux)"
  es: "Severidad de necesidades (escala JIAF de 5 niveles)"

definition:
  en: "Five-point Likert severity scale from the Joint Intersectoral Analysis Framework (JIAF) 2.0 Guidance, ranging from 1 (None/Minimal: people cope with no or minor issues) to 5 (Catastrophic: people face extreme life-threatening conditions and cannot cope). Used to record a community's self-reported perception of overall severity. Structurally similar to the IPC Acute Food Insecurity classification."
  fr: "Échelle de sévérité de Likert à cinq niveaux tirée du Guide du Cadre d'analyse intersectoriel conjoint (JIAF) 2.0, allant de 1 (aucun / minime: les personnes gèrent sans problème ou avec des difficultés mineures) à 5 (catastrophique: les personnes font face à des conditions extrêmes menaçant leur vie et ne peuvent pas s'adapter). Utilisée pour enregistrer la perception auto-déclarée de la sévérité globale par la communauté. Structurellement similaire à la classification IPC de l'insécurité alimentaire aiguë."
  es: "Escala Likert de severidad de cinco niveles tomada de la Guía del Marco de Análisis Intersectorial Conjunto (JIAF) 2.0, que va de 1 (ninguna / mínima: las personas afrontan sin problemas o con dificultades menores) a 5 (catastrófica: las personas enfrentan condiciones extremas que ponen en peligro su vida y no pueden afrontarlas). Utilizada para registrar la percepción autorreportada de la severidad global por la comunidad. Estructuralmente similar a la clasificación IPC de inseguridad alimentaria aguda."

standard:
  name: "JIAF 2.0 Guidance: Joint Intersectoral Analysis Framework"
  uri: "https://www.jiaf.info/"
  notes: "The 1–5 severity scale is the normative JIAF 2.0 reference; structurally similar to the IPC Acute Food Insecurity Classification and widely cited alongside it in humanitarian needs analysis."

values:
- code: minimal
  label:
    en: "1: None / minimal"
    fr: "1: Aucun / minime"
    es: "1: Ninguna / mínima"
  definition:
    en: "No or minimal humanitarian conditions; people cope with no or minor issues. JIAF severity level 1."
    fr: "Conditions humanitaires absentes ou minimes ; les personnes s'adaptent sans problème ou avec des difficultés mineures. Niveau de sévérité JIAF 1."
    es: "Condiciones humanitarias ausentes o mínimas; las personas afrontan sin problemas o con dificultades menores. Nivel de severidad JIAF 1."
- code: stress
  label:
    en: "2: Stress"
    fr: "2: Stress"
    es: "2: Estrés"
  definition:
    en: "Stressed conditions; people adopt non-destructive coping strategies. JIAF severity level 2."
    fr: "Conditions de stress ; les personnes adoptent des stratégies d'adaptation non destructives. Niveau de sévérité JIAF 2."
    es: "Condiciones de estrés; las personas adoptan estrategias de afrontamiento no destructivas. Nivel de severidad JIAF 2."
- code: severe
  label:
    en: "3: Severe"
    fr: "3: Sévère"
    es: "3: Severa"
  definition:
    en: "Severe conditions; people use crisis or negative coping strategies; visible reductions in wellbeing. JIAF severity level 3."
    fr: "Conditions sévères ; les personnes recourent à des stratégies d'adaptation de crise ou négatives ; réductions visibles du bien-être. Niveau de sévérité JIAF 3."
    es: "Condiciones severas; las personas utilizan estrategias de afrontamiento de crisis o negativas; reducciones visibles en el bienestar. Nivel de severidad JIAF 3."
- code: extreme
  label:
    en: "4: Extreme"
    fr: "4: Extrême"
    es: "4: Extrema"
  definition:
    en: "Extreme conditions; critical shortages of essential goods and services; high mortality/morbidity risk. JIAF severity level 4."
    fr: "Conditions extrêmes ; pénuries critiques de biens et services essentiels ; risque élevé de mortalité/morbidité. Niveau de sévérité JIAF 4."
    es: "Condiciones extremas; escasez crítica de bienes y servicios esenciales; alto riesgo de mortalidad/morbilidad. Nivel de severidad JIAF 4."
- code: catastrophic
  label:
    en: "5: Catastrophic"
    fr: "5: Catastrophique"
    es: "5: Catastrófica"
  definition:
    en: "Catastrophic conditions; people face extreme life-threatening conditions and cannot cope. JIAF severity level 5."
    fr: "Conditions catastrophiques ; les personnes font face à des conditions extrêmes menaçant leur vie et ne peuvent pas s'adapter. Niveau de sévérité JIAF 5."
    es: "Condiciones catastróficas; las personas enfrentan condiciones extremas que ponen en peligro su vida y no pueden afrontarlas. Nivel de severidad JIAF 5."
