id: iron-supplementation-days
maturity: draft
label:
  en: Iron Supplementation Duration
  fr: "Durée de la supplémentation en fer"
  es: "Duración de la suplementación con hierro"
definition:
  en: "The approximate number of days the woman took iron tablets or iron syrup during the most recent pregnancy, grouped per DHS-8 m46 categories. WHO ANC 2016 recommends daily iron-folic acid supplementation throughout pregnancy; 90 days is the common programmatic minimum. Only asked if anc_iron_supplementation = yes."
  fr: "Le nombre approximatif de jours pendant lesquels la femme a pris des comprimés de fer ou du sirop de fer pendant la grossesse la plus récente, regroupé selon les catégories DHS-8 m46. L'OMS ANC 2016 recommande une supplémentation quotidienne en fer et acide folique pendant toute la grossesse ; 90 jours est le minimum programmatique habituel. Posé uniquement si anc_iron_supplementation = oui."
  es: "El número aproximado de días que la mujer tomó tabletas o jarabe de hierro durante el embarazo más reciente, agrupado según las categorías DHS-8 m46. La OMS ANC 2016 recomienda suplementación diaria de hierro y ácido fólico durante todo el embarazo; 90 días es el mínimo programático habitual. Solo se pregunta si anc_iron_supplementation = sí."
values:
  - code: none
    label:
      en: None (did not take)
      fr: Aucun (n'en a pas pris)
      es: Ninguno (no tomó)
    definition:
      en: "The woman did not take iron supplements during this pregnancy."
      fr: "La femme n'a pas pris de suppléments de fer pendant cette grossesse."
      es: "La mujer no tomó suplementos de hierro durante este embarazo."
  - code: less_than_60
    label:
      en: Less than 60 days
      fr: Moins de 60 jours
      es: Menos de 60 días
    definition:
      en: "Took iron for fewer than 60 days. Well below the WHO minimum recommendation."
      fr: "A pris du fer pendant moins de 60 jours. Bien en dessous du minimum recommandé par l'OMS."
      es: "Tomó hierro durante menos de 60 días. Muy por debajo del mínimo recomendado por la OMS."
  - code: d60_to_89
    label:
      en: 60 to 89 days
      fr: 60 à 89 jours
      es: De 60 a 89 días
    definition:
      en: "Took iron for 60 to 89 days. Below the 90-day programmatic minimum."
      fr: "A pris du fer pendant 60 à 89 jours. En dessous du minimum programmatique de 90 jours."
      es: "Tomó hierro durante 60 a 89 días. Por debajo del mínimo programático de 90 días."
  - code: d90_to_179
    label:
      en: 90 to 179 days
      fr: 90 à 179 jours
      es: De 90 a 179 días
    definition:
      en: "Took iron for 90 to 179 days. Meets the programmatic 90-day minimum."
      fr: "A pris du fer pendant 90 à 179 jours. Satisfait au minimum programmatique de 90 jours."
      es: "Tomó hierro durante 90 a 179 días. Cumple el mínimo programático de 90 días."
  - code: d180_or_more
    label:
      en: 180 or more days
      fr: 180 jours ou plus
      es: 180 días o más
    definition:
      en: "Took iron for 180 or more days. Meets the full-pregnancy recommendation."
      fr: "A pris du fer pendant 180 jours ou plus. Satisfait à la recommandation sur toute la durée de la grossesse."
      es: "Tomó hierro durante 180 o más días. Cumple la recomendación para todo el embarazo."
  - code: dont_know
    label:
      en: Don't know
      fr: Ne sait pas
      es: No sabe
    definition:
      en: "The respondent does not know or does not remember how many days she took iron supplements."
      fr: "La répondante ne sait pas ou ne se souvient pas du nombre de jours pendant lesquels elle a pris des suppléments de fer."
      es: "La encuestada no sabe o no recuerda cuántos días tomó suplementos de hierro."
