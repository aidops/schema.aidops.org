id: gbv-service-type
maturity: draft
label:
  en: "GBV service type"
  fr: "Type de service VBG"
  es: "Tipo de servicio VBG"
definition:
  en: "Types of GBV response services that a household head may be aware of. Based on UNFPA Inter-Agency Minimum Standards (2019) service typology and GBV AoR referral pathway mapping. Used to capture service awareness at household level; does not imply use or disclosure."
  fr: "Types de services de réponse à la VBG dont un chef de ménage peut avoir connaissance. Fondé sur la typologie des services des Normes minimales interagences UNFPA (2019) et la cartographie des filières d'orientation du GBV AoR. Utilisé pour saisir la connaissance des services au niveau du ménage ; n'implique pas d'utilisation ni de divulgation."
  es: "Tipos de servicios de respuesta a la VBG de los que puede tener conocimiento la persona jefa del hogar. Basado en la tipología de servicios de los Estándares Mínimos Interagenciales de UNFPA (2019) y el mapeo de rutas de derivación del GBV AoR. Utilizado para capturar el conocimiento de servicios a nivel del hogar; no implica uso ni divulgación."
values:
  - code: health_medical
    label:
      en: "Health / medical services"
      fr: "Services de santé / médicaux"
      es: "Servicios de salud / médicos"
    definition:
      en: "A clinic, hospital, or mobile health unit providing care for survivors of violence, including PEP, emergency contraception, wound care."
      fr: "Une clinique, un hôpital ou une unité de santé mobile fournissant des soins aux survivant·es de violence, y compris la PEP, la contraception d'urgence et les soins des plaies."
      es: "Una clínica, hospital o unidad de salud móvil que presta atención a sobrevivientes de violencia, incluida la PEP, anticoncepción de emergencia y atención de heridas."
  - code: psychosocial_support
    label:
      en: "Psychosocial support"
      fr: "Soutien psychosocial"
      es: "Apoyo psicosocial"
    definition:
      en: "Counseling, case management, or psychosocial first aid services for GBV survivors."
      fr: "Services de conseil, de gestion de cas ou de premiers secours psychosociaux pour les survivant·es de VBG."
      es: "Servicios de asesoramiento, manejo de casos o primeros auxilios psicosociales para sobrevivientes de VBG."
  - code: legal_aid
    label:
      en: "Legal aid or police"
      fr: "Aide juridique ou police"
      es: "Asistencia jurídica o policía"
    definition:
      en: "Access to legal advice, police reporting, or justice mechanisms for GBV cases."
      fr: "Accès à des conseils juridiques, au dépôt de plainte auprès de la police ou à des mécanismes de justice pour les cas de VBG."
      es: "Acceso a asesoría jurídica, denuncia policial o mecanismos de justicia para casos de VBG."
  - code: shelter_safe_house
    label:
      en: "Shelter or safe house"
      fr: "Hébergement d'urgence ou maison sûre"
      es: "Refugio o casa de acogida"
    definition:
      en: "Temporary safe accommodation for women or girls fleeing violence."
      fr: "Hébergement temporaire sûr pour les femmes ou filles fuyant la violence."
      es: "Alojamiento temporal seguro para mujeres o niñas que huyen de la violencia."
  - code: women_girls_safe_space
    label:
      en: "Women and girls safe space"
      fr: "Espace sûr pour femmes et filles"
      es: "Espacio seguro para mujeres y niñas"
    definition:
      en: "A dedicated safe space or women-friendly space offering information and referrals for women and girls."
      fr: "Un espace sûr dédié ou un espace convivial pour les femmes offrant des informations et des orientations pour les femmes et les filles."
      es: "Un espacio seguro dedicado o un espacio amigable para mujeres que ofrece información y derivaciones para mujeres y niñas."
  - code: community_mobilizer
    label:
      en: "Community mobilizer or hotline"
      fr: "Mobilisateur communautaire ou ligne d'assistance"
      es: "Movilizador comunitario o línea de ayuda"
    definition:
      en: "Community volunteer, information point, or phone hotline for GBV reporting or referral."
      fr: "Volontaire communautaire, point d'information ou ligne téléphonique d'assistance pour le signalement ou l'orientation en cas de VBG."
      es: "Voluntario comunitario, punto de información o línea telefónica de ayuda para denuncias o derivaciones de VBG."
  - code: dont_know_type
    label:
      en: "Knows services exist but not the type"
      fr: "Sait que des services existent mais pas leur type"
      es: "Sabe que existen servicios pero no el tipo"
    definition:
      en: "Respondent is aware that GBV services are available but cannot identify the type of service."
      fr: "Le répondant sait que des services VBG sont disponibles mais ne peut pas identifier le type de service."
      es: "El encuestado sabe que hay servicios VBG disponibles pero no puede identificar el tipo de servicio."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "GBV service type not covered by the above categories."
      fr: "Type de service VBG non couvert par les catégories ci-dessus."
      es: "Tipo de servicio VBG no cubierto por las categorías anteriores."
