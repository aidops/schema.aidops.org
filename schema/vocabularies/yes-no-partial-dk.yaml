id: yes-no-partial-dk
maturity: draft
label:
  en: "Yes / No / Partially / Don't know"
  fr: "Oui / Non / Partiellement / Ne sait pas"
  es: "Sí / No / Parcialmente / No sabe"
definition:
  en: "Four-level response scale for factual questions where a partial or incomplete condition is meaningful and distinct from a full positive or negative response, and where the respondent may genuinely be unable to answer. Used in PastoralFoodSecurityProfile for `fodder_availability` and `migration_routes_disrupted`. 'Partially' captures situations that are neither fully adequate nor fully absent — for example, a migration route that was open on some days but blocked on others, or fodder that was sufficient for part of the recall period but not all. 'Don't know' is a valid response distinct from refusal."
  fr: "Échelle de réponse à quatre niveaux pour les questions factuelles où une condition partielle ou incomplète est significative. 'Partiellement' capture les situations qui ne sont ni pleinement adéquates ni totalement absentes. 'Ne sait pas' est une réponse valide distincte du refus."
  es: "Escala de respuesta de cuatro niveles para preguntas factuales donde una condición parcial o incompleta es significativa. 'Parcialmente' captura situaciones que no son ni plenamente adecuadas ni totalmente ausentes. 'No sabe' es una respuesta válida distinta de la negativa."
values:
  - code: "yes"
    label:
      en: "Yes"
      fr: "Oui"
      es: "Sí"
    definition:
      en: "The condition or event fully applies throughout the recall period."
      fr: "La condition ou l'événement s'applique entièrement tout au long de la période de rappel."
      es: "La condición o evento aplica completamente durante todo el período de recordatorio."
  - code: partially
    label:
      en: "Partially"
      fr: "Partiellement"
      es: "Parcialmente"
    definition:
      en: "The condition or event partially applies — for example, a migration route that was open on some days but blocked on others, or fodder that was sufficient for part but not all of the recall period."
      fr: "La condition ou l'événement s'applique partiellement — par exemple, une route de migration ouverte certains jours mais bloquée d'autres jours, ou un fourrage suffisant une partie mais pas toute la période de rappel."
      es: "La condición o evento aplica parcialmente — por ejemplo, una ruta de migración abierta en algunos días pero bloqueada en otros, o forraje suficiente parte pero no todo el período de recordatorio."
  - code: "no"
    label:
      en: "No"
      fr: "Non"
      es: "No"
    definition:
      en: "The condition or event does not apply during the recall period."
      fr: "La condition ou l'événement ne s'applique pas pendant la période de rappel."
      es: "La condición o evento no aplica durante el período de recordatorio."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent does not know the answer. This is a valid response and must not be re-coded as 'no' or missing."
      fr: "Le répondant ne connaît pas la réponse. Il s'agit d'une réponse valide qui ne doit pas être recodée comme 'non' ou manquante."
      es: "El encuestado no sabe la respuesta. Esta es una respuesta válida y no debe recodificarse como 'no' o faltante."
