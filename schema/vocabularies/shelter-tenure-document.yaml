id: shelter-tenure-document
maturity: draft
label:
  en: Shelter Tenure Document Type
  fr: "Type de document d'occupation d'abri"
  es: "Tipo de documento de tenencia de refugio"
definition:
  en: "The type of agreement or document the household holds for the shelter it currently occupies. Based on Sphere Standard 6 security-of-tenure guidance and the UNHCR Housing, Land and Property (HLP) framework."
  fr: "Le type d'accord ou de document que le ménage détient pour l'abri qu'il occupe actuellement. Basé sur les orientations de sécurité d'occupation de la Norme Sphère 6 et le cadre HLP du HCR (Logement, Terres et Propriété)."
  es: "El tipo de acuerdo o documento que el hogar posee para el refugio que ocupa actualmente. Basado en la orientación de seguridad de tenencia de la Norma Esfera 6 y el marco HLP del ACNUR (Vivienda, Tierra y Propiedad)."
standard:
  name: "Sphere Handbook 2018, Standard 6 — Security of Tenure"
  uri: "https://spherestandards.org/handbook-2018/"
values:
- code: written_formal_lease
  label:
    en: Written formal lease or rental agreement
    fr: "Bail formel écrit ou contrat de location"
    es: "Contrato de arrendamiento formal escrito"
  definition:
    en: "Legally binding written agreement with a landlord or property owner, signed by both parties and potentially registered with authorities."
    fr: "Accord écrit juridiquement contraignant avec un propriétaire, signé par les deux parties et éventuellement enregistré auprès des autorités."
    es: "Acuerdo escrito legalmente vinculante con un arrendador o propietario, firmado por ambas partes y potencialmente registrado ante las autoridades."
- code: written_informal_agreement
  label:
    en: Written informal agreement
    fr: "Accord informel écrit"
    es: "Acuerdo informal escrito"
  definition:
    en: "Written letter or agreement between the parties without formal legal registration."
    fr: "Lettre ou accord écrit entre les parties sans enregistrement légal formel."
    es: "Carta o acuerdo escrito entre las partes sin registro legal formal."
- code: verbal_agreement
  label:
    en: Verbal agreement only
    fr: "Accord verbal uniquement"
    es: "Acuerdo verbal únicamente"
  definition:
    en: "Oral agreement between the household and a landlord, host, or authority with no written documentation."
    fr: "Accord oral entre le ménage et un propriétaire, hôte ou autorité sans documentation écrite."
    es: "Acuerdo oral entre el hogar y un arrendador, anfitrión o autoridad sin documentación escrita."
- code: customary_arrangement
  label:
    en: Customary or community-based arrangement
    fr: "Arrangement coutumier ou communautaire"
    es: "Arreglo consuetudinario o comunitario"
  definition:
    en: "Tenure governed by community or customary norms without written documentation, recognised locally but not by formal legal systems."
    fr: "Occupation régie par des normes communautaires ou coutumières sans documentation écrite, reconnue localement mais pas par les systèmes juridiques formels."
    es: "Tenencia regida por normas comunitarias o consuetudinarias sin documentación escrita, reconocida localmente pero no por los sistemas jurídicos formales."
- code: programme_allocation
  label:
    en: Programme allocation letter
    fr: "Lettre d'attribution de programme"
    es: "Carta de asignación de programa"
  definition:
    en: "Letter or document from a humanitarian agency or government programme allocating the shelter to the household for the duration of an assistance programme."
    fr: "Lettre ou document d'une agence humanitaire ou d'un programme gouvernemental attribuant l'abri au ménage pour la durée d'un programme d'assistance."
    es: "Carta o documento de una agencia humanitaria o programa gubernamental que asigna el refugio al hogar durante la duración de un programa de asistencia."
- code: ownership_document
  label:
    en: Title deed or ownership document
    fr: "Titre de propriété ou document de propriété"
    es: "Escritura de propiedad o documento de titularidad"
  definition:
    en: "Formal title deed, certificate of ownership, or equivalent state-issued document proving the household's legal ownership of the shelter."
    fr: "Titre de propriété formel, certificat de propriété ou document équivalent délivré par l'État prouvant la propriété légale de l'abri par le ménage."
    es: "Escritura de propiedad formal, certificado de propiedad o documento equivalente emitido por el Estado que prueba la propiedad legal del refugio por parte del hogar."
- code: no_agreement
  label:
    en: No agreement
    fr: "Aucun accord"
    es: "Sin acuerdo"
  definition:
    en: "The household occupies the shelter without any agreement, permission, or acknowledgement from a landlord or authority."
    fr: "Le ménage occupe l'abri sans aucun accord, permission ou reconnaissance d'un propriétaire ou d'une autorité."
    es: "El hogar ocupa el refugio sin ningún acuerdo, permiso o reconocimiento de un arrendador o autoridad."
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: "Agreement or document type not covered by the above categories."
    fr: "Type d'accord ou de document non couvert par les catégories ci-dessus."
    es: "Tipo de acuerdo o documento no cubierto por las categorías anteriores."
