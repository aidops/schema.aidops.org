id: water-treatment-method
maturity: draft
label:
  en: Water Treatment Method
  fr: "Méthode de traitement de l'eau"
  es: "Método de tratamiento del agua"
definition:
  en: "Method used by the household to treat drinking water to make it safer. The JMP 2018 classifies boiling, chlorination, ceramic/sand/other filter, and solar disinfection as adequate treatment methods. Straining through cloth and letting stand and settle are classified as inadequate. Multi-select."
  fr: "Méthode utilisée par le ménage pour traiter l'eau potable afin de la rendre plus sûre. Le JMP 2018 classe l'ébullition, la chloration, les filtres céramique/sable/autres et la désinfection solaire comme méthodes de traitement adéquates. Filtrer à travers un tissu et laisser décanter sont classées comme inadéquates. Sélection multiple."
  es: "Método utilizado por el hogar para tratar el agua de bebida para hacerla más segura. El JMP 2018 clasifica la ebullición, la cloración, los filtros cerámicos/de arena/otros y la desinfección solar como métodos de tratamiento adecuados. Colar a través de tela y dejar reposar y asentar se clasifican como inadecuados. Selección múltiple."
standard:
  name: "JMP Core Questions for Household Surveys (2018 Update)"
  uri: "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"
  notes: "DHS hv237a and MICS use compatible codes. JMP adequate methods: boil, add_chlorine_or_bleach, use_ceramic_sand_or_other_filter, solar_disinfection. Inadequate: let_stand_and_settle, strain_through_cloth."
values:
- code: boil
  label:
    en: Boil
    fr: Bouillir
    es: Hervir
  definition:
    en: "Water is brought to a rolling boil before drinking. Classified as adequate treatment by the JMP."
    fr: "L'eau est portée à ébullition complète avant d'être bue. Classée comme traitement adéquat par le JMP."
    es: "El agua se lleva a ebullición completa antes de beber. Clasificada como tratamiento adecuado por el JMP."
- code: add_chlorine_or_bleach
  label:
    en: Add chlorine/bleach
    fr: Ajouter du chlore/de l'eau de Javel
    es: "Agregar cloro/lejía"
  definition:
    en: "Chemical disinfection using chlorine tablets, solution, or household bleach. Classified as adequate treatment by the JMP."
    fr: "Désinfection chimique à l'aide de comprimés de chlore, d'une solution chlorée ou d'eau de Javel ménagère. Classée comme traitement adéquat par le JMP."
    es: "Desinfección química usando tabletas de cloro, solución clorada o lejía doméstica. Clasificada como tratamiento adecuado por el JMP."
- code: use_ceramic_sand_or_other_filter
  label:
    en: Use ceramic, sand, or other filter
    fr: "Utiliser un filtre céramique, sable ou autre"
    es: "Usar filtro cerámico, de arena u otro"
  definition:
    en: "Physical filtration through a ceramic pot filter, biosand filter, or other filter medium. Classified as adequate treatment by the JMP."
    fr: "Filtration physique à travers un filtre en pot céramique, un filtre biosable ou un autre milieu filtrant. Classée comme traitement adéquat par le JMP."
    es: "Filtración física a través de un filtro de maceta cerámica, filtro de bioarena u otro medio filtrante. Clasificada como tratamiento adecuado por el JMP."
- code: solar_disinfection
  label:
    en: Solar disinfection (SODIS)
    fr: "Désinfection solaire (SODIS)"
    es: "Desinfección solar (SODIS)"
  definition:
    en: "Water is placed in transparent plastic or glass bottles and exposed to direct sunlight for at least 6 hours. Classified as adequate treatment by the JMP."
    fr: "L'eau est placée dans des bouteilles en plastique transparent ou en verre et exposée à la lumière directe du soleil pendant au moins 6 heures. Classée comme traitement adéquat par le JMP."
    es: "El agua se coloca en botellas de plástico transparente o vidrio y se expone a la luz solar directa durante al menos 6 horas. Clasificada como tratamiento adecuado por el JMP."
- code: let_stand_and_settle
  label:
    en: Let it stand and settle
    fr: Laisser décanter
    es: Dejar reposar y asentar
  definition:
    en: "Water is left undisturbed to allow sediment to settle before drinking. Classified as inadequate treatment by the JMP because it does not reliably remove pathogens."
    fr: "L'eau est laissée au repos pour permettre aux sédiments de se déposer avant d'être bue. Classée comme traitement inadéquat par le JMP car elle n'élimine pas de manière fiable les agents pathogènes."
    es: "El agua se deja en reposo para que el sedimento se asiente antes de beber. Clasificada como tratamiento inadecuado por el JMP porque no elimina patógenos de manera confiable."
- code: strain_through_cloth
  label:
    en: Strain through cloth
    fr: Filtrer à travers un tissu
    es: Colar a través de tela
  definition:
    en: "Water is poured through a cloth to remove visible particles. Classified as inadequate treatment by the JMP because it does not reliably remove pathogens."
    fr: "L'eau est versée à travers un tissu pour éliminer les particules visibles. Classée comme traitement inadéquat par le JMP car elle n'élimine pas de manière fiable les agents pathogènes."
    es: "El agua se vierte a través de una tela para eliminar las partículas visibles. Clasificada como tratamiento inadecuado por el JMP porque no elimina patógenos de manera confiable."
- code: use_electric_purifier
  label:
    en: Use electric purifier
    fr: "Utiliser un purificateur électrique"
    es: "Usar purificador eléctrico"
  definition:
    en: "Water is treated using an electric UV or electrochlorination purifier. Increasingly common in urban households. Classification as adequate or inadequate depends on device type and maintenance."
    fr: "L'eau est traitée à l'aide d'un purificateur UV électrique ou d'électrochloration. De plus en plus courant dans les ménages urbains. La classification comme adéquat ou inadéquat dépend du type d'appareil et de l'entretien."
    es: "El agua se trata usando un purificador eléctrico UV o de electrocloro. Cada vez más común en hogares urbanos. La clasificación como adecuado o inadecuado depende del tipo de dispositivo y su mantenimiento."
- code: other
  label:
    en: Other method
    fr: Autre méthode
    es: Otro método
  definition:
    en: "A treatment method not covered by the other categories."
    fr: "Une méthode de traitement non couverte par les autres catégories."
    es: "Un método de tratamiento no cubierto por las otras categorías."

