id: cash-modality-acceptance
maturity: draft
label:
  en: Cash Modality Acceptance
  fr: Acceptation de la modalité de paiement
  es: Aceptación de la modalidad de pago
definition:
  en: >
    The proportion of active vendors at a market who accept a specified payment
    modality (physical cash or mobile money), expressed as an ordinal category.
    Used for both physical-cash acceptance (F1) and mobile money acceptance (F2)
    questions in the CBI feasibility module. Sources: CaLP MISMA Standard 2,
    JMMI cash acceptance variable, MARKit cash feasibility block. Potentially
    reusable in future VendorProfile or CashRecipientProfile contexts.
  fr: >
    La proportion des vendeurs actifs sur un marché qui acceptent une modalité
    de paiement spécifiée (espèces physiques ou mobile money), exprimée en
    catégorie ordinale. Utilisé pour les questions d'acceptation des espèces
    physiques (F1) et du mobile money (F2) dans le module de faisabilité CBI.
    Sources : Standard 2 CaLP MISMA, variable d'acceptation des paiements JMMI,
    bloc de faisabilité des espèces MARKit.
  es: >
    La proporción de vendedores activos en un mercado que aceptan una modalidad
    de pago especificada (efectivo físico o dinero móvil), expresada como
    categoría ordinal. Se utiliza para las preguntas de aceptación de efectivo
    físico (F1) y dinero móvil (F2) en el módulo de viabilidad CBI. Fuentes:
    Estándar 2 CaLP MISMA, variable de aceptación de pagos JMMI, bloque de
    viabilidad de efectivo MARKit.
values:
- code: all_vendors
  label:
    en: "All or nearly all vendors (>90%)"
    fr: "Tous ou presque tous les vendeurs (>90%)"
    es: "Todos o casi todos los vendedores (>90%)"
  definition:
    en: "More than 90% of active vendors at this market accept this payment modality."
    fr: "Plus de 90 % des vendeurs actifs de ce marché acceptent cette modalité de paiement."
    es: "Más del 90 % de los vendedores activos en este mercado aceptan esta modalidad de pago."
- code: most_vendors
  label:
    en: "Most vendors (50–90%)"
    fr: "La plupart des vendeurs (50–90%)"
    es: "La mayoría de los vendedores (50–90%)"
  definition:
    en: "Between 50% and 90% of active vendors accept this modality."
    fr: "Entre 50 % et 90 % des vendeurs actifs acceptent cette modalité."
    es: "Entre el 50 % y el 90 % de los vendedores activos aceptan esta modalidad."
- code: some_vendors
  label:
    en: "Some vendors (10–50%)"
    fr: "Certains vendeurs (10–50%)"
    es: "Algunos vendedores (10–50%)"
  definition:
    en: "Between 10% and 50% of active vendors accept this modality."
    fr: "Entre 10 % et 50 % des vendeurs actifs acceptent cette modalité."
    es: "Entre el 10 % y el 50 % de los vendedores activos aceptan esta modalidad."
- code: no_vendors
  label:
    en: "No vendors or very few (<10%)"
    fr: "Aucun vendeur ou très peu (<10%)"
    es: "Ningún vendedor o muy pocos (<10%)"
  definition:
    en: "Fewer than 10% of active vendors accept this modality."
    fr: "Moins de 10 % des vendeurs actifs acceptent cette modalité."
    es: "Menos del 10 % de los vendedores activos aceptan esta modalidad."
- code: dont_know
  label:
    en: Don't know
    fr: Ne sait pas
    es: No sabe
  definition:
    en: "Enumerator cannot assess the proportion of accepting vendors."
    fr: "L'enquêteur ne peut pas évaluer la proportion de vendeurs acceptant cette modalité."
    es: "El enumerador no puede evaluar la proporción de vendedores que aceptan esta modalidad."
