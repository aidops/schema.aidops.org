# AO-borderline: IOM DTM and REACH use similar typologies but no international
# standard vocabulary exists. Could become an AO-shared vocabulary if other
# profiles require it; flag for review.
id: protection-violence-type
maturity: draft
label:
  en: "Protection violence type"
  fr: "Type de violence (protection)"
  es: "Tipo de violencia (protección)"
definition:
  en: "Types of non-GBV violence experienced or witnessed at the household level. GBV incidents are NOT included in this vocabulary. Record only what the respondent mentions voluntarily; do not probe for details. If abduction_kidnapping, forced_recruitment, or arbitrary_detention is selected, do not ask any follow-up questions. Based on GPC PAF Domain 1 (Physical Safety and Security); REACH Syria / Yemen (2022) Physical Safety module; IOM DTM Protection Monitoring incident typology; ICRC Enhancing Protection for Civilians in Armed Conflict (2018)."
  fr: "Types de violence non-VBG vécus ou dont des témoins ont été membres du ménage. Les incidents VBG ne sont PAS inclus dans ce vocabulaire. Enregistrer uniquement ce que le répondant mentionne volontairement ; ne pas chercher à obtenir des détails. Si abduction_kidnapping, forced_recruitment ou arbitrary_detention est sélectionné, ne poser aucune question de suivi. Fondé sur GPC PAF Domaine 1 (Sécurité physique et sûreté) ; module Sécurité physique REACH Syrie/Yémen (2022) ; typologie des incidents de Suivi de la protection DTM de l'OIM ; CICR Améliorer la protection des civils dans les conflits armés (2018)."
  es: "Tipos de violencia no-VBG experimentada o presenciada a nivel del hogar. Los incidentes de VBG NO están incluidos en este vocabulario. Registrar solo lo que el encuestado menciona voluntariamente; no indagar por detalles. Si se selecciona abduction_kidnapping, forced_recruitment o arbitrary_detention, no hacer preguntas de seguimiento. Basado en GPC PAF Dominio 1 (Seguridad Física); módulo de Seguridad Física de REACH Siria/Yemen (2022); tipología de incidentes de Monitoreo de Protección DTM de la OIM; CICR Mejora de la Protección de Civiles en Conflictos Armados (2018)."
values:
  - code: physical_attack
    label:
      en: "Physical attack on a person"
      fr: "Agression physique contre une personne"
      es: "Ataque físico contra una persona"
    definition:
      en: "Beating, wounding, or physical attack on a household member by a person or group."
      fr: "Passage à tabac, blessure ou agression physique d'un membre du ménage par une personne ou un groupe."
      es: "Golpiza, herida o ataque físico contra un miembro del hogar por una persona o grupo."
  - code: shelling_airstrike
    label:
      en: "Shelling, airstrike, or bombing of civilian area"
      fr: "Bombardement, frappe aérienne ou explosion dans une zone civile"
      es: "Bombardeo, ataque aéreo o explosión en zona civil"
    definition:
      en: "Deliberate or indiscriminate use of explosive weapons in or near civilian areas."
      fr: "Utilisation délibérée ou aveugle d'armes explosives dans des zones civiles ou à proximité."
      es: "Uso deliberado o indiscriminado de armas explosivas en o cerca de zonas civiles."
  - code: forced_entry_search
    label:
      en: "Forced entry or search of home"
      fr: "Entrée forcée ou fouille du domicile"
      es: "Entrada forzada o registro del hogar"
    definition:
      en: "Unauthorized or forced entry into the household's dwelling by armed actors or security forces."
      fr: "Entrée non autorisée ou forcée dans le logement du ménage par des acteurs armés ou des forces de sécurité."
      es: "Entrada no autorizada o forzada en la vivienda del hogar por actores armados o fuerzas de seguridad."
  - code: looting_theft
    label:
      en: "Looting or theft"
      fr: "Pillage ou vol"
      es: "Saqueo o robo"
    definition:
      en: "Household belongings, livestock, or assets taken by force or under threat."
      fr: "Effets personnels, bétail ou biens du ménage pris par la force ou sous la menace."
      es: "Pertenencias, ganado o activos del hogar tomados por la fuerza o bajo amenaza."
  - code: abduction_kidnapping
    label:
      en: "Abduction or kidnapping"
      fr: "Enlèvement ou séquestration"
      es: "Secuestro o rapto"
    definition:
      en: "A household member was abducted or held against their will by a non-state or state actor. Do not probe further if this code is selected."
      fr: "Un membre du ménage a été enlevé ou retenu contre sa volonté par un acteur non étatique ou étatique. Ne pas approfondir si ce code est sélectionné."
      es: "Un miembro del hogar fue secuestrado o retenido contra su voluntad por un actor no estatal o estatal. No indagar más si se selecciona este código."
  - code: arbitrary_detention
    label:
      en: "Arbitrary detention"
      fr: "Détention arbitraire"
      es: "Detención arbitraria"
    definition:
      en: "A household member was detained without explanation, charges, or due process. Do not probe further if this code is selected. See also arbitrary_detention_experienced for the standalone indicator."
      fr: "Un membre du ménage a été détenu sans explication, sans charges ni procédure régulière. Ne pas approfondir si ce code est sélectionné. Voir aussi arbitrary_detention_experienced pour l'indicateur autonome."
      es: "Un miembro del hogar fue detenido sin explicación, cargos o debido proceso. No indagar más si se selecciona este código. Ver también arbitrary_detention_experienced para el indicador independiente."
  - code: forced_recruitment
    label:
      en: "Forced recruitment"
      fr: "Recrutement forcé"
      es: "Reclutamiento forzado"
    definition:
      en: "A household member was forcibly recruited into an armed group or military force. Do not probe further if this code is selected."
      fr: "Un membre du ménage a été recruté de force dans un groupe armé ou une force militaire. Ne pas approfondir si ce code est sélectionné."
      es: "Un miembro del hogar fue reclutado forzosamente en un grupo armado o fuerza militar. No indagar más si se selecciona este código."
  - code: threat_harassment
    label:
      en: "Threats or harassment"
      fr: "Menaces ou harcèlement"
      es: "Amenazas o acoso"
    definition:
      en: "Serious threats, intimidation, or sustained harassment directed at household members."
      fr: "Menaces graves, intimidation ou harcèlement soutenu à l'encontre de membres du ménage."
      es: "Amenazas graves, intimidación o acoso sostenido dirigido a miembros del hogar."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Violence type not covered by the above categories."
      fr: "Type de violence non couvert par les catégories ci-dessus."
      es: "Tipo de violencia no cubierto por las categorías anteriores."
