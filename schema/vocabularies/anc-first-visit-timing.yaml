id: anc-first-visit-timing
maturity: draft
label:
  en: ANC First Visit Trimester
  fr: "Trimestre du premier contact prénatal"
  es: "Trimestre de la primera visita de APN"
definition:
  en: "The trimester in which the first antenatal care contact occurred, grouped from DHS-8 m13 (months pregnant at first ANC). WHO 2016 recommends the first contact in the first trimester (before 4 months). DHS-8 rh_anc_moprg groups: first trimester (<4 months), second trimester (4-6 months), third trimester (7+ months)."
  fr: "Le trimestre au cours duquel le premier contact de soins prénataux a eu lieu, regroupé à partir du DHS-8 m13 (mois de grossesse au premier CPN). L'OMS 2016 recommande le premier contact au cours du premier trimestre (avant 4 mois). Groupes DHS-8 rh_anc_moprg : premier trimestre (< 4 mois), deuxième trimestre (4-6 mois), troisième trimestre (7 mois ou plus)."
  es: "El trimestre en que ocurrió el primer contacto de atención prenatal, agrupado a partir de DHS-8 m13 (meses de embarazo en la primera APN). La OMS 2016 recomienda el primer contacto en el primer trimestre (antes de los 4 meses). Grupos DHS-8 rh_anc_moprg: primer trimestre (<4 meses), segundo trimestre (4-6 meses), tercer trimestre (7+ meses)."
values:
  - code: first_trimester
    label:
      en: First trimester (before 4 months)
      fr: Premier trimestre (avant 4 mois)
      es: Primer trimestre (antes de los 4 meses)
    definition:
      en: "First ANC contact occurred before 4 months of pregnancy. Meets the WHO 2016 recommendation for early initiation."
      fr: "Le premier contact CPN a eu lieu avant 4 mois de grossesse. Satisfait à la recommandation OMS 2016 pour une initiation précoce."
      es: "El primer contacto APN ocurrió antes de los 4 meses de embarazo. Cumple la recomendación OMS 2016 para inicio temprano."
  - code: second_trimester
    label:
      en: Second trimester (4 to 6 months)
      fr: Deuxième trimestre (4 à 6 mois)
      es: Segundo trimestre (4 a 6 meses)
    definition:
      en: "First ANC contact occurred between 4 and 6 months of pregnancy."
      fr: "Le premier contact CPN a eu lieu entre 4 et 6 mois de grossesse."
      es: "El primer contacto APN ocurrió entre los 4 y 6 meses de embarazo."
  - code: third_trimester
    label:
      en: Third trimester (7 months or later)
      fr: "Troisième trimestre (7 mois ou plus)"
      es: Tercer trimestre (7 meses o más)
    definition:
      en: "First ANC contact occurred at 7 or more months of pregnancy. Late initiation."
      fr: "Le premier contact CPN a eu lieu à 7 mois de grossesse ou plus. Initiation tardive."
      es: "El primer contacto APN ocurrió a los 7 o más meses de embarazo. Inicio tardío."
  - code: no_anc
    label:
      en: No ANC
      fr: Aucun CPN
      es: Sin APN
    definition:
      en: "No antenatal care was received during this pregnancy."
      fr: "Aucun soin prénatal n'a été reçu pendant cette grossesse."
      es: "No se recibió atención prenatal durante este embarazo."
  - code: dont_know
    label:
      en: Don't know
      fr: Ne sait pas
      es: No sabe
    definition:
      en: "The respondent does not know or does not remember when the first visit occurred."
      fr: "La répondante ne sait pas ou ne se souvient pas du moment du premier contact."
      es: "La encuestada no sabe o no recuerda cuándo ocurrió la primera visita."
