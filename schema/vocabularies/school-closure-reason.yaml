id: school-closure-reason
maturity: draft
label:
  en: School Closure Reason
  fr: "Raison de fermeture scolaire"
  es: "Razón de cierre escolar"
definition:
  en: "Causes for which a school has been closed during the reference period. Used for multi-select capture of school disruption events. Emergency-context indicator per INEE Minimum Standards; sourced from MICS6 PR12."
  fr: "Causes pour lesquelles une école a été fermée pendant la période de référence. Utilisé pour la saisie multi-sélection des événements de perturbation scolaire. Indicateur de contexte d'urgence selon les Normes minimales de l'INEE ; issu de MICS6 PR12."
  es: "Causas por las que una escuela ha sido cerrada durante el período de referencia. Utilizado para la captura de selección múltiple de eventos de interrupción escolar. Indicador de contexto de emergencia según las Normas Mínimas del INEE; derivado de MICS6 PR12."
standard:
  name: "MICS6 PR12 — school closure reasons"
  uri: https://mics.unicef.org/tools
  notes: "MICS6 PR12 probes four types of school closure in the last 12 months: natural disaster, man-made disaster or conflict, teacher strike, and other. The INEE Minimum Standards (2024) flag this item as essential for emergency-context education monitoring."
values:
- code: natural_disaster
  label:
    en: Natural disaster
    fr: "Catastrophe naturelle"
    es: "Desastre natural"
  definition:
    en: "School closed due to a natural hazard event (flood, earthquake, cyclone, etc.)."
    fr: "École fermée en raison d'un événement de danger naturel (inondation, tremblement de terre, cyclone, etc.)."
    es: "Escuela cerrada debido a un evento de peligro natural (inundación, terremoto, ciclón, etc.)."
- code: conflict_manmade
  label:
    en: Man-made disaster or conflict
    fr: "Catastrophe d'origine humaine ou conflit"
    es: "Desastre provocado por el hombre o conflicto"
  definition:
    en: "School closed due to armed conflict, civil unrest, or other man-made disaster. May indicate exposure to conflict or displacement."
    fr: "École fermée en raison d'un conflit armé, d'une agitation civile ou d'une autre catastrophe d'origine humaine. Peut indiquer une exposition à un conflit ou un déplacement."
    es: "Escuela cerrada debido a conflicto armado, disturbios civiles u otro desastre provocado por el hombre. Puede indicar exposición a conflicto o desplazamiento."
- code: teacher_strike
  label:
    en: Teacher strike
    fr: "Grève des enseignants"
    es: "Huelga de docentes"
  definition:
    en: "School closed due to a teacher or education worker strike."
    fr: "École fermée en raison d'une grève des enseignants ou des travailleurs de l'éducation."
    es: "Escuela cerrada debido a una huelga de docentes o trabajadores de la educación."
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: "School closure for a reason not captured by the other categories."
    fr: "Fermeture scolaire pour une raison non couverte par les autres catégories."
    es: "Cierre escolar por una razón no contemplada en las demás categorías."
