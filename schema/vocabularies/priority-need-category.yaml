id: priority-need-category
maturity: draft
label:
  en: Priority Need Category
  fr: "Catégorie de besoin prioritaire"
  es: "Categoría de necesidad prioritaria"

definition:
  en: "Humanitarian sector taxonomy used to encode a community's self-reported priority needs ranking. Aligned with the IASC cluster system, the JIAF 2.0 sector taxonomy, the IOM DTM Site Assessment priority-needs question options, and the OCHA HNO sector taxonomy. Each code represents one high-level sector into which a community may classify its most urgent need."
  fr: "Taxonomie sectorielle humanitaire utilisée pour coder le classement des besoins prioritaires auto-déclarés par la communauté. Alignée sur le système des clusters de l'IASC, la taxonomie sectorielle JIAF 2.0, les options de la question « besoins prioritaires » de l'évaluation de site DTM de l'OIM et la taxonomie sectorielle du HNO de l'OCHA. Chaque code représente un secteur de haut niveau dans lequel une communauté peut classer son besoin le plus urgent."
  es: "Taxonomía sectorial humanitaria utilizada para codificar el ranking de necesidades prioritarias autorreportadas por la comunidad. Alineada con el sistema de clusters del IASC, la taxonomía sectorial del JIAF 2.0, las opciones de la pregunta de necesidades prioritarias del Site Assessment de la DTM de la OIM y la taxonomía sectorial del HNO de OCHA. Cada código representa un sector de alto nivel al que la comunidad puede asignar su necesidad más urgente."

standard:
  name: "IASC MIRA Community Level Assessment priority needs question"
  uri: "https://interagencystandingcommittee.org/operational-response/mira-multi-clustersector-initial-rapid-assessment-guidance-note-2015"
  notes: "Sector labels align with the IASC cluster system and the JIAF 2.0 sector taxonomy; question wording and response options are drawn from the MIRA Community Level Assessment form and the IOM DTM Site Assessment priority-needs module."

values:
- code: food
  label:
    en: "Food / food security"
    fr: "Alimentation / sécurité alimentaire"
    es: "Alimentación / seguridad alimentaria"
  definition:
    en: "Access to sufficient, nutritious food."
    fr: "Accès à une alimentation suffisante et nutritive."
    es: "Acceso a alimentos suficientes y nutritivos."
- code: water
  label:
    en: "Drinking water"
    fr: "Eau de boisson"
    es: "Agua potable"
  definition:
    en: "Access to a sufficient quantity of safe drinking water."
    fr: "Accès à une quantité suffisante d'eau de boisson salubre."
    es: "Acceso a una cantidad suficiente de agua potable segura."
- code: shelter
  label:
    en: "Shelter"
    fr: "Abri"
    es: "Refugio"
  definition:
    en: "Habitable, safe shelter, including repair, construction, or rental support."
    fr: "Abri habitable et sûr, y compris le soutien à la réparation, à la construction ou à la location."
    es: "Refugio habitable y seguro, incluido apoyo a reparación, construcción o alquiler."
- code: health
  label:
    en: "Health care"
    fr: "Soins de santé"
    es: "Atención de salud"
  definition:
    en: "Access to primary, secondary, or specialised health services and medicines."
    fr: "Accès aux services et médicaments de santé primaires, secondaires ou spécialisés."
    es: "Acceso a servicios y medicamentos de salud primarios, secundarios o especializados."
- code: protection
  label:
    en: "Protection"
    fr: "Protection"
    es: "Protección"
  definition:
    en: "Safety from violence, exploitation, and abuse, including gender-based violence and child-protection services."
    fr: "Protection contre la violence, l'exploitation et les abus, y compris les services de lutte contre la violence basée sur le genre et de protection de l'enfance."
    es: "Protección contra la violencia, la explotación y el abuso, incluidos los servicios de violencia basada en género y protección de la niñez."
- code: education
  label:
    en: "Education"
    fr: "Éducation"
    es: "Educación"
  definition:
    en: "Access to learning for children and adolescents."
    fr: "Accès à l'apprentissage pour les enfants et les adolescents."
    es: "Acceso al aprendizaje para niños y adolescentes."
- code: cash
  label:
    en: "Cash / multi-purpose cash"
    fr: "Espèces / aide en espèces à usages multiples"
    es: "Efectivo / transferencia multipropósito en efectivo"
  definition:
    en: "Unrestricted or sector-specific cash assistance."
    fr: "Aide en espèces non affectée ou spécifique à un secteur."
    es: "Asistencia en efectivo sin restricciones o específica por sector."
- code: livelihood
  label:
    en: "Livelihood support"
    fr: "Appui aux moyens d'existence"
    es: "Apoyo a medios de vida"
  definition:
    en: "Income generation, vocational training, agricultural inputs, market access."
    fr: "Génération de revenus, formation professionnelle, intrants agricoles, accès aux marchés."
    es: "Generación de ingresos, formación profesional, insumos agrícolas, acceso a mercados."
- code: hygiene
  label:
    en: "Hygiene / sanitation"
    fr: "Hygiène / assainissement"
    es: "Higiene / saneamiento"
  definition:
    en: "Latrines, hygiene items, menstrual hygiene materials, waste management."
    fr: "Latrines, articles d'hygiène, matériel pour l'hygiène menstruelle, gestion des déchets."
    es: "Letrinas, artículos de higiene, materiales para la higiene menstrual, gestión de residuos."
- code: nfi
  label:
    en: "Non-food items (NFI)"
    fr: "Articles non alimentaires (ANA)"
    es: "Artículos no alimentarios"
  definition:
    en: "Blankets, clothing, cooking sets, household essentials."
    fr: "Couvertures, vêtements, batteries de cuisine, articles de première nécessité."
    es: "Mantas, ropa, utensilios de cocina, artículos esenciales del hogar."
- code: energy
  label:
    en: "Energy / fuel"
    fr: "Énergie / combustible"
    es: "Energía / combustible"
  definition:
    en: "Cooking fuel, lighting, electricity for household use."
    fr: "Combustible de cuisson, éclairage, électricité à usage domestique."
    es: "Combustible para cocinar, iluminación, electricidad para uso doméstico."
- code: information
  label:
    en: "Information / communication"
    fr: "Information / communication"
    es: "Información / comunicación"
  definition:
    en: "Access to timely information about services, rights, and the humanitarian response."
    fr: "Accès à une information opportune sur les services, les droits et la réponse humanitaire."
    es: "Acceso a información oportuna sobre servicios, derechos y la respuesta humanitaria."
- code: psychosocial
  label:
    en: "Mental health / psychosocial support (MHPSS)"
    fr: "Santé mentale / soutien psychosocial (SMSPS)"
    es: "Salud mental / apoyo psicosocial (SMAPS)"
  definition:
    en: "Psychosocial support and mental health services."
    fr: "Soutien psychosocial et services de santé mentale."
    es: "Apoyo psicosocial y servicios de salud mental."
- code: other
  label:
    en: "Other"
    fr: "Autre"
    es: "Otra"
  definition:
    en: "Priority need not covered by the above categories; use the associated free-text field to describe."
    fr: "Besoin prioritaire non couvert par les catégories ci-dessus ; utiliser le champ en texte libre associé pour décrire."
    es: "Necesidad prioritaria no cubierta por las categorías anteriores; utilizar el campo de texto libre asociado para describir."
