id: electricity-appliance-tier
maturity: draft
label:
  en: Electricity Appliance Tier
  fr: "Niveau d'appareils électriques"
  es: "Nivel de electrodomésticos eléctricos"
definition:
  en: >
    The highest tier of appliances the household can power simultaneously from its
    main electricity source. Used as a proxy for the MTF capacity attribute
    (peak power tier) when direct wattage measurement is not collected.
    ESMAP published appliance-tier crosswalk: phone charging plus 1 LED light
    = Tier 1 (3 W or more); multiple LED lights plus fan or small TV = Tier 2
    (50 W or more); refrigerator = Tier 3 (200 W or more); multiple large appliances
    simultaneously = Tier 4 (800 W or more); full household demand including air
    conditioning = Tier 5 (2 kW or more).
  fr: >
    Le niveau le plus élevé d'appareils que le ménage peut alimenter simultanément
    depuis sa principale source d'électricité. Utilisé comme indicateur de
    remplacement de l'attribut de capacité MTF (niveau de puissance de crête)
    lorsque la mesure directe en watts n'est pas recueillie. Tableau de
    correspondance ESMAP entre niveaux d'appareils : recharge de téléphone + 1
    ampoule LED = Niveau 1 (3 W ou plus) ; plusieurs ampoules LED + ventilateur ou
    petite TV = Niveau 2 (50 W ou plus) ; réfrigérateur = Niveau 3 (200 W ou plus) ;
    plusieurs gros appareils simultanément = Niveau 4 (800 W ou plus) ; demande
    totale du ménage incluant la climatisation = Niveau 5 (2 kW ou plus).
  es: >
    El nivel más alto de electrodomésticos que el hogar puede alimentar
    simultáneamente desde su fuente principal de electricidad. Se usa como indicador
    sustituto del atributo de capacidad MTF (nivel de potencia máxima) cuando no se
    recopila medición directa en vatios. Tabla de correspondencia de niveles de
    electrodomésticos de ESMAP: carga de teléfono más 1 bombilla LED = Nivel 1
    (3 W o más); varias bombillas LED más ventilador o TV pequeña = Nivel 2
    (50 W o más); refrigerador = Nivel 3 (200 W o más); varios electrodomésticos
    grandes simultáneamente = Nivel 4 (800 W o más); demanda total del hogar
    incluida la climatización = Nivel 5 (2 kW o más).
values:
- code: phone_charging_only
  label:
    en: Phone charging only
    fr: "Recharge de téléphone uniquement"
    es: "Solo carga de teléfono"
  definition:
    en: "Can power phone charging only. Approximate MTF capacity Tier 1 (3 W or more)."
    fr: "Peut alimenter uniquement la recharge de téléphone. Capacité MTF approximative : niveau 1 (3 W ou plus)."
    es: "Puede alimentar solo la carga de teléfono. Capacidad MTF aproximada: Nivel 1 (3 W o más)."
- code: phone_and_led_lights
  label:
    en: Phone charging and LED lights (1-3 bulbs)
    fr: "Recharge de téléphone et ampoules LED (1 à 3)"
    es: "Carga de teléfono y bombillas LED (1 a 3)"
  definition:
    en: "Can power phone charging and 1 to 3 LED bulbs simultaneously. Approximate MTF capacity Tier 1 (3 W or more)."
    fr: "Peut alimenter la recharge de téléphone et 1 à 3 ampoules LED simultanément. Capacité MTF approximative : niveau 1 (3 W ou plus)."
    es: "Puede alimentar la carga de teléfono y 1 a 3 bombillas LED simultáneamente. Capacidad MTF aproximada: Nivel 1 (3 W o más)."
- code: fan_or_small_tv
  label:
    en: Fan or small television
    fr: "Ventilateur ou petite télévision"
    es: "Ventilador o televisión pequeña"
  definition:
    en: "Can power a fan or small television in addition to lights and phone charging. Approximate MTF capacity Tier 2 (50 W or more)."
    fr: "Peut alimenter un ventilateur ou une petite télévision en plus des lumières et de la recharge de téléphone. Capacité MTF approximative : niveau 2 (50 W ou plus)."
    es: "Puede alimentar un ventilador o una televisión pequeña además de luces y carga de teléfono. Capacidad MTF aproximada: Nivel 2 (50 W o más)."
- code: refrigerator
  label:
    en: Refrigerator
    fr: "Réfrigérateur"
    es: "Refrigerador"
  definition:
    en: "Can power a refrigerator simultaneously with lights, fan, and phone charging. Approximate MTF capacity Tier 3 (200 W or more)."
    fr: "Peut alimenter un réfrigérateur simultanément avec les lumières, le ventilateur et la recharge de téléphone. Capacité MTF approximative : niveau 3 (200 W ou plus)."
    es: "Puede alimentar un refrigerador simultáneamente con luces, ventilador y carga de teléfono. Capacidad MTF aproximada: Nivel 3 (200 W o más)."
- code: multiple_appliances_simultaneously
  label:
    en: "Multiple large appliances simultaneously (iron, rice cooker, power tools)"
    fr: "Plusieurs gros appareils simultanément (fer à repasser, cuiseur à riz, outils électriques)"
    es: "Varios electrodomésticos grandes simultáneamente (plancha, arrocera, herramientas eléctricas)"
  definition:
    en: "Can power multiple large appliances such as an iron, rice cooker, or power tools at the same time. Approximate MTF capacity Tier 4 (800 W or more)."
    fr: "Peut alimenter plusieurs gros appareils tels qu'un fer à repasser, un cuiseur à riz ou des outils électriques en même temps. Capacité MTF approximative : niveau 4 (800 W ou plus)."
    es: "Puede alimentar varios electrodomésticos grandes como una plancha, arrocera o herramientas eléctricas al mismo tiempo. Capacidad MTF aproximada: Nivel 4 (800 W o más)."
- code: full_household_demand
  label:
    en: "Full household demand including air conditioning"
    fr: "Demande totale du ménage incluant la climatisation"
    es: "Demanda total del hogar incluida la climatización"
  definition:
    en: "Can power full household demand including air conditioning. Approximate MTF capacity Tier 5 (2 kW or more)."
    fr: "Peut alimenter la demande totale du ménage incluant la climatisation. Capacité MTF approximative : niveau 5 (2 kW ou plus)."
    es: "Puede alimentar la demanda total del hogar incluida la climatización. Capacidad MTF aproximada: Nivel 5 (2 kW o más)."
