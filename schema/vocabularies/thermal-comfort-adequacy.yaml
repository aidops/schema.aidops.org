id: thermal-comfort-adequacy
maturity: draft
label:
  en: "Thermal comfort adequacy scale"
  fr: "Échelle d'adéquation du confort thermique"
  es: "Escala de adecuación del confort térmico"
definition:
  en: "Four-level scale for assessing whether a shelter provides adequate thermal comfort throughout the year, including the coldest or hottest season. Includes a 'don't know' option to capture seasonal uncertainty or recent occupancy. Based on Sphere Standard 3 guidance on thermal comfort for warm/humid and cold climates."
  fr: "Échelle à quatre niveaux pour évaluer si un abri offre un confort thermique adéquat tout au long de l'année, y compris la saison la plus froide ou la plus chaude. Inclut une option 'ne sait pas' pour capturer l'incertitude saisonnière ou une occupation récente. Basée sur les orientations de la Norme Sphère 3 sur le confort thermique pour les climats chauds/humides et froids."
  es: "Escala de cuatro niveles para evaluar si un refugio proporciona confort térmico adecuado durante todo el año, incluyendo la temporada más fría o más caliente. Incluye una opción 'no sabe' para capturar la incertidumbre estacional o la ocupación reciente. Basada en la orientación de la Norma Esfera 3 sobre el confort térmico para climas cálidos/húmedos y fríos."
values:
  - code: "yes"
    label:
      en: "Yes — adequate in all seasons"
      fr: "Oui — adéquat en toutes saisons"
      es: "Sí — adecuado en todas las estaciones"
    definition:
      en: "The shelter provides adequate warmth or cooling throughout the year, including in the coldest or hottest season."
      fr: "L'abri fournit une chaleur ou une fraîcheur adéquate tout au long de l'année, y compris pendant la saison la plus froide ou la plus chaude."
      es: "El refugio proporciona calor o frescura adecuados durante todo el año, incluyendo en la temporada más fría o más caliente."
  - code: partial
    label:
      en: "Partial — adequate in some seasons but not all"
      fr: "Partiel — adéquat pour certaines saisons mais pas toutes"
      es: "Parcial — adecuado en algunas estaciones pero no en todas"
    definition:
      en: "The shelter is thermally comfortable in some seasons but inadequate in at least one season (e.g., too cold in winter or too hot in summer)."
      fr: "L'abri est thermiquement confortable en certaines saisons mais inadéquat dans au moins une saison (p. ex., trop froid en hiver ou trop chaud en été)."
      es: "El refugio es térmicamente cómodo en algunas estaciones pero inadecuado en al menos una estación (p. ej., demasiado frío en invierno o demasiado caliente en verano)."
  - code: "no"
    label:
      en: "No — not adequately warm or cool"
      fr: "Non — pas suffisamment chaud ou frais"
      es: "No — no suficientemente cálido o fresco"
    definition:
      en: "The shelter does not provide adequate thermal comfort in any season."
      fr: "L'abri ne fournit pas un confort thermique adéquat dans aucune saison."
      es: "El refugio no proporciona confort térmico adecuado en ninguna estación."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "The respondent is unable to assess thermal comfort, typically because they have not occupied the shelter through all seasons."
      fr: "Le répondant n'est pas en mesure d'évaluer le confort thermique, généralement parce qu'il n'a pas occupé l'abri pendant toutes les saisons."
      es: "El encuestado no puede evaluar el confort térmico, generalmente porque no ha ocupado el refugio durante todas las estaciones."
