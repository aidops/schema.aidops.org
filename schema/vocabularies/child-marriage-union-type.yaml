id: child-marriage-union-type
maturity: draft
label:
  en: "Child Marriage Union Type"
  fr: "Type d'union pour mariage d'enfants"
  es: "Tipo de unión para matrimonio infantil"
definition:
  en: "Optional refinement of the household-level child-marriage flag. SDG 5.3.1 metadata treats formal marriages and informal unions equivalently for the child-marriage indicator; this vocabulary lets deployments that need to distinguish the two forms encode the distinction."
  fr: "Raffinement facultatif de l'indicateur de mariage d'enfants au niveau du ménage. Les métadonnées ODD 5.3.1 traitent les mariages formels et les unions informelles de manière équivalente pour l'indicateur de mariage d'enfants ; ce vocabulaire permet aux déploiements qui doivent distinguer les deux formes de coder la distinction."
  es: "Refinamiento opcional del indicador de matrimonio infantil a nivel de hogar. Los metadatos ODS 5.3.1 tratan los matrimonios formales y las uniones informales de forma equivalente para el indicador de matrimonio infantil; este vocabulario permite a los despliegues que necesitan distinguir ambas formas codificar la distinción."
values:
  - code: formal_marriage
    label:
      en: "Formal marriage only"
      fr: "Mariage formel uniquement"
      es: "Matrimonio formal únicamente"
    definition:
      en: "At least one person under 18 is in a formal (civil or religious) marriage; no informal union of an under-18 reported."
      fr: "Au moins une personne de moins de 18 ans est en mariage formel (civil ou religieux) ; aucune union informelle d'un mineur rapportée."
      es: "Al menos una persona menor de 18 años está en un matrimonio formal (civil o religioso); no se reporta unión informal de un menor."
  - code: informal_union
    label:
      en: "Informal union only"
      fr: "Union informelle uniquement"
      es: "Unión informal únicamente"
    definition:
      en: "At least one person under 18 is living with a partner as if married, but no formal marriage recorded for anyone under 18."
      fr: "Au moins une personne de moins de 18 ans vit avec un partenaire comme si elle était mariée, mais aucun mariage formel enregistré pour un mineur."
      es: "Al menos una persona menor de 18 años vive con una pareja como si estuviera casada, pero no hay matrimonio formal registrado para ningún menor."
  - code: both
    label:
      en: "Both formal marriage and informal union"
      fr: "Mariage formel et union informelle"
      es: "Matrimonio formal y unión informal"
    definition:
      en: "The household contains both a formal marriage of an under-18 and an informal union of an under-18 (possibly the same person or different persons)."
      fr: "Le ménage comprend à la fois un mariage formel d'un mineur et une union informelle d'un mineur (possiblement la même personne ou des personnes différentes)."
      es: "El hogar contiene tanto un matrimonio formal de un menor como una unión informal de un menor (posiblemente la misma persona o personas distintas)."
  - code: none
    label:
      en: "None (no under-18 married or in union)"
      fr: "Aucun (aucun mineur marié ou en union)"
      es: "Ninguno (ningún menor casado o en unión)"
    definition:
      en: "No one under 18 in the household is currently married or in an informal union."
      fr: "Personne de moins de 18 ans dans le ménage n'est actuellement marié(e) ou en union informelle."
      es: "Ninguna persona menor de 18 años en el hogar está actualmente casada ni en unión informal."
