id: facility-functionality-status
maturity: draft
label:
  en: "Facility Functionality Status"
  fr: "Statut de fonctionnalité de l'établissement"
  es: "Estado de funcionalidad del establecimiento"
definition:
  en: >
    The overall operational state of a health facility in a crisis or
    humanitarian context, using the WHO HeRAMS functionality framework:
    fully functioning (delivering the full expected range of services at
    normal capacity), partially functioning (delivering a reduced range or
    reduced capacity), not functioning (closed to service delivery but the
    structure remains), destroyed (the facility building is physically
    destroyed), or inaccessible (standing and possibly operational but
    cannot be reached due to security, access, or other barriers).
    Distinct from facility-operational-status (the general status
    vocabulary in PublicSchema) in that HeRAMS functionality is the
    crisis-specific summary used by the Global Health Cluster in active
    humanitarian responses.
  fr: >
    L'état opérationnel global d'un établissement de santé en contexte de
    crise ou humanitaire, selon le cadre de fonctionnalité HeRAMS de
    l'OMS : pleinement fonctionnel (fournit la gamme complète de services
    attendus à capacité normale), partiellement fonctionnel (fournit une
    gamme ou une capacité réduite), non fonctionnel (fermé à la prestation
    de services mais la structure existe encore), détruit (le bâtiment
    est physiquement détruit) ou inaccessible (debout et éventuellement
    opérationnel mais ne peut être atteint pour des raisons de sécurité,
    d'accès ou autres). Distinct de facility-operational-status (le
    vocabulaire de statut général dans PublicSchema) en ce sens que la
    fonctionnalité HeRAMS est le résumé spécifique aux crises utilisé par
    le Cluster mondial de la santé dans les réponses humanitaires actives.
  es: >
    El estado operativo general de un establecimiento de salud en contexto
    de crisis o humanitario, según el marco de funcionalidad HeRAMS de la
    OMS: plenamente funcional (presta la gama completa de servicios
    esperados a capacidad normal), parcialmente funcional (presta una
    gama o capacidad reducida), no funcional (cerrado a la prestación de
    servicios pero la estructura permanece), destruido (el edificio está
    físicamente destruido) o inaccesible (en pie y posiblemente operativo
    pero no se puede acceder por razones de seguridad, acceso u otras).
    Distinto de facility-operational-status (el vocabulario de estado
    general en PublicSchema) en que la funcionalidad HeRAMS es el resumen
    específico de crisis utilizado por el Clúster Global de Salud en
    respuestas humanitarias activas.
standard:
  name: "WHO Health Resources and Services Availability Monitoring System (HeRAMS)"
  uri: "https://www.who.int/initiatives/herams"
  notes: "HeRAMS functionality-status classification is the canonical crisis-context summary used by WHO and the Global Health Cluster in Syria, Yemen, Iraq, Nigeria, Ukraine, and Nepal. HeRAMS typically reports monthly for hospitals and quarterly for health centres."
values:
- code: fully_functioning
  label:
    en: Fully functioning
    fr: "Pleinement fonctionnel"
    es: "Plenamente funcional"
  definition:
    en: "The facility delivers the full expected range of services at normal capacity."
    fr: "L'établissement fournit la gamme complète de services attendus à capacité normale."
    es: "El establecimiento presta la gama completa de servicios esperados a capacidad normal."
- code: partially_functioning
  label:
    en: Partially functioning
    fr: "Partiellement fonctionnel"
    es: "Parcialmente funcional"
  definition:
    en: "The facility is open and delivering services but with a reduced range, reduced capacity, or limited hours relative to normal operation."
    fr: "L'établissement est ouvert et fournit des services mais avec une gamme ou une capacité réduite ou des horaires limités par rapport au fonctionnement normal."
    es: "El establecimiento está abierto y presta servicios pero con una gama, capacidad u horarios reducidos respecto al funcionamiento normal."
- code: not_functioning
  label:
    en: Not functioning
    fr: "Non fonctionnel"
    es: "No funcional"
  definition:
    en: "The facility is closed to service delivery but the building still stands and could potentially be reopened."
    fr: "L'établissement est fermé à la prestation de services mais le bâtiment existe encore et pourrait potentiellement être rouvert."
    es: "El establecimiento está cerrado a la prestación de servicios pero el edificio aún existe y podría potencialmente reabrirse."
- code: destroyed
  label:
    en: Destroyed
    fr: "Détruit"
    es: "Destruido"
  definition:
    en: "The facility building is physically destroyed or damaged beyond usable condition."
    fr: "Le bâtiment de l'établissement est physiquement détruit ou endommagé au-delà de toute utilisation."
    es: "El edificio del establecimiento está físicamente destruido o dañado más allá de una condición utilizable."
- code: inaccessible
  label:
    en: Inaccessible
    fr: "Inaccessible"
    es: "Inaccesible"
  definition:
    en: "The facility is standing and possibly operational but cannot currently be reached due to security, access, or other barriers."
    fr: "L'établissement est debout et éventuellement opérationnel mais ne peut actuellement être atteint en raison de barrières de sécurité, d'accès ou autres."
    es: "El establecimiento está en pie y posiblemente operativo pero no se puede alcanzar actualmente por barreras de seguridad, acceso u otras."
