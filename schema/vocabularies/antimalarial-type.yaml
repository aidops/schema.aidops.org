id: antimalarial-type
maturity: draft
label:
  en: Antimalarial Drug Type
  fr: "Type d'antipaludéen"
  es: "Tipo de antipalúdico"
definition:
  en: "The type of antimalarial medicine given to a child with fever or confirmed malaria. Multi-select: a child may receive more than one antimalarial in the same episode. WHO first-line treatment is an artemisinin-based combination therapy (ACT). Codes align with the MICS ML5 drug list."
  fr: "Le type d'antipaludéen administré à un enfant présentant de la fièvre ou un paludisme confirmé. Sélection multiple : un enfant peut recevoir plusieurs antipaludéens au cours d'un même épisode. Le traitement de première intention de l'OMS est une combinaison thérapeutique à base d'artémisinine (CTA). Les codes s'alignent sur la liste de médicaments MICS ML5."
  es: "El tipo de medicamento antipalúdico administrado a un niño con fiebre o malaria confirmada. Selección múltiple: un niño puede recibir más de un antipalúdico en el mismo episodio. El tratamiento de primera línea de la OMS es una terapia combinada a base de artemisinina (TCA). Los códigos se alinean con la lista de medicamentos MICS ML5."
values:
- code: act_artemether_lumefantrine
  label:
    en: ACT — artemether-lumefantrine (AL)
    fr: "CTA — artéméther-luméfantrine (AL)"
    es: "TCA — arteméter-lumefantrina (AL)"
  definition:
    en: "Artemether-lumefantrine, the most widely used ACT globally (trade name Coartem). WHO first-line for uncomplicated falciparum malaria."
    fr: "Artéméther-luméfantrine, la CTA la plus largement utilisée dans le monde (nom commercial Coartem). Traitement de première intention de l'OMS pour le paludisme falciparum non compliqué."
    es: "Arteméter-lumefantrina, la TCA más utilizada a nivel mundial (nombre comercial Coartem). Tratamiento de primera línea de la OMS para la malaria falciparum no complicada."
- code: act_dha_piperaquine
  label:
    en: ACT — DHA-piperaquine (DP)
    fr: "CTA — DHA-pipéraquine (DP)"
    es: "TCA — DHA-piperaquina (DP)"
  definition:
    en: "Dihydroartemisinin-piperaquine, used in Southeast Asia and increasingly in Africa (trade names Eurartesim, Duo-Cotecxin)."
    fr: "Dihydroartémisinine-pipéraquine, utilisée en Asie du Sud-Est et de plus en plus en Afrique (noms commerciaux Eurartesim, Duo-Cotecxin)."
    es: "Dihidroartemisinina-piperaquina, utilizada en el sudeste asiático y cada vez más en África (nombres comerciales Eurartesim, Duo-Cotecxin)."
- code: act_artesunate_amodiaquine
  label:
    en: ACT — artesunate-amodiaquine (ASAQ)
    fr: "CTA — artésunate-amodiaquine (ASAQ)"
    es: "TCA — artesunato-amodiaquina (ASAQ)"
  definition:
    en: "Artesunate-amodiaquine, commonly used in West and Central Africa (trade name Coarsucam/ASAQ Winthrop)."
    fr: "Artésunate-amodiaquine, couramment utilisé en Afrique de l'Ouest et centrale (nom commercial Coarsucam / ASAQ Winthrop)."
    es: "Artesunato-amodiaquina, comúnmente utilizado en África Occidental y Central (nombre comercial Coarsucam/ASAQ Winthrop)."
- code: artesunate_injectable
  label:
    en: Injectable artesunate
    fr: "Artésunate injectable"
    es: "Artesunato inyectable"
  definition:
    en: "Injectable artesunate for severe malaria (WHO first-line for severe malaria, replacing quinine)."
    fr: "Artésunate injectable pour le paludisme grave (traitement de première intention de l'OMS pour le paludisme grave, remplaçant la quinine)."
    es: "Artesunato inyectable para malaria grave (tratamiento de primera línea de la OMS para malaria grave, reemplazando a la quinina)."
- code: sp_fansidar
  label:
    en: SP (sulfadoxine-pyrimethamine / Fansidar)
    fr: "SP (sulfadoxine-pyriméthamine / Fansidar)"
    es: "SP (sulfadoxina-pirimetamina / Fansidar)"
  definition:
    en: "Sulfadoxine-pyrimethamine, still used in some settings and for intermittent preventive treatment in pregnancy (IPTp). Resistance is widespread for treatment."
    fr: "Sulfadoxine-pyriméthamine, encore utilisée dans certains contextes et pour le traitement préventif intermittent pendant la grossesse (TPI-G). La résistance est répandue pour le traitement."
    es: "Sulfadoxina-pirimetamina, todavía utilizada en algunos contextos y para el tratamiento preventivo intermitente en el embarazo (TPIg). La resistencia es generalizada para el tratamiento."
- code: chloroquine
  label:
    en: Chloroquine
    fr: "Chloroquine"
    es: "Cloroquina"
  definition:
    en: "Chloroquine, historically the first-line antimalarial. Resistance is widespread for P. falciparum; still effective for P. vivax in some regions."
    fr: "Chloroquine, historiquement l'antipaludéen de première intention. La résistance est répandue pour P. falciparum ; encore efficace contre P. vivax dans certaines régions."
    es: "Cloroquina, históricamente el antipalúdico de primera línea. La resistencia es generalizada para P. falciparum; aún efectiva contra P. vivax en algunas regiones."
- code: amodiaquine
  label:
    en: Amodiaquine (alone)
    fr: "Amodiaquine (seule)"
    es: "Amodiaquina (sola)"
  definition:
    en: "Amodiaquine as monotherapy (not in combination). Used in some settings for P. vivax or in combination regimens."
    fr: "Amodiaquine en monothérapie (non combinée). Utilisée dans certains contextes pour P. vivax ou dans des schémas thérapeutiques combinés."
    es: "Amodiaquina como monoterapia (no en combinación). Utilizada en algunos contextos para P. vivax o en regímenes combinados."
- code: quinine
  label:
    en: Quinine
    fr: "Quinine"
    es: "Quinina"
  definition:
    en: "Quinine, used for severe malaria and as second-line when ACT is unavailable. Being replaced by injectable artesunate per WHO guidance."
    fr: "Quinine, utilisée pour le paludisme grave et en deuxième intention lorsque les CTA ne sont pas disponibles. Remplacée par l'artésunate injectable selon les directives de l'OMS."
    es: "Quinina, utilizada para malaria grave y como segunda línea cuando la TCA no está disponible. Está siendo reemplazada por el artesunato inyectable según las directrices de la OMS."
- code: other
  label:
    en: Other antimalarial
    fr: "Autre antipaludéen"
    es: "Otro antipalúdico"
  definition:
    en: "Any antimalarial drug not listed above, including country-specific products."
    fr: "Tout antipaludéen non répertorié ci-dessus, y compris les produits spécifiques à un pays."
    es: "Cualquier antipalúdico no listado arriba, incluidos productos específicos de un país."
- code: dont_know
  label:
    en: Don't know
    fr: "Ne sait pas"
    es: "No sabe"
  definition:
    en: "The caregiver does not know the name or type of antimalarial given."
    fr: "Le soignant ne connaît pas le nom ou le type d'antipaludéen administré."
    es: "El cuidador no sabe el nombre o tipo de antipalúdico administrado."
