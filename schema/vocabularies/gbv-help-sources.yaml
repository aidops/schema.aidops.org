id: gbv-help-sources
maturity: draft
label:
  en: "GBV help-seeking sources"
  fr: "Sources de recours pour les VBG"
  es: "Fuentes de búsqueda de ayuda ante VBG"
definition:
  en: "Sources from which a woman sought help following partner violence, corresponding to DHS-8 DV28 multi-select response list. Multiple codes may be selected. The inclusion of 'current_former_partner' reflects actual DHS data; a woman listing the perpetrator as a source of help is a substantive finding, not a data error."
  fr: "Sources auprès desquelles une femme a cherché de l'aide à la suite de violences conjugales, correspondant à la liste de réponses à sélection multiple DHS-8 DV28. Plusieurs codes peuvent être sélectionnés."
  es: "Fuentes a las que una mujer recurrió en busca de ayuda tras violencia de pareja, correspondiente a la lista de respuestas de selección múltiple DHS-8 DV28. Se pueden seleccionar varios códigos."

standard:
  name: dhs-domestic-violence-module-2022
  uri: "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"
  notes: "DV28 (sources of help sought)"

values:
  - code: own_family
    label:
      en: "Own family"
      fr: "Sa propre famille"
      es: "Propia familia"
    definition:
      en: "A member of the respondent's own family of origin."
      fr: "Un membre de la famille d'origine de la répondante."
      es: "Un miembro de la familia de origen de la encuestada."
  - code: partners_family
    label:
      en: "Partner's family"
      fr: "Famille du partenaire"
      es: "Familia del compañero"
    definition:
      en: "A member of the current or former husband's or partner's family."
      fr: "Un membre de la famille du mari ou partenaire actuel ou ancien."
      es: "Un miembro de la familia del marido o compañero actual o anterior."
  - code: current_former_partner
    label:
      en: "Current or former partner"
      fr: "Partenaire actuel ou ancien"
      es: "Compañero actual o anterior"
    definition:
      en: "The respondent sought help or discussion directly with the partner who perpetrated the violence. Inclusion of this code reflects DHS instrument design; it is a substantive finding when selected."
      fr: "La répondante a cherché de l'aide ou une discussion directement auprès du partenaire auteur des violences. L'inclusion de ce code reflète la conception de l'instrument DHS; c'est un résultat substantiel lorsqu'il est sélectionné."
      es: "La encuestada buscó ayuda o diálogo directamente con el compañero que perpetró la violencia. La inclusión de este código refleja el diseño del instrumento DHS; es un hallazgo sustantivo cuando se selecciona."
  - code: friend
    label:
      en: "Friend"
      fr: "Ami(e)"
      es: "Amiga o amigo"
    definition:
      en: "A friend (not a neighbor)."
      fr: "Un(e) ami(e) (pas un voisin)."
      es: "Una amistad (no una vecina o vecino)."
  - code: neighbor
    label:
      en: "Neighbor"
      fr: "Voisin(e)"
      es: "Vecina o vecino"
    definition:
      en: "A neighbor in the respondent's community or settlement."
      fr: "Un(e) voisin(e) dans la communauté ou le site de la répondante."
      es: "Una vecina o vecino en la comunidad o asentamiento de la encuestada."
  - code: religious_leader
    label:
      en: "Religious leader"
      fr: "Leader religieux"
      es: "Líder religioso"
    definition:
      en: "A religious leader, pastor, imam, priest, or traditional spiritual authority."
      fr: "Un leader religieux, pasteur, imam, prêtre ou autorité spirituelle traditionnelle."
      es: "Un líder religioso, pastor, imán, sacerdote o autoridad espiritual tradicional."
  - code: medical_personnel
    label:
      en: "Doctor or medical personnel"
      fr: "Médecin ou personnel médical"
      es: "Médico o personal médico"
    definition:
      en: "A doctor, nurse, midwife, health worker, or medical facility."
      fr: "Un médecin, infirmier, sage-femme, agent de santé ou établissement médical."
      es: "Un médico, enfermero, partera, trabajador de salud o instalación médica."
  - code: police
    label:
      en: "Police"
      fr: "Police"
      es: "Policía"
    definition:
      en: "Law enforcement or police, including military police in some contexts."
      fr: "Forces de l'ordre ou police, y compris la police militaire dans certains contextes."
      es: "Fuerzas del orden o policía, incluida la policía militar en algunos contextos."
  - code: lawyer
    label:
      en: "Lawyer or legal aid"
      fr: "Avocat ou aide juridique"
      es: "Abogado o asistencia jurídica"
    definition:
      en: "A lawyer, legal aid organization, or paralegal."
      fr: "Un avocat, une organisation d'aide juridique ou un parajuriste."
      es: "Un abogado, organización de asistencia jurídica o auxiliar jurídico."
  - code: social_service_org
    label:
      en: "Social service organization"
      fr: "Organisation de services sociaux"
      es: "Organización de servicios sociales"
    definition:
      en: "An NGO, government social welfare office, GBV service provider, women's organization, or safe house."
      fr: "Une ONG, un bureau de protection sociale gouvernemental, un prestataire de services VBG, une organisation de femmes ou un foyer d'accueil."
      es: "Una ONG, oficina de bienestar social gubernamental, proveedor de servicios VBG, organización de mujeres o casa de acogida."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Any other source not listed above."
      fr: "Toute autre source non répertoriée ci-dessus."
      es: "Cualquier otra fuente no incluida en la lista anterior."
