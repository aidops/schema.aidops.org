id: social-cohesion-tension-level
maturity: draft
label:
  en: "Social cohesion / tension level"
  fr: "Niveau de cohésion sociale / tension"
  es: "Nivel de cohesión social / tensión"

definition:
  en: "Community-perceived social cohesion and inter-group tension level, reported at community aggregate level. Used to flag relations between host and displaced populations, between ethnic, religious, or clan groups, or between residents and newcomers. The five substantive levels run from 'very good relations, no tension' to 'very tense, with frequent incidents'; explicit 'don't know' and 'prefer not to answer' codes are provided because the item is sensitive and may elicit non-response."
  fr: "Niveau de cohésion sociale et de tension intergroupe tel que perçu par la communauté, rapporté au niveau agrégé communautaire. Utilisé pour signaler les relations entre populations d'accueil et déplacées, entre groupes ethniques, religieux ou claniques, ou entre résidents et nouveaux arrivants. Les cinq niveaux de fond vont de « très bonnes relations, sans tension » à « très tendues, avec des incidents fréquents » ; des codes explicites « ne sait pas » et « préfère ne pas répondre » sont prévus car l'item est sensible et peut susciter de la non-réponse."
  es: "Nivel de cohesión social y tensión intergrupal percibido por la comunidad, reportado a nivel agregado comunitario. Utilizado para señalar las relaciones entre poblaciones de acogida y desplazadas, entre grupos étnicos, religiosos o clánicos, o entre residentes y recién llegados. Los cinco niveles sustantivos van de «muy buenas relaciones, sin tensión» a «muy tensas, con incidentes frecuentes»; se proporcionan códigos explícitos «no sabe» y «prefiere no responder» porque el ítem es sensible y puede generar falta de respuesta."

standard:
  name: "UNDP-DPPA Social Cohesion Framework"
  uri: "https://www.undp.org/publications/strengthening-social-cohesion-conceptual-framing-and-programming-implications"
  notes: "Tension-level scale informed by the UNDP-DPPA Social Cohesion Framework (horizontal, vertical, institutional cohesion), the UNHCR Peaceful Coexistence Framework, and Interpeace / Search for Common Ground conflict-sensitivity assessment templates."

values:
- code: very_good_no_tension
  label:
    en: "Very good relations, no tension"
    fr: "Très bonnes relations, aucune tension"
    es: "Muy buenas relaciones, sin tensión"
  definition:
    en: "Community perceives relations between groups as very good with no tension reported."
    fr: "La communauté perçoit les relations entre groupes comme très bonnes, sans tension rapportée."
    es: "La comunidad percibe las relaciones entre grupos como muy buenas, sin tensión reportada."
- code: generally_good_minor_tension
  label:
    en: "Generally good relations, minor tension"
    fr: "Relations généralement bonnes, tension mineure"
    es: "Relaciones generalmente buenas, tensión menor"
  definition:
    en: "Community perceives relations as generally good with only minor, occasional friction."
    fr: "La communauté perçoit des relations généralement bonnes avec seulement des frictions mineures et occasionnelles."
    es: "La comunidad percibe las relaciones como generalmente buenas con solo fricciones menores y ocasionales."
- code: mixed
  label:
    en: "Mixed; depends on which groups"
    fr: "Mitigées ; cela dépend des groupes"
    es: "Mixtas; depende de qué grupos"
  definition:
    en: "Community perceives relations as mixed — good with some groups, tense with others."
    fr: "La communauté perçoit les relations comme mitigées — bonnes avec certains groupes, tendues avec d'autres."
    es: "La comunidad percibe las relaciones como mixtas — buenas con algunos grupos y tensas con otros."
- code: tense_occasional_incidents
  label:
    en: "Tense, with occasional incidents"
    fr: "Tendues, avec des incidents occasionnels"
    es: "Tensas, con incidentes ocasionales"
  definition:
    en: "Community perceives relations as tense, with occasional incidents of conflict between groups."
    fr: "La communauté perçoit les relations comme tendues, avec des incidents occasionnels de conflit entre groupes."
    es: "La comunidad percibe las relaciones como tensas, con incidentes ocasionales de conflicto entre grupos."
- code: very_tense_frequent_incidents
  label:
    en: "Very tense, with frequent incidents"
    fr: "Très tendues, avec des incidents fréquents"
    es: "Muy tensas, con incidentes frecuentes"
  definition:
    en: "Community perceives relations as very tense, with frequent incidents of conflict between groups."
    fr: "La communauté perçoit les relations comme très tendues, avec des incidents fréquents de conflit entre groupes."
    es: "La comunidad percibe las relaciones como muy tensas, con incidentes frecuentes de conflicto entre grupos."
- code: dont_know
  label:
    en: "Don't know"
    fr: "Ne sait pas"
    es: "No sabe"
  definition:
    en: "The respondents do not know how to characterise inter-group relations. A valid response, not to be re-coded as 'mixed' or missing."
    fr: "Les répondants ne savent pas comment caractériser les relations intergroupes. Réponse valide qui ne doit pas être recodée comme « mitigées » ou manquante."
    es: "Los encuestados no saben cómo caracterizar las relaciones intergrupales. Respuesta válida que no debe recodificarse como «mixtas» o faltante."
- code: prefer_not_to_answer
  label:
    en: "Prefer not to answer"
    fr: "Préfère ne pas répondre"
    es: "Prefiere no responder"
  definition:
    en: "The respondents prefer not to disclose their perception, typically because the topic is sensitive. A valid response, distinct from 'don't know'."
    fr: "Les répondants préfèrent ne pas divulguer leur perception, généralement parce que le sujet est sensible. Réponse valide, distincte de « ne sait pas »."
    es: "Los encuestados prefieren no divulgar su percepción, típicamente porque el tema es sensible. Respuesta válida, distinta de «no sabe»."
