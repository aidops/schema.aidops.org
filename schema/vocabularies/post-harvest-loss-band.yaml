id: post-harvest-loss-band
maturity: draft
label:
  en: "Post-Harvest Loss Band (proportion of stored harvest lost)"
  fr: "Tranche de perte post-récolte (proportion de la récolte stockée perdue)"
  es: "Banda de pérdida poscosecha (proporción de la cosecha almacenada perdida)"
definition:
  en: "Estimated proportion of stored harvest lost to spoilage, pests, or other post-harvest problems during the last agricultural season, expressed as a coarse band. Respondent-reported self-estimate; objective measurement requires FAO IPLS repeated visits during the storage period. The bands here are narrower than those used for in-season crop loss because post-harvest losses are typically smaller in magnitude. Aligned with SDG target 12.3.1 (food loss index) reporting conventions."
  fr: "Proportion estimée de la récolte stockée perdue en raison de la détérioration, des ravageurs ou d'autres problèmes post-récolte au cours de la dernière saison agricole, exprimée sous forme de tranche grossière. Auto-estimation déclarée par le répondant ; la mesure objective nécessite des visites IPLS répétées de la FAO pendant la période de stockage. Les tranches ici sont plus étroites que celles utilisées pour les pertes de cultures en saison car les pertes post-récolte sont typiquement de moindre ampleur. Alignée avec les conventions de rapport de l'ODD 12.3.1 (indice de pertes alimentaires)."
  es: "Proporción estimada de la cosecha almacenada perdida por deterioro, plagas u otros problemas poscosecha durante la última temporada agrícola, expresada como una banda gruesa. Autoestimación reportada por el encuestado; la medición objetiva requiere visitas IPLS repetidas de la FAO durante el período de almacenamiento. Las bandas aquí son más estrechas que las utilizadas para pérdidas de cultivo en temporada porque las pérdidas poscosecha suelen ser de menor magnitud. Alineada con las convenciones de reporte del ODS 12.3.1 (índice de pérdidas de alimentos)."
standard:
  name: "FAO Guidelines on measurement of harvest and post-harvest losses / SDG 12.3.1"
  uri: "https://openknowledge.fao.org/server/api/core/bitstreams/bd596c08-1202-4745-b23d-07bb5dc84b06/content"
  notes: "Band endpoints (10%, 25%) follow FAO post-harvest loss reporting conventions at household level. SDG 12.3.1 Food Loss Index uses these magnitudes as severity bands."
values:
  - code: none
    label:
      en: "No loss"
      fr: "Aucune perte"
      es: "Sin pérdida"
    definition:
      en: "Household experienced no significant post-harvest loss."
      fr: "Le ménage n'a subi aucune perte post-récolte significative."
      es: "El hogar no experimentó pérdida poscosecha significativa."
  - code: less_than_10pct
    label:
      en: "Less than 10%"
      fr: "Moins de 10 %"
      es: "Menos del 10 %"
    definition:
      en: "Minor loss; less than one-tenth of stored harvest was lost."
      fr: "Perte mineure ; moins d'un dixième de la récolte stockée a été perdu."
      es: "Pérdida menor; se perdió menos de una décima parte de la cosecha almacenada."
  - code: pct_10_to_25
    label:
      en: "10–25%"
      fr: "10–25 %"
      es: "10–25 %"
    definition:
      en: "Moderate loss; one-tenth to one-quarter of stored harvest was lost."
      fr: "Perte modérée ; un dixième à un quart de la récolte stockée a été perdu."
      es: "Pérdida moderada; se perdió entre una décima y un cuarto de la cosecha almacenada."
  - code: more_than_25pct
    label:
      en: "More than 25%"
      fr: "Plus de 25 %"
      es: "Más del 25 %"
    definition:
      en: "Significant loss; more than one-quarter of stored harvest was lost."
      fr: "Perte significative ; plus d'un quart de la récolte stockée a été perdu."
      es: "Pérdida significativa; se perdió más de un cuarto de la cosecha almacenada."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot estimate post-harvest loss. Retained as a distinct valid response."
      fr: "Le répondant ne peut pas estimer la perte post-récolte. Conservée comme réponse valide distincte."
      es: "El encuestado no puede estimar la pérdida poscosecha. Se mantiene como respuesta válida distinta."
