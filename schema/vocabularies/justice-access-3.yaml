id: justice-access-3
maturity: draft
label:
  en: "Access to justice perception (6-level)"
  fr: "Perception de l'accès à la justice (6 niveaux)"
  es: "Percepción del acceso a la justicia (6 niveles)"
definition:
  en: "Household-perceived access to justice and redress mechanisms. Distinguishes five types of justice access failure: practical barriers (cost, distance), fear of reprisal (coercive environment), and complete absence of mechanisms — each with different programmatic implications and should not be collapsed to a binary. Based on OHCHR Rule-of-Law Indicators (2011) accessibility and impartiality dimension; GPC PAF Domain 2 (Rule of Law and Justice) Indicator 2.3; REACH Syria (2022) rule-of-law module."
  fr: "Perception par le ménage de l'accès à la justice et aux mécanismes de recours. Distingue cinq types de défaillance d'accès à la justice : obstacles pratiques (coût, distance), crainte de représailles (environnement coercitif) et absence totale de mécanismes — chacun ayant des implications programmatiques différentes et ne devant pas être réduit à un binaire. Fondé sur la dimension accessibilité et impartialité des Indicateurs d'état de droit HCDH (2011) ; Indicateur 2.3 du GPC PAF Domaine 2 (État de droit et justice) ; module état de droit REACH Syrie (2022)."
  es: "Percepción del hogar sobre el acceso a la justicia y los mecanismos de reparación. Distingue cinco tipos de falla en el acceso a la justicia: barreras prácticas (costo, distancia), miedo a represalias (entorno coercitivo) y ausencia completa de mecanismos — cada uno con diferentes implicaciones programáticas y que no deben colapsarse en un binario. Basado en la dimensión de accesibilidad e imparcialidad de los Indicadores del Estado de Derecho del ACNUDH (2011); Indicador 2.3 del GPC PAF Dominio 2 (Estado de Derecho y Justicia); módulo de estado de derecho de REACH Siria (2022)."
values:
  - code: yes_formal
    label:
      en: "Yes — through a formal or customary mechanism"
      fr: "Oui — par un mécanisme formel ou coutumier"
      es: "Sí — a través de un mecanismo formal o consuetudinario"
    definition:
      en: "Household believes it could seek and obtain redress through an accessible mechanism."
      fr: "Le ménage croit pouvoir demander et obtenir réparation par un mécanisme accessible."
      es: "El hogar cree que podría buscar y obtener reparación a través de un mecanismo accesible."
  - code: yes_customary_only
    label:
      en: "Yes — but only through customary authority, not formal courts"
      fr: "Oui — mais uniquement par l'autorité coutumière, pas les tribunaux formels"
      es: "Sí — pero solo a través de autoridad consuetudinaria, no tribunales formales"
    definition:
      en: "Formal courts are inaccessible or not trusted; customary authority is the only realistic option for redress."
      fr: "Les tribunaux formels sont inaccessibles ou peu fiables ; l'autorité coutumière est la seule option réaliste pour obtenir réparation."
      es: "Los tribunales formales son inaccesibles o no confiables; la autoridad consuetudinaria es la única opción realista para obtener reparación."
  - code: no_practical_barriers
    label:
      en: "No — practical barriers prevent access"
      fr: "Non — des obstacles pratiques empêchent l'accès"
      es: "No — barreras prácticas impiden el acceso"
    definition:
      en: "Cost, distance, lack of legal representation, language barriers, or other practical factors prevent access to justice."
      fr: "Le coût, la distance, le manque de représentation juridique, les barrières linguistiques ou d'autres facteurs pratiques empêchent l'accès à la justice."
      es: "El costo, la distancia, la falta de representación legal, las barreras idiomáticas u otros factores prácticos impiden el acceso a la justicia."
  - code: no_fear_of_reprisal
    label:
      en: "No — fear of reprisal prevents seeking justice"
      fr: "Non — la crainte de représailles empêche de demander justice"
      es: "No — el miedo a represalias impide buscar justicia"
    definition:
      en: "Household would not seek justice because of fear of retaliation by a powerful actor (armed group, authority, or influential community member)."
      fr: "Le ménage ne demanderait pas justice par crainte de représailles d'un acteur puissant (groupe armé, autorité ou membre influent de la communauté)."
      es: "El hogar no buscaría justicia por miedo a represalias de un actor poderoso (grupo armado, autoridad o miembro influyente de la comunidad)."
  - code: no_no_mechanism_exists
    label:
      en: "No — no functioning mechanism exists"
      fr: "Non — aucun mécanisme fonctionnel n'existe"
      es: "No — no existe ningún mecanismo funcional"
    definition:
      en: "Household knows of no court, authority, or mechanism that could address the concern in the current context."
      fr: "Le ménage ne connaît aucun tribunal, autorité ou mécanisme qui pourrait traiter le problème dans le contexte actuel."
      es: "El hogar no conoce ningún tribunal, autoridad o mecanismo que pueda abordar el problema en el contexto actual."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot assess whether they could access justice."
      fr: "Le répondant ne peut pas évaluer s'il pourrait accéder à la justice."
      es: "El encuestado no puede evaluar si podría acceder a la justicia."
