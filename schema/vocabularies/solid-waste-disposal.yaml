id: solid-waste-disposal
maturity: draft
label:
  en: Solid Waste Disposal Method
  fr: "Méthode d'élimination des déchets solides"
  es: "Método de eliminación de residuos sólidos"
definition:
  en: "The household's primary method for disposing of solid waste (rubbish, garbage). Based on Sphere Standard 7 key action 3 on safe, timely, and environmentally sustainable solid waste management."
  fr: "La principale méthode du ménage pour éliminer les déchets solides (ordures, détritus). Basé sur l'action clé 3 de la Norme Sphère 7 sur la gestion des déchets solides de manière sûre, rapide et écologiquement durable."
  es: "El método principal del hogar para eliminar los residuos sólidos (basura, desechos). Basado en la acción clave 3 de la Norma Esfera 7 sobre la gestión de residuos sólidos de manera segura, oportuna y ambientalmente sostenible."
standard:
  name: "Sphere Handbook 2018, Standard 7 — Environmental Sustainability"
  uri: "https://spherestandards.org/handbook-2018/"
values:
- code: communal_collection_service
  label:
    en: Communal collection service
    fr: "Service de collecte communal"
    es: "Servicio de recolección comunal"
  definition:
    en: "Household places waste at a designated collection point and it is collected by a municipal service or a humanitarian programme."
    fr: "Le ménage dépose les déchets à un point de collecte désigné et ils sont collectés par un service municipal ou un programme humanitaire."
    es: "El hogar coloca los residuos en un punto de recolección designado y son recogidos por un servicio municipal o un programa humanitario."
- code: household_pit
  label:
    en: Household waste pit
    fr: "Fosse à déchets ménagers"
    es: "Fosa de residuos domésticos"
  definition:
    en: "Household buries waste in a dedicated pit dug by or for the household on or near its plot."
    fr: "Le ménage enfouit les déchets dans une fosse dédiée creusée par ou pour le ménage sur ou près de sa parcelle."
    es: "El hogar entierra los residuos en una fosa dedicada excavada por o para el hogar en o cerca de su parcela."
- code: burning
  label:
    en: Open burning
    fr: "Incinération à ciel ouvert"
    es: "Quema a cielo abierto"
  definition:
    en: "Household burns waste in the open air or in a simple homemade incinerator without controlled combustion."
    fr: "Le ménage brûle les déchets à l'air libre ou dans un incinérateur artisanal simple sans combustion contrôlée."
    es: "El hogar quema los residuos al aire libre o en un incinerador casero simple sin combustión controlada."
- code: open_dumping
  label:
    en: Open dumping
    fr: "Décharge à ciel ouvert"
    es: "Vertido a cielo abierto"
  definition:
    en: "Household disposes of waste in an open area, field, waterway, or communal space without any treatment or designated containment."
    fr: "Le ménage élimine les déchets dans un espace ouvert, un champ, un cours d'eau ou un espace commun sans aucun traitement ni confinement désigné."
    es: "El hogar elimina los residuos en un área abierta, campo, curso de agua o espacio comunal sin ningún tratamiento o contención designada."
- code: communal_skip_or_bin
  label:
    en: Communal skip or bin
    fr: "Benne ou poubelle communale"
    es: "Contenedor o cubo comunal"
  definition:
    en: "Household deposits waste in a shared container (skip, bin, or drum) awaiting collection by a service."
    fr: "Le ménage dépose les déchets dans un conteneur partagé (benne, poubelle ou fût) en attente d'une collecte par un service."
    es: "El hogar deposita los residuos en un contenedor compartido (contenedor, cubo o tambor) a la espera de recogida por un servicio."
- code: recycling_or_composting
  label:
    en: Recycling or composting
    fr: "Recyclage ou compostage"
    es: "Reciclaje o compostaje"
  definition:
    en: "Household separates waste for recycling, composting, or sale to recyclers, diverting it from disposal streams."
    fr: "Le ménage sépare les déchets pour le recyclage, le compostage ou la vente à des recycleurs, les détournant des filières d'élimination."
    es: "El hogar separa los residuos para reciclaje, compostaje o venta a recicladores, desviándolos de los flujos de eliminación."
- code: no_disposal
  label:
    en: No disposal practice
    fr: "Aucune pratique d'élimination"
    es: "Sin práctica de eliminación"
  definition:
    en: "The household has no regular method for disposing of solid waste; waste accumulates without management."
    fr: "Le ménage n'a pas de méthode régulière pour éliminer les déchets solides ; les déchets s'accumulent sans gestion."
    es: "El hogar no tiene un método regular para eliminar los residuos sólidos; los residuos se acumulan sin gestión."
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: "Disposal method not covered by the above categories."
    fr: "Méthode d'élimination non couverte par les catégories ci-dessus."
    es: "Método de eliminación no cubierto por las categorías anteriores."
