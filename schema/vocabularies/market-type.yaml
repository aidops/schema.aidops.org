id: market-type
maturity: draft
label:
  en: Market Type
  fr: Type de marché
  es: Tipo de mercado
definition:
  en: >
    The structural and operational category of a market, reflecting its physical
    infrastructure, trading pattern, and role in the local supply chain. Used to
    stratify market monitoring data and inform basket design. Drawn from the EMMA
    Toolkit v2 market-system typology, WFP MAG 2021 market classification, and
    JMMI country deployment precedents.
  fr: >
    La catégorie structurelle et opérationnelle d'un marché, reflétant son
    infrastructure physique, son cycle de négoce et son rôle dans la chaîne
    d'approvisionnement locale. Utilisé pour stratifier les données de suivi des
    marchés et guider la conception du panier. Fondé sur la typologie des systèmes
    de marché de l'EMMA Toolkit v2, la classification des marchés du WFP MAG 2021
    et les précédents de déploiement JMMI par pays.
  es: >
    La categoría estructural y operacional de un mercado, que refleja su
    infraestructura física, su patrón comercial y su papel en la cadena de
    suministro local. Se utiliza para estratificar los datos de monitoreo de
    mercados y orientar el diseño de la cesta. Basado en la tipología de sistemas
    de mercado del EMMA Toolkit v2, la clasificación de mercados del WFP MAG 2021
    y los precedentes de despliegue JMMI por país.
values:
- code: central_wholesale
  label:
    en: Central / wholesale market
    fr: Marché central / de gros
    es: Mercado central / mayorista
  definition:
    en: "Primary collection and redistribution hub that supplies smaller retail markets and traders. Characteristically high vendor count, wide commodity range, large trade volumes. Functions as the upstream node in the EMMA supply chain."
    fr: "Plaque tournante principale de collecte et de redistribution qui approvisionne les marchés de détail plus petits et les commerçants. Caractérisé par un grand nombre de vendeurs, une large gamme de produits et des volumes d'échanges importants. Fonctionne comme le nœud amont dans la chaîne d'approvisionnement EMMA."
    es: "Centro principal de recolección y redistribución que abastece a mercados minoristas más pequeños y comerciantes. Caracterizado por un gran número de vendedores, amplia gama de productos y grandes volúmenes de comercio. Funciona como el nodo upstream en la cadena de suministro EMMA."
- code: retail_periodic
  label:
    en: Periodic retail market
    fr: Marché de détail périodique
    es: Mercado minorista periódico
  definition:
    en: "Opens on one or more fixed days per week; serves a defined catchment area and closes between trading days. Common in rural and semi-urban sub-Saharan Africa, the Sahel, and rural Asia. Periodic markets often draw vendors from surrounding villages."
    fr: "Ouvre un ou plusieurs jours fixes par semaine ; dessert une zone de chalandise définie et ferme entre les jours de négoce. Courant en Afrique subsaharienne rurale et semi-urbaine, au Sahel et en Asie rurale. Les marchés périodiques attirent souvent des vendeurs des villages environnants."
    es: "Abre uno o más días fijos a la semana; sirve a una zona de captación definida y cierra entre los días de comercio. Común en el África subsahariana rural y semiurbana, el Sahel y Asia rural. Los mercados periódicos suelen atraer a vendedores de las aldeas circundantes."
- code: retail_permanent
  label:
    en: Permanent retail market
    fr: Marché de détail permanent
    es: Mercado minorista permanente
  definition:
    en: "Open every day (or most days); fixed stalls or shops with permanent infrastructure. Common in urban and peri-urban settings. More resilient to one-day disruptions than periodic markets."
    fr: "Ouvert tous les jours (ou la plupart des jours) ; étals ou boutiques fixes avec infrastructure permanente. Courant dans les contextes urbains et périurbains. Plus résistant aux perturbations d'un jour que les marchés périodiques."
    es: "Abierto todos los días (o la mayoría de los días); puestos o tiendas fijos con infraestructura permanente. Común en entornos urbanos y periurbanos. Más resistente a las interrupciones de un día que los mercados periódicos."
- code: camp_or_displacement_site
  label:
    en: Displacement site / camp market
    fr: Marché en site de déplacés / camp
    es: Mercado en sitio de desplazados
  definition:
    en: "Market operating inside or immediately adjacent to an IDP or refugee camp, transit site, or other displacement settlement. Often informal; subject to site management rules and access constraints."
    fr: "Marché opérant à l'intérieur ou immédiatement adjacent à un camp de PDI ou de réfugiés, à un site de transit ou à un autre établissement de déplacés. Souvent informel ; soumis aux règles de gestion du site et aux contraintes d'accès."
    es: "Mercado que opera dentro o inmediatamente adyacente a un campamento de PDI o refugiados, sitio de tránsito u otro asentamiento de desplazados. A menudo informal; sujeto a las reglas de gestión del sitio y restricciones de acceso."
- code: informal_roadside
  label:
    en: Informal / roadside vendors
    fr: Vendeurs informels / bord de route
    es: Vendedores informales / borde de camino
  definition:
    en: "Cluster of informal vendors at a roadside, junction, or non-designated location with no fixed market infrastructure. Common in peri-urban areas and immediately after displacement events before permanent markets re-establish."
    fr: "Regroupement de vendeurs informels au bord d'une route, à un carrefour ou à un endroit non désigné sans infrastructure de marché fixe. Courant dans les zones périurbaines et immédiatement après des événements de déplacement avant que les marchés permanents ne se rétablissent."
    es: "Concentración de vendedores informales en un borde de carretera, cruce u otro lugar no designado sin infraestructura de mercado fija. Común en áreas periurbanas e inmediatamente después de eventos de desplazamiento antes de que los mercados permanentes se restablezcan."
- code: border_market
  label:
    en: Border or cross-border market
    fr: Marché frontalier / transfrontalier
    es: Mercado fronterizo / transfronterizo
  definition:
    en: "Located at or near an international or administrative border; trade flows cross the boundary. Subject to cross-border trade regulations, tariffs, checkpoint fees, and may shift significantly based on exchange rate differentials."
    fr: "Situé à ou près d'une frontière internationale ou administrative ; les flux commerciaux franchissent la frontière. Soumis aux réglementations du commerce transfrontalier, aux droits de douane, aux frais de point de contrôle, et peut fluctuer de manière significative en fonction des différentiels de taux de change."
    es: "Ubicado en o cerca de una frontera internacional o administrativa; los flujos comerciales cruzan el límite. Sujeto a las regulaciones del comercio transfronterizo, aranceles, tarifas de control y puede variar significativamente según los diferenciales de tipo de cambio."
- code: agro_pastoral
  label:
    en: Agro-pastoral / livestock market
    fr: Marché agro-pastoral / à bétail
    es: Mercado agro-pastoril / ganadero
  definition:
    en: "Specialized market for livestock sales, animal products, and agro-pastoral inputs such as seeds, veterinary drugs, and farm tools. Key terms-of-trade market for pastoralist communities."
    fr: "Marché spécialisé dans la vente de bétail, de produits animaux et d'intrants agro-pastoraux tels que les semences, les médicaments vétérinaires et les outils agricoles. Marché clé des termes de l'échange pour les communautés pastorales."
    es: "Mercado especializado en la venta de ganado, productos animales e insumos agro-pastoriles como semillas, medicamentos veterinarios y herramientas agrícolas. Mercado clave de términos de intercambio para comunidades pastoriles."
- code: other
  label:
    en: Other market type
    fr: Autre type de marché
    es: Otro tipo de mercado
  definition:
    en: "Market type not captured by the codes above. Use with a form-local enumerator note."
    fr: "Type de marché non couvert par les codes ci-dessus. À utiliser avec une note d'enquêteur locale au formulaire."
    es: "Tipo de mercado no capturado por los códigos anteriores. Usar con una nota de enumerador local al formulario."
