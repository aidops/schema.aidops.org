id: vacc-status
maturity: draft
label:
  en: Vaccination Status
  fr: "Statut vaccinal"
  es: "Estado de vacunación"
definition:
  en: "The evidence basis for whether a child received a given vaccine antigen. Codes distinguish card-verified from recall-only from not-received. Reused across all per-antigen vaccination properties in ChildHealthProfile."
  fr: "La base de preuve indiquant si un enfant a reçu un antigène vaccinal donné. Les codes distinguent la vérification par carnet de la déclaration par mémoire et de la non-réception. Réutilisé pour toutes les propriétés de vaccination par antigène du ChildHealthProfile."
  es: "La base de evidencia que indica si un niño recibió un antígeno vacunal dado. Los códigos distinguen la verificación por tarjeta de la declaración por memoria y de la no recepción. Reutilizado en todas las propiedades de vacunación por antígeno del ChildHealthProfile."
standard:
  name: "DHS-8 Vaccination Variable Coding (h0–h_ms2 series)"
  uri: "https://www.dhsprogram.com/pubs/pdf/DHSG1/Guide_to_DHS_Statistics_DHS-8.pdf"
values:
- code: yes_by_card
  label:
    en: Yes — confirmed by vaccination card
    fr: "Oui — confirmé par carnet de vaccination"
    es: "Sí — confirmado por carnet de vacunación"
  definition:
    en: "The vaccine dose was recorded on the child's home-based vaccination card seen by the enumerator. Maps to DHS h-variable codes 1 (date on card) and 3 (card, date not recorded)."
    fr: "La dose vaccinale est enregistrée sur le carnet de vaccination vu par l'enquêteur. Correspond aux codes DHS 1 (date sur carnet) et 3 (carnet, date non enregistrée)."
    es: "La dosis vacunal está registrada en el carnet de vacunación visto por el encuestador. Corresponde a los códigos DHS 1 (fecha en carnet) y 3 (carnet, fecha no registrada)."
- code: yes_by_recall
  label:
    en: Yes — reported by caregiver recall
    fr: "Oui — déclaré par mémorisation du soignant"
    es: "Sí — declarado por memoria del cuidador"
  definition:
    en: "The caregiver reported that the vaccine was given but no card was available to confirm. Maps to DHS h-variable code 2 (recall)."
    fr: "Le soignant a déclaré que le vaccin a été administré, mais aucun carnet n'est disponible pour confirmation. Correspond au code DHS 2 (mémorisation)."
    es: "El cuidador declaró que la vacuna fue administrada, pero no hay carnet disponible para confirmar. Corresponde al código DHS 2 (memoria)."
- code: "no"
  label:
    en: No — not vaccinated
    fr: "Non — non vacciné"
    es: "No — no vacunado"
  definition:
    en: "The child has not received this vaccine dose according to the card or caregiver report. Maps to DHS h-variable code 0."
    fr: "L'enfant n'a pas reçu cette dose vaccinale selon le carnet ou la déclaration du soignant. Correspond au code DHS 0."
    es: "El niño no ha recibido esta dosis vacunal según el carnet o la declaración del cuidador. Corresponde al código DHS 0."
- code: dont_know
  label:
    en: Don't know
    fr: "Ne sait pas"
    es: "No sabe"
  definition:
    en: "The caregiver does not know whether this vaccine was given. Maps to DHS h-variable code 8."
    fr: "Le soignant ne sait pas si ce vaccin a été administré. Correspond au code DHS 8."
    es: "El cuidador no sabe si se administró esta vacuna. Corresponde al código DHS 8."
system_mappings:
  dhs-8:
    vocabulary_name: "DHS vaccination h-variable codes"
    values:
      - code: "0"
        label: "No"
        maps_to: "no"
      - code: "1"
        label: "Vaccination date on card"
        maps_to: yes_by_card
      - code: "2"
        label: "Reported by mother"
        maps_to: yes_by_recall
      - code: "3"
        label: "Vaccination marked on card"
        maps_to: yes_by_card
      - code: "8"
        label: "Don't know"
        maps_to: dont_know
