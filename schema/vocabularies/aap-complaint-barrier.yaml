id: aap-complaint-barrier
maturity: draft
label:
  en: "AAP: Complaint channel barrier"
  fr: "Redevabilité : Obstacle au canal de plainte"
  es: "Rendición de cuentas: Barrera del canal de quejas"
definition:
  en: "Multi-select list of reasons a household reports that it would not use a complaint channel, even if one is available. Derived from the IASC / REACH Menu of AAP Questions 2018 and the GTS global analysis 'Listening is Not Enough' (2022). Some codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) are PSEA- and safeguarding-adjacent and are used by CHS Alliance audit teams as proxy indicators for an unsafe accountability environment. Properties that use this vocabulary must be flagged `sensitivity: sensitive`."
  fr: "Liste à choix multiples des raisons pour lesquelles un ménage rapporte qu'il n'utiliserait pas un canal de plainte, même si un canal est disponible. Dérivée du Menu de questions AAP IASC / REACH 2018 et de l'analyse globale GTS « Listening is Not Enough » (2022). Certains codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) sont liés à la PSEA et à la sauvegarde et sont utilisés par les équipes d'audit de CHS Alliance comme indicateurs indirects d'un environnement de redevabilité peu sûr. Les propriétés utilisant ce vocabulaire doivent être marquées `sensitivity: sensitive`."
  es: "Lista de selección múltiple de razones por las que un hogar reporta que no utilizaría un canal de quejas, incluso si hay uno disponible. Derivada del Menú de Preguntas AAP IASC / REACH 2018 y del análisis global de GTS «Listening is Not Enough» (2022). Algunos códigos (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) están relacionados con PSEA y salvaguardia y son utilizados por los equipos de auditoría de CHS Alliance como indicadores indirectos de un entorno de rendición de cuentas inseguro. Las propiedades que utilizan este vocabulario deben marcarse como `sensitivity: sensitive`."
standard:
  name: "IASC / REACH Menu of AAP Questions for Needs Assessments 2018"
  uri: "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"
  notes: "Barrier typology extended by the GTS global analysis 'Listening is Not Enough' (2022)."
values:
  - code: dont_know_a_channel
    label:
      en: "Don't know a channel"
      fr: "Ne connaît pas de canal"
      es: "No conoce un canal"
    definition:
      en: "Respondent is not aware of any complaint or feedback channel they could use."
      fr: "Le répondant n'a connaissance d'aucun canal de plainte ou de retour d'information qu'il pourrait utiliser."
      es: "El encuestado no conoce ningún canal de quejas o retroalimentación que pudiera utilizar."
  - code: no_channel_available
    label:
      en: "No channel available"
      fr: "Aucun canal disponible"
      es: "Ningún canal disponible"
    definition:
      en: "Respondent reports that no complaint or feedback channel exists in this area."
      fr: "Le répondant rapporte qu'aucun canal de plainte ou de retour d'information n'existe dans cette zone."
      es: "El encuestado reporta que no existe ningún canal de quejas o retroalimentación en esta zona."
  - code: dont_think_it_would_change_anything
    label:
      en: "Don't think it would change anything"
      fr: "Ne pense pas que cela changerait quoi que ce soit"
      es: "No cree que cambiaría nada"
    definition:
      en: "Respondent believes the channel would not produce any change or response."
      fr: "Le répondant croit que le canal ne produirait aucun changement ni réponse."
      es: "El encuestado cree que el canal no produciría ningún cambio o respuesta."
  - code: fear_of_losing_aid
    label:
      en: "Fear of losing aid"
      fr: "Peur de perdre l'aide"
      es: "Miedo a perder la ayuda"
    definition:
      en: "Respondent fears that using the channel would result in their household losing aid or access. This is a well-documented AAP barrier in GTS global analyses."
      fr: "Le répondant craint que l'utilisation du canal ne conduise à ce que son ménage perde l'aide ou l'accès. Il s'agit d'un obstacle AAP bien documenté dans les analyses globales de GTS."
      es: "El encuestado teme que el uso del canal resulte en que su hogar pierda ayuda o acceso. Es una barrera AAP bien documentada en los análisis globales de GTS."
  - code: fear_of_retaliation_from_staff
    label:
      en: "Fear of retaliation from staff"
      fr: "Peur de représailles du personnel"
      es: "Miedo a represalias del personal"
    definition:
      en: "Respondent fears that aid provider staff would retaliate against them or their household. This is a PSEA-adjacent indicator: elevated rates should trigger a review of the PSEA framework."
      fr: "Le répondant craint que le personnel de l'intervenant ne prenne des représailles contre lui ou son ménage. Il s'agit d'un indicateur proche de la PSEA : des taux élevés devraient déclencher une révision du cadre de PSEA."
      es: "El encuestado teme que el personal del actor humanitario tome represalias contra él o su hogar. Es un indicador relacionado con PSEA: tasas elevadas deberían desencadenar una revisión del marco de PSEA."
  - code: fear_of_retaliation_from_community
    label:
      en: "Fear of retaliation from community"
      fr: "Peur de représailles de la communauté"
      es: "Miedo a represalias de la comunidad"
    definition:
      en: "Respondent fears social or other retaliation from within the community if they file a complaint."
      fr: "Le répondant craint des représailles sociales ou autres de la part de la communauté s'il dépose une plainte."
      es: "El encuestado teme represalias sociales u otras dentro de la comunidad si presenta una queja."
  - code: language_barrier
    label:
      en: "Language barrier"
      fr: "Barrière linguistique"
      es: "Barrera lingüística"
    definition:
      en: "The channel is not available in a language the respondent or their household speaks."
      fr: "Le canal n'est pas disponible dans une langue que le répondant ou son ménage parle."
      es: "El canal no está disponible en un idioma que el encuestado o su hogar habla."
  - code: cost_or_distance
    label:
      en: "Cost or distance"
      fr: "Coût ou distance"
      es: "Costo o distancia"
    definition:
      en: "Using the channel would require travel or payment the respondent cannot afford."
      fr: "L'utilisation du canal nécessiterait un déplacement ou un paiement que le répondant ne peut pas se permettre."
      es: "Usar el canal requeriría un viaje o pago que el encuestado no puede permitirse."
  - code: dont_trust_aid_providers
    label:
      en: "Don't trust aid providers"
      fr: "Ne fait pas confiance aux intervenants"
      es: "No confía en los actores humanitarios"
    definition:
      en: "General distrust of aid providers prevents the respondent from engaging with the channel."
      fr: "La méfiance générale envers les intervenants empêche le répondant de s'engager avec le canal."
      es: "La desconfianza general hacia los actores humanitarios impide que el encuestado interactúe con el canal."
  - code: cultural_or_gender_barrier
    label:
      en: "Cultural or gender barrier"
      fr: "Obstacle culturel ou de genre"
      es: "Barrera cultural o de género"
    definition:
      en: "Cultural norms or gendered roles prevent the respondent from using the channel (for example, women cannot speak to male staff unaccompanied)."
      fr: "Les normes culturelles ou les rôles de genre empêchent le répondant d'utiliser le canal (par exemple, les femmes ne peuvent pas parler à du personnel masculin sans être accompagnées)."
      es: "Las normas culturales o roles de género impiden que el encuestado utilice el canal (por ejemplo, las mujeres no pueden hablar con personal masculino sin acompañamiento)."
  - code: prior_bad_experience
    label:
      en: "Prior bad experience"
      fr: "Mauvaise expérience antérieure"
      es: "Mala experiencia previa"
    definition:
      en: "The respondent or someone they know has previously used the channel and had a negative experience."
      fr: "Le répondant ou quelqu'un qu'il connaît a déjà utilisé le canal et a eu une expérience négative."
      es: "El encuestado o alguien que conoce ha utilizado previamente el canal y tuvo una experiencia negativa."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Barrier not covered by the listed codes."
      fr: "Obstacle non couvert par les codes listés."
      es: "Barrera no cubierta por los códigos listados."
  - code: prefer_not_to_answer
    label:
      en: "Prefer not to answer"
      fr: "Préfère ne pas répondre"
      es: "Prefiere no responder"
    definition:
      en: "Respondent declines to answer."
      fr: "Le répondant refuse de répondre."
      es: "El encuestado se niega a responder."
