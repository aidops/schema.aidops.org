id: fp-discontinuation-reason
maturity: draft
label:
  en: Reason for Contraceptive Discontinuation
  fr: "Raison d'abandon de la contraception"
  es: "Razón para la discontinuación anticonceptiva"
definition:
  en: "The main reason a woman who previously used a contraceptive method stopped using it. Simplified cross-sectional version of the DHS contraceptive calendar-based discontinuation reasons. Used for programme analysis distinguishing method-related from structural discontinuation."
  fr: "La principale raison pour laquelle une femme ayant précédemment utilisé une méthode contraceptive a arrêté de l'utiliser. Version transversale simplifiée des raisons d'abandon basées sur le calendrier contraceptif DHS. Utilisé pour l'analyse de programme distinguant l'abandon lié à la méthode de l'abandon structurel."
  es: "La razón principal por la que una mujer que usó previamente un método anticonceptivo dejó de usarlo. Versión transversal simplificada de las razones de discontinuación basadas en el calendario anticonceptivo DHS. Se usa para el análisis de programas distinguiendo la discontinuación relacionada con el método de la estructural."
values:
  - code: side_effects
    label:
      en: Side effects
      fr: "Effets secondaires"
      es: "Efectos secundarios"
    definition:
      en: "The woman stopped because she experienced side effects from the method (e.g., bleeding, headaches, weight change, mood changes)."
      fr: "La femme a arrêté car elle a subi des effets secondaires de la méthode (p. ex. saignements, maux de tête, changement de poids, changements d'humeur)."
      es: "La mujer dejó de usar porque experimentó efectos secundarios del método (p. ej., sangrado, dolores de cabeza, cambio de peso, cambios de humor)."
  - code: became_pregnant
    label:
      en: Became pregnant while using (method failure)
      fr: "Tombée enceinte en utilisant (échec de méthode)"
      es: "Quedó embarazada mientras usaba (falla del método)"
    definition:
      en: "The woman became pregnant while using the method (contraceptive failure)."
      fr: "La femme est tombée enceinte en utilisant la méthode (échec contraceptif)."
      es: "La mujer quedó embarazada mientras usaba el método (falla anticonceptiva)."
  - code: wanted_to_become_pregnant
    label:
      en: Wanted to become pregnant
      fr: "Souhaitait tomber enceinte"
      es: "Quería quedar embarazada"
    definition:
      en: "The woman stopped using contraception because she wanted to conceive."
      fr: "La femme a arrêté d'utiliser la contraception parce qu'elle voulait concevoir."
      es: "La mujer dejó de usar anticoncepción porque quería concebir."
  - code: spouse_disapproval
    label:
      en: Spouse / partner disapproval
      fr: "Désapprobation du conjoint / partenaire"
      es: "Desaprobación del cónyuge / pareja"
    definition:
      en: "The woman stopped because her spouse or partner opposed use."
      fr: "La femme a arrêté parce que son conjoint ou partenaire s'y opposait."
      es: "La mujer dejó de usar porque su cónyuge o pareja se opuso al uso."
  - code: provider_unavailable
    label:
      en: Provider unavailable
      fr: "Prestataire non disponible"
      es: "Proveedor no disponible"
    definition:
      en: "The woman stopped because she could not access a provider or facility to continue the method."
      fr: "La femme a arrêté car elle ne pouvait pas accéder à un prestataire ou à un établissement pour continuer la méthode."
      es: "La mujer dejó de usar porque no pudo acceder a un proveedor o instalación para continuar con el método."
  - code: method_not_available
    label:
      en: Method not available
      fr: "Méthode non disponible"
      es: "Método no disponible"
    definition:
      en: "The woman stopped because the specific method was out of stock or not available."
      fr: "La femme a arrêté car la méthode spécifique était en rupture de stock ou n'était pas disponible."
      es: "La mujer dejó de usar porque el método específico estaba agotado o no disponible."
  - code: cost
    label:
      en: Too expensive
      fr: "Trop cher"
      es: "Demasiado costoso"
    definition:
      en: "The woman stopped because she could not afford to continue obtaining the method."
      fr: "La femme a arrêté car elle ne pouvait plus se permettre de continuer à obtenir la méthode."
      es: "La mujer dejó de usar porque no podía permitirse continuar obteniendo el método."
  - code: inconvenient
    label:
      en: Inconvenient
      fr: "Peu pratique"
      es: "Inconveniente"
    definition:
      en: "The woman stopped because the method was inconvenient to use (e.g., injection schedule, daily pill)"
      fr: "La femme a arrêté car la méthode était peu pratique à utiliser (p. ex. calendrier d'injection, pilule quotidienne)."
      es: "La mujer dejó de usar porque el método era inconveniente para usar (p. ej., calendario de inyecciones, píldora diaria)."
  - code: health_concerns
    label:
      en: Health concerns
      fr: "Préoccupations de santé"
      es: "Preocupaciones de salud"
    definition:
      en: "The woman stopped due to health concerns or provider advice to stop (not attributed to a specific side effect)."
      fr: "La femme a arrêté en raison de préoccupations sanitaires ou de conseils d'un prestataire d'arrêter (non attribuées à un effet secondaire spécifique)."
      es: "La mujer dejó de usar debido a preocupaciones de salud o consejos del proveedor de detener (no atribuido a un efecto secundario específico)."
  - code: method_failure
    label:
      en: Method failure (not resulting in pregnancy)
      fr: "Échec de méthode (sans grossesse)"
      es: "Falla del método (sin embarazo resultante)"
    definition:
      en: "The woman stopped because the method failed to work as expected but did not result in pregnancy (e.g., IUD expelled, implant complication)."
      fr: "La femme a arrêté parce que la méthode n'a pas fonctionné comme prévu mais sans résulter en grossesse (p. ex. expulsion du DIU, complication d'implant)."
      es: "La mujer dejó de usar porque el método falló sin funcionar como se esperaba pero sin resultar en embarazo (p. ej., DIU expulsado, complicación del implante)."
  - code: other
    label:
      en: Other reason
      fr: "Autre raison"
      es: "Otra razón"
    definition:
      en: "Any reason for discontinuation not captured by the codes above."
      fr: "Toute raison d'abandon non couverte par les codes ci-dessus."
      es: "Cualquier razón de discontinuación no cubierta por los códigos anteriores."
