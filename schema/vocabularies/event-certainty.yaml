id: event-certainty
maturity: draft
label:
  en: Event Certainty
  fr: "Certitude de l'événement"
  es: Certeza del evento

definition:
  en: "The confidence that an event has occurred or will occur. Values are compatible with OASIS CAP v1.2 certainty codes."
  fr: "Le degré de certitude qu'un événement s'est produit ou se produira. Les valeurs sont compatibles avec les codes de certitude d'OASIS CAP v1.2."
  es: "La confianza de que un evento ha ocurrido o ocurrirá. Los valores son compatibles con los códigos de certeza de OASIS CAP v1.2."

standard:
  name: "OASIS CAP v1.2"
  uri: "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"

values:
  - code: observed
    label:
      en: Observed
      fr: Observé
      es: Observado
    definition:
      en: "The event has been observed or confirmed."
      fr: "L'événement a été observé ou confirmé."
      es: "El evento ha sido observado o confirmado."

  - code: likely
    label:
      en: Likely
      fr: Probable
      es: Probable
    definition:
      en: "The event is likely to occur (probability greater than 50%)."
      fr: "L'événement est susceptible de se produire (probabilité supérieure à 50%)."
      es: "Es probable que el evento ocurra (probabilidad superior al 50%)."

  - code: possible
    label:
      en: Possible
      fr: Possible
      es: Posible
    definition:
      en: "The event is possible but not likely (probability less than 50%)."
      fr: "L'événement est possible mais peu probable (probabilité inférieure à 50%)."
      es: "El evento es posible pero poco probable (probabilidad inferior al 50%)."

  - code: unlikely
    label:
      en: Unlikely
      fr: Peu probable
      es: Improbable
    definition:
      en: "The event is not expected to occur."
      fr: "L'événement n'est pas prévu."
      es: "No se espera que el evento ocurra."

  - code: unknown
    label:
      en: Unknown
      fr: Inconnu
      es: Desconocido
    definition:
      en: "Certainty is not yet determined."
      fr: "La certitude n'est pas encore déterminée."
      es: "La certeza aún no se ha determinado."
