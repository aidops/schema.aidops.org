id: care-access-barrier
maturity: draft
label:
  en: Care Access Barrier
  fr: "Barrière d'accès aux soins"
  es: "Barrera de acceso a la atención"
definition:
  en: "Reasons why a household member did not seek or receive needed health care, or why a chronic-treatment episode was interrupted. Shared across unmet-need and treatment-interruption questions in HealthAccessProfile (`care_not_sought_reason`, `care_not_sought_primary_reason`, `chronic_interruption_reason`). Multi-select by default; the primary-reason property selects a single code from the same list. Codes are drawn from the DHS barriers module ('When sick and wanting medical advice...: getting permission, getting money, distance, transport, no female provider, no provider, no drugs') and the PAHO (2020) Americas household-survey barriers framework ('long wait time', 'abuse by health personnel', 'preference for home remedy')."
  fr: "Raisons pour lesquelles un membre du ménage n'a pas recherché ou reçu les soins de santé dont il avait besoin, ou pour lesquelles un épisode de traitement chronique a été interrompu. Partagée entre les questions de besoin non satisfait et d'interruption de traitement dans HealthAccessProfile (`care_not_sought_reason`, `care_not_sought_primary_reason`, `chronic_interruption_reason`). Sélection multiple par défaut ; la propriété de raison principale sélectionne un seul code dans la même liste. Les codes proviennent du module de barrières DHS (« Quand vous êtes malade et souhaitez un avis médical... : obtenir la permission, obtenir de l'argent, la distance, le transport, l'absence de prestataire féminin, l'absence de prestataire, l'absence de médicaments ») et du cadre PAHO (2020) des barrières dans les enquêtes ménage des Amériques (« longue attente », « mauvais traitement par le personnel de santé », « préférence pour les remèdes maison »)."
  es: "Motivos por los que un miembro del hogar no buscó o no recibió la atención de salud necesaria, o por los que se interrumpió un episodio de tratamiento crónico. Compartida entre las preguntas de necesidad insatisfecha e interrupción de tratamiento en HealthAccessProfile (`care_not_sought_reason`, `care_not_sought_primary_reason`, `chronic_interruption_reason`). Selección múltiple por defecto; la propiedad de razón principal selecciona un único código de la misma lista. Los códigos provienen del módulo de barreras DHS ('Cuando está enfermo y desea consejo médico...: obtener permiso, obtener dinero, distancia, transporte, falta de proveedora mujer, falta de proveedor, falta de medicamentos') y del marco PAHO (2020) de barreras en encuestas de hogares de las Américas ('larga espera', 'maltrato por el personal de salud', 'preferencia por remedios caseros')."
values:
  - code: cost_too_high
    label:
      en: Cost too high
      fr: "Coût trop élevé"
      es: "Costo demasiado alto"
    definition:
      en: "The household could not afford the cost of consultation, medicines, hospital fees, or tests."
      fr: "Le ménage ne pouvait pas se permettre le coût de la consultation, des médicaments, des frais hospitaliers ou des examens."
      es: "El hogar no podía costear la consulta, los medicamentos, las tarifas hospitalarias o los exámenes."
  - code: distance_too_far
    label:
      en: Facility too far
      fr: "Établissement trop éloigné"
      es: "Establecimiento demasiado lejos"
    definition:
      en: "The health facility is too far away to reach easily."
      fr: "L'établissement de santé est trop éloigné pour être atteint facilement."
      es: "El establecimiento de salud está demasiado lejos para acceder fácilmente."
  - code: no_transport
    label:
      en: No transport available
      fr: "Pas de transport disponible"
      es: "No hay transporte disponible"
    definition:
      en: "Transportation to the facility was not available or accessible."
      fr: "Le transport vers l'établissement n'était pas disponible ou accessible."
      es: "No había transporte disponible o accesible al establecimiento."
  - code: no_provider_available
    label:
      en: No provider available
      fr: "Aucun prestataire disponible"
      es: "No hay proveedor disponible"
    definition:
      en: "No doctor, nurse, or qualified health worker was available at the facility."
      fr: "Aucun médecin, infirmier ou agent de santé qualifié n'était disponible à l'établissement."
      es: "No había médico, enfermero o personal de salud calificado disponible en el establecimiento."
  - code: no_medicines_available
    label:
      en: Medicines not available
      fr: "Médicaments non disponibles"
      es: "Medicamentos no disponibles"
    definition:
      en: "Needed medicines or supplies were out of stock or unavailable."
      fr: "Les médicaments ou fournitures nécessaires étaient en rupture de stock ou indisponibles."
      es: "Los medicamentos o suministros necesarios estaban agotados o no disponibles."
  - code: quality_concerns
    label:
      en: Quality concerns
      fr: "Préoccupations de qualité"
      es: "Preocupaciones por la calidad"
    definition:
      en: "Concern that care quality would be poor, or previous bad experience at the facility."
      fr: "Crainte que la qualité des soins soit mauvaise, ou mauvaise expérience antérieure dans l'établissement."
      es: "Preocupación de que la calidad de la atención sea deficiente, o mala experiencia previa en el establecimiento."
  - code: discrimination
    label:
      en: Discrimination
      fr: "Discrimination"
      es: "Discriminación"
    definition:
      en: "Fear or experience of being mistreated, stigmatized, or discriminated against at the facility. Maps to PAHO 'abuse by health personnel'."
      fr: "Crainte ou expérience de maltraitance, de stigmatisation ou de discrimination dans l'établissement. Correspond à « mauvais traitement par le personnel de santé » dans l'enquête PAHO."
      es: "Temor o experiencia de maltrato, estigmatización o discriminación en el establecimiento. Corresponde a 'maltrato por el personal de salud' en la encuesta PAHO."
  - code: security
    label:
      en: Security or conflict
      fr: "Sécurité ou conflit"
      es: "Seguridad o conflicto"
    definition:
      en: "Unable to travel to the facility due to conflict, insecurity, or road blockages."
      fr: "Impossible de se rendre à l'établissement en raison d'un conflit, d'une insécurité ou de routes bloquées."
      es: "No se pudo viajar al establecimiento debido a conflicto, inseguridad o bloqueos viales."
  - code: language_barrier
    label:
      en: Language barrier
      fr: "Barrière linguistique"
      es: "Barrera idiomática"
    definition:
      en: "The household member could not communicate effectively with health staff in a common language."
      fr: "Le membre du ménage n'a pas pu communiquer efficacement avec le personnel de santé dans une langue commune."
      es: "El miembro del hogar no pudo comunicarse eficazmente con el personal de salud en un idioma común."
  - code: gender_related
    label:
      en: Gender-related barrier
      fr: "Barrière liée au genre"
      es: "Barrera de género"
    definition:
      en: "Lack of female health worker, cultural norms restricting women from seeking care alone, or other gender-related barrier. Covers DHS 'no female provider'."
      fr: "Absence de personnel de santé féminin, normes culturelles empêchant les femmes de consulter seules, ou autre barrière liée au genre. Couvre « pas de prestataire féminin » du DHS."
      es: "Falta de personal de salud femenino, normas culturales que restringen que las mujeres busquen atención solas u otra barrera de género. Cubre 'falta de proveedora mujer' en DHS."
  - code: cultural_or_religious
    label:
      en: Cultural or religious reason
      fr: "Raison culturelle ou religieuse"
      es: "Razón cultural o religiosa"
    definition:
      en: "Cultural beliefs, traditional practices, or religious objections that prevented seeking formal care."
      fr: "Croyances culturelles, pratiques traditionnelles ou objections religieuses ayant empêché de recourir à des soins formels."
      es: "Creencias culturales, prácticas tradicionales u objeciones religiosas que impidieron buscar atención formal."
  - code: didnt_know_where_to_go
    label:
      en: Did not know where to go
      fr: "Ne savait pas où aller"
      es: "No sabía adónde ir"
    definition:
      en: "The household did not know which facility or provider to approach."
      fr: "Le ménage ne savait pas à quel établissement ou prestataire s'adresser."
      es: "El hogar no sabía a qué establecimiento o proveedor acudir."
  - code: permission_not_given
    label:
      en: Permission not given
      fr: "Permission non accordée"
      es: "No se dio permiso"
    definition:
      en: "Household member required permission from a spouse, family member, or elder and did not receive it. Maps to DHS 'getting permission to go'."
      fr: "Le membre du ménage avait besoin d'une permission d'un conjoint, d'un membre de la famille ou d'un aîné et ne l'a pas reçue. Correspond à « obtenir la permission d'y aller » dans le DHS."
      es: "El miembro del hogar necesitaba permiso de un cónyuge, familiar o persona mayor y no lo recibió. Corresponde a 'obtener permiso para ir' en DHS."
  - code: not_serious_enough
    label:
      en: Condition not serious enough
      fr: "État pas assez grave"
      es: "Afección no lo suficientemente grave"
    definition:
      en: "The household considered the illness or condition not severe enough to seek professional care."
      fr: "Le ménage a estimé que la maladie ou l'état n'était pas suffisamment grave pour justifier des soins professionnels."
      es: "El hogar consideró que la enfermedad o afección no era lo suficientemente grave como para buscar atención profesional."
  - code: long_wait_time
    label:
      en: Long wait time
      fr: "Temps d'attente long"
      es: "Tiempo de espera largo"
    definition:
      en: "Previous experience or expectation of unacceptably long waiting time at the facility. Maps to PAHO 'long wait time'."
      fr: "Expérience antérieure ou anticipation d'un temps d'attente inacceptable à l'établissement. Correspond à « temps d'attente long » dans l'enquête PAHO."
      es: "Experiencia previa o expectativa de un tiempo de espera inaceptablemente largo en el establecimiento. Corresponde a 'tiempo de espera largo' en la encuesta PAHO."
  - code: other
    label:
      en: Other
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Barrier not captured by any code above."
      fr: "Barrière non couverte par aucun code ci-dessus."
      es: "Barrera no cubierta por ningún código anterior."
