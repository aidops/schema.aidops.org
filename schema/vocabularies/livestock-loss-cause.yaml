id: livestock-loss-cause
maturity: draft
label:
  en: "Livestock Loss Cause"
  fr: "Cause de perte de bétail"
  es: "Causa de pérdida de ganado"
definition:
  en: "Primary cause of livestock deaths or losses in the recall period. Used alongside `livestock_losses_count_past_12mo` in PastoralFoodSecurityProfile to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Note: codes `raiding_theft` and `conflict_collateral` are partially sensitive and should be aggregated to community level before sharing with non-programme partners."
  fr: "Cause principale des décès ou pertes de bétail au cours de la période de rappel. Utilisé avec `livestock_losses_count_past_12mo` pour permettre l'analyse des causes d'attrition. Les codes `raiding_theft` et `conflict_collateral` sont partiellement sensibles."
  es: "Causa principal de las muertes o pérdidas de ganado durante el período de recordatorio. Usado junto con `livestock_losses_count_past_12mo` para el análisis de causas de desgaste. Los códigos `raiding_theft` y `conflict_collateral` son parcialmente sensibles."
values:
  - code: drought_thirst_starvation
    label:
      en: "Drought, thirst, or starvation"
      fr: "Sécheresse, soif ou famine"
      es: "Sequía, sed o hambre"
    definition:
      en: "Animals died as a result of inadequate water or pasture due to drought conditions."
      fr: "Les animaux sont morts par manque d'eau ou de pâturage dû aux conditions de sécheresse."
      es: "Los animales murieron como resultado de agua o pastos inadecuados debido a condiciones de sequía."
  - code: disease_epidemic
    label:
      en: "Disease or epidemic"
      fr: "Maladie ou épidémie"
      es: "Enfermedad o epidemia"
    definition:
      en: "Animals died or were culled due to infectious disease, including epizootic outbreaks."
      fr: "Les animaux sont morts ou ont été abattus en raison d'une maladie infectieuse, y compris des épizooties."
      es: "Los animales murieron o fueron sacrificados debido a enfermedades infecciosas, incluidos brotes epizoóticos."
  - code: parasites
    label:
      en: "Parasites or ticks"
      fr: "Parasites ou tiques"
      es: "Parásitos o garrapatas"
    definition:
      en: "Mortality or production loss due to internal or external parasites."
      fr: "Mortalité ou perte de production due à des parasites internes ou externes."
      es: "Mortalidad o pérdida de producción debida a parásitos internos o externos."
  - code: raiding_theft
    label:
      en: "Raiding or theft"
      fr: "Razzia ou vol"
      es: "Rapiña o robo"
    definition:
      en: "Animals stolen in a raid or by theft, including armed or inter-community raiding. Partially sensitive: aggregate to community level before sharing with non-programme partners."
      fr: "Animaux volés lors d'une razzia ou d'un vol, y compris des razzias armées ou intercommunautaires. Partiellement sensible."
      es: "Animales robados en una rapiña o por robo, incluida la rapiña armada o intercomunal. Parcialmente sensible."
  - code: natural_disaster_flood
    label:
      en: "Natural disaster (flood, sandstorm, or other acute event)"
      fr: "Catastrophe naturelle (inondation, tempête de sable ou autre événement aigu)"
      es: "Desastre natural (inundación, tormenta de arena u otro evento agudo)"
    definition:
      en: "Animals lost due to flood, sandstorm, or other acute natural event not covered by the drought code."
      fr: "Animaux perdus en raison d'une inondation, d'une tempête de sable ou d'un autre événement naturel aigu."
      es: "Animales perdidos debido a inundación, tormenta de arena u otro evento natural agudo."
  - code: conflict_collateral
    label:
      en: "Conflict-related — collateral loss"
      fr: "Lié au conflit — perte collatérale"
      es: "Relacionado con el conflicto — pérdida colateral"
    definition:
      en: "Animals killed or lost as collateral damage during armed conflict. Partially sensitive: aggregate to community level before sharing with non-programme partners."
      fr: "Animaux tués ou perdus en dommages collatéraux lors d'un conflit armé. Partiellement sensible."
      es: "Animales muertos o perdidos como daño colateral durante un conflicto armado. Parcialmente sensible."
  - code: sold_distress
    label:
      en: "Sold under distress (not a death)"
      fr: "Vendus sous contrainte (pas un décès)"
      es: "Vendidos bajo estrés (no una muerte)"
    definition:
      en: "Animals disposed of through distress sale rather than death; included for complete herd-attrition accounting."
      fr: "Animaux cédés par vente de détresse plutôt que par décès ; inclus pour un bilan complet de l'attrition du troupeau."
      es: "Animales desechados mediante venta de estrés en lugar de muerte; incluido para la contabilización completa del desgaste del rebaño."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Cause of livestock loss not listed in the codes above."
      fr: "Cause de perte de bétail non répertoriée dans les codes ci-dessus."
      es: "Causa de pérdida de ganado no listada en los códigos anteriores."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot identify the primary cause of livestock losses."
      fr: "Le répondant ne peut pas identifier la cause principale des pertes de bétail."
      es: "El encuestado no puede identificar la causa principal de las pérdidas de ganado."
