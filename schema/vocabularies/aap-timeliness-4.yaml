id: aap-timeliness-4
maturity: draft
label:
  en: "AAP: Aid timeliness (4 levels)"
  fr: "Redevabilité : Opportunité de l'aide (4 niveaux)"
  es: "Rendición de cuentas: Oportunidad de la ayuda (4 niveles)"
definition:
  en: "Four-level scale for the respondent's perception of whether aid arrived when it was needed. Source: IASC / REACH Menu of AAP Questions 2018 and GTS HVI timeliness indicator. This measures the respondent's subjective experience; the objective measure (actual days between request/eligibility and delivery) belongs to operational M&E data rather than to this profile."
  fr: "Échelle à quatre niveaux pour la perception du répondant sur le fait que l'aide soit arrivée au moment où elle était nécessaire. Source : Menu de questions AAP IASC / REACH 2018 et indicateur de rapidité GTS HVI. Ceci mesure l'expérience subjective du répondant ; la mesure objective (jours réels entre la demande/admissibilité et la livraison) appartient aux données opérationnelles de suivi-évaluation plutôt qu'à ce profil."
  es: "Escala de cuatro niveles para la percepción del encuestado sobre si la ayuda llegó cuando se necesitaba. Fuente: Menú de Preguntas AAP IASC / REACH 2018 e indicador de oportunidad de GTS HVI. Esto mide la experiencia subjetiva del encuestado; la medida objetiva (días reales entre la solicitud/elegibilidad y la entrega) pertenece a los datos operativos de seguimiento y evaluación en lugar de a este perfil."
standard:
  name: "IASC / REACH Menu of AAP Questions for Needs Assessments 2018"
  uri: "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"
  notes: "Timeliness 4-level scale as used in IASC / REACH menu and GTS HVI."
values:
  - code: yes_on_time
    label:
      en: "Yes, on time"
      fr: "Oui, à temps"
      es: "Sí, a tiempo"
    definition:
      en: "Aid arrived when it was needed."
      fr: "L'aide est arrivée au moment où elle était nécessaire."
      es: "La ayuda llegó cuando se necesitaba."
  - code: somewhat_late
    label:
      en: "Somewhat late"
      fr: "Un peu en retard"
      es: "Algo tarde"
    definition:
      en: "Aid arrived later than needed but was still usable."
      fr: "L'aide est arrivée plus tard que nécessaire mais restait utilisable."
      es: "La ayuda llegó más tarde de lo necesario pero aún era utilizable."
  - code: very_late
    label:
      en: "Very late"
      fr: "Très en retard"
      es: "Muy tarde"
    definition:
      en: "Aid arrived so late that its usefulness was significantly reduced."
      fr: "L'aide est arrivée si tard que son utilité a été considérablement réduite."
      es: "La ayuda llegó tan tarde que su utilidad se redujo significativamente."
  - code: too_late_to_be_useful
    label:
      en: "Too late to be useful"
      fr: "Trop tard pour être utile"
      es: "Demasiado tarde para ser útil"
    definition:
      en: "Aid arrived after the need had passed and could not be used."
      fr: "L'aide est arrivée après que le besoin soit passé et n'a pas pu être utilisée."
      es: "La ayuda llegó después de que la necesidad hubiera pasado y no pudo utilizarse."
  - code: dont_know
    label:
      en: "Don't know"
      fr: "Ne sait pas"
      es: "No sabe"
    definition:
      en: "Respondent cannot assess timeliness."
      fr: "Le répondant ne peut pas évaluer la rapidité."
      es: "El encuestado no puede evaluar la oportunidad."
  - code: not_applicable_no_aid_received
    label:
      en: "Not applicable — no aid received"
      fr: "Non applicable — aucune aide reçue"
      es: "No aplicable — no se recibió ayuda"
    definition:
      en: "The household has not received any aid, so timeliness cannot be assessed."
      fr: "Le ménage n'a reçu aucune aide, de sorte que la rapidité ne peut être évaluée."
      es: "El hogar no ha recibido ninguna ayuda, por lo que la oportunidad no puede evaluarse."
  - code: prefer_not_to_answer
    label:
      en: "Prefer not to answer"
      fr: "Préfère ne pas répondre"
      es: "Prefiere no responder"
    definition:
      en: "Respondent declines to answer."
      fr: "Le répondant refuse de répondre."
      es: "El encuestado se niega a responder."
