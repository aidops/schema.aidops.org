id: iycf-breastfeeding-initiation
maturity: draft
label:
  en: IYCF Breastfeeding Initiation Timing
  fr: "Délai d'initiation à l'allaitement IYCF"
  es: "Momento de inicio de la lactancia materna IYCF"
definition:
  en: "The timing of first breastfeeding after birth, used to compute the Early Initiation of Breastfeeding (EIBF) indicator. A child is classified as having achieved EIBF if put to the breast within one hour of birth. Coded from the caregiver's response to the question: 'How long after birth was the child first put to the breast?'"
  fr: "Le délai d'initiation à l'allaitement après la naissance, utilisé pour calculer l'indicateur d'allaitement précoce (EIBF). Un enfant est classé comme ayant atteint l'EIBF s'il a été mis au sein dans l'heure suivant sa naissance. Codé d'après la réponse du soignant à la question : « Combien de temps après la naissance l'enfant a-t-il été mis au sein pour la première fois ? »"
  es: "El momento de inicio de la lactancia materna después del nacimiento, utilizado para calcular el indicador de inicio temprano de la lactancia materna (EIBF). Se clasifica que un niño ha logrado el EIBF si fue puesto al pecho dentro de la primera hora después del nacimiento. Se codifica a partir de la respuesta del cuidador a la pregunta: '¿Cuánto tiempo después del nacimiento se puso al niño al pecho por primera vez?'"
standard:
  name: "Indicators for assessing infant and young child feeding practices: definitions and measurement methods"
  uri: "https://www.who.int/publications/i/item/9789240018389"
values:
- code: within_1_hour
  label:
    en: Within 1 hour
    fr: "Dans l'heure"
    es: En la primera hora
  definition:
    en: "The child was first put to the breast within one hour of birth. Meets the threshold for Early Initiation of Breastfeeding (EIBF)."
    fr: "L'enfant a été mis au sein pour la première fois dans l'heure suivant sa naissance. Remplit le critère de l'allaitement précoce (EIBF)."
    es: "El niño fue puesto al pecho por primera vez dentro de la primera hora después del nacimiento. Cumple el umbral para el inicio temprano de la lactancia materna (EIBF)."
- code: one_to_23_hours
  label:
    en: After 1 hour but within 24 hours
    fr: "Après 1 heure mais dans les 24 heures"
    es: "Después de 1 hora pero dentro de las 24 horas"
  definition:
    en: "The child was first put to the breast more than one hour but within 24 hours of birth. Does not meet the EIBF threshold."
    fr: "L'enfant a été mis au sein pour la première fois plus d'une heure mais dans les 24 heures suivant sa naissance. Ne remplit pas le critère EIBF."
    es: "El niño fue puesto al pecho por primera vez más de una hora pero dentro de las 24 horas después del nacimiento. No cumple el umbral del EIBF."
- code: after_24_hours
  label:
    en: After 24 hours
    fr: "Après 24 heures"
    es: "Después de 24 horas"
  definition:
    en: "The child was first put to the breast more than 24 hours after birth. Does not meet the EIBF threshold."
    fr: "L'enfant a été mis au sein pour la première fois plus de 24 heures après sa naissance. Ne remplit pas le critère EIBF."
    es: "El niño fue puesto al pecho por primera vez más de 24 horas después del nacimiento. No cumple el umbral del EIBF."
- code: never_breastfed
  label:
    en: Never breastfed
    fr: "Jamais allaité"
    es: Nunca amamantado
  definition:
    en: "The child was never put to the breast. Only applicable when the parent question (ever breastfed) indicates no breastfeeding; recorded to distinguish from missing data."
    fr: "L'enfant n'a jamais été mis au sein. Applicable uniquement lorsque la question parente (jamais allaité) indique qu'il n'y a pas eu d'allaitement ; enregistré pour distinguer des données manquantes."
    es: "El niño nunca fue puesto al pecho. Solo aplicable cuando la pregunta principal (¿alguna vez fue amamantado?) indica que no hubo lactancia materna; se registra para distinguir de datos faltantes."
system_mappings:
  who-iycf-2021:
    vocabulary_name: "WHO/UNICEF IYCF 2021 EIBF response categories"
    values:
      - code: "1"
        label: "Within 1 hour of birth"
        maps_to: within_1_hour
      - code: "2"
        label: "After 1 hour but within 24 hours"
        maps_to: one_to_23_hours
      - code: "3"
        label: "More than 24 hours after birth"
        maps_to: after_24_hours
      - code: "4"
        label: "Never breastfed"
        maps_to: never_breastfed
    note: "Response categories from the WHO/UNICEF 2021 example EIBF questionnaire module. Code 4 (never breastfed) is an edge case for the initiation question and is typically captured by the prior 'ever breastfed' screening question."
