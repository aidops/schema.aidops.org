id: weai-group-type
maturity: draft
label:
  en: WEAI Group Type
  fr: "Type de groupe WEAI"
  es: "Tipo de grupo WEAI"
definition:
  en: "Enumeration of group types used in pro-WEAI Indicator C1 (group membership) and Indicator C2 (membership in influential groups). The respondent reports active membership in one or more of these group types. The list provides canonical anchors; project implementations may extend it with context-specific types. Adequacy for C1 requires active membership in at least one group of any type."
  fr: "Énumération des types de groupes utilisés dans l'Indicateur C1 du pro-WEAI (appartenance à un groupe) et l'Indicateur C2 (appartenance à des groupes influents). Le répondant déclare une adhésion active dans un ou plusieurs de ces types de groupes. La liste fournit des ancres canoniques ; les implémentations de projets peuvent l'étendre avec des types spécifiques au contexte. L'adéquation pour C1 nécessite une appartenance active à au moins un groupe de n'importe quel type."
  es: "Enumeración de tipos de grupos utilizados en el Indicador C1 del pro-WEAI (membresía de grupo) y el Indicador C2 (membresía en grupos influyentes). El encuestado reporta membresía activa en uno o más de estos tipos de grupos. La lista proporciona anclas canónicas; las implementaciones de proyectos pueden extenderla con tipos específicos del contexto. La adecuación para C1 requiere membresía activa en al menos un grupo de cualquier tipo."
standard:
  name: "pro-WEAI User Guide v3 (IFPRI 2026)"
  uri: "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"
values:
  - code: farmer_producer_group
    label:
      en: Farmer or producer group
      fr: "Groupe d'agriculteurs ou de producteurs"
      es: "Grupo de agricultores o productores"
    definition:
      en: "A formal or informal group organized around agricultural production, livestock, or fishery activities."
      fr: "Un groupe formel ou informel organisé autour de la production agricole, de l'élevage ou des activités de pêche."
      es: "Un grupo formal o informal organizado en torno a la producción agrícola, la ganadería o las actividades pesqueras."
  - code: water_user_group
    label:
      en: Water user group
      fr: "Groupe d'usagers de l'eau"
      es: "Grupo de usuarios de agua"
    definition:
      en: "A group managing access to or use of water resources, including irrigation committees and water point committees."
      fr: "Un groupe gérant l'accès aux ressources en eau ou leur utilisation, y compris les comités d'irrigation et les comités de points d'eau."
      es: "Un grupo que gestiona el acceso o uso de recursos hídricos, incluidos comités de riego y comités de puntos de agua."
  - code: savings_credit_group
    label:
      en: Savings or credit group
      fr: "Groupe d'épargne ou de crédit"
      es: "Grupo de ahorro o crédito"
    definition:
      en: "A group providing savings, credit, or mutual financial support, including VSLAs, ROSCAs, and MFI-linked groups."
      fr: "Un groupe fournissant des services d'épargne, de crédit ou de soutien financier mutuel, y compris les AVEC, les tontines et les groupes liés aux IMF."
      es: "Un grupo que proporciona ahorro, crédito o apoyo financiero mutuo, incluidos grupos VSLA, ROSCAs y grupos vinculados a IMF."
  - code: religious_group
    label:
      en: Religious group
      fr: "Groupe religieux"
      es: "Grupo religioso"
    definition:
      en: "A group organized around religious practice, including church groups, mosque committees, and faith-based community groups."
      fr: "Un groupe organisé autour de la pratique religieuse, y compris les groupes d'église, les comités de mosquée et les groupes communautaires confessionnels."
      es: "Un grupo organizado en torno a la práctica religiosa, incluidos grupos de iglesia, comités de mezquita y grupos comunitarios religiosos."
  - code: womens_group
    label:
      en: "Women's group"
      fr: "Groupe de femmes"
      es: "Grupo de mujeres"
    definition:
      en: "A group organized specifically for women, including women's associations, mother's groups, and gender-focused community groups."
      fr: "Un groupe organisé spécifiquement pour les femmes, y compris les associations féminines, les groupes de mères et les groupes communautaires axés sur le genre."
      es: "Un grupo organizado específicamente para mujeres, incluidas asociaciones de mujeres, grupos de madres y grupos comunitarios centrados en género."
  - code: youth_group
    label:
      en: Youth group
      fr: "Groupe de jeunes"
      es: "Grupo juvenil"
    definition:
      en: "A group organized for or by young people, including youth associations and sports clubs."
      fr: "Un groupe organisé pour ou par des jeunes, y compris les associations de jeunes et les clubs sportifs."
      es: "Un grupo organizado para o por jóvenes, incluidas asociaciones juveniles y clubes deportivos."
  - code: political_group
    label:
      en: Political group
      fr: "Groupe politique"
      es: "Grupo político"
    definition:
      en: "A group involved in political activities, including political party branches, civic advocacy groups, and community leadership committees."
      fr: "Un groupe impliqué dans des activités politiques, y compris les sections de partis politiques, les groupes de plaidoyer civique et les comités de direction communautaire."
      es: "Un grupo involucrado en actividades políticas, incluidas secciones de partidos políticos, grupos de defensa cívica y comités de liderazgo comunitario."
  - code: ngo_programme_group
    label:
      en: NGO or programme group
      fr: "Groupe ONG ou programme"
      es: "Grupo ONG o programa"
    definition:
      en: "A group established or supported by an NGO or development programme, including beneficiary groups, community health worker groups, and extension farmer groups."
      fr: "Un groupe établi ou soutenu par une ONG ou un programme de développement, y compris les groupes de bénéficiaires, les groupes d'agents de santé communautaire et les groupes d'agriculteurs de vulgarisation."
      es: "Un grupo establecido o apoyado por una ONG o programa de desarrollo, incluidos grupos de beneficiarios, grupos de agentes de salud comunitaria y grupos de agricultores de extensión."
  - code: other
    label:
      en: Other group
      fr: "Autre groupe"
      es: "Otro grupo"
    definition:
      en: "A group type not covered by the canonical list above. Record the group name in a free-text companion field."
      fr: "Un type de groupe non couvert par la liste canonique ci-dessus. Enregistrer le nom du groupe dans un champ de texte libre associé."
      es: "Un tipo de grupo no cubierto por la lista canónica anterior. Registre el nombre del grupo en un campo de texto libre asociado."
