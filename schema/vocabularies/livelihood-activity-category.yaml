id: livelihood-activity-category
maturity: draft
label:
  en: Livelihood Activity Category
  fr: "Catégorie d'activité de subsistance"
  es: "Categoría de actividad de subsistencia"
definition:
  en: "Primary and secondary livelihood activity classification for humanitarian contexts. Synthesised from LSMS-ISA activity coding, MICS6 income module, the Sphere 2018 Livelihoods chapter, and IOM DTM Multi-Sectoral Location Assessment (MSLA). Used to classify what the household does to earn a living or meet its food needs."
  fr: "Classification des activités de subsistance primaires et secondaires pour les contextes humanitaires. Synthétisée à partir du codage d'activité LSMS-ISA, du module revenus MICS6, du chapitre Moyens de subsistance de Sphère 2018 et de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM. Utilisée pour classer ce que le ménage fait pour gagner sa vie ou subvenir à ses besoins alimentaires."
  es: "Clasificación de actividades de subsistencia primarias y secundarias para contextos humanitarios. Sintetizada a partir de la codificación de actividades LSMS-ISA, el módulo de ingresos MICS6, el capítulo de Medios de Vida de Esfera 2018 y la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM. Se utiliza para clasificar lo que el hogar hace para ganarse la vida o satisfacer sus necesidades alimentarias."
standard:
  name: "Synthesised from LSMS-ISA, MICS6, Sphere 2018 Livelihoods chapter, and IOM DTM MSLA"
  notes: "Specific farm data belongs to AgricultureProfile via `farming_system` and related properties; this category list stays at household-portfolio granularity."
values:
  - code: agriculture
    label:
      en: Crop farming
      fr: "Agriculture vivrière et commerciale"
      es: "Agricultura"
    definition:
      en: "Cultivation of crops (food and cash) as the primary livelihood activity. Specific farm data belongs to AgricultureProfile."
      fr: "Culture de productions vivrières et de rente comme activité principale de subsistance. Les données spécifiques à l'exploitation relèvent d'AgricultureProfile."
      es: "Cultivo de productos alimentarios y comerciales como actividad principal de subsistencia. Los datos específicos de la explotación pertenecen a AgricultureProfile."
  - code: livestock
    label:
      en: "Livestock herding / pastoralism"
      fr: "Élevage / pastoralisme"
      es: "Ganadería / pastoralismo"
    definition:
      en: "Keeping, herding, or selling livestock (cattle, goats, sheep, camels, poultry). Specific livestock data belongs to AgricultureProfile."
      fr: "Garde, élevage ou vente de bétail (bovins, caprins, ovins, chameaux, volailles). Les données spécifiques au bétail relèvent d'AgricultureProfile."
      es: "Cría, pastoreo o venta de ganado (bovinos, caprinos, ovinos, camellos, aves). Los datos específicos de ganado pertenecen a AgricultureProfile."
  - code: fishing
    label:
      en: "Fishing / aquaculture"
      fr: "Pêche / aquaculture"
      es: "Pesca / acuicultura"
    definition:
      en: "Freshwater or marine fishing, fish farming, or collection of aquatic resources."
      fr: "Pêche en eau douce ou maritime, pisciculture ou collecte de ressources aquatiques."
      es: "Pesca en agua dulce o marina, piscicultura o recolección de recursos acuáticos."
  - code: petty_trade
    label:
      en: "Petty trade / market vendor"
      fr: "Petit commerce / vendeur de marché"
      es: "Comercio informal / vendedor de mercado"
    definition:
      en: "Small-scale buying and selling of goods at market or roadside without a formal business registration."
      fr: "Achat et vente à petite échelle de biens au marché ou en bord de route sans enregistrement formel d'entreprise."
      es: "Compra y venta a pequeña escala de bienes en el mercado o al borde del camino sin registro formal de negocio."
  - code: formal_employment
    label:
      en: Formal wage employment
      fr: "Emploi salarié formel"
      es: "Empleo formal asalariado"
    definition:
      en: "Regular paid employment with a formal employer (government, NGO, private company)."
      fr: "Emploi rémunéré régulier auprès d'un employeur formel (gouvernement, ONG, entreprise privée)."
      es: "Empleo remunerado regular con un empleador formal (gobierno, ONG, empresa privada)."
  - code: casual_day_labor
    label:
      en: Casual or day labour
      fr: "Travail journalier / occasionnel"
      es: "Trabajo casual o jornalero"
    definition:
      en: "Irregular, short-term labour for daily wages without a formal contract."
      fr: "Travail irrégulier à court terme pour des salaires journaliers sans contrat formel."
      es: "Trabajo irregular a corto plazo por salarios diarios sin contrato formal."
  - code: skilled_trade_services
    label:
      en: Skilled trade or services
      fr: "Métier qualifié ou services"
      es: "Oficio cualificado o servicios"
    definition:
      en: "Provision of skilled services such as carpentry, masonry, tailoring, mechanics, hairdressing, or similar trades."
      fr: "Prestation de services qualifiés tels que menuiserie, maçonnerie, couture, mécanique, coiffure ou métiers similaires."
      es: "Prestación de servicios cualificados como carpintería, albañilería, sastrería, mecánica, peluquería u oficios similares."
  - code: remittances
    label:
      en: Remittances received
      fr: "Envois de fonds reçus"
      es: "Remesas recibidas"
    definition:
      en: "Primary reliance on money sent by household members or relatives living elsewhere (internal or international)."
      fr: "Dépendance primaire à l'égard de l'argent envoyé par des membres du ménage ou des proches vivant ailleurs (interne ou international)."
      es: "Dependencia principal del dinero enviado por miembros del hogar o familiares que viven en otro lugar (interno o internacional)."
  - code: social_transfers
    label:
      en: Government social transfers
      fr: "Transferts sociaux gouvernementaux"
      es: "Transferencias sociales gubernamentales"
    definition:
      en: "Government cash transfers, pensions, or safety-net programmes as the primary income source."
      fr: "Transferts monétaires gouvernementaux, pensions ou programmes de filets de sécurité comme source principale de revenus."
      es: "Transferencias monetarias gubernamentales, pensiones o programas de redes de seguridad como fuente principal de ingresos."
  - code: aid_dependent
    label:
      en: Humanitarian aid dependent
      fr: "Dépendance à l'aide humanitaire"
      es: "Dependencia de la ayuda humanitaria"
    definition:
      en: "Household relies primarily on food, cash, or in-kind assistance from humanitarian agencies (NGOs, UN)."
      fr: "Le ménage dépend principalement de la nourriture, des espèces ou de l'aide en nature d'agences humanitaires (ONG, ONU)."
      es: "El hogar depende principalmente de alimentos, efectivo o asistencia en especie de agencias humanitarias (ONG, ONU)."
  - code: gathering_natural_resources
    label:
      en: "Gathering / natural resource use"
      fr: "Cueillette / ressources naturelles"
      es: "Recolección / recursos naturales"
    definition:
      en: "Collecting wood, charcoal, water, wild foods, or other natural resources for sale or household use."
      fr: "Collecte de bois, charbon, eau, aliments sauvages ou autres ressources naturelles pour la vente ou l'usage du ménage."
      es: "Recolección de madera, carbón, agua, alimentos silvestres u otros recursos naturales para la venta o uso doméstico."
  - code: other
    label:
      en: Other
      fr: Autre
      es: Otro
    definition:
      en: "Livelihood activity not covered by the above categories."
      fr: "Activité de subsistance non couverte par les catégories ci-dessus."
      es: "Actividad de subsistencia no cubierta por las categorías anteriores."
