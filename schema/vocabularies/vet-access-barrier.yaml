id: vet-access-barrier
maturity: draft
label:
  en: "Veterinary Services Access Barrier"
  fr: "Obstacle à l'accès aux services vétérinaires"
  es: "Barrera al acceso a servicios veterinarios"
definition:
  en: "Reasons preventing a pastoral household from accessing veterinary or animal health services when needed. Multi-select vocabulary used in PastoralFoodSecurityProfile `vet_access_barriers`. The taxonomy is pastoral-specific: it includes `vet_post_outside_migration_route` (services not accessible during migration movement) and `conflict_insecurity` (armed conflict blocking access), which are barriers characteristic of mobile herding households that are not present in equivalent AgricultureProfile items."
  fr: "Raisons empêchant un ménage pastoral d'accéder aux services vétérinaires ou de santé animale. Vocabulaire à sélection multiple. Taxonomie propre au pastoralisme : inclut `vet_post_outside_migration_route` et `conflict_insecurity`, caractéristiques des ménages d'élevage mobile."
  es: "Razones que impiden a un hogar pastoral acceder a servicios veterinarios o de salud animal. Vocabulario de selección múltiple. La taxonomía es específica del pastoralismo: incluye `vet_post_outside_migration_route` y `conflict_insecurity`, características de hogares de ganadería móvil."
values:
  - code: no_vet_post_nearby
    label:
      en: "No veterinary post or animal health worker nearby"
      fr: "Pas de poste vétérinaire ni d'agent de santé animale à proximité"
      es: "No hay puesto veterinario ni trabajador de salud animal cercano"
    definition:
      en: "The nearest veterinary service is too far from the household's location or migration route to be practically accessible."
      fr: "Le service vétérinaire le plus proche est trop éloigné de l'emplacement du ménage ou de sa route de migration pour être pratiquement accessible."
      es: "El servicio veterinario más cercano está demasiado lejos de la ubicación del hogar o de su ruta de migración para ser accesible en la práctica."
  - code: vet_post_outside_migration_route
    label:
      en: "Veterinary post not on migration route"
      fr: "Poste vétérinaire hors de la route de migration"
      es: "Puesto veterinario fuera de la ruta de migración"
    definition:
      en: "Veterinary services are available in principle but not accessible during the household's migration movement; the post is located off the migration corridor."
      fr: "Les services vétérinaires sont disponibles en principe mais pas accessibles pendant le déplacement de migration du ménage ; le poste est situé hors du couloir de migration."
      es: "Los servicios veterinarios están disponibles en principio pero no son accesibles durante el movimiento de migración del hogar; el puesto está ubicado fuera del corredor de migración."
  - code: cost_unaffordable
    label:
      en: "Cost of services too high"
      fr: "Coût des services trop élevé"
      es: "Costo de los servicios demasiado alto"
    definition:
      en: "Household could not afford the cost of veterinary drugs, vaccines, or consultation fees."
      fr: "Le ménage ne pouvait pas se permettre le coût des médicaments vétérinaires, des vaccins ou des frais de consultation."
      es: "El hogar no podía costear los medicamentos veterinarios, vacunas o tarifas de consulta."
  - code: drug_stockout
    label:
      en: "Drugs or vaccines out of stock"
      fr: "Médicaments ou vaccins en rupture de stock"
      es: "Medicamentos o vacunas agotados"
    definition:
      en: "Veterinary services were available but the needed drugs, vaccines, or supplies were out of stock at the point of service."
      fr: "Les services vétérinaires étaient disponibles mais les médicaments, vaccins ou fournitures nécessaires étaient en rupture de stock."
      es: "Los servicios veterinarios estaban disponibles pero los medicamentos, vacunas o suministros necesarios estaban agotados en el punto de servicio."
  - code: conflict_insecurity
    label:
      en: "Conflict or insecurity blocked access"
      fr: "Conflit ou insécurité a bloqué l'accès"
      es: "Conflicto o inseguridad bloqueó el acceso"
    definition:
      en: "Armed conflict, insecurity, or movement restrictions prevented the household from reaching the veterinary service."
      fr: "Un conflit armé, une insécurité ou des restrictions de mouvement ont empêché le ménage d'atteindre le service vétérinaire."
      es: "Conflicto armado, inseguridad o restricciones de movimiento impidieron al hogar llegar al servicio veterinario."
  - code: language_barrier
    label:
      en: "Language barrier"
      fr: "Barrière linguistique"
      es: "Barrera idiomática"
    definition:
      en: "Veterinary services were not available in the household's primary language."
      fr: "Les services vétérinaires n'étaient pas disponibles dans la langue principale du ménage."
      es: "Los servicios veterinarios no estaban disponibles en el idioma principal del hogar."
  - code: distrust_of_services
    label:
      en: "Distrust of services or treatments"
      fr: "Méfiance envers les services ou les traitements"
      es: "Desconfianza en los servicios o tratamientos"
    definition:
      en: "Household did not trust the quality or safety of available veterinary services or treatments."
      fr: "Le ménage n'avait pas confiance dans la qualité ou la sécurité des services vétérinaires ou traitements disponibles."
      es: "El hogar no confiaba en la calidad o seguridad de los servicios veterinarios o tratamientos disponibles."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Barrier to veterinary access not listed in the codes above."
      fr: "Obstacle à l'accès vétérinaire non répertorié dans les codes ci-dessus."
      es: "Barrera al acceso veterinario no listada en los códigos anteriores."
