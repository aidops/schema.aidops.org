id: aap-feedback-channel
maturity: draft
label:
  en: "AAP: Feedback and complaint channel"
  fr: "Redevabilité : Canal de retour d'information et de plainte"
  es: "Rendición de cuentas: Canal de retroalimentación y quejas"
definition:
  en: "Multi-select typology of channels through which an affected household can submit feedback, suggestions, or complaints to aid providers. Synthesised from the IASC / REACH Menu of AAP Questions 2018 feedback section and the IFRC Community Engagement and Accountability Toolkit. Distinct from `aap-info-channel` (which captures one-way information flow from responder to household) because feedback flow has its own design considerations: anonymity, accessibility, reachable return address, and suitability for sensitive content. Ground Truth Solutions keeps the two vocabularies separate to allow per-channel evaluation of feedback usability."
  fr: "Typologie à choix multiples des canaux par lesquels un ménage affecté peut soumettre des retours, des suggestions ou des plaintes aux intervenants. Synthétisée à partir de la section de retour d'information du Menu de questions AAP IASC / REACH 2018 et du Toolkit d'engagement communautaire et de redevabilité de la FICR. Distincte de `aap-info-channel` (qui capture le flux d'information unidirectionnel de l'intervenant au ménage) car le flux de retour d'information a ses propres considérations de conception : anonymat, accessibilité, adresse de retour joignable et adéquation pour le contenu sensible. Ground Truth Solutions conserve les deux vocabulaires séparés pour permettre une évaluation par canal de l'utilisabilité des retours d'information."
  es: "Tipología de selección múltiple de canales por los cuales un hogar afectado puede enviar retroalimentación, sugerencias o quejas a los actores humanitarios. Sintetizada a partir de la sección de retroalimentación del Menú de Preguntas AAP IASC / REACH 2018 y del Kit de Herramientas de Participación Comunitaria y Rendición de Cuentas de la FICR. Distinta de `aap-info-channel` (que captura el flujo de información unidireccional del actor humanitario al hogar) porque el flujo de retroalimentación tiene sus propias consideraciones de diseño: anonimato, accesibilidad, dirección de retorno accesible y adecuación para contenido sensible. Ground Truth Solutions mantiene los dos vocabularios separados para permitir la evaluación por canal de la usabilidad de la retroalimentación."
standard:
  name: "IASC / REACH Menu of AAP Questions for Needs Assessments 2018"
  uri: "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"
  notes: "Channel typology merged with the IFRC CEA Toolkit feedback-mechanism inventory."
values:
  - code: phone_hotline
    label:
      en: "Phone hotline"
      fr: "Ligne téléphonique d'assistance"
      es: "Línea telefónica de ayuda"
    definition:
      en: "A dedicated toll-free or low-cost phone number for feedback or complaints."
      fr: "Un numéro de téléphone dédié, gratuit ou à faible coût, pour les retours d'information ou les plaintes."
      es: "Un número de teléfono dedicado, gratuito o de bajo costo, para retroalimentación o quejas."
  - code: sms_text
    label:
      en: "SMS / text message"
      fr: "SMS / texto"
      es: "SMS / mensaje de texto"
    definition:
      en: "Feedback submitted as a short text message to a dedicated number."
      fr: "Retour d'information soumis sous forme de SMS à un numéro dédié."
      es: "Retroalimentación enviada como un mensaje de texto corto a un número dedicado."
  - code: suggestion_box
    label:
      en: "Suggestion box"
      fr: "Boîte à suggestions"
      es: "Buzón de sugerencias"
    definition:
      en: "A physical box at a distribution site or community location where feedback can be deposited in writing or anonymously."
      fr: "Une boîte physique sur un site de distribution ou un lieu communautaire où les retours d'information peuvent être déposés par écrit ou anonymement."
      es: "Una caja física en un sitio de distribución o en un lugar comunitario donde se pueden depositar por escrito o de forma anónima los comentarios."
  - code: help_desk_at_distribution
    label:
      en: "Help desk at distribution"
      fr: "Guichet d'aide à la distribution"
      es: "Mesa de ayuda en la distribución"
    definition:
      en: "A staffed help-desk or information point at a distribution site to receive questions and complaints in person."
      fr: "Un guichet d'aide ou un point d'information tenu par du personnel sur un site de distribution pour recevoir des questions et des plaintes en personne."
      es: "Una mesa de ayuda o punto de información atendida por personal en un sitio de distribución para recibir preguntas y quejas en persona."
  - code: staff_visit_to_household
    label:
      en: "Staff visit to household"
      fr: "Visite du personnel au ménage"
      es: "Visita del personal al hogar"
    definition:
      en: "A staff member or volunteer visits the household on request or routinely and collects feedback verbally."
      fr: "Un membre du personnel ou un volontaire rend visite au ménage sur demande ou de manière routinière et recueille verbalement les retours d'information."
      es: "Un miembro del personal o voluntario visita al hogar a solicitud o de forma rutinaria y recoge verbalmente los comentarios."
  - code: community_committee_or_leader
    label:
      en: "Community committee or leader"
      fr: "Comité ou leader communautaire"
      es: "Comité o líder comunitario"
    definition:
      en: "Feedback relayed through a community feedback committee, community relations volunteer, or traditional community leader."
      fr: "Retour d'information relayé par un comité communautaire de retour d'information, un volontaire des relations communautaires ou un leader communautaire traditionnel."
      es: "Retroalimentación transmitida a través de un comité comunitario de retroalimentación, un voluntario de relaciones comunitarias o un líder comunitario tradicional."
  - code: email
    label:
      en: "Email"
      fr: "Courrier électronique"
      es: "Correo electrónico"
    definition:
      en: "Feedback submitted by email to a dedicated address."
      fr: "Retour d'information soumis par courrier électronique à une adresse dédiée."
      es: "Retroalimentación enviada por correo electrónico a una dirección dedicada."
  - code: website_or_app
    label:
      en: "Website or mobile application"
      fr: "Site web ou application mobile"
      es: "Sitio web o aplicación móvil"
    definition:
      en: "An online web-form or dedicated mobile application for submitting feedback."
      fr: "Un formulaire web en ligne ou une application mobile dédiée pour soumettre des retours d'information."
      es: "Un formulario web en línea o una aplicación móvil dedicada para enviar retroalimentación."
  - code: social_media
    label:
      en: "Social media"
      fr: "Médias sociaux"
      es: "Redes sociales"
    definition:
      en: "Feedback relayed through public or semi-public social-media posts, comments, or direct messages to agency accounts."
      fr: "Retour d'information relayé par des publications, commentaires ou messages directs publics ou semi-publics sur les médias sociaux vers les comptes d'agence."
      es: "Retroalimentación transmitida a través de publicaciones, comentarios o mensajes directos públicos o semipúblicos en redes sociales dirigidas a cuentas de agencia."
  - code: in_person_at_office
    label:
      en: "In person at agency office"
      fr: "En personne au bureau de l'agence"
      es: "En persona en la oficina de la agencia"
    definition:
      en: "The respondent can visit the agency office to submit feedback in person."
      fr: "Le répondant peut se rendre au bureau de l'agence pour soumettre un retour d'information en personne."
      es: "El encuestado puede acudir a la oficina de la agencia para enviar retroalimentación en persona."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Feedback channel not covered by the listed codes."
      fr: "Canal de retour d'information non couvert par les codes listés."
      es: "Canal de retroalimentación no cubierto por los códigos listados."
  - code: none_known
    label:
      en: "None known"
      fr: "Aucun connu"
      es: "Ninguno conocido"
    definition:
      en: "Respondent does not know of any available feedback channel. Recorded explicitly rather than treated as missing, because 'no channel known' is the primary AAP outcome indicator."
      fr: "Le répondant ne connaît aucun canal de retour d'information disponible. Enregistré explicitement plutôt que traité comme manquant, car « aucun canal connu » est l'indicateur de résultat AAP principal."
      es: "El encuestado no conoce ningún canal de retroalimentación disponible. Se registra explícitamente en lugar de tratarse como faltante, porque «ningún canal conocido» es el indicador de resultado AAP principal."
  - code: prefer_not_to_answer
    label:
      en: "Prefer not to answer"
      fr: "Préfère ne pas répondre"
      es: "Prefiere no responder"
    definition:
      en: "Respondent declines to answer."
      fr: "Le répondant refuse de répondre."
      es: "El encuestado se niega a responder."
