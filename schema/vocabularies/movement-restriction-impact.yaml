# PS-promotion candidate: sectoral access impact types are relevant across
# protection, food, health, and education profiles. Flag for PS team review;
# keep AO-local in this batch.
id: movement-restriction-impact
maturity: draft
label:
  en: "Movement restriction impact"
  fr: "Impact des restrictions aux déplacements"
  es: "Impacto de las restricciones de movimiento"
definition:
  en: "Domains of access or activity blocked because of freedom-of-movement restrictions. Multi-sectoral impact measure that feeds joint HNO severity analysis by linking protection restrictions to food, health, education, and livelihood deprivation. Based on GPC PAF Domain 1 multi-sectoral impact analysis; REACH Syria and Yemen (2022); JIAF 2.0 multi-sectoral analysis framework."
  fr: "Domaines d'accès ou d'activité bloqués en raison des restrictions à la liberté de mouvement. Mesure d'impact multisectoriel qui alimente l'analyse de sévérité HNO conjointe en reliant les restrictions de protection à la privation alimentaire, sanitaire, éducative et de moyens de subsistance. Fondé sur l'analyse d'impact multisectoriel du GPC PAF Domaine 1 ; REACH Syrie et Yémen (2022) ; cadre d'analyse multisectorielle JIAF 2.0."
  es: "Dominios de acceso o actividad bloqueados por restricciones de libertad de movimiento. Medida de impacto multisectorial que alimenta el análisis de severidad conjunto del HNO vinculando las restricciones de protección con la privación de alimentos, salud, educación y medios de vida. Basado en el análisis de impacto multisectorial del GPC PAF Dominio 1; REACH Siria y Yemen (2022); marco de análisis multisectorial del JIAF 2.0."
values:
  - code: health_services
    label:
      en: "Health services"
      fr: "Services de santé"
      es: "Servicios de salud"
    definition:
      en: "Unable to reach health facilities, clinics, or pharmacies."
      fr: "Incapable d'atteindre des établissements de santé, des cliniques ou des pharmacies."
      es: "Imposibilitado de llegar a establecimientos de salud, clínicas o farmacias."
  - code: food_markets
    label:
      en: "Food markets or food distributions"
      fr: "Marchés alimentaires ou distributions alimentaires"
      es: "Mercados de alimentos o distribuciones de alimentos"
    definition:
      en: "Unable to reach food markets, shops, or food distribution points."
      fr: "Incapable d'atteindre des marchés alimentaires, des boutiques ou des points de distribution alimentaire."
      es: "Imposibilitado de llegar a mercados de alimentos, tiendas o puntos de distribución de alimentos."
  - code: education
    label:
      en: "Education (school)"
      fr: "Éducation (école)"
      es: "Educación (escuela)"
    definition:
      en: "Children unable to reach school or education facilities."
      fr: "Enfants incapables d'atteindre l'école ou les établissements d'enseignement."
      es: "Niños imposibilitados de llegar a la escuela o establecimientos educativos."
  - code: work_livelihoods
    label:
      en: "Work or livelihoods"
      fr: "Travail ou moyens de subsistance"
      es: "Trabajo o medios de vida"
    definition:
      en: "Unable to reach workplace, farm, or income-generating activities."
      fr: "Incapable d'atteindre le lieu de travail, la ferme ou les activités génératrices de revenus."
      es: "Imposibilitado de llegar al lugar de trabajo, granja o actividades generadoras de ingresos."
  - code: family_social_networks
    label:
      en: "Family or social support networks"
      fr: "Réseaux familiaux ou de soutien social"
      es: "Redes familiares o de apoyo social"
    definition:
      en: "Unable to visit or receive support from family or community members."
      fr: "Incapable de rendre visite à la famille ou aux membres de la communauté ou d'en recevoir du soutien."
      es: "Imposibilitado de visitar o recibir apoyo de familiares o miembros de la comunidad."
  - code: legal_admin_services
    label:
      en: "Legal or administrative services"
      fr: "Services juridiques ou administratifs"
      es: "Servicios jurídicos o administrativos"
    definition:
      en: "Unable to reach courts, government offices, or civil registration services."
      fr: "Incapable d'atteindre les tribunaux, les bureaux gouvernementaux ou les services d'état civil."
      es: "Imposibilitado de llegar a tribunales, oficinas gubernamentales o servicios de registro civil."
  - code: agricultural_land
    label:
      en: "Agricultural land or natural resources"
      fr: "Terres agricoles ou ressources naturelles"
      es: "Tierras agrícolas o recursos naturales"
    definition:
      en: "Unable to access fields, pasture, water sources, or other natural resources."
      fr: "Incapable d'accéder aux champs, aux pâturages, aux sources d'eau ou à d'autres ressources naturelles."
      es: "Imposibilitado de acceder a campos, pastos, fuentes de agua u otros recursos naturales."
  - code: place_of_worship
    label:
      en: "Place of worship"
      fr: "Lieu de culte"
      es: "Lugar de culto"
    definition:
      en: "Unable to reach mosque, church, temple, or other religious site."
      fr: "Incapable d'atteindre une mosquée, une église, un temple ou un autre site religieux."
      es: "Imposibilitado de llegar a mezquita, iglesia, templo u otro sitio religioso."
  - code: other
    label:
      en: "Other"
      fr: "Autre"
      es: "Otro"
    definition:
      en: "Impact not covered by the above categories."
      fr: "Impact non couvert par les catégories ci-dessus."
      es: "Impacto no cubierto por las categorías anteriores."
