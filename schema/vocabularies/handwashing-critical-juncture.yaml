id: handwashing-critical-juncture
maturity: draft
label:
  en: Handwashing Critical Juncture
  fr: "Moment critique pour le lavage des mains"
  es: "Momento crítico para el lavado de manos"
definition:
  en: "Self-reported moments at which household members wash their hands. Based on WHO/UNICEF five critical junctures for handwashing with soap. This is a self-reported indicator; the JMP treats it as a softer indicator than observed soap and water availability (H2 and H3). Subject to social desirability bias. Multi-select."
  fr: "Moments déclarés par le ménage auxquels ses membres se lavent les mains. Basé sur les cinq moments critiques OMS/UNICEF pour le lavage des mains au savon. Il s'agit d'un indicateur auto-déclaré ; le JMP le considère comme un indicateur moins fiable que la disponibilité observée de savon et d'eau (H2 et H3). Sujet au biais de désirabilité sociale. Sélection multiple."
  es: "Momentos autodeclarados en que los miembros del hogar se lavan las manos. Basado en los cinco momentos críticos de la OMS/UNICEF para el lavado de manos con jabón. Es un indicador autodeclarado; el JMP lo trata como un indicador más débil que la disponibilidad observada de jabón y agua (H2 y H3). Sujeto a sesgo de deseabilidad social. Selección múltiple."
standard:
  name: "JMP Core Questions for Household Surveys (2018 Update)"
  uri: "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"
  notes: "WHO/UNICEF five critical junctures: before food preparation, before eating, after toilet use, after cleaning a child's bottom, after handling garbage. Self-reported KAP indicator."
values:
- code: before_preparing_food
  label:
    en: Before preparing food
    fr: "Avant de préparer les aliments"
    es: "Antes de preparar alimentos"
  definition:
    en: "Household members report washing hands before preparing or handling food. One of the five WHO/UNICEF critical handwashing junctures."
    fr: "Les membres du ménage déclarent se laver les mains avant de préparer ou manipuler des aliments. L'un des cinq moments critiques de lavage des mains OMS/UNICEF."
    es: "Los miembros del hogar reportan lavarse las manos antes de preparar o manipular alimentos. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF."
- code: before_eating
  label:
    en: Before eating
    fr: "Avant de manger"
    es: "Antes de comer"
  definition:
    en: "Household members report washing hands before eating. One of the five WHO/UNICEF critical handwashing junctures."
    fr: "Les membres du ménage déclarent se laver les mains avant de manger. L'un des cinq moments critiques de lavage des mains OMS/UNICEF."
    es: "Los miembros del hogar reportan lavarse las manos antes de comer. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF."
- code: after_using_toilet
  label:
    en: After using the toilet
    fr: "Après avoir utilisé les toilettes"
    es: "Después de usar el baño"
  definition:
    en: "Household members report washing hands after using the toilet or latrine. One of the five WHO/UNICEF critical handwashing junctures."
    fr: "Les membres du ménage déclarent se laver les mains après avoir utilisé les toilettes ou la latrine. L'un des cinq moments critiques de lavage des mains OMS/UNICEF."
    es: "Los miembros del hogar reportan lavarse las manos después de usar el inodoro o la letrina. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF."
- code: after_cleaning_child
  label:
    en: After cleaning a child who has defecated
    fr: "Après avoir nettoyé un enfant qui a déféqué"
    es: "Después de limpiar a un niño que defecó"
  definition:
    en: "Household members report washing hands after cleaning a child's bottom. One of the five WHO/UNICEF critical handwashing junctures."
    fr: "Les membres du ménage déclarent se laver les mains après avoir nettoyé le derrière d'un enfant. L'un des cinq moments critiques de lavage des mains OMS/UNICEF."
    es: "Los miembros del hogar reportan lavarse las manos después de limpiar las nalgas de un niño. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF."
- code: after_handling_garbage
  label:
    en: After handling garbage or waste
    fr: "Après avoir manipulé des ordures ou des déchets"
    es: "Después de manipular basura o residuos"
  definition:
    en: "Household members report washing hands after handling garbage, refuse, or waste materials."
    fr: "Les membres du ménage déclarent se laver les mains après avoir manipulé des ordures, des déchets ou des matières de rebut."
    es: "Los miembros del hogar reportan lavarse las manos después de manipular basura, residuos o materiales de desecho."
- code: none_of_above
  label:
    en: None of the above
    fr: "Aucun des moments précités"
    es: "Ninguno de los anteriores"
  definition:
    en: "Household members do not report handwashing at any of the critical junctures listed."
    fr: "Les membres du ménage ne déclarent pas se laver les mains lors d'un des moments critiques mentionnés."
    es: "Los miembros del hogar no reportan lavado de manos en ninguno de los momentos críticos mencionados."
