id: HazardEvent
label:
  en: Hazard Event
  fr: Événement dangereux
  es: Evento de peligro
maturity: draft

definition:
  en: >
    An event or condition that may disrupt the delivery of public services
    or affect the well-being of a population. Covers natural hazards
    (floods, droughts, earthquakes), health emergencies, conflict, and
    economic shocks. Aligned with the Sendai Framework's broad definition
    of hazard, and mappable to OASIS CAP v1.2 for alert interoperability.
  fr: >
    Un événement ou une condition pouvant perturber la prestation de
    services publics ou affecter le bien-être d'une population. Couvre
    les risques naturels (inondations, sécheresses, tremblements de terre),
    les urgences sanitaires, les conflits et les chocs économiques. Conforme
    à la définition élargie du Cadre de Sendai et compatible avec OASIS
    CAP v1.2 pour l'interopérabilité des alertes.
  es: >
    Un evento o condición que puede interrumpir la prestación de servicios
    públicos o afectar el bienestar de una población. Cubre riesgos
    naturales (inundaciones, sequías, terremotos), emergencias sanitarias,
    conflictos y choques económicos. Alineado con la definición amplia
    del Marco de Sendai y compatible con OASIS CAP v1.2 para la
    interoperabilidad de alertas.

properties:
  # Classification
  - hazard_type
  - severity
  - certainty
  # Description
  - description
  # Temporal
  - start_date
  - end_date
  # Geographic scope
  - affected_locations
  # Program impact
  - affected_programs
  # Provenance
  - data_sources

supertypes: [Event]
subtypes: []
