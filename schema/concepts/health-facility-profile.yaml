id: HealthFacilityProfile
label:
  en: Health Facility Profile
  fr: "Profil d'établissement de santé"
  es: "Perfil de establecimiento de salud"
maturity: draft

definition:
  en: >
    A point-in-time record of the structural readiness of a single
    health facility (hospital, health centre, health post, or
    equivalent) to deliver essential health services in a crisis or
    development context. The subject is a HealthFacility (PS
    ServicePoint subtype), not a Person or Household. This is the
    supply-side counterpart to HealthAccessProfile: the same domain,
    viewed from the service-provider side. Covers eight property
    groups: facility metadata (type, level, managing authority,
    catchment, functionality), infrastructure (water, electricity,
    cold chain, communication, accessibility, hygiene), staffing
    (core cadre presence, vacancy, training), essential services
    offered (OPD/IPD, ANC/delivery/EmONC, immunization, IMCI, family
    planning, emergency care, mental health, GBV clinical management,
    STI/HIV, NCD), commodity availability today (SARA tracer pattern
    with observed-on-shelf verification: ORS/zinc, amoxicillin,
    ACT/RDT, oxytocin and magnesium sulfate, skilled-birth kit, MISP
    contraceptive count, emergency contraception, PEP, NCD tracers,
    and a 14-day stock-out summary flag), infection prevention and
    control (PPE, sterilization, sharps and waste disposal, written
    IPC protocol), referral and continuity (functioning referral,
    transport, distance, 24/7 availability), and cost and equity
    (user fees and exemptions for pregnant women, children under 5,
    and emergencies). Primary respondent is the facility in-charge or
    senior clinician plus the pharmacy/stores officer; commodity and
    infrastructure items are enumerator-observed where feasible per
    SARA/HHFA methodology. Draws on WHO SARA v2.2, WHO HHFA 2022
    (SARA's successor), WHO/UNICEF WASH FIT 2nd edition 2022, Sphere
    Handbook 2018 Chapter 3, IAWG MISP 2018, WHO HeRAMS (crisis-
    context functionality monitoring), WHO Emergency Care Toolkit
    (ECAT/HEAT — top-level presence indicators only), DHS SPA revised
    2022, and the WHO Model List of Essential Medicines 24th edition.
    Does not cover patient-level data, direct observation of clinical
    encounters, disease-surveillance case counts, household-side
    access (see HealthAccessProfile), individual staff identity, or
    detailed structural damage assessment.
  fr: >
    Un enregistrement ponctuel de la capacité structurelle d'un
    établissement de santé (hôpital, centre de santé, poste de santé
    ou équivalent) à fournir les services de santé essentiels dans un
    contexte de crise ou de développement. Le sujet est une
    HealthFacility (sous-type ServicePoint de PS), pas une Personne
    ou un Ménage. C'est le pendant côté offre du HealthAccessProfile :
    le même domaine, vu du côté du prestataire. Couvre huit groupes
    de propriétés : métadonnées de l'établissement (type, niveau,
    autorité gestionnaire, population desservie, fonctionnalité),
    infrastructure (eau, électricité, chaîne du froid, communication,
    accessibilité, hygiène), dotation en personnel (présence des
    cadres essentiels, vacance, formation), services essentiels
    offerts (consultations externes/hospitalisation, CPN/accouchement/
    SONU, vaccination, PCIME, planification familiale, urgences,
    santé mentale, prise en charge clinique des VBG, IST/VIH, MNT),
    disponibilité des produits aujourd'hui (schéma traceur SARA avec
    vérification par observation en rayon : SRO/zinc, amoxicilline,
    CTA/TDR, ocytocine et sulfate de magnésium, kit d'accouchement,
    comptage des méthodes contraceptives MISP, contraception
    d'urgence, PEP, traceurs MNT et signal de rupture à 14 jours),
    prévention et contrôle des infections (EPI, stérilisation,
    tranchants et élimination des déchets, protocole PCI écrit),
    référence et continuité (système de référence fonctionnel,
    transport, distance, ouverture 24/7), et coût et équité (frais
    d'utilisation et exemptions pour femmes enceintes, enfants de
    moins de 5 ans, urgences). Le répondant principal est le
    responsable de l'établissement ou le clinicien senior et le
    responsable pharmacie/stocks ; les items produits et
    infrastructure sont observés par l'enquêteur lorsque possible
    selon la méthodologie SARA/HHFA. S'appuie sur SARA v2.2 de
    l'OMS, HHFA 2022 de l'OMS (successeur de SARA), WASH FIT 2e
    édition 2022 de l'OMS/UNICEF, le Manuel Sphere 2018 chapitre 3,
    IAWG MISP 2018, HeRAMS de l'OMS (suivi de fonctionnalité en
    contexte de crise), la boîte à outils Soins d'urgence de l'OMS
    (ECAT/HEAT — indicateurs de présence de haut niveau uniquement),
    DHS SPA révisé 2022, et la Liste modèle OMS des médicaments
    essentiels 24e édition. Ne couvre pas les données au niveau des
    patients, l'observation directe de consultations cliniques, les
    comptages de cas en surveillance épidémiologique, l'accès côté
    ménage (voir HealthAccessProfile), l'identité individuelle du
    personnel, ni l'évaluation détaillée des dégâts structurels.
  es: >
    Un registro puntual de la capacidad estructural de un
    establecimiento de salud (hospital, centro de salud, puesto de
    salud o equivalente) para prestar servicios de salud esenciales
    en un contexto de crisis o de desarrollo. El sujeto es un
    HealthFacility (subtipo de ServicePoint de PS), no una Persona
    o un Hogar. Es la contraparte del lado de la oferta de
    HealthAccessProfile: el mismo dominio, visto desde el lado del
    prestador. Cubre ocho grupos de propiedades: metadatos del
    establecimiento (tipo, nivel, autoridad gestora, población
    atendida, funcionalidad), infraestructura (agua, electricidad,
    cadena de frío, comunicación, accesibilidad, higiene), dotación
    de personal (presencia de cuadros esenciales, vacancia,
    capacitación), servicios esenciales ofrecidos (consultas
    externas/hospitalización, CPN/parto/COE, inmunización, AIEPI,
    planificación familiar, emergencias, salud mental, manejo
    clínico de violencia sexual, ITS/VIH, ENT), disponibilidad de
    insumos hoy (patrón trazador SARA con verificación por
    observación en estantería: SRO/zinc, amoxicilina, TCA/PDR,
    oxitocina y sulfato de magnesio, kit de parto, recuento de
    métodos anticonceptivos MISP, anticoncepción de emergencia, PEP,
    trazadores ENT y señal de desabastecimiento a 14 días),
    prevención y control de infecciones (EPI, esterilización,
    cortopunzantes y eliminación de residuos, protocolo PCI
    escrito), referencia y continuidad (sistema de referencia
    funcional, transporte, distancia, apertura 24/7), y costo y
    equidad (tarifas al usuario y exenciones para mujeres
    embarazadas, niños menores de 5 años, emergencias). El
    respondiente principal es el responsable del establecimiento o
    clínico senior más el responsable de farmacia/almacén; los
    ítems de insumos e infraestructura son observados por el
    enumerador cuando sea posible según la metodología SARA/HHFA.
    Se apoya en SARA v2.2 de la OMS, HHFA 2022 de la OMS (sucesor
    de SARA), WASH FIT 2ª edición 2022 de OMS/UNICEF, el Manual de
    Esfera 2018 capítulo 3, IAWG MISP 2018, HeRAMS de la OMS
    (monitoreo de funcionalidad en contextos de crisis), el kit
    de herramientas de Atención de Emergencia de la OMS (ECAT/HEAT
    — solo indicadores de presencia de alto nivel), DHS SPA
    revisado 2022, y la Lista Modelo OMS de Medicamentos Esenciales
    24ª edición. No cubre datos a nivel de paciente, observación
    directa de consultas clínicas, conteos de casos en vigilancia
    epidemiológica, acceso del lado del hogar (ver
    HealthAccessProfile), identidad individual del personal, ni
    evaluación detallada de daños estructurales.

