external_equivalents:
  fhir:
    label: "QuestionnaireResponse (health facility assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A single administration of a facility-readiness instrument (SARA, HHFA Service Readiness, WASH FIT assessment, HeRAMS form, MISP checklist) serializes naturally as a QuestionnaireResponse whose Questionnaire points to the corresponding WHO instrument definition. Facility-level attributes that are not one-shot questionnaire items (facility type, operating authority) are better represented as FHIR Location or HealthcareService resources linked from the response, rather than stored inside the QuestionnaireResponse."
  dhis2:
    label: "DHIS2 facility registry and service-readiness data elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: related
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 national HIS carry health facilities as organisation units with attached attributes and can record periodic service-readiness checks as data sets (for example HHFA-aligned indicator sets published by WHO). The organisation-unit model does not natively distinguish a structural-readiness snapshot from a routine monthly report, so a HealthFacilityProfile corresponds to a specific assessment data set rather than to the organisation unit itself."

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    Of the six v1 convergence systems (FHIR, DHIS2, OpenCRVS, OpenSPP,
    openIMIS, DCI Social Registry), only FHIR natively represents an
    instrument administration as a first-class record (via
    QuestionnaireResponse) that fits HealthFacilityProfile cleanly.
    DHIS2 carries facility registry data as organisation-unit
    attributes and service-readiness assessments as periodic data
    sets, which is a close-but-not-identical shape. openIMIS and DCI
    Social Registry carry facility or service-point identifiers for
    benefit-payment workflows but do not model facility-level
    structural readiness. OpenCRVS and OpenSPP are not health
    registries. The informing standards bodies for this profile
    therefore live outside the v1 set: WHO (SARA, HHFA, HeRAMS, WASH
    FIT, ECAT/HEAT, EML), UNICEF (WASH FIT co-publisher), IAWG (MISP),
    Sphere Association (2018 Handbook Chapter 3), and the DHS Program
    (SPA). Convergence evidence is strong within this humanitarian/
    global-health canon but weak in the MIS convergence set, which is
    why the headline count is 1.
