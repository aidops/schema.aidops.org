external_equivalents:
  fhir:
    label: "QuestionnaireResponse (women's empowerment battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each pro-WEAI administration maps to a FHIR QuestionnaireResponse with items organized by domain. The composite empowerment score and GPI are derived results better represented as FHIR Observation or RiskAssessment resources produced by a post-hoc scoring step."
  dhis2:
    label: "DHIS2 tracked entity attributes (women's empowerment)"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: related
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 does not carry a standard WEAI program; individual projects implement empowerment items as tracked entity attributes or data elements in custom programs. No standard global DHIS2 mapping exists."
