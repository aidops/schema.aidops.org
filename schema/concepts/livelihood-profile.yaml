external_equivalents:
  fhir:
    label: "QuestionnaireResponse (household livelihood battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each LivelihoodProfile administration serialises naturally as a FHIR QuestionnaireResponse whose Questionnaire is the corresponding LSMS-ISA, FAO RIMA-II, or IOM DTM MSLA livelihood battery. Derived indicators (RIMA pillar flags, resilience composite) are better modelled as FHIR Observation or RiskAssessment resources produced by a scoring step."
  dhis2:
    label: "DHIS2 livelihoods data elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: related
    vocabulary: "DHIS2"
    note: "DHIS2 cash-transfer and resilience deployments sometimes carry livelihood signals as tracked-entity attributes or program-stage data elements, but there is no standard global data set for a household livelihood profile."

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    Among the v1 convergence reference systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry), only FHIR offers a generic
    item-level form response carrier (QuestionnaireResponse) that naturally
    matches this concept. Social-protection platforms (OpenSPP, DCI Social
    Registry) capture household economic profiling for targeting but do
    not carry a structured livelihoods-and-resilience survey module. The
    informing standards bodies are FAO (RIMA-II), the World Bank (LSMS-ISA),
    IOM (DTM MSLA), and the Sphere Project rather than the v1 core set;
    this convergence number understates prevalence because the v1 set does
    not include resilience-measurement platforms.
