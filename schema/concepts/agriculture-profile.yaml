id: AgricultureProfile
label:
  en: Agriculture Profile
  fr: "Profil agricole"
  es: "Perfil agrícola"
maturity: draft
featured: true

definition:
  en: >
    A point-in-time record of a household's agricultural and livestock
    situation covering land access and tenure, crop production, livestock
    holdings, input use, extension and training access, shock exposure,
    and post-harvest storage and loss. Scope is the smallholder household
    engaged in crop farming, livestock keeping, or both, and items are
    drawn from the FAO World Census of Agriculture (WCA) 2020 core item
    list, the LSMS-ISA agriculture modules (land, crops, livestock,
    shocks, post-harvest), the ILRI TLU coefficients for livestock
    aggregation, and the FAO Post-Harvest Losses guidelines. Captures
    the raw responses alongside the administration context (respondent,
    mode, recall period where applicable) and carries two derived
    indicators: `tlu_total` (standardised livestock-holding aggregate)
    and `crop_loss_occurred` (binary shock-exposure indicator). Programme
    targeting and farm-level asset detail (parcel geometry, individual
    animal records, input quantities) are handled by the PS `Farm` concept
    and are out of scope here.
  fr: >
    Un enregistrement ponctuel de la situation agricole et d'élevage
    d'un ménage couvrant l'accès à la terre et le régime foncier, la
    production végétale, le cheptel, l'utilisation d'intrants, l'accès
    à la vulgarisation et à la formation, l'exposition aux chocs, ainsi
    que le stockage post-récolte et les pertes. Le périmètre est le
    petit ménage exploitant engagé dans l'agriculture, l'élevage ou les
    deux, et les items sont tirés de la liste d'items de base du
    Recensement mondial de l'agriculture (WCA) 2020 de la FAO, des
    modules agriculture du LSMS-ISA (terre, cultures, bétail, chocs,
    post-récolte), des coefficients UBT de l'ILRI pour l'agrégation
    du bétail, et des directives FAO Pertes Post-Récolte. Consigne les
    réponses brutes ainsi que le contexte d'administration (répondant,
    mode, période de rappel le cas échéant) et porte deux indicateurs
    dérivés : `tlu_total` (agrégat normalisé du cheptel) et
    `crop_loss_occurred` (indicateur binaire d'exposition aux chocs).
    Le ciblage programmatique et les détails au niveau de la ferme
    (géométrie des parcelles, fiches animales individuelles, quantités
    d'intrants) sont pris en charge par le concept `Farm` de PS et sont
    hors périmètre ici.
  es: >
    Un registro puntual de la situación agrícola y ganadera del hogar
    cubriendo acceso a la tierra y tenencia, producción de cultivos,
    tenencia de ganado, uso de insumos, acceso a extensión y
    capacitación, exposición a choques, y almacenamiento y pérdida
    poscosecha. El alcance es el hogar de pequeños agricultores
    involucrado en cultivos, ganadería o ambos, y los ítems se toman de
    la lista de ítems centrales del Censo Mundial de Agricultura (WCA)
    2020 de la FAO, los módulos de agricultura de LSMS-ISA (tierra,
    cultivos, ganado, choques, poscosecha), los coeficientes UGT de
    ILRI para agregación de ganado, y las directrices FAO de Pérdidas
    Poscosecha. Consigna las respuestas brutas junto con el contexto
    de administración (respondiente, modo, período de recordatorio
    cuando aplique) y lleva dos indicadores derivados: `tlu_total`
    (agregado estandarizado de tenencia de ganado) y
    `crop_loss_occurred` (indicador binario de exposición a choques).
    La focalización programática y los detalles a nivel de finca
    (geometría de parcelas, registros individuales de animales,
    cantidades de insumos) son manejados por el concepto `Farm` de PS
    y están fuera del alcance aquí.

