external_equivalents:
  fhir:
    label: "QuestionnaireResponse (agriculture/livelihood module)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "An agriculture assessment administration serializes as a QuestionnaireResponse whose Questionnaire is the corresponding LSMS-ISA or FAO WCA instrument definition. FHIR has no dedicated agriculture resource; the profile's structured household-level items map naturally to a questionnaire response, while derived aggregates such as `tlu_total` are better represented by Observation or RiskAssessment produced by a scoring step."
  dhis2:
    label: "DHIS2 aggregate agriculture data elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: broad
    vocabulary: "DHIS2 data sets"
    note: "DHIS2 instances in agriculture/nutrition programmes carry selected items (for example livestock counts, improved seed use, extension visits) as data elements in tracked entity or event programs, but the FAO WCA 2020 item list is not represented as a global DHIS2 data set and most item-level shocks and post-harvest indicators are rarely modelled."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    Only FHIR and DHIS2 represent an item-level agriculture-assessment
    administration. OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry
    do not carry agriculture items in core; national deployments that
    collect them (Ethiopia ESS, Nigeria GHS-Panel, Tanzania NPS, Kenya
    KIHBS) store them in separate LSMS-ISA or agricultural-census
    modules whose shape matches this concept. The informing standards
    bodies are the FAO Statistics Division (WCA), the World Bank LSMS
    programme, ILRI, and the FAO Post-Harvest Losses community rather
    than the v1 MIS core set; this convergence number understates the
    prevalence of the data because the v1 set does not include
    agricultural-survey platforms.
