external_equivalents:
  fhir:
    label: "QuestionnaireResponse (GBV individual experience)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "An individual GBV experience disclosure serializes as a FHIR QuestionnaireResponse with subject typed to a Patient (the interviewed woman). The act-level items map to QuestionnaireResponse.item entries. Physical consequence and derived indicators may map to FHIR Observation resources on the same patient. There is no GBV-specific FHIR profile in core R4; the GBV AoR does not publish a FHIR implementation guide as of 2026."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS,
    DCI Social Registry) carry a population-level individual IPV experience monitoring module
    in core. GBV experience data in those systems, where present at all, is confined to
    case-management records in GBVIMS or Primero (survivors, incident types, case plans) rather
    than population-level monitoring indicators. The zero v1 convergence reflects the origin of
    this module in humanitarian demographic surveys (DHS, MICS) and research instruments (WHO
    MCS); it is deployed in DHS country surveys, MSNA specialist rounds, and stand-alone
    protection assessments, not in social-protection registries. The minimum-aggregate-n-30 rule
    and DUA requirement for individual records are additional barriers to integration with
    standard registry architectures.
