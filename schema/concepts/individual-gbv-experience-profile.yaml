id: IndividualGBVExperienceProfile
label:
  en: Individual GBV Experience Profile
  fr: "Profil d'expérience individuelle de VBG"
  es: "Perfil de experiencia individual de VBG"
maturity: draft

definition:
  en: >
    A person-level record of a woman's self-reported experiences of intimate partner violence
    (IPV), including physical, sexual, and emotional violence; partner controlling behaviors;
    physical consequences of violence; help-seeking and disclosure; barriers to help-seeking;
    and safety signals (violence during pregnancy, previous partner violence, non-partner sexual
    violence). The primary instrument canon is the DHS-8 Domestic Violence module (Section 9,
    2022), with ethics and safety protocols governed by Ellsberg and Heise (2005) and WHO
    'Putting Women First' (2001). The subject is the randomly pre-selected woman age 15-49
    (one per sampled household) who is eligible for and consents to this module.

    SENSITIVITY: All properties carry sensitivity: restricted (the most protective tier in
    AidOps). The restricted tier requires: (1) minimum aggregate n of 30 before any statistic
    is published or shared; (2) no individual-record export without a named, signed data-use
    agreement (DUA) identifying the receiving organization, the analytic purpose, and a
    destruction-or-return clause; (3) mandatory pre-mapped referral pathway before any
    deployment; (4) separate access-control layer in any data warehouse with explicit role
    assignment.

    OPERATIONAL PREREQUISITES (deployment gate conditions, not capturable data items):
    (1) Trained female enumerator only; male enumerators are not permitted under any
    circumstances. (2) One randomly pre-selected woman per sampled household using a pre-set
    randomization scheme (Kish grid or EPSEM). If the selected woman declines or is ineligible,
    the module is skipped for that household; no substitution is permitted. (3) Private interview
    setting with no other adults present; if privacy cannot be secured, the module must be
    skipped. (4) Retraumatization-warning consent introduction before the module, including: the
    option to decline any question or stop at any time; a safe-word or nonverbal signal option;
    confirmation that answers will not be shared with the partner or household. (5) Pre-mapped
    GBV referral pathway: at least one operating GBV service provider contacted, confirmed
    active, and printed on a discreet referral card carried by every enumerator. If no operating
    provider can be identified, the module must NOT be fielded. Referral cards are offered to
    every respondent regardless of disclosure to avoid marking disclosers. (6) Three-tier
    distress-response protocol: Tier 1 (mild distress, pause and wait), Tier 2 (active distress,
    stop module, offer referral card), Tier 3 (severe distress, stop full interview, emergency
    protocol). All tiers adapted from Ellsberg and Heise (2005).

    DIFFERENTIATION FROM GBVRiskProfile: GBVRiskProfile is a household-level record of
    environmental, service-availability, and caregiver-reported GBV risk indicators
    (sensitivity: sensitive, general-purpose enumerators, no specialist training required).
    IndividualGBVExperienceProfile is the individual-disclosure complement: it captures a
    woman's direct experience of violence, requires specialist conditions throughout, and carries
    sensitivity: restricted for all properties.

    OUT OF SCOPE: (1) Case-management intake fields (incident ID, incident date, location,
    perpetrator biodata, case status, action plan, referral record): these belong to GBVIMS /
    Primero. (2) Child sexual abuse and child protection items: owned by ChildProtectionProfile.
    (3) GBV service availability, WGSS presence, environmental risk factors: owned by
    GBVRiskProfile. (4) Attitudes toward wife beating: belongs in a future GenderNormsProfile.
    (5) Alcohol use by partner (DV11-DV12): analytical risk-factor covariate, not a monitoring
    indicator. (6) Fear of partner (DV13): analytical covariate, candidate for Phase 2 extension.
    (7) Intergenerational violence exposure (DV30: did father beat mother): analytical risk factor.
    (8) Non-partner sexual violence before age 15: boundary item with ChildProtectionProfile.

    CANON CITATIONS: DHS-8 Domestic Violence Module (2022); Ellsberg and Heise (2005);
    WHO 'Putting Women First' (2001).
  fr: >
    Enregistrement au niveau de la personne des expériences autodéclarées de violences du
    partenaire intime (VPI) d'une femme, y compris les violences physiques, sexuelles et
    émotionnelles, les comportements de contrôle du partenaire, les conséquences physiques
    des violences, la recherche d'aide et la divulgation, les obstacles à la recherche d'aide,
    et les signaux de sécurité. L'instrument canon est le module Violence domestique DHS-8
    (Section 9, 2022), avec des protocoles d'éthique et de sécurité régis par Ellsberg et Heise
    (2005) et le document de l'OMS 'Mettre les femmes en premier' (2001). Le sujet est la femme
    de 15-49 ans préalablement sélectionnée de manière aléatoire (une par ménage échantillonné)
    éligible et consentante à ce module.

    SENSIBILITÉ : Toutes les propriétés portent sensitivity: restricted. Le niveau restreint
    requiert un agrégat minimum de 30 individus avant toute publication, un accord d'utilisation
    des données signé pour tout export de données individuelles, une filière de référencement
    pré-cartographiée avant tout déploiement, et un contrôle d'accès distinct en entrepôt de
    données.

    DIFFÉRENCIATION DE GBVRiskProfile : GBVRiskProfile est un enregistrement au niveau du
    ménage des facteurs de risque VBG environnementaux et de disponibilité des services
    (sensitivity: sensitive, enquêteurs généralistes). IndividualGBVExperienceProfile est le
    complément de divulgation individuelle, nécessitant des conditions spécialisées et portant
    sensitivity: restricted pour toutes les propriétés.
  es: >
    Registro a nivel de persona de las experiencias autodeclaradas de violencia de pareja íntima
    (VPI) de una mujer, incluyendo violencia física, sexual y emocional, comportamientos
    controladores del compañero, consecuencias físicas de la violencia, búsqueda de ayuda y
    divulgación, barreras para buscar ayuda, y señales de seguridad. El instrumento canon es el
    módulo de Violencia Doméstica DHS-8 (Sección 9, 2022), con protocolos éticos y de seguridad
    regulados por Ellsberg y Heise (2005) y la OMS 'Las mujeres primero' (2001). El sujeto es la
    mujer de 15-49 años preseleccionada aleatoriamente (una por hogar muestreado) elegible y con
    consentimiento para este módulo.

    SENSIBILIDAD: Todas las propiedades tienen sensitivity: restricted. El nivel restringido
    requiere n agregado mínimo de 30 antes de publicar, acuerdo de uso de datos firmado para
    exportación de registros individuales, ruta de derivación pre-mapeada antes del despliegue,
    y control de acceso diferenciado en el almacén de datos.

    DIFERENCIACIÓN DE GBVRiskProfile: GBVRiskProfile es un registro a nivel de hogar de
    factores de riesgo VBG ambientales y de disponibilidad de servicios (sensitivity: sensitive,
    encuestadores de propósito general). IndividualGBVExperienceProfile es el complemento de
    divulgación individual, requiriendo condiciones especializadas y con sensitivity: restricted
    en todas las propiedades.

