external_equivalents:
  fhir:
    label: "QuestionnaireResponse (child health and immunization)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each ChildHealthProfile administration maps to a QuestionnaireResponse. Vaccination items also map to FHIR Immunization resources. Illness episode items (diarrhea, ARI, fever) map to FHIR Condition or Observation resources. The caregiver respondent is the FHIR QuestionnaireResponse.source; the child is the FHIR subject."
  dhis2:
    label: "DHIS2 Tracker Program (EPI, Child Health)"
    uri: "https://dhis2.org"
    match: close
    note: "National EPI programs typically implement ChildHealthProfile-equivalent data as a DHIS2 Tracker program with per-child enrollment and repeated vaccination and illness visit events. Vaccination card status and per-antigen dose status map to Tracked Entity Attributes and Data Elements."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    FHIR QuestionnaireResponse and DHIS2 Tracker are the closest structural
    equivalents. OpenSPP, openIMIS, DCI Core, and OpenCRVS do not carry
    per-child vaccination history or 2-week illness recall in their core
    data models. All 46 child health properties are new to AidOps;
    child_age_months is reused from NutritionPracticesProfile.
    The care-provider-type vocabulary is authored as a shared AidOps
    vocabulary for use by ChildHealthProfile, MaternalNewbornHealthProfile,
    and ReproductiveHealthProfile.
