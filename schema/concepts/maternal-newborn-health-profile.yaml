external_equivalents:
  fhir:
    label: "QuestionnaireResponse (ANC / delivery / PNC battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each MNH administration maps to a QuestionnaireResponse whose Questionnaire is the DHS-8 Chapter 9 instrument. Derived coverage indicators (ANC 4+, SBA, EIBF) map to FHIR Observation resources. The pregnancy episode maps to a FHIR EpisodeOfCare; delivery maps to a FHIR Encounter with Procedure (cesarean); newborn PNC contacts map to additional Encounters."
  dhis2:
    label: "DHIS2 Maternal Health data elements (WHO/RMNCAH package)"
    uri: "https://docs.dhis2.org/en/topics/metadata/rmncah/rmncah-toolkit.html"
    match: close
    vocabulary: "DHIS2 RMNCAH toolkit"
    note: "DHIS2 RMNCAH implementations carry ANC visit count, skilled birth attendance, and PNC coverage as program indicators in tracker or aggregate programs. The DHS-8 item granularity (ANC content items, five signal functions) is richer than what most DHIS2 RMNCAH implementations capture at item level."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    FHIR R4 and DHIS2 RMNCAH represent the closest structural equivalents
    for item-level maternal and newborn health administrations. OpenCRVS
    captures birth attendant and place of delivery as civil registration
    fields but does not hold ANC content, PNC signal functions, or
    breastfeeding initiation. openIMIS, OpenSPP, and DCI do not model
    maternal care survey items in their core schemas. The high humanitarian
    relevance of ANC 4+, SBA, and EIBF means these derived indicators are
    widely reported in national HMIS and cluster dashboards, but the
    item-level source data (the battery captured by this profile) is
    typically held only in survey microdata (DHS, MICS) rather than in
    operational MIS systems.
