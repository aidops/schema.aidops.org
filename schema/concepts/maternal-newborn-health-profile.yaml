id: MaternalNewbornHealthProfile
label:
  en: Maternal and Newborn Health Profile
  fr: "Profil de santé maternelle et néonatale"
  es: "Perfil de salud materna y neonatal"
maturity: draft

definition:
  en: >
    A per-woman, per-most-recent-birth record of antenatal care (ANC),
    delivery, and postnatal care (PNC) received for the most recent
    pregnancy ending in a live birth or stillbirth within a 2-year
    recall period (configurable via recall_period_months). Subject is a
    woman aged 15–49 who is the respondent; proxy responses are not
    permitted. The profile covers six domains: (1) pregnancy history
    screener (total live births, recent birth gate); (2) most recent
    pregnancy context (outcome, timing, multiplicity); (3) antenatal
    care (visit count, provider type, first-trimester initiation,
    content received, supplementation); (4) delivery (place, attendant,
    cesarean, postpartum stay, immediate newborn care); (5) postnatal
    care for mother and newborn (timing, provider, content, five signal
    functions); (6) breastfeeding initiation (EIBF). Derived indicators
    include ANC 4+/8+, first-trimester initiation, skilled birth
    attendance (SDG 3.1.2 proxy), facility delivery, PNC within 2 days
    (mother and newborn), all five newborn signal functions, and early
    initiation of breastfeeding (EIBF). Full pregnancy history with
    child deaths is deferred to a future MortalityProfile. Ongoing
    breastfeeding and complementary feeding belong in
    NutritionPracticesProfile. Vaccination at birth belongs in
    ChildHealthProfile.
  fr: >
    Un enregistrement par femme et par naissance la plus récente des
    soins prénataux (CPN), de l'accouchement et des soins postnataux
    (SPN) reçus pour la grossesse la plus récente se terminant par une
    naissance vivante ou une mortinaissance dans une période de rappel
    de 2 ans (configurable via recall_period_months). Le sujet est une
    femme âgée de 15 à 49 ans qui est la répondante ; les réponses par
    procuration ne sont pas autorisées. Le profil couvre six domaines :
    (1) filtre d'historique de grossesse (total de naissances vivantes,
    porte de naissance récente) ; (2) contexte de la grossesse la plus
    récente (issue, calendrier, multiplicité) ; (3) soins prénataux
    (nombre de visites, type de prestataire, initiation au premier
    trimestre, contenu reçu, supplémentation) ; (4) accouchement
    (lieu, assistant, césarienne, séjour post-partum, soins immédiats
    du nouveau-né) ; (5) soins postnataux pour la mère et le nouveau-né
    (délai, prestataire, contenu, cinq fonctions signal) ; (6) initiation
    à l'allaitement (EIBF). Les indicateurs dérivés comprennent CPN 4+/8+,
    initiation au premier trimestre, assistance qualifiée à l'accouchement
    (proxy ODD 3.1.2), accouchement en établissement, SPN dans les 2 jours
    (mère et nouveau-né), cinq fonctions signal du nouveau-né et allaitement
    précoce (EIBF). L'historique complet des grossesses avec les décès
    d'enfants est différé à un futur MortalityProfile. L'allaitement en
    cours et l'alimentation complémentaire relèvent du NutritionPracticesProfile.
    La vaccination à la naissance relève du ChildHealthProfile.
  es: >
    Un registro por mujer y por parto más reciente de la atención
    prenatal (APN), el parto y la atención posnatal (PPN) recibida
    para el embarazo más reciente que terminó en un nacimiento vivo o
    mortinato dentro de un período de recordatorio de 2 años
    (configurable mediante recall_period_months). El sujeto es una
    mujer de 15 a 49 años que es la encuestada; no se permiten
    respuestas por representación. El perfil cubre seis dominios:
    (1) filtro de historial de embarazo (total de nacimientos vivos,
    puerta de parto reciente); (2) contexto del embarazo más reciente
    (resultado, momento, multiplicidad); (3) atención prenatal (cantidad
    de visitas, tipo de proveedor, inicio en el primer trimestre,
    contenido recibido, suplementación); (4) parto (lugar, asistente,
    cesárea, estancia posparto, atención inmediata al recién nacido);
    (5) atención posnatal para la madre y el recién nacido (momento,
    proveedor, contenido, cinco funciones de señal); (6) inicio de la
    lactancia materna (EIBF). Los indicadores derivados incluyen APN
    4+/8+, inicio en el primer trimestre, asistencia calificada al parto
    (proxy ODS 3.1.2), parto en establecimiento, PPN dentro de los 2 días
    (madre y recién nacido), las cinco funciones de señal del recién nacido
    e inicio temprano de la lactancia materna (EIBF). El historial completo
    de embarazos con muertes de niños se difiere a un futuro MortalityProfile.
    La lactancia continua y la alimentación complementaria pertenecen al
    NutritionPracticesProfile. La vacunación al nacer pertenece al
    ChildHealthProfile.

