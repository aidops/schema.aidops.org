external_equivalents:
  fhir:
    label: "QuestionnaireResponse (pastoral food security battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A pastoral food security administration serializes as a QuestionnaireResponse whose Questionnaire corresponds to the LEGS initial assessment or FSNAU seasonal assessment instrument definition. FHIR has no dedicated pastoral livestock resource; derived indicators (breeding-female ratio, terms-of-trade ratio) are better represented as Observation or RiskAssessment produced by a scoring step."
  dhis2:
    label: "DHIS2 event program (pastoral livelihoods)"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: broad
    vocabulary: "DHIS2 data sets"
    note: "DHIS2 instances in pastoral early-warning programmes (FSNAU Somalia, NDMA Kenya, FEWSNET livelihoods monitoring) carry selected items (herd composition, terms of trade, rangeland condition) as data elements in event programs, but no global DHIS2 pastoral data set exists and item-level standardization varies widely by country implementation."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    Only FHIR and DHIS2 represent pastoral food security data at item level
    in programmatic implementations. OpenCRVS, OpenSPP, openIMIS, and DCI
    Social Registry do not carry pastoral food security items in core;
    national deployments (Somalia Baxnaano, Kenya HSNP ASAL, Ethiopia
    pastoralist zones) collect them in separate humanitarian assessment
    modules. The informing standards bodies are LEGS Project (Tufts/FAO),
    IPC Global Partners (FAO/WFP/FEWSNET), FSNAU (FAO Somalia), and
    FEWSNET (USAID) rather than the v1 MIS core set.
