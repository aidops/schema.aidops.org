id: PastoralFoodSecurityProfile
label:
  en: Pastoral Food Security Profile
  fr: "Profil de sécurité alimentaire pastorale"
  es: "Perfil de seguridad alimentaria pastoral"
maturity: draft
featured: true

definition:
  en: >
    A point-in-time record of the pastoral-specific determinants of food
    security for households whose primary livelihood is mobile livestock
    herding or agro-pastoralism. Covers the structural and seasonal drivers
    that FoodSecurityProfile does not reach: herd health and dynamics,
    milk production and consumption, livestock-to-cereal terms of trade,
    mobility and rangeland conditions, livestock losses, and veterinary
    access in mobile-herd contexts. Designed to be co-administered alongside
    FoodSecurityProfile for pastoral and agro-pastoral households — it does
    not replace any FoodSecurityProfile instrument. FoodSecurityProfile
    supplies the food-security outcome indicators (FCS, rCSI, LCS-FS, HDDS,
    HHS, FIES, MAHFP); this profile supplies the pastoral-specific structural
    and process indicators that explain why and how pastoral households fall
    into or recover from food insecurity. Canonical grounding is LEGS 3rd
    edition (2023), IPC AFI Technical Manual v3.1 pastoralist annex, and
    FSNAU Somalia seasonal assessment methodology, with FEWSNET HEA, FAO
    GIEWS, Sphere 2018, AGIR Sahel, and SMART pastoral adaptations as
    supporting sources. Subject is a Household in a pastoral or
    agro-pastoral livelihood zone (pre-classified by FEWSNET Livelihood
    Zone Profile or equivalent national livelihoods mapping before
    administration).
  fr: >
    Un enregistrement ponctuel des déterminants pastoraux spécifiques de
    la sécurité alimentaire pour les ménages dont le moyen de subsistance
    principal est l'élevage nomade ou l'agro-pastoralisme. Couvre les
    facteurs structurels et saisonniers que le FoodSecurityProfile n'atteint
    pas : santé et dynamique du troupeau, production et consommation de
    lait, termes de l'échange bétail/céréales, mobilité et conditions des
    pâturages, pertes de bétail et accès aux services vétérinaires dans
    les contextes de troupeaux mobiles. Conçu pour être co-administré avec
    le FoodSecurityProfile pour les ménages pastoraux et agro-pastoraux —
    il ne remplace aucun instrument du FoodSecurityProfile. Le
    FoodSecurityProfile fournit les indicateurs de résultats de sécurité
    alimentaire (FCS, rCSI, LCS-FS, HDDS, HHS, FIES, MAHFP) ; ce profil
    fournit les indicateurs structurels et de processus propres au
    pastoralisme qui expliquent comment et pourquoi les ménages pastoraux
    tombent dans l'insécurité alimentaire ou s'en rétablissent. L'ancrage
    canonique est la 3e édition des LEGS (2023), le manuel technique IPC
    AFI v3.1 (annexe pastoraliste) et la méthodologie FSNAU Somalie, avec
    le HEA FEWSNET, le FAO GIEWS, Sphère 2018, AGIR Sahel et les
    adaptations pastorales SMART comme sources complémentaires. Le sujet
    est un Ménage dans une zone de moyens d'existence pastorale ou
    agro-pastorale.
  es: >
    Un registro puntual de los determinantes pastorales específicos de la
    seguridad alimentaria para hogares cuyo medio de vida principal es la
    ganadería nómada o el agropastoralismo. Cubre los factores estructurales
    y estacionales que FoodSecurityProfile no alcanza: salud y dinámica del
    rebaño, producción y consumo de leche, términos de intercambio
    ganadería/cereales, movilidad y condiciones de pastizales, pérdidas de
    ganado y acceso a servicios veterinarios en contextos de rebaños móviles.
    Diseñado para co-administrarse junto con FoodSecurityProfile para hogares
    pastorales y agropastorales — no reemplaza ningún instrumento de
    FoodSecurityProfile. FoodSecurityProfile suministra los indicadores de
    resultados de seguridad alimentaria (FCS, rCSI, LCS-FS, HDDS, HHS,
    FIES, MAHFP); este perfil suministra los indicadores estructurales y
    de proceso específicos del pastoralismo que explican por qué y cómo
    los hogares pastorales caen o se recuperan de la inseguridad alimentaria.
    El fundamento canónico es la 3.a edición de LEGS (2023), el Manual
    Técnico IPC AFI v3.1 (anexo pastoralista) y la metodología de evaluación
    estacional FSNAU Somalia, con HEA de FEWSNET, FAO GIEWS, Esfera 2018,
    AGIR Sahel y adaptaciones pastorales SMART como fuentes de apoyo. El
    sujeto es un Hogar en una zona de medios de vida pastoral o agropastoral.

properties:
  # Module A: Herd Composition and Dynamics
  - herd_composition_by_species
  - breeding_females_count
  - herd_trend_since_crisis
  - livestock_losses_count_past_12mo
  - livestock_loss_cause
  # Module B: Milk Production and Consumption
  - milk_production_liters_per_day_household
  - milk_household_proportion_consumed
  - milk_consumption_frequency
  # Module C: Market Access and Terms of Trade
  - terms_of_trade_goat_cereal
  - terms_of_trade_trend
  - stress_sale_occurred
  - stress_sale_price_vs_baseline
  - stress_sale_reason
  # Module D: Rangeland and Water Access
  - rangeland_condition_perception
  - water_point_access
  - fodder_availability
  - fodder_cost_change
  # Module E: Migration and Mobility
  - migration_distance_km
  - migration_routes_disrupted
  - migration_route_disruption_cause
  - conflict_mobility_restriction
  # Module F: Animal Health and Veterinary Access
  - livestock_disease_exposure
  - vet_services_access
  - vet_access_barriers

