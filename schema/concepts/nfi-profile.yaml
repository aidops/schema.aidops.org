id: NFIProfile
label:
  en: Non-Food Item (NFI) Profile
  fr: "Profil des articles non alimentaires (ANA)"
  es: "Perfil de artículos no alimentarios (ANF)"
maturity: draft

definition:
  en: >
    A household-level record of whether the household has the minimum
    non-food items (NFIs) required to meet Sphere 2018 minimum standards
    for clothing and bedding (Standard 1), cooking and eating utensils
    (Standard 2), stoves, fuel and lighting equipment (Standard 3), and
    tools and equipment (Standard 4). Captures count and condition
    questions for each item category, self-report sufficiency at the
    standard and overall levels, priority unmet needs, and receipt of
    NFIs from aid organisations in the past 3 months. Derives four
    binary Sphere-pass indicators (sphere_clothing_pass,
    sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass)
    and feeds the Global Shelter Cluster composite NFI outcome
    indicator. Complementary to EnergyAccessProfile (which covers fuel
    type, stove technology category, and MTF tier) and
    ShelterAdequacyProfile (which carries the single-summary
    has_sleeping_items and has_cooking_items screen items reused on
    this profile for continuity). Assumes per-household household_size
    is available from household_registration to compute per-capita
    thresholds.
  fr: >
    Un enregistrement au niveau du ménage indiquant si le ménage
    dispose des articles non alimentaires (ANA) minimaux nécessaires
    pour répondre aux normes minimales Sphère 2018 pour les vêtements
    et la literie (Norme 1), les ustensiles de cuisine et de repas
    (Norme 2), les foyers, le combustible et l'équipement d'éclairage
    (Norme 3), et les outils et équipements (Norme 4). Consigne des
    questions de dénombrement et d'état pour chaque catégorie
    d'articles, des auto-déclarations de suffisance au niveau de chaque
    norme et au niveau global, les besoins prioritaires non satisfaits
    et la réception d'ANA d'organisations d'aide au cours des 3
    derniers mois. Dérive quatre indicateurs binaires de conformité
    Sphère (sphere_clothing_pass, sphere_cooking_pass,
    sphere_stove_fuel_pass, sphere_tools_pass) et alimente l'indicateur
    de résultat composite ANA du Cluster Abri Mondial. Complémentaire
    à EnergyAccessProfile (qui couvre le type de combustible, la
    catégorie technologique du foyer et le niveau MTF) et à
    ShelterAdequacyProfile (qui porte les items de résumé
    has_sleeping_items et has_cooking_items réutilisés sur ce profil
    pour la continuité). Suppose que la taille du ménage est disponible
    depuis household_registration pour calculer les seuils par
    habitant.
  es: >
    Un registro a nivel del hogar que indica si el hogar tiene los
    artículos no alimentarios (ANF) mínimos requeridos para cumplir con
    los estándares mínimos Esfera 2018 para ropa y cama (Norma 1),
    utensilios de cocina y de comer (Norma 2), cocinas, combustible y
    equipo de iluminación (Norma 3), y herramientas y equipo (Norma 4).
    Registra preguntas de conteo y condición para cada categoría de
    artículos, auto-reportes de suficiencia a nivel de cada norma y a
    nivel general, necesidades prioritarias no satisfechas y recepción
    de ANF de organizaciones de ayuda en los últimos 3 meses. Deriva
    cuatro indicadores binarios de cumplimiento Esfera
    (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass,
    sphere_tools_pass) y alimenta el indicador compuesto de resultado
    ANF del Clúster Global de Refugio. Complementario a
    EnergyAccessProfile (que cubre el tipo de combustible, la categoría
    tecnológica de la cocina y el nivel MTF) y a ShelterAdequacyProfile
    (que lleva los ítems resumen has_sleeping_items y has_cooking_items
    reutilizados en este perfil para continuidad). Supone que el tamaño
    del hogar está disponible desde household_registration para
    calcular los umbrales per cápita.

properties:
  # Clothing and bedding (Sphere Std 1)
  - blankets_count
  - blankets_condition
  - sleeping_mat_count
  - climate_appropriate_clothing_all
  - mosquito_net_count
  - clothing_bedding_sufficient
  # Cooking and eating utensils (Sphere Std 2)
  - large_cooking_pot_count
  - small_cooking_pot_count
  - plates_count
  - cups_count
  - kitchen_knife_present
  - serving_spoon_count
  - cooking_water_container_with_lid_present
  - utensil_washing_soap_available
  - cooking_utensils_sufficient
  # Stoves, fuel, and lighting (Sphere Std 3)
  - has_functional_stove
  - stove_condition
  - matches_or_lighter_available
  - fuel_jerrycan_count
  - stove_fuel_lighting_sufficient
  # Tools and equipment (Sphere Std 4)
  - shelter_repair_tool_kit_present
  - digging_tool_present
  - rope_or_fastening_present
  - water_jerrycan_count
  - tools_equipment_sufficient
  # Cross-cutting sufficiency and unmet needs
  - nfi_overall_sufficient
  - nfi_unmet_needs_priority
  - nfi_received_past_3mo
  # Shelter-profile overlap items (reused from ShelterAdequacyProfile
  # as a single-summary screen; NFIProfile asks the granular items above
  # and typically does not re-ask these when both profiles are collected).
  - has_sleeping_items
  - has_cooking_items
  # Derived Sphere-pass scores (computed from the count and condition items).
  - sphere_clothing_pass
  - sphere_cooking_pass
  - sphere_stove_fuel_pass
  - sphere_tools_pass

property_groups:
  - category: administrative
    properties:
      - identifiers
      - subject
      - observation_date
      - performed_by
      - instrument_used
      - software_used
      - administration_mode
      - respondent
      - respondent_relationship
      - items_asked
  - category: nfi
    properties:
      # Clothing and bedding
      - blankets_count
      - blankets_condition
      - sleeping_mat_count
      - climate_appropriate_clothing_all
      - mosquito_net_count
      - clothing_bedding_sufficient
      - has_sleeping_items
      # Cooking and eating utensils
      - large_cooking_pot_count
      - small_cooking_pot_count
      - plates_count
      - cups_count
      - kitchen_knife_present
      - serving_spoon_count
      - cooking_water_container_with_lid_present
      - utensil_washing_soap_available
      - cooking_utensils_sufficient
      - has_cooking_items
      # Stoves, fuel, and lighting
      - has_functional_stove
      - stove_condition
      - matches_or_lighter_available
      - fuel_jerrycan_count
      - stove_fuel_lighting_sufficient
      # Tools and equipment
      - shelter_repair_tool_kit_present
      - digging_tool_present
      - rope_or_fastening_present
      - water_jerrycan_count
      - tools_equipment_sufficient
      # Cross-cutting
      - nfi_overall_sufficient
      - nfi_unmet_needs_priority
      - nfi_received_past_3mo
  - category: scores
    properties:
      - sphere_clothing_pass
      - sphere_cooking_pass
      - sphere_stove_fuel_pass
      - sphere_tools_pass

subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse (NFI adequacy assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household NFI assessment serializes as a QuestionnaireResponse against a Questionnaire aligned with the Sphere NFI standards. The derived sphere_*_pass scores are better represented as RiskAssessment or Observation resources produced by a scoring step."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    NFI adequacy assessment. The domain tools live in humanitarian
    operations: UNHCR Global NFI Post-Distribution Monitoring (PDM),
    Global Shelter Cluster Standardised Shelter Indicators, Sphere
    NFI minimum standards, and IFRC/ICRC Emergency Items Catalogue.
    The low v1 convergence reflects scope rather than prevalence; NFI
    assessments are widely deployed in shelter and settlement
    responses.
