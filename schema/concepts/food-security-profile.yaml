id: FoodSecurityProfile
label:
  en: Food Security Profile
  fr: "Profil de sécurité alimentaire"
  es: "Perfil de seguridad alimentaria"
maturity: draft
featured: true

definition:
  en: >
    A point-in-time record of household (or, for MDD-W, individual)
    food-security data collected using one or more instruments from the
    humanitarian food-security canon: WFP FCS, rCSI, LCS, and CARI; FAO
    HDDS, FIES, MDD-W, and MAHFP; and the FANTA HHS. Captures the raw
    item responses alongside the administration context (instrument,
    mode, respondent, recall period) and carries canonical-rule derived
    outputs for each instrument's standard scoring function (for example,
    the FCS weighted score and consumption group using WFP standard 21/35
    thresholds, the rCSI sum score, the HHS category, or the LCS severity
    band). CARI, as a second-order composite that consumes scores from
    multiple instruments, is recorded via ScoringEvent rather than on this
    profile.
  fr: >
    Un enregistrement ponctuel de données de sécurité alimentaire du
    ménage (ou, pour MDD-W, individuelles) collectées à l'aide d'un ou
    plusieurs instruments du canon humanitaire de la sécurité
    alimentaire : FCS, rCSI, LCS et CARI du PAM ; HDDS, FIES, MDD-W et
    MAHFP de la FAO ; et HHS de FANTA. Consigne les réponses brutes aux
    items ainsi que le contexte d'administration (instrument, mode,
    répondant, période de rappel) et porte les résultats dérivés
    canoniques pour la fonction de notation standard de chaque instrument
    (par exemple, le score pondéré FCS et le groupe de consommation selon
    les seuils standard 21/35 du PAM, le score somme rCSI, la catégorie
    HHS ou le niveau de sévérité LCS). CARI, en tant que composite de
    second ordre consommant les scores de plusieurs instruments, est
    enregistré via ScoringEvent plutôt que sur ce profil.
  es: >
    Un registro puntual de datos de seguridad alimentaria del hogar
    (o, para MDD-W, individuales) recopilados mediante uno o más
    instrumentos del canon humanitario de seguridad alimentaria: FCS,
    rCSI, LCS y CARI del PMA; HDDS, FIES, MDD-W y MAHFP de la FAO; y
    HHS de FANTA. Consigna las respuestas brutas a los ítems junto con
    el contexto de administración (instrumento, modo, respondiente,
    período de recordatorio) y lleva los resultados derivados canónicos
    para la función de puntuación estándar de cada instrumento (por
    ejemplo, el puntaje ponderado FCS y el grupo de consumo según los
    umbrales estándar 21/35 del PMA, el puntaje suma rCSI, la categoría
    HHS o el nivel de severidad LCS). CARI, como un compuesto de segundo
    orden que consume puntajes de múltiples instrumentos, se registra
    mediante ScoringEvent en lugar de en este perfil.

