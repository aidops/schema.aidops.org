external_equivalents:
  fhir:
    label: "QuestionnaireResponse (household education survey)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A per-child education assessment serializes as a QuestionnaireResponse whose subject is the child (Patient) and whose Questionnaire corresponds to the deployed education form. Each property maps to an item response. The per-child roster loop corresponds to multiple QuestionnaireResponse resources sharing a common context (encounter or composition) for the household visit."

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    OpenSPP carries an ISCED education level on the individual (Person)
    record, which is the summary-level equivalent of EducationProfile's
    highest_education_level. None of the other v1 social-protection systems
    (FHIR, DHIS2, OpenCRVS, openIMIS, DCI Core) carry the per-child
    school-participation and environment detail that EducationProfile
    encodes: current-year attendance, school type, travel time, school
    environment, and non-attendance reasons are humanitarian assessment
    variables not represented in routine SP system data models. The low
    convergence reflects scope: EducationProfile is a survey instrument
    concept, not a service-delivery record.
