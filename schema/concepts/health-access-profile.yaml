external_equivalents:
  fhir:
    label: "QuestionnaireResponse (household health access / DHS health module)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level health access interview serializes naturally as a QuestionnaireResponse whose Questionnaire references the DHS-8 health module or the WHO People's Voice Survey instrument. Derived indicators such as the SDG 3.8.2 catastrophic-expenditure flag are better represented as FHIR Observations produced by a downstream ScoringEvent rather than stored in this profile."
  dhis2:
    label: "DHIS2 service coverage and OOP indicators (aggregate)"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: related
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 national HIS aggregate health service coverage and OOP indicators at facility or district level, but do not natively model household-level access barriers. Tracker programs can carry individual-level data but the DHS-style household health module is not part of core DHIS2 metadata."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the six v1 social-protection reference systems (FHIR,
    DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry
    household-level health-access survey items in core. The informing
    domain tools live outside the v1 set: DHS Program (DHS-8 health
    module AS45/AS58/AS59 and barriers-to-care module), WHO People's
    Voice Survey (2023), WHO SDG 3.8.2 methodology, UNHCR Public
    Health Standards, Sphere 2018, and PAHO's barriers-to-care work
    in the Americas. OOP catastrophic-expenditure indicators are
    reported by the WHO Global Health Observatory as derived
    national statistics, not as item-level data.
