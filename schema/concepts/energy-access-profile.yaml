subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse (household energy assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level energy access assessment serializes naturally as a QuestionnaireResponse with items corresponding to EnergyAccessProfile properties."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP,
    openIMIS, DCI Social Registry) carry a household-level multidimensional energy
    access profile. PS SocioEconomicProfile holds a cooking_fuel summary property
    and an electricity_access boolean, which are the standard SP registry items.
    The full MTF-lite assessment is a humanitarian program assessment instrument with
    no established equivalent in MIS core schemas. The canonical domain tools are the
    SE4All MTF household surveys (ESMAP 2015, country surveys 2017-2020) and the
    WHO/World Bank harmonized core questionnaire (2019).
