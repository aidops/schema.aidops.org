external_equivalents:
  fhir:
    label: "QuestionnaireResponse (mental-health screening)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each WHO-5, PHQ-9, or GAD-7 administration serializes naturally as a QuestionnaireResponse whose Questionnaire is the corresponding screening instrument. The derived total scores and severity bands are better represented as FHIR Observations produced by a scoring step. A positive PHQ-9 item 9 screen should additionally raise a FHIR Flag or trigger a RiskAssessment, aligning with the restricted-sensitivity treatment of that item in this profile."

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    Of the six v1 social-protection reference systems, only FHIR
    represents item-level mental-health screening at the record level
    (as QuestionnaireResponse plus derived Observations). DHIS2 national
    deployments commonly carry aggregate PHQ-9 / GAD-7 prevalence
    indicators but rarely model item-level screening data in core.
    OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry do not carry
    mental-health screening data in core. The informing domain tools
    live outside the v1 set: WHO mhGAP, IASC MHPSS guidelines,
    Psychiatric Research Unit Region H (WHO-5 distribution), and the
    PHQscreeners site (PHQ-9 and GAD-7 distribution).
