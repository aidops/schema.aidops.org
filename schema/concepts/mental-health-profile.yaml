id: MentalHealthProfile
label:
  en: Mental Health Profile
  fr: "Profil de santé mentale"
  es: "Perfil de salud mental"
maturity: draft

definition:
  en: >
    A point-in-time record of an adult respondent's mental-health screening
    data, collected by self-report (or enumerator-read self-report) under
    explicit informed consent. Carries item-level responses for up to three
    widely used screening instruments: the WHO-5 Well-Being Index (5 items,
    0-100 index), the PHQ-9 Patient Health Questionnaire (9 items,
    depression severity band), and the GAD-7 Generalized Anxiety Disorder
    scale (7 items, anxiety severity band). Derived totals and severity
    bands are carried alongside the raw items. PHQ-9 item 9 (suicidal
    ideation) and any score that incorporates it (phq9_sum,
    phq9_severity_band) carry sensitivity: restricted and must trigger a
    referral-pathway response on a non-zero positive screen. Trauma
    screening (PCL-5, HTQ) is intentionally out of scope and belongs to a
    future TraumaScreenProfile; functional-impairment follow-up items are
    similarly deferred. This profile is validated for adults (18+);
    youth-adapted variants of these instruments exist and would require a
    separate AdolescentMentalHealthProfile.
  fr: >
    Un enregistrement ponctuel des données de dépistage en santé mentale
    d'un·e répondant·e adulte, collecté par auto-déclaration (ou
    auto-déclaration lue par l'enquêteur·rice) sous consentement éclairé
    explicite. Porte les réponses au niveau de l'item pour jusqu'à trois
    instruments de dépistage largement utilisés : l'Indice de bien-être
    WHO-5 (5 items, indice 0-100), le Patient Health Questionnaire PHQ-9
    (9 items, niveau de sévérité de la dépression) et l'échelle de trouble
    d'anxiété généralisée GAD-7 (7 items, niveau de sévérité de l'anxiété).
    Les totaux dérivés et les niveaux de sévérité sont portés aux côtés
    des items bruts. L'item 9 du PHQ-9 (idéation suicidaire) et tout score
    qui l'intègre (phq9_sum, phq9_severity_band) portent la sensibilité
    restricted et doivent déclencher une réponse par la filière de
    référence en cas de dépistage positif non nul. Le dépistage des
    traumatismes (PCL-5, HTQ) est volontairement hors du périmètre et
    relève d'un futur TraumaScreenProfile ; les items de suivi de
    l'altération fonctionnelle sont également reportés. Ce profil est
    validé pour les adultes (18 ans et plus) ; des variantes adaptées aux
    jeunes de ces instruments existent et nécessiteraient un
    AdolescentMentalHealthProfile distinct.
  es: >
    Un registro puntual de los datos de tamizaje de salud mental de una
    persona adulta, recopilado por autoinforme (o autoinforme leído por la
    persona encuestadora) bajo consentimiento informado explícito. Lleva
    las respuestas a nivel de ítem para hasta tres instrumentos de
    tamizaje ampliamente utilizados: el Índice de Bienestar WHO-5 (5
    ítems, índice 0-100), el Patient Health Questionnaire PHQ-9 (9 ítems,
    nivel de severidad de la depresión) y la escala de Trastorno de
    Ansiedad Generalizada GAD-7 (7 ítems, nivel de severidad de la
    ansiedad). Los totales derivados y los niveles de severidad se llevan
    junto a los ítems brutos. El ítem 9 del PHQ-9 (ideación suicida) y
    cualquier puntaje que lo incorpore (phq9_sum, phq9_severity_band)
    llevan sensitivity: restricted y deben activar una respuesta por la
    vía de referencia ante un tamizaje positivo distinto de cero. El
    tamizaje de trauma (PCL-5, HTQ) queda intencionalmente fuera del
    alcance y corresponde a un futuro TraumaScreenProfile; los ítems de
    seguimiento de deterioro funcional también se aplazan. Este perfil
    está validado para adultos (18+); existen variantes adaptadas para
    jóvenes de estos instrumentos y requerirían un
    AdolescentMentalHealthProfile separado.

