external_equivalents:
  fhir:
    label: "QuestionnaireResponse (shelter adequacy assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household shelter adequacy assessment serializes as a QuestionnaireResponse against a Questionnaire aligned with the Sphere shelter standards."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level shelter
    adequacy assessment. The domain tools live in humanitarian operations:
    IOM Displacement Tracking Matrix (DTM), Global Shelter Cluster rapid
    needs assessments, REACH multi-sector household surveys, and UNHCR NARE
    assessments. The low v1 convergence reflects scope rather than
    prevalence; shelter adequacy assessments are widely deployed in
    humanitarian responses. FHIR's QuestionnaireResponse pattern
    accommodates the shape.
