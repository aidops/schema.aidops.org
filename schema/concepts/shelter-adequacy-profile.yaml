id: ShelterAdequacyProfile
label:
  en: Shelter Adequacy Profile
  fr: "Profil d'adéquation de l'abri"
  es: "Perfil de adecuación del refugio"
maturity: draft

definition:
  en: >
    A household-level record of whether the current shelter arrangement meets
    Sphere minimum standards for shelter and settlement. Covers shelter type
    and occupancy arrangement, living space, construction materials, thermal
    comfort and ventilation, privacy and security, household items (NFIs),
    technical assistance received, security of tenure, hazard exposure, and
    environmental sustainability. Based on the Sphere Handbook 2018 Shelter
    and Settlement chapter (Standards 2-7), the IOM DTM Field Companion for
    Shelter and NFIs, and the Global Shelter Cluster Standardised Shelter
    Indicators. Intended for longitudinal monitoring of shelter conditions
    of displaced or crisis-affected households; distinct from
    DwellingDamageProfile, which is event-anchored and focuses on
    post-shock damage to the household's original dwelling.
  fr: >
    Un enregistrement au niveau du ménage indiquant si l'arrangement d'abri
    actuel répond aux normes minimales Sphère pour l'abri et les
    établissements. Couvre le type d'abri et l'arrangement d'occupation,
    l'espace de vie, les matériaux de construction, le confort thermique et
    la ventilation, la vie privée et la sécurité, les articles ménagers
    (ANAs), l'assistance technique reçue, la sécurité d'occupation, l'exposition
    aux risques et la durabilité environnementale. Basé sur le chapitre Abri
    et Établissements du Manuel Sphère 2018 (Normes 2-7), le Companion de
    terrain DTM de l'OIM pour l'Abri et les ANAs, et les Indicateurs d'Abri
    Standardisés du Cluster Abri Mondial. Destiné au suivi longitudinal des
    conditions d'abri des ménages déplacés ou affectés par une crise; distinct
    de DwellingDamageProfile, qui est ancré à un événement et se concentre sur
    les dommages post-choc au logement d'origine du ménage.
  es: >
    Un registro a nivel del hogar de si el arreglo de refugio actual cumple los
    estándares mínimos de Esfera para refugio y asentamiento. Abarca el tipo de
    refugio y arreglo de ocupación, espacio habitable, materiales de
    construcción, confort térmico y ventilación, privacidad y seguridad,
    artículos del hogar (ANFs), asistencia técnica recibida, seguridad de
    tenencia, exposición a peligros y sostenibilidad ambiental. Basado en el
    capítulo de Refugio y Asentamiento del Manual Esfera 2018 (Normas 2-7), el
    Companion de campo DTM de la OIM para Refugio y ANFs, y los Indicadores de
    Refugio Estandarizados del Clúster Global de Refugio. Destinado al
    monitoreo longitudinal de las condiciones de refugio de hogares desplazados
    o afectados por crisis; distinto de DwellingDamageProfile, que está anclado
    a un evento y se centra en los daños post-choque a la vivienda original del
    hogar.

