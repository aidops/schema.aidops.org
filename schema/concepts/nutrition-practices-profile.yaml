external_equivalents:
  fhir:
    label: "QuestionnaireResponse (IYCF feeding practices)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each IYCF administration maps to a QuestionnaireResponse whose Questionnaire is the WHO/UNICEF 2021 IYCF module. The index child is the FHIR subject; the caregiver respondent is captured in the source field. Derived IYCF composite indicators (EBF, MAD, MDD-C) map to FHIR Observation resources produced by a scoring step."

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    FHIR QuestionnaireResponse is the closest structural equivalent for
    caregiver-reported IYCF batteries. DHIS2 routinely models IYCF indicators
    as tracked-entity data elements per visit in national nutrition programs, but
    the data-element structure is program-specific. OpenSPP, OpenCRVS, openIMIS,
    and DCI Core do not carry IYCF feeding data in their core data models.
    All IYCF properties are new to AidOps; no existing PS or AidOps properties
    could be reused. MDD-W items were intentionally excluded and remain on
    FoodSecurityProfile.
