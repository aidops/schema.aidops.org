external_equivalents:
  fhir:
    label: "QuestionnaireResponse (reproductive health / family planning)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A woman-level reproductive health interview serializes naturally as a QuestionnaireResponse whose Questionnaire is the DHS or MICS family planning instrument. Derived indicators (fp_unmet_need, fp_demand_satisfied_modern, fertility_preference) are better represented as FHIR Observations produced by a scoring step. The STI/HIV block may require a separate QuestionnaireResponse gated on an additional consent resource."
  dhis2:
    label: "DHIS2 family planning data elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: close
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 national health information systems frequently carry contraceptive prevalence and unmet need aggregate data elements, but household-survey-level item data is rarely modelled in DHIS2 core. The DHIS2 Tracker can accommodate individual-level survey data in a programme structure."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the six v1 social-protection reference systems (FHIR,
    DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry
    household-level reproductive health survey items in core. The
    informing domain tools live outside the v1 set: DHS Program, MICS,
    IAWG MISP monitoring, and UNFPA/SDG reporting frameworks. Aggregate
    contraceptive prevalence rates are widely reported through DHIS2
    and the WHO Global Health Observatory, but the underlying item-level
    survey data is not captured in those systems.
