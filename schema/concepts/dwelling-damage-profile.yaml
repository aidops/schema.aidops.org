id: DwellingDamageProfile
label:
  en: Dwelling Damage Profile
  fr: "Profil de dommages au logement"
  es: "Perfil de daños a la vivienda"
maturity: draft

definition:
  en: >
    A point-in-time record of post-shock housing and shelter conditions
    for a household, typically anchored to a triggering hazard event.
    Captures the observed damage level, current habitability, shelter
    arrangement, functional status of essential services, non-food
    items missing, and stated reconstruction intent alongside the
    administration context (instrument, respondent, assessment
    location). Baseline housing and WASH properties are reused from
    SocioEconomicProfile to describe the dwelling's usual
    characteristics.
  fr: >
    Un enregistrement ponctuel des conditions post-choc de logement et
    d'abri d'un ménage, typiquement ancré à un événement de danger
    déclencheur. Consigne le niveau de dommages observé, l'habitabilité
    actuelle, l'arrangement d'abri, l'état fonctionnel des services
    essentiels, les articles non alimentaires manquants et l'intention
    de reconstruction déclarée, ainsi que le contexte d'administration
    (instrument, répondant, lieu d'évaluation). Les propriétés de
    logement et WASH de référence sont réutilisées depuis
    SocioEconomicProfile pour décrire les caractéristiques habituelles
    du logement.
  es: >
    Un registro puntual de las condiciones post-choque de vivienda y
    refugio de un hogar, típicamente anclado a un evento de peligro
    desencadenante. Consigna el nivel de daños observado, la
    habitabilidad actual, el arreglo de refugio, el estado funcional de
    los servicios esenciales, los artículos no alimentarios faltantes y
    la intención de reconstrucción declarada, junto con el contexto de
    administración (instrumento, respondiente, lugar de evaluación).
    Las propiedades de vivienda y WASH de base se reutilizan desde
    SocioEconomicProfile para describir las características habituales
    de la vivienda.

properties:
  - dwelling_type
  - floor_material
  - wall_material
  - roof_material
  - water_source
  - sanitation_facility
  - electricity_access
  - damage_level
  - habitability_status
  - current_shelter_type
  - structural_safety_assessment
  - essential_items_missing
  - reconstruction_intent
  - services_disrupted
  - triggering_hazard_event
  - location_of_assessment

property_groups:
  - category: administrative
    properties:
      - identifiers
      - subject
      - observation_date
      - performed_by
      - instrument_used
      - software_used
      - administration_mode
      - respondent
      - respondent_relationship
      - items_asked
  - category: shelter
    properties:
      - dwelling_type
      - floor_material
      - wall_material
      - roof_material
      - damage_level
      - structural_safety_assessment
  - category: habitability
    properties:
      - habitability_status
      - current_shelter_type
  - category: wash
    properties:
      - water_source
      - sanitation_facility
      - electricity_access
      - services_disrupted
  - category: recovery
    properties:
      - essential_items_missing
      - reconstruction_intent
  - category: hazard_event
    properties:
      - triggering_hazard_event
  - category: location
    properties:
      - location_of_assessment

subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse (post-disaster shelter assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level post-shock shelter assessment serializes naturally as a QuestionnaireResponse whose Questionnaire is the program's assessment form."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    shelter damage assessment. The informing domain tools live outside
    the v1 set: IOM Displacement Tracking Matrix (DTM) household-level
    assessments, Shelter Cluster rapid needs assessments, REACH
    multi-sector household surveys, and national post-disaster recovery
    surveys (e.g., PDNAs). The very low v1 convergence reflects scope
    rather than prevalence; these assessments are widely deployed in
    humanitarian operations and have well-established instrument shapes.
    FHIR's QuestionnaireResponse pattern accommodates the shape.
