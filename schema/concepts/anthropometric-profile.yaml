id: AnthropometricProfile
label:
  en: Anthropometric Profile
  fr: Profil anthropométrique
  es: Perfil antropométrico
maturity: draft

definition:
  en: >
    A point-in-time record of body measurements collected about a person
    using a defined anthropometric protocol (SMART, WHO Anthro, a CMAM
    screening form). Captures raw measurements (height, weight, MUAC),
    the measurement technique and oedema status, the age of the subject
    at measurement, the growth reference used to derive z-scores, and any
    derived status bands (stunting, wasting, underweight, acute
    malnutrition) together with the cutoff rule that produced them. The
    growth reference and age at measurement are required context: a band
    classification without them cannot be re-derived or compared across
    datasets.
  fr: >
    Un enregistrement ponctuel de mesures corporelles recueillies sur une
    personne à l'aide d'un protocole anthropométrique défini (SMART, WHO
    Anthro, un formulaire de dépistage PCIMA). Consigne les mesures brutes
    (taille, poids, périmètre brachial), la technique de mesure et l'état
    d'œdème, l'âge du sujet au moment de la mesure, la référence de
    croissance utilisée pour dériver les z-scores, et les bandes de
    statut dérivées (retard de croissance, émaciation, insuffisance
    pondérale, malnutrition aiguë) ainsi que la règle de seuil qui les a
    produites. La référence de croissance et l'âge au moment de la mesure
    sont un contexte requis : une classification de bande sans eux ne
    peut être ni re-dérivée ni comparée entre jeux de données.
  es: >
    Un registro puntual de mediciones corporales recopiladas sobre una
    persona mediante un protocolo antropométrico definido (SMART, WHO
    Anthro, un formulario de detección de CMAM). Consigna las mediciones
    brutas (talla, peso, perímetro braquial), la técnica de medición y el
    estado de edema, la edad del sujeto al momento de la medición, la
    referencia de crecimiento utilizada para derivar z-scores y las bandas
    de estado derivadas (retraso del crecimiento, emaciación, bajo peso,
    malnutrición aguda) junto con la regla de corte que las produjo. La
    referencia de crecimiento y la edad al momento de la medición son
    contexto requerido: una clasificación de banda sin ellas no puede
    re-derivarse ni compararse entre conjuntos de datos.

properties:
  - height
  - body_weight
  - muac
  - oedema_present
  - measurement_type
  - age_at_measurement_months
  - growth_reference
  - height_for_age_z
  - weight_for_age_z
  - weight_for_height_z
  - bmi_for_age_z
  - stunting_status
  - wasting_status
  - underweight_status
  - acute_malnutrition_status
  - muac_band
  - muac_cutoff_rule

property_groups:
  - category: administrative
    properties:
      - identifiers
      - subject
      - observation_date
      - performed_by
      - instrument_used
      - software_used
      - administration_mode
      - respondent
      - respondent_relationship
      - items_asked
  - category: nutrition
    properties:
      - height
      - body_weight
      - muac
      - oedema_present
      - measurement_type
      - age_at_measurement_months
      - growth_reference
      - height_for_age_z
      - weight_for_age_z
      - weight_for_height_z
      - bmi_for_age_z
      - stunting_status
      - wasting_status
      - underweight_status
      - acute_malnutrition_status
      - muac_band
      - muac_cutoff_rule

subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "Observation (vital-signs / body measurement)"
    uri: "http://hl7.org/fhir/Observation"
    match: broad
    vocabulary: "FHIR R4"
    note: "One AnthropometricProfile administration maps to several FHIR Observation resources (one per measurement) sharing a common subject and effective datetime, plus a grouping Observation or a Procedure to carry the growth-reference and cutoff-rule context. The cardinalities do not line up one-to-one, so this is a broad match rather than a close one."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    FHIR represents each measurement as a vital-signs Observation; DHIS2
    routinely models anthropometry as tracked-entity data elements per
    visit. OpenSPP, OpenCRVS, openIMIS, and DCI Core do not carry nutrition
    measurements in core. Domain tools outside MIS cores consistently use
    the per-visit pattern this concept encodes: CommCare CMAM stores each
    measurement on a screening form, SMART surveys treat every reading as
    a dated record with protocol context, and WHO Anthro requires the
    growth reference and age at measurement to re-derive z-scores. Person
    retains a coarse nutrition_status flag for current-state queries.
