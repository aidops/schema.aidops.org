external_equivalents:
  fhir:
    label: "QuestionnaireResponse (AAP perception survey)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household AAP perception survey serializes as a QuestionnaireResponse. FHIR R4 has no AAP-specific profile, and no humanitarian AAP FHIR implementation guide exists as of 2026. The derived boolean flags would be exposed as computed Observation resources or QuestionnaireResponse answer-derived measures."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    accountability-to-affected-populations perception module in core.
    AAP data in social-protection contexts is typically captured by
    grievance-redress-mechanism (GRM) ticketing systems and satisfaction
    surveys run outside registry platforms. The zero v1 convergence
    reflects the humanitarian-operations origin of this profile; AAP
    perception measurement is deployed in OCHA MSNA (AAP module),
    Ground Truth Solutions Humanitarian Voice Index, IFRC CEA monitoring,
    and REACH AAP assessments, not in social-protection registries.
