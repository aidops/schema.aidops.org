id: WASHAssessmentProfile
label:
  en: "WASH Assessment Profile"
  fr: "Profil d'évaluation WASH"
  es: "Perfil de evaluación WASH"
maturity: draft

definition:
  en: >
    A point-in-time household record of water, sanitation, and hygiene
    (WASH) conditions collected during a humanitarian needs assessment or
    programme monitoring exercise. Extends the WASH baseline held on
    SocioEconomicProfile; the six shared PublicSchema properties
    (water_source, water_collection_time_minutes, water_service_level,
    sanitation_facility, sanitation_shared_households,
    sanitation_service_level) are reused here without redefinition.

    The water domain adds: water source location and secondary source,
    quantity (litres per person per day), supply reliability, household
    water treatment practice and method, storage container type and
    coverage, and payment for water.

    The sanitation domain adds: facility condition and privacy, child
    feces disposal method, and fecal sludge emptying history (when and by
    whom) for on-site containment systems.

    The hygiene domain adds: handwashing facility presence (enumerator
    observation), facility type and location, observed water and soap
    availability at the facility, derived hygiene service level, and
    supplementary self-reported critical junctures and available hygiene
    items. Menstrual hygiene management (MHM) sub-properties capture
    access to private washing space, access to materials, and disposal
    method; these are age-gated via form roster to women and girls of
    menstruating age.

    Water quantity thresholds: Sphere minimum standard 15 L/p/d (acute
    emergency phase 7.5 L/p/d); UNHCR SENS potable storage threshold
    10 L/p/d; JMP basic service aspiration for longer-term recovery
    30+ L/p/d. Water service and sanitation service levels follow the
    WHO/UNICEF JMP five-rung ladder for SDG 6.1.1 and 6.2.1 monitoring.
    Hygiene service level follows the JMP three-rung ladder (basic /
    limited / no facility) for SDG 6.2.1.

    Water quality testing is deferred to an optional extended module
    (WASHExtendedProfile) requiring field equipment and enumerator
    training; it is not part of this core profile.
  fr: >
    Un enregistrement ponctuel des conditions d'eau, d'assainissement et
    d'hygiène (WASH) d'un ménage, collecté lors d'une évaluation
    humanitaire des besoins ou d'un exercice de suivi de programme. Étend
    la base WASH détenue sur SocioEconomicProfile; les six propriétés
    PublicSchema partagées (water_source, water_collection_time_minutes,
    water_service_level, sanitation_facility, sanitation_shared_households,
    sanitation_service_level) sont réutilisées ici sans redéfinition.

    Le domaine eau ajoute : l'emplacement de la source d'eau et la source
    secondaire, la quantité (litres par personne par jour), la fiabilité de
    l'approvisionnement, la pratique et la méthode de traitement de l'eau à
    domicile, le type et la couverture du récipient de stockage, et le
    paiement de l'eau.

    Le domaine assainissement ajoute : l'état et la confidentialité de
    l'installation, la méthode d'élimination des matières fécales des
    enfants, et l'historique de vidange des boues fécales (quand et par
    qui) pour les systèmes de confinement sur site.

    Le domaine hygiène ajoute : la présence d'un dispositif de lavage des
    mains (observation de l'énumérateur), le type et l'emplacement du
    dispositif, la disponibilité observée d'eau et de savon au dispositif,
    le niveau de service d'hygiène dérivé, et les moments critiques
    auto-déclarés et les articles d'hygiène disponibles en supplément. Les
    sous-propriétés de gestion de l'hygiène menstruelle (GHM) capturent
    l'accès à un espace de lavage privé, l'accès aux matériaux et la
    méthode d'élimination ; celles-ci sont filtrées par l'âge via le
    registre des formulaires pour les femmes et filles en âge de menstruer.

    Seuils de quantité d'eau : norme minimale Sphère 15 L/p/j (phase
    d'urgence aiguë 7,5 L/p/j) ; seuil de stockage potable SENS du HCR
    10 L/p/j ; aspiration du service de base JMP pour le relèvement à long
    terme 30+ L/p/j. Les niveaux de service en eau et d'assainissement
    suivent l'échelle JMP OMS/UNICEF à cinq niveaux pour le suivi des ODD
    6.1.1 et 6.2.1. Le niveau de service d'hygiène suit l'échelle JMP à
    trois niveaux (de base / limité / aucune installation) pour l'ODD 6.2.1.

    Les tests de qualité de l'eau sont reportés à un module étendu
    optionnel (WASHExtendedProfile) nécessitant du matériel de terrain et
    une formation des énumérateurs ; ils ne font pas partie de ce profil de
    base.
  es: >
    Un registro puntual de las condiciones de agua, saneamiento e higiene
    (WASH) de un hogar, recopilado durante una evaluación de necesidades
    humanitarias o un ejercicio de monitoreo de programa. Extiende la
    línea base WASH mantenida en SocioEconomicProfile; las seis
    propiedades PublicSchema compartidas (water_source,
    water_collection_time_minutes, water_service_level, sanitation_facility,
    sanitation_shared_households, sanitation_service_level) se reutilizan
    aquí sin redefinición.

    El dominio agua agrega: ubicación de la fuente de agua y fuente
    secundaria, cantidad (litros por persona por día), confiabilidad del
    suministro, práctica y método de tratamiento del agua en el hogar, tipo
    y cobertura del recipiente de almacenamiento, y pago por el agua.

    El dominio saneamiento agrega: condición y privacidad de la instalación,
    método de eliminación de heces de niños, e historial de vaciado de
    lodos fecales (cuándo y por quién) para sistemas de contención en el
    sitio.

    El dominio higiene agrega: presencia de instalación de lavado de manos
    (observación del enumerador), tipo y ubicación de la instalación,
    disponibilidad observada de agua y jabón en la instalación, nivel de
    servicio de higiene derivado, y momentos críticos autodeclarados y
    artículos de higiene disponibles de forma suplementaria. Las
    sub-propiedades de gestión de higiene menstrual (MHM) capturan el
    acceso a un espacio de lavado privado, acceso a materiales y método de
    eliminación; estas se filtran por edad a través del registro del
    formulario para mujeres y niñas en edad de menstruar.

    Umbrales de cantidad de agua: estándar mínimo Esfera 15 L/p/d (fase de
    emergencia aguda 7,5 L/p/d); umbral de almacenamiento potable SENS
    ACNUR 10 L/p/d; aspiración de servicio básico JMP para recuperación a
    largo plazo 30+ L/p/d. Los niveles de servicio de agua y saneamiento
    siguen la escala JMP OMS/UNICEF de cinco peldaños para el monitoreo de
    los ODS 6.1.1 y 6.2.1. El nivel de servicio de higiene sigue la escala
    JMP de tres peldaños (básico / limitado / sin instalación) para los
    ODS 6.2.1.

    Las pruebas de calidad del agua se difieren a un módulo extendido
    opcional (WASHExtendedProfile) que requiere equipamiento de campo y
    capacitación de enumeradores; no forman parte de este perfil principal.

# Properties owned by WASHAssessmentProfile.
# The six PublicSchema WASH properties (water_source, water_collection_time_minutes,
# water_service_level, sanitation_facility, sanitation_shared_households,
# sanitation_service_level) are referenced in property_groups below but
# are not listed here because they are defined in PublicSchema.
properties:
  # Water domain
  - water_source_secondary
  - water_source_location
  - water_quantity_litres_per_person_per_day
  - water_availability_reliable
  - water_availability_days_per_week
  - water_treatment_practiced
  - water_treatment_method
  - water_storage_container_type
  - water_storage_container_covered
  - water_payment
  - water_payment_amount_local_currency
  # Sanitation domain
  - sanitation_facility_condition
  - sanitation_facility_private
  - child_feces_disposal
  - sanitation_pit_last_emptied
  - sanitation_pit_emptied_by
  # Hygiene domain
  - handwashing_facility_present
  - handwashing_facility_type
  - handwashing_facility_location
  - handwashing_water_available
  - handwashing_soap_available
  - hygiene_service_level
  - handwashing_at_critical_junctures
  - hygiene_items_available
  # MHM sub-domain
  - mhm_privacy_available
  - mhm_materials_available
  - mhm_material_disposal

property_groups:
  - category: administrative
    properties:
      - identifiers
      - subject
      - observation_date
      - performed_by
      - instrument_used
      - software_used
      - administration_mode
      - respondent
      - respondent_relationship
      - items_asked
  - category: water
    properties:
      - water_source
      - water_source_secondary
      - water_source_location
      - water_collection_time_minutes
      - water_service_level
      - water_quantity_litres_per_person_per_day
      - water_availability_reliable
      - water_availability_days_per_week
      - water_treatment_practiced
      - water_treatment_method
      - water_storage_container_type
      - water_storage_container_covered
      - water_payment
      - water_payment_amount_local_currency
  - category: sanitation
    properties:
      - sanitation_facility
      - sanitation_shared_households
      - sanitation_service_level
      - sanitation_facility_condition
      - sanitation_facility_private
      - child_feces_disposal
      - sanitation_pit_last_emptied
      - sanitation_pit_emptied_by
  - category: hygiene
    properties:
      - handwashing_facility_present
      - handwashing_facility_type
      - handwashing_facility_location
      - handwashing_water_available
      - handwashing_soap_available
      - hygiene_service_level
      - handwashing_at_critical_junctures
      - hygiene_items_available
  - category: mhm
    properties:
      - mhm_privacy_available
      - mhm_materials_available
      - mhm_material_disposal

subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse (WASH household assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household WASH assessment serializes naturally as a QuestionnaireResponse whose Questionnaire corresponds to the JMP core questions or programme-specific WASH assessment instrument. JMP service levels (water_service_level, sanitation_service_level, hygiene_service_level) can be represented as derived FHIR Observations."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    WASH assessment at the granularity of the JMP core questions. The
    informing domain tools live outside the v1 set: UNICEF MICS,
    WHO/UNICEF JMP, UNHCR SENS, ERWG WASH.HH, and Sphere-compliant
    programme monitoring forms. The very low v1 convergence reflects
    scope rather than prevalence; these assessments are widely deployed
    in humanitarian and development operations. DHIS2 national HMIS
    implementations may carry water source and sanitation type at
    facility or district level, but not at the household survey item
    level captured here.
