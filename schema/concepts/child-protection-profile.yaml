external_equivalents:
  fhir:
    label: "QuestionnaireResponse (MICS 6 child-protection battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each administration of the CP profile maps to one or more QuestionnaireResponse resources (per-child under 5 for BR; per randomly selected child for CL/FCD; per woman 15-49 plus per-daughter for FGM/C). Derived CP.1/CP.2/CP.3 booleans map to FHIR Observation. A birth-registration positive outcome could be reconciled to a FHIR Patient.identifier (birth certificate) or Person.identity-document, but no auto-reconciliation is wired in this batch."
  dhis2:
    label: "DHIS2 child protection tracker / aggregate elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: related
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 does not ship a canonical child-protection package; country implementations commonly track birth registration and violent-discipline prevalence in HMIS tracker or aggregate programs. Item-level CL hazard exposure and FGM per-daughter detail are typically held only in survey microdata."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    FHIR R4 and DHIS2 offer the closest structural equivalents. OpenCRVS
    is the canonical system for birth-registration data, but the MICS 6
    BR items capture caregiver report (not the registration event itself)
    and so sit upstream of an OpenCRVS record rather than inside it.
    openIMIS, OpenSPP, and DCI do not model child-protection survey items.
    The FCD5 physical-punishment belief item partially converges with the
    pro-WEAI IPV attitude items (weai_ipv_*) in GenderEmpowermentProfile
    in that both measure normative attitudes toward interpersonal
    violence; however, FCD5 targets adult-to-child violence specifically
    and is retained in this profile as part of the coherent MICS FCD
    instrument. Cross-reference both directions rather than duplicate.
