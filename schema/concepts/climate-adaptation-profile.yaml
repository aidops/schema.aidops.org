external_equivalents:
  fhir:
    label: "QuestionnaireResponse (household climate vulnerability and adaptation assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level climate adaptation assessment serializes naturally as a QuestionnaireResponse whose Questionnaire is the CARE CVCA or IFRC PCVA household module. Derived indicators (adaptive capacity index, vulnerability flag) are better modelled as FHIR Observation or RiskAssessment resources produced by a scoring step."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    climate vulnerability and adaptation assessment. The domain tools
    live in the humanitarian and climate-finance sector: CARE CVCA,
    IFRC PCVA, GCF vulnerability assessment templates, UNFCCC NAP M&E
    household modules, World Bank CSA Country Profile household surveys,
    and LoCAL PBCRG household performance assessments. FHIR's
    QuestionnaireResponse pattern accommodates the shape. The low v1
    convergence reflects scope rather than prevalence; household-level
    climate vulnerability assessment is a growing domain driven by NAP
    requirements and climate finance accountability.
