external_equivalents:
  fhir:
    label: "QuestionnaireResponse (market monitoring assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A single market visit record serializes as a QuestionnaireResponse linked to a FHIR Location resource (the market as a named place). The Module C repeat group (price basket) maps naturally to a repeated Questionnaire item group. JMMI and WFP VAM digital platforms using FHIR would represent each commodity row as a repeated QuestionnaireResponse.item."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    MarketProfile is a supply-side humanitarian market monitoring profile with
    no direct equivalent in the v1 convergence systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry). These systems are oriented toward
    social protection, civil registration, and health service delivery, not
    market monitoring. The informing standards bodies live outside the v1 set:
    CaLP (MISMA), WFP (MAG, VAM), REACH/IMPACT (JMMI), ICRC (RAM, PCMA),
    FAO (GIEWS FPMA), CRS (MARKit), Sphere Association, and ACAPS. Convergence
    evidence is strong within the humanitarian market analysis canon.
