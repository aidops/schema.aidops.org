id: MarketProfile
label:
  en: Market Profile
  fr: "Profil de marché"
  es: "Perfil de mercado"
maturity: draft

definition:
  en: >
    A point-in-time record of market functionality, commodity availability and
    prices, supply chain status, accessibility, and cash-based programming (CBI)
    feasibility for a single market visit. The subject is a PS ServicePoint
    constrained to service_point_type: market. One record represents one market
    visit on one date; the same market is visited repeatedly (monthly or
    fortnightly, following JMMI precedent) to generate time-series data for trend
    analysis. The market's persistent identity (name, GPS coordinates,
    administrative area, catchment population) is stored on the ServicePoint
    record, not re-collected on each profile visit.
    The profile addresses three core operational questions recurring across all
    humanitarian market methodologies: (1) Functionality — is the market open,
    accessible, and adequately stocked to meet essential needs? (2) Price — are
    essential commodity prices within an acceptable range of pre-crisis baselines,
    and what is the price trend direction? (3) CBI feasibility — are cash, mobile
    money, or voucher modalities viable at this market from the supply side?
    Data collection uses two simultaneous sources: enumerator direct observation
    (operational status, vendor count, food safety, road access, physical
    availability of goods) and key vendor informant (KVI) interview (prices,
    price trends, supply chain status, transport costs, cash/mobile money
    acceptance, vendor capacity for large orders). The Module C price basket is
    implemented as a repeat group in XLSForm (one row per commodity); the schema
    defines six per-row properties that compose into a begin_repeat/end_repeat
    block at form level. The profile is the supply-side counterpart to the
    demand-side market-access items in FoodSecurityProfile and LivelihoodProfile.
    Draws on CaLP MISMA 2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA
    2014, WFP MAG 2021, REACH JMMI (2017–present), CRS MARKit 2023, FAO GIEWS
    FPMA, WFP VAM, CaLP Programme Quality Toolbox 2020, ACAPS Market Assessment
    Methodology Note 2014, and Sphere Handbook 2018.
    Does not cover household-reported market access (FoodSecurityProfile),
    household income from market trade (LivelihoodProfile), individual vendor
    identity or per-vendor financial data, national price indices, terms of trade
    for pastoral communities, FSP landscape assessment, or full EMMA market-system
    mapping.
  fr: >
    Un enregistrement ponctuel de la fonctionnalité d'un marché, de la
    disponibilité et des prix des produits, du statut de la chaîne
    d'approvisionnement, de l'accessibilité et de la faisabilité des
    programmes en espèces (CBI) pour une seule visite de marché. Le sujet
    est un ServicePoint PS contraint à service_point_type : market. Un
    enregistrement représente une visite de marché à une date donnée ; le même
    marché est visité de manière répétée (mensuellement ou bimensuellement,
    suivant le précédent JMMI) pour générer des données de séries
    chronologiques. L'identité persistante du marché (nom, coordonnées GPS,
    zone administrative, population desservie) est stockée dans l'enregistrement
    ServicePoint, pas recollectée à chaque visite de profil.
    Le profil répond à trois questions opérationnelles fondamentales récurrentes
    dans toutes les méthodologies humanitaires de marché : (1) Fonctionnalité —
    le marché est-il ouvert, accessible et suffisamment approvisionné pour
    répondre aux besoins essentiels ? (2) Prix — les prix des produits essentiels
    sont-ils dans une fourchette acceptable par rapport aux niveaux de référence
    d'avant-crise, et quelle est la direction de la tendance des prix ? (3)
    Faisabilité CBI — les modalités espèces, mobile money ou bons sont-elles
    viables sur ce marché du côté de l'offre ?
    La collecte de données utilise deux sources simultanées : l'observation
    directe de l'enquêteur et l'entretien avec des informateurs clés vendeurs
    (KVI). Le panier de prix du Module C est implémenté comme un groupe de
    répétition dans XLSForm (une ligne par produit). S'appuie sur CaLP MISMA
    2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA 2014, WFP MAG 2021,
    REACH JMMI, CRS MARKit 2023, FAO GIEWS FPMA, WFP VAM, CaLP Programme
    Quality Toolbox 2020, ACAPS 2014 et le Manuel Sphere 2018.
  es: >
    Un registro puntual de la funcionalidad del mercado, la disponibilidad y
    los precios de los productos, el estado de la cadena de suministro, la
    accesibilidad y la viabilidad de la programación basada en efectivo (CBI)
    para una sola visita al mercado. El sujeto es un ServicePoint de PS
    restringido a service_point_type: market. Un registro representa una visita
    al mercado en una fecha; el mismo mercado se visita repetidamente (mensual
    o quincenalmente, siguiendo el precedente JMMI) para generar datos de series
    temporales. La identidad persistente del mercado (nombre, coordenadas GPS,
    área administrativa, población de captación) se almacena en el registro
    ServicePoint, no se recolecta en cada visita de perfil.
    El perfil responde tres preguntas operacionales fundamentales que se
    repiten en todas las metodologías humanitarias de mercado: (1)
    Funcionalidad: ¿está el mercado abierto, accesible y adecuadamente
    abastecido para satisfacer las necesidades esenciales? (2) Precio: ¿están
    los precios de los productos esenciales dentro de un rango aceptable
    respecto a las líneas base previas a la crisis, y cuál es la dirección
    de la tendencia de precios? (3) Viabilidad CBI: ¿son viables las
    modalidades de efectivo, dinero móvil o vales en este mercado desde el
    lado de la oferta?
    La recolección de datos utiliza dos fuentes simultáneas: la observación
    directa del enumerador y la entrevista con informantes clave vendedores
    (KVI). La cesta de precios del Módulo C se implementa como un grupo de
    repetición en XLSForm (una fila por producto). Se apoya en CaLP MISMA
    2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA 2014, WFP MAG 2021,
    REACH JMMI, CRS MARKit 2023, FAO GIEWS FPMA, WFP VAM, CaLP Programme
    Quality Toolbox 2020, ACAPS 2014 y el Manual Sphere 2018.

