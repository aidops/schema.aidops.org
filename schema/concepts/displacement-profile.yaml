id: DisplacementProfile
label:
  en: Displacement Profile
  fr: "Profil de déplacement"
  es: "Perfil de desplazamiento"
maturity: draft

definition:
  en: >
    A point-in-time household-level record of displacement status, movement
    history, push factors, durable solution intentions, legal and documentation
    status, family separation, and displacement-specific protection needs.
    Designed for use in IOM DTM-style registration and Mobility Tracking
    operations, UNHCR registration, and interagency durable solutions
    assessments following the IASC Framework. The profile captures the
    "current state" of a household's displacement situation; a future
    DisplacementEvent sub-structure (Phase 2) will model multi-event
    histories for households with complex displacement trajectories.
    Displacement status (A1) is reused from the PublicSchema Person
    property displacement_status, which references the displacement-status
    vocabulary standardized by EGRISS IRIS.
  fr: >
    Un enregistrement ponctuel au niveau du ménage du statut de déplacement,
    de l'historique des déplacements, des facteurs de départ, des intentions
    de solution durable, du statut juridique et documentaire, de la séparation
    familiale et des besoins de protection spécifiques liés au déplacement.
    Conçu pour les opérations d'enregistrement de style DTM de l'OIM et de
    suivi de la mobilité, l'enregistrement du HCR, et les évaluations
    interagences des solutions durables conformément au Cadre de l'IASC. Le
    profil capture l'état actuel de la situation de déplacement d'un ménage ;
    une sous-structure future DisplacementEvent (Phase 2) modélisera les
    historiques multi-événements pour les ménages avec des trajectoires de
    déplacement complexes.
  es: >
    Un registro puntual a nivel del hogar del estado de desplazamiento,
    historial de movimientos, factores de expulsión, intenciones de solución
    duradera, estado jurídico y documental, separación familiar y necesidades
    de protección específicas relacionadas con el desplazamiento. Diseñado
    para operaciones de registro estilo IOM DTM y seguimiento de la movilidad,
    registro del ACNUR y evaluaciones interagenciales de soluciones duraderas
    siguiendo el Marco del IASC. El perfil captura el estado actual de la
    situación de desplazamiento de un hogar; una futura subestructura
    DisplacementEvent (Fase 2) modelará historiales de múltiples eventos para
    hogares con trayectorias de desplazamiento complejas.

properties:
  - displacement_origin_country
  - displacement_origin_admin1
  - current_location_type
  - first_displacement_date
  - most_recent_displacement_date
  - displacement_event_count
  - displacement_reasons
  - displacement_reason_detail
  - displacement_primary_reason
  - return_intention
  - return_intention_timeline
  - return_barriers
  - preferred_destination_country
  - refugee_status_determination
  - primary_identity_document_status
  - hh_has_birth_certificates
  - hh_has_marriage_certificates
  - family_members_separated
  - separated_members_count
  - has_uasc
  - specific_need_unaccompanied_minor
  - specific_need_elderly_at_risk
  - specific_need_disability
  - specific_need_single_female_head
  - specific_need_pregnant_lactating

property_groups:
  - category: administrative
    properties:
      - identifiers
      - subject
      - observation_date
      - performed_by
      - instrument_used
      - software_used
      - administration_mode
      - respondent
      - respondent_relationship
      - items_asked
  - category: displacement_status
    properties:
      # displacement_status is a PS property; listed here for completeness
      # in group membership. It is not redeclared in properties above.
      - displacement_status
      - displacement_origin_country
      - displacement_origin_admin1
      - current_location_type
  - category: displacement_history
    properties:
      - first_displacement_date
      - most_recent_displacement_date
      - displacement_event_count
  - category: push_factors
    properties:
      - displacement_reasons
      - displacement_reason_detail
      - displacement_primary_reason
  - category: intentions
    properties:
      - return_intention
      - return_intention_timeline
      - return_barriers
      - preferred_destination_country
  - category: documentation
    properties:
      - refugee_status_determination
      - primary_identity_document_status
      - hh_has_birth_certificates
      - hh_has_marriage_certificates
  - category: family_separation
    properties:
      - family_members_separated
      - separated_members_count
      - has_uasc
  - category: specific_needs
    properties:
      - specific_need_unaccompanied_minor
      - specific_need_elderly_at_risk
      - specific_need_disability
      - specific_need_single_female_head
      - specific_need_pregnant_lactating

subtypes: []
supertypes: [Profile]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse (displacement registration)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level displacement registration or DTM Mobility Tracking interview serializes naturally as a QuestionnaireResponse. FHIR Patient and RelatedPerson resources carry identity fields; displacement-specific coded values require extensions or custom Observation resources."
