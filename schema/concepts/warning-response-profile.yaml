id: WarningResponseProfile
label:
  en: Warning Response Profile
  fr: "Profil de réponse à l'alerte"
  es: "Perfil de respuesta a la alerta"
maturity: draft

definition:
  en: >
    An event-anchored, household-level record of the early-warning
    causal chain for a single recent hazard event: warning reception,
    comprehension of the message, trust in the source, protective
    actions taken, barriers encountered when action was partial or
    absent, and the household's reflection on what would help them act
    more effectively next time. The profile is hazard-agnostic (flood,
    cyclone, drought, heatwave, epidemic, earthquake, landslide,
    wildfire, conflict displacement): protective-action and support
    codes that do not apply to a given hazard are simply not selected.
    The hazard event being referenced is identified by the enclosing
    survey session, carried by the inherited hazard-event context, or,
    where a structured reference is not available, by free-text
    observation context; no hazard-event property is collected directly
    on this profile. Item content aligns with the four pillars of the
    WMO Multi-Hazard Early Warning Systems Checklist (risk knowledge,
    detection and forecasting, warning dissemination, response
    capability) at the household endpoint, with IFRC Forecast-based
    Financing and Anticipatory Action MEAL indicators, with the CREWS
    impact-based forecasting MEL framework, with Sphere 2018 Core
    Standard 1 on people-centred information, and with the downstream
    measures of Sendai Framework Target G. Sensitivity: the profile is
    non-sensitive at household level, with one exception. The two
    permission-denied codes in the warning-action-barrier vocabulary
    (permission_denied_household_member and
    permission_denied_community_authority) can surface intra-household
    or community coercion that bears on protection and GBV analysis;
    those codes carry a sensitivity flag in the vocabulary. Enumerators
    should ask the barriers item in a private setting, and downstream
    systems should apply partial-sensitivity handling to records where
    either permission-denied code is selected.
  fr: >
    Un enregistrement ancré à un événement, au niveau du ménage, de la
    chaîne causale de l'alerte précoce pour un événement dangereux
    récent unique : réception de l'alerte, compréhension du message,
    confiance dans la source, actions de protection prises, obstacles
    rencontrés lorsque l'action a été partielle ou absente, et
    réflexion du ménage sur ce qui l'aiderait à agir plus efficacement
    la prochaine fois. Le profil est indépendant du type de danger
    (inondation, cyclone, sécheresse, canicule, épidémie, séisme,
    glissement de terrain, incendie de forêt, déplacement lié aux
    conflits) : les codes d'action de protection et de soutien qui ne
    s'appliquent pas à un danger donné ne sont simplement pas
    sélectionnés. L'événement dangereux référencé est identifié par la
    session d'enquête englobante, porté par le contexte d'événement
    dangereux hérité, ou, lorsqu'une référence structurée n'est pas
    disponible, par le contexte d'observation en texte libre ; aucune
    propriété d'événement dangereux n'est collectée directement sur ce
    profil. Le contenu des items s'aligne sur les quatre piliers de la
    Liste de contrôle des systèmes d'alerte précoce multi-dangers de
    l'OMM (connaissance du risque, détection et prévision, diffusion de
    l'alerte, capacité de réponse) au niveau du point terminal ménage,
    sur les indicateurs MEAL du financement basé sur les prévisions et
    de l'action anticipatoire de la FICR, sur le cadre MEL de
    prévisions basées sur les impacts du CREWS, sur la Norme
    fondamentale 1 de Sphère 2018 relative à l'information centrée sur
    les personnes, et sur les mesures en aval de la cible G du Cadre de
    Sendai. Sensibilité : le profil est non sensible au niveau du
    ménage, avec une exception. Les deux codes de refus de permission
    dans le vocabulaire warning-action-barrier
    (permission_denied_household_member et
    permission_denied_community_authority) peuvent révéler une
    contrainte intra-ménage ou communautaire pertinente pour l'analyse
    protection et VBG ; ces codes portent un marqueur de sensibilité
    dans le vocabulaire. Les enquêteurs devraient poser l'item sur les
    obstacles dans un cadre privé, et les systèmes en aval devraient
    appliquer un traitement de sensibilité partielle aux enregistrements
    où l'un ou l'autre code de refus de permission est sélectionné.
  es: >
    Un registro anclado a un evento, a nivel del hogar, de la cadena
    causal de la alerta temprana para un evento de peligro reciente
    único: recepción de la alerta, comprensión del mensaje, confianza
    en la fuente, acciones de protección tomadas, obstáculos
    encontrados cuando la acción fue parcial o ausente, y reflexión del
    hogar sobre qué le ayudaría a actuar con mayor eficacia la próxima
    vez. El perfil es independiente del tipo de peligro (inundación,
    ciclón, sequía, ola de calor, epidemia, sismo, deslizamiento,
    incendio forestal, desplazamiento por conflicto): los códigos de
    acción de protección y de apoyo que no aplican a un peligro dado
    simplemente no se seleccionan. El evento de peligro referenciado se
    identifica por la sesión de encuesta que lo contiene, se lleva por
    el contexto heredado de evento de peligro, o, cuando no hay una
    referencia estructurada disponible, por el contexto de observación
    en texto libre; ninguna propiedad de evento de peligro se recopila
    directamente en este perfil. El contenido de los ítems se alinea
    con los cuatro pilares de la Lista de verificación de sistemas de
    alerta temprana multi-peligro de la OMM (conocimiento del riesgo,
    detección y pronóstico, difusión de alertas, capacidad de
    respuesta) en el punto terminal del hogar, con los indicadores MEAL
    del financiamiento basado en pronósticos y de la acción
    anticipatoria de la FICR, con el marco MEL de pronóstico basado en
    impactos del CREWS, con el Estándar Central 1 de Esfera 2018 sobre
    información centrada en las personas, y con las medidas posteriores
    de la Meta G del Marco de Sendai. Sensibilidad: el perfil es no
    sensible a nivel del hogar, con una excepción. Los dos códigos de
    denegación de permiso en el vocabulario warning-action-barrier
    (permission_denied_household_member y
    permission_denied_community_authority) pueden revelar coerción
    intrafamiliar o comunitaria relevante para el análisis de
    protección y VBG; esos códigos llevan un marcador de sensibilidad
    en el vocabulario. Los enumeradores deben preguntar el ítem de
    barreras en un entorno privado, y los sistemas posteriores deben
    aplicar un tratamiento de sensibilidad parcial a los registros
    donde se seleccione cualquiera de los códigos de denegación de
    permiso.

