external_equivalents:
  fhir:
    label: "QuestionnaireResponse (early warning response assessment)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "A household-level warning response assessment serializes naturally as a QuestionnaireResponse against a Questionnaire aligned with the IFRC FbF post-distribution monitoring item set."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI Social Registry) carry a household-level
    early-warning response assessment. The domain tools live in
    humanitarian operations: IFRC Forecast-based Financing post-event
    monitoring forms, Start Network DEF household tools, WMO MHEWS
    Checklist (national system level, not household), CREWS
    impact-based forecasting MEL, and IOM Displacement Tracking Matrix
    household-level assessments in some country operations. The low v1
    convergence reflects scope rather than prevalence; household-level
    warning response monitoring is the core instrument family of the
    rapidly growing Anticipatory Action portfolio. FHIR's
    QuestionnaireResponse pattern accommodates the shape.
