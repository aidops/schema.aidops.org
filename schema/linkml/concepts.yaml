      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014", "iasc-disability-2019", "iasc-jiaf-2022", "ifrc-vca-2020", "reach-hsm-2023", "undp-dppa-social-cohesion-2020", "unhcr-agd-2018"], "convergence": {"notes": "None of the six v1 social-protection reference systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carries a community-level rapid-needs-assessment record in core. The informing standards live outside the v1 set: IASC MIRA, JIAF, ACAPS, REACH HSM, IOM DTM, IFRC VCA, Sphere, UNHCR AGD, IASC Guidelines on Inclusion of Persons with Disabilities, and the UNDP-DPPA Social Cohesion Framework. Only IOM DTM site-level reporting and UNHCR population-group data align with the Community-as-subject model at all, and they capture services inventory rather than self-reported priority rankings. The zero v1 convergence reflects the humanitarian-operations origin of this profile.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A point-in-time record of community-level needs as aggregated, self- reported perceptions by a bounded community, site, or settlement. Unlike household or individual profiles, the subject of this profile is a Community: the reporting unit is the social collective and respondents are collective (a focus group) or informant-based (key informants speaking on behalf of the community). Captures the assessment methodology and informant composition; the top three priority needs (ranked) as the community views them; the groups the community itself identifies as most in need; an overall severity rating and a pre-crisis baseline comparison on JIAF-aligned scales; community-reported coping strategies; community-perceived social cohesion and inter-group tension; community-perceived coverage gaps in the response; and optional enumerator observation notes. This profile does NOT re-measure household-level need (food insecurity, shelter adequacy, health access, protection, WASH, NFI, displacement, education, mental health, maternal-newborn, child protection, GBV risk, gender empowerment); those remain the domain of their respective profiles. It captures the community''s own ranking and perception of need, which complements but does not substitute for the household/individual profiles and feeds MIRA/JIAF analysis pipelines as one of several inputs. Two properties (cn_social_cohesion_level, cn_tension_between_groups_described) are flagged sensitive because they can identify ethnic, political, or religious fault lines and expose minority groups to retaliation if disclosed without aggregation; all other properties are non-sensitive. Anchored on MIRA 2015 (Community Level Assessment form), JIAF 2.0 (severity and baseline), ACAPS 2014 (methodology), REACH HSM (operational analogue), IOM DTM Site Assessment (priority-needs question patterns), IFRC VCA, Sphere 2018 (AAP / CHS Commitment 4), UNHCR AGD, IASC Guidelines on Inclusion of Persons with Disabilities (2019), and the UNDP-DPPA Social Cohesion Framework.\n", "es": "Un registro puntual de las necesidades a nivel comunitario como percepciones agregadas y autorreportadas por una comunidad, sitio o asentamiento delimitado. A diferencia de los perfiles de hogar o individuales, el sujeto de este perfil es una Community: la unidad de reporte es el colectivo social y los encuestados son colectivos (un grupo focal) o basados en informantes (informantes clave que hablan en nombre de la comunidad). Captura la metodolog\u00eda de evaluaci\u00f3n y la composici\u00f3n de informantes; las tres principales necesidades prioritarias (ranqueadas) tal como las ve la comunidad; los grupos que la propia comunidad identifica como m\u00e1s necesitados; una calificaci\u00f3n general de severidad y una comparaci\u00f3n con la l\u00ednea base previa a la crisis en escalas alineadas con el JIAF; las estrategias de afrontamiento reportadas por la comunidad; la cohesi\u00f3n social y las tensiones intergrupales percibidas por la comunidad; las brechas de cobertura de la respuesta percibidas por la comunidad; y notas de observaci\u00f3n opcionales del encuestador. Este perfil NO vuelve a medir las necesidades a nivel del hogar (inseguridad alimentaria, adecuaci\u00f3n del refugio, acceso a salud, protecci\u00f3n, WASH, art\u00edculos no alimentarios, desplazamiento, educaci\u00f3n, salud mental, salud materna y neonatal, protecci\u00f3n de la ni\u00f1ez, riesgo de VBG, empoderamiento de g\u00e9nero); esas siguen siendo competencia de sus perfiles respectivos. Captura el ranking y la percepci\u00f3n de necesidad de la propia comunidad, lo cual complementa sin sustituir los perfiles de hogar/individuo, y alimenta las cadenas de an\u00e1lisis MIRA/JIAF como una de varias entradas. Dos propiedades (cn_social_cohesion_level, cn_tension_between_groups_described) est\u00e1n marcadas como sensibles porque pueden identificar l\u00edneas de fractura \u00e9tnica, pol\u00edtica o religiosa y exponer a grupos minoritarios a represalias si se divulgan sin agregaci\u00f3n; todas las dem\u00e1s propiedades son no sensibles. Anclado en MIRA 2015 (formulario de Evaluaci\u00f3n a Nivel Comunitario), JIAF 2.0 (severidad y comparaci\u00f3n con l\u00ednea base), ACAPS 2014 (metodolog\u00eda), HSM de REACH (an\u00e1logo operativo), Site Assessment de la DTM de la OIM (patrones de pregunta de necesidades prioritarias), VCA de la IFRC, Esfera 2018 (AAP / Compromiso 4 de la NHC), AGD del ACNUR, Directrices del IASC sobre inclusi\u00f3n de personas con discapacidad (2019) y Marco de Cohesi\u00f3n Social PNUD-DPPA.\n", "fr": "Un enregistrement ponctuel des besoins au niveau de la communaut\u00e9 sous forme de perceptions agr\u00e9g\u00e9es et auto-d\u00e9clar\u00e9es par une communaut\u00e9, un site ou un \u00e9tablissement d\u00e9limit\u00e9. Contrairement aux profils du m\u00e9nage ou individuels, le sujet de ce profil est une Community : l''unit\u00e9 de rapport est le collectif social et les r\u00e9pondants sont collectifs