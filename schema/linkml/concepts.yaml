    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fanta-hhs", "fao-fies", "fao-hdds", "fao-mahfp", "fao-mdd-w", "fhir-r4", "wfp-cari", "wfp-fcs", "wfp-lcs", "wfp-rcsi"], "convergence": {"notes": "Only FHIR and DHIS2 represent an item-level food-security administration. OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry do not carry food security survey items in core; national deployments that collect them (Kenya HSNP, Somalia Baxnaano, Ethiopia PSNP, Yemen food-security assessments) store them in separate humanitarian assessment modules whose shape matches this concept. The informing standards bodies are WFP VAM, FAO Voices of the Hungry, and FANTA rather than the v1 MIS core set; this convergence number understates the prevalence of the data because the v1 set does not include humanitarian survey platforms.\n", "system_count": 2, "total_systems": 6}, "definition": {"en": "A point-in-time record of household (or, for MDD-W, individual) food-security data collected using one or more instruments from the humanitarian food-security canon: WFP FCS, rCSI, LCS, and CARI; FAO HDDS, FIES, MDD-W, and MAHFP; and the FANTA HHS. Captures the raw item responses alongside the administration context (instrument, mode, respondent, recall period) and carries canonical-rule derived outputs for each instrument''s standard scoring function (for example, the FCS weighted score and consumption group using WFP standard 21/35 thresholds, the rCSI sum score, the HHS category, or the LCS severity band). CARI, as a second-order composite that consumes scores from multiple instruments, is recorded via ScoringEvent rather than on this profile.\n", "es": "Un registro puntual de datos de seguridad alimentaria del hogar (o, para MDD-W, individuales) recopilados mediante uno o m\u00e1s instrumentos del canon humanitario de seguridad alimentaria: FCS, rCSI, LCS y CARI del PMA; HDDS, FIES, MDD-W y MAHFP de la FAO; y HHS de FANTA. Consigna las respuestas brutas a los \u00edtems junto con el contexto de administraci\u00f3n (instrumento, modo, respondiente, per\u00edodo de recordatorio) y lleva los resultados derivados can\u00f3nicos para la funci\u00f3n de puntuaci\u00f3n est\u00e1ndar de cada instrumento (por ejemplo, el puntaje ponderado FCS y el grupo de consumo seg\u00fan los umbrales est\u00e1ndar 21/35 del PMA, el puntaje suma rCSI, la categor\u00eda HHS o el nivel de severidad LCS). CARI, como un compuesto de segundo orden que consume puntajes de m\u00faltiples instrumentos, se registra mediante ScoringEvent en lugar de en este perfil.\n", "fr": "Un enregistrement ponctuel de donn\u00e9es de s\u00e9curit\u00e9 alimentaire du m\u00e9nage (ou, pour MDD-W, individuelles) collect\u00e9es \u00e0 l''aide d''un ou plusieurs instruments du canon humanitaire de la s\u00e9curit\u00e9 alimentaire : FCS, rCSI, LCS et CARI du PAM ; HDDS, FIES, MDD-W et MAHFP de la FAO ; et HHS de FANTA. Consigne les r\u00e9ponses brutes aux items ainsi que le contexte d''administration (instrument, mode, r\u00e9pondant, p\u00e9riode de rappel) et porte les r\u00e9sultats d\u00e9riv\u00e9s canoniques pour la fonction de notation standard de chaque instrument (par exemple, le score pond\u00e9r\u00e9 FCS et le groupe de consommation selon les seuils standard 21/35 du PAM, le score somme rCSI, la cat\u00e9gorie HHS ou le niveau de s\u00e9v\u00e9rit\u00e9 LCS). CARI, en tant que composite de second ordre consommant les scores de plusieurs instruments, est enregistr\u00e9 via ScoringEvent plut\u00f4t que sur ce profil.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 FCS data elements", "match": "close", "note": "DHIS2 implementations of household food security commonly carry FCS items as individual data elements in a tracked entity program, but FIES, LCS, and CARI are rarely modelled at item level.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 global health data sets"}, "fhir": {"label": "QuestionnaireResponse (food security battery)", "match": "close", "note": "Each FCS, rCSI, LCS, CARI, HDDS, FIES, MDD-W, MAHFP, or HHS administration serializes naturally as a QuestionnaireResponse whose Questionnaire is the corresponding WFP, FAO, or FANTA instrument definition. The composite CARI index is a derived result rather than a raw response, and is better represented by a FHIR RiskAssessment or Observation produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "featured": true, "id": "FoodSecurityProfile", "label": {"en": "Food Security Profile", "es": "Perfil de seguridad alimentaria", "fr": "Profil de s\u00e9curit\u00e9 alimentaire"}, "maturity": "draft", "properties": ["fcs_staples_days", "fcs_pulses_days", "fcs_vegetables_days", "fcs_fruit_days", "fcs_meat_fish_eggs_days", "fcs_dairy_days", "fcs_fat_oil_days", "fcs_sugar_days", "fcs_condiments_days", "rcsi_less_preferred_food_days", "rcsi_borrow_food_days", "rcsi_reduce_meal_size_days", "rcsi_reduce_meal_number_days", "rcsi_restrict_adult_consumption_days", "lcs_spent_savings", "lcs_sold_household_items", "lcs_reduced_nonfood_expenses", "lcs_borrowed_money_food", "lcs_sold_productive_assets", "lcs_withdrew_children_from_school", "lcs_reduced_essential_nonfood", "lcs_consumed_seed_stock", "lcs_harvested_immature_crops", "lcs_sold_house_or_land", "lcs_migrated_whole_household", "lcs_child_labor", "lcs_early_marriage", "lcs_begging", "hdds_cereals_consumed", "hdds_roots_tubers_consumed", "hdds_vegetables_consumed", "hdds_fruit_consumed", "hdds_meat_poultry_offal_consumed", "hdds_eggs_consumed", "hdds_fish_seafood_consumed", "hdds_legumes_nuts_seeds_consumed", "hdds_milk_dairy_consumed", "hdds_oils_fats_consumed", "hdds_sweets_consumed", "hdds_spices_condiments_beverages_consumed", "fies_worried", "fies_unable_healthy_food", "fies_ate_few_foods", "fies_skip_meal", "fies_ate_less", "fies_ran_out", "fies_hungry", "fies_went_whole_day_without", "hhs_no_food", "hhs_went_sleep