      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "oxfam-lighting-wash-gbv-2018", "sphere-2018", "unfpa-gbv-minimum-standards-2019"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level GBV environmental risk screening module in core. GBV risk data in those systems, where present at all, is confined to case-management records (survivors, incident types) rather than population-level household risk indicators. The zero v1 convergence reflects the humanitarian-operations origin of this profile; GBV risk screening is deployed in MSNA and REACH household surveys, IOM DTM protection rounds, and UNHCR NARE assessments, not in social-protection registries.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A household-level record of environmental, service-availability, and caregiver-reported indicators that constitute risk factors for gender-based violence (GBV) in humanitarian settings. This profile covers (1) at-risk group composition flags indicating household-level vulnerability concentrations, (2) physical environment indicators for WASH and site infrastructure (latrine sex segregation, locking, lighting, and distance), (3) service availability and awareness indicators (GBV referral services, Women and Girls Safe Spaces, and community mobilisation), and (4) household-reported perceived safety on-site and at distribution points. All items are asked at household level by general-purpose enumerators without specialist GBV training. This profile explicitly does NOT capture GBV incident reports or individual experience of violence; those require a specialist instrument with private female-respondent conditions, specialised training, and safety referral pathways (see future IndividualGBVExperienceProfile). Based on IASC GBV Guidelines (2015), GBV AoR Risk Analysis Guidance (2021), IRC Safety Audit Tool (2013), UNFPA Minimum Standards (2019), Sphere 2018, and Oxfam/WEDC Lighting, WASH and GBV evidence review (2018).\n", "es": "Un registro a nivel del hogar de indicadores ambientales, de disponibilidad de servicios y reportados por cuidadores que constituyen factores de riesgo para la violencia basada en g\u00e9nero (VBG) en contextos humanitarios. Este perfil cubre (1) indicadores de composici\u00f3n de grupos en riesgo que se\u00f1alan concentraciones de vulnerabilidad a nivel del hogar, (2) indicadores de entorno f\u00edsico para la infraestructura WASH y del sitio (segregaci\u00f3n por sexo de letrinas, cerrojos, alumbrado y distancia), (3) indicadores de disponibilidad y conocimiento de servicios (servicios de derivaci\u00f3n VBG, espacios seguros para mujeres y ni\u00f1as, movilizaci\u00f3n comunitaria), y (4) seguridad percibida reportada por el hogar en el sitio y en los puntos de distribuci\u00f3n. Todos los \u00edtems se preguntan a nivel del hogar por encuestadores de prop\u00f3sito general sin formaci\u00f3n especializada en VBG. Este perfil expl\u00edcitamente NO captura informes de incidentes VBG ni experiencias individuales de violencia; estos requieren un instrumento especializado con condiciones de entrevista privada con una encuestada de sexo femenino, formaci\u00f3n especializada y v\u00edas de derivaci\u00f3n a servicios de seguridad (ver futuro IndividualGBVExperienceProfile). Basado en las Directrices VBG IASC (2015), la Gu\u00eda de An\u00e1lisis de Riesgos VBG AoR (2021), la Herramienta de Auditor\u00eda de Seguridad del IRC (2013), los Est\u00e1ndares M\u00ednimos de UNFPA (2019), Esfera 2018 y la revisi\u00f3n de evidencia Oxfam/WEDC sobre Alumbrado, WASH y VBG (2018).\n", "fr": "Un enregistrement au niveau du m\u00e9nage des indicateurs environnementaux, de disponibilit\u00e9 des services et d\u00e9clar\u00e9s par les soignants constituant des facteurs de risque de violence bas\u00e9e sur le genre (VBG) dans les contextes humanitaires. Ce profil couvre (1) les indicateurs de composition des groupes \u00e0 risque signalant des concentrations de vuln\u00e9rabilit\u00e9 au niveau du m\u00e9nage, (2) les indicateurs d''environnement physique pour les infrastructures EHA et du site (s\u00e9gr\u00e9gation par sexe des latrines, verrouillage, \u00e9clairage et distance), (3) les indicateurs de disponibilit\u00e9 et de connaissance des services (services d''orientation VBG, espaces s\u00fbrs pour femmes et filles, mobilisation communautaire), et (4) la s\u00e9curit\u00e9 per\u00e7ue d\u00e9clar\u00e9e par le m\u00e9nage sur le site et aux points de distribution. Tous les items sont pos\u00e9s au niveau du m\u00e9nage par des enqu\u00eateurs g\u00e9n\u00e9ralistes sans formation sp\u00e9cialis\u00e9e VBG. Ce profil ne capture EXPLICITEMENT PAS les rapports d''incidents VBG ni les exp\u00e9riences individuelles de violence ; ceux-ci n\u00e9cessitent un instrument sp\u00e9cialis\u00e9 avec des conditions d''entretien priv\u00e9es avec une r\u00e9pondante de sexe f\u00e9minin, une formation sp\u00e9cialis\u00e9e et des fili\u00e8res d''orientation vers des services de s\u00e9curit\u00e9 (voir le futur IndividualGBVExperienceProfile). Fond\u00e9 sur les Directives VBG IASC (2015), le Guide d''analyse des risques VBG AoR (2021), l''outil d''audit de s\u00e9curit\u00e9 IRC (2013), les Normes minimales UNFPA (2019), Sph\u00e8re 2018 et la synth\u00e8se de preuves Oxfam/WEDC sur l''\u00e9clairage, l''EHA et la VBG (2018).\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (GBV risk screening)", "match": "close", "note": "A household GBV risk screening serializes as a QuestionnaireResponse. The at-risk group flags map most naturally as FHIR Flags or RiskAssessment resources on the Household/Group subject. There is no GBV-specific FHIR profile in core R4; the GBV AoR does not publish a FHIR implementation guide as of 2026.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "GBVRiskProfile", "label": {"en": "GBV Risk Profile", "es": "Perfil de riesgo VBG", "fr": "Profil de risque VBG"}, "maturity": "draft", "properties": ["specific_need_single_female_head", "specific_need_unaccompanied_minor", "specific_need_adolescent_girl_at_risk", "specific_need_disability", "latrine_sex_segregated", "latrine_has_lock", "latrine_lighting_path", "latrine_distance_from_shelter_adequate", "water_collection_safety_perceived", "firewood_collection_safety_perceived", "gbv_referral_services_known", "gbv_referral_service_type_known", "wgss_presence_known", "wgss_distance_minutes", "gbv_community_mobilizer_present", "site_feels_safe_daytime", "site_feels_safe_nighttime", "distribution_point_feels_safe"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "specific_needs", "properties": ["specific_need_single_female_head", "specific_need_unaccompanied_minor", "specific_need_adolescent_girl_at_risk", "specific_need_disability"]}, {"category": "gbv_risk_factors", "properties": ["latrine_sex_segregated", "latrine_has_lock", "latrine_lighting_path", "latrine_distance_from_shelter_adequate", "water_collection_safety_perceived", "firewood_collection_safety_perceived", "lockable_door", "privacy_women_girls", "separate_sleeping_spaces_sex", "mhm_privacy_available", "sanitation_facility_private", "distance_safe_water_minutes"]}, {"category": "gbv_services", "properties": ["gbv_referral_services_known", "gbv_referral_service_type_known", "wgss_presence_known", "wgss_distance_minutes", "gbv_community_mobilizer_present"]}, {"category": "gbv_safety_perception", "properties": ["site_feels_safe_daytime", "site_feels_safe_nighttime", "distribution_point_feels_safe"]}], "subtypes": [], "supertypes": ["Profile"]}'
