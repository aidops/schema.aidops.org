    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-household-possessions", "fao-phl-guidelines", "ilri-tlu-guidelines"], "convergence": {"notes": "Only FHIR and DHIS2 represent an item-level agriculture-assessment administration. OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry do not carry agriculture items in core; national deployments that collect them (Ethiopia ESS, Nigeria GHS-Panel, Tanzania NPS, Kenya KIHBS) store them in separate LSMS-ISA or agricultural-census modules whose shape matches this concept. The informing standards bodies are the FAO Statistics Division (WCA), the World Bank LSMS programme, ILRI, and the FAO Post-Harvest Losses community rather than the v1 MIS core set; this convergence number understates the prevalence of the data because the v1 set does not include agricultural-survey platforms.\n", "system_count": 2, "total_systems": 6}, "definition": {"en": "A point-in-time record of a household''s agricultural and livestock situation covering land access and tenure, crop production, livestock holdings, input use, extension and training access, shock exposure, and post-harvest storage and loss. Scope is the smallholder household engaged in crop farming, livestock keeping, or both, and items are drawn from the FAO World Census of Agriculture (WCA) 2020 core item list, the LSMS-ISA agriculture modules (land, crops, livestock, shocks, post-harvest), the ILRI TLU coefficients for livestock aggregation, and the FAO Post-Harvest Losses guidelines. Captures the raw responses alongside the administration context (respondent, mode, recall period where applicable) and carries two derived indicators: `tlu_total` (standardised livestock-holding aggregate) and `crop_loss_occurred` (binary shock-exposure indicator). Programme targeting and farm-level asset detail (parcel geometry, individual animal records, input quantities) are handled by the PS `Farm` concept and are out of scope here.\n", "es": "Un registro puntual de la situaci\u00f3n agr\u00edcola y ganadera del hogar cubriendo acceso a la tierra y tenencia, producci\u00f3n de cultivos, tenencia de ganado, uso de insumos, acceso a extensi\u00f3n y capacitaci\u00f3n, exposici\u00f3n a choques, y almacenamiento y p\u00e9rdida poscosecha. El alcance es el hogar de peque\u00f1os agricultores involucrado en cultivos, ganader\u00eda o ambos, y los \u00edtems se toman de la lista de \u00edtems centrales del Censo Mundial de Agricultura (WCA) 2020 de la FAO, los m\u00f3dulos de agricultura de LSMS-ISA (tierra, cultivos, ganado, choques, poscosecha), los coeficientes UGT de ILRI para agregaci\u00f3n de ganado, y las directrices FAO de P\u00e9rdidas Poscosecha. Consigna las respuestas brutas junto con el contexto de administraci\u00f3n (respondiente, modo, per\u00edodo de recordatorio cuando aplique) y lleva dos indicadores derivados: `tlu_total` (agregado estandarizado de tenencia de ganado) y `crop_loss_occurred` (indicador binario de exposici\u00f3n a choques). La focalizaci\u00f3n program\u00e1tica y los detalles a nivel de finca (geometr\u00eda de parcelas, registros individuales de animales, cantidades de insumos) son manejados por el concepto `Farm` de PS y est\u00e1n fuera del alcance aqu\u00ed.\n", "fr": "Un enregistrement ponctuel de la situation agricole et d''\u00e9levage d''un m\u00e9nage couvrant l''acc\u00e8s \u00e0 la terre et le r\u00e9gime foncier, la production v\u00e9g\u00e9tale, le cheptel, l''utilisation d''intrants, l''acc\u00e8s \u00e0 la vulgarisation et \u00e0 la formation, l''exposition aux chocs, ainsi que le stockage post-r\u00e9colte et les pertes. Le p\u00e9rim\u00e8tre est le petit m\u00e9nage exploitant engag\u00e9 dans l''agriculture, l''\u00e9levage ou les deux, et les items sont tir\u00e9s de la liste d''items de base du Recensement mondial de l''agriculture (WCA) 2020 de la FAO, des modules agriculture du LSMS-ISA (terre, cultures, b\u00e9tail, chocs, post-r\u00e9colte), des coefficients UBT de l''ILRI pour l''agr\u00e9gation du b\u00e9tail, et des directives FAO Pertes Post-R\u00e9colte. Consigne les r\u00e9ponses brutes ainsi que le contexte d''administration (r\u00e9pondant, mode, p\u00e9riode de rappel le cas \u00e9ch\u00e9ant) et porte deux indicateurs d\u00e9riv\u00e9s : `tlu_total` (agr\u00e9gat normalis\u00e9 du cheptel) et `crop_loss_occurred` (indicateur binaire d''exposition aux chocs). Le ciblage programmatique et les d\u00e9tails au niveau de la ferme (g\u00e9om\u00e9trie des parcelles, fiches animales individuelles, quantit\u00e9s d''intrants) sont pris en charge par le concept `Farm` de PS et sont hors p\u00e9rim\u00e8tre ici.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 aggregate agriculture data elements", "match": "broad", "note": "DHIS2 instances in agriculture/nutrition programmes carry selected items (for example livestock counts, improved seed use, extension visits) as data elements in tracked entity or event programs, but the FAO WCA 2020 item list is not represented as a global DHIS2 data set and most item-level shocks and post-harvest indicators are rarely modelled.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 data sets"}, "fhir": {"label": "QuestionnaireResponse (agriculture/livelihood module)", "match": "close", "note": "An agriculture assessment administration serializes as a QuestionnaireResponse whose Questionnaire is the corresponding LSMS-ISA or FAO WCA instrument definition. FHIR has no dedicated agriculture resource; the profile''s structured household-level items map naturally to a questionnaire response, while derived aggregates such as `tlu_total` are better represented by Observation or RiskAssessment produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "featured": true, "id": "AgricultureProfile", "label": {"en": "Agriculture Profile", "es": "Perfil agr\u00edcola", "fr": "Profil agricole"}, "maturity": "draft", "properties": ["hh_has_cultivable_land", "land_area_cultivated_ha", "land_tenure_arrangement", "land_tenure_security_perceived", "hh_grew_crops_last_season", "main_crops_grown", "crop_use_purpose", "seed_source_main", "hh_owns_livestock", "livestock_counts", "livestock_stress_sale_past_season", "livestock_vet_access", "fertilizer_used_last_season", "improved_seeds_used_last_season", "irrigation_access", "extension_visit_past_12mo", "extension_provider_type", "training_received_past_12mo", "crop_loss_shock_past_season", "crop_loss_cause", "crop_loss_magnitude", "post_harvest_storage_access", "post_harvest_storage_type", "post_harvest_loss_magnitude", "tlu_total", "crop_loss_occurred"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "context", "properties": ["hh_has_cultivable_land", "land_area_cultivated_ha", "land_tenure_arrangement", "land_tenure_security_perceived", "hh_grew_crops_last_season", "main_crops_grown", "crop_use_purpose", "seed_source_main", "hh_owns_livestock", "livestock_counts", "livestock_stress_sale_past_season", "livestock_vet_access", "fertilizer_used_last_season", "improved_seeds_used_last_season", "irrigation_access", "extension_visit_past_12mo", "extension_provider_type", "training_received_past_12mo", "crop_loss_shock_past_season", "crop_loss_cause", "crop_loss_magnitude", "post_harvest_storage_access", "post_harvest_storage_type", "post_harvest_loss_magnitude"]}, {"category": "scores", "properties": ["tlu_total", "crop_loss_occurred"]}], "subtypes": [], "supertypes": ["Profile"]}'
