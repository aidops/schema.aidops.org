  DwellingDamageProfile:
    title:
      en: Dwelling Damage Profile
      fr: Profil de dommages au logement
      es: Perfil de daños a la vivienda
    description:
      en: A point-in-time record of post-shock housing and shelter conditions for a household, typically anchored to a triggering hazard event. Captures the observed damage level, current habitability, shelter arrangement, functional status of essential services, non-food items missing, and stated reconstruction intent alongside the administration context (instrument, respondent, assessment location). Baseline housing and WASH properties are reused from SocioEconomicProfile to describe the dwelling's usual characteristics.
      fr: Un enregistrement ponctuel des conditions post-choc de logement et d'abri d'un ménage, typiquement ancré à un événement de danger déclencheur. Consigne le niveau de dommages observé, l'habitabilité actuelle, l'arrangement d'abri, l'état fonctionnel des services essentiels, les articles non alimentaires manquants et l'intention de reconstruction déclarée, ainsi que le contexte d'administration (instrument, répondant, lieu d'évaluation). Les propriétés de logement et WASH de référence sont réutilisées depuis SocioEconomicProfile pour décrire les caractéristiques habituelles du logement.
      es: Un registro puntual de las condiciones post-choque de vivienda y refugio de un hogar, típicamente anclado a un evento de peligro desencadenante. Consigna el nivel de daños observado, la habitabilidad actual, el arreglo de refugio, el estado funcional de los servicios esenciales, los artículos no alimentarios faltantes y la intención de reconstrucción declarada, junto con el contexto de administración (instrumento, respondiente, lugar de evaluación). Las propiedades de vivienda y WASH de base se reutilizan desde SocioEconomicProfile para describir las características habituales de la vivienda.
    is_a: Profile
    class_uri: aidops:DwellingDamageProfile
    slots:
    - dwelling_type
    - floor_material
    - wall_material
    - roof_material
    - water_source
    - sanitation_facility
    - electricity_access
    - damage_level
    - habitability_status
    - current_shelter_type
    - structural_safety_assessment
    - essential_items_missing
    - reconstruction_intent
    - services_disrupted
    - triggering_hazard_event
    - location_of_assessment
