    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["kroenke-phq9-2001", "spitzer-gad7-2006", "who5-user-guide"], "convergence": {"notes": "Of the six v1 social-protection reference systems, only FHIR represents item-level mental-health screening at the record level (as QuestionnaireResponse plus derived Observations). DHIS2 national deployments commonly carry aggregate PHQ-9 / GAD-7 prevalence indicators but rarely model item-level screening data in core. OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry do not carry mental-health screening data in core. The informing domain tools live outside the v1 set: WHO mhGAP, IASC MHPSS guidelines, Psychiatric Research Unit Region H (WHO-5 distribution), and the PHQscreeners site (PHQ-9 and GAD-7 distribution).\n", "system_count": 1, "total_systems": 6}, "definition": {"en": "A point-in-time record of an adult respondent''s mental-health screening data, collected by self-report (or enumerator-read self-report) under explicit informed consent. Carries item-level responses for up to three widely used screening instruments: the WHO-5 Well-Being Index (5 items, 0-100 index), the PHQ-9 Patient Health Questionnaire (9 items, depression severity band), and the GAD-7 Generalized Anxiety Disorder scale (7 items, anxiety severity band). Derived totals and severity bands are carried alongside the raw items. PHQ-9 item 9 (suicidal ideation) and any score that incorporates it (phq9_sum, phq9_severity_band) carry sensitivity: restricted and must trigger a referral-pathway response on a non-zero positive screen. Trauma screening (PCL-5, HTQ) is intentionally out of scope and belongs to a future TraumaScreenProfile; functional-impairment follow-up items are similarly deferred. This profile is validated for adults (18+); youth-adapted variants of these instruments exist and would require a separate AdolescentMentalHealthProfile.\n", "es": "Un registro puntual de los datos de tamizaje de salud mental de una persona adulta, recopilado por autoinforme (o autoinforme le\u00eddo por la persona encuestadora) bajo consentimiento informado expl\u00edcito. Lleva las respuestas a nivel de \u00edtem para hasta tres instrumentos de tamizaje ampliamente utilizados: el \u00cdndice de Bienestar WHO-5 (5 \u00edtems, \u00edndice 0-100), el Patient Health Questionnaire PHQ-9 (9 \u00edtems, nivel de severidad de la depresi\u00f3n) y la escala de Trastorno de Ansiedad Generalizada GAD-7 (7 \u00edtems, nivel de severidad de la ansiedad). Los totales derivados y los niveles de severidad se llevan junto a los \u00edtems brutos. El \u00edtem 9 del PHQ-9 (ideaci\u00f3n suicida) y cualquier puntaje que lo incorpore (phq9_sum, phq9_severity_band) llevan sensitivity: restricted y deben activar una respuesta por la v\u00eda de referencia ante un tamizaje positivo distinto de cero. El tamizaje de trauma (PCL-5, HTQ) queda intencionalmente fuera del alcance y corresponde a un futuro TraumaScreenProfile; los \u00edtems de seguimiento de deterioro funcional tambi\u00e9n se aplazan. Este perfil est\u00e1 validado para adultos (18+); existen variantes adaptadas para j\u00f3venes de estos instrumentos y requerir\u00edan un AdolescentMentalHealthProfile separado.\n", "fr": "Un enregistrement ponctuel des donn\u00e9es de d\u00e9pistage en sant\u00e9 mentale d''un\u00b7e r\u00e9pondant\u00b7e adulte, collect\u00e9 par auto-d\u00e9claration (ou auto-d\u00e9claration lue par l''enqu\u00eateur\u00b7rice) sous consentement \u00e9clair\u00e9 explicite. Porte les r\u00e9ponses au niveau de l''item pour jusqu''\u00e0 trois instruments de d\u00e9pistage largement utilis\u00e9s : l''Indice de bien-\u00eatre WHO-5 (5 items, indice 0-100), le Patient Health Questionnaire PHQ-9 (9 items, niveau de s\u00e9v\u00e9rit\u00e9 de la d\u00e9pression) et l''\u00e9chelle de trouble d''anxi\u00e9t\u00e9 g\u00e9n\u00e9ralis\u00e9e GAD-7 (7 items, niveau de s\u00e9v\u00e9rit\u00e9 de l''anxi\u00e9t\u00e9). Les totaux d\u00e9riv\u00e9s et les niveaux de s\u00e9v\u00e9rit\u00e9 sont port\u00e9s aux c\u00f4t\u00e9s des items bruts. L''item 9 du PHQ-9 (id\u00e9ation suicidaire) et tout score qui l''int\u00e8gre (phq9_sum, phq9_severity_band) portent la sensibilit\u00e9 restricted et doivent d\u00e9clencher une r\u00e9ponse par la fili\u00e8re de r\u00e9f\u00e9rence en cas de d\u00e9pistage positif non nul. Le d\u00e9pistage des traumatismes (PCL-5, HTQ) est volontairement hors du p\u00e9rim\u00e8tre et rel\u00e8ve d''un futur TraumaScreenProfile ; les items de suivi de l''alt\u00e9ration fonctionnelle sont \u00e9galement report\u00e9s. Ce profil est valid\u00e9 pour les adultes (18 ans et plus) ; des variantes adapt\u00e9es aux jeunes de ces instruments existent et n\u00e9cessiteraient un AdolescentMentalHealthProfile distinct.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (mental-health screening)", "match": "close", "note": "Each WHO-5, PHQ-9, or GAD-7 administration serializes naturally as a QuestionnaireResponse whose Questionnaire is the corresponding screening instrument. The derived total scores and severity bands are better represented as FHIR Observations produced by a scoring step. A positive PHQ-9 item 9 screen should additionally raise a FHIR Flag or trigger a RiskAssessment, aligning with the restricted-sensitivity treatment of that item in this profile.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "MentalHealthProfile", "label": {"en": "Mental Health Profile", "es": "Perfil de salud mental", "fr": "Profil de sant\u00e9 mentale"}, "maturity": "draft", "properties": ["whom5_1", "whom5_2", "whom5_3", "whom5_4", "whom5_5", "phq9_1", "phq9_2", "phq9_3", "phq9_4", "phq9_5", "phq9_6", "phq9_7", "phq9_8", "phq9_9", "gad7_1", "gad7_2", "gad7_3", "gad7_4", "gad7_5", "gad7_6", "gad7_7", "whom5_index", "whom5_at_risk", "phq9_sum", "phq9_severity_band", "gad7_sum", "gad7_severity_band"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "whom5_items", "properties": ["whom5_1", "whom5_2", "whom5_3", "whom5_4", "whom5_5"]}, {"category": "phq9_items", "properties": ["phq9_1", "phq9_2", "phq9_3", "phq9_4", "phq9_5", "phq9_6", "phq9_7", "phq9_8", "phq9_9"]}, {"category": "gad7_items", "properties": ["gad7_1", "gad7_2", "gad7_3", "gad7_4", "gad7_5", "gad7_6", "gad7_7"]}, {"category": "scores", "properties": ["whom5_index", "whom5_at_risk", "phq9_sum", "phq9_severity_band", "gad7_sum", "gad7_severity_band"]}], "subtypes": [], "supertypes": ["Profile"]}'
      bibliography_refs: kroenke-phq9-2001,spitzer-gad7-2006,who5-user-guide
  NFIProfile:
    title:
      en: Non-Food Item (NFI) Profile
      fr: Profil des articles non alimentaires (ANA)
      es: Perfil de artículos no alimentarios (ANF)
    description:
      en: A household-level record of whether the household has the minimum non-food items (NFIs) required to meet Sphere 2018 minimum standards for clothing and bedding (Standard 1), cooking and eating utensils (Standard 2), stoves, fuel and lighting equipment (Standard 3), and tools and equipment (Standard 4). Captures count and condition questions for each item category, self-report sufficiency at the standard and overall levels, priority unmet needs, and receipt of NFIs from aid organisations in the past 3 months. Derives four binary Sphere-pass indicators (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) and feeds the Global Shelter Cluster composite NFI outcome indicator. Complementary to EnergyAccessProfile (which covers fuel type, stove technology category, and MTF tier) and ShelterAdequacyProfile (which carries the single-summary has_sleeping_items and has_cooking_items screen items reused on this profile for continuity). Assumes per-household household_size is available from household_registration to compute per-capita thresholds.
      fr: Un enregistrement au niveau du ménage indiquant si le ménage dispose des articles non alimentaires (ANA) minimaux nécessaires pour répondre aux normes minimales Sphère 2018 pour les vêtements et la literie (Norme 1), les ustensiles de cuisine et de repas (Norme 2), les foyers, le combustible et l'équipement d'éclairage (Norme 3), et les outils et équipements (Norme 4). Consigne des questions de dénombrement et d'état pour chaque catégorie d'articles, des auto-déclarations de suffisance au niveau de chaque norme et au niveau global, les besoins prioritaires non satisfaits et la réception d'ANA d'organisations d'aide au cours des 3 derniers mois. Dérive quatre indicateurs binaires de conformité Sphère (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) et alimente l'indicateur de résultat composite ANA du Cluster Abri Mondial. Complémentaire à EnergyAccessProfile (qui couvre le type de combustible, la catégorie technologique du foyer et le niveau MTF) et à ShelterAdequacyProfile (qui porte les items de résumé has_sleeping_items et has_cooking_items réutilisés sur ce profil pour la continuité). Suppose que la taille du ménage est disponible depuis household_registration pour calculer les seuils par habitant.
      es: Un registro a nivel del hogar que indica si el hogar tiene los artículos no alimentarios (ANF) mínimos requeridos para cumplir con los estándares mínimos Esfera 2018 para ropa y cama (Norma 1), utensilios de cocina y de comer (Norma 2), cocinas, combustible y equipo de iluminación (Norma 3), y herramientas y equipo (Norma 4). Registra preguntas de conteo y condición para cada categoría de artículos, auto-reportes de suficiencia a nivel de cada norma y a nivel general, necesidades prioritarias no satisfechas y recepción de ANF de organizaciones de ayuda en los últimos 3 meses. Deriva cuatro indicadores binarios de cumplimiento Esfera (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) y alimenta el indicador compuesto de resultado ANF del Clúster Global de Refugio. Complementario a EnergyAccessProfile (que cubre el tipo de combustible, la categoría tecnológica de la cocina y el nivel MTF) y a ShelterAdequacyProfile (que lleva los ítems resumen has_sleeping_items y has_cooking_items reutilizados en este perfil para continuidad). Supone que el tamaño del hogar está disponible desde household_registration para calcular los umbrales per cápita.
    is_a: Profile
    class_uri: aidops:NFIProfile
