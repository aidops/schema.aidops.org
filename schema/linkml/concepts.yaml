 s\u00e9paration familiale et des besoins de protection sp\u00e9cifiques li\u00e9s au d\u00e9placement. Con\u00e7u pour les op\u00e9rations d''enregistrement de style DTM de l''OIM et de suivi de la mobilit\u00e9, l''enregistrement du HCR, et les \u00e9valuations interagences des solutions durables conform\u00e9ment au Cadre de l''IASC. Le profil capture l''\u00e9tat actuel de la situation de d\u00e9placement d''un m\u00e9nage ; une sous-structure future DisplacementEvent (Phase 2) mod\u00e9lisera les historiques multi-\u00e9v\u00e9nements pour les m\u00e9nages avec des trajectoires de d\u00e9placement complexes.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (displacement registration)", "match": "close", "note": "A household-level displacement registration or DTM Mobility Tracking interview serializes naturally as a QuestionnaireResponse. FHIR Patient and RelatedPerson resources carry identity fields; displacement-specific coded values require extensions or custom Observation resources.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "DisplacementProfile", "label": {"en": "Displacement Profile", "es": "Perfil de desplazamiento", "fr": "Profil de d\u00e9placement"}, "maturity": "draft", "properties": ["displacement_origin_country", "displacement_origin_admin1", "current_location_type", "first_displacement_date", "most_recent_displacement_date", "displacement_event_count", "displacement_reasons", "displacement_reason_detail", "displacement_primary_reason", "return_intention", "return_intention_timeline", "return_barriers", "preferred_destination_country", "refugee_status_determination", "primary_identity_document_status", "hh_has_birth_certificates", "hh_has_marriage_certificates", "family_members_separated", "separated_members_count", "has_uasc", "specific_need_unaccompanied_minor", "specific_need_elderly_at_risk", "specific_need_disability", "specific_need_single_female_head", "specific_need_pregnant_l