    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-spa-revised-2022", "who-emergency-care-toolkit", "who-eml-24th-2025", "who-hhfa-2022", "who-unicef-wash-fit-2022"], "convergence": {"notes": "Of the six v1 convergence systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry), only FHIR natively represents an instrument administration as a first-class record (via QuestionnaireResponse) that fits HealthFacilityProfile cleanly. DHIS2 carries facility registry data as organisation-unit attributes and service-readiness assessments as periodic data sets, which is a close-but-not-identical shape. openIMIS and DCI Social Registry carry facility or service-point identifiers for benefit-payment workflows but do not model facility-level structural readiness. OpenCRVS and OpenSPP are not health registries. The informing standards bodies for this profile therefore live outside the v1 set: WHO (SARA, HHFA, HeRAMS, WASH FIT, ECAT/HEAT, EML), UNICEF (WASH FIT co-publisher), IAWG (MISP), Sphere Association (2018 Handbook Chapter 3), and the DHS Program (SPA). Convergence evidence is strong within this humanitarian/ global-health canon but weak in the MIS convergence set, which is why the headline count is 1.\n", "system_count": 1, "total_systems": 6}, "definition": {"en": "A point-in-time record of the structural readiness of a single health facility (hospital, health centre, health post, or equivalent) to deliver essential health services in a crisis or development context. The subject is a HealthFacility (PS ServicePoint subtype), not a Person or Household. This is the supply-side counterpart to HealthAccessProfile: the same domain, viewed from the service-provider side. Covers eight property groups: facility metadata (type, level, managing authority, catchment, functionality), infrastructure (water, electricity, cold chain, communication, accessibility, hygiene), staffing (core cadre presence, vacancy, training), essential services offered (OPD/IPD, ANC/delivery/EmONC, immunization, IMCI, family planning, emergency care, mental health, GBV clinical management, STI/HIV, NCD), commodity availability today (SARA tracer pattern with observed-on-shelf verification: ORS/zinc, amoxicillin, ACT/RDT, oxytocin and magnesium sulfate, skilled-birth kit, MISP contraceptive count, emergency contraception, PEP, NCD tracers, and a 14-day stock-out summary flag), infection prevention and control (PPE, sterilization, sharps and waste disposal, written IPC protocol), referral and continuity (functioning referral, transport, distance, 24/7 availability), and cost and equity (user fees and exemptions for pregnant women, children under 5, and emergencies). Primary respondent is the facility in-charge or senior clinician plus the pharmacy/stores officer; commodity and infrastructure items are enumerator-observed where feasible per SARA/HHFA methodology. Draws on WHO SARA v2.2, WHO HHFA 2022 (SARA''s successor), WHO/UNICEF WASH FIT 2nd edition 2022, Sphere Handbook 2018 Chapter 3, IAWG MISP 2018, WHO HeRAMS (crisis- context functionality monitoring), WHO Emergency Care Toolkit (ECAT/HEAT \u2014 top-level presence indicators only), DHS SPA revised 2022, and the WHO Model List of Essential Medicines 24th edition. Does not cover patient-level data, direct observation of clinical encounters, disease-surveillance case counts, household-side access (see HealthAccessProfile), individual staff identity, or detailed structural damage assessment.\n", "es": "Un registro puntual de la capacidad estructural de un establecimiento de salud (hospital, centro de salud, puesto de salud o equivalente) para prestar servicios de salud esenciales en un contexto de crisis o de desarrollo. El sujeto es un HealthFacility (subtipo de ServicePoint de PS), no una Persona o un Hogar. Es la contraparte del lado de la oferta de HealthAccessProfile: el mismo dominio, visto desde el lado del prestador. Cubre ocho grupos de propiedades: metadatos del establecimiento (tipo, nivel, autoridad gestora, poblaci\u00f3n atendida, funcionalidad), infraestructura (agua, electricidad, cadena de fr\u00edo, comunicaci\u00f3n, accesibilidad, higiene), dotaci\u00f3n de personal (presencia de cuadros esenciales, vacancia, capacitaci\u00f3n), servicios esenciales ofrecidos (consultas externas/hospitalizaci\u00f3n, CPN/parto/COE, inmunizaci\u00f3n, AIEPI, planificaci\u00f3n familiar, emergencias, salud mental, manejo cl\u00ednico de violencia sexual, ITS/VIH, ENT), disponibilidad de insumos hoy (patr\u00f3n trazador SARA con verificaci\u00f3n por observaci\u00f3n en estanter\u00eda: SRO/zinc, amoxicilina, TCA/PDR, oxitocina y sulfato de magnesio, kit de parto, recuento de m\u00e9todos anticonceptivos MISP, anticoncepci\u00f3n de emergencia, PEP, trazadores ENT y se\u00f1al de desabastecimiento a 14 d\u00edas), prevenci\u00f3n y control de infecciones (EPI, esterilizaci\u00f3n, cortopunzantes y eliminaci\u00f3n de residuos, protocolo PCI escrito), referencia y continuidad (sistema de referencia funcional, transporte, distancia, apertura 24/7), y costo y equidad (tarifas al usuario y exenciones para mujeres embarazadas, ni\u00f1os menores de 5 a\u00f1os, emergencias). El respondiente principal es el responsable del establecimiento o cl\u00ednico senior m\u00e1s el responsable de farmacia/almac\u00e9n; los \u00edtems de insumos e infraestructura son observados por el enumerador cuando sea posible seg\u00fan la metodolog\u00eda SARA/HHFA. Se apoya en SARA v2.2 de la OMS, HHFA 2022 de la OMS (sucesor de SARA), WASH FIT 2\u00aa edici\u00f3n 2022 de OMS/UNICEF, el Manual de Esfera 2018 cap\u00edtulo 3, IAWG MISP 2018, HeRAMS de la OMS (monitoreo de funcionalidad en contextos de crisis), el kit de herramientas de Atenci\u00f3n de Emergencia de la OMS (ECAT/HEAT \u2014 solo indicadores de presencia de alto nivel), DHS SPA revisado 2022, y la Lista Modelo OMS de Medicamentos Esenciales 24\u00aa edici\u00f3n. No cubre datos a nivel de paciente, observaci\u00f3n directa de consultas cl\u00ednicas, conteos de casos en vigilancia epidemiol\u00f3gica, acceso del lado del hogar (ver HealthAccessProfile), identidad individual del personal, ni evaluaci\u00f3n detallada de da\u00f1os estructurales.\n", "fr": "Un enregistrement ponctuel de la capacit\u00e9 structurelle d''un \u00e9tablissement de sant\u00e9 (h\u00f4pital, centre de sant\u00e9, poste de sant\u00e9 ou \u00e9quivalent) \u00e0 fournir les services de sant\u00e9 essentiels dans un contexte de crise ou de d\u00e9veloppement. Le sujet est une HealthFacility (sous-type ServicePoint de PS), pas une Personne ou un M\u00e9nage. C''est le pendant c\u00f4t\u00e9 offre du HealthAccessProfile : le m\u00eame domaine, vu du c\u00f4t\u00e9 du prestataire. Couvre huit groupes de propri\u00e9t\u00e9s : m\u00e9tadonn\u00e9es de l''\u00e9tablissement (type, niveau, autorit\u00e9 gestionnaire, population desservie, fonctionnalit\u00e9), infrastructure (eau, \u00e9lectricit\u00e9, cha\u00eene du froid, communication, accessibilit\u00e9, hygi\u00e8ne), dotation en personnel (pr\u00e9sence des cadres essentiels, vacance, formation), services essentiels offerts (consultations externes/hospitalisation, CPN/accouchement/ SONU, vaccination, PCIME, planification familiale, urgences, sant\u00e9 mentale, prise en charge clinique des VBG, IST/VIH, MNT), disponibilit\u00e9 des produits aujourd''hui (sch\u00e9ma traceur SARA avec v\u00e9rification par observation en rayon : SRO/zinc, amoxicilline, CTA/TDR, ocytocine et sulfate de magn\u00e9sium, kit d''accouchement, comptage des m\u00e9thodes contraceptives MISP, contraception d''urgence, PEP, traceurs MNT et signal de rupture \u00e0 14 jours), pr\u00e9vention et contr\u00f4le des infections (EPI, st\u00e9rilisation, tranchants et \u00e9limination des d\u00e9chets, protocole PCI \u00e9crit), r\u00e9f\u00e9rence et continuit\u00e9 (syst\u00e8me de r\u00e9f\u00e9rence fonctionnel, transport, distance, ouverture 24/7), et co\u00fbt et \u00e9quit\u00e9 (frais d''utilisation et exemptions pour femmes enceintes, enfants de moins de 5 ans, urgences). Le r\u00e9pondant principal est le responsable de l''\u00e9tablissement ou le clinicien senior et le responsable pharmacie/stocks ; les items produits et infrastructure sont observ\u00e9s par l''enqu\u00eateur lorsque possible selon la m\u00e9thodologie SARA/HHFA. S''appuie sur SARA v2.2 de l''OMS, HHFA 2022 de l''OMS (successeur de SARA), WASH FIT 2e \u00e9dition 2022 de l''OMS/UNICEF, le Manuel Sphere 2018 chapitre 3, IAWG MISP 2018, HeRAMS de l''OMS (suivi de fonctionnalit\u00e9 en contexte de crise), la bo\u00eete \u00e0 outils Soins d''urgence de l''OMS (ECAT/HEAT \u2014 indicateurs de pr\u00e9sence de haut niveau uniquement), DHS SPA r\u00e9vis\u00e9 2022, et la Liste mod\u00e8le OMS des m\u00e9dicaments essentiels 24e \u00e9dition. Ne couvre pas les donn\u00e9es au niveau des patients, l''observation directe de consultations cliniques, les comptages de cas en surveillance \u00e9pid\u00e9miologique, l''acc\u00e8s c\u00f4t\u00e9 m\u00e9nage (voir HealthAccessProfile), l''identit\u00e9 individuelle du personnel, ni l''\u00e9valuation d\u00e9taill\u00e9e des d\u00e9g\u00e2ts structurels.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 facility registry and service-readiness data elements", "match": "related", "note": "DHIS2 national HIS carry health facilities as organisation units with attached attributes and can record periodic service-readiness checks as data sets (for example HHFA-aligned indicator sets published by WHO). The organisation-unit model does not natively distinguish a structural-readiness snapshot from a routine monthly report, so a HealthFacilityProfile corresponds to a specific assessment data set rather than to the organisation unit itself.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 global health data sets"}, "fhir": {"label": "QuestionnaireResponse (health facility assessment)",
        "match": "close", "note": "A single administration of a facility-readiness instrument (SARA, HHFA Service Readiness, WASH FIT assessment, HeRAMS form, MISP checklist) serializes naturally as a QuestionnaireResponse whose Questionnaire points to the corresponding WHO instrument definition. Facility-level attributes that are not one-shot questionnaire items (facility type, operating authority) are better represented as FHIR Location or HealthcareService resources linked from the response, rather than stored inside the QuestionnaireResponse.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "HealthFacilityProfile", "label": {"en": "Health Facility Profile", "es": "Perfil de establecimiento de salud", "fr": "Profil d''\u00e9tablissement de sant\u00e9"}, "maturity": "draft", "properties": ["hf_facility_type", "hf_facility_level", "hf_managing_authority", "hf_catchment_population", "hf_functionality_status", "hf_functionality_reason", "hf_water_source_on_site", "hf_water_source_type", "hf_water_available_today", "hf_electricity_source", "hf_electricity_reliable", "hf_cold_chain_functional", "hf_communication_functional", "hf_accessible_for_disability", "hf_handwashing_at_consultation", "hf_waste_segregation", "hf_staff_md_present", "hf_staff_midwife_present", "hf_staff_nurse_present", "hf_staff_chw_linked", "hf_staff_total_fte", "hf_staff_vacancy_rate", "hf_staff_trained_recent", "hf_service_opd", "hf_service_ipd", "hf_service_anc", "hf_service_delivery", "hf_service_delivery_24_7", "hf_service_bemonc", "hf_service_cemonc", "hf_service_child_immunization", "hf_service_child_curative", "hf_service_family_planning", "hf_service_emergency_care", "hf_service_emergency_24_7", "hf_service_mental_health", "hf_service_gbv_clinical_rape", "hf_service_sti_syndromic", "hf_service_hiv_continuity", "hf_service_ncd", "hf_commodity_ors_available", "hf_commodity_zinc_available", "hf_commodity_amoxicillin_dt_available", "hf_commodity_amoxicilli