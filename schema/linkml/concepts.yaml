        "cl_econ_produce_sell", "cl_econ_other_income", "cl_economic_activity_hours", "cl_hazardous_heavy_loads", "cl_hazardous_dangerous_tools", "cl_hazard_dust_fumes", "cl_hazard_temperature", "cl_hazard_noise_vibration", "cl_hazard_heights", "cl_hazard_chemicals", "cl_hazard_other", "cl_fetch_water_hours", "cl_collect_firewood_hours", "cl_chores_hours"]}, {"category": "child_discipline", "properties": ["fcd_took_away_privileges", "fcd_explained", "fcd_shook", "fcd_shouted", "fcd_redirected", "fcd_spanked", "fcd_hit_body", "fcd_name_called", "fcd_hit_head", "fcd_hit_limb", "fcd_beat_hard_repeatedly", "fcd_belief_physical_punishment_needed"]}, {"category": "child_marriage", "properties": ["cm_children_under_18_married", "cm_child_marriage_union_type"]}, {"category": "fgm", "properties": ["fgm_heard_of_practice", "fgm_woman_cut", "fgm_woman_age_at_cutting", "fgm_woman_type", "fgm_any_daughter_cut", "fgm_daughter_age_at_cutting", "fgm_daughter_performer", "fgm_intend_to_continue"]}, {"category": "derived_child_protection", "properties": ["cl_mics_child_labour", "fcd_violent_discipline", "any_fgm_in_household"]}], "subtypes": [], "supertypes": ["Profile"]}'
