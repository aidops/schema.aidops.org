  ProtectionProfile:
    title:
      en: Protection Profile
      fr: Profil de protection
      es: Perfil de protección
    description:
      en: 'A household-level, periodic-monitoring record of the general protection situation of a crisis-affected or displaced household. Captures the residual protection domain after carving out GBV risk (GBVRiskProfile), child protection (ChildProtectionProfile), mental health and psychosocial support (MentalHealthProfile), and displacement-specific documentation and push factors (DisplacementProfile). Covers: civil documentation at household level (national ID, civil registry access, statelessness risk); freedom of movement and physical access restrictions (checkpoints, curfews, permits, armed-actor control of routes); Housing, Land and Property (HLP) disputes, discrimination, and restitution awareness; exposure to armed-conflict-related non-GBV violence at aggregate household level; explosive ordnance (EO) awareness and impact; general protection referral pathway awareness; and household-level perception of access to justice and rule of law. All six JIAF 2.0 Protection sector indicators (P1–P6) have a corresponding core item. Produces population-level indicators for protection cluster HNO/HRP reporting, JIAF 2.0 sectoral severity analysis, and REACH/UNHCR protection monitoring rounds. This is NOT a case-management instrument and does NOT capture individual incident disclosure. Based on GPC Protection Analytical Framework (2021), IASC Protection Core Indicators (2021), JIAF 2.0 (2022), UNHCR Protection Monitoring (2016), IMAS EORE (2022), NRC HLP Handbook (2013), Pinheiro Principles (2005), OHCHR Rule-of-Law Indicators (2011), and REACH Protection Monitoring tools (2021–2023).'
      fr: 'Un enregistrement de surveillance périodique au niveau du ménage de la situation générale de protection d''un ménage affecté par une crise ou déplacé. Couvre le domaine de protection résiduel après délimitation du risque VBG (GBVRiskProfile), de la protection de l''enfance (ChildProtectionProfile), de la santé mentale et du soutien psychosocial (MentalHealthProfile), et de la documentation et des facteurs de déplacement spécifiques (DisplacementProfile). Comprend : la documentation civile au niveau du ménage (carte d''identité nationale, accès à l''état civil, risque d''apatridie) ; la liberté de mouvement et les restrictions d''accès physique (points de contrôle, couvre-feux, permis, contrôle des itinéraires par des acteurs armés) ; les litiges, discriminations et sensibilisation à la restitution en matière de logement, terres et propriétés (LTP) ; l''exposition à la violence non-VBG liée au conflit armé au niveau agrégé du ménage ; la sensibilisation aux engins explosifs (EE) et leur impact ; la sensibilisation aux voies d''orientation en matière de protection générale ; et la perception par le ménage de l''accès à la justice et de l''état de droit. Les six indicateurs sectoriels de protection du JIAF 2.0 (P1–P6) ont chacun un item de base correspondant. Produit des indicateurs au niveau de la population pour les rapports HNO/HRP du cluster protection, l''analyse de sévérité sectorielle du JIAF 2.0, et les cycles de suivi de la protection REACH/UNHCR. Il ne s''agit PAS d''un instrument de gestion de cas et ne capture PAS la divulgation d''incidents individuels. Fondé sur le Cadre analytique de protection du GPC (2021), les Indicateurs de base de la protection de l''IASC (2021), le JIAF 2.0 (2022), le Suivi de la protection UNHCR (2016), les IMAS EORE (2022), le Manuel HLP du NRC (2013), les Principes Pinheiro (2005), les Indicateurs d''état de droit HCDH (2011), et les outils de suivi de la protection REACH (2021–2023).'
      es: 'Un registro de monitoreo periódico a nivel del hogar de la situación general de protección de un hogar afectado por crisis o desplazado. Cubre el dominio de protección residual tras delimitar el riesgo VBG (GBVRiskProfile), la protección infantil (ChildProtectionProfile), la salud mental y el apoyo psicosocial (MentalHealthProfile), y la documentación y factores de desplazamiento específicos (DisplacementProfile). Incluye: documentación civil a nivel del hogar (cédula de identidad nacional, acceso al registro civil, riesgo de apatridia); libertad de movimiento y restricciones de acceso físico (controles, toques de queda, permisos, control de rutas por actores armados); disputas, discriminación y conocimiento de mecanismos de restitución en materia de vivienda, tierra y propiedad (VTP); exposición a violencia no-VBG relacionada con el conflicto armado a nivel agregado del hogar; conocimiento e impacto de los artefactos explosivos (AE); conocimiento de las vías de derivación en materia de protección general; y percepción del hogar sobre el acceso a la justicia y el estado de derecho. Los seis indicadores sectoriales de protección del JIAF 2.0 (P1–P6) tienen un ítem central correspondiente. Produce indicadores a nivel de población para informes HNO/HRP del clúster de protección, análisis de severidad sectorial del JIAF 2.0, y rondas de monitoreo de protección de REACH/ACNUR. Este instrumento NO es de gestión de casos y NO captura la divulgación de incidentes individuales. Basado en el Marco Analítico de Protección del GPC (2021), los Indicadores de Protección del IASC (2021), el JIAF 2.0 (2022), el Monitoreo de Protección del ACNUR (2016), las IMAS EORE (2022), el Manual HLP del NRC (2013), los Principios Pinheiro (2005), los Indicadores del Estado de Derecho del ACNUDH (2011), y las herramientas de monitoreo de protección de REACH (2021–2023).'
