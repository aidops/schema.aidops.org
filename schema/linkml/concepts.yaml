    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn", "who-anc-2016", "who-pnc-2022"], "convergence": {"notes": "FHIR R4 and DHIS2 RMNCAH represent the closest structural equivalents for item-level maternal and newborn health administrations. OpenCRVS captures birth attendant and place of delivery as civil registration fields but does not hold ANC content, PNC signal functions, or breastfeeding initiation. openIMIS, OpenSPP, and DCI do not model maternal care survey items in their core schemas. The high humanitarian relevance of ANC 4+, SBA, and EIBF means these derived indicators are widely reported in national HMIS and cluster dashboards, but the item-level source data (the battery captured by this profile) is typically held only in survey microdata (DHS, MICS) rather than in operational MIS systems.\n", "system_count": 2, "total_systems": 6}, "definition": {"en": "A per-woman, per-most-recent-birth record of antenatal care (ANC), delivery, and postnatal care (PNC) received for the most recent pregnancy ending in a live birth or stillbirth within a 2-year recall period (configurable via recall_period_months). Subject is a woman aged 15\u201349 who is the respondent; proxy responses are not permitted. The profile covers six domains: (1) pregnancy history screener (total live births, recent birth gate); (2) most recent pregnancy context (outcome, timing, multiplicity); (3) antenatal care (visit count, provider type, first-trimester initiation, content received, supplementation); (4) delivery (place, attendant, cesarean, postpartum stay, immediate newborn care); (5) postnatal care for mother and newborn (timing, provider, content, five signal functions); (6) breastfeeding initiation (EIBF). Derived indicators include ANC 4+/8+, first-trimester initiation, skilled birth attendance (SDG 3.1.2 proxy), facility delivery, PNC within 2 days (mother and newborn), all five newborn signal functions, and early initiation of breastfeeding (EIBF). Full pregnancy history with child deaths is deferred to a future MortalityProfile. Ongoing breastfeeding and complementary feeding belong in NutritionPracticesProfile. Vaccination at birth belongs in ChildHealthProfile.\n", "es": "Un registro por mujer y por parto m\u00e1s reciente de la atenci\u00f3n prenatal (APN), el parto y la atenci\u00f3n posnatal (PPN) recibida para el embarazo m\u00e1s reciente que termin\u00f3 en un nacimiento vivo o mortinato dentro de un per\u00edodo de recordatorio de 2 a\u00f1os (configurable mediante recall_period_months). El sujeto es una mujer de 15 a 49 a\u00f1os que es la encuestada; no se permiten respuestas por representaci\u00f3n. El perfil cubre seis dominios: (1) filtro de historial de embarazo (total de nacimientos vivos, puerta de parto reciente); (2) contexto del embarazo m\u00e1s reciente (resultado, momento, multiplicidad); (3) atenci\u00f3n prenatal (cantidad de visitas, tipo de proveedor, inicio en el primer trimestre, contenido recibido, suplementaci\u00f3n); (4) parto (lugar, asistente, ces\u00e1rea, estancia posparto, atenci\u00f3n inmediata al reci\u00e9n nacido); (5) atenci\u00f3n posnatal para la madre y el reci\u00e9n nacido (momento, proveedor, contenido, cinco funciones de se\u00f1al); (6) inicio de la lactancia materna (EIBF). Los indicadores derivados incluyen APN 4+/8+, inicio en el primer trimestre, asistencia calificada al parto (proxy ODS 3.1.2), parto en establecimiento, PPN dentro de los 2 d\u00edas (madre y reci\u00e9n nacido), las cinco funciones de se\u00f1al del reci\u00e9n nacido e inicio temprano de la lactancia materna (EIBF). El historial completo de embarazos con muertes de ni\u00f1os se difiere a un futuro MortalityProfile. La lactancia continua y la alimentaci\u00f3n complementaria pertenecen al NutritionPracticesProfile. La vacunaci\u00f3n al nacer pertenece al ChildHealthProfile.\n", "fr": "Un enregistrement par femme et par naissance la plus r\u00e9cente des soins pr\u00e9nataux (CPN), de l''accouchement et des soins postnataux (SPN) re\u00e7us pour la grossesse la plus r\u00e9cente se terminant par une naissance vivante ou une mortinaissance dans une p\u00e9riode de rappel de 2 ans (configurable via recall_period_months). Le sujet est une femme \u00e2g\u00e9e de 15 \u00e0 49 ans qui est la r\u00e9pondante ; les r\u00e9ponses par procuration ne sont pas autoris\u00e9es. Le profil couvre six domaines : (1) filtre d''historique de grossesse (total de naissances vivantes, porte de naissance r\u00e9cente) ; (2) contexte de la grossesse la plus r\u00e9cente (issue, calendrier, multiplicit\u00e9) ; (3) soins pr\u00e9nataux (nombre de visites, type de prestataire, initiation au premier trimestre, contenu re\u00e7u, suppl\u00e9mentation) ; (4) accouchement (lieu, assistant, c\u00e9sarienne, s\u00e9jour post-partum, soins imm\u00e9diats du nouveau-n\u00e9) ; (5) soins postnataux pour la m\u00e8re et le nouveau-n\u00e9 (d\u00e9lai, prestataire, contenu, cinq fonctions signal) ; (6) initiation \u00e0 l''allaitement (EIBF). Les indicateurs d\u00e9riv\u00e9s comprennent CPN 4+/8+, initiation au premier trimestre, assistance qualifi\u00e9e \u00e0 l''accouchement (proxy ODD 3.1.2), accouchement en \u00e9tablissement, SPN dans les 2 jours (m\u00e8re et nouveau-n\u00e9), cinq fonctions signal du nouveau-n\u00e9 et allaitement pr\u00e9coce (EIBF). L''historique complet des grossesses avec les d\u00e9c\u00e8s d''enfants est diff\u00e9r\u00e9 \u00e0 un futur MortalityProfile. L''allaitement en cours et l''alimentation compl\u00e9mentaire rel\u00e8vent du NutritionPracticesProfile. La vaccination \u00e0 la naissance rel\u00e8ve du ChildHealthProfile.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 Maternal Health data elements (WHO/RMNCAH package)", "match": "close", "note": "DHIS2 RMNCAH implementations carry ANC visit count, skilled birth attendance, and PNC coverage as program indicators in tracker or aggregate programs. The DHS-8 item granularity (ANC content items, five signal functions) is richer than what most DHIS2 RMNCAH implementations capture at item level.", "uri": "https://docs.dhis2.org/en/topics/metadata/rmncah/rmncah-toolkit.html", "vocabulary": "DHIS2 RMNCAH toolkit"}, "fhir": {"label": "QuestionnaireResponse (ANC / delivery / PNC battery)", "match": "close", "note": "Each MNH administration maps to a QuestionnaireResponse whose Questionnaire is the DHS-8 Chapter 9 instrument. Derived coverage indicators (ANC 4+, SBA, EIBF) map to FHIR Observation resources. The pregnancy episode maps to a FHIR EpisodeOfCare; delivery maps to a FHIR Encounter with Procedure (cesarean); newborn PNC contacts map to additional Encounters.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "MaternalNewbornHealthProfile", "label": {"en": "Maternal and Newborn Health Profile", "es": "Perfil de salud materna y neonatal", "fr": "Profil de sant\u00e9 maternelle et n\u00e9onatale"}, "maturity": "draft", "properties": ["total_live_births", "had_birth_in_recall_period", "total_stillbirths", "recall_period_months", "most_recent_birth_year", "most_recent_birth_outcome", "birth_multiplicity", "linked_child_person_id", "anc_any_visit", "anc_visits_count", "anc_first_visit_gestational_age_months", "anc_provider_type", "anc_content_blood_pressure", "anc_content_urine_sample", "anc_content_blood_sample", "anc_content_fetal_heartbeat", "anc_content_nutrition_counseling", "anc_content_breastfeeding_counseling", "anc_content_vaginal_bleeding_asked", "anc_tetanus_protection", "anc_iron_supplementation", "anc_iron_days_taken", "anc_deworming", "anc_malaria_prevention_itn", "anc_hiv_test_offered", "anc_food_cash_assistance", "anc_4_or_more_visits", "anc_8_or_more_visits", "anc_first_trimester_initiation", "anc_skilled_provider", "delivery_place", "delivery_attendant_type", "delivery_cesarean_section", "delivery_cesarean_timing", "delivery_stay_hours_or_days", "newborn_dried_after