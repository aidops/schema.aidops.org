SocioEconomicProfile para describir las caracter\u00edsticas habituales de la vivienda.\n", "fr": "Un enregistrement ponctuel des conditions post-choc de logement et d''abri d''un m\u00e9nage, typiquement ancr\u00e9 \u00e0 un \u00e9v\u00e9nement de danger d\u00e9clencheur. Consigne le niveau de dommages observ\u00e9, l''habitabilit\u00e9 actuelle, l''arrangement d''abri, l''\u00e9tat fonctionnel des services essentiels, les articles non alimentaires manquants et l''intention de reconstruction d\u00e9clar\u00e9e, ainsi que le contexte d''administration (instrument, r\u00e9pondant, lieu d''\u00e9valuation). Les propri\u00e9t\u00e9s de logement et WASH de r\u00e9f\u00e9rence sont r\u00e9utilis\u00e9es depuis SocioEconomicProfile pour d\u00e9crire les caract\u00e9ristiques habituelles du logement.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (post-disaster shelter assessment)", "match": "close", "note": "A household-level post-shock shelter assessment serializes naturally as a QuestionnaireResponse whose Questionnaire is the program''s assessment form.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "DwellingDamageProfile", "label": {"en": "Dwelling Damage Profile", "es": "Perfil de da\u00f1os a la vivienda", "fr": "Profil de dommages au logement"}, "maturity": "draft", "properties": ["dwelling_type", "floor_material", "wall_material", "roof_material", "water_source", "sanitation_facility", "electricity_access", "damage_level", "habitability_status", "current_shelter_type", "structural_safety_assessment", "essential_items_missing", "reconstruction_intent", "services_disrupted", "triggering_hazard_event", "location_of_assessment"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "shelter", "properties": ["dwelling_type", "floor_material", "wall_material", "roof_material", "damage_level", "structural_safety_assessment"]}, {"category": "habitability", "properties": ["habitability_status", "current_shelter_type"]}, {"category": "wash", "properties": ["water_source", "sanitation_facility", "electricity_access", "services_disrupted"]}, {"category": "recovery", "properties": ["essential_items_missing", "reconstruction_intent"]}, {"category": "hazard_event", "properties": ["triggering_hazard_event"]}, {"category": "location", "properties": ["location_of_assessment"]}], "subtypes": [], "supertypes": ["Profile"]}'
