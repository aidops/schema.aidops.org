    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "gsc-indicators-v2", "iom-dtm-shelter-companion", "sphere-2018"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level shelter adequacy assessment. The domain tools live in humanitarian operations: IOM Displacement Tracking Matrix (DTM), Global Shelter Cluster rapid needs assessments, REACH multi-sector household surveys, and UNHCR NARE assessments. The low v1 convergence reflects scope rather than prevalence; shelter adequacy assessments are widely deployed in humanitarian responses. FHIR''s QuestionnaireResponse pattern accommodates the shape.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A household-level record of whether the current shelter arrangement meets Sphere minimum standards for shelter and settlement. Covers shelter type and occupancy arrangement, living space, construction materials, thermal comfort and ventilation, privacy and security, household items (NFIs), technical assistance received, security of tenure, hazard exposure, and environmental sustainability. Based on the Sphere Handbook 2018 Shelter and Settlement chapter (Standards 2-7), the IOM DTM Field Companion for Shelter and NFIs, and the Global Shelter Cluster Standardised Shelter Indicators. Intended for longitudinal monitoring of shelter conditions of displaced or crisis-affected households; distinct from DwellingDamageProfile, which is event-anchored and focuses on post-shock damage to the household''s original dwelling.\n", "es": "Un registro a nivel del hogar de si el arreglo de refugio actual cumple los est\u00e1ndares m\u00ednimos de Esfera para refugio y asentamiento. Abarca el tipo de refugio y arreglo de ocupaci\u00f3n, espacio habitable, materiales de construcci\u00f3n, confort t\u00e9rmico y ventilaci\u00f3n, privacidad y seguridad, art\u00edculos del hogar (ANFs), asistencia t\u00e9cnica recibida, seguridad de tenencia, exposici\u00f3n a peligros y sostenibilidad ambiental. Basado en el cap\u00edtulo de Refugio y Asentamiento del Manual Esfera 2018 (Normas 2-7), el Companion de campo DTM de la OIM para Refugio y ANFs, y los Indicadores de Refugio Estandarizados del Cl\u00faster Global de Refugio. Destinado al monitoreo longitudinal de las condiciones de refugio de hogares desplazados o afectados por crisis; distinto de DwellingDamageProfile, que est\u00e1 anclado a un evento y se centra en los da\u00f1os post-choque a la vivienda original del hogar.\n", "fr": "Un enregistrement au niveau du m\u00e9nage indiquant si l''arrangement d''abri actuel r\u00e9pond aux normes minimales Sph\u00e8re pour l''abri et les \u00e9tablissements. Couvre le type d''abri et l''arrangement d''occupation, l''espace de vie, les mat\u00e9riaux de construction, le confort thermique et la ventilation, la vie priv\u00e9e et la s\u00e9curit\u00e9, les articles m\u00e9nagers (ANAs), l''assistance technique re\u00e7ue, la s\u00e9curit\u00e9 d''occupation, l''exposition aux risques et la durabilit\u00e9 environnementale. Bas\u00e9 sur le chapitre Abri et \u00c9tablissements du Manuel Sph\u00e8re 2018 (Normes 2-7), le Companion de terrain DTM de l''OIM pour l''Abri et les ANAs, et les Indicateurs d''Abri Standardis\u00e9s du Cluster Abri Mondial. Destin\u00e9 au suivi longitudinal des conditions d''abri des m\u00e9nages d\u00e9plac\u00e9s ou affect\u00e9s par une crise; distinct de DwellingDamageProfile, qui est ancr\u00e9 \u00e0 un \u00e9v\u00e9nement et se concentre sur les dommages post-choc au logement d''origine du m\u00e9nage.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (shelter adequacy assessment)", "match": "close", "note": "A household shelter adequacy assessment serializes as a QuestionnaireResponse against a Questionnaire aligned with the Sphere shelter standards.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "ShelterAdequacyProfile", "label": {"en": "Shelter Adequacy Profile", "es": "Perfil de adecuaci\u00f3n del refugio", "fr": "Profil d''ad\u00e9quation de l''abri"}, "maturity": "draft", "properties": ["shelter_type", "occupancy_arrangement", "covered_area_m2", "covered_area_per_person_m2", "floor_to_ceiling_height_adequate", "sleeping_spaces_count", "roof_material", "wall_material", "floor_material", "thermal_comfort_adequate", "ventilation_adequate", "lockable_door", "privacy_women_girls", "separate_sleeping_spaces_sex", "has_sleeping_items", "has_cooking_items", "technical_assistance_received", "technical_assistance_type", "tenure_document_type", "eviction_risk_6mo", "flood_risk_perceived", "hazard_protection_adequate", "solid_waste_disposal_method", "distance_safe_water_minutes", "shelter_feels_adequate"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "shelter", "properties": ["shelter_type", "occupancy_arrangement", "roof_material", "wall_material", "floor_material", "thermal_comfort_adequate", "ventilation_adequate", "technical_assistance_received", "technical_assistance_type"]}, {"category": "living_space", "properties": ["covered_area_m2", "covered_area_per_person_m2", "floor_to_ceiling_height_adequate", "sleeping_spaces_count"]}, {"category": "habitability", "properties": ["lockable_door", "privacy_women_girls", "separate_sleeping_spaces_sex", "shelter_feels_adequate"]}, {"category": "nfi", "properties": ["has_sleeping_items", "has_cooking_items"]}, {"category": "tenure", "properties": ["tenure_document_type", "eviction_risk_6mo"]}, {"category": "environment", "properties": ["flood_risk_perceived", "hazard_protection_adequate", "solid_waste_disposal_method", "distance_safe_water_minutes"]}], "subtypes": [], "supertypes": ["Profile"]}'
