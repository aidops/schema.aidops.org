    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-household-energy-database", "who-world-bank-core-energy-questions"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level multidimensional energy access profile. PS SocioEconomicProfile holds a cooking_fuel summary property and an electricity_access boolean, which are the standard SP registry items. The full MTF-lite assessment is a humanitarian program assessment instrument with no established equivalent in MIS core schemas. The canonical domain tools are the SE4All MTF household surveys (ESMAP 2015, country surveys 2017-2020) and the WHO/World Bank harmonized core questionnaire (2019).\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A point-in-time record of a household''s access to cooking and electricity energy services, assessed using the SE4All Multi-Tier Framework (MTF) lite approach. Captures the primary cooking fuel (referenced from SocioEconomicProfile via PublicSchema cooking_fuel), stove type, ventilation, cooking location, secondary fuel (fuel stacking), convenience attributes (fuel collection time, stove preparation time), safety, affordability, and fuel availability for cooking; and primary electricity source, supply duration, evening availability, reliability, quality, affordability, billing status, safety, and capacity for electricity. Derives MTF tier scores for both cooking and electricity as the minimum tier across all applicable attributes. Primary cooking fuel is captured via SocioEconomicProfile (PS cooking_fuel property) and is not re-defined here; the EnergyAccessProfile form references that value but does not duplicate the property. Similarly, the PS electricity_access boolean can be derived from primary_electricity_source: access is true when primary_electricity_source is not ''none''. Productive-energy-use items are deferred and not included in this version.\n", "es": "Un registro puntual del acceso de un hogar a los servicios de energ\u00eda de cocci\u00f3n y electricidad, evaluado con el enfoque MTF-lite del marco SE4All. Consigna el combustible de cocci\u00f3n principal (referenciado desde SocioEconomicProfile a trav\u00e9s de la propiedad PS cooking_fuel), el tipo de cocina, la ventilaci\u00f3n, el lugar de cocci\u00f3n, el combustible secundario (apilamiento de combustibles), los atributos de conveniencia (tiempo de recolecci\u00f3n de combustible, tiempo de preparaci\u00f3n de la cocina), la seguridad, la asequibilidad y la disponibilidad del combustible para la cocci\u00f3n; y la fuente principal de electricidad, duraci\u00f3n del suministro, disponibilidad vespertina, fiabilidad, calidad, asequibilidad, estado de facturaci\u00f3n, seguridad y capacidad para la electricidad. Deriva los puntajes de nivel MTF para cocci\u00f3n y electricidad como el nivel m\u00ednimo entre todos los atributos aplicables. El combustible de cocci\u00f3n principal se captura a trav\u00e9s de SocioEconomicProfile (propiedad PS cooking_fuel) y no se redefine aqu\u00ed; el formulario EnergyAccessProfile referencia ese valor sin duplicar la propiedad. Del mismo modo, el booleano PS electricity_access puede derivarse de primary_electricity_source: el acceso es verdadero cuando primary_electricity_source no es ''none''. Los \u00edtems de uso productivo de energ\u00eda se difieren y no est\u00e1n incluidos en esta versi\u00f3n.\n", "fr": "Un enregistrement ponctuel de l''acc\u00e8s d''un m\u00e9nage aux services \u00e9nerg\u00e9tiques de cuisson et d''\u00e9lectricit\u00e9, \u00e9valu\u00e9 selon l''approche MTF-lite du cadre SE4All. Consigne le combustible de cuisson principal (r\u00e9f\u00e9renc\u00e9 depuis SocioEconomicProfile via la propri\u00e9t\u00e9 PS cooking_fuel), le type de foyer, la ventilation, le lieu de cuisson, le combustible secondaire (empilement de combustibles), les attributs de commodit\u00e9 (temps de collecte du combustible, temps de pr\u00e9paration du foyer), la s\u00e9curit\u00e9, l''accessibilit\u00e9 financi\u00e8re et la disponibilit\u00e9 du combustible pour la cuisson ; et la source d''\u00e9lectricit\u00e9 principale, la dur\u00e9e d''alimentation, la disponibilit\u00e9 en soir\u00e9e, la fiabilit\u00e9, la qualit\u00e9, l''accessibilit\u00e9 financi\u00e8re, le statut de facturation, la s\u00e9curit\u00e9 et la capacit\u00e9 pour l''\u00e9lectricit\u00e9. D\u00e9rive les scores de niveau MTF pour la cuisson et l''\u00e9lectricit\u00e9 comme le niveau minimum parmi tous les attributs applicables. Le combustible de cuisson principal est captur\u00e9 via SocioEconomicProfile (propri\u00e9t\u00e9 PS cooking_fuel) et n''est pas red\u00e9fini ici ; le formulaire EnergyAccessProfile r\u00e9f\u00e9rence cette valeur sans dupliquer la propri\u00e9t\u00e9. De m\u00eame, le bool\u00e9en PS electricity_access peut \u00eatre d\u00e9riv\u00e9 de primary_electricity_source : l''acc\u00e8s est vrai lorsque primary_electricity_source n''est pas ''none''. Les items sur l''utilisation productive de l''\u00e9nergie sont report\u00e9s et ne sont pas inclus dans cette version.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (household energy assessment)", "match": "close", "note": "A household-level energy access assessment serializes naturally as a QuestionnaireResponse with items corresponding to EnergyAccessProfile properties.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "EnergyAccessProfile", "label": {"en": "Energy Access Profile", "es": "Perfil de acceso a la energ\u00eda", "fr": "Profil d''acc\u00e8s \u00e0 l''\u00e9nergie"}, "maturity": "draft", "properties": ["primary_cooking_stove_type", "cooking_stove_has_chimney", "cooking_location", "secondary_cooking_fuel", "fuel_collection_time_hours_per_week", "stove_preparation_time_minutes", "cooking_accident_past_12_months", "cooking_fuel_cost_share", "cooking_fuel_availability_months", "primary_electricity_source", "electricity_hours_per_day", "electricity_evening_hours", "electricity_interruptions_per_week", "electricity_interruption_hours_per_week", "electricity_voltage_problems", "electricity_cost_share", "electricity_billing_status", "electricity_accident_past_12_months", "electricity_capacity_watts", "electricity_appliances_supported", "primary_lighting_source", "cooking_mtf_tier", "electricity_mtf_tier"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "energy", "properties": ["primary_cooking_stove_type", "cooking_stove_has_chimney", "cooking_location", "secondary_cooking_fuel", "fuel_collection_time_hours_per_week", "stove_preparation_time_minutes", "cooking_accident_past_12_months", "cooking_fuel_cost_share", "cooking_fuel_availability_months", "primary_electricity_source", "electricity_hours_per_day", "electricity_evening_hours", "electricity_interruptions_per_week", "electricity_interruption_hours_per_week", "electricity_voltage_problems", "electricity_cost_share", "electricity_billing_status", "electricity_accident_past_12_months", "electricity_capacity_watts", "electricity_appliances_supported", "primary_lighting_source"]}, {"category": "scores", "properties": ["cooking_mtf_tier", "electricity_mtf_tier"]}], "subtypes": [], "supertypes": ["Profile"]}'
