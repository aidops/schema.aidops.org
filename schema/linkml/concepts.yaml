 communautaire), JIAF 2.0 (s\u00e9v\u00e9rit\u00e9 et comparaison \u00e0 la base), ACAPS 2014 (m\u00e9thodologie), HSM de REACH (analogue op\u00e9rationnel), \u00e9valuation de site DTM de l''OIM (sch\u00e9mas de question \u00ab besoins prioritaires \u00bb), IFRC VCA, Sph\u00e8re 2018 (AAP / engagement 4 de la NHC), AGD du HCR, Directives de l''IASC sur l''inclusion des personnes handicap\u00e9es (2019) et Cadre de coh\u00e9sion sociale PNUD-DPPA.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (community-level assessment)", "match": "close", "note": "A single community-level assessment (MIRA Community Level form, a REACH HSM KII, or an IFRC VCA community ranking exercise) serializes naturally as a FHIR QuestionnaireResponse whose subject is a Group resource representing the Community. The ranked priority-need properties and multi-select priority-group property align with the QuestionnaireResponse item pattern. Derived aggregates (Borda-weighted rank shares, severity means) are better represented as FHIR Observations or MeasureReports produced downstream.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "featured": true, "id": "CommunityNeedsProfile", "label": {"en": "Community Needs Profile", "es": "Perfil de necesidades comunitarias", "fr": "Profil des besoins communautaires"}, "maturity": "draft", "properties": ["cn_assessment_method", "cn_informant_count", "cn_informant_group_women", "cn_informant_group_men", "cn_informant_group_youth", "cn_informant_group_elderly", "cn_informant_group_pwd", "cn_priority_need_1", "cn_priority_need_2", "cn_priority_need_3", "cn_priority_need_other_specify", "cn_priority_group_most_in_need", "cn_priority_group_other_specify", "cn_severity_vs_baseline", "cn_severity_overall_rating", "cn_coping_mechanisms_in_use", "cn_social_cohesion_level", "cn_tension_between_groups_described", "cn_coverage_gap_perceived", "cn_coverage_gap_description", "cn_assessment_observation_notes"], "property_groups":
