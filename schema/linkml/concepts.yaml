amiliar (algoritmo DHS revisado, Estudio Anal\u00edtico 25) y acceso a servicios de salud reproductiva en contextos de crisis (MISP). Los bloques opcionales cubren pruebas de ITS/VIH (con un paso de consentimiento separado) e indicadores cl\u00ednicos de salud menstrual. No cubre la prevalencia de VBG (se requieren protocolos especializados), examen cl\u00ednico (se requiere personal m\u00e9dico) ni gesti\u00f3n de higiene menstrual (definida en WASHAssessmentProfile). Reutiliza la propiedad pregnancy_status de PublicSchema como entrada al algoritmo de necesidad insatisfecha.\n", "fr": "Un enregistrement ponctuel de donn\u00e9es de sant\u00e9 reproductive pour une femme en \u00e2ge de procr\u00e9er (15\u201349 ans), collect\u00e9 lors d''un entretien individuel priv\u00e9 sous consentement \u00e9clair\u00e9 explicite. Couvre l''utilisation actuelle et pass\u00e9e de contraceptifs, le type et la source de m\u00e9thode, les pr\u00e9f\u00e9rences de f\u00e9condit\u00e9, le besoin non satisfait en planification familiale (algorithme DHS r\u00e9vis\u00e9, \u00c9tude analytique 25) et l''acc\u00e8s aux services de sant\u00e9 reproductive en contexte de crise (MISP). Des blocs facultatifs couvrent le d\u00e9pistage des IST/VIH (avec une \u00e9tape de consentement distincte) et les indicateurs cliniques de sant\u00e9 menstruelle. Ce profil ne couvre pas la pr\u00e9valence des VBG (protocoles sp\u00e9cialis\u00e9s requis), l''examen clinique (personnel m\u00e9dical requis), ni la gestion de l''hygi\u00e8ne menstruelle (d\u00e9finie dans WASHAssessmentProfile). R\u00e9utilise la propri\u00e9t\u00e9 pregnancy_status de PublicSchema comme entr\u00e9e dans l''algorithme de besoin non satisfait.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 family planning data elements", "match": "close", "note": "DHIS2 national health information systems frequently carry contraceptive prevalence and unmet need aggregate data elements, but household-survey-level item data is rarely modelled in DHIS2 core. The DHIS2 Tracker can accommodate individual-level survey data in a programme structure.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 global health data sets"}, "fhir": {"label": "QuestionnaireResponse (reproductive health / family planning)", "match": "close", "note": "A woman-level reproductive health interview serializes naturally as a QuestionnaireResponse whose Questionnaire is the DHS or MICS family planning instrument. Derived indicators (fp_unmet_need, fp_demand_satisfied_modern, fertility_preference) are better represented as FHIR Observations produced by a scoring step. The STI/HIV block may require a separate QuestionnaireResponse gated on an additional consent resource.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "ReproductiveHealthProfile", "label": {"en": "Reproductive Health Profile", "es": "Perfil de salud reproductiva", "fr": "Profil de sant\u00e9 reproductive"}, "maturity": "draft", "properties": ["desire_more_children", "desired_waiting_time", "ideal_number_of_children", "fertility_preference", "fp_using_any_method", "fp_current_method", "fp_method_is_modern", "fp_source_of_method", "fp_ever_used_any_method", "fp_ever_used_modern_method", "fp_past_method", "fp_reason_discontinuation", "fp_sexually_active_last_4_weeks", "fp_postpartum_amenorrhea", "fp_fecundity_status", "fp_reason_not_using", "fp_unmet_need", "fp_demand_satisfied_modern", "menstrual_regularity", "age_at_menarche_years", "hiv_ever_tested", "hiv_tested_last_12_months", "hiv_received_results", "sti_symptoms_last_12_months", "sti_sought_care", "rh_service_aware", "rh_service_accessible", "clean_delivery_kit_available", "emergency_contraception_aware", "condom_accessible"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "fertility_preferences", "properties": ["desire_more_children", "desired_waiting_time", "ideal_number_of_children", "fertility_preference"]}, {"category": "family_planning", "properties": ["fp_using_any_method", "fp_current_method", "fp_method_is_modern", "fp_source_of_method", "fp_ever_used_any_method", "fp_ever_used_modern_method", "fp_past_method", "fp_reason_discontinuation", "menstrual_regularity", "age_at_menarche_years"]}, {"category": "unmet_need", "properties": ["fp_sexually_active_last_4_weeks", "fp_postpartum_amenorrhea", "fp_fecundity_status", "fp_reason_not_using", "fp_unmet_need", "fp_demand_satisfied_modern"]}, {"category": "sti_hiv", "properties": ["hiv_ever_tested", "hiv_tested_last_12_months", "hiv_received_results", "sti_symptoms_last_12_months", "sti_sought_care"]}, {"category": "misp_access", "properties": ["rh_service_aware", "rh_service_accessible", "clean_delivery_kit_available", "emergency_contraception_aware", "condom_accessible"]}], "subtypes": [], "supertypes": ["Profile"]}'
