    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["inee-minimum-standards", "mics-education", "uis-sdg4"], "convergence": {"notes": "OpenSPP carries an ISCED education level on the individual (Person) record, which is the summary-level equivalent of EducationProfile''s highest_education_level. None of the other v1 social-protection systems (FHIR, DHIS2, OpenCRVS, openIMIS, DCI Core) carry the per-child school-participation and environment detail that EducationProfile encodes: current-year attendance, school type, travel time, school environment, and non-attendance reasons are humanitarian assessment variables not represented in routine SP system data models. The low convergence reflects scope: EducationProfile is a survey instrument concept, not a service-delivery record.\n", "system_count": 1, "total_systems": 6}, "definition": {"en": "A point-in-time record of school access, participation, and learning environment for a single school-age child (aged 5 or older), collected at the household level from a caregiver respondent. Records are per-child, not per-household: every eligible child in the household roster generates one EducationProfile record. Captures lifetime attendance history (ever attended, highest level reached and whether completed), current-year and previous-year attendance status, school type and management, physical access and environment indicators, parental involvement, and reasons for non-attendance. Supports derivation of SDG 4.1.2 (completion rate) and UNESCO UIS out-of-school children indicators from household survey data. Aligned with MICS6 (the canonical caregiver-reported instrument) and cross-referenced with DHS and INEE Minimum Standards for emergency contexts. The Foundational Learning Skills (FLS) direct assessment module is deferred to a separate optional instrument administered by a trained enumerator; this profile covers caregiver-reported items only.\n", "es": "Un registro puntual del acceso escolar, la participaci\u00f3n y el entorno de aprendizaje para un solo ni\u00f1o en edad escolar (de 5 a\u00f1os o m\u00e1s), recopilado a nivel del hogar de un cuidador como respondente. Los registros son por ni\u00f1o, no por hogar: cada ni\u00f1o elegible en el registro del hogar genera un registro EducationProfile. Captura el historial de asistencia de por vida (alguna vez asisti\u00f3, nivel m\u00e1s alto alcanzado y si fue completado), el estado de asistencia del a\u00f1o actual y del a\u00f1o anterior, el tipo y la gesti\u00f3n escolar, los indicadores de acceso f\u00edsico y entorno, la participaci\u00f3n parental, y las razones de no asistencia. Apoya la derivaci\u00f3n del ODS 4.1.2 (tasa de finalizaci\u00f3n) y los indicadores de ni\u00f1os fuera de la escuela del IEU de la UNESCO a partir de datos de encuestas de hogares. Alineado con MICS6 (el instrumento can\u00f3nico de reporte del cuidador) y con referencia cruzada con DHS y las Normas M\u00ednimas INEE para contextos de emergencia. El m\u00f3dulo de evaluaci\u00f3n directa de Habilidades Fundamentales de Aprendizaje (HFA) se difiere a un instrumento opcional separado administrado por un encuestador capacitado; este perfil cubre \u00fanicamente los elementos reportados por el cuidador.\n", "fr": "Un enregistrement ponctuel de l''acc\u00e8s \u00e0 l''\u00e9cole, de la participation et de l''environnement d''apprentissage pour un seul enfant en \u00e2ge scolaire (\u00e2g\u00e9 de 5 ans ou plus), collect\u00e9 au niveau du m\u00e9nage aupr\u00e8s d''un aidant r\u00e9pondant. Les enregistrements sont par enfant, pas par m\u00e9nage : chaque enfant \u00e9ligible dans le registre du m\u00e9nage g\u00e9n\u00e8re un enregistrement EducationProfile. Consigne l''historique de fr\u00e9quentation \u00e0 vie (a d\u00e9j\u00e0 fr\u00e9quent\u00e9, niveau le plus \u00e9lev\u00e9 atteint et s''il a \u00e9t\u00e9 achev\u00e9), le statut de fr\u00e9quentation de l''ann\u00e9e en cours et de l''ann\u00e9e pr\u00e9c\u00e9dente, le type et la gestion de l''\u00e9cole, les indicateurs d''acc\u00e8s et d''environnement physique, l''implication parentale, et les raisons de non-fr\u00e9quentation. Soutient la d\u00e9rivation de l''ODD 4.1.2 (taux d''ach\u00e8vement) et des indicateurs de l''ISU de l''UNESCO sur les enfants non scolaris\u00e9s \u00e0 partir des donn\u00e9es d''enqu\u00eate m\u00e9nage. Align\u00e9 avec MICS6 (l''instrument canonique rapport\u00e9 par l''aidant) et contre-r\u00e9f\u00e9renc\u00e9 avec les DHS et les Normes minimales INEE pour les contextes d''urgence. Le module d''\u00e9valuation directe des Comp\u00e9tences fondamentales d''apprentissage (CFA) est report\u00e9 \u00e0 un instrument optionnel distinct administr\u00e9 par un agent de terrain form\u00e9 ; ce profil couvre uniquement les \u00e9l\u00e9ments rapport\u00e9s par l''aidant.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (household education survey)", "match": "close", "note": "A per-child education assessment serializes as a QuestionnaireResponse whose subject is the child (Patient) and whose Questionnaire corresponds to the deployed education form. Each property maps to an item response. The per-child roster loop corresponds to multiple QuestionnaireResponse resources sharing a common context (encounter or composition) for the household visit.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "EducationProfile", "label": {"en": "Education Profile", "es": "Perfil educativo", "fr": "Profil \u00e9ducatif"}, "maturity": "draft", "properties": ["ever_attended_school", "highest_education_level", "highest_grade_completed_local", "highest_level_completed", "attended_current_year", "current_grade_level", "attended_previous_year", "previous_grade_level", "school_type", "classroom_type", "school_management_type", "online_learning", "home_tutoring", "needs_help_to_reach_school", "reason_needs_help_transport", "travel_time_to_school", "learning_materials_available", "school_has_drinking_water", "school_has_toilet", "school_feels_safe", "school_closures_last_12m", "non_attendance_reason", "reasons_for_non_attendance", "books_at_home", "has_homework", "homework_help", "school_governing_body", "caregiver_attended_meeting", "received_report_card"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "education", "properties": ["ever_attended_school", "highest_education_level", "highest_grade_completed_local", "highest_level_completed", "attended_current_year", "current_grade_level", "attended_previous_year", "previous_grade_level", "school_type", "classroom_type", "school_management_type", "online_learning", "home_tutoring", "needs_help_to_reach_school", "reason_needs_help_transport", "travel_time_to_school", "learning_materials_available", "school_has_drinking_water", "school_has_toilet", "school_feels_safe", "school_closures_last_12m", "non_attendance_reason", "reasons_for_non_attendance", "books_at_home", "has_homework", "homework_help", "school_governing_body", "caregiver_attended_meeting", "received_report_card"]}], "subtypes": [], "supertypes": ["Profile"]}'
