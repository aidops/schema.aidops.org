    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-epi-schedule", "who-imci"], "convergence": {"notes": "FHIR QuestionnaireResponse and DHIS2 Tracker are the closest structural equivalents. OpenSPP, openIMIS, DCI Core, and OpenCRVS do not carry per-child vaccination history or 2-week illness recall in their core data models. All 46 child health properties are new to AidOps; child_age_months is reused from NutritionPracticesProfile. The care-provider-type vocabulary is authored as a shared AidOps vocabulary for use by ChildHealthProfile, MaternalNewbornHealthProfile, and ReproductiveHealthProfile.\n", "system_count": 2, "total_systems": 6}, "definition": {"en": "A point-in-time record of health status and recent illness episodes for a child aged 1\u201359 months (under 5), reported by the primary caregiver. Each record is scoped to a single child (subject: Person aged 1\u201359 months completed); households with multiple children under 5 generate one record per child.\nThe profile covers three domains: (1) vaccination history \u2014 per-antigen status verified from a home-based vaccination card or caregiver recall, following the WHO EPI (Expanded Programme on Immunization) recommended schedule; (2) recent illness \u2014 2-week caregiver recall for diarrhea, acute respiratory infection (ARI/pneumonia proxy), and fever, with treatment items (ORS, zinc, ORT, antibiotics, antimalarials); and (3) care-seeking \u2014 provider type visited for each illness episode.\nPhysical measurements (height, weight, MUAC, oedema) are deliberately excluded and belong to AnthropometricProfile. Infant and young child feeding behaviors (breastfeeding, complementary feeding, MDD-C) are excluded and belong to NutritionPracticesProfile. Vitamin A supplementation and deworming are deferred. Birth registration is out of scope (PS Identifier / CRVS territory). HPV vaccination is deferred (adolescent scope).\n", "es": "Un registro puntual del estado de salud y los episodios de enfermedad recientes de un ni\u00f1o de 1 a 59 meses de edad (menor de 5 a\u00f1os), reportado por el cuidador principal. Cada registro est\u00e1 delimitado a un solo ni\u00f1o (sujeto: persona de 1 a 59 meses cumplidos); los hogares con m\u00faltiples ni\u00f1os menores de 5 a\u00f1os generan un registro por ni\u00f1o.\nEl perfil cubre tres dominios: (1) historial de vacunaci\u00f3n \u2014 estado por ant\u00edgeno verificado en el carnet de vacunaci\u00f3n domiciliario o por memoria del cuidador, siguiendo el calendario recomendado del PAI (Programa Ampliado de Inmunizaci\u00f3n) de la OMS; (2) enfermedades recientes \u2014 recordatorio de 2 semanas del cuidador para diarrea, infecci\u00f3n respiratoria aguda (IRA/proxy de neumon\u00eda) y fiebre, con \u00edtems de tratamiento (SRO, zinc, TRO, antibi\u00f3ticos, antipal\u00fadicos); y (3) b\u00fasqueda de atenci\u00f3n \u2014 tipo de proveedor visitado para cada episodio de enfermedad.\nLas mediciones f\u00edsicas (talla, peso, PB, edema) est\u00e1n deliberadamente excluidas y pertenecen al AnthropometricProfile. Las pr\u00e1cticas de alimentaci\u00f3n del lactante y del ni\u00f1o peque\u00f1o (lactancia materna, alimentaci\u00f3n complementaria, DDM-C) est\u00e1n excluidas y pertenecen al NutritionPracticesProfile. La suplementaci\u00f3n con vitamina A y el desparasitamiento se difieren. El registro de nacimientos est\u00e1 fuera del alcance (Identificador PS / territorio CRVS). La vacunaci\u00f3n contra el VPH se difiere (alcance adolescente).\n", "fr": "Un enregistrement ponctuel de l''\u00e9tat de sant\u00e9 et des \u00e9pisodes de maladie r\u00e9cents d''un enfant \u00e2g\u00e9 de 1 \u00e0 59 mois (moins de 5 ans), rapport\u00e9 par le soignant principal. Chaque enregistrement est limit\u00e9 \u00e0 un seul enfant (sujet : personne \u00e2g\u00e9e de 1 \u00e0 59 mois r\u00e9volus) ; les m\u00e9nages comportant plusieurs enfants de moins de 5 ans g\u00e9n\u00e8rent un enregistrement par enfant.\nLe profil couvre trois domaines : (1) l''historique vaccinal \u2014 statut par antig\u00e8ne v\u00e9rifi\u00e9 sur le carnet de vaccination \u00e0 domicile ou par m\u00e9morisation du soignant, suivant le calendrier recommand\u00e9 de l''EPI (Programme \u00e9largi de vaccination) de l''OMS ; (2) les maladies r\u00e9centes \u2014 rappel de 2 semaines par le soignant pour la diarrh\u00e9e, l''infection respiratoire aigu\u00eb (IRA/proxy pneumonie) et la fi\u00e8vre, avec les traitements (SRO, zinc, TRO, antibiotiques, antipalud\u00e9ens) ; et (3) le recours aux soins \u2014 type de prestataire consult\u00e9 pour chaque \u00e9pisode de maladie.\nLes mesures physiques (taille, poids, PB, \u0153d\u00e8mes) sont d\u00e9lib\u00e9r\u00e9ment exclues et rel\u00e8vent du AnthropometricProfile. Les pratiques d''alimentation du nourrisson et du jeune enfant (allaitement, alimentation compl\u00e9mentaire, DMA-C) sont exclues et rel\u00e8vent du NutritionPracticesProfile. La suppl\u00e9mentation en vitamine A et le d\u00e9parasitage sont diff\u00e9r\u00e9s. L''enregistrement des naissances est hors p\u00e9rim\u00e8tre (Identifiant PS / territoire CRVS). La vaccination contre le HPV est diff\u00e9r\u00e9e (p\u00e9rim\u00e8tre adolescent).\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 Tracker Program (EPI, Child Health)", "match": "close", "note": "National EPI programs typically implement ChildHealthProfile-equivalent data as a DHIS2 Tracker program with per-child enrollment and repeated vaccination and illness visit events. Vaccination card status and per-antigen dose status map to Tracked Entity Attributes and Data Elements.", "uri": "https://dhis2.org"}, "fhir": {"label": "QuestionnaireResponse (child health and immunization)", "match": "close", "note": "Each ChildHealthProfile administration maps to a QuestionnaireResponse. Vaccination items also map to FHIR Immunization resources. Illness episode items (diarrhea, ARI, fever) map to FHIR Condition or Observation resources. The caregiver respondent is the FHIR QuestionnaireResponse.source; the child is the FHIR subject.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "ChildHealthProfile", "label": {"en": "Child Health Profile", "es": "Perfil de salud del ni\u00f1o", "fr": "Profil de sant\u00e9 de l''enfant"}, "maturity": "draft", "properties": ["child_age_months", "vaccination_card_exists", "vaccination_card_seen", "fully_vaccinated_basic", "vacc_bcg", "vacc_hepb_birth", "vacc_opv0", "vacc_opv1", "vacc_opv2", "vacc_opv3", "vacc_ipv", "vacc_penta1", "vacc_penta2", "vacc_penta3", "vacc_pcv1", "vacc_pcv2", "vacc_pcv3", "vacc_rota1", "vacc_rota2", "vacc_rota3", "vacc_mcv1", "vacc_mcv2", "other_vaccine_received", "diarrhea_last_2wks", "diarrhea_blood_in_stool", "diarrhea_care_sought", "diarrhea_care_source", "diarrhea_ors_given", "diarrhea_rhf_given", "diarrhea_zinc_given", "diarrhea_fluids_increased", "diarrhea_feeding_continued", "diarrhea_ort_achieved", "ari_cough_last_2wks", "ari_fast_breathing", "ari_difficult_breathing", "ari_symptom_classification", "ari_care_sought", "ari_care_source", "ari_antibiotics_given", "fever_last_2wks", "malaria_test_done", "malaria_test_result", "fever_care_sought", "fever_care_source", "fever_antimalarial_given", "fever_antimalarial_type", "fever_antibiotics_given"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "vaccination", "properties": ["child_age_months", "vaccination_card_exists", "vaccination_card_seen", "fully_vaccinated_basic", "vacc_bcg", "vacc_hepb_birth", "vacc_opv0", "vacc_opv1", "vacc_opv2", "vacc_opv3", "vacc_ipv", "vacc_penta1", "vacc_penta2", "vacc_penta3", "vacc_pcv1", "vacc_pcv2", "vacc_pcv3", "vacc_rota1", "vacc_rota2", "vacc_rota3", "vacc_mcv1", "vacc_mcv2", "other_vaccine_received"]}, {"category": "diarrhea", "properties": ["diarrhea_last_2wks", "diarrhea_blood_in_stool", "diarrhea_care_sought", "diarrhea_care_source", "diarrhea_ors_given", "diarrhea_rhf_given", "diarrhea_zinc_given", "diarrhea_fluids_increased", "diarrhea_feeding_continued", "diarrhea_ort_achieved"]}, {"category": "ari", "properties": ["ari_cough_last_2wks", "ari_fast_breathing", "ari_difficult_breathing", "ari_symptom_classification", "ari_care_sought", "ari_care_source", "ari_antibiotics_given"]}, {"category": "fever", "properties": ["fever_last_2wks", "malaria_test_done", "malaria_test_result", "fever_care_sought", "fever_care_source", "fever_antimalarial_given", "fever_antimalarial_type", "fever_antibiotics_given"]}], "subtypes": [], "supertypes": ["Profile"]}'
