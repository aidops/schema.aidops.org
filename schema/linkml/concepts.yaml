  ReproductiveHealthProfile:
    title:
      en: Reproductive Health Profile
      fr: Profil de santé reproductive
      es: Perfil de salud reproductiva
    description:
      en: A point-in-time record of reproductive health data for a woman of reproductive age (15–49), collected through an individual private interview under explicit informed consent. Covers current and past contraceptive use, method type and source, fertility preferences, unmet need for family planning (DHS revised algorithm, Analytical Study 25), and crisis-context access to reproductive health services (MISP). Optional blocks cover STI/HIV testing (with a separate consent step) and menstrual health clinical indicators. Does not cover GBV prevalence (specialist protocols required), clinical examination (medical staff required), or menstrual hygiene management access (defined in WASHAssessmentProfile). Reuses the pregnancy_status property from PublicSchema as an input to the unmet need algorithm.
      fr: Un enregistrement ponctuel de données de santé reproductive pour une femme en âge de procréer (15–49 ans), collecté lors d'un entretien individuel privé sous consentement éclairé explicite. Couvre l'utilisation actuelle et passée de contraceptifs, le type et la source de méthode, les préférences de fécondité, le besoin non satisfait en planification familiale (algorithme DHS révisé, Étude analytique 25) et l'accès aux services de santé reproductive en contexte de crise (MISP). Des blocs facultatifs couvrent le dépistage des IST/VIH (avec une étape de consentement distincte) et les indicateurs cliniques de santé menstruelle. Ce profil ne couvre pas la prévalence des VBG (protocoles spécialisés requis), l'examen clinique (personnel médical requis), ni la gestion de l'hygiène menstruelle (définie dans WASHAssessmentProfile). Réutilise la propriété pregnancy_status de PublicSchema comme entrée dans l'algorithme de besoin non satisfait.
      es: Un registro puntual de datos de salud reproductiva para una mujer en edad reproductiva (15–49 años), recopilado mediante una entrevista individual privada bajo consentimiento informado explícito. Cubre el uso actual y pasado de anticonceptivos, tipo y fuente del método, preferencias de fecundidad, necesidad insatisfecha de planificación familiar (algoritmo DHS revisado, Estudio Analítico 25) y acceso a servicios de salud reproductiva en contextos de crisis (MISP). Los bloques opcionales cubren pruebas de ITS/VIH (con un paso de consentimiento separado) e indicadores clínicos de salud menstrual. No cubre la prevalencia de VBG (se requieren protocolos especializados), examen clínico (se requiere personal médico) ni gestión de higiene menstrual (definida en WASHAssessmentProfile). Reutiliza la propiedad pregnancy_status de PublicSchema como entrada al algoritmo de necesidad insatisfecha.
