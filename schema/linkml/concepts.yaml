2023), IPC AFI Technical Manual v3.1 pastoralist annex, and FSNAU Somalia seasonal assessment methodology, with FEWSNET HEA, FAO GIEWS, Sphere 2018, AGIR Sahel, and SMART pastoral adaptations as supporting sources. Subject is a Household in a pastoral or agro-pastoral livelihood zone (pre-classified by FEWSNET Livelihood Zone Profile or equivalent national livelihoods mapping before administration).\n", "es": "Un registro puntual de los determinantes pastorales espec\u00edficos de la seguridad alimentaria para hogares cuyo medio de vida principal es la ganader\u00eda n\u00f3mada o el agropastoralismo. Cubre los factores estructurales y estacionales que FoodSecurityProfile no alcanza: salud y din\u00e1mica del reba\u00f1o, producci\u00f3n y consumo de leche, t\u00e9rminos de intercambio ganader\u00eda/cereales, movilidad y condiciones de pastizales, p\u00e9rdidas de ganado y acceso a servicios veterinarios en contextos de reba\u00f1os m\u00f3viles. Dise\u00f1ado para co-administrarse junto con FoodSecurityProfile para hogares pastorales y agropastorales \u2014 no reemplaza ning\u00fan instrumento de FoodSecurityProfile. FoodSecurityProfile suministra los indicadores de resultados de seguridad alimentaria (FCS, rCSI, LCS-FS, HDDS, HHS, FIES, MAHFP); este perfil suministra los indicadores estructurales y de proceso espec\u00edficos del pastoralismo que explican por qu\u00e9 y c\u00f3mo los hogares pastorales caen o se recuperan de la inseguridad alimentaria. El fundamento can\u00f3nico es la 3.a edici\u00f3n de LEGS (2023), el Manual T\u00e9cnico IPC AFI v3.1 (anexo pastoralista) y la metodolog\u00eda de evaluaci\u00f3n estacional FSNAU Somalia, con HEA de FEWSNET, FAO GIEWS, Esfera 2018, AGIR Sahel y adaptaciones pastorales SMART como fuentes de apoyo. El sujeto es un Hogar en una zona de medios de vida pastoral o agropastoral.\n", "fr": "Un enregistrement ponctuel des d\u00e9terminants pastoraux sp\u00e9cifiques de la s\u00e9curit\u00e9 alimentaire pour les m\u00e9nages dont le moyen de subsistance principal est l''\u00e9levage nomade ou l''agro-pastoralisme. Couvre les facteurs structurels et saisonniers que le FoodSecurityProfile n''atteint pas : sant\u00e9 et dynamique du troupeau, production et consommation de lait, termes de l''\u00e9change b\u00e9tail/c\u00e9r\u00e9ales, mobilit\u00e9 et conditions des p\u00e2turages, pertes de b\u00e9tail et acc\u00e8s aux services v\u00e9t\u00e9rinaires dans les contextes de troupeaux mobiles. Con\u00e7u pour \u00eatre co-administr\u00e9 avec le FoodSecurityProfile pour les m\u00e9nages pastoraux et agro-pastoraux \u2014 il ne remplace aucun instrument du FoodSecurityProfile. Le FoodSecurityProfile fournit les indicateurs de r\u00e9sultats de s\u00e9curit\u00e9 alimentaire (FCS, rCSI, LCS-FS, HDDS, HHS, FIES, MAHFP) ; ce profil fournit les indicateurs structurels et de processus propres au pastoralisme qui expliquent comment et pourquoi les m\u00e9nages pastoraux tombent dans l''ins\u00e9curit\u00e9 alimentaire ou s''en r\u00e9tablissent. L''ancrage canonique est la 3e \u00e9dition des LEGS (2023), le manuel technique IPC AFI v3.1 (annexe pastoraliste) et la m\u00e9thodologie FSNAU Somalie, avec le HEA FEWSNET, le FAO GIEWS, Sph\u00e8re 2018, AGIR Sahel et les adaptations pastorales SMART comme sources compl\u00e9mentaires. Le sujet est un M\u00e9nage dans une zone de moyens d''existence pastorale ou agro-pastorale.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 event program (pastoral livelihoods)", "match": "broad", "note": "DHIS2 instances in pastoral early-warning programmes (FSNAU Somalia, NDMA Kenya, FEWSNET livelihoods monitoring) carry selected items (herd composition, terms of trade, rangeland condition) as data elements in event programs, but no global DHIS2 pastoral data set exists and item-level standardization varies widely by country implementation.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 data sets"}, "fhir": {"label": "QuestionnaireResponse (pastoral food security battery)", "match": "close", "note": "A pastoral food security administration serializes as a QuestionnaireResponse whose Questionnaire corresponds to the LEGS initial assessment or FSNAU seasonal assessment instrument definition. FHIR has no dedicated pastoral livestock resource; derived indicators (breeding-female ratio, terms-of-trade ratio) are better represented as Observation or RiskAssessment produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "featured": true, "id": "PastoralFoodSecurityProfile", "label": {"en": "Pastoral Food Security Profile", "es": "Perfil de seguridad alimentaria pastoral", "fr": "Profil de s\u00e9curit\u00e9 alimentaire pastorale"}, "maturity": "draft", "properties": ["herd_composition_by_species", "breeding_females_count", "herd_trend_since_crisis", "livestock_losses_count_past_12mo", "livestock_loss_cause", "milk_production_liters_per_day_household", "milk_household_proportion_consumed", "milk_consumption_frequency", "terms_of_trade_goat_cereal", "terms_of_trade_trend", "stress_sale_occurred", "stress_sale_price_vs_baseline", "stress_sale_reason", "rangeland_condition_perception", "water_point_access", "fodder_availability", "fodder_cost_change", "migration_distance_km", "migration_routes_disrupted", "migration_route_disruption_cause", "conflict_mobility_restriction", "livestock_disease_exposure", "vet_services_access", "vet_access_barriers"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "pastoral_herd", "properties": ["herd_composition_by_species", "breeding_females_count", "herd_trend_since_crisis", "livestock_losses_count_past_12mo", "livestock_loss_cause"]}, {"category": "pastoral_milk", "properties": ["milk_production_liters_per_day_household", "milk_household_proportion_consumed", "milk_consumption_frequency"]}, {"category": "pastoral_market", "properties": ["terms_of_trade_goat_cereal", "terms_of_trade_trend", "stress_sale_occurred", "stress_sale_price_vs_baseline", "stress_sale_reason"]}, {"category": "pastoral_rangeland", "properties": ["rangeland_condition_perception", "water_point_access", "fodder_availability", "fodder_cost_change"]}, {"category": "pastoral_mobility", "properties": ["migration_distance_km", "migration_routes_disrupted", "migration_route_disruption_cause", "conflict_mobility_restriction"]}, {"category": "pastoral_animal_health", "properties": ["livestock_disease_exposure", "vet_services_access", "vet_access_barriers"]}], "subtypes": [], "supertypes": ["Profile"]}'
