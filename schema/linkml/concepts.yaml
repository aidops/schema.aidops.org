      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-market-assessment-2014", "calp-misma-2018", "calp-programme-quality-toolbox", "crs-markit-2023", "emma-toolkit-v2-2017", "fao-giews-fpma", "icrc-pcma-2014", "icrc-ram-2014", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "convergence": {"notes": "MarketProfile is a supply-side humanitarian market monitoring profile with no direct equivalent in the v1 convergence systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry). These systems are oriented toward social protection, civil registration, and health service delivery, not market monitoring. The informing standards bodies live outside the v1 set: CaLP (MISMA), WFP (MAG, VAM), REACH/IMPACT (JMMI), ICRC (RAM, PCMA), FAO (GIEWS FPMA), CRS (MARKit), Sphere Association, and ACAPS. Convergence evidence is strong within the humanitarian market analysis canon.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A point-in-time record of market functionality, commodity availability and prices, supply chain status, accessibility, and cash-based programming (CBI) feasibility for a single market visit. The subject is a PS ServicePoint constrained to service_point_type: market. One record represents one market visit on one date; the same market is visited repeatedly (monthly or fortnightly, following JMMI precedent) to generate time-series data for trend analysis. The market''s persistent identity (name, GPS coordinates, administrative area, catchment population) is stored on the ServicePoint record, not re-collected on each profile visit. The profile addresses three core operational questions recurring across all humanitarian market methodologies: (1) Functionality \u2014 is the market open, accessible, and adequately stocked to meet essential needs? (2) Price \u2014 are essential commodity prices within an acceptable range of pre-crisis baselines, and what is the price trend direction? (3) CBI feasibility \u2014 are cash, mobile money, or voucher modalities viable at this market from the supply side? Data collection uses two simultaneous sources: enumerator direct observation (operational status, vendor count, food safety, road access, physical availability of goods) and key vendor informant (KVI) interview (prices, price trends, supply chain status, transport costs, cash/mobile money acceptance, vendor capacity for large orders). The Module C price basket is implemented as a repeat group in XLSForm (one row per commodity); the schema defines six per-row properties that compose into a begin_repeat/end_repeat block at form level. The profile is the supply-side counterpart to the demand-side market-access items in FoodSecurityProfile and LivelihoodProfile. Draws on CaLP MISMA 2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA 2014, WFP MAG 2021, REACH JMMI (2017\u2013present), CRS MARKit 2023, FAO GIEWS FPMA, WFP VAM, CaLP Programme Quality Toolbox 2020, ACAPS Market Assessment Methodology Note 2014, and Sphere Handbook 2018. Does not cover household-reported market access (FoodSecurityProfile), household income from market trade (LivelihoodProfile), individual vendor identity or per-vendor financial data, national price indices, terms of trade for pastoral communities, FSP landscape assessment, or full EMMA market-system mapping.\n", "es": "Un registro puntual de la funcionalidad del mercado, la disponibilidad y los precios de los productos, el estado de la cadena de suministro, la accesibilidad y la viabilidad de la programaci\u00f3n basada en efectivo (CBI) para una sola visita al mercado. El sujeto es un ServicePoint de PS restringido a service_point_type: market. Un registro representa una visita al mercado en una fecha; el mismo mercado se visita repetidamente (mensual o quincenalmente, siguiendo el precedente JMMI) para generar datos de series temporales. La identidad persistente del mercado (nombre, coordenadas GPS, \u00e1rea administrativa, poblaci\u00f3n de captaci\u00f3n) se almacena en el registro ServicePoint, no se recolecta en cada visita de perfil. El perfil responde tres preguntas operacionales fundamentales que se repiten en todas las metodolog\u00edas humanitarias de mercado: (1) Funcionalidad: \u00bfest\u00e1 el mercado abierto, accesible y adecuadamente abastecido para satisfacer las necesidades esenciales? (2) Precio: \u00bfest\u00e1n los precios de los productos esenciales dentro de un rango aceptable respecto a las l\u00edneas base previas a la crisis, y cu\u00e1l es la direcci\u00f3n de la tendencia de precios? (3) Viabilidad CBI: \u00bfson viables las modalidades de efectivo, dinero m\u00f3vil o vales en este mercado desde el lado de la oferta? La recolecci\u00f3n de datos utiliza dos fuentes simult\u00e1neas: la observaci\u00f3n directa del enumerador y la entrevista con informantes clave vendedores (KVI). La cesta de precios del M\u00f3dulo C se implementa como un grupo de repetici\u00f3n en XLSForm (una fila por producto). Se apoya en CaLP MISMA 2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA 2014, WFP MAG 2021, REACH JMMI, CRS MARKit 2023, FAO GIEWS FPMA, WFP VAM, CaLP Programme Quality Toolbox 2020, ACAPS 2014 y el Manual Sphere 2018.\n", "fr": "Un enregistrement ponctuel de la fonctionnalit\u00e9 d''un march\u00e9, de la disponibilit\u00e9 et des prix des produits, du statut de la cha\u00eene d''approvisionnement, de l''accessibilit\u00e9 et de la faisabilit\u00e9 des programmes en esp\u00e8ces (CBI) pour une seule visite de march\u00e9. Le sujet est un ServicePoint PS contraint \u00e0 service_point_type : market. Un enregistrement repr\u00e9sente une visite de march\u00e9 \u00e0 une date donn\u00e9e ; le m\u00eame march\u00e9 est visit\u00e9 de mani\u00e8re r\u00e9p\u00e9t\u00e9e (mensuellement ou bimensuellement, suivant le pr\u00e9c\u00e9dent JMMI) pour g\u00e9n\u00e9rer des donn\u00e9es de s\u00e9ries chronologiques. L''identit\u00e9 persistante du march\u00e9 (nom, coordonn\u00e9es GPS, zone administrative, population desservie) est stock\u00e9e dans l''enregistrement ServicePoint, pas recollect\u00e9e \u00e0 chaque visite de profil. Le profil r\u00e9pond \u00e0 trois questions op\u00e9rationnelles fondamentales r\u00e9currentes dans toutes les m\u00e9thodologies humanitaires de march\u00e9 : (1) Fonctionnalit\u00e9 \u2014 le march\u00e9 est-il ouvert, accessible et suffisamment approvisionn\u00e9 pour r\u00e9pondre aux besoins essentiels ? (2) Prix \u2014 les prix des produits essentiels sont-ils dans une fourchette acceptable par rapport aux niveaux de r\u00e9f\u00e9rence d''avant-crise, et quelle est la direction de la tendance des prix ? (3) Faisabilit\u00e9 CBI \u2014 les modalit\u00e9s esp\u00e8ces, mobile money ou bons sont-elles viables sur ce march\u00e9 du c\u00f4t\u00e9 de l''offre ? La collecte de donn\u00e9es utilise deux sources simultan\u00e9es : l''observation directe de l''enqu\u00eateur et l''entretien avec des informateurs cl\u00e9s vendeurs (KVI). Le panier de prix du Module C est impl\u00e9ment\u00e9 comme un groupe de r\u00e9p\u00e9tition dans XLSForm (une ligne par produit). S''appuie sur CaLP MISMA 2018, EMMA Toolkit v2 2017, ICRC RAM 2014, ICRC PCMA 2014, WFP MAG 2021, REACH JMMI, CRS MARKit 2023, FAO GIEWS FPMA, WFP VAM, CaLP Programme Quality Toolbox 2020, ACAPS 2014 et le Manuel Sphere 2018.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (market monitoring assessment)", "match": "close", "note": "A single market visit record serializes as a QuestionnaireResponse linked to a FHIR Location resource (the market as a named place). The Module C repeat group (price basket) maps naturally to a repeated Questionnaire item group. JMMI and WFP VAM digital platforms using FHIR would represent each commodity row as a repeated QuestionnaireResponse.item.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "MarketProfile", "label": {"en": "Market Profile", "es": "Perfil de mercado", "fr": "