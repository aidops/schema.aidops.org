      publicschema_logical_document_json: '{"bibliography_refs": ["crews-impact-based-forecasting-2021", "gfdrr-aa-toolkit-2023", "iasc-aap-early-response-2020", "ifrc-aa-eap-template-2022", "ifrc-fbf-ma-guide-2019", "ifrc-pgi-aa-toolkit", "paul-dutt-2010-cyclone-sidr", "roy-et-al-2015-odisha", "start-network-def", "undrr-sendai-target-g", "wmo-mhews-checklist-2018"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level early-warning response assessment. The domain tools live in humanitarian operations: IFRC Forecast-based Financing post-event monitoring forms, Start Network DEF household tools, WMO MHEWS Checklist (national system level, not household), CREWS impact-based forecasting MEL, and IOM Displacement Tracking Matrix household-level assessments in some country operations. The low v1 convergence reflects scope rather than prevalence; household-level warning response monitoring is the core instrument family of the rapidly growing Anticipatory Action portfolio. FHIR''s QuestionnaireResponse pattern accommodates the shape.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "An event-anchored, household-level record of the early-warning causal chain for a single recent hazard event: warning reception, comprehension of the message, trust in the source, protective actions taken, barriers encountered when action was partial or absent, and the household''s reflection on what would help them act more effectively next time. The profile is hazard-agnostic (flood, cyclone, drought, heatwave, epidemic, earthquake, landslide, wildfire, conflict displacement): protective-action and support codes that do not apply to a given hazard are simply not selected. The hazard event being referenced is identified by the enclosing survey session, carried by the inherited hazard-event context, or, where a structured reference is not available, by free-text observation context; no hazard-event property is collected directly on this profile. Item content aligns with the four pillars of the WMO Multi-Hazard Early Warning Systems Checklist (risk knowledge, detection and forecasting, warning dissemination, response capability) at the household endpoint, with IFRC Forecast-based Financing and Anticipatory Action MEAL indicators, with the CREWS impact-based forecasting MEL framework, with Sphere 2018 Core Standard 1 on people-centred information, and with the downstream measures of Sendai Framework Target G. Sensitivity: the profile is non-sensitive at household level, with one exception. The two permission-denied codes in the warning-action-barrier vocabulary (permission_denied_household_member and permission_denied_community_authority) can surface intra-household or community coercion that bears on protection and GBV analysis; those codes carry a sensitivity flag in the vocabulary. Enumerators should ask the barriers item in a private setting, and downstream systems should apply partial-sensitivity handling to records where either permission-denied code is selected.\n", "es": "Un registro anclado a un evento, a nivel del hogar, de la cadena causal de la alerta temprana para un evento de peligro reciente \u00fanico: recepci\u00f3n de la alerta, comprensi\u00f3n del mensaje, confianza en la fuente, acciones de protecci\u00f3n tomadas, obst\u00e1culos encontrados cuando la acci\u00f3n fue parcial o ausente, y reflexi\u00f3n del hogar sobre qu\u00e9 le ayudar\u00eda a actuar con mayor eficacia la pr\u00f3xima vez. El perfil es independiente del tipo de peligro (inundaci\u00f3n, cicl\u00f3n, sequ\u00eda, ola de calor, epidemia, sismo, deslizamiento, incendio forestal, desplazamiento por conflicto): los c\u00f3digos de acci\u00f3n de protecci\u00f3n y de apoyo que no aplican a un peligro dado simplemente no se seleccionan. El evento de peligro referenciado se identifica por la sesi\u00f3n de encuesta que lo contiene, se lleva por el contexto heredado de evento de peligro, o, cuando no hay una referencia estructurada disponible, por el contexto de observaci\u00f3n en texto libre; ninguna propiedad de evento de peligro se recopila directamente en este perfil. El contenido de los \u00edtems se alinea con los cuatro pilares de la Lista de verificaci\u00f3n de sistemas de alerta temprana multi-peligro de la OMM (conocimiento del riesgo, detecci\u00f3n y pron\u00f3stico, difusi\u00f3n de alertas, capacidad de respuesta) en el punto terminal del hogar, con los indicadores MEAL del financiamiento basado en pron\u00f3sticos y de la acci\u00f3n anticipatoria de la FICR, con el marco MEL de pron\u00f3stico basado en impactos del CREWS, con el Est\u00e1ndar Central 1 de Esfera 2018 sobre informaci\u00f3n centrada en las personas, y con las medidas posteriores de la Meta G del Marco de Sendai. Sensibilidad: el perfil es no sensible a nivel del hogar, con una excepci\u00f3n. Los dos c\u00f3digos de denegaci\u00f3n de permiso en el vocabulario warning-action-barrier (permission_denied_household_member y permission_denied_community_authority) pueden revelar coerci\u00f3n intrafamiliar o comunitaria relevante para el an\u00e1lisis de protecci\u00f3n y VBG; esos c\u00f3digos llevan un marcador de sensibilidad en el vocabulario. Los enumeradores deben preguntar el \u00edtem de barreras en un entorno privado, y los sistemas posteriores deben aplicar un tratamiento de sensibilidad parcial a los registros donde se seleccione cualquiera de los c\u00f3digos de denegaci\u00f3n de permiso.\n", "fr": "Un enregistrement ancr\u00e9 \u00e0 un \u00e9v\u00e9nement, au niveau du m\u00e9nage, de la cha\u00eene causale de l''alerte pr\u00e9coce pour un \u00e9v\u00e9nement dangereux r\u00e9cent unique : r\u00e9ception de l''alerte, compr\u00e9hension du message, confiance dans la source, actions de protection prises, obstacles rencontr\u00e9s lorsque l''action a \u00e9t\u00e9 partielle ou absente, et r\u00e9flexion du m\u00e9nage sur ce qui l''aiderait \u00e0 agir plus efficacement la prochaine fois. Le profil est ind\u00e9pendant du type de danger (inondation, cyclone, s\u00e9cheresse, canicule, \u00e9pid\u00e9mie, s\u00e9isme, glissement de terrain, incendie de for\u00eat, d\u00e9placement li\u00e9 aux conflits) : les codes d''action de protection et de soutien qui ne s''appliquent pas \u00e0 un danger donn\u00e9 ne sont simplement pas s\u00e9lectionn\u00e9s. L''\u00e9v\u00e9nement dangereux r\u00e9f\u00e9renc\u00e9 est identifi\u00e9 par la session d''enqu\u00eate englobante, port\u00e9 par le contexte d''\u00e9v\u00e9nement dangereux h\u00e9rit\u00e9, ou, lorsqu''une r\u00e9f\u00e9rence structur\u00e9e n''est pas disponible, par le contexte d''observation en texte libre ; aucune propri\u00e9t\u00e9 d''\u00e9v\u00e9nement dangereux n''est collect\u00e9e directement sur ce profil. Le contenu des items s''aligne sur les quatre piliers de la Liste de contr\u00f4le des syst\u00e8mes d''alerte pr\u00e9coce multi-dangers de l''OMM (connaissance du risque, d\u00e9tection et pr\u00e9vision, diffusion de l''alerte, capacit\u00e9 de r\u00e9ponse) au niveau du point terminal m\u00e9nage, sur les indicateurs MEAL du financement bas\u00e9 sur les pr\u00e9visions et de l''action anticipatoire de la FICR, sur le cadre MEL de pr\u00e9visions bas\u00e9es sur les impacts du CREWS, sur la Norme fondamentale 1 de Sph\u00e8re 2018 relative \u00e0 l''information centr\u00e9e sur les personnes, et sur les mesures en aval de la cible G du Cadre de Sendai. Sensibilit\u00e9 : le profil est non sensible au niveau du m\u00e9nage, avec une exception. Les deux codes de refus de permission dans le vocabulaire warning-action-barrier (permission_denied_household_member et permission_denied_community_authority) peuvent r\u00e9v\u00e9ler une contrainte intra-m\u00e9nage ou communautaire pertinente pour l''analyse protection et VBG ; ces codes portent un marqueur de sensibilit\u00e9 dans le vocabulaire. Les enqu\u00eateurs devraient poser l''item sur les obstacles dans un cadre priv\u00e9, et les syst\u00e8mes en aval devraient appliquer un traitement de sensibilit\u00e9 partielle aux enregistrements o\u00f9 l''un ou l''autre code de refus de permission est s\u00e9lectionn\u00e9.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (early warning response assessment)", "match": "close", "note": "A household-level warning response assessment serializes naturally as a QuestionnaireResponse against a Questionnaire aligned with the IFRC FbF post-distribution monitoring item set.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "WarningResponseProfile", "label": {"en": "Warning Response Profile", "es": "Perfil de respuesta a la alerta", "fr": "Profil de r\u00e9ponse \u00e0 l''alerte"}, "maturity": "draft", "properties": ["warning_received", "warning_lead_time_hours", "warning_channel_primary", "warning_channels_all", "warning_source_authority", "warning_understood", "warning_had_action_guidance", "warning_source_trust", "warning_actions_taken", "warning_action_primary", "evacuation_happened", "action_timing_relative_to_impact", "warning_action_barriers", "warning_primary_barrier", "received_prior_aa_support", "would_act_differently_next_time", "support_needed_to_act", "warning_reception_gender_gap"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "hazard_event", "properties": ["warning_received", "warning_lead_time_hours", "warning_channel_primary", "warning_channels_all", "warning_source_authority", "warning_understood", "warning_had_action_guidance", "warning_source_trust", "warning_actions_taken", "warning_action_primary", "action_timing_relative_to_impact", "warning_action_barriers", "warning_primary_barrier"]}, {"category": "scores",
        "properties": ["evacuation_happened"]}, {"category": "context", "properties": ["received_prior_aa_support", "would_act_differently_next_time", "support_needed_to_act", "warning_reception_gender_gap"]}], "subtypes": [], "supertypes": ["Profile"]}'
      bibliography_refs: crews-impact-based-forecasting-2021,gfdrr-aa-toolkit-2023,iasc-aap-early-response-2020,ifrc-aa-eap-template-2022,ifrc-fbf-ma-guide-2019,ifrc-pgi-aa-toolkit,paul-dutt-2010-cyclone-sidr,roy-et-al-2015-odisha,start-network-def,undrr-sendai-target-g,wmo-mhews-checklist-2018
  WASHAssessmentProfile:
    title:
      en: WASH Assessment Profile
      fr: Profil d'évaluation WASH
      es: Perfil de evaluación WASH
    description:
      en: 'A point-in-time household record of water, sanitation, and hygiene (WASH) conditions collected during a humanitarian needs assessment or programme monitoring exercise. Extends the WASH baseline held on SocioEconomicProfile; the six shared PublicSchema properties (water_source, water_collection_time_minutes, water_service_level, sanitation_facility, sanitation_shared_households, sanitation_service_level) are reused here without redefinition.

        The water domain adds: water source location and secondary source, quantity (litres per person per day), supply reliability, household water treatment practice and method, storage container type and coverage, and payment for water.

        The sanitation domain adds: facility condition and privacy, child feces disposal method, and fecal sludge emptying history (when and by whom) for on-site containment systems.

        The hygiene domain adds: handwashing facility presence (enumerator observation), facility type and location, observed water and soap availability at the facility, derived hygiene service level, and supplementary self-reported critical junctures and available hygiene items. Menstrual hygiene management (MHM) sub-properties capture access to private washing space, access to materials, and disposal method; these are age-gated via form roster to women and girls of menstruating age.

        Water quantity thresholds: Sphere minimum standard 15 L/p/d (acute emergency phase 7.5 L/p/d); UNHCR SENS potable storage threshold 10 L/p/d; JMP basic service aspiration for longer-term recovery 30+ L/p/d. Water service and sanitation service levels follow the WHO/UNICEF JMP five-rung ladder for SDG 6.1.1 and 6.2.1 monitoring. Hygiene service level follows the JMP three-rung ladder (basic / limited / no facility) for SDG 6.2.1.

        Water quality testing is deferred to an optional extended module (WASHExtendedProfile) requiring field equipment and enumerator training; it is not part of this core profile.'
      fr: 'Un enregistrement ponctuel des conditions d''eau, d''assainissement et d''hygiène (WASH) d''un ménage, collecté lors d''une évaluation humanitaire des besoins ou d''un exercice de suivi de programme. Étend la base WASH détenue sur SocioEconomicProfile; les six propriétés PublicSchema partagées (water_source, water_collection_time_minutes, water_service_level, sanitation_facility, sanitation_shared_households, sanitation_service_level) sont réutilisées ici sans redéfinition.

        Le domaine eau ajoute : l''emplacement de la source d''eau et la source secondaire, la quantité (litres par personne par jour), la fiabilité de l''approvisionnement, la pratique et la méthode de traitement de l''eau à domicile, le type et la couverture du récipient de stockage, et le paiement de l''eau.

        Le domaine assainissement ajoute : l''état et la confidentialité de l''installation, la méthode d''élimination des matières fécales des enfants, et l''historique de vidange des boues fécales (quand et par qui) pour les systèmes de confinement sur site.

        Le domaine hygiène ajoute : la présence d''un dispositif de lavage des mains (observation de l''énumérateur), le type et l''emplacement du dispositif, la disponibilité observée d''eau et de savon au dispositif, le niveau de service d''hygiène dérivé, et les moments critiques auto-déclarés et les articles d''hygiène disponibles en supplément. Les sous-propriétés de gestion de l''hygiène menstruelle (GHM) capturent l''accès à un espace de lavage privé, l''accès aux matériaux et la méthode d''élimination ; celles-ci sont filtrées par l''âge via le registre des formulaires pour les femmes et filles en âge de menstruer.

        Seuils de quantité d''eau : norme minimale Sphère 15 L/p/j (phase d''urgence aiguë 7,5 L/p/j) ; seuil de stockage potable SENS du HCR 10 L/p/j ; aspiration du service de base JMP pour le relèvement à long terme 30+ L/p/j. Les niveaux de service en eau et d''assainissement suivent l''échelle JMP OMS/UNICEF à cinq niveaux pour le suivi des ODD 6.1.1 et 6.2.1. Le niveau de service d''hygiène suit l''échelle JMP à trois niveaux (de base / limité / aucune installation) pour l''ODD 6.2.1.

        Les tests de qualité de l''eau sont reportés à un module étendu optionnel (WASHExtendedProfile) nécessitant du matériel de terrain et une formation des énumérateurs ; ils ne font pas partie de ce profil de base.'
      es: 'Un registro puntual de las condiciones de agua, saneamiento e higiene (WASH) de un hogar, recopilado durante una evaluación de necesidades humanitarias o un ejercicio de monitoreo de programa. Extiende la línea base WASH mantenida en SocioEconomicProfile; las seis propiedades PublicSchema compartidas (water_source, water_collection_time_minutes, water_service_level, sanitation_facility, sanitation_shared_households, sanitation_service_level) se reutilizan aquí sin redefinición.

        El dominio agua agrega: ubicación de la fuente de agua y fuente secundaria, cantidad (litros por persona por día), confiabilidad del suministro, práctica y método de tratamiento del agua en el hogar, tipo y cobertura del recipiente de almacenamiento, y pago por el agua.

        El dominio saneamiento agrega: condición y privacidad de la instalación, método de eliminación de heces de niños, e historial de vaciado de lodos fecales (cuándo y por quién) para sistemas de contención en el sitio.

        El dominio higiene agrega: presencia de instalación de lavado de manos (observación del enumerador), tipo y ubicación de la instalación, disponibilidad observada de agua y jabón en la instalación, nivel de servicio de higiene derivado, y momentos críticos autodeclarados y artículos de higiene disponibles de forma suplementaria. Las sub-propiedades de gestión de higiene menstrual (MHM) capturan el acceso a un espacio de lavado privado, acceso a materiales y método de eliminación; estas se filtran por edad a través del registro del formulario para mujeres y niñas en edad de menstruar.

        Umbrales de cantidad de agua: estándar mínimo Esfera 15 L/p/d (fase de emergencia aguda 7,5 L/p/d); umbral de almacenamiento potable SENS ACNUR 10 L/p/d; aspiración de servicio básico JMP para recuperación a largo plazo 30+ L/p/d. Los niveles de servicio de agua y saneamiento siguen la escala JMP OMS/UNICEF de cinco peldaños para el monitoreo de los ODS 6.1.1 y 6.2.1. El nivel de servicio de higiene sigue la escala JMP de tres peldaños (básico / limitado / sin instalación) para los ODS 6.2.1.

        Las pruebas de calidad del agua se difieren a un módulo extendido opcional (WASHExtendedProfile) que requiere equipamiento de campo y capacitación de enumeradores; no forman parte de este perfil principal.'
