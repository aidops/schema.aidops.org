nnent \u00e0 des instruments sp\u00e9cialis\u00e9s PSEA ou de gestion de cas VBG.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (AAP perception survey)", "match": "close", "note": "A household AAP perception survey serializes as a QuestionnaireResponse. FHIR R4 has no AAP-specific profile, and no humanitarian AAP FHIR implementation guide exists as of 2026. The derived boolean flags would be exposed as computed Observation resources or QuestionnaireResponse answer-derived measures.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "AccountabilityToAffectedPopulationsProfile", "label": {"en": "Accountability to Affected Populations Profile", "es": "Perfil de rendici\u00f3n de cuentas a las poblaciones afectadas", "fr": "Profil de redevabilit\u00e9 envers les populations affect\u00e9es"}, "maturity": "draft", "properties": ["responder_reference", "aap_info_received", "aap_info_eligibility_clear", "aap_info_distribution_timing_clear", "aap_info_how_to_register_clear", "aap_info_channel_preferred", "aap_consulted_before_aid", "aap_needs_reflected_in_aid", "aap_opinion_taken_into_account", "aap_complaint_channel_known", "aap_complaint_channel_known_types", "aap_complaint_would_use", "aap_complaint_would_use_why_not", "aap_complaint_filed_past", "aap_complaint_response_satisfaction", "aap_feels_safe_with_responders", "aap_trust_in_providers", "aap_psea_reporting_channel_known", "aap_psea_would_report", "aap_fear_of_retaliation", "aap_aid_timely", "aap_aid_met_priority_needs", "aap_aid_quantity_sufficient", "aap_selection_fair_perception", "aap_selection_process_transparent", "aap_no_one_asked_for_payment", "aap_treated_with_respect", "aap_staff_competent", "aap_dignity_preserved", "aap_informed_hh", "aap_consulted_hh", "aap_knows_complaint_channel", "aap_would_use_channel", "aap_feels_safe_with_staff_flag", "aap_knows_psea_reporting", "aap_aid_timely_flag", "aap_aid_relevant_flag", "aap_selection_fair_flag", "a