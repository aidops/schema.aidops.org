uando su huella geogr\u00e1fica no est\u00e9 bien definida. Los casos t\u00edpicos incluyen una comunidad de aldea de acogida, la poblaci\u00f3n de un sitio de desplazamiento, un bloque de un campamento, una comunidad mixta de acogida y desplazados, o un grupo pastoril en movimiento.\n", "fr": "Un collectif auto-identifi\u00e9 de personnes li\u00e9 par une r\u00e9sidence, une identit\u00e9 ou une exp\u00e9rience commune d''une crise, trait\u00e9 comme une unit\u00e9 de rapport unique pour l''\u00e9valuation au niveau communautaire. Une Communaut\u00e9 regroupe g\u00e9n\u00e9ralement plusieurs m\u00e9nages et constitue le sujet d''\u00e9valuations issues de discussions de groupes th\u00e9matiques, d''entretiens avec des informateurs cl\u00e9s ou de r\u00e9unions communautaires. Distinct de Location (qui nomme un lieu administratif ou g\u00e9ographique) et de Household (qui nomme une unit\u00e9 \u00e9conomique cor\u00e9sidente) : une Communaut\u00e9 est la voix sociale/collective, m\u00eame lorsque plusieurs de ses membres sont d\u00e9plac\u00e9s sur diff\u00e9rents sites ou que son emprise g\u00e9ographique n''est pas bien d\u00e9finie. Les cas typiques incluent une communaut\u00e9 villageoise d''accueil, la population d''un site de d\u00e9placement, un bloc d''un camp, une communaut\u00e9 mixte accueil-d\u00e9plac\u00e9s ou un groupe pastoraliste en d\u00e9placement.\n"}, "external_equivalents": {}, "featured": true, "id": "Community", "label": {"en": "Community", "es": "Comunidad", "fr": "Communaut\u00e9"}, "maturity": "draft", "properties": ["community_type", "located_at"], "property_groups": [{"category": "identity", "properties": ["name", "identifiers", "identity_documents"]}, {"category": "administrative", "properties": ["formation_date", "member_count", "memberships"]}, {"category": "classification", "properties": ["group_type", "community_type"]}, {"category": "location", "properties": ["located_at"]}], "subtypes": [], "supertypes": ["Group"]}'
  DisplacementProfile:
    title:
      en: Displacement Profile
      fr: Profil de déplacement
      es: Perfil de desplazamiento
    description:
      en: A point-in-time household-level record of displacement status, movement history, push factors, durable solution intentions, legal and documentation status, family separation, and displacement-specific protection needs. Designed for use in IOM DTM-style registration and Mobility Tracking operations, UNHCR registration, and interagency durable solutions assessments following the IASC Framework. The profile captures the "current state" of a household's displacement situation; a future DisplacementEvent sub-structure (Phase 2) will model multi-event histories for households with complex displacement trajectories. Displacement status (A1) is reused from the PublicSchema Person property displacement_status, which references the displacement-status vocabulary standardized by EGRISS IRIS.
      fr: Un enregistrement ponctuel au niveau du ménage du statut de déplacement, de l'historique des déplacements, des facteurs de départ, des intentions de solution durable, du statut juridique et documentaire, de la séparation familiale et des besoins de protection spécifiques liés au déplacement. Conçu pour les opérations d'enregistrement de style DTM de l'OIM et de suivi de la mobilité, l'enregistrement du HCR, et les évaluations interagences des solutions durables conformément au Cadre de l'IASC. Le profil capture l'état actuel de la situation de déplacement d'un ménage ; une sous-structure future DisplacementEvent (Phase 2) modélisera les historiques multi-événements pour les ménages avec des trajectoires de déplacement complexes.
      es: Un registro puntual a nivel del hogar del estado de desplazamiento, historial de movimientos, factores de expulsión, intenciones de solución duradera, estado jurídico y documental, separación familiar y necesidades de protección específicas relacionadas con el desplazamiento. Diseñado para operaciones de registro estilo IOM DTM y seguimiento de la movilidad, registro del ACNUR y evaluaciones interagenciales de soluciones duraderas siguiendo el Marco del IASC. El perfil captura el estado actual de la situación de desplazamiento de un hogar; una futura subestructura DisplacementEvent (Fase 2) modelará historiales de múltiples eventos para hogares con trayectorias de desplazamiento complejas.
