  NutritionPracticesProfile:
    title:
      en: Nutrition Practices Profile
      fr: Profil des pratiques nutritionnelles
      es: Perfil de prácticas nutricionales
    description:
      en: 'A point-in-time record of infant and young child feeding (IYCF) behaviors reported by a primary caregiver about an index child under 24 months of age. Each record is scoped to a single child (subject: Person aged 0–23 months completed); households with multiple children under 2 generate one record per child. Captures breastfeeding initiation and continuation, introduction of complementary foods, 24-hour dietary recall against the 8 MDD-C food groups, meal frequency, milk feeding frequency, unhealthy diet indicators (sweet beverages, unhealthy foods), and carries derived composite indicators (EBF, CBF, MDD-C, MMF, MMFF, MAD, EFF, zero-veg-fruit, age-appropriate breastfeeding). All IYCF items follow WHO/UNICEF 2021 indicator definitions. MDD-W (10-group dietary diversity for women 15–49) is not included in this profile; it is carried on FoodSecurityProfile via the wdds_* properties and mdd_w_score / mdd_w_achieved.'
      fr: 'Un enregistrement ponctuel des pratiques d''alimentation du nourrisson et du jeune enfant (IYCF) rapportées par le soignant principal sur un enfant index de moins de 24 mois. Chaque enregistrement est limité à un seul enfant (sujet : personne âgée de 0 à 23 mois révolus) ; les ménages comportant plusieurs enfants de moins de 2 ans génèrent un enregistrement par enfant. Consigne l''initiation et la poursuite de l''allaitement, l''introduction des aliments complémentaires, le rappel alimentaire sur 24 heures selon les 8 groupes alimentaires MDD-C, la fréquence des repas, la fréquence des repas lactés, les indicateurs d''alimentation non saine (boissons sucrées, aliments non sains), et porte les indicateurs composites dérivés (ALM, CBF, MDD-C, MMF, MMFF, MAD, EFF, consommation nulle de légumes/fruits, allaitement adapté à l''âge). Tous les items IYCF suivent les définitions d''indicateurs OMS/UNICEF 2021. Le MDD-W (diversité alimentaire à 10 groupes pour les femmes de 15 à 49 ans) n''est pas inclus dans ce profil ; il est porté par le FoodSecurityProfile via les propriétés wdds_* et mdd_w_score / mdd_w_achieved.'
      es: 'Un registro puntual de las prácticas de alimentación del lactante y del niño pequeño (IYCF) reportadas por el cuidador principal sobre un niño índice menor de 24 meses. Cada registro está delimitado a un solo niño (sujeto: persona de 0–23 meses cumplidos); los hogares con múltiples niños menores de 2 años generan un registro por niño. Captura la iniciación y continuación de la lactancia materna, la introducción de alimentos complementarios, el recordatorio dietético de 24 horas contra los 8 grupos alimentarios MDD-C, la frecuencia de comidas, la frecuencia de tomas de leche, indicadores de dieta no saludable (bebidas azucaradas, alimentos no saludables), y lleva indicadores compuestos derivados (LME, CBF, MDD-C, MMF, MMFF, MAD, EFF, consumo nulo de verduras/frutas, lactancia materna apropiada para la edad). Todos los ítems IYCF siguen las definiciones de indicadores OMS/UNICEF 2021. El MDD-W (diversidad dietética de 10 grupos para mujeres de 15–49 años) no se incluye en este perfil; se lleva en FoodSecurityProfile a través de las propiedades wdds_* y mdd_w_score / mdd_w_achieved.'
    is_a: Profile
    class_uri: aidops:NutritionPracticesProfile
    slots:
    - child_age_months
    - iycf_ever_breastfed
