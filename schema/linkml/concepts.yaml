    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "sphere-2018", "unhcr-nfi-pdm-2025"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level NFI adequacy assessment. The domain tools live in humanitarian operations: UNHCR Global NFI Post-Distribution Monitoring (PDM), Global Shelter Cluster Standardised Shelter Indicators, Sphere NFI minimum standards, and IFRC/ICRC Emergency Items Catalogue. The low v1 convergence reflects scope rather than prevalence; NFI assessments are widely deployed in shelter and settlement responses.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A household-level record of whether the household has the minimum non-food items (NFIs) required to meet Sphere 2018 minimum standards for clothing and bedding (Standard 1), cooking and eating utensils (Standard 2), stoves, fuel and lighting equipment (Standard 3), and tools and equipment (Standard 4). Captures count and condition questions for each item category, self-report sufficiency at the standard and overall levels, priority unmet needs, and receipt of NFIs from aid organisations in the past 3 months. Derives four binary Sphere-pass indicators (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) and feeds the Global Shelter Cluster composite NFI outcome indicator. Complementary to EnergyAccessProfile (which covers fuel type, stove technology category, and MTF tier) and ShelterAdequacyProfile (which carries the single-summary has_sleeping_items and has_cooking_items screen items reused on this profile for continuity). Assumes per-household household_size is available from household_registration to compute per-capita thresholds.\n", "es": "Un registro a nivel del hogar que indica si el hogar tiene los art\u00edculos no alimentarios (ANF) m\u00ednimos requeridos para cumplir con los est\u00e1ndares m\u00ednimos Esfera 2018 para ropa y cama (Norma 1), utensilios de cocina y de comer (Norma 2), cocinas, combustible y equipo de iluminaci\u00f3n (Norma 3), y herramientas y equipo (Norma 4). Registra preguntas de conteo y condici\u00f3n para cada categor\u00eda de art\u00edculos, auto-reportes de suficiencia a nivel de cada norma y a nivel general, necesidades prioritarias no satisfechas y recepci\u00f3n de ANF de organizaciones de ayuda en los \u00faltimos 3 meses. Deriva cuatro indicadores binarios de cumplimiento Esfera (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) y alimenta el indicador compuesto de resultado ANF del Cl\u00faster Global de Refugio. Complementario a EnergyAccessProfile (que cubre el tipo de combustible, la categor\u00eda tecnol\u00f3gica de la cocina y el nivel MTF) y a ShelterAdequacyProfile (que lleva los \u00edtems resumen has_sleeping_items y has_cooking_items reutilizados en este perfil para continuidad). Supone que el tama\u00f1o del hogar est\u00e1 disponible desde household_registration para calcular los umbrales per c\u00e1pita.\n", "fr": "Un enregistrement au niveau du m\u00e9nage indiquant si le m\u00e9nage dispose des articles non alimentaires (ANA) minimaux n\u00e9cessaires pour r\u00e9pondre aux normes minimales Sph\u00e8re 2018 pour les v\u00eatements et la literie (Norme 1), les ustensiles de cuisine et de repas (Norme 2), les foyers, le combustible et l''\u00e9quipement d''\u00e9clairage (Norme 3), et les outils et \u00e9quipements (Norme 4). Consigne des questions de d\u00e9nombrement et d''\u00e9tat pour chaque cat\u00e9gorie d''articles, des auto-d\u00e9clarations de suffisance au niveau de chaque norme et au niveau global, les besoins prioritaires non satisfaits et la r\u00e9ception d''ANA d''organisations d''aide au cours des 3 derniers mois. D\u00e9rive quatre indicateurs binaires de conformit\u00e9 Sph\u00e8re (sphere_clothing_pass, sphere_cooking_pass, sphere_stove_fuel_pass, sphere_tools_pass) et alimente l''indicateur de r\u00e9sultat composite ANA du Cluster Abri Mondial. Compl\u00e9mentaire \u00e0 EnergyAccessProfile (qui couvre le type de combustible, la cat\u00e9gorie technologique du foyer et le niveau MTF) et \u00e0 ShelterAdequacyProfile (qui porte les items de r\u00e9sum\u00e9 has_sleeping_items et has_cooking_items r\u00e9utilis\u00e9s sur ce profil pour la continuit\u00e9). Suppose que la taille du m\u00e9nage est disponible depuis household_registration pour calculer les seuils par habitant.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (NFI adequacy assessment)", "match": "close", "note": "A household NFI assessment serializes as a QuestionnaireResponse against a Questionnaire aligned with the Sphere NFI standards. The derived sphere_*_pass scores are better represented as RiskAssessment or Observation resources produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "NFIProfile", "label": {"en": "Non-Food Item (NFI) Profile", "es": "Perfil de art\u00edculos no alimentarios (ANF)", "fr": "Profil des articles non alimentaires (ANA)"}, "maturity": "draft", "properties": ["blankets_count", "blankets_condition", "sleeping_mat_count", "climate_appropriate_clothing_all", "mosquito_net_count", "clothing_bedding_sufficient", "large_cooking_pot_count", "small_cooking_pot_count", "plates_count", "cups_count", "kitchen_knife_present", "serving_spoon_count", "cooking_water_container_with_lid_present", "utensil_washing_soap_available", "cooking_utensils_sufficient", "has_functional_stove", "stove_condition", "matches_or_lighter_available", "fuel_jerrycan_count", "stove_fuel_lighting_sufficient", "shelter_repair_tool_kit_present", "digging_tool_present", "rope_or_fastening_present", "water_jerrycan_count", "tools_equipment_sufficient", "nfi_overall_sufficient", "nfi_unmet_needs_priority", "nfi_received_past_3mo", "has_sleeping_items", "has_cooking_items", "sphere_clothing_pass", "sphere_cooking_pass", "sphere_stove_fuel_pass", "sphere_tools_pass"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "nfi", "properties": ["blankets_count", "blankets_condition", "sleeping_mat_count", "climate_appropriate_clothing_all", "mosquito_net_count", "clothing_bedding_sufficient", "has_sleeping_items", "large_cooking_pot_count", "small_cooking_pot_count", "plates_count", "cups_count", "kitchen_knife_present", "serving_spoon_count", "cooking_water_container_with_lid_present", "utensil_washing_soap_available", "cooking_utensils_sufficient", "has_cooking_items", "has_functional_stove", "stove_condition", "matches_or_lighter_available", "fuel_jerrycan_count", "stove_fuel_lighting_sufficient", "shelter_repair_tool_kit_present", "digging_tool_present", "rope_or_fastening_present", "water_jerrycan_count", "tools_equipment_sufficient", "nfi_overall_sufficient", "nfi_unmet_needs_priority", "nfi_received_past_3mo"]}, {"category": "scores", "properties": ["sphere_clothing_pass", "sphere_cooking_pass", "sphere_stove_fuel_pass", "sphere_tools_pass"]}], "subtypes": [], "supertypes": ["Profile"]}'
