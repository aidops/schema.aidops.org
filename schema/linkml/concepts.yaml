    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022", "ellsberg-heise-2005", "gbvims-intake-standards", "iasc-gbv-guidelines-2015", "who-mcs-domestic-violence-2005", "who-putting-women-first-2001"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a population-level individual IPV experience monitoring module in core. GBV experience data in those systems, where present at all, is confined to case-management records in GBVIMS or Primero (survivors, incident types, case plans) rather than population-level monitoring indicators. The zero v1 convergence reflects the origin of this module in humanitarian demographic surveys (DHS, MICS) and research instruments (WHO MCS); it is deployed in DHS country surveys, MSNA specialist rounds, and stand-alone protection assessments, not in social-protection registries. The minimum-aggregate-n-30 rule and DUA requirement for individual records are additional barriers to integration with standard registry architectures.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A person-level record of a woman''s self-reported experiences of intimate partner violence (IPV), including physical, sexual, and emotional violence; partner controlling behaviors; physical consequences of violence; help-seeking and disclosure; barriers to help-seeking; and safety signals (violence during pregnancy, previous partner violence, non-partner sexual violence). The primary instrument canon is the DHS-8 Domestic Violence module (Section 9, 2022), with ethics and safety protocols governed by Ellsberg and Heise (2005) and WHO ''Putting Women First'' (2001). The subject is the randomly pre-selected woman age 15-49 (one per sampled household) who is eligible for and consents to this module.\nSENSITIVITY: All properties carry sensitivity: restricted (the most protective tier in AidOps). The restricted tier requires: (1) minimum aggregate n of 30 before any statistic is published or shared; (2) no individual-record export without a named, signed data-use agreement (DUA) identifying the receiving organization, the analytic purpose, and a destruction-or-return clause; (3) mandatory pre-mapped referral pathway before any deployment; (4) separate access-control layer in any data warehouse with explicit role assignment.\nOPERATIONAL PREREQUISITES (deployment gate conditions, not capturable data items): (1) Trained female enumerator only; male enumerators are not permitted under any circumstances. (2) One randomly pre-selected woman per sampled household using a pre-set randomization scheme (Kish grid or EPSEM). If the selected woman declines or is ineligible, the module is skipped for that household; no substitution is permitted. (3) Private interview setting with no other adults present; if privacy cannot be secured, the module must be skipped. (4) Retraumatization-warning consent introduction before the module, including: the option to decline any question or stop at any time; a safe-word or nonverbal signal option; confirmation that answers will not be shared with the partner or household. (5) Pre-mapped GBV referral pathway: at least one operating GBV service provider contacted, confirmed active, and printed on a discreet referral card carried by every enumerator. If no operating provider can be identified, the module must NOT be fielded. Referral cards are offered to every respondent regardless of disclosure to avoid marking disclosers. (6) Three-tier distress-response protocol: Tier 1 (mild distress, pause and wait), Tier 2 (active distress, stop module, offer referral card), Tier 3 (severe distress, stop full interview, emergency protocol). All tiers adapted from Ellsberg and Heise (2005).\nDIFFERENTIATION FROM GBVRiskProfile: GBVRiskProfile is a household-level record of environmental, service-availability, and caregiver-reported GBV risk indicators (sensitivity: sensitive, general-purpose enumerators, no specialist training required). IndividualGBVExperienceProfile is the individual-disclosure complement: it captures a woman''s direct experience of violence, requires specialist conditions throughout, and carries sensitivity: restricted for all properties.\nOUT OF SCOPE: (1) Case-management intake fields (incident ID, incident date, location, perpetrator biodata, case status, action plan, referral record): these belong to GBVIMS / Primero. (2) Child sexual abuse and child protection items: owned by ChildProtectionProfile. (3) GBV service availability, WGSS presence, environmental risk factors: owned by GBVRiskProfile. (4) Attitudes toward wife beating: belongs in a future GenderNormsProfile. (5) Alcohol use by partner (DV11-DV12): analytical risk-factor covariate, not a monitoring indicator. (6) Fear of partner (DV13): analytical covariate, candidate for Phase 2 extension. (7) Intergenerational violence exposure (DV30: did father beat mother): analytical risk factor. (8) Non-partner sexual violence before age 15: boundary item with ChildProtectionProfile.\nCANON CITATIONS: DHS-8 Domestic Violence Module (2022); Ellsberg and Heise (2005); WHO ''Putting Women First'' (2001).\n", "es": "Registro a nivel de persona de las experiencias autodeclaradas de violencia de pareja \u00edntima (VPI) de una mujer, incluyendo violencia f\u00edsica, sexual y emocional, comportamientos controladores del compa\u00f1ero, consecuencias f\u00edsicas de la violencia, b\u00fasqueda de ayuda y divulgaci\u00f3n, barreras para buscar ayuda, y se\u00f1ales de seguridad. El instrumento canon es el m\u00f3dulo de Violencia Dom\u00e9stica DHS-8 (Secci\u00f3n 9, 2022), con protocolos \u00e9ticos y de seguridad regulados por Ellsberg y Heise (2005) y la OMS ''Las mujeres primero'' (2001). El sujeto es la mujer de 15-49 a\u00f1os preseleccionada aleatoriamente (una por hogar muestreado) elegible y con consentimiento para este m\u00f3dulo.\nSENSIBILIDAD: Todas las propiedades tienen sensitivity: restricted. El nivel restringido requiere n agregado m\u00ednimo de 30 antes de publicar, acuerdo de uso de datos firmado para exportaci\u00f3n de registros individuales, ruta de derivaci\u00f3n pre-mapeada antes del despliegue, y control de acceso diferenciado en el almac\u00e9n de datos.\nDIFERENCIACI\u00d3N DE GBVRiskProfile: GBVRiskProfile es un registro a nivel de hogar de factores de riesgo VBG ambientales y de disponibilidad de servicios (sensitivity: sensitive, encuestadores de prop\u00f3sito general). IndividualGBVExperienceProfile es el complemento de divulgaci\u00f3n individual, requiriendo condiciones especializadas y con sensitivity: restricted en todas las propiedades.\n", "fr": "Enregistrement au niveau de la personne des exp\u00e9riences autod\u00e9clar\u00e9es de violences du partenaire intime (VPI) d''une femme, y compris les violences physiques, sexuelles et \u00e9motionnelles, les comportements de contr\u00f4le du partenaire, les cons\u00e9quences physiques des violences, la recherche d''aide et la divulgation, les obstacles \u00e0 la recherche d''aide, et les signaux de s\u00e9curit\u00e9. L''instrument canon est le module Violence domestique DHS-8 (Section 9, 2022), avec des protocoles d''\u00e9thique et de s\u00e9curit\u00e9 r\u00e9gis par Ellsberg et Heise (2005) et le document de l''OMS ''Mettre les femmes en premier'' (2001). Le sujet est la femme de 15-49 ans pr\u00e9alablement s\u00e9lectionn\u00e9e de mani\u00e8re al\u00e9atoire (une par m\u00e9nage \u00e9chantillonn\u00e9) \u00e9ligible et consentante \u00e0 ce module.\nSENSIBILIT\u00c9 : Toutes les propri\u00e9t\u00e9s portent sensitivity: restricted. Le niveau restreint requiert un agr\u00e9gat minimum de 30 individus avant toute publication, un accord d''utilisation des donn\u00e9es sign\u00e9 pour tout export de donn\u00e9es individuelles, une fili\u00e8re de r\u00e9f\u00e9rencement pr\u00e9-cartographi\u00e9e avant tout d\u00e9ploiement, et un contr\u00f4le d''acc\u00e8s distinct en entrep\u00f4t de donn\u00e9es.\nDIFF\u00c9RENCIATION DE GBVRiskProfile : GBVRiskProfile est un enregistrement au niveau du m\u00e9nage des facteurs de risque VBG environnementaux et de disponibilit\u00e9 des services (sensitivity: sensitive, enqu\u00eateurs g\u00e9n\u00e9ralistes). IndividualGBVExperienceProfile est le compl\u00e9ment de divulgation individuelle, n\u00e9cessitant des conditions sp\u00e9cialis\u00e9es et portant sensitivity: restricted pour toutes les propri\u00e9t\u00e9s.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (GBV individual experience)", "match": "close", "note": "An individual GBV experience disclosure serializes as a FHIR QuestionnaireResponse with subject typed to a Patient (the interviewed woman). The act-level items map to QuestionnaireResponse.item entries. Physical consequence and derived indicators may map to FHIR Observation resources on the same patient. There is no GBV-specific FHIR profile in core R4; the GBV AoR does not publish a FHIR implementation guide as of 2026.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "IndividualGBVExperienceProfile", "label": {"en": "Individual GBV Experience Profile", "es": "Perfil de experiencia individual de VBG", "fr": "Profil d''exp\u00e9rience individuelle de VBG"}, "maturity": "draft", "properties": ["gbv_module_consent_obtained", "interview_module_completed_gbv_dv", "gbv_partner_type_referent", "gbv_partner_relationship_status", "gbv_ctrl_jealous_other_men", "gbv_ctrl_accuses_infidelity", "gbv_ctrl_restricts_friends", "gbv_ctrl_limits_family_contact", "gbv_ctrl_monitors_whereabouts", "gbv_ctrl_controls_money", "gbv_ctrl_discriminates_spending", "gbv_phys_push_shake_throw_lifetime", "gbv_phys_push_shake_throw_12m_freq", "gbv_phys_slap_lifetime", "gbv_phys_slap_12m_freq", "gbv_phys_twist_arm_pull_hair_lifetime", "gbv_phys_twist_arm_pull_hair_12m_freq", "gbv_phys_punch_lifetime", "gbv_phys_punch_12m_freq",
        "gbv_phys_kick_drag_beat_lifetime", "gbv_phys_kick_drag_beat_12m_freq", "gbv_phys_choke_burn_lifetime", "gbv_phys_choke_burn_12m_freq", "gbv_phys_weapon_threat_lifetime", "gbv_phys_weapon_threat_12m_freq", "gbv_sex_forced_intercourse_lifetime", "gbv_sex_forced_intercourse_12m_freq", "gbv_sex_forced_other_acts_lifetime", "gbv_sex_forced_other_acts_12m_freq", "gbv_sex_forced_with_threats_lifetime", "gbv_sex_forced_with_threats_12m_freq", "gbv_emot_humiliate_lifetime", "gbv_emot_humiliate_12m_freq", "gbv_emot_threaten_harm_lifetime", "gbv_emot_threaten_harm_12m_freq", "gbv_emot_insult_lifetime", "gbv_emot_insult_12m_freq", "gbv_conseq_cuts_bruises_aches", "gbv_conseq_eye_injury_sprains_burns", "gbv_conseq_serious_injury", "gbv_conseq_sought_medical_care", "gbv_helpseeking_attempted", "gbv_helpseeking_sources", "gbv_disclosure_told_anyone", "gbv_helpseeking_barriers", "gbv_safety_violence_during_pregnancy", "gbv_safety_violence_preg_perpetrator", "gbv_initiation_ever", "gbv_initiation_12m_freq", "gbv_prev_partner_phys_violence", "gbv_prev_partner_sex_violence", "gbv_prev_partner_emot_violence", "gbv_prev_partner_timing", "gbv_nonpartner_sex_violence_lifetime", "gbv_nonpartner_sex_violence_perpetrator", "gbv_ipv_physical_lifetime_ever", "gbv_ipv_physical_12m_ever", "gbv_ipv_sexual_lifetime_ever", "gbv_ipv_sexual_12m_ever", "gbv_ipv_emotional_lifetime_ever", "gbv_ipv_emotional_12m_ever", "gbv_ipv_any_lifetime_ever", "gbv_ipv_any_12m_ever", "gbv_ipv_controlling_behavior_count", "gbv_ipv_severity_tier", "gbv_ipv_any_physical_severe_lifetime"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "gbv_consent", "properties": ["gbv_module_consent_obtained"]}, {"category": "gbv_module_admin", "properties": ["interview_module_completed_gbv_dv", "gbv_partner_type_refere