classes:
  AccountabilityToAffectedPopulationsProfile:
    title:
      en: Accountability to Affected Populations Profile
      fr: Profil de redevabilité envers les populations affectées
      es: Perfil de rendición de cuentas a las poblaciones afectadas
    description:
      en: 'A household-level record of perception and experience indicators measuring the quality of accountability to affected populations (AAP) in humanitarian assistance. This profile covers seven thematic groups: (A) information provision, covering whether the household received understandable information about eligibility, distribution timing, and registration procedures, plus preferred information channels; (B) consultation and participation, covering whether the household was consulted on its needs and whether feedback was reflected in programme design; (C) feedback and complaint mechanisms, covering awareness of channels, willingness to use them, barriers to use, past usage, and satisfaction with responses; (D) trust and safety in interactions with responders, including safety perception, trust, PSEA reporting-channel awareness, willingness to report, and fear of retaliation; (E) timeliness and appropriateness of aid received; (F) perceived fairness and transparency of targeting; and (G) respect and dignity in staff interactions. The profile is designed for general-purpose enumerators under standard household-survey conditions; the seven PSEA-adjacent items (all of Group D, item C4 on complaint-channel barriers, and item F3 on integrity breaches) are flagged `sensitive` and require private-interview conditions and a spontaneous-disclosure referral pathway. The optional `responder_reference` property links the instrument to a specific responder or programme; when populated, implementers MUST escalate the sensitivity of all trust-and- safety items to `restricted` because responses become attributable. Aggregated indicators align with CHS 2024 Commitments, IASC CAAP 2017, IASC/REACH AAP Menu 2018, GTS HVI pillars, IFRC CEA Toolkit, OCHA MSNA AAP module, and Sphere 2018 Core Standards. The profile does NOT record perpetrator details, individual survivor disclosures, or case-management data; those belong to specialist PSEA or GBV case-management instruments.'
      fr: 'Un enregistrement au niveau du ménage des indicateurs de perception et d''expérience mesurant la qualité de la redevabilité envers les populations affectées (AAP) dans l''assistance humanitaire. Ce profil couvre sept groupes thématiques : (A) fourniture d''information, couvrant la réception par le ménage d''informations compréhensibles sur l''éligibilité, le calendrier des distributions et les procédures d''inscription, ainsi que les canaux d''information préférés ; (B) consultation et participation, couvrant si le ménage a été consulté sur ses besoins et si les retours ont été reflétés dans la conception du programme ; (C) mécanismes de retour et de plaintes, couvrant la connaissance des canaux, la volonté de les utiliser, les obstacles à leur utilisation, l''utilisation passée et la satisfaction des réponses ; (D) confiance et sécurité dans les interactions avec les répondants, y compris la perception de sécurité, la confiance, la connaissance des canaux de signalement PSEA, la volonté de signaler et la peur de représailles ; (E) rapidité et pertinence de l''aide reçue ; (F) équité et transparence perçues du ciblage ; et (G) respect et dignité dans les interactions avec le personnel. Le profil est conçu pour des enquêteurs généralistes dans des conditions standard d''enquête ménage ; les sept items adjacents PSEA (tout le groupe D, l''item C4 sur les obstacles au canal de plainte, et l''item F3 sur les atteintes à l''intégrité) sont marqués `sensitive` et nécessitent des conditions d''entretien privé et une filière de divulgation spontanée. La propriété optionnelle `responder_reference` lie l''instrument à un répondant ou programme spécifique ; lorsqu''elle est renseignée, les implémenteurs DOIVENT élever la sensibilité de tous les items de confiance et de sécurité à `restricted` car les réponses deviennent attribuables. Les indicateurs agrégés s''alignent sur les Engagements CHS 2024, IASC CAAP 2017, le Menu AAP IASC/REACH 2018, les piliers GTS HVI, la boîte à outils IFRC CEA, le module AAP MSNA OCHA, et les normes essentielles Sphère 2018. Le profil n''enregistre PAS les détails sur les auteurs, les divulgations individuelles de survivants, ni les données de gestion de cas ; celles-ci appartiennent à des instruments spécialisés PSEA ou de gestion de cas VBG.'
      es: 'Un registro a nivel del hogar de indicadores de percepción y experiencia que miden la calidad de la rendición de cuentas a las poblaciones afectadas (AAP) en la asistencia humanitaria. Este perfil cubre siete grupos temáticos: (A) provisión de información, cubriendo si el hogar recibió información comprensible sobre elegibilidad, calendario de distribuciones y procedimientos de inscripción, además de canales de información preferidos; (B) consulta y participación, cubriendo si el hogar fue consultado sobre sus necesidades y si la retroalimentación se reflejó en el diseño del programa; (C) mecanismos de retroalimentación y quejas, cubriendo conocimiento de canales, disposición a usarlos, barreras de uso, uso pasado y satisfacción con respuestas; (D) confianza y seguridad en las interacciones con los responsables, incluyendo percepción de seguridad, confianza, conocimiento del canal de reporte PSEA, disposición a reportar y temor a represalias; (E) oportunidad y pertinencia de la ayuda recibida; (F) equidad y transparencia percibidas del direccionamiento; y (G) respeto y dignidad en las interacciones con el personal. El perfil está diseñado para encuestadores de propósito general en condiciones estándar de encuesta de hogares; los siete ítems adyacentes a PSEA (todo el Grupo D, el ítem C4 sobre barreras al canal de queja, y el ítem F3 sobre violaciones de integridad) están marcados `sensitive` y requieren condiciones de entrevista privada y una vía de derivación por divulgación espontánea. La propiedad opcional `responder_reference` vincula el instrumento a un responsable o programa específico; cuando se completa, los implementadores DEBEN elevar la sensibilidad de todos los ítems de confianza y seguridad a `restricted` porque las respuestas se vuelven atribuibles. Los indicadores agregados se alinean con los Compromisos CHS 2024, IASC CAAP 2017, el Menú AAP IASC/REACH 2018, los pilares GTS HVI, la caja de herramientas IFRC CEA, el módulo AAP MSNA de OCHA y las Normas Básicas Esfera 2018. El perfil NO registra detalles de perpetradores, divulgaciones individuales de sobrevivientes, ni datos de gestión de casos; estos pertenecen a instrumentos especializados PSEA o de gestión de casos VBG.'
