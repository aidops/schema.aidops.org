    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-mdd-c", "who-iycf-2021"], "convergence": {"notes": "FHIR QuestionnaireResponse is the closest structural equivalent for caregiver-reported IYCF batteries. DHIS2 routinely models IYCF indicators as tracked-entity data elements per visit in national nutrition programs, but the data-element structure is program-specific. OpenSPP, OpenCRVS, openIMIS, and DCI Core do not carry IYCF feeding data in their core data models. All IYCF properties are new to AidOps; no existing PS or AidOps properties could be reused. MDD-W items were intentionally excluded and remain on FoodSecurityProfile.\n", "system_count": 1, "total_systems": 6}, "definition": {"en": "A point-in-time record of infant and young child feeding (IYCF) behaviors reported by a primary caregiver about an index child under 24 months of age. Each record is scoped to a single child (subject: Person aged 0\u201323 months completed); households with multiple children under 2 generate one record per child. Captures breastfeeding initiation and continuation, introduction of complementary foods, 24-hour dietary recall against the 8 MDD-C food groups, meal frequency, milk feeding frequency, unhealthy diet indicators (sweet beverages, unhealthy foods), and carries derived composite indicators (EBF, CBF, MDD-C, MMF, MMFF, MAD, EFF, zero-veg-fruit, age-appropriate breastfeeding). All IYCF items follow WHO/UNICEF 2021 indicator definitions. MDD-W (10-group dietary diversity for women 15\u201349) is not included in this profile; it is carried on FoodSecurityProfile via the wdds_* properties and mdd_w_score / mdd_w_achieved.\n", "es": "Un registro puntual de las pr\u00e1cticas de alimentaci\u00f3n del lactante y del ni\u00f1o peque\u00f1o (IYCF) reportadas por el cuidador principal sobre un ni\u00f1o \u00edndice menor de 24 meses. Cada registro est\u00e1 delimitado a un solo ni\u00f1o (sujeto: persona de 0\u201323 meses cumplidos); los hogares con m\u00faltiples ni\u00f1os menores de 2 a\u00f1os generan un registro por ni\u00f1o. Captura la iniciaci\u00f3n y continuaci\u00f3n de la lactancia materna, la introducci\u00f3n de alimentos complementarios, el recordatorio diet\u00e9tico de 24 horas contra los 8 grupos alimentarios MDD-C, la frecuencia de comidas, la frecuencia de tomas de leche, indicadores de dieta no saludable (bebidas azucaradas, alimentos no saludables), y lleva indicadores compuestos derivados (LME, CBF, MDD-C, MMF, MMFF, MAD, EFF, consumo nulo de verduras/frutas, lactancia materna apropiada para la edad). Todos los \u00edtems IYCF siguen las definiciones de indicadores OMS/UNICEF 2021. El MDD-W (diversidad diet\u00e9tica de 10 grupos para mujeres de 15\u201349 a\u00f1os) no se incluye en este perfil; se lleva en FoodSecurityProfile a trav\u00e9s de las propiedades wdds_* y mdd_w_score / mdd_w_achieved.\n", "fr": "Un enregistrement ponctuel des pratiques d''alimentation du nourrisson et du jeune enfant (IYCF) rapport\u00e9es par le soignant principal sur un enfant index de moins de 24 mois. Chaque enregistrement est limit\u00e9 \u00e0 un seul enfant (sujet : personne \u00e2g\u00e9e de 0 \u00e0 23 mois r\u00e9volus) ; les m\u00e9nages comportant plusieurs enfants de moins de 2 ans g\u00e9n\u00e8rent un enregistrement par enfant. Consigne l''initiation et la poursuite de l''allaitement, l''introduction des aliments compl\u00e9mentaires, le rappel alimentaire sur 24 heures selon les 8 groupes alimentaires MDD-C, la fr\u00e9quence des repas, la fr\u00e9quence des repas lact\u00e9s, les indicateurs d''alimentation non saine (boissons sucr\u00e9es, aliments non sains), et porte les indicateurs composites d\u00e9riv\u00e9s (ALM, CBF, MDD-C, MMF, MMFF, MAD, EFF, consommation nulle de l\u00e9gumes/fruits, allaitement adapt\u00e9 \u00e0 l''\u00e2ge). Tous les items IYCF suivent les d\u00e9finitions d''indicateurs OMS/UNICEF 2021. Le MDD-W (diversit\u00e9 alimentaire \u00e0 10 groupes pour les femmes de 15 \u00e0 49 ans) n''est pas inclus dans ce profil ; il est port\u00e9 par le FoodSecurityProfile via les propri\u00e9t\u00e9s wdds_* et mdd_w_score / mdd_w_achieved.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (IYCF feeding practices)", "match": "close", "note": "Each IYCF administration maps to a QuestionnaireResponse whose Questionnaire is the WHO/UNICEF 2021 IYCF module. The index child is the FHIR subject; the caregiver respondent is captured in the source field. Derived IYCF composite indicators (EBF, MAD, MDD-C) map to FHIR Observation resources produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "NutritionPracticesProfile", "label": {"en": "Nutrition Practices Profile", "es": "Perfil de pr\u00e1cticas nutricionales", "fr": "Profil des pratiques nutritionnelles"}, "maturity": "draft", "properties": ["child_age_months", "iycf_ever_breastfed", "iycf_early_initiation", "iycf_exclusive_first_two_days", "iycf_currently_breastfed", "iycf_breastfed_yesterday", "iycf_plain_water_yesterday", "iycf_other_liquids_yesterday", "iycf_infant_formula_yesterday", "iycf_animal_milk_yesterday", "iycf_bottle_fed_yesterday", "iycf_solid_food_yesterday", "iycf_fg_breastmilk", "iycf_fg_grains", "iycf_fg_pulses_nuts", "iycf_fg_dairy", "iycf_fg_flesh", "iycf_fg_eggs", "iycf_fg_vitamin_a_veg_fruit", "iycf_fg_other_veg_fruit", "iycf_solid_meal_count", "iycf_milk_feed_count", "iycf_sweet_beverage_yesterday", "iycf_unhealthy_food_yesterday", "iycf_cf_introduction_age_months", "iycf_ebf", "iycf_cbf", "iycf_mdd_c_score", "iycf_mdd_c", "iycf_mmf", "iycf_mmff", "iycf_mad", "iycf_eff", "iycf_zero_veg_fruit", "iycf_age_appropriate_breastfeeding"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "breastfeeding", "properties": ["child_age_months", "iycf_ever_breastfed", "iycf_early_initiation", "iycf_exclusive_first_two_days", "iycf_currently_breastfed", "iycf_breastfed_yesterday", "iycf_plain_water_yesterday", "iycf_other_liquids_yesterday", "iycf_infant_formula_yesterday", "iycf_animal_milk_yesterday", "iycf_bottle_fed_yesterday"]}, {"category": "complementary_feeding", "properties": ["iycf_solid_food_yesterday", "iycf_solid_meal_count", "iycf_milk_feed_count", "iycf_cf_introduction_age_months"]}, {"category": "food_groups_24h", "properties": ["iycf_fg_breastmilk", "iycf_fg_grains", "iycf_fg_pulses_nuts", "iycf_fg_dairy", "iycf_fg_flesh", "iycf_fg_eggs", "iycf_fg_vitamin_a_veg_fruit", "iycf_fg_other_veg_fruit"]}, {"category": "unhealthy_foods", "properties": ["iycf_sweet_beverage_yesterday", "iycf_unhealthy_food_yesterday"]}, {"category": "derived_iycf", "properties": ["iycf_ebf", "iycf_cbf", "iycf_age_appropriate_breastfeeding", "iycf_mdd_c_score", "iycf_mdd_c", "iycf_mmf", "iycf_mmff", "iycf_mad", "iycf_eff", "iycf_zero_veg_fruit"]}], "subtypes": [], "supertypes": ["Profile"]}'
