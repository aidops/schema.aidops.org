actions. The profile is designed for general-purpose enumerators under standard household-survey conditions; the seven PSEA-adjacent items (all of Group D, item C4 on complaint-channel barriers, and item F3 on integrity breaches) are flagged `sensitive` and require private-interview conditions and a spontaneous-disclosure referral pathway. The optional `responder_reference` property links the instrument to a specific responder or programme; when populated, implementers MUST escalate the sensitivity of all trust-and- safety items to `restricted` because responses become attributable. Aggregated indicators align with CHS 2024 Commitments, IASC CAAP 2017, IASC/REACH AAP Menu 2018, GTS HVI pillars, IFRC CEA Toolkit, OCHA MSNA AAP module, and Sphere 2018 Core Standards. The profile does NOT record perpetrator details, individual survivor disclosures, or case-management data; those belong to specialist PSEA or GBV case-management instruments.\n", "es": "Un registro a nivel del hogar de indicadores de percepci\u00f3n y experiencia que miden la calidad de la rendici\u00f3n de cuentas a las poblaciones afectadas (AAP) en la asistencia humanitaria. Este perfil cubre siete grupos tem\u00e1ticos: (A) provisi\u00f3n de informaci\u00f3n, cubriendo si el hogar recibi\u00f3 informaci\u00f3n comprensible sobre elegibilidad, calendario de distribuciones y procedimientos de inscripci\u00f3n, adem\u00e1s de canales de informaci\u00f3n preferidos; (B) consulta y participaci\u00f3n, cubriendo si el hogar fue consultado sobre sus necesidades y si la retroalimentaci\u00f3n se reflej\u00f3 en el dise\u00f1o del programa; (C) mecanismos de retroalimentaci\u00f3n y quejas, cubriendo conocimiento de canales, disposici\u00f3n a usarlos, barreras de uso, uso pasado y satisfacci\u00f3n con respuestas; (D) confianza y seguridad en las interacciones con los responsables, incluyendo percepci\u00f3n de seguridad, confianza, conocimiento del canal de reporte PSEA, disposici\u00f3n a reportar y temor a