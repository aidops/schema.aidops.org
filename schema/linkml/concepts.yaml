  HealthAccessProfile:
    title:
      en: Health Access Profile
      fr: Profil d'accès aux soins de santé
      es: Perfil de acceso a la atención de salud
    description:
      en: A point-in-time record of a household's access to general health services, collected through an adult-respondent household interview under explicit informed consent. Covers geographic access (distance, travel time, transport mode, cost), recent unmet need for care (30-day recall), stated provider preferences for adult curative care, health insurance coverage (gateway, type, practical access), out-of-pocket health expenditure (12-month recall, disaggregated by consultations, medicines, hospital, transport), health-payment coping strategies, and continuity of care for diagnosed chronic conditions. Follows the DHS-8 health module (barriers, insurance, out-of-pocket), the WHO People's Voice Survey usual-source-of-care and care-experience domains, Sphere 2018 essential health services standards, and is upstream of SDG 3.8.2 catastrophic-expenditure indicators (computed as ScoringEvents, not in this profile). Does not cover condition-specific care-seeking for child illness (see ChildHealthProfile), maternal and newborn care (see MaternalNewbornHealthProfile), or reproductive health services (see ReproductiveHealthProfile).
      fr: Un enregistrement ponctuel de l'accès d'un ménage aux services de santé généraux, collecté lors d'un entretien avec un adulte du ménage sous consentement éclairé explicite. Couvre l'accès géographique (distance, temps de trajet, mode de transport, coût), le besoin de soins récent non satisfait (rappel sur 30 jours), les préférences déclarées de prestataire pour les soins curatifs adultes, la couverture d'assurance maladie (porte d'entrée, type, accès effectif), les dépenses de santé à la charge du ménage (rappel sur 12 mois, désagrégées en consultations, médicaments, hospitalisation, transport), les stratégies d'adaptation au paiement des soins, et la continuité des soins pour les affections chroniques diagnostiquées. Suit le module santé du DHS-8 (obstacles, assurance, dépenses directes), les domaines « source habituelle de soins » et « expérience de soins » de l'enquête People's Voice Survey de l'OMS, les normes Sphere 2018 sur les services de santé essentiels, et alimente les indicateurs de dépenses catastrophiques de la SDG 3.8.2 (calculés en tant que ScoringEvents, pas dans ce profil). Ne couvre pas le recours aux soins spécifique à des affections chez l'enfant (voir ChildHealthProfile), les soins maternels et néonatals (voir MaternalNewbornHealthProfile), ni les services de santé reproductive (voir ReproductiveHealthProfile).
      es: Un registro puntual del acceso de un hogar a servicios de salud generales, recopilado mediante una entrevista con un adulto del hogar bajo consentimiento informado explícito. Cubre el acceso geográfico (distancia, tiempo de viaje, modo de transporte, costo), la necesidad de atención reciente no satisfecha (recordatorio de 30 días), las preferencias declaradas de proveedor para atención curativa adulta, la cobertura de seguro de salud (entrada, tipo, acceso efectivo), el gasto de bolsillo en salud (recordatorio de 12 meses, desagregado en consultas, medicamentos, hospitalización, transporte), las estrategias de afrontamiento para pagar atención, y la continuidad de atención para condiciones crónicas diagnosticadas. Sigue el módulo de salud del DHS-8 (barreras, seguro, gasto de bolsillo), los dominios 'fuente habitual de atención' y 'experiencia de atención' de la People's Voice Survey de la OMS, los estándares de servicios de salud esenciales de Esfera 2018, y es insumo para los indicadores de gasto catastrófico del ODS 3.8.2 (calculados como ScoringEvents, no en este perfil). No cubre la búsqueda de atención específica por condición para enfermedad infantil (ver ChildHealthProfile), atención materna y neonatal (ver MaternalNewbornHealthProfile), ni servicios de salud reproductiva (ver ReproductiveHealthProfile).
