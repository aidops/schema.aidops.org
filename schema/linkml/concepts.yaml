    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-barriers-module", "dhs-health-insurance-as45", "dhs-oop-expenditure-as59", "paho-barriers-americas-2020", "sdg-3-8-2-metadata", "sphere-2018", "unhcr-phc-coverage-standard", "who-pvs-2023"], "convergence": {"notes": "None of the six v1 social-protection reference systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry household-level health-access survey items in core. The informing domain tools live outside the v1 set: DHS Program (DHS-8 health module AS45/AS58/AS59 and barriers-to-care module), WHO People''s Voice Survey (2023), WHO SDG 3.8.2 methodology, UNHCR Public Health Standards, Sphere 2018, and PAHO''s barriers-to-care work in the Americas. OOP catastrophic-expenditure indicators are reported by the WHO Global Health Observatory as derived national statistics, not as item-level data.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A point-in-time record of a household''s access to general health services, collected through an adult-respondent household interview under explicit informed consent. Covers geographic access (distance, travel time, transport mode, cost), recent unmet need for care (30-day recall), stated provider preferences for adult curative care, health insurance coverage (gateway, type, practical access), out-of-pocket health expenditure (12-month recall, disaggregated by consultations, medicines, hospital, transport), health-payment coping strategies, and continuity of care for diagnosed chronic conditions. Follows the DHS-8 health module (barriers, insurance, out-of-pocket), the WHO People''s Voice Survey usual-source-of-care and care-experience domains, Sphere 2018 essential health services standards, and is upstream of SDG 3.8.2 catastrophic-expenditure indicators (computed as ScoringEvents, not in this profile). Does not cover condition-specific care-seeking for child illness (see ChildHealthProfile), maternal and newborn care (see MaternalNewbornHealthProfile), or reproductive health services (see ReproductiveHealthProfile).\n", "es": "Un registro puntual del acceso de un hogar a servicios de salud generales, recopilado mediante una entrevista con un adulto del hogar bajo consentimiento informado expl\u00edcito. Cubre el acceso geogr\u00e1fico (distancia, tiempo de viaje, modo de transporte, costo), la necesidad de atenci\u00f3n reciente no satisfecha (recordatorio de 30 d\u00edas), las preferencias declaradas de proveedor para atenci\u00f3n curativa adulta, la cobertura de seguro de salud (entrada, tipo, acceso efectivo), el gasto de bolsillo en salud (recordatorio de 12 meses, desagregado en consultas, medicamentos, hospitalizaci\u00f3n, transporte), las estrategias de afrontamiento para pagar atenci\u00f3n, y la continuidad de atenci\u00f3n para condiciones cr\u00f3nicas diagnosticadas. Sigue el m\u00f3dulo de salud del DHS-8 (barreras, seguro, gasto de bolsillo), los dominios ''fuente habitual de atenci\u00f3n'' y ''experiencia de atenci\u00f3n'' de la People''s Voice Survey de la OMS, los est\u00e1ndares de servicios de salud esenciales de Esfera 2018, y es insumo para los indicadores de gasto catastr\u00f3fico del ODS 3.8.2 (calculados como ScoringEvents, no en este perfil). No cubre la b\u00fasqueda de atenci\u00f3n espec\u00edfica por condici\u00f3n para enfermedad infantil (ver ChildHealthProfile), atenci\u00f3n materna y neonatal (ver MaternalNewbornHealthProfile), ni servicios de salud reproductiva (ver ReproductiveHealthProfile).\n", "fr": "Un enregistrement ponctuel de l''acc\u00e8s d''un m\u00e9nage aux services de sant\u00e9 g\u00e9n\u00e9raux, collect\u00e9 lors d''un entretien avec un adulte du m\u00e9nage sous consentement \u00e9clair\u00e9 explicite. Couvre l''acc\u00e8s g\u00e9ographique (distance, temps de trajet, mode de transport, co\u00fbt), le besoin de soins r\u00e9cent non satisfait (rappel sur 30 jours), les pr\u00e9f\u00e9rences d\u00e9clar\u00e9es de prestataire pour les soins curatifs adultes, la couverture d''assurance maladie (porte d''entr\u00e9e, type, acc\u00e8s effectif), les d\u00e9penses de sant\u00e9 \u00e0 la charge du m\u00e9nage (rappel sur 12 mois, d\u00e9sagr\u00e9g\u00e9es en consultations, m\u00e9dicaments, hospitalisation, transport), les strat\u00e9gies d''adaptation au paiement des soins, et la continuit\u00e9 des soins pour les affections chroniques diagnostiqu\u00e9es. Suit le module sant\u00e9 du DHS-8 (obstacles, assurance, d\u00e9penses directes), les domaines \u00ab source habituelle de soins \u00bb et \u00ab exp\u00e9rience de soins \u00bb de l''enqu\u00eate People''s Voice Survey de l''OMS, les normes Sphere 2018 sur les services de sant\u00e9 essentiels, et alimente les indicateurs de d\u00e9penses catastrophiques de la SDG 3.8.2 (calcul\u00e9s en tant que ScoringEvents, pas dans ce profil). Ne couvre pas le recours aux soins sp\u00e9cifique \u00e0 des affections chez l''enfant (voir ChildHealthProfile), les soins maternels et n\u00e9onatals (voir MaternalNewbornHealthProfile), ni les services de sant\u00e9 reproductive (voir ReproductiveHealthProfile).\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 service coverage and OOP indicators (aggregate)", "match": "related", "note": "DHIS2 national HIS aggregate health service coverage and OOP indicators at facility or district level, but do not natively model household-level access barriers. Tracker programs can carry individual-level data but the DHS-style household health module is not part of core DHIS2 metadata.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2 global health data sets"}, "fhir": {"label": "QuestionnaireResponse (household health access / DHS health module)", "match": "close", "note": "A household-level health access interview serializes naturally as a QuestionnaireResponse whose Questionnaire references the DHS-8 health module or the WHO People''s Voice Survey instrument. Derived indicators such as the SDG 3.8.2 catastrophic-expenditure flag are better represented as FHIR Observations produced by a downstream ScoringEvent rather than stored in this profile.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "id": "HealthAccessProfile", "label": {"en": "Health Access Profile", "es": "Perfil de acceso a la atenci\u00f3n de salud", "fr": "Profil d''acc\u00e8s aux soins de sant\u00e9"}, "maturity": "draft", "properties": ["nearest_facility_distance_km", "nearest_facility_travel_time_min", "nearest_facility_transport_mode", "one_way_transport_cost", "facility_open_hours_suitable", "typical_wait_time_at_facility", "hh_member_needed_care_30d", "hh_member_sought_care_30d", "care_not_sought_reason", "care_not_sought_primary_reason", "where_care_sought_30d", "care_satisfaction", "preferred_adult_curative_provider", "self_medication_first", "any_hh_member_insured", "insurance_type", "insurance_members_count", "insurance_practical_access", "oop_health_expenditure_12mo", "oop_expenditure_consultations", "oop_expenditure_medicines", "oop_expenditure_hospital", "oop_expenditure_transport", "hh_used_health_coping", "coping_skipped_care_cost", "chronic_condition_in_hh", "chronic_receiving_treatment", "chronic_treatment_interrupted_6mo", "chronic_interruption_reason", "chronic_condition_type"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "health_access_geography", "properties": ["nearest_facility_distance_km", "nearest_facility_travel_time_min", "nearest_facility_transport_mode", "one_way_transport_cost", "facility_open_hours_suitable", "typical_wait_time_at_facility"]}, {"category": "health_access_unmet_need", "properties": ["hh_member_needed_care_30d", "hh_member_sought_care_30d", "care_not_sought_reason", "care_not_sought_primary_reason", "where_care_sought_30d", "care_satisfaction"]}, {"category": "health_access_provider_preference", "properties": ["preferred_adult_curative_provider", "self_medication_first"]}, {"category": "health_access_insurance", "properties": ["any_hh_member_insured", "insurance_type", "insurance_members_count", "insurance_practical_access"]}, {"category": "health_access_oop", "properties": ["oop_health_expenditure_12mo", "oop_expenditure_consultations", "oop_expenditure_medicines", "oop_expenditure_hospital", "oop_expenditure_transport"]}, {"category": "health_access_coping", "properties": ["hh_used_health_coping", "coping_skipped_care_cost"]}, {"category": "health_access_chronic", "properties": ["chronic_condition_in_hh", "chronic_receiving_treatment", "chronic_treatment_interrupted_6mo", "chronic_interruption_reason", "chronic_condition_type"]}], "subtypes": [], "supertypes": ["Profile"]}'
      bibliography_refs: dhs-barriers-module,dhs-health-insurance-as45,dhs-oop-expenditure-as59,paho-barriers-americas-2020,sdg-3-8-2-metadata,sphere-2018,unhcr-phc-coverage-standard,who-pvs-2023
  HealthFacilityProfile:
    title:
      en: Health Facility Profile
      fr: Profil d'établissement de santé
      es: Perfil de establecimiento de salud
    description:
      en: 'A point-in-time record of the structural readiness of a single health facility (hospital, health centre, health post, or equivalent) to deliver essential health services in a crisis or development context. The subject is a HealthFacility (PS ServicePoint subtype), not a Person or Household. This is the supply-side counterpart to HealthAccessProfile: the same domain, viewed from the service-provider side. Covers eight property groups: facility metadata (type, level, managing authority, catchment, functionality), infrastructure (water, electricity, cold chain, communication, accessibility, hygiene), staffing (core cadre presence, vacancy, training), essential services offered (OPD/IPD, ANC/delivery/EmONC, immunization, IMCI, family planning, emergency care, mental health, GBV clinical management, STI/HIV, NCD), commodity availability today (SARA tracer pattern with observed-on-shelf verification: ORS/zinc, amoxicillin, ACT/RDT, oxytocin and magnesium sulfate, skilled-birth kit, MISP contraceptive count, emergency contraception, PEP, NCD tracers, and a 14-day stock-out summary flag), infection prevention and control (PPE, sterilization, sharps and waste disposal, written IPC protocol), referral and continuity (functioning referral, transport, distance, 24/7 availability), and cost and equity (user fees and exemptions for pregnant women, children under 5, and emergencies). Primary respondent is the facility in-charge or senior clinician plus the pharmacy/stores officer; commodity and infrastructure items are enumerator-observed where feasible per SARA/HHFA methodology. Draws on WHO SARA v2.2, WHO HHFA 2022 (SARA''s successor), WHO/UNICEF WASH FIT 2nd edition 2022, Sphere Handbook 2018 Chapter 3, IAWG MISP 2018, WHO HeRAMS (crisis- context functionality monitoring), WHO Emergency Care Toolkit (ECAT/HEAT — top-level presence indicators only), DHS SPA revised 2022, and the WHO Model List of Essential Medicines 24th edition. Does not cover patient-level data, direct observation of clinical encounters, disease-surveillance case counts, household-side access (see HealthAccessProfile), individual staff identity, or detailed structural damage assessment.'
      fr: 'Un enregistrement ponctuel de la capacité structurelle d''un établissement de santé (hôpital, centre de santé, poste de santé ou équivalent) à fournir les services de santé essentiels dans un contexte de crise ou de développement. Le sujet est une HealthFacility (sous-type ServicePoint de PS), pas une Personne ou un Ménage. C''est le pendant côté offre du HealthAccessProfile : le même domaine, vu du côté du prestataire. Couvre huit groupes de propriétés : métadonnées de l''établissement (type, niveau, autorité gestionnaire, population desservie, fonctionnalité), infrastructure (eau, électricité, chaîne du froid, communication, accessibilité, hygiène), dotation en personnel (présence des cadres essentiels, vacance, formation), services essentiels offerts (consultations externes/hospitalisation, CPN/accouchement/ SONU, vaccination, PCIME, planification familiale, urgences, santé mentale, prise en charge clinique des VBG, IST/VIH, MNT), disponibilité des produits aujourd''hui (schéma traceur SARA avec vérification par observation en rayon : SRO/zinc, amoxicilline, CTA/TDR, ocytocine et sulfate de magnésium, kit d''accouchement, comptage des méthodes contraceptives MISP, contraception d''urgence, PEP, traceurs MNT et signal de rupture à 14 jours), prévention et contrôle des infections (EPI, stérilisation, tranchants et élimination des déchets, protocole PCI écrit), référence et continuité (système de référence fonctionnel, transport, distance, ouverture 24/7), et coût et équité (frais d''utilisation et exemptions pour femmes enceintes, enfants de moins de 5 ans, urgences). Le répondant principal est le responsable de l''établissement ou le clinicien senior et le responsable pharmacie/stocks ; les items produits et infrastructure sont observés par l''enquêteur lorsque possible selon la méthodologie SARA/HHFA. S''appuie sur SARA v2.2 de l''OMS, HHFA 2022 de l''OMS (successeur de SARA), WASH FIT 2e édition 2022 de l''OMS/UNICEF, le Manuel Sphere 2018 chapitre 3, IAWG MISP 2018, HeRAMS de l''OMS (suivi de fonctionnalité en contexte de crise), la boîte à outils Soins d''urgence de l''OMS (ECAT/HEAT — indicateurs de présence de haut niveau uniquement), DHS SPA révisé 2022, et la Liste modèle OMS des médicaments essentiels 24e édition. Ne couvre pas les données au niveau des patients, l''observation directe de consultations cliniques, les comptages de cas en surveillance épidémiologique, l''accès côté ménage (voir HealthAccessProfile), l''identité individuelle du personnel, ni l''évaluation détaillée des dégâts structurels.'
      es: 'Un registro puntual de la capacidad estructural de un establecimiento de salud (hospital, centro de salud, puesto de salud o equivalente) para prestar servicios de salud esenciales en un contexto de crisis o de desarrollo. El sujeto es un HealthFacility (subtipo de ServicePoint de PS), no una Persona o un Hogar. Es la contraparte del lado de la oferta de HealthAccessProfile: el mismo dominio, visto desde el lado del prestador. Cubre ocho grupos de propiedades: metadatos del establecimiento (tipo, nivel, autoridad gestora, población atendida, funcionalidad), infraestructura (agua, electricidad, cadena de frío, comunicación, accesibilidad, higiene), dotación de personal (presencia de cuadros esenciales, vacancia, capacitación), servicios esenciales ofrecidos (consultas externas/hospitalización, CPN/parto/COE, inmunización, AIEPI, planificación familiar, emergencias, salud mental, manejo clínico de violencia sexual, ITS/VIH, ENT), disponibilidad de insumos hoy (patrón trazador SARA con verificación por observación en estantería: SRO/zinc, amoxicilina, TCA/PDR, oxitocina y sulfato de magnesio, kit de parto, recuento de métodos anticonceptivos MISP, anticoncepción de emergencia, PEP, trazadores ENT y señal de desabastecimiento a 14 días), prevención y control de infecciones (EPI, esterilización, cortopunzantes y eliminación de residuos, protocolo PCI escrito), referencia y continuidad (sistema de referencia funcional, transporte, distancia, apertura 24/7), y costo y equidad (tarifas al usuario y exenciones para mujeres embarazadas, niños menores de 5 años, emergencias). El respondiente principal es el responsable del establecimiento o clínico senior más el responsable de farmacia/almacén; los ítems de insumos e infraestructura son observados por el enumerador cuando sea posible según la metodología SARA/HHFA. Se apoya en SARA v2.2 de la OMS, HHFA 2022 de la OMS (sucesor de SARA), WASH FIT 2ª edición 2022 de OMS/UNICEF, el Manual de Esfera 2018 capítulo 3, IAWG MISP 2018, HeRAMS de la OMS (monitoreo de funcionalidad en contextos de crisis), el kit de herramientas de Atención de Emergencia de la OMS (ECAT/HEAT — solo indicadores de presencia de alto nivel), DHS SPA revisado 2022, y la Lista Modelo OMS de Medicamentos Esenciales 24ª edición. No cubre datos a nivel de paciente, observación directa de consultas clínicas, conteos de casos en vigilancia epidemiológica, acceso del lado del hogar (ver HealthAccessProfile), identidad individual del personal, ni evaluación detallada de daños estructurales.'
