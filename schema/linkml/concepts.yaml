    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "convergence": {"notes": "Among the v1 convergence reference systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry), only FHIR offers a generic item-level form response carrier (QuestionnaireResponse) that naturally matches this concept. Social-protection platforms (OpenSPP, DCI Social Registry) capture household economic profiling for targeting but do not carry a structured livelihoods-and-resilience survey module. The informing standards bodies are FAO (RIMA-II), the World Bank (LSMS-ISA), IOM (DTM MSLA), and the Sphere Project rather than the v1 core set; this convergence number understates prevalence because the v1 set does not include resilience-measurement platforms.\n", "system_count": 1, "total_systems": 6}, "definition": {"en": "A point-in-time record of a household''s livelihood portfolio, productive assets, financial access, shock exposure, coping response, and composite resilience signals. Captures the household''s primary and secondary livelihood activities, income sources and seasonality, land and asset access, savings and credit, humanitarian assistance reliance, experienced shocks over the past 12 months, and the main coping strategy used, alongside derived indicators (income diversification index, RIMA-II pillar coverage flags, and an AidOps livelihood resilience composite score). Draws on the FAO RIMA-II methodology, the LSMS-ISA livelihood and shock modules, the IOM DTM Multi-Sectoral Location Assessment livelihood components, and the Sphere 2018 Livelihoods chapter. Scoped to the household livelihood portfolio and resilience: labour-statistics items (e.g. individual employment status), food-specific coping (carried by FoodSecurityProfile), and agriculture-specific detail (plot-level tenure, area, crops; carried by AgricultureProfile) are deliberately out of scope.\n", "es": "Un registro puntual de la cartera de medios de vida de un hogar, sus activos productivos, acceso financiero, exposici\u00f3n a choques, respuesta de afrontamiento y se\u00f1ales compuestas de resiliencia. Captura las actividades primarias y secundarias de subsistencia del hogar, las fuentes de ingresos y su estacionalidad, el acceso a la tierra y a los activos, los ahorros y el cr\u00e9dito, la dependencia de la asistencia humanitaria, los choques experimentados durante los \u00faltimos 12 meses y la principal estrategia de afrontamiento utilizada, junto con indicadores derivados (\u00edndice de diversificaci\u00f3n de ingresos, indicadores de cobertura de los pilares RIMA-II y una puntuaci\u00f3n compuesta AidOps de resiliencia de medios de vida). Se basa en la metodolog\u00eda FAO RIMA-II, los m\u00f3dulos de medios de vida y choques de LSMS-ISA, los componentes de medios de vida de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM y el cap\u00edtulo de Medios de Vida de Esfera 2018. Limitado a la cartera de subsistencia y a la resiliencia del hogar: los \u00edtems de estad\u00edsticas laborales (p. ej. situaci\u00f3n laboral individual), el afrontamiento espec\u00edfico de alimentos (abordado por FoodSecurityProfile) y los detalles espec\u00edficos de agricultura (tenencia por parcela, superficie, cultivos; abordados por AgricultureProfile) est\u00e1n deliberadamente fuera de alcance.\n", "fr": "Un enregistrement ponctuel du portefeuille de moyens de subsistance d''un m\u00e9nage, de ses actifs productifs, de son acc\u00e8s financier, de son exposition aux chocs, de sa r\u00e9ponse d''adaptation et de ses signaux composites de r\u00e9silience. Saisit les activit\u00e9s principales et secondaires de subsistance du m\u00e9nage, les sources de revenus et leur saisonnalit\u00e9, l''acc\u00e8s \u00e0 la terre et aux actifs, l''\u00e9pargne et le cr\u00e9dit, la d\u00e9pendance \u00e0 l''assistance humanitaire, les chocs subis au cours des 12 derniers mois et la principale strat\u00e9gie d''adaptation utilis\u00e9e, ainsi que des indicateurs d\u00e9riv\u00e9s (indice de diversification des revenus, indicateurs de couverture des piliers RIMA-II, et un score composite AidOps de r\u00e9silience des moyens de subsistance). S''appuie sur la m\u00e9thodologie FAO RIMA-II, les modules moyens de subsistance et chocs de LSMS-ISA, les composantes moyens de subsistance de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM et le chapitre Moyens de subsistance de Sph\u00e8re 2018. Limit\u00e9 au portefeuille de subsistance et \u00e0 la r\u00e9silience du m\u00e9nage : les items de statistiques du travail (ex. statut d''emploi individuel), l''adaptation sp\u00e9cifique \u00e0 l''alimentation (port\u00e9e par FoodSecurityProfile) et les d\u00e9tails sp\u00e9cifiques \u00e0 l''agriculture (tenure \u00e0 la parcelle, superficie, cultures ; port\u00e9s par AgricultureProfile) sont d\u00e9lib\u00e9r\u00e9ment hors p\u00e9rim\u00e8tre.\n"}, "external_equivalents": {"dhis2": {"label": "DHIS2 livelihoods data elements", "match": "related", "note": "DHIS2 cash-transfer and resilience deployments sometimes carry livelihood signals as tracked-entity attributes or program-stage data elements, but there is no standard global data set for a household livelihood profile.", "uri": "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html", "vocabulary": "DHIS2"}, "fhir": {"label": "QuestionnaireResponse (household livelihood battery)", "match": "close", "note": "Each LivelihoodProfile administration serialises naturally as a FHIR QuestionnaireResponse whose Questionnaire is the corresponding LSMS-ISA, FAO RIMA-II, or IOM DTM MSLA livelihood battery. Derived indicators (RIMA pillar flags, resilience composite) are better modelled as FHIR Observation or RiskAssessment resources produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "vocabulary": "FHIR R4"}}, "featured": true, "id": "LivelihoodProfile", "label": {"en": "Livelihood Profile", "es": "Perfil de medios de vida", "fr": "Profil de moyens de subsistance"}, "maturity": "draft", "properties": ["main_livelihood_activity", "secondary_livelihood_activities", "livelihood_diversity_count", "income_sources", "income_seasonality", "lean_season_months_count", "livelihood_change_since_crisis", "livelihood_disruption_barrier", "productive_asset_types_owned", "productive_asset_loss_since_crisis", "land_access_status", "has_savings", "access_to_credit", "humanitarian_assistance_reliance", "shock_experienced_past_12mo", "shock_coping_strategy_used", "livelihood_programme_participation", "income_diversification_index", "rima_abs_flag", "rima_apt_flag", "rima_ac_flag", "livelihood_resilience_score"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "context", "properties": ["main_livelihood_activity", "secondary_livelihood_activities", "livelihood_diversity_count", "income_sources", "income_seasonality", "lean_season_months_count", "livelihood_change_since_crisis", "livelihood_disruption_barrier", "productive_asset_types_owned", "productive_asset_loss_since_crisis", "land_access_status", "has_savings", "access_to_credit", "humanitarian_assistance_reliance", "shock_experienced_past_12mo", "shock_coping_strategy_used", "livelihood_programme_participation"]}, {"category": "scores", "properties": ["income_diversification_index", "rima_abs_flag", "rima_apt_flag", "rima_ac_flag", "livelihood_resilience_score"]}], "subtypes": [], "supertypes": ["Profile"]}'
