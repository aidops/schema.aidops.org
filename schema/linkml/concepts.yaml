  CommunityNeedsProfile:
    title:
      en: Community Needs Profile
      fr: Profil des besoins communautaires
      es: Perfil de necesidades comunitarias
    description:
      en: 'A point-in-time record of community-level needs as aggregated, self- reported perceptions by a bounded community, site, or settlement. Unlike household or individual profiles, the subject of this profile is a Community: the reporting unit is the social collective and respondents are collective (a focus group) or informant-based (key informants speaking on behalf of the community). Captures the assessment methodology and informant composition; the top three priority needs (ranked) as the community views them; the groups the community itself identifies as most in need; an overall severity rating and a pre-crisis baseline comparison on JIAF-aligned scales; community-reported coping strategies; community-perceived social cohesion and inter-group tension; community-perceived coverage gaps in the response; and optional enumerator observation notes. This profile does NOT re-measure household-level need (food insecurity, shelter adequacy, health access, protection, WASH, NFI, displacement, education, mental health, maternal-newborn, child protection, GBV risk, gender empowerment); those remain the domain of their respective profiles. It captures the community''s own ranking and perception of need, which complements but does not substitute for the household/individual profiles and feeds MIRA/JIAF analysis pipelines as one of several inputs. Two properties (cn_social_cohesion_level, cn_tension_between_groups_described) are flagged sensitive because they can identify ethnic, political, or religious fault lines and expose minority groups to retaliation if disclosed without aggregation; all other properties are non-sensitive. Anchored on MIRA 2015 (Community Level Assessment form), JIAF 2.0 (severity and baseline), ACAPS 2014 (methodology), REACH HSM (operational analogue), IOM DTM Site Assessment (priority-needs question patterns), IFRC VCA, Sphere 2018 (AAP / CHS Commitment 4), UNHCR AGD, IASC Guidelines on Inclusion of Persons with Disabilities (2019), and the UNDP-DPPA Social Cohesion Framework.'
      fr: 'Un enregistrement ponctuel des besoins au niveau de la communauté sous forme de perceptions agrégées et auto-déclarées par une communauté, un site ou un établissement délimité. Contrairement aux profils du ménage ou individuels, le sujet de ce profil est une Community : l''unité de rapport est le collectif social et les répondants sont collectifs (un groupe focal) ou basés sur des informateurs (informateurs clés s''exprimant au nom de la communauté). Saisit la méthodologie d''évaluation et la composition des informateurs ; les trois besoins prioritaires principaux (classés) tels que la communauté les voit ; les groupes que la communauté identifie elle-même comme les plus dans le besoin ; une évaluation globale de la sévérité et une comparaison avec la situation antérieure à la crise sur des échelles alignées avec le JIAF ; les stratégies d''adaptation rapportées par la communauté ; la cohésion sociale et les tensions intergroupes perçues par la communauté ; les lacunes de couverture de la réponse perçues par la communauté ; et des notes d''observation optionnelles de l''enquêteur. Ce profil NE re-mesure PAS les besoins au niveau du ménage (insécurité alimentaire, adéquation de l''abri, accès aux soins, protection, EHA, articles non alimentaires, déplacement, éducation, santé mentale, santé maternelle et néonatale, protection de l''enfance, risque VBG, autonomisation de genre) ; ceux-ci restent du ressort de leurs profils respectifs. Il saisit le classement et la perception des besoins par la communauté elle-même, qui complètent sans s''y substituer les profils ménage/individu, et qui alimentent les filières d''analyse MIRA/JIAF comme l''une de plusieurs entrées. Deux propriétés (cn_social_cohesion_level, cn_tension_between_groups_described) sont marquées comme sensibles car elles peuvent identifier des lignes de fracture ethnique, politique ou religieuse et exposer des groupes minoritaires à des représailles si divulguées sans agrégation ; toutes les autres propriétés sont non sensibles. Ancré sur MIRA 2015 (formulaire d''évaluation au niveau communautaire), JIAF 2.0 (sévérité et comparaison à la base), ACAPS 2014 (méthodologie), HSM de REACH (analogue opérationnel), évaluation de site DTM de l''OIM (schémas de question « besoins prioritaires »), IFRC VCA, Sphère 2018 (AAP / engagement 4 de la NHC), AGD du HCR, Directives de l''IASC sur l''inclusion des personnes handicapées (2019) et Cadre de cohésion sociale PNUD-DPPA.'
      es: 'Un registro puntual de las necesidades a nivel comunitario como percepciones agregadas y autorreportadas por una comunidad, sitio o asentamiento delimitado. A diferencia de los perfiles de hogar o individuales, el sujeto de este perfil es una Community: la unidad de reporte es el colectivo social y los encuestados son colectivos (un grupo focal) o basados en informantes (informantes clave que hablan en nombre de la comunidad). Captura la metodología de evaluación y la composición de informantes; las tres principales necesidades prioritarias (ranqueadas) tal como las ve la comunidad; los grupos que la propia comunidad identifica como más necesitados; una calificación general de severidad y una comparación con la línea base previa a la crisis en escalas alineadas con el JIAF; las estrategias de afrontamiento reportadas por la comunidad; la cohesión social y las tensiones intergrupales percibidas por la comunidad; las brechas de cobertura de la respuesta percibidas por la comunidad; y notas de observación opcionales del encuestador. Este perfil NO vuelve a medir las necesidades a nivel del hogar (inseguridad alimentaria, adecuación del refugio, acceso a salud, protección, WASH, artículos no alimentarios, desplazamiento, educación, salud mental, salud materna y neonatal, protección de la niñez, riesgo de VBG, empoderamiento de género); esas siguen siendo competencia de sus perfiles respectivos. Captura el ranking y la percepción de necesidad de la propia comunidad, lo cual complementa sin sustituir los perfiles de hogar/individuo, y alimenta las cadenas de análisis MIRA/JIAF como una de varias entradas. Dos propiedades (cn_social_cohesion_level, cn_tension_between_groups_described) están marcadas como sensibles porque pueden identificar líneas de fractura étnica, política o religiosa y exponer a grupos minoritarios a represalias si se divulgan sin agregación; todas las demás propiedades son no sensibles. Anclado en MIRA 2015 (formulario de Evaluación a Nivel Comunitario), JIAF 2.0 (severidad y comparación con línea base), ACAPS 2014 (metodología), HSM de REACH (análogo operativo), Site Assessment de la DTM de la OIM (patrones de pregunta de necesidades prioritarias), VCA de la IFRC, Esfera 2018 (AAP / Compromiso 4 de la NHC), AGD del ACNUR, Directrices del IASC sobre inclusión de personas con discapacidad (2019) y Marco de Cohesión Social PNUD-DPPA.'
