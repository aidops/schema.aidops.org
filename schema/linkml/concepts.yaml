    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["adaptation-fund-rmf-2019", "assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "fao-ex-act-2021", "fao-rima-2016", "gcf-results-framework-2022", "ifrc-pcva-2020", "ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022", "local-uncdf-2020", "nd-gain-methodology", "oxfam-adaptation-toolkit-2019", "practical-action-v2r-2016", "undp-hdr-2020", "unfccc-nap-me-2022", "world-bank-csa-profiles-2019"], "convergence": {"notes": "None of the v1 social-protection systems (FHIR, DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Social Registry) carry a household-level climate vulnerability and adaptation assessment. The domain tools live in the humanitarian and climate-finance sector: CARE CVCA, IFRC PCVA, GCF vulnerability assessment templates, UNFCCC NAP M&E household modules, World Bank CSA Country Profile household surveys, and LoCAL PBCRG household performance assessments. FHIR''s QuestionnaireResponse pattern accommodates the shape. The low v1 convergence reflects scope rather than prevalence; household-level climate vulnerability assessment is a growing domain driven by NAP requirements and climate finance accountability.\n", "system_count": 0, "total_systems": 6}, "definition": {"en": "A household-level record of climate vulnerability and adaptive capacity grounded in the IPCC AR5/AR6 tripartite framework: exposure (climate hazards experienced and perceived trends), sensitivity (livelihood climate-dependence and location risk), and adaptive capacity (climate information services, insurance and finance for climate shocks, climate-smart practice adoption, and social safety net coverage). The profile also captures maladaptation signals \u2014 distress coping responses to climate shocks that erode future capacity (productive asset sales, distress migration, children withdrawn from school) \u2014 and the respondent''s own multi-year perceptions of shifts in rainfall, temperature, seasonal timing, and extreme-event frequency. The profile is forward-looking and trend-anchored over a medium-to-long recall window (5\u201310 years for hazard trends; 12 months for recent practice use). It supports IPCC AR6 WGII vulnerability mapping at household and community aggregation, UNFCCC National Adaptation Plan (NAP) household evidence, Green Climate Fund (GCF) project vulnerability baselines, CARE CVCA household components, IFRC/Red Cross Climate Centre participatory vulnerability assessments, and LoCAL/UNCDF performance assessments. Boundary discipline: WarningResponseProfile owns event-anchored warning-reception and protective-action items (event-specific, not trend-based). DwellingDamageProfile owns post-disaster structural damage records; this profile''s `climate_dwelling_vulnerable_location` captures location-level climate risk prior to any event, not post-event damage. LivelihoodProfile carries the RIMA-II savings, credit, and safety-net signals for general livelihood resilience; this profile''s climate-specific finance items (`climate_savings_for_shock`, `climate_shock_credit_access`, `climate_safety_net_access`) reframe the same underlying dimensions with a climate trigger specifier and are kept distinct with the `climate_` prefix. AgricultureProfile owns extension visit counts; this profile owns climate-smart practice adoption (`climate_adaptive_practices_used`). WASHAssessmentProfile owns water source type and service level; `climate_water_source_impact` adds the climate-trend reliability dimension. When both profiles are collected in the same survey, the Form Author should apply the branching logic described in the research instrument notes to avoid re-asking overlapping baseline questions. The adaptive capacity index (0\u20139, in-form computable) and composite vulnerability flag use equal weights; program-specific weighting is a configuration decision.\n", "es": "Un registro a nivel del hogar de la vulnerabilidad clim\u00e1tica y la capacidad de adaptaci\u00f3n, basado en el marco tripartito del IPCC AR5/AR6: exposici\u00f3n (peligros clim\u00e1ticos experimentados y tendencias percibidas), sensibilidad (dependencia clim\u00e1tica de los medios de vida y riesgo de ubicaci\u00f3n) y capacidad de adaptaci\u00f3n (servicios de informaci\u00f3n clim\u00e1tica, seguros y financiamiento para choques clim\u00e1ticos, adopci\u00f3n de pr\u00e1cticas clim\u00e1ticamente inteligentes y cobertura de redes de protecci\u00f3n social). El perfil tambi\u00e9n captura se\u00f1ales de maladaptaci\u00f3n \u2014 respuestas de afrontamiento en situaci\u00f3n de angustia ante choques clim\u00e1ticos que erosionan la capacidad futura (venta de activos productivos, migraci\u00f3n forzada, ni\u00f1os retirados de la escuela) \u2014 y las percepciones plurianuales del encuestado sobre cambios en las lluvias, la temperatura, el calendario estacional y la frecuencia de eventos extremos. El perfil es prospectivo y orientado a tendencias, con un per\u00edodo de referencia de mediano a largo plazo (5 a 10 a\u00f1os para tendencias de peligros; 12 meses para el uso reciente de pr\u00e1cticas). Apoya la cartograf\u00eda de vulnerabilidad del IPCC AR6 WGII a nivel de hogar y comunidad, la base de evidencia de hogares para los Planes Nacionales de Adaptaci\u00f3n (PNA) de la CMNUCC, las l\u00edneas de base de vulnerabilidad de proyectos del Fondo Verde para el Clima (FVC), los componentes de hogar del CVCA de CARE, las evaluaciones participativas de vulnerabilidad clim\u00e1tica de la FICR/del Centro del Clima de la Cruz Roja, y las evaluaciones de desempe\u00f1o de LoCAL/UNCDF.\n", "fr": "Un enregistrement au niveau du m\u00e9nage de la vuln\u00e9rabilit\u00e9 climatique et de la capacit\u00e9 d''adaptation, ancr\u00e9 dans le cadre tripartite IPCC AR5/AR6 : exposition (al\u00e9as climatiques subis et tendances per\u00e7ues), sensibilit\u00e9 (d\u00e9pendance climatique du mode de subsistance et risque li\u00e9 \u00e0 l''emplacement), et capacit\u00e9 d''adaptation (services d''information climatique, assurance et financement pour les chocs climatiques, adoption de pratiques climato-intelligentes et couverture par les filets de protection sociale). Le profil capture \u00e9galement les signaux de maladaptation \u2014 r\u00e9ponses d''adaptation en situation de d\u00e9tresse aux chocs climatiques qui \u00e9rodent la capacit\u00e9 future (vente d''actifs productifs, migration forc\u00e9e, enfants retir\u00e9s de l''\u00e9cole) \u2014 et les perceptions pluriannuelles du r\u00e9pondant concernant les changements dans les pr\u00e9cipitations, les temp\u00e9ratures, le calendrier saisonnier et la fr\u00e9quence des \u00e9v\u00e9nements extr\u00eames. Le profil est prospectif et ancr\u00e9 sur les tendances, sur une fen\u00eatre de rappel moyen \u00e0 long terme (5 \u00e0 10 ans pour les tendances d''al\u00e9as ; 12 mois pour l''utilisation r\u00e9cente des pratiques). Il soutient la cartographie de la vuln\u00e9rabilit\u00e9 IPCC AR6 WGII au niveau du m\u00e9nage et de la communaut\u00e9, les bases de donn\u00e9es probantes des m\u00e9nages pour les Plans Nationaux d''Adaptation (PNA) de la CCNUCC, les bases de r\u00e9f\u00e9rence de vuln\u00e9rabilit\u00e9 des projets du Fonds vert pour le climat (FVC), les composantes m\u00e9nage du CVCA de CARE, les \u00e9valuations participatives de vuln\u00e9rabilit\u00e9 climatique de la FICR/du Centre Climat de la Croix-Rouge, et les \u00e9valuations de performance LoCAL/UNCDF.\n"}, "external_equivalents": {"fhir": {"label": "QuestionnaireResponse (household climate vulnerability and adaptation assessment)", "match": "close", "note": "A household-level climate adaptation assessment serializes naturally as a QuestionnaireResponse whose Questionnaire is the CARE CVCA or IFRC PCVA household module. Derived indicators (adaptive capacity index, vulnerability flag) are better modelled as FHIR Observation or RiskAssessment resources produced by a scoring step.", "uri": "http://hl7.org/fhir/QuestionnaireResponse", "