  AnthropometricProfile:
    title:
      en: Anthropometric Profile
      fr: Profil anthropométrique
      es: Perfil antropométrico
    description:
      en: 'A point-in-time record of body measurements collected about a person using a defined anthropometric protocol (SMART, WHO Anthro, a CMAM screening form). Captures raw measurements (height, weight, MUAC), the measurement technique and oedema status, the age of the subject at measurement, the growth reference used to derive z-scores, and any derived status bands (stunting, wasting, underweight, acute malnutrition) together with the cutoff rule that produced them. The growth reference and age at measurement are required context: a band classification without them cannot be re-derived or compared across datasets.'
      fr: 'Un enregistrement ponctuel de mesures corporelles recueillies sur une personne à l''aide d''un protocole anthropométrique défini (SMART, WHO Anthro, un formulaire de dépistage PCIMA). Consigne les mesures brutes (taille, poids, périmètre brachial), la technique de mesure et l''état d''œdème, l''âge du sujet au moment de la mesure, la référence de croissance utilisée pour dériver les z-scores, et les bandes de statut dérivées (retard de croissance, émaciation, insuffisance pondérale, malnutrition aiguë) ainsi que la règle de seuil qui les a produites. La référence de croissance et l''âge au moment de la mesure sont un contexte requis : une classification de bande sans eux ne peut être ni re-dérivée ni comparée entre jeux de données.'
      es: 'Un registro puntual de mediciones corporales recopiladas sobre una persona mediante un protocolo antropométrico definido (SMART, WHO Anthro, un formulario de detección de CMAM). Consigna las mediciones brutas (talla, peso, perímetro braquial), la técnica de medición y el estado de edema, la edad del sujeto al momento de la medición, la referencia de crecimiento utilizada para derivar z-scores y las bandas de estado derivadas (retraso del crecimiento, emaciación, bajo peso, malnutrición aguda) junto con la regla de corte que las produjo. La referencia de crecimiento y la edad al momento de la medición son contexto requerido: una clasificación de banda sin ellas no puede re-derivarse ni compararse entre conjuntos de datos.'
    is_a: Profile
    class_uri: aidops:AnthropometricProfile
    slots:
    - height
    - body_weight
    - muac
    - oedema_present
    - measurement_type
    - age_at_measurement_months
    - growth_reference
    - height_for_age_z
    - weight_for_age_z
    - weight_for_height_z
    - bmi_for_age_z
    - stunting_status
    - wasting_status
    - underweight_status
    - acute_malnutrition_status
    - muac_band
    - muac_cutoff_rule
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fhir-r4", "smart-methodology"], "convergence": {"notes": "FHIR represents each measurement as a vital-signs Observation; DHIS2 routinely models anthropometry as tracked-entity data elements per visit. OpenSPP, OpenCRVS, openIMIS, and DCI Core do not carry nutrition measurements in core. Domain tools outside MIS cores consistently use the per-visit pattern this concept encodes: CommCare CMAM stores each measurement on a screening form, SMART surveys treat every reading as a dated record with protocol context, and WHO Anthro requires the growth reference and age at measurement to re-derive z-scores. Person retains a coarse nutrition_status flag for current-state queries.\n", "system_count": 2, "total_systems": 6}, "definition": {"en": "A point-in-time record of body measurements collected about a person using a defined anthropometric protocol (SMART, WHO Anthro, a CMAM screening form). Captures raw measurements (height, weight, MUAC), the measurement technique and oedema status, the age of the subject at measurement, the growth reference used to derive z-scores, and any derived status bands (stunting, wasting, underweight, acute malnutrition) together with the cutoff rule that produced them. The growth reference and age at measurement are required context: a band classification without them cannot be re-derived or compared across datasets.\n", "es": "Un registro puntual de mediciones corporales recopiladas sobre una persona mediante un protocolo antropom\u00e9trico definido (SMART, WHO Anthro, un formulario de detecci\u00f3n de CMAM). Consigna las mediciones brutas (talla, peso, per\u00edmetro braquial), la t\u00e9cnica de medici\u00f3n y el estado de edema, la edad del sujeto al momento de la medici\u00f3n, la referencia de crecimiento utilizada para derivar z-scores y las bandas de estado derivadas (retraso del crecimiento, emaciaci\u00f3n, bajo peso, malnutrici\u00f3n aguda) junto con la regla de corte que las produjo. La referencia de crecimiento y la edad al momento de la medici\u00f3n son contexto requerido: una clasificaci\u00f3n de banda sin ellas no puede re-derivarse ni compararse entre conjuntos de datos.\n", "fr": "Un enregistrement ponctuel de mesures corporelles recueillies sur une personne \u00e0 l''aide d''un protocole anthropom\u00e9trique d\u00e9fini (SMART, WHO Anthro, un formulaire de d\u00e9pistage PCIMA). Consigne les mesures brutes (taille, poids, p\u00e9rim\u00e8tre brachial), la technique de mesure et l''\u00e9tat d''\u0153d\u00e8me, l''\u00e2ge du sujet au moment de la mesure, la r\u00e9f\u00e9rence de croissance utilis\u00e9e pour d\u00e9river les z-scores, et les bandes de statut d\u00e9riv\u00e9es (retard de croissance, \u00e9maciation, insuffisance pond\u00e9rale, malnutrition aigu\u00eb) ainsi que la r\u00e8gle de seuil qui les a produites. La r\u00e9f\u00e9rence de croissance et l''\u00e2ge au moment de la mesure sont un contexte requis : une classification de bande sans eux ne peut \u00eatre ni re-d\u00e9riv\u00e9e ni compar\u00e9e entre jeux de donn\u00e9es.\n"}, "external_equivalents": {"fhir": {"label": "Observation (vital-signs / body measurement)", "match": "broad", "note": "One AnthropometricProfile administration maps to several FHIR Observation resources (one per measurement) sharing a common subject and effective datetime, plus a grouping Observation or a Procedure to carry the growth-reference and cutoff-rule context. The cardinalities do not line up one-to-one, so this is a broad match rather than a close one.", "uri": "http://hl7.org/fhir/Observation", "vocabulary": "FHIR R4"}}, "id": "AnthropometricProfile", "label": {"en": "Anthropometric Profile", "es": "Perfil antropom\u00e9trico", "fr": "Profil anthropom\u00e9trique"}, "maturity": "draft", "properties": ["height", "body_weight", "muac", "oedema_present", "measurement_type", "age_at_measurement_months", "growth_reference", "height_for_age_z", "weight_for_age_z", "weight_for_height_z", "bmi_for_age_z", "stunting_status", "wasting_status", "underweight_status", "acute_malnutrition_status", "muac_band", "muac_cutoff_rule"], "property_groups": [{"category": "administrative", "properties": ["identifiers", "subject", "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode", "respondent", "respondent_relationship", "items_asked"]}, {"category": "nutrition", "properties": ["height", "body_weight", "muac", "oedema_present", "measurement_type", "age_at_measurement_months", "growth_reference", "height_for_age_z", "weight_for_age_z", "weight_for_height_z", "bmi_for_age_z", "stunting_status", "wasting_status", "underweight_status", "acute_malnutrition_status", "muac_band", "muac_cutoff_rule"]}], "subtypes": [], "supertypes": ["Profile"]}'
      bibliography_refs: fhir-r4,smart-methodology
  ChildHealthProfile:
    title:
      en: Child Health Profile
      fr: Profil de santé de l'enfant
      es: Perfil de salud del niño
    description:
      en: 'A point-in-time record of health status and recent illness episodes for a child aged 1–59 months (under 5), reported by the primary caregiver. Each record is scoped to a single child (subject: Person aged 1–59 months completed); households with multiple children under 5 generate one record per child.

        The profile covers three domains: (1) vaccination history — per-antigen status verified from a home-based vaccination card or caregiver recall, following the WHO EPI (Expanded Programme on Immunization) recommended schedule; (2) recent illness — 2-week caregiver recall for diarrhea, acute respiratory infection (ARI/pneumonia proxy), and fever, with treatment items (ORS, zinc, ORT, antibiotics, antimalarials); and (3) care-seeking — provider type visited for each illness episode.

        Physical measurements (height, weight, MUAC, oedema) are deliberately excluded and belong to AnthropometricProfile. Infant and young child feeding behaviors (breastfeeding, complementary feeding, MDD-C) are excluded and belong to NutritionPracticesProfile. Vitamin A supplementation and deworming are deferred. Birth registration is out of scope (PS Identifier / CRVS territory). HPV vaccination is deferred (adolescent scope).'
      fr: 'Un enregistrement ponctuel de l''état de santé et des épisodes de maladie récents d''un enfant âgé de 1 à 59 mois (moins de 5 ans), rapporté par le soignant principal. Chaque enregistrement est limité à un seul enfant (sujet : personne âgée de 1 à 59 mois révolus) ; les ménages comportant plusieurs enfants de moins de 5 ans génèrent un enregistrement par enfant.

        Le profil couvre trois domaines : (1) l''historique vaccinal — statut par antigène vérifié sur le carnet de vaccination à domicile ou par mémorisation du soignant, suivant le calendrier recommandé de l''EPI (Programme élargi de vaccination) de l''OMS ; (2) les maladies récentes — rappel de 2 semaines par le soignant pour la diarrhée, l''infection respiratoire aiguë (IRA/proxy pneumonie) et la fièvre, avec les traitements (SRO, zinc, TRO, antibiotiques, antipaludéens) ; et (3) le recours aux soins — type de prestataire consulté pour chaque épisode de maladie.

        Les mesures physiques (taille, poids, PB, œdèmes) sont délibérément exclues et relèvent du AnthropometricProfile. Les pratiques d''alimentation du nourrisson et du jeune enfant (allaitement, alimentation complémentaire, DMA-C) sont exclues et relèvent du NutritionPracticesProfile. La supplémentation en vitamine A et le déparasitage sont différés. L''enregistrement des naissances est hors périmètre (Identifiant PS / territoire CRVS). La vaccination contre le HPV est différée (périmètre adolescent).'
      es: 'Un registro puntual del estado de salud y los episodios de enfermedad recientes de un niño de 1 a 59 meses de edad (menor de 5 años), reportado por el cuidador principal. Cada registro está delimitado a un solo niño (sujeto: persona de 1 a 59 meses cumplidos); los hogares con múltiples niños menores de 5 años generan un registro por niño.

        El perfil cubre tres dominios: (1) historial de vacunación — estado por antígeno verificado en el carnet de vacunación domiciliario o por memoria del cuidador, siguiendo el calendario recomendado del PAI (Programa Ampliado de Inmunización) de la OMS; (2) enfermedades recientes — recordatorio de 2 semanas del cuidador para diarrea, infección respiratoria aguda (IRA/proxy de neumonía) y fiebre, con ítems de tratamiento (SRO, zinc, TRO, antibióticos, antipalúdicos); y (3) búsqueda de atención — tipo de proveedor visitado para cada episodio de enfermedad.

        Las mediciones físicas (talla, peso, PB, edema) están deliberadamente excluidas y pertenecen al AnthropometricProfile. Las prácticas de alimentación del lactante y del niño pequeño (lactancia materna, alimentación complementaria, DDM-C) están excluidas y pertenecen al NutritionPracticesProfile. La suplementación con vitamina A y el desparasitamiento se difieren. El registro de nacimientos está fuera del alcance (Identificador PS / territorio CRVS). La vacunación contra el VPH se difiere (alcance adolescente).'
    is_a: Profile
    class_uri: aidops:ChildHealthProfile
