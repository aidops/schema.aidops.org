      es: 'Si la mujer recibió o tuvo acceso a un kit de parto limpio para su nacimiento más reciente (Objetivo MISP 4). Preguntar solo si la mujer tuvo un parto en los últimos 12 meses. Estándar mínimo MISP: los kits de parto limpio deben estar disponibles para todos los partos domiciliarios o fuera de instalaciones previstos.'
