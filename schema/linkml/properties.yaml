      fr: 'Redevabilité : Se sent en sécurité avec le personnel (dérivé)'
      es: 'Rendición de cuentas: Se siente seguro con el personal (derivado)'
    description:
      en: 'Derived household-level boolean: true if `aap_feels_safe_with_responders IN (very_safe, somewhat_safe)`. Maps to CHS 2024 Commitment 8. PSEA-adjacent: a low community-level proportion of `true` should trigger programmatic review of staff behaviour and PSEA framework.'
      fr: 'Booléen dérivé au niveau ménage : vrai si `aap_feels_safe_with_responders IN (very_safe, somewhat_safe)`. Correspond à l''Engagement 8 de la CHS 2024. Lié à la PSEA : une faible proportion communautaire de `true` devrait déclencher une révision programmatique du comportement du personnel et du cadre PSEA.'
      es: 'Booleano derivado a nivel de hogar: verdadero si `aap_feels_safe_with_responders IN (very_safe, somewhat_safe)`. Corresponde al Compromiso 8 de la CHS 2024. Relacionado con PSEA: una baja proporción comunitaria de `true` debería desencadenar una revisión programática del comportamiento del personal y del marco PSEA.'
