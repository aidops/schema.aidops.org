  diarrhea_blood_in_stool:
    title:
      en: Blood in stool (dysentery)
      fr: Sang dans les selles (dysenterie)
      es: Sangre en las heces (disentería)
    description:
      en: 'Whether there was blood in the child''s stool during the diarrhea episode — indicating dysentery. Published wording: ''Was there blood in the stool (dysentery)?'' IMCI classification: blood in stool = dysentery, requiring antibiotic treatment (ciprofloxacin). Sphere 2018 includes bloody diarrhea as an emergency threshold indicator. Ask only if diarrhea_last_2wks is not false. DHS DHS-8 expanded module; MICS code CD2.'
      fr: 'Si du sang était présent dans les selles de l''enfant lors de l''épisode de diarrhée — indiquant une dysenterie. Formulation publiée : « Y avait-il du sang dans les selles (dysenterie) ? » Classification PCIME : sang dans les selles = dysenterie, nécessitant un traitement antibiotique (ciprofloxacine). Sphère 2018 inclut la diarrhée sanglante comme indicateur de seuil d''urgence. Posez uniquement si diarrhea_last_2wks est vrai. Module étendu DHS-8 ; code MICS CD2.'
      es: 'Si había sangre en las heces del niño durante el episodio de diarrea — indicando disentería. Redacción publicada: ''¿Había sangre en las heces (disentería)?'' Clasificación IMCI: sangre en heces = disentería, requiriendo tratamiento antibiótico (ciprofloxacina). Esfera 2018 incluye la diarrea con sangre como indicador umbral de emergencia. Preguntar solo si diarrhea_last_2wks es verdadero. Módulo ampliado DHS-8; código MICS CD2.'
    slot_uri: aidops:diarrhea_blood_in_stool
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-imci"], "cardinality": "single", "category": "diarrhea", "core": true, "definition": {"en": "Whether there was blood in the child''s stool during the diarrhea episode \u2014 indicating dysentery. Published wording: ''Was there blood in the stool (dysentery)?'' IMCI classification: blood in stool = dysentery, requiring antibiotic treatment (ciprofloxacin). Sphere 2018 includes bloody diarrhea as an emergency threshold indicator. Ask only if diarrhea_last_2wks is not false. DHS DHS-8 expanded module; MICS code CD2.", "es": "Si hab\u00eda sangre en las heces del ni\u00f1o durante el episodio de diarrea \u2014 indicando disenter\u00eda. Redacci\u00f3n publicada: ''\u00bfHab\u00eda sangre en las heces (disenter\u00eda)?'' Clasificaci\u00f3n IMCI: sangre en heces = disenter\u00eda, requiriendo tratamiento antibi\u00f3tico (ciprofloxacina). Esfera 2018 incluye la diarrea con sangre como indicador umbral de emergencia. Preguntar solo si diarrhea_last_2wks es verdadero. M\u00f3dulo ampliado DHS-8; c\u00f3digo MICS CD2.", "fr": "Si du sang \u00e9tait pr\u00e9sent dans les selles de l''enfant lors de l''\u00e9pisode de diarrh\u00e9e \u2014 indiquant une dysenterie. Formulation publi\u00e9e : \u00ab Y avait-il du sang dans les selles (dysenterie) ? \u00bb Classification PCIME : sang dans les selles = dysenterie, n\u00e9cessitant un traitement antibiotique (ciprofloxacine). Sph\u00e8re 2018 inclut la diarrh\u00e9e sanglante comme indicateur de seuil d''urgence. Posez uniquement si diarrhea_last_2wks est vrai. Module \u00e9tendu DHS-8 ; code MICS CD2."}, "id": "diarrhea_blood_in_stool", "label": {"en": "Blood in stool (dysentery)", "es": "Sangre en las heces (disenter\u00eda)", "fr": "Sang dans les selles (dysenterie)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
