  aap_needs_reflected_in_aid:
    title:
      en: 'AAP: Aid reflects household''s stated needs'
      fr: 'Redevabilité : L''aide reflète les besoins exprimés du ménage'
      es: 'Rendición de cuentas: La ayuda refleja las necesidades expresadas del hogar'
    description:
      en: 'How well the aid the household has received reflects what it told aid providers it needed. GTS Humanitarian Voice Index relevance indicator; IASC / REACH Menu 2018 relevance section. Recall: most recent assistance received. Use of `not_applicable` is appropriate when no prior consultation took place (see `aap_consulted_before_aid`).'
      fr: 'Dans quelle mesure l''aide reçue par le ménage reflète ce qu''il avait exprimé comme besoin auprès des intervenants. Indicateur de pertinence de l''Indice de voix humanitaire GTS ; section de pertinence du Menu IASC / REACH 2018. Rappel : aide la plus récente reçue. L''utilisation de `not_applicable` est appropriée lorsqu''aucune consultation préalable n''a eu lieu (voir `aap_consulted_before_aid`).'
      es: 'En qué medida la ayuda recibida por el hogar refleja lo que expresó como necesidad a los actores humanitarios. Indicador de relevancia del Índice de Voz Humanitaria de GTS; sección de relevancia del Menú IASC / REACH 2018. Recordatorio: la ayuda más reciente recibida. El uso de `not_applicable` es apropiado cuando no hubo consulta previa (ver `aap_consulted_before_aid`).'
    slot_uri: aidops:aap_needs_reflected_in_aid
    range: AapSatisfaction5
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi", "iasc-reach-aap-menu-2018"], "cardinality": "single", "category": "aap_consultation", "core": false, "definition": {"en": "How well the aid the household has received reflects what it told aid providers it needed. GTS Humanitarian Voice Index relevance indicator; IASC / REACH Menu 2018 relevance section. Recall: most recent assistance received. Use of `not_applicable` is appropriate when no prior consultation took place (see `aap_consulted_before_aid`).", "es": "En qu\u00e9 medida la ayuda recibida por el hogar refleja lo que expres\u00f3 como necesidad a los actores humanitarios. Indicador de relevancia del \u00cdndice de Voz Humanitaria de GTS; secci\u00f3n de relevancia del Men\u00fa IASC / REACH 2018. Recordatorio: la ayuda m\u00e1s reciente recibida. El uso de `not_applicable` es apropiado cuando no hubo consulta previa (ver `aap_consulted_before_aid`).", "fr": "Dans quelle mesure l''aide re\u00e7ue par le m\u00e9nage refl\u00e8te ce qu''il avait exprim\u00e9 comme besoin aupr\u00e8s des intervenants. Indicateur de pertinence de l''Indice de voix humanitaire GTS ; section de pertinence du Menu IASC / REACH 2018. Rappel : aide la plus r\u00e9cente re\u00e7ue. L''utilisation de `not_applicable` est appropri\u00e9e lorsqu''aucune consultation pr\u00e9alable n''a eu lieu (voir `aap_consulted_before_aid`)."}, "id": "aap_needs_reflected_in_aid", "label": {"en": "AAP: Aid reflects household''s stated needs", "es": "Rendici\u00f3n de cuentas: La ayuda refleja las necesidades expresadas del hogar", "fr": "Redevabilit\u00e9 : L''aide refl\u00e8te les besoins exprim\u00e9s du m\u00e9nage"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-satisfaction-5"}'
