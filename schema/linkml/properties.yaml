  hh_violence_exposure:
    title:
      en: Household exposure to violence (past 3 months)
      fr: Exposition du ménage à la violence (3 derniers mois)
      es: Exposición del hogar a violencia (últimos 3 meses)
    description:
      en: 'Whether any household member experienced or directly witnessed violence — such as physical attack, deliberate bombing or shelling of civilian areas, forced entry, or looting — by any armed actor or unknown perpetrator in the past 3 months. Asked at aggregate household level; does NOT collect perpetrator names, individual identity, or incident details. GBV incidents are NOT captured here (owned by GBVRiskProfile / future IndividualGBVExperienceProfile). Framing at ''any member'' keeps this household-level. JIAF 2.0 Protection Indicator P1; GPC PAF Domain 1 Indicator 1.1. Critical enumerator instruction: if a respondent spontaneously discloses an incident, acknowledge calmly, do not probe, provide referral card, and flag x_spontaneous_disclosure = true in form metadata.'
      fr: 'Si un membre du ménage a subi ou directement été témoin de violences — telles qu''une agression physique, des bombardements ou tirs délibérés sur des zones civiles, une entrée forcée, ou un pillage — par un acteur armé ou un auteur inconnu au cours des 3 derniers mois. Posée au niveau agrégé du ménage ; ne collecte PAS les noms des auteurs, l''identité individuelle, ni les détails de l''incident. Les incidents VBG ne sont PAS capturés ici (appartenant à GBVRiskProfile / futur IndividualGBVExperienceProfile). Le cadrage sur ''un membre'' maintient cela au niveau du ménage. Indicateur de protection JIAF 2.0 P1 ; GPC PAF Domaine 1 Indicateur 1.1. Instruction critique pour l''enquêteur : si un répondant divulgue spontanément un incident, réagir calmement, ne pas approfondir, remettre la carte de référence et marquer x_spontaneous_disclosure = true dans les métadonnées du formulaire.'
      es: 'Si algún miembro del hogar ha experimentado o presenciado directamente violencia — como ataque físico, bombardeo o artillería deliberada contra zonas civiles, entrada forzada, o saqueo — por parte de algún actor armado o perpetrador desconocido en los últimos 3 meses. Se pregunta a nivel agregado del hogar; NO recopila nombres de perpetradores, identidad individual, ni detalles del incidente. Los incidentes de VBG NO se capturan aquí (pertenecen a GBVRiskProfile / futuro IndividualGBVExperienceProfile). El encuadre en ''algún miembro'' mantiene esto a nivel del hogar. Indicador de Protección JIAF 2.0 P1; GPC PAF Dominio 1 Indicador 1.1. Instrucción crítica para el encuestador: si un encuestado divulga espontáneamente un incidente, reconocer con calma, no indagar, proporcionar la tarjeta de referencia y marcar x_spontaneous_disclosure = true en los metadatos del formulario.'
    slot_uri: aidops:hh_violence_exposure
    range: YesNoPnta
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["alnap-hpg-protection-2012", "gpc-paf-2021", "iasc-protection-indicators-2021", "icrc-enhancing-protection-2018", "iom-dtm-protection-2021", "jiaf-2-0-2022", "reach-protection-monitoring-2022", "sphere-handbook-2018-protection", "unhcr-protection-mainstreaming-2016"], "cardinality": "single", "category": "physical_safety", "core": true, "definition": {"en": "Whether any household member experienced or directly witnessed violence \u2014 such as physical attack, deliberate bombing or shelling of civilian areas, forced entry, or looting \u2014 by any armed actor or unknown perpetrator in the past 3 months. Asked at aggregate household level; does NOT collect perpetrator names, individual identity, or incident details. GBV incidents are NOT captured here (owned by GBVRiskProfile / future IndividualGBVExperienceProfile). Framing at ''any member'' keeps this household-level. JIAF 2.0 Protection Indicator P1; GPC PAF Domain 1 Indicator 1.1. Critical enumerator instruction: if a respondent spontaneously discloses an incident, acknowledge calmly, do not probe, provide referral card, and flag x_spontaneous_disclosure = true in form metadata.", "es": "Si alg\u00fan miembro del hogar ha experimentado o presenciado directamente violencia \u2014 como ataque f\u00edsico, bombardeo o artiller\u00eda deliberada contra zonas civiles, entrada forzada, o saqueo \u2014 por parte de alg\u00fan actor armado o perpetrador desconocido en los \u00faltimos 3 meses. Se pregunta a nivel agregado del hogar; NO recopila nombres de perpetradores, identidad individual, ni detalles del incidente. Los incidentes de VBG NO se capturan aqu\u00ed (pertenecen a GBVRiskProfile / futuro IndividualGBVExperienceProfile). El encuadre en ''alg\u00fan miembro'' mantiene esto a nivel del hogar. Indicador de Protecci\u00f3n JIAF 2.0 P1; GPC PAF Dominio 1 Indicador 1.1. Instrucci\u00f3n cr\u00edtica para el encuestador: si un encuestado divulga espont\u00e1neamente un incidente, reconocer con calma, no indagar, proporcionar la tarjeta de referencia y marcar x_spontaneous_disclosure = true en los metadatos del formulario.", "fr": "Si un membre du m\u00e9nage a subi ou directement \u00e9t\u00e9 t\u00e9moin de violences \u2014 telles qu''une agression physique, des bombardements ou tirs d\u00e9lib\u00e9r\u00e9s sur des zones civiles, une entr\u00e9e forc\u00e9e, ou un pillage \u2014 par un acteur arm\u00e9 ou un auteur inconnu au cours des 3 derniers mois. Pos\u00e9e au niveau agr\u00e9g\u00e9 du m\u00e9nage ; ne collecte PAS les noms des auteurs, l''identit\u00e9 individuelle, ni les d\u00e9tails de l''incident. Les incidents VBG ne sont PAS captur\u00e9s ici (appartenant \u00e0 GBVRiskProfile / futur IndividualGBVExperienceProfile). Le cadrage sur ''un membre'' maintient cela au niveau du m\u00e9nage. Indicateur de protection JIAF 2.0 P1 ; GPC PAF Domaine 1 Indicateur 1.1. Instruction critique pour l''enqu\u00eateur : si un r\u00e9pondant divulgue spontan\u00e9ment un incident, r\u00e9agir calmement, ne pas approfondir, remettre la carte de r\u00e9f\u00e9rence et marquer x_spontaneous_disclosure = true dans les m\u00e9tadonn\u00e9es du formulaire."}, "id": "hh_violence_exposure", "label": {"en": "Household exposure to violence (past 3 months)", "es": "Exposici\u00f3n del hogar a violencia (\u00faltimos 3 meses)", "fr": "Exposition du m\u00e9nage \u00e0 la violence (3 derniers mois)"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "yes-no-pnta"}'
      bibliography_refs: alnap-hpg-protection-2012,gpc-paf-2021,iasc-protection-indicators-2021,icrc-enhancing-protection-2018,iom-dtm-protection-2021,jiaf-2-0-2022,reach-protection-monitoring-2022,sphere-handbook-2018-protection,unhcr-protection-mainstreaming-2016
  hh_violence_types:
    title:
      en: Household violence types
      fr: Types de violence subis par le ménage
      es: Tipos de violencia experimentados por el hogar
    description:
      en: Types of violence that household members experienced or witnessed in the past 3 months. Asked only when hh_violence_exposure = yes. Record only what the respondent mentions voluntarily; do not probe for details. If abduction_kidnapping, forced_recruitment, or arbitrary_detention is selected, do not ask any follow-up questions. GBV incidents are NOT listed here. Sexual violence as a tactic of conflict appears under physical_attack in this aggregated view — do not add a specific GBV code. Based on GPC PAF Domain 1; REACH Syria / Yemen (2022) Physical Safety module; IOM DTM Protection Monitoring incident typology; ICRC Enhancing Protection (2018).
      fr: Types de violence que les membres du ménage ont subis ou dont ils ont été témoins au cours des 3 derniers mois. Posée uniquement lorsque hh_violence_exposure = oui. Enregistrer uniquement ce que le répondant mentionne volontairement ; ne pas chercher à obtenir des détails. Si abduction_kidnapping, forced_recruitment ou arbitrary_detention est sélectionné, ne poser aucune question de suivi. Les incidents VBG ne sont PAS répertoriés ici. La violence sexuelle comme tactique de conflit apparaît sous physical_attack dans cette vue agrégée — ne pas ajouter de code VBG spécifique. Fondé sur GPC PAF Domaine 1 ; module Sécurité physique REACH Syrie/Yémen (2022) ; typologie des incidents de Suivi de la protection DTM de l'OIM ; CICR Améliorer la protection (2018).
      es: Tipos de violencia que los miembros del hogar experimentaron o presenciaron en los últimos 3 meses. Se pregunta solo cuando hh_violence_exposure = sí. Registrar solo lo que el encuestado menciona voluntariamente; no indagar por detalles. Si se selecciona abduction_kidnapping, forced_recruitment o arbitrary_detention, no hacer preguntas de seguimiento. Los incidentes de VBG NO están listados aquí. La violencia sexual como táctica de conflicto aparece bajo physical_attack en esta vista agregada — no agregar un código VBG específico. Basado en GPC PAF Dominio 1; módulo de Seguridad Física de REACH Siria/Yemen (2022); tipología de incidentes de Monitoreo de Protección DTM de la OIM; CICR Mejora de la Protección (2018).
