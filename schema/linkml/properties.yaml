      fr: 'Violence par partenaire précédent : moment du dernier épisode'
      es: 'Violencia de compañero anterior: momento del episodio más reciente'
    description:
      en: 'Timing of the most recent episode of violence by a previous husband or partner, relative to the interview date. DHS instrument item DV15B. Asked only if at least one of gbv_prev_partner_phys_violence, gbv_prev_partner_sex_violence, or gbv_prev_partner_emot_violence = true. DHS-7+ compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
