slots:
  aap_aid_met_priority_needs:
    title:
      en: 'AAP: Aid met priority needs'
      fr: 'Redevabilité : L''aide a répondu aux besoins prioritaires'
      es: 'Rendición de cuentas: La ayuda cumplió con las necesidades prioritarias'
    description:
      en: 'Whether the most recent aid received met the things the household most needed. Maps to CHS 2024 Commitments 2 and 7 (relevance indicator). GTS HVI relevance pillar. Distinct from objective sufficiency (see `aap_aid_quantity_sufficient` for quantity perception; sector profiles for adequacy measurement). Source: IASC / REACH Menu 2018.'
      fr: 'Si l''aide la plus récente reçue a répondu à ce dont le ménage avait le plus besoin. Correspond aux Engagements 2 et 7 de la CHS 2024 (indicateur de pertinence). Pilier de pertinence de GTS HVI. Distinct de la suffisance objective (voir `aap_aid_quantity_sufficient` pour la perception de la quantité ; profils sectoriels pour la mesure de l''adéquation). Source : Menu IASC / REACH 2018.'
      es: 'Si la ayuda más reciente recibida cumplió con lo que el hogar más necesitaba. Corresponde a los Compromisos 2 y 7 de la CHS 2024 (indicador de relevancia). Pilar de relevancia de GTS HVI. Distinto de la suficiencia objetiva (ver `aap_aid_quantity_sufficient` para la percepción de la cantidad; perfiles sectoriales para la medición de la adecuación). Fuente: Menú IASC / REACH 2018.'
    slot_uri: aidops:aap_aid_met_priority_needs
    range: AapSatisfaction5
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi", "iasc-reach-aap-menu-2018"], "cardinality": "single", "category": "aap_timeliness", "core": false, "definition": {"en": "Whether the most recent aid received met the things the household most needed. Maps to CHS 2024 Commitments 2 and 7 (relevance indicator). GTS HVI relevance pillar. Distinct from objective sufficiency (see `aap_aid_quantity_sufficient` for quantity perception; sector profiles for adequacy measurement). Source: IASC / REACH Menu 2018.", "es": "Si la ayuda m\u00e1s reciente recibida cumpli\u00f3 con lo que el hogar m\u00e1s necesitaba. Corresponde a los Compromisos 2 y 7 de la CHS 2024 (indicador de relevancia). Pilar de relevancia de GTS HVI. Distinto de la suficiencia objetiva (ver `aap_aid_quantity_sufficient` para la percepci\u00f3n de la cantidad; perfiles sectoriales para la medici\u00f3n de la adecuaci\u00f3n). Fuente: Men\u00fa IASC / REACH 2018.", "fr": "Si l''aide la plus r\u00e9cente re\u00e7ue a r\u00e9pondu \u00e0 ce dont le m\u00e9nage avait le plus besoin. Correspond aux Engagements 2 et 7 de la CHS 2024 (indicateur de pertinence). Pilier de pertinence de GTS HVI. Distinct de la suffisance objective (voir `aap_aid_quantity_sufficient` pour la perception de la quantit\u00e9 ; profils sectoriels pour la mesure de l''ad\u00e9quation). Source : Menu IASC / REACH 2018."}, "id": "aap_aid_met_priority_needs", "label": {"en": "AAP: Aid met priority needs", "es": "Rendici\u00f3n de cuentas: La ayuda cumpli\u00f3 con las necesidades prioritarias", "fr": "Redevabilit\u00e9 : L''aide a r\u00e9pondu aux besoins prioritaires"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-satisfaction-5"}'
      bibliography_refs: chs-2024,gts-hvi,iasc-reach-aap-menu-2018
  aap_aid_quantity_sufficient:
    title:
      en: 'AAP: Aid quantity perceived sufficient'
      fr: 'Redevabilité : Quantité d''aide perçue comme suffisante'
      es: 'Rendición de cuentas: Cantidad de ayuda percibida como suficiente'
    description:
      en: 'Household''s perception of whether the quantity of aid received was enough for its needs. Perception-based: the objective measure (rations meeting Sphere calorie minima, shelter kits meeting Sphere completeness) belongs to sector profiles (FoodSecurityProfile, ShelterAdequacyProfile, WASHAssessmentProfile) and can be triangulated. Source: IASC / REACH Menu 2018; OCHA oPt MSNA quantity-satisfaction indicator.'
      fr: 'Perception du ménage quant à savoir si la quantité d''aide reçue était suffisante pour ses besoins. Fondé sur la perception : la mesure objective (rations atteignant les minima caloriques Sphère, kits abri atteignant la complétude Sphère) appartient aux profils sectoriels (Profil de sécurité alimentaire, Profil d''adéquation de l''abri, Profil d''évaluation EHA) et peut être triangulée. Source : Menu IASC / REACH 2018 ; indicateur de satisfaction quantitative OCHA MSNA oPt.'
      es: 'Percepción del hogar sobre si la cantidad de ayuda recibida era suficiente para sus necesidades. Basado en percepción: la medida objetiva (raciones que cumplen con los mínimos calóricos de Esfera, kits de refugio que cumplen con la completitud de Esfera) pertenece a los perfiles sectoriales (Perfil de Seguridad Alimentaria, Perfil de Adecuación del Refugio, Perfil de Evaluación WASH) y puede triangularse. Fuente: Menú IASC / REACH 2018; indicador de satisfacción con cantidad de OCHA MSNA oPt.'
    slot_uri: aidops:aap_aid_quantity_sufficient
    range: AapSufficient4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "iasc-reach-aap-menu-2018", "ocha-aap-msna-findings-2022"], "cardinality": "single", "category": "aap_timeliness", "core": false, "definition": {"en": "Household''s perception of whether the quantity of aid received was enough for its needs. Perception-based: the objective measure (rations meeting Sphere calorie minima, shelter kits meeting Sphere completeness) belongs to sector profiles (FoodSecurityProfile, ShelterAdequacyProfile, WASHAssessmentProfile) and can be triangulated. Source: IASC / REACH Menu 2018; OCHA oPt MSNA quantity-satisfaction indicator.", "es": "Percepci\u00f3n del hogar sobre si la cantidad de ayuda recibida era suficiente para sus necesidades. Basado en percepci\u00f3n: la medida objetiva (raciones que cumplen con los m\u00ednimos cal\u00f3ricos de Esfera, kits de refugio que cumplen con la completitud de Esfera) pertenece a los perfiles sectoriales (Perfil de Seguridad Alimentaria, Perfil de Adecuaci\u00f3n del Refugio, Perfil de Evaluaci\u00f3n WASH) y puede triangularse. Fuente: Men\u00fa IASC / REACH 2018; indicador de satisfacci\u00f3n con cantidad de OCHA MSNA oPt.", "fr": "Perception du m\u00e9nage quant \u00e0 savoir si la quantit\u00e9 d''aide re\u00e7ue \u00e9tait suffisante pour ses besoins. Fond\u00e9 sur la perception : la mesure objective (rations atteignant les minima caloriques Sph\u00e8re, kits abri atteignant la compl\u00e9tude Sph\u00e8re) appartient aux profils sectoriels (Profil de s\u00e9curit\u00e9 alimentaire, Profil d''ad\u00e9quation de l''abri, Profil d''\u00e9valuation EHA) et peut \u00eatre triangul\u00e9e. Source : Menu IASC / REACH 2018 ; indicateur de satisfaction quantitative OCHA MSNA oPt."}, "id": "aap_aid_quantity_sufficient", "label": {"en": "AAP: Aid quantity perceived sufficient", "es": "Rendici\u00f3n de cuentas: Cantidad de ayuda percibida como suficiente", "fr": "Redevabilit\u00e9 : Quantit\u00e9 d''aide per\u00e7ue comme suffisante"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-sufficient-4"}'
      bibliography_refs: chs-2024,iasc-reach-aap-menu-2018,ocha-aap-msna-findings-2022
  aap_aid_relevant_flag:
    title:
      en: 'AAP: Aid perceived relevant to priority needs (derived)'
      fr: 'Redevabilité : Aide perçue pertinente aux besoins prioritaires (dérivé)'
      es: 'Rendición de cuentas: Ayuda percibida relevante a necesidades prioritarias (derivado)'
    description:
      en: 'Derived household-level boolean: true if `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Maps to CHS 2024 Commitments 2 and 7 and to GTS HVI relevance pillar. Directly aggregates to the OCHA HNO indicator ''% of households reporting that aid met priority needs''.'
      fr: 'Booléen dérivé au niveau ménage : vrai si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Correspond aux Engagements 2 et 7 de la CHS 2024 et au pilier de pertinence GTS HVI. S''agrège directement à l''indicateur OCHA HNO « % de ménages rapportant que l''aide a répondu aux besoins prioritaires ».'
      es: 'Booleano derivado a nivel de hogar: verdadero si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Corresponde a los Compromisos 2 y 7 de la CHS 2024 y al pilar de relevancia de GTS HVI. Se agrega directamente al indicador OCHA HNO «% de hogares que reportan que la ayuda cumplió con las necesidades prioritarias».'
    slot_uri: aidops:aap_aid_relevant_flag
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-alliance-verification"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived household-level boolean: true if `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Maps to CHS 2024 Commitments 2 and 7 and to GTS HVI relevance pillar. Directly aggregates to the OCHA HNO indicator ''% of households reporting that aid met priority needs''.", "es": "Booleano derivado a nivel de hogar: verdadero si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Corresponde a los Compromisos 2 y 7 de la CHS 2024 y al pilar de relevancia de GTS HVI. Se agrega directamente al indicador OCHA HNO \u00ab% de hogares que reportan que la ayuda cumpli\u00f3 con las necesidades prioritarias\u00bb.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 au niveau m\u00e9nage : vrai si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Correspond aux Engagements 2 et 7 de la CHS 2024 et au pilier de pertinence GTS HVI. S''agr\u00e8ge directement \u00e0 l''indicateur OCHA HNO \u00ab % de m\u00e9nages rapportant que l''aide a r\u00e9pondu aux besoins prioritaires \u00bb."}, "id": "aap_aid_relevant_flag", "label": {"en": "AAP: Aid perceived relevant to priority needs (derived)", "es": "Rendici\u00f3n de cuentas: Ayuda percibida relevante a necesidades prioritarias (derivado)", "fr": "Redevabilit\u00e9 : Aide per\u00e7ue pertinente aux besoins prioritaires (d\u00e9riv\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
      bibliography_refs: chs-alliance-verification
  aap_aid_timely:
    title:
      en: 'AAP: Aid arrived on time'
      fr: 'Redevabilité : L''aide est arrivée à temps'
      es: 'Rendición de cuentas: La ayuda llegó a tiempo'
    description:
      en: 'Whether the most recent aid the household received arrived when it was needed. Perception-based; the objective measure belongs to operational M&E data. Maps to CHS 2024 Commitment 2 (''Access timely and effective support in accordance with their specific needs and priorities''). Source: IASC / REACH Menu 2018; GTS HVI timeliness item.'
      fr: 'Si l''aide la plus récente reçue par le ménage est arrivée au moment où elle était nécessaire. Fondé sur la perception ; la mesure objective appartient aux données opérationnelles de suivi-évaluation. Correspond à l''Engagement 2 de la CHS 2024 (« Accéder à un soutien opportun et efficace en fonction de leurs besoins et priorités spécifiques »). Source : Menu IASC / REACH 2018 ; item de rapidité GTS HVI.'
      es: 'Si la ayuda más reciente que recibió el hogar llegó cuando se necesitaba. Basado en percepción; la medida objetiva pertenece a los datos operativos de seguimiento y evaluación. Corresponde al Compromiso 2 de la CHS 2024 («Acceder a apoyo oportuno y eficaz de acuerdo con sus necesidades y prioridades específicas»). Fuente: Menú IASC / REACH 2018; ítem de oportunidad de GTS HVI.'
    slot_uri: aidops:aap_aid_timely
    range: AapTimeliness4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi", "iasc-reach-aap-menu-2018"], "cardinality": "single", "category": "aap_timeliness", "core": false, "definition": {"en": "Whether the most recent aid the household received arrived when it was needed. Perception-based; the objective measure belongs to operational M&E data. Maps to CHS 2024 Commitment 2 (''Access timely and effective support in accordance with their specific needs and priorities''). Source: IASC / REACH Menu 2018; GTS HVI timeliness item.", "es": "Si la ayuda m\u00e1s reciente que recibi\u00f3 el hogar lleg\u00f3 cuando se necesitaba. Basado en percepci\u00f3n; la medida objetiva pertenece a los datos operativos de seguimiento y evaluaci\u00f3n. Corresponde al Compromiso 2 de la CHS 2024 (\u00abAcceder a apoyo oportuno y eficaz de acuerdo con sus necesidades y prioridades espec\u00edficas\u00bb). Fuente: Men\u00fa IASC / REACH 2018; \u00edtem de oportunidad de GTS HVI.", "fr": "Si l''aide la plus r\u00e9cente re\u00e7ue par le m\u00e9nage est arriv\u00e9e au moment o\u00f9 elle \u00e9tait n\u00e9cessaire. Fond\u00e9 sur la perception ; la mesure objective appartient aux donn\u00e9es op\u00e9rationnelles de suivi-\u00e9valuation. Correspond \u00e0 l''Engagement 2 de la CHS 2024 (\u00ab Acc\u00e9der \u00e0 un soutien opportun et efficace en fonction de leurs besoins et priorit\u00e9s sp\u00e9cifiques \u00bb). Source : Menu IASC / REACH 2018 ; item de rapidit\u00e9 GTS HVI."}, "id": "aap_aid_timely", "label": {"en": "AAP: Aid arrived on time", "es": "Rendici\u00f3n de cuentas: La ayuda lleg\u00f3 a tiempo", "fr": "Redevabilit\u00e9 : L''aide est arriv\u00e9e \u00e0 temps"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-timeliness-4"}'
      bibliography_refs: chs-2024,gts-hvi,iasc-reach-aap-menu-2018
