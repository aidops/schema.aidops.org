  aap_complaint_would_use:
    title:
      en: 'AAP: Would use complaint channel'
      fr: 'Redevabilité : Utiliserait le canal de plainte'
      es: 'Rendición de cuentas: Usaría el canal de quejas'
    description:
      en: 'Hypothetical likelihood that the respondent would use one of the known complaint channels if they had a concern. Asked regardless of `aap_complaint_channel_known`: a respondent who does not know a channel can still meaningfully answer ''not at all likely'' for reasons of distrust, fear of retaliation, or perceived futility. Maps to CHS 2024 Commitment 5 Key Action 5.2 (''access to safe and responsive ways to raise concerns or complaints''). GTS HVI ''meaningful access'' indicator.'
      fr: 'Probabilité hypothétique que le répondant utilise un des canaux de plainte connus s''il avait une préoccupation. Demandé indépendamment de `aap_complaint_channel_known` : un répondant qui ne connaît pas de canal peut toujours répondre de manière significative « pas du tout probable » pour des raisons de méfiance, de peur de représailles ou de futilité perçue. Correspond à l''Engagement 5 Action clé 5.2 de la CHS 2024 (« accès à des moyens sûrs et réactifs pour soulever des préoccupations ou des plaintes »). Indicateur d''« accès significatif » de GTS HVI.'
      es: 'Probabilidad hipotética de que el encuestado utilice uno de los canales de quejas conocidos si tuviera una inquietud. Se pregunta independientemente de `aap_complaint_channel_known`: un encuestado que no conoce un canal aún puede responder significativamente «nada probable» por razones de desconfianza, miedo a represalias o futilidad percibida. Corresponde al Compromiso 5 Acción Clave 5.2 de la CHS 2024 («acceso a medios seguros y receptivos para plantear inquietudes o quejas»). Indicador de «acceso significativo» de GTS HVI.'
    slot_uri: aidops:aap_complaint_would_use
    range: AapLikelihood4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi", "iasc-caap-2017", "iasc-reach-aap-menu-2018"], "cardinality": "single", "category": "aap_feedback", "core": false, "definition": {"en": "Hypothetical likelihood that the respondent would use one of the known complaint channels if they had a concern. Asked regardless of `aap_complaint_channel_known`: a respondent who does not know a channel can still meaningfully answer ''not at all likely'' for reasons of distrust, fear of retaliation, or perceived futility. Maps to CHS 2024 Commitment 5 Key Action 5.2 (''access to safe and responsive ways to raise concerns or complaints''). GTS HVI ''meaningful access'' indicator.", "es": "Probabilidad hipot\u00e9tica de que el encuestado utilice uno de los canales de quejas conocidos si tuviera una inquietud. Se pregunta independientemente de `aap_complaint_channel_known`: un encuestado que no conoce un canal a\u00fan puede responder significativamente \u00abnada probable\u00bb por razones de desconfianza, miedo a represalias o futilidad percibida. Corresponde al Compromiso 5 Acci\u00f3n Clave 5.2 de la CHS 2024 (\u00abacceso a medios seguros y receptivos para plantear inquietudes o quejas\u00bb). Indicador de \u00abacceso significativo\u00bb de GTS HVI.", "fr": "Probabilit\u00e9 hypoth\u00e9tique que le r\u00e9pondant utilise un des canaux de plainte connus s''il avait une pr\u00e9occupation. Demand\u00e9 ind\u00e9pendamment de `aap_complaint_channel_known` : un r\u00e9pondant qui ne conna\u00eet pas de canal peut toujours r\u00e9pondre de mani\u00e8re significative \u00ab pas du tout probable \u00bb pour des raisons de m\u00e9fiance, de peur de repr\u00e9sailles ou de futilit\u00e9 per\u00e7ue. Correspond \u00e0 l''Engagement 5 Action cl\u00e9 5.2 de la CHS 2024 (\u00ab acc\u00e8s \u00e0 des moyens s\u00fbrs et r\u00e9actifs pour soulever des pr\u00e9occupations ou des plaintes \u00bb). Indicateur d''\u00ab acc\u00e8s significatif \u00bb de GTS HVI."}, "id": "aap_complaint_would_use", "label": {"en": "AAP: Would use complaint channel", "es": "Rendici\u00f3n de cuentas: Usar\u00eda el canal de quejas", "fr": "Redevabilit\u00e9 : Utiliserait le canal de plainte"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-likelihood-4"}'
