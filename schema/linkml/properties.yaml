      fr: 'Indique si l''enfant a été alimenté au biberon (avec tétine) hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier dans la journée ou la nuit, (PRÉNOM) a-t-il/elle été alimenté(e) au biberon (avec tétine) ? » Item du numérateur pour l''indicateur d''alimentation au biberon (s''applique aux enfants de 0 à 23 mois). L''alimentation au biberon est un indicateur de risque hygiénique indépendamment de l''âge.'
      es: 'Indica si el niño fue alimentado con biberón con tetina ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): ''Ayer durante el día o la noche, ¿fue (NOMBRE) alimentado con biberón con tetina?'' Ítem numerador para el indicador de Alimentación con Biberón (aplica a niños de 0–23 meses). La alimentación con biberón es un indicador de riesgo higiénico independientemente de la edad.'
