  sphere_clothing_pass:
    title:
      en: Sphere Standard 1 (clothing and bedding) pass
      fr: Norme Sphère 1 (vêtements et literie) satisfaite
      es: Norma Esfera 1 (ropa y cama) cumplida
    description:
      en: 'Whether the household meets the Sphere Standard 1 (clothing and bedding) minimum threshold. Derived as: climate_appropriate_clothing_all = yes_all AND blankets_count / household_size >= 1 AND sleeping_mat_count / household_size >= 1. Objective-threshold enumerator-observation score, distinct from the self-report clothing_bedding_sufficient item.'
      fr: 'Si le ménage satisfait au seuil minimal de la Norme Sphère 1 (vêtements et literie). Dérivé comme : climate_appropriate_clothing_all = yes_all ET blankets_count / household_size >= 1 ET sleeping_mat_count / household_size >= 1. Score d''observation de l''enquêteur au seuil objectif, distinct de l''item auto-déclaré clothing_bedding_sufficient.'
      es: 'Si el hogar cumple con el umbral mínimo de la Norma Esfera 1 (ropa y cama). Derivado como: climate_appropriate_clothing_all = yes_all Y blankets_count / household_size >= 1 Y sleeping_mat_count / household_size >= 1. Puntaje de observación del encuestador al umbral objetivo, distinto del ítem auto-reportado clothing_bedding_sufficient.'
    slot_uri: aidops:sphere_clothing_pass
