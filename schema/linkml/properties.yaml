  chronic_interruption_reason:
    title:
      en: Reason(s) for interruption of chronic treatment
      fr: Raison(s) de l'interruption du traitement chronique
      es: Razón(es) de la interrupción del tratamiento crónico
    description:
      en: Reason(s) the household member's chronic treatment was interrupted in the last 6 months, drawn from the shared `care-access-barrier` vocabulary. Multi-select because several barriers often coincide (e.g., stock-out of medicines plus cost). Ask only if `chronic_treatment_interrupted_6mo` is `yes`.
      fr: Raison(s) pour lesquelles le traitement chronique du membre du ménage a été interrompu au cours des 6 derniers mois, tirées du vocabulaire partagé `care-access-barrier`. Sélection multiple car plusieurs obstacles se combinent souvent (par exemple, rupture de stock de médicaments et coût). Ne poser que si `chronic_treatment_interrupted_6mo` est `yes`.
      es: Razón(es) por las que se interrumpió el tratamiento crónico del miembro del hogar en los últimos 6 meses, tomadas del vocabulario compartido `care-access-barrier`. Selección múltiple porque varias barreras a menudo coinciden (p. ej., desabastecimiento de medicamentos más costo). Preguntar solo si `chronic_treatment_interrupted_6mo` es `yes`.
    slot_uri: aidops:chronic_interruption_reason
    range: CareAccessBarrier
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-barriers-module"], "cardinality": "multiple", "category": "health_access_chronic", "core": true, "definition": {"en": "Reason(s) the household member''s chronic treatment was interrupted in the last 6 months, drawn from the shared `care-access-barrier` vocabulary. Multi-select because several barriers often coincide (e.g., stock-out of medicines plus cost). Ask only if `chronic_treatment_interrupted_6mo` is `yes`.", "es": "Raz\u00f3n(es) por las que se interrumpi\u00f3 el tratamiento cr\u00f3nico del miembro del hogar en los \u00faltimos 6 meses, tomadas del vocabulario compartido `care-access-barrier`. Selecci\u00f3n m\u00faltiple porque varias barreras a menudo coinciden (p. ej., desabastecimiento de medicamentos m\u00e1s costo). Preguntar solo si `chronic_treatment_interrupted_6mo` es `yes`.", "fr": "Raison(s) pour lesquelles le traitement chronique du membre du m\u00e9nage a \u00e9t\u00e9 interrompu au cours des 6 derniers mois, tir\u00e9es du vocabulaire partag\u00e9 `care-access-barrier`. S\u00e9lection multiple car plusieurs obstacles se combinent souvent (par exemple, rupture de stock de m\u00e9dicaments et co\u00fbt). Ne poser que si `chronic_treatment_interrupted_6mo` est `yes`."}, "id": "chronic_interruption_reason", "label": {"en": "Reason(s) for interruption of chronic treatment", "es": "Raz\u00f3n(es) de la interrupci\u00f3n del tratamiento cr\u00f3nico", "fr": "Raison(s) de l''interruption du traitement chronique"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-access-barrier"}'
      bibliography_refs: dhs-barriers-module
  chronic_receiving_treatment:
    title:
      en: Extent to which household members with chronic conditions are currently receiving treatment
      fr: Mesure dans laquelle les membres du ménage atteints d'affections chroniques reçoivent actuellement un traitement
      es: Grado en que los miembros del hogar con condiciones crónicas están recibiendo tratamiento actualmente
    description:
      en: Whether all, some, or none of the household members with a diagnosed chronic condition are currently receiving the treatment prescribed to them, using the `care-coverage-extent` vocabulary (`yes_all`, `yes_some`, `no`). Captures continuity-of-care gaps for chronic conditions, which drive avoidable morbidity and mortality in humanitarian settings. Ask only if `chronic_condition_in_hh` is `yes`.
      fr: Si tous, certains, ou aucun des membres du ménage atteints d'une affection chronique diagnostiquée reçoivent actuellement le traitement qui leur est prescrit, en utilisant le vocabulaire `care-coverage-extent` (`yes_all`, `yes_some`, `no`). Saisit les lacunes de continuité des soins pour les affections chroniques, qui sont à l'origine d'une morbidité et d'une mortalité évitables dans les contextes humanitaires. Ne poser que si `chronic_condition_in_hh` est `yes`.
      es: Si todos, algunos o ninguno de los miembros del hogar con una condición crónica diagnosticada están recibiendo actualmente el tratamiento prescrito, usando el vocabulario `care-coverage-extent` (`yes_all`, `yes_some`, `no`). Capta las brechas de continuidad de atención para condiciones crónicas, que generan morbilidad y mortalidad evitables en contextos humanitarios. Preguntar solo si `chronic_condition_in_hh` es `yes`.
    slot_uri: aidops:chronic_receiving_treatment
    range: CareCoverageExtent
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["unhcr-phc-coverage-standard"], "cardinality": "single", "category": "health_access_chronic", "core": true, "definition": {"en": "Whether all, some, or none of the household members with a diagnosed chronic condition are currently receiving the treatment prescribed to them, using the `care-coverage-extent` vocabulary (`yes_all`, `yes_some`, `no`). Captures continuity-of-care gaps for chronic conditions, which drive avoidable morbidity and mortality in humanitarian settings. Ask only if `chronic_condition_in_hh` is `yes`.", "es": "Si todos, algunos o ninguno de los miembros del hogar con una condici\u00f3n cr\u00f3nica diagnosticada est\u00e1n recibiendo actualmente el tratamiento prescrito, usando el vocabulario `care-coverage-extent` (`yes_all`, `yes_some`, `no`). Capta las brechas de continuidad de atenci\u00f3n para condiciones cr\u00f3nicas, que generan morbilidad y mortalidad evitables en contextos humanitarios. Preguntar solo si `chronic_condition_in_hh` es `yes`.", "fr": "Si tous, certains, ou aucun des membres du m\u00e9nage atteints d''une affection chronique diagnostiqu\u00e9e re\u00e7oivent actuellement le traitement qui leur est prescrit, en utilisant le vocabulaire `care-coverage-extent` (`yes_all`, `yes_some`, `no`). Saisit les lacunes de continuit\u00e9 des soins pour les affections chroniques, qui sont \u00e0 l''origine d''une morbidit\u00e9 et d''une mortalit\u00e9 \u00e9vitables dans les contextes humanitaires. Ne poser que si `chronic_condition_in_hh` est `yes`."}, "id": "chronic_receiving_treatment", "label": {"en": "Extent to which household members with chronic conditions are currently receiving treatment", "es": "Grado en que los miembros del hogar con condiciones cr\u00f3nicas est\u00e1n recibiendo tratamiento actualmente", "fr": "Mesure dans laquelle les membres du m\u00e9nage atteints d''affections chroniques re\u00e7oivent actuellement un traitement"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-coverage-extent"}'
      bibliography_refs: unhcr-phc-coverage-standard
  chronic_treatment_interrupted_6mo:
    title:
      en: Chronic treatment interrupted in the last 6 months
      fr: Traitement chronique interrompu au cours des 6 derniers mois
      es: Tratamiento crónico interrumpido en los últimos 6 meses
    description:
      en: Whether any household member with a diagnosed chronic condition had their treatment interrupted (stopped, skipped, or substantially reduced) for any reason during the past 6 months. A direct measure of treatment continuity aligned with UNHCR chronic-disease programming and Sphere 2018 essential health services. Ask only if `chronic_condition_in_hh` is `yes`. `dont_know` is retained as a distinct response.
      fr: Si un membre du ménage atteint d'une affection chronique diagnostiquée a subi une interruption de son traitement (arrêt, saut ou réduction substantielle) pour une raison quelconque au cours des 6 derniers mois. Mesure directe de la continuité du traitement, alignée sur la programmation maladies chroniques du HCR et les services de santé essentiels du Sphere 2018. Ne poser que si `chronic_condition_in_hh` est `yes`. « dont_know » est conservé comme réponse distincte.
      es: Si algún miembro del hogar con una condición crónica diagnosticada tuvo su tratamiento interrumpido (detenido, omitido o reducido sustancialmente) por cualquier motivo en los últimos 6 meses. Medida directa de la continuidad del tratamiento, alineada con la programación de enfermedades crónicas de ACNUR y los servicios de salud esenciales de Esfera 2018. Preguntar solo si `chronic_condition_in_hh` es `yes`. `dont_know` se mantiene como respuesta distinta.
    slot_uri: aidops:chronic_treatment_interrupted_6mo
