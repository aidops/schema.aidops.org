  aap_info_distribution_timing_clear:
    title:
      en: 'AAP: Information clarity — distribution timing and location'
      fr: 'Redevabilité : Clarté de l''information — calendrier et lieu de distribution'
      es: 'Rendición de cuentas: Claridad de la información — calendario y lugar de distribución'
    description:
      en: Household's perceived clarity of the information it has received about when and where aid will be distributed. The Somalia MSNA 2023 identified 'lack of vital information on aid delivery schedules, dates, and entitlements' as the single largest access barrier. IASC / REACH Menu 2018 wording.
      fr: Clarté perçue par le ménage des informations reçues sur le moment et le lieu de distribution de l'aide. Le MSNA Somalie 2023 a identifié le « manque d'informations vitales sur les calendriers, dates et droits à l'aide » comme le plus grand obstacle d'accès. Formulation du Menu IASC / REACH 2018.
      es: Claridad percibida por el hogar de la información recibida sobre cuándo y dónde se distribuirá la ayuda. El MSNA Somalia 2023 identificó la «falta de información vital sobre los calendarios, fechas y derechos de entrega de ayuda» como la mayor barrera de acceso. Formulación del Menú IASC / REACH 2018.
