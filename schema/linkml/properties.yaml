ibilit\u00e9 d''AidOps pour les champs en texte libre sensibles. Tir\u00e9 de l''approfondissement qualitatif du Cadre de coh\u00e9sion sociale PNUD-DPPA et de la pratique de sensibilit\u00e9 au conflit."}, "id": "cn_tension_between_groups_described", "label": {"en": "Inter-group tension: free-text description", "es": "Tensi\u00f3n intergrupal: descripci\u00f3n en texto libre", "fr": "Tension intergroupe : description en texte libre"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
