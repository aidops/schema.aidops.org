  cooking_fuel_availability_months:
    title:
      en: Cooking fuel availability (months per year)
      fr: Disponibilité du combustible de cuisson (mois par an)
      es: Disponibilidad del combustible de cocción (meses por año)
    description:
      en: 'Number of months in the past year in which the primary cooking fuel was consistently available. Applicable when the primary cooking fuel is biomass, charcoal, or another locally-sourced fuel subject to seasonal availability. MTF cooking availability attribute — tier thresholds: 12 months (year-round) = Tier 3-5; 10 or more months (at least 80% of year) = Tier 1-2; fewer than 10 months = Tier 0. Source: MTF household survey.'
      fr: 'Nombre de mois au cours de l''année passée pendant lesquels le combustible de cuisson principal était régulièrement disponible. Applicable lorsque le combustible de cuisson principal est la biomasse, le charbon de bois ou un autre combustible d''approvisionnement local soumis à une disponibilité saisonnière. Attribut de disponibilité de cuisson MTF — seuils de niveau : 12 mois (toute l''année) = niveaux 3 à 5 ; 10 mois ou plus (au moins 80 % de l''année) = niveaux 1 à 2 ; moins de 10 mois = niveau 0. Source : enquête ménage MTF.'
      es: 'Número de meses en el año pasado en que el combustible de cocción principal estuvo disponible de forma consistente. Aplicable cuando el combustible de cocción principal es biomasa, carbón vegetal u otro combustible de origen local sujeto a disponibilidad estacional. Atributo de disponibilidad de cocción MTF: umbrales de nivel: 12 meses (todo el año) = Niveles 3-5; 10 meses o más (al menos el 80% del año) = Niveles 1-2; menos de 10 meses = Nivel 0. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:cooking_fuel_availability_months
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Number of months in the past year in which the primary cooking fuel was consistently available. Applicable when the primary cooking fuel is biomass, charcoal, or another locally-sourced fuel subject to seasonal availability. MTF cooking availability attribute \u2014 tier thresholds: 12 months (year-round) = Tier 3-5; 10 or more months (at least 80% of year) = Tier 1-2; fewer than 10 months = Tier 0. Source: MTF household survey.", "es": "N\u00famero de meses en el a\u00f1o pasado en que el combustible de cocci\u00f3n principal estuvo disponible de forma consistente. Aplicable cuando el combustible de cocci\u00f3n principal es biomasa, carb\u00f3n vegetal u otro combustible de origen local sujeto a disponibilidad estacional. Atributo de disponibilidad de cocci\u00f3n MTF: umbrales de nivel: 12 meses (todo el a\u00f1o) = Niveles 3-5; 10 meses o m\u00e1s (al menos el 80% del a\u00f1o) = Niveles 1-2; menos de 10 meses = Nivel 0. Fuente: encuesta de hogares MTF.", "fr": "Nombre de mois au cours de l''ann\u00e9e pass\u00e9e pendant lesquels le combustible de cuisson principal \u00e9tait r\u00e9guli\u00e8rement disponible. Applicable lorsque le combustible de cuisson principal est la biomasse, le charbon de bois ou un autre combustible d''approvisionnement local soumis \u00e0 une disponibilit\u00e9 saisonni\u00e8re. Attribut de disponibilit\u00e9 de cuisson MTF \u2014 seuils de niveau : 12 mois (toute l''ann\u00e9e) = niveaux 3 \u00e0 5 ; 10 mois ou plus (au moins 80 % de l''ann\u00e9e) = niveaux 1 \u00e0 2 ; moins de 10 mois = niveau 0. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "cooking_fuel_availability_months", "label": {"en": "Cooking fuel availability (months per year)", "es": "Disponibilidad del combustible de cocci\u00f3n (meses por a\u00f1o)", "fr": "Disponibilit\u00e9 du combustible de cuisson (mois par an)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
