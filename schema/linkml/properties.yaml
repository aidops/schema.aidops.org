  birth_certificate_seen:
    title:
      en: Birth certificate status
      fr: Statut du certificat de naissance
      es: Estado del certificado de nacimiento
    description:
      en: 'Whether the child under 5 has a birth certificate and whether the enumerator verified it by sight. MICS 6 BR1. Gateway item: if yes_seen or yes_not_seen, the child is considered documented (counts as registered for SDG 16.9.1) and the follow-up items are skipped. If no or dont_know, continue to birth_registered. Note: this item logically overlaps with Person-level identity_documents (document_type = birth_certificate); in this batch the overlap is documented but no auto-reconciliation is wired.'
      fr: 'Si l''enfant de moins de 5 ans a un certificat de naissance et si l''enquêteur l''a vérifié de vue. MICS 6 BR1. Item de seuil : si yes_seen ou yes_not_seen, l''enfant est considéré documenté (compte comme enregistré pour ODD 16.9.1) et les items suivants sont ignorés. Si no ou dont_know, poursuivre avec birth_registered. Note : cet item chevauche logiquement identity_documents au niveau Personne (document_type = birth_certificate) ; dans ce lot, le chevauchement est documenté mais aucune réconciliation automatique n''est câblée.'
      es: 'Si el niño menor de 5 años tiene un certificado de nacimiento y si el encuestador lo verificó a la vista. MICS 6 BR1. Ítem puerta: si yes_seen o yes_not_seen, el niño se considera documentado (cuenta como registrado para ODS 16.9.1) y los ítems siguientes se omiten. Si no o dont_know, continuar con birth_registered. Nota: este ítem se superpone lógicamente con identity_documents a nivel de Persona (document_type = birth_certificate); en este lote la superposición se documenta pero no se cablea reconciliación automática.'
