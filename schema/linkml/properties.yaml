  access_to_credit:
    title:
      en: Household access to credit
      fr: Accès du ménage au crédit
      es: Acceso del hogar al crédito
    description:
      en: Whether the household has practical access to borrow money or goods on credit, and through what type of source. Captures credit availability as a coping and investment channel, not current debt level. Drawn from the LSMS-ISA credit module, the FAO RIMA-II Access to Basic Services (ABS) pillar, the CGAP financial inclusion core indicators, and the Sphere 2018 Livelihoods chapter on financial services. Distinct from `has_savings` (financial buffer stock) and from shock-driven borrowing in `shock_coping_strategy_used`.
      fr: Si le ménage a un accès pratique pour emprunter de l'argent ou des biens à crédit, et par quel type de source. Capture la disponibilité du crédit comme canal d'adaptation et d'investissement, et non le niveau d'endettement actuel. Tiré du module crédit LSMS-ISA, du pilier Accès aux services de base (ABS) de FAO RIMA-II, des indicateurs de base d'inclusion financière du CGAP et du chapitre Moyens de subsistance de Sphère 2018 sur les services financiers. Distinct de `has_savings` (stock tampon financier) et des emprunts liés aux chocs dans `shock_coping_strategy_used`.
      es: Si el hogar tiene acceso práctico para pedir prestado dinero o bienes a crédito, y a través de qué tipo de fuente. Captura la disponibilidad de crédito como canal de afrontamiento e inversión, no el nivel de deuda actual. Tomado del módulo de crédito LSMS-ISA, el pilar Acceso a Servicios Básicos (ABS) de FAO RIMA-II, los indicadores básicos de inclusión financiera del CGAP y el capítulo de Medios de Vida de Esfera 2018 sobre servicios financieros. Distinto de `has_savings` (reserva de amortiguación financiera) y del endeudamiento por choque en `shock_coping_strategy_used`.
    slot_uri: aidops:access_to_credit
    range: CreditAccessLevel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household has practical access to borrow money or goods on credit, and through what type of source. Captures credit availability as a coping and investment channel, not current debt level. Drawn from the LSMS-ISA credit module, the FAO RIMA-II Access to Basic Services (ABS) pillar, the CGAP financial inclusion core indicators, and the Sphere 2018 Livelihoods chapter on financial services. Distinct from `has_savings` (financial buffer stock) and from shock-driven borrowing in `shock_coping_strategy_used`.", "es": "Si el hogar tiene acceso pr\u00e1ctico para pedir prestado dinero o bienes a cr\u00e9dito, y a trav\u00e9s de qu\u00e9 tipo de fuente. Captura la disponibilidad de cr\u00e9dito como canal de afrontamiento e inversi\u00f3n, no el nivel de deuda actual. Tomado del m\u00f3dulo de cr\u00e9dito LSMS-ISA, el pilar Acceso a Servicios B\u00e1sicos (ABS) de FAO RIMA-II, los indicadores b\u00e1sicos de inclusi\u00f3n financiera del CGAP y el cap\u00edtulo de Medios de Vida de Esfera 2018 sobre servicios financieros. Distinto de `has_savings` (reserva de amortiguaci\u00f3n financiera) y del endeudamiento por choque en `shock_coping_strategy_used`.", "fr": "Si le m\u00e9nage a un acc\u00e8s pratique pour emprunter de l''argent ou des biens \u00e0 cr\u00e9dit, et par quel type de source. Capture la disponibilit\u00e9 du cr\u00e9dit comme canal d''adaptation et d''investissement, et non le niveau d''endettement actuel. Tir\u00e9 du module cr\u00e9dit LSMS-ISA, du pilier Acc\u00e8s aux services de base (ABS) de FAO RIMA-II, des indicateurs de base d''inclusion financi\u00e8re du CGAP et du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur les services financiers. Distinct de `has_savings` (stock tampon financier) et des emprunts li\u00e9s aux chocs dans `shock_coping_strategy_used`."}, "id": "access_to_credit", "label": {"en": "Household access to credit", "es": "Acceso del hogar al cr\u00e9dito", "fr": "Acc\u00e8s du m\u00e9nage au cr\u00e9dit"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "credit-access-level"}'
