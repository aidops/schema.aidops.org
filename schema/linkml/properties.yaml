  had_birth_in_recall_period:
    title:
      en: Had a birth in the recall period
      fr: A eu une naissance dans la période de rappel
      es: Tuvo un parto en el período de recordatorio
    description:
      en: 'Whether the woman had a pregnancy ending in a birth (live birth or stillbirth) within the recall period (default: 24 months preceding the interview). Gateway item: if no, exit the MaternalNewbornHealthProfile. In practice, the enumerator computes this from the month and year of the most recent birth; the question may be asked explicitly when birth history is not available from household registration.'
      fr: 'Si la femme a eu une grossesse se terminant par une naissance (naissance vivante ou mortinaissance) dans la période de rappel (par défaut : 24 mois précédant l''entretien). Item de seuil : si non, sortir du MaternalNewbornHealthProfile. En pratique, l''enquêteur calcule cela à partir du mois et de l''année de la naissance la plus récente ; la question peut être posée explicitement lorsque l''historique de naissance n''est pas disponible dans le registre des ménages.'
      es: 'Si la mujer tuvo un embarazo que terminó en un parto (nacimiento vivo o mortinato) dentro del período de recordatorio (por defecto: 24 meses anteriores a la entrevista). Ítem de puerta: si no, salir del MaternalNewbornHealthProfile. En la práctica, el enumerador calcula esto a partir del mes y año del parto más reciente; la pregunta puede hacerse explícitamente cuando el historial de nacimientos no está disponible en el registro del hogar.'
    slot_uri: aidops:had_birth_in_recall_period
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire"], "cardinality": "single", "category": "pregnancy_history", "core": true, "definition": {"en": "Whether the woman had a pregnancy ending in a birth (live birth or stillbirth) within the recall period (default: 24 months preceding the interview). Gateway item: if no, exit the MaternalNewbornHealthProfile. In practice, the enumerator computes this from the month and year of the most recent birth; the question may be asked explicitly when birth history is not available from household registration.", "es": "Si la mujer tuvo un embarazo que termin\u00f3 en un parto (nacimiento vivo o mortinato) dentro del per\u00edodo de recordatorio (por defecto: 24 meses anteriores a la entrevista). \u00cdtem de puerta: si no, salir del MaternalNewbornHealthProfile. En la pr\u00e1ctica, el enumerador calcula esto a partir del mes y a\u00f1o del parto m\u00e1s reciente; la pregunta puede hacerse expl\u00edcitamente cuando el historial de nacimientos no est\u00e1 disponible en el registro del hogar.", "fr": "Si la femme a eu une grossesse se terminant par une naissance (naissance vivante ou mortinaissance) dans la p\u00e9riode de rappel (par d\u00e9faut : 24 mois pr\u00e9c\u00e9dant l''entretien). Item de seuil : si non, sortir du MaternalNewbornHealthProfile. En pratique, l''enqu\u00eateur calcule cela \u00e0 partir du mois et de l''ann\u00e9e de la naissance la plus r\u00e9cente ; la question peut \u00eatre pos\u00e9e explicitement lorsque l''historique de naissance n''est pas disponible dans le registre des m\u00e9nages."}, "id": "had_birth_in_recall_period", "label": {"en": "Had a birth in the recall period", "es": "Tuvo un parto en el per\u00edodo de recordatorio", "fr": "A eu une naissance dans la p\u00e9riode de rappel"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
