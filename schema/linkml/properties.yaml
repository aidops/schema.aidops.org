    description:
      en: 'Household self-report of whether it currently has adequate equipment and access to fuel/energy for cooking and lighting. Self-report proxy for Sphere Standard 3 key indicator: access to a sufficient, safe and affordable energy supply to maintain thermal comfort, prepare food and provide lighting. Complements EnergyAccessProfile MTF-tier data.'
      fr: 'Auto-déclaration du ménage sur le fait de disposer actuellement d''un équipement adéquat et d''un accès au combustible/à l''énergie pour la cuisson et l''éclairage. Indicateur auto-déclaré pour l''indicateur clé de la Norme Sphère 3 : accès à un approvisionnement énergétique suffisant, sûr et abordable pour maintenir le confort thermique, préparer les aliments et fournir l''éclairage. Complète les données de niveau MTF d''EnergyAccessProfile.'
      es: 'Auto-reporte del hogar sobre si tiene actualmente equipo adecuado y acceso a combustible/energía para cocinar e iluminar. Indicador auto-reportado para el indicador clave de la Norma Esfera 3: acceso a un suministro de energía suficiente, seguro y asequible para mantener el confort térmico, preparar alimentos y proporcionar iluminación. Complementa los datos de nivel MTF de EnergyAccessProfile.'
    slot_uri: aidops:stove_fuel_lighting_sufficient
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018", "unhcr-nfi-pdm-2025"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Household self-report of whether it currently has adequate equipment and access to fuel/energy for cooking and lighting. Self-report proxy for Sphere Standard 3 key indicator: access to a sufficient, safe and affordable energy supply to maintain thermal comfort, prepare food and provide lighting. Complements EnergyAccessProfile MTF-tier data.", "es": "Auto-reporte del hogar sobre si tiene actualmente equipo adecuado y acceso a combustible/energ\u00eda para cocinar e iluminar. Indicador auto-reportado para el indicador clave de la Norma Esfera 3: acceso a un suministro de energ\u00eda suficiente, seguro y asequible para mantener el confort t\u00e9rmico, preparar alimentos y proporcionar iluminaci\u00f3n. Complementa los datos de nivel MTF de EnergyAccessProfile.", "fr": "Auto-d\u00e9claration du m\u00e9nage sur le fait de disposer actuellement d''un \u00e9quipement ad\u00e9quat et d''un acc\u00e8s au combustible/\u00e0 l''\u00e9nergie pour la cuisson et l''\u00e9clairage. Indicateur auto-d\u00e9clar\u00e9 pour l''indicateur cl\u00e9 de la Norme Sph\u00e8re 3 : acc\u00e8s \u00e0 un approvisionnement \u00e9nerg\u00e9tique suffisant, s\u00fbr et abordable pour maintenir le confort thermique, pr\u00e9parer les aliments et fournir l''\u00e9clairage. Compl\u00e8te les donn\u00e9es de niveau MTF d''EnergyAccessProfile."}, "id": "stove_fuel_lighting_sufficient", "label": {"en": "Stove, fuel, and lighting equipment are sufficient", "es": "Cocina, combustible y equipo de iluminaci\u00f3n suficientes", "fr": "Foyer, combustible et \u00e9quipement d''\u00e9clairage suffisants"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
