  hf_staff_total_fte:
    title:
      en: Total clinical staff (FTE)
      fr: Personnel clinique total (ETP)
      es: Personal clínico total (ETC)
    description:
      en: Total number of clinical staff (full-time equivalents, FTE) currently posted and working at the facility. Includes medical doctors, midwives, nurses, and clinical officers; excludes non-clinical staff (cleaners, security, administrative). Reported by the facility in-charge. Used with `hf_catchment_population` to compute per-10,000 ratios. Extended (non-core). Sensitive (staffing gaps are politically sensitive in active crises).
      fr: Nombre total de personnel clinique (équivalents temps plein, ETP) actuellement affecté et travaillant à l'établissement. Inclut les médecins, sages-femmes, infirmiers et agents cliniques ; exclut le personnel non clinique (ménage, sécurité, administration). Rapporté par le responsable de l'établissement. Utilisé avec `hf_catchment_population` pour calculer les ratios pour 10 000 habitants. Étendu (non-core). Sensible (les lacunes d'effectifs sont politiquement sensibles en crise active).
      es: Número total de personal clínico (equivalentes a tiempo completo, ETC) actualmente asignado y trabajando en el establecimiento. Incluye médicos, parteras, personal de enfermería y oficiales clínicos; excluye personal no clínico (limpieza, seguridad, administración). Reportado por el responsable del establecimiento. Usado con `hf_catchment_population` para calcular ratios por cada 10.000 habitantes. Extendido (no-core). Sensible (las brechas de dotación son políticamente sensibles en crisis activa).
    slot_uri: aidops:hf_staff_total_fte
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-spa-revised-2022", "who-hhfa-2022"], "cardinality": "single", "category": "governance", "core": false, "definition": {"en": "Total number of clinical staff (full-time equivalents, FTE) currently posted and working at the facility. Includes medical doctors, midwives, nurses, and clinical officers; excludes non-clinical staff (cleaners, security, administrative). Reported by the facility in-charge. Used with `hf_catchment_population` to compute per-10,000 ratios. Extended (non-core). Sensitive (staffing gaps are politically sensitive in active crises).", "es": "N\u00famero total de personal cl\u00ednico (equivalentes a tiempo completo, ETC) actualmente asignado y trabajando en el establecimiento. Incluye m\u00e9dicos, parteras, personal de enfermer\u00eda y oficiales cl\u00ednicos; excluye personal no cl\u00ednico (limpieza, seguridad, administraci\u00f3n). Reportado por el responsable del establecimiento. Usado con `hf_catchment_population` para calcular ratios por cada 10.000 habitantes. Extendido (no-core). Sensible (las brechas de dotaci\u00f3n son pol\u00edticamente sensibles en crisis activa).", "fr": "Nombre total de personnel clinique (\u00e9quivalents temps plein, ETP) actuellement affect\u00e9 et travaillant \u00e0 l''\u00e9tablissement. Inclut les m\u00e9decins, sages-femmes, infirmiers et agents cliniques ; exclut le personnel non clinique (m\u00e9nage, s\u00e9curit\u00e9, administration). Rapport\u00e9 par le responsable de l''\u00e9tablissement. Utilis\u00e9 avec `hf_catchment_population` pour calculer les ratios pour 10 000 habitants. \u00c9tendu (non-core). Sensible (les lacunes d''effectifs sont politiquement sensibles en crise active)."}, "id": "hf_staff_total_fte", "label": {"en": "Total clinical staff (FTE)", "es": "Personal cl\u00ednico total (ETC)", "fr": "Personnel clinique total (ETP)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": null}'
