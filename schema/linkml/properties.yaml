  aap_dignity_preserved:
    title:
      en: 'AAP: Dignity preserved during distribution or registration'
      fr: 'Redevabilité : Dignité préservée lors de la distribution ou de l''inscription'
      es: 'Rendición de cuentas: Dignidad preservada durante la distribución o el registro'
    description:
      en: 'Whether the respondent felt that their dignity was respected during aid distributions or registration — for example, reasonable waiting times, orderly facilities and lines, privacy maintained when discussing their situation. Recall: most recent distribution or registration event. Source: Sphere 2018 Humanitarian Charter (dignity); IFRC CEA Toolkit; IASC / REACH Menu 2018 distribution-experience section.'
      fr: 'Si le répondant a senti que sa dignité était respectée lors des distributions d''aide ou de l''inscription — par exemple, temps d''attente raisonnables, installations et files d''attente organisées, intimité maintenue lors de la discussion de sa situation. Rappel : l''événement de distribution ou d''inscription le plus récent. Source : Charte humanitaire Sphère 2018 (dignité) ; Toolkit CEA de la FICR ; section expérience de distribution du Menu IASC / REACH 2018.'
      es: 'Si el encuestado sintió que su dignidad fue respetada durante las distribuciones de ayuda o el registro — por ejemplo, tiempos de espera razonables, instalaciones y filas organizadas, privacidad mantenida al discutir su situación. Recordatorio: el evento de distribución o registro más reciente. Fuente: Carta Humanitaria de Esfera 2018 (dignidad); Kit de Herramientas CEA de la FICR; sección experiencia de distribución del Menú IASC / REACH 2018.'
    slot_uri: aidops:aap_dignity_preserved
    range: AapSatisfaction5
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "cardinality": "single", "category": "aap_respect", "core": false, "definition": {"en": "Whether the respondent felt that their dignity was respected during aid distributions or registration \u2014 for example, reasonable waiting times, orderly facilities and lines, privacy maintained when discussing their situation. Recall: most recent distribution or registration event. Source: Sphere 2018 Humanitarian Charter (dignity); IFRC CEA Toolkit; IASC / REACH Menu 2018 distribution-experience section.", "es": "Si el encuestado sinti\u00f3 que su dignidad fue respetada durante las distribuciones de ayuda o el registro \u2014 por ejemplo, tiempos de espera razonables, instalaciones y filas organizadas, privacidad mantenida al discutir su situaci\u00f3n. Recordatorio: el evento de distribuci\u00f3n o registro m\u00e1s reciente. Fuente: Carta Humanitaria de Esfera 2018 (dignidad); Kit de Herramientas CEA de la FICR; secci\u00f3n experiencia de distribuci\u00f3n del Men\u00fa IASC / REACH 2018.", "fr": "Si le r\u00e9pondant a senti que sa dignit\u00e9 \u00e9tait respect\u00e9e lors des distributions d''aide ou de l''inscription \u2014 par exemple, temps d''attente raisonnables, installations et files d''attente organis\u00e9es, intimit\u00e9 maintenue lors de la discussion de sa situation. Rappel : l''\u00e9v\u00e9nement de distribution ou d''inscription le plus r\u00e9cent. Source : Charte humanitaire Sph\u00e8re 2018 (dignit\u00e9) ; Toolkit CEA de la FICR ; section exp\u00e9rience de distribution du Menu IASC / REACH 2018."}, "id": "aap_dignity_preserved", "label": {"en": "AAP: Dignity preserved during distribution or registration", "es": "Rendici\u00f3n de cuentas: Dignidad preservada durante la distribuci\u00f3n o el registro", "fr": "Redevabilit\u00e9 : Dignit\u00e9 pr\u00e9serv\u00e9e lors de la distribution ou de l''inscription"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-satisfaction-5"}'
      bibliography_refs: chs-2024,iasc-reach-aap-menu-2018,ifrc-cea-toolkit-2021
  aap_fear_of_retaliation:
    title:
      en: 'AAP: Community-level fear of retaliation for speaking up'
      fr: 'Redevabilité : Peur communautaire de représailles pour avoir parlé'
      es: 'Rendición de cuentas: Miedo comunitario a represalias por hablar'
    description:
      en: 'Whether the respondent agrees that people in their community are afraid to speak up about aid or aid providers because of fear that aid could be reduced or taken away. The community-level framing (''people in this community'') follows GTS and GBV AoR conventions for asking sensitive perception questions without requiring the respondent to disclose their own fear. Classified `sensitive`. Source: GTS ''Listening is Not Enough'' (2022); IASC CAAP 2017 PSEA guidance on enabling environment. Maps to CHS 2024 Commitment 5 Key Action 5.2 (safe reporting).'
      fr: 'Si le répondant est d''accord sur le fait que les personnes de sa communauté ont peur de s''exprimer sur l''aide ou les intervenants par crainte que l''aide soit réduite ou retirée. La formulation au niveau de la communauté (« les gens de cette communauté ») suit les conventions de GTS et du GBV AoR pour poser des questions de perception sensibles sans exiger que le répondant divulgue sa propre peur. Classé `sensitive`. Source : « Listening is Not Enough » de GTS (2022) ; orientations PSEA de la CAAP IASC 2017 sur l''environnement favorable. Correspond à l''Engagement 5 Action clé 5.2 de la CHS 2024 (signalement sûr).'
      es: 'Si el encuestado está de acuerdo en que las personas de su comunidad tienen miedo de hablar sobre la ayuda o los actores humanitarios por temor a que la ayuda pudiera reducirse o retirarse. La formulación a nivel comunitario («las personas en esta comunidad») sigue las convenciones de GTS y del GBV AoR para hacer preguntas de percepción sensibles sin requerir que el encuestado divulgue su propio miedo. Clasificado como `sensitive`. Fuente: «Listening is Not Enough» de GTS (2022); orientaciones PSEA de la CAAP IASC 2017 sobre entorno propicio. Corresponde al Compromiso 5 Acción Clave 5.2 de la CHS 2024 (denuncia segura).'
