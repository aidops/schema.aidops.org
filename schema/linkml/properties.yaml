    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire"], "cardinality": "single", "category": "derived_mnh", "core": true, "definition": {"en": "Derived indicator: true if delivery_attendant_type is doctor, nurse_midwife, or auxiliary_midwife. SDG indicator 3.1.2 proxy (proportion of births attended by skilled health personnel). WHO and DHS-8 skilled provider definition: physician, nurse/midwife, and auxiliary midwife trained to manage normal deliveries. Interoperable with DHS-8 rh_del_pvskill.", "es": "Indicador derivado: verdadero si delivery_attendant_type es m\u00e9dico, nurse_midwife o auxiliary_midwife. Proxy del indicador ODS 3.1.2 (proporci\u00f3n de partos atendidos por personal de salud calificado). Definici\u00f3n de proveedor calificado de la OMS y DHS-8: m\u00e9dico, enfermera/partera y partera auxiliar capacitados para manejar partos normales. Interoperable con DHS-8 rh_del_pvskill.", "fr": "Indicateur d\u00e9riv\u00e9 : vrai si delivery_attendant_type est m\u00e9decin, nurse_midwife ou auxiliary_midwife. Proxy de l''indicateur ODD 3.1.2 (proportion d''accouchements assist\u00e9s par du personnel de sant\u00e9 qualifi\u00e9). D\u00e9finition OMS et DHS-8 de prestataire qualifi\u00e9 : m\u00e9decin, infirmi\u00e8re/sage-femme et sage-femme auxiliaire form\u00e9s pour g\u00e9rer les accouchements normaux. Interop\u00e9rable avec DHS-8 rh_del_pvskill."}, "id": "skilled_birth_attendance", "label": {"en": "Skilled birth attendance (derived)", "es": "Asistencia calificada al parto (derivado)", "fr": "Assistance qualifi\u00e9e \u00e0 l''accouchement (d\u00e9riv\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
