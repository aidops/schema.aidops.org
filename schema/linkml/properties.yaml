      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn"], "cardinality": "single", "category": "newborn", "core": true, "definition": {"en": "Whether the mother ever put the index baby (most recent live birth) to the breast to breastfeed. DHS-8 m4 (screener component); MICS6 MN12. Screener for breastfeeding_initiation_hours. If no, breastfeeding_early_initiation = false. Owned by MaternalNewbornHealthProfile as a delivery-period newborn care indicator. Only asked if most_recent_birth_outcome = live_birth.", "es": "Si la madre alguna vez puso al beb\u00e9 \u00edndice (nacimiento vivo m\u00e1s reciente) al pecho para amamantar. DHS-8 m4 (componente de filtro); MICS6 MN12. Filtro para breastfeeding_initiation_hours. Si no, breastfeeding_early_initiation = falso. Pertenece al MaternalNewbornHealthProfile como indicador de atenci\u00f3n neonatal en el per\u00edodo de parto. Solo se pregunta si most_recent_birth_outcome = live_birth.", "fr": "Si la m\u00e8re a jamais mis l''enfant index (naissance vivante la plus r\u00e9cente) au sein pour l''allaiter. DHS-8 m4 (composante de seuil) ; MICS6 MN12. Seuil pour breastfeeding_initiation_hours. Si non, breastfeeding_early_initiation = faux. Appartient au MaternalNewbornHealthProfile comme indicateur de soins au nouveau-n\u00e9 en p\u00e9riode de d\u00e9livrance. Pos\u00e9 uniquement si most_recent_birth_outcome = live_birth."}, "id": "breastfeeding_ever_initiated", "label": {"en": "Ever breastfed this baby", "es": "Alguna vez amamant\u00f3 a este beb\u00e9", "fr": "A allait\u00e9 ce b\u00e9b\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
