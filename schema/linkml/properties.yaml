  cn_coping_mechanisms_in_use:
    title:
      en: Coping mechanisms in use in the community
      fr: Mécanismes d'adaptation en usage dans la communauté
      es: Mecanismos de afrontamiento en uso en la comunidad
    description:
      en: The coping strategies commonly reported by informants as in use by households in this community in the past 30 days. Multi-select from the community-coping-strategy vocabulary (reducing meals, borrowing, selling productive assets, migrating for work, removing children from school, child labour, early marriage, begging, risky livelihoods, reducing health spending, sharing housing, remittances, community solidarity, none observed, don't know). This is a community-level perception of strategies in use, NOT a household-level reduced Coping Strategies Index (rCSI) or Livelihoods Coping Strategies Index (LCSI) measurement; those remain in FoodSecurityProfile. The overlap with rCSI/LCSI items is deliberate and signals sector-agnostic distress. Derived from ACAPS severity-measurement guidance, WFP rCSI, and the UNHCR Livelihoods Monitoring Framework.
      fr: Les stratégies d'adaptation couramment rapportées par les informateurs comme étant utilisées par les ménages de cette communauté au cours des 30 derniers jours. Choix multiple dans la taxonomie community-coping-strategy (réduction des repas, emprunts, vente d'actifs productifs, migration pour le travail, retrait des enfants de l'école, travail des enfants, mariage précoce, mendicité, moyens d'existence risqués, réduction des dépenses de santé, partage du logement, envois de fonds, solidarité communautaire, aucune, ne sait pas). Il s'agit d'une perception au niveau communautaire des stratégies en usage, et NON d'une mesure au niveau du ménage de l'indice réduit des stratégies d'adaptation (rCSI) ou de l'indice des stratégies d'adaptation aux moyens d'existence (LCSI) ; ces mesures restent dans FoodSecurityProfile. Le chevauchement avec les items rCSI/LCSI est délibéré et signale une détresse transversale aux secteurs. Tiré du guide de mesure de la sévérité d'ACAPS, du rCSI du PAM et du cadre de suivi des moyens d'existence du HCR.
      es: Las estrategias de afrontamiento comúnmente reportadas por los informantes como en uso por los hogares de esta comunidad en los últimos 30 días. Selección múltiple en la taxonomía community-coping-strategy (reducción de comidas, préstamos, venta de activos productivos, migración por trabajo, retiro de niños de la escuela, trabajo infantil, matrimonio precoz, mendicidad, medios de vida riesgosos, reducción del gasto en salud, compartir vivienda, remesas, solidaridad comunitaria, ninguna, no sabe). Se trata de una percepción a nivel comunitario de las estrategias en uso, y NO de una medición a nivel del hogar del Índice Reducido de Estrategias de Afrontamiento (rCSI) o del Índice de Estrategias de Afrontamiento de Medios de Vida (LCSI); esas mediciones permanecen en FoodSecurityProfile. La superposición con ítems rCSI/LCSI es deliberada y señala un sufrimiento transversal a los sectores. Derivado de la guía de medición de severidad de ACAPS, del rCSI del PMA y del marco de monitoreo de medios de vida del ACNUR.
    slot_uri: aidops:cn_coping_mechanisms_in_use
    range: CommunityCopingStrategy
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014", "ifrc-vca-2020"], "cardinality": "multiple", "category": "context", "core": true, "definition": {"en": "The coping strategies commonly reported by informants as in use by households in this community in the past 30 days. Multi-select from the community-coping-strategy vocabulary (reducing meals, borrowing, selling productive assets, migrating for work, removing children from school, child labour, early marriage, begging, risky livelihoods, reducing health spending, sharing housing, remittances, community solidarity, none observed, don''t know). This is a community-level perception of strategies in use, NOT a household-level reduced Coping Strategies Index (rCSI) or Livelihoods Coping Strategies Index (LCSI) measurement; those remain in FoodSecurityProfile. The overlap with rCSI/LCSI items is deliberate and signals sector-agnostic distress. Derived from ACAPS severity-measurement guidance, WFP rCSI, and the UNHCR Livelihoods Monitoring Framework.", "es": "Las estrategias de afrontamiento com\u00fanmente reportadas por los informantes como en uso por los hogares de esta comunidad en los \u00faltimos 30 d\u00edas. Selecci\u00f3n m\u00faltiple en la taxonom\u00eda community-coping-strategy (reducci\u00f3n de comidas, pr\u00e9stamos, venta de activos productivos, migraci\u00f3n por trabajo, retiro de ni\u00f1os de la escuela, trabajo infantil, matrimonio precoz, mendicidad, medios de vida riesgosos, reducci\u00f3n del gasto en salud, compartir vivienda, remesas, solidaridad comunitaria, ninguna, no sabe). Se trata de una percepci\u00f3n a nivel comunitario de las estrategias en uso, y NO de una medici\u00f3n a nivel del hogar del \u00cdndice Reducido de Estrategias de Afrontamiento (rCSI) o del \u00cdndice de Estrategias de Afrontamiento de Medios de Vida (LCSI); esas mediciones permanecen en FoodSecurityProfile. La superposici\u00f3n con \u00edtems rCSI/LCSI es deliberada y se\u00f1ala un sufrimiento transversal a los sectores. Derivado de la gu\u00eda de medici\u00f3n de severidad de ACAPS, del rCSI del PMA y del marco de monitoreo de medios de vida del ACNUR.", "fr": "Les strat\u00e9gies d''adaptation couramment rapport\u00e9es par les informateurs comme \u00e9tant utilis\u00e9es par les m\u00e9nages de cette communaut\u00e9 au cours des 30 derniers jours. Choix multiple dans la taxonomie community-coping-strategy (r\u00e9duction des repas, emprunts, vente d''actifs productifs, migration pour le travail, retrait des enfants de l''\u00e9cole, travail des enfants, mariage pr\u00e9coce, mendicit\u00e9, moyens d''existence risqu\u00e9s, r\u00e9duction des d\u00e9penses de sant\u00e9, partage du logement, envois de fonds, solidarit\u00e9 communautaire, aucune, ne sait pas). Il s''agit d''une perception au niveau communautaire des strat\u00e9gies en usage, et NON d''une mesure au niveau du m\u00e9nage de l''indice r\u00e9duit des strat\u00e9gies d''adaptation (rCSI) ou de l''indice des strat\u00e9gies d''adaptation aux moyens d''existence (LCSI) ; ces mesures restent dans FoodSecurityProfile. Le chevauchement avec les items rCSI/LCSI est d\u00e9lib\u00e9r\u00e9 et signale une d\u00e9tresse transversale aux secteurs. Tir\u00e9 du guide de mesure de la s\u00e9v\u00e9rit\u00e9 d''ACAPS, du rCSI du PAM et du cadre de suivi des moyens d''existence du HCR."}, "id": "cn_coping_mechanisms_in_use", "label": {"en": "Coping mechanisms in use in the community", "es": "Mecanismos de afrontamiento en uso en la comunidad", "fr": "M\u00e9canismes d''adaptation en usage dans la communaut\u00e9"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "community-coping-strategy"}'
      bibliography_refs: acaps-assessment-2014,ifrc-vca-2020
  cn_coverage_gap_description:
    title:
      en: Coverage gap description
      fr: Description de la lacune de couverture
      es: Descripción de la brecha de cobertura
    description:
      en: 'Free-text description of which groups the community believes are being left out of the response and why, covering the past 90 days. Maximum 400 characters. Asked only when cn_coverage_gap_perceived = ''yes''. Not-sensitive by default: describes perceived gaps in response coverage and is useful for Accountability to Affected Populations (AAP) feedback; not identifying of individuals. Derived from the IASC AAP framework and CHS Commitment 4.'
      fr: 'Description en texte libre des groupes que la communauté estime laissés de côté par la réponse et des raisons, couvrant les 90 derniers jours. Maximum 400 caractères. Demandée uniquement lorsque cn_coverage_gap_perceived = « oui ». Non sensible par défaut : décrit des lacunes perçues dans la couverture de la réponse et est utile pour la redevabilité envers les populations affectées (AAP) ; n''identifie pas d''individus. Tiré du cadre AAP de l''IASC et de l''engagement 4 de la NHC.'
      es: 'Descripción en texto libre de los grupos que la comunidad considera que están siendo dejados de lado por la respuesta y por qué, correspondiente a los últimos 90 días. Máximo 400 caracteres. Se pregunta solo cuando cn_coverage_gap_perceived = «sí». No sensible por defecto: describe brechas percibidas en la cobertura de la respuesta y es útil para la retroalimentación de Rendición de Cuentas a las Poblaciones Afectadas (AAP); no identifica a individuos. Derivado del marco AAP del IASC y el Compromiso 4 de la NHC.'
    slot_uri: aidops:cn_coverage_gap_description
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["reach-hsm-2023"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Free-text description of which groups the community believes are being left out of the response and why, covering the past 90 days. Maximum 400 characters. Asked only when cn_coverage_gap_perceived = ''yes''. Not-sensitive by default: describes perceived gaps in response coverage and is useful for Accountability to Affected Populations (AAP) feedback; not identifying of individuals. Derived from the IASC AAP framework and CHS Commitment 4.", "es": "Descripci\u00f3n en texto libre de los grupos que la comunidad considera que est\u00e1n siendo dejados de lado por la respuesta y por qu\u00e9, correspondiente a los \u00faltimos 90 d\u00edas. M\u00e1ximo 400 caracteres. Se pregunta solo cuando cn_coverage_gap_perceived = \u00abs\u00ed\u00bb. No sensible por defecto: describe brechas percibidas en la cobertura de la respuesta y es \u00fatil para la retroalimentaci\u00f3n de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas (AAP); no identifica a individuos. Derivado del marco AAP del IASC y el Compromiso 4 de la NHC.", "fr": "Description en texte libre des groupes que la communaut\u00e9 estime laiss\u00e9s de c\u00f4t\u00e9 par la r\u00e9ponse et des raisons, couvrant les 90 derniers jours. Maximum 400 caract\u00e8res. Demand\u00e9e uniquement lorsque cn_coverage_gap_perceived = \u00ab oui \u00bb. Non sensible par d\u00e9faut : d\u00e9crit des lacunes per\u00e7ues dans la couverture de la r\u00e9ponse et est utile pour la redevabilit\u00e9 envers les populations affect\u00e9es (AAP) ; n''identifie pas d''individus. Tir\u00e9 du cadre AAP de l''IASC et de l''engagement 4 de la NHC."}, "id": "cn_coverage_gap_description", "label": {"en": "Coverage gap description", "es": "Descripci\u00f3n de la brecha de cobertura", "fr": "Description de la lacune de couverture"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": null}'
      bibliography_refs: reach-hsm-2023
  cn_coverage_gap_perceived:
    title:
      en: Coverage gap perceived by the community
      fr: Lacune de couverture perçue par la communauté
      es: Brecha de cobertura percibida por la comunidad
    description:
      en: 'Whether the community believes that any specific groups or households are being left out of the assistance currently being provided, over the past 90 days. Encoded on the yes-no-dk-na vocabulary: ''yes'' (coverage gap perceived), ''no'' (no gap perceived), ''not_applicable'' (used here for ''no assistance being provided at all'' — the question of coverage gap does not apply), or ''dont_know''. Derived from the IASC Accountability to Affected Populations (AAP) framework, CHS Commitment 4 (welcome feedback and complaints), and Sphere Core Standard 1 on people-centred response.'
      fr: 'Indique si la communauté estime que des groupes ou des ménages spécifiques sont laissés de côté par l''assistance actuellement fournie, au cours des 90 derniers jours. Codé sur la taxonomie yes-no-dk-na : « oui » (lacune de couverture perçue), « non » (aucune lacune perçue), « not_applicable » (utilisé ici pour « aucune assistance fournie » — la question de la lacune de couverture ne s''applique pas) ou « ne sait pas ». Tiré du cadre de redevabilité envers les populations affectées (AAP) de l''IASC, de l''engagement 4 de la NHC (accueillir les retours et plaintes) et de la norme fondamentale Sphère 1 sur une réponse centrée sur les personnes.'
      es: 'Indica si la comunidad considera que algún grupo u hogar específico está siendo dejado de lado por la asistencia que se proporciona actualmente, en los últimos 90 días. Codificado en la taxonomía yes-no-dk-na: «sí» (brecha de cobertura percibida), «no» (sin brecha percibida), «not_applicable» (usado aquí para «no se proporciona asistencia alguna» — la pregunta sobre brecha de cobertura no aplica) o «no sabe». Derivado del marco de Rendición de Cuentas a las Poblaciones Afectadas (AAP) del IASC, del Compromiso 4 de la NHC (acoger retroalimentación y quejas) y la Norma Básica 1 de Esfera sobre respuesta centrada en las personas.'
    slot_uri: aidops:cn_coverage_gap_perceived
    range: YesNoDkNa
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["reach-hsm-2023"], "cardinality": "single", "category": "context", "core": true, "definition": {"en": "Whether the community believes that any specific groups or households are being left out of the assistance currently being provided, over the past 90 days. Encoded on the yes-no-dk-na vocabulary: ''yes'' (coverage gap perceived), ''no'' (no gap perceived), ''not_applicable'' (used here for ''no assistance being provided at all'' \u2014 the question of coverage gap does not apply), or ''dont_know''. Derived from the IASC Accountability to Affected Populations (AAP) framework, CHS Commitment 4 (welcome feedback and complaints), and Sphere Core Standard 1 on people-centred response.", "es": "Indica si la comunidad considera que alg\u00fan grupo u hogar espec\u00edfico est\u00e1 siendo dejado de lado por la asistencia que se proporciona actualmente, en los \u00faltimos 90 d\u00edas. Codificado en la taxonom\u00eda yes-no-dk-na: \u00abs\u00ed\u00bb (brecha de cobertura percibida), \u00abno\u00bb (sin brecha percibida), \u00abnot_applicable\u00bb (usado aqu\u00ed para \u00abno se proporciona asistencia alguna\u00bb \u2014 la pregunta sobre brecha de cobertura no aplica) o \u00abno sabe\u00bb. Derivado del marco de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas (AAP) del IASC, del Compromiso 4 de la NHC (acoger retroalimentaci\u00f3n y quejas) y la Norma B\u00e1sica 1 de Esfera sobre respuesta centrada en las personas.", "fr": "Indique si la communaut\u00e9 estime que des groupes ou des m\u00e9nages sp\u00e9cifiques sont laiss\u00e9s de c\u00f4t\u00e9 par l''assistance actuellement fournie, au cours des 90 derniers jours. Cod\u00e9 sur la taxonomie yes-no-dk-na : \u00ab oui \u00bb (lacune de couverture per\u00e7ue), \u00ab non \u00bb (aucune lacune per\u00e7ue), \u00ab not_applicable \u00bb (utilis\u00e9 ici pour \u00ab aucune assistance fournie \u00bb \u2014 la question de la lacune de couverture ne s''applique pas) ou \u00ab ne sait pas \u00bb. Tir\u00e9 du cadre de redevabilit\u00e9 envers les populations affect\u00e9es (AAP) de l''IASC, de l''engagement 4 de la NHC (accueillir les retours et plaintes) et de la norme fondamentale Sph\u00e8re 1 sur une r\u00e9ponse centr\u00e9e sur les personnes."}, "id": "cn_coverage_gap_perceived", "label": {"en": "Coverage gap perceived by the community", "es": "Brecha de cobertura percibida por la comunidad", "fr": "Lacune de couverture per\u00e7ue par la communaut\u00e9"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "yes-no-dk-na"}'
      bibliography_refs: reach-hsm-2023
  cn_informant_count:
    title:
      en: Informant count
      fr: Nombre d'informateurs
      es: Número de informantes
    description:
      en: Total number of individuals who participated in this community-level assessment session. Valid range 1-200. Used together with the informant-group composition flags to interpret representativeness. Based on the participant-count field in the MIRA Community Level Assessment form and REACH HSM KII/FGD metadata.
      fr: 'Nombre total de personnes ayant participé à cette séance d''évaluation au niveau communautaire. Plage valide : 1 à 200. Utilisé conjointement avec les indicateurs de composition des groupes d''informateurs pour interpréter la représentativité. Fondé sur le champ « nombre de participants » du formulaire d''évaluation communautaire MIRA et les métadonnées KII/FGD du HSM de REACH.'
      es: 'Número total de personas que participaron en esta sesión de evaluación a nivel comunitario. Rango válido: 1 a 200. Utilizado junto con los indicadores de composición de grupos de informantes para interpretar la representatividad. Basado en el campo «número de participantes» del formulario de Evaluación a Nivel Comunitario MIRA y los metadatos KII/FGD del HSM de REACH.'
    slot_uri: aidops:cn_informant_count
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["reach-hsm-2023"], "cardinality": "single", "category": "administrative", "core": true, "definition": {"en": "Total number of individuals who participated in this community-level assessment session. Valid range 1-200. Used together with the informant-group composition flags to interpret representativeness. Based on the participant-count field in the MIRA Community Level Assessment form and REACH HSM KII/FGD metadata.", "es": "N\u00famero total de personas que participaron en esta sesi\u00f3n de evaluaci\u00f3n a nivel comunitario. Rango v\u00e1lido: 1 a 200. Utilizado junto con los indicadores de composici\u00f3n de grupos de informantes para interpretar la representatividad. Basado en el campo \u00abn\u00famero de participantes\u00bb del formulario de Evaluaci\u00f3n a Nivel Comunitario MIRA y los metadatos KII/FGD del HSM de REACH.", "fr": "Nombre total de personnes ayant particip\u00e9 \u00e0 cette s\u00e9ance d''\u00e9valuation au niveau communautaire. Plage valide : 1 \u00e0 200. Utilis\u00e9 conjointement avec les indicateurs de composition des groupes d''informateurs pour interpr\u00e9ter la repr\u00e9sentativit\u00e9. Fond\u00e9 sur le champ \u00ab nombre de participants \u00bb du formulaire d''\u00e9valuation communautaire MIRA et les m\u00e9tadonn\u00e9es KII/FGD du HSM de REACH."}, "id": "cn_informant_count", "label": {"en": "Informant count", "es": "N\u00famero de informantes", "fr": "Nombre d''informateurs"}, "maturity": "draft", "references": null, "type": "integer", "vocabulary": null}'
