  vacc_bcg:
    title:
      en: BCG vaccination status
      fr: Statut vaccinal BCG
      es: Estado de vacunación BCG
    description:
      en: 'Whether the child received the BCG (Bacille Calmette-Guérin) vaccine against tuberculosis. Published recall wording: ''Has (name) ever been given a BCG vaccination against tuberculosis — that is, an injection in the arm or shoulder that caused a scar?'' BCG scar may be visually confirmed by the enumerator. One dose; recommended at birth or in the first week of life per the WHO EPI schedule. DHS code h2; MICS codes IM2 / IM11.'
      fr: 'Si l''enfant a reçu le vaccin BCG (bacille de Calmette et Guérin) contre la tuberculose. Formulation de rappel publiée : « (Prénom) a-t-il/elle déjà reçu un vaccin BCG contre la tuberculose — c''est-à-dire une injection dans le bras ou l''épaule qui a laissé une cicatrice ? » La cicatrice BCG peut être confirmée visuellement par l''enquêteur. Une dose ; recommandée à la naissance ou dans la première semaine de vie selon le calendrier EPI de l''OMS. Code DHS h2 ; codes MICS IM2 / IM11.'
      es: 'Si el niño recibió la vacuna BCG (bacilo de Calmette y Guérin) contra la tuberculosis. Redacción de recordatorio publicada: ''¿Alguna vez recibió (nombre) una vacuna BCG contra la tuberculosis — es decir, una inyección en el brazo o el hombro que dejó una cicatriz?'' La cicatriz BCG puede ser confirmada visualmente por el encuestador. Una dosis; recomendada al nacer o en la primera semana de vida según el calendario EPI de la OMS. Código DHS h2; códigos MICS IM2 / IM11.'
    slot_uri: aidops:vacc_bcg
    range: VaccStatus
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-epi-schedule"], "cardinality": "single", "category": "vaccination", "core": true, "definition": {"en": "Whether the child received the BCG (Bacille Calmette-Gu\u00e9rin) vaccine against tuberculosis. Published recall wording: ''Has (name) ever been given a BCG vaccination against tuberculosis \u2014 that is, an injection in the arm or shoulder that caused a scar?'' BCG scar may be visually confirmed by the enumerator. One dose; recommended at birth or in the first week of life per the WHO EPI schedule. DHS code h2; MICS codes IM2 / IM11.", "es": "Si el ni\u00f1o recibi\u00f3 la vacuna BCG (bacilo de Calmette y Gu\u00e9rin) contra la tuberculosis. Redacci\u00f3n de recordatorio publicada: ''\u00bfAlguna vez recibi\u00f3 (nombre) una vacuna BCG contra la tuberculosis \u2014 es decir, una inyecci\u00f3n en el brazo o el hombro que dej\u00f3 una cicatriz?'' La cicatriz BCG puede ser confirmada visualmente por el encuestador. Una dosis; recomendada al nacer o en la primera semana de vida seg\u00fan el calendario EPI de la OMS. C\u00f3digo DHS h2; c\u00f3digos MICS IM2 / IM11.", "fr": "Si l''enfant a re\u00e7u le vaccin BCG (bacille de Calmette et Gu\u00e9rin) contre la tuberculose. Formulation de rappel publi\u00e9e : \u00ab (Pr\u00e9nom) a-t-il/elle d\u00e9j\u00e0 re\u00e7u un vaccin BCG contre la tuberculose \u2014 c''est-\u00e0-dire une injection dans le bras ou l''\u00e9paule qui a laiss\u00e9 une cicatrice ? \u00bb La cicatrice BCG peut \u00eatre confirm\u00e9e visuellement par l''enqu\u00eateur. Une dose ; recommand\u00e9e \u00e0 la naissance ou dans la premi\u00e8re semaine de vie selon le calendrier EPI de l''OMS. Code DHS h2 ; codes MICS IM2 / IM11."}, "id": "vacc_bcg", "label": {"en": "BCG vaccination status", "es": "Estado de vacunaci\u00f3n BCG", "fr": "Statut vaccinal BCG"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "vacc-status"}'
