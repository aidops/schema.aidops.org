  climate_hazard_severity_trend_perception:
    title:
      en: Perceived change in hazard severity compared to 10–15 years ago
      fr: Changement perçu dans la sévérité des aléas par rapport à il y a 10–15 ans
      es: Cambio percibido en la severidad de peligros comparado con hace 10–15 años
    description:
      en: Single-select item asking whether the household perceives the same hazard referenced in climate_hazard_frequency_trend_perception is usually more severe, less severe, or about the same when it occurs now compared to 10–15 years ago. Severity perception is distinct from frequency perception and both are required for a complete hazard trend profile. Together with climate_hazard_frequency_trend_perception, forms the perceived-hazard-trend pair used in CARE CVCA historical timelines and IFRC PCVA trend analysis. Applies when at least one hazard is selected in climate_hazards_experienced_past_5_years.
      fr: Item à sélection unique demandant si le ménage perçoit que le même aléa référencé dans climate_hazard_frequency_trend_perception est généralement plus grave, moins grave ou à peu près aussi grave lorsqu'il se produit maintenant par rapport à il y a 10 à 15 ans. La perception de la sévérité est distincte de la perception de la fréquence et les deux sont nécessaires pour un profil complet des tendances des aléas.
      es: Ítem de selección única que pregunta si el hogar percibe que el mismo peligro referenciado en climate_hazard_severity_trend_perception suele ser más severo, menos severo o aproximadamente igual cuando ocurre ahora en comparación con hace 10 a 15 años. La percepción de severidad es distinta de la percepción de frecuencia y ambas son necesarias para un perfil completo de tendencias de peligros.
    slot_uri: aidops:climate_hazard_severity_trend_perception
    range: ClimateTrendPerception
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select item asking whether the household perceives the same hazard referenced in climate_hazard_frequency_trend_perception is usually more severe, less severe, or about the same when it occurs now compared to 10\u201315 years ago. Severity perception is distinct from frequency perception and both are required for a complete hazard trend profile. Together with climate_hazard_frequency_trend_perception, forms the perceived-hazard-trend pair used in CARE CVCA historical timelines and IFRC PCVA trend analysis. Applies when at least one hazard is selected in climate_hazards_experienced_past_5_years.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el hogar percibe que el mismo peligro referenciado en climate_hazard_severity_trend_perception suele ser m\u00e1s severo, menos severo o aproximadamente igual cuando ocurre ahora en comparaci\u00f3n con hace 10 a 15 a\u00f1os. La percepci\u00f3n de severidad es distinta de la percepci\u00f3n de frecuencia y ambas son necesarias para un perfil completo de tendencias de peligros.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le m\u00e9nage per\u00e7oit que le m\u00eame al\u00e9a r\u00e9f\u00e9renc\u00e9 dans climate_hazard_frequency_trend_perception est g\u00e9n\u00e9ralement plus grave, moins grave ou \u00e0 peu pr\u00e8s aussi grave lorsqu''il se produit maintenant par rapport \u00e0 il y a 10 \u00e0 15 ans. La perception de la s\u00e9v\u00e9rit\u00e9 est distincte de la perception de la fr\u00e9quence et les deux sont n\u00e9cessaires pour un profil complet des tendances des al\u00e9as.\n"}, "id": "climate_hazard_severity_trend_perception", "label": {"en": "Perceived change in hazard severity compared to 10\u201315 years ago", "es": "Cambio percibido en la severidad de peligros comparado con hace 10\u201315 a\u00f1os", "fr": "Changement per\u00e7u dans la s\u00e9v\u00e9rit\u00e9 des al\u00e9as par rapport \u00e0 il y a 10\u201315 ans"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-trend-perception"}'
