  aap_info_channel_preferred:
    title:
      en: 'AAP: Preferred channel for receiving information'
      fr: 'Redevabilité : Canal préféré pour recevoir l''information'
      es: 'Rendición de cuentas: Canal preferido para recibir información'
    description:
      en: 'Channel(s) through which the household prefers to receive information from aid providers. Multi-select: respondents may identify several. Used to design context-appropriate communications strategies aligned to how affected people actually wish to be reached (CHS 2024 Commitment 4 and IFRC CEA Toolkit accessibility principle). Ground Truth Solutions perception surveys consistently include a channel-preference item.'
      fr: 'Canal(ux) par lequel/lesquels le ménage préfère recevoir des informations des intervenants. Sélection multiple : les répondants peuvent en identifier plusieurs. Utilisé pour concevoir des stratégies de communication adaptées au contexte, alignées sur la façon dont les personnes affectées souhaitent réellement être atteintes (Engagement 4 de la CHS 2024 et principe d''accessibilité du Toolkit CEA de la FICR). Les enquêtes de perception de Ground Truth Solutions incluent systématiquement un item sur la préférence de canal.'
      es: 'Canal(es) por los cuales el hogar prefiere recibir información de los actores humanitarios. Selección múltiple: los encuestados pueden identificar varios. Se utiliza para diseñar estrategias de comunicación apropiadas al contexto, alineadas con la forma en que las personas afectadas desean realmente ser alcanzadas (Compromiso 4 de la CHS 2024 y principio de accesibilidad del Kit de Herramientas CEA de la FICR). Las encuestas de percepción de Ground Truth Solutions incluyen sistemáticamente un ítem de preferencia de canal.'
