      es: 'Booleano derivado por niño seleccionado: verdadero si el niño seleccionado aleatoriamente de 1 a 14 años experimentó alguna agresión psicológica (fcd_shouted O fcd_name_called) O algún castigo físico (fcd_shook O fcd_spanked O fcd_hit_body O fcd_hit_head O fcd_hit_limb O fcd_beat_hard_repeatedly) en el último mes. Corresponde al indicador MICS CP.3 / ODS 16.2.1 de disciplina violenta. Agregado a nivel poblacional a la proporción de niños 1-14 que experimentaron disciplina violenta en el último mes.'
