      es: 'Con qué frecuencia el encuestado se ha sentido tratado con respeto en las interacciones con los actores humanitarios. Corresponde al Compromiso 8 de la CHS 2024 y al derecho a la asistencia con dignidad de la Carta Humanitaria de Esfera. Indicador de respeto de GTS HVI (el informe GTS Nigeria 2021 «Respected but uninformed» centra explícitamente esta dimensión). Fuente: Menú IASC / REACH 2018, sección comportamiento del personal; Kit de Herramientas CEA de la FICR.'
