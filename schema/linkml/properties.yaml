  diarrhea_care_source:
    title:
      en: Care source for diarrhea
      fr: Source de soins pour la diarrhée
      es: Fuente de atención para la diarrea
    description:
      en: 'The type(s) of provider or facility the caregiver visited for advice or treatment of the child''s diarrhea episode. Published wording: ''Where did you go or who did you see for advice or treatment? (Select all that apply).'' Multi-select: a single episode may involve more than one provider. Ask only if diarrhea_care_sought is true. DHS codes h12a–h12x (country-specific provider codes); MICS code CD4.'
      fr: 'Le(s) type(s) de prestataire ou d''établissement que le soignant a consulté pour des conseils ou un traitement lors de l''épisode de diarrhée de l''enfant. Formulation publiée : « Où êtes-vous allé(e) ou qui avez-vous consulté pour des conseils ou un traitement ? (Sélectionnez tout ce qui s''applique). » Sélection multiple : un seul épisode peut impliquer plusieurs prestataires. Posez uniquement si diarrhea_care_sought est vrai. Codes DHS h12a–h12x (codes de prestataires propres au pays) ; code MICS CD4.'
      es: 'El(los) tipo(s) de proveedor o establecimiento al que el cuidador acudió para recibir consejo o tratamiento por el episodio de diarrea del niño. Redacción publicada: ''¿Adónde fue o a quién consultó para recibir consejo o tratamiento? (Seleccione todo lo que corresponda).'' Selección múltiple: un solo episodio puede involucrar más de un proveedor. Preguntar solo si diarrhea_care_sought es verdadero. Códigos DHS h12a–h12x (códigos de proveedor específicos del país); código MICS CD4.'
    slot_uri: aidops:diarrhea_care_source
    range: CareProviderType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health"], "cardinality": "multiple", "category": "diarrhea", "core": true, "definition": {"en": "The type(s) of provider or facility the caregiver visited for advice or treatment of the child''s diarrhea episode. Published wording: ''Where did you go or who did you see for advice or treatment? (Select all that apply).'' Multi-select: a single episode may involve more than one provider. Ask only if diarrhea_care_sought is true. DHS codes h12a\u2013h12x (country-specific provider codes); MICS code CD4.", "es": "El(los) tipo(s) de proveedor o establecimiento al que el cuidador acudi\u00f3 para recibir consejo o tratamiento por el episodio de diarrea del ni\u00f1o. Redacci\u00f3n publicada: ''\u00bfAd\u00f3nde fue o a qui\u00e9n consult\u00f3 para recibir consejo o tratamiento? (Seleccione todo lo que corresponda).'' Selecci\u00f3n m\u00faltiple: un solo episodio puede involucrar m\u00e1s de un proveedor. Preguntar solo si diarrhea_care_sought es verdadero. C\u00f3digos DHS h12a\u2013h12x (c\u00f3digos de proveedor espec\u00edficos del pa\u00eds); c\u00f3digo MICS CD4.", "fr": "Le(s) type(s) de prestataire ou d''\u00e9tablissement que le soignant a consult\u00e9 pour des conseils ou un traitement lors de l''\u00e9pisode de diarrh\u00e9e de l''enfant. Formulation publi\u00e9e : \u00ab O\u00f9 \u00eates-vous all\u00e9(e) ou qui avez-vous consult\u00e9 pour des conseils ou un traitement ? (S\u00e9lectionnez tout ce qui s''applique). \u00bb S\u00e9lection multiple : un seul \u00e9pisode peut impliquer plusieurs prestataires. Posez uniquement si diarrhea_care_sought est vrai. Codes DHS h12a\u2013h12x (codes de prestataires propres au pays) ; code MICS CD4."}, "id": "diarrhea_care_source", "label": {"en": "Care source for diarrhea", "es": "Fuente de atenci\u00f3n para la diarrea", "fr": "Source de soins pour la diarrh\u00e9e"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "care-provider-type"}'
