  desire_more_children:
    title:
      en: Desire for more children
      fr: Désir d'avoir d'autres enfants
      es: Deseo de tener más hijos
    description:
      en: 'Whether the woman wants another child and, if so, how soon. Gateway question for fertility preference coding (DHS V601). For currently pregnant women, the question is rephrased: ''After the child you are expecting, would you like to have another child?'' ''Want soon'' = within 2 years; ''want later'' = 2 or more years.'
      fr: 'Si la femme veut un autre enfant et, le cas échéant, dans quel délai. Question d''entrée pour le codage des préférences de fécondité (DHS V601). Pour les femmes enceintes, la question est reformulée : « Après l''enfant que vous attendez, souhaiteriez-vous en avoir un autre ? » ''Want soon'' = dans les 2 ans ; ''want later'' = 2 ans ou plus.'
      es: 'Si la mujer desea otro hijo y, de ser así, cuándo. Pregunta de entrada para la codificación de preferencias de fecundidad (DHS V601). Para mujeres embarazadas, la pregunta se reformula: ''¿Después del hijo que espera, desearía tener otro?'' ''Want soon'' = dentro de 2 años; ''want later'' = 2 años o más.'
    slot_uri: aidops:desire_more_children
    range: DesireMoreChildren
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning"], "cardinality": "single", "category": "fertility_preferences", "core": true, "definition": {"en": "Whether the woman wants another child and, if so, how soon. Gateway question for fertility preference coding (DHS V601). For currently pregnant women, the question is rephrased: ''After the child you are expecting, would you like to have another child?'' ''Want soon'' = within 2 years; ''want later'' = 2 or more years.", "es": "Si la mujer desea otro hijo y, de ser as\u00ed, cu\u00e1ndo. Pregunta de entrada para la codificaci\u00f3n de preferencias de fecundidad (DHS V601). Para mujeres embarazadas, la pregunta se reformula: ''\u00bfDespu\u00e9s del hijo que espera, desear\u00eda tener otro?'' ''Want soon'' = dentro de 2 a\u00f1os; ''want later'' = 2 a\u00f1os o m\u00e1s.", "fr": "Si la femme veut un autre enfant et, le cas \u00e9ch\u00e9ant, dans quel d\u00e9lai. Question d''entr\u00e9e pour le codage des pr\u00e9f\u00e9rences de f\u00e9condit\u00e9 (DHS V601). Pour les femmes enceintes, la question est reformul\u00e9e : \u00ab Apr\u00e8s l''enfant que vous attendez, souhaiteriez-vous en avoir un autre ? \u00bb ''Want soon'' = dans les 2 ans ; ''want later'' = 2 ans ou plus."}, "id": "desire_more_children", "label": {"en": "Desire for more children", "es": "Deseo de tener m\u00e1s hijos", "fr": "D\u00e9sir d''avoir d''autres enfants"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women", "mics6"], "vocabulary": "desire-more-children"}'
