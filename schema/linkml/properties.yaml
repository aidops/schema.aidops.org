    slot_uri: aidops:primary_cooking_stove_type
    range: StoveType
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-household-energy-database", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "The type of cookstove or cooking appliance the household mainly uses for cooking. Together with primary cooking fuel, stove type determines the MTF cooking tier PM2.5 and efficiency attributes using published ESMAP/WHO emission factor crosswalk tables. Source: MICS6 EU1; WHO/World Bank harmonized questionnaire Q1.", "es": "El tipo de cocina o aparato de cocci\u00f3n que el hogar usa principalmente para cocinar. Junto con el combustible de cocci\u00f3n principal, el tipo de cocina determina los atributos de PM2,5 y eficiencia del nivel MTF de cocci\u00f3n mediante las tablas de referencia de factores de emisi\u00f3n publicadas por ESMAP/OMS. Fuente: MICS6 EU1; cuestionario armonizado OMS/Banco Mundial Q1.", "fr": "Le type de foyer de cuisson ou d''appareil de cuisson que le m\u00e9nage utilise principalement pour cuisiner. Avec le combustible de cuisson principal, le type de foyer d\u00e9termine les attributs PM2,5 et efficacit\u00e9 du niveau MTF de cuisson \u00e0 l''aide des tables de correspondance des facteurs d''\u00e9mission ESMAP/OMS publi\u00e9es. Source : MICS6 EU1 ; questionnaire harmonis\u00e9 OMS/Banque mondiale Q1."}, "id": "primary_cooking_stove_type", "label": {"en": "Primary cooking stove type", "es": "Tipo de cocina principal", "fr": "Type de foyer de cuisson principal"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["who_world_bank_core_energy", "unicef_mics6", "se4all_mtf"], "vocabulary": "stove-type"}'
