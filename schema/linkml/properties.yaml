      es: Refinamiento opcional de cm_children_under_18_married. Se pregunta solo cuando cm_children_under_18_married es sí, para distinguir el matrimonio formal de la unión informal. Ambas formas cuentan para ODS 5.3.1; esta propiedad solo desagrega.
