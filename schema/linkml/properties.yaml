  ventilation_adequate:
    title:
      en: Ventilation adequate
      fr: Ventilation adéquate
      es: Ventilación adecuada
    description:
      en: Whether the shelter has adequate ventilation through windows, openings, or vents that allow fresh air to flow through. Self-report conflates presence of openings with adequacy; trained enumerator observation is preferred where feasible. Adequate ventilation prevents condensation and reduces transmission of communicable diseases (Sphere Standard 3 guidance, p. 257).
      fr: Si l'abri dispose d'une ventilation adéquate par des fenêtres, ouvertures ou ventilateurs permettant à l'air frais de circuler. L'autodéclaration confond la présence d'ouvertures avec l'adéquation ; l'observation par un enquêteur formé est préférable lorsque c'est possible. Une ventilation adéquate prévient la condensation et réduit la transmission des maladies transmissibles (Note d'orientation Norme Sphère 3, p. 257).
      es: Si el refugio tiene ventilación adecuada a través de ventanas, aberturas o rejillas que permiten circular aire fresco. El autoinforme confunde la presencia de aberturas con la adecuación; se prefiere la observación del encuestador capacitado cuando sea posible. La ventilación adecuada previene la condensación y reduce la transmisión de enfermedades transmisibles (Orientación Norma Esfera 3, p. 257).
    slot_uri: aidops:ventilation_adequate
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "shelter", "core": false, "definition": {"en": "Whether the shelter has adequate ventilation through windows, openings, or vents that allow fresh air to flow through. Self-report conflates presence of openings with adequacy; trained enumerator observation is preferred where feasible. Adequate ventilation prevents condensation and reduces transmission of communicable diseases (Sphere Standard 3 guidance, p. 257).", "es": "Si el refugio tiene ventilaci\u00f3n adecuada a trav\u00e9s de ventanas, aberturas o rejillas que permiten circular aire fresco. El autoinforme confunde la presencia de aberturas con la adecuaci\u00f3n; se prefiere la observaci\u00f3n del encuestador capacitado cuando sea posible. La ventilaci\u00f3n adecuada previene la condensaci\u00f3n y reduce la transmisi\u00f3n de enfermedades transmisibles (Orientaci\u00f3n Norma Esfera 3, p. 257).", "fr": "Si l''abri dispose d''une ventilation ad\u00e9quate par des fen\u00eatres, ouvertures ou ventilateurs permettant \u00e0 l''air frais de circuler. L''autod\u00e9claration confond la pr\u00e9sence d''ouvertures avec l''ad\u00e9quation ; l''observation par un enqu\u00eateur form\u00e9 est pr\u00e9f\u00e9rable lorsque c''est possible. Une ventilation ad\u00e9quate pr\u00e9vient la condensation et r\u00e9duit la transmission des maladies transmissibles (Note d''orientation Norme Sph\u00e8re 3, p. 257)."}, "id": "ventilation_adequate", "label": {"en": "Ventilation adequate", "es": "Ventilaci\u00f3n adecuada", "fr": "Ventilation ad\u00e9quate"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy"], "vocabulary": "yes-no-partial"}'
      bibliography_refs: sphere-2018
  vet_access_barriers:
    title:
      en: Barriers preventing access to veterinary or animal health services
      fr: Obstacles à l'accès aux services vétérinaires ou de santé animale
      es: Barreras que impiden el acceso a servicios veterinarios o de salud animal
    description:
      en: 'The reasons that prevented the household from accessing veterinary or animal health services when needed in the last 12 months. Multi-select from vocabulary `vet-access-barrier`. Applies when `vet_services_access` is not `always_accessed` or `no_need`. The barrier taxonomy is pastoral-specific: it includes `vet_post_outside_migration_route` (services not accessible during migration) and `conflict_insecurity` (armed conflict blocking access), which are barriers characteristic of mobile herding households that are not present in the equivalent AgricultureProfile binary item. Multi-select allows recording multiple concurrent barriers. Recall: last 12 months. Grounded in LEGS 3rd edition Chapter 5 (barriers to veterinary access in pastoral contexts), FAO GIEWS, FSNAU, and RIMA-II (FAO 2016) pastoral resilience indicators. `core: false` — recommended for comprehensive seasonal assessments.'
      fr: 'Les raisons qui ont empêché le ménage d''accéder aux services vétérinaires ou de santé animale en cas de besoin au cours des 12 derniers mois. Sélection multiple dans le vocabulaire `vet-access-barrier`. S''applique lorsque `vet_services_access` n''est pas `always_accessed` ou `no_need`. La taxonomie des obstacles est propre au contexte pastoral : elle inclut `vet_post_outside_migration_route` et `conflict_insecurity`. Sélection multiple. Rappel : 12 mois. Fondé sur LEGS 3e éd. Chapitre 5, FAO GIEWS, FSNAU et RIMA-II (FAO 2016). `core: false`.'
      es: 'Las razones que impidieron al hogar acceder a servicios veterinarios o de salud animal cuando los necesitaba en los últimos 12 meses. Selección múltiple del vocabulario `vet-access-barrier`. Aplica cuando `vet_services_access` no es `always_accessed` o `no_need`. La taxonomía de barreras es específica del pastoralismo: incluye `vet_post_outside_migration_route` y `conflict_insecurity`. Selección múltiple. Recordatorio: 12 meses. Fundamentado en LEGS 3.a ed. Capítulo 5, FAO GIEWS, FSNAU y RIMA-II (FAO 2016). `core: false`.'
    slot_uri: aidops:vet_access_barriers
    range: VetAccessBarrier
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-pastoral-monitoring-2020", "fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "rima-ii-fao-2016-pastoral", "vsf-belgium-tufts-pastoralist-tools-2019"], "cardinality": "multiple", "category": "pastoral_animal_health", "core": false, "definition": {"en": "The reasons that prevented the household from accessing veterinary or animal health services when needed in the last 12 months. Multi-select from vocabulary `vet-access-barrier`. Applies when `vet_services_access` is not `always_accessed` or `no_need`. The barrier taxonomy is pastoral-specific: it includes `vet_post_outside_migration_route` (services not accessible during migration) and `conflict_insecurity` (armed conflict blocking access), which are barriers characteristic of mobile herding households that are not present in the equivalent AgricultureProfile binary item. Multi-select allows recording multiple concurrent barriers. Recall: last 12 months. Grounded in LEGS 3rd edition Chapter 5 (barriers to veterinary access in pastoral contexts), FAO GIEWS, FSNAU, and RIMA-II (FAO 2016) pastoral resilience indicators. `core: false` \u2014 recommended for comprehensive seasonal assessments.", "es": "Las razones que impidieron al hogar acceder a servicios veterinarios o de salud animal cuando los necesitaba en los \u00faltimos 12 meses. Selecci\u00f3n m\u00faltiple del vocabulario `vet-access-barrier`. Aplica cuando `vet_services_access` no es `always_accessed` o `no_need`. La taxonom\u00eda de barreras es espec\u00edfica del pastoralismo: incluye `vet_post_outside_migration_route` y `conflict_insecurity`. Selecci\u00f3n m\u00faltiple. Recordatorio: 12 meses. Fundamentado en LEGS 3.a ed. Cap\u00edtulo 5, FAO GIEWS, FSNAU y RIMA-II (FAO 2016). `core: false`.", "fr": "Les raisons qui ont emp\u00each\u00e9 le m\u00e9nage d''acc\u00e9der aux services v\u00e9t\u00e9rinaires ou de sant\u00e9 animale en cas de besoin au cours des 12 derniers mois. S\u00e9lection multiple dans le vocabulaire `vet-access-barrier`. S''applique lorsque `vet_services_access` n''est pas `always_accessed` ou `no_need`. La taxonomie des obstacles est propre au contexte pastoral : elle inclut `vet_post_outside_migration_route` et `conflict_insecurity`. S\u00e9lection multiple. Rappel : 12 mois. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 5, FAO GIEWS, FSNAU et RIMA-II (FAO 2016). `core: false`."}, "id": "vet_access_barriers", "label": {"en": "Barriers preventing access to veterinary or animal health services", "es": "Barreras que impiden el acceso a servicios veterinarios o de salud animal", "fr": "Obstacles \u00e0 l''acc\u00e8s aux services v\u00e9t\u00e9rinaires ou de sant\u00e9 animale"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "vet-access-barrier"}'
      bibliography_refs: fao-giews-pastoral-monitoring-2020,fsnau-seasonal-assessment-methodology-2022,legs-3rd-edition-2023,rima-ii-fao-2016-pastoral,vsf-belgium-tufts-pastoralist-tools-2019
  vet_services_access:
    title:
      en: Veterinary services access level — last 12 months
      fr: Niveau d'accès aux services vétérinaires — 12 derniers mois
      es: Nivel de acceso a servicios veterinarios — últimos 12 meses
    description:
      en: 'How consistently the household was able to access veterinary or animal health services (vaccines, deworming, treatment) when its livestock needed them in the last 12 months. Single-select from vocabulary `vet-access-level` (always / mostly / sometimes / rarely / never / no_need). This item adds access-level granularity to the binary AgricultureProfile `livestock_vet_access` (yes/no) item. The two items co-exist without duplication: AgricultureProfile captures the binary access flag for all livestock-keeping households; this item adds the pastoral-specific access-level scale capturing how consistently mobile herds can reach services during migration. Mapping to the AgricultureProfile binary for backward compatibility: `always_accessed` and `mostly_accessed` map to `yes`; `rarely_accessed` and `never_accessed` map to `no`; `sometimes_accessed` is the nuance the binary cannot capture. Form implementations should not skip this item even if AgricultureProfile was co-administered. Recall: last 12 months, consistent with LEGS initial assessment standards and AgricultureProfile. Grounded in LEGS 3rd edition Chapter 5, RIMA-II (FAO 2016) pastoral resilience indicators, and AgricultureProfile `livestock_vet_access` cross-reference (see OQ-4). `core: false` — companion `vet_access_barriers` item adds barrier detail.'
      fr: 'Dans quelle mesure le ménage a pu accéder aux services vétérinaires ou de santé animale (vaccins, vermifuges, traitements) dont son bétail avait besoin au cours des 12 derniers mois. Sélection unique dans le vocabulaire `vet-access-level`. Ajoute une granularité de niveau d''accès à l''item binaire `livestock_vet_access` du AgricultureProfile (oui/non). Les deux items coexistent sans duplication : AgricultureProfile capture l''indicateur d''accès binaire ; cet item ajoute l''échelle de niveau d''accès pastoral. Rappel : 12 mois. Fondé sur LEGS 3e éd. Chapitre 5 et RIMA-II (FAO 2016). `core: false`.'
      es: 'Con qué consistencia el hogar pudo acceder a servicios veterinarios o de salud animal (vacunas, desparasitación, tratamiento) cuando su ganado los necesitaba en los últimos 12 meses. Selección única del vocabulario `vet-access-level`. Añade granularidad de nivel de acceso al ítem binario `livestock_vet_access` de AgricultureProfile (sí/no). Los dos ítems coexisten sin duplicación: AgricultureProfile captura el indicador de acceso binario; este ítem añade la escala de nivel de acceso específica del pastoralismo. Recordatorio: 12 meses. Fundamentado en LEGS 3.a ed. Capítulo 5 y RIMA-II (FAO 2016). `core: false`.'
    slot_uri: aidops:vet_services_access
    range: VetAccessLevel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "rima-ii-fao-2016-pastoral", "sphere-handbook-2018-legs", "vsf-belgium-tufts-pastoralist-tools-2019"], "cardinality": "single", "category": "pastoral_animal_health", "core": false, "definition": {"en": "How consistently the household was able to access veterinary or animal health services (vaccines, deworming, treatment) when its livestock needed them in the last 12 months. Single-select from vocabulary `vet-access-level` (always / mostly / sometimes / rarely / never / no_need). This item adds access-level granularity to the binary AgricultureProfile `livestock_vet_access` (yes/no) item. The two items co-exist without duplication: AgricultureProfile captures the binary access flag for all livestock-keeping households; this item adds the pastoral-specific access-level scale capturing how consistently mobile herds can reach services during migration. Mapping to the AgricultureProfile binary for backward compatibility: `always_accessed` and `mostly_accessed` map to `yes`; `rarely_accessed` and `never_accessed` map to `no`; `sometimes_accessed` is the nuance the binary cannot capture. Form implementations should not skip this item even if AgricultureProfile was co-administered. Recall: last 12 months, consistent with LEGS initial assessment standards and AgricultureProfile. Grounded in LEGS 3rd edition Chapter 5, RIMA-II (FAO 2016) pastoral resilience indicators, and AgricultureProfile `livestock_vet_access` cross-reference (see OQ-4). `core: false` \u2014 companion `vet_access_barriers` item adds barrier detail.", "es": "Con qu\u00e9 consistencia el hogar pudo acceder a servicios veterinarios o de salud animal (vacunas, desparasitaci\u00f3n, tratamiento) cuando su ganado los necesitaba en los \u00faltimos 12 meses. Selecci\u00f3n \u00fanica del vocabulario `vet-access-level`. A\u00f1ade granularidad de nivel de acceso al \u00edtem binario `livestock_vet_access` de AgricultureProfile (s\u00ed/no). Los dos \u00edtems coexisten sin duplicaci\u00f3n: AgricultureProfile captura el indicador de acceso binario; este \u00edtem a\u00f1ade la escala de nivel de acceso espec\u00edfica del pastoralismo. Recordatorio: 12 meses. Fundamentado en LEGS 3.a ed. Cap\u00edtulo 5 y RIMA-II (FAO 2016). `core: false`.", "fr": "Dans quelle mesure le m\u00e9nage a pu acc\u00e9der aux services v\u00e9t\u00e9rinaires ou de sant\u00e9 animale (vaccins, vermifuges, traitements) dont son b\u00e9tail avait besoin au cours des 12 derniers mois. S\u00e9lection unique dans le vocabulaire `vet-access-level`. Ajoute une granularit\u00e9 de niveau d''acc\u00e8s \u00e0 l''item binaire `livestock_vet_access` du AgricultureProfile (oui/non). Les deux items coexistent sans duplication : AgricultureProfile capture l''indicateur d''acc\u00e8s binaire ; cet item ajoute l''\u00e9chelle de niveau d''acc\u00e8s pastoral. Rappel : 12 mois. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 5 et RIMA-II (FAO 2016). `core: false`."}, "id": "vet_services_access", "label": {"en": "Veterinary services access level \u2014 last 12 months", "es": "Nivel de acceso a servicios veterinarios \u2014 \u00faltimos 12 meses", "fr": "Niveau d''acc\u00e8s aux services v\u00e9t\u00e9rinaires \u2014 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "vet-access-level"}'
      bibliography_refs: fsnau-seasonal-assessment-methodology-2022,legs-3rd-edition-2023,rima-ii-fao-2016-pastoral,sphere-handbook-2018-legs,vsf-belgium-tufts-pastoralist-tools-2019
  warning_action_barriers:
    title:
      en: Barriers to taking protective action (multi-select)
      fr: Obstacles à l'action de protection (sélection multiple)
      es: Barreras para tomar acción de protección (selección múltiple)
    description:
      en: 'The obstacles that prevented the household from taking the protective actions it judged necessary. Multi-select from the warning-action-barrier vocabulary, covering transport and destination barriers, inability to leave livestock or property, caregiver constraints, financial cost, disbelief in the warning, absence of action guidance, time-too-short, physical barriers (for example flooded roads), language barriers, security and conflict, two permission-denied codes (household member, community authority), a ''no_barrier'' code, and ''other''. Applicable when warning_received is yes and (warning_actions_taken includes ''no_action_taken'' or the respondent indicates partial action). Sensitivity: the item as a whole is non-sensitive at household level, but the two ''permission_denied_*'' codes can surface intra-household or community coercion with protection and GBV implications; the vocabulary entries for these codes carry a sensitivity flag, and enumerators should ask the item in a private setting. Downstream systems should apply partial-sensitivity handling to records where either permission-denied code is selected.'
      fr: 'Les obstacles qui ont empêché le ménage de prendre les actions de protection jugées nécessaires. Sélection multiple dans le vocabulaire warning-action-barrier, couvrant les obstacles de transport et de destination, l''impossibilité de laisser le bétail ou les biens, les contraintes de soins, le coût financier, l''incrédulité à l''égard de l''alerte, l''absence de consignes d''action, le temps trop court, les obstacles physiques (par exemple routes inondées), les barrières linguistiques, la sécurité et le conflit, deux codes de refus de permission (membre du ménage, autorité communautaire), un code « no_barrier » et « other ». Applicable si warning_received est oui et (warning_actions_taken inclut « no_action_taken » ou le répondant indique une action partielle). Sensibilité : l''item dans son ensemble est non sensible au niveau du ménage, mais les deux codes « permission_denied_* » peuvent révéler une contrainte intra-ménage ou communautaire avec des implications de protection et VBG ; les entrées de vocabulaire pour ces codes portent un marqueur de sensibilité, et les enquêteurs devraient poser l''item dans un cadre privé. Les systèmes en aval devraient appliquer un traitement de sensibilité partielle aux enregistrements où l''un ou l''autre code de refus de permission est sélectionné.'
      es: 'Los obstáculos que impidieron al hogar tomar las acciones de protección que consideró necesarias. Selección múltiple del vocabulario warning-action-barrier, que abarca barreras de transporte y destino, imposibilidad de dejar ganado o bienes, restricciones de cuidado, costo financiero, incredulidad ante la alerta, ausencia de orientación sobre qué hacer, tiempo demasiado corto, barreras físicas (por ejemplo caminos inundados), barreras lingüísticas, seguridad y conflicto, dos códigos de denegación de permiso (miembro del hogar, autoridad comunitaria), un código «no_barrier» y «other». Aplicable cuando warning_received es sí y (warning_actions_taken incluye «no_action_taken» o el respondiente indica acción parcial). Sensibilidad: el ítem en su conjunto es no sensible a nivel del hogar, pero los dos códigos «permission_denied_*» pueden revelar coerción intrafamiliar o comunitaria con implicaciones de protección y VBG; las entradas del vocabulario para estos códigos llevan un marcador de sensibilidad, y los enumeradores deben preguntar el ítem en un entorno privado. Los sistemas posteriores deben aplicar un tratamiento de sensibilidad parcial a los registros donde se seleccione cualquiera de los códigos de denegación de permiso.'
    slot_uri: aidops:warning_action_barriers
    range: WarningActionBarrier
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-aap-early-response-2020", "ifrc-fbf-ma-guide-2019", "ifrc-pgi-aa-toolkit", "paul-dutt-2010-cyclone-sidr", "roy-et-al-2015-odisha", "start-network-def"], "cardinality": "multiple", "category": "hazard_event", "core": true, "definition": {"en": "The obstacles that prevented the household from taking the protective actions it judged necessary. Multi-select from the warning-action-barrier vocabulary, covering transport and destination barriers, inability to leave livestock or property, caregiver constraints, financial cost, disbelief in the warning, absence of action guidance, time-too-short, physical barriers (for example flooded roads), language barriers, security and conflict, two permission-denied codes (household member, community authority), a ''no_barrier'' code, and ''other''. Applicable when warning_received is yes and (warning_actions_taken includes ''no_action_taken'' or the respondent indicates partial action). Sensitivity: the item as a whole is non-sensitive at household level, but the two ''permission_denied_*'' codes can surface intra-household or community coercion with protection and GBV implications; the vocabulary entries for these codes carry a sensitivity flag, and enumerators should ask the item in a private setting. Downstream systems should apply partial-sensitivity handling to records where either permission-denied code is selected.", "es": "Los obst\u00e1culos que impidieron al hogar tomar las acciones de protecci\u00f3n que consider\u00f3 necesarias. Selecci\u00f3n m\u00faltiple del vocabulario warning-action-barrier, que abarca barreras de transporte y destino, imposibilidad de dejar ganado o bienes, restricciones de cuidado, costo financiero, incredulidad ante la alerta, ausencia de orientaci\u00f3n sobre qu\u00e9 hacer, tiempo demasiado corto, barreras f\u00edsicas (por ejemplo caminos inundados), barreras ling\u00fc\u00edsticas, seguridad y conflicto, dos c\u00f3digos