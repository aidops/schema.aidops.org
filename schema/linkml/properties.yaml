  emergency_contraception_aware:
    title:
      en: Aware of emergency contraceptive pills
      fr: Connaît les pilules contraceptives d'urgence
      es: Conoce las píldoras anticonceptivas de emergencia
    description:
      en: Whether the woman is aware of emergency contraceptive pills (EC pills) that can prevent pregnancy after unprotected sex (MISP Objective 2, GBV response). Optional; include in crisis contexts where gender-based violence is a programmatic concern. EC awareness is one MISP proxy indicator for readiness to respond to sexual violence.
      fr: Si la femme est au courant des pilules contraceptives d'urgence (pilules CU) pouvant prévenir une grossesse après un rapport non protégé (Objectif MISP 2, réponse aux violences basées sur le genre). Facultatif ; à inclure dans les contextes de crise où les violences basées sur le genre constituent une préoccupation programmatique. La sensibilisation à la CU est l'un des indicateurs proxy MISP pour la préparation à répondre à la violence sexuelle.
      es: Si la mujer conoce las píldoras anticonceptivas de emergencia (pastillas AE) que pueden prevenir el embarazo después de una relación sexual sin protección (Objetivo MISP 2, respuesta a la VBG). Opcional; incluir en contextos de crisis donde la violencia de género es una preocupación programática. El conocimiento de la AE es uno de los indicadores proxy del MISP para la preparación para responder a la violencia sexual.
    slot_uri: aidops:emergency_contraception_aware
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["iawg-misp-2018"], "cardinality": "single", "category": "misp_access", "core": false, "definition": {"en": "Whether the woman is aware of emergency contraceptive pills (EC pills) that can prevent pregnancy after unprotected sex (MISP Objective 2, GBV response). Optional; include in crisis contexts where gender-based violence is a programmatic concern. EC awareness is one MISP proxy indicator for readiness to respond to sexual violence.", "es": "Si la mujer conoce las p\u00edldoras anticonceptivas de emergencia (pastillas AE) que pueden prevenir el embarazo despu\u00e9s de una relaci\u00f3n sexual sin protecci\u00f3n (Objetivo MISP 2, respuesta a la VBG). Opcional; incluir en contextos de crisis donde la violencia de g\u00e9nero es una preocupaci\u00f3n program\u00e1tica. El conocimiento de la AE es uno de los indicadores proxy del MISP para la preparaci\u00f3n para responder a la violencia sexual.", "fr": "Si la femme est au courant des pilules contraceptives d''urgence (pilules CU) pouvant pr\u00e9venir une grossesse apr\u00e8s un rapport non prot\u00e9g\u00e9 (Objectif MISP 2, r\u00e9ponse aux violences bas\u00e9es sur le genre). Facultatif ; \u00e0 inclure dans les contextes de crise o\u00f9 les violences bas\u00e9es sur le genre constituent une pr\u00e9occupation programmatique. La sensibilisation \u00e0 la CU est l''un des indicateurs proxy MISP pour la pr\u00e9paration \u00e0 r\u00e9pondre \u00e0 la violence sexuelle."}, "id": "emergency_contraception_aware", "label": {"en": "Aware of emergency contraceptive pills", "es": "Conoce las p\u00edldoras anticonceptivas de emergencia", "fr": "Conna\u00eet les pilules contraceptives d''urgence"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["iawg_misp"], "vocabulary": null}'
