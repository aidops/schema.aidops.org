  water_point_access:
    title:
      en: Livestock water access at seasonal water points — last 30 days
      fr: Accès à l'eau pour le bétail aux points d'eau saisonniers — 30 derniers jours
      es: Acceso al agua para el ganado en puntos de agua estacionales — últimos 30 días
    description:
      en: 'Whether the household had access to sufficient water for its livestock at seasonal water points along its migration route in the last 30 days. Single-select from vocabulary `water-access-livestock`. This item is explicitly for livestock watering, not household WASH water access (which belongs on WASHProfile); enumerators should be trained to distinguish clearly between the two. Water-point access for livestock is a leading pastoral early-warning indicator: inadequate watering causes rapid livestock body-condition loss and is a precursor to mortality. The vocabulary severity codes (adequate, reduced_but_manageable, inadequate_stress, severely_inadequate, water_point_closed) align with Sphere LEGS livestock water standards and FAO GIEWS water-point monitoring categories. Grounded in LEGS 3rd edition Chapter 7, FAO GIEWS water-point availability monitoring, FSNAU water-point items, IPC AFI pastoral annex, and Sphere 2018 LEGS livestock water standards. Recall: last 30 days.'
      fr: 'Si le ménage a eu accès à suffisamment d''eau pour son bétail aux points d''eau saisonniers le long de son itinéraire de migration au cours des 30 derniers jours. Sélection unique dans le vocabulaire `water-access-livestock`. Cet item concerne explicitement l''abreuvement du bétail, et non l''accès à l''eau WASH du ménage (qui appartient au WASHProfile). Les niveaux de gravité du vocabulaire s''alignent sur les normes LEGS Sphère pour l''eau du bétail et les catégories de suivi des points d''eau FAO GIEWS. Fondé sur LEGS 3e éd. Chapitre 7, FAO GIEWS, items FSNAU, l''annexe pastoraliste IPC AFI et les normes LEGS Sphère 2018. Rappel : 30 derniers jours.'
      es: 'Si el hogar tuvo acceso suficiente de agua para su ganado en puntos de agua estacionales a lo largo de su ruta de migración en los últimos 30 días. Selección única del vocabulario `water-access-livestock`. Este ítem es explícitamente para el abrevadero del ganado, no para el acceso al agua WASH del hogar (que corresponde a WASHProfile). Los códigos de gravedad del vocabulario se alinean con los estándares LEGS de Esfera para agua del ganado y las categorías de monitoreo de puntos de agua de FAO GIEWS. Fundamentado en LEGS 3.a ed. Capítulo 7, FAO GIEWS, ítems FSNAU, el anexo pastoralista IPC AFI y los estándares LEGS Esfera 2018. Recordatorio: últimos 30 días.'
    slot_uri: aidops:water_point_access
    range: WaterAccessLivestock
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-pastoral-monitoring-2020", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "sphere-handbook-2018-legs", "vsf-belgium-tufts-pastoralist-tools-2019"], "cardinality": "single", "category": "pastoral_rangeland", "core": true, "definition": {"en": "Whether the household had access to sufficient water for its livestock at seasonal water points along its migration route in the last 30 days. Single-select from vocabulary `water-access-livestock`. This item is explicitly for livestock watering, not household WASH water access (which belongs on WASHProfile); enumerators should be trained to distinguish clearly between the two. Water-point access for livestock is a leading pastoral early-warning indicator: inadequate watering causes rapid livestock body-condition loss and is a precursor to mortality. The vocabulary severity codes (adequate, reduced_but_manageable, inadequate_stress, severely_inadequate, water_point_closed) align with Sphere LEGS livestock water standards and FAO GIEWS water-point monitoring categories. Grounded in LEGS 3rd edition Chapter 7, FAO GIEWS water-point availability monitoring, FSNAU water-point items, IPC AFI pastoral annex, and Sphere 2018 LEGS livestock water standards. Recall: last 30 days.", "es": "Si el hogar tuvo acceso suficiente de agua para su ganado en puntos de agua estacionales a lo largo de su ruta de migraci\u00f3n en los \u00faltimos 30 d\u00edas. Selecci\u00f3n \u00fanica del vocabulario `water-access-livestock`. Este \u00edtem es expl\u00edcitamente para el abrevadero del ganado, no para el acceso al agua WASH del hogar (que corresponde a WASHProfile). Los c\u00f3digos de gravedad del vocabulario se alinean con los est\u00e1ndares LEGS de Esfera para agua del ganado y las categor\u00edas de monitoreo de puntos de agua de FAO GIEWS. Fundamentado en LEGS 3.a ed. Cap\u00edtulo 7, FAO GIEWS, \u00edtems FSNAU, el anexo pastoralista IPC AFI y los est\u00e1ndares LEGS Esfera 2018. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "Si le m\u00e9nage a eu acc\u00e8s \u00e0 suffisamment d''eau pour son b\u00e9tail aux points d''eau saisonniers le long de son itin\u00e9raire de migration au cours des 30 derniers jours. S\u00e9lection unique dans le vocabulaire `water-access-livestock`. Cet item concerne explicitement l''abreuvement du b\u00e9tail, et non l''acc\u00e8s \u00e0 l''eau WASH du m\u00e9nage (qui appartient au WASHProfile). Les niveaux de gravit\u00e9 du vocabulaire s''alignent sur les normes LEGS Sph\u00e8re pour l''eau du b\u00e9tail et les cat\u00e9gories de suivi des points d''eau FAO GIEWS. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 7, FAO GIEWS, items FSNAU, l''annexe pastoraliste IPC AFI et les normes LEGS Sph\u00e8re 2018. Rappel : 30 derniers jours."}, "id": "water_point_access", "label": {"en": "Livestock water access at seasonal water points \u2014 last 30 days", "es": "Acceso al agua para el ganado en puntos de agua estacionales \u2014 \u00faltimos 30 d\u00edas", "fr": "Acc\u00e8s \u00e0 l''eau pour le b\u00e9tail aux points d''eau saisonniers \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "water-access-livestock"}'
      bibliography_refs: fao-giews-pastoral-monitoring-2020,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,sphere-handbook-2018-legs,vsf-belgium-tufts-pastoralist-tools-2019
  water_quantity_litres_per_person_per_day:
    title:
      en: Water quantity (litres per person per day)
      fr: Quantité d'eau (litres par personne par jour)
      es: Cantidad de agua (litros por persona por día)
    description:
      en: 'Estimated litres of water collected per person per day for all household uses (drinking, cooking, personal hygiene). Enumerators may calculate from household-reported trips, containers, and volume: trips per day × containers per trip × litres per container ÷ household size. This is an approximation from self-report. Sphere minimum standard: 15 L/p/d (acute emergency phase: 7.5 L/p/d). JMP basic service aspiration for longer-term recovery programming: 30+ L/p/d. UNHCR SENS threshold: 10 L/p/d for potable storage.'
      fr: 'Litres d''eau estimés collectés par personne et par jour pour tous les usages du ménage (boisson, cuisine, hygiène personnelle). Les énumérateurs peuvent calculer à partir des déclarations du ménage sur les trajets, les récipients et les volumes : trajets par jour × récipients par trajet × litres par récipient ÷ taille du ménage. Il s''agit d''une approximation à partir d''auto-déclarations. Norme minimale Sphère : 15 L/p/j (phase d''urgence aiguë : 7,5 L/p/j). Aspiration du service de base JMP pour la programmation de relèvement à long terme : 30+ L/p/j. Seuil SENS du HCR : 10 L/p/j pour le stockage d''eau potable.'
      es: 'Litros estimados de agua recolectada por persona por día para todos los usos del hogar (beber, cocinar, higiene personal). Los enumeradores pueden calcular a partir de los viajes, recipientes y volumen reportados por el hogar: viajes por día × recipientes por viaje × litros por recipiente ÷ tamaño del hogar. Es una aproximación a partir de la autodeclaración. Estándar mínimo Esfera: 15 L/p/d (fase de emergencia aguda: 7,5 L/p/d). Aspiración de servicio básico JMP para programación de recuperación a largo plazo: 30+ L/p/d. Umbral SENS ACNUR: 10 L/p/d para almacenamiento de agua potable.'
    slot_uri: aidops:water_quantity_litres_per_person_per_day
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "water", "core": true, "definition": {"en": "Estimated litres of water collected per person per day for all household uses (drinking, cooking, personal hygiene). Enumerators may calculate from household-reported trips, containers, and volume: trips per day \u00d7 containers per trip \u00d7 litres per container \u00f7 household size. This is an approximation from self-report. Sphere minimum standard: 15 L/p/d (acute emergency phase: 7.5 L/p/d). JMP basic service aspiration for longer-term recovery programming: 30+ L/p/d. UNHCR SENS threshold: 10 L/p/d for potable storage.", "es": "Litros estimados de agua recolectada por persona por d\u00eda para todos los usos del hogar (beber, cocinar, higiene personal). Los enumeradores pueden calcular a partir de los viajes, recipientes y volumen reportados por el hogar: viajes por d\u00eda \u00d7 recipientes por viaje \u00d7 litros por recipiente \u00f7 tama\u00f1o del hogar. Es una aproximaci\u00f3n a partir de la autodeclaraci\u00f3n. Est\u00e1ndar m\u00ednimo Esfera: 15 L/p/d (fase de emergencia aguda: 7,5 L/p/d). Aspiraci\u00f3n de servicio b\u00e1sico JMP para programaci\u00f3n de recuperaci\u00f3n a largo plazo: 30+ L/p/d. Umbral SENS ACNUR: 10 L/p/d para almacenamiento de agua potable.", "fr": "Litres d''eau estim\u00e9s collect\u00e9s par personne et par jour pour tous les usages du m\u00e9nage (boisson, cuisine, hygi\u00e8ne personnelle). Les \u00e9num\u00e9rateurs peuvent calculer \u00e0 partir des d\u00e9clarations du m\u00e9nage sur les trajets, les r\u00e9cipients et les volumes : trajets par jour \u00d7 r\u00e9cipients par trajet \u00d7 litres par r\u00e9cipient \u00f7 taille du m\u00e9nage. Il s''agit d''une approximation \u00e0 partir d''auto-d\u00e9clarations. Norme minimale Sph\u00e8re : 15 L/p/j (phase d''urgence aigu\u00eb : 7,5 L/p/j). Aspiration du service de base JMP pour la programmation de rel\u00e8vement \u00e0 long terme : 30+ L/p/j. Seuil SENS du HCR : 10 L/p/j pour le stockage d''eau potable."}, "id": "water_quantity_litres_per_person_per_day", "label": {"en": "Water quantity (litres per person per day)", "es": "Cantidad de agua (litros por persona por d\u00eda)", "fr": "Quantit\u00e9 d''eau (litres par personne par jour)"}, "maturity": "draft", "references": null, "type": "decimal", "valid_instruments": ["unhcr_sens_module7", "erwg_wash_hh"], "vocabulary": null}'
