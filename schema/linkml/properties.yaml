  climate_adaptive_capacity_index:
    title:
      en: Adaptive capacity index (0–9)
      fr: Indice de capacité d'adaptation (0–9)
      es: Índice de capacidad de adaptación (0–9)
    description:
      en: 'Derived integer 0–9 count of positive adaptive capacity signals, computable in XLSForm using calculate fields for rapid in-field triage. Uses equal weights (1 point per signal); program-specific weighting is a configuration decision, not a schema decision. Formula: (1 if climate_info_services_access = ''yes'') + (1 if climate_information_trust IN (''fully_trusted'', ''mostly_trusted'')) + (1 if climate_insurance_coverage_type does NOT include ''none'') + (1 if climate_insurance_paid_out_past_event IN (''yes_paid_in_full'', ''yes_paid_partially'', ''no_claim_made_but_covered'')) + (1 if climate_savings_for_shock IN (''yes_formal_savings'', ''yes_informal_savings'', ''yes_both'')) + (1 if climate_shock_credit_access IN (''yes_formal_source'', ''yes_informal_only'')) + (1 if count-selected(climate_adaptive_practices_used) >= 2 AND NOT(''none_no_specific_practice'' IN climate_adaptive_practices_used)) + (1 if climate_livelihood_diversification_intent IN (''yes_concrete_plan'', ''yes_interested_but_no_plan'')) + (1 if climate_safety_net_access = ''yes''). Threshold guidance (IPCC AR6 WGII Chapter 17 framing): 0–2 = low adaptive capacity (high vulnerability); 3–5 = moderate; 6–9 = high. This is a rapid in-form screening proxy, not a calibrated composite index. Derived, not asked.'
      fr: 'Entier dérivé 0–9 comptant les signaux positifs de capacité d''adaptation, calculable dans XLSForm à l''aide de champs de calcul pour un triage rapide sur le terrain. Utilise des pondérations égales (1 point par signal) ; la pondération spécifique au programme est une décision de configuration, pas une décision de schéma. Formule documentée dans la définition anglaise. Seuils : 0–2 = faible capacité d''adaptation ; 3–5 = modérée ; 6–9 = élevée. Dérivé, non demandé.'
      es: 'Entero derivado 0–9 que cuenta las señales positivas de capacidad de adaptación, calculable en XLSForm usando campos de cálculo para triaje rápido en campo. Usa pesos iguales (1 punto por señal); la ponderación específica del programa es una decisión de configuración, no del esquema. La fórmula está documentada en la definición en inglés. Umbrales: 0–2 = baja capacidad de adaptación; 3–5 = moderada; 6–9 = alta. Derivado, no preguntado.'
    slot_uri: aidops:climate_adaptive_capacity_index
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016", "gcf-results-framework-2022", "ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived integer 0\u20139 count of positive adaptive capacity signals, computable in XLSForm using calculate fields for rapid in-field triage. Uses equal weights (1 point per signal); program-specific weighting is a configuration decision, not a schema decision. Formula: (1 if climate_info_services_access = ''yes'') + (1 if climate_information_trust IN (''fully_trusted'', ''mostly_trusted'')) + (1 if climate_insurance_coverage_type does NOT include ''none'') + (1 if climate_insurance_paid_out_past_event IN (''yes_paid_in_full'', ''yes_paid_partially'', ''no_claim_made_but_covered'')) + (1 if climate_savings_for_shock IN (''yes_formal_savings'', ''yes_informal_savings'', ''yes_both'')) + (1 if climate_shock_credit_access IN (''yes_formal_source'', ''yes_informal_only'')) + (1 if count-selected(climate_adaptive_practices_used) >= 2 AND NOT(''none_no_specific_practice'' IN climate_adaptive_practices_used)) + (1 if climate_livelihood_diversification_intent IN (''yes_concrete_plan'', ''yes_interested_but_no_plan'')) + (1 if climate_safety_net_access = ''yes''). Threshold guidance (IPCC AR6 WGII Chapter 17 framing): 0\u20132 = low adaptive capacity (high vulnerability); 3\u20135 = moderate; 6\u20139 = high. This is a rapid in-form screening proxy, not a calibrated composite index. Derived, not asked.\n", "es": "Entero derivado 0\u20139 que cuenta las se\u00f1ales positivas de capacidad de adaptaci\u00f3n, calculable en XLSForm usando campos de c\u00e1lculo para triaje r\u00e1pido en campo. Usa pesos iguales (1 punto por se\u00f1al); la ponderaci\u00f3n espec\u00edfica del programa es una decisi\u00f3n de configuraci\u00f3n, no del esquema. La f\u00f3rmula est\u00e1 documentada en la definici\u00f3n en ingl\u00e9s. Umbrales: 0\u20132 = baja capacidad de adaptaci\u00f3n; 3\u20135 = moderada; 6\u20139 = alta. Derivado, no preguntado.\n", "fr": "Entier d\u00e9riv\u00e9 0\u20139 comptant les signaux positifs de capacit\u00e9 d''adaptation, calculable dans XLSForm \u00e0 l''aide de champs de calcul pour un triage rapide sur le terrain. Utilise des pond\u00e9rations \u00e9gales (1 point par signal) ; la pond\u00e9ration sp\u00e9cifique au programme est une d\u00e9cision de configuration, pas une d\u00e9cision de sch\u00e9ma. Formule document\u00e9e dans la d\u00e9finition anglaise. Seuils : 0\u20132 = faible capacit\u00e9 d''adaptation ; 3\u20135 = mod\u00e9r\u00e9e ; 6\u20139 = \u00e9lev\u00e9e. D\u00e9riv\u00e9, non demand\u00e9.\n"}, "id": "climate_adaptive_capacity_index", "label": {"en": "Adaptive capacity index (0\u20139)", "es": "\u00cdndice de capacidad de adaptaci\u00f3n (0\u20139)", "fr": "Indice de capacit\u00e9 d''adaptation (0\u20139)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
      bibliography_refs: fao-rima-2016,gcf-results-framework-2022,ipcc-ar5-wg2-2014,ipcc-ar6-wg2-2022
  climate_adaptive_practice_barrier:
    title:
      en: Most important barrier to adopting more climate-adaptive practices
      fr: Principal obstacle à l'adoption de davantage de pratiques climato-adaptatives
      es: Principal barrera para adoptar más prácticas de adaptación climática
    description:
      en: Single-select item asking for the most important barrier preventing the household from using more climate-smart practices. Applies when fewer than 3 practices are selected in climate_adaptive_practices_used; high-adoption households need not be asked about barriers. Aligns with IPCC AR6 WGII Chapter 17 barriers-to-adaptation framework and World Bank CSA Country Profile barriers-to-CSA-adoption analysis.
      fr: Item à sélection unique demandant quel est l'obstacle le plus important empêchant le ménage d'utiliser davantage de pratiques climato-intelligentes. S'applique lorsque moins de 3 pratiques sont sélectionnées dans climate_adaptive_practices_used. S'aligne sur le cadre des obstacles à l'adaptation du GIEC AR6 WGII Chapitre 17.
      es: Ítem de selección única que pregunta cuál es la barrera más importante que impide al hogar usar más prácticas climáticamente inteligentes. Aplica cuando menos de 3 prácticas están seleccionadas en climate_adaptive_practices_used. Se alinea con el marco de barreras para la adaptación del IPCC AR6 WGII Capítulo 17.
    slot_uri: aidops:climate_adaptive_practice_barrier
    range: AdaptivePracticeBarrier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019", "world-bank-csa-profiles-2019"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Single-select item asking for the most important barrier preventing the household from using more climate-smart practices. Applies when fewer than 3 practices are selected in climate_adaptive_practices_used; high-adoption households need not be asked about barriers. Aligns with IPCC AR6 WGII Chapter 17 barriers-to-adaptation framework and World Bank CSA Country Profile barriers-to-CSA-adoption analysis.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta cu\u00e1l es la barrera m\u00e1s importante que impide al hogar usar m\u00e1s pr\u00e1cticas clim\u00e1ticamente inteligentes. Aplica cuando menos de 3 pr\u00e1cticas est\u00e1n seleccionadas en climate_adaptive_practices_used. Se alinea con el marco de barreras para la adaptaci\u00f3n del IPCC AR6 WGII Cap\u00edtulo 17.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant quel est l''obstacle le plus important emp\u00eachant le m\u00e9nage d''utiliser davantage de pratiques climato-intelligentes. S''applique lorsque moins de 3 pratiques sont s\u00e9lectionn\u00e9es dans climate_adaptive_practices_used. S''aligne sur le cadre des obstacles \u00e0 l''adaptation du GIEC AR6 WGII Chapitre 17.\n"}, "id": "climate_adaptive_practice_barrier", "label": {"en": "Most important barrier to adopting more climate-adaptive practices", "es": "Principal barrera para adoptar m\u00e1s pr\u00e1cticas de adaptaci\u00f3n clim\u00e1tica", "fr": "Principal obstacle \u00e0 l''adoption de davantage de pratiques climato-adaptatives"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "adaptive-practice-barrier"}'
      bibliography_refs: care-cvca-handbook-2019,ipcc-ar6-wg2-2022,oxfam-adaptation-toolkit-2019,world-bank-csa-profiles-2019
  climate_adaptive_practices_used:
    title:
      en: Climate-adaptive or climate-smart practices used in the past 12 months
      fr: Pratiques d'adaptation climatique ou climato-intelligentes utilisées au cours des 12 derniers mois
      es: Prácticas de adaptación climática o climáticamente inteligentes usadas en los últimos 12 meses
    description:
      en: 'Multi-select item asking which climate-smart or climate-adaptive practices the household has used in the past 12 months to adapt to changes in weather or climate. The primary climate-adaptive practice indicator for this profile. Boundary with AgricultureProfile: the items in this property are framed as climate-adaptation responses, not as routine agricultural extension questions. AgricultureProfile owns extension visit counts and general good-agricultural- practice adoption. This property owns the climate-specific practice adoption inventory (drought-resistant seeds, water harvesting, agroforestry, etc.). When both profiles are collected, the Form Author should coordinate to avoid double-asking; a note in the question ("practices you have started or changed specifically because of climate variability") helps differentiate.'
      fr: 'Item à sélection multiple demandant quelles pratiques climato-intelligentes ou d''adaptation climatique le ménage a utilisées au cours des 12 derniers mois pour s''adapter aux changements météorologiques ou climatiques. Indicateur principal des pratiques adaptatives climatiques de ce profil. Frontière avec AgricultureProfile : ce profil est propriétaire des inventaires de pratiques spécifiques à l''adaptation climatique ; AgricultureProfile est propriétaire des comptages de visites d''extension.'
      es: 'Ítem de selección múltiple que pregunta qué prácticas climáticamente inteligentes o de adaptación climática ha usado el hogar en los últimos 12 meses para adaptarse a los cambios en el tiempo o el clima. El indicador principal de prácticas adaptativas climáticas de este perfil. Límite con AgricultureProfile: este perfil es propietario de los inventarios de prácticas de adaptación climática; AgricultureProfile es propietario de los conteos de visitas de extensión.'
    slot_uri: aidops:climate_adaptive_practices_used
    range: AdaptivePracticeType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "fao-ex-act-2021", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "local-uncdf-2020", "unfccc-nap-me-2022", "world-bank-csa-profiles-2019"], "cardinality": "multiple", "category": "climate", "core": true, "definition": {"en": "Multi-select item asking which climate-smart or climate-adaptive practices the household has used in the past 12 months to adapt to changes in weather or climate. The primary climate-adaptive practice indicator for this profile. Boundary with AgricultureProfile: the items in this property are framed as climate-adaptation responses, not as routine agricultural extension questions. AgricultureProfile owns extension visit counts and general good-agricultural- practice adoption. This property owns the climate-specific practice adoption inventory (drought-resistant seeds, water harvesting, agroforestry, etc.). When both profiles are collected, the Form Author should coordinate to avoid double-asking; a note in the question (\"practices you have started or changed specifically because of climate variability\") helps differentiate.\n", "es": "\u00cdtem de selecci\u00f3n m\u00faltiple que pregunta qu\u00e9 pr\u00e1cticas clim\u00e1ticamente inteligentes o de adaptaci\u00f3n clim\u00e1tica ha usado el hogar en los \u00faltimos 12 meses para adaptarse a los cambios en el tiempo o el clima. El indicador principal de pr\u00e1cticas adaptativas clim\u00e1ticas de este perfil. L\u00edmite con AgricultureProfile: este perfil es propietario de los inventarios de pr\u00e1cticas de adaptaci\u00f3n clim\u00e1tica; AgricultureProfile es propietario de los conteos de visitas de extensi\u00f3n.\n", "fr": "Item \u00e0 s\u00e9lection multiple demandant quelles pratiques climato-intelligentes ou d''adaptation climatique le m\u00e9nage a utilis\u00e9es au cours des 12 derniers mois pour s''adapter aux changements m\u00e9t\u00e9orologiques ou climatiques. Indicateur principal des pratiques adaptatives climatiques de ce profil. Fronti\u00e8re avec AgricultureProfile : ce profil est propri\u00e9taire des inventaires de pratiques sp\u00e9cifiques \u00e0 l''adaptation climatique ; AgricultureProfile est propri\u00e9taire des comptages de visites d''extension.\n"}, "id": "climate_adaptive_practices_used", "label": {"en": "Climate-adaptive or climate-smart practices used in the past 12 months", "es": "Pr\u00e1cticas de adaptaci\u00f3n clim\u00e1tica o clim\u00e1ticamente inteligentes usadas en los \u00faltimos 12 meses", "fr": "Pratiques d''adaptation climatique ou climato-intelligentes utilis\u00e9es au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "adaptive-practice-type"}'
