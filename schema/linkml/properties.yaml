  aap_complaint_would_use_why_not:
    title:
      en: 'AAP: Reasons for not using a complaint channel'
      fr: 'Redevabilité : Raisons de ne pas utiliser un canal de plainte'
      es: 'Rendición de cuentas: Razones para no usar un canal de quejas'
    description:
      en: 'Main reason(s) the respondent would not use a complaint channel. Multi-select. Asked only when `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Classified as `sensitive` because the barrier codes `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, and `dont_trust_aid_providers` are PSEA- and safeguarding-adjacent proxy indicators: elevated rates should trigger a programmatic review of the PSEA framework. Source: IASC / REACH Menu 2018 and GTS ''Listening is Not Enough'' (2022).'
      fr: 'Principale(s) raison(s) pour lesquelles le répondant n''utiliserait pas un canal de plainte. Sélection multiple. Demandé uniquement si `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Classé comme `sensitive` car les codes d''obstacle `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` et `dont_trust_aid_providers` sont des indicateurs indirects liés à la PSEA et à la sauvegarde : des taux élevés devraient déclencher une révision programmatique du cadre de PSEA. Source : Menu IASC / REACH 2018 et « Listening is Not Enough » de GTS (2022).'
      es: 'Razón(es) principal(es) por las que el encuestado no utilizaría un canal de quejas. Selección múltiple. Se pregunta solo cuando `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Clasificado como `sensitive` porque los códigos de barrera `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` y `dont_trust_aid_providers` son indicadores indirectos relacionados con PSEA y salvaguardia: tasas elevadas deberían desencadenar una revisión programática del marco de PSEA. Fuente: Menú IASC / REACH 2018 y «Listening is Not Enough» de GTS (2022).'
    slot_uri: aidops:aap_complaint_would_use_why_not
    range: AapComplaintBarrier
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-caap-2017", "iasc-reach-aap-menu-2018"], "cardinality": "multiple", "category": "aap_feedback", "core": false, "definition": {"en": "Main reason(s) the respondent would not use a complaint channel. Multi-select. Asked only when `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Classified as `sensitive` because the barrier codes `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, and `dont_trust_aid_providers` are PSEA- and safeguarding-adjacent proxy indicators: elevated rates should trigger a programmatic review of the PSEA framework. Source: IASC / REACH Menu 2018 and GTS ''Listening is Not Enough'' (2022).", "es": "Raz\u00f3n(es) principal(es) por las que el encuestado no utilizar\u00eda un canal de quejas. Selecci\u00f3n m\u00faltiple. Se pregunta solo cuando `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Clasificado como `sensitive` porque los c\u00f3digos de barrera `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` y `dont_trust_aid_providers` son indicadores indirectos relacionados con PSEA y salvaguardia: tasas elevadas deber\u00edan desencadenar una revisi\u00f3n program\u00e1tica del marco de PSEA. Fuente: Men\u00fa IASC / REACH 2018 y \u00abListening is Not Enough\u00bb de GTS (2022).", "fr": "Principale(s) raison(s) pour lesquelles le r\u00e9pondant n''utiliserait pas un canal de plainte. S\u00e9lection multiple. Demand\u00e9 uniquement si `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Class\u00e9 comme `sensitive` car les codes d''obstacle `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` et `dont_trust_aid_providers` sont des indicateurs indirects li\u00e9s \u00e0 la PSEA et \u00e0 la sauvegarde : des taux \u00e9lev\u00e9s devraient d\u00e9clencher une r\u00e9vision programmatique du cadre de PSEA. Source : Menu IASC / REACH 2018 et \u00ab Listening is Not Enough \u00bb de GTS (2022)."}, "id": "aap_complaint_would_use_why_not", "label": {"en": "AAP: Reasons for not using a complaint channel", "es": "Rendici\u00f3n de cuentas: Razones para no usar un canal de quejas", "fr": "Redevabilit\u00e9 : Raisons de ne pas utiliser un canal de plainte"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "aap-complaint-barrier"}'
