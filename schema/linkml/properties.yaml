      es: 'Si el niño recibió la primera dosis de la vacuna pentavalente (DTP-HepB-Hib) o DTP a aproximadamente 6 semanas de edad. Redacción de recordatorio publicada: ''¿Alguna vez recibió (nombre) una inyección DPT — una inyección en el muslo o las nalgas — para prevenir el tétanos, la tos ferina y la difteria? (1.a dosis).'' Penta = DTP + hepatitis B + Hib combinado. El código DHS h3 registra DPT1; cuando Penta es la vacuna nacional, DPT1 captura la dosis Penta. Código DHS h3; código MICS IM4a.'
