  sti_symptoms_last_12_months:
    title:
      en: STI symptoms in the last 12 months
      fr: Symptômes d'IST au cours des 12 derniers mois
      es: Síntomas de ITS en los últimos 12 meses
    description:
      en: 'Whether the woman experienced any of the following symptoms in the last 12 months: unusual vaginal discharge, sores or ulcers on the genitals, pelvic pain (any one counts) (WHO reproductive health indicators). Optional block, requires separate consent. Symptom-based proxy for STI prevalence in field settings where clinical diagnosis is not possible. Used as a service need indicator, not a diagnostic tool.'
      fr: 'Si la femme a présenté l''un des symptômes suivants au cours des 12 derniers mois : pertes vaginales inhabituelles, plaies ou ulcères sur les organes génitaux, douleurs pelviennes (un seul suffit) (indicateurs OMS de santé reproductive). Bloc facultatif, nécessite un consentement distinct. Indicateur proxy symptomatologique pour la prévalence des IST dans les contextes de terrain où le diagnostic clinique est impossible. Utilisé comme indicateur de besoin de service, et non comme outil de diagnostic.'
      es: 'Si la mujer experimentó alguno de los siguientes síntomas en los últimos 12 meses: secreción vaginal inusual, llagas o úlceras en los genitales, dolor pélvico (cualquiera cuenta) (indicadores de salud reproductiva de la OMS). Bloque opcional, requiere consentimiento separado. Indicador proxy basado en síntomas para la prevalencia de ITS en entornos de campo donde el diagnóstico clínico no es posible. Se usa como indicador de necesidad de servicio, no como herramienta diagnóstica.'
    slot_uri: aidops:sti_symptoms_last_12_months
    range: YesNoPnta
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["who-rh-indicators-2006"], "cardinality": "single", "category": "sti_hiv", "core": false, "definition": {"en": "Whether the woman experienced any of the following symptoms in the last 12 months: unusual vaginal discharge, sores or ulcers on the genitals, pelvic pain (any one counts) (WHO reproductive health indicators). Optional block, requires separate consent. Symptom-based proxy for STI prevalence in field settings where clinical diagnosis is not possible. Used as a service need indicator, not a diagnostic tool.", "es": "Si la mujer experiment\u00f3 alguno de los siguientes s\u00edntomas en los \u00faltimos 12 meses: secreci\u00f3n vaginal inusual, llagas o \u00falceras en los genitales, dolor p\u00e9lvico (cualquiera cuenta) (indicadores de salud reproductiva de la OMS). Bloque opcional, requiere consentimiento separado. Indicador proxy basado en s\u00edntomas para la prevalencia de ITS en entornos de campo donde el diagn\u00f3stico cl\u00ednico no es posible. Se usa como indicador de necesidad de servicio, no como herramienta diagn\u00f3stica.", "fr": "Si la femme a pr\u00e9sent\u00e9 l''un des sympt\u00f4mes suivants au cours des 12 derniers mois : pertes vaginales inhabituelles, plaies ou ulc\u00e8res sur les organes g\u00e9nitaux, douleurs pelviennes (un seul suffit) (indicateurs OMS de sant\u00e9 reproductive). Bloc facultatif, n\u00e9cessite un consentement distinct. Indicateur proxy symptomatologique pour la pr\u00e9valence des IST dans les contextes de terrain o\u00f9 le diagnostic clinique est impossible. Utilis\u00e9 comme indicateur de besoin de service, et non comme outil de diagnostic."}, "id": "sti_symptoms_last_12_months", "label": {"en": "STI symptoms in the last 12 months", "es": "S\u00edntomas de ITS en los \u00faltimos 12 meses", "fr": "Sympt\u00f4mes d''IST au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-pnta"}'
