  hf_ipc_sterilization_functional:
    title:
      en: Functional sterilization method on-site
      fr: Méthode de stérilisation fonctionnelle sur site
      es: Método de esterilización funcional en el sitio
    description:
      en: Whether there is a functional sterilization method on-site, defined as an autoclave in working order or a properly functioning boiler / pressure cooker for instruments. Observed by the enumerator. Required for any facility performing procedures. WASH FIT 2nd edition; WHO IPC core components.
      fr: Si une méthode de stérilisation fonctionnelle est présente sur site, définie comme un autoclave en état de marche ou un stérilisateur à pression (ou cocotte-minute) fonctionnant correctement pour les instruments. Observé par l'enquêteur. Requis pour tout établissement pratiquant des actes. WASH FIT 2e édition ; composantes centrales de la PCI de l'OMS.
      es: Si existe un método de esterilización funcional en el sitio, definido como una autoclave en estado operativo o una olla a presión funcionando correctamente para instrumentos. Observado por el enumerador. Requerido para cualquier establecimiento que realice procedimientos. WASH FIT 2ª edición; componentes centrales de PCI de la OMS.
