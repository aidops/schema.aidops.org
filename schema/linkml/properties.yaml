      fr: Le z-score taille-pour-âge (HAZ) dérivé de la mesure brute de taille par rapport à la référence de croissance déclarée. Les valeurs inférieures à -2 indiquent un retard de croissance ; inférieures à -3 indiquent un retard sévère selon la norme OMS 2006.
      es: El puntaje z talla-para-edad (HAZ) derivado de la medición bruta de talla respecto a la referencia de crecimiento declarada. Valores inferiores a -2 indican retraso del crecimiento; inferiores a -3 indican retraso grave bajo el estándar OMS 2006.
