  crop_use_purpose:
    title:
      en: Crop use purpose (subsistence vs. market)
      fr: Usage des cultures (subsistance vs marché)
      es: Propósito del uso de cultivos (subsistencia vs. mercado)
    description:
      en: 'Household-level orientation of last season''s crop production: mostly for consumption, mixed consumption and sale, or mostly for sale, plus a `dont_know` option. Uses vocabulary `crop-use-purpose`. Captures the subsistence-vs-market dimension at household level without attempting to quantify market volumes, which are out of scope for this profile. Based on MICS6 AFP and the LSMS-ISA crop-disposition module. Asked only when `hh_grew_crops_last_season` is `yes`.'
      fr: 'Orientation au niveau du ménage de la production végétale de la saison dernière : principalement pour la consommation, mixte consommation et vente, ou principalement pour la vente, plus une option `dont_know`. Utilise le vocabulaire `crop-use-purpose`. Saisit la dimension subsistance vs marché au niveau du ménage sans chercher à quantifier les volumes commerciaux, qui sortent du cadre de ce profil. Basé sur le MICS6 AFP et le module de disposition des cultures du LSMS-ISA. Posée uniquement lorsque `hh_grew_crops_last_season` est `yes`.'
      es: 'Orientación a nivel del hogar de la producción de cultivos de la temporada pasada: principalmente para consumo, mixto consumo y venta, o principalmente para venta, más una opción `dont_know`. Usa el vocabulario `crop-use-purpose`. Captura la dimensión subsistencia vs mercado a nivel del hogar sin intentar cuantificar los volúmenes de mercado, que están fuera del alcance de este perfil. Basado en MICS6 AFP y en el módulo de disposición de cultivos de LSMS-ISA. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.'
