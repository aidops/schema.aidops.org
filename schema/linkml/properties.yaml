    range: YesNoPartialDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "smart-pastoral-adaptations-2015"], "cardinality": "single", "category": "pastoral_mobility", "core": true, "definition": {"en": "Whether the household''s planned seasonal migration routes were blocked, closed, contested, or otherwise inaccessible to its herd in the last 30 days. Response from vocabulary `yes-no-partial-dk` (yes / no / partially / dont_know). A `yes` or `partially` response triggers the companion item `migration_route_disruption_cause`. Route disruption is a LEGS and IPC pastoral annex indicator: restricted mobility is one of the IPC criteria for destitution-phase classification in pastoral livelihood zones. The binary-or-partial flag at livelihood-zone level is low sensitivity; at household level combined with GPS coordinates it could imply which routes were taken or avoided by a specific household. Share only at zone-level aggregation in external data products; retain household-level for internal programme analysis. Grounded in LEGS 3rd edition, IPC AFI pastoral annex (restricted mobility as IPC destitution criterion), FSNAU route-disruption items, and FEWSNET conflict-migration nexus monitoring. Recall: last 30 days.", "es": "Si las rutas de migraci\u00f3n estacional planificadas del hogar estuvieron bloqueadas, cerradas, en disputa o de otro modo inaccesibles para su reba\u00f1o en los \u00faltimos 30 d\u00edas. Respuesta del vocabulario `yes-no-partial-dk`. Una respuesta `yes` o `partially` activa el \u00edtem asociado `migration_route_disruption_cause`. El indicador binario o parcial a nivel de zona de medios de vida es de baja sensibilidad; a nivel del hogar combinado con coordenadas GPS podr\u00eda indicar qu\u00e9 rutas fueron tomadas o evitadas. Fundamentado en LEGS 3.a ed., el anexo pastoralista IPC AFI, \u00edtems FSNAU y el monitoreo FEWSNET. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "Si les routes de migration saisonni\u00e8re pr\u00e9vues du m\u00e9nage ont \u00e9t\u00e9 bloqu\u00e9es, ferm\u00e9es, contest\u00e9es ou autrement inaccessibles pour son troupeau au cours des 30 derniers jours. R\u00e9ponse dans le vocabulaire `yes-no-partial-dk`. Une r\u00e9ponse `yes` ou `partially` d\u00e9clenche l''item associ\u00e9 `migration_route_disruption_cause`. Le marqueur binaire ou partiel au niveau de la zone de moyens d''existence est peu sensible ; au niveau du m\u00e9nage combin\u00e9 avec des coordonn\u00e9es GPS, il pourrait indiquer les routes emprunt\u00e9es ou \u00e9vit\u00e9es. Fond\u00e9 sur LEGS 3e \u00e9d., l''annexe pastoraliste IPC AFI, les items FSNAU et le suivi FEWSNET. Rappel : 30 derniers jours."}, "id": "migration_routes_disrupted", "label": {"en": "Seasonal migration routes blocked or disrupted \u2014 last 30 days", "es": "Rutas de migraci\u00f3n estacional bloqueadas o interrumpidas \u2014 \u00faltimos 30 d\u00edas", "fr": "Routes de migration saisonni\u00e8re bloqu\u00e9es ou perturb\u00e9es \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-partial-dk"}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,smart-pastoral-adaptations-2015
  milk_consumption_frequency:
    title:
      en: Days household consumed own-animal milk or dairy products — last 7 days
      fr: Jours où le ménage a consommé du lait ou des produits laitiers de ses propres animaux — 7 derniers jours
      es: Días que el hogar consumió leche o productos lácteos de sus propios animales — últimos 7 días
    description:
      en: 'Number of days in the last 7 days on which the household consumed fresh milk, fermented milk (including soured milk or yogurt), or other milk products from its own animals. Integer 0–7. This is a pastoral-specific diet quality indicator that is structurally distinct from the FoodSecurityProfile `hdds_milk_dairy_consumed` item: HDDS captures a 24-hour recall binary (whether any dairy was consumed, from any source); this item captures frequency of own-animal production consumption over 7 days. The two items are complementary, not redundant. In pastoral households with camels, this item functions as a proxy for camel milk availability which is the primary food source for many Horn of Africa households (Somalia, northern Kenya). Grounded in FSNAU dietary diversity module — milk consumption frequency (adapted), LEGS 3rd edition (milk consumption as food security indicator), and IPC AFI pastoral annex (milk availability as dietary indicator). Recall: last 7 days.'
      fr: 'Nombre de jours au cours des 7 derniers jours où le ménage a consommé du lait frais, du lait fermenté (y compris du lait aigre ou du yaourt) ou d''autres produits laitiers de ses propres animaux. Entier 0–7. Il s''agit d''un indicateur de qualité alimentaire propre au contexte pastoral, structurellement distinct de `hdds_milk_dairy_consumed` du FoodSecurityProfile : HDDS capture un binaire de rappel de 24 heures (si des produits laitiers ont été consommés, quelle que soit la source) ; cet item capture la fréquence de consommation de lait de propres animaux sur 7 jours. Fondé sur le module de diversité alimentaire FSNAU — fréquence de consommation de lait (adapté), LEGS 3e éd. et l''annexe pastoraliste IPC AFI. Rappel : 7 derniers jours.'
      es: 'Número de días en los últimos 7 días en los que el hogar consumió leche fresca, leche fermentada (incluida leche agria o yogur) u otros productos lácteos de sus propios animales. Entero 0–7. Es un indicador de calidad dietética específico del contexto pastoral, estructuralmente distinto del ítem `hdds_milk_dairy_consumed` de FoodSecurityProfile: HDDS captura un binario de recordatorio de 24 horas (si se consumió algún lácteo, de cualquier fuente); este ítem captura la frecuencia de consumo de leche de animales propios durante 7 días. Ambos son complementarios, no redundantes. Recordatorio: últimos 7 días.'
