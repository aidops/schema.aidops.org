      es: 'Derivado: alguna vez experimentó cualquier VPI (física, sexual o emocional), de por vida'
    description:
      en: 'Derived boolean indicator: true if the respondent ever experienced any form of IPV (physical, sexual, or emotional) by the referent partner across her lifetime. Formula: TRUE if gbv_ipv_physical_lifetime_ever OR gbv_ipv_sexual_lifetime_ever OR gbv_ipv_emotional_lifetime_ever = true. This is the lifetime superset; the 12-month version (gbv_ipv_any_12m_ever) maps more directly to SDG 5.2.1 (which covers physical and/or sexual IPV in the past 12 months; emotional IPV is captured here for analytical completeness but is excluded from the SDG 5.2.1 numerator). Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.'
      fr: 'Indicateur booléen dérivé : vrai si la répondante a jamais subi toute forme de VPI (physique, sexuelle ou émotionnelle) à vie. Formule : VRAI si gbv_ipv_physical_lifetime_ever OU gbv_ipv_sexual_lifetime_ever OU gbv_ipv_emotional_lifetime_ever = vrai. Surensemble à vie; la version 12 mois est plus proche de l''ODD 5.2.1. Dérivé, non posé.'
      es: 'Indicador booleano derivado: verdadero si la encuestada alguna vez experimentó cualquier forma de VPI de por vida. Fórmula: VERDADERO si gbv_ipv_physical_lifetime_ever O gbv_ipv_sexual_lifetime_ever O gbv_ipv_emotional_lifetime_ever = verdadero. Superconjunto de por vida; la versión de 12 meses es más cercana al ODS 5.2.1. Derivado, no preguntado.'
