  iycf_mad:
    title:
      en: Minimum Acceptable Diet (MAD) achieved
      fr: Alimentation minimale acceptable (MAD) atteinte
      es: Dieta Mínima Aceptable (MAD) alcanzada
    description:
      en: 'Derived boolean: whether the child achieved the Minimum Acceptable Diet (MAD) in the previous 24 hours. Applies to children 6–23 months. Formula (WHO/UNICEF 2021): breastfed children: iycf_mdd_c = true AND iycf_mmf = true; non-breastfed children: iycf_mdd_c = true AND iycf_mmf = true AND iycf_mmff = true. MAD is a composite proxy for diet quality.'
      fr: 'Booléen dérivé : indique si l''enfant a atteint l''alimentation minimale acceptable (MAD) au cours des 24 heures précédentes. S''applique aux enfants de 6 à 23 mois. Formule (OMS/UNICEF 2021) : enfants allaités : iycf_mdd_c = vrai ET iycf_mmf = vrai ; enfants non allaités : iycf_mdd_c = vrai ET iycf_mmf = vrai ET iycf_mmff = vrai. Le MAD est un indicateur composite de la qualité de l''alimentation.'
      es: 'Booleano derivado: indica si el niño alcanzó la Dieta Mínima Aceptable (MAD) en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Fórmula (OMS/UNICEF 2021): niños amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero; niños no amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero Y iycf_mmff = verdadero. El MAD es un indicador compuesto de la calidad de la dieta.'
    slot_uri: aidops:iycf_mad
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived boolean: whether the child achieved the Minimum Acceptable Diet (MAD) in the previous 24 hours. Applies to children 6\u201323 months. Formula (WHO/UNICEF 2021): breastfed children: iycf_mdd_c = true AND iycf_mmf = true; non-breastfed children: iycf_mdd_c = true AND iycf_mmf = true AND iycf_mmff = true. MAD is a composite proxy for diet quality.", "es": "Booleano derivado: indica si el ni\u00f1o alcanz\u00f3 la Dieta M\u00ednima Aceptable (MAD) en las 24 horas anteriores. Se aplica a ni\u00f1os de 6\u201323 meses. F\u00f3rmula (OMS/UNICEF 2021): ni\u00f1os amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero; ni\u00f1os no amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero Y iycf_mmff = verdadero. El MAD es un indicador compuesto de la calidad de la dieta.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 : indique si l''enfant a atteint l''alimentation minimale acceptable (MAD) au cours des 24 heures pr\u00e9c\u00e9dentes. S''applique aux enfants de 6 \u00e0 23 mois. Formule (OMS/UNICEF 2021) : enfants allait\u00e9s : iycf_mdd_c = vrai ET iycf_mmf = vrai ; enfants non allait\u00e9s : iycf_mdd_c = vrai ET iycf_mmf = vrai ET iycf_mmff = vrai. Le MAD est un indicateur composite de la qualit\u00e9 de l''alimentation."}, "id": "iycf_mad", "label": {"en": "Minimum Acceptable Diet (MAD) achieved", "es": "Dieta M\u00ednima Aceptable (MAD) alcanzada", "fr": "Alimentation minimale acceptable (MAD) atteinte"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
      bibliography_refs: who-iycf-2021
  iycf_mdd_c:
    title:
      en: Minimum Dietary Diversity for Children (MDD-C) achieved
      fr: Diversité alimentaire minimale pour les enfants (MDD-C) atteinte
      es: Diversidad Dietética Mínima para Niños (MDD-C) alcanzada
    description:
      en: 'Derived boolean: whether the child achieved Minimum Dietary Diversity for Children (MDD-C) in the previous 24 hours. Applies to children 6–23 months. Formula: iycf_mdd_c_score >= 5 (foods from at least 5 of the 8 food groups consumed). MDD-C revised in WHO/UNICEF 2021 to use 8 food groups (with breastmilk as group 1) and a threshold of 5/8, replacing the previous 4/7 threshold.'
      fr: 'Booléen dérivé : indique si l''enfant a atteint la diversité alimentaire minimale pour les enfants (MDD-C) au cours des 24 heures précédentes. S''applique aux enfants de 6 à 23 mois. Formule : iycf_mdd_c_score >= 5 (aliments d''au moins 5 des 8 groupes alimentaires consommés). Le MDD-C a été révisé dans la mise à jour OMS/UNICEF 2021 pour utiliser 8 groupes alimentaires (avec le lait maternel comme groupe 1) et un seuil de 5/8, remplaçant l''ancien seuil de 4/7.'
      es: 'Booleano derivado: indica si el niño logró la Diversidad Dietética Mínima para Niños (MDD-C) en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Fórmula: iycf_mdd_c_score >= 5 (alimentos de al menos 5 de los 8 grupos alimentarios consumidos). El MDD-C fue revisado en la actualización OMS/UNICEF 2021 para usar 8 grupos alimentarios (con leche materna como grupo 1) y un umbral de 5/8, reemplazando el umbral anterior de 4/7.'
