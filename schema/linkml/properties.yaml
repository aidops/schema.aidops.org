      es: Monto aproximado que el hogar paga por mes por su principal fuente de agua potable, en unidades de moneda local. Preguntado solo cuando water_payment es verdadero. La unidad monetaria debe registrarse en las notas de la evaluación. Usado para el análisis de asequibilidad y costo del servicio.
