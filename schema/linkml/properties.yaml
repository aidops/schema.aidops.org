  oop_health_expenditure_12mo:
    title:
      en: Total out-of-pocket health expenditure in the last 12 months
      fr: Dépenses de santé totales à la charge du ménage au cours des 12 derniers mois
      es: Gasto total de bolsillo en salud en los últimos 12 meses
    description:
      en: Total amount the household paid out of pocket for health care over the last 12 months, in local currency. Includes consultations, medicines, hospital fees, and health-related transport, but excludes insurance premiums. Aligns with the SDG 3.8.2 out-of-pocket health expenditure indicator construction and the DHS AS59 out-of-pocket health spending question. Upstream of ScoringEvent-level catastrophic-expenditure derivations, which are not computed here.
      fr: Montant total payé par le ménage de sa poche pour les soins de santé au cours des 12 derniers mois, en monnaie locale. Comprend les consultations, les médicaments, les frais hospitaliers et le transport lié à la santé, mais exclut les primes d'assurance. S'aligne sur la construction de l'indicateur de dépenses de santé à la charge du ménage de la SDG 3.8.2 et sur la question AS59 du DHS sur les dépenses de santé de la poche. En amont des dérivations de dépenses catastrophiques au niveau de ScoringEvent, qui ne sont pas calculées ici.
      es: Monto total que el hogar pagó de su bolsillo por atención de salud en los últimos 12 meses, en moneda local. Incluye consultas, medicamentos, honorarios hospitalarios y transporte relacionado con salud, pero excluye primas de seguro. Se alinea con la construcción del indicador de gasto de bolsillo en salud del ODS 3.8.2 y con la pregunta AS59 del DHS sobre gasto de bolsillo en salud. Insumo para las derivaciones de gasto catastrófico a nivel de ScoringEvent, que no se calculan aquí.
    slot_uri: aidops:oop_health_expenditure_12mo
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-oop-expenditure-as59", "sdg-3-8-2-metadata"], "cardinality": "single", "category": "health_access_oop", "core": true, "definition": {"en": "Total amount the household paid out of pocket for health care over the last 12 months, in local currency. Includes consultations, medicines, hospital fees, and health-related transport, but excludes insurance premiums. Aligns with the SDG 3.8.2 out-of-pocket health expenditure indicator construction and the DHS AS59 out-of-pocket health spending question. Upstream of ScoringEvent-level catastrophic-expenditure derivations, which are not computed here.", "es": "Monto total que el hogar pag\u00f3 de su bolsillo por atenci\u00f3n de salud en los \u00faltimos 12 meses, en moneda local. Incluye consultas, medicamentos, honorarios hospitalarios y transporte relacionado con salud, pero excluye primas de seguro. Se alinea con la construcci\u00f3n del indicador de gasto de bolsillo en salud del ODS 3.8.2 y con la pregunta AS59 del DHS sobre gasto de bolsillo en salud. Insumo para las derivaciones de gasto catastr\u00f3fico a nivel de ScoringEvent, que no se calculan aqu\u00ed.", "fr": "Montant total pay\u00e9 par le m\u00e9nage de sa poche pour les soins de sant\u00e9 au cours des 12 derniers mois, en monnaie locale. Comprend les consultations, les m\u00e9dicaments, les frais hospitaliers et le transport li\u00e9 \u00e0 la sant\u00e9, mais exclut les primes d''assurance. S''aligne sur la construction de l''indicateur de d\u00e9penses de sant\u00e9 \u00e0 la charge du m\u00e9nage de la SDG 3.8.2 et sur la question AS59 du DHS sur les d\u00e9penses de sant\u00e9 de la poche. En amont des d\u00e9rivations de d\u00e9penses catastrophiques au niveau de ScoringEvent, qui ne sont pas calcul\u00e9es ici."}, "id": "oop_health_expenditure_12mo", "label": {"en": "Total out-of-pocket health expenditure in the last 12 months", "es": "Gasto total de bolsillo en salud en los \u00faltimos 12 meses", "fr": "D\u00e9penses de sant\u00e9 totales \u00e0 la charge du m\u00e9nage au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
