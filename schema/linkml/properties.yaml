  gbv_helpseeking_barriers:
    title:
      en: 'Help-seeking: barriers to seeking help after partner violence'
      fr: 'Recherche d''aide : obstacles à la recherche d''aide après violences conjugales'
      es: 'Búsqueda de ayuda: barreras para buscar ayuda tras violencia de pareja'
    description:
      en: 'Reasons the respondent did not seek help after experiencing partner violence. Multi-select; record all mentioned. Skip logic: asked only if gbv_helpseeking_attempted = false. Based on DHS country questionnaire barrier batteries and WHO Multi-Country Study (Garcia-Moreno et al., 2005). Understanding barriers is essential for programme design and referral pathway strengthening. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
