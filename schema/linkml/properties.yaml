)."}, "id": "hlp_discrimination", "label": {"en": "HLP discrimination (household)", "es": "Discriminaci\u00f3n VTP (hogar)", "fr": "Discrimination LTP (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "yes-no-pnta"}'
