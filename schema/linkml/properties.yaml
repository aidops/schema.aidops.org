EFSA du PAM."}, "id": "crop_loss_occurred", "label": {"en": "Crop loss occurred (derived)", "es": "P\u00e9rdida de cultivos ocurrida (derivado)", "fr": "Perte de r\u00e9colte survenue (d\u00e9riv\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
