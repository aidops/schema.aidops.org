  climate_safety_net_access:
    title:
      en: Household is covered by a climate-responsive social protection programme
      fr: Le ménage est couvert par un programme de protection sociale sensible au climat
      es: El hogar está cubierto por un programa de protección social sensible al clima
    description:
      en: 'Binary item asking whether the household is currently covered by any government or NGO programme that specifically provides support when climate hazards like drought or flood affect their area (for example, Ethiopia''s Productive Safety Net Programme triggered by drought, or Kenya Hunger Safety Net Programme). RIMA-II overlap: LivelihoodProfile.humanitarian_assistance_reliance asks about humanitarian assistance broadly. This property is narrower: it asks specifically about climate-responsive social protection. When LivelihoodProfile is collected in the same survey, the Form Author should consider a branch from humanitarian_assistance_reliance = yes to filter whether any of those programmes are climate-triggered rather than re-asking the baseline.'
      fr: 'Item binaire demandant si le ménage est actuellement couvert par un programme gouvernemental ou d''une ONG qui fournit spécifiquement un soutien lorsque des aléas climatiques tels que la sécheresse ou les inondations affectent sa région. Chevauchement RIMA-II : LivelihoodProfile.humanitarian_assistance_reliance couvre l''assistance humanitaire de manière générale ; cette propriété est plus étroite et spécifique aux programmes sensibles au climat.'
      es: 'Ítem binario que pregunta si el hogar está cubierto actualmente por algún programa gubernamental o de ONG que proporcione específicamente apoyo cuando peligros climáticos como sequías o inundaciones afectan su área. Superposición con RIMA-II: LivelihoodProfile.humanitarian_assistance_reliance cubre la asistencia humanitaria en general; esta propiedad es más estrecha y específica de programas sensibles al clima.'
    slot_uri: aidops:climate_safety_net_access
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "fao-rima-2016", "gcf-results-framework-2022", "ipcc-ar6-wg2-2022", "unfccc-nap-me-2022"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Binary item asking whether the household is currently covered by any government or NGO programme that specifically provides support when climate hazards like drought or flood affect their area (for example, Ethiopia''s Productive Safety Net Programme triggered by drought, or Kenya Hunger Safety Net Programme). RIMA-II overlap: LivelihoodProfile.humanitarian_assistance_reliance asks about humanitarian assistance broadly. This property is narrower: it asks specifically about climate-responsive social protection. When LivelihoodProfile is collected in the same survey, the Form Author should consider a branch from humanitarian_assistance_reliance = yes to filter whether any of those programmes are climate-triggered rather than re-asking the baseline.\n", "es": "\u00cdtem binario que pregunta si el hogar est\u00e1 cubierto actualmente por alg\u00fan programa gubernamental o de ONG que proporcione espec\u00edficamente apoyo cuando peligros clim\u00e1ticos como sequ\u00edas o inundaciones afectan su \u00e1rea. Superposici\u00f3n con RIMA-II: LivelihoodProfile.humanitarian_assistance_reliance cubre la asistencia humanitaria en general; esta propiedad es m\u00e1s estrecha y espec\u00edfica de programas sensibles al clima.\n", "fr": "Item binaire demandant si le m\u00e9nage est actuellement couvert par un programme gouvernemental ou d''une ONG qui fournit sp\u00e9cifiquement un soutien lorsque des al\u00e9as climatiques tels que la s\u00e9cheresse ou les inondations affectent sa r\u00e9gion. Chevauchement RIMA-II : LivelihoodProfile.humanitarian_assistance_reliance couvre l''assistance humanitaire de mani\u00e8re g\u00e9n\u00e9rale ; cette propri\u00e9t\u00e9 est plus \u00e9troite et sp\u00e9cifique aux programmes sensibles au climat.\n"}, "id": "climate_safety_net_access", "label": {"en": "Household is covered by a climate-responsive social protection programme", "es": "El hogar est\u00e1 cubierto por un programa de protecci\u00f3n social sensible al clima", "fr": "Le m\u00e9nage est couvert par un programme de protection sociale sensible au climat"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
