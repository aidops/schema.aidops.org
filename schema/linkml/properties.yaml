  eo_contamination_known:
    title:
      en: Explosive ordnance contamination known (household area)
      fr: Contamination par engins explosifs connue (zone du ménage)
      es: Contaminación por artefactos explosivos conocida (zona del hogar)
    description:
      en: Whether the household is aware of any explosive hazards — such as landmines, unexploded bombs, cluster munitions, or IEDs — in the areas where they live, farm, or travel. JIAF 2.0 Protection Indicator P3; primary indicator in mine-affected country HNOs. Applicable in all conflict and post-conflict settings; in settings with no known EO contamination, this item will return no universally and a module selector can suppress it. Based on IMAS EORE Guidance (2022); UNMAS EORE household survey tools; GICHD Mine Action Assessment Toolkit household module.
      fr: Si le ménage est au courant de la présence de risques explosifs — tels que des mines terrestres, des bombes non explosées, des sous-munitions ou des engins explosifs improvisés — dans les zones où il vit, travaille ou se déplace. Indicateur de protection JIAF 2.0 P3 ; indicateur primaire dans les HNO des pays touchés par les mines. Applicable dans tous les contextes de conflit et post-conflit ; dans les contextes sans contamination EE connue, cet item retournera universellement non et un sélecteur de module peut le supprimer. Fondé sur les Directives EORE IMAS (2022) ; outils d'enquête ménage EORE UNMAS ; module ménage de la Boîte à outils d'évaluation des actions contre les mines GICHD.
      es: Si el hogar está al tanto de la existencia de peligros explosivos — como minas terrestres, bombas sin explotar, municiones en racimo o IEDs — en las zonas donde vive, cultiva o viaja. Indicador de Protección JIAF 2.0 P3; indicador primario en los HNO de países afectados por minas. Aplicable en todos los contextos de conflicto y posconflicto; en contextos sin contaminación por AE conocida, este ítem devolverá no universalmente y un selector de módulo puede suprimirlo. Basado en la Guía EORE IMAS (2022); herramientas de encuesta de hogares EORE del UNMAS; módulo de hogares del Kit de Herramientas de Evaluación de Acción contra Minas del GICHD.
    slot_uri: aidops:eo_contamination_known
    range: YesNoDk
    annotations:
