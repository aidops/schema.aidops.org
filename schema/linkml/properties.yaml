  mk_transport_cost_change:
    title:
      en: Transport cost change vs. pre-crisis
      fr: Évolution des coûts de transport par rapport à avant la crise
      es: Cambio en costos de transporte vs. antes de la crisis
    description:
      en: 'Whether transport costs for goods arriving at this market have increased, stayed the same, or decreased compared to before the current crisis, as reported by key vendor informants. A leading indicator of future price inflation: higher transport costs typically pass through to consumer prices within 1–4 weeks.'
      fr: 'Si les coûts de transport des marchandises arrivant sur ce marché ont augmenté, sont restés stables ou ont diminué par rapport à avant la crise actuelle, tel que rapporté par les informateurs clés vendeurs. Indicateur avancé de l''inflation future des prix : des coûts de transport plus élevés se répercutent généralement sur les prix à la consommation dans un délai de 1 à 4 semaines.'
      es: 'Si los costos de transporte de los bienes que llegan a este mercado han aumentado, se han mantenido iguales o han disminuido en comparación con antes de la crisis actual, según lo reportado por informantes clave vendedores. Indicador adelantado de la inflación futura de precios: los costos de transporte más altos típicamente se trasladan a los precios al consumidor dentro de 1 a 4 semanas.'
    slot_uri: aidops:mk_transport_cost_change
    range: ChangeDirection3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "emma-toolkit-v2-2017", "wfp-mag-2021"], "cardinality": "single", "category": "market_supply_chain", "core": false, "definition": {"en": "Whether transport costs for goods arriving at this market have increased, stayed the same, or decreased compared to before the current crisis, as reported by key vendor informants. A leading indicator of future price inflation: higher transport costs typically pass through to consumer prices within 1\u20134 weeks.", "es": "Si los costos de transporte de los bienes que llegan a este mercado han aumentado, se han mantenido iguales o han disminuido en comparaci\u00f3n con antes de la crisis actual, seg\u00fan lo reportado por informantes clave vendedores. Indicador adelantado de la inflaci\u00f3n futura de precios: los costos de transporte m\u00e1s altos t\u00edpicamente se trasladan a los precios al consumidor dentro de 1 a 4 semanas.", "fr": "Si les co\u00fbts de transport des marchandises arrivant sur ce march\u00e9 ont augment\u00e9, sont rest\u00e9s stables ou ont diminu\u00e9 par rapport \u00e0 avant la crise actuelle, tel que rapport\u00e9 par les informateurs cl\u00e9s vendeurs. Indicateur avanc\u00e9 de l''inflation future des prix : des co\u00fbts de transport plus \u00e9lev\u00e9s se r\u00e9percutent g\u00e9n\u00e9ralement sur les prix \u00e0 la consommation dans un d\u00e9lai de 1 \u00e0 4 semaines."}, "id": "mk_transport_cost_change", "label": {"en": "Transport cost change vs. pre-crisis", "es": "Cambio en costos de transporte vs. antes de la crisis", "fr": "\u00c9volution des co\u00fbts de transport par rapport \u00e0 avant la crise"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "change-direction-3"}'
