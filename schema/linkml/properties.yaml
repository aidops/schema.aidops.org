  hlp_property_dispute:
    title:
      en: Housing, land or property dispute (household)
      fr: Litige de logement, terres ou propriété (ménage)
      es: Disputa de vivienda, tierra o propiedad (hogar)
    description:
      en: 'Whether the household has a dispute or unresolved conflict over housing, land, or property — for example, someone else is occupying their property, or someone is claiming their land or house. This is the dispute/restitution/discrimination dimension of HLP, distinct from tenure document type (ShelterAdequacyProfile.tenure_document_type) and eviction risk (ShelterAdequacyProfile.eviction_risk_6mo). JIAF 2.0 Protection Indicator P4; GPC PAF Domain 3. Skip logic: if no or don''t know, skip hlp_dispute_type.'
      fr: 'Si le ménage a un litige ou un conflit non résolu concernant le logement, les terres ou les biens — par exemple, quelqu''un d''autre occupe sa propriété, ou quelqu''un revendique son terrain ou sa maison. Il s''agit de la dimension litige/restitution/discrimination des LTP, distincte du type de document de tenure (ShelterAdequacyProfile.tenure_document_type) et du risque d''expulsion (ShelterAdequacyProfile.eviction_risk_6mo). Indicateur de protection JIAF 2.0 P4 ; GPC PAF Domaine 3. Logique de saut : si non ou ne sait pas, passer hlp_dispute_type.'
      es: 'Si el hogar tiene una disputa o conflicto no resuelto sobre vivienda, tierra o propiedad — por ejemplo, alguien más ocupa su propiedad, o alguien reclama su terreno o casa. Esta es la dimensión de disputa/restitución/discriminación de VTP, distinta del tipo de documento de tenencia (ShelterAdequacyProfile.tenure_document_type) y el riesgo de desalojo (ShelterAdequacyProfile.eviction_risk_6mo). Indicador de Protección JIAF 2.0 P4; GPC PAF Dominio 3. Lógica de salto: si no o no sabe, omitir hlp_dispute_type.'
    slot_uri: aidops:hlp_property_dispute
