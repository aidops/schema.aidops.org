      es: 'Indica si el niño comió algún alimento cárnico en las 24 horas anteriores. Grupo alimentario 5 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Ejemplos de alimentos: pollo, carne de res, cerdo, vísceras (hígado, riñón), pescado, mariscos y otros alimentos cárnicos.'
