  training_received_past_12mo:
    title:
      en: Household received formal agricultural training in the last 12 months
      fr: Le ménage a reçu une formation agricole formelle au cours des 12 derniers mois
      es: El hogar recibió capacitación agrícola formal en los últimos 12 meses
    description:
      en: Whether any household member received a formal training, demonstration, or workshop on agricultural practices — including soil management, crop production, livestock care, or post-harvest handling — during the past 12 months. Drawn from the LSMS-ISA extension/training module and FAO WCA 2020 Theme 06 (use of agricultural advisory services). Distinct from `extension_visit_past_12mo` which captures individual advisory contact. `dont_know` is retained as a distinct valid response. Asked when `hh_has_cultivable_land` is `yes` or `hh_owns_livestock` is `yes`.
      fr: Si un membre du ménage a reçu une formation formelle, une démonstration ou un atelier sur les pratiques agricoles — y compris la gestion des sols, la production végétale, les soins aux animaux ou la manutention post-récolte — au cours des 12 derniers mois. Tiré du module vulgarisation/formation du LSMS-ISA et du Thème 06 du WCA 2020 de la FAO (utilisation de services consultatifs agricoles). Distinct de `extension_visit_past_12mo` qui saisit le contact consultatif individuel. `dont_know` est conservé comme réponse valide distincte. Posée lorsque `hh_has_cultivable_land` est `yes` ou `hh_owns_livestock` est `yes`.
      es: Si algún miembro del hogar recibió una capacitación formal, demostración o taller sobre prácticas agrícolas — incluyendo manejo del suelo, producción de cultivos, cuidado del ganado o manejo poscosecha — durante los últimos 12 meses. Tomado del módulo extensión/capacitación de LSMS-ISA y del Tema 06 del WCA 2020 de la FAO (uso de servicios de asesoramiento agrícola). Distinto de `extension_visit_past_12mo` que captura el contacto asesor individual. `dont_know` se mantiene como respuesta válida distinta. Se pregunta cuando `hh_has_cultivable_land` es `yes` o `hh_owns_livestock` es `yes`.
    slot_uri: aidops:training_received_past_12mo
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether any household member received a formal training, demonstration, or workshop on agricultural practices \u2014 including soil management, crop production, livestock care, or post-harvest handling \u2014 during the past 12 months. Drawn from the LSMS-ISA extension/training module and FAO WCA 2020 Theme 06 (use of agricultural advisory services). Distinct from `extension_visit_past_12mo` which captures individual advisory contact. `dont_know` is retained as a distinct valid response. Asked when `hh_has_cultivable_land` is `yes` or `hh_owns_livestock` is `yes`.", "es": "Si alg\u00fan miembro del hogar recibi\u00f3 una capacitaci\u00f3n formal, demostraci\u00f3n o taller sobre pr\u00e1cticas agr\u00edcolas \u2014 incluyendo manejo del suelo, producci\u00f3n de cultivos, cuidado del ganado o manejo poscosecha \u2014 durante los \u00faltimos 12 meses. Tomado del m\u00f3dulo extensi\u00f3n/capacitaci\u00f3n de LSMS-ISA y del Tema 06 del WCA 2020 de la FAO (uso de servicios de asesoramiento agr\u00edcola). Distinto de `extension_visit_past_12mo` que captura el contacto asesor individual. `dont_know` se mantiene como respuesta v\u00e1lida distinta. Se pregunta cuando `hh_has_cultivable_land` es `yes` o `hh_owns_livestock` es `yes`.", "fr": "Si un membre du m\u00e9nage a re\u00e7u une formation formelle, une d\u00e9monstration ou un atelier sur les pratiques agricoles \u2014 y compris la gestion des sols, la production v\u00e9g\u00e9tale, les soins aux animaux ou la manutention post-r\u00e9colte \u2014 au cours des 12 derniers mois. Tir\u00e9 du module vulgarisation/formation du LSMS-ISA et du Th\u00e8me 06 du WCA 2020 de la FAO (utilisation de services consultatifs agricoles). Distinct de `extension_visit_past_12mo` qui saisit le contact consultatif individuel. `dont_know` est conserv\u00e9 comme r\u00e9ponse valide distincte. Pos\u00e9e lorsque `hh_has_cultivable_land` est `yes` ou `hh_owns_livestock` est `yes`."}, "id": "training_received_past_12mo", "label": {"en": "Household received formal agricultural training in the last 12 months", "es": "El hogar recibi\u00f3 capacitaci\u00f3n agr\u00edcola formal en los \u00faltimos 12 meses", "fr": "Le m\u00e9nage a re\u00e7u une formation agricole formelle au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
