  cn_severity_vs_baseline:
    title:
      en: Severity compared with pre-crisis baseline
      fr: Sévérité comparée à la situation avant la crise
      es: Severidad comparada con la línea base previa a la crisis
    description:
      en: Community-reported comparison of current overall conditions with those of the community before the crisis. Encoded on the baseline-comparison vocabulary (much better, slightly better, same, slightly worse, much worse, don't know). The pre-crisis reference point is community-defined. Derived from JIAF 2.0 §4 (severity scoring by comparison with a pre-crisis or reference state) and ACAPS severity-and-coping analysis guidance.
      fr: Comparaison rapportée par la communauté entre les conditions globales actuelles et celles de la communauté avant la crise. Codée sur la taxonomie baseline-comparison (bien mieux, légèrement mieux, identique, légèrement pire, bien pire, ne sait pas). Le point de référence antérieur à la crise est défini par la communauté. Tiré du JIAF 2.0 § 4 (notation de la sévérité par comparaison avec un état antérieur ou de référence) et du guide d'analyse de sévérité et d'adaptation d'ACAPS.
      es: Comparación reportada por la comunidad entre las condiciones generales actuales y las de la comunidad antes de la crisis. Codificada en la taxonomía baseline-comparison (mucho mejor, ligeramente mejor, igual, ligeramente peor, mucho peor, no sabe). El punto de referencia previo a la crisis lo define la comunidad. Derivado del JIAF 2.0 § 4 (puntuación de severidad por comparación con un estado previo o de referencia) y la guía de análisis de severidad y afrontamiento de ACAPS.
