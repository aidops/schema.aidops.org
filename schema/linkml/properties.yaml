  vaccination_card_exists:
    title:
      en: Vaccination card exists
      fr: Carnet de vaccination existant
      es: Carnet de vacunación existente
    description:
      en: 'Whether the child has a home-based vaccination card, health card, or other home-based vaccination record, and whether it was physically seen by the enumerator. Published wording: ''Does (child name) have a vaccination card, health card, or other home-based vaccination record?'' Enumerator should ask to see the card. This item gates the card-path vs recall-path in the vaccination section.'
      fr: 'Si l''enfant possède un carnet de vaccination, une carte de santé ou tout autre document de vaccination à domicile, et s''il a été vu physiquement par l''enquêteur. Formulation publiée : « (Prénom de l''enfant) a-t-il/elle un carnet de vaccination, une carte de santé ou un autre document de vaccination à domicile ? » L''enquêteur doit demander à voir le carnet. Cet item oriente vers la voie carnet ou la voie mémorisation dans la section vaccination.'
      es: 'Si el niño tiene un carnet de vacunación, tarjeta de salud u otro registro de vacunación domiciliario, y si fue visto físicamente por el encuestador. Redacción publicada: ''¿Tiene (nombre del niño) un carnet de vacunación, tarjeta de salud u otro registro de vacunación domiciliario?'' El encuestador debe pedir ver el carnet. Este ítem dirige hacia la vía carnet o la vía memoria en la sección de vacunación.'
    slot_uri: aidops:vaccination_card_exists
    range: VaccCardStatus
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health"], "cardinality": "single", "category": "vaccination", "core": true, "definition": {"en": "Whether the child has a home-based vaccination card, health card, or other home-based vaccination record, and whether it was physically seen by the enumerator. Published wording: ''Does (child name) have a vaccination card, health card, or other home-based vaccination record?'' Enumerator should ask to see the card. This item gates the card-path vs recall-path in the vaccination section.", "es": "Si el ni\u00f1o tiene un carnet de vacunaci\u00f3n, tarjeta de salud u otro registro de vacunaci\u00f3n domiciliario, y si fue visto f\u00edsicamente por el encuestador. Redacci\u00f3n publicada: ''\u00bfTiene (nombre del ni\u00f1o) un carnet de vacunaci\u00f3n, tarjeta de salud u otro registro de vacunaci\u00f3n domiciliario?'' El encuestador debe pedir ver el carnet. Este \u00edtem dirige hacia la v\u00eda carnet o la v\u00eda memoria en la secci\u00f3n de vacunaci\u00f3n.", "fr": "Si l''enfant poss\u00e8de un carnet de vaccination, une carte de sant\u00e9 ou tout autre document de vaccination \u00e0 domicile, et s''il a \u00e9t\u00e9 vu physiquement par l''enqu\u00eateur. Formulation publi\u00e9e : \u00ab (Pr\u00e9nom de l''enfant) a-t-il/elle un carnet de vaccination, une carte de sant\u00e9 ou un autre document de vaccination \u00e0 domicile ? \u00bb L''enqu\u00eateur doit demander \u00e0 voir le carnet. Cet item oriente vers la voie carnet ou la voie m\u00e9morisation dans la section vaccination."}, "id": "vaccination_card_exists", "label": {"en": "Vaccination card exists", "es": "Carnet de vacunaci\u00f3n existente", "fr": "Carnet de vaccination existant"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "vacc-card-status"}'
