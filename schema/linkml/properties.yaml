  gbv_ipv_severity_tier:
    title:
      en: 'Derived: IPV severity classification'
      fr: 'Dérivé : classification de la gravité de la VPI'
      es: 'Derivado: clasificación de la gravedad de la VPI'
    description:
      en: 'Derived composite severity classification for intimate partner violence, using the act typology from the DHS Domestic Violence module and the severity distinction from Garcia-Moreno et al. (WHO MCS, 2005). Formula: ''severe'' if any of gbv_phys_kick_drag_beat_lifetime, gbv_phys_choke_burn_lifetime, gbv_phys_weapon_threat_lifetime, gbv_sex_forced_intercourse_lifetime, gbv_sex_forced_other_acts_lifetime, or gbv_sex_forced_with_threats_lifetime = true (severe physical acts or any sexual IPV act). ''moderate'' if not severe AND any of gbv_phys_push_shake_throw_lifetime, gbv_phys_slap_lifetime, gbv_phys_twist_arm_pull_hair_lifetime, gbv_phys_punch_lifetime, gbv_emot_humiliate_lifetime, gbv_emot_threaten_harm_lifetime, or gbv_emot_insult_lifetime = true. ''none'' if all IPV battery items = false or not answered. This classification is a research aid for analysis; it must not be presented to respondents or used for individual-level eligibility decisions. Corresponds to the IPUMS DHS DVPLSEVER variable concept. Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.'
      fr: 'Classification composite dérivée de la gravité de la VPI, basée sur la distinction moins grave/plus grave de Garcia-Moreno et al. (OMS MCS, 2005). Formule : ''severe'' si au moins un acte physique grave ou un acte sexuel est signalé; ''moderate'' si non grave et au moins un acte modéré ou émotionnel est signalé; ''none'' si tous les items sont négatifs. Aide à la recherche uniquement. Dérivé, non posé.'
      es: 'Clasificación compuesta derivada de la gravedad de la VPI, usando la distinción menos grave/ más grave de Garcia-Moreno et al. (OMS MCS, 2005). Fórmula: ''severe'' si al menos un acto físico grave o sexual es reportado; ''moderate'' si no grave y al menos un acto moderado o emocional; ''none'' si todos los ítems son negativos. Solo para uso analítico. Derivado, no preguntado.'
    slot_uri: aidops:gbv_ipv_severity_tier
    range: GbvSeverityTier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022", "who-mcs-domestic-violence-2005"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived composite severity classification for intimate partner violence, using the act typology from the DHS Domestic Violence module and the severity distinction from Garcia-Moreno et al. (WHO MCS, 2005). Formula: ''severe'' if any of gbv_phys_kick_drag_beat_lifetime, gbv_phys_choke_burn_lifetime, gbv_phys_weapon_threat_lifetime, gbv_sex_forced_intercourse_lifetime, gbv_sex_forced_other_acts_lifetime, or gbv_sex_forced_with_threats_lifetime = true (severe physical acts or any sexual IPV act). ''moderate'' if not severe AND any of gbv_phys_push_shake_throw_lifetime, gbv_phys_slap_lifetime, gbv_phys_twist_arm_pull_hair_lifetime, gbv_phys_punch_lifetime, gbv_emot_humiliate_lifetime, gbv_emot_threaten_harm_lifetime, or gbv_emot_insult_lifetime = true. ''none'' if all IPV battery items = false or not answered. This classification is a research aid for analysis; it must not be presented to respondents or used for individual-level eligibility decisions. Corresponds to the IPUMS DHS DVPLSEVER variable concept. Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.\n", "es": "Clasificaci\u00f3n compuesta derivada de la gravedad de la VPI, usando la distinci\u00f3n menos grave/ m\u00e1s grave de Garcia-Moreno et al. (OMS MCS, 2005). F\u00f3rmula: ''severe'' si al menos un acto f\u00edsico grave o sexual es reportado; ''moderate'' si no grave y al menos un acto moderado o emocional; ''none'' si todos los \u00edtems son negativos. Solo para uso anal\u00edtico. Derivado, no preguntado.\n", "fr": "Classification composite d\u00e9riv\u00e9e de la gravit\u00e9 de la VPI, bas\u00e9e sur la distinction moins grave/plus grave de Garcia-Moreno et al. (OMS MCS, 2005). Formule : ''severe'' si au moins un acte physique grave ou un acte sexuel est signal\u00e9; ''moderate'' si non grave et au moins un acte mod\u00e9r\u00e9 ou \u00e9motionnel est signal\u00e9; ''none'' si tous les items sont n\u00e9gatifs. Aide \u00e0 la recherche uniquement. D\u00e9riv\u00e9, non pos\u00e9.\n"}, "id": "gbv_ipv_severity_tier", "label": {"en": "Derived: IPV severity classification", "es": "Derivado: clasificaci\u00f3n de la gravedad de la VPI", "fr": "D\u00e9riv\u00e9 : classification de la gravit\u00e9 de la VPI"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "gbv-severity-tier"}'
