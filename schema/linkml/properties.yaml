  climate_insurance_coverage_type:
    title:
      en: Types of insurance covering climate-related losses
      fr: Types d'assurance couvrant les pertes liées au climat
      es: Tipos de seguro que cubren pérdidas relacionadas con el clima
    description:
      en: 'Multi-select item asking whether the household currently holds any form of insurance that would cover losses or damage from climate-related hazards such as drought, flood, or extreme weather. Includes ''none'' as a mutually exclusive option. Insurance is an adaptive capacity indicator in the IPCC AR6 WGII Chapter 17 and a required GCF results framework risk-transfer indicator. Sensitivity: financial product ownership is modestly sensitive. Apply sensitivity: sensitive in line with LivelihoodProfile financial items.'
      fr: Item à sélection multiple demandant si le ménage détient actuellement une forme d'assurance qui couvrirait les pertes ou dommages liés à des aléas climatiques tels que la sécheresse, les inondations ou les phénomènes météorologiques extrêmes. Inclut 'none' comme option mutuellement exclusive. L'assurance est un indicateur de capacité d'adaptation (GIEC AR6 WGII Chapitre 17) et un indicateur obligatoire de transfert de risque du cadre de résultats FVC.
      es: Ítem de selección múltiple que pregunta si el hogar tiene actualmente algún tipo de seguro que cubra pérdidas o daños por peligros relacionados con el clima como sequía, inundaciones o fenómenos meteorológicos extremos. Incluye 'none' como opción mutuamente excluyente. El seguro es un indicador de capacidad de adaptación (IPCC AR6 WGII Capítulo 17) e indicador obligatorio de transferencia de riesgo del marco de resultados del FVC.
    slot_uri: aidops:climate_insurance_coverage_type
    range: ClimateInsuranceType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["adaptation-fund-rmf-2019", "gcf-results-framework-2022", "ipcc-ar6-wg2-2022", "undp-hdr-2020", "unfccc-nap-me-2022", "world-bank-csa-profiles-2019"], "cardinality": "multiple", "category": "climate", "core": true, "definition": {"en": "Multi-select item asking whether the household currently holds any form of insurance that would cover losses or damage from climate-related hazards such as drought, flood, or extreme weather. Includes ''none'' as a mutually exclusive option. Insurance is an adaptive capacity indicator in the IPCC AR6 WGII Chapter 17 and a required GCF results framework risk-transfer indicator. Sensitivity: financial product ownership is modestly sensitive. Apply sensitivity: sensitive in line with LivelihoodProfile financial items.\n", "es": "\u00cdtem de selecci\u00f3n m\u00faltiple que pregunta si el hogar tiene actualmente alg\u00fan tipo de seguro que cubra p\u00e9rdidas o da\u00f1os por peligros relacionados con el clima como sequ\u00eda, inundaciones o fen\u00f3menos meteorol\u00f3gicos extremos. Incluye ''none'' como opci\u00f3n mutuamente excluyente. El seguro es un indicador de capacidad de adaptaci\u00f3n (IPCC AR6 WGII Cap\u00edtulo 17) e indicador obligatorio de transferencia de riesgo del marco de resultados del FVC.\n", "fr": "Item \u00e0 s\u00e9lection multiple demandant si le m\u00e9nage d\u00e9tient actuellement une forme d''assurance qui couvrirait les pertes ou dommages li\u00e9s \u00e0 des al\u00e9as climatiques tels que la s\u00e9cheresse, les inondations ou les ph\u00e9nom\u00e8nes m\u00e9t\u00e9orologiques extr\u00eames. Inclut ''none'' comme option mutuellement exclusive. L''assurance est un indicateur de capacit\u00e9 d''adaptation (GIEC AR6 WGII Chapitre 17) et un indicateur obligatoire de transfert de risque du cadre de r\u00e9sultats FVC.\n"}, "id": "climate_insurance_coverage_type", "label": {"en": "Types of insurance covering climate-related losses", "es": "Tipos de seguro que cubren p\u00e9rdidas relacionadas con el clima", "fr": "Types d''assurance couvrant les pertes li\u00e9es au climat"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "climate-insurance-type"}'
