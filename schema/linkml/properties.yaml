  menstrual_regularity:
    title:
      en: Menstrual regularity
      fr: Régularité du cycle menstruel
      es: Regularidad menstrual
    description:
      en: Whether the woman's menstrual periods are regular, irregular, or absent (WHO clinical guidance). Ask only if the woman is not using a hormonal method (which alters cycle pattern) and fp_fecundity_status is not 'menopausal' or 'hysterectomy'. Irregular or absent menses may indicate health conditions (PCOS, thyroid disorder, pregnancy) and affect fecundity assessment. Not a DHS or MICS standard question; drawn from WHO reproductive health clinical indicators.
      fr: Si les règles de la femme sont régulières, irrégulières ou absentes (recommandations cliniques de l'OMS). Demander uniquement si la femme n'utilise pas de méthode hormonale (qui altère le schéma du cycle) et si fp_fecundity_status n'est pas 'menopausal' ou 'hysterectomy'. Des règles irrégulières ou absentes peuvent indiquer des problèmes de santé (SOPK, troubles thyroïdiens, grossesse) et affecter l'évaluation de la fécondité. Ce n'est pas une question DHS ou MICS standard ; tirée des indicateurs cliniques de santé reproductive de l'OMS.
      es: Si los períodos menstruales de la mujer son regulares, irregulares o ausentes (guía clínica de la OMS). Preguntar solo si la mujer no usa un método hormonal (que altera el patrón del ciclo) y si fp_fecundity_status no es 'menopausal' o 'hysterectomy'. La menstruación irregular o ausente puede indicar condiciones de salud (SOP, trastorno tiroideo, embarazo) y afectar la evaluación de fecundidad. No es una pregunta estándar de DHS o MICS; tomada de los indicadores clínicos de salud reproductiva de la OMS.
    slot_uri: aidops:menstrual_regularity
    range: MenstrualRegularity
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["who-rh-indicators-2006"], "cardinality": "single", "category": "family_planning", "core": false, "definition": {"en": "Whether the woman''s menstrual periods are regular, irregular, or absent (WHO clinical guidance). Ask only if the woman is not using a hormonal method (which alters cycle pattern) and fp_fecundity_status is not ''menopausal'' or ''hysterectomy''. Irregular or absent menses may indicate health conditions (PCOS, thyroid disorder, pregnancy) and affect fecundity assessment. Not a DHS or MICS standard question; drawn from WHO reproductive health clinical indicators.", "es": "Si los per\u00edodos menstruales de la mujer son regulares, irregulares o ausentes (gu\u00eda cl\u00ednica de la OMS). Preguntar solo si la mujer no usa un m\u00e9todo hormonal (que altera el patr\u00f3n del ciclo) y si fp_fecundity_status no es ''menopausal'' o ''hysterectomy''. La menstruaci\u00f3n irregular o ausente puede indicar condiciones de salud (SOP, trastorno tiroideo, embarazo) y afectar la evaluaci\u00f3n de fecundidad. No es una pregunta est\u00e1ndar de DHS o MICS; tomada de los indicadores cl\u00ednicos de salud reproductiva de la OMS.", "fr": "Si les r\u00e8gles de la femme sont r\u00e9guli\u00e8res, irr\u00e9guli\u00e8res ou absentes (recommandations cliniques de l''OMS). Demander uniquement si la femme n''utilise pas de m\u00e9thode hormonale (qui alt\u00e8re le sch\u00e9ma du cycle) et si fp_fecundity_status n''est pas ''menopausal'' ou ''hysterectomy''. Des r\u00e8gles irr\u00e9guli\u00e8res ou absentes peuvent indiquer des probl\u00e8mes de sant\u00e9 (SOPK, troubles thyro\u00efdiens, grossesse) et affecter l''\u00e9valuation de la f\u00e9condit\u00e9. Ce n''est pas une question DHS ou MICS standard ; tir\u00e9e des indicateurs cliniques de sant\u00e9 reproductive de l''OMS."}, "id": "menstrual_regularity", "label": {"en": "Menstrual regularity", "es": "Regularidad menstrual", "fr": "R\u00e9gularit\u00e9 du cycle menstruel"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "menstrual-regularity"}'
      bibliography_refs: who-rh-indicators-2006
  mhm_material_disposal:
    title:
      en: Menstrual material disposal method
      fr: Méthode d'élimination des matériaux menstruels
      es: Método de eliminación de materiales menstruales
    description:
      en: Method used to dispose of menstrual hygiene materials after use. Asked only when mhm_materials_available is not 'no_access' or 'does_not_menstruate'. Safe disposal supports dignity and environmental health. Open disposal is a public health and dignity concern. Based on JMP/MICS MHM expanded questions and MICS Belize pilot question UN16.
      fr: Méthode utilisée pour éliminer les matériaux d'hygiène menstruelle après utilisation. Demandé uniquement quand mhm_materials_available n'est pas 'no_access' ou 'does_not_menstruate'. Une élimination sûre contribue à la dignité et à la santé environnementale. L'élimination à l'air libre est une préoccupation de santé publique et de dignité. Basé sur les questions MHM élargies JMP/MICS et la question pilote MICS Belize UN16.
      es: Método utilizado para eliminar los materiales de higiene menstrual después de su uso. Preguntado solo cuando mhm_materials_available no es 'no_access' ni 'does_not_menstruate'. La eliminación segura apoya la dignidad y la salud ambiental. La eliminación al aire libre es una preocupación de salud pública y dignidad. Basado en preguntas MHM ampliadas del JMP/MICS y la pregunta piloto MICS Belice UN16.
    slot_uri: aidops:mhm_material_disposal
    range: MhmDisposalMethod
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "mhm", "core": false, "definition": {"en": "Method used to dispose of menstrual hygiene materials after use. Asked only when mhm_materials_available is not ''no_access'' or ''does_not_menstruate''. Safe disposal supports dignity and environmental health. Open disposal is a public health and dignity concern. Based on JMP/MICS MHM expanded questions and MICS Belize pilot question UN16.", "es": "M\u00e9todo utilizado para eliminar los materiales de higiene menstrual despu\u00e9s de su uso. Preguntado solo cuando mhm_materials_available no es ''no_access'' ni ''does_not_menstruate''. La eliminaci\u00f3n segura apoya la dignidad y la salud ambiental. La eliminaci\u00f3n al aire libre es una preocupaci\u00f3n de salud p\u00fablica y dignidad. Basado en preguntas MHM ampliadas del JMP/MICS y la pregunta piloto MICS Belice UN16.", "fr": "M\u00e9thode utilis\u00e9e pour \u00e9liminer les mat\u00e9riaux d''hygi\u00e8ne menstruelle apr\u00e8s utilisation. Demand\u00e9 uniquement quand mhm_materials_available n''est pas ''no_access'' ou ''does_not_menstruate''. Une \u00e9limination s\u00fbre contribue \u00e0 la dignit\u00e9 et \u00e0 la sant\u00e9 environnementale. L''\u00e9limination \u00e0 l''air libre est une pr\u00e9occupation de sant\u00e9 publique et de dignit\u00e9. Bas\u00e9 sur les questions MHM \u00e9largies JMP/MICS et la question pilote MICS Belize UN16."}, "id": "mhm_material_disposal", "label": {"en": "Menstrual material disposal method", "es": "M\u00e9todo de eliminaci\u00f3n de materiales menstruales", "fr": "M\u00e9thode d''\u00e9limination des mat\u00e9riaux menstruels"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7"], "vocabulary": "mhm-disposal-method"}'
      bibliography_refs: jmp-core
  mhm_materials_available:
    title:
      en: Menstrual hygiene materials available
      fr: Matériaux d'hygiène menstruelle disponibles
      es: Materiales de higiene menstrual disponibles
    description:
      en: 'Whether the respondent had access to materials for managing their last menstrual period when needed. Asked only to women and girls of menstruating age. Materials include commercial pads, tampons, menstrual cups, and reusable cloth pads. If no access, skip mhm_material_disposal. Based on MICS MHM module and MICS Belize pilot UN15. Codes: yes_disposable = had disposable materials; yes_reusable = had reusable materials; yes_both = had both types; no_access = had no access to materials; does_not_menstruate = respondent does not currently menstruate.'
      fr: 'Si la répondante avait accès à des matériaux pour gérer ses dernières règles en cas de besoin. Demandé uniquement aux femmes et filles en âge de menstruer. Les matériaux comprennent les serviettes hygiéniques commerciales, les tampons, les coupes menstruelles et les serviettes en tissu réutilisables. En cas d''absence d''accès, ignorer mhm_material_disposal. Basé sur le module MHM MICS et la question pilote MICS Belize UN15. Codes : yes_disposable = avait des matériaux jetables ; yes_reusable = avait des matériaux réutilisables ; yes_both = avait les deux types ; no_access = n''avait pas accès aux matériaux ; does_not_menstruate = la répondante ne menstruate pas actuellement.'
      es: 'Si la encuestada tuvo acceso a materiales para gestionar su último período menstrual cuando los necesitaba. Preguntado solo a mujeres y niñas en edad de menstruar. Los materiales incluyen compresas comerciales, tampones, copas menstruales y compresas de tela reutilizables. Si no hay acceso, omitir mhm_material_disposal. Basado en el módulo MHM de MICS y la pregunta piloto MICS Belice UN15. Códigos: yes_disposable = tenía materiales desechables; yes_reusable = tenía materiales reutilizables; yes_both = tenía ambos tipos; no_access = no tenía acceso a materiales; does_not_menstruate = la encuestada no menstrúa actualmente.'
    slot_uri: aidops:mhm_materials_available
    range: MhmMaterialsAccess
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "mhm", "core": false, "definition": {"en": "Whether the respondent had access to materials for managing their last menstrual period when needed. Asked only to women and girls of menstruating age. Materials include commercial pads, tampons, menstrual cups, and reusable cloth pads. If no access, skip mhm_material_disposal. Based on MICS MHM module and MICS Belize pilot UN15. Codes: yes_disposable = had disposable materials; yes_reusable = had reusable materials; yes_both = had both types; no_access = had no access to materials; does_not_menstruate = respondent does not currently menstruate.", "es": "Si la encuestada tuvo acceso a materiales para gestionar su \u00faltimo per\u00edodo menstrual cuando los necesitaba. Preguntado solo a mujeres y ni\u00f1as en edad de menstruar. Los materiales incluyen compresas comerciales, tampones, copas menstruales y compresas de tela reutilizables. Si no hay acceso, omitir mhm_material_disposal. Basado en el m\u00f3dulo MHM de MICS y la pregunta piloto MICS Belice UN15. C\u00f3digos: yes_disposable = ten\u00eda materiales desechables; yes_reusable = ten\u00eda materiales reutilizables; yes_both = ten\u00eda ambos tipos; no_access = no ten\u00eda acceso a materiales; does_not_menstruate = la encuestada no menstr\u00faa actualmente.", "fr": "Si la r\u00e9pondante avait acc\u00e8s \u00e0 des mat\u00e9riaux pour g\u00e9rer ses derni\u00e8res r\u00e8gles en cas de besoin. Demand\u00e9 uniquement aux femmes et filles en \u00e2ge de menstruer. Les mat\u00e9riaux comprennent les serviettes hygi\u00e9niques commerciales, les tampons, les coupes menstruelles et les serviettes en tissu r\u00e9utilisables. En cas d''absence d''acc\u00e8s, ignorer mhm_material_disposal. Bas\u00e9 sur le module MHM MICS et la question pilote MICS Belize UN15. Codes : yes_disposable = avait des mat\u00e9riaux jetables ; yes_reusable = avait des mat\u00e9riaux r\u00e9utilisables ; yes_both = avait les deux types ; no_access = n''avait pas acc\u00e8s aux mat\u00e9riaux ; does_not_menstruate = la r\u00e9pondante ne menstruate pas actuellement."}, "id": "mhm_materials_available", "label": {"en": "Menstrual hygiene materials available", "es": "Materiales de higiene menstrual disponibles", "fr": "Mat\u00e9riaux d''hygi\u00e8ne menstruelle disponibles"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7"], "vocabulary": "mhm-materials-access"}'
