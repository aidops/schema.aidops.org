  fcd_belief_physical_punishment_needed:
    title:
      en: Caregiver belief — physical punishment is needed to raise a child
      fr: Croyance du soignant — la punition physique est nécessaire pour élever un enfant
      es: Creencia del cuidador — el castigo físico es necesario para criar a un niño
    description:
      en: 'Whether the caregiver believes that in order to bring up, raise, or educate a child properly, the child needs to be physically punished. MICS 6 FCD5. Caregiver attitudinal item, distinct from the FCD2 behavioural items. Convergence note: this is the child-specific normative item; it partially overlaps the pro-WEAI IPV attitude items (weai_ipv_*) that measure wife-beating attitudes, but it targets adult-to-child violence and is retained as part of the coherent MICS FCD instrument rather than duplicated.'
      fr: 'Si le soignant croit que pour élever, éduquer ou former un enfant correctement, l''enfant doit être puni physiquement. MICS 6 FCD5. Item attitudinal du soignant, distinct des items comportementaux FCD2. Note de convergence : il s''agit de l''item normatif spécifique à l''enfant ; il chevauche partiellement les items d''attitudes VPI pro-WEAI (weai_ipv_*) qui mesurent les attitudes envers la violence conjugale, mais il cible la violence adulte-enfant et est conservé dans le cadre de l''instrument cohérent MICS FCD plutôt que dupliqué.'
      es: 'Si el cuidador cree que para criar, educar o formar a un niño correctamente, el niño debe ser castigado físicamente. MICS 6 FCD5. Ítem actitudinal del cuidador, distinto de los ítems conductuales FCD2. Nota de convergencia: este es el ítem normativo específico del niño; se superpone parcialmente con los ítems de actitudes VPI pro-WEAI (weai_ipv_*) que miden actitudes hacia la violencia conyugal, pero apunta a la violencia adulto-niño y se mantiene como parte del instrumento coherente MICS FCD en lugar de duplicarse.'
    slot_uri: aidops:fcd_belief_physical_punishment_needed
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["mics6-child-protection", "sdg-16-2-1-metadata"], "cardinality": "single", "category": "child_discipline", "core": false, "definition": {"en": "Whether the caregiver believes that in order to bring up, raise, or educate a child properly, the child needs to be physically punished. MICS 6 FCD5. Caregiver attitudinal item, distinct from the FCD2 behavioural items. Convergence note: this is the child-specific normative item; it partially overlaps the pro-WEAI IPV attitude items (weai_ipv_*) that measure wife-beating attitudes, but it targets adult-to-child violence and is retained as part of the coherent MICS FCD instrument rather than duplicated.", "es": "Si el cuidador cree que para criar, educar o formar a un ni\u00f1o correctamente, el ni\u00f1o debe ser castigado f\u00edsicamente. MICS 6 FCD5. \u00cdtem actitudinal del cuidador, distinto de los \u00edtems conductuales FCD2. Nota de convergencia: este es el \u00edtem normativo espec\u00edfico del ni\u00f1o; se superpone parcialmente con los \u00edtems de actitudes VPI pro-WEAI (weai_ipv_*) que miden actitudes hacia la violencia conyugal, pero apunta a la violencia adulto-ni\u00f1o y se mantiene como parte del instrumento coherente MICS FCD en lugar de duplicarse.", "fr": "Si le soignant croit que pour \u00e9lever, \u00e9duquer ou former un enfant correctement, l''enfant doit \u00eatre puni physiquement. MICS 6 FCD5. Item attitudinal du soignant, distinct des items comportementaux FCD2. Note de convergence : il s''agit de l''item normatif sp\u00e9cifique \u00e0 l''enfant ; il chevauche partiellement les items d''attitudes VPI pro-WEAI (weai_ipv_*) qui mesurent les attitudes envers la violence conjugale, mais il cible la violence adulte-enfant et est conserv\u00e9 dans le cadre de l''instrument coh\u00e9rent MICS FCD plut\u00f4t que dupliqu\u00e9."}, "id": "fcd_belief_physical_punishment_needed", "label": {"en": "Caregiver belief \u2014 physical punishment is needed to raise a child", "es": "Creencia del cuidador \u2014 el castigo f\u00edsico es necesario para criar a un ni\u00f1o", "fr": "Croyance du soignant \u2014 la punition physique est n\u00e9cessaire pour \u00e9lever un enfant"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "yes-no-dk"}'
