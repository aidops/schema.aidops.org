  shelter_feels_adequate:
    title:
      en: Shelter feels safe and adequate
      fr: L'abri semble sûr et adéquat
      es: El refugio se siente seguro y adecuado
    description:
      en: 'Whether the household feels overall that their shelter is safe and adequate. Sphere Standard 3 key indicator: percentage of people receiving shelter assistance that feel safe in their shelter. Global Shelter Cluster core indicator. A composite subjective adequacy measure capturing dimensions not easily observed by enumerators.'
      fr: 'Si le ménage estime globalement que son abri est sûr et adéquat. Indicateur clé de la Norme Sphère 3 : pourcentage de personnes recevant une assistance à l''abri qui se sentent en sécurité dans leur abri. Indicateur de base du Cluster Abri Mondial. Une mesure d''adéquation subjective composite capturant des dimensions difficilement observables par les enquêteurs.'
      es: 'Si el hogar siente en general que su refugio es seguro y adecuado. Indicador clave de la Norma Esfera 3: porcentaje de personas que reciben asistencia de refugio que se sienten seguras en su refugio. Indicador central del Clúster Global de Refugio. Una medida subjetiva compuesta de adecuación que capta dimensiones difícilmente observables por los encuestadores.'
    slot_uri: aidops:shelter_feels_adequate
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "gsc-indicators-v2", "sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "Whether the household feels overall that their shelter is safe and adequate. Sphere Standard 3 key indicator: percentage of people receiving shelter assistance that feel safe in their shelter. Global Shelter Cluster core indicator. A composite subjective adequacy measure capturing dimensions not easily observed by enumerators.", "es": "Si el hogar siente en general que su refugio es seguro y adecuado. Indicador clave de la Norma Esfera 3: porcentaje de personas que reciben asistencia de refugio que se sienten seguras en su refugio. Indicador central del Cl\u00faster Global de Refugio. Una medida subjetiva compuesta de adecuaci\u00f3n que capta dimensiones dif\u00edcilmente observables por los encuestadores.", "fr": "Si le m\u00e9nage estime globalement que son abri est s\u00fbr et ad\u00e9quat. Indicateur cl\u00e9 de la Norme Sph\u00e8re 3 : pourcentage de personnes recevant une assistance \u00e0 l''abri qui se sentent en s\u00e9curit\u00e9 dans leur abri. Indicateur de base du Cluster Abri Mondial. Une mesure d''ad\u00e9quation subjective composite capturant des dimensions difficilement observables par les enqu\u00eateurs."}, "id": "shelter_feels_adequate", "label": {"en": "Shelter feels safe and adequate", "es": "El refugio se siente seguro y adecuado", "fr": "L''abri semble s\u00fbr et ad\u00e9quat"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised"], "vocabulary": "yes-no-partial"}'
