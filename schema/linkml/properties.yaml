  climate_trend_perception_seasons:
    title:
      en: Perceived shift in rainy or growing season timing compared to 10–15 years ago
      fr: Décalage perçu du début de la saison des pluies ou de croissance par rapport à il y a 10–15 ans
      es: Cambio percibido en el inicio de la temporada de lluvias o cultivo comparado con hace 10–15 años
    description:
      en: 'Single-select item asking whether the respondent perceives the rainy season or growing season now starts at a different time of year than it used to, compared to when they were growing up or 10–15 years ago. Season-onset shift is one of the most consistently reported perceived climate changes in tropical agricultural settings (IPCC AR6 WGII Chapter 5) and is highly actionable — a confirmed shift can motivate adoption of early or late planting varieties captured in climate_adaptive_practices_used. This item uses season-shift codes specific to its timing question rather than the generic climate-trend-perception vocabulary, because the relevant dimension is timing rather than direction of change. Valid codes: starts_much_later / starts_somewhat_later / about_same_timing / starts_somewhat_earlier / starts_much_earlier / timing_unpredictable / dont_know.'
      fr: Item à sélection unique demandant si le répondant perçoit que la saison des pluies ou de croissance commence maintenant à une période différente de l'année par rapport à son enfance ou il y a 10 à 15 ans. Le décalage de l'onset saisonnier est l'un des changements climatiques perçus les plus systématiquement rapportés dans les contextes agricoles tropicaux (GIEC AR6 WGII Chapitre 5).
      es: Ítem de selección única que pregunta si el encuestado percibe que la temporada de lluvias o de cultivo ahora comienza en un momento diferente del año comparado con cuando era joven o hace 10 a 15 años. El cambio en el inicio estacional es uno de los cambios climáticos percibidos más consistentemente reportados en contextos agrícolas tropicales (IPCC AR6 WGII Capítulo 5).
    slot_uri: aidops:climate_trend_perception_seasons
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "fao-ex-act-2021", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "world-bank-csa-profiles-2019"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Single-select item asking whether the respondent perceives the rainy season or growing season now starts at a different time of year than it used to, compared to when they were growing up or 10\u201315 years ago. Season-onset shift is one of the most consistently reported perceived climate changes in tropical agricultural settings (IPCC AR6 WGII Chapter 5) and is highly actionable \u2014 a confirmed shift can motivate adoption of early or late planting varieties captured in climate_adaptive_practices_used. This item uses season-shift codes specific to its timing question rather than the generic climate-trend-perception vocabulary, because the relevant dimension is timing rather than direction of change. Valid codes: starts_much_later / starts_somewhat_later / about_same_timing / starts_somewhat_earlier / starts_much_earlier / timing_unpredictable / dont_know.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el encuestado percibe que la temporada de lluvias o de cultivo ahora comienza en un momento diferente del a\u00f1o comparado con cuando era joven o hace 10 a 15 a\u00f1os. El cambio en el inicio estacional es uno de los cambios clim\u00e1ticos percibidos m\u00e1s consistentemente reportados en contextos agr\u00edcolas tropicales (IPCC AR6 WGII Cap\u00edtulo 5).\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le r\u00e9pondant per\u00e7oit que la saison des pluies ou de croissance commence maintenant \u00e0 une p\u00e9riode diff\u00e9rente de l''ann\u00e9e par rapport \u00e0 son enfance ou il y a 10 \u00e0 15 ans. Le d\u00e9calage de l''onset saisonnier est l''un des changements climatiques per\u00e7us les plus syst\u00e9matiquement rapport\u00e9s dans les contextes agricoles tropicaux (GIEC AR6 WGII Chapitre 5).\n"}, "id": "climate_trend_perception_seasons", "label": {"en": "Perceived shift in rainy or growing season timing compared to 10\u201315 years ago", "es": "Cambio percibido en el inicio de la temporada de lluvias o cultivo comparado con hace 10\u201315 a\u00f1os", "fr": "D\u00e9calage per\u00e7u du d\u00e9but de la saison des pluies ou de croissance par rapport \u00e0 il y a 10\u201315 ans"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
