  school_type:
    title:
      en: School type
      fr: Type d'école
      es: Tipo de escuela
    description:
      en: 'The educational format and inclusion design of the school the child currently attends. Ask only if attended_current_year is Yes. Distinct from school_management_type (who runs the school) — this property describes the educational format. Source: MICS6 SP5A, expanded with non-formal category for emergency/displacement contexts.'
      fr: 'Le format éducatif et la conception inclusive de l''école que l''enfant fréquente actuellement. À poser uniquement si attended_current_year est Oui. Distinct de school_management_type (qui gère l''école) — cette propriété décrit le format éducatif. Source : MICS6 SP5A, élargi avec la catégorie non formelle pour les contextes d''urgence/déplacement.'
      es: 'El formato educativo y diseño inclusivo de la escuela a la que el niño asiste actualmente. Preguntar solo si attended_current_year es Sí. Distinto de school_management_type (quién dirige la escuela): esta propiedad describe el formato educativo. Fuente: MICS6 SP5A, ampliado con categoría no formal para contextos de emergencia/desplazamiento.'
    slot_uri: aidops:school_type
    range: SchoolType
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["child_5_17"], "bibliography_refs": ["mics-education"], "cardinality": "single", "category": "education", "core": true, "definition": {"en": "The educational format and inclusion design of the school the child currently attends. Ask only if attended_current_year is Yes. Distinct from school_management_type (who runs the school) \u2014 this property describes the educational format. Source: MICS6 SP5A, expanded with non-formal category for emergency/displacement contexts.", "es": "El formato educativo y dise\u00f1o inclusivo de la escuela a la que el ni\u00f1o asiste actualmente. Preguntar solo si attended_current_year es S\u00ed. Distinto de school_management_type (qui\u00e9n dirige la escuela): esta propiedad describe el formato educativo. Fuente: MICS6 SP5A, ampliado con categor\u00eda no formal para contextos de emergencia/desplazamiento.", "fr": "Le format \u00e9ducatif et la conception inclusive de l''\u00e9cole que l''enfant fr\u00e9quente actuellement. \u00c0 poser uniquement si attended_current_year est Oui. Distinct de school_management_type (qui g\u00e8re l''\u00e9cole) \u2014 cette propri\u00e9t\u00e9 d\u00e9crit le format \u00e9ducatif. Source : MICS6 SP5A, \u00e9largi avec la cat\u00e9gorie non formelle pour les contextes d''urgence/d\u00e9placement."}, "id": "school_type", "label": {"en": "School type", "es": "Tipo de escuela", "fr": "Type d''\u00e9cole"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "school-type"}'
