  gbv_referral_service_type_known:
    title:
      en: GBV referral service type known
      fr: Type de service d'orientation VBG connu
      es: Tipo de servicio de derivación VBG conocido
    description:
      en: The type(s) of GBV response service the household head is aware of. Asked only when gbv_referral_services_known = yes. Allow respondent to name what they know; do not show a list. Multiple selections permitted to capture composite awareness. Based on UNFPA Minimum Standards (2019) service typology and GBV AoR referral pathway mapping.
      fr: Le(s) type(s) de service de réponse VBG dont le chef de ménage a connaissance. Posée uniquement lorsque gbv_referral_services_known = oui. Permettre au répondant de nommer ce qu'il sait ; ne pas montrer de liste. Sélections multiples autorisées pour saisir la connaissance composite. Fondé sur la typologie des services des Normes minimales UNFPA (2019) et la cartographie des filières d'orientation du GBV AoR.
      es: El/los tipo(s) de servicio de respuesta VBG del que tiene conocimiento la persona jefa del hogar. Se pregunta solo cuando gbv_referral_services_known = sí. Permitir que el encuestado nombre lo que sabe; no mostrar una lista. Se permiten selecciones múltiples para capturar el conocimiento compuesto. Basado en la tipología de servicios de los Estándares Mínimos de UNFPA (2019) y el mapeo de rutas de derivación del GBV AoR.
    slot_uri: aidops:gbv_referral_service_type_known
    range: GbvServiceType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "unfpa-gbv-minimum-standards-2019"], "cardinality": "multiple", "category": "gbv_services", "core": false, "definition": {"en": "The type(s) of GBV response service the household head is aware of. Asked only when gbv_referral_services_known = yes. Allow respondent to name what they know; do not show a list. Multiple selections permitted to capture composite awareness. Based on UNFPA Minimum Standards (2019) service typology and GBV AoR referral pathway mapping.", "es": "El/los tipo(s) de servicio de respuesta VBG del que tiene conocimiento la persona jefa del hogar. Se pregunta solo cuando gbv_referral_services_known = s\u00ed. Permitir que el encuestado nombre lo que sabe; no mostrar una lista. Se permiten selecciones m\u00faltiples para capturar el conocimiento compuesto. Basado en la tipolog\u00eda de servicios de los Est\u00e1ndares M\u00ednimos de UNFPA (2019) y el mapeo de rutas de derivaci\u00f3n del GBV AoR.", "fr": "Le(s) type(s) de service de r\u00e9ponse VBG dont le chef de m\u00e9nage a connaissance. Pos\u00e9e uniquement lorsque gbv_referral_services_known = oui. Permettre au r\u00e9pondant de nommer ce qu''il sait ; ne pas montrer de liste. S\u00e9lections multiples autoris\u00e9es pour saisir la connaissance composite. Fond\u00e9 sur la typologie des services des Normes minimales UNFPA (2019) et la cartographie des fili\u00e8res d''orientation du GBV AoR."}, "id": "gbv_referral_service_type_known", "label": {"en": "GBV referral service type known", "es": "Tipo de servicio de derivaci\u00f3n VBG conocido", "fr": "Type de service d''orientation VBG connu"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "gbv-service-type"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,unfpa-gbv-minimum-standards-2019
  gbv_referral_services_known:
    title:
      en: 'GBV referral services: awareness'
      fr: 'Services d''orientation VBG : connaissance'
      es: 'Servicios de derivación VBG: conocimiento'
    description:
      en: Whether the household head or adult household member is aware of where someone in the area could go to report a problem or get help if a woman or girl was harmed or threatened. This is an awareness measure only; does NOT probe individual experience, use of services, or disclosure. Enumerators must not prompt with specific service names. GBV AoR MSNA data (Ukraine 2022) found 63% of households unaware of GBV services — service awareness is the standard household-level indicator. UNFPA Minimum Standards (2019) Standard 5 identifies awareness of safe referral pathways as a minimum programme output.
      fr: Si le chef de ménage ou un adulte du ménage sait où quelqu'un dans la zone pourrait aller pour signaler un problème ou obtenir de l'aide si une femme ou une fille a été blessée ou menacée. Il s'agit uniquement d'une mesure de connaissance ; ne sonde PAS l'expérience individuelle, l'utilisation des services ou la divulgation. Les enquêteurs ne doivent pas suggérer des noms de services spécifiques. Les normes minimales UNFPA (2019), Norme 5, identifient la connaissance des filières de référence sûres comme un résultat minimum du programme.
      es: Si la persona jefa del hogar o un adulto del hogar sabe dónde podría acudir alguien en la zona para reportar un problema u obtener ayuda si una mujer o niña fue dañada o amenazada. Es solo una medida de conocimiento; NO indaga sobre la experiencia individual, el uso de servicios o la divulgación. Los encuestadores no deben sugerir nombres de servicios específicos. Los Estándares Mínimos de UNFPA (2019), Estándar 5, identifican el conocimiento de las vías de derivación seguras como un resultado mínimo del programa.
    slot_uri: aidops:gbv_referral_services_known
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "unfpa-gbv-minimum-standards-2019"], "cardinality": "single", "category": "gbv_services", "core": false, "definition": {"en": "Whether the household head or adult household member is aware of where someone in the area could go to report a problem or get help if a woman or girl was harmed or threatened. This is an awareness measure only; does NOT probe individual experience, use of services, or disclosure. Enumerators must not prompt with specific service names. GBV AoR MSNA data (Ukraine 2022) found 63% of households unaware of GBV services \u2014 service awareness is the standard household-level indicator. UNFPA Minimum Standards (2019) Standard 5 identifies awareness of safe referral pathways as a minimum programme output.", "es": "Si la persona jefa del hogar o un adulto del hogar sabe d\u00f3nde podr\u00eda acudir alguien en la zona para reportar un problema u obtener ayuda si una mujer o ni\u00f1a fue da\u00f1ada o amenazada. Es solo una medida de conocimiento; NO indaga sobre la experiencia individual, el uso de servicios o la divulgaci\u00f3n. Los encuestadores no deben sugerir nombres de servicios espec\u00edficos. Los Est\u00e1ndares M\u00ednimos de UNFPA (2019), Est\u00e1ndar 5, identifican el conocimiento de las v\u00edas de derivaci\u00f3n seguras como un resultado m\u00ednimo del programa.", "fr": "Si le chef de m\u00e9nage ou un adulte du m\u00e9nage sait o\u00f9 quelqu''un dans la zone pourrait aller pour signaler un probl\u00e8me ou obtenir de l''aide si une femme ou une fille a \u00e9t\u00e9 bless\u00e9e ou menac\u00e9e. Il s''agit uniquement d''une mesure de connaissance ; ne sonde PAS l''exp\u00e9rience individuelle, l''utilisation des services ou la divulgation. Les enqu\u00eateurs ne doivent pas sugg\u00e9rer des noms de services sp\u00e9cifiques. Les normes minimales UNFPA (2019), Norme 5, identifient la connaissance des fili\u00e8res de r\u00e9f\u00e9rence s\u00fbres comme un r\u00e9sultat minimum du programme."}, "id": "gbv_referral_services_known", "label": {"en": "GBV referral services: awareness", "es": "Servicios de derivaci\u00f3n VBG: conocimiento", "fr": "Services d''orientation VBG : connaissance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,unfpa-gbv-minimum-standards-2019
  gbv_safety_violence_during_pregnancy:
    title:
      en: 'Safety signal: physical violence during pregnancy'
      fr: 'Signal de sécurité : violence physique pendant la grossesse'
      es: 'Señal de seguridad: violencia física durante el embarazo'
    description:
      en: 'Whether anyone has ever hit, slapped, kicked, or done anything else to physically hurt the respondent while she was pregnant. DHS instrument item DV20. Lifetime reference period (ever, any pregnancy). Note: this item uses broader ''anyone'' framing rather than partner-only; it is a proxy safety signal and reproductive-health IPV indicator, not a distinct domain. Perpetrator identity is captured in gbv_safety_violence_preg_perpetrator. If true, gbv_safety_violence_preg_perpetrator is asked. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: 'Si quelqu''un a jamais frappé, giflé, donné des coups de pied ou fait autre chose pour blesser physiquement la répondante pendant qu''elle était enceinte. Item DHS DV20. Période de référence : à vie (toute grossesse). Formulation large ''quelqu''un''. Si vrai, gbv_safety_violence_preg_perpetrator est posée.'
      es: 'Si alguien alguna vez golpeó, abofeteó, pateó o hizo algo para lastimar físicamente a la encuestada mientras estaba embarazada. Ítem DHS DV20. Período de referencia: de por vida (cualquier embarazo). Formulación amplia ''alguien''. Si verdadero, se pregunta gbv_safety_violence_preg_perpetrator.'
    slot_uri: aidops:gbv_safety_violence_during_pregnancy
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022", "ellsberg-heise-2005"], "cardinality": "single", "category": "gbv_safety_signals", "core": false, "definition": {"en": "Whether anyone has ever hit, slapped, kicked, or done anything else to physically hurt the respondent while she was pregnant. DHS instrument item DV20. Lifetime reference period (ever, any pregnancy). Note: this item uses broader ''anyone'' framing rather than partner-only; it is a proxy safety signal and reproductive-health IPV indicator, not a distinct domain. Perpetrator identity is captured in gbv_safety_violence_preg_perpetrator. If true, gbv_safety_violence_preg_perpetrator is asked. Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Si alguien alguna vez golpe\u00f3, abofete\u00f3, pate\u00f3 o hizo algo para lastimar f\u00edsicamente a la encuestada mientras estaba embarazada. \u00cdtem DHS DV20. Per\u00edodo de referencia: de por vida (cualquier embarazo). Formulaci\u00f3n amplia ''alguien''. Si verdadero, se pregunta gbv_safety_violence_preg_perpetrator.\n", "fr": "Si quelqu''un a jamais frapp\u00e9, gifl\u00e9, donn\u00e9 des coups de pied ou fait autre chose pour blesser physiquement la r\u00e9pondante pendant qu''elle \u00e9tait enceinte. Item DHS DV20. P\u00e9riode de r\u00e9f\u00e9rence : \u00e0 vie (toute grossesse). Formulation large ''quelqu''un''. Si vrai, gbv_safety_violence_preg_perpetrator est pos\u00e9e.\n"}, "id": "gbv_safety_violence_during_pregnancy", "label": {"en": "Safety signal: physical violence during pregnancy", "es": "Se\u00f1al de seguridad: violencia f\u00edsica durante el embarazo", "fr": "Signal de s\u00e9curit\u00e9 : violence physique pendant la grossesse"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
      bibliography_refs: dhs-domestic-violence-module-2022,ellsberg-heise-2005
  gbv_safety_violence_preg_perpetrator:
    title:
      en: 'Safety signal: perpetrator of violence during pregnancy'
      fr: 'Signal de sécurité : auteur de la violence pendant la grossesse'
      es: 'Señal de seguridad: perpetrador de la violencia durante el embarazo'
    description:
      en: 'Who perpetrated physical violence against the respondent during pregnancy. DHS instrument item DV21. Multi-select; record all perpetrators mentioned. Skip logic: asked only if gbv_safety_violence_during_pregnancy = true. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: Qui a exercé des violences physiques contre la répondante pendant sa grossesse. Item DHS DV21. Sélection multiple; noter tous les auteurs mentionnés. Posée uniquement si gbv_safety_violence_during_pregnancy = vrai.
      es: Quién ejerció violencia física contra la encuestada durante el embarazo. Ítem DHS DV21. Selección múltiple; registrar todos los perpetradores mencionados. Se pregunta solo si gbv_safety_violence_during_pregnancy = verdadero.
