\u00edcola en los \u00faltimos 12 meses", "fr": "Contact avec la vulgarisation agricole au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  facility_open_hours_suitable:
    title:
      en: Facility opening hours suitable for the household
      fr: Horaires d'ouverture de l'établissement adaptés au ménage
      es: Horario del establecimiento adecuado para el hogar
    description:
      en: Whether the nearest health facility's opening hours meet the household's usual needs for routine and urgent care. Sphere 2018 requires facilities to be accessible; night and weekend unavailability is a commonly reported access barrier in humanitarian settings and in the WHO People's Voice Survey. The five-level scale (`suitability-5-level`) allows respondents to distinguish full, partial, and no adequacy.
      fr: Si les horaires d'ouverture de l'établissement de santé le plus proche répondent aux besoins habituels du ménage pour les soins de routine et urgents. Sphere 2018 exige que les établissements soient accessibles ; l'indisponibilité de nuit et le week-end est une barrière d'accès couramment signalée dans les contextes humanitaires et dans l'enquête People's Voice Survey de l'OMS. L'échelle à cinq niveaux (`suitability-5-level`) permet aux répondants de distinguer une adéquation totale, partielle ou absente.
      es: Si el horario de apertura del establecimiento de salud más cercano cubre las necesidades habituales del hogar para atención rutinaria y urgente. Sphere 2018 exige que los establecimientos sean accesibles; la falta de atención nocturna y de fin de semana es una barrera de acceso comúnmente reportada en contextos humanitarios y en la People's Voice Survey de la OMS. La escala de cinco niveles (`suitability-5-level`) permite a los encuestados distinguir adecuación total, parcial o nula.
    slot_uri: aidops:facility_open_hours_suitable
    range: Suitability5Level
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018", "who-pvs-2023"], "cardinality": "single", "category": "health_access_geography", "core": false, "definition": {"en": "Whether the nearest health facility''s opening hours meet the household''s usual needs for routine and urgent care. Sphere 2018 requires facilities to be accessible; night and weekend unavailability is a commonly reported access barrier in humanitarian settings and in the WHO People''s Voice Survey. The five-level scale (`suitability-5-level`) allows respondents to distinguish full, partial, and no adequacy.", "es": "Si el horario de apertura del establecimiento de salud m\u00e1s cercano cubre las necesidades habituales del hogar para atenci\u00f3n rutinaria y urgente. Sphere 2018 exige que los establecimientos sean accesibles; la falta de atenci\u00f3n nocturna y de fin de semana es una barrera de acceso com\u00fanmente reportada en contextos humanitarios y en la People''s Voice Survey de la OMS. La escala de cinco niveles (`suitability-5-level`) permite a los encuestados distinguir adecuaci\u00f3n total, parcial o nula.", "fr": "Si les horaires d''ouverture de l''\u00e9tablissement de sant\u00e9 le plus proche r\u00e9pondent aux besoins habituels du m\u00e9nage pour les soins de routine et urgents. Sphere 2018 exige que les \u00e9tablissements soient accessibles ; l''indisponibilit\u00e9 de nuit et le week-end est une barri\u00e8re d''acc\u00e8s couramment signal\u00e9e dans les contextes humanitaires et dans l''enqu\u00eate People''s Voice Survey de l''OMS. L''\u00e9chelle \u00e0 cinq niveaux (`suitability-5-level`) permet aux r\u00e9pondants de distinguer une ad\u00e9quation totale, partielle ou absente."}, "id": "facility_open_hours_suitable", "label": {"en": "Facility opening hours suitable for the household", "es": "Horario del establecimiento adecuado para el hogar", "fr": "Horaires d''ouverture de l''\u00e9tablissement adapt\u00e9s au m\u00e9nage"}, "maturity": 