  hf_service_gbv_clinical_rape:
    title:
      en: Provides clinical management of rape survivors
      fr: Fournit la prise en charge clinique des survivant(e)s de viol
      es: Presta manejo clínico de sobrevivientes de violación
    description:
      en: 'Whether the facility provides clinical management of rape survivors per the IAWG/WHO protocol: emergency contraception within 120 hours, HIV post-exposure prophylaxis (PEP) within 72 hours, STI prophylaxis, and psychological first aid. Reported by the facility in-charge. MISP Objective 2 core tracer. Politically and culturally sensitive in some contexts and can expose the facility or staff; data collection requires appropriate safeguarding per IASC GBV Guidelines.'
      fr: 'Si l''établissement fournit la prise en charge clinique des survivant(e)s de viol selon le protocole IAWG/OMS : contraception d''urgence dans les 120 heures, prophylaxie post-exposition au VIH (PPE) dans les 72 heures, prophylaxie des IST et premiers secours psychologiques. Rapporté par le responsable de l''établissement. Indicateur traceur central MISP Objectif 2. Politiquement et culturellement sensible dans certains contextes et peut exposer l''établissement ou le personnel ; la collecte de données nécessite des garanties appropriées selon les Directives VBG de l''IASC.'
      es: 'Si el establecimiento presta el manejo clínico de sobrevivientes de violación según el protocolo IAWG/OMS: anticoncepción de emergencia dentro de 120 horas, profilaxis posterior a la exposición al VIH (PEP) dentro de 72 horas, profilaxis de ITS y primeros auxilios psicológicos. Reportado por el responsable del establecimiento. Indicador trazador central MISP Objetivo 2. Política y culturalmente sensible en algunos contextos y puede exponer al establecimiento o al personal; la recolección de datos requiere salvaguardas apropiadas según las Directrices VBG del IASC.'
    slot_uri: aidops:hf_service_gbv_clinical_rape
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "classification", "core": true, "definition": {"en": "Whether the facility provides clinical management of rape survivors per the IAWG/WHO protocol: emergency contraception within 120 hours, HIV post-exposure prophylaxis (PEP) within 72 hours, STI prophylaxis, and psychological first aid. Reported by the facility in-charge. MISP Objective 2 core tracer. Politically and culturally sensitive in some contexts and can expose the facility or staff; data collection requires appropriate safeguarding per IASC GBV Guidelines.", "es": "Si el establecimiento presta el manejo cl\u00ednico de sobrevivientes de violaci\u00f3n seg\u00fan el protocolo IAWG/OMS: anticoncepci\u00f3n de emergencia dentro de 120 horas, profilaxis posterior a la exposici\u00f3n al VIH (PEP) dentro de 72 horas, profilaxis de ITS y primeros auxilios psicol\u00f3gicos. Reportado por el responsable del establecimiento. Indicador trazador central MISP Objetivo 2. Pol\u00edtica y culturalmente sensible en algunos contextos y puede exponer al establecimiento o al personal; la recolecci\u00f3n de datos requiere salvaguardas apropiadas seg\u00fan las Directrices VBG del IASC.", "fr": "Si l''\u00e9tablissement fournit la prise en charge clinique des survivant(e)s de viol selon le protocole IAWG/OMS : contraception d''urgence dans les 120 heures, prophylaxie post-exposition au VIH (PPE) dans les 72 heures, prophylaxie des IST et premiers secours psychologiques. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Indicateur traceur central MISP Objectif 2. Politiquement et culturellement sensible dans certains contextes et peut exposer l''\u00e9tablissement ou le personnel ; la collecte de donn\u00e9es n\u00e9cessite des garanties appropri\u00e9es selon les Directives VBG de l''IASC."}, "id": "hf_service_gbv_clinical_rape", "label": {"en": "Provides clinical management of rape survivors", "es": "Presta manejo cl\u00ednico de sobrevivientes de violaci\u00f3n", "fr": "Fournit la prise en charge clinique des survivant(e)s de viol"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
  hf_service_hiv_continuity:
    title:
      en: Can continue antiretroviral therapy (ART) for people already on treatment
      fr: Peut poursuivre la thérapie antirétrovirale (TAR) pour les personnes déjà sous traitement
      es: Puede continuar la terapia antirretroviral (TAR) para personas ya en tratamiento
    description:
      en: 'Whether the facility can continue antiretroviral therapy for people already on treatment, including prevention of mother-to-child transmission (PMTCT). Not ''starts new ART'' — just ''can continue''. Reported by the facility in-charge. MISP Objective 3. Sensitive: HIV service availability can identify the facility as serving a stigmatized population. `dont_know` is retained as a distinct response. Extended (non-core).'
      fr: 'Si l''établissement peut poursuivre la thérapie antirétrovirale pour les personnes déjà sous traitement, y compris la prévention de la transmission mère-enfant (PTME). Pas « initier une nouvelle TAR » — seulement « peut poursuivre ». Rapporté par le responsable de l''établissement. MISP Objectif 3. Sensible : la disponibilité des services VIH peut identifier l''établissement comme desservant une population stigmatisée. `dont_know` est conservé comme réponse distincte. Étendu (non-core).'
      es: 'Si el establecimiento puede continuar la terapia antirretroviral para personas ya en tratamiento, incluida la prevención de la transmisión madre-hijo (PTMH). No «iniciar nueva TAR» — solo «puede continuar». Reportado por el responsable del establecimiento. MISP Objetivo 3. Sensible: la disponibilidad de servicios VIH puede identificar al establecimiento como atención a una población estigmatizada. `dont_know` se mantiene como respuesta distinta. Extendido (no-core).'
    slot_uri: aidops:hf_service_hiv_continuity
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "classification", "core": false, "definition": {"en": "Whether the facility can continue antiretroviral therapy for people already on treatment, including prevention of mother-to-child transmission (PMTCT). Not ''starts new ART'' \u2014 just ''can continue''. Reported by the facility in-charge. MISP Objective 3. Sensitive: HIV service availability can identify the facility as serving a stigmatized population. `dont_know` is retained as a distinct response. Extended (non-core).", "es": "Si el establecimiento puede continuar la terapia antirretroviral para personas ya en tratamiento, incluida la prevenci\u00f3n de la transmisi\u00f3n madre-hijo (PTMH). No \u00abiniciar nueva TAR\u00bb \u2014 solo \u00abpuede continuar\u00bb. Reportado por el responsable del establecimiento. MISP Objetivo 3. Sensible: la disponibilidad de servicios VIH puede identificar al establecimiento como atenci\u00f3n a una poblaci\u00f3n estigmatizada. `dont_know` se mantiene como respuesta distinta. Extendido (no-core).", "fr": "Si l''\u00e9tablissement peut poursuivre la th\u00e9rapie antir\u00e9trovirale pour les personnes d\u00e9j\u00e0 sous traitement, y compris la pr\u00e9vention de la transmission m\u00e8re-enfant (PTME). Pas \u00ab initier une nouvelle TAR \u00bb \u2014 seulement \u00ab peut poursuivre \u00bb. Rapport\u00e9 par le responsable de l''\u00e9tablissement. MISP Objectif 3. Sensible : la disponibilit\u00e9 des services VIH peut identifier l''\u00e9tablissement comme desservant une population stigmatis\u00e9e. `dont_know` est conserv\u00e9 comme r\u00e9ponse distincte. \u00c9tendu (non-core)."}, "id": "hf_service_hiv_continuity", "label": {"en": "Can continue antiretroviral therapy (ART) for people already on treatment", "es": "Puede continuar la terapia antirretroviral (TAR) para personas ya en tratamiento", "fr": "Peut poursuivre la th\u00e9rapie antir\u00e9trovirale (TAR) pour les personnes d\u00e9j\u00e0 sous traitement"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  hf_service_ipd:
    title:
      en: Offers inpatient (IPD) services
      fr: Offre des services d'hospitalisation (IPD)
      es: Ofrece servicios de hospitalización (IPD)
    description:
      en: 'Whether the facility offers inpatient (IPD) services: has beds and keeps patients overnight. Reported by the facility in-charge. Distinguishes hospitals and health centres with beds from health posts. SARA service-availability tracer. Extended (non-core).'
      fr: 'Si l''établissement offre des services d''hospitalisation (IPD) : dispose de lits et garde les patients pendant la nuit. Rapporté par le responsable de l''établissement. Distingue les hôpitaux et centres de santé avec lits des postes de santé. Indicateur traceur SARA de disponibilité des services. Étendu (non-core).'
      es: 'Si el establecimiento ofrece servicios de hospitalización (IPD): tiene camas y mantiene pacientes durante la noche. Reportado por el responsable del establecimiento. Distingue hospitales y centros de salud con camas de los puestos de salud. Indicador trazador SARA de disponibilidad de servicios. Extendido (no-core).'
