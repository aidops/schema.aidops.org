  statelessness_risk:
    title:
      en: Statelessness risk (household)
      fr: Risque d'apatridie (ménage)
      es: Riesgo de apatridia (hogar)
    description:
      en: 'Whether any member of the household has difficulty proving that they belong to any country — for example, someone who cannot obtain a national identity document from any country and whose nationality is unclear. This is a screening question, not a legal determination. It is distinct from DisplacementProfile.refugee_status_determination, which captures UNHCR-adjudicated status. This flag captures households where statelessness has NOT yet been formally recognized but may exist. Enumerator guidance: ''This question is about anyone in your household who cannot easily prove their nationality — even if they have lived here their whole life.'' Based on UNHCR Statelessness Handbook (2014) and GPC PAF Domain 2.'
      fr: 'Si un membre du ménage a du mal à prouver qu''il appartient à un pays quelconque — par exemple, quelqu''un qui ne peut pas obtenir de document d''identité national dans aucun pays et dont la nationalité est incertaine. Il s''agit d''une question de dépistage, pas d''une détermination juridique. Elle est distincte de DisplacementProfile.refugee_status_determination, qui saisit le statut adjugé par l''UNHCR. Cet indicateur capture les ménages où l''apatridie n''a pas encore été formellement reconnue mais peut exister. Instruction pour l''enquêteur : ''Cette question concerne toute personne dans votre ménage qui ne peut pas facilement prouver sa nationalité — même si elle a vécu ici toute sa vie.'' Fondé sur le Manuel sur l''apatridie de l''UNHCR (2014) et le GPC PAF Domaine 2.'
      es: 'Si algún miembro del hogar tiene dificultades para demostrar que pertenece a algún país — por ejemplo, alguien que no puede obtener un documento de identidad nacional de ningún país y cuya nacionalidad es incierta. Esta es una pregunta de cribado, no una determinación legal. Es distinta de DisplacementProfile.refugee_status_determination, que captura el estatus adjudicado por el ACNUR. Este indicador captura hogares donde la apatridia aún no ha sido formalmente reconocida pero puede existir. Instrucción para el encuestador: ''Esta pregunta es sobre cualquier persona en su hogar que no pueda demostrar fácilmente su nacionalidad, incluso si ha vivido aquí toda su vida.'' Basado en el Manual sobre Apatridia del ACNUR (2014) y el GPC PAF Dominio 2.'
    slot_uri: aidops:statelessness_risk
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "reach-protection-monitoring-2022", "unhcr-statelessness-handbook-2014"], "cardinality": "single", "category": "civil_documentation", "core": false, "definition": {"en": "Whether any member of the household has difficulty proving that they belong to any country \u2014 for example, someone who cannot obtain a national identity document from any country and whose nationality is unclear. This is a screening question, not a legal determination. It is distinct from DisplacementProfile.refugee_status_determination, which captures UNHCR-adjudicated status. This flag captures households where statelessness has NOT yet been formally recognized but may exist. Enumerator guidance: ''This question is about anyone in your household who cannot easily prove their nationality \u2014 even if they have lived here their whole life.'' Based on UNHCR Statelessness Handbook (2014) and GPC PAF Domain 2.", "es": "Si alg\u00fan miembro del hogar tiene dificultades para demostrar que pertenece a alg\u00fan pa\u00eds \u2014 por ejemplo, alguien que no puede obtener un documento de identidad nacional de ning\u00fan pa\u00eds y cuya nacionalidad es incierta. Esta es una pregunta de cribado, no una determinaci\u00f3n legal. Es distinta de DisplacementProfile.refugee_status_determination, que captura el estatus adjudicado por el ACNUR. Este indicador captura hogares donde la apatridia a\u00fan no ha sido formalmente reconocida pero puede existir. Instrucci\u00f3n para el encuestador: ''Esta pregunta es sobre cualquier persona en su hogar que no pueda demostrar f\u00e1cilmente su nacionalidad, incluso si ha vivido aqu\u00ed toda su vida.'' Basado en el Manual sobre Apatridia del ACNUR (2014) y el GPC PAF Dominio 2.", "fr": "Si un membre du m\u00e9nage a du mal \u00e0 prouver qu''il appartient \u00e0 un pays quelconque \u2014 par exemple, quelqu''un qui ne peut pas obtenir de document d''identit\u00e9 national dans aucun pays et dont la nationalit\u00e9 est incertaine. Il s''agit d''une question de d\u00e9pistage, pas d''une d\u00e9termination juridique. Elle est distincte de DisplacementProfile.refugee_status_determination, qui saisit le statut adjug\u00e9 par l''UNHCR. Cet indicateur capture les m\u00e9nages o\u00f9 l''apatridie n''a pas encore \u00e9t\u00e9 formellement reconnue mais peut exister. Instruction pour l''enqu\u00eateur : ''Cette question concerne toute personne dans votre m\u00e9nage qui ne peut pas facilement prouver sa nationalit\u00e9 \u2014 m\u00eame si elle a v\u00e9cu ici toute sa vie.'' Fond\u00e9 sur le Manuel sur l''apatridie de l''UNHCR (2014) et le GPC PAF Domaine 2."}, "id": "statelessness_risk", "label": {"en": "Statelessness risk (household)", "es": "Riesgo de apatridia (hogar)", "fr": "Risque d''apatridie (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: gpc-paf-2021,reach-protection-monitoring-2022,unhcr-statelessness-handbook-2014
  sti_sought_care:
    title:
      en: Sought care for STI symptoms
      fr: A cherché des soins pour des symptômes d'IST
      es: Buscó atención por síntomas de ITS
    description:
      en: 'Whether the woman sought care for any STI symptoms experienced in the last 12 months (WHO reproductive health indicators). Ask only if sti_symptoms_last_12_months = ''yes''. Care-seeking gap indicator: the difference between symptom prevalence and care-seeking reveals unmet need for STI treatment services.'
      fr: 'Si la femme a cherché des soins pour des symptômes d''IST présentés au cours des 12 derniers mois (indicateurs OMS de santé reproductive). Demander uniquement si sti_symptoms_last_12_months = ''yes''. Indicateur de déficit de recours aux soins : l''écart entre la prévalence des symptômes et le recours aux soins révèle un besoin non satisfait de services de traitement des IST.'
      es: 'Si la mujer buscó atención por algún síntoma de ITS experimentado en los últimos 12 meses (indicadores de salud reproductiva de la OMS). Preguntar solo si sti_symptoms_last_12_months = ''yes''. Indicador de brecha en la búsqueda de atención: la diferencia entre la prevalencia de síntomas y la búsqueda de atención revela una necesidad insatisfecha de servicios de tratamiento de ITS.'
    slot_uri: aidops:sti_sought_care
    range: YesNoPnta
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["who-rh-indicators-2006"], "cardinality": "single", "category": "sti_hiv", "core": false, "definition": {"en": "Whether the woman sought care for any STI symptoms experienced in the last 12 months (WHO reproductive health indicators). Ask only if sti_symptoms_last_12_months = ''yes''. Care-seeking gap indicator: the difference between symptom prevalence and care-seeking reveals unmet need for STI treatment services.", "es": "Si la mujer busc\u00f3 atenci\u00f3n por alg\u00fan s\u00edntoma de ITS experimentado en los \u00faltimos 12 meses (indicadores de salud reproductiva de la OMS). Preguntar solo si sti_symptoms_last_12_months = ''yes''. Indicador de brecha en la b\u00fasqueda de atenci\u00f3n: la diferencia entre la prevalencia de s\u00edntomas y la b\u00fasqueda de atenci\u00f3n revela una necesidad insatisfecha de servicios de tratamiento de ITS.", "fr": "Si la femme a cherch\u00e9 des soins pour des sympt\u00f4mes d''IST pr\u00e9sent\u00e9s au cours des 12 derniers mois (indicateurs OMS de sant\u00e9 reproductive). Demander uniquement si sti_symptoms_last_12_months = ''yes''. Indicateur de d\u00e9ficit de recours aux soins : l''\u00e9cart entre la pr\u00e9valence des sympt\u00f4mes et le recours aux soins r\u00e9v\u00e8le un besoin non satisfait de services de traitement des IST."}, "id": "sti_sought_care", "label": {"en": "Sought care for STI symptoms", "es": "Busc\u00f3 atenci\u00f3n por s\u00edntomas de ITS", "fr": "A cherch\u00e9 des soins pour des sympt\u00f4mes d''IST"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-pnta"}'
