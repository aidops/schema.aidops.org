  climate_appropriate_clothing_all:
    title:
      en: Every member has climate-appropriate clothing
      fr: Chaque membre dispose de vêtements adaptés au climat
      es: Cada miembro tiene ropa apropiada para el clima
    description:
      en: 'Whether every member of the household has at least two full sets of climate-appropriate clothing in good condition and the correct size. Sphere Standard 1 key indicator: two full sets of clothing per person in the correct size, culturally appropriate and gender-sensitive.'
      fr: 'Si chaque membre du ménage dispose d''au moins deux ensembles complets de vêtements adaptés au climat, en bon état et à la bonne taille. Indicateur clé de la Norme Sphère 1 : deux ensembles complets de vêtements par personne à la bonne taille, culturellement appropriés et sensibles au genre.'
      es: 'Si cada miembro del hogar tiene al menos dos juegos completos de ropa apropiada para el clima, en buen estado y de la talla correcta. Indicador clave de la Norma Esfera 1: dos juegos completos de ropa por persona de la talla correcta, culturalmente apropiados y sensibles al género.'
    slot_uri: aidops:climate_appropriate_clothing_all
    range: NfiSufficiency
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Whether every member of the household has at least two full sets of climate-appropriate clothing in good condition and the correct size. Sphere Standard 1 key indicator: two full sets of clothing per person in the correct size, culturally appropriate and gender-sensitive.", "es": "Si cada miembro del hogar tiene al menos dos juegos completos de ropa apropiada para el clima, en buen estado y de la talla correcta. Indicador clave de la Norma Esfera 1: dos juegos completos de ropa por persona de la talla correcta, culturalmente apropiados y sensibles al g\u00e9nero.", "fr": "Si chaque membre du m\u00e9nage dispose d''au moins deux ensembles complets de v\u00eatements adapt\u00e9s au climat, en bon \u00e9tat et \u00e0 la bonne taille. Indicateur cl\u00e9 de la Norme Sph\u00e8re 1 : deux ensembles complets de v\u00eatements par personne \u00e0 la bonne taille, culturellement appropri\u00e9s et sensibles au genre."}, "id": "climate_appropriate_clothing_all", "label": {"en": "Every member has climate-appropriate clothing", "es": "Cada miembro tiene ropa apropiada para el clima", "fr": "Chaque membre dispose de v\u00eatements adapt\u00e9s au climat"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "nfi-sufficiency"}'
      bibliography_refs: sphere-2018
  climate_children_withdrawn_school_past_event:
    title:
      en: Children withdrawn from school or schooling delayed due to climate hazard in the past 5 years
      fr: Enfants retirés de l'école ou scolarité retardée en raison d'un aléa climatique au cours des 5 dernières années
      es: Niños retirados de la escuela o escolarización retrasada por peligro climático en los últimos 5 años
    description:
      en: 'Item asking whether the household has had to withdraw children from school or delay their schooling because of losses or hardship caused by drought, flood, or another climate hazard in the past 5 years. A binary maladaptation flag capturing human-capital depletion through climate-induced school withdrawal. Applies when the household has at least one school-age child (age 5–17); mark ''not_applicable_no_school_age_children'' if clearly no children in that age range. Coordination with EducationProfile if collected: this item is a binary climate-maladaptation flag; the detailed school enrollment and attendance record belongs on EducationProfile. Valid codes: yes / no / not_applicable_no_school_age_children / dont_know.'
      fr: Item demandant si le ménage a dû retirer des enfants de l'école ou retarder leur scolarité en raison de pertes ou de difficultés causées par la sécheresse, les inondations ou un autre aléa climatique au cours des 5 dernières années. Indicateur binaire de maladaptation capturant la déplétion du capital humain par retrait scolaire lié au climat. S'applique lorsque le ménage a au moins un enfant d'âge scolaire (5–17 ans).
      es: Ítem que pregunta si el hogar ha tenido que retirar niños de la escuela o retrasar su escolarización por pérdidas o dificultades causadas por sequía, inundaciones u otro peligro climático en los últimos 5 años. Indicador binario de maladaptación que captura el agotamiento del capital humano por retiro escolar relacionado con el clima. Aplica cuando el hogar tiene al menos un niño en edad escolar (5–17 años).
    slot_uri: aidops:climate_children_withdrawn_school_past_event
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Item asking whether the household has had to withdraw children from school or delay their schooling because of losses or hardship caused by drought, flood, or another climate hazard in the past 5 years. A binary maladaptation flag capturing human-capital depletion through climate-induced school withdrawal. Applies when the household has at least one school-age child (age 5\u201317); mark ''not_applicable_no_school_age_children'' if clearly no children in that age range. Coordination with EducationProfile if collected: this item is a binary climate-maladaptation flag; the detailed school enrollment and attendance record belongs on EducationProfile. Valid codes: yes / no / not_applicable_no_school_age_children / dont_know.\n", "es": "\u00cdtem que pregunta si el hogar ha tenido que retirar ni\u00f1os de la escuela o retrasar su escolarizaci\u00f3n por p\u00e9rdidas o dificultades causadas por sequ\u00eda, inundaciones u otro peligro clim\u00e1tico en los \u00faltimos 5 a\u00f1os. Indicador binario de maladaptaci\u00f3n que captura el agotamiento del capital humano por retiro escolar relacionado con el clima. Aplica cuando el hogar tiene al menos un ni\u00f1o en edad escolar (5\u201317 a\u00f1os).\n", "fr": "Item demandant si le m\u00e9nage a d\u00fb retirer des enfants de l''\u00e9cole ou retarder leur scolarit\u00e9 en raison de pertes ou de difficult\u00e9s caus\u00e9es par la s\u00e9cheresse, les inondations ou un autre al\u00e9a climatique au cours des 5 derni\u00e8res ann\u00e9es. Indicateur binaire de maladaptation capturant la d\u00e9pl\u00e9tion du capital humain par retrait scolaire li\u00e9 au climat. S''applique lorsque le m\u00e9nage a au moins un enfant d''\u00e2ge scolaire (5\u201317 ans).\n"}, "id": "climate_children_withdrawn_school_past_event", "label": {"en": "Children withdrawn from school or schooling delayed due to climate hazard in the past 5 years", "es": "Ni\u00f1os retirados de la escuela o escolarizaci\u00f3n retrasada por peligro clim\u00e1tico en los \u00faltimos 5 a\u00f1os", "fr": "Enfants retir\u00e9s de l''\u00e9cole ou scolarit\u00e9 retard\u00e9e en raison d''un al\u00e9a climatique au cours des 5 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
