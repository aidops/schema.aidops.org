      es: 'El momento del primer amamantamiento después del nacimiento. Redacción publicada (OMS/UNICEF 2021): ''¿Cuánto tiempo después del nacimiento se puso a (NOMBRE) al pecho por primera vez?'' Se utiliza para calcular el indicador de inicio temprano de la lactancia materna (EIBF): un niño logra el EIBF si está codificado como ''within_1_hour''. Preguntar solo si iycf_ever_breastfed = verdadero.'
