  hf_referral_functioning:
    title:
      en: Functioning referral system to higher-level facility
      fr: Système de référence fonctionnel vers un établissement de niveau supérieur
      es: Sistema de referencia funcional hacia un establecimiento de nivel superior
    description:
      en: 'Whether the facility has a functioning referral system to a higher-level facility, defined as having (1) a documented destination facility, (2) a working communication channel to that destination, and (3) an agreed transport mechanism. Three-level response: `yes` (all three elements in place), `partial` (destination known but transport unreliable or transport arranged ad hoc), `no` (no documented referral system). Reported by the facility in-charge. Sphere 2018 Health Action; SARA; MISP Objective 4.'
      fr: 'Si l''établissement dispose d''un système de référence fonctionnel vers un établissement de niveau supérieur, défini comme : (1) un établissement de destination documenté, (2) un canal de communication opérationnel vers cette destination et (3) un mécanisme de transport convenu. Réponse à trois niveaux : `yes` (les trois éléments en place), `partial` (destination connue mais transport peu fiable ou transport organisé au cas par cas), `no` (aucun système de référence documenté). Rapporté par le responsable de l''établissement. Sphere 2018 Action Santé ; SARA ; MISP Objectif 4.'
      es: 'Si el establecimiento cuenta con un sistema de referencia funcional hacia un establecimiento de nivel superior, definido como: (1) un establecimiento de destino documentado, (2) un canal de comunicación operativo hacia ese destino y (3) un mecanismo de transporte acordado. Respuesta de tres niveles: `yes` (los tres elementos en su lugar), `partial` (destino conocido pero transporte poco fiable o transporte organizado ad hoc), `no` (sin sistema de referencia documentado). Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud; SARA; MISP Objetivo 4.'
    slot_uri: aidops:hf_referral_functioning
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "governance", "core": true, "definition": {"en": "Whether the facility has a functioning referral system to a higher-level facility, defined as having (1) a documented destination facility, (2) a working communication channel to that destination, and (3) an agreed transport mechanism. Three-level response: `yes` (all three elements in place), `partial` (destination known but transport unreliable or transport arranged ad hoc), `no` (no documented referral system). Reported by the facility in-charge. Sphere 2018 Health Action; SARA; MISP Objective 4.", "es": "Si el establecimiento cuenta con un sistema de referencia funcional hacia un establecimiento de nivel superior, definido como: (1) un establecimiento de destino documentado, (2) un canal de comunicaci\u00f3n operativo hacia ese destino y (3) un mecanismo de transporte acordado. Respuesta de tres niveles: `yes` (los tres elementos en su lugar), `partial` (destino conocido pero transporte poco fiable o transporte organizado ad hoc), `no` (sin sistema de referencia documentado). Reportado por el responsable del establecimiento. Esfera 2018 Acci\u00f3n de Salud; SARA; MISP Objetivo 4.", "fr": "Si l''\u00e9tablissement dispose d''un syst\u00e8me de r\u00e9f\u00e9rence fonctionnel vers un \u00e9tablissement de niveau sup\u00e9rieur, d\u00e9fini comme : (1) un \u00e9tablissement de destination document\u00e9, (2) un canal de communication op\u00e9rationnel vers cette destination et (3) un m\u00e9canisme de transport convenu. R\u00e9ponse \u00e0 trois niveaux : `yes` (les trois \u00e9l\u00e9ments en place), `partial` (destination connue mais transport peu fiable ou transport organis\u00e9 au cas par cas), `no` (aucun syst\u00e8me de r\u00e9f\u00e9rence document\u00e9). Rapport\u00e9 par le responsable de l''\u00e9tablissement. Sphere 2018 Action Sant\u00e9 ; SARA ; MISP Objectif 4."}, "id": "hf_referral_functioning", "label": {"en": "Functioning referral system to higher-level facility", "es": "Sistema de referencia funcional hacia un establecimiento de nivel superior", "fr": "Syst\u00e8me de r\u00e9f\u00e9rence fonctionnel vers un \u00e9tablissement de niveau sup\u00e9rieur"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
  hf_referral_transport_available:
    title:
      en: Dedicated transport available for referral
      fr: Transport dédié disponible pour la référence
      es: Transporte dedicado disponible para referencia
    description:
      en: 'Whether dedicated transport (ambulance, hired vehicle with a standing agreement, or other formal arrangement) is available for referral when needed. Three-level response: `yes` (transport available 24/7), `partial` (transport available during day hours only, or on-call / ad hoc arrangement), `no` (no dedicated transport). The 24/7 level is the Sphere and MISP expectation for delivery referral. Reported by the facility in-charge. Sphere 2018 Health Action; MISP Objective 4.'
      fr: 'Si un transport dédié (ambulance, véhicule loué avec accord permanent, ou autre arrangement formel) est disponible pour la référence en cas de besoin. Réponse à trois niveaux : `yes` (transport disponible 24 h/24 et 7 j/7), `partial` (transport disponible uniquement pendant les heures de jour, ou arrangement sur appel / au cas par cas), `no` (aucun transport dédié). Le niveau 24/7 est l''attente Sphere et MISP pour la référence obstétricale. Rapporté par le responsable de l''établissement. Sphere 2018 Action Santé ; MISP Objectif 4.'
      es: 'Si hay transporte dedicado (ambulancia, vehículo contratado con acuerdo permanente u otro arreglo formal) disponible para referencia cuando se necesite. Respuesta de tres niveles: `yes` (transporte disponible 24/7), `partial` (transporte disponible solo durante horas diurnas, o arreglo de guardia / ad hoc), `no` (sin transporte dedicado). El nivel 24/7 es la expectativa de Esfera y MISP para la referencia de parto. Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud; MISP Objetivo 4.'
    slot_uri: aidops:hf_referral_transport_available
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "governance", "core": true, "definition": {"en": "Whether dedicated transport (ambulance, hired vehicle with a standing agreement, or other formal arrangement) is available for referral when needed. Three-level response: `yes` (transport available 24/7), `partial` (transport available during day hours only, or on-call / ad hoc arrangement), `no` (no dedicated transport). The 24/7 level is the Sphere and MISP expectation for delivery referral. Reported by the facility in-charge. Sphere 2018 Health Action; MISP Objective 4.", "es": "Si hay transporte dedicado (ambulancia, veh\u00edculo contratado con acuerdo permanente u otro arreglo formal) disponible para referencia cuando se necesite. Respuesta de tres niveles: `yes` (transporte disponible 24/7), `partial` (transporte disponible solo durante horas diurnas, o arreglo de guardia / ad hoc), `no` (sin transporte dedicado). El nivel 24/7 es la expectativa de Esfera y MISP para la referencia de parto. Reportado por el responsable del establecimiento. Esfera 2018 Acci\u00f3n de Salud; MISP Objetivo 4.", "fr": "Si un transport d\u00e9di\u00e9 (ambulance, v\u00e9hicule lou\u00e9 avec accord permanent, ou autre arrangement formel) est disponible pour la r\u00e9f\u00e9rence en cas de besoin. R\u00e9ponse \u00e0 trois niveaux : `yes` (transport disponible 24 h/24 et 7 j/7), `partial` (transport disponible uniquement pendant les heures de jour, ou arrangement sur appel / au cas par cas), `no` (aucun transport d\u00e9di\u00e9). Le niveau 24/7 est l''attente Sphere et MISP pour la r\u00e9f\u00e9rence obst\u00e9tricale. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Sphere 2018 Action Sant\u00e9 ; MISP Objectif 4."}, "id": "hf_referral_transport_available", "label": {"en": "Dedicated transport available for referral", "es": "Transporte dedicado disponible para referencia", "fr": "Transport d\u00e9di\u00e9 disponible pour la r\u00e9f\u00e9rence"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
