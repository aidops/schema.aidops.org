    range: CropUsePurpose
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Household-level orientation of last season''s crop production: mostly for consumption, mixed consumption and sale, or mostly for sale, plus a `dont_know` option. Uses vocabulary `crop-use-purpose`. Captures the subsistence-vs-market dimension at household level without attempting to quantify market volumes, which are out of scope for this profile. Based on MICS6 AFP and the LSMS-ISA crop-disposition module. Asked only when `hh_grew_crops_last_season` is `yes`.", "es": "Orientaci\u00f3n a nivel del hogar de la producci\u00f3n de cultivos de la temporada pasada: principalmente para consumo, mixto consumo y venta, o principalmente para venta, m\u00e1s una opci\u00f3n `dont_know`. Usa el vocabulario `crop-use-purpose`. Captura la dimensi\u00f3n subsistencia vs mercado a nivel del hogar sin intentar cuantificar los vol\u00famenes de mercado, que est\u00e1n fuera del alcance de este perfil. Basado en MICS6 AFP y en el m\u00f3dulo de disposici\u00f3n de cultivos de LSMS-ISA. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.", "fr": "Orientation au niveau du m\u00e9nage de la production v\u00e9g\u00e9tale de la saison derni\u00e8re : principalement pour la consommation, mixte consommation et vente, ou principalement pour la vente, plus une option `dont_know`. Utilise le vocabulaire `crop-use-purpose`. Saisit la dimension subsistance vs march\u00e9 au niveau du m\u00e9nage sans chercher \u00e0 quantifier les volumes commerciaux, qui sortent du cadre de ce profil. Bas\u00e9 sur le MICS6 AFP et le module de disposition des cultures du LSMS-ISA. Pos\u00e9e uniquement lorsque `hh_grew_crops_last_season` est `yes`."}, "id": "crop_use_purpose", "label": {"en": "Crop use purpose (subsistence vs. market)", "es": "Prop\u00f3sito del uso de cultivos (subsistencia vs. mercado)", "fr": "Usage des cultures (subsistance vs march\u00e9)"}, "maturity":