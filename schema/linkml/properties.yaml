  handwashing_facility_location:
    title:
      en: Handwashing facility location
      fr: Emplacement du dispositif de lavage des mains
      es: Ubicación de la instalación para lavado de manos
    description:
      en: Location of the handwashing facility relative to the dwelling. Asked only when handwashing_facility_present is not 'no'. Location affects accessibility and use at critical junctures. Sphere guidance recommends handwashing facilities near latrines in displacement settings.
      fr: Emplacement du dispositif de lavage des mains par rapport au logement. Demandé uniquement quand handwashing_facility_present n'est pas 'no'. L'emplacement affecte l'accessibilité et l'utilisation aux moments critiques. Les directives Sphère recommandent des dispositifs de lavage des mains près des latrines dans les contextes de déplacement.
      es: Ubicación de la instalación para lavado de manos en relación con la vivienda. Preguntado solo cuando handwashing_facility_present no es 'no'. La ubicación afecta la accesibilidad y el uso en momentos críticos. Las directrices de Esfera recomiendan instalaciones para lavado de manos cerca de las letrinas en entornos de desplazamiento.
    slot_uri: aidops:handwashing_facility_location
    range: HandwashingFacilityLocation
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "hygiene", "core": false, "definition": {"en": "Location of the handwashing facility relative to the dwelling. Asked only when handwashing_facility_present is not ''no''. Location affects accessibility and use at critical junctures. Sphere guidance recommends handwashing facilities near latrines in displacement settings.", "es": "Ubicaci\u00f3n de la instalaci\u00f3n para lavado de manos en relaci\u00f3n con la vivienda. Preguntado solo cuando handwashing_facility_present no es ''no''. La ubicaci\u00f3n afecta la accesibilidad y el uso en momentos cr\u00edticos. Las directrices de Esfera recomiendan instalaciones para lavado de manos cerca de las letrinas en entornos de desplazamiento.", "fr": "Emplacement du dispositif de lavage des mains par rapport au logement. Demand\u00e9 uniquement quand handwashing_facility_present n''est pas ''no''. L''emplacement affecte l''accessibilit\u00e9 et l''utilisation aux moments critiques. Les directives Sph\u00e8re recommandent des dispositifs de lavage des mains pr\u00e8s des latrines dans les contextes de d\u00e9placement."}, "id": "handwashing_facility_location", "label": {"en": "Handwashing facility location", "es": "Ubicaci\u00f3n de la instalaci\u00f3n para lavado de manos", "fr": "Emplacement du dispositif de lavage des mains"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey", "mics7"], "vocabulary": "handwashing-facility-location"}'
      bibliography_refs: jmp-core
  handwashing_facility_present:
    title:
      en: Handwashing facility present
      fr: Présence d'un dispositif de lavage des mains
      es: Instalación para lavado de manos presente
    description:
      en: 'Whether the household has a place where hands can be washed, and whether it was directly observed by the enumerator. JMP H1 (enumerator observation). The JMP-recommended method is to ask to see the handwashing facility; direct observation is more reliable than self-report. A handwashing facility may be fixed (sink with tap) or mobile (tippy-tap, bucket with tap, designated jug or basin). Codes: yes_observed = facility seen by enumerator; yes_not_observed_but_reported = household reports facility but enumerator could not observe; no = no facility.'
      fr: 'Si le ménage dispose d''un endroit pour se laver les mains, et si cela a été directement observé par l''énumérateur. JMP H1 (observation de l''énumérateur). La méthode recommandée par le JMP est de demander à voir le dispositif de lavage des mains ; l''observation directe est plus fiable que l''auto-déclaration. Un dispositif de lavage des mains peut être fixe (évier avec robinet) ou mobile (tippy-tap, seau avec robinet, cruche ou bassine désignée). Codes : yes_observed = dispositif vu par l''énumérateur ; yes_not_observed_but_reported = le ménage déclare disposer d''un dispositif mais l''énumérateur n''a pas pu l''observer ; no = aucun dispositif.'
      es: 'Si el hogar tiene un lugar donde se pueden lavar las manos, y si fue directamente observado por el enumerador. JMP H1 (observación del enumerador). El método recomendado por el JMP es pedir ver la instalación de lavado de manos; la observación directa es más confiable que la autodeclaración. Una instalación para lavado de manos puede ser fija (fregadero con grifo) o móvil (tippy-tap, cubo con grifo, jarra o palangana designada). Códigos: yes_observed = instalación vista por el enumerador; yes_not_observed_but_reported = el hogar reporta instalación pero el enumerador no pudo observarla; no = sin instalación.'
    slot_uri: aidops:handwashing_facility_present
    range: HwfPresenceObservation
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "hygiene", "core": true, "definition": {"en": "Whether the household has a place where hands can be washed, and whether it was directly observed by the enumerator. JMP H1 (enumerator observation). The JMP-recommended method is to ask to see the handwashing facility; direct observation is more reliable than self-report. A handwashing facility may be fixed (sink with tap) or mobile (tippy-tap, bucket with tap, designated jug or basin). Codes: yes_observed = facility seen by enumerator; yes_not_observed_but_reported = household reports facility but enumerator could not observe; no = no facility.", "es": "Si el hogar tiene un lugar donde se pueden lavar las manos, y si fue directamente observado por el enumerador. JMP H1 (observaci\u00f3n del enumerador). El m\u00e9todo recomendado por el JMP es pedir ver la instalaci\u00f3n de lavado de manos; la observaci\u00f3n directa es m\u00e1s confiable que la autodeclaraci\u00f3n. Una instalaci\u00f3n para lavado de manos puede ser fija (fregadero con grifo) o m\u00f3vil (tippy-tap, cubo con grifo, jarra o palangana designada). C\u00f3digos: yes_observed = instalaci\u00f3n vista por el enumerador; yes_not_observed_but_reported = el hogar reporta instalaci\u00f3n pero el enumerador no pudo observarla; no = sin instalaci\u00f3n.", "fr": "Si le m\u00e9nage dispose d''un endroit pour se laver les mains, et si cela a \u00e9t\u00e9 directement observ\u00e9 par l''\u00e9num\u00e9rateur. JMP H1 (observation de l''\u00e9num\u00e9rateur). La m\u00e9thode recommand\u00e9e par le JMP est de demander \u00e0 voir le dispositif de lavage des mains ; l''observation directe est plus fiable que l''auto-d\u00e9claration. Un dispositif de lavage des mains peut \u00eatre fixe (\u00e9vier avec robinet) ou mobile (tippy-tap, seau avec robinet, cruche ou bassine d\u00e9sign\u00e9e). Codes : yes_observed = dispositif vu par l''\u00e9num\u00e9rateur ; yes_not_observed_but_reported = le m\u00e9nage d\u00e9clare disposer d''un dispositif mais l''\u00e9num\u00e9rateur n''a pas pu l''observer ; no = aucun dispositif."}, "id": "handwashing_facility_present", "label": {"en": "Handwashing facility present", "es": "Instalaci\u00f3n para lavado de manos presente", "fr": "Pr\u00e9sence d''un dispositif de lavage des mains"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7"], "vocabulary": "hwf-presence-observation"}'
