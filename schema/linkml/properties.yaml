      es: Si la actividad económica del niño requería trabajar con herramientas peligrosas (como cuchillos) u operar maquinaria pesada en los últimos 7 días. MICS 6 CL5. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Un sí señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil.
