lications de protection et VBG ; les entr\u00e9es de vocabulaire pour ces codes portent un marqueur de sensibilit\u00e9, et les enqu\u00eateurs devraient poser l''item dans un cadre priv\u00e9. Les syst\u00e8mes en aval devraient appliquer un traitement de sensibilit\u00e9 partielle aux enregistrements o\u00f9 l''un ou l''autre code de refus de permission est s\u00e9lectionn\u00e9."}, "id": "warning_action_barriers", "label": {"en": "Barriers to taking protective action (multi-select)", "es": "Barreras para tomar acci\u00f3n de protecci\u00f3n (selecci\u00f3n m\u00faltiple)", "fr": "Obstacles \u00e0 l''action de protection (s\u00e9lection multiple)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-action-barrier"}'
      bibliography_refs: iasc-aap-early-response-2020,ifrc-fbf-ma-guide-2019,ifrc-pgi-aa-toolkit,paul-dutt-2010-cyclone-sidr,roy-et-al-2015-odisha,start-network-def
  warning_action_primary:
    title:
      en: Primary protective action taken
      fr: Action de protection principale prise
      es: Acción de protección principal tomada
    description:
      en: The single most important protective action the household took in response to the warning. Single-select from the warning-protective-action vocabulary. Applicable only when warning_actions_taken contains at least one code other than 'no_action_taken'. Used by dashboards to compute the 'share of households taking the principal recommended action' used in IFRC FbF post-distribution monitoring.
      fr: L'action de protection unique la plus importante que le ménage a prise en réponse à l'alerte. Sélection unique dans le vocabulaire warning-protective-action. Applicable uniquement si warning_actions_taken contient au moins un code autre que « no_action_taken ». Utilisé par les tableaux de bord pour calculer la « part des ménages prenant l'action recommandée principale » utilisée dans le suivi post-distribution du FbF de la FICR.
      es: La única acción de protección más importante que el hogar tomó en respuesta a la alerta. Selección única del vocabulario warning-protective-action. Aplicable solo cuando warning_actions_taken contiene al menos un código distinto de «no_action_taken». Utilizado por los paneles para calcular la «proporción de hogares que toman la acción recomendada principal» empleada en el seguimiento posterior a la distribución del FbF de la FICR.
    slot_uri: aidops:warning_action_primary
    range: WarningProtectiveAction
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-aa-eap-template-2022", "ifrc-fbf-ma-guide-2019"], "cardinality": "single", "category": "hazard_event", "core": false, "definition": {"en": "The single most important protective action the household took in response to the warning. Single-select from the warning-protective-action vocabulary. Applicable only when warning_actions_taken contains at least one code other than ''no_action_taken''. Used by dashboards to compute the ''share of households taking the principal recommended action'' used in IFRC FbF post-distribution monitoring.", "es": "La \u00fanica acci\u00f3n de protecci\u00f3n m\u00e1s importante que el hogar tom\u00f3 en respuesta a la alerta. Selecci\u00f3n \u00fanica del vocabulario warning-protective-action. Aplicable solo cuando warning_actions_taken contiene al menos un c\u00f3digo distinto de \u00abno_action_taken\u00bb. Utilizado por los paneles para calcular la \u00abproporci\u00f3n de hogares que toman la acci\u00f3n recomendada principal\u00bb empleada en el seguimiento posterior a la distribuci\u00f3n del FbF de la FICR.", "fr": "L''action de protection unique la plus importante que le m\u00e9nage a prise en r\u00e9ponse \u00e0 l''alerte. S\u00e9lection unique dans le vocabulaire warning-protective-action. Applicable uniquement si warning_actions_taken contient au moins un code autre que \u00ab no_action_taken \u00bb. Utilis\u00e9 par les tableaux de bord pour calculer la \u00ab part des m\u00e9nages prenant l''action recommand\u00e9e principale \u00bb utilis\u00e9e dans le suivi post-distribution du FbF de la FICR."}, "id": "warning_action_primary", "label": {"en": "Primary protective action taken", "es": "Acci\u00f3n de protecci\u00f3n principal tomada", "fr": "Action de protection principale prise"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-protective-action"}'
      bibliography_refs: ifrc-aa-eap-template-2022,ifrc-fbf-ma-guide-2019
  warning_actions_taken:
    title:
      en: Protective actions taken in response to warning (multi-select)
      fr: Actions de protection prises en réponse à l'alerte (sélection multiple)
      es: Acciones de protección tomadas en respuesta a la alerta (selección múltiple)
    description:
      en: The protective or mitigating actions the household took in response to the warning. Multi-select from the warning-protective-action vocabulary, covering evacuation (partial or full), movement of livestock and valuable assets, shelter reinforcement, stockpiling (food, water, fuel, cash), information seeking, alerting neighbors and relatives, prioritized relocation of vulnerable members, securing identity documents, partial evacuation of some members, and an explicit 'no action taken' code. Applicable only when warning_received is yes. The 'no_action_taken' code is mutually exclusive with all other codes; form logic should enforce this. The protection-concern note for 'sent_members_to_safer_location' combined with who was left behind is flagged in the vocabulary; the item itself is non-sensitive at household level.
      fr: Les actions de protection ou d'atténuation que le ménage a prises en réponse à l'alerte. Sélection multiple dans le vocabulaire warning-protective-action, couvrant l'évacuation (partielle ou totale), le déplacement du bétail et des biens de valeur, le renforcement de l'abri, le stockage (nourriture, eau, combustible, argent), la recherche d'information, l'alerte des voisins et des proches, la relocalisation prioritaire des membres vulnérables, la mise en sécurité des documents d'identité, l'évacuation partielle de certains membres, et un code explicite « aucune action prise ». Applicable uniquement si warning_received est oui. Le code « no_action_taken » est mutuellement exclusif avec tous les autres codes ; la logique du formulaire doit l'imposer. La note de préoccupation de protection pour « sent_members_to_safer_location » combinée avec qui a été laissé derrière est signalée dans le vocabulaire ; l'item lui-même est non sensible au niveau du ménage.
      es: Las acciones de protección o mitigación que el hogar tomó en respuesta a la alerta. Selección múltiple del vocabulario warning-protective-action, que abarca evacuación (parcial o total), traslado de ganado y bienes valiosos, refuerzo del refugio, acopio (alimentos, agua, combustible, dinero), búsqueda de información, aviso a vecinos y familiares, reubicación prioritaria de miembros vulnerables, resguardo de documentos de identidad, evacuación parcial de algunos miembros, y un código explícito «ninguna acción tomada». Aplicable solo cuando warning_received es sí. El código «no_action_taken» es mutuamente excluyente con todos los demás códigos; la lógica del formulario debe aplicar esta regla. La nota de preocupación de protección para «sent_members_to_safer_location» combinada con quién se quedó atrás está señalada en el vocabulario; el ítem en sí es no sensible a nivel del hogar.
    slot_uri: aidops:warning_actions_taken
    range: WarningProtectiveAction
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gfdrr-aa-toolkit-2023", "ifrc-aa-eap-template-2022", "ifrc-fbf-ma-guide-2019", "start-network-def"], "cardinality": "multiple", "category": "hazard_event", "core": true, "definition": {"en": "The protective or mitigating actions the household took in response to the warning. Multi-select from the warning-protective-action vocabulary, covering evacuation (partial or full), movement of livestock and valuable assets, shelter reinforcement, stockpiling (food, water, fuel, cash), information seeking, alerting neighbors and relatives, prioritized relocation of vulnerable members, securing identity documents, partial evacuation of some members, and an explicit ''no action taken'' code. Applicable only when warning_received is yes. The ''no_action_taken'' code is mutually exclusive with all other codes; form logic should enforce this. The protection-concern note for ''sent_members_to_safer_location'' combined with who was left behind is flagged in the vocabulary; the item itself is non-sensitive at household level.", "es": "Las acciones de protecci\u00f3n o mitigaci\u00f3n que el hogar tom\u00f3 en respuesta a la alerta. Selecci\u00f3n m\u00faltiple del vocabulario warning-protective-action, que abarca evacuaci\u00f3n (parcial o total), traslado de ganado y bienes valiosos, refuerzo del refugio, acopio (alimentos, agua, combustible, dinero), b\u00fasqueda de informaci\u00f3n, aviso a vecinos y familiares, reubicaci\u00f3n prioritaria de miembros vulnerables, resguardo de documentos de identidad, evacuaci\u00f3n parcial de algunos miembros, y un c\u00f3digo expl\u00edcito \u00abninguna acci\u00f3n tomada\u00bb. Aplicable solo cuando warning_received es s\u00ed. El c\u00f3digo \u00abno_action_taken\u00bb es mutuamente excluyente con todos los dem\u00e1s c\u00f3digos; la l\u00f3gica del formulario debe aplicar esta regla. La nota de preocupaci\u00f3n de protecci\u00f3n para \u00absent_members_to_safer_location\u00bb combinada con qui\u00e9n se qued\u00f3 atr\u00e1s est\u00e1 se\u00f1alada en el vocabulario; el \u00edtem en s\u00ed es no sensible a nivel del hogar.", "fr": "Les actions de protection ou d''att\u00e9nuation que le m\u00e9nage a prises en r\u00e9ponse \u00e0 l''alerte. S\u00e9lection multiple dans le vocabulaire warning-protective-action, couvrant l''\u00e9vacuation (partielle ou totale), le d\u00e9placement du b\u00e9tail et des biens de valeur, le renforcement de l''abri, le stockage (nourriture, eau, combustible, argent), la recherche d''information, l''alerte des voisins et des proches, la relocalisation prioritaire des membres vuln\u00e9rables, la mise en s\u00e9curit\u00e9 des documents d''identit\u00e9, l''\u00e9vacuation partielle de certains membres, et un code explicite \u00ab aucune action prise \u00bb. Applicable uniquement si warning_received est oui. Le code \u00ab no_action_taken \u00bb est mutuellement exclusif avec tous les autres codes ; la logique du formulaire doit l''imposer. La note de pr\u00e9occupation de protection pour \u00ab sent_members_to_safer_location \u00bb combin\u00e9e avec qui a \u00e9t\u00e9 laiss\u00e9 derri\u00e8re est signal\u00e9e dans le vocabulaire ; l''item lui-m\u00eame est non sensible au niveau du m\u00e9nage."}, "id": "warning_actions_taken", "label": {"en": "Protective actions taken in response to warning (multi-select)", "es": "Acciones de protecci\u00f3n tomadas en respuesta a la alerta (selecci\u00f3n m\u00faltiple)", "fr": "Actions de protection prises en r\u00e9ponse \u00e0 l''alerte (s\u00e9lection multiple)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-protective-action"}'
      bibliography_refs: gfdrr-aa-toolkit-2023,ifrc-aa-eap-template-2022,ifrc-fbf-ma-guide-2019,start-network-def
  warning_channel_primary:
    title:
      en: Primary warning channel
      fr: Canal principal de l'alerte
      es: Canal principal de la alerta
    description:
      en: The single channel through which the household first received the warning. Captures the 'first channel' signal separately from the full set of channels on which the warning was received, which is captured by warning_channels_all. Applicable only when warning_received is yes. Values drawn from the warning-channel vocabulary (radio, television, SMS, mobile app, phone call, loudspeaker or siren, door-to-door by official or volunteer, community or religious leader, neighbor or family, social media, newspaper or poster, other).
      fr: Le canal unique par lequel le ménage a reçu l'alerte pour la première fois. Capture le signal « premier canal » séparément de l'ensemble complet des canaux par lesquels l'alerte a été reçue, qui est capturé par warning_channels_all. Applicable uniquement si warning_received est oui. Valeurs issues du vocabulaire warning-channel (radio, télévision, SMS, application mobile, appel téléphonique, haut-parleur ou sirène, porte-à-porte par agent ou volontaire, chef communautaire ou religieux, voisin ou famille, réseaux sociaux, journal ou affiche, autre).
      es: El único canal por el cual el hogar recibió por primera vez la alerta. Captura la señal «primer canal» separada del conjunto completo de canales por los que se recibió la alerta, que se captura en warning_channels_all. Aplicable solo cuando warning_received es sí. Valores tomados del vocabulario warning-channel (radio, televisión, SMS, aplicación móvil, llamada telefónica, altavoz o sirena, puerta a puerta por funcionario o voluntario, líder comunitario o religioso, vecino o familiar, redes sociales, periódico o cartel, otro).
