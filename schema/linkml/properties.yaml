  insurance_type:
    title:
      en: Type(s) of health insurance covering household members
      fr: Type(s) d'assurance maladie couvrant les membres du ménage
      es: Tipo(s) de seguro de salud que cubre a miembros del hogar
    description:
      en: Type(s) of health insurance scheme covering one or more household members. Multi-select because a single household may have members with different schemes (e.g., an employer-based scheme for one member and an NGO voucher for another). Types follow the WHO health financing taxonomy (prepaid public, private commercial, community-based, employer-based, donor-subsidized). Ask only if `any_hh_member_insured` is `yes`.
      fr: Type(s) de régime d'assurance maladie couvrant un ou plusieurs membres du ménage. Sélection multiple car un même ménage peut avoir des membres relevant de régimes différents (par exemple, un régime lié à l'employeur pour un membre et un bon d'une ONG pour un autre). Les types suivent la taxonomie de financement de la santé de l'OMS (prépaiement public, commercial privé, communautaire, lié à l'employeur, subventionné par un bailleur). Ne poser que si `any_hh_member_insured` est `yes`.
      es: Tipo(s) de esquema de seguro de salud que cubre a uno o más miembros del hogar. Selección múltiple porque un mismo hogar puede tener miembros con diferentes esquemas (p. ej., un esquema vinculado al empleador para un miembro y un vale de una ONG para otro). Los tipos siguen la taxonomía de financiamiento de la salud de la OMS (prepago público, comercial privado, comunitario, vinculado al empleador, subvencionado por donante). Preguntar solo si `any_hh_member_insured` es `yes`.
    slot_uri: aidops:insurance_type
    range: HealthInsuranceType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-health-insurance-as45"], "cardinality": "multiple", "category": "health_access_insurance", "core": true, "definition": {"en": "Type(s) of health insurance scheme covering one or more household members. Multi-select because a single household may have members with different schemes (e.g., an employer-based scheme for one member and an NGO voucher for another). Types follow the WHO health financing taxonomy (prepaid public, private commercial, community-based, employer-based, donor-subsidized). Ask only if `any_hh_member_insured` is `yes`.", "es": "Tipo(s) de esquema de seguro de salud que cubre a uno o m\u00e1s miembros del hogar. Selecci\u00f3n m\u00faltiple porque un mismo hogar puede tener miembros con diferentes esquemas (p. ej., un esquema vinculado al empleador para un miembro y un vale de una ONG para otro). Los tipos siguen la taxonom\u00eda de financiamiento de la salud de la OMS (prepago p\u00fablico, comercial privado, comunitario, vinculado al empleador, subvencionado por donante). Preguntar solo si `any_hh_member_insured` es `yes`.", "fr": "Type(s) de r\u00e9gime d''assurance maladie couvrant un ou plusieurs membres du m\u00e9nage. S\u00e9lection multiple car un m\u00eame m\u00e9nage peut avoir des membres relevant de r\u00e9gimes diff\u00e9rents (par exemple, un r\u00e9gime li\u00e9 \u00e0 l''employeur pour un membre et un bon d''une ONG pour un autre). Les types suivent la taxonomie de financement de la sant\u00e9 de l''OMS (pr\u00e9paiement public, commercial priv\u00e9, communautaire, li\u00e9 \u00e0 l''employeur, subventionn\u00e9 par un bailleur). Ne poser que si `any_hh_member_insured` est `yes`."}, "id": "insurance_type", "label": {"en": "Type(s) of health insurance covering household members", "es": "Tipo(s) de seguro de salud que cubre a miembros del hogar", "fr": "Type(s) d''assurance maladie couvrant les membres du m\u00e9nage"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "health-insurance-type"}'
