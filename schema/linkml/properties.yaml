  gbv_initiation_ever:
    title:
      en: 'Respondent-initiated physical act against partner (optional): ever'
      fr: 'Acte physique initié par la répondante contre le partenaire (optionnel) : jamais'
      es: 'Acto físico iniciado por la encuestada contra el compañero (opcional): alguna vez'
    description:
      en: 'Whether the respondent has ever hit, slapped, kicked, or done anything else to physically hurt her current or most recent husband/partner at times when he was not already beating or physically hurting her. DHS instrument item DV09. Lifetime reference period (ever). OPTIONAL: this item is omitted in some country DHS implementations due to respondent burden and acquiescence bias concerns. Deployment teams must explicitly decide to include this item. Note: responses could be used against the respondent in legal proceedings in some jurisdictions; the restricted sensitivity tier is especially important for this property. If true, gbv_initiation_12m_freq is asked. DHS-7+ compatible where included. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: 'Si la répondante a jamais frappé, giflé, donné des coups de pied ou fait autre chose pour blesser physiquement son partenaire lorsqu''il ne la frappait pas déjà. Item DHS DV09. OPTIONNEL : omis dans certaines enquêtes DHS nationales. La tier de sensibilité restreinte est particulièrement importante pour cet item. Si vrai, gbv_initiation_12m_freq est posée. Compatible DHS-7+.'
      es: 'Si la encuestada alguna vez golpeó, abofeteó, pateó o hizo algo para lastimar físicamente a su compañero en momentos en que él no la estaba golpeando. Ítem DHS DV09. OPCIONAL: omitido en algunas encuestas DHS nacionales. El nivel de sensibilidad restringida es especialmente importante para este ítem. Si verdadero, se pregunta gbv_initiation_12m_freq. Compatible DHS-7+.'
    slot_uri: aidops:gbv_initiation_ever
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "cardinality": "single", "category": "gbv_safety_signals", "core": false, "definition": {"en": "Whether the respondent has ever hit, slapped, kicked, or done anything else to physically hurt her current or most recent husband/partner at times when he was not already beating or physically hurting her. DHS instrument item DV09. Lifetime reference period (ever). OPTIONAL: this item is omitted in some country DHS implementations due to respondent burden and acquiescence bias concerns. Deployment teams must explicitly decide to include this item. Note: responses could be used against the respondent in legal proceedings in some jurisdictions; the restricted sensitivity tier is especially important for this property. If true, gbv_initiation_12m_freq is asked. DHS-7+ compatible where included. Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Si la encuestada alguna vez golpe\u00f3, abofete\u00f3, pate\u00f3 o hizo algo para lastimar f\u00edsicamente a su compa\u00f1ero en momentos en que \u00e9l no la estaba golpeando. \u00cdtem DHS DV09. OPCIONAL: omitido en algunas encuestas DHS nacionales. El nivel de sensibilidad restringida es especialmente importante para este \u00edtem. Si verdadero, se pregunta gbv_initiation_12m_freq. Compatible DHS-7+.\n", "fr": "Si la r\u00e9pondante a jamais frapp\u00e9, gifl\u00e9, donn\u00e9 des coups de pied ou fait autre chose pour blesser physiquement son partenaire lorsqu''il ne la frappait pas d\u00e9j\u00e0. Item DHS DV09. OPTIONNEL : omis dans certaines enqu\u00eates DHS nationales. La tier de sensibilit\u00e9 restreinte est particuli\u00e8rement importante pour cet item. Si vrai, gbv_initiation_12m_freq est pos\u00e9e. Compatible DHS-7+.\n"}, "id": "gbv_initiation_ever", "label": {"en": "Respondent-initiated physical act against partner (optional): ever", "es": "Acto f\u00edsico iniciado por la encuestada contra el compa\u00f1ero (opcional): alguna vez", "fr": "Acte physique initi\u00e9 par la r\u00e9pondante contre le partenaire (optionnel) : jamais"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
