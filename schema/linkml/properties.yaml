t que des m\u00e9canismes informels/coutumiers peuvent ne pas \u00eatre prot\u00e9g\u00e9s contre les violations d''acteurs \u00e9tatiques ou arm\u00e9s. Fond\u00e9 sur GPC PAF Domaine 2 ; Sph\u00e8re Principe de protection 4 ; REACH Syrie (2022) module de connaissance des m\u00e9canismes de r\u00e9f\u00e9rence. Remarque : ce vocabulaire chevauche partiellement gbv-service-type (GBVRiskProfile) \u2014 canal de signalement g\u00e9n\u00e9ral vs. type de service sp\u00e9cifique VBG. Opportunit\u00e9 de consolidation signal\u00e9e pour un futur lot ; conserver s\u00e9par\u00e9ment pour l''instant."}, "id": "protection_referral_channel_known", "label": {"en": "Protection referral channel known", "es": "Canal de derivaci\u00f3n de protecci\u00f3n conocido", "fr": "Type de m\u00e9canisme de signalement de protection connu"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "protection-referral-channel"}'
