  hh_has_cultivable_land:
    title:
      en: Household has access to agricultural land
      fr: Le ménage a accès à une terre agricole
      es: El hogar tiene acceso a tierra agrícola
    description:
      en: Whether any member of the household owns, rents, or has the right to use any agricultural land — for crops, a kitchen garden, or grazing. Gateway item for the land-access and crop-production blocks of AgricultureProfile; most subsequent items skip when this is `no` or `dont_know`. Wording adapted from DHS-8 `hv244` ('Does any member of this household own any agricultural land?'), broadened to include rental and usufruct arrangements to match the MICS6 AFP module and FAO WCA 2020 holding definition. `dont_know` is retained as a distinct valid response.
      fr: Si un membre du ménage possède, loue ou a le droit d'utiliser de la terre agricole — pour des cultures, un jardin potager ou du pâturage. Question porte d'entrée des blocs accès à la terre et production végétale de AgricultureProfile ; la plupart des items suivants sont sautés si la réponse est « no » ou « dont_know ». Formulation adaptée de l'item `hv244` du DHS-8 (« Un membre de ce ménage possède-t-il une terre agricole ? »), élargie pour inclure la location et l'usufruit afin de correspondre au module AFP du MICS6 et à la définition d'exploitation du WCA 2020 de la FAO. « dont_know » est conservé comme réponse valide distincte.
      es: Si algún miembro del hogar posee, arrienda o tiene derecho a usar tierra agrícola — para cultivos, huerto o pastoreo. Ítem de entrada a los bloques de acceso a la tierra y producción de cultivos de AgricultureProfile; la mayoría de los ítems siguientes se omiten si la respuesta es 'no' o 'dont_know'. Formulación adaptada del ítem `hv244` del DHS-8 ('¿Algún miembro de este hogar posee tierra agrícola?'), ampliada para incluir arrendamiento y usufructo para alinearse con el módulo AFP de MICS6 y la definición de explotación del WCA 2020 de la FAO. 'dont_know' se mantiene como respuesta válida distinta.
    slot_uri: aidops:hh_has_cultivable_land
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-household-possessions"], "cardinality": "single", "category": "context", "core": true, "definition": {"en": "Whether any member of the household owns, rents, or has the right to use any agricultural land \u2014 for crops, a kitchen garden, or grazing. Gateway item for the land-access and crop-production blocks of AgricultureProfile; most subsequent items skip when this is `no` or `dont_know`. Wording adapted from DHS-8 `hv244` (''Does any member of this household own any agricultural land?''), broadened to include rental and usufruct arrangements to match the MICS6 AFP module and FAO WCA 2020 holding definition. `dont_know` is retained as a distinct valid response.", "es": "Si alg\u00fan miembro del hogar posee, arrienda o tiene derecho a usar tierra agr\u00edcola \u2014 para cultivos, huerto o pastoreo. \u00cdtem de entrada a los bloques de acceso a la tierra y producci\u00f3n de cultivos de AgricultureProfile; la mayor\u00eda de los \u00edtems siguientes se omiten si la respuesta es ''no'' o ''dont_know''. Formulaci\u00f3n adaptada del \u00edtem `hv244` del DHS-8 (''\u00bfAlg\u00fan miembro de este hogar posee tierra agr\u00edcola?''), ampliada para incluir arrendamiento y usufructo para alinearse con el m\u00f3dulo AFP de MICS6 y la definici\u00f3n de explotaci\u00f3n del WCA 2020 de la FAO. ''dont_know'' se mantiene como respuesta v\u00e1lida distinta.", "fr": "Si un membre du m\u00e9nage poss\u00e8de, loue ou a le droit d''utiliser de la terre agricole \u2014 pour des cultures, un jardin potager ou du p\u00e2turage. Question porte d''entr\u00e9e des blocs acc\u00e8s \u00e0 la terre et production v\u00e9g\u00e9tale de AgricultureProfile ; la plupart des items suivants sont saut\u00e9s si la r\u00e9ponse est \u00ab no \u00bb ou \u00ab dont_know \u00bb. Formulation adapt\u00e9e de l''item `hv244` du DHS-8 (\u00ab Un membre de ce m\u00e9nage poss\u00e8de-t-il une terre agricole ? \u00bb), \u00e9largie pour inclure la location et l''usufruit afin de correspondre au module AFP du MICS6 et \u00e0 la d\u00e9finition d''exploitation du WCA 2020 de la FAO. \u00ab dont_know \u00bb est conserv\u00e9 comme r\u00e9ponse valide distincte."}, "id": "hh_has_cultivable_land", "label": {"en": "Household has access to agricultural land", "es": "El hogar tiene acceso a tierra agr\u00edcola", "fr": "Le m\u00e9nage a acc\u00e8s \u00e0 une terre agricole"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: dhs-household-possessions
