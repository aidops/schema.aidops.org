  hf_accessible_for_disability:
    title:
      en: Physically accessible for persons with disabilities
      fr: Physiquement accessible aux personnes en situation de handicap
      es: Físicamente accesible para personas con discapacidad
    description:
      en: 'Whether the facility is physically accessible for persons with mobility impairments: ramp or step-free entry and accessible latrine. Three-level response: `yes` (fully accessible on both counts), `partial` (one criterion met but not both), `no` (neither). Observed by the enumerator. Sphere 2018 inclusion standards; WASH FIT inclusiveness indicator; aligned with Washington Group inclusion framing used in FunctioningProfile.'
      fr: 'Si l''établissement est physiquement accessible aux personnes à mobilité réduite : entrée avec rampe ou sans marche et latrine accessible. Réponse à trois niveaux : `yes` (pleinement accessible selon les deux critères), `partial` (un critère rempli mais pas les deux), `no` (aucun). Observé par l''enquêteur. Normes d''inclusion de Sphère 2018 ; indicateur d''inclusivité WASH FIT ; aligné sur le cadrage d''inclusion du Washington Group utilisé dans FunctioningProfile.'
      es: 'Si el establecimiento es físicamente accesible para personas con discapacidad motora: entrada con rampa o sin escalones y letrina accesible. Respuesta de tres niveles: `yes` (plenamente accesible en ambos criterios), `partial` (un criterio cumplido pero no ambos), `no` (ninguno). Observado por el enumerador. Normas de inclusión de Esfera 2018; indicador de inclusividad WASH FIT; alineado con el marco de inclusión del Grupo de Washington usado en FunctioningProfile.'
    slot_uri: aidops:hf_accessible_for_disability
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-unicef-wash-fit-2022"], "cardinality": "single", "category": "habitability", "core": true, "definition": {"en": "Whether the facility is physically accessible for persons with mobility impairments: ramp or step-free entry and accessible latrine. Three-level response: `yes` (fully accessible on both counts), `partial` (one criterion met but not both), `no` (neither). Observed by the enumerator. Sphere 2018 inclusion standards; WASH FIT inclusiveness indicator; aligned with Washington Group inclusion framing used in FunctioningProfile.", "es": "Si el establecimiento es f\u00edsicamente accesible para personas con discapacidad motora: entrada con rampa o sin escalones y letrina accesible. Respuesta de tres niveles: `yes` (plenamente accesible en ambos criterios), `partial` (un criterio cumplido pero no ambos), `no` (ninguno). Observado por el enumerador. Normas de inclusi\u00f3n de Esfera 2018; indicador de inclusividad WASH FIT; alineado con el marco de inclusi\u00f3n del Grupo de Washington usado en FunctioningProfile.", "fr": "Si l''\u00e9tablissement est physiquement accessible aux personnes \u00e0 mobilit\u00e9 r\u00e9duite : entr\u00e9e avec rampe ou sans marche et latrine accessible. R\u00e9ponse \u00e0 trois niveaux : `yes` (pleinement accessible selon les deux crit\u00e8res), `partial` (un crit\u00e8re rempli mais pas les deux), `no` (aucun). Observ\u00e9 par l''enqu\u00eateur. Normes d''inclusion de Sph\u00e8re 2018 ; indicateur d''inclusivit\u00e9 WASH FIT ; align\u00e9 sur le cadrage d''inclusion du Washington Group utilis\u00e9 dans FunctioningProfile."}, "id": "hf_accessible_for_disability", "label": {"en": "Physically accessible for persons with disabilities", "es": "F\u00edsicamente accesible para personas con discapacidad", "fr": "Physiquement accessible aux personnes en situation de handicap"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
      bibliography_refs: who-unicef-wash-fit-2022
  hf_catchment_population:
    title:
      en: Estimated catchment population
      fr: Population couverte estimée
      es: Población de captación estimada
    description:
      en: Estimated population served by the facility in its catchment area. Typically drawn from the facility register or from the local health authority. Used with the Sphere 2018 emergency-phase benchmark of one health facility per 10,000 affected persons. Extended (non-core) — populate when a defensible catchment figure is on record. Reported.
      fr: Population estimée desservie par l'établissement dans sa zone de couverture. Généralement issue du registre de l'établissement ou de l'autorité sanitaire locale. Utilisée avec le repère Sphère 2018 de phase d'urgence d'un établissement pour 10 000 personnes affectées. Étendue (non-core) — à renseigner lorsqu'un chiffre de couverture défendable est consigné. Rapporté.
      es: Población estimada atendida por el establecimiento en su área de captación. Generalmente tomada del registro del establecimiento o de la autoridad sanitaria local. Usada con la referencia de fase de emergencia de Esfera 2018 de un establecimiento por cada 10.000 personas afectadas. Extendida (no-core) — complete cuando exista una cifra defendible de captación en el registro. Reportado.
    slot_uri: aidops:hf_catchment_population
    range: integer
    annotations:
