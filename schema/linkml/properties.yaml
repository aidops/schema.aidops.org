 Search for Common Ground.", "fr": "Niveau de coh\u00e9sion sociale ou de tension intergroupe per\u00e7u par la communaut\u00e9 au cours des 90 derniers jours, cod\u00e9 sur la taxonomie social-cohesion-tension-level (tr\u00e8s bonnes relations, aucune tension ; g\u00e9n\u00e9ralement bonnes, tension mineure ; mitig\u00e9es ; tendues, incidents occasionnels ; tr\u00e8s tendues, incidents fr\u00e9quents ; ne sait pas ; pr\u00e9f\u00e8re ne pas r\u00e9pondre). Saisit les relations entre populations d''accueil et d\u00e9plac\u00e9es, entre groupes ethniques, religieux ou claniques, ou entre r\u00e9sidents et nouveaux arrivants. SENSIBLE : identifie les lignes de fracture ethnique, politique ou religieuse et peut exposer les groupes minoritaires \u00e0 des repr\u00e9sailles si divulgu\u00e9es sans agr\u00e9gation. Doit \u00eatre rapport\u00e9e uniquement \u00e0 un niveau agr\u00e9g\u00e9 (zone de programme ou sup\u00e9rieur). Tir\u00e9 du Cadre de coh\u00e9sion sociale PNUD-DPPA, du Cadre de coexistence pacifique du HCR et des orientations d''\u00e9valuation de sensibilit\u00e9 au conflit d''Interpeace / Search for Common Ground."}, "id": "cn_social_cohesion_level", "label": {"en": "Social cohesion level", "es": "Nivel de cohesi\u00f3n social", "fr": "Niveau de coh\u00e9sion sociale"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "social-cohesion-tension-level"}'
