  mk_road_access_status:
    title:
      en: Road access status
      fr: Statut d'accessibilité routière
      es: Estado de acceso vial
    description:
      en: Whether the market is physically reachable by road for most of the population it typically serves, assessed by the enumerator from their own travel experience and key vendor informant input on catchment-area access. Enumerators should assess access from the communities the market serves, not only from their own approach route.
      fr: Si le marché est physiquement accessible par route pour la plupart de la population qu'il dessert habituellement, évalué par l'enquêteur à partir de sa propre expérience de déplacement et des informations des informateurs clés vendeurs sur l'accès à la zone de chalandise.
      es: Si el mercado es físicamente accesible por carretera para la mayor parte de la población que normalmente sirve, evaluado por el enumerador a partir de su propia experiencia de viaje y la información de informantes clave vendedores sobre el acceso a la zona de captación.
    slot_uri: aidops:mk_road_access_status
    range: MarketAccessibilityLevel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-market-assessment-2014", "calp-misma-2018", "icrc-ram-2014", "reach-jmmi", "wfp-mag-2021"], "cardinality": "single", "category": "market_accessibility", "core": true, "definition": {"en": "Whether the market is physically reachable by road for most of the population it typically serves, assessed by the enumerator from their own travel experience and key vendor informant input on catchment-area access. Enumerators should assess access from the communities the market serves, not only from their own approach route.", "es": "Si el mercado es f\u00edsicamente accesible por carretera para la mayor parte de la poblaci\u00f3n que normalmente sirve, evaluado por el enumerador a partir de su propia experiencia de viaje y la informaci\u00f3n de informantes clave vendedores sobre el acceso a la zona de captaci\u00f3n.", "fr": "Si le march\u00e9 est physiquement accessible par route pour la plupart de la population qu''il dessert habituellement, \u00e9valu\u00e9 par l''enqu\u00eateur \u00e0 partir de sa propre exp\u00e9rience de d\u00e9placement et des informations des informateurs cl\u00e9s vendeurs sur l''acc\u00e8s \u00e0 la zone de chalandise."}, "id": "mk_road_access_status", "label": {"en": "Road access status", "es": "Estado de acceso vial", "fr": "Statut d''accessibilit\u00e9 routi\u00e8re"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "market-accessibility-level"}'
      bibliography_refs: acaps-market-assessment-2014,calp-misma-2018,icrc-ram-2014,reach-jmmi,wfp-mag-2021
  mk_security_incidents_at_market:
    title:
      en: Security incidents at or around market (past 30 days)
      fr: Incidents sécuritaires au marché ou aux alentours (30 derniers jours)
      es: Incidentes de seguridad en o alrededor del mercado (últimos 30 días)
    description:
      en: 'Whether security incidents occurred at or immediately around this market in the past 30 days in a way that affected trading operations or buyer access, as reported by key vendor informants. Boolean: yes / no / dont_know. The coded yes/no flag is non-sensitive and appropriate for routine reporting. Narrative descriptions of specific incidents, perpetrators, or methods must not be included in this profile — route those to a security incident management system.'
      fr: 'Si des incidents sécuritaires se sont produits au niveau ou aux alentours immédiats de ce marché au cours des 30 derniers jours d''une manière qui a affecté les opérations commerciales ou l''accès des acheteurs, tel que rapporté par les informateurs clés vendeurs. Booléen : oui / non / ne sait pas. L''indicateur oui/non codé est non sensible et approprié pour les rapports courants.'
      es: 'Si ocurrieron incidentes de seguridad en o alrededor inmediato de este mercado en los últimos 30 días de una manera que afectó las operaciones comerciales o el acceso de compradores, según lo reportado por informantes clave vendedores. Booleano: sí / no / no sabe. La bandera sí/no codificada no es sensible y es apropiada para informes rutinarios.'
    slot_uri: aidops:mk_security_incidents_at_market
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "reach-jmmi"], "cardinality": "single", "category": "market_accessibility", "core": true, "definition": {"en": "Whether security incidents occurred at or immediately around this market in the past 30 days in a way that affected trading operations or buyer access, as reported by key vendor informants. Boolean: yes / no / dont_know. The coded yes/no flag is non-sensitive and appropriate for routine reporting. Narrative descriptions of specific incidents, perpetrators, or methods must not be included in this profile \u2014 route those to a security incident management system.", "es": "Si ocurrieron incidentes de seguridad en o alrededor inmediato de este mercado en los \u00faltimos 30 d\u00edas de una manera que afect\u00f3 las operaciones comerciales o el acceso de compradores, seg\u00fan lo reportado por informantes clave vendedores. Booleano: s\u00ed / no / no sabe. La bandera s\u00ed/no codificada no es sensible y es apropiada para informes rutinarios.", "fr": "Si des incidents s\u00e9curitaires se sont produits au niveau ou aux alentours imm\u00e9diats de ce march\u00e9 au cours des 30 derniers jours d''une mani\u00e8re qui a affect\u00e9 les op\u00e9rations commerciales ou l''acc\u00e8s des acheteurs, tel que rapport\u00e9 par les informateurs cl\u00e9s vendeurs. Bool\u00e9en : oui / non / ne sait pas. L''indicateur oui/non cod\u00e9 est non sensible et appropri\u00e9 pour les rapports courants."}, "id": "mk_security_incidents_at_market", "label": {"en": "Security incidents at or around market (past 30 days)", "es": "Incidentes de seguridad en o alrededor del mercado (\u00faltimos 30 d\u00edas)", "fr": "Incidents s\u00e9curitaires au march\u00e9 ou aux alentours (30 derniers jours)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,reach-jmmi
  mk_supply_chain_functional:
    title:
      en: Supply chain functional status
      fr: Statut fonctionnel de la chaîne d'approvisionnement
      es: Estado funcional de la cadena de suministro
    description:
      en: Overall functional state of the supply and transport chains currently feeding this market, as assessed by key vendor informants. A five-level ordinal scale from fully functional to non-functional. The coded status value is non-sensitive and suitable for routine situation reporting. Do not capture specific route names, checkpoint locations, or armed actor details as part of this property — those belong in secure reporting channels.
      fr: État fonctionnel global des chaînes d'approvisionnement et de transport alimentant actuellement ce marché, tel qu'évalué par les informateurs clés vendeurs. Échelle ordinale à cinq niveaux de pleinement fonctionnel à non fonctionnel. La valeur de statut codée est non sensible et convient aux rapports de situation courants. Ne pas saisir les noms de routes spécifiques, les emplacements de points de contrôle ou les détails sur les acteurs armés — ceux-ci appartiennent aux canaux de signalement sécurisés.
      es: Estado funcional general de las cadenas de suministro y transporte que actualmente abastecen este mercado, según la evaluación de informantes clave vendedores. Escala ordinal de cinco niveles desde completamente funcional hasta no funcional. El valor de estado codificado no es sensible y es adecuado para los informes de situación rutinarios. No capturar nombres de rutas específicas, ubicaciones de puntos de control o detalles de actores armados — esos pertenecen a canales de reporte seguros.
    slot_uri: aidops:mk_supply_chain_functional
    range: SupplyChainStatus
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "emma-toolkit-v2-2017", "icrc-ram-2014", "reach-jmmi", "wfp-mag-2021"], "cardinality": "single", "category": "market_supply_chain", "core": true, "definition": {"en": "Overall functional state of the supply and transport chains currently feeding this market, as assessed by key vendor informants. A five-level ordinal scale from fully functional to non-functional. The coded status value is non-sensitive and suitable for routine situation reporting. Do not capture specific route names, checkpoint locations, or armed actor details as part of this property \u2014 those belong in secure reporting channels.", "es": "Estado funcional general de las cadenas de suministro y transporte que actualmente abastecen este mercado, seg\u00fan la evaluaci\u00f3n de informantes clave vendedores. Escala ordinal de cinco niveles desde completamente funcional hasta no funcional. El valor de estado codificado no es sensible y es adecuado para los informes de situaci\u00f3n rutinarios. No capturar nombres de rutas espec\u00edficas, ubicaciones de puntos de control o detalles de actores armados \u2014 esos pertenecen a canales de reporte seguros.", "fr": "\u00c9tat fonctionnel global des cha\u00eenes d''approvisionnement et de transport alimentant actuellement ce march\u00e9, tel qu''\u00e9valu\u00e9 par les informateurs cl\u00e9s vendeurs. \u00c9chelle ordinale \u00e0 cinq niveaux de pleinement fonctionnel \u00e0 non fonctionnel. La valeur de statut cod\u00e9e est non sensible et convient aux rapports de situation courants. Ne pas saisir les noms de routes sp\u00e9cifiques, les emplacements de points de contr\u00f4le ou les d\u00e9tails sur les acteurs arm\u00e9s \u2014 ceux-ci appartiennent aux canaux de signalement s\u00e9curis\u00e9s."}, "id": "mk_supply_chain_functional", "label": {"en": "Supply chain functional status", "es": "Estado funcional de la cadena de suministro", "fr": "Statut fonctionnel de la cha\u00eene d''approvisionnement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "supply-chain-status"}'
      bibliography_refs: calp-misma-2018,emma-toolkit-v2-2017,icrc-ram-2014,reach-jmmi,wfp-mag-2021
  mk_supply_route_blocked:
    title:
      en: Supply route blocked or severely restricted
      fr: Route d'approvisionnement bloquée ou sévèrement restreinte
      es: Ruta de suministro bloqueada o severamente restringida
    description:
      en: 'Whether any key supply routes to this market are currently blocked or severely restricted, as reported by key vendor informants. Boolean: yes / no / dont_know. The yes/no flag is non-sensitive and appears in standard market monitoring reports. Do not record specific route names, checkpoint locations, or armed actor identities in connection with this field — narrative details should go to secure incident reporting channels.'
      fr: 'Si des routes d''approvisionnement clés vers ce marché sont actuellement bloquées ou sévèrement restreintes, tel que rapporté par les informateurs clés vendeurs. Booléen : oui / non / ne sait pas. L''indicateur oui/non est non sensible et figure dans les rapports standard de suivi des marchés. Ne pas enregistrer les noms de routes spécifiques, les emplacements des points de contrôle ou les identités des acteurs armés en lien avec ce champ.'
      es: 'Si alguna ruta clave de suministro a este mercado está actualmente bloqueada o severamente restringida, según lo reportado por informantes clave vendedores. Booleano: sí / no / no sabe. La bandera sí/no no es sensible y aparece en los informes estándar de monitoreo de mercados. No registrar nombres de rutas específicas, ubicaciones de puntos de control o identidades de actores armados en relación con este campo.'
    slot_uri: aidops:mk_supply_route_blocked
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "emma-toolkit-v2-2017", "icrc-ram-2014", "reach-jmmi"], "cardinality": "single", "category": "market_supply_chain", "core": true, "definition": {"en": "Whether any key supply routes to this market are currently blocked or severely restricted, as reported by key vendor informants. Boolean: yes / no / dont_know. The yes/no flag is non-sensitive and appears in standard market monitoring reports. Do not record specific route names, checkpoint locations, or armed actor identities in connection with this field \u2014 narrative details should go to secure incident reporting channels.", "es": "Si alguna ruta clave de suministro a este mercado est\u00e1 actualmente bloqueada o severamente restringida, seg\u00fan lo reportado por informantes clave vendedores. Booleano: s\u00ed / no / no sabe. La bandera s\u00ed/no no es sensible y aparece en los informes est\u00e1ndar de monitoreo de mercados. No registrar nombres de rutas espec\u00edficas, ubicaciones de puntos de control o identidades de actores armados en relaci\u00f3n con este campo.", "fr": "Si des routes d''approvisionnement cl\u00e9s vers ce march\u00e9 sont actuellement bloqu\u00e9es ou s\u00e9v\u00e8rement restreintes, tel que rapport\u00e9 par les informateurs cl\u00e9s vendeurs. Bool\u00e9en : oui / non / ne sait pas. L''indicateur oui/non est non sensible et figure dans les rapports standard de suivi des march\u00e9s. Ne pas enregistrer les noms de routes sp\u00e9cifiques, les emplacements des points de contr\u00f4le ou les identit\u00e9s des acteurs arm\u00e9s en lien avec ce champ."}, "id": "mk_supply_route_blocked", "label": {"en": "Supply route blocked or severely restricted", "es": "Ruta de suministro bloqueada o severamente restringida", "fr": "Route d''approvisionnement bloqu\u00e9e ou s\u00e9v\u00e8rement restreinte"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
