9silience. Distincte de l''\u00e9v\u00e9nement de r\u00e9f\u00e9rence de crise ou de d\u00e9placement saisi dans `livelihood_change_since_crisis`, qui couvre l''ensemble de la p\u00e9riode de crise."}, "id": "shock_experienced_past_12mo", "label": {"en": "Shocks experienced in past 12 months", "es": "Choques experimentados en los \u00faltimos 12 meses", "fr": "Chocs subis au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-shock-type"}'
