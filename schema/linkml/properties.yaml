  conflict_mobility_restriction:
    title:
      en: Conflict or insecurity directly prevented herd movement — last 30 days
      fr: Un conflit ou une insécurité a directement empêché le déplacement du troupeau — 30 derniers jours
      es: Conflicto o inseguridad impidió directamente el movimiento del rebaño — últimos 30 días
    description:
      en: 'Whether conflict or insecurity directly prevented the household from moving its herd to better water or pasture areas in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Sensitivity: this item is HIGHLY SENSITIVE (maps to the AidOps `restricted` tier). Direct disclosure that armed actors have prevented household movement may endanger the respondent if data reach armed actors. In contexts where enumerators operate in conflict zones (Somalia, Mali, Sudan, South Sudan), even aggregate data showing conflict-induced mobility restrictions in a specific area may constitute useful intelligence for armed groups. Required data-handling mitigations: (1) do not retain GPS coordinates of the interview location alongside this item in any shared dataset; (2) aggregate responses to livelihood-zone level before sharing with any non-humanitarian partner; (3) apply IDP protection confidentiality standards; (4) consider omitting this item entirely from surveys conducted in areas where enumerators are co-located with or monitored by armed actors. Despite the sensitivity, this item is `core: true` because conflict-induced mobility restriction is one of the IPC criteria for crisis-phase classification in pastoral livelihood zones, and its omission systematically understates pastoral food insecurity in conflict-affected zones. Grounded in LEGS 3rd edition, IPC AFI pastoral annex, FSNAU conflict-mobility items, and FEWSNET conflict-pastoralism interaction monitoring.'
      fr: 'Si un conflit ou une insécurité a directement empêché le ménage de déplacer son troupeau vers de meilleures zones d''eau ou de pâturage au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Sensibilité : cet item est HAUTEMENT SENSIBLE (niveau `restricted` AidOps). La divulgation directe que des acteurs armés ont empêché le déplacement du ménage peut mettre en danger le répondant si les données atteignent des groupes armés. Mesures requises : (1) ne pas conserver de coordonnées GPS avec cet item ; (2) agréger au niveau de la zone de moyens d''existence ; (3) appliquer les normes de confidentialité de protection des PDI. `core: true` car la restriction de mobilité induite par le conflit est un critère IPC pour la classification de crise dans les zones pastorales.'
      es: 'Si el conflicto o la inseguridad impidió directamente al hogar mover su rebaño a mejores áreas de agua o pasto en los últimos 30 días. Sí / No / No sabe (vocabulario `yes-no-dk`). Sensibilidad: este ítem es MUY SENSIBLE (nivel `restricted` de AidOps). La divulgación directa de que actores armados han impedido el movimiento del hogar puede poner en peligro al encuestado si los datos llegan a grupos armados. Mitigaciones requeridas: (1) no retener coordenadas GPS con este ítem; (2) agregar al nivel de zona de medios de vida; (3) aplicar estándares de confidencialidad de protección de PDI. `core: true` porque la restricción de movilidad inducida por el conflicto es un criterio IPC para la clasificación de crisis en zonas pastorales.'
    slot_uri: aidops:conflict_mobility_restriction
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_mobility", "core": true, "definition": {"en": "Whether conflict or insecurity directly prevented the household from moving its herd to better water or pasture areas in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Sensitivity: this item is HIGHLY SENSITIVE (maps to the AidOps `restricted` tier). Direct disclosure that armed actors have prevented household movement may endanger the respondent if data reach armed actors. In contexts where enumerators operate in conflict zones (Somalia, Mali, Sudan, South Sudan), even aggregate data showing conflict-induced mobility restrictions in a specific area may constitute useful intelligence for armed groups. Required data-handling mitigations: (1) do not retain GPS coordinates of the interview location alongside this item in any shared dataset; (2) aggregate responses to livelihood-zone level before sharing with any non-humanitarian partner; (3) apply IDP protection confidentiality standards; (4) consider omitting this item entirely from surveys conducted in areas where enumerators are co-located with or monitored by armed actors. Despite the sensitivity, this item is `core: true` because conflict-induced mobility restriction is one of the IPC criteria for crisis-phase classification in pastoral livelihood zones, and its omission systematically understates pastoral food insecurity in conflict-affected zones. Grounded in LEGS 3rd edition, IPC AFI pastoral annex, FSNAU conflict-mobility items, and FEWSNET conflict-pastoralism interaction monitoring.", "es": "Si el conflicto o la inseguridad impidi\u00f3 directamente al hogar mover su reba\u00f1o a mejores \u00e1reas de agua o pasto en los \u00faltimos 30 d\u00edas. S\u00ed / No / No sabe (vocabulario `yes-no-dk`). Sensibilidad: este \u00edtem es MUY SENSIBLE (nivel `restricted` de AidOps). La divulgaci\u00f3n directa de que actores armados han impedido el movimiento del hogar puede poner en peligro al encuestado si los datos llegan a grupos armados. Mitigaciones requeridas: (1) no retener coordenadas GPS con este \u00edtem; (2) agregar al nivel de zona de medios de vida; (3) aplicar est\u00e1ndares de confidencialidad de protecci\u00f3n de PDI. `core: true` porque la restricci\u00f3n de movilidad inducida por el conflicto es un criterio IPC para la clasificaci\u00f3n de crisis en zonas pastorales.", "fr": "Si un conflit ou une ins\u00e9curit\u00e9 a directement emp\u00each\u00e9 le m\u00e9nage de d\u00e9placer son troupeau vers de meilleures zones d''eau ou de p\u00e2turage au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Sensibilit\u00e9 : cet item est HAUTEMENT SENSIBLE (niveau `restricted` AidOps). La divulgation directe que des acteurs arm\u00e9s ont emp\u00each\u00e9 le d\u00e9placement du m\u00e9nage peut mettre en danger le r\u00e9pondant si les donn\u00e9es atteignent des groupes arm\u00e9s. Mesures requises : (1) ne pas conserver de coordonn\u00e9es GPS avec cet item ; (2) agr\u00e9ger au niveau de la zone de moyens d''existence ; (3) appliquer les normes de confidentialit\u00e9 de protection des PDI. `core: true` car la restriction de mobilit\u00e9 induite par le conflit est un crit\u00e8re IPC pour la classification de crise dans les zones pastorales."}, "id": "conflict_mobility_restriction", "label": {"en": "Conflict or insecurity directly prevented herd movement \u2014 last 30 days", "es": "Conflicto o inseguridad impidi\u00f3 directamente el movimiento del reba\u00f1o \u2014 \u00faltimos 30 d\u00edas", "fr": "Un conflit ou une ins\u00e9curit\u00e9 a directement emp\u00each\u00e9 le d\u00e9placement du troupeau \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023
  cooking_accident_past_12_months:
    title:
      en: Cooking accident in past 12 months
      fr: Accident lié à la cuisine au cours des 12 derniers mois
      es: Accidente de cocción en los últimos 12 meses
    description:
      en: 'Whether any household member was burned, injured, or had a respiratory illness requiring professional medical care due to the cooking stove or fuel in the past 12 months. MTF cooking safety attribute: if any such accident occurred, the safety tier is Tier 0-2 (failing the Tier 3 or above safety criterion). Source: MTF household survey; WHO/World Bank harmonized questionnaire Q10.'
      fr: 'Si un membre du ménage a été brûlé, blessé ou a souffert d''une maladie respiratoire nécessitant des soins médicaux professionnels en raison du foyer de cuisson ou du combustible au cours des 12 derniers mois. Attribut de sécurité de cuisson MTF : si un tel accident s''est produit, le niveau de sécurité est de 0 à 2 (ne satisfaisant pas au critère de sécurité du niveau 3 ou supérieur). Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q10.'
      es: 'Si algún miembro del hogar resultó quemado, herido o tuvo una enfermedad respiratoria que requirió atención médica profesional debido a la cocina o el combustible en los últimos 12 meses. Atributo de seguridad de cocción MTF: si ocurrió algún accidente de este tipo, el nivel de seguridad es Nivel 0-2 (no cumple el criterio de seguridad del Nivel 3 o superior). Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q10.'
    slot_uri: aidops:cooking_accident_past_12_months
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Whether any household member was burned, injured, or had a respiratory illness requiring professional medical care due to the cooking stove or fuel in the past 12 months. MTF cooking safety attribute: if any such accident occurred, the safety tier is Tier 0-2 (failing the Tier 3 or above safety criterion). Source: MTF household survey; WHO/World Bank harmonized questionnaire Q10.", "es": "Si alg\u00fan miembro del hogar result\u00f3 quemado, herido o tuvo una enfermedad respiratoria que requiri\u00f3 atenci\u00f3n m\u00e9dica profesional debido a la cocina o el combustible en los \u00faltimos 12 meses. Atributo de seguridad de cocci\u00f3n MTF: si ocurri\u00f3 alg\u00fan accidente de este tipo, el nivel de seguridad es Nivel 0-2 (no cumple el criterio de seguridad del Nivel 3 o superior). Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q10.", "fr": "Si un membre du m\u00e9nage a \u00e9t\u00e9 br\u00fbl\u00e9, bless\u00e9 ou a souffert d''une maladie respiratoire n\u00e9cessitant des soins m\u00e9dicaux professionnels en raison du foyer de cuisson ou du combustible au cours des 12 derniers mois. Attribut de s\u00e9curit\u00e9 de cuisson MTF : si un tel accident s''est produit, le niveau de s\u00e9curit\u00e9 est de 0 \u00e0 2 (ne satisfaisant pas au crit\u00e8re de s\u00e9curit\u00e9 du niveau 3 ou sup\u00e9rieur). Source : enqu\u00eate m\u00e9nage MTF ; questionnaire harmonis\u00e9 OMS/Banque mondiale Q10."}, "id": "cooking_accident_past_12_months", "label": {"en": "Cooking accident in past 12 months", "es": "Accidente de cocci\u00f3n en los \u00faltimos 12 meses", "fr": "Accident li\u00e9 \u00e0 la cuisine au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": null}'
