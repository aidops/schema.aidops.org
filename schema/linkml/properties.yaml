  breastfeeding_initiation_hours:
    title:
      en: Time from birth to first breastfeed
      fr: Délai entre la naissance et la première tétée
      es: Tiempo desde el parto hasta la primera lactancia
    description:
      en: How long after birth the mother first put the index baby to the breast, grouped per DHS-8 m4 / MICS6 MN13 categories. DHS m4 = 1 (within 1 hour), 2 (1–23 hours), 3 (1–3 days), 4 (more than 3 days), 5 (never breastfed). Drives breastfeeding_early_initiation. Owned by MaternalNewbornHealthProfile; NutritionPracticesProfile references breastfeeding_early_initiation but does not re-collect this item. Only asked if breastfeeding_ever_initiated = yes.
      fr: Combien de temps après la naissance la mère a mis l'enfant index au sein pour la première fois, regroupé selon les catégories DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dans l'heure), 2 (1–23 heures), 3 (1–3 jours), 4 (plus de 3 jours), 5 (jamais allaité). Génère breastfeeding_early_initiation. Appartient au MaternalNewbornHealthProfile ; le NutritionPracticesProfile référence breastfeeding_early_initiation mais ne re-collecte pas cet item. Posé uniquement si breastfeeding_ever_initiated = oui.
      es: Cuánto tiempo después del parto la madre puso al bebé índice al pecho por primera vez, agrupado según las categorías DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dentro de la primera hora), 2 (1–23 horas), 3 (1–3 días), 4 (más de 3 días), 5 (nunca amamantó). Genera breastfeeding_early_initiation. Pertenece al MaternalNewbornHealthProfile; el NutritionPracticesProfile referencia breastfeeding_early_initiation pero no recopila este ítem. Solo se pregunta si breastfeeding_ever_initiated = sí.
    slot_uri: aidops:breastfeeding_initiation_hours
    range: MnhBreastfeedingInitiationTiming
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn"], "cardinality": "single", "category": "newborn", "core": true, "definition": {"en": "How long after birth the mother first put the index baby to the breast, grouped per DHS-8 m4 / MICS6 MN13 categories. DHS m4 = 1 (within 1 hour), 2 (1\u201323 hours), 3 (1\u20133 days), 4 (more than 3 days), 5 (never breastfed). Drives breastfeeding_early_initiation. Owned by MaternalNewbornHealthProfile; NutritionPracticesProfile references breastfeeding_early_initiation but does not re-collect this item. Only asked if breastfeeding_ever_initiated = yes.", "es": "Cu\u00e1nto tiempo despu\u00e9s del parto la madre puso al beb\u00e9 \u00edndice al pecho por primera vez, agrupado seg\u00fan las categor\u00edas DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dentro de la primera hora), 2 (1\u201323 horas), 3 (1\u20133 d\u00edas), 4 (m\u00e1s de 3 d\u00edas), 5 (nunca amamant\u00f3). Genera breastfeeding_early_initiation. Pertenece al MaternalNewbornHealthProfile; el NutritionPracticesProfile referencia breastfeeding_early_initiation pero no recopila este \u00edtem. Solo se pregunta si breastfeeding_ever_initiated = s\u00ed.", "fr": "Combien de temps apr\u00e8s la naissance la m\u00e8re a mis l''enfant index au sein pour la premi\u00e8re fois, regroup\u00e9 selon les cat\u00e9gories DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dans l''heure), 2 (1\u201323 heures), 3 (1\u20133 jours), 4 (plus de 3 jours), 5 (jamais allait\u00e9). G\u00e9n\u00e8re breastfeeding_early_initiation. Appartient au MaternalNewbornHealthProfile ; le NutritionPracticesProfile r\u00e9f\u00e9rence breastfeeding_early_initiation mais ne re-collecte pas cet item. Pos\u00e9 uniquement si breastfeeding_ever_initiated = oui."}, "id": "breastfeeding_initiation_hours", "label": {"en": "Time from birth to first breastfeed", "es": "Tiempo desde el parto hasta la primera lactancia", "fr": "D\u00e9lai entre la naissance et la premi\u00e8re t\u00e9t\u00e9e"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "mnh-breastfeeding-initiation-timing"}'
