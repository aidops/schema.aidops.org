      fr: Dépenses à la charge du ménage pour les consultations (12 mois)
      es: Gasto de bolsillo en consultas (12 meses)
    description:
      en: Portion of out-of-pocket health expenditure spent on provider consultations and visit fees over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo` following the WHO health-accounts functional categories. Helps distinguish access-to-provider barriers from medicines or hospital barriers.
      fr: Part des dépenses de santé à la charge du ménage consacrée aux consultations et aux frais de visite chez les prestataires au cours des 12 derniers mois, en monnaie locale. Composante désagrégée de `oop_health_expenditure_12mo` selon les catégories fonctionnelles des comptes de la santé de l'OMS. Permet de distinguer les obstacles d'accès aux prestataires de ceux liés aux médicaments ou à l'hospitalisation.
      es: Parte del gasto de bolsillo en salud dedicada a consultas y honorarios de visita al proveedor en los últimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo` siguiendo las categorías funcionales de cuentas de salud de la OMS. Permite distinguir las barreras de acceso al proveedor de las relacionadas con medicamentos o atención hospitalaria.
    slot_uri: aidops:oop_expenditure_consultations
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-oop-expenditure-as59", "sdg-3-8-2-metadata"], "cardinality": "single", "category": "health_access_oop", "core": false, "definition": {"en": "Portion of out-of-pocket health expenditure spent on provider consultations and visit fees over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo` following the WHO health-accounts functional categories. Helps distinguish access-to-provider barriers from medicines or hospital barriers.", "es": "Parte del gasto de bolsillo en salud dedicada a consultas y honorarios de visita al proveedor en los \u00faltimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo` siguiendo las categor\u00edas funcionales de cuentas de salud de la OMS. Permite distinguir las barreras de acceso al proveedor de las relacionadas con medicamentos o atenci\u00f3n hospitalaria.", "fr": "Part des d\u00e9penses de sant\u00e9 \u00e0 la charge du m\u00e9nage consacr\u00e9e aux consultations et aux frais de visite chez les prestataires au cours des 12 derniers mois, en monnaie locale. Composante d\u00e9sagr\u00e9g\u00e9e de `oop_health_expenditure_12mo` selon les cat\u00e9gories fonctionnelles des comptes de la sant\u00e9 de l''OMS. Permet de distinguer les obstacles d''acc\u00e8s aux prestataires de ceux li\u00e9s aux m\u00e9dicaments ou \u00e0 l''hospitalisation."}, "id": "oop_expenditure_consultations", "label": {"en": "Out-of-pocket expenditure on consultations (12 months)", "es": "Gasto de bolsillo en consultas (12 meses)", "fr": "D\u00e9penses \u00e0 la charge du m\u00e9nage pour les consultations (12 mois)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
