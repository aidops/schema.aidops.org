  water_source_secondary:
    title:
      en: Secondary water source
      fr: Source d'eau secondaire
      es: Fuente de agua secundaria
    description:
      en: The secondary source of drinking water, asked only when the household's primary source is bottled or packaged water. The JMP uses this response (W2) to determine the water service level for households that rely solely on bottled or packaged water, because bottled water alone cannot be classified as safely managed without knowing the underlying improved or unimproved source.
      fr: La source d'eau potable secondaire, demandée uniquement lorsque la source principale du ménage est de l'eau en bouteille ou conditionnée. Le JMP utilise cette réponse (W2) pour déterminer le niveau de service en eau des ménages qui dépendent uniquement de l'eau en bouteille ou conditionnée, car l'eau en bouteille seule ne peut pas être classée comme à gestion sécurisée sans connaître la source sous-jacente améliorée ou non améliorée.
      es: La fuente secundaria de agua potable, preguntada solo cuando la fuente principal del hogar es agua embotellada o envasada. El JMP usa esta respuesta (W2) para determinar el nivel de servicio de agua para hogares que dependen únicamente de agua embotellada o envasada, porque el agua embotellada sola no puede clasificarse como con gestión segura sin conocer la fuente subyacente mejorada o no mejorada.
    slot_uri: aidops:water_source_secondary
    range: WaterSource
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "water", "core": false, "definition": {"en": "The secondary source of drinking water, asked only when the household''s primary source is bottled or packaged water. The JMP uses this response (W2) to determine the water service level for households that rely solely on bottled or packaged water, because bottled water alone cannot be classified as safely managed without knowing the underlying improved or unimproved source.", "es": "La fuente secundaria de agua potable, preguntada solo cuando la fuente principal del hogar es agua embotellada o envasada. El JMP usa esta respuesta (W2) para determinar el nivel de servicio de agua para hogares que dependen \u00fanicamente de agua embotellada o envasada, porque el agua embotellada sola no puede clasificarse como con gesti\u00f3n segura sin conocer la fuente subyacente mejorada o no mejorada.", "fr": "La source d''eau potable secondaire, demand\u00e9e uniquement lorsque la source principale du m\u00e9nage est de l''eau en bouteille ou conditionn\u00e9e. Le JMP utilise cette r\u00e9ponse (W2) pour d\u00e9terminer le niveau de service en eau des m\u00e9nages qui d\u00e9pendent uniquement de l''eau en bouteille ou conditionn\u00e9e, car l''eau en bouteille seule ne peut pas \u00eatre class\u00e9e comme \u00e0 gestion s\u00e9curis\u00e9e sans conna\u00eetre la source sous-jacente am\u00e9lior\u00e9e ou non am\u00e9lior\u00e9e."}, "id": "water_source_secondary", "label": {"en": "Secondary water source", "es": "Fuente de agua secundaria", "fr": "Source d''eau secondaire"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7", "dhs_8"], "vocabulary": "water-source"}'
