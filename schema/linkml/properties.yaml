de la discrimination. Il s''agit du m\u00e9canisme de protection g\u00e9n\u00e9ral, distinct de la connaissance des m\u00e9canismes de signalement sp\u00e9cifiques \u00e0 la VBG (GBVRiskProfile.gbv_referral_services_known). L''enqu\u00eateur ne doit PAS montrer une liste de services \u2014 il s''agit d''un test de connaissance, pas d''une question de cartographie des services. Fond\u00e9 sur GPC PAF Domaine 2 (\u00c9tat de droit et justice) ; Cadre de protection int\u00e9gr\u00e9e UNHCR (2016) ; Sph\u00e8re Principe de protection 4 (Renforcer la capacit\u00e9 des personnes \u00e0 revendiquer leurs droits) ; REACH Syrie (2022)."}, "id": "protection_referral_aware", "label": {"en": "General protection referral awareness (household)", "es": "Conocimiento de mecanismos de derivaci\u00f3n de protecci\u00f3n (hogar)", "fr": "Connaissance des m\u00e9canismes de signalement de protection (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
