  electricity_voltage_problems:
    title:
      en: Electricity voltage problems
      fr: Problèmes de tension électrique
      es: Problemas de voltaje eléctrico
    description:
      en: 'Whether voltage fluctuations or surges damaged or prevented the household from using electrical appliances in the past month. MTF electricity quality attribute: Tier 3 and above requires that voltage problems do not affect desired appliances. If voltage problems occurred and damaged or prevented appliance use, the quality tier is Tier 0-2. Source: MTF household survey.'
      fr: 'Si des fluctuations ou surtensions ont endommagé ou empêché le ménage d''utiliser ses appareils électriques au cours du mois passé. Attribut de qualité de l''électricité MTF : les niveaux 3 et supérieurs exigent que les problèmes de tension n''affectent pas les appareils souhaités. Si des problèmes de tension se sont produits et ont endommagé ou empêché l''utilisation des appareils, le niveau de qualité est 0 à 2. Source : enquête ménage MTF.'
      es: 'Si las fluctuaciones o picos de voltaje dañaron o impidieron al hogar usar sus electrodomésticos en el último mes. Atributo de calidad de electricidad MTF: el Nivel 3 y superiores requieren que los problemas de voltaje no afecten los electrodomésticos deseados. Si ocurrieron problemas de voltaje que dañaron o impidieron el uso de electrodomésticos, el nivel de calidad es Nivel 0-2. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_voltage_problems
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Whether voltage fluctuations or surges damaged or prevented the household from using electrical appliances in the past month. MTF electricity quality attribute: Tier 3 and above requires that voltage problems do not affect desired appliances. If voltage problems occurred and damaged or prevented appliance use, the quality tier is Tier 0-2. Source: MTF household survey.", "es": "Si las fluctuaciones o picos de voltaje da\u00f1aron o impidieron al hogar usar sus electrodom\u00e9sticos en el \u00faltimo mes. Atributo de calidad de electricidad MTF: el Nivel 3 y superiores requieren que los problemas de voltaje no afecten los electrodom\u00e9sticos deseados. Si ocurrieron problemas de voltaje que da\u00f1aron o impidieron el uso de electrodom\u00e9sticos, el nivel de calidad es Nivel 0-2. Fuente: encuesta de hogares MTF.", "fr": "Si des fluctuations ou surtensions ont endommag\u00e9 ou emp\u00each\u00e9 le m\u00e9nage d''utiliser ses appareils \u00e9lectriques au cours du mois pass\u00e9. Attribut de qualit\u00e9 de l''\u00e9lectricit\u00e9 MTF : les niveaux 3 et sup\u00e9rieurs exigent que les probl\u00e8mes de tension n''affectent pas les appareils souhait\u00e9s. Si des probl\u00e8mes de tension se sont produits et ont endommag\u00e9 ou emp\u00each\u00e9 l''utilisation des appareils, le niveau de qualit\u00e9 est 0 \u00e0 2. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_voltage_problems", "label": {"en": "Electricity voltage problems", "es": "Problemas de voltaje el\u00e9ctrico", "fr": "Probl\u00e8mes de tension \u00e9lectrique"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
