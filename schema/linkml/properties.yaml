  cn_priority_group_most_in_need:
    title:
      en: Priority groups most in need
      fr: Groupes prioritaires les plus dans le besoin
      es: Grupos prioritarios con mayor necesidad
    description:
      en: The groups of people the community itself identifies as most in need of assistance at this time. Multi-select, capped at three responses to force a meaningful priority. Encoded with the priority-group-category vocabulary (elderly, pregnant or lactating women, persons with disabilities, unaccompanied or separated children, female-headed households, child-headed households, chronically ill, displaced, poor host community members, ethnic/religious/linguistic minority, returnees, other). Derived from the MIRA Community Level Assessment 'most vulnerable groups' question, the UNHCR Age-Gender-Diversity framework, and the IASC Guidelines on Inclusion of Persons with Disabilities.
      fr: Les groupes de personnes que la communauté elle-même identifie comme ayant le plus besoin d'assistance à l'heure actuelle. Choix multiple, limité à trois réponses pour imposer une priorité significative. Codé avec la taxonomie priority-group-category (personnes âgées, femmes enceintes ou allaitantes, personnes handicapées, enfants non accompagnés ou séparés, ménages dirigés par une femme, ménages dirigés par un enfant, personnes atteintes de maladies chroniques, personnes déplacées, membres pauvres de la communauté d'accueil, minorité ethnique/religieuse/linguistique, retournés, autre). Tiré de la question « groupes les plus vulnérables » de l'évaluation communautaire MIRA, du cadre Âge-Genre-Diversité du HCR et des Directives de l'IASC sur l'inclusion des personnes handicapées.
      es: Los grupos de personas que la propia comunidad identifica como más necesitados de asistencia en la actualidad. Selección múltiple, con un máximo de tres respuestas para forzar una priorización significativa. Codificado con la taxonomía priority-group-category (personas mayores, mujeres embarazadas o lactantes, personas con discapacidad, niños no acompañados o separados, hogares encabezados por mujeres, hogares encabezados por menores, personas con enfermedades crónicas, personas desplazadas, miembros pobres de la comunidad de acogida, minoría étnica/religiosa/lingüística, retornados, otros). Derivado de la pregunta «grupos más vulnerables» de la evaluación comunitaria MIRA, del marco de Edad-Género-Diversidad del ACNUR y de las Directrices del IASC sobre inclusión de personas con discapacidad.
    slot_uri: aidops:cn_priority_group_most_in_need
    range: PriorityGroupCategory
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-disability-2019", "ifrc-vca-2020", "reach-hsm-2023", "unhcr-agd-2018"], "cardinality": "multiple", "category": "specific_needs", "core": true, "definition": {"en": "The groups of people the community itself identifies as most in need of assistance at this time. Multi-select, capped at three responses to force a meaningful priority. Encoded with the priority-group-category vocabulary (elderly, pregnant or lactating women, persons with disabilities, unaccompanied or separated children, female-headed households, child-headed households, chronically ill, displaced, poor host community members, ethnic/religious/linguistic minority, returnees, other). Derived from the MIRA Community Level Assessment ''most vulnerable groups'' question, the UNHCR Age-Gender-Diversity framework, and the IASC Guidelines on Inclusion of Persons with Disabilities.", "es": "Los grupos de personas que la propia comunidad identifica como m\u00e1s necesitados de asistencia en la actualidad. Selecci\u00f3n m\u00faltiple, con un m\u00e1ximo de tres respuestas para forzar una priorizaci\u00f3n significativa. Codificado con la taxonom\u00eda priority-group-category (personas mayores, mujeres embarazadas o lactantes, personas con discapacidad, ni\u00f1os no acompa\u00f1ados o separados, hogares encabezados por mujeres, hogares encabezados por menores, personas con enfermedades cr\u00f3nicas, personas desplazadas, miembros pobres de la comunidad de acogida, minor\u00eda \u00e9tnica/religiosa/ling\u00fc\u00edstica, retornados, otros). Derivado de la pregunta \u00abgrupos m\u00e1s vulnerables\u00bb de la evaluaci\u00f3n comunitaria MIRA, del marco de Edad-G\u00e9nero-Diversidad del ACNUR y de las Directrices del IASC sobre inclusi\u00f3n de personas con discapacidad.", "fr": "Les groupes de personnes que la communaut\u00e9 elle-m\u00eame identifie comme ayant le plus besoin d''assistance \u00e0 l''heure actuelle. Choix multiple, limit\u00e9 \u00e0 trois r\u00e9ponses pour imposer une priorit\u00e9 significative. Cod\u00e9 avec la taxonomie priority-group-category (personnes \u00e2g\u00e9es, femmes enceintes ou allaitantes, personnes handicap\u00e9es, enfants non accompagn\u00e9s ou s\u00e9par\u00e9s, m\u00e9nages dirig\u00e9s par une femme, m\u00e9nages dirig\u00e9s par un enfant, personnes atteintes de maladies chroniques, personnes d\u00e9plac\u00e9es, membres pauvres de la communaut\u00e9 d''accueil, minorit\u00e9 ethnique/religieuse/linguistique, retourn\u00e9s, autre). Tir\u00e9 de la question \u00ab groupes les plus vuln\u00e9rables \u00bb de l''\u00e9valuation communautaire MIRA, du cadre \u00c2ge-Genre-Diversit\u00e9 du HCR et des Directives de l''IASC sur l''inclusion des personnes handicap\u00e9es."}, "id": "cn_priority_group_most_in_need", "label": {"en": "Priority groups most in need", "es": "Grupos prioritarios con mayor necesidad", "fr": "Groupes prioritaires les plus dans le besoin"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "priority-group-category"}'
      bibliography_refs: iasc-disability-2019,ifrc-vca-2020,reach-hsm-2023,unhcr-agd-2018
