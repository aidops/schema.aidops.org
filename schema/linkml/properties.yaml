e1tica o meteorol\u00f3gica", "fr": "Sources d''information climatique ou m\u00e9t\u00e9orologique"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-info-source"}'
