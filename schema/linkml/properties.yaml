  terms_of_trade_goat_cereal:
    title:
      en: Livestock-to-cereal terms of trade — kg of staple cereal per goat, last 30 days
      fr: Termes de l'échange bétail/céréales — kg de céréale de base par chèvre, 30 derniers jours
      es: Términos de intercambio ganadería/cereales — kg de cereal básico por cabra, últimos 30 días
    description:
      en: 'Approximate kilograms of the local staple cereal (sorghum, maize, or millet, as contextually appropriate) that the household could obtain for one goat at the local market in the last 30 days. Decimal value. The goat-to-cereal ratio is the canonical FEWSNET and HEA pastoral market-access indicator used across both the Sahel and the Horn of Africa because goats are the most liquid livestock asset in most pastoral zones. In camel-dominant zones (northeast Somalia, Puntland, Somaliland, northern Kenya Turkana and Marsabit), the camel-to-cereal ratio is the FEWSNET standard; form authors in these contexts should note this item and consider an additional companion item. The baseline ratio (same season prior year or five-year average from FEWSNET Livelihood Zone Profiles) is held in programme metadata, not collected on this profile. The derived indicator (ratio of current to baseline) is computed at analysis time per Section 5.3 of the research instrument. FEWSNET IPC classification thresholds: >= 1.0 favorable or neutral; 0.75–0.99 below normal (early stress); 0.50–0.74 significantly below normal (crisis); < 0.50 severely below normal (IPC Phase 3+ pastoral signal). Grounded in FEWSNET Livelihood Monitoring Framework (canonical pastoral ToT metric), FSNAU market monitoring, IPC AFI pastoral annex Section 4.4, HEA exchange ratio module, and AGIR Sahel resilience framework market indicators. Recall: last 30 days.'
      fr: 'Kilogrammes approximatifs de la céréale de base locale (sorgho, maïs ou mil, selon le contexte) que le ménage pourrait obtenir pour une chèvre sur le marché local au cours des 30 derniers jours. Valeur décimale. Le ratio chèvre/céréale est l''indicateur canonique FEWSNET et HEA d''accès au marché pastoral utilisé dans le Sahel et la Corne de l''Afrique. La valeur de référence (même saison l''année précédente ou moyenne sur cinq ans des Profils de Zone de Moyens d''Existence FEWSNET) est conservée dans les métadonnées du programme. L''indicateur dérivé (ratio actuel/référence) est calculé lors de l''analyse. Rappel : 30 derniers jours.'
      es: 'Kilogramos aproximados del cereal básico local (sorgo, maíz o mijo, según corresponda al contexto) que el hogar podría obtener por una cabra en el mercado local en los últimos 30 días. Valor decimal. La razón cabra/cereal es el indicador canónico de acceso al mercado pastoral de FEWSNET y HEA utilizado tanto en el Sahel como en el Cuerno de África. El valor de línea base (misma estación del año anterior o promedio de cinco años de los Perfiles de Zona de Medios de Vida de FEWSNET) se mantiene en los metadatos del programa. El indicador derivado (razón actual/línea base) se calcula en el análisis. Recordatorio: últimos 30 días.'
    slot_uri: aidops:terms_of_trade_goat_cereal
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1"], "cardinality": "single", "category": "pastoral_market", "core": true, "definition": {"en": "Approximate kilograms of the local staple cereal (sorghum, maize, or millet, as contextually appropriate) that the household could obtain for one goat at the local market in the last 30 days. Decimal value. The goat-to-cereal ratio is the canonical FEWSNET and HEA pastoral market-access indicator used across both the Sahel and the Horn of Africa because goats are the most liquid livestock asset in most pastoral zones. In camel-dominant zones (northeast Somalia, Puntland, Somaliland, northern Kenya Turkana and Marsabit), the camel-to-cereal ratio is the FEWSNET standard; form authors in these contexts should note this item and consider an additional companion item. The baseline ratio (same season prior year or five-year average from FEWSNET Livelihood Zone Profiles) is held in programme metadata, not collected on this profile. The derived indicator (ratio of current to baseline) is computed at analysis time per Section 5.3 of the research instrument. FEWSNET IPC classification thresholds: >= 1.0 favorable or neutral; 0.75\u20130.99 below normal (early stress); 0.50\u20130.74 significantly below normal (crisis); < 0.50 severely below normal (IPC Phase 3+ pastoral signal). Grounded in FEWSNET Livelihood Monitoring Framework (canonical pastoral ToT metric), FSNAU market monitoring, IPC AFI pastoral annex Section 4.4, HEA exchange ratio module, and AGIR Sahel resilience framework market indicators. Recall: last 30 days.", "es": "Kilogramos aproximados del cereal b\u00e1sico local (sorgo, ma\u00edz o mijo, seg\u00fan corresponda al contexto) que el hogar podr\u00eda obtener por una cabra en el mercado local en los \u00faltimos 30 d\u00edas. Valor decimal. La raz\u00f3n cabra/cereal es el indicador can\u00f3nico de acceso al mercado pastoral de FEWSNET y HEA utilizado tanto en el Sahel como en el Cuerno de \u00c1frica. El valor de l\u00ednea base (misma estaci\u00f3n del a\u00f1o anterior o promedio de cinco a\u00f1os de los Perfiles de Zona de Medios de Vida de FEWSNET) se mantiene en los metadatos del programa. El indicador derivado (raz\u00f3n actual/l\u00ednea base) se calcula en el an\u00e1lisis. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "Kilogrammes approximatifs de la c\u00e9r\u00e9ale de base locale (sorgho, ma\u00efs ou mil, selon le contexte) que le m\u00e9nage pourrait obtenir pour une ch\u00e8vre sur le march\u00e9 local au cours des 30 derniers jours. Valeur d\u00e9cimale. Le ratio ch\u00e8vre/c\u00e9r\u00e9ale est l''indicateur canonique FEWSNET et HEA d''acc\u00e8s au march\u00e9 pastoral utilis\u00e9 dans le Sahel et la Corne de l''Afrique. La valeur de r\u00e9f\u00e9rence (m\u00eame saison l''ann\u00e9e pr\u00e9c\u00e9dente ou moyenne sur cinq ans des Profils de Zone de Moyens d''Existence FEWSNET) est conserv\u00e9e dans les m\u00e9tadonn\u00e9es du programme. L''indicateur d\u00e9riv\u00e9 (ratio actuel/r\u00e9f\u00e9rence) est calcul\u00e9 lors de l''analyse. Rappel : 30 derniers jours."}, "id": "terms_of_trade_goat_cereal", "label": {"en": "Livestock-to-cereal terms of trade \u2014 kg of staple cereal per goat, last 30 days", "es": "T\u00e9rminos de intercambio ganader\u00eda/cereales \u2014 kg de cereal b\u00e1sico por cabra, \u00faltimos 30 d\u00edas", "fr": "Termes de l''\u00e9change b\u00e9tail/c\u00e9r\u00e9ales \u2014 kg de c\u00e9r\u00e9ale de base par ch\u00e8vre, 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
      bibliography_refs: agir-sahel-resilience-framework,fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1
  terms_of_trade_trend:
    title:
      en: Perceived livestock-to-cereal terms of trade trend compared to last year
      fr: Tendance perçue des termes de l'échange bétail/céréales par rapport à l'année dernière
      es: Tendencia percibida de los términos de intercambio ganadería/cereales comparada con el año pasado
    description:
      en: 'Household perception of whether the price obtainable for livestock relative to the price of the local staple cereal is better, the same, or worse than the same time last year. Single-select from vocabulary `terms-of-trade-trend`. This perception item complements the objective ratio in `terms_of_trade_goat_cereal` and is used when market price data are unavailable or when the objective ratio cannot be compared to a baseline. It is grounded in the FEWSNET terms-of-trade perception item, FSNAU market perception module, and IPC AFI pastoral annex (perceived market access as supporting evidence for IPC classification). Unlike `terms_of_trade_goat_cereal` (which requires the respondent to recall a specific price), this item captures directional perception and can be collected in markets where prices are not stable or where respondents have difficulty recalling exact quantities. `core: false` because the objective ToT item (C1) is preferred when accessible.'
      fr: 'Perception du ménage quant à savoir si le prix obtenu pour le bétail par rapport au prix de la céréale de base locale est meilleur, identique ou moins bon que la même période l''année dernière. Sélection unique dans le vocabulaire `terms-of-trade-trend`. Cet item de perception complète le ratio objectif dans `terms_of_trade_goat_cereal` et est utilisé lorsque les données sur les prix du marché sont indisponibles ou lorsque le ratio objectif ne peut être comparé à une référence. Fondé sur l''item de perception des termes de l''échange FEWSNET, le module de perception du marché FSNAU et l''annexe pastoraliste IPC AFI. `core: false` car l''item objectif (C1) est préféré lorsqu''il est accessible.'
      es: 'Percepción del hogar sobre si el precio obtenible por el ganado relativo al precio del cereal básico local es mejor, igual o peor que la misma época del año pasado. Selección única del vocabulario `terms-of-trade-trend`. Este ítem de percepción complementa la razón objetiva en `terms_of_trade_goat_cereal` y se usa cuando los datos de precios de mercado no están disponibles o cuando la razón objetiva no puede compararse con una línea base. Fundamentado en el ítem de percepción de términos de intercambio de FEWSNET, el módulo de percepción de mercado FSNAU y el anexo pastoralista IPC AFI. `core: false` porque el ítem objetivo (C1) es preferido cuando es accesible.'
