    title:
      en: Discipline — beat up as hard as possible
      fr: Discipline — battu aussi fort que possible
      es: Disciplina — golpeó lo más fuerte posible
    description:
      en: Whether any adult in the household beat the selected child up, meaning hit them over and over as hard as one could, in the past month. MICS 6 FCD2 item K. Severe physical punishment category. Included in the CP.3 violent-discipline composite and the severe-physical sub-indicator.
