  chronic_condition_in_hh:
    title:
      en: Any household member has a diagnosed chronic condition
      fr: Un membre du ménage a une affection chronique diagnostiquée
      es: Algún miembro del hogar tiene una condición crónica diagnosticada
    description:
      en: Whether any household member currently has a diagnosed chronic health condition requiring continuous treatment (e.g., hypertension, diabetes, HIV, TB, asthma, epilepsy, chronic mental illness, cancer). Gateway item for the chronic-continuity module. `dont_know` is retained as a distinct response.
      fr: Si un membre du ménage a actuellement une affection chronique diagnostiquée nécessitant un traitement continu (par exemple hypertension, diabète, VIH, tuberculose, asthme, épilepsie, maladie mentale chronique, cancer). Question porte d'entrée du module de continuité des soins pour affections chroniques. « dont_know » est conservé comme réponse distincte.
      es: Si algún miembro del hogar tiene actualmente una condición crónica diagnosticada que requiera tratamiento continuo (p. ej., hipertensión, diabetes, VIH, tuberculosis, asma, epilepsia, enfermedad mental crónica, cáncer). Ítem de entrada al módulo de continuidad de atención crónica. `dont_know` se mantiene como respuesta distinta.
    slot_uri: aidops:chronic_condition_in_hh
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["unhcr-phc-coverage-standard"], "cardinality": "single", "category": "health_access_chronic", "core": true, "definition": {"en": "Whether any household member currently has a diagnosed chronic health condition requiring continuous treatment (e.g., hypertension, diabetes, HIV, TB, asthma, epilepsy, chronic mental illness, cancer). Gateway item for the chronic-continuity module. `dont_know` is retained as a distinct response.", "es": "Si alg\u00fan miembro del hogar tiene actualmente una condici\u00f3n cr\u00f3nica diagnosticada que requiera tratamiento continuo (p. ej., hipertensi\u00f3n, diabetes, VIH, tuberculosis, asma, epilepsia, enfermedad mental cr\u00f3nica, c\u00e1ncer). \u00cdtem de entrada al m\u00f3dulo de continuidad de atenci\u00f3n cr\u00f3nica. `dont_know` se mantiene como respuesta distinta.", "fr": "Si un membre du m\u00e9nage a actuellement une affection chronique diagnostiqu\u00e9e n\u00e9cessitant un traitement continu (par exemple hypertension, diab\u00e8te, VIH, tuberculose, asthme, \u00e9pilepsie, maladie mentale chronique, cancer). Question porte d''entr\u00e9e du module de continuit\u00e9 des soins pour affections chroniques. \u00ab dont_know \u00bb est conserv\u00e9 comme r\u00e9ponse distincte."}, "id": "chronic_condition_in_hh", "label": {"en": "Any household member has a diagnosed chronic condition", "es": "Alg\u00fan miembro del hogar tiene una condici\u00f3n cr\u00f3nica diagnosticada", "fr": "Un membre du m\u00e9nage a une affection chronique diagnostiqu\u00e9e"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
