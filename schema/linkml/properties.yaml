  distribution_point_feels_safe:
    title:
      en: Distribution point feels safe for women and girls
      fr: Le point de distribution semble sûr pour les femmes et les filles
      es: El punto de distribución se percibe seguro para mujeres y niñas
    description:
      en: 'Household-reported perception of whether the aid distribution point (food, NFIs, or other items) feels safe for women and girls. Recall period: past month. Skip if the household does not participate in distributions. Aid distribution points are documented GBV risk locations, particularly during food distributions where crowd management is poor (IASC GBV Guidelines 2015; WFP/GBV AoR joint guidance). Safety at distribution points is a Food Security cluster cross-cutting GBV indicator. The safety-perception-3 vocabulary applies; if the household does not receive distributions, use ''dont_know'' or apply skip logic.'
      fr: 'Perception déclarée par le ménage si le point de distribution d''aide (vivres, ANAs ou autres articles) semble sûr pour les femmes et les filles. Période de rappel : le mois dernier. Ignorer si le ménage ne participe pas aux distributions. Les points de distribution d''aide sont des lieux de risque VBG documentés, notamment lors des distributions alimentaires avec une mauvaise gestion des foules. La sécurité aux points de distribution est un indicateur VBG transversal du cluster Sécurité alimentaire.'
      es: 'Percepción reportada por el hogar sobre si el punto de distribución de ayuda (alimentos, ANF u otros artículos) se percibe como seguro para mujeres y niñas. Período de recuerdo: último mes. Omitir si el hogar no participa en distribuciones. Los puntos de distribución de ayuda son lugares de riesgo VBG documentados, especialmente durante distribuciones de alimentos con manejo deficiente de multitudes. La seguridad en los puntos de distribución es un indicador VBG transversal del clúster de Seguridad Alimentaria.'
    slot_uri: aidops:distribution_point_feels_safe
    range: SafetyPerception3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015"], "cardinality": "single", "category": "gbv_safety_perception", "core": false, "definition": {"en": "Household-reported perception of whether the aid distribution point (food, NFIs, or other items) feels safe for women and girls. Recall period: past month. Skip if the household does not participate in distributions. Aid distribution points are documented GBV risk locations, particularly during food distributions where crowd management is poor (IASC GBV Guidelines 2015; WFP/GBV AoR joint guidance). Safety at distribution points is a Food Security cluster cross-cutting GBV indicator. The safety-perception-3 vocabulary applies; if the household does not receive distributions, use ''dont_know'' or apply skip logic.", "es": "Percepci\u00f3n reportada por el hogar sobre si el punto de distribuci\u00f3n de ayuda (alimentos, ANF u otros art\u00edculos) se percibe como seguro para mujeres y ni\u00f1as. Per\u00edodo de recuerdo: \u00faltimo mes. Omitir si el hogar no participa en distribuciones. Los puntos de distribuci\u00f3n de ayuda son lugares de riesgo VBG documentados, especialmente durante distribuciones de alimentos con manejo deficiente de multitudes. La seguridad en los puntos de distribuci\u00f3n es un indicador VBG transversal del cl\u00faster de Seguridad Alimentaria.", "fr": "Perception d\u00e9clar\u00e9e par le m\u00e9nage si le point de distribution d''aide (vivres, ANAs ou autres articles) semble s\u00fbr pour les femmes et les filles. P\u00e9riode de rappel : le mois dernier. Ignorer si le m\u00e9nage ne participe pas aux distributions. Les points de distribution d''aide sont des lieux de risque VBG document\u00e9s, notamment lors des distributions alimentaires avec une mauvaise gestion des foules. La s\u00e9curit\u00e9 aux points de distribution est un indicateur VBG transversal du cluster S\u00e9curit\u00e9 alimentaire."}, "id": "distribution_point_feels_safe", "label": {"en": "Distribution point feels safe for women and girls", "es": "El punto de distribuci\u00f3n se percibe seguro para mujeres y ni\u00f1as", "fr": "Le point de distribution semble s\u00fbr pour les femmes et les filles"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "safety-perception-3"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015
  electricity_accident_past_12_months:
    title:
      en: Electricity accident in past 12 months
      fr: Accident lié à l'électricité au cours des 12 derniers mois
      es: Accidente eléctrico en los últimos 12 meses
    description:
      en: 'Whether any household member was injured by an electricity-related accident (electric shock, fire, or electrocution) at home in the past 12 months. MTF electricity health and safety attribute: Tier 4-5 criterion requires no past accidents AND no high future risk perception. If any electricity-related injury occurred in the past 12 months, the safety tier is Tier 0-3. Source: MTF household survey; WHO/World Bank harmonized questionnaire.'
      fr: 'Si un membre du ménage a été blessé par un accident lié à l''électricité (électrocution, incendie ou choc électrique) à domicile au cours des 12 derniers mois. Attribut de santé et sécurité de l''électricité MTF : le critère des niveaux 4 à 5 exige qu''il n''y ait eu aucun accident passé ET aucune perception élevée du risque futur. Si une blessure liée à l''électricité s''est produite au cours des 12 derniers mois, le niveau de sécurité est 0 à 3. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale.'
      es: 'Si algún miembro del hogar resultó herido por un accidente eléctrico (choque eléctrico, incendio o electrocución) en el hogar en los últimos 12 meses. Atributo de salud y seguridad de electricidad MTF: el criterio de los Niveles 4 a 5 requiere que no haya habido accidentes pasados NI alta percepción de riesgo futuro. Si ocurrió alguna lesión eléctrica en los últimos 12 meses, el nivel de seguridad es Nivel 0-3. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial.'
    slot_uri: aidops:electricity_accident_past_12_months
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Whether any household member was injured by an electricity-related accident (electric shock, fire, or electrocution) at home in the past 12 months. MTF electricity health and safety attribute: Tier 4-5 criterion requires no past accidents AND no high future risk perception. If any electricity-related injury occurred in the past 12 months, the safety tier is Tier 0-3. Source: MTF household survey; WHO/World Bank harmonized questionnaire.", "es": "Si alg\u00fan miembro del hogar result\u00f3 herido por un accidente el\u00e9ctrico (choque el\u00e9ctrico, incendio o electrocuci\u00f3n) en el hogar en los \u00faltimos 12 meses. Atributo de salud y seguridad de electricidad MTF: el criterio de los Niveles 4 a 5 requiere que no haya habido accidentes pasados NI alta percepci\u00f3n de riesgo futuro. Si ocurri\u00f3 alguna lesi\u00f3n el\u00e9ctrica en los \u00faltimos 12 meses, el nivel de seguridad es Nivel 0-3. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial.", "fr": "Si un membre du m\u00e9nage a \u00e9t\u00e9 bless\u00e9 par un accident li\u00e9 \u00e0 l''\u00e9lectricit\u00e9 (\u00e9lectrocution, incendie ou choc \u00e9lectrique) \u00e0 domicile au cours des 12 derniers mois. Attribut de sant\u00e9 et s\u00e9curit\u00e9 de l''\u00e9lectricit\u00e9 MTF : le crit\u00e8re des niveaux 4 \u00e0 5 exige qu''il n''y ait eu aucun accident pass\u00e9 ET aucune perception \u00e9lev\u00e9e du risque futur. Si une blessure li\u00e9e \u00e0 l''\u00e9lectricit\u00e9 s''est produite au cours des 12 derniers mois, le niveau de s\u00e9curit\u00e9 est 0 \u00e0 3. Source : enqu\u00eate m\u00e9nage MTF ; questionnaire harmonis\u00e9 OMS/Banque mondiale."}, "id": "electricity_accident_past_12_months", "label": {"en": "Electricity accident in past 12 months", "es": "Accidente el\u00e9ctrico en los \u00faltimos 12 meses", "fr": "Accident li\u00e9 \u00e0 l''\u00e9lectricit\u00e9 au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": null}'
