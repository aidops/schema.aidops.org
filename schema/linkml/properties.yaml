    range: FamilyPlanningMethod
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning", "mics6-contraception"], "cardinality": "multiple", "category": "family_planning", "core": true, "definition": {"en": "The contraceptive method or methods the woman is currently using (DHS FP2; MICS CP2). Multi-select. Ask only if fp_using_any_method = true. DHS-7 modern methods include: female and male sterilization, pill, IUD, injectables, implants, male condom, female condom, emergency contraception, standard days method, LAM. DHS-7 removes diaphragm from the modern list. Traditional methods: rhythm/periodic abstinence, withdrawal.", "es": "El m\u00e9todo o m\u00e9todos anticonceptivos que la mujer utiliza actualmente (DHS FP2; MICS CP2). Selecci\u00f3n m\u00faltiple. Preguntar solo si fp_using_any_method = verdadero. Los m\u00e9todos modernos DHS-7 incluyen: esterilizaci\u00f3n femenina y masculina, p\u00edldora, DIU, inyectables, implantes, cond\u00f3n masculino, cond\u00f3n femenino, anticoncepci\u00f3n de emergencia, m\u00e9todo de d\u00edas est\u00e1ndar, MELA. El DHS-7 elimina el diafragma de la lista moderna. M\u00e9todos tradicionales: ritmo/abstinencia peri\u00f3dica, coito interrumpido.", "fr": "La m\u00e9thode ou les m\u00e9thodes contraceptives que la femme utilise actuellement (DHS FP2 ; MICS CP2). S\u00e9lection multiple. Demander uniquement si fp_using_any_method = vrai. Les m\u00e9thodes modernes DHS-7 comprennent : st\u00e9rilisation f\u00e9minine et masculine, pilule, DIU, injectables, implants, pr\u00e9servatif masculin, pr\u00e9servatif f\u00e9minin, contraception d''urgence, m\u00e9thode des jours standard, MAMA. Le DHS-7 retire le diaphragme de la liste moderne. M\u00e9thodes traditionnelles : rythme/abstinence p\u00e9riodique, retrait."}, "id": "fp_current_method", "label": {"en": "Current contraceptive method(s) used", "es": "M\u00e9todo(s) anticonceptivo(s) actualmente utilizado(s)", "fr": "M\u00e9thode(s) contraceptive(s) actuellement utilis\u00e9e(s)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women", "mics6"], "vocabulary": "family-planning-method"}'
