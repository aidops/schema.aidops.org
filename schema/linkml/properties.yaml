      fr: 'Si le soignant a recherché des conseils ou un traitement auprès de quelqu''un pour la diarrhée de l''enfant. Formulation publiée : « Avez-vous cherché des conseils ou un traitement auprès de quelqu''un pour la diarrhée ? » Passerelle vers diarrhea_care_source. Posez uniquement si diarrhea_last_2wks est vrai. Code DHS h12 (variable passerelle) ; code MICS CD3.'
      es: 'Si el cuidador buscó consejo o tratamiento para la diarrea del niño de alguna persona. Redacción publicada: ''¿Buscó consejo o tratamiento para la diarrea de alguna persona?'' Puerta de entrada a diarrhea_care_source. Preguntar solo si diarrhea_last_2wks es verdadero. Código DHS h12 (variable de puerta); código MICS CD3.'
    slot_uri: aidops:diarrhea_care_sought
