    range: integer
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["fao-mdd-c", "who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived integer: count of the 8 MDD-C food groups consumed in the previous 24 hours. Applies to children 6\u201323 months. Computed as the sum of iycf_fg_breastmilk, iycf_fg_grains, iycf_fg_pulses_nuts, iycf_fg_dairy, iycf_fg_flesh, iycf_fg_eggs, iycf_fg_vitamin_a_veg_fruit, and iycf_fg_other_veg_fruit (each scored 1 if true, 0 otherwise). Range 0\u20138. Score >= 5 achieves MDD-C.", "es": "Entero derivado: conteo de los 8 grupos alimentarios MDD-C consumidos en las 24 horas anteriores. Se aplica a ni\u00f1os de 6\u201323 meses. Calculado como la suma de iycf_fg_breastmilk, iycf_fg_grains, iycf_fg_pulses_nuts, iycf_fg_dairy, iycf_fg_flesh, iycf_fg_eggs, iycf_fg_vitamin_a_veg_fruit e iycf_fg_other_veg_fruit (cada uno puntuado 1 si es verdadero, 0 si no). Rango 0\u20138. Puntaje >= 5 logra el MDD-C.", "fr": "Entier d\u00e9riv\u00e9 : d\u00e9compte des 8 groupes alimentaires MDD-C consomm\u00e9s au cours des 24 heures pr\u00e9c\u00e9dentes. S''applique aux enfants de 6 \u00e0 23 mois. Calcul\u00e9 comme la somme de iycf_fg_breastmilk, iycf_fg_grains, iycf_fg_pulses_nuts, iycf_fg_dairy, iycf_fg_flesh, iycf_fg_eggs, iycf_fg_vitamin_a_veg_fruit et iycf_fg_other_veg_fruit (chacun compt\u00e9 1 si vrai, 0 sinon). Plage 0\u20138. Un score >= 5 atteint le MDD-C."}, "id": "iycf_mdd_c_score", "label": {"en": "MDD-C food group score", "es": "Puntaje MDD-C de grupos alimentarios", "fr": "Score MDD-C des groupes alimentaires"}, "maturity": "draft", "references": null, "type": "integer", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
