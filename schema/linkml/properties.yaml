  stove_preparation_time_minutes:
    title:
      en: Stove preparation time (minutes)
      fr: Temps de préparation du foyer (minutes)
      es: Tiempo de preparación de la cocina (minutos)
    description:
      en: 'Minutes it usually takes to prepare the stove before cooking can start (for example, to light the fire, add fuel, or turn on the stove). MTF cooking convenience attribute — stove preparation time tier thresholds: less than 2 min = Tier 4-5; less than 5 min = Tier 3; less than 10 min = Tier 2; less than 15 min = Tier 1; 15 or more min = Tier 0. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q8.'
      fr: 'Minutes qu''il faut habituellement pour préparer le foyer avant de commencer à cuisiner (par exemple, allumer le feu, ajouter du combustible ou allumer le réchaud). Attribut de commodité de cuisson MTF — seuils de niveau pour le temps de préparation du foyer : moins de 2 min = niveaux 4-5 ; moins de 5 min = niveau 3 ; moins de 10 min = niveau 2 ; moins de 15 min = niveau 1 ; 15 min ou plus = niveau 0. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q8.'
      es: 'Minutos que normalmente toma preparar la cocina antes de poder comenzar a cocinar (por ejemplo, encender el fuego, agregar combustible o encender la cocina). Atributo de conveniencia de cocción MTF: umbrales de nivel para el tiempo de preparación de la cocina: menos de 2 min = Niveles 4-5; menos de 5 min = Nivel 3; menos de 10 min = Nivel 2; menos de 15 min = Nivel 1; 15 min o más = Nivel 0. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q8.'
    slot_uri: aidops:stove_preparation_time_minutes
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Minutes it usually takes to prepare the stove before cooking can start (for example, to light the fire, add fuel, or turn on the stove). MTF cooking convenience attribute \u2014 stove preparation time tier thresholds: less than 2 min = Tier 4-5; less than 5 min = Tier 3; less than 10 min = Tier 2; less than 15 min = Tier 1; 15 or more min = Tier 0. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q8.", "es": "Minutos que normalmente toma preparar la cocina antes de poder comenzar a cocinar (por ejemplo, encender el fuego, agregar combustible o encender la cocina). Atributo de conveniencia de cocci\u00f3n MTF: umbrales de nivel para el tiempo de preparaci\u00f3n de la cocina: menos de 2 min = Niveles 4-5; menos de 5 min = Nivel 3; menos de 10 min = Nivel 2; menos de 15 min = Nivel 1; 15 min o m\u00e1s = Nivel 0. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q8.", "fr": "Minutes qu''il faut habituellement pour pr\u00e9parer le foyer avant de commencer \u00e0 cuisiner (par exemple, allumer le feu, ajouter du combustible ou allumer le r\u00e9chaud). Attribut de commodit\u00e9 de cuisson MTF \u2014 seuils de niveau pour le temps de pr\u00e9paration du foyer : moins de 2 min = niveaux 4-5 ; moins de 5 min = niveau 3 ; moins de 10 min = niveau 2 ; moins de 15 min = niveau 1 ; 15 min ou plus = niveau 0. Source : enqu\u00eate m\u00e9nage MTF ; questionnaire harmonis\u00e9 OMS/Banque mondiale Q8."}, "id": "stove_preparation_time_minutes", "label": {"en": "Stove preparation time (minutes)", "es": "Tiempo de preparaci\u00f3n de la cocina (minutos)", "fr": "Temps de pr\u00e9paration du foyer (minutes)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": null}'
      bibliography_refs: se4all-mtf,who-world-bank-core-energy-questions
  stress_sale_occurred:
    title:
      en: Household sold livestock under stress conditions — last 30 days
      fr: Le ménage a vendu du bétail dans des conditions de détresse — 30 derniers jours
      es: El hogar vendió ganado bajo condiciones de estrés — últimos 30 días
    description:
      en: 'Whether the household sold any livestock that it would not normally have sold at this time of year, or sold animals at a lower price than usual, because of food shortage, lack of water or pasture, debt, or other hardship in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Recall period: 30 days. This is the pastoral current-season stress indicator. It co-exists with `AgricultureProfile.livestock_stress_sale_past_season` (12-month recall, binary) without duplication: the AgricultureProfile item is the annual aggregate flag for all livestock-keeping households; this item is the current-season 30-day stress indicator specific to pastoral contexts and is paired with pastoral-specific follow-up items (`stress_sale_price_vs_baseline`, `stress_sale_reason`). The two items should both be collected when both profiles are co-administered; enumerator instructions should explain that the two items cover different recall windows. Also complements `FoodSecurityProfile.lcs_sold_productive_assets` (LCS-FS general productive-asset selling flag): LCS captures the general coping behavior; this item adds pastoral-specific price and cause detail without duplicating the LCS flag. Grounded in LEGS 3rd edition Chapter 3, FSNAU offtake items, IPC AFI pastoral annex, and HEA coping strategy livestock disposal module.'
      fr: 'Si le ménage a vendu du bétail qu''il n''aurait normalement pas vendu à cette période de l''année, ou a vendu des animaux à un prix inférieur à la normale, en raison d''une pénurie alimentaire, d''un manque d''eau ou de pâturage, de dettes ou d''autres difficultés au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Période de rappel : 30 jours. Coexiste avec `AgricultureProfile.livestock_stress_sale_past_season` (rappel 12 mois, binaire) sans duplication : l''item AgricultureProfile est l''indicateur annuel agrégé ; cet item est l''indicateur de stress de la saison actuelle sur 30 jours spécifique aux contextes pastoraux, couplé à des items de suivi pastoraux spécifiques.'
      es: 'Si el hogar vendió ganado que normalmente no habría vendido en esta época del año, o vendió animales a un precio inferior al habitual, debido a escasez de alimentos, falta de agua o pastos, deudas u otras dificultades en los últimos 30 días. Sí / No / No sabe (vocabulario `yes-no-dk`). Período de recordatorio: 30 días. Coexiste con `AgricultureProfile.livestock_stress_sale_past_season` (recordatorio 12 meses, binario) sin duplicación: el ítem de AgricultureProfile es el indicador agregado anual; este ítem es el indicador de estrés de la temporada actual de 30 días específico de contextos pastorales, combinado con ítems de seguimiento pastorales específicos.'
    slot_uri: aidops:stress_sale_occurred
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_market", "core": true, "definition": {"en": "Whether the household sold any livestock that it would not normally have sold at this time of year, or sold animals at a lower price than usual, because of food shortage, lack of water or pasture, debt, or other hardship in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Recall period: 30 days. This is the pastoral current-season stress indicator. It co-exists with `AgricultureProfile.livestock_stress_sale_past_season` (12-month recall, binary) without duplication: the AgricultureProfile item is the annual aggregate flag for all livestock-keeping households; this item is the current-season 30-day stress indicator specific to pastoral contexts and is paired with pastoral-specific follow-up items (`stress_sale_price_vs_baseline`, `stress_sale_reason`). The two items should both be collected when both profiles are co-administered; enumerator instructions should explain that the two items cover different recall windows. Also complements `FoodSecurityProfile.lcs_sold_productive_assets` (LCS-FS general productive-asset selling flag): LCS captures the general coping behavior; this item adds pastoral-specific price and cause detail without duplicating the LCS flag. Grounded in LEGS 3rd edition Chapter 3, FSNAU offtake items, IPC AFI pastoral annex, and HEA coping strategy livestock disposal module.", "es": "Si el hogar vendi\u00f3 ganado que normalmente no habr\u00eda vendido en esta \u00e9poca del a\u00f1o, o vendi\u00f3 animales a un precio inferior al habitual, debido a escasez de alimentos, falta de agua o pastos, deudas u otras dificultades en los \u00faltimos 30 d\u00edas. S\u00ed / No / No sabe (vocabulario `yes-no-dk`). Per\u00edodo de recordatorio: 30 d\u00edas. Coexiste con `AgricultureProfile.livestock_stress_sale_past_season` (recordatorio 12 meses, binario) sin duplicaci\u00f3n: el \u00edtem de AgricultureProfile es el indicador agregado anual; este \u00edtem es el indicador de estr\u00e9s de la temporada actual de 30 d\u00edas espec\u00edfico de contextos pastorales, combinado con \u00edtems de seguimiento pastorales espec\u00edficos.", "fr": "Si le m\u00e9nage a vendu du b\u00e9tail qu''il n''aurait normalement pas vendu \u00e0 cette p\u00e9riode de l''ann\u00e9e, ou a vendu des animaux \u00e0 un prix inf\u00e9rieur \u00e0 la normale, en raison d''une p\u00e9nurie alimentaire, d''un manque d''eau ou de p\u00e2turage, de dettes ou d''autres difficult\u00e9s au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). P\u00e9riode de rappel : 30 jours. Coexiste avec `AgricultureProfile.livestock_stress_sale_past_season` (rappel 12 mois, binaire) sans duplication : l''item AgricultureProfile est l''indicateur annuel agr\u00e9g\u00e9 ; cet item est l''indicateur de stress de la saison actuelle sur 30 jours sp\u00e9cifique aux contextes pastoraux, coupl\u00e9 \u00e0 des items de suivi pastoraux sp\u00e9cifiques."}, "id": "stress_sale_occurred", "label": {"en": "Household sold livestock under stress conditions \u2014 last 30 days", "es": "El hogar vendi\u00f3 ganado bajo condiciones de estr\u00e9s \u2014 \u00faltimos 30 d\u00edas", "fr": "Le m\u00e9nage a vendu du b\u00e9tail dans des conditions de d\u00e9tresse \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023
  stress_sale_price_vs_baseline:
    title:
      en: Stress sale price relative to seasonal baseline
      fr: Prix de vente de détresse par rapport à la référence saisonnière
      es: Precio de venta de estrés relativo a la línea base estacional
    description:
      en: 'Whether the price received for livestock at the stress sale was higher, the same, or lower than the usual price for this time of year. Single-select from vocabulary `stress-sale-price-relative`. Applies only when `stress_sale_occurred` is `yes`. This is a terms-of-trade input item: below-normal sale prices at pastoral stress sales are an IPC destitution indicator (used in FSNAU/IPC pastoral analysis to identify households selling at fire-sale prices, which signals acute asset liquidation under extreme pressure). The severity bands (below_normal_slight, below_normal_significant, below_normal_severe) are adapted from FSNAU and FEWSNET price-relative coding. The `could_not_sell` code captures market failure. `core: false` — recommended for comprehensive seasonal assessments. Grounded in FEWSNET terms-of-trade monitoring, FSNAU market items, LEGS 3rd edition (price-relative as liquidation-depth indicator), and IPC AFI pastoral annex (below-normal sale prices as IPC destitution indicator).'
      fr: 'Si le prix reçu pour le bétail lors de la vente de détresse était supérieur, identique ou inférieur au prix habituel à cette période de l''année. Sélection unique dans le vocabulaire `stress-sale-price-relative`. S''applique uniquement lorsque `stress_sale_occurred` est `yes`. Il s''agit d''un item de saisie des termes de l''échange : des prix de vente inférieurs à la normale lors de ventes de détresse pastorales constituent un indicateur de dénuement IPC. `core: false` — recommandé pour les évaluations saisonnières complètes. Fondé sur le suivi des termes de l''échange FEWSNET, les items de marché FSNAU, LEGS 3e éd. et l''annexe pastoraliste IPC AFI.'
      es: 'Si el precio recibido por el ganado en la venta de estrés fue mayor, igual o menor que el precio habitual para esta época del año. Selección única del vocabulario `stress-sale-price-relative`. Aplica solo cuando `stress_sale_occurred` es `yes`. Es un ítem de entrada de términos de intercambio: los precios de venta por debajo de lo normal en ventas de estrés pastoral son un indicador de destitución IPC. `core: false` — recomendado para evaluaciones estacionales integrales. Fundamentado en el monitoreo de términos de intercambio de FEWSNET, ítems de mercado FSNAU, LEGS 3.a ed. y el anexo pastoralista IPC AFI.'
    slot_uri: aidops:stress_sale_price_vs_baseline
    range: StressSalePriceRelative
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_market", "core": false, "definition": {"en": "Whether the price received for livestock at the stress sale was higher, the same, or lower than the usual price for this time of year. Single-select from vocabulary `stress-sale-price-relative`. Applies only when `stress_sale_occurred` is `yes`. This is a terms-of-trade input item: below-normal sale prices at pastoral stress sales are an IPC destitution indicator (used in FSNAU/IPC pastoral analysis to identify households selling at fire-sale prices, which signals acute asset liquidation under extreme pressure). The severity bands (below_normal_slight, below_normal_significant, below_normal_severe) are adapted from FSNAU and FEWSNET price-relative coding. The `could_not_sell` code captures market failure. `core: false` \u2014 recommended for comprehensive seasonal assessments. Grounded in FEWSNET terms-of-trade monitoring, FSNAU market items, LEGS 3rd edition (price-relative as liquidation-depth indicator), and IPC AFI pastoral annex (below-normal sale prices as IPC destitution indicator).", "es": "Si el precio recibido por el ganado en la venta de estr\u00e9s fue mayor, igual o menor que el precio habitual para esta \u00e9poca del a\u00f1o. Selecci\u00f3n \u00fanica del vocabulario `stress-sale-price-relative`. Aplica solo cuando `stress_sale_occurred` es `yes`. Es un \u00edtem de entrada de t\u00e9rminos de intercambio: los precios de venta por debajo de lo normal en ventas de estr\u00e9s pastoral son un indicador de destituci\u00f3n IPC. `core: false` \u2014 recomendado para evaluaciones estacionales integrales. Fundamentado en el monitoreo de t\u00e9rminos de intercambio de FEWSNET, \u00edtems de mercado FSNAU, LEGS 3.a ed. y el anexo pastoralista IPC AFI.", "fr": "Si le prix re\u00e7u pour le b\u00e9tail lors de la vente de d\u00e9tresse \u00e9tait sup\u00e9rieur, identique ou inf\u00e9rieur au prix habituel \u00e0 cette p\u00e9riode de l''ann\u00e9e. S\u00e9lection unique dans le vocabulaire `stress-sale-price-relative`. S''applique uniquement lorsque `stress_sale_occurred` est `yes`. Il s''agit d''un item de saisie des termes de l''\u00e9change : des prix de vente inf\u00e9rieurs \u00e0 la normale lors de ventes de d\u00e9tresse pastorales constituent un indicateur de d\u00e9nuement IPC. `core: false` \u2014 recommand\u00e9 pour les \u00e9valuations saisonni\u00e8res compl\u00e8tes. Fond\u00e9 sur le suivi des termes de l''\u00e9change FEWSNET, les items de march\u00e9 FSNAU, LEGS 3e \u00e9d. et l''annexe pastoraliste IPC AFI."}, "id": "stress_sale_price_vs_baseline", "label": {"en": "Stress sale price relative to seasonal baseline", "es": "Precio de venta de estr\u00e9s relativo a la l\u00ednea base estacional", "fr": "Prix de vente de d\u00e9tresse par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "stress-sale-price-relative"}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023
  stress_sale_reason:
    title:
      en: Primary reason for stress livestock sale
      fr: Raison principale de la vente de bétail de détresse
      es: Razón principal de la venta de ganado de estrés
    description:
      en: 'The main reason the household sold livestock early or at a lower price than normal. Single-select from vocabulary `stress-sale-reason`; respondent selects the most important reason. Applies only when `stress_sale_occurred` is `yes`. This reason taxonomy is pastoral-specific: it includes `water_or_pasture_shortage` and `conflict_pre_emptive` — causes that are characteristic of pastoral stress sales but are not captured in FoodSecurityProfile LCS-FS items. The `conflict_pre_emptive` code is partially sensitive (see sensitivity): pre-emptive sales in anticipation of raiding imply knowledge of an anticipated armed event; apply code-level suppression in external data shares and retain for internal analysis only. Grounded in LEGS 3rd edition Chapter 3 (reasons for distress liquidation), FSNAU offtake cause items, and HEA coping module. `core: false` — recommended for comprehensive seasonal assessments.'
      fr: 'La raison principale pour laquelle le ménage a vendu du bétail tôt ou à un prix inférieur à la normale. Sélection unique dans le vocabulaire `stress-sale-reason` ; le répondant sélectionne la raison la plus importante. S''applique uniquement lorsque `stress_sale_occurred` est `yes`. Cette taxonomie des raisons est propre au contexte pastoral : elle inclut `water_or_pasture_shortage` et `conflict_pre_emptive`. Le code `conflict_pre_emptive` est partiellement sensible : les ventes préventives en prévision d''un pillage impliquent la connaissance d''un événement armé prévu ; appliquer une suppression au niveau du code dans les partages de données externes. `core: false`.'
      es: 'La razón principal por la que el hogar vendió ganado anticipadamente o a un precio menor al normal. Selección única del vocabulario `stress-sale-reason`; el encuestado selecciona la razón más importante. Aplica solo cuando `stress_sale_occurred` es `yes`. Esta taxonomía de razones es específica del contexto pastoral: incluye `water_or_pasture_shortage` y `conflict_pre_emptive`. El código `conflict_pre_emptive` es parcialmente sensible: las ventas preventivas en anticipación de rapiña implican conocimiento de un evento armado previsto; aplicar supresión a nivel de código en intercambios de datos externos. `core: false`.'
    slot_uri: aidops:stress_sale_reason
    range: StressSaleReason
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_market", "core": false, "definition": {"en": "The main reason the household sold livestock early or at a lower price than normal. Single-select from vocabulary `stress-sale-reason`; respondent selects the most important reason. Applies only when `stress_sale_occurred` is `yes`. This reason taxonomy is pastoral-specific: it includes `water_or_pasture_shortage` and `conflict_pre_emptive` \u2014 causes that are characteristic of pastoral stress sales but are not captured in FoodSecurityProfile LCS-FS items. The `conflict_pre_emptive` code is partially sensitive (see sensitivity): pre-emptive sales in anticipation of raiding imply knowledge of an anticipated armed event; apply code-level suppression in external data shares and retain for internal analysis only. Grounded in LEGS 3rd edition Chapter 3 (reasons for distress liquidation), FSNAU offtake cause items, and HEA coping module. `core: false` \u2014 recommended for comprehensive seasonal assessments.", "es": "La raz\u00f3n principal por la que el hogar vendi\u00f3 ganado anticipadamente o a un precio menor al normal. Selecci\u00f3n \u00fanica del vocabulario `stress-sale-reason`; el encuestado selecciona la raz\u00f3n m\u00e1s importante. Aplica solo cuando `stress_sale_occurred` es `yes`. Esta taxonom\u00eda de razones es espec\u00edfica del contexto pastoral: incluye `water_or_pasture_shortage` y `conflict_pre_emptive`. El c\u00f3digo `conflict_pre_emptive` es parcialmente sensible: las ventas preventivas en anticipaci\u00f3n de rapi\u00f1a implican conocimiento de un evento armado previsto; aplicar supresi\u00f3n a nivel de c\u00f3digo en intercambios de datos externos. `core: false`.", "fr": "La raison principale pour laquelle le m\u00e9nage a vendu du b\u00e9tail t\u00f4t ou \u00e0 un prix inf\u00e9rieur \u00e0 la normale. S\u00e9lection unique dans le vocabulaire `stress-sale-reason` ; le r\u00e9pondant s\u00e9lectionne la raison la plus importante. S''applique uniquement lorsque `stress_sale_occurred` est `yes`. Cette taxonomie des raisons est propre au contexte pastoral : elle inclut `water_or_pasture_shortage` et `conflict_pre_emptive`. Le code `conflict_pre_emptive` est partiellement sensible : les ventes pr\u00e9ventives en pr\u00e9vision d''un pillage impliquent la connaissance d''un \u00e9v\u00e9nement arm\u00e9 pr\u00e9vu ; appliquer une suppression au niveau du code dans les partages de donn\u00e9es externes. `core: false`."}, "id": "stress_sale_reason", "label": {"en": "Primary reason for stress livestock sale", "es": "Raz\u00f3n principal de la venta de ganado de estr\u00e9s", "fr": "Raison principale de la vente de b\u00e9tail de d\u00e9tresse"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "stress-sale-reason"}'
