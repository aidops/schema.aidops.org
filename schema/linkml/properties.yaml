  cooking_location:
    title:
      en: Cooking location
      fr: Lieu de cuisson
      es: Lugar de cocción
    description:
      en: 'Where the household usually cooks. Cooking location is required to apply the MTF cooking exposure attribute: indoor cooking without a chimney is the highest indoor air pollution exposure configuration. The default ventilation scenario for PM2.5 tier crosswalk applies when cooking location is indoors without chimney; improved ventilation thresholds apply for outdoor or indoor-with-chimney configurations. Source: WHO/World Bank harmonized questionnaire Q5; MTF household survey.'
      fr: 'L''endroit où le ménage cuisine habituellement. Le lieu de cuisson est nécessaire pour appliquer l''attribut d''exposition MTF de cuisson : cuisiner à l''intérieur sans cheminée est la configuration présentant la plus forte exposition aux HAP. Le scénario de ventilation par défaut pour le tableau de correspondance des niveaux PM2,5 s''applique lorsque le lieu de cuisson est intérieur sans cheminée ; les seuils de ventilation améliorée s''appliquent aux configurations extérieures ou intérieures avec cheminée. Source : questionnaire harmonisé OMS/Banque mondiale Q5 ; enquête ménage MTF.'
      es: 'Donde el hogar cocina habitualmente. El lugar de cocción es necesario para aplicar el atributo de exposición de cocción MTF: cocinar en interiores sin chimenea es la configuración de mayor exposición a la contaminación del aire interior. El escenario de ventilación por defecto para la tabla de referencia de niveles PM2,5 se aplica cuando el lugar de cocción es interior sin chimenea; los umbrales de ventilación mejorada se aplican para configuraciones exteriores o interiores con chimenea. Fuente: cuestionario armonizado OMS/Banco Mundial Q5; encuesta de hogares MTF.'
    slot_uri: aidops:cooking_location
    range: CookingLocation
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Where the household usually cooks. Cooking location is required to apply the MTF cooking exposure attribute: indoor cooking without a chimney is the highest indoor air pollution exposure configuration. The default ventilation scenario for PM2.5 tier crosswalk applies when cooking location is indoors without chimney; improved ventilation thresholds apply for outdoor or indoor-with-chimney configurations. Source: WHO/World Bank harmonized questionnaire Q5; MTF household survey.", "es": "Donde el hogar cocina habitualmente. El lugar de cocci\u00f3n es necesario para aplicar el atributo de exposici\u00f3n de cocci\u00f3n MTF: cocinar en interiores sin chimenea es la configuraci\u00f3n de mayor exposici\u00f3n a la contaminaci\u00f3n del aire interior. El escenario de ventilaci\u00f3n por defecto para la tabla de referencia de niveles PM2,5 se aplica cuando el lugar de cocci\u00f3n es interior sin chimenea; los umbrales de ventilaci\u00f3n mejorada se aplican para configuraciones exteriores o interiores con chimenea. Fuente: cuestionario armonizado OMS/Banco Mundial Q5; encuesta de hogares MTF.", "fr": "L''endroit o\u00f9 le m\u00e9nage cuisine habituellement. Le lieu de cuisson est n\u00e9cessaire pour appliquer l''attribut d''exposition MTF de cuisson : cuisiner \u00e0 l''int\u00e9rieur sans chemin\u00e9e est la configuration pr\u00e9sentant la plus forte exposition aux HAP. Le sc\u00e9nario de ventilation par d\u00e9faut pour le tableau de correspondance des niveaux PM2,5 s''applique lorsque le lieu de cuisson est int\u00e9rieur sans chemin\u00e9e ; les seuils de ventilation am\u00e9lior\u00e9e s''appliquent aux configurations ext\u00e9rieures ou int\u00e9rieures avec chemin\u00e9e. Source : questionnaire harmonis\u00e9 OMS/Banque mondiale Q5 ; enqu\u00eate m\u00e9nage MTF."}, "id": "cooking_location", "label": {"en": "Cooking location", "es": "Lugar de cocci\u00f3n", "fr": "Lieu de cuisson"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": "cooking-location"}'
      bibliography_refs: se4all-mtf,who-world-bank-core-energy-questions
  cooking_mtf_tier:
    title:
      en: Cooking MTF tier
      fr: Niveau MTF de cuisson
      es: Nivel MTF de cocción
    description:
      en: 'The derived SE4All Multi-Tier Framework (MTF) tier for household cooking energy access. Computed as the minimum tier across six attributes: PM2.5 emission rate (derived from primary_cooking_stove_type and cooking_fuel via ESMAP/WHO crosswalk under the default ventilation scenario, adjusted by cooking_stove_has_chimney and cooking_location), CO emission rate (same derivation), cookstove efficiency (derived from stove type), convenience (from fuel_collection_time_hours_per_week and stove_preparation_time_minutes), safety (from cooking_accident_past_12_months), affordability (from cooking_fuel_cost_share), and fuel availability (from cooking_fuel_availability_months). The default ventilation scenario applies when cooking_location is indoor_without_chimney; improved ventilation thresholds apply for outdoor or indoor_with_chimney configurations. A ScoringEvent provides the authoritative computation including the PM2.5/CO crosswalk logic.'
      fr: 'Le niveau dérivé du cadre multi-niveaux (MTF) SE4All pour l''accès du ménage à l''énergie de cuisson. Calculé comme le niveau minimum sur six attributs : taux d''émission de PM2,5 (dérivé de primary_cooking_stove_type et cooking_fuel via le tableau de correspondance ESMAP/OMS dans le scénario de ventilation par défaut, ajusté par cooking_stove_has_chimney et cooking_location), taux d''émission de CO (même dérivation), efficacité du foyer (dérivée du type de foyer), commodité (à partir de fuel_collection_time_hours_per_week et stove_preparation_time_minutes), sécurité (à partir de cooking_accident_past_12_months), accessibilité financière (à partir de cooking_fuel_cost_share) et disponibilité du combustible (à partir de cooking_fuel_availability_months). Le scénario de ventilation par défaut s''applique lorsque cooking_location est indoor_without_chimney ; les seuils de ventilation améliorée s''appliquent pour les configurations extérieures ou indoor_with_chimney. Un ScoringEvent fournit le calcul de référence incluant la logique de tableau de correspondance PM2,5/CO.'
      es: 'El nivel derivado del Marco de Múltiples Niveles (MTF) SE4All para el acceso energético de cocción del hogar. Calculado como el nivel mínimo entre seis atributos: tasa de emisión de PM2,5 (derivada de primary_cooking_stove_type y cooking_fuel mediante la tabla de referencia ESMAP/OMS bajo el escenario de ventilación por defecto, ajustada por cooking_stove_has_chimney y cooking_location), tasa de emisión de CO (misma derivación), eficiencia de la cocina (derivada del tipo de cocina), conveniencia (de fuel_collection_time_hours_per_week y stove_preparation_time_minutes), seguridad (de cooking_accident_past_12_months), asequibilidad (de cooking_fuel_cost_share) y disponibilidad del combustible (de cooking_fuel_availability_months). El escenario de ventilación por defecto se aplica cuando cooking_location es indoor_without_chimney; los umbrales de ventilación mejorada se aplican para configuraciones exteriores o indoor_with_chimney. Un ScoringEvent proporciona el cálculo autoritativo incluyendo la lógica de tabla de referencia PM2,5/CO.'
    slot_uri: aidops:cooking_mtf_tier
    range: CookingMtfTier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-household-energy-database"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "The derived SE4All Multi-Tier Framework (MTF) tier for household cooking energy access. Computed as the minimum tier across six attributes: PM2.5 emission rate (derived from primary_cooking_stove_type and cooking_fuel via ESMAP/WHO crosswalk under the default ventilation scenario, adjusted by cooking_stove_has_chimney and cooking_location), CO emission rate (same derivation), cookstove efficiency (derived from stove type), convenience (from fuel_collection_time_hours_per_week and stove_preparation_time_minutes), safety (from cooking_accident_past_12_months), affordability (from cooking_fuel_cost_share), and fuel availability (from cooking_fuel_availability_months). The default ventilation scenario applies when cooking_location is indoor_without_chimney; improved ventilation thresholds apply for outdoor or indoor_with_chimney configurations. A ScoringEvent provides the authoritative computation including the PM2.5/CO crosswalk logic.", "es": "El nivel derivado del Marco de M\u00faltiples Niveles (MTF) SE4All para el acceso energ\u00e9tico de cocci\u00f3n del hogar. Calculado como el nivel m\u00ednimo entre seis atributos: tasa de emisi\u00f3n de PM2,5 (derivada de primary_cooking_stove_type y cooking_fuel mediante la tabla de referencia ESMAP/OMS bajo el escenario de ventilaci\u00f3n por defecto, ajustada por cooking_stove_has_chimney y cooking_location), tasa de emisi\u00f3n de CO (misma derivaci\u00f3n), eficiencia de la cocina (derivada del tipo de cocina), conveniencia (de fuel_collection_time_hours_per_week y stove_preparation_time_minutes), seguridad (de cooking_accident_past_12_months), asequibilidad (de cooking_fuel_cost_share) y disponibilidad del combustible (de cooking_fuel_availability_months). El escenario de ventilaci\u00f3n por defecto se aplica cuando cooking_location es indoor_without_chimney; los umbrales de ventilaci\u00f3n mejorada se aplican para configuraciones exteriores o indoor_with_chimney. Un ScoringEvent proporciona el c\u00e1lculo autoritativo incluyendo la l\u00f3gica de tabla de referencia PM2,5/CO.", "fr": "Le niveau d\u00e9riv\u00e9 du cadre multi-niveaux (MTF) SE4All pour l''acc\u00e8s du m\u00e9nage \u00e0 l''\u00e9nergie de cuisson. Calcul\u00e9 comme le niveau minimum sur six attributs : taux d''\u00e9mission de PM2,5 (d\u00e9riv\u00e9 de primary_cooking_stove_type et cooking_fuel via le tableau de correspondance ESMAP/OMS dans le sc\u00e9nario de ventilation par d\u00e9faut, ajust\u00e9 par cooking_stove_has_chimney et cooking_location), taux d''\u00e9mission de CO (m\u00eame d\u00e9rivation), efficacit\u00e9 du foyer (d\u00e9riv\u00e9e du type de foyer), commodit\u00e9 (\u00e0 partir de fuel_collection_time_hours_per_week et stove_preparation_time_minutes), s\u00e9curit\u00e9 (\u00e0 partir de cooking_accident_past_12_months), accessibilit\u00e9 financi\u00e8re (\u00e0 partir de cooking_fuel_cost_share) et disponibilit\u00e9 du combustible (\u00e0 partir de cooking_fuel_availability_months). Le sc\u00e9nario de ventilation par d\u00e9faut s''applique lorsque cooking_location est indoor_without_chimney ; les seuils de ventilation am\u00e9lior\u00e9e s''appliquent pour les configurations ext\u00e9rieures ou indoor_with_chimney. Un ScoringEvent fournit le calcul de r\u00e9f\u00e9rence incluant la logique de tableau de correspondance PM2,5/CO."}, "id": "cooking_mtf_tier", "label": {"en": "Cooking MTF tier", "es": "Nivel MTF de cocci\u00f3n", "fr": "Niveau MTF de cuisson"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "cooking-mtf-tier"}'
      bibliography_refs: se4all-mtf,who-household-energy-database
  cooking_stove_has_chimney:
    title:
      en: Cooking stove has chimney or flue
      fr: Le foyer de cuisson a une cheminée ou un conduit
      es: La cocina tiene chimenea o conducto
    description:
      en: 'Whether the household''s primary cooking stove has a chimney, flue, or fan to remove smoke from the cooking area. One of the two ventilation variables that adjusts the MTF cooking emission tier under default vs improved ventilation thresholds. Only applicable for solid-fuel stoves. Source: MICS6 EU2.'
      fr: 'Si le foyer de cuisson principal du ménage est équipé d''une cheminée, d''un conduit ou d''un ventilateur pour évacuer la fumée de la zone de cuisson. L''une des deux variables de ventilation qui ajuste le niveau d''émission MTF de cuisson selon les seuils de ventilation par défaut ou améliorée. Applicable uniquement aux foyers à combustible solide. Source : MICS6 EU2.'
      es: 'Si la cocina principal del hogar tiene chimenea, conducto o ventilador para eliminar el humo del área de cocción. Una de las dos variables de ventilación que ajusta el nivel de emisión de cocción MTF según los umbrales de ventilación por defecto o mejorada. Aplicable solo a cocinas de combustible sólido. Fuente: MICS6 EU2.'
    slot_uri: aidops:cooking_stove_has_chimney
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Whether the household''s primary cooking stove has a chimney, flue, or fan to remove smoke from the cooking area. One of the two ventilation variables that adjusts the MTF cooking emission tier under default vs improved ventilation thresholds. Only applicable for solid-fuel stoves. Source: MICS6 EU2.", "es": "Si la cocina principal del hogar tiene chimenea, conducto o ventilador para eliminar el humo del \u00e1rea de cocci\u00f3n. Una de las dos variables de ventilaci\u00f3n que ajusta el nivel de emisi\u00f3n de cocci\u00f3n MTF seg\u00fan los umbrales de ventilaci\u00f3n por defecto o mejorada. Aplicable solo a cocinas de combustible s\u00f3lido. Fuente: MICS6 EU2.", "fr": "Si le foyer de cuisson principal du m\u00e9nage est \u00e9quip\u00e9 d''une chemin\u00e9e, d''un conduit ou d''un ventilateur pour \u00e9vacuer la fum\u00e9e de la zone de cuisson. L''une des deux variables de ventilation qui ajuste le niveau d''\u00e9mission MTF de cuisson selon les seuils de ventilation par d\u00e9faut ou am\u00e9lior\u00e9e. Applicable uniquement aux foyers \u00e0 combustible solide. Source : MICS6 EU2."}, "id": "cooking_stove_has_chimney", "label": {"en": "Cooking stove has chimney or flue", "es": "La cocina tiene chimenea o conducto", "fr": "Le foyer de cuisson a une chemin\u00e9e ou un conduit"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["who_world_bank_core_energy", "unicef_mics6", "se4all_mtf"], "vocabulary": null}'
