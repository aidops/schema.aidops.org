  warning_reception_gender_gap:
    title:
      en: Warning reception gender gap
      fr: Écart de genre dans la réception des alertes
      es: Brecha de género en la recepción de alertas
    description:
      en: 'Whether every adult member of the household received or heard about the warning, or only some. Captured on a five-level scale: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non-sensitive at household level; downstream analysis should be attentive to protection implications when combined with other indicators. Informs IFRC PGI-in-AA and IASC Gender Handbook analysis of gendered information access.'
      fr: 'Indique si chaque membre adulte du ménage a reçu ou entendu parler de l''alerte, ou seulement certains. Capté sur une échelle à cinq niveaux : all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non sensible au niveau du ménage ; l''analyse en aval devrait être attentive aux implications de protection lorsqu''elle est combinée à d''autres indicateurs. Alimente l''analyse IFRC PGI-in-AA et du Manuel Genre IASC sur l''accès genré à l''information.'
      es: 'Indica si cada miembro adulto del hogar recibió o escuchó sobre la alerta, o solo algunos. Capturado en una escala de cinco niveles: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. No sensible a nivel del hogar; el análisis posterior debe ser atento a las implicaciones de protección cuando se combina con otros indicadores. Alimenta el análisis IFRC PGI-in-AA y del Manual de Género IASC sobre el acceso a la información por género.'
    slot_uri: aidops:warning_reception_gender_gap
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-pgi-aa-toolkit"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether every adult member of the household received or heard about the warning, or only some. Captured on a five-level scale: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non-sensitive at household level; downstream analysis should be attentive to protection implications when combined with other indicators. Informs IFRC PGI-in-AA and IASC Gender Handbook analysis of gendered information access.", "es": "Indica si cada miembro adulto del hogar recibi\u00f3 o escuch\u00f3 sobre la alerta, o solo algunos. Capturado en una escala de cinco niveles: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. No sensible a nivel del hogar; el an\u00e1lisis posterior debe ser atento a las implicaciones de protecci\u00f3n cuando se combina con otros indicadores. Alimenta el an\u00e1lisis IFRC PGI-in-AA y del Manual de G\u00e9nero IASC sobre el acceso a la informaci\u00f3n por g\u00e9nero.", "fr": "Indique si chaque membre adulte du m\u00e9nage a re\u00e7u ou entendu parler de l''alerte, ou seulement certains. Capt\u00e9 sur une \u00e9chelle \u00e0 cinq niveaux : all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non sensible au niveau du m\u00e9nage ; l''analyse en aval devrait \u00eatre attentive aux implications de protection lorsqu''elle est combin\u00e9e \u00e0 d''autres indicateurs. Alimente l''analyse IFRC PGI-in-AA et du Manuel Genre IASC sur l''acc\u00e8s genr\u00e9 \u00e0 l''information."}, "id": "warning_reception_gender_gap", "label": {"en": "Warning reception gender gap", "es": "Brecha de g\u00e9nero en la recepci\u00f3n de alertas", "fr": "\u00c9cart de genre dans la r\u00e9ception des alertes"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": null}'
      bibliography_refs: ifrc-pgi-aa-toolkit
  warning_source_authority:
    title:
      en: Warning source authority
      fr: Autorité émettrice de l'alerte
      es: Autoridad emisora de la alerta
    description:
      en: The organization or authority the respondent identifies as the issuer of the warning. Applicable only when warning_received is yes. Values drawn from the warning-source-authority vocabulary, covering national meteorological and disaster agencies, local government, UN agencies, the Red Cross Red Crescent movement, NGOs, religious and customary authorities, private media, and a 'don't know' code for respondents who cannot identify the issuer.
      fr: L'organisation ou l'autorité que le répondant identifie comme l'émetteur de l'alerte. Applicable uniquement si warning_received est oui. Valeurs issues du vocabulaire warning-source-authority, couvrant les agences météorologiques et de gestion des catastrophes nationales, les autorités locales, les agences des Nations Unies, le Mouvement de la Croix-Rouge et du Croissant-Rouge, les ONG, les autorités religieuses et coutumières, les médias privés, et un code « ne sait pas » pour les répondants qui ne peuvent identifier l'émetteur.
      es: La organización o autoridad que el respondiente identifica como emisora de la alerta. Aplicable solo cuando warning_received es sí. Valores tomados del vocabulario warning-source-authority, que abarca agencias meteorológicas y de gestión de desastres nacionales, gobierno local, agencias de las Naciones Unidas, el Movimiento de la Cruz Roja y la Media Luna Roja, ONG, autoridades religiosas y consuetudinarias, medios privados, y un código «no sabe» para respondientes que no pueden identificar al emisor.
    slot_uri: aidops:warning_source_authority
    range: WarningSourceAuthority
    annotations:
