  crop_loss_occurred:
    title:
      en: Crop loss occurred (derived)
      fr: Perte de récolte survenue (dérivé)
      es: Pérdida de cultivos ocurrida (derivado)
    description:
      en: 'Derived household-level boolean: true if `crop_loss_shock_past_season` equals `yes`, false if it equals `no`, and null/missing if it equals `dont_know` or was not asked. Not asked directly; computed in XLSForm `calculate` or post-hoc. Provides an analysis-friendly binary indicator for aggregate prevalence reporting of shock-driven crop loss in the season, without losing the three-level `yes-no-dk` signal retained in the raw item. Aligns with LSMS-ISA shock-module practice and WFP EFSA shock-exposure reporting.'
      fr: 'Booléen dérivé au niveau du ménage : vrai si `crop_loss_shock_past_season` vaut `yes`, faux si elle vaut `no`, et null/manquant si elle vaut `dont_know` ou n''a pas été posée. Pas demandé directement ; calculé dans un `calculate` XLSForm ou a posteriori. Fournit un indicateur binaire adapté à l''analyse pour le reporting de prévalence agrégée de la perte de récolte due aux chocs au cours de la saison, sans perdre le signal à trois niveaux `yes-no-dk` conservé dans l''item brut. S''aligne avec la pratique du module des chocs du LSMS-ISA et le reporting d''exposition aux chocs de l''EFSA du PAM.'
      es: 'Booleano derivado a nivel del hogar: verdadero si `crop_loss_shock_past_season` es `yes`, falso si es `no`, y null/faltante si es `dont_know` o no se preguntó. No se pregunta directamente; se computa en `calculate` de XLSForm o post-hoc. Proporciona un indicador binario amigable para el análisis para el reporte de prevalencia agregada de pérdida de cultivos por choques en la temporada, sin perder la señal de tres niveles `yes-no-dk` conservada en el ítem crudo. Se alinea con la práctica del módulo de choques de LSMS-ISA y el reporte de exposición a choques de EFSA del PMA.'
