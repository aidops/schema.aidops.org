  iycf_cbf:
    title:
      en: Continued breastfeeding (CBF)
      fr: Allaitement maternel continu (CBF)
      es: Lactancia materna continuada (CBF)
    description:
      en: 'Derived boolean: whether the child was breastfed yesterday. Applies to children 12–23 months (Continued Breastfeeding at 1 year indicator) and children 20–23 months (sub-group for Continued Breastfeeding at 2 years). Formula: iycf_breastfed_yesterday = true. Sub-group denominators (12–15 mo, 16–19 mo, 20–23 mo) are resolved at population-level analysis using child_age_months.'
      fr: 'Booléen dérivé : indique si l''enfant a été allaité hier. S''applique aux enfants de 12 à 23 mois (indicateur d''allaitement continu à 1 an) et aux enfants de 20 à 23 mois (sous-groupe pour l''allaitement continu à 2 ans). Formule : iycf_breastfed_yesterday = vrai. Les dénominateurs des sous-groupes (12–15 mois, 16–19 mois, 20–23 mois) sont résolus dans l''analyse au niveau de la population à l''aide de child_age_months.'
      es: 'Booleano derivado: indica si el niño fue amamantado ayer. Se aplica a niños de 12–23 meses (indicador de Lactancia Materna Continuada al año de edad) y niños de 20–23 meses (subgrupo para Lactancia Materna Continuada a los 2 años). Fórmula: iycf_breastfed_yesterday = verdadero. Los denominadores de subgrupo (12–15 meses, 16–19 meses, 20–23 meses) se resuelven en el análisis a nivel poblacional usando child_age_months.'
    slot_uri: aidops:iycf_cbf
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived boolean: whether the child was breastfed yesterday. Applies to children 12\u201323 months (Continued Breastfeeding at 1 year indicator) and children 20\u201323 months (sub-group for Continued Breastfeeding at 2 years). Formula: iycf_breastfed_yesterday = true. Sub-group denominators (12\u201315 mo, 16\u201319 mo, 20\u201323 mo) are resolved at population-level analysis using child_age_months.", "es": "Booleano derivado: indica si el ni\u00f1o fue amamantado ayer. Se aplica a ni\u00f1os de 12\u201323 meses (indicador de Lactancia Materna Continuada al a\u00f1o de edad) y ni\u00f1os de 20\u201323 meses (subgrupo para Lactancia Materna Continuada a los 2 a\u00f1os). F\u00f3rmula: iycf_breastfed_yesterday = verdadero. Los denominadores de subgrupo (12\u201315 meses, 16\u201319 meses, 20\u201323 meses) se resuelven en el an\u00e1lisis a nivel poblacional usando child_age_months.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 : indique si l''enfant a \u00e9t\u00e9 allait\u00e9 hier. S''applique aux enfants de 12 \u00e0 23 mois (indicateur d''allaitement continu \u00e0 1 an) et aux enfants de 20 \u00e0 23 mois (sous-groupe pour l''allaitement continu \u00e0 2 ans). Formule : iycf_breastfed_yesterday = vrai. Les d\u00e9nominateurs des sous-groupes (12\u201315 mois, 16\u201319 mois, 20\u201323 mois) sont r\u00e9solus dans l''analyse au niveau de la population \u00e0 l''aide de child_age_months."}, "id": "iycf_cbf", "label": {"en": "Continued breastfeeding (CBF)", "es": "Lactancia materna continuada (CBF)", "fr": "Allaitement maternel continu (CBF)"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
      bibliography_refs: who-iycf-2021
  iycf_cf_introduction_age_months:
    title:
      en: Age of complementary food introduction (months)
      fr: Âge d'introduction des aliments complémentaires (mois)
      es: Edad de introducción de alimentos complementarios (meses)
    description:
      en: 'The age in months at which the child was first given solid, semi-solid, or soft foods (retrospective recall by caregiver). Non-core retrospective item: subject to recall bias, especially for older children in the 6–23 month range. Complements the ISSSF current-status indicator (iycf_solid_food_yesterday). Range 0–23 months; a value of 0 indicates foods given in the first month of life.'
      fr: 'L''âge en mois auquel l''enfant a reçu pour la première fois des aliments solides, semi-solides ou mous (rappel rétrospectif du soignant). Item rétrospectif non essentiel : sujet au biais de rappel, en particulier pour les enfants plus âgés dans la tranche 6–23 mois. Complète l''indicateur de statut actuel ISSSF (iycf_solid_food_yesterday). Plage 0–23 mois ; une valeur de 0 indique des aliments donnés au premier mois de vie.'
      es: 'La edad en meses a la que el niño recibió por primera vez alimentos sólidos, semisólidos o blandos (recuerdo retrospectivo del cuidador). Ítem retrospectivo no esencial: sujeto a sesgo de memoria, especialmente para niños mayores en el rango de 6–23 meses. Complementa el indicador de estado actual ISSSF (iycf_solid_food_yesterday). Rango 0–23 meses; un valor de 0 indica alimentos dados en el primer mes de vida.'
    slot_uri: aidops:iycf_cf_introduction_age_months
    range: integer
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": false, "definition": {"en": "The age in months at which the child was first given solid, semi-solid, or soft foods (retrospective recall by caregiver). Non-core retrospective item: subject to recall bias, especially for older children in the 6\u201323 month range. Complements the ISSSF current-status indicator (iycf_solid_food_yesterday). Range 0\u201323 months; a value of 0 indicates foods given in the first month of life.", "es": "La edad en meses a la que el ni\u00f1o recibi\u00f3 por primera vez alimentos s\u00f3lidos, semis\u00f3lidos o blandos (recuerdo retrospectivo del cuidador). \u00cdtem retrospectivo no esencial: sujeto a sesgo de memoria, especialmente para ni\u00f1os mayores en el rango de 6\u201323 meses. Complementa el indicador de estado actual ISSSF (iycf_solid_food_yesterday). Rango 0\u201323 meses; un valor de 0 indica alimentos dados en el primer mes de vida.", "fr": "L''\u00e2ge en mois auquel l''enfant a re\u00e7u pour la premi\u00e8re fois des aliments solides, semi-solides ou mous (rappel r\u00e9trospectif du soignant). Item r\u00e9trospectif non essentiel : sujet au biais de rappel, en particulier pour les enfants plus \u00e2g\u00e9s dans la tranche 6\u201323 mois. Compl\u00e8te l''indicateur de statut actuel ISSSF (iycf_solid_food_yesterday). Plage 0\u201323 mois ; une valeur de 0 indique des aliments donn\u00e9s au premier mois de vie."}, "id": "iycf_cf_introduction_age_months", "label": {"en": "Age of complementary food introduction (months)", "es": "Edad de introducci\u00f3n de alimentos complementarios (meses)", "fr": "\u00c2ge d''introduction des aliments compl\u00e9mentaires (mois)"}, "maturity": "draft", "references": null, "type": "integer", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
