    title:
      en: Rotavirus dose 3 vaccination status
      fr: Statut vaccinal rotavirus dose 3
      es: Estado de vacunación rotavirus dosis 3
    description:
      en: 'Whether the child received the third dose of rotavirus vaccine at approximately 14 weeks of age. Published recall wording: ''(Name) received a 3rd rotavirus dose?'' Applicable only where the national schedule uses a 3-dose rotavirus product (e.g., Rotarix uses 2 doses; RotaTeq uses 3 doses). Skip this item in deployments where the country uses a 2-dose schedule. Country-specific. DHS code h_rt3; MICS code IM7c.'
      fr: 'Si l''enfant a reçu la troisième dose du vaccin antirotavirus à environ 14 semaines. Formulation de rappel publiée : « (Prénom) a-t-il/elle reçu une 3e dose antirotavirus ? » Applicable uniquement là où le calendrier national utilise un produit rotavirus à 3 doses (par ex., Rotarix = 2 doses ; RotaTeq = 3 doses). Ne pas poser cet item dans les déploiements où le pays utilise un schéma à 2 doses. Spécifique au pays. Code DHS h_rt3 ; code MICS IM7c.'
      es: 'Si el niño recibió la tercera dosis de vacuna contra rotavirus a aproximadamente 14 semanas de edad. Redacción de recordatorio publicada: ''¿Recibió (nombre) una 3.a dosis de rotavirus?'' Aplicable solo donde el calendario nacional utiliza un producto de rotavirus de 3 dosis (p. ej., Rotarix usa 2 dosis; RotaTeq usa 3 dosis). Omitir este ítem en despliegues donde el país usa un esquema de 2 dosis. Específica por país. Código DHS h_rt3; código MICS IM7c.'
