  aap_psea_integrity_breach_reported:
    title:
      en: 'AAP: PSEA-adjacent integrity breach reported (derived canary)'
      fr: 'Redevabilité : Atteinte à l''intégrité liée à la PSEA signalée (dérivé sentinelle)'
      es: 'Rendición de cuentas: Violación de integridad relacionada con PSEA reportada (derivado centinela)'
    description:
      en: 'Derived household-level boolean canary indicator: true if `aap_no_one_asked_for_payment = no` (meaning someone DID ask the household or someone they know for payment, unpaid work, goods, or personal favours in exchange for aid or registration). Maps to IASC PSEA Minimum Operating Standard and to CHS 2024 Commitments 8 and 9. Elevated community-level rates must trigger programmatic review. Classified `sensitive` because true values indicate a suspected integrity breach. Does NOT record perpetrator details; those belong to a specialist case-management protocol.'
      fr: 'Indicateur booléen dérivé sentinelle au niveau ménage : vrai si `aap_no_one_asked_for_payment = no` (ce qui signifie que quelqu''un A demandé au ménage ou à une personne qu''il connaît un paiement, un travail non rémunéré, des biens ou des faveurs personnelles en échange d''aide ou d''inscription). Correspond à la Norme minimale opérationnelle PSEA IASC et aux Engagements 8 et 9 de la CHS 2024. Des taux élevés au niveau communautaire doivent déclencher une révision programmatique. Classé `sensitive` car les valeurs vraies indiquent une atteinte à l''intégrité présumée. N''enregistre PAS les détails sur l''auteur ; ceux-ci appartiennent à un protocole spécialisé de gestion de cas.'
      es: 'Indicador booleano derivado centinela a nivel de hogar: verdadero si `aap_no_one_asked_for_payment = no` (lo que significa que alguien SÍ pidió al hogar o a una persona que conoce un pago, trabajo no remunerado, bienes o favores personales a cambio de ayuda o registro). Corresponde a la Norma Mínima Operativa PSEA de IASC y a los Compromisos 8 y 9 de la CHS 2024. Tasas comunitarias elevadas deben desencadenar una revisión programática. Clasificado como `sensitive` porque los valores verdaderos indican una violación de integridad sospechada. NO registra detalles del perpetrador; estos pertenecen a un protocolo especializado de gestión de casos.'
    slot_uri: aidops:aap_psea_integrity_breach_reported
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-alliance-verification"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived household-level boolean canary indicator: true if `aap_no_one_asked_for_payment = no` (meaning someone DID ask the household or someone they know for payment, unpaid work, goods, or personal favours in exchange for aid or registration). Maps to IASC PSEA Minimum Operating Standard and to CHS 2024 Commitments 8 and 9. Elevated community-level rates must trigger programmatic review. Classified `sensitive` because true values indicate a suspected integrity breach. Does NOT record perpetrator details; those belong to a specialist case-management protocol.", "es": "Indicador booleano derivado centinela a nivel de hogar: verdadero si `aap_no_one_asked_for_payment = no` (lo que significa que alguien S\u00cd pidi\u00f3 al hogar o a una persona que conoce un pago, trabajo no remunerado, bienes o favores personales a cambio de ayuda o registro). Corresponde a la Norma M\u00ednima Operativa PSEA de IASC y a los Compromisos 8 y 9 de la CHS 2024. Tasas comunitarias elevadas deben desencadenar una revisi\u00f3n program\u00e1tica. Clasificado como `sensitive` porque los valores verdaderos indican una violaci\u00f3n de integridad sospechada. NO registra detalles del perpetrador; estos pertenecen a un protocolo especializado de gesti\u00f3n de casos.", "fr": "Indicateur bool\u00e9en d\u00e9riv\u00e9 sentinelle au niveau m\u00e9nage : vrai si `aap_no_one_asked_for_payment = no` (ce qui signifie que quelqu''un A demand\u00e9 au m\u00e9nage ou \u00e0 une personne qu''il conna\u00eet un paiement, un travail non r\u00e9mun\u00e9r\u00e9, des biens ou des faveurs personnelles en \u00e9change d''aide ou d''inscription). Correspond \u00e0 la Norme minimale op\u00e9rationnelle PSEA IASC et aux Engagements 8 et 9 de la CHS 2024. Des taux \u00e9lev\u00e9s au niveau communautaire doivent d\u00e9clencher une r\u00e9vision programmatique. Class\u00e9 `sensitive` car les valeurs vraies indiquent une atteinte \u00e0 l''int\u00e9grit\u00e9 pr\u00e9sum\u00e9e. N''enregistre PAS les d\u00e9tails sur l''auteur ; ceux-ci appartiennent \u00e0 un protocole sp\u00e9cialis\u00e9 de gestion de cas."}, "id": "aap_psea_integrity_breach_reported", "label": {"en": "AAP: PSEA-adjacent integrity breach reported (derived canary)", "es": "Rendici\u00f3n de cuentas: Violaci\u00f3n de integridad relacionada con PSEA reportada (derivado centinela)", "fr": "Redevabilit\u00e9 : Atteinte \u00e0 l''int\u00e9grit\u00e9 li\u00e9e \u00e0 la PSEA signal\u00e9e (d\u00e9riv\u00e9 sentinelle)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
