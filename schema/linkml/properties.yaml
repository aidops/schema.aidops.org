  privacy_women_girls:
    title:
      en: Private space for women and girls
      fr: Espace privé pour les femmes et les filles
      es: Espacio privado para mujeres y niñas
    description:
      en: Whether the shelter has a separate, enclosed space where women and girls can change clothes, wash, or attend to personal hygiene in private. Sphere Standard 3 specifies that women, girls and those needing assistance with personal hygiene often require additional space for privacy.
      fr: Si l'abri dispose d'un espace séparé et fermé où les femmes et les filles peuvent se changer, se laver ou s'occuper de leur hygiène personnelle en privé. La Norme Sphère 3 précise que les femmes, les filles et ceux ayant besoin d'aide pour l'hygiène personnelle ont souvent besoin d'espace supplémentaire pour leur vie privée.
      es: Si el refugio tiene un espacio separado y cerrado donde mujeres y niñas pueden cambiarse de ropa, lavarse o atender su higiene personal en privado. La Norma Esfera 3 especifica que las mujeres, niñas y quienes necesitan asistencia con la higiene personal a menudo requieren espacio adicional para la privacidad.
    slot_uri: aidops:privacy_women_girls
    range: PrivacySpace3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gsc-indicators-v2", "sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "Whether the shelter has a separate, enclosed space where women and girls can change clothes, wash, or attend to personal hygiene in private. Sphere Standard 3 specifies that women, girls and those needing assistance with personal hygiene often require additional space for privacy.", "es": "Si el refugio tiene un espacio separado y cerrado donde mujeres y ni\u00f1as pueden cambiarse de ropa, lavarse o atender su higiene personal en privado. La Norma Esfera 3 especifica que las mujeres, ni\u00f1as y quienes necesitan asistencia con la higiene personal a menudo requieren espacio adicional para la privacidad.", "fr": "Si l''abri dispose d''un espace s\u00e9par\u00e9 et ferm\u00e9 o\u00f9 les femmes et les filles peuvent se changer, se laver ou s''occuper de leur hygi\u00e8ne personnelle en priv\u00e9. La Norme Sph\u00e8re 3 pr\u00e9cise que les femmes, les filles et ceux ayant besoin d''aide pour l''hygi\u00e8ne personnelle ont souvent besoin d''espace suppl\u00e9mentaire pour leur vie priv\u00e9e."}, "id": "privacy_women_girls", "label": {"en": "Private space for women and girls", "es": "Espacio privado para mujeres y ni\u00f1as", "fr": "Espace priv\u00e9 pour les femmes et les filles"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised", "unhcr_nare"], "vocabulary": "privacy-space-3"}'
