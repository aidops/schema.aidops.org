her information services", "es": "El hogar tiene acceso a servicios de informaci\u00f3n clim\u00e1tica o meteorol\u00f3gica", "fr": "Le m\u00e9nage a acc\u00e8s \u00e0 des services d''information climatique ou m\u00e9t\u00e9orologique"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-dk"}'
