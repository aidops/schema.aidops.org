  firewood_collection_safety_perceived:
    title:
      en: Perceived safety when collecting firewood or fuel
      fr: Sécurité perçue lors de la collecte de bois de feu ou de combustible
      es: Seguridad percibida al recolectar leña o combustible
    description:
      en: Household-level perceived safety of members traveling outside the settlement to collect firewood or other fuel, based on the past 7 days. Firewood collection — predominantly by women and girls — is a canonical high-risk activity in displacement settings (IASC GBV Guidelines 2015; UNFPA Minimum Standards 2019; IRC Safety Audit Tool 2013). Women traveling outside the settlement perimeter for fuel face acute GBV risk. Framed at household level to avoid requiring a female respondent. Skip if household uses only purchased or distributed fuel without collection (from EnergyAccessProfile if available).
      fr: Sécurité perçue au niveau du ménage des membres se déplaçant hors du camp pour collecter du bois de feu ou d'autres combustibles, basée sur les 7 derniers jours. La collecte de bois de feu — principalement par les femmes et les filles — est une activité canonique à risque élevé dans les contextes de déplacement. Les femmes se déplaçant hors du périmètre du camp pour du combustible font face à un risque VBG aigu. Formulée au niveau du ménage pour éviter d'exiger une répondante de sexe féminin. Ignorer si le ménage n'utilise que du combustible acheté ou distribué sans collecte.
      es: Seguridad percibida a nivel del hogar de los miembros que se desplazan fuera del asentamiento para recolectar leña u otro combustible, basada en los últimos 7 días. La recolección de leña — predominantemente por mujeres y niñas — es una actividad de alto riesgo canónica en contextos de desplazamiento. Las mujeres que viajan fuera del perímetro del asentamiento para buscar combustible enfrentan riesgo agudo de VBG. Formulada a nivel del hogar para evitar requerir una encuestada de sexo femenino. Omitir si el hogar solo usa combustible comprado o distribuido sin recolección.
    slot_uri: aidops:firewood_collection_safety_perceived
    range: RouteSafety3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015"], "cardinality": "single", "category": "gbv_risk", "core": false, "definition": {"en": "Household-level perceived safety of members traveling outside the settlement to collect firewood or other fuel, based on the past 7 days. Firewood collection \u2014 predominantly by women and girls \u2014 is a canonical high-risk activity in displacement settings (IASC GBV Guidelines 2015; UNFPA Minimum Standards 2019; IRC Safety Audit Tool 2013). Women traveling outside the settlement perimeter for fuel face acute GBV risk. Framed at household level to avoid requiring a female respondent. Skip if household uses only purchased or distributed fuel without collection (from EnergyAccessProfile if available).", "es": "Seguridad percibida a nivel del hogar de los miembros que se desplazan fuera del asentamiento para recolectar le\u00f1a u otro combustible, basada en los \u00faltimos 7 d\u00edas. La recolecci\u00f3n de le\u00f1a \u2014 predominantemente por mujeres y ni\u00f1as \u2014 es una actividad de alto riesgo can\u00f3nica en contextos de desplazamiento. Las mujeres que viajan fuera del per\u00edmetro del asentamiento para buscar combustible enfrentan riesgo agudo de VBG. Formulada a nivel del hogar para evitar requerir una encuestada de sexo femenino. Omitir si el hogar solo usa combustible comprado o distribuido sin recolecci\u00f3n.", "fr": "S\u00e9curit\u00e9 per\u00e7ue au niveau du m\u00e9nage des membres se d\u00e9pla\u00e7ant hors du camp pour collecter du bois de feu ou d''autres combustibles, bas\u00e9e sur les 7 derniers jours. La collecte de bois de feu \u2014 principalement par les femmes et les filles \u2014 est une activit\u00e9 canonique \u00e0 risque \u00e9lev\u00e9 dans les contextes de d\u00e9placement. Les femmes se d\u00e9pla\u00e7ant hors du p\u00e9rim\u00e8tre du camp pour du combustible font face \u00e0 un risque VBG aigu. Formul\u00e9e au niveau du m\u00e9nage pour \u00e9viter d''exiger une r\u00e9pondante de sexe f\u00e9minin. Ignorer si le m\u00e9nage n''utilise que du combustible achet\u00e9 ou distribu\u00e9 sans collecte."}, "id": "firewood_collection_safety_perceived", "label": {"en": "Perceived safety when collecting firewood or fuel", "es": "Seguridad percibida al recolectar le\u00f1a o combustible", "fr": "S\u00e9curit\u00e9 per\u00e7ue lors de la collecte de bois de feu ou de combustible"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "route-safety-3"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015
  first_displacement_date:
    title:
      en: Date of first displacement
      fr: Date du premier déplacement
      es: Fecha del primer desplazamiento
    description:
      en: The date (YYYY-MM or YYYY) when the household first left its place of habitual residence due to displacement. Month may be unknown; year is the minimum required. A 'don't know' response is valid and should be recorded as a missing value with a flag.
      fr: La date (AAAA-MM ou AAAA) à laquelle le ménage a quitté pour la première fois son lieu de résidence habituel en raison d'un déplacement. Le mois peut être inconnu ; l'année est le minimum requis. Une réponse 'ne sait pas' est valide et doit être enregistrée comme valeur manquante avec un indicateur.
      es: La fecha (AAAA-MM o AAAA) en que el hogar dejó por primera vez su lugar de residencia habitual debido al desplazamiento. El mes puede ser desconocido; el año es el mínimo requerido. Una respuesta 'no sabe' es válida y debe registrarse como valor faltante con un indicador.
    slot_uri: aidops:first_displacement_date
    range: date
    annotations:
