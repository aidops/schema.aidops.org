  mk_functional_days_pre_crisis:
    title:
      en: Functional days per week (pre-crisis baseline)
      fr: Jours de fonctionnement par semaine (référence avant-crise)
      es: Días de funcionamiento por semana (línea base pre-crisis)
    description:
      en: 'Number of days per week the market was typically open before the current crisis or disruption began, as recalled by key vendor informants. Integer 0–7; use -1 when the informant does not know. Enables the days-ratio adjustment in the derived functionality score: if current days are below 50% of pre-crisis days, a one-level downward adjustment is applied.'
      fr: Nombre de jours par semaine où le marché était typiquement ouvert avant le début de la crise ou perturbation actuelle, tel que rappelé par les informateurs clés vendeurs. Entier 0–7 ; utiliser -1 lorsque l'informateur ne sait pas. Permet l'ajustement du ratio des jours dans le score de fonctionnalité dérivé.
      es: Número de días por semana que el mercado estaba típicamente abierto antes de que comenzara la crisis o perturbación actual, según el recuerdo de informantes clave vendedores. Entero 0–7; usar -1 cuando el informante no sabe. Permite el ajuste del ratio de días en el puntaje de funcionalidad derivado.
    slot_uri: aidops:mk_functional_days_pre_crisis
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["icrc-pcma-2014"], "cardinality": "single", "category": "market_functionality", "core": false, "definition": {"en": "Number of days per week the market was typically open before the current crisis or disruption began, as recalled by key vendor informants. Integer 0\u20137; use -1 when the informant does not know. Enables the days-ratio adjustment in the derived functionality score: if current days are below 50% of pre-crisis days, a one-level downward adjustment is applied.", "es": "N\u00famero de d\u00edas por semana que el mercado estaba t\u00edpicamente abierto antes de que comenzara la crisis o perturbaci\u00f3n actual, seg\u00fan el recuerdo de informantes clave vendedores. Entero 0\u20137; usar -1 cuando el informante no sabe. Permite el ajuste del ratio de d\u00edas en el puntaje de funcionalidad derivado.", "fr": "Nombre de jours par semaine o\u00f9 le march\u00e9 \u00e9tait typiquement ouvert avant le d\u00e9but de la crise ou perturbation actuelle, tel que rappel\u00e9 par les informateurs cl\u00e9s vendeurs. Entier 0\u20137 ; utiliser -1 lorsque l''informateur ne sait pas. Permet l''ajustement du ratio des jours dans le score de fonctionnalit\u00e9 d\u00e9riv\u00e9."}, "id": "mk_functional_days_pre_crisis", "label": {"en": "Functional days per week (pre-crisis baseline)", "es": "D\u00edas de funcionamiento por semana (l\u00ednea base pre-crisis)", "fr": "Jours de fonctionnement par semaine (r\u00e9f\u00e9rence avant-crise)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
