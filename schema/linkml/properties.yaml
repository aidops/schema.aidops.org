  breeding_females_count:
    title:
      en: Breeding females count per dairy species
      fr: Nombre de femelles reproductrices par espèce laitière
      es: Conteo de hembras reproductoras por especie láctea
    description:
      en: 'Count of adult female animals currently lactating or recently pregnant, one integer value per dairy-relevant livestock-type code (cattle, camels, goats, sheep). Collected as a sub-count of `herd_composition_by_species` for dairy species only; form should pre-populate species from the herd composition grid and display only species with a count above zero. The ratio `breeding_females_count / herd_composition_by_species` (breeding-female ratio) is a structural indicator of herd resilience and future milk production capacity used in the IPC AFI pastoral annex and HEA pastoral baseline. IPC pastoral thresholds: >= 0.40 adequate reproductive base; 0.25–0.39 reduced; < 0.25 critically depleted (IPC Phase 3+ signal). Grounded in LEGS 3rd edition Chapter 3 (lactating females as herd resilience indicator), FSNAU lactating-female count items, HEA pastoral baseline breeding-females module, and IPC AFI pastoral annex Section 4.2.'
      fr: Effectif des femelles adultes actuellement en lactation ou récemment gestantes, une valeur entière par code livestock-type pertinent pour la production laitière (bovins, chameaux, caprins, ovins). Collecté comme sous-effectif de `herd_composition_by_species` pour les espèces laitières uniquement ; le formulaire doit prépopuler les espèces à partir de la grille de composition du troupeau et afficher uniquement les espèces avec un effectif supérieur à zéro. Le ratio `breeding_females_count / herd_composition_by_species` (ratio de femelles reproductrices) est un indicateur structurel de résilience du troupeau et de capacité future de production laitière utilisé dans l'annexe pastoraliste IPC AFI et le référentiel HEA pastoral. Fondé sur LEGS 3e éd. Chapitre 3, les items FSNAU de comptage des femelles en lactation, le module de femelles reproductrices de la ligne de base HEA pastorale et l'annexe pastoraliste IPC AFI Section 4.2.
      es: Conteo de hembras adultas actualmente en lactancia o recientemente preñadas, un valor entero por código livestock-type relevante para producción láctea (bovinos, camellos, caprinos, ovinos). Recopilado como sub-conteo de `herd_composition_by_species` solo para especies lácteas; el formulario debe pre-poblar las especies desde la cuadrícula de composición del rebaño y mostrar solo las especies con conteo mayor a cero. La razón `breeding_females_count / herd_composition_by_species` (razón de hembras reproductoras) es un indicador estructural de resiliencia del rebaño y capacidad futura de producción de leche utilizado en el anexo pastoralista IPC AFI y la línea base HEA pastoral.
    slot_uri: aidops:breeding_females_count
    range: LivestockType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "vsf-belgium-tufts-pastoralist-tools-2019"], "cardinality": "multiple", "category": "pastoral_herd", "core": true, "definition": {"en": "Count of adult female animals currently lactating or recently pregnant, one integer value per dairy-relevant livestock-type code (cattle, camels, goats, sheep). Collected as a sub-count of `herd_composition_by_species` for dairy species only; form should pre-populate species from the herd composition grid and display only species with a count above zero. The ratio `breeding_females_count / herd_composition_by_species` (breeding-female ratio) is a structural indicator of herd resilience and future milk production capacity used in the IPC AFI pastoral annex and HEA pastoral baseline. IPC pastoral thresholds: >= 0.40 adequate reproductive base; 0.25\u20130.39 reduced; < 0.25 critically depleted (IPC Phase 3+ signal). Grounded in LEGS 3rd edition Chapter 3 (lactating females as herd resilience indicator), FSNAU lactating-female count items, HEA pastoral baseline breeding-females module, and IPC AFI pastoral annex Section 4.2.", "es": "Conteo de hembras adultas actualmente en lactancia o recientemente pre\u00f1adas, un valor entero por c\u00f3digo livestock-type relevante para producci\u00f3n l\u00e1ctea (bovinos, camellos, caprinos, ovinos). Recopilado como sub-conteo de `herd_composition_by_species` solo para especies l\u00e1cteas; el formulario debe pre-poblar las especies desde la cuadr\u00edcula de composici\u00f3n del reba\u00f1o y mostrar solo las especies con conteo mayor a cero. La raz\u00f3n `breeding_females_count / herd_composition_by_species` (raz\u00f3n de hembras reproductoras) es un indicador estructural de resiliencia del reba\u00f1o y capacidad futura de producci\u00f3n de leche utilizado en el anexo pastoralista IPC AFI y la l\u00ednea base HEA pastoral.", "fr": "Effectif des femelles adultes actuellement en lactation ou r\u00e9cemment gestantes, une valeur enti\u00e8re par code livestock-type pertinent pour la production laiti\u00e8re (bovins, chameaux, caprins, ovins). Collect\u00e9 comme sous-effectif de `herd_composition_by_species` pour les esp\u00e8ces laiti\u00e8res uniquement ; le formulaire doit pr\u00e9populer les esp\u00e8ces \u00e0 partir de la grille de composition du troupeau et afficher uniquement les esp\u00e8ces avec un effectif sup\u00e9rieur \u00e0 z\u00e9ro. Le ratio `breeding_females_count / herd_composition_by_species` (ratio de femelles reproductrices) est un indicateur structurel de r\u00e9silience du troupeau et de capacit\u00e9 future de production laiti\u00e8re utilis\u00e9 dans l''annexe pastoraliste IPC AFI et le r\u00e9f\u00e9rentiel HEA pastoral. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 3, les items FSNAU de comptage des femelles en lactation, le module de femelles reproductrices de la ligne de base HEA pastorale et l''annexe pastoraliste IPC AFI Section 4.2."}, "id": "breeding_females_count", "label": {"en": "Breeding females count per dairy species", "es": "Conteo de hembras reproductoras por especie l\u00e1ctea", "fr": "Nombre de femelles reproductrices par esp\u00e8ce laiti\u00e8re"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": "livestock-type"}'
      bibliography_refs: fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,vsf-belgium-tufts-pastoralist-tools-2019
  care_not_sought_primary_reason:
    title:
      en: Primary reason care was not sought or received
      fr: Principale raison pour laquelle les soins n'ont pas été recherchés ou reçus
      es: Razón principal por la que no se buscó o no se recibió atención
    description:
      en: Single most important reason care was not sought or received, drawn from the same `care-access-barrier` vocabulary used for the multi-select. Ask only if more than one code was selected in `care_not_sought_reason`. Allows forced ranking where the multi-select produces ambiguity and enables single-reason analyses.
      fr: Raison unique la plus importante pour laquelle les soins n'ont pas été recherchés ou reçus, issue du même vocabulaire `care-access-barrier` que la sélection multiple. Ne poser que si plus d'un code a été sélectionné dans `care_not_sought_reason`. Permet un classement forcé lorsque la sélection multiple produit une ambiguïté et rend possibles les analyses à raison unique.
      es: Única razón más importante por la que no se buscó o no se recibió atención, tomada del mismo vocabulario `care-access-barrier` utilizado para la selección múltiple. Preguntar solo si se seleccionó más de un código en `care_not_sought_reason`. Permite un ordenamiento forzado cuando la selección múltiple produce ambigüedad y habilita análisis de razón única.
    slot_uri: aidops:care_not_sought_primary_reason
    range: CareAccessBarrier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-barriers-module", "paho-barriers-americas-2020"], "cardinality": "single", "category": "health_access_unmet_need", "core": false, "definition": {"en": "Single most important reason care was not sought or received, drawn from the same `care-access-barrier` vocabulary used for the multi-select. Ask only if more than one code was selected in `care_not_sought_reason`. Allows forced ranking where the multi-select produces ambiguity and enables single-reason analyses.", "es": "\u00danica raz\u00f3n m\u00e1s importante por la que no se busc\u00f3 o no se recibi\u00f3 atenci\u00f3n, tomada del mismo vocabulario `care-access-barrier` utilizado para la selecci\u00f3n m\u00faltiple. Preguntar solo si se seleccion\u00f3 m\u00e1s de un c\u00f3digo en `care_not_sought_reason`. Permite un ordenamiento forzado cuando la selecci\u00f3n m\u00faltiple produce ambig\u00fcedad y habilita an\u00e1lisis de raz\u00f3n \u00fanica.", "fr": "Raison unique la plus importante pour laquelle les soins n''ont pas \u00e9t\u00e9 recherch\u00e9s ou re\u00e7us, issue du m\u00eame vocabulaire `care-access-barrier` que la s\u00e9lection multiple. Ne poser que si plus d''un code a \u00e9t\u00e9 s\u00e9lectionn\u00e9 dans `care_not_sought_reason`. Permet un classement forc\u00e9 lorsque la s\u00e9lection multiple produit une ambigu\u00eft\u00e9 et rend possibles les analyses \u00e0 raison unique."}, "id": "care_not_sought_primary_reason", "label": {"en": "Primary reason care was not sought or received", "es": "Raz\u00f3n principal por la que no se busc\u00f3 o no se recibi\u00f3 atenci\u00f3n", "fr": "Principale raison pour laquelle les soins n''ont pas \u00e9t\u00e9 recherch\u00e9s ou re\u00e7us"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-access-barrier"}'
      bibliography_refs: dhs-barriers-module,paho-barriers-americas-2020
  care_not_sought_reason:
    title:
      en: Reasons care was not sought or received
      fr: Raisons pour lesquelles les soins n'ont pas été recherchés ou reçus
      es: Razones por las que no se buscó o no se recibió atención
    description:
      en: 'Reasons why one or more household members did not seek or receive needed care in the last 30 days. Multi-select, drawn from the DHS barriers module (''When sick and wanting medical advice, each of the following is a big/small/no problem: getting permission to go; getting money for treatment; distance to facility; transport; no female provider; no provider; no drugs'') extended with PAHO Americas additions (long wait time, discrimination, preference for home remedy). Ask only if `hh_member_sought_care_30d` is `no` or `yes_some`.'
      fr: 'Raisons pour lesquelles un ou plusieurs membres du ménage n''ont pas recherché ou reçu les soins nécessaires au cours des 30 derniers jours. Sélection multiple, issue du module de barrières DHS (« Quand vous êtes malade et souhaitez un avis médical, chacun des éléments suivants est-il un gros problème, un petit problème ou pas un problème : obtenir la permission ; obtenir de l''argent ; la distance ; le transport ; l''absence de prestataire féminin ; l''absence de prestataire ; l''absence de médicaments ») étendu des ajouts PAHO (temps d''attente long, discrimination, préférence pour les remèdes maison). Ne poser que si `hh_member_sought_care_30d` est `no` ou `yes_some`.'
      es: 'Razones por las que uno o más miembros del hogar no buscaron o no recibieron la atención necesaria en los últimos 30 días. Selección múltiple, tomada del módulo de barreras DHS (''Cuando está enfermo y desea consejo médico, ¿cada uno de los siguientes es un gran problema, un pequeño problema o no es un problema: obtener permiso; obtener dinero; distancia; transporte; falta de proveedora mujer; falta de proveedor; falta de medicamentos?'') ampliado con los añadidos PAHO (tiempo de espera largo, discriminación, preferencia por remedios caseros). Preguntar solo si `hh_member_sought_care_30d` es `no` o `yes_some`.'
    slot_uri: aidops:care_not_sought_reason
    range: CareAccessBarrier
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-barriers-module", "paho-barriers-americas-2020"], "cardinality": "multiple", "category": "health_access_unmet_need", "core": true, "definition": {"en": "Reasons why one or more household members did not seek or receive needed care in the last 30 days. Multi-select, drawn from the DHS barriers module (''When sick and wanting medical advice, each of the following is a big/small/no problem: getting permission to go; getting money for treatment; distance to facility; transport; no female provider; no provider; no drugs'') extended with PAHO Americas additions (long wait time, discrimination, preference for home remedy). Ask only if `hh_member_sought_care_30d` is `no` or `yes_some`.", "es": "Razones por las que uno o m\u00e1s miembros del hogar no buscaron o no recibieron la atenci\u00f3n necesaria en los \u00faltimos 30 d\u00edas. Selecci\u00f3n m\u00faltiple, tomada del m\u00f3dulo de barreras DHS (''Cuando est\u00e1 enfermo y desea consejo m\u00e9dico, \u00bfcada uno de los siguientes es un gran problema, un peque\u00f1o problema o no es un problema: obtener permiso; obtener dinero; distancia; transporte; falta de proveedora mujer; falta de proveedor; falta de medicamentos?'') ampliado con los a\u00f1adidos PAHO (tiempo de espera largo, discriminaci\u00f3n, preferencia por remedios caseros). Preguntar solo si `hh_member_sought_care_30d` es `no` o `yes_some`.", "fr": "Raisons pour lesquelles un ou plusieurs membres du m\u00e9nage n''ont pas recherch\u00e9 ou re\u00e7u les soins n\u00e9cessaires au cours des 30 derniers jours. S\u00e9lection multiple, issue du module de barri\u00e8res DHS (\u00ab Quand vous \u00eates malade et souhaitez un avis m\u00e9dical, chacun des \u00e9l\u00e9ments suivants est-il un gros probl\u00e8me, un petit probl\u00e8me ou pas un probl\u00e8me : obtenir la permission ; obtenir de l''argent ; la distance ; le transport ; l''absence de prestataire f\u00e9minin ; l''absence de prestataire ; l''absence de m\u00e9dicaments \u00bb) \u00e9tendu des ajouts PAHO (temps d''attente long, discrimination, pr\u00e9f\u00e9rence pour les rem\u00e8des maison). Ne poser que si `hh_member_sought_care_30d` est `no` ou `yes_some`."}, "id": "care_not_sought_reason", "label": {"en": "Reasons care was not sought or received", "es": "Razones por las que no se busc\u00f3 o no se recibi\u00f3 atenci\u00f3n", "fr": "Raisons pour lesquelles les soins n''ont pas \u00e9t\u00e9 recherch\u00e9s ou re\u00e7us"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-access-barrier"}'
      bibliography_refs: dhs-barriers-module,paho-barriers-americas-2020
  care_satisfaction:
    title:
      en: Satisfaction with the care received
      fr: Satisfaction à l'égard des soins reçus
      es: Satisfacción con la atención recibida
    description:
      en: Overall satisfaction of the household member with the care received during the recent 30-day care-seeking episode, rated on a symmetric four-point scale plus don't know (`care-satisfaction-5`). Aligned with the WHO People's Voice Survey care-experience domain ('Overall, how would you rate the quality of health care you received?'). Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`.
      fr: Satisfaction globale du membre du ménage à l'égard des soins reçus lors de l'épisode récent (30 jours) de recours aux soins, évaluée sur une échelle symétrique à quatre niveaux plus « ne sait pas » (`care-satisfaction-5`). Alignée sur le domaine « expérience de soins » de l'enquête People's Voice Survey de l'OMS (« Globalement, comment évalueriez-vous la qualité des soins de santé que vous avez reçus ? »). Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`.
      es: Satisfacción general del miembro del hogar con la atención recibida durante el episodio reciente (30 días) de búsqueda de atención, calificada en una escala simétrica de cuatro niveles más 'no sabe' (`care-satisfaction-5`). Alineada con el dominio 'experiencia de atención' de la People's Voice Survey de la OMS ('En general, ¿cómo calificaría la calidad de la atención de salud que recibió?'). Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`.
    slot_uri: aidops:care_satisfaction
    range: CareSatisfaction5
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-pvs-2023"], "cardinality": "single", "category": "health_access_unmet_need", "core": false, "definition": {"en": "Overall satisfaction of the household member with the care received during the recent 30-day care-seeking episode, rated on a symmetric four-point scale plus don''t know (`care-satisfaction-5`). Aligned with the WHO People''s Voice Survey care-experience domain (''Overall, how would you rate the quality of health care you received?''). Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`.", "es": "Satisfacci\u00f3n general del miembro del hogar con la atenci\u00f3n recibida durante el episodio reciente (30 d\u00edas) de b\u00fasqueda de atenci\u00f3n, calificada en una escala sim\u00e9trica de cuatro niveles m\u00e1s ''no sabe'' (`care-satisfaction-5`). Alineada con el dominio ''experiencia de atenci\u00f3n'' de la People''s Voice Survey de la OMS (''En general, \u00bfc\u00f3mo calificar\u00eda la calidad de la atenci\u00f3n de salud que recibi\u00f3?''). Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`.", "fr": "Satisfaction globale du membre du m\u00e9nage \u00e0 l''\u00e9gard des soins re\u00e7us lors de l''\u00e9pisode r\u00e9cent (30 jours) de recours aux soins, \u00e9valu\u00e9e sur une \u00e9chelle sym\u00e9trique \u00e0 quatre niveaux plus \u00ab ne sait pas \u00bb (`care-satisfaction-5`). Align\u00e9e sur le domaine \u00ab exp\u00e9rience de soins \u00bb de l''enqu\u00eate People''s Voice Survey de l''OMS (\u00ab Globalement, comment \u00e9valueriez-vous la qualit\u00e9 des soins de sant\u00e9 que vous avez re\u00e7us ? \u00bb). Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`."}, "id": "care_satisfaction", "label": {"en": "Satisfaction with the care received", "es": "Satisfacci\u00f3n con la atenci\u00f3n recibida", "fr": "Satisfaction \u00e0 l''\u00e9gard des soins re\u00e7us"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-satisfaction-5"}'
