    description:
      en: Whether youth (approximately 15-24 years old) were among the participants in this community-level assessment session. Recorded to flag age representativeness of the informant group per MIRA §3.3 and the IASC Compact for Young People in Humanitarian Action informant-inclusion guidance.
      fr: Indique si des jeunes (environ 15 à 24 ans) figuraient parmi les participants à cette séance d'évaluation au niveau communautaire. Enregistré pour signaler la représentativité par âge du groupe d'informateurs, conformément au § 3.3 de MIRA et aux orientations d'inclusion des informateurs du Pacte de l'IASC pour les jeunes dans l'action humanitaire.
      es: Indica si había jóvenes (aproximadamente de 15 a 24 años) entre los participantes de esta sesión de evaluación a nivel comunitario. Se registra para señalar la representatividad por edad del grupo de informantes, conforme al § 3.3 de MIRA y a las orientaciones de inclusión de informantes del Compacto del IASC para Jóvenes en la Acción Humanitaria.
