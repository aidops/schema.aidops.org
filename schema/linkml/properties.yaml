  occupancy_arrangement:
    title:
      en: Occupancy arrangement
      fr: Arrangement d'occupation
      es: Arreglo de ocupación
    description:
      en: The legal or social arrangement under which the household currently occupies its shelter, capturing whether the household owns, rents, is hosted, squats informally, or occupies through a programme. Informs housing, land and property (HLP) protection analysis and Sphere Standard 6 security-of-tenure assessment.
      fr: L'arrangement légal ou social sous lequel le ménage occupe actuellement son abri, indiquant si le ménage est propriétaire, locataire, hébergé, squatte informellement ou occupe dans le cadre d'un programme. Informe l'analyse de protection du logement, des terres et de la propriété (LTP) et l'évaluation de la sécurité d'occupation de la Norme Sphère 6.
      es: El arreglo legal o social bajo el cual el hogar ocupa actualmente su refugio, capturando si el hogar es propietario, arrendatario, está alojado, ocupa informalmente o lo hace a través de un programa. Informa el análisis de protección de vivienda, tierra y propiedad (VTP) y la evaluación de seguridad de tenencia de la Norma Esfera 6.
