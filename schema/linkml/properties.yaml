  tlu_total:
    title:
      en: Tropical Livestock Units (TLU) total
      fr: Total des Unités de Bétail Tropical (UBT)
      es: Total de Unidades de Ganado Tropical (UGT)
    description:
      en: 'Derived household-level total expressed in Tropical Livestock Units (TLU), a standardised measure of livestock holdings across species. Computed from `livestock_counts` by multiplying each species count by its ILRI/Jahnke 1982 coefficient and summing: cattle 0.70, camels 1.00, sheep 0.10, goats 0.10, pigs 0.20, poultry 0.01, donkeys_horses 0.50, other 0.30 (default when species-specific coefficient is unavailable). Not asked directly; computed in XLSForm `calculate` or post-hoc. TLU is the standard aggregate measure used by FAO, ILRI, and the LSMS-ISA programme to compare livestock wealth across households with different species mixes. Range: 0 (no livestock) upward; typical African smallholder households are 0–10 TLU.'
      fr: 'Total dérivé au niveau du ménage exprimé en Unités de Bétail Tropical (UBT), une mesure normalisée des cheptels à travers les espèces. Calculé à partir de `livestock_counts` en multipliant le nombre de chaque espèce par son coefficient ILRI/Jahnke 1982 et en sommant : bovins 0,70, chameaux 1,00, ovins 0,10, caprins 0,10, porcs 0,20, volaille 0,01, ânes_chevaux 0,50, autre 0,30 (par défaut lorsque le coefficient spécifique à l''espèce n''est pas disponible). Pas demandé directement ; calculé dans un `calculate` XLSForm ou a posteriori. L''UBT est la mesure agrégée standard utilisée par la FAO, l''ILRI et le programme LSMS-ISA pour comparer la richesse en bétail entre ménages avec des combinaisons d''espèces différentes. Plage : 0 (pas de bétail) et plus ; les petits exploitants africains typiques se situent à 0–10 UBT.'
      es: 'Total derivado a nivel del hogar expresado en Unidades de Ganado Tropical (UGT), una medida estandarizada de la cantidad de ganado entre especies. Calculado a partir de `livestock_counts` multiplicando el recuento de cada especie por su coeficiente ILRI/Jahnke 1982 y sumando: bovinos 0,70, camellos 1,00, ovinos 0,10, caprinos 0,10, cerdos 0,20, aves 0,01, asnos_caballos 0,50, otro 0,30 (por defecto cuando no hay coeficiente específico de la especie disponible). No se pregunta directamente; se computa en `calculate` de XLSForm o post-hoc. La UGT es la medida agregada estándar utilizada por FAO, ILRI y el programa LSMS-ISA para comparar la riqueza ganadera entre hogares con diferentes combinaciones de especies. Rango: 0 (sin ganado) en adelante; los hogares típicos de pequeños agricultores africanos están en 0–10 UGT.'
    slot_uri: aidops:tlu_total
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ilri-tlu-guidelines"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived household-level total expressed in Tropical Livestock Units (TLU), a standardised measure of livestock holdings across species. Computed from `livestock_counts` by multiplying each species count by its ILRI/Jahnke 1982 coefficient and summing: cattle 0.70, camels 1.00, sheep 0.10, goats 0.10, pigs 0.20, poultry 0.01, donkeys_horses 0.50, other 0.30 (default when species-specific coefficient is unavailable). Not asked directly; computed in XLSForm `calculate` or post-hoc. TLU is the standard aggregate measure used by FAO, ILRI, and the LSMS-ISA programme to compare livestock wealth across households with different species mixes. Range: 0 (no livestock) upward; typical African smallholder households are 0\u201310 TLU.", "es": "Total derivado a nivel del hogar expresado en Unidades de Ganado Tropical (UGT), una medida estandarizada de la cantidad de ganado entre especies. Calculado a partir de `livestock_counts` multiplicando el recuento de cada especie por su coeficiente ILRI/Jahnke 1982 y sumando: bovinos 0,70, camellos 1,00, ovinos 0,10, caprinos 0,10, cerdos 0,20, aves 0,01, asnos_caballos 0,50, otro 0,30 (por defecto cuando no hay coeficiente espec\u00edfico de la especie disponible). No se pregunta directamente; se computa en `calculate` de XLSForm o post-hoc. La UGT es la medida agregada est\u00e1ndar utilizada por FAO, ILRI y el programa LSMS-ISA para comparar la riqueza ganadera entre hogares con diferentes combinaciones de especies. Rango: 0 (sin ganado) en adelante; los hogares t\u00edpicos de peque\u00f1os agricultores africanos est\u00e1n en 0\u201310 UGT.", "fr": "Total d\u00e9riv\u00e9 au niveau du m\u00e9nage exprim\u00e9 en Unit\u00e9s de B\u00e9tail Tropical (UBT), une mesure normalis\u00e9e des cheptels \u00e0 travers les esp\u00e8ces. Calcul\u00e9 \u00e0 partir de `livestock_counts` en multipliant le nombre de chaque esp\u00e8ce par son coefficient ILRI/Jahnke 1982 et en sommant : bovins 0,70, chameaux 1,00, ovins 0,10, caprins 0,10, porcs 0,20, volaille 0,01, \u00e2nes_chevaux 0,50, autre 0,30 (par d\u00e9faut lorsque le coefficient sp\u00e9cifique \u00e0 l''esp\u00e8ce n''est pas disponible). Pas demand\u00e9 directement ; calcul\u00e9 dans un `calculate` XLSForm ou a posteriori. L''UBT est la mesure agr\u00e9g\u00e9e standard utilis\u00e9e par la FAO, l''ILRI et le programme LSMS-ISA pour comparer la richesse en b\u00e9tail entre m\u00e9nages avec des combinaisons d''esp\u00e8ces diff\u00e9rentes. Plage : 0 (pas de b\u00e9tail) et plus ; les petits exploitants africains typiques se situent \u00e0 0\u201310 UBT."}, "id": "tlu_total", "label": {"en": "Tropical Livestock Units (TLU) total", "es": "Total de Unidades de Ganado Tropical (UGT)", "fr": "Total des Unit\u00e9s de B\u00e9tail Tropical (UBT)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
      bibliography_refs: ilri-tlu-guidelines
