  nearest_facility_travel_time_min:
    title:
      en: Usual travel time to nearest health facility (minutes, one way)
      fr: Temps de trajet habituel jusqu'à l'établissement de santé le plus proche (minutes, aller simple)
      es: Tiempo habitual de viaje al establecimiento de salud más cercano (minutos, ida)
    description:
      en: 'Usual one-way travel time in minutes from the household''s dwelling to the nearest health facility under normal (non-crisis) conditions. Captures the household''s lived experience of geographic access; many respondents cannot estimate kilometres but can estimate travel time reliably. Sphere Handbook 2018 emergency-phase benchmark: at least 80% of the affected population within 1 hour walking. Captured in parallel to `nearest_facility_distance_km`.'
      fr: 'Temps de trajet habituel aller simple en minutes entre le logement du ménage et l''établissement de santé le plus proche dans des conditions normales (hors crise). Saisit l''expérience vécue d''accès géographique par le ménage ; de nombreux répondants ne peuvent pas estimer les kilomètres mais peuvent estimer le temps de trajet de façon fiable. Repère de phase d''urgence du Sphere Handbook 2018 : au moins 80 % de la population affectée à moins d''une heure à pied. Saisi en parallèle de `nearest_facility_distance_km`.'
      es: 'Tiempo habitual de viaje de ida en minutos desde la vivienda del hogar hasta el establecimiento de salud más cercano en condiciones normales (no de crisis). Capta la experiencia vivida del acceso geográfico del hogar; muchos encuestados no pueden estimar los kilómetros pero sí el tiempo de viaje de forma fiable. Referencia de fase de emergencia del Sphere Handbook 2018: al menos el 80% de la población afectada a menos de 1 hora caminando. Se captura en paralelo con `nearest_facility_distance_km`.'
    slot_uri: aidops:nearest_facility_travel_time_min
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018", "unhcr-phc-coverage-standard"], "cardinality": "single", "category": "health_access_geography", "core": true, "definition": {"en": "Usual one-way travel time in minutes from the household''s dwelling to the nearest health facility under normal (non-crisis) conditions. Captures the household''s lived experience of geographic access; many respondents cannot estimate kilometres but can estimate travel time reliably. Sphere Handbook 2018 emergency-phase benchmark: at least 80% of the affected population within 1 hour walking. Captured in parallel to `nearest_facility_distance_km`.", "es": "Tiempo habitual de viaje de ida en minutos desde la vivienda del hogar hasta el establecimiento de salud m\u00e1s cercano en condiciones normales (no de crisis). Capta la experiencia vivida del acceso geogr\u00e1fico del hogar; muchos encuestados no pueden estimar los kil\u00f3metros pero s\u00ed el tiempo de viaje de forma fiable. Referencia de fase de emergencia del Sphere Handbook 2018: al menos el 80% de la poblaci\u00f3n afectada a menos de 1 hora caminando. Se captura en paralelo con `nearest_facility_distance_km`.", "fr": "Temps de trajet habituel aller simple en minutes entre le logement du m\u00e9nage et l''\u00e9tablissement de sant\u00e9 le plus proche dans des conditions normales (hors crise). Saisit l''exp\u00e9rience v\u00e9cue d''acc\u00e8s g\u00e9ographique par le m\u00e9nage ; de nombreux r\u00e9pondants ne peuvent pas estimer les kilom\u00e8tres mais peuvent estimer le temps de trajet de fa\u00e7on fiable. Rep\u00e8re de phase d''urgence du Sphere Handbook 2018 : au moins 80 % de la population affect\u00e9e \u00e0 moins d''une heure \u00e0 pied. Saisi en parall\u00e8le de `nearest_facility_distance_km`."}, "id": "nearest_facility_travel_time_min", "label": {"en": "Usual travel time to nearest health facility (minutes, one way)", "es": "Tiempo habitual de viaje al establecimiento de salud m\u00e1s cercano (minutos, ida)", "fr": "Temps de trajet habituel jusqu''\u00e0 l''\u00e9tablissement de sant\u00e9 le plus proche (minutes, aller simple)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
