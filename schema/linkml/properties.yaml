  arbitrary_detention_experienced:
    title:
      en: Arbitrary detention experienced (household)
      fr: Détention arbitraire vécue (ménage)
      es: Detención arbitraria experimentada (hogar)
    description:
      en: 'Whether any adult household member was detained, arrested, or held without explanation or charges for more than 24 hours in the past 3 months. Listed separately from hh_violence_types because: (a) arbitrary detention is a distinct legal category grounded in ICCPR Article 9; (b) it is the most sensitive item in the profile since it can directly link a household to a legal rights violation; (c) UNHCR Protection Monitoring Framework treats arbitrary detention as a standalone primary indicator. Note: a household selecting this item will typically also select arbitrary_detention in hh_violence_types, creating an intentional redundancy noted for analysts. Do not probe for details if respondent discloses.'
      fr: 'Si un adulte du ménage a été détenu, arrêté ou maintenu sans explication ni charges pendant plus de 24 heures au cours des 3 derniers mois. Répertorié séparément de hh_violence_types car : (a) la détention arbitraire est une catégorie juridique distincte fondée sur l''Article 9 du PIDCP ; (b) c''est l''item le plus sensible du profil puisqu''il peut directement relier un ménage à une violation de ses droits légaux ; (c) le Cadre de suivi de la protection de l''UNHCR traite la détention arbitraire comme un indicateur primaire autonome. Remarque : un ménage sélectionnant cet item sélectionnera également généralement arbitrary_detention dans hh_violence_types, créant une redondance intentionnelle notée pour les analystes. Ne pas approfondir si le répondant divulgue.'
      es: 'Si algún adulto miembro del hogar fue detenido, arrestado o retenido sin explicación ni cargos por más de 24 horas en los últimos 3 meses. Listado separadamente de hh_violence_types porque: (a) la detención arbitraria es una categoría legal distinta fundamentada en el Artículo 9 del ICCPR; (b) es el ítem más sensible del perfil ya que puede vincular directamente a un hogar con una violación de derechos legales; (c) el Marco de Monitoreo de Protección del ACNUR trata la detención arbitraria como un indicador primario independiente. Nota: un hogar que seleccione este ítem también seleccionará típicamente arbitrary_detention en hh_violence_types, creando una redundancia intencional anotada para los analistas. No indagar si el encuestado divulga.'
    slot_uri: aidops:arbitrary_detention_experienced
    range: YesNoPnta
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["alnap-hpg-protection-2012", "gpc-paf-2021", "reach-protection-monitoring-2022", "unhcr-protection-mainstreaming-2016", "unhcr-protection-monitoring-2016"], "cardinality": "single", "category": "physical_safety", "core": false, "definition": {"en": "Whether any adult household member was detained, arrested, or held without explanation or charges for more than 24 hours in the past 3 months. Listed separately from hh_violence_types because: (a) arbitrary detention is a distinct legal category grounded in ICCPR Article 9; (b) it is the most sensitive item in the profile since it can directly link a household to a legal rights violation; (c) UNHCR Protection Monitoring Framework treats arbitrary detention as a standalone primary indicator. Note: a household selecting this item will typically also select arbitrary_detention in hh_violence_types, creating an intentional redundancy noted for analysts. Do not probe for details if respondent discloses.", "es": "Si alg\u00fan adulto miembro del hogar fue detenido, arrestado o retenido sin explicaci\u00f3n ni cargos por m\u00e1s de 24 horas en los \u00faltimos 3 meses. Listado separadamente de hh_violence_types porque: (a) la detenci\u00f3n arbitraria es una categor\u00eda legal distinta fundamentada en el Art\u00edculo 9 del ICCPR; (b) es el \u00edtem m\u00e1s sensible del perfil ya que puede vincular directamente a un hogar con una violaci\u00f3n de derechos legales; (c) el Marco de Monitoreo de Protecci\u00f3n del ACNUR trata la detenci\u00f3n arbitraria como un indicador primario independiente. Nota: un hogar que seleccione este \u00edtem tambi\u00e9n seleccionar\u00e1 t\u00edpicamente arbitrary_detention en hh_violence_types, creando una redundancia intencional anotada para los analistas. No indagar si el encuestado divulga.", "fr": "Si un adulte du m\u00e9nage a \u00e9t\u00e9 d\u00e9tenu, arr\u00eat\u00e9 ou maintenu sans explication ni charges pendant plus de 24 heures au cours des 3 derniers mois. R\u00e9pertori\u00e9 s\u00e9par\u00e9ment de hh_violence_types car : (a) la d\u00e9tention arbitraire est une cat\u00e9gorie juridique distincte fond\u00e9e sur l''Article 9 du PIDCP ; (b) c''est l''item le plus sensible du profil puisqu''il peut directement relier un m\u00e9nage \u00e0 une violation de ses droits l\u00e9gaux ; (c) le Cadre de suivi de la protection de l''UNHCR traite la d\u00e9tention arbitraire comme un indicateur primaire autonome. Remarque : un m\u00e9nage s\u00e9lectionnant cet item s\u00e9lectionnera \u00e9galement g\u00e9n\u00e9ralement arbitrary_detention dans hh_violence_types, cr\u00e9ant une redondance intentionnelle not\u00e9e pour les analystes. Ne pas approfondir si le r\u00e9pondant divulgue."}, "id": "arbitrary_detention_experienced", "label": {"en": "Arbitrary detention experienced (household)", "es": "Detenci\u00f3n arbitraria experimentada (hogar)", "fr": "D\u00e9tention arbitraire v\u00e9cue (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "yes-no-pnta"}'
