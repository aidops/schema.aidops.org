  warning_primary_barrier:
    title:
      en: Primary barrier to protective action
      fr: Obstacle principal à l'action de protection
      es: Barrera principal a la acción de protección
    description:
      en: 'The single biggest obstacle that prevented the household from taking protective action. Single-select from the warning-action-barrier vocabulary. Applicable when warning_action_barriers has any non-''no_barrier'' value. Sensitivity: inherits the same partial-sensitivity handling as warning_action_barriers when the selected code is ''permission_denied_household_member'' or ''permission_denied_community_authority''; see the parent item definition and the vocabulary entries for those codes.'
      fr: 'L''obstacle unique le plus important ayant empêché le ménage de prendre des actions de protection. Sélection unique dans le vocabulaire warning-action-barrier. Applicable si warning_action_barriers contient une valeur autre que « no_barrier ». Sensibilité : hérite du même traitement à sensibilité partielle que warning_action_barriers lorsque le code sélectionné est « permission_denied_household_member » ou « permission_denied_community_authority » ; voir la définition de l''item parent et les entrées de vocabulaire pour ces codes.'
      es: 'El obstáculo único más grande que impidió al hogar tomar acción de protección. Selección única del vocabulario warning-action-barrier. Aplicable cuando warning_action_barriers contiene un valor distinto de «no_barrier». Sensibilidad: hereda el mismo tratamiento de sensibilidad parcial que warning_action_barriers cuando el código seleccionado es «permission_denied_household_member» o «permission_denied_community_authority»; véase la definición del ítem padre y las entradas del vocabulario para esos códigos.'
    slot_uri: aidops:warning_primary_barrier
    range: WarningActionBarrier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "ifrc-pgi-aa-toolkit", "paul-dutt-2010-cyclone-sidr", "start-network-def"], "cardinality": "single", "category": "hazard_event", "core": false, "definition": {"en": "The single biggest obstacle that prevented the household from taking protective action. Single-select from the warning-action-barrier vocabulary. Applicable when warning_action_barriers has any non-''no_barrier'' value. Sensitivity: inherits the same partial-sensitivity handling as warning_action_barriers when the selected code is ''permission_denied_household_member'' or ''permission_denied_community_authority''; see the parent item definition and the vocabulary entries for those codes.", "es": "El obst\u00e1culo \u00fanico m\u00e1s grande que impidi\u00f3 al hogar tomar acci\u00f3n de protecci\u00f3n. Selecci\u00f3n \u00fanica del vocabulario warning-action-barrier. Aplicable cuando warning_action_barriers contiene un valor distinto de \u00abno_barrier\u00bb. Sensibilidad: hereda el mismo tratamiento de sensibilidad parcial que warning_action_barriers cuando el c\u00f3digo seleccionado es \u00abpermission_denied_household_member\u00bb o \u00abpermission_denied_community_authority\u00bb; v\u00e9ase la definici\u00f3n del \u00edtem padre y las entradas del vocabulario para esos c\u00f3digos.", "fr": "L''obstacle unique le plus important ayant emp\u00each\u00e9 le m\u00e9nage de prendre des actions de protection. S\u00e9lection unique dans le vocabulaire warning-action-barrier. Applicable si warning_action_barriers contient une valeur autre que \u00ab no_barrier \u00bb. Sensibilit\u00e9 : h\u00e9rite du m\u00eame traitement \u00e0 sensibilit\u00e9 partielle que warning_action_barriers lorsque le code s\u00e9lectionn\u00e9 est \u00ab permission_denied_household_member \u00bb ou \u00ab permission_denied_community_authority \u00bb ; voir la d\u00e9finition de l''item parent et les entr\u00e9es de vocabulaire pour ces codes."}, "id": "warning_primary_barrier", "label": {"en": "Primary barrier to protective action", "es": "Barrera principal a la acci\u00f3n de protecci\u00f3n", "fr": "Obstacle principal \u00e0 l''action de protection"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-action-barrier"}'
