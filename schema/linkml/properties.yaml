  pnc_newborn_signal_weighed:
    title:
      en: 'Newborn PNC signal: weighed in first 2 days'
      fr: 'Signal PNC nouveau-né : pesé dans les 2 premiers jours'
      es: 'Señal PPN recién nacido: pesado en los primeros 2 días'
    description:
      en: 'Whether the baby was weighed during the postnatal check in the first 2 days after birth. DHS-8 m78e (rh_pnc_nb_weighed: m19a == 1 or m19a == 2). Newborn signal function 5 of 5. For facility deliveries, this may overlap with newborn_weighed_at_birth (birth weight); the form should suppress this item if newborn_weighed_at_birth = yes to avoid double-counting. Only asked if pnc_newborn_any_check = yes and pnc_newborn_timing is within 2 days.'
      fr: 'Si le bébé a été pesé lors du contrôle postnatal dans les 2 premiers jours suivant la naissance. DHS-8 m78e (rh_pnc_nb_weighed : m19a == 1 ou m19a == 2). Fonction signal nouveau-né 5 sur 5. Pour les accouchements en établissement, cela peut chevaucher newborn_weighed_at_birth (poids de naissance) ; le formulaire doit supprimer cet item si newborn_weighed_at_birth = oui pour éviter le double comptage. Posé uniquement si pnc_newborn_any_check = oui et pnc_newborn_timing est dans les 2 jours.'
      es: 'Si el bebé fue pesado durante la revisión posnatal en los primeros 2 días después del parto. DHS-8 m78e (rh_pnc_nb_weighed: m19a == 1 o m19a == 2). Función de señal del recién nacido 5 de 5. Para los partos en establecimientos, esto puede superponerse con newborn_weighed_at_birth (peso al nacer); el formulario debe suprimir este ítem si newborn_weighed_at_birth = sí para evitar el doble conteo. Solo se pregunta si pnc_newborn_any_check = sí y pnc_newborn_timing está dentro de los 2 días.'
