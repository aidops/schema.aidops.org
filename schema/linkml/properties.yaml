  coping_skipped_care_cost:
    title:
      en: Household skipped or delayed needed care due to cost (12 months)
      fr: Le ménage a sauté ou reporté des soins nécessaires en raison du coût (12 mois)
      es: El hogar omitió o retrasó atención necesaria debido al costo (12 meses)
    description:
      en: Whether any household member needed care in the last 12 months but skipped, delayed, or abandoned it because it was too expensive. Direct indicator of financial barriers to access, complementary to `care_not_sought_reason`=`cost_of_treatment`. Asked directly even when `hh_used_health_coping` is answered, because skipping care is a distinct coping strategy from borrowing or selling assets.
      fr: Si un membre du ménage a eu besoin de soins au cours des 12 derniers mois mais les a sautés, reportés ou abandonnés parce qu'ils étaient trop coûteux. Indicateur direct des obstacles financiers à l'accès, complémentaire à `care_not_sought_reason`=`cost_of_treatment`. Posé directement même lorsque `hh_used_health_coping` est renseigné, car sauter les soins est une stratégie d'adaptation distincte de l'emprunt ou de la vente d'actifs.
      es: Si algún miembro del hogar necesitó atención en los últimos 12 meses pero la omitió, retrasó o abandonó porque era demasiado costosa. Indicador directo de barreras financieras al acceso, complementario a `care_not_sought_reason`=`cost_of_treatment`. Se pregunta directamente aunque se haya contestado `hh_used_health_coping`, porque omitir la atención es una estrategia de afrontamiento distinta del préstamo o la venta de activos.
    slot_uri: aidops:coping_skipped_care_cost
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sdg-3-8-2-metadata", "who-pvs-2023"], "cardinality": "single", "category": "health_access_coping", "core": true, "definition": {"en": "Whether any household member needed care in the last 12 months but skipped, delayed, or abandoned it because it was too expensive. Direct indicator of financial barriers to access, complementary to `care_not_sought_reason`=`cost_of_treatment`. Asked directly even when `hh_used_health_coping` is answered, because skipping care is a distinct coping strategy from borrowing or selling assets.", "es": "Si alg\u00fan miembro del hogar necesit\u00f3 atenci\u00f3n en los \u00faltimos 12 meses pero la omiti\u00f3, retras\u00f3 o abandon\u00f3 porque era demasiado costosa. Indicador directo de barreras financieras al acceso, complementario a `care_not_sought_reason`=`cost_of_treatment`. Se pregunta directamente aunque se haya contestado `hh_used_health_coping`, porque omitir la atenci\u00f3n es una estrategia de afrontamiento distinta del pr\u00e9stamo o la venta de activos.", "fr": "Si un membre du m\u00e9nage a eu besoin de soins au cours des 12 derniers mois mais les a saut\u00e9s, report\u00e9s ou abandonn\u00e9s parce qu''ils \u00e9taient trop co\u00fbteux. Indicateur direct des obstacles financiers \u00e0 l''acc\u00e8s, compl\u00e9mentaire \u00e0 `care_not_sought_reason`=`cost_of_treatment`. Pos\u00e9 directement m\u00eame lorsque `hh_used_health_coping` est renseign\u00e9, car sauter les soins est une strat\u00e9gie d''adaptation distincte de l''emprunt ou de la vente d''actifs."}, "id": "coping_skipped_care_cost", "label": {"en": "Household skipped or delayed needed care due to cost (12 months)", "es": "El hogar omiti\u00f3 o retras\u00f3 atenci\u00f3n necesaria debido al costo (12 meses)", "fr": "Le m\u00e9nage a saut\u00e9 ou report\u00e9 des soins n\u00e9cessaires en raison du co\u00fbt (12 mois)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
