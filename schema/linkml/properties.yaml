    range: WarningSupportNeeded
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gfdrr-aa-toolkit-2023", "iasc-aap-early-response-2020", "ifrc-fbf-ma-guide-2019", "start-network-def"], "cardinality": "multiple", "category": "context", "core": true, "definition": {"en": "The kinds of support the household identifies as most helpful for taking protective action in response to future warnings. Multi-select from the warning-support-needed vocabulary, covering message-side improvements (earlier warning, clearer message, warning in the local language), operational support (transport assistance, safer shelter, anticipatory cash, livestock protection support, dependent-care support), capacity support (training or drills), an explicit ''none'' code, and ''other''. Asked of all respondents whether or not they received a warning for the reference event.", "es": "Los tipos de apoyo que el hogar identifica como m\u00e1s \u00fatiles para tomar acci\u00f3n de protecci\u00f3n en respuesta a alertas futuras. Selecci\u00f3n m\u00faltiple del vocabulario warning-support-needed, que abarca mejoras del lado del mensaje (alerta m\u00e1s temprana, mensaje m\u00e1s claro, alerta en el idioma local), apoyo operativo (asistencia de transporte, refugio m\u00e1s seguro, efectivo anticipatorio, apoyo para protecci\u00f3n de ganado, apoyo al cuidado de personas dependientes), apoyo en capacidad (capacitaci\u00f3n o simulacros), un c\u00f3digo expl\u00edcito \u00abnone\u00bb, y \u00abother\u00bb. Se pregunta a todos los respondientes hayan recibido o no una alerta para el evento de referencia.", "fr": "Les types de soutien que le m\u00e9nage identifie comme les plus utiles pour prendre des actions de protection en r\u00e9ponse aux alertes futures. S\u00e9lection multiple dans le vocabulaire warning-support-needed, couvrant les am\u00e9liorations du c\u00f4t\u00e9 du message (alerte plus pr\u00e9coce, message plus clair, alerte dans la langue locale), le soutien op\u00e9rationnel (aide au transport, abri plus s\u00fbr, esp\u00e8ces anticipatoires, soutien \u00e0 la protection du b\u00e9tail, soutien \u00e0 la prise en charge des personnes d\u00e9pendantes), le soutien en capacit\u00e9 (formation ou exercices), un code explicite \u00ab none \u00bb, et \u00ab other \u00bb. Pos\u00e9 \u00e0 tous les r\u00e9pondants qu''ils aient ou non re\u00e7u une alerte pour l''\u00e9v\u00e9nement de r\u00e9f\u00e9rence."}, "id": "support_needed_to_act", "label": {"en": "Support needed to act on warnings (multi-select)", "es": "Apoyo necesario para actuar ante alertas (selecci\u00f3n m\u00faltiple)", "fr": "Soutien n\u00e9cessaire pour agir sur les alertes (s\u00e9lection multiple)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-support-needed"}'
