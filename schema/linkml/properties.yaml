  livelihood_programme_participation:
    title:
      en: Household participates in a livelihood support programme
      fr: Le ménage participe à un programme d'appui aux moyens de subsistance
      es: El hogar participa en un programa de apoyo a medios de vida
    description:
      en: Whether any household member currently participates in a livelihood support programme run by government, NGO, UN agency, or private actor (e.g., cash-for-work, vocational training, business grant, cooperative, graduation programme). Drawn from the Sphere 2018 Livelihoods chapter on programme participation, the IOM DTM Multi-Sectoral Location Assessment programme-access module, and the CaLP Network programme monitoring indicators. Distinct from `humanitarian_assistance_reliance`, which concerns relief assistance dependency, not developmental programme enrolment.
      fr: Si un membre du ménage participe actuellement à un programme d'appui aux moyens de subsistance géré par le gouvernement, une ONG, une agence des Nations Unies ou un acteur privé (ex. argent contre travail, formation professionnelle, subvention d'entreprise, coopérative, programme de graduation). Tiré du chapitre Moyens de subsistance de Sphère 2018 sur la participation aux programmes, du module d'accès aux programmes de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM et des indicateurs de suivi de programmes du réseau CaLP. Distinct de `humanitarian_assistance_reliance`, qui concerne la dépendance à l'assistance de secours, et non l'inscription à un programme de développement.
      es: Si algún miembro del hogar actualmente participa en un programa de apoyo a medios de vida gestionado por gobierno, ONG, agencia de la ONU o actor privado (p. ej., dinero por trabajo, formación profesional, subvención empresarial, cooperativa, programa de graduación). Tomado del capítulo de Medios de Vida de Esfera 2018 sobre participación en programas, el módulo de acceso a programas de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM y los indicadores de monitoreo de programas de la Red CaLP. Distinto de `humanitarian_assistance_reliance`, que concierne a la dependencia de la asistencia de socorro, no a la inscripción en programas de desarrollo.
    slot_uri: aidops:livelihood_programme_participation
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether any household member currently participates in a livelihood support programme run by government, NGO, UN agency, or private actor (e.g., cash-for-work, vocational training, business grant, cooperative, graduation programme). Drawn from the Sphere 2018 Livelihoods chapter on programme participation, the IOM DTM Multi-Sectoral Location Assessment programme-access module, and the CaLP Network programme monitoring indicators. Distinct from `humanitarian_assistance_reliance`, which concerns relief assistance dependency, not developmental programme enrolment.", "es": "Si alg\u00fan miembro del hogar actualmente participa en un programa de apoyo a medios de vida gestionado por gobierno, ONG, agencia de la ONU o actor privado (p. ej., dinero por trabajo, formaci\u00f3n profesional, subvenci\u00f3n empresarial, cooperativa, programa de graduaci\u00f3n). Tomado del cap\u00edtulo de Medios de Vida de Esfera 2018 sobre participaci\u00f3n en programas, el m\u00f3dulo de acceso a programas de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM y los indicadores de monitoreo de programas de la Red CaLP. Distinto de `humanitarian_assistance_reliance`, que concierne a la dependencia de la asistencia de socorro, no a la inscripci\u00f3n en programas de desarrollo.", "fr": "Si un membre du m\u00e9nage participe actuellement \u00e0 un programme d''appui aux moyens de subsistance g\u00e9r\u00e9 par le gouvernement, une ONG, une agence des Nations Unies ou un acteur priv\u00e9 (ex. argent contre travail, formation professionnelle, subvention d''entreprise, coop\u00e9rative, programme de graduation). Tir\u00e9 du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur la participation aux programmes, du module d''acc\u00e8s aux programmes de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM et des indicateurs de suivi de programmes du r\u00e9seau CaLP. Distinct de `humanitarian_assistance_reliance`, qui concerne la d\u00e9pendance \u00e0 l''assistance de secours, et non l''inscription \u00e0 un programme de d\u00e9veloppement."}, "id": "livelihood_programme_participation", "label": {"en": "Household participates in a livelihood support programme", "es": "El hogar participa en un programa de apoyo a medios de vida", "fr": "Le m\u00e9nage participe \u00e0 un programme d''appui aux moyens de subsistance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
