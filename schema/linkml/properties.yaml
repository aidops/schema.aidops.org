  floor_to_ceiling_height_adequate:
    title:
      en: Floor-to-ceiling height adequate
      fr: Hauteur sol-plafond adéquate
      es: Altura suelo-techo adecuada
    description:
      en: Whether the internal floor-to-ceiling height is at least 2 metres at the highest point of the shelter. Enumerator observation is preferred over self-report. Sphere Standard 3 specifies a minimum of 2 metres (2.6 metres in hot climates) at the highest point.
      fr: Si la hauteur intérieure sol-plafond est d'au moins 2 mètres au point le plus élevé de l'abri. L'observation par l'enquêteur est préférable à l'autodéclaration. La Norme Sphère 3 spécifie un minimum de 2 mètres (2,6 mètres dans les climats chauds) au point le plus élevé.
      es: Si la altura interior suelo-techo es de al menos 2 metros en el punto más alto del refugio. Se prefiere la observación del encuestador sobre el autoinforme. La Norma Esfera 3 especifica un mínimo de 2 metros (2,6 metros en climas calurosos) en el punto más alto.
    slot_uri: aidops:floor_to_ceiling_height_adequate
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "shelter", "core": false, "definition": {"en": "Whether the internal floor-to-ceiling height is at least 2 metres at the highest point of the shelter. Enumerator observation is preferred over self-report. Sphere Standard 3 specifies a minimum of 2 metres (2.6 metres in hot climates) at the highest point.", "es": "Si la altura interior suelo-techo es de al menos 2 metros en el punto m\u00e1s alto del refugio. Se prefiere la observaci\u00f3n del encuestador sobre el autoinforme. La Norma Esfera 3 especifica un m\u00ednimo de 2 metros (2,6 metros en climas calurosos) en el punto m\u00e1s alto.", "fr": "Si la hauteur int\u00e9rieure sol-plafond est d''au moins 2 m\u00e8tres au point le plus \u00e9lev\u00e9 de l''abri. L''observation par l''enqu\u00eateur est pr\u00e9f\u00e9rable \u00e0 l''autod\u00e9claration. La Norme Sph\u00e8re 3 sp\u00e9cifie un minimum de 2 m\u00e8tres (2,6 m\u00e8tres dans les climats chauds) au point le plus \u00e9lev\u00e9."}, "id": "floor_to_ceiling_height_adequate", "label": {"en": "Floor-to-ceiling height adequate", "es": "Altura suelo-techo adecuada", "fr": "Hauteur sol-plafond ad\u00e9quate"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised"], "vocabulary": "yes-no-dk"}'
