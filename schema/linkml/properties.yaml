  hf_communication_functional:
    title:
      en: Functioning communication means available
      fr: Moyen de communication fonctionnel disponible
      es: Medio de comunicación funcional disponible
    description:
      en: 'Whether the facility has at least one functioning means of communication (landline telephone, mobile phone with network coverage, or radio) available for referral coordination and emergency contact. Observed by the enumerator. Required by Sphere 2018: facilities must be able to contact a referral destination.'
      fr: 'Si l''établissement dispose d''au moins un moyen de communication fonctionnel (téléphone fixe, téléphone mobile avec couverture réseau, ou radio) disponible pour la coordination des références et les contacts d''urgence. Observé par l''enquêteur. Requis par Sphère 2018 : les établissements doivent pouvoir contacter une destination de référence.'
      es: 'Si el establecimiento tiene al menos un medio de comunicación funcional (teléfono fijo, teléfono móvil con cobertura de red, o radio) disponible para la coordinación de referencias y contacto de emergencia. Observado por el enumerador. Requerido por Esfera 2018: los establecimientos deben poder contactar un destino de referencia.'
    slot_uri: aidops:hf_communication_functional
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "habitability", "core": true, "definition": {"en": "Whether the facility has at least one functioning means of communication (landline telephone, mobile phone with network coverage, or radio) available for referral coordination and emergency contact. Observed by the enumerator. Required by Sphere 2018: facilities must be able to contact a referral destination.", "es": "Si el establecimiento tiene al menos un medio de comunicaci\u00f3n funcional (tel\u00e9fono fijo, tel\u00e9fono m\u00f3vil con cobertura de red, o radio) disponible para la coordinaci\u00f3n de referencias y contacto de emergencia. Observado por el enumerador. Requerido por Esfera 2018: los establecimientos deben poder contactar un destino de referencia.", "fr": "Si l''\u00e9tablissement dispose d''au moins un moyen de communication fonctionnel (t\u00e9l\u00e9phone fixe, t\u00e9l\u00e9phone mobile avec couverture r\u00e9seau, ou radio) disponible pour la coordination des r\u00e9f\u00e9rences et les contacts d''urgence. Observ\u00e9 par l''enqu\u00eateur. Requis par Sph\u00e8re 2018 : les \u00e9tablissements doivent pouvoir contacter une destination de r\u00e9f\u00e9rence."}, "id": "hf_communication_functional", "label": {"en": "Functioning communication means available", "es": "Medio de comunicaci\u00f3n funcional disponible", "fr": "Moyen de communication fonctionnel disponible"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
