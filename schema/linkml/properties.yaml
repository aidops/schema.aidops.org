  shock_coping_strategy_used:
    title:
      en: Main coping strategy used in response to shocks
      fr: Principale stratégie d'adaptation utilisée en réponse aux chocs
      es: Principal estrategia de afrontamiento utilizada en respuesta a los choques
    description:
      en: The most important strategy the household used to cope with shocks reported in `shock_experienced_past_12mo`. Single-select from the `livelihood-coping-strategy` vocabulary, covering livelihood-level coping (asset sales, migration, skipping meals at the coarse level, borrowing, reducing non-food expenditure, etc.). Asked only when `shock_experienced_past_12mo` is non-empty. Drawn from the FAO RIMA-II coping module, the LSMS-ISA shocks and coping module, and the WFP Livelihood Coping Strategies (LCS) conceptual framework. Distinct from FoodSecurityProfile `lcs_*` items, which score the standard food-specific LCS set on a 30-day recall; this item captures the broader livelihood coping response over 12 months.
      fr: La stratégie la plus importante que le ménage a utilisée pour faire face aux chocs signalés dans `shock_experienced_past_12mo`. Sélection unique dans le vocabulaire `livelihood-coping-strategy`, couvrant l'adaptation au niveau des moyens de subsistance (vente d'actifs, migration, réduction grossière de la consommation, emprunt, réduction des dépenses non alimentaires, etc.). Posée uniquement lorsque `shock_experienced_past_12mo` n'est pas vide. Tirée du module d'adaptation FAO RIMA-II, du module chocs et adaptation LSMS-ISA et du cadre conceptuel des stratégies d'adaptation des moyens de subsistance (LCS) du PAM. Distincte des items `lcs_*` de FoodSecurityProfile qui notent l'ensemble standard LCS spécifique à l'alimentation sur un rappel de 30 jours ; cet item saisit la réponse d'adaptation des moyens de subsistance plus large sur 12 mois.
      es: La estrategia más importante que el hogar utilizó para hacer frente a los choques reportados en `shock_experienced_past_12mo`. Selección única del vocabulario `livelihood-coping-strategy`, que abarca el afrontamiento a nivel de medios de vida (venta de activos, migración, reducción gruesa del consumo, endeudamiento, reducción del gasto no alimentario, etc.). Se pregunta solo cuando `shock_experienced_past_12mo` no está vacío. Tomada del módulo de afrontamiento FAO RIMA-II, el módulo de choques y afrontamiento LSMS-ISA y el marco conceptual de Estrategias de Afrontamiento de Medios de Vida (LCS) del PMA. Distinta de los ítems `lcs_*` de FoodSecurityProfile, que puntúan el conjunto estándar LCS específico de alimentos en un recuerdo de 30 días; este ítem captura la respuesta de afrontamiento de medios de vida más amplia en 12 meses.
    slot_uri: aidops:shock_coping_strategy_used
    range: LivelihoodCopingStrategy
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "The most important strategy the household used to cope with shocks reported in `shock_experienced_past_12mo`. Single-select from the `livelihood-coping-strategy` vocabulary, covering livelihood-level coping (asset sales, migration, skipping meals at the coarse level, borrowing, reducing non-food expenditure, etc.). Asked only when `shock_experienced_past_12mo` is non-empty. Drawn from the FAO RIMA-II coping module, the LSMS-ISA shocks and coping module, and the WFP Livelihood Coping Strategies (LCS) conceptual framework. Distinct from FoodSecurityProfile `lcs_*` items, which score the standard food-specific LCS set on a 30-day recall; this item captures the broader livelihood coping response over 12 months.", "es": "La estrategia m\u00e1s importante que el hogar utiliz\u00f3 para hacer frente a los choques reportados en `shock_experienced_past_12mo`. Selecci\u00f3n \u00fanica del vocabulario `livelihood-coping-strategy`, que abarca el afrontamiento a nivel de medios de vida (venta de activos, migraci\u00f3n, reducci\u00f3n gruesa del consumo, endeudamiento, reducci\u00f3n del gasto no alimentario, etc.). Se pregunta solo cuando `shock_experienced_past_12mo` no est\u00e1 vac\u00edo. Tomada del m\u00f3dulo de afrontamiento FAO RIMA-II, el m\u00f3dulo de choques y afrontamiento LSMS-ISA y el marco conceptual de Estrategias de Afrontamiento de Medios de Vida (LCS) del PMA. Distinta de los \u00edtems `lcs_*` de FoodSecurityProfile, que punt\u00faan el conjunto est\u00e1ndar LCS espec\u00edfico de alimentos en un recuerdo de 30 d\u00edas; este \u00edtem captura la respuesta de afrontamiento de medios de vida m\u00e1s amplia en 12 meses.", "fr": "La strat\u00e9gie la plus importante que le m\u00e9nage a utilis\u00e9e pour faire face aux chocs signal\u00e9s dans `shock_experienced_past_12mo`. S\u00e9lection unique dans le vocabulaire `livelihood-coping-strategy`, couvrant l''adaptation au niveau des moyens de subsistance (vente d''actifs, migration, r\u00e9duction grossi\u00e8re de la consommation, emprunt, r\u00e9duction des d\u00e9penses non alimentaires, etc.). Pos\u00e9e uniquement lorsque `shock_experienced_past_12mo` n''est pas vide. Tir\u00e9e du module d''adaptation FAO RIMA-II, du module chocs et adaptation LSMS-ISA et du cadre conceptuel des strat\u00e9gies d''adaptation des moyens de subsistance (LCS) du PAM. Distincte des items `lcs_*` de FoodSecurityProfile qui notent l''ensemble standard LCS sp\u00e9cifique \u00e0 l''alimentation sur un rappel de 30 jours ; cet item saisit la r\u00e9ponse d''adaptation des moyens de subsistance plus large sur 12 mois."}, "id": "shock_coping_strategy_used", "label": {"en": "Main coping strategy used in response to shocks", "es": "Principal estrategia de afrontamiento utilizada en respuesta a los choques", "fr": "Principale strat\u00e9gie d''adaptation utilis\u00e9e en r\u00e9ponse aux chocs"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-coping-strategy"}'
      bibliography_refs: fao-rima-2016
  shock_experienced_past_12mo:
    title:
      en: Shocks experienced in past 12 months
      fr: Chocs subis au cours des 12 derniers mois
      es: Choques experimentados en los últimos 12 meses
    description:
      en: Types of shocks that have affected the household in the past 12 months. Multi-select across natural, economic, conflict-related, and health shocks. Drawn from the FAO RIMA-II shock module, the LSMS-ISA shocks and coping module, the INFORM Risk Index typology, and the IOM DTM Multi-Sectoral Location Assessment shock component. Used alongside `shock_coping_strategy_used` to construct vulnerability and resilience profiles. Distinct from the crisis or displacement reference event captured in `livelihood_change_since_crisis`, which covers the full crisis period.
      fr: Types de chocs ayant affecté le ménage au cours des 12 derniers mois. Sélection multiple couvrant les chocs naturels, économiques, liés au conflit et sanitaires. Tirée du module de chocs FAO RIMA-II, du module chocs et adaptation LSMS-ISA, de la typologie de l'Indice de risque INFORM et de la composante chocs de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM. Utilisée avec `shock_coping_strategy_used` pour construire des profils de vulnérabilité et de résilience. Distincte de l'événement de référence de crise ou de déplacement saisi dans `livelihood_change_since_crisis`, qui couvre l'ensemble de la période de crise.
      es: Tipos de choques que han afectado al hogar en los últimos 12 meses. Selección múltiple que abarca choques naturales, económicos, relacionados con conflictos y de salud. Tomados del módulo de choques FAO RIMA-II, el módulo de choques y afrontamiento LSMS-ISA, la tipología del Índice de Riesgo INFORM y el componente de choques de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM. Utilizados junto con `shock_coping_strategy_used` para construir perfiles de vulnerabilidad y resiliencia. Distinto del evento de referencia de crisis o desplazamiento capturado en `livelihood_change_since_crisis`, que cubre todo el período de crisis.
    slot_uri: aidops:shock_experienced_past_12mo
    range: LivelihoodShockType
    multivalued: true
    annotations:
