  hf_electricity_source:
    title:
      en: Main electricity source at facility
      fr: Source principale d'électricité de l'établissement
      es: Fuente principal de electricidad del establecimiento
    description:
      en: 'Primary source of electricity for the facility: national grid, fuel generator, solar, hybrid (grid plus backup), battery only, or none. Observed by the enumerator. Multi-source arrangements are common; the primary source is recorded here, with backup captured elsewhere if needed. SARA basic-amenities tracer; WASH FIT Energy indicator.'
      fr: 'Source principale d''électricité pour l''établissement : réseau national, groupe électrogène à combustible, solaire, hybride (réseau plus secours), batterie uniquement ou aucune. Observé par l''enquêteur. Les configurations multi-sources sont courantes ; la source principale est enregistrée ici, le secours étant capturé ailleurs au besoin. Indicateur traceur SARA pour les aménités de base ; indicateur WASH FIT Énergie.'
      es: 'Fuente principal de electricidad para el establecimiento: red nacional, generador a combustible, solar, híbrido (red más respaldo), solo batería o ninguno. Observado por el enumerador. Los arreglos multifuente son comunes; aquí se registra la fuente principal, capturando el respaldo en otro lugar cuando sea necesario. Indicador trazador SARA para servicios básicos; indicador WASH FIT Energía.'
    slot_uri: aidops:hf_electricity_source
    range: FacilityElectricitySource
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022", "who-unicef-wash-fit-2022"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Primary source of electricity for the facility: national grid, fuel generator, solar, hybrid (grid plus backup), battery only, or none. Observed by the enumerator. Multi-source arrangements are common; the primary source is recorded here, with backup captured elsewhere if needed. SARA basic-amenities tracer; WASH FIT Energy indicator.", "es": "Fuente principal de electricidad para el establecimiento: red nacional, generador a combustible, solar, h\u00edbrido (red m\u00e1s respaldo), solo bater\u00eda o ninguno. Observado por el enumerador. Los arreglos multifuente son comunes; aqu\u00ed se registra la fuente principal, capturando el respaldo en otro lugar cuando sea necesario. Indicador trazador SARA para servicios b\u00e1sicos; indicador WASH FIT Energ\u00eda.", "fr": "Source principale d''\u00e9lectricit\u00e9 pour l''\u00e9tablissement : r\u00e9seau national, groupe \u00e9lectrog\u00e8ne \u00e0 combustible, solaire, hybride (r\u00e9seau plus secours), batterie uniquement ou aucune. Observ\u00e9 par l''enqu\u00eateur. Les configurations multi-sources sont courantes ; la source principale est enregistr\u00e9e ici, le secours \u00e9tant captur\u00e9 ailleurs au besoin. Indicateur traceur SARA pour les am\u00e9nit\u00e9s de base ; indicateur WASH FIT \u00c9nergie."}, "id": "hf_electricity_source", "label": {"en": "Main electricity source at facility", "es": "Fuente principal de electricidad del establecimiento", "fr": "Source principale d''\u00e9lectricit\u00e9 de l''\u00e9tablissement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "facility-electricity-source"}'
