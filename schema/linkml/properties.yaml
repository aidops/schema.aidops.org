  responder_reference:
    title:
      en: Responder reference (optional scope)
      fr: Référence de l'intervenant (portée facultative)
      es: Referencia del actor humanitario (alcance opcional)
    description:
      en: 'Optional free-text identifier for a specific humanitarian responder (agency name or response pillar) that the AccountabilityToAffectedPopulationsProfile record is asking about. By default, AAP items are asked generically (''aid providers'', ''the assistance you received'') following the IASC / REACH Menu 2018 convention, keeping the profile at `sensitivity: sensitive`. When this property is populated with a specific agency or pillar name, the items'' scope becomes agency-specific and the overall profile sensitivity escalates to `restricted` because naming a specific responder alongside a negative perception is reputationally sensitive. Null or absent means the default generic scope applies.'
      fr: 'Identifiant en texte libre facultatif pour un intervenant humanitaire spécifique (nom d''agence ou pilier de réponse) sur lequel porte l''enregistrement du Profil de redevabilité envers les populations affectées. Par défaut, les items AAP sont posés de manière générique (« intervenants », « l''aide que vous avez reçue ») selon la convention du Menu IASC / REACH 2018, gardant le profil à `sensitivity: sensitive`. Lorsque cette propriété est renseignée avec un nom d''agence ou de pilier spécifique, la portée des items devient spécifique à l''agence et la sensibilité globale du profil s''élève à `restricted` car nommer un intervenant spécifique en parallèle d''une perception négative est sensible sur le plan réputationnel. Nul ou absent signifie que la portée générique par défaut s''applique.'
      es: 'Identificador de texto libre opcional para un actor humanitario específico (nombre de agencia o pilar de respuesta) sobre el cual el registro del Perfil de Rendición de Cuentas a las Poblaciones Afectadas está indagando. Por defecto, los ítems AAP se hacen de manera genérica («actores humanitarios», «la ayuda que recibió») siguiendo la convención del Menú IASC / REACH 2018, manteniendo el perfil en `sensitivity: sensitive`. Cuando esta propiedad se completa con un nombre de agencia o pilar específico, el alcance de los ítems se vuelve específico de la agencia y la sensibilidad general del perfil se eleva a `restricted` porque nombrar a un actor específico junto con una percepción negativa es sensible en términos reputacionales. Nulo o ausente significa que se aplica el alcance genérico por defecto.'
    slot_uri: aidops:responder_reference
    range: string
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Optional free-text identifier for a specific humanitarian responder (agency name or response pillar) that the AccountabilityToAffectedPopulationsProfile record is asking about. By default, AAP items are asked generically (''aid providers'', ''the assistance you received'') following the IASC / REACH Menu 2018 convention, keeping the profile at `sensitivity: sensitive`. When this property is populated with a specific agency or pillar name, the items'' scope becomes agency-specific and the overall profile sensitivity escalates to `restricted` because naming a specific responder alongside a negative perception is reputationally sensitive. Null or absent means the default generic scope applies.", "es": "Identificador de texto libre opcional para un actor humanitario espec\u00edfico (nombre de agencia o pilar de respuesta) sobre el cual el registro del Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas est\u00e1 indagando. Por defecto, los \u00edtems AAP se hacen de manera gen\u00e9rica (\u00abactores humanitarios\u00bb, \u00abla ayuda que recibi\u00f3\u00bb) siguiendo la convenci\u00f3n del Men\u00fa IASC / REACH 2018, manteniendo el perfil en `sensitivity: sensitive`. Cuando esta propiedad se completa con un nombre de agencia o pilar espec\u00edfico, el alcance de los \u00edtems se vuelve espec\u00edfico de la agencia y la sensibilidad general del perfil se eleva a `restricted` porque nombrar a un actor espec\u00edfico junto con una percepci\u00f3n negativa es sensible en t\u00e9rminos reputacionales. Nulo o ausente significa que se aplica el alcance gen\u00e9rico por defecto.", "fr": "Identifiant en texte libre facultatif pour un intervenant humanitaire sp\u00e9cifique (nom d''agence ou pilier de r\u00e9ponse) sur lequel porte l''enregistrement du Profil de redevabilit\u00e9 envers les populations affect\u00e9es. Par d\u00e9faut, les items AAP sont pos\u00e9s de mani\u00e8re g\u00e9n\u00e9rique (\u00ab intervenants \u00bb, \u00ab l''aide que vous avez re\u00e7ue \u00bb) selon la convention du Menu IASC / REACH 2018, gardant le profil \u00e0 `sensitivity: sensitive`. Lorsque cette propri\u00e9t\u00e9 est renseign\u00e9e avec un nom d''agence ou de pilier sp\u00e9cifique, la port\u00e9e des items devient sp\u00e9cifique \u00e0 l''agence et la sensibilit\u00e9 globale du profil s''\u00e9l\u00e8ve \u00e0 `restricted` car nommer un intervenant sp\u00e9cifique en parall\u00e8le d''une perception n\u00e9gative est sensible sur le plan r\u00e9putationnel. Nul ou absent signifie que la port\u00e9e g\u00e9n\u00e9rique par d\u00e9faut s''applique."}, "id": "responder_reference", "label": {"en": "Responder reference (optional scope)", "es": "Referencia del actor humanitario (alcance opcional)", "fr": "R\u00e9f\u00e9rence de l''intervenant (port\u00e9e facultative)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
  return_barriers:
    title:
      en: Return barriers
      fr: Obstacles au retour
