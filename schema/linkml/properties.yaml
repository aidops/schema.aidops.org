  climate_distress_migration_past_event:
    title:
      en: Household or member forced to move due to climate hazard in the past 5 years
      fr: Le ménage ou un membre contraint de se déplacer en raison d'un aléa climatique au cours des 5 dernières années
      es: Hogar o miembro forzado a mudarse por un peligro climático en los últimos 5 años
    description:
      en: 'Single-select maladaptation signal asking whether the household or any of its members has been forced to move or leave home specifically because of losses or threats from drought, flood, cyclone, or another climate-related event — even temporarily — in the past 5 years. Captures involuntary climate displacement as a signal that the household has already exhausted in-place coping options, eroding future adaptive capacity. Boundary with DisplacementProfile: if the household is currently displaced, a full DisplacementProfile should be collected; the reason field there should include a climate-displacement code. This property is a maladaptation flag, not a full displacement record. Boundary with climate_migration_adaptation_intent: that captures voluntary planned future relocation as an adaptive strategy; this captures past forced displacement. Valid codes: yes_multiple_times / yes_once / no / dont_know.'
      fr: Signal de maladaptation à sélection unique demandant si le ménage ou l'un de ses membres a été contraint de se déplacer spécifiquement à cause de pertes ou de menaces liées à la sécheresse, aux inondations, aux cyclones ou à un autre événement climatique au cours des 5 dernières années. Frontière avec DisplacementProfile et climate_migration_adaptation_intent.
      es: Señal de maladaptación de selección única que pregunta si el hogar o alguno de sus miembros se ha visto obligado a mudarse específicamente por pérdidas o amenazas de sequía, inundación, ciclón u otro evento climático en los últimos 5 años. Límite con DisplacementProfile y climate_migration_adaptation_intent.
    slot_uri: aidops:climate_distress_migration_past_event
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019", "practical-action-v2r-2016"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select maladaptation signal asking whether the household or any of its members has been forced to move or leave home specifically because of losses or threats from drought, flood, cyclone, or another climate-related event \u2014 even temporarily \u2014 in the past 5 years. Captures involuntary climate displacement as a signal that the household has already exhausted in-place coping options, eroding future adaptive capacity. Boundary with DisplacementProfile: if the household is currently displaced, a full DisplacementProfile should be collected; the reason field there should include a climate-displacement code. This property is a maladaptation flag, not a full displacement record. Boundary with climate_migration_adaptation_intent: that captures voluntary planned future relocation as an adaptive strategy; this captures past forced displacement. Valid codes: yes_multiple_times / yes_once / no / dont_know.\n", "es": "Se\u00f1al de maladaptaci\u00f3n de selecci\u00f3n \u00fanica que pregunta si el hogar o alguno de sus miembros se ha visto obligado a mudarse espec\u00edficamente por p\u00e9rdidas o amenazas de sequ\u00eda, inundaci\u00f3n, cicl\u00f3n u otro evento clim\u00e1tico en los \u00faltimos 5 a\u00f1os. L\u00edmite con DisplacementProfile y climate_migration_adaptation_intent.\n", "fr": "Signal de maladaptation \u00e0 s\u00e9lection unique demandant si le m\u00e9nage ou l''un de ses membres a \u00e9t\u00e9 contraint de se d\u00e9placer sp\u00e9cifiquement \u00e0 cause de pertes ou de menaces li\u00e9es \u00e0 la s\u00e9cheresse, aux inondations, aux cyclones ou \u00e0 un autre \u00e9v\u00e9nement climatique au cours des 5 derni\u00e8res ann\u00e9es. Fronti\u00e8re avec DisplacementProfile et climate_migration_adaptation_intent.\n"}, "id": "climate_distress_migration_past_event", "label": {"en": "Household or member forced to move due to climate hazard in the past 5 years", "es": "Hogar o miembro forzado a mudarse por un peligro clim\u00e1tico en los \u00faltimos 5 a\u00f1os", "fr": "Le m\u00e9nage ou un membre contraint de se d\u00e9placer en raison d''un al\u00e9a climatique au cours des 5 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
