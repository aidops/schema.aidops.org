  hf_commodity_stockout_14d:
    title:
      en: Any tracer commodity stock-out in past 14 days
      fr: Rupture de stock d'au moins un produit traceur au cours des 14 derniers jours
      es: Desabastecimiento de al menos un insumo trazador en los últimos 14 días
    description:
      en: 'Whether there has been a stock-out of at least one of the tracer commodities in the past 14 days. Reported by the pharmacy/stores officer. Summary flag across the tracer set; may be computed from the individual commodity items or asked directly. HHFA and SARA tracer methodology. Sensitive: chronic stock-out reporting can be politically damaging to the ministry, and facilities may under-report.'
      fr: 'S''il y a eu une rupture de stock d''au moins un produit traceur au cours des 14 derniers jours. Rapporté par le responsable pharmacie/stocks. Signal synthétique sur l''ensemble traceur ; peut être calculé à partir des items produits individuels ou demandé directement. Méthodologie traceur HHFA et SARA. Sensible : le reporting de ruptures de stock chroniques peut être politiquement dommageable pour le ministère, et les établissements peuvent sous-déclarer.'
      es: 'Si ha habido un desabastecimiento de al menos uno de los insumos trazadores en los últimos 14 días. Reportado por el responsable de farmacia/almacén. Indicador resumen sobre el conjunto trazador; puede calcularse a partir de los ítems individuales de insumos o preguntarse directamente. Metodología trazador HHFA y SARA. Sensible: el reporte de desabastecimientos crónicos puede ser políticamente dañino para el ministerio, y los establecimientos pueden sub-reportar.'
    slot_uri: aidops:hf_commodity_stockout_14d
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "classification", "core": true, "definition": {"en": "Whether there has been a stock-out of at least one of the tracer commodities in the past 14 days. Reported by the pharmacy/stores officer. Summary flag across the tracer set; may be computed from the individual commodity items or asked directly. HHFA and SARA tracer methodology. Sensitive: chronic stock-out reporting can be politically damaging to the ministry, and facilities may under-report.", "es": "Si ha habido un desabastecimiento de al menos uno de los insumos trazadores en los \u00faltimos 14 d\u00edas. Reportado por el responsable de farmacia/almac\u00e9n. Indicador resumen sobre el conjunto trazador; puede calcularse a partir de los \u00edtems individuales de insumos o preguntarse directamente. Metodolog\u00eda trazador HHFA y SARA. Sensible: el reporte de desabastecimientos cr\u00f3nicos puede ser pol\u00edticamente da\u00f1ino para el ministerio, y los establecimientos pueden sub-reportar.", "fr": "S''il y a eu une rupture de stock d''au moins un produit traceur au cours des 14 derniers jours. Rapport\u00e9 par le responsable pharmacie/stocks. Signal synth\u00e9tique sur l''ensemble traceur ; peut \u00eatre calcul\u00e9 \u00e0 partir des items produits individuels ou demand\u00e9 directement. M\u00e9thodologie traceur HHFA et SARA. Sensible : le reporting de ruptures de stock chroniques peut \u00eatre politiquement dommageable pour le minist\u00e8re, et les \u00e9tablissements peuvent sous-d\u00e9clarer."}, "id": "hf_commodity_stockout_14d", "label": {"en": "Any tracer commodity stock-out in past 14 days", "es": "Desabastecimiento de al menos un insumo trazador en los \u00faltimos 14 d\u00edas", "fr": "Rupture de stock d''au moins un produit traceur au cours des 14 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": 