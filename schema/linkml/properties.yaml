    description:
      en: 'Whether the child received the first dose of the pentavalent (DTP-HepB-Hib) or DTP vaccine at approximately 6 weeks of age. Published recall wording: ''Has (name) ever been given a DPT injection — an injection in the thigh or buttocks — to prevent against tetanus, whooping cough, and diphtheria? (1st dose).'' Penta = DTP + hepatitis B + Hib combined. DHS h3 records DPT1; when Penta is the national vaccine, DPT1 captures the Penta dose. DHS code h3; MICS code IM4a.'
