  fuel_jerrycan_count:
    title:
      en: Number of jerry cans for liquid fuel storage
      fr: Nombre de jerrycans pour le stockage de combustible liquide
      es: Número de bidones para almacenamiento de combustible líquido
    description:
      en: 'Count of jerry cans or fuel storage containers currently held by the household for storing liquid fuel (such as kerosene or fuel oil). Asked only in contexts where liquid-fuel stoves are common. In most households the fuel jerry can and the water jerry can (water_jerrycan_count) are the same physical object; this item records the count specifically used for fuel storage. Sphere Standard 3: safe fuel storage space must be available. UNHCR CRI: semi-collapsible jerry cans listed as core relief items.'
      fr: 'Nombre de jerrycans ou de récipients de stockage de combustible actuellement détenus par le ménage pour stocker du combustible liquide (tel que le pétrole lampant ou le mazout). Demandé uniquement dans les contextes où les foyers à combustible liquide sont courants. Dans la plupart des ménages, le jerrycan de combustible et le jerrycan d''eau (water_jerrycan_count) sont le même objet physique ; cet item consigne le nombre spécifiquement utilisé pour le stockage de combustible. Norme Sphère 3 : un espace de stockage de combustible sûr doit être disponible. HCR CRI : les jerrycans semi-rigides sont listés comme articles de secours essentiels.'
      es: 'Cuenta de bidones o recipientes de almacenamiento de combustible que tiene actualmente el hogar para almacenar combustible líquido (como queroseno o combustóleo). Preguntado solo en contextos donde las cocinas de combustible líquido son comunes. En la mayoría de los hogares, el bidón de combustible y el bidón de agua (water_jerrycan_count) son el mismo objeto físico; este ítem registra la cuenta usada específicamente para el almacenamiento de combustible. Norma Esfera 3: debe haber disponible un espacio seguro de almacenamiento de combustible. ACNUR CRI: los bidones semi-plegables están listados como artículos centrales de socorro.'
