n des risques li\u00e9s aux engins explosifs \u2014 EORE). La p\u00e9riode de rappel est un choix de programme : jamais (dur\u00e9e de vie) ou 12 derniers mois. Le binaire re\u00e7u / non re\u00e7u est l''indicateur minimum ; les \u00e9valuations de programme peuvent ajouter des questions plus d\u00e9taill\u00e9es (source, contenu retenu, adoption comportementale). Le binaire est ad\u00e9quat pour une utilisation MSNA / HNO. Un r\u00e9sultat n\u00e9gatif dans les zones de contamination connue indique un d\u00e9ficit de programme n\u00e9cessitant une priorit\u00e9 de sensibilisation. Fond\u00e9 sur les Directives EORE IMAS (2022) ; indicateurs m\u00e9nage EORE UNMAS ; Cadre d''\u00e9valuation de l''impact EORE GICHD."}, "id": "eore_received", "label": {"en": "EORE received (household)", "es": "EORE recibida (hogar)", "fr": "EORE re\u00e7ue (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
