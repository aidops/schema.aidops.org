  climate_dwelling_vulnerable_location:
    title:
      en: Household location exposed to climate location risks
      fr: Emplacement du ménage exposé à des risques climatiques de localisation
      es: Ubicación del hogar expuesta a riesgos climáticos de localización
    description:
      en: 'Multi-select sensitivity indicator recording which location-level climate risks apply to the area where the household lives. This is a household-level sensitivity indicator — not a dwelling structural assessment. The item asks the respondent about the location characteristics, not the building condition. Boundary with DwellingDamageProfile: that profile records post-event structural damage to the dwelling. This property captures the forward-looking location risk prior to any event, as a sensitivity component of the IPCC vulnerability framework. Enumerator note: if the respondent is uncertain, the enumerator may observe and mark applicable codes based on visible terrain or setting.'
      fr: 'Indicateur de sensibilité à sélection multiple enregistrant quels risques climatiques liés à l''emplacement s''appliquent à la zone où vit le ménage. Il s''agit d''un indicateur de sensibilité au niveau du ménage — non d''une évaluation structurelle du logement. L''item interroge le répondant sur les caractéristiques de l''emplacement, pas sur l''état du bâtiment. Frontière avec DwellingDamageProfile : ce profil enregistre les dommages structurels post-événement au logement. Cette propriété capture le risque de localisation prospectif antérieur à tout événement.'
      es: 'Indicador de sensibilidad de selección múltiple que registra qué riesgos climáticos de ubicación aplican al área donde vive el hogar. Es un indicador de sensibilidad a nivel del hogar, no una evaluación estructural de la vivienda. El ítem pregunta al encuestado sobre las características de la ubicación, no sobre el estado del edificio. Límite con DwellingDamageProfile: ese perfil registra daños estructurales post-evento a la vivienda. Esta propiedad captura el riesgo de ubicación prospectivo anterior a cualquier evento.'
    slot_uri: aidops:climate_dwelling_vulnerable_location
    range: ClimateLocationRisk
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gcf-results-framework-2022", "ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022", "nd-gain-methodology", "unfccc-nap-me-2022"], "cardinality": "multiple", "category": "climate", "core": true, "definition": {"en": "Multi-select sensitivity indicator recording which location-level climate risks apply to the area where the household lives. This is a household-level sensitivity indicator \u2014 not a dwelling structural assessment. The item asks the respondent about the location characteristics, not the building condition. Boundary with DwellingDamageProfile: that profile records post-event structural damage to the dwelling. This property captures the forward-looking location risk prior to any event, as a sensitivity component of the IPCC vulnerability framework. Enumerator note: if the respondent is uncertain, the enumerator may observe and mark applicable codes based on visible terrain or setting.\n", "es": "Indicador de sensibilidad de selecci\u00f3n m\u00faltiple que registra qu\u00e9 riesgos clim\u00e1ticos de ubicaci\u00f3n aplican al \u00e1rea donde vive el hogar. Es un indicador de sensibilidad a nivel del hogar, no una evaluaci\u00f3n estructural de la vivienda. El \u00edtem pregunta al encuestado sobre las caracter\u00edsticas de la ubicaci\u00f3n, no sobre el estado del edificio. L\u00edmite con DwellingDamageProfile: ese perfil registra da\u00f1os estructurales post-evento a la vivienda. Esta propiedad captura el riesgo de ubicaci\u00f3n prospectivo anterior a cualquier evento.\n", "fr": "Indicateur de sensibilit\u00e9 \u00e0 s\u00e9lection multiple enregistrant quels risques climatiques li\u00e9s \u00e0 l''emplacement s''appliquent \u00e0 la zone o\u00f9 vit le m\u00e9nage. Il s''agit d''un indicateur de sensibilit\u00e9 au niveau du m\u00e9nage \u2014 non d''une \u00e9valuation structurelle du logement. L''item interroge le r\u00e9pondant sur les caract\u00e9ristiques de l''emplacement, pas sur l''\u00e9tat du b\u00e2timent. Fronti\u00e8re avec DwellingDamageProfile : ce profil enregistre les dommages structurels post-\u00e9v\u00e9nement au logement. Cette propri\u00e9t\u00e9 capture le risque de localisation prospectif ant\u00e9rieur \u00e0 tout \u00e9v\u00e9nement.\n"}, "id": "climate_dwelling_vulnerable_location", "label": {"en": "Household location exposed to climate location risks", "es": "Ubicaci\u00f3n del hogar expuesta a riesgos clim\u00e1ticos de localizaci\u00f3n", "fr": "Emplacement du m\u00e9nage expos\u00e9 \u00e0 des risques climatiques de localisation"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "climate-location-risk"}'
      bibliography_refs: gcf-results-framework-2022,ipcc-ar5-wg2-2014,ipcc-ar6-wg2-2022,nd-gain-methodology,unfccc-nap-me-2022
  climate_extreme_events_frequency_perception:
    title:
      en: Perceived change in frequency of extreme weather events over the past 10–15 years
      fr: Changement perçu dans la fréquence des phénomènes météorologiques extrêmes au cours des 10–15 dernières années
      es: Cambio percibido en la frecuencia de eventos meteorológicos extremos durante los últimos 10–15 años
    description:
      en: Single-select item asking whether the respondent perceives extreme weather events — very heavy rains, very long dry spells, very hot days, or very strong winds — to happen more often, less often, or about the same compared to when they were growing up or 10–15 years ago. Complements climate_hazard_frequency_trend_perception (which asks about a named specific hazard) and climate_hazard_severity_trend_perception by asking about extreme events in general — a broader perceived-change signal that captures the IPCC AR6 WGII Chapter 11 compound and extreme events dimension.
      fr: Item à sélection unique demandant si le répondant perçoit que les phénomènes météorologiques extrêmes — pluies très fortes, longues périodes de sécheresse, journées très chaudes ou vents très forts — se produisent plus souvent, moins souvent ou à peu près autant par rapport à son enfance ou il y a 10 à 15 ans. Complète les items A2 et A3 en posant la question sur les événements extrêmes en général.
      es: Ítem de selección única que pregunta si el encuestado percibe que los eventos meteorológicos extremos — lluvias muy intensas, períodos de sequía muy prolongados, días muy calurosos o vientos muy fuertes — ocurren más seguido, menos seguido o aproximadamente igual comparado con cuando era joven o hace 10 a 15 años. Complementa los ítems A2 y A3 preguntando sobre eventos extremos en general.
    slot_uri: aidops:climate_extreme_events_frequency_perception
    range: ClimateTrendPerception
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Single-select item asking whether the respondent perceives extreme weather events \u2014 very heavy rains, very long dry spells, very hot days, or very strong winds \u2014 to happen more often, less often, or about the same compared to when they were growing up or 10\u201315 years ago. Complements climate_hazard_frequency_trend_perception (which asks about a named specific hazard) and climate_hazard_severity_trend_perception by asking about extreme events in general \u2014 a broader perceived-change signal that captures the IPCC AR6 WGII Chapter 11 compound and extreme events dimension.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el encuestado percibe que los eventos meteorol\u00f3gicos extremos \u2014 lluvias muy intensas, per\u00edodos de sequ\u00eda muy prolongados, d\u00edas muy calurosos o vientos muy fuertes \u2014 ocurren m\u00e1s seguido, menos seguido o aproximadamente igual comparado con cuando era joven o hace 10 a 15 a\u00f1os. Complementa los \u00edtems A2 y A3 preguntando sobre eventos extremos en general.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le r\u00e9pondant per\u00e7oit que les ph\u00e9nom\u00e8nes m\u00e9t\u00e9orologiques extr\u00eames \u2014 pluies tr\u00e8s fortes, longues p\u00e9riodes de s\u00e9cheresse, journ\u00e9es tr\u00e8s chaudes ou vents tr\u00e8s forts \u2014 se produisent plus souvent, moins souvent ou \u00e0 peu pr\u00e8s autant par rapport \u00e0 son enfance ou il y a 10 \u00e0 15 ans. Compl\u00e8te les items A2 et A3 en posant la question sur les \u00e9v\u00e9nements extr\u00eames en g\u00e9n\u00e9ral.\n"}, "id": "climate_extreme_events_frequency_perception", "label": {"en": "Perceived change in frequency of extreme weather events over the past 10\u201315 years", "es": "Cambio percibido en la frecuencia de eventos meteorol\u00f3gicos extremos durante los \u00faltimos 10\u201315 a\u00f1os", "fr": "Changement per\u00e7u dans la fr\u00e9quence des ph\u00e9nom\u00e8nes m\u00e9t\u00e9orologiques extr\u00eames au cours des 10\u201315 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-trend-perception"}'
      bibliography_refs: assar-adaptive-capacity-2017,care-cvca-handbook-2019,ifrc-pcva-2020,ipcc-ar6-wg2-2022,oxfam-adaptation-toolkit-2019
  climate_hazard_frequency_trend_perception:
    title:
      en: Perceived change in hazard frequency compared to 10–15 years ago
      fr: Changement perçu dans la fréquence des aléas par rapport à il y a 10–15 ans
      es: Cambio percibido en la frecuencia de peligros comparado con hace 10–15 años
    description:
      en: Single-select item asking whether the household perceives the most frequently experienced climate hazard (identified in climate_hazards_experienced_past_5_years) now occurs more often, less often, or about the same compared to when the respondent was growing up or 10–15 years ago. Per IPCC AR6 WGII Box 1.1, community-perceived frequency trends show high concordance with observed meteorological data in data-sparse regions and are a valid proxy indicator. Applies when at least one hazard is selected in climate_hazards_experienced_past_5_years. Together with climate_hazard_severity_trend_perception, forms the perceived-hazard-trend pair used in CARE CVCA and IFRC PCVA community assessments.
      fr: Item à sélection unique demandant si le ménage perçoit que l'aléa climatique le plus fréquemment subi (identifié dans climate_hazards_experienced_past_5_years) se produit maintenant plus souvent, moins souvent ou à peu près autant par rapport à l'enfance du répondant ou il y a 10 à 15 ans. Selon le Encadré 1.1 du GIEC AR6 WGII, les tendances de fréquence perçues par les communautés présentent une concordance élevée avec les données météorologiques observées dans les régions pauvres en données.
      es: Ítem de selección única que pregunta si el hogar percibe que el peligro climático más frecuentemente experimentado (identificado en climate_hazards_experienced_past_5_years) ahora ocurre más seguido, menos seguido o aproximadamente igual que cuando el encuestado era joven o hace 10 a 15 años. Según el Recuadro 1.1 del IPCC AR6 WGII, las tendencias de frecuencia percibidas por la comunidad muestran alta concordancia con los datos meteorológicos observados en regiones con escasez de datos.
    slot_uri: aidops:climate_hazard_frequency_trend_perception
    range: ClimateTrendPerception
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "practical-action-v2r-2016"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select item asking whether the household perceives the most frequently experienced climate hazard (identified in climate_hazards_experienced_past_5_years) now occurs more often, less often, or about the same compared to when the respondent was growing up or 10\u201315 years ago. Per IPCC AR6 WGII Box 1.1, community-perceived frequency trends show high concordance with observed meteorological data in data-sparse regions and are a valid proxy indicator. Applies when at least one hazard is selected in climate_hazards_experienced_past_5_years. Together with climate_hazard_severity_trend_perception, forms the perceived-hazard-trend pair used in CARE CVCA and IFRC PCVA community assessments.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el hogar percibe que el peligro clim\u00e1tico m\u00e1s frecuentemente experimentado (identificado en climate_hazards_experienced_past_5_years) ahora ocurre m\u00e1s seguido, menos seguido o aproximadamente igual que cuando el encuestado era joven o hace 10 a 15 a\u00f1os. Seg\u00fan el Recuadro 1.1 del IPCC AR6 WGII, las tendencias de frecuencia percibidas por la comunidad muestran alta concordancia con los datos meteorol\u00f3gicos observados en regiones con escasez de datos.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le m\u00e9nage per\u00e7oit que l''al\u00e9a climatique le plus fr\u00e9quemment subi (identifi\u00e9 dans climate_hazards_experienced_past_5_years) se produit maintenant plus souvent, moins souvent ou \u00e0 peu pr\u00e8s autant par rapport \u00e0 l''enfance du r\u00e9pondant ou il y a 10 \u00e0 15 ans. Selon le Encadr\u00e9 1.1 du GIEC AR6 WGII, les tendances de fr\u00e9quence per\u00e7ues par les communaut\u00e9s pr\u00e9sentent une concordance \u00e9lev\u00e9e avec les donn\u00e9es m\u00e9t\u00e9orologiques observ\u00e9es dans les r\u00e9gions pauvres en donn\u00e9es.\n"}, "id": "climate_hazard_frequency_trend_perception", "label": {"en": "Perceived change in hazard frequency compared to 10\u201315 years ago", "es": "Cambio percibido en la frecuencia de peligros comparado con hace 10\u201315 a\u00f1os", "fr": "Changement per\u00e7u dans la fr\u00e9quence des al\u00e9as par rapport \u00e0 il y a 10\u201315 ans"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-trend-perception"}'
