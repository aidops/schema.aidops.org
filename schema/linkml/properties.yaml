      fr: Fréquence des actes physiques initiés par la répondante contre son partenaire au cours des 12 derniers mois. Item DHS DV10. Posée uniquement si gbv_initiation_ever = vrai. Item OPTIONNEL. Compatible DHS-7+.
      es: Frecuencia de que la encuestada golpee, abofetee, patee o lastime físicamente a su compañero en los últimos 12 meses. Ítem DHS DV10. Se pregunta solo si gbv_initiation_ever = verdadero. Ítem OPCIONAL. Compatible DHS-7+.
    slot_uri: aidops:gbv_initiation_12m_freq
    range: IpvFreq3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "cardinality": "single", "category": "gbv_safety_signals", "core": false, "definition": {"en": "Frequency of the respondent hitting, slapping, kicking, or physically hurting her partner (when he was not already hurting her) in the past 12 months. DHS instrument item DV10. Skip logic: asked only if gbv_initiation_ever = true. OPTIONAL module item; see gbv_initiation_ever definition. DHS-7+ compatible where included. Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Frecuencia de que la encuestada golpee, abofetee, patee o lastime f\u00edsicamente a su compa\u00f1ero en los \u00faltimos 12 meses. \u00cdtem DHS DV10. Se pregunta solo si gbv_initiation_ever = verdadero. \u00cdtem OPCIONAL. Compatible DHS-7+.\n", "fr": "Fr\u00e9quence des actes physiques initi\u00e9s par la r\u00e9pondante contre son partenaire au cours des 12 derniers mois. Item DHS DV10. Pos\u00e9e uniquement si gbv_initiation_ever = vrai. Item OPTIONNEL. Compatible DHS-7+.\n"}, "id": "gbv_initiation_12m_freq", "label": {"en": "Respondent-initiated physical act (optional): frequency in past 12 months", "es": "Acto f\u00edsico iniciado por la encuestada (opcional): frecuencia en los \u00faltimos 12 meses", "fr": "Acte physique initi\u00e9 par la r\u00e9pondante (optionnel) : fr\u00e9quence au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "ipv-freq-3"}'
