      en: Children under 5 exempted from user fees
      fr: Enfants de moins de 5 ans exemptés des frais d'utilisation
      es: Niños menores de 5 años exentos de tarifas al usuario
    description:
      en: 'Whether children under 5 years old are exempted from user fees for curative services and immunization at this facility. Three-level response: `yes` (full exemption for both curative and immunization), `partial` (exemption for one but not both), `no` (no exemption). Asked only when `hf_user_fee_charged` is not `no`; leave null when user fees are not charged at all. Reported by the facility in-charge. Sphere 2018 Health Action. Sensitive: fee-waiver policy is politically sensitive.'
      fr: 'Si les enfants de moins de 5 ans sont exemptés des frais d''utilisation pour les services curatifs et la vaccination dans cet établissement. Réponse à trois niveaux : `yes` (exemption complète pour le curatif et la vaccination), `partial` (exemption pour l''un mais pas les deux), `no` (aucune exemption). À poser uniquement lorsque `hf_user_fee_charged` n''est pas `no` ; laisser à null lorsqu''aucun frais n''est facturé. Rapporté par le responsable de l''établissement. Sphere 2018 Action Santé. Sensible : la politique d''exemption de frais est politiquement sensible.'
      es: 'Si los niños menores de 5 años están exentos de tarifas al usuario para servicios curativos e inmunización en este establecimiento. Respuesta de tres niveles: `yes` (exención completa tanto para curativos como para inmunización), `partial` (exención para uno pero no para ambos), `no` (sin exención). Preguntar solo cuando `hf_user_fee_charged` no sea `no`; dejar nulo cuando no se cobren tarifas. Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud. Sensible: la política de exención de tarifas es políticamente sensible.'
    slot_uri: aidops:hf_exemption_under5
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "governance", "core": true, "definition": {"en": "Whether children under 5 years old are exempted from user fees for curative services and immunization at this facility. Three-level response: `yes` (full exemption for both curative and immunization), `partial` (exemption for one but not both), `no` (no exemption). Asked only when `hf_user_fee_charged` is not `no`; leave null when user fees are not charged at all. Reported by the facility in-charge. Sphere 2018 Health Action. Sensitive: fee-waiver policy is politically sensitive.", "es": "Si los ni\u00f1os menores de 5 a\u00f1os est\u00e1n exentos de tarifas al usuario para servicios curativos e inmunizaci\u00f3n en este establecimiento. Respuesta de tres niveles: `yes` (exenci\u00f3n completa tanto para curativos como para inmunizaci\u00f3n), `partial` (exenci\u00f3n para uno pero no para ambos), `no` (sin exenci\u00f3n). Preguntar solo cuando `hf_user_fee_charged` no sea `no`; dejar nulo cuando no se cobren tarifas. Reportado por el responsable del establecimiento. Esfera 2018 Acci\u00f3n de Salud. Sensible: la pol\u00edtica de exenci\u00f3n de tarifas es pol\u00edticamente sensible.", "fr": "Si les enfants de moins de 5 ans sont exempt\u00e9s des frais d''utilisation pour les services curatifs et la vaccination dans cet \u00e9tablissement. R\u00e9ponse \u00e0 trois niveaux : `yes` (exemption compl\u00e8te pour le curatif et la vaccination), `partial` (exemption pour l''un mais pas les deux), `no` (aucune exemption). \u00c0 poser uniquement lorsque `hf_user_fee_charged` n''est pas `no` ; laisser \u00e0 null lorsqu''aucun frais n''est factur\u00e9. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Sphere 2018 Action Sant\u00e9. Sensible : la politique d''exemption de frais est politiquement sensible."}, "id": "hf_exemption_under5", "label": {"en": "Children under 5 exempted from user fees", "es": "Ni\u00f1os menores de 5 a\u00f1os exentos de tarifas al usuario", "fr": "Enfants de moins de 5 ans exempt\u00e9s des frais d''utilisation"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-partial"}'
  hf_facility_level:
    title:
      en: Facility level of care
      fr: Niveau de soins de l'établissement
      es: Nivel de atención del establecimiento
    description:
      en: Position of the facility in the national health-system tier (primary, secondary, tertiary, community-level). Reported by the facility in-charge. Primary care covers first-contact facilities (health posts, health centres); secondary covers district hospitals; tertiary covers national/referral hospitals; community covers outposts and auxiliary community sites. Follows Sphere 2018 Ch.3 and WHO health-systems framing.
      fr: Position de l'établissement dans la hiérarchie du système de santé national (primaire, secondaire, tertiaire, niveau communautaire). Rapporté par le responsable de l'établissement. Les soins primaires couvrent les établissements de premier contact (postes de santé, centres de santé) ; le secondaire couvre les hôpitaux de district ; le tertiaire couvre les hôpitaux nationaux/de référence ; la communauté couvre les avant-postes et les sites communautaires auxiliaires. Suit Sphère 2018 Ch.3 et le cadrage des systèmes de santé de l'OMS.
      es: Posición del establecimiento en la jerarquía del sistema de salud nacional (primario, secundario, terciario, nivel comunitario). Reportado por el responsable del establecimiento. La atención primaria cubre establecimientos de primer contacto (puestos de salud, centros de salud); el secundario cubre hospitales de distrito; el terciario cubre hospitales nacionales/de referencia; el comunitario cubre avanzadas y sitios comunitarios auxiliares. Sigue Esfera 2018 Cap. 3 y el marco de sistemas de salud de la OMS.
    slot_uri: aidops:hf_facility_level
    range: HealthFacilityLevel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "classification", "core": true, "definition": {"en": "Position of the facility in the national health-system tier (primary, secondary, tertiary, community-level). Reported by the facility in-charge. Primary care covers first-contact facilities (health posts, health centres); secondary covers district hospitals; tertiary covers national/referral hospitals; community covers outposts and auxiliary community sites. Follows Sphere 2018 Ch.3 and WHO health-systems framing.", "es": "Posici\u00f3n del establecimiento en la jerarqu\u00eda del sistema de salud nacional (primario, secundario, terciario, nivel comunitario). Reportado por el responsable del establecimiento. La atenci\u00f3n primaria cubre establecimientos de primer contacto (puestos de salud, centros de salud); el secundario cubre hospitales de distrito; el terciario cubre hospitales nacionales/de referencia; el comunitario cubre avanzadas y sitios comunitarios auxiliares. Sigue Esfera 2018 Cap. 3 y el marco de sistemas de salud de la OMS.", "fr": "Position de l''\u00e9tablissement dans la hi\u00e9rarchie du syst\u00e8me de sant\u00e9 national (primaire, secondaire, tertiaire, niveau communautaire). Rapport\u00e9 par le responsable de l''\u00e9tablissement. Les soins primaires couvrent les \u00e9tablissements de premier contact (postes de sant\u00e9, centres de sant\u00e9) ; le secondaire couvre les h\u00f4pitaux de district ; le tertiaire couvre les h\u00f4pitaux nationaux/de r\u00e9f\u00e9rence ; la communaut\u00e9 couvre les avant-postes et les sites communautaires auxiliaires. Suit Sph\u00e8re 2018 Ch.3 et le cadrage des syst\u00e8mes de sant\u00e9 de l''OMS."}, "id": "hf_facility_level", "label": {"en": "Facility level of care", "es": "Nivel de atenci\u00f3n del establecimiento", "fr": "Niveau de soins de l''\u00e9tablissement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "health-facility-level"}'
      bibliography_refs: who-hhfa-2022
  hf_facility_type:
    title:
      en: Facility type
      fr: Type d'établissement
      es: Tipo de establecimiento
    description:
      en: Functional category of the health facility per the WHO SARA/HHFA taxonomy (hospital, health centre, health post, dispensary, clinic, pharmacy, laboratory, mobile clinic, etc.). Reported by the facility in-charge; commonly cross-referenced with the national master facility list. Stratifier for all downstream readiness analyses.
      fr: Catégorie fonctionnelle de l'établissement de santé selon la taxonomie SARA/HHFA de l'OMS (hôpital, centre de santé, poste de santé, dispensaire, clinique, pharmacie, laboratoire, clinique mobile, etc.). Rapporté par le responsable de l'établissement ; généralement recoupé avec la liste maîtresse nationale des établissements. Stratificateur pour toutes les analyses de capacité qui en découlent.
      es: Categoría funcional del establecimiento de salud según la taxonomía SARA/HHFA de la OMS (hospital, centro de salud, puesto de salud, dispensario, clínica, farmacia, laboratorio, clínica móvil, etc.). Reportado por el responsable del establecimiento; comúnmente contrastado con la lista maestra nacional de establecimientos. Estratificador para todos los análisis de capacidad posteriores.
    slot_uri: aidops:hf_facility_type
    range: HealthFacilityType
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-spa-revised-2022", "who-hhfa-2022"], "cardinality": "single", "category": "classification", "core": true, "definition": {"en": "Functional category of the health facility per the WHO SARA/HHFA taxonomy (hospital, health centre, health post, dispensary, clinic, pharmacy, laboratory, mobile clinic, etc.). Reported by the facility in-charge; commonly cross-referenced with the national master facility list. Stratifier for all downstream readiness analyses.", "es": "Categor\u00eda funcional del establecimiento de salud seg\u00fan la taxonom\u00eda SARA/HHFA de la OMS (hospital, centro de salud, puesto de salud, dispensario, cl\u00ednica, farmacia, laboratorio, cl\u00ednica m\u00f3vil, etc.). Reportado por el responsable del establecimiento; com\u00fanmente contrastado con la lista maestra nacional de establecimientos. Estratificador para todos los an\u00e1lisis de capacidad posteriores.", "fr": "Cat\u00e9gorie fonctionnelle de l''\u00e9tablissement de sant\u00e9 selon la taxonomie SARA/HHFA de l''OMS (h\u00f4pital, centre de sant\u00e9, poste de sant\u00e9, dispensaire, clinique, pharmacie, laboratoire, clinique mobile, etc.). Rapport\u00e9 par le responsable de l''\u00e9tablissement ; g\u00e9n\u00e9ralement recoup\u00e9 avec la liste ma\u00eetresse nationale des \u00e9tablissements. Stratificateur pour toutes les analyses de capacit\u00e9 qui en d\u00e9coulent."}, "id": "hf_facility_type", "label": {"en": "Facility type", "es": "Tipo de establecimiento", "fr": "Type d''\u00e9tablissement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "health-facility-type"}'
      bibliography_refs: dhs-spa-revised-2022,who-hhfa-2022
  hf_functionality_reason:
    title:
      en: Facility non-functionality reason(s)
      fr: Motif(s) de non-fonctionnalité de l'établissement
      es: Motivo(s) de no funcionalidad del establecimiento
    description:
      en: 'Reason(s) the facility is only partially functioning or is not functioning at all. Multi-select: damaged building, lack of staff, lack of medicines, lack of equipment, lack of electricity, lack of water, security/access, occupied by armed actors, closed by authorities, natural-disaster damage, other. Ask only when `hf_functionality_status` is not `fully_functioning`. Extended (non-core). Reported. Politically sensitive in conflict contexts.'
      fr: 'Raison(s) pour lesquelles l''établissement n''est que partiellement fonctionnel ou n''est pas du tout fonctionnel. Sélection multiple : bâtiment endommagé, manque de personnel, manque de médicaments, manque d''équipement, manque d''électricité, manque d''eau, sécurité/accès, occupé par des acteurs armés, fermé par les autorités, dommages dus à une catastrophe naturelle, autre. Ne poser que lorsque `hf_functionality_status` n''est pas `fully_functioning`. Étendu (non-core). Rapporté. Politiquement sensible en contextes de conflit.'
      es: 'Razón(es) por las que el establecimiento solo funciona parcialmente o no funciona en absoluto. Selección múltiple: edificio dañado, falta de personal, falta de medicamentos, falta de equipamiento, falta de electricidad, falta de agua, seguridad/acceso, ocupado por actores armados, cerrado por autoridades, daños por desastre natural, otro. Preguntar solo cuando `hf_functionality_status` no es `fully_functioning`. Extendido (no-core). Reportado. Políticamente sensible en contextos de conflicto.'
    slot_uri: aidops:hf_functionality_reason
    range: FacilityNonFunctionalityReason
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Reason(s) the facility is only partially functioning or is not functioning at all. Multi-select: damaged building, lack of staff, lack of medicines, lack of equipment, lack of electricity, lack of water, security/access, occupied by armed actors, closed by authorities, natural-disaster damage, other. Ask only when `hf_functionality_status` is not `fully_functioning`. Extended (non-core). Reported. Politically sensitive in conflict contexts.", "es": "Raz\u00f3n(es) por las que el establecimiento solo funciona parcialmente o no funciona en absoluto. Selecci\u00f3n m\u00faltiple: edificio da\u00f1ado, falta de personal, falta de medicamentos, falta de equipamiento, falta de electricidad, falta de agua, seguridad/acceso, ocupado por actores armados, cerrado por autoridades, da\u00f1os por desastre natural, otro. Preguntar solo cuando `hf_functionality_status` no es `fully_functioning`. Extendido (no-core). Reportado. Pol\u00edticamente sensible en contextos de conflicto.", "fr": "Raison(s) pour lesquelles l''\u00e9tablissement n''est que partiellement fonctionnel ou n''est pas du tout fonctionnel. S\u00e9lection multiple : b\u00e2timent endommag\u00e9, manque de personnel, manque de m\u00e9dicaments, manque d''\u00e9quipement, manque d''\u00e9lectricit\u00e9, manque d''eau, s\u00e9curit\u00e9/acc\u00e8s, occup\u00e9 par des acteurs arm\u00e9s, ferm\u00e9 par les autorit\u00e9s, dommages dus \u00e0 une catastrophe naturelle, autre. Ne poser que lorsque `hf_functionality_status` n''est pas `fully_functioning`. \u00c9tendu (non-core). Rapport\u00e9. Politiquement sensible en contextes de conflit."}, "id": "hf_functionality_reason", "label": {"en": "Facility non-functionality reason(s)", "es": "Motivo(s) de no funcionalidad del establecimiento", "fr": "Motif(s) de non-fonctionnalit\u00e9 de l''\u00e9tablissement"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "facility-non-functionality-reason"}'
  hf_functionality_status:
    title:
      en: Facility functionality status (HeRAMS)
      fr: Statut de fonctionnalité de l'établissement (HeRAMS)
      es: Estado de funcionalidad del establecimiento (HeRAMS)
    description:
      en: 'The HeRAMS functionality summary for the facility at the observation date: fully functioning (normal capacity), partially functioning (reduced range or capacity), not functioning (closed), destroyed, or inaccessible. Reported by the facility in-charge and verified by the enumerator through direct observation where possible. Signature variable of HeRAMS: the single most important summary of a facility''s status in an active crisis.'
      fr: 'Le résumé de fonctionnalité HeRAMS pour l''établissement à la date d''observation : pleinement fonctionnel (capacité normale), partiellement fonctionnel (gamme ou capacité réduite), non fonctionnel (fermé), détruit ou inaccessible. Rapporté par le responsable de l''établissement et vérifié par l''enquêteur par observation directe lorsque possible. Variable signature de HeRAMS : le résumé le plus important du statut d''un établissement en crise active.'
      es: 'El resumen de funcionalidad HeRAMS para el establecimiento en la fecha de observación: plenamente funcional (capacidad normal), parcialmente funcional (gama o capacidad reducida), no funcional (cerrado), destruido o inaccesible. Reportado por el responsable del establecimiento y verificado por el enumerador mediante observación directa cuando sea posible. Variable distintiva de HeRAMS: el resumen más importante del estado de un establecimiento en crisis activa.'
    slot_uri: aidops:hf_functionality_status
    range: FacilityFunctionalityStatus
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": true, "definition": {"en": "The HeRAMS functionality summary for the facility at the observation date: fully functioning (normal capacity), partially functioning (reduced range or capacity), not functioning (closed), destroyed, or inaccessible. Reported by the facility in-charge and verified by the enumerator through direct observation where possible. Signature variable of HeRAMS: the single most important summary of a facility''s status in an active crisis.", "es": "El resumen de funcionalidad HeRAMS para el establecimiento en la fecha de observaci\u00f3n: plenamente funcional (capacidad normal), parcialmente funcional (gama o capacidad reducida), no funcional (cerrado), destruido o inaccesible. Reportado por el responsable del establecimiento y verificado por el enumerador mediante observaci\u00f3n directa cuando sea posible. Variable distintiva de HeRAMS: el resumen m\u00e1s importante del estado de un establecimiento en crisis activa.", "fr": "Le r\u00e9sum\u00e9 de fonctionnalit\u00e9 HeRAMS pour l''\u00e9tablissement \u00e0 la date d''observation : pleinement fonctionnel (capacit\u00e9 normale), partiellement fonctionnel (gamme ou capacit\u00e9 r\u00e9duite), non fonctionnel (ferm\u00e9), d\u00e9truit ou inaccessible. Rapport\u00e9 par le responsable de l''\u00e9tablissement et v\u00e9rifi\u00e9 par l''enqu\u00eateur par observation directe lorsque possible. Variable signature de HeRAMS : le r\u00e9sum\u00e9 le plus important du statut d''un \u00e9tablissement en crise active."}, "id": "hf_functionality_status", "label": {"en": "Facility functionality status (HeRAMS)", "es": "Estado de funcionalidad del establecimiento (HeRAMS)", "fr": "Statut de fonctionnalit\u00e9 de l''\u00e9tablissement (HeRAMS)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "facility-functionality-status"}'
  hf_handwashing_at_consultation:
    title:
      en: Functioning handwashing station at point of care
      fr: Station de lavage des mains fonctionnelle au point de soins
      es: Estación de lavado de manos funcional en el punto de atención
    description:
      en: Whether a functioning handwashing station (water plus soap) is available at the point of care (consultation room). Observed by the enumerator. WASH FIT core indicator; WHO IPC core component. Extended (non-core) in this profile.
      fr: Si une station de lavage des mains fonctionnelle (eau plus savon) est disponible au point de soins (salle de consultation). Observé par l'enquêteur. Indicateur central WASH FIT ; composante centrale PCI de l'OMS. Étendu (non-core) dans ce profil.
      es: Si hay una estación de lavado de manos funcional (agua más jabón) disponible en el punto de atención (sala de consulta). Observado por el enumerador. Indicador central WASH FIT; componente central de PCI de la OMS. Extendido (no-core) en este perfil.
