  mk_gender_access_barriers:
    title:
      en: Women's access barriers at market
      fr: Barrières d'accès des femmes au marché
      es: Barreras de acceso de mujeres al mercado
    description:
      en: 'Whether women''s access to this market as buyers or sellers is currently reported as restricted due to security conditions, social norms, or physical barriers, as reported by key vendor informants (at least one female vendor informant should be consulted where present). This is a market-level observation, not an individual-level measure. A yes response signals that programming design should include gender-disaggregated market-access analysis. Boolean: yes / no / dont_know.'
      fr: Si l'accès des femmes à ce marché en tant qu'acheteuses ou vendeuses est actuellement signalé comme restreint en raison de conditions sécuritaires, de normes sociales ou de barrières physiques, tel que rapporté par les informateurs clés vendeurs (au moins un(e) informateur(trice) vendeur(se) de sexe féminin devrait être consulté(e) si présent(e)). Il s'agit d'une observation au niveau du marché, pas d'une mesure au niveau individuel.
      es: Si el acceso de las mujeres a este mercado como compradoras o vendedoras está actualmente reportado como restringido debido a condiciones de seguridad, normas sociales o barreras físicas, según lo reportado por informantes clave vendedores (al menos un informante vendedor femenino debe ser consultado cuando esté presente). Esta es una observación a nivel de mercado, no una medida a nivel individual.
    slot_uri: aidops:mk_gender_access_barriers
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "reach-jmmi", "wfp-mag-2021"], "cardinality": "single", "category": "market_accessibility", "core": false, "definition": {"en": "Whether women''s access to this market as buyers or sellers is currently reported as restricted due to security conditions, social norms, or physical barriers, as reported by key vendor informants (at least one female vendor informant should be consulted where present). This is a market-level observation, not an individual-level measure. A yes response signals that programming design should include gender-disaggregated market-access analysis. Boolean: yes / no / dont_know.", "es": "Si el acceso de las mujeres a este mercado como compradoras o vendedoras est\u00e1 actualmente reportado como restringido debido a condiciones de seguridad, normas sociales o barreras f\u00edsicas, seg\u00fan lo reportado por informantes clave vendedores (al menos un informante vendedor femenino debe ser consultado cuando est\u00e9 presente). Esta es una observaci\u00f3n a nivel de mercado, no una medida a nivel individual.", "fr": "Si l''acc\u00e8s des femmes \u00e0 ce march\u00e9 en tant qu''acheteuses ou vendeuses est actuellement signal\u00e9 comme restreint en raison de conditions s\u00e9curitaires, de normes sociales ou de barri\u00e8res physiques, tel que rapport\u00e9 par les informateurs cl\u00e9s vendeurs (au moins un(e) informateur(trice) vendeur(se) de sexe f\u00e9minin devrait \u00eatre consult\u00e9(e) si pr\u00e9sent(e)). Il s''agit d''une observation au niveau du march\u00e9, pas d''une mesure au niveau individuel."}, "id": "mk_gender_access_barriers", "label": {"en": "Women''s access barriers at market", "es": "Barreras de acceso de mujeres al mercado", "fr": "Barri\u00e8res d''acc\u00e8s des femmes au march\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
