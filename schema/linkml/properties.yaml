  iycf_mmf:
    title:
      en: Minimum Meal Frequency (MMF) achieved
      fr: Fréquence minimale des repas (MMF) atteinte
      es: Frecuencia Mínima de Comidas (MMF) alcanzada
    description:
      en: 'Derived boolean: whether the child achieved Minimum Meal Frequency (MMF) in the previous 24 hours. Applies to children 6–23 months. Thresholds are age- and breastfeeding-status-specific per WHO/UNICEF 2021: breastfed 6–8 months: iycf_solid_meal_count >= 2; breastfed 9–23 months: iycf_solid_meal_count >= 3; non-breastfed 6–23 months: (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 AND iycf_solid_meal_count >= 1.'
      fr: 'Booléen dérivé : indique si l''enfant a atteint la fréquence minimale des repas (MMF) au cours des 24 heures précédentes. S''applique aux enfants de 6 à 23 mois. Les seuils sont spécifiques à l''âge et au statut d''allaitement selon l''OMS/UNICEF 2021 : allaités 6–8 mois : iycf_solid_meal_count >= 2 ; allaités 9–23 mois : iycf_solid_meal_count >= 3 ; non allaités 6–23 mois : (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 ET iycf_solid_meal_count >= 1.'
      es: 'Booleano derivado: indica si el niño alcanzó la Frecuencia Mínima de Comidas (MMF) en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Los umbrales son específicos por edad y estado de lactancia materna según OMS/UNICEF 2021: amamantados 6–8 meses: iycf_solid_meal_count >= 2; amamantados 9–23 meses: iycf_solid_meal_count >= 3; no amamantados 6–23 meses: (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 Y iycf_solid_meal_count >= 1.'
    slot_uri: aidops:iycf_mmf
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived boolean: whether the child achieved Minimum Meal Frequency (MMF) in the previous 24 hours. Applies to children 6\u201323 months. Thresholds are age- and breastfeeding-status-specific per WHO/UNICEF 2021: breastfed 6\u20138 months: iycf_solid_meal_count >= 2; breastfed 9\u201323 months: iycf_solid_meal_count >= 3; non-breastfed 6\u201323 months: (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 AND iycf_solid_meal_count >= 1.", "es": "Booleano derivado: indica si el ni\u00f1o alcanz\u00f3 la Frecuencia M\u00ednima de Comidas (MMF) en las 24 horas anteriores. Se aplica a ni\u00f1os de 6\u201323 meses. Los umbrales son espec\u00edficos por edad y estado de lactancia materna seg\u00fan OMS/UNICEF 2021: amamantados 6\u20138 meses: iycf_solid_meal_count >= 2; amamantados 9\u201323 meses: iycf_solid_meal_count >= 3; no amamantados 6\u201323 meses: (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 Y iycf_solid_meal_count >= 1.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 : indique si l''enfant a atteint la fr\u00e9quence minimale des repas (MMF) au cours des 24 heures pr\u00e9c\u00e9dentes. S''applique aux enfants de 6 \u00e0 23 mois. Les seuils sont sp\u00e9cifiques \u00e0 l''\u00e2ge et au statut d''allaitement selon l''OMS/UNICEF 2021 : allait\u00e9s 6\u20138 mois : iycf_solid_meal_count >= 2 ; allait\u00e9s 9\u201323 mois : iycf_solid_meal_count >= 3 ; non allait\u00e9s 6\u201323 mois : (iycf_solid_meal_count + iycf_milk_feed_count) >= 4 ET iycf_solid_meal_count >= 1."}, "id": "iycf_mmf", "label": {"en": "Minimum Meal Frequency (MMF) achieved", "es": "Frecuencia M\u00ednima de Comidas (MMF) alcanzada", "fr": "Fr\u00e9quence minimale des repas (MMF) atteinte"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
