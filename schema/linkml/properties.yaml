  iycf_milk_feed_count:
    title:
      en: Number of milk feeds yesterday (non-breastfed)
      fr: Nombre de repas lactés hier (enfants non allaités)
      es: Número de tomas de leche ayer (no amamantados)
    description:
      en: 'The number of times the child received infant formula, animal milk, or other milk drinks (not breast milk) yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''How many times yesterday did (NAME) receive infant formula, animal milk, or other milk drinks (not breast milk)?'' Ask for non-breastfed children 6–23 months. Used to compute the Minimum Milk Feeding Frequency (MMFF) indicator (threshold: at least 2 milk feeds).'
      fr: 'Le nombre de fois que l''enfant a reçu du lait maternisé, du lait animal ou d''autres boissons lactées (hors lait maternel) hier dans la journée ou la nuit (rappel sur 24 heures). À poser pour les enfants non allaités de 6 à 23 mois. Utilisé pour calculer l''indicateur MMFF (seuil : au moins 2 repas lactés).'
      es: 'El número de veces que el niño recibió fórmula infantil, leche animal u otras bebidas lácteas (no leche materna) ayer durante el día o la noche (recordatorio de 24 horas). Preguntar para niños no amamantados de 6–23 meses. Utilizado para calcular el indicador MMFF (umbral: al menos 2 tomas de leche).'
    slot_uri: aidops:iycf_milk_feed_count
    range: integer
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "The number of times the child received infant formula, animal milk, or other milk drinks (not breast milk) yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''How many times yesterday did (NAME) receive infant formula, animal milk, or other milk drinks (not breast milk)?'' Ask for non-breastfed children 6\u201323 months. Used to compute the Minimum Milk Feeding Frequency (MMFF) indicator (threshold: at least 2 milk feeds).", "es": "El n\u00famero de veces que el ni\u00f1o recibi\u00f3 f\u00f3rmula infantil, leche animal u otras bebidas l\u00e1cteas (no leche materna) ayer durante el d\u00eda o la noche (recordatorio de 24 horas). Preguntar para ni\u00f1os no amamantados de 6\u201323 meses. Utilizado para calcular el indicador MMFF (umbral: al menos 2 tomas de leche).", "fr": "Le nombre de fois que l''enfant a re\u00e7u du lait maternis\u00e9, du lait animal ou d''autres boissons lact\u00e9es (hors lait maternel) hier dans la journ\u00e9e ou la nuit (rappel sur 24 heures). \u00c0 poser pour les enfants non allait\u00e9s de 6 \u00e0 23 mois. Utilis\u00e9 pour calculer l''indicateur MMFF (seuil : au moins 2 repas lact\u00e9s)."}, "id": "iycf_milk_feed_count", "label": {"en": "Number of milk feeds yesterday (non-breastfed)", "es": "N\u00famero de tomas de leche ayer (no amamantados)", "fr": "Nombre de repas lact\u00e9s hier (enfants non allait\u00e9s)"}, "maturity": "draft", "references": null, "type": "integer", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
