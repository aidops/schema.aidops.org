  electricity_billing_status:
    title:
      en: Electricity billing status
      fr: Statut de facturation de l'électricité
      es: Estado de facturación de electricidad
    description:
      en: 'How the household pays for electricity. MTF electricity legality/formality attribute: Tier 4-5 requires the bill to be paid to a utility, prepaid meter, or authorized agent. Informal connections or free supply fail the legality criterion for Tier 4 and above. Source: MTF household survey.'
      fr: 'Comment le ménage paie son électricité. Attribut de légalité/formalité de l''électricité MTF : les niveaux 4 à 5 exigent que la facture soit payée à un service public, un compteur prépayé ou un agent agréé. Les raccordements informels ou l''alimentation gratuite ne satisfont pas au critère de légalité pour le niveau 4 et au-delà. Source : enquête ménage MTF.'
      es: 'Cómo paga el hogar la electricidad. Atributo de legalidad/formalidad de electricidad MTF: los Niveles 4 a 5 requieren que la factura se pague a un servicio público, medidor de prepago o agente autorizado. Las conexiones informales o el suministro gratuito no cumplen el criterio de legalidad para el Nivel 4 y superiores. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_billing_status
    range: ElectricityBillingStatus
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "How the household pays for electricity. MTF electricity legality/formality attribute: Tier 4-5 requires the bill to be paid to a utility, prepaid meter, or authorized agent. Informal connections or free supply fail the legality criterion for Tier 4 and above. Source: MTF household survey.", "es": "C\u00f3mo paga el hogar la electricidad. Atributo de legalidad/formalidad de electricidad MTF: los Niveles 4 a 5 requieren que la factura se pague a un servicio p\u00fablico, medidor de prepago o agente autorizado. Las conexiones informales o el suministro gratuito no cumplen el criterio de legalidad para el Nivel 4 y superiores. Fuente: encuesta de hogares MTF.", "fr": "Comment le m\u00e9nage paie son \u00e9lectricit\u00e9. Attribut de l\u00e9galit\u00e9/formalit\u00e9 de l''\u00e9lectricit\u00e9 MTF : les niveaux 4 \u00e0 5 exigent que la facture soit pay\u00e9e \u00e0 un service public, un compteur pr\u00e9pay\u00e9 ou un agent agr\u00e9\u00e9. Les raccordements informels ou l''alimentation gratuite ne satisfont pas au crit\u00e8re de l\u00e9galit\u00e9 pour le niveau 4 et au-del\u00e0. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_billing_status", "label": {"en": "Electricity billing status", "es": "Estado de facturaci\u00f3n de electricidad", "fr": "Statut de facturation de l''\u00e9lectricit\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["se4all_mtf"], "vocabulary": "electricity-billing-status"}'
      bibliography_refs: se4all-mtf
  electricity_capacity_watts:
    title:
      en: Electricity capacity (watts)
      fr: Capacité électrique (watts)
      es: Capacidad eléctrica (vatios)
    description:
      en: 'Maximum power capacity in watts of the household''s main electricity source. For grid-connected households: the breaker or fuse rating. For solar home systems: the solar panel wattage. MTF electricity capacity attribute — tier thresholds: 3 W or more = Tier 1; 50 W or more = Tier 2; 200 W or more = Tier 3; 800 W or more = Tier 4; 2000 W (2 kW) or more = Tier 5. In practice, many households do not know their breaker rating or SHS panel wattage; electricity_appliances_supported provides a proxy alternative. Enumerators should be trained to identify capacity before this item is used. Source: MTF household survey.'
      fr: 'Capacité de puissance maximale en watts de la principale source d''électricité du ménage. Pour les ménages raccordés au réseau : la valeur nominale du disjoncteur ou du fusible. Pour les systèmes solaires domestiques : la puissance du panneau solaire. Attribut de capacité de l''électricité MTF — seuils de niveau : 3 W ou plus = niveau 1 ; 50 W ou plus = niveau 2 ; 200 W ou plus = niveau 3 ; 800 W ou plus = niveau 4 ; 2000 W (2 kW) ou plus = niveau 5. En pratique, de nombreux ménages ne connaissent pas la valeur nominale de leur disjoncteur ou la puissance de leur panneau SHS ; electricity_appliances_supported offre une alternative par procuration. Les enquêteurs doivent être formés pour identifier la capacité avant d''utiliser cet item. Source : enquête ménage MTF.'
      es: 'Capacidad de potencia máxima en vatios de la fuente principal de electricidad del hogar. Para hogares conectados a la red: la calificación del disyuntor o fusible. Para sistemas solares domésticos: la potencia del panel solar. Atributo de capacidad eléctrica MTF: umbrales de nivel: 3 W o más = Nivel 1; 50 W o más = Nivel 2; 200 W o más = Nivel 3; 800 W o más = Nivel 4; 2000 W (2 kW) o más = Nivel 5. En la práctica, muchos hogares no conocen la calificación de su disyuntor o la potencia del panel SHS; electricity_appliances_supported ofrece una alternativa proxy. Los enumeradores deben estar capacitados para identificar la capacidad antes de usar este ítem. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_capacity_watts
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Maximum power capacity in watts of the household''s main electricity source. For grid-connected households: the breaker or fuse rating. For solar home systems: the solar panel wattage. MTF electricity capacity attribute \u2014 tier thresholds: 3 W or more = Tier 1; 50 W or more = Tier 2; 200 W or more = Tier 3; 800 W or more = Tier 4; 2000 W (2 kW) or more = Tier 5. In practice, many households do not know their breaker rating or SHS panel wattage; electricity_appliances_supported provides a proxy alternative. Enumerators should be trained to identify capacity before this item is used. Source: MTF household survey.", "es": "Capacidad de potencia m\u00e1xima en vatios de la fuente principal de electricidad del hogar. Para hogares conectados a la red: la calificaci\u00f3n del disyuntor o fusible. Para sistemas solares dom\u00e9sticos: la potencia del panel solar. Atributo de capacidad el\u00e9ctrica MTF: umbrales de nivel: 3 W o m\u00e1s = Nivel 1; 50 W o m\u00e1s = Nivel 2; 200 W o m\u00e1s = Nivel 3; 800 W o m\u00e1s = Nivel 4; 2000 W (2 kW) o m\u00e1s = Nivel 5. En la pr\u00e1ctica, muchos hogares no conocen la calificaci\u00f3n de su disyuntor o la potencia del panel SHS; electricity_appliances_supported ofrece una alternativa proxy. Los enumeradores deben estar capacitados para identificar la capacidad antes de usar este \u00edtem. Fuente: encuesta de hogares MTF.", "fr": "Capacit\u00e9 de puissance maximale en watts de la principale source d''\u00e9lectricit\u00e9 du m\u00e9nage. Pour les m\u00e9nages raccord\u00e9s au r\u00e9seau : la valeur nominale du disjoncteur ou du fusible. Pour les syst\u00e8mes solaires domestiques : la puissance du panneau solaire. Attribut de capacit\u00e9 de l''\u00e9lectricit\u00e9 MTF \u2014 seuils de niveau : 3 W ou plus = niveau 1 ; 50 W ou plus = niveau 2 ; 200 W ou plus = niveau 3 ; 800 W ou plus = niveau 4 ; 2000 W (2 kW) ou plus = niveau 5. En pratique, de nombreux m\u00e9nages ne connaissent pas la valeur nominale de leur disjoncteur ou la puissance de leur panneau SHS ; electricity_appliances_supported offre une alternative par procuration. Les enqu\u00eateurs doivent \u00eatre form\u00e9s pour identifier la capacit\u00e9 avant d''utiliser cet item. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_capacity_watts", "label": {"en": "Electricity capacity (watts)", "es": "Capacidad el\u00e9ctrica (vatios)", "fr": "Capacit\u00e9 \u00e9lectrique (watts)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
