  aap_no_one_asked_for_payment:
    title:
      en: 'AAP: No one asked for payment or favours for aid'
      fr: 'Redevabilité : Personne n''a demandé de paiement ou de faveurs contre de l''aide'
      es: 'Rendición de cuentas: Nadie pidió pago o favores a cambio de ayuda'
    description:
      en: 'Whether anyone has asked the respondent, their household, or anyone they know to pay money, do unpaid work, give goods, or do personal favours in exchange for receiving aid or being registered. Standard proxy PSEA/integrity indicator covering both petty corruption and SEA without naming individuals. A `yes` response indicates a potential integrity breach and should trigger the spontaneous-disclosure protocol (thank, do not probe, provide referral card, flag `x_spontaneous_disclosure = true` in form metadata; do not record perpetrator details in this profile). Classified `sensitive`. Source: IASC CAAP 2017 PSEA; CHS Alliance PSEA indicator bank. Maps to CHS 2024 Commitments 8 and 9 (''resources are managed ethically and responsibly'').'
      fr: 'Si quelqu''un a demandé au répondant, à son ménage ou à toute personne qu''il connaît de payer de l''argent, de faire un travail non rémunéré, de donner des biens ou de rendre des faveurs personnelles en échange de recevoir l''aide ou d''être inscrit. Indicateur indirect standard de PSEA/intégrité couvrant à la fois la petite corruption et l''EAS sans nommer d''individus. Une réponse « oui » indique une possible atteinte à l''intégrité et doit déclencher le protocole de divulgation spontanée (remercier, ne pas sonder, fournir la carte de référence, marquer `x_spontaneous_disclosure = true` dans les métadonnées du formulaire ; ne pas enregistrer les détails sur l''auteur dans ce profil). Classé `sensitive`. Source : PSEA CAAP IASC 2017 ; banque d''indicateurs PSEA de CHS Alliance. Correspond aux Engagements 8 et 9 de la CHS 2024 (« les ressources sont gérées de manière éthique et responsable »).'
      es: 'Si alguien ha pedido al encuestado, su hogar o alguna persona que conoce pagar dinero, realizar trabajo no remunerado, entregar bienes o hacer favores personales a cambio de recibir ayuda o estar registrado. Indicador indirecto estándar de PSEA/integridad que cubre tanto la corrupción menor como la EAS sin nombrar a individuos. Una respuesta «sí» indica una posible violación de la integridad y debe desencadenar el protocolo de divulgación espontánea (agradecer, no sondear, proporcionar la tarjeta de referencia, marcar `x_spontaneous_disclosure = true` en los metadatos del formulario; no registrar detalles del perpetrador en este perfil). Clasificado como `sensitive`. Fuente: PSEA CAAP IASC 2017; banco de indicadores PSEA de CHS Alliance. Corresponde a los Compromisos 8 y 9 de la CHS 2024 («los recursos se gestionan de manera ética y responsable»).'
    slot_uri: aidops:aap_no_one_asked_for_payment
    range: AapYesnoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "chs-alliance-verification", "iasc-caap-2017"], "cardinality": "single", "category": "aap_targeting", "core": false, "definition": {"en": "Whether anyone has asked the respondent, their household, or anyone they know to pay money, do unpaid work, give goods, or do personal favours in exchange for receiving aid or being registered. Standard proxy PSEA/integrity indicator covering both petty corruption and SEA without naming individuals. A `yes` response indicates a potential integrity breach and should trigger the spontaneous-disclosure protocol (thank, do not probe, provide referral card, flag `x_spontaneous_disclosure = true` in form metadata; do not record perpetrator details in this profile). Classified `sensitive`. Source: IASC CAAP 2017 PSEA; CHS Alliance PSEA indicator bank. Maps to CHS 2024 Commitments 8 and 9 (''resources are managed ethically and responsibly'').", "es": "Si alguien ha pedido al encuestado, su hogar o alguna persona que conoce pagar dinero, realizar trabajo no remunerado, entregar bienes o hacer favores personales a cambio de recibir ayuda o estar registrado. Indicador indirecto est\u00e1ndar de PSEA/integridad que cubre tanto la corrupci\u00f3n menor como la EAS sin nombrar a individuos. Una respuesta \u00abs\u00ed\u00bb indica una posible violaci\u00f3n de la integridad y debe desencadenar el protocolo de divulgaci\u00f3n espont\u00e1nea (agradecer, no sondear, proporcionar la tarjeta de referencia, marcar `x_spontaneous_disclosure = true` en los metadatos del formulario; no registrar detalles del perpetrador en este perfil). Clasificado como `sensitive`. Fuente: PSEA CAAP IASC 2017; banco de indicadores PSEA de CHS Alliance. Corresponde a los Compromisos 8 y 9 de la CHS 2024 (\u00ablos recursos se gestionan de manera \u00e9tica y responsable\u00bb).", "fr": "Si quelqu''un a demand\u00e9 au r\u00e9pondant, \u00e0 son m\u00e9nage ou \u00e0 toute personne qu''il conna\u00eet de payer de l''argent, de faire un travail non r\u00e9mun\u00e9r\u00e9, de donner des biens ou de rendre des faveurs personnelles en \u00e9change de recevoir l''aide ou d''\u00eatre inscrit. Indicateur indirect standard de PSEA/int\u00e9grit\u00e9 couvrant \u00e0 la fois la petite corruption et l''EAS sans nommer d''individus. Une r\u00e9ponse \u00ab oui \u00bb indique une possible atteinte \u00e0 l''int\u00e9grit\u00e9 et doit d\u00e9clencher le protocole de divulgation spontan\u00e9e (remercier, ne pas sonder, fournir la carte de r\u00e9f\u00e9rence, marquer `x_spontaneous_disclosure = true` dans les m\u00e9tadonn\u00e9es du formulaire ; ne pas enregistrer les d\u00e9tails sur l''auteur dans ce profil). Class\u00e9 `sensitive`. Source : PSEA CAAP IASC 2017 ; banque d''indicateurs PSEA de CHS Alliance. Correspond aux Engagements 8 et 9 de la CHS 2024 (\u00ab les ressources sont g\u00e9r\u00e9es de mani\u00e8re \u00e9thique et responsable \u00bb)."}, "id": "aap_no_one_asked_for_payment", "label": {"en": "AAP: No one asked for payment or favours for aid", "es": "Rendici\u00f3n de cuentas: Nadie pidi\u00f3 pago o favores a cambio de ayuda", "fr": "Redevabilit\u00e9 : Personne n''a demand\u00e9 de paiement ou de faveurs contre de l''aide"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "aap-yesno-dk"}'
      bibliography_refs: chs-2024,chs-alliance-verification,iasc-caap-2017
  aap_opinion_taken_into_account:
    title:
      en: 'AAP: Opinion taken into account by aid providers'
      fr: 'Redevabilité : Opinion prise en compte par les intervenants'
      es: 'Rendición de cuentas: Opinión tenida en cuenta por los actores humanitarios'
    description:
