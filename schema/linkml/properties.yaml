  cn_priority_need_1:
    title:
      en: Priority need (rank 1)
      fr: Besoin prioritaire (rang 1)
      es: Necesidad prioritaria (rango 1)
    description:
      en: 'The single most urgent humanitarian need at community level, as identified by the community itself through focus group discussion, key informant interview, or community meeting. Encoded as one code from the priority-need-category vocabulary (a humanitarian-sector taxonomy). The canonical MIRA ''top three priority needs'' question: if the community cannot or does not produce a clean consensus rank, assessors may populate the three cn_priority_need_* fields in any order. Derived from the MIRA Community Level Assessment form, the JIAF sector taxonomy, and the IOM DTM Site Assessment priority-needs module.'
      fr: 'Le besoin humanitaire le plus urgent au niveau de la communauté, tel qu''identifié par la communauté elle-même par le biais de discussions de groupe focalisées, d''entretiens avec des informateurs clés ou de réunions communautaires. Codé sur un code de la taxonomie priority-need-category (taxonomie sectorielle humanitaire). Question canonique « trois besoins prioritaires principaux » de MIRA : si la communauté ne peut ou ne souhaite produire un classement consensuel clair, les enquêteurs peuvent renseigner les trois champs cn_priority_need_* dans n''importe quel ordre. Tiré du formulaire d''évaluation communautaire MIRA, de la taxonomie sectorielle du JIAF et du module « besoins prioritaires » de l''évaluation de site DTM de l''OIM.'
      es: 'La necesidad humanitaria más urgente a nivel comunitario, identificada por la propia comunidad mediante grupos focales, entrevistas a informantes clave o reuniones comunitarias. Codificada con un código de la taxonomía priority-need-category (taxonomía sectorial humanitaria). Pregunta canónica de «tres principales necesidades prioritarias» de MIRA: si la comunidad no puede o no desea producir un ranking de consenso claro, los encuestadores pueden completar los tres campos cn_priority_need_* en cualquier orden. Derivado del formulario de Evaluación a Nivel Comunitario MIRA, de la taxonomía sectorial del JIAF y del módulo de «necesidades prioritarias» del Site Assessment de la DTM de la OIM.'
    slot_uri: aidops:cn_priority_need_1
    range: PriorityNeedCategory
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-vca-2020", "reach-hsm-2023"], "cardinality": "single", "category": "specific_needs", "core": true, "definition": {"en": "The single most urgent humanitarian need at community level, as identified by the community itself through focus group discussion, key informant interview, or community meeting. Encoded as one code from the priority-need-category vocabulary (a humanitarian-sector taxonomy). The canonical MIRA ''top three priority needs'' question: if the community cannot or does not produce a clean consensus rank, assessors may populate the three cn_priority_need_* fields in any order. Derived from the MIRA Community Level Assessment form, the JIAF sector taxonomy, and the IOM DTM Site Assessment priority-needs module.", "es": "La necesidad humanitaria m\u00e1s urgente a nivel comunitario, identificada por la propia comunidad mediante grupos focales, entrevistas a informantes clave o reuniones comunitarias. Codificada con un c\u00f3digo de la taxonom\u00eda priority-need-category (taxonom\u00eda sectorial humanitaria). Pregunta can\u00f3nica de \u00abtres principales necesidades prioritarias\u00bb de MIRA: si la comunidad no puede o no desea producir un ranking de consenso claro, los encuestadores pueden completar los tres campos cn_priority_need_* en cualquier orden. Derivado del formulario de Evaluaci\u00f3n a Nivel Comunitario MIRA, de la taxonom\u00eda sectorial del JIAF y del m\u00f3dulo de \u00abnecesidades prioritarias\u00bb del Site Assessment de la DTM de la OIM.", "fr": "Le besoin humanitaire le plus urgent au niveau de la communaut\u00e9, tel qu''identifi\u00e9 par la communaut\u00e9 elle-m\u00eame par le biais de discussions de groupe focalis\u00e9es, d''entretiens avec des informateurs cl\u00e9s ou de r\u00e9unions communautaires. Cod\u00e9 sur un code de la taxonomie priority-need-category (taxonomie sectorielle humanitaire). Question canonique \u00ab trois besoins prioritaires principaux \u00bb de MIRA : si la communaut\u00e9 ne peut ou ne souhaite produire un classement consensuel clair, les enqu\u00eateurs peuvent renseigner les trois champs cn_priority_need_* dans n''importe quel ordre. Tir\u00e9 du formulaire d''\u00e9valuation communautaire MIRA, de la taxonomie sectorielle du JIAF et du module \u00ab besoins prioritaires \u00bb de l''\u00e9valuation de site DTM de l''OIM."}, "id": "cn_priority_need_1", "label": {"en": "Priority need (rank 1)", "es": "Necesidad prioritaria (rango 1)", "fr": "Besoin prioritaire (rang 1)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "priority-need-category"}'
      bibliography_refs: ifrc-vca-2020,reach-hsm-2023
