  climate_information_used_for_decisions:
    title:
      en: Decisions for which climate information was used in the past 12 months
      fr: Décisions pour lesquelles des informations climatiques ont été utilisées au cours des 12 derniers mois
      es: Decisiones para las que se usó información climática en los últimos 12 meses
    description:
      en: 'Multi-select item asking which decisions the household has used weather or climate information to make in the past 12 months. Applies when climate_info_services_access = ''yes''. Captures the translation from access to action: a household that accesses but does not use climate information represents a different programmatic gap than one that lacks access entirely. Aligns with the UNFCCC NAP M&E use-of-information indicator and the LoCAL PBCRG performance standard on the information-to-action pathway.'
      fr: 'Item à sélection multiple demandant pour quelles décisions le ménage a utilisé des informations météorologiques ou climatiques au cours des 12 derniers mois. S''applique lorsque climate_info_services_access = ''yes''. Capture la traduction de l''accès en action : un ménage qui accède aux informations climatiques sans les utiliser représente une lacune programmatique différente de celui qui n''y a pas accès.'
      es: 'Ítem de selección múltiple que pregunta para qué decisiones el hogar ha usado información meteorológica o climática en los últimos 12 meses. Aplica cuando climate_info_services_access = ''yes''. Captura la traducción de acceso a acción: un hogar que accede pero no usa información climática representa una brecha programática diferente de uno que carece de acceso.'
    slot_uri: aidops:climate_information_used_for_decisions
    range: ClimateInfoUsePattern
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ipcc-ar6-wg2-2022", "local-uncdf-2020", "unfccc-nap-me-2022", "world-bank-csa-profiles-2019"], "cardinality": "multiple", "category": "climate", "core": false, "definition": {"en": "Multi-select item asking which decisions the household has used weather or climate information to make in the past 12 months. Applies when climate_info_services_access = ''yes''. Captures the translation from access to action: a household that accesses but does not use climate information represents a different programmatic gap than one that lacks access entirely. Aligns with the UNFCCC NAP M&E use-of-information indicator and the LoCAL PBCRG performance standard on the information-to-action pathway.\n", "es": "\u00cdtem de selecci\u00f3n m\u00faltiple que pregunta para qu\u00e9 decisiones el hogar ha usado informaci\u00f3n meteorol\u00f3gica o clim\u00e1tica en los \u00faltimos 12 meses. Aplica cuando climate_info_services_access = ''yes''. Captura la traducci\u00f3n de acceso a acci\u00f3n: un hogar que accede pero no usa informaci\u00f3n clim\u00e1tica representa una brecha program\u00e1tica diferente de uno que carece de acceso.\n", "fr": "Item \u00e0 s\u00e9lection multiple demandant pour quelles d\u00e9cisions le m\u00e9nage a utilis\u00e9 des informations m\u00e9t\u00e9orologiques ou climatiques au cours des 12 derniers mois. S''applique lorsque climate_info_services_access = ''yes''. Capture la traduction de l''acc\u00e8s en action : un m\u00e9nage qui acc\u00e8de aux informations climatiques sans les utiliser repr\u00e9sente une lacune programmatique diff\u00e9rente de celui qui n''y a pas acc\u00e8s.\n"}, "id": "climate_information_used_for_decisions", "label": {"en": "Decisions for which climate information was used in the past 12 months", "es": "Decisiones para las que se us\u00f3 informaci\u00f3n clim\u00e1tica en los \u00faltimos 12 meses", "fr": "D\u00e9cisions pour lesquelles des informations climatiques ont \u00e9t\u00e9 utilis\u00e9es au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-info-use-pattern"}'
