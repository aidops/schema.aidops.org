  site_feels_safe_daytime:
    title:
      en: 'Site feels safe for women and girls: daytime'
      fr: 'Le site semble sûr pour les femmes et les filles : de jour'
      es: 'El sitio se percibe seguro para mujeres y niñas: de día'
    description:
      en: Household-reported perception of whether the site or area feels safe for women and girls to move around freely during the day. Framing focuses on the specific context of daytime movement rather than general safety, following GBV AoR (2021) guidance to avoid asking 'do you feel safe' as a primary frame. GBV AoR (2021) identifies safety perception as a standard GBV risk indicator for MSNA household surveys. Daytime and nighttime safety are scored separately to allow triangulation with lighting infrastructure items.
      fr: Perception déclarée par le ménage si le site ou la zone semble sûr pour que les femmes et les filles se déplacent librement de jour. La formulation se concentre sur le contexte spécifique des déplacements diurnes plutôt que sur la sécurité générale, suivant les orientations du GBV AoR (2021) pour éviter de demander 'vous sentez-vous en sécurité' comme question principale. Le GBV AoR (2021) identifie la perception de sécurité comme indicateur standard du risque VBG pour les enquêtes ménages des MSNA.
      es: Percepción reportada por el hogar sobre si el sitio o zona se percibe como seguro para que mujeres y niñas se muevan libremente durante el día. La formulación se centra en el contexto específico del movimiento diurno en lugar de la seguridad general, siguiendo la orientación del GBV AoR (2021) para evitar preguntar 'se siente segura' como marco principal. El GBV AoR (2021) identifica la percepción de seguridad como indicador estándar de riesgo VBG para encuestas de hogares MSNA.
    slot_uri: aidops:site_feels_safe_daytime
    range: SafetyPerception3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013"], "cardinality": "single", "category": "gbv_safety_perception", "core": false, "definition": {"en": "Household-reported perception of whether the site or area feels safe for women and girls to move around freely during the day. Framing focuses on the specific context of daytime movement rather than general safety, following GBV AoR (2021) guidance to avoid asking ''do you feel safe'' as a primary frame. GBV AoR (2021) identifies safety perception as a standard GBV risk indicator for MSNA household surveys. Daytime and nighttime safety are scored separately to allow triangulation with lighting infrastructure items.", "es": "Percepci\u00f3n reportada por el hogar sobre si el sitio o zona se percibe como seguro para que mujeres y ni\u00f1as se muevan libremente durante el d\u00eda. La formulaci\u00f3n se centra en el contexto espec\u00edfico del movimiento diurno en lugar de la seguridad general, siguiendo la orientaci\u00f3n del GBV AoR (2021) para evitar preguntar ''se siente segura'' como marco principal. El GBV AoR (2021) identifica la percepci\u00f3n de seguridad como indicador est\u00e1ndar de riesgo VBG para encuestas de hogares MSNA.", "fr": "Perception d\u00e9clar\u00e9e par le m\u00e9nage si le site ou la zone semble s\u00fbr pour que les femmes et les filles se d\u00e9placent librement de jour. La formulation se concentre sur le contexte sp\u00e9cifique des d\u00e9placements diurnes plut\u00f4t que sur la s\u00e9curit\u00e9 g\u00e9n\u00e9rale, suivant les orientations du GBV AoR (2021) pour \u00e9viter de demander ''vous sentez-vous en s\u00e9curit\u00e9'' comme question principale. Le GBV AoR (2021) identifie la perception de s\u00e9curit\u00e9 comme indicateur standard du risque VBG pour les enqu\u00eates m\u00e9nages des MSNA."}, "id": "site_feels_safe_daytime", "label": {"en": "Site feels safe for women and girls: daytime", "es": "El sitio se percibe seguro para mujeres y ni\u00f1as: de d\u00eda", "fr": "Le site semble s\u00fbr pour les femmes et les filles : de jour"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "safety-perception-3"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,irc-safety-audit-2013
  site_feels_safe_nighttime:
    title:
      en: 'Site feels safe for women and girls: nighttime'
      fr: 'Le site semble sûr pour les femmes et les filles : de nuit'
      es: 'El sitio se percibe seguro para mujeres y niñas: de noche'
    description:
      en: Household-reported perception of whether the site or area feels safe for women and girls to move around freely at night. Nighttime safety is consistently identified as a distinct and higher-risk condition than daytime in displacement settings (IRC Safety Audit Tool 2013; Oxfam/WEDC lighting review 2018; IASC GBV Guidelines 2015). Separating day and night safety allows triangulation with lighting infrastructure items (latrine_lighting_path, latrine_distance_from_shelter_adequate).
      fr: Perception déclarée par le ménage si le site ou la zone semble sûr pour que les femmes et les filles se déplacent librement la nuit. La sécurité nocturne est systématiquement identifiée comme une condition distincte et plus risquée que la journée dans les contextes de déplacement. La séparation des perceptions de sécurité diurne et nocturne permet la triangulation avec les indicateurs d'infrastructure d'éclairage (latrine_lighting_path, latrine_distance_from_shelter_adequate).
      es: Percepción reportada por el hogar sobre si el sitio o zona se percibe como seguro para que mujeres y niñas se muevan libremente por la noche. La seguridad nocturna se identifica consistentemente como una condición distinta y de mayor riesgo que la diurna en contextos de desplazamiento. Separar la seguridad diurna y nocturna permite la triangulación con ítems de infraestructura de alumbrado (latrine_lighting_path, latrine_distance_from_shelter_adequate).
    slot_uri: aidops:site_feels_safe_nighttime
    range: SafetyPerception3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "oxfam-lighting-wash-gbv-2018"], "cardinality": "single", "category": "gbv_safety_perception", "core": false, "definition": {"en": "Household-reported perception of whether the site or area feels safe for women and girls to move around freely at night. Nighttime safety is consistently identified as a distinct and higher-risk condition than daytime in displacement settings (IRC Safety Audit Tool 2013; Oxfam/WEDC lighting review 2018; IASC GBV Guidelines 2015). Separating day and night safety allows triangulation with lighting infrastructure items (latrine_lighting_path, latrine_distance_from_shelter_adequate).", "es": "Percepci\u00f3n reportada por el hogar sobre si el sitio o zona se percibe como seguro para que mujeres y ni\u00f1as se muevan libremente por la noche. La seguridad nocturna se identifica consistentemente como una condici\u00f3n distinta y de mayor riesgo que la diurna en contextos de desplazamiento. Separar la seguridad diurna y nocturna permite la triangulaci\u00f3n con \u00edtems de infraestructura de alumbrado (latrine_lighting_path, latrine_distance_from_shelter_adequate).", "fr": "Perception d\u00e9clar\u00e9e par le m\u00e9nage si le site ou la zone semble s\u00fbr pour que les femmes et les filles se d\u00e9placent librement la nuit. La s\u00e9curit\u00e9 nocturne est syst\u00e9matiquement identifi\u00e9e comme une condition distincte et plus risqu\u00e9e que la journ\u00e9e dans les contextes de d\u00e9placement. La s\u00e9paration des perceptions de s\u00e9curit\u00e9 diurne et nocturne permet la triangulation avec les indicateurs d''infrastructure d''\u00e9clairage (latrine_lighting_path, latrine_distance_from_shelter_adequate)."}, "id": "site_feels_safe_nighttime", "label": {"en": "Site feels safe for women and girls: nighttime", "es": "El sitio se percibe seguro para mujeres y ni\u00f1as: de noche", "fr": "Le site semble s\u00fbr pour les femmes et les filles : de nuit"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "safety-perception-3"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,irc-safety-audit-2013,oxfam-lighting-wash-gbv-2018
  skilled_birth_attendance:
