  chronic_condition_type:
    title:
      en: Type(s) of chronic condition present in the household
      fr: Type(s) d'affection chronique présente dans le ménage
      es: Tipo(s) de condición crónica presente en el hogar
    description:
      en: Type(s) of diagnosed chronic condition present among household members, drawn from the `chronic-condition-type` vocabulary that covers NCDs (hypertension, diabetes, cardiovascular, chronic respiratory, cancer, chronic mental illness, epilepsy) plus chronic communicable diseases (HIV, tuberculosis). Multi-select because a household may have members with different conditions, or one member with co-morbidities. Sensitive because chronic condition status can be stigmatizing. Ask only if `chronic_condition_in_hh` is `yes`.
      fr: Type(s) d'affection chronique diagnostiquée présente chez les membres du ménage, tirés du vocabulaire `chronic-condition-type` qui couvre les maladies non transmissibles (hypertension, diabète, cardiovasculaire, respiratoire chronique, cancer, maladie mentale chronique, épilepsie) ainsi que les maladies transmissibles chroniques (VIH, tuberculose). Sélection multiple car un ménage peut avoir des membres atteints d'affections différentes, ou un membre avec plusieurs co-morbidités. Sensible parce que le statut de maladie chronique peut être stigmatisant. Ne poser que si `chronic_condition_in_hh` est `yes`.
      es: Tipo(s) de condición crónica diagnosticada presente entre los miembros del hogar, tomados del vocabulario `chronic-condition-type` que cubre ENT (hipertensión, diabetes, cardiovascular, respiratoria crónica, cáncer, enfermedad mental crónica, epilepsia) y enfermedades transmisibles crónicas (VIH, tuberculosis). Selección múltiple porque un hogar puede tener miembros con distintas condiciones, o un miembro con co-morbilidades. Sensible porque el estado de enfermedad crónica puede ser estigmatizante. Preguntar solo si `chronic_condition_in_hh` es `yes`.
    slot_uri: aidops:chronic_condition_type
    range: ChronicConditionType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["unhcr-phc-coverage-standard"], "cardinality": "multiple", "category": "health_access_chronic", "core": false, "definition": {"en": "Type(s) of diagnosed chronic condition present among household members, drawn from the `chronic-condition-type` vocabulary that covers NCDs (hypertension, diabetes, cardiovascular, chronic respiratory, cancer, chronic mental illness, epilepsy) plus chronic communicable diseases (HIV, tuberculosis). Multi-select because a household may have members with different conditions, or one member with co-morbidities. Sensitive because chronic condition status can be stigmatizing. Ask only if `chronic_condition_in_hh` is `yes`.", "es": "Tipo(s) de condici\u00f3n cr\u00f3nica diagnosticada presente entre los miembros del hogar, tomados del vocabulario `chronic-condition-type` que cubre ENT (hipertensi\u00f3n, diabetes, cardiovascular, respiratoria cr\u00f3nica, c\u00e1ncer, enfermedad mental cr\u00f3nica, epilepsia) y enfermedades transmisibles cr\u00f3nicas (VIH, tuberculosis). Selecci\u00f3n m\u00faltiple porque un hogar puede tener miembros con distintas condiciones, o un miembro con co-morbilidades. Sensible porque el estado de enfermedad cr\u00f3nica puede ser estigmatizante. Preguntar solo si `chronic_condition_in_hh` es `yes`.", "fr": "Type(s) d''affection chronique diagnostiqu\u00e9e pr\u00e9sente chez les membres du m\u00e9nage, tir\u00e9s du vocabulaire `chronic-condition-type` qui couvre les maladies non transmissibles (hypertension, diab\u00e8te, cardiovasculaire, respiratoire chronique, cancer, maladie mentale chronique, \u00e9pilepsie) ainsi que les maladies transmissibles chroniques (VIH, tuberculose). S\u00e9lection multiple car un m\u00e9nage peut avoir des membres atteints d''affections diff\u00e9rentes, ou un membre avec plusieurs co-morbidit\u00e9s. Sensible parce que le statut de maladie chronique peut \u00eatre stigmatisant. Ne poser que si `chronic_condition_in_hh` est `yes`."}, "id": "chronic_condition_type", "label": {"en": "Type(s) of chronic condition present in the household", "es": "Tipo(s) de condici\u00f3n cr\u00f3nica presente en el hogar", "fr": "Type(s) d''affection chronique pr\u00e9sente dans le m\u00e9nage"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "chronic-condition-type"}'
