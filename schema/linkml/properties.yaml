  cl_mics_child_labour:
    title:
      en: Child labour per MICS/ILO definition (derived)
      fr: Travail des enfants selon la définition MICS/OIT (dérivé)
      es: Trabajo infantil según la definición MICS/OIT (derivado)
    description:
      en: 'Derived per-selected-child boolean: true if the randomly selected child aged 5-17 meets the MICS/ILO-UNICEF 2020 child-labour definition. The age-banded logic is: 5-11 → economic activity ≥1 hour/week OR household chores ≥21 hours/week OR any hazardous exposure/condition; 12-14 → economic activity ≥14 hours/week OR household chores ≥21 hours/week OR any hazardous exposure/condition; 15-17 → economic activity ≥43 hours/week OR any hazardous exposure/condition. Hazardous exposure means any of cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools, or any cl_hazard_* is yes. Aggregates to the SDG 8.7.1 indicator at population level.'
      fr: 'Booléen dérivé par enfant sélectionné : vrai si l''enfant tiré au sort âgé de 5 à 17 ans répond à la définition MICS/OIT-UNICEF 2020 du travail des enfants. La logique par tranche d''âge est : 5-11 → activité économique ≥1 heure/semaine OU tâches ménagères ≥21 heures/semaine OU toute exposition/condition dangereuse ; 12-14 → activité économique ≥14 heures/semaine OU tâches ménagères ≥21 heures/semaine OU toute exposition/condition dangereuse ; 15-17 → activité économique ≥43 heures/semaine OU toute exposition/condition dangereuse. L''exposition dangereuse signifie que l''un de cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools ou l''un des cl_hazard_* est oui. Agrégé à l''indicateur ODD 8.7.1 au niveau de la population.'
      es: 'Booleano derivado por niño seleccionado: verdadero si el niño seleccionado aleatoriamente de 5 a 17 años cumple la definición MICS/OIT-UNICEF 2020 de trabajo infantil. La lógica por banda de edad es: 5-11 → actividad económica ≥1 hora/semana O tareas del hogar ≥21 horas/semana O cualquier exposición/condición peligrosa; 12-14 → actividad económica ≥14 horas/semana O tareas del hogar ≥21 horas/semana O cualquier exposición/condición peligrosa; 15-17 → actividad económica ≥43 horas/semana O cualquier exposición/condición peligrosa. Exposición peligrosa significa que cualquiera de cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools o cualquier cl_hazard_* es sí. Agregado al indicador ODS 8.7.1 a nivel poblacional.'
    slot_uri: aidops:cl_mics_child_labour
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["child_5_17"], "bibliography_refs": ["ilo-unicef-child-labour-estimates-2020", "mics6-child-protection"], "cardinality": "single", "category": "derived_child_protection", "core": true, "definition": {"en": "Derived per-selected-child boolean: true if the randomly selected child aged 5-17 meets the MICS/ILO-UNICEF 2020 child-labour definition. The age-banded logic is: 5-11 \u2192 economic activity \u22651 hour/week OR household chores \u226521 hours/week OR any hazardous exposure/condition; 12-14 \u2192 economic activity \u226514 hours/week OR household chores \u226521 hours/week OR any hazardous exposure/condition; 15-17 \u2192 economic activity \u226543 hours/week OR any hazardous exposure/condition. Hazardous exposure means any of cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools, or any cl_hazard_* is yes. Aggregates to the SDG 8.7.1 indicator at population level.", "es": "Booleano derivado por ni\u00f1o seleccionado: verdadero si el ni\u00f1o seleccionado aleatoriamente de 5 a 17 a\u00f1os cumple la definici\u00f3n MICS/OIT-UNICEF 2020 de trabajo infantil. La l\u00f3gica por banda de edad es: 5-11 \u2192 actividad econ\u00f3mica \u22651 hora/semana O tareas del hogar \u226521 horas/semana O cualquier exposici\u00f3n/condici\u00f3n peligrosa; 12-14 \u2192 actividad econ\u00f3mica \u226514 horas/semana O tareas del hogar \u226521 horas/semana O cualquier exposici\u00f3n/condici\u00f3n peligrosa; 15-17 \u2192 actividad econ\u00f3mica \u226543 horas/semana O cualquier exposici\u00f3n/condici\u00f3n peligrosa. Exposici\u00f3n peligrosa significa que cualquiera de cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools o cualquier cl_hazard_* es s\u00ed. Agregado al indicador ODS 8.7.1 a nivel poblacional.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 par enfant s\u00e9lectionn\u00e9 : vrai si l''enfant tir\u00e9 au sort \u00e2g\u00e9 de 5 \u00e0 17 ans r\u00e9pond \u00e0 la d\u00e9finition MICS/OIT-UNICEF 2020 du travail des enfants. La logique par tranche d''\u00e2ge est : 5-11 \u2192 activit\u00e9 \u00e9conomique \u22651 heure/semaine OU t\u00e2ches m\u00e9nag\u00e8res \u226521 heures/semaine OU toute exposition/condition dangereuse ; 12-14 \u2192 activit\u00e9 \u00e9conomique \u226514 heures/semaine OU t\u00e2ches m\u00e9nag\u00e8res \u226521 heures/semaine OU toute exposition/condition dangereuse ; 15-17 \u2192 activit\u00e9 \u00e9conomique \u226543 heures/semaine OU toute exposition/condition dangereuse. L''exposition dangereuse signifie que l''un de cl_hazardous_heavy_loads, cl_hazardous_dangerous_tools ou l''un des cl_hazard_* est oui. Agr\u00e9g\u00e9 \u00e0 l''indicateur ODD 8.7.1 au niveau de la population."}, "id": "cl_mics_child_labour", "label": {"en": "Child labour per MICS/ILO definition (derived)", "es": "Trabajo infantil seg\u00fan la definici\u00f3n MICS/OIT (derivado)", "fr": "Travail des enfants selon la d\u00e9finition MICS/OIT (d\u00e9riv\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
