      es: 'Qué tan satisfecho estaba el encuestado con la forma en que los actores humanitarios respondieron a su pregunta, sugerencia o queja. Se pregunta solo cuando `aap_complaint_filed_past = yes`. Corresponde al Compromiso 5 Acción Clave 5.3 de la CHS 2024 («Acusar recibo y responder a las quejas de manera oportuna»). Fuente: Menú IASC / REACH 2018.'
