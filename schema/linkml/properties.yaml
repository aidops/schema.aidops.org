      es: 'Derivado: experimentó VPI física en los últimos 12 meses'
    description:
      en: 'Derived boolean indicator: true if the respondent experienced at least one physical IPV act in the past 12 months. Formula: TRUE if any of gbv_phys_push_shake_throw_12m_freq, gbv_phys_slap_12m_freq, gbv_phys_twist_arm_pull_hair_12m_freq, gbv_phys_punch_12m_freq, gbv_phys_kick_drag_beat_12m_freq, gbv_phys_choke_burn_12m_freq, or gbv_phys_weapon_threat_12m_freq = ''often'' or ''sometimes''. Note: a missing 12-month frequency item (because lifetime = false) is treated as equivalent to ''not_in_last_12m'' for this derived indicator. SDG 5.2.1-adjacent (physical IPV component). Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.'
