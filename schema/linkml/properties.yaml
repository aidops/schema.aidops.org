  cooking_fuel_cost_share:
    title:
      en: Cooking fuel cost as share of income
      fr: Coût du combustible de cuisson en part du revenu
      es: Costo del combustible de cocción como porcentaje del ingreso
    description:
      en: 'Banded estimate of the share of monthly household income spent on cooking fuel and stove costs. MTF cooking affordability attribute: Tier 4-5 criterion is met when fuel cost is less than 5% of household income, corresponding to the ''less_than_5_pct'' band. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q9.'
      fr: 'Estimation par tranche de la part du revenu mensuel du ménage consacrée au combustible de cuisson et aux coûts du foyer. Attribut d''accessibilité financière de cuisson MTF : le critère des niveaux 4 à 5 est satisfait lorsque le coût du combustible est inférieur à 5 % du revenu du ménage, correspondant à la tranche ''less_than_5_pct''. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q9.'
      es: 'Estimación por bandas de la proporción del ingreso mensual del hogar gastada en combustible de cocción y costos de la cocina. Atributo de asequibilidad de cocción MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo del combustible es inferior al 5% del ingreso del hogar, correspondiendo a la banda ''less_than_5_pct''. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q9.'
    slot_uri: aidops:cooking_fuel_cost_share
    range: IncomeShareBand
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Banded estimate of the share of monthly household income spent on cooking fuel and stove costs. MTF cooking affordability attribute: Tier 4-5 criterion is met when fuel cost is less than 5% of household income, corresponding to the ''less_than_5_pct'' band. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q9.", "es": "Estimaci\u00f3n por bandas de la proporci\u00f3n del ingreso mensual del hogar gastada en combustible de cocci\u00f3n y costos de la cocina. Atributo de asequibilidad de cocci\u00f3n MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo del combustible es inferior al 5% del ingreso del hogar, correspondiendo a la banda ''less_than_5_pct''. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q9.", "fr": "Estimation par tranche de la part du revenu mensuel du m\u00e9nage consacr\u00e9e au combustible de cuisson et aux co\u00fbts du foyer. Attribut d''accessibilit\u00e9 financi\u00e8re de cuisson MTF : le crit\u00e8re des niveaux 4 \u00e0 5 est satisfait lorsque le co\u00fbt du combustible est inf\u00e9rieur \u00e0 5 % du revenu du m\u00e9nage, correspondant \u00e0 la tranche ''less_than_5_pct''. Source : enqu\u00eate m\u00e9nage MTF ; questionnaire harmonis\u00e9 OMS/Banque mondiale Q9."}, "id": "cooking_fuel_cost_share", "label": {"en": "Cooking fuel cost as share of income", "es": "Costo del combustible de cocci\u00f3n como porcentaje del ingreso", "fr": "Co\u00fbt du combustible de cuisson en part du revenu"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["se4all_mtf"], "vocabulary": "income-share-band"}'
