  livelihood_disruption_barrier:
    title:
      en: Main livelihood disruption barrier
      fr: Obstacle principal à la reprise de l'activité
      es: Barrera principal de interrupción del medio de vida
    description:
      en: The single most important reason the household cannot practice its previous livelihood activity. Asked only when `livelihood_change_since_crisis` is `lost_entirely` or `significantly_reduced`. Drawn from the IOM DTM Multi-Sectoral Location Assessment livelihood disruption module, the Sphere 2018 Livelihoods chapter's protection and legal barriers section, and the LSMS-ISA livelihood constraints questions.
      fr: La raison la plus importante pour laquelle le ménage ne peut pas pratiquer son activité de subsistance antérieure. Posée uniquement lorsque `livelihood_change_since_crisis` est `lost_entirely` ou `significantly_reduced`. Tirée du module de perturbation des moyens de subsistance de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM, de la section sur les obstacles de protection et juridiques du chapitre Moyens de subsistance de Sphère 2018 et des questions sur les contraintes de subsistance LSMS-ISA.
      es: La razón más importante por la que el hogar no puede practicar su actividad de subsistencia anterior. Se pregunta solo cuando `livelihood_change_since_crisis` es `lost_entirely` o `significantly_reduced`. Tomada del módulo de interrupción de medios de vida de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM, la sección sobre barreras de protección y legales del capítulo de Medios de Vida de Esfera 2018 y las preguntas sobre restricciones de subsistencia LSMS-ISA.
    slot_uri: aidops:livelihood_disruption_barrier
    range: LivelihoodDisruptionBarrier
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "The single most important reason the household cannot practice its previous livelihood activity. Asked only when `livelihood_change_since_crisis` is `lost_entirely` or `significantly_reduced`. Drawn from the IOM DTM Multi-Sectoral Location Assessment livelihood disruption module, the Sphere 2018 Livelihoods chapter''s protection and legal barriers section, and the LSMS-ISA livelihood constraints questions.", "es": "La raz\u00f3n m\u00e1s importante por la que el hogar no puede practicar su actividad de subsistencia anterior. Se pregunta solo cuando `livelihood_change_since_crisis` es `lost_entirely` o `significantly_reduced`. Tomada del m\u00f3dulo de interrupci\u00f3n de medios de vida de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM, la secci\u00f3n sobre barreras de protecci\u00f3n y legales del cap\u00edtulo de Medios de Vida de Esfera 2018 y las preguntas sobre restricciones de subsistencia LSMS-ISA.", "fr": "La raison la plus importante pour laquelle le m\u00e9nage ne peut pas pratiquer son activit\u00e9 de subsistance ant\u00e9rieure. Pos\u00e9e uniquement lorsque `livelihood_change_since_crisis` est `lost_entirely` ou `significantly_reduced`. Tir\u00e9e du module de perturbation des moyens de subsistance de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM, de la section sur les obstacles de protection et juridiques du chapitre Moyens de subsistance de Sph\u00e8re 2018 et des questions sur les contraintes de subsistance LSMS-ISA."}, "id": "livelihood_disruption_barrier", "label": {"en": "Main livelihood disruption barrier", "es": "Barrera principal de interrupci\u00f3n del medio de vida", "fr": "Obstacle principal \u00e0 la reprise de l''activit\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-disruption-barrier"}'
  livelihood_diversity_count:
    title:
      en: Livelihood diversity count
      fr: Nombre d'activités de subsistance
      es: Recuento de diversidad de medios de vida
    description:
      en: 'Derived count of distinct `livelihood-activity-category` codes selected across `main_livelihood_activity` and `secondary_livelihood_activities` combined. Not asked directly; computed in XLSForm `calculate` or post-hoc. Operationalises the FAO RIMA-II Access to Basic Services (ABS) pillar''s income diversification subcomponent: a count of two or more distinct sources is a positive resilience indicator. Range: 1–12 (maximum equals the number of distinct activity codes in the vocabulary).'
      fr: 'Nombre dérivé de codes `livelihood-activity-category` distincts sélectionnés à travers `main_livelihood_activity` et `secondary_livelihood_activities` combinés. Pas demandé directement ; calculé dans un `calculate` XLSForm ou a posteriori. Opérationnalise le sous-composant de diversification des revenus du pilier Accès aux services de base (ABS) de FAO RIMA-II : un nombre de deux sources distinctes ou plus est un indicateur positif de résilience. Plage : 1–12 (maximum égal au nombre de codes d''activité distincts dans le vocabulaire).'
      es: 'Recuento derivado de códigos `livelihood-activity-category` distintos seleccionados en `main_livelihood_activity` y `secondary_livelihood_activities` combinados. No se pregunta directamente; se computa en `calculate` de XLSForm o post-hoc. Operacionaliza el subcomponente de diversificación de ingresos del pilar Acceso a Servicios Básicos (ABS) de FAO RIMA-II: un recuento de dos o más fuentes distintas es un indicador positivo de resiliencia. Rango: 1–12 (máximo igual al número de códigos de actividad distintos en el vocabulario).'
    slot_uri: aidops:livelihood_diversity_count
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived count of distinct `livelihood-activity-category` codes selected across `main_livelihood_activity` and `secondary_livelihood_activities` combined. Not asked directly; computed in XLSForm `calculate` or post-hoc. Operationalises the FAO RIMA-II Access to Basic Services (ABS) pillar''s income diversification subcomponent: a count of two or more distinct sources is a positive resilience indicator. Range: 1\u201312 (maximum equals the number of distinct activity codes in the vocabulary).", "es": "Recuento derivado de c\u00f3digos `livelihood-activity-category` distintos seleccionados en `main_livelihood_activity` y `secondary_livelihood_activities` combinados. No se pregunta directamente; se computa en `calculate` de XLSForm o post-hoc. Operacionaliza el subcomponente de diversificaci\u00f3n de ingresos del pilar Acceso a Servicios B\u00e1sicos (ABS) de FAO RIMA-II: un recuento de dos o m\u00e1s fuentes distintas es un indicador positivo de resiliencia. Rango: 1\u201312 (m\u00e1ximo igual al n\u00famero de c\u00f3digos de actividad distintos en el vocabulario).", "fr": "Nombre d\u00e9riv\u00e9 de codes `livelihood-activity-category` distincts s\u00e9lectionn\u00e9s \u00e0 travers `main_livelihood_activity` et `secondary_livelihood_activities` combin\u00e9s. Pas demand\u00e9 directement ; calcul\u00e9 dans un `calculate` XLSForm ou a posteriori. Op\u00e9rationnalise le sous-composant de diversification des revenus du pilier Acc\u00e8s aux services de base (ABS) de FAO RIMA-II : un nombre de deux sources distinctes ou plus est un indicateur positif de r\u00e9silience. Plage : 1\u201312 (maximum \u00e9gal au nombre de codes d''activit\u00e9 distincts dans le vocabulaire)."}, "id": "livelihood_diversity_count", "label": {"en": "Livelihood diversity count", "es": "Recuento de diversidad de medios de vida", "fr": "Nombre d''activit\u00e9s de subsistance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": null}'
