      en: Whether there are separate sleeping spaces for adult males and adult females in the household who are not intimate partners. Sphere Standard 3 calls for privacy and separation between sexes and different age groups. Ask only if the household has more than one adult and not all adults are intimate partners.
      fr: S'il y a des espaces de couchage séparés pour les hommes et les femmes adultes du ménage qui ne sont pas des partenaires intimes. La Norme Sphère 3 requiert la vie privée et la séparation entre les sexes et les différents groupes d'âge. Poser uniquement si le ménage a plus d'un adulte et si tous les adultes ne sont pas des partenaires intimes.
      es: Si hay espacios para dormir separados para hombres y mujeres adultas del hogar que no son parejas íntimas. La Norma Esfera 3 requiere privacidad y separación entre sexos y diferentes grupos de edad. Preguntar solo si el hogar tiene más de un adulto y no todos los adultos son parejas íntimas.
