  gbv_helpseeking_attempted:
    title:
      en: 'Help-seeking: ever tried to seek help after partner violence'
      fr: 'Recherche d''aide : a jamais cherché de l''aide après des violences conjugales'
      es: 'Búsqueda de ayuda: alguna vez intentó buscar ayuda tras violencia de pareja'
    description:
      en: 'Whether the respondent has ever tried to seek help in response to any of the experiences of physical, sexual, or emotional partner violence she reported in the IPV batteries. DHS instrument item DV27. Lifetime reference period (ever). Skip logic: asked only of respondents who reported at least one act in the physical, sexual, or emotional IPV batteries. If true, gbv_helpseeking_sources is asked. If false, gbv_helpseeking_barriers and gbv_disclosure_told_anyone are asked. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: 'Si la répondante a jamais cherché de l''aide à la suite de l''une des expériences de violences physiques, sexuelles ou émotionnelles qu''elle a signalées. Item DHS DV27. Période de référence : à vie. Si vrai, gbv_helpseeking_sources est posée. Si faux, gbv_helpseeking_barriers et gbv_disclosure_told_anyone sont posées.'
      es: 'Si la encuestada alguna vez buscó ayuda en respuesta a alguna de las experiencias de violencia de pareja física, sexual o emocional que reportó. Ítem DHS DV27. Período de referencia: de por vida. Si verdadero, se pregunta gbv_helpseeking_sources. Si falso, se preguntan gbv_helpseeking_barriers y gbv_disclosure_told_anyone.'
    slot_uri: aidops:gbv_helpseeking_attempted
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022", "ellsberg-heise-2005"], "cardinality": "single", "category": "gbv_help_seeking", "core": false, "definition": {"en": "Whether the respondent has ever tried to seek help in response to any of the experiences of physical, sexual, or emotional partner violence she reported in the IPV batteries. DHS instrument item DV27. Lifetime reference period (ever). Skip logic: asked only of respondents who reported at least one act in the physical, sexual, or emotional IPV batteries. If true, gbv_helpseeking_sources is asked. If false, gbv_helpseeking_barriers and gbv_disclosure_told_anyone are asked. Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Si la encuestada alguna vez busc\u00f3 ayuda en respuesta a alguna de las experiencias de violencia de pareja f\u00edsica, sexual o emocional que report\u00f3. \u00cdtem DHS DV27. Per\u00edodo de referencia: de por vida. Si verdadero, se pregunta gbv_helpseeking_sources. Si falso, se preguntan gbv_helpseeking_barriers y gbv_disclosure_told_anyone.\n", "fr": "Si la r\u00e9pondante a jamais cherch\u00e9 de l''aide \u00e0 la suite de l''une des exp\u00e9riences de violences physiques, sexuelles ou \u00e9motionnelles qu''elle a signal\u00e9es. Item DHS DV27. P\u00e9riode de r\u00e9f\u00e9rence : \u00e0 vie. Si vrai, gbv_helpseeking_sources est pos\u00e9e. Si faux, gbv_helpseeking_barriers et gbv_disclosure_told_anyone sont pos\u00e9es.\n"}, "id": "gbv_helpseeking_attempted", "label": {"en": "Help-seeking: ever tried to seek help after partner violence", "es": "B\u00fasqueda de ayuda: alguna vez intent\u00f3 buscar ayuda tras violencia de pareja", "fr": "Recherche d''aide : a jamais cherch\u00e9 de l''aide apr\u00e8s des violences conjugales"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
