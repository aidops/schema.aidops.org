 re\u00e7u une injection contre la rougeole \u2014 une injection dans le bras \u00e0 9 mois ou plus ? \u00bb Le VCR1 est administr\u00e9 \u00e0 9 mois dans les pays \u00e0 forte transmission et \u00e0 12 mois dans les pays \u00e0 faible transmission selon le calendrier EPI de l''OMS. Le VCR1 est inclus dans l''indicateur \u00ab antig\u00e8nes de base vaccin\u00e9s compl\u00e8tement \u00bb et dans l''indicateur rougeole ODD 3.b.1 et Sph\u00e8re 2018 (cible de couverture \u226595 %). Code DHS h10 ; code MICS IM6."}, "id": "vacc_mcv1", "label": {"en": "MCV1 (measles-containing vaccine dose 1) vaccination status", "es": "Estado de vacunaci\u00f3n VCS1 (vacuna con componente de sarampi\u00f3n dosis 1)", "fr": "Statut vaccinal VCR1 (vaccin contenant le composant rougeole dose 1)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "vacc-status"}'
