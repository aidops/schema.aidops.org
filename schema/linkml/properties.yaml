  water_availability_days_per_week:
    title:
      en: Water availability (days per week)
      fr: Disponibilité de l'eau (jours par semaine)
      es: Disponibilidad de agua (días por semana)
    description:
      en: 'Average number of days per week that water is available from the household''s main drinking water source. Asked only when water_availability_reliable is false (water is not always available). Range: 0–7. Used to characterize supply reliability for programme planning; not a JMP derived service-level field.'
      fr: 'Nombre moyen de jours par semaine où l''eau est disponible à la principale source d''eau potable du ménage. Demandé uniquement quand water_availability_reliable est faux (l''eau n''est pas toujours disponible). Plage : 0–7. Utilisé pour caractériser la fiabilité de l''approvisionnement pour la planification des programmes ; ce n''est pas un champ de niveau de service dérivé JMP.'
      es: 'Número promedio de días por semana que el agua está disponible en la principal fuente de agua potable del hogar. Preguntado solo cuando water_availability_reliable es falso (el agua no está siempre disponible). Rango: 0–7. Usado para caracterizar la confiabilidad del suministro para la planificación de programas; no es un campo de nivel de servicio derivado del JMP.'
