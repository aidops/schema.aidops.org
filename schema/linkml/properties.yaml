  mk_cash_accepted:
    title:
      en: Physical cash acceptance by vendors
      fr: Acceptation des espèces physiques par les vendeurs
      es: Aceptación de efectivo físico por los vendedores
    description:
      en: Proportion of vendors at this market who accept physical cash (banknotes and coins) for transactions, assessed by enumerator observation and key vendor informant confirmation. Physical cash acceptance is nearly universal in most contexts; the item becomes analytically important in hyperinflationary contexts where vendors refuse local currency.
      fr: Proportion de vendeurs sur ce marché qui acceptent les espèces physiques (billets et pièces) pour les transactions, évaluée par l'observation de l'enquêteur et la confirmation des informateurs clés vendeurs. L'acceptation des espèces physiques est quasi universelle dans la plupart des contextes.
      es: Proporción de vendedores en este mercado que aceptan efectivo físico (billetes y monedas) para transacciones, evaluada por observación del enumerador y confirmación de informantes clave vendedores. La aceptación de efectivo físico es casi universal en la mayoría de los contextos.
    slot_uri: aidops:mk_cash_accepted
    range: CashModalityAcceptance
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "calp-programme-quality-toolbox", "crs-markit-2023", "icrc-ram-2014", "reach-jmmi"], "cardinality": "single", "category": "market_cbi_feasibility", "core": true, "definition": {"en": "Proportion of vendors at this market who accept physical cash (banknotes and coins) for transactions, assessed by enumerator observation and key vendor informant confirmation. Physical cash acceptance is nearly universal in most contexts; the item becomes analytically important in hyperinflationary contexts where vendors refuse local currency.", "es": "Proporci\u00f3n de vendedores en este mercado que aceptan efectivo f\u00edsico (billetes y monedas) para transacciones, evaluada por observaci\u00f3n del enumerador y confirmaci\u00f3n de informantes clave vendedores. La aceptaci\u00f3n de efectivo f\u00edsico es casi universal en la mayor\u00eda de los contextos.", "fr": "Proportion de vendeurs sur ce march\u00e9 qui acceptent les esp\u00e8ces physiques (billets et pi\u00e8ces) pour les transactions, \u00e9valu\u00e9e par l''observation de l''enqu\u00eateur et la confirmation des informateurs cl\u00e9s vendeurs. L''acceptation des esp\u00e8ces physiques est quasi universelle dans la plupart des contextes."}, "id": "mk_cash_accepted", "label": {"en": "Physical cash acceptance by vendors", "es": "Aceptaci\u00f3n de efectivo f\u00edsico por los vendedores", "fr": "Acceptation des esp\u00e8ces physiques par les vendeurs"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "cash-modality-acceptance"}'
      bibliography_refs: calp-misma-2018,calp-programme-quality-toolbox,crs-markit-2023,icrc-ram-2014,reach-jmmi
  mk_cbi_feasibility_composite:
    title:
      en: CBI feasibility composite score
      fr: Score composite de faisabilité CBI
      es: Puntaje compuesto de viabilidad CBI
    description:
      en: 'Derived integer 0–5 market-side feasibility score for cash-based programming, aligned to the CaLP MISMA Cash Feasibility Decision Tree 2018. Each of five conditions contributes 1 point: (1) supply chain is fully or mostly functional; (2) market is at least partially operational; (3) physical cash accepted by most or all vendors; (4) mobile money accepted by most or all vendors; (5) vendors have capacity for large coordinated orders. Score 5 = strong CBI feasibility; score 0 = not feasible under current conditions. This is a market-side pre-screening tool, not a full CBI modality decision (which also requires FSP assessment, beneficiary identification, and protection-risk analysis). Implemented as an XLSForm calculate field. Score of 2 or below should prompt additional assessment before CBI programming is approved.'
      fr: 'Score entier dérivé 0–5 de faisabilité côté marché pour la programmation basée sur le cash, aligné sur l''arbre de décision de faisabilité du cash CaLP MISMA 2018. Chacune des cinq conditions contribue 1 point : (1) la chaîne d''approvisionnement est pleinement ou majoritairement fonctionnelle ; (2) le marché est au moins partiellement opérationnel ; (3) les espèces physiques sont acceptées par la plupart ou tous les vendeurs ; (4) le mobile money est accepté par la plupart ou tous les vendeurs ; (5) les vendeurs ont la capacité de traiter des commandes coordonnées importantes. Score 5 = forte faisabilité CBI ; score 0 = non faisable dans les conditions actuelles.'
      es: 'Puntaje entero derivado 0–5 de viabilidad del lado del mercado para programación basada en efectivo, alineado con el Árbol de Decisión de Viabilidad del Efectivo CaLP MISMA 2018. Cada una de cinco condiciones contribuye 1 punto: (1) la cadena de suministro es completa o mayormente funcional; (2) el mercado está al menos parcialmente operacional; (3) el efectivo físico es aceptado por la mayoría o todos los vendedores; (4) el dinero móvil es aceptado por la mayoría o todos los vendedores; (5) los vendedores tienen capacidad para pedidos coordinados grandes. Puntaje 5 = fuerte viabilidad CBI; puntaje 0 = no viable en las condiciones actuales.'
    slot_uri: aidops:mk_cbi_feasibility_composite
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "calp-programme-quality-toolbox", "crs-markit-2023", "reach-jmmi", "wfp-mag-2021"], "cardinality": "single", "category": "market_cbi_feasibility", "core": true, "definition": {"en": "Derived integer 0\u20135 market-side feasibility score for cash-based programming, aligned to the CaLP MISMA Cash Feasibility Decision Tree 2018. Each of five conditions contributes 1 point: (1) supply chain is fully or mostly functional; (2) market is at least partially operational; (3) physical cash accepted by most or all vendors; (4) mobile money accepted by most or all vendors; (5) vendors have capacity for large coordinated orders. Score 5 = strong CBI feasibility; score 0 = not feasible under current conditions. This is a market-side pre-screening tool, not a full CBI modality decision (which also requires FSP assessment, beneficiary identification, and protection-risk analysis). Implemented as an XLSForm calculate field. Score of 2 or below should prompt additional assessment before CBI programming is approved.\n", "es": "Puntaje entero derivado 0\u20135 de viabilidad del lado del mercado para programaci\u00f3n basada en efectivo, alineado con el \u00c1rbol de Decisi\u00f3n de Viabilidad del Efectivo CaLP MISMA 2018. Cada una de cinco condiciones contribuye 1 punto: (1) la cadena de suministro es completa o mayormente funcional; (2) el mercado est\u00e1 al menos parcialmente operacional; (3) el efectivo f\u00edsico es aceptado por la mayor\u00eda o todos los vendedores; (4) el dinero m\u00f3vil es aceptado por la mayor\u00eda o todos los vendedores; (5) los vendedores tienen capacidad para pedidos coordinados grandes. Puntaje 5 = fuerte viabilidad CBI; puntaje 0 = no viable en las condiciones actuales.\n", "fr": "Score entier d\u00e9riv\u00e9 0\u20135 de faisabilit\u00e9 c\u00f4t\u00e9 march\u00e9 pour la programmation bas\u00e9e sur le cash, align\u00e9 sur l''arbre de d\u00e9cision de faisabilit\u00e9 du cash CaLP MISMA 2018. Chacune des cinq conditions contribue 1 point : (1) la cha\u00eene d''approvisionnement est pleinement ou majoritairement fonctionnelle ; (2) le march\u00e9 est au moins partiellement op\u00e9rationnel ; (3) les esp\u00e8ces physiques sont accept\u00e9es par la plupart ou tous les vendeurs ; (4) le mobile money est accept\u00e9 par la plupart ou tous les vendeurs ; (5) les vendeurs ont la capacit\u00e9 de traiter des commandes coordonn\u00e9es importantes. Score 5 = forte faisabilit\u00e9 CBI ; score 0 = non faisable dans les conditions actuelles.\n"}, "id": "mk_cbi_feasibility_composite", "label": {"en": "CBI feasibility composite score", "es": "Puntaje compuesto de viabilidad CBI", "fr": "Score composite de faisabilit\u00e9 CBI"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,calp-programme-quality-toolbox,crs-markit-2023,reach-jmmi,wfp-mag-2021
  mk_commodity_available:
    title:
      en: Commodity availability today
      fr: Disponibilité du produit aujourd'hui
      es: Disponibilidad del producto hoy
    description:
      en: 'Whether the commodity identified by mk_commodity_code is currently available for purchase at this market today, as assessed by enumerator direct observation confirmed with key vendor informants. Codes: yes_stocked (available and adequately stocked), yes_limited_stock (available but stock is low or restricted), not_available (not present at any stall), dont_know. Used in basket availability rate calculation and CBI feasibility assessment.'
      fr: 'Si le produit identifié par mk_commodity_code est actuellement disponible à l''achat sur ce marché aujourd''hui, tel qu''évalué par l''observation directe de l''enquêteur confirmée auprès des informateurs clés vendeurs. Codes : yes_stocked (disponible et bien approvisionné), yes_limited_stock (disponible mais stock faible ou restreint), not_available (absent de tout étal), dont_know.'
      es: 'Si el producto identificado por mk_commodity_code está actualmente disponible para compra en este mercado hoy, según la evaluación por observación directa del enumerador confirmada con informantes clave vendedores. Códigos: yes_stocked (disponible y bien abastecido), yes_limited_stock (disponible pero con stock bajo o restringido), not_available (no presente en ningún puesto), dont_know.'
    slot_uri: aidops:mk_commodity_available
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Whether the commodity identified by mk_commodity_code is currently available for purchase at this market today, as assessed by enumerator direct observation confirmed with key vendor informants. Codes: yes_stocked (available and adequately stocked), yes_limited_stock (available but stock is low or restricted), not_available (not present at any stall), dont_know. Used in basket availability rate calculation and CBI feasibility assessment.", "es": "Si el producto identificado por mk_commodity_code est\u00e1 actualmente disponible para compra en este mercado hoy, seg\u00fan la evaluaci\u00f3n por observaci\u00f3n directa del enumerador confirmada con informantes clave vendedores. C\u00f3digos: yes_stocked (disponible y bien abastecido), yes_limited_stock (disponible pero con stock bajo o restringido), not_available (no presente en ning\u00fan puesto), dont_know.", "fr": "Si le produit identifi\u00e9 par mk_commodity_code est actuellement disponible \u00e0 l''achat sur ce march\u00e9 aujourd''hui, tel qu''\u00e9valu\u00e9 par l''observation directe de l''enqu\u00eateur confirm\u00e9e aupr\u00e8s des informateurs cl\u00e9s vendeurs. Codes : yes_stocked (disponible et bien approvisionn\u00e9), yes_limited_stock (disponible mais stock faible ou restreint), not_available (absent de tout \u00e9tal), dont_know."}, "id": "mk_commodity_available", "label": {"en": "Commodity availability today", "es": "Disponibilidad del producto hoy", "fr": "Disponibilit\u00e9 du produit aujourd''hui"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,reach-jmmi,wfp-mag-2021,wfp-vam-monitoring
  mk_commodity_code:
    title:
      en: Commodity code (price basket)
      fr: Code du produit (panier de prix)
      es: Código del producto (cesta de precios)
    description:
      en: Identifies which commodity the current repeat-group row describes. Pre-populated from the fixed basket list configured at survey deployment time; typically displayed as a read-only roster label to the enumerator. Values drawn from the market-price-basket vocabulary. This property is the repeat identifier within the Module C price basket repeat group.
      fr: Identifie le produit décrit par la ligne actuelle du groupe répété. Pré-rempli à partir de la liste de panier fixe configurée au moment du déploiement de l'enquête ; généralement affiché comme libellé de liste en lecture seule pour l'enquêteur. Valeurs tirées du vocabulaire market-price-basket.
      es: Identifica qué producto describe la fila actual del grupo de repetición. Pre-poblado desde la lista de cesta fija configurada en el momento del despliegue de la encuesta; generalmente mostrado como etiqueta de lista de solo lectura al enumerador. Valores extraídos del vocabulario market-price-basket.
    slot_uri: aidops:mk_commodity_code
    range: MarketPriceBasket
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "fao-giews-fpma", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Identifies which commodity the current repeat-group row describes. Pre-populated from the fixed basket list configured at survey deployment time; typically displayed as a read-only roster label to the enumerator. Values drawn from the market-price-basket vocabulary. This property is the repeat identifier within the Module C price basket repeat group.", "es": "Identifica qu\u00e9 producto describe la fila actual del grupo de repetici\u00f3n. Pre-poblado desde la lista de cesta fija configurada en el momento del despliegue de la encuesta; generalmente mostrado como etiqueta de lista de solo lectura al enumerador. Valores extra\u00eddos del vocabulario market-price-basket.", "fr": "Identifie le produit d\u00e9crit par la ligne actuelle du groupe r\u00e9p\u00e9t\u00e9. Pr\u00e9-rempli \u00e0 partir de la liste de panier fixe configur\u00e9e au moment du d\u00e9ploiement de l''enqu\u00eate ; g\u00e9n\u00e9ralement affich\u00e9 comme libell\u00e9 de liste en lecture seule pour l''enqu\u00eateur. Valeurs tir\u00e9es du vocabulaire market-price-basket."}, "id": "mk_commodity_code", "label": {"en": "Commodity code (price basket)", "es": "C\u00f3digo del producto (cesta de precios)", "fr": "Code du produit (panier de prix)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "market-price-basket"}'
