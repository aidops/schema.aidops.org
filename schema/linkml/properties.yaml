ective avec une motivation de r\u00e9duction du risque climatique. Fronti\u00e8re avec LivelihoodProfile : ce profil capture ce que le m\u00e9nage fait actuellement ; cette propri\u00e9t\u00e9 capture l''intention future motiv\u00e9e par le risque climatique.\n"}, "id": "climate_livelihood_diversification_intent", "label": {"en": "Plans to diversify livelihood specifically to reduce climate risk", "es": "Planes para diversificar medios de vida espec\u00edficamente para reducir el riesgo clim\u00e1tico", "fr": "Projets de diversification des moyens de subsistance sp\u00e9cifiquement pour r\u00e9duire le risque climatique"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
