  aap_psea_reporting_channel_known:
    title:
      en: 'AAP: PSEA reporting channel awareness'
      fr: 'Redevabilité : Connaissance du canal de signalement PSEA'
      es: 'Rendición de cuentas: Conciencia del canal de denuncia PSEA'
    description:
      en: 'Whether the respondent knows how to report if an aid provider behaves badly towards them, their family, or anyone in the community, including requests for money, favours, or sexual favours in exchange for aid. This item measures awareness of the PSEA reporting channel, not experience. PSEA-adjacent and `sensitive`: enumerator training must include trauma-aware handling and a pre-prepared referral card. If a respondent spontaneously discloses an incident, follow the spontaneous-disclosure protocol (thank, do not probe, provide referral card, flag `x_spontaneous_disclosure` in form metadata). Source: IASC CAAP 2017 PSEA pillar; CHS Alliance PSEA indicators; IASC Plan for Accelerating PSEA (2018).'
      fr: 'Si le répondant sait comment signaler si un intervenant se comporte mal envers lui-même, sa famille ou toute personne de la communauté, y compris des demandes d''argent, de faveurs ou de faveurs sexuelles en échange de l''aide. Cet item mesure la connaissance du canal de signalement PSEA, et non l''expérience. Lié à la PSEA et `sensitive` : la formation des enquêteurs doit inclure une gestion soucieuse du traumatisme et une carte de référence pré-préparée. Si un répondant divulgue spontanément un incident, suivre le protocole de divulgation spontanée (remercier, ne pas sonder, fournir la carte de référence, marquer `x_spontaneous_disclosure` dans les métadonnées du formulaire). Source : pilier PSEA de la CAAP IASC 2017 ; indicateurs PSEA de CHS Alliance ; Plan IASC pour l''accélération de la PSEA (2018).'
      es: 'Si el encuestado sabe cómo denunciar si un actor humanitario se comporta mal con él, su familia o cualquier persona de la comunidad, incluidas las solicitudes de dinero, favores o favores sexuales a cambio de ayuda. Este ítem mide el conocimiento del canal de denuncia PSEA, no la experiencia. Relacionado con PSEA y `sensitive`: la capacitación de los encuestadores debe incluir un manejo consciente del trauma y una tarjeta de referencia pre-preparada. Si un encuestado divulga espontáneamente un incidente, seguir el protocolo de divulgación espontánea (agradecer, no sondear, proporcionar la tarjeta de referencia, marcar `x_spontaneous_disclosure` en los metadatos del formulario). Fuente: pilar PSEA de la CAAP IASC 2017; indicadores PSEA de CHS Alliance; Plan IASC para Acelerar la PSEA (2018).'
    slot_uri: aidops:aap_psea_reporting_channel_known
    range: AapYesnoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "chs-alliance-verification", "iasc-caap-2017"], "cardinality": "single", "category": "aap_trust_safety", "core": false, "definition": {"en": "Whether the respondent knows how to report if an aid provider behaves badly towards them, their family, or anyone in the community, including requests for money, favours, or sexual favours in exchange for aid. This item measures awareness of the PSEA reporting channel, not experience. PSEA-adjacent and `sensitive`: enumerator training must include trauma-aware handling and a pre-prepared referral card. If a respondent spontaneously discloses an incident, follow the spontaneous-disclosure protocol (thank, do not probe, provide referral card, flag `x_spontaneous_disclosure` in form metadata). Source: IASC CAAP 2017 PSEA pillar; CHS Alliance PSEA indicators; IASC Plan for Accelerating PSEA (2018).", "es": "Si el encuestado sabe c\u00f3mo denunciar si un actor humanitario se comporta mal con \u00e9l, su familia o cualquier persona de la comunidad, incluidas las solicitudes de dinero, favores o favores sexuales a cambio de ayuda. Este \u00edtem mide el conocimiento del canal de denuncia PSEA, no la experiencia. Relacionado con PSEA y `sensitive`: la capacitaci\u00f3n de los encuestadores debe incluir un manejo consciente del trauma y una tarjeta de referencia pre-preparada. Si un encuestado divulga espont\u00e1neamente un incidente, seguir el protocolo de divulgaci\u00f3n espont\u00e1nea (agradecer, no sondear, proporcionar la tarjeta de referencia, marcar `x_spontaneous_disclosure` en los metadatos del formulario). Fuente: pilar PSEA de la CAAP IASC 2017; indicadores PSEA de CHS Alliance; Plan IASC para Acelerar la PSEA (2018).", "fr": "Si le r\u00e9pondant sait comment signaler si un intervenant se comporte mal envers lui-m\u00eame, sa famille ou toute personne de la communaut\u00e9, y compris des demandes d''argent, de faveurs ou de faveurs sexuelles en \u00e9change de l''aide. Cet item mesure la connaissance du canal de signalement PSEA, et non l''exp\u00e9rience. Li\u00e9 \u00e0 la PSEA et `sensitive` : la formation des enqu\u00eateurs doit inclure une gestion soucieuse du traumatisme et une carte de r\u00e9f\u00e9rence pr\u00e9-pr\u00e9par\u00e9e. Si un r\u00e9pondant divulgue spontan\u00e9ment un incident, suivre le protocole de divulgation spontan\u00e9e (remercier, ne pas sonder, fournir la carte de r\u00e9f\u00e9rence, marquer `x_spontaneous_disclosure` dans les m\u00e9tadonn\u00e9es du formulaire). Source : pilier PSEA de la CAAP IASC 2017 ; indicateurs PSEA de CHS Alliance ; Plan IASC pour l''acc\u00e9l\u00e9ration de la PSEA (2018)."}, "id": "aap_psea_reporting_channel_known", "label": {"en": "AAP: PSEA reporting channel awareness", "es": "Rendici\u00f3n de cuentas: Conciencia del canal de denuncia PSEA", "fr": "Redevabilit\u00e9 : Connaissance du canal de signalement PSEA"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "aap-yesno-dk"}'
      bibliography_refs: chs-2024,chs-alliance-verification,iasc-caap-2017
  aap_psea_would_report:
    title:
      en: 'AAP: Would report a PSEA incident'
      fr: 'Redevabilité : Signalerait un incident PSEA'
      es: 'Rendición de cuentas: Denunciaría un incidente PSEA'
    description:
      en: 'Hypothetical likelihood that the respondent would report a suspected SEA or misconduct incident if they or someone they know experienced it. Asked regardless of `aap_psea_reporting_channel_known`: a respondent who does not know a channel can still meaningfully answer the hypothetical. PSEA-adjacent and `sensitive`. Source: IASC CAAP 2017 PSEA; CHS Alliance auditor guidance on PSEA indicators.'
      fr: 'Probabilité hypothétique que le répondant signale un incident d''EAS ou d''inconduite présumée si lui-même ou une personne qu''il connaît en était victime. Demandé indépendamment de `aap_psea_reporting_channel_known` : un répondant qui ne connaît pas de canal peut toujours répondre de manière significative à l''hypothèse. Lié à la PSEA et `sensitive`. Source : PSEA CAAP IASC 2017 ; orientations des auditeurs CHS Alliance sur les indicateurs PSEA.'
      es: 'Probabilidad hipotética de que el encuestado denuncie un incidente de EAS o mala conducta si él o alguien que conoce lo experimentara. Se pregunta independientemente de `aap_psea_reporting_channel_known`: un encuestado que no conoce un canal aún puede responder significativamente a la hipótesis. Relacionado con PSEA y `sensitive`. Fuente: PSEA CAAP IASC 2017; orientaciones de auditores de CHS Alliance sobre indicadores PSEA.'
    slot_uri: aidops:aap_psea_would_report
    range: AapLikelihood4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-alliance-verification", "iasc-caap-2017"], "cardinality": "single", "category": "aap_trust_safety", "core": false, "definition": {"en": "Hypothetical likelihood that the respondent would report a suspected SEA or misconduct incident if they or someone they know experienced it. Asked regardless of `aap_psea_reporting_channel_known`: a respondent who does not know a channel can still meaningfully answer the hypothetical. PSEA-adjacent and `sensitive`. Source: IASC CAAP 2017 PSEA; CHS Alliance auditor guidance on PSEA indicators.", "es": "Probabilidad hipot\u00e9tica de que el encuestado denuncie un incidente de EAS o mala conducta si \u00e9l o alguien que conoce lo experimentara. Se pregunta independientemente de `aap_psea_reporting_channel_known`: un encuestado que no conoce un canal a\u00fan puede responder significativamente a la hip\u00f3tesis. Relacionado con PSEA y `sensitive`. Fuente: PSEA CAAP IASC 2017; orientaciones de auditores de CHS Alliance sobre indicadores PSEA.", "fr": "Probabilit\u00e9 hypoth\u00e9tique que le r\u00e9pondant signale un incident d''EAS ou d''inconduite pr\u00e9sum\u00e9e si lui-m\u00eame ou une personne qu''il conna\u00eet en \u00e9tait victime. Demand\u00e9 ind\u00e9pendamment de `aap_psea_reporting_channel_known` : un r\u00e9pondant qui ne conna\u00eet pas de canal peut toujours r\u00e9pondre de mani\u00e8re significative \u00e0 l''hypoth\u00e8se. Li\u00e9 \u00e0 la PSEA et `sensitive`. Source : PSEA CAAP IASC 2017 ; orientations des auditeurs CHS Alliance sur les indicateurs PSEA."}, "id": "aap_psea_would_report", "label": {"en": "AAP: Would report a PSEA incident", "es": "Rendici\u00f3n de cuentas: Denunciar\u00eda un incidente PSEA", "fr": "Redevabilit\u00e9 : Signalerait un incident PSEA"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "aap-likelihood-4"}'
