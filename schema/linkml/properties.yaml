  muac_band:
    title:
      en: MUAC band
      fr: Bande PB
      es: Banda PB
    description:
      en: 'The red/yellow/green screening band derived from MUAC for children 6-59 months using WHO/UNICEF cutoffs: red (< 115 mm, severe acute malnutrition), yellow (115-124 mm, moderate acute malnutrition), green (>= 125 mm, adequate). This is the field-level colour-coded tape classification used in community screening.'
      fr: 'La bande de dépistage rouge/jaune/vert dérivée du périmètre brachial pour les enfants de 6 à 59 mois selon les seuils OMS/UNICEF : rouge (< 115 mm, malnutrition aiguë sévère), jaune (115-124 mm, malnutrition aiguë modérée), vert (>= 125 mm, adéquat). Il s''agit de la classification par code couleur du ruban de terrain utilisée dans le dépistage communautaire.'
      es: 'La banda de tamizaje rojo/amarillo/verde derivada del perímetro braquial para niños de 6 a 59 meses según los puntos de corte OMS/UNICEF: rojo (< 115 mm, desnutrición aguda grave), amarillo (115-124 mm, desnutrición aguda moderada), verde (>= 125 mm, adecuado). Es la clasificación por código de color de la cinta de campo utilizada en el tamizaje comunitario.'
    slot_uri: aidops:muac_band
    range: MuacBand
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["who-muac-cutoffs"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "The red/yellow/green screening band derived from MUAC for children 6-59 months using WHO/UNICEF cutoffs: red (< 115 mm, severe acute malnutrition), yellow (115-124 mm, moderate acute malnutrition), green (>= 125 mm, adequate). This is the field-level colour-coded tape classification used in community screening.", "es": "La banda de tamizaje rojo/amarillo/verde derivada del per\u00edmetro braquial para ni\u00f1os de 6 a 59 meses seg\u00fan los puntos de corte OMS/UNICEF: rojo (< 115 mm, desnutrici\u00f3n aguda grave), amarillo (115-124 mm, desnutrici\u00f3n aguda moderada), verde (>= 125 mm, adecuado). Es la clasificaci\u00f3n por c\u00f3digo de color de la cinta de campo utilizada en el tamizaje comunitario.", "fr": "La bande de d\u00e9pistage rouge/jaune/vert d\u00e9riv\u00e9e du p\u00e9rim\u00e8tre brachial pour les enfants de 6 \u00e0 59 mois selon les seuils OMS/UNICEF : rouge (< 115 mm, malnutrition aigu\u00eb s\u00e9v\u00e8re), jaune (115-124 mm, malnutrition aigu\u00eb mod\u00e9r\u00e9e), vert (>= 125 mm, ad\u00e9quat). Il s''agit de la classification par code couleur du ruban de terrain utilis\u00e9e dans le d\u00e9pistage communautaire."}, "id": "muac_band", "label": {"en": "MUAC band", "es": "Banda PB", "fr": "Bande PB"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["smart"], "vocabulary": "muac-band"}'
      bibliography_refs: who-muac-cutoffs
  muac_cutoff_rule:
    title:
      en: MUAC cutoff rule
      fr: Règle de seuil PB
      es: Regla de corte PB
    description:
      en: 'The population-specific cutoff rule used to classify acute malnutrition from MUAC measurements. MUAC cutoffs differ by population: WHO/UNICEF thresholds for children 6-59 months, z-score based for school-age children and adolescents, Sphere thresholds for pregnant and lactating women. Required whenever acute_malnutrition_status is populated from a MUAC measurement.'
      fr: 'La règle de seuil spécifique à la population utilisée pour classer la malnutrition aiguë à partir des mesures de périmètre brachial. Les seuils de périmètre brachial varient selon la population : seuils OMS/UNICEF pour les enfants de 6 à 59 mois, fondés sur le z-score pour les enfants d''âge scolaire et adolescents, seuils Sphere pour les femmes enceintes et allaitantes. Requise dès que acute_malnutrition_status est renseigné à partir d''une mesure de périmètre brachial.'
      es: 'La regla de corte específica para la población utilizada para clasificar la desnutrición aguda a partir de las mediciones del perímetro braquial. Los cortes de perímetro braquial difieren por población: umbrales OMS/UNICEF para niños de 6 a 59 meses, basados en puntaje z para niños en edad escolar y adolescentes, umbrales Sphere para mujeres embarazadas y lactantes. Requerida siempre que se complete acute_malnutrition_status a partir de una medición del perímetro braquial.'
    slot_uri: aidops:muac_cutoff_rule
    range: CutoffRule
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology", "who-muac-cutoffs"], "cardinality": "single", "core": true, "definition": {"en": "The population-specific cutoff rule used to classify acute malnutrition from MUAC measurements. MUAC cutoffs differ by population: WHO/UNICEF thresholds for children 6-59 months, z-score based for school-age children and adolescents, Sphere thresholds for pregnant and lactating women. Required whenever acute_malnutrition_status is populated from a MUAC measurement.", "es": "La regla de corte espec\u00edfica para la poblaci\u00f3n utilizada para clasificar la desnutrici\u00f3n aguda a partir de las mediciones del per\u00edmetro braquial. Los cortes de per\u00edmetro braquial difieren por poblaci\u00f3n: umbrales OMS/UNICEF para ni\u00f1os de 6 a 59 meses, basados en puntaje z para ni\u00f1os en edad escolar y adolescentes, umbrales Sphere para mujeres embarazadas y lactantes. Requerida siempre que se complete acute_malnutrition_status a partir de una medici\u00f3n del per\u00edmetro braquial.", "fr": "La r\u00e8gle de seuil sp\u00e9cifique \u00e0 la population utilis\u00e9e pour classer la malnutrition aigu\u00eb \u00e0 partir des mesures de p\u00e9rim\u00e8tre brachial. Les seuils de p\u00e9rim\u00e8tre brachial varient selon la population : seuils OMS/UNICEF pour les enfants de 6 \u00e0 59 mois, fond\u00e9s sur le z-score pour les enfants d''\u00e2ge scolaire et adolescents, seuils Sphere pour les femmes enceintes et allaitantes. Requise d\u00e8s que acute_malnutrition_status est renseign\u00e9 \u00e0 partir d''une mesure de p\u00e9rim\u00e8tre brachial."}, "id": "muac_cutoff_rule", "label": {"en": "MUAC cutoff rule", "es": "Regla de corte PB", "fr": "R\u00e8gle de seuil PB"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["smart"], "vocabulary": "cutoff-rule"}'
      bibliography_refs: smart-methodology,who-muac-cutoffs
  nearest_facility_distance_km:
    title:
      en: Distance to nearest health facility (km)
      fr: Distance jusqu'à l'établissement de santé le plus proche (km)
      es: Distancia al establecimiento de salud más cercano (km)
    description:
      en: Straight-line or usual-route distance in kilometres from the household's dwelling to the nearest health facility (clinic, health post, or hospital) the household would use for routine care. Sphere Handbook 2018 sets the normative minimum at one facility within 5 km of the affected population; UNHCR emergency standards apply the same benchmark to refugee or IDP contexts. When the household can only estimate travel time, the enumerator may convert using a 5 km/h walking speed; `nearest_facility_travel_time_min` is captured in parallel as a more respondent-reliable measure.
      fr: Distance en ligne droite ou selon l'itinéraire habituel en kilomètres entre le logement du ménage et l'établissement de santé le plus proche (clinique, poste de santé ou hôpital) que le ménage utiliserait pour des soins courants. Le Sphere Handbook 2018 fixe le minimum normatif à un établissement à moins de 5 km de la population affectée ; les normes d'urgence du HCR appliquent le même repère aux contextes de réfugiés ou de PDI. Lorsque le ménage ne peut qu'estimer le temps de trajet, l'enquêteur peut convertir en utilisant une vitesse de marche de 5 km/h ; `nearest_facility_travel_time_min` est saisi en parallèle comme mesure plus fiable pour le répondant.
      es: Distancia en línea recta o por la ruta habitual en kilómetros desde la vivienda del hogar hasta el establecimiento de salud más cercano (clínica, puesto de salud u hospital) que el hogar usaría para atención rutinaria. El Sphere Handbook 2018 fija el mínimo normativo en un establecimiento a menos de 5 km de la población afectada; los estándares de emergencia de ACNUR aplican la misma referencia a contextos de refugiados o PDI. Cuando el hogar solo puede estimar el tiempo de viaje, el encuestador puede convertir usando una velocidad de caminata de 5 km/h; `nearest_facility_travel_time_min` se captura en paralelo como medida más fiable para el encuestado.
    slot_uri: aidops:nearest_facility_distance_km
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018", "unhcr-phc-coverage-standard"], "cardinality": "single", "category": "health_access_geography", "core": true, "definition": {"en": "Straight-line or usual-route distance in kilometres from the household''s dwelling to the nearest health facility (clinic, health post, or hospital) the household would use for routine care. Sphere Handbook 2018 sets the normative minimum at one facility within 5 km of the affected population; UNHCR emergency standards apply the same benchmark to refugee or IDP contexts. When the household can only estimate travel time, the enumerator may convert using a 5 km/h walking speed; `nearest_facility_travel_time_min` is captured in parallel as a more respondent-reliable measure.", "es": "Distancia en l\u00ednea recta o por la ruta habitual en kil\u00f3metros desde la vivienda del hogar hasta el establecimiento de salud m\u00e1s cercano (cl\u00ednica, puesto de salud u hospital) que el hogar usar\u00eda para atenci\u00f3n rutinaria. El Sphere Handbook 2018 fija el m\u00ednimo normativo en un establecimiento a menos de 5 km de la poblaci\u00f3n afectada; los est\u00e1ndares de emergencia de ACNUR aplican la misma referencia a contextos de refugiados o PDI. Cuando el hogar solo puede estimar el tiempo de viaje, el encuestador puede convertir usando una velocidad de caminata de 5 km/h; `nearest_facility_travel_time_min` se captura en paralelo como medida m\u00e1s fiable para el encuestado.", "fr": "Distance en ligne droite ou selon l''itin\u00e9raire habituel en kilom\u00e8tres entre le logement du m\u00e9nage et l''\u00e9tablissement de sant\u00e9 le plus proche (clinique, poste de sant\u00e9 ou h\u00f4pital) que le m\u00e9nage utiliserait pour des soins courants. Le Sphere Handbook 2018 fixe le minimum normatif \u00e0 un \u00e9tablissement \u00e0 moins de 5 km de la population affect\u00e9e ; les normes d''urgence du HCR appliquent le m\u00eame rep\u00e8re aux contextes de r\u00e9fugi\u00e9s ou de PDI. Lorsque le m\u00e9nage ne peut qu''estimer le temps de trajet, l''enqu\u00eateur peut convertir en utilisant une vitesse de marche de 5 km/h ; `nearest_facility_travel_time_min` est saisi en parall\u00e8le comme mesure plus fiable pour le r\u00e9pondant."}, "id": "nearest_facility_distance_km", "label": {"en": "Distance to nearest health facility (km)", "es": "Distancia al establecimiento de salud m\u00e1s cercano (km)", "fr": "Distance jusqu''\u00e0 l''\u00e9tablissement de sant\u00e9 le plus proche (km)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "vocabulary": null}'
      bibliography_refs: sphere-2018,unhcr-phc-coverage-standard
  nearest_facility_transport_mode:
    title:
      en: Most common transport mode to the nearest health facility
      fr: Mode de transport le plus courant jusqu'à l'établissement de santé le plus proche
      es: Modo de transporte más común al establecimiento de salud más cercano
    description:
      en: The most common way the household travels to the nearest health facility under routine conditions. Relevant to understanding both travel time and the cash cost of a care episode. Routine reliance on `ambulance_or_emergency` indicates poor routine access.
      fr: Le moyen le plus courant par lequel le ménage se rend à l'établissement de santé le plus proche dans des conditions habituelles. Pertinent pour comprendre à la fois le temps de trajet et le coût en espèces d'un épisode de soins. Un recours habituel à `ambulance_or_emergency` indique un accès de routine médiocre.
      es: La forma más común en que el hogar se traslada al establecimiento de salud más cercano en condiciones habituales. Relevante para comprender tanto el tiempo de viaje como el costo en efectivo de un episodio de atención. La dependencia habitual de `ambulance_or_emergency` indica un acceso rutinario deficiente.
    slot_uri: aidops:nearest_facility_transport_mode
    range: TransportModeToFacility
    annotations:
