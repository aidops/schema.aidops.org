      es: 'Viñeta del Índice de Autonomía Relativa (RAI) que mide la motivación introyectada: en qué medida el encuestado se identifica con una persona que usa sus ingresos de la manera en que su familia o comunidad espera, sin que se lo digan. Una de las tres viñetas requeridas del pro-WEAI para el Indicador A1 (autonomía en los ingresos). Ponderación RAI: −1. La adecuación para A1 se calcula a partir de la suma ponderada de las tres viñetas (RAI ≥ 1).'
