  warning_received:
    title:
      en: Warning received for hazard event
      fr: Alerte reçue pour l'événement dangereux
      es: Alerta recibida para el evento de peligro
    description:
      en: 'Whether the household received any warning, alert, or notice that the reference hazard event was coming or likely to happen. Asked at household level with recall of the most recent hazard event affecting the household in the last twelve months. Gating item for modules C, D, and E: if the answer is no or don''t know, comprehension, action, and barrier items are skipped and the respondent jumps directly to the reflection items (G1, G2).'
      fr: 'Indique si le ménage a reçu une quelconque alerte, avertissement ou avis indiquant que l''événement dangereux de référence allait survenir ou était probable. Posé au niveau du ménage avec rappel de l''événement dangereux le plus récent ayant affecté le ménage au cours des douze derniers mois. Item de filtrage pour les modules C, D et E : si la réponse est non ou ne sait pas, les items de compréhension, d''action et d''obstacles sont ignorés et le répondant passe directement aux items de réflexion (G1, G2).'
      es: 'Indica si el hogar recibió alguna alerta, aviso o notificación de que el evento de peligro de referencia iba a ocurrir o era probable. Preguntado a nivel del hogar con recuerdo del evento de peligro más reciente que afectó al hogar en los últimos doce meses. Ítem de filtro para los módulos C, D y E: si la respuesta es no o no sabe, se omiten los ítems de comprensión, acción y barreras y el respondiente pasa directamente a los ítems de reflexión (G1, G2).'
    slot_uri: aidops:warning_received
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "undrr-sendai-target-g", "wmo-mhews-checklist-2018"], "cardinality": "single", "category": "hazard_event", "core": true, "definition": {"en": "Whether the household received any warning, alert, or notice that the reference hazard event was coming or likely to happen. Asked at household level with recall of the most recent hazard event affecting the household in the last twelve months. Gating item for modules C, D, and E: if the answer is no or don''t know, comprehension, action, and barrier items are skipped and the respondent jumps directly to the reflection items (G1, G2).", "es": "Indica si el hogar recibi\u00f3 alguna alerta, aviso o notificaci\u00f3n de que el evento de peligro de referencia iba a ocurrir o era probable. Preguntado a nivel del hogar con recuerdo del evento de peligro m\u00e1s reciente que afect\u00f3 al hogar en los \u00faltimos doce meses. \u00cdtem de filtro para los m\u00f3dulos C, D y E: si la respuesta es no o no sabe, se omiten los \u00edtems de comprensi\u00f3n, acci\u00f3n y barreras y el respondiente pasa directamente a los \u00edtems de reflexi\u00f3n (G1, G2).", "fr": "Indique si le m\u00e9nage a re\u00e7u une quelconque alerte, avertissement ou avis indiquant que l''\u00e9v\u00e9nement dangereux de r\u00e9f\u00e9rence allait survenir ou \u00e9tait probable. Pos\u00e9 au niveau du m\u00e9nage avec rappel de l''\u00e9v\u00e9nement dangereux le plus r\u00e9cent ayant affect\u00e9 le m\u00e9nage au cours des douze derniers mois. Item de filtrage pour les modules C, D et E : si la r\u00e9ponse est non ou ne sait pas, les items de compr\u00e9hension, d''action et d''obstacles sont ignor\u00e9s et le r\u00e9pondant passe directement aux items de r\u00e9flexion (G1, G2)."}, "id": "warning_received", "label": {"en": "Warning received for hazard event", "es": "Alerta recibida para el evento de peligro", "fr": "Alerte re\u00e7ue pour l''\u00e9v\u00e9nement dangereux"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "yes-no-dk"}'
