      es: 'Si al niño se le administraron sales de rehidratación oral (SRO) de un sobre o solución preenvasada para tratar la diarrea. Redacción publicada: ''¿Se le administraron a (nombre) sales de rehidratación oral — SRO — de un sobre o paquete para tratar la diarrea?'' Indicador conjunto clave OMS/UNICEF para el manejo apropiado de la diarrea (SRO + zinc). Preguntar solo si diarrhea_last_2wks es verdadero. Código DHS h13; código MICS CD5.'
