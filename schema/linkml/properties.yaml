  school_management_type:
    title:
      en: School management type
      fr: Type de gestion scolaire
      es: Tipo de gestión escolar
    description:
      en: 'The institutional sector responsible for managing and funding the school the child currently attends. Recorded as a child-level property (Phase 1); a School reference entity is a future consideration. Ask only if attended_current_year is Yes. Source: UNESCO UIS ISCED-P 2011 institutional sector categories as adapted in MICS household education modules and EMIS data systems.'
      fr: 'Le secteur institutionnel responsable de la gestion et du financement de l''école que l''enfant fréquente actuellement. Enregistré comme propriété au niveau de l''enfant (Phase 1) ; une entité de référence École est une considération future. À poser uniquement si attended_current_year est Oui. Source : catégories sectorielles institutionnelles ISCED-P 2011 de l''ISU de l''UNESCO telles qu''adaptées dans les modules d''éducation ménage MICS et les systèmes EMIS.'
      es: 'El sector institucional responsable de la gestión y financiamiento de la escuela a la que el niño asiste actualmente. Registrado como propiedad a nivel del niño (Fase 1); una entidad de referencia de Escuela es una consideración futura. Preguntar solo si attended_current_year es Sí. Fuente: categorías del sector institucional CINE-P 2011 del IEU de la UNESCO adaptadas en los módulos de educación del hogar MICS y sistemas EMIS.'
    slot_uri: aidops:school_management_type
    range: SchoolManagementType
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["child_5_17"], "bibliography_refs": ["mics-education"], "cardinality": "single", "category": "education", "core": true, "definition": {"en": "The institutional sector responsible for managing and funding the school the child currently attends. Recorded as a child-level property (Phase 1); a School reference entity is a future consideration. Ask only if attended_current_year is Yes. Source: UNESCO UIS ISCED-P 2011 institutional sector categories as adapted in MICS household education modules and EMIS data systems.", "es": "El sector institucional responsable de la gesti\u00f3n y financiamiento de la escuela a la que el ni\u00f1o asiste actualmente. Registrado como propiedad a nivel del ni\u00f1o (Fase 1); una entidad de referencia de Escuela es una consideraci\u00f3n futura. Preguntar solo si attended_current_year es S\u00ed. Fuente: categor\u00edas del sector institucional CINE-P 2011 del IEU de la UNESCO adaptadas en los m\u00f3dulos de educaci\u00f3n del hogar MICS y sistemas EMIS.", "fr": "Le secteur institutionnel responsable de la gestion et du financement de l''\u00e9cole que l''enfant fr\u00e9quente actuellement. Enregistr\u00e9 comme propri\u00e9t\u00e9 au niveau de l''enfant (Phase 1) ; une entit\u00e9 de r\u00e9f\u00e9rence \u00c9cole est une consid\u00e9ration future. \u00c0 poser uniquement si attended_current_year est Oui. Source : cat\u00e9gories sectorielles institutionnelles ISCED-P 2011 de l''ISU de l''UNESCO telles qu''adapt\u00e9es dans les modules d''\u00e9ducation m\u00e9nage MICS et les syst\u00e8mes EMIS."}, "id": "school_management_type", "label": {"en": "School management type", "es": "Tipo de gesti\u00f3n escolar", "fr": "Type de gestion scolaire"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "school-management-type"}'
