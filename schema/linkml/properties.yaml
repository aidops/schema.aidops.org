  cm_children_under_18_married:
    title:
      en: Any under-18 in household married or in union
      fr: Un mineur dans le ménage marié ou en union
      es: Algún menor en el hogar casado o en unión
    description:
      en: 'Household-level flag: whether any person in the household under the age of 18 is currently married or living with a partner as if married. Not a verbatim MICS item; derivable from Person.age and Person.marital_status in the household roster (HL) when available. MICS 6 measures child marriage retrospectively via the MA module on women/men 15-49; this profile carries only the household-level flag. Recommend: derive from the household roster if available; ask as fallback. SDG 5.3.1 metadata covers both formal marriage and informal union equally.'
      fr: 'Indicateur au niveau ménage : s''il y a, dans le ménage, une personne de moins de 18 ans actuellement mariée ou vivant avec un partenaire comme si elle était mariée. Pas un item verbatim MICS ; dérivable de Person.age et Person.marital_status dans le roster du ménage (HL) lorsque disponible. MICS 6 mesure le mariage d''enfants rétrospectivement via le module MA pour les femmes/hommes 15-49 ; ce profil ne porte que l''indicateur ménage. Recommandation : dériver du roster si disponible ; poser la question en repli. Les métadonnées ODD 5.3.1 couvrent à la fois le mariage formel et l''union informelle.'
      es: 'Indicador a nivel de hogar: si hay alguna persona en el hogar menor de 18 años actualmente casada o viviendo con una pareja como si estuviera casada. No es un ítem verbatim MICS; derivable de Person.age y Person.marital_status en el roster del hogar (HL) cuando esté disponible. MICS 6 mide el matrimonio infantil retrospectivamente mediante el módulo MA en mujeres/hombres 15-49; este perfil solo lleva el indicador a nivel de hogar. Recomendación: derivar del roster si está disponible; preguntar como respaldo. Los metadatos ODS 5.3.1 cubren tanto el matrimonio formal como la unión informal.'
    slot_uri: aidops:cm_children_under_18_married
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["mics6-child-protection", "sdg-5-3-1-metadata"], "cardinality": "single", "category": "child_marriage", "core": true, "definition": {"en": "Household-level flag: whether any person in the household under the age of 18 is currently married or living with a partner as if married. Not a verbatim MICS item; derivable from Person.age and Person.marital_status in the household roster (HL) when available. MICS 6 measures child marriage retrospectively via the MA module on women/men 15-49; this profile carries only the household-level flag. Recommend: derive from the household roster if available; ask as fallback. SDG 5.3.1 metadata covers both formal marriage and informal union equally.", "es": "Indicador a nivel de hogar: si hay alguna persona en el hogar menor de 18 a\u00f1os actualmente casada o viviendo con una pareja como si estuviera casada. No es un \u00edtem verbatim MICS; derivable de Person.age y Person.marital_status en el roster del hogar (HL) cuando est\u00e9 disponible. MICS 6 mide el matrimonio infantil retrospectivamente mediante el m\u00f3dulo MA en mujeres/hombres 15-49; este perfil solo lleva el indicador a nivel de hogar. Recomendaci\u00f3n: derivar del roster si est\u00e1 disponible; preguntar como respaldo. Los metadatos ODS 5.3.1 cubren tanto el matrimonio formal como la uni\u00f3n informal.", "fr": "Indicateur au niveau m\u00e9nage : s''il y a, dans le m\u00e9nage, une personne de moins de 18 ans actuellement mari\u00e9e ou vivant avec un partenaire comme si elle \u00e9tait mari\u00e9e. Pas un item verbatim MICS ; d\u00e9rivable de Person.age et Person.marital_status dans le roster du m\u00e9nage (HL) lorsque disponible. MICS 6 mesure le mariage d''enfants r\u00e9trospectivement via le module MA pour les femmes/hommes 15-49 ; ce profil ne porte que l''indicateur m\u00e9nage. Recommandation : d\u00e9river du roster si disponible ; poser la question en repli. Les m\u00e9tadonn\u00e9es ODD 5.3.1 couvrent \u00e0 la fois le mariage formel et l''union informelle."}, "id": "cm_children_under_18_married", "label": {"en": "Any under-18 in household married or in union", "es": "Alg\u00fan menor en el hogar casado o en uni\u00f3n", "fr": "Un mineur dans le m\u00e9nage mari\u00e9 ou en union"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
