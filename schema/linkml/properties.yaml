  rule_of_law_perception:
    title:
      en: Rule of law perception (household)
      fr: Perception de l'état de droit (ménage)
      es: Percepción del estado de derecho (hogar)
    description:
      en: 'Whether the household feels that the laws and rules governing their area treat all people fairly regardless of who they are. Four-point agreement scale without a neutral midpoint to reduce fence-sitting. OQ-8 decision: created new agree-4 vocabulary rather than reusing weai-agree-5 (5-point, WEAI-specific). Context-specific item; most useful in post-conflict and transitional settings. Could be misused to profile households by political allegiance in sensitive contexts — aggregate before reporting. Based on OHCHR Rule-of-Law Indicators (2011) legitimacy dimension; REACH Syria (2022) rule-of-law module; GPC PAF Domain 2.'
      fr: 'Si le ménage estime que les lois et règles régissant leur zone traitent toutes les personnes équitablement, indépendamment de leur identité. Échelle d''accord à quatre points sans point médian neutre pour réduire les réponses de compromis. Décision OQ-8 : création d''un nouveau vocabulaire agree-4 plutôt que réutilisation de weai-agree-5 (5 points, spécifique au WEAI). Item spécifique au contexte ; le plus utile dans les contextes post-conflit et de transition. Pourrait être utilisé à mauvais escient pour profiler les ménages selon leur allégeance politique dans des contextes sensibles — agréger avant de communiquer. Fondé sur la dimension légitimité des Indicateurs d''état de droit HCDH (2011) ; REACH Syrie (2022) module état de droit ; GPC PAF Domaine 2.'
      es: 'Si el hogar siente que las leyes y normas que rigen su área tratan a todas las personas de manera justa independientemente de quiénes sean. Escala de acuerdo de cuatro puntos sin punto medio neutral para reducir las respuestas de término medio. Decisión OQ-8: se creó el nuevo vocabulario agree-4 en lugar de reutilizar weai-agree-5 (5 puntos, específico de WEAI). Ítem específico del contexto; más útil en entornos posconflicto y de transición. Podría usarse indebidamente para perfilar hogares por lealtad política en contextos sensibles — agregar antes de reportar. Basado en la dimensión de legitimidad de los Indicadores del Estado de Derecho del ACNUDH (2011); módulo de estado de derecho de REACH Siria (2022); GPC PAF Dominio 2.'
    slot_uri: aidops:rule_of_law_perception
    range: Agree4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "ohchr-rule-of-law-indicators-2011", "reach-protection-monitoring-2022"], "cardinality": "single", "category": "access_to_justice", "core": false, "definition": {"en": "Whether the household feels that the laws and rules governing their area treat all people fairly regardless of who they are. Four-point agreement scale without a neutral midpoint to reduce fence-sitting. OQ-8 decision: created new agree-4 vocabulary rather than reusing weai-agree-5 (5-point, WEAI-specific). Context-specific item; most useful in post-conflict and transitional settings. Could be misused to profile households by political allegiance in sensitive contexts \u2014 aggregate before reporting. Based on OHCHR Rule-of-Law Indicators (2011) legitimacy dimension; REACH Syria (2022) rule-of-law module; GPC PAF Domain 2.", "es": "Si el hogar siente que las leyes y normas que rigen su \u00e1rea tratan a todas las personas de manera justa independientemente de qui\u00e9nes sean. Escala de acuerdo de cuatro puntos sin punto medio neutral para reducir las respuestas de t\u00e9rmino medio. Decisi\u00f3n OQ-8: se cre\u00f3 el nuevo vocabulario agree-4 en lugar de reutilizar weai-agree-5 (5 puntos, espec\u00edfico de WEAI). \u00cdtem espec\u00edfico del contexto; m\u00e1s \u00fatil en entornos posconflicto y de transici\u00f3n. Podr\u00eda usarse indebidamente para perfilar hogares por lealtad pol\u00edtica en contextos sensibles \u2014 agregar antes de reportar. Basado en la dimensi\u00f3n de legitimidad de los Indicadores del Estado de Derecho del ACNUDH (2011); m\u00f3dulo de estado de derecho de REACH Siria (2022); GPC PAF Dominio 2.", "fr": "Si le m\u00e9nage estime que les lois et r\u00e8gles r\u00e9gissant leur zone traitent toutes les personnes \u00e9quitablement, ind\u00e9pendamment de leur identit\u00e9. \u00c9chelle d''accord \u00e0 quatre points sans point m\u00e9dian neutre pour r\u00e9duire les r\u00e9ponses de compromis. D\u00e9cision OQ-8 : cr\u00e9ation d''un nouveau vocabulaire agree-4 plut\u00f4t que r\u00e9utilisation de weai-agree-5 (5 points, sp\u00e9cifique au WEAI). Item sp\u00e9cifique au contexte ; le plus utile dans les contextes post-conflit et de transition. Pourrait \u00eatre utilis\u00e9 \u00e0 mauvais escient pour profiler les m\u00e9nages selon leur all\u00e9geance politique dans des contextes sensibles \u2014 agr\u00e9ger avant de communiquer. Fond\u00e9 sur la dimension l\u00e9gitimit\u00e9 des Indicateurs d''\u00e9tat de droit HCDH (2011) ; REACH Syrie (2022) module \u00e9tat de droit ; GPC PAF Domaine 2."}, "id": "rule_of_law_perception", "label": {"en": "Rule of law perception (household)", "es": "Percepci\u00f3n del estado de derecho (hogar)", "fr": "Perception de l''\u00e9tat de droit (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "agree-4"}'
      bibliography_refs: gpc-paf-2021,ohchr-rule-of-law-indicators-2011,reach-protection-monitoring-2022
  sanitation_facility_condition:
    title:
      en: Sanitation facility condition
      fr: État de l'installation sanitaire
      es: Condición de la instalación sanitaria
    description:
      en: Observed condition of the toilet or latrine facility. Recorded by enumerator observation rather than self-report. Sphere minimum standards require that toilet facilities are clean, private, and safely sited. Skip if sanitation_facility is open_defecation.
      fr: État observé des toilettes ou de la latrine. Enregistré par observation de l'énumérateur plutôt que par auto-déclaration. Les normes minimales Sphère exigent que les installations sanitaires soient propres, privées et situées en lieu sûr. À sauter si sanitation_facility est open_defecation.
      es: Condición observada del inodoro o instalación de letrina. Registrada por observación del enumerador en lugar de autodeclaración. Los estándares mínimos de Esfera exigen que las instalaciones sanitarias estén limpias, sean privadas y estén ubicadas de forma segura. Omitir si sanitation_facility es open_defecation.
    slot_uri: aidops:sanitation_facility_condition
    range: SanitationFacilityCondition
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "sanitation", "core": false, "definition": {"en": "Observed condition of the toilet or latrine facility. Recorded by enumerator observation rather than self-report. Sphere minimum standards require that toilet facilities are clean, private, and safely sited. Skip if sanitation_facility is open_defecation.", "es": "Condici\u00f3n observada del inodoro o instalaci\u00f3n de letrina. Registrada por observaci\u00f3n del enumerador en lugar de autodeclaraci\u00f3n. Los est\u00e1ndares m\u00ednimos de Esfera exigen que las instalaciones sanitarias est\u00e9n limpias, sean privadas y est\u00e9n ubicadas de forma segura. Omitir si sanitation_facility es open_defecation.", "fr": "\u00c9tat observ\u00e9 des toilettes ou de la latrine. Enregistr\u00e9 par observation de l''\u00e9num\u00e9rateur plut\u00f4t que par auto-d\u00e9claration. Les normes minimales Sph\u00e8re exigent que les installations sanitaires soient propres, priv\u00e9es et situ\u00e9es en lieu s\u00fbr. \u00c0 sauter si sanitation_facility est open_defecation."}, "id": "sanitation_facility_condition", "label": {"en": "Sanitation facility condition", "es": "Condici\u00f3n de la instalaci\u00f3n sanitaria", "fr": "\u00c9tat de l''installation sanitaire"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["erwg_wash_hh", "sphere_2018"], "vocabulary": "sanitation-facility-condition"}'
