    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019", "practical-action-v2r-2016"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select maladaptation signal asking whether the household has sold important productive assets \u2014 such as livestock, land, tools, or equipment \u2014 specifically because of losses caused by drought, flood, or another climate hazard in the past 5 years. A ''yes'' response indicates depletion of productive capital through distress coping, which erodes future adaptive capacity. Boundary with LivelihoodProfile.productive_asset_loss_since_crisis: that item asks about asset loss since a displacement or crisis event (general trigger). Boundary with FoodSecurityProfile.lcs_sold_productive_assets (WFP LCS): that item is a 30-day food-access coping indicator. This item is specifically anchored to climate-hazard causality and a 5-year window to capture repeated maladaptive cycles. Valid codes: yes_repeatedly / yes_once / no / not_applicable_no_assets.\n", "es": "Se\u00f1al de maladaptaci\u00f3n de selecci\u00f3n \u00fanica que pregunta si el hogar ha vendido activos productivos importantes espec\u00edficamente por p\u00e9rdidas causadas por sequ\u00eda, inundaciones u otro peligro clim\u00e1tico en los \u00faltimos 5 a\u00f1os. L\u00edmite con LivelihoodProfile y FoodSecurityProfile: este \u00edtem est\u00e1 anclado a la causalidad del peligro clim\u00e1tico con una ventana de 5 a\u00f1os para capturar ciclos de maladaptaci\u00f3n repetidos.\n", "fr": "Signal de maladaptation \u00e0 s\u00e9lection unique demandant si le m\u00e9nage a vendu des actifs productifs importants sp\u00e9cifiquement \u00e0 cause de pertes caus\u00e9es par la s\u00e9cheresse, les inondations ou un autre al\u00e9a climatique au cours des 5 derni\u00e8res ann\u00e9es. Fronti\u00e8re avec LivelihoodProfile et FoodSecurityProfile : cet item est ancr\u00e9 \u00e0 la causalit\u00e9 d''al\u00e9a climatique sur 5 ans pour capturer des cycles de maladaptation r\u00e9p\u00e9t\u00e9s.\n"}, "id": "climate_productive_asset_sales_past_event", "label": {"en": "Sold productive assets due to climate hazard losses in the past 5 years", "es": "Venta de activos productivos por p\u00e9rdidas de peligros clim\u00e1ticos en los \u00faltimos 5 a\u00f1os", "fr": "Vente d''actifs productifs due \u00e0 des pertes caus\u00e9es par des al\u00e9as climatiques au cours des 5 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
