      es: Calificación general de severidad (reportada por la comunidad)
    description:
      en: 'Community-reported overall severity rating on the JIAF 2.0 five-point Likert scale: ''minimal'' (level 1, None/Minimal), ''stress'' (level 2, Stress), ''severe'' (level 3, Severe), ''extreme'' (level 4, Extreme), ''catastrophic'' (level 5, Catastrophic). Captures the community''s self-reported perception of overall severity rather than the JIAF analyst''s composite score; the two are different layers of the same framework, and this profile supplies one of the inputs to the JIAF composite. Encoded with the needs-severity-5 vocabulary.'
      fr: 'Évaluation globale de la sévérité rapportée par la communauté sur l''échelle Likert à cinq niveaux du JIAF 2.0 : 1 (aucun / minime), 2 (stress), 3 (sévère), 4 (extrême), 5 (catastrophique). Saisit la perception auto-déclarée par la communauté de la sévérité globale, plutôt que le score composite de l''analyste JIAF ; il s''agit de couches différentes du même cadre, et ce profil fournit l''une des entrées du score composite JIAF. Codée avec la taxonomie needs-severity-5.'
      es: 'Calificación general de severidad reportada por la comunidad en la escala Likert de cinco niveles del JIAF 2.0: 1 (ninguna/mínima), 2 (estrés), 3 (severa), 4 (extrema), 5 (catastrófica). Capta la percepción autorreportada por la comunidad de la severidad global, en lugar del puntaje compuesto del analista JIAF; son capas distintas del mismo marco, y este perfil aporta una de las entradas al puntaje compuesto JIAF. Codificada con la taxonomía needs-severity-5.'
    slot_uri: aidops:cn_severity_overall_rating
    range: NeedsSeverity5
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-jiaf-2022"], "cardinality": "single", "category": "scores", "core": true, "definition": {"en": "Community-reported overall severity rating on the JIAF 2.0 five-point Likert scale: ''minimal'' (level 1, None/Minimal), ''stress'' (level 2, Stress), ''severe'' (level 3, Severe), ''extreme'' (level 4, Extreme), ''catastrophic'' (level 5, Catastrophic). Captures the community''s self-reported perception of overall severity rather than the JIAF analyst''s composite score; the two are different layers of the same framework, and this profile supplies one of the inputs to the JIAF composite. Encoded with the needs-severity-5 vocabulary.", "es": "Calificaci\u00f3n general de severidad reportada por la comunidad en la escala Likert de cinco niveles del JIAF 2.0: 1 (ninguna/m\u00ednima), 2 (estr\u00e9s), 3 (severa), 4 (extrema), 5 (catastr\u00f3fica). Capta la percepci\u00f3n autorreportada por la comunidad de la severidad global, en lugar del puntaje compuesto del analista JIAF; son capas distintas del mismo marco, y este perfil aporta una de las entradas al puntaje compuesto JIAF. Codificada con la taxonom\u00eda needs-severity-5.", "fr": "\u00c9valuation globale de la s\u00e9v\u00e9rit\u00e9 rapport\u00e9e par la communaut\u00e9 sur l''\u00e9chelle Likert \u00e0 cinq niveaux du JIAF 2.0 : 1 (aucun / minime), 2 (stress), 3 (s\u00e9v\u00e8re), 4 (extr\u00eame), 5 (catastrophique). Saisit la perception auto-d\u00e9clar\u00e9e par la communaut\u00e9 de la s\u00e9v\u00e9rit\u00e9 globale, plut\u00f4t que le score composite de l''analyste JIAF ; il s''agit de couches diff\u00e9rentes du m\u00eame cadre, et ce profil fournit l''une des entr\u00e9es du score composite JIAF. Cod\u00e9e avec la taxonomie needs-severity-5."}, "id": "cn_severity_overall_rating", "label": {"en": "Overall severity rating (community-reported)", "es": "Calificaci\u00f3n general de severidad (reportada por la comunidad)", "fr": "\u00c9valuation globale de la s\u00e9v\u00e9rit\u00e9 (rapport\u00e9e par la communaut\u00e9)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "needs-severity-5"}'
