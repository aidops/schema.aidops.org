  secondary_cooking_fuel:
    title:
      en: Secondary cooking fuel
      fr: Combustible de cuisson secondaire
      es: Combustible de cocción secundario
    description:
      en: 'The other fuel or energy source the household also uses for cooking (fuel stacking). Fuel stacking — using multiple fuels — is common in low-income settings and affects actual household air pollution (HAP) exposure and energy transition dynamics. Uses the same vocabulary as primary cooking fuel (PS cooking-fuel). Source: WHO/World Bank harmonized questionnaire Q4; MTF household survey.'
      fr: 'L''autre combustible ou source d''énergie que le ménage utilise aussi pour cuisiner (empilement de combustibles). L''empilement de combustibles — l''utilisation de plusieurs combustibles — est courant dans les ménages à faible revenu et affecte l''exposition réelle aux polluants atmosphériques intérieurs (HAP) et la dynamique de transition énergétique. Utilise le même vocabulaire que le combustible de cuisson principal (PS cooking-fuel). Source : questionnaire harmonisé OMS/Banque mondiale Q4 ; enquête ménage MTF.'
      es: 'El otro combustible o fuente de energía que el hogar también usa para cocinar (apilamiento de combustibles). El apilamiento de combustibles — el uso de múltiples combustibles — es común en entornos de bajos ingresos y afecta la exposición real a la contaminación del aire interior (HAP) y la dinámica de transición energética. Usa el mismo vocabulario que el combustible de cocción principal (PS cooking-fuel). Fuente: cuestionario armonizado OMS/Banco Mundial Q4; encuesta de hogares MTF.'
    slot_uri: aidops:secondary_cooking_fuel
    range: CookingFuel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "The other fuel or energy source the household also uses for cooking (fuel stacking). Fuel stacking \u2014 using multiple fuels \u2014 is common in low-income settings and affects actual household air pollution (HAP) exposure and energy transition dynamics. Uses the same vocabulary as primary cooking fuel (PS cooking-fuel). Source: WHO/World Bank harmonized questionnaire Q4; MTF household survey.", "es": "El otro combustible o fuente de energ\u00eda que el hogar tambi\u00e9n usa para cocinar (apilamiento de combustibles). El apilamiento de combustibles \u2014 el uso de m\u00faltiples combustibles \u2014 es com\u00fan en entornos de bajos ingresos y afecta la exposici\u00f3n real a la contaminaci\u00f3n del aire interior (HAP) y la din\u00e1mica de transici\u00f3n energ\u00e9tica. Usa el mismo vocabulario que el combustible de cocci\u00f3n principal (PS cooking-fuel). Fuente: cuestionario armonizado OMS/Banco Mundial Q4; encuesta de hogares MTF.", "fr": "L''autre combustible ou source d''\u00e9nergie que le m\u00e9nage utilise aussi pour cuisiner (empilement de combustibles). L''empilement de combustibles \u2014 l''utilisation de plusieurs combustibles \u2014 est courant dans les m\u00e9nages \u00e0 faible revenu et affecte l''exposition r\u00e9elle aux polluants atmosph\u00e9riques int\u00e9rieurs (HAP) et la dynamique de transition \u00e9nerg\u00e9tique. Utilise le m\u00eame vocabulaire que le combustible de cuisson principal (PS cooking-fuel). Source : questionnaire harmonis\u00e9 OMS/Banque mondiale Q4 ; enqu\u00eate m\u00e9nage MTF."}, "id": "secondary_cooking_fuel", "label": {"en": "Secondary cooking fuel", "es": "Combustible de cocci\u00f3n secundario", "fr": "Combustible de cuisson secondaire"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": "cooking-fuel"}'
      bibliography_refs: se4all-mtf,who-world-bank-core-energy-questions
  secondary_livelihood_activities:
    title:
      en: Secondary livelihood activities
      fr: Activités secondaires de subsistance
      es: Actividades secundarias de subsistencia
    description:
      en: Other activities the household relies on for income or food beyond its primary livelihood. Multi-select from the `livelihood-activity-category` vocabulary, with codes selected for `main_livelihood_activity` excluded from available responses. Drawn from the LSMS-ISA livelihood module and the Sphere 2018 Livelihoods chapter on diversified livelihood portfolios. Used to characterise the breadth of the household's livelihood strategy.
      fr: Autres activités sur lesquelles le ménage s'appuie pour ses revenus ou sa nourriture au-delà de son activité principale. Sélection multiple dans le vocabulaire `livelihood-activity-category`, avec les codes sélectionnés pour `main_livelihood_activity` exclus des réponses disponibles. Tirée du module des moyens de subsistance LSMS-ISA et du chapitre Moyens de subsistance de Sphère 2018 sur les portefeuilles diversifiés. Utilisée pour caractériser l'étendue de la stratégie de subsistance du ménage.
      es: Otras actividades en las que el hogar se apoya para ingresos o alimentos además de su actividad principal. Selección múltiple del vocabulario `livelihood-activity-category`, con los códigos seleccionados para `main_livelihood_activity` excluidos de las respuestas disponibles. Tomada del módulo de medios de vida LSMS-ISA y del capítulo de Medios de Vida de Esfera 2018 sobre carteras diversificadas. Se utiliza para caracterizar la amplitud de la estrategia de subsistencia del hogar.
    slot_uri: aidops:secondary_livelihood_activities
    range: LivelihoodActivityCategory
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Other activities the household relies on for income or food beyond its primary livelihood. Multi-select from the `livelihood-activity-category` vocabulary, with codes selected for `main_livelihood_activity` excluded from available responses. Drawn from the LSMS-ISA livelihood module and the Sphere 2018 Livelihoods chapter on diversified livelihood portfolios. Used to characterise the breadth of the household''s livelihood strategy.", "es": "Otras actividades en las que el hogar se apoya para ingresos o alimentos adem\u00e1s de su actividad principal. Selecci\u00f3n m\u00faltiple del vocabulario `livelihood-activity-category`, con los c\u00f3digos seleccionados para `main_livelihood_activity` excluidos de las respuestas disponibles. Tomada del m\u00f3dulo de medios de vida LSMS-ISA y del cap\u00edtulo de Medios de Vida de Esfera 2018 sobre carteras diversificadas. Se utiliza para caracterizar la amplitud de la estrategia de subsistencia del hogar.", "fr": "Autres activit\u00e9s sur lesquelles le m\u00e9nage s''appuie pour ses revenus ou sa nourriture au-del\u00e0 de son activit\u00e9 principale. S\u00e9lection multiple dans le vocabulaire `livelihood-activity-category`, avec les codes s\u00e9lectionn\u00e9s pour `main_livelihood_activity` exclus des r\u00e9ponses disponibles. Tir\u00e9e du module des moyens de subsistance LSMS-ISA et du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur les portefeuilles diversifi\u00e9s. Utilis\u00e9e pour caract\u00e9riser l''\u00e9tendue de la strat\u00e9gie de subsistance du m\u00e9nage."}, "id": "secondary_livelihood_activities", "label": {"en": "Secondary livelihood activities", "es": "Actividades secundarias de subsistencia", "fr": "Activit\u00e9s secondaires de subsistance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-activity-category"}'
      bibliography_refs: fao-rima-2016
  seed_source_main:
    title:
      en: Main source of seed or planting material (last season, main crop)
      fr: Principale source de semences ou de matériel de plantation (saison dernière, culture principale)
      es: Fuente principal de semilla o material de siembra (temporada pasada, cultivo principal)
    description:
      en: Where the household got most of the seed or planting material it used last season for its most important crop. Uses vocabulary `seed-source-type` (own-saved, purchased_market, purchased_agro_dealer, donor_ngo, donor_government, exchange_neighbor, other). Drawn from the FAO Standard Seed Security Assessment Household Survey question on seed source for the important crop and the LSMS-ISA agricultural-inputs module. Asked only when `hh_grew_crops_last_season` is `yes`. The distinction between formal and informal channels, and between humanitarian and commercial supply, is central to seed-security analysis.
      fr: Où le ménage a obtenu la plupart des semences ou du matériel de plantation utilisé la saison dernière pour sa culture la plus importante. Utilise le vocabulaire `seed-source-type` (semences propres, achat au marché, achat chez revendeur agréé, don ONG, don gouvernement, échange voisin, autre). Tirée de la question sur la source de semences pour la culture importante de l'Évaluation standard de la sécurité semencière de la FAO et du module des intrants agricoles du LSMS-ISA. Posée uniquement lorsque `hh_grew_crops_last_season` est `yes`. La distinction entre canaux formels et informels, et entre approvisionnement humanitaire et commercial, est centrale pour l'analyse de la sécurité semencière.
      es: Dónde obtuvo el hogar la mayor parte de la semilla o material de siembra que usó la temporada pasada para su cultivo más importante. Usa el vocabulario `seed-source-type` (propia guardada, comprada en mercado, comprada en agrodistribuidor, donada por ONG, donada por gobierno, intercambiada con vecino, otro). Tomada de la pregunta sobre fuente de semilla para el cultivo importante de la Evaluación Estándar de Seguridad Semillera de la FAO y del módulo de insumos agrícolas de LSMS-ISA. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`. La distinción entre canales formales e informales, y entre suministro humanitario y comercial, es central para el análisis de seguridad semillera.
    slot_uri: aidops:seed_source_main
    range: SeedSourceType
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Where the household got most of the seed or planting material it used last season for its most important crop. Uses vocabulary `seed-source-type` (own-saved, purchased_market, purchased_agro_dealer, donor_ngo, donor_government, exchange_neighbor, other). Drawn from the FAO Standard Seed Security Assessment Household Survey question on seed source for the important crop and the LSMS-ISA agricultural-inputs module. Asked only when `hh_grew_crops_last_season` is `yes`. The distinction between formal and informal channels, and between humanitarian and commercial supply, is central to seed-security analysis.", "es": "D\u00f3nde obtuvo el hogar la mayor parte de la semilla o material de siembra que us\u00f3 la temporada pasada para su cultivo m\u00e1s importante. Usa el vocabulario `seed-source-type` (propia guardada, comprada en mercado, comprada en agrodistribuidor, donada por ONG, donada por gobierno, intercambiada con vecino, otro). Tomada de la pregunta sobre fuente de semilla para el cultivo importante de la Evaluaci\u00f3n Est\u00e1ndar de Seguridad Semillera de la FAO y del m\u00f3dulo de insumos agr\u00edcolas de LSMS-ISA. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`. La distinci\u00f3n entre canales formales e informales, y entre suministro humanitario y comercial, es central para el an\u00e1lisis de seguridad semillera.", "fr": "O\u00f9 le m\u00e9nage a obtenu la plupart des semences ou du mat\u00e9riel de plantation utilis\u00e9 la saison derni\u00e8re pour sa culture la plus importante. Utilise le vocabulaire `seed-source-type` (semences propres, achat au march\u00e9, achat chez revendeur agr\u00e9\u00e9, don ONG, don gouvernement, \u00e9change voisin, autre). Tir\u00e9e de la question sur la source de semences pour la culture importante de l''\u00c9valuation standard de la s\u00e9curit\u00e9 semenci\u00e8re de la FAO et du module des intrants agricoles du LSMS-ISA. Pos\u00e9e uniquement lorsque `hh_grew_crops_last_season` est `yes`. La distinction entre canaux formels et informels, et entre approvisionnement humanitaire et commercial, est centrale pour l''analyse de la s\u00e9curit\u00e9 semenci\u00e8re."}, "id": "seed_source_main", "label": {"en": "Main source of seed or planting material (last season, main crop)", "es": "Fuente principal de semilla o material de siembra (temporada pasada, cultivo principal)", "fr": "Principale source de semences ou de mat\u00e9riel de plantation (saison derni\u00e8re, culture principale)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "seed-source-type"}'
  self_medication_first:
    title:
      en: Household tries self-medication or home remedies before formal care
      fr: Le ménage essaie l'automédication ou les remèdes maison avant les soins formels
      es: El hogar prueba automedicación o remedios caseros antes de la atención formal
    description:
      en: Whether the household usually tries home remedies or self-medication before seeking formal health care, captured on a four-level ordinal scale (`self-medication-frequency`). Self-medication as a first resort delays formal care-seeking and is a behavioral complement to the `pharmacy` code in `care-provider-type`.
      fr: Si le ménage essaie habituellement des remèdes maison ou l'automédication avant de chercher des soins formels, saisi sur une échelle ordinale à quatre niveaux (`self-medication-frequency`). L'automédication comme premier recours retarde la recherche de soins formels et constitue un complément comportemental au code `pharmacy` du vocabulaire `care-provider-type`.
      es: Si el hogar suele probar remedios caseros o automedicación antes de buscar atención formal, capturado en una escala ordinal de cuatro niveles (`self-medication-frequency`). La automedicación como primer recurso retrasa la búsqueda de atención formal y es un complemento conductual al código `pharmacy` en el vocabulario `care-provider-type`.
    slot_uri: aidops:self_medication_first
    range: SelfMedicationFrequency
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["paho-barriers-americas-2020"], "cardinality": "single", "category": "health_access_provider_preference", "core": false, "definition": {"en": "Whether the household usually tries home remedies or self-medication before seeking formal health care, captured on a four-level ordinal scale (`self-medication-frequency`). Self-medication as a first resort delays formal care-seeking and is a behavioral complement to the `pharmacy` code in `care-provider-type`.", "es": "Si el hogar suele probar remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal, capturado en una escala ordinal de cuatro niveles (`self-medication-frequency`). La automedicaci\u00f3n como primer recurso retrasa la b\u00fasqueda de atenci\u00f3n formal y es un complemento conductual al c\u00f3digo `pharmacy` en el vocabulario `care-provider-type`.", "fr": "Si le m\u00e9nage essaie habituellement des rem\u00e8des maison ou l''autom\u00e9dication avant de chercher des soins formels, saisi sur une \u00e9chelle ordinale \u00e0 quatre niveaux (`self-medication-frequency`). L''autom\u00e9dication comme premier recours retarde la recherche de soins formels et constitue un compl\u00e9ment comportemental au code `pharmacy` du vocabulaire `care-provider-type`."}, "id": "self_medication_first", "label": {"en": "Household tries self-medication or home remedies before formal care", "es": "El hogar prueba automedicaci\u00f3n o remedios caseros antes de la atenci\u00f3n formal", "fr": "Le m\u00e9nage essaie l''autom\u00e9dication ou les rem\u00e8des maison avant les soins formels"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "self-medication-frequency"}'
