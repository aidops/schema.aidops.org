      fr: Dépenses à la charge du ménage pour les médicaments (12 mois)
      es: Gasto de bolsillo en medicamentos (12 meses)
    description:
      en: Portion of out-of-pocket health expenditure spent on medicines and pharmaceuticals (prescription and over-the-counter) over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo`. Medicines are typically the largest OOP line item in LMIC and humanitarian settings.
      fr: Part des dépenses de santé à la charge du ménage consacrée aux médicaments (sur ordonnance et en vente libre) au cours des 12 derniers mois, en monnaie locale. Composante désagrégée de `oop_health_expenditure_12mo`. Les médicaments sont généralement le premier poste de dépenses directes des ménages dans les pays à revenu faible ou intermédiaire et les contextes humanitaires.
      es: Parte del gasto de bolsillo en salud dedicada a medicamentos (con y sin receta) en los últimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo`. Los medicamentos suelen ser el mayor componente del gasto de bolsillo en países de ingresos bajos y medios y en contextos humanitarios.
