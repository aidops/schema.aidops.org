  hlp_discrimination:
    title:
      en: HLP discrimination (household)
      fr: Discrimination LTP (ménage)
      es: Discriminación VTP (hogar)
    description:
      en: Whether the household has been denied access to housing, land, or property — or treated unfairly in a property matter — because of ethnicity, religion, origin, or any other characteristic in the past 6 months. A positive answer may constitute evidence of persecution. Handle raw data with the same care as asylum-related items. Based on Pinheiro Principles (2005) Principle 3 (non-discrimination); GPC PAF Domain 3; NRC HLP Handbook; REACH Syria (2022).
      fr: Si le ménage s'est vu refuser l'accès au logement, aux terres ou à la propriété — ou a été traité de manière injuste dans une affaire de propriété — en raison de son appartenance ethnique, de sa religion, de son origine ou de toute autre caractéristique au cours des 6 derniers mois. Une réponse positive peut constituer une preuve de persécution. Gérer les données brutes avec le même soin que les éléments liés à l'asile. Fondé sur les Principes Pinheiro (2005) Principe 3 (non-discrimination) ; GPC PAF Domaine 3 ; Manuel HLP du NRC ; REACH Syrie (2022).
      es: Si el hogar ha sido negado de acceso a vivienda, tierra o propiedad — o tratado injustamente en un asunto de propiedad — por su etnia, religión, origen u otra característica en los últimos 6 meses. Una respuesta positiva puede constituir evidencia de persecución. Manejar los datos brutos con el mismo cuidado que los elementos relacionados con el asilo. Basado en los Principios Pinheiro (2005) Principio 3 (no discriminación); GPC PAF Dominio 3; Manual HLP del NRC; REACH Siria (2022).
    slot_uri: aidops:hlp_discrimination
    range: YesNoPnta
    annotations:
