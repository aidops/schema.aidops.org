  climate_trend_perception_temperature:
    title:
      en: Perceived trend in temperatures over the past 10–15 years
      fr: Tendance perçue des températures au cours des 10–15 dernières années
      es: Tendencia percibida en las temperaturas durante los últimos 10–15 años
    description:
      en: Single-select item asking whether the respondent perceives temperatures in their area to have become hotter, cooler, or stayed about the same compared to 10–15 years ago. Uses the same climate-trend-perception vocabulary as climate_trend_perception_rainfall; for this item the directional codes read as hotter (much_increased = much hotter) and cooler (much_decreased = much cooler). Form Authors using XLSForm should apply item-level label overrides to display temperature-appropriate phrasing without creating a separate vocabulary (OQ-3 resolution). Requires a respondent who has lived in the area for at least 10 years.
      fr: Item à sélection unique demandant si le répondant perçoit que les températures dans sa région sont devenues plus chaudes, plus fraîches ou sont restées à peu près les mêmes par rapport à il y a 10 à 15 ans. Utilise le même vocabulaire climate-trend-perception que climate_trend_perception_rainfall ; les codes directionnels se lisent comme plus chaud (much_increased) ou plus frais (much_decreased). Les auteurs de formulaires XLSForm doivent appliquer des remplacements d'étiquettes au niveau de l'item pour afficher un libellé approprié à la température.
      es: Ítem de selección única que pregunta si el encuestado percibe que las temperaturas en su área se han vuelto más calientes, más frías o se han mantenido aproximadamente igual en comparación con hace 10 a 15 años. Usa el mismo vocabulario climate-trend-perception que climate_trend_perception_rainfall; los códigos direccionales se leen como más caliente (much_increased) o más frío (much_decreased). Los autores de formularios XLSForm deben aplicar reemplazos de etiquetas a nivel de ítem para mostrar el texto apropiado para temperatura.
    slot_uri: aidops:climate_trend_perception_temperature
    range: ClimateTrendPerception
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select item asking whether the respondent perceives temperatures in their area to have become hotter, cooler, or stayed about the same compared to 10\u201315 years ago. Uses the same climate-trend-perception vocabulary as climate_trend_perception_rainfall; for this item the directional codes read as hotter (much_increased = much hotter) and cooler (much_decreased = much cooler). Form Authors using XLSForm should apply item-level label overrides to display temperature-appropriate phrasing without creating a separate vocabulary (OQ-3 resolution). Requires a respondent who has lived in the area for at least 10 years.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el encuestado percibe que las temperaturas en su \u00e1rea se han vuelto m\u00e1s calientes, m\u00e1s fr\u00edas o se han mantenido aproximadamente igual en comparaci\u00f3n con hace 10 a 15 a\u00f1os. Usa el mismo vocabulario climate-trend-perception que climate_trend_perception_rainfall; los c\u00f3digos direccionales se leen como m\u00e1s caliente (much_increased) o m\u00e1s fr\u00edo (much_decreased). Los autores de formularios XLSForm deben aplicar reemplazos de etiquetas a nivel de \u00edtem para mostrar el texto apropiado para temperatura.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le r\u00e9pondant per\u00e7oit que les temp\u00e9ratures dans sa r\u00e9gion sont devenues plus chaudes, plus fra\u00eeches ou sont rest\u00e9es \u00e0 peu pr\u00e8s les m\u00eames par rapport \u00e0 il y a 10 \u00e0 15 ans. Utilise le m\u00eame vocabulaire climate-trend-perception que climate_trend_perception_rainfall ; les codes directionnels se lisent comme plus chaud (much_increased) ou plus frais (much_decreased). Les auteurs de formulaires XLSForm doivent appliquer des remplacements d''\u00e9tiquettes au niveau de l''item pour afficher un libell\u00e9 appropri\u00e9 \u00e0 la temp\u00e9rature.\n"}, "id": "climate_trend_perception_temperature", "label": {"en": "Perceived trend in temperatures over the past 10\u201315 years", "es": "Tendencia percibida en las temperaturas durante los \u00faltimos 10\u201315 a\u00f1os", "fr": "Tendance per\u00e7ue des temp\u00e9ratures au cours des 10\u201315 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-trend-perception"}'
