  climate_migration_adaptation_intent:
    title:
      en: Household has seriously considered relocating due to climate-related problems
      fr: Le ménage a sérieusement envisagé de se déplacer en raison de problèmes climatiques
      es: El hogar ha considerado seriamente reubicarse debido a problemas relacionados con el clima
    description:
      en: 'Single-select item asking whether the household has seriously considered moving to a different area in the next few years because of climate-related problems such as worsening drought, floods, or declining water access. This captures planned or anticipated climate-motivated migration (adaptation intent), not current displacement. Boundary with DisplacementProfile: current displacement is recorded there. Boundary with climate_distress_migration_past_event: that item captures past forced displacement as a maladaptation signal; this item captures future-oriented voluntary planned relocation as an adaptive strategy. Sensitivity: set to sensitive as the baseline. In conflict-affected contexts, relocation plans may intersect with protection concerns and should be asked using protective framing. Programs in non-conflict contexts may document a justified downgrade to standard sensitivity. Valid codes: yes_definite_plans / yes_considering_actively / yes_thought_about_but_unlikely / no_not_considered / already_relocated_climate / dont_know.'
      fr: 'Item à sélection unique demandant si le ménage a sérieusement envisagé de s''installer dans une autre zone au cours des prochaines années en raison de problèmes climatiques tels que l''aggravation de la sécheresse, les inondations ou la diminution de l''accès à l''eau. Capture la migration planifiée motivée par le climat (intention d''adaptation), pas le déplacement actuel. Sensibilité : fixée à sensible comme référence de base.'
      es: 'Ítem de selección única que pregunta si el hogar ha considerado seriamente mudarse a una zona diferente en los próximos años debido a problemas relacionados con el clima como sequías que empeoran, inundaciones o disminución del acceso al agua. Captura la migración planificada motivada por el clima (intención adaptativa), no el desplazamiento actual. Sensibilidad: establecida como sensible como base. En contextos afectados por conflicto, los planes de reubicación pueden intersectar con preocupaciones de protección.'
    slot_uri: aidops:climate_migration_adaptation_intent
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "ipcc-ar6-wg2-2022", "practical-action-v2r-2016"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Single-select item asking whether the household has seriously considered moving to a different area in the next few years because of climate-related problems such as worsening drought, floods, or declining water access. This captures planned or anticipated climate-motivated migration (adaptation intent), not current displacement. Boundary with DisplacementProfile: current displacement is recorded there. Boundary with climate_distress_migration_past_event: that item captures past forced displacement as a maladaptation signal; this item captures future-oriented voluntary planned relocation as an adaptive strategy. Sensitivity: set to sensitive as the baseline. In conflict-affected contexts, relocation plans may intersect with protection concerns and should be asked using protective framing. Programs in non-conflict contexts may document a justified downgrade to standard sensitivity. Valid codes: yes_definite_plans / yes_considering_actively / yes_thought_about_but_unlikely / no_not_considered / already_relocated_climate / dont_know.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el hogar ha considerado seriamente mudarse a una zona diferente en los pr\u00f3ximos a\u00f1os debido a problemas relacionados con el clima como sequ\u00edas que empeoran, inundaciones o disminuci\u00f3n del acceso al agua. Captura la migraci\u00f3n planificada motivada por el clima (intenci\u00f3n adaptativa), no el desplazamiento actual. Sensibilidad: establecida como sensible como base. En contextos afectados por conflicto, los planes de reubicaci\u00f3n pueden intersectar con preocupaciones de protecci\u00f3n.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le m\u00e9nage a s\u00e9rieusement envisag\u00e9 de s''installer dans une autre zone au cours des prochaines ann\u00e9es en raison de probl\u00e8mes climatiques tels que l''aggravation de la s\u00e9cheresse, les inondations ou la diminution de l''acc\u00e8s \u00e0 l''eau. Capture la migration planifi\u00e9e motiv\u00e9e par le climat (intention d''adaptation), pas le d\u00e9placement actuel. Sensibilit\u00e9 : fix\u00e9e \u00e0 sensible comme r\u00e9f\u00e9rence de base.\n"}, "id": "climate_migration_adaptation_intent", "label": {"en": "Household has seriously considered relocating due to climate-related problems", "es": "El hogar ha considerado seriamente reubicarse debido a problemas relacionados con el clima", "fr": "Le m\u00e9nage a s\u00e9rieusement envisag\u00e9 de se d\u00e9placer en raison de probl\u00e8mes climatiques"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
      bibliography_refs: assar-adaptive-capacity-2017,care-cvca-handbook-2019,ipcc-ar6-wg2-2022,practical-action-v2r-2016
  climate_months_hazard_prone_per_year:
    title:
      en: Months per year in an active climate hazard period
      fr: Mois par an en période d'aléa climatique actif
      es: Meses por año en un período de peligro climático activo
    description:
      en: Integer (0–12) recording how many months per year the household experiences a period of heightened risk from climate hazards — for example, a rainy season with flood risk, a dry season with drought risk, or a hot season with heatwave risk. Captures the proportion of the year during which the household is in an active exposure period. Combined with climate_hazards_experienced_past_5_years and the sensitivity items, feeds the exposure component of the composite vulnerability flag. Drawn from IFRC PCVA seasonal calendar and CARE CVCA seasonal vulnerability profile methodology.
      fr: Entier (0–12) enregistrant combien de mois par an le ménage connaît une période de risque accru lié aux aléas climatiques — par exemple, une saison des pluies avec risque d'inondation, une saison sèche avec risque de sécheresse, ou une saison chaude avec risque de vague de chaleur. Capture la proportion de l'année pendant laquelle le ménage est en période d'exposition active.
      es: Entero (0–12) que registra cuántos meses al año el hogar experimenta un período de mayor riesgo de peligros climáticos — por ejemplo, una temporada de lluvias con riesgo de inundación, una temporada seca con riesgo de sequía, o una temporada calurosa con riesgo de ola de calor. Captura la proporción del año durante la cual el hogar está en un período de exposición activa.
    slot_uri: aidops:climate_months_hazard_prone_per_year
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "fao-ex-act-2021", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "local-uncdf-2020"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Integer (0\u201312) recording how many months per year the household experiences a period of heightened risk from climate hazards \u2014 for example, a rainy season with flood risk, a dry season with drought risk, or a hot season with heatwave risk. Captures the proportion of the year during which the household is in an active exposure period. Combined with climate_hazards_experienced_past_5_years and the sensitivity items, feeds the exposure component of the composite vulnerability flag. Drawn from IFRC PCVA seasonal calendar and CARE CVCA seasonal vulnerability profile methodology.\n", "es": "Entero (0\u201312) que registra cu\u00e1ntos meses al a\u00f1o el hogar experimenta un per\u00edodo de mayor riesgo de peligros clim\u00e1ticos \u2014 por ejemplo, una temporada de lluvias con riesgo de inundaci\u00f3n, una temporada seca con riesgo de sequ\u00eda, o una temporada calurosa con riesgo de ola de calor. Captura la proporci\u00f3n del a\u00f1o durante la cual el hogar est\u00e1 en un per\u00edodo de exposici\u00f3n activa.\n", "fr": "Entier (0\u201312) enregistrant combien de mois par an le m\u00e9nage conna\u00eet une p\u00e9riode de risque accru li\u00e9 aux al\u00e9as climatiques \u2014 par exemple, une saison des pluies avec risque d''inondation, une saison s\u00e8che avec risque de s\u00e9cheresse, ou une saison chaude avec risque de vague de chaleur. Capture la proportion de l''ann\u00e9e pendant laquelle le m\u00e9nage est en p\u00e9riode d''exposition active.\n"}, "id": "climate_months_hazard_prone_per_year", "label": {"en": "Months per year in an active climate hazard period", "es": "Meses por a\u00f1o en un per\u00edodo de peligro clim\u00e1tico activo", "fr": "Mois par an en p\u00e9riode d''al\u00e9a climatique actif"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
      bibliography_refs: care-cvca-handbook-2019,fao-ex-act-2021,ifrc-pcva-2020,ipcc-ar6-wg2-2022,local-uncdf-2020
  climate_primary_livelihood_climate_dependent:
    title:
      en: Primary livelihood is climate-dependent
      fr: Le principal moyen de subsistance est dépendant du climat
      es: El principal medio de vida es dependiente del clima
    description:
      en: 'Single-select sensitivity indicator asking whether the household''s primary source of income or food is mainly dependent on rainfall, temperature, or seasonal patterns — for example, crop farming, livestock herding, fishing, or rain-fed pastoralism. This is a sensitivity indicator in the IPCC tripartite framework: a household whose primary livelihood is fully climate-dependent has intrinsically higher sensitivity regardless of other adaptive factors. Coordination note: the livelihood activity type itself is captured on LivelihoodProfile using main_livelihood_activity and the livelihood-activity-category vocabulary. This property asks only about climate dependence, not about the activity type. The `climate_` prefix signals that this sensitivity item belongs to the climate adaptation profile, not to RIMA-II.'
      fr: 'Indicateur de sensibilité à sélection unique demandant si la principale source de revenus ou de nourriture du ménage dépend principalement des précipitations, de la température ou des cycles saisonniers — par exemple, l''agriculture vivrière, l''élevage, la pêche ou le pastoralisme pluvial. Il s''agit d''un indicateur de sensibilité dans le cadre tripartite du GIEC : un ménage dont le principal moyen de subsistance est entièrement dépendant du climat présente intrinsèquement une sensibilité plus élevée, indépendamment des autres facteurs adaptatifs.'
      es: 'Indicador de sensibilidad de selección única que pregunta si la principal fuente de ingresos o alimentos del hogar depende principalmente de las lluvias, la temperatura o los ciclos estacionales — por ejemplo, la agricultura de secano, la ganadería, la pesca o el pastoreo. Es un indicador de sensibilidad en el marco tripartito del IPCC: un hogar cuyo principal medio de vida depende totalmente del clima tiene intrínsecamente mayor sensibilidad independientemente de otros factores adaptativos.'
    slot_uri: aidops:climate_primary_livelihood_climate_dependent
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "fao-ex-act-2021", "gcf-results-framework-2022", "ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022", "world-bank-csa-profiles-2019"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select sensitivity indicator asking whether the household''s primary source of income or food is mainly dependent on rainfall, temperature, or seasonal patterns \u2014 for example, crop farming, livestock herding, fishing, or rain-fed pastoralism. This is a sensitivity indicator in the IPCC tripartite framework: a household whose primary livelihood is fully climate-dependent has intrinsically higher sensitivity regardless of other adaptive factors. Coordination note: the livelihood activity type itself is captured on LivelihoodProfile using main_livelihood_activity and the livelihood-activity-category vocabulary. This property asks only about climate dependence, not about the activity type. The `climate_` prefix signals that this sensitivity item belongs to the climate adaptation profile, not to RIMA-II.\n", "es": "Indicador de sensibilidad de selecci\u00f3n \u00fanica que pregunta si la principal fuente de ingresos o alimentos del hogar depende principalmente de las lluvias, la temperatura o los ciclos estacionales \u2014 por ejemplo, la agricultura de secano, la ganader\u00eda, la pesca o el pastoreo. Es un indicador de sensibilidad en el marco tripartito del IPCC: un hogar cuyo principal medio de vida depende totalmente del clima tiene intr\u00ednsecamente mayor sensibilidad independientemente de otros factores adaptativos.\n", "fr": "Indicateur de sensibilit\u00e9 \u00e0 s\u00e9lection unique demandant si la principale source de revenus ou de nourriture du m\u00e9nage d\u00e9pend principalement des pr\u00e9cipitations, de la temp\u00e9rature ou des cycles saisonniers \u2014 par exemple, l''agriculture vivri\u00e8re, l''\u00e9levage, la p\u00eache ou le pastoralisme pluvial. Il s''agit d''un indicateur de sensibilit\u00e9 dans le cadre tripartite du GIEC : un m\u00e9nage dont le principal moyen de subsistance est enti\u00e8rement d\u00e9pendant du climat pr\u00e9sente intrins\u00e8quement une sensibilit\u00e9 plus \u00e9lev\u00e9e, ind\u00e9pendamment des autres facteurs adaptatifs.\n"}, "id": "climate_primary_livelihood_climate_dependent", "label": {"en": "Primary livelihood is climate-dependent", "es": "El principal medio de vida es dependiente del clima", "fr": "Le principal moyen de subsistance est d\u00e9pendant du climat"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
