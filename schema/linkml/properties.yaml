  ari_care_source:
    title:
      en: Care source for ARI
      fr: Source de soins pour l'IRA
      es: Fuente de atención para la IRA
    description:
      en: 'The type(s) of provider or facility the caregiver visited for advice or treatment of the child''s cough or breathing problem. Published wording: ''Where did you go or who did you see? (Select all that apply).'' Multi-select. Ask only if ari_care_sought is true. DHS codes h32a–h32x (country-specific provider codes); MICS code ARI5.'
      fr: 'Le(s) type(s) de prestataire ou d''établissement consulté par le soignant pour des conseils ou un traitement de la toux ou des difficultés respiratoires de l''enfant. Formulation publiée : « Où êtes-vous allé(e) ou qui avez-vous consulté ? (Sélectionnez tout ce qui s''applique). » Sélection multiple. Posez uniquement si ari_care_sought est vrai. Codes DHS h32a–h32x (codes de prestataires propres au pays) ; code MICS ARI5.'
      es: 'El(los) tipo(s) de proveedor o establecimiento al que el cuidador acudió para recibir consejo o tratamiento por la tos o el problema respiratorio del niño. Redacción publicada: ''¿Adónde fue o a quién consultó? (Seleccione todo lo que corresponda).'' Selección múltiple. Preguntar solo si ari_care_sought es verdadero. Códigos DHS h32a–h32x (códigos de proveedor específicos del país); código MICS ARI5.'
    slot_uri: aidops:ari_care_source
    range: CareProviderType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health"], "cardinality": "multiple", "category": "ari", "core": true, "definition": {"en": "The type(s) of provider or facility the caregiver visited for advice or treatment of the child''s cough or breathing problem. Published wording: ''Where did you go or who did you see? (Select all that apply).'' Multi-select. Ask only if ari_care_sought is true. DHS codes h32a\u2013h32x (country-specific provider codes); MICS code ARI5.", "es": "El(los) tipo(s) de proveedor o establecimiento al que el cuidador acudi\u00f3 para recibir consejo o tratamiento por la tos o el problema respiratorio del ni\u00f1o. Redacci\u00f3n publicada: ''\u00bfAd\u00f3nde fue o a qui\u00e9n consult\u00f3? (Seleccione todo lo que corresponda).'' Selecci\u00f3n m\u00faltiple. Preguntar solo si ari_care_sought es verdadero. C\u00f3digos DHS h32a\u2013h32x (c\u00f3digos de proveedor espec\u00edficos del pa\u00eds); c\u00f3digo MICS ARI5.", "fr": "Le(s) type(s) de prestataire ou d''\u00e9tablissement consult\u00e9 par le soignant pour des conseils ou un traitement de la toux ou des difficult\u00e9s respiratoires de l''enfant. Formulation publi\u00e9e : \u00ab O\u00f9 \u00eates-vous all\u00e9(e) ou qui avez-vous consult\u00e9 ? (S\u00e9lectionnez tout ce qui s''applique). \u00bb S\u00e9lection multiple. Posez uniquement si ari_care_sought est vrai. Codes DHS h32a\u2013h32x (codes de prestataires propres au pays) ; code MICS ARI5."}, "id": "ari_care_source", "label": {"en": "Care source for ARI", "es": "Fuente de atenci\u00f3n para la IRA", "fr": "Source de soins pour l''IRA"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "care-provider-type"}'
