  iycf_other_liquids_yesterday:
    title:
      en: Other liquids received yesterday
      fr: Autres liquides reçus hier
      es: Otros líquidos recibidos ayer
    description:
      en: 'Whether the child received any liquids other than breast milk yesterday — including juice, tea, soup, formula, or other milk (24-hour recall). Published wording (WHO/UNICEF 2021): ''Yesterday during the day or at night, did (NAME) receive any liquids other than breast milk — including juice, tea, soup, formula, or other milk?'' Used as one of the conditions for computing the Exclusive Breastfeeding (EBF) indicator.'
      fr: 'Indique si l''enfant a reçu des liquides autres que le lait maternel hier — incluant le jus, le thé, la soupe, le lait maternisé ou un autre lait (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier dans la journée ou la nuit, (PRÉNOM) a-t-il/elle reçu des liquides autres que le lait maternel — incluant du jus, du thé, de la soupe, du lait maternisé ou un autre lait ? » Utilisé comme l''une des conditions pour calculer l''indicateur ALM.'
      es: 'Indica si el niño recibió algún líquido distinto a la leche materna ayer, incluidos jugo, té, sopa, fórmula u otra leche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): ''Ayer durante el día o la noche, ¿recibió (NOMBRE) algún líquido distinto a la leche materna, incluidos jugo, té, sopa, fórmula u otra leche?'' Se utiliza como una de las condiciones para calcular el indicador de LME.'
    slot_uri: aidops:iycf_other_liquids_yesterday
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Whether the child received any liquids other than breast milk yesterday \u2014 including juice, tea, soup, formula, or other milk (24-hour recall). Published wording (WHO/UNICEF 2021): ''Yesterday during the day or at night, did (NAME) receive any liquids other than breast milk \u2014 including juice, tea, soup, formula, or other milk?'' Used as one of the conditions for computing the Exclusive Breastfeeding (EBF) indicator.", "es": "Indica si el ni\u00f1o recibi\u00f3 alg\u00fan l\u00edquido distinto a la leche materna ayer, incluidos jugo, t\u00e9, sopa, f\u00f3rmula u otra leche (recordatorio de 24 horas). Redacci\u00f3n publicada (OMS/UNICEF 2021): ''Ayer durante el d\u00eda o la noche, \u00bfrecibi\u00f3 (NOMBRE) alg\u00fan l\u00edquido distinto a la leche materna, incluidos jugo, t\u00e9, sopa, f\u00f3rmula u otra leche?'' Se utiliza como una de las condiciones para calcular el indicador de LME.", "fr": "Indique si l''enfant a re\u00e7u des liquides autres que le lait maternel hier \u2014 incluant le jus, le th\u00e9, la soupe, le lait maternis\u00e9 ou un autre lait (rappel sur 24 heures). Formulation publi\u00e9e (OMS/UNICEF 2021) : \u00ab Hier dans la journ\u00e9e ou la nuit, (PR\u00c9NOM) a-t-il/elle re\u00e7u des liquides autres que le lait maternel \u2014 incluant du jus, du th\u00e9, de la soupe, du lait maternis\u00e9 ou un autre lait ? \u00bb Utilis\u00e9 comme l''une des conditions pour calculer l''indicateur ALM."}, "id": "iycf_other_liquids_yesterday", "label": {"en": "Other liquids received yesterday", "es": "Otros l\u00edquidos recibidos ayer", "fr": "Autres liquides re\u00e7us hier"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
