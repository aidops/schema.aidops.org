      es: 'Indica si el niño alguna vez fue amamantado. Redacción publicada (OMS/UNICEF 2021): ''¿Alguna vez fue amamantado (NOMBRE)?'' Se aplica a los niños nacidos en los últimos 24 meses; el denominador del indicador ''alguna vez amamantado'' incluye tanto a los niños vivos como a los fallecidos de nacimientos recientes.'
