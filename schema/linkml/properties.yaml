      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "hygiene", "core": true, "definition": {"en": "Whether soap or detergent is available at or near the handwashing facility at the moment of the enumerator''s visit. JMP H3 (direct enumerator observation, not self-report). Asked only when handwashing_facility_present is not ''no''. Qualifying soap includes bar soap, liquid soap, powder detergent, and soapy water. Ash, sand, and soil do NOT qualify as soap for JMP purposes.", "es": "Si hay jab\u00f3n o detergente disponible en o cerca de la instalaci\u00f3n de lavado de manos en el momento de la visita del enumerador. JMP H3 (observaci\u00f3n directa del enumerador, no autodeclaraci\u00f3n). Preguntado solo cuando handwashing_facility_present no es ''no''. El jab\u00f3n que califica incluye jab\u00f3n en barra, jab\u00f3n l\u00edquido, detergente en polvo y agua jabonosa. La ceniza, la arena y el suelo NO califican como jab\u00f3n para los prop\u00f3sitos del JMP.", "fr": "Si du savon ou du d\u00e9tergent est disponible au dispositif de lavage des mains ou \u00e0 proximit\u00e9 au moment de la visite de l''\u00e9num\u00e9rateur. JMP H3 (observation directe de l''\u00e9num\u00e9rateur, pas d''auto-d\u00e9claration). Demand\u00e9 uniquement quand handwashing_facility_present n''est pas ''no''. Le savon qualifiant inclut le savon en pain, le savon liquide, la lessive en poudre et l''eau savonneuse. La cendre, le sable et la terre ne sont PAS qualifi\u00e9s comme savon pour les besoins du JMP."}, "id": "handwashing_soap_available", "label": {"en": "Soap available at handwashing facility (observed)", "es": "Jab\u00f3n disponible en la instalaci\u00f3n de lavado de manos (observado)", "fr": "Savon disponible au dispositif de lavage des mains (observ\u00e9)"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["jmp_household_survey", "mics6", "mics7"], "vocabulary": null}'
