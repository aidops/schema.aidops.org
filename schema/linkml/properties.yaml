  mk_functional_days_per_week:
    title:
      en: Functional days per week (current)
      fr: Jours de fonctionnement par semaine (actuels)
      es: Días de funcionamiento por semana (actual)
    description:
      en: Number of days per week the market is currently open and trading at the time of this visit, as assessed by direct observation and confirmed with key vendor informants. Integer 0–7. A value of 0 means the market is completely closed. Records current operating days, not the market's nominal schedule.
      fr: Nombre de jours par semaine où le marché est actuellement ouvert et actif au moment de cette visite, tel qu'évalué par observation directe et confirmé auprès des informateurs clés vendeurs. Entier 0–7. Une valeur de 0 signifie que le marché est complètement fermé. Enregistre les jours d'opération actuels, et non le calendrier nominal du marché.
      es: Número de días por semana que el mercado está actualmente abierto y en funcionamiento en el momento de esta visita, según la evaluación por observación directa y confirmación con informantes clave vendedores. Entero 0–7. Un valor de 0 significa que el mercado está completamente cerrado. Registra los días de operación actuales, no el calendario nominal del mercado.
    slot_uri: aidops:mk_functional_days_per_week
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-market-assessment-2014", "calp-misma-2018", "icrc-ram-2014", "reach-jmmi"], "cardinality": "single", "category": "market_functionality", "core": true, "definition": {"en": "Number of days per week the market is currently open and trading at the time of this visit, as assessed by direct observation and confirmed with key vendor informants. Integer 0\u20137. A value of 0 means the market is completely closed. Records current operating days, not the market''s nominal schedule.", "es": "N\u00famero de d\u00edas por semana que el mercado est\u00e1 actualmente abierto y en funcionamiento en el momento de esta visita, seg\u00fan la evaluaci\u00f3n por observaci\u00f3n directa y confirmaci\u00f3n con informantes clave vendedores. Entero 0\u20137. Un valor de 0 significa que el mercado est\u00e1 completamente cerrado. Registra los d\u00edas de operaci\u00f3n actuales, no el calendario nominal del mercado.", "fr": "Nombre de jours par semaine o\u00f9 le march\u00e9 est actuellement ouvert et actif au moment de cette visite, tel qu''\u00e9valu\u00e9 par observation directe et confirm\u00e9 aupr\u00e8s des informateurs cl\u00e9s vendeurs. Entier 0\u20137. Une valeur de 0 signifie que le march\u00e9 est compl\u00e8tement ferm\u00e9. Enregistre les jours d''op\u00e9ration actuels, et non le calendrier nominal du march\u00e9."}, "id": "mk_functional_days_per_week", "label": {"en": "Functional days per week (current)", "es": "D\u00edas de funcionamiento por semana (actual)", "fr": "Jours de fonctionnement par semaine (actuels)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
