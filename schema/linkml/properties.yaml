      es: 'Si el niño recibió la segunda dosis de vacuna contra rotavirus a aproximadamente 10 semanas de edad (para esquema de 3 dosis) o como dosis final (para esquema de 2 dosis). Redacción de recordatorio publicada: ''¿Recibió (nombre) una 2.a dosis de rotavirus?'' Específica por país. Código DHS h_rt2; código MICS IM7b.'
