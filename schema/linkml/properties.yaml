  electricity_interruptions_per_week:
    title:
      en: Electricity interruptions (times per week)
      fr: Interruptions d'électricité (fois par semaine)
      es: Interrupciones de electricidad (veces por semana)
    description:
      en: 'Average number of times per week electricity supply failed or went out unexpectedly in the past month. Unplanned interruptions only; excludes planned load-shedding schedules known to the household in advance. MTF electricity reliability attribute — tier thresholds: 3 or fewer disruptions per week = Tier 2-5 (with combined outage hours also checked for Tier 2+); 14 or fewer disruptions per week = Tier 1; more than 14 disruptions per week = Tier 0 for this attribute. Source: MTF household survey.'
      fr: 'Nombre moyen de fois par semaine où l''alimentation électrique a subi une panne ou une coupure imprévue au cours du mois passé. Interruptions imprévues uniquement ; exclut les programmes de délestage planifié connus du ménage à l''avance. Attribut de fiabilité de l''électricité MTF — seuils de niveau : 3 interruptions ou moins par semaine = niveaux 2 à 5 (avec contrôle combiné des heures de coupure pour les niveaux 2+) ; 14 interruptions ou moins par semaine = niveau 1 ; plus de 14 interruptions par semaine = niveau 0 pour cet attribut. Source : enquête ménage MTF.'
      es: 'Número promedio de veces por semana que el suministro eléctrico falló o se cortó inesperadamente en el último mes. Solo interrupciones no planificadas; excluye los programas de corte de carga planificados conocidos por el hogar con antelación. Atributo de fiabilidad de electricidad MTF: umbrales de nivel: 3 o menos interrupciones por semana = Niveles 2-5 (con verificación combinada de horas de corte para Nivel 2+); 14 o menos interrupciones por semana = Nivel 1; más de 14 interrupciones por semana = Nivel 0 para este atributo. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_interruptions_per_week
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Average number of times per week electricity supply failed or went out unexpectedly in the past month. Unplanned interruptions only; excludes planned load-shedding schedules known to the household in advance. MTF electricity reliability attribute \u2014 tier thresholds: 3 or fewer disruptions per week = Tier 2-5 (with combined outage hours also checked for Tier 2+); 14 or fewer disruptions per week = Tier 1; more than 14 disruptions per week = Tier 0 for this attribute. Source: MTF household survey.", "es": "N\u00famero promedio de veces por semana que el suministro el\u00e9ctrico fall\u00f3 o se cort\u00f3 inesperadamente en el \u00faltimo mes. Solo interrupciones no planificadas; excluye los programas de corte de carga planificados conocidos por el hogar con antelaci\u00f3n. Atributo de fiabilidad de electricidad MTF: umbrales de nivel: 3 o menos interrupciones por semana = Niveles 2-5 (con verificaci\u00f3n combinada de horas de corte para Nivel 2+); 14 o menos interrupciones por semana = Nivel 1; m\u00e1s de 14 interrupciones por semana = Nivel 0 para este atributo. Fuente: encuesta de hogares MTF.", "fr": "Nombre moyen de fois par semaine o\u00f9 l''alimentation \u00e9lectrique a subi une panne ou une coupure impr\u00e9vue au cours du mois pass\u00e9. Interruptions impr\u00e9vues uniquement ; exclut les programmes de d\u00e9lestage planifi\u00e9 connus du m\u00e9nage \u00e0 l''avance. Attribut de fiabilit\u00e9 de l''\u00e9lectricit\u00e9 MTF \u2014 seuils de niveau : 3 interruptions ou moins par semaine = niveaux 2 \u00e0 5 (avec contr\u00f4le combin\u00e9 des heures de coupure pour les niveaux 2+) ; 14 interruptions ou moins par semaine = niveau 1 ; plus de 14 interruptions par semaine = niveau 0 pour cet attribut. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_interruptions_per_week", "label": {"en": "Electricity interruptions (times per week)", "es": "Interrupciones de electricidad (veces por semana)", "fr": "Interruptions d''\u00e9lectricit\u00e9 (fois par semaine)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
