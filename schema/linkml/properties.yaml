  mk_commodity_price_change_pct:
    title:
      en: Commodity price change vs. reference (percent)
      fr: Variation du prix du produit par rapport à la référence (pourcent)
      es: Cambio de precio del producto vs. referencia (porcentaje)
    description:
      en: 'Derived percentage price change for a commodity versus the reference period price. Formula: ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Null when either input is null, -1, or -2, or when mk_commodity_available = not_available. WFP MAG 2021 and FAO GIEWS alert thresholds: +15% attention, +30% alert, +50% emergency. Implemented as an XLSForm calculate field displayed to the enumerator as a real-time quality check.'
      fr: 'Variation en pourcentage du prix d''un produit par rapport au prix de la période de référence (dérivée). Formule : ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Null lorsque l''une ou l''autre des entrées est null, -1 ou -2, ou lorsque mk_commodity_available = not_available.'
      es: 'Variación porcentual del precio de un producto respecto al precio del período de referencia (derivada). Fórmula: ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Nulo cuando cualquiera de los insumos es nulo, -1 o -2, o cuando mk_commodity_available = not_available.'
    slot_uri: aidops:mk_commodity_price_change_pct
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "fao-giews-fpma", "icrc-pcma-2014", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Derived percentage price change for a commodity versus the reference period price. Formula: ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Null when either input is null, -1, or -2, or when mk_commodity_available = not_available. WFP MAG 2021 and FAO GIEWS alert thresholds: +15% attention, +30% alert, +50% emergency. Implemented as an XLSForm calculate field displayed to the enumerator as a real-time quality check.\n", "es": "Variaci\u00f3n porcentual del precio de un producto respecto al precio del per\u00edodo de referencia (derivada). F\u00f3rmula: ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Nulo cuando cualquiera de los insumos es nulo, -1 o -2, o cuando mk_commodity_available = not_available.\n", "fr": "Variation en pourcentage du prix d''un produit par rapport au prix de la p\u00e9riode de r\u00e9f\u00e9rence (d\u00e9riv\u00e9e). Formule : ((mk_commodity_price_local_currency - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Null lorsque l''une ou l''autre des entr\u00e9es est null, -1 ou -2, ou lorsque mk_commodity_available = not_available.\n"}, "id": "mk_commodity_price_change_pct", "label": {"en": "Commodity price change vs. reference (percent)", "es": "Cambio de precio del producto vs. referencia (porcentaje)", "fr": "Variation du prix du produit par rapport \u00e0 la r\u00e9f\u00e9rence (pourcent)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,fao-giews-fpma,icrc-pcma-2014,reach-jmmi,wfp-mag-2021,wfp-vam-monitoring
  mk_commodity_price_local_currency:
    title:
      en: Current commodity price (local currency)
      fr: Prix actuel du produit (monnaie locale)
      es: Precio actual del producto (moneda local)
    description:
      en: Current price of the commodity per its reference unit in local currency, as quoted by active vendors on this visit date. JMMI standard practice is to interview at least 3 vendors per commodity and record the modal or average price. Reference unit is defined per commodity code in the market-price-basket vocabulary. Decimal ≥ 0; use -1 for dont_know; use -2 for not_applicable (when mk_commodity_available = not_available).
      fr: Prix actuel du produit par son unité de référence en monnaie locale, tel qu'indiqué par les vendeurs actifs à la date de cette visite. La pratique standard JMMI est d'interviewer au moins 3 vendeurs par produit et d'enregistrer le prix modal ou moyen. L'unité de référence est définie par code de produit dans le vocabulaire market-price-basket.
      es: Precio actual del producto por su unidad de referencia en moneda local, según lo cotizado por vendedores activos en la fecha de esta visita. La práctica estándar JMMI es entrevistar al menos a 3 vendedores por producto y registrar el precio modal o promedio. La unidad de referencia se define por código de producto en el vocabulario market-price-basket.
    slot_uri: aidops:mk_commodity_price_local_currency
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "crs-markit-2023", "fao-giews-fpma", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Current price of the commodity per its reference unit in local currency, as quoted by active vendors on this visit date. JMMI standard practice is to interview at least 3 vendors per commodity and record the modal or average price. Reference unit is defined per commodity code in the market-price-basket vocabulary. Decimal \u2265 0; use -1 for dont_know; use -2 for not_applicable (when mk_commodity_available = not_available).", "es": "Precio actual del producto por su unidad de referencia en moneda local, seg\u00fan lo cotizado por vendedores activos en la fecha de esta visita. La pr\u00e1ctica est\u00e1ndar JMMI es entrevistar al menos a 3 vendedores por producto y registrar el precio modal o promedio. La unidad de referencia se define por c\u00f3digo de producto en el vocabulario market-price-basket.", "fr": "Prix actuel du produit par son unit\u00e9 de r\u00e9f\u00e9rence en monnaie locale, tel qu''indiqu\u00e9 par les vendeurs actifs \u00e0 la date de cette visite. La pratique standard JMMI est d''interviewer au moins 3 vendeurs par produit et d''enregistrer le prix modal ou moyen. L''unit\u00e9 de r\u00e9f\u00e9rence est d\u00e9finie par code de produit dans le vocabulaire market-price-basket."}, "id": "mk_commodity_price_local_currency", "label": {"en": "Current commodity price (local currency)", "es": "Precio actual del producto (moneda local)", "fr": "Prix actuel du produit (monnaie locale)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,crs-markit-2023,fao-giews-fpma,reach-jmmi,wfp-mag-2021,wfp-vam-monitoring
  mk_commodity_price_reference:
    title:
      en: Reference (pre-crisis) commodity price (local currency)
      fr: Prix de référence (avant-crise) du produit (monnaie locale)
      es: Precio de referencia (pre-crisis) del producto (moneda local)
    description:
      en: Pre-crisis or reference-period price for the commodity per reference unit in local currency. For repeat monitoring visits, this value is pre-populated from the monitoring database (locked for editing, shown as read-only). For the first visit to a market, collected from key vendor informants and cross-referenced with published WFP/GIEWS price data if available. Decimal ≥ 0; use -1 for not available. WFP MAG 2021 recommends using a 3- or 5-year seasonal average for the same calendar month as the reference, rather than a single pre-crisis observation.
      fr: Prix d'avant-crise ou de la période de référence pour le produit par unité de référence en monnaie locale. Pour les visites de suivi répétées, cette valeur est pré-remplie à partir de la base de données de suivi (verrouillée pour modification, affichée en lecture seule). Pour la première visite d'un marché, collectée auprès des informateurs clés vendeurs et recoupée avec les données de prix WFP/GIEWS publiées si disponibles.
      es: Precio anterior a la crisis o del período de referencia para el producto por unidad de referencia en moneda local. Para visitas de monitoreo repetidas, este valor se pre-puebla desde la base de datos de monitoreo (bloqueado para edición, mostrado como solo lectura). Para la primera visita a un mercado, recopilado de informantes clave vendedores y contrastado con datos de precios WFP/GIEWS publicados si están disponibles.
    slot_uri: aidops:mk_commodity_price_reference
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "fao-giews-fpma", "icrc-pcma-2014", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Pre-crisis or reference-period price for the commodity per reference unit in local currency. For repeat monitoring visits, this value is pre-populated from the monitoring database (locked for editing, shown as read-only). For the first visit to a market, collected from key vendor informants and cross-referenced with published WFP/GIEWS price data if available. Decimal \u2265 0; use -1 for not available. WFP MAG 2021 recommends using a 3- or 5-year seasonal average for the same calendar month as the reference, rather than a single pre-crisis observation.", "es": "Precio anterior a la crisis o del per\u00edodo de referencia para el producto por unidad de referencia en moneda local. Para visitas de monitoreo repetidas, este valor se pre-puebla desde la base de datos de monitoreo (bloqueado para edici\u00f3n, mostrado como solo lectura). Para la primera visita a un mercado, recopilado de informantes clave vendedores y contrastado con datos de precios WFP/GIEWS publicados si est\u00e1n disponibles.", "fr": "Prix d''avant-crise ou de la p\u00e9riode de r\u00e9f\u00e9rence pour le produit par unit\u00e9 de r\u00e9f\u00e9rence en monnaie locale. Pour les visites de suivi r\u00e9p\u00e9t\u00e9es, cette valeur est pr\u00e9-remplie \u00e0 partir de la base de donn\u00e9es de suivi (verrouill\u00e9e pour modification, affich\u00e9e en lecture seule). Pour la premi\u00e8re visite d''un march\u00e9, collect\u00e9e aupr\u00e8s des informateurs cl\u00e9s vendeurs et recoup\u00e9e avec les donn\u00e9es de prix WFP/GIEWS publi\u00e9es si disponibles."}, "id": "mk_commodity_price_reference", "label": {"en": "Reference (pre-crisis) commodity price (local currency)", "es": "Precio de referencia (pre-crisis) del producto (moneda local)", "fr": "Prix de r\u00e9f\u00e9rence (avant-crise) du produit (monnaie locale)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "vocabulary": null}'
      bibliography_refs: calp-misma-2018,fao-giews-fpma,icrc-pcma-2014,reach-jmmi,wfp-mag-2021,wfp-vam-monitoring
  mk_commodity_price_trend:
    title:
      en: Commodity price trend (past 30 days)
      fr: Tendance du prix du produit (30 derniers jours)
      es: Tendencia del precio del producto (últimos 30 días)
    description:
      en: Direction and magnitude of price movement for this commodity over the past 30 days, as reported by key vendor informants. A leading indicator of future price levels — often more actionable than the price level alone. Hidden when mk_commodity_available = not_available (no price to trend).
      fr: Direction et amplitude du mouvement des prix pour ce produit au cours des 30 derniers jours, tels que rapportés par les informateurs clés vendeurs. Indicateur avancé des niveaux de prix futurs — souvent plus exploitable que le niveau de prix seul. Masqué lorsque mk_commodity_available = not_available.
      es: Dirección y magnitud del movimiento de precios para este producto en los últimos 30 días, según lo reportado por informantes clave vendedores. Indicador adelantado de los niveles de precios futuros — a menudo más accionable que el nivel de precio solo. Oculto cuando mk_commodity_available = not_available.
    slot_uri: aidops:mk_commodity_price_trend
    range: PriceTrendDirection
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "fao-giews-fpma", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "cardinality": "single", "category": "market_price_basket", "core": true, "definition": {"en": "Direction and magnitude of price movement for this commodity over the past 30 days, as reported by key vendor informants. A leading indicator of future price levels \u2014 often more actionable than the price level alone. Hidden when mk_commodity_available = not_available (no price to trend).", "es": "Direcci\u00f3n y magnitud del movimiento de precios para este producto en los \u00faltimos 30 d\u00edas, seg\u00fan lo reportado por informantes clave vendedores. Indicador adelantado de los niveles de precios futuros \u2014 a menudo m\u00e1s accionable que el nivel de precio solo. Oculto cuando mk_commodity_available = not_available.", "fr": "Direction et amplitude du mouvement des prix pour ce produit au cours des 30 derniers jours, tels que rapport\u00e9s par les informateurs cl\u00e9s vendeurs. Indicateur avanc\u00e9 des niveaux de prix futurs \u2014 souvent plus exploitable que le niveau de prix seul. Masqu\u00e9 lorsque mk_commodity_available = not_available."}, "id": "mk_commodity_price_trend", "label": {"en": "Commodity price trend (past 30 days)", "es": "Tendencia del precio del producto (\u00faltimos 30 d\u00edas)", "fr": "Tendance du prix du produit (30 derniers jours)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "price-trend-direction"}'
      bibliography_refs: calp-misma-2018,fao-giews-fpma,reach-jmmi,wfp-mag-2021,wfp-vam-monitoring
  mk_enumerator_id:
    title:
      en: Enumerator identifier code
      fr: Code d'identification de l'enquêteur
      es: Código de identificación del encuestador
    description:
