      es: 'Indica si el niño recibió leche animal (leche de vaca, cabra u otro animal) ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): ''Ayer, ¿recibió (NOMBRE) leche animal (leche de vaca, cabra u otro animal)?'' Se contabiliza como una toma de leche para el indicador MMFF de los niños no amamantados.'
