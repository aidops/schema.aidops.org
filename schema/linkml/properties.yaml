  recall_period_days:
    title:
      en: Recall period days
      fr: Jours de période de rappel
      es: Días del período de referencia
    description:
      en: 'Number of days of recall for instrument items that allow a variable reference period, primarily FIES (commonly 30 or 365 days) and HDDS/WDDS variants. May be omitted when the reference period is fixed by the instrument protocol, but populating it explicitly is valid and can aid data quality verification. Canonical recall periods by instrument: FCS 7 days, rCSI 7 days, HDDS 1 day, MDD-W 1 day, FIES 30 days (operational monitoring) or 365 days (SDG 2.1.2), HHS 30 days, LCS 30 days, MAHFP 12 months. Multi-instrument profiles pick one value, typically the longest.'
      fr: 'Nombre de jours de rappel pour les items d''instruments permettant une période de référence variable, principalement FIES (couramment 30 ou 365 jours) et les variantes HDDS/MDD-W. Peut être omis lorsque la période de référence est fixée par le protocole de l''instrument, mais le renseigner explicitement est valide et peut faciliter la vérification de la qualité des données. Périodes de rappel canoniques par instrument : FCS 7 jours, rCSI 7 jours, HDDS 1 jour, MDD-W 1 jour, FIES 30 jours (suivi opérationnel) ou 365 jours (ODD 2.1.2), HHS 30 jours, LCS 30 jours, MAHFP 12 mois. Les profils multi-instruments choisissent une valeur, généralement la plus longue.'
      es: 'Número de días de recordatorio para los ítems de instrumentos que permiten un período de referencia variable, principalmente FIES (comúnmente 30 o 365 días) y variantes HDDS/MDD-W. Puede omitirse cuando el período de referencia está fijado por el protocolo del instrumento, pero registrarlo explícitamente es válido y puede facilitar la verificación de calidad de datos. Períodos de recordatorio canónicos por instrumento: FCS 7 días, rCSI 7 días, HDDS 1 día, MDD-W 1 día, FIES 30 días (monitoreo operativo) o 365 días (ODS 2.1.2), HHS 30 días, LCS 30 días, MAHFP 12 meses. Los perfiles multi-instrumento eligen un valor, generalmente el más largo.'
    slot_uri: aidops:recall_period_days
    range: integer
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": true, "definition": {"en": "Number of days of recall for instrument items that allow a variable reference period, primarily FIES (commonly 30 or 365 days) and HDDS/WDDS variants. May be omitted when the reference period is fixed by the instrument protocol, but populating it explicitly is valid and can aid data quality verification. Canonical recall periods by instrument: FCS 7 days, rCSI 7 days, HDDS 1 day, MDD-W 1 day, FIES 30 days (operational monitoring) or 365 days (SDG 2.1.2), HHS 30 days, LCS 30 days, MAHFP 12 months. Multi-instrument profiles pick one value, typically the longest.", "es": "N\u00famero de d\u00edas de recordatorio para los \u00edtems de instrumentos que permiten un per\u00edodo de referencia variable, principalmente FIES (com\u00fanmente 30 o 365 d\u00edas) y variantes HDDS/MDD-W. Puede omitirse cuando el per\u00edodo de referencia est\u00e1 fijado por el protocolo del instrumento, pero registrarlo expl\u00edcitamente es v\u00e1lido y puede facilitar la verificaci\u00f3n de calidad de datos. Per\u00edodos de recordatorio can\u00f3nicos por instrumento: FCS 7 d\u00edas, rCSI 7 d\u00edas, HDDS 1 d\u00eda, MDD-W 1 d\u00eda, FIES 30 d\u00edas (monitoreo operativo) o 365 d\u00edas (ODS 2.1.2), HHS 30 d\u00edas, LCS 30 d\u00edas, MAHFP 12 meses. Los perfiles multi-instrumento eligen un valor, generalmente el m\u00e1s largo.", "fr": "Nombre de jours de rappel pour les items d''instruments permettant une p\u00e9riode de r\u00e9f\u00e9rence variable, principalement FIES (couramment 30 ou 365 jours) et les variantes HDDS/MDD-W. Peut \u00eatre omis lorsque la p\u00e9riode de r\u00e9f\u00e9rence est fix\u00e9e par le protocole de l''instrument, mais le renseigner explicitement est valide et peut faciliter la v\u00e9rification de la qualit\u00e9 des donn\u00e9es. P\u00e9riodes de rappel canoniques par instrument : FCS 7 jours, rCSI 7 jours, HDDS 1 jour, MDD-W 1 jour, FIES 30 jours (suivi op\u00e9rationnel) ou 365 jours (ODD 2.1.2), HHS 30 jours, LCS 30 jours, MAHFP 12 mois. Les profils multi-instruments choisissent une valeur, g\u00e9n\u00e9ralement la plus longue."}, "id": "recall_period_days", "label": {"en": "Recall period days", "es": "D\u00edas del per\u00edodo de referencia", "fr": "Jours de p\u00e9riode de rappel"}, "maturity": "draft", "references": null, "type": "integer", "vocabulary": null}'
  recall_period_months:
    title:
      en: Recall period (months)
      fr: Période de rappel (mois)
      es: Período de recordatorio (meses)
    description:
      en: The number of months preceding the interview within which a birth must have occurred for the respondent to be eligible for the MaternalNewbornHealthProfile. Default is 24 months, aligned with DHS-8 convention. Deployments requiring a 3-year or 5-year window may set this value accordingly; longer windows increase recall bias for ANC content items.
      fr: Le nombre de mois précédant l'entretien dans lesquels une naissance doit avoir eu lieu pour que la répondante soit éligible au MaternalNewbornHealthProfile. La valeur par défaut est 24 mois, alignée sur la convention DHS-8. Les déploiements nécessitant une fenêtre de 3 ou 5 ans peuvent définir cette valeur en conséquence ; des fenêtres plus longues augmentent le biais de rappel pour les items de contenu CPN.
      es: El número de meses anteriores a la entrevista dentro de los cuales debe haber ocurrido un parto para que la encuestada sea elegible para el MaternalNewbornHealthProfile. El valor predeterminado es 24 meses, alineado con la convención DHS-8. Los despliegues que requieren una ventana de 3 o 5 años pueden establecer este valor en consecuencia; ventanas más largas aumentan el sesgo de recordatorio para los ítems de contenido de APN.
    slot_uri: aidops:recall_period_months
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire"], "cardinality": "single", "category": "pregnancy_history", "core": false, "definition": {"en": "The number of months preceding the interview within which a birth must have occurred for the respondent to be eligible for the MaternalNewbornHealthProfile. Default is 24 months, aligned with DHS-8 convention. Deployments requiring a 3-year or 5-year window may set this value accordingly; longer windows increase recall bias for ANC content items.", "es": "El n\u00famero de meses anteriores a la entrevista dentro de los cuales debe haber ocurrido un parto para que la encuestada sea elegible para el MaternalNewbornHealthProfile. El valor predeterminado es 24 meses, alineado con la convenci\u00f3n DHS-8. Los despliegues que requieren una ventana de 3 o 5 a\u00f1os pueden establecer este valor en consecuencia; ventanas m\u00e1s largas aumentan el sesgo de recordatorio para los \u00edtems de contenido de APN.", "fr": "Le nombre de mois pr\u00e9c\u00e9dant l''entretien dans lesquels une naissance doit avoir eu lieu pour que la r\u00e9pondante soit \u00e9ligible au MaternalNewbornHealthProfile. La valeur par d\u00e9faut est 24 mois, align\u00e9e sur la convention DHS-8. Les d\u00e9ploiements n\u00e9cessitant une fen\u00eatre de 3 ou 5 ans peuvent d\u00e9finir cette valeur en cons\u00e9quence ; des fen\u00eatres plus longues augmentent le biais de rappel pour les items de contenu CPN."}, "id": "recall_period_months", "label": {"en": "Recall period (months)", "es": "Per\u00edodo de recordatorio (meses)", "fr": "P\u00e9riode de rappel (mois)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
