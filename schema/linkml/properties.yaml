  aap_complaint_channel_known:
    title:
      en: 'AAP: Complaint channel awareness'
      fr: 'Redevabilité : Connaissance du canal de plainte'
      es: 'Rendición de cuentas: Conciencia del canal de quejas'
    description:
      en: 'Whether the respondent knows how to contact aid providers to ask a question, make a suggestion, or raise a complaint. The single most frequently reported AAP indicator across global MSNAs 2018–2024: OCHA oPt MSNA 2022 found 4% awareness; CAR MSNA 2023 found 27%; Global MSNA 2022 showed persistently low awareness across 14 operations. Maps to CHS 2024 Commitment 5 (''Can safely report concerns and complaints and get them addressed'').'
      fr: 'Si le répondant sait comment contacter les intervenants pour poser une question, faire une suggestion ou déposer une plainte. L''indicateur AAP le plus fréquemment rapporté dans les MSNAs globales 2018–2024 : l''OCHA MSNA oPt 2022 a trouvé 4 % de connaissance ; MSNA RCA 2023 a trouvé 27 % ; MSNA global 2022 a montré une faible connaissance persistante à travers 14 opérations. Correspond à l''Engagement 5 de la CHS 2024 (« Peut signaler en toute sécurité des préoccupations et des plaintes et obtenir des réponses »).'
      es: 'Si el encuestado sabe cómo contactar a los actores humanitarios para hacer una pregunta, una sugerencia o presentar una queja. El indicador AAP más frecuentemente reportado en las MSNAs globales 2018–2024: la MSNA OCHA oPt 2022 encontró 4% de conciencia; MSNA RCA 2023 encontró 27%; MSNA global 2022 mostró una conciencia persistentemente baja en 14 operaciones. Corresponde al Compromiso 5 de la CHS 2024 («Puede denunciar de forma segura inquietudes y quejas y obtener respuestas»).'
    slot_uri: aidops:aap_complaint_channel_known
    range: AapYesnoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "iasc-caap-2017", "iasc-reach-aap-menu-2018", "ocha-aap-msna-findings-2022"], "cardinality": "single", "category": "aap_feedback", "core": false, "definition": {"en": "Whether the respondent knows how to contact aid providers to ask a question, make a suggestion, or raise a complaint. The single most frequently reported AAP indicator across global MSNAs 2018\u20132024: OCHA oPt MSNA 2022 found 4% awareness; CAR MSNA 2023 found 27%; Global MSNA 2022 showed persistently low awareness across 14 operations. Maps to CHS 2024 Commitment 5 (''Can safely report concerns and complaints and get them addressed'').", "es": "Si el encuestado sabe c\u00f3mo contactar a los actores humanitarios para hacer una pregunta, una sugerencia o presentar una queja. El indicador AAP m\u00e1s frecuentemente reportado en las MSNAs globales 2018\u20132024: la MSNA OCHA oPt 2022 encontr\u00f3 4% de conciencia; MSNA RCA 2023 encontr\u00f3 27%; MSNA global 2022 mostr\u00f3 una conciencia persistentemente baja en 14 operaciones. Corresponde al Compromiso 5 de la CHS 2024 (\u00abPuede denunciar de forma segura inquietudes y quejas y obtener respuestas\u00bb).", "fr": "Si le r\u00e9pondant sait comment contacter les intervenants pour poser une question, faire une suggestion ou d\u00e9poser une plainte. L''indicateur AAP le plus fr\u00e9quemment rapport\u00e9 dans les MSNAs globales 2018\u20132024 : l''OCHA MSNA oPt 2022 a trouv\u00e9 4 % de connaissance ; MSNA RCA 2023 a trouv\u00e9 27 % ; MSNA global 2022 a montr\u00e9 une faible connaissance persistante \u00e0 travers 14 op\u00e9rations. Correspond \u00e0 l''Engagement 5 de la CHS 2024 (\u00ab Peut signaler en toute s\u00e9curit\u00e9 des pr\u00e9occupations et des plaintes et obtenir des r\u00e9ponses \u00bb)."}, "id": "aap_complaint_channel_known", "label": {"en": "AAP: Complaint channel awareness", "es": "Rendici\u00f3n de cuentas: Conciencia del canal de quejas", "fr": "Redevabilit\u00e9 : Connaissance du canal de plainte"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-yesno-dk"}'
      bibliography_refs: chs-2024,iasc-caap-2017,iasc-reach-aap-menu-2018,ocha-aap-msna-findings-2022
  aap_complaint_channel_known_types:
    title:
      en: 'AAP: Known complaint channel types'
      fr: 'Redevabilité : Types de canaux de plainte connus'
      es: 'Rendición de cuentas: Tipos de canales de quejas conocidos'
    description:
      en: 'The channel(s) the respondent names as available for contacting aid providers. Multi-select. Asked only when `aap_complaint_channel_known = yes`. The enumerator does not read the list; the respondent''s spontaneous recall is recorded. Informs feedback-mechanism design (IFRC CEA Toolkit channel typology). Source: IASC / REACH Menu 2018.'
      fr: 'Le(s) canal(ux) que le répondant nomme comme disponible(s) pour contacter les intervenants. Sélection multiple. Demandé uniquement si `aap_complaint_channel_known = yes`. L''enquêteur ne lit pas la liste ; c''est le rappel spontané du répondant qui est enregistré. Informe la conception des mécanismes de retour d''information (typologie de canaux du Toolkit CEA de la FICR). Source : Menu IASC / REACH 2018.'
      es: 'El/los canal(es) que el encuestado nombra como disponibles para contactar a los actores humanitarios. Selección múltiple. Se pregunta solo cuando `aap_complaint_channel_known = yes`. El encuestador no lee la lista; se registra el recuerdo espontáneo del encuestado. Informa el diseño del mecanismo de retroalimentación (tipología de canales del Kit de Herramientas CEA de la FICR). Fuente: Menú IASC / REACH 2018.'
    slot_uri: aidops:aap_complaint_channel_known_types
    range: AapFeedbackChannel
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-caap-2017", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "cardinality": "multiple", "category": "aap_feedback", "core": false, "definition": {"en": "The channel(s) the respondent names as available for contacting aid providers. Multi-select. Asked only when `aap_complaint_channel_known = yes`. The enumerator does not read the list; the respondent''s spontaneous recall is recorded. Informs feedback-mechanism design (IFRC CEA Toolkit channel typology). Source: IASC / REACH Menu 2018.", "es": "El/los canal(es) que el encuestado nombra como disponibles para contactar a los actores humanitarios. Selecci\u00f3n m\u00faltiple. Se pregunta solo cuando `aap_complaint_channel_known = yes`. El encuestador no lee la lista; se registra el recuerdo espont\u00e1neo del encuestado. Informa el dise\u00f1o del mecanismo de retroalimentaci\u00f3n (tipolog\u00eda de canales del Kit de Herramientas CEA de la FICR). Fuente: Men\u00fa IASC / REACH 2018.", "fr": "Le(s) canal(ux) que le r\u00e9pondant nomme comme disponible(s) pour contacter les intervenants. S\u00e9lection multiple. Demand\u00e9 uniquement si `aap_complaint_channel_known = yes`. L''enqu\u00eateur ne lit pas la liste ; c''est le rappel spontan\u00e9 du r\u00e9pondant qui est enregistr\u00e9. Informe la conception des m\u00e9canismes de retour d''information (typologie de canaux du Toolkit CEA de la FICR). Source : Menu IASC / REACH 2018."}, "id": "aap_complaint_channel_known_types", "label": {"en": "AAP: Known complaint channel types", "es": "Rendici\u00f3n de cuentas: Tipos de canales de quejas conocidos", "fr": "Redevabilit\u00e9 : Types de canaux de plainte connus"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-feedback-channel"}'
      bibliography_refs: iasc-caap-2017,iasc-reach-aap-menu-2018,ifrc-cea-toolkit-2021
  aap_complaint_filed_past:
    title:
      en: 'AAP: Complaint or feedback filed in the past 6 months'
      fr: 'Redevabilité : Plainte ou retour d''information déposé au cours des 6 derniers mois'
      es: 'Rendición de cuentas: Queja o retroalimentación presentada en los últimos 6 meses'
    description:
