  phq9_1:
    title:
      en: 'PHQ-9 item 1: little interest or pleasure'
      fr: 'PHQ-9 item 1 : peu d''intérêt ou de plaisir'
      es: 'PHQ-9 ítem 1: poco interés o placer'
    description:
      en: Frequency with which, over the last two weeks, the respondent has been bothered by little interest or pleasure in doing things. PHQ-9 item 1, measuring anhedonia, one of the two core depressive symptoms in DSM diagnostic criteria. Scoring value 0 (not at all) to 3 (nearly every day).
      fr: 'Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un manque d''intérêt ou de plaisir à faire les choses. PHQ-9 item 1, mesurant l''anhédonie, l''un des deux symptômes dépressifs centraux des critères diagnostiques DSM. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours).'
