    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn", "who-anc-2016"], "cardinality": "single", "category": "antenatal_care", "core": true, "definition": {"en": "Whether the woman received any antenatal care from any provider during the most recent pregnancy. DHS-8: derived from m14 (visit count > 0) or the m2 series (any provider seen). MICS6 MN2. Gateway item: if no or don''t know, skip ANC provider type and all ANC content items (blood pressure, urine, blood sample, etc.). DHS-8 denominator: all births (live and stillbirth) in the 24 months preceding the survey.", "es": "Si la mujer recibi\u00f3 atenci\u00f3n prenatal de alg\u00fan proveedor durante el embarazo m\u00e1s reciente. DHS-8: derivado de m14 (conteo de visitas > 0) o de la serie m2 (cualquier proveedor visto). MICS6 MN2. \u00cdtem de puerta: si no o no sabe, omitir el tipo de proveedor APN y todos los \u00edtems de contenido de APN (presi\u00f3n arterial, orina, muestra de sangre, etc.). Denominador DHS-8: todos los partos (vivos y mortinatos) en los 24 meses anteriores a la encuesta.", "fr": "Si la femme a re\u00e7u des soins pr\u00e9nataux de la part d''un quelconque prestataire pendant la grossesse la plus r\u00e9cente. DHS-8 : d\u00e9riv\u00e9 de m14 (nombre de visites > 0) ou de la s\u00e9rie m2 (prestataire vu). MICS6 MN2. Item de seuil : si non ou ne sait pas, ignorer le type de prestataire CPN et tous les items de contenu CPN (tension art\u00e9rielle, urine, prise de sang, etc.). D\u00e9nominateur DHS-8 : toutes les naissances (vivantes et mortinaissances) dans les 24 mois pr\u00e9c\u00e9dant l''enqu\u00eate."}, "id": "anc_any_visit", "label": {"en": "Received any antenatal care", "es": "Recibi\u00f3 atenci\u00f3n prenatal", "fr": "A re\u00e7u des soins pr\u00e9nataux"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
