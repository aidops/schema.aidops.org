  electricity_appliances_supported:
    title:
      en: Appliances supported by electricity source
      fr: Appareils alimentés par la source d'électricité
      es: Electrodomésticos admitidos por la fuente de electricidad
    description:
      en: 'The highest tier of appliances the household can power simultaneously from its main electricity source. Used as a proxy for the MTF electricity capacity attribute when direct wattage measurement (electricity_capacity_watts) is not collected. The ESMAP published appliance-tier crosswalk assigns approximate capacity tiers based on the appliance mix the household reports being able to power at the same time. Source: MTF household survey (appliance proxy for capacity tier).'
      fr: 'Le niveau le plus élevé d''appareils que le ménage peut alimenter simultanément depuis sa principale source d''électricité. Utilisé comme indicateur de remplacement de l''attribut de capacité MTF lorsque la mesure directe en watts (electricity_capacity_watts) n''est pas recueillie. Le tableau de correspondance des niveaux d''appareils publié par l''ESMAP attribue des niveaux de capacité approximatifs en fonction du panel d''appareils que le ménage déclare pouvoir alimenter simultanément. Source : enquête ménage MTF (procuration par les appareils pour le niveau de capacité).'
      es: 'El nivel más alto de electrodomésticos que el hogar puede alimentar simultáneamente desde su fuente principal de electricidad. Se usa como indicador sustituto del atributo de capacidad MTF cuando no se recopila la medición directa en vatios (electricity_capacity_watts). La tabla de correspondencia de niveles de electrodomésticos publicada por ESMAP asigna niveles de capacidad aproximados basados en la combinación de electrodomésticos que el hogar reporta poder alimentar al mismo tiempo. Fuente: encuesta de hogares MTF (proxy de electrodomésticos para el nivel de capacidad).'
    slot_uri: aidops:electricity_appliances_supported
    range: ElectricityApplianceTier
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "The highest tier of appliances the household can power simultaneously from its main electricity source. Used as a proxy for the MTF electricity capacity attribute when direct wattage measurement (electricity_capacity_watts) is not collected. The ESMAP published appliance-tier crosswalk assigns approximate capacity tiers based on the appliance mix the household reports being able to power at the same time. Source: MTF household survey (appliance proxy for capacity tier).", "es": "El nivel m\u00e1s alto de electrodom\u00e9sticos que el hogar puede alimentar simult\u00e1neamente desde su fuente principal de electricidad. Se usa como indicador sustituto del atributo de capacidad MTF cuando no se recopila la medici\u00f3n directa en vatios (electricity_capacity_watts). La tabla de correspondencia de niveles de electrodom\u00e9sticos publicada por ESMAP asigna niveles de capacidad aproximados basados en la combinaci\u00f3n de electrodom\u00e9sticos que el hogar reporta poder alimentar al mismo tiempo. Fuente: encuesta de hogares MTF (proxy de electrodom\u00e9sticos para el nivel de capacidad).", "fr": "Le niveau le plus \u00e9lev\u00e9 d''appareils que le m\u00e9nage peut alimenter simultan\u00e9ment depuis sa principale source d''\u00e9lectricit\u00e9. Utilis\u00e9 comme indicateur de remplacement de l''attribut de capacit\u00e9 MTF lorsque la mesure directe en watts (electricity_capacity_watts) n''est pas recueillie. Le tableau de correspondance des niveaux d''appareils publi\u00e9 par l''ESMAP attribue des niveaux de capacit\u00e9 approximatifs en fonction du panel d''appareils que le m\u00e9nage d\u00e9clare pouvoir alimenter simultan\u00e9ment. Source : enqu\u00eate m\u00e9nage MTF (procuration par les appareils pour le niveau de capacit\u00e9)."}, "id": "electricity_appliances_supported", "label": {"en": "Appliances supported by electricity source", "es": "Electrodom\u00e9sticos admitidos por la fuente de electricidad", "fr": "Appareils aliment\u00e9s par la source d''\u00e9lectricit\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["se4all_mtf"], "vocabulary": "electricity-appliance-tier"}'
