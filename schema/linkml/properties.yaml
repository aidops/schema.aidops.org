  ari_cough_last_2wks:
    title:
      en: Cough in the last two weeks
      fr: Toux au cours des deux dernières semaines
      es: Tos en las últimas dos semanas
    description:
      en: 'Whether the child had a cough in the last two weeks. Published wording: ''Has (name) had a cough in the last two weeks?'' Gateway item for the ARI module: if no, skip to the fever section. Two-week recall period aligned with diarrhea and fever modules for cross-indicator comparability. DHS code h31 (cough component); MICS code ARI1.'
      fr: 'Si l''enfant a eu de la toux au cours des deux dernières semaines. Formulation publiée : « (Prénom) a-t-il/elle eu de la toux au cours des deux dernières semaines ? » Item passerelle du module IRA : si non, passer à la section fièvre. Période de rappel de deux semaines alignée sur les modules diarrhée et fièvre pour la comparabilité inter-indicateurs. Code DHS h31 (composante toux) ; code MICS ARI1.'
      es: 'Si el niño tuvo tos en las últimas dos semanas. Redacción publicada: ''¿Tuvo (nombre) tos en las últimas dos semanas?'' Ítem de puerta del módulo de IRA: si no, pasar a la sección de fiebre. Período de recordatorio de dos semanas alineado con los módulos de diarrea y fiebre para comparabilidad entre indicadores. Código DHS h31 (componente de tos); código MICS ARI1.'
    slot_uri: aidops:ari_cough_last_2wks
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-imci"], "cardinality": "single", "category": "ari", "core": true, "definition": {"en": "Whether the child had a cough in the last two weeks. Published wording: ''Has (name) had a cough in the last two weeks?'' Gateway item for the ARI module: if no, skip to the fever section. Two-week recall period aligned with diarrhea and fever modules for cross-indicator comparability. DHS code h31 (cough component); MICS code ARI1.", "es": "Si el ni\u00f1o tuvo tos en las \u00faltimas dos semanas. Redacci\u00f3n publicada: ''\u00bfTuvo (nombre) tos en las \u00faltimas dos semanas?'' \u00cdtem de puerta del m\u00f3dulo de IRA: si no, pasar a la secci\u00f3n de fiebre. Per\u00edodo de recordatorio de dos semanas alineado con los m\u00f3dulos de diarrea y fiebre para comparabilidad entre indicadores. C\u00f3digo DHS h31 (componente de tos); c\u00f3digo MICS ARI1.", "fr": "Si l''enfant a eu de la toux au cours des deux derni\u00e8res semaines. Formulation publi\u00e9e : \u00ab (Pr\u00e9nom) a-t-il/elle eu de la toux au cours des deux derni\u00e8res semaines ? \u00bb Item passerelle du module IRA : si non, passer \u00e0 la section fi\u00e8vre. P\u00e9riode de rappel de deux semaines align\u00e9e sur les modules diarrh\u00e9e et fi\u00e8vre pour la comparabilit\u00e9 inter-indicateurs. Code DHS h31 (composante toux) ; code MICS ARI1."}, "id": "ari_cough_last_2wks", "label": {"en": "Cough in the last two weeks", "es": "Tos en las \u00faltimas dos semanas", "fr": "Toux au cours des deux derni\u00e8res semaines"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
      bibliography_refs: dhs-child-health,mics6-child-health,who-imci
  ari_difficult_breathing:
    title:
      en: Difficult breathing (chest indrawing or stridor)
      fr: Difficultés respiratoires (tirage thoracique ou stridor)
      es: Respiración dificultosa (tiraje torácico o estridor)
    description:
      en: 'Whether the child had difficult breathing — specifically, whether the chest went in or the child made a noise when breathing in — when the child had the cough. Published wording: ''Was (name)''s breathing difficult — did the chest go in or did (name) make a noise when breathing in?'' Chest indrawing or stridor are IMCI severe pneumonia signs. Together with fast breathing, defines an ARI positive case in DHS. Ask only if ari_cough_last_2wks is true. DHS code h31 (chest-related component); MICS code ARI3.'
      fr: 'Si l''enfant avait des difficultés respiratoires — en particulier si la poitrine se creusait ou si l''enfant faisait un bruit en inspirant — lorsqu''il toussait. Formulation publiée : « La respiration de (prénom) était-elle difficile — sa poitrine se creusait-elle ou faisait-il/elle un bruit en inspirant ? » Le tirage thoracique ou le stridor sont des signes de pneumonie sévère selon la PCIME. Avec la respiration rapide, définit un cas positif d''IRA selon le DHS. Posez uniquement si ari_cough_last_2wks est vrai. Code DHS h31 (composante thoracique) ; code MICS ARI3.'
      es: 'Si el niño tenía dificultad para respirar — específicamente, si el pecho se hundía o el niño hacía un ruido al inspirar — cuando el niño tenía tos. Redacción publicada: ''¿Tenía (nombre) dificultad para respirar — ¿el pecho se hundía o (nombre) hacía un ruido al inspirar?'' El tiraje torácico o estridor son signos de neumonía grave según IMCI. Junto con la respiración rápida, define un caso positivo de IRA en DHS. Preguntar solo si ari_cough_last_2wks es verdadero. Código DHS h31 (componente torácico); código MICS ARI3.'
    slot_uri: aidops:ari_difficult_breathing
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-imci"], "cardinality": "single", "category": "ari", "core": true, "definition": {"en": "Whether the child had difficult breathing \u2014 specifically, whether the chest went in or the child made a noise when breathing in \u2014 when the child had the cough. Published wording: ''Was (name)''s breathing difficult \u2014 did the chest go in or did (name) make a noise when breathing in?'' Chest indrawing or stridor are IMCI severe pneumonia signs. Together with fast breathing, defines an ARI positive case in DHS. Ask only if ari_cough_last_2wks is true. DHS code h31 (chest-related component); MICS code ARI3.", "es": "Si el ni\u00f1o ten\u00eda dificultad para respirar \u2014 espec\u00edficamente, si el pecho se hund\u00eda o el ni\u00f1o hac\u00eda un ruido al inspirar \u2014 cuando el ni\u00f1o ten\u00eda tos. Redacci\u00f3n publicada: ''\u00bfTen\u00eda (nombre) dificultad para respirar \u2014 \u00bfel pecho se hund\u00eda o (nombre) hac\u00eda un ruido al inspirar?'' El tiraje tor\u00e1cico o estridor son signos de neumon\u00eda grave seg\u00fan IMCI. Junto con la respiraci\u00f3n r\u00e1pida, define un caso positivo de IRA en DHS. Preguntar solo si ari_cough_last_2wks es verdadero. C\u00f3digo DHS h31 (componente tor\u00e1cico); c\u00f3digo MICS ARI3.", "fr": "Si l''enfant avait des difficult\u00e9s respiratoires \u2014 en particulier si la poitrine se creusait ou si l''enfant faisait un bruit en inspirant \u2014 lorsqu''il toussait. Formulation publi\u00e9e : \u00ab La respiration de (pr\u00e9nom) \u00e9tait-elle difficile \u2014 sa poitrine se creusait-elle ou faisait-il/elle un bruit en inspirant ? \u00bb Le tirage thoracique ou le stridor sont des signes de pneumonie s\u00e9v\u00e8re selon la PCIME. Avec la respiration rapide, d\u00e9finit un cas positif d''IRA selon le DHS. Posez uniquement si ari_cough_last_2wks est vrai. Code DHS h31 (composante thoracique) ; code MICS ARI3."}, "id": "ari_difficult_breathing", "label": {"en": "Difficult breathing (chest indrawing or stridor)", "es": "Respiraci\u00f3n dificultosa (tiraje tor\u00e1cico o estridor)", "fr": "Difficult\u00e9s respiratoires (tirage thoracique ou stridor)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
      bibliography_refs: dhs-child-health,mics6-child-health,who-imci
  ari_fast_breathing:
    title:
      en: Fast or rapid breathing during cough
      fr: Respiration rapide pendant la toux
      es: Respiración rápida durante la tos
    description:
      en: 'Whether the child''s breathing was faster than usual (short, rapid breaths) when the child had the cough. Published wording: ''When (name) had the cough, was the breathing faster than usual — that is, short, rapid breaths?'' The main IMCI pneumonia indicator captured from the caregiver''s perspective. Age-specific thresholds (clinical definition, for health worker reference only): ≥60 breaths/min for infants under 2 months; ≥50 breaths/min for 2–11 months; ≥40 breaths/min for 12–59 months. Caregiver-reported proxy. Ask only if ari_cough_last_2wks is true. DHS code h31 (breathing component); MICS code ARI2.'
      fr: 'Si la respiration de l''enfant était plus rapide que d''habitude (inspirations courtes et rapides) lorsque l''enfant toussait. Formulation publiée : « Lorsque (prénom) toussait, sa respiration était-elle plus rapide que d''habitude — c''est-à-dire des inspirations courtes et rapides ? » Le principal indicateur de pneumonie PCIME capturé du point de vue du soignant. Seuils spécifiques à l''âge (définition clinique, à titre de référence pour le professionnel de santé uniquement) : ≥60 respirations/min pour les nourrissons de moins de 2 mois ; ≥50 respirations/min pour 2 à 11 mois ; ≥40 respirations/min pour 12 à 59 mois. Indicateur proxy rapporté par le soignant. Posez uniquement si ari_cough_last_2wks est vrai. Code DHS h31 (composante respiratoire) ; code MICS ARI2.'
      es: 'Si la respiración del niño era más rápida de lo habitual (respiraciones cortas y rápidas) cuando el niño tenía tos. Redacción publicada: ''Cuando (nombre) tenía tos, ¿respiraba más rápido de lo habitual — es decir, con respiraciones cortas y rápidas?'' El principal indicador de neumonía IMCI capturado desde la perspectiva del cuidador. Umbrales específicos por edad (definición clínica, solo para referencia del trabajador de salud): ≥60 respiraciones/min para lactantes menores de 2 meses; ≥50 respiraciones/min para 2 a 11 meses; ≥40 respiraciones/min para 12 a 59 meses. Indicador proxy reportado por el cuidador. Preguntar solo si ari_cough_last_2wks es verdadero. Código DHS h31 (componente respiratorio); código MICS ARI2.'
