urestimer le besoin non satisfait car les \u00e9checs r\u00e9cents de m\u00e9thodes ne sont pas captur\u00e9s r\u00e9trospectivement."}, "id": "fp_unmet_need", "label": {"en": "Unmet need for family planning (derived)", "es": "Necesidad insatisfecha de planificaci\u00f3n familiar (derivada)", "fr": "Besoin non satisfait en planification familiale (d\u00e9riv\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "fp-unmet-need"}'
