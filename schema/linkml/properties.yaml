  land_access_status:
    title:
      en: Land access status
      fr: Statut d'accès à la terre
      es: Estado de acceso a la tierra
    description:
      en: Whether the household currently has access to agricultural or productive land, and under what broad arrangement. Asked only when `main_livelihood_activity` or any `secondary_livelihood_activities` includes `agriculture`, `livestock`, or `fishing`. Drawn from the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT), the LSMS-ISA land tenure module, and the PS `land-tenure` vocabulary. Used as a prerequisite screen before recording full tenure detail in AgricultureProfile. Agriculture-specific land area and crop details belong to AgricultureProfile.
      fr: Si le ménage a actuellement accès à des terres agricoles ou productives, et sous quel arrangement général. Posé uniquement lorsque `main_livelihood_activity` ou l'un des `secondary_livelihood_activities` inclut `agriculture`, `livestock` ou `fishing`. Tiré des Directives volontaires de la FAO pour une gouvernance responsable des régimes fonciers (VGGT), du module foncier LSMS-ISA et du vocabulaire PublicSchema `land-tenure`. Utilisé comme écran préalable avant la saisie des détails complets du régime foncier dans AgricultureProfile. Les détails de superficie et de cultures relèvent d'AgricultureProfile.
      es: Si el hogar tiene actualmente acceso a tierras agrícolas o productivas, y bajo qué arreglo general. Se pregunta solo cuando `main_livelihood_activity` o alguna `secondary_livelihood_activities` incluye `agriculture`, `livestock` o `fishing`. Tomado de las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT), el módulo de tenencia de la tierra LSMS-ISA y el vocabulario PublicSchema `land-tenure`. Se utiliza como pantalla previa antes de registrar los detalles completos de tenencia en AgricultureProfile. Los detalles de superficie y cultivos pertenecen a AgricultureProfile.
    slot_uri: aidops:land_access_status
    range: LandAccessStatus
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household currently has access to agricultural or productive land, and under what broad arrangement. Asked only when `main_livelihood_activity` or any `secondary_livelihood_activities` includes `agriculture`, `livestock`, or `fishing`. Drawn from the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT), the LSMS-ISA land tenure module, and the PS `land-tenure` vocabulary. Used as a prerequisite screen before recording full tenure detail in AgricultureProfile. Agriculture-specific land area and crop details belong to AgricultureProfile.", "es": "Si el hogar tiene actualmente acceso a tierras agr\u00edcolas o productivas, y bajo qu\u00e9 arreglo general. Se pregunta solo cuando `main_livelihood_activity` o alguna `secondary_livelihood_activities` incluye `agriculture`, `livestock` o `fishing`. Tomado de las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT), el m\u00f3dulo de tenencia de la tierra LSMS-ISA y el vocabulario PublicSchema `land-tenure`. Se utiliza como pantalla previa antes de registrar los detalles completos de tenencia en AgricultureProfile. Los detalles de superficie y cultivos pertenecen a AgricultureProfile.", "fr": "Si le m\u00e9nage a actuellement acc\u00e8s \u00e0 des terres agricoles ou productives, et sous quel arrangement g\u00e9n\u00e9ral. Pos\u00e9 uniquement lorsque `main_livelihood_activity` ou l''un des `secondary_livelihood_activities` inclut `agriculture`, `livestock` ou `fishing`. Tir\u00e9 des Directives volontaires de la FAO pour une gouvernance responsable des r\u00e9gimes fonciers (VGGT), du module foncier LSMS-ISA et du vocabulaire PublicSchema `land-tenure`. Utilis\u00e9 comme \u00e9cran pr\u00e9alable avant la saisie des d\u00e9tails complets du r\u00e9gime foncier dans AgricultureProfile. Les d\u00e9tails de superficie et de cultures rel\u00e8vent d''AgricultureProfile."}, "id": "land_access_status", "label": {"en": "Land access status", "es": "Estado de acceso a la tierra", "fr": "Statut d''acc\u00e8s \u00e0 la terre"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "land-access-status"}'
  land_area_cultivated_ha:
    title:
      en: Total land area cultivated by the household (hectares)
      fr: Surface totale de terre cultivée par le ménage (hectares)
      es: Superficie total de tierra cultivada por el hogar (hectáreas)
    description:
      en: Total area in hectares of land the household cultivated or used for agriculture during the last completed agricultural season. Self-reported, allowing fractional values to two decimal places; `0` is a valid response when the household has access to land but did not cultivate it last season. Drawn from FAO WCA 2020 Vol.I (area-of-land-use items) and the LSMS-ISA Agricultural Survey Design guidebook Module 2 (parcel area). Self-reported area is subject to recall and estimation bias; the LSMS-ISA recommends GPS measurement for precision, but self-report is standard in rapid assessments. Captures household-level cultivated area, not per-parcel geometry (which belongs to the PS `Farm` entity).
      fr: Superficie totale en hectares de terre cultivée ou utilisée par le ménage pour l'agriculture au cours de la dernière saison agricole complète. Auto-déclarée, autorisant les valeurs fractionnaires jusqu'à deux décimales ; `0` est une réponse valide lorsque le ménage a accès à la terre mais ne l'a pas cultivée la saison dernière. Tirée du WCA 2020 Vol.I de la FAO (items de superficie d'utilisation des terres) et du Module 2 du guide LSMS-ISA sur la conception d'enquêtes agricoles (superficie de parcelle). La superficie auto-déclarée est sujette à des biais de rappel et d'estimation ; LSMS-ISA recommande la mesure GPS pour la précision, mais l'auto-déclaration est standard dans les évaluations rapides. Saisit la superficie cultivée au niveau du ménage, et non la géométrie par parcelle (qui relève de l'entité PS `Farm`).
      es: Superficie total en hectáreas de tierra cultivada o usada por el hogar para la agricultura durante la última temporada agrícola completa. Autoreportada, permitiendo valores fraccionarios hasta dos decimales; `0` es una respuesta válida cuando el hogar tiene acceso a tierra pero no la cultivó la temporada pasada. Tomada del WCA 2020 Vol.I de la FAO (ítems de superficie de uso de tierras) y del Módulo 2 de la guía LSMS-ISA de diseño de encuestas agrícolas (superficie de parcela). La superficie autoreportada está sujeta a sesgos de recuerdo y estimación; LSMS-ISA recomienda medición GPS para precisión, pero el autoreporte es estándar en evaluaciones rápidas. Captura la superficie cultivada a nivel de hogar, no la geometría por parcela (que corresponde a la entidad PS `Farm`).
    slot_uri: aidops:land_area_cultivated_ha
    range: string
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Total area in hectares of land the household cultivated or used for agriculture during the last completed agricultural season. Self-reported, allowing fractional values to two decimal places; `0` is a valid response when the household has access to land but did not cultivate it last season. Drawn from FAO WCA 2020 Vol.I (area-of-land-use items) and the LSMS-ISA Agricultural Survey Design guidebook Module 2 (parcel area). Self-reported area is subject to recall and estimation bias; the LSMS-ISA recommends GPS measurement for precision, but self-report is standard in rapid assessments. Captures household-level cultivated area, not per-parcel geometry (which belongs to the PS `Farm` entity).", "es": "Superficie total en hect\u00e1reas de tierra cultivada o usada por el hogar para la agricultura durante la \u00faltima temporada agr\u00edcola completa. Autoreportada, permitiendo valores fraccionarios hasta dos decimales; `0` es una respuesta v\u00e1lida cuando el hogar tiene acceso a tierra pero no la cultiv\u00f3 la temporada pasada. Tomada del WCA 2020 Vol.I de la FAO (\u00edtems de superficie de uso de tierras) y del M\u00f3dulo 2 de la gu\u00eda LSMS-ISA de dise\u00f1o de encuestas agr\u00edcolas (superficie de parcela). La superficie autoreportada est\u00e1 sujeta a sesgos de recuerdo y estimaci\u00f3n; LSMS-ISA recomienda medici\u00f3n GPS para precisi\u00f3n, pero el autoreporte es est\u00e1ndar en evaluaciones r\u00e1pidas. Captura la superficie cultivada a nivel de hogar, no la geometr\u00eda por parcela (que corresponde a la entidad PS `Farm`).", "fr": "Superficie totale en hectares de terre cultiv\u00e9e ou utilis\u00e9e par le m\u00e9nage pour l''agriculture au cours de la derni\u00e8re saison agricole compl\u00e8te. Auto-d\u00e9clar\u00e9e, autorisant les valeurs fractionnaires jusqu''\u00e0 deux d\u00e9cimales ; `0` est une r\u00e9ponse valide lorsque le m\u00e9nage a acc\u00e8s \u00e0 la terre mais ne l''a pas cultiv\u00e9e la saison derni\u00e8re. Tir\u00e9e du WCA 2020 Vol.I de la FAO (items de superficie d''utilisation des terres) et du Module 2 du guide LSMS-ISA sur la conception d''enqu\u00eates agricoles (superficie de parcelle). La superficie auto-d\u00e9clar\u00e9e est sujette \u00e0 des biais de rappel et d''estimation ; LSMS-ISA recommande la mesure GPS pour la pr\u00e9cision, mais l''auto-d\u00e9claration est standard dans les \u00e9valuations rapides. Saisit la superficie cultiv\u00e9e au niveau du m\u00e9nage, et non la g\u00e9om\u00e9trie par parcelle (qui rel\u00e8ve de l''entit\u00e9 PS `Farm`)."}, "id": "land_area_cultivated_ha", "label": {"en": "Total land area cultivated by the household (hectares)", "es": "Superficie total de tierra cultivada por el hogar (hect\u00e1reas)", "fr": "Surface totale de terre cultiv\u00e9e par le m\u00e9nage (hectares)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
  land_tenure_arrangement:
    title:
      en: Primary land tenure arrangement (household level)
      fr: Régime foncier principal (niveau du ménage)
      es: Régimen de tenencia de tierra principal (nivel del hogar)
    description:
      en: 'Primary arrangement under which the household accesses or holds the agricultural land it uses. When the household uses land under more than one arrangement, the primary (most-used or most-important) arrangement is selected. Uses the PS `land-tenure` vocabulary (FAO VGGT categories: owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). This is a household-level restatement of the per-parcel PS `Farm.land_tenure` property; the household profile captures the dominant arrangement across the household''s total land access. Sensitive because tenure status can be stigmatising; in IDP or refugee contexts the `informal` code may warrant restricted sensitivity handling (see AgricultureProfile Open Questions).'
      fr: 'Principal régime dans lequel le ménage accède à la terre agricole qu''il utilise ou la détient. Lorsque le ménage utilise des terres sous plus d''un régime, le régime principal (le plus utilisé ou le plus important) est sélectionné. Utilise le vocabulaire PS `land-tenure` (catégories VGGT de la FAO : owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). C''est une reformulation au niveau du ménage de la propriété par parcelle PS `Farm.land_tenure` ; le profil du ménage capture le régime dominant sur l''ensemble de l''accès du ménage à la terre. Sensible parce que le statut foncier peut être stigmatisant ; dans les contextes de PDI ou de réfugiés, le code `informal` peut justifier un traitement de sensibilité restreinte (voir Questions ouvertes AgricultureProfile).'
      es: 'Arreglo principal bajo el cual el hogar accede o posee la tierra agrícola que usa. Cuando el hogar usa tierra bajo más de un arreglo, se selecciona el principal (el más usado o más importante). Usa el vocabulario PS `land-tenure` (categorías VGGT de la FAO: owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). Es una reformulación a nivel del hogar de la propiedad por parcela PS `Farm.land_tenure`; el perfil del hogar captura el arreglo dominante sobre el acceso total del hogar a la tierra. Sensible porque el estado de tenencia puede ser estigmatizante; en contextos de PDI o refugiados, el código `informal` puede ameritar manejo de sensibilidad restringida (ver Preguntas Abiertas de AgricultureProfile).'
    slot_uri: aidops:land_tenure_arrangement
    range: LandTenure
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Primary arrangement under which the household accesses or holds the agricultural land it uses. When the household uses land under more than one arrangement, the primary (most-used or most-important) arrangement is selected. Uses the PS `land-tenure` vocabulary (FAO VGGT categories: owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). This is a household-level restatement of the per-parcel PS `Farm.land_tenure` property; the household profile captures the dominant arrangement across the household''s total land access. Sensitive because tenure status can be stigmatising; in IDP or refugee contexts the `informal` code may warrant restricted sensitivity handling (see AgricultureProfile Open Questions).", "es": "Arreglo principal bajo el cual el hogar accede o posee la tierra agr\u00edcola que usa. Cuando el hogar usa tierra bajo m\u00e1s de un arreglo, se selecciona el principal (el m\u00e1s usado o m\u00e1s importante). Usa el vocabulario PS `land-tenure` (categor\u00edas VGGT de la FAO: owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). Es una reformulaci\u00f3n a nivel del hogar de la propiedad por parcela PS `Farm.land_tenure`; el perfil del hogar captura el arreglo dominante sobre el acceso total del hogar a la tierra. Sensible porque el estado de tenencia puede ser estigmatizante; en contextos de PDI o refugiados, el c\u00f3digo `informal` puede ameritar manejo de sensibilidad restringida (ver Preguntas Abiertas de AgricultureProfile).", "fr": "Principal r\u00e9gime dans lequel le m\u00e9nage acc\u00e8de \u00e0 la terre agricole qu''il utilise ou la d\u00e9tient. Lorsque le m\u00e9nage utilise des terres sous plus d''un r\u00e9gime, le r\u00e9gime principal (le plus utilis\u00e9 ou le plus important) est s\u00e9lectionn\u00e9. Utilise le vocabulaire PS `land-tenure` (cat\u00e9gories VGGT de la FAO : owned_with_title, owned_without_title, rented, sharecropped, communal, state_allocated, informal, borrowed, other). C''est une reformulation au niveau du m\u00e9nage de la propri\u00e9t\u00e9 par parcelle PS `Farm.land_tenure` ; le profil du m\u00e9nage capture le r\u00e9gime dominant sur l''ensemble de l''acc\u00e8s du m\u00e9nage \u00e0 la terre. Sensible parce que le statut foncier peut \u00eatre stigmatisant ; dans les contextes de PDI ou de r\u00e9fugi\u00e9s, le code `informal` peut justifier un traitement de sensibilit\u00e9 restreinte (voir Questions ouvertes AgricultureProfile)."}, "id": "land_tenure_arrangement", "label": {"en": "Primary land tenure arrangement (household level)", "es": "R\u00e9gimen de tenencia de tierra principal (nivel del hogar)", "fr": "R\u00e9gime foncier principal (niveau du m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "land-tenure"}'
  land_tenure_security_perceived:
    title:
      en: Perceived tenure security (3-year horizon)
      fr: Sécurité foncière perçue (horizon 3 ans)
      es: Seguridad de tenencia percibida (horizonte 3 años)
    description:
      en: 'Household''s subjective assessment of how secure its right is to continue using its agricultural land over the next three years. Uses the four-level scale in vocabulary `tenure-security-3` plus a `dont_know` option. Based on LSMS-ISA subjective-tenure-security questions and PRINDEX methodology. FAO VGGT Section 5 frames tenure security as protection against loss of tenure rights. Complements `land_tenure_arrangement`: a household may be secure in a weak objective arrangement (customary community support) or insecure under a strong objective arrangement (political or conflict risk). Sensitive because responses may indicate vulnerability to eviction or conflict.'
      fr: 'Évaluation subjective du ménage quant à la sécurité de son droit de continuer à utiliser sa terre agricole au cours des trois prochaines années. Utilise l''échelle à quatre niveaux du vocabulaire `tenure-security-3` plus une option `dont_know`. Basée sur les questions de sécurité foncière subjective du LSMS-ISA et la méthodologie PRINDEX. La Section 5 des VGGT de la FAO définit la sécurité foncière comme la protection contre la perte des droits fonciers. Complète `land_tenure_arrangement` : un ménage peut être sécurisé dans un arrangement objectif faible (soutien communautaire coutumier) ou non sécurisé dans un arrangement objectif fort (risque politique ou de conflit). Sensible car les réponses peuvent indiquer une vulnérabilité à l''expulsion ou au conflit.'
      es: 'Evaluación subjetiva del hogar sobre cuán seguro es su derecho a continuar usando su tierra agrícola durante los próximos tres años. Usa la escala de cuatro niveles del vocabulario `tenure-security-3` más una opción `dont_know`. Basada en las preguntas de seguridad subjetiva de tenencia del LSMS-ISA y la metodología PRINDEX. La Sección 5 de las VGGT de la FAO enmarca la seguridad de tenencia como protección contra la pérdida de derechos de tenencia. Complementa `land_tenure_arrangement`: un hogar puede estar seguro en un arreglo objetivo débil (apoyo comunitario consuetudinario) o inseguro en un arreglo objetivo fuerte (riesgo político o de conflicto). Sensible porque las respuestas pueden indicar vulnerabilidad a desalojo o conflicto.'
    slot_uri: aidops:land_tenure_security_perceived
    range: TenureSecurity3
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Household''s subjective assessment of how secure its right is to continue using its agricultural land over the next three years. Uses the four-level scale in vocabulary `tenure-security-3` plus a `dont_know` option. Based on LSMS-ISA subjective-tenure-security questions and PRINDEX methodology. FAO VGGT Section 5 frames tenure security as protection against loss of tenure rights. Complements `land_tenure_arrangement`: a household may be secure in a weak objective arrangement (customary community support) or insecure under a strong objective arrangement (political or conflict risk). Sensitive because responses may indicate vulnerability to eviction or conflict.", "es": "Evaluaci\u00f3n subjetiva del hogar sobre cu\u00e1n seguro es su derecho a continuar usando su tierra agr\u00edcola durante los pr\u00f3ximos tres a\u00f1os. Usa la escala de cuatro niveles del vocabulario `tenure-security-3` m\u00e1s una opci\u00f3n `dont_know`. Basada en las preguntas de seguridad subjetiva de tenencia del LSMS-ISA y la metodolog\u00eda PRINDEX. La Secci\u00f3n 5 de las VGGT de la FAO enmarca la seguridad de tenencia como protecci\u00f3n contra la p\u00e9rdida de derechos de tenencia. Complementa `land_tenure_arrangement`: un hogar puede estar seguro en un arreglo objetivo d\u00e9bil (apoyo comunitario consuetudinario) o inseguro en un arreglo objetivo fuerte (riesgo pol\u00edtico o de conflicto). Sensible porque las respuestas pueden indicar vulnerabilidad a desalojo o conflicto.", "fr": "\u00c9valuation subjective du m\u00e9nage quant \u00e0 la s\u00e9curit\u00e9 de son droit de continuer \u00e0 utiliser sa terre agricole au cours des trois prochaines ann\u00e9es. Utilise l''\u00e9chelle \u00e0 quatre niveaux du vocabulaire `tenure-security-3` plus une option `dont_know`. Bas\u00e9e sur les questions de s\u00e9curit\u00e9 fonci\u00e8re subjective du LSMS-ISA et la m\u00e9thodologie PRINDEX. La Section 5 des VGGT de la FAO d\u00e9finit la s\u00e9curit\u00e9 fonci\u00e8re comme la protection contre la perte des droits fonciers. Compl\u00e8te `land_tenure_arrangement` : un m\u00e9nage peut \u00eatre s\u00e9curis\u00e9 dans un arrangement objectif faible (soutien communautaire coutumier) ou non s\u00e9curis\u00e9 dans un arrangement objectif fort (risque politique ou de conflit). Sensible car les r\u00e9ponses peuvent indiquer une vuln\u00e9rabilit\u00e9 \u00e0 l''expulsion ou au conflit."}, "id": "land_tenure_security_perceived", "label": {"en": "Perceived tenure security (3-year horizon)", "es": "Seguridad de tenencia percibida (horizonte 3 a\u00f1os)", "fr": "S\u00e9curit\u00e9 fonci\u00e8re per\u00e7ue (horizon 3 ans)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "tenure-security-3"}'
  large_cooking_pot_count:
