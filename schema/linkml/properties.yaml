  nfi_received_past_3mo:
    title:
      en: Household received NFIs in the past 3 months
      fr: Ménage a reçu des ANA au cours des 3 derniers mois
      es: Hogar recibió ANF en los últimos 3 meses
    description:
      en: 'Whether the household has received any non-food items (such as blankets, cooking sets, clothing, or tools) from an aid organisation in the past 3 months. Recall period: past 3 months. Based on the UNHCR Global NFI PDM framework: establish receipt of assistance before asking about adequacy and use.'
      fr: 'Si le ménage a reçu des articles non alimentaires (tels que couvertures, kits de cuisine, vêtements ou outils) d''une organisation d''aide au cours des 3 derniers mois. Période de rappel : 3 derniers mois. Basé sur le cadre du Suivi Post-Distribution Mondial des ANA du HCR : établir la réception de l''aide avant d''interroger sur l''adéquation et l''utilisation.'
      es: 'Si el hogar ha recibido artículos no alimentarios (como frazadas, juegos de cocina, ropa o herramientas) de una organización de ayuda en los últimos 3 meses. Período de recordatorio: últimos 3 meses. Basado en el marco del PDM Global de ANF del ACNUR: establecer la recepción de asistencia antes de preguntar sobre la adecuación y el uso.'
    slot_uri: aidops:nfi_received_past_3mo
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "unhcr-nfi-pdm-2025"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Whether the household has received any non-food items (such as blankets, cooking sets, clothing, or tools) from an aid organisation in the past 3 months. Recall period: past 3 months. Based on the UNHCR Global NFI PDM framework: establish receipt of assistance before asking about adequacy and use.", "es": "Si el hogar ha recibido art\u00edculos no alimentarios (como frazadas, juegos de cocina, ropa o herramientas) de una organizaci\u00f3n de ayuda en los \u00faltimos 3 meses. Per\u00edodo de recordatorio: \u00faltimos 3 meses. Basado en el marco del PDM Global de ANF del ACNUR: establecer la recepci\u00f3n de asistencia antes de preguntar sobre la adecuaci\u00f3n y el uso.", "fr": "Si le m\u00e9nage a re\u00e7u des articles non alimentaires (tels que couvertures, kits de cuisine, v\u00eatements ou outils) d''une organisation d''aide au cours des 3 derniers mois. P\u00e9riode de rappel : 3 derniers mois. Bas\u00e9 sur le cadre du Suivi Post-Distribution Mondial des ANA du HCR : \u00e9tablir la r\u00e9ception de l''aide avant d''interroger sur l''ad\u00e9quation et l''utilisation."}, "id": "nfi_received_past_3mo", "label": {"en": "Household received NFIs in the past 3 months", "es": "Hogar recibi\u00f3 ANF en los \u00faltimos 3 meses", "fr": "M\u00e9nage a re\u00e7u des ANA au cours des 3 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-dk"}'
