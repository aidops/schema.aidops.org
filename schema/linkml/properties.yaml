      fr: 'L''âge de l''enfant index en mois révolus au moment de l''évaluation. Requis pour le calcul des indicateurs IYCF : le groupe d''âge détermine les indicateurs applicables (ALM pour 0–5 mois, CBF et MDD-C pour 6–23 mois) et régit le filtrage par âge dans le formulaire.'
      es: 'La edad del niño índice en meses cumplidos al momento de la evaluación. Requerido para el cálculo de indicadores IYCF: el grupo de edad determina qué indicadores aplican (LME para 0–5 meses, CBF y MDD-C para 6–23 meses) y controla el filtrado por edad en el formulario.'
