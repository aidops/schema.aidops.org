  climate_insurance_paid_out_past_event:
    title:
      en: Insurance paid out a benefit during a climate-related loss in the past 5 years
      fr: Une assurance a versé une prestation lors d'une perte climatique au cours des 5 dernières années
      es: Un seguro pagó un beneficio durante una pérdida climática en los últimos 5 años
    description:
      en: 'Single-select item asking whether, in the past 5 years, any insurance paid a benefit to the household when it experienced a climate-related loss. Applies when at least one non-''none'' code is selected in climate_insurance_coverage_type. This item distinguishes nominal insurance coverage from realized coverage — a household that paid premiums but had a claim denied has lower effective adaptive capacity than the insurance item alone would indicate. Valid codes: yes_paid_in_full / yes_paid_partially / no_claim_made_but_covered / no_no_coverage / no_claim_denied / not_applicable_no_loss / dont_know.'
      fr: Item à sélection unique demandant si, au cours des 5 dernières années, une assurance a versé une prestation au ménage lorsqu'il a subi une perte liée au climat. S'applique lorsqu'au moins un code autre que 'none' est sélectionné dans climate_insurance_coverage_type. Distingue la couverture nominale de la couverture réalisée — un ménage dont la demande d'indemnité a été refusée a une capacité d'adaptation effective plus faible.
      es: 'Ítem de selección única que pregunta si en los últimos 5 años algún seguro pagó un beneficio al hogar cuando sufrió una pérdida relacionada con el clima. Aplica cuando al menos un código distinto a ''none'' está seleccionado en climate_insurance_coverage_type. Distingue la cobertura nominal de la realizada: un hogar que pagó primas pero tuvo un reclamo denegado tiene menor capacidad de adaptación efectiva.'
    slot_uri: aidops:climate_insurance_paid_out_past_event
    range: string
