  handwashing_soap_available:
    title:
      en: Soap available at handwashing facility (observed)
      fr: Savon disponible au dispositif de lavage des mains (observé)
      es: Jabón disponible en la instalación de lavado de manos (observado)
    description:
      en: Whether soap or detergent is available at or near the handwashing facility at the moment of the enumerator's visit. JMP H3 (direct enumerator observation, not self-report). Asked only when handwashing_facility_present is not 'no'. Qualifying soap includes bar soap, liquid soap, powder detergent, and soapy water. Ash, sand, and soil do NOT qualify as soap for JMP purposes.
      fr: Si du savon ou du détergent est disponible au dispositif de lavage des mains ou à proximité au moment de la visite de l'énumérateur. JMP H3 (observation directe de l'énumérateur, pas d'auto-déclaration). Demandé uniquement quand handwashing_facility_present n'est pas 'no'. Le savon qualifiant inclut le savon en pain, le savon liquide, la lessive en poudre et l'eau savonneuse. La cendre, le sable et la terre ne sont PAS qualifiés comme savon pour les besoins du JMP.
      es: Si hay jabón o detergente disponible en o cerca de la instalación de lavado de manos en el momento de la visita del enumerador. JMP H3 (observación directa del enumerador, no autodeclaración). Preguntado solo cuando handwashing_facility_present no es 'no'. El jabón que califica incluye jabón en barra, jabón líquido, detergente en polvo y agua jabonosa. La ceniza, la arena y el suelo NO califican como jabón para los propósitos del JMP.
