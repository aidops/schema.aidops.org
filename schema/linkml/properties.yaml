  hf_staff_chw_linked:
    title:
      en: Facility linked to community health workers
      fr: Établissement lié à des agents de santé communautaires
      es: Establecimiento vinculado con trabajadores de salud comunitaria
    description:
      en: Whether the facility is linked to community health workers (CHWs) who routinely work in the catchment area, reporting to the facility for supervision or supplies. CHW presence is often community-based rather than facility-based; this item captures the linkage. Reported. Extended (non-core). `dont_know` is retained as a distinct response.
      fr: Si l'établissement est lié à des agents de santé communautaires (ASC) qui travaillent régulièrement dans la zone de couverture, se rapportant à l'établissement pour la supervision ou les fournitures. La présence d'ASC est souvent communautaire plutôt que basée à l'établissement ; cet item capture la liaison. Rapporté. Étendu (non-core). `dont_know` est conservé comme réponse distincte.
      es: Si el establecimiento está vinculado con trabajadores de salud comunitaria (CHW) que trabajan rutinariamente en el área de captación, reportando al establecimiento para supervisión o insumos. La presencia de CHW suele ser comunitaria más que basada en el establecimiento; este ítem captura la vinculación. Reportado. Extendido (no-core). `dont_know` se mantiene como respuesta distinta.
