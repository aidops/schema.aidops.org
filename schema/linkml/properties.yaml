    title:
      en: rCSI score
      fr: Score rCSI
      es: Puntaje rCSI
    description:
      en: The reduced Coping Strategies Index score for this administration, calculated as the weighted sum of five coping strategy frequency days. Range 0-56. Higher scores indicate greater food insecurity. The canonical scoring uses WFP standard weights (1, 2, 1, 1, 3).
