  electricity_cost_share:
    title:
      en: Electricity cost as share of income
      fr: Coût de l'électricité en part du revenu
      es: Costo de electricidad como porcentaje del ingreso
    description:
      en: 'Banded estimate of the share of monthly household income spent on electricity. MTF electricity affordability attribute: Tier 4-5 criterion is met when the cost of 365 kWh per year is less than 5% of household income, corresponding to the ''less_than_5_pct'' band. The three-band response captures this threshold without requiring exact income and expenditure data. Source: MTF household survey.'
      fr: 'Estimation par tranche de la part du revenu mensuel du ménage consacrée à l''électricité. Attribut d''accessibilité financière de l''électricité MTF : le critère des niveaux 4 à 5 est satisfait lorsque le coût de 365 kWh par an est inférieur à 5 % du revenu du ménage, correspondant à la tranche ''less_than_5_pct''. La réponse à trois tranches capture ce seuil sans nécessiter de données précises sur les revenus et les dépenses. Source : enquête ménage MTF.'
      es: 'Estimación por bandas de la proporción del ingreso mensual del hogar gastada en electricidad. Atributo de asequibilidad de electricidad MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo de 365 kWh por año es inferior al 5% del ingreso del hogar, correspondiendo a la banda ''less_than_5_pct''. La respuesta de tres bandas captura este umbral sin requerir datos precisos de ingresos y gastos. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_cost_share
    range: IncomeShareBand
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Banded estimate of the share of monthly household income spent on electricity. MTF electricity affordability attribute: Tier 4-5 criterion is met when the cost of 365 kWh per year is less than 5% of household income, corresponding to the ''less_than_5_pct'' band. The three-band response captures this threshold without requiring exact income and expenditure data. Source: MTF household survey.", "es": "Estimaci\u00f3n por bandas de la proporci\u00f3n del ingreso mensual del hogar gastada en electricidad. Atributo de asequibilidad de electricidad MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo de 365 kWh por a\u00f1o es inferior al 5% del ingreso del hogar, correspondiendo a la banda ''less_than_5_pct''. La respuesta de tres bandas captura este umbral sin requerir datos precisos de ingresos y gastos. Fuente: encuesta de hogares MTF.", "fr": "Estimation par tranche de la part du revenu mensuel du m\u00e9nage consacr\u00e9e \u00e0 l''\u00e9lectricit\u00e9. Attribut d''accessibilit\u00e9 financi\u00e8re de l''\u00e9lectricit\u00e9 MTF : le crit\u00e8re des niveaux 4 \u00e0 5 est satisfait lorsque le co\u00fbt de 365 kWh par an est inf\u00e9rieur \u00e0 5 % du revenu du m\u00e9nage, correspondant \u00e0 la tranche ''less_than_5_pct''. La r\u00e9ponse \u00e0 trois tranches capture ce seuil sans n\u00e9cessiter de donn\u00e9es pr\u00e9cises sur les revenus et les d\u00e9penses. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_cost_share", "label": {"en": "Electricity cost as share of income", "es": "Costo de electricidad como porcentaje del ingreso", "fr": "Co\u00fbt de l''\u00e9lectricit\u00e9 en part du revenu"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["se4all_mtf"], "vocabulary": "income-share-band"}'
      bibliography_refs: se4all-mtf
  electricity_evening_hours:
    title:
      en: Electricity available in evenings
      fr: Électricité disponible en soirée
      es: Electricidad disponible por las tardes
    description:
      en: 'Whether electricity is available in the evenings (between sunset and 10 pm) in the household. Evening supply is a separate MTF duration sub-attribute: Tier 1 and above require evening supply. Night and evening supply determines which productive activities, safety behaviors, and household tasks are supported. Source: MTF household survey.'
      fr: 'Si l''électricité est disponible en soirée (entre le coucher du soleil et 22 h) dans le ménage. L''alimentation en soirée est un sous-attribut distinct de la durée MTF : les niveaux 1 et supérieurs exigent une alimentation en soirée. L''alimentation nocturne et en soirée détermine les activités productives, les comportements de sécurité et les tâches ménagères qui sont pris en charge. Source : enquête ménage MTF.'
      es: 'Si la electricidad está disponible por las tardes (entre la puesta del sol y las 22 h) en el hogar. El suministro vespertino es un subatributo de duración MTF separado: el Nivel 1 y superiores requieren suministro vespertino. El suministro nocturno y vespertino determina qué actividades productivas, comportamientos de seguridad y tareas del hogar son posibles. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_evening_hours
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Whether electricity is available in the evenings (between sunset and 10 pm) in the household. Evening supply is a separate MTF duration sub-attribute: Tier 1 and above require evening supply. Night and evening supply determines which productive activities, safety behaviors, and household tasks are supported. Source: MTF household survey.", "es": "Si la electricidad est\u00e1 disponible por las tardes (entre la puesta del sol y las 22 h) en el hogar. El suministro vespertino es un subatributo de duraci\u00f3n MTF separado: el Nivel 1 y superiores requieren suministro vespertino. El suministro nocturno y vespertino determina qu\u00e9 actividades productivas, comportamientos de seguridad y tareas del hogar son posibles. Fuente: encuesta de hogares MTF.", "fr": "Si l''\u00e9lectricit\u00e9 est disponible en soir\u00e9e (entre le coucher du soleil et 22 h) dans le m\u00e9nage. L''alimentation en soir\u00e9e est un sous-attribut distinct de la dur\u00e9e MTF : les niveaux 1 et sup\u00e9rieurs exigent une alimentation en soir\u00e9e. L''alimentation nocturne et en soir\u00e9e d\u00e9termine les activit\u00e9s productives, les comportements de s\u00e9curit\u00e9 et les t\u00e2ches m\u00e9nag\u00e8res qui sont pris en charge. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_evening_hours", "label": {"en": "Electricity available in evenings", "es": "Electricidad disponible por las tardes", "fr": "\u00c9lectricit\u00e9 disponible en soir\u00e9e"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
      bibliography_refs: se4all-mtf
  electricity_hours_per_day:
    title:
      en: Electricity availability (hours per day)
      fr: Disponibilité de l'électricité (heures par jour)
      es: Disponibilidad de electricidad (horas por día)
    description:
      en: 'Hours per day electricity is typically available in the household. MTF electricity duration attribute — tier thresholds: 23 or more hrs/day = Tier 4-5; 16 or more hrs/day = Tier 3; 8 or more hrs/day = Tier 2; 4 or more hrs/day = Tier 1; fewer than 4 hrs/day = Tier 0 for this attribute. Combined with electricity_evening_hours this determines the duration tier. Respondent should report a typical week, not an exceptional one. Source: MTF household survey.'
      fr: 'Heures par jour pendant lesquelles l''électricité est généralement disponible dans le ménage. Attribut de durée de l''électricité MTF — seuils de niveau : 23 heures/jour ou plus = niveaux 4 à 5 ; 16 heures/jour ou plus = niveau 3 ; 8 heures/jour ou plus = niveau 2 ; 4 heures/jour ou plus = niveau 1 ; moins de 4 heures/jour = niveau 0 pour cet attribut. Combiné avec electricity_evening_hours, cela détermine le niveau de durée. Le répondant doit indiquer une semaine typique, pas une semaine exceptionnelle. Source : enquête ménage MTF.'
      es: 'Horas por día que la electricidad está disponible típicamente en el hogar. Atributo de duración de electricidad MTF: umbrales de nivel: 23 o más h/día = Niveles 4-5; 16 o más h/día = Nivel 3; 8 o más h/día = Nivel 2; 4 o más h/día = Nivel 1; menos de 4 h/día = Nivel 0 para este atributo. Combinado con electricity_evening_hours determina el nivel de duración. El respondente debe informar una semana típica, no una excepcional. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_hours_per_day
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "Hours per day electricity is typically available in the household. MTF electricity duration attribute \u2014 tier thresholds: 23 or more hrs/day = Tier 4-5; 16 or more hrs/day = Tier 3; 8 or more hrs/day = Tier 2; 4 or more hrs/day = Tier 1; fewer than 4 hrs/day = Tier 0 for this attribute. Combined with electricity_evening_hours this determines the duration tier. Respondent should report a typical week, not an exceptional one. Source: MTF household survey.", "es": "Horas por d\u00eda que la electricidad est\u00e1 disponible t\u00edpicamente en el hogar. Atributo de duraci\u00f3n de electricidad MTF: umbrales de nivel: 23 o m\u00e1s h/d\u00eda = Niveles 4-5; 16 o m\u00e1s h/d\u00eda = Nivel 3; 8 o m\u00e1s h/d\u00eda = Nivel 2; 4 o m\u00e1s h/d\u00eda = Nivel 1; menos de 4 h/d\u00eda = Nivel 0 para este atributo. Combinado con electricity_evening_hours determina el nivel de duraci\u00f3n. El respondente debe informar una semana t\u00edpica, no una excepcional. Fuente: encuesta de hogares MTF.", "fr": "Heures par jour pendant lesquelles l''\u00e9lectricit\u00e9 est g\u00e9n\u00e9ralement disponible dans le m\u00e9nage. Attribut de dur\u00e9e de l''\u00e9lectricit\u00e9 MTF \u2014 seuils de niveau : 23 heures/jour ou plus = niveaux 4 \u00e0 5 ; 16 heures/jour ou plus = niveau 3 ; 8 heures/jour ou plus = niveau 2 ; 4 heures/jour ou plus = niveau 1 ; moins de 4 heures/jour = niveau 0 pour cet attribut. Combin\u00e9 avec electricity_evening_hours, cela d\u00e9termine le niveau de dur\u00e9e. Le r\u00e9pondant doit indiquer une semaine typique, pas une semaine exceptionnelle. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_hours_per_day", "label": {"en": "Electricity availability (hours per day)", "es": "Disponibilidad de electricidad (horas por d\u00eda)", "fr": "Disponibilit\u00e9 de l''\u00e9lectricit\u00e9 (heures par jour)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
