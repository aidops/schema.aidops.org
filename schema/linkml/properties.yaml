iones del enumerador); usar 0.0 cuando los animales no producen leche. Es el indicador principal de fuente alimentaria para hogares pastorales \u2014 completamente ausente del FoodSecurityProfile (que solo captura si se consumieron l\u00e1cteos en HDDS/FCS, no el volumen de producci\u00f3n del hogar).", "fr": "Production laiti\u00e8re quotidienne moyenne en litres de tous les animaux du m\u00e9nage (chameaux, bovins, caprins, ovins) au cours des 7 derniers jours. Le rappel de 7 jours est recommand\u00e9 par FSNAU par rapport \u00e0 un rappel de 24 heures pour r\u00e9duire l''erreur de mesure due \u00e0 la variation journali\u00e8re. Autoriser les valeurs d\u00e9cimales (incr\u00e9ments de 0,5 litre pour les invites de l''\u00e9num\u00e9rateur) ; utiliser 0,0 lorsque les animaux n''ont pas produit de lait. Il s''agit de l''indicateur principal de source alimentaire pour les m\u00e9nages pastoraux \u2014 totalement absent du FoodSecurityProfile (qui ne capture que si des produits laitiers ont \u00e9t\u00e9 consomm\u00e9s dans HDDS/FCS, pas le volume de production du m\u00e9nage)."}, "id": "milk_production_liters_per_day_household", "label": {"en": "Average daily milk production (liters) \u2014 all animals, last 7 days", "es": "Producci\u00f3n diaria promedio de leche (litros) \u2014 todos los animales, \u00faltimos 7 d\u00edas", "fr": "Production laiti\u00e8re quotidienne moyenne (litres) \u2014 tous animaux, 7 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
