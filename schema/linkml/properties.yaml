  iycf_mmff:
    title:
      en: Minimum Milk Feeding Frequency (MMFF) achieved
      fr: Fréquence minimale d'alimentation lactée (MMFF) atteinte
      es: Frecuencia Mínima de Alimentación con Leche (MMFF) alcanzada
    description:
      en: 'Derived boolean: whether the non-breastfed child received at least 2 milk feeds (infant formula or animal milk) yesterday. Applies to non-breastfed children 6–23 months only. Formula: iycf_milk_feed_count >= 2. This is a new explicit indicator in WHO/UNICEF 2021 (previously incorporated into MMF without a separate threshold).'
      fr: 'Booléen dérivé : indique si l''enfant non allaité a reçu au moins 2 repas lactés (lait maternisé ou lait animal) hier. S''applique uniquement aux enfants non allaités de 6 à 23 mois. Formule : iycf_milk_feed_count >= 2. Il s''agit d''un nouvel indicateur explicite de l''OMS/UNICEF 2021 (précédemment incorporé dans le MMF sans seuil distinct).'
      es: 'Booleano derivado: indica si el niño no amamantado recibió al menos 2 tomas de leche (fórmula infantil o leche animal) ayer. Se aplica solo a niños no amamantados de 6–23 meses. Fórmula: iycf_milk_feed_count >= 2. Este es un nuevo indicador explícito en OMS/UNICEF 2021 (anteriormente incorporado en el MMF sin un umbral separado).'
    slot_uri: aidops:iycf_mmff
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived boolean: whether the non-breastfed child received at least 2 milk feeds (infant formula or animal milk) yesterday. Applies to non-breastfed children 6\u201323 months only. Formula: iycf_milk_feed_count >= 2. This is a new explicit indicator in WHO/UNICEF 2021 (previously incorporated into MMF without a separate threshold).", "es": "Booleano derivado: indica si el ni\u00f1o no amamantado recibi\u00f3 al menos 2 tomas de leche (f\u00f3rmula infantil o leche animal) ayer. Se aplica solo a ni\u00f1os no amamantados de 6\u201323 meses. F\u00f3rmula: iycf_milk_feed_count >= 2. Este es un nuevo indicador expl\u00edcito en OMS/UNICEF 2021 (anteriormente incorporado en el MMF sin un umbral separado).", "fr": "Bool\u00e9en d\u00e9riv\u00e9 : indique si l''enfant non allait\u00e9 a re\u00e7u au moins 2 repas lact\u00e9s (lait maternis\u00e9 ou lait animal) hier. S''applique uniquement aux enfants non allait\u00e9s de 6 \u00e0 23 mois. Formule : iycf_milk_feed_count >= 2. Il s''agit d''un nouvel indicateur explicite de l''OMS/UNICEF 2021 (pr\u00e9c\u00e9demment incorpor\u00e9 dans le MMF sans seuil distinct)."}, "id": "iycf_mmff", "label": {"en": "Minimum Milk Feeding Frequency (MMFF) achieved", "es": "Frecuencia M\u00ednima de Alimentaci\u00f3n con Leche (MMFF) alcanzada", "fr": "Fr\u00e9quence minimale d''alimentation lact\u00e9e (MMFF) atteinte"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
