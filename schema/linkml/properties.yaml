  primary_lighting_source:
    title:
      en: Primary lighting source
      fr: Source d'éclairage principale
      es: Fuente de iluminación principal
    description:
      en: 'The main source of lighting used in the household at night. Distinct from primary_electricity_source: a household with solar electricity may still use kerosene lamps for supplementary lighting. WHO Household Energy Database tracks lighting separately from cooking fuel for SDG monitoring. Kerosene and candle lighting represent health risks (indoor air pollution, fire) and cost burdens. Source: DHS hv207; MICS6 HC9; WHO/World Bank harmonized questionnaire.'
      fr: 'La source principale d''éclairage utilisée par le ménage la nuit. Distincte de primary_electricity_source : un ménage disposant d''électricité solaire peut encore utiliser des lampes à pétrole pour l''éclairage d''appoint. La base de données sur l''énergie domestique de l''OMS suit l''éclairage séparément du combustible de cuisson pour le suivi des ODD. L''éclairage au pétrole lampant et à la bougie présente des risques pour la santé (pollution de l''air intérieur, incendie) et des charges de coût. Source : DHS hv207 ; MICS6 HC9 ; questionnaire harmonisé OMS/Banque mondiale.'
      es: 'La fuente principal de iluminación utilizada en el hogar por la noche. Distinta de primary_electricity_source: un hogar con electricidad solar puede seguir usando lámparas de queroseno para iluminación suplementaria. La base de datos de energía doméstica de la OMS rastrea la iluminación por separado del combustible de cocción para el monitoreo de los ODS. La iluminación con queroseno y velas representa riesgos para la salud (contaminación del aire interior, incendio) y cargas de costo. Fuente: DHS hv207; MICS6 HC9; cuestionario armonizado OMS/Banco Mundial.'
    slot_uri: aidops:primary_lighting_source
    range: LightingSource
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "The main source of lighting used in the household at night. Distinct from primary_electricity_source: a household with solar electricity may still use kerosene lamps for supplementary lighting. WHO Household Energy Database tracks lighting separately from cooking fuel for SDG monitoring. Kerosene and candle lighting represent health risks (indoor air pollution, fire) and cost burdens. Source: DHS hv207; MICS6 HC9; WHO/World Bank harmonized questionnaire.", "es": "La fuente principal de iluminaci\u00f3n utilizada en el hogar por la noche. Distinta de primary_electricity_source: un hogar con electricidad solar puede seguir usando l\u00e1mparas de queroseno para iluminaci\u00f3n suplementaria. La base de datos de energ\u00eda dom\u00e9stica de la OMS rastrea la iluminaci\u00f3n por separado del combustible de cocci\u00f3n para el monitoreo de los ODS. La iluminaci\u00f3n con queroseno y velas representa riesgos para la salud (contaminaci\u00f3n del aire interior, incendio) y cargas de costo. Fuente: DHS hv207; MICS6 HC9; cuestionario armonizado OMS/Banco Mundial.", "fr": "La source principale d''\u00e9clairage utilis\u00e9e par le m\u00e9nage la nuit. Distincte de primary_electricity_source : un m\u00e9nage disposant d''\u00e9lectricit\u00e9 solaire peut encore utiliser des lampes \u00e0 p\u00e9trole pour l''\u00e9clairage d''appoint. La base de donn\u00e9es sur l''\u00e9nergie domestique de l''OMS suit l''\u00e9clairage s\u00e9par\u00e9ment du combustible de cuisson pour le suivi des ODD. L''\u00e9clairage au p\u00e9trole lampant et \u00e0 la bougie pr\u00e9sente des risques pour la sant\u00e9 (pollution de l''air int\u00e9rieur, incendie) et des charges de co\u00fbt. Source : DHS hv207 ; MICS6 HC9 ; questionnaire harmonis\u00e9 OMS/Banque mondiale."}, "id": "primary_lighting_source", "label": {"en": "Primary lighting source", "es": "Fuente de iluminaci\u00f3n principal", "fr": "Source d''\u00e9clairage principale"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["who_world_bank_core_energy", "unicef_mics6"], "vocabulary": "lighting-source"}'
