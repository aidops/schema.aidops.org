  delivery_attendant_type:
    title:
      en: Delivery attendant type (highest qualified)
      fr: Type d'assistant à l'accouchement (le plus qualifié)
      es: Tipo de asistente al parto (más calificado)
    description:
      en: 'The category of the highest-qualified person who assisted with the delivery of the most recent birth. DHS-8 m3a–m3n series; MICS6 MN7. When multiple attendant types were present, the highest-qualified is recorded (doctor > midwife > nurse > auxiliary midwife > CHW > TBA > relative > other > none). Derives skilled_birth_attendance. Note: the PS CRVS vocabulary birth-attendant covers six codes (physician, midwife, nurse, traditional_birth_attendant, other, none); this property uses the maternity-care-provider vocabulary which extends those codes with auxiliary_midwife, community_health_worker, and relative.'
      fr: 'La catégorie de la personne la plus qualifiée ayant assisté à l''accouchement de la naissance la plus récente. Série DHS-8 m3a–m3n ; MICS6 MN7. Lorsque plusieurs types d''assistants étaient présents, le plus qualifié est enregistré (médecin > sage-femme > infirmière > sage-femme auxiliaire > ASC > accoucheuse traditionnelle > parent > autre > aucun). Génère skilled_birth_attendance. Note : le vocabulaire PS CRVS birth-attendant couvre six codes (physician, midwife, nurse, traditional_birth_attendant, other, none) ; cette propriété utilise le vocabulaire maternity-care-provider qui étend ces codes avec auxiliary_midwife, community_health_worker et relative.'
      es: 'La categoría de la persona más calificada que asistió al parto más reciente. Serie DHS-8 m3a–m3n; MICS6 MN7. Cuando estuvieron presentes múltiples tipos de asistentes, se registra el más calificado (médico > partera > enfermera > partera auxiliar > ASC > partera tradicional > familiar > otro > ninguno). Genera skilled_birth_attendance. Nota: el vocabulario PS CRVS birth-attendant cubre seis códigos (physician, midwife, nurse, traditional_birth_attendant, other, none); esta propiedad usa el vocabulario maternity-care-provider que extiende esos códigos con auxiliary_midwife, community_health_worker y relative.'
    slot_uri: aidops:delivery_attendant_type
    range: MaternityCareProvider
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn"], "cardinality": "single", "category": "delivery", "core": true, "definition": {"en": "The category of the highest-qualified person who assisted with the delivery of the most recent birth. DHS-8 m3a\u2013m3n series; MICS6 MN7. When multiple attendant types were present, the highest-qualified is recorded (doctor > midwife > nurse > auxiliary midwife > CHW > TBA > relative > other > none). Derives skilled_birth_attendance. Note: the PS CRVS vocabulary birth-attendant covers six codes (physician, midwife, nurse, traditional_birth_attendant, other, none); this property uses the maternity-care-provider vocabulary which extends those codes with auxiliary_midwife, community_health_worker, and relative.", "es": "La categor\u00eda de la persona m\u00e1s calificada que asisti\u00f3 al parto m\u00e1s reciente. Serie DHS-8 m3a\u2013m3n; MICS6 MN7. Cuando estuvieron presentes m\u00faltiples tipos de asistentes, se registra el m\u00e1s calificado (m\u00e9dico > partera > enfermera > partera auxiliar > ASC > partera tradicional > familiar > otro > ninguno). Genera skilled_birth_attendance. Nota: el vocabulario PS CRVS birth-attendant cubre seis c\u00f3digos (physician, midwife, nurse, traditional_birth_attendant, other, none); esta propiedad usa el vocabulario maternity-care-provider que extiende esos c\u00f3digos con auxiliary_midwife, community_health_worker y relative.", "fr": "La cat\u00e9gorie de la personne la plus qualifi\u00e9e ayant assist\u00e9 \u00e0 l''accouchement de la naissance la plus r\u00e9cente. S\u00e9rie DHS-8 m3a\u2013m3n ; MICS6 MN7. Lorsque plusieurs types d''assistants \u00e9taient pr\u00e9sents, le plus qualifi\u00e9 est enregistr\u00e9 (m\u00e9decin > sage-femme > infirmi\u00e8re > sage-femme auxiliaire > ASC > accoucheuse traditionnelle > parent > autre > aucun). G\u00e9n\u00e8re skilled_birth_attendance. Note : le vocabulaire PS CRVS birth-attendant couvre six codes (physician, midwife, nurse, traditional_birth_attendant, other, none) ; cette propri\u00e9t\u00e9 utilise le vocabulaire maternity-care-provider qui \u00e9tend ces codes avec auxiliary_midwife, community_health_worker et relative."}, "id": "delivery_attendant_type", "label": {"en": "Delivery attendant type (highest qualified)", "es": "Tipo de asistente al parto (m\u00e1s calificado)", "fr": "Type d''assistant \u00e0 l''accouchement (le plus qualifi\u00e9)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "maternity-care-provider"}'
