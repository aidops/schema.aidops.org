  aap_trust_in_providers:
    title:
      en: 'AAP: Trust in aid providers'
      fr: 'Redevabilité : Confiance envers les intervenants'
      es: 'Rendición de cuentas: Confianza en los actores humanitarios'
    description:
      en: How much the respondent trusts aid providers to act in the best interests of their community. GTS HVI canonical 'trust' pillar (one of the four canonical GTS pillars alongside relevance, fairness, and agency). Classified as `sensitive` because expressing distrust could itself be sensitive in some contexts (retaliation fear, or programme-reputational). Maps to CHS 2024 Commitment 8.
      fr: Dans quelle mesure le répondant fait confiance aux intervenants pour agir dans l'intérêt de sa communauté. Pilier « confiance » canonique de GTS HVI (l'un des quatre piliers canoniques de GTS aux côtés de la pertinence, l'équité et l'agentivité). Classé comme `sensitive` car l'expression de la méfiance pourrait elle-même être sensible dans certains contextes (peur de représailles ou réputation du programme). Correspond à l'Engagement 8 de la CHS 2024.
      es: Cuánto confía el encuestado en que los actores humanitarios actúen en el mejor interés de su comunidad. Pilar canónico de «confianza» de GTS HVI (uno de los cuatro pilares canónicos de GTS junto con relevancia, equidad y agencia). Clasificado como `sensitive` porque expresar desconfianza podría ser sensible en algunos contextos (miedo a represalias o reputación del programa). Corresponde al Compromiso 8 de la CHS 2024.
    slot_uri: aidops:aap_trust_in_providers
    range: AapTrust4
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi"], "cardinality": "single", "category": "aap_trust_safety", "core": false, "definition": {"en": "How much the respondent trusts aid providers to act in the best interests of their community. GTS HVI canonical ''trust'' pillar (one of the four canonical GTS pillars alongside relevance, fairness, and agency). Classified as `sensitive` because expressing distrust could itself be sensitive in some contexts (retaliation fear, or programme-reputational). Maps to CHS 2024 Commitment 8.", "es": "Cu\u00e1nto conf\u00eda el encuestado en que los actores humanitarios act\u00faen en el mejor inter\u00e9s de su comunidad. Pilar can\u00f3nico de \u00abconfianza\u00bb de GTS HVI (uno de los cuatro pilares can\u00f3nicos de GTS junto con relevancia, equidad y agencia). Clasificado como `sensitive` porque expresar desconfianza podr\u00eda ser sensible en algunos contextos (miedo a represalias o reputaci\u00f3n del programa). Corresponde al Compromiso 8 de la CHS 2024.", "fr": "Dans quelle mesure le r\u00e9pondant fait confiance aux intervenants pour agir dans l''int\u00e9r\u00eat de sa communaut\u00e9. Pilier \u00ab confiance \u00bb canonique de GTS HVI (l''un des quatre piliers canoniques de GTS aux c\u00f4t\u00e9s de la pertinence, l''\u00e9quit\u00e9 et l''agentivit\u00e9). Class\u00e9 comme `sensitive` car l''expression de la m\u00e9fiance pourrait elle-m\u00eame \u00eatre sensible dans certains contextes (peur de repr\u00e9sailles ou r\u00e9putation du programme). Correspond \u00e0 l''Engagement 8 de la CHS 2024."}, "id": "aap_trust_in_providers", "label": {"en": "AAP: Trust in aid providers", "es": "Rendici\u00f3n de cuentas: Confianza en los actores humanitarios", "fr": "Redevabilit\u00e9 : Confiance envers les intervenants"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "aap-trust-4"}'
