  hf_ipc_ppe_available:
    title:
      en: Personal protective equipment (PPE) available today
      fr: Équipements de protection individuelle (EPI) disponibles aujourd'hui
      es: Equipos de protección individual (EPI) disponibles hoy
    description:
      en: 'Whether personal protective equipment (gloves plus surgical masks, at minimum) is available today in clinical areas. Three-level response: `yes` (both gloves and masks available), `partial` (one of the two available), `no` (neither available). Observed by the enumerator. WASH FIT 2nd edition core indicator; WHO IPC core components; Sphere 2018.'
      fr: 'Si des équipements de protection individuelle (gants et masques chirurgicaux au minimum) sont disponibles aujourd''hui dans les zones cliniques. Réponse à trois niveaux : `yes` (gants et masques tous deux disponibles), `partial` (un des deux disponible), `no` (aucun disponible). Observé par l''enquêteur. Indicateur central WASH FIT 2e édition ; composantes centrales de la PCI de l''OMS ; Sphere 2018.'
      es: 'Si el equipo de protección individual (guantes y mascarillas quirúrgicas, como mínimo) está disponible hoy en las áreas clínicas. Respuesta de tres niveles: `yes` (guantes y mascarillas ambos disponibles), `partial` (uno de los dos disponible), `no` (ninguno disponible). Observado por el enumerador. Indicador central WASH FIT 2ª edición; componentes centrales de PCI de la OMS; Esfera 2018.'
    slot_uri: aidops:hf_ipc_ppe_available
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-unicef-wash-fit-2022"], "cardinality": "single", "category": "hygiene", "core": true, "definition": {"en": "Whether personal protective equipment (gloves plus surgical masks, at minimum) is available today in clinical areas. Three-level response: `yes` (both gloves and masks available), `partial` (one of the two available), `no` (neither available). Observed by the enumerator. WASH FIT 2nd edition core indicator; WHO IPC core components; Sphere 2018.", "es": "Si el equipo de protecci\u00f3n individual (guantes y mascarillas quir\u00fargicas, como m\u00ednimo) est\u00e1 disponible hoy en las \u00e1reas cl\u00ednicas. Respuesta de tres niveles: `yes` (guantes y mascarillas ambos disponibles), `partial` (uno de los dos disponible), `no` (ninguno disponible). Observado por el enumerador. Indicador central WASH FIT 2\u00aa edici\u00f3n; componentes centrales de PCI de la OMS; Esfera 2018.", "fr": "Si des \u00e9quipements de protection individuelle (gants et masques chirurgicaux au minimum) sont disponibles aujourd''hui dans les zones cliniques. R\u00e9ponse \u00e0 trois niveaux : `yes` (gants et masques tous deux disponibles), `partial` (un des deux disponible), `no` (aucun disponible). Observ\u00e9 par l''enqu\u00eateur. Indicateur central WASH FIT 2e \u00e9dition ; composantes centrales de la PCI de l''OMS ; Sphere 2018."}, "id": "hf_ipc_ppe_available", "label": {"en": "Personal protective equipment (PPE) available today", "es": "Equipos de protecci\u00f3n individual (EPI) disponibles hoy", "fr": "\u00c9quipements de protection individuelle (EPI) disponibles aujourd''hui"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
      bibliography_refs: who-unicef-wash-fit-2022
  hf_ipc_sharps_safe_disposal:
    title:
      en: Sharps disposed of safely
      fr: Déchets tranchants éliminés en toute sécurité
      es: Cortopunzantes eliminados de forma segura
    description:
      en: 'Whether sharps are disposed of safely: a sharps container is in use at the point of generation, the container is not overfilled (at or below the fill line), and sharps containers are collected routinely. Observed by the enumerator. WASH FIT 2nd edition core indicator; WHO IPC core components.'
      fr: 'Si les déchets tranchants sont éliminés en toute sécurité : un conteneur à tranchants est utilisé au point de production, le conteneur n''est pas trop rempli (au niveau ou en dessous du repère) et les conteneurs à tranchants sont collectés régulièrement. Observé par l''enquêteur. Indicateur central WASH FIT 2e édition ; composantes centrales de la PCI de l''OMS.'
      es: 'Si los cortopunzantes se eliminan de forma segura: se usa un contenedor de cortopunzantes en el punto de generación, el contenedor no está sobrellenado (al nivel o por debajo de la marca) y los contenedores se recogen de forma rutinaria. Observado por el enumerador. Indicador central WASH FIT 2ª edición; componentes centrales de PCI de la OMS.'
    slot_uri: aidops:hf_ipc_sharps_safe_disposal
    range: boolean
    annotations:
