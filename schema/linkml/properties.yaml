  other_vaccine_received:
    title:
      en: Other vaccine received
      fr: Autre vaccin reçu
      es: Otra vacuna recibida
    description:
      en: Whether the child received any vaccine not included in the standard antigen list above. This field captures country-specific antigens not covered by the default WHO EPI property set (e.g., typhoid, meningococcal, Japanese encephalitis). Deployment-specific extensions should specify the antigen name and number of doses via a separate extension block.
      fr: Si l'enfant a reçu un vaccin non inclus dans la liste d'antigènes standard ci-dessus. Ce champ capture les antigènes spécifiques à chaque pays non couverts par l'ensemble de propriétés EPI OMS par défaut (par ex., typhoïde, méningococcique, encéphalite japonaise). Les extensions propres au déploiement doivent préciser le nom de l'antigène et le nombre de doses via un bloc d'extension séparé.
      es: Si el niño recibió alguna vacuna no incluida en la lista de antígenos estándar anterior. Este campo captura antígenos específicos de cada país no cubiertos por el conjunto de propiedades EPI OMS por defecto (p. ej., tifoidea, meningocócica, encefalitis japonesa). Las extensiones específicas del despliegue deben especificar el nombre del antígeno y el número de dosis mediante un bloque de extensión separado.
