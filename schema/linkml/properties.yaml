  post_harvest_loss_magnitude:
    title:
      en: Estimated magnitude of post-harvest loss in the last agricultural season
      fr: Ampleur estimée des pertes post-récolte au cours de la dernière saison agricole
      es: Magnitud estimada de la pérdida poscosecha en la última temporada agrícola
    description:
      en: Respondent's estimated magnitude of post-harvest loss (between harvest and consumption/sale) as a share of the harvested crop during the last completed agricultural season, due to causes such as pest infestation, mould, rodent damage, or spoilage. Single-select from vocabulary `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) using banded categories because recall precision is low; the bands align with FAO Post-Harvest Losses guidance and LSMS-ISA post-harvest module practice. `dont_know` is included as one of the response options. Asked only when `hh_grew_crops_last_season` is `yes`.
      fr: Ampleur estimée par le répondant des pertes post-récolte (entre la récolte et la consommation/vente) exprimée en part de la récolte collectée au cours de la dernière saison agricole complète, dues à des causes telles qu'infestation par ravageurs, moisissures, dégâts causés par les rongeurs ou détérioration. Sélection unique dans le vocabulaire `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) utilisant des catégories par tranches car la précision de rappel est faible ; les tranches s'alignent avec le guide Pertes Post-Récolte de la FAO et la pratique du module post-récolte du LSMS-ISA. `dont_know` est inclus comme l'une des options de réponse. Posée uniquement lorsque `hh_grew_crops_last_season` est `yes`.
      es: Magnitud estimada por el encuestado de la pérdida poscosecha (entre la cosecha y el consumo/venta) como proporción del cultivo cosechado durante la última temporada agrícola completa, debido a causas como infestación por plagas, moho, daños por roedores o deterioro. Selección única del vocabulario `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) que usa categorías por tramos porque la precisión de recuerdo es baja; los tramos se alinean con la guía de Pérdidas Poscosecha de la FAO y la práctica del módulo poscosecha de LSMS-ISA. `dont_know` se incluye como una de las opciones de respuesta. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.
    slot_uri: aidops:post_harvest_loss_magnitude
    range: PostHarvestLossBand
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-phl-guidelines"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Respondent''s estimated magnitude of post-harvest loss (between harvest and consumption/sale) as a share of the harvested crop during the last completed agricultural season, due to causes such as pest infestation, mould, rodent damage, or spoilage. Single-select from vocabulary `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) using banded categories because recall precision is low; the bands align with FAO Post-Harvest Losses guidance and LSMS-ISA post-harvest module practice. `dont_know` is included as one of the response options. Asked only when `hh_grew_crops_last_season` is `yes`.", "es": "Magnitud estimada por el encuestado de la p\u00e9rdida poscosecha (entre la cosecha y el consumo/venta) como proporci\u00f3n del cultivo cosechado durante la \u00faltima temporada agr\u00edcola completa, debido a causas como infestaci\u00f3n por plagas, moho, da\u00f1os por roedores o deterioro. Selecci\u00f3n \u00fanica del vocabulario `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) que usa categor\u00edas por tramos porque la precisi\u00f3n de recuerdo es baja; los tramos se alinean con la gu\u00eda de P\u00e9rdidas Poscosecha de la FAO y la pr\u00e1ctica del m\u00f3dulo poscosecha de LSMS-ISA. `dont_know` se incluye como una de las opciones de respuesta. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.", "fr": "Ampleur estim\u00e9e par le r\u00e9pondant des pertes post-r\u00e9colte (entre la r\u00e9colte et la consommation/vente) exprim\u00e9e en part de la r\u00e9colte collect\u00e9e au cours de la derni\u00e8re saison agricole compl\u00e8te, dues \u00e0 des causes telles qu''infestation par ravageurs, moisissures, d\u00e9g\u00e2ts caus\u00e9s par les rongeurs ou d\u00e9t\u00e9rioration. S\u00e9lection unique dans le vocabulaire `post-harvest-loss-band` (none_or_minimal_lt5, small_5_14, moderate_15_29, large_30_plus, dont_know) utilisant des cat\u00e9gories par tranches car la pr\u00e9cision de rappel est faible ; les tranches s''alignent avec le guide Pertes Post-R\u00e9colte de la FAO et la pratique du module post-r\u00e9colte du LSMS-ISA. `dont_know` est inclus comme l''une des options de r\u00e9ponse. Pos\u00e9e uniquement lorsque `hh_grew_crops_last_season` est `yes`."}, "id": "post_harvest_loss_magnitude", "label": {"en": "Estimated magnitude of post-harvest loss in the last agricultural season", "es": "Magnitud estimada de la p\u00e9rdida poscosecha en la \u00faltima temporada agr\u00edcola", "fr": "Ampleur estim\u00e9e des pertes post-r\u00e9colte au cours de la derni\u00e8re saison agricole"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "post-harvest-loss-band"}'
