    range: TermsOfTradeTrend
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1"], "cardinality": "single", "category": "pastoral_market", "core": false, "definition": {"en": "Household perception of whether the price obtainable for livestock relative to the price of the local staple cereal is better, the same, or worse than the same time last year. Single-select from vocabulary `terms-of-trade-trend`. This perception item complements the objective ratio in `terms_of_trade_goat_cereal` and is used when market price data are unavailable or when the objective ratio cannot be compared to a baseline. It is grounded in the FEWSNET terms-of-trade perception item, FSNAU market perception module, and IPC AFI pastoral annex (perceived market access as supporting evidence for IPC classification). Unlike `terms_of_trade_goat_cereal` (which requires the respondent to recall a specific price), this item captures directional perception and can be collected in markets where prices are not stable or where respondents have difficulty recalling exact quantities. `core: false` because the objective ToT item (C1) is preferred when accessible.", "es": "Percepci\u00f3n del hogar sobre si el precio obtenible por el ganado relativo al precio del cereal b\u00e1sico local es mejor, igual o peor que la misma \u00e9poca del a\u00f1o pasado. Selecci\u00f3n \u00fanica del vocabulario `terms-of-trade-trend`. Este \u00edtem de percepci\u00f3n complementa la raz\u00f3n objetiva en `terms_of_trade_goat_cereal` y se usa cuando los datos de precios de mercado no est\u00e1n disponibles o cuando la raz\u00f3n objetiva no puede compararse con una l\u00ednea base. Fundamentado en el \u00edtem de percepci\u00f3n de t\u00e9rminos de intercambio de FEWSNET, el m\u00f3dulo de percepci\u00f3n de mercado FSNAU y el anexo pastoralista IPC AFI. `core: false` porque el \u00edtem objetivo (C1) es preferido cuando es accesible.", "fr": "Perception du m\u00e9nage quant \u00e0 savoir si le prix obtenu pour le b\u00e9tail par rapport au prix de la c\u00e9r\u00e9ale de base locale est meilleur, identique ou moins bon que la m\u00eame p\u00e9riode l''ann\u00e9e derni\u00e8re. S\u00e9lection unique dans le vocabulaire `terms-of-trade-trend`. Cet item de perception compl\u00e8te le ratio objectif dans `terms_of_trade_goat_cereal` et est utilis\u00e9 lorsque les donn\u00e9es sur les prix du march\u00e9 sont indisponibles ou lorsque le ratio objectif ne peut \u00eatre compar\u00e9 \u00e0 une r\u00e9f\u00e9rence. Fond\u00e9 sur l''item de perception des termes de l''\u00e9change FEWSNET, le module de perception du march\u00e9 FSNAU et l''annexe pastoraliste IPC AFI. `core: false` car l''item objectif (C1) est pr\u00e9f\u00e9r\u00e9 lorsqu''il est accessible."}, "id": "terms_of_trade_trend", "label": {"en": "Perceived livestock-to-cereal terms of trade trend compared to last year", "es": "Tendencia percibida de los t\u00e9rminos de intercambio ganader\u00eda/cereales comparada con el a\u00f1o pasado", "fr": "Tendance per\u00e7ue des termes de l''\u00e9change b\u00e9tail/c\u00e9r\u00e9ales par rapport \u00e0 l''ann\u00e9e derni\u00e8re"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "terms-of-trade-trend"}'
