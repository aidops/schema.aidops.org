      es: Momento del episodio más reciente de violencia de un marido o compañero anterior en relación con la fecha de la entrevista. Ítem DHS DV15B. Se pregunta solo si al menos uno de los ítems de violencia de compañero anterior es verdadero. Compatible DHS-7+.
