  services_disrupted:
    title:
      en: Services disrupted
      fr: Services perturbés
      es: Servicios afectados
    description:
      en: 'Essential services (water, sanitation, electricity, telecommunications) that are currently degraded at the household''s dwelling after the shock. Multi-select. Codes cover both full outage and partial-function cases: water may be absent, intermittent, or present-but-unsafe; sanitation may be unusable or present-but-overflowing; electricity may be absent or intermittent. Distinct from the household''s baseline service infrastructure type, which is recorded by water_source, sanitation_facility, and electricity_access.'
      fr: 'Services essentiels (eau, assainissement, électricité, télécommunications) actuellement dégradés au logement du ménage après le choc. Sélection multiple. Les codes couvrent à la fois la coupure complète et les cas de fonctionnement partiel : l''eau peut être absente, intermittente ou présente mais non potable ; l''assainissement peut être inutilisable ou présent mais débordant ; l''électricité peut être absente ou intermittente. Distinct du type d''infrastructure de service habituel du ménage, consigné par water_source, sanitation_facility et electricity_access.'
      es: 'Servicios esenciales (agua, saneamiento, electricidad, telecomunicaciones) que actualmente están degradados en la vivienda del hogar después del choque. Selección múltiple. Los códigos cubren tanto el corte total como los casos de función parcial: el agua puede estar ausente, intermitente o presente pero no apta; el saneamiento puede ser inutilizable o estar presente pero desbordándose; la electricidad puede estar ausente o intermitente. Distinto del tipo de infraestructura de servicio habitual del hogar, registrado por water_source, sanitation_facility y electricity_access.'
    slot_uri: aidops:services_disrupted
    range: ServiceDisruptionType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-mira"], "cardinality": "multiple", "category": "wash", "definition": {"en": "Essential services (water, sanitation, electricity, telecommunications) that are currently degraded at the household''s dwelling after the shock. Multi-select. Codes cover both full outage and partial-function cases: water may be absent, intermittent, or present-but-unsafe; sanitation may be unusable or present-but-overflowing; electricity may be absent or intermittent. Distinct from the household''s baseline service infrastructure type, which is recorded by water_source, sanitation_facility, and electricity_access.", "es": "Servicios esenciales (agua, saneamiento, electricidad, telecomunicaciones) que actualmente est\u00e1n degradados en la vivienda del hogar despu\u00e9s del choque. Selecci\u00f3n m\u00faltiple. Los c\u00f3digos cubren tanto el corte total como los casos de funci\u00f3n parcial: el agua puede estar ausente, intermitente o presente pero no apta; el saneamiento puede ser inutilizable o estar presente pero desbord\u00e1ndose; la electricidad puede estar ausente o intermitente. Distinto del tipo de infraestructura de servicio habitual del hogar, registrado por water_source, sanitation_facility y electricity_access.", "fr": "Services essentiels (eau, assainissement, \u00e9lectricit\u00e9, t\u00e9l\u00e9communications) actuellement d\u00e9grad\u00e9s au logement du m\u00e9nage apr\u00e8s le choc. S\u00e9lection multiple. Les codes couvrent \u00e0 la fois la coupure compl\u00e8te et les cas de fonctionnement partiel : l''eau peut \u00eatre absente, intermittente ou pr\u00e9sente mais non potable ; l''assainissement peut \u00eatre inutilisable ou pr\u00e9sent mais d\u00e9bordant ; l''\u00e9lectricit\u00e9 peut \u00eatre absente ou intermittente. Distinct du type d''infrastructure de service habituel du m\u00e9nage, consign\u00e9 par water_source, sanitation_facility et electricity_access."}, "id": "services_disrupted", "label": {"en": "Services disrupted", "es": "Servicios afectados", "fr": "Services perturb\u00e9s"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["iasc_mira", "iom_dtm_household", "reach_msna"], "vocabulary": "service-disruption-type"}'
