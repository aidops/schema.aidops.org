  measurement_type:
    title:
      en: Measurement type
      fr: Type de mesure
      es: Tipo de medición
    description:
      en: 'How height was measured: recumbent (lying down, for children under two years) or standing. WHO protocols prescribe recumbent length for children under 24 months and standing height from 24 months onward; substituting one for the other introduces a small systematic bias that affects z-score classification.'
      fr: 'Comment la taille a été mesurée : en position couchée (pour les enfants de moins de deux ans) ou debout. Les protocoles de l''OMS prescrivent la longueur couchée pour les enfants de moins de 24 mois et la taille debout à partir de 24 mois ; substituer l''une à l''autre introduit un léger biais systématique qui affecte la classification par z-score.'
      es: 'Cómo se midió la talla: acostado (para niños menores de dos años) o de pie. Los protocolos de la OMS prescriben longitud en decúbito para niños menores de 24 meses y talla de pie a partir de los 24 meses; sustituir una por otra introduce un pequeño sesgo sistemático que afecta la clasificación por puntaje z.'
