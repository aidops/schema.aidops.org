  latrine_has_lock:
    title:
      en: Latrine or toilet has a lockable door
      fr: Latrine ou toilette avec porte verrouillable
      es: Letrina o baño con puerta con cerrojo
    description:
      en: Whether the latrines or toilets used by the household have a door that can be locked from the inside. Distinguishes between communal and private facilities, and between private facilities with and without a lockable door. Sphere 2018 WASH Standard 3.1 guidance specifies that simple measures such as locks on toilet doors reduce the risk of abuse. Private latrines without locks remain a risk and are captured separately from private latrines with locks.
      fr: Si les latrines ou toilettes utilisées par le ménage disposent d'une porte pouvant être verrouillée de l'intérieur. Distingue entre les installations communales et privées, et entre les installations privées avec et sans porte verrouillable. Les orientations de la Norme WASH Sphère 2018 3.1 précisent que des mesures simples comme des verrous sur les portes des toilettes réduisent le risque d'abus. Les latrines privées sans verrou demeurent un risque et sont capturées séparément des latrines privées avec verrou.
      es: Si las letrinas o baños utilizados por el hogar tienen una puerta que puede cerrarse con llave desde adentro. Distingue entre instalaciones comunales y privadas, y entre instalaciones privadas con y sin puerta con cerrojo. La orientación de la Norma WASH Esfera 2018 3.1 especifica que medidas simples como cerrojos en puertas de baños reducen el riesgo de abuso. Las letrinas privadas sin cerrojo siguen siendo un riesgo y se capturan por separado de las letrinas privadas con cerrojo.
    slot_uri: aidops:latrine_has_lock
    range: LatrineLockStatus
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "sphere-2018"], "cardinality": "single", "category": "gbv_risk", "core": false, "definition": {"en": "Whether the latrines or toilets used by the household have a door that can be locked from the inside. Distinguishes between communal and private facilities, and between private facilities with and without a lockable door. Sphere 2018 WASH Standard 3.1 guidance specifies that simple measures such as locks on toilet doors reduce the risk of abuse. Private latrines without locks remain a risk and are captured separately from private latrines with locks.", "es": "Si las letrinas o ba\u00f1os utilizados por el hogar tienen una puerta que puede cerrarse con llave desde adentro. Distingue entre instalaciones comunales y privadas, y entre instalaciones privadas con y sin puerta con cerrojo. La orientaci\u00f3n de la Norma WASH Esfera 2018 3.1 especifica que medidas simples como cerrojos en puertas de ba\u00f1os reducen el riesgo de abuso. Las letrinas privadas sin cerrojo siguen siendo un riesgo y se capturan por separado de las letrinas privadas con cerrojo.", "fr": "Si les latrines ou toilettes utilis\u00e9es par le m\u00e9nage disposent d''une porte pouvant \u00eatre verrouill\u00e9e de l''int\u00e9rieur. Distingue entre les installations communales et priv\u00e9es, et entre les installations priv\u00e9es avec et sans porte verrouillable. Les orientations de la Norme WASH Sph\u00e8re 2018 3.1 pr\u00e9cisent que des mesures simples comme des verrous sur les portes des toilettes r\u00e9duisent le risque d''abus. Les latrines priv\u00e9es sans verrou demeurent un risque et sont captur\u00e9es s\u00e9par\u00e9ment des latrines priv\u00e9es avec verrou."}, "id": "latrine_has_lock", "label": {"en": "Latrine or toilet has a lockable door", "es": "Letrina o ba\u00f1o con puerta con cerrojo", "fr": "Latrine ou toilette avec porte verrouillable"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "latrine-lock-status"}'
