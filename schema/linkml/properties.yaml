  specific_need_adolescent_girl_at_risk:
    title:
      en: 'Specific need flag: adolescent girl at risk'
      fr: 'Indicateur de besoin spécifique : adolescente à risque'
      es: 'Indicador de necesidad específica: adolescente en riesgo'
    description:
      en: Screening flag indicating that the household includes one or more adolescent girls (aged 10–17) without both parents present. Distinct from specific_need_unaccompanied_minor (UASC), which requires both parents absent; this flag also captures girls with one parent present. Elevated GBV risk — including sexual violence, early or forced marriage, and trafficking — is documented for this group in humanitarian settings (IASC GBV Guidelines 2015; UNFPA Minimum Standards 2019, Standard 12). Can be auto-derived from a household roster if age, sex, and parent-presence are recorded; otherwise asked directly.
      fr: Indicateur de dépistage signalant que le ménage comprend une ou plusieurs adolescentes (âgées de 10 à 17 ans) sans la présence des deux parents. Distinct de specific_need_unaccompanied_minor (UASC), qui exige l'absence des deux parents ; cet indicateur couvre également les filles avec un seul parent présent. Un risque VBG élevé — incluant la violence sexuelle, le mariage précoce ou forcé et la traite — est documenté pour ce groupe dans les contextes humanitaires (Directives VBG IASC 2015 ; Normes minimales UNFPA 2019, Norme 12). Peut être dérivé automatiquement d'un registre ménage si l'âge, le sexe et la présence des parents sont recueillis ; sinon posé directement.
      es: Indicador de cribado que señala que el hogar incluye una o más adolescentes (de 10 a 17 años) sin la presencia de ambos progenitores. Distinto de specific_need_unaccompanied_minor (UASC), que requiere la ausencia de ambos progenitores; este indicador también incluye a niñas con un progenitor presente. El riesgo elevado de VBG — incluyendo violencia sexual, matrimonio temprano o forzado y trata — está documentado para este grupo en contextos humanitarios (Directrices VBG IASC 2015; Estándares Mínimos UNFPA 2019, Estándar 12). Puede derivarse automáticamente de un registro de hogar si se recogen edad, sexo y presencia de progenitores; de lo contrario, se pregunta directamente.
    slot_uri: aidops:specific_need_adolescent_girl_at_risk
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-gbv-guidelines-2015", "unfpa-gbv-minimum-standards-2019"], "cardinality": "single", "category": "specific_needs", "core": false, "definition": {"en": "Screening flag indicating that the household includes one or more adolescent girls (aged 10\u201317) without both parents present. Distinct from specific_need_unaccompanied_minor (UASC), which requires both parents absent; this flag also captures girls with one parent present. Elevated GBV risk \u2014 including sexual violence, early or forced marriage, and trafficking \u2014 is documented for this group in humanitarian settings (IASC GBV Guidelines 2015; UNFPA Minimum Standards 2019, Standard 12). Can be auto-derived from a household roster if age, sex, and parent-presence are recorded; otherwise asked directly.", "es": "Indicador de cribado que se\u00f1ala que el hogar incluye una o m\u00e1s adolescentes (de 10 a 17 a\u00f1os) sin la presencia de ambos progenitores. Distinto de specific_need_unaccompanied_minor (UASC), que requiere la ausencia de ambos progenitores; este indicador tambi\u00e9n incluye a ni\u00f1as con un progenitor presente. El riesgo elevado de VBG \u2014 incluyendo violencia sexual, matrimonio temprano o forzado y trata \u2014 est\u00e1 documentado para este grupo en contextos humanitarios (Directrices VBG IASC 2015; Est\u00e1ndares M\u00ednimos UNFPA 2019, Est\u00e1ndar 12). Puede derivarse autom\u00e1ticamente de un registro de hogar si se recogen edad, sexo y presencia de progenitores; de lo contrario, se pregunta directamente.", "fr": "Indicateur de d\u00e9pistage signalant que le m\u00e9nage comprend une ou plusieurs adolescentes (\u00e2g\u00e9es de 10 \u00e0 17 ans) sans la pr\u00e9sence des deux parents. Distinct de specific_need_unaccompanied_minor (UASC), qui exige l''absence des deux parents ; cet indicateur couvre \u00e9galement les filles avec un seul parent pr\u00e9sent. Un risque VBG \u00e9lev\u00e9 \u2014 incluant la violence sexuelle, le mariage pr\u00e9coce ou forc\u00e9 et la traite \u2014 est document\u00e9 pour ce groupe dans les contextes humanitaires (Directives VBG IASC 2015 ; Normes minimales UNFPA 2019, Norme 12). Peut \u00eatre d\u00e9riv\u00e9 automatiquement d''un registre m\u00e9nage si l''\u00e2ge, le sexe et la pr\u00e9sence des parents sont recueillis ; sinon pos\u00e9 directement."}, "id": "specific_need_adolescent_girl_at_risk", "label": {"en": "Specific need flag: adolescent girl at risk", "es": "Indicador de necesidad espec\u00edfica: adolescente en riesgo", "fr": "Indicateur de besoin sp\u00e9cifique : adolescente \u00e0 risque"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean"}'
      bibliography_refs: iasc-gbv-guidelines-2015,unfpa-gbv-minimum-standards-2019
