  location_of_assessment:
    title:
      en: Location of assessment
      fr: Lieu de l'évaluation
      es: Lugar de la evaluación
    description:
      en: 'The physical location where the post-shock assessment was carried out, typically the location of the assessed dwelling. Distinct from Household.location (which is the household''s registered administrative or coordinate location): the two may differ if the household has displaced, relocated, or is temporarily sheltering elsewhere while the assessed structure remains at its registered site.'
      fr: 'Emplacement physique où l''évaluation post-choc a été effectuée, typiquement l''emplacement du logement évalué. Distinct de Household.location (emplacement administratif ou géographique enregistré du ménage) : les deux peuvent différer si le ménage s''est déplacé, a été relocalisé ou s''abrite temporairement ailleurs tandis que la structure évaluée demeure sur son site enregistré.'
      es: 'Ubicación física donde se realizó la evaluación post-choque, típicamente la ubicación de la vivienda evaluada. Distinta de Household.location (la ubicación administrativa o geográfica registrada del hogar): las dos pueden diferir si el hogar se ha desplazado, relocalizado o se refugia temporalmente en otro lugar mientras la estructura evaluada permanece en su sitio registrado.'
    slot_uri: aidops:location_of_assessment
    range: Location
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "location", "definition": {"en": "The physical location where the post-shock assessment was carried out, typically the location of the assessed dwelling. Distinct from Household.location (which is the household''s registered administrative or coordinate location): the two may differ if the household has displaced, relocated, or is temporarily sheltering elsewhere while the assessed structure remains at its registered site.", "es": "Ubicaci\u00f3n f\u00edsica donde se realiz\u00f3 la evaluaci\u00f3n post-choque, t\u00edpicamente la ubicaci\u00f3n de la vivienda evaluada. Distinta de Household.location (la ubicaci\u00f3n administrativa o geogr\u00e1fica registrada del hogar): las dos pueden diferir si el hogar se ha desplazado, relocalizado o se refugia temporalmente en otro lugar mientras la estructura evaluada permanece en su sitio registrado.", "fr": "Emplacement physique o\u00f9 l''\u00e9valuation post-choc a \u00e9t\u00e9 effectu\u00e9e, typiquement l''emplacement du logement \u00e9valu\u00e9. Distinct de Household.location (emplacement administratif ou g\u00e9ographique enregistr\u00e9 du m\u00e9nage) : les deux peuvent diff\u00e9rer si le m\u00e9nage s''est d\u00e9plac\u00e9, a \u00e9t\u00e9 relocalis\u00e9 ou s''abrite temporairement ailleurs tandis que la structure \u00e9valu\u00e9e demeure sur son site enregistr\u00e9."}, "id": "location_of_assessment", "label": {"en": "Location of assessment", "es": "Lugar de la evaluaci\u00f3n", "fr": "Lieu de l''\u00e9valuation"}, "maturity": "draft", "references": ["Location"], "sensitivity": "sensitive", "type": "concept:Location", "valid_instruments": ["iasc_mira", "iom_dtm_household", "shelter_cluster_rna", "reach_msna", "pdna_housing"], "vocabulary": null}'
  lockable_door:
    title:
      en: Lockable or securely closable door
      fr: Porte verrouillable ou fermant solidement
      es: Puerta con cerradura o cierre seguro
    description:
      en: Whether the shelter has a door or entrance that can be locked or securely closed from the inside. A key privacy and physical security indicator. Sphere Standard 3 protection guidance emphasises personal security within the shelter, including the ability to control access.
      fr: Si l'abri dispose d'une porte ou d'une entrée pouvant être verrouillée ou fermée solidement de l'intérieur. Un indicateur clé de vie privée et de sécurité physique. Les orientations de protection de la Norme Sphère 3 soulignent la sécurité personnelle à l'intérieur de l'abri, y compris la capacité à contrôler l'accès.
      es: Si el refugio tiene una puerta o entrada que puede bloquearse o cerrarse de forma segura desde adentro. Un indicador clave de privacidad y seguridad física. La orientación de protección de la Norma Esfera 3 enfatiza la seguridad personal dentro del refugio, incluida la capacidad de controlar el acceso.
    slot_uri: aidops:lockable_door
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gsc-indicators-v2", "sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "Whether the shelter has a door or entrance that can be locked or securely closed from the inside. A key privacy and physical security indicator. Sphere Standard 3 protection guidance emphasises personal security within the shelter, including the ability to control access.", "es": "Si el refugio tiene una puerta o entrada que puede bloquearse o cerrarse de forma segura desde adentro. Un indicador clave de privacidad y seguridad f\u00edsica. La orientaci\u00f3n de protecci\u00f3n de la Norma Esfera 3 enfatiza la seguridad personal dentro del refugio, incluida la capacidad de controlar el acceso.", "fr": "Si l''abri dispose d''une porte ou d''une entr\u00e9e pouvant \u00eatre verrouill\u00e9e ou ferm\u00e9e solidement de l''int\u00e9rieur. Un indicateur cl\u00e9 de vie priv\u00e9e et de s\u00e9curit\u00e9 physique. Les orientations de protection de la Norme Sph\u00e8re 3 soulignent la s\u00e9curit\u00e9 personnelle \u00e0 l''int\u00e9rieur de l''abri, y compris la capacit\u00e9 \u00e0 contr\u00f4ler l''acc\u00e8s."}, "id": "lockable_door", "label": {"en": "Lockable or securely closable door", "es": "Puerta con cerradura o cierre seguro", "fr": "Porte verrouillable ou fermant solidement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised", "unhcr_nare"], "vocabulary": null}'
      bibliography_refs: gsc-indicators-v2,sphere-2018
  mahfp_months_adequate:
    title:
      en: MAHFP months adequate
      fr: MAHFP mois d'approvisionnement adéquat
      es: MAHFP meses de aprovisionamiento adecuado
    description:
      en: The number of months, in the past 12, during which the household had enough food to meet its needs. Integer 0-12 (not schema-enforced). Output of the FANTA Months of Adequate Household Food Provisioning (MAHFP) indicator.
      fr: Le nombre de mois, parmi les 12 derniers, pendant lesquels le ménage a eu suffisamment de nourriture pour couvrir ses besoins. Entier de 0 à 12 (non imposé par le schéma). Résultat de l'indicateur MAHFP de FANTA (Mois d'approvisionnement alimentaire adéquat du ménage).
      es: El número de meses, en los últimos 12, durante los cuales el hogar tuvo suficiente comida para satisfacer sus necesidades. Entero 0-12 (no impuesto por el esquema). Resultado del indicador MAHFP de FANTA (Meses de Aprovisionamiento Alimentario Adecuado del Hogar).
    slot_uri: aidops:mahfp_months_adequate
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-mahfp"], "cardinality": "single", "category": "food_security", "definition": {"en": "The number of months, in the past 12, during which the household had enough food to meet its needs. Integer 0-12 (not schema-enforced). Output of the FANTA Months of Adequate Household Food Provisioning (MAHFP) indicator.", "es": "El n\u00famero de meses, en los \u00faltimos 12, durante los cuales el hogar tuvo suficiente comida para satisfacer sus necesidades. Entero 0-12 (no impuesto por el esquema). Resultado del indicador MAHFP de FANTA (Meses de Aprovisionamiento Alimentario Adecuado del Hogar).", "fr": "Le nombre de mois, parmi les 12 derniers, pendant lesquels le m\u00e9nage a eu suffisamment de nourriture pour couvrir ses besoins. Entier de 0 \u00e0 12 (non impos\u00e9 par le sch\u00e9ma). R\u00e9sultat de l''indicateur MAHFP de FANTA (Mois d''approvisionnement alimentaire ad\u00e9quat du m\u00e9nage)."}, "id": "mahfp_months_adequate", "label": {"en": "MAHFP months adequate", "es": "MAHFP meses de aprovisionamiento adecuado", "fr": "MAHFP mois d''approvisionnement ad\u00e9quat"}, "maturity": "draft", "references": null, "type": "integer", "valid_instruments": ["fao_mahfp"], "vocabulary": null}'
      bibliography_refs: fao-mahfp
  main_crops_grown:
    title:
      en: Main crops grown during the last completed agricultural season
      fr: Principales cultures de la dernière saison agricole complète
      es: Cultivos principales durante la última temporada agrícola completa
    description:
      en: Main crops the household grew during the last completed agricultural season, captured as free text with up to three entries ordered from most to least important. No canonical global crop vocabulary is assigned at the schema level because crop taxonomies are deeply context-specific (agro-ecological zones differ across East Africa, West Africa, the Middle East, and Latin America). Form authors should provide a local constrained select with an 'other/specify' escape. Based on LSMS-ISA crop module, MICS6 AFP, and FAO WCA 2020. See AgricultureProfile Open Questions for the crop-taxonomy decision.
      fr: Principales cultures que le ménage a cultivées au cours de la dernière saison agricole complète, saisies en texte libre avec jusqu'à trois entrées ordonnées de la plus à la moins importante. Aucun vocabulaire global canonique n'est attribué au niveau du schéma car les taxonomies de cultures sont profondément spécifiques au contexte (les zones agro-écologiques diffèrent entre l'Afrique de l'Est, l'Afrique de l'Ouest, le Moyen-Orient et l'Amérique latine). Les auteurs de formulaires doivent fournir une sélection contrainte locale avec une option « autre / préciser ». Basé sur le module des cultures du LSMS-ISA, le MICS6 AFP et le WCA 2020 de la FAO. Voir Questions ouvertes AgricultureProfile pour la décision sur la taxonomie des cultures.
      es: Cultivos principales que el hogar cultivó durante la última temporada agrícola completa, capturados como texto libre con hasta tres entradas ordenadas del más al menos importante. No se asigna un vocabulario global canónico a nivel del esquema porque las taxonomías de cultivos son profundamente específicas al contexto (las zonas agroecológicas difieren entre África Oriental, África Occidental, Medio Oriente y América Latina). Los autores de formularios deben proporcionar una selección restringida local con una opción 'otro / especificar'. Basado en el módulo de cultivos de LSMS-ISA, MICS6 AFP y WCA 2020 de la FAO. Véase Preguntas Abiertas de AgricultureProfile para la decisión sobre la taxonomía de cultivos.
    slot_uri: aidops:main_crops_grown
    range: string
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Main crops the household grew during the last completed agricultural season, captured as free text with up to three entries ordered from most to least important. No canonical global crop vocabulary is assigned at the schema level because crop taxonomies are deeply context-specific (agro-ecological zones differ across East Africa, West Africa, the Middle East, and Latin America). Form authors should provide a local constrained select with an ''other/specify'' escape. Based on LSMS-ISA crop module, MICS6 AFP, and FAO WCA 2020. See AgricultureProfile Open Questions for the crop-taxonomy decision.", "es": "Cultivos principales que el hogar cultiv\u00f3 durante la \u00faltima temporada agr\u00edcola completa, capturados como texto libre con hasta tres entradas ordenadas del m\u00e1s al menos importante. No se asigna un vocabulario global can\u00f3nico a nivel del esquema porque las taxonom\u00edas de cultivos son profundamente espec\u00edficas al contexto (las zonas agroecol\u00f3gicas difieren entre \u00c1frica Oriental, \u00c1frica Occidental, Medio Oriente y Am\u00e9rica Latina). Los autores de formularios deben proporcionar una selecci\u00f3n restringida local con una opci\u00f3n ''otro / especificar''. Basado en el m\u00f3dulo de cultivos de LSMS-ISA, MICS6 AFP y WCA 2020 de la FAO. V\u00e9ase Preguntas Abiertas de AgricultureProfile para la decisi\u00f3n sobre la taxonom\u00eda de cultivos.", "fr": "Principales cultures que le m\u00e9nage a cultiv\u00e9es au cours de la derni\u00e8re saison agricole compl\u00e8te, saisies en texte libre avec jusqu''\u00e0 trois entr\u00e9es ordonn\u00e9es de la plus \u00e0 la moins importante. Aucun vocabulaire global canonique n''est attribu\u00e9 au niveau du sch\u00e9ma car les taxonomies de cultures sont profond\u00e9ment sp\u00e9cifiques au contexte (les zones agro-\u00e9cologiques diff\u00e8rent entre l''Afrique de l''Est, l''Afrique de l''Ouest, le Moyen-Orient et l''Am\u00e9rique latine). Les auteurs de formulaires doivent fournir une s\u00e9lection contrainte locale avec une option \u00ab autre / pr\u00e9ciser \u00bb. Bas\u00e9 sur le module des cultures du LSMS-ISA, le MICS6 AFP et le WCA 2020 de la FAO. Voir Questions ouvertes AgricultureProfile pour la d\u00e9cision sur la taxonomie des cultures."}, "id": "main_crops_grown", "label": {"en": "Main crops grown during the last completed agricultural season", "es": "Cultivos principales durante la \u00faltima temporada agr\u00edcola completa", "fr": "Principales cultures de la derni\u00e8re saison agricole compl\u00e8te"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
  main_livelihood_activity:
    title:
      en: Main livelihood activity
      fr: Activité principale de subsistance
      es: Actividad principal de subsistencia
    description:
      en: The single primary activity on which the household relies as its main source of income or food. Drawn from the LSMS-ISA core livelihood module, the MICS6 Household Questionnaire income module, and the Sphere 2018 Livelihoods chapter on livelihood strategy classification. Captures the household's dominant livelihood strategy at the time of assessment, for a current (no recall period) reference frame.
      fr: L'unique activité principale sur laquelle le ménage s'appuie comme source principale de revenus ou de nourriture. Tirée du module principal des moyens de subsistance LSMS-ISA, du module revenus du Questionnaire Ménage MICS6 et du chapitre Moyens de subsistance de Sphère 2018 sur la classification des stratégies de subsistance. Capture la stratégie de subsistance dominante du ménage au moment de l'évaluation, dans un cadre de référence actuel (sans période de rappel).
      es: La única actividad principal en la que el hogar se apoya como su fuente principal de ingresos o alimentos. Tomada del módulo central de medios de vida de LSMS-ISA, el módulo de ingresos del Cuestionario de Hogar MICS6 y el capítulo de Medios de Vida de Esfera 2018 sobre clasificación de estrategias de subsistencia. Captura la estrategia de subsistencia dominante del hogar al momento de la evaluación, en un marco de referencia actual (sin período de recordatorio).
    slot_uri: aidops:main_livelihood_activity
    range: LivelihoodActivityCategory
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": true, "definition": {"en": "The single primary activity on which the household relies as its main source of income or food. Drawn from the LSMS-ISA core livelihood module, the MICS6 Household Questionnaire income module, and the Sphere 2018 Livelihoods chapter on livelihood strategy classification. Captures the household''s dominant livelihood strategy at the time of assessment, for a current (no recall period) reference frame.", "es": "La \u00fanica actividad principal en la que el hogar se apoya como su fuente principal de ingresos o alimentos. Tomada del m\u00f3dulo central de medios de vida de LSMS-ISA, el m\u00f3dulo de ingresos del Cuestionario de Hogar MICS6 y el cap\u00edtulo de Medios de Vida de Esfera 2018 sobre clasificaci\u00f3n de estrategias de subsistencia. Captura la estrategia de subsistencia dominante del hogar al momento de la evaluaci\u00f3n, en un marco de referencia actual (sin per\u00edodo de recordatorio).", "fr": "L''unique activit\u00e9 principale sur laquelle le m\u00e9nage s''appuie comme source principale de revenus ou de nourriture. Tir\u00e9e du module principal des moyens de subsistance LSMS-ISA, du module revenus du Questionnaire M\u00e9nage MICS6 et du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur la classification des strat\u00e9gies de subsistance. Capture la strat\u00e9gie de subsistance dominante du m\u00e9nage au moment de l''\u00e9valuation, dans un cadre de r\u00e9f\u00e9rence actuel (sans p\u00e9riode de rappel)."}, "id": "main_livelihood_activity", "label": {"en": "Main livelihood activity", "es": "Actividad principal de subsistencia", "fr": "Activit\u00e9 principale de subsistance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-activity-category"}'
      bibliography_refs: fao-rima-2016
  malaria_test_done:
    title:
      en: Malaria test done
      fr: Test de paludisme effectué
      es: Prueba de malaria realizada
    description:
      en: 'Whether a malaria test — either a rapid diagnostic test (RDT) or a blood slide — was done for the child during the fever episode. Published wording: ''Was a malaria test done — either a rapid diagnostic test (RDT) or a blood slide?'' Ask only if fever_last_2wks is true. Gateway to malaria_test_result. Not in all DHS rounds; increasingly added in malaria-endemic settings. MICS code ML2.'
      fr: 'Si un test de paludisme — test de diagnostic rapide (TDR) ou frottis sanguin — a été effectué pour l''enfant pendant l''épisode de fièvre. Formulation publiée : « Un test de paludisme a-t-il été effectué — un test de diagnostic rapide (TDR) ou un frottis sanguin ? » Posez uniquement si fever_last_2wks est vrai. Passerelle vers malaria_test_result. Non inclus dans tous les cycles DHS ; de plus en plus ajouté dans les contextes d''endémie palustre. Code MICS ML2.'
      es: 'Si se realizó una prueba de malaria — ya sea una prueba de diagnóstico rápido (PDR) o un frotis de sangre — para el niño durante el episodio febril. Redacción publicada: ''¿Se realizó una prueba de malaria — ya sea una prueba de diagnóstico rápido (PDR) o un frotis de sangre?'' Preguntar solo si fever_last_2wks es verdadero. Puerta de entrada a malaria_test_result. No en todas las rondas DHS; cada vez más añadido en entornos endémicos de malaria. Código MICS ML2.'
    slot_uri: aidops:malaria_test_done
    range: MalariaTestType
    annotations:
