  water_collection_safety_perceived:
    title:
      en: Perceived safety when collecting water
      fr: Sécurité perçue lors de la collecte d'eau
      es: Seguridad percibida al recolectar agua
    description:
      en: Household-level perceived safety of members traveling to collect water, based on the past 7 days (or current conditions if water collection is intermittent). Framed at household level ('members of your household') to capture household risk without requiring a female respondent in private. Water collection — especially by women and girls — is a documented GBV risk moment in humanitarian settings (IASC GBV Guidelines 2015; IRC Safety Audit Tool 2013; GBV AoR 2021). Not applicable if water is available on premises (collection time = 0). For cross-reference with actual water collection time, see WASHAssessmentProfile.
      fr: Sécurité perçue au niveau du ménage des membres se déplaçant pour collecter de l'eau, basée sur les 7 derniers jours (ou les conditions actuelles si la collecte d'eau est intermittente). Formulée au niveau du ménage ('membres de votre ménage') pour saisir le risque ménage sans exiger une répondante de sexe féminin en privé. La collecte d'eau — notamment par les femmes et les filles — est un moment de risque VBG documenté dans les contextes humanitaires. Non applicable si l'eau est disponible sur place (temps de collecte = 0).
      es: Seguridad percibida a nivel del hogar de los miembros que se desplazan para recolectar agua, basada en los últimos 7 días (o condiciones actuales si la recolección de agua es intermitente). Formulada a nivel del hogar ('miembros de su hogar') para capturar el riesgo del hogar sin requerir una encuestada de sexo femenino en privado. La recolección de agua — especialmente por mujeres y niñas — es un momento de riesgo VBG documentado en contextos humanitarios. No aplica si el agua está disponible en las instalaciones (tiempo de recolección = 0).
    slot_uri: aidops:water_collection_safety_perceived
    range: RouteSafety3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013"], "cardinality": "single", "category": "gbv_risk", "core": false, "definition": {"en": "Household-level perceived safety of members traveling to collect water, based on the past 7 days (or current conditions if water collection is intermittent). Framed at household level (''members of your household'') to capture household risk without requiring a female respondent in private. Water collection \u2014 especially by women and girls \u2014 is a documented GBV risk moment in humanitarian settings (IASC GBV Guidelines 2015; IRC Safety Audit Tool 2013; GBV AoR 2021). Not applicable if water is available on premises (collection time = 0). For cross-reference with actual water collection time, see WASHAssessmentProfile.", "es": "Seguridad percibida a nivel del hogar de los miembros que se desplazan para recolectar agua, basada en los \u00faltimos 7 d\u00edas (o condiciones actuales si la recolecci\u00f3n de agua es intermitente). Formulada a nivel del hogar (''miembros de su hogar'') para capturar el riesgo del hogar sin requerir una encuestada de sexo femenino en privado. La recolecci\u00f3n de agua \u2014 especialmente por mujeres y ni\u00f1as \u2014 es un momento de riesgo VBG documentado en contextos humanitarios. No aplica si el agua est\u00e1 disponible en las instalaciones (tiempo de recolecci\u00f3n = 0).", "fr": "S\u00e9curit\u00e9 per\u00e7ue au niveau du m\u00e9nage des membres se d\u00e9pla\u00e7ant pour collecter de l''eau, bas\u00e9e sur les 7 derniers jours (ou les conditions actuelles si la collecte d''eau est intermittente). Formul\u00e9e au niveau du m\u00e9nage (''membres de votre m\u00e9nage'') pour saisir le risque m\u00e9nage sans exiger une r\u00e9pondante de sexe f\u00e9minin en priv\u00e9. La collecte d''eau \u2014 notamment par les femmes et les filles \u2014 est un moment de risque VBG document\u00e9 dans les contextes humanitaires. Non applicable si l''eau est disponible sur place (temps de collecte = 0)."}, "id": "water_collection_safety_perceived", "label": {"en": "Perceived safety when collecting water", "es": "Seguridad percibida al recolectar agua", "fr": "S\u00e9curit\u00e9 per\u00e7ue lors de la collecte d''eau"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "route-safety-3"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,irc-safety-audit-2013
  water_jerrycan_count:
    title:
      en: Number of water jerry cans
      fr: Nombre de jerrycans à eau
      es: Número de bidones para agua
    description:
      en: 'Count of jerry cans or lidded containers currently held by the household for carrying and storing water. Sphere Standard 2 and Standard 4: two water containers (10-20 litre capacity) for transportation and storage. UNHCR CRI: semi-collapsible jerry cans are listed as core relief items. Distinct from fuel_jerrycan_count, though households may use the same physical object for both uses. Cross-reference WASHAssessmentProfile water_storage_container_type when both profiles are collected.'
      fr: 'Nombre de jerrycans ou de récipients à couvercle actuellement détenus par le ménage pour le transport et le stockage d''eau. Normes Sphère 2 et 4 : deux récipients d''eau (capacité de 10 à 20 litres) pour le transport et le stockage. HCR CRI : les jerrycans semi-rigides sont listés comme articles de secours essentiels. Distinct de fuel_jerrycan_count, bien que les ménages puissent utiliser le même objet physique pour les deux usages. Référence croisée avec water_storage_container_type de WASHAssessmentProfile lorsque les deux profils sont collectés.'
      es: 'Cuenta de bidones o recipientes con tapa que tiene actualmente el hogar para transportar y almacenar agua. Normas Esfera 2 y 4: dos recipientes de agua (capacidad de 10-20 litros) para el transporte y almacenamiento. ACNUR CRI: los bidones semi-plegables están listados como artículos centrales de socorro. Distinto de fuel_jerrycan_count, aunque los hogares pueden usar el mismo objeto físico para ambos usos. Referencia cruzada con water_storage_container_type de WASHAssessmentProfile cuando se recolectan ambos perfiles.'
    slot_uri: aidops:water_jerrycan_count
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Count of jerry cans or lidded containers currently held by the household for carrying and storing water. Sphere Standard 2 and Standard 4: two water containers (10-20 litre capacity) for transportation and storage. UNHCR CRI: semi-collapsible jerry cans are listed as core relief items. Distinct from fuel_jerrycan_count, though households may use the same physical object for both uses. Cross-reference WASHAssessmentProfile water_storage_container_type when both profiles are collected.", "es": "Cuenta de bidones o recipientes con tapa que tiene actualmente el hogar para transportar y almacenar agua. Normas Esfera 2 y 4: dos recipientes de agua (capacidad de 10-20 litros) para el transporte y almacenamiento. ACNUR CRI: los bidones semi-plegables est\u00e1n listados como art\u00edculos centrales de socorro. Distinto de fuel_jerrycan_count, aunque los hogares pueden usar el mismo objeto f\u00edsico para ambos usos. Referencia cruzada con water_storage_container_type de WASHAssessmentProfile cuando se recolectan ambos perfiles.", "fr": "Nombre de jerrycans ou de r\u00e9cipients \u00e0 couvercle actuellement d\u00e9tenus par le m\u00e9nage pour le transport et le stockage d''eau. Normes Sph\u00e8re 2 et 4 : deux r\u00e9cipients d''eau (capacit\u00e9 de 10 \u00e0 20 litres) pour le transport et le stockage. HCR CRI : les jerrycans semi-rigides sont list\u00e9s comme articles de secours essentiels. Distinct de fuel_jerrycan_count, bien que les m\u00e9nages puissent utiliser le m\u00eame objet physique pour les deux usages. R\u00e9f\u00e9rence crois\u00e9e avec water_storage_container_type de WASHAssessmentProfile lorsque les deux profils sont collect\u00e9s."}, "id": "water_jerrycan_count", "label": {"en": "Number of water jerry cans", "es": "N\u00famero de bidones para agua", "fr": "Nombre de jerrycans \u00e0 eau"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
