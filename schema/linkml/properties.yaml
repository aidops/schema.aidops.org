  gbv_nonpartner_sex_violence_lifetime:
    title:
      en: 'Non-partner sexual violence (lifetime): ever forced to sexual intercourse or acts by anyone other than partner'
      fr: 'Violence sexuelle non conjugale (vie entière) : forcée par une personne autre que le partenaire'
      es: 'Violencia sexual no conyugal (de por vida): forzada por alguien que no era el compañero'
    description:
      en: 'Whether the respondent has ever been forced to have sexual intercourse or perform sexual acts by anyone other than her current or most recent husband/partner. DHS instrument item DV22A/B. Lifetime reference period (ever, from age 15 onward). Secondary item in the DHS DV module. Note: the DHS DV22A/B item may capture events from before age 15 if the respondent experienced childhood sexual abuse; this creates a boundary with ChildProtectionProfile. Perpetrator identity is captured in gbv_nonpartner_sex_violence_perpetrator. DHS-7+ compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: 'Si la répondante a jamais été forcée à avoir des rapports sexuels ou à accomplir des actes sexuels par quelqu''un d''autre que son partenaire. Item DHS DV22A/B. Période de référence : à vie (à partir de 15 ans). Item secondaire. Peut chevaucher ChildProtectionProfile pour les événements avant 15 ans. Compatible DHS-7+.'
      es: 'Si la encuestada alguna vez fue forzada a tener relaciones sexuales o realizar actos sexuales por alguien que no era su compañero. Ítem DHS DV22A/B. Período de referencia: de por vida (desde los 15 años). Ítem secundario. Puede solaparse con ChildProtectionProfile para eventos antes de los 15 años. Compatible DHS-7+.'
    slot_uri: aidops:gbv_nonpartner_sex_violence_lifetime
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "cardinality": "single", "category": "gbv_safety_signals", "core": false, "definition": {"en": "Whether the respondent has ever been forced to have sexual intercourse or perform sexual acts by anyone other than her current or most recent husband/partner. DHS instrument item DV22A/B. Lifetime reference period (ever, from age 15 onward). Secondary item in the DHS DV module. Note: the DHS DV22A/B item may capture events from before age 15 if the respondent experienced childhood sexual abuse; this creates a boundary with ChildProtectionProfile. Perpetrator identity is captured in gbv_nonpartner_sex_violence_perpetrator. DHS-7+ compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Si la encuestada alguna vez fue forzada a tener relaciones sexuales o realizar actos sexuales por alguien que no era su compa\u00f1ero. \u00cdtem DHS DV22A/B. Per\u00edodo de referencia: de por vida (desde los 15 a\u00f1os). \u00cdtem secundario. Puede solaparse con ChildProtectionProfile para eventos antes de los 15 a\u00f1os. Compatible DHS-7+.\n", "fr": "Si la r\u00e9pondante a jamais \u00e9t\u00e9 forc\u00e9e \u00e0 avoir des rapports sexuels ou \u00e0 accomplir des actes sexuels par quelqu''un d''autre que son partenaire. Item DHS DV22A/B. P\u00e9riode de r\u00e9f\u00e9rence : \u00e0 vie (\u00e0 partir de 15 ans). Item secondaire. Peut chevaucher ChildProtectionProfile pour les \u00e9v\u00e9nements avant 15 ans. Compatible DHS-7+.\n"}, "id": "gbv_nonpartner_sex_violence_lifetime", "label": {"en": "Non-partner sexual violence (lifetime): ever forced to sexual intercourse or acts by anyone other than partner", "es": "Violencia sexual no conyugal (de por vida): forzada por alguien que no era el compa\u00f1ero", "fr": "Violence sexuelle non conjugale (vie enti\u00e8re) : forc\u00e9e par une personne autre que le partenaire"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
