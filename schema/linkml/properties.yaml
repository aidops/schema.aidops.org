  most_recent_birth_outcome:
    title:
      en: Most recent birth outcome
      fr: Issue de la naissance la plus récente
      es: Resultado del parto más reciente
    description:
      en: 'Whether the most recent birth in the recall period was a live birth or a stillbirth. DHS-8 m80: 1 = live birth, 3 = stillbirth. All ANC and maternal PNC items are asked regardless of outcome. Newborn-specific items (skin-to-skin, birth weight, EIBF, newborn PNC) are skipped if outcome = stillbirth.'
      fr: 'Si la naissance la plus récente dans la période de rappel était une naissance vivante ou une mortinaissance. DHS-8 m80 : 1 = naissance vivante, 3 = mortinaissance. Tous les items CPN et SPN maternel sont posés indépendamment du résultat. Les items spécifiques au nouveau-né (peau à peau, poids de naissance, EIBF, SPN du nouveau-né) sont ignorés si résultat = mortinaissance.'
      es: 'Si el parto más reciente en el período de recordatorio fue un nacimiento vivo o un mortinato. DHS-8 m80: 1 = nacimiento vivo, 3 = mortinato. Todos los ítems de APN y PPN materna se preguntan independientemente del resultado. Los ítems específicos del recién nacido (piel a piel, peso al nacer, EIBF, PPN del recién nacido) se omiten si el resultado = mortinato.'
    slot_uri: aidops:most_recent_birth_outcome
    range: PregnancyOutcome
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire"], "cardinality": "single", "category": "pregnancy_history", "core": true, "definition": {"en": "Whether the most recent birth in the recall period was a live birth or a stillbirth. DHS-8 m80: 1 = live birth, 3 = stillbirth. All ANC and maternal PNC items are asked regardless of outcome. Newborn-specific items (skin-to-skin, birth weight, EIBF, newborn PNC) are skipped if outcome = stillbirth.", "es": "Si el parto m\u00e1s reciente en el per\u00edodo de recordatorio fue un nacimiento vivo o un mortinato. DHS-8 m80: 1 = nacimiento vivo, 3 = mortinato. Todos los \u00edtems de APN y PPN materna se preguntan independientemente del resultado. Los \u00edtems espec\u00edficos del reci\u00e9n nacido (piel a piel, peso al nacer, EIBF, PPN del reci\u00e9n nacido) se omiten si el resultado = mortinato.", "fr": "Si la naissance la plus r\u00e9cente dans la p\u00e9riode de rappel \u00e9tait une naissance vivante ou une mortinaissance. DHS-8 m80 : 1 = naissance vivante, 3 = mortinaissance. Tous les items CPN et SPN maternel sont pos\u00e9s ind\u00e9pendamment du r\u00e9sultat. Les items sp\u00e9cifiques au nouveau-n\u00e9 (peau \u00e0 peau, poids de naissance, EIBF, SPN du nouveau-n\u00e9) sont ignor\u00e9s si r\u00e9sultat = mortinaissance."}, "id": "most_recent_birth_outcome", "label": {"en": "Most recent birth outcome", "es": "Resultado del parto m\u00e1s reciente", "fr": "Issue de la naissance la plus r\u00e9cente"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "pregnancy-outcome"}'
