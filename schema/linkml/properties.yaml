  growth_reference:
    title:
      en: Growth reference
      fr: Référence de croissance
      es: Referencia de crecimiento
    description:
      en: The growth reference population used to derive z-scores and band classifications from anthropometric measurements. The WHO Child Growth Standards (2006) are the default for children under five; the WHO Growth Reference (2007) applies to 5-19 year-olds; historical datasets may use the CDC 2000 charts or the NCHS/WHO 1977 reference. Required whenever any derived status (stunting_status, wasting_status, underweight_status, acute_malnutrition_status) is populated.
      fr: La population de référence de croissance utilisée pour dériver les z-scores et les classifications par bandes à partir des mesures anthropométriques. Les Normes OMS de croissance de l'enfant (2006) sont la référence par défaut pour les moins de cinq ans ; la Référence OMS de croissance (2007) s'applique aux 5-19 ans ; les jeux de données historiques peuvent utiliser les courbes CDC 2000 ou la référence NCHS/OMS 1977. Requis dès qu'un statut dérivé (stunting_status, wasting_status, underweight_status, acute_malnutrition_status) est renseigné.
      es: La población de referencia de crecimiento utilizada para derivar z-scores y clasificaciones por bandas a partir de mediciones antropométricas. Los Estándares OMS de Crecimiento Infantil (2006) son el valor por defecto para menores de cinco años; la Referencia OMS de Crecimiento (2007) se aplica a los 5-19 años; los conjuntos de datos históricos pueden usar las gráficas CDC 2000 o la referencia NCHS/OMS 1977. Requerido siempre que se complete cualquier estado derivado (stunting_status, wasting_status, underweight_status, acute_malnutrition_status).
    slot_uri: aidops:growth_reference
    range: GrowthReference
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology"], "cardinality": "single", "definition": {"en": "The growth reference population used to derive z-scores and band classifications from anthropometric measurements. The WHO Child Growth Standards (2006) are the default for children under five; the WHO Growth Reference (2007) applies to 5-19 year-olds; historical datasets may use the CDC 2000 charts or the NCHS/WHO 1977 reference. Required whenever any derived status (stunting_status, wasting_status, underweight_status, acute_malnutrition_status) is populated.", "es": "La poblaci\u00f3n de referencia de crecimiento utilizada para derivar z-scores y clasificaciones por bandas a partir de mediciones antropom\u00e9tricas. Los Est\u00e1ndares OMS de Crecimiento Infantil (2006) son el valor por defecto para menores de cinco a\u00f1os; la Referencia OMS de Crecimiento (2007) se aplica a los 5-19 a\u00f1os; los conjuntos de datos hist\u00f3ricos pueden usar las gr\u00e1ficas CDC 2000 o la referencia NCHS/OMS 1977. Requerido siempre que se complete cualquier estado derivado (stunting_status, wasting_status, underweight_status, acute_malnutrition_status).", "fr": "La population de r\u00e9f\u00e9rence de croissance utilis\u00e9e pour d\u00e9river les z-scores et les classifications par bandes \u00e0 partir des mesures anthropom\u00e9triques. Les Normes OMS de croissance de l''enfant (2006) sont la r\u00e9f\u00e9rence par d\u00e9faut pour les moins de cinq ans ; la R\u00e9f\u00e9rence OMS de croissance (2007) s''applique aux 5-19 ans ; les jeux de donn\u00e9es historiques peuvent utiliser les courbes CDC 2000 ou la r\u00e9f\u00e9rence NCHS/OMS 1977. Requis d\u00e8s qu''un statut d\u00e9riv\u00e9 (stunting_status, wasting_status, underweight_status, acute_malnutrition_status) est renseign\u00e9."}, "id": "growth_reference", "label": {"en": "Growth reference", "es": "Referencia de crecimiento", "fr": "R\u00e9f\u00e9rence de croissance"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["smart"], "vocabulary": "growth-reference"}'
      bibliography_refs: smart-methodology
  habitability_status:
    title:
      en: Habitability status
      fr: Statut d'habitabilité
      es: Estado de habitabilidad
    description:
      en: 'Programming-facing judgement of whether the assessed dwelling can currently be occupied and what category of shelter response it requires. Distinct from damage_level: a moderately damaged structure may still be habitable, and a lightly damaged one may be vacated for other reasons.'
      fr: 'Jugement orienté programmation sur l''occupabilité actuelle du logement évalué et la catégorie de réponse abri requise. Distinct de damage_level : une structure modérément endommagée peut rester habitable, et une structure légèrement endommagée peut être abandonnée pour d''autres raisons.'
      es: 'Juicio orientado a la programación sobre si la vivienda evaluada puede ocuparse actualmente y qué categoría de respuesta de refugio requiere. Distinto de damage_level: una estructura moderadamente dañada puede seguir siendo habitable, y una ligeramente dañada puede estar desocupada por otras razones.'
    slot_uri: aidops:habitability_status
    range: HabitabilityStatus
    annotations:
