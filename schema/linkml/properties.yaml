  weai_work_primary_hours:
    title:
      en: WEAI work balance — productive work hours
      fr: WEAI équilibre travail — heures de travail productif
      es: WEAI equilibrio laboral — horas de trabajo productivo
    description:
      en: 'Number of hours the respondent spent on productive work in a typical day (farming, livestock, off-farm employment, home-based processing, marketing). 24-hour recall is preferred. One of three raw time components for pro-WEAI Indicator B5 (work balance). The total work burden is computed as: primary hours + domestic hours + 0.5 × secondary childcare hours. Adequacy: total < 10.5 hours.'
      fr: 'Nombre d''heures que le répondant a consacrées au travail productif lors d''une journée type (agriculture, élevage, emploi hors ferme, transformation à domicile, commercialisation). Le rappel sur 24 heures est préféré. L''une des trois composantes temporelles brutes de l''indicateur B5 du pro-WEAI (équilibre travail). La charge de travail totale est calculée comme : heures primaires + heures domestiques + 0,5 × heures de garde secondaire. Adéquation : total < 10,5 heures.'
      es: 'Número de horas que el encuestado dedicó al trabajo productivo en un día típico (agricultura, ganadería, empleo fuera de la finca, procesamiento doméstico, comercialización). Se prefiere el recordatorio de 24 horas. Uno de los tres componentes de tiempo bruto del Indicador B5 del pro-WEAI (equilibrio laboral). La carga de trabajo total se calcula como: horas primarias + horas domésticas + 0,5 × horas de cuidado infantil secundario. Adecuación: total < 10,5 horas.'
    slot_uri: aidops:weai_work_primary_hours
    range: string
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["pro-weai-2019"], "cardinality": "single", "category": "instrumental_agency", "core": true, "definition": {"en": "Number of hours the respondent spent on productive work in a typical day (farming, livestock, off-farm employment, home-based processing, marketing). 24-hour recall is preferred. One of three raw time components for pro-WEAI Indicator B5 (work balance). The total work burden is computed as: primary hours + domestic hours + 0.5 \u00d7 secondary childcare hours. Adequacy: total < 10.5 hours.", "es": "N\u00famero de horas que el encuestado dedic\u00f3 al trabajo productivo en un d\u00eda t\u00edpico (agricultura, ganader\u00eda, empleo fuera de la finca, procesamiento dom\u00e9stico, comercializaci\u00f3n). Se prefiere el recordatorio de 24 horas. Uno de los tres componentes de tiempo bruto del Indicador B5 del pro-WEAI (equilibrio laboral). La carga de trabajo total se calcula como: horas primarias + horas dom\u00e9sticas + 0,5 \u00d7 horas de cuidado infantil secundario. Adecuaci\u00f3n: total < 10,5 horas.", "fr": "Nombre d''heures que le r\u00e9pondant a consacr\u00e9es au travail productif lors d''une journ\u00e9e type (agriculture, \u00e9levage, emploi hors ferme, transformation \u00e0 domicile, commercialisation). Le rappel sur 24 heures est pr\u00e9f\u00e9r\u00e9. L''une des trois composantes temporelles brutes de l''indicateur B5 du pro-WEAI (\u00e9quilibre travail). La charge de travail totale est calcul\u00e9e comme : heures primaires + heures domestiques + 0,5 \u00d7 heures de garde secondaire. Ad\u00e9quation : total < 10,5 heures."}, "id": "weai_work_primary_hours", "label": {"en": "WEAI work balance \u2014 productive work hours", "es": "WEAI equilibrio laboral \u2014 horas de trabajo productivo", "fr": "WEAI \u00e9quilibre travail \u2014 heures de travail productif"}, "maturity": "draft", "references": null, "type": "decimal", "valid_instruments": ["pro_weai"], "vocabulary": null}'
