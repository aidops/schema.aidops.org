  covered_area_m2:
    title:
      en: Total covered living area (m²)
      fr: Surface habitable couverte totale (m²)
      es: Área habitable cubierta total (m²)
    description:
      en: The total covered floor area in square metres of the rooms the household uses for sleeping, eating, and daily activities. Excludes cooking areas outside the main structure, bathing rooms, and latrines. The primary input for calculating covered_area_per_person_m2, which is assessed against the Sphere minimum of 3.5 m² per person (warm climate) or 4.5 m² (cold climate or urban setting with indoor cooking).
      fr: La superficie habitable couverte totale en mètres carrés des pièces que le ménage utilise pour dormir, manger et les activités quotidiennes. Exclut les espaces de cuisine à l'extérieur de la structure principale, les salles de bain et les latrines. L'entrée principale pour calculer covered_area_per_person_m2, qui est évaluée par rapport au minimum Sphère de 3,5 m² par personne (climat chaud) ou 4,5 m² (climat froid ou milieu urbain avec cuisine intérieure).
      es: El área habitable cubierta total en metros cuadrados de las habitaciones que el hogar usa para dormir, comer y actividades diarias. Excluye áreas de cocina fuera de la estructura principal, baños y letrinas. La entrada principal para calcular covered_area_per_person_m2, que se evalúa frente al mínimo de Esfera de 3,5 m² por persona (clima cálido) o 4,5 m² (clima frío o entorno urbano con cocina interior).
    slot_uri: aidops:covered_area_m2
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gsc-indicators-v2", "iom-dtm-shelter-companion", "sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "The total covered floor area in square metres of the rooms the household uses for sleeping, eating, and daily activities. Excludes cooking areas outside the main structure, bathing rooms, and latrines. The primary input for calculating covered_area_per_person_m2, which is assessed against the Sphere minimum of 3.5 m\u00b2 per person (warm climate) or 4.5 m\u00b2 (cold climate or urban setting with indoor cooking).", "es": "El \u00e1rea habitable cubierta total en metros cuadrados de las habitaciones que el hogar usa para dormir, comer y actividades diarias. Excluye \u00e1reas de cocina fuera de la estructura principal, ba\u00f1os y letrinas. La entrada principal para calcular covered_area_per_person_m2, que se eval\u00faa frente al m\u00ednimo de Esfera de 3,5 m\u00b2 por persona (clima c\u00e1lido) o 4,5 m\u00b2 (clima fr\u00edo o entorno urbano con cocina interior).", "fr": "La superficie habitable couverte totale en m\u00e8tres carr\u00e9s des pi\u00e8ces que le m\u00e9nage utilise pour dormir, manger et les activit\u00e9s quotidiennes. Exclut les espaces de cuisine \u00e0 l''ext\u00e9rieur de la structure principale, les salles de bain et les latrines. L''entr\u00e9e principale pour calculer covered_area_per_person_m2, qui est \u00e9valu\u00e9e par rapport au minimum Sph\u00e8re de 3,5 m\u00b2 par personne (climat chaud) ou 4,5 m\u00b2 (climat froid ou milieu urbain avec cuisine int\u00e9rieure)."}, "id": "covered_area_m2", "label": {"en": "Total covered living area (m\u00b2)", "es": "\u00c1rea habitable cubierta total (m\u00b2)", "fr": "Surface habitable couverte totale (m\u00b2)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised", "unhcr_nare"], "vocabulary": null}'
      bibliography_refs: gsc-indicators-v2,iom-dtm-shelter-companion,sphere-2018
  covered_area_per_person_m2:
    title:
      en: Covered living area per person (m²)
      fr: Surface habitable couverte par personne (m²)
      es: Área habitable cubierta por persona (m²)
    description:
      en: 'Derived indicator: total covered living area (covered_area_m2) divided by household size. Calculated in XLSForm or post-hoc. The adequacy threshold — 3.5 m² per person for warm climates, 4.5 m² for cold climates or urban settings with indoor cooking — is applied at scoring time with a deployment-level climate_zone parameter, not encoded in the schema.'
      fr: 'Indicateur dérivé : surface habitable couverte totale (covered_area_m2) divisée par la taille du ménage. Calculé dans XLSForm ou a posteriori. Le seuil d''adéquation — 3,5 m² par personne pour les climats chauds, 4,5 m² pour les climats froids ou les milieux urbains avec cuisine intérieure — est appliqué au moment du scoring avec un paramètre climate_zone au niveau du déploiement, non encodé dans le schéma.'
      es: 'Indicador derivado: área habitable cubierta total (covered_area_m2) dividida por el tamaño del hogar. Calculado en XLSForm o ex post. El umbral de adecuación — 3,5 m² por persona para climas cálidos, 4,5 m² para climas fríos o entornos urbanos con cocina interior — se aplica en el momento de la puntuación con un parámetro climate_zone a nivel de despliegue, no codificado en el esquema.'
    slot_uri: aidops:covered_area_per_person_m2
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gsc-indicators-v2", "sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "Derived indicator: total covered living area (covered_area_m2) divided by household size. Calculated in XLSForm or post-hoc. The adequacy threshold \u2014 3.5 m\u00b2 per person for warm climates, 4.5 m\u00b2 for cold climates or urban settings with indoor cooking \u2014 is applied at scoring time with a deployment-level climate_zone parameter, not encoded in the schema.", "es": "Indicador derivado: \u00e1rea habitable cubierta total (covered_area_m2) dividida por el tama\u00f1o del hogar. Calculado en XLSForm o ex post. El umbral de adecuaci\u00f3n \u2014 3,5 m\u00b2 por persona para climas c\u00e1lidos, 4,5 m\u00b2 para climas fr\u00edos o entornos urbanos con cocina interior \u2014 se aplica en el momento de la puntuaci\u00f3n con un par\u00e1metro climate_zone a nivel de despliegue, no codificado en el esquema.", "fr": "Indicateur d\u00e9riv\u00e9 : surface habitable couverte totale (covered_area_m2) divis\u00e9e par la taille du m\u00e9nage. Calcul\u00e9 dans XLSForm ou a posteriori. Le seuil d''ad\u00e9quation \u2014 3,5 m\u00b2 par personne pour les climats chauds, 4,5 m\u00b2 pour les climats froids ou les milieux urbains avec cuisine int\u00e9rieure \u2014 est appliqu\u00e9 au moment du scoring avec un param\u00e8tre climate_zone au niveau du d\u00e9ploiement, non encod\u00e9 dans le sch\u00e9ma."}, "id": "covered_area_per_person_m2", "label": {"en": "Covered living area per person (m\u00b2)", "es": "\u00c1rea habitable cubierta por persona (m\u00b2)", "fr": "Surface habitable couverte par personne (m\u00b2)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "decimal", "valid_instruments": ["sphere_shelter_adequacy", "gsc_standardised"], "vocabulary": null}'
      bibliography_refs: gsc-indicators-v2,sphere-2018
  crop_loss_cause:
    title:
      en: Primary cause(s) of crop loss in the last agricultural season
      fr: Cause(s) principale(s) de la perte de récolte au cours de la dernière saison agricole
      es: Causa(s) principal(es) de la pérdida de cultivos en la última temporada agrícola
    description:
      en: Primary cause or causes of the reported crop loss during the last completed agricultural season. Multi-select from vocabulary `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) because a single season may combine concurrent shocks (e.g., drought followed by pests). Drawn from the LSMS-ISA shock module and FAO WCA 2020 Theme 10 (major risks faced by the holding). Asked only when `crop_loss_shock_past_season` is `yes`.
      fr: Cause ou causes principales de la perte de récolte signalée au cours de la dernière saison agricole complète. Sélection multiple dans le vocabulaire `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) car une seule saison peut combiner des chocs concurrents (par exemple, sécheresse suivie de ravageurs). Tiré du module des chocs du LSMS-ISA et du Thème 10 du WCA 2020 de la FAO (risques majeurs auxquels est confrontée l'exploitation). Posée uniquement lorsque `crop_loss_shock_past_season` est `yes`.
      es: Causa o causas principales de la pérdida de cultivos reportada durante la última temporada agrícola completa. Selección múltiple del vocabulario `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) porque una sola temporada puede combinar choques concurrentes (por ejemplo, sequía seguida de plagas). Tomado del módulo de choques de LSMS-ISA y del Tema 10 del WCA 2020 de la FAO (riesgos mayores que enfrenta la explotación). Se pregunta solo cuando `crop_loss_shock_past_season` es `yes`.
