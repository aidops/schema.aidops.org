nas", "fr": "Fi\u00e8vre au cours des deux derni\u00e8res semaines"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
