  vacc_hepb_birth:
    title:
      en: Hepatitis B birth dose vaccination status
      fr: Statut vaccinal hépatite B dose de naissance
      es: Estado de vacunación hepatitis B dosis neonatal
    description:
      en: 'Whether the child received the hepatitis B birth dose within 24 hours of birth. Published recall wording: ''Was (name) given a hepatitis B injection within 24 hours of birth?'' Recommended by WHO within 24 hours of birth to prevent perinatal transmission. Country-specific — not in all national EPI schedules. DHS code h0 (DHS-7+); MICS code IM_HepB0.'
      fr: 'Si l''enfant a reçu la dose de naissance du vaccin contre l''hépatite B dans les 24 heures suivant la naissance. Formulation de rappel publiée : « (Prénom) a-t-il/elle reçu une injection contre l''hépatite B dans les 24 heures suivant la naissance ? » Recommandée par l''OMS dans les 24 heures suivant la naissance pour prévenir la transmission périnatale. Spécifique au pays — non incluse dans tous les calendriers EPI nationaux. Code DHS h0 (DHS-7+) ; code MICS IM_HepB0.'
      es: 'Si el niño recibió la dosis neonatal de hepatitis B dentro de las 24 horas del nacimiento. Redacción de recordatorio publicada: ''¿Recibió (nombre) una inyección contra la hepatitis B dentro de las 24 horas del nacimiento?'' Recomendada por la OMS dentro de las 24 horas del nacimiento para prevenir la transmisión perinatal. Específica por país — no incluida en todos los calendarios EPI nacionales. Código DHS h0 (DHS-7+); código MICS IM_HepB0.'
    slot_uri: aidops:vacc_hepb_birth
    range: VaccStatus
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-epi-schedule"], "cardinality": "single", "category": "vaccination", "core": true, "definition": {"en": "Whether the child received the hepatitis B birth dose within 24 hours of birth. Published recall wording: ''Was (name) given a hepatitis B injection within 24 hours of birth?'' Recommended by WHO within 24 hours of birth to prevent perinatal transmission. Country-specific \u2014 not in all national EPI schedules. DHS code h0 (DHS-7+); MICS code IM_HepB0.", "es": "Si el ni\u00f1o recibi\u00f3 la dosis neonatal de hepatitis B dentro de las 24 horas del nacimiento. Redacci\u00f3n de recordatorio publicada: ''\u00bfRecibi\u00f3 (nombre) una inyecci\u00f3n contra la hepatitis B dentro de las 24 horas del nacimiento?'' Recomendada por la OMS dentro de las 24 horas del nacimiento para prevenir la transmisi\u00f3n perinatal. Espec\u00edfica por pa\u00eds \u2014 no incluida en todos los calendarios EPI nacionales. C\u00f3digo DHS h0 (DHS-7+); c\u00f3digo MICS IM_HepB0.", "fr": "Si l''enfant a re\u00e7u la dose de naissance du vaccin contre l''h\u00e9patite B dans les 24 heures suivant la naissance. Formulation de rappel publi\u00e9e : \u00ab (Pr\u00e9nom) a-t-il/elle re\u00e7u une injection contre l''h\u00e9patite B dans les 24 heures suivant la naissance ? \u00bb Recommand\u00e9e par l''OMS dans les 24 heures suivant la naissance pour pr\u00e9venir la transmission p\u00e9rinatale. Sp\u00e9cifique au pays \u2014 non incluse dans tous les calendriers EPI nationaux. Code DHS h0 (DHS-7+) ; code MICS IM_HepB0."}, "id": "vacc_hepb_birth", "label": {"en": "Hepatitis B birth dose vaccination status", "es": "Estado de vacunaci\u00f3n hepatitis B dosis neonatal", "fr": "Statut vaccinal h\u00e9patite B dose de naissance"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": "vacc-status"}'
