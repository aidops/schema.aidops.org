  ari_antibiotics_given:
    title:
      en: Antibiotics given for ARI
      fr: Antibiotiques administrés pour l'IRA
      es: Antibióticos administrados para la IRA
    description:
      en: 'Whether the child was given antibiotics (tablets, syrup, or injection) for the cough or breathing problem. Published wording: ''Was (name) given antibiotics — antibiotic tablets, syrup, or injection — for the cough or breathing problem?'' IMCI recommendation: antibiotic (amoxicillin or cotrimoxazole) for non-severe pneumonia. Key programmatic indicator for ARI appropriate treatment coverage. Ask only if ari_symptom_classification is true. DHS code h33; MICS code ARI6.'
      fr: 'Si l''enfant a reçu des antibiotiques (comprimés, sirop ou injection) pour la toux ou les difficultés respiratoires. Formulation publiée : « (Prénom) a-t-il/elle reçu des antibiotiques — comprimés, sirop ou injection d''antibiotiques — pour la toux ou les difficultés respiratoires ? » Recommandation PCIME : antibiotique (amoxicilline ou cotrimoxazole) pour la pneumonie non sévère. Indicateur programmatique clé de la couverture du traitement approprié de l''IRA. Posez uniquement si ari_symptom_classification est vrai. Code DHS h33 ; code MICS ARI6.'
      es: 'Si al niño se le administraron antibióticos (comprimidos, jarabe o inyección) para la tos o el problema respiratorio. Redacción publicada: ''¿Se le administraron a (nombre) antibióticos — comprimidos, jarabe o inyección de antibióticos — para la tos o el problema respiratorio?'' Recomendación IMCI: antibiótico (amoxicilina o cotrimoxazol) para neumonía no grave. Indicador programático clave de cobertura de tratamiento apropiado de IRA. Preguntar solo si ari_symptom_classification es verdadero. Código DHS h33; código MICS ARI6.'
    slot_uri: aidops:ari_antibiotics_given
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "mics6-child-health", "who-imci"], "cardinality": "single", "category": "ari", "core": true, "definition": {"en": "Whether the child was given antibiotics (tablets, syrup, or injection) for the cough or breathing problem. Published wording: ''Was (name) given antibiotics \u2014 antibiotic tablets, syrup, or injection \u2014 for the cough or breathing problem?'' IMCI recommendation: antibiotic (amoxicillin or cotrimoxazole) for non-severe pneumonia. Key programmatic indicator for ARI appropriate treatment coverage. Ask only if ari_symptom_classification is true. DHS code h33; MICS code ARI6.", "es": "Si al ni\u00f1o se le administraron antibi\u00f3ticos (comprimidos, jarabe o inyecci\u00f3n) para la tos o el problema respiratorio. Redacci\u00f3n publicada: ''\u00bfSe le administraron a (nombre) antibi\u00f3ticos \u2014 comprimidos, jarabe o inyecci\u00f3n de antibi\u00f3ticos \u2014 para la tos o el problema respiratorio?'' Recomendaci\u00f3n IMCI: antibi\u00f3tico (amoxicilina o cotrimoxazol) para neumon\u00eda no grave. Indicador program\u00e1tico clave de cobertura de tratamiento apropiado de IRA. Preguntar solo si ari_symptom_classification es verdadero. C\u00f3digo DHS h33; c\u00f3digo MICS ARI6.", "fr": "Si l''enfant a re\u00e7u des antibiotiques (comprim\u00e9s, sirop ou injection) pour la toux ou les difficult\u00e9s respiratoires. Formulation publi\u00e9e : \u00ab (Pr\u00e9nom) a-t-il/elle re\u00e7u des antibiotiques \u2014 comprim\u00e9s, sirop ou injection d''antibiotiques \u2014 pour la toux ou les difficult\u00e9s respiratoires ? \u00bb Recommandation PCIME : antibiotique (amoxicilline ou cotrimoxazole) pour la pneumonie non s\u00e9v\u00e8re. Indicateur programmatique cl\u00e9 de la couverture du traitement appropri\u00e9 de l''IRA. Posez uniquement si ari_symptom_classification est vrai. Code DHS h33 ; code MICS ARI6."}, "id": "ari_antibiotics_given", "label": {"en": "Antibiotics given for ARI", "es": "Antibi\u00f3ticos administrados para la IRA", "fr": "Antibiotiques administr\u00e9s pour l''IRA"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
