    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["who-epi-schedule"], "cardinality": "single", "category": "vaccination", "core": false, "definition": {"en": "Whether the child received any vaccine not included in the standard antigen list above. This field captures country-specific antigens not covered by the default WHO EPI property set (e.g., typhoid, meningococcal, Japanese encephalitis). Deployment-specific extensions should specify the antigen name and number of doses via a separate extension block.", "es": "Si el ni\u00f1o recibi\u00f3 alguna vacuna no incluida en la lista de ant\u00edgenos est\u00e1ndar anterior. Este campo captura ant\u00edgenos espec\u00edficos de cada pa\u00eds no cubiertos por el conjunto de propiedades EPI OMS por defecto (p. ej., tifoidea, meningoc\u00f3cica, encefalitis japonesa). Las extensiones espec\u00edficas del despliegue deben especificar el nombre del ant\u00edgeno y el n\u00famero de dosis mediante un bloque de extensi\u00f3n separado.", "fr": "Si l''enfant a re\u00e7u un vaccin non inclus dans la liste d''antig\u00e8nes standard ci-dessus. Ce champ capture les antig\u00e8nes sp\u00e9cifiques \u00e0 chaque pays non couverts par l''ensemble de propri\u00e9t\u00e9s EPI OMS par d\u00e9faut (par ex., typho\u00efde, m\u00e9ningococcique, enc\u00e9phalite japonaise). Les extensions propres au d\u00e9ploiement doivent pr\u00e9ciser le nom de l''antig\u00e8ne et le nombre de doses via un bloc d''extension s\u00e9par\u00e9."}, "id": "other_vaccine_received", "label": {"en": "Other vaccine received", "es": "Otra vacuna recibida", "fr": "Autre vaccin re\u00e7u"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
