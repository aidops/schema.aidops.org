  gbv_nonpartner_sex_violence_perpetrator:
    title:
      en: 'Non-partner sexual violence: perpetrator type'
      fr: 'Violence sexuelle non conjugale : type d''auteur'
      es: 'Violencia sexual no conyugal: tipo de perpetrador'
