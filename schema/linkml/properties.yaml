  handwashing_water_available:
    title:
      en: Water available at handwashing facility (observed)
      fr: Eau disponible au dispositif de lavage des mains (observée)
      es: Agua disponible en la instalación de lavado de manos (observada)
    description:
      en: Whether water is available at or near the handwashing facility at the moment of the enumerator's visit. JMP H2 (direct enumerator observation, not self-report). Asked only when handwashing_facility_present is not 'no'. Water availability combined with soap availability determines the hygiene service level. This is a point-in-time observation.
      fr: Si l'eau est disponible au dispositif de lavage des mains ou à proximité au moment de la visite de l'énumérateur. JMP H2 (observation directe de l'énumérateur, pas d'auto-déclaration). Demandé uniquement quand handwashing_facility_present n'est pas 'no'. La disponibilité de l'eau combinée à la disponibilité du savon détermine le niveau de service d'hygiène. Il s'agit d'une observation ponctuelle.
      es: Si el agua está disponible en o cerca de la instalación de lavado de manos en el momento de la visita del enumerador. JMP H2 (observación directa del enumerador, no autodeclaración). Preguntado solo cuando handwashing_facility_present no es 'no'. La disponibilidad de agua combinada con la disponibilidad de jabón determina el nivel de servicio de higiene. Es una observación puntual.
    slot_uri: aidops:handwashing_water_available
