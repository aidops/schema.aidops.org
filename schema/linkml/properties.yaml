    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["child_5_17"], "bibliography_refs": ["inee-minimum-standards", "mics-education"], "cardinality": "single", "category": "education", "core": true, "definition": {"en": "The primary reason the child is not attending school in the current school year (or has never attended). Single-select; captures the main barrier for MICS6 comparability. For comprehensive assessments, use reasons_for_non_attendance (multi-select) to capture all applicable barriers. Ask if attended_current_year is No or ever_attended_school is No.", "es": "La raz\u00f3n principal por la que el ni\u00f1o no asiste a la escuela en el a\u00f1o escolar actual (o nunca ha asistido). Selecci\u00f3n \u00fanica; captura la barrera principal para comparabilidad con MICS6. Para evaluaciones comprensivas, usar reasons_for_non_attendance (selecci\u00f3n m\u00faltiple) para capturar todas las barreras aplicables. Preguntar si attended_current_year es No o ever_attended_school es No.", "fr": "La raison principale pour laquelle l''enfant ne fr\u00e9quente pas l''\u00e9cole pendant l''ann\u00e9e scolaire en cours (ou n''a jamais fr\u00e9quent\u00e9). S\u00e9lection unique ; capture l''obstacle principal pour la comparabilit\u00e9 avec MICS6. Pour les \u00e9valuations approfondies, utiliser reasons_for_non_attendance (s\u00e9lection multiple) pour capturer tous les obstacles applicables. \u00c0 poser si attended_current_year est Non ou ever_attended_school est Non."}, "id": "non_attendance_reason", "label": {"en": "Main reason for non-attendance", "es": "Raz\u00f3n principal de no asistencia", "fr": "Raison principale de non-fr\u00e9quentation"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "reason-for-non-attendance"}'
