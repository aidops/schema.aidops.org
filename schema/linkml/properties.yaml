    range: MhmPrivacyAccess
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "mhm", "core": false, "definition": {"en": "Whether the respondent had a private place to wash themselves during their last menstrual period. Asked only to women and girls of menstruating age (typically 10\u201355 years); screened via household roster age/sex or a screening question. SDG 6.2 explicitly references women''s and girls'' hygiene needs. The JMP expanded its MHM monitoring in 2021. Based on JMP/MICS expanded MHM module (MICS Belize pilot UN14). Codes: yes_toilet_or_bathroom = private washing facility; yes_elsewhere = private space but not a toilet or bathroom; no = no private space available.", "es": "Si la encuestada tuvo un lugar privado para lavarse durante su \u00faltimo per\u00edodo menstrual. Preguntado solo a mujeres y ni\u00f1as en edad de menstruar (t\u00edpicamente 10\u201355 a\u00f1os); filtrado por edad/sexo en el registro del hogar o mediante una pregunta de filtro. Los ODS 6.2 mencionan expl\u00edcitamente las necesidades de higiene de las mujeres y las ni\u00f1as. El JMP ampli\u00f3 su monitoreo de MHM en 2021. Basado en el m\u00f3dulo MHM ampliado JMP/MICS (pregunta piloto MICS Belice UN14). C\u00f3digos: yes_toilet_or_bathroom = instalaci\u00f3n de lavado privada; yes_elsewhere = espacio privado pero no inodoro ni ba\u00f1o; no = sin espacio privado disponible.", "fr": "Si la r\u00e9pondante disposait d''un endroit priv\u00e9 pour se laver pendant ses derni\u00e8res r\u00e8gles. Demand\u00e9 uniquement aux femmes et filles en \u00e2ge de menstruer (g\u00e9n\u00e9ralement 10\u201355 ans) ; filtr\u00e9 par l''\u00e2ge/le sexe dans le registre des m\u00e9nages ou une question de filtrage. L''ODD 6.2 fait explicitement r\u00e9f\u00e9rence aux besoins en mati\u00e8re d''hygi\u00e8ne des femmes et des filles. Le JMP a \u00e9largi son suivi de la GHM en 2021. Bas\u00e9 sur le module MHM \u00e9largi JMP/MICS (question pilote MICS Belize UN14). Codes : yes_toilet_or_bathroom = installation de lavage priv\u00e9e ; yes_elsewhere = espace priv\u00e9 mais pas de toilettes ni de salle de bains ; no = aucun espace priv\u00e9 disponible."}, "id": "mhm_privacy_available", "label": {"en": "Private place available for menstrual hygiene", "es": "Lugar privado disponible para la higiene menstrual", "fr": "Lieu priv\u00e9 disponible pour l''hygi\u00e8ne menstruelle"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7"], "vocabulary": "mhm-privacy-access"}'
