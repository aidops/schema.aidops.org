  has_savings:
    title:
      en: Household has any savings
      fr: Le ménage a des économies
      es: El hogar tiene ahorros
    description:
      en: Whether the household currently has any form of savings (cash, bank account, mobile money, savings group, in-kind stores, or other). A binary indicator of financial buffer capacity. Drawn from the LSMS-ISA finance and savings module, the FAO RIMA-II Access to Basic Services and Social Safety Nets (ABS/SSN) pillars, and the CGAP financial inclusion core indicators. The `prefer_not_to_answer` option is retained given high sensitivity and enumerator observations that savings questions often trigger refusal.
      fr: Si le ménage dispose actuellement d'une forme quelconque d'épargne (liquidités, compte bancaire, monnaie mobile, groupe d'épargne, stocks en nature ou autre). Indicateur binaire de capacité tampon financière. Tiré du module finances et épargne LSMS-ISA, des piliers Accès aux services de base et Filets de sécurité sociale (ABS/SSN) de FAO RIMA-II et des indicateurs de base d'inclusion financière du CGAP. L'option `prefer_not_to_answer` est conservée en raison de la sensibilité élevée et des observations d'enquêteurs selon lesquelles les questions sur l'épargne déclenchent souvent un refus.
      es: Si el hogar actualmente tiene alguna forma de ahorros (efectivo, cuenta bancaria, dinero móvil, grupo de ahorro, reservas en especie u otro). Indicador binario de capacidad de amortiguación financiera. Tomado del módulo de finanzas y ahorros LSMS-ISA, los pilares Acceso a Servicios Básicos y Redes de Protección Social (ABS/SSN) de FAO RIMA-II y los indicadores básicos de inclusión financiera del CGAP. La opción `prefer_not_to_answer` se conserva dada la alta sensibilidad y las observaciones de los encuestadores de que las preguntas sobre ahorros suelen provocar rechazo.
    slot_uri: aidops:has_savings
    range: YesNoPnta
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household currently has any form of savings (cash, bank account, mobile money, savings group, in-kind stores, or other). A binary indicator of financial buffer capacity. Drawn from the LSMS-ISA finance and savings module, the FAO RIMA-II Access to Basic Services and Social Safety Nets (ABS/SSN) pillars, and the CGAP financial inclusion core indicators. The `prefer_not_to_answer` option is retained given high sensitivity and enumerator observations that savings questions often trigger refusal.", "es": "Si el hogar actualmente tiene alguna forma de ahorros (efectivo, cuenta bancaria, dinero m\u00f3vil, grupo de ahorro, reservas en especie u otro). Indicador binario de capacidad de amortiguaci\u00f3n financiera. Tomado del m\u00f3dulo de finanzas y ahorros LSMS-ISA, los pilares Acceso a Servicios B\u00e1sicos y Redes de Protecci\u00f3n Social (ABS/SSN) de FAO RIMA-II y los indicadores b\u00e1sicos de inclusi\u00f3n financiera del CGAP. La opci\u00f3n `prefer_not_to_answer` se conserva dada la alta sensibilidad y las observaciones de los encuestadores de que las preguntas sobre ahorros suelen provocar rechazo.", "fr": "Si le m\u00e9nage dispose actuellement d''une forme quelconque d''\u00e9pargne (liquidit\u00e9s, compte bancaire, monnaie mobile, groupe d''\u00e9pargne, stocks en nature ou autre). Indicateur binaire de capacit\u00e9 tampon financi\u00e8re. Tir\u00e9 du module finances et \u00e9pargne LSMS-ISA, des piliers Acc\u00e8s aux services de base et Filets de s\u00e9curit\u00e9 sociale (ABS/SSN) de FAO RIMA-II et des indicateurs de base d''inclusion financi\u00e8re du CGAP. L''option `prefer_not_to_answer` est conserv\u00e9e en raison de la sensibilit\u00e9 \u00e9lev\u00e9e et des observations d''enqu\u00eateurs selon lesquelles les questions sur l''\u00e9pargne d\u00e9clenchent souvent un refus."}, "id": "has_savings", "label": {"en": "Household has any savings", "es": "El hogar tiene ahorros", "fr": "Le m\u00e9nage a des \u00e9conomies"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-pnta"}'
