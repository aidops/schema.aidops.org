  fodder_availability:
    title:
      en: Fodder or pasture availability without supplementary purchase or unusual movement — last 30 days
      fr: Disponibilité du fourrage ou des pâturages sans achat supplémentaire ni déplacement inhabituel — 30 derniers jours
      es: Disponibilidad de forraje o pastos sin compra suplementaria ni movimiento inusual — últimos 30 días
    description:
      en: 'Whether there was enough fodder or pasture for the household''s livestock in the last 30 days without having to purchase supplementary fodder or move to unusual grazing areas. Response from vocabulary `yes-no-partial-dk` (yes / no / partially / dont_know). A `no` or `partially` response triggers the companion item `fodder_cost_change` to capture supplementary fodder costs. This item is a rangeland condition proxy when satellite NDVI data are unavailable or when a household-level operational measure is needed alongside the perceptual `rangeland_condition_perception` item. It is pastoral-specific: FoodSecurityProfile and AgricultureProfile have no equivalent. Grounded in LEGS 3rd edition Chapter 4 (supplementary feeding), FSNAU fodder availability item, and FEWSNET livelihoods monitoring (fodder scarcity as early-warning indicator). Recall: last 30 days.'
      fr: 'S''il y avait suffisamment de fourrage ou de pâturage pour le bétail du ménage au cours des 30 derniers jours sans avoir à acheter de fourrage supplémentaire ni à se déplacer vers des zones de pâturage inhabituelles. Réponse dans le vocabulaire `yes-no-partial-dk` (oui / non / partiellement / ne sait pas). Une réponse `no` ou `partially` déclenche l''item associé `fodder_cost_change`. Fondé sur LEGS 3e éd. Chapitre 4, l''item FSNAU sur la disponibilité du fourrage et le suivi des moyens d''existence FEWSNET. Rappel : 30 derniers jours.'
      es: 'Si había suficiente forraje o pastos para el ganado del hogar en los últimos 30 días sin tener que comprar forraje suplementario ni moverse a áreas de pastoreo inusuales. Respuesta del vocabulario `yes-no-partial-dk` (sí / no / parcialmente / no sabe). Una respuesta `no` o `partially` activa el ítem asociado `fodder_cost_change`. Fundamentado en LEGS 3.a ed. Capítulo 4, el ítem de disponibilidad de forraje FSNAU y el monitoreo de medios de vida FEWSNET. Recordatorio: últimos 30 días.'
    slot_uri: aidops:fodder_availability
    range: YesNoPartialDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fao-giews-pastoral-monitoring-2020", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "smart-pastoral-adaptations-2015"], "cardinality": "single", "category": "pastoral_rangeland", "core": true, "definition": {"en": "Whether there was enough fodder or pasture for the household''s livestock in the last 30 days without having to purchase supplementary fodder or move to unusual grazing areas. Response from vocabulary `yes-no-partial-dk` (yes / no / partially / dont_know). A `no` or `partially` response triggers the companion item `fodder_cost_change` to capture supplementary fodder costs. This item is a rangeland condition proxy when satellite NDVI data are unavailable or when a household-level operational measure is needed alongside the perceptual `rangeland_condition_perception` item. It is pastoral-specific: FoodSecurityProfile and AgricultureProfile have no equivalent. Grounded in LEGS 3rd edition Chapter 4 (supplementary feeding), FSNAU fodder availability item, and FEWSNET livelihoods monitoring (fodder scarcity as early-warning indicator). Recall: last 30 days.", "es": "Si hab\u00eda suficiente forraje o pastos para el ganado del hogar en los \u00faltimos 30 d\u00edas sin tener que comprar forraje suplementario ni moverse a \u00e1reas de pastoreo inusuales. Respuesta del vocabulario `yes-no-partial-dk` (s\u00ed / no / parcialmente / no sabe). Una respuesta `no` o `partially` activa el \u00edtem asociado `fodder_cost_change`. Fundamentado en LEGS 3.a ed. Cap\u00edtulo 4, el \u00edtem de disponibilidad de forraje FSNAU y el monitoreo de medios de vida FEWSNET. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "S''il y avait suffisamment de fourrage ou de p\u00e2turage pour le b\u00e9tail du m\u00e9nage au cours des 30 derniers jours sans avoir \u00e0 acheter de fourrage suppl\u00e9mentaire ni \u00e0 se d\u00e9placer vers des zones de p\u00e2turage inhabituelles. R\u00e9ponse dans le vocabulaire `yes-no-partial-dk` (oui / non / partiellement / ne sait pas). Une r\u00e9ponse `no` ou `partially` d\u00e9clenche l''item associ\u00e9 `fodder_cost_change`. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 4, l''item FSNAU sur la disponibilit\u00e9 du fourrage et le suivi des moyens d''existence FEWSNET. Rappel : 30 derniers jours."}, "id": "fodder_availability", "label": {"en": "Fodder or pasture availability without supplementary purchase or unusual movement \u2014 last 30 days", "es": "Disponibilidad de forraje o pastos sin compra suplementaria ni movimiento inusual \u2014 \u00faltimos 30 d\u00edas", "fr": "Disponibilit\u00e9 du fourrage ou des p\u00e2turages sans achat suppl\u00e9mentaire ni d\u00e9placement inhabituel \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-partial-dk"}'
      bibliography_refs: agir-sahel-resilience-framework,fao-giews-pastoral-monitoring-2020,fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,legs-3rd-edition-2023,smart-pastoral-adaptations-2015
  fodder_cost_change:
    title:
      en: Supplementary fodder cost change relative to seasonal baseline — last 30 days
      fr: Variation du coût du fourrage supplémentaire par rapport à la référence saisonnière — 30 derniers jours
      es: Cambio en el costo del forraje suplementario relativo a la línea base estacional — últimos 30 días
    description:
      en: 'Whether the cost of supplementary fodder (hay, straw, commercial feed) purchased by the household in the last 30 days was higher, the same, or lower than the usual price for this time of year. Single-select from vocabulary `cost-change-relative`; includes `not_applicable_did_not_purchase` for households that did not buy supplementary fodder. Applies when `fodder_availability` is `no` or `partially`. This is a pastoral-specific financial coping indicator: when pasture is inadequate, the household''s livestock survival depends on purchased supplementary feed, and the cost of that feed relative to baseline determines whether the household can afford to maintain its herd. Grounded in FEWSNET fodder market monitoring, FSNAU market items, and LEGS 3rd edition (supplementary feeding costs as livelihood impact). `core: false` — recommended for comprehensive seasonal assessments. Recall: last 30 days.'
      fr: 'Si le coût du fourrage supplémentaire (foin, paille, aliments commerciaux) acheté par le ménage au cours des 30 derniers jours était plus élevé, identique ou inférieur au prix habituel à cette période de l''année. Sélection unique dans le vocabulaire `cost-change-relative` ; inclut `not_applicable_did_not_purchase` pour les ménages qui n''ont pas acheté de fourrage supplémentaire. S''applique lorsque `fodder_availability` est `no` ou `partially`. Fondé sur le suivi du marché du fourrage FEWSNET, les items de marché FSNAU et LEGS 3e éd. `core: false`. Rappel : 30 derniers jours.'
      es: 'Si el costo del forraje suplementario (heno, paja, alimento comercial) comprado por el hogar en los últimos 30 días fue mayor, igual o menor que el precio habitual para esta época del año. Selección única del vocabulario `cost-change-relative`; incluye `not_applicable_did_not_purchase` para hogares que no compraron forraje suplementario. Aplica cuando `fodder_availability` es `no` o `partially`. Fundamentado en el monitoreo del mercado de forraje de FEWSNET, ítems de mercado FSNAU y LEGS 3.a ed. `core: false`. Recordatorio: últimos 30 días.'
    slot_uri: aidops:fodder_cost_change
    range: CostChangeRelative
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_rangeland", "core": false, "definition": {"en": "Whether the cost of supplementary fodder (hay, straw, commercial feed) purchased by the household in the last 30 days was higher, the same, or lower than the usual price for this time of year. Single-select from vocabulary `cost-change-relative`; includes `not_applicable_did_not_purchase` for households that did not buy supplementary fodder. Applies when `fodder_availability` is `no` or `partially`. This is a pastoral-specific financial coping indicator: when pasture is inadequate, the household''s livestock survival depends on purchased supplementary feed, and the cost of that feed relative to baseline determines whether the household can afford to maintain its herd. Grounded in FEWSNET fodder market monitoring, FSNAU market items, and LEGS 3rd edition (supplementary feeding costs as livelihood impact). `core: false` \u2014 recommended for comprehensive seasonal assessments. Recall: last 30 days.", "es": "Si el costo del forraje suplementario (heno, paja, alimento comercial) comprado por el hogar en los \u00faltimos 30 d\u00edas fue mayor, igual o menor que el precio habitual para esta \u00e9poca del a\u00f1o. Selecci\u00f3n \u00fanica del vocabulario `cost-change-relative`; incluye `not_applicable_did_not_purchase` para hogares que no compraron forraje suplementario. Aplica cuando `fodder_availability` es `no` o `partially`. Fundamentado en el monitoreo del mercado de forraje de FEWSNET, \u00edtems de mercado FSNAU y LEGS 3.a ed. `core: false`. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "Si le co\u00fbt du fourrage suppl\u00e9mentaire (foin, paille, aliments commerciaux) achet\u00e9 par le m\u00e9nage au cours des 30 derniers jours \u00e9tait plus \u00e9lev\u00e9, identique ou inf\u00e9rieur au prix habituel \u00e0 cette p\u00e9riode de l''ann\u00e9e. S\u00e9lection unique dans le vocabulaire `cost-change-relative` ; inclut `not_applicable_did_not_purchase` pour les m\u00e9nages qui n''ont pas achet\u00e9 de fourrage suppl\u00e9mentaire. S''applique lorsque `fodder_availability` est `no` ou `partially`. Fond\u00e9 sur le suivi du march\u00e9 du fourrage FEWSNET, les items de march\u00e9 FSNAU et LEGS 3e \u00e9d. `core: false`. Rappel : 30 derniers jours."}, "id": "fodder_cost_change", "label": {"en": "Supplementary fodder cost change relative to seasonal baseline \u2014 last 30 days", "es": "Cambio en el costo del forraje suplementario relativo a la l\u00ednea base estacional \u2014 \u00faltimos 30 d\u00edas", "fr": "Variation du co\u00fbt du fourrage suppl\u00e9mentaire par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "cost-change-relative"}'
