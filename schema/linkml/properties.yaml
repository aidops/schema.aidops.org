  hf_staff_nurse_present:
    title:
      en: Qualified nurse on duty today
      fr: Infirmier(ère) qualifié(e) de service aujourd'hui
      es: Personal de enfermería calificado de servicio hoy
    description:
      en: Whether at least one qualified nurse is on duty at the facility on the observation date. 'Qualified' means holding a nationally recognized nursing qualification. Reported and observed. Nurse is the backbone cadre in most LMIC primary facilities; SARA and HHFA include this in health-worker availability tracers.
      fr: Si au moins un(e) infirmier(ère) qualifié(e) est de service à l'établissement à la date d'observation. « Qualifié(e) » signifie titulaire d'une qualification nationalement reconnue en soins infirmiers. Rapporté et observé. L'infirmier(ère) est la cadre de base dans la plupart des établissements primaires des PRFI ; SARA et HHFA l'incluent dans les indicateurs traceurs de disponibilité du personnel de santé.
      es: Si al menos una persona de enfermería calificada está de servicio en el establecimiento en la fecha de observación. «Calificada» significa titular de una cualificación de enfermería reconocida nacionalmente. Reportado y observado. La enfermería es el cuadro base en la mayoría de establecimientos primarios de PIMB; SARA y HHFA lo incluyen en los indicadores trazadores de disponibilidad de personal sanitario.
    slot_uri: aidops:hf_staff_nurse_present
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "governance", "core": true, "definition": {"en": "Whether at least one qualified nurse is on duty at the facility on the observation date. ''Qualified'' means holding a nationally recognized nursing qualification. Reported and observed. Nurse is the backbone cadre in most LMIC primary facilities; SARA and HHFA include this in health-worker availability tracers.", "es": "Si al menos una persona de enfermer\u00eda calificada est\u00e1 de servicio en el establecimiento en la fecha de observaci\u00f3n. \u00abCalificada\u00bb significa titular de una cualificaci\u00f3n de enfermer\u00eda reconocida nacionalmente. Reportado y observado. La enfermer\u00eda es el cuadro base en la mayor\u00eda de establecimientos primarios de PIMB; SARA y HHFA lo incluyen en los indicadores trazadores de disponibilidad de personal sanitario.", "fr": "Si au moins un(e) infirmier(\u00e8re) qualifi\u00e9(e) est de service \u00e0 l''\u00e9tablissement \u00e0 la date d''observation. \u00ab Qualifi\u00e9(e) \u00bb signifie titulaire d''une qualification nationalement reconnue en soins infirmiers. Rapport\u00e9 et observ\u00e9. L''infirmier(\u00e8re) est la cadre de base dans la plupart des \u00e9tablissements primaires des PRFI ; SARA et HHFA l''incluent dans les indicateurs traceurs de disponibilit\u00e9 du personnel de sant\u00e9."}, "id": "hf_staff_nurse_present", "label": {"en": "Qualified nurse on duty today", "es": "Personal de enfermer\u00eda calificado de servicio hoy", "fr": "Infirmier(\u00e8re) qualifi\u00e9(e) de service aujourd''hui"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
