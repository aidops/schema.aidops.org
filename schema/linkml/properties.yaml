  iycf_breastfed_yesterday:
    title:
      en: Breastfed yesterday
      fr: Allaité hier
      es: Amamantado ayer
    description:
      en: 'Whether the child was breastfed yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''Was (NAME) breastfed yesterday during the day or at night?'' This is the numerator item for Exclusive Breastfeeding (EBF, 0–5 months) and Continued Breastfeeding (CBF, 12–23 months). It is also mapped to food group 1 (breastmilk) in the MDD-C food group recall, so iycf_fg_breastmilk is derived from this property rather than asked separately.'
      fr: 'Indique si l''enfant a été allaité hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « (PRÉNOM) a-t-il/elle été allaité(e) hier dans la journée ou la nuit ? » C''est l''item du numérateur pour l''allaitement maternel exclusif (ALM, 0–5 mois) et l''allaitement continu (CBF, 12–23 mois). Il est également associé au groupe alimentaire 1 (lait maternel) dans le rappel des groupes alimentaires MDD-C, de sorte que iycf_fg_breastmilk est dérivé de cette propriété plutôt que demandé séparément.'
      es: 'Indica si el niño fue amamantado ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): ''¿Fue (NOMBRE) amamantado ayer durante el día o la noche?'' Este es el ítem numerador para la Lactancia Materna Exclusiva (LME, 0–5 meses) y la Lactancia Materna Continuada (CBF, 12–23 meses). También se asigna al grupo alimentario 1 (leche materna) en el recordatorio de grupos alimentarios MDD-C, por lo que iycf_fg_breastmilk se deriva de esta propiedad en lugar de preguntarse por separado.'
    slot_uri: aidops:iycf_breastfed_yesterday
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Whether the child was breastfed yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''Was (NAME) breastfed yesterday during the day or at night?'' This is the numerator item for Exclusive Breastfeeding (EBF, 0\u20135 months) and Continued Breastfeeding (CBF, 12\u201323 months). It is also mapped to food group 1 (breastmilk) in the MDD-C food group recall, so iycf_fg_breastmilk is derived from this property rather than asked separately.", "es": "Indica si el ni\u00f1o fue amamantado ayer durante el d\u00eda o la noche (recordatorio de 24 horas). Redacci\u00f3n publicada (OMS/UNICEF 2021): ''\u00bfFue (NOMBRE) amamantado ayer durante el d\u00eda o la noche?'' Este es el \u00edtem numerador para la Lactancia Materna Exclusiva (LME, 0\u20135 meses) y la Lactancia Materna Continuada (CBF, 12\u201323 meses). Tambi\u00e9n se asigna al grupo alimentario 1 (leche materna) en el recordatorio de grupos alimentarios MDD-C, por lo que iycf_fg_breastmilk se deriva de esta propiedad en lugar de preguntarse por separado.", "fr": "Indique si l''enfant a \u00e9t\u00e9 allait\u00e9 hier dans la journ\u00e9e ou la nuit (rappel sur 24 heures). Formulation publi\u00e9e (OMS/UNICEF 2021) : \u00ab (PR\u00c9NOM) a-t-il/elle \u00e9t\u00e9 allait\u00e9(e) hier dans la journ\u00e9e ou la nuit ? \u00bb C''est l''item du num\u00e9rateur pour l''allaitement maternel exclusif (ALM, 0\u20135 mois) et l''allaitement continu (CBF, 12\u201323 mois). Il est \u00e9galement associ\u00e9 au groupe alimentaire 1 (lait maternel) dans le rappel des groupes alimentaires MDD-C, de sorte que iycf_fg_breastmilk est d\u00e9riv\u00e9 de cette propri\u00e9t\u00e9 plut\u00f4t que demand\u00e9 s\u00e9par\u00e9ment."}, "id": "iycf_breastfed_yesterday", "label": {"en": "Breastfed yesterday", "es": "Amamantado ayer", "fr": "Allait\u00e9 hier"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
