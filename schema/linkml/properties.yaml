  cooking_utensils_sufficient:
    title:
      en: Cooking and eating utensils are sufficient
      fr: Ustensiles de cuisine et de repas suffisants
      es: Utensilios de cocina y de comer suficientes
    description:
      en: Household self-report of whether it currently has enough cooking and eating utensils for all members. Self-report proxy complementing the objective count items under Sphere Standard 2. Discordance between this item and the computed sphere_cooking_pass derived score indicates under- or over-reporting of need.
      fr: Auto-déclaration du ménage sur le fait de disposer actuellement d'ustensiles de cuisine et de repas suffisants pour tous les membres. Indicateur auto-déclaré complémentant les items objectifs de dénombrement de la Norme Sphère 2. Une discordance entre cet item et le score dérivé sphere_cooking_pass indique une sous- ou sur-déclaration des besoins.
      es: Auto-reporte del hogar sobre si tiene actualmente utensilios de cocina y de comer suficientes para todos los miembros. Indicador auto-reportado que complementa los ítems objetivos de conteo de la Norma Esfera 2. Una discordancia entre este ítem y el puntaje derivado sphere_cooking_pass indica subreporte o sobrerreporte de necesidades.
    slot_uri: aidops:cooking_utensils_sufficient
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018", "unhcr-nfi-pdm-2025"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Household self-report of whether it currently has enough cooking and eating utensils for all members. Self-report proxy complementing the objective count items under Sphere Standard 2. Discordance between this item and the computed sphere_cooking_pass derived score indicates under- or over-reporting of need.", "es": "Auto-reporte del hogar sobre si tiene actualmente utensilios de cocina y de comer suficientes para todos los miembros. Indicador auto-reportado que complementa los \u00edtems objetivos de conteo de la Norma Esfera 2. Una discordancia entre este \u00edtem y el puntaje derivado sphere_cooking_pass indica subreporte o sobrerreporte de necesidades.", "fr": "Auto-d\u00e9claration du m\u00e9nage sur le fait de disposer actuellement d''ustensiles de cuisine et de repas suffisants pour tous les membres. Indicateur auto-d\u00e9clar\u00e9 compl\u00e9mentant les items objectifs de d\u00e9nombrement de la Norme Sph\u00e8re 2. Une discordance entre cet item et le score d\u00e9riv\u00e9 sphere_cooking_pass indique une sous- ou sur-d\u00e9claration des besoins."}, "id": "cooking_utensils_sufficient", "label": {"en": "Cooking and eating utensils are sufficient", "es": "Utensilios de cocina y de comer suficientes", "fr": "Ustensiles de cuisine et de repas suffisants"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
