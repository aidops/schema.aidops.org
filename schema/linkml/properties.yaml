  hlp_dispute_type:
    title:
      en: HLP dispute type
      fr: Type de litige LTP
      es: Tipo de disputa VTP
    description:
      en: 'The main type of housing, land, or property dispute the household is facing. Asked only when hlp_property_dispute = yes. confiscation_by_armed_actor carries restricted-level enumerator guidance: do not probe for actor names or further details. Based on NRC HLP Handbook (2013) typology; GSC HLP Checklist (2018); Pinheiro Principles (2005) types of HLP rights violations.'
      fr: 'Le type principal de litige de logement, de terres ou de propriété auquel le ménage est confronté. Posée uniquement lorsque hlp_property_dispute = oui. confiscation_by_armed_actor comporte des consignes d''enquêteur de niveau restreint : ne pas chercher à connaître les noms des acteurs armés ni à obtenir plus de détails. Fondé sur la typologie du Manuel HLP du NRC (2013) ; Liste de contrôle HLP du GSC (2018) ; Principes Pinheiro (2005) sur les types de violations des droits LTP.'
      es: 'El tipo principal de disputa de vivienda, tierra o propiedad que enfrenta el hogar. Se pregunta solo cuando hlp_property_dispute = sí. confiscation_by_armed_actor tiene orientación para el encuestador de nivel restringido: no indagar sobre nombres de actores armados ni más detalles. Basado en la tipología del Manual HLP del NRC (2013); Lista de Verificación HLP del GSC (2018); Principios Pinheiro (2005) tipos de violaciones de derechos VTP.'
