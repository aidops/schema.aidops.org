  interview_module_completed_gbv_dv:
    title:
      en: 'GBV/DV module: interview completed'
      fr: 'Module VBG/VD : entretien complété'
      es: 'Módulo VBG/VD: entrevista completada'
    description:
      en: 'Boolean flag indicating whether the GBV Domestic Violence module was completed for this respondent record. False when the module was stopped due to loss of privacy, respondent distress (Tier 2 or 3 distress-response protocol), or other field conditions that prevented completion. False does not indicate that no violence occurred. When false, any partially collected module items should be treated as missing. This property lives in IndividualGBVExperienceProfile rather than in general registration profiles because its access tier is restricted; it identifies which Person records carry GBV DV module data. The subject is the randomly pre-selected woman age 15-49 (one per sampled household) who was eligible for this module. DHS-8 DV module compatible (corresponds to DV31/DV32 interruption tracking). Sensitivity: restricted. Minimum aggregate n=30 before publication.'
      fr: Indicateur booléen indiquant si le module VBG Violence domestique a été complété pour ce dossier de répondante. Faux lorsque le module a été interrompu en raison d'un manque de confidentialité, d'une détresse de la répondante (protocole de niveau 2 ou 3) ou d'autres conditions de terrain. Faux n'indique pas l'absence de violence. Compatible DHS-8 (DV31/DV32).
      es: Indicador booleano que indica si el módulo VBG Violencia doméstica fue completado para este registro de encuestada. Falso cuando el módulo se interrumpió por falta de privacidad, angustia de la encuestada (protocolo nivel 2 o 3) u otras condiciones de campo. Falso no indica ausencia de violencia. Compatible con DHS-8 (DV31/DV32).
    slot_uri: aidops:interview_module_completed_gbv_dv
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022", "ellsberg-heise-2005", "iasc-gbv-guidelines-2015", "who-putting-women-first-2001"], "cardinality": "single", "category": "gbv_module_admin", "core": false, "definition": {"en": "Boolean flag indicating whether the GBV Domestic Violence module was completed for this respondent record. False when the module was stopped due to loss of privacy, respondent distress (Tier 2 or 3 distress-response protocol), or other field conditions that prevented completion. False does not indicate that no violence occurred. When false, any partially collected module items should be treated as missing. This property lives in IndividualGBVExperienceProfile rather than in general registration profiles because its access tier is restricted; it identifies which Person records carry GBV DV module data. The subject is the randomly pre-selected woman age 15-49 (one per sampled household) who was eligible for this module. DHS-8 DV module compatible (corresponds to DV31/DV32 interruption tracking). Sensitivity: restricted. Minimum aggregate n=30 before publication.\n", "es": "Indicador booleano que indica si el m\u00f3dulo VBG Violencia dom\u00e9stica fue completado para este registro de encuestada. Falso cuando el m\u00f3dulo se interrumpi\u00f3 por falta de privacidad, angustia de la encuestada (protocolo nivel 2 o 3) u otras condiciones de campo. Falso no indica ausencia de violencia. Compatible con DHS-8 (DV31/DV32).\n", "fr": "Indicateur bool\u00e9en indiquant si le module VBG Violence domestique a \u00e9t\u00e9 compl\u00e9t\u00e9 pour ce dossier de r\u00e9pondante. Faux lorsque le module a \u00e9t\u00e9 interrompu en raison d''un manque de confidentialit\u00e9, d''une d\u00e9tresse de la r\u00e9pondante (protocole de niveau 2 ou 3) ou d''autres conditions de terrain. Faux n''indique pas l''absence de violence. Compatible DHS-8 (DV31/DV32).\n"}, "id": "interview_module_completed_gbv_dv", "label": {"en": "GBV/DV module: interview completed", "es": "M\u00f3dulo VBG/VD: entrevista completada", "fr": "Module VBG/VD : entretien compl\u00e9t\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "boolean", "vocabulary": null}'
      bibliography_refs: dhs-domestic-violence-module-2022,ellsberg-heise-2005,iasc-gbv-guidelines-2015,who-putting-women-first-2001
  irrigation_access:
    title:
      en: Household has access to irrigation for its agricultural land
      fr: Le ménage a accès à l'irrigation pour ses terres agricoles
      es: El hogar tiene acceso a riego para su tierra agrícola
    description:
      en: Whether the household has access to any form of irrigation for its agricultural land, including canals, pumps, drip irrigation, or harvested rainwater storage. Frames the question as access (structural capacity) rather than use in a specific season, which diverges slightly from FAO WCA 2020 Item 0201 (irrigated land — a use framing). Access is more informative for food-security assessment as a structural indicator, including in drought years when irrigation infrastructure exists but was not needed. `dont_know` is retained as a distinct valid response. Asked only when `hh_has_cultivable_land` is `yes`.
      fr: Si le ménage a accès à une forme d'irrigation pour ses terres agricoles, y compris canaux, pompes, irrigation goutte-à-goutte ou stockage d'eau de pluie récoltée. Formule la question en termes d'accès (capacité structurelle) plutôt que d'utilisation dans une saison spécifique, ce qui diverge légèrement de l'item 0201 du WCA 2020 de la FAO (terres irriguées — formulation basée sur l'utilisation). L'accès est plus informatif pour l'évaluation de la sécurité alimentaire en tant qu'indicateur structurel, y compris les années de sécheresse où l'infrastructure d'irrigation existe mais n'a pas été nécessaire. `dont_know` est conservé comme réponse valide distincte. Posée uniquement lorsque `hh_has_cultivable_land` est `yes`.
      es: Si el hogar tiene acceso a alguna forma de riego para su tierra agrícola, incluidos canales, bombas, riego por goteo o almacenamiento de agua de lluvia recolectada. Enmarca la pregunta como acceso (capacidad estructural) en lugar de uso en una temporada específica, lo que diverge ligeramente del ítem 0201 del WCA 2020 de la FAO (tierra irrigada — enfoque basado en el uso). El acceso es más informativo para la evaluación de seguridad alimentaria como indicador estructural, incluso en años de sequía donde existe la infraestructura de riego pero no fue necesaria. `dont_know` se mantiene como respuesta válida distinta. Se pregunta solo cuando `hh_has_cultivable_land` es `yes`.
    slot_uri: aidops:irrigation_access
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household has access to any form of irrigation for its agricultural land, including canals, pumps, drip irrigation, or harvested rainwater storage. Frames the question as access (structural capacity) rather than use in a specific season, which diverges slightly from FAO WCA 2020 Item 0201 (irrigated land \u2014 a use framing). Access is more informative for food-security assessment as a structural indicator, including in drought years when irrigation infrastructure exists but was not needed. `dont_know` is retained as a distinct valid response. Asked only when `hh_has_cultivable_land` is `yes`.", "es": "Si el hogar tiene acceso a alguna forma de riego para su tierra agr\u00edcola, incluidos canales, bombas, riego por goteo o almacenamiento de agua de lluvia recolectada. Enmarca la pregunta como acceso (capacidad estructural) en lugar de uso en una temporada espec\u00edfica, lo que diverge ligeramente del \u00edtem 0201 del WCA 2020 de la FAO (tierra irrigada \u2014 enfoque basado en el uso). El acceso es m\u00e1s informativo para la evaluaci\u00f3n de seguridad alimentaria como indicador estructural, incluso en a\u00f1os de sequ\u00eda donde existe la infraestructura de riego pero no fue necesaria. `dont_know` se mantiene como respuesta v\u00e1lida distinta. Se pregunta solo cuando `hh_has_cultivable_land` es `yes`.", "fr": "Si le m\u00e9nage a acc\u00e8s \u00e0 une forme d''irrigation pour ses terres agricoles, y compris canaux, pompes, irrigation goutte-\u00e0-goutte ou stockage d''eau de pluie r\u00e9colt\u00e9e. Formule la question en termes d''acc\u00e8s (capacit\u00e9 structurelle) plut\u00f4t que d''utilisation dans une saison sp\u00e9cifique, ce qui diverge l\u00e9g\u00e8rement de l''item 0201 du WCA 2020 de la FAO (terres irrigu\u00e9es \u2014 formulation bas\u00e9e sur l''utilisation). L''acc\u00e8s est plus informatif pour l''\u00e9valuation de la s\u00e9curit\u00e9 alimentaire en tant qu''indicateur structurel, y compris les ann\u00e9es de s\u00e9cheresse o\u00f9 l''infrastructure d''irrigation existe mais n''a pas \u00e9t\u00e9 n\u00e9cessaire. `dont_know` est conserv\u00e9 comme r\u00e9ponse valide distincte. Pos\u00e9e uniquement lorsque `hh_has_cultivable_land` est `yes`."}, "id": "irrigation_access", "label": {"en": "Household has access to irrigation for its agricultural land", "es": "El hogar tiene acceso a riego para su tierra agr\u00edcola", "fr": "Le m\u00e9nage a acc\u00e8s \u00e0 l''irrigation pour ses terres agricoles"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  iycf_age_appropriate_breastfeeding:
    title:
      en: Age-appropriate breastfeeding
      fr: Allaitement adapté à l'âge
      es: Lactancia materna apropiada para la edad
    description:
      en: 'Derived boolean: whether the child is breastfed in an age-appropriate manner. Applies to children 0–23 months. Formula (WHO/UNICEF 2021): children 0–5 months: iycf_ebf = true; children 6–23 months: iycf_breastfed_yesterday = true AND iycf_solid_food_yesterday = true. Age-appropriate breastfeeding represents the combined measure of EBF and continued breastfeeding with complementary foods, computed from existing items without requiring additional questions.'
      fr: 'Booléen dérivé : indique si l''enfant est allaité de manière adaptée à son âge. S''applique aux enfants de 0 à 23 mois. Formule (OMS/UNICEF 2021) : enfants 0–5 mois : iycf_ebf = vrai ; enfants 6–23 mois : iycf_breastfed_yesterday = vrai ET iycf_solid_food_yesterday = vrai. L''allaitement adapté à l''âge représente la mesure combinée de l''ALM et de l''allaitement continu avec des aliments complémentaires, calculée à partir des items existants sans nécessiter de questions supplémentaires.'
      es: 'Booleano derivado: indica si el niño está siendo amamantado de manera apropiada para su edad. Se aplica a niños de 0–23 meses. Fórmula (OMS/UNICEF 2021): niños 0–5 meses: iycf_ebf = verdadero; niños 6–23 meses: iycf_breastfed_yesterday = verdadero Y iycf_solid_food_yesterday = verdadero. La lactancia materna apropiada para la edad representa la medida combinada de LME y lactancia materna continuada con alimentos complementarios, calculada a partir de ítems existentes sin requerir preguntas adicionales.'
    slot_uri: aidops:iycf_age_appropriate_breastfeeding
    range: boolean
    annotations:
