onflit et post-conflit ; dans les contextes sans contamination EE connue, cet item retournera universellement non et un s\u00e9lecteur de module peut le supprimer. Fond\u00e9 sur les Directives EORE IMAS (2022) ; outils d''enqu\u00eate m\u00e9nage EORE UNMAS ; module m\u00e9nage de la Bo\u00eete \u00e0 outils d''\u00e9valuation des actions contre les mines GICHD."}, "id": "eo_contamination_known", "label": {"en": "Explosive ordnance contamination known (household area)", "es": "Contaminaci\u00f3n por artefactos explosivos conocida (zona del hogar)", "fr": "Contamination par engins explosifs connue (zone du m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
