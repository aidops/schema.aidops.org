ficaci\u00f3n familiar satisfecha con m\u00e9todos modernos (derivada)", "fr": "Demande de planification familiale satisfaite par des m\u00e9thodes modernes (d\u00e9riv\u00e9e)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "fp-demand-satisfied"}'
