    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "paul-dutt-2010-cyclone-sidr", "roy-et-al-2015-odisha", "start-network-def", "wmo-mhews-checklist-2018"], "cardinality": "single", "category": "hazard_event", "core": true, "definition": {"en": "How much the respondent trusted the source of the warning. Captured on a four-point Likert scale (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) plus a dont_know code. Applicable only when warning_received is yes. Trust in the issuing authority is a WMO MHEWS pillar-3 prerequisite for action and, in the cyclone warning literature (Bangladesh, Odisha), the single strongest predictor of evacuation compliance. The ''somewhat'' and ''mostly'' levels are analytically distinct for AA program design and should not be collapsed.", "es": "Cu\u00e1nto confi\u00f3 el respondiente en la fuente de la alerta. Capturado en una escala Likert de cuatro puntos (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) m\u00e1s un c\u00f3digo dont_know. Aplicable solo cuando warning_received es s\u00ed. La confianza en la autoridad emisora es un prerrequisito para la acci\u00f3n seg\u00fan el pilar 3 del MHEWS de la OMM y, en la literatura sobre ciclones (Bangladesh, Odisha), el predictor \u00fanico m\u00e1s fuerte del cumplimiento de la evacuaci\u00f3n. Los niveles \u00absomewhat\u00bb y \u00abmostly\u00bb son anal\u00edticamente distintos para el dise\u00f1o de programas de acci\u00f3n anticipatoria y no deben combinarse.", "fr": "Mesure dans laquelle le r\u00e9pondant a fait confiance \u00e0 la source de l''alerte. Capt\u00e9 sur une \u00e9chelle de Likert \u00e0 quatre points (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) plus un code dont_know. Applicable uniquement si warning_received est oui. La confiance dans l''autorit\u00e9 \u00e9mettrice est un pr\u00e9requis \u00e0 l''action selon le pilier 3 du WMO MHEWS, et, dans la litt\u00e9rature cyclonique (Bangladesh, Odisha), le pr\u00e9dicteur unique le plus fort de la conformit\u00e9 \u00e0 l''\u00e9vacuation. Les niveaux \u00ab somewhat \u00bb et \u00ab mostly \u00bb sont analytiquement distincts pour la conception de programmes d''action anticipatoire et ne doivent pas \u00eatre regroup\u00e9s."}, "id": "warning_source_trust", "label": {"en": "Trust in warning source", "es": "Confianza en la fuente de la alerta", "fr": "Confiance dans la source de l''alerte"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": null}'
