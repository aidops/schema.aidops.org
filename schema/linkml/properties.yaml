  primary_electricity_source:
    title:
      en: Primary electricity source
      fr: Source d'électricité principale
      es: Fuente de electricidad principal
    description:
      en: 'The primary source of electricity in the household. Extends the PS boolean electricity_access by identifying the source type (national grid, solar home system, mini-grid, generator, etc.), which is needed to assess the formality and legality dimension of the MTF electricity access tier. The PS electricity_access boolean can be derived from this property: electricity_access is true when this value is anything other than ''none''. Source: MTF household survey; DHS hv206 (binary); MICS6 HC8.'
      fr: 'La source principale d''électricité dans le ménage. Étend le booléen PS electricity_access en identifiant le type de source (réseau national, système solaire domestique, mini-réseau, groupe électrogène, etc.), nécessaire pour évaluer la dimension de formalité et de légalité du niveau d''accès MTF à l''électricité. Le booléen PS electricity_access peut être dérivé de cette propriété : electricity_access est vrai lorsque cette valeur est autre que ''none''. Source : enquête ménage MTF ; DHS hv206 (binaire) ; MICS6 HC8.'
      es: 'La fuente principal de electricidad en el hogar. Extiende el booleano PS electricity_access identificando el tipo de fuente (red nacional, sistema solar doméstico, mini-red, generador, etc.), necesario para evaluar la dimensión de formalidad y legalidad del nivel de acceso MTF a la electricidad. El booleano PS electricity_access puede derivarse de esta propiedad: electricity_access es verdadero cuando este valor es distinto de ''none''. Fuente: encuesta de hogares MTF; DHS hv206 (binario); MICS6 HC8.'
    slot_uri: aidops:primary_electricity_source
    range: ElectricitySource
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": true, "definition": {"en": "The primary source of electricity in the household. Extends the PS boolean electricity_access by identifying the source type (national grid, solar home system, mini-grid, generator, etc.), which is needed to assess the formality and legality dimension of the MTF electricity access tier. The PS electricity_access boolean can be derived from this property: electricity_access is true when this value is anything other than ''none''. Source: MTF household survey; DHS hv206 (binary); MICS6 HC8.", "es": "La fuente principal de electricidad en el hogar. Extiende el booleano PS electricity_access identificando el tipo de fuente (red nacional, sistema solar dom\u00e9stico, mini-red, generador, etc.), necesario para evaluar la dimensi\u00f3n de formalidad y legalidad del nivel de acceso MTF a la electricidad. El booleano PS electricity_access puede derivarse de esta propiedad: electricity_access es verdadero cuando este valor es distinto de ''none''. Fuente: encuesta de hogares MTF; DHS hv206 (binario); MICS6 HC8.", "fr": "La source principale d''\u00e9lectricit\u00e9 dans le m\u00e9nage. \u00c9tend le bool\u00e9en PS electricity_access en identifiant le type de source (r\u00e9seau national, syst\u00e8me solaire domestique, mini-r\u00e9seau, groupe \u00e9lectrog\u00e8ne, etc.), n\u00e9cessaire pour \u00e9valuer la dimension de formalit\u00e9 et de l\u00e9galit\u00e9 du niveau d''acc\u00e8s MTF \u00e0 l''\u00e9lectricit\u00e9. Le bool\u00e9en PS electricity_access peut \u00eatre d\u00e9riv\u00e9 de cette propri\u00e9t\u00e9 : electricity_access est vrai lorsque cette valeur est autre que ''none''. Source : enqu\u00eate m\u00e9nage MTF ; DHS hv206 (binaire) ; MICS6 HC8."}, "id": "primary_electricity_source", "label": {"en": "Primary electricity source", "es": "Fuente de electricidad principal", "fr": "Source d''\u00e9lectricit\u00e9 principale"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["who_world_bank_core_energy", "unicef_mics6", "se4all_mtf"], "vocabulary": "electricity-source"}'
      bibliography_refs: se4all-mtf,who-world-bank-core-energy-questions
  primary_identity_document_status:
    title:
      en: Primary identity document status
      fr: Statut du document d'identité principal
      es: Estado del documento de identidad principal
    description:
      en: The availability and condition of the household head's primary identity document, such as a national identity card or passport, at the time of assessment.
      fr: La disponibilité et l'état du document d'identité principal du chef de ménage, tel qu'une carte nationale d'identité ou un passeport, au moment de l'évaluation.
      es: La disponibilidad y el estado del documento de identidad principal del jefe del hogar, como una cédula de identidad nacional o pasaporte, en el momento de la evaluación.
    slot_uri: aidops:primary_identity_document_status
    range: DocumentStatus
    annotations:
