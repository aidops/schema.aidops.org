  child_feces_disposal:
    title:
      en: Child feces disposal method
      fr: Mode d'élimination des matières fécales des enfants
      es: Método de eliminación de heces de niños
    description:
      en: Method used to dispose of feces of children under 5 years of age. Asked only when there are children under 5 in the household. Safe disposal is depositing into a toilet or latrine (directly or after rinsing). All other methods are classified as unsafe by the JMP. Based on MICS WS16 and DHS hv238.
      fr: Méthode utilisée pour éliminer les matières fécales des enfants de moins de 5 ans. Demandé uniquement s'il y a des enfants de moins de 5 ans dans le ménage. L'élimination sûre consiste à déposer les matières fécales dans des toilettes ou une latrine (directement ou après rinçage). Toutes les autres méthodes sont classées comme non sûres par le JMP. Basé sur MICS WS16 et DHS hv238.
      es: Método usado para eliminar las heces de niños menores de 5 años. Preguntado solo cuando hay niños menores de 5 años en el hogar. La eliminación segura es depositar las heces en un inodoro o letrina (directamente o después de enjuagar). Todos los demás métodos son clasificados como inseguros por el JMP. Basado en MICS WS16 y DHS hv238.
    slot_uri: aidops:child_feces_disposal
    range: ChildFecesDisposal
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "sanitation", "core": true, "definition": {"en": "Method used to dispose of feces of children under 5 years of age. Asked only when there are children under 5 in the household. Safe disposal is depositing into a toilet or latrine (directly or after rinsing). All other methods are classified as unsafe by the JMP. Based on MICS WS16 and DHS hv238.", "es": "M\u00e9todo usado para eliminar las heces de ni\u00f1os menores de 5 a\u00f1os. Preguntado solo cuando hay ni\u00f1os menores de 5 a\u00f1os en el hogar. La eliminaci\u00f3n segura es depositar las heces en un inodoro o letrina (directamente o despu\u00e9s de enjuagar). Todos los dem\u00e1s m\u00e9todos son clasificados como inseguros por el JMP. Basado en MICS WS16 y DHS hv238.", "fr": "M\u00e9thode utilis\u00e9e pour \u00e9liminer les mati\u00e8res f\u00e9cales des enfants de moins de 5 ans. Demand\u00e9 uniquement s''il y a des enfants de moins de 5 ans dans le m\u00e9nage. L''\u00e9limination s\u00fbre consiste \u00e0 d\u00e9poser les mati\u00e8res f\u00e9cales dans des toilettes ou une latrine (directement ou apr\u00e8s rin\u00e7age). Toutes les autres m\u00e9thodes sont class\u00e9es comme non s\u00fbres par le JMP. Bas\u00e9 sur MICS WS16 et DHS hv238."}, "id": "child_feces_disposal", "label": {"en": "Child feces disposal method", "es": "M\u00e9todo de eliminaci\u00f3n de heces de ni\u00f1os", "fr": "Mode d''\u00e9limination des mati\u00e8res f\u00e9cales des enfants"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey", "mics6", "mics7", "dhs_8"], "vocabulary": "child-feces-disposal"}'
