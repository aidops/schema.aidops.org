  handwashing_at_critical_junctures:
    title:
      en: Handwashing at critical junctures (self-reported)
      fr: Lavage des mains aux moments critiques (auto-déclaré)
      es: Lavado de manos en momentos críticos (autodeclarado)
    description:
      en: Self-reported moments at which household members wash their hands, based on WHO/UNICEF five critical junctures. Multi-select. This is a softer indicator than the observed soap and water availability questions (H2 and H3) and is subject to social desirability bias; respondents may over-report hand-washing frequency. Used for hygiene knowledge, attitudes, and practices (KAP) analysis rather than for JMP service level determination.
      fr: Moments auto-déclarés auxquels les membres du ménage se lavent les mains, basés sur les cinq moments critiques OMS/UNICEF. Sélection multiple. Il s'agit d'un indicateur moins fiable que les questions de disponibilité observée de savon et d'eau (H2 et H3) et est sujet au biais de désirabilité sociale ; les répondants peuvent sur-déclarer la fréquence de lavage des mains. Utilisé pour l'analyse des connaissances, attitudes et pratiques (CAP) en matière d'hygiène plutôt que pour la détermination du niveau de service JMP.
      es: Momentos autodeclarados en que los miembros del hogar se lavan las manos, basados en los cinco momentos críticos de la OMS/UNICEF. Selección múltiple. Es un indicador más débil que las preguntas de disponibilidad observada de jabón y agua (H2 y H3) y está sujeto a sesgo de deseabilidad social; los encuestados pueden sobrenotificar la frecuencia de lavado de manos. Usado para el análisis de conocimientos, actitudes y prácticas (CAP) de higiene en lugar de para la determinación del nivel de servicio JMP.
    slot_uri: aidops:handwashing_at_critical_junctures
    range: HandwashingCriticalJuncture
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "multiple", "category": "hygiene", "core": false, "definition": {"en": "Self-reported moments at which household members wash their hands, based on WHO/UNICEF five critical junctures. Multi-select. This is a softer indicator than the observed soap and water availability questions (H2 and H3) and is subject to social desirability bias; respondents may over-report hand-washing frequency. Used for hygiene knowledge, attitudes, and practices (KAP) analysis rather than for JMP service level determination.", "es": "Momentos autodeclarados en que los miembros del hogar se lavan las manos, basados en los cinco momentos cr\u00edticos de la OMS/UNICEF. Selecci\u00f3n m\u00faltiple. Es un indicador m\u00e1s d\u00e9bil que las preguntas de disponibilidad observada de jab\u00f3n y agua (H2 y H3) y est\u00e1 sujeto a sesgo de deseabilidad social; los encuestados pueden sobrenotificar la frecuencia de lavado de manos. Usado para el an\u00e1lisis de conocimientos, actitudes y pr\u00e1cticas (CAP) de higiene en lugar de para la determinaci\u00f3n del nivel de servicio JMP.", "fr": "Moments auto-d\u00e9clar\u00e9s auxquels les membres du m\u00e9nage se lavent les mains, bas\u00e9s sur les cinq moments critiques OMS/UNICEF. S\u00e9lection multiple. Il s''agit d''un indicateur moins fiable que les questions de disponibilit\u00e9 observ\u00e9e de savon et d''eau (H2 et H3) et est sujet au biais de d\u00e9sirabilit\u00e9 sociale ; les r\u00e9pondants peuvent sur-d\u00e9clarer la fr\u00e9quence de lavage des mains. Utilis\u00e9 pour l''analyse des connaissances, attitudes et pratiques (CAP) en mati\u00e8re d''hygi\u00e8ne plut\u00f4t que pour la d\u00e9termination du niveau de service JMP."}, "id": "handwashing_at_critical_junctures", "label": {"en": "Handwashing at critical junctures (self-reported)", "es": "Lavado de manos en momentos cr\u00edticos (autodeclarado)", "fr": "Lavage des mains aux moments critiques (auto-d\u00e9clar\u00e9)"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey", "erwg_wash_hh"], "vocabulary": "handwashing-critical-juncture"}'
