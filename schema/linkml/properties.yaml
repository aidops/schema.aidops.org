  hf_service_bemonc:
    title:
      en: Provides Basic Emergency Obstetric and Newborn Care (BEmONC)
      fr: Fournit les soins obstétriques et néonatals d'urgence de base (SONU-B)
      es: Presta Cuidados Obstétricos y Neonatales de Emergencia Básicos (COEmB)
    description:
      en: 'Whether the facility provides the seven WHO BEmONC signal functions: parenteral antibiotics, uterotonics, anticonvulsants, manual removal of placenta, assisted vaginal delivery, newborn resuscitation, and manual removal of retained products of conception. Three-level response: `yes` (all seven within the past 3 months), `partial` (some but not all), `no` (none of the signal functions performed). Ask only at facilities where `hf_service_delivery` is true. MISP Objective 4 tracer; WHO EmONC signal-function methodology.'
      fr: 'Si l''établissement fournit les sept fonctions signal SONU-B de l''OMS : antibiotiques parentéraux, utérotoniques, anticonvulsivants, délivrance artificielle, accouchement vaginal assisté, réanimation du nouveau-né et aspiration manuelle des produits de conception retenus. Réponse à trois niveaux : `yes` (les sept au cours des 3 derniers mois), `partial` (certaines mais pas toutes), `no` (aucune fonction signal effectuée). Ne poser qu''aux établissements où `hf_service_delivery` est vrai. Indicateur traceur MISP Objectif 4 ; méthodologie des fonctions signal SONU de l''OMS.'
      es: 'Si el establecimiento presta las siete funciones señal COEmB de la OMS: antibióticos parenterales, uterotónicos, anticonvulsivantes, extracción manual de placenta, parto vaginal asistido, reanimación neonatal y extracción manual de productos retenidos de la concepción. Respuesta de tres niveles: `yes` (las siete en los últimos 3 meses), `partial` (algunas pero no todas), `no` (ninguna función señal realizada). Preguntar solo en establecimientos donde `hf_service_delivery` es verdadero. Indicador trazador MISP Objetivo 4; metodología de funciones señal COE de la OMS.'
    slot_uri: aidops:hf_service_bemonc
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "classification", "core": true, "definition": {"en": "Whether the facility provides the seven WHO BEmONC signal functions: parenteral antibiotics, uterotonics, anticonvulsants, manual removal of placenta, assisted vaginal delivery, newborn resuscitation, and manual removal of retained products of conception. Three-level response: `yes` (all seven within the past 3 months), `partial` (some but not all), `no` (none of the signal functions performed). Ask only at facilities where `hf_service_delivery` is true. MISP Objective 4 tracer; WHO EmONC signal-function methodology.", "es": "Si el establecimiento presta las siete funciones se\u00f1al COEmB de la OMS: antibi\u00f3ticos parenterales, uterot\u00f3nicos, anticonvulsivantes, extracci\u00f3n manual de placenta, parto vaginal asistido, reanimaci\u00f3n neonatal y extracci\u00f3n manual de productos retenidos de la concepci\u00f3n. Respuesta de tres niveles: `yes` (las siete en los \u00faltimos 3 meses), `partial` (algunas pero no todas), `no` (ninguna funci\u00f3n se\u00f1al realizada). Preguntar solo en establecimientos donde `hf_service_delivery` es verdadero. Indicador trazador MISP Objetivo 4; metodolog\u00eda de funciones se\u00f1al COE de la OMS.", "fr": "Si l''\u00e9tablissement fournit les sept fonctions signal SONU-B de l''OMS : antibiotiques parent\u00e9raux, ut\u00e9rotoniques, anticonvulsivants, d\u00e9livrance artificielle, accouchement vaginal assist\u00e9, r\u00e9animation du nouveau-n\u00e9 et aspiration manuelle des produits de conception retenus. R\u00e9ponse \u00e0 trois niveaux : `yes` (les sept au cours des 3 derniers mois), `partial` (certaines mais pas toutes), `no` (aucune fonction signal effectu\u00e9e). Ne poser qu''aux \u00e9tablissements o\u00f9 `hf_service_delivery` est vrai. Indicateur traceur MISP Objectif 4 ; m\u00e9thodologie des fonctions signal SONU de l''OMS."}, "id": "hf_service_bemonc", "label": {"en": "Provides Basic Emergency Obstetric and Newborn Care (BEmONC)", "es": "Presta Cuidados Obst\u00e9tricos y Neonatales de Emergencia B\u00e1sicos (COEmB)", "fr": "Fournit les soins obst\u00e9triques et n\u00e9onatals d''urgence de base (SONU-B)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
  hf_service_cemonc:
    title:
      en: Provides Comprehensive Emergency Obstetric and Newborn Care (CEmONC)
      fr: Fournit les soins obstétriques et néonatals d'urgence complets (SONU-C)
      es: Presta Cuidados Obstétricos y Neonatales de Emergencia Integrales (COEmI)
    description:
      en: 'Whether the facility provides Comprehensive Emergency Obstetric and Newborn Care: all seven BEmONC signal functions plus cesarean section and blood transfusion. Reported by the facility in-charge. Ask only at hospitals or other IPD-capable facilities. MISP; WHO EmONC signal-function methodology. Extended (non-core).'
      fr: 'Si l''établissement fournit les soins obstétriques et néonatals d''urgence complets : les sept fonctions signal SONU-B plus la césarienne et la transfusion sanguine. Rapporté par le responsable de l''établissement. Ne poser qu''aux hôpitaux ou autres établissements disposant d''IPD. MISP ; méthodologie des fonctions signal SONU de l''OMS. Étendu (non-core).'
      es: 'Si el establecimiento presta los cuidados obstétricos y neonatales de emergencia integrales: las siete funciones señal COEmB más cesárea y transfusión sanguínea. Reportado por el responsable del establecimiento. Preguntar solo en hospitales u otros establecimientos con capacidad IPD. MISP; metodología de funciones señal COE de la OMS. Extendido (no-core).'
    slot_uri: aidops:hf_service_cemonc
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "classification", "core": false, "definition": {"en": "Whether the facility provides Comprehensive Emergency Obstetric and Newborn Care: all seven BEmONC signal functions plus cesarean section and blood transfusion. Reported by the facility in-charge. Ask only at hospitals or other IPD-capable facilities. MISP; WHO EmONC signal-function methodology. Extended (non-core).", "es": "Si el establecimiento presta los cuidados obst\u00e9tricos y neonatales de emergencia integrales: las siete funciones se\u00f1al COEmB m\u00e1s ces\u00e1rea y transfusi\u00f3n sangu\u00ednea. Reportado por el responsable del establecimiento. Preguntar solo en hospitales u otros establecimientos con capacidad IPD. MISP; metodolog\u00eda de funciones se\u00f1al COE de la OMS. Extendido (no-core).", "fr": "Si l''\u00e9tablissement fournit les soins obst\u00e9triques et n\u00e9onatals d''urgence complets : les sept fonctions signal SONU-B plus la c\u00e9sarienne et la transfusion sanguine. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Ne poser qu''aux h\u00f4pitaux ou autres \u00e9tablissements disposant d''IPD. MISP ; m\u00e9thodologie des fonctions signal SONU de l''OMS. \u00c9tendu (non-core)."}, "id": "hf_service_cemonc", "label": {"en": "Provides Comprehensive Emergency Obstetric and Newborn Care (CEmONC)", "es": "Presta Cuidados Obst\u00e9tricos y Neonatales de Emergencia Integrales (COEmI)", "fr": "Fournit les soins obst\u00e9triques et n\u00e9onatals d''urgence complets (SONU-C)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
  hf_service_child_curative:
