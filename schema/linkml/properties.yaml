  mosquito_net_count:
    title:
      en: Number of insecticide-treated mosquito nets
      fr: Nombre de moustiquaires imprégnées d'insecticide
      es: Número de mosquiteros tratados con insecticida
    description:
      en: 'Count of insecticide-treated mosquito nets (ITNs or LLINs) currently held by the household. Collected only in malaria-endemic or mosquito-borne-disease contexts; omitted in non-endemic settings via deployment-level configuration. Sphere Standard 1: access to long-lasting insecticide-treated bed nets where needed. UNHCR CRI: listed as a defined core relief item.'
      fr: 'Nombre de moustiquaires imprégnées d''insecticide (MII ou MIILDA) actuellement détenues par le ménage. Collecté uniquement dans les contextes d''endémie palustre ou des maladies à transmission vectorielle ; omis dans les contextes non endémiques via la configuration au niveau du déploiement. Norme Sphère 1 : accès aux moustiquaires imprégnées d''insecticide à longue durée d''action lorsque nécessaire. HCR CRI : listé comme un article de secours essentiel défini.'
      es: 'Cuenta de mosquiteros tratados con insecticida (MTI o MILD) que tiene actualmente el hogar. Recopilado solo en contextos de paludismo endémico o enfermedades transmitidas por mosquitos; omitido en entornos no endémicos mediante la configuración a nivel del despliegue. Norma Esfera 1: acceso a mosquiteros tratados con insecticida de larga duración donde sean necesarios. ACNUR CRI: listado como un artículo central de socorro definido.'
    slot_uri: aidops:mosquito_net_count
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "nfi", "core": false, "definition": {"en": "Count of insecticide-treated mosquito nets (ITNs or LLINs) currently held by the household. Collected only in malaria-endemic or mosquito-borne-disease contexts; omitted in non-endemic settings via deployment-level configuration. Sphere Standard 1: access to long-lasting insecticide-treated bed nets where needed. UNHCR CRI: listed as a defined core relief item.", "es": "Cuenta de mosquiteros tratados con insecticida (MTI o MILD) que tiene actualmente el hogar. Recopilado solo en contextos de paludismo end\u00e9mico o enfermedades transmitidas por mosquitos; omitido en entornos no end\u00e9micos mediante la configuraci\u00f3n a nivel del despliegue. Norma Esfera 1: acceso a mosquiteros tratados con insecticida de larga duraci\u00f3n donde sean necesarios. ACNUR CRI: listado como un art\u00edculo central de socorro definido.", "fr": "Nombre de moustiquaires impr\u00e9gn\u00e9es d''insecticide (MII ou MIILDA) actuellement d\u00e9tenues par le m\u00e9nage. Collect\u00e9 uniquement dans les contextes d''end\u00e9mie palustre ou des maladies \u00e0 transmission vectorielle ; omis dans les contextes non end\u00e9miques via la configuration au niveau du d\u00e9ploiement. Norme Sph\u00e8re 1 : acc\u00e8s aux moustiquaires impr\u00e9gn\u00e9es d''insecticide \u00e0 longue dur\u00e9e d''action lorsque n\u00e9cessaire. HCR CRI : list\u00e9 comme un article de secours essentiel d\u00e9fini."}, "id": "mosquito_net_count", "label": {"en": "Number of insecticide-treated mosquito nets", "es": "N\u00famero de mosquiteros tratados con insecticida", "fr": "Nombre de moustiquaires impr\u00e9gn\u00e9es d''insecticide"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
