  migration_route_disruption_cause:
    title:
      en: Primary cause of seasonal migration route disruption
      fr: Cause principale de la perturbation de la route de migration saisonnière
      es: Causa principal de la interrupción de la ruta de migración estacional
    description:
      en: 'The primary reason the household''s seasonal migration route was disrupted. Single-select from vocabulary `migration-route-disruption`. Applies when `migration_routes_disrupted` is `yes` or `partially`. Sensitivity: this item is sensitive. Conflict-related cause codes (`conflict_armed_group`, `inter_community_conflict`) are the primary drivers of route disruption in Horn of Africa and Sahel contexts; responses naming specific armed actors or contested routes constitute conflict-actor intelligence. The vocabulary deliberately does not ask respondents to name actors — only to categorize the cause — but even categorical responses carry intelligence risk at fine geographic granularity. Required mitigations: (1) aggregate to livelihood-zone level before sharing with any non-humanitarian partner; (2) do not cross-tabulate with GPS interview location; (3) enumerator instruction: skip this item if interviewer assesses that the respondent is under observation or in immediate vicinity of armed actors. `core: false` — the cause follow-up is recommended for comprehensive assessments where it is safe to collect; the binary disruption flag (`migration_routes_disrupted`) is the core item.'
      fr: 'La raison principale de la perturbation de la route de migration saisonnière du ménage. Sélection unique dans le vocabulaire `migration-route-disruption`. S''applique lorsque `migration_routes_disrupted` est `yes` ou `partially`. Sensibilité : cet item est SENSIBLE. Les codes de cause liés au conflit (`conflict_armed_group`, `inter_community_conflict`) sont les principaux moteurs de perturbation des routes ; agréger au niveau de la zone de moyens d''existence avant tout partage. Instruction énumérateur : ignorer cet item si le répondant est sous observation ou à proximité immédiate d''acteurs armés. `core: false`.'
      es: 'La razón principal por la que la ruta de migración estacional del hogar fue interrumpida. Selección única del vocabulario `migration-route-disruption`. Aplica cuando `migration_routes_disrupted` es `yes` o `partially`. Sensibilidad: este ítem es SENSIBLE. Los códigos de causa relacionados con conflictos (`conflict_armed_group`, `inter_community_conflict`) son los principales impulsores de interrupciones de rutas; agregar al nivel de zona de medios de vida antes de compartir. Instrucción al enumerador: omitir este ítem si el encuestado está bajo observación o en proximidad inmediata de actores armados. `core: false`.'
