nd", "label": {"en": "LCS band", "es": "Nivel EMV", "fr": "Niveau SCM"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["wfp_lcs", "wfp_cari"], "vocabulary": "lcs-band"}'
