u famille, r\u00e9seaux sociaux, journal ou affiche, autre)."}, "id": "warning_channel_primary", "label": {"en": "Primary warning channel", "es": "Canal principal de la alerta", "fr": "Canal principal de l''alerte"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-channel"}'
