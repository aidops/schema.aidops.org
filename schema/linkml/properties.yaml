    title:
      en: Monthly water payment (local currency)
      fr: Paiement mensuel pour l'eau (monnaie locale)
      es: Pago mensual por agua (moneda local)
    description:
      en: Approximate amount the household pays per month for its main drinking water source, in local currency units. Asked only when water_payment is true. Currency unit should be recorded in the assessment notes. Used for affordability and cost-of-service analysis.
