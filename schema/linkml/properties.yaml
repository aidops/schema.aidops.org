que sur ce profil. Utilis\u00e9 par les \u00e9valuations FbF pour d\u00e9terminer si l''exposition \u00e0 l''action anticipatoire a influenc\u00e9 la r\u00e9ponse subs\u00e9quente \u00e0 l''alerte."}, "id": "received_prior_aa_support", "label": {"en": "Received prior anticipatory action support", "es": "Recibi\u00f3 apoyo anticipatorio previo", "fr": "A re\u00e7u un soutien anticipatoire pr\u00e9alable"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "yes-no-dk"}'
