  linked_child_person_id:
    title:
      en: Linked child Person ID
      fr: Identifiant de la personne enfant lié
      es: ID de persona del niño vinculado
    description:
      en: An optional reference to the Person record for the index child (the most recent live birth). When the same interview session produces both a MaternalNewbornHealthProfile and a ChildHealthProfile or NutritionPracticesProfile for the same birth event, this field links the maternal record to the child record without re-collecting birth date or outcome. The value is the child's person identifier string from the data collection system.
      fr: Une référence facultative à l'enregistrement Personne pour l'enfant index (la naissance vivante la plus récente). Lorsque la même session d'entretien produit à la fois un MaternalNewbornHealthProfile et un ChildHealthProfile ou NutritionPracticesProfile pour le même événement de naissance, ce champ relie l'enregistrement maternel à l'enregistrement enfant sans recollecte de la date de naissance ou du résultat. La valeur est la chaîne d'identification de personne de l'enfant dans le système de collecte de données.
      es: Una referencia opcional al registro de Persona del niño índice (el nacimiento vivo más reciente). Cuando la misma sesión de entrevista produce tanto un MaternalNewbornHealthProfile como un ChildHealthProfile o NutritionPracticesProfile para el mismo evento de parto, este campo vincula el registro materno con el registro del niño sin recopilar nuevamente la fecha de nacimiento o el resultado. El valor es la cadena de identificador de persona del niño en el sistema de recolección de datos.
    slot_uri: aidops:linked_child_person_id
    range: string
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "cardinality": "single", "category": "pregnancy_history", "core": false, "definition": {"en": "An optional reference to the Person record for the index child (the most recent live birth). When the same interview session produces both a MaternalNewbornHealthProfile and a ChildHealthProfile or NutritionPracticesProfile for the same birth event, this field links the maternal record to the child record without re-collecting birth date or outcome. The value is the child''s person identifier string from the data collection system.", "es": "Una referencia opcional al registro de Persona del ni\u00f1o \u00edndice (el nacimiento vivo m\u00e1s reciente). Cuando la misma sesi\u00f3n de entrevista produce tanto un MaternalNewbornHealthProfile como un ChildHealthProfile o NutritionPracticesProfile para el mismo evento de parto, este campo vincula el registro materno con el registro del ni\u00f1o sin recopilar nuevamente la fecha de nacimiento o el resultado. El valor es la cadena de identificador de persona del ni\u00f1o en el sistema de recolecci\u00f3n de datos.", "fr": "Une r\u00e9f\u00e9rence facultative \u00e0 l''enregistrement Personne pour l''enfant index (la naissance vivante la plus r\u00e9cente). Lorsque la m\u00eame session d''entretien produit \u00e0 la fois un MaternalNewbornHealthProfile et un ChildHealthProfile ou NutritionPracticesProfile pour le m\u00eame \u00e9v\u00e9nement de naissance, ce champ relie l''enregistrement maternel \u00e0 l''enregistrement enfant sans recollecte de la date de naissance ou du r\u00e9sultat. La valeur est la cha\u00eene d''identification de personne de l''enfant dans le syst\u00e8me de collecte de donn\u00e9es."}, "id": "linked_child_person_id", "label": {"en": "Linked child Person ID", "es": "ID de persona del ni\u00f1o vinculado", "fr": "Identifiant de la personne enfant li\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
  livelihood_change_since_crisis:
    title:
      en: Livelihood change since crisis or displacement
      fr: Changement de subsistance depuis la crise ou le déplacement
      es: Cambio en los medios de vida desde la crisis o desplazamiento
    description:
      en: How the household's primary livelihood activity has changed since a crisis or displacement event (form-level reference date). Asked only when the household has experienced displacement or shock (programme-level flag). Drawn from the LSMS-ISA livelihood change modules, the IOM DTM Multi-Sectoral Location Assessment livelihood change component, and the Sphere 2018 Livelihoods chapter on crisis-disrupted livelihoods.
      fr: Comment l'activité principale de subsistance du ménage a changé depuis une crise ou un événement de déplacement (date de référence au niveau du formulaire). Posé uniquement lorsque le ménage a subi un déplacement ou un choc (signal au niveau du programme). Tiré des modules de changement de moyens de subsistance LSMS-ISA, de la composante changement de moyens de subsistance de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM et du chapitre Moyens de subsistance de Sphère 2018 sur les moyens de subsistance perturbés par la crise.
      es: Cómo ha cambiado la actividad principal de subsistencia del hogar desde una crisis o un evento de desplazamiento (fecha de referencia a nivel del formulario). Se pregunta solo cuando el hogar ha experimentado desplazamiento o choque (marca a nivel del programa). Tomado de los módulos de cambio de medios de vida LSMS-ISA, el componente de cambio de medios de vida de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM y el capítulo de Medios de Vida de Esfera 2018 sobre medios de vida interrumpidos por crisis.
