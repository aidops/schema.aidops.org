    range: OccupancyArrangement
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iom-dtm-shelter-companion"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "The legal or social arrangement under which the household currently occupies its shelter, capturing whether the household owns, rents, is hosted, squats informally, or occupies through a programme. Informs housing, land and property (HLP) protection analysis and Sphere Standard 6 security-of-tenure assessment.", "es": "El arreglo legal o social bajo el cual el hogar ocupa actualmente su refugio, capturando si el hogar es propietario, arrendatario, est\u00e1 alojado, ocupa informalmente o lo hace a trav\u00e9s de un programa. Informa el an\u00e1lisis de protecci\u00f3n de vivienda, tierra y propiedad (VTP) y la evaluaci\u00f3n de seguridad de tenencia de la Norma Esfera 6.", "fr": "L''arrangement l\u00e9gal ou social sous lequel le m\u00e9nage occupe actuellement son abri, indiquant si le m\u00e9nage est propri\u00e9taire, locataire, h\u00e9berg\u00e9, squatte informellement ou occupe dans le cadre d''un programme. Informe l''analyse de protection du logement, des terres et de la propri\u00e9t\u00e9 (LTP) et l''\u00e9valuation de la s\u00e9curit\u00e9 d''occupation de la Norme Sph\u00e8re 6."}, "id": "occupancy_arrangement", "label": {"en": "Occupancy arrangement", "es": "Arreglo de ocupaci\u00f3n", "fr": "Arrangement d''occupation"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "unhcr_nare", "gsc_standardised"], "vocabulary": "occupancy-arrangement"}'
