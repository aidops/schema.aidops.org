  insurance_practical_access:
    title:
      en: Insurance coverage translates into practical access to care
      fr: La couverture d'assurance se traduit par un accès effectif aux soins
      es: La cobertura del seguro se traduce en acceso efectivo a la atención
    description:
      en: Whether holding health insurance actually lets covered household members use care when needed, rated on a three-level plus don't know scale (`insurance-practical-access`). Captures the 'effective coverage' gap documented in humanitarian settings where nominal insurance does not guarantee reimbursement or facility acceptance. Ask only if `any_hh_member_insured` is `yes`.
      fr: Si le fait de disposer d'une assurance maladie permet effectivement aux membres couverts du ménage d'utiliser les soins lorsqu'ils en ont besoin, évalué sur une échelle à trois niveaux plus « ne sait pas » (`insurance-practical-access`). Saisit l'écart de « couverture effective » documenté dans les contextes humanitaires, où l'assurance nominale ne garantit ni le remboursement ni l'acceptation par les établissements. Ne poser que si `any_hh_member_insured` est `yes`.
      es: Si tener seguro de salud efectivamente permite a los miembros cubiertos del hogar usar atención cuando la necesitan, calificado en una escala de tres niveles más 'no sabe' (`insurance-practical-access`). Capta la brecha de 'cobertura efectiva' documentada en contextos humanitarios, donde el seguro nominal no garantiza reembolso ni aceptación por parte de los establecimientos. Preguntar solo si `any_hh_member_insured` es `yes`.
    slot_uri: aidops:insurance_practical_access
    range: InsurancePracticalAccess
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-health-insurance-as45"], "cardinality": "single", "category": "health_access_insurance", "core": false, "definition": {"en": "Whether holding health insurance actually lets covered household members use care when needed, rated on a three-level plus don''t know scale (`insurance-practical-access`). Captures the ''effective coverage'' gap documented in humanitarian settings where nominal insurance does not guarantee reimbursement or facility acceptance. Ask only if `any_hh_member_insured` is `yes`.", "es": "Si tener seguro de salud efectivamente permite a los miembros cubiertos del hogar usar atenci\u00f3n cuando la necesitan, calificado en una escala de tres niveles m\u00e1s ''no sabe'' (`insurance-practical-access`). Capta la brecha de ''cobertura efectiva'' documentada en contextos humanitarios, donde el seguro nominal no garantiza reembolso ni aceptaci\u00f3n por parte de los establecimientos. Preguntar solo si `any_hh_member_insured` es `yes`.", "fr": "Si le fait de disposer d''une assurance maladie permet effectivement aux membres couverts du m\u00e9nage d''utiliser les soins lorsqu''ils en ont besoin, \u00e9valu\u00e9 sur une \u00e9chelle \u00e0 trois niveaux plus \u00ab ne sait pas \u00bb (`insurance-practical-access`). Saisit l''\u00e9cart de \u00ab couverture effective \u00bb document\u00e9 dans les contextes humanitaires, o\u00f9 l''assurance nominale ne garantit ni le remboursement ni l''acceptation par les \u00e9tablissements. Ne poser que si `any_hh_member_insured` est `yes`."}, "id": "insurance_practical_access", "label": {"en": "Insurance coverage translates into practical access to care", "es": "La cobertura del seguro se traduce en acceso efectivo a la atenci\u00f3n", "fr": "La couverture d''assurance se traduit par un acc\u00e8s effectif aux soins"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "insurance-practical-access"}'
