  fcs_consumption_group:
    title:
      en: FCS consumption group
      fr: Groupe de consommation FCS
      es: Grupo de consumo FCS
    description:
      en: 'The food consumption group derived from fcs_score using WFP-published thresholds. Both the standard set (21/35) and the high-sugar/high-oil set (28/42) are WFP-canonical and valid for this field. Use ScoringEvent only for thresholds not published by WFP (national adaptations, researcher-defined cutoffs). Standard thresholds: poor (0-21), borderline (21.5-35), acceptable (> 35). Adjusted thresholds for high-sugar/high-oil contexts: poor (0-28), borderline (28.5-42), acceptable (> 42).'
      fr: 'Le groupe de consommation alimentaire dérivé du fcs_score selon les seuils publiés par le PAM. Les seuils standard (21/35) et les seuils ajustés pour les régimes riches en sucre ou en huile (28/42) sont tous deux canoniques et valides pour ce champ. Utiliser ScoringEvent uniquement pour des seuils non publiés par le PAM (adaptations nationales, seuils définis par des chercheurs). Seuils standard : pauvre (0-21), limite (21,5-35), acceptable (> 35). Seuils ajustés : pauvre (0-28), limite (28,5-42), acceptable (> 42).'
      es: 'El grupo de consumo alimentario derivado del fcs_score según los umbrales publicados por el PMA. Tanto el conjunto estándar (21/35) como el conjunto ajustado para dietas altas en azúcar o aceite (28/42) son canónicos del PMA y válidos para este campo. Usar ScoringEvent solo para umbrales no publicados por el PMA (adaptaciones nacionales, cortes definidos por investigadores). Umbrales estándar: pobre (0-21), límite (21,5-35), aceptable (> 35). Umbrales ajustados: pobre (0-28), límite (28,5-42), aceptable (> 42).'
    slot_uri: aidops:fcs_consumption_group
    range: FoodConsumptionGroup
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["wfp-fcs"], "cardinality": "single", "category": "food_security", "core": true, "definition": {"en": "The food consumption group derived from fcs_score using WFP-published thresholds. Both the standard set (21/35) and the high-sugar/high-oil set (28/42) are WFP-canonical and valid for this field. Use ScoringEvent only for thresholds not published by WFP (national adaptations, researcher-defined cutoffs). Standard thresholds: poor (0-21), borderline (21.5-35), acceptable (> 35). Adjusted thresholds for high-sugar/high-oil contexts: poor (0-28), borderline (28.5-42), acceptable (> 42).", "es": "El grupo de consumo alimentario derivado del fcs_score seg\u00fan los umbrales publicados por el PMA. Tanto el conjunto est\u00e1ndar (21/35) como el conjunto ajustado para dietas altas en az\u00facar o aceite (28/42) son can\u00f3nicos del PMA y v\u00e1lidos para este campo. Usar ScoringEvent solo para umbrales no publicados por el PMA (adaptaciones nacionales, cortes definidos por investigadores). Umbrales est\u00e1ndar: pobre (0-21), l\u00edmite (21,5-35), aceptable (> 35). Umbrales ajustados: pobre (0-28), l\u00edmite (28,5-42), aceptable (> 42).", "fr": "Le groupe de consommation alimentaire d\u00e9riv\u00e9 du fcs_score selon les seuils publi\u00e9s par le PAM. Les seuils standard (21/35) et les seuils ajust\u00e9s pour les r\u00e9gimes riches en sucre ou en huile (28/42) sont tous deux canoniques et valides pour ce champ. Utiliser ScoringEvent uniquement pour des seuils non publi\u00e9s par le PAM (adaptations nationales, seuils d\u00e9finis par des chercheurs). Seuils standard : pauvre (0-21), limite (21,5-35), acceptable (> 35). Seuils ajust\u00e9s : pauvre (0-28), limite (28,5-42), acceptable (> 42)."}, "id": "fcs_consumption_group", "label": {"en": "FCS consumption group", "es": "Grupo de consumo FCS", "fr": "Groupe de consommation FCS"}, "maturity": "draft", "references": null, "type": "string", "vali