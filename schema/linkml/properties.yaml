core). Sensible : la politique d''exemption de frais est politiquement sensible."}, "id": "hf_exemption_emergency", "label": {"en": "Emergency cases exempted from user fees", "es": "Casos de emergencia exentos de tarifas al usuario", "fr": "Cas d''urgence exempt\u00e9s des frais d''utilisation"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-partial"}'
