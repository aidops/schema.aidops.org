  iycf_eff:
    title:
      en: Egg and/or flesh food consumption (EFF)
      fr: Consommation d'œufs et/ou d'aliments carnés (EFF)
      es: Consumo de huevo y/o alimentos cárnicos (EFF)
    description:
      en: 'Derived boolean: whether the child consumed eggs and/or any flesh food in the previous 24 hours. Applies to children 6–23 months. Formula: iycf_fg_eggs = true OR iycf_fg_flesh = true. EFF is a new indicator in WHO/UNICEF 2021 that tracks nutrient-dense animal source food consumption without requiring both food types.'
      fr: 'Booléen dérivé : indique si l''enfant a consommé des œufs et/ou un aliment carné au cours des 24 heures précédentes. S''applique aux enfants de 6 à 23 mois. Formule : iycf_fg_eggs = vrai OU iycf_fg_flesh = vrai. L''EFF est un nouvel indicateur de l''OMS/UNICEF 2021 qui mesure la consommation d''aliments d''origine animale à haute densité nutritionnelle sans exiger les deux types d''aliments.'
      es: 'Booleano derivado: indica si el niño consumió huevos y/o algún alimento cárnico en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Fórmula: iycf_fg_eggs = verdadero O iycf_fg_flesh = verdadero. EFF es un nuevo indicador en OMS/UNICEF 2021 que rastrea el consumo de alimentos de fuente animal con alta densidad de nutrientes sin requerir ambos tipos de alimentos.'
