  water_availability_reliable:
    title:
      en: Water source available when needed
      fr: Source d'eau disponible quand nécessaire
      es: Fuente de agua disponible cuando se necesita
    description:
      en: Whether water is always available from the main drinking water source when the household needs it. Reliable availability is one of three criteria for the safely managed water service level (JMP W5 expanded). If the respondent answers 'no', ask water_availability_days_per_week to characterize the unreliability.
      fr: Si l'eau est toujours disponible à la principale source d'eau potable quand le ménage en a besoin. La disponibilité fiable est l'un des trois critères pour le niveau de service en eau à gestion sécurisée (JMP W5 élargi). Si le répondant répond 'non', demander water_availability_days_per_week pour caractériser le manque de fiabilité.
      es: Si el agua está siempre disponible en la principal fuente de agua potable cuando el hogar la necesita. La disponibilidad confiable es uno de los tres criterios para el nivel de servicio de agua con gestión segura (JMP W5 ampliado). Si el encuestado responde 'no', preguntar water_availability_days_per_week para caracterizar la falta de confiabilidad.
    slot_uri: aidops:water_availability_reliable
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "water", "core": false, "definition": {"en": "Whether water is always available from the main drinking water source when the household needs it. Reliable availability is one of three criteria for the safely managed water service level (JMP W5 expanded). If the respondent answers ''no'', ask water_availability_days_per_week to characterize the unreliability.", "es": "Si el agua est\u00e1 siempre disponible en la principal fuente de agua potable cuando el hogar la necesita. La disponibilidad confiable es uno de los tres criterios para el nivel de servicio de agua con gesti\u00f3n segura (JMP W5 ampliado). Si el encuestado responde ''no'', preguntar water_availability_days_per_week para caracterizar la falta de confiabilidad.", "fr": "Si l''eau est toujours disponible \u00e0 la principale source d''eau potable quand le m\u00e9nage en a besoin. La disponibilit\u00e9 fiable est l''un des trois crit\u00e8res pour le niveau de service en eau \u00e0 gestion s\u00e9curis\u00e9e (JMP W5 \u00e9largi). Si le r\u00e9pondant r\u00e9pond ''non'', demander water_availability_days_per_week pour caract\u00e9riser le manque de fiabilit\u00e9."}, "id": "water_availability_reliable", "label": {"en": "Water source available when needed", "es": "Fuente de agua disponible cuando se necesita", "fr": "Source d''eau disponible quand n\u00e9cessaire"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["jmp_household_survey", "mics7"], "vocabulary": null}'
