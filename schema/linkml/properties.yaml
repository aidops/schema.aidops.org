past 5 years", "es": "Un seguro pag\u00f3 un beneficio durante una p\u00e9rdida clim\u00e1tica en los \u00faltimos 5 a\u00f1os", "fr": "Une assurance a vers\u00e9 une prestation lors d''une perte climatique au cours des 5 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": null}'
