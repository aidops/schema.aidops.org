  cn_informant_group_women:
    title:
      en: Informants included women
      fr: Informateurs comprenant des femmes
      es: Informantes incluyeron mujeres
    description:
      en: Whether women were among the participants in this community-level assessment session. Used to flag gender representativeness of the informant group per MIRA §3.3 informant-diversity guidance and the IASC Gender Handbook. Separate women-only and men-only sessions are good practice and may produce separate records per community.
      fr: Indique si des femmes figuraient parmi les participants à cette séance d'évaluation au niveau communautaire. Utilisé pour signaler la représentativité de genre du groupe d'informateurs, conformément aux orientations du § 3.3 de MIRA sur la diversité des informateurs et au Manuel de l'IASC sur le genre. Des séances séparées pour les femmes et pour les hommes sont une bonne pratique et peuvent donner lieu à des enregistrements distincts par communauté.
      es: Indica si hubo mujeres entre las participantes en esta sesión de evaluación a nivel comunitario. Utilizado para señalar la representatividad de género del grupo de informantes, conforme a la orientación del § 3.3 de MIRA sobre diversidad de informantes y al Manual del IASC sobre género. Las sesiones separadas para mujeres y para hombres son una buena práctica y pueden producir registros distintos por comunidad.
    slot_uri: aidops:cn_informant_group_women
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["unhcr-agd-2018"], "cardinality": "single", "category": "administrative", "core": true, "definition": {"en": "Whether women were among the participants in this community-level assessment session. Used to flag gender representativeness of the informant group per MIRA \u00a73.3 informant-diversity guidance and the IASC Gender Handbook. Separate women-only and men-only sessions are good practice and may produce separate records per community.", "es": "Indica si hubo mujeres entre las participantes en esta sesi\u00f3n de evaluaci\u00f3n a nivel comunitario. Utilizado para se\u00f1alar la representatividad de g\u00e9nero del grupo de informantes, conforme a la orientaci\u00f3n del \u00a7 3.3 de MIRA sobre diversidad de informantes y al Manual del IASC sobre g\u00e9nero. Las sesiones separadas para mujeres y para hombres son una buena pr\u00e1ctica y pueden producir registros distintos por comunidad.", "fr": "Indique si des femmes figuraient parmi les participants \u00e0 cette s\u00e9ance d''\u00e9valuation au niveau communautaire. Utilis\u00e9 pour signaler la repr\u00e9sentativit\u00e9 de genre du groupe d''informateurs, conform\u00e9ment aux orientations du \u00a7 3.3 de MIRA sur la diversit\u00e9 des informateurs et au Manuel de l''IASC sur le genre. Des s\u00e9ances s\u00e9par\u00e9es pour les femmes et pour les hommes sont une bonne pratique et peuvent donner lieu \u00e0 des enregistrements distincts par communaut\u00e9."}, "id": "cn_informant_group_women", "label": {"en": "Informants included women", "es": "Informantes incluyeron mujeres", "fr": "Informateurs comprenant des femmes"}, "maturity": "draft", "references": null, "type": "boolean", "vocabulary": null}'
