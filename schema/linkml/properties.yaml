  iycf_infant_formula_yesterday:
    title:
      en: Infant formula received yesterday
      fr: Lait maternisé reçu hier
      es: Fórmula infantil recibida ayer
    description:
      en: 'Whether the child received infant formula yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''Yesterday during the day or at night, did (NAME) receive infant formula?'' Used to count milk feeds for non-breastfed children in the Minimum Milk Feeding Frequency (MMFF) indicator.'
      fr: 'Indique si l''enfant a reçu du lait maternisé hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier dans la journée ou la nuit, (PRÉNOM) a-t-il/elle reçu du lait maternisé ? » Utilisé pour compter les repas lactés des enfants non allaités dans l''indicateur de fréquence minimale des repas lactés (MMFF).'
      es: 'Indica si el niño recibió fórmula infantil ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): ''Ayer durante el día o la noche, ¿recibió (NOMBRE) fórmula infantil?'' Se utiliza para contar las tomas de leche de los niños no amamantados en el indicador de Frecuencia Mínima de Alimentación con Leche (MMFF).'
    slot_uri: aidops:iycf_infant_formula_yesterday
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": false, "definition": {"en": "Whether the child received infant formula yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): ''Yesterday during the day or at night, did (NAME) receive infant formula?'' Used to count milk feeds for non-breastfed children in the Minimum Milk Feeding Frequency (MMFF) indicator.", "es": "Indica si el ni\u00f1o recibi\u00f3 f\u00f3rmula infantil ayer durante el d\u00eda o la noche (recordatorio de 24 horas). Redacci\u00f3n publicada (OMS/UNICEF 2021): ''Ayer durante el d\u00eda o la noche, \u00bfrecibi\u00f3 (NOMBRE) f\u00f3rmula infantil?'' Se utiliza para contar las tomas de leche de los ni\u00f1os no amamantados en el indicador de Frecuencia M\u00ednima de Alimentaci\u00f3n con Leche (MMFF).", "fr": "Indique si l''enfant a re\u00e7u du lait maternis\u00e9 hier dans la journ\u00e9e ou la nuit (rappel sur 24 heures). Formulation publi\u00e9e (OMS/UNICEF 2021) : \u00ab Hier dans la journ\u00e9e ou la nuit, (PR\u00c9NOM) a-t-il/elle re\u00e7u du lait maternis\u00e9 ? \u00bb Utilis\u00e9 pour compter les repas lact\u00e9s des enfants non allait\u00e9s dans l''indicateur de fr\u00e9quence minimale des repas lact\u00e9s (MMFF)."}, "id": "iycf_infant_formula_yesterday", "label": {"en": "Infant formula received yesterday", "es": "F\u00f3rmula infantil recibida ayer", "fr": "Lait maternis\u00e9 re\u00e7u hier"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
