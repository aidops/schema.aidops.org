    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-phl-guidelines"], "cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Primary cause or causes of the reported crop loss during the last completed agricultural season. Multi-select from vocabulary `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) because a single season may combine concurrent shocks (e.g., drought followed by pests). Drawn from the LSMS-ISA shock module and FAO WCA 2020 Theme 10 (major risks faced by the holding). Asked only when `crop_loss_shock_past_season` is `yes`.", "es": "Causa o causas principales de la p\u00e9rdida de cultivos reportada durante la \u00faltima temporada agr\u00edcola completa. Selecci\u00f3n m\u00faltiple del vocabulario `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) porque una sola temporada puede combinar choques concurrentes (por ejemplo, sequ\u00eda seguida de plagas). Tomado del m\u00f3dulo de choques de LSMS-ISA y del Tema 10 del WCA 2020 de la FAO (riesgos mayores que enfrenta la explotaci\u00f3n). Se pregunta solo cuando `crop_loss_shock_past_season` es `yes`.", "fr": "Cause ou causes principales de la perte de r\u00e9colte signal\u00e9e au cours de la derni\u00e8re saison agricole compl\u00e8te. S\u00e9lection multiple dans le vocabulaire `crop-loss-cause` (drought, flood, irregular_rainfall, pest_infestation, crop_disease, animal_damage, fire, theft_conflict, other) car une seule saison peut combiner des chocs concurrents (par exemple, s\u00e9cheresse suivie de ravageurs). Tir\u00e9 du module des chocs du LSMS-ISA et du Th\u00e8me 10 du WCA 2020 de la FAO (risques majeurs auxquels est confront\u00e9e l''exploitation). Pos\u00e9e uniquement lorsque `crop_loss_shock_past_season` est `yes`."}, "id": "crop_loss_cause", "label": {"en": "Primary cause(s) of crop loss in the last agricultural season", "es": "Causa(s) principal(es) de la p\u00e9rdida de cultivos en la \u00faltima temporada agr\u00edcola", "fr": "Cause(s) principale(s) de la perte de r\u00e9colte au cours de la derni\u00e8re saison agricole"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "crop-loss-cause"}'
