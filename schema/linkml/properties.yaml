  fuel_collection_time_hours_per_week:
    title:
      en: Fuel collection time (hours per week)
      fr: Temps de collecte du combustible (heures par semaine)
      es: Tiempo de recolección de combustible (horas por semana)
    description:
      en: 'Hours per week the household spends collecting or obtaining cooking fuel. Enter 0 if fuel is purchased rather than collected. Applicable only when the primary cooking fuel is a biomass or solid fuel collected from the environment. MTF cooking convenience attribute — fuel collection time tier thresholds: less than 0.5 hrs/week = Tier 4-5; less than 1.5 hrs/week = Tier 3; less than 3 hrs/week = Tier 2; less than 7 hrs/week = Tier 1; 7 or more hrs/week = Tier 0. Also an SDG gender equality indicator as the collection burden falls disproportionately on women and girls. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q7.'
      fr: 'Heures par semaine que le ménage consacre à la collecte ou à l''obtention du combustible de cuisson. Entrer 0 si le combustible est acheté plutôt que collecté. Applicable uniquement lorsque le combustible de cuisson principal est une biomasse ou un combustible solide collecté dans l''environnement. Attribut de commodité de cuisson MTF — seuils de niveau pour le temps de collecte du combustible : moins de 0,5 h/semaine = niveaux 4-5 ; moins de 1,5 h/semaine = niveau 3 ; moins de 3 h/semaine = niveau 2 ; moins de 7 h/semaine = niveau 1 ; 7 h/semaine ou plus = niveau 0. Également un indicateur ODD d''égalité des sexes car la charge de collecte pèse de manière disproportionnée sur les femmes et les filles. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q7.'
      es: 'Horas por semana que el hogar dedica a recolectar u obtener combustible de cocción. Ingresar 0 si el combustible se compra en lugar de recolectarse. Aplicable solo cuando el combustible de cocción principal es una biomasa o combustible sólido recolectado del entorno. Atributo de conveniencia de cocción MTF: umbrales de nivel para el tiempo de recolección de combustible: menos de 0,5 h/semana = Niveles 4-5; menos de 1,5 h/semana = Nivel 3; menos de 3 h/semana = Nivel 2; menos de 7 h/semana = Nivel 1; 7 o más h/semana = Nivel 0. También es un indicador de igualdad de género ODS ya que la carga de recolección recae desproporcionadamente en mujeres y niñas. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q7.'
    slot_uri: aidops:fuel_collection_time_hours_per_week
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Hours per week the household spends collecting or obtaining cooking fuel. Enter 0 if fuel is purchased rather than collected. Applicable only when the primary cooking fuel is a biomass or solid fuel collected from the environment. MTF cooking convenience attribute \u2014 fuel collection time tier thresholds: less than 0.5 hrs/week = Tier 4-5; less than 1.5 hrs/week = Tier 3; less than 3 hrs/week = Tier 2; less than 7 hrs/week = Tier 1; 7 or more hrs/week = Tier 0. Also an SDG gender equality indicator as the collection burden falls disproportionately on women and girls. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q7.", "es": "Horas por semana que el hogar dedica a recolectar u obtener combustible de cocci\u00f3n. Ingresar 0 si el combustible se compra en lugar de recolectarse. Aplicable solo cuando el combustible de cocci\u00f3n principal es una biomasa o combustible s\u00f3lido recolectado del entorno. Atributo de conveniencia de cocci\u00f3n MTF: umbrales de nivel para el tiempo de recolecci\u00f3n de combustible: menos de 0,5 h/semana = Niveles 4-5; menos de 1,5 h/semana = Nivel 3; menos de 3 h/semana = Nivel 2; menos de 7 h/semana = Nivel 1; 7 o m\u00e1s h/semana = Nivel 0. Tambi\u00e9n es un indicador de igualdad de g\u00e9nero ODS ya que la carga de recolecci\u00f3n recae desproporcionadamente en mujeres y ni\u00f1as. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q7.", "fr": "Heures par semaine que le m\u00e9nage consacre \u00e0 la collecte ou \u00e0 l''obtention du combustible de cuisson. Entrer 0 si le combustible est achet\u00e9 plut\u00f4t que collect\u00e9. Applicable uniquement lorsque le combustible de cuisson principal est une biomasse ou un combustible solide collect\u00e9 dans l''environnement. Attribut de commodit\u00e9 de cuisson MTF \u2014 seuils de niveau pour le temps de collecte du combustible : moins de 0,5 h/semaine = niveaux 4-5 ; moins de 1,5 h/semaine = niveau 3 ; moins de 3 h/semaine = niveau 2 ; moins de 7 h/semaine = niveau 1 ; 7 h/semaine ou plus = niveau 0. \u00c9galement un indicateur ODD d''\u00e9galit\u00e9 des sexes car la charge de collecte p\u00e8se de mani\u00e8re disproportionn\u00e9e sur les femmes et les filles. Source : enqu\u00eate m\u00e9nage MTF ; questionnaire harmonis\u00e9 OMS/Banque mondiale Q7."}, "id": "fuel_collection_time_hours_per_week", "label": {"en": "Fuel collection time (hours per week)", "es": "Tiempo de recolecci\u00f3n de combustible (horas por semana)", "fr": "Temps de collecte du combustible (heures par semaine)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["who_world_bank_core_energy", "se4all_mtf"], "vocabulary": null}'
