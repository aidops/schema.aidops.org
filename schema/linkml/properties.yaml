  humanitarian_assistance_reliance:
    title:
      en: Household reliance on humanitarian assistance
      fr: Dépendance du ménage à l'assistance humanitaire
      es: Dependencia del hogar de la asistencia humanitaria
    description:
      en: 'The degree to which the household currently relies on humanitarian assistance (cash, vouchers, food, in-kind, or services) as a livelihood input. Captured as a structured status, not a dollar amount. Drawn from the IOM DTM Multi-Sectoral Location Assessment assistance module, the Sphere 2018 Livelihoods chapter on assistance and protection, and the CaLP Network cash and voucher assistance core indicators. Distinct from `income_sources` where humanitarian transfers may also be listed: this item asks specifically about the household''s dependence level.'
      fr: 'Le degré auquel le ménage dépend actuellement de l''assistance humanitaire (espèces, coupons, nourriture, en nature ou services) comme intrant de subsistance. Saisi comme un statut structuré, et non comme un montant. Tiré du module d''assistance de l''Évaluation multisectorielle de localisation (MSLA) de la DTM de l''OIM, du chapitre Moyens de subsistance de Sphère 2018 sur l''assistance et la protection, et des indicateurs de base de l''assistance en espèces et sous forme de coupons du réseau CaLP. Distinct de `income_sources` où les transferts humanitaires peuvent également être listés : cet item interroge spécifiquement le niveau de dépendance du ménage.'
      es: 'El grado en que el hogar actualmente depende de la asistencia humanitaria (efectivo, vales, alimentos, en especie o servicios) como insumo de subsistencia. Capturado como un estado estructurado, no un monto. Tomado del módulo de asistencia de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM, el capítulo de Medios de Vida de Esfera 2018 sobre asistencia y protección, y los indicadores básicos de asistencia en efectivo y vales de la Red CaLP. Distinto de `income_sources` donde las transferencias humanitarias también pueden listarse: este ítem pregunta específicamente sobre el nivel de dependencia del hogar.'
    slot_uri: aidops:humanitarian_assistance_reliance
    range: HumanitarianAssistanceReliance
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "The degree to which the household currently relies on humanitarian assistance (cash, vouchers, food, in-kind, or services) as a livelihood input. Captured as a structured status, not a dollar amount. Drawn from the IOM DTM Multi-Sectoral Location Assessment assistance module, the Sphere 2018 Livelihoods chapter on assistance and protection, and the CaLP Network cash and voucher assistance core indicators. Distinct from `income_sources` where humanitarian transfers may also be listed: this item asks specifically about the household''s dependence level.", "es": "El grado en que el hogar actualmente depende de la asistencia humanitaria (efectivo, vales, alimentos, en especie o servicios) como insumo de subsistencia. Capturado como un estado estructurado, no un monto. Tomado del m\u00f3dulo de asistencia de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM, el cap\u00edtulo de Medios de Vida de Esfera 2018 sobre asistencia y protecci\u00f3n, y los indicadores b\u00e1sicos de asistencia en efectivo y vales de la Red CaLP. Distinto de `income_sources` donde las transferencias humanitarias tambi\u00e9n pueden listarse: este \u00edtem pregunta espec\u00edficamente sobre el nivel de dependencia del hogar.", "fr": "Le degr\u00e9 auquel le m\u00e9nage d\u00e9pend actuellement de l''assistance humanitaire (esp\u00e8ces, coupons, nourriture, en nature ou services) comme intrant de subsistance. Saisi comme un statut structur\u00e9, et non comme un montant. Tir\u00e9 du module d''assistance de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM, du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur l''assistance et la protection, et des indicateurs de base de l''assistance en esp\u00e8ces et sous forme de coupons du r\u00e9seau CaLP. Distinct de `income_sources` o\u00f9 les transferts humanitaires peuvent \u00e9galement \u00eatre list\u00e9s : cet item interroge sp\u00e9cifiquement le niveau de d\u00e9pendance du m\u00e9nage."}, "id": "humanitarian_assistance_reliance", "label": {"en": "Household reliance on humanitarian assistance", "es": "Dependencia del hogar de la asistencia humanitaria", "fr": "D\u00e9pendance du m\u00e9nage \u00e0 l''assistance humanitaire"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "humanitarian-assistance-reliance"}'
      bibliography_refs: fao-rima-2016
  hygiene_items_available:
    title:
      en: Hygiene items available in household
      fr: Articles d'hygiène disponibles dans le ménage
      es: Artículos de higiene disponibles en el hogar
    description:
      en: Hygiene items currently available in the household. Multi-select. Based on the Sphere 2018 minimum Non-Food Item (NFI) hygiene package (Standard 4), which includes soap and sanitary items as minimum standards. Used for NFI distribution targeting and hygiene gap analysis.
      fr: Articles d'hygiène actuellement disponibles dans le ménage. Sélection multiple. Basé sur le paquet minimum d'articles non alimentaires (ANF) Sphère 2018 (Norme 4), qui inclut le savon et les articles sanitaires comme normes minimales. Utilisé pour le ciblage de la distribution d'ANF et l'analyse des lacunes en matière d'hygiène.
      es: Artículos de higiene disponibles actualmente en el hogar. Selección múltiple. Basado en el paquete mínimo de artículos no alimentarios (ANA) Esfera 2018 (Estándar 4), que incluye jabón y artículos sanitarios como estándares mínimos. Usado para la focalización de distribución de ANA y el análisis de brechas de higiene.
    slot_uri: aidops:hygiene_items_available
    range: HygieneItemType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "multiple", "category": "hygiene", "core": false, "definition": {"en": "Hygiene items currently available in the household. Multi-select. Based on the Sphere 2018 minimum Non-Food Item (NFI) hygiene package (Standard 4), which includes soap and sanitary items as minimum standards. Used for NFI distribution targeting and hygiene gap analysis.", "es": "Art\u00edculos de higiene disponibles actualmente en el hogar. Selecci\u00f3n m\u00faltiple. Basado en el paquete m\u00ednimo de art\u00edculos no alimentarios (ANA) Esfera 2018 (Est\u00e1ndar 4), que incluye jab\u00f3n y art\u00edculos sanitarios como est\u00e1ndares m\u00ednimos. Usado para la focalizaci\u00f3n de distribuci\u00f3n de ANA y el an\u00e1lisis de brechas de higiene.", "fr": "Articles d''hygi\u00e8ne actuellement disponibles dans le m\u00e9nage. S\u00e9lection multiple. Bas\u00e9 sur le paquet minimum d''articles non alimentaires (ANF) Sph\u00e8re 2018 (Norme 4), qui inclut le savon et les articles sanitaires comme normes minimales. Utilis\u00e9 pour le ciblage de la distribution d''ANF et l''analyse des lacunes en mati\u00e8re d''hygi\u00e8ne."}, "id": "hygiene_items_available", "label": {"en": "Hygiene items available in household", "es": "Art\u00edculos de higiene disponibles en el hogar", "fr": "Articles d''hygi\u00e8ne disponibles dans le m\u00e9nage"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["erwg_wash_hh", "sphere_2018"], "vocabulary": "hygiene-item-type"}'
      bibliography_refs: sphere-2018
  hygiene_service_level:
    title:
      en: Hygiene service level
      fr: Niveau de service d'hygiène
      es: Nivel de servicio de higiene
    description:
      en: 'Hygiene service level derived from enumerator observations of handwashing facility presence (H1), water availability (H2), and soap availability (H3). JMP SDG 6.2.1 hygiene ladder. Derivation: basic = facility present AND water observed AND soap observed; limited = facility present AND (water missing OR soap missing); no_facility = no handwashing facility on premises. This is a derived field; not directly asked.'
      fr: 'Niveau de service d''hygiène dérivé des observations de l''énumérateur sur la présence d''un dispositif de lavage des mains (H1), la disponibilité de l''eau (H2) et la disponibilité du savon (H3). Échelle d''hygiène JMP ODD 6.2.1. Dérivation : basic = dispositif présent ET eau observée ET savon observé ; limited = dispositif présent ET (eau manquante OU savon manquant) ; no_facility = aucun dispositif de lavage des mains sur les lieux. Il s''agit d''un champ dérivé ; non demandé directement.'
      es: 'Nivel de servicio de higiene derivado de las observaciones del enumerador sobre la presencia de instalación de lavado de manos (H1), disponibilidad de agua (H2) y disponibilidad de jabón (H3). Escala de higiene JMP ODS 6.2.1. Derivación: basic = instalación presente Y agua observada Y jabón observado; limited = instalación presente Y (falta agua O falta jabón); no_facility = sin instalación de lavado de manos en las instalaciones. Es un campo derivado; no se pregunta directamente.'
    slot_uri: aidops:hygiene_service_level
    range: HygieneServiceLevel
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "hygiene", "core": true, "definition": {"en": "Hygiene service level derived from enumerator observations of handwashing facility presence (H1), water availability (H2), and soap availability (H3). JMP SDG 6.2.1 hygiene ladder. Derivation: basic = facility present AND water observed AND soap observed; limited = facility present AND (water missing OR soap missing); no_facility = no handwashing facility on premises. This is a derived field; not directly asked.", "es": "Nivel de servicio de higiene derivado de las observaciones del enumerador sobre la presencia de instalaci\u00f3n de lavado de manos (H1), disponibilidad de agua (H2) y disponibilidad de jab\u00f3n (H3). Escala de higiene JMP ODS 6.2.1. Derivaci\u00f3n: basic = instalaci\u00f3n presente Y agua observada Y jab\u00f3n observado; limited = instalaci\u00f3n presente Y (falta agua O falta jab\u00f3n); no_facility = sin instalaci\u00f3n de lavado de manos en las instalaciones. Es un campo derivado; no se pregunta directamente.", "fr": "Niveau de service d''hygi\u00e8ne d\u00e9riv\u00e9 des observations de l''\u00e9num\u00e9rateur sur la pr\u00e9sence d''un dispositif de lavage des mains (H1), la disponibilit\u00e9 de l''eau (H2) et la disponibilit\u00e9 du savon (H3). \u00c9chelle d''hygi\u00e8ne JMP ODD 6.2.1. D\u00e9rivation : basic = dispositif pr\u00e9sent ET eau observ\u00e9e ET savon observ\u00e9 ; limited = dispositif pr\u00e9sent ET (eau manquante OU savon manquant) ; no_facility = aucun dispositif de lavage des mains sur les lieux. Il s''agit d''un champ d\u00e9riv\u00e9 ; non demand\u00e9 directement."}, "id": "hygiene_service_level", "label": {"en": "Hygiene service level", "es": "Nivel de servicio de higiene", "fr": "Niveau de service d''hygi\u00e8ne"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["jmp_household_survey"], "vocabulary": "hygiene-service-level"}'
      bibliography_refs: jmp-core
  ideal_number_of_children:
    title:
      en: Ideal number of children
      fr: Nombre idéal d'enfants
      es: Número ideal de hijos
    description:
      en: The number of children the woman would have had if she could have chosen exactly how many to have over her whole life (DHS V613). Integer 0–20. Record null when the respondent gives a non-numeric response such as 'up to God' or 'as many as come' (DHS codes 96/97). Do not prompt with numeric options.
      fr: Le nombre d'enfants que la femme aurait eu si elle avait pu choisir exactement combien en avoir au cours de sa vie (DHS V613). Entier 0–20. Enregistrer null lorsque la répondante donne une réponse non numérique telle que « c'est Dieu qui décide » ou « autant qu'il en vient » (codes DHS 96/97). Ne pas suggérer d'options numériques.
      es: El número de hijos que la mujer habría tenido si hubiera podido elegir exactamente cuántos tener durante toda su vida (DHS V613). Entero 0–20. Registrar null cuando la encuestada da una respuesta no numérica como 'lo que Dios quiera' o 'los que vengan' (códigos DHS 96/97). No sugerir opciones numéricas.
    slot_uri: aidops:ideal_number_of_children
    range: integer
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning"], "cardinality": "single", "category": "fertility_preferences", "core": false, "definition": {"en": "The number of children the woman would have had if she could have chosen exactly how many to have over her whole life (DHS V613). Integer 0\u201320. Record null when the respondent gives a non-numeric response such as ''up to God'' or ''as many as come'' (DHS codes 96/97). Do not prompt with numeric options.", "es": "El n\u00famero de hijos que la mujer habr\u00eda tenido si hubiera podido elegir exactamente cu\u00e1ntos tener durante toda su vida (DHS V613). Entero 0\u201320. Registrar null cuando la encuestada da una respuesta no num\u00e9rica como ''lo que Dios quiera'' o ''los que vengan'' (c\u00f3digos DHS 96/97). No sugerir opciones num\u00e9ricas.", "fr": "Le nombre d''enfants que la femme aurait eu si elle avait pu choisir exactement combien en avoir au cours de sa vie (DHS V613). Entier 0\u201320. Enregistrer null lorsque la r\u00e9pondante donne une r\u00e9ponse non num\u00e9rique telle que \u00ab c''est Dieu qui d\u00e9cide \u00bb ou \u00ab autant qu''il en vient \u00bb (codes DHS 96/97). Ne pas sugg\u00e9rer d''options num\u00e9riques."}, "id": "ideal_number_of_children", "label": {"en": "Ideal number of children", "es": "N\u00famero ideal de hijos", "fr": "Nombre id\u00e9al d''enfants"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "valid_instruments": ["dhs_women", "mics6"], "vocabulary": null}'
      bibliography_refs: dhs-family-planning
  improved_seeds_used_last_season:
    title:
      en: Improved or certified seed varieties used during the last agricultural season
      fr: Variétés de semences améliorées ou certifiées utilisées au cours de la dernière saison agricole
      es: Variedades de semillas mejoradas o certificadas usadas durante la última temporada agrícola
    description:
      en: Whether the household used improved or certified seed varieties (not seeds saved from its own previous harvest) for any crop during the last completed agricultural season. Based on FAO WCA 2020 Vol.I Item 0321 (use of improved/certified seeds) and the LSMS-ISA crop-inputs module. `dont_know` is retained as a distinct valid response. Asked only when `hh_grew_crops_last_season` is `yes`.
      fr: Si le ménage a utilisé des variétés de semences améliorées ou certifiées (autres que les semences conservées de sa propre récolte précédente) pour toute culture au cours de la dernière saison agricole complète. Basé sur l'item 0321 (utilisation de semences améliorées/certifiées) du Volume I du WCA 2020 de la FAO et sur le module des intrants culturaux du LSMS-ISA. `dont_know` est conservé comme réponse valide distincte. Posée uniquement lorsque `hh_grew_crops_last_season` est `yes`.
      es: Si el hogar usó variedades de semillas mejoradas o certificadas (que no sean semillas guardadas de su propia cosecha anterior) para algún cultivo durante la última temporada agrícola completa. Basado en el ítem 0321 (uso de semillas mejoradas/certificadas) del Volumen I del WCA 2020 de la FAO y en el módulo de insumos de cultivos de LSMS-ISA. `dont_know` se mantiene como respuesta válida distinta. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.
    slot_uri: aidops:improved_seeds_used_last_season
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household used improved or certified seed varieties (not seeds saved from its own previous harvest) for any crop during the last completed agricultural season. Based on FAO WCA 2020 Vol.I Item 0321 (use of improved/certified seeds) and the LSMS-ISA crop-inputs module. `dont_know` is retained as a distinct valid response. Asked only when `hh_grew_crops_last_season` is `yes`.", "es": "Si el hogar us\u00f3 variedades de semillas mejoradas o certificadas (que no sean semillas guardadas de su propia cosecha anterior) para alg\u00fan cultivo durante la \u00faltima temporada agr\u00edcola completa. Basado en el \u00edtem 0321 (uso de semillas mejoradas/certificadas) del Volumen I del WCA 2020 de la FAO y en el m\u00f3dulo de insumos de cultivos de LSMS-ISA. `dont_know` se mantiene como respuesta v\u00e1lida distinta. Se pregunta solo cuando `hh_grew_crops_last_season` es `yes`.", "fr": "Si le m\u00e9nage a utilis\u00e9 des vari\u00e9t\u00e9s de semences am\u00e9lior\u00e9es ou certifi\u00e9es (autres que les semences conserv\u00e9es de sa propre r\u00e9colte pr\u00e9c\u00e9dente) pour toute culture au cours de la derni\u00e8re saison agricole compl\u00e8te. Bas\u00e9 sur l''item 0321 (utilisation de semences am\u00e9lior\u00e9es/certifi\u00e9es) du Volume I du WCA 2020 de la FAO et sur le module des intrants culturaux du LSMS-ISA. `dont_know` est conserv\u00e9 comme r\u00e9ponse valide distincte. Pos\u00e9e uniquement lorsque `hh_grew_crops_last_season` est `yes`."}, "id": "improved_seeds_used_last_season", "label": {"en": "Improved or certified seed varieties used during the last agricultural season", "es": "Variedades de semillas mejoradas o certificadas usadas durante la \u00faltima temporada agr\u00edcola", "fr": "Vari\u00e9t\u00e9s de semences am\u00e9lior\u00e9es ou certifi\u00e9es utilis\u00e9es au cours de la derni\u00e8re saison agricole"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  income_diversification_index:
    title:
      en: Income diversification index (0-3)
      fr: Indice de diversification des revenus (0-3)
      es: Índice de diversificación de ingresos (0-3)
    description:
      en: 'Integer 0-3 summarising the breadth of the household income portfolio, derived from `income_sources`. Coded as: 0 = no reported income source; 1 = single source; 2 = two sources; 3 = three or more sources. A lightweight proxy for income resilience used alongside `livelihood_diversity_count`. Drawn from the FAO RIMA-II Adaptive Capacity (AC) pillar indicators and the LSMS-ISA income portfolio module. Derived (computed from item responses), not separately asked.'
      fr: 'Entier 0-3 résumant l''ampleur du portefeuille de revenus du ménage, dérivé de `income_sources`. Codé comme : 0 = aucune source de revenu déclarée ; 1 = source unique ; 2 = deux sources ; 3 = trois sources ou plus. Proxy léger de la résilience des revenus utilisé avec `livelihood_diversity_count`. Tiré des indicateurs du pilier Capacité d''adaptation (AC) de FAO RIMA-II et du module portefeuille de revenus LSMS-ISA. Dérivé (calculé à partir des réponses aux items), non demandé séparément.'
      es: 'Entero 0-3 que resume la amplitud de la cartera de ingresos del hogar, derivado de `income_sources`. Codificado como: 0 = ninguna fuente de ingresos reportada; 1 = fuente única; 2 = dos fuentes; 3 = tres o más fuentes. Indicador indirecto ligero de la resiliencia de ingresos utilizado junto con `livelihood_diversity_count`. Tomado de los indicadores del pilar Capacidad Adaptativa (AC) de FAO RIMA-II y el módulo de cartera de ingresos LSMS-ISA. Derivado (calculado a partir de las respuestas a los ítems), no preguntado por separado.'
    slot_uri: aidops:income_diversification_index
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Integer 0-3 summarising the breadth of the household income portfolio, derived from `income_sources`. Coded as: 0 = no reported income source; 1 = single source; 2 = two sources; 3 = three or more sources. A lightweight proxy for income resilience used alongside `livelihood_diversity_count`. Drawn from the FAO RIMA-II Adaptive Capacity (AC) pillar indicators and the LSMS-ISA income portfolio module. Derived (computed from item responses), not separately asked.", "es": "Entero 0-3 que resume la amplitud de la cartera de ingresos del hogar, derivado de `income_sources`. Codificado como: 0 = ninguna fuente de ingresos reportada; 1 = fuente \u00fanica; 2 = dos fuentes; 3 = tres o m\u00e1s fuentes. Indicador indirecto ligero de la resiliencia de ingresos utilizado junto con `livelihood_diversity_count`. Tomado de los indicadores del pilar Capacidad Adaptativa (AC) de FAO RIMA-II y el m\u00f3dulo de cartera de ingresos LSMS-ISA. Derivado (calculado a partir de las respuestas a los \u00edtems), no preguntado por separado.", "fr": "Entier 0-3 r\u00e9sumant l''ampleur du portefeuille de revenus du m\u00e9nage, d\u00e9riv\u00e9 de `income_sources`. Cod\u00e9 comme : 0 = aucune source de revenu d\u00e9clar\u00e9e ; 1 = source unique ; 2 = deux sources ; 3 = trois sources ou plus. Proxy l\u00e9ger de la r\u00e9silience des revenus utilis\u00e9 avec `livelihood_diversity_count`. Tir\u00e9 des indicateurs du pilier Capacit\u00e9 d''adaptation (AC) de FAO RIMA-II et du module portefeuille de revenus LSMS-ISA. D\u00e9riv\u00e9 (calcul\u00e9 \u00e0 partir des r\u00e9ponses aux items), non demand\u00e9 s\u00e9par\u00e9ment."}, "id": "income_diversification_index", "label": {"en": "Income diversification index (0-3)", "es": "\u00cdndice de diversificaci\u00f3n de ingresos (0-3)", "fr": "Indice de diversification des revenus (0-3)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
      bibliography_refs: fao-rima-2016
  income_seasonality:
    title:
      en: Income seasonality pattern
      fr: Schéma de saisonnalité des revenus
      es: Patrón de estacionalidad de ingresos
    description:
      en: 'Household-level assessment of income stability across the year, from stable year-round to highly irregular. Recall period: past 12 months. Drawn from the LSMS-ISA livelihood module, the FAO RIMA-II income component, and the Sphere 2018 Livelihoods chapter on seasonal vulnerability calendars. Together with `lean_season_months_count`, supports a seasonal-precarity flag for households whose income is insufficient for three or more months per year.'
      fr: 'Évaluation au niveau du ménage de la stabilité des revenus à travers l''année, allant de stable toute l''année à très irrégulière. Période de rappel : 12 derniers mois. Tirée du module des moyens de subsistance LSMS-ISA, de la composante revenus de FAO RIMA-II et du chapitre Moyens de subsistance de Sphère 2018 sur les calendriers de vulnérabilité saisonnière. Avec `lean_season_months_count`, soutient un signal de précarité saisonnière pour les ménages dont le revenu est insuffisant pendant trois mois ou plus par an.'
      es: 'Evaluación a nivel del hogar de la estabilidad de los ingresos a lo largo del año, desde estable todo el año hasta muy irregular. Período de recordatorio: últimos 12 meses. Tomada del módulo de medios de vida LSMS-ISA, el componente de ingresos de FAO RIMA-II y el capítulo de Medios de Vida de Esfera 2018 sobre calendarios de vulnerabilidad estacional. Junto con `lean_season_months_count`, apoya un indicador de precariedad estacional para hogares cuyo ingreso es insuficiente durante tres o más meses por año.'
    slot_uri: aidops:income_seasonality
    range: IncomeSeasonalityPattern
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Household-level assessment of income stability across the year, from stable year-round to highly irregular. Recall period: past 12 months. Drawn from the LSMS-ISA livelihood module, the FAO RIMA-II income component, and the Sphere 2018 Livelihoods chapter on seasonal vulnerability calendars. Together with `lean_season_months_count`, supports a seasonal-precarity flag for households whose income is insufficient for three or more months per year.", "es": "Evaluaci\u00f3n a nivel del hogar de la estabilidad de los ingresos a lo largo del a\u00f1o, desde estable todo el a\u00f1o hasta muy irregular. Per\u00edodo de recordatorio: \u00faltimos 12 meses. Tomada del m\u00f3dulo de medios de vida LSMS-ISA, el componente de ingresos de FAO RIMA-II y el cap\u00edtulo de Medios de Vida de Esfera 2018 sobre calendarios de vulnerabilidad estacional. Junto con `lean_season_months_count`, apoya un indicador de precariedad estacional para hogares cuyo ingreso es insuficiente durante tres o m\u00e1s meses por a\u00f1o.", "fr": "\u00c9valuation au niveau du m\u00e9nage de la stabilit\u00e9 des revenus \u00e0 travers l''ann\u00e9e, allant de stable toute l''ann\u00e9e \u00e0 tr\u00e8s irr\u00e9guli\u00e8re. P\u00e9riode de rappel : 12 derniers mois. Tir\u00e9e du module des moyens de subsistance LSMS-ISA, de la composante revenus de FAO RIMA-II et du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur les calendriers de vuln\u00e9rabilit\u00e9 saisonni\u00e8re. Avec `lean_season_months_count`, soutient un signal de pr\u00e9carit\u00e9 saisonni\u00e8re pour les m\u00e9nages dont le revenu est insuffisant pendant trois mois ou plus par an."}, "id": "income_seasonality", "label": {"en": "Income seasonality pattern", "es": "Patr\u00f3n de estacionalidad de ingresos", "fr": "Sch\u00e9ma de saisonnalit\u00e9 des revenus"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "income-seasonality-pattern"}'
      bibliography_refs: fao-rima-2016
  income_sources:
    title:
      en: Income sources (multi-select)
      fr: Sources de revenus (sélection multiple)
      es: Fuentes de ingresos (selección múltiple)
    description:
      en: 'Full portfolio of income sources the household receives, drawn from the PublicSchema `income-source` vocabulary. Multi-select variant of the PS `income_source` property (which is single-select and used for proxy means testing): this AidOps property captures the complete income-source portfolio for livelihoods analysis. Recall period: past 30 days. Drawn from the DHS-8 Household Questionnaire income source module, the MICS6 Household Questionnaire income module, and the LSMS-ISA income module.'
      fr: 'Portefeuille complet des sources de revenus que le ménage reçoit, tiré du vocabulaire PublicSchema `income-source`. Variante à sélection multiple de la propriété PS `income_source` (qui est à sélection unique et utilisée pour les tests des moyens par approximation) : cette propriété AidOps capture le portefeuille complet des sources de revenus pour l''analyse des moyens de subsistance. Période de rappel : 30 derniers jours. Tirée du module source de revenus du Questionnaire Ménage DHS-8, du module revenus du Questionnaire Ménage MICS6 et du module revenus LSMS-ISA.'
      es: 'Cartera completa de fuentes de ingresos que recibe el hogar, tomada del vocabulario PublicSchema `income-source`. Variante de selección múltiple de la propiedad PS `income_source` (que es de selección única y se usa para pruebas de medios indirectos): esta propiedad AidOps captura la cartera completa de fuentes de ingresos para el análisis de medios de vida. Período de recordatorio: últimos 30 días. Tomada del módulo de fuente de ingresos del Cuestionario de Hogar DHS-8, el módulo de ingresos del Cuestionario de Hogar MICS6 y el módulo de ingresos LSMS-ISA.'
    slot_uri: aidops:income_sources
