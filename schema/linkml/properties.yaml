  productive_asset_loss_since_crisis:
    title:
      en: Productive asset loss since crisis or displacement
      fr: Perte d'actifs productifs depuis la crise ou le déplacement
      es: Pérdida de activos productivos desde la crisis o desplazamiento
    description:
      en: 'Whether the household has lost or had to sell any productive assets since a crisis or displacement event. Asked only when `main_livelihood_activity` is not `aid_dependent`. Drawn from the FAO RIMA-II APT pillar, the LSMS-ISA asset change module, and the Sphere 2018 Livelihoods chapter on productive-asset protection. Distinct from `lcs_sold_productive_assets` in FoodSecurityProfile: that item asks about selling productive assets to meet food needs over the past 30 days; this item asks about broader loss or forced sale over the full crisis period, across all productive assets.'
      fr: 'Si le ménage a perdu ou a dû vendre des actifs productifs depuis une crise ou un événement de déplacement. Posé uniquement lorsque `main_livelihood_activity` n''est pas `aid_dependent`. Tiré du pilier APT de FAO RIMA-II, du module de changement d''actifs LSMS-ISA et du chapitre Moyens de subsistance de Sphère 2018 sur la protection des actifs productifs. Distinct de `lcs_sold_productive_assets` dans FoodSecurityProfile : cet item interroge la vente d''actifs productifs pour couvrir les besoins alimentaires sur les 30 derniers jours ; cet item interroge une perte plus large ou une vente forcée sur l''ensemble de la période de crise, pour tous les actifs productifs.'
      es: 'Si el hogar ha perdido o ha tenido que vender activos productivos desde una crisis o evento de desplazamiento. Se pregunta solo cuando `main_livelihood_activity` no es `aid_dependent`. Tomado del pilar APT de FAO RIMA-II, el módulo de cambio de activos LSMS-ISA y el capítulo de Medios de Vida de Esfera 2018 sobre protección de activos productivos. Distinto de `lcs_sold_productive_assets` en FoodSecurityProfile: ese ítem pregunta sobre la venta de activos productivos para satisfacer necesidades alimentarias en los últimos 30 días; este ítem pregunta sobre la pérdida más amplia o venta forzada durante todo el período de crisis, para todos los activos productivos.'
    slot_uri: aidops:productive_asset_loss_since_crisis
    range: YesNoNa
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household has lost or had to sell any productive assets since a crisis or displacement event. Asked only when `main_livelihood_activity` is not `aid_dependent`. Drawn from the FAO RIMA-II APT pillar, the LSMS-ISA asset change module, and the Sphere 2018 Livelihoods chapter on productive-asset protection. Distinct from `lcs_sold_productive_assets` in FoodSecurityProfile: that item asks about selling productive assets to meet food needs over the past 30 days; this item asks about broader loss or forced sale over the full crisis period, across all productive assets.", "es": "Si el hogar ha perdido o ha tenido que vender activos productivos desde una crisis o evento de desplazamiento. Se pregunta solo cuando `main_livelihood_activity` no es `aid_dependent`. Tomado del pilar APT de FAO RIMA-II, el m\u00f3dulo de cambio de activos LSMS-ISA y el cap\u00edtulo de Medios de Vida de Esfera 2018 sobre protecci\u00f3n de activos productivos. Distinto de `lcs_sold_productive_assets` en FoodSecurityProfile: ese \u00edtem pregunta sobre la venta de activos productivos para satisfacer necesidades alimentarias en los \u00faltimos 30 d\u00edas; este \u00edtem pregunta sobre la p\u00e9rdida m\u00e1s amplia o venta forzada durante todo el per\u00edodo de crisis, para todos los activos productivos.", "fr": "Si le m\u00e9nage a perdu ou a d\u00fb vendre des actifs productifs depuis une crise ou un \u00e9v\u00e9nement de d\u00e9placement. Pos\u00e9 uniquement lorsque `main_livelihood_activity` n''est pas `aid_dependent`. Tir\u00e9 du pilier APT de FAO RIMA-II, du module de changement d''actifs LSMS-ISA et du chapitre Moyens de subsistance de Sph\u00e8re 2018 sur la protection des actifs productifs. Distinct de `lcs_sold_productive_assets` dans FoodSecurityProfile : cet item interroge la vente d''actifs productifs pour couvrir les besoins alimentaires sur les 30 derniers jours ; cet item interroge une perte plus large ou une vente forc\u00e9e sur l''ensemble de la p\u00e9riode de crise, pour tous les actifs productifs."}, "id": "productive_asset_loss_since_crisis", "label": {"en": "Productive asset loss since crisis or displacement", "es": "P\u00e9rdida de activos productivos desde la crisis o desplazamiento", "fr": "Perte d''actifs productifs depuis la crise ou le d\u00e9placement"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-na"}'
      bibliography_refs: fao-rima-2016
  productive_asset_types_owned:
    title:
      en: Productive asset types owned or accessed
      fr: Types d'actifs productifs possédés ou accessibles
      es: Tipos de activos productivos poseídos o accedidos
    description:
      en: 'Categories of productive assets the household owns or has regular access to, from the `livelihood-asset-type` vocabulary. Multi-select, category-only (no quantities or values): the coarse-grained capture keeps the item at `sensitivity: sensitive` rather than `restricted`, while preserving the FAO RIMA-II Assets, Productive Tools, and Technology (APT) pillar signal. Drawn from the LSMS-ISA asset roster, the FAO RIMA-II APT pillar, and the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT). Distinct from the PS `household-asset` vocabulary (consumer durables / wealth proxies).'
      fr: 'Catégories d''actifs productifs que le ménage possède ou auxquels il a un accès régulier, issues du vocabulaire `livelihood-asset-type`. Sélection multiple, catégorie uniquement (sans quantité ni valeur) : la saisie grossière maintient l''item à `sensitivity: sensitive` plutôt que `restricted`, tout en préservant le signal du pilier Actifs, outils productifs et technologie (APT) de FAO RIMA-II. Tirée du registre des actifs LSMS-ISA, du pilier APT de FAO RIMA-II et des Directives volontaires de la FAO pour une gouvernance responsable des régimes fonciers (VGGT). Distincte du vocabulaire PublicSchema `household-asset` (biens de consommation durables / indicateurs indirects de richesse).'
      es: 'Categorías de activos productivos que el hogar posee o a los que tiene acceso regular, del vocabulario `livelihood-asset-type`. Selección múltiple, solo categoría (sin cantidades ni valores): la captura gruesa mantiene el ítem en `sensitivity: sensitive` en lugar de `restricted`, mientras preserva la señal del pilar Activos, Herramientas Productivas y Tecnología (APT) de FAO RIMA-II. Tomada del inventario de activos LSMS-ISA, el pilar APT de FAO RIMA-II y las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT). Distinta del vocabulario PublicSchema `household-asset` (bienes de consumo duraderos / indicadores indirectos de riqueza).'
    slot_uri: aidops:productive_asset_types_owned
    range: LivelihoodAssetType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Categories of productive assets the household owns or has regular access to, from the `livelihood-asset-type` vocabulary. Multi-select, category-only (no quantities or values): the coarse-grained capture keeps the item at `sensitivity: sensitive` rather than `restricted`, while preserving the FAO RIMA-II Assets, Productive Tools, and Technology (APT) pillar signal. Drawn from the LSMS-ISA asset roster, the FAO RIMA-II APT pillar, and the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT). Distinct from the PS `household-asset` vocabulary (consumer durables / wealth proxies).", "es": "Categor\u00edas de activos productivos que el hogar posee o a los que tiene acceso regular, del vocabulario `livelihood-asset-type`. Selecci\u00f3n m\u00faltiple, solo categor\u00eda (sin cantidades ni valores): la captura gruesa mantiene el \u00edtem en `sensitivity: sensitive` en lugar de `restricted`, mientras preserva la se\u00f1al del pilar Activos, Herramientas Productivas y Tecnolog\u00eda (APT) de FAO RIMA-II. Tomada del inventario de activos LSMS-ISA, el pilar APT de FAO RIMA-II y las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT). Distinta del vocabulario PublicSchema `household-asset` (bienes de consumo duraderos / indicadores indirectos de riqueza).", "fr": "Cat\u00e9gories d''actifs productifs que le m\u00e9nage poss\u00e8de ou auxquels il a un acc\u00e8s r\u00e9gulier, issues du vocabulaire `livelihood-asset-type`. S\u00e9lection multiple, cat\u00e9gorie uniquement (sans quantit\u00e9 ni valeur) : la saisie grossi\u00e8re maintient l''item \u00e0 `sensitivity: sensitive` plut\u00f4t que `restricted`, tout en pr\u00e9servant le signal du pilier Actifs, outils productifs et technologie (APT) de FAO RIMA-II. Tir\u00e9e du registre des actifs LSMS-ISA, du pilier APT de FAO RIMA-II et des Directives volontaires de la FAO pour une gouvernance responsable des r\u00e9gimes fonciers (VGGT). Distincte du vocabulaire PublicSchema `household-asset` (biens de consommation durables / indicateurs indirects de richesse)."}, "id": "productive_asset_types_owned", "label": {"en": "Productive asset types owned or accessed", "es": "Tipos de activos productivos pose\u00eddos o accedidos", "fr": "Types d''actifs productifs poss\u00e9d\u00e9s ou accessibles"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livelihood-asset-type"}'
      bibliography_refs: fao-rima-2016
  protection_priority_concern:
    title:
      en: Priority protection concern (self-reported, household)
      fr: Préoccupation de protection prioritaire (auto-déclarée, ménage)
      es: Preocupación de protección prioritaria (auto-reportada, hogar)
    description:
      en: The most serious protection concern the household currently faces, self-identified by the respondent. This is a prioritization question — it does not replace the specific module items, but allows respondents to flag their own priority concern, which may surface protection dimensions not captured by the module structure. Useful for qualitative reporting and participatory feedback. The vocabulary mirrors the profile's module structure. prefer_not_to_say is a valid response and must not be re-coded as missing. Based on UNHCR Participatory Assessment Guidance (2006); GPC PAF all three domains; REACH Protection Monitoring generic tool; Sphere Protection Principle 1.
      fr: La préoccupation de protection la plus grave à laquelle le ménage est actuellement confronté, auto-identifiée par le répondant. Il s'agit d'une question de priorisation — elle ne remplace pas les items spécifiques des modules, mais permet aux répondants de signaler leur propre préoccupation prioritaire, ce qui peut faire remonter des dimensions de protection non capturées par la structure du module. Utile pour les rapports qualitatifs et les retours participatifs. Le vocabulaire reflète la structure des modules du profil. prefer_not_to_say est une réponse valide et ne doit pas être recodée comme manquante. Fondé sur les Directives d'évaluation participative UNHCR (2006) ; GPC PAF les trois domaines ; outil générique de suivi de la protection REACH ; Sphère Principe de protection 1.
      es: El problema de protección más grave al que se enfrenta actualmente el hogar, auto-identificado por el encuestado. Esta es una pregunta de priorización — no reemplaza los ítems específicos de los módulos, sino que permite a los encuestados señalar su propia preocupación prioritaria, lo que puede revelar dimensiones de protección no capturadas por la estructura del módulo. Útil para informes cualitativos y retroalimentación participativa. El vocabulario refleja la estructura de módulos del perfil. prefer_not_to_say es una respuesta válida y no debe recodificarse como faltante. Basado en la Guía de Evaluación Participativa del ACNUR (2006); GPC PAF los tres dominios; herramienta genérica de monitoreo de protección de REACH; Principio de Protección 1 de Esfera.
