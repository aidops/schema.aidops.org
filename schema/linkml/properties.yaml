  herd_composition_by_species:
    title:
      en: Herd composition by species — current counts
      fr: Composition du troupeau par espèce — effectifs actuels
      es: Composición del rebaño por especie — conteos actuales
    description:
      en: 'Current count of animals in the household''s herd, one integer value per livestock-type code, collected for the pastoral household''s core mobile herd. Uses the same PS `livestock-type` vocabulary codes as AgricultureProfile `livestock_counts` but is scoped to pastoral households and the mobile herd context. If AgricultureProfile was collected in the same assessment round, this item should be skipped and cross-referenced to `AgricultureProfile.livestock_counts`; form implementations should implement this as a conditional skip. Recorded as a repeat group or grid with one row per species; `0` is a valid count when a species is not kept. In the Horn of Africa context (Somalia, Kenya ASAL), camels are the primary high-value species; in the Sahel, cattle dominate. The counts feed the TLU derivation (see `AgricultureProfile.tlu_total`). Grounded in LEGS 3rd edition initial assessment herd composition items, FSNAU seasonal assessment (LS-1 to LS-4), and IPC AFI pastoral annex Section 4.2. See also: `AgricultureProfile.livestock_counts` (conditional dependency: skip if AgricultureProfile co-administered).'
      fr: Effectif actuel d'animaux du troupeau du ménage, une valeur entière par code livestock-type, collecté pour le troupeau mobile principal du ménage pastoral. Utilise les mêmes codes du vocabulaire PS `livestock-type` que `livestock_counts` du AgricultureProfile mais est limité aux ménages pastoraux et au contexte du troupeau mobile. Si le AgricultureProfile a été collecté dans le même cycle d'évaluation, cet item doit être omis et croisé avec `AgricultureProfile.livestock_counts` ; les implémentations de formulaire doivent réaliser cela comme un saut conditionnel. Enregistré sous forme de groupe de répétition ou de grille avec une ligne par espèce ; `0` est un effectif valide lorsqu'une espèce n'est pas élevée. Dans le contexte Corne de l'Afrique (Somalie, Kenya ASAL), les chameaux sont l'espèce principale à haute valeur ; au Sahel, le bétail domine. Les effectifs alimentent le calcul de TLU (voir `AgricultureProfile.tlu_total`). Fondé sur les items de composition du troupeau de l'évaluation initiale LEGS 3e éd., l'évaluation saisonnière FSNAU (LS-1 à LS-4) et l'annexe pastoraliste IPC AFI Section 4.2.
      es: Conteo actual de animales en el rebaño del hogar, un valor entero por código livestock-type, recopilado para el rebaño móvil principal del hogar pastoral. Usa los mismos códigos del vocabulario PS `livestock-type` que `livestock_counts` de AgricultureProfile pero está limitado a hogares pastorales y al contexto de rebaño móvil. Si AgricultureProfile fue recopilado en la misma ronda de evaluación, este ítem debe omitirse y referenciarse cruzadamente a `AgricultureProfile.livestock_counts`; las implementaciones de formulario deben implementar esto como un salto condicional. Registrado como grupo de repetición o cuadrícula con una fila por especie; `0` es un conteo válido cuando una especie no se tiene. En el contexto del Cuerno de África (Somalia, Kenya ASAL), los camellos son la especie principal de alto valor; en el Sahel, el ganado bovino domina. Los conteos alimentan la derivación de UGT (ver `AgricultureProfile.tlu_total`).
    slot_uri: aidops:herd_composition_by_species
    range: LivestockType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "vsf-belgium-tufts-pastoralist-tools-2019"], "cardinality": "multiple", "category": "pastoral_herd", "core": true, "definition": {"en": "Current count of animals in the household''s herd, one integer value per livestock-type code, collected for the pastoral household''s core mobile herd. Uses the same PS `livestock-type` vocabulary codes as AgricultureProfile `livestock_counts` but is scoped to pastoral households and the mobile herd context. If AgricultureProfile was collected in the same assessment round, this item should be skipped and cross-referenced to `AgricultureProfile.livestock_counts`; form implementations should implement this as a conditional skip. Recorded as a repeat group or grid with one row per species; `0` is a valid count when a species is not kept. In the Horn of Africa context (Somalia, Kenya ASAL), camels are the primary high-value species; in the Sahel, cattle dominate. The counts feed the TLU derivation (see `AgricultureProfile.tlu_total`). Grounded in LEGS 3rd edition initial assessment herd composition items, FSNAU seasonal assessment (LS-1 to LS-4), and IPC AFI pastoral annex Section 4.2. See also: `AgricultureProfile.livestock_counts` (conditional dependency: skip if AgricultureProfile co-administered).", "es": "Conteo actual de animales en el reba\u00f1o del hogar, un valor entero por c\u00f3digo livestock-type, recopilado para el reba\u00f1o m\u00f3vil principal del hogar pastoral. Usa los mismos c\u00f3digos del vocabulario PS `livestock-type` que `livestock_counts` de AgricultureProfile pero est\u00e1 limitado a hogares pastorales y al contexto de reba\u00f1o m\u00f3vil. Si AgricultureProfile fue recopilado en la misma ronda de evaluaci\u00f3n, este \u00edtem debe omitirse y referenciarse cruzadamente a `AgricultureProfile.livestock_counts`; las implementaciones de formulario deben implementar esto como un salto condicional. Registrado como grupo de repetici\u00f3n o cuadr\u00edcula con una fila por especie; `0` es un conteo v\u00e1lido cuando una especie no se tiene. En el contexto del Cuerno de \u00c1frica (Somalia, Kenya ASAL), los camellos son la especie principal de alto valor; en el Sahel, el ganado bovino domina. Los conteos alimentan la derivaci\u00f3n de UGT (ver `AgricultureProfile.tlu_total`).", "fr": "Effectif actuel d''animaux du troupeau du m\u00e9nage, une valeur enti\u00e8re par code livestock-type, collect\u00e9 pour le troupeau mobile principal du m\u00e9nage pastoral. Utilise les m\u00eames codes du vocabulaire PS `livestock-type` que `livestock_counts` du AgricultureProfile mais est limit\u00e9 aux m\u00e9nages pastoraux et au contexte du troupeau mobile. Si le AgricultureProfile a \u00e9t\u00e9 collect\u00e9 dans le m\u00eame cycle d''\u00e9valuation, cet item doit \u00eatre omis et crois\u00e9 avec `AgricultureProfile.livestock_counts` ; les impl\u00e9mentations de formulaire doivent r\u00e9aliser cela comme un saut conditionnel. Enregistr\u00e9 sous forme de groupe de r\u00e9p\u00e9tition ou de grille avec une ligne par esp\u00e8ce ; `0` est un effectif valide lorsqu''une esp\u00e8ce n''est pas \u00e9lev\u00e9e. Dans le contexte Corne de l''Afrique (Somalie, Kenya ASAL), les chameaux sont l''esp\u00e8ce principale \u00e0 haute valeur ; au Sahel, le b\u00e9tail domine. Les effectifs alimentent le calcul de TLU (voir `AgricultureProfile.tlu_total`). Fond\u00e9 sur les items de composition du troupeau de l''\u00e9valuation initiale LEGS 3e \u00e9d., l''\u00e9valuation saisonni\u00e8re FSNAU (LS-1 \u00e0 LS-4) et l''annexe pastoraliste IPC AFI Section 4.2."}, "id": "herd_composition_by_species", "label": {"en": "Herd composition by species \u2014 current counts", "es": "Composici\u00f3n del reba\u00f1o por especie \u2014 conteos actuales", "fr": "Composition du troupeau par esp\u00e8ce \u2014 effectifs actuels"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": "livestock-type"}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,vsf-belgium-tufts-pastoralist-tools-2019
  herd_trend_since_crisis:
    title:
      en: Herd size trend since reference period
      fr: Tendance de la taille du troupeau depuis la période de référence
      es: Tendencia del tamaño del rebaño desde el período de referencia
    description:
      en: Directional change in the household's total herd size since a reference event or the same season in the prior year. The reference event or baseline period is defined in the survey session metadata (not on this profile) to ensure comparability across assessment rounds — typically the same survey round from the prior year or a named crisis onset date (following FSNAU and FEWSNET Livelihoods Monitoring Framework practice). This is the most tractable single-item herd-dynamics indicator used in the IPC AFI pastoral annex (Section 4.2) and FSNAU herd-trend items. It is a directional perception item, not a precise count change; use `livestock_losses_count_past_12mo` and `herd_composition_by_species` for quantitative attrition analysis. Response uses vocabulary `herd-trend`. Grounded in IPC AFI pastoral annex Section 4.2, LEGS 3rd edition initial assessment, FSNAU herd-trend items, and FEWSNET Livelihoods Monitoring Framework.
      fr: Changement directionnel dans la taille totale du troupeau du ménage depuis un événement de référence ou la même saison de l'année précédente. L'événement de référence ou la période de base est défini dans les métadonnées de la session d'enquête (et non sur ce profil) pour assurer la comparabilité entre les cycles d'évaluation — généralement le même cycle d'enquête de l'année précédente ou une date de début de crise nommée. Il s'agit de l'indicateur le plus simple de dynamique du troupeau utilisé dans l'annexe pastoraliste IPC AFI (Section 4.2) et les items de tendance du troupeau FSNAU. C'est un item de perception directionnel, non un changement d'effectif précis. Utilise le vocabulaire `herd-trend`.
      es: Cambio direccional en el tamaño total del rebaño del hogar desde un evento de referencia o la misma estación del año anterior. El evento de referencia o período base se define en los metadatos de la sesión de encuesta (no en este perfil) para garantizar comparabilidad entre rondas de evaluación. Es el indicador de dinámica del rebaño más manejable utilizado en el anexo pastoralista IPC AFI (Sección 4.2) y los ítems de tendencia del rebaño FSNAU. Es un ítem de percepción direccional, no un cambio de conteo preciso. Usa el vocabulario `herd-trend`.
    slot_uri: aidops:herd_trend_since_crisis
    range: HerdTrend
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_herd", "core": true, "definition": {"en": "Directional change in the household''s total herd size since a reference event or the same season in the prior year. The reference event or baseline period is defined in the survey session metadata (not on this profile) to ensure comparability across assessment rounds \u2014 typically the same survey round from the prior year or a named crisis onset date (following FSNAU and FEWSNET Livelihoods Monitoring Framework practice). This is the most tractable single-item herd-dynamics indicator used in the IPC AFI pastoral annex (Section 4.2) and FSNAU herd-trend items. It is a directional perception item, not a precise count change; use `livestock_losses_count_past_12mo` and `herd_composition_by_species` for quantitative attrition analysis. Response uses vocabulary `herd-trend`. Grounded in IPC AFI pastoral annex Section 4.2, LEGS 3rd edition initial assessment, FSNAU herd-trend items, and FEWSNET Livelihoods Monitoring Framework.", "es": "Cambio direccional en el tama\u00f1o total del reba\u00f1o del hogar desde un evento de referencia o la misma estaci\u00f3n del a\u00f1o anterior. El evento de referencia o per\u00edodo base se define en los metadatos de la sesi\u00f3n de encuesta (no en este perfil) para garantizar comparabilidad entre rondas de evaluaci\u00f3n. Es el indicador de din\u00e1mica del reba\u00f1o m\u00e1s manejable utilizado en el anexo pastoralista IPC AFI (Secci\u00f3n 4.2) y los \u00edtems de tendencia del reba\u00f1o FSNAU. Es un \u00edtem de percepci\u00f3n direccional, no un cambio de conteo preciso. Usa el vocabulario `herd-trend`.", "fr": "Changement directionnel dans la taille totale du troupeau du m\u00e9nage depuis un \u00e9v\u00e9nement de r\u00e9f\u00e9rence ou la m\u00eame saison de l''ann\u00e9e pr\u00e9c\u00e9dente. L''\u00e9v\u00e9nement de r\u00e9f\u00e9rence ou la p\u00e9riode de base est d\u00e9fini dans les m\u00e9tadonn\u00e9es de la session d''enqu\u00eate (et non sur ce profil) pour assurer la comparabilit\u00e9 entre les cycles d''\u00e9valuation \u2014 g\u00e9n\u00e9ralement le m\u00eame cycle d''enqu\u00eate de l''ann\u00e9e pr\u00e9c\u00e9dente ou une date de d\u00e9but de crise nomm\u00e9e. Il s''agit de l''indicateur le plus simple de dynamique du troupeau utilis\u00e9 dans l''annexe pastoraliste IPC AFI (Section 4.2) et les items de tendance du troupeau FSNAU. C''est un item de perception directionnel, non un changement d''effectif pr\u00e9cis. Utilise le vocabulaire `herd-trend`."}, "id": "herd_trend_since_crisis", "label": {"en": "Herd size trend since reference period", "es": "Tendencia del tama\u00f1o del reba\u00f1o desde el per\u00edodo de referencia", "fr": "Tendance de la taille du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "herd-trend"}'
