    range: AapInfoChannel
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "cardinality": "multiple", "category": "aap_information", "core": false, "definition": {"en": "Channel(s) through which the household prefers to receive information from aid providers. Multi-select: respondents may identify several. Used to design context-appropriate communications strategies aligned to how affected people actually wish to be reached (CHS 2024 Commitment 4 and IFRC CEA Toolkit accessibility principle). Ground Truth Solutions perception surveys consistently include a channel-preference item.", "es": "Canal(es) por los cuales el hogar prefiere recibir informaci\u00f3n de los actores humanitarios. Selecci\u00f3n m\u00faltiple: los encuestados pueden identificar varios. Se utiliza para dise\u00f1ar estrategias de comunicaci\u00f3n apropiadas al contexto, alineadas con la forma en que las personas afectadas desean realmente ser alcanzadas (Compromiso 4 de la CHS 2024 y principio de accesibilidad del Kit de Herramientas CEA de la FICR). Las encuestas de percepci\u00f3n de Ground Truth Solutions incluyen sistem\u00e1ticamente un \u00edtem de preferencia de canal.", "fr": "Canal(ux) par lequel/lesquels le m\u00e9nage pr\u00e9f\u00e8re recevoir des informations des intervenants. S\u00e9lection multiple : les r\u00e9pondants peuvent en identifier plusieurs. Utilis\u00e9 pour concevoir des strat\u00e9gies de communication adapt\u00e9es au contexte, align\u00e9es sur la fa\u00e7on dont les personnes affect\u00e9es souhaitent r\u00e9ellement \u00eatre atteintes (Engagement 4 de la CHS 2024 et principe d''accessibilit\u00e9 du Toolkit CEA de la FICR). Les enqu\u00eates de perception de Ground Truth Solutions incluent syst\u00e9matiquement un item sur la pr\u00e9f\u00e9rence de canal."}, "id": "aap_info_channel_preferred", "label": {"en": "AAP: Preferred channel for receiving information", "es": "Rendici\u00f3n de cuentas: Canal preferido para recibir informaci\u00f3n", "fr": "Redevabilit\u00e9 : Canal pr\u00e9f\u00e9r\u00e9 pour recevoir l''information"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-info-channel"}'
