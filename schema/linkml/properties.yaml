  hf_water_source_on_site:
    title:
      en: Water source on-site
      fr: Source d'eau sur site
      es: Fuente de agua en el sitio
    description:
      en: 'Whether the facility has a water source inside the facility or on the facility grounds. `yes` if functioning at time of visit; `yes_but_not_functional` if present but not providing water today; `no` otherwise. SARA tracer for basic amenities: improved water source on-site (or within 500 m), functional at time of visit. Observed by the enumerator.'
      fr: 'Si l''établissement dispose d''une source d''eau à l''intérieur ou sur le terrain de l''établissement. `yes` si fonctionnelle au moment de la visite ; `yes_but_not_functional` si présente mais ne fournissant pas d''eau aujourd''hui ; `no` sinon. Indicateur traceur SARA pour les aménités de base : source d''eau améliorée sur site (ou à moins de 500 m), fonctionnelle au moment de la visite. Observé par l''enquêteur.'
      es: 'Si el establecimiento tiene una fuente de agua dentro del establecimiento o en su terreno. `yes` si funciona en el momento de la visita; `yes_but_not_functional` si está presente pero no suministra agua hoy; `no` en caso contrario. Indicador trazador SARA para servicios básicos: fuente de agua mejorada en el sitio (o a menos de 500 m), funcional en el momento de la visita. Observado por el enumerador.'
    slot_uri: aidops:hf_water_source_on_site
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "water", "core": true, "definition": {"en": "Whether the facility has a water source inside the facility or on the facility grounds. `yes` if functioning at time of visit; `yes_but_not_functional` if present but not providing water today; `no` otherwise. SARA tracer for basic amenities: improved water source on-site (or within 500 m), functional at time of visit. Observed by the enumerator.", "es": "Si el establecimiento tiene una fuente de agua dentro del establecimiento o en su terreno. `yes` si funciona en el momento de la visita; `yes_but_not_functional` si est\u00e1 presente pero no suministra agua hoy; `no` en caso contrario. Indicador trazador SARA para servicios b\u00e1sicos: fuente de agua mejorada en el sitio (o a menos de 500 m), funcional en el momento de la visita. Observado por el enumerador.", "fr": "Si l''\u00e9tablissement dispose d''une source d''eau \u00e0 l''int\u00e9rieur ou sur le terrain de l''\u00e9tablissement. `yes` si fonctionnelle au moment de la visite ; `yes_but_not_functional` si pr\u00e9sente mais ne fournissant pas d''eau aujourd''hui ; `no` sinon. Indicateur traceur SARA pour les am\u00e9nit\u00e9s de base : source d''eau am\u00e9lior\u00e9e sur site (ou \u00e0 moins de 500 m), fonctionnelle au moment de la visite. Observ\u00e9 par l''enqu\u00eateur."}, "id": "hf_water_source_on_site", "label": {"en": "Water source on-site", "es": "Fuente de agua en el sitio", "fr": "Source d''eau sur site"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
      bibliography_refs: who-hhfa-2022
  hf_water_source_type:
    title:
      en: Main water source type at facility
      fr: Type de source d'eau principale à l'établissement
      es: Tipo de fuente de agua principal del establecimiento
    description:
      en: 'Type of the facility''s main water source, using the PS `water-source` vocabulary (improved/unimproved JMP categories: piped, borehole, protected dug well, unprotected dug well, tanker-truck, surface water, etc.). Observed by the enumerator. WASH FIT indicator; JMP ladder alignment. Extended (non-core).'
      fr: 'Type de la source d''eau principale de l''établissement, selon le vocabulaire PS `water-source` (catégories JMP améliorée/non améliorée : canalisation, forage, puits creusé protégé, puits creusé non protégé, camion-citerne, eau de surface, etc.). Observé par l''enquêteur. Indicateur WASH FIT ; aligné sur l''échelle JMP. Étendu (non-core).'
      es: 'Tipo de la fuente de agua principal del establecimiento, usando el vocabulario PS `water-source` (categorías JMP mejorada/no mejorada: tubería, perforación, pozo cavado protegido, pozo cavado no protegido, camión cisterna, agua superficial, etc.). Observado por el enumerador. Indicador WASH FIT; alineación con la escalera JMP. Extendido (no-core).'
    slot_uri: aidops:hf_water_source_type
    range: WaterSource
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022", "who-unicef-wash-fit-2022"], "cardinality": "single", "category": "water", "core": false, "definition": {"en": "Type of the facility''s main water source, using the PS `water-source` vocabulary (improved/unimproved JMP categories: piped, borehole, protected dug well, unprotected dug well, tanker-truck, surface water, etc.). Observed by the enumerator. WASH FIT indicator; JMP ladder alignment. Extended (non-core).", "es": "Tipo de la fuente de agua principal del establecimiento, usando el vocabulario PS `water-source` (categor\u00edas JMP mejorada/no mejorada: tuber\u00eda, perforaci\u00f3n, pozo cavado protegido, pozo cavado no protegido, cami\u00f3n cisterna, agua superficial, etc.). Observado por el enumerador. Indicador WASH FIT; alineaci\u00f3n con la escalera JMP. Extendido (no-core).", "fr": "Type de la source d''eau principale de l''\u00e9tablissement, selon le vocabulaire PS `water-source` (cat\u00e9gories JMP am\u00e9lior\u00e9e/non am\u00e9lior\u00e9e : canalisation, forage, puits creus\u00e9 prot\u00e9g\u00e9, puits creus\u00e9 non prot\u00e9g\u00e9, camion-citerne, eau de surface, etc.). Observ\u00e9 par l''enqu\u00eateur. Indicateur WASH FIT ; align\u00e9 sur l''\u00e9chelle JMP. \u00c9tendu (non-core)."}, "id": "hf_water_source_type", "label": {"en": "Main water source type at facility", "es": "Tipo de fuente de agua principal del establecimiento", "fr": "Type de source d''eau principale \u00e0 l''\u00e9tablissement"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "water-source"}'
      bibliography_refs: who-hhfa-2022,who-unicef-wash-fit-2022
  hh_civil_registry_access:
    title:
      en: Civil registry access (household)
      fr: Accès à l'état civil (ménage)
      es: Acceso al registro civil (hogar)
    description:
      en: 'Whether the household could obtain or replace a civil document (national ID card, marriage certificate, civil registry record) if needed. Practical barriers mean distance, cost, lack of knowledge of process, or office closure. Legal barriers mean the household is legally ineligible or faces discrimination. The distinction is important for programme response: practical barriers require outreach; legal barriers require advocacy. Based on GPC PAF Domain 2 documentation access indicator; UNHCR Protection Monitoring Framework (2016) civil documentation indicator; REACH Syria (2022).'
      fr: 'Si le ménage pourrait obtenir ou remplacer un document civil (carte d''identité nationale, acte de mariage, enregistrement d''état civil) si nécessaire. Les obstacles pratiques désignent la distance, le coût, le manque d''information sur la procédure ou la fermeture des bureaux. Les obstacles juridiques signifient que le ménage est légalement inéligible ou fait l''objet de discrimination. La distinction est importante pour la réponse programmatique : les obstacles pratiques nécessitent des activités de sensibilisation ; les obstacles juridiques nécessitent du plaidoyer. Fondé sur l''indicateur d''accès à la documentation du GPC PAF Domaine 2 ; Cadre de suivi de la protection UNHCR (2016) ; REACH Syrie (2022).'
      es: 'Si el hogar podría obtener o reemplazar un documento civil (cédula de identidad nacional, acta de matrimonio, registro civil) en caso de necesitarlo. Las barreras prácticas son la distancia, el costo, la falta de conocimiento del proceso o el cierre de oficinas. Las barreras legales significan que el hogar es legalmente inelegible o enfrenta discriminación. La distinción es importante para la respuesta programática: las barreras prácticas requieren actividades de divulgación; las barreras legales requieren abogacía. Basado en el indicador de acceso a la documentación del GPC PAF Dominio 2; Marco de Monitoreo de Protección del ACNUR (2016); REACH Siria (2022).'
    slot_uri: aidops:hh_civil_registry_access
    range: CivilRegistryAccess
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "iasc-protection-indicators-2021", "reach-protection-monitoring-2022", "unhcr-protection-monitoring-2016"], "cardinality": "single", "category": "civil_documentation", "core": true, "definition": {"en": "Whether the household could obtain or replace a civil document (national ID card, marriage certificate, civil registry record) if needed. Practical barriers mean distance, cost, lack of knowledge of process, or office closure. Legal barriers mean the household is legally ineligible or faces discrimination. The distinction is important for programme response: practical barriers require outreach; legal barriers require advocacy. Based on GPC PAF Domain 2 documentation access indicator; UNHCR Protection Monitoring Framework (2016) civil documentation indicator; REACH Syria (2022).", "es": "Si el hogar podr\u00eda obtener o reemplazar un documento civil (c\u00e9dula de identidad nacional, acta de matrimonio, registro civil) en caso de necesitarlo. Las barreras pr\u00e1cticas son la distancia, el costo, la falta de conocimiento del proceso o el cierre de oficinas. Las barreras legales significan que el hogar es legalmente inelegible o enfrenta discriminaci\u00f3n. La distinci\u00f3n es importante para la respuesta program\u00e1tica: las barreras pr\u00e1cticas requieren actividades de divulgaci\u00f3n; las barreras legales requieren abogac\u00eda. Basado en el indicador de acceso a la documentaci\u00f3n del GPC PAF Dominio 2; Marco de Monitoreo de Protecci\u00f3n del ACNUR (2016); REACH Siria (2022).", "fr": "Si le m\u00e9nage pourrait obtenir ou remplacer un document civil (carte d''identit\u00e9 nationale, acte de mariage, enregistrement d''\u00e9tat civil) si n\u00e9cessaire. Les obstacles pratiques d\u00e9signent la distance, le co\u00fbt, le manque d''information sur la proc\u00e9dure ou la fermeture des bureaux. Les obstacles juridiques signifient que le m\u00e9nage est l\u00e9galement in\u00e9ligible ou fait l''objet de discrimination. La distinction est importante pour la r\u00e9ponse programmatique : les obstacles pratiques n\u00e9cessitent des activit\u00e9s de sensibilisation ; les obstacles juridiques n\u00e9cessitent du plaidoyer. Fond\u00e9 sur l''indicateur d''acc\u00e8s \u00e0 la documentation du GPC PAF Domaine 2 ; Cadre de suivi de la protection UNHCR (2016) ; REACH Syrie (2022)."}, "id": "hh_civil_registry_access", "label": {"en": "Civil registry access (household)", "es": "Acceso al registro civil (hogar)", "fr": "Acc\u00e8s \u00e0 l''\u00e9tat civil (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "civil-registry-access"}'
      bibliography_refs: gpc-paf-2021,iasc-protection-indicators-2021,reach-protection-monitoring-2022,unhcr-protection-monitoring-2016
  hh_grew_crops_last_season:
    title:
      en: Household grew crops during the last completed agricultural season
      fr: Le ménage a cultivé des cultures au cours de la dernière saison agricole complète
      es: El hogar cultivó cultivos durante la última temporada agrícola completa
    description:
      en: Whether the household grew any crops (including vegetables, fruits, or grain crops) for home consumption or for sale during the last completed agricultural season. Gateway item for the crop-production block; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access, and post_harvest_loss_magnitude skip when this is `no` or `dont_know`. Asked only when `hh_has_cultivable_land` is `yes`. Wording drawn from the MICS6 AFP module and DHS household food-production items. `dont_know` is retained as a distinct valid response.
      fr: Si le ménage a cultivé des cultures (y compris des légumes, des fruits ou des céréales) pour la consommation domestique ou la vente au cours de la dernière saison agricole complète. Question porte d'entrée du bloc production végétale ; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access et post_harvest_loss_magnitude sont sautés lorsque cette réponse est `no` ou `dont_know`. Posée uniquement lorsque `hh_has_cultivable_land` est `yes`. Formulation tirée du module AFP de MICS6 et des items de production alimentaire des ménages DHS. `dont_know` est conservé comme réponse valide distincte.
      es: Si el hogar cultivó algún tipo de cultivo (incluidos vegetales, frutas o granos) para consumo del hogar o para venta durante la última temporada agrícola completa. Ítem de entrada al bloque de producción de cultivos; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access y post_harvest_loss_magnitude se omiten cuando esta respuesta es `no` o `dont_know`. Se pregunta solo cuando `hh_has_cultivable_land` es `yes`. Formulación tomada del módulo AFP de MICS6 y los ítems de producción alimentaria de hogares DHS. `dont_know` se mantiene como respuesta válida distinta.
    slot_uri: aidops:hh_grew_crops_last_season
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household grew any crops (including vegetables, fruits, or grain crops) for home consumption or for sale during the last completed agricultural season. Gateway item for the crop-production block; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access, and post_harvest_loss_magnitude skip when this is `no` or `dont_know`. Asked only when `hh_has_cultivable_land` is `yes`. Wording drawn from the MICS6 AFP module and DHS household food-production items. `dont_know` is retained as a distinct valid response.", "es": "Si el hogar cultiv\u00f3 alg\u00fan tipo de cultivo (incluidos vegetales, frutas o granos) para consumo del hogar o para venta durante la \u00faltima temporada agr\u00edcola completa. \u00cdtem de entrada al bloque de producci\u00f3n de cultivos; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access y post_harvest_loss_magnitude se omiten cuando esta respuesta es `no` o `dont_know`. Se pregunta solo cuando `hh_has_cultivable_land` es `yes`. Formulaci\u00f3n tomada del m\u00f3dulo AFP de MICS6 y los \u00edtems de producci\u00f3n alimentaria de hogares DHS. `dont_know` se mantiene como respuesta v\u00e1lida distinta.", "fr": "Si le m\u00e9nage a cultiv\u00e9 des cultures (y compris des l\u00e9gumes, des fruits ou des c\u00e9r\u00e9ales) pour la consommation domestique ou la vente au cours de la derni\u00e8re saison agricole compl\u00e8te. Question porte d''entr\u00e9e du bloc production v\u00e9g\u00e9tale ; main_crops_grown, crop_use_purpose, seed_source_main, fertilizer_used_last_season, improved_seeds_used_last_season, crop_loss_shock_past_season, post_harvest_storage_access et post_harvest_loss_magnitude sont saut\u00e9s lorsque cette r\u00e9ponse est `no` ou `dont_know`. Pos\u00e9e uniquement lorsque `hh_has_cultivable_land` est `yes`. Formulation tir\u00e9e du module AFP de MICS6 et des items de production alimentaire des m\u00e9nages DHS. `dont_know` est conserv\u00e9 comme r\u00e9ponse valide distincte."}, "id": "hh_grew_crops_last_season", "label": {"en": "Household grew crops during the last completed agricultural season", "es": "El hogar cultiv\u00f3 cultivos durante la \u00faltima temporada agr\u00edcola completa", "fr": "Le m\u00e9nage a cultiv\u00e9 des cultures au cours de la derni\u00e8re saison agricole compl\u00e8te"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  hh_has_birth_certificates:
