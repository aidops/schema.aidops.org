    range: MeasurementType
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology"], "cardinality": "single", "definition": {"en": "How height was measured: recumbent (lying down, for children under two years) or standing. WHO protocols prescribe recumbent length for children under 24 months and standing height from 24 months onward; substituting one for the other introduces a small systematic bias that affects z-score classification.", "es": "C\u00f3mo se midi\u00f3 la talla: acostado (para ni\u00f1os menores de dos a\u00f1os) o de pie. Los protocolos de la OMS prescriben longitud en dec\u00fabito para ni\u00f1os menores de 24 meses y talla de pie a partir de los 24 meses; sustituir una por otra introduce un peque\u00f1o sesgo sistem\u00e1tico que afecta la clasificaci\u00f3n por puntaje z.", "fr": "Comment la taille a \u00e9t\u00e9 mesur\u00e9e : en position couch\u00e9e (pour les enfants de moins de deux ans) ou debout. Les protocoles de l''OMS prescrivent la longueur couch\u00e9e pour les enfants de moins de 24 mois et la taille debout \u00e0 partir de 24 mois ; substituer l''une \u00e0 l''autre introduit un l\u00e9ger biais syst\u00e9matique qui affecte la classification par z-score."}, "id": "measurement_type", "label": {"en": "Measurement type", "es": "Tipo de medici\u00f3n", "fr": "Type de mesure"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["smart"], "vocabulary": "measurement-type"}'
