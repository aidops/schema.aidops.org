  cn_assessment_method:
    title:
      en: Community assessment method
      fr: Méthode d'évaluation communautaire
      es: Método de evaluación comunitaria
    description:
      en: 'The method used for this community-level assessment session: focus group discussion, key informant interview, community meeting, direct observation, or mixed methods. First item in the community-needs form; drives interpretation of informant composition and data-quality downstream. Based on IASC MIRA Phase 2 methodology and the ACAPS Technical Brief (2014) primary-data method taxonomy.'
      fr: 'Méthode utilisée pour cette séance d''évaluation au niveau communautaire : discussion de groupe focalisée, entretien avec informateur clé, réunion communautaire, observation directe ou méthodes mixtes. Premier item du formulaire des besoins communautaires ; oriente l''interprétation de la composition des informateurs et de la qualité des données en aval. Fondé sur la méthodologie de la Phase 2 de MIRA de l''IASC et la taxonomie des méthodes de collecte primaire de la note technique d''ACAPS (2014).'
      es: 'Método utilizado para esta sesión de evaluación a nivel comunitario: grupo focal, entrevista a informante clave, reunión comunitaria, observación directa o métodos mixtos. Primer ítem del formulario de necesidades comunitarias; orienta la interpretación de la composición de informantes y la calidad de los datos aguas abajo. Basado en la metodología de la Fase 2 de MIRA del IASC y la taxonomía de métodos de datos primarios de la nota técnica de ACAPS (2014).'
    slot_uri: aidops:cn_assessment_method
    range: AssessmentMethodType
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014", "ifrc-vca-2020", "reach-hsm-2023"], "cardinality": "single", "category": "administrative", "core": true, "definition": {"en": "The method used for this community-level assessment session: focus group discussion, key informant interview, community meeting, direct observation, or mixed methods. First item in the community-needs form; drives interpretation of informant composition and data-quality downstream. Based on IASC MIRA Phase 2 methodology and the ACAPS Technical Brief (2014) primary-data method taxonomy.", "es": "M\u00e9todo utilizado para esta sesi\u00f3n de evaluaci\u00f3n a nivel comunitario: grupo focal, entrevista a informante clave, reuni\u00f3n comunitaria, observaci\u00f3n directa o m\u00e9todos mixtos. Primer \u00edtem del formulario de necesidades comunitarias; orienta la interpretaci\u00f3n de la composici\u00f3n de informantes y la calidad de los datos aguas abajo. Basado en la metodolog\u00eda de la Fase 2 de MIRA del IASC y la taxonom\u00eda de m\u00e9todos de datos primarios de la nota t\u00e9cnica de ACAPS (2014).", "fr": "M\u00e9thode utilis\u00e9e pour cette s\u00e9ance d''\u00e9valuation au niveau communautaire : discussion de groupe focalis\u00e9e, entretien avec informateur cl\u00e9, r\u00e9union communautaire, observation directe ou m\u00e9thodes mixtes. Premier item du formulaire des besoins communautaires ; oriente l''interpr\u00e9tation de la composition des informateurs et de la qualit\u00e9 des donn\u00e9es en aval. Fond\u00e9 sur la m\u00e9thodologie de la Phase 2 de MIRA de l''IASC et la taxonomie des m\u00e9thodes de collecte primaire de la note technique d''ACAPS (2014)."}, "id": "cn_assessment_method", "label": {"en": "Community assessment method", "es": "M\u00e9todo de evaluaci\u00f3n comunitaria", "fr": "M\u00e9thode d''\u00e9valuation communautaire"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "assessment-method-type"}'
      bibliography_refs: acaps-assessment-2014,ifrc-vca-2020,reach-hsm-2023
  cn_assessment_observation_notes:
    title:
      en: Enumerator observation notes
      fr: Notes d'observation de l'enquêteur
      es: Notas de observación del encuestador
    description:
      en: Free-text enumerator observation notes recording visible indicators (e.g., visible damage, market activity, service availability, crowding, presence of aid actors) that corroborate or contradict informant responses. Maximum 1000 characters. Non-sensitive by default, but programme teams should review before publication because notes may accidentally mention specific individuals and require redaction. Derived from ACAPS Technical Brief §5.3 (triangulation of key-informant interviews with direct observation) and MIRA Phase 2 field guidance.
      fr: Notes d'observation en texte libre par l'enquêteur consignant les indicateurs visibles (par exemple, dommages visibles, activité des marchés, disponibilité des services, surpopulation, présence d'acteurs humanitaires) qui corroborent ou contredisent les réponses des informateurs. Maximum 1000 caractères. Non sensible par défaut, mais les équipes de programme doivent les examiner avant publication car les notes peuvent mentionner par inadvertance des personnes précises et nécessiter un caviardage. Tiré du § 5.3 de la note technique d'ACAPS (triangulation des entretiens avec des informateurs clés et de l'observation directe) et des orientations terrain de la Phase 2 de MIRA.
      es: Notas de observación en texto libre del encuestador, que registran indicadores visibles (por ejemplo, daños visibles, actividad de mercados, disponibilidad de servicios, hacinamiento, presencia de actores humanitarios) que corroboran o contradicen las respuestas de los informantes. Máximo 1000 caracteres. No sensible por defecto, pero los equipos de programa deben revisarlas antes de su publicación porque las notas pueden mencionar accidentalmente a personas específicas y requerir redacción. Derivado del § 5.3 de la nota técnica de ACAPS (triangulación de entrevistas con informantes clave y observación directa) y de las orientaciones de campo de la Fase 2 de MIRA.
    slot_uri: aidops:cn_assessment_observation_notes
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014"], "cardinality": "single", "category": "context", "core": false, "definition": {"en": "Free-text enumerator observation notes recording visible indicators (e.g., visible damage, market activity, service availability, crowding, presence of aid actors) that corroborate or contradict informant responses. Maximum 1000 characters. Non-sensitive by default, but programme teams should review before publication because notes may accidentally mention specific individuals and require redaction. Derived from ACAPS Technical Brief \u00a75.3 (triangulation of key-informant interviews with direct observation) and MIRA Phase 2 field guidance.", "es": "Notas de observaci\u00f3n en texto libre del encuestador, que registran indicadores visibles (por ejemplo, da\u00f1os visibles, actividad de mercados, disponibilidad de servicios, hacinamiento, presencia de actores humanitarios) que corroboran o contradicen las respuestas de los informantes. M\u00e1ximo 1000 caracteres. No sensible por defecto, pero los equipos de programa deben revisarlas antes de su publicaci\u00f3n porque las notas pueden mencionar accidentalmente a personas espec\u00edficas y requerir redacci\u00f3n. Derivado del \u00a7 5.3 de la nota t\u00e9cnica de ACAPS (triangulaci\u00f3n de entrevistas con informantes clave y observaci\u00f3n directa) y de las orientaciones de campo de la Fase 2 de MIRA.", "fr": "Notes d''observation en texte libre par l''enqu\u00eateur consignant les indicateurs visibles (par exemple, dommages visibles, activit\u00e9 des march\u00e9s, disponibilit\u00e9 des services, surpopulation, pr\u00e9sence d''acteurs humanitaires) qui corroborent ou contredisent les r\u00e9ponses des informateurs. Maximum 1000 caract\u00e8res. Non sensible par d\u00e9faut, mais les \u00e9quipes de programme doivent les examiner avant publication car les notes peuvent mentionner par inadvertance des personnes pr\u00e9cises et n\u00e9cessiter un caviardage. Tir\u00e9 du \u00a7 5.3 de la note technique d''ACAPS (triangulation des entretiens avec des informateurs cl\u00e9s et de l''observation directe) et des orientations terrain de la Phase 2 de MIRA."}, "id": "cn_assessment_observation_notes", "label": {"en": "Enumerator observation notes", "es": "Notas de observaci\u00f3n del encuestador", "fr": "Notes d''observation de l''enqu\u00eateur"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": null}'
