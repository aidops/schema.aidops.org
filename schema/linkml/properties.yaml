  aap_consulted_before_aid:
    title:
      en: 'AAP: Household consulted about needs before aid'
      fr: 'Redevabilité : Ménage consulté sur les besoins avant l''aide'
      es: 'Rendición de cuentas: Hogar consultado sobre necesidades antes de la ayuda'
    description:
      en: Whether anyone from aid providers asked the household, or community members, about their needs before aid was delivered. This is the primary CHS 2024 Commitment 1 household-level indicator ('People can exercise their rights and participate in actions and decisions that affect them'). Also maps to the IASC CAAP 2017 Participation & Partnerships commitment. IASC / REACH Menu 2018 wording.
      fr: Si quelqu'un de la part des intervenants a demandé au ménage ou aux membres de la communauté quels étaient leurs besoins avant que l'aide ne soit livrée. Il s'agit du principal indicateur au niveau du ménage de l'Engagement 1 de la CHS 2024 (« Les personnes peuvent exercer leurs droits et participer aux actions et décisions qui les concernent »). Correspond également à l'engagement Participation et partenariats de la CAAP IASC 2017. Formulation du Menu IASC / REACH 2018.
      es: Si alguien de los actores humanitarios preguntó al hogar o a los miembros de la comunidad sobre sus necesidades antes de la entrega de la ayuda. Es el indicador principal a nivel de hogar del Compromiso 1 de la CHS 2024 («Las personas pueden ejercer sus derechos y participar en las acciones y decisiones que les afectan»). También corresponde al compromiso de Participación y Asociaciones de la CAAP IASC 2017. Formulación del Menú IASC / REACH 2018.
    slot_uri: aidops:aap_consulted_before_aid
    range: AapYesnoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "iasc-caap-2017", "iasc-reach-aap-menu-2018"], "cardinality": "single", "category": "aap_consultation", "core": false, "definition": {"en": "Whether anyone from aid providers asked the household, or community members, about their needs before aid was delivered. This is the primary CHS 2024 Commitment 1 household-level indicator (''People can exercise their rights and participate in actions and decisions that affect them''). Also maps to the IASC CAAP 2017 Participation & Partnerships commitment. IASC / REACH Menu 2018 wording.", "es": "Si alguien de los actores humanitarios pregunt\u00f3 al hogar o a los miembros de la comunidad sobre sus necesidades antes de la entrega de la ayuda. Es el indicador principal a nivel de hogar del Compromiso 1 de la CHS 2024 (\u00abLas personas pueden ejercer sus derechos y participar en las acciones y decisiones que les afectan\u00bb). Tambi\u00e9n corresponde al compromiso de Participaci\u00f3n y Asociaciones de la CAAP IASC 2017. Formulaci\u00f3n del Men\u00fa IASC / REACH 2018.", "fr": "Si quelqu''un de la part des intervenants a demand\u00e9 au m\u00e9nage ou aux membres de la communaut\u00e9 quels \u00e9taient leurs besoins avant que l''aide ne soit livr\u00e9e. Il s''agit du principal indicateur au niveau du m\u00e9nage de l''Engagement 1 de la CHS 2024 (\u00ab Les personnes peuvent exercer leurs droits et participer aux actions et d\u00e9cisions qui les concernent \u00bb). Correspond \u00e9galement \u00e0 l''engagement Participation et partenariats de la CAAP IASC 2017. Formulation du Menu IASC / REACH 2018."}, "id": "aap_consulted_before_aid", "label": {"en": "AAP: Household consulted about needs before aid", "es": "Rendici\u00f3n de cuentas: Hogar consultado sobre necesidades antes de la ayuda", "fr": "Redevabilit\u00e9 : M\u00e9nage consult\u00e9 sur les besoins avant l''aide"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "aap-yesno-dk"}'
