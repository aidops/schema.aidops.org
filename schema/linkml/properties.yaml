      fr: Distance en kilomètres depuis cet établissement jusqu'à l'établissement de référence de niveau supérieur le plus proche. Complémentaire à `hf_referral_transport_available`. Rapporté par le responsable de l'établissement. Sphere 2018 Action Santé ; SARA. Étendu (non-core).
      es: Distancia en kilómetros desde este establecimiento hasta el establecimiento de referencia de nivel superior más cercano. Complementa a `hf_referral_transport_available`. Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud; SARA. Extendido (no-core).
