  school_closures_last_12m:
    title:
      en: School closures in last 12 months
      fr: Fermetures scolaires au cours des 12 derniers mois
      es: Cierres escolares en los últimos 12 meses
    description:
      en: 'The reasons for which the child''s school has been closed at any time in the last 12 months. Multi-select; probe all closure types. Ask only if attended_current_year is Yes. Core item in any deployment context — captures conflict- and disaster-related disruptions from the household perspective. Essential emergency-context indicator per INEE Minimum Standards (2024). Source: MICS6 PR12.'
      fr: 'Les raisons pour lesquelles l''école de l''enfant a été fermée à n''importe quel moment au cours des 12 derniers mois. Sélection multiple ; explorer tous les types de fermeture. À poser uniquement si attended_current_year est Oui. Item essentiel dans tout contexte de déploiement — capture les perturbations liées aux conflits et aux catastrophes du point de vue du ménage. Indicateur de contexte d''urgence essentiel selon les Normes minimales INEE (2024). Source : MICS6 PR12.'
      es: 'Las razones por las que la escuela del niño ha estado cerrada en algún momento en los últimos 12 meses. Selección múltiple; explorar todos los tipos de cierre. Preguntar solo si attended_current_year es Sí. Ítem esencial en cualquier contexto de despliegue — captura las interrupciones relacionadas con conflictos y desastres desde la perspectiva del hogar. Indicador esencial de contexto de emergencia según las Normas Mínimas INEE (2024). Fuente: MICS6 PR12.'
    slot_uri: aidops:school_closures_last_12m
    range: SchoolClosureReason
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["child_5_17"], "bibliography_refs": ["inee-minimum-standards", "mics-education"], "cardinality": "multiple", "category": "education", "core": true, "definition": {"en": "The reasons for which the child''s school has been closed at any time in the last 12 months. Multi-select; probe all closure types. Ask only if attended_current_year is Yes. Core item in any deployment context \u2014 captures conflict- and disaster-related disruptions from the household perspective. Essential emergency-context indicator per INEE Minimum Standards (2024). Source: MICS6 PR12.", "es": "Las razones por las que la escuela del ni\u00f1o ha estado cerrada en alg\u00fan momento en los \u00faltimos 12 meses. Selecci\u00f3n m\u00faltiple; explorar todos los tipos de cierre. Preguntar solo si attended_current_year es S\u00ed. \u00cdtem esencial en cualquier contexto de despliegue \u2014 captura las interrupciones relacionadas con conflictos y desastres desde la perspectiva del hogar. Indicador esencial de contexto de emergencia seg\u00fan las Normas M\u00ednimas INEE (2024). Fuente: MICS6 PR12.", "fr": "Les raisons pour lesquelles l''\u00e9cole de l''enfant a \u00e9t\u00e9 ferm\u00e9e \u00e0 n''importe quel moment au cours des 12 derniers mois. S\u00e9lection multiple ; explorer tous les types de fermeture. \u00c0 poser uniquement si attended_current_year est Oui. Item essentiel dans tout contexte de d\u00e9ploiement \u2014 capture les perturbations li\u00e9es aux conflits et aux catastrophes du point de vue du m\u00e9nage. Indicateur de contexte d''urgence essentiel selon les Normes minimales INEE (2024). Source : MICS6 PR12."}, "id": "school_closures_last_12m", "label": {"en": "School closures in last 12 months", "es": "Cierres escolares en los \u00faltimos 12 meses", "fr": "Fermetures scolaires au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "school-closure-reason"}'
