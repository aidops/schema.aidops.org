  whom5_index:
    title:
      en: WHO-5 Well-Being Index (0-100)
      fr: Indice de bien-être WHO-5 (0 à 100)
      es: Índice de Bienestar WHO-5 (0 a 100)
    description:
      en: The WHO-5 percentage-score well-being index, calculated as the raw sum of items 1-5 (each 0-5) multiplied by 4, producing a 0-100 scale where 0 represents the worst possible well-being and 100 represents the best possible well-being. Per the WHO-5 user guide, a score below 50 flags reduced well-being and may indicate that a full depression screen (e.g., PHQ-9) is warranted; a score of 28 or lower is often cited as a stronger indicator of likely clinical depression.
      fr: L'indice de bien-être en pourcentage WHO-5, calculé comme la somme brute des items 1 à 5 (chacun de 0 à 5) multipliée par 4, produisant une échelle de 0 à 100 où 0 représente le pire bien-être possible et 100 le meilleur bien-être possible. Selon le guide utilisateur du WHO-5, un score inférieur à 50 signale un bien-être réduit et peut indiquer qu'un dépistage complet de dépression (par exemple, PHQ-9) est justifié ; un score de 28 ou moins est souvent cité comme un indicateur plus fort de dépression clinique probable.
      es: El índice de bienestar en porcentaje WHO-5, calculado como la suma bruta de los ítems 1 a 5 (cada uno de 0 a 5) multiplicada por 4, produciendo una escala de 0 a 100 donde 0 representa el peor bienestar posible y 100 el mejor bienestar posible. Según la guía de usuario del WHO-5, un puntaje inferior a 50 señala bienestar reducido y puede indicar que se justifica un tamizaje completo de depresión (por ejemplo, PHQ-9); un puntaje de 28 o menos se cita a menudo como un indicador más fuerte de depresión clínica probable.
    slot_uri: aidops:whom5_index
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who5-user-guide"], "cardinality": "single", "category": "mental_health", "core": false, "definition": {"en": "The WHO-5 percentage-score well-being index, calculated as the raw sum of items 1-5 (each 0-5) multiplied by 4, producing a 0-100 scale where 0 represents the worst possible well-being and 100 represents the best possible well-being. Per the WHO-5 user guide, a score below 50 flags reduced well-being and may indicate that a full depression screen (e.g., PHQ-9) is warranted; a score of 28 or lower is often cited as a stronger indicator of likely clinical depression.", "es": "El \u00edndice de bienestar en porcentaje WHO-5, calculado como la suma bruta de los \u00edtems 1 a 5 (cada uno de 0 a 5) multiplicada por 4, produciendo una escala de 0 a 100 donde 0 representa el peor bienestar posible y 100 el mejor bienestar posible. Seg\u00fan la gu\u00eda de usuario del WHO-5, un puntaje inferior a 50 se\u00f1ala bienestar reducido y puede indicar que se justifica un tamizaje completo de depresi\u00f3n (por ejemplo, PHQ-9); un puntaje de 28 o menos se cita a menudo como un indicador m\u00e1s fuerte de depresi\u00f3n cl\u00ednica probable.", "fr": "L''indice de bien-\u00eatre en pourcentage WHO-5, calcul\u00e9 comme la somme brute des items 1 \u00e0 5 (chacun de 0 \u00e0 5) multipli\u00e9e par 4, produisant une \u00e9chelle de 0 \u00e0 100 o\u00f9 0 repr\u00e9sente le pire bien-\u00eatre possible et 100 le meilleur bien-\u00eatre possible. Selon le guide utilisateur du WHO-5, un score inf\u00e9rieur \u00e0 50 signale un bien-\u00eatre r\u00e9duit et peut indiquer qu''un d\u00e9pistage complet de d\u00e9pression (par exemple, PHQ-9) est justifi\u00e9 ; un score de 28 ou moins est souvent cit\u00e9 comme un indicateur plus fort de d\u00e9pression clinique probable."}, "id": "whom5_index", "label": {"en": "WHO-5 Well-Being Index (0-100)", "es": "\u00cdndice de Bienestar WHO-5 (0 a 100)", "fr": "Indice de bien-\u00eatre WHO-5 (0 \u00e0 100)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": null}'
      bibliography_refs: who5-user-guide
  would_act_differently_next_time:
    title:
      en: Would act differently next time
      fr: Agirait différemment la prochaine fois
      es: Actuaría de forma diferente la próxima vez
    description:
      en: Whether the household would do anything differently if the same kind of warning came again. Captured as yes / no / don't know. Asked of all respondents regardless of whether they received a warning for the reference event, and used by IFRC FbF post-event reflection and Start Network DEF household learning modules to identify learning and programmatic entry points.
      fr: Indique si le ménage ferait quelque chose de différent si le même type d'alerte revenait. Capté en oui / non / ne sait pas. Posé à tous les répondants qu'ils aient ou non reçu une alerte pour l'événement de référence, et utilisé par les modules de réflexion post-événement du FbF de la FICR et les modules d'apprentissage des ménages du DEF du Réseau Start pour identifier les apprentissages et les points d'entrée programmatiques.
      es: Indica si el hogar haría algo diferente si volviera la misma clase de alerta. Capturado como sí / no / no sabe. Se pregunta a todos los respondientes hayan recibido o no una alerta para el evento de referencia, y lo usan los módulos de reflexión posterior al evento del FbF de la FICR y los módulos de aprendizaje del hogar del DEF de Start Network para identificar aprendizajes y puntos de entrada programáticos.
    slot_uri: aidops:would_act_differently_next_time
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "start-network-def"], "cardinality": "single", "category": "context", "core": true, "definition": {"en": "Whether the household would do anything differently if the same kind of warning came again. Captured as yes / no / don''t know. Asked of all respondents regardless of whether they received a warning for the reference event, and used by IFRC FbF post-event reflection and Start Network DEF household learning modules to identify learning and programmatic entry points.", "es": "Indica si el hogar har\u00eda algo diferente si volviera la misma clase de alerta. Capturado como s\u00ed / no / no sabe. Se pregunta a todos los respondientes hayan recibido o no una alerta para el evento de referencia, y lo usan los m\u00f3dulos de reflexi\u00f3n posterior al evento del FbF de la FICR y los m\u00f3dulos de aprendizaje del hogar del DEF de Start Network para identificar aprendizajes y puntos de entrada program\u00e1ticos.", "fr": "Indique si le m\u00e9nage ferait quelque chose de diff\u00e9rent si le m\u00eame type d''alerte revenait. Capt\u00e9 en oui / non / ne sait pas. Pos\u00e9 \u00e0 tous les r\u00e9pondants qu''ils aient ou non re\u00e7u une alerte pour l''\u00e9v\u00e9nement de r\u00e9f\u00e9rence, et utilis\u00e9 par les modules de r\u00e9flexion post-\u00e9v\u00e9nement du FbF de la FICR et les modules d''apprentissage des m\u00e9nages du DEF du R\u00e9seau Start pour identifier les apprentissages et les points d''entr\u00e9e programmatiques."}, "id": "would_act_differently_next_time", "label": {"en": "Would act differently next time", "es": "Actuar\u00eda de forma diferente la pr\u00f3xima vez", "fr": "Agirait diff\u00e9remment la prochaine fois"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "yes-no-dk"}'
