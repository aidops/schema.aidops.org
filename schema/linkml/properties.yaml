  fp_fecundity_status:
    title:
      en: Fecundity status
      fr: Statut de fécondité
      es: Estado de fecundidad
    description:
      en: Proxy classification of the woman's biological capacity to conceive, derived from the DHS multi-question approach (desire for children, time trying, menstrual history; DHS V625, V627, V629). Ask if the woman has never been pregnant and does not desire more children, or if she has been trying to get pregnant for 2 or more years. Women classified as infecund (infecund_declared, menopausal, hysterectomy) are excluded from the unmet need denominator.
      fr: Classification approximative de la capacité biologique de la femme à concevoir, dérivée de l'approche DHS à questions multiples (désir d'enfants, durée des tentatives, historique menstruel; DHS V625, V627, V629). Demander si la femme n'a jamais été enceinte et ne désire pas d'autres enfants, ou si elle essaie de tomber enceinte depuis 2 ans ou plus. Les femmes classées comme infécondes (infecund_declared, menopausal, hysterectomy) sont exclues du dénominateur de besoin non satisfait.
      es: Clasificación proxy de la capacidad biológica de la mujer para concebir, derivada del enfoque DHS de múltiples preguntas (deseo de hijos, tiempo intentando, historial menstrual; DHS V625, V627, V629). Preguntar si la mujer nunca ha estado embarazada y no desea más hijos, o si ha estado intentando quedar embarazada durante 2 años o más. Las mujeres clasificadas como infecundas (infecund_declared, menopausal, hysterectomy) se excluyen del denominador de necesidad insatisfecha.
    slot_uri: aidops:fp_fecundity_status
    range: FecundityStatus
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning", "dhs-unmet-need-as25"], "cardinality": "single", "category": "unmet_need", "core": false, "definition": {"en": "Proxy classification of the woman''s biological capacity to conceive, derived from the DHS multi-question approach (desire for children, time trying, menstrual history; DHS V625, V627, V629). Ask if the woman has never been pregnant and does not desire more children, or if she has been trying to get pregnant for 2 or more years. Women classified as infecund (infecund_declared, menopausal, hysterectomy) are excluded from the unmet need denominator.", "es": "Clasificaci\u00f3n proxy de la capacidad biol\u00f3gica de la mujer para concebir, derivada del enfoque DHS de m\u00faltiples preguntas (deseo de hijos, tiempo intentando, historial menstrual; DHS V625, V627, V629). Preguntar si la mujer nunca ha estado embarazada y no desea m\u00e1s hijos, o si ha estado intentando quedar embarazada durante 2 a\u00f1os o m\u00e1s. Las mujeres clasificadas como infecundas (infecund_declared, menopausal, hysterectomy) se excluyen del denominador de necesidad insatisfecha.", "fr": "Classification approximative de la capacit\u00e9 biologique de la femme \u00e0 concevoir, d\u00e9riv\u00e9e de l''approche DHS \u00e0 questions multiples (d\u00e9sir d''enfants, dur\u00e9e des tentatives, historique menstruel; DHS V625, V627, V629). Demander si la femme n''a jamais \u00e9t\u00e9 enceinte et ne d\u00e9sire pas d''autres enfants, ou si elle essaie de tomber enceinte depuis 2 ans ou plus. Les femmes class\u00e9es comme inf\u00e9condes (infecund_declared, menopausal, hysterectomy) sont exclues du d\u00e9nominateur de besoin non satisfait."}, "id": "fp_fecundity_status", "label": {"en": "Fecundity status", "es": "Estado de fecundidad", "fr": "Statut de f\u00e9condit\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women"], "vocabulary": "fecundity-status"}'
