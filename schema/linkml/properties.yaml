      es: Si hay protocolos escritos de prevención y control de infecciones (PCI), que cubran al menos las precauciones estándar y las precauciones basadas en la transmisión, disponibles en el sitio. Observado por el enumerador. Componente central PCI 2 de la OMS; módulo Calidad de la Atención de HHFA. Extendido (no-core).
