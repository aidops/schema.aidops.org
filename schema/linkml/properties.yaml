      es: 'Indicador booleano derivado: verdadero si la encuestada experimentó al menos un acto de VPI física en los últimos 12 meses. Fórmula: VERDADERO si alguno de los ítems de frecuencia 12m de VPI física = ''often'' o ''sometimes''. SDG 5.2.1 (componente física). Derivado, no preguntado.'
