  justice_access_perceived:
    title:
      en: Access to justice (perceived, household)
      fr: Accès à la justice (perçu, ménage)
      es: Acceso a la justicia (percibido, hogar)
    description:
      en: 'Whether the household believes it could seek redress through a court, tribunal, customary authority, or other mechanism if it experienced a serious injustice or rights violation. The response codes distinguish five types of justice access failure: practical barriers (cost, distance), fear of reprisal (coercive environment), and complete absence of mechanisms — each with different programmatic implications. JIAF 2.0 Protection Indicator P5; GPC PAF Domain 2 Indicator 2.3. Based on OHCHR Rule-of-Law Indicators (2011); GPC PAF Domain 2; REACH Syria (2022) rule-of-law module.'
      fr: 'Si le ménage pense pouvoir demander réparation auprès d''un tribunal, d''une autorité coutumière ou d''un autre mécanisme s''il subissait une injustice grave ou une violation de ses droits. Les codes de réponse distinguent cinq types de défaillance d''accès à la justice : obstacles pratiques (coût, distance), crainte de représailles (environnement coercitif) et absence totale de mécanismes — chacun ayant des implications programmatiques différentes. Indicateur de protection JIAF 2.0 P5 ; GPC PAF Domaine 2 Indicateur 2.3. Fondé sur les Indicateurs d''état de droit HCDH (2011) ; GPC PAF Domaine 2 ; REACH Syrie (2022) module état de droit.'
      es: 'Si el hogar cree que podría buscar reparación a través de un tribunal, autoridad consuetudinaria u otro mecanismo si sufriera una injusticia grave o una violación de derechos. Los códigos de respuesta distinguen cinco tipos de falla en el acceso a la justicia: barreras prácticas (costo, distancia), miedo a represalias (entorno coercitivo) y ausencia completa de mecanismos — cada uno con diferentes implicaciones programáticas. Indicador de Protección JIAF 2.0 P5; GPC PAF Dominio 2 Indicador 2.3. Basado en los Indicadores del Estado de Derecho del ACNUDH (2011); GPC PAF Dominio 2; módulo de estado de derecho de REACH Siria (2022).'
    slot_uri: aidops:justice_access_perceived
    range: JusticeAccess3
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["alnap-hpg-protection-2012", "gpc-paf-2021", "iasc-protection-indicators-2021", "jiaf-2-0-2022", "ohchr-rule-of-law-indicators-2011", "reach-protection-monitoring-2022"], "cardinality": "single", "category": "access_to_justice", "core": true, "definition": {"en": "Whether the household believes it could seek redress through a court, tribunal, customary authority, or other mechanism if it experienced a serious injustice or rights violation. The response codes distinguish five types of justice access failure: practical barriers (cost, distance), fear of reprisal (coercive environment), and complete absence of mechanisms \u2014 each with different programmatic implications. JIAF 2.0 Protection Indicator P5; GPC PAF Domain 2 Indicator 2.3. Based on OHCHR Rule-of-Law Indicators (2011); GPC PAF Domain 2; REACH Syria (2022) rule-of-law module.", "es": "Si el hogar cree que podr\u00eda buscar reparaci\u00f3n a trav\u00e9s de un tribunal, autoridad consuetudinaria u otro mecanismo si sufriera una injusticia grave o una violaci\u00f3n de derechos. Los c\u00f3digos de respuesta distinguen cinco tipos de falla en el acceso a la justicia: barreras pr\u00e1cticas (costo, distancia), miedo a represalias (entorno coercitivo) y ausencia completa de mecanismos \u2014 cada uno con diferentes implicaciones program\u00e1ticas. Indicador de Protecci\u00f3n JIAF 2.0 P5; GPC PAF Dominio 2 Indicador 2.3. Basado en los Indicadores del Estado de Derecho del ACNUDH (2011); GPC PAF Dominio 2; m\u00f3dulo de estado de derecho de REACH Siria (2022).", "fr": "Si le m\u00e9nage pense pouvoir demander r\u00e9paration aupr\u00e8s d''un tribunal, d''une autorit\u00e9 coutumi\u00e8re ou d''un autre m\u00e9canisme s''il subissait une injustice grave ou une violation de ses droits. Les codes de r\u00e9ponse distinguent cinq types de d\u00e9faillance d''acc\u00e8s \u00e0 la justice : obstacles pratiques (co\u00fbt, distance), crainte de repr\u00e9sailles (environnement coercitif) et absence totale de m\u00e9canismes \u2014 chacun ayant des implications programmatiques diff\u00e9rentes. Indicateur de protection JIAF 2.0 P5 ; GPC PAF Domaine 2 Indicateur 2.3. Fond\u00e9 sur les Indicateurs d''\u00e9tat de droit HCDH (2011) ; GPC PAF Domaine 2 ; REACH Syrie (2022) module \u00e9tat de droit."}, "id": "justice_access_perceived", "label": {"en": "Access to justice (perceived, household)", "es": "Acceso a la justicia (percibido, hogar)", "fr": "Acc\u00e8s \u00e0 la justice (per\u00e7u, m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "justice-access-3"}'
