  hh_member_needed_care_30d:
    title:
      en: Household member needed health care in the last 30 days
      fr: Un membre du ménage a eu besoin de soins de santé au cours des 30 derniers jours
      es: Algún miembro del hogar necesitó atención de salud en los últimos 30 días
    description:
      en: Whether any member of the household needed health care, medical advice, or treatment for an illness or injury in the 30 days preceding the interview. Gateway item for the unmet-need module. The 30-day recall period aligns with the PAHO Americas household survey approach and the WHO People's Voice Survey. DHS uses 2 weeks for child-specific illness recall; 30 days is appropriate for the generic household-level assessment.
      fr: Si un membre du ménage a eu besoin de soins de santé, de conseils médicaux ou d'un traitement pour une maladie ou une blessure au cours des 30 jours précédant l'entretien. Question porte d'entrée du module « besoin non satisfait ». La période de rappel de 30 jours s'aligne sur l'approche de l'enquête auprès des ménages PAHO des Amériques et sur l'enquête People's Voice Survey de l'OMS. Le DHS utilise 2 semaines pour le rappel des maladies infantiles ; 30 jours conviennent à l'évaluation générique au niveau du ménage.
      es: Si algún miembro del hogar necesitó atención de salud, consejo médico o tratamiento por una enfermedad o lesión en los 30 días previos a la entrevista. Ítem de entrada del módulo de necesidad insatisfecha. El período de recordatorio de 30 días está alineado con el enfoque de la encuesta de hogares PAHO de las Américas y con la People's Voice Survey de la OMS. El DHS usa 2 semanas para el recordatorio de enfermedad infantil específica; 30 días es apropiado para la evaluación genérica a nivel del hogar.
    slot_uri: aidops:hh_member_needed_care_30d
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["paho-barriers-americas-2020", "who-pvs-2023"], "cardinality": "single", "category": "health_access_unmet_need", "core": true, "definition": {"en": "Whether any member of the household needed health care, medical advice, or treatment for an illness or injury in the 30 days preceding the interview. Gateway item for the unmet-need module. The 30-day recall period aligns with the PAHO Americas household survey approach and the WHO People''s Voice Survey. DHS uses 2 weeks for child-specific illness recall; 30 days is appropriate for the generic household-level assessment.", "es": "Si alg\u00fan miembro del hogar necesit\u00f3 atenci\u00f3n de salud, consejo m\u00e9dico o tratamiento por una enfermedad o lesi\u00f3n en los 30 d\u00edas previos a la entrevista. \u00cdtem de entrada del m\u00f3dulo de necesidad insatisfecha. El per\u00edodo de recordatorio de 30 d\u00edas est\u00e1 alineado con el enfoque de la encuesta de hogares PAHO de las Am\u00e9ricas y con la People''s Voice Survey de la OMS. El DHS usa 2 semanas para el recordatorio de enfermedad infantil espec\u00edfica; 30 d\u00edas es apropiado para la evaluaci\u00f3n gen\u00e9rica a nivel del hogar.", "fr": "Si un membre du m\u00e9nage a eu besoin de soins de sant\u00e9, de conseils m\u00e9dicaux ou d''un traitement pour une maladie ou une blessure au cours des 30 jours pr\u00e9c\u00e9dant l''entretien. Question porte d''entr\u00e9e du module \u00ab besoin non satisfait \u00bb. La p\u00e9riode de rappel de 30 jours s''aligne sur l''approche de l''enqu\u00eate aupr\u00e8s des m\u00e9nages PAHO des Am\u00e9riques et sur l''enqu\u00eate People''s Voice Survey de l''OMS. Le DHS utilise 2 semaines pour le rappel des maladies infantiles ; 30 jours conviennent \u00e0 l''\u00e9valuation g\u00e9n\u00e9rique au niveau du m\u00e9nage."}, "id": "hh_member_needed_care_30d", "label": {"en": "Household member needed health care in the last 30 days", "es": "Alg\u00fan miembro del hogar necesit\u00f3 atenci\u00f3n de salud en los \u00faltimos 30 d\u00edas", "fr": "Un membre du m\u00e9nage a eu besoin de soins de sant\u00e9 au cours des 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "vocabulary": null}'
      bibliography_refs: paho-barriers-americas-2020,who-pvs-2023
  hh_member_sought_care_30d:
    title:
      en: Household member(s) who needed care actually sought or received care
      fr: Le(s) membre(s) du ménage ayant eu besoin de soins en a/ont effectivement recherché ou reçu
      es: El/los miembro(s) del hogar que necesitaba(n) atención efectivamente la buscó/buscaron o recibió/recibieron
    description:
      en: Whether household member(s) who needed care in the last 30 days actually sought or received that care, captured as an all/some/none extent (`care-coverage-extent`). `yes_some` indicates partial unmet need (some but not all members who needed care received it) and is a distinct condition from both full access and complete failure to access care. Ask only if `hh_member_needed_care_30d` is true.
      fr: Si le(s) membre(s) du ménage ayant eu besoin de soins au cours des 30 derniers jours en a/ont effectivement recherché ou reçu, saisi comme une étendue tous/certains/aucun (`care-coverage-extent`). `yes_some` indique un besoin non satisfait partiel (certains mais pas tous les membres qui avaient besoin de soins en ont reçu) et constitue une condition distincte à la fois d'un accès complet et d'un échec total d'accès aux soins. Ne poser que si `hh_member_needed_care_30d` est vrai.
      es: Si el/los miembro(s) del hogar que necesitaba(n) atención en los últimos 30 días efectivamente la buscó/buscaron o recibió/recibieron, capturado como un alcance todos/algunos/ninguno (`care-coverage-extent`). `yes_some` indica una necesidad insatisfecha parcial (algunos pero no todos los miembros que necesitaban atención la recibieron) y es una condición distinta tanto del acceso completo como de la falta total de acceso a la atención. Preguntar solo si `hh_member_needed_care_30d` es verdadero.
    slot_uri: aidops:hh_member_sought_care_30d
    range: CareCoverageExtent
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["paho-barriers-americas-2020", "who-pvs-2023"], "cardinality": "single", "category": "health_access_unmet_need", "core": true, "definition": {"en": "Whether household member(s) who needed care in the last 30 days actually sought or received that care, captured as an all/some/none extent (`care-coverage-extent`). `yes_some` indicates partial unmet need (some but not all members who needed care received it) and is a distinct condition from both full access and complete failure to access care. Ask only if `hh_member_needed_care_30d` is true.", "es": "Si el/los miembro(s) del hogar que necesitaba(n) atenci\u00f3n en los \u00faltimos 30 d\u00edas efectivamente la busc\u00f3/buscaron o recibi\u00f3/recibieron, capturado como un alcance todos/algunos/ninguno (`care-coverage-extent`). `yes_some` indica una necesidad insatisfecha parcial (algunos pero no todos los miembros que necesitaban atenci\u00f3n la recibieron) y es una condici\u00f3n distinta tanto del acceso completo como de la falta total de acceso a la atenci\u00f3n. Preguntar solo si `hh_member_needed_care_30d` es verdadero.", "fr": "Si le(s) membre(s) du m\u00e9nage ayant eu besoin de soins au cours des 30 derniers jours en a/ont effectivement recherch\u00e9 ou re\u00e7u, saisi comme une \u00e9tendue tous/certains/aucun (`care-coverage-extent`). `yes_some` indique un besoin non satisfait partiel (certains mais pas tous les membres qui avaient besoin de soins en ont re\u00e7u) et constitue une condition distincte \u00e0 la fois d''un acc\u00e8s complet et d''un \u00e9chec total d''acc\u00e8s aux soins. Ne poser que si `hh_member_needed_care_30d` est vrai."}, "id": "hh_member_sought_care_30d", "label": {"en": "Household member(s) who needed care actually sought or received care", "es": "El/los miembro(s) del hogar que necesitaba(n) atenci\u00f3n efectivamente la busc\u00f3/buscaron o recibi\u00f3/recibieron", "fr": "Le(s) membre(s) du m\u00e9nage ayant eu besoin de soins en a/ont effectivement recherch\u00e9 ou re\u00e7u"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-coverage-extent"}'
      bibliography_refs: paho-barriers-americas-2020,who-pvs-2023
  hh_national_id_gap:
    title:
      en: National identity document gap (household)
      fr: Absence de document d'identité nationale (ménage)
      es: Brecha de documento de identidad nacional (hogar)
    description:
      en: Whether any adult member of the household currently lacks a valid national identity card or equivalent civil identity document. This is a household-level flag, not per-person. Does NOT capture displacement-specific documents (those are in DisplacementProfile.primary_identity_document_status). A positive result indicates a documentation gap that may limit access to services, rights, and social protection. JIAF 2.0 Protection Indicator P6; GPC PAF Domain 2. Asked of household head or adult member, current recall.
      fr: Si un adulte du ménage est actuellement dépourvu d'une carte d'identité nationale valide ou d'un document d'identité civile équivalent. Il s'agit d'un indicateur au niveau du ménage, pas par personne. Ne capture PAS les documents spécifiques au déplacement (ceux-ci figurent dans DisplacementProfile.primary_identity_document_status). Un résultat positif indique une lacune documentaire pouvant limiter l'accès aux services, aux droits et à la protection sociale. Indicateur de protection JIAF 2.0 P6 ; GPC PAF Domaine 2.
      es: Si algún adulto miembro del hogar carece actualmente de una cédula de identidad nacional válida o documento de identidad civil equivalente. Este es un indicador a nivel del hogar, no por persona. NO captura documentos específicos de desplazamiento (estos figuran en DisplacementProfile.primary_identity_document_status). Un resultado positivo indica una brecha documental que puede limitar el acceso a servicios, derechos y protección social. Indicador de Protección JIAF 2.0 P6; GPC PAF Dominio 2.
    slot_uri: aidops:hh_national_id_gap
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "iasc-protection-indicators-2021", "jiaf-2-0-2022", "reach-protection-monitoring-2022", "unhcr-protection-monitoring-2016"], "cardinality": "single", "category": "civil_documentation", "core": true, "definition": {"en": "Whether any adult member of the household currently lacks a valid national identity card or equivalent civil identity document. This is a household-level flag, not per-person. Does NOT capture displacement-specific documents (those are in DisplacementProfile.primary_identity_document_status). A positive result indicates a documentation gap that may limit access to services, rights, and social protection. JIAF 2.0 Protection Indicator P6; GPC PAF Domain 2. Asked of household head or adult member, current recall.", "es": "Si alg\u00fan adulto miembro del hogar carece actualmente de una c\u00e9dula de identidad nacional v\u00e1lida o documento de identidad civil equivalente. Este es un indicador a nivel del hogar, no por persona. NO captura documentos espec\u00edficos de desplazamiento (estos figuran en DisplacementProfile.primary_identity_document_status). Un resultado positivo indica una brecha documental que puede limitar el acceso a servicios, derechos y protecci\u00f3n social. Indicador de Protecci\u00f3n JIAF 2.0 P6; GPC PAF Dominio 2.", "fr": "Si un adulte du m\u00e9nage est actuellement d\u00e9pourvu d''une carte d''identit\u00e9 nationale valide ou d''un document d''identit\u00e9 civile \u00e9quivalent. Il s''agit d''un indicateur au niveau du m\u00e9nage, pas par personne. Ne capture PAS les documents sp\u00e9cifiques au d\u00e9placement (ceux-ci figurent dans DisplacementProfile.primary_identity_document_status). Un r\u00e9sultat positif indique une lacune documentaire pouvant limiter l''acc\u00e8s aux services, aux droits et \u00e0 la protection sociale. Indicateur de protection JIAF 2.0 P6 ; GPC PAF Domaine 2."}, "id": "hh_national_id_gap", "label": {"en": "National identity document gap (household)", "es": "Brecha de documento de identidad nacional (hogar)", "fr": "Absence de document d''identit\u00e9 nationale (m\u00e9nage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: gpc-paf-2021,iasc-protection-indicators-2021,jiaf-2-0-2022,reach-protection-monitoring-2022,unhcr-protection-monitoring-2016
  hh_owns_livestock:
    title:
      en: Household owns livestock, poultry, or other farm animals
      fr: Le ménage possède du bétail, de la volaille ou d'autres animaux de ferme
      es: El hogar posee ganado, aves de corral u otros animales de granja
    description:
      en: Whether the household currently owns any livestock, poultry, or other farm animals. Gateway item for the livestock block; livestock_counts, livestock_stress_sale_past_season, and livestock_vet_access skip when this is `no` or `dont_know`. Wording drawn from DHS-8 `hv246` ('Does your household own any livestock, herds, or farm animals?'). `dont_know` is retained as a distinct valid response.
      fr: Si le ménage possède actuellement du bétail, de la volaille ou d'autres animaux de ferme. Question porte d'entrée du bloc bétail ; livestock_counts, livestock_stress_sale_past_season et livestock_vet_access sont sautés lorsque cette réponse est `no` ou `dont_know`. Formulation tirée de l'item `hv246` du DHS-8 (« Votre ménage possède-t-il du bétail, des troupeaux ou des animaux de ferme ? »). `dont_know` est conservé comme réponse valide distincte.
      es: Si el hogar posee actualmente ganado, aves de corral u otros animales de granja. Ítem de entrada al bloque de ganado; livestock_counts, livestock_stress_sale_past_season y livestock_vet_access se omiten cuando esta respuesta es `no` o `dont_know`. Formulación tomada del ítem `hv246` del DHS-8 ('¿Su hogar posee ganado, rebaños o animales de granja?'). `dont_know` se mantiene como respuesta válida distinta.
