      es: 'Intención declarada del hogar respecto a la vivienda dañada: reparar en el mismo sitio, reconstruir en el mismo sitio, relocalizarse, no puede actuar sin apoyo externo, o indeciso. Usado por la programación de recuperación para focalizar subvenciones de reparación, subvenciones de reconstrucción y asistencia de relocalización.'
