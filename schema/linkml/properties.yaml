  delivery_cesarean_timing:
    title:
      en: Cesarean section timing (before or after labor)
      fr: Moment de la césarienne (avant ou après le travail)
      es: Momento de la cesárea (antes o después del trabajo de parto)
    description:
      en: Whether the cesarean section was performed before labor began (planned/elective) or after labor had already started (emergency/intrapartum). DHS-8 m17a. Only asked if delivery_cesarean_section = yes. Distinguishes elective from emergency cesareans, which have different clinical risk profiles and programmatic implications.
      fr: Si la césarienne a été réalisée avant le début du travail (planifiée/élective) ou après le début du travail (urgence/intrapartum). DHS-8 m17a. Posé uniquement si delivery_cesarean_section = oui. Distingue les césariennes électives des urgentes, qui ont des profils de risque clinique et des implications programmatiques différents.
      es: Si la cesárea se realizó antes de que comenzara el trabajo de parto (planificada/electiva) o después de que el trabajo de parto ya había comenzado (emergencia/intraparto). DHS-8 m17a. Solo se pregunta si delivery_cesarean_section = sí. Distingue las cesáreas electivas de las de emergencia, que tienen perfiles de riesgo clínico e implicaciones programáticas diferentes.
    slot_uri: aidops:delivery_cesarean_timing
    range: CesareanTiming
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire"], "cardinality": "single", "category": "delivery", "core": false, "definition": {"en": "Whether the cesarean section was performed before labor began (planned/elective) or after labor had already started (emergency/intrapartum). DHS-8 m17a. Only asked if delivery_cesarean_section = yes. Distinguishes elective from emergency cesareans, which have different clinical risk profiles and programmatic implications.", "es": "Si la ces\u00e1rea se realiz\u00f3 antes de que comenzara el trabajo de parto (planificada/electiva) o despu\u00e9s de que el trabajo de parto ya hab\u00eda comenzado (emergencia/intraparto). DHS-8 m17a. Solo se pregunta si delivery_cesarean_section = s\u00ed. Distingue las ces\u00e1reas electivas de las de emergencia, que tienen perfiles de riesgo cl\u00ednico e implicaciones program\u00e1ticas diferentes.", "fr": "Si la c\u00e9sarienne a \u00e9t\u00e9 r\u00e9alis\u00e9e avant le d\u00e9but du travail (planifi\u00e9e/\u00e9lective) ou apr\u00e8s le d\u00e9but du travail (urgence/intrapartum). DHS-8 m17a. Pos\u00e9 uniquement si delivery_cesarean_section = oui. Distingue les c\u00e9sariennes \u00e9lectives des urgentes, qui ont des profils de risque clinique et des implications programmatiques diff\u00e9rents."}, "id": "delivery_cesarean_timing", "label": {"en": "Cesarean section timing (before or after labor)", "es": "Momento de la ces\u00e1rea (antes o despu\u00e9s del trabajo de parto)", "fr": "Moment de la c\u00e9sarienne (avant ou apr\u00e8s le travail)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "cesarean-timing"}'
