  wgss_distance_minutes:
    title:
      en: Walking time to nearest Women and Girls Safe Space (minutes, one way)
      fr: Temps de marche jusqu'à l'espace sûr pour femmes et filles le plus proche (minutes, sens unique)
      es: Tiempo de caminata hasta el espacio seguro para mujeres y niñas más cercano (minutos, ida)
    description:
      en: Time in minutes to walk from the household to the nearest Women and Girls Safe Space (WGSS), one way. A value of 0 means the WGSS is on premises or immediately adjacent. Asked only when wgss_presence_known = yes. Physical proximity to a WGSS is a service accessibility indicator; distance is a barrier to utilisation. Based on the UNFPA Minimum Standards (2019) and GBV AoR AAAQ framework (the 'accessibility' dimension).
      fr: Temps en minutes pour marcher du ménage à l'espace sûr pour femmes et filles (ESFMF) le plus proche, sens unique. Une valeur de 0 signifie que l'ESFMF est sur place ou immédiatement adjacent. Posée uniquement lorsque wgss_presence_known = oui. La proximité physique d'un ESFMF est un indicateur d'accessibilité des services ; la distance est un obstacle à l'utilisation. Fondé sur les Normes minimales UNFPA (2019) et le cadre AAAQ du GBV AoR (dimension 'accessibilité').
      es: Tiempo en minutos para caminar desde el hogar hasta el Espacio Seguro para Mujeres y Niñas (ESMN) más cercano, en un sentido. Un valor de 0 significa que el ESMN está en las instalaciones o inmediatamente adyacente. Se pregunta solo cuando wgss_presence_known = sí. La proximidad física a un ESMN es un indicador de accesibilidad a los servicios; la distancia es una barrera para la utilización. Basado en los Estándares Mínimos de UNFPA (2019) y el marco AAAQ del GBV AoR (dimensión 'accesibilidad').
    slot_uri: aidops:wgss_distance_minutes
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "unfpa-gbv-minimum-standards-2019"], "cardinality": "single", "category": "gbv_services", "core": false, "definition": {"en": "Time in minutes to walk from the household to the nearest Women and Girls Safe Space (WGSS), one way. A value of 0 means the WGSS is on premises or immediately adjacent. Asked only when wgss_presence_known = yes. Physical proximity to a WGSS is a service accessibility indicator; distance is a barrier to utilisation. Based on the UNFPA Minimum Standards (2019) and GBV AoR AAAQ framework (the ''accessibility'' dimension).", "es": "Tiempo en minutos para caminar desde el hogar hasta el Espacio Seguro para Mujeres y Ni\u00f1as (ESMN) m\u00e1s cercano, en un sentido. Un valor de 0 significa que el ESMN est\u00e1 en las instalaciones o inmediatamente adyacente. Se pregunta solo cuando wgss_presence_known = s\u00ed. La proximidad f\u00edsica a un ESMN es un indicador de accesibilidad a los servicios; la distancia es una barrera para la utilizaci\u00f3n. Basado en los Est\u00e1ndares M\u00ednimos de UNFPA (2019) y el marco AAAQ del GBV AoR (dimensi\u00f3n ''accesibilidad'').", "fr": "Temps en minutes pour marcher du m\u00e9nage \u00e0 l''espace s\u00fbr pour femmes et filles (ESFMF) le plus proche, sens unique. Une valeur de 0 signifie que l''ESFMF est sur place ou imm\u00e9diatement adjacent. Pos\u00e9e uniquement lorsque wgss_presence_known = oui. La proximit\u00e9 physique d''un ESFMF est un indicateur d''accessibilit\u00e9 des services ; la distance est un obstacle \u00e0 l''utilisation. Fond\u00e9 sur les Normes minimales UNFPA (2019) et le cadre AAAQ du GBV AoR (dimension ''accessibilit\u00e9'')."}, "id": "wgss_distance_minutes", "label": {"en": "Walking time to nearest Women and Girls Safe Space (minutes, one way)", "es": "Tiempo de caminata hasta el espacio seguro para mujeres y ni\u00f1as m\u00e1s cercano (minutos, ida)", "fr": "Temps de marche jusqu''\u00e0 l''espace s\u00fbr pour femmes et filles le plus proche (minutes, sens unique)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,unfpa-gbv-minimum-standards-2019
  wgss_presence_known:
    title:
      en: 'Women and Girls Safe Space: presence known'
      fr: 'Espace sûr pour femmes et filles : présence connue'
      es: 'Espacio seguro para mujeres y niñas: presencia conocida'
    description:
      en: Whether the household head or adult member is aware of a Women and Girls Safe Space (WGSS) within the site or accessible to the household. Asks about awareness of presence and accessibility from the household's perspective (distance, whether women are permitted to attend). Does NOT ask about use. WGSS are a UNFPA Minimum Standard (Standard 7) and a GBV AoR core indicator; they serve as the primary entry point for GBV survivors to access services without formal disclosure.
      fr: Si le chef de ménage ou un adulte du ménage a connaissance d'un Espace sûr pour femmes et filles (ESFMF) au sein du site ou accessible au ménage. Porte sur la connaissance de la présence et de l'accessibilité du point de vue du ménage (distance, si les femmes sont autorisées à y assister). Ne pose PAS de questions sur l'utilisation. Les ESFMF sont une Norme minimale UNFPA (Norme 7) et un indicateur central du GBV AoR ; ils constituent le principal point d'entrée pour les survivant·es VBG pour accéder aux services sans divulgation formelle.
      es: Si la persona jefa del hogar o un adulto del hogar tiene conocimiento de un Espacio Seguro para Mujeres y Niñas (ESMN) dentro del sitio o accesible para el hogar. Pregunta sobre el conocimiento de la presencia y accesibilidad desde la perspectiva del hogar (distancia, si se permite asistir a las mujeres). NO pregunta sobre el uso. Los ESMN son un Estándar Mínimo de UNFPA (Estándar 7) e indicador central del GBV AoR; sirven como punto de entrada principal para que sobrevivientes de VBG accedan a servicios sin divulgación formal.
    slot_uri: aidops:wgss_presence_known
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "unfpa-gbv-minimum-standards-2019"], "cardinality": "single", "category": "gbv_services", "core": false, "definition": {"en": "Whether the household head or adult member is aware of a Women and Girls Safe Space (WGSS) within the site or accessible to the household. Asks about awareness of presence and accessibility from the household''s perspective (distance, whether women are permitted to attend). Does NOT ask about use. WGSS are a UNFPA Minimum Standard (Standard 7) and a GBV AoR core indicator; they serve as the primary entry point for GBV survivors to access services without formal disclosure.", "es": "Si la persona jefa del hogar o un adulto del hogar tiene conocimiento de un Espacio Seguro para Mujeres y Ni\u00f1as (ESMN) dentro del sitio o accesible para el hogar. Pregunta sobre el conocimiento de la presencia y accesibilidad desde la perspectiva del hogar (distancia, si se permite asistir a las mujeres). NO pregunta sobre el uso. Los ESMN son un Est\u00e1ndar M\u00ednimo de UNFPA (Est\u00e1ndar 7) e indicador central del GBV AoR; sirven como punto de entrada principal para que sobrevivientes de VBG accedan a servicios sin divulgaci\u00f3n formal.", "fr": "Si le chef de m\u00e9nage ou un adulte du m\u00e9nage a connaissance d''un Espace s\u00fbr pour femmes et filles (ESFMF) au sein du site ou accessible au m\u00e9nage. Porte sur la connaissance de la pr\u00e9sence et de l''accessibilit\u00e9 du point de vue du m\u00e9nage (distance, si les femmes sont autoris\u00e9es \u00e0 y assister). Ne pose PAS de questions sur l''utilisation. Les ESFMF sont une Norme minimale UNFPA (Norme 7) et un indicateur central du GBV AoR ; ils constituent le principal point d''entr\u00e9e pour les survivant\u00b7es VBG pour acc\u00e9der aux services sans divulgation formelle."}, "id": "wgss_presence_known", "label": {"en": "Women and Girls Safe Space: presence known", "es": "Espacio seguro para mujeres y ni\u00f1as: presencia conocida", "fr": "Espace s\u00fbr pour femmes et filles : pr\u00e9sence connue"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,unfpa-gbv-minimum-standards-2019
  where_care_sought_30d:
    title:
      en: Where the household member(s) went for care
      fr: Où le(s) membre(s) du ménage s'est/se sont rendu(s) pour les soins
      es: Adónde fue/fueron el/los miembro(s) del hogar para recibir atención
    description:
      en: 'Type(s) of provider or facility the household member(s) visited for the recent care-seeking episode(s) in the last 30 days. Multi-select: one household may involve more than one provider type across different members or episodes. Reuses the `care-provider-type` vocabulary shared with ChildHealthProfile, MaternalNewbornHealthProfile, and ReproductiveHealthProfile. Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`.'
      fr: 'Type(s) de prestataire ou d''établissement consulté par le(s) membre(s) du ménage lors de/des épisode(s) récent(s) de recours aux soins au cours des 30 derniers jours. Sélection multiple : un même ménage peut impliquer plus d''un type de prestataire pour différents membres ou épisodes. Réutilise le vocabulaire `care-provider-type` partagé avec ChildHealthProfile, MaternalNewbornHealthProfile et ReproductiveHealthProfile. Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`.'
      es: 'Tipo(s) de proveedor o establecimiento visitado por el/los miembro(s) del hogar durante el/los episodio(s) reciente(s) de búsqueda de atención en los últimos 30 días. Selección múltiple: un mismo hogar puede involucrar más de un tipo de proveedor en diferentes miembros o episodios. Reutiliza el vocabulario `care-provider-type` compartido con ChildHealthProfile, MaternalNewbornHealthProfile y ReproductiveHealthProfile. Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`.'
    slot_uri: aidops:where_care_sought_30d
    range: CareProviderType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-barriers-module"], "cardinality": "multiple", "category": "health_access_unmet_need", "core": true, "definition": {"en": "Type(s) of provider or facility the household member(s) visited for the recent care-seeking episode(s) in the last 30 days. Multi-select: one household may involve more than one provider type across different members or episodes. Reuses the `care-provider-type` vocabulary shared with ChildHealthProfile, MaternalNewbornHealthProfile, and ReproductiveHealthProfile. Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`.", "es": "Tipo(s) de proveedor o establecimiento visitado por el/los miembro(s) del hogar durante el/los episodio(s) reciente(s) de b\u00fasqueda de atenci\u00f3n en los \u00faltimos 30 d\u00edas. Selecci\u00f3n m\u00faltiple: un mismo hogar puede involucrar m\u00e1s de un tipo de proveedor en diferentes miembros o episodios. Reutiliza el vocabulario `care-provider-type` compartido con ChildHealthProfile, MaternalNewbornHealthProfile y ReproductiveHealthProfile. Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`.", "fr": "Type(s) de prestataire ou d''\u00e9tablissement consult\u00e9 par le(s) membre(s) du m\u00e9nage lors de/des \u00e9pisode(s) r\u00e9cent(s) de recours aux soins au cours des 30 derniers jours. S\u00e9lection multiple : un m\u00eame m\u00e9nage peut impliquer plus d''un type de prestataire pour diff\u00e9rents membres ou \u00e9pisodes. R\u00e9utilise le vocabulaire `care-provider-type` partag\u00e9 avec ChildHealthProfile, MaternalNewbornHealthProfile et ReproductiveHealthProfile. Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`."}, "id": "where_care_sought_30d", "label": {"en": "Where the household member(s) went for care", "es": "Ad\u00f3nde fue/fueron el/los miembro(s) del hogar para recibir atenci\u00f3n", "fr": "O\u00f9 le(s) membre(s) du m\u00e9nage s''est/se sont rendu(s) pour les soins"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "care-provider-type"}'
