  fp_postpartum_amenorrhea:
    title:
      en: Postpartum amenorrhea (period returned after last pregnancy)
      fr: Aménorrhée post-partum (retour des règles après la dernière grossesse)
      es: Amenorrea posparto (regreso del período menstrual después del último embarazo)
    description:
      en: 'Whether the woman''s menstrual period has returned since her last pregnancy ended (DHS V405 proxy). Ask only if fp_using_any_method = false AND there was a recent birth within 2 years. DHS-8 change: postpartum amenorrhea classification is based on the last pregnancy, not the last birth. PPA + not wanting the last pregnancy = unmet need to limit in the DHS algorithm.'
      fr: 'Si les règles de la femme sont revenues depuis la fin de sa dernière grossesse (proxy DHS V405). Demander uniquement si fp_using_any_method = faux ET il y a eu une naissance récente dans les 2 ans. Changement DHS-8 : la classification de l''aménorrhée post-partum est basée sur la dernière grossesse, non le dernier accouchement. AMP + ne pas vouloir la dernière grossesse = besoin non satisfait de limitation dans l''algorithme DHS.'
      es: 'Si el período menstrual de la mujer ha regresado desde que terminó su último embarazo (proxy DHS V405). Preguntar solo si fp_using_any_method = falso Y hubo un parto reciente en los últimos 2 años. Cambio DHS-8: la clasificación de amenorrea posparto se basa en el último embarazo, no en el último parto. AMP + no querer el último embarazo = necesidad insatisfecha de limitación en el algoritmo DHS.'
    slot_uri: aidops:fp_postpartum_amenorrhea
    range: FpPpaStatus
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning", "dhs-unmet-need-as25"], "cardinality": "single", "category": "unmet_need", "core": false, "definition": {"en": "Whether the woman''s menstrual period has returned since her last pregnancy ended (DHS V405 proxy). Ask only if fp_using_any_method = false AND there was a recent birth within 2 years. DHS-8 change: postpartum amenorrhea classification is based on the last pregnancy, not the last birth. PPA + not wanting the last pregnancy = unmet need to limit in the DHS algorithm.", "es": "Si el per\u00edodo menstrual de la mujer ha regresado desde que termin\u00f3 su \u00faltimo embarazo (proxy DHS V405). Preguntar solo si fp_using_any_method = falso Y hubo un parto reciente en los \u00faltimos 2 a\u00f1os. Cambio DHS-8: la clasificaci\u00f3n de amenorrea posparto se basa en el \u00faltimo embarazo, no en el \u00faltimo parto. AMP + no querer el \u00faltimo embarazo = necesidad insatisfecha de limitaci\u00f3n en el algoritmo DHS.", "fr": "Si les r\u00e8gles de la femme sont revenues depuis la fin de sa derni\u00e8re grossesse (proxy DHS V405). Demander uniquement si fp_using_any_method = faux ET il y a eu une naissance r\u00e9cente dans les 2 ans. Changement DHS-8 : la classification de l''am\u00e9norrh\u00e9e post-partum est bas\u00e9e sur la derni\u00e8re grossesse, non le dernier accouchement. AMP + ne pas vouloir la derni\u00e8re grossesse = besoin non satisfait de limitation dans l''algorithme DHS."}, "id": "fp_postpartum_amenorrhea", "label": {"en": "Postpartum amenorrhea (period returned after last pregnancy)", "es": "Amenorrea posparto (regreso del per\u00edodo menstrual despu\u00e9s del \u00faltimo embarazo)", "fr": "Am\u00e9norrh\u00e9e post-partum (retour des r\u00e8gles apr\u00e8s la derni\u00e8re grossesse)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women"], "vocabulary": "fp-ppa-status"}'
      bibliography_refs: dhs-family-planning,dhs-unmet-need-as25
  fp_reason_discontinuation:
    title:
      en: Main reason for contraceptive discontinuation
      fr: Principale raison d'abandon de la contraception
      es: Razón principal para la discontinuación anticonceptiva
    description:
      en: 'The main reason the woman stopped using her most recent contraceptive method (DHS). Ask only if fp_ever_used_any_method = true AND fp_using_any_method = false. Used for programming: distinguishes method-related discontinuation (side effects, failure) from structural discontinuation (unavailability, cost) and intention-driven (wanted pregnancy).'
      fr: 'La principale raison pour laquelle la femme a arrêté d''utiliser sa méthode contraceptive la plus récente (DHS). Demander uniquement si fp_ever_used_any_method = vrai ET fp_using_any_method = faux. Utilisé pour la programmation : distingue l''abandon lié à la méthode (effets secondaires, échec) de l''abandon structurel (indisponibilité, coût) et de l''abandon intentionnel (souhait de grossesse).'
      es: 'La razón principal por la que la mujer dejó de usar su método anticonceptivo más reciente (DHS). Preguntar solo si fp_ever_used_any_method = verdadero Y fp_using_any_method = falso. Se usa para programación: distingue la discontinuación relacionada con el método (efectos secundarios, falla) de la estructural (no disponibilidad, costo) y la intencional (deseo de embarazo).'
    slot_uri: aidops:fp_reason_discontinuation
    range: FpDiscontinuationReason
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning"], "cardinality": "single", "category": "family_planning", "core": false, "definition": {"en": "The main reason the woman stopped using her most recent contraceptive method (DHS). Ask only if fp_ever_used_any_method = true AND fp_using_any_method = false. Used for programming: distinguishes method-related discontinuation (side effects, failure) from structural discontinuation (unavailability, cost) and intention-driven (wanted pregnancy).", "es": "La raz\u00f3n principal por la que la mujer dej\u00f3 de usar su m\u00e9todo anticonceptivo m\u00e1s reciente (DHS). Preguntar solo si fp_ever_used_any_method = verdadero Y fp_using_any_method = falso. Se usa para programaci\u00f3n: distingue la discontinuaci\u00f3n relacionada con el m\u00e9todo (efectos secundarios, falla) de la estructural (no disponibilidad, costo) y la intencional (deseo de embarazo).", "fr": "La principale raison pour laquelle la femme a arr\u00eat\u00e9 d''utiliser sa m\u00e9thode contraceptive la plus r\u00e9cente (DHS). Demander uniquement si fp_ever_used_any_method = vrai ET fp_using_any_method = faux. Utilis\u00e9 pour la programmation : distingue l''abandon li\u00e9 \u00e0 la m\u00e9thode (effets secondaires, \u00e9chec) de l''abandon structurel (indisponibilit\u00e9, co\u00fbt) et de l''abandon intentionnel (souhait de grossesse)."}, "id": "fp_reason_discontinuation", "label": {"en": "Main reason for contraceptive discontinuation", "es": "Raz\u00f3n principal para la discontinuaci\u00f3n anticonceptiva", "fr": "Principale raison d''abandon de la contraception"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women"], "vocabulary": "fp-discontinuation-reason"}'
      bibliography_refs: dhs-family-planning
  fp_reason_not_using:
    title:
      en: Main reason for not using any contraceptive method
      fr: Principale raison de ne pas utiliser de méthode contraceptive
      es: Razón principal para no usar ningún método anticonceptivo
    description:
      en: The main reason the woman is not using any contraceptive method (DHS non-use questions). Ask only if fp_using_any_method = false AND woman is in the need group (fecund, sexually active, not wanting a pregnancy soon). Enumerators do not prompt with response options; they record the spontaneous first response, then ask 'any other reason?'
      fr: La principale raison pour laquelle la femme n'utilise pas de méthode contraceptive (questions DHS sur la non-utilisation). Demander uniquement si fp_using_any_method = faux ET la femme fait partie du groupe ayant besoin (féconde, sexuellement active, ne souhaitant pas de grossesse prochainement). Les enquêteurs ne suggèrent pas d'options de réponse ; ils enregistrent la première réponse spontanée, puis demandent « Y a-t-il une autre raison ? »
      es: La razón principal por la que la mujer no usa ningún método anticonceptivo (preguntas DHS de no uso). Preguntar solo si fp_using_any_method = falso Y la mujer está en el grupo con necesidad (fecunda, sexualmente activa, no quiere un embarazo pronto). Los encuestadores no sugieren opciones de respuesta; registran la primera respuesta espontánea, luego preguntan '¿alguna otra razón?'
    slot_uri: aidops:fp_reason_not_using
    range: FpNonuseReason
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning"], "cardinality": "single", "category": "unmet_need", "core": false, "definition": {"en": "The main reason the woman is not using any contraceptive method (DHS non-use questions). Ask only if fp_using_any_method = false AND woman is in the need group (fecund, sexually active, not wanting a pregnancy soon). Enumerators do not prompt with response options; they record the spontaneous first response, then ask ''any other reason?''", "es": "La raz\u00f3n principal por la que la mujer no usa ning\u00fan m\u00e9todo anticonceptivo (preguntas DHS de no uso). Preguntar solo si fp_using_any_method = falso Y la mujer est\u00e1 en el grupo con necesidad (fecunda, sexualmente activa, no quiere un embarazo pronto). Los encuestadores no sugieren opciones de respuesta; registran la primera respuesta espont\u00e1nea, luego preguntan ''\u00bfalguna otra raz\u00f3n?''", "fr": "La principale raison pour laquelle la femme n''utilise pas de m\u00e9thode contraceptive (questions DHS sur la non-utilisation). Demander uniquement si fp_using_any_method = faux ET la femme fait partie du groupe ayant besoin (f\u00e9conde, sexuellement active, ne souhaitant pas de grossesse prochainement). Les enqu\u00eateurs ne sugg\u00e8rent pas d''options de r\u00e9ponse ; ils enregistrent la premi\u00e8re r\u00e9ponse spontan\u00e9e, puis demandent \u00ab Y a-t-il une autre raison ? \u00bb"}, "id": "fp_reason_not_using", "label": {"en": "Main reason for not using any contraceptive method", "es": "Raz\u00f3n principal para no usar ning\u00fan m\u00e9todo anticonceptivo", "fr": "Principale raison de ne pas utiliser de m\u00e9thode contraceptive"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "valid_instruments": ["dhs_women"], "vocabulary": "fp-nonuse-reason"}'
      bibliography_refs: dhs-family-planning
  fp_sexually_active_last_4_weeks:
    title:
      en: Sexually active in the last 4 weeks
      fr: Sexuellement active au cours des 4 dernières semaines
      es: Sexualmente activa en las últimas 4 semanas
    description:
      en: Whether the woman has had sexual intercourse in the last 4 weeks (DHS unmet need algorithm, V525 proxy). Ask all non-pregnant, non-using women 15–49. Skip if currently pregnant (handled by pregnancy_status). Denominator filter for unmet need among unmarried women. DHS uses 30-day activity. Enumerators must use local culturally appropriate terms.
      fr: Si la femme a eu des rapports sexuels au cours des 4 dernières semaines (algorithme DHS de besoin non satisfait, proxy V525). Demander à toutes les femmes non enceintes et non utilisatrices de 15 à 49 ans. Ignorer si actuellement enceinte (géré par pregnancy_status). Filtre de dénominateur pour le besoin non satisfait chez les femmes non mariées. Le DHS utilise l'activité sur 30 jours. Les enquêteurs doivent utiliser des termes locaux culturellement appropriés.
      es: Si la mujer ha tenido relaciones sexuales en las últimas 4 semanas (algoritmo de necesidad insatisfecha DHS, proxy V525). Preguntar a todas las mujeres no embarazadas y que no usan métodos de 15–49 años. Omitir si está actualmente embarazada (manejado por pregnancy_status). Filtro denominador para la necesidad insatisfecha entre mujeres solteras. El DHS usa actividad de 30 días. Los encuestadores deben usar términos culturalmente apropiados locales.
    slot_uri: aidops:fp_sexually_active_last_4_weeks
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-family-planning", "dhs-unmet-need-as25"], "cardinality": "single", "category": "unmet_need", "core": true, "definition": {"en": "Whether the woman has had sexual intercourse in the last 4 weeks (DHS unmet need algorithm, V525 proxy). Ask all non-pregnant, non-using women 15\u201349. Skip if currently pregnant (handled by pregnancy_status). Denominator filter for unmet need among unmarried women. DHS uses 30-day activity. Enumerators must use local culturally appropriate terms.", "es": "Si la mujer ha tenido relaciones sexuales en las \u00faltimas 4 semanas (algoritmo de necesidad insatisfecha DHS, proxy V525). Preguntar a todas las mujeres no embarazadas y que no usan m\u00e9todos de 15\u201349 a\u00f1os. Omitir si est\u00e1 actualmente embarazada (manejado por pregnancy_status). Filtro denominador para la necesidad insatisfecha entre mujeres solteras. El DHS usa actividad de 30 d\u00edas. Los encuestadores deben usar t\u00e9rminos culturalmente apropiados locales.", "fr": "Si la femme a eu des rapports sexuels au cours des 4 derni\u00e8res semaines (algorithme DHS de besoin non satisfait, proxy V525). Demander \u00e0 toutes les femmes non enceintes et non utilisatrices de 15 \u00e0 49 ans. Ignorer si actuellement enceinte (g\u00e9r\u00e9 par pregnancy_status). Filtre de d\u00e9nominateur pour le besoin non satisfait chez les femmes non mari\u00e9es. Le DHS utilise l''activit\u00e9 sur 30 jours. Les enqu\u00eateurs doivent utiliser des termes locaux culturellement appropri\u00e9s."}, "id": "fp_sexually_active_last_4_weeks", "label": {"en": "Sexually active in the last 4 weeks", "es": "Sexualmente activa en las \u00faltimas 4 semanas", "fr": "Sexuellement active au cours des 4 derni\u00e8res semaines"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_women"], "vocabulary": null}'
      bibliography_refs: dhs-family-planning,dhs-unmet-need-as25
  fp_source_of_method:
    title:
      en: Source of current contraceptive method
      fr: Source de la méthode contraceptive actuelle
      es: Fuente del método anticonceptivo actual
    description:
      en: Where the woman obtained or received her current contraceptive method most recently (DHS FP3; MICS CP3). If she is using multiple methods, ask about the main or most recently obtained method. Ask only if fp_using_any_method = true. Relevant for supply chain and public/private sector analysis.
      fr: Où la femme a obtenu ou reçu sa méthode contraceptive actuelle le plus récemment (DHS FP3 ; MICS CP3). Si elle utilise plusieurs méthodes, demander pour la méthode principale ou la plus récemment obtenue. Demander uniquement si fp_using_any_method = vrai. Pertinent pour l'analyse de la chaîne d'approvisionnement et des secteurs public/privé.
      es: Dónde obtuvo o recibió la mujer su método anticonceptivo actual más recientemente (DHS FP3; MICS CP3). Si usa múltiples métodos, preguntar sobre el método principal o el más recientemente obtenido. Preguntar solo si fp_using_any_method = verdadero. Relevante para el análisis de la cadena de suministro y el sector público/privado.
