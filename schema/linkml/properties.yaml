  pnc_newborn_timing:
    title:
      en: Timing of first postnatal check for newborn
      fr: Délai du premier contrôle postnatal pour le nouveau-né
      es: Momento de la primera revisión posnatal para el recién nacido
    description:
      en: When the newborn was first checked by a health worker after delivery. DHS-8 rh_pnc_nb_timing. Same pnc-timing vocabulary as mother. Only asked if pnc_newborn_any_check = yes. Drives pnc_newborn_within_2_days. If the check was NOT within 2 days, the five DHS-8 signal function items are skipped (per DHS-8 restriction).
      fr: Quand le nouveau-né a été examiné pour la première fois par un agent de santé après l'accouchement. DHS-8 rh_pnc_nb_timing. Même vocabulaire pnc-timing que pour la mère. Posé uniquement si pnc_newborn_any_check = oui. Génère pnc_newborn_within_2_days. Si le contrôle n'était PAS dans les 2 jours, les cinq items de fonctions signal DHS-8 sont ignorés (conformément à la restriction DHS-8).
      es: Cuándo fue revisado el recién nacido por primera vez por un trabajador de salud después del parto. DHS-8 rh_pnc_nb_timing. El mismo vocabulario pnc-timing que para la madre. Solo se pregunta si pnc_newborn_any_check = sí. Genera pnc_newborn_within_2_days. Si la revisión NO fue dentro de los 2 días, los cinco ítems de función de señal de DHS-8 se omiten (según la restricción DHS-8).
    slot_uri: aidops:pnc_newborn_timing
    range: PncTiming
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["adult"], "bibliography_refs": ["dhs-woman-questionnaire", "who-pnc-2022"], "cardinality": "single", "category": "postnatal_care", "core": true, "definition": {"en": "When the newborn was first checked by a health worker after delivery. DHS-8 rh_pnc_nb_timing. Same pnc-timing vocabulary as mother. Only asked if pnc_newborn_any_check = yes. Drives pnc_newborn_within_2_days. If the check was NOT within 2 days, the five DHS-8 signal function items are skipped (per DHS-8 restriction).", "es": "Cu\u00e1ndo fue revisado el reci\u00e9n nacido por primera vez por un trabajador de salud despu\u00e9s del parto. DHS-8 rh_pnc_nb_timing. El mismo vocabulario pnc-timing que para la madre. Solo se pregunta si pnc_newborn_any_check = s\u00ed. Genera pnc_newborn_within_2_days. Si la revisi\u00f3n NO fue dentro de los 2 d\u00edas, los cinco \u00edtems de funci\u00f3n de se\u00f1al de DHS-8 se omiten (seg\u00fan la restricci\u00f3n DHS-8).", "fr": "Quand le nouveau-n\u00e9 a \u00e9t\u00e9 examin\u00e9 pour la premi\u00e8re fois par un agent de sant\u00e9 apr\u00e8s l''accouchement. DHS-8 rh_pnc_nb_timing. M\u00eame vocabulaire pnc-timing que pour la m\u00e8re. Pos\u00e9 uniquement si pnc_newborn_any_check = oui. G\u00e9n\u00e8re pnc_newborn_within_2_days. Si le contr\u00f4le n''\u00e9tait PAS dans les 2 jours, les cinq items de fonctions signal DHS-8 sont ignor\u00e9s (conform\u00e9ment \u00e0 la restriction DHS-8)."}, "id": "pnc_newborn_timing", "label": {"en": "Timing of first postnatal check for newborn", "es": "Momento de la primera revisi\u00f3n posnatal para el reci\u00e9n nacido", "fr": "D\u00e9lai du premier contr\u00f4le postnatal pour le nouveau-n\u00e9"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "pnc-timing"}'
