      es: 'Etiqueta opcional de seguridad estructural asignada por un ingeniero calificado o evaluador de refugio capacitado, usando la taxonomía ATC-20 verde/amarillo/rojo. Frecuentemente nula: un encuestador del hogar no se espera que asigne una etiqueta de seguridad estructural, y muchas administraciones post-choque no incluyen una visita de inspector estructural.'
