es de se faire du mal d''une mani\u00e8re ou d''une autre. PHQ-9 item 9, d\u00e9pistage de l''id\u00e9ation suicidaire. Toute r\u00e9ponse autre que \u00ab pas du tout \u00bb constitue un d\u00e9pistage positif et requiert une r\u00e9ponse imm\u00e9diate via la fili\u00e8re de r\u00e9f\u00e9rence conform\u00e9ment aux instructions publi\u00e9es du PHQ-9 ; ceci est ind\u00e9pendant du niveau de s\u00e9v\u00e9rit\u00e9 total du PHQ-9. Valeur de notation : 0 (pas du tout) \u00e0 3 (presque tous les jours). Cette propri\u00e9t\u00e9 porte la sensibilit\u00e9 restricted et ne doit pas figurer dans les exports analytiques par d\u00e9faut ; le drapeau d''id\u00e9ation suicidaire doit \u00eatre g\u00e9r\u00e9 par un calcul en direct dans le formulaire et une invitation de r\u00e9f\u00e9rence visible par l''enqu\u00eateur\u00b7rice."}, "id": "phq9_9", "label": {"en": "PHQ-9 item 9: suicidal or self-harm ideation", "es": "PHQ-9 \u00edtem 9: ideaci\u00f3n suicida o de autolesi\u00f3n", "fr": "PHQ-9 item 9 : id\u00e9ation suicidaire ou d''automutilation"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "string", "vocabulary": "phq9-frequency-4pt"}'
