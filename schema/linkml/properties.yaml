  climate_vulnerability_flag:
    title:
      en: Composite climate vulnerability flag (high exposure + high sensitivity + low adaptive capacity)
      fr: Indicateur composite de vulnérabilité climatique (forte exposition + forte sensibilité + faible capacité d'adaptation)
      es: Indicador compuesto de vulnerabilidad climática (alta exposición + alta sensibilidad + baja capacidad de adaptación)
    description:
      en: 'Derived boolean flag combining all three IPCC vulnerability components. Recommended as a post-hoc computation rather than an in-form calculation given complexity, but can be computed in XLSForm for rapid field triage. Formula: HIGH_EXPOSURE = (count-selected(climate_hazards_experienced_past_5_years) >= 2) AND (climate_hazard_frequency_trend_perception IN (''much_increased'', ''somewhat_increased'') OR climate_hazard_severity_trend_perception IN (''much_increased'', ''somewhat_increased'')). HIGH_SENSITIVITY = climate_primary_livelihood_climate_dependent IN (''yes_fully_dependent'', ''yes_partially_dependent'') AND count-selected( climate_dwelling_vulnerable_location) >= 1 AND NOT(''none_no_specific_risk'' IN climate_dwelling_vulnerable_location). LOW_ADAPTIVE_CAPACITY = climate_adaptive_capacity_index <= 2. COMPOSITE_VULNERABLE = HIGH_EXPOSURE AND HIGH_SENSITIVITY AND LOW_ADAPTIVE_CAPACITY. A TRUE flag indicates a household that is simultaneously highly exposed, highly sensitive, and under-resourced for adaptation — a strong beneficiary prioritization signal. This is an IPCC-aligned rapid triage proxy; full vulnerability scoring requires integration at aggregate level. Derived, not asked.'
      fr: Indicateur booléen dérivé combinant les trois composantes de vulnérabilité du GIEC. Recommandé comme calcul post-hoc plutôt que comme calcul dans le formulaire, mais peut être calculé dans XLSForm pour un triage rapide sur le terrain. Formule documentée dans la définition anglaise. Un indicateur TRUE signale un ménage simultanément fortement exposé, fortement sensible et sous-équipé pour l'adaptation. Dérivé, non demandé.
      es: Indicador booleano derivado que combina los tres componentes de vulnerabilidad del IPCC. Se recomienda como cálculo post-hoc más que como cálculo en el formulario, aunque puede calcularse en XLSForm para triaje rápido en campo. La fórmula está documentada en la definición en inglés. Un indicador TRUE señala un hogar simultáneamente altamente expuesto, altamente sensible y con baja capacidad de adaptación. Derivado, no preguntado.
    slot_uri: aidops:climate_vulnerability_flag
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Derived boolean flag combining all three IPCC vulnerability components. Recommended as a post-hoc computation rather than an in-form calculation given complexity, but can be computed in XLSForm for rapid field triage. Formula: HIGH_EXPOSURE = (count-selected(climate_hazards_experienced_past_5_years) >= 2) AND (climate_hazard_frequency_trend_perception IN (''much_increased'', ''somewhat_increased'') OR climate_hazard_severity_trend_perception IN (''much_increased'', ''somewhat_increased'')). HIGH_SENSITIVITY = climate_primary_livelihood_climate_dependent IN (''yes_fully_dependent'', ''yes_partially_dependent'') AND count-selected( climate_dwelling_vulnerable_location) >= 1 AND NOT(''none_no_specific_risk'' IN climate_dwelling_vulnerable_location). LOW_ADAPTIVE_CAPACITY = climate_adaptive_capacity_index <= 2. COMPOSITE_VULNERABLE = HIGH_EXPOSURE AND HIGH_SENSITIVITY AND LOW_ADAPTIVE_CAPACITY. A TRUE flag indicates a household that is simultaneously highly exposed, highly sensitive, and under-resourced for adaptation \u2014 a strong beneficiary prioritization signal. This is an IPCC-aligned rapid triage proxy; full vulnerability scoring requires integration at aggregate level. Derived, not asked.\n", "es": "Indicador booleano derivado que combina los tres componentes de vulnerabilidad del IPCC. Se recomienda como c\u00e1lculo post-hoc m\u00e1s que como c\u00e1lculo en el formulario, aunque puede calcularse en XLSForm para triaje r\u00e1pido en campo. La f\u00f3rmula est\u00e1 documentada en la definici\u00f3n en ingl\u00e9s. Un indicador TRUE se\u00f1ala un hogar simult\u00e1neamente altamente expuesto, altamente sensible y con baja capacidad de adaptaci\u00f3n. Derivado, no preguntado.\n", "fr": "Indicateur bool\u00e9en d\u00e9riv\u00e9 combinant les trois composantes de vuln\u00e9rabilit\u00e9 du GIEC. Recommand\u00e9 comme calcul post-hoc plut\u00f4t que comme calcul dans le formulaire, mais peut \u00eatre calcul\u00e9 dans XLSForm pour un triage rapide sur le terrain. Formule document\u00e9e dans la d\u00e9finition anglaise. Un indicateur TRUE signale un m\u00e9nage simultan\u00e9ment fortement expos\u00e9, fortement sensible et sous-\u00e9quip\u00e9 pour l''adaptation. D\u00e9riv\u00e9, non demand\u00e9.\n"}, "id": "climate_vulnerability_flag", "label": {"en": "Composite climate vulnerability flag (high exposure + high sensitivity + low adaptive capacity)", "es": "Indicador compuesto de vulnerabilidad clim\u00e1tica (alta exposici\u00f3n + alta sensibilidad + baja capacidad de adaptaci\u00f3n)", "fr": "Indicateur composite de vuln\u00e9rabilit\u00e9 climatique (forte exposition + forte sensibilit\u00e9 + faible capacit\u00e9 d''adaptation)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
      bibliography_refs: ipcc-ar5-wg2-2014,ipcc-ar6-wg2-2022
  climate_water_source_impact:
    title:
      en: Climate change impact on household water source reliability
      fr: Impact du changement climatique sur la fiabilité de la source d'eau du ménage
      es: Impacto del cambio climático en la fiabilidad de la fuente de agua del hogar
    description:
      en: 'Single-select item asking whether the household''s main water source has become less reliable or stopped working altogether in the past five years due to changes in rainfall or temperature — for example, a borehole drying up, a river or spring drying out, or a seasonal source becoming unpredictable. This is a climate-trend reliability indicator, not a water-source characterization item. Boundary with WASHAssessmentProfile: that profile owns water source type (borehole, river, etc.) and service level. This property asks only whether climate-related change has reduced reliability. When both profiles are collected in the same survey, the form can display the previously collected water_source code in the question stem for respondent clarity, without re-asking the source type.'
      fr: 'Item à sélection unique demandant si la principale source d''eau du ménage est devenue moins fiable ou a complètement cessé de fonctionner au cours des cinq dernières années en raison de changements dans les précipitations ou la température. Il s''agit d''un indicateur de fiabilité tendancielle lié au climat, et non d''un item de caractérisation de la source d''eau. Frontière avec WASHAssessmentProfile : ce profil est propriétaire du type de source d''eau et du niveau de service. Cette propriété demande uniquement si le changement climatique a réduit la fiabilité.'
      es: 'Ítem de selección única que pregunta si la fuente de agua principal del hogar se ha vuelto menos confiable o ha dejado de funcionar por completo en los últimos cinco años debido a cambios en las lluvias o la temperatura. Es un indicador de confiabilidad tendencial climática, no un ítem de caracterización de la fuente de agua. Límite con WASHAssessmentProfile: ese perfil es propietario del tipo de fuente de agua y nivel de servicio. Esta propiedad pregunta solo si el cambio climático ha reducido la confiabilidad.'
    slot_uri: aidops:climate_water_source_impact
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "gcf-results-framework-2022", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": false, "definition": {"en": "Single-select item asking whether the household''s main water source has become less reliable or stopped working altogether in the past five years due to changes in rainfall or temperature \u2014 for example, a borehole drying up, a river or spring drying out, or a seasonal source becoming unpredictable. This is a climate-trend reliability indicator, not a water-source characterization item. Boundary with WASHAssessmentProfile: that profile owns water source type (borehole, river, etc.) and service level. This property asks only whether climate-related change has reduced reliability. When both profiles are collected in the same survey, the form can display the previously collected water_source code in the question stem for respondent clarity, without re-asking the source type.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si la fuente de agua principal del hogar se ha vuelto menos confiable o ha dejado de funcionar por completo en los \u00faltimos cinco a\u00f1os debido a cambios en las lluvias o la temperatura. Es un indicador de confiabilidad tendencial clim\u00e1tica, no un \u00edtem de caracterizaci\u00f3n de la fuente de agua. L\u00edmite con WASHAssessmentProfile: ese perfil es propietario del tipo de fuente de agua y nivel de servicio. Esta propiedad pregunta solo si el cambio clim\u00e1tico ha reducido la confiabilidad.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si la principale source d''eau du m\u00e9nage est devenue moins fiable ou a compl\u00e8tement cess\u00e9 de fonctionner au cours des cinq derni\u00e8res ann\u00e9es en raison de changements dans les pr\u00e9cipitations ou la temp\u00e9rature. Il s''agit d''un indicateur de fiabilit\u00e9 tendancielle li\u00e9 au climat, et non d''un item de caract\u00e9risation de la source d''eau. Fronti\u00e8re avec WASHAssessmentProfile : ce profil est propri\u00e9taire du type de source d''eau et du niveau de service. Cette propri\u00e9t\u00e9 demande uniquement si le changement climatique a r\u00e9duit la fiabilit\u00e9.\n"}, "id": "climate_water_source_impact", "label": {"en": "Climate change impact on household water source reliability", "es": "Impacto del cambio clim\u00e1tico en la fiabilidad de la fuente de agua del hogar", "fr": "Impact du changement climatique sur la fiabilit\u00e9 de la source d''eau du m\u00e9nage"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": null}'
      bibliography_refs: care-cvca-handbook-2019,gcf-results-framework-2022,ipcc-ar6-wg2-2022,oxfam-adaptation-toolkit-2019
  clothing_bedding_sufficient:
    title:
      en: Clothing and bedding are sufficient
      fr: Vêtements et literie suffisants
      es: Ropa y cama suficientes
    description:
      en: Household self-report of whether it currently has sufficient clothing and bedding items for all members. Self-report proxy complementing the objective count and condition items under Sphere Standard 1. Discordance between this item and the computed sphere_clothing_pass derived score indicates under- or over-reporting of need.
      fr: Auto-déclaration du ménage sur le fait de disposer actuellement d'articles vestimentaires et de literie suffisants pour tous ses membres. Indicateur auto-déclaré complémentant les items objectifs de dénombrement et d'état de la Norme Sphère 1. Une discordance entre cet item et le score dérivé sphere_clothing_pass indique une sous- ou sur-déclaration des besoins.
      es: Auto-reporte del hogar sobre si tiene actualmente artículos de ropa y cama suficientes para todos sus miembros. Indicador auto-reportado que complementa los ítems objetivos de conteo y condición de la Norma Esfera 1. Una discordancia entre este ítem y el puntaje derivado sphere_clothing_pass indica subreporte o sobrerreporte de necesidades.
