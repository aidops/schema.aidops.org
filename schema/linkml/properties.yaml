      fr: 'La catégorie de faim du ménage dérivée du hhs_score selon les seuils standard de FANTA : peu ou pas (0-1), modérée (2-3), sévère (4-5), très sévère (6). Quatre catégories selon le Guide des indicateurs HHS de FANTA (2010, révisé 2017).'
      es: 'La categoría de hambre del hogar derivada del hhs_score según los umbrales estándar de FANTA: poca o ninguna (0-1), moderada (2-3), grave (4-5), muy grave (6). Cuatro categorías según la Guía de indicadores HHS de FANTA (2010, revisada 2017).'
