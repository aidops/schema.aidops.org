  iycf_zero_veg_fruit:
    title:
      en: Zero vegetable or fruit consumption
      fr: Consommation nulle de légumes ou de fruits
      es: Consumo nulo de verduras o frutas
    description:
      en: 'Derived boolean: whether the child consumed no food from either the vitamin-A-rich fruits/vegetables group or the other fruits/vegetables group in the previous 24 hours. Applies to children 6–23 months. Formula: iycf_fg_vitamin_a_veg_fruit = false AND iycf_fg_other_veg_fruit = false. Zero vegetable or fruit consumption is a new unhealthy diet indicator in WHO/UNICEF 2021. True indicates dietary risk.'
      fr: 'Booléen dérivé : indique si l''enfant n''a consommé aucun aliment du groupe fruits/légumes riches en vitamine A ni du groupe autres fruits/légumes au cours des 24 heures précédentes. S''applique aux enfants de 6 à 23 mois. Formule : iycf_fg_vitamin_a_veg_fruit = faux ET iycf_fg_other_veg_fruit = faux. La consommation nulle de légumes ou de fruits est un nouvel indicateur d''alimentation non saine de l''OMS/UNICEF 2021. La valeur vrai indique un risque alimentaire.'
      es: 'Booleano derivado: indica si el niño no consumió ningún alimento del grupo de frutas/verduras ricas en vitamina A ni del grupo de otras frutas/verduras en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Fórmula: iycf_fg_vitamin_a_veg_fruit = falso Y iycf_fg_other_veg_fruit = falso. El consumo nulo de verduras o frutas es un nuevo indicador de dieta no saludable en OMS/UNICEF 2021. Verdadero indica riesgo dietético.'
    slot_uri: aidops:iycf_zero_veg_fruit
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1"], "bibliography_refs": ["who-iycf-2021"], "cardinality": "single", "category": "nutrition", "core": true, "definition": {"en": "Derived boolean: whether the child consumed no food from either the vitamin-A-rich fruits/vegetables group or the other fruits/vegetables group in the previous 24 hours. Applies to children 6\u201323 months. Formula: iycf_fg_vitamin_a_veg_fruit = false AND iycf_fg_other_veg_fruit = false. Zero vegetable or fruit consumption is a new unhealthy diet indicator in WHO/UNICEF 2021. True indicates dietary risk.", "es": "Booleano derivado: indica si el ni\u00f1o no consumi\u00f3 ning\u00fan alimento del grupo de frutas/verduras ricas en vitamina A ni del grupo de otras frutas/verduras en las 24 horas anteriores. Se aplica a ni\u00f1os de 6\u201323 meses. F\u00f3rmula: iycf_fg_vitamin_a_veg_fruit = falso Y iycf_fg_other_veg_fruit = falso. El consumo nulo de verduras o frutas es un nuevo indicador de dieta no saludable en OMS/UNICEF 2021. Verdadero indica riesgo diet\u00e9tico.", "fr": "Bool\u00e9en d\u00e9riv\u00e9 : indique si l''enfant n''a consomm\u00e9 aucun aliment du groupe fruits/l\u00e9gumes riches en vitamine A ni du groupe autres fruits/l\u00e9gumes au cours des 24 heures pr\u00e9c\u00e9dentes. S''applique aux enfants de 6 \u00e0 23 mois. Formule : iycf_fg_vitamin_a_veg_fruit = faux ET iycf_fg_other_veg_fruit = faux. La consommation nulle de l\u00e9gumes ou de fruits est un nouvel indicateur d''alimentation non saine de l''OMS/UNICEF 2021. La valeur vrai indique un risque alimentaire."}, "id": "iycf_zero_veg_fruit", "label": {"en": "Zero vegetable or fruit consumption", "es": "Consumo nulo de verduras o frutas", "fr": "Consommation nulle de l\u00e9gumes ou de fruits"}, "maturity": "draft", "references": null, "type": "boolean", "valid_instruments": ["who_iycf_2021"], "vocabulary": null}'
