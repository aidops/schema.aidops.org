  sanitation_facility_private:
    title:
      en: Sanitation facility is private
      fr: L'installation sanitaire est privée
      es: La instalación sanitaria es privada
    description:
      en: 'Whether the toilet or latrine facility is located in a private place, away from public view. Privacy is a Sphere minimum standard requirement (Sphere 2018 Standard 5: Excreta disposal). Particularly relevant for women, girls, and people with disabilities in displacement contexts. Skip if sanitation_facility is open_defecation.'
      fr: 'Si les toilettes ou la latrine sont situées dans un endroit privé, à l''abri des regards du public. La vie privée est une exigence de la norme minimale Sphère (Norme 5 Sphère 2018 : Élimination des excréta). Particulièrement pertinent pour les femmes, les filles et les personnes handicapées dans les contextes de déplacement. À sauter si sanitation_facility est open_defecation.'
      es: 'Si el inodoro o la letrina está ubicado en un lugar privado, fuera de la vista pública. La privacidad es un requisito del estándar mínimo de Esfera (Esfera 2018 Estándar 5: Eliminación de excrementos). Particularmente relevante para mujeres, niñas y personas con discapacidad en contextos de desplazamiento. Omitir si sanitation_facility es open_defecation.'
    slot_uri: aidops:sanitation_facility_private
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "sanitation", "core": false, "definition": {"en": "Whether the toilet or latrine facility is located in a private place, away from public view. Privacy is a Sphere minimum standard requirement (Sphere 2018 Standard 5: Excreta disposal). Particularly relevant for women, girls, and people with disabilities in displacement contexts. Skip if sanitation_facility is open_defecation.", "es": "Si el inodoro o la letrina est\u00e1 ubicado en un lugar privado, fuera de la vista p\u00fablica. La privacidad es un requisito del est\u00e1ndar m\u00ednimo de Esfera (Esfera 2018 Est\u00e1ndar 5: Eliminaci\u00f3n de excrementos). Particularmente relevante para mujeres, ni\u00f1as y personas con discapacidad en contextos de desplazamiento. Omitir si sanitation_facility es open_defecation.", "fr": "Si les toilettes ou la latrine sont situ\u00e9es dans un endroit priv\u00e9, \u00e0 l''abri des regards du public. La vie priv\u00e9e est une exigence de la norme minimale Sph\u00e8re (Norme 5 Sph\u00e8re 2018 : \u00c9limination des excr\u00e9ta). Particuli\u00e8rement pertinent pour les femmes, les filles et les personnes handicap\u00e9es dans les contextes de d\u00e9placement. \u00c0 sauter si sanitation_facility est open_defecation."}, "id": "sanitation_facility_private", "label": {"en": "Sanitation facility is private", "es": "La instalaci\u00f3n sanitaria es privada", "fr": "L''installation sanitaire est priv\u00e9e"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["sphere_2018"], "vocabulary": null}'
      bibliography_refs: sphere-2018
  sanitation_pit_emptied_by:
    title:
      en: Who emptied the pit/tank and how
      fr: Qui a vidangé la fosse/le réservoir et comment
      es: Quién vació la fosa/el depósito y cómo
    description:
      en: Who carried out the last emptying of the on-site sanitation containment and by what method. Asked only when sanitation_pit_last_emptied is not 'never'. Mechanical emptying by a service provider is more likely to result in safe fecal sludge treatment and thus contributes to the safely managed sanitation criterion. Based on MICS6 pilot question WS8B.
      fr: Qui a effectué le dernier vidange du dispositif d'assainissement sur site et par quelle méthode. Demandé uniquement quand sanitation_pit_last_emptied n'est pas 'never'. Le vidange mécanique par un prestataire de services est plus susceptible d'aboutir à un traitement sûr des boues fécales et contribue ainsi au critère d'assainissement à gestion sécurisée. Basé sur la question pilote MICS6 WS8B.
      es: Quién realizó el último vaciado del contenedor de saneamiento en el sitio y por qué método. Preguntado solo cuando sanitation_pit_last_emptied no es 'never'. El vaciado mecánico por un proveedor de servicios es más probable que resulte en un tratamiento seguro de los lodos fecales y así contribuye al criterio de saneamiento con gestión segura. Basado en la pregunta piloto MICS6 WS8B.
    slot_uri: aidops:sanitation_pit_emptied_by
    range: SanitationEmptyingActor
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "sanitation", "core": false, "definition": {"en": "Who carried out the last emptying of the on-site sanitation containment and by what method. Asked only when sanitation_pit_last_emptied is not ''never''. Mechanical emptying by a service provider is more likely to result in safe fecal sludge treatment and thus contributes to the safely managed sanitation criterion. Based on MICS6 pilot question WS8B.", "es": "Qui\u00e9n realiz\u00f3 el \u00faltimo vaciado del contenedor de saneamiento en el sitio y por qu\u00e9 m\u00e9todo. Preguntado solo cuando sanitation_pit_last_emptied no es ''never''. El vaciado mec\u00e1nico por un proveedor de servicios es m\u00e1s probable que resulte en un tratamiento seguro de los lodos fecales y as\u00ed contribuye al criterio de saneamiento con gesti\u00f3n segura. Basado en la pregunta piloto MICS6 WS8B.", "fr": "Qui a effectu\u00e9 le dernier vidange du dispositif d''assainissement sur site et par quelle m\u00e9thode. Demand\u00e9 uniquement quand sanitation_pit_last_emptied n''est pas ''never''. Le vidange m\u00e9canique par un prestataire de services est plus susceptible d''aboutir \u00e0 un traitement s\u00fbr des boues f\u00e9cales et contribue ainsi au crit\u00e8re d''assainissement \u00e0 gestion s\u00e9curis\u00e9e. Bas\u00e9 sur la question pilote MICS6 WS8B."}, "id": "sanitation_pit_emptied_by", "label": {"en": "Who emptied the pit/tank and how", "es": "Qui\u00e9n vaci\u00f3 la fosa/el dep\u00f3sito y c\u00f3mo", "fr": "Qui a vidang\u00e9 la fosse/le r\u00e9servoir et comment"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["mics6", "mics7"], "vocabulary": "sanitation-emptying-actor"}'
      bibliography_refs: jmp-core
  sanitation_pit_last_emptied:
    title:
      en: When pit/tank last emptied
      fr: Quand la fosse/le réservoir a été vidangé pour la dernière fois
      es: Cuándo fue vaciada la fosa/el depósito por última vez
    description:
      en: 'Time since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied. Asked only for on-site sanitation types: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Regular emptying and safe treatment is a criterion for the safely managed sanitation rung. Based on MICS6 pilot question WS8A.'
      fr: 'Temps écoulé depuis le dernier vidange du dispositif d''assainissement sur site (latrine à fosse, fosse septique ou toilettes à compostage). Demandé uniquement pour les types d''assainissement sur site : flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Un vidange régulier et un traitement sûr sont un critère pour le niveau d''assainissement à gestion sécurisée. Basé sur la question pilote MICS6 WS8A.'
      es: 'Tiempo transcurrido desde que se vació el contenedor de saneamiento en el sitio (letrina de fosa, fosa séptica o inodoro de compostaje). Preguntado solo para tipos de saneamiento en el sitio: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. El vaciado regular y el tratamiento seguro es un criterio para el peldaño de saneamiento con gestión segura. Basado en la pregunta piloto MICS6 WS8A.'
    slot_uri: aidops:sanitation_pit_last_emptied
    range: SanitationEmptyingTiming
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "cardinality": "single", "category": "sanitation", "core": false, "definition": {"en": "Time since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied. Asked only for on-site sanitation types: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Regular emptying and safe treatment is a criterion for the safely managed sanitation rung. Based on MICS6 pilot question WS8A.", "es": "Tiempo transcurrido desde que se vaci\u00f3 el contenedor de saneamiento en el sitio (letrina de fosa, fosa s\u00e9ptica o inodoro de compostaje). Preguntado solo para tipos de saneamiento en el sitio: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. El vaciado regular y el tratamiento seguro es un criterio para el pelda\u00f1o de saneamiento con gesti\u00f3n segura. Basado en la pregunta piloto MICS6 WS8A.", "fr": "Temps \u00e9coul\u00e9 depuis le dernier vidange du dispositif d''assainissement sur site (latrine \u00e0 fosse, fosse septique ou toilettes \u00e0 compostage). Demand\u00e9 uniquement pour les types d''assainissement sur site : flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Un vidange r\u00e9gulier et un traitement s\u00fbr sont un crit\u00e8re pour le niveau d''assainissement \u00e0 gestion s\u00e9curis\u00e9e. Bas\u00e9 sur la question pilote MICS6 WS8A."}, "id": "sanitation_pit_last_emptied", "label": {"en": "When pit/tank last emptied", "es": "Cu\u00e1ndo fue vaciada la fosa/el dep\u00f3sito por \u00faltima vez", "fr": "Quand la fosse/le r\u00e9servoir a \u00e9t\u00e9 vidang\u00e9 pour la derni\u00e8re fois"}, "maturity": "draft", "references": null, "type": "string", "valid_instruments": ["mics6", "mics7"], "vocabulary": "sanitation-emptying-timing"}'
