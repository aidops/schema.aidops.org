    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["crews-impact-based-forecasting-2021", "ifrc-fbf-ma-guide-2019", "undrr-sendai-target-g"], "cardinality": "single", "category": "hazard_event", "core": true, "definition": {"en": "Number of hours between the moment the household first received the warning and the arrival of the hazard event. Stored as an integer in hours; enumerators convert day answers into hours so that data quality is consistent across records. Valid range is 0 to 720 hours (up to 30 days); a sentinel value of -1 encodes ''don''t know''. Applicable only when warning_received is yes. Lead time is the single most important operational metric in Forecast-based Financing and Anticipatory Action programs because it determines whether a household could feasibly act on the warning. Dashboards typically derive a warning lead-time category (very short under 6 hours, short 6 to 24 hours, medium 24 to 72 hours, long 72 to 168 hours, very long over 168 hours) from this integer for reporting.", "es": "N\u00famero de horas entre el momento en que el hogar recibi\u00f3 por primera vez la alerta y la llegada del evento de peligro. Almacenado como entero en horas; los enumeradores convierten las respuestas en d\u00edas a horas para asegurar una calidad de datos consistente entre registros. Rango v\u00e1lido de 0 a 720 horas (hasta 30 d\u00edas); un valor centinela de -1 codifica \u00abno sabe\u00bb. Aplicable solo cuando warning_received es s\u00ed. El tiempo de anticipaci\u00f3n es la m\u00e9trica operativa m\u00e1s importante en los programas de financiamiento basado en pron\u00f3sticos y de acci\u00f3n anticipatoria, porque determina si un hogar pudo actuar factiblemente ante la alerta. Los paneles normalmente derivan de este entero una categor\u00eda de tiempo de anticipaci\u00f3n (muy corto menos de 6 horas, corto 6 a 24 horas, medio 24 a 72 horas, largo 72 a 168 horas, muy largo m\u00e1s de 168 horas) para el reporte.", "fr": "Nombre d''heures entre le moment o\u00f9 le m\u00e9nage a re\u00e7u l''alerte pour la premi\u00e8re fois et l''arriv\u00e9e de l''\u00e9v\u00e9nement dangereux. Stock\u00e9 en entier exprim\u00e9 en heures ; les enqu\u00eateurs convertissent les r\u00e9ponses exprim\u00e9es en jours en heures afin d''assurer une qualit\u00e9 de donn\u00e9es coh\u00e9rente entre les enregistrements. Plage valide de 0 \u00e0 720 heures (jusqu''\u00e0 30 jours) ; une valeur sentinelle de -1 code \u00ab ne sait pas \u00bb. Applicable uniquement si warning_received est oui. Le d\u00e9lai de pr\u00e9avis est la mesure op\u00e9rationnelle la plus importante dans les programmes de financement bas\u00e9 sur les pr\u00e9visions et d''action anticipatoire, car il d\u00e9termine si un m\u00e9nage a pu agir sur l''alerte. Les tableaux de bord d\u00e9rivent g\u00e9n\u00e9ralement de cet entier une cat\u00e9gorie de d\u00e9lai de pr\u00e9avis (tr\u00e8s court moins de 6 heures, court 6 \u00e0 24 heures, moyen 24 \u00e0 72 heures, long 72 \u00e0 168 heures, tr\u00e8s long plus de 168 heures) pour le reporting."}, "id": "warning_lead_time_hours", "label": {"en": "Warning lead time (hours)", "es": "Tiempo de anticipaci\u00f3n de la alerta (horas)", "fr": "D\u00e9lai de pr\u00e9avis de l''alerte (heures)"}, "maturity": "draft", "references": null, "type": "integer", "vocabulary": null}'
