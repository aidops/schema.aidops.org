que d''habitude \u2014 c''est-\u00e0-dire des inspirations courtes et rapides ? \u00bb Le principal indicateur de pneumonie PCIME captur\u00e9 du point de vue du soignant. Seuils sp\u00e9cifiques \u00e0 l''\u00e2ge (d\u00e9finition clinique, \u00e0 titre de r\u00e9f\u00e9rence pour le professionnel de sant\u00e9 uniquement) : \u226560 respirations/min pour les nourrissons de moins de 2 mois ; \u226550 respirations/min pour 2 \u00e0 11 mois ; \u226540 respirations/min pour 12 \u00e0 59 mois. Indicateur proxy rapport\u00e9 par le soignant. Posez uniquement si ari_cough_last_2wks est vrai. Code DHS h31 (composante respiratoire) ; code MICS ARI2."}, "id": "ari_fast_breathing", "label": {"en": "Fast or rapid breathing during cough", "es": "Respiraci\u00f3n r\u00e1pida durante la tos", "fr": "Respiration rapide pendant la toux"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
