      es: 'Indicador booleano derivado: verdadero si la encuestada reportó al menos un acto de VPI emocional de por vida. Fórmula: VERDADERO si cualquiera de los 3 ítems de VPI emocional de por vida = verdadero. Nota: encuestas anteriores a 2006 pueden tener solo 2 ítems emocionales. Derivado, no preguntado.'
