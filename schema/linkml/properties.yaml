  diarrhea_feeding_continued:
    title:
      en: Feeding continued during diarrhea
      fr: Alimentation poursuivie pendant la diarrhée
      es: Alimentación continuada durante la diarrea
    description:
      en: 'Whether the amount of food given to the child changed during the diarrhea episode compared to the child''s usual intake. Published wording: ''During the diarrhea, was (name) given the same amount of food, more food, or less food than usual?'' IMCI recommendation: continue feeding during diarrhea. DHS/MICS track this as an indicator of appropriate diarrhea management. Ask only if diarrhea_last_2wks is not false and child is consuming complementary foods (age over 6 months). DHS code h39 (DHS-7+); MICS code CD7.'
      fr: 'Si la quantité de nourriture donnée à l''enfant a changé pendant l''épisode de diarrhée par rapport à l''alimentation habituelle de l''enfant. Formulation publiée : « Pendant la diarrhée, (prénom) a-t-il/elle reçu la même quantité de nourriture, plus de nourriture ou moins de nourriture qu''habituellement ? » Recommandation PCIME : poursuivre l''alimentation pendant la diarrhée. DHS/MICS suivent cela comme un indicateur de prise en charge appropriée de la diarrhée. Posez uniquement si diarrhea_last_2wks est vrai et que l''enfant consomme des aliments complémentaires (âge supérieur à 6 mois). Code DHS h39 (DHS-7+) ; code MICS CD7.'
      es: 'Si la cantidad de alimentos dados al niño cambió durante el episodio de diarrea en comparación con la ingesta habitual del niño. Redacción publicada: ''Durante la diarrea, ¿se le dio a (nombre) la misma cantidad de alimentos, más alimentos o menos alimentos de lo habitual?'' Recomendación IMCI: continuar la alimentación durante la diarrea. DHS/MICS rastrean esto como un indicador de manejo apropiado de la diarrea. Preguntar solo si diarrhea_last_2wks es verdadero y el niño consume alimentos complementarios (edad mayor de 6 meses). Código DHS h39 (DHS-7+); código MICS CD7.'
    slot_uri: aidops:diarrhea_feeding_continued
    range: FeedingChange
    annotations:
