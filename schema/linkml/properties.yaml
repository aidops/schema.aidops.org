  climate_trend_perception_rainfall:
    title:
      en: Perceived trend in annual rainfall over the past 10–15 years
      fr: Tendance perçue des précipitations annuelles au cours des 10–15 dernières années
      es: Tendencia percibida en las lluvias anuales durante los últimos 10–15 años
    description:
      en: Single-select item asking whether the respondent perceives annual rainfall in their area to have increased, decreased, or stayed about the same compared to when they were growing up or 10–15 years ago. IPCC AR6 WGII Box 1.1 confirms that community-perceived rainfall trends show high concordance with observed meteorological data in data-sparse regions, making this a valid proxy indicator. Requires a respondent who has lived in the area for at least 10 years; the Form Author should add a soft eligibility gate.
      fr: Item à sélection unique demandant si le répondant perçoit que les précipitations annuelles dans sa région ont augmenté, diminué ou sont restées à peu près les mêmes par rapport à son enfance ou il y a 10 à 15 ans. Le Encadré 1.1 du GIEC AR6 WGII confirme que les tendances pluviométriques perçues par les communautés présentent une concordance élevée avec les données météorologiques observées dans les régions pauvres en données.
      es: Ítem de selección única que pregunta si el encuestado percibe que las lluvias anuales en su área han aumentado, disminuido o se han mantenido aproximadamente igual en comparación con cuando era joven o hace 10 a 15 años. El Recuadro 1.1 del IPCC AR6 WGII confirma que las tendencias de lluvias percibidas por la comunidad muestran alta concordancia con datos meteorológicos observados en regiones con escasez de datos.
    slot_uri: aidops:climate_trend_perception_rainfall
    range: ClimateTrendPerception
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["assar-adaptive-capacity-2017", "care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "cardinality": "single", "category": "climate", "core": true, "definition": {"en": "Single-select item asking whether the respondent perceives annual rainfall in their area to have increased, decreased, or stayed about the same compared to when they were growing up or 10\u201315 years ago. IPCC AR6 WGII Box 1.1 confirms that community-perceived rainfall trends show high concordance with observed meteorological data in data-sparse regions, making this a valid proxy indicator. Requires a respondent who has lived in the area for at least 10 years; the Form Author should add a soft eligibility gate.\n", "es": "\u00cdtem de selecci\u00f3n \u00fanica que pregunta si el encuestado percibe que las lluvias anuales en su \u00e1rea han aumentado, disminuido o se han mantenido aproximadamente igual en comparaci\u00f3n con cuando era joven o hace 10 a 15 a\u00f1os. El Recuadro 1.1 del IPCC AR6 WGII confirma que las tendencias de lluvias percibidas por la comunidad muestran alta concordancia con datos meteorol\u00f3gicos observados en regiones con escasez de datos.\n", "fr": "Item \u00e0 s\u00e9lection unique demandant si le r\u00e9pondant per\u00e7oit que les pr\u00e9cipitations annuelles dans sa r\u00e9gion ont augment\u00e9, diminu\u00e9 ou sont rest\u00e9es \u00e0 peu pr\u00e8s les m\u00eames par rapport \u00e0 son enfance ou il y a 10 \u00e0 15 ans. Le Encadr\u00e9 1.1 du GIEC AR6 WGII confirme que les tendances pluviom\u00e9triques per\u00e7ues par les communaut\u00e9s pr\u00e9sentent une concordance \u00e9lev\u00e9e avec les donn\u00e9es m\u00e9t\u00e9orologiques observ\u00e9es dans les r\u00e9gions pauvres en donn\u00e9es.\n"}, "id": "climate_trend_perception_rainfall", "label": {"en": "Perceived trend in annual rainfall over the past 10\u201315 years", "es": "Tendencia percibida en las lluvias anuales durante los \u00faltimos 10\u201315 a\u00f1os", "fr": "Tendance per\u00e7ue des pr\u00e9cipitations annuelles au cours des 10\u201315 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "climate-trend-perception"}'
