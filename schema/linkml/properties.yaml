      fr: Si l'établissement est ouvert 24 heures sur 24 et 7 jours sur 7 pour au moins un service (généralement urgences ou accouchement). Indicateur au niveau de l'établissement qui complète les items spécifiques aux services `hf_service_delivery_24_7` et `hf_service_emergency_24_7`. Rapporté par le responsable de l'établissement. Sphere 2018 Action Santé ; MISP.
      es: Si el establecimiento está abierto 24 horas los 7 días de la semana para al menos un servicio (normalmente emergencia o parto). Indicador a nivel del establecimiento que complementa los ítems específicos de servicios `hf_service_delivery_24_7` y `hf_service_emergency_24_7`. Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud; MISP.
