  warning_channels_all:
    title:
      en: All warning channels (multi-select)
      fr: Tous les canaux d'alerte (sélection multiple)
      es: Todos los canales de alerta (selección múltiple)
    description:
      en: All channels through which the household received the warning. Stored alongside warning_channel_primary so that analyses of channel redundancy (how often is the same warning received on two or more channels) do not collapse the 'first channel' signal. Applicable only when warning_received is yes. Values drawn from the warning-channel vocabulary.
      fr: Tous les canaux par lesquels le ménage a reçu l'alerte. Stocké aux côtés de warning_channel_primary afin que les analyses de redondance des canaux (à quelle fréquence la même alerte est-elle reçue sur deux canaux ou plus) ne fassent pas disparaître le signal « premier canal ». Applicable uniquement si warning_received est oui. Valeurs issues du vocabulaire warning-channel.
      es: Todos los canales por los que el hogar recibió la alerta. Se almacena junto con warning_channel_primary para que los análisis de redundancia de canales (con qué frecuencia se recibe la misma alerta por dos o más canales) no anulen la señal «primer canal». Aplicable solo cuando warning_received es sí. Valores tomados del vocabulario warning-channel.
    slot_uri: aidops:warning_channels_all
    range: WarningChannel
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "wmo-mhews-checklist-2018"], "cardinality": "multiple", "category": "hazard_event", "core": false, "definition": {"en": "All channels through which the household received the warning. Stored alongside warning_channel_primary so that analyses of channel redundancy (how often is the same warning received on two or more channels) do not collapse the ''first channel'' signal. Applicable only when warning_received is yes. Values drawn from the warning-channel vocabulary.", "es": "Todos los canales por los que el hogar recibi\u00f3 la alerta. Se almacena junto con warning_channel_primary para que los an\u00e1lisis de redundancia de canales (con qu\u00e9 frecuencia se recibe la misma alerta por dos o m\u00e1s canales) no anulen la se\u00f1al \u00abprimer canal\u00bb. Aplicable solo cuando warning_received es s\u00ed. Valores tomados del vocabulario warning-channel.", "fr": "Tous les canaux par lesquels le m\u00e9nage a re\u00e7u l''alerte. Stock\u00e9 aux c\u00f4t\u00e9s de warning_channel_primary afin que les analyses de redondance des canaux (\u00e0 quelle fr\u00e9quence la m\u00eame alerte est-elle re\u00e7ue sur deux canaux ou plus) ne fassent pas dispara\u00eetre le signal \u00ab premier canal \u00bb. Applicable uniquement si warning_received est oui. Valeurs issues du vocabulaire warning-channel."}, "id": "warning_channels_all", "label": {"en": "All warning channels (multi-select)", "es": "Todos los canales de alerta (selecci\u00f3n m\u00faltiple)", "fr": "Tous les canaux d''alerte (s\u00e9lection multiple)"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": "warning-channel"}'
      bibliography_refs: ifrc-fbf-ma-guide-2019,wmo-mhews-checklist-2018
  warning_had_action_guidance:
    title:
      en: Warning included action guidance
      fr: L'alerte incluait des consignes d'action
      es: La alerta incluyó orientación para la acción
    description:
      en: 'Whether the warning told the household clearly what actions to take to protect themselves and their property. Captured on a four-level scale: yes, no, partially, dont_remember. Applicable only when warning_received is yes. Action guidance is the bridge between WMO MHEWS pillar 3 (dissemination) and pillar 4 (response capability), and is the normative requirement of Sphere 2018 Core Standard 1 (affected populations receive timely, accurate, and actionable information).'
      fr: 'Indique si l''alerte a dit clairement au ménage quelles actions entreprendre pour se protéger et protéger ses biens. Capté sur une échelle à quatre niveaux : yes, no, partially, dont_remember. Applicable uniquement si warning_received est oui. Les consignes d''action constituent le pont entre le pilier 3 du WMO MHEWS (diffusion) et le pilier 4 (capacité de réponse), et constituent l''exigence normative de la Norme fondamentale 1 de Sphère 2018 (les populations affectées reçoivent des informations opportunes, exactes et exploitables).'
      es: 'Indica si la alerta dijo claramente al hogar qué acciones tomar para protegerse a sí mismos y a sus bienes. Capturado en una escala de cuatro niveles: yes, no, partially, dont_remember. Aplicable solo cuando warning_received es sí. La orientación sobre acción es el puente entre el pilar 3 del MHEWS de la OMM (difusión) y el pilar 4 (capacidad de respuesta), y constituye el requisito normativo del Estándar Central 1 de Esfera 2018 (las poblaciones afectadas reciben información oportuna, exacta y accionable).'
    slot_uri: aidops:warning_had_action_guidance
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-aap-early-response-2020", "ifrc-fbf-ma-guide-2019", "wmo-mhews-checklist-2018"], "cardinality": "single", "category": "hazard_event", "core": true, "definition": {"en": "Whether the warning told the household clearly what actions to take to protect themselves and their property. Captured on a four-level scale: yes, no, partially, dont_remember. Applicable only when warning_received is yes. Action guidance is the bridge between WMO MHEWS pillar 3 (dissemination) and pillar 4 (response capability), and is the normative requirement of Sphere 2018 Core Standard 1 (affected populations receive timely, accurate, and actionable information).", "es": "Indica si la alerta dijo claramente al hogar qu\u00e9 acciones tomar para protegerse a s\u00ed mismos y a sus bienes. Capturado en una escala de cuatro niveles: yes, no, partially, dont_remember. Aplicable solo cuando warning_received es s\u00ed. La orientaci\u00f3n sobre acci\u00f3n es el puente entre el pilar 3 del MHEWS de la OMM (difusi\u00f3n) y el pilar 4 (capacidad de respuesta), y constituye el requisito normativo del Est\u00e1ndar Central 1 de Esfera 2018 (las poblaciones afectadas reciben informaci\u00f3n oportuna, exacta y accionable).", "fr": "Indique si l''alerte a dit clairement au m\u00e9nage quelles actions entreprendre pour se prot\u00e9ger et prot\u00e9ger ses biens. Capt\u00e9 sur une \u00e9chelle \u00e0 quatre niveaux : yes, no, partially, dont_remember. Applicable uniquement si warning_received est oui. Les consignes d''action constituent le pont entre le pilier 3 du WMO MHEWS (diffusion) et le pilier 4 (capacit\u00e9 de r\u00e9ponse), et constituent l''exigence normative de la Norme fondamentale 1 de Sph\u00e8re 2018 (les populations affect\u00e9es re\u00e7oivent des informations opportunes, exactes et exploitables)."}, "id": "warning_had_action_guidance", "label": {"en": "Warning included action guidance", "es": "La alerta incluy\u00f3 orientaci\u00f3n para la acci\u00f3n", "fr": "L''alerte incluait des consignes d''action"}, "maturity": "draft", "references": null, "type": "string", "vocabulary": null}'
      bibliography_refs: iasc-aap-early-response-2020,ifrc-fbf-ma-guide-2019,wmo-mhews-checklist-2018
  warning_lead_time_hours:
    title:
      en: Warning lead time (hours)
      fr: Délai de préavis de l'alerte (heures)
      es: Tiempo de anticipación de la alerta (horas)
    description:
      en: Number of hours between the moment the household first received the warning and the arrival of the hazard event. Stored as an integer in hours; enumerators convert day answers into hours so that data quality is consistent across records. Valid range is 0 to 720 hours (up to 30 days); a sentinel value of -1 encodes 'don't know'. Applicable only when warning_received is yes. Lead time is the single most important operational metric in Forecast-based Financing and Anticipatory Action programs because it determines whether a household could feasibly act on the warning. Dashboards typically derive a warning lead-time category (very short under 6 hours, short 6 to 24 hours, medium 24 to 72 hours, long 72 to 168 hours, very long over 168 hours) from this integer for reporting.
      fr: Nombre d'heures entre le moment où le ménage a reçu l'alerte pour la première fois et l'arrivée de l'événement dangereux. Stocké en entier exprimé en heures ; les enquêteurs convertissent les réponses exprimées en jours en heures afin d'assurer une qualité de données cohérente entre les enregistrements. Plage valide de 0 à 720 heures (jusqu'à 30 jours) ; une valeur sentinelle de -1 code « ne sait pas ». Applicable uniquement si warning_received est oui. Le délai de préavis est la mesure opérationnelle la plus importante dans les programmes de financement basé sur les prévisions et d'action anticipatoire, car il détermine si un ménage a pu agir sur l'alerte. Les tableaux de bord dérivent généralement de cet entier une catégorie de délai de préavis (très court moins de 6 heures, court 6 à 24 heures, moyen 24 à 72 heures, long 72 à 168 heures, très long plus de 168 heures) pour le reporting.
      es: Número de horas entre el momento en que el hogar recibió por primera vez la alerta y la llegada del evento de peligro. Almacenado como entero en horas; los enumeradores convierten las respuestas en días a horas para asegurar una calidad de datos consistente entre registros. Rango válido de 0 a 720 horas (hasta 30 días); un valor centinela de -1 codifica «no sabe». Aplicable solo cuando warning_received es sí. El tiempo de anticipación es la métrica operativa más importante en los programas de financiamiento basado en pronósticos y de acción anticipatoria, porque determina si un hogar pudo actuar factiblemente ante la alerta. Los paneles normalmente derivan de este entero una categoría de tiempo de anticipación (muy corto menos de 6 horas, corto 6 a 24 horas, medio 24 a 72 horas, largo 72 a 168 horas, muy largo más de 168 horas) para el reporte.
