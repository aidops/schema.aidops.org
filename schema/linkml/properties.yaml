  shelter_repair_tool_kit_present:
    title:
      en: Shelter repair tool kit present
      fr: Kit d'outils de réparation d'abri présent
      es: Kit de herramientas de reparación de refugio presente
    description:
      en: 'Whether the household has a basic shelter repair tool set (hammer, nails, rope or wire). Sphere Standard 4: enable populations to build, maintain or repair shelters. UNHCR CRI catalogue lists Shelter Repair Tool Kits as a standard NFI. Complementary to technical_assistance_received on ShelterAdequacyProfile, which covers the knowledge/guidance dimension rather than tool ownership.'
      fr: 'Si le ménage dispose d''un jeu d''outils de base pour la réparation d''abri (marteau, clous, corde ou fil de fer). Norme Sphère 4 : permettre aux populations de construire, entretenir ou réparer les abris. Le catalogue HCR CRI liste les kits d''outils de réparation d''abri comme ANA standard. Complémentaire à technical_assistance_received de ShelterAdequacyProfile, qui couvre la dimension connaissance/conseil plutôt que la possession d''outils.'
      es: 'Si el hogar tiene un conjunto básico de herramientas para la reparación de refugio (martillo, clavos, cuerda o alambre). Norma Esfera 4: permitir a las poblaciones construir, mantener o reparar refugios. El catálogo ACNUR CRI lista los Kits de Herramientas de Reparación de Refugio como un ANF estándar. Complementario a technical_assistance_received de ShelterAdequacyProfile, que cubre la dimensión de conocimiento/orientación en lugar de la posesión de herramientas.'
    slot_uri: aidops:shelter_repair_tool_kit_present
    range: ShelterRepairKitCoverage
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "nfi", "core": true, "definition": {"en": "Whether the household has a basic shelter repair tool set (hammer, nails, rope or wire). Sphere Standard 4: enable populations to build, maintain or repair shelters. UNHCR CRI catalogue lists Shelter Repair Tool Kits as a standard NFI. Complementary to technical_assistance_received on ShelterAdequacyProfile, which covers the knowledge/guidance dimension rather than tool ownership.", "es": "Si el hogar tiene un conjunto b\u00e1sico de herramientas para la reparaci\u00f3n de refugio (martillo, clavos, cuerda o alambre). Norma Esfera 4: permitir a las poblaciones construir, mantener o reparar refugios. El cat\u00e1logo ACNUR CRI lista los Kits de Herramientas de Reparaci\u00f3n de Refugio como un ANF est\u00e1ndar. Complementario a technical_assistance_received de ShelterAdequacyProfile, que cubre la dimensi\u00f3n de conocimiento/orientaci\u00f3n en lugar de la posesi\u00f3n de herramientas.", "fr": "Si le m\u00e9nage dispose d''un jeu d''outils de base pour la r\u00e9paration d''abri (marteau, clous, corde ou fil de fer). Norme Sph\u00e8re 4 : permettre aux populations de construire, entretenir ou r\u00e9parer les abris. Le catalogue HCR CRI liste les kits d''outils de r\u00e9paration d''abri comme ANA standard. Compl\u00e9mentaire \u00e0 technical_assistance_received de ShelterAdequacyProfile, qui couvre la dimension connaissance/conseil plut\u00f4t que la possession d''outils."}, "id": "shelter_repair_tool_kit_present", "label": {"en": "Shelter repair tool kit present", "es": "Kit de herramientas de reparaci\u00f3n de refugio presente", "fr": "Kit d''outils de r\u00e9paration d''abri pr\u00e9sent"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "shelter-repair-kit-coverage"}'
