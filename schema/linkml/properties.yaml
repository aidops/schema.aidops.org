      es: Razones por las que la encuestada no buscó ayuda tras la violencia de pareja. Selección múltiple; registrar todas las mencionadas. Se pregunta solo si gbv_helpseeking_attempted = falso. Basado en baterías DHS y Estudio multipaís OMS.
