 car la pr\u00e9cision de rappel pour les estimations de part de r\u00e9colte est faible et les cat\u00e9gories par tranches sont standard dans la pratique d''\u00e9valuation rapide (guide EFSA du PAM, module des chocs du LSMS-ISA). `dont_know` est inclus comme l''une des options de r\u00e9ponse. Pos\u00e9e uniquement lorsque `crop_loss_shock_past_season` est `yes`."}, "id": "crop_loss_magnitude", "label": {"en": "Estimated magnitude of crop loss in the last agricultural season", "es": "Magnitud estimada de la p\u00e9rdida de cultivos en la \u00faltima temporada agr\u00edcola", "fr": "Ampleur estim\u00e9e de la perte de r\u00e9colte au cours de la derni\u00e8re saison agricole"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "crop-loss-band"}'
