  livelihood_resilience_score:
    title:
      en: Livelihood resilience composite score (0-100)
      fr: Score composite de résilience des moyens de subsistance (0-100)
      es: Puntuación compuesta de resiliencia de medios de vida (0-100)
    description:
      en: Integer 0-100 composite score summarising household livelihood resilience across diversification, assets, shock exposure, and coping dimensions. Intended as an AidOps-derived indicator, not an official FAO RIMA-II Resilience Capacity Index (RCI) value. The scoring recipe is documented in the AidOps analysis notes and is expected to combine `livelihood_diversity_count`, `income_diversification_index`, `productive_asset_types_owned` count, the RIMA-II pillar flags, and penalties for `shock_experienced_past_12mo` severity and stressed `shock_coping_strategy_used`. Drawn conceptually from the FAO RIMA-II RCI, the Tulane DRLA / USAID resilience measurement guidance, and the Sphere 2018 Livelihoods chapter. Derived, not asked.
      fr: Score composite entier 0-100 résumant la résilience des moyens de subsistance du ménage sur les dimensions diversification, actifs, exposition aux chocs et adaptation. Conçu comme un indicateur dérivé par AidOps, et non comme une valeur officielle de l'Indice de capacité de résilience (RCI) de FAO RIMA-II. La formule de calcul est documentée dans les notes d'analyse AidOps et devrait combiner `livelihood_diversity_count`, `income_diversification_index`, le nombre de `productive_asset_types_owned`, les indicateurs des piliers RIMA-II, et des pénalités pour la sévérité de `shock_experienced_past_12mo` et un `shock_coping_strategy_used` en situation de stress. Inspiré conceptuellement du RCI de FAO RIMA-II, des orientations de mesure de la résilience Tulane DRLA / USAID et du chapitre Moyens de subsistance de Sphère 2018. Dérivé, non demandé.
      es: Puntuación compuesta entera 0-100 que resume la resiliencia de los medios de vida del hogar en las dimensiones diversificación, activos, exposición a choques y afrontamiento. Concebida como un indicador derivado por AidOps, no como un valor oficial del Índice de Capacidad de Resiliencia (RCI) de FAO RIMA-II. La fórmula de cálculo está documentada en las notas de análisis de AidOps y se espera que combine `livelihood_diversity_count`, `income_diversification_index`, el recuento de `productive_asset_types_owned`, los indicadores de los pilares RIMA-II y penalizaciones por la severidad de `shock_experienced_past_12mo` y un `shock_coping_strategy_used` en situación de estrés. Inspirada conceptualmente en el RCI de FAO RIMA-II, las orientaciones de medición de resiliencia Tulane DRLA / USAID y el capítulo de Medios de Vida de Esfera 2018. Derivada, no preguntada.
    slot_uri: aidops:livelihood_resilience_score
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "cardinality": "single", "category": "scores", "core": false, "definition": {"en": "Integer 0-100 composite score summarising household livelihood resilience across diversification, assets, shock exposure, and coping dimensions. Intended as an AidOps-derived indicator, not an official FAO RIMA-II Resilience Capacity Index (RCI) value. The scoring recipe is documented in the AidOps analysis notes and is expected to combine `livelihood_diversity_count`, `income_diversification_index`, `productive_asset_types_owned` count, the RIMA-II pillar flags, and penalties for `shock_experienced_past_12mo` severity and stressed `shock_coping_strategy_used`. Drawn conceptually from the FAO RIMA-II RCI, the Tulane DRLA / USAID resilience measurement guidance, and the Sphere 2018 Livelihoods chapter. Derived, not asked.", "es": "Puntuaci\u00f3n compuesta entera 0-100 que resume la resiliencia de los medios de vida del hogar en las dimensiones diversificaci\u00f3n, activos, exposici\u00f3n a choques y afrontamiento. Concebida como un indicador derivado por AidOps, no como un valor oficial del \u00cdndice de Capacidad de Resiliencia (RCI) de FAO RIMA-II. La f\u00f3rmula de c\u00e1lculo est\u00e1 documentada en las notas de an\u00e1lisis de AidOps y se espera que combine `livelihood_diversity_count`, `income_diversification_index`, el recuento de `productive_asset_types_owned`, los indicadores de los pilares RIMA-II y penalizaciones por la severidad de `shock_experienced_past_12mo` y un `shock_coping_strategy_used` en situaci\u00f3n de estr\u00e9s. Inspirada conceptualmente en el RCI de FAO RIMA-II, las orientaciones de medici\u00f3n de resiliencia Tulane DRLA / USAID y el cap\u00edtulo de Medios de Vida de Esfera 2018. Derivada, no preguntada.", "fr": "Score composite entier 0-100 r\u00e9sumant la r\u00e9silience des moyens de subsistance du m\u00e9nage sur les dimensions diversification, actifs, exposition aux chocs et adaptation. Con\u00e7u comme un indicateur d\u00e9riv\u00e9 par AidOps, et non comme une valeur officielle de l''Indice de capacit\u00e9 de r\u00e9silience (RCI) de FAO RIMA-II. La formule de calcul est document\u00e9e dans les notes d''analyse AidOps et devrait combiner `livelihood_diversity_count`, `income_diversification_index`, le nombre de `productive_asset_types_owned`, les indicateurs des piliers RIMA-II, et des p\u00e9nalit\u00e9s pour la s\u00e9v\u00e9rit\u00e9 de `shock_experienced_past_12mo` et un `shock_coping_strategy_used` en situation de stress. Inspir\u00e9 conceptuellement du RCI de FAO RIMA-II, des orientations de mesure de la r\u00e9silience Tulane DRLA / USAID et du chapitre Moyens de subsistance de Sph\u00e8re 2018. D\u00e9riv\u00e9, non demand\u00e9."}, "id": "livelihood_resilience_score", "label": {"en": "Livelihood resilience composite score (0-100)", "es": "Puntuaci\u00f3n compuesta de resiliencia de medios de vida (0-100)", "fr": "Score composite de r\u00e9silience des moyens de subsistance (0-100)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "vocabulary": null}'
      bibliography_refs: fao-rima-2016
  livestock_counts:
    title:
      en: Livestock counts by species
      fr: Effectifs de bétail par espèce
      es: Conteos de ganado por especie
    description:
      en: Current count of animals owned by the household, one integer value per livestock-type code (cattle, sheep, goats, pigs, chickens, other_poultry, horses, donkeys_mules, camels, rabbits, beehives, other_livestock — see PS vocabulary `livestock-type`). Recorded as a repeat group or grid in the form with one row per species; `0` is a valid count when the species is not kept. Drawn from DHS-8 `hv246a`–`hv246k`, the LSMS-ISA livestock module, and FAO WCA 2020 livestock items. Feeds the TLU calculation (see `tlu_total`). Asked only when `hh_owns_livestock` is `yes`. In polygamous households, LSMS-ISA recommends interviewing the household member responsible for livestock separately; this is a form-implementation note, not a schema constraint.
      fr: Effectif actuel d'animaux détenus par le ménage, une valeur entière par code livestock-type (bovins, ovins, caprins, porcins, poulets, autre volaille, chevaux, ânes_mulets, chameaux, lapins, ruches, autre bétail — voir vocabulaire PS `livestock-type`). Enregistré en tant que groupe de répétition ou grille dans le formulaire avec une ligne par espèce ; `0` est un effectif valide lorsque l'espèce n'est pas élevée. Tiré de `hv246a`–`hv246k` du DHS-8, du module bétail du LSMS-ISA et des items bétail du WCA 2020 de la FAO. Alimente le calcul de TLU (voir `tlu_total`). Posé uniquement lorsque `hh_owns_livestock` est `yes`. Dans les ménages polygames, LSMS-ISA recommande d'interroger séparément le membre responsable du bétail ; il s'agit d'une note de mise en œuvre du formulaire, et non d'une contrainte du schéma.
      es: Conteo actual de animales poseídos por el hogar, un valor entero por código livestock-type (bovinos, ovinos, caprinos, porcinos, pollos, otras aves, caballos, burros_mulas, camellos, conejos, colmenas, otro ganado — ver vocabulario PS `livestock-type`). Registrado como grupo de repetición o cuadrícula en el formulario con una fila por especie; `0` es un conteo válido cuando la especie no se tiene. Tomado de `hv246a`–`hv246k` del DHS-8, del módulo de ganado del LSMS-ISA y de los ítems de ganado del WCA 2020 de la FAO. Alimenta el cálculo de TLU (ver `tlu_total`). Se pregunta solo cuando `hh_owns_livestock` es `yes`. En hogares polígamos, LSMS-ISA recomienda entrevistar por separado al miembro responsable del ganado; esta es una nota de implementación del formulario, no una restricción del esquema.
    slot_uri: aidops:livestock_counts
    range: LivestockType
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-household-possessions", "ilri-tlu-guidelines"], "cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Current count of animals owned by the household, one integer value per livestock-type code (cattle, sheep, goats, pigs, chickens, other_poultry, horses, donkeys_mules, camels, rabbits, beehives, other_livestock \u2014 see PS vocabulary `livestock-type`). Recorded as a repeat group or grid in the form with one row per species; `0` is a valid count when the species is not kept. Drawn from DHS-8 `hv246a`\u2013`hv246k`, the LSMS-ISA livestock module, and FAO WCA 2020 livestock items. Feeds the TLU calculation (see `tlu_total`). Asked only when `hh_owns_livestock` is `yes`. In polygamous households, LSMS-ISA recommends interviewing the household member responsible for livestock separately; this is a form-implementation note, not a schema constraint.", "es": "Conteo actual de animales pose\u00eddos por el hogar, un valor entero por c\u00f3digo livestock-type (bovinos, ovinos, caprinos, porcinos, pollos, otras aves, caballos, burros_mulas, camellos, conejos, colmenas, otro ganado \u2014 ver vocabulario PS `livestock-type`). Registrado como grupo de repetici\u00f3n o cuadr\u00edcula en el formulario con una fila por especie; `0` es un conteo v\u00e1lido cuando la especie no se tiene. Tomado de `hv246a`\u2013`hv246k` del DHS-8, del m\u00f3dulo de ganado del LSMS-ISA y de los \u00edtems de ganado del WCA 2020 de la FAO. Alimenta el c\u00e1lculo de TLU (ver `tlu_total`). Se pregunta solo cuando `hh_owns_livestock` es `yes`. En hogares pol\u00edgamos, LSMS-ISA recomienda entrevistar por separado al miembro responsable del ganado; esta es una nota de implementaci\u00f3n del formulario, no una restricci\u00f3n del esquema.", "fr": "Effectif actuel d''animaux d\u00e9tenus par le m\u00e9nage, une valeur enti\u00e8re par code livestock-type (bovins, ovins, caprins, porcins, poulets, autre volaille, chevaux, \u00e2nes_mulets, chameaux, lapins, ruches, autre b\u00e9tail \u2014 voir vocabulaire PS `livestock-type`). Enregistr\u00e9 en tant que groupe de r\u00e9p\u00e9tition ou grille dans le formulaire avec une ligne par esp\u00e8ce ; `0` est un effectif valide lorsque l''esp\u00e8ce n''est pas \u00e9lev\u00e9e. Tir\u00e9 de `hv246a`\u2013`hv246k` du DHS-8, du module b\u00e9tail du LSMS-ISA et des items b\u00e9tail du WCA 2020 de la FAO. Alimente le calcul de TLU (voir `tlu_total`). Pos\u00e9 uniquement lorsque `hh_owns_livestock` est `yes`. Dans les m\u00e9nages polygames, LSMS-ISA recommande d''interroger s\u00e9par\u00e9ment le membre responsable du b\u00e9tail ; il s''agit d''une note de mise en \u0153uvre du formulaire, et non d''une contrainte du sch\u00e9ma."}, "id": "livestock_counts", "label": {"en": "Livestock counts by species", "es": "Conteos de ganado por especie", "fr": "Effectifs de b\u00e9tail par esp\u00e8ce"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": "livestock-type"}'
      bibliography_refs: dhs-household-possessions,ilri-tlu-guidelines
  livestock_disease_exposure:
    title:
      en: Herd experienced significant disease-related illness or deaths — last 30 days
      fr: Le troupeau a connu des maladies ou des morts significatives liées à des maladies — 30 derniers jours
      es: El rebaño experimentó enfermedades o muertes significativas relacionadas con enfermedades — últimos 30 días
    description:
      en: 'Whether the household''s herd experienced significant illness or deaths that the respondent believes were caused by disease or parasites (rather than drought, raiding, or other non-disease causes) in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Used in LEGS initial assessment decision trees to determine the appropriate emergency response category (livestock health emergency vs. destocking vs. restocking). This item is distinct from `livestock_losses_count_past_12mo` (12-month quantitative losses from all causes) — this item is a current-season 30-day disease-flag. At household level this item is non-sensitive; aggregated disease outbreak reporting at zone level may have veterinary surveillance implications and the programme should coordinate reporting with the national veterinary authority when significant outbreaks are detected. Grounded in LEGS 3rd edition Chapter 5, IPC AFI pastoral annex (disease mortality as IPC evidence), FSNAU livestock health items, and Sphere 2018 LEGS livestock health standards. Recall: last 30 days.'
      fr: 'Si le troupeau du ménage a connu des maladies ou des morts importantes que le répondant croit causées par des maladies ou des parasites (et non par la sécheresse ou le pillage) au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Utilisé dans les arbres de décision d''évaluation initiale LEGS. Distinct de `livestock_losses_count_past_12mo` (pertes quantitatives sur 12 mois toutes causes confondues). Les rapports d''épidémie agrégés au niveau de la zone peuvent avoir des implications de surveillance vétérinaire. Fondé sur LEGS 3e éd. Chapitre 5, l''annexe pastoraliste IPC AFI, les items de santé du bétail FSNAU et les normes LEGS Sphère 2018. Rappel : 30 derniers jours.'
      es: 'Si el rebaño del hogar experimentó enfermedades o muertes significativas que el encuestado cree causadas por enfermedades o parásitos (en lugar de sequía, rapiña u otras causas no relacionadas con enfermedades) en los últimos 30 días. Sí / No / No sabe (vocabulario `yes-no-dk`). Usado en los árboles de decisión de evaluación inicial de LEGS. Distinto de `livestock_losses_count_past_12mo` (pérdidas cuantitativas de 12 meses de todas las causas). Los informes de brotes de enfermedades agregados a nivel de zona pueden tener implicaciones de vigilancia veterinaria. Fundamentado en LEGS 3.a ed. Capítulo 5, el anexo pastoralista IPC AFI, ítems de salud del ganado FSNAU y los estándares LEGS Esfera 2018. Recordatorio: últimos 30 días.'
    slot_uri: aidops:livestock_disease_exposure
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "sphere-handbook-2018-legs"], "cardinality": "single", "category": "pastoral_animal_health", "core": true, "definition": {"en": "Whether the household''s herd experienced significant illness or deaths that the respondent believes were caused by disease or parasites (rather than drought, raiding, or other non-disease causes) in the last 30 days. Yes / No / Don''t know (`yes-no-dk` vocabulary). Used in LEGS initial assessment decision trees to determine the appropriate emergency response category (livestock health emergency vs. destocking vs. restocking). This item is distinct from `livestock_losses_count_past_12mo` (12-month quantitative losses from all causes) \u2014 this item is a current-season 30-day disease-flag. At household level this item is non-sensitive; aggregated disease outbreak reporting at zone level may have veterinary surveillance implications and the programme should coordinate reporting with the national veterinary authority when significant outbreaks are detected. Grounded in LEGS 3rd edition Chapter 5, IPC AFI pastoral annex (disease mortality as IPC evidence), FSNAU livestock health items, and Sphere 2018 LEGS livestock health standards. Recall: last 30 days.", "es": "Si el reba\u00f1o del hogar experiment\u00f3 enfermedades o muertes significativas que el encuestado cree causadas por enfermedades o par\u00e1sitos (en lugar de sequ\u00eda, rapi\u00f1a u otras causas no relacionadas con enfermedades) en los \u00faltimos 30 d\u00edas. S\u00ed / No / No sabe (vocabulario `yes-no-dk`). Usado en los \u00e1rboles de decisi\u00f3n de evaluaci\u00f3n inicial de LEGS. Distinto de `livestock_losses_count_past_12mo` (p\u00e9rdidas cuantitativas de 12 meses de todas las causas). Los informes de brotes de enfermedades agregados a nivel de zona pueden tener implicaciones de vigilancia veterinaria. Fundamentado en LEGS 3.a ed. Cap\u00edtulo 5, el anexo pastoralista IPC AFI, \u00edtems de salud del ganado FSNAU y los est\u00e1ndares LEGS Esfera 2018. Recordatorio: \u00faltimos 30 d\u00edas.", "fr": "Si le troupeau du m\u00e9nage a connu des maladies ou des morts importantes que le r\u00e9pondant croit caus\u00e9es par des maladies ou des parasites (et non par la s\u00e9cheresse ou le pillage) au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Utilis\u00e9 dans les arbres de d\u00e9cision d''\u00e9valuation initiale LEGS. Distinct de `livestock_losses_count_past_12mo` (pertes quantitatives sur 12 mois toutes causes confondues). Les rapports d''\u00e9pid\u00e9mie agr\u00e9g\u00e9s au niveau de la zone peuvent avoir des implications de surveillance v\u00e9t\u00e9rinaire. Fond\u00e9 sur LEGS 3e \u00e9d. Chapitre 5, l''annexe pastoraliste IPC AFI, les items de sant\u00e9 du b\u00e9tail FSNAU et les normes LEGS Sph\u00e8re 2018. Rappel : 30 derniers jours."}, "id": "livestock_disease_exposure", "label": {"en": "Herd experienced significant disease-related illness or deaths \u2014 last 30 days", "es": "El reba\u00f1o experiment\u00f3 enfermedades o muertes significativas relacionadas con enfermedades \u2014 \u00faltimos 30 d\u00edas", "fr": "Le troupeau a connu des maladies ou des morts significatives li\u00e9es \u00e0 des maladies \u2014 30 derniers jours"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
      bibliography_refs: fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,sphere-handbook-2018-legs
  livestock_loss_cause:
    title:
      en: Primary cause of livestock losses in the last 12 months
      fr: Cause principale des pertes de bétail au cours des 12 derniers mois
      es: Causa principal de las pérdidas de ganado en los últimos 12 meses
    description:
      en: 'The primary cause of the livestock deaths or losses recorded in `livestock_losses_count_past_12mo`, captured as a single-select code from vocabulary `livestock-loss-cause`. Asked alongside the loss count to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Where multiple causes contributed, respondent selects the cause responsible for the majority of losses. Note: responses with code `raiding_theft` and `conflict_collateral` should be treated as partially sensitive (see sensitivity field) and aggregated to community level before sharing with non-programme partners. Recall period: 12 months.'
      fr: 'La cause principale des décès ou pertes de bétail enregistrés dans `livestock_losses_count_past_12mo`, capturée comme code de sélection unique dans le vocabulaire `livestock-loss-cause`. Posée en parallèle du comptage des pertes pour permettre l''analyse des causes d''attrition pour la classification IPC et la catégorisation de la réponse d''urgence LEGS. Lorsque plusieurs causes ont contribué, le répondant sélectionne la cause responsable de la majorité des pertes. Note : les réponses avec le code `raiding_theft` et `conflict_collateral` doivent être traitées comme partiellement sensibles et agrégées au niveau communautaire avant tout partage avec des partenaires non-programme. Période de rappel : 12 mois.'
      es: 'La causa principal de las muertes o pérdidas de ganado registradas en `livestock_losses_count_past_12mo`, capturada como código de selección única del vocabulario `livestock-loss-cause`. Se pregunta junto con el conteo de pérdidas para permitir el análisis de causas de desgaste para la clasificación IPC y la categorización de respuesta de emergencia LEGS. Cuando múltiples causas contribuyeron, el encuestado selecciona la causa responsable de la mayoría de las pérdidas. Nota: las respuestas con código `raiding_theft` y `conflict_collateral` deben tratarse como parcialmente sensibles y agregarse al nivel comunitario antes de compartir con socios fuera del programa. Período de recordatorio: 12 meses.'
    slot_uri: aidops:livestock_loss_cause
    range: LivestockLossCause
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_herd", "core": true, "definition": {"en": "The primary cause of the livestock deaths or losses recorded in `livestock_losses_count_past_12mo`, captured as a single-select code from vocabulary `livestock-loss-cause`. Asked alongside the loss count to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Where multiple causes contributed, respondent selects the cause responsible for the majority of losses. Note: responses with code `raiding_theft` and `conflict_collateral` should be treated as partially sensitive (see sensitivity field) and aggregated to community level before sharing with non-programme partners. Recall period: 12 months.", "es": "La causa principal de las muertes o p\u00e9rdidas de ganado registradas en `livestock_losses_count_past_12mo`, capturada como c\u00f3digo de selecci\u00f3n \u00fanica del vocabulario `livestock-loss-cause`. Se pregunta junto con el conteo de p\u00e9rdidas para permitir el an\u00e1lisis de causas de desgaste para la clasificaci\u00f3n IPC y la categorizaci\u00f3n de respuesta de emergencia LEGS. Cuando m\u00faltiples causas contribuyeron, el encuestado selecciona la causa responsable de la mayor\u00eda de las p\u00e9rdidas. Nota: las respuestas con c\u00f3digo `raiding_theft` y `conflict_collateral` deben tratarse como parcialmente sensibles y agregarse al nivel comunitario antes de compartir con socios fuera del programa. Per\u00edodo de recordatorio: 12 meses.", "fr": "La cause principale des d\u00e9c\u00e8s ou pertes de b\u00e9tail enregistr\u00e9s dans `livestock_losses_count_past_12mo`, captur\u00e9e comme code de s\u00e9lection unique dans le vocabulaire `livestock-loss-cause`. Pos\u00e9e en parall\u00e8le du comptage des pertes pour permettre l''analyse des causes d''attrition pour la classification IPC et la cat\u00e9gorisation de la r\u00e9ponse d''urgence LEGS. Lorsque plusieurs causes ont contribu\u00e9, le r\u00e9pondant s\u00e9lectionne la cause responsable de la majorit\u00e9 des pertes. Note : les r\u00e9ponses avec le code `raiding_theft` et `conflict_collateral` doivent \u00eatre trait\u00e9es comme partiellement sensibles et agr\u00e9g\u00e9es au niveau communautaire avant tout partage avec des partenaires non-programme. P\u00e9riode de rappel : 12 mois."}, "id": "livestock_loss_cause", "label": {"en": "Primary cause of livestock losses in the last 12 months", "es": "Causa principal de las p\u00e9rdidas de ganado en los \u00faltimos 12 meses", "fr": "Cause principale des pertes de b\u00e9tail au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "livestock-loss-cause"}'
      bibliography_refs: fsnau-seasonal-assessment-methodology-2022,legs-3rd-edition-2023
  livestock_losses_count_past_12mo:
    title:
      en: Total livestock losses in the last 12 months
      fr: Pertes totales de bétail au cours des 12 derniers mois
      es: Pérdidas totales de ganado en los últimos 12 meses
    description:
      en: 'Total number of animals the household lost due to any cause (drought, disease, raiding, natural disaster, conflict, or other) in the last 12 months. An integer count of all livestock deaths and disappearances regardless of species. Species-disaggregated losses are analytically preferable (LEGS recommends reporting camels and cattle separately from small ruminants) but are often too burdensome in rapid assessments; form authors can add a repeat group for species-disaggregated losses when time allows. The companion property `livestock_loss_cause` captures the primary cause code. Recall period: 12 months, consistent with LEGS initial assessment standards and HEA herd-attrition module. Grounded in LEGS 3rd edition initial assessment mortality items, FSNAU loss items, FEWSNET attrition analysis, HEA herd attrition module, and IPC AFI pastoral annex.'
      fr: 'Nombre total d''animaux perdus par le ménage pour toute cause (sécheresse, maladie, razzia, catastrophe naturelle, conflit ou autre) au cours des 12 derniers mois. Effectif entier de tous les décès et disparitions d''animaux indépendamment de l''espèce. Les pertes désagrégées par espèce sont analytiquement préférables (LEGS recommande de déclarer chameaux et bovins séparément des petits ruminants) mais souvent trop contraignantes dans les évaluations rapides. La propriété associée `livestock_loss_cause` capture le code de la cause principale. Période de rappel : 12 mois, conformément aux normes d''évaluation initiale LEGS et au module d''attrition du troupeau HEA.'
      es: 'Número total de animales que el hogar perdió por cualquier causa (sequía, enfermedad, rapiña, desastre natural, conflicto u otro) en los últimos 12 meses. Conteo entero de todas las muertes y desapariciones de animales independientemente de la especie. Las pérdidas desagregadas por especie son analíticamente preferibles (LEGS recomienda reportar camellos y bovinos separados de pequeños rumiantes) pero suelen ser demasiado onerosas en evaluaciones rápidas. La propiedad asociada `livestock_loss_cause` captura el código de la causa principal. Período de recordatorio: 12 meses, conforme a los estándares de evaluación inicial de LEGS y el módulo de desgaste del rebaño HEA.'
    slot_uri: aidops:livestock_losses_count_past_12mo
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "cardinality": "single", "category": "pastoral_herd", "core": true, "definition": {"en": "Total number of animals the household lost due to any cause (drought, disease, raiding, natural disaster, conflict, or other) in the last 12 months. An integer count of all livestock deaths and disappearances regardless of species. Species-disaggregated losses are analytically preferable (LEGS recommends reporting camels and cattle separately from small ruminants) but are often too burdensome in rapid assessments; form authors can add a repeat group for species-disaggregated losses when time allows. The companion property `livestock_loss_cause` captures the primary cause code. Recall period: 12 months, consistent with LEGS initial assessment standards and HEA herd-attrition module. Grounded in LEGS 3rd edition initial assessment mortality items, FSNAU loss items, FEWSNET attrition analysis, HEA herd attrition module, and IPC AFI pastoral annex.", "es": "N\u00famero total de animales que el hogar perdi\u00f3 por cualquier causa (sequ\u00eda, enfermedad, rapi\u00f1a, desastre natural, conflicto u otro) en los \u00faltimos 12 meses. Conteo entero de todas las muertes y desapariciones de animales independientemente de la especie. Las p\u00e9rdidas desagregadas por especie son anal\u00edticamente preferibles (LEGS recomienda reportar camellos y bovinos separados de peque\u00f1os rumiantes) pero suelen ser demasiado onerosas en evaluaciones r\u00e1pidas. La propiedad asociada `livestock_loss_cause` captura el c\u00f3digo de la causa principal. Per\u00edodo de recordatorio: 12 meses, conforme a los est\u00e1ndares de evaluaci\u00f3n inicial de LEGS y el m\u00f3dulo de desgaste del reba\u00f1o HEA.", "fr": "Nombre total d''animaux perdus par le m\u00e9nage pour toute cause (s\u00e9cheresse, maladie, razzia, catastrophe naturelle, conflit ou autre) au cours des 12 derniers mois. Effectif entier de tous les d\u00e9c\u00e8s et disparitions d''animaux ind\u00e9pendamment de l''esp\u00e8ce. Les pertes d\u00e9sagr\u00e9g\u00e9es par esp\u00e8ce sont analytiquement pr\u00e9f\u00e9rables (LEGS recommande de d\u00e9clarer chameaux et bovins s\u00e9par\u00e9ment des petits ruminants) mais souvent trop contraignantes dans les \u00e9valuations rapides. La propri\u00e9t\u00e9 associ\u00e9e `livestock_loss_cause` capture le code de la cause principale. P\u00e9riode de rappel : 12 mois, conform\u00e9ment aux normes d''\u00e9valuation initiale LEGS et au module d''attrition du troupeau HEA."}, "id": "livestock_losses_count_past_12mo", "label": {"en": "Total livestock losses in the last 12 months", "es": "P\u00e9rdidas totales de ganado en los \u00faltimos 12 meses", "fr": "Pertes totales de b\u00e9tail au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "integer", "vocabulary": null}'
      bibliography_refs: fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023
  livestock_stress_sale_past_season:
    title:
      en: Household sold livestock under distress in the last 12 months
      fr: Le ménage a vendu du bétail en situation de détresse au cours des 12 derniers mois
      es: El hogar vendió ganado bajo angustia en los últimos 12 meses
    description:
      en: Whether the household sold livestock at a below-normal price, or sold animals that would not normally have been sold, because of food shortage, debt, or other hardship during the past 12 months. Drawn from the LSMS-ISA livestock module (distress selling) and FAO LCS-related items. Overlaps conceptually with `lcs_sold_productive_assets` in `FoodSecurityProfile` (general coping behaviour) but is livestock-specific and captures both below-market price and unusual selection of animals sold; both items can coexist with a form-layer hint noting the difference. `dont_know` is retained as a distinct valid response. Asked only when `hh_owns_livestock` is `yes`.
      fr: Si le ménage a vendu du bétail à un prix inférieur à la normale, ou a vendu des animaux qu'il n'aurait normalement pas vendus, en raison d'une pénurie alimentaire, de dettes ou d'autres difficultés au cours des 12 derniers mois. Tiré du module bétail du LSMS-ISA (vente de détresse) et des items FAO liés au LCS. Chevauchement conceptuel avec `lcs_sold_productive_assets` dans `FoodSecurityProfile` (comportement général d'adaptation) mais cet item est spécifique au bétail et saisit à la fois le prix inférieur au marché et la sélection inhabituelle d'animaux vendus ; les deux items peuvent coexister avec une indication de formulaire précisant la différence. `dont_know` est conservé comme réponse valide distincte. Posée uniquement lorsque `hh_owns_livestock` est `yes`.
      es: Si el hogar vendió ganado a un precio inferior al normal, o vendió animales que normalmente no habría vendido, debido a escasez de alimentos, deudas u otras dificultades durante los últimos 12 meses. Tomado del módulo de ganado de LSMS-ISA (venta por angustia) y de ítems FAO relacionados con LCS. Se superpone conceptualmente con `lcs_sold_productive_assets` en `FoodSecurityProfile` (comportamiento general de afrontamiento) pero este ítem es específico del ganado y captura tanto el precio por debajo del mercado como la selección inusual de animales vendidos; ambos ítems pueden coexistir con una indicación del formulario señalando la diferencia. `dont_know` se mantiene como respuesta válida distinta. Se pregunta solo cuando `hh_owns_livestock` es `yes`.
    slot_uri: aidops:livestock_stress_sale_past_season
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "context", "core": false, "definition": {"en": "Whether the household sold livestock at a below-normal price, or sold animals that would not normally have been sold, because of food shortage, debt, or other hardship during the past 12 months. Drawn from the LSMS-ISA livestock module (distress selling) and FAO LCS-related items. Overlaps conceptually with `lcs_sold_productive_assets` in `FoodSecurityProfile` (general coping behaviour) but is livestock-specific and captures both below-market price and unusual selection of animals sold; both items can coexist with a form-layer hint noting the difference. `dont_know` is retained as a distinct valid response. Asked only when `hh_owns_livestock` is `yes`.", "es": "Si el hogar vendi\u00f3 ganado a un precio inferior al normal, o vendi\u00f3 animales que normalmente no habr\u00eda vendido, debido a escasez de alimentos, deudas u otras dificultades durante los \u00faltimos 12 meses. Tomado del m\u00f3dulo de ganado de LSMS-ISA (venta por angustia) y de \u00edtems FAO relacionados con LCS. Se superpone conceptualmente con `lcs_sold_productive_assets` en `FoodSecurityProfile` (comportamiento general de afrontamiento) pero este \u00edtem es espec\u00edfico del ganado y captura tanto el precio por debajo del mercado como la selecci\u00f3n inusual de animales vendidos; ambos \u00edtems pueden coexistir con una indicaci\u00f3n del formulario se\u00f1alando la diferencia. `dont_know` se mantiene como respuesta v\u00e1lida distinta. Se pregunta solo cuando `hh_owns_livestock` es `yes`.", "fr": "Si le m\u00e9nage a vendu du b\u00e9tail \u00e0 un prix inf\u00e9rieur \u00e0 la normale, ou a vendu des animaux qu''il n''aurait normalement pas vendus, en raison d''une p\u00e9nurie alimentaire, de dettes ou d''autres difficult\u00e9s au cours des 12 derniers mois. Tir\u00e9 du module b\u00e9tail du LSMS-ISA (vente de d\u00e9tresse) et des items FAO li\u00e9s au LCS. Chevauchement conceptuel avec `lcs_sold_productive_assets` dans `FoodSecurityProfile` (comportement g\u00e9n\u00e9ral d''adaptation) mais cet item est sp\u00e9cifique au b\u00e9tail et saisit \u00e0 la fois le prix inf\u00e9rieur au march\u00e9 et la s\u00e9lection inhabituelle d''animaux vendus ; les deux items peuvent coexister avec une indication de formulaire pr\u00e9cisant la diff\u00e9rence. `dont_know` est conserv\u00e9 comme r\u00e9ponse valide distincte. Pos\u00e9e uniquement lorsque `hh_owns_livestock` est `yes`."}, "id": "livestock_stress_sale_past_season", "label": {"en": "Household sold livestock under distress in the last 12 months", "es": "El hogar vendi\u00f3 ganado bajo angustia en los \u00faltimos 12 meses", "fr": "Le m\u00e9nage a vendu du b\u00e9tail en situation de d\u00e9tresse au cours des 12 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-dk"}'
  livestock_vet_access:
    title:
      en: Household had access to veterinary services in the last 12 months
      fr: Le ménage a eu accès à des services vétérinaires au cours des 12 derniers mois
      es: El hogar tuvo acceso a servicios veterinarios en los últimos 12 meses
    description:
      en: Whether the household had access to a veterinarian, animal-health worker, or veterinary-drug supplier when it needed one for its animals during the past 12 months. Drawn from the LSMS-ISA livestock module and FAO WCA 2020 Theme 06 (agricultural services). `dont_know` is retained as a distinct valid response. Asked only when `hh_owns_livestock` is `yes`.
      fr: Si le ménage a eu accès à un vétérinaire, un agent de santé animale ou un fournisseur de médicaments vétérinaires lorsqu'il en avait besoin pour ses animaux au cours des 12 derniers mois. Tiré du module bétail du LSMS-ISA et du Thème 06 du WCA 2020 de la FAO (services agricoles). `dont_know` est conservé comme réponse valide distincte. Posée uniquement lorsque `hh_owns_livestock` est `yes`.
      es: Si el hogar tuvo acceso a un veterinario, trabajador de salud animal o proveedor de medicamentos veterinarios cuando lo necesitaba para sus animales durante los últimos 12 meses. Tomado del módulo de ganado de LSMS-ISA y del Tema 06 del WCA 2020 de la FAO (servicios agrícolas). `dont_know` se mantiene como respuesta válida distinta. Se pregunta solo cuando `hh_owns_livestock` es `yes`.
    slot_uri: aidops:livestock_vet_access
    range: YesNoDk
    annotations:
