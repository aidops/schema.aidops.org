    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "gsc-indicators-v2", "iom-dtm-shelter-companion"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "The type of shelter arrangement the household is currently living in, classified by programme/occupancy arrangement and physical form. Distinct from dwelling_type (which uses census categories of construction durability): this property records where the household actually lives at assessment time, using humanitarian shelter typology aligned with Sphere and IOM DTM practice.", "es": "El tipo de arreglo de refugio en el que el hogar vive actualmente, clasificado por arreglo de programa/ocupaci\u00f3n y forma f\u00edsica. Distinto de dwelling_type (que usa categor\u00edas de censo de durabilidad de construcci\u00f3n): esta propiedad registra d\u00f3nde vive realmente el hogar al momento de la evaluaci\u00f3n, usando la tipolog\u00eda de refugio humanitario alineada con Esfera y la pr\u00e1ctica DTM de la OIM.", "fr": "Le type d''arrangement d''abri dans lequel le m\u00e9nage vit actuellement, class\u00e9 par arrangement de programme/occupation et forme physique. Distinct de dwelling_type (qui utilise des cat\u00e9gories de recensement de durabilit\u00e9 de construction) : cette propri\u00e9t\u00e9 consigne o\u00f9 le m\u00e9nage vit r\u00e9ellement au moment de l''\u00e9valuation, en utilisant la typologie d''abri humanitaire align\u00e9e sur la Sph\u00e8re et la pratique DTM de l''OIM."}, "id": "shelter_type", "label": {"en": "Shelter type", "es": "Tipo de refugio", "fr": "Type d''abri"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "iom_dtm_household", "gsc_standardised", "unhcr_nare"], "vocabulary": "shelter-situation-type"}'
