  nfi_overall_sufficient:
    title:
      en: Household NFI overall sufficiency (self-report)
      fr: Suffisance globale des ANA du ménage (auto-déclarée)
      es: Suficiencia global de ANF del hogar (auto-reportada)
    description:
      en: 'Household self-report of whether it currently has sufficient non-food items (clothing, bedding, cooking items, tools, and lighting equipment combined) to meet basic daily needs. Global Shelter Cluster composite outcome indicator (v2, 2024): percentage of households that report having minimum household items allowing comfortable sleeping, water and food storage, food preparation, cooking, eating, lighting, and clothing. Complements the scored sphere_*_pass composite derived from the count and condition items.'
      fr: 'Auto-déclaration du ménage sur le fait de disposer actuellement d''articles non alimentaires suffisants (vêtements, literie, articles de cuisine, outils et équipement d''éclairage combinés) pour répondre aux besoins quotidiens de base. Indicateur composite de résultat du Cluster Abri Mondial (v2, 2024) : pourcentage de ménages déclarant disposer des articles ménagers minimaux permettant un sommeil confortable, le stockage de l''eau et des aliments, la préparation et la cuisson des repas, l''éclairage et l''habillement. Complète le composite scoré sphere_*_pass dérivé des items de dénombrement et d''état.'
      es: 'Auto-reporte del hogar sobre si tiene actualmente artículos no alimentarios suficientes (ropa, cama, artículos de cocina, herramientas y equipo de iluminación combinados) para satisfacer las necesidades diarias básicas. Indicador compuesto de resultado del Clúster Global de Refugio (v2, 2024): porcentaje de hogares que reportan tener los artículos mínimos del hogar que permiten dormir cómodamente, almacenar agua y alimentos, preparar y cocinar comidas, iluminación y vestimenta. Complementa el compuesto puntuado sphere_*_pass derivado de los ítems de conteo y condición.'
