      publicschema_logical_document_json: '{"cardinality": "multiple", "category": "context", "core": false, "definition": {"en": "Type(s) of organisation or individual that provided agricultural extension or advisory services to the household during the past 12 months. Multi-select from vocabulary `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) because a household may receive advice from more than one channel. Drawn from the LSMS-ISA extension module and FAO WCA 2020 Theme 06. Asked only when `extension_visit_past_12mo` is `yes`.", "es": "Tipo(s) de organizaci\u00f3n o individuo que proporcion\u00f3 servicios de extensi\u00f3n agr\u00edcola o asesoramiento al hogar durante los \u00faltimos 12 meses. Selecci\u00f3n m\u00faltiple del vocabulario `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) porque un hogar puede recibir asesoramiento de m\u00e1s de un canal. Tomado del m\u00f3dulo de extensi\u00f3n de LSMS-ISA y del Tema 06 del WCA 2020 de la FAO. Se pregunta solo cuando `extension_visit_past_12mo` es `yes`.", "fr": "Type(s) d''organisation ou d''individu ayant fourni des services de vulgarisation agricole ou de conseil au m\u00e9nage au cours des 12 derniers mois. S\u00e9lection multiple dans le vocabulaire `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) car un m\u00e9nage peut recevoir des conseils de plus d''un canal. Tir\u00e9 du module de vulgarisation du LSMS-ISA et du Th\u00e8me 06 du WCA 2020 de la FAO. Pos\u00e9e uniquement lorsque `extension_visit_past_12mo` est `yes`."}, "id": "extension_provider_type", "label": {"en": "Extension provider type (past 12 months)", "es": "Tipo de proveedor de extensi\u00f3n (\u00faltimos 12 meses)", "fr": "Type de prestataire de vulgarisation (12 derniers mois)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "extension-provider-type"}'
  extension_visit_past_12mo:
    title:
      en: Agricultural extension contact in the last 12 months
      fr: Contact avec la vulgarisation agricole au cours des 12 derniers mois
      es: Contacto con extensión agrícola en los últimos 12 meses
    description:
      en: Whether any member of the household received a visit from, or contacted, an agricultural extension agent, agronomist, or other agricultural advisor during the past 12 months. Based on the LSMS-ISA extension module (standard question across Ethiopia ESS, Nigeria GHS-Panel, Tanzania NPS) and FAO WCA 2020 Theme 06. `dont_know` is retained as a distinct valid response. Asked when `hh_has_cultivable_land` is `yes` or `hh_owns_livestock` is `yes`; `extension_provider_type` skips when this is `no` or `dont_know`.
      fr: Si un membre du ménage a reçu la visite ou a contacté un agent de vulgarisation agricole, un agronome ou un autre conseiller agricole au cours des 12 derniers mois. Basé sur le module de vulgarisation du LSMS-ISA (question standard dans Ethiopie ESS, Nigeria GHS-Panel, Tanzanie NPS) et sur le Thème 06 du WCA 2020 de la FAO. `dont_know` est conservé comme réponse valide distincte. Posée lorsque `hh_has_cultivable_land` est `yes` ou `hh_owns_livestock` est `yes` ; `extension_provider_type` est sauté lorsque cette réponse est `no` ou `dont_know`.
      es: Si algún miembro del hogar recibió una visita o contactó a un agente de extensión agrícola, agrónomo u otro asesor agrícola durante los últimos 12 meses. Basado en el módulo de extensión de LSMS-ISA (pregunta estándar en Etiopía ESS, Nigeria GHS-Panel, Tanzania NPS) y en el Tema 06 del WCA 2020 de la FAO. `dont_know` se mantiene como respuesta válida distinta. Se pregunta cuando `hh_has_cultivable_land` es `yes` o `hh_owns_livestock` es `yes`; `extension_provider_type` se omite cuando esta respuesta es `no` o `dont_know`.
