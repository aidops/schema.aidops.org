  electricity_interruption_hours_per_week:
    title:
      en: Electricity outage duration (hours per week)
      fr: Durée des coupures d'électricité (heures par semaine)
      es: Duración de los cortes de electricidad (horas por semana)
    description:
      en: 'Total hours per week electricity is typically out when outages occur. Used in combination with electricity_interruptions_per_week to assess MTF Tier 2 reliability: Tier 2 and above requires both 3 or fewer disruptions per week AND fewer than 2 total outage hours per week. This second sub-item is needed to correctly distinguish Tier 2 from Tier 1 in the reliability attribute. Source: MTF household survey.'
      fr: 'Heures totales par semaine pendant lesquelles l''électricité est généralement coupée lors des pannes. Utilisé conjointement avec electricity_interruptions_per_week pour évaluer la fiabilité MTF niveau 2 : les niveaux 2 et supérieurs exigent à la fois 3 interruptions ou moins par semaine ET moins de 2 heures totales de coupure par semaine. Ce deuxième sous-item est nécessaire pour distinguer correctement le niveau 2 du niveau 1 dans l''attribut de fiabilité. Source : enquête ménage MTF.'
      es: 'Horas totales por semana que la electricidad está cortada cuando ocurren cortes. Se usa en combinación con electricity_interruptions_per_week para evaluar la fiabilidad MTF Nivel 2: el Nivel 2 y superiores requieren tanto 3 o menos interrupciones por semana COMO menos de 2 horas totales de corte por semana. Este segundo subítem es necesario para distinguir correctamente el Nivel 2 del Nivel 1 en el atributo de fiabilidad. Fuente: encuesta de hogares MTF.'
    slot_uri: aidops:electricity_interruption_hours_per_week
    range: integer
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "cardinality": "single", "category": "energy", "core": false, "definition": {"en": "Total hours per week electricity is typically out when outages occur. Used in combination with electricity_interruptions_per_week to assess MTF Tier 2 reliability: Tier 2 and above requires both 3 or fewer disruptions per week AND fewer than 2 total outage hours per week. This second sub-item is needed to correctly distinguish Tier 2 from Tier 1 in the reliability attribute. Source: MTF household survey.", "es": "Horas totales por semana que la electricidad est\u00e1 cortada cuando ocurren cortes. Se usa en combinaci\u00f3n con electricity_interruptions_per_week para evaluar la fiabilidad MTF Nivel 2: el Nivel 2 y superiores requieren tanto 3 o menos interrupciones por semana COMO menos de 2 horas totales de corte por semana. Este segundo sub\u00edtem es necesario para distinguir correctamente el Nivel 2 del Nivel 1 en el atributo de fiabilidad. Fuente: encuesta de hogares MTF.", "fr": "Heures totales par semaine pendant lesquelles l''\u00e9lectricit\u00e9 est g\u00e9n\u00e9ralement coup\u00e9e lors des pannes. Utilis\u00e9 conjointement avec electricity_interruptions_per_week pour \u00e9valuer la fiabilit\u00e9 MTF niveau 2 : les niveaux 2 et sup\u00e9rieurs exigent \u00e0 la fois 3 interruptions ou moins par semaine ET moins de 2 heures totales de coupure par semaine. Ce deuxi\u00e8me sous-item est n\u00e9cessaire pour distinguer correctement le niveau 2 du niveau 1 dans l''attribut de fiabilit\u00e9. Source : enqu\u00eate m\u00e9nage MTF."}, "id": "electricity_interruption_hours_per_week", "label": {"en": "Electricity outage duration (hours per week)", "es": "Duraci\u00f3n de los cortes de electricidad (horas por semana)", "fr": "Dur\u00e9e des coupures d''\u00e9lectricit\u00e9 (heures par semaine)"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "integer", "valid_instruments": ["se4all_mtf"], "vocabulary": null}'
