  flood_risk_perceived:
    title:
      en: Perceived flood risk
      fr: Risque d'inondation perçu
      es: Riesgo de inundación percibido
    description:
      en: 'Whether the household''s shelter is located in an area that floods during heavy rain, as perceived by the household. Recall: past 12 months. A household-level proxy for settlement-level flood risk. Sphere Standard 2 guidance notes address drainage and flooding hazards in shelter location planning.'
      fr: 'Si l''abri du ménage est situé dans une zone qui inonde pendant les fortes pluies, selon la perception du ménage. Période de rappel : 12 derniers mois. Un indicateur proxy au niveau du ménage pour le risque d''inondation au niveau de l''établissement. Les notes d''orientation de la Norme Sphère 2 abordent les risques de drainage et d''inondation dans la planification de l''emplacement des abris.'
      es: 'Si el refugio del hogar está ubicado en un área que se inunda durante lluvias intensas, según la percepción del hogar. Período de recordatorio: últimos 12 meses. Un indicador proxy a nivel del hogar para el riesgo de inundación a nivel de asentamiento. Las notas de orientación de la Norma Esfera 2 abordan los riesgos de drenaje e inundación en la planificación de la ubicación del refugio.'
    slot_uri: aidops:flood_risk_perceived
    range: FloodRiskPerceived
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "cardinality": "single", "category": "shelter", "core": true, "definition": {"en": "Whether the household''s shelter is located in an area that floods during heavy rain, as perceived by the household. Recall: past 12 months. A household-level proxy for settlement-level flood risk. Sphere Standard 2 guidance notes address drainage and flooding hazards in shelter location planning.", "es": "Si el refugio del hogar est\u00e1 ubicado en un \u00e1rea que se inunda durante lluvias intensas, seg\u00fan la percepci\u00f3n del hogar. Per\u00edodo de recordatorio: \u00faltimos 12 meses. Un indicador proxy a nivel del hogar para el riesgo de inundaci\u00f3n a nivel de asentamiento. Las notas de orientaci\u00f3n de la Norma Esfera 2 abordan los riesgos de drenaje e inundaci\u00f3n en la planificaci\u00f3n de la ubicaci\u00f3n del refugio.", "fr": "Si l''abri du m\u00e9nage est situ\u00e9 dans une zone qui inonde pendant les fortes pluies, selon la perception du m\u00e9nage. P\u00e9riode de rappel : 12 derniers mois. Un indicateur proxy au niveau du m\u00e9nage pour le risque d''inondation au niveau de l''\u00e9tablissement. Les notes d''orientation de la Norme Sph\u00e8re 2 abordent les risques de drainage et d''inondation dans la planification de l''emplacement des abris."}, "id": "flood_risk_perceived", "label": {"en": "Perceived flood risk", "es": "Riesgo de inundaci\u00f3n percibido", "fr": "Risque d''inondation per\u00e7u"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "valid_instruments": ["sphere_shelter_adequacy", "iom_dtm_household", "reach_msna"], "vocabulary": "flood-risk-perceived"}'
