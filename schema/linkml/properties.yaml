  climate_hazards_experienced_past_5_years:
    title:
      en: Climate hazards experienced in the past 5 years
      fr: Aléas climatiques subis au cours des 5 dernières années
      es: Peligros climáticos experimentados en los últimos 5 años
    description:
      en: 'Multi-select item recording which climate-related hazards have directly affected the household in the past five years. ''Affected'' means the hazard caused damage, loss of harvest, displacement, water shortage, or any other tangible impact on the household — not merely that it occurred in the area. The five-year window is the recommended minimum for hazard trend analysis per IPCC AR6 WGII methodological guidance. Boundary with LivelihoodProfile.shock_experienced_past_12mo: that item covers a 12-month recall for livelihood-coping purposes; this item covers a 5-year exposure window as a climate-trend indicator. Boundary with WarningResponseProfile: this item records hazard type exposure trends, not the event-level warning-reception and protective-action chain. When both profiles are collected in the same survey, coordinate with AgricultureProfile to avoid asking the respondent about hazard history twice.'
      fr: Item à sélection multiple enregistrant quels aléas climatiques ont directement affecté le ménage au cours des cinq dernières années. « Affecté » signifie que l'aléa a causé des dommages, une perte de récolte, un déplacement, une pénurie d'eau ou tout autre impact tangible sur le ménage — pas simplement qu'il s'est produit dans la zone. La fenêtre de cinq ans est la durée minimale recommandée pour l'analyse des tendances des aléas selon les orientations méthodologiques du GIEC AR6 WGII.
      es: Ítem de selección múltiple que registra qué peligros relacionados con el clima han afectado directamente al hogar en los últimos cinco años. «Afectado» significa que el peligro causó daños, pérdida de cosecha, desplazamiento, escasez de agua u otro impacto tangible sobre el hogar, no solo que ocurrió en el área. La ventana de cinco años es el mínimo recomendado para el análisis de tendencias de peligros según las orientaciones metodológicas del IPCC AR6 WGII.
    slot_uri: aidops:climate_hazards_experienced_past_5_years
    range: HazardTypeClimate
    multivalued: true
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar5-wg2-2014", "ipcc-ar6-wg2-2022", "nd-gain-methodology"], "cardinality": "multiple", "category": "climate", "core": true, "definition": {"en": "Multi-select item recording which climate-related hazards have directly affected the household in the past five years. ''Affected'' means the hazard caused damage, loss of harvest, displacement, water shortage, or any other tangible impact on the household \u2014 not merely that it occurred in the area. The five-year window is the recommended minimum for hazard trend analysis per IPCC AR6 WGII methodological guidance. Boundary with LivelihoodProfile.shock_experienced_past_12mo: that item covers a 12-month recall for livelihood-coping purposes; this item covers a 5-year exposure window as a climate-trend indicator. Boundary with WarningResponseProfile: this item records hazard type exposure trends, not the event-level warning-reception and protective-action chain. When both profiles are collected in the same survey, coordinate with AgricultureProfile to avoid asking the respondent about hazard history twice.\n", "es": "\u00cdtem de selecci\u00f3n m\u00faltiple que registra qu\u00e9 peligros relacionados con el clima han afectado directamente al hogar en los \u00faltimos cinco a\u00f1os. \u00abAfectado\u00bb significa que el peligro caus\u00f3 da\u00f1os, p\u00e9rdida de cosecha, desplazamiento, escasez de agua u otro impacto tangible sobre el hogar, no solo que ocurri\u00f3 en el \u00e1rea. La ventana de cinco a\u00f1os es el m\u00ednimo recomendado para el an\u00e1lisis de tendencias de peligros seg\u00fan las orientaciones metodol\u00f3gicas del IPCC AR6 WGII.\n", "fr": "Item \u00e0 s\u00e9lection multiple enregistrant quels al\u00e9as climatiques ont directement affect\u00e9 le m\u00e9nage au cours des cinq derni\u00e8res ann\u00e9es. \u00ab Affect\u00e9 \u00bb signifie que l''al\u00e9a a caus\u00e9 des dommages, une perte de r\u00e9colte, un d\u00e9placement, une p\u00e9nurie d''eau ou tout autre impact tangible sur le m\u00e9nage \u2014 pas simplement qu''il s''est produit dans la zone. La fen\u00eatre de cinq ans est la dur\u00e9e minimale recommand\u00e9e pour l''analyse des tendances des al\u00e9as selon les orientations m\u00e9thodologiques du GIEC AR6 WGII.\n"}, "id": "climate_hazards_experienced_past_5_years", "label": {"en": "Climate hazards experienced in the past 5 years", "es": "Peligros clim\u00e1ticos experimentados en los \u00faltimos 5 a\u00f1os", "fr": "Al\u00e9as climatiques subis au cours des 5 derni\u00e8res ann\u00e9es"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "hazard-type-climate"}'
