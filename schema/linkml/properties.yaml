  hf_staff_trained_recent:
    title:
      en: Staff trained on core services within past 24 months
      fr: Personnel formé aux services essentiels au cours des 24 derniers mois
      es: Personal capacitado en servicios esenciales en los últimos 24 meses
    description:
      en: Whether at least one staff member has received training on the facility's core services within the past 24 months. Reported by the facility in-charge. SARA service-specific readiness tracers commonly include a 'trained staff within the past 2 years' item; this property is a generic summary applicable to any service mix. Extended (non-core). `dont_know` is retained as a distinct response.
      fr: Si au moins un membre du personnel a reçu une formation sur les services essentiels de l'établissement au cours des 24 derniers mois. Rapporté par le responsable de l'établissement. Les indicateurs traceurs SARA de capacité spécifique aux services incluent couramment un item « personnel formé au cours des 2 dernières années » ; cette propriété est un résumé générique applicable à toute combinaison de services. Étendu (non-core). `dont_know` est conservé comme réponse distincte.
      es: Si al menos un miembro del personal ha recibido capacitación sobre los servicios esenciales del establecimiento en los últimos 24 meses. Reportado por el responsable del establecimiento. Los indicadores trazadores SARA de capacidad específica por servicio comúnmente incluyen un ítem «personal capacitado en los últimos 2 años»; esta propiedad es un resumen genérico aplicable a cualquier mezcla de servicios. Extendido (no-core). `dont_know` se mantiene como respuesta distinta.
    slot_uri: aidops:hf_staff_trained_recent
    range: YesNoDk
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-spa-revised-2022", "who-hhfa-2022"], "cardinality": "single", "category": "governance", "core": false, "definition": {"en": "Whether at least one staff member has received training on the facility''s core services within the past 24 months. Reported by the facility in-charge. SARA service-specific readiness tracers commonly include a ''trained staff within the past 2 years'' item; this property is a generic summary applicable to any service mix. Extended (non-core). `dont_know` is retained as a distinct response.", "es": "Si al menos un miembro del personal ha recibido capacitaci\u00f3n sobre los servicios esenciales del establecimiento en los \u00faltimos 24 meses. Reportado por el responsable del establecimiento. Los indicadores trazadores SARA de capacidad espec\u00edfica por servicio com\u00fanmente incluyen un \u00edtem \u00abpersonal capacitado en los \u00faltimos 2 a\u00f1os\u00bb; esta propiedad es un resumen gen\u00e9rico aplicable a cualquier mezcla de servicios. Extendido (no-core). `dont_know` se mantiene como respuesta distinta.", "fr": "Si au moins un membre du personnel a re\u00e7u une formation sur les services essentiels de l''\u00e9tablissement au cours des 24 derniers mois. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Les indicateurs traceurs SARA de capacit\u00e9 sp\u00e9cifique aux services incluent couramment un item \u00ab personnel form\u00e9 au cours des 2 derni\u00e8res ann\u00e9es \u00bb ; cette propri\u00e9t\u00e9 est un r\u00e9sum\u00e9 g\u00e9n\u00e9rique applicable \u00e0 toute combinaison de services. \u00c9tendu (non-core). `dont_know` est conserv\u00e9 comme r\u00e9ponse distincte."}, "id": "hf_staff_trained_recent", "label": {"en": "Staff trained on core services within past 24 months", "es": "Personal capacitado en servicios esenciales en los \u00faltimos 24 meses", "fr": "Personnel form\u00e9 aux services essentiels au cours des 24 derniers mois"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-dk"}'
