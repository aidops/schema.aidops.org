  latrine_lighting_path:
    title:
      en: Lighting on path to latrine at night
      fr: Éclairage sur le chemin vers les latrines la nuit
      es: Alumbrado en la ruta hacia la letrina de noche
    description:
      en: Whether the path between the household's shelter and the latrines or toilets is adequately lit at night. Sphere 2018 WASH Standard 3.1 guidance specifies that toilet location and design must eliminate threats to security day and night. Oxfam/WEDC evidence synthesis (2018) found that sexual violence risk is significantly higher when paths to WASH facilities are unlit; lighting combined with security patrols is more protective than lighting alone. The IRC Safety Audit Tool (2013) item 1 explicitly assesses night lighting of latrines and water points as a core safety indicator.
      fr: Si le chemin entre l'abri du ménage et les latrines ou toilettes est suffisamment éclairé la nuit. Les orientations de la Norme WASH Sphère 2018 3.1 précisent que l'emplacement et la conception des toilettes doivent éliminer les menaces à la sécurité de jour comme de nuit. La synthèse de preuves Oxfam/WEDC (2018) a constaté que le risque de violence sexuelle est significativement plus élevé lorsque les voies vers les installations EHA ne sont pas éclairées ; l'éclairage combiné à des patrouilles de sécurité est plus protecteur que l'éclairage seul. L'outil d'audit de sécurité IRC (2013) item 1 évalue explicitement l'éclairage nocturne des latrines et des points d'eau comme indicateur de sécurité central.
      es: Si la ruta entre el refugio del hogar y las letrinas o baños está adecuadamente iluminada por la noche. La orientación de la Norma WASH Esfera 2018 3.1 especifica que la ubicación y el diseño de los baños deben eliminar amenazas a la seguridad de día y de noche. La síntesis de evidencia Oxfam/WEDC (2018) encontró que el riesgo de violencia sexual es significativamente mayor cuando las rutas hacia instalaciones WASH no tienen alumbrado; el alumbrado combinado con patrullas de seguridad es más protector que el alumbrado solo. La Herramienta de Auditoría de Seguridad del IRC (2013), ítem 1, evalúa explícitamente el alumbrado nocturno de letrinas y puntos de agua como indicador central de seguridad.
    slot_uri: aidops:latrine_lighting_path
    range: SitePathLighting
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "oxfam-lighting-wash-gbv-2018", "sphere-2018"], "cardinality": "single", "category": "gbv_risk", "core": false, "definition": {"en": "Whether the path between the household''s shelter and the latrines or toilets is adequately lit at night. Sphere 2018 WASH Standard 3.1 guidance specifies that toilet location and design must eliminate threats to security day and night. Oxfam/WEDC evidence synthesis (2018) found that sexual violence risk is significantly higher when paths to WASH facilities are unlit; lighting combined with security patrols is more protective than lighting alone. The IRC Safety Audit Tool (2013) item 1 explicitly assesses night lighting of latrines and water points as a core safety indicator.", "es": "Si la ruta entre el refugio del hogar y las letrinas o ba\u00f1os est\u00e1 adecuadamente iluminada por la noche. La orientaci\u00f3n de la Norma WASH Esfera 2018 3.1 especifica que la ubicaci\u00f3n y el dise\u00f1o de los ba\u00f1os deben eliminar amenazas a la seguridad de d\u00eda y de noche. La s\u00edntesis de evidencia Oxfam/WEDC (2018) encontr\u00f3 que el riesgo de violencia sexual es significativamente mayor cuando las rutas hacia instalaciones WASH no tienen alumbrado; el alumbrado combinado con patrullas de seguridad es m\u00e1s protector que el alumbrado solo. La Herramienta de Auditor\u00eda de Seguridad del IRC (2013), \u00edtem 1, eval\u00faa expl\u00edcitamente el alumbrado nocturno de letrinas y puntos de agua como indicador central de seguridad.", "fr": "Si le chemin entre l''abri du m\u00e9nage et les latrines ou toilettes est suffisamment \u00e9clair\u00e9 la nuit. Les orientations de la Norme WASH Sph\u00e8re 2018 3.1 pr\u00e9cisent que l''emplacement et la conception des toilettes doivent \u00e9liminer les menaces \u00e0 la s\u00e9curit\u00e9 de jour comme de nuit. La synth\u00e8se de preuves Oxfam/WEDC (2018) a constat\u00e9 que le risque de violence sexuelle est significativement plus \u00e9lev\u00e9 lorsque les voies vers les installations EHA ne sont pas \u00e9clair\u00e9es ; l''\u00e9clairage combin\u00e9 \u00e0 des patrouilles de s\u00e9curit\u00e9 est plus protecteur que l''\u00e9clairage seul. L''outil d''audit de s\u00e9curit\u00e9 IRC (2013) item 1 \u00e9value explicitement l''\u00e9clairage nocturne des latrines et des points d''eau comme indicateur de s\u00e9curit\u00e9 central."}, "id": "latrine_lighting_path", "label": {"en": "Lighting on path to latrine at night", "es": "Alumbrado en la ruta hacia la letrina de noche", "fr": "\u00c9clairage sur le chemin vers les latrines la nuit"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "site-path-lighting"}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015,irc-safety-audit-2013,oxfam-lighting-wash-gbv-2018,sphere-2018
  latrine_sex_segregated:
    title:
      en: Latrines are sex-segregated
      fr: Latrines séparées par sexe
      es: Letrinas segregadas por sexo
    description:
      en: Whether the latrines or toilets used by the household are physically separated and clearly marked for men and women. Codes distinguish between communal facilities that are or are not segregated, private household facilities (not shared), and 'don't know'. Sphere 2018 WASH Standard 3.1 specifies that toilet blocks must be segregated by sex and marked with culturally appropriate signage. The IRC Safety Audit Tool (2013) item 4 includes sex segregation as a core site latrine safety indicator.
      fr: Si les latrines ou toilettes utilisées par le ménage sont séparées physiquement et clairement indiquées pour les hommes et les femmes. Les codes distinguent les installations communales séparées ou non par sexe, les installations privées du ménage (non partagées) et 'ne sait pas'. La Norme WASH Sphère 2018 3.1 précise que les blocs de toilettes doivent être séparés par sexe et signalisés avec des panneaux culturellement appropriés. L'outil d'audit de sécurité IRC (2013) item 4 inclut la ségrégation par sexe comme indicateur de sécurité latrine du site.
      es: Si las letrinas o baños utilizados por el hogar están física y claramente separados para hombres y mujeres. Los códigos distinguen entre instalaciones comunales que están o no segregadas por sexo, instalaciones privadas del hogar (no compartidas) y 'no sabe'. La Norma WASH Esfera 2018 3.1 especifica que los bloques de baños deben estar segregados por sexo y señalizados con carteles culturalmente apropiados. La Herramienta de Auditoría de Seguridad del IRC (2013), ítem 4, incluye la segregación por sexo como indicador central de seguridad de letrinas del sitio.
    slot_uri: aidops:latrine_sex_segregated
    range: LatrineSexSegregation
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "sphere-2018"], "cardinality": "single", "category": "gbv_risk", "core": false, "definition": {"en": "Whether the latrines or toilets used by the household are physically separated and clearly marked for men and women. Codes distinguish between communal facilities that are or are not segregated, private household facilities (not shared), and ''don''t know''. Sphere 2018 WASH Standard 3.1 specifies that toilet blocks must be segregated by sex and marked with culturally appropriate signage. The IRC Safety Audit Tool (2013) item 4 includes sex segregation as a core site latrine safety indicator.", "es": "Si las letrinas o ba\u00f1os utilizados por el hogar est\u00e1n f\u00edsica y claramente separados para hombres y mujeres. Los c\u00f3digos distinguen entre instalaciones comunales que est\u00e1n o no segregadas por sexo, instalaciones privadas del hogar (no compartidas) y ''no sabe''. La Norma WASH Esfera 2018 3.1 especifica que los bloques de ba\u00f1os deben estar segregados por sexo y se\u00f1alizados con carteles culturalmente apropiados. La Herramienta de Auditor\u00eda de Seguridad del IRC (2013), \u00edtem 4, incluye la segregaci\u00f3n por sexo como indicador central de seguridad de letrinas del sitio.", "fr": "Si les latrines ou toilettes utilis\u00e9es par le m\u00e9nage sont s\u00e9par\u00e9es physiquement et clairement indiqu\u00e9es pour les hommes et les femmes. Les codes distinguent les installations communales s\u00e9par\u00e9es ou non par sexe, les installations priv\u00e9es du m\u00e9nage (non partag\u00e9es) et ''ne sait pas''. La Norme WASH Sph\u00e8re 2018 3.1 pr\u00e9cise que les blocs de toilettes doivent \u00eatre s\u00e9par\u00e9s par sexe et signalis\u00e9s avec des panneaux culturellement appropri\u00e9s. L''outil d''audit de s\u00e9curit\u00e9 IRC (2013) item 4 inclut la s\u00e9gr\u00e9gation par sexe comme indicateur de s\u00e9curit\u00e9 latrine du site."}, "id": "latrine_sex_segregated", "label": {"en": "Latrines are sex-segregated", "es": "Letrinas segregadas por sexo", "fr": "Latrines s\u00e9par\u00e9es par sexe"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "latrine-sex-segregation"}'
