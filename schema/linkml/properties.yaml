  hf_staff_vacancy_rate:
    title:
      en: Staff vacancy rate (percent)
      fr: Taux de vacance du personnel (pourcentage)
      es: Tasa de vacantes de personal (porcentaje)
    description:
      en: 'Percentage of established clinical posts at the facility that are currently vacant. Numeric 0-100. Reported by the facility in-charge. Only meaningful in countries that publish establishment tables for facilities; where no establishment table exists, leave unpopulated rather than imputing. Extended (non-core). Politically sensitive: staffing gaps can be used to argue a ministry has failed to post staff, or to target reprisals in conflict zones.'
      fr: 'Pourcentage des postes cliniques établis à l''établissement qui sont actuellement vacants. Numérique 0-100. Rapporté par le responsable de l''établissement. Pertinent uniquement dans les pays qui publient des tables d''effectifs par établissement ; en l''absence, laisser non renseigné plutôt qu''imputer. Étendu (non-core). Politiquement sensible : les lacunes d''effectifs peuvent être utilisées pour argumenter qu''un ministère a échoué à affecter du personnel, ou pour cibler des représailles en zones de conflit.'
      es: 'Porcentaje de plazas clínicas establecidas en el establecimiento que están actualmente vacantes. Numérico 0-100. Reportado por el responsable del establecimiento. Solo pertinente en países que publican tablas de plantilla para establecimientos; donde no exista tabla de plantilla, dejar sin completar en vez de imputar. Extendido (no-core). Políticamente sensible: las brechas de dotación pueden usarse para argumentar que un ministerio no ha asignado personal, o para focalizar represalias en zonas de conflicto.'
    slot_uri: aidops:hf_staff_vacancy_rate
    range: string
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "cardinality": "single", "category": "governance", "core": false, "definition": {"en": "Percentage of established clinical posts at the facility that are currently vacant. Numeric 0-100. Reported by the facility in-charge. Only meaningful in countries that publish establishment tables for facilities; where no establishment table exists, leave unpopulated rather than imputing. Extended (non-core). Politically sensitive: staffing gaps can be used to argue a ministry has failed to post staff, or to target reprisals in conflict zones.", "es": "Porcentaje de plazas cl\u00ednicas establecidas en el establecimiento que est\u00e1n actualmente vacantes. Num\u00e9rico 0-100. Reportado por el responsable del establecimiento. Solo pertinente en pa\u00edses que publican tablas de plantilla para establecimientos; donde no exista tabla de plantilla, dejar sin completar en vez de imputar. Extendido (no-core). Pol\u00edticamente sensible: las brechas de dotaci\u00f3n pueden usarse para argumentar que un ministerio no ha asignado personal, o para focalizar represalias en zonas de conflicto.", "fr": "Pourcentage des postes cliniques \u00e9tablis \u00e0 l''\u00e9tablissement qui sont actuellement vacants. Num\u00e9rique 0-100. Rapport\u00e9 par le responsable de l''\u00e9tablissement. Pertinent uniquement dans les pays qui publient des tables d''effectifs par \u00e9tablissement ; en l''absence, laisser non renseign\u00e9 plut\u00f4t qu''imputer. \u00c9tendu (non-core). Politiquement sensible : les lacunes d''effectifs peuvent \u00eatre utilis\u00e9es pour argumenter qu''un minist\u00e8re a \u00e9chou\u00e9 \u00e0 affecter du personnel, ou pour cibler des repr\u00e9sailles en zones de conflit."}, "id": "hf_staff_vacancy_rate", "label": {"en": "Staff vacancy rate (percent)", "es": "Tasa de vacantes de personal (porcentaje)", "fr": "Taux de vacance du personnel (pourcentage)"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "decimal", "vocabulary": null}'
      bibliography_refs: who-hhfa-2022
  hf_user_fee_charged:
    title:
      en: User fees charged at point of care
      fr: Frais d'utilisation facturés au point de soins
      es: Tarifas al usuario cobradas en el punto de atención
    description:
      en: 'Whether the facility normally charges user fees for services at the point of care. Three-level response: `yes` (fees charged for most services), `partial` (fees charged for some services only), `no` (no fees charged). Reported by the facility in-charge. Sphere 2018 requires that humanitarian health services be free at the point of use during the emergency phase. HHFA Management and Finance module. Sensitive: user-fee policy is politically and operationally sensitive in crisis contexts.'
      fr: 'Si l''établissement facture normalement des frais d''utilisation pour les services au point de soins. Réponse à trois niveaux : `yes` (frais facturés pour la plupart des services), `partial` (frais facturés pour certains services seulement), `no` (aucun frais facturé). Rapporté par le responsable de l''établissement. Sphere 2018 exige que les services de santé humanitaires soient gratuits au point de soins pendant la phase d''urgence. Module Gestion et Finances HHFA. Sensible : la politique de frais d''utilisation est politiquement et opérationnellement sensible en contexte de crise.'
      es: 'Si el establecimiento normalmente cobra tarifas al usuario por servicios en el punto de atención. Respuesta de tres niveles: `yes` (se cobran tarifas por la mayoría de los servicios), `partial` (se cobran tarifas solo por algunos servicios), `no` (no se cobran tarifas). Reportado por el responsable del establecimiento. Esfera 2018 exige que los servicios de salud humanitarios sean gratuitos en el punto de atención durante la fase de emergencia. Módulo de Gestión y Finanzas de HHFA. Sensible: la política de tarifas al usuario es política y operativamente sensible en contextos de crisis.'
    slot_uri: aidops:hf_user_fee_charged
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"cardinality": "single", "category": "governance", "core": true, "definition": {"en": "Whether the facility normally charges user fees for services at the point of care. Three-level response: `yes` (fees charged for most services), `partial` (fees charged for some services only), `no` (no fees charged). Reported by the facility in-charge. Sphere 2018 requires that humanitarian health services be free at the point of use during the emergency phase. HHFA Management and Finance module. Sensitive: user-fee policy is politically and operationally sensitive in crisis contexts.", "es": "Si el establecimiento normalmente cobra tarifas al usuario por servicios en el punto de atenci\u00f3n. Respuesta de tres niveles: `yes` (se cobran tarifas por la mayor\u00eda de los servicios), `partial` (se cobran tarifas solo por algunos servicios), `no` (no se cobran tarifas). Reportado por el responsable del establecimiento. Esfera 2018 exige que los servicios de salud humanitarios sean gratuitos en el punto de atenci\u00f3n durante la fase de emergencia. M\u00f3dulo de Gesti\u00f3n y Finanzas de HHFA. Sensible: la pol\u00edtica de tarifas al usuario es pol\u00edtica y operativamente sensible en contextos de crisis.", "fr": "Si l''\u00e9tablissement facture normalement des frais d''utilisation pour les services au point de soins. R\u00e9ponse \u00e0 trois niveaux : `yes` (frais factur\u00e9s pour la plupart des services), `partial` (frais factur\u00e9s pour certains services seulement), `no` (aucun frais factur\u00e9). Rapport\u00e9 par le responsable de l''\u00e9tablissement. Sphere 2018 exige que les services de sant\u00e9 humanitaires soient gratuits au point de soins pendant la phase d''urgence. Module Gestion et Finances HHFA. Sensible : la politique de frais d''utilisation est politiquement et op\u00e9rationnellement sensible en contexte de crise."}, "id": "hf_user_fee_charged", "label": {"en": "User fees charged at point of care", "es": "Tarifas al usuario cobradas en el punto de atenci\u00f3n", "fr": "Frais d''utilisation factur\u00e9s au point de soins"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "string", "vocabulary": "yes-no-partial"}'
  hf_waste_segregation:
    title:
      en: Healthcare waste segregated at point of generation
      fr: Déchets de soins triés au point de production
      es: Residuos sanitarios segregados en el punto de generación
    description:
      en: 'Whether healthcare waste is segregated at the point of generation into the three standard streams (sharps, infectious, general). Three-level response: `yes` (all three streams correctly separated), `partial` (some streams separated but not all), `no` (no segregation). Observed by the enumerator. WASH FIT core indicator. Extended (non-core).'
      fr: 'Si les déchets de soins sont triés au point de production selon les trois flux standard (tranchants, infectieux, généraux). Réponse à trois niveaux : `yes` (les trois flux correctement séparés), `partial` (certains flux séparés mais pas tous), `no` (aucun tri). Observé par l''enquêteur. Indicateur central WASH FIT. Étendu (non-core).'
      es: 'Si los residuos sanitarios se segregan en el punto de generación en los tres flujos estándar (cortopunzantes, infecciosos, generales). Respuesta de tres niveles: `yes` (los tres flujos correctamente separados), `partial` (algunos flujos separados pero no todos), `no` (sin segregación). Observado por el enumerador. Indicador central WASH FIT. Extendido (no-core).'
    slot_uri: aidops:hf_waste_segregation
    range: YesNoPartial
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022", "who-unicef-wash-fit-2022"], "cardinality": "single", "category": "hygiene", "core": false, "definition": {"en": "Whether healthcare waste is segregated at the point of generation into the three standard streams (sharps, infectious, general). Three-level response: `yes` (all three streams correctly separated), `partial` (some streams separated but not all), `no` (no segregation). Observed by the enumerator. WASH FIT core indicator. Extended (non-core).", "es": "Si los residuos sanitarios se segregan en el punto de generaci\u00f3n en los tres flujos est\u00e1ndar (cortopunzantes, infecciosos, generales). Respuesta de tres niveles: `yes` (los tres flujos correctamente separados), `partial` (algunos flujos separados pero no todos), `no` (sin segregaci\u00f3n). Observado por el enumerador. Indicador central WASH FIT. Extendido (no-core).", "fr": "Si les d\u00e9chets de soins sont tri\u00e9s au point de production selon les trois flux standard (tranchants, infectieux, g\u00e9n\u00e9raux). R\u00e9ponse \u00e0 trois niveaux : `yes` (les trois flux correctement s\u00e9par\u00e9s), `partial` (certains flux s\u00e9par\u00e9s mais pas tous), `no` (aucun tri). Observ\u00e9 par l''enqu\u00eateur. Indicateur central WASH FIT. \u00c9tendu (non-core)."}, "id": "hf_waste_segregation", "label": {"en": "Healthcare waste segregated at point of generation", "es": "Residuos sanitarios segregados en el punto de generaci\u00f3n", "fr": "D\u00e9chets de soins tri\u00e9s au point de production"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "string", "vocabulary": "yes-no-partial"}'
      bibliography_refs: who-hhfa-2022,who-unicef-wash-fit-2022
  hf_water_available_today:
    title:
      en: Water available from the main source today
      fr: Eau disponible à la source principale aujourd'hui
      es: Agua disponible en la fuente principal hoy
    description:
      en: 'Whether water was flowing or available from the facility''s main water source at the time of the visit. Presence on-site is not sufficient: the source must be providing water today. Observed by the enumerator. SARA and WASH FIT tracer.'
      fr: 'Si l''eau coulait ou était disponible à la source principale de l''établissement au moment de la visite. La simple présence sur site ne suffit pas : la source doit fournir de l''eau aujourd''hui. Observé par l''enquêteur. Indicateur traceur SARA et WASH FIT.'
      es: 'Si el agua fluía o estaba disponible desde la fuente principal del establecimiento en el momento de la visita. La mera presencia en el sitio no basta: la fuente debe estar suministrando agua hoy. Observado por el enumerador. Indicador trazador SARA y WASH FIT.'
    slot_uri: aidops:hf_water_available_today
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022", "who-unicef-wash-fit-2022"], "cardinality": "single", "category": "water", "core": true, "definition": {"en": "Whether water was flowing or available from the facility''s main water source at the time of the visit. Presence on-site is not sufficient: the source must be providing water today. Observed by the enumerator. SARA and WASH FIT tracer.", "es": "Si el agua flu\u00eda o estaba disponible desde la fuente principal del establecimiento en el momento de la visita. La mera presencia en el sitio no basta: la fuente debe estar suministrando agua hoy. Observado por el enumerador. Indicador trazador SARA y WASH FIT.", "fr": "Si l''eau coulait ou \u00e9tait disponible \u00e0 la source principale de l''\u00e9tablissement au moment de la visite. La simple pr\u00e9sence sur site ne suffit pas : la source doit fournir de l''eau aujourd''hui. Observ\u00e9 par l''enqu\u00eateur. Indicateur traceur SARA et WASH FIT."}, "id": "hf_water_available_today", "label": {"en": "Water available from the main source today", "es": "Agua disponible en la fuente principal hoy", "fr": "Eau disponible \u00e0 la source principale aujourd''hui"}, "maturity": "draft", "references": null, "sensitivity": "standard", "type": "boolean", "vocabulary": null}'
