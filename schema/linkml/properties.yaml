  ari_symptom_classification:
    title:
      en: ARI symptoms present
      fr: Symptômes d'IRA présents
      es: Síntomas de IRA presentes
    description:
      en: 'Derived indicator: whether the child meets the DHS/MICS definition of ARI (acute respiratory infection) symptoms — cough accompanied by fast or difficult breathing that is chest-related. True when ari_cough_last_2wks is true AND (ari_fast_breathing is true OR ari_difficult_breathing is true). This is a caregiver-reported proxy for pneumonia, not a clinical diagnosis. Used as the denominator filter for ARI care-seeking and antibiotic use indicators. Computed in-form via a calculate field.'
      fr: 'Indicateur dérivé : si l''enfant satisfait à la définition DHS/MICS des symptômes d''IRA (infection respiratoire aiguë) — toux accompagnée d''une respiration rapide ou difficile d''origine thoracique. Vrai lorsque ari_cough_last_2wks est vrai ET (ari_fast_breathing est vrai OU ari_difficult_breathing est vrai). Il s''agit d''un indicateur proxy rapporté par le soignant pour la pneumonie, et non d''un diagnostic clinique. Utilisé comme filtre de dénominateur pour les indicateurs de recours aux soins pour l''IRA et d''utilisation des antibiotiques. Calculé dans le formulaire via un champ calculate.'
      es: 'Indicador derivado: si el niño cumple la definición DHS/MICS de síntomas de IRA (infección respiratoria aguda) — tos acompañada de respiración rápida o dificultosa de origen torácico. Verdadero cuando ari_cough_last_2wks es verdadero Y (ari_fast_breathing es verdadero O ari_difficult_breathing es verdadero). Este es un indicador proxy reportado por el cuidador para neumonía, no un diagnóstico clínico. Usado como filtro de denominador para los indicadores de búsqueda de atención por IRA y uso de antibióticos. Calculado en el formulario mediante un campo calculate.'
    slot_uri: aidops:ari_symptom_classification
    range: boolean
    annotations:
      publicschema_logical_document_json: '{"age_applicability": ["infant_0_1", "child_2_4"], "bibliography_refs": ["dhs-child-health", "who-imci"], "cardinality": "single", "category": "ari", "core": true, "definition": {"en": "Derived indicator: whether the child meets the DHS/MICS definition of ARI (acute respiratory infection) symptoms \u2014 cough accompanied by fast or difficult breathing that is chest-related. True when ari_cough_last_2wks is true AND (ari_fast_breathing is true OR ari_difficult_breathing is true). This is a caregiver-reported proxy for pneumonia, not a clinical diagnosis. Used as the denominator filter for ARI care-seeking and antibiotic use indicators. Computed in-form via a calculate field.", "es": "Indicador derivado: si el ni\u00f1o cumple la definici\u00f3n DHS/MICS de s\u00edntomas de IRA (infecci\u00f3n respiratoria aguda) \u2014 tos acompa\u00f1ada de respiraci\u00f3n r\u00e1pida o dificultosa de origen tor\u00e1cico. Verdadero cuando ari_cough_last_2wks es verdadero Y (ari_fast_breathing es verdadero O ari_difficult_breathing es verdadero). Este es un indicador proxy reportado por el cuidador para neumon\u00eda, no un diagn\u00f3stico cl\u00ednico. Usado como filtro de denominador para los indicadores de b\u00fasqueda de atenci\u00f3n por IRA y uso de antibi\u00f3ticos. Calculado en el formulario mediante un campo calculate.", "fr": "Indicateur d\u00e9riv\u00e9 : si l''enfant satisfait \u00e0 la d\u00e9finition DHS/MICS des sympt\u00f4mes d''IRA (infection respiratoire aigu\u00eb) \u2014 toux accompagn\u00e9e d''une respiration rapide ou difficile d''origine thoracique. Vrai lorsque ari_cough_last_2wks est vrai ET (ari_fast_breathing est vrai OU ari_difficult_breathing est vrai). Il s''agit d''un indicateur proxy rapport\u00e9 par le soignant pour la pneumonie, et non d''un diagnostic clinique. Utilis\u00e9 comme filtre de d\u00e9nominateur pour les indicateurs de recours aux soins pour l''IRA et d''utilisation des antibiotiques. Calcul\u00e9 dans le formulaire via un champ calculate."}, "id": "ari_symptom_classification", "label": {"en": "ARI symptoms present", "es": "S\u00edntomas de IRA presentes", "fr": "Sympt\u00f4mes d''IRA pr\u00e9sents"}, "maturity": "draft", "references": null, "sensitivity": "sensitive", "type": "boolean", "valid_instruments": ["dhs_8", "mics6"], "vocabulary": null}'
