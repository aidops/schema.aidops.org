    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["kroenke-phq9-2001"], "cardinality": "single", "category": "mental_health", "core": true, "definition": {"en": "The PHQ-9 total depression severity score, calculated as the sum of the numeric values of items 1 through 9 (each 0-3). Range 0-27. A score of 10 or higher is the standard screening cut-off for probable major depressive disorder. Because this sum incorporates the value of phq9_9 (suicidal ideation), it inherits sensitivity: restricted and must not appear in default analytics exports.", "es": "El puntaje total de severidad de depresi\u00f3n del PHQ-9, calculado como la suma de los valores num\u00e9ricos de los \u00edtems 1 a 9 (cada uno de 0 a 3). Rango 0 a 27. Un puntaje de 10 o m\u00e1s es el punto de corte de tamizaje est\u00e1ndar para un trastorno depresivo mayor probable. Dado que esta suma incorpora el valor de phq9_9 (ideaci\u00f3n suicida), hereda sensitivity: restricted y no debe aparecer en exportaciones anal\u00edticas por defecto.", "fr": "Le score total de s\u00e9v\u00e9rit\u00e9 de la d\u00e9pression PHQ-9, calcul\u00e9 comme la somme des valeurs num\u00e9riques des items 1 \u00e0 9 (chacun de 0 \u00e0 3). Plage 0 \u00e0 27. Un score de 10 ou plus est le seuil de d\u00e9pistage standard pour un \u00e9pisode d\u00e9pressif majeur probable. Cette somme incorporant la valeur de phq9_9 (id\u00e9ation suicidaire), elle h\u00e9rite de la sensibilit\u00e9 restricted et ne doit pas figurer dans les exports analytiques par d\u00e9faut."}, "id": "phq9_sum", "label": {"en": "PHQ-9 total score", "es": "Puntaje total PHQ-9", "fr": "Score total PHQ-9"}, "maturity": "draft", "references": null, "sensitivity": "restricted", "type": "integer", "vocabulary": null}'
