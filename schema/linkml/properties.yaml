  one_way_transport_cost:
    title:
      en: Typical one-way transport cost to the nearest health facility (local currency)
      fr: Coût habituel du transport aller simple jusqu'à l'établissement de santé le plus proche (monnaie locale)
      es: Costo habitual del transporte de ida al establecimiento de salud más cercano (moneda local)
    description:
      en: Typical cash cost of a one-way trip to the nearest health facility, in local currency. Transport cost is a component of out-of-pocket health spending and is captured separately from per-episode costs. Only ask if `nearest_facility_transport_mode` is not `walking`. Currency code is taken from SocioEconomicProfile context or captured alongside the value at form-level.
      fr: Coût en espèces habituel d'un trajet aller simple jusqu'à l'établissement de santé le plus proche, en monnaie locale. Le coût du transport est une composante des dépenses de santé directes et est saisi séparément des coûts par épisode. Ne poser que si `nearest_facility_transport_mode` n'est pas `walking`. Le code de la monnaie provient du contexte SocioEconomicProfile ou est saisi avec la valeur au niveau du formulaire.
      es: Costo habitual en efectivo de un viaje de ida al establecimiento de salud más cercano, en moneda local. El costo del transporte es un componente del gasto de bolsillo en salud y se captura por separado de los costos por episodio. Preguntar solo si `nearest_facility_transport_mode` no es `walking`. El código de la moneda se toma del contexto SocioEconomicProfile o se captura junto con el valor en el formulario.
