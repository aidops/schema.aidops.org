  StressSalePriceRelative:
    title:
      en: Stress Sale Price Relative to Seasonal Baseline
      fr: Prix de vente de détresse par rapport à la référence saisonnière
      es: Precio de venta de estrés relativo a la línea base estacional
    description:
      en: Price received for livestock at a distress sale relative to the typical seasonal market price. Used in PastoralFoodSecurityProfile to assess the depth of pastoral asset liquidation. Below-normal sale prices at pastoral stress sales are an IPC destitution indicator (FSNAU/IPC pastoral analysis). The severity bands are adapted from FSNAU and FEWSNET price-relative coding.
      fr: Prix reçu pour le bétail lors d'une vente de détresse par rapport au prix saisonnier habituel. Les prix inférieurs à la normale lors des ventes de détresse pastorales constituent un indicateur de dénuement IPC.
      es: Precio recibido por el ganado en una venta de estrés relativo al precio de mercado estacional típico. Los precios por debajo de lo normal en ventas de estrés pastorales son un indicador de destitución IPC.
    enum_uri: aidops:StressSalePriceRelative
    permissible_values:
      above_normal:
        title:
          en: Above normal price
          fr: Au-dessus du prix normal
          es: Por encima del precio normal
        description:
          en: Sale price was better than the typical seasonal market price; this sale was not a distress price despite the stress context.
          fr: Le prix de vente était supérieur au prix saisonnier habituel ; cette vente n'était pas un prix de détresse malgré le contexte de stress.
          es: El precio de venta fue mejor que el precio de mercado estacional típico; esta venta no fue un precio de estrés a pesar del contexto de estrés.
      at_normal:
        title:
          en: At normal seasonal price
          fr: Au prix saisonnier normal
          es: Al precio estacional normal
        description:
          en: Sale occurred at the typical seasonal market price with no price discount.
          fr: La vente a eu lieu au prix saisonnier habituel sans réduction de prix.
          es: La venta ocurrió al precio de mercado estacional típico sin descuento en el precio.
      below_normal_slight:
        title:
          en: Slightly below normal (up to 25% lower)
          fr: Légèrement en dessous du normal (jusqu'à 25% de moins)
          es: Ligeramente por debajo del normal (hasta un 25% menos)
        description:
          en: Minor distress discount; early stress signal. Household accepted a small price reduction to sell more quickly.
          fr: Réduction de prix de détresse mineure ; signal de stress précoce.
          es: Descuento de estrés menor; señal de estrés temprana.
      below_normal_significant:
        title:
          en: Significantly below normal (25–50% lower)
          fr: Nettement en dessous du normal (25–50% de moins)
          es: Significativamente por debajo del normal (25–50% menos)
        description:
          en: Moderate distress; household accepting a substantial price discount to liquidate assets. Indicates acute livelihood pressure.
          fr: Détresse modérée ; le ménage accepte une réduction de prix substantielle pour liquider des actifs.
          es: Estrés moderado; el hogar acepta un descuento sustancial para liquidar activos. Indica presión aguda sobre los medios de vida.
      below_normal_severe:
        title:
          en: Severely below normal (more than 50% lower)
          fr: Très nettement en dessous du normal (plus de 50% de moins)
          es: Gravemente por debajo del normal (más del 50% menos)
        description:
          en: Severe distress sale price. IPC destitution signal used in FSNAU and IPC pastoral analysis to identify households in extreme asset-liquidation distress.
          fr: Prix de vente de détresse sévère. Signal de dénuement IPC utilisé dans l'analyse pastorale FSNAU et IPC.
          es: Precio de venta de estrés severo. Señal de destitución IPC usada en el análisis pastoral FSNAU e IPC.
      could_not_sell:
        title:
          en: Could not sell — no buyers available
          fr: N'a pas pu vendre — pas d'acheteurs disponibles
          es: No pudo vender — no había compradores disponibles
        description:
          en: 'Market failure: the household could not find any buyers even at a reduced price.'
          fr: 'Défaillance du marché : le ménage n''a pas pu trouver d''acheteurs même à un prix réduit.'
          es: 'Fallo del mercado: el hogar no pudo encontrar compradores incluso a un precio reducido.'
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot estimate the sale price relative to the seasonal baseline.
          fr: Le répondant ne peut pas estimer le prix de vente par rapport à la référence saisonnière.
          es: El encuestado no puede estimar el precio de venta relativo a la línea base estacional.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "definition": {"en": "Price received for livestock at a distress sale relative to the typical seasonal market price. Used in PastoralFoodSecurityProfile to assess the depth of pastoral asset liquidation. Below-normal sale prices at pastoral stress sales are an IPC destitution indicator (FSNAU/IPC pastoral analysis). The severity bands are adapted from FSNAU and FEWSNET price-relative coding.", "es": "Precio recibido por el ganado en una venta de estr\u00e9s relativo al precio de mercado estacional t\u00edpico. Los precios por debajo de lo normal en ventas de estr\u00e9s pastorales son un indicador de destituci\u00f3n IPC.", "fr": "Prix re\u00e7u pour le b\u00e9tail lors d''une vente de d\u00e9tresse par rapport au prix saisonnier habituel. Les prix inf\u00e9rieurs \u00e0 la normale lors des ventes de d\u00e9tresse pastorales constituent un indicateur de d\u00e9nuement IPC."}, "id": "stress-sale-price-relative", "label": {"en": "Stress Sale Price Relative to Seasonal Baseline", "es": "Precio de venta de estr\u00e9s relativo a la l\u00ednea base estacional", "fr": "Prix de vente de d\u00e9tresse par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re"}, "maturity": "draft", "values": [{"code": "above_normal", "definition": {"en": "Sale price was better than the typical seasonal market price; this sale was not a distress price despite the stress context.", "es": "El precio de venta fue mejor que el precio de mercado estacional t\u00edpico; esta venta no fue un precio de estr\u00e9s a pesar del contexto de estr\u00e9s.", "fr": "Le prix de vente \u00e9tait sup\u00e9rieur au prix saisonnier habituel ; cette vente n''\u00e9tait pas un prix de d\u00e9tresse malgr\u00e9 le contexte de stress."}, "label": {"en": "Above normal price", "es": "Por encima del precio normal", "fr": "Au-dessus du prix normal"}}, {"code": "at_normal", "definition": {"en": "Sale occurred at the typical seasonal market price with no price discount.", "es": "La venta ocurri\u00f3 al precio de mercado estacional t\u00edpico sin descuento en el precio.", "fr": "La vente a eu lieu au prix saisonnier habituel sans r\u00e9duction de prix."}, "label": {"en": "At normal seasonal price", "es": "Al precio estacional normal", "fr": "Au prix saisonnier normal"}}, {"code": "below_normal_slight", "definition": {"en": "Minor distress discount; early stress signal. Household accepted a small price reduction to sell more quickly.", "es": "Descuento de estr\u00e9s menor; se\u00f1al de estr\u00e9s temprana.", "fr": "R\u00e9duction de prix de d\u00e9tresse mineure ; signal de stress pr\u00e9coce."}, "label": {"en": "Slightly below normal (up to 25% lower)", "es": "Ligeramente por debajo del normal (hasta un 25% menos)", "fr": "L\u00e9g\u00e8rement en dessous du normal (jusqu''\u00e0 25% de moins)"}}, {"code": "below_normal_significant", "definition": {"en": "Moderate distress; household accepting a substantial price discount to liquidate assets. Indicates acute livelihood pressure.", "es": "Estr\u00e9s moderado; el hogar acepta un descuento sustancial para liquidar activos. Indica presi\u00f3n aguda sobre los medios de vida.", "fr": "D\u00e9tresse mod\u00e9r\u00e9e ; le m\u00e9nage accepte une r\u00e9duction de prix substantielle pour liquider des actifs."}, "label": {"en": "Significantly below normal (25\u201350% lower)", "es": "Significativamente por debajo del normal (25\u201350% menos)", "fr": "Nettement en dessous du normal (25\u201350% de moins)"}}, {"code": "below_normal_severe", "definition": {"en": "Severe distress sale price. IPC destitution signal used in FSNAU and IPC pastoral analysis to identify households in extreme asset-liquidation distress.", "es": "Precio de venta de estr\u00e9s severo. Se\u00f1al de destituci\u00f3n IPC usada en el an\u00e1lisis pastoral FSNAU e IPC.", "fr": "Prix de vente de d\u00e9tresse s\u00e9v\u00e8re. Signal de d\u00e9nuement IPC utilis\u00e9 dans l''analyse pastorale FSNAU et IPC."}, "label": {"en": "Severely below normal (more than 50% lower)", "es": "Gravemente por debajo del normal (m\u00e1s del 50% menos)", "fr": "Tr\u00e8s nettement en dessous du normal (plus de 50% de moins)"}}, {"code": "could_not_sell", "definition": {"en": "Market failure: the household could not find any buyers even at a reduced price.", "es": "Fallo del mercado: el hogar no pudo encontrar compradores incluso a un precio reducido.", "fr": "D\u00e9faillance du march\u00e9 : le m\u00e9nage n''a pas pu trouver d''acheteurs m\u00eame \u00e0 un prix r\u00e9duit."}, "label": {"en": "Could not sell \u2014 no buyers available", "es": "No pudo vender \u2014 no hab\u00eda compradores disponibles", "fr": "N''a pas pu vendre \u2014 pas d''acheteurs disponibles"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot estimate the sale price relative to the seasonal baseline.", "es": "El encuestado no puede estimar el precio de venta relativo a la l\u00ednea base estacional.", "fr": "Le r\u00e9pondant ne peut pas estimer le prix de vente par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
