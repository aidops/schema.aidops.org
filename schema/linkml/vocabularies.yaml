 "label": {"en": "Home (respondent''s own home)", "es": "Domicilio (domicilio de la encuestada)", "fr": "Domicile (domicile de la r\u00e9pondante)"}}, {"code": "home_other", "definition": {"en": "Birth occurred at someone else''s home. DHS m15 = 12.", "es": "El parto ocurri\u00f3 en el domicilio de otra persona. DHS m15 = 12.", "fr": "L''accouchement a eu lieu au domicile d''une autre personne. DHS m15 = 12."}, "label": {"en": "Home (other person''s home)", "es": "Domicilio (domicilio de otra persona)", "fr": "Domicile (domicile d''une autre personne)"}}, {"code": "public_hospital", "definition": {"en": "Birth occurred in a government/public hospital. DHS m15 = 21.", "es": "El parto ocurri\u00f3 en un hospital gubernamental/p\u00fablico. DHS m15 = 21.", "fr": "L''accouchement a eu lieu dans un h\u00f4pital gouvernemental/public. DHS m15 = 21."}, "label": {"en": "Public hospital", "es": "Hospital p\u00fablico", "fr": "H\u00f4pital public"}}, {"code": "public_health_centre", "definition": {"en": "Birth occurred in a public health centre, health post, or clinic. DHS m15 = 22\u201323.", "es": "El parto ocurri\u00f3 en un centro de salud p\u00fablico, puesto de salud o cl\u00ednica. DHS m15 = 22\u201323.", "fr": "L''accouchement a eu lieu dans un centre de sant\u00e9 public, un poste de sant\u00e9 ou une clinique. DHS m15 = 22\u201323."}, "label": {"en": "Public health centre / clinic", "es": "Centro de salud p\u00fablico / cl\u00ednica", "fr": "Centre de sant\u00e9 public / clinique"}}, {"code": "public_health_post", "definition": {"en": "Birth occurred in a public health post or community health unit. DHS m15 = 24\u201325 in some country versions.", "es": "El parto ocurri\u00f3 en un puesto de salud p\u00fablico o unidad de salud comunitaria.", "fr": "L''accouchement a eu lieu dans un poste de sant\u00e9 public ou une unit\u00e9 de sant\u00e9 communautaire."}, "label": {"en": "Public health post / community health unit", "es": "Puesto de salud p\u00fablico / unidad de 