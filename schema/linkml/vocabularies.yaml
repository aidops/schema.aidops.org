      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Categories of non-food items (NFIs) typically distributed in shelter response operations, aligned with Sphere Handbook 2018 Chapter 4 minimum package. Used as a multi-select value set when recording which essential items a household is currently missing after a shock.", "es": "Categor\u00edas de art\u00edculos no alimentarios (NFI) t\u00edpicamente distribuidos en operaciones de respuesta de refugio, alineadas con el paquete m\u00ednimo del Manual Esfera 2018 cap\u00edtulo 4. Utilizadas como conjunto de valores de selecci\u00f3n m\u00faltiple al registrar qu\u00e9 art\u00edculos esenciales le faltan actualmente a un hogar tras un choque.", "fr": "Cat\u00e9gories d''articles non alimentaires (NFI) g\u00e9n\u00e9ralement distribu\u00e9s dans les op\u00e9rations de r\u00e9ponse abri, align\u00e9es sur le paquet minimum du Manuel Sph\u00e8re 2018 chapitre 4. Utilis\u00e9es comme ensemble de valeurs multi-s\u00e9lection pour consigner quels articles essentiels manquent actuellement \u00e0 un m\u00e9nage apr\u00e8s un choc."}, "id": "nfi-item-type", "label": {"en": "Non-food Item Type", "es": "Tipo de art\u00edculo no alimentario", "fr": "Type d''article non alimentaire"}, "maturity": "draft", "standard": {"name": "Sphere Handbook (2018) Shelter and Settlement chapter", "uri": "https://spherestandards.org/"}, "values": [{"code": "tarpaulin", "definition": {"en": "Heavy-duty plastic tarpaulin used for emergency shelter construction or dwelling repair.", "es": "Lona pl\u00e1stica resistente usada para construcci\u00f3n de refugios de emergencia o reparaci\u00f3n de vivienda.", "fr": "B\u00e2che en plastique robuste utilis\u00e9e pour la construction d''abris d''urgence ou la r\u00e9paration de logements."}, "label": {"en": "Tarpaulin", "es": "Lona", "fr": "B\u00e2che"}}, {"code": "plastic_sheeting", "definition": {"en": "Reinforced plastic sheeting for roofing, walling, o