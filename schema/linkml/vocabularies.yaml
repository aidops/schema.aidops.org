      publicschema_logical_document_json: '{"bibliography_refs": ["fao-mdd-w"], "definition": {"en": "The ten food groups used by the FAO Minimum Dietary Diversity for Women (MDD-W) indicator, which replaced the earlier WDDS. A woman of reproductive age is asked, for each group, whether she consumed any food from that group in the past 24 hours. Women consuming at least five of the ten groups are classified as having achieved minimum dietary diversity.", "es": "Los diez grupos alimentarios utilizados por el indicador de Diversidad Diet\u00e9tica M\u00ednima para Mujeres (MDD-W) de la FAO, que reemplaz\u00f3 al WDDS anterior. Se pregunta a una mujer en edad reproductiva, para cada grupo, si consumi\u00f3 alg\u00fan alimento de ese grupo en las \u00faltimas 24 horas. Las mujeres que consumen al menos cinco de los diez grupos se clasifican como que lograron la diversidad diet\u00e9tica m\u00ednima.", "fr": "Les dix groupes alimentaires utilis\u00e9s par l''indicateur de diversit\u00e9 alimentaire minimale pour les femmes (MDD-W) de la FAO, qui a remplac\u00e9 le WDDS ant\u00e9rieur. Une femme en \u00e2ge de procr\u00e9er est interrog\u00e9e, pour chaque groupe, sur sa consommation d''aliments de ce groupe au cours des 24 derni\u00e8res heures. Les femmes consommant au moins cinq des dix groupes sont class\u00e9es comme ayant atteint la diversit\u00e9 alimentaire minimale."}, "id": "wdds-food-group", "label": {"en": "MDD-W Food Group", "es": "Grupo alimentario MDD-W", "fr": "Groupe alimentaire MDD-W"}, "maturity": "draft", "standard": {"name": "FAO Minimum Dietary Diversity for Women (MDD-W) Guide, 2021", "uri": "https://www.fao.org/documents/card/en?details=cb3434en"}, "values": [{"code": "grains", "definition": {"en": "Bread, rice, pasta, porridge made from cereals; white potatoes, white yams, cassava; plantains.", "es": "Pan, arroz, pasta, papillas de cereales; papas blancas, \u00f1ames blancos, yuca; pl\u00e1tanos.", "fr": "Pain, riz, p\u00e2tes, bouillies \u00e0 base de c\u00e9r\u00e9ales ; pommes de terre blanches, ignames blanches, manioc ; bananes plantains."}, "label": {"en": "Grains, white roots and tubers, and plantains", "es": "Cereales, ra\u00edces y tub\u00e9rculos blancos, y pl\u00e1tanos", "fr": "C\u00e9r\u00e9ales, racines et tubercules blancs, et bananes plantains"}}, {"code": "pulses", "definition": {"en": "Dried beans, dried peas, lentils, or dishes made from them.", "es": "Frijoles secos, guisantes secos, lentejas o platos hechos con ellos.", "fr": "Haricots secs, pois secs, lentilles ou plats \u00e0 base de ceux-ci."}, "label": {"en": "Pulses (beans, peas, lentils)", "es": "Legumbres (frijoles, guisantes, lentejas)", "fr": "L\u00e9gumineuses (haricots, pois, lentilles)"}}, {"code": "nuts_seeds", "definition": {"en": "Any tree nut, groundnut, or seed, or nut or seed pastes such as peanut butter, tahini, or similar.", "es": "Cualquier nuez de \u00e1rbol, man\u00ed o semilla, o pastas de nueces o semillas como mantequilla de man\u00ed, tahini o similares.", "fr": "Toute noix de l''arbre, arachide ou graine, ou p\u00e2tes de noix ou de graines telles que beurre d''arachide, tahini ou similaires."}, "label": {"en": "Nuts and seeds", "es": "Nueces y semillas", "fr": "Noix et graines"}}, {"code": "dairy", "definition": {"en": "Milk, cheese, yogurt, or other milk products. Excludes small amounts used only to whiten tea or coffee.", "es": "Leche, queso, yogur u otros productos l\u00e1cteos. Excluye peque\u00f1as cantidades usadas solo para aclarar t\u00e9 o caf\u00e9.", "fr": "Lait, fromage, yaourt ou autres produits laitiers. Exclut les petites quantit\u00e9s utilis\u00e9es uniquement pour blanchir th\u00e9 ou caf\u00e9."}, "label": {"en": "Dairy (milk, yogurt, cheese)", "es": "L\u00e1cteos (leche, yogur, queso)", "fr": "Produits laitiers (lait, yaourt, fromage)"}}, {"code": "meat_poultry_fish", "definition": {"en": "Red meat, poultry, organ meats, fresh or dried fish, shellfish, and other flesh foods.", "es": "Carne roja, aves, v\u00edsceras, pescado fresco o seco, mariscos y otros alimentos c\u00e1rnicos.", "fr": "Viande rouge, volaille, abats, poisson frais ou s\u00e9ch\u00e9, crustac\u00e9s et autres aliments carn\u00e9s."}, "label": {"en": "Meat, poultry, and fish", "es": "Carne, aves y pescado", "fr": "Viande, volaille et poisson"}}, {"code": "eggs", "definition": {"en": "Eggs from any bird.", "es": "Huevos de cualquier ave.", "fr": "\u0152ufs de toute volaille."}, "label": {"en": "Eggs", "es": "Huevos", "fr": "\u0152ufs"}}, {"code": "dark_green_leafy_veg", "definition": {"en": "Dark green leafy vegetables such as spinach, amaranth leaves, cassava leaves, moringa, kale, wild leaves.", "es": "Hortalizas de hoja verde oscuro como espinacas, hojas de amaranto, hojas de yuca, moringa, col rizada, hojas silvestres.", "fr": "L\u00e9gumes-feuilles vert fonc\u00e9 tels qu''\u00e9pinards, feuilles d''amarante, feuilles de manioc, moringa, chou fris\u00e9, feuilles sauvages."}, "label": {"en": "Dark green leafy vegetables", "es": "Hortalizas de hoja verde oscuro", "fr": "L\u00e9gumes-feuilles vert fonc\u00e9"}}, {"code": "vitamin_a_fruit_veg", "definition": {"en": "Ripe mango, ripe papaya, carrot, pumpkin, orange-fleshed sweet potato, red palm oil, and other vitamin-A-rich foods. Excludes dark green leafy vegetables (captured separately).", "es": "Mango maduro, papaya madura, zanahoria, calabaza, batata de pulpa anaranjada, aceite de palma rojo y otros alimentos ricos en vitamina A. Excluye hortalizas de hoja verde oscuro (capturadas por separado).", "fr": "Mangue m\u00fbre, papaye m\u00fbre, carotte, citrouille, patate douce \u00e0 chair orange, huile de palme rouge et autres aliments riches en vitamine A. Exclut les l\u00e9gumes-feuilles vert fonc\u00e9 (captur\u00e9s s\u00e9par\u00e9ment)."}, "label": {"en": "Other vitamin-A-rich fruits and vegetables", "es": "Otras frutas y verduras ricas en vitamina A", "fr": "Autres fruits et l\u00e9gumes riches en vitamine A"}}, {"code": "other_vegetables", "definition": {"en": "Vegetables that are not captured in the dark-green-leafy or vitamin-A-rich groups: tomato, onion, eggplant, cucumber, green beans, etc.", "es": "Verduras no cubiertas por los grupos de hojas verde oscuro ni ricas en vitamina A: tomate, cebolla, berenjena, pepino, jud\u00edas verdes, etc.", "fr": "L\u00e9gumes non couverts par les groupes l\u00e9gumes-feuilles vert fonc\u00e9 ou riches en vitamine A : tomate, oignon, aubergine, concombre, haricots verts, etc."}, "label": {"en": "Other vegetables", "es": "Otras verduras", "fr": "Autres l\u00e9gumes"}}, {"code": "other_fruits", "definition": {"en": "Fruits not captured in the vitamin-A-rich group: banana, apple, pineapple, watermelon, citrus, wild-gathered fruits, etc.", "es": "Frutas no cubiertas por el grupo rico en vitamina A: banano, manzana, pi\u00f1a, sand\u00eda, c\u00edtricos, frutas recolectadas silvestres, etc.", "fr": "Fruits non couverts par le groupe riche en vitamine A : banane, pomme, ananas, past\u00e8que, agrumes, fruits cueillis dans la nature, etc."}, "label": {"en": "Other fruits", "es": "Otras frutas", "fr": "Autres fruits"}}]}'
      bibliography_refs: fao-mdd-w
  WeaiAgree5:
    title:
      en: WEAI Five-Point Agreement Scale
      fr: Échelle d'accord à cinq points WEAI
      es: Escala de acuerdo de cinco puntos WEAI
    description:
      en: Standard five-point Likert agreement scale used in the pro-WEAI New General Self-Efficacy Scale (NGSE) items. Scores run from 1 (strongly disagree) to 5 (strongly agree). The sum of eight NGSE items yields a score of 8–40; adequacy threshold is ≥ 32.
      fr: Échelle d'accord de Likert standard à cinq points utilisée dans les items de la Nouvelle échelle générale d'auto-efficacité (NGSE) du pro-WEAI. Les scores vont de 1 (fortement en désaccord) à 5 (fortement d'accord). La somme des huit items NGSE donne un score de 8 à 40 ; le seuil d'adéquation est ≥ 32.
      es: Escala de acuerdo de Likert estándar de cinco puntos utilizada en los ítems de la Nueva Escala General de Autoeficacia (NGSE) del pro-WEAI. Las puntuaciones van de 1 (muy en desacuerdo) a 5 (muy de acuerdo). La suma de ocho ítems NGSE produce una puntuación de 8 a 40; el umbral de adecuación es ≥ 32.
    enum_uri: aidops:WeaiAgree5
    permissible_values:
      strongly_disagree:
        title:
          en: Strongly disagree
          fr: Fortement en désaccord
          es: Muy en desacuerdo
        description:
          en: The respondent strongly disagrees with the statement. Score value 1.
          fr: Le répondant est fortement en désaccord avec l'affirmation. Valeur de score 1.
          es: El encuestado está muy en desacuerdo con la afirmación. Valor de puntuación 1.
      disagree:
        title:
          en: Disagree
          fr: En désaccord
          es: En desacuerdo
        description:
          en: The respondent disagrees with the statement. Score value 2.
          fr: Le répondant est en désaccord avec l'affirmation. Valeur de score 2.
          es: El encuestado está en desacuerdo con la afirmación. Valor de puntuación 2.
      neither:
        title:
          en: Neither agree nor disagree
          fr: Ni d'accord ni en désaccord
          es: Ni de acuerdo ni en desacuerdo
        description:
          en: The respondent neither agrees nor disagrees. Score value 3.
          fr: Le répondant n'est ni d'accord ni en désaccord. Valeur de score 3.
          es: El encuestado no está de acuerdo ni en desacuerdo. Valor de puntuación 3.
      agree:
        title:
          en: Agree
          fr: D'accord
          es: De acuerdo
        description:
          en: The respondent agrees with the statement. Score value 4.
          fr: Le répondant est d'accord avec l'affirmation. Valeur de score 4.
          es: El encuestado está de acuerdo con la afirmación. Valor de puntuación 4.
      strongly_agree:
        title:
          en: Strongly agree
          fr: Fortement d'accord
          es: Muy de acuerdo
        description:
          en: The respondent strongly agrees with the statement. Score value 5.
          fr: Le répondant est fortement d'accord avec l'affirmation. Valeur de score 5.
          es: El encuestado está muy de acuerdo con la afirmación. Valor de puntuación 5.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Standard five-point Likert agreement scale used in the pro-WEAI New General Self-Efficacy Scale (NGSE) items. Scores run from 1 (strongly disagree) to 5 (strongly agree). The sum of eight NGSE items yields a score of 8\u201340; adequacy threshold is \u2265 32.", "es": "Escala de acuerdo de Likert est\u00e1ndar de cinco puntos utilizada en los \u00edtems de la Nueva Escala General de Autoeficacia (NGSE) del pro-WEAI. Las puntuaciones van de 1 (muy en desacuerdo) a 5 (muy de acuerdo). La suma de ocho \u00edtems NGSE produce una puntuaci\u00f3n de 8 a 40; el umbral de adecuaci\u00f3n es \u2265 32.", "fr": "\u00c9chelle d''accord de Likert standard \u00e0 cinq points utilis\u00e9e dans les items de la Nouvelle \u00e9chelle g\u00e9n\u00e9rale d''auto-efficacit\u00e9 (NGSE) du pro-WEAI. Les scores vont de 1 (fortement en d\u00e9saccord) \u00e0 5 (fortement d''accord). La somme des huit items NGSE donne un score de 8 \u00e0 40 ; le seuil d''ad\u00e9quation est \u2265 32."}, "id": "weai-agree-5", "label": {"en": "WEAI Five-Point Agreement Scale", "es": "Escala de acuerdo de cinco puntos WEAI", "fr": "\u00c9chelle d''accord \u00e0 cinq points WEAI"}, "maturity": "draft", "standard": {"name": "Chen G, Gully SM, Eden D. (2001). Validation of a New General Self-Efficacy Scale. Organizational Research Methods 4(1):62\u201383.", "uri": "https://doi.org/10.1177/109442810141004"}, "values": [{"code": "strongly_disagree", "definition": {"en": "The respondent strongly disagrees with the statement. Score value 1.", "es": "El encuestado est\u00e1 muy en desacuerdo con la afirmaci\u00f3n. Valor de puntuaci\u00f3n 1.", "fr": "Le r\u00e9pondant est fortement en d\u00e9saccord avec l''affirmation. Valeur de score 1."}, "label": {"en": "Strongly disagree", "es": "Muy en desacuerdo", "fr": "Fortement en d\u00e9saccord"}}, {"code": "disagree", "definition": {"en": "The respondent disagrees with the statement. Score value 2.", "es": "El encuestado est\u00e1 en desacuerdo con la afirmaci\u00f3n. Valor de puntuaci\u00f3n 2.", "fr": "Le r\u00e9pondant est en d\u00e9saccord avec l''affirmation. Valeur de score 2."}, "label": {"en": "Disagree", "es": "En desacuerdo", "fr": "En d\u00e9saccord"}}, {"code": "neither", "definition": {"en": "The respondent neither agrees nor disagrees. Score value 3.", "es": "El encuestado no est\u00e1 de acuerdo ni en desacuerdo. Valor de puntuaci\u00f3n 3.", "fr": "Le r\u00e9pondant n''est ni d''accord ni en d\u00e9saccord. Valeur de score 3."}, "label": {"en": "Neither agree nor disagree", "es": "Ni de acuerdo ni en desacuerdo", "fr": "Ni d''accord ni en d\u00e9saccord"}}, {"code": "agree", "definition": {"en": "The respondent agrees with the statement. Score value 4.", "es": "El encuestado est\u00e1 de acuerdo con la afirmaci\u00f3n. Valor de puntuaci\u00f3n 4.", "fr": "Le r\u00e9pondant est d''accord avec l''affirmation. Valeur de score 4."}, "label": {"en": "Agree", "es": "De acuerdo", "fr": "D''accord"}}, {"code": "strongly_agree", "definition": {"en": "The respondent strongly agrees with the statement. Score value 5.", "es": "El encuestado est\u00e1 muy de acuerdo con la afirmaci\u00f3n. Valor de puntuaci\u00f3n 5.", "fr": "Le r\u00e9pondant est fortement d''accord avec l''affirmation. Valeur de score 5."}, "label": {"en": "Strongly agree", "es": "Muy de acuerdo", "fr": "Fortement d''accord"}}]}'
