e": "member_injured_killed", "definition": {"en": "A household member suffered injury or death from an explosive ordnance incident in the past 3 months. Record as presence/absence only \u2014 do not capture count or names.", "es": "Un miembro del hogar sufri\u00f3 heridas o muri\u00f3 en un incidente de artefactos explosivos en los \u00faltimos 3 meses. Registrar solo como presencia/ausencia \u2014 no capturar el recuento ni los nombres.", "fr": "Un membre du m\u00e9nage a subi des blessures ou a \u00e9t\u00e9 tu\u00e9 lors d''un incident li\u00e9 \u00e0 des engins explosifs au cours des 3 derniers mois. Enregistrer uniquement comme pr\u00e9sence/absence \u2014 ne pas capturer le nombre ou les noms."}, "label": {"en": "Member of household injured or killed", "es": "Un miembro del hogar fue herido o muerto", "fr": "Un membre du m\u00e9nage a \u00e9t\u00e9 bless\u00e9 ou tu\u00e9"}}, {"code": "member_avoided_area", "definition": {"en": "Household members proactively avoid a needed area because of known or suspected explosive ordnance contamination.", "es": "Los miembros del hogar evitan proactivamente una zona necesaria por contaminaci\u00f3n conocida o sospechada de artefactos explosivos.", "fr": "Les membres du m\u00e9nage \u00e9vitent de mani\u00e8re proactive une zone n\u00e9cessaire en raison d''une contamination par des engins explosifs connue ou suspect\u00e9e."}, "label": {"en": "Member avoids area out of fear", "es": "Un miembro evita una zona por miedo", "fr": "Un membre \u00e9vite une zone par peur"}}, {"code": "livestock_injured_killed", "definition": {"en": "Livestock were harmed by an explosive ordnance incident, affecting the household''s assets and food security.", "es": "El ganado fue da\u00f1ado en un incidente de artefactos explosivos, afectando los activos y la seguridad alimentaria del hogar.", "fr": "Le b\u00e9tail a \u00e9t\u00e9 bless\u00e9 ou tu\u00e9 lors d''un incident li\u00e9 \u00e0 des engins explosifs, affectant les actifs et la s\u00e9curit\u00e9 alimentaire du m\u00e9nage."}, "label": {"en": "Livestock injured or killed", "es": "Ganado herido o muerto", "fr": "B\u00e9tail bless\u00e9 ou tu\u00e9"}}, {"code": "no_impact", "definition": {"en": "Household is aware of explosive ordnance in the area but has not experienced a specific impact. Mutually exclusive with all other codes in this vocabulary.", "es": "El hogar est\u00e1 al tanto de artefactos explosivos en el \u00e1rea pero no ha experimentado un impacto espec\u00edfico. Mutuamente exclusivo con todos los dem\u00e1s c\u00f3digos de este vocabulario.", "fr": "Le m\u00e9nage est au courant de la pr\u00e9sence d''engins explosifs dans la zone mais n''a pas subi d''impact sp\u00e9cifique. Mutuellement exclusif avec tous les autres codes de ce vocabulaire."}, "label": {"en": "No specific impact", "es": "Sin impacto espec\u00edfico", "fr": "Aucun impact sp\u00e9cifique"}}]}'
