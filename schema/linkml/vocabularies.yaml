  CropLossCause:
    title:
      en: Crop Loss Cause
      fr: Cause de perte de cultures
      es: Causa de pérdida de cultivos
    description:
      en: 'Main cause of crop loss experienced by the household during the last completed agricultural season. Multi-select (limit two in form implementation) because a single season often carries compound shocks (drought followed by pests, for instance). Drawn from FAO crop-loss survey methodology and the LSMS-ISA post-harvest module. This vocabulary is intentionally coarse: hazard-type disaggregation at depth belongs to the future ClimateAdaptationProfile.'
      fr: 'Principale cause de perte de cultures subie par le ménage au cours de la dernière saison agricole complète. Sélection multiple (limitée à deux dans la mise en œuvre du formulaire) car une saison unique comporte souvent des chocs composés (sécheresse suivie de ravageurs, par exemple). Tirée de la méthodologie d''enquête sur les pertes de cultures de la FAO et du module post-récolte du LSMS-ISA. Ce vocabulaire est intentionnellement grossier : la désagrégation détaillée par type d''aléa relève du futur ClimateAdaptationProfile.'
      es: 'Causa principal de pérdida de cultivos experimentada por el hogar durante la última temporada agrícola completa. Selección múltiple (limitada a dos en la implementación del formulario) porque una sola temporada a menudo conlleva choques compuestos (sequía seguida de plagas, por ejemplo). Tomada de la metodología de encuestas de pérdidas de cultivos de la FAO y del módulo poscosecha de LSMS-ISA. Este vocabulario es intencionalmente grueso: la desagregación detallada por tipo de peligro corresponde al futuro ClimateAdaptationProfile.'
    enum_uri: aidops:CropLossCause
    permissible_values:
      drought:
        title:
          en: Drought or dry spell
          fr: Sécheresse ou période sèche
          es: Sequía o período seco
        description:
          en: Insufficient rainfall or prolonged dry conditions during the season.
          fr: Précipitations insuffisantes ou conditions sèches prolongées au cours de la saison.
          es: Precipitación insuficiente o condiciones secas prolongadas durante la temporada.
      flood:
        title:
          en: Flood or waterlogging
          fr: Inondation ou engorgement hydrique
          es: Inundación o encharcamiento
        description:
          en: Excess water, flash flooding, or waterlogged soils damaging crops.
          fr: Eau excédentaire, crue éclair ou sols engorgés endommageant les cultures.
          es: Exceso de agua, inundación súbita o suelos encharcados que dañan los cultivos.
      pests_insects:
        title:
          en: Pests or insects
          fr: Ravageurs ou insectes
          es: Plagas o insectos
        description:
          en: Crop damage caused by insects, rodents, birds, or other animal pests.
          fr: Dégâts aux cultures causés par les insectes, rongeurs, oiseaux ou autres ravageurs animaux.
          es: Daño a los cultivos causado por insectos, roedores, aves u otras plagas animales.
      plant_disease:
        title:
          en: Plant disease (fungal, bacterial, viral)
          fr: Maladie des plantes (fongique, bactérienne, virale)
          es: Enfermedad vegetal (fúngica, bacteriana, viral)
        description:
          en: Disease infection of crops causing significant production loss.
          fr: Infection par maladie des cultures causant une perte significative de production.
          es: Infección de enfermedad en los cultivos que causa pérdida significativa de producción.
      hail_frost:
        title:
          en: Hail or frost
          fr: Grêle ou gel
          es: Granizo o helada
        description:
          en: Damage caused by hail events or frost affecting growing crops.
          fr: Dégâts causés par des événements de grêle ou par le gel affectant les cultures en croissance.
          es: Daño causado por eventos de granizo o heladas que afectan los cultivos en crecimiento.
      wildfire:
        title:
          en: Fire (wildfire or accidental)
          fr: Incendie (feu de brousse ou accidentel)
          es: Incendio (fuego forestal o accidental)
        description:
          en: Crop loss due to fire, whether from natural causes or accident.
          fr: Perte de cultures due à un incendie, qu'il soit d'origine naturelle ou accidentelle.
          es: Pérdida de cultivos por incendio, ya sea por causas naturales o accidentales.
      conflict_theft:
        title:
          en: Conflict, looting, or theft
          fr: Conflit, pillage ou vol
          es: Conflicto, saqueo o robo
        description:
          en: Crops destroyed, seized, or stolen as a result of armed conflict, civil unrest, or theft.
          fr: Cultures détruites, saisies ou volées à la suite d'un conflit armé, de troubles civils ou de vol.
          es: Cultivos destruidos, incautados o robados como resultado de conflicto armado, disturbios civiles o robo.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Cause of crop loss not covered by the other categories.
          fr: Cause de perte de cultures non couverte par les autres catégories.
          es: Causa de pérdida de cultivos no cubierta por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Main cause of crop loss experienced by the household during the last completed agricultural season. Multi-select (limit two in form implementation) because a single season often carries compound shocks (drought followed by pests, for instance). Drawn from FAO crop-loss survey methodology and the LSMS-ISA post-harvest module. This vocabulary is intentionally coarse: hazard-type disaggregation at depth belongs to the future ClimateAdaptationProfile.", "es": "Causa principal de p\u00e9rdida de cultivos experimentada por el hogar durante la \u00faltima temporada agr\u00edcola completa. Selecci\u00f3n m\u00faltiple (limitada a dos en la implementaci\u00f3n del formulario) porque una sola temporada a menudo conlleva choques compuestos (sequ\u00eda seguida de plagas, por ejemplo). Tomada de la metodolog\u00eda de encuestas de p\u00e9rdidas de cultivos de la FAO y del m\u00f3dulo poscosecha de LSMS-ISA. Este vocabulario es intencionalmente grueso: la desagregaci\u00f3n detallada por tipo de peligro corresponde al futuro ClimateAdaptationProfile.", "fr": "Principale cause de perte de cultures subie par le m\u00e9nage au cours de la derni\u00e8re saison agricole compl\u00e8te. S\u00e9lection multiple (limit\u00e9e \u00e0 deux dans la mise en \u0153uvre du formulaire) car une saison unique comporte souvent des chocs compos\u00e9s (s\u00e9cheresse suivie de ravageurs, par exemple). Tir\u00e9e de la m\u00e9thodologie d''enqu\u00eate sur les pertes de cultures de la FAO et du module post-r\u00e9colte du LSMS-ISA. Ce vocabulaire est intentionnellement grossier : la d\u00e9sagr\u00e9gation d\u00e9taill\u00e9e par type d''al\u00e9a rel\u00e8ve du futur ClimateAdaptationProfile."}, "id": "crop-loss-cause", "label": {"en": "Crop Loss Cause", "es": "Causa de p\u00e9rdida de cultivos", "fr": "Cause de perte de cultures"}, "maturity": "draft", "standard": {"name": "FAO crop loss survey methodology / LSMS-ISA post-harvest module", "notes": "The cause categories are a simplified superset of the hazard codes used by FAO crop loss surveys and the LSMS-ISA household post-harvest questionnaires.", "uri": "https://www.fao.org/economic/ess/ess-methods/ess-harvest-and-post-harvest/en/"}, "values": [{"code": "drought", "definition": {"en": "Insufficient rainfall or prolonged dry conditions during the season.", "es": "Precipitaci\u00f3n insuficiente o condiciones secas prolongadas durante la temporada.", "fr": "Pr\u00e9cipitations insuffisantes ou conditions s\u00e8ches prolong\u00e9es au cours de la saison."}, "label": {"en": "Drought or dry spell", "es": "Sequ\u00eda o per\u00edodo seco", "fr": "S\u00e9cheresse ou p\u00e9riode s\u00e8che"}}, {"code": "flood", "definition": {"en": "Excess water, flash flooding, or waterlogged soils damaging crops.", "es": "Exceso de agua, inundaci\u00f3n s\u00fabita o suelos encharcados que da\u00f1an los cultivos.", "fr": "Eau exc\u00e9dentaire, crue \u00e9clair ou sols engorg\u00e9s endommageant les cultures."}, "label": {"en": "Flood or waterlogging", "es": "Inundaci\u00f3n o encharcamiento", "fr": "Inondation ou engorgement hydrique"}}, {"code": "pests_insects", "definition": {"en": "Crop damage caused by insects, rodents, birds, or other animal pests.", "es": "Da\u00f1o a los cultivos causado por insectos, roedores, aves u otras plagas animales.", "fr": "D\u00e9g\u00e2ts aux cultures caus\u00e9s par les insectes, rongeurs, oiseaux ou autres ravageurs animaux."}, "label": {"en": "Pests or insects", "es": "Plagas o insectos", "fr": "Ravageurs ou insectes"}}, {"code": "plant_disease", "definition": {"en": "Disease infection of crops causing significant production loss.", "es": "Infecci\u00f3n de enfermedad en los cultivos que causa p\u00e9rdida significativa de producci\u00f3n.", "fr": "Infection par maladie des cultures causant une perte significative de production."}, "label": {"en": "Plant disease (fungal, bacterial, viral)", "es": "Enfermedad vegetal (f\u00fangica, bacteriana, viral)", "fr": "Maladie des plantes (fongique, bact\u00e9rienne, virale)"}}, {"code": "hail_frost", "definition": {"en": "Damage caused by hail events or frost affecting growing crops.", "es": "Da\u00f1o causado por eventos de granizo o heladas que afectan los cultivos en crecimiento.", "fr": "D\u00e9g\u00e2ts caus\u00e9s par des \u00e9v\u00e9nements de gr\u00eale ou par le gel affectant les cultures en croissance."}, "label": {"en": "Hail or frost", "es": "Granizo o helada", "fr": "Gr\u00eale ou gel"}}, {"code": "wildfire", "definition": {"en": "Crop loss due to fire, whether from natural causes or accident.", "es": "P\u00e9rdida de cultivos por incendio, ya sea por causas naturales o accidentales.", "fr": "Perte de cultures due \u00e0 un incendie, qu''il soit d''origine naturelle ou accidentelle."}, "label": {"en": "Fire (wildfire or accidental)", "es": "Incendio (fuego forestal o accidental)", "fr": "Incendie (feu de brousse ou accidentel)"}}, {"code": "conflict_theft", "definition": {"en": "Crops destroyed, seized, or stolen as a result of armed conflict, civil unrest, or theft.", "es": "Cultivos destruidos, incautados o robados como resultado de conflicto armado, disturbios civiles o robo.", "fr": "Cultures d\u00e9truites, saisies ou vol\u00e9es \u00e0 la suite d''un conflit arm\u00e9, de troubles civils ou de vol."}, "label": {"en": "Conflict, looting, or theft", "es": "Conflicto, saqueo o robo", "fr": "Conflit, pillage ou vol"}}, {"code": "other", "definition": {"en": "Cause of crop loss not covered by the other categories.", "es": "Causa de p\u00e9rdida de cultivos no cubierta por las otras categor\u00edas.", "fr": "Cause de perte de cultures non couverte par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
  CropUsePurpose:
    title:
      en: Crop Use Purpose (household)
      fr: Usage des cultures (ménage)
      es: Propósito del uso de cultivos (hogar)
    description:
      en: 'Household-level orientation of crop production: the degree to which last season''s production was consumed by the household (subsistence) versus sold (market). Coarse three-band scale plus ''don''t know''. Designed to characterise household livelihood orientation without quantifying market volumes, which are out of scope for this profile. Based on MICS6 Agriculture and Food Production module and the LSMS-ISA crop-disposition module.'
      fr: 'Orientation au niveau du ménage de la production végétale : dans quelle mesure la production de la saison dernière a été consommée par le ménage (subsistance) par rapport à la part vendue (marché). Échelle grossière à trois bandes plus « ne sait pas ». Conçue pour caractériser l''orientation des moyens d''existence du ménage sans quantifier les volumes de marché, qui sortent du cadre de ce profil. Basée sur le module Agriculture et production alimentaire du MICS6 et sur le module de disposition des cultures du LSMS-ISA.'
      es: 'Orientación a nivel del hogar de la producción de cultivos: el grado en que la producción de la temporada pasada fue consumida por el hogar (subsistencia) frente a vendida (mercado). Escala gruesa de tres bandas más ''no sabe''. Diseñada para caracterizar la orientación del medio de vida del hogar sin cuantificar los volúmenes de mercado, que están fuera del alcance de este perfil. Basada en el módulo Agricultura y Producción de Alimentos de MICS6 y en el módulo de disposición de cultivos de LSMS-ISA.'
    enum_uri: aidops:CropUsePurpose
    permissible_values:
      mostly_subsistence:
        title:
          en: Mostly for household consumption
          fr: Principalement pour la consommation du ménage
          es: Principalmente para consumo del hogar
        description:
          en: Most of the household's crop production is consumed by the household.
          fr: La majeure partie de la production végétale du ménage est consommée par le ménage.
          es: La mayor parte de la producción de cultivos del hogar es consumida por el hogar.
      mixed_subsistence_market:
        title:
          en: Mixed — consumption and sale
          fr: Mixte — consommation et vente
          es: Mixto — consumo y venta
        description:
          en: Significant portions of production are both consumed by the household and sold.
          fr: Des parts importantes de la production sont à la fois consommées par le ménage et vendues.
          es: Partes significativas de la producción se consumen en el hogar y se venden.
      mostly_market:
        title:
          en: Mostly for sale
          fr: Principalement pour la vente
          es: Principalmente para venta
        description:
          en: Most of the household's crop production is sold.
          fr: La majeure partie de la production végétale du ménage est vendue.
          es: La mayor parte de la producción de cultivos del hogar se vende.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot characterize the purpose of the household's crop production. Retained as a distinct valid response.
          fr: Le répondant ne peut pas caractériser l'usage de la production végétale du ménage. Conservée comme réponse valide distincte.
          es: El encuestado no puede caracterizar el propósito de la producción de cultivos del hogar. Se mantiene como respuesta válida distinta.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Household-level orientation of crop production: the degree to which last season''s production was consumed by the household (subsistence) versus sold (market). Coarse three-band scale plus ''don''t know''. Designed to characterise household livelihood orientation without quantifying market volumes, which are out of scope for this profile. Based on MICS6 Agriculture and Food Production module and the LSMS-ISA crop-disposition module.", "es": "Orientaci\u00f3n a nivel del hogar de la producci\u00f3n de cultivos: el grado en que la producci\u00f3n de la temporada pasada fue consumida por el hogar (subsistencia) frente a vendida (mercado). Escala gruesa de tres bandas m\u00e1s ''no sabe''. Dise\u00f1ada para caracterizar la orientaci\u00f3n del medio de vida del hogar sin cuantificar los vol\u00famenes de mercado, que est\u00e1n fuera del alcance de este perfil. Basada en el m\u00f3dulo Agricultura y Producci\u00f3n de Alimentos de MICS6 y en el m\u00f3dulo de disposici\u00f3n de cultivos de LSMS-ISA.", "fr": "Orientation au niveau du m\u00e9nage de la production v\u00e9g\u00e9tale : dans quelle mesure la production de la saison derni\u00e8re a \u00e9t\u00e9 consomm\u00e9e par le m\u00e9nage (subsistance) par rapport \u00e0 la part vendue (march\u00e9). \u00c9chelle grossi\u00e8re \u00e0 trois bandes plus \u00ab ne sait pas \u00bb. Con\u00e7ue pour caract\u00e9riser l''orientation des moyens d''existence du m\u00e9nage sans quantifier les volumes de march\u00e9, qui sortent du cadre de ce profil. Bas\u00e9e sur le module Agriculture et production alimentaire du MICS6 et sur le module de disposition des cultures du LSMS-ISA."}, "id": "crop-use-purpose", "label": {"en": "Crop Use Purpose (household)", "es": "Prop\u00f3sito del uso de cultivos (hogar)", "fr": "Usage des cultures (m\u00e9nage)"}, "maturity": "draft", "standard": {"name": "MICS6 Agriculture and Food Production module / LSMS-ISA crop disposition module", "notes": "The three-band subsistence / mixed / market scale is widely used in multi-topic household surveys to characterise household crop orientation without requiring detailed market-volume quantification.", "uri": "https://mics.unicef.org/tools"}, "values": [{"code": "mostly_subsistence", "definition": {"en": "Most of the household''s crop production is consumed by the household.", "es": "La mayor parte de la producci\u00f3n de cultivos del hogar es consumida por el hogar.", "fr": "La majeure partie de la production v\u00e9g\u00e9tale du m\u00e9nage est consomm\u00e9e par le m\u00e9nage."}, "label": {"en": "Mostly for household consumption", "es": "Principalmente para consumo del hogar", "fr": "Principalement pour la consommation du m\u00e9nage"}}, {"code": "mixed_subsistence_market", "definition": {"en": "Significant portions of production are both consumed by the household and sold.", "es": "Partes significativas de la producci\u00f3n se consumen en el hogar y se venden.", "fr": "Des parts importantes de la production sont \u00e0 la fois consomm\u00e9es par le m\u00e9nage et vendues."}, "label": {"en": "Mixed \u2014 consumption and sale", "es": "Mixto \u2014 consumo y venta", "fr": "Mixte \u2014 consommation et vente"}}, {"code": "mostly_market", "definition": {"en": "Most of the household''s crop production is sold.", "es": "La mayor parte de la producci\u00f3n de cultivos del hogar se vende.", "fr": "La majeure partie de la production v\u00e9g\u00e9tale du m\u00e9nage est vendue."}, "label": {"en": "Mostly for sale", "es": "Principalmente para venta", "fr": "Principalement pour la vente"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot characterize the purpose of the household''s crop production. Retained as a distinct valid response.", "es": "El encuestado no puede caracterizar el prop\u00f3sito de la producci\u00f3n de cultivos del hogar. Se mantiene como respuesta v\u00e1lida distinta.", "fr": "Le r\u00e9pondant ne peut pas caract\u00e9riser l''usage de la production v\u00e9g\u00e9tale du m\u00e9nage. Conserv\u00e9e comme r\u00e9ponse valide distincte."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  CutoffRule:
    title:
      en: Cutoff Rule
      fr: Règle de seuil
      es: Regla de corte
    description:
      en: A population-specific rule for classifying acute malnutrition from MUAC or other anthropometric measurements. MUAC cutoffs differ by age, sex, and physiological state; applying a rule outside its target population produces misclassification.
      fr: Une règle spécifique à la population pour classer la malnutrition aiguë à partir du périmètre brachial ou d'autres mesures anthropométriques. Les seuils de périmètre brachial varient selon l'âge, le sexe et l'état physiologique ; appliquer une règle hors de sa population cible produit une mauvaise classification.
      es: Una regla específica de la población para clasificar la desnutrición aguda a partir del perímetro braquial u otras mediciones antropométricas. Los cortes de perímetro braquial difieren por edad, sexo y estado fisiológico; aplicar una regla fuera de su población objetivo produce clasificación errónea.
    enum_uri: aidops:CutoffRule
    permissible_values:
      who_unicef_6_59m:
        title:
          en: WHO/UNICEF MUAC, children 6-59 months
          fr: Périmètre brachial OMS/UNICEF, enfants de 6 à 59 mois
          es: Perímetro braquial OMS/UNICEF, niños de 6 a 59 meses
        description:
          en: MUAC < 115 mm = SAM, 115-124 mm = MAM, >= 125 mm = adequate. The canonical rule for under-five acute malnutrition.
          fr: Périmètre brachial < 115 mm = MAS, 115-124 mm = MAM, >= 125 mm = adéquat. La règle canonique pour la malnutrition aiguë chez les moins de cinq ans.
          es: Perímetro braquial < 115 mm = DAG, 115-124 mm = DAM, >= 125 mm = adecuado. La regla canónica para la desnutrición aguda en menores de cinco años.
      who_2007_school_age:
        title:
          en: WHO 2007 BMI-for-age, school-age and adolescents
          fr: IMC-pour-âge OMS 2007, âge scolaire et adolescents
          es: IMC-para-edad OMS 2007, edad escolar y adolescentes
        description:
          en: Z-score classification from BMI-for-age rather than fixed MUAC cutoffs. Use for children and adolescents 5-19 years.
          fr: Classification par z-score à partir de l'IMC-pour-âge plutôt que par des seuils de périmètre brachial fixes. À utiliser pour les enfants et adolescents de 5 à 19 ans.
          es: Clasificación por puntaje z a partir de IMC-para-edad en lugar de cortes fijos de perímetro braquial. Utilice para niños y adolescentes de 5 a 19 años.
      sphere_pregnant:
        title:
          en: Sphere MUAC, pregnant and lactating women
          fr: Périmètre brachial Sphere, femmes enceintes et allaitantes
          es: Perímetro braquial Sphere, mujeres embarazadas y lactantes
        description:
          en: MUAC thresholds for pregnant and lactating women vary by context; common cutoffs are < 210 mm or < 230 mm depending on national protocol.
          fr: Les seuils de périmètre brachial pour les femmes enceintes et allaitantes varient selon le contexte ; les seuils courants sont < 210 mm ou < 230 mm selon le protocole national.
          es: Los umbrales de perímetro braquial para mujeres embarazadas y lactantes varían según el contexto; los cortes comunes son < 210 mm o < 230 mm según el protocolo nacional.
      humanitarian_adult:
        title:
          en: Humanitarian adult MUAC
          fr: Périmètre brachial adulte humanitaire
          es: Perímetro braquial adulto humanitario
        description:
          en: No universal cutoff exists for adults. Humanitarian contexts commonly use 185-220 mm ranges, selected per operation.
          fr: Il n'existe pas de seuil universel pour les adultes. Les contextes humanitaires utilisent couramment des plages de 185 à 220 mm, choisies selon l'opération.
          es: No existe un corte universal para adultos. Los contextos humanitarios utilizan comúnmente rangos de 185 a 220 mm, seleccionados según la operación.
      national_protocol:
        title:
          en: National protocol
          fr: Protocole national
          es: Protocolo nacional
        description:
          en: A government or ministry-of-health protocol that defines its own thresholds. Use when the rule is a national standard not covered by the values above.
          fr: Un protocole gouvernemental ou d'un ministère de la santé qui définit ses propres seuils. À utiliser lorsque la règle est une norme nationale non couverte par les valeurs ci-dessus.
          es: Un protocolo gubernamental o del ministerio de salud que define sus propios umbrales. Utilice cuando la regla es un estándar nacional no cubierto por los valores anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology", "who-muac-cutoffs"], "definition": {"en": "A population-specific rule for classifying acute malnutrition from MUAC or other anthropometric measurements. MUAC cutoffs differ by age, sex, and physiological state; applying a rule outside its target population produces misclassification.", "es": "Una regla espec\u00edfica de la poblaci\u00f3n para clasificar la desnutrici\u00f3n aguda a partir del per\u00edmetro braquial u otras mediciones antropom\u00e9tricas. Los cortes de per\u00edmetro braquial difieren por edad, sexo y estado fisiol\u00f3gico; aplicar una regla fuera de su poblaci\u00f3n objetivo produce clasificaci\u00f3n err\u00f3nea.", "fr": "Une r\u00e8gle sp\u00e9cifique \u00e0 la population pour classer la malnutrition aigu\u00eb \u00e0 partir du p\u00e9rim\u00e8tre brachial ou d''autres mesures anthropom\u00e9triques. Les seuils de p\u00e9rim\u00e8tre brachial varient selon l''\u00e2ge, le sexe et l''\u00e9tat physiologique ; appliquer une r\u00e8gle hors de sa population cible produit une mauvaise classification."}, "id": "cutoff-rule", "label": {"en": "Cutoff Rule", "es": "Regla de corte", "fr": "R\u00e8gle de seuil"}, "maturity": "draft", "standard": {"name": "WHO/UNICEF joint statement (2009) and Sphere Handbook (2018)", "notes": "Cutoffs for children 6-59 months are the WHO/UNICEF standard: SAM < 115 mm, MAM 115-124 mm, adequate >= 125 mm. School-age, adolescent, pregnant, lactating, and adult populations use different rules drawn from Sphere, national protocols, and humanitarian practice.", "uri": "https://www.who.int/publications/i/item/9789241598163"}, "values": [{"code": "who_unicef_6_59m", "definition": {"en": "MUAC < 115 mm = SAM, 115-124 mm = MAM, >= 125 mm = adequate. The canonical rule for under-five acute malnutrition.", "es": "Per\u00edmetro braquial < 115 mm = DAG, 115-124 mm = DAM, >= 125 mm = adecuado. La regla can\u00f3nica para la desnutrici\u00f3n aguda en menores de cinco a\u00f1os.", "fr": "P\u00e9rim\u00e8tre brachial < 115 mm = MAS, 115-124 mm = MAM, >= 125 mm = ad\u00e9quat. La r\u00e8gle canonique pour la malnutrition aigu\u00eb chez les moins de cinq ans."}, "label": {"en": "WHO/UNICEF MUAC, children 6-59 months", "es": "Per\u00edmetro braquial OMS/UNICEF, ni\u00f1os de 6 a 59 meses", "fr": "P\u00e9rim\u00e8tre brachial OMS/UNICEF, enfants de 6 \u00e0 59 mois"}}, {"code": "who_2007_school_age", "definition": {"en": "Z-score classification from BMI-for-age rather than fixed MUAC cutoffs. Use for children and adolescents 5-19 years.", "es": "Clasificaci\u00f3n por puntaje z a partir de IMC-para-edad en lugar de cortes fijos de per\u00edmetro braquial. Utilice para ni\u00f1os y adolescentes de 5 a 19 a\u00f1os.", "fr": "Classification par z-score \u00e0 partir de l''IMC-pour-\u00e2ge plut\u00f4t que par des seuils de p\u00e9rim\u00e8tre brachial fixes. \u00c0 utiliser pour les enfants et adolescents de 5 \u00e0 19 ans."}, "label": {"en": "WHO 2007 BMI-for-age, school-age and adolescents", "es": "IMC-para-edad OMS 2007, edad escolar y adolescentes", "fr": "IMC-pour-\u00e2ge OMS 2007, \u00e2ge scolaire et adolescents"}}, {"code": "sphere_pregnant", "definition": {"en": "MUAC thresholds for pregnant and lactating women vary by context; common cutoffs are < 210 mm or < 230 mm depending on national protocol.", "es": "Los umbrales de per\u00edmetro braquial para mujeres embarazadas y lactantes var\u00edan seg\u00fan el contexto; los cortes comunes son < 210 mm o < 230 mm seg\u00fan el protocolo nacional.", "fr": "Les seuils de p\u00e9rim\u00e8tre brachial pour les femmes enceintes et allaitantes varient selon le contexte ; les seuils courants sont < 210 mm ou < 230 mm selon le protocole national."}, "label": {"en": "Sphere MUAC, pregnant and lactating women", "es": "Per\u00edmetro braquial Sphere, mujeres embarazadas y lactantes", "fr": "P\u00e9rim\u00e8tre brachial Sphere, femmes enceintes et allaitantes"}}, {"code": "humanitarian_adult", "definition": {"en": "No universal cutoff exists for adults. Humanitarian contexts commonly use 185-220 mm ranges, selected per operation.", "es": "No existe un corte universal para adultos. Los contextos humanitarios utilizan com\u00fanmente rangos de 185 a 220 mm, seleccionados seg\u00fan la operaci\u00f3n.", "fr": "Il n''existe pas de seuil universel pour les adultes. Les contextes humanitaires utilisent couramment des plages de 185 \u00e0 220 mm, choisies selon l''op\u00e9ration."}, "label": {"en": "Humanitarian adult MUAC", "es": "Per\u00edmetro braquial adulto humanitario", "fr": "P\u00e9rim\u00e8tre brachial adulte humanitaire"}}, {"code": "national_protocol", "definition": {"en": "A government or ministry-of-health protocol that defines its own thresholds. Use when the rule is a national standard not covered by the values above.", "es": "Un protocolo gubernamental o del ministerio de salud que define sus propios umbrales. Utilice cuando la regla es un est\u00e1ndar nacional no cubierto por los valores anteriores.", "fr": "Un protocole gouvernemental ou d''un minist\u00e8re de la sant\u00e9 qui d\u00e9finit ses propres seuils. \u00c0 utiliser lorsque la r\u00e8gle est une norme nationale non couverte par les valeurs ci-dessus."}, "label": {"en": "National protocol", "es": "Protocolo nacional", "fr": "Protocole national"}}]}'
      bibliography_refs: smart-methodology,who-muac-cutoffs
  DesireMoreChildren:
    title:
      en: Desire for More Children
      fr: Désir d'avoir d'autres enfants
      es: Deseo de tener más hijos
    description:
      en: The woman's stated intention about whether and when she wants another child. The gateway question for fertility preference coding (DHS V601 / fertility preference section). For currently pregnant women, the question is rephrased to ask about intentions after the current pregnancy.
      fr: L'intention déclarée d'une femme quant au fait d'avoir un autre enfant et au moment où elle le souhaiterait. La question d'entrée pour le codage des préférences de fécondité (DHS V601 / section des préférences de fécondité). Pour les femmes enceintes, la question est reformulée pour demander les intentions après la grossesse en cours.
      es: La intención declarada de una mujer sobre si y cuándo quiere otro hijo. La pregunta de entrada para la codificación de preferencias de fecundidad (DHS V601 / sección de preferencias de fecundidad). Para mujeres actualmente embarazadas, la pregunta se reformula para preguntar sobre intenciones después del embarazo actual.
    enum_uri: aidops:DesireMoreChildren
    permissible_values:
      want_soon:
        title:
          en: Wants another child within 2 years
          fr: Souhaite un autre enfant dans les 2 ans
          es: Desea otro hijo en menos de 2 años
        description:
          en: The woman wants another child and would like to have the birth within the next two years.
          fr: La femme souhaite un autre enfant et voudrait accoucher dans les deux prochaines années.
          es: La mujer desea otro hijo y quisiera tenerlo en los próximos dos años.
      want_later:
        title:
          en: Wants another child but later (2+ years)
          fr: Souhaite un autre enfant mais plus tard (2 ans ou plus)
          es: Desea otro hijo pero más adelante (2 años o más)
        description:
          en: The woman wants another child but wants to wait at least two years before the next birth. Probe for desired waiting time if this response is given.
          fr: La femme souhaite un autre enfant mais veut attendre au moins deux ans avant le prochain accouchement. Demander le délai d'attente souhaité si cette réponse est donnée.
          es: La mujer desea otro hijo pero quiere esperar al menos dos años antes del próximo nacimiento. Preguntar por el tiempo de espera deseado si se da esta respuesta.
      wants_no_more:
        title:
          en: Wants no more children
          fr: Ne veut plus d'enfants
          es: No desea más hijos
        description:
          en: The woman does not want any more children (limiting preference).
          fr: La femme ne veut plus d'enfants (préférence de limitation).
          es: La mujer no desea más hijos (preferencia de limitación).
      sterilized:
        title:
          en: Sterilized (self or partner)
          fr: Stérilisée (elle-même ou partenaire)
          es: Esterilizada (ella o su pareja)
        description:
          en: The woman or her partner has been voluntarily sterilized. She cannot have more children.
          fr: La femme ou son partenaire a été stérilisé(e) volontairement. Elle ne peut plus avoir d'enfants.
          es: La mujer o su pareja ha sido esterilizada voluntariamente. No puede tener más hijos.
      infecund_declared:
        title:
          en: Declared infecund
          fr: Inféconde déclarée
          es: Infecunda declarada
        description:
          en: The woman reports being unable to have children (infecund), not due to voluntary sterilization.
          fr: La femme déclare ne pas pouvoir avoir d'enfants (inféconde), sans stérilisation volontaire.
          es: La mujer reporta ser incapaz de tener hijos (infecunda), sin esterilización voluntaria.
      undecided:
        title:
          en: Undecided / unsure
          fr: Indécise / incertaine
          es: Indecisa / no segura
        description:
          en: The woman is unsure or unable to express a clear preference (e.g., 'up to God', 'as many as come', 'don't know').
          fr: La femme est incertaine ou incapable d'exprimer une préférence claire (p. ex. « c'est Dieu qui décide », « autant qu'il en vient », « je ne sais pas »).
          es: La mujer está indecisa o no puede expresar una preferencia clara (p. ej., 'lo que Dios quiera', 'los que vengan', 'no sé').
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-family-planning"], "definition": {"en": "The woman''s stated intention about whether and when she wants another child. The gateway question for fertility preference coding (DHS V601 / fertility preference section). For currently pregnant women, the question is rephrased to ask about intentions after the current pregnancy.", "es": "La intenci\u00f3n declarada de una mujer sobre si y cu\u00e1ndo quiere otro hijo. La pregunta de entrada para la codificaci\u00f3n de preferencias de fecundidad (DHS V601 / secci\u00f3n de preferencias de fecundidad). Para mujeres actualmente embarazadas, la pregunta se reformula para preguntar sobre intenciones despu\u00e9s del embarazo actual.", "fr": "L''intention d\u00e9clar\u00e9e d''une femme quant au fait d''avoir un autre enfant et au moment o\u00f9 elle le souhaiterait. La question d''entr\u00e9e pour le codage des pr\u00e9f\u00e9rences de f\u00e9condit\u00e9 (DHS V601 / section des pr\u00e9f\u00e9rences de f\u00e9condit\u00e9). Pour les femmes enceintes, la question est reformul\u00e9e pour demander les intentions apr\u00e8s la grossesse en cours."}, "id": "desire-more-children", "label": {"en": "Desire for More Children", "es": "Deseo de tener m\u00e1s hijos", "fr": "D\u00e9sir d''avoir d''autres enfants"}, "maturity": "draft", "values": [{"code": "want_soon", "definition": {"en": "The woman wants another child and would like to have the birth within the next two years.", "es": "La mujer desea otro hijo y quisiera tenerlo en los pr\u00f3ximos dos a\u00f1os.", "fr": "La femme souhaite un autre enfant et voudrait accoucher dans les deux prochaines ann\u00e9es."}, "label": {"en": "Wants another child within 2 years", "es": "Desea otro hijo en menos de 2 a\u00f1os", "fr": "Souhaite un autre enfant dans les 2 ans"}}, {"code": "want_later", "definition": {"en": "The woman wants another child but wants to wait at least two years before the next birth. Probe for desi