  BlanketCondition:
    title:
      en: Blanket condition (4-level)
      fr: État des couvertures (4 niveaux)
      es: Condición de las frazadas (4 niveles)
    description:
      en: Four-level scale describing the usable condition of blankets or thick sleeping covers held by a household. Used in NFI post-distribution monitoring to flag distribution batches that arrived damaged or that have degraded in use. Based on the UNHCR Global NFI PDM enumerator-observation pattern, which compares items observed in the household against the items distributed.
      fr: Échelle à quatre niveaux décrivant l'état utilisable des couvertures ou des couvertures de couchage épaisses détenues par un ménage. Utilisée dans le suivi post-distribution des ANA pour signaler les lots de distribution arrivés endommagés ou qui se sont dégradés à l'usage. Basée sur le modèle d'observation de l'enquêteur du Suivi Post-Distribution Mondial des ANA du HCR, qui compare les articles observés dans le ménage à ceux qui ont été distribués.
      es: Escala de cuatro niveles que describe la condición utilizable de las frazadas o cubiertas gruesas para dormir que tiene un hogar. Utilizada en el monitoreo post-distribución de ANF para señalar los lotes de distribución que llegaron dañados o que se han deteriorado con el uso. Basada en el patrón de observación por el encuestador del PDM Global de ANF del ACNUR, que compara los artículos observados en el hogar con los distribuidos.
    enum_uri: aidops:BlanketCondition
    permissible_values:
      all_usable:
        title:
          en: All usable
          fr: Toutes utilisables
          es: Todas utilizables
        description:
          en: All blankets or sleeping covers currently held by the household are in usable condition (not severely torn, wet, or infested).
          fr: Toutes les couvertures ou couvertures de couchage actuellement détenues par le ménage sont en état utilisable (pas gravement déchirées, mouillées ou infestées).
          es: Todas las frazadas o cubiertas para dormir que tiene actualmente el hogar están en condición utilizable (no severamente rotas, mojadas o infestadas).
      some_usable:
        title:
          en: Some usable
          fr: Certaines utilisables
          es: Algunas utilizables
        description:
          en: At least one but not all blankets held by the household are in usable condition.
          fr: Au moins une mais pas toutes les couvertures détenues par le ménage sont en état utilisable.
          es: Al menos una pero no todas las frazadas que tiene el hogar están en condición utilizable.
      none_usable:
        title:
          en: None usable
          fr: Aucune utilisable
          es: Ninguna utilizable
        description:
          en: All blankets held by the household are in unusable condition.
          fr: Toutes les couvertures détenues par le ménage sont en état inutilisable.
          es: Todas las frazadas que tiene el hogar están en condición inutilizable.
      no_blankets:
        title:
          en: No blankets
          fr: Aucune couverture
          es: Sin frazadas
        description:
          en: The household has no blankets or sleeping covers at all.
          fr: Le ménage ne possède aucune couverture ni couverture de couchage.
          es: El hogar no tiene ninguna frazada ni cubierta para dormir.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Four-level scale describing the usable condition of blankets or thick sleeping covers held by a household. Used in NFI post-distribution monitoring to flag distribution batches that arrived damaged or that have degraded in use. Based on the UNHCR Global NFI PDM enumerator-observation pattern, which compares items observed in the household against the items distributed.", "es": "Escala de cuatro niveles que describe la condici\u00f3n utilizable de las frazadas o cubiertas gruesas para dormir que tiene un hogar. Utilizada en el monitoreo post-distribuci\u00f3n de ANF para se\u00f1alar los lotes de distribuci\u00f3n que llegaron da\u00f1ados o que se han deteriorado con el uso. Basada en el patr\u00f3n de observaci\u00f3n por el encuestador del PDM Global de ANF del ACNUR, que compara los art\u00edculos observados en el hogar con los distribuidos.", "fr": "\u00c9chelle \u00e0 quatre niveaux d\u00e9crivant l''\u00e9tat utilisable des couvertures ou des couvertures de couchage \u00e9paisses d\u00e9tenues par un m\u00e9nage. Utilis\u00e9e dans le suivi post-distribution des ANA pour signaler les lots de distribution arriv\u00e9s endommag\u00e9s ou qui se sont d\u00e9grad\u00e9s \u00e0 l''usage. Bas\u00e9e sur le mod\u00e8le d''observation de l''enqu\u00eateur du Suivi Post-Distribution Mondial des ANA du HCR, qui compare les articles observ\u00e9s dans le m\u00e9nage \u00e0 ceux qui ont \u00e9t\u00e9 distribu\u00e9s."}, "id": "blanket-condition", "label": {"en": "Blanket condition (4-level)", "es": "Condici\u00f3n de las frazadas (4 niveles)", "fr": "\u00c9tat des couvertures (4 niveaux)"}, "maturity": "draft", "values": [{"code": "all_usable", "definition": {"en": "All blankets or sleeping covers currently held by the household are in usable condition (not severely torn, wet, or infested).", "es": "Todas las frazadas o cubiertas para dormir que tiene actualmente el hogar est\u00e1n en condici\u00f3n utilizable (no severamente rotas, mojadas o infestadas).", "fr": "Toutes les couvertures ou couvertures de couchage actuellement d\u00e9tenues par le m\u00e9nage sont en \u00e9tat utilisable (pas gravement d\u00e9chir\u00e9es, mouill\u00e9es ou infest\u00e9es)."}, "label": {"en": "All usable", "es": "Todas utilizables", "fr": "Toutes utilisables"}}, {"code": "some_usable", "definition": {"en": "At least one but not all blankets held by the household are in usable condition.", "es": "Al menos una pero no todas las frazadas que tiene el hogar est\u00e1n en condici\u00f3n utilizable.", "fr": "Au moins une mais pas toutes les couvertures d\u00e9tenues par le m\u00e9nage sont en \u00e9tat utilisable."}, "label": {"en": "Some usable", "es": "Algunas utilizables", "fr": "Certaines utilisables"}}, {"code": "none_usable", "definition": {"en": "All blankets held by the household are in unusable condition.", "es": "Todas las frazadas que tiene el hogar est\u00e1n en condici\u00f3n inutilizable.", "fr": "Toutes les couvertures d\u00e9tenues par le m\u00e9nage sont en \u00e9tat inutilisable."}, "label": {"en": "None usable", "es": "Ninguna utilizable", "fr": "Aucune utilisable"}}, {"code": "no_blankets", "definition": {"en": "The household has no blankets or sleeping covers at all.", "es": "El hogar no tiene ninguna frazada ni cubierta para dormir.", "fr": "Le m\u00e9nage ne poss\u00e8de aucune couverture ni couverture de couchage."}, "label": {"en": "No blankets", "es": "Sin frazadas", "fr": "Aucune couverture"}}]}'
