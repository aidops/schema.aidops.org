  WeaiAutonomyScale:
    title:
      en: WEAI Autonomy Likeness Scale
      fr: Échelle de ressemblance d'autonomie WEAI
      es: Escala de similitud de autonomía WEAI
    description:
      en: 'Five-point scale used in the pro-WEAI Relative Autonomy Index (RAI) vignettes. Respondents rate how much they identify with a described person. Scores are weighted and summed to produce the RAI: identified vignette (+3), introjected vignette (−1), external vignette (−2). Adequacy threshold: RAI ≥ 1.'
      fr: 'Échelle en cinq points utilisée dans les vignettes de l''indice d''autonomie relative (RAI) du pro-WEAI. Les répondants évaluent dans quelle mesure ils s''identifient à la personne décrite. Les scores sont pondérés et additionnés pour produire le RAI : vignette identifiée (+3), vignette introjectée (−1), vignette externe (−2). Seuil d''adéquation : RAI ≥ 1.'
      es: 'Escala de cinco puntos utilizada en las viñetas del Índice de Autonomía Relativa (RAI) del pro-WEAI. Los encuestados califican en qué medida se identifican con la persona descrita. Las puntuaciones se ponderan y suman para producir el RAI: viñeta identificada (+3), viñeta introyectada (−1), viñeta externa (−2). Umbral de adecuación: RAI ≥ 1.'
    enum_uri: aidops:WeaiAutonomyScale
    permissible_values:
      exactly_like:
        title:
          en: Exactly like me
          fr: Exactement comme moi
          es: Exactamente como yo
        description:
          en: The respondent feels completely identified with the described person. Score value 5 (most identified).
          fr: Le répondant s'identifie complètement à la personne décrite. Valeur de score 5 (le plus identifié).
          es: El encuestado se identifica completamente con la persona descrita. Valor de puntuación 5 (más identificado).
      like:
        title:
          en: Like me
          fr: Comme moi
          es: Como yo
        description:
          en: The respondent feels mostly identified with the described person. Score value 4.
          fr: Le répondant s'identifie principalement à la personne décrite. Valeur de score 4.
          es: El encuestado se identifica en gran medida con la persona descrita. Valor de puntuación 4.
      somewhat_like:
        title:
          en: Somewhat like me
          fr: Un peu comme moi
          es: Algo como yo
        description:
          en: The respondent feels partially identified with the described person. Score value 3.
          fr: Le répondant s'identifie partiellement à la personne décrite. Valeur de score 3.
          es: El encuestado se identifica parcialmente con la persona descrita. Valor de puntuación 3.
      not_much_like:
        title:
          en: Not much like me
          fr: Pas beaucoup comme moi
          es: No mucho como yo
        description:
          en: The respondent feels little identification with the described person. Score value 2.
          fr: Le répondant s'identifie peu à la personne décrite. Valeur de score 2.
          es: El encuestado siente poca identificación con la persona descrita. Valor de puntuación 2.
      not_like_at_all:
        title:
          en: Not like me at all
          fr: Pas du tout comme moi
          es: No soy así en absoluto
        description:
          en: The respondent does not identify at all with the described person. Score value 1 (least identified).
          fr: Le répondant ne s'identifie pas du tout à la personne décrite. Valeur de score 1 (le moins identifié).
          es: El encuestado no se identifica en absoluto con la persona descrita. Valor de puntuación 1 (menos identificado).
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Five-point scale used in the pro-WEAI Relative Autonomy Index (RAI) vignettes. Respondents rate how much they identify with a described person. Scores are weighted and summed to produce the RAI: identified vignette (+3), introjected vignette (\u22121), external vignette (\u22122). Adequacy threshold: RAI \u2265 1.", "es": "Escala de cinco puntos utilizada en las vi\u00f1etas del \u00cdndice de Autonom\u00eda Relativa (RAI) del pro-WEAI. Los encuestados califican en qu\u00e9 medida se identifican con la persona descrita. Las puntuaciones se ponderan y suman para producir el RAI: vi\u00f1eta identificada (+3), vi\u00f1eta introyectada (\u22121), vi\u00f1eta externa (\u22122). Umbral de adecuaci\u00f3n: RAI \u2265 1.", "fr": "\u00c9chelle en cinq points utilis\u00e9e dans les vignettes de l''indice d''autonomie relative (RAI) du pro-WEAI. Les r\u00e9pondants \u00e9valuent dans quelle mesure ils s''identifient \u00e0 la personne d\u00e9crite. Les scores sont pond\u00e9r\u00e9s et additionn\u00e9s pour produire le RAI : vignette identifi\u00e9e (+3), vignette introject\u00e9e (\u22121), vignette externe (\u22122). Seuil d''ad\u00e9quation : RAI \u2265 1."}, "id": "weai-autonomy-scale", "label": {"en": "WEAI Autonomy Likeness Scale", "es": "Escala de similitud de autonom\u00eda WEAI", "fr": "\u00c9chelle de ressemblance d''autonomie WEAI"}, "maturity": "draft", "standard": {"name": "pro-WEAI User Guide v3 (IFPRI 2026)", "uri": "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"}, "values": [{"code": "exactly_like", "definition": {"en": "The respondent feels completely identified with the described person. Score value 5 (most identified).", "es": "El encuestado se identifica completamente con la persona descrita. Valor de puntuaci\u00f3n 5 (m\u00e1s identificado).", "fr": "Le r\u00e9pondant s''identifie compl\u00e8tement \u00e0 la personne d\u00e9crite. Valeur de score 5 (le plus identifi\u00e9)."}, "label": {"en": "Exactly like me", "es": "Exactamente como yo", "fr": "Exactement comme moi"}}, {"code": "like", "definition": {"en": "The respondent feels mostly identified with the described person. Score value 4.", "es": "El encuestado se identifica en gran medida con la persona descrita. Valor de puntuaci\u00f3n 4.", "fr": "Le r\u00e9pondant s''identifie principalement \u00e0 la personne d\u00e9crite. Valeur de score 4."}, "label": {"en": "Like me", "es": "Como yo", "fr": "Comme moi"}}, {"code": "somewhat_like", "definition": {"en": "The respondent feels partially identified with the described person. Score value 3.", "es": "El encuestado se identifica parcialmente con la persona descrita. Valor de puntuaci\u00f3n 3.", "fr": "Le r\u00e9pondant s''identifie partiellement \u00e0 la personne d\u00e9crite. Valeur de score 3."}, "label": {"en": "Somewhat like me", "es": "Algo como yo", "fr": "Un peu comme moi"}}, {"code": "not_much_like", "definition": {"en": "The respondent feels little identification with the described person. Score value 2.", "es": "El encuestado siente poca identificaci\u00f3n con la persona descrita. Valor de puntuaci\u00f3n 2.", "fr": "Le r\u00e9pondant s''identifie peu \u00e0 la personne d\u00e9crite. Valeur de score 2."}, "label": {"en": "Not much like me", "es": "No mucho como yo", "fr": "Pas beaucoup comme moi"}}, {"code": "not_like_at_all", "definition": {"en": "The respondent does not identify at all with the described person. Score value 1 (least identified).", "es": "El encuestado no se identifica en absoluto con la persona descrita. Valor de puntuaci\u00f3n 1 (menos identificado).", "fr": "Le r\u00e9pondant ne s''identifie pas du tout \u00e0 la personne d\u00e9crite. Valeur de score 1 (le moins identifi\u00e9)."}, "label": {"en": "Not like me at all", "es": "No soy as\u00ed en absoluto", "fr": "Pas du tout comme moi"}}]}'
