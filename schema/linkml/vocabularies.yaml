      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "definition": {"en": "Multi-select typology of channels through which an affected household can submit feedback, suggestions, or complaints to aid providers. Synthesised from the IASC / REACH Menu of AAP Questions 2018 feedback section and the IFRC Community Engagement and Accountability Toolkit. Distinct from `aap-info-channel` (which captures one-way information flow from responder to household) because feedback flow has its own design considerations: anonymity, accessibility, reachable return address, and suitability for sensitive content. Ground Truth Solutions keeps the two vocabularies separate to allow per-channel evaluation of feedback usability.", "es": "Tipolog\u00eda de selecci\u00f3n m\u00faltiple de canales por los cuales un hogar afectado puede enviar retroalimentaci\u00f3n, sugerencias o quejas a los actores humanitarios. Sintetizada a partir de la secci\u00f3n de retroalimentaci\u00f3n del Men\u00fa de Preguntas AAP IASC / REACH 2018 y del Kit de Herramientas de Participaci\u00f3n Comunitaria y Rendici\u00f3n de Cuentas de la FICR. Distinta de `aap-info-channel` (que captura el flujo de informaci\u00f3n unidireccional del actor humanitario al hogar) porque el flujo de retroalimentaci\u00f3n tiene sus propias consideraciones de dise\u00f1o: anonimato, accesibilidad, direcci\u00f3n de retorno accesible y adecuaci\u00f3n para contenido sensible. Ground Truth Solutions mantiene los dos vocabularios separados para permitir la evaluaci\u00f3n por canal de la usabilidad de la retroalimentaci\u00f3n.", "fr": "Typologie \u00e0 choix multiples des canaux par lesquels un m\u00e9nage affect\u00e9 peut soumettre des retours, des suggestions ou des plaintes aux intervenants. Synth\u00e9tis\u00e9e \u00e0 partir de la section de retour d''information du Menu de questions AAP IASC / REACH 2018 et du Toolkit d''engagement communautaire et de redevabilit\u00e9 de la FICR. Distincte de `aap-info-channel` (qui capture le flux d''information unidirectionnel de l''intervenant au m\u00e9nage) car le flux de retour d''information a ses propres consid\u00e9rations de conception : anonymat, accessibilit\u00e9, adresse de retour joignable et ad\u00e9quation pour le contenu sensible. Ground Truth Solutions conserve les deux vocabulaires s\u00e9par\u00e9s pour permettre une \u00e9valuation par canal de l''utilisabilit\u00e9 des retours d''information."}, "id": "aap-feedback-channel", "label": {"en": "AAP: Feedback and complaint channel", "es": "Rendici\u00f3n de cuentas: Canal de retroalimentaci\u00f3n y quejas", "fr": "Redevabilit\u00e9 : Canal de retour d''information et de plainte"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Channel typology merged with the IFRC CEA Toolkit feedback-mechanism inventory.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "phone_hotline", "definition": {"en": "A dedicated toll-free or low-cost phone number for feedback or complaints.", "es": "Un n\u00famero de tel\u00e9fono dedicado, gratuito o de bajo costo, para retroalimentaci\u00f3n o quejas.", "fr": "Un num\u00e9ro de t\u00e9l\u00e9phone d\u00e9di\u00e9, gratuit ou \u00e0 faible co\u00fbt, pour les retours d''information ou les plaintes."}, "label": {"en": "Phone hotline", "es": "L\u00ednea telef\u00f3nica de ayuda", "fr": "Ligne t\u00e9l\u00e9phonique d''assistance"}}, {"code": "sms_text", "definition": {"en": "Feedback submitted as a short text message to a dedicated number.", "es": "Retroalimentaci\u00f3n enviada como un mensaje de texto corto a un n\u00famero dedicado.", "fr": "Retour d''information soumis sous forme de SMS \u00e0 un num\u00e9ro d\u00e9di\u00e9."}, "label": {"en": "SMS / text message", "es": "SMS / mensaje de texto", "fr": "SMS / texto"}}, {"code": "suggestion_box", "definition": {"en": "A physical box at a distribution site or community location where feedback can be deposited in writing or anonymously.", "es": "Una caja f\u00edsica en un sitio de distribuci\u00f3n o en un lugar comunitario donde se pueden depositar por escrito o de forma an\u00f3nima los comentarios.", "fr": "Une bo\u00eete physique sur un site de distribution ou un lieu communautaire o\u00f9 les retours d''information peuvent \u00eatre d\u00e9pos\u00e9s par \u00e9crit ou anonymement."}, "label": {"en": "Suggestion box", "es": "Buz\u00f3n de sugerencias", "fr": "Bo\u00eete \u00e0 suggestions"}}, {"code": "help_desk_at_distribution", "definition": {"en": "A staffed help-desk or information point at a distribution site to receive questions and complaints in person.", "es": "Una mesa de ayuda o punto de informaci\u00f3n atendida por personal en un sitio de distribuci\u00f3n para recibir preguntas y quejas en persona.", "fr": "Un guichet d''aide ou un point d''information tenu par du personnel sur un site de distribution pour recevoir des questions et des plaintes en personne."}, "label": {"en": "Help desk at distribution", "es": "Mesa de ayuda en la distribuci\u00f3n", "fr": "Guichet d''aide \u00e0 la distribution"}}, {"code": "staff_visit_to_household", "definition": {"en": "A staff member or volunteer visits the household on request or routinely and collects feedback verbally.", "es": "Un miembro del personal o voluntario visita al hogar a solicitud o de forma rutinaria y recoge verbalmente los comentarios.", "fr": "Un membre du personnel ou un volontaire rend visite au m\u00e9nage sur demande ou de mani\u00e8re routini\u00e8re et recueille verbalement les retours d''information."}, "label": {"en": "Staff visit to household", "es": "Visita del personal al hogar", "fr": "Visite du personnel au m\u00e9nage"}}, {"code": "community_committee_or_leader", "definition": {"en": "Feedback relayed through a community feedback committee, community relations volunteer, or traditional community leader.", "es": "Retroalimentaci\u00f3n transmitida a trav\u00e9s de un comit\u00e9 comunitario de retroalimentaci\u00f3n, un voluntario de relaciones comunitarias o un l\u00edder comunitario tradicional.", "fr": "Retour d''information relay\u00e9 par un comit\u00e9 communautaire de retour d''information, un volontaire des relations communautaires ou un leader communautaire traditionnel."}, "label": {"en": "Community committee or leader", "es": "Comit\u00e9 o l\u00edder comunitario", "fr": "Comit\u00e9 ou leader communautaire"}}, {"code": "email", "definition": {"en": "Feedback submitted by email to a dedicated address.", "es": "Retroalimentaci\u00f3n enviada por correo electr\u00f3nico a una direcci\u00f3n dedicada.", "fr": "Retour d''information soumis par courrier \u00e9lectronique \u00e0 une adresse d\u00e9di\u00e9e."}, "label": {"en": "Email", "es": "Correo electr\u00f3nico", "fr": "Courrier \u00e9lectronique"}}, {"code": "website_or_app", "definition": {"en": "An online web-form or dedicated mobile application for submitting feedback.", "es": "Un formulario web en l\u00ednea o una aplicaci\u00f3n m\u00f3vil dedicada para enviar retroalimentaci\u00f3n.", "fr": "Un formulaire web en ligne ou une application mobile d\u00e9di\u00e9e pour soumettre des retours d''information."}, "label": {"en": "Website or mobile application", "es": "Sitio web o aplicaci\u00f3n m\u00f3vil", "fr": "Site web ou application mobile"}}, {"code": "social_media", "definition": {"en": "Feedback relayed through public or semi-public social-media posts, comments, or direct messages to agency accounts.", "es": "Retroalimentaci\u00f3n transmitida a trav\u00e9s de publicaciones, comentarios o mensajes directos p\u00fablicos o semip\u00fablicos en redes sociales dirigidas a cuentas de agencia.", "fr": "Retour d''information relay\u00e9 par des publications, commentaires ou messages directs publics ou semi-publics sur les m\u00e9dias sociaux vers les comptes d''agence."}, "label": {"en": "Social media", "es": "Redes sociales", "fr": "M\u00e9dias sociaux"}}, {"code": "in_person_at_office", "definition": {"en": "The respondent can visit the agency office to submit feedback in person.", "es": "El encuestado puede acudir a la oficina de la agencia para enviar retroalimentaci\u00f3n en persona.", "fr": "Le r\u00e9pondant peut se rendre au bureau de l''agence pour soumettre un retour d''information en personne."}, "label": {"en": "In person at agency office", "es": "En persona en la oficina de la agencia", "fr": "En personne au bureau de l''agence"}}, {"code": "other", "definition": {"en": "Feedback channel not covered by the listed codes.", "es": "Canal de retroalimentaci\u00f3n no cubierto por los c\u00f3digos listados.", "fr": "Canal de retour d''information non couvert par les codes list\u00e9s."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "none_known", "definition": {"en": "Respondent does not know of any available feedback channel. Recorded explicitly rather than treated as missing, because ''no channel known'' is the primary AAP outcome indicator.", "es": "El encuestado no conoce ning\u00fan canal de retroalimentaci\u00f3n disponible. Se registra expl\u00edcitamente en lugar de tratarse como faltante, porque \u00abning\u00fan canal conocido\u00bb es el indicador de resultado AAP principal.", "fr": "Le r\u00e9pondant ne conna\u00eet aucun canal de retour d''information disponible. Enregistr\u00e9 explicitement plut\u00f4t que trait\u00e9 comme manquant, car \u00ab aucun canal connu \u00bb est l''indicateur de r\u00e9sultat AAP principal."}, "label": {"en": "None known", "es": "Ninguno conocido", "fr": "Aucun connu"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to
        answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
      bibliography_refs: gts-hvi,iasc-reach-aap-menu-2018,ifrc-cea-toolkit-2021
  AapFrequency5:
    title:
      en: 'AAP: Frequency (5 levels)'
      fr: 'Redevabilité : Fréquence (5 niveaux)'
      es: 'Rendición de cuentas: Frecuencia (5 niveles)'
    description:
      en: 'Five-level frequency scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how often something occurs (for example, how often the respondent has felt treated with respect). Source: IASC / REACH Menu of AAP Questions 2018, IFRC CEA Toolkit, and standard public-health survey convention. Includes non-substantive codes `dont_know`, `not_applicable_no_interaction`, and `prefer_not_to_answer`.'
      fr: 'Échelle de fréquence à cinq niveaux utilisée dans le Profil de redevabilité envers les populations affectées pour les items qui demandent à quelle fréquence quelque chose se produit (par exemple, à quelle fréquence le répondant s''est senti traité avec respect). Source : Menu de questions AAP IASC / REACH 2018, Toolkit CEA de la FICR et convention standard des enquêtes de santé publique. Inclut des codes non substantiels `dont_know`, `not_applicable_no_interaction` et `prefer_not_to_answer`.'
      es: 'Escala de frecuencia de cinco niveles utilizada en el Perfil de Rendición de Cuentas a las Poblaciones Afectadas para los ítems que preguntan con qué frecuencia ocurre algo (por ejemplo, con qué frecuencia el encuestado se ha sentido tratado con respeto). Fuente: Menú de Preguntas AAP IASC / REACH 2018, Kit de Herramientas CEA de la FICR y convención estándar de encuestas de salud pública. Incluye códigos no sustantivos `dont_know`, `not_applicable_no_interaction` y `prefer_not_to_answer`.'
    enum_uri: aidops:AapFrequency5
    permissible_values:
      always:
        title:
          en: Always
          fr: Toujours
          es: Siempre
        description:
          en: The event or behaviour occurs every time.
          fr: L'événement ou le comportement se produit à chaque fois.
          es: El evento o comportamiento ocurre cada vez.
      often:
        title:
          en: Often
          fr: Souvent
          es: A menudo
        description:
          en: The event or behaviour occurs most of the time.
          fr: L'événement ou le comportement se produit la plupart du temps.
          es: El evento o comportamiento ocurre la mayoría de las veces.
      sometimes:
        title:
          en: Sometimes
          fr: Parfois
          es: A veces
        description:
          en: The event or behaviour occurs occasionally.
          fr: L'événement ou le comportement se produit occasionnellement.
          es: El evento o comportamiento ocurre ocasionalmente.
      rarely:
        title:
          en: Rarely
          fr: Rarement
          es: Raramente
        description:
          en: The event or behaviour occurs infrequently.
          fr: L'événement ou le comportement se produit rarement.
          es: El evento o comportamiento ocurre con poca frecuencia.
      never:
        title:
          en: Never
          fr: Jamais
          es: Nunca
        description:
          en: The event or behaviour has never occurred.
          fr: L'événement ou le comportement ne s'est jamais produit.
          es: El evento o comportamiento nunca ha ocurrido.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess frequency.
          fr: Le répondant ne peut pas évaluer la fréquence.
          es: El encuestado no puede evaluar la frecuencia.
      not_applicable_no_interaction:
        title:
          en: Not applicable — no interaction
          fr: Non applicable — aucune interaction
          es: No aplicable — no hay interacción
        description:
          en: The respondent has had no interaction with aid providers against which to assess frequency.
          fr: Le répondant n'a eu aucune interaction avec les intervenants permettant d'évaluer la fréquence.
          es: El encuestado no ha tenido ninguna interacción con los actores humanitarios contra la cual evaluar la frecuencia.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "definition": {"en": "Five-level frequency scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how often something occurs (for example, how often the respondent has felt treated with respect). Source: IASC / REACH Menu of AAP Questions 2018, IFRC CEA Toolkit, and standard public-health survey convention. Includes non-substantive codes `dont_know`, `not_applicable_no_interaction`, and `prefer_not_to_answer`.", "es": "Escala de frecuencia de cinco niveles utilizada en el Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas para los \u00edtems que preguntan con qu\u00e9 frecuencia ocurre algo (por ejemplo, con qu\u00e9 frecuencia el encuestado se ha sentido tratado con respeto). Fuente: Men\u00fa de Preguntas AAP IASC / REACH 2018, Kit de Herramientas CEA de la FICR y convenci\u00f3n est\u00e1ndar de encuestas de salud p\u00fablica. Incluye c\u00f3digos no sustantivos `dont_know`, `not_applicable_no_interaction` y `prefer_not_to_answer`.", "fr": "\u00c9chelle de fr\u00e9quence \u00e0 cinq niveaux utilis\u00e9e dans le Profil de redevabilit\u00e9 envers les populations affect\u00e9es pour les items qui demandent \u00e0 quelle fr\u00e9quence quelque chose se produit (par exemple, \u00e0 quelle fr\u00e9quence le r\u00e9pondant s''est senti trait\u00e9 avec respect). Source : Menu de questions AAP IASC / REACH 2018, Toolkit CEA de la FICR et convention standard des enqu\u00eates de sant\u00e9 publique. Inclut des codes non substantiels `dont_know`, `not_applicable_no_interaction` et `prefer_not_to_answer`."}, "id": "aap-frequency-5", "label": {"en": "AAP: Frequency (5 levels)", "es": "Rendici\u00f3n de cuentas: Frecuencia (5 niveles)", "fr": "Redevabilit\u00e9 : Fr\u00e9quence (5 niveaux)"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Frequency 5-level scale as used in IASC / REACH menu staff-behaviour items.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "always", "definition": {"en": "The event or behaviour occurs every time.", "es": "El evento o comportamiento ocurre cada vez.", "fr": "L''\u00e9v\u00e9nement ou le comportement se produit \u00e0 chaque fois."}, "label": {"en": "Always", "es": "Siempre", "fr": "Toujours"}}, {"code": "often", "definition": {"en": "The event or behaviour occurs most of the time.", "es": "El evento o comportamiento ocurre la mayor\u00eda de las veces.", "fr": "L''\u00e9v\u00e9nement ou le comportement se produit la plupart du temps."}, "label": {"en": "Often", "es": "A menudo", "fr": "Souvent"}}, {"code": "sometimes", "definition": {"en": "The event or behaviour occurs occasionally.", "es": "El evento o comportamiento ocurre ocasionalmente.", "fr": "L''\u00e9v\u00e9nement ou le comportement se produit occasionnellement."}, "label": {"en": "Sometimes", "es": "A veces", "fr": "Parfois"}}, {"code": "rarely", "definition": {"en": "The event or behaviour occurs infrequently.", "es": "El evento o comportamiento ocurre con poca frecuencia.", "fr": "L''\u00e9v\u00e9nement ou le comportement se produit rarement."}, "label": {"en": "Rarely", "es": "Raramente", "fr": "Rarement"}}, {"code": "never", "definition": {"en": "The event or behaviour has never occurred.", "es": "El evento o comportamiento nunca ha ocurrido.", "fr": "L''\u00e9v\u00e9nement ou le comportement ne s''est jamais produit."}, "label": {"en": "Never", "es": "Nunca", "fr": "Jamais"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess frequency.", "es": "El encuestado no puede evaluar la frecuencia.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la fr\u00e9quence."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "not_applicable_no_interaction", "definition": {"en": "The respondent has had no interaction with aid providers against which to assess frequency.", "es": "El encuestado no ha tenido ninguna interacci\u00f3n con los actores humanitarios contra la cual evaluar la frecuencia.", "fr": "Le r\u00e9pondant n''a eu aucune interaction avec les intervenants permettant d''\u00e9valuer la fr\u00e9quence."}, "label": {"en": "Not applicable \u2014 no interaction", "es": "No aplicable \u2014 no hay interacci\u00f3n", "fr": "Non applicable \u2014 aucune interaction"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
