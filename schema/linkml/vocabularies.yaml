uction"}}, {"code": "cash_with_guidance", "definition": {"en": "Cash transfer or voucher for shelter construction or repair, paired with technical advisory support to ensure appropriate use.", "es": "Transferencia de efectivo o cup\u00f3n para construcci\u00f3n o reparaci\u00f3n del refugio, combinado con apoyo de asesor\u00eda t\u00e9cnica para garantizar el uso apropiado.", "fr": "Transfert mon\u00e9taire ou bon pour la construction ou la r\u00e9paration de l''abri, associ\u00e9 \u00e0 un appui consultatif technique pour assurer une utilisation appropri\u00e9e."}, "label": {"en": "Cash or voucher with technical guidance", "es": "Efectivo o cup\u00f3n con orientaci\u00f3n t\u00e9cnica", "fr": "Argent liquide ou bon avec orientation technique"}}, {"code": "quality_monitoring", "definition": {"en": "Visits by technical programme staff to inspect and advise on the quality of shelter construction or repair work in progress or completed.", "es": "Visitas del personal t\u00e9cnico del programa para inspeccionar y asesorar sobre la calidad de los trabajos de construcci\u00f3n o reparaci\u00f3n del refugio en curso o completados.", "fr": "Visites de personnel technique du programme pour inspecter et conseiller sur la qualit\u00e9 des travaux de construction ou de r\u00e9paration d''abri en cours ou achev\u00e9s."}, "label": {"en": "Quality monitoring visits", "es": "Visitas de monitoreo de calidad", "fr": "Visites de suivi de la qualit\u00e9"}}, {"code": "legal_tenure_support", "definition": {"en": "Legal advice or documentation support related to housing, land and property rights, including assistance securing tenure documents.", "es": "Asesor\u00eda legal o apoyo de documentaci\u00f3n relacionado con los derechos de vivienda, tierra y propiedad, incluida la asistencia para obtener documentos de tenencia.", "fr": "Conseil juridique ou appui \u00e0 la documentation li\u00e9s aux droits relatifs au logement, aux terres et \u00e0 la propri\u00e9t\u00e9, y compris l''assistan