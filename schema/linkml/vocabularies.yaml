  MalariaTestType:
    title:
      en: Malaria Test Type
      fr: Type de test de paludisme
      es: Tipo de prueba de malaria
    description:
      en: The type of malaria diagnostic test performed on a child with fever. Distinguishes rapid diagnostic tests (RDT) from blood-slide microscopy, and captures whether any test was done. Used to classify fever episodes as test-confirmed vs presumptive malaria.
      fr: Le type de test diagnostique du paludisme effectué sur un enfant fiévreux. Distingue les tests de diagnostic rapide (TDR) de la microscopie par frottis sanguin, et indique si un test a été réalisé. Utilisé pour classifier les épisodes de fièvre comme paludisme confirmé ou présomptif.
      es: El tipo de prueba diagnóstica de malaria realizada en un niño con fiebre. Distingue las pruebas de diagnóstico rápido (PDR) de la microscopía por frotis de sangre, y captura si se realizó alguna prueba. Utilizado para clasificar los episodios febriles como malaria confirmada o presuntiva.
    enum_uri: aidops:MalariaTestType
    permissible_values:
      rdt:
        title:
          en: Rapid diagnostic test (RDT)
          fr: Test de diagnostic rapide (TDR)
          es: Prueba de diagnóstico rápido (PDR)
        description:
          en: A malaria rapid diagnostic test — a lateral-flow immunoassay detecting malaria antigens. Results available within 15–30 minutes.
          fr: Un test de diagnostic rapide du paludisme — un immunoessai par flux latéral détectant les antigènes du paludisme. Résultats disponibles en 15 à 30 minutes.
          es: 'Una prueba de diagnóstico rápido de malaria: un inmunoensayo de flujo lateral que detecta antígenos de malaria. Resultados disponibles en 15 a 30 minutos.'
      blood_slide:
        title:
          en: Blood slide (microscopy)
          fr: Frottis sanguin (microscopie)
          es: Frotis de sangre (microscopía)
        description:
          en: A malaria blood slide examined by microscopy — the gold-standard diagnostic method for species identification and parasite density.
          fr: Un frottis sanguin de paludisme examiné par microscopie — la méthode diagnostique de référence pour l'identification des espèces et la densité parasitaire.
          es: 'Un frotis de sangre de malaria examinado por microscopía: el método diagnóstico de referencia para la identificación de especies y la densidad parasitaria.'
      'no':
        title:
          en: No test done
          fr: Aucun test effectué
          es: No se realizó prueba
        description:
          en: No malaria diagnostic test was performed for this fever episode. Treatment, if given, is presumptive.
          fr: Aucun test diagnostique du paludisme n'a été réalisé pour cet épisode de fièvre. Le traitement, s'il est administré, est présomptif.
          es: No se realizó ninguna prueba diagnóstica de malaria para este episodio febril. El tratamiento, si se administró, es presuntivo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The caregiver does not know whether a malaria test was done.
          fr: Le soignant ne sait pas si un test de paludisme a été effectué.
          es: El cuidador no sabe si se realizó una prueba de malaria.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "The type of malaria diagnostic test performed on a child with fever. Distinguishes rapid diagnostic tests (RDT) from blood-slide microscopy, and captures whether any test was done. Used to classify fever episodes as test-confirmed vs presumptive malaria.", "es": "El tipo de prueba diagn\u00f3stica de malaria realizada en un ni\u00f1o con fiebre. Distingue las pruebas de diagn\u00f3stico r\u00e1pido (PDR) de la microscop\u00eda por frotis de sangre, y captura si se realiz\u00f3 alguna prueba. Utilizado para clasificar los episodios febriles como malaria confirmada o presuntiva.", "fr": "Le type de test diagnostique du paludisme effectu\u00e9 sur un enfant fi\u00e9vreux. Distingue les tests de diagnostic rapide (TDR) de la microscopie par frottis sanguin, et indique si un test a \u00e9t\u00e9 r\u00e9alis\u00e9. Utilis\u00e9 pour classifier les \u00e9pisodes de fi\u00e8vre comme paludisme confirm\u00e9 ou pr\u00e9somptif."}, "id": "malaria-test-type", "label": {"en": "Malaria Test Type", "es": "Tipo de prueba de malaria", "fr": "Type de test de paludisme"}, "maturity": "draft", "values": [{"code": "rdt", "definition": {"en": "A malaria rapid diagnostic test \u2014 a lateral-flow immunoassay detecting malaria antigens. Results available within 15\u201330 minutes.", "es": "Una prueba de diagn\u00f3stico r\u00e1pido de malaria: un inmunoensayo de flujo lateral que detecta ant\u00edgenos de malaria. Resultados disponibles en 15 a 30 minutos.", "fr": "Un test de diagnostic rapide du paludisme \u2014 un immunoessai par flux lat\u00e9ral d\u00e9tectant les antig\u00e8nes du paludisme. R\u00e9sultats disponibles en 15 \u00e0 30 minutes."}, "label": {"en": "Rapid diagnostic test (RDT)", "es": "Prueba de diagn\u00f3stico r\u00e1pido (PDR)", "fr": "Test de diagnostic rapide (TDR)"}}, {"code": "blood_slide", "definition": {"en": "A malaria blood slide examined by microscopy \u2014 the gold-standard diagnostic method for species identification and parasite density.", "es": "Un frotis de sangre de malaria examinado por microscop\u00eda: el m\u00e9todo diagn\u00f3stico de referencia para la identificaci\u00f3n de especies y la densidad parasitaria.", "fr": "Un frottis sanguin de paludisme examin\u00e9 par microscopie \u2014 la m\u00e9thode diagnostique de r\u00e9f\u00e9rence pour l''identification des esp\u00e8ces et la densit\u00e9 parasitaire."}, "label": {"en": "Blood slide (microscopy)", "es": "Frotis de sangre (microscop\u00eda)", "fr": "Frottis sanguin (microscopie)"}}, {"code": "no", "definition": {"en": "No malaria diagnostic test was performed for this fever episode. Treatment, if given, is presumptive.", "es": "No se realiz\u00f3 ninguna prueba diagn\u00f3stica de malaria para este episodio febril. El tratamiento, si se administr\u00f3, es presuntivo.", "fr": "Aucun test diagnostique du paludisme n''a \u00e9t\u00e9 r\u00e9alis\u00e9 pour cet \u00e9pisode de fi\u00e8vre. Le traitement, s''il est administr\u00e9, est pr\u00e9somptif."}, "label": {"en": "No test done", "es": "No se realiz\u00f3 prueba", "fr": "Aucun test effectu\u00e9"}}, {"code": "dont_know", "definition": {"en": "The caregiver does not know whether a malaria test was done.", "es": "El cuidador no sabe si se realiz\u00f3 una prueba de malaria.", "fr": "Le soignant ne sait pas si un test de paludisme a \u00e9t\u00e9 effectu\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  MalnutritionSeverity:
    title:
      en: Malnutrition Severity
      fr: Sévérité de la malnutrition
      es: Gravedad de la desnutrición
    description:
      en: The severity of malnutrition based on z-score classifications from the WHO Child Growth Standards, used for stunting (height-for-age), underweight (weight-for-age), and wasting (weight-for-height) assessments.
      fr: La sévérité de la malnutrition selon les classifications par score z des normes de croissance de l'enfant de l'OMS, utilisée pour le retard de croissance (taille-pour-âge), l'insuffisance pondérale (poids-pour-âge) et l'émaciation (poids-pour-taille).
      es: La gravedad de la desnutrición según las clasificaciones por puntaje z de los estándares de crecimiento infantil de la OMS, utilizada para el retraso del crecimiento (talla-para-la-edad), la insuficiencia ponderal (peso-para-la-edad) y la emaciación (peso-para-la-talla).
    enum_uri: aidops:MalnutritionSeverity
    permissible_values:
      normal:
        title:
          en: Normal
          fr: Normal
          es: Normal
        description:
          en: Z-score >= -2 standard deviations from the WHO reference median.
          fr: Score z supérieur ou égal à -2 écarts-types par rapport à la médiane de référence de l'OMS.
          es: Puntaje z mayor o igual a -2 desviaciones estándar respecto a la mediana de referencia de la OMS.
      moderate:
        title:
          en: Moderate
          fr: Modéré
          es: Moderado
        description:
          en: Z-score between -3 and -2 standard deviations from the WHO reference median.
          fr: Score z compris entre -3 et -2 écarts-types par rapport à la médiane de référence de l'OMS.
          es: Puntaje z entre -3 y -2 desviaciones estándar respecto a la mediana de referencia de la OMS.
      severe:
        title:
          en: Severe
          fr: Sévère
          es: Grave
        description:
          en: Z-score < -3 standard deviations from the WHO reference median.
          fr: Score z inférieur à -3 écarts-types par rapport à la médiane de référence de l'OMS.
          es: Puntaje z inferior a -3 desviaciones estándar respecto a la mediana de referencia de la OMS.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-child-growth-standards"], "definition": {"en": "The severity of malnutrition based on z-score classifications from the WHO Child Growth Standards, used for stunting (height-for-age), underweight (weight-for-age), and wasting (weight-for-height) assessments.", "es": "La gravedad de la desnutrici\u00f3n seg\u00fan las clasificaciones por puntaje z de los est\u00e1ndares de crecimiento infantil de la OMS, utilizada para el retraso del crecimiento (talla-para-la-edad), la insuficiencia ponderal (peso-para-la-edad) y la emaciaci\u00f3n (peso-para-la-talla).", "fr": "La s\u00e9v\u00e9rit\u00e9 de la malnutrition selon les classifications par score z des normes de croissance de l''enfant de l''OMS, utilis\u00e9e pour le retard de croissance (taille-pour-\u00e2ge), l''insuffisance pond\u00e9rale (poids-pour-\u00e2ge) et l''\u00e9maciation (poids-pour-taille)."}, "id": "malnutrition-severity", "label": {"en": "Malnutrition Severity", "es": "Gravedad de la desnutrici\u00f3n", "fr": "S\u00e9v\u00e9rit\u00e9 de la malnutrition"}, "maturity": "draft", "standard": {"name": "WHO Child Growth Standards (2006)", "notes": "Based on the WHO Multicentre Growth Reference Study. Z-score thresholds: moderate = between -3 and -2 SD, severe = below -3 SD.", "uri": "https://www.who.int/tools/child-growth-standards"}, "values": [{"code": "normal", "definition": {"en": "Z-score >= -2 standard deviations from the WHO reference median.", "es": "Puntaje z mayor o igual a -2 desviaciones est\u00e1ndar respecto a la mediana de referencia de la OMS.", "fr": "Score z sup\u00e9rieur ou \u00e9gal \u00e0 -2 \u00e9carts-types par rapport \u00e0 la m\u00e9diane de r\u00e9f\u00e9rence de l''OMS."}, "label": {"en": "Normal", "es": "Normal", "fr": "Normal"}}, {"code": "moderate", "definition": {"en": "Z-score between -3 and -2 standard deviations from the WHO reference median.", "es": "Puntaje z entre -3 y -2 desviaciones est\u00e1ndar respecto a la mediana de referencia de la OMS.", "fr": "Score z compris entre -3 et -2 \u00e9carts-types par rapport \u00e0 la m\u00e9diane de r\u00e9f\u00e9rence de l''OMS."}, "label": {"en": "Moderate", "es": "Moderado", "fr": "Mod\u00e9r\u00e9"}}, {"code": "severe", "definition": {"en": "Z-score < -3 standard deviations from the WHO reference median.", "es": "Puntaje z inferior a -3 desviaciones est\u00e1ndar respecto a la mediana de referencia de la OMS.", "fr": "Score z inf\u00e9rieur \u00e0 -3 \u00e9carts-types par rapport \u00e0 la m\u00e9diane de r\u00e9f\u00e9rence de l''OMS."}, "label": {"en": "Severe", "es": "Grave", "fr": "S\u00e9v\u00e8re"}}]}'
      bibliography_refs: who-child-growth-standards
  MarketAccessibilityLevel:
    title:
      en: Market Accessibility Level
      fr: Niveau d'accessibilité du marché
      es: Nivel de accesibilidad del mercado
    description:
      en: The degree to which the target population can physically reach the market at the time of the monitoring visit, as assessed by the enumerator from direct experience and key vendor informant input on catchment-area access. A six-level scale from fully accessible to not accessible, aligned with JMMI Lebanon market access variable, ICRC RAM 2014, and Sphere 2018 food security chapter (access to food in markets).
      fr: Le degré auquel la population cible peut physiquement atteindre le marché au moment de la visite de suivi, tel qu'évalué par l'enquêteur à partir de son expérience directe et des informations des informateurs clés vendeurs sur l'accès à la zone de chalandise. Échelle à six niveaux allant de pleinement accessible à non accessible, alignée sur la variable d'accès au marché JMMI Liban, l'ICRC RAM 2014 et le chapitre de sécurité alimentaire du Manuel Sphere 2018.
      es: El grado en que la población objetivo puede llegar físicamente al mercado en el momento de la visita de monitoreo, según la evaluación del enumerador a partir de su experiencia directa y la información de informantes clave vendedores sobre el acceso a la zona de captación. Escala de seis niveles desde completamente accesible hasta no accesible, alineada con la variable de acceso al mercado JMMI Líbano, ICRC RAM 2014 y el capítulo de seguridad alimentaria del Manual Sphere 2018.
    enum_uri: aidops:MarketAccessibilityLevel
    permissible_values:
      fully_accessible:
        title:
          en: Fully accessible
          fr: Pleinement accessible
          es: Completamente accesible
        description:
          en: Market is reachable by most of the target population by any normal means of transport without restriction, unusual cost, or safety risk.
          fr: Le marché est accessible à la plupart de la population cible par tout moyen de transport normal sans restriction, coût inhabituel ou risque pour la sécurité.
          es: El mercado es accesible para la mayor parte de la población objetivo por cualquier medio de transporte normal sin restricción, costo inusual o riesgo de seguridad.
      accessible_with_difficulty:
        title:
          en: Accessible with difficulty
          fr: Accessible avec difficulté
          es: Accesible con dificultad
        description:
          en: Market is reachable but road conditions, checkpoints, flooding, transport cost increases, or security concerns significantly increase travel time or cost compared to pre-crisis. Access is possible but constrained.
          fr: Le marché est accessible mais les conditions routières, les points de contrôle, les inondations, les augmentations des coûts de transport ou les préoccupations sécuritaires augmentent significativement le temps de trajet ou le coût par rapport à la période d'avant-crise. L'accès est possible mais contraint.
          es: El mercado es accesible pero las condiciones viales, los puntos de control, las inundaciones, los aumentos en los costos de transporte o las preocupaciones de seguridad aumentan significativamente el tiempo de viaje o el costo en comparación con antes de la crisis. El acceso es posible pero restringido.
      seasonal_access_only:
        title:
          en: Seasonal access only
          fr: Accès saisonnier uniquement
          es: Acceso solo estacional
        description:
          en: Market is accessible only during a specific season (typically dry season when unpaved roads are passable). The market is currently in a seasonally restricted period.
          fr: Le marché n'est accessible qu'à une saison spécifique (généralement la saison sèche quand les routes non goudronnées sont praticables). Le marché se trouve actuellement dans une période de restriction saisonnière.
          es: El mercado es accesible solo durante una estación específica (generalmente la estación seca cuando los caminos sin pavimentar son transitables). El mercado se encuentra actualmente en un período de restricción estacional.
      restricted_access:
        title:
          en: Restricted access
          fr: Accès restreint
          es: Acceso restringido
        description:
          en: Access is administratively restricted, controlled by a non-state armed actor, or limited to specific population groups (e.g., residents only, specific documentation required). Part of the normal catchment population is excluded.
          fr: L'accès est administrativement restreint, contrôlé par un acteur armé non étatique, ou limité à des groupes de population spécifiques (par ex. résidents uniquement, documentation spécifique requise). Une partie de la population de la zone de chalandise habituelle est exclue.
          es: El acceso está administrativamente restringido, controlado por un actor armado no estatal, o limitado a grupos específicos de población (p. ej., solo residentes, documentación específica requerida). Parte de la población de captación normal está excluida.
      not_accessible:
        title:
          en: Not accessible
          fr: Non accessible
          es: No accesible
        description:
          en: Market is not reachable for the assessed population at the time of this visit due to conflict, flooding, collapsed infrastructure, or administrative closure.
          fr: Le marché n'est pas accessible pour la population évaluée au moment de cette visite en raison d'un conflit, d'inondations, d'une infrastructure effondrée ou d'une fermeture administrative.
          es: El mercado no es accesible para la población evaluada en el momento de esta visita debido a conflicto, inundaciones, infraestructura colapsada o cierre administrativo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Accessibility status cannot be assessed from available information.
          fr: Le statut d'accessibilité ne peut pas être évalué à partir des informations disponibles.
          es: El estado de accesibilidad no puede evaluarse a partir de la información disponible.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-market-assessment-2014", "calp-misma-2018", "icrc-ram-2014", "reach-jmmi"], "definition": {"en": "The degree to which the target population can physically reach the market at the time of the monitoring visit, as assessed by the enumerator from direct experience and key vendor informant input on catchment-area access. A six-level scale from fully accessible to not accessible, aligned with JMMI Lebanon market access variable, ICRC RAM 2014, and Sphere 2018 food security chapter (access to food in markets).\n", "es": "El grado en que la poblaci\u00f3n objetivo puede llegar f\u00edsicamente al mercado en el momento de la visita de monitoreo, seg\u00fan la evaluaci\u00f3n del enumerador a partir de su experiencia directa y la informaci\u00f3n de informantes clave vendedores sobre el acceso a la zona de captaci\u00f3n. Escala de seis niveles desde completamente accesible hasta no accesible, alineada con la variable de acceso al mercado JMMI L\u00edbano, ICRC RAM 2014 y el cap\u00edtulo de seguridad alimentaria del Manual Sphere 2018.\n", "fr": "Le degr\u00e9 auquel la population cible peut physiquement atteindre le march\u00e9 au moment de la visite de suivi, tel qu''\u00e9valu\u00e9 par l''enqu\u00eateur \u00e0 partir de son exp\u00e9rience directe et des informations des informateurs cl\u00e9s vendeurs sur l''acc\u00e8s \u00e0 la zone de chalandise. \u00c9chelle \u00e0 six niveaux allant de pleinement accessible \u00e0 non accessible, align\u00e9e sur la variable d''acc\u00e8s au march\u00e9 JMMI Liban, l''ICRC RAM 2014 et le chapitre de s\u00e9curit\u00e9 alimentaire du Manuel Sphere 2018.\n"}, "id": "market-accessibility-level", "label": {"en": "Market Accessibility Level", "es": "Nivel de accesibilidad del mercado", "fr": "Niveau d''accessibilit\u00e9 du march\u00e9"}, "maturity": "draft", "values": [{"code": "fully_accessible", "definition": {"en": "Market is reachable by most of the target population by any normal means of transport without restriction, unusual cost, or safety risk.", "es": "El mercado es accesible para la mayor parte de la poblaci\u00f3n objetivo por cualquier medio de transporte normal sin restricci\u00f3n, costo inusual o riesgo de seguridad.", "fr": "Le march\u00e9 est accessible \u00e0 la plupart de la population cible par tout moyen de transport normal sans restriction, co\u00fbt inhabituel ou risque pour la s\u00e9curit\u00e9."}, "label": {"en": "Fully accessible", "es": "Completamente accesible", "fr": "Pleinement accessible"}}, {"code": "accessible_with_difficulty", "definition": {"en": "Market is reachable but road conditions, checkpoints, flooding, transport cost increases, or security concerns significantly increase travel time or cost compared to pre-crisis. Access is possible but constrained.", "es": "El mercado es accesible pero las condiciones viales, los puntos de control, las inundaciones, los aumentos en los costos de transporte o las preocupaciones de seguridad aumentan significativamente el tiempo de viaje o el costo en comparaci\u00f3n con antes de la crisis. El acceso es posible pero restringido.", "fr": "Le march\u00e9 est accessible mais les conditions routi\u00e8res, les points de contr\u00f4le, les inondations, les augmentations des co\u00fbts de transport ou les pr\u00e9occupations s\u00e9curitaires augmentent significativement le temps de trajet ou le co\u00fbt par rapport \u00e0 la p\u00e9riode d''avant-crise. L''acc\u00e8s est possible mais contraint."}, "label": {"en": "Accessible with difficulty", "es": "Accesible con dificultad", "fr": "Accessible avec difficult\u00e9"}}, {"code": "seasonal_access_only", "definition": {"en": "Market is accessible only during a specific season (typically dry season when unpaved roads are passable). The market is currently in a seasonally restricted period.", "es": "El mercado es accesible solo durante una estaci\u00f3n espec\u00edfica (generalmente la estaci\u00f3n seca cuando los caminos sin pavimentar son transitables). El mercado se encuentra actualmente en un per\u00edodo de restricci\u00f3n estacional.", "fr": "Le march\u00e9 n''est accessible qu''\u00e0 une saison sp\u00e9cifique (g\u00e9n\u00e9ralement la saison s\u00e8che quand les routes non goudronn\u00e9es sont praticables). Le march\u00e9 se trouve actuellement dans une p\u00e9riode de restriction saisonni\u00e8re."}, "label": {"en": "Seasonal access only", "es": "Acceso solo estacional", "fr": "Acc\u00e8s saisonnier uniquement"}}, {"code": "restricted_access", "definition": {"en": "Access is administratively restricted, controlled by a non-state armed actor, or limited to specific population groups (e.g., residents only, specific documentation required). Part of the normal catchment population is excluded.", "es": "El acceso est\u00e1 administrativamente restringido, controlado por un actor armado no estatal, o limitado a grupos espec\u00edficos de poblaci\u00f3n (p. ej., solo residentes, documentaci\u00f3n espec\u00edfica requerida). Parte de la poblaci\u00f3n de captaci\u00f3n normal est\u00e1 excluida.", "fr": "L''acc\u00e8s est administrativement restreint, contr\u00f4l\u00e9 par un acteur arm\u00e9 non \u00e9tatique, ou limit\u00e9 \u00e0 des groupes de population sp\u00e9cifiques (par ex. r\u00e9sidents uniquement, documentation sp\u00e9cifique requise). Une partie de la population de la zone de chalandise habituelle est exclue."}, "label": {"en": "Restricted access", "es": "Acceso restringido", "fr": "Acc\u00e8s restreint"}}, {"code": "not_accessible", "definition": {"en": "Market is not reachable for the assessed population at the time of this visit due to conflict, flooding, collapsed infrastructure, or administrative closure.", "es": "El mercado no es accesible para la poblaci\u00f3n evaluada en el momento de esta visita debido a conflicto, inundaciones, infraestructura colapsada o cierre administrativo.", "fr": "Le march\u00e9 n''est pas accessible pour la population \u00e9valu\u00e9e au moment de cette visite en raison d''un conflit, d''inondations, d''une infrastructure effondr\u00e9e ou d''une fermeture administrative."}, "label": {"en": "Not accessible", "es": "No accesible", "fr": "Non accessible"}}, {"code": "dont_know", "definition": {"en": "Accessibility status cannot be assessed from available information.", "es": "El estado de accesibilidad no puede evaluarse a partir de la informaci\u00f3n disponible.", "fr": "Le statut d''accessibilit\u00e9 ne peut pas \u00eatre \u00e9valu\u00e9 \u00e0 partir des informations disponibles."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
