s dos semanas. Valor de puntuaci\u00f3n WHO-5: 0.", "fr": "Le sentiment ou l''exp\u00e9rience n''a \u00e9t\u00e9 pr\u00e9sent \u00e0 aucun moment au cours des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 0."}, "label": {"en": "At no time", "es": "En ning\u00fan momento", "fr": "\u00c0 aucun moment"}}, {"code": "some_of_the_time", "definition": {"en": "The feeling or experience was present some of the time during the last two weeks. WHO-5 scoring value: 1.", "es": "El sentimiento o experiencia estuvo presente parte del tiempo durante las \u00faltimas dos semanas. Valor de puntuaci\u00f3n WHO-5: 1.", "fr": "Le sentiment ou l''exp\u00e9rience a \u00e9t\u00e9 pr\u00e9sent une partie du temps au cours des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 1."}, "label": {"en": "Some of the time", "es": "Parte del tiempo", "fr": "Une partie du temps"}}, {"code": "less_than_half_the_time", "definition": {"en": "The feeling or experience was present less than half of the last two weeks. WHO-5 scoring value: 2.", "es": "El sentimiento o experiencia estuvo presente menos de la mitad de las \u00faltimas dos semanas. Valor de puntuaci\u00f3n WHO-5: 2.", "fr": "Le sentiment ou l''exp\u00e9rience a \u00e9t\u00e9 pr\u00e9sent moins de la moiti\u00e9 des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 2."}, "label": {"en": "Less than half of the time", "es": "Menos de la mitad del tiempo", "fr": "Moins de la moiti\u00e9 du temps"}}, {"code": "more_than_half_the_time", "definition": {"en": "The feeling or experience was present more than half of the last two weeks. WHO-5 scoring value: 3.", "es": "El sentimiento o experiencia estuvo presente m\u00e1s de la mitad de las \u00faltimas dos semanas. Valor de puntuaci\u00f3n WHO-5: 3.", "fr": "Le sentiment ou l''exp\u00e9rience a \u00e9t\u00e9 pr\u00e9sent plus de la moiti\u00e9 des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 3."}, "label": {"en": "More than half of the time", "es": "M\u00e1s de la mitad del tiempo", "fr": "Plus de la moiti\u00e9 du temps"}}, {"code": "most_of_the_time", "definition": {"en": "The feeling or experience was present most of the last two weeks. WHO-5 scoring value: 4.", "es": "El sentimiento o experiencia estuvo presente la mayor parte de las \u00faltimas dos semanas. Valor de puntuaci\u00f3n WHO-5: 4.", "fr": "Le sentiment ou l''exp\u00e9rience a \u00e9t\u00e9 pr\u00e9sent la plupart des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 4."}, "label": {"en": "Most of the time", "es": "La mayor parte del tiempo", "fr": "La plupart du temps"}}, {"code": "all_of_the_time", "definition": {"en": "The feeling or experience was present throughout the last two weeks. WHO-5 scoring value: 5.", "es": "El sentimiento o experiencia estuvo presente durante toda las \u00faltimas dos semanas. Valor de puntuaci\u00f3n WHO-5: 5.", "fr": "Le sentiment ou l''exp\u00e9rience a \u00e9t\u00e9 pr\u00e9sent tout au long des deux derni\u00e8res semaines. Valeur de notation WHO-5 : 5."}, "label": {"en": "All of the time", "es": "Todo el tiempo", "fr": "Tout le temps"}}]}'
