  PostHarvestStorageType:
    title:
      en: Post-Harvest Storage Type
      fr: Type de stockage post-récolte
      es: Tipo de almacenamiento poscosecha
    description:
      en: Main type of storage used by the household for its harvested crops. Distinguishes traditional granaries, hermetic bags (PICS and similar), metal silos, improved store rooms, shared warehouses, cooperative storage, and other. The hermetic and metal-silo categories are specifically included because they are commonly distributed through humanitarian post-harvest programmes and reduce losses dramatically compared with traditional granaries. Based on FAO post-harvest loss guidelines and LSMS-ISA post-harvest module.
      fr: Principal type de stockage utilisé par le ménage pour ses récoltes. Distingue les greniers traditionnels, les sacs hermétiques (PICS et similaires), les silos métalliques, les magasins améliorés, les entrepôts partagés, le stockage coopératif et autres. Les catégories hermétique et silo métallique sont spécifiquement incluses car elles sont couramment distribuées par les programmes humanitaires post-récolte et réduisent considérablement les pertes par rapport aux greniers traditionnels. Basé sur les lignes directrices de la FAO sur les pertes post-récolte et le module post-récolte du LSMS-ISA.
      es: Tipo principal de almacenamiento utilizado por el hogar para sus cosechas. Distingue graneros tradicionales, bolsas herméticas (PICS y similares), silos metálicos, cuartos de almacenamiento mejorados, bodegas compartidas, almacenamiento cooperativo y otros. Las categorías herméticas y de silo metálico se incluyen específicamente porque son comúnmente distribuidas a través de programas humanitarios poscosecha y reducen las pérdidas drásticamente en comparación con los graneros tradicionales. Basado en las directrices FAO sobre pérdidas poscosecha y el módulo poscosecha de LSMS-ISA.
    enum_uri: aidops:PostHarvestStorageType
    permissible_values:
      traditional_granary:
        title:
          en: Traditional granary or storage hut
          fr: Grenier traditionnel ou hutte de stockage
          es: Granero tradicional o choza de almacenamiento
        description:
          en: Locally constructed grain store, typically of mud, thatch, or wood.
          fr: Grenier construit localement, généralement en terre, chaume ou bois.
          es: Granero construido localmente, típicamente de barro, paja o madera.
      hermetic_storage_bag:
        title:
          en: Hermetic storage bag (e.g., PICS bag, super grain bag)
          fr: Sac de stockage hermétique (ex. sac PICS, super grain bag)
          es: Bolsa de almacenamiento hermética (p. ej., bolsa PICS, super grain bag)
        description:
          en: Sealed multi-layer bag designed to prevent oxygen penetration and reduce pest damage during storage.
          fr: Sac multicouche hermétique conçu pour empêcher la pénétration d'oxygène et réduire les dégâts des ravageurs pendant le stockage.
          es: Bolsa hermética multicapa diseñada para prevenir la penetración de oxígeno y reducir el daño por plagas durante el almacenamiento.
      metal_silo:
        title:
          en: Metal silo
          fr: Silo métallique
          es: Silo metálico
        description:
          en: Metal storage container, often distributed through agricultural programmes, providing good hermetic protection.
          fr: Conteneur de stockage métallique, souvent distribué par des programmes agricoles, offrant une bonne protection hermétique.
          es: Contenedor metálico de almacenamiento, a menudo distribuido a través de programas agrícolas, que brinda buena protección hermética.
      improved_store_room:
        title:
          en: Improved store room or lockable indoor store
          fr: Magasin amélioré ou entrepôt intérieur verrouillable
          es: Cuarto de almacenamiento mejorado o bodega interior con llave
        description:
          en: A dedicated, lockable room in the household's dwelling used for grain storage, typically with some pest control.
          fr: Une pièce dédiée et verrouillable dans le logement du ménage utilisée pour le stockage des céréales, généralement avec une certaine lutte antiparasitaire.
          es: Una habitación dedicada y con llave en la vivienda del hogar utilizada para almacenamiento de granos, típicamente con algún control de plagas.
      shared_warehouse:
        title:
          en: Shared community or rented warehouse
          fr: Entrepôt communautaire partagé ou loué
          es: Almacén comunitario compartido o arrendado
        description:
          en: Storage in a warehouse shared among multiple households or rented from a commercial facility.
          fr: Stockage dans un entrepôt partagé entre plusieurs ménages ou loué à une installation commerciale.
          es: Almacenamiento en una bodega compartida entre varios hogares o arrendada de una instalación comercial.
      cooperative_store:
        title:
          en: Cooperative or farmer group storage
          fr: Stockage en coopérative ou groupe d'agriculteurs
          es: Almacenamiento en cooperativa o grupo de agricultores
        description:
          en: Storage managed by and accessible through a farmer cooperative or producer organisation.
          fr: Stockage géré par et accessible via une coopérative d'agriculteurs ou une organisation de producteurs.
          es: Almacenamiento gestionado por y accesible a través de una cooperativa de agricultores u organización de productores.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Storage type not covered by the other categories.
          fr: Type de stockage non couvert par les autres catégories.
          es: Tipo de almacenamiento no cubierto por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-phl-guidelines"], "definition": {"en": "Main type of storage used by the household for its harvested crops. Distinguishes traditional granaries, hermetic bags (PICS and similar), metal silos, improved store rooms, shared warehouses, cooperative storage, and other. The hermetic and metal-silo categories are specifically included because they are commonly distributed through humanitarian post-harvest programmes and reduce losses dramatically compared with traditional granaries. Based on FAO post-harvest loss guidelines and LSMS-ISA post-harvest module.", "es": "Tipo principal de almacenamiento utilizado por el hogar para sus cosechas. Distingue graneros tradicionales, bolsas herm\u00e9ticas (PICS y similares), silos met\u00e1licos, cuartos de almacenamiento mejorados, bodegas compartidas, almacenamiento cooperativo y otros. Las categor\u00edas herm\u00e9ticas y de silo met\u00e1lico se incluyen espec\u00edficamente porque son com\u00fanmente distribuidas a trav\u00e9s de programas humanitarios poscosecha y reducen las p\u00e9rdidas dr\u00e1sticamente en comparaci\u00f3n con los graneros tradicionales. Basado en las directrices FAO sobre p\u00e9rdidas poscosecha y el m\u00f3dulo poscosecha de LSMS-ISA.", "fr": "Principal type de stockage utilis\u00e9 par le m\u00e9nage pour ses r\u00e9coltes. Distingue les greniers traditionnels, les sacs herm\u00e9tiques (PICS et similaires), les silos m\u00e9talliques, les magasins am\u00e9lior\u00e9s, les entrep\u00f4ts partag\u00e9s, le stockage coop\u00e9ratif et autres. Les cat\u00e9gories herm\u00e9tique et silo m\u00e9tallique sont sp\u00e9cifiquement incluses car elles sont couramment distribu\u00e9es par les programmes humanitaires post-r\u00e9colte et r\u00e9duisent consid\u00e9rablement les pertes par rapport aux greniers traditionnels. Bas\u00e9 sur les lignes directrices de la FAO sur les pertes post-r\u00e9colte et le module post-r\u00e9colte du LSMS-ISA."}, "id": "post-harvest-storage-type", "label": {"en": "Post-Harvest Storage Type", "es": "Tipo de almacenamiento poscosecha", "fr": "Type de stockage post-r\u00e9colte"}, "maturity": "draft", "standard": {"name": "FAO post-harvest loss guidelines / LSMS-ISA post-harvest module", "notes": "The storage-type categories follow FAO PHL guidelines and are used in LSMS-ISA country surveys. Hermetic bags (PICS) and metal silos are called out separately because their adoption directly reduces post-harvest losses.", "uri": "https://openknowledge.fao.org/server/api/core/bitstreams/bd596c08-1202-4745-b23d-07bb5dc84b06/content"}, "values": [{"code": "traditional_granary", "definition": {"en": "Locally constructed grain store, typically of mud, thatch, or wood.", "es": "Granero construido localmente, t\u00edpicamente de barro, paja o madera.", "fr": "Grenier construit localement, g\u00e9n\u00e9ralement en terre, chaume ou bois."}, "label": {"en": "Traditional granary or storage hut", "es": "Granero tradicional o choza de almacenamiento", "fr": "Grenier traditionnel ou hutte de stockage"}}, {"code": "hermetic_storage_bag", "definition": {"en": "Sealed multi-layer bag designed to prevent oxygen penetration and reduce pest damage during storage.", "es": "Bolsa herm\u00e9tica multicapa dise\u00f1ada para prevenir la penetraci\u00f3n de ox\u00edgeno y reducir el da\u00f1o por plagas durante el almacenamiento.", "fr": "Sac multicouche herm\u00e9tique con\u00e7u pour emp\u00eacher la p\u00e9n\u00e9tration d''oxyg\u00e8ne et r\u00e9duire les d\u00e9g\u00e2ts des ravageurs pendant le stockage."}, "label": {"en": "Hermetic storage bag (e.g., PICS bag, super grain bag)", "es": "Bolsa de almacenamiento herm\u00e9tica (p. ej., bolsa PICS, super grain bag)", "fr": "Sac de stockage herm\u00e9tique (ex. sac PICS, super grain bag)"}}, {"code": "metal_silo", "definition": {"en": "Metal storage container, often distributed through agricultural programmes, providing good hermetic protection.", "es": "Contenedor met\u00e1lico de almacenamiento, a menudo distribuido a trav\u00e9s de programas agr\u00edcolas, que brinda buena protecci\u00f3n herm\u00e9tica.", "fr": "Conteneur de stockage m\u00e9tallique, souvent distribu\u00e9 par des programmes agricoles, offrant une bonne protection herm\u00e9tique."}, "label": {"en": "Metal silo", "es": "Silo met\u00e1lico", "fr": "Silo m\u00e9tallique"}}, {"code": "improved_store_room", "definition": {"en": "A dedicated, lockable room in the household''s dwelling used for grain storage, typically with some pest control.", "es": "Una habitaci\u00f3n dedicada y con llave en la vivienda del hogar utilizada para almacenamiento de granos, t\u00edpicamente con alg\u00fan control de plagas.", "fr": "Une pi\u00e8ce d\u00e9di\u00e9e et verrouillable dans le logement du m\u00e9nage utilis\u00e9e pour le stockage des c\u00e9r\u00e9ales, g\u00e9n\u00e9ralement avec une certaine lutte antiparasitaire."}, "label": {"en": "Improved store room or lockable indoor store", "es": "Cuarto de almacenamiento mejorado o bodega interior con llave", "fr": "Magasin am\u00e9lior\u00e9 ou entrep\u00f4t int\u00e9rieur verrouillable"}}, {"code": "shared_warehouse", "definition": {"en": "Storage in a warehouse shared among multiple households or rented from a commercial facility.", "es": "Almacenamiento en una bodega compartida entre varios hogares o arrendada de una instalaci\u00f3n comercial.", "fr": "Stockage dans un entrep\u00f4t partag\u00e9 entre plusieurs m\u00e9nages ou lou\u00e9 \u00e0 une installation commerciale."}, "label": {"en": "Shared community or rented warehouse", "es": "Almac\u00e9n comunitario compartido o arrendado", "fr": "Entrep\u00f4t communautaire partag\u00e9 ou lou\u00e9"}}, {"code": "cooperative_store", "definition": {"en": "Storage managed by and accessible through a farmer cooperative or producer organisation.", "es": "Almacenamiento gestionado por y accesible a trav\u00e9s de una cooperativa de agricultores u organizaci\u00f3n de productores.", "fr": "Stockage g\u00e9r\u00e9 par et accessible via une coop\u00e9rative d''agriculteurs ou une organisation de producteurs."}, "label": {"en": "Cooperative or farmer group storage", "es": "Almacenamiento en cooperativa o grupo de agricultores", "fr": "Stockage en coop\u00e9rative ou groupe d''agriculteurs"}}, {"code": "other", "definition": {"en": "Storage type not covered by the other categories.", "es": "Tipo de almacenamiento no cubierto por las otras categor\u00edas.", "fr": "Type de stockage non couvert par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
