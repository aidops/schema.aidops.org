  MovementRestrictionImpact:
    title:
      en: Movement restriction impact
      fr: Impact des restrictions aux déplacements
      es: Impacto de las restricciones de movimiento
    description:
      en: Domains of access or activity blocked because of freedom-of-movement restrictions. Multi-sectoral impact measure that feeds joint HNO severity analysis by linking protection restrictions to food, health, education, and livelihood deprivation. Based on GPC PAF Domain 1 multi-sectoral impact analysis; REACH Syria and Yemen (2022); JIAF 2.0 multi-sectoral analysis framework.
      fr: Domaines d'accès ou d'activité bloqués en raison des restrictions à la liberté de mouvement. Mesure d'impact multisectoriel qui alimente l'analyse de sévérité HNO conjointe en reliant les restrictions de protection à la privation alimentaire, sanitaire, éducative et de moyens de subsistance. Fondé sur l'analyse d'impact multisectoriel du GPC PAF Domaine 1 ; REACH Syrie et Yémen (2022) ; cadre d'analyse multisectorielle JIAF 2.0.
      es: Dominios de acceso o actividad bloqueados por restricciones de libertad de movimiento. Medida de impacto multisectorial que alimenta el análisis de severidad conjunto del HNO vinculando las restricciones de protección con la privación de alimentos, salud, educación y medios de vida. Basado en el análisis de impacto multisectorial del GPC PAF Dominio 1; REACH Siria y Yemen (2022); marco de análisis multisectorial del JIAF 2.0.
    enum_uri: aidops:MovementRestrictionImpact
    permissible_values:
      health_services:
        title:
          en: Health services
          fr: Services de santé
          es: Servicios de salud
        description:
          en: Unable to reach health facilities, clinics, or pharmacies.
          fr: Incapable d'atteindre des établissements de santé, des cliniques ou des pharmacies.
          es: Imposibilitado de llegar a establecimientos de salud, clínicas o farmacias.
      food_markets:
        title:
          en: Food markets or food distributions
          fr: Marchés alimentaires ou distributions alimentaires
          es: Mercados de alimentos o distribuciones de alimentos
        description:
          en: Unable to reach food markets, shops, or food distribution points.
          fr: Incapable d'atteindre des marchés alimentaires, des boutiques ou des points de distribution alimentaire.
          es: Imposibilitado de llegar a mercados de alimentos, tiendas o puntos de distribución de alimentos.
      education:
        title:
          en: Education (school)
          fr: Éducation (école)
          es: Educación (escuela)
        description:
          en: Children unable to reach school or education facilities.
          fr: Enfants incapables d'atteindre l'école ou les établissements d'enseignement.
          es: Niños imposibilitados de llegar a la escuela o establecimientos educativos.
      work_livelihoods:
        title:
          en: Work or livelihoods
          fr: Travail ou moyens de subsistance
          es: Trabajo o medios de vida
        description:
          en: Unable to reach workplace, farm, or income-generating activities.
          fr: Incapable d'atteindre le lieu de travail, la ferme ou les activités génératrices de revenus.
          es: Imposibilitado de llegar al lugar de trabajo, granja o actividades generadoras de ingresos.
      family_social_networks:
        title:
          en: Family or social support networks
          fr: Réseaux familiaux ou de soutien social
          es: Redes familiares o de apoyo social
        description:
          en: Unable to visit or receive support from family or community members.
          fr: Incapable de rendre visite à la famille ou aux membres de la communauté ou d'en recevoir du soutien.
          es: Imposibilitado de visitar o recibir apoyo de familiares o miembros de la comunidad.
      legal_admin_services:
        title:
          en: Legal or administrative services
          fr: Services juridiques ou administratifs
          es: Servicios jurídicos o administrativos
        description:
          en: Unable to reach courts, government offices, or civil registration services.
          fr: Incapable d'atteindre les tribunaux, les bureaux gouvernementaux ou les services d'état civil.
          es: Imposibilitado de llegar a tribunales, oficinas gubernamentales o servicios de registro civil.
      agricultural_land:
        title:
          en: Agricultural land or natural resources
          fr: Terres agricoles ou ressources naturelles
          es: Tierras agrícolas o recursos naturales
        description:
          en: Unable to access fields, pasture, water sources, or other natural resources.
          fr: Incapable d'accéder aux champs, aux pâturages, aux sources d'eau ou à d'autres ressources naturelles.
          es: Imposibilitado de acceder a campos, pastos, fuentes de agua u otros recursos naturales.
      place_of_worship:
        title:
          en: Place of worship
          fr: Lieu de culte
          es: Lugar de culto
        description:
          en: Unable to reach mosque, church, temple, or other religious site.
          fr: Incapable d'atteindre une mosquée, une église, un temple ou un autre site religieux.
          es: Imposibilitado de llegar a mezquita, iglesia, templo u otro sitio religioso.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Impact not covered by the above categories.
          fr: Impact non couvert par les catégories ci-dessus.
          es: Impacto no cubierto por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "reach-protection-monitoring-2022"], "definition": {"en": "Domains of access or activity blocked because of freedom-of-movement restrictions. Multi-sectoral impact measure that feeds joint HNO severity analysis by linking protection restrictions to food, health, education, and livelihood deprivation. Based on GPC PAF Domain 1 multi-sectoral impact analysis; REACH Syria and Yemen (2022); JIAF 2.0 multi-sectoral analysis framework.", "es": "Dominios de acceso o actividad bloqueados por restricciones de libertad de movimiento. Medida de impacto multisectorial que alimenta el an\u00e1lisis de severidad conjunto del HNO vinculando las restricciones de protecci\u00f3n con la privaci\u00f3n de alimentos, salud, educaci\u00f3n y medios de vida. Basado en el an\u00e1lisis de impacto multisectorial del GPC PAF Dominio 1; REACH Siria y Yemen (2022); marco de an\u00e1lisis multisectorial del JIAF 2.0.", "fr": "Domaines d''acc\u00e8s ou d''activit\u00e9 bloqu\u00e9s en raison des restrictions \u00e0 la libert\u00e9 de mouvement. Mesure d''impact multisectoriel qui alimente l''analyse de s\u00e9v\u00e9rit\u00e9 HNO conjointe en reliant les restrictions de protection \u00e0 la privation alimentaire, sanitaire, \u00e9ducative et de moyens de subsistance. Fond\u00e9 sur l''analyse d''impact multisectoriel du GPC PAF Domaine 1 ; REACH Syrie et Y\u00e9men (2022) ; cadre d''analyse multisectorielle JIAF 2.0."}, "id": "movement-restriction-impact", "label": {"en": "Movement restriction impact", "es": "Impacto de las restricciones de movimiento", "fr": "Impact des restrictions aux d\u00e9placements"}, "maturity": "draft", "values": [{"code": "health_services", "definition": {"en": "Unable to reach health facilities, clinics, or pharmacies.", "es": "Imposibilitado de llegar a establecimientos de salud, cl\u00ednicas o farmacias.", "fr": "Incapable d''atteindre des \u00e9tablissements de sant\u00e9, des cliniques ou des pharmacies."}, "label": {"en": "Health services", "es": "Servicios de salud", "fr": "Services de sant\u00e9"}}, {"code": "food_markets", "definition": {"en": "Unable to reach food markets, shops, or food distribution points.", "es": "Imposibilitado de llegar a mercados de alimentos, tiendas o puntos de distribuci\u00f3n de alimentos.", "fr": "Incapable d''atteindre des march\u00e9s alimentaires, des boutiques ou des points de distribution alimentaire."}, "label": {"en": "Food markets or food distributions", "es": "Mercados de alimentos o distribuciones de alimentos", "fr": "March\u00e9s alimentaires ou distributions alimentaires"}}, {"code": "education", "definition": {"en": "Children unable to reach school or education facilities.", "es": "Ni\u00f1os imposibilitados de llegar a la escuela o establecimientos educativos.", "fr": "Enfants incapables d''atteindre l''\u00e9cole ou les \u00e9tablissements d''enseignement."}, "label": {"en": "Education (school)", "es": "Educaci\u00f3n (escuela)", "fr": "\u00c9ducation (\u00e9cole)"}}, {"code": "work_livelihoods", "definition": {"en": "Unable to reach workplace, farm, or income-generating activities.", "es": "Imposibilitado de llegar al lugar de trabajo, granja o actividades generadoras de ingresos.", "fr": "Incapable d''atteindre le lieu de travail, la ferme ou les activit\u00e9s g\u00e9n\u00e9ratrices de revenus."}, "label": {"en": "Work or livelihoods", "es": "Trabajo o medios de vida", "fr": "Travail ou moyens de subsistance"}}, {"code": "family_social_networks", "definition": {"en": "Unable to visit or receive support from family or community members.", "es": "Imposibilitado de visitar o recibir apoyo de familiares o miembros de la comunidad.", "fr": "Incapable de rendre visite \u00e0 la famille ou aux membres de la communaut\u00e9 ou d''en recevoir du soutien."}, "label": {"en": "Family or social support networks", "es": "Redes familiares o de apoyo social", "fr": "R\u00e9seaux familiaux ou de soutien social"}}, {"code": "legal_admin_services", "definition": {"en": "Unable to reach courts, government offices, or civil registration services.", "es": "Imposibilitado de llegar a tribunales, oficinas gubernamentales o servicios de registro civil.", "fr": "Incapable d''atteindre les tribunaux, les bureaux gouvernementaux ou les services d''\u00e9tat civil."}, "label": {"en": "Legal or administrative services", "es": "Servicios jur\u00eddicos o administrativos", "fr": "Services juridiques ou administratifs"}}, {"code": "agricultural_land", "definition": {"en": "Unable to access fields, pasture, water sources, or other natural resources.", "es": "Imposibilitado de acceder a campos, pastos, fuentes de agua u otros recursos naturales.", "fr": "Incapable d''acc\u00e9der aux champs, aux p\u00e2turages, aux sources d''eau ou \u00e0 d''autres ressources naturelles."}, "label": {"en": "Agricultural land or natural resources", "es": "Tierras agr\u00edcolas o recursos naturales", "fr": "Terres agricoles ou ressources naturelles"}}, {"code": "place_of_worship", "definition": {"en": "Unable to reach mosque, church, temple, or other religious site.", "es": "Imposibilitado de llegar a mezquita, iglesia, templo u otro sitio religioso.", "fr": "Incapable d''atteindre une mosqu\u00e9e, une \u00e9glise, un temple ou un autre site religieux."}, "label": {"en": "Place of worship", "es": "Lugar de culto", "fr": "Lieu de culte"}}, {"code": "other", "definition": {"en": "Impact not covered by the above categories.", "es": "Impacto no cubierto por las categor\u00edas anteriores.", "fr": "Impact non couvert par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
