  MigrationRouteDisruption:
    title:
      en: Migration Route Disruption Cause
      fr: Cause de perturbation de la route de migration
      es: Causa de interrupción de la ruta de migración
    description:
      en: 'Primary cause of disruption to a pastoral household''s seasonal migration route. Used in PastoralFoodSecurityProfile `migration_route_disruption_cause`. Sensitivity: this vocabulary is SENSITIVE. Codes `conflict_armed_group` and `inter_community_conflict` constitute conflict-actor intelligence at fine geographic granularity; aggregate to livelihood-zone level before sharing with any non-humanitarian partner. The vocabulary deliberately does not ask respondents to name specific armed actors — only to categorize the type of cause — to reduce intelligence-collection risk.'
      fr: 'Cause principale de la perturbation de la route de migration saisonnière d''un ménage pastoral. Sensibilité : vocabulaire SENSIBLE. Les codes `conflict_armed_group` et `inter_community_conflict` constituent des renseignements sur les acteurs du conflit ; agréger au niveau de la zone de moyens d''existence avant tout partage.'
      es: 'Causa principal de la interrupción de la ruta de migración estacional de un hogar pastoral. Sensibilidad: vocabulario SENSIBLE. Los códigos `conflict_armed_group` e `inter_community_conflict` constituyen información de actores del conflicto; agregar al nivel de zona de medios de vida antes de compartir.'
    enum_uri: aidops:MigrationRouteDisruption
    permissible_values:
      conflict_armed_group:
        title:
          en: Armed group or armed conflict
          fr: Groupe armé ou conflit armé
          es: Grupo armado o conflicto armado
        description:
          en: 'Route blocked or made unsafe by armed actors including non-state armed groups, militias, or military operations. SENSITIVE: aggregate to livelihood-zone level before sharing.'
          fr: Route bloquée ou rendue dangereuse par des acteurs armés, notamment des groupes armés non étatiques, des milices ou des opérations militaires. SENSIBLE.
          es: Ruta bloqueada o hecha insegura por actores armados incluyendo grupos armados no estatales, milicias u operaciones militares. SENSIBLE.
      inter_community_conflict:
        title:
          en: Inter-community conflict
          fr: Conflit intercommunautaire
          es: Conflicto intercomunal
        description:
          en: 'Farmer-herder conflict, inter-clan dispute, or inter-ethnic conflict blocking traditional pastoral corridors. SENSITIVE: aggregate to livelihood-zone level before sharing.'
          fr: Conflit agriculteurs-éleveurs, dispute inter-clans ou conflit inter-ethnique bloquant les couloirs pastoraux traditionnels. SENSIBLE.
          es: Conflicto agricultores-ganaderos, disputa entre clanes o conflicto interétnico que bloquea corredores pastorales tradicionales. SENSIBLE.
      closed_by_authorities:
        title:
          en: Closed by authorities
          fr: Fermé par les autorités
          es: Cerrado por las autoridades
        description:
          en: Migration route officially or de facto closed by government or administrative order.
          fr: Route de migration officiellement ou de facto fermée par une décision gouvernementale ou administrative.
          es: Ruta de migración cerrada oficial o de facto por orden gubernamental o administrativa.
      agricultural_encroachment:
        title:
          en: Agricultural encroachment on pastoral corridor
          fr: Empiètement agricole sur le couloir pastoral
          es: Expansión agrícola sobre el corredor pastoral
        description:
          en: Cropland expansion into traditional pastoral corridors blocking herd movement.
          fr: Expansion des terres cultivées dans les couloirs pastoraux traditionnels, bloquant le mouvement des troupeaux.
          es: Expansión de tierras de cultivo hacia corredores pastorales tradicionales que bloquean el movimiento del rebaño.
      drought_no_water_pasture:
        title:
          en: Drought — no water or pasture along route
          fr: Sécheresse — pas d'eau ni de pâturage sur la route
          es: Sequía — sin agua ni pastos en la ruta
        description:
          en: Route rendered impassable by absence of water or pasture due to drought, not by human actors.
          fr: Route rendue impraticable par l'absence d'eau ou de pâturage due à la sécheresse, et non par des acteurs humains.
          es: Ruta inaccesible por ausencia de agua o pastos debido a la sequía, no por actores humanos.
      flood_physical_barrier:
        title:
          en: Flood or physical barrier
          fr: Inondation ou obstacle physique
          es: Inundación o barrera física
        description:
          en: Route blocked by floodwater, washed-out tracks, or other physical obstacle not caused by human actors.
          fr: Route bloquée par des inondations, des pistes emportées ou d'autres obstacles physiques non causés par des acteurs humains.
          es: Ruta bloqueada por inundaciones, caminos destruidos u otros obstáculos físicos no causados por actores humanos.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Cause of migration route disruption not listed in the codes above.
          fr: Cause de perturbation de la route de migration non répertoriée dans les codes ci-dessus.
          es: Causa de interrupción de la ruta de migración no listada en los códigos anteriores.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot identify the primary cause of migration route disruption.
          fr: Le répondant ne peut pas identifier la cause principale de la perturbation de la route de migration.
          es: El encuestado no puede identificar la causa principal de la interrupción de la ruta de migración.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023"], "definition": {"en": "Primary cause of disruption to a pastoral household''s seasonal migration route. Used in PastoralFoodSecurityProfile `migration_route_disruption_cause`. Sensitivity: this vocabulary is SENSITIVE. Codes `conflict_armed_group` and `inter_community_conflict` constitute conflict-actor intelligence at fine geographic granularity; aggregate to livelihood-zone level before sharing with any non-humanitarian partner. The vocabulary deliberately does not ask respondents to name specific armed actors \u2014 only to categorize the type of cause \u2014 to reduce intelligence-collection risk.", "es": "Causa principal de la interrupci\u00f3n de la ruta de migraci\u00f3n estacional de un hogar pastoral. Sensibilidad: vocabulario SENSIBLE. Los c\u00f3digos `conflict_armed_group` e `inter_community_conflict` constituyen informaci\u00f3n de actores del conflicto; agregar al nivel de zona de medios de vida antes de compartir.", "fr": "Cause principale de la perturbation de la route de migration saisonni\u00e8re d''un m\u00e9nage pastoral. Sensibilit\u00e9 : vocabulaire SENSIBLE. Les codes `conflict_armed_group` et `inter_community_conflict` constituent des renseignements sur les acteurs du conflit ; agr\u00e9ger au niveau de la zone de moyens d''existence avant tout partage."}, "id": "migration-route-disruption", "label": {"en": "Migration Route Disruption Cause", "es": "Causa de interrupci\u00f3n de la ruta de migraci\u00f3n", "fr": "Cause de perturbation de la route de migration"}, "maturity": "draft", "values": [{"code": "conflict_armed_group", "definition": {"en": "Route blocked or made unsafe by armed actors including non-state armed groups, militias, or military operations. SENSITIVE: aggregate to livelihood-zone level before sharing.", "es": "Ruta bloqueada o hecha insegura por actores armados incluyendo grupos armados no estatales, milicias u operaciones militares. SENSIBLE.", "fr": "Route bloqu\u00e9e ou rendue dangereuse par des acteurs arm\u00e9s, notamment des groupes arm\u00e9s non \u00e9tatiques, des milices ou des op\u00e9rations militaires. SENSIBLE."}, "label": {"en": "Armed group or armed conflict", "es": "Grupo armado o conflicto armado", "fr": "Groupe arm\u00e9 ou conflit arm\u00e9"}}, {"code": "inter_community_conflict", "definition": {"en": "Farmer-herder conflict, inter-clan dispute, or inter-ethnic conflict blocking traditional pastoral corridors. SENSITIVE: aggregate to livelihood-zone level before sharing.", "es": "Conflicto agricultores-ganaderos, disputa entre clanes o conflicto inter\u00e9tnico que bloquea corredores pastorales tradicionales. SENSIBLE.", "fr": "Conflit agriculteurs-\u00e9leveurs, dispute inter-clans ou conflit inter-ethnique bloquant les couloirs pastoraux traditionnels. SENSIBLE."}, "label": {"en": "Inter-community conflict", "es": "Conflicto intercomunal", "fr": "Conflit intercommunautaire"}}, {"code": "closed_by_authorities", "definition": {"en": "Migration route officially or de facto closed by government or administrative order.", "es": "Ruta de migraci\u00f3n cerrada oficial o de facto por orden gubernamental o administrativa.", "fr": "Route de migration officiellement ou de facto ferm\u00e9e par une d\u00e9cision gouvernementale ou administrative."}, "label": {"en": "Closed by authorities", "es": "Cerrado por las autoridades", "fr": "Ferm\u00e9 par les autorit\u00e9s"}}, {"code": "agricultural_encroachment", "definition": {"en": "Cropland expansion into traditional pastoral corridors blocking herd movement.", "es": "Expansi\u00f3n de tierras de cultivo hacia corredores pastorales tradicionales que bloquean el movimiento del reba\u00f1o.", "fr": "Expansion des terres cultiv\u00e9es dans les couloirs pastoraux traditionnels, bloquant le mouvement des troupeaux."}, "label": {"en": "Agricultural encroachment on pastoral corridor", "es": "Expansi\u00f3n agr\u00edcola sobre el corredor pastoral", "fr": "Empi\u00e8tement agricole sur le couloir pastoral"}}, {"code": "drought_no_water_pasture", "definition": {"en": "Route rendered impassable by absence of water or pasture due to drought, not by human actors.", "es": "Ruta inaccesible por ausencia de agua o pastos debido a la sequ\u00eda, no por actores humanos.", "fr": "Route rendue impraticable par l''absence d''eau ou de p\u00e2turage due \u00e0 la s\u00e9cheresse, et non par des acteurs humains."}, "label": {"en": "Drought \u2014 no water or pasture along route", "es": "Sequ\u00eda \u2014 sin agua ni pastos en la ruta", "fr": "S\u00e9cheresse \u2014 pas d''eau ni de p\u00e2turage sur la route"}}, {"code": "flood_physical_barrier", "definition": {"en": "Route blocked by floodwater, washed-out tracks, or other physical obstacle not caused by human actors.", "es": "Ruta bloqueada por inundaciones, caminos destruidos u otros obst\u00e1culos f\u00edsicos no causados por actores humanos.", "fr": "Route bloqu\u00e9e par des inondations, des pistes emport\u00e9es ou d''autres obstacles physiques non caus\u00e9s par des acteurs humains."}, "label": {"en": "Flood or physical barrier", "es": "Inundaci\u00f3n o barrera f\u00edsica", "fr": "Inondation ou obstacle physique"}}, {"code": "other", "definition": {"en": "Cause of migration route disruption not listed in the codes above.", "es": "Causa de interrupci\u00f3n de la ruta de migraci\u00f3n no listada en los c\u00f3digos anteriores.", "fr": "Cause de perturbation de la route de migration non r\u00e9pertori\u00e9e dans les codes ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot identify the primary cause of migration route disruption.", "es": "El encuestado no puede identificar la causa principal de la interrupci\u00f3n de la ruta de migraci\u00f3n.", "fr": "Le r\u00