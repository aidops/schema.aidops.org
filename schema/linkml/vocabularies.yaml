9t\u00e9 d\u00e9moli ou d\u00e9truit sans autorisation l\u00e9gale ni proc\u00e9dure r\u00e9guli\u00e8re."}, "label": {"en": "Illegal demolition or destruction", "es": "Demolici\u00f3n o destrucci\u00f3n ilegal", "fr": "D\u00e9molition ou destruction ill\u00e9gale"}}, {"code": "discriminatory_denial", "definition": {"en": "Access to housing or land was denied on discriminatory grounds (ethnicity, religion, origin). Based on Pinheiro Principles Principle 3 (non-discrimination).", "es": "El acceso a vivienda o tierra fue negado por motivos discriminatorios (etnia, religi\u00f3n, origen). Basado en el Principio 3 de los Principios Pinheiro (no discriminaci\u00f3n).", "fr": "L''acc\u00e8s au logement ou aux terres a \u00e9t\u00e9 refus\u00e9 pour des motifs discriminatoires (origine ethnique, religion, origine). Fond\u00e9 sur le Principe 3 des Principes Pinheiro (non-discrimination)."}, "label": {"en": "Discriminatory denial of housing or land", "es": "Denegaci\u00f3n discriminatoria de vivienda o tierra", "fr": "Refus discriminatoire de logement ou de terres"}}, {"code": "confiscation_by_armed_actor", "definition": {"en": "Property was seized or confiscated by an armed group, military force, or government authority. Restricted-adjacent: do not probe for actor identity or further details if this code is selected.", "es": "La propiedad fue incautada o confiscada por un grupo armado, fuerza militar o autoridad gubernamental. Nivel sensibilidad restringida: no indagar sobre la identidad del actor ni m\u00e1s detalles si se selecciona este c\u00f3digo.", "fr": "Le bien a \u00e9t\u00e9 saisi ou confisqu\u00e9 par un groupe arm\u00e9, une force militaire ou une autorit\u00e9 gouvernementale. Niveau sensibilit\u00e9 restreinte : ne pas chercher \u00e0 identifier l''acteur ni \u00e0 obtenir plus de d\u00e9tails si ce code est s\u00e9lectionn\u00e9."}, "label": {"en": "Confiscation by armed actor or authority", "es": "Confiscaci\u00f3n por actor armado o autoridad", "fr": "Confiscation par un acteur arm\u00e9 ou une autorit\u00e9"}}, {"code": "other", "definition": {"en": "Dispute type not covered by the above categories.", "es": "Tipo de disputa no cubierto por las categor\u00edas anteriores.", "fr": "Type de litige non couvert par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
