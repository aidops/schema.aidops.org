  PriceTrendDirection:
    title:
      en: Price Trend Direction
      fr: Direction de la tendance des prix
      es: Dirección de la tendencia de precios
    description:
      en: The direction and magnitude of price movement for a commodity over the past 30 days, as reported by key vendor informants. A seven-level scale from sharply increasing to sharply decreasing, with an additional code for high volatility with no clear direction. Aligned with the WFP VAM market bulletin price trend classification and FAO GIEWS FPMA trend codes. Potentially reusable for LivelihoodProfile income trend and AgricultureProfile harvest trend items.
      fr: La direction et l'ampleur du mouvement des prix d'un produit au cours des 30 derniers jours, telles que rapportées par les informateurs clés vendeurs. Échelle à sept niveaux allant de en forte hausse à en forte baisse, avec un code supplémentaire pour la haute volatilité sans direction claire. Aligné sur la classification des tendances de prix des bulletins de marché WFP VAM et les codes de tendance FAO GIEWS FPMA.
      es: La dirección y magnitud del movimiento de precios de un producto en los últimos 30 días, según lo reportado por informantes clave vendedores. Escala de siete niveles desde en fuerte aumento hasta en fuerte disminución, con un código adicional para alta volatilidad sin dirección clara. Alineado con la clasificación de tendencias de precios de los boletines de mercado WFP VAM y los códigos de tendencia FAO GIEWS FPMA.
    enum_uri: aidops:PriceTrendDirection
    permissible_values:
      sharply_increasing:
        title:
          en: Sharply increasing
          fr: En forte hausse
          es: En fuerte aumento
        description:
          en: Price rose more than 20% over the past 30 days. Vendors report difficulty maintaining stock; consumers report affordability stress.
          fr: Le prix a augmenté de plus de 20 % au cours des 30 derniers jours. Les vendeurs signalent des difficultés à maintenir les stocks ; les consommateurs signalent un stress d'abordabilité.
          es: El precio aumentó más del 20 % en los últimos 30 días. Los vendedores reportan dificultades para mantener el stock; los consumidores reportan estrés de asequibilidad.
      increasing:
        title:
          en: Increasing
          fr: En hausse
          es: En aumento
        description:
          en: Price rose 5–20% over the past 30 days. Moderate upward pressure; above seasonal norm.
          fr: Le prix a augmenté de 5 à 20 % au cours des 30 derniers jours. Pression à la hausse modérée ; au-dessus de la norme saisonnière.
          es: El precio aumentó 5–20 % en los últimos 30 días. Presión moderada al alza; por encima de la norma estacional.
      stable:
        title:
          en: Stable
          fr: Stable
          es: Estable
        description:
          en: Price change within ±5% over the past 30 days. Normal seasonal variation; no anomalous pressure.
          fr: Variation de prix dans ±5 % au cours des 30 derniers jours. Variation saisonnière normale ; aucune pression anormale.
          es: Variación de precio dentro de ±5 % en los últimos 30 días. Variación estacional normal; sin presión anómala.
      decreasing:
        title:
          en: Decreasing
          fr: En baisse
          es: En disminución
        description:
          en: Price fell 5–20% over the past 30 days. May reflect seasonal harvest, supply recovery, or reduced demand.
          fr: Le prix a baissé de 5 à 20 % au cours des 30 derniers jours. Peut refléter une récolte saisonnière, une reprise de l'approvisionnement ou une réduction de la demande.
          es: El precio cayó 5–20 % en los últimos 30 días. Puede reflejar cosecha estacional, recuperación del suministro o reducción de la demanda.
      sharply_decreasing:
        title:
          en: Sharply decreasing
          fr: En forte baisse
          es: En fuerte disminución
        description:
          en: Price fell more than 20% over the past 30 days. May indicate oversupply, market disruption, dumping, or food distribution that depressed market demand.
          fr: Le prix a baissé de plus de 20 % au cours des 30 derniers jours. Peut indiquer une offre excédentaire, une perturbation du marché, un dumping ou une distribution alimentaire qui a déprimé la demande du marché.
          es: El precio cayó más del 20 % en los últimos 30 días. Puede indicar exceso de oferta, interrupción del mercado, dumping o distribución de alimentos que deprimió la demanda del mercado.
      highly_volatile:
        title:
          en: Highly volatile
          fr: Très volatil
          es: Muy volátil
        description:
          en: Large price fluctuations in both directions with no consistent trend. Often observed in conflict contexts with erratic supply.
          fr: Grandes fluctuations de prix dans les deux directions sans tendance cohérente. Souvent observé dans les contextes de conflit avec un approvisionnement erratique.
          es: Grandes fluctuaciones de precios en ambas direcciones sin tendencia consistente. A menudo observado en contextos de conflicto con suministro errático.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Vendor informant cannot assess trend; insufficient data.
          fr: L'informateur vendeur ne peut pas évaluer la tendance ; données insuffisantes.
          es: El informante vendedor no puede evaluar la tendencia; datos insuficientes.
