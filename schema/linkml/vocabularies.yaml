  TransportModeToFacility:
    title:
      en: Transport Mode to Health Facility
      fr: Mode de transport vers l'établissement de santé
      es: Modo de transporte al establecimiento de salud
    description:
      en: Most common way a household travels to the nearest health facility. Used by `nearest_facility_transport_mode` in HealthAccessProfile. Relevant to understanding both travel time and cost; `ambulance_or_emergency` as the routine mode indicates poor routine access.
      fr: Moyen le plus fréquent par lequel un ménage se rend à l'établissement de santé le plus proche. Utilisé par `nearest_facility_transport_mode` dans HealthAccessProfile. Pertinent pour comprendre à la fois le temps de trajet et le coût ; `ambulance_or_emergency` comme mode de routine indique un accès de routine médiocre.
      es: Forma más común en que un hogar se traslada al establecimiento de salud más cercano. Utilizado por `nearest_facility_transport_mode` en HealthAccessProfile. Relevante para comprender el tiempo y el costo del viaje; `ambulance_or_emergency` como modo habitual indica un acceso rutinario deficiente.
    enum_uri: aidops:TransportModeToFacility
    permissible_values:
      walking:
        title:
          en: On foot (walking)
          fr: À pied (marche)
          es: A pie (caminando)
        description:
          en: Household typically walks to the health facility.
          fr: Le ménage se rend généralement à l'établissement de santé à pied.
          es: El hogar generalmente camina al establecimiento de salud.
      bicycle:
        title:
          en: Bicycle
          fr: Bicyclette
          es: Bicicleta
        description:
          en: Household uses a bicycle.
          fr: Le ménage utilise une bicyclette.
          es: El hogar usa una bicicleta.
      motorcycle_or_moto_taxi:
        title:
          en: Motorcycle or moto-taxi
          fr: Moto ou moto-taxi
          es: Motocicleta o mototaxi
        description:
          en: Household uses a private motorcycle or hired moto-taxi.
          fr: Le ménage utilise une moto privée ou un moto-taxi loué.
          es: El hogar usa una motocicleta privada o mototaxi contratado.
      shared_vehicle_taxi:
        title:
          en: Shared vehicle or taxi
          fr: Véhicule partagé ou taxi
          es: Vehículo compartido o taxi
        description:
          en: Household uses a shared taxi, matatu, minibus, or hired car.
          fr: Le ménage utilise un taxi partagé, un matatu, un minibus ou une voiture louée.
          es: El hogar usa un taxi compartido, matatu, minibús o coche contratado.
      private_vehicle:
        title:
          en: Private vehicle
          fr: Véhicule privé
          es: Vehículo privado
        description:
          en: Household uses its own vehicle (car, truck).
          fr: Le ménage utilise son propre véhicule (voiture, camion).
          es: El hogar usa su propio vehículo (coche, camión).
      boat:
        title:
          en: Boat or canoe
          fr: Bateau ou pirogue
          es: Barco o canoa
        description:
          en: Household uses water transport (relevant in riverine and island contexts).
          fr: Le ménage utilise un transport fluvial ou maritime (pertinent dans les contextes riverains et insulaires).
          es: El hogar usa transporte acuático (relevante en contextos ribereños e insulares).
      animal_drawn:
        title:
          en: Animal-drawn transport
          fr: Transport tiré par des animaux
          es: Transporte de tracción animal
        description:
          en: Household uses a donkey cart, ox cart, or similar animal-drawn conveyance.
          fr: Le ménage utilise une charrette tirée par un âne, un bœuf ou un autre animal de trait.
          es: El hogar usa una carreta tirada por burro, buey u otro animal.
      ambulance_or_emergency:
        title:
          en: Ambulance or emergency transport
          fr: Ambulance ou transport d'urgence
          es: Ambulancia o transporte de emergencia
        description:
          en: Household can only access the facility via ambulance or other emergency transport, indicating poor routine access.
          fr: Le ménage ne peut accéder à l'établissement que par ambulance ou autre transport d'urgence, ce qui indique un accès de routine médiocre.
          es: El hogar solo puede acceder al establecimiento mediante ambulancia u otro transporte de emergencia, lo que indica un acceso rutinario deficiente.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Mode of transport not captured by any code above.
          fr: Mode de transport non couvert par aucun code ci-dessus.
          es: Modo de transporte no cubierto por ningún código anterior.
