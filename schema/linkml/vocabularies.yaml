  LivelihoodActivityCategory:
    title:
      en: Livelihood Activity Category
      fr: Catégorie d'activité de subsistance
      es: Categoría de actividad de subsistencia
    description:
      en: Primary and secondary livelihood activity classification for humanitarian contexts. Synthesised from LSMS-ISA activity coding, MICS6 income module, the Sphere 2018 Livelihoods chapter, and IOM DTM Multi-Sectoral Location Assessment (MSLA). Used to classify what the household does to earn a living or meet its food needs.
      fr: Classification des activités de subsistance primaires et secondaires pour les contextes humanitaires. Synthétisée à partir du codage d'activité LSMS-ISA, du module revenus MICS6, du chapitre Moyens de subsistance de Sphère 2018 et de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM. Utilisée pour classer ce que le ménage fait pour gagner sa vie ou subvenir à ses besoins alimentaires.
      es: Clasificación de actividades de subsistencia primarias y secundarias para contextos humanitarios. Sintetizada a partir de la codificación de actividades LSMS-ISA, el módulo de ingresos MICS6, el capítulo de Medios de Vida de Esfera 2018 y la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM. Se utiliza para clasificar lo que el hogar hace para ganarse la vida o satisfacer sus necesidades alimentarias.
    enum_uri: aidops:LivelihoodActivityCategory
    permissible_values:
      agriculture:
        title:
          en: Crop farming
          fr: Agriculture vivrière et commerciale
          es: Agricultura
        description:
          en: Cultivation of crops (food and cash) as the primary livelihood activity. Specific farm data belongs to AgricultureProfile.
          fr: Culture de productions vivrières et de rente comme activité principale de subsistance. Les données spécifiques à l'exploitation relèvent d'AgricultureProfile.
          es: Cultivo de productos alimentarios y comerciales como actividad principal de subsistencia. Los datos específicos de la explotación pertenecen a AgricultureProfile.
      livestock:
        title:
          en: Livestock herding / pastoralism
          fr: Élevage / pastoralisme
          es: Ganadería / pastoralismo
        description:
          en: Keeping, herding, or selling livestock (cattle, goats, sheep, camels, poultry). Specific livestock data belongs to AgricultureProfile.
          fr: Garde, élevage ou vente de bétail (bovins, caprins, ovins, chameaux, volailles). Les données spécifiques au bétail relèvent d'AgricultureProfile.
          es: Cría, pastoreo o venta de ganado (bovinos, caprinos, ovinos, camellos, aves). Los datos específicos de ganado pertenecen a AgricultureProfile.
      fishing:
        title:
          en: Fishing / aquaculture
          fr: Pêche / aquaculture
          es: Pesca / acuicultura
        description:
          en: Freshwater or marine fishing, fish farming, or collection of aquatic resources.
          fr: Pêche en eau douce ou maritime, pisciculture ou collecte de ressources aquatiques.
          es: Pesca en agua dulce o marina, piscicultura o recolección de recursos acuáticos.
      petty_trade:
        title:
          en: Petty trade / market vendor
          fr: Petit commerce / vendeur de marché
          es: Comercio informal / vendedor de mercado
        description:
          en: Small-scale buying and selling of goods at market or roadside without a formal business registration.
          fr: Achat et vente à petite échelle de biens au marché ou en bord de route sans enregistrement formel d'entreprise.
          es: Compra y venta a pequeña escala de bienes en el mercado o al borde del camino sin registro formal de negocio.
      formal_employment:
        title:
          en: Formal wage employment
          fr: Emploi salarié formel
          es: Empleo formal asalariado
        description:
          en: Regular paid employment with a formal employer (government, NGO, private company).
          fr: Emploi rémunéré régulier auprès d'un employeur formel (gouvernement, ONG, entreprise privée).
          es: Empleo remunerado regular con un empleador formal (gobierno, ONG, empresa privada).
      casual_day_labor:
        title:
          en: Casual or day labour
          fr: Travail journalier / occasionnel
          es: Trabajo casual o jornalero
        description:
          en: Irregular, short-term labour for daily wages without a formal contract.
          fr: Travail irrégulier à court terme pour des salaires journaliers sans contrat formel.
          es: Trabajo irregular a corto plazo por salarios diarios sin contrato formal.
      skilled_trade_services:
        title:
          en: Skilled trade or services
          fr: Métier qualifié ou services
          es: Oficio cualificado o servicios
        description:
          en: Provision of skilled services such as carpentry, masonry, tailoring, mechanics, hairdressing, or similar trades.
          fr: Prestation de services qualifiés tels que menuiserie, maçonnerie, couture, mécanique, coiffure ou métiers similaires.
          es: Prestación de servicios cualificados como carpintería, albañilería, sastrería, mecánica, peluquería u oficios similares.
      remittances:
        title:
          en: Remittances received
          fr: Envois de fonds reçus
          es: Remesas recibidas
        description:
          en: Primary reliance on money sent by household members or relatives living elsewhere (internal or international).
          fr: Dépendance primaire à l'égard de l'argent envoyé par des membres du ménage ou des proches vivant ailleurs (interne ou international).
          es: Dependencia principal del dinero enviado por miembros del hogar o familiares que viven en otro lugar (interno o internacional).
      social_transfers:
        title:
          en: Government social transfers
          fr: Transferts sociaux gouvernementaux
          es: Transferencias sociales gubernamentales
        description:
          en: Government cash transfers, pensions, or safety-net programmes as the primary income source.
          fr: Transferts monétaires gouvernementaux, pensions ou programmes de filets de sécurité comme source principale de revenus.
          es: Transferencias monetarias gubernamentales, pensiones o programas de redes de seguridad como fuente principal de ingresos.
      aid_dependent:
        title:
          en: Humanitarian aid dependent
          fr: Dépendance à l'aide humanitaire
          es: Dependencia de la ayuda humanitaria
        description:
          en: Household relies primarily on food, cash, or in-kind assistance from humanitarian agencies (NGOs, UN).
          fr: Le ménage dépend principalement de la nourriture, des espèces ou de l'aide en nature d'agences humanitaires (ONG, ONU).
          es: El hogar depende principalmente de alimentos, efectivo o asistencia en especie de agencias humanitarias (ONG, ONU).
      gathering_natural_resources:
        title:
          en: Gathering / natural resource use
          fr: Cueillette / ressources naturelles
          es: Recolección / recursos naturales
        description:
          en: Collecting wood, charcoal, water, wild foods, or other natural resources for sale or household use.
          fr: Collecte de bois, charbon, eau, aliments sauvages ou autres ressources naturelles pour la vente ou l'usage du ménage.
          es: Recolección de madera, carbón, agua, alimentos silvestres u otros recursos naturales para la venta o uso doméstico.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Livelihood activity not covered by the above categories.
          fr: Activité de subsistance non couverte par les catégories ci-dessus.
          es: Actividad de subsistencia no cubierta por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "definition": {"en": "Primary and secondary livelihood activity classification for humanitarian contexts. Synthesised from LSMS-ISA activity coding, MICS6 income module, the Sphere 2018 Livelihoods chapter, and IOM DTM Multi-Sectoral Location Assessment (MSLA). Used to classify what the household does to earn a living or meet its food needs.", "es": "Clasificaci\u00f3n de actividades de subsistencia primarias y secundarias para contextos humanitarios. Sintetizada a partir de la codificaci\u00f3n de actividades LSMS-ISA, el m\u00f3dulo de ingresos MICS6, el cap\u00edtulo de Medios de Vida de Esfera 2018 y la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM. Se utiliza para clasificar lo que el hogar hace para ganarse la vida o satisfacer sus necesidades alimentarias.", "fr": "Classification des activit\u00e9s de subsistance primaires et secondaires pour les contextes humanitaires. Synth\u00e9tis\u00e9e \u00e0 partir du codage d''activit\u00e9 LSMS-ISA, du module revenus MICS6, du chapitre Moyens de subsistance de Sph\u00e8re 2018 et de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM. Utilis\u00e9e pour classer ce que le m\u00e9nage fait pour gagner sa vie ou subvenir \u00e0 ses besoins alimentaires."}, "id": "livelihood-activity-category", "label": {"en": "Livelihood Activity Category", "es": "Categor\u00eda de actividad de subsistencia", "fr": "Cat\u00e9gorie d''activit\u00e9 de subsistance"}, "maturity": "draft", "standard": {"name": "Synthesised from LSMS-ISA, MICS6, Sphere 2018 Livelihoods chapter, and IOM DTM MSLA", "notes": "Specific farm data belongs to AgricultureProfile via `farming_system` and related properties; this category list stays at household-portfolio granularity."}, "values": [{"code": "agriculture", "definition": {"en": "Cultivation of crops (food and cash) as the primary livelihood activity. Specific farm data belongs to AgricultureProfile.", "es": "Cultivo de productos alimentarios y comerciales como actividad principal de subsistencia. Los datos espec\u00edficos de la explotaci\u00f3n pertenecen a AgricultureProfile.", "fr": "Culture de productions vivri\u00e8res et de rente comme activit\u00e9 principale de subsistance. Les donn\u00e9es sp\u00e9cifiques \u00e0 l''exploitation rel\u00e8vent d''AgricultureProfile."}, "label": {"en": "Crop farming", "es": "Agricultura", "fr": "Agriculture vivri\u00e8re et commerciale"}}, {"code": "livestock", "definition": {"en": "Keeping, herding, or selling livestock (cattle, goats, sheep, camels, poultry). Specific livestock data belongs to AgricultureProfile.", "es": "Cr\u00eda, pastoreo o venta de ganado (bovinos, caprinos, ovinos, camellos, aves). Los datos espec\u00edficos de ganado pertenecen a AgricultureProfile.", "fr": "Garde, \u00e9levage ou vente de b\u00e9tail (bovins, caprins, ovins, chameaux, volailles). Les donn\u00e9es sp\u00e9cifiques au b\u00e9tail rel\u00e8vent d''AgricultureProfile."}, "label": {"en": "Livestock herding / pastoralism", "es": "Ganader\u00eda / pastoralismo", "fr": "\u00c9levage / pastoralisme"}}, {"code": "fishing", "definition": {"en": "Freshwater or marine fishing, fish farming, or collection of aquatic resources.", "es": "Pesca en agua dulce o marina, piscicultura o recolecci\u00f3n de recursos acu\u00e1ticos.", "fr": "P\u00eache en eau douce ou maritime, pisciculture ou collecte de ressources aquatiques."}, "label": {"en": "Fishing / aquaculture", "es": "Pesca / acuicultura", "fr": "P\u00eache / aquaculture"}}, {"code": "petty_trade", "definition": {"en": "Small-scale buying and selling of goods at market or roadside without a formal business registration.", "es": "Compra y venta a peque\u00f1a escala de bienes en el mercado o al borde del camino sin registro formal de negocio.", "fr": "Achat et vente \u00e0 petite \u00e9chelle de biens au march\u00e9 ou en bord de route sans enregistrement formel d''entreprise."}, "label": {"en": "Petty trade / market vendor", "es": "Comercio informal / vendedor de mercado", "fr": "Petit commerce / vendeur de march\u00e9"}}, {"code": "formal_employment", "definition": {"en": "Regular paid employment with a formal employer (government, NGO, private company).", "es": "Empleo remunerado regular con un empleador formal (gobierno, ONG, empresa privada).", "fr": "Emploi r\u00e9mun\u00e9r\u00e9 r\u00e9gulier aupr\u00e8s d''un employeur formel (gouvernement, ONG, entreprise priv\u00e9e)."}, "label": {"en": "Formal wage employment", "es": "Empleo formal asalariado", "fr": "Emploi salari\u00e9 formel"}}, {"code": "casual_day_labor", "definition": {"en": "Irregular, short-term labour for daily wages without a formal contract.", "es": "Trabajo irregular a corto plazo por salarios diarios sin contrato formal.", "fr": "Travail irr\u00e9gulier \u00e0 court terme pour des salaires journaliers sans contrat formel."}, "label": {"en": "Casual or day labour", "es": "Trabajo casual o jornalero", "fr": "Travail journalier / occasionnel"}}, {"code": "skilled_trade_services", "definition": {"en": "Provision of skilled services such as carpentry, masonry, tailoring, mechanics, hairdressing, or similar trades.", "es": "Prestaci\u00f3n de servicios cualificados como carpinter\u00eda, alba\u00f1iler\u00eda, sastrer\u00eda, mec\u00e1nica, peluquer\u00eda u oficios similares.", "fr": "Prestation de services qualifi\u00e9s tels que menuiserie, ma\u00e7onnerie, couture, m\u00e9canique, coiffure ou m\u00e9tiers similaires."}, "label": {"en": "Skilled trade or services", "es": "Oficio cualificado o servicios", "fr": "M\u00e9tier qualifi\u00e9 ou services"}}, {"code": "remittances", "definition": {"en": "Primary reliance on money sent by household members or relatives living elsewhere (internal or international).", "es": "Dependencia principal del dinero enviado por miembros del hogar o familiares que viven en otro lugar (interno o internacional).", "fr": "D\u00e9pendance primaire \u00e0 l''\u00e9gard de l''argent envoy\u00e9 par des membres du m\u00e9nage ou des proches vivant ailleurs (interne ou international)."}, "label": {"en": "Remittances received", "es": "Remesas recibidas", "fr": "Envois de fonds re\u00e7us"}}, {"code": "social_transfers", "definition": {"en": "Government cash transfers, pensions, or safety-net programmes as the primary income source.", "es": "Transferencias monetarias gubernamentales, pensiones o programas de redes de seguridad como fuente principal de ingresos.", "fr": "Transferts mon\u00e9taires gouvernementaux, pensions ou programmes de filets de s\u00e9curit\u00e9 comme source principale de revenus."}, "label": {"en": "Government social transfers", "es": "Transferencias sociales gubernamentales", "fr": "Transferts sociaux gouvernementaux"}}, {"code": "aid_dependent", "definition": {"en": "Household relies primarily on food, cash, or in-kind assistance from humanitarian agencies (NGOs, UN).", "es": "El hogar depende principalmente de alimentos, efectivo o asistencia en especie de agencias humanitarias (ONG, ONU).", "fr": "Le m\u00e9nage d\u00e9pend principalement de la nourriture, des esp\u00e8ces ou de l''aide en nature d''agences humanitaires (ONG, ONU)."}, "label": {"en": "Humanitarian aid dependent", "es": "Dependencia de la ayuda humanitaria", "fr": "D\u00e9pendance \u00e0 l''aide humanitaire"}}, {"code": "gathering_natural_resources", "definition": {"en": "Collecting wood, charcoal, water, wild foods, or other natural resources for sale or household use.", "es": "Recolecci\u00f3n de madera, carb\u00f3n, agua, alimentos silvestres u otros recursos naturales para la venta o uso dom\u00e9stico.", "fr": "Collecte de bois, charbon, eau, aliments sauvages ou autres ressources naturelles pour la vente ou l''usage du m\u00e9nage."}, "label": {"en": "Gathering / natural resource use", "es": "Recolecci\u00f3n / recursos naturales", "fr": "Cueillette / ressources naturelles"}}, {"code": "other", "definition": {"en": "Livelihood activity not covered by the above categories.", "es": "Actividad de subsistencia no cubierta por las categor\u00edas anteriores.", "fr": "Activit\u00e9 de subsistance non couverte par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
