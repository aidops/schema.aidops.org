ccess services because they were not available (facility closed, stockout, no staff).", "es": "La mujer no pudo acceder a los servicios porque no estaban disponibles (instalaci\u00f3n cerrada, desabastecimiento, sin personal).", "fr": "La femme n''a pas pu acc\u00e9der aux services parce qu''ils n''\u00e9taient pas disponibles (\u00e9tablissement ferm\u00e9, rupture de stock, pas de personnel)."}, "label": {"en": "No \u2014 services not available", "es": "No \u2014 servicios no disponibles", "fr": "Non \u2014 services non disponibles"}}, {"code": "no_barrier_other", "definition": {"en": "The woman could not access services due to a barrier not covered by the other codes (e.g., permission denied by household head, lack of female provider).", "es": "La mujer no pudo acceder a los servicios debido a una barrera no cubierta por los otros c\u00f3digos (p. ej., permiso denegado por el jefe del hogar, falta de proveedor femenino).", "fr": "La femme n''a pas pu acc\u00e9der aux services en raison d''une barri\u00e8re non couverte par les autres codes (p. ex. permission refus\u00e9e par le chef de m\u00e9nage, absence de prestataire f\u00e9minin)."}, "label": {"en": "No \u2014 other barrier", "es": "No \u2014 otra barrera", "fr": "Non \u2014 autre barri\u00e8re"}}]}'
