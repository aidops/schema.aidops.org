tenant ; des r\u00e9parations mineures au niveau du m\u00e9nage (ragr\u00e9age, finitions, remplacement d''\u00e9quipements) restaureraient son fonctionnement normal. R\u00e9ponse typique : kit articles non alimentaires ou petite subvention en esp\u00e8ces."}, "label": {"en": "Habitable with minor repairs", "es": "Habitable con reparaciones menores", "fr": "Habitable avec r\u00e9parations mineures"}}, {"code": "needs_major_repairs_uninhabitable", "definition": {"en": "Dwelling cannot currently be occupied but can be repaired to a safe habitable standard without full reconstruction. Typical response: shelter repair grant, technical assistance, labour support.", "es": "La vivienda no puede ocuparse actualmente pero puede repararse hasta un est\u00e1ndar habitable y seguro sin reconstrucci\u00f3n completa. Respuesta t\u00edpica: subvenci\u00f3n de reparaci\u00f3n de refugio, asistencia t\u00e9cnica, apoyo laboral.", "fr": "Le logement ne peut actuellement \u00eatre occup\u00e9 mais peut \u00eatre r\u00e9par\u00e9 pour atteindre une norme habitable et s\u00fbre sans reconstruction compl\u00e8te. R\u00e9ponse typique : subvention de r\u00e9paration abri, assistance technique, appui \u00e0 la main-d''\u0153uvre."}, "label": {"en": "Uninhabitable; major repairs required (repair-grant tier)", "es": "Inhabitable; se requieren reparaciones mayores (tramo subvenci\u00f3n-reparaci\u00f3n)", "fr": "Inhabitable ; r\u00e9parations majeures requises (tranche subvention-r\u00e9paration)"}}, {"code": "must_be_demolished", "definition": {"en": "Dwelling is beyond safe repair and must be demolished; recovery requires full reconstruction. Typical response: transitional shelter, reconstruction grant, relocation support.", "es": "La vivienda est\u00e1 m\u00e1s all\u00e1 de una reparaci\u00f3n segura y debe demolerse; la recuperaci\u00f3n requiere reconstrucci\u00f3n completa. Respuesta t\u00edpica: refugio transicional, subvenci\u00f3n de reconstrucci\u00f3n, apoyo de relocalizaci\u00f3n.", "fr": "Le logement est au-del\u00e0 de toute r\u00e9paration s\u00fbre et doit \u00eatre d\u00e9moli ; le rel\u00e8vement n\u00e9cessite une reconstruction compl\u00e8te. R\u00e9ponse typique : abri transitionnel, subvention de reconstruction, appui \u00e0 la relocalisation."}, "label": {"en": "Beyond repair; must be demolished (reconstruction-grant tier)", "es": "Irreparable; debe demolerse (tramo subvenci\u00f3n-reconstrucci\u00f3n)", "fr": "Irr\u00e9parable ; doit \u00eatre d\u00e9moli (tranche subvention-reconstruction)"}}, {"code": "unknown", "definition": {"en": "Habitability has not been assessed. Recorded to distinguish from a positive ''habitable'' finding.", "es": "La habitabilidad no ha sido evaluada. Registrado para distinguirse de un veredicto positivo \u00abhabitable\u00bb.", "fr": "L''habitabilit\u00e9 n''a pas \u00e9t\u00e9 \u00e9valu\u00e9e. Enregistr\u00e9 pour distinguer d''un verdict positif \u00ab habitable \u00bb."}, "label": {"en": "Unknown / not assessed", "es": "Desconocido / no evaluado", "fr": "Inconnu / non \u00e9valu\u00e9"}}]}'
