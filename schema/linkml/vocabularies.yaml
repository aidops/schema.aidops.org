  LivelihoodDisruptionBarrier:
    title:
      en: Livelihood Disruption Barrier
      fr: Obstacle à la subsistance
      es: Barrera de interrupción de medios de vida
    description:
      en: Primary barrier preventing a household from practicing its previous livelihood activity. Synthesised from IOM DTM Multi-Sectoral Location Assessment, the Sphere 2018 Livelihoods chapter, and the LSMS-ISA livelihood constraints module. Used to identify the most important reason a household cannot resume or maintain its main livelihood after a crisis or displacement, to inform programme design.
      fr: Obstacle principal empêchant un ménage de pratiquer son activité de subsistance antérieure. Synthétisé à partir de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM, du chapitre Moyens de subsistance de Sphère 2018 et du module de contraintes de subsistance du LSMS-ISA. Utilisé pour identifier la raison la plus importante pour laquelle un ménage ne peut pas reprendre ou maintenir sa principale activité de subsistance après une crise ou un déplacement, afin d'éclairer la conception des programmes.
      es: Barrera principal que impide a un hogar practicar su actividad de subsistencia anterior. Sintetizada a partir de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM, el capítulo de Medios de Vida de Esfera 2018 y el módulo de restricciones de subsistencia del LSMS-ISA. Se utiliza para identificar la razón más importante por la que un hogar no puede reanudar o mantener su actividad principal de subsistencia tras una crisis o desplazamiento, para orientar el diseño de programas.
    enum_uri: aidops:LivelihoodDisruptionBarrier
    permissible_values:
      lost_productive_assets:
        title:
          en: Lost productive assets or tools
          fr: Perte d'actifs ou d'outils productifs
          es: Pérdida de activos o herramientas productivas
        description:
          en: Key tools, equipment, livestock, or other productive assets were lost, destroyed, or stolen.
          fr: Des outils clés, du matériel, du bétail ou d'autres actifs productifs ont été perdus, détruits ou volés.
          es: Se perdieron, destruyeron o robaron herramientas clave, equipo, ganado u otros activos productivos.
      lost_access_to_land:
        title:
          en: Lost access to land or natural resources
          fr: Perte d'accès à la terre ou aux ressources naturelles
          es: Pérdida de acceso a tierra o recursos naturales
        description:
          en: Unable to access the land, fishing grounds, or natural resources needed for the activity.
          fr: Incapacité d'accéder à la terre, aux zones de pêche ou aux ressources naturelles nécessaires à l'activité.
          es: No se puede acceder a la tierra, zonas de pesca o recursos naturales necesarios para la actividad.
      insecurity_movement_restriction:
        title:
          en: Insecurity or movement restriction
          fr: Insécurité ou restriction de mouvement
          es: Inseguridad o restricción de movimiento
        description:
          en: Conflict, insecurity, or imposed restrictions prevent access to livelihood sites or markets.
          fr: Conflit, insécurité ou restrictions imposées empêchent l'accès aux sites de subsistance ou aux marchés.
          es: Conflicto, inseguridad o restricciones impuestas impiden el acceso a los sitios de subsistencia o los mercados.
      no_market_access:
        title:
          en: No market access
          fr: Absence d'accès au marché
          es: Sin acceso al mercado
        description:
          en: Cannot sell products or purchase inputs because markets are absent, destroyed, or too distant.
          fr: Impossible de vendre des produits ou d'acheter des intrants car les marchés sont absents, détruits ou trop éloignés.
          es: No se pueden vender productos ni comprar insumos porque los mercados están ausentes, destruidos o demasiado lejanos.
      lack_capital:
        title:
          en: Lack of capital or start-up costs
          fr: Manque de capital ou coûts de démarrage
          es: Falta de capital o costos de inicio
        description:
          en: Cannot restart or scale up due to lack of money, credit, or in-kind inputs.
          fr: Impossible de redémarrer ou de se développer en raison d'un manque d'argent, de crédit ou d'intrants en nature.
          es: No se puede reiniciar o ampliar debido a la falta de dinero, crédito o insumos en especie.
      legal_documentation:
        title:
          en: Lack of legal documents or permits
          fr: Absence de documents légaux ou permis
          es: Falta de documentos legales o permisos
        description:
          en: Inability to operate due to missing business permit, identity documentation, or legal status.
          fr: Incapacité d'exercer en raison de l'absence de permis commercial, de documentation d'identité ou de statut légal.
          es: Incapacidad de operar debido a la falta de permiso comercial, documentación de identidad o estatus legal.
      skills_mismatch:
        title:
          en: Skills not applicable in current location
          fr: Compétences non applicables à l'emplacement actuel
          es: Habilidades no aplicables en la ubicación actual
        description:
          en: The skills or trade practised before do not have a market or opportunity in the current location.
          fr: Les compétences ou le métier pratiqués auparavant n'ont pas de marché ou de débouché dans le lieu actuel.
          es: Las habilidades u oficio practicados anteriormente no tienen mercado ni oportunidad en la ubicación actual.
      family_obligations:
        title:
          en: Family or care obligations
          fr: Obligations familiales ou de soins
          es: Obligaciones familiares o de cuidado
        description:
          en: Caring for dependants, injury, or illness prevents participation in the activity.
          fr: Les soins aux personnes à charge, les blessures ou la maladie empêchent la participation à l'activité.
          es: El cuidado de dependientes, lesiones o enfermedades impide la participación en la actividad.
      discrimination_exclusion:
        title:
          en: Discrimination or social exclusion
          fr: Discrimination ou exclusion sociale
          es: Discriminación o exclusión social
        description:
          en: Prevented from practicing the activity due to discrimination (ethnicity, gender, displacement status, religion).
          fr: Empêché de pratiquer l'activité en raison de discriminations (ethnie, genre, statut de déplacement, religion).
          es: Impedido de practicar la actividad por discriminación (etnia, género, estatus de desplazamiento, religión).
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Barrier not covered by the above categories.
          fr: Obstacle non couvert par les catégories ci-dessus.
          es: Barrera no cubierta por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Primary barrier preventing a household from practicing its previous livelihood activity. Synthesised from IOM DTM Multi-Sectoral Location Assessment, the Sphere 2018 Livelihoods chapter, and the LSMS-ISA livelihood constraints module. Used to identify the most important reason a household cannot resume or maintain its main livelihood after a crisis or displacement, to inform programme design.", "es": "Barrera principal que impide a un hogar practicar su actividad de subsistencia anterior. Sintetizada a partir de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM, el cap\u00edtulo de Medios de Vida de Esfera 2018 y el m\u00f3dulo de restricciones de subsistencia del LSMS-ISA. Se utiliza para identificar la raz\u00f3n m\u00e1s importante por la que un hogar no puede reanudar o mantener su actividad principal de subsistencia tras una crisis o desplazamiento, para orientar el dise\u00f1o de programas.", "fr": "Obstacle principal emp\u00eachant un m\u00e9nage de pratiquer son activit\u00e9 de subsistance ant\u00e9rieure. Synth\u00e9tis\u00e9 \u00e0 partir de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM, du chapitre Moyens de subsistance de Sph\u00e8re 2018 et du module de contraintes de subsistance du LSMS-ISA. Utilis\u00e9 pour identifier la raison la plus importante pour laquelle un m\u00e9nage ne peut pas reprendre ou maintenir sa principale activit\u00e9 de subsistance apr\u00e8s une crise ou un d\u00e9placement, afin d''\u00e9clairer la conception des programmes."}, "id": "livelihood-disruption-barrier", "label": {"en": "Livelihood Disruption Barrier", "es": "Barrera de interrupci\u00f3n de medios de vida", "fr": "Obstacle \u00e0 la subsistance"}, "maturity": "draft", "standard": {"name": "Synthesised from IOM DTM MSLA, Sphere 2018 Livelihoods chapter, and LSMS-ISA constraints module"}, "values": [{"code": "lost_productive_assets", "definition": {"en": "Key tools, equipment, livestock, or other productive assets were lost, destroyed, or stolen.", "es": "Se perdieron, destruyeron o robaron herramientas clave, equipo, ganado u otros activos productivos.", "fr": "Des outils cl\u00e9s, du mat\u00e9riel, du b\u00e9tail ou d''autres actifs productifs ont \u00e9t\u00e9 perdus, d\u00e9truits ou vol\u00e9s."}, "label": {"en": "Lost productive assets or tools", "es": "P\u00e9rdida de activos o herramientas productivas", "fr": "Perte d''actifs ou d''outils productifs"}}, {"code": "lost_access_to_land", "definition": {"en": "Unable to access the land, fishing grounds, or natural resources needed for the activity.", "es": "No se puede acceder a la tierra, zonas de pesca o recursos naturales necesarios para la actividad.", "fr": "Incapacit\u00e9 d''acc\u00e9der \u00e0 la terre, aux zones de p\u00eache ou aux ressources naturelles n\u00e9cessaires \u00e0 l''activit\u00e9."}, "label": {"en": "Lost access to land or natural resources", "es": "P\u00e9rdida de acceso a tierra o recursos naturales", "fr": "Perte d''acc\u00e8s \u00e0 la terre ou aux ressources naturelles"}}, {"code": "insecurity_movement_restriction", "definition": {"en": "Conflict, insecurity, or imposed restrictions prevent access to livelihood sites or markets.", "es": "Conflicto, inseguridad o restricciones impuestas impiden el acceso a los sitios de subsistencia o los mercados.", "fr": "Conflit, ins\u00e9curit\u00e9 ou restrictions impos\u00e9es emp\u00eachent l''acc\u00e8s aux sites de subsistance ou aux march\u00e9s."}, "label": {"en": "Insecurity or movement restriction", "es": "Inseguridad o restricci\u00f3n de movimiento", "fr": "Ins\u00e9curit\u00e9 ou restriction de mouvement"}}, {"code": "no_market_access", "definition": {"en": "Cannot sell products or purchase inputs because markets are absent, destroyed, or too distant.", "es": "No se pueden vender productos ni comprar insumos porque los mercados est\u00e1n ausentes, destruidos o demasiado lejanos.", "fr": "Impossible de vendre des produits ou d''acheter des intrants car les march\u00e9s sont absents, d\u00e9truits ou trop \u00e9loign\u00e9s."}, "label": {"en": "No market access", "es": "Sin acceso al mercado", "fr": "Absence d''acc\u00e8s au march\u00e9"}}, {"code": "lack_capital", "definition": {"en": "Cannot restart or scale up due to lack of money, credit, or in-kind inputs.", "es": "No se puede reiniciar o ampliar debido a la falta de dinero, cr\u00e9dito o insumos en especie.", "fr": "Impossible de red\u00e9marrer ou de se d\u00e9velopper en raison d''un manque d''argent, de cr\u00e9dit ou d''intrants en nature."}, "label": {"en": "Lack of capital or start-up costs", "es": "Falta de capital o costos de inicio", "fr": "Manque de capital ou co\u00fbts de d\u00e9marrage"}}, {"code": "legal_documentation", "definition": {"en": "Inability to operate due to missing business permit, identity documentation, or legal status.", "es": "Incapacidad de operar debido a la falta de permiso comercial, documentaci\u00f3n de identidad o estatus legal.", "fr": "Incapacit\u00e9 d''exercer en raison de l''absence de permis commercial, de documentation d''identit\u00e9 ou de statut l\u00e9gal."}, "label": {"en": "Lack of legal documents or permits", "es": "Falta de documentos legales o permisos", "fr": "Absence de documents l\u00e9gaux ou permis"}}, {"code": "skills_mismatch", "definition": {"en": "The skills or trade practised before do not have a market or opportunity in the current location.", "es": "Las habilidades u oficio practicados anteriormente no tienen mercado ni oportunidad en la ubicaci\u00f3n actual.", "fr": "Les comp\u00e9tences ou le m\u00e9tier pratiqu\u00e9s auparavant n''ont pas de march\u00e9 ou de d\u00e9bouch\u00e9 dans le lieu actuel."}, "label": {"en": "Skills not applicable in current location", "es": "Habilidades no aplicables en la ubicaci\u00f3n actual", "fr": "Comp\u00e9tences non applicables \u00e0 l''emplacement actuel"}}, {"code": "family_obligations", "definition": {"en": "Caring for dependants, injury, or illness prevents participation in the activity.", "es": "El cuidado de dependientes, lesiones o enfermedades impide la participaci\u00f3n en la actividad.", "fr": "Les soins aux personnes \u00e0 charge, les blessures ou la maladie emp\u00eachent la participation \u00e0 l''activit\u00e9."}, "label": {"en": "Family or care obligations", "es": "Obligaciones familiares o de cuidado", "fr": "Obligations familiales ou de soins"}}, {"code": "discrimination_exclusion", "definition": {"en": "Prevented from practicing the activity due to discrimination (ethnicity, gender, displacement status, religion).", "es": "Impedido de practicar la actividad por discriminaci\u00f3n (etnia, g\u00e9nero, estatus de desplazamiento, religi\u00f3n).", "fr": "Emp\u00each\u00e9 de pratiquer l''activit\u00e9 en raison de discriminations (ethnie, genre, statut de d\u00e9placement, religion)."}, "label": {"en": "Discrimination or social exclusion", "es": "Discriminaci\u00f3n o exclusi\u00f3n social", "fr": "Discrimination ou exclusion sociale"}}, {"code": "other", "definition": {"en": "Barrier not covered by the above categories.", "es": "Barrera no cubierta por las categor\u00edas anteriores.", "fr": "Obstacle non couvert par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
  LivelihoodShockType:
    title:
      en: Livelihood Shock Type
      fr: Type de choc sur les moyens de subsistance
      es: Tipo de impacto sobre los medios de vida
    description:
      en: 'Types of income or livelihood shocks experienced by the household in a reference period. Synthesised from the FAO RIMA-II Adaptive Capacity module''s shock exposure subcomponent, the LSMS-ISA household shock roster, and the Sphere 2018 Livelihoods and Protection chapters on risk exposure. Multi-select by design: households commonly experience multiple co-occurring shocks.'
      fr: 'Types de chocs sur les revenus ou les moyens de subsistance subis par le ménage dans une période de référence. Synthétisé à partir du sous-composant exposition aux chocs du module Capacité adaptative de FAO RIMA-II, du registre des chocs du ménage LSMS-ISA et des chapitres Moyens de subsistance et Protection de Sphère 2018 sur l''exposition aux risques. Sélection multiple par conception : les ménages subissent généralement plusieurs chocs concomitants.'
      es: 'Tipos de impactos sobre los ingresos o los medios de vida experimentados por el hogar en un período de referencia. Sintetizado a partir del subcomponente de exposición a choques del módulo de Capacidad Adaptativa de FAO RIMA-II, el inventario de choques del hogar LSMS-ISA y los capítulos de Medios de Vida y Protección de Esfera 2018 sobre exposición a riesgos. Selección múltiple por diseño: los hogares comúnmente experimentan múltiples choques concurrentes.'
    enum_uri: aidops:LivelihoodShockType
    permissible_values:
      conflict_insecurity:
        title:
          en: Conflict or insecurity
          fr: Conflit ou insécurité
          es: Conflicto o inseguridad
        description:
          en: Household income or livelihoods were disrupted by armed conflict, violence, or insecurity.
          fr: Les revenus ou moyens de subsistance du ménage ont été perturbés par un conflit armé, la violence ou l'insécurité.
          es: Los ingresos o medios de vida del hogar fueron interrumpidos por conflicto armado, violencia o inseguridad.
      displacement_forced_move:
        title:
          en: Displacement or forced move
          fr: Déplacement ou déménagement forcé
          es: Desplazamiento o mudanza forzada
        description:
          en: Loss of income or assets caused directly by being forced to flee or relocate.
          fr: Perte de revenus ou d'actifs causée directement par le fait d'être contraint de fuir ou de se déplacer.
          es: Pérdida de ingresos o activos causada directamente por ser forzados a huir o reubicarse.
      drought_poor_rains:
        title:
          en: Drought or poor rainfall
          fr: Sécheresse ou manque de pluies
          es: Sequía o malas lluvias
        description:
          en: Crop failure or livestock loss due to insufficient rain or prolonged dry spell.
          fr: Échec des cultures ou perte de bétail en raison de pluies insuffisantes ou d'une période de sécheresse prolongée.
          es: Pérdida de cultivos o ganado debido a lluvias insuficientes o sequía prolongada.
      flood_storm:
        title:
          en: Flood or storm
          fr: Inondation ou tempête
          es: Inundación o tormenta
        description:
          en: Damage to crops, assets, or business caused by flooding or extreme weather.
          fr: Dommages aux cultures, actifs ou entreprise causés par des inondations ou des intempéries.
          es: Daños a cultivos, activos o negocio causados por inundaciones o clima extremo.
      illness_injury_death:
        title:
          en: Serious illness, injury, or death of income earner
          fr: Maladie grave, blessure ou décès d'un actif
          es: Enfermedad grave, lesión o muerte de un generador de ingresos
        description:
          en: Loss of income due to illness, injury, or death of a productive household member.
          fr: Perte de revenus due à la maladie, à une blessure ou au décès d'un membre productif du ménage.
          es: Pérdida de ingresos debido a enfermedad, lesión o muerte de un miembro productivo del hogar.
      price_shock:
        title:
          en: Significant price change (food, inputs, or goods)
          fr: Choc de prix significatif (nourriture, intrants ou biens)
          es: Choque de precios significativo (alimentos, insumos o bienes)
        description:
          en: Income reduced because the price of goods sold fell sharply or input costs increased sharply.
          fr: Revenus réduits parce que le prix des biens vendus a fortement chuté ou que les coûts des intrants ont fortement augmenté.
          es: Ingresos reducidos porque el precio de los bienes vendidos cayó bruscamente o los costos de los insumos aumentaron bruscamente.
      job_or_market_loss:
        title:
          en: Job loss or market collapse
          fr: Perte d'emploi ou effondrement du marché
          es: Pérdida de empleo o colapso del mercado
        description:
          en: Loss of employment or destruction of the market where the household sold products or labour.
          fr: Perte d'emploi ou destruction du marché où le ménage vendait ses produits ou sa force de travail.
          es: Pérdida de empleo o destrucción del mercado donde el hogar vendía productos o trabajo.
      asset_theft_loss:
        title:
          en: Theft or loss of assets
          fr: Vol ou perte d'actifs
          es: Robo o pérdida de activos
        description:
          en: Productive or financial assets stolen, destroyed, or lost.
          fr: Actifs productifs ou financiers volés, détruits ou perdus.
          es: Activos productivos o financieros robados, destruidos o perdidos.
      other:
        title:
          en: Other shock
          fr: Autre choc
          es: Otro impacto
        description:
          en: Shock not covered by the above categories.
          fr: Choc non couvert par les catégories ci-dessus.
          es: Choque no cubierto por las categorías anteriores.
