  AapComplaintBarrier:
    title:
      en: 'AAP: Complaint channel barrier'
      fr: 'Redevabilité : Obstacle au canal de plainte'
      es: 'Rendición de cuentas: Barrera del canal de quejas'
    description:
      en: 'Multi-select list of reasons a household reports that it would not use a complaint channel, even if one is available. Derived from the IASC / REACH Menu of AAP Questions 2018 and the GTS global analysis ''Listening is Not Enough'' (2022). Some codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) are PSEA- and safeguarding-adjacent and are used by CHS Alliance audit teams as proxy indicators for an unsafe accountability environment. Properties that use this vocabulary must be flagged `sensitivity: sensitive`.'
      fr: 'Liste à choix multiples des raisons pour lesquelles un ménage rapporte qu''il n''utiliserait pas un canal de plainte, même si un canal est disponible. Dérivée du Menu de questions AAP IASC / REACH 2018 et de l''analyse globale GTS « Listening is Not Enough » (2022). Certains codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) sont liés à la PSEA et à la sauvegarde et sont utilisés par les équipes d''audit de CHS Alliance comme indicateurs indirects d''un environnement de redevabilité peu sûr. Les propriétés utilisant ce vocabulaire doivent être marquées `sensitivity: sensitive`.'
      es: 'Lista de selección múltiple de razones por las que un hogar reporta que no utilizaría un canal de quejas, incluso si hay uno disponible. Derivada del Menú de Preguntas AAP IASC / REACH 2018 y del análisis global de GTS «Listening is Not Enough» (2022). Algunos códigos (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) están relacionados con PSEA y salvaguardia y son utilizados por los equipos de auditoría de CHS Alliance como indicadores indirectos de un entorno de rendición de cuentas inseguro. Las propiedades que utilizan este vocabulario deben marcarse como `sensitivity: sensitive`.'
    enum_uri: aidops:AapComplaintBarrier
    permissible_values:
      dont_know_a_channel:
        title:
          en: Don't know a channel
          fr: Ne connaît pas de canal
          es: No conoce un canal
        description:
          en: Respondent is not aware of any complaint or feedback channel they could use.
          fr: Le répondant n'a connaissance d'aucun canal de plainte ou de retour d'information qu'il pourrait utiliser.
          es: El encuestado no conoce ningún canal de quejas o retroalimentación que pudiera utilizar.
      no_channel_available:
        title:
          en: No channel available
          fr: Aucun canal disponible
          es: Ningún canal disponible
        description:
          en: Respondent reports that no complaint or feedback channel exists in this area.
          fr: Le répondant rapporte qu'aucun canal de plainte ou de retour d'information n'existe dans cette zone.
          es: El encuestado reporta que no existe ningún canal de quejas o retroalimentación en esta zona.
      dont_think_it_would_change_anything:
        title:
          en: Don't think it would change anything
          fr: Ne pense pas que cela changerait quoi que ce soit
          es: No cree que cambiaría nada
        description:
          en: Respondent believes the channel would not produce any change or response.
          fr: Le répondant croit que le canal ne produirait aucun changement ni réponse.
          es: El encuestado cree que el canal no produciría ningún cambio o respuesta.
      fear_of_losing_aid:
        title:
          en: Fear of losing aid
          fr: Peur de perdre l'aide
          es: Miedo a perder la ayuda
        description:
          en: Respondent fears that using the channel would result in their household losing aid or access. This is a well-documented AAP barrier in GTS global analyses.
          fr: Le répondant craint que l'utilisation du canal ne conduise à ce que son ménage perde l'aide ou l'accès. Il s'agit d'un obstacle AAP bien documenté dans les analyses globales de GTS.
          es: El encuestado teme que el uso del canal resulte en que su hogar pierda ayuda o acceso. Es una barrera AAP bien documentada en los análisis globales de GTS.
      fear_of_retaliation_from_staff:
        title:
          en: Fear of retaliation from staff
          fr: Peur de représailles du personnel
          es: Miedo a represalias del personal
        description:
          en: 'Respondent fears that aid provider staff would retaliate against them or their household. This is a PSEA-adjacent indicator: elevated rates should trigger a review of the PSEA framework.'
          fr: 'Le répondant craint que le personnel de l''intervenant ne prenne des représailles contre lui ou son ménage. Il s''agit d''un indicateur proche de la PSEA : des taux élevés devraient déclencher une révision du cadre de PSEA.'
          es: 'El encuestado teme que el personal del actor humanitario tome represalias contra él o su hogar. Es un indicador relacionado con PSEA: tasas elevadas deberían desencadenar una revisión del marco de PSEA.'
      fear_of_retaliation_from_community:
        title:
          en: Fear of retaliation from community
          fr: Peur de représailles de la communauté
          es: Miedo a represalias de la comunidad
        description:
          en: Respondent fears social or other retaliation from within the community if they file a complaint.
          fr: Le répondant craint des représailles sociales ou autres de la part de la communauté s'il dépose une plainte.
          es: El encuestado teme represalias sociales u otras dentro de la comunidad si presenta una queja.
      language_barrier:
        title:
          en: Language barrier
          fr: Barrière linguistique
          es: Barrera lingüística
        description:
          en: The channel is not available in a language the respondent or their household speaks.
          fr: Le canal n'est pas disponible dans une langue que le répondant ou son ménage parle.
          es: El canal no está disponible en un idioma que el encuestado o su hogar habla.
      cost_or_distance:
        title:
          en: Cost or distance
          fr: Coût ou distance
          es: Costo o distancia
        description:
          en: Using the channel would require travel or payment the respondent cannot afford.
          fr: L'utilisation du canal nécessiterait un déplacement ou un paiement que le répondant ne peut pas se permettre.
          es: Usar el canal requeriría un viaje o pago que el encuestado no puede permitirse.
      dont_trust_aid_providers:
        title:
          en: Don't trust aid providers
          fr: Ne fait pas confiance aux intervenants
          es: No confía en los actores humanitarios
        description:
          en: General distrust of aid providers prevents the respondent from engaging with the channel.
          fr: La méfiance générale envers les intervenants empêche le répondant de s'engager avec le canal.
          es: La desconfianza general hacia los actores humanitarios impide que el encuestado interactúe con el canal.
      cultural_or_gender_barrier:
        title:
          en: Cultural or gender barrier
          fr: Obstacle culturel ou de genre
          es: Barrera cultural o de género
        description:
          en: Cultural norms or gendered roles prevent the respondent from using the channel (for example, women cannot speak to male staff unaccompanied).
          fr: Les normes culturelles ou les rôles de genre empêchent le répondant d'utiliser le canal (par exemple, les femmes ne peuvent pas parler à du personnel masculin sans être accompagnées).
          es: Las normas culturales o roles de género impiden que el encuestado utilice el canal (por ejemplo, las mujeres no pueden hablar con personal masculino sin acompañamiento).
      prior_bad_experience:
        title:
          en: Prior bad experience
          fr: Mauvaise expérience antérieure
          es: Mala experiencia previa
        description:
          en: The respondent or someone they know has previously used the channel and had a negative experience.
          fr: Le répondant ou quelqu'un qu'il connaît a déjà utilisé le canal et a eu une expérience négative.
          es: El encuestado o alguien que conoce ha utilizado previamente el canal y tuvo una experiencia negativa.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Barrier not covered by the listed codes.
          fr: Obstacle non couvert par les codes listés.
          es: Barrera no cubierta por los códigos listados.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-caap-2017", "iasc-reach-aap-menu-2018"], "definition": {"en": "Multi-select list of reasons a household reports that it would not use a complaint channel, even if one is available. Derived from the IASC / REACH Menu of AAP Questions 2018 and the GTS global analysis ''Listening is Not Enough'' (2022). Some codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) are PSEA- and safeguarding-adjacent and are used by CHS Alliance audit teams as proxy indicators for an unsafe accountability environment. Properties that use this vocabulary must be flagged `sensitivity: sensitive`.", "es": "Lista de selecci\u00f3n m\u00faltiple de razones por las que un hogar reporta que no utilizar\u00eda un canal de quejas, incluso si hay uno disponible. Derivada del Men\u00fa de Preguntas AAP IASC / REACH 2018 y del an\u00e1lisis global de GTS \u00abListening is Not Enough\u00bb (2022). Algunos c\u00f3digos (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) est\u00e1n relacionados con PSEA y salvaguardia y son utilizados por los equipos de auditor\u00eda de CHS Alliance como indicadores indirectos de un entorno de rendici\u00f3n de cuentas inseguro. Las propiedades que utilizan este vocabulario deben marcarse como `sensitivity: sensitive`.", "fr": "Liste \u00e0 choix multiples des raisons pour lesquelles un m\u00e9nage rapporte qu''il n''utiliserait pas un canal de plainte, m\u00eame si un canal est disponible. D\u00e9riv\u00e9e du Menu de questions AAP IASC / REACH 2018 et de l''analyse globale GTS \u00ab Listening is Not Enough \u00bb (2022). Certains codes (`fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, `dont_trust_aid_providers`) sont li\u00e9s \u00e0 la PSEA et \u00e0 la sauvegarde et sont utilis\u00e9s par les \u00e9quipes d''audit de CHS Alliance comme indicateurs indirects d''un environnement de redevabilit\u00e9 peu s\u00fbr. Les propri\u00e9t\u00e9s utilisant ce vocabulaire doivent \u00eatre marqu\u00e9es `sensitivity: sensitive`."}, "id": "aap-complaint-barrier", "label": {"en": "AAP: Complaint channel barrier", "es": "Rendici\u00f3n de cuentas: Barrera del canal de quejas", "fr": "Redevabilit\u00e9 : Obstacle au canal de plainte"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Barrier typology extended by the GTS global analysis ''Listening is Not Enough'' (2022).", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "dont_know_a_channel", "definition": {"en": "Respondent is not aware of any complaint or feedback channel they could use.", "es": "El encuestado no conoce ning\u00fan canal de quejas o retroalimentaci\u00f3n que pudiera utilizar.", "fr": "Le r\u00e9pondant n''a connaissance d''aucun canal de plainte ou de retour d''information qu''il pourrait utiliser."}, "label": {"en": "Don''t know a channel", "es": "No conoce un canal", "fr": "Ne conna\u00eet pas de canal"}}, {"code": "no_channel_available", "definition": {"en": "Respondent reports that no complaint or feedback channel exists in this area.", "es": "El encuestado reporta que no existe ning\u00fan canal de quejas o retroalimentaci\u00f3n en esta zona.", "fr": "Le r\u00e9pondant rapporte qu''aucun canal de plainte ou de retour d''information n''existe dans cette zone."}, "label": {"en": "No channel available", "es": "Ning\u00fan canal disponible", "fr": "Aucun canal disponible"}}, {"code": "dont_think_it_would_change_anything", "definition": {"en": "Respondent believes the channel would not produce any change or response.", "es": "El encuestado cree que el canal no producir\u00eda ning\u00fan cambio o respuesta.", "fr": "Le r\u00e9pondant croit que le canal ne produirait aucun changement ni r\u00e9ponse."}, "label": {"en": "Don''t think it would change anything", "es": "No cree que cambiar\u00eda nada", "fr": "Ne pense pas que cela changerait quoi que ce soit"}}, {"code": "fear_of_losing_aid", "definition": {"en": "Respondent fears that using the channel would result in their household losing aid or access. This is a well-documented AAP barrier in GTS global analyses.", "es": "El encuestado teme que el uso del canal resulte en que su hogar pierda ayuda o acceso. Es una barrera AAP bien documentada en los an\u00e1lisis globales de GTS.", "fr": "Le r\u00e9pondant craint que l''utilisation du canal ne conduise \u00e0 ce que son m\u00e9nage perde l''aide ou l''acc\u00e8s. Il s''agit d''un obstacle AAP bien document\u00e9 dans les analyses globales de GTS."}, "label": {"en": "Fear of losing aid", "es": "Miedo a perder la ayuda", "fr": "Peur de perdre l''aide"}}, {"code": "fear_of_retaliation_from_staff", "definition": {"en": "Respondent fears that aid provider staff would retaliate against them or their household. This is a PSEA-adjacent indicator: elevated rates should trigger a review of the PSEA framework.", "es": "El encuestado teme que el personal del actor humanitario tome represalias contra \u00e9l o su hogar. Es un indicador relacionado con PSEA: tasas elevadas deber\u00edan desencadenar una revisi\u00f3n del marco de PSEA.", "fr": "Le r\u00e9pondant craint que le personnel de l''intervenant ne prenne des repr\u00e9sailles contre lui ou son m\u00e9nage. Il s''agit d''un indicateur proche de la PSEA : des taux \u00e9lev\u00e9s devraient d\u00e9clencher une r\u00e9vision du cadre de PSEA."}, "label": {"en": "Fear of retaliation from staff", "es": "Miedo a represalias del personal", "fr": "Peur de repr\u00e9sailles du personnel"}}, {"code": "fear_of_retaliation_from_community", "definition": {"en": "Respondent fears social or other retaliation from within the community if they file a complaint.", "es": "El encuestado teme represalias sociales u otras dentro de la comunidad si presenta una queja.", "fr": "Le r\u00e9pondant craint des repr\u00e9sailles sociales ou autres de la part de la communaut\u00e9 s''il d\u00e9pose une plainte."}, "label": {"en": "Fear of retaliation from community", "es": "Miedo a represalias de la comunidad", "fr": "Peur de repr\u00e9sailles de la communaut\u00e9"}}, {"code": "language_barrier", "definition": {"en": "The channel is not available in a language the respondent or their household speaks.", "es": "El canal no est\u00e1 disponible en un idioma que el encuestado o su hogar habla.", "fr": "Le canal n''est pas disponible dans une langue que le r\u00e9pondant ou son m\u00e9nage parle."}, "label": {"en": "Language barrier", "es": "Barrera ling\u00fc\u00edstica", "fr": "Barri\u00e8re linguistique"}}, {"code": "cost_or_distance", "definition": {"en": "Using the channel would require travel or payment the respondent cannot afford.", "es": "Usar el canal requerir\u00eda un viaje o pago que el encuestado no puede permitirse.", "fr": "L''utilisation du canal n\u00e9cessiterait un d\u00e9placement ou un paiement que le r\u00e9pondant ne peut pas se permettre."}, "label": {"en": "Cost or distance", "es": "Costo o distancia", "fr": "Co\u00fbt ou distance"}}, {"code": "dont_trust_aid_providers", "definition": {"en": "General distrust of aid providers prevents the respondent from engaging with the channel.", "es": "La desconfianza general hacia los actores humanitarios impide que el encuestado interact\u00fae con el canal.", "fr": "La m\u00e9fiance g\u00e9n\u00e9rale envers les intervenants emp\u00eache le r\u00e9pondant de s''engager avec le canal."}, "label": {"en": "Don''t trust aid providers", "es": "No conf\u00eda en los actores humanitarios", "fr": "Ne fait pas confiance aux intervenants"}}, {"code": "cultural_or_gender_barrier", "definition": {"en": "Cultural norms or gendered roles prevent the respondent from using the channel (for example, women cannot speak to male staff unaccompanied).", "es": "Las normas culturales o roles de g\u00e9nero impiden que el encuestado utilice el canal (por ejemplo, las mujeres no pueden hablar con personal masculino sin acompa\u00f1amiento).", "fr": "Les normes culturelles ou les r\u00f4les de genre emp\u00eachent le r\u00e9pondant d''utiliser le canal (par exemple, les femmes ne peuvent pas parler \u00e0 du personnel masculin sans \u00eatre accompagn\u00e9es)."}, "label": {"en": "Cultural or gender barrier", "es": "Barrera cultural o de g\u00e9nero", "fr": "Obstacle culturel ou de genre"}}, {"code": "prior_bad_experience", "definition": {"en": "The respondent or someone they know has previously used the channel and had a negative experience.", "es": "El encuestado o alguien que conoce ha utilizado previamente el canal y tuvo una experiencia negativa.", "fr": "Le r\u00e9pondant ou quelqu''un qu''il conna\u00eet a d\u00e9j\u00e0 utilis\u00e9 le canal et a eu une exp\u00e9rience n\u00e9gative."}, "label": {"en": "Prior bad experience", "es": "Mala experiencia previa", "fr": "Mauvaise exp\u00e9rience ant\u00e9rieure"}}, {"code": "other", "definition": {"en": "Barrier not covered by the listed codes.", "es": "Barrera no cubierta por los c\u00f3digos listados.", "fr": "Obstacle non couvert par les codes list\u00e9s."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
