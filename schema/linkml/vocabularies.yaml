  FcsFoodGroup:
    title:
      en: FCS Food Group
      fr: Groupe alimentaire FCS
      es: Grupo alimentario FCS
    description:
      en: The eight scored food groups used by the WFP Food Consumption Score (FCS), plus condiments as a non-scoring screener. Each group is scored by the number of days (0-7) the household consumed items from that group in the past seven days; the group's weight converts days-of-consumption into the composite FCS. Meat, fish, and eggs form a single combined protein group in the standard WFP FCS questionnaire. The weights below are the WFP VAM 2008 weights and are treated as part of the instrument definition, not a programming decision.
      fr: Les huit groupes alimentaires notés utilisés par le Score de consommation alimentaire (FCS) du PAM, plus les condiments comme item de dépistage non noté. Chaque groupe est noté par le nombre de jours (0-7) de consommation par le ménage durant les sept derniers jours ; le poids du groupe convertit les jours de consommation en FCS composite. La viande, le poisson et les œufs forment un seul groupe protéique combiné dans le questionnaire FCS standard du PAM. Les poids ci-dessous sont les poids VAM 2008 du PAM et sont considérés comme partie intégrante de la définition de l'instrument, non comme une décision de programmation.
      es: Los ocho grupos alimentarios puntuados utilizados por el Puntaje de Consumo de Alimentos (FCS) del PMA, más los condimentos como ítem de detección no puntuado. Cada grupo se puntúa por el número de días (0-7) que el hogar consumió alimentos de ese grupo durante los últimos siete días; el peso del grupo convierte los días de consumo en el FCS compuesto. La carne, el pescado y los huevos forman un único grupo proteico combinado en el cuestionario FCS estándar del PMA. Los pesos abajo son los pesos VAM 2008 del PMA y se consideran parte de la definición del instrumento, no una decisión de programación.
    enum_uri: aidops:FcsFoodGroup
    permissible_values:
