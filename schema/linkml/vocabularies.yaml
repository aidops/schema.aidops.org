  VetAccessLevel:
    title:
      en: Veterinary Services Access Level
      fr: Niveau d'accès aux services vétérinaires
      es: Nivel de acceso a servicios veterinarios
    description:
      en: 'Consistency of access to veterinary or animal health services when the household''s livestock needed them. Used in PastoralFoodSecurityProfile `vet_services_access`. This 5-level scale adds granularity to the binary AgricultureProfile `livestock_vet_access` (yes/no) item. Compatibility mapping: `always_accessed` and `mostly_accessed` map to yes in the AgricultureProfile binary; `rarely_accessed` and `never_accessed` map to no; `sometimes_accessed` is the nuance the binary cannot capture.'
      fr: 'Régularité de l''accès aux services vétérinaires ou de santé animale lorsque le bétail du ménage en avait besoin. Ajoute une granularité à l''item binaire `livestock_vet_access` du AgricultureProfile. Correspondance : `always_accessed` et `mostly_accessed` correspondent à oui ; `rarely_accessed` et `never_accessed` correspondent à non.'
      es: 'Consistencia del acceso a servicios veterinarios o de salud animal cuando el ganado del hogar los necesitaba. Añade granularidad al ítem binario `livestock_vet_access` de AgricultureProfile. Correspondencia: `always_accessed` y `mostly_accessed` corresponden a sí; `rarely_accessed` y `never_accessed` corresponden a no.'
    enum_uri: aidops:VetAccessLevel
    permissible_values:
      always_accessed:
        title:
          en: Always — accessed services every time needed
          fr: Toujours — services accessibles chaque fois que nécessaire
          es: Siempre — accedió a los servicios cada vez que fue necesario
        description:
          en: Full access to veterinary services throughout the recall period; no gaps. Maps to yes in AgricultureProfile binary.
          fr: Accès complet aux services vétérinaires tout au long de la période de rappel ; aucune lacune. Correspond à oui dans le binaire AgricultureProfile.
          es: Acceso completo a servicios veterinarios durante todo el período de recordatorio; sin brechas. Corresponde a sí en el binario de AgricultureProfile.
      mostly_accessed:
        title:
          en: Mostly — accessed services most of the time
          fr: Souvent — services accessibles la plupart du temps
          es: Mayormente — accedió a los servicios la mayor parte del tiempo
        description:
          en: Access achieved in most but not all cases; minor gaps. Maps to yes in AgricultureProfile binary.
          fr: Accès obtenu dans la plupart des cas mais pas tous ; lacunes mineures. Correspond à oui dans le binaire AgricultureProfile.
          es: Acceso logrado en la mayoría de los casos pero no en todos; brechas menores. Corresponde a sí en el binario de AgricultureProfile.
      sometimes_accessed:
        title:
          en: Sometimes — accessed services about half the time
          fr: Parfois — services accessibles environ la moitié du temps
          es: A veces — accedió a los servicios aproximadamente la mitad del tiempo
        description:
          en: Inconsistent access; significant service gaps experienced. This is the granularity the AgricultureProfile binary cannot capture.
          fr: Accès inconsistant ; lacunes de service significatives. Il s'agit de la granularité que le binaire AgricultureProfile ne peut pas capturer.
          es: Acceso inconsistente; brechas de servicio significativas experimentadas. Esta es la granularidad que el binario de AgricultureProfile no puede capturar.
      rarely_accessed:
        title:
          en: Rarely — almost never able to access services
          fr: Rarement — presque jamais en mesure d'accéder aux services
          es: Raramente — casi nunca pudo acceder a los servicios
        description:
          en: Structural access failure; household largely unable to access veterinary care. Maps to no in AgricultureProfile binary.
          fr: Défaillance structurelle de l'accès ; le ménage est largement incapable d'accéder aux soins vétérinaires. Correspond à non dans le binaire AgricultureProfile.
          es: Fallo estructural de acceso; el hogar es en gran medida incapaz de acceder a la atención veterinaria. Corresponde a no en el binario de AgricultureProfile.
      never_accessed:
        title:
          en: Never — no access at all during the recall period
          fr: Jamais — aucun accès du tout pendant la période de rappel
          es: Nunca — sin acceso en absoluto durante el período de recordatorio
        description:
          en: Complete absence of veterinary service access during the recall period. Maps to no in AgricultureProfile binary.
          fr: Absence complète d'accès aux services vétérinaires pendant la période de rappel. Correspond à non dans le binaire AgricultureProfile.
          es: Ausencia completa de acceso a servicios veterinarios durante el período de recordatorio. Corresponde a no en el binario de AgricultureProfile.
      no_need:
        title:
          en: No need — livestock did not require veterinary care
          fr: Pas besoin — le bétail n'a pas nécessité de soins vétérinaires
          es: Sin necesidad — el ganado no requirió atención veterinaria
        description:
          en: Household did not seek veterinary care because animals were healthy throughout the recall period.
          fr: Le ménage n'a pas eu recours aux soins vétérinaires parce que les animaux étaient en bonne santé tout au long de la période de rappel.
          es: El hogar no buscó atención veterinaria porque los animales estuvieron sanos durante todo el período de recordatorio.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "rima-ii-fao-2016-pastoral", "sphere-handbook-2018-legs"], "definition": {"en": "Consistency of access to veterinary or animal health services when the household''s livestock needed them. Used in PastoralFoodSecurityProfile `vet_services_access`. This 5-level scale adds granularity to the binary AgricultureProfile `livestock_vet_access` (yes/no) item. Compatibility mapping: `always_accessed` and `mostly_accessed` map to yes in the AgricultureProfile binary; `rarely_accessed` and `never_accessed` map to no; `sometimes_accessed` is the nuance the binary cannot capture.", "es": "Consistencia del acceso a servicios veterinarios o de salud animal cuando el ganado del hogar los necesitaba. A\u00f1ade granularidad al \u00edtem binario `livestock_vet_access` de AgricultureProfile. Correspondencia: `always_accessed` y `mostly_accessed` corresponden a s\u00ed; `rarely_accessed` y `never_accessed` corresponden a no.", "fr": "R\u00e9gularit\u00e9 de l''acc\u00e8s aux services v\u00e9t\u00e9rinaires ou de sant\u00e9 animale lorsque le b\u00e9tail du m\u00e9nage en avait besoin. Ajoute une granularit\u00e9 \u00e0 l''item binaire `livestock_vet_access` du AgricultureProfile. Correspondance : `always_accessed` et `mostly_accessed` correspondent \u00e0 oui ; `rarely_accessed` et `never_accessed` correspondent \u00e0 non."}, "id": "vet-access-level", "label": {"en": "Veterinary Services Access Level", "es": "Nivel de acceso a servicios veterinarios", "fr": "Niveau d''acc\u00e8s aux services v\u00e9t\u00e9rinaires"}, "maturity": "draft", "values": [{"code": "always_accessed", "definition": {"en": "Full access to veterinary services throughout the recall period; no gaps. Maps to yes in AgricultureProfile binary.", "es": "Acceso completo a servicios veterinarios durante todo el per\u00edodo de recordatorio; sin brechas. Corresponde a s\u00ed en el binario de AgricultureProfile.", "fr": "Acc\u00e8s complet aux services v\u00e9t\u00e9rinaires tout au long de la p\u00e9riode de rappel ; aucune lacune. Correspond \u00e0 oui dans le binaire AgricultureProfile."}, "label": {"en": "Always \u2014 accessed services every time needed", "es": "Siempre \u2014 accedi\u00f3 a los servicios cada vez que fue necesario", "fr": "Toujours \u2014 services accessibles chaque fois que n\u00e9cessaire"}}, {"code": "mostly_accessed", "definition": {"en": "Access achieved in most but not all cases; minor gaps. Maps to yes in AgricultureProfile binary.", "es": "Acceso logrado en la mayor\u00eda de los casos pero no en todos; brechas menores. Corresponde a s\u00ed en el binario de AgricultureProfile.", "fr": "Acc\u00e8s obtenu dans la plupart des cas mais pas tous ; lacunes mineures. Correspond \u00e0 oui dans le binaire AgricultureProfile."}, "label": {"en": "Mostly \u2014 accessed services most of the time", "es": "Mayormente \u2014 accedi\u00f3 a los servicios la mayor parte del tiempo", "fr": "Souvent \u2014 services accessibles la plupart du temps"}}, {"code": "sometimes_accessed", "definition": {"en": "Inconsistent access; significant service gaps experienced. This is the granularity the AgricultureProfile binary cannot capture.", "es": "Acceso inconsistente; brechas de servicio significativas experimentadas. Esta es la granularidad que el binario de AgricultureProfile no puede capturar.", "fr": "Acc\u00e8s inconsistant ; lacunes de service significatives. Il s''agit de la granularit\u00e9 que le binaire AgricultureProfile ne peut pas capturer."}, "label": {"en": "Sometimes \u2014 accessed services about half the time", "es": "A veces \u2014 accedi\u00f3 a los servicios aproximadamente la mitad del tiempo", "fr": "Parfois \u2014 services accessibles environ la moiti\u00e9 du temps"}}, {"code": "rarely_accessed", "definition": {"en": "Structural access failure; household largely unable to access veterinary care. Maps to no in AgricultureProfile binary.", "es": "Fallo estructural de acceso; el hogar es en gran medida incapaz de acceder a la atenci\u00f3n veterinaria. Corresponde a no en el binario de AgricultureProfile.", "fr": "D\u00e9faillance structurelle de l''acc\u00e8s ; le m\u00e9nage est largement incapable d''acc\u00e9der aux soins v\u00e9t\u00e9rinaires. Correspond \u00e0 non dans le binaire AgricultureProfile."}, "label": {"en": "Rarely \u2014 almost never able to access services", "es": "Raramente \u2014 casi nunca pudo acceder a los servicios", "fr": "Rarement \u2014 presque jamais en mesure d''acc\u00e9der aux services"}}, {"code": "never_accessed", "definition": {"en": "Complete absence of veterinary service access during the recall period. Maps to no in AgricultureProfile binary.", "es": "Ausencia completa de acceso a servicios veterinarios durante el per\u00edodo de recordatorio. Corresponde a no en el binario de AgricultureProfile.", "fr": "Absence compl\u00e8te d''acc\u00e8s aux services v\u00e9t\u00e9rinaires pendant la p\u00e9riode de rappel. Correspond \u00e0 non dans le binaire AgricultureProfile."}, "label": {"en": "Never \u2014 no access at all during the recall period", "es": "Nunca \u2014 sin acceso en absoluto durante el per\u00edodo de recordatorio", "fr": "Jamais \u2014 aucun acc\u00e8s du tout pendant la p\u00e9riode de rappel"}}, {"code": "no_need", "definition": {"en": "Household did not seek veterinary care because animals were healthy throughout the recall period.", "es": "El hogar no busc\u00f3 atenci\u00f3n veterinaria porque los animales estuvieron sanos durante todo el per\u00edodo de recordatorio.", "fr": "Le m\u00e9nage n''a pas eu recours aux soins v\u00e9t\u00e9rinaires parce que les animaux \u00e9taient en bonne sant\u00e9 tout au long de la p\u00e9riode de rappel."}, "label": {"en": "No need \u2014 livestock did not require veterinary care", "es": "Sin necesidad \u2014 el ganado no requiri\u00f3 atenci\u00f3n veterinaria", "fr": "Pas besoin \u2014 le b\u00e9tail n''a pas n\u00e9cessit\u00e9 de soins v\u00e9t\u00e9rinaires"}}]}'
