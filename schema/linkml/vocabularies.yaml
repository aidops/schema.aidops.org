  GrowthReference:
    title:
      en: Growth Reference
      fr: Référence de croissance
      es: Referencia de crecimiento
    description:
      en: The reference population used to derive z-scores and band classifications from anthropometric measurements. Different references produce different z-scores for the same raw measurement, so the reference must travel with the derived values.
      fr: La population de référence utilisée pour dériver les z-scores et les classifications par bandes à partir des mesures anthropométriques. Des références différentes produisent des z-scores différents pour une même mesure brute ; la référence doit donc accompagner les valeurs dérivées.
      es: La población de referencia utilizada para derivar z-scores y clasificaciones por bandas a partir de mediciones antropométricas. Referencias diferentes producen z-scores diferentes para una misma medición bruta, por lo que la referencia debe acompañar a los valores derivados.
    enum_uri: aidops:GrowthReference
    permissible_values:
      who_2006:
        title:
          en: WHO Child Growth Standards (2006)
          fr: Normes OMS de croissance de l'enfant (2006)
          es: Estándares OMS de Crecimiento Infantil (2006)
        description:
          en: Reference for children 0-59 months. The default for most humanitarian, national surveillance, and public-health anthropometry today.
          fr: Référence pour les enfants de 0 à 59 mois. Par défaut pour la plupart des applications anthropométriques humanitaires, de surveillance nationale et de santé publique aujourd'hui.
          es: Referencia para niños de 0 a 59 meses. Valor por defecto para la mayoría de aplicaciones antropométricas humanitarias, de vigilancia nacional y de salud pública hoy en día.
      who_2007:
        title:
          en: WHO Growth Reference (2007)
          fr: Référence OMS de croissance (2007)
          es: Referencia OMS de Crecimiento (2007)
        description:
          en: Reference for school-age children and adolescents (5-19 years). Uses BMI-for-age rather than weight-for-height.
          fr: Référence pour les enfants d'âge scolaire et adolescents (5-19 ans). Utilise l'IMC-pour-âge plutôt que le poids-pour-taille.
          es: Referencia para niños en edad escolar y adolescentes (5-19 años). Utiliza IMC-para-edad en lugar de peso-para-talla.
      cdc_2000:
        title:
          en: CDC 2000 Growth Charts
          fr: Courbes de croissance CDC 2000
          es: Gráficas de crecimiento CDC 2000
        description:
          en: 'US CDC growth charts, widely used in the United States. Not interchangeable with the WHO 2006 standards: the same raw weight-for-height can classify differently under the two references.'
          fr: 'Courbes de croissance des CDC des États-Unis, largement utilisées aux États-Unis. Non interchangeables avec les normes OMS 2006 : un même poids-pour-taille brut peut être classé différemment selon les deux références.'
          es: 'Gráficas de crecimiento de los CDC de EE. UU., ampliamente utilizadas en Estados Unidos. No intercambiables con los estándares OMS 2006: un mismo peso-para-talla bruto puede clasificarse de manera diferente según las dos referencias.'
      nchs_1977:
        title:
          en: NCHS/WHO 1977 Growth Reference
          fr: Référence de croissance NCHS/OMS 1977
          es: Referencia de crecimiento NCHS/OMS 1977
        description:
          en: Legacy reference. Still present in historical datasets; superseded for active use by WHO 2006.
          fr: Référence historique. Encore présente dans les jeux de données anciens ; remplacée pour un usage actif par l'OMS 2006.
          es: Referencia heredada. Aún presente en conjuntos de datos históricos; reemplazada para uso activo por la OMS 2006.
      other:
        title:
          en: Other
          fr: Autre
          es: Otra
        description:
          en: A named reference not listed above. Use only when the actual reference is known and documented elsewhere on the record.
          fr: Une référence nommée non listée ci-dessus. À utiliser uniquement lorsque la référence effective est connue et documentée ailleurs dans l'enregistrement.
          es: Una referencia nombrada no listada arriba. Utilice solo cuando la referencia real sea conocida y esté documentada en otra parte del registro.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology", "who-child-growth-standards"], "definition": {"en": "The reference population used to derive z-scores and band classifications from anthropometric measurements. Different references produce different z-scores for the same raw measurement, so the reference must travel with the derived values.", "es": "La poblaci\u00f3n de referencia utilizada para derivar z-scores y clasificaciones por bandas a partir de mediciones antropom\u00e9tricas. Referencias diferentes producen z-scores diferentes para una misma medici\u00f3n bruta, por lo que la referencia debe acompa\u00f1ar a los valores derivados.", "fr": "La population de r\u00e9f\u00e9rence utilis\u00e9e pour d\u00e9river les z-scores et les classifications par bandes \u00e0 partir des mesures anthropom\u00e9triques. Des r\u00e9f\u00e9rences diff\u00e9rentes produisent des z-scores diff\u00e9rents pour une m\u00eame mesure brute ; la r\u00e9f\u00e9rence doit donc accompagner les valeurs d\u00e9riv\u00e9es."}, "id": "growth-reference", "label": {"en": "Growth Reference", "es": "Referencia de crecimiento", "fr": "R\u00e9f\u00e9rence de croissance"}, "maturity": "draft", "standard": {"name": "WHO Child Growth Standards and Growth Reference", "notes": "WHO publishes two references: the 2006 Child Growth Standards for children 0-59 months and the 2007 Growth Reference for school-age children and adolescents (5-19 years). The CDC 2000 Growth Charts and the earlier NCHS/WHO 1977 reference are still encountered in US and historical datasets.", "uri": "https://www.who.int/tools/child-growth-standards"}, "values": [{"code": "who_2006", "definition": {"en": "Reference for children 0-59 months. The default for most humanitarian, national surveillance, and public-health anthropometry today.", "es": "Referencia para ni\u00f1os de 0 a 59 meses. Valor por defecto para la mayor\u00eda de aplicaciones antropom\u00e9tricas humanitarias, de vigilancia nacional y de salud p\u00fablica hoy en d\u00eda.", "fr": "R\u00e9f\u00e9rence pour les enfants de 0 \u00e0 59 mois. Par d\u00e9faut pour la plupart des applications anthropom\u00e9triques humanitaires, de surveillance nationale et de sant\u00e9 publique aujourd''hui."}, "label": {"en": "WHO Child Growth Standards (2006)", "es": "Est\u00e1ndares OMS de Crecimiento Infantil (2006)", "fr": "Normes OMS de croissance de l''enfant (2006)"}}, {"code": "who_2007", "definition": {"en": "Reference for school-age children and adolescents (5-19 years). Uses BMI-for-age rather than weight-for-height.", "es": "Referencia para ni\u00f1os en edad escolar y adolescentes (5-19 a\u00f1os). Utiliza IMC-para-edad en lugar de peso-para-talla.", "fr": "R\u00e9f\u00e9rence pour les enfants d''\u00e2ge scolaire et adolescents (5-19 ans). Utilise l''IMC-pour-\u00e2ge plut\u00f4t que le poids-pour-taille."}, "label": {"en": "WHO Growth Reference (2007)", "es": "Referencia OMS de Crecimiento (2007)", "fr": "R\u00e9f\u00e9rence OMS de croissance (2007)"}}, {"code": "cdc_2000", "definition": {"en": "US CDC growth charts, widely used in the United States. Not interchangeable with the WHO 2006 standards: the same raw weight-for-height can classify differently under the two references.", "es": "Gr\u00e1ficas de crecimiento de los CDC de EE. UU., ampliamente utilizadas en Estados Unidos. No intercambiables con los est\u00e1ndares OMS 2006: un mismo peso-para-talla bruto puede clasificarse de manera diferente seg\u00fan las dos referencias.", "fr": "Courbes de croissance des CDC des \u00c9tats-Unis, largement utilis\u00e9es aux \u00c9tats-Unis. Non interchangeables avec les normes OMS 2006 : un m\u00eame poids-pour-taille brut peut \u00eatre class\u00e9 diff\u00e9remment selon les deux r\u00e9f\u00e9rences."}, "label": {"en": "CDC 2000 Growth Charts", "es": "Gr\u00e1ficas de crecimiento CDC 2000", "fr": "Courbes de croissance CDC 2000"}}, {"code": "nchs_1977", "definition": {"en": "Legacy reference. Still present in historical datasets; superseded for active use by WHO 2006.", "es": "Referencia heredada. A\u00fan presente en conjuntos de datos hist\u00f3ricos; reemplazada para uso activo por la OMS 2006.", "fr": "R\u00e9f\u00e9rence historique. Encore pr\u00e9sente dans les jeux de donn\u00e9es anciens ; remplac\u00e9e pour un usage actif par l''OMS 2006."}, "label": {"en": "NCHS/WHO 1977 Growth Reference", "es": "Referencia de crecimiento NCHS/OMS 1977", "fr": "R\u00e9f\u00e9rence de croissance NCHS/OMS 1977"}}, {"code": "other", "definition": {"en": "A named reference not listed above. Use only when the actual reference is known and documented elsewhere on the record.", "es": "Una referencia nombrada no listada arriba. Utilice solo cuando la referencia real sea conocida y est\u00e9 documentada en otra parte del registro.", "fr": "Une r\u00e9f\u00e9rence nomm\u00e9e non list\u00e9e ci-dessus. \u00c0 utiliser uniquement lorsque la r\u00e9f\u00e9rence effective est connue et document\u00e9e ailleurs dans l''enregistrement."}, "label": {"en": "Other", "es": "Otra", "fr": "Autre"}}]}'
