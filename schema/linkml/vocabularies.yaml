  FertilizerUseType:
    title:
      en: Fertilizer Use Type
      fr: Type d'utilisation d'engrais
      es: Tipo de uso de fertilizante
    description:
      en: Type of fertilizer used by the household on any of its crops during the last completed agricultural season. Combines 'chemical only', 'organic only', 'both', 'no', and 'don't know' into a single response slot so a household that used, for example, only manure is correctly classified as organic rather than as chemical-fertilizer non-user. Based on FAO WCA 2020 Vol.I Items 0322 (use of chemical fertilizer) and 0323 (use of organic fertilizer), collapsed into a single categorical response for household-level rapid assessment.
      fr: Type d'engrais utilisé par le ménage sur ses cultures au cours de la dernière saison agricole complète. Combine « chimique uniquement », « organique uniquement », « les deux », « aucun » et « ne sait pas » en un seul emplacement de réponse afin qu'un ménage utilisant par exemple uniquement du fumier soit correctement classé comme organique plutôt que comme non-utilisateur d'engrais chimiques. Basé sur les items 0322 (utilisation d'engrais chimique) et 0323 (utilisation d'engrais organique) du Volume I du WCA 2020 de la FAO, regroupés en une seule réponse catégorielle pour l'évaluation rapide au niveau du ménage.
      es: Tipo de fertilizante utilizado por el hogar en alguno de sus cultivos durante la última temporada agrícola completa. Combina 'solo químico', 'solo orgánico', 'ambos', 'ninguno' y 'no sabe' en un único campo de respuesta para que un hogar que usó, por ejemplo, solo estiércol sea correctamente clasificado como orgánico en lugar de como no-usuario de fertilizante químico. Basado en los ítems 0322 (uso de fertilizante químico) y 0323 (uso de fertilizante orgánico) del Volumen I del WCA 2020 de la FAO, colapsados en una sola respuesta categórica para la evaluación rápida a nivel del hogar.
    enum_uri: aidops:FertilizerUseType
    permissible_values:
      chemical_only:
        title:
          en: Chemical fertilizer only
          fr: Engrais chimique uniquement
          es: Fertilizante químico únicamente
        description:
          en: Household used only synthetic or mineral fertilizers.
          fr: Le ménage n'a utilisé que des engrais synthétiques ou minéraux.
          es: El hogar usó solo fertilizantes sintéticos o minerales.
      organic_only:
        title:
          en: Organic fertilizer only
          fr: Engrais organique uniquement
          es: Fertilizante orgánico únicamente
        description:
          en: Household used only organic inputs such as manure, compost, or green manure.
          fr: Le ménage n'a utilisé que des intrants organiques tels que le fumier, le compost ou l'engrais vert.
          es: El hogar usó solo insumos orgánicos como estiércol, compost o abono verde.
      both:
        title:
          en: Both chemical and organic
          fr: Les deux — chimique et organique
          es: Ambos — químico y orgánico
        description:
          en: Household used both chemical and organic fertilizer.
          fr: Le ménage a utilisé à la fois des engrais chimiques et organiques.
          es: El hogar usó tanto fertilizantes químicos como orgánicos.
      'no':
        title:
          en: No fertilizer used
          fr: Aucun engrais utilisé
          es: No usó fertilizante
        description:
          en: Household did not use any fertilizer.
          fr: Le ménage n'a utilisé aucun engrais.
          es: El hogar no usó ningún fertilizante.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot confirm fertilizer use. Retained as a distinct valid response.
          fr: Le répondant ne peut pas confirmer l'utilisation d'engrais. Conservée comme réponse valide distincte.
          es: El encuestado no puede confirmar el uso de fertilizante. Se mantiene como respuesta válida distinta.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Type of fertilizer used by the household on any of its crops during the last completed agricultural season. Combines ''chemical only'', ''organic only'', ''both'', ''no'', and ''don''t know'' into a single response slot so a household that used, for example, only manure is correctly classified as organic rather than as chemical-fertilizer non-user. Based on FAO WCA 2020 Vol.I Items 0322 (use of chemical fertilizer) and 0323 (use of organic fertilizer), collapsed into a single categorical response for household-level rapid assessment.", "es": "Tipo de fertilizante utilizado por el hogar en alguno de sus cultivos durante la \u00faltima temporada agr\u00edcola completa. Combina ''solo qu\u00edmico'', ''solo org\u00e1nico'', ''ambos'', ''ninguno'' y ''no sabe'' en un \u00fanico campo de respuesta para que un hogar que us\u00f3, por ejemplo, solo esti\u00e9rcol sea correctamente clasificado como org\u00e1nico en lugar de como no-usuario de fertilizante qu\u00edmico. Basado en los \u00edtems 0322 (uso de fertilizante qu\u00edmico) y 0323 (uso de fertilizante org\u00e1nico) del Volumen I del WCA 2020 de la FAO, colapsados en una sola respuesta categ\u00f3rica para la evaluaci\u00f3n r\u00e1pida a nivel del hogar.", "fr": "Type d''engrais utilis\u00e9 par le m\u00e9nage sur ses cultures au cours de la derni\u00e8re saison agricole compl\u00e8te. Combine \u00ab chimique uniquement \u00bb, \u00ab organique uniquement \u00bb, \u00ab les deux \u00bb, \u00ab aucun \u00bb et \u00ab ne sait pas \u00bb en un seul emplacement de r\u00e9ponse afin qu''un m\u00e9nage utilisant par exemple uniquement du fumier soit correctement class\u00e9 comme organique plut\u00f4t que comme non-utilisateur d''engrais chimiques. Bas\u00e9 sur les items 0322 (utilisation d''engrais chimique) et 0323 (utilisation d''engrais organique) du Volume I du WCA 2020 de la FAO, regroup\u00e9s en une seule r\u00e9ponse cat\u00e9gorielle pour l''\u00e9valuation rapide au niveau du m\u00e9nage."}, "id": "fertilizer-use-type", "label": {"en": "Fertilizer Use Type", "es": "Tipo de uso de fertilizante", "fr": "Type d''utilisation d''engrais"}, "maturity": "draft", "standard": {"name": "FAO World Programme for the Census of Agriculture 2020 \u2014 Vol. I", "notes": "The four-way fertilizer-use classification (chemical-only, organic-only, both, none) is a household-survey simplification of FAO WCA 2020 Items 0322 and 0323.", "uri": "https://www.fao.org/world-census-agriculture/wcarounds/wca2020/en/"}, "values": [{"code": "chemical_only", "definition": {"en": "Household used only synthetic or mineral fertilizers.", "es": "El hogar us\u00f3 solo fertilizantes sint\u00e9ticos o minerales.", "fr": "Le m\u00e9nage n''a utilis\u00e9 que des engrais synth\u00e9tiques ou min\u00e9raux."}, "label": {"en": "Chemical fertilizer only", "es": "Fertilizante qu\u00edmico \u00fanicamente", "fr": "Engrais chimique uniquement"}}, {"code": "organic_only", "definition": {"en": "Household used only organic inputs such as manure, compost, or green manure.", "es": "El hogar us\u00f3 solo insumos org\u00e1nicos como esti\u00e9rcol, compost o abono verde.", "fr": "Le m\u00e9nage n''a utilis\u00e9 que des intrants organiques tels que le fumier, le compost ou l''engrais vert."}, "label": {"en": "Organic fertilizer only", "es": "Fertilizante org\u00e1nico \u00fanicamente", "fr": "Engrais organique uniquement"}}, {"code": "both", "definition": {"en": "Household used both chemical and organic fertilizer.", "es": "El hogar us\u00f3 tanto fertilizantes qu\u00edmicos como org\u00e1nicos.", "fr": "Le m\u00e9nage a utilis\u00e9 \u00e0 la fois des engrais chimiques et organiques."}, "label": {"en": "Both chemical and organic", "es": "Ambos \u2014 qu\u00edmico y org\u00e1nico", "fr": "Les deux \u2014 chimique et organique"}}, {"code": "no", "definition": {"en": "Household did not use any fertilizer.", "es": "El hogar no us\u00f3 ning\u00fan fertilizante.", "fr": "Le m\u00e9nage n''a utilis\u00e9 aucun engrais."}, "label": {"en": "No fertilizer used", "es": "No us\u00f3 fertilizante", "fr": "Aucun engrais utilis\u00e9"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot confirm fertilizer use. Retained as a distinct valid response.", "es": "El encuestado no puede confirmar el uso de fertilizante. Se mantiene como respuesta v\u00e1lida distinta.", "fr": "Le r\u00e9pondant ne peut pas confirmer l''utilisation d''engrais. Conserv\u00e9e comme r\u00e9ponse valide distincte."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  FgmContinuationBelief:
    title:
      en: FGM/C Continuation Belief
      fr: Croyance sur la continuation des MGF/E
      es: Creencia sobre la continuación de MGF/A
    description:
      en: 'Whether the respondent believes FGM/C should continue, stop, or depends on circumstances. MICS 6 FG22 response set. Used to compute the UNFPA indicator ''percentage of women who believe FGM/C should continue'' (numerator: continued).'
      fr: 'Si la répondante croit que les MGF/E devraient se poursuivre, cesser ou selon les circonstances. Ensemble de réponses MICS 6 FG22. Utilisé pour calculer l''indicateur UNFPA « pourcentage de femmes qui croient que les MGF/E devraient se poursuivre » (numérateur : continued).'
      es: 'Si la encuestada cree que la MGF/A debería continuar, detenerse o depender de las circunstancias. Conjunto de respuestas MICS 6 FG22. Usado para calcular el indicador UNFPA «porcentaje de mujeres que creen que MGF/A debería continuar» (numerador: continued).'
    enum_uri: aidops:FgmContinuationBelief
    permissible_values:
      continued:
        title:
          en: Should be continued
          fr: Devrait se poursuivre
          es: Debería continuar
        description:
          en: The respondent believes the practice should continue.
          fr: La répondante croit que la pratique devrait se poursuivre.
          es: La encuestada cree que la práctica debería continuar.
      stopped:
        title:
          en: Should be stopped
          fr: Devrait cesser
          es: Debería detenerse
        description:
          en: The respondent believes the practice should stop.
          fr: La répondante croit que la pratique devrait cesser.
          es: La encuestada cree que la práctica debería detenerse.
      depends:
        title:
          en: Depends on circumstances
          fr: Dépend des circonstances
          es: Depende de las circunstancias
        description:
          en: The respondent's view depends on specific circumstances (e.g., health, cultural setting).
          fr: L'opinion de la répondante dépend de circonstances spécifiques (p. ex. santé, contexte culturel).
          es: La opinión de la encuestada depende de circunstancias específicas (p. ej., salud, entorno cultural).
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or cannot decide.
          fr: La répondante ne sait pas ou ne peut décider.
          es: La encuestada no sabe o no puede decidir.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["mics6-child-protection", "unfpa-fgm-compendium-2021"], "definition": {"en": "Whether the respondent believes FGM/C should continue, stop, or depends on circumstances. MICS 6 FG22 response set. Used to compute the UNFPA indicator ''percentage of women who believe FGM/C should continue'' (numerator: continued).", "es": "Si la encuestada cree que la MGF/A deber\u00eda continuar, detenerse o depender de las circunstancias. Conjunto de respuestas MICS 6 FG22. Usado para calcular el indicador UNFPA \u00abporcentaje de mujeres que creen que MGF/A deber\u00eda continuar\u00bb (numerador: continued).", "fr": "Si la r\u00e9pondante croit que les MGF/E devraient se poursuivre, cesser ou selon les circonstances. Ensemble de r\u00e9ponses MICS 6 FG22. Utilis\u00e9 pour calculer l''indicateur UNFPA \u00ab pourcentage de femmes qui croient que les MGF/E devraient se poursuivre \u00bb (num\u00e9rateur : continued)."}, "id": "fgm-continuation-belief", "label": {"en": "FGM/C Continuation Belief", "es": "Creencia sobre la continuaci\u00f3n de MGF/A", "fr": "Croyance sur la continuation des MGF/E"}, "maturity": "draft", "values": [{"code": "continued", "definition": {"en": "The respondent believes the practice should continue.", "es": "La encuestada cree que la pr\u00e1ctica deber\u00eda continuar.", "fr": "La r\u00e9pondante croit que la pratique devrait se poursuivre."}, "label": {"en": "Should be continued", "es": "Deber\u00eda continuar", "fr": "Devrait se poursuivre"}}, {"code": "stopped", "definition": {"en": "The respondent believes the practice should stop.", "es": "La encuestada cree que la pr\u00e1ctica deber\u00eda detenerse.", "fr": "La r\u00e9pondante croit que la pratique devrait cesser."}, "label": {"en": "Should be stopped", "es": "Deber\u00eda detenerse", "fr": "Devrait cesser"}}, {"code": "depends", "definition": {"en": "The respondent''s view depends on specific circumstances (e.g., health, cultural setting).", "es": "La opini\u00f3n de la encuestada depende de circunstancias espec\u00edficas (p. ej., salud, entorno cultural).", "fr": "L''opinion de la r\u00e9pondante d\u00e9pend de circonstances sp\u00e9cifiques (p. ex. sant\u00e9, contexte culturel)."}, "label": {"en": "Depends on circumstances", "es": "Depende de las circunstancias", "fr": "D\u00e9pend des circonstances"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or cannot decide.", "es": "La encuestada no sabe o no puede decidir.", "fr": "La r\u00e9pondante ne sait pas ou ne peut d\u00e9cider."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
