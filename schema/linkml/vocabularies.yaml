  WaitTimeCategory:
    title:
      en: Wait Time Category
      fr: Catégorie de temps d'attente
      es: Categoría de tiempo de espera
    description:
      en: Ordinal category for typical time waited at a health facility before being seen. Captures usual experience as a categorical band rather than exact minutes, matching WHO People's Voice Survey practice and humanitarian rapid assessment conventions. Used by `typical_wait_time_at_facility` in HealthAccessProfile.
      fr: Catégorie ordinale du temps d'attente habituel dans un établissement de santé avant d'être reçu. Saisit l'expérience habituelle sous forme de tranche catégorielle plutôt qu'en minutes exactes, conformément à la pratique de l'enquête People's Voice Survey de l'OMS et aux conventions d'évaluation rapide humanitaire. Utilisée par `typical_wait_time_at_facility` dans HealthAccessProfile.
      es: Categoría ordinal del tiempo habitual de espera en un establecimiento de salud antes de ser atendido. Capta la experiencia habitual como una banda categórica en lugar de minutos exactos, alineada con la práctica de la People's Voice Survey de la OMS y las convenciones de evaluación rápida humanitaria. Utilizada por `typical_wait_time_at_facility` en HealthAccessProfile.
    enum_uri: aidops:WaitTimeCategory
    permissible_values:
      under_30min:
        title:
          en: Less than 30 minutes
          fr: Moins de 30 minutes
          es: Menos de 30 minutos
        description:
          en: Typical wait of less than 30 minutes before being seen.
          fr: Attente habituelle de moins de 30 minutes avant d'être reçu.
          es: Espera habitual de menos de 30 minutos antes de ser atendido.
      thirty_min_to_1hr:
        title:
          en: 30 minutes to 1 hour
          fr: 30 minutes à 1 heure
          es: 30 minutos a 1 hora
        description:
          en: Typical wait between 30 minutes and 1 hour.
          fr: Attente habituelle entre 30 minutes et 1 heure.
          es: Espera habitual entre 30 minutos y 1 hora.
      one_to_2hr:
        title:
          en: 1 to 2 hours
          fr: 1 à 2 heures
          es: 1 a 2 horas
        description:
          en: Typical wait between 1 and 2 hours.
          fr: Attente habituelle entre 1 et 2 heures.
          es: Espera habitual entre 1 y 2 horas.
      over_2hr:
        title:
          en: More than 2 hours
          fr: Plus de 2 heures
          es: Más de 2 horas
        description:
          en: Typical wait of more than 2 hours. Flagged in literature as a salient access barrier.
          fr: Attente habituelle de plus de 2 heures. Signalée dans la littérature comme une barrière d'accès importante.
          es: Espera habitual de más de 2 horas. Señalada en la literatura como una barrera de acceso importante.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent cannot estimate the typical wait time. Valid response; must not be re-coded as missing.
          fr: Le répondant ne peut pas estimer le temps d'attente habituel. Réponse valide ; ne doit pas être recodée comme manquante.
          es: El encuestado no puede estimar el tiempo de espera habitual. Respuesta válida; no debe recodificarse como faltante.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["paho-barriers-americas-2020", "who-pvs-2023"], "definition": {"en": "Ordinal category for typical time waited at a health facility before being seen. Captures usual experience as a categorical band rather than exact minutes, matching WHO People''s Voice Survey practice and humanitarian rapid assessment conventions. Used by `typical_wait_time_at_facility` in HealthAccessProfile.", "es": "Categor\u00eda ordinal del tiempo habitual de espera en un establecimiento de salud antes de ser atendido. Capta la experiencia habitual como una banda categ\u00f3rica en lugar de minutos exactos, alineada con la pr\u00e1ctica de la People''s Voice Survey de la OMS y las convenciones de evaluaci\u00f3n r\u00e1pida humanitaria. Utilizada por `typical_wait_time_at_facility` en HealthAccessProfile.", "fr": "Cat\u00e9gorie ordinale du temps d''attente habituel dans un \u00e9tablissement de sant\u00e9 avant d''\u00eatre re\u00e7u. Saisit l''exp\u00e9rience habituelle sous forme de tranche cat\u00e9gorielle plut\u00f4t qu''en minutes exactes, conform\u00e9ment \u00e0 la pratique de l''enqu\u00eate People''s Voice Survey de l''OMS et aux conventions d''\u00e9valuation rapide humanitaire. Utilis\u00e9e par `typical_wait_time_at_facility` dans HealthAccessProfile."}, "id": "wait-time-category", "label": {"en": "Wait Time Category", "es": "Categor\u00eda de tiempo de espera", "fr": "Cat\u00e9gorie de temps d''attente"}, "maturity": "draft", "values": [{"code": "under_30min", "definition": {"en": "Typical wait of less than 30 minutes before being seen.", "es": "Espera habitual de menos de 30 minutos antes de ser atendido.", "fr": "Attente habituelle de moins de 30 minutes avant d''\u00eatre re\u00e7u."}, "label": {"en": "Less than 30 minutes", "es": "Menos de 30 minutos", "fr": "Moins de 30 minutes"}}, {"code": "thirty_min_to_1hr", "definition": {"en": "Typical wait between 30 minutes and 1 hour.", "es": "Espera habitual entre 30 minutos y 1 hora.", "fr": "Attente habituelle entre 30 minutes et 1 heure."}, "label": {"en": "30 minutes to 1 hour", "es": "30 minutos a 1 hora", "fr": "30 minutes \u00e0 1 heure"}}, {"code": "one_to_2hr", "definition": {"en": "Typical wait between 1 and 2 hours.", "es": "Espera habitual entre 1 y 2 horas.", "fr": "Attente habituelle entre 1 et 2 heures."}, "label": {"en": "1 to 2 hours", "es": "1 a 2 horas", "fr": "1 \u00e0 2 heures"}}, {"code": "over_2hr", "definition": {"en": "Typical wait of more than 2 hours. Flagged in literature as a salient access barrier.", "es": "Espera habitual de m\u00e1s de 2 horas. Se\u00f1alada en la literatura como una barrera de acceso importante.", "fr": "Attente habituelle de plus de 2 heures. Signal\u00e9e dans la litt\u00e9rature comme une barri\u00e8re d''acc\u00e8s importante."}, "label": {"en": "More than 2 hours", "es": "M\u00e1s de 2 horas", "fr": "Plus de 2 heures"}}, {"code": "dont_know", "definition": {"en": "The respondent cannot estimate the typical wait time. Valid response; must not be re-coded as missing.", "es": "El encuestado no puede estimar el tiempo de espera habitual. Respuesta v\u00e1lida; no debe recodificarse como faltante.", "fr": "Le r\u00e9pondant ne peut pas estimer le temps d''attente habituel. R\u00e9ponse valide ; ne doit pas \u00eatre recod\u00e9e comme manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: paho-barriers-americas-2020,who-pvs-2023
  WarningActionBarrier:
    title:
      en: Warning Action Barrier
      fr: Obstacle à l'action sur alerte
      es: Barrera para la acción ante alerta
    description:
      en: The obstacles that prevented a household from taking the protective actions it judged necessary after receiving an early warning. Codes cover transport and destination barriers, inability to leave livestock or property, caregiver constraints (elderly, disabled, young children, pregnancy), financial cost, disbelief in the warning, absence of action guidance, time-too-short, physical barriers (for example flooded roads), language barriers, security and conflict, and two permission-denied codes. The two permission-denied codes (permission_denied_household_member and permission_denied_community_authority) can surface intra-household coercion or community coercion that bears on protection and GBV analysis; their definitions carry a sensitivity flag, and programs should ask the parent item in a private setting and handle these two codes with partial-sensitivity protections downstream.
      fr: Les obstacles qui ont empêché un ménage de prendre les actions de protection jugées nécessaires après réception d'une alerte précoce. Les codes couvrent les obstacles de transport et de destination, l'impossibilité de laisser le bétail ou les biens, les contraintes de soins (personnes âgées, handicapées, jeunes enfants, grossesse), le coût financier, l'incrédulité à l'égard de l'alerte, l'absence de consignes d'action, le temps trop court, les obstacles physiques (par exemple routes inondées), les barrières linguistiques, la sécurité et le conflit, ainsi que deux codes de refus de permission. Les deux codes de refus de permission (permission_denied_household_member et permission_denied_community_authority) peuvent révéler une contrainte intra-ménage ou communautaire pertinente pour l'analyse protection et VBG ; leur définition porte un marqueur de sensibilité, et les programmes devraient poser l'item parent dans un cadre privé et traiter ces deux codes avec des protections de sensibilité partielle en aval.
      es: Los obstáculos que impidieron a un hogar tomar las acciones de protección que consideró necesarias tras recibir una alerta temprana. Los códigos cubren obstáculos de transporte y destino, imposibilidad de dejar ganado o bienes, restricciones de cuidado (personas mayores, con discapacidad, niños pequeños, embarazo), costo financiero, incredulidad ante la alerta, ausencia de orientación sobre qué hacer, tiempo demasiado corto, barreras físicas (por ejemplo caminos inundados), barreras lingüísticas, seguridad y conflicto, y dos códigos de denegación de permiso. Los dos códigos de denegación de permiso (permission_denied_household_member y permission_denied_community_authority) pueden revelar coerción intrafamiliar o comunitaria relevante para el análisis de protección y VBG; sus definiciones llevan un marcador de sensibilidad, y los programas deben preguntar el ítem padre en un entorno privado y tratar estos dos códigos con protecciones de sensibilidad parcial en etapas posteriores.
    enum_uri: aidops:WarningActionBarrier
    permissible_values:
      no_transport:
        title:
          en: No transport available
          fr: Pas de moyen de transport disponible
          es: Sin transporte disponible
        description:
          en: Household had no means of transport to reach a safer location.
          fr: Le ménage n'avait aucun moyen de transport pour atteindre un lieu plus sûr.
          es: El hogar no tenía medios de transporte para llegar a un lugar más seguro.
      no_safe_destination:
        title:
          en: Nowhere safe to go
          fr: Aucun lieu sûr où aller
          es: Ningún lugar seguro a dónde ir
        description:
          en: No known shelter, higher ground, or safe destination was accessible.
          fr: Aucun abri connu, terrain plus élevé ou destination sûre n'était accessible.
          es: No se pudo acceder a ningún refugio conocido, terreno más alto o destino seguro.
      could_not_leave_livestock:
        title:
          en: Could not leave livestock
          fr: Impossible de laisser le bétail
          es: No se pudo dejar el ganado
        description:
          en: Household could not abandon its animals and had no way to evacuate them.
          fr: Le ménage ne pouvait pas abandonner ses animaux et n'avait aucun moyen de les évacuer.
          es: El hogar no podía abandonar a sus animales y no tenía forma de evacuarlos.
      could_not_leave_property:
        title:
          en: Could not leave property
          fr: Impossible de quitter le logement
          es: No se pudo dejar la propiedad
        description:
          en: Fear of looting, or fear of loss of dwelling or assets, if the household left.
          fr: Crainte de pillage ou de perte du logement ou des biens si le ménage partait.
          es: Temor a saqueo, o temor a la pérdida de la vivienda o los bienes, si el hogar se marchaba.
      elderly_or_disabled_member:
        title:
          en: Elderly or disabled member
          fr: Membre âgé ou en situation de handicap
          es: Miembro mayor o con discapacidad
        description:
          en: A member could not move quickly or required assistance that the household could not arrange.
          fr: Un membre ne pouvait pas se déplacer rapidement ou nécessitait une assistance que le ménage n'a pas pu organiser.
          es: Un miembro no podía moverse rápido o requería asistencia que el hogar no pudo organizar.
      young_children:
        title:
          en: Young children
          fr: Jeunes enfants
          es: Niños pequeños
        description:
          en: Young children made evacuation or other action difficult.
          fr: La présence de jeunes enfants a rendu l'évacuation ou l'action difficile.
          es: La presencia de niños pequeños dificultó la evacuación u otra acción.
      pregnant_or_postpartum_member:
        title:
          en: Pregnant or recently pregnant member
          fr: Membre enceinte ou en post-partum
          es: Miembro embarazada o en posparto
        description:
          en: Pregnancy or the post-partum period limited a member's movement.
          fr: Une grossesse ou la période post-partum a limité les déplacements d'un membre.
          es: El embarazo o el período posparto limitó el desplazamiento de un miembro.
      cost_financial:
        title:
          en: Cost or financial constraint
          fr: Coût ou contrainte financière
          es: Costo o restricción financiera
        description:
          en: The financial cost of action, including transport, supplies, or lost income, exceeded the household's means.
          fr: Le coût financier de l'action, incluant transport, fournitures ou perte de revenu, dépassait les moyens du ménage.
          es: El costo financiero de la acción, incluidos transporte, suministros o pérdida de ingresos, superaba los medios del hogar.
      did_not_believe_warning:
        title:
          en: Did not believe the warning
          fr: L'alerte n'a pas été crue
          es: No se creyó la alerta
        description:
          en: Household did not believe the event would actually occur or would affect them.
          fr: Le ménage ne croyait pas que l'événement se produirait réellement ou les affecterait.
          es: El hogar no creyó que el evento realmente ocurriría o los afectaría.
      did_not_know_what_to_do:
        title:
          en: Did not know what to do
          fr: Ne savait pas quoi faire
          es: No supo qué hacer
        description:
          en: The warning did not provide sufficient guidance on what action to take.
          fr: L'alerte n'a pas fourni de consignes suffisantes sur l'action à entreprendre.
          es: La alerta no proporcionó orientación suficiente sobre qué acción tomar.
      permission_denied_household_member:
        title:
          en: Permission denied by another household member
          fr: Permission refusée par un autre membre du ménage
          es: Permiso denegado por otro miembro del hogar
        description:
          en: 'Another member of the household, typically a spouse or the head of household, refused to allow the action. Sensitivity flag: this code can surface intra-household coercion and is a possible protection or gender-based violence signal. Programs should ask the parent item in a private setting and apply partial-sensitivity handling to this code in downstream analysis and sharing.'
          fr: 'Un autre membre du ménage, typiquement un conjoint ou le chef de ménage, a refusé d''autoriser l''action. Marqueur de sensibilité : ce code peut révéler une contrainte intra-ménage et constitue un possible signal de protection ou de violence basée sur le genre. Les programmes devraient poser l''item parent dans un cadre privé et appliquer un traitement à sensibilité partielle à ce code lors de l''analyse et du partage en aval.'
          es: 'Otro miembro del hogar, típicamente un cónyuge o el jefe del hogar, se negó a permitir la acción. Marcador de sensibilidad: este código puede revelar coerción intrafamiliar y constituye una posible señal de protección o de violencia basada en género. Los programas deben preguntar el ítem padre en un entorno privado y aplicar un tratamiento de sensibilidad parcial a este código en el análisis y la difusión posteriores.'
      permission_denied_community_authority:
        title:
          en: Permission denied by community authority
          fr: Permission refusée par une autorité communautaire
          es: Permiso denegado por autoridad comunitaria
        description:
          en: 'A community leader, employer, or authority figure prevented the action. Sensitivity flag: this code can surface community-level coercion with protection implications. Programs should ask the parent item in a private setting and apply partial-sensitivity handling to this code in downstream analysis and sharing.'
          fr: 'Un chef communautaire, un employeur ou une figure d''autorité a empêché l''action. Marqueur de sensibilité : ce code peut révéler une contrainte au niveau communautaire avec des implications de protection. Les programmes devraient poser l''item parent dans un cadre privé et appliquer un traitement à sensibilité partielle à ce code lors de l''analyse et du partage en aval.'
          es: 'Un líder comunitario, un empleador o una figura de autoridad impidió la acción. Marcador de sensibilidad: este código puede revelar coerción a nivel comunitario con implicaciones de protección. Los programas deben preguntar el ítem padre en un entorno privado y aplicar un tratamiento de sensibilidad parcial a este código en el análisis y la difusión posteriores.'
      time_too_short:
        title:
          en: Warning came too late
          fr: L'alerte est arrivée trop tard
          es: La alerta llegó demasiado tarde
        description:
          en: There was not enough time between receiving the warning and the event to act.
          fr: Il n'y avait pas assez de temps entre la réception de l'alerte et l'événement pour agir.
          es: No hubo tiempo suficiente entre recibir la alerta y el evento para actuar.
      physical_barrier_road_flooded:
        title:
          en: Physical barrier, for example a flooded road
          fr: Obstacle physique, par exemple une route inondée
          es: Barrera física, por ejemplo un camino inundado
        description:
          en: A physical obstacle such as a flooded road or blocked path prevented the action.
          fr: Un obstacle physique tel qu'une route inondée ou un chemin bloqué a empêché l'action.
          es: Un obstáculo físico como un camino inundado o un sendero bloqueado impidió la acción.
      language_barrier:
        title:
          en: Language barrier
          fr: Barrière linguistique
          es: Barrera lingüística
        description:
          en: The warning was not in a language the household understood well.
          fr: L'alerte n'était pas dans une langue que le ménage comprenait bien.
          es: La alerta no estaba en un idioma que el hogar entendía bien.
      security_insecurity_conflict:
        title:
          en: Security or conflict
          fr: Sécurité ou conflit
          es: Seguridad o conflicto
        description:
          en: Conflict or insecurity made the safer location unreachable or the journey dangerous.
          fr: Le conflit ou l'insécurité a rendu le lieu plus sûr inaccessible ou le trajet dangereux.
          es: El conflicto o la inseguridad hizo inaccesible el lugar más seguro o peligroso el trayecto.
      no_barrier:
        title:
          en: No barrier (household took all action it wanted)
          fr: Aucun obstacle (le ménage a pris toutes les actions qu'il souhaitait)
          es: Sin barrera (el hogar tomó todas las acciones que quería)
        description:
          en: Household faced no obstacle. Used when the barriers item is asked to confirm and no barriers apply.
          fr: Le ménage n'a rencontré aucun obstacle. Utilisé lorsque l'item sur les obstacles est posé pour confirmation et qu'aucun obstacle ne s'applique.
          es: El hogar no enfrentó ningún obstáculo. Se usa cuando el ítem sobre barreras se pregunta para confirmar y no aplica ninguna barrera.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Barrier not listed above.
          fr: Obstacle non répertorié ci-dessus.
          es: Obstáculo no listado arriba.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-aap-early-response-2020", "ifrc-fbf-ma-guide-2019", "ifrc-pgi-aa-toolkit", "paul-dutt-2010-cyclone-sidr", "roy-et-al-2015-odisha", "start-network-def"], "definition": {"en": "The obstacles that prevented a household from taking the protective actions it judged necessary after receiving an early warning. Codes cover transport and destination barriers, inability to leave livestock or property, caregiver constraints (elderly, disabled, young children, pregnancy), financial cost, disbelief in the warning, absence of action guidance, time-too-short, physical barriers (for example flooded roads), language barriers, security and conflict, and two permission-denied codes. The two permission-denied codes (permission_denied_household_member and permission_denied_community_authority) can surface intra-household coercion or community coercion that bears on protection and GBV analysis; their definitions carry a sensitivity flag, and programs should ask the parent item in a private setting and handle these two codes with partial-sensitivity protections downstream.", "es": "Los obst\u00e1culos que impidieron a un hogar tomar las acciones de protecci\u00f3n que consider\u00f3 necesarias tras recibir una alerta temprana. Los c\u00f3digos cubren obst\u00e1culos de transporte y destino, imposibilidad de dejar ganado o bienes, restricciones de cuidado (personas mayores, con discapacidad, ni\u00f1os peque\u00f1os, embarazo), costo financiero, incredulidad ante la alerta, ausencia de orientaci\u00f3n sobre qu\u00e9 hacer, tiempo demasiado corto, barreras f\u00edsicas (por ejemplo caminos inundados), barreras ling\u00fc\u00edsticas, seguridad y conflicto, y dos c\u00f3digos de denegaci\u00f3n de permiso. Los dos c\u00f3digos de denegaci\u00f3n de permiso (permission_denied_household_member y permission_denied_community_authority) pueden revelar coerci\u00f3n intrafamiliar o comunitaria relevante para el an\u00e1lisis de protecci\u00f3n y VBG; sus definiciones llevan un marcador de sensibilidad, y los programas deben preguntar el \u00edtem padre en un entorno privado y tratar estos dos c\u00f3digos con protecciones de sensibilidad parcial en etapas posteriores.", "fr": "Les obstacles qui ont emp\u00each\u00e9 un m\u00e9nage de prendre les actions de protection jug\u00e9es n\u00e9cessaires apr\u00e8s r\u00e9ception d''une alerte pr\u00e9coce. Les codes couvrent les obstacles de transport et de destination, l''impossibilit\u00e9 de laisser le b\u00e9tail ou les biens, les contraintes de soins (personnes \u00e2g\u00e9es, handicap\u00e9es, jeunes enfants, grossesse), le co\u00fbt financier, l''incr\u00e9dulit\u00e9 \u00e0 l''\u00e9gard de l''alerte, l''absence de consignes d''action, le temps trop court, les obstacles physiques (par exemple routes inond\u00e9es), les barri\u00e8res linguistiques, la s\u00e9curit\u00e9 et le conflit, ainsi que deux codes de refus de permission. Les deux codes de refus de permission (permission_denied_household_member et permission_denied_community_authority) peuvent r\u00e9v\u00e9ler une contrainte intra-m\u00e9nage ou communautaire pertinente pour l''analyse protection et VBG ; leur d\u00e9finition porte un marqueur de sensibilit\u00e9, et les programmes devraient poser l''item parent dans un cadre priv\u00e9 et traiter ces deux codes avec des protections de sensibilit\u00e9 partielle en aval."}, "id": "warning-action-barrier", "label": {"en": "Warning Action Barrier", "es": "Barrera para la acci\u00f3n ante alerta", "fr": "Obstacle \u00e0 l''action sur alerte"}, "maturity": "draft", "standard": {"name": "IFRC Forecast-based Financing MEAL barrier analysis; IASC Operational Guidance on Accountability to Affected Populations in Early Response; Start Network Distribution Evaluation Framework", "notes": "Codes consolidate barrier taxonomies from IFRC FbF MEAL and Start Network DEF, with permission-denied codes informed by academic cyclone warning studies (Paul & Dutt 2010 on Cyclone Sidr; Roy et al. 2015 on Odisha) documenting women''s restricted mobility and intra-household permission dynamics as principal non-compliance factors.", "uri": "https://www.anticipation-hub.org/"}, "values": [{"code": "no_transport", "definition": {"en": "Household had no means of transport to reach a safer location.", "es": "El hogar no ten\u00eda medios de transporte para llegar a un lugar m\u00e1s seguro.", "fr": "Le m\u00e9nage n''avait aucun moyen de transport pour atteindre un lieu plus s\u00fbr."}, "label": {"en": "No transport available", "es": "Sin transporte disponible", "fr": "Pas de moyen de transport disponible"}}, {"code": "no_safe_destination", "definition": {"en": "No known shelter, higher ground, or safe destination was accessible.", "es": "No se pudo acceder a ning\u00fan refugio conocido, terreno m\u00e1s alto o destino seguro.", "fr": "Aucun abri connu, terrain plus \u00e9lev\u00e9 ou destination s\u00fbre n''\u00e9tait accessible."}, "label": {"en": "Nowhere safe to go", "es": "Ning\u00fan lugar seguro a d\u00f3nde ir", "fr": "Aucun lieu s\u00fbr o\u00f9 aller"}}, {"code": "could_not_leave_livestock", "definition": {"en": "Household could not abandon its animals and had no way to evacuate them.", "es": "El hogar no pod\u00eda abandonar a sus animales y no ten\u00eda forma de evacuarlos.", "fr": "Le m\u00e9nage ne pouvait pas abandonner ses animaux et n''avait aucun moyen de les \u00e9vacuer."}, "label": {"en": "Could not leave livestock", "es": "No se pudo dejar el ganado", "fr": "Impossible de laisser le b\u00e9tail"}}, {"code": "could_not_leave_property", "definition": {"en": "Fear of looting, or fear of loss of dwelling or assets, if the household left.", "es": "Temor a saqueo, o temor a la p\u00e9rdida de la vivienda o los bienes, si el hogar se marchaba.", "fr": "Crainte de pillage ou de perte du logement ou des biens si le m\u00e9nage partait."}, "label": {"en": "Could not leave property", "es": "No se pudo dejar la propiedad", "fr": "Impossible de quitter le logement"}}, {"code": "elderly_or_disabled_member", "definition": {"en": "A member could not move quickly or required assistance that the household could not arrange.", "es": "Un miembro no pod\u00eda moverse r\u00e1pido o requer\u00eda asistencia que el hogar no pudo organizar.", "fr": "Un membre ne pouvait pas se d\u00e9placer rapidement ou n\u00e9cessitait une assistance que le m\u00e9nage n''a pas pu organiser."}, "label": {"en": "Elderly or disabled member", "es": "Miembro mayor o con discapacidad", "fr": "Membre \u00e2g\u00e9 ou en situation de handicap"}}, {"code": "young_children", "definition": {"en": "Young children made evacuation or other action difficult.", "es": "La presencia de ni\u00f1os peque\u00f1os dificult\u00f3 la evacuaci\u00f3n u otra acci\u00f3n.", "fr": "La pr\u00e9sence de jeunes enfants a rendu l''\u00e9vacuation ou l''action difficile."}, "label": {"en": "Young children", "es": "Ni\u00f1os peque\u00f1os", "fr": "Jeunes enfants"}}, {"code": "pregnant_or_postpartum_member", "definition": {"en": "Pregnancy or the post-partum period limited a member''s movement.", "es": "El embarazo o el per\u00edodo posparto limit\u00f3 el desplazamiento de un miembro.", "fr": "Une grossesse ou la p\u00e9riode post-partum a limit\u00e9 les d\u00e9placements d''un membre."}, "label": {"en": "Pregnant or recently pregnant member", "es": "Miembro embarazada o en posparto", "fr": "Membre enceinte ou en post-partum"}}, {"code": "cost_financial", "definition": {"en": "The financial cost of action, including transport, supplies, or lost income, exceeded the household''s means.", "es": "El costo financiero de la acci\u00f3n, incluidos transporte, suministros o p\u00e9rdida de ingresos, superaba los medios del hogar.", "fr": "Le co\u00fbt financier de l''action, incluant transport, fournitures ou perte de revenu, d\u00e9passait les moyens du m\u00e9nage."}, "label": {"en": "Cost or financial constraint", "es": "Costo o restricci\u00f3n financiera", "fr": "Co\u00fbt ou contrainte financi\u00e8re"}}, {"code": "did_not_believe_warning", "definition": {"en": "Household did not believe the event would actually occur or would affect them.", "es": "El hogar no crey\u00f3 que el evento realmente ocurrir\u00eda o los afectar\u00eda.", "fr": "Le m\u00e9nage ne croyait pas que l''\u00e9v\u00e9nement se produirait r\u00e9ellement ou les affecterait."}, "label": {"en": "Did not believe the warning", "es": "No se crey\u00f3 la alerta", "fr": "L''alerte n''a pas \u00e9t\u00e9 crue"}}, {"code": "did_not_know_what_to_do", "definition": {"en": "The warning did not provide sufficient guidance on what action to take.", "es": "La alerta no proporcion\u00f3 orientaci\u00f3n suficiente sobre qu\u00e9 acci\u00f3n tomar.", "fr": "L''alerte n''a pas fourni de consignes suffisantes sur l''action \u00e0 entreprendre."}, "label": {"en": "Did not know what to do", "es": "No supo qu\u00e9 hacer", "fr": "Ne savait pas quoi faire"}}, {"code": "permission_denied_household_member", "definition": {"en": "Another member of the household, typically a spouse or the head of household, refused to allow the action. Sensitivity flag: this code can surface intra-household coercion and is a possible protection or gender-based violence signal. Programs should ask the parent item in a private setting and apply partial-sensitivity handling to this code in downstream analysis and sharing.", "es": "Otro miembro del hogar, t\u00edpicamente un c\u00f3nyuge o el jefe del hogar, se neg\u00f3 a permitir la acci\u00f3n. Marcador de sensibilidad: este c\u00f3digo puede revelar coerci\u00f3n intrafamiliar y constituye una posible se\u00f1al de protecci\u00f3n o de violencia basada en g\u00e9nero. Los programas deben preguntar el \u00edtem padre en un entorno privado y aplicar un tratamiento de sensibilidad parcial a este c\u00f3digo en el an\u00e1lisis y la difusi\u00f3n posteriores.", "fr": "Un autre membre du m\u00e9nage, typiquement
        un conjoint ou le chef de m\u00e9nage, a refus\u00e9 d''autoriser l''action. Marqueur de sensibilit\u00e9 : ce code peut r\u00e9v\u00e9ler une contrainte intra-m\u00e9nage et constitue un possible signal de protection ou de violence bas\u00e9e sur le genre. Les programmes devraient poser l''item parent dans un cadre priv\u00e9 et appliquer un traitement \u00e0 sensibilit\u00e9 partielle \u00e0 ce code lors de l''analyse et du partage en aval."}, "label": {"en": "Permission denied by another household member", "es": "Permiso denegado por otro miembro del hogar", "fr": "Permission refus\u00e9e par un autre membre du m\u00e9nage"}}, {"code": "permission_denied_community_authority", "definition": {"en": "A community leader, employer, or authority figure prevented the action. Sensitivity flag: this code can surface community-level coercion with protection implications. Programs should ask the parent item in a private setting and apply partial-sensitivity handling to this code in downstream analysis and sharing.", "es": "Un l\u00edder comunitario, un empleador o una figura de autoridad impidi\u00f3 la acci\u00f3n. Marcador de sensibilidad: este c\u00f3digo puede revelar coerci\u00f3n a nivel comunitario con implicaciones de protecci\u00f3n. Los programas deben preguntar el \u00edtem padre en un entorno privado y aplicar un tratamiento de sensibilidad parcial a este c\u00f3digo en el an\u00e1lisis y la difusi\u00f3n posteriores.", "fr": "Un chef communautaire, un employeur ou une figure d''autorit\u00e9 a emp\u00each\u00e9 l''action. Marqueur de sensibilit\u00e9 : ce code peut r\u00e9v\u00e9ler une contrainte au niveau communautaire avec des implications de protection. Les programmes devraient poser l''item parent dans un cadre priv\u00e9 et appliquer un traitement \u00e0 sensibilit\u00e9 partielle \u00e0 ce code lors de l''analyse et du partage en aval."}, "label": {"en": "Permission denied by community authority", "es": "Permiso denegado por autoridad comunitaria", "fr": "Permission refus\u00e9e par une autorit\u00e9 communautaire"}}, {"code": "time_too_short", "definition": {"en": "There was not enough time between receiving the warning and the event to act.", "es": "No hubo tiempo suficiente entre recibir la alerta y el evento para actuar.", "fr": "Il n''y avait pas assez de temps entre la r\u00e9ception de l''alerte et l''\u00e9v\u00e9nement pour agir."}, "label": {"en": "Warning came too late", "es": "La alerta lleg\u00f3 demasiado tarde", "fr": "L''alerte est arriv\u00e9e trop tard"}}, {"code": "physical_barrier_road_flooded", "definition": {"en": "A physical obstacle such as a flooded road or blocked path prevented the action.", "es": "Un obst\u00e1culo f\u00edsico como un camino inundado o un sendero bloqueado impidi\u00f3 la acci\u00f3n.", "fr": "Un obstacle physique tel qu''une route inond\u00e9e ou un chemin bloqu\u00e9 a emp\u00each\u00e9 l''action."}, "label": {"en": "Physical barrier, for example a flooded road", "es": "Barrera f\u00edsica, por ejemplo un camino inundado", "fr": "Obstacle physique, par exemple une route inond\u00e9e"}}, {"code": "language_barrier", "definition": {"en": "The warning was not in a language the household understood well.", "es": "La alerta no estaba en un idioma que el hogar entend\u00eda bien.", "fr": "L''alerte n''\u00e9tait pas dans une langue que le m\u00e9nage comprenait bien."}, "label": {"en": "Language barrier", "es": "Barrera ling\u00fc\u00edstica", "fr": "Barri\u00e8re linguistique"}}, {"code": "security_insecurity_conflict", "definition": {"en": "Conflict or insecurity made the safer location unreachable or the journey dangerous.", "es": "El conflicto o la inseguridad hizo inaccesible el lugar m\u00e1s seguro o peligroso el trayecto.", "fr": "Le conflit ou l''ins\u00e9curit\u00e9 a rendu le lieu plus s\u00fbr inaccessible ou le trajet dangereux."}, "label": {"en": "Security or conflict", "es": "Seguridad o conflicto", "fr": "S\u00e9curit\u00e9 ou conflit"}}, {"code": "no_barrier", "definition": {"en": "Household faced no obstacle. Used when the barriers item is asked to confirm and no barriers apply.", "es": "El hogar no enfrent\u00f3 ning\u00fan obst\u00e1culo. Se usa cuando el \u00edtem sobre barreras se pregunta para confirmar y no aplica ninguna barrera.", "fr": "Le m\u00e9nage n''a rencontr\u00e9 aucun obstacle. Utilis\u00e9 lorsque l''item sur les obstacles est pos\u00e9 pour confirmation et qu''aucun obstacle ne s''applique."}, "label": {"en": "No barrier (household took all action it wanted)", "es": "Sin barrera (el hogar tom\u00f3 todas las acciones que quer\u00eda)", "fr": "Aucun obstacle (le m\u00e9nage a pris toutes les actions qu''il souhaitait)"}}, {"code": "other", "definition": {"en": "Barrier not listed above.", "es": "Obst\u00e1culo no listado arriba.", "fr": "Obstacle non r\u00e9pertori\u00e9 ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
      bibliography_refs: iasc-aap-early-response-2020,ifrc-fbf-ma-guide-2019,ifrc-pgi-aa-toolkit,paul-dutt-2010-cyclone-sidr,roy-et-al-2015-odisha,start-network-def
  WarningChannel:
    title:
      en: Warning Channel
      fr: Canal d'alerte
      es: Canal de alerta
    description:
      en: The communication channel through which a household received an early warning or alert for a hazard event. Covers broadcast media (radio, television, newspaper), mobile and digital channels (SMS, app, phone call, social media), in-person and community channels (door-to-door, community meetings, religious leaders, neighbors), and public-address channels (loudspeaker, siren). Used both as a single-select 'first channel' item and as a multi-select 'all channels' item to support analysis of channel redundancy in warning dissemination.
      fr: Le canal de communication par lequel un ménage a reçu une alerte précoce ou un avertissement pour un événement dangereux. Couvre les médias de diffusion (radio, télévision, journal), les canaux mobiles et numériques (SMS, application, appel téléphonique, réseaux sociaux), les canaux en personne et communautaires (porte-à-porte, réunions communautaires, chefs religieux, voisins) et les canaux de sonorisation publique (haut-parleur, sirène). Utilisé à la fois comme item à sélection unique « premier canal » et comme item à sélection multiple « tous les canaux » pour permettre l'analyse de la redondance des canaux dans la diffusion des alertes.
      es: El canal de comunicación por el cual un hogar recibió una alerta temprana o aviso para un evento de peligro. Abarca medios de difusión (radio, televisión, periódico), canales móviles y digitales (SMS, aplicación, llamada telefónica, redes sociales), canales presenciales y comunitarios (puerta a puerta, reuniones comunitarias, líderes religiosos, vecinos) y canales de megafonía pública (altavoz, sirena). Utilizado tanto como ítem de selección única «primer canal» como ítem de selección múltiple «todos los canales» para permitir el análisis de la redundancia de canales en la difusión de alertas.
    enum_uri: aidops:WarningChannel
    permissible_values:
      radio:
        title:
          en: Radio
          fr: Radio
          es: Radio
        description:
          en: National, regional, or local radio broadcast (AM, FM, or shortwave).
          fr: Diffusion radio nationale, régionale ou locale (AM, FM ou ondes courtes).
          es: Transmisión de radio nacional, regional o local (AM, FM u onda corta).
      television:
        title:
          en: Television
          fr: Télévision
          es: Televisión
        description:
          en: National, regional, or local television broadcast.
          fr: Diffusion télévisée nationale, régionale ou locale.
          es: Transmisión de televisión nacional, regional o local.
      sms_text:
        title:
          en: SMS or text message
          fr: SMS ou message texte
          es: SMS o mensaje de texto
        description:
          en: Mobile phone text message sent by an authority, telecom operator, or emergency service.
          fr: Message texte de téléphone mobile envoyé par une autorité, un opérateur télécom ou un service d'urgence.
          es: Mensaje de texto de teléfono móvil enviado por una autoridad, operador de telecomunicaciones o servicio de emergencia.
      mobile_app:
        title:
          en: Mobile application alert
          fr: Alerte d'application mobile
          es: Alerta de aplicación móvil
        description:
          en: Push notification received via a smartphone application, such as a national weather application or a Red Cross application.
          fr: Notification push reçue via une application pour smartphone, telle qu'une application météorologique nationale ou une application de la Croix-Rouge.
          es: Notificación push recibida a través de una aplicación para smartphone, como una aplicación meteorológica nacional o una aplicación de la Cruz Roja.
      phone_call:
        title:
          en: Voice phone call
          fr: Appel téléphonique vocal
          es: Llamada telefónica de voz
        description:
          en: Direct voice call from an official, volunteer, or automated calling system.
          fr: Appel vocal direct d'un responsable, d'un volontaire ou d'un système d'appel automatisé.
          es: Llamada de voz directa de un funcionario, voluntario o sistema de llamadas automatizadas.
      loudspeaker_siren:
        title:
          en: Loudspeaker or siren
          fr: Haut-parleur ou sirène
          es: Altavoz o sirena
        description:
          en: Public-address loudspeaker, fixed or mobile siren, or megaphone announcement in the community.
          fr: Haut-parleur de sonorisation publique, sirène fixe ou mobile, ou annonce au mégaphone dans la communauté.
          es: Altavoz de megafonía pública, sirena fija o móvil, o anuncio con megáfono en la comunidad.
      door_to_door_official:
        title:
          en: Door-to-door by official
          fr: Porte-à-porte par un agent officiel
          es: Puerta a puerta por un funcionario
        description:
          en: In-person visit by a government official, police officer, or uniformed service member.
          fr: Visite en personne par un agent gouvernemental, un policier ou un membre des services en uniforme.
          es: Visita en persona por un funcionario gubernamental, oficial de policía o miembro uniformado de un servicio.
      door_to_door_volunteer:
        title:
          en: Door-to-door by volunteer
          fr: Porte-à-porte par un volontaire
          es: Puerta a puerta por un voluntario
        description:
          en: In-person visit by a community volunteer, a Red Cross or Red Crescent volunteer, or an NGO worker.
          fr: Visite en personne par un volontaire communautaire, un volontaire de la Croix-Rouge ou du Croissant-Rouge, ou un travailleur d'ONG.
          es: Visita en persona por un voluntario comunitario, un voluntario de la Cruz Roja o de la Media Luna Roja, o un trabajador de ONG.
      community_leader_meeting:
        title:
          en: Community meeting or leader announcement
          fr: Réunion communautaire ou annonce d'un chef
          es: Reunión comunitaria o anuncio de líder
        description:
          en: Announcement at a community gathering or by a village or neighborhood leader.
          fr: Annonce lors d'un rassemblement communautaire ou par un chef de village ou de quartier.
          es: Anuncio en una reunión comunitaria o por un líder de aldea o de barrio.
      religious_leader:
        title:
          en: Religious leader or place of worship
          fr: Chef religieux ou lieu de culte
          es: Líder religioso o lugar de culto
        description:
          en: Announcement by a religious leader or at a mosque, church, temple, or other place of worship.
          fr: Annonce par un chef religieux ou dans une mosquée, une église, un temple ou un autre lieu de culte.
          es: Anuncio por un líder religioso o en una mezquita, iglesia, templo u otro lugar de culto.
      neighbor_family:
        title:
          en: Neighbor or family member
