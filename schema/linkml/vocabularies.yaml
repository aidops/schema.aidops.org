. Il s''agit d''une r\u00e9ponse valide qui ne doit pas \u00eatre recod\u00e9e comme ''non'' ou manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
