o adecuado por el JMP.", "fr": "Filtration physique \u00e0 travers un filtre en pot c\u00e9ramique, un filtre biosable ou un autre milieu filtrant. Class\u00e9e comme traitement ad\u00e9quat par le JMP."}, "label": {"en": "Use ceramic, sand, or other filter", "es": "Usar filtro cer\u00e1mico, de arena u otro", "fr": "Utiliser un filtre c\u00e9ramique, sable ou autre"}}, {"code": "solar_disinfection", "definition": {"en": "Water is placed in transparent plastic or glass bottles and exposed to direct sunlight for at least 6 hours. Classified as adequate treatment by the JMP.", "es": "El agua se coloca en botellas de pl\u00e1stico transparente o vidrio y se expone a la luz solar directa durante al menos 6 horas. Clasificada como tratamiento adecuado por el JMP.", "fr": "L''eau est plac\u00e9e dans des bouteilles en plastique transparent ou en verre et expos\u00e9e \u00e0 la lumi\u00e8re directe du soleil pendant au moins 6 heures. Class\u00e9e comme traitement ad\u00e9quat par le JMP."}, "label": {"en": "Solar disinfection (SODIS)", "es": "Desinfecci\u00f3n solar (SODIS)", "fr": "D\u00e9sinfection solaire (SODIS)"}}, {"code": "let_stand_and_settle", "definition": {"en": "Water is left undisturbed to allow sediment to settle before drinking. Classified as inadequate treatment by the JMP because it does not reliably remove pathogens.", "es": "El agua se deja en reposo para que el sedimento se asiente antes de beber. Clasificada como tratamiento inadecuado por el JMP porque no elimina pat\u00f3genos de manera confiable.", "fr": "L''eau est laiss\u00e9e au repos pour permettre aux s\u00e9diments de se d\u00e9poser avant d''\u00eatre bue. Class\u00e9e comme traitement inad\u00e9quat par le JMP car elle n''\u00e9limine pas de mani\u00e8re fiable les agents pathog\u00e8nes."}, "label": {"en": "Let it stand and settle", "es": "Dejar reposar y asentar", "fr": "Laisser d\u00e9canter"}}, {"code": "strain_through_cloth", "definition": {"en": "Water is poured through a cloth to rem