  AntimalarialType:
    title:
      en: Antimalarial Drug Type
      fr: Type d'antipaludéen
      es: Tipo de antipalúdico
    description:
      en: 'The type of antimalarial medicine given to a child with fever or confirmed malaria. Multi-select: a child may receive more than one antimalarial in the same episode. WHO first-line treatment is an artemisinin-based combination therapy (ACT). Codes align with the MICS ML5 drug list.'
      fr: 'Le type d''antipaludéen administré à un enfant présentant de la fièvre ou un paludisme confirmé. Sélection multiple : un enfant peut recevoir plusieurs antipaludéens au cours d''un même épisode. Le traitement de première intention de l''OMS est une combinaison thérapeutique à base d''artémisinine (CTA). Les codes s''alignent sur la liste de médicaments MICS ML5.'
      es: 'El tipo de medicamento antipalúdico administrado a un niño con fiebre o malaria confirmada. Selección múltiple: un niño puede recibir más de un antipalúdico en el mismo episodio. El tratamiento de primera línea de la OMS es una terapia combinada a base de artemisinina (TCA). Los códigos se alinean con la lista de medicamentos MICS ML5.'
    enum_uri: aidops:AntimalarialType
    permissible_values:
      act_artemether_lumefantrine:
        title:
          en: ACT — artemether-lumefantrine (AL)
          fr: CTA — artéméther-luméfantrine (AL)
          es: TCA — arteméter-lumefantrina (AL)
        description:
          en: Artemether-lumefantrine, the most widely used ACT globally (trade name Coartem). WHO first-line for uncomplicated falciparum malaria.
          fr: Artéméther-luméfantrine, la CTA la plus largement utilisée dans le monde (nom commercial Coartem). Traitement de première intention de l'OMS pour le paludisme falciparum non compliqué.
          es: Arteméter-lumefantrina, la TCA más utilizada a nivel mundial (nombre comercial Coartem). Tratamiento de primera línea de la OMS para la malaria falciparum no complicada.
      act_dha_piperaquine:
        title:
          en: ACT — DHA-piperaquine (DP)
          fr: CTA — DHA-pipéraquine (DP)
          es: TCA — DHA-piperaquina (DP)
        description:
          en: Dihydroartemisinin-piperaquine, used in Southeast Asia and increasingly in Africa (trade names Eurartesim, Duo-Cotecxin).
          fr: Dihydroartémisinine-pipéraquine, utilisée en Asie du Sud-Est et de plus en plus en Afrique (noms commerciaux Eurartesim, Duo-Cotecxin).
          es: Dihidroartemisinina-piperaquina, utilizada en el sudeste asiático y cada vez más en África (nombres comerciales Eurartesim, Duo-Cotecxin).
      act_artesunate_amodiaquine:
        title:
          en: ACT — artesunate-amodiaquine (ASAQ)
          fr: CTA — artésunate-amodiaquine (ASAQ)
          es: TCA — artesunato-amodiaquina (ASAQ)
        description:
          en: Artesunate-amodiaquine, commonly used in West and Central Africa (trade name Coarsucam/ASAQ Winthrop).
          fr: Artésunate-amodiaquine, couramment utilisé en Afrique de l'Ouest et centrale (nom commercial Coarsucam / ASAQ Winthrop).
          es: Artesunato-amodiaquina, comúnmente utilizado en África Occidental y Central (nombre comercial Coarsucam/ASAQ Winthrop).
      artesunate_injectable:
        title:
          en: Injectable artesunate
          fr: Artésunate injectable
          es: Artesunato inyectable
        description:
          en: Injectable artesunate for severe malaria (WHO first-line for severe malaria, replacing quinine).
          fr: Artésunate injectable pour le paludisme grave (traitement de première intention de l'OMS pour le paludisme grave, remplaçant la quinine).
          es: Artesunato inyectable para malaria grave (tratamiento de primera línea de la OMS para malaria grave, reemplazando a la quinina).
      sp_fansidar:
        title:
          en: SP (sulfadoxine-pyrimethamine / Fansidar)
          fr: SP (sulfadoxine-pyriméthamine / Fansidar)
          es: SP (sulfadoxina-pirimetamina / Fansidar)
        description:
          en: Sulfadoxine-pyrimethamine, still used in some settings and for intermittent preventive treatment in pregnancy (IPTp). Resistance is widespread for treatment.
          fr: Sulfadoxine-pyriméthamine, encore utilisée dans certains contextes et pour le traitement préventif intermittent pendant la grossesse (TPI-G). La résistance est répandue pour le traitement.
          es: Sulfadoxina-pirimetamina, todavía utilizada en algunos contextos y para el tratamiento preventivo intermitente en el embarazo (TPIg). La resistencia es generalizada para el tratamiento.
      chloroquine:
        title:
          en: Chloroquine
          fr: Chloroquine
          es: Cloroquina
        description:
          en: Chloroquine, historically the first-line antimalarial. Resistance is widespread for P. falciparum; still effective for P. vivax in some regions.
          fr: Chloroquine, historiquement l'antipaludéen de première intention. La résistance est répandue pour P. falciparum ; encore efficace contre P. vivax dans certaines régions.
          es: Cloroquina, históricamente el antipalúdico de primera línea. La resistencia es generalizada para P. falciparum; aún efectiva contra P. vivax en algunas regiones.
      amodiaquine:
        title:
          en: Amodiaquine (alone)
          fr: Amodiaquine (seule)
          es: Amodiaquina (sola)
        description:
          en: Amodiaquine as monotherapy (not in combination). Used in some settings for P. vivax or in combination regimens.
          fr: Amodiaquine en monothérapie (non combinée). Utilisée dans certains contextes pour P. vivax ou dans des schémas thérapeutiques combinés.
          es: Amodiaquina como monoterapia (no en combinación). Utilizada en algunos contextos para P. vivax o en regímenes combinados.
      quinine:
        title:
          en: Quinine
          fr: Quinine
          es: Quinina
        description:
          en: Quinine, used for severe malaria and as second-line when ACT is unavailable. Being replaced by injectable artesunate per WHO guidance.
          fr: Quinine, utilisée pour le paludisme grave et en deuxième intention lorsque les CTA ne sont pas disponibles. Remplacée par l'artésunate injectable selon les directives de l'OMS.
          es: Quinina, utilizada para malaria grave y como segunda línea cuando la TCA no está disponible. Está siendo reemplazada por el artesunato inyectable según las directrices de la OMS.
      other:
        title:
          en: Other antimalarial
          fr: Autre antipaludéen
          es: Otro antipalúdico
        description:
          en: Any antimalarial drug not listed above, including country-specific products.
          fr: Tout antipaludéen non répertorié ci-dessus, y compris les produits spécifiques à un pays.
          es: Cualquier antipalúdico no listado arriba, incluidos productos específicos de un país.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The caregiver does not know the name or type of antimalarial given.
          fr: Le soignant ne connaît pas le nom ou le type d'antipaludéen administré.
          es: El cuidador no sabe el nombre o tipo de antipalúdico administrado.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "The type of antimalarial medicine given to a child with fever or confirmed malaria. Multi-select: a child may receive more than one antimalarial in the same episode. WHO first-line treatment is an artemisinin-based combination therapy (ACT). Codes align with the MICS ML5 drug list.", "es": "El tipo de medicamento antipal\u00fadico administrado a un ni\u00f1o con fiebre o malaria confirmada. Selecci\u00f3n m\u00faltiple: un ni\u00f1o puede recibir m\u00e1s de un antipal\u00fadico en el mismo episodio. El tratamiento de primera l\u00ednea de la OMS es una terapia combinada a base de artemisinina (TCA). Los c\u00f3digos se alinean con la lista de medicamentos MICS ML5.", "fr": "Le type d''antipalud\u00e9en administr\u00e9 \u00e0 un enfant pr\u00e9sentant de la fi\u00e8vre ou un paludisme confirm\u00e9. S\u00e9lection multiple : un enfant peut recevoir plusieurs antipalud\u00e9ens au cours d''un m\u00eame \u00e9pisode. Le traitement de premi\u00e8re intention de l''OMS est une combinaison th\u00e9rapeutique \u00e0 base d''art\u00e9misinine (CTA). Les codes s''alignent sur la liste de m\u00e9dicaments MICS ML5."}, "id": "antimalarial-type", "label": {"en": "Antimalarial Drug Type", "es": "Tipo de antipal\u00fadico", "fr": "Type d''antipalud\u00e9en"}, "maturity": "draft", "values": [{"code": "act_artemether_lumefantrine", "definition": {"en": "Artemether-lumefantrine, the most widely used ACT globally (trade name Coartem). WHO first-line for uncomplicated falciparum malaria.", "es": "Artem\u00e9ter-lumefantrina, la TCA m\u00e1s utilizada a nivel mundial (nombre comercial Coartem). Tratamiento de primera l\u00ednea de la OMS para la malaria falciparum no complicada.", "fr": "Art\u00e9m\u00e9ther-lum\u00e9fantrine, la CTA la plus largement utilis\u00e9e dans le monde (nom commercial Coartem). Traitement de premi\u00e8re intention de l''OMS pour le paludisme falciparum non compliqu\u00e9."}, "label": {"en": "ACT \u2014 artemether-lumefantrine (AL)", "es": "TCA \u2014 artem\u00e9ter-lumefantrina (AL)", "fr": "CTA \u2014 art\u00e9m\u00e9ther-lum\u00e9fantrine (AL)"}}, {"code": "act_dha_piperaquine", "definition": {"en": "Dihydroartemisinin-piperaquine, used in Southeast Asia and increasingly in Africa (trade names Eurartesim, Duo-Cotecxin).", "es": "Dihidroartemisinina-piperaquina, utilizada en el sudeste asi\u00e1tico y cada vez m\u00e1s en \u00c1frica (nombres comerciales Eurartesim, Duo-Cotecxin).", "fr": "Dihydroart\u00e9misinine-pip\u00e9raquine, utilis\u00e9e en Asie du Sud-Est et de plus en plus en Afrique (noms commerciaux Eurartesim, Duo-Cotecxin)."}, "label": {"en": "ACT \u2014 DHA-piperaquine (DP)", "es": "TCA \u2014 DHA-piperaquina (DP)", "fr": "CTA \u2014 DHA-pip\u00e9raquine (DP)"}}, {"code": "act_artesunate_amodiaquine", "definition": {"en": "Artesunate-amodiaquine, commonly used in West and Central Africa (trade name Coarsucam/ASAQ Winthrop).", "es": "Artesunato-amodiaquina, com\u00fanmente utilizado en \u00c1frica Occidental y Central (nombre comercial Coarsucam/ASAQ Winthrop).", "fr": "Art\u00e9sunate-amodiaquine, couramment utilis\u00e9 en Afrique de l''Ouest et centrale (nom commercial Coarsucam / ASAQ Winthrop)."}, "label": {"en": "ACT \u2014 artesunate-amodiaquine (ASAQ)", "es": "TCA \u2014 artesunato-amodiaquina (ASAQ)", "fr": "CTA \u2014 art\u00e9sunate-amodiaquine (ASAQ)"}}, {"code": "artesunate_injectable", "definition": {"en": "Injectable artesunate for severe malaria (WHO first-line for severe malaria, replacing quinine).", "es": "Artesunato inyectable para malaria grave (tratamiento de primera l\u00ednea de la OMS para malaria grave, reemplazando a la quinina).", "fr": "Art\u00e9sunate injectable pour le paludisme grave (traitement de premi\u00e8re intention de l''OMS pour le paludisme grave, rempla\u00e7ant la quinine)."}, "label": {"en": "Injectable artesunate", "es": "Artesunato inyectable", "fr": "Art\u00e9sunate injectable"}}, {"code": "sp_fansidar", "definition": {"en": "Sulfadoxine-pyrimethamine, still used in some settings and for intermittent preventive treatment in pregnancy (IPTp). Resistance is widespread for treatment.", "es": "Sulfadoxina-pirimetamina, todav\u00eda utilizada en algunos contextos y para el tratamiento preventivo intermitente en el embarazo (TPIg). La resistencia es generalizada para el tratamiento.", "fr": "Sulfadoxine-pyrim\u00e9thamine, encore utilis\u00e9e dans certains contextes et pour le traitement pr\u00e9ventif intermittent pendant la grossesse (TPI-G). La r\u00e9sistance est r\u00e9pandue pour le traitement."}, "label": {"en": "SP (sulfadoxine-pyrimethamine / Fansidar)", "es": "SP (sulfadoxina-pirimetamina / Fansidar)", "fr": "SP (sulfadoxine-pyrim\u00e9thamine / Fansidar)"}}, {"code": "chloroquine", "definition": {"en": "Chloroquine, historically the first-line antimalarial. Resistance is widespread for P. falciparum; still effective for P. vivax in some regions.", "es": "Cloroquina, hist\u00f3ricamente el antipal\u00fadico de primera l\u00ednea. La resistencia es generalizada para P. falciparum; a\u00fan efectiva contra P. vivax en algunas regiones.", "fr": "Chloroquine, historiquement l''antipalud\u00e9en de premi\u00e8re intention. La r\u00e9sistance est r\u00e9pandue pour P. falciparum ; encore efficace contre P. vivax dans certaines r\u00e9gions."}, "label": {"en": "Chloroquine", "es": "Cloroquina", "fr": "Chloroquine"}}, {"code": "amodiaquine", "definition": {"en": "Amodiaquine as monotherapy (not in combination). Used in some settings for P. vivax or in combination regimens.", "es": "Amodiaquina como monoterapia (no en combinaci\u00f3n). Utilizada en algunos contextos para P. vivax o en reg\u00edmenes combinados.", "fr": "Amodiaquine en monoth\u00e9rapie (non combin\u00e9e). Utilis\u00e9e dans certains contextes pour P. vivax ou dans des sch\u00e9mas th\u00e9rapeutiques combin\u00e9s."}, "label": {"en": "Amodiaquine (alone)", "es": "Amodiaquina (sola)", "fr": "Amodiaquine (seule)"}}, {"code": "quinine", "definition": {"en": "Quinine, used for severe malaria and as second-line when ACT is unavailable. Being replaced by injectable artesunate per WHO guidance.", "es": "Quinina, utilizada para malaria grave y como segunda l\u00ednea cuando la TCA no est\u00e1 disponible. Est\u00e1 siendo reemplazada por el artesunato inyectable seg\u00fan las directrices de la OMS.", "fr": "Quinine, utilis\u00e9e pour le paludisme grave et en deuxi\u00e8me intention lorsque les CTA ne sont pas disponibles. Remplac\u00e9e par l''art\u00e9sunate injectable selon les directives de l''OMS."}, "label": {"en": "Quinine", "es": "Quinina", "fr": "Quinine"}}, {"code": "other", "definition": {"en": "Any antimalarial drug not listed above, including country-specific products.", "es": "Cualquier antipal\u00fadico no listado arriba, incluidos productos espec\u00edficos de un pa\u00eds.", "fr": "Tout antipalud\u00e9en non r\u00e9pertori\u00e9 ci-dessus, y compris les produits sp\u00e9cifiques \u00e0 un pays."}, "label": {"en": "Other antimalarial", "es": "Otro antipal\u00fadico", "fr": "Autre antipalud\u00e9en"}}, {"code": "dont_know", "definition": {"en": "The caregiver does not know the name or type of antimalarial given.", "es": "El cuidador no sabe el nombre o tipo de antipal\u00fadico administrado.", "fr": "Le soignant ne conna\u00eet pas le nom ou le type d''antipalud\u00e9en administr\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  AssessmentMethodType:
    title:
      en: Assessment Method Type
      fr: Type de méthode d'évaluation
      es: Tipo de método de evaluación
    description:
      en: Community-assessment methodology type used to collect aggregated community-level data. Distinguishes focus group discussions, key informant interviews, community meetings, direct observation, and mixed methods. Aligned with IASC MIRA Phase 2 data-collection methods and ACAPS primary-data method taxonomy.
      fr: Type de méthode d'évaluation communautaire utilisée pour collecter des données agrégées au niveau de la communauté. Distingue les discussions de groupe focalisées, les entretiens avec des informateurs clés, les réunions communautaires, l'observation directe et les méthodes mixtes. Alignée sur les méthodes de collecte de données de la Phase 2 de MIRA de l'IASC et la taxonomie des méthodes de collecte primaire d'ACAPS.
      es: Tipo de metodología de evaluación comunitaria utilizada para recopilar datos agregados a nivel comunitario. Distingue grupos focales, entrevistas a informantes clave, reuniones comunitarias, observación directa y métodos mixtos. Alineada con los métodos de recopilación de datos de la Fase 2 de MIRA del IASC y la taxonomía de métodos de datos primarios de ACAPS.
    enum_uri: aidops:AssessmentMethodType
    permissible_values:
      fgd:
        title:
          en: Focus group discussion
          fr: Discussion de groupe focalisée
          es: Grupo focal
        description:
          en: A guided discussion with 6-12 community members on a specific topic, using a discussion guide.
          fr: Une discussion guidée avec 6 à 12 membres de la communauté sur un sujet spécifique, à l'aide d'un guide de discussion.
          es: Una discusión guiada con 6 a 12 miembros de la comunidad sobre un tema específico, utilizando una guía de discusión.
      kii:
        title:
          en: Key informant interview
          fr: Entretien avec informateur clé
          es: Entrevista a informante clave
        description:
          en: A semi-structured interview with one person who holds a position or role that gives them broad knowledge of the community (e.g., village elder, health worker, teacher).
          fr: Un entretien semi-structuré avec une personne occupant une position ou un rôle lui conférant une connaissance étendue de la communauté (par exemple, ancien du village, agent de santé, enseignant).
          es: Una entrevista semi-estructurada con una persona que ocupa una posición o rol que le otorga amplio conocimiento de la comunidad (por ejemplo, anciano de la aldea, trabajador de salud, docente).
      community_meeting:
        title:
          en: Community meeting
          fr: Réunion communautaire
          es: Reunión comunitaria
        description:
          en: A larger community gathering, typically convened by community leaders, at which assessment questions are asked of the assembled group.
          fr: Un rassemblement communautaire plus large, généralement convoqué par les leaders de la communauté, au cours duquel les questions d'évaluation sont posées au groupe assemblé.
          es: Una reunión comunitaria más amplia, típicamente convocada por líderes comunitarios, en la que se formulan preguntas de evaluación al grupo reunido.
      direct_observation:
        title:
          en: Direct observation
          fr: Observation directe
          es: Observación directa
        description:
          en: Structured enumerator observation without interviewing informants; records visible indicators (market activity, damage, crowding).
          fr: Observation structurée par l'enquêteur sans entretien avec des informateurs ; enregistre des indicateurs visibles (activité des marchés, dommages, surpopulation).
          es: Observación estructurada del encuestador sin entrevistar informantes; registra indicadores visibles (actividad de mercados, daños, hacinamiento).
      mixed:
        title:
          en: Mixed methods
          fr: Méthodes mixtes
          es: Métodos mixtos
        description:
          en: A combination of two or more of the above methods, conducted together or in sequence.
          fr: Une combinaison de deux ou plusieurs des méthodes ci-dessus, menées ensemble ou en séquence.
          es: Una combinación de dos o más de los métodos anteriores, realizados conjuntamente o en secuencia.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014"], "definition": {"en": "Community-assessment methodology type used to collect aggregated community-level data. Distinguishes focus group discussions, key informant interviews, community meetings, direct observation, and mixed methods. Aligned with IASC MIRA Phase 2 data-collection methods and ACAPS primary-data method taxonomy.", "es": "Tipo de metodolog\u00eda de evaluaci\u00f3n comunitaria utilizada para recopilar datos agregados a nivel comunitario. Distingue grupos focales, entrevistas a informantes clave, reuniones comunitarias, observaci\u00f3n directa y m\u00e9todos mixtos. Alineada con los m\u00e9todos de recopilaci\u00f3n de datos de la Fase 2 de MIRA del IASC y la taxonom\u00eda de m\u00e9todos de datos primarios de ACAPS.", "fr": "Type de m\u00e9thode d''\u00e9valuation communautaire utilis\u00e9e pour collecter des donn\u00e9es agr\u00e9g\u00e9es au niveau de la communaut\u00e9. Distingue les discussions de groupe focalis\u00e9es, les entretiens avec des informateurs cl\u00e9s, les r\u00e9unions communautaires, l''observation directe et les m\u00e9thodes mixtes. Align\u00e9e sur les m\u00e9thodes de collecte de donn\u00e9es de la Phase 2 de MIRA de l''IASC et la taxonomie des m\u00e9thodes de collecte primaire d''ACAPS."}, "id": "assessment-method-type", "label": {"en": "Assessment Method Type", "es": "Tipo de m\u00e9todo de evaluaci\u00f3n", "fr": "Type de m\u00e9thode d''\u00e9valuation"}, "maturity": "draft", "standard": {"name": "IASC MIRA Phase 2 data-collection methods", "notes": "Aligns with IASC MIRA 2015 Phase 2 (Community Level Assessment, Settlement/Site Level) and with the ACAPS Technical Brief (2014) method taxonomy for primary-data collection in humanitarian needs assessment.", "uri": "https://interagencystandingcommittee.org/operational-response/mira-multi-clustersector-initial-rapid-assessment-guidance-note-2015"}, "values": [{"code": "fgd", "definition": {"en": "A guided discussion with 6-12 community members on a specific topic, using a discussion guide.", "es": "Una discusi\u00f3n guiada con 6 a 12 miembros de la comunidad sobre un tema espec\u00edfico, utilizando una gu\u00eda de discusi\u00f3n.", "fr": "Une discussion guid\u00e9e avec 6 \u00e0 12 membres de la communaut\u00e9 sur un sujet sp\u00e9cifique, \u00e0 l''aide d''un guide de discussion."}, "label": {"en": "Focus group discussion", "es": "Grupo focal", "fr": "Discussion de groupe focalis\u00e9e"}}, {"code": "kii", "definition": {"en": "A semi-structured interview with one person who holds a position or role that gives them broad knowledge of the community (e.g., village elder, health worker, teacher).", "es": "Una entrevista semi-estructurada con una persona que ocupa una posici\u00f3n o rol que le otorga amplio conocimiento de la comunidad (por ejemplo, anciano de la aldea, trabajador de salud, docente).", "fr": "Un entretien semi-structur\u00e9 avec une personne occupant une position ou un r\u00f4le lui conf\u00e9rant une connaissance \u00e9tendue de la communaut\u00e9 (par exemple, ancien du village, agent de sant\u00e9, enseignant)."}, "label": {"en": "Key informant interview", "es": "Entrevista a informante clave", "fr": "Entretien avec informateur cl\u00e9"}}, {"code": "community_meeting", "definition": {"en": "A larger community gathering, typically convened by community leaders, at which assessment questions are asked of the assembled group.", "es": "Una reuni\u00f3n comunitaria m\u00e1s amplia, t\u00edpicamente convocada por l\u00edderes comunitarios, en la que se formulan preguntas de evaluaci\u00f3n al grupo reunido.", "fr": "Un rassemblement communautaire plus large, g\u00e9n\u00e9ralement convoqu\u00e9 par les leaders de la communaut\u00e9, au cours duquel les questions d''\u00e9valuation sont pos\u00e9es au groupe assembl\u00e9."}, "label": {"en": "Community meeting", "es": "Reuni\u00f3n comunitaria", "fr": "R\u00e9union communautaire"}}, {"code": "direct_observation", "definition": {"en": "Structured enumerator observation without interviewing informants; records visible indicators (market activity, damage, crowding).", "es": "Observaci\u00f3n estructurada del encuestador sin entrevistar informantes; registra indicadores visibles (actividad de mercados, da\u00f1os, hacinamiento).", "fr": "Observation structur\u00e9e par l''enqu\u00eateur sans entretien avec des informateurs ; enregistre des indicateurs visibles (activit\u00e9 des march\u00e9s, dommages, surpopulation)."}, "label": {"en": "Direct observation", "es": "Observaci\u00f3n directa", "fr": "Observation directe"}}, {"code": "mixed", "definition": {"en": "A combination of two or more of the above methods, conducted together or in sequence.", "es": "Una combinaci\u00f3n de dos o m\u00e1s de los m\u00e9todos anteriores, realizados conjuntamente o en secuencia.", "fr": "Une combinaison de deux ou plusieurs des m\u00e9thodes ci-dessus, men\u00e9es ensemble ou en s\u00e9quence."}, "label": {"en": "Mixed methods", "es": "M\u00e9todos mixtos", "fr": "M\u00e9thodes mixtes"}}]}'
      bibliography_refs: acaps-assessment-2014
  BaselineComparison:
    title:
      en: Baseline comparison (6-point Likert)
      fr: Comparaison par rapport à la base de référence (échelle Likert à 6 niveaux)
      es: Comparación con línea base (escala Likert de 6 niveles)
    description:
      en: Six-point Likert scale for community-reported comparison of current conditions with a pre-crisis baseline. Ranges from 'much better' to 'much worse', with an explicit 'don't know' option. Used to capture a community's self-reported perception of change over time in needs-severity analysis, per JIAF 2.0 and ACAPS severity-measurement guidance.
      fr: Échelle Likert à six niveaux pour la comparaison, rapportée par la communauté, des conditions actuelles avec une situation de référence antérieure à la crise. Va de « bien mieux » à « bien pire », avec une option explicite « ne sait pas ». Utilisée pour saisir la perception auto-déclarée par la communauté du changement dans le temps lors de l'analyse de la sévérité des besoins, conformément à JIAF 2.0 et au guide de mesure de la sévérité d'ACAPS.
      es: Escala Likert de seis niveles para la comparación, reportada por la comunidad, de las condiciones actuales con una línea base previa a la crisis. Va de «mucho mejor» a «mucho peor», con una opción explícita de «no sabe». Utilizada para captar la percepción autorreportada por la comunidad del cambio a lo largo del tiempo en el análisis de severidad de necesidades, conforme a JIAF 2.0 y a la guía de medición de severidad de ACAPS.
    enum_uri: aidops:BaselineComparison
    permissible_values:
      much_better:
        title:
          en: Much better than before the crisis
          fr: Bien mieux qu'avant la crise
          es: Mucho mejor que antes de la crisis
        description:
          en: Current conditions are perceived as substantially improved compared with the pre-crisis baseline.
          fr: Les conditions actuelles sont perçues comme nettement améliorées par rapport à la situation antérieure à la crise.
          es: Las condiciones actuales se perciben como sustancialmente mejoradas en comparación con la línea base previa a la crisis.
      slightly_better:
        title:
          en: Slightly better than before the crisis
          fr: Légèrement mieux qu'avant la crise
          es: Ligeramente mejor que antes de la crisis
        description:
          en: Current conditions are perceived as somewhat improved compared with the pre-crisis baseline.
          fr: Les conditions actuelles sont perçues comme quelque peu améliorées par rapport à la situation antérieure à la crise.
          es: Las condiciones actuales se perciben como algo mejoradas en comparación con la línea base previa a la crisis.
      same:
        title:
          en: About the same as before the crisis
          fr: À peu près identique à avant la crise
          es: Aproximadamente igual que antes de la crisis
        description:
          en: Current conditions are perceived as broadly unchanged compared with the pre-crisis baseline.
          fr: Les conditions actuelles sont perçues comme globalement inchangées par rapport à la situation antérieure à la crise.
          es: Las condiciones actuales se perciben como ampliamente iguales en comparación con la línea base previa a la crisis.
      slightly_worse:
        title:
          en: Slightly worse than before the crisis
          fr: Légèrement pire qu'avant la crise
          es: Ligeramente peor que antes de la crisis
        description:
          en: Current conditions are perceived as somewhat worse compared with the pre-crisis baseline.
          fr: Les conditions actuelles sont perçues comme quelque peu dégradées par rapport à la situation antérieure à la crise.
          es: Las condiciones actuales se perciben como algo peores en comparación con la línea base previa a la crisis.
      much_worse:
        title:
          en: Much worse than before the crisis
          fr: Bien pire qu'avant la crise
          es: Mucho peor que antes de la crisis
        description:
          en: Current conditions are perceived as substantially worse compared with the pre-crisis baseline.
          fr: Les conditions actuelles sont perçues comme nettement dégradées par rapport à la situation antérieure à la crise.
          es: Las condiciones actuales se perciben como sustancialmente peores en comparación con la línea base previa a la crisis.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The community cannot say how current conditions compare with the pre-crisis baseline. A valid response, not to be re-coded as 'same' or missing.
          fr: La communauté ne peut pas dire comment les conditions actuelles se comparent à la situation antérieure à la crise. Réponse valide qui ne doit pas être recodée comme « identique » ou manquante.
          es: La comunidad no puede indicar cómo se comparan las condiciones actuales con la línea base previa a la crisis. Respuesta válida que no debe recodificarse como «igual» o faltante.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014", "iasc-jiaf-2022"], "definition": {"en": "Six-point Likert scale for community-reported comparison of current conditions with a pre-crisis baseline. Ranges from ''much better'' to ''much worse'', with an explicit ''don''t know'' option. Used to capture a community''s self-reported perception of change over time in needs-severity analysis, per JIAF 2.0 and ACAPS severity-measurement guidance.", "es": "Escala Likert de seis niveles para la comparaci\u00f3n, reportada por la comunidad, de las condiciones actuales con una l\u00ednea base previa a la crisis. Va de \u00abmucho mejor\u00bb a \u00abmucho peor\u00bb, con una opci\u00f3n expl\u00edcita de \u00abno sabe\u00bb. Utilizada para captar la percepci\u00f3n autorreportada por la comunidad del cambio a lo largo del tiempo en el an\u00e1lisis de severidad de necesidades, conforme a JIAF 2.0 y a la gu\u00eda de medici\u00f3n de severidad de ACAPS.", "fr": "\u00c9chelle Likert \u00e0 six niveaux pour la comparaison, rapport\u00e9e par la communaut\u00e9, des conditions actuelles avec une situation de r\u00e9f\u00e9rence ant\u00e9rieure \u00e0 la crise. Va de \u00ab bien mieux \u00bb \u00e0 \u00ab bien pire \u00bb, avec une option explicite \u00ab ne sait pas \u00bb. Utilis\u00e9e pour saisir la perception auto-d\u00e9clar\u00e9e par la communaut\u00e9 du changement dans le temps lors de l''analyse de la s\u00e9v\u00e9rit\u00e9 des besoins, conform\u00e9ment \u00e0 JIAF 2.0 et au guide de mesure de la s\u00e9v\u00e9rit\u00e9 d''ACAPS."}, "id": "baseline-comparison", "label": {"en": "Baseline comparison (6-point Likert)", "es": "Comparaci\u00f3n con l\u00ednea base (escala Likert de 6 niveles)", "fr": "Comparaison par rapport \u00e0 la base de r\u00e9f\u00e9rence (\u00e9chelle Likert \u00e0 6 niveaux)"}, "maturity": "draft", "standard": {"name": "JIAF 2.0 Guidance \u2014 Joint Intersectoral Analysis Framework", "notes": "Baseline-comparison lens drawn from JIAF 2.0 (\u00a74 severity scoring by comparison with a pre-crisis or reference state) and ACAPS Severity Measurement guidance.", "uri": "https://www.jiaf.info/"}, "values": [{"code": "much_better", "definition": {"en": "Current conditions are perceived as substantially improved compared with the pre-crisis baseline.", "es": "Las condiciones actuales se perciben como sustancialmente mejoradas en comparaci\u00f3n con la l\u00ednea base previa a la crisis.", "fr": "Les conditions actuelles sont per\u00e7ues comme nettement am\u00e9lior\u00e9es par rapport \u00e0 la situation ant\u00e9rieure \u00e0 la crise."}, "label": {"en": "Much better than before the crisis", "es": "Mucho mejor que antes de la crisis", "fr": "Bien mieux qu''avant la crise"}}, {"code": "slightly_better", "definition": {"en": "Current conditions are perceived as somewhat improved compared with the pre-crisis baseline.", "es": "Las condiciones actuales se perciben como algo mejoradas en comparaci\u00f3n con la l\u00ednea base previa a la crisis.", "fr": "Les conditions actuelles sont per\u00e7ues comme quelque peu am\u00e9lior\u00e9es par rapport \u00e0 la situation ant\u00e9rieure \u00e0 la crise."}, "label": {"en": "Slightly better than before the crisis", "es": "Ligeramente mejor que antes de la crisis", "fr": "L\u00e9g\u00e8rement mieux qu''avant la crise"}}, {"code": "same", "definition": {"en": "Current conditions are perceived as broadly unchanged compared with the pre-crisis baseline.", "es": "Las condiciones actuales se perciben como ampliamente iguales en comparaci\u00f3n con la l\u00ednea base previa a la crisis.", "fr": "Les conditions actuelles sont per\u00e7ues comme globalement inchang\u00e9es par rapport \u00e0 la situation ant\u00e9rieure \u00e0 la crise."}, "label": {"en": "About the same as before the crisis", "es": "Aproximadamente igual que antes de la crisis", "fr": "\u00c0 peu pr\u00e8s identique \u00e0 avant la crise"}}, {"code": "slightly_worse", "definition": {"en": "Current conditions are perceived as somewhat worse compared with the pre-crisis baseline.", "es": "Las condiciones actuales se perciben como algo peores en comparaci\u00f3n con la l\u00ednea base previa a la crisis.", "fr": "Les conditions actuelles sont per\u00e7ues comme quelque peu d\u00e9grad\u00e9es par rapport \u00e0 la situation ant\u00e9rieure \u00e0 la crise."}, "label": {"en": "Slightly worse than before the crisis", "es": "Ligeramente peor que antes de la crisis", "fr": "L\u00e9g\u00e8rement pire qu''avant la crise"}}, {"code": "much_worse", "definition": {"en": "Current conditions are perceived as substantially worse compared with the pre-crisis baseline.", "es": "Las condiciones actuales se perciben como sustancialmente peores en comparaci\u00f3n con la l\u00ednea base previa a la crisis.", "fr": "Les conditions actuelles sont per\u00e7ues comme nettement d\u00e9grad\u00e9es par rapport \u00e0 la situation ant\u00e9rieure \u00e0 la crise."}, "label": {"en": "Much worse than before the crisis", "es": "Mucho peor que antes de la crisis", "fr": "Bien pire qu''avant la crise"}}, {"code": "dont_know", "definition": {"en": "The community cannot say how current conditions compare with the pre-crisis baseline. A valid response, not to be re-coded as ''same'' or missing.", "es": "La comunidad no puede indicar c\u00f3mo se comparan las condiciones actuales con la l\u00ednea base previa a la crisis. Respuesta v\u00e1lida que no debe recodificarse como \u00abigual\u00bb o faltante.", "fr": "La communaut\u00e9 ne peut pas dire comment les conditions actuelles se comparent \u00e0 la situation ant\u00e9rieure \u00e0 la crise. R\u00e9ponse valide qui ne doit pas \u00eatre recod\u00e9e comme \u00ab identique \u00bb ou manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
