      publicschema_logical_document_json: '{"definition": {"en": "Whether the household currently has access to agricultural or productive land, and under what broad arrangement (owned, rented, customary, or borrowed). Synthesised from the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT) and the LSMS-ISA land tenure module. Used as a prerequisite screen before capturing full tenure details: this vocabulary is coarser than `land-tenure` (PS) and is designed for rapid needs assessment. Agriculture-specific land area and crop details belong to AgricultureProfile.", "es": "Si el hogar tiene actualmente acceso a tierras agr\u00edcolas o productivas, y bajo qu\u00e9 arreglo general (propia, arrendada, consuetudinaria o prestada). Sintetizado a partir de las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT) y el m\u00f3dulo de tenencia de la tierra LSMS-ISA. Se utiliza como pantalla previa antes de capturar los detalles completos de tenencia: este vocabulario es m\u00e1s grueso que `land-tenure` (PublicSchema) y est\u00e1 dise\u00f1ado para evaluaci\u00f3n r\u00e1pida de necesidades. Los detalles de superficie y cultivos pertenecen a AgricultureProfile.", "fr": "Si le m\u00e9nage a actuellement acc\u00e8s \u00e0 des terres agricoles ou productives, et sous quel arrangement g\u00e9n\u00e9ral (propri\u00e9t\u00e9, location, droit coutumier ou emprunt). Synth\u00e9tis\u00e9 \u00e0 partir des Directives volontaires de la FAO pour une gouvernance responsable des r\u00e9gimes fonciers (VGGT) et du module foncier LSMS-ISA. Utilis\u00e9 comme \u00e9cran pr\u00e9alable avant la saisie des d\u00e9tails complets du r\u00e9gime foncier : ce vocabulaire est plus grossier que `land-tenure` (PublicSchema) et est con\u00e7u pour l''\u00e9valuation rapide des besoins. Les d\u00e9tails de superficie et de cultures rel\u00e8vent d''AgricultureProfile."}, "id": "land-access-status", "label": {"en": "Land Access Status", "es": "Estad