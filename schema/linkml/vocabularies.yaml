e9e au sein d''un groupe d''agriculteurs, d''une association d''usagers de l''eau ou d''une coop\u00e9rative agricole sur les conditions attendues."}, "label": {"en": "Farmer group or cooperative", "es": "Grupo de agricultores o cooperativa", "fr": "Groupe de fermiers ou coop\u00e9rative"}}, {"code": "religious_or_traditional", "definition": {"en": "Seasonal forecasts based on traditional ecological knowledge, religious calendars, or observations shared by elders, religious leaders, or traditional authorities.", "es": "Pron\u00f3sticos estacionales basados en conocimientos ecol\u00f3gicos tradicionales, calendarios religiosos u observaciones compartidas por ancianos, l\u00edderes religiosos o autoridades tradicionales.", "fr": "Pr\u00e9visions saisonni\u00e8res bas\u00e9es sur les connaissances \u00e9cologiques traditionnelles, les calendriers religieux ou les observations partag\u00e9es par les anciens, les leaders religieux ou les autorit\u00e9s traditionnelles."}, "label": {"en": "Religious or traditional knowledge", "es": "Conocimiento religioso o tradicional", "fr": "Connaissances religieuses ou traditionnelles"}}, {"code": "internet_social_media", "definition": {"en": "Weather or climate information sourced from websites, Facebook, WhatsApp groups, Telegram channels, or other internet-based platforms.", "es": "Informaci\u00f3n meteorol\u00f3gica o clim\u00e1tica obtenida de sitios web, Facebook, grupos de WhatsApp, canales de Telegram u otras plataformas de internet.", "fr": "Informations m\u00e9t\u00e9orologiques ou climatiques provenant de sites web, Facebook, groupes WhatsApp, canaux Telegram ou d''autres plateformes Internet."}, "label": {"en": "Internet or social media", "es": "Internet o redes sociales", "fr": "Internet ou r\u00e9seaux sociaux"}}, {"code": "other", "definition": {"en": "Climate or weather information source not listed above.", "es": "Fuente de informaci\u00f3n clim\u00e1tica o meteorol\u00f3gica no listada anteriormente.", "fr": "Source 