  GbvHelpseekingBarriers:
    title:
      en: Barriers to help-seeking after partner violence
      fr: Obstacles à la recherche d'aide après violences conjugales
      es: Barreras para buscar ayuda tras violencia de pareja
    description:
      en: Reasons a woman did not seek help following partner violence, asked of respondents who report no help-seeking attempt (gbv_helpseeking_attempted = false). Based on DHS country questionnaire barrier batteries and WHO Multi-Country Study (Garcia-Moreno et al. 2005). Multiple codes may be selected.
      fr: Raisons pour lesquelles une femme n'a pas cherché d'aide à la suite de violences conjugales, posées aux répondantes qui n'ont pas tenté de recourir à une aide (gbv_helpseeking_attempted = faux). Basé sur les batteries DHS et l'Étude multi-pays de l'OMS.
      es: Razones por las que una mujer no buscó ayuda tras violencia de pareja, preguntadas a encuestadas que no intentaron buscar ayuda (gbv_helpseeking_attempted = falso). Basado en baterías de barreras de encuestas DHS y el Estudio multipaís de la OMS.
    enum_uri: aidops:GbvHelpseekingBarriers
    permissible_values:
      not_serious:
        title:
          en: Problem not serious enough
          fr: Problème pas assez grave
          es: El problema no era suficientemente grave
        description:
          en: The respondent did not consider the violence serious enough to warrant seeking help.
          fr: La répondante n'a pas considéré la violence suffisamment grave pour justifier de chercher de l'aide.
          es: La encuestada no consideró la violencia suficientemente grave como para justificar buscar ayuda.
      self_blame:
        title:
          en: Thought she was at fault
          fr: Pensait être en faute
          es: Creyó que era su culpa
        description:
          en: The respondent believed the violence was her own fault or that she had provoked it.
          fr: La répondante croyait que la violence était de sa faute ou qu'elle l'avait provoquée.
          es: La encuestada creía que la violencia era su culpa o que la había provocado.
      ashamed:
        title:
          en: Ashamed or embarrassed
          fr: Honte ou embarras
          es: Vergüenza o embarazo
        description:
          en: The respondent felt shame or embarrassment about disclosing the violence.
          fr: La répondante ressentait de la honte ou de l'embarras à divulguer la violence.
          es: La encuestada sentía vergüenza o embarazo al divulgar la violencia.
      afraid_more_violence:
        title:
          en: Afraid of more violence
          fr: Peur de plus de violence
          es: Miedo a más violencia
        description:
          en: The respondent feared that seeking help would result in more or worse violence.
          fr: La répondante craignait que le recours à l'aide entraîne davantage de violence ou une violence plus grave.
          es: La encuestada temía que buscar ayuda resultara en más violencia o peor.
      afraid_family_response:
        title:
          en: Afraid of family reaction
          fr: Peur de la réaction familiale
          es: Miedo a la reacción familiar
        description:
          en: The respondent feared the reaction of her own family or in-laws if she disclosed.
          fr: La répondante craignait la réaction de sa propre famille ou de sa belle-famille si elle divulguait.
          es: La encuestada temía la reacción de su propia familia o la familia política si divulgaba.
      no_services_known:
        title:
          en: Did not know where to go
          fr: Ne savait pas où aller
          es: No sabía adónde ir
        description:
          en: The respondent was not aware of any available service or person to approach.
          fr: La répondante n'était pas au courant d'un service ou d'une personne disponible à contacter.
          es: La encuestada no tenía conocimiento de ningún servicio o persona disponible a quien acudir.
      distrust_services:
        title:
          en: Did not trust services to help
          fr: N'avait pas confiance dans les services
          es: No confiaba en los servicios
        description:
          en: The respondent believed services (police, courts, social services) would not help effectively or could not be trusted.
          fr: La répondante croyait que les services (police, tribunaux, services sociaux) ne l'aideraient pas efficacement ou n'étaient pas dignes de confiance.
          es: La encuestada creía que los servicios (policía, tribunales, servicios sociales) no ayudarían eficazmente o no eran de confianza.
      economic_dependence:
        title:
          en: Economic dependence on partner
          fr: Dépendance économique envers le partenaire
          es: Dependencia económica del compañero
        description:
          en: The respondent could not seek help because she depended financially on the partner.
          fr: La répondante ne pouvait pas chercher de l'aide car elle dépendait financièrement du partenaire.
          es: La encuestada no pudo buscar ayuda porque dependía económicamente del compañero.
      for_children:
        title:
          en: For the children or family
          fr: Pour les enfants ou la famille
          es: Por los hijos o la familia
        description:
          en: The respondent did not want to break up the family or household for the sake of children or family unity.
          fr: La répondante ne voulait pas briser la famille ou le ménage pour le bien des enfants ou de l'unité familiale.
          es: La encuestada no quería romper la familia o el hogar por el bien de los hijos o la unidad familiar.
      no_one_to_tell:
        title:
          en: No one to tell
          fr: Personne à qui se confier
          es: Nadie a quien contarle
        description:
          en: The respondent had no trusted person or institution to approach.
          fr: La répondante n'avait aucune personne ou institution de confiance à contacter.
          es: La encuestada no tenía ninguna persona o institución de confianza a quien acudir.
      normalized:
        title:
          en: Thought this was normal
          fr: Pensait que c'était normal
          es: Creía que era normal
        description:
          en: The respondent considered the violence to be normal in relationships or society.
          fr: La répondante considérait la violence comme normale dans les relations ou la société.
          es: La encuestada consideraba que la violencia era normal en las relaciones o la sociedad.
      other:
        title:
          en: Other reason
          fr: Autre raison
          es: Otra razón
        description:
          en: Any other barrier not listed above.
          fr: Tout autre obstacle non répertorié ci-dessus.
          es: Cualquier otra barrera no incluida en la lista anterior.
    annotations:
