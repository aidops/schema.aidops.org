  WarningSupportNeeded:
    title:
      en: Warning Support Needed
      fr: Soutien nécessaire pour répondre à une alerte
      es: Apoyo necesario para responder a una alerta
    description:
      en: The kinds of support a household identifies as most helpful for taking protective action in response to a future early warning. Covers message-side improvements (earlier warning, clearer message, warning in the local language), operational support (transport assistance, safe shelter location, cash assistance, livestock protection support, childcare or elderly-care support), capacity support (training or drills on what to do), an explicit 'none' code for households that feel they can act fully without additional support, and an 'other' code. Captured as a multi-select reflection item asked of all respondents whether or not they received a warning for the reference event.
      fr: Les types de soutien qu'un ménage identifie comme les plus utiles pour prendre des actions de protection en réponse à une alerte précoce future. Couvre les améliorations du côté du message (alerte plus précoce, message plus clair, alerte dans la langue locale), le soutien opérationnel (aide au transport, lieu d'abri sûr, aide financière, soutien à la protection du bétail, soutien à la garde d'enfants ou de personnes âgées), le soutien en capacité (formation ou exercices sur ce qu'il faut faire), un code explicite « aucun » pour les ménages qui estiment pouvoir agir pleinement sans soutien supplémentaire, et un code « autre ». Saisi comme un item de réflexion à sélection multiple posé à tous les répondants qu'ils aient reçu ou non une alerte pour l'événement de référence.
      es: Los tipos de apoyo que un hogar identifica como más útiles para tomar acción de protección en respuesta a una alerta temprana futura. Abarca mejoras del lado del mensaje (alerta más temprana, mensaje más claro, alerta en el idioma local), apoyo operativo (asistencia de transporte, lugar de refugio seguro, asistencia en efectivo, apoyo para protección de ganado, apoyo al cuidado de niños o personas mayores), apoyo en capacidad (capacitación o simulacros sobre qué hacer), un código explícito «ninguno» para hogares que consideran que pueden actuar plenamente sin apoyo adicional, y un código «otro». Capturado como ítem de reflexión de selección múltiple preguntado a todos los respondientes hayan o no recibido una alerta para el evento de referencia.
    enum_uri: aidops:WarningSupportNeeded
    permissible_values:
      earlier_warning:
        title:
          en: Earlier warning
          fr: Alerte plus précoce
          es: Alerta más temprana
        description:
          en: More lead time between the warning and the event.
          fr: Plus de délai entre l'alerte et l'événement.
          es: Más tiempo entre la alerta y el evento.
      clearer_message:
        title:
          en: Clearer message
          fr: Message plus clair
          es: Mensaje más claro
        description:
          en: Warning content that is more specific and more actionable.
          fr: Contenu d'alerte plus spécifique et plus exploitable.
          es: Contenido de la alerta más específico y más accionable.
      warning_in_local_language:
        title:
          en: Warning in the local language
          fr: Alerte dans la langue locale
          es: Alerta en el idioma local
        description:
          en: Warning translated into the household's primary language.
          fr: Alerte traduite dans la langue principale du ménage.
          es: Alerta traducida al idioma principal del hogar.
      transport_assistance:
        title:
          en: Transport assistance
          fr: Aide au transport
          es: Asistencia de transporte
        description:
          en: Help getting to a safer location.
          fr: Aide pour rejoindre un lieu plus sûr.
          es: Ayuda para llegar a un lugar más seguro.
      safe_shelter_location:
        title:
          en: Safer shelter available
          fr: Abri plus sûr disponible
          es: Refugio más seguro disponible
        description:
          en: A designated and accessible safe shelter.
          fr: Un abri sûr désigné et accessible.
          es: Un refugio seguro designado y accesible.
      cash_assistance:
        title:
          en: Anticipatory cash
          fr: Espèces anticipatoires
          es: Efectivo anticipatorio
        description:
          en: Cash transferred in advance of the event to fund protective action.
          fr: Espèces transférées avant l'événement pour financer l'action de protection.
          es: Efectivo transferido antes del evento para financiar la acción de protección.
      livestock_protection_support:
        title:
          en: Livestock protection support
          fr: Soutien à la protection du bétail
          es: Apoyo para protección del ganado
        description:
          en: Fodder, temporary livestock shelters, or livestock evacuation support.
          fr: Fourrage, abris temporaires pour le bétail ou appui à l'évacuation du bétail.
          es: Forraje, refugios temporales para ganado o apoyo a la evacuación del ganado.
      childcare_elderly_care_support:
        title:
          en: Support caring for dependents
          fr: Soutien pour la prise en charge des personnes dépendantes
          es: Apoyo al cuidado de personas dependientes
        description:
          en: Help moving or caring for children, elderly, or disabled household members.
          fr: Aide pour déplacer ou prendre en charge les enfants, les personnes âgées ou les membres du ménage en situation de handicap.
          es: Ayuda para trasladar o cuidar a niños, personas mayores o miembros del hogar con discapacidad.
      training_on_what_to_do:
        title:
          en: Training or drills
          fr: Formation ou exercices
          es: Capacitación o simulacros
        description:
          en: Prior training or simulation exercises on what to do during this type of event.
          fr: Formation préalable ou exercices de simulation sur ce qu'il faut faire lors de ce type d'événement.
          es: Capacitación previa o ejercicios de simulación sobre qué hacer durante este tipo de evento.
      none:
        title:
          en: No additional support needed
          fr: Aucun soutien supplémentaire nécessaire
          es: No se necesita apoyo adicional
        description:
          en: Household feels it can act fully without additional support.
          fr: Le ménage estime qu'il peut agir pleinement sans soutien supplémentaire.
          es: El hogar considera que puede actuar plenamente sin apoyo adicional.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Support not listed above.
          fr: Soutien non répertorié ci-dessus.
          es: Apoyo no listado arriba.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gfdrr-aa-toolkit-2023", "iasc-aap-early-response-2020", "ifrc-fbf-ma-guide-2019", "start-network-def"], "definition": {"en": "The kinds of support a household identifies as most helpful for taking protective action in response to a future early warning. Covers message-side improvements (earlier warning, clearer message, warning in the local language), operational support (transport assistance, safe shelter location, cash assistance, livestock protection support, childcare or elderly-care support), capacity support (training or drills on what to do), an explicit ''none'' code for households that feel they can act fully without additional support, and an ''other'' code. Captured as a multi-select reflection item asked of all respondents whether or not they received a warning for the reference event.", "es": "Los tipos de apoyo que un hogar identifica como m\u00e1s \u00fatiles para tomar acci\u00f3n de protecci\u00f3n en respuesta a una alerta temprana futura. Abarca mejoras del lado del mensaje (alerta m\u00e1s temprana, mensaje m\u00e1s claro, alerta en el idioma local), apoyo operativo (asistencia de transporte, lugar de refugio seguro, asistencia en efectivo, apoyo para protecci\u00f3n de ganado, apoyo al cuidado de ni\u00f1os o personas mayores), apoyo en capacidad (capacitaci\u00f3n o simulacros sobre qu\u00e9 hacer), un c\u00f3digo expl\u00edcito \u00abninguno\u00bb para hogares que consideran que pueden actuar plenamente sin apoyo adicional, y un c\u00f3digo \u00abotro\u00bb. Capturado como \u00edtem de reflexi\u00f3n de selecci\u00f3n m\u00faltiple preguntado a todos los respondientes hayan o no recibido una alerta para el evento de referencia.", "fr": "Les types de soutien qu''un m\u00e9nage identifie comme les plus utiles pour prendre des actions de protection en r\u00e9ponse \u00e0 une alerte pr\u00e9coce future. Couvre les am\u00e9liorations du c\u00f4t\u00e9 du message (alerte plus pr\u00e9coce, message plus clair, alerte dans la langue locale), le soutien op\u00e9rationnel (aide au transport, lieu d''abri s\u00fbr, aide financi\u00e8re, soutien \u00e0 la protection du b\u00e9tail, soutien \u00e0 la garde d''enfants ou de personnes \u00e2g\u00e9es), le soutien en capacit\u00e9 (formation ou exercices sur ce qu''il faut faire), un code explicite \u00ab aucun \u00bb pour les m\u00e9nages qui estiment pouvoir agir pleinement sans soutien suppl\u00e9mentaire, et un code \u00ab autre \u00bb. Saisi comme un item de r\u00e9flexion \u00e0 s\u00e9lection multiple pos\u00e9 \u00e0 tous les r\u00e9pondants qu''ils aient re\u00e7u ou non une alerte pour l''\u00e9v\u00e9nement de r\u00e9f\u00e9rence."}, "id": "warning-support-needed", "label": {"en": "Warning Support Needed", "es": "Apoyo necesario para responder a una alerta", "fr": "Soutien n\u00e9cessaire pour r\u00e9pondre \u00e0 une alerte"}, "maturity": "draft", "standard": {"name": "IFRC Forecast-based Financing focus-group discussion guide; Start Network Distribution Evaluation Framework household learning module; IASC Accountability to Affected Populations operational guidance", "notes": "Codes consolidate the support-needs inventories used in IFRC FbF post-event reflection FGD guides and in Start Network DEF household learning modules, cross-referenced with IASC AAP guidance on closing the information and support feedback loop.", "uri": "https://www.anticipation-hub.org/"}, "values": [{"code": "earlier_warning", "definition": {"en": "More lead time between the warning and the event.", "es": "M\u00e1s tiempo entre la alerta y el evento.", "fr": "Plus de d\u00e9lai entre l''alerte et l''\u00e9v\u00e9nement."}, "label": {"en": "Earlier warning", "es": "Alerta m\u00e1s temprana", "fr": "Alerte plus pr\u00e9coce"}}, {"code": "clearer_message", "definition": {"en": "Warning content that is more specific and more actionable.", "es": "Contenido de la alerta m\u00e1s espec\u00edfico y m\u00e1s accionable.", "fr": "Contenu d''alerte plus sp\u00e9cifique et plus exploitable."}, "label": {"en": "Clearer message", "es": "Mensaje m\u00e1s claro", "fr": "Message plus clair"}}, {"code": "warning_in_local_language", "definition": {"en": "Warning translated into the household''s primary language.", "es": "Alerta traducida al idioma principal del hogar.", "fr": "Alerte traduite dans la langue principale du m\u00e9nage."}, "label": {"en": "Warning in the local language", "es": "Alerta en el idioma local", "fr": "Alerte dans la langue locale"}}, {"code": "transport_assistance", "definition": {"en": "Help getting to a safer location.", "es": "Ayuda para llegar a un lugar m\u00e1s seguro.", "fr": "Aide pour rejoindre un lieu plus s\u00fbr."}, "label": {"en": "Transport assistance", "es": "Asistencia de transporte", "fr": "Aide au transport"}}, {"code": "safe_shelter_location", "definition": {"en": "A designated and accessible safe shelter.", "es": "Un refugio seguro designado y accesible.", "fr": "Un abri s\u00fbr d\u00e9sign\u00e9 et accessible."}, "label": {"en": "Safer shelter available", "es": "Refugio m\u00e1s seguro disponible", "fr": "Abri plus s\u00fbr disponible"}}, {"code": "cash_assistance", "definition": {"en": "Cash transferred in advance of the event to fund protective action.", "es": "Efectivo transferido antes del evento para financiar la acci\u00f3n de protecci\u00f3n.", "fr": "Esp\u00e8ces transf\u00e9r\u00e9es avant l''\u00e9v\u00e9nement pour financer l''action de protection."}, "label": {"en": "Anticipatory cash", "es": "Efectivo anticipatorio", "fr": "Esp\u00e8ces anticipatoires"}}, {"code": "livestock_protection_support", "definition": {"en": "Fodder, temporary livestock shelters, or livestock evacuation support.", "es": "Forraje, refugios temporales para ganado o apoyo a la evacuaci\u00f3n del ganado.", "fr": "Fourrage, abris temporaires pour le b\u00e9tail ou appui \u00e0 l''\u00e9vacuation du b\u00e9tail."}, "label": {"en": "Livestock protection support", "es": "Apoyo para protecci\u00f3n del ganado", "fr": "Soutien \u00e0 la protection du b\u00e9tail"}}, {"code": "childcare_elderly_care_support", "definition": {"en": "Help moving or caring for children, elderly, or disabled household members.", "es": "Ayuda para trasladar o cuidar a ni\u00f1os, personas mayores o miembros del hogar con discapacidad.", "fr": "Aide pour d\u00e9placer ou prendre en charge les enfants, les personnes \u00e2g\u00e9es ou les membres du m\u00e9nage en situation de handicap."}, "label": {"en": "Support caring for dependents", "es": "Apoyo al cuidado de personas dependientes", "fr": "Soutien pour la prise en charge des personnes d\u00e9pendantes"}}, {"code": "training_on_what_to_do", "definition": {"en": "Prior training or simulation exercises on what to do during this type of event.", "es": "Capacitaci\u00f3n previa o ejercicios de simulaci\u00f3n sobre qu\u00e9 hacer durante este tipo de evento.", "fr": "Formation pr\u00e9alable ou exercices de simulation sur ce qu''il faut faire lors de ce type d''\u00e9v\u00e9nement."}, "label": {"en": "Training or drills", "es": "Capacitaci\u00f3n o simulacros", "fr": "Formation ou exercices"}}, {"code": "none", "definition": {"en": "Household feels it can act fully without additional support.", "es": "El hogar considera que puede actuar plenamente sin apoyo adicional.", "fr": "Le m\u00e9nage estime qu''il peut agir pleinement sans soutien suppl\u00e9mentaire."}, "label": {"en": "No additional support needed", "es": "No se necesita apoyo adicional", "fr": "Aucun soutien suppl\u00e9mentaire n\u00e9cessaire"}}, {"code": "other", "definition": {"en": "Support not listed above.", "es": "Apoyo no listado arriba.", "fr": "Soutien non r\u00e9pertori\u00e9 ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
