          fr: Le répondant perçoit une capacité limitée à participer. Code 2. Ne satisfait pas au seuil d'adéquation.
          es: El encuestado percibe capacidad limitada para participar. Código 2. No cumple el umbral de adecuación.
      medium_extent:
        title:
          en: To a medium extent
          fr: Dans une mesure moyenne
          es: En medida media
        description:
          en: The respondent perceives moderate capacity to participate. Code 3. Meets adequacy threshold for B1 condition B and B3 condition B.
          fr: Le répondant perçoit une capacité modérée à participer. Code 3. Satisfait au seuil d'adéquation pour la condition B de B1 et la condition B de B3.
          es: El encuestado percibe capacidad moderada para participar. Código 3. Cumple el umbral de adecuación para la condición B de B1 y la condición B de B3.
      high_extent:
        title:
          en: To a high extent
