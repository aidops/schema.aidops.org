 "conflict_manmade", "definition": {"en": "School closed due to armed conflict, civil unrest, or other man-made disaster. May indicate exposure to conflict or displacement.", "es": "Escuela cerrada debido a conflicto armado, disturbios civiles u otro desastre provocado por el hombre. Puede indicar exposici\u00f3n a conflicto o desplazamiento.", "fr": "\u00c9cole ferm\u00e9e en raison d''un conflit arm\u00e9, d''une agitation civile ou d''une autre catastrophe d''origine humaine. Peut indiquer une exposition \u00e0 un conflit ou un d\u00e9placement."}, "label": {"en": "Man-made disaster or conflict", "es": "Desastre provocado por el hombre o conflicto", "fr": "Catastrophe d''origine humaine ou conflit"}}, {"code": "teacher_strike", "definition": {"en": "School closed due to a teacher or education worker strike.", "es": "Escuela cerrada debido a una huelga de docentes o trabajadores de la educaci\u00f3n.", "fr": "\u00c9cole ferm\u00e9e en raison d''une gr\u00e8ve des enseignants ou des travailleurs de l''\u00e9ducation."}, "label": {"en": "Teacher strike", "es": "Huelga de docentes", "fr": "Gr\u00e8ve des enseignants"}}, {"code": "other", "definition": {"en": "School closure for a reason not captured by the other categories.", "es": "Cierre escolar por una raz\u00f3n no contemplada en las dem\u00e1s categor\u00edas.", "fr": "Fermeture scolaire pour une raison non couverte par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
