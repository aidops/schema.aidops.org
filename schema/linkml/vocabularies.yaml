          fr: La répondante n'utilise actuellement aucune méthode contraceptive. Inclus par souci d'exhaustivité dans les questions sur l'utilisation passée ou le changement de méthode.
          es: La encuestada no utiliza actualmente ningún método anticonceptivo. Se incluye por completitud en preguntas sobre uso pasado o cambio de método.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = none (not applicable)"}}'
