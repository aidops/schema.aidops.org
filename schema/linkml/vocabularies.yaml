  AncVisitCountGroup:
    title:
      en: ANC Visit Count Group
      fr: Groupe de nombre de visites prénatales
      es: Grupo de cantidad de visitas de APN
    description:
      en: The number of antenatal care contacts received during the most recent pregnancy, grouped per DHS-8 m14 categories. WHO 2016 recommends 8 or more contacts; SDG 3.1.b and HMIS use 4 or more as the standard threshold. DHS-8 changed from 4+ to 8+ as the key indicator numerator.
      fr: Le nombre de contacts de soins prénataux reçus pendant la grossesse la plus récente, regroupé selon les catégories DHS-8 m14. L'OMS 2016 recommande 8 contacts ou plus ; l'ODD 3.1.b et les HMIS utilisent 4 ou plus comme seuil standard. Le DHS-8 est passé de 4+ à 8+ comme numérateur de l'indicateur clé.
      es: El número de contactos de atención prenatal recibidos durante el embarazo más reciente, agrupados según las categorías DHS-8 m14. La OMS 2016 recomienda 8 o más contactos; el ODS 3.1.b y los HMIS utilizan 4 o más como umbral estándar. El DHS-8 cambió de 4+ a 8+ como numerador del indicador clave.
    enum_uri: aidops:AncVisitCountGroup
    permissible_values:
      none:
        title:
          en: None (0 visits)
          fr: Aucune (0 visite)
          es: Ninguna (0 visitas)
        description:
          en: No antenatal care contacts during this pregnancy.
          fr: Aucun contact de soins prénataux pendant cette grossesse.
          es: Ningún contacto de atención prenatal durante este embarazo.
      v1:
        title:
          en: 1 visit
          fr: 1 visite
          es: 1 visita
        description:
          en: Exactly one antenatal care contact during this pregnancy. DHS m14 = 1.
          fr: Exactement un contact de soins prénataux pendant cette grossesse. DHS m14 = 1.
          es: Exactamente un contacto de atención prenatal durante este embarazo. DHS m14 = 1.
      v2:
        title:
          en: 2 visits
          fr: 2 visites
          es: 2 visitas
        description:
          en: Exactly two antenatal care contacts during this pregnancy. DHS m14 = 2.
          fr: Exactement deux contacts de soins prénataux pendant cette grossesse. DHS m14 = 2.
          es: Exactamente dos contactos de atención prenatal durante este embarazo. DHS m14 = 2.
      v3:
        title:
          en: 3 visits
          fr: 3 visites
          es: 3 visitas
        description:
          en: Exactly three antenatal care contacts during this pregnancy. DHS m14 = 3.
          fr: Exactement trois contacts de soins prénataux pendant cette grossesse. DHS m14 = 3.
          es: Exactamente tres contactos de atención prenatal durante este embarazo. DHS m14 = 3.
      v4_to_7:
        title:
          en: 4 to 7 visits
          fr: 4 à 7 visites
          es: De 4 a 7 visitas
        description:
          en: Four to seven antenatal care contacts. Meets the SDG/HMIS 4+ threshold but not the WHO 2016 8-contact recommendation. DHS m14 = 4–7.
          fr: Quatre à sept contacts de soins prénataux. Satisfait au seuil ODD/HMIS 4+ mais pas à la recommandation OMS 2016 de 8 contacts. DHS m14 = 4–7.
          es: Cuatro a siete contactos de atención prenatal. Cumple el umbral ODS/HMIS de 4+ pero no la recomendación OMS 2016 de 8 contactos. DHS m14 = 4–7.
      v8_or_more:
        title:
          en: 8 or more visits
          fr: 8 visites ou plus
          es: 8 visitas o más
        description:
          en: Eight or more antenatal care contacts. Meets the WHO 2016 recommended minimum of 8 contacts for a positive pregnancy experience. DHS m14 = 8+.
          fr: Huit contacts de soins prénataux ou plus. Satisfait au minimum recommandé par l'OMS 2016 de 8 contacts pour une expérience de grossesse positive. DHS m14 = 8+.
          es: Ocho o más contactos de atención prenatal. Cumple con el mínimo recomendado de la OMS 2016 de 8 contactos para una experiencia positiva del embarazo. DHS m14 = 8+.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember the number of visits.
          fr: La répondante ne sait pas ou ne se souvient pas du nombre de visites.
          es: La encuestada no sabe o no recuerda el número de visitas.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn", "who-anc-2016"], "definition": {"en": "The number of antenatal care contacts received during the most recent pregnancy, grouped per DHS-8 m14 categories. WHO 2016 recommends 8 or more contacts; SDG 3.1.b and HMIS use 4 or more as the standard threshold. DHS-8 changed from 4+ to 8+ as the key indicator numerator.", "es": "El n\u00famero de contactos de atenci\u00f3n prenatal recibidos durante el embarazo m\u00e1s reciente, agrupados seg\u00fan las categor\u00edas DHS-8 m14. La OMS 2016 recomienda 8 o m\u00e1s contactos; el ODS 3.1.b y los HMIS utilizan 4 o m\u00e1s como umbral est\u00e1ndar. El DHS-8 cambi\u00f3 de 4+ a 8+ como numerador del indicador clave.", "fr": "Le nombre de contacts de soins pr\u00e9nataux re\u00e7us pendant la grossesse la plus r\u00e9cente, regroup\u00e9 selon les cat\u00e9gories DHS-8 m14. L''OMS 2016 recommande 8 contacts ou plus ; l''ODD 3.1.b et les HMIS utilisent 4 ou plus comme seuil standard. Le DHS-8 est pass\u00e9 de 4+ \u00e0 8+ comme num\u00e9rateur de l''indicateur cl\u00e9."}, "id": "anc-visit-count-group", "label": {"en": "ANC Visit Count Group", "es": "Grupo de cantidad de visitas de APN", "fr": "Groupe de nombre de visites pr\u00e9natales"}, "maturity": "draft", "values": [{"code": "none", "definition": {"en": "No antenatal care contacts during this pregnancy.", "es": "Ning\u00fan contacto de atenci\u00f3n prenatal durante este embarazo.", "fr": "Aucun contact de soins pr\u00e9nataux pendant cette grossesse."}, "label": {"en": "None (0 visits)", "es": "Ninguna (0 visitas)", "fr": "Aucune (0 visite)"}}, {"code": "v1", "definition": {"en": "Exactly one antenatal care contact during this pregnancy. DHS m14 = 1.", "es": "Exactamente un contacto de atenci\u00f3n prenatal durante este embarazo. DHS m14 = 1.", "fr": "Exactement un contact de soins pr\u00e9nataux pendant cette grossesse. DHS m14 = 1."}, "label": {"en": "1 visit", "es": "1 visita", "fr": "1 visite"}}, {"code": "v2", "definition": {"en": "Exactly two antenatal care contacts during this pregnancy. DHS m14 = 2.", "es": "Exactamente dos contactos de atenci\u00f3n prenatal durante este embarazo. DHS m14 = 2.", "fr": "Exactement deux contacts de soins pr\u00e9nataux pendant cette grossesse. DHS m14 = 2."}, "label": {"en": "2 visits", "es": "2 visitas", "fr": "2 visites"}}, {"code": "v3", "definition": {"en": "Exactly three antenatal care contacts during this pregnancy. DHS m14 = 3.", "es": "Exactamente tres contactos de atenci\u00f3n prenatal durante este embarazo. DHS m14 = 3.", "fr": "Exactement trois contacts de soins pr\u00e9nataux pendant cette grossesse. DHS m14 = 3."}, "label": {"en": "3 visits", "es": "3 visitas", "fr": "3 visites"}}, {"code": "v4_to_7", "definition": {"en": "Four to seven antenatal care contacts. Meets the SDG/HMIS 4+ threshold but not the WHO 2016 8-contact recommendation. DHS m14 = 4\u20137.", "es": "Cuatro a siete contactos de atenci\u00f3n prenatal. Cumple el umbral ODS/HMIS de 4+ pero no la recomendaci\u00f3n OMS 2016 de 8 contactos. DHS m14 = 4\u20137.", "fr": "Quatre \u00e0 sept contacts de soins pr\u00e9nataux. Satisfait au seuil ODD/HMIS 4+ mais pas \u00e0 la recommandation OMS 2016 de 8 contacts. DHS m14 = 4\u20137."}, "label": {"en": "4 to 7 visits", "es": "De 4 a 7 visitas", "fr": "4 \u00e0 7 visites"}}, {"code": "v8_or_more", "definition": {"en": "Eight or more antenatal care contacts. Meets the WHO 2016 recommended minimum of 8 contacts for a positive pregnancy experience. DHS m14 = 8+.", "es": "Ocho o m\u00e1s contactos de atenci\u00f3n prenatal. Cumple con el m\u00ednimo recomendado de la OMS 2016 de 8 contactos para una experiencia positiva del embarazo. DHS m14 = 8+.", "fr": "Huit contacts de soins pr\u00e9nataux ou plus. Satisfait au minimum recommand\u00e9 par l''OMS 2016 de 8 contacts pour une exp\u00e9rience de grossesse positive. DHS m14 = 8+."}, "label": {"en": "8 or more visits", "es": "8 visitas o m\u00e1s", "fr": "8 visites ou plus"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember the number of visits.", "es": "La encuestada no sabe o no recuerda el n\u00famero de visitas.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas du nombre de visites."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
