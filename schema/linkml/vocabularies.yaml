nnier dans les contextes froids (Afghanistan, hiver syrien, hauts plateaux)."}, "label": {"en": "Blanket", "es": "Manta", "fr": "Couverture"}}, {"code": "plastic_sheeting", "definition": {"en": "Reference unit: 1 m\u00b2. Sphere shelter minimum standard; JMMI Libya, South Sudan.", "es": "Unidad de referencia: 1 m\u00b2. Norma m\u00ednima de refugio Sphere; JMMI Libia, Sud\u00e1n del Sur.", "fr": "Unit\u00e9 de r\u00e9f\u00e9rence : 1 m\u00b2. Norme minimale d''abri Sphere ; JMMI Libye, Soudan du Sud."}, "label": {"en": "Plastic sheeting", "es": "Lona pl\u00e1stica", "fr": "B\u00e2che plastique"}}, {"code": "ors_sachets", "definition": {"en": "Reference unit: pack of 20 sachets. Sphere health / WASH; health market monitoring in cholera contexts.", "es": "Unidad de referencia: paquete de 20 sobres. Salud Sphere / WASH; monitoreo de mercados de salud en contextos de c\u00f3lera.", "fr": "Unit\u00e9 de r\u00e9f\u00e9rence : paquet de 20 sachets. Sant\u00e9 Sphere / WASH ; suivi des march\u00e9s de sant\u00e9 dans les contextes de chol\u00e9ra."}, "label": {"en": "Oral rehydration salts (ORS)", "es": "Sobres de sales de rehidrataci\u00f3n oral (SRO)", "fr": "Sachets de sels de r\u00e9hydratation orale (SRO)"}}]}'
