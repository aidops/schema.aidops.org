  FpPpaStatus:
    title:
      en: Postpartum amenorrhea status (3-level)
      fr: Statut d'aménorrhée post-partum (3 niveaux)
      es: Estado de amenorrea posparto (3 niveles)
    description:
      en: 'Three-level response for DHS V405 proxy - whether the woman''s menstrual period has returned since her last pregnancy ended. The ''no_last_pregnancy'' code captures women who have never been pregnant, avoiding ambiguity between ''no, period has not returned'' and ''no, there was no pregnancy''. DHS-8 approach: PPA classification is based on the last pregnancy, not the last birth.'
      fr: 'Réponse à trois niveaux pour le proxy DHS V405 - si les règles de la femme sont revenues depuis la fin de sa dernière grossesse. Le code ''no_last_pregnancy'' capture les femmes n''ayant jamais été enceintes, évitant l''ambiguïté entre ''non, les règles ne sont pas revenues'' et ''non, il n''y a pas eu de grossesse''. Approche DHS-8 : la classification APM est basée sur la dernière grossesse, pas le dernier accouchement.'
      es: 'Respuesta de tres niveles para el proxy DHS V405 - si el período menstrual de la mujer ha regresado desde que terminó su último embarazo. El código ''no_last_pregnancy'' captura a las mujeres que nunca han estado embarazadas, evitando la ambigüedad entre ''no, el período no ha regresado'' y ''no, no hubo embarazo''. Enfoque DHS-8: la clasificación AMP se basa en el último embarazo, no en el último parto.'
    enum_uri: aidops:FpPpaStatus
    permissible_values:
      'yes':
        title:
          en: Yes - period has returned since last pregnancy
          fr: Oui - les règles sont revenues depuis la dernière grossesse
          es: Sí - el período ha regresado desde el último embarazo
        description:
          en: The woman's menstrual period has returned after her last pregnancy ended.
          fr: Les règles de la femme sont revenues après la fin de sa dernière grossesse.
          es: El período menstrual de la mujer ha regresado después de que terminó su último embarazo.
      'no':
        title:
          en: No - period has not returned since last pregnancy
          fr: Non - les règles ne sont pas revenues depuis la dernière grossesse
          es: No - el período no ha regresado desde el último embarazo
        description:
          en: The woman's menstrual period has not yet returned after her last pregnancy ended. She is in postpartum amenorrhea.
          fr: Les règles de la femme ne sont pas encore revenues après la fin de sa dernière grossesse. Elle est en aménorrhée post-partum.
          es: El período menstrual de la mujer aún no ha regresado después de que terminó su último embarazo. Está en amenorrea posparto.
      no_last_pregnancy:
        title:
          en: No last pregnancy - never been pregnant
          fr: Pas de dernière grossesse - n'a jamais été enceinte
          es: Sin último embarazo - nunca ha estado embarazada
        description:
          en: The woman has never been pregnant, so the question about period return after last pregnancy is not applicable.
          fr: La femme n'a jamais été enceinte, donc la question sur le retour des règles après la dernière grossesse ne s'applique pas.
          es: La mujer nunca ha estado embarazada, por lo que la pregunta sobre el retorno del período después del último embarazo no aplica.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-family-planning", "dhs-unmet-need-as25"], "definition": {"en": "Three-level response for DHS V405 proxy - whether the woman''s menstrual period has returned since her last pregnancy ended. The ''no_last_pregnancy'' code captures women who have never been pregnant, avoiding ambiguity between ''no, period has not returned'' and ''no, there was no pregnancy''. DHS-8 approach: PPA classification is based on the last pregnancy, not the last birth.", "es": "Respuesta de tres niveles para el proxy DHS V405 - si el per\u00edodo menstrual de la mujer ha regresado desde que termin\u00f3 su \u00faltimo embarazo. El c\u00f3digo ''no_last_pregnancy'' captura a las mujeres que nunca han estado embarazadas, evitando la ambig\u00fcedad entre ''no, el per\u00edodo no ha regresado'' y ''no, no hubo embarazo''. Enfoque DHS-8: la clasificaci\u00f3n AMP se basa en el \u00faltimo embarazo, no en el \u00faltimo parto.", "fr": "R\u00e9ponse \u00e0 trois niveaux pour le proxy DHS V405 - si les r\u00e8gles de la femme sont revenues depuis la fin de sa derni\u00e8re grossesse. Le code ''no_last_pregnancy'' capture les femmes n''ayant jamais \u00e9t\u00e9 enceintes, \u00e9vitant l''ambigu\u00eft\u00e9 entre ''non, les r\u00e8gles ne sont pas revenues'' et ''non, il n''y a pas eu de grossesse''. Approche DHS-8 : la classification APM est bas\u00e9e sur la derni\u00e8re grossesse, pas le dernier accouchement."}, "id": "fp-ppa-status", "label": {"en": "Postpartum amenorrhea status (3-level)", "es": "Estado de amenorrea posparto (3 niveles)", "fr": "Statut d''am\u00e9norrh\u00e9e post-partum (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "The woman''s menstrual period has returned after her last pregnancy ended.", "es": "El per\u00edodo menstrual de la mujer ha regresado despu\u00e9s de que termin\u00f3 su \u00faltimo embarazo.", "fr": "Les r\u00e8gles de la femme sont revenues apr\u00e8s la fin de sa derni\u00e8re grossesse."}, "label": {"en": "Yes - period has returned since last pregnancy", "es": "S\u00ed - el per\u00edodo ha regresado desde el \u00faltimo embarazo", "fr": "Oui - les r\u00e8gles sont revenues depuis la derni\u00e8re grossesse"}}, {"code": "no", "definition": {"en": "The woman''s menstrual period has not yet returned after her last pregnancy ended. She is in postpartum amenorrhea.", "es": "El per\u00edodo menstrual de la mujer a\u00fan no ha regresado despu\u00e9s de que termin\u00f3 su \u00faltimo embarazo. Est\u00e1 en amenorrea posparto.", "fr": "Les r\u00e8gles de la femme ne sont pas encore revenues apr\u00e8s la fin de sa derni\u00e8re grossesse. Elle est en am\u00e9norrh\u00e9e post-partum."}, "label": {"en": "No - period has not returned since last pregnancy", "es": "No - el per\u00edodo no ha regresado desde el \u00faltimo embarazo", "fr": "Non - les r\u00e8gles ne sont pas revenues depuis la derni\u00e8re grossesse"}}, {"code": "no_last_pregnancy", "definition": {"en": "The woman has never been pregnant, so the question about period return after last pregnancy is not applicable.", "es": "La mujer nunca ha estado embarazada, por lo que la pregunta sobre el retorno del per\u00edodo despu\u00e9s del \u00faltimo embarazo no aplica.", "fr": "La femme n''a jamais \u00e9t\u00e9 enceinte, donc la question sur le retour des r\u00e8gles apr\u00e8s la derni\u00e8re grossesse ne s''applique pas."}, "label": {"en": "No last pregnancy - never been pregnant", "es": "Sin \u00faltimo embarazo - nunca ha estado embarazada", "fr": "Pas de derni\u00e8re grossesse - n''a jamais \u00e9t\u00e9 enceinte"}}]}'
      bibliography_refs: dhs-family-planning,dhs-unmet-need-as25
  FpUnmetNeed:
    title:
      en: Family Planning Unmet Need Classification
      fr: Classification du besoin non satisfait en planification familiale
      es: Clasificación de la necesidad insatisfecha de planificación familiar
    description:
      en: 'Ten-category classification of every woman of reproductive age (15–49) according to the DHS revised unmet need algorithm (Analytical Study 25, 2012). Classifies women by contraceptive use status and fertility preference into mutually exclusive, exhaustive categories. The core indicators for SDG 3.7.1 (demand satisfied with modern methods) are derived from this classification: numerator = met_need_spacing (modern) + met_need_limiting (modern); denominator = all categories except wants_birth_within_2_years, infecund, not_sexually_active, never_had_sex.'
      fr: Classification à dix catégories de chaque femme en âge de procréer (15–49 ans) selon l'algorithme DHS révisé de besoin non satisfait (Étude analytique 25, 2012). Classe les femmes selon leur statut d'utilisation des contraceptifs et leurs préférences de fécondité en catégories mutuellement exclusives et exhaustives. Les principaux indicateurs pour l'ODD 3.7.1 (demande satisfaite par des méthodes modernes) sont dérivés de cette classification.
      es: Clasificación de diez categorías de cada mujer en edad reproductiva (15–49 años) según el algoritmo DHS revisado de necesidad insatisfecha (Estudio Analítico 25, 2012). Clasifica a las mujeres por estado de uso de anticonceptivos y preferencia de fecundidad en categorías mutuamente exclusivas y exhaustivas. Los indicadores principales para el ODS 3.7.1 (demanda satisfecha con métodos modernos) se derivan de esta clasificación.
    enum_uri: aidops:FpUnmetNeed
    permissible_values:
      met_need_spacing:
        title:
          en: Met need — spacing
          fr: Besoin satisfait — espacement
          es: Necesidad satisfecha — espaciamiento
        description:
          en: Using any contraceptive method to space births (wants another child but wants to wait). Part of the met need numerator for CPR.
          fr: Utilise une méthode contraceptive pour espacer les naissances (veut un autre enfant mais veut attendre). Fait partie du numérateur de besoin satisfait pour le TPC.
          es: Usa algún método anticonceptivo para espaciar los nacimientos (desea otro hijo pero quiere esperar). Forma parte del numerador de necesidad satisfecha para la TPC.
      met_need_limiting:
        title:
          en: Met need — limiting
          fr: Besoin satisfait — limitation
          es: Necesidad satisfecha — limitación
        description:
          en: Using any contraceptive method to limit births (wants no more children). Part of the met need numerator for CPR.
          fr: Utilise une méthode contraceptive pour limiter les naissances (ne veut plus d'enfants). Fait partie du numérateur de besoin satisfait pour le TPC.
          es: Usa algún método anticonceptivo para limitar los nacimientos (no desea más hijos). Forma parte del numerador de necesidad satisfecha para la TPC.
      unmet_need_spacing:
        title:
          en: Unmet need — spacing
          fr: Besoin non satisfait — espacement
          es: Necesidad insatisfecha — espaciamiento
        description:
          en: Not using any method but wants to wait before the next birth (spacing preference) and is at risk of pregnancy. Part of the unmet need numerator.
          fr: N'utilise aucune méthode mais veut attendre avant la prochaine naissance (préférence d'espacement) et est à risque de grossesse. Fait partie du numérateur de besoin non satisfait.
          es: No usa ningún método pero desea esperar antes del próximo nacimiento (preferencia de espaciamiento) y está en riesgo de embarazo. Parte del numerador de necesidad insatisfecha.
      unmet_need_limiting:
        title:
          en: Unmet need — limiting
          fr: Besoin non satisfait — limitation
          es: Necesidad insatisfecha — limitación
        description:
          en: Not using any method but wants no more children and is at risk of pregnancy. Part of the unmet need numerator.
          fr: N'utilise aucune méthode mais ne veut plus d'enfants et est à risque de grossesse. Fait partie du numérateur de besoin non satisfait.
          es: No usa ningún método pero no desea más hijos y está en riesgo de embarazo. Parte del numerador de necesidad insatisfecha.
      spacing_failure:
        title:
          en: Spacing failure
          fr: Échec d'espacement
          es: Falla de espaciamiento
        description:
          en: Currently pregnant and the pregnancy is wanted but was mistimed (spacing preference). Counted in met need for purposes of the DHS 10-category scheme.
          fr: Actuellement enceinte et la grossesse est souhaitée mais survenue à un mauvais moment (préférence d'espacement). Compté dans le besoin satisfait selon le schéma DHS à 10 catégories.
          es: Actualmente embarazada y el embarazo era deseado pero con un momento inadecuado (preferencia de espaciamiento). Se cuenta en la necesidad satisfecha en el esquema DHS de 10 categorías.
      limiting_failure:
        title:
          en: Limiting failure
          fr: Échec de limitation
          es: Falla de limitación
        description:
          en: Currently pregnant and the pregnancy is unwanted (limiting preference). The woman did not want any more children. Counted in unmet need.
          fr: Actuellement enceinte et la grossesse est non désirée (préférence de limitation). La femme ne voulait plus d'enfants. Compté dans le besoin non satisfait.
          es: Actualmente embarazada y el embarazo no fue deseado (preferencia de limitación). La mujer no deseaba más hijos. Se cuenta en la necesidad insatisfecha.
      wants_birth_within_2_years:
        title:
          en: Wants a birth within 2 years
          fr: Souhaite une naissance dans les 2 ans
          es: Desea un nacimiento en los próximos 2 años
        description:
          en: Not using a method and wants a birth within two years (not in need). Outside the unmet need denominator.
          fr: N'utilise pas de méthode et souhaite une naissance dans les deux ans (pas besoin). En dehors du dénominateur de besoin non satisfait.
          es: No usa un método y desea un nacimiento en los próximos dos años (sin necesidad). Fuera del denominador de necesidad insatisfecha.
      infecund:
        title:
          en: Infecund / sterilized
          fr: Inféconde / stérilisée
          es: Infecunda / esterilizada
        description:
          en: Woman is infecund or voluntarily sterilized. Outside the unmet need denominator.
          fr: La femme est inféconde ou stérilisée volontairement. En dehors du dénominateur de besoin non satisfait.
          es: La mujer es infecunda o esterilizada voluntariamente. Fuera del denominador de necesidad insatisfecha.
      not_sexually_active:
        title:
          en: Not sexually active (within last 4 weeks)
          fr: Pas sexuellement active (au cours des 4 dernières semaines)
          es: No sexualmente activa (en las últimas 4 semanas)
        description:
          en: Unmarried, non-pregnant, fecund woman who has had sex but not in the last four weeks. Outside the unmet need denominator in the DHS revised algorithm.
          fr: Femme non mariée, non enceinte et féconde qui a eu des rapports sexuels mais pas au cours des quatre dernières semaines. En dehors du dénominateur de besoin non satisfait dans l'algorithme DHS révisé.
          es: Mujer soltera, no embarazada y fecunda que ha tenido relaciones sexuales pero no en las últimas cuatro semanas. Fuera del denominador de necesidad insatisfecha en el algoritmo DHS revisado.
      never_had_sex:
        title:
          en: Never had sex
          fr: N'a jamais eu de rapports sexuels
          es: Nunca ha tenido relaciones sexuales
        description:
          en: Unmarried woman who has never had sexual intercourse. Outside the unmet need denominator.
          fr: Femme non mariée qui n'a jamais eu de rapports sexuels. En dehors du dénominateur de besoin non satisfait.
          es: Mujer soltera que nunca ha tenido relaciones sexuales. Fuera del denominador de necesidad insatisfecha.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-family-planning", "dhs-unmet-need-as25"], "definition": {"en": "Ten-category classification of every woman of reproductive age (15\u201349) according to the DHS revised unmet need algorithm (Analytical Study 25, 2012). Classifies women by contraceptive use status and fertility preference into mutually exclusive, exhaustive categories. The core indicators for SDG 3.7.1 (demand satisfied with modern methods) are derived from this classification: numerator = met_need_spacing (modern) + met_need_limiting (modern); denominator = all categories except wants_birth_within_2_years, infecund, not_sexually_active, never_had_sex.", "es": "Clasificaci\u00f3n de diez categor\u00edas de cada mujer en edad reproductiva (15\u201349 a\u00f1os) seg\u00fan el algoritmo DHS revisado de necesidad insatisfecha (Estudio Anal\u00edtico 25, 2012). Clasifica a las mujeres por estado de uso de anticonceptivos y preferencia de fecundidad en categor\u00edas mutuamente exclusivas y exhaustivas. Los indicadores principales para el ODS 3.7.1 (demanda satisfecha con m\u00e9todos modernos) se derivan de esta clasificaci\u00f3n.", "fr": "Classification \u00e0 dix cat\u00e9gories de chaque femme en \u00e2ge de procr\u00e9er (15\u201349 ans) selon l''algorithme DHS r\u00e9vis\u00e9 de besoin non satisfait (\u00c9tude analytique 25, 2012). Classe les femmes selon leur statut d''utilisation des contraceptifs et leurs pr\u00e9f\u00e9rences de f\u00e9condit\u00e9 en cat\u00e9gories mutuellement exclusives et exhaustives. Les principaux indicateurs pour l''ODD 3.7.1 (demande satisfaite par des m\u00e9thodes modernes) sont d\u00e9riv\u00e9s de cette classification."}, "id": "fp-unmet-need", "label": {"en": "Family Planning Unmet Need Classification", "es": "Clasificaci\u00f3n de la necesidad insatisfecha de planificaci\u00f3n familiar", "fr": "Classification du besoin non satisfait en planification familiale"}, "maturity": "draft", "values": [{"code": "met_need_spacing", "definition": {"en": "Using any contraceptive method to space births (wants another child but wants to wait). Part of the met need numerator for CPR.", "es": "Usa alg\u00fan m\u00e9todo anticonceptivo para espaciar los nacimientos (desea otro hijo pero quiere esperar). Forma parte del numerador de necesidad satisfecha para la TPC.", "fr": "Utilise une m\u00e9thode contraceptive pour espacer les naissances (veut un autre enfant mais veut attendre). Fait partie du num\u00e9rateur de besoin satisfait pour le TPC."}, "label": {"en": "Met need \u2014 spacing", "es": "Necesidad satisfecha \u2014 espaciamiento", "fr": "Besoin satisfait \u2014 espacement"}}, {"code": "met_need_limiting", "definition": {"en": "Using any contraceptive method to limit births (wants no more children). Part of the met need numerator for CPR.", "es": "Usa alg\u00fan m\u00e9todo anticonceptivo para limitar los nacimientos (no desea m\u00e1s hijos). Forma parte del numerador de necesidad satisfecha para la TPC.", "fr": "Utilise une m\u00e9thode contraceptive pour limiter les naissances (ne veut plus d''enfants). Fait partie du num\u00e9rateur de besoin satisfait pour le TPC."}, "label": {"en": "Met need \u2014 limiting", "es": "Necesidad satisfecha \u2014 limitaci\u00f3n", "fr": "Besoin satisfait \u2014 limitation"}}, {"code": "unmet_need_spacing", "definition": {"en": "Not using any method but wants to wait before the next birth (spacing preference) and is at risk of pregnancy. Part of the unmet need numerator.", "es": "No usa ning\u00fan m\u00e9todo pero desea esperar antes del pr\u00f3ximo nacimiento (preferencia de espaciamiento) y est\u00e1 en riesgo de embarazo. Parte del numerador de necesidad insatisfecha.", "fr": "N''utilise aucune m\u00e9thode mais veut attendre avant la prochaine naissance (pr\u00e9f\u00e9rence d''espacement) et est \u00e0 risque de grossesse. Fait partie du num\u00e9rateur de besoin non satisfait."}, "label": {"en": "Unmet need \u2014 spacing", "es": "Necesidad insatisfecha \u2014 espaciamiento", "fr": "Besoin non satisfait \u2014 espacement"}}, {"code": "unmet_need_limiting", "definition": {"en": "Not using any method but wants no more children and is at risk of pregnancy. Part of the unmet need numerator.", "es": "No usa ning\u00fan m\u00e9todo pero no desea m\u00e1s hijos y est\u00e1 en riesgo de embarazo. Parte del numerador de necesidad insatisfecha.", "fr": "N''utilise aucune m\u00e9thode mais ne veut plus d''enfants et est \u00e0 risque de grossesse. Fait partie du num\u00e9rateur de besoin non satisfait."}, "label": {"en": "Unmet need \u2014 limiting", "es": "Necesidad insatisfecha \u2014 limitaci\u00f3n", "fr": "Besoin non satisfait \u2014 limitation"}}, {"code": "spacing_failure", "definition": {"en": "Currently pregnant and the pregnancy is wanted but was mistimed (spacing preference). Counted in met need for purposes of the DHS 10-category scheme.", "es": "Actualmente embarazada y el embarazo era deseado pero con un momento inadecuado (preferencia de espaciamiento). Se cuenta en la necesidad satisfecha en el esquema DHS de 10 categor\u00edas.", "fr": "Actuellement enceinte et la grossesse est souhait\u00e9e mais survenue \u00e0 un mauvais moment (pr\u00e9f\u00e9rence d''espacement). Compt\u00e9 dans le besoin satisfait selon le sch\u00e9ma DHS \u00e0 10 cat\u00e9gories."}, "label": {"en": "Spacing failure", "es": "Falla de espaciamiento", "fr": "\u00c9chec d''espacement"}}, {"code": "limiting_failure", "definition": {"en": "Currently pregnant and the pregnancy is unwanted (limiting preference). The woman did not want any more children. Counted in unmet need.", "es": "Actualmente embarazada y el embarazo no fue deseado (preferencia de limitaci\u00f3n). La mujer no deseaba m\u00e1s hijos. Se cuenta en la necesidad insatisfecha.", "fr": "Actuellement enceinte et la grossesse est non d\u00e9sir\u00e9e (pr\u00e9f\u00e9rence de limitation). La femme ne voulait plus d''enfants. Compt\u00e9 dans le besoin non satisfait."}, "label": {"en": "Limiting failure", "es": "Falla de limitaci\u00f3n", "fr": "\u00c9chec de limitation"}}, {"code": "wants_birth_within_2_years", "definition": {"en": "Not using a method and wants a birth within two years (not in need). Outside the unmet need denominator.", "es": "No usa un m\u00e9todo y desea un nacimiento en los pr\u00f3ximos dos a\u00f1os (sin necesidad). Fuera del denominador de necesidad insatisfecha.", "fr": "N''utilise pas de m\u00e9thode et souhaite une naissance dans les deux ans (pas besoin). En dehors du d\u00e9nominateur de besoin non satisfait."}, "label": {"en": "Wants a birth within 2 years", "es": "Desea un nacimiento en los pr\u00f3ximos 2 a\u00f1os", "fr": "Souhaite une naissance dans les 2 ans"}}, {"code": "infecund", "definition": {"en": "Woman is infecund or voluntarily sterilized. Outside the unmet need denominator.", "es": "La mujer es infecunda o esterilizada voluntariamente. Fuera del denominador de necesidad insatisfecha.", "fr": "La femme est inf\u00e9conde ou st\u00e9rilis\u00e9e volontairement. En dehors du d\u00e9nominateur de besoin non satisfait."}, "label": {"en": "Infecund / sterilized", "es": "Infecunda / esterilizada", "fr": "Inf\u00e9conde / st\u00e9rilis\u00e9e"}}, {"code": "not_sexually_active", "definition": {"en": "Unmarried, non-pregnant, fecund woman who has had sex but not in the last four weeks. Outside the unmet need denominator in the DHS revised algorithm.", "es": "Mujer soltera, no embarazada y fecunda que ha tenido relaciones sexuales pero no en las \u00faltimas cuatro semanas. Fuera del denominador de necesidad insatisfecha en el algoritmo DHS revisado.", "fr": "Femme non mari\u00e9e, non enceinte et f\u00e9conde qui a eu des rapports sexuels mais pas au cours des quatre derni\u00e8res semaines. En dehors du d\u00e9nominateur de besoin non satisfait dans l''algorithme DHS r\u00e9vis\u00e9."}, "label": {"en": "Not sexually active (within last 4 weeks)", "es": "No sexualmente activa (en las \u00faltimas 4 semanas)", "fr": "Pas sexuellement active (au cours des 4 derni\u00e8res semaines)"}}, {"code": "never_had_sex", "definition": {"en": "Unmarried woman who has never had sexual intercourse. Outside the unmet need denominator.", "es": "Mujer soltera que nunca ha tenido relaciones sexuales. Fuera del denominador de necesidad insatisfecha.", "fr": "Femme non mari\u00e9e qui n''a jamais eu de rapports sexuels. En dehors du d\u00e9nominateur de besoin non satisfait."}, "label": {"en": "Never had sex", "es": "Nunca ha tenido relaciones sexuales", "fr": "N''a jamais eu de rapports sexuels"}}]}'
      bibliography_refs: dhs-family-planning,dhs-unmet-need-as25
  Gad7SeverityBand:
    title:
      en: GAD-7 Severity Band
      fr: Niveau de sévérité GAD-7
      es: Nivel de severidad GAD-7
    description:
      en: 'The anxiety severity classification derived from the GAD-7 total score using the Spitzer et al. (2006) cut-points. Four bands: none/minimal (0-4), mild (5-9), moderate (10-14), severe (15-21). A total score of 10 or higher is the standard clinical screening cut-off for probable generalized anxiety disorder.'
      fr: 'La classification de la sévérité de l''anxiété dérivée du score total GAD-7 en utilisant les seuils de Spitzer et al. (2006). Quatre niveaux : aucune/minimale (0-4), légère (5-9), modérée (10-14), sévère (15-21). Un score total de 10 ou plus est le seuil de dépistage clinique standard pour un trouble d''anxiété généralisée probable.'
      es: 'La clasificación de severidad de la ansiedad derivada del puntaje total del GAD-7 usando los puntos de corte de Spitzer et al. (2006). Cuatro niveles: ninguna/mínima (0-4), leve (5-9), moderada (10-14), severa (15-21). Un puntaje total de 10 o más es el punto de corte de tamizaje clínico estándar para un trastorno de ansiedad generalizada probable.'
    enum_uri: aidops:Gad7SeverityBand
    permissible_values:
      none_minimal:
        title:
          en: None / minimal
          fr: Aucune / minimale
          es: Ninguna / mínima
        description:
          en: GAD-7 total score 0-4. None or minimal anxiety symptoms.
          fr: Score total GAD-7 de 0 à 4. Aucun ou des symptômes anxieux minimaux.
          es: Puntaje total GAD-7 de 0 a 4. Ningún síntoma de ansiedad o síntomas mínimos.
      mild:
        title:
          en: Mild
          fr: Légère
          es: Leve
        description:
          en: GAD-7 total score 5-9. Mild anxiety symptoms.
          fr: Score total GAD-7 de 5 à 9. Symptômes anxieux légers.
          es: Puntaje total GAD-7 de 5 a 9. Síntomas de ansiedad leves.
      moderate:
        title:
          en: Moderate
          fr: Modérée
          es: Moderada
        description:
          en: GAD-7 total score 10-14. Moderate anxiety symptoms. Standard clinical cut-off (>=10) for probable generalized anxiety disorder.
          fr: Score total GAD-7 de 10 à 14. Symptômes anxieux modérés. Seuil clinique standard (>=10) pour un trouble d'anxiété généralisée probable.
          es: Puntaje total GAD-7 de 10 a 14. Síntomas de ansiedad moderados. Punto de corte clínico estándar (>=10) para un trastorno de ansiedad generalizada probable.
      severe:
        title:
          en: Severe
          fr: Sévère
          es: Severa
        description:
          en: GAD-7 total score 15-21. Severe anxiety symptoms.
          fr: Score total GAD-7 de 15 à 21. Symptômes anxieux sévères.
          es: Puntaje total GAD-7 de 15 a 21. Síntomas de ansiedad severos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["spitzer-gad7-2006"], "definition": {"en": "The anxiety severity classification derived from the GAD-7 total score using the Spitzer et al. (2006) cut-points. Four bands: none/minimal (0-4), mild (5-9), moderate (10-14), severe (15-21). A total score of 10 or higher is the standard clinical screening cut-off for probable generalized anxiety disorder.", "es": "La clasificaci\u00f3n de severidad de la ansiedad derivada del puntaje total del GAD-7 usando los puntos de corte de Spitzer et al. (2006). Cuatro niveles: ninguna/m\u00ednima (0-4), leve (5-9), moderada (10-14), severa (15-21). Un puntaje total de 10 o m\u00e1s es el punto de corte de tamizaje cl\u00ednico est\u00e1ndar para un trastorno de ansiedad generalizada probable.", "fr": "La classification de la s\u00e9v\u00e9rit\u00e9 de l''anxi\u00e9t\u00e9 d\u00e9riv\u00e9e du score total GAD-7 en utilisant les seuils de Spitzer et al. (2006). Quatre niveaux : aucune/minimale (0-4), l\u00e9g\u00e8re (5-9), mod\u00e9r\u00e9e (10-14), s\u00e9v\u00e8re (15-21). Un score total de 10 ou plus est le seuil de d\u00e9pistage clinique standard pour un trouble d''anxi\u00e9t\u00e9 g\u00e9n\u00e9ralis\u00e9e probable."}, "id": "gad7-severity-band", "label": {"en": "GAD-7 Severity Band", "es": "Nivel de severidad GAD-7", "fr": "Niveau de s\u00e9v\u00e9rit\u00e9 GAD-7"}, "maturity": "draft", "standard": {"name": "Spitzer, Kroenke, Williams, and L\u00f6we (2006), ''A Brief Measure for Assessing Generalized Anxiety Disorder: The GAD-7''", "notes": "Standard severity bands published with the original GAD-7 validation. Sensitivity 89%, specificity 82% at the >=10 cut-off for generalized anxiety disorder.", "uri": "https://doi.org/10.1001/archinte.166.10.1092"}, "values": [{"code": "none_minimal", "definition": {"en": "GAD-7 total score 0-4. None or minimal anxiety symptoms.", "es": "Puntaje total GAD-7 de 0 a 4. Ning\u00fan s\u00edntoma de ansiedad o s\u00edntomas m\u00ednimos.", "fr": "Score total GAD-7 de 0 \u00e0 4. Aucun ou des sympt\u00f4mes anxieux minimaux."}, "label": {"en": "None / minimal", "es": "Ninguna / m\u00ednima", "fr": "Aucune / minimale"}}, {"code": "mild", "definition": {"en": "GAD-7 total score 5-9. Mild anxiety symptoms.", "es": "Puntaje total GAD-7 de 5 a 9. S\u00edntomas de ansiedad leves.", "fr": "Score total GAD-7 de 5 \u00e0 9. Sympt\u00f4mes anxieux l\u00e9gers."}, "label": {"en": "Mild", "es": "Leve", "fr": "L\u00e9g\u00e8re"}}, {"code": "moderate", "definition": {"en": "GAD-7 total score 10-14. Moderate anxiety symptoms. Standard clinical cut-off (>=10) for probable generalized anxiety disorder.", "es": "Puntaje total GAD-7 de 10 a 14. S\u00edntomas de ansiedad moderados. Punto de corte cl\u00ednico est\u00e1ndar (>=10) para un trastorno de ansiedad generalizada probable.", "fr": "Score total GAD-7 de 10 \u00e0 14. Sympt\u00f4mes anxieux mod\u00e9r\u00e9s. Seuil clinique standard (>=10) pour un trouble d''anxi\u00e9t\u00e9 g\u00e9n\u00e9ralis\u00e9e probable."}, "label": {"en": "Moderate", "es": "Moderada", "fr": "Mod\u00e9r\u00e9e"}}, {"code": "severe", "definition": {"en": "GAD-7 total score 15-21. Severe anxiety symptoms.", "es": "Puntaje total GAD-7 de 15 a 21. S\u00edntomas de ansiedad severos.", "fr": "Score total GAD-7 de 15 \u00e0 21. Sympt\u00f4mes anxieux s\u00e9v\u00e8res."}, "label": {"en": "Severe", "es": "Severa", "fr": "S\u00e9v\u00e8re"}}]}'
      bibliography_refs: spitzer-gad7-2006
  GbvHelpSources:
    title:
      en: GBV help-seeking sources
      fr: Sources de recours pour les VBG
      es: Fuentes de búsqueda de ayuda ante VBG
    description:
      en: Sources from which a woman sought help following partner violence, corresponding to DHS-8 DV28 multi-select response list. Multiple codes may be selected. The inclusion of 'current_former_partner' reflects actual DHS data; a woman listing the perpetrator as a source of help is a substantive finding, not a data error.
      fr: Sources auprès desquelles une femme a cherché de l'aide à la suite de violences conjugales, correspondant à la liste de réponses à sélection multiple DHS-8 DV28. Plusieurs codes peuvent être sélectionnés.
      es: Fuentes a las que una mujer recurrió en busca de ayuda tras violencia de pareja, correspondiente a la lista de respuestas de selección múltiple DHS-8 DV28. Se pueden seleccionar varios códigos.
    enum_uri: aidops:GbvHelpSources
    permissible_values:
      own_family:
        title:
          en: Own family
          fr: Sa propre famille
          es: Propia familia
        description:
          en: A member of the respondent's own family of origin.
          fr: Un membre de la famille d'origine de la répondante.
          es: Un miembro de la familia de origen de la encuestada.
      partners_family:
        title:
          en: Partner's family
          fr: Famille du partenaire
          es: Familia del compañero
        description:
          en: A member of the current or former husband's or partner's family.
          fr: Un membre de la famille du mari ou partenaire actuel ou ancien.
          es: Un miembro de la familia del marido o compañero actual o anterior.
      current_former_partner:
        title:
          en: Current or former partner
          fr: Partenaire actuel ou ancien
          es: Compañero actual o anterior
        description:
          en: The respondent sought help or discussion directly with the partner who perpetrated the violence. Inclusion of this code reflects DHS instrument design; it is a substantive finding when selected.
          fr: La répondante a cherché de l'aide ou une discussion directement auprès du partenaire auteur des violences. L'inclusion de ce code reflète la conception de l'instrument DHS; c'est un résultat substantiel lorsqu'il est sélectionné.
          es: La encuestada buscó ayuda o diálogo directamente con el compañero que perpetró la violencia. La inclusión de este código refleja el diseño del instrumento DHS; es un hallazgo sustantivo cuando se selecciona.
      friend:
        title:
          en: Friend
          fr: Ami(e)
          es: Amiga o amigo
        description:
          en: A friend (not a neighbor).
          fr: Un(e) ami(e) (pas un voisin).
          es: Una amistad (no una vecina o vecino).
      neighbor:
        title:
          en: Neighbor
          fr: Voisin(e)
          es: Vecina o vecino
        description:
          en: A neighbor in the respondent's community or settlement.
          fr: Un(e) voisin(e) dans la communauté ou le site de la répondante.
          es: Una vecina o vecino en la comunidad o asentamiento de la encuestada.
      religious_leader:
        title:
          en: Religious leader
          fr: Leader religieux
          es: Líder religioso
        description:
          en: A religious leader, pastor, imam, priest, or traditional spiritual authority.
          fr: Un leader religieux, pasteur, imam, prêtre ou autorité spirituelle traditionnelle.
          es: Un líder religioso, pastor, imán, sacerdote o autoridad espiritual tradicional.
      medical_personnel:
        title:
          en: Doctor or medical personnel
          fr: Médecin ou personnel médical
          es: Médico o personal médico
        description:
          en: A doctor, nurse, midwife, health worker, or medical facility.
          fr: Un médecin, infirmier, sage-femme, agent de santé ou établissement médical.
          es: Un médico, enfermero, partera, trabajador de salud o instalación médica.
      police:
        title:
          en: Police
          fr: Police
          es: Policía
        description:
          en: Law enforcement or police, including military police in some contexts.
          fr: Forces de l'ordre ou police, y compris la police militaire dans certains contextes.
          es: Fuerzas del orden o policía, incluida la policía militar en algunos contextos.
      lawyer:
        title:
          en: Lawyer or legal aid
          fr: Avocat ou aide juridique
          es: Abogado o asistencia jurídica
        description:
          en: A lawyer, legal aid organization, or paralegal.
          fr: Un avocat, une organisation d'aide juridique ou un parajuriste.
          es: Un abogado, organización de asistencia jurídica o auxiliar jurídico.
      social_service_org:
        title:
          en: Social service organization
          fr: Organisation de services sociaux
          es: Organización de servicios sociales
        description:
          en: An NGO, government social welfare office, GBV service provider, women's organization, or safe house.
          fr: Une ONG, un bureau de protection sociale gouvernemental, un prestataire de services VBG, une organisation de femmes ou un foyer d'accueil.
          es: Una ONG, oficina de bienestar social gubernamental, proveedor de servicios VBG, organización de mujeres o casa de acogida.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Any other source not listed above.
          fr: Toute autre source non répertoriée ci-dessus.
          es: Cualquier otra fuente no incluida en la lista anterior.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "definition": {"en": "Sources from which a woman sought help following partner violence, corresponding to DHS-8 DV28 multi-select response list. Multiple codes may be selected. The inclusion of ''current_former_partner'' reflects actual DHS data; a woman listing the perpetrator as a source of help is a substantive finding, not a data error.", "es": "Fuentes a las que una mujer recurri\u00f3 en busca de ayuda tras violencia de pareja, correspondiente a la lista de respuestas de selecci\u00f3n m\u00faltiple DHS-8 DV28. Se pueden seleccionar varios c\u00f3digos.", "fr": "Sources aupr\u00e8s desquelles une femme a cherch\u00e9 de l''aide \u00e0 la suite de violences conjugales, correspondant \u00e0 la liste de r\u00e9ponses \u00e0 s\u00e9lection multiple DHS-8 DV28. Plusieurs codes peuvent \u00eatre s\u00e9lectionn\u00e9s."}, "id": "gbv-help-sources", "label": {"en": "GBV help-seeking sources", "es": "Fuentes de b\u00fasqueda de ayuda ante VBG", "fr": "Sources de recours pour les VBG"}, "maturity": "draft", "standard": {"name": "dhs-domestic-violence-module-2022", "notes": "DV28 (sources of help sought)", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}, "values": [{"code": "own_family", "definition": {"en": "A member of the respondent''s own family of origin.", "es": "Un miembro de la familia de origen de la encuestada.", "fr": "Un membre de la famille d''origine de la r\u00e9pondante."}, "label": {"en": "Own family", "es": "Propia familia", "fr": "Sa propre famille"}}, {"code": "partners_family", "definition": {"en": "A member of the current or former husband''s or partner''s family.", "es": "Un miembro de la familia del marido o compa\u00f1ero actual o anterior.", "fr": "Un membre de la famille du mari ou partenaire actuel ou ancien."}, "label": {"en": "Partner''s family", "es": "Familia del compa\u00f1ero", "fr": "Famille du partenaire"}}, {"code": "current_former_partner", "definition": {"en": "The respondent sought help or discussion directly with the partner who perpetrated the violence. Inclusion of this code reflects DHS instrument design; it is a substantive finding when selected.", "es": "La encuestada busc\u00f3 ayuda o di\u00e1logo directamente con el compa\u00f1ero que perpetr\u00f3 la violencia. La inclusi\u00f3n de este c\u00f3digo refleja el dise\u00f1o del instrumento DHS; es un hallazgo sustantivo cuando se selecciona.", "fr": "La r\u00e9pondante a cherch\u00e9 de l''aide ou une discussion directement aupr\u00e8s du partenaire auteur des violences. L''inclusion de ce code refl\u00e8te la conception de l''instrument DHS; c''est un r\u00e9sultat substantiel lorsqu''il est s\u00e9lectionn\u00e9."}, "label": {"en": "Current or former partner", "es": "Compa\u00f1ero actual o anterior", "fr": "Partenaire actuel ou ancien"}}, {"code": "friend", "definition": {"en": "A friend (not a neighbor).", "es": "Una amistad (no una vecina o vecino).", "fr": "Un(e) ami(e) (pas un voisin)."}, "label": {"en": "Friend", "es": "Amiga o amigo", "fr": "Ami(e)"}}, {"code": "neighbor", "definition": {"en": "A neighbor in the respondent''s community or settlement.", "es": "Una vecina o vecino en la comunidad o asentamiento de la encuestada.", "fr": "Un(e) voisin(e) dans la communaut\u00e9 ou le site de la r\u00e9pondante."}, "label": {"en": "Neighbor", "es": "Vecina o vecino", "fr": "Voisin(e)"}}, {"code": "religious_leader", "definition": {"en": "A religious leader, pastor, imam, priest, or traditional spiritual authority.", "es": "Un l\u00edder religioso, pastor, im\u00e1n, sacerdote o autoridad espiritual tradicional.", "fr": "Un leader religieux, pasteur, imam, pr\u00eatre ou autorit\u00e9 spirituelle traditionnelle."}, "label": {"en": "Religious leader", "es": "L\u00edder religioso", "fr": "Leader religieux"}}, {"code": "medical_personnel", "definition": {"en": "A doctor, nurse, midwife, health worker, or medical facility.", "es": "Un m\u00e9dico, enfermero, partera, trabajador de salud o instalaci\u00f3n m\u00e9dica.", "fr": "Un m\u00e9decin, infirmier, sage-femme, agent de sant\u00e9 ou \u00e9tablissement m\u00e9dical."}, "label": {"en": "Doctor or medical personnel", "es": "M\u00e9dico o personal m\u00e9dico", "fr": "M\u00e9decin ou personnel m\u00e9dical"}}, {"code": "police", "definition": {"en": "Law enforcement or police, including military police in some contexts.", "es": "Fuerzas del orden o polic\u00eda, incluida la polic\u00eda militar en algunos contextos.", "fr": "Forces de l''ordre ou police, y compris la police militaire dans certains contextes."}, "label": {"en": "Police", "es": "Polic\u00eda", "fr": "Police"}}, {"code": "lawyer", "definition": {"en": "A lawyer, legal aid organization, or paralegal.", "es": "Un abogado, organizaci\u00f3n de asistencia jur\u00eddica o auxiliar jur\u00eddico.", "fr": "Un avocat, une organisation d''aide juridique ou un parajuriste."}, "label": {"en": "Lawyer or legal aid", "es": "Abogado o asistencia jur\u00eddica", "fr": "Avocat ou aide juridique"}}, {"code": "social_service_org", "definition": {"en": "An NGO, government social welfare office, GBV service provider, women''s organization, or safe house.", "es": "Una ONG, oficina de bienestar social gubernamental, proveedor de servicios VBG, organizaci\u00f3n de mujeres o casa de acogida.", "fr": "Une ONG, un bureau de protection sociale gouvernemental, un prestataire de services VBG, une organisation de femmes ou un foyer d''accueil."}, "label": {"en": "Social service organization", "es": "Organizaci\u00f3n de servicios sociales", "fr": "Organisation de services sociaux"}}, {"code": "other", "definition": {"en": "Any other source not listed above.", "es": "Cualquier otra fuente no incluida en la lista anterior.", "fr": "Toute autre source non r\u00e9pertori\u00e9e ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
