  SitePathLighting:
    title:
      en: Site path lighting adequacy
      fr: Adéquation de l'éclairage des voies du site
      es: Adecuación del alumbrado de las vías del asentamiento
    description:
      en: Household-reported assessment of nighttime lighting adequacy on paths to key infrastructure (latrines, water points, health posts). Based on IRC Safety Audit Tool (2013) and Oxfam/WEDC Lighting, WASH and GBV in Camp Settings (2018).
      fr: Évaluation déclarée par le ménage de l'adéquation de l'éclairage nocturne sur les voies menant aux infrastructures clés (latrines, points d'eau, postes de santé). Fondée sur l'outil d'audit de sécurité de l'IRC (2013) et le rapport Oxfam/WEDC sur l'éclairage, l'EHA et la VBG dans les camps (2018).
      es: Evaluación reportada por el hogar sobre la adecuación del alumbrado nocturno en las vías hacia infraestructuras clave (letrinas, puntos de agua, puestos de salud). Basada en la Herramienta de Auditoría de Seguridad del IRC (2013) y el informe Oxfam/WEDC sobre Alumbrado, WASH y VBG en asentamientos (2018).
    enum_uri: aidops:SitePathLighting
    permissible_values:
      adequate:
        title:
          en: Adequate lighting
          fr: Éclairage adéquat
          es: Alumbrado adecuado
        description:
          en: Path is lit sufficiently that a person can walk safely without an additional light source.
          fr: La voie est suffisamment éclairée pour qu'une personne puisse marcher en sécurité sans source de lumière supplémentaire.
          es: La vía está suficientemente iluminada para que una persona pueda caminar con seguridad sin fuente de luz adicional.
      partial:
        title:
          en: Partial or inconsistent lighting
          fr: Éclairage partiel ou irrégulier
          es: Alumbrado parcial o irregular
        description:
          en: Some lighting exists but is insufficient, intermittent, or covers only part of the path.
          fr: Un éclairage existe mais il est insuffisant, intermittent ou ne couvre qu'une partie de la voie.
          es: Existe algún alumbrado pero es insuficiente, intermitente o cubre solo parte de la vía.
      none:
        title:
          en: No lighting
          fr: Aucun éclairage
          es: Sin alumbrado
        description:
          en: No artificial light on the path; complete darkness at night.
          fr: Aucune lumière artificielle sur la voie ; obscurité complète la nuit.
          es: No hay luz artificial en la vía; oscuridad completa por la noche.
      not_applicable:
        title:
          en: Not applicable
          fr: Sans objet
          es: No aplica
        description:
          en: Path does not exist (e.g., facility is adjacent to shelter) or facility is unused at night.
          fr: La voie n'existe pas (p. ex., l'installation est adjacente à l'abri) ou l'installation n'est pas utilisée la nuit.
          es: La vía no existe (p. ej., la instalación es adyacente al refugio) o la instalación no se usa por la noche.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013", "oxfam-lighting-wash-gbv-2018"], "definition": {"en": "Household-reported assessment of nighttime lighting adequacy on paths to key infrastructure (latrines, water points, health posts). Based on IRC Safety Audit Tool (2013) and Oxfam/WEDC Lighting, WASH and GBV in Camp Settings (2018).", "es": "Evaluaci\u00f3n reportada por el hogar sobre la adecuaci\u00f3n del alumbrado nocturno en las v\u00edas hacia infraestructuras clave (letrinas, puntos de agua, puestos de salud). Basada en la Herramienta de Auditor\u00eda de Seguridad del IRC (2013) y el informe Oxfam/WEDC sobre Alumbrado, WASH y VBG en asentamientos (2018).", "fr": "\u00c9valuation d\u00e9clar\u00e9e par le m\u00e9nage de l''ad\u00e9quation de l''\u00e9clairage nocturne sur les voies menant aux infrastructures cl\u00e9s (latrines, points d''eau, postes de sant\u00e9). Fond\u00e9e sur l''outil d''audit de s\u00e9curit\u00e9 de l''IRC (2013) et le rapport Oxfam/WEDC sur l''\u00e9clairage, l''EHA et la VBG dans les camps (2018)."}, "id": "site-path-lighting", "label": {"en": "Site path lighting adequacy", "es": "Adecuaci\u00f3n del alumbrado de las v\u00edas del asentamiento", "fr": "Ad\u00e9quation de l''\u00e9clairage des voies du site"}, "maturity": "draft", "values": [{"code": "adequate", "definition": {"en": "Path is lit sufficiently that a person can walk safely without an additional light source.", "es": "La v\u00eda est\u00e1 suficientemente iluminada para que una persona pueda caminar con seguridad sin fuente de luz adicional.", "fr": "La voie est suffisamment \u00e9clair\u00e9e pour qu''une personne puisse marcher en s\u00e9curit\u00e9 sans source de lumi\u00e8re suppl\u00e9mentaire."}, "label": {"en": "Adequate lighting", "es": "Alumbrado adecuado", "fr": "\u00c9clairage ad\u00e9quat"}}, {"code": "partial", "definition": {"en": "Some lighting exists but is insufficient, intermittent, or covers only part of the path.", "es": "Existe alg\u00fan alumbrado pero es insuficiente, intermitente o cubre solo parte de la v\u00eda.", "fr": "Un \u00e9clairage existe mais il est insuffisant, intermittent ou ne couvre qu''une partie de la voie."}, "label": {"en": "Partial or inconsistent lighting", "es": "Alumbrado parcial o irregular", "fr": "\u00c9clairage partiel ou irr\u00e9gulier"}}, {"code": "none", "definition": {"en": "No artificial light on the path; complete darkness at night.", "es": "No hay luz artificial en la v\u00eda; oscuridad completa por la noche.", "fr": "Aucune lumi\u00e8re artificielle sur la voie ; obscurit\u00e9 compl\u00e8te la nuit."}, "label": {"en": "No lighting", "es": "Sin alumbrado", "fr": "Aucun \u00e9clairage"}}, {"code": "not_applicable", "definition": {"en": "Path does not exist (e.g., facility is adjacent to shelter) or facility is unused at night.", "es": "La v\u00eda no existe (p. ej., la instalaci\u00f3n es adyacente al refugio) o la instalaci\u00f3n no se usa por la noche.", "fr": "La voie n''existe pas (p. ex., l''installation est adjacente \u00e0 l''abri) ou l''installation n''est pas utilis\u00e9e la nuit."}, "label": {"en": "Not applicable", "es": "No aplica", "fr": "Sans objet"}}]}'
