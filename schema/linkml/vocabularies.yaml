  YesNoDkNa:
    title:
      en: Yes / No / Don't know / Not applicable
      fr: Oui / Non / Ne sait pas / Sans objet
      es: Sí / No / No sabe / No aplica
    description:
      en: Four-level response scale for questions where both genuine uncertainty and situational non-applicability are valid response categories, in addition to yes/no.
      fr: Échelle de réponse à quatre niveaux pour les questions où l'incertitude genuine et la non-applicabilité situationnelle sont des catégories de réponse valides, en plus de oui/non.
      es: Escala de respuesta de cuatro niveles para preguntas donde tanto la incertidumbre genuina como la no aplicabilidad situacional son categorías de respuesta válidas, además de sí/no.
    enum_uri: aidops:YesNoDkNa
    permissible_values:
      'yes':
        title:
          en: 'Yes'
          fr: Oui
          es: Sí
        description:
          en: The respondent confirms the condition or item.
          fr: Le répondant confirme la condition ou l'article.
          es: El encuestado confirma la condición o artículo.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: The respondent denies the condition or item.
          fr: Le répondant nie la condition ou l'article.
          es: El encuestado niega la condición o artículo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know. This is a valid response and must not be re-coded as 'no' or missing.
          fr: Le répondant ne sait pas. Il s'agit d'une réponse valide qui ne doit pas être recodée comme 'non' ou manquante.
          es: El encuestado no sabe. Esta es una respuesta válida y no debe recodificarse como 'no' o faltante.
      not_applicable:
        title:
          en: Not applicable
          fr: Sans objet
          es: No aplica
        description:
          en: The question does not apply to the respondent's situation.
          fr: La question ne s'applique pas à la situation du répondant.
          es: La pregunta no aplica a la situación del encuestado.
