enums:
  AapAgree5:
    title:
      en: 'AAP: Agreement (5 levels)'
      fr: 'Redevabilité : Accord (5 niveaux)'
      es: 'Rendición de cuentas: Acuerdo (5 niveles)'
    description:
      en: 'Five-level Likert agreement scale parallel in structure to `aap-satisfaction-5` but labelled for agree/disagree items (for example, ''aid providers take my opinion into account'', ''aid providers selected the right people'', ''people are afraid to speak up''). Source: GTS HVI and OECD Guidelines on Measuring Trust (2017), which anchor five-level agreement scales as the standard for trust and perception measurement. A separate vocabulary (rather than reused codes) is provided because label semantics differ.'
      fr: 'Échelle d''accord de Likert à cinq niveaux de structure parallèle à `aap-satisfaction-5` mais étiquetée pour les items d''accord/désaccord (par exemple, « les intervenants tiennent compte de mon opinion », « les intervenants ont sélectionné les bonnes personnes », « les gens ont peur de s''exprimer »). Source : GTS HVI et Lignes directrices de l''OCDE sur la mesure de la confiance (2017), qui ancrent les échelles d''accord à cinq niveaux comme norme pour la mesure de la confiance et de la perception. Un vocabulaire séparé (plutôt que des codes réutilisés) est fourni car la sémantique des étiquettes diffère.'
      es: 'Escala de acuerdo de Likert de cinco niveles de estructura paralela a `aap-satisfaction-5` pero etiquetada para los ítems de acuerdo/desacuerdo (por ejemplo, «los actores humanitarios tienen en cuenta mi opinión», «los actores humanitarios seleccionaron a las personas correctas», «las personas tienen miedo de hablar»). Fuente: GTS HVI y Directrices de la OCDE sobre la Medición de la Confianza (2017), que anclan las escalas de acuerdo de cinco niveles como estándar para la medición de la confianza y la percepción. Se proporciona un vocabulario separado (en lugar de códigos reutilizados) porque la semántica de las etiquetas difiere.'
    enum_uri: aidops:AapAgree5
    permissible_values:
      strongly_agree:
        title:
          en: Strongly agree
          fr: Tout à fait d'accord
          es: Totalmente de acuerdo
        description:
          en: The respondent endorses the statement with the highest confidence.
          fr: Le répondant approuve l'affirmation avec la plus grande confiance.
          es: El encuestado apoya la afirmación con la mayor confianza.
      agree:
        title:
          en: Agree
          fr: D'accord
          es: De acuerdo
        description:
          en: The respondent endorses the statement.
          fr: Le répondant approuve l'affirmation.
          es: El encuestado apoya la afirmación.
      neither:
        title:
          en: Neither agree nor disagree
          fr: Ni d'accord ni en désaccord
          es: Ni de acuerdo ni en desacuerdo
        description:
          en: The respondent is neutral.
          fr: Le répondant est neutre.
          es: El encuestado es neutral.
      disagree:
        title:
          en: Disagree
          fr: Pas d'accord
          es: En desacuerdo
        description:
          en: The respondent rejects the statement.
          fr: Le répondant rejette l'affirmation.
          es: El encuestado rechaza la afirmación.
      strongly_disagree:
        title:
          en: Strongly disagree
          fr: Pas du tout d'accord
          es: Totalmente en desacuerdo
        description:
          en: The respondent rejects the statement with the highest confidence.
          fr: Le répondant rejette l'affirmation avec la plus grande confiance.
          es: El encuestado rechaza la afirmación con la mayor confianza.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess.
          fr: Le répondant ne peut pas évaluer.
          es: El encuestado no puede evaluar.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "gts-hvi"], "definition": {"en": "Five-level Likert agreement scale parallel in structure to `aap-satisfaction-5` but labelled for agree/disagree items (for example, ''aid providers take my opinion into account'', ''aid providers selected the right people'', ''people are afraid to speak up''). Source: GTS HVI and OECD Guidelines on Measuring Trust (2017), which anchor five-level agreement scales as the standard for trust and perception measurement. A separate vocabulary (rather than reused codes) is provided because label semantics differ.", "es": "Escala de acuerdo de Likert de cinco niveles de estructura paralela a `aap-satisfaction-5` pero etiquetada para los \u00edtems de acuerdo/desacuerdo (por ejemplo, \u00ablos actores humanitarios tienen en cuenta mi opini\u00f3n\u00bb, \u00ablos actores humanitarios seleccionaron a las personas correctas\u00bb, \u00ablas personas tienen miedo de hablar\u00bb). Fuente: GTS HVI y Directrices de la OCDE sobre la Medici\u00f3n de la Confianza (2017), que anclan las escalas de acuerdo de cinco niveles como est\u00e1ndar para la medici\u00f3n de la confianza y la percepci\u00f3n. Se proporciona un vocabulario separado (en lugar de c\u00f3digos reutilizados) porque la sem\u00e1ntica de las etiquetas difiere.", "fr": "\u00c9chelle d''accord de Likert \u00e0 cinq niveaux de structure parall\u00e8le \u00e0 `aap-satisfaction-5` mais \u00e9tiquet\u00e9e pour les items d''accord/d\u00e9saccord (par exemple, \u00ab les intervenants tiennent compte de mon opinion \u00bb, \u00ab les intervenants ont s\u00e9lectionn\u00e9 les bonnes personnes \u00bb, \u00ab les gens ont peur de s''exprimer \u00bb). Source : GTS HVI et Lignes directrices de l''OCDE sur la mesure de la confiance (2017), qui ancrent les \u00e9chelles d''accord \u00e0 cinq niveaux comme norme pour la mesure de la confiance et de la perception. Un vocabulaire s\u00e9par\u00e9 (plut\u00f4t que des codes r\u00e9utilis\u00e9s) est fourni car la s\u00e9mantique des \u00e9tiquettes diff\u00e8re."}, "id": "aap-agree-5", "label": {"en": "AAP: Agreement (5 levels)", "es": "Rendici\u00f3n de cuentas: Acuerdo (5 niveles)", "fr": "Redevabilit\u00e9 : Accord (5 niveaux)"}, "maturity": "draft", "standard": {"name": "Humanitarian Voice Index (Ground Truth Solutions)", "notes": "Agreement 5-point scale matches GTS HVI convention and OECD 2017 guidance on trust measurement.", "uri": "https://humanitarianvoiceindex.org"}, "values": [{"code": "strongly_agree", "definition": {"en": "The respondent endorses the statement with the highest confidence.", "es": "El encuestado apoya la afirmaci\u00f3n con la mayor confianza.", "fr": "Le r\u00e9pondant approuve l''affirmation avec la plus grande confiance."}, "label": {"en": "Strongly agree", "es": "Totalmente de acuerdo", "fr": "Tout \u00e0 fait d''accord"}}, {"code": "agree", "definition": {"en": "The respondent endorses the statement.", "es": "El encuestado apoya la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant approuve l''affirmation."}, "label": {"en": "Agree", "es": "De acuerdo", "fr": "D''accord"}}, {"code": "neither", "definition": {"en": "The respondent is neutral.", "es": "El encuestado es neutral.", "fr": "Le r\u00e9pondant est neutre."}, "label": {"en": "Neither agree nor disagree", "es": "Ni de acuerdo ni en desacuerdo", "fr": "Ni d''accord ni en d\u00e9saccord"}}, {"code": "disagree", "definition": {"en": "The respondent rejects the statement.", "es": "El encuestado rechaza la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant rejette l''affirmation."}, "label": {"en": "Disagree", "es": "En desacuerdo", "fr": "Pas d''accord"}}, {"code": "strongly_disagree", "definition": {"en": "The respondent rejects the statement with the highest confidence.", "es": "El encuestado rechaza la afirmaci\u00f3n con la mayor confianza.", "fr": "Le r\u00e9pondant rejette l''affirmation avec la plus grande confiance."}, "label": {"en": "Strongly disagree", "es": "Totalmente en desacuerdo", "fr": "Pas du tout d''accord"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess.", "es": "El encuestado no puede evaluar.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
      bibliography_refs: chs-2024,gts-hvi
  AapClarity4:
    title:
      en: 'AAP: Information clarity (4 levels)'
      fr: 'Redevabilité : Clarté de l''information (4 niveaux)'
      es: 'Rendición de cuentas: Claridad de la información (4 niveles)'
    description:
      en: Four-level perceived clarity scale for information-receipt items in the AccountabilityToAffectedPopulationsProfile. Used to measure whether information that has been provided by aid providers (about eligibility, distribution timing, registration processes) is understood by the household. A four-level scale (no neutral midpoint) is used following IASC / REACH 2018 convention to force a directional judgement. 'Don't know' and 'prefer not to answer' are provided as non-substantive options.
      fr: Échelle de clarté perçue à quatre niveaux pour les items de réception d'information du Profil de redevabilité envers les populations affectées. Utilisée pour mesurer si l'information fournie par les intervenants (sur l'admissibilité, le calendrier de distribution, les processus d'inscription) est comprise par le ménage. Une échelle à quatre niveaux (sans milieu neutre) est utilisée selon la convention IASC / REACH 2018 pour forcer un jugement directionnel. « Ne sait pas » et « préfère ne pas répondre » sont fournis comme options non substantielles.
      es: Escala de claridad percibida de cuatro niveles para los ítems de recepción de información del Perfil de Rendición de Cuentas a las Poblaciones Afectadas. Utilizada para medir si la información proporcionada por los actores humanitarios (sobre elegibilidad, calendario de distribución, procesos de registro) es comprendida por el hogar. Se utiliza una escala de cuatro niveles (sin punto medio neutro) siguiendo la convención IASC / REACH 2018 para forzar un juicio direccional. «No sabe» y «prefiere no responder» se proporcionan como opciones no sustantivas.
    enum_uri: aidops:AapClarity4
    permissible_values:
      very_clear:
        title:
          en: Very clear
          fr: Très clair
          es: Muy claro
        description:
          en: The respondent reports that the information is entirely understandable.
          fr: Le répondant rapporte que l'information est entièrement compréhensible.
          es: El encuestado reporta que la información es completamente comprensible.
      somewhat_clear:
        title:
          en: Somewhat clear
          fr: Assez clair
          es: Algo claro
        description:
          en: The respondent reports that the information is mostly understandable but has gaps or ambiguities.
          fr: Le répondant rapporte que l'information est globalement compréhensible mais comporte des lacunes ou des ambiguïtés.
          es: El encuestado reporta que la información es mayormente comprensible pero tiene vacíos o ambigüedades.
      not_very_clear:
        title:
          en: Not very clear
          fr: Pas très clair
          es: Poco claro
        description:
          en: The respondent reports that the information is difficult to understand.
          fr: Le répondant rapporte que l'information est difficile à comprendre.
          es: El encuestado reporta que la información es difícil de comprender.
      not_at_all_clear:
        title:
          en: Not at all clear
          fr: Pas du tout clair
          es: Nada claro
        description:
          en: The respondent reports that the information is incomprehensible or misleading.
          fr: Le répondant rapporte que l'information est incompréhensible ou trompeuse.
          es: El encuestado reporta que la información es incomprensible o engañosa.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent does not know or cannot assess the clarity of the information.
          fr: Le répondant ne sait pas ou ne peut pas évaluer la clarté de l'information.
          es: El encuestado no sabe o no puede evaluar la claridad de la información.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "iasc-reach-aap-menu-2018"], "definition": {"en": "Four-level perceived clarity scale for information-receipt items in the AccountabilityToAffectedPopulationsProfile. Used to measure whether information that has been provided by aid providers (about eligibility, distribution timing, registration processes) is understood by the household. A four-level scale (no neutral midpoint) is used following IASC / REACH 2018 convention to force a directional judgement. ''Don''t know'' and ''prefer not to answer'' are provided as non-substantive options.", "es": "Escala de claridad percibida de cuatro niveles para los \u00edtems de recepci\u00f3n de informaci\u00f3n del Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas. Utilizada para medir si la informaci\u00f3n proporcionada por los actores humanitarios (sobre elegibilidad, calendario de distribuci\u00f3n, procesos de registro) es comprendida por el hogar. Se utiliza una escala de cuatro niveles (sin punto medio neutro) siguiendo la convenci\u00f3n IASC / REACH 2018 para forzar un juicio direccional. \u00abNo sabe\u00bb y \u00abprefiere no responder\u00bb se proporcionan como opciones no sustantivas.", "fr": "\u00c9chelle de clart\u00e9 per\u00e7ue \u00e0 quatre niveaux pour les items de r\u00e9ception d''information du Profil de redevabilit\u00e9 envers les populations affect\u00e9es. Utilis\u00e9e pour mesurer si l''information fournie par les intervenants (sur l''admissibilit\u00e9, le calendrier de distribution, les processus d''inscription) est comprise par le m\u00e9nage. Une \u00e9chelle \u00e0 quatre niveaux (sans milieu neutre) est utilis\u00e9e selon la convention IASC / REACH 2018 pour forcer un jugement directionnel. \u00ab Ne sait pas \u00bb et \u00ab pr\u00e9f\u00e8re ne pas r\u00e9pondre \u00bb sont fournis comme options non substantielles."}, "id": "aap-clarity-4", "label": {"en": "AAP: Information clarity (4 levels)", "es": "Rendici\u00f3n de cuentas: Claridad de la informaci\u00f3n (4 niveles)", "fr": "Redevabilit\u00e9 : Clart\u00e9 de l''information (4 niveaux)"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Clarity 4-level wording drawn from the IASC / REACH menu information-receipt section.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "very_clear", "definition": {"en": "The respondent reports that the information is entirely understandable.", "es": "El encuestado reporta que la informaci\u00f3n es completamente comprensible.", "fr": "Le r\u00e9pondant rapporte que l''information est enti\u00e8rement compr\u00e9hensible."}, "label": {"en": "Very clear", "es": "Muy claro", "fr": "Tr\u00e8s clair"}}, {"code": "somewhat_clear", "definition": {"en": "The respondent reports that the information is mostly understandable but has gaps or ambiguities.", "es": "El encuestado reporta que la informaci\u00f3n es mayormente comprensible pero tiene vac\u00edos o ambig\u00fcedades.", "fr": "Le r\u00e9pondant rapporte que l''information est globalement compr\u00e9hensible mais comporte des lacunes ou des ambigu\u00eft\u00e9s."}, "label": {"en": "Somewhat clear", "es": "Algo claro", "fr": "Assez clair"}}, {"code": "not_very_clear", "definition": {"en": "The respondent reports that the information is difficult to understand.", "es": "El encuestado reporta que la informaci\u00f3n es dif\u00edcil de comprender.", "fr": "Le r\u00e9pondant rapporte que l''information est difficile \u00e0 comprendre."}, "label": {"en": "Not very clear", "es": "Poco claro", "fr": "Pas tr\u00e8s clair"}}, {"code": "not_at_all_clear", "definition": {"en": "The respondent reports that the information is incomprehensible or misleading.", "es": "El encuestado reporta que la informaci\u00f3n es incomprensible o enga\u00f1osa.", "fr": "Le r\u00e9pondant rapporte que l''information est incompr\u00e9hensible ou trompeuse."}, "label": {"en": "Not at all clear", "es": "Nada claro", "fr": "Pas du tout clair"}}, {"code": "dont_know", "definition": {"en": "Respondent does not know or cannot assess the clarity of the information.", "es": "El encuestado no sabe o no puede evaluar la claridad de la informaci\u00f3n.", "fr": "Le r\u00e9pondant ne sait pas ou ne peut pas \u00e9valuer la clart\u00e9 de l''information."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
