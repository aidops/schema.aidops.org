  IpvFreq3:
    title:
      en: IPV act frequency (past 12 months, 3-level)
      fr: Fréquence d'un acte de VPI (12 derniers mois, 3 niveaux)
      es: Frecuencia de un acto de VPI (últimos 12 meses, 3 niveles)
    description:
      en: 'Three-level frequency of an intimate partner violence act in the past 12 months, matching DHS-8 DV05B and DV04B coding. Used only for 12-month frequency sub-questions; the lifetime item is captured as a separate boolean property. The ''not_in_last_12m'' code is analytically distinct from ''never'': it indicates the act occurred at some point in the respondent''s lifetime but not in the past 12 months.'
      fr: Fréquence à trois niveaux d'un acte de violence du partenaire intime au cours des 12 derniers mois, conforme au codage DHS-8 DV05B et DV04B. Utilisé uniquement pour les sous-questions de fréquence sur 12 mois; l'item à vie est capturé comme propriété booléenne distincte.
      es: Frecuencia de tres niveles de un acto de violencia de pareja íntima en los últimos 12 meses, conforme a la codificación DHS-8 DV05B y DV04B. Se usa solo para subpreguntas de frecuencia de 12 meses; el ítem de por vida se captura como propiedad booleana separada.
    enum_uri: aidops:IpvFreq3
    permissible_values:
      often:
        title:
          en: Often
          fr: Souvent
          es: Con frecuencia
        description:
          en: The act occurred frequently in the past 12 months; the respondent considers it a regular occurrence.
          fr: L'acte s'est produit fréquemment au cours des 12 derniers mois ; le répondant le considère comme une occurrence régulière.
          es: El acto ocurrió con frecuencia en los últimos 12 meses; el encuestado lo considera una ocurrencia regular.
      sometimes:
        title:
          en: Sometimes
          fr: Parfois
          es: A veces
        description:
          en: The act occurred at least once in the past 12 months but not regularly.
          fr: L'acte s'est produit au moins une fois au cours des 12 derniers mois, mais pas régulièrement.
          es: El acto ocurrió al menos una vez en los últimos 12 meses pero no regularmente.
      not_in_last_12m:
        title:
          en: Not in the last 12 months
          fr: Pas au cours des 12 derniers mois
          es: No en los últimos 12 meses
        description:
          en: The act has occurred at some point in the respondent's lifetime (lifetime boolean = true) but not in the 12 months preceding the interview. This code must not be interpreted as 'never'.
          fr: L'acte s'est produit à un moment donné au cours de la vie du répondant (booléen à vie = vrai) mais pas dans les 12 mois précédant l'entretien. Ce code ne doit pas être interprété comme 'jamais'.
          es: El acto ocurrió en algún momento de la vida del encuestado (booleano de por vida = verdadero) pero no en los 12 meses anteriores a la entrevista. Este código no debe interpretarse como 'nunca'.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "definition": {"en": "Three-level frequency of an intimate partner violence act in the past 12 months, matching DHS-8 DV05B and DV04B coding. Used only for 12-month frequency sub-questions; the lifetime item is captured as a separate boolean property. The ''not_in_last_12m'' code is analytically distinct from ''never'': it indicates the act occurred at some point in the respondent''s lifetime but not in the past 12 months.", "es": "Frecuencia de tres niveles de un acto de violencia de pareja \u00edntima en los \u00faltimos 12 meses, conforme a la codificaci\u00f3n DHS-8 DV05B y DV04B. Se usa solo para subpreguntas de frecuencia de 12 meses; el \u00edtem de por vida se captura como propiedad booleana separada.", "fr": "Fr\u00e9quence \u00e0 trois niveaux d''un acte de violence du partenaire intime au cours des 12 derniers mois, conforme au codage DHS-8 DV05B et DV04B. Utilis\u00e9 uniquement pour les sous-questions de fr\u00e9quence sur 12 mois; l''item \u00e0 vie est captur\u00e9 comme propri\u00e9t\u00e9 bool\u00e9enne distincte."}, "id": "ipv-freq-3", "label": {"en": "IPV act frequency (past 12 months, 3-level)", "es": "Frecuencia de un acto de VPI (\u00faltimos 12 meses, 3 niveles)", "fr": "Fr\u00e9quence d''un acte de VPI (12 derniers mois, 3 niveaux)"}, "maturity": "draft", "standard": {"name": "dhs-domestic-violence-module-2022", "notes": "DV04B and DV05B (12-month frequency coding)", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}, "values": [{"code": "often", "definition": {"en": "The act occurred frequently in the past 12 months; the respondent considers it a regular occurrence.", "es": "El acto ocurri\u00f3 con frecuencia en los \u00faltimos 12 meses; el encuestado lo considera una ocurrencia regular.", "fr": "L''acte s''est produit fr\u00e9quemment au cours des 12 derniers mois ; le r\u00e9pondant le consid\u00e8re comme une occurrence r\u00e9guli\u00e8re."}, "label": {"en": "Often", "es": "Con frecuencia", "fr": "Souvent"}}, {"code": "sometimes", "definition": {"en": "The act occurred at least once in the past 12 months but not regularly.", "es": "El acto ocurri\u00f3 al menos una vez en los \u00faltimos 12 meses pero no regularmente.", "fr": "L''acte s''est produit au moins une fois au cours des 12 derniers mois, mais pas r\u00e9guli\u00e8rement."}, "label": {"en": "Sometimes", "es": "A veces", "fr": "Parfois"}}, {"code": "not_in_last_12m", "definition": {"en": "The act has occurred at some point in the respondent''s lifetime (lifetime boolean = true) but not in the 12 months preceding the interview. This code must not be interpreted as ''never''.", "es": "El acto ocurri\u00f3 en alg\u00fan momento de la vida del encuestado (booleano de por vida = verdadero) pero no en los 12 meses anteriores a la entrevista. Este c\u00f3digo no debe interpretarse como ''nunca''.", "fr": "L''acte s''est produit \u00e0 un moment donn\u00e9 au cours de la vie du r\u00e9pondant (bool\u00e9en \u00e0 vie = vrai) mais pas dans les 12 mois pr\u00e9c\u00e9dant l''entretien. Ce code ne doit pas \u00eatre interpr\u00e9t\u00e9 comme ''jamais''."}, "label": {"en": "Not in the last 12 months", "es": "No en los \u00faltimos 12 meses", "fr": "Pas au cours des 12 derniers mois"}}]}'
      bibliography_refs: dhs-domestic-violence-module-2022
  IronSupplementationDays:
    title:
      en: Iron Supplementation Duration
      fr: Durée de la supplémentation en fer
      es: Duración de la suplementación con hierro
    description:
      en: The approximate number of days the woman took iron tablets or iron syrup during the most recent pregnancy, grouped per DHS-8 m46 categories. WHO ANC 2016 recommends daily iron-folic acid supplementation throughout pregnancy; 90 days is the common programmatic minimum. Only asked if anc_iron_supplementation = yes.
      fr: Le nombre approximatif de jours pendant lesquels la femme a pris des comprimés de fer ou du sirop de fer pendant la grossesse la plus récente, regroupé selon les catégories DHS-8 m46. L'OMS ANC 2016 recommande une supplémentation quotidienne en fer et acide folique pendant toute la grossesse ; 90 jours est le minimum programmatique habituel. Posé uniquement si anc_iron_supplementation = oui.
      es: El número aproximado de días que la mujer tomó tabletas o jarabe de hierro durante el embarazo más reciente, agrupado según las categorías DHS-8 m46. La OMS ANC 2016 recomienda suplementación diaria de hierro y ácido fólico durante todo el embarazo; 90 días es el mínimo programático habitual. Solo se pregunta si anc_iron_supplementation = sí.
    enum_uri: aidops:IronSupplementationDays
    permissible_values:
      none:
        title:
          en: None (did not take)
          fr: Aucun (n'en a pas pris)
          es: Ninguno (no tomó)
        description:
          en: The woman did not take iron supplements during this pregnancy.
          fr: La femme n'a pas pris de suppléments de fer pendant cette grossesse.
          es: La mujer no tomó suplementos de hierro durante este embarazo.
      less_than_60:
        title:
          en: Less than 60 days
          fr: Moins de 60 jours
          es: Menos de 60 días
        description:
          en: Took iron for fewer than 60 days. Well below the WHO minimum recommendation.
          fr: A pris du fer pendant moins de 60 jours. Bien en dessous du minimum recommandé par l'OMS.
          es: Tomó hierro durante menos de 60 días. Muy por debajo del mínimo recomendado por la OMS.
      d60_to_89:
        title:
          en: 60 to 89 days
          fr: 60 à 89 jours
          es: De 60 a 89 días
        description:
          en: Took iron for 60 to 89 days. Below the 90-day programmatic minimum.
          fr: A pris du fer pendant 60 à 89 jours. En dessous du minimum programmatique de 90 jours.
          es: Tomó hierro durante 60 a 89 días. Por debajo del mínimo programático de 90 días.
      d90_to_179:
        title:
          en: 90 to 179 days
          fr: 90 à 179 jours
          es: De 90 a 179 días
        description:
          en: Took iron for 90 to 179 days. Meets the programmatic 90-day minimum.
          fr: A pris du fer pendant 90 à 179 jours. Satisfait au minimum programmatique de 90 jours.
          es: Tomó hierro durante 90 a 179 días. Cumple el mínimo programático de 90 días.
      d180_or_more:
        title:
          en: 180 or more days
          fr: 180 jours ou plus
          es: 180 días o más
        description:
          en: Took iron for 180 or more days. Meets the full-pregnancy recommendation.
          fr: A pris du fer pendant 180 jours ou plus. Satisfait à la recommandation sur toute la durée de la grossesse.
          es: Tomó hierro durante 180 o más días. Cumple la recomendación para todo el embarazo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember how many days she took iron supplements.
          fr: La répondante ne sait pas ou ne se souvient pas du nombre de jours pendant lesquels elle a pris des suppléments de fer.
          es: La encuestada no sabe o no recuerda cuántos días tomó suplementos de hierro.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire"], "definition": {"en": "The approximate number of days the woman took iron tablets or iron syrup during the most recent pregnancy, grouped per DHS-8 m46 categories. WHO ANC 2016 recommends daily iron-folic acid supplementation throughout pregnancy; 90 days is the common programmatic minimum. Only asked if anc_iron_supplementation = yes.", "es": "El n\u00famero aproximado de d\u00edas que la mujer tom\u00f3 tabletas o jarabe de hierro durante el embarazo m\u00e1s reciente, agrupado seg\u00fan las categor\u00edas DHS-8 m46. La OMS ANC 2016 recomienda suplementaci\u00f3n diaria de hierro y \u00e1cido f\u00f3lico durante todo el embarazo; 90 d\u00edas es el m\u00ednimo program\u00e1tico habitual. Solo se pregunta si anc_iron_supplementation = s\u00ed.", "fr": "Le nombre approximatif de jours pendant lesquels la femme a pris des comprim\u00e9s de fer ou du sirop de fer pendant la grossesse la plus r\u00e9cente, regroup\u00e9 selon les cat\u00e9gories DHS-8 m46. L''OMS ANC 2016 recommande une suppl\u00e9mentation quotidienne en fer et acide folique pendant toute la grossesse ; 90 jours est le minimum programmatique habituel. Pos\u00e9 uniquement si anc_iron_supplementation = oui."}, "id": "iron-supplementation-days", "label": {"en": "Iron Supplementation Duration", "es": "Duraci\u00f3n de la suplementaci\u00f3n con hierro", "fr": "Dur\u00e9e de la suppl\u00e9mentation en fer"}, "maturity": "draft", "values": [{"code": "none", "definition": {"en": "The woman did not take iron supplements during this pregnancy.", "es": "La mujer no tom\u00f3 suplementos de hierro durante este embarazo.", "fr": "La femme n''a pas pris de suppl\u00e9ments de fer pendant cette grossesse."}, "label": {"en": "None (did not take)", "es": "Ninguno (no tom\u00f3)", "fr": "Aucun (n''en a pas pris)"}}, {"code": "less_than_60", "definition": {"en": "Took iron for fewer than 60 days. Well below the WHO minimum recommendation.", "es": "Tom\u00f3 hierro durante menos de 60 d\u00edas. Muy por debajo del m\u00ednimo recomendado por la OMS.", "fr": "A pris du fer pendant moins de 60 jours. Bien en dessous du minimum recommand\u00e9 par l''OMS."}, "label": {"en": "Less than 60 days", "es": "Menos de 60 d\u00edas", "fr": "Moins de 60 jours"}}, {"code": "d60_to_89", "definition": {"en": "Took iron for 60 to 89 days. Below the 90-day programmatic minimum.", "es": "Tom\u00f3 hierro durante 60 a 89 d\u00edas. Por debajo del m\u00ednimo program\u00e1tico de 90 d\u00edas.", "fr": "A pris du fer pendant 60 \u00e0 89 jours. En dessous du minimum programmatique de 90 jours."}, "label": {"en": "60 to 89 days", "es": "De 60 a 89 d\u00edas", "fr": "60 \u00e0 89 jours"}}, {"code": "d90_to_179", "definition": {"en": "Took iron for 90 to 179 days. Meets the programmatic 90-day minimum.", "es": "Tom\u00f3 hierro durante 90 a 179 d\u00edas. Cumple el m\u00ednimo program\u00e1tico de 90 d\u00edas.", "fr": "A pris du fer pendant 90 \u00e0 179 jours. Satisfait au minimum programmatique de 90 jours."}, "label": {"en": "90 to 179 days", "es": "De 90 a 179 d\u00edas", "fr": "90 \u00e0 179 jours"}}, {"code": "d180_or_more", "definition": {"en": "Took iron for 180 or more days. Meets the full-pregnancy recommendation.", "es": "Tom\u00f3 hierro durante 180 o m\u00e1s d\u00edas. Cumple la recomendaci\u00f3n para todo el embarazo.", "fr": "A pris du fer pendant 180 jours ou plus. Satisfait \u00e0 la recommandation sur toute la dur\u00e9e de la grossesse."}, "label": {"en": "180 or more days", "es": "180 d\u00edas o m\u00e1s", "fr": "180 jours ou plus"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember how many days she took iron supplements.", "es": "La encuestada no sabe o no recuerda cu\u00e1ntos d\u00edas tom\u00f3 suplementos de hierro.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas du nombre de jours pendant lesquels elle a pris des suppl\u00e9ments de fer."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: dhs-woman-questionnaire
  IycfBreastfeedingInitiation:
    title:
      en: IYCF Breastfeeding Initiation Timing
      fr: Délai d'initiation à l'allaitement IYCF
      es: Momento de inicio de la lactancia materna IYCF
    description:
      en: 'The timing of first breastfeeding after birth, used to compute the Early Initiation of Breastfeeding (EIBF) indicator. A child is classified as having achieved EIBF if put to the breast within one hour of birth. Coded from the caregiver''s response to the question: ''How long after birth was the child first put to the breast?'''
      fr: 'Le délai d''initiation à l''allaitement après la naissance, utilisé pour calculer l''indicateur d''allaitement précoce (EIBF). Un enfant est classé comme ayant atteint l''EIBF s''il a été mis au sein dans l''heure suivant sa naissance. Codé d''après la réponse du soignant à la question : « Combien de temps après la naissance l''enfant a-t-il été mis au sein pour la première fois ? »'
      es: 'El momento de inicio de la lactancia materna después del nacimiento, utilizado para calcular el indicador de inicio temprano de la lactancia materna (EIBF). Se clasifica que un niño ha logrado el EIBF si fue puesto al pecho dentro de la primera hora después del nacimiento. Se codifica a partir de la respuesta del cuidador a la pregunta: ''¿Cuánto tiempo después del nacimiento se puso al niño al pecho por primera vez?'''
    enum_uri: aidops:IycfBreastfeedingInitiation
    permissible_values:
      within_1_hour:
        title:
          en: Within 1 hour
          fr: Dans l'heure
          es: En la primera hora
        description:
          en: The child was first put to the breast within one hour of birth. Meets the threshold for Early Initiation of Breastfeeding (EIBF).
          fr: L'enfant a été mis au sein pour la première fois dans l'heure suivant sa naissance. Remplit le critère de l'allaitement précoce (EIBF).
          es: El niño fue puesto al pecho por primera vez dentro de la primera hora después del nacimiento. Cumple el umbral para el inicio temprano de la lactancia materna (EIBF).
      one_to_23_hours:
        title:
          en: After 1 hour but within 24 hours
          fr: Après 1 heure mais dans les 24 heures
          es: Después de 1 hora pero dentro de las 24 horas
        description:
          en: The child was first put to the breast more than one hour but within 24 hours of birth. Does not meet the EIBF threshold.
          fr: L'enfant a été mis au sein pour la première fois plus d'une heure mais dans les 24 heures suivant sa naissance. Ne remplit pas le critère EIBF.
          es: El niño fue puesto al pecho por primera vez más de una hora pero dentro de las 24 horas después del nacimiento. No cumple el umbral del EIBF.
      after_24_hours:
        title:
          en: After 24 hours
          fr: Après 24 heures
          es: Después de 24 horas
        description:
          en: The child was first put to the breast more than 24 hours after birth. Does not meet the EIBF threshold.
          fr: L'enfant a été mis au sein pour la première fois plus de 24 heures après sa naissance. Ne remplit pas le critère EIBF.
          es: El niño fue puesto al pecho por primera vez más de 24 horas después del nacimiento. No cumple el umbral del EIBF.
      never_breastfed:
        title:
          en: Never breastfed
          fr: Jamais allaité
          es: Nunca amamantado
        description:
          en: The child was never put to the breast. Only applicable when the parent question (ever breastfed) indicates no breastfeeding; recorded to distinguish from missing data.
          fr: L'enfant n'a jamais été mis au sein. Applicable uniquement lorsque la question parente (jamais allaité) indique qu'il n'y a pas eu d'allaitement ; enregistré pour distinguer des données manquantes.
          es: El niño nunca fue puesto al pecho. Solo aplicable cuando la pregunta principal (¿alguna vez fue amamantado?) indica que no hubo lactancia materna; se registra para distinguir de datos faltantes.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-iycf-2021"], "definition": {"en": "The timing of first breastfeeding after birth, used to compute the Early Initiation of Breastfeeding (EIBF) indicator. A child is classified as having achieved EIBF if put to the breast within one hour of birth. Coded from the caregiver''s response to the question: ''How long after birth was the child first put to the breast?''", "es": "El momento de inicio de la lactancia materna despu\u00e9s del nacimiento, utilizado para calcular el indicador de inicio temprano de la lactancia materna (EIBF). Se clasifica que un ni\u00f1o ha logrado el EIBF si fue puesto al pecho dentro de la primera hora despu\u00e9s del nacimiento. Se codifica a partir de la respuesta del cuidador a la pregunta: ''\u00bfCu\u00e1nto tiempo despu\u00e9s del nacimiento se puso al ni\u00f1o al pecho por primera vez?''", "fr": "Le d\u00e9lai d''initiation \u00e0 l''allaitement apr\u00e8s la naissance, utilis\u00e9 pour calculer l''indicateur d''allaitement pr\u00e9coce (EIBF). Un enfant est class\u00e9 comme ayant atteint l''EIBF s''il a \u00e9t\u00e9 mis au sein dans l''heure suivant sa naissance. Cod\u00e9 d''apr\u00e8s la r\u00e9ponse du soignant \u00e0 la question : \u00ab Combien de temps apr\u00e8s la naissance l''enfant a-t-il \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois ? \u00bb"}, "id": "iycf-breastfeeding-initiation", "label": {"en": "IYCF Breastfeeding Initiation Timing", "es": "Momento de inicio de la lactancia materna IYCF", "fr": "D\u00e9lai d''initiation \u00e0 l''allaitement IYCF"}, "maturity": "draft", "standard": {"name": "Indicators for assessing infant and young child feeding practices: definitions and measurement methods", "uri": "https://www.who.int/publications/i/item/9789240018389"}, "system_mappings": {"who-iycf-2021": {"note": "Response categories from the WHO/UNICEF 2021 example EIBF questionnaire module. Code 4 (never breastfed) is an edge case for the initiation question and is typically captured by the prior ''ever breastfed'' screening question.", "values": [{"code": "1", "label": "Within 1 hour of birth", "maps_to": "within_1_hour"}, {"code": "2", "label": "After 1 hour but within 24 hours", "maps_to": "one_to_23_hours"}, {"code": "3", "label": "More than 24 hours after birth", "maps_to": "after_24_hours"}, {"code": "4", "label": "Never breastfed", "maps_to": "never_breastfed"}], "vocabulary_name": "WHO/UNICEF IYCF 2021 EIBF response categories"}}, "values": [{"code": "within_1_hour", "definition": {"en": "The child was first put to the breast within one hour of birth. Meets the threshold for Early Initiation of Breastfeeding (EIBF).", "es": "El ni\u00f1o fue puesto al pecho por primera vez dentro de la primera hora despu\u00e9s del nacimiento. Cumple el umbral para el inicio temprano de la lactancia materna (EIBF).", "fr": "L''enfant a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois dans l''heure suivant sa naissance. Remplit le crit\u00e8re de l''allaitement pr\u00e9coce (EIBF)."}, "label": {"en": "Within 1 hour", "es": "En la primera hora", "fr": "Dans l''heure"}}, {"code": "one_to_23_hours", "definition": {"en": "The child was first put to the breast more than one hour but within 24 hours of birth. Does not meet the EIBF threshold.", "es": "El ni\u00f1o fue puesto al pecho por primera vez m\u00e1s de una hora pero dentro de las 24 horas despu\u00e9s del nacimiento. No cumple el umbral del EIBF.", "fr": "L''enfant a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois plus d''une heure mais dans les 24 heures suivant sa naissance. Ne remplit pas le crit\u00e8re EIBF."}, "label": {"en": "After 1 hour but within 24 hours", "es": "Despu\u00e9s de 1 hora pero dentro de las 24 horas", "fr": "Apr\u00e8s 1 heure mais dans les 24 heures"}}, {"code": "after_24_hours", "definition": {"en": "The child was first put to the breast more than 24 hours after birth. Does not meet the EIBF threshold.", "es": "El ni\u00f1o fue puesto al pecho por primera vez m\u00e1s de 24 horas despu\u00e9s del nacimiento. No cumple el umbral del EIBF.", "fr": "L''enfant a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois plus de 24 heures apr\u00e8s sa naissance. Ne remplit pas le crit\u00e8re EIBF."}, "label": {"en": "After 24 hours", "es": "Despu\u00e9s de 24 horas", "fr": "Apr\u00e8s 24 heures"}}, {"code": "never_breastfed", "definition": {"en": "The child was never put to the breast. Only applicable when the parent question (ever breastfed) indicates no breastfeeding; recorded to distinguish from missing data.", "es": "El ni\u00f1o nunca fue puesto al pecho. Solo aplicable cuando la pregunta principal (\u00bfalguna vez fue amamantado?) indica que no hubo lactancia materna; se registra para distinguir de datos faltantes.", "fr": "L''enfant n''a jamais \u00e9t\u00e9 mis au sein. Applicable uniquement lorsque la question parente (jamais allait\u00e9) indique qu''il n''y a pas eu d''allaitement ; enregistr\u00e9 pour distinguer des donn\u00e9es manquantes."}, "label": {"en": "Never breastfed", "es": "Nunca amamantado", "fr": "Jamais allait\u00e9"}}]}'
      bibliography_refs: who-iycf-2021
  IycfFoodGroup:
    title:
      en: IYCF Food Group (MDD-C)
      fr: Groupe alimentaire IYCF (MDD-C)
      es: Grupo alimentario IYCF (MDD-C)
    description:
      en: The eight food groups used by the WHO/UNICEF 2021 Minimum Dietary Diversity for Children (MDD-C) indicator. A child 6–23 months is considered to have achieved minimum dietary diversity if foods from at least five of the eight groups were consumed in the previous 24 hours. Breastmilk is group 1; the remaining seven groups cover solid and liquid foods.
      fr: Les huit groupes alimentaires utilisés par l'indicateur de Diversité alimentaire minimale pour les enfants (MDD-C) de l'OMS/UNICEF 2021. Un enfant de 6 à 23 mois est considéré comme ayant atteint la diversité alimentaire minimale s'il a consommé des aliments d'au moins cinq des huit groupes au cours des 24 heures précédentes. Le lait maternel est le groupe 1 ; les sept autres groupes couvrent les aliments solides et liquides.
      es: Los ocho grupos alimentarios utilizados por el indicador de Diversidad Dietética Mínima para Niños (MDD-C) de la OMS/UNICEF 2021. Se considera que un niño de 6 a 23 meses ha alcanzado la diversidad dietética mínima si consumió alimentos de al menos cinco de los ocho grupos en las 24 horas anteriores. La leche materna es el grupo 1; los siete grupos restantes cubren alimentos sólidos y líquidos.
    enum_uri: aidops:IycfFoodGroup
    permissible_values:
      breastmilk:
        title:
          en: Breast milk
          fr: Lait maternel
          es: Leche materna
        description:
          en: Breast milk received during the previous day (any breastfeeding yesterday). In practice this food group is derived from the breastfed-yesterday question rather than asked separately.
          fr: Lait maternel reçu au cours de la journée précédente (tout allaitement maternel hier). En pratique, ce groupe alimentaire est dérivé de la question sur l'allaitement d'hier plutôt que posé séparément.
          es: Leche materna recibida durante el día anterior (cualquier amamantamiento ayer). En la práctica, este grupo alimentario se deriva de la pregunta sobre amamantamiento de ayer en lugar de preguntarse por separado.
      grains:
        title:
          en: Grains, roots, tubers, and plantains
          fr: Céréales, racines, tubercules et bananes plantains
          es: Cereales, raíces, tubérculos y plátanos
        description:
          en: Porridge, bread, rice, pasta, millet, white potato, cassava, yam, plantain, and similar starchy staples.
          fr: Bouillie, pain, riz, pâtes, mil, pomme de terre blanche, manioc, igname, banane plantain et autres féculents similaires.
          es: Gachas, pan, arroz, pasta, mijo, papa blanca, yuca, ñame, plátano y otros alimentos amiláceos similares.
      pulses_nuts_seeds:
        title:
          en: Pulses, nuts, and seeds
          fr: Légumineuses, noix et graines
          es: Legumbres, nueces y semillas
        description:
          en: Beans, lentils, peas, groundnuts, peanut butter, sesame, and other seeds and nuts.
          fr: Haricots, lentilles, pois, arachides, beurre d'arachide, sésame et autres graines et noix.
          es: Frijoles, lentejas, guisantes, maní, mantequilla de maní, sésamo y otras semillas y nueces.
      dairy:
        title:
          en: Dairy
          fr: Produits laitiers
          es: Lácteos
        description:
          en: Infant formula, animal milk (cow, goat, or other), yogurt, and cheese.
          fr: Lait maternisé, lait animal (vache, chèvre ou autre), yaourt et fromage.
          es: Fórmula infantil, leche animal (vaca, cabra u otra), yogur y queso.
      flesh:
        title:
          en: Flesh foods
          fr: Aliments carnés
          es: Alimentos cárnicos
        description:
          en: Chicken, beef, pork, organ meat (liver, kidney), fish, shellfish, and other flesh foods.
          fr: Poulet, bœuf, porc, abats (foie, rein), poisson, crustacés et autres aliments carnés.
          es: Pollo, carne de res, cerdo, vísceras (hígado, riñón), pescado, mariscos y otros alimentos cárnicos.
      eggs:
        title:
          en: Eggs
          fr: Œufs
          es: Huevos
        description:
          en: Eggs from any bird.
          fr: Œufs de toute volaille.
          es: Huevos de cualquier ave.
      vitamin_a_veg_fruit:
        title:
          en: Vitamin-A-rich fruits and vegetables
          fr: Fruits et légumes riches en vitamine A
          es: Frutas y verduras ricas en vitamina A
        description:
          en: Ripe mango, ripe papaya, carrot, pumpkin, orange-fleshed sweet potato, red palm oil, and other vitamin-A-rich foods. Includes dark green leafy vegetables in this 8-group framework (unlike the MDD-W framework which separates them).
          fr: Mangue mûre, papaye mûre, carotte, citrouille, patate douce à chair orange, huile de palme rouge et autres aliments riches en vitamine A. Comprend les légumes-feuilles vert foncé dans ce cadre à 8 groupes (contrairement au cadre MDD-W qui les sépare).
          es: Mango maduro, papaya madura, zanahoria, calabaza, batata de pulpa anaranjada, aceite de palma rojo y otros alimentos ricos en vitamina A. Incluye las hortalizas de hoja verde oscuro en este marco de 8 grupos (a diferencia del marco MDD-W que las separa).
      other_veg_fruit:
        title:
          en: Other fruits and vegetables
          fr: Autres fruits et légumes
          es: Otras frutas y verduras
        description:
          en: Tomato, onion, eggplant, spinach (not vitamin-A-rich leafy vegetables), banana, apple, citrus, and other fruits and vegetables not captured in the vitamin-A-rich group.
          fr: Tomate, oignon, aubergine, épinards (pas les légumes-feuilles riches en vitamine A), banane, pomme, agrumes et autres fruits et légumes non couverts par le groupe riche en vitamine A.
          es: Tomate, cebolla, berenjena, espinacas (no hortalizas de hoja rica en vitamina A), banano, manzana, cítricos y otras frutas y verduras no cubiertas por el grupo rico en vitamina A.
