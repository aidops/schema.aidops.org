  PrivacySpace3:
    title:
      en: Private space availability for women and girls (3-level)
      fr: Disponibilité d'espace privé pour les femmes et les filles (3 niveaux)
      es: Disponibilidad de espacio privado para mujeres y niñas (3 niveles)
    description:
      en: Three-level scale for assessing whether women and girls have access to a private space for personal hygiene, distinguishing between private space inside the shelter and access to a shared facility nearby. Sphere Standard 3 guidance notes that women, girls, and those needing assistance with personal hygiene often require additional space for privacy.
      fr: Échelle à trois niveaux pour évaluer si les femmes et les filles ont accès à un espace privé pour l'hygiène personnelle, distinguant l'espace privé à l'intérieur de l'abri et l'accès à une installation partagée à proximité. La Norme Sphère 3 précise que les femmes, les filles et ceux ayant besoin d'aide pour l'hygiène personnelle ont souvent besoin d'espace supplémentaire pour leur vie privée.
      es: Escala de tres niveles para evaluar si las mujeres y niñas tienen acceso a un espacio privado para higiene personal, distinguiendo entre espacio privado dentro del refugio y acceso a una instalación compartida cercana. La orientación de la Norma Esfera 3 señala que las mujeres, niñas y quienes necesitan asistencia con la higiene personal a menudo requieren espacio adicional para la privacidad.
    enum_uri: aidops:PrivacySpace3
    permissible_values:
      yes_inside_shelter:
        title:
          en: Yes — private space inside the shelter
          fr: Oui — espace privé à l'intérieur de l'abri
          es: Sí — espacio privado dentro del refugio
        description:
          en: A separate, enclosed space for personal hygiene is available inside the shelter.
          fr: Un espace séparé et fermé pour l'hygiène personnelle est disponible à l'intérieur de l'abri.
          es: Un espacio separado y cerrado para la higiene personal está disponible dentro del refugio.
      yes_nearby_shared:
        title:
          en: Yes — nearby shared facility (e.g., latrine block with privacy)
          fr: Oui — installation partagée à proximité (p. ex., bloc de latrines avec espace privé)
          es: Sí — instalación compartida cercana (p. ej., bloque de letrinas con privacidad)
        description:
          en: A private space is available but only in a shared facility nearby (such as a communal latrine block), not inside the shelter.
          fr: Un espace privé est disponible mais uniquement dans une installation partagée à proximité (comme un bloc de latrines communal), pas à l'intérieur de l'abri.
          es: Un espacio privado está disponible pero solo en una instalación compartida cercana (como un bloque de letrinas comunal), no dentro del refugio.
      'no':
        title:
          en: No — no private space available
          fr: Non — aucun espace privé disponible
          es: No — sin espacio privado disponible
        description:
          en: No private space is available for women and girls to wash or attend to personal hygiene.
          fr: Aucun espace privé n'est disponible pour que les femmes et les filles se lavent ou s'occupent de leur hygiène personnelle.
          es: No hay espacio privado disponible para que mujeres y niñas se laven o atiendan su higiene personal.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale for assessing whether women and girls have access to a private space for personal hygiene, distinguishing between private space inside the shelter and access to a shared facility nearby. Sphere Standard 3 guidance notes that women, girls, and those needing assistance with personal hygiene often require additional space for privacy.", "es": "Escala de tres niveles para evaluar si las mujeres y ni\u00f1as tienen acceso a un espacio privado para higiene personal, distinguiendo entre espacio privado dentro del refugio y acceso a una instalaci\u00f3n compartida cercana. La orientaci\u00f3n de la Norma Esfera 3 se\u00f1ala que las mujeres, ni\u00f1as y quienes necesitan asistencia con la higiene personal a menudo requieren espacio adicional para la privacidad.", "fr": "\u00c9chelle \u00e0 trois niveaux pour \u00e9valuer si les femmes et les filles ont acc\u00e8s \u00e0 un espace priv\u00e9 pour l''hygi\u00e8ne personnelle, distinguant l''espace priv\u00e9 \u00e0 l''int\u00e9rieur de l''abri et l''acc\u00e8s \u00e0 une installation partag\u00e9e \u00e0 proximit\u00e9. La Norme Sph\u00e8re 3 pr\u00e9cise que les femmes, les filles et ceux ayant besoin d''aide pour l''hygi\u00e8ne personnelle ont souvent besoin d''espace suppl\u00e9mentaire pour leur vie priv\u00e9e."}, "id": "privacy-space-3", "label": {"en": "Private space availability for women and girls (3-level)", "es": "Disponibilidad de espacio privado para mujeres y ni\u00f1as (3 niveles)", "fr": "Disponibilit\u00e9 d''espace priv\u00e9 pour les femmes et les filles (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_inside_shelter", "definition": {"en": "A separate, enclosed space for personal hygiene is available inside the shelter.", "es": "Un espacio separado y cerrado para la higiene personal est\u00e1 disponible dentro del refugio.", "fr": "Un espace s\u00e9par\u00e9 et ferm\u00e9 pour l''hygi\u00e8ne personnelle est disponible \u00e0 l''int\u00e9rieur de l''abri."}, "label": {"en": "Yes \u2014 private space inside the shelter", "es": "S\u00ed \u2014 espacio privado dentro del refugio", "fr": "Oui \u2014 espace priv\u00e9 \u00e0 l''int\u00e9rieur de l''abri"}}, {"code": "yes_nearby_shared", "definition": {"en": "A private space is available but only in a shared facility nearby (such as a communal latrine block), not inside the shelter.", "es": "Un espacio privado est\u00e1 disponible pero solo en una instalaci\u00f3n compartida cercana (como un bloque de letrinas comunal), no dentro del refugio.", "fr": "Un espace priv\u00e9 est disponible mais uniquement dans une installation partag\u00e9e \u00e0 proximit\u00e9 (comme un bloc de latrines communal), pas \u00e0 l''int\u00e9rieur de l''abri."}, "label": {"en": "Yes \u2014 nearby shared facility (e.g., latrine block with privacy)", "es": "S\u00ed \u2014 instalaci\u00f3n compartida cercana (p. ej., bloque de letrinas con privacidad)", "fr": "Oui \u2014 installation partag\u00e9e \u00e0 proximit\u00e9 (p. ex., bloc de latrines avec espace priv\u00e9)"}}, {"code": "no", "definition": {"en": "No private space is available for women and girls to wash or attend to personal hygiene.", "es": "No hay espacio privado disponible para que mujeres y ni\u00f1as se laven o atiendan su higiene personal.", "fr": "Aucun espace priv\u00e9 n''est disponible pour que les femmes et les filles se lavent ou s''occupent de leur hygi\u00e8ne personnelle."}, "label": {"en": "No \u2014 no private space available", "es": "No \u2014 sin espacio privado disponible", "fr": "Non \u2014 aucun espace priv\u00e9 disponible"}}]}'
