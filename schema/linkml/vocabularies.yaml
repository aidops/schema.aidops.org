  AapSafety4:
    title:
      en: 'AAP: Safety with responders (4 levels)'
      fr: 'Redevabilité : Sécurité avec les intervenants (4 niveaux)'
      es: 'Rendición de cuentas: Seguridad con los actores humanitarios (4 niveles)'
    description:
      en: 'Four-level safety perception scale specifically for interactions with aid providers. Distinct from GBVRiskProfile''s `safety-perception-3` (which is a three-level scale covering site-level daytime/nighttime movement safety for women and girls): the AAP scale has finer granularity on the narrower topic of staff-interaction safety, aligned with GTS HVI convention. Properties using this vocabulary are PSEA-adjacent and must be flagged `sensitivity: sensitive`.'
      fr: 'Échelle de perception de sécurité à quatre niveaux spécifiquement pour les interactions avec les intervenants. Distincte de `safety-perception-3` du Profil de risque VBG (qui est une échelle à trois niveaux couvrant la sécurité des déplacements au niveau du site de jour et de nuit pour les femmes et les filles) : l''échelle AAP a une granularité plus fine sur le sujet plus étroit de la sécurité des interactions avec le personnel, alignée sur la convention GTS HVI. Les propriétés utilisant ce vocabulaire sont liées à la PSEA et doivent être marquées `sensitivity: sensitive`.'
      es: 'Escala de percepción de seguridad de cuatro niveles específicamente para las interacciones con los actores humanitarios. Distinta de `safety-perception-3` del Perfil de Riesgo VBG (que es una escala de tres niveles que cubre la seguridad del movimiento a nivel de sitio de día/noche para mujeres y niñas): la escala AAP tiene una granularidad más fina sobre el tema más estrecho de la seguridad en las interacciones con el personal, alineada con la convención GTS HVI. Las propiedades que utilizan este vocabulario están relacionadas con PSEA y deben marcarse como `sensitivity: sensitive`.'
    enum_uri: aidops:AapSafety4
    permissible_values:
      very_safe:
        title:
          en: Very safe
          fr: Très en sécurité
          es: Muy seguro
        description:
          en: Respondent reports feeling very safe in interactions with aid providers.
          fr: Le répondant rapporte se sentir très en sécurité lors des interactions avec les intervenants.
          es: El encuestado reporta sentirse muy seguro en las interacciones con los actores humanitarios.
      somewhat_safe:
        title:
          en: Somewhat safe
          fr: Plutôt en sécurité
          es: Algo seguro
        description:
          en: Respondent reports generally feeling safe but with some hesitation.
          fr: Le répondant rapporte se sentir généralement en sécurité mais avec une certaine hésitation.
          es: El encuestado reporta sentirse generalmente seguro pero con cierta vacilación.
      not_very_safe:
        title:
          en: Not very safe
          fr: Peu en sécurité
          es: Poco seguro
        description:
          en: Respondent reports feeling unsafe in some or most interactions with aid providers.
          fr: Le répondant rapporte se sentir peu en sécurité dans certaines ou la plupart des interactions avec les intervenants.
          es: El encuestado reporta sentirse poco seguro en algunas o la mayoría de las interacciones con los actores humanitarios.
      not_at_all_safe:
        title:
          en: Not at all safe
          fr: Pas du tout en sécurité
          es: Nada seguro
        description:
          en: Respondent reports feeling unsafe in interactions with aid providers.
          fr: Le répondant rapporte ne se sentir pas en sécurité lors des interactions avec les intervenants.
          es: El encuestado reporta sentirse inseguro en las interacciones con los actores humanitarios.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess safety.
          fr: Le répondant ne peut pas évaluer la sécurité.
          es: El encuestado no puede evaluar la seguridad.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018"], "definition": {"en": "Four-level safety perception scale specifically for interactions with aid providers. Distinct from GBVRiskProfile''s `safety-perception-3` (which is a three-level scale covering site-level daytime/nighttime movement safety for women and girls): the AAP scale has finer granularity on the narrower topic of staff-interaction safety, aligned with GTS HVI convention. Properties using this vocabulary are PSEA-adjacent and must be flagged `sensitivity: sensitive`.", "es": "Escala de percepci\u00f3n de seguridad de cuatro niveles espec\u00edficamente para las interacciones con los actores humanitarios. Distinta de `safety-perception-3` del Perfil de Riesgo VBG (que es una escala de tres niveles que cubre la seguridad del movimiento a nivel de sitio de d\u00eda/noche para mujeres y ni\u00f1as): la escala AAP tiene una granularidad m\u00e1s fina sobre el tema m\u00e1s estrecho de la seguridad en las interacciones con el personal, alineada con la convenci\u00f3n GTS HVI. Las propiedades que utilizan este vocabulario est\u00e1n relacionadas con PSEA y deben marcarse como `sensitivity: sensitive`.", "fr": "\u00c9chelle de perception de s\u00e9curit\u00e9 \u00e0 quatre niveaux sp\u00e9cifiquement pour les interactions avec les intervenants. Distincte de `safety-perception-3` du Profil de risque VBG (qui est une \u00e9chelle \u00e0 trois niveaux couvrant la s\u00e9curit\u00e9 des d\u00e9placements au niveau du site de jour et de nuit pour les femmes et les filles) : l''\u00e9chelle AAP a une granularit\u00e9 plus fine sur le sujet plus \u00e9troit de la s\u00e9curit\u00e9 des interactions avec le personnel, align\u00e9e sur la convention GTS HVI. Les propri\u00e9t\u00e9s utilisant ce vocabulaire sont li\u00e9es \u00e0 la PSEA et doivent \u00eatre marqu\u00e9es `sensitivity: sensitive`."}, "id": "aap-safety-4", "label": {"en": "AAP: Safety with responders (4 levels)", "es": "Rendici\u00f3n de cuentas: Seguridad con los actores humanitarios (4 niveles)", "fr": "Redevabilit\u00e9 : S\u00e9curit\u00e9 avec les intervenants (4 niveaux)"}, "maturity": "draft", "standard": {"name": "Humanitarian Voice Index (Ground Truth Solutions)", "notes": "Safety 4-level scale aligned with GTS HVI and IASC / REACH 2018 staff-interaction safety convention.", "uri": "https://humanitarianvoiceindex.org"}, "values": [{"code": "very_safe", "definition": {"en": "Respondent reports feeling very safe in interactions with aid providers.", "es": "El encuestado reporta sentirse muy seguro en las interacciones con los actores humanitarios.", "fr": "Le r\u00e9pondant rapporte se sentir tr\u00e8s en s\u00e9curit\u00e9 lors des interactions avec les intervenants."}, "label": {"en": "Very safe", "es": "Muy seguro", "fr": "Tr\u00e8s en s\u00e9curit\u00e9"}}, {"code": "somewhat_safe", "definition": {"en": "Respondent reports generally feeling safe but with some hesitation.", "es": "El encuestado reporta sentirse generalmente seguro pero con cierta vacilaci\u00f3n.", "fr": "Le r\u00e9pondant rapporte se sentir g\u00e9n\u00e9ralement en s\u00e9curit\u00e9 mais avec une certaine h\u00e9sitation."}, "label": {"en": "Somewhat safe", "es": "Algo seguro", "fr": "Plut\u00f4t en s\u00e9curit\u00e9"}}, {"code": "not_very_safe", "definition": {"en": "Respondent reports feeling unsafe in some or most interactions with aid providers.", "es": "El encuestado reporta sentirse poco seguro en algunas o la mayor\u00eda de las interacciones con los actores humanitarios.", "fr": "Le r\u00e9pondant rapporte se sentir peu en s\u00e9curit\u00e9 dans certaines ou la plupart des interactions avec les intervenants."}, "label": {"en": "Not very safe", "es": "Poco seguro", "fr": "Peu en s\u00e9curit\u00e9"}}, {"code": "not_at_all_safe", "definition": {"en": "Respondent reports feeling unsafe in interactions with aid providers.", "es": "El encuestado reporta sentirse inseguro en las interacciones con los actores humanitarios.", "fr": "Le r\u00e9pondant rapporte ne se sentir pas en s\u00e9curit\u00e9 lors des interactions avec les intervenants."}, "label": {"en": "Not at all safe", "es": "Nada seguro", "fr": "Pas du tout en s\u00e9curit\u00e9"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess safety.", "es": "El encuestado no puede evaluar la seguridad.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la s\u00e9curit\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
      bibliography_refs: gts-hvi,iasc-reach-aap-menu-2018
  AapSatisfaction5:
    title:
      en: 'AAP: Satisfaction (5 levels)'
      fr: 'Redevabilité : Satisfaction (5 niveaux)'
      es: 'Rendición de cuentas: Satisfacción (5 niveles)'
    description:
      en: 'Five-level Likert satisfaction scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how well aid met needs, how well consultation was reflected, and how satisfied the respondent is with complaint-response handling. This is the canonical AAP satisfaction measure in CHS Alliance auditor guidance, GTS HVI, and the IASC / REACH Menu of AAP Questions 2018. Distinct from `aap-agree-5` (same structure, different labels: agreement vs satisfaction). Includes non-substantive codes `dont_know`, `not_applicable`, and `prefer_not_to_answer`.'
      fr: 'Échelle de satisfaction de Likert à cinq niveaux utilisée dans le Profil de redevabilité envers les populations affectées pour les items qui demandent dans quelle mesure l''aide a répondu aux besoins, dans quelle mesure la consultation a été reflétée, et à quel point le répondant est satisfait de la gestion de la réponse aux plaintes. Il s''agit de la mesure de satisfaction AAP canonique dans les orientations des auditeurs de CHS Alliance, GTS HVI et le Menu de questions AAP IASC / REACH 2018. Distinct de `aap-agree-5` (même structure, étiquettes différentes : accord vs satisfaction). Inclut des codes non substantiels `dont_know`, `not_applicable` et `prefer_not_to_answer`.'
      es: 'Escala de satisfacción de Likert de cinco niveles utilizada en el Perfil de Rendición de Cuentas a las Poblaciones Afectadas para los ítems que preguntan qué tan bien la ayuda cumplió con las necesidades, qué tan bien se reflejó la consulta, y qué tan satisfecho está el encuestado con el manejo de la respuesta a quejas. Es la medida canónica de satisfacción AAP en las orientaciones de auditoría de CHS Alliance, GTS HVI y el Menú de Preguntas AAP IASC / REACH 2018. Distinto de `aap-agree-5` (misma estructura, etiquetas diferentes: acuerdo vs satisfacción). Incluye códigos no sustantivos `dont_know`, `not_applicable` y `prefer_not_to_answer`.'
    enum_uri: aidops:AapSatisfaction5
    permissible_values:
      very_well:
        title:
          en: Very well / Very satisfied
          fr: Très bien / Très satisfait
          es: Muy bien / Muy satisfecho
        description:
          en: The respondent reports the highest level of positive assessment.
          fr: Le répondant rapporte le niveau le plus élevé d'évaluation positive.
          es: El encuestado reporta el nivel más alto de evaluación positiva.
      somewhat_well:
        title:
          en: Somewhat well / Satisfied
          fr: Plutôt bien / Satisfait
          es: Algo bien / Satisfecho
        description:
          en: The respondent reports a positive assessment.
          fr: Le répondant rapporte une évaluation positive.
          es: El encuestado reporta una evaluación positiva.
      neither:
        title:
          en: Neither well nor poorly / Neutral
          fr: Ni bien ni mal / Neutre
          es: Ni bien ni mal / Neutral
        description:
          en: The respondent is neutral.
          fr: Le répondant est neutre.
          es: El encuestado es neutral.
      somewhat_poorly:
        title:
          en: Somewhat poorly / Dissatisfied
          fr: Plutôt mal / Insatisfait
          es: Algo mal / Insatisfecho
        description:
          en: The respondent reports a negative assessment.
          fr: Le répondant rapporte une évaluation négative.
          es: El encuestado reporta una evaluación negativa.
      not_at_all:
        title:
          en: Not at all / Very dissatisfied
          fr: Pas du tout / Très insatisfait
          es: Nada / Muy insatisfecho
        description:
          en: The respondent reports the highest level of negative assessment.
          fr: Le répondant rapporte le niveau le plus élevé d'évaluation négative.
          es: El encuestado reporta el nivel más alto de evaluación negativa.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess.
          fr: Le répondant ne peut pas évaluer.
          es: El encuestado no puede evaluar.
      not_applicable:
        title:
          en: Not applicable
          fr: Sans objet
          es: No aplicable
        description:
          en: The question does not apply to the respondent's situation (for example, no consultation took place, so consultation-reflection cannot be assessed).
          fr: La question ne s'applique pas à la situation du répondant (par exemple, aucune consultation n'a eu lieu, donc la réflexion sur la consultation ne peut être évaluée).
          es: La pregunta no se aplica a la situación del encuestado (por ejemplo, no hubo consulta, por lo que el reflejo de la consulta no puede evaluarse).
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
