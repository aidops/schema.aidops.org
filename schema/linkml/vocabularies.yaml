  CropLossBand:
    title:
      en: Crop Loss Band (proportion of expected harvest)
      fr: Tranche de perte de cultures (proportion de la récolte attendue)
      es: Banda de pérdida de cultivos (proporción de la cosecha esperada)
    description:
      en: Estimated proportion of expected harvest lost to a shock during the last completed agricultural season, expressed as a coarse band. Respondent-reported self-estimate; objective crop-loss measurement requires enumerator-administered FAO IPLS (Integrated Post-Harvest Loss Survey) methodology which is out of scope for rapid household assessment. The bands are aligned to those used by FAO crop-loss surveys and LSMS-ISA post-harvest modules.
      fr: Proportion estimée de la récolte attendue perdue à cause d'un choc pendant la dernière saison agricole complète, exprimée sous forme de tranche grossière. Auto-estimation déclarée par le répondant ; la mesure objective de la perte de cultures nécessite la méthodologie IPLS (Enquête intégrée sur les pertes post-récolte) de la FAO administrée par un enquêteur, qui sort du cadre de l'évaluation rapide du ménage. Les tranches sont alignées avec celles utilisées par les enquêtes FAO sur les pertes de cultures et les modules post-récolte du LSMS-ISA.
      es: Proporción estimada de la cosecha esperada perdida por un choque durante la última temporada agrícola completa, expresada como una banda gruesa. Autoestimación reportada por el encuestado; la medición objetiva de pérdida de cultivos requiere la metodología IPLS (Encuesta Integrada de Pérdidas Poscosecha) de la FAO administrada por encuestador, que está fuera del alcance de la evaluación rápida del hogar. Las bandas están alineadas con las utilizadas por las encuestas FAO de pérdidas de cultivos y los módulos poscosecha del LSMS-ISA.
    enum_uri: aidops:CropLossBand
    permissible_values:
      less_than_25pct:
        title:
          en: Less than 25% of expected harvest
          fr: Moins de 25 % de la récolte prévue
          es: Menos del 25 % de la cosecha esperada
        description:
          en: Minor loss; most of the expected harvest was still obtained.
          fr: Perte mineure ; la majeure partie de la récolte attendue a tout de même été obtenue.
          es: Pérdida menor; la mayor parte de la cosecha esperada se obtuvo igualmente.
      pct_25_to_50:
        title:
          en: 25–50% of expected harvest
          fr: 25–50 % de la récolte prévue
          es: 25–50 % de la cosecha esperada
        description:
          en: Moderate loss; approximately a quarter to half of expected production was lost.
          fr: Perte modérée ; environ un quart à la moitié de la production attendue a été perdue.
          es: Pérdida moderada; aproximadamente un cuarto a la mitad de la producción esperada se perdió.
      pct_50_to_75:
        title:
          en: 50–75% of expected harvest
          fr: 50–75 % de la récolte prévue
          es: 50–75 % de la cosecha esperada
        description:
          en: Severe loss; more than half but less than three quarters of expected production was lost.
          fr: Perte sévère ; plus de la moitié mais moins des trois quarts de la production attendue a été perdue.
          es: Pérdida severa; más de la mitad pero menos de tres cuartos de la producción esperada se perdió.
      more_than_75pct:
        title:
          en: More than 75% of expected harvest
          fr: Plus de 75 % de la récolte prévue
          es: Más del 75 % de la cosecha esperada
        description:
          en: Very severe loss; most of the expected harvest was lost but some production was obtained.
          fr: Perte très sévère ; la majeure partie de la récolte attendue a été perdue mais une partie de la production a été obtenue.
          es: Pérdida muy severa; la mayor parte de la cosecha esperada se perdió pero se obtuvo algo de producción.
      total_loss:
        title:
          en: Total loss (nothing harvested)
          fr: Perte totale (aucune récolte)
          es: Pérdida total (sin cosecha)
        description:
          en: No harvest obtained; complete crop failure.
          fr: Aucune récolte obtenue ; échec cultural complet.
          es: No se obtuvo cosecha; fracaso total del cultivo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot estimate the magnitude of crop loss. Retained as a distinct valid response.
          fr: Le répondant ne peut pas estimer l'ampleur de la perte de cultures. Conservée comme réponse valide distincte.
          es: El encuestado no puede estimar la magnitud de la pérdida de cultivos. Se mantiene como respuesta válida distinta.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-phl-guidelines"], "definition": {"en": "Estimated proportion of expected harvest lost to a shock during the last completed agricultural season, expressed as a coarse band. Respondent-reported self-estimate; objective crop-loss measurement requires enumerator-administered FAO IPLS (Integrated Post-Harvest Loss Survey) methodology which is out of scope for rapid household assessment. The bands are aligned to those used by FAO crop-loss surveys and LSMS-ISA post-harvest modules.", "es": "Proporci\u00f3n estimada de la cosecha esperada perdida por un choque durante la \u00faltima temporada agr\u00edcola completa, expresada como una banda gruesa. Autoestimaci\u00f3n reportada por el encuestado; la medici\u00f3n objetiva de p\u00e9rdida de cultivos requiere la metodolog\u00eda IPLS (Encuesta Integrada de P\u00e9rdidas Poscosecha) de la FAO administrada por encuestador, que est\u00e1 fuera del alcance de la evaluaci\u00f3n r\u00e1pida del hogar. Las bandas est\u00e1n alineadas con las utilizadas por las encuestas FAO de p\u00e9rdidas de cultivos y los m\u00f3dulos poscosecha del LSMS-ISA.", "fr": "Proportion estim\u00e9e de la r\u00e9colte attendue perdue \u00e0 cause d''un choc pendant la derni\u00e8re saison agricole compl\u00e8te, exprim\u00e9e sous forme de tranche grossi\u00e8re. Auto-estimation d\u00e9clar\u00e9e par le r\u00e9pondant ; la mesure objective de la perte de cultures n\u00e9cessite la m\u00e9thodologie IPLS (Enqu\u00eate int\u00e9gr\u00e9e sur les pertes post-r\u00e9colte) de la FAO administr\u00e9e par un enqu\u00eateur, qui sort du cadre de l''\u00e9valuation rapide du m\u00e9nage. Les tranches sont align\u00e9es avec celles utilis\u00e9es par les enqu\u00eates FAO sur les pertes de cultures et les modules post-r\u00e9colte du LSMS-ISA."}, "id": "crop-loss-band", "label": {"en": "Crop Loss Band (proportion of expected harvest)", "es": "Banda de p\u00e9rdida de cultivos (proporci\u00f3n de la cosecha esperada)", "fr": "Tranche de perte de cultures (proportion de la r\u00e9colte attendue)"}, "maturity": "draft", "standard": {"name": "FAO crop loss survey methodology", "notes": "Band endpoints (25%, 50%, 75%, total loss) follow FAO crop loss survey reporting conventions and are cognitively tractable for respondents under recall.", "uri": "https://www.fao.org/economic/ess/ess-methods/ess-harvest-and-post-harvest/en/"}, "values": [{"code": "less_than_25pct", "definition": {"en": "Minor loss; most of the expected harvest was still obtained.", "es": "P\u00e9rdida menor; la mayor parte de la cosecha esperada se obtuvo igualmente.", "fr": "Perte mineure ; la majeure partie de la r\u00e9colte attendue a tout de m\u00eame \u00e9t\u00e9 obtenue."}, "label": {"en": "Less than 25% of expected harvest", "es": "Menos del 25 % de la cosecha esperada", "fr": "Moins de 25 % de la r\u00e9colte pr\u00e9vue"}}, {"code": "pct_25_to_50", "definition": {"en": "Moderate loss; approximately a quarter to half of expected production was lost.", "es": "P\u00e9rdida moderada; aproximadamente un cuarto a la mitad de la producci\u00f3n esperada se perdi\u00f3.", "fr": "Perte mod\u00e9r\u00e9e ; environ un quart \u00e0 la moiti\u00e9 de la production attendue a \u00e9t\u00e9 perdue."}, "label": {"en": "25\u201350% of expected harvest", "es": "25\u201350 % de la cosecha esperada", "fr": "25\u201350 % de la r\u00e9colte pr\u00e9vue"}}, {"code": "pct_50_to_75", "definition": {"en": "Severe loss; more than half but less than three quarters of expected production was lost.", "es": "P\u00e9rdida severa; m\u00e1s de la mitad pero menos de tres cuartos de la producci\u00f3n esperada se perdi\u00f3.", "fr": "Perte s\u00e9v\u00e8re ; plus de la moiti\u00e9 mais moins des trois quarts de la production attendue a \u00e9t\u00e9 perdue."}, "label": {"en": "50\u201375% of expected harvest", "es": "50\u201375 % de la cosecha esperada", "fr": "50\u201375 % de la r\u00e9colte pr\u00e9vue"}}, {"code": "more_than_75pct", "definition": {"en": "Very severe loss; most of the expected harvest was lost but some production was obtained.", "es": "P\u00e9rdida muy severa; la mayor parte de la cosecha esperada se perdi\u00f3 pero se obtuvo algo de producci\u00f3n.", "fr": "Perte tr\u00e8s s\u00e9v\u00e8re ; la majeure partie de la r\u00e9colte attendue a \u00e9t\u00e9 perdue mais une partie de la production a \u00e9t\u00e9 obtenue."}, "label": {"en": "More than 75% of expected harvest", "es": "M\u00e1s del 75 % de la cosecha esperada", "fr": "Plus de 75 % de la r\u00e9colte pr\u00e9vue"}}, {"code": "total_loss", "definition": {"en": "No harvest obtained; complete crop failure.", "es": "No se obtuvo cosecha; fracaso total del cultivo.", "fr": "Aucune r\u00e9colte obtenue ; \u00e9chec cultural complet."}, "label": {"en": "Total loss (nothing harvested)", "es": "P\u00e9rdida total (sin cosecha)", "fr": "Perte totale (aucune r\u00e9colte)"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot estimate the magnitude of crop loss. Retained as a distinct valid response.", "es": "El encuestado no puede estimar la magnitud de la p\u00e9rdida de cultivos. Se mantiene como respuesta v\u00e1lida distinta.", "fr": "Le r\u00e9pondant ne peut pas estimer l''ampleur de la perte de cultures. Conserv\u00e9e comme r\u00e9ponse valide distincte."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
