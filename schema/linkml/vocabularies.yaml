rs ou des universit\u00e9s (par exemple, essais de d\u00e9monstration, recherche \u00e0 la ferme)."}, "label": {"en": "Research institution or university", "es": "Instituci\u00f3n de investigaci\u00f3n o universidad", "fr": "Institution de recherche ou universit\u00e9"}}, {"code": "other", "definition": {"en": "Extension provider not covered by the other categories.", "es": "Proveedor de extensi\u00f3n no cubierto por las otras categor\u00edas.", "fr": "Prestataire de vulgarisation non couvert par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
  FacilityElectricitySource:
    title:
      en: Facility Electricity Source
      fr: Source d'électricité de l'établissement
      es: Fuente de electricidad del establecimiento
    description:
      en: The main source of electricity powering a health facility. Unlike the household-level electricity-source vocabulary (which carries MTF-tier semantics for access), the facility-level source distinguishes grid, fuel generator, solar, hybrid, battery-only, and none, matching the WASH FIT Energy-and-Environment indicator set and the HHFA infrastructure module. Primary source is recorded; secondary/backup source arrangements are captured separately when needed.
      fr: La source principale d'électricité alimentant un établissement de santé. Contrairement au vocabulaire electricity-source au niveau du ménage (qui porte la sémantique de niveau MTF pour l'accès), la source au niveau de l'établissement distingue le réseau, le groupe électrogène à combustible, le solaire, l'hybride, la batterie uniquement et aucun, correspondant à l'ensemble d'indicateurs Énergie et environnement de WASH FIT et au module d'infrastructure HHFA. La source primaire est enregistrée ; les dispositifs secondaires ou de secours sont capturés séparément au besoin.
      es: La fuente principal de electricidad que alimenta un establecimiento de salud. A diferencia del vocabulario electricity-source a nivel del hogar (que lleva semántica de Nivel MTF para acceso), la fuente a nivel de establecimiento distingue red, generador a combustible, solar, híbrido, solo batería y ninguno, correspondiendo al conjunto de indicadores Energía y Ambiente de WASH FIT y al módulo de infraestructura HHFA. Se registra la fuente primaria; los arreglos secundarios o de respaldo se capturan por separado cuando es necesario.
    enum_uri: aidops:FacilityElectricitySource
    permissible_values:
      national_grid:
        title:
          en: National grid (utility)
          fr: Réseau national (service public)
          es: Red nacional (servicio público)
        description:
          en: Facility is connected to the national utility grid as its primary source of electricity.
          fr: L'établissement est raccordé au réseau national de service public comme source principale d'électricité.
          es: El establecimiento está conectado a la red nacional del servicio público como fuente principal de electricidad.
      generator_fuel:
        title:
          en: Fuel generator (diesel or petrol)
          fr: Groupe électrogène à combustible (diesel ou essence)
          es: Generador a combustible (diésel o gasolina)
        description:
          en: Facility is primarily powered by a diesel or petrol generator.
          fr: L'établissement est principalement alimenté par un groupe électrogène diesel ou à essence.
          es: El establecimiento se alimenta principalmente mediante un generador diésel o de gasolina.
      solar:
        title:
          en: Solar (photovoltaic system)
          fr: Solaire (système photovoltaïque)
          es: Solar (sistema fotovoltaico)
        description:
          en: Facility is primarily powered by a solar photovoltaic system with battery storage.
          fr: L'établissement est principalement alimenté par un système solaire photovoltaïque avec stockage par batterie.
          es: El establecimiento se alimenta principalmente por un sistema solar fotovoltaico con almacenamiento en batería.
      hybrid_grid_and_backup:
        title:
          en: Hybrid - grid with generator or solar backup
          fr: Hybride - réseau avec groupe électrogène ou solaire de secours
          es: Híbrido - red con generador o solar de respaldo
        description:
          en: Facility uses the national grid as its primary source with a generator or solar backup used during grid outages.
          fr: L'établissement utilise le réseau national comme source principale avec un groupe électrogène ou un système solaire de secours pendant les coupures.
          es: El establecimiento utiliza la red nacional como fuente principal con un generador o sistema solar de respaldo durante los cortes.
      battery_only:
        title:
          en: Battery only (charged off-site)
          fr: Batterie uniquement (chargée hors site)
          es: Solo batería (cargada fuera del sitio)
        description:
          en: Facility relies on batteries charged off-site as its only source of electricity, with no on-site grid, generator, or solar system.
          fr: L'établissement dépend de batteries chargées hors site comme seule source d'électricité, sans réseau, groupe électrogène ou système solaire sur site.
          es: El establecimiento depende de baterías cargadas fuera del sitio como única fuente de electricidad, sin red, generador o sistema solar en el sitio.
      none:
        title:
          en: No electricity
          fr: Pas d'électricité
          es: Sin electricidad
        description:
          en: The facility has no source of electricity of any kind.
          fr: L'établissement n'a aucune source d'électricité d'aucune sorte.
          es: El establecimiento no tiene ninguna fuente de electricidad.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022", "who-unicef-wash-fit-2022"], "definition": {"en": "The main source of electricity powering a health facility. Unlike the household-level electricity-source vocabulary (which carries MTF-tier semantics for access), the facility-level source distinguishes grid, fuel generator, solar, hybrid, battery-only, and none, matching the WASH FIT Energy-and-Environment indicator set and the HHFA infrastructure module. Primary source is recorded; secondary/backup source arrangements are captured separately when needed.\n", "es": "La fuente principal de electricidad que alimenta un establecimiento de salud. A diferencia del vocabulario electricity-source a nivel del hogar (que lleva sem\u00e1ntica de Nivel MTF para acceso), la fuente a nivel de establecimiento distingue red, generador a combustible, solar, h\u00edbrido, solo bater\u00eda y ninguno, correspondiendo al conjunto de indicadores Energ\u00eda y Ambiente de WASH FIT y al m\u00f3dulo de infraestructura HHFA. Se registra la fuente primaria; los arreglos secundarios o de respaldo se capturan por separado cuando es necesario.\n", "fr": "La source principale d''\u00e9lectricit\u00e9 alimentant un \u00e9tablissement de sant\u00e9. Contrairement au vocabulaire electricity-source au niveau du m\u00e9nage (qui porte la s\u00e9mantique de niveau MTF pour l''acc\u00e8s), la source au niveau de l''\u00e9tablissement distingue le r\u00e9seau, le groupe \u00e9lectrog\u00e8ne \u00e0 combustible, le solaire, l''hybride, la batterie uniquement et aucun, correspondant \u00e0 l''ensemble d''indicateurs \u00c9nergie et environnement de WASH FIT et au module d''infrastructure HHFA. La source primaire est enregistr\u00e9e ; les dispositifs secondaires ou de secours sont captur\u00e9s s\u00e9par\u00e9ment au besoin.\n"}, "id": "facility-electricity-source", "label": {"en": "Facility Electricity Source", "es": "Fuente de electricidad del establecimiento", "fr": "Source d''\u00e9lectricit\u00e9 de l''\u00e9tablissement"}, "maturity": "draft", "standard": {"name": "Water and Sanitation for Health Facility Improvement Tool (WASH FIT) 2nd edition", "notes": "WASH FIT 2nd ed. Energy-and-Environment indicators distinguish grid, generator, and solar sources for health facilities. The HHFA infrastructure module records the same categories.", "uri": "https://www.who.int/publications/i/item/9789240043237"}, "values": [{"code": "national_grid", "definition": {"en": "Facility is connected to the national utility grid as its primary source of electricity.", "es": "El establecimiento est\u00e1 conectado a la red nacional del servicio p\u00fablico como fuente principal de electricidad.", "fr": "L''\u00e9tablissement est raccord\u00e9 au r\u00e9seau national de service public comme source principale d''\u00e9lectricit\u00e9."}, "label": {"en": "National grid (utility)", "es": "Red nacional (servicio p\u00fablico)", "fr": "R\u00e9seau national (service public)"}}, {"code": "generator_fuel", "definition": {"en": "Facility is primarily powered by a diesel or petrol generator.", "es": "El establecimiento se alimenta principalmente mediante un generador di\u00e9sel o de gasolina.", "fr": "L''\u00e9tablissement est principalement aliment\u00e9 par un groupe \u00e9lectrog\u00e8ne diesel ou \u00e0 essence."}, "label": {"en": "Fuel generator (diesel or petrol)", "es": "Generador a combustible (di\u00e9sel o gasolina)", "fr": "Groupe \u00e9lectrog\u00e8ne \u00e0 combustible (diesel ou essence)"}}, {"code": "solar", "definition": {"en": "Facility is primarily powered by a solar photovoltaic system with battery storage.", "es": "El establecimiento se alimenta principalmente por un sistema solar fotovoltaico con almacenamiento en bater\u00eda.", "fr": "L''\u00e9tablissement est principalement aliment\u00e9 par un syst\u00e8me solaire photovolta\u00efque avec stockage par batterie."}, "label": {"en": "Solar (photovoltaic system)", "es": "Solar (sistema fotovoltaico)", "fr": "Solaire (syst\u00e8me photovolta\u00efque)"}}, {"code": "hybrid_grid_and_backup", "definition": {"en": "Facility uses the national grid as its primary source with a generator or solar backup used during grid outages.", "es": "El establecimiento utiliza la red nacional como fuente principal con un generador o sistema solar de respaldo durante los cortes.", "fr": "L''\u00e9tablissement utilise le r\u00e9seau national comme source principale avec un groupe \u00e9lectrog\u00e8ne ou un syst\u00e8me solaire de secours pendant les coupures."}, "label": {"en": "Hybrid - grid with generator or solar backup", "es": "H\u00edbrido - red con generador o solar de respaldo", "fr": "Hybride - r\u00e9seau avec groupe \u00e9lectrog\u00e8ne ou solaire de secours"}}, {"code": "battery_only", "definition": {"en": "Facility relies on batteries charged off-site as its only source of electricity, with no on-site grid, generator, or solar system.", "es": "El establecimiento depende de bater\u00edas cargadas fuera del sitio como \u00fanica fuente de electricidad, sin red, generador o sistema solar en el sitio.", "fr": "L''\u00e9tablissement d\u00e9pend de batteries charg\u00e9es hors site comme seule source d''\u00e9lectricit\u00e9, sans r\u00e9seau, groupe \u00e9lectrog\u00e8ne ou syst\u00e8me solaire sur site."}, "label": {"en": "Battery only (charged off-site)", "es": "Solo bater\u00eda (cargada fuera del sitio)", "fr": "Batterie uniquement (charg\u00e9e hors site)"}}, {"code": "none", "definition": {"en": "The facility has no source of electricity of any kind.", "es": "El establecimiento no tiene ninguna fuente de electricidad.", "fr": "L''\u00e9tablissement n''a aucune source d''\u00e9lectricit\u00e9 d''aucune sorte."}, "label": {"en": "No electricity", "es": "Sin electricidad", "fr": "Pas d''\u00e9lectricit\u00e9"}}]}'
      bibliography_refs: who-hhfa-2022,who-unicef-wash-fit-2022
  FacilityFunctionalityStatus:
    title:
      en: Facility Functionality Status
      fr: Statut de fonctionnalité de l'établissement
      es: Estado de funcionalidad del establecimiento
    description:
      en: 'The overall operational state of a health facility in a crisis or humanitarian context, using the WHO HeRAMS functionality framework: fully functioning (delivering the full expected range of services at normal capacity), partially functioning (delivering a reduced range or reduced capacity), not functioning (closed to service delivery but the structure remains), destroyed (the facility building is physically destroyed), or inaccessible (standing and possibly operational but cannot be reached due to security, access, or other barriers). Distinct from facility-operational-status (the general status vocabulary in PublicSchema) in that HeRAMS functionality is the crisis-specific summary used by the Global Health Cluster in active humanitarian responses.'
      fr: 'L''état opérationnel global d''un établissement de santé en contexte de crise ou humanitaire, selon le cadre de fonctionnalité HeRAMS de l''OMS : pleinement fonctionnel (fournit la gamme complète de services attendus à capacité normale), partiellement fonctionnel (fournit une gamme ou une capacité réduite), non fonctionnel (fermé à la prestation de services mais la structure existe encore), détruit (le bâtiment est physiquement détruit) ou inaccessible (debout et éventuellement opérationnel mais ne peut être atteint pour des raisons de sécurité, d''accès ou autres). Distinct de facility-operational-status (le vocabulaire de statut général dans PublicSchema) en ce sens que la fonctionnalité HeRAMS est le résumé spécifique aux crises utilisé par le Cluster mondial de la santé dans les réponses humanitaires actives.'
      es: 'El estado operativo general de un establecimiento de salud en contexto de crisis o humanitario, según el marco de funcionalidad HeRAMS de la OMS: plenamente funcional (presta la gama completa de servicios esperados a capacidad normal), parcialmente funcional (presta una gama o capacidad reducida), no funcional (cerrado a la prestación de servicios pero la estructura permanece), destruido (el edificio está físicamente destruido) o inaccesible (en pie y posiblemente operativo pero no se puede acceder por razones de seguridad, acceso u otras). Distinto de facility-operational-status (el vocabulario de estado general en PublicSchema) en que la funcionalidad HeRAMS es el resumen específico de crisis utilizado por el Clúster Global de Salud en respuestas humanitarias activas.'
    enum_uri: aidops:FacilityFunctionalityStatus
    permissible_values:
      fully_functioning:
        title:
          en: Fully functioning
          fr: Pleinement fonctionnel
          es: Plenamente funcional
        description:
          en: The facility delivers the full expected range of services at normal capacity.
          fr: L'établissement fournit la gamme complète de services attendus à capacité normale.
          es: El establecimiento presta la gama completa de servicios esperados a capacidad normal.
      partially_functioning:
        title:
          en: Partially functioning
          fr: Partiellement fonctionnel
          es: Parcialmente funcional
        description:
          en: The facility is open and delivering services but with a reduced range, reduced capacity, or limited hours relative to normal operation.
          fr: L'établissement est ouvert et fournit des services mais avec une gamme ou une capacité réduite ou des horaires limités par rapport au fonctionnement normal.
          es: El establecimiento está abierto y presta servicios pero con una gama, capacidad u horarios reducidos respecto al funcionamiento normal.
      not_functioning:
        title:
          en: Not functioning
          fr: Non fonctionnel
          es: No funcional
        description:
          en: The facility is closed to service delivery but the building still stands and could potentially be reopened.
          fr: L'établissement est fermé à la prestation de services mais le bâtiment existe encore et pourrait potentiellement être rouvert.
          es: El establecimiento está cerrado a la prestación de servicios pero el edificio aún existe y podría potencialmente reabrirse.
      destroyed:
        title:
          en: Destroyed
          fr: Détruit
          es: Destruido
        description:
          en: The facility building is physically destroyed or damaged beyond usable condition.
          fr: Le bâtiment de l'établissement est physiquement détruit ou endommagé au-delà de toute utilisation.
          es: El edificio del establecimiento está físicamente destruido o dañado más allá de una condición utilizable.
      inaccessible:
        title:
          en: Inaccessible
          fr: Inaccessible
          es: Inaccesible
        description:
          en: The facility is standing and possibly operational but cannot currently be reached due to security, access, or other barriers.
          fr: L'établissement est debout et éventuellement opérationnel mais ne peut actuellement être atteint en raison de barrières de sécurité, d'accès ou autres.
          es: El establecimiento está en pie y posiblemente operativo pero no se puede alcanzar actualmente por barreras de seguridad, acceso u otras.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-hhfa-2022"], "definition": {"en": "The overall operational state of a health facility in a crisis or humanitarian context, using the WHO HeRAMS functionality framework: fully functioning (delivering the full expected range of services at normal capacity), partially functioning (delivering a reduced range or reduced capacity), not functioning (closed to service delivery but the structure remains), destroyed (the facility building is physically destroyed), or inaccessible (standing and possibly operational but cannot be reached due to security, access, or other barriers). Distinct from facility-operational-status (the general status vocabulary in PublicSchema) in that HeRAMS functionality is the crisis-specific summary used by the Global Health Cluster in active humanitarian responses.\n", "es": "El estado operativo general de un establecimiento de salud en contexto de crisis o humanitario, seg\u00fan el marco de funcionalidad HeRAMS de la OMS: plenamente funcional (presta la gama completa de servicios esperados a capacidad normal), parcialmente funcional (presta una gama o capacidad reducida), no funcional (cerrado a la prestaci\u00f3n de servicios pero la estructura permanece), destruido (el edificio est\u00e1 f\u00edsicamente destruido) o inaccesible (en pie y posiblemente operativo pero no se puede acceder por razones de seguridad, acceso u otras). Distinto de facility-operational-status (el vocabulario de estado general en PublicSchema) en que la funcionalidad HeRAMS es el resumen espec\u00edfico de crisis utilizado por el Cl\u00faster Global de Salud en respuestas humanitarias activas.\n", "fr": "L''\u00e9tat op\u00e9rationnel global d''un \u00e9tablissement de sant\u00e9 en contexte de crise ou humanitaire, selon le cadre de fonctionnalit\u00e9 HeRAMS de l''OMS : pleinement fonctionnel (fournit la gamme compl\u00e8te de services attendus \u00e0 capacit\u00e9 normale), partiellement fonctionnel (fournit une gamme ou une capacit\u00e9 r\u00e9duite), non fonctionnel (ferm\u00e9 \u00e0 la prestation de services mais la structure existe encore), d\u00e9truit (le b\u00e2timent est physiquement d\u00e9truit) ou inaccessible (debout et \u00e9ventuellement op\u00e9rationnel mais ne peut \u00eatre atteint pour des raisons de s\u00e9curit\u00e9, d''acc\u00e8s ou autres). Distinct de facility-operational-status (le vocabulaire de statut g\u00e9n\u00e9ral dans PublicSchema) en ce sens que la fonctionnalit\u00e9 HeRAMS est le r\u00e9sum\u00e9 sp\u00e9cifique aux crises utilis\u00e9 par le Cluster mondial de la sant\u00e9 dans les r\u00e9ponses humanitaires actives.\n"}, "id": "facility-functionality-status", "label": {"en": "Facility Functionality Status", "es": "Estado de funcionalidad del establecimiento", "fr": "Statut de fonctionnalit\u00e9 de l''\u00e9tablissement"}, "maturity": "draft", "standard": {"name": "WHO Health Resources and Services Availability Monitoring System (HeRAMS)", "notes": "HeRAMS functionality-status classification is the canonical crisis-context summary used by WHO and the Global Health Cluster in Syria, Yemen, Iraq, Nigeria, Ukraine, and Nepal. HeRAMS typically reports monthly for hospitals and quarterly for health centres.", "uri": "https://www.who.int/initiatives/herams"}, "values": [{"code": "fully_functioning", "definition": {"en": "The facility delivers the full expected range of services at normal capacity.", "es": "El establecimiento presta la gama completa de servicios esperados a capacidad normal.", "fr": "L''\u00e9tablissement fournit la gamme compl\u00e8te de services attendus \u00e0 capacit\u00e9 normale."}, "label": {"en": "Fully functioning", "es": "Plenamente funcional", "fr": "Pleinement fonctionnel"}}, {"code": "partially_functioning", "definition": {"en": "The facility is open and delivering services but with a reduced range, reduced capacity, or limited hours relative to normal operation.", "es": "El establecimiento est\u00e1 abierto y presta servicios pero con una gama, capacidad u horarios reducidos respecto al funcionamiento normal.", "fr": "L''\u00e9tablissement est ouvert et fournit des services mais avec une gamme ou une capacit\u00e9 r\u00e9duite ou des horaires limit\u00e9s par rapport au fonctionnement normal."}, "label": {"en": "Partially functioning", "es": "Parcialmente funcional", "fr": "Partiellement fonctionnel"}}, {"code": "not_functioning", "definition": {"en": "The facility is closed to service delivery but the building still stands and could potentially be reopened.", "es": "El establecimiento est\u00e1 cerrado a la prestaci\u00f3n de servicios pero el edificio a\u00fan existe y podr\u00eda potencialmente reabrirse.", "fr": "L''\u00e9tablissement est ferm\u00e9 \u00e0 la prestation de services mais le b\u00e2timent existe encore et pourrait potentiellement \u00eatre rouvert."}, "label": {"en": "Not functioning", "es": "No funcional", "fr": "Non fonctionnel"}}, {"code": "destroyed", "definition": {"en": "The facility building is physically destroyed or damaged beyond usable condition.", "es": "El edificio del establecimiento est\u00e1 f\u00edsicamente destruido o da\u00f1ado m\u00e1s all\u00e1 de una condici\u00f3n utilizable.", "fr": "Le b\u00e2timent de l''\u00e9tablissement est physiquement d\u00e9truit ou endommag\u00e9 au-del\u00e0 de toute utilisation."}, "label": {"en": "Destroyed", "es": "Destruido", "fr": "D\u00e9truit"}}, {"code": "inaccessible", "definition": {"en": "The facility is standing and possibly operational but cannot currently be reached due to security, access, or other barriers.", "es": "El establecimiento est\u00e1 en pie y posiblemente operativo pero no se puede alcanzar actualmente por barreras de seguridad, acceso u otras.", "fr": "L''\u00e9tablissement est debout et \u00e9ventuellement op\u00e9rationnel mais ne peut actuellement \u00eatre atteint en raison de barri\u00e8res de s\u00e9curit\u00e9, d''acc\u00e8s ou autres."}, "label": {"en": "Inaccessible", "es": "Inaccesible", "fr": "Inaccessible"}}]}'
