  ExtensionProviderType:
    title:
      en: Extension Provider Type
      fr: Type de prestataire de vulgarisation
      es: Tipo de proveedor de extensión
    description:
      en: Type of organisation or individual providing agricultural extension or advisory services to the household. Multi-select because a household may receive advice from more than one channel in the same reference period. Drawn from the LSMS-ISA extension module and FAO WCA 2020 Theme 06 (agricultural services). The distinction between public (government), private (input dealers), NGO, cooperative, peer-farmer, and research sources is essential for programme-level analysis of extension coverage and pluralism.
      fr: Type d'organisation ou d'individu fournissant des services de vulgarisation agricole ou de conseil au ménage. Sélection multiple car un ménage peut recevoir des conseils de plus d'un canal au cours de la même période de référence. Tiré du module de vulgarisation du LSMS-ISA et du Thème 06 du WCA 2020 de la FAO (services agricoles). La distinction entre sources publiques (gouvernement), privées (revendeurs d'intrants), ONG, coopératives, agriculteurs pairs et recherche est essentielle pour l'analyse au niveau du programme de la couverture et du pluralisme de la vulgarisation.
      es: Tipo de organización o individuo que proporciona servicios de extensión agrícola o asesoramiento al hogar. Selección múltiple porque un hogar puede recibir asesoramiento de más de un canal en el mismo período de referencia. Tomado del módulo de extensión del LSMS-ISA y del Tema 06 del WCA 2020 de la FAO (servicios agrícolas). La distinción entre fuentes públicas (gobierno), privadas (distribuidores de insumos), ONG, cooperativas, agricultores pares e investigación es esencial para el análisis a nivel de programa de la cobertura y pluralismo de la extensión.
    enum_uri: aidops:ExtensionProviderType
    permissible_values:
      government_ministry:
        title:
          en: Government extension service (Ministry of Agriculture or equivalent)
          fr: Service de vulgarisation gouvernemental (Ministère de l'Agriculture ou équivalent)
          es: Servicio de extensión del gobierno (Ministerio de Agricultura o equivalente)
        description:
          en: Extension provided by a national or sub-national government agricultural service.
          fr: Vulgarisation fournie par un service agricole gouvernemental national ou infranational.
          es: Extensión proporcionada por un servicio agrícola gubernamental nacional o subnacional.
      ngo_ingo:
        title:
          en: NGO or international organisation
          fr: ONG ou organisation internationale
          es: ONG u organización internacional
        description:
          en: Extension provided by a non-governmental or international humanitarian or development organisation.
          fr: Vulgarisation fournie par une organisation non gouvernementale ou internationale humanitaire ou de développement.
          es: Extensión proporcionada por una organización no gubernamental o internacional humanitaria o de desarrollo.
      input_dealer_private:
        title:
          en: Private input dealer or agribusiness
          fr: Revendeur d'intrants privé ou agro-entreprise
          es: Distribuidor privado de insumos o agroindustria
        description:
          en: Advice provided by a private input supplier (seeds, fertilizers, agro-chemicals) or agribusiness firm.
          fr: Conseils fournis par un fournisseur privé d'intrants (semences, engrais, produits agro-chimiques) ou une agro-entreprise.
          es: Asesoramiento proporcionado por un proveedor privado de insumos (semillas, fertilizantes, productos agroquímicos) o una empresa agroindustrial.
      farmer_cooperative:
        title:
          en: Farmer cooperative or producer organisation
          fr: Coopérative agricole ou organisation de producteurs
          es: Cooperativa agrícola u organización de productores
        description:
          en: Extension facilitated through a member-based farmer organisation or producer cooperative.
          fr: Vulgarisation facilitée par une organisation d'agriculteurs basée sur l'adhésion ou une coopérative de producteurs.
          es: Extensión facilitada a través de una organización de agricultores basada en la membresía o una cooperativa de productores.
      peer_farmer_lead:
        title:
          en: Lead farmer or farmer-to-farmer training
          fr: Agriculteur référent ou formation entre agriculteurs
          es: Agricultor líder o capacitación entre agricultores
        description:
          en: Extension through a trained lead-farmer model or peer-to-peer learning approach.
          fr: Vulgarisation par le biais d'un modèle d'agriculteur référent formé ou d'une approche d'apprentissage entre pairs.
          es: Extensión a través de un modelo de agricultor líder capacitado o un enfoque de aprendizaje entre pares.
      research_institution:
        title:
          en: Research institution or university
          fr: Institution de recherche ou université
          es: Institución de investigación o universidad
        description:
          en: Extension provided directly by researchers or universities (e.g., demonstration trials, on-farm research).
          fr: Vulgarisation fournie directement par des chercheurs ou des universités (par exemple, essais de démonstration, recherche à la ferme).
          es: Extensión proporcionada directamente por investigadores o universidades (por ejemplo, ensayos de demostración, investigación en finca).
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Extension provider not covered by the other categories.
          fr: Prestataire de vulgarisation non couvert par les autres catégories.
          es: Proveedor de extensión no cubierto por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Type of organisation or individual providing agricultural extension or advisory services to the household. Multi-select because a household may receive advice from more than one channel in the same reference period. Drawn from the LSMS-ISA extension module and FAO WCA 2020 Theme 06 (agricultural services). The distinction between public (government), private (input dealers), NGO, cooperative, peer-farmer, and research sources is essential for programme-level analysis of extension coverage and pluralism.", "es": "Tipo de organizaci\u00f3n o individuo que proporciona servicios de extensi\u00f3n agr\u00edcola o asesoramiento al hogar. Selecci\u00f3n m\u00faltiple porque un hogar puede recibir asesoramiento de m\u00e1s de un canal en el mismo per\u00edodo de referencia. Tomado del m\u00f3dulo de extensi\u00f3n del LSMS-ISA y del Tema 06 del WCA 2020 de la FAO (servicios agr\u00edcolas). La distinci\u00f3n entre fuentes p\u00fablicas (gobierno), privadas (distribuidores de insumos), ONG, cooperativas, agricultores pares e investigaci\u00f3n es esencial para el an\u00e1lisis a nivel de programa de la cobertura y pluralismo de la extensi\u00f3n.", "fr": "Type d''organisation ou d''individu fournissant des services de vulgarisation agricole ou de conseil au m\u00e9nage. S\u00e9lection multiple car un m\u00e9nage peut recevoir des conseils de plus d''un canal au cours de la m\u00eame p\u00e9riode de r\u00e9f\u00e9rence. Tir\u00e9 du module de vulgarisation du LSMS-ISA et du Th\u00e8me 06 du WCA 2020 de la FAO (services agricoles). La distinction entre sources publiques (gouvernement), priv\u00e9es (revendeurs d''intrants), ONG, coop\u00e9ratives, agriculteurs pairs et recherche est essentielle pour l''analyse au niveau du programme de la couverture et du pluralisme de la vulgarisation."}, "id": "extension-provider-type", "label": {"en": "Extension Provider Type", "es": "Tipo de proveedor de extensi\u00f3n", "f