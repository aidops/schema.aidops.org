  HandwashingFacilityType:
    title:
      en: Handwashing Facility Type
      fr: Type de dispositif de lavage des mains
      es: Tipo de instalación para lavado de manos
    description:
      en: Type of handwashing facility present in the household. Both fixed and mobile facilities are valid for JMP basic hygiene service classification. A tippy-tap, designated bucket with tap, or jug set aside for handwashing qualifies as a handwashing facility.
      fr: Type de dispositif de lavage des mains présent dans le ménage. Les installations fixes et mobiles sont toutes deux valides pour la classification du service d'hygiène de base JMP. Un tippy-tap, un seau désigné avec robinet, ou une cruche mise de côté pour le lavage des mains est considéré comme un dispositif de lavage des mains.
      es: Tipo de instalación para lavado de manos presente en el hogar. Tanto las instalaciones fijas como las móviles son válidas para la clasificación del servicio de higiene básico del JMP. Un tippy-tap, un cubo designado con grifo, o una jarra reservada para lavado de manos califica como instalación para lavado de manos.
    enum_uri: aidops:HandwashingFacilityType
    permissible_values:
      fixed_sink_with_tap:
        title:
          en: Fixed sink with tap
          fr: Évier fixe avec robinet
          es: Fregadero fijo con grifo
        description:
          en: A permanently installed basin or sink with a running water tap.
          fr: Un lavabo ou évier installé en permanence avec un robinet à eau courante.
          es: Un lavabo o fregadero instalado permanentemente con un grifo de agua corriente.
      bucket_with_tap:
        title:
          en: Bucket or container with tap/spigot
          fr: Seau ou récipient avec robinet
          es: Cubo o recipiente con grifo
        description:
          en: A bucket or large container fitted with a tap or spigot, placed near the handwashing area. A designated and accessible handwashing facility.
          fr: Seau ou grand récipient équipé d'un robinet ou d'un robinet de soutireur, placé près de la zone de lavage des mains. Un dispositif de lavage des mains désigné et accessible.
          es: Un cubo o recipiente grande equipado con un grifo o espita, colocado cerca del área de lavado de manos. Una instalación designada y accesible para lavado de manos.
      tippy_tap:
        title:
          en: Tippy-tap
          fr: Tippy-tap
          es: Tippy-tap
        description:
          en: A low-cost hands-free handwashing device made from a jug or container suspended on a pivot; tilting a foot lever tips the container to release a small amount of water.
          fr: Un dispositif de lavage des mains sans contact peu coûteux, fabriqué à partir d'une cruche ou d'un récipient suspendu sur un pivot ; incliner un levier à pied fait basculer le récipient pour libérer une petite quantité d'eau.
          es: Un dispositivo de lavado de manos sin contacto de bajo costo hecho de una jarra o recipiente suspendido en un pivote; inclinar una palanca de pie inclina el recipiente para liberar una pequeña cantidad de agua.
      jug_or_basin:
        title:
          en: Jug, basin, or bowl designated for handwashing
          fr: Cruche, bassine ou cuvette désignée pour le lavage des mains
          es: Jarra, palangana o tazón designado para lavado de manos
        description:
          en: A jug, basin, or bowl that is specifically set aside and used for handwashing, not shared with other household tasks.
          fr: Cruche, bassine ou cuvette spécialement mise de côté et utilisée pour le lavage des mains, non partagée avec d'autres tâches ménagères.
          es: Una jarra, palangana o tazón reservado específicamente y utilizado para lavado de manos, no compartido con otras tareas del hogar.
      shared_with_neighbours:
        title:
          en: Shared facility with neighbours
          fr: Installation partagée avec les voisins
          es: Instalación compartida con vecinos
        description:
          en: A handwashing facility located outside the household compound that is shared with neighbouring households.
          fr: Un dispositif de lavage des mains situé à l'extérieur de la concession du ménage et partagé avec les ménages voisins.
          es: Una instalación para lavado de manos ubicada fuera del recinto del hogar que se comparte con hogares vecinos.
      other:
        title:
          en: Other facility type
          fr: Autre type de dispositif
          es: Otro tipo de instalación
        description:
          en: A handwashing facility type not covered by the other categories.
          fr: Un type de dispositif de lavage des mains non couvert par les autres catégories.
          es: Un tipo de instalación para lavado de manos no cubierto por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Type of handwashing facility present in the household. Both fixed and mobile facilities are valid for JMP basic hygiene service classification. A tippy-tap, designated bucket with tap, or jug set aside for handwashing qualifies as a handwashing facility.", "es": "Tipo de instalaci\u00f3n para lavado de manos presente en el hogar. Tanto las instalaciones fijas como las m\u00f3viles son v\u00e1lidas para la clasificaci\u00f3n del servicio de higiene b\u00e1sico del JMP. Un tippy-tap, un cubo designado con grifo, o una jarra reservada para lavado de manos califica como instalaci\u00f3n para lavado de manos.", "fr": "Type de dispositif de lavage des mains pr\u00e9sent dans le m\u00e9nage. Les installations fixes et mobiles sont toutes deux valides pour la classification du service d''hygi\u00e8ne de base JMP. Un tippy-tap, un seau d\u00e9sign\u00e9 avec robinet, ou une cruche mise de c\u00f4t\u00e9 pour le lavage des mains est consid\u00e9r\u00e9 comme un dispositif de lavage des mains."}, "id": "handwashing-facility-type", "label": {"en": "Handwashing Facility Type", "es": "Tipo de instalaci\u00f3n para lavado de manos", "fr": "Type de dispositif de lavage des mains"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "JMP H1 expanded. MICS observation protocol. Mobile facilities are as valid as fixed ones for JMP basic service.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "values": [{"code": "fixed_sink_with_tap", "definition": {"en": "A permanently installed basin or sink with a running water tap.", "es": "Un lavabo o fregadero instalado permanentemente con un grifo de agua corriente.", "fr": "Un lavabo ou \u00e9vier install\u00e9 en permanence avec un robinet \u00e0 eau courante."}, "label": {"en": "Fixed sink with tap", "es": "Fregadero fijo con grifo", "fr": "\u00c9vier fixe avec robinet"}}, {"code": "bucket_with_tap", "definition": {"en": "A bucket or large container fitted with a tap or spigot, placed near the handwashing area. A designated and accessible handwashing facility.", "es": "Un cubo o recipiente grande equipado con un grifo o espita, colocado cerca del \u00e1rea de lavado de manos. Una instalaci\u00f3n designada y accesible para lavado de manos.", "fr": "Seau ou grand r\u00e9cipient \u00e9quip\u00e9 d''un robinet ou d''un robinet de soutireur, plac\u00e9 pr\u00e8s de la zone de lavage des mains. Un dispositif de lavage des mains d\u00e9sign\u00e9 et accessible."}, "label": {"en": "Bucket or container with tap/spigot", "es": "Cubo o recipiente con grifo", "fr": "Seau ou r\u00e9cipient avec robinet"}}, {"code": "tippy_tap", "definition": {"en": "A low-cost hands-free handwashing device made from a jug or container suspended on a pivot; tilting a foot lever tips the container to release a small amount of water.", "es": "Un dispositivo de lavado de manos sin contacto de bajo costo hecho de una jarra o recipiente suspendido en un pivote; inclinar una palanca de pie inclina el recipiente para liberar una peque\u00f1a cantidad de agua.", "fr": "Un dispositif de lavage des mains sans contact peu co\u00fbteux, fabriqu\u00e9 \u00e0 partir d''une cruche ou d''un r\u00e9cipient suspendu sur un pivot ; incliner un levier \u00e0 pied fait basculer le r\u00e9cipient pour lib\u00e9rer une petite quantit\u00e9 d''eau."}, "label": {"en": "Tippy-tap", "es": "Tippy-tap", "fr": "Tippy-tap"}}, {"code": "jug_or_basin", "definition": {"en": "A jug, basin, or bowl that is specifically set aside and used for handwashing, not shared with other household tasks.", "es": "Una jarra, palangana o taz\u00f3n reservado espec\u00edficamente y utilizado para lavado de manos, no compartido con otras tareas del hogar.", "fr": "Cruche, bassine ou cuvette sp\u00e9cialement mise de c\u00f4t\u00e9 et utilis\u00e9e pour le lavage des mains, non partag\u00e9e avec d''autres t\u00e2ches m\u00e9nag\u00e8res."}, "label": {"en": "Jug, basin, or bowl designated for handwashing", "es": "Jarra, palangana o taz\u00f3n designado para lavado de manos", "fr": "Cruche, bassine ou cuvette d\u00e9sign\u00e9e pour le lavage des mains"}}, {"code": "shared_with_neighbours", "definition": {"en": "A handwashing facility located outside the household compound that is shared with neighbouring households.", "es": "Una instalaci\u00f3n para lavado de manos ubicada fuera del recinto del hogar que se comparte con hogares vecinos.", "fr": "Un dispositif de lavage des mains situ\u00e9 \u00e0 l''ext\u00e9rieur de la concession du m\u00e9nage et partag\u00e9 avec les m\u00e9nages voisins."}, "label": {"en": "Shared facility with neighbours", "es": "Instalaci\u00f3n compartida con vecinos", "fr": "Installation partag\u00e9e avec les voisins"}}, {"code": "other", "definition": {"en": "A handwashing facility type not covered by the other categories.", "es": "Un tipo de instalaci\u00f3n para lavado de manos no cubierto por las otras categor\u00edas.", "fr": "Un type de dispositif de lavage des mains non couvert par les autres cat\u00e9gories."}, "label": {"en": "Other facility type", "es": "Otro tipo de instalaci\u00f3n", "fr": "Autre type de dispositif"}}]}'
