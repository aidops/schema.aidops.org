  HabitabilityStatus:
    title:
      en: Habitability Status
      fr: Statut d'habitabilité
      es: Estado de habitabilidad
    description:
      en: 'A programming-facing judgement of whether a dwelling can currently be occupied, and what category of shelter response it requires. Distinct from damage level: a moderately damaged dwelling may be habitable, and a lightly damaged one may still be unoccupied (e.g., household has displaced). The four-tier substantive scale (habitable, needs minor repairs, needs major repairs, must be demolished) distinguishes between repair-grant and reconstruction-grant tiers, which is a programming decision point in Sphere 2018 shelter recovery; a separate ''unknown / not assessed'' code is provided to record absence of assessment.'
      fr: 'Un jugement orienté programmation sur l''occupabilité actuelle d''un logement et la catégorie de réponse abri requise. Distinct du niveau de dommages : un logement modérément endommagé peut être habitable, et un logement légèrement endommagé peut rester inoccupé (par exemple, le ménage est déplacé). L''échelle de fond à quatre niveaux (habitable, réparations mineures, réparations majeures, à démolir) distingue les tranches subvention-réparation et subvention-reconstruction, ce qui constitue un point de décision de programmation dans Sphère 2018 relèvement abri ; un code distinct « inconnu / non évalué » est prévu pour enregistrer l''absence d''évaluation.'
      es: 'Un juicio orientado a la programación sobre si una vivienda puede ocuparse actualmente y qué categoría de respuesta de refugio requiere. Distinto del nivel de daños: una vivienda moderadamente dañada puede ser habitable, y una ligeramente dañada puede permanecer desocupada (por ejemplo, el hogar está desplazado). La escala sustantiva de cuatro niveles (habitable, reparaciones menores, reparaciones mayores, debe demolerse) distingue los tramos de subvención-reparación y subvención-reconstrucción, lo que constituye un punto de decisión programática en Esfera 2018 recuperación de refugio; un código separado «desconocido / no evaluado» se prevé para registrar la ausencia de evaluación.'
    enum_uri: aidops:HabitabilityStatus
    permissible_values:
      habitable:
        title:
          en: Habitable
          fr: Habitable
          es: Habitable
        description:
          en: Dwelling is currently occupied or occupiable without intervention. No shelter programming action required from a habitability standpoint.
          fr: Le logement est actuellement occupé ou occupable sans intervention. Aucune action de programmation abri requise du point de vue de l'habitabilité.
          es: La vivienda está actualmente ocupada u ocupable sin intervención. No se requiere acción de programación de refugio desde el punto de vista de la habitabilidad.
      needs_minor_repairs:
        title:
          en: Habitable with minor repairs
          fr: Habitable avec réparations mineures
          es: Habitable con reparaciones menores
        description:
          en: 'Dwelling is livable now; minor household-level repairs (patching, finishes, replacing fixtures) would restore normal function. Typical response: NFI kit or small cash grant.'
          fr: 'Le logement est habitable maintenant ; des réparations mineures au niveau du ménage (ragréage, finitions, remplacement d''équipements) restaureraient son fonctionnement normal. Réponse typique : kit articles non alimentaires ou petite subvention en espèces.'
          es: 'La vivienda es habitable ahora; reparaciones menores a nivel del hogar (parcheo, acabados, reemplazo de accesorios) restaurarían su funcionamiento normal. Respuesta típica: kit de artículos no alimentarios o pequeña subvención en efectivo.'
      needs_major_repairs_uninhabitable:
        title:
          en: Uninhabitable; major repairs required (repair-grant tier)
          fr: Inhabitable ; réparations majeures requises (tranche subvention-réparation)
          es: Inhabitable; se requieren reparaciones mayores (tramo subvención-reparación)
        description:
          en: 'Dwelling cannot currently be occupied but can be repaired to a safe habitable standard without full reconstruction. Typical response: shelter repair grant, technical assistance, labour support.'
          fr: 'Le logement ne peut actuellement être occupé mais peut être réparé pour atteindre une norme habitable et sûre sans reconstruction complète. Réponse typique : subvention de réparation abri, assistance technique, appui à la main-d''œuvre.'
          es: 'La vivienda no puede ocuparse actualmente pero puede repararse hasta un estándar habitable y seguro sin reconstrucción completa. Respuesta típica: subvención de reparación de refugio, asistencia técnica, apoyo laboral.'
      must_be_demolished:
        title:
          en: Beyond repair; must be demolished (reconstruction-grant tier)
          fr: Irréparable ; doit être démoli (tranche subvention-reconstruction)
          es: Irreparable; debe demolerse (tramo subvención-reconstrucción)
        description:
          en: 'Dwelling is beyond safe repair and must be demolished; recovery requires full reconstruction. Typical response: transitional shelter, reconstruction grant, relocation support.'
          fr: 'Le logement est au-delà de toute réparation sûre et doit être démoli ; le relèvement nécessite une reconstruction complète. Réponse typique : abri transitionnel, subvention de reconstruction, appui à la relocalisation.'
          es: 'La vivienda está más allá de una reparación segura y debe demolerse; la recuperación requiere reconstrucción completa. Respuesta típica: refugio transicional, subvención de reconstrucción, apoyo de relocalización.'
      unknown:
        title:
          en: Unknown / not assessed
          fr: Inconnu / non évalué
          es: Desconocido / no evaluado
        description:
          en: Habitability has not been assessed. Recorded to distinguish from a positive 'habitable' finding.
          fr: L'habitabilité n'a pas été évaluée. Enregistré pour distinguer d'un verdict positif « habitable ».
          es: La habitabilidad no ha sido evaluada. Registrado para distinguirse de un veredicto positivo «habitable».
