      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "oxfam-adaptation-toolkit-2019"], "definition": {"en": "General perception of directional change in a climate variable over the respondent''s lifetime or the past 10\u201315 years. Used for climate_trend_perception_rainfall (G1), climate_trend_perception_temperature (G2), and climate_extreme_events_frequency_perception (G4). For temperature items, the directional labels read as hotter (much_increased) and cooler (much_decreased); Form Authors using XLSForm should apply item-level label overrides to display temperature-appropriate phrasing without creating a separate vocabulary. The ''more_variable_unpredictable'' code is a distinct and important category: IPCC AR6 WGII documents that variability increase is often perceived separately from a mean directional trend and is itself a programmatically significant signal. Sources: CARE CVCA historical timeline methodology; IFRC PCVA trend analysis; IPCC AR6 WGII Box 1.1; Oxfam adaptation toolkit community trend ranking; ASSAR community-level climate perception mapping.\n", "es": "Percepci\u00f3n general del cambio direccional de una variable clim\u00e1tica durante la vida del encuestado o los \u00faltimos 10 a 15 a\u00f1os. Usado para los \u00edtems de tendencia de lluvia, tendencia de temperatura y frecuencia de eventos extremos. Para \u00edtems de temperatura, los c\u00f3digos direccionales se leen como m\u00e1s caliente (much_increased) y m\u00e1s fr\u00edo (much_decreased); los autores de formularios XLSForm deben aplicar reemplazos de etiquetas a nivel de \u00edtem. Fuentes: CARE CVCA; FICR PCVA; IPCC AR6 WGII Recuadro 1.1; Oxfam; ASSAR.\n", "fr": "Perception g\u00e9n\u00e9rale du changement directionnel d''une variable climatique sur la dur\u00e9e de vie du r\u00e9pondant ou les 10 \u00e0 15 derni\u00e8res ann\u00e9es. Utilis\u00e9 pour les items de tendance pluviom\u00e9trique, de tendance des temp\u00e9ratures et de fr\u00e9quence des \u00e9v\u00e9nements extr\u00eames. Pour les items de temp\u00e9rature, les libell\u00e9s directionnels se lisent comme plus chaud (much_increased) et plus frais (much_decreased) ; les auteurs de formulaires XLSForm doivent appliquer des remplacements d''\u00e9tiquettes au niveau de l''item. Sources : CARE CVCA ; FICR PCVA ; GIEC AR6 WGII Encadr\u00e9 1.1 ; Oxfam ; ASSAR.\n"}, "id": "climate-trend-perception", "label": {"en": "Perceived directional trend in a climate variable", "es": "Tendencia direccional percibida de una variable clim\u00e1tica", "fr": "Tendance directionnelle per\u00e7ue d''une variable climatique"}, "maturity": "draft", "values": [{"code": "much_increased", "definition": {"en": "The respondent perceives a large increase in the variable \u2014 much more rainfall, much hotter temperatures, or extreme events much more frequent.", "es": "El encuestado percibe un gran aumento en la variable \u2014 mucho m\u00e1s lluvia, temperaturas mucho m\u00e1s calientes o eventos extremos mucho m\u00e1s frecuentes.", "fr": "Le r\u00e9pondant per\u00e7oit une grande augmentation de la variable \u2014 beaucoup plus de pr\u00e9cipitations, des temp\u00e9ratures beaucoup plus \u00e9lev\u00e9es ou des \u00e9v\u00e9nements extr\u00eames beaucoup plus fr\u00e9quents."}, "label": {"en": "Much increased / much more often", "es": "Mucho m\u00e1s / mucho m\u00e1s frecuente", "fr": "Beaucoup augment\u00e9 / beaucoup plus souvent"}}, {"code": "somewhat_increased", "definition": {"en": "The respondent perceives a moderate increase in the variable.", "es": "El encuestado percibe un aumento moderado en la variable.", "fr": "Le r\u00e9pondant per\u00e7oit une augmentation mod\u00e9r\u00e9e de la variable."}, "label": {"en": "Somewhat increased / somewhat more often", "es": "Algo m\u00e1s / algo m\u00e1s frecuente", "fr": "L\u00e9g\u00e8rement augment\u00e9 / un peu plus souvent"}}, {"code": "about_the_same", "definition": {"en": "The respondent perceives no meaningful change in the variable over time.", "es": "El encuestado no percibe ning\u00fan cambio significativo en la variable a lo largo del tiempo.", "fr": "Le r\u00e9pondant ne per\u00e7oit aucun changement significatif de la variable au fil du temps."}, "label": {"en": "About the same", "es": "Aproximadamente igual", "fr": "\u00c0 peu pr\u00e8s pareil"}}, {"code": "somewhat_decreased", "definition": {"en": "The respondent perceives a moderate decrease in the variable.", "es": "El encuestado percibe una disminuci\u00f3n moderada en la variable.", "fr": "Le r\u00e9pondant per\u00e7oit une diminution mod\u00e9r\u00e9e de la variable."}, "label": {"en": "Somewhat decreased / somewhat less often", "es": "Algo menos / algo menos frecuente", "fr": "L\u00e9g\u00e8rement diminu\u00e9 / un peu moins souvent"}}, {"code": "much_decreased", "definition": {"en": "The respondent perceives a large decrease in the variable \u2014 much less rainfall, much cooler temperatures, or extreme events much less frequent.", "es": "El encuestado percibe una gran disminuci\u00f3n en la variable \u2014 mucho menos lluvia, temperaturas mucho m\u00e1s fr\u00edas o eventos extremos mucho menos frecuentes.", "fr": "Le r\u00e9pondant per\u00e7oit une grande diminution de la variable \u2014 beaucoup moins de pr\u00e9cipitations, des temp\u00e9ratures beaucoup plus fra\u00eeches ou des \u00e9v\u00e9nements extr\u00eames beaucoup moins fr\u00e9quents."}, "label": {"en": "Much decreased / much less often", "es": "Mucho menos / mucho menos frecuente", "fr": "Beaucoup diminu\u00e9 / beaucoup moins souvent"}}, {"code": "more_variable_unpredictable", "definition": {"en": "The respondent perceives that the variable has become more erratic or unreliable rather than following a consistent directional trend. IPCC AR6 WGII documents that variability increase is often perceived separately from mean trend and is a distinct programmatically significant signal.", "es": "El encuestado percibe que la variable se ha vuelto m\u00e1s err\u00e1tica o poco confiable en lugar de seguir una tendencia direccional consistente. El IPCC AR6 WGII documenta que el aumento de variabilidad se percibe frecuentemente por separado de la tendencia media y es una se\u00f1al program\u00e1ticamente significativa distinta.", "fr": "Le r\u00e9pondant per\u00e7oit que la variable est devenue plus erratique ou peu fiable plut\u00f4t que de suivre une tendance directionnelle constante. Le GIEC AR6 WGII documente que l''augmentation de la variabilit\u00e9 est souvent per\u00e7ue s\u00e9par\u00e9ment de la tendance moyenne et constitue un signal distinct significatif sur le plan programmatique."}, "label": {"en": "More variable or unpredictable than before", "es": "M\u00e1s variable o impredecible que antes", "fr": "Plus variable ou impr\u00e9visible qu''avant"}}, {"code": "dont_know", "definition": {"en": "The respondent cannot judge whether or how the variable has changed.", "es": "El encuestado no puede determinar si o c\u00f3mo ha cambiado la variable.", "fr": "Le r\u00e9pondant ne peut pas juger si ou comment la variable a chang\u00e9."}, "label": {"en": "Don''t know", "es": "No s\u00e9", "fr": "Je ne sais pas"}}]}'
