 del nivel del mar, aumento de marejadas o erosi\u00f3n de playas o costas.", "fr": "Le m\u00e9nage est situ\u00e9 dans une zone c\u00f4ti\u00e8re menac\u00e9e par la mont\u00e9e du niveau de la mer, l''augmentation des ondes de temp\u00eate ou l''\u00e9rosion de la plage ou du littoral."}, "label": {"en": "Coastal erosion or sea-level-rise zone", "es": "Zona de erosi\u00f3n costera o elevaci\u00f3n del nivel del mar", "fr": "Zone d''\u00e9rosion c\u00f4ti\u00e8re ou de mont\u00e9e du niveau de la mer"}}, {"code": "urban_heat_island", "definition": {"en": "The household is located in a dense urban area where built surfaces and lack of vegetation amplify heat during heatwaves.", "es": "El hogar est\u00e1 ubicado en un \u00e1rea urbana densa donde las superficies construidas y la falta de vegetaci\u00f3n ampl\u00edan el calor durante las olas de calor.", "fr": "Le m\u00e9nage est situ\u00e9 dans une zone urbaine dense o\u00f9 les surfaces b\u00e2ties et le manque de v\u00e9g\u00e9tation amplifient la chaleur lors des vagues de chaleur."}, "label": {"en": "Urban heat island", "es": "Isla de calor urbana", "fr": "\u00celot de chaleur urbain"}}, {"code": "flash_flood_catchment", "definition": {"en": "The household is located in a catchment area that receives rapid runoff, making it prone to flash flooding after intense rain.", "es": "El hogar est\u00e1 ubicado en una cuenca de recepci\u00f3n que recibe escorrent\u00eda r\u00e1pida, haci\u00e9ndola propensa a inundaciones repentinas despu\u00e9s de lluvias intensas.", "fr": "Le m\u00e9nage est situ\u00e9 dans un bassin versant qui re\u00e7oit un ruissellement rapide, le rendant sujet aux crues soudaines apr\u00e8s de fortes pluies."}, "label": {"en": "Flash flood catchment or upstream area", "es": "Cuenca de recepci\u00f3n propensa a inundaciones repentinas", "fr": "Bassin versant sujet aux crues soudaines"}}, {"code": "wildfire_prone_area", "definition": {"en": "The household is located in or adjacent to grassland, woodland, or forest that is prone to wildfires during dry seasons.", "es": "El hogar est\u00e1 ubicado en o adyacente a pastizales, bosques abiertos o bosques propensos a incendios forestales durante las temporadas secas.", "fr": "Le m\u00e9nage est situ\u00e9 dans ou \u00e0 proximit\u00e9 de prairies, for\u00eats ouvertes ou for\u00eats sujettes aux feux de brousse durant les saisons s\u00e8ches."}, "label": {"en": "Wildfire-prone area", "es": "\u00c1rea propensa a incendios forestales", "fr": "Zone expos\u00e9e aux feux de brousse"}}, {"code": "none_no_specific_risk", "definition": {"en": "The household does not consider its location to be specifically exposed to any of the above climate risk factors. Mutually exclusive with all other codes.", "es": "El hogar no considera que su ubicaci\u00f3n est\u00e9 espec\u00edficamente expuesta a ninguno de los factores de riesgo clim\u00e1tico anteriores. Mutuamente exclusivo con todos los dem\u00e1s c\u00f3digos.", "fr": "Le m\u00e9nage ne consid\u00e8re pas que son emplacement soit sp\u00e9cifiquement expos\u00e9 \u00e0 l''un des facteurs de risque climatique ci-dessus. Mutuellement exclusif avec tous les autres codes."}, "label": {"en": "No specific location risk", "es": "Sin riesgo de ubicaci\u00f3n espec\u00edfico", "fr": "Pas de risque d''emplacement sp\u00e9cifique"}}]}'
