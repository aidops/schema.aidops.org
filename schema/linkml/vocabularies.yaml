livestock, or assets taken by force or under threat.", "es": "Pertenencias, ganado o activos del hogar tomados por la fuerza o bajo amenaza.", "fr": "Effets personnels, b\u00e9tail ou biens du m\u00e9nage pris par la force ou sous la menace."}, "label": {"en": "Looting or theft", "es": "Saqueo o robo", "fr": "Pillage ou vol"}}, {"code": "abduction_kidnapping", "definition": {"en": "A household member was abducted or held against their will by a non-state or state actor. Do not probe further if this code is selected.", "es": "Un miembro del hogar fue secuestrado o retenido contra su voluntad por un actor no estatal o estatal. No indagar m\u00e1s si se selecciona este c\u00f3digo.", "fr": "Un membre du m\u00e9nage a \u00e9t\u00e9 enlev\u00e9 ou retenu contre sa volont\u00e9 par un acteur non \u00e9tatique ou \u00e9tatique. Ne pas approfondir si ce code est s\u00e9lectionn\u00e9."}, "label": {"en": "Abduction or kidnapping", "es": "Secuestro o rapto", "fr": "Enl\u00e8vement ou s\u00e9questration"}}, {"code": "arbitrary_detention", "definition": {"en": "A household member was detained without explanation, charges, or due process. Do not probe further if this code is selected. See also arbitrary_detention_experienced for the standalone indicator.", "es": "Un miembro del hogar fue detenido sin explicaci\u00f3n, cargos o debido proceso. No indagar m\u00e1s si se selecciona este c\u00f3digo. Ver tambi\u00e9n arbitrary_detention_experienced para el indicador independiente.", "fr": "Un membre du m\u00e9nage a \u00e9t\u00e9 d\u00e9tenu sans explication, sans charges ni proc\u00e9dure r\u00e9guli\u00e8re. Ne pas approfondir si ce code est s\u00e9lectionn\u00e9. Voir aussi arbitrary_detention_experienced pour l''indicateur autonome."}, "label": {"en": "Arbitrary detention", "es": "Detenci\u00f3n arbitraria", "fr": "D\u00e9tention arbitraire"}}, {"code": "forced_recruitment", "definition": {"en": "A household member was forcibly recruited into an armed group or military force. Do