  ElectricitySource:
    title:
      en: Electricity Source
      fr: Source d'électricité
      es: Fuente de electricidad
    description:
      en: The primary source of electricity in the household. Source type determines the formality and legality dimension of the MTF electricity access tier. The SDG 7.1.1 binary indicator (access to electricity) is met when this value is anything other than 'none'.
      fr: La source principale d'électricité dans le ménage. Le type de source détermine la dimension de formalité et de légalité du niveau d'accès MTF à l'électricité. L'indicateur binaire ODD 7.1.1 (accès à l'électricité) est satisfait lorsque cette valeur est autre que 'none'.
      es: La fuente principal de electricidad en el hogar. El tipo de fuente determina la dimensión de formalidad y legalidad del nivel de acceso MTF a la electricidad. El indicador binario ODS 7.1.1 (acceso a electricidad) se cumple cuando este valor es distinto de 'none'.
    enum_uri: aidops:ElectricitySource
    permissible_values:
      none:
        title:
          en: No electricity
          fr: Pas d'électricité
          es: Sin electricidad
        description:
          en: The household has no electricity source of any kind. MTF Tier 0 by definition.
          fr: Le ménage n'a aucune source d'électricité quelle qu'elle soit. Niveau MTF 0 par définition.
          es: El hogar no tiene ninguna fuente de electricidad. Nivel MTF 0 por definición.
      national_grid:
        title:
          en: National grid (utility)
          fr: Réseau national (service public)
          es: Red nacional (servicio público)
        description:
          en: Connection to the main national utility grid. The most common formal electricity source.
          fr: Raccordement au réseau national principal de service public. Source d'électricité formelle la plus courante.
          es: Conexión a la red eléctrica nacional principal del servicio público. La fuente de electricidad formal más común.
      mini_grid:
        title:
          en: Mini-grid (shared local network)
          fr: Mini-réseau (réseau local partagé)
          es: Mini-red (red local compartida)
        description:
          en: Off-grid mini-grid operated by a community, cooperative, or private operator. Provides grid-like service to a local area not connected to the national grid.
          fr: Mini-réseau hors réseau exploité par une communauté, une coopérative ou un opérateur privé. Fournit un service de type réseau à une zone locale non raccordée au réseau national.
          es: Mini-red fuera de red operada por una comunidad, cooperativa u operador privado. Proporciona servicio similar a la red a una zona local no conectada a la red nacional.
      solar_home_system:
        title:
          en: Solar home system (SHS)
          fr: Système solaire domestique (SHS)
          es: Sistema solar doméstico (SHS)
        description:
          en: Stand-alone solar home system installed for the household. Capacity ranges from pico-solar (less than 10 W) to large SHS (100 W or more).
          fr: Système solaire domestique autonome installé pour le ménage. La capacité va du pico-solaire (moins de 10 W) aux grands SHS (100 W ou plus).
          es: Sistema solar doméstico autónomo instalado para el hogar. La capacidad varía desde pico-solar (menos de 10 W) hasta SHS grandes (100 W o más).
      solar_lantern:
        title:
          en: Solar lantern or small solar product
          fr: Lanterne solaire ou petit produit solaire
          es: Linterna solar o pequeño producto solar
        description:
          en: Pico-solar product (less than 10 W) providing only lighting and phone charging. Typically supports MTF Tier 1-2 capacity.
          fr: Produit pico-solaire (moins de 10 W) fournissant uniquement l'éclairage et la recharge de téléphone. Prend généralement en charge la capacité MTF niveaux 1 à 2.
          es: Producto pico-solar (menos de 10 W) que proporciona solo iluminación y carga de teléfonos. Generalmente admite capacidad MTF Niveles 1 a 2.
      generator_shared:
        title:
          en: Shared generator (neighborhood or compound)
          fr: Groupe électrogène partagé (quartier ou enceinte)
          es: Generador compartido (vecindario o recinto)
        description:
          en: Diesel or petrol generator shared among several households in a neighborhood or compound.
          fr: Groupe électrogène diesel ou essence partagé entre plusieurs ménages dans un quartier ou une enceinte.
          es: Generador diésel o de gasolina compartido entre varios hogares en un vecindario o recinto.
      generator_own:
        title:
          en: Own generator
          fr: Groupe électrogène personnel
          es: Generador propio
        description:
          en: Household-owned diesel or petrol generator.
          fr: Groupe électrogène diesel ou essence appartenant au ménage.
          es: Generador diésel o de gasolina propiedad del hogar.
      battery_bank:
        title:
          en: Battery / power bank (charged elsewhere)
          fr: Batterie / banque d'énergie (chargée ailleurs)
          es: Batería / banco de energía (cargado en otro lugar)
        description:
          en: Household uses a rechargeable battery or power bank as its primary electricity source; the battery is charged at an external charging point (market, neighbor, kiosk).
          fr: Le ménage utilise une batterie rechargeable ou une banque d'énergie comme source principale d'électricité ; la batterie est chargée à un point de recharge externe (marché, voisin, kiosque).
          es: El hogar utiliza una batería recargable o banco de energía como fuente principal de electricidad; la batería se carga en un punto de carga externo (mercado, vecino, quiosco).
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: An electricity source not covered by the other categories. Requires additional specification.
          fr: Une source d'électricité non couverte par les autres catégories. Nécessite une spécification supplémentaire.
          es: Una fuente de electricidad no cubierta por las otras categorías. Requiere especificación adicional.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-world-bank-core-energy-questions"], "definition": {"en": "The primary source of electricity in the household. Source type determines the formality and legality dimension of the MTF electricity access tier. The SDG 7.1.1 binary indicator (access to electricity) is met when this value is anything other than ''none''.\n", "es": "La fuente principal de electricidad en el hogar. El tipo de fuente determina la dimensi\u00f3n de formalidad y legalidad del nivel de acceso MTF a la electricidad. El indicador binario ODS 7.1.1 (acceso a electricidad) se cumple cuando este valor es distinto de ''none''.\n", "fr": "La source principale d''\u00e9lectricit\u00e9 dans le m\u00e9nage. Le type de source d\u00e9termine la dimension de formalit\u00e9 et de l\u00e9galit\u00e9 du niveau d''acc\u00e8s MTF \u00e0 l''\u00e9lectricit\u00e9. L''indicateur binaire ODD 7.1.1 (acc\u00e8s \u00e0 l''\u00e9lectricit\u00e9) est satisfait lorsque cette valeur est autre que ''none''.\n"}, "id": "electricity-source", "label": {"en": "Electricity Source", "es": "Fuente de electricidad", "fr": "Source d''\u00e9lectricit\u00e9"}, "maturity": "draft", "system_mappings": {"dhs": {"note": "DHS hv206 is a binary indicator. Code 1 (yes) maps to national_grid as the most common grid-connected source in DHS samples; source sub-type is not captured in hv206. For off-grid sources in DHS, source type may be captured in country-specific modules.", "values": [{"code": "0", "label": "No", "maps_to": "none"}, {"code": "1", "label": "Yes", "maps_to": "national_grid"}], "vocabulary_name": "hv206 - Has electricity (binary)"}, "mics6": {"note": "MICS6 HC8 sub-codes (HC8A-HC8E) capture source type when HC8=1 (yes). The mapping above uses representative sub-codes; exact MICS6 sub-code structure varies by country survey version.", "values": [{"code": "1", "label": "Electricity \u2014 national grid", "maps_to": "national_grid"}, {"code": "2", "label": "Electricity \u2014 solar system", "maps_to": "solar_home_system"}, {"code": "3", "label": "Electricity \u2014 generator", "maps_to": "generator_shared"}, {"code": "4", "label": "Electricity \u2014 other", "maps_to": "other"}, {"code": "0", "label": "No electricity", "maps_to": "none"}], "vocabulary_name": "MICS6 HC8 - Source of electricity"}}, "values": [{"code": "none", "definition": {"en": "The household has no electricity source of any kind. MTF Tier 0 by definition.", "es": "El hogar no tiene ninguna fuente de electricidad. Nivel MTF 0 por definici\u00f3n.", "fr": "Le m\u00e9nage n''a aucune source d''\u00e9lectricit\u00e9 quelle qu''elle soit. Niveau MTF 0 par d\u00e9finition."}, "label": {"en": "No electricity", "es": "Sin electricidad", "fr": "Pas d''\u00e9lectricit\u00e9"}}, {"code": "national_grid", "definition": {"en": "Connection to the main national utility grid. The most common formal electricity source.", "es": "Conexi\u00f3n a la red el\u00e9ctrica nacional principal del servicio p\u00fablico. La fuente de electricidad formal m\u00e1s com\u00fan.", "fr": "Raccordement au r\u00e9seau national principal de service public. Source d''\u00e9lectricit\u00e9 formelle la plus courante."}, "label": {"en": "National grid (utility)", "es": "Red nacional (servicio p\u00fablico)", "fr": "R\u00e9seau national (service public)"}}, {"code": "mini_grid", "definition": {"en": "Off-grid mini-grid operated by a community, cooperative, or private operator. Provides grid-like service to a local area not connected to the national grid.", "es": "Mini-red fuera de red operada por una comunidad, cooperativa u operador privado. Proporciona servicio similar a la red a una zona local no conectada a la red nacional.", "fr": "Mini-r\u00e9seau hors r\u00e9seau exploit\u00e9 par une communaut\u00e9, une coop\u00e9rative ou un op\u00e9rateur priv\u00e9. Fournit un service de type r\u00e9seau \u00e0 une zone locale non raccord\u00e9e au r\u00e9seau national."}, "label": {"en": "Mini-grid (shared local network)", "es": "Mini-red (red local compartida)", "fr": "Mini-r\u00e9seau (r\u00e9seau local partag\u00e9)"}}, {"code": "solar_home_system", "definition": {"en": "Stand-alone solar home system installed for the household. Capacity ranges from pico-solar (less than 10 W) to large SHS (100 W or more).", "es": "Sistema solar dom\u00e9stico aut\u00f3nomo instalado para el hogar. La capacidad var\u00eda desde pico-solar (menos de 10 W) hasta SHS grandes (100 W o m\u00e1s).", "fr": "Syst\u00e8me solaire domestique autonome install\u00e9 pour le m\u00e9nage. La capacit\u00e9 va du pico-solaire (moins de 10 W) aux grands SHS (100 W ou plus)."}, "label": {"en": "Solar home system (SHS)", "es": "Sistema solar dom\u00e9stico (SHS)", "fr": "Syst\u00e8me solaire domestique (SHS)"}}, {"code": "solar_lantern", "definition": {"en": "Pico-solar product (less than 10 W) providing only lighting and phone charging. Typically supports MTF Tier 1-2 capacity.", "es": "Producto pico-solar (menos de 10 W) que proporciona solo iluminaci\u00f3n y carga de tel\u00e9fonos. Generalmente admite capacidad MTF Niveles 1 a 2.", "fr": "Produit pico-solaire (moins de 10 W) fournissant uniquement l''\u00e9clairage et la recharge de t\u00e9l\u00e9phone. Prend g\u00e9n\u00e9ralement en charge la capacit\u00e9 MTF niveaux 1 \u00e0 2."}, "label": {"en": "Solar lantern or small solar product", "es": "Linterna solar o peque\u00f1o producto solar", "fr": "Lanterne solaire ou petit produit solaire"}}, {"code": "generator_shared", "definition": {"en": "Diesel or petrol generator shared among several households in a neighborhood or compound.", "es": "Generador di\u00e9sel o de gasolina compartido entre varios hogares en un vecindario o recinto.", "fr": "Groupe \u00e9lectrog\u00e8ne diesel ou essence partag\u00e9 entre plusieurs m\u00e9nages dans un quartier ou une enceinte."}, "label": {"en": "Shared generator (neighborhood or compound)", "es": "Generador compartido (vecindario o recinto)", "fr": "Groupe \u00e9lectrog\u00e8ne partag\u00e9 (quartier ou enceinte)"}}, {"code": "generator_own", "definition": {"en": "Household-owned diesel or petrol generator.", "es": "Generador di\u00e9sel o de gasolina propiedad del hogar.", "fr": "Groupe \u00e9lectrog\u00e8ne diesel ou essence appartenant au m\u00e9nage."}, "label": {"en": "Own generator", "es": "Generador propio", "fr": "Groupe \u00e9lectrog\u00e8ne personnel"}}, {"code": "battery_bank", "definition": {"en": "Household uses a rechargeable battery or power bank as its primary electricity source; the battery is charged at an external charging point (market, neighbor, kiosk).", "es": "El hogar utiliza una bater\u00eda recargable o banco de energ\u00eda como fuente principal de electricidad; la bater\u00eda se carga en un punto de carga externo (mercado, vecino, quiosco).", "fr": "Le m\u00e9nage utilise une batterie rechargeable ou une banque d''\u00e9nergie comme source principale d''\u00e9lectricit\u00e9 ; la batterie est charg\u00e9e \u00e0 un point de recharge externe (march\u00e9, voisin, kiosque)."}, "label": {"en": "Battery / power bank (charged elsewhere)", "es": "Bater\u00eda / banco de energ\u00eda (cargado en otro lugar)", "fr": "Batterie / banque d''\u00e9nergie (charg\u00e9e ailleurs)"}}, {"code": "other", "definition": {"en": "An electricity source not covered by the other categories. Requires additional specification.", "es": "Una fuente de electricidad no cubierta por las otras categor\u00edas. Requiere especificaci\u00f3n adicional.", "fr": "Une source d''\u00e9lectricit\u00e9 non couverte par les autres cat\u00e9gories. N\u00e9cessite une sp\u00e9cification suppl\u00e9mentaire."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
