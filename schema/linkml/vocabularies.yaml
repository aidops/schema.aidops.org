  YesNoDk:
    title:
      en: Yes / No / Don't know
      fr: Oui / Non / Ne sait pas
      es: Sí / No / No sabe
    description:
      en: Three-level response scale for factual questions where the respondent may genuinely be unable to provide a yes/no answer. 'Don't know' is a valid response distinct from refusal and must not be re-coded as missing or 'no'.
      fr: Échelle de réponse à trois niveaux pour les questions factuelles où le répondant peut genuinement être incapable de fournir une réponse oui/non. 'Ne sait pas' est une réponse valide distincte du refus et ne doit pas être recodée comme manquante ou 'non'.
      es: Escala de respuesta de tres niveles para preguntas factuales donde el encuestado puede genuinamente ser incapaz de proporcionar una respuesta sí/no. 'No sabe' es una respuesta válida distinta de la negativa y no debe recodificarse como faltante o 'no'.
    enum_uri: aidops:YesNoDk
    permissible_values:
      'yes':
        title:
          en: 'Yes'
          fr: Oui
          es: Sí
        description:
          en: The respondent confirms the condition or event.
          fr: Le répondant confirme la condition ou l'événement.
          es: El encuestado confirma la condición o el evento.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: The respondent denies the condition or event.
          fr: Le répondant nie la condition ou l'événement.
          es: El encuestado niega la condición o el evento.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know the answer. This is a valid response and must not be re-coded as 'no' or missing.
          fr: Le répondant ne connaît pas la réponse. Il s'agit d'une réponse valide qui ne doit pas être recodée comme 'non' ou manquante.
          es: El encuestado no sabe la respuesta. Esta es una respuesta válida y no debe recodificarse como 'no' o faltante.
