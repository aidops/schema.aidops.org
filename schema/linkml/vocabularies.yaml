 {"code": "dont_know", "definition": {"en": "Respondent cannot estimate the proportion of milk consumed versus sold or shared.", "es": "El encuestado no puede estimar la proporci\u00f3n de leche consumida frente a la vendida o compartida.", "fr": "Le r\u00e9pondant ne peut pas estimer la proportion de lait consomm\u00e9e par rapport au lait vendu ou partag\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
