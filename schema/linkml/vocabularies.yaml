y\u00e9)"}}, {"code": "utility_prepaid", "definition": {"en": "Household pays via a prepaid meter managed by the utility. MTF legality: meets Tier 4-5 criterion.", "es": "El hogar paga a trav\u00e9s de un medidor de prepago gestionado por el servicio p\u00fablico. Legalidad MTF: cumple el criterio de los Niveles 4 a 5.", "fr": "Le m\u00e9nage paie via un compteur pr\u00e9pay\u00e9 g\u00e9r\u00e9 par le service public. L\u00e9galit\u00e9 MTF : satisfait au crit\u00e8re des niveaux 4 \u00e0 5."}, "label": {"en": "Utility prepaid meter", "es": "Medidor de prepago del servicio p\u00fablico", "fr": "Compteur pr\u00e9pay\u00e9 du service public"}}, {"code": "authorized_agent", "definition": {"en": "Household pays an authorized reseller, energy kiosk, or licensed mini-grid operator. MTF legality: meets Tier 4-5 criterion.", "es": "El hogar paga a un revendedor autorizado, quiosco de energ\u00eda u operador de mini-red con licencia. Legalidad MTF: cumple el criterio de los Niveles 4 a 5.", "fr": "Le m\u00e9nage paie un revendeur agr\u00e9\u00e9, un kiosque \u00e9nerg\u00e9tique ou un op\u00e9rateur de mini-r\u00e9seau agr\u00e9\u00e9. L\u00e9galit\u00e9 MTF : satisfait au crit\u00e8re des niveaux 4 \u00e0 5."}, "label": {"en": "Authorized reseller or energy kiosk", "es": "Revendedor autorizado o quiosco de energ\u00eda", "fr": "Revendeur agr\u00e9\u00e9 ou kiosque \u00e9nerg\u00e9tique"}}, {"code": "informal_connection", "definition": {"en": "Household receives electricity through an informal connection with no contract \u2014 for example, sub-metered from a neighbor or connected without utility authorization. MTF legality: fails Tier 4+ criterion (Tier 1-3 only).", "es": "El hogar recibe electricidad a trav\u00e9s de una conexi\u00f3n informal sin contrato, por ejemplo, submedici\u00f3n desde un vecino o conexi\u00f3n sin autorizaci\u00f3n del servicio p\u00fablico. Legalidad MTF: no cumple el criterio de Nivel 4+ (solo Niveles 1 a 3).", "fr": "Le m\u00e9nage re\u00e7oit de l''\u00e9lectricit\u00e9 par un raccordement informel sans contrat \u2014 par exemple, sous-comptage chez un voisin ou connexion sans autorisation du service public. L\u00e9galit\u00e9 MTF : ne satisfait pas au crit\u00e8re de niveau 4+ (niveaux 1 \u00e0 3 seulement)."}, "label": {"en": "Informal connection (no contract, sub-metered from neighbor)", "es": "Conexi\u00f3n informal (sin contrato, submedici\u00f3n desde un vecino)", "fr": "Raccordement informel (sans contrat, sous-comptage chez un voisin)"}}, {"code": "free_no_payment", "definition": {"en": "Household receives electricity free of charge, for example from a community facility or humanitarian provision. No formal billing relationship. MTF legality: fails Tier 4+ criterion.", "es": "El hogar recibe electricidad de forma gratuita, por ejemplo, de una instalaci\u00f3n comunitaria o provisi\u00f3n humanitaria. Sin relaci\u00f3n de facturaci\u00f3n formal. Legalidad MTF: no cumple el criterio de Nivel 4+.", "fr": "Le m\u00e9nage re\u00e7oit de l''\u00e9lectricit\u00e9 gratuitement, par exemple d''une installation communautaire ou d''une aide humanitaire. Aucune relation de facturation formelle. L\u00e9galit\u00e9 MTF : ne satisfait pas au crit\u00e8re de niveau 4+."}, "label": {"en": "Free, no payment required", "es": "Gratuita, sin pago requerido", "fr": "Gratuite, aucun paiement requis"}}, {"code": "no_electricity", "definition": {"en": "Household has no electricity; billing status is not applicable.", "es": "El hogar no tiene electricidad; el estado de facturaci\u00f3n no es aplicable.", "fr": "Le m\u00e9nage n''a pas d''\u00e9lectricit\u00e9 ; le statut de facturation est sans objet."}, "label": {"en": "No electricity", "es": "Sin electricidad", "fr": "Pas d''\u00e9lectricit\u00e9"}}]}'
