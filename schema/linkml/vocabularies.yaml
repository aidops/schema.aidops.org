  PostHarvestLossBand:
    title:
      en: Post-Harvest Loss Band (proportion of stored harvest lost)
      fr: Tranche de perte post-récolte (proportion de la récolte stockée perdue)
      es: Banda de pérdida poscosecha (proporción de la cosecha almacenada perdida)
    description:
      en: Estimated proportion of stored harvest lost to spoilage, pests, or other post-harvest problems during the last agricultural season, expressed as a coarse band. Respondent-reported self-estimate; objective measurement requires FAO IPLS repeated visits during the storage period. The bands here are narrower than those used for in-season crop loss because post-harvest losses are typically smaller in magnitude. Aligned with SDG target 12.3.1 (food loss index) reporting conventions.
      fr: Proportion estimée de la récolte stockée perdue en raison de la détérioration, des ravageurs ou d'autres problèmes post-récolte au cours de la dernière saison agricole, exprimée sous forme de tranche grossière. Auto-estimation déclarée par le répondant ; la mesure objective nécessite des visites IPLS répétées de la FAO pendant la période de stockage. Les tranches ici sont plus étroites que celles utilisées pour les pertes de cultures en saison car les pertes post-récolte sont typiquement de moindre ampleur. Alignée avec les conventions de rapport de l'ODD 12.3.1 (indice de pertes alimentaires).
      es: Proporción estimada de la cosecha almacenada perdida por deterioro, plagas u otros problemas poscosecha durante la última temporada agrícola, expresada como una banda gruesa. Autoestimación reportada por el encuestado; la medición objetiva requiere visitas IPLS repetidas de la FAO durante el período de almacenamiento. Las bandas aquí son más estrechas que las utilizadas para pérdidas de cultivo en temporada porque las pérdidas poscosecha suelen ser de menor magnitud. Alineada con las convenciones de reporte del ODS 12.3.1 (índice de pérdidas de alimentos).
    enum_uri: aidops:PostHarvestLossBand
    permissible_values:
      none:
        title:
          en: No loss
          fr: Aucune perte
          es: Sin pérdida
        description:
          en: Household experienced no significant post-harvest loss.
          fr: Le ménage n'a subi aucune perte post-récolte significative.
          es: El hogar no experimentó pérdida poscosecha significativa.
      less_than_10pct:
        title:
          en: Less than 10%
          fr: Moins de 10 %
          es: Menos del 10 %
        description:
          en: Minor loss; less than one-tenth of stored harvest was lost.
          fr: Perte mineure ; moins d'un dixième de la récolte stockée a été perdu.
          es: Pérdida menor; se perdió menos de una décima parte de la cosecha almacenada.
      pct_10_to_25:
        title:
          en: 10–25%
          fr: 10–25 %
          es: 10–25 %
        description:
          en: Moderate loss; one-tenth to one-quarter of stored harvest was lost.
          fr: Perte modérée ; un dixième à un quart de la récolte stockée a été perdu.
          es: Pérdida moderada; se perdió entre una décima y un cuarto de la cosecha almacenada.
      more_than_25pct:
        title:
          en: More than 25%
          fr: Plus de 25 %
          es: Más del 25 %
        description:
          en: Significant loss; more than one-quarter of stored harvest was lost.
          fr: Perte significative ; plus d'un quart de la récolte stockée a été perdu.
          es: Pérdida significativa; se perdió más de un cuarto de la cosecha almacenada.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot estimate post-harvest loss. Retained as a distinct valid response.
          fr: Le répondant ne peut pas estimer la perte post-récolte. Conservée comme réponse valide distincte.
          es: El encuestado no puede estimar la pérdida poscosecha. Se mantiene como respuesta válida distinta.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-phl-guidelines"], "definition": {"en": "Estimated proportion of stored harvest lost to spoilage, pests, or other post-harvest problems during the last agricultural season, expressed as a coarse band. Respondent-reported self-estimate; objective measurement requires FAO IPLS repeated visits during the storage period. The bands here are narrower than those used for in-season crop loss because post-harvest losses are typically smaller in magnitude. Aligned with SDG target 12.3.1 (food loss index) reporting conventions.", "es": "Proporci\u00f3n estimada de la cosecha almacenada perdida por deterioro, plagas u otros problemas poscosecha durante la \u00faltima temporada agr\u00edcola, expresada como una banda gruesa. Autoestimaci\u00f3n reportada por el encuestado; la medici\u00f3n objetiva requiere visitas IPLS repetidas de la FAO durante el per\u00edodo de almacenamiento. Las bandas aqu\u00ed son m\u00e1s estrechas que las utilizadas para p\u00e9rdidas de cultivo en temporada porque las p\u00e9rdidas poscosecha suelen ser de menor magnitud. Alineada con las convenciones de reporte del ODS 12.3.1 (\u00edndice de p\u00e9rdidas de alimentos).", "fr": "Proportion estim\u00e9e de la r\u00e9colte stock\u00e9e perdue en raison de la d\u00e9t\u00e9rioration, des ravageurs ou d''autres probl\u00e8mes post-r\u00e9colte au cours de la derni\u00e8re saison agricole, exprim\u00e9e sous forme de tranche grossi\u00e8re. Auto-estimation d\u00e9clar\u00e9e par le r\u00e9pondant ; la mesure objective n\u00e9cessite des visites IPLS r\u00e9p\u00e9t\u00e9es de la FAO pendant la p\u00e9riode de stockage. Les tranches ici sont plus \u00e9troites que celles utilis\u00e9es pour les pertes de cultures en saison car les pertes post-r\u00e9colte sont typiquement de moindre ampleur. Align\u00e9e avec les conventions de rapport de l''ODD 12.3.1 (indice de pertes alimentaires)."}, "id": "post-harvest-loss-band", "label": {"en": "Post-Harvest Loss Band (proportion of stored harvest lost)", "es": "Banda de p\u00e9rdida poscosecha (proporci\u00f3n de la cosecha almacenada perdida)", "fr": "Tranche de perte post-r\u00e9colte (proportion de la r\u00e9colte stock\u00e9e perdue)"}, "maturity": "draft", "standard": {"name": "FAO Guidelines on measurement of harvest and post-harvest losses / SDG 12.3.1", "notes": "Band endpoints (10%, 25%) follow FAO post-harvest loss reporting conventions at household level. SDG 12.3.1 Food Loss Index uses these magnitudes as severity bands.", "uri": "https://openknowledge.fao.org/server/api/core/bitstreams/bd596c08-1202-4745-b23d-07bb5dc84b06/content"}, "values": [{"code": "none", "definition": {"en": "Household experienced no significant post-harvest loss.", "es": "El hogar no experiment\u00f3 p\u00e9rdida poscosecha significativa.", "fr": "Le m\u00e9nage n''a subi aucune perte post-r\u00e9colte significative."}, "label": {"en": "No loss", "es": "Sin p\u00e9rdida", "fr": "Aucune perte"}}, {"code": "less_than_10pct", "definition": {"en": "Minor loss; less than one-tenth of stored harvest was lost.", "es": "P\u00e9rdida menor; se perdi\u00f3 menos de una d\u00e9cima parte de la cosecha almacenada.", "fr": "Perte mineure ; moins d''un dixi\u00e8me de la r\u00e9colte stock\u00e9e a \u00e9t\u00e9 perdu."}, "label": {"en": "Less than 10%", "es": "Menos del 10 %", "fr": "Moins de 10 %"}}, {"code": "pct_10_to_25", "definition": {"en": "Moderate loss; one-tenth to one-quarter of stored harvest was lost.", "es": "P\u00e9rdida moderada; se perdi\u00f3 entre una d\u00e9cima y un cuarto de la cosecha almacenada.", "fr": "Perte mod\u00e9r\u00e9e ; un dixi\u00e8me \u00e0 un quart de la r\u00e9colte stock\u00e9e a \u00e9t\u00e9 perdu."}, "label": {"en": "10\u201325%", "es": "10\u201325 %", "fr": "10\u201325 %"}}, {"code": "more_than_25pct", "definition": {"en": "Significant loss; more than one-quarter of stored harvest was lost.", "es": "P\u00e9rdida significativa; se perdi\u00f3 m\u00e1s de un cuarto de la cosecha almacenada.", "fr": "Perte significative ; plus d''un quart de la r\u00e9colte stock\u00e9e a \u00e9t\u00e9 perdu."}, "label": {"en": "More than 25%", "es": "M\u00e1s del 25 %", "fr": "Plus de 25 %"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot estimate post-harvest loss. Retained as a distinct valid response.", "es": "El encuestado no puede estimar la p\u00e9rdida poscosecha. Se mantiene como respuesta v\u00e1lida distinta.", "fr": "Le r\u00e9pondant ne peut pas estimer la perte post-r\u00e9colte. Conserv\u00e9e comme r\u00e9ponse valide distincte."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
