  WeaiFrequency5:
    title:
      en: WEAI Five-Point Frequency Scale
      fr: Échelle de fréquence à cinq points WEAI
      es: Escala de frecuencia de cinco puntos WEAI
    description:
      en: Five-point frequency scale used in pro-WEAI Indicator A4 (respect among household members) items for trust, respect, and comfort with disagreement. Adequacy threshold for each item is 'most of the time' or 'always'.
      fr: Échelle de fréquence à cinq points utilisée dans les items de l'Indicateur A4 du pro-WEAI (respect entre membres du ménage) pour la confiance, le respect et le confort dans le désaccord. Le seuil d'adéquation pour chaque item est 'la plupart du temps' ou 'toujours'.
      es: Escala de frecuencia de cinco puntos utilizada en los ítems del Indicador A4 del pro-WEAI (respeto entre miembros del hogar) para la confianza, el respeto y la comodidad con el desacuerdo. El umbral de adecuación para cada ítem es 'la mayoría de las veces' o 'siempre'.
    enum_uri: aidops:WeaiFrequency5
    permissible_values:
      always:
        title:
          en: Always
          fr: Toujours
          es: Siempre
        description:
          en: The condition occurs all of the time. Meets adequacy threshold.
          fr: La condition se produit tout le temps. Satisfait au seuil d'adéquation.
          es: La condición ocurre todo el tiempo. Cumple el umbral de adecuación.
      most_of_the_time:
        title:
          en: Most of the time
          fr: La plupart du temps
          es: La mayoría de las veces
        description:
          en: The condition occurs most of the time. Meets adequacy threshold.
          fr: La condition se produit la plupart du temps. Satisfait au seuil d'adéquation.
          es: La condición ocurre la mayoría de las veces. Cumple el umbral de adecuación.
      sometimes:
        title:
          en: Sometimes
          fr: Parfois
          es: A veces
        description:
          en: The condition occurs occasionally but not most of the time. Does not meet adequacy threshold.
          fr: La condition se produit occasionnellement mais pas la plupart du temps. Ne satisfait pas au seuil d'adéquation.
          es: La condición ocurre ocasionalmente pero no la mayoría de las veces. No cumple el umbral de adecuación.
      rarely:
        title:
          en: Rarely
          fr: Rarement
          es: Raramente
        description:
          en: The condition occurs infrequently. Does not meet adequacy threshold.
          fr: La condition se produit rarement. Ne satisfait pas au seuil d'adéquation.
          es: La condición ocurre con poca frecuencia. No cumple el umbral de adecuación.
      never:
        title:
          en: Never
          fr: Jamais
          es: Nunca
        description:
          en: The condition never occurs. Does not meet adequacy threshold.
          fr: La condition ne se produit jamais. Ne satisfait pas au seuil d'adéquation.
          es: La condición nunca ocurre. No cumple el umbral de adecuación.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Five-point frequency scale used in pro-WEAI Indicator A4 (respect among household members) items for trust, respect, and comfort with disagreement. Adequacy threshold for each item is ''most of the time'' or ''always''.", "es": "Escala de frecuencia de cinco puntos utilizada en los \u00edtems del Indicador A4 del pro-WEAI (respeto entre miembros del hogar) para la confianza, el respeto y la comodidad con el desacuerdo. El umbral de adecuaci\u00f3n para cada \u00edtem es ''la mayor\u00eda de las veces'' o ''siempre''.", "fr": "\u00c9chelle de fr\u00e9quence \u00e0 cinq points utilis\u00e9e dans les items de l''Indicateur A4 du pro-WEAI (respect entre membres du m\u00e9nage) pour la confiance, le respect et le confort dans le d\u00e9saccord. Le seuil d''ad\u00e9quation pour chaque item est ''la plupart du temps'' ou ''toujours''."}, "id": "weai-frequency-5", "label": {"en": "WEAI Five-Point Frequency Scale", "es": "Escala de frecuencia de cinco puntos WEAI", "fr": "\u00c9chelle de fr\u00e9quence \u00e0 cinq points WEAI"}, "maturity": "draft", "standard": {"name": "pro-WEAI User Guide v3 (IFPRI 2026)", "uri": "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"}, "values": [{"code": "always", "definition": {"en": "The condition occurs all of the time. Meets adequacy threshold.", "es": "La condici\u00f3n ocurre todo el tiempo. Cumple el umbral de adecuaci\u00f3n.", "fr": "La condition se produit tout le temps. Satisfait au seuil d''ad\u00e9quation."}, "label": {"en": "Always", "es": "Siempre", "fr": "Toujours"}}, {"code": "most_of_the_time", "definition": {"en": "The condition occurs most of the time. Meets adequacy threshold.", "es": "La condici\u00f3n ocurre la mayor\u00eda de las veces. Cumple el umbral de adecuaci\u00f3n.", "fr": "La condition se produit la plupart du temps. Satisfait au seuil d''ad\u00e9quation."}, "label": {"en": "Most of the time", "es": "La mayor\u00eda de las veces", "fr": "La plupart du temps"}}, {"code": "sometimes", "definition": {"en": "The condition occurs occasionally but not most of the time. Does not meet adequacy threshold.", "es": "La condici\u00f3n ocurre ocasionalmente pero no la mayor\u00eda de las veces. No cumple el umbral de adecuaci\u00f3n.", "fr": "La condition se produit occasionnellement mais pas la plupart du temps. Ne satisfait pas au seuil d''ad\u00e9quation."}, "label": {"en": "Sometimes", "es": "A veces", "fr": "Parfois"}}, {"code": "rarely", "definition": {"en": "The condition occurs infrequently. Does not meet adequacy threshold.", "es": "La condici\u00f3n ocurre con poca frecuencia. No cumple el umbral de adecuaci\u00f3n.", "fr": "La condition se produit rarement. Ne satisfait pas au seuil d''ad\u00e9quation."}, "label": {"en": "Rarely", "es": "Raramente", "fr": "Rarement"}}, {"code": "never", "definition": {"en": "The condition never occurs. Does not meet adequacy threshold.", "es": "La condici\u00f3n nunca ocurre. No cumple el umbral de adecuaci\u00f3n.", "fr": "La condition ne se produit jamais. Ne satisfait pas au seuil d''ad\u00e9quation."}, "label": {"en": "Never", "es": "Nunca", "fr": "Jamais"}}]}'
