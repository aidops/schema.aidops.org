  WarningProtectiveAction:
    title:
      en: Warning Protective Action
      fr: Action de protection sur alerte
      es: Acción de protección ante alerta
    description:
      en: 'The protective or mitigating actions a household took in response to an early warning for a hazard event. Covers evacuation (partial or full), asset and livestock movement, shelter reinforcement, stockpiling of food, water, fuel, and cash, information seeking, alerting others, relocating vulnerable members first, securing identity documents, partial evacuation of some members, and an explicit ''no action taken'' code. The vocabulary is hazard-agnostic: actions that are not relevant to a specific hazard (for example moving livestock during an epidemic) are simply not selected. The ''no action taken'' code is mutually exclusive with all other codes; this constraint is expected to be enforced in the data-collection form.'
      fr: 'Les actions de protection ou d''atténuation prises par un ménage en réponse à une alerte précoce pour un événement dangereux. Couvre l''évacuation (partielle ou totale), le déplacement de biens et de bétail, le renforcement de l''abri, le stockage de nourriture, d''eau, de combustible et d''argent, la recherche d''information, l''alerte d''autres personnes, la relocalisation prioritaire des membres vulnérables, la mise en sécurité des documents d''identité, l''évacuation partielle de certains membres, et un code explicite « aucune action prise ». Le vocabulaire est indépendant du type de danger : les actions non pertinentes pour un danger donné (par exemple déplacer le bétail lors d''une épidémie) ne sont simplement pas sélectionnées. Le code « aucune action prise » est mutuellement exclusif avec tous les autres codes ; cette contrainte doit être appliquée dans le formulaire de collecte.'
      es: 'Las acciones de protección o mitigación que un hogar tomó en respuesta a una alerta temprana para un evento de peligro. Abarca la evacuación (parcial o total), el traslado de bienes y ganado, el refuerzo del refugio, el acopio de alimentos, agua, combustible y dinero, la búsqueda de información, el aviso a otras personas, la reubicación prioritaria de miembros vulnerables, la puesta a resguardo de documentos de identidad, la evacuación parcial de algunos miembros, y un código explícito «ninguna acción tomada». El vocabulario es independiente del tipo de peligro: las acciones no pertinentes para un peligro dado (por ejemplo trasladar ganado durante una epidemia) simplemente no se seleccionan. El código «ninguna acción tomada» es mutuamente excluyente con todos los demás códigos; esta restricción debe aplicarse en el formulario de recolección.'
    enum_uri: aidops:WarningProtectiveAction
    permissible_values:
      evacuated_members:
        title:
          en: Some members evacuated
          fr: Certains membres ont été évacués
          es: Algunos miembros fueron evacuados
        description:
          en: Some household members moved to a safer location before, during, or immediately after the event.
          fr: Certains membres du ménage se sont déplacés vers un lieu plus sûr avant, pendant ou juste après l'événement.
          es: Algunos miembros del hogar se trasladaron a un lugar más seguro antes, durante o inmediatamente después del evento.
      evacuated_all:
        title:
          en: All members evacuated
          fr: Tous les membres ont été évacués
          es: Todos los miembros fueron evacuados
        description:
          en: The whole household moved to a safer location.
          fr: L'ensemble du ménage s'est déplacé vers un lieu plus sûr.
          es: Todo el hogar se trasladó a un lugar más seguro.
      moved_livestock:
        title:
          en: Moved livestock
          fr: Bétail déplacé
          es: Ganado trasladado
        description:
          en: Livestock or other animals moved to higher ground, a safer shelter, or a different area.
          fr: Bétail ou autres animaux déplacés vers un terrain plus élevé, un abri plus sûr ou une autre zone.
          es: Ganado u otros animales trasladados a terreno más alto, refugio más seguro u otra zona.
      moved_valuable_assets:
        title:
          en: Moved valuable assets
          fr: Biens de valeur déplacés
          es: Bienes valiosos trasladados
        description:
          en: Household assets such as tools, furniture, or stored crops relocated to a safer place.
          fr: Biens du ménage tels qu'outils, meubles ou cultures stockées déplacés vers un lieu plus sûr.
          es: Bienes del hogar como herramientas, muebles o cultivos almacenados trasladados a un lugar más seguro.
      reinforced_shelter:
        title:
          en: Reinforced dwelling
          fr: Logement renforcé
          es: Vivienda reforzada
        description:
          en: Roof tied down, walls braced, windows covered, sandbags placed, or comparable structural reinforcement.
          fr: Toit arrimé, murs étayés, fenêtres protégées, sacs de sable placés ou renforcement structurel comparable.
          es: Techo amarrado, paredes apuntaladas, ventanas protegidas, sacos de arena colocados o refuerzo estructural comparable.
      stockpiled_food:
        title:
          en: Stockpiled food
          fr: Nourriture stockée
          es: Alimentos almacenados
        description:
          en: Additional food stored in anticipation of restricted access during or after the event.
          fr: Nourriture supplémentaire stockée en prévision d'un accès restreint pendant ou après l'événement.
          es: Alimentos adicionales almacenados en previsión de acceso restringido durante o después del evento.
      stockpiled_water:
        title:
          en: Stockpiled water
          fr: Eau stockée
          es: Agua almacenada
        description:
          en: Clean water stored in containers in anticipation of supply disruption.
          fr: Eau propre stockée dans des récipients en prévision d'une interruption de l'approvisionnement.
          es: Agua limpia almacenada en recipientes en previsión de una interrupción del suministro.
      stockpiled_fuel_cash:
        title:
          en: Stockpiled fuel or cash
          fr: Combustible ou argent stocké
          es: Combustible o efectivo acopiado
        description:
          en: Cooking fuel, lighting fuel, or cash withdrawn and stored.
          fr: Combustible de cuisson, combustible d'éclairage, ou argent retiré et stocké.
          es: Combustible para cocina, combustible para iluminación, o dinero retirado y almacenado.
      sought_more_information:
        title:
          en: Sought more information
          fr: Recherche d'information supplémentaire
          es: Buscó más información
        description:
          en: Actively looked for further information through radio, phone, neighbors, or officials.
          fr: Recherche active d'informations complémentaires via la radio, le téléphone, les voisins ou les responsables.
          es: Buscó activamente más información a través de la radio, el teléfono, los vecinos o los funcionarios.
      alerted_neighbors_relatives:
        title:
          en: Alerted neighbors or relatives
          fr: Voisins ou proches alertés
          es: Alertó a vecinos o familiares
        description:
          en: Passed the warning on to other people.
          fr: L'alerte a été transmise à d'autres personnes.
          es: La alerta se transmitió a otras personas.
      moved_children_elderly_first:
        title:
          en: Moved children, elderly, or disabled members first
          fr: Enfants, personnes âgées ou handicapées déplacés en priorité
          es: Niños, personas mayores o con discapacidad trasladados primero
        description:
          en: Vulnerable household members were pre-emptively relocated.
          fr: Les membres vulnérables du ménage ont été déplacés de manière anticipée.
          es: Los miembros vulnerables del hogar fueron reubicados de forma anticipada.
      secured_documents:
        title:
          en: Secured identity documents
          fr: Documents d'identité mis en sécurité
          es: Documentos de identidad resguardados
        description:
          en: Identity cards, land titles, and health records gathered and protected.
          fr: Cartes d'identité, titres fonciers et dossiers de santé rassemblés et protégés.
          es: Tarjetas de identidad, títulos de tierras y registros de salud reunidos y protegidos.
      sent_members_to_safer_location:
        title:
          en: Sent some members to relatives or a safer area
          fr: Certains membres envoyés chez des proches ou dans une zone plus sûre
          es: Algunos miembros enviados con familiares o a una zona más segura
        description:
          en: Partial evacuation, typically of women, children, or elderly members to relatives' homes.
          fr: Évacuation partielle, typiquement des femmes, des enfants ou des personnes âgées chez des proches.
          es: Evacuación parcial, típicamente de mujeres, niños o personas mayores hacia casas de familiares.
      no_action_taken:
        title:
          en: No action taken
          fr: Aucune action prise
          es: Ninguna acción tomada
        description:
          en: The household did not take any protective action in response to the warning. Mutually exclusive with all other values.
          fr: Le ménage n'a pris aucune action de protection en réponse à l'alerte. Mutuellement exclusif avec toutes les autres valeurs.
          es: El hogar no tomó ninguna acción de protección en respuesta a la alerta. Mutuamente excluyente con todos los demás valores.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Protective action not listed above.
          fr: Action de protection non répertoriée ci-dessus.
          es: Acción de protección no listada arriba.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gfdrr-aa-toolkit-2023", "ifrc-aa-eap-template-2022", "ifrc-fbf-ma-guide-2019"], "definition": {"en": "The protective or mitigating actions a household took in response to an early warning for a hazard event. Covers evacuation (partial or full), asset and livestock movement, shelter reinforcement, stockpiling of food, water, fuel, and cash, information seeking, alerting others, relocating vulnerable members first, securing identity documents, partial evacuation of some members, and an explicit ''no action taken'' code. The vocabulary is hazard-agnostic: actions that are not relevant to a specific hazard (for example moving livestock during an epidemic) are simply not selected. The ''no action taken'' code is mutually exclusive with all other codes; this constraint is expected to be enforced in the data-collection form.", "es": "Las acciones de protecci\u00f3n o mitigaci\u00f3n que un hogar tom\u00f3 en respuesta a una alerta temprana para un evento de peligro. Abarca la evacuaci\u00f3n (parcial o total), el traslado de bienes y ganado, el refuerzo del refugio, el acopio de alimentos, agua, combustible y dinero, la b\u00fasqueda de informaci\u00f3n, el aviso a otras personas, la reubicaci\u00f3n prioritaria de miembros vulnerables, la puesta a resguardo de documentos de identidad, la evacuaci\u00f3n parcial de algunos miembros, y un c\u00f3digo expl\u00edcito \u00abninguna acci\u00f3n tomada\u00bb. El vocabulario es independiente del tipo de peligro: las acciones no pertinentes para un peligro dado (por ejemplo trasladar ganado durante una epidemia) simplemente no se seleccionan. El c\u00f3digo \u00abninguna acci\u00f3n tomada\u00bb es mutuamente excluyente con todos los dem\u00e1s c\u00f3digos; esta restricci\u00f3n debe aplicarse en el formulario de recolecci\u00f3n.", "fr": "Les actions de protection ou d''att\u00e9nuation prises par un m\u00e9nage en r\u00e9ponse \u00e0 une alerte pr\u00e9coce pour un \u00e9v\u00e9nement dangereux. Couvre l''\u00e9vacuation (partielle ou totale), le d\u00e9placement de biens et de b\u00e9tail, le renforcement de l''abri, le stockage de nourriture, d''eau, de combustible et d''argent, la recherche d''information, l''alerte d''autres personnes, la relocalisation prioritaire des membres vuln\u00e9rables, la mise en s\u00e9curit\u00e9 des documents d''identit\u00e9, l''\u00e9vacuation partielle de certains membres, et un code explicite \u00ab aucune action prise \u00bb. Le vocabulaire est ind\u00e9pendant du type de danger : les actions non pertinentes pour un danger donn\u00e9 (par exemple d\u00e9placer le b\u00e9tail lors d''une \u00e9pid\u00e9mie) ne sont simplement pas s\u00e9lectionn\u00e9es. Le code \u00ab aucune action prise \u00bb est mutuellement exclusif avec tous les autres codes ; cette contrainte doit \u00eatre appliqu\u00e9e dans le formulaire de collecte."}, "id": "warning-protective-action", "label": {"en": "Warning Protective Action", "es": "Acci\u00f3n de protecci\u00f3n ante alerta", "fr": "Action de protection sur alerte"}, "maturity": "draft", "standard": {"name": "IFRC Forecast-based Financing Early Action Protocol (EAP) standard early action menu; FAO Anticipatory Action simulation toolkit; Start Network Distribution Evaluation Framework action inventory", "notes": "Codes consolidate the standard early-action menus used in IFRC EAPs for flood, cyclone, drought, and heatwave programs (Bangladesh, Mozambique, Philippines, Niger, Mongolia) with the Start Network DEF action inventory and the World Bank GFDRR AA Toolkit menu.", "uri": "https://www.anticipation-hub.org/"}, "values": [{"code": "evacuated_members", "definition": {"en": "Some household members moved to a safer location before, during, or immediately after the event.", "es": "Algunos miembros del hogar se trasladaron a un lugar m\u00e1s seguro antes, durante o inmediatamente despu\u00e9s del evento.", "fr": "Certains membres du m\u00e9nage se sont d\u00e9plac\u00e9s vers un lieu plus s\u00fbr avant, pendant ou juste apr\u00e8s l''\u00e9v\u00e9nement."}, "label": {"en": "Some members evacuated", "es": "Algunos miembros fueron evacuados", "fr": "Certains membres ont \u00e9t\u00e9 \u00e9vacu\u00e9s"}}, {"code": "evacuated_all", "definition": {"en": "The whole household moved to a safer location.", "es": "Todo el hogar se traslad\u00f3 a un lugar m\u00e1s seguro.", "fr": "L''ensemble du m\u00e9nage s''est d\u00e9plac\u00e9 vers un lieu plus s\u00fbr."}, "label": {"en": "All members evacuated", "es": "Todos los miembros fueron evacuados", "fr": "Tous les membres ont \u00e9t\u00e9 \u00e9vacu\u00e9s"}}, {"code": "moved_livestock", "definition": {"en": "Livestock or other animals moved to higher ground, a safer shelter, or a different area.", "es": "Ganado u otros animales trasladados a terreno m\u00e1s alto, refugio m\u00e1s seguro u otra zona.", "fr": "B\u00e9tail ou autres animaux d\u00e9plac\u00e9s vers un terrain plus \u00e9lev\u00e9, un abri plus s\u00fbr ou une autre zone."}, "label": {"en": "Moved livestock", "es": "Ganado trasladado", "fr": "B\u00e9tail d\u00e9plac\u00e9"}}, {"code": "moved_valuable_assets", "definition": {"en": "Household assets such as tools, furniture, or stored crops relocated to a safer place.", "es": "Bienes del hogar como herramientas, muebles o cultivos almacenados trasladados a un lugar m\u00e1s seguro.", "fr": "Biens du m\u00e9nage tels qu''outils, meubles ou cultures stock\u00e9es d\u00e9plac\u00e9s vers un lieu plus s\u00fbr."}, "label": {"en": "Moved valuable assets", "es": "Bienes valiosos trasladados", "fr": "Biens de valeur d\u00e9plac\u00e9s"}}, {"code": "reinforced_shelter", "definition": {"en": "Roof tied down, walls braced, windows covered, sandbags placed, or comparable structural reinforcement.", "es": "Techo amarrado, paredes apuntaladas, ventanas protegidas, sacos de arena colocados o refuerzo estructural comparable.", "fr": "Toit arrim\u00e9, murs \u00e9tay\u00e9s, fen\u00eatres prot\u00e9g\u00e9es, sacs de sable plac\u00e9s ou renforcement structurel comparable."}, "label": {"en": "Reinforced dwelling", "es": "Vivienda reforzada", "fr": "Logement renforc\u00e9"}}, {"code": "stockpiled_food", "definition": {"en": "Additional food stored in anticipation of restricted access during or after the event.", "es": "Alimentos adicionales almacenados en previsi\u00f3n de acceso restringido durante o despu\u00e9s del evento.", "fr": "Nourriture suppl\u00e9mentaire stock\u00e9e en pr\u00e9vision d''un acc\u00e8s restreint pendant ou apr\u00e8s l''\u00e9v\u00e9nement."}, "label": {"en": "Stockpiled food", "es": "Alimentos almacenados", "fr": "Nourriture stock\u00e9e"}}, {"code": "stockpiled_water", "definition": {"en": "Clean water stored in containers in anticipation of supply disruption.", "es": "Agua limpia almacenada en recipientes en previsi\u00f3n de una interrupci\u00f3n del suministro.", "fr": "Eau propre stock\u00e9e dans des r\u00e9cipients en pr\u00e9vision d''une interruption de l''approvisionnement."}, "label": {"en": "Stockpiled water", "es": "Agua almacenada", "fr": "Eau stock\u00e9e"}}, {"code": "stockpiled_fuel_cash", "definition": {"en": "Cooking fuel, lighting fuel, or cash withdrawn and stored.", "es": "Combustible para cocina, combustible para iluminaci\u00f3n, o dinero retirado y almacenado.", "fr": "Combustible de cuisson, combustible d''\u00e9clairage, ou argent retir\u00e9 et stock\u00e9."}, "label": {"en": "Stockpiled fuel or cash", "es": "Combustible o efectivo acopiado", "fr": "Combustible ou argent stock\u00e9"}}, {"code": "sought_more_information", "definition": {"en": "Actively looked for further information through radio, phone, neighbors, or officials.", "es": "Busc\u00f3 activamente m\u00e1s informaci\u00f3n a trav\u00e9s de la radio, el tel\u00e9fono, los vecinos o los funcionarios.", "fr": "Recherche active d''informations compl\u00e9mentaires via la radio, le t\u00e9l\u00e9phone, les voisins ou les responsables."}, "label": {"en": "Sought more information", "es": "Busc\u00f3 m\u00e1s informaci\u00f3n", "fr": "Recherche d''information suppl\u00e9mentaire"}}, {"code": "alerted_neighbors_relatives", "definition": {"en": "Passed the warning on to other people.", "es": "La alerta se transmiti\u00f3 a otras personas.", "fr": "L''alerte a \u00e9t\u00e9 transmise \u00e0 d''autres personnes."}, "label": {"en": "Alerted neighbors or relatives", "es": "Alert\u00f3 a vecinos o familiares", "fr": "Voisins ou proches alert\u00e9s"}}, {"code": "moved_children_elderly_first", "definition": {"en": "Vulnerable household members were pre-emptively relocated.", "es": "Los miembros vulnerables del hogar fueron reubicados de forma anticipada.", "fr": "Les membres vuln\u00e9rables du m\u00e9nage ont \u00e9t\u00e9 d\u00e9plac\u00e9s de mani\u00e8re anticip\u00e9e."}, "label": {"en": "Moved children, elderly, or disabled members first", "es": "Ni\u00f1os, personas mayores o con discapacidad trasladados primero", "fr": "Enfants, personnes \u00e2g\u00e9es ou handicap\u00e9es d\u00e9plac\u00e9s en priorit\u00e9"}}, {"code": "secured_documents", "definition": {"en": "Identity cards, land titles, and health records gathered and protected.", "es": "Tarjetas de identidad, t\u00edtulos de tierras y registros de salud reunidos y protegidos.", "fr": "Cartes d''identit\u00e9, titres fonciers et dossiers de sant\u00e9 rassembl\u00e9s et prot\u00e9g\u00e9s."}, "label": {"en": "Secured identity documents", "es": "Documentos de identidad resguardados", "fr": "Documents d''identit\u00e9 mis en s\u00e9curit\u00e9"}}, {"code": "sent_members_to_safer_location", "definition": {"en": "Partial evacuation, typically of women, children, or elderly members to relatives'' homes.", "es": "Evacuaci\u00f3n parcial, t\u00edpicamente de mujeres, ni\u00f1os o personas mayores hacia casas de familiares.", "fr": "\u00c9vacuation partielle, typiquement des femmes, des enfants ou des personnes \u00e2g\u00e9es chez des proches."},
        "label": {"en": "Sent some members to relatives or a safer area", "es": "Algunos miembros enviados con familiares o a una zona m\u00e1s segura", "fr": "Certains membres envoy\u00e9s chez des proches ou dans une zone plus s\u00fbre"}}, {"code": "no_action_taken", "definition": {"en": "The household did not take any protective action in response to the warning. Mutually exclusive with all other values.", "es": "El hogar no tom\u00f3 ninguna acci\u00f3n de protecci\u00f3n en respuesta a la alerta. Mutuamente excluyente con todos los dem\u00e1s valores.", "fr": "Le m\u00e9nage n''a pris aucune action de protection en r\u00e9ponse \u00e0 l''alerte. Mutuellement exclusif avec toutes les autres valeurs."}, "label": {"en": "No action taken", "es": "Ninguna acci\u00f3n tomada", "fr": "Aucune action prise"}}, {"code": "other", "definition": {"en": "Protective action not listed above.", "es": "Acci\u00f3n de protecci\u00f3n no listada arriba.", "fr": "Action de protection non r\u00e9pertori\u00e9e ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
