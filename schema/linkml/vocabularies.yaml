  WeaiAssetOwnership:
    title:
      en: WEAI Asset Ownership Status
      fr: Statut de propriété d'actif WEAI
      es: Estado de propiedad de activo WEAI
    description:
      en: 'Three-code ownership classification used in pro-WEAI Indicator B2 (ownership of land and other assets). Adequacy requires the respondent to solely or jointly own at least one of: three or more small assets, two or more large assets, or any land.'
      fr: 'Classification de propriété à trois codes utilisée dans l''indicateur B2 du pro-WEAI (propriété de terres et d''autres actifs). L''adéquation nécessite que le répondant possède seul ou conjointement au moins l''un des éléments suivants : trois actifs de petite taille ou plus, deux actifs de grande taille ou plus, ou des terres.'
      es: 'Clasificación de propiedad de tres códigos utilizada en el indicador B2 del pro-WEAI (propiedad de tierras y otros activos). La adecuación requiere que el encuestado posea solo o conjuntamente al menos uno de: tres o más activos pequeños, dos o más activos grandes, o cualquier tierra.'
    enum_uri: aidops:WeaiAssetOwnership
    permissible_values:
      not_owned:
        title:
          en: Not owned
          fr: Non possédé
          es: No poseído
        description:
          en: The respondent does not own this asset. Does not contribute to B2 adequacy for this asset type.
          fr: Le répondant ne possède pas cet actif. Ne contribue pas à l'adéquation B2 pour ce type d'actif.
          es: El encuestado no posee este activo. No contribuye a la adecuación B2 para este tipo de activo.
      owned_solely:
        title:
          en: Owned solely
          fr: Possédé en propre
          es: Poseído en solitario
        description:
          en: The respondent is the sole owner of this asset. Counts toward B2 adequacy.
          fr: Le répondant est le seul propriétaire de cet actif. Compte pour l'adéquation B2.
          es: El encuestado es el único propietario de este activo. Cuenta para la adecuación B2.
      owned_jointly:
        title:
          en: Owned jointly
          fr: Possédé conjointement
          es: Poseído conjuntamente
        description:
          en: The respondent jointly owns this asset with one or more other household members. Counts toward B2 adequacy.
          fr: Le répondant possède cet actif conjointement avec un ou plusieurs autres membres du ménage. Compte pour l'adéquation B2.
          es: El encuestado posee este activo conjuntamente con uno o más otros miembros del hogar. Cuenta para la adecuación B2.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Three-code ownership classification used in pro-WEAI Indicator B2 (ownership of land and other assets). Adequacy requires the respondent to solely or jointly own at least one of: three or more small assets, two or more large assets, or any land.", "es": "Clasificaci\u00f3n de propiedad de tres c\u00f3digos utilizada en el indicador B2 del pro-WEAI (propiedad de tierras y otros activos). La adecuaci\u00f3n requiere que el encuestado posea solo o conjuntamente al menos uno de: tres o m\u00e1s activos peque\u00f1os, dos o m\u00e1s activos grandes, o cualquier tierra.", "fr": "Classification de propri\u00e9t\u00e9 \u00e0 trois codes utilis\u00e9e dans l''indicateur B2 du pro-WEAI (propri\u00e9t\u00e9 de terres et d''autres actifs). L''ad\u00e9quation n\u00e9cessite que le r\u00e9pondant poss\u00e8de seul ou conjointement au moins l''un des \u00e9l\u00e9ments suivants : trois actifs de petite taille ou plus, deux actifs de grande taille ou plus, ou des terres."}, "id": "weai-asset-ownership", "label": {"en": "WEAI Asset Ownership Status", "es": "Estado de propiedad de activo WEAI", "fr": "Statut de propri\u00e9t\u00e9 d''actif WEAI"}, "maturity": "draft", "standard": {"name": "pro-WEAI User Guide v3 (IFPRI 2026)", "uri": "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"}, "values": [{"code": "not_owned", "definition": {"en": "The respondent does not own this asset. Does not contribute to B2 adequacy for this asset type.", "es": "El encuestado no posee este activo. No contribuye a la adecuaci\u00f3n B2 para este tipo de activo.", "fr": "Le r\u00e9pondant ne poss\u00e8de pas cet actif. Ne contribue pas \u00e0 l''ad\u00e9quation B2 pour ce type d''actif."}, "label": {"en": "Not owned", "es": "No pose\u00eddo", "fr": "Non poss\u00e9d\u00e9"}}, {"code": "owned_solely", "definition": {"en": "The respondent is the sole owner of this asset. Counts toward B2 adequacy.", "es": "El encuestado es el \u00fanico propietario de este activo. Cuenta para la adecuaci\u00f3n B2.", "fr": "Le r\u00e9pondant est le seul propri\u00e9taire de cet actif. Compte pour l''ad\u00e9quation B2."}, "label": {"en": "Owned solely", "es": "Pose\u00eddo en solitario", "fr": "Poss\u00e9d\u00e9 en propre"}}, {"code": "owned_jointly", "definition": {"en": "The respondent jointly owns this asset with one or more other household members. Counts toward B2 adequacy.", "es": "El encuestado posee este activo conjuntamente con uno o m\u00e1s otros miembros del hogar. Cuenta para la adecuaci\u00f3n B2.", "fr": "Le r\u00e9pondant poss\u00e8de cet actif conjointement avec un ou plusieurs autres membres du m\u00e9nage. Compte pour l''ad\u00e9quation B2."}, "label": {"en": "Owned jointly", "es": "Pose\u00eddo conjuntamente", "fr": "Poss\u00e9d\u00e9 conjointement"}}]}'
