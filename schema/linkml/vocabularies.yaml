      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Four-level scale for assessing whether a shelter provides adequate thermal comfort throughout the year, including the coldest or hottest season. Includes a ''don''t know'' option to capture seasonal uncertainty or recent occupancy. Based on Sphere Standard 3 guidance on thermal comfort for warm/humid and cold climates.", "es": "Escala de cuatro niveles para evaluar si un refugio proporciona confort t\u00e9rmico adecuado durante todo el a\u00f1o, incluyendo la temporada m\u00e1s fr\u00eda o m\u00e1s caliente. Incluye una opci\u00f3n ''no sabe'' para capturar la incertidumbre estacional o la ocupaci\u00f3n reciente. Basada en la orientaci\u00f3n de la Norma Esfera 3 sobre el confort t\u00e9rmico para climas c\u00e1lidos/h\u00famedos y fr\u00edos.", "fr": "\u00c9chelle \u00e0 quatre niveaux pour \u00e9valuer si un abri offre un confort thermique ad\u00e9quat tout au long de l''ann\u00e9e, y compris la saison la plus froide ou la plus chaude. Inclut une option ''ne sait pas'' pour capturer l''incertitude saisonni\u00e8re ou une occupation r\u00e9cente. Bas\u00e9e sur les orientations de la Norme Sph\u00e8re 3 sur le confort thermique pour les climats chauds/humides et froids."}, "id": "thermal-comfort-adequacy", "label": {"en": "Thermal comfort adequacy scale", "es": "Escala de adecuaci\u00f3n del confort t\u00e9rmico", "fr": "\u00c9chelle d''ad\u00e9quation du confort thermique"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "The shelter provides adequate warmth or cooling throughout the year, including in the coldest or hottest season.", "es": "El refugio proporciona calor o frescura adecuados durante todo el a\u00f1o, incluyendo en la temporada m\u00e1s fr\u00eda o m\u00e1s caliente.", "fr": "L''abri fournit une chaleur ou une fra\u00eecheur ad\u00e9quate tout au long de l''ann\u00e9e, y compris pendant la saison la plus froide ou la plus chaude."}, "label": {"en": "Yes \u2014 adequate in all seasons", "es": "S\u00ed \u2014 adecuado en todas las estaciones", "fr": "Oui \u2014 ad\u00e9quat en toutes saisons"}}, {"code": "partial", "definition": {"en": "The shelter is thermally comfortable in some seasons but inadequate in at least one season (e.g., too cold in winter or too hot in summer).", "es": "El refugio es t\u00e9rmicamente c\u00f3modo en algunas estaciones pero inadecuado en al menos una estaci\u00f3n (p. ej., demasiado fr\u00edo en invierno o demasiado caliente en verano).", "fr": "L''abri est thermiquement confortable en certaines saisons mais inad\u00e9quat dans au moins une saison (p. ex., trop froid en hiver ou trop chaud en \u00e9t\u00e9)."}, "label": {"en": "Partial \u2014 adequate in some seasons but not all", "es": "Parcial \u2014 adecuado en algunas estaciones pero no en todas", "fr": "Partiel \u2014 ad\u00e9quat pour certaines saisons mais pas toutes"}}, {"code": "no", "definition": {"en": "The shelter does not provide adequate thermal comfort in any season.", "es": "El refugio no proporciona confort t\u00e9rmico adecuado en ninguna estaci\u00f3n.", "fr": "L''abri ne fournit pas un confort thermique ad\u00e9quat dans aucune saison."}, "label": {"en": "No \u2014 not adequately warm or cool", "es": "No \u2014 no suficientemente c\u00e1lido o fresco", "fr": "Non \u2014 pas suffisamment chaud ou frais"}}, {"code": "dont_know", "definition": {"en": "The respondent is unable to assess thermal comfort, typically because they have not occupied the shelter through all seasons.", "es": "El encuestado no puede evaluar el confort t\u00e9rmico, generalmente porque no ha ocupado el refugio durante todas las estaciones.", "fr": "Le r\u00e9pondant n''est pas en mesure d''\u00e9valuer le confort thermique, g\u00e9n\u00e9ralement parce qu''il n''a pas occup\u00e9 l''abri pendant toutes les saisons."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
