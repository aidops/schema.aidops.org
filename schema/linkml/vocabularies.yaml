  WaterAccessLivestock:
    title:
      en: Livestock Water Access at Seasonal Water Points
      fr: Accès à l'eau pour le bétail aux points d'eau saisonniers
      es: Acceso al agua para el ganado en puntos de agua estacionales
    description:
      en: Adequacy of water access for livestock at seasonal water points along the household's migration route. Used in PastoralFoodSecurityProfile for the `water_point_access` property. This vocabulary covers livestock watering only — not household WASH water access. Severity codes align with Sphere 2018 LEGS livestock water standards and FAO GIEWS water-point monitoring categories.
      fr: Adéquation de l'accès à l'eau pour le bétail aux points d'eau saisonniers le long de la route de migration du ménage. Couvre uniquement l'abreuvement du bétail — pas l'accès à l'eau WASH du ménage. Les codes de gravité s'alignent sur les normes LEGS Sphère 2018 et les catégories de suivi FAO GIEWS.
      es: Adecuación del acceso al agua para el ganado en puntos de agua estacionales a lo largo de la ruta de migración del hogar. Cubre solo el abrevadero del ganado — no el acceso al agua WASH del hogar. Los códigos de gravedad se alinean con los estándares LEGS Esfera 2018 y las categorías de monitoreo FAO GIEWS.
    enum_uri: aidops:WaterAccessLivestock
    permissible_values:
      adequate:
        title:
          en: Adequate — sufficient water available at water points
          fr: Adéquat — eau suffisante disponible aux points d'eau
          es: Adecuado — agua suficiente disponible en los puntos de agua
        description:
          en: Livestock can be watered at normal intervals; water points are not under stress.
          fr: Le bétail peut être abreuvé à des intervalles normaux ; les points d'eau ne sont pas sous pression.
          es: El ganado puede abrevarse a intervalos normales; los puntos de agua no están bajo estrés.
      reduced_but_manageable:
        title:
          en: Reduced but manageable — some extra travel required
          fr: Réduit mais gérable — quelques déplacements supplémentaires nécessaires
          es: Reducido pero manejable — se requiere algo de viaje adicional
        description:
          en: Water is available but livestock must travel farther than normal to reach it; manageable with extra effort.
          fr: L'eau est disponible mais le bétail doit parcourir plus loin que d'habitude pour y accéder ; gérable avec un effort supplémentaire.
          es: El agua está disponible pero el ganado debe viajar más de lo normal para alcanzarla; manejable con esfuerzo adicional.
      inadequate_stress:
        title:
          en: Inadequate — livestock under water stress
          fr: Insuffisant — bétail sous stress hydrique
          es: Inadecuado — ganado bajo estrés hídrico
        description:
          en: Water points are insufficient; livestock are showing signs of water stress including weight loss and reduced milk production.
          fr: Les points d'eau sont insuffisants ; le bétail présente des signes de stress hydrique, notamment une perte de poids et une réduction de la production laitière.
          es: Los puntos de agua son insuficientes; el ganado muestra señales de estrés hídrico incluyendo pérdida de peso y reducción de producción de leche.
      severely_inadequate:
        title:
          en: Severely inadequate — livestock mortality risk from thirst
          fr: Très insuffisant — risque de mortalité du bétail due à la soif
          es: Gravemente inadecuado — riesgo de mortalidad del ganado por sed
        description:
          en: Acute water shortage; livestock deaths from dehydration are imminent or already occurring.
          fr: Pénurie d'eau aiguë ; des décès de bétail par déshydratation sont imminents ou en cours.
          es: Escasez aguda de agua; las muertes de ganado por deshidratación son inminentes o ya están ocurriendo.
      water_point_closed:
        title:
          en: Water point closed or inaccessible
          fr: Point d'eau fermé ou inaccessible
          es: Punto de agua cerrado o inaccesible
        description:
          en: The water point the household normally uses is closed, blocked, damaged, or made inaccessible by conflict or other factors.
          fr: Le point d'eau habituellement utilisé par le ménage est fermé, bloqué, endommagé ou rendu inaccessible par un conflit ou d'autres facteurs.
          es: El punto de agua que el hogar normalmente usa está cerrado, bloqueado, dañado o hecho inaccesible por conflicto u otros factores.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess the adequacy of livestock water access.
          fr: Le répondant ne peut pas évaluer l'adéquation de l'accès à l'eau pour le bétail.
          es: El encuestado no puede evaluar la adecuación del acceso al agua para el ganado.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-pastoral-monitoring-2020", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "sphere-handbook-2018-legs"], "definition": {"en": "Adequacy of water access for livestock at seasonal water points along the household''s migration route. Used in PastoralFoodSecurityProfile for the `water_point_access` property. This vocabulary covers livestock watering only \u2014 not household WASH water access. Severity codes align with Sphere 2018 LEGS livestock water standards and FAO GIEWS water-point monitoring categories.", "es": "Adecuaci\u00f3n del acceso al agua para el ganado en puntos de agua estacionales a lo largo de la ruta de migraci\u00f3n del hogar. Cubre solo el abrevadero del ganado \u2014 no el acceso al agua WASH del hogar. Los c\u00f3digos de gravedad se alinean con los est\u00e1ndares LEGS Esfera 2018 y las categor\u00edas de monitoreo FAO GIEWS.", "fr": "Ad\u00e9quation de l''acc\u00e8s \u00e0 l''eau pour le b\u00e9tail aux points d''eau saisonniers le long de la route de migration du m\u00e9nage. Couvre uniquement l''abreuvement du b\u00e9tail \u2014 pas l''acc\u00e8s \u00e0 l''eau WASH du m\u00e9nage. Les codes de gravit\u00e9 s''alignent sur les normes LEGS Sph\u00e8re 2018 et les cat\u00e9gories de suivi FAO GIEWS."}, "id": "water-access-livestock", "label": {"en": "Livestock Water Access at Seasonal Water Points", "es": "Acceso al agua para el ganado en puntos de agua estacionales", "fr": "Acc\u00e8s \u00e0 l''eau pour le b\u00e9tail aux points d''eau saisonniers"}, "maturity": "draft", "values": [{"code": "adequate", "definition": {"en": "Livestock can be watered at normal intervals; water points are not under stress.", "es": "El ganado puede abrevarse a intervalos normales; los puntos de agua no est\u00e1n bajo estr\u00e9s.", "fr": "Le b\u00e9tail peut \u00eatre abreuv\u00e9 \u00e0 des intervalles normaux ; les points d''eau ne sont pas sous pression."}, "label": {"en": "Adequate \u2014 sufficient water available at water points", "es": "Adecuado \u2014 agua suficiente disponible en los puntos de agua", "fr": "Ad\u00e9quat \u2014 eau suffisante disponible aux points d''eau"}}, {"code": "reduced_but_manageable", "definition": {"en": "Water is available but livestock must travel farther than normal to reach it; manageable with extra effort.", "es": "El agua est\u00e1 disponible pero el ganado debe viajar m\u00e1s de lo normal para alcanzarla; manejable con esfuerzo adicional.", "fr": "L''eau est disponible mais le b\u00e9tail doit parcourir plus loin que d''habitude pour y acc\u00e9der ; g\u00e9rable avec un effort suppl\u00e9mentaire."}, "label": {"en": "Reduced but manageable \u2014 some extra travel required", "es": "Reducido pero manejable \u2014 se requiere algo de viaje adicional", "fr": "R\u00e9duit mais g\u00e9rable \u2014 quelques d\u00e9placements suppl\u00e9mentaires n\u00e9cessaires"}}, {"code": "inadequate_stress", "definition": {"en": "Water points are insufficient; livestock are showing signs of water stress including weight loss and reduced milk production.", "es": "Los puntos de agua son insuficientes; el ganado muestra se\u00f1ales de estr\u00e9s h\u00eddrico incluyendo p\u00e9rdida de peso y reducci\u00f3n de producci\u00f3n de leche.", "fr": "Les points d''eau sont insuffisants ; le b\u00e9tail pr\u00e9sente des signes de stress hydrique, notamment une perte de poids et une r\u00e9duction de la production laiti\u00e8re."}, "label": {"en": "Inadequate \u2014 livestock under water stress", "es": "Inadecuado \u2014 ganado bajo estr\u00e9s h\u00eddrico", "fr": "Insuffisant \u2014 b\u00e9tail sous stress hydrique"}}, {"code": "severely_inadequate", "definition": {"en": "Acute water shortage; livestock deaths from dehydration are imminent or already occurring.", "es": "Escasez aguda de agua; las muertes de ganado por deshidrataci\u00f3n son inminentes o ya est\u00e1n ocurriendo.", "fr": "P\u00e9nurie d''eau aigu\u00eb ; des d\u00e9c\u00e8s de b\u00e9tail par d\u00e9shydratation sont imminents ou en cours."}, "label": {"en": "Severely inadequate \u2014 livestock mortality risk from thirst", "es": "Gravemente inadecuado \u2014 riesgo de mortalidad del ganado por sed", "fr": "Tr\u00e8s insuffisant \u2014 risque de mortalit\u00e9 du b\u00e9tail due \u00e0 la soif"}}, {"code": "water_point_closed", "definition": {"en": "The water point the household normally uses is closed, blocked, damaged, or made inaccessible by conflict or other factors.", "es": "El punto de agua que el hogar normalmente usa est\u00e1 cerrado, bloqueado, da\u00f1ado o hecho inaccesible por conflicto u otros factores.", "fr": "Le point d''eau habituellement utilis\u00e9 par le m\u00e9nage est ferm\u00e9, bloqu\u00e9, endommag\u00e9 ou rendu inaccessible par un conflit ou d''autres facteurs."}, "label": {"en": "Water point closed or inaccessible", "es": "Punto de agua cerrado o inaccesible", "fr": "Point d''eau ferm\u00e9 ou inaccessible"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess the adequacy of livestock water access.", "es": "El encuestado no puede evaluar la adecuaci\u00f3n del acceso al agua para el ganado.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer l''ad\u00e9quation de l''acc\u00e8s \u00e0 l''eau pour le b\u00e9tail."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: fao-giews-pastoral-monitoring-2020,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,sphere-handbook-2018-legs
  WaterAvailabilityLocation:
    title:
      en: Water Source Location
      fr: Emplacement de la source d'eau
      es: Ubicación de la fuente de agua
    description:
      en: Location of the household's main drinking water source relative to the dwelling. This is JMP question W3 and determines the second criterion of the safely managed water service level. 'On premises' means within the dwelling, yard, or plot controlled by the household.
      fr: Emplacement de la principale source d'eau potable du ménage par rapport au logement. Il s'agit de la question W3 du JMP et détermine le deuxième critère du niveau de service en eau à gestion sécurisée. 'Sur les lieux' signifie à l'intérieur du logement, de la cour ou de la parcelle contrôlée par le ménage.
      es: Ubicación de la principal fuente de agua potable del hogar en relación con la vivienda. Esta es la pregunta W3 del JMP y determina el segundo criterio del nivel de servicio de agua con gestión segura. 'En las instalaciones' significa dentro de la vivienda, patio o parcela controlada por el hogar.
    enum_uri: aidops:WaterAvailabilityLocation
    permissible_values:
      on_premises:
        title:
          en: On premises
          fr: Sur les lieux
          es: En las instalaciones
        description:
          en: The water source is located inside the dwelling or within the yard, courtyard, or plot that the household controls. Meets the location criterion for safely managed water service.
          fr: La source d'eau est située à l'intérieur du logement ou dans la cour, le patio ou la parcelle contrôlée par le ménage. Satisfait au critère de localisation pour la gestion sécurisée du service en eau.
          es: La fuente de agua está ubicada dentro de la vivienda o dentro del patio, corral o parcela que controla el hogar. Cumple el criterio de ubicación para el servicio de agua con gestión segura.
      in_yard_or_plot:
        title:
          en: In the yard or plot (not on premises)
          fr: Dans la cour ou la parcelle (hors logement)
          es: En el patio o parcela (fuera de la vivienda)
        description:
          en: The water source is in the shared yard or plot but not inside the dwelling; the household may share access with others. Does not meet the on-premises criterion for safely managed water service.
          fr: La source d'eau se trouve dans la cour ou la parcelle partagée mais pas à l'intérieur du logement ; le ménage peut partager l'accès avec d'autres. Ne satisfait pas au critère sur les lieux pour la gestion sécurisée du service en eau.
          es: La fuente de agua está en el patio o parcela compartida pero no dentro de la vivienda; el hogar puede compartir el acceso con otros. No cumple el criterio de instalaciones para el servicio de agua con gestión segura.
      elsewhere:
        title:
          en: Elsewhere (off premises)
          fr: Ailleurs (hors des lieux)
          es: En otro lugar (fuera de las instalaciones)
        description:
          en: The water source is outside the household's premises and requires travel to collect. Collection time (W4) must be recorded.
          fr: La source d'eau est extérieure aux lieux du ménage et nécessite un déplacement pour la collecte. Le temps de collecte (W4) doit être enregistré.
          es: La fuente de agua está fuera de las instalaciones del hogar y requiere desplazarse para recogerla. Se debe registrar el tiempo de recolección (W4).
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Location of the household''s main drinking water source relative to the dwelling. This is JMP question W3 and determines the second criterion of the safely managed water service level. ''On premises'' means within the dwelling, yard, or plot controlled by the household.", "es": "Ubicaci\u00f3n de la principal fuente de agua potable del hogar en relaci\u00f3n con la vivienda. Esta es la pregunta W3 del JMP y determina el segundo criterio del nivel de servicio de agua con gesti\u00f3n segura. ''En las instalaciones'' significa dentro de la vivienda, patio o parcela controlada por el hogar.", "fr": "Emplacement de la principale source d''eau potable du m\u00e9nage par rapport au logement. Il s''agit de la question W3 du JMP et d\u00e9termine le deuxi\u00e8me crit\u00e8re du niveau de service en eau \u00e0 gestion s\u00e9curis\u00e9e. ''Sur les lieux'' signifie \u00e0 l''int\u00e9rieur du logement, de la cour ou de la parcelle contr\u00f4l\u00e9e par le m\u00e9nage."}, "id": "water-availability-location", "label": {"en": "Water Source Location", "es": "Ubicaci\u00f3n de la fuente de agua", "fr": "Emplacement de la source d''eau"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "JMP W3. ''On premises'' is a required criterion for the safely managed water service level alongside improved source type and water availability.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "values": [{"code": "on_premises", "definition": {"en": "The water source is located inside the dwelling or within the yard, courtyard, or plot that the household controls. Meets the location criterion for safely managed water service.", "es": "La fuente de agua est\u00e1 ubicada dentro de la vivienda o dentro del patio, corral o parcela que controla el hogar. Cumple el criterio de ubicaci\u00f3n para el servicio de agua con gesti\u00f3n segura.", "fr": "La source d''eau est situ\u00e9e \u00e0 l''int\u00e9rieur du logement ou dans la cour, le patio ou la parcelle contr\u00f4l\u00e9e par le m\u00e9nage. Satisfait au crit\u00e8re de localisation pour la gestion s\u00e9curis\u00e9e du service en eau."}, "label": {"en": "On premises", "es": "En las instalaciones", "fr": "Sur les lieux"}}, {"code": "in_yard_or_plot", "definition": {"en": "The water source is in the shared yard or plot but not inside the dwelling; the household may share access with others. Does not meet the on-premises criterion for safely managed water service.", "es": "La fuente de agua est\u00e1 en el patio o parcela compartida pero no dentro de la vivienda; el hogar puede compartir el acceso con otros. No cumple el criterio de instalaciones para el servicio de agua con gesti\u00f3n segura.", "fr": "La source d''eau se trouve dans la cour ou la parcelle partag\u00e9e mais pas \u00e0 l''int\u00e9rieur du logement ; le m\u00e9nage peut partager l''acc\u00e8s avec d''autres. Ne satisfait pas au crit\u00e8re sur les lieux pour la gestion s\u00e9curis\u00e9e du service en eau."}, "label": {"en": "In the yard or plot (not on premises)", "es": "En el patio o parcela (fuera de la vivienda)", "fr": "Dans la cour ou la parcelle (hors logement)"}}, {"code": "elsewhere", "definition": {"en": "The water source is outside the household''s premises and requires travel to collect. Collection time (W4) must be recorded.", "es": "La fuente de agua est\u00e1 fuera de las instalaciones del hogar y requiere desplazarse para recogerla. Se debe registrar el tiempo de recolecci\u00f3n (W4).", "fr": "La source d''eau est ext\u00e9rieure aux lieux du m\u00e9nage et n\u00e9cessite un d\u00e9placement pour la collecte. Le temps de collecte (W4) doit \u00eatre enregistr\u00e9."}, "label": {"en": "Elsewhere (off premises)", "es": "En otro lugar (fuera de las instalaciones)", "fr": "Ailleurs (hors des lieux)"}}]}'
      bibliography_refs: jmp-core
  WaterStorageContainerType:
    title:
      en: Water Storage Container Type
      fr: Type de récipient de stockage d'eau
      es: Tipo de recipiente de almacenamiento de agua
    description:
      en: Type of container(s) used by the household to store drinking water. Sphere guidance distinguishes safe storage (narrow-neck covered containers) from unsafe storage (wide-neck uncovered containers). Multi-select.
      fr: Type(s) de récipient(s) utilisés par le ménage pour stocker l'eau potable. Les directives Sphère distinguent le stockage sûr (récipients couverts à col étroit) du stockage non sûr (récipients ouverts à col large). Sélection multiple.
      es: Tipo(s) de recipiente(s) que utiliza el hogar para almacenar agua potable. Las directrices de Esfera distinguen el almacenamiento seguro (recipientes cubiertos de cuello estrecho) del almacenamiento inseguro (recipientes abiertos de cuello ancho). Selección múltiple.
    enum_uri: aidops:WaterStorageContainerType
    permissible_values:
      narrow_neck_jerrycan:
        title:
          en: Narrow-neck jerrycan or sealed container
          fr: Jerrycan à col étroit ou récipient fermé
          es: Bidón de cuello estrecho o recipiente sellado
        description:
          en: A jerrycan, water bottle, or sealed container with a narrow neck that limits contamination when filling or pouring. Considered safe storage by Sphere guidance.
          fr: Jerrycan, bouteille d'eau ou récipient fermé à col étroit qui limite la contamination lors du remplissage ou du versement. Considéré comme stockage sûr par les directives Sphère.
          es: Un bidón, botella de agua o recipiente sellado con cuello estrecho que limita la contaminación al llenarlo o verterlo. Considerado almacenamiento seguro según las directrices de Esfera.
      wide_neck_bucket:
        title:
          en: Wide-neck bucket or open container
          fr: Seau à col large ou récipient ouvert
          es: Cubo de cuello ancho o recipiente abierto
        description:
          en: A bucket or wide-neck container without a secure lid that is exposed to contamination when open. Considered unsafe storage by Sphere guidance unless covered.
          fr: Seau ou récipient à col large sans couvercle sécurisé, exposé à la contamination lorsqu'il est ouvert. Considéré comme stockage non sûr par les directives Sphère sauf s'il est couvert.
          es: Un cubo o recipiente de cuello ancho sin tapa segura que queda expuesto a la contaminación cuando está abierto. Considerado almacenamiento inseguro según Esfera a menos que esté cubierto.
      pot_without_cover:
        title:
          en: Pot or clay vessel without cover
          fr: Pot ou récipient en argile sans couvercle
          es: Olla o vasija de barro sin tapa
        description:
          en: A traditional clay pot or cooking vessel used for water storage without a protective cover. High contamination risk from open storage.
          fr: Pot en argile traditionnel ou ustensile de cuisson utilisé pour le stockage de l'eau sans protection. Risque élevé de contamination dû au stockage ouvert.
          es: Una olla de barro tradicional o vasija de cocina usada para almacenar agua sin cubierta protectora. Alto riesgo de contaminación por almacenamiento abierto.
      water_filter_container:
        title:
          en: Water filter container (integrated storage)
          fr: Récipient filtre à eau (stockage intégré)
          es: Recipiente filtro de agua (almacenamiento integrado)
        description:
          en: A ceramic pot filter or biosand filter that serves both as treatment device and storage container. Typically includes a covered lower reservoir.
          fr: Filtre en pot céramique ou filtre biosable servant à la fois d'appareil de traitement et de récipient de stockage. Comprend généralement un réservoir inférieur couvert.
          es: Un filtro de maceta cerámica o filtro de bioarena que sirve tanto de dispositivo de tratamiento como de recipiente de almacenamiento. Normalmente incluye un depósito inferior cubierto.
      piped_indoor_reservoir:
        title:
          en: Piped indoor reservoir or tank
          fr: Réservoir ou citerne intérieur raccordé
          es: Depósito o cisterna interior con tubería
        description:
          en: A fixed indoor water storage tank connected to a piped supply, accessed by tap or pump inside the dwelling.
          fr: Réservoir de stockage d'eau intérieur fixe raccordé à une alimentation canalisée, accessible par robinet ou pompe à l'intérieur du logement.
          es: Un depósito fijo interior de almacenamiento de agua conectado a un suministro de tubería, al que se accede por grifo o bomba dentro de la vivienda.
      other:
        title:
          en: Other container type
          fr: Autre type de récipient
          es: Otro tipo de recipiente
        description:
          en: A water storage container type not covered by the other categories.
          fr: Un type de récipient de stockage d'eau non couvert par les autres catégories.
          es: Un tipo de recipiente de almacenamiento de agua no cubierto por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Type of container(s) used by the household to store drinking water. Sphere guidance distinguishes safe storage (narrow-neck covered containers) from unsafe storage (wide-neck uncovered containers). Multi-select.", "es": "Tipo(s) de recipiente(s) que utiliza el hogar para almacenar agua potable. Las directrices de Esfera distinguen el almacenamiento seguro (recipientes cubiertos de cuello estrecho) del almacenamiento inseguro (recipientes abiertos de cuello ancho). Selecci\u00f3n m\u00faltiple.", "fr": "Type(s) de r\u00e9cipient(s) utilis\u00e9s par le m\u00e9nage pour stocker l''eau potable. Les directives Sph\u00e8re distinguent le stockage s\u00fbr (r\u00e9cipients couverts \u00e0 col \u00e9troit) du stockage non s\u00fbr (r\u00e9cipients ouverts \u00e0 col large). S\u00e9lection multiple."}, "id": "water-storage-container-type", "label": {"en": "Water Storage Container Type", "es": "Tipo de recipiente de almacenamiento de agua", "fr": "Type de r\u00e9cipient de stockage d''eau"}, "maturity": "draft", "standard": {"name": "Sphere Handbook 2018 \u2014 Chapter 2: WASH", "notes": "Sphere recommends 10-20 L containers with lids and narrow neck for safe household water storage. ERWG WASH.HH.Water module uses compatible categories.", "uri": "https://spherestandards.org/handbook-2018/"}, "values": [{"code": "narrow_neck_jerrycan", "definition": {"en": "A jerrycan, water bottle, or sealed container with a narrow neck that limits contamination when filling or pouring. Considered safe storage by Sphere guidance.", "es": "Un bid\u00f3n, botella de agua o recipiente sellado con cuello estrecho que limita la contaminaci\u00f3n al llenarlo o verterlo. Considerado almacenamiento seguro seg\u00fan las directrices de Esfera.", "fr": "Jerrycan, bouteille d''eau ou r\u00e9cipient ferm\u00e9 \u00e0 col \u00e9troit qui limite la contamination lors du remplissage ou du versement. Consid\u00e9r\u00e9 comme stockage s\u00fbr par les directives Sph\u00e8re."}, "label": {"en": "Narrow-neck jerrycan or sealed container", "es": "Bid\u00f3n de cuello estrecho o recipiente sellado", "fr": "Jerrycan \u00e0 col \u00e9troit ou r\u00e9cipient ferm\u00e9"}}, {"code": "wide_neck_bucket", "definition": {"en": "A bucket or wide-neck container without a secure lid that is exposed to contamination when open. Considered unsafe storage by Sphere guidance unless covered.", "es": "Un cubo o recipiente de cuello ancho sin tapa segura que queda expuesto a la contaminaci\u00f3n cuando est\u00e1 abierto. Considerado almacenamiento inseguro seg\u00fan Esfera a menos que est\u00e9 cubierto.", "fr": "Seau ou r\u00e9cipient \u00e0 col large sans couvercle s\u00e9curis\u00e9, expos\u00e9 \u00e0 la contamination lorsqu''il est ouvert. Consid\u00e9r\u00e9 comme stockage non s\u00fbr par les directives Sph\u00e8re sauf s''il est couvert."}, "label": {"en": "Wide-neck bucket or open container", "es": "Cubo de cuello ancho o recipiente abierto", "fr": "Seau \u00e0 col large ou r\u00e9cipient ouvert"}}, {"code": "pot_without_cover", "definition": {"en": "A traditional clay pot or cooking vessel used for water storage without a protective cover. High contamination risk from open storage.", "es": "Una olla de barro tradicional o vasija de cocina usada para almacenar agua sin cubierta protectora. Alto riesgo de contaminaci\u00f3n por almacenamiento abierto.", "fr": "Pot en argile traditionnel ou ustensile de cuisson utilis\u00e9 pour le stockage de l''eau sans protection. Risque \u00e9lev\u00e9 de contamination d\u00fb au stockage ouvert."}, "label": {"en": "Pot or clay vessel without cover", "es": "Olla o vasija de barro sin tapa", "fr": "Pot ou r\u00e9cipient en argile sans couvercle"}}, {"code": "water_filter_container", "definition": {"en": "A ceramic pot filter or biosand filter that serves both as treatment device and storage container. Typically includes a covered lower reservoir.", "es": "Un filtro de maceta cer\u00e1mica o filtro de bioarena que sirve tanto de dispositivo de tratamiento como de recipiente de almacenamiento. Normalmente incluye un dep\u00f3sito inferior cubierto.", "fr": "Filtre en pot c\u00e9ramique ou filtre biosable servant \u00e0 la fois d''appareil de traitement et de r\u00e9cipient de stockage. Comprend g\u00e9n\u00e9ralement un r\u00e9servoir inf\u00e9rieur couvert."}, "label": {"en": "Water filter container (integrated storage)", "es": "Recipiente filtro de agua (almacenamiento integrado)", "fr": "R\u00e9cipient filtre \u00e0 eau (stockage int\u00e9gr\u00e9)"}}, {"code": "piped_indoor_reservoir", "definition": {"en": "A fixed indoor water storage tank connected to a piped supply, accessed by tap or pump inside the dwelling.", "es": "Un dep\u00f3sito fijo interior de almacenamiento de agua conectado a un suministro de tuber\u00eda, al que se accede por grifo o bomba dentro de la vivienda.", "fr": "R\u00e9servoir de stockage d''eau int\u00e9rieur fixe raccord\u00e9 \u00e0 une alimentation canalis\u00e9e, accessible par robinet ou pompe \u00e0 l''int\u00e9rieur du logement."}, "label": {"en": "Piped indoor reservoir or tank", "es": "Dep\u00f3sito o cisterna interior con tuber\u00eda", "fr": "R\u00e9servoir ou citerne int\u00e9rieur raccord\u00e9"}}, {"code": "other", "definition": {"en": "A water storage container type not covered by the other categories.", "es": "Un tipo de recipiente de almacenamiento de agua no cubierto por las otras categor\u00edas.", "fr": "Un type de r\u00e9cipient de stockage d''eau non couvert par les autres cat\u00e9gories."}, "label": {"en": "Other container type", "es": "Otro tipo de recipiente", "fr": "Autre type de r\u00e9cipient"}}]}'
      bibliography_refs: sphere-2018
  WaterTreatmentMethod:
    title:
      en: Water Treatment Method
      fr: Méthode de traitement de l'eau
      es: Método de tratamiento del agua
    description:
      en: Method used by the household to treat drinking water to make it safer. The JMP 2018 classifies boiling, chlorination, ceramic/sand/other filter, and solar disinfection as adequate treatment methods. Straining through cloth and letting stand and settle are classified as inadequate. Multi-select.
      fr: Méthode utilisée par le ménage pour traiter l'eau potable afin de la rendre plus sûre. Le JMP 2018 classe l'ébullition, la chloration, les filtres céramique/sable/autres et la désinfection solaire comme méthodes de traitement adéquates. Filtrer à travers un tissu et laisser décanter sont classées comme inadéquates. Sélection multiple.
      es: Método utilizado por el hogar para tratar el agua de bebida para hacerla más segura. El JMP 2018 clasifica la ebullición, la cloración, los filtros cerámicos/de arena/otros y la desinfección solar como métodos de tratamiento adecuados. Colar a través de tela y dejar reposar y asentar se clasifican como inadecuados. Selección múltiple.
    enum_uri: aidops:WaterTreatmentMethod
    permissible_values:
      boil:
        title:
          en: Boil
          fr: Bouillir
          es: Hervir
        description:
          en: Water is brought to a rolling boil before drinking. Classified as adequate treatment by the JMP.
          fr: L'eau est portée à ébullition complète avant d'être bue. Classée comme traitement adéquat par le JMP.
          es: El agua se lleva a ebullición completa antes de beber. Clasificada como tratamiento adecuado por el JMP.
      add_chlorine_or_bleach:
        title:
          en: Add chlorine/bleach
          fr: Ajouter du chlore/de l'eau de Javel
          es: Agregar cloro/lejía
        description:
          en: Chemical disinfection using chlorine tablets, solution, or household bleach. Classified as adequate treatment by the JMP.
          fr: Désinfection chimique à l'aide de comprimés de chlore, d'une solution chlorée ou d'eau de Javel ménagère. Classée comme traitement adéquat par le JMP.
          es: Desinfección química usando tabletas de cloro, solución clorada o lejía doméstica. Clasificada como tratamiento adecuado por el JMP.
      use_ceramic_sand_or_other_filter:
        title:
          en: Use ceramic, sand, or other filter
          fr: Utiliser un filtre céramique, sable ou autre
          es: Usar filtro cerámico, de arena u otro
        description:
          en: Physical filtration through a ceramic pot filter, biosand filter, or other filter medium. Classified as adequate treatment by the JMP.
          fr: Filtration physique à travers un filtre en pot céramique, un filtre biosable ou un autre milieu filtrant. Classée comme traitement adéquat par le JMP.
          es: Filtración física a través de un filtro de maceta cerámica, filtro de bioarena u otro medio filtrante. Clasificada como tratamiento adecuado por el JMP.
      solar_disinfection:
        title:
          en: Solar disinfection (SODIS)
          fr: Désinfection solaire (SODIS)
          es: Desinfección solar (SODIS)
        description:
          en: Water is placed in transparent plastic or glass bottles and exposed to direct sunlight for at least 6 hours. Classified as adequate treatment by the JMP.
          fr: L'eau est placée dans des bouteilles en plastique transparent ou en verre et exposée à la lumière directe du soleil pendant au moins 6 heures. Classée comme traitement adéquat par le JMP.
          es: El agua se coloca en botellas de plástico transparente o vidrio y se expone a la luz solar directa durante al menos 6 horas. Clasificada como tratamiento adecuado por el JMP.
      let_stand_and_settle:
        title:
          en: Let it stand and settle
          fr: Laisser décanter
          es: Dejar reposar y asentar
        description:
          en: Water is left undisturbed to allow sediment to settle before drinking. Classified as inadequate treatment by the JMP because it does not reliably remove pathogens.
          fr: L'eau est laissée au repos pour permettre aux sédiments de se déposer avant d'être bue. Classée comme traitement inadéquat par le JMP car elle n'élimine pas de manière fiable les agents pathogènes.
          es: El agua se deja en reposo para que el sedimento se asiente antes de beber. Clasificada como tratamiento inadecuado por el JMP porque no elimina patógenos de manera confiable.
      strain_through_cloth:
        title:
          en: Strain through cloth
          fr: Filtrer à travers un tissu
          es: Colar a través de tela
        description:
          en: Water is poured through a cloth to remove visible particles. Classified as inadequate treatment by the JMP because it does not reliably remove pathogens.
          fr: L'eau est versée à travers un tissu pour éliminer les particules visibles. Classée comme traitement inadéquat par le JMP car elle n'élimine pas de manière fiable les agents pathogènes.
          es: El agua se vierte a través de una tela para eliminar las partículas visibles. Clasificada como tratamiento inadecuado por el JMP porque no elimina patógenos de manera confiable.
      use_electric_purifier:
        title:
          en: Use electric purifier
          fr: Utiliser un purificateur électrique
          es: Usar purificador eléctrico
        description:
          en: Water is treated using an electric UV or electrochlorination purifier. Increasingly common in urban households. Classification as adequate or inadequate depends on device type and maintenance.
          fr: L'eau est traitée à l'aide d'un purificateur UV électrique ou d'électrochloration. De plus en plus courant dans les ménages urbains. La classification comme adéquat ou inadéquat dépend du type d'appareil et de l'entretien.
          es: El agua se trata usando un purificador eléctrico UV o de electrocloro. Cada vez más común en hogares urbanos. La clasificación como adecuado o inadecuado depende del tipo de dispositivo y su mantenimiento.
      other:
        title:
          en: Other method
          fr: Autre méthode
          es: Otro método
        description:
          en: A treatment method not covered by the other categories.
          fr: Une méthode de traitement non couverte par les autres catégories.
          es: Un método de tratamiento no cubierto por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Method used by the household to treat drinking water to make it safer. The JMP 2018 classifies boiling, chlorination, ceramic/sand/other filter, and solar disinfection as adequate treatment methods. Straining through cloth and letting stand and settle are classified as inadequate. Multi-select.", "es": "M\u00e9todo utilizado por el hogar para tratar el agua de bebida para hacerla m\u00e1s segura. El JMP 2018 clasifica la ebullici\u00f3n, la cloraci\u00f3n, los filtros cer\u00e1micos/de arena/otros y la desinfecci\u00f3n solar como m\u00e9todos de tratamiento adecuados. Colar a trav\u00e9s de tela y dejar reposar y asentar se clasifican como inadecuados. Selecci\u00f3n m\u00faltiple.", "fr": "M\u00e9thode utilis\u00e9e par le m\u00e9nage pour traiter l''eau potable afin de la rendre plus s\u00fbre. Le JMP 2018 classe l''\u00e9bullition, la chloration, les filtres c\u00e9ramique/sable/autres et la d\u00e9sinfection solaire comme m\u00e9thodes de traitement ad\u00e9quates. Filtrer \u00e0 travers un tissu et laisser d\u00e9canter sont class\u00e9es comme inad\u00e9quates. S\u00e9lection multiple."}, "id": "water-treatment-method", "label": {"en": "Water Treatment Method", "es": "M\u00e9todo de tratamiento del agua", "fr": "M\u00e9thode de traitement de l''eau"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "DHS hv237a and MICS use compatible codes. JMP adequate methods: boil, add_chlorine_or_bleach, use_ceramic_sand_or_other_filter, solar_disinfection. Inadequate: let_stand_and_settle, strain_through_cloth.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "system_mappings": {"dhs": {"values": [{"code": "boil", "label": "Boil", "maps_to": "boil"}, {"code": "add_bleach_or_chlorine", "label": "Add bleach/chlorine", "maps_to": "add_