  SleepingSpaceSexSeparation:
    title:
      en: Sleeping space separation by sex (3-level)
      fr: Séparation des espaces de couchage par sexe (3 niveaux)
      es: Separación de espacios para dormir por sexo (3 niveles)
    description:
      en: Three-level scale for assessing whether a household has separate sleeping spaces for adult males and adult females who are not intimate partners. Sphere Standard 3 requires privacy and separation between sexes. 'Not applicable' covers households where all adults are intimate partners or where only one adult is present.
      fr: Échelle à trois niveaux pour évaluer si un ménage dispose d'espaces de couchage séparés pour les hommes et les femmes adultes qui ne sont pas des partenaires intimes. La Norme Sphère 3 exige la vie privée et la séparation entre les sexes. 'Sans objet' couvre les ménages où tous les adultes sont des partenaires intimes ou où un seul adulte est présent.
      es: Escala de tres niveles para evaluar si un hogar tiene espacios para dormir separados para hombres y mujeres adultas que no son parejas íntimas. La Norma Esfera 3 requiere privacidad y separación entre sexos. 'No aplica' cubre hogares donde todos los adultos son parejas íntimas o donde solo hay un adulto presente.
    enum_uri: aidops:SleepingSpaceSexSeparation
    permissible_values:
      'yes':
        title:
          en: Yes — separate sleeping spaces for men and women
          fr: Oui — espaces de couchage séparés pour les hommes et les femmes
          es: Sí — espacios para dormir separados para hombres y mujeres
        description:
          en: The household has separate sleeping spaces for adult males and adult females who are not intimate partners.
          fr: Le ménage dispose d'espaces de couchage séparés pour les hommes adultes et les femmes adultes qui ne sont pas des partenaires intimes.
          es: El hogar tiene espacios para dormir separados para hombres adultos y mujeres adultas que no son parejas íntimas.
      'no':
        title:
          en: No — no separate sleeping spaces
          fr: Non — pas d'espaces de couchage séparés
          es: No — sin espacios para dormir separados
        description:
          en: Adult males and adult females who are not intimate partners share the same sleeping space.
          fr: Les hommes adultes et les femmes adultes qui ne sont pas des partenaires intimes partagent le même espace de couchage.
          es: Los hombres adultos y las mujeres adultas que no son parejas íntimas comparten el mismo espacio para dormir.
      not_applicable:
        title:
          en: Not applicable — all adults are intimate partners or only one adult
          fr: Sans objet — tous les adultes sont des partenaires intimes ou il n'y a qu'un seul adulte
          es: No aplica — todos los adultos son parejas íntimas o solo hay un adulto
        description:
          en: The question does not apply because all adult household members are intimate partners, or the household has only one adult.
          fr: La question ne s'applique pas parce que tous les membres adultes du ménage sont des partenaires intimes, ou le ménage n'a qu'un seul adulte.
          es: La pregunta no aplica porque todos los miembros adultos del hogar son parejas íntimas, o el hogar tiene solo un adulto.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale for assessing whether a household has separate sleeping spaces for adult males and adult females who are not intimate partners. Sphere Standard 3 requires privacy and separation between sexes. ''Not applicable'' covers households where all adults are intimate partners or where only one adult is present.", "es": "Escala de tres niveles para evaluar si un hogar tiene espacios para dormir separados para hombres y mujeres adultas que no son parejas \u00edntimas. La Norma Esfera 3 requiere privacidad y separaci\u00f3n entre sexos. ''No aplica'' cubre hogares donde todos los adultos son parejas \u00edntimas o donde solo hay un adulto presente.", "fr": "\u00c9chelle \u00e0 trois niveaux pour \u00e9valuer si un m\u00e9nage dispose d''espaces de couchage s\u00e9par\u00e9s pour les hommes et les femmes adultes qui ne sont pas des partenaires intimes. La Norme Sph\u00e8re 3 exige la vie priv\u00e9e et la s\u00e9paration entre les sexes. ''Sans objet'' couvre les m\u00e9nages o\u00f9 tous les adultes sont des partenaires intimes ou o\u00f9 un seul adulte est pr\u00e9sent."}, "id": "sleeping-space-sex-separation", "label": {"en": "Sleeping space separation by sex (3-level)", "es": "Separaci\u00f3n de espacios para dormir por sexo (3 niveles)", "fr": "S\u00e9paration des espaces de couchage par sexe (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "The household has separate sleeping spaces for adult males and adult females who are not intimate partners.", "es": "El hogar tiene espacios para dormir separados para hombres adultos y mujeres adultas que no son parejas \u00edntimas.", "fr": "Le m\u00e9nage dispose d''espaces de couchage s\u00e9par\u00e9s pour les hommes adultes et les femmes adultes qui ne sont pas des partenaires intimes."}, "label": {"en": "Yes \u2014 separate sleeping spaces for men and women", "es": "S\u00ed \u2014 espacios para dormir separados para hombres y mujeres", "fr": "Oui \u2014 espaces de couchage s\u00e9par\u00e9s pour les hommes et les femmes"}}, {"code": "no", "definition": {"en": "Adult males and adult females who are not intimate partners share the same sleeping space.", "es": "Los hombres adultos y las mujeres adultas que no son parejas \u00edntimas comparten el mismo espacio para dormir.", "fr": "Les hommes adultes et les femmes adultes qui ne sont pas des partenaires intimes partagent le m\u00eame espace de couchage."}, "label": {"en": "No \u2014 no separate sleeping spaces", "es": "No \u2014 sin espacios para dormir separados", "fr": "Non \u2014 pas d''espaces de couchage s\u00e9par\u00e9s"}}, {"code": "not_applicable", "definition": {"en": "The question does not apply because all adult household members are intimate partners, or the household has only one adult.", "es": "La pregunta no aplica porque todos los miembros adultos del hogar son parejas \u00edntimas, o el hogar tiene solo un adulto.", "fr": "La question ne s''applique pas parce que tous les membres adultes du m\u00e9nage sont des partenaires intimes, ou le m\u00e9nage n''a qu''un seul adulte."}, "label": {"en": "Not applicable \u2014 all adults are intimate partners or only one adult", "es": "No aplica \u2014 todos los adultos son parejas \u00edntimas o solo hay un adulto", "fr": "Sans objet \u2014 tous les adultes sont des partenaires intimes ou il n''y a qu''un seul adulte"}}]}'
