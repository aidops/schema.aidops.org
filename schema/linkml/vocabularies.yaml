      publicschema_logical_document_json: '{"bibliography_refs": ["who-mcs-domestic-violence-2005"], "definition": {"en": "Composite severity classification for intimate partner violence based on the act typology from the DHS Domestic Violence module and the less-severe/more-severe physical violence distinction from Garcia-Moreno et al. (WHO MCS, 2005). This is a research classification for analysis; it must not be presented to respondents or used for individual-level eligibility decisions. Used only for the derived indicator gbv_ipv_severity_tier.", "es": "Clasificaci\u00f3n compuesta de gravedad de la violencia de pareja \u00edntima basada en la tipolog\u00eda de actos del m\u00f3dulo DHS y la distinci\u00f3n menos grave/m\u00e1s grave de Garcia-Moreno et al. (Estudio multipa\u00eds OMS, 2005). Solo para uso anal\u00edtico; no presentar a encuestadas ni usar para decisiones de elegibilidad individuales.", "fr": "Classification composite de gravit\u00e9 de la violence du partenaire intime bas\u00e9e sur la typologie des actes du module DHS et la distinction moins grave/plus grave de Garcia-Moreno et al. (\u00c9tude multi-pays OMS, 2005). Classification de recherche uniquement; ne pas pr\u00e9senter aux r\u00e9pondantes ni utiliser pour des d\u00e9cisions d''\u00e9ligibilit\u00e9 individuelles."}, "id": "gbv-severity-tier", "label": {"en": "IPV severity tier (composite)", "es": "Nivel de gravedad VPI (compuesto)", "fr": "Niveau de gravit\u00e9 VPI (composite)"}, "maturity": "draft", "standard": {"name": "who-mcs-domestic-violence-2005", "notes": "Physical IPV severity typology (less-severe / more-severe; Garcia-Moreno et al. 2005)", "uri": "https://iris.who.int/handle/10665/43309"}, "values": [{"code": "none", "definition": {"en": "No act in the physical, sexual, or emotional IPV battery was answered positively.", "es": "Ning\u00fan acto en la bater\u00eda de VPI f\u00edsica, sexual o emocional recibi\u00f3 una respuesta positiva.", "fr": "Aucun acte dans la batteri