  HealthcareWasteDisposal:
    title:
      en: Healthcare Waste Final Disposal Method
      fr: Méthode finale d'élimination des déchets de soins
      es: Método de eliminación final de residuos sanitarios
    description:
      en: The method used by a health facility to finally dispose of healthcare waste (infectious waste, sharps, pathological waste) after initial segregation. Aligned with WASH FIT 2nd edition Healthcare Waste Management indicators. Open burning and 'no system' are explicit red flags for WASH FIT and Sphere 2018. Incinerator classification distinguishes on-site from off-site; pit burial is coded only when the pit is fenced, covered, and protected per WHO Safe Management of Waste from Health-care Activities guidance.
      fr: La méthode utilisée par un établissement de santé pour éliminer finalement les déchets de soins (déchets infectieux, objets tranchants, déchets pathologiques) après le tri initial. Alignée sur les indicateurs de gestion des déchets de soins de WASH FIT 2e édition. Le brûlage à l'air libre et « aucun système » sont des signaux d'alerte explicites pour WASH FIT et Sphere 2018. La classification de l'incinérateur distingue sur site et hors site ; l'enfouissement en fosse n'est codé que lorsque la fosse est clôturée, couverte et protégée conformément à la directive de l'OMS sur la gestion sûre des déchets d'activités de soins.
      es: El método utilizado por un establecimiento de salud para eliminar finalmente los residuos sanitarios (residuos infecciosos, objetos cortopunzantes, residuos patológicos) tras la segregación inicial. Alineado con los indicadores de Gestión de Residuos Sanitarios de WASH FIT 2ª edición. La quema al aire libre y «sin sistema» son señales de alerta explícitas para WASH FIT y Esfera 2018. La clasificación del incinerador distingue en el sitio y fuera del sitio; el enterramiento en fosa se codifica solo cuando la fosa está cercada, cubierta y protegida conforme a la guía de la OMS sobre gestión segura de residuos de actividades sanitarias.
    enum_uri: aidops:HealthcareWasteDisposal
    permissible_values:
      incinerator_on_site:
        title:
          en: On-site incinerator
          fr: Incinérateur sur site
          es: Incinerador en el sitio
        description:
          en: Healthcare waste is incinerated in an incinerator located at the facility, typically operated by facility staff.
          fr: Les déchets de soins sont incinérés dans un incinérateur situé à l'établissement, généralement exploité par le personnel de l'établissement.
          es: Los residuos sanitarios se incineran en un incinerador ubicado en el establecimiento, generalmente operado por el personal del mismo.
      incinerator_off_site:
        title:
          en: Off-site incinerator (collected and transported)
          fr: Incinérateur hors site (collecté et transporté)
          es: Incinerador fuera del sitio (recolectado y transportado)
        description:
          en: Healthcare waste is collected by an external service provider and transported to an off-site incinerator.
          fr: Les déchets de soins sont collectés par un prestataire externe et transportés vers un incinérateur hors site.
          es: Los residuos sanitarios son recolectados por un proveedor externo y transportados a un incinerador fuera del sitio.
      pit_burial_protected:
        title:
          en: Protected pit burial (fenced and covered)
          fr: Enfouissement en fosse protégée (clôturée et couverte)
          es: Enterramiento en fosa protegida (cercada y cubierta)
        description:
          en: Healthcare waste is buried in a dedicated pit that is fenced, covered, and protected per WHO Safe Management of Waste from Health-care Activities guidance.
          fr: Les déchets de soins sont enfouis dans une fosse dédiée clôturée, couverte et protégée conformément à la directive de l'OMS sur la gestion sûre des déchets d'activités de soins.
          es: Los residuos sanitarios se entierran en una fosa dedicada cercada, cubierta y protegida conforme a la guía de la OMS sobre gestión segura de residuos de actividades sanitarias.
      open_burning:
        title:
          en: Open burning (red flag)
          fr: Brûlage à l'air libre (signal d'alerte)
          es: Quema al aire libre (señal de alerta)
        description:
          en: 'Healthcare waste is burned in the open without an incinerator. Explicit red flag per WASH FIT: produces toxic emissions and incomplete combustion; not an acceptable disposal method for infectious waste.'
          fr: 'Les déchets de soins sont brûlés à l''air libre sans incinérateur. Signal d''alerte explicite pour WASH FIT : produit des émissions toxiques et une combustion incomplète ; n''est pas une méthode d''élimination acceptable pour les déchets infectieux.'
          es: 'Los residuos sanitarios se queman al aire libre sin incinerador. Señal de alerta explícita para WASH FIT: produce emisiones tóxicas y combustión incompleta; no es un método de eliminación aceptable para residuos infecciosos.'
      collected_by_municipal_service:
        title:
          en: Collected by municipal or general-waste service
          fr: Collecté par le service municipal ou de déchets généraux
          es: Recolectado por el servicio municipal o de residuos generales
        description:
          en: Healthcare waste is placed into the general municipal waste stream. Acceptable only for non-infectious general waste; explicit red flag for infectious or sharps waste.
          fr: Les déchets de soins sont placés dans le flux de déchets municipaux généraux. Acceptable uniquement pour les déchets généraux non infectieux ; signal d'alerte explicite pour les déchets infectieux ou tranchants.
          es: Los residuos sanitarios se colocan en el flujo de residuos municipales generales. Aceptable solo para residuos generales no infecciosos; señal de alerta explícita para residuos infecciosos o cortopunzantes.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: A disposal method that does not fit any of the listed categories.
          fr: Une méthode d'élimination qui ne correspond à aucune des catégories listées.
          es: Un método de eliminación que no corresponde a ninguna de las categorías listadas.
      no_system:
        title:
          en: No disposal system (red flag)
          fr: Aucun système d'élimination (signal d'alerte)
          es: Sin sistema de eliminación (señal de alerta)
        description:
          en: The facility has no defined healthcare-waste disposal system. Explicit red flag per WASH FIT.
          fr: L'établissement n'a aucun système défini d'élimination des déchets de soins. Signal d'alerte explicite pour WASH FIT.
          es: El establecimiento no tiene un sistema definido de eliminación de residuos sanitarios. Señal de alerta explícita para WASH FIT.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-unicef-wash-fit-2022"], "definition": {"en": "The method used by a health facility to finally dispose of healthcare waste (infectious waste, sharps, pathological waste) after initial segregation. Aligned with WASH FIT 2nd edition Healthcare Waste Management indicators. Open burning and ''no system'' are explicit red flags for WASH FIT and Sphere 2018. Incinerator classification distinguishes on-site from off-site; pit burial is coded only when the pit is fenced, covered, and protected per WHO Safe Management of Waste from Health-care Activities guidance.\n", "es": "El m\u00e9todo utilizado por un establecimiento de salud para eliminar finalmente los residuos sanitarios (residuos infecciosos, objetos cortopunzantes, residuos patol\u00f3gicos) tras la segregaci\u00f3n inicial. Alineado con los indicadores de Gesti\u00f3n de Residuos Sanitarios de WASH FIT 2\u00aa edici\u00f3n. La quema al aire libre y \u00absin sistema\u00bb son se\u00f1ales de alerta expl\u00edcitas para WASH FIT y Esfera 2018. La clasificaci\u00f3n del incinerador distingue en el sitio y fuera del sitio; el enterramiento en fosa se codifica solo cuando la fosa est\u00e1 cercada, cubierta y protegida conforme a la gu\u00eda de la OMS sobre gesti\u00f3n segura de residuos de actividades sanitarias.\n", "fr": "La m\u00e9thode utilis\u00e9e par un \u00e9tablissement de sant\u00e9 pour \u00e9liminer finalement les d\u00e9chets de soins (d\u00e9chets infectieux, objets tranchants, d\u00e9chets pathologiques) apr\u00e8s le tri initial. Align\u00e9e sur les indicateurs de gestion des d\u00e9chets de soins de WASH FIT 2e \u00e9dition. Le br\u00fblage \u00e0 l''air libre et \u00ab aucun syst\u00e8me \u00bb sont des signaux d''alerte explicites pour WASH FIT et Sphere 2018. La classification de l''incin\u00e9rateur distingue sur site et hors site ; l''enfouissement en fosse n''est cod\u00e9 que lorsque la fosse est cl\u00f4tur\u00e9e, couverte et prot\u00e9g\u00e9e conform\u00e9ment \u00e0 la directive de l''OMS sur la gestion s\u00fbre des d\u00e9chets d''activit\u00e9s de soins.\n"}, "id": "healthcare-waste-disposal", "label": {"en": "Healthcare Waste Final Disposal Method", "es": "M\u00e9todo de eliminaci\u00f3n final de residuos sanitarios", "fr": "M\u00e9thode finale d''\u00e9limination des d\u00e9chets de soins"}, "maturity": "draft", "standard": {"name": "Water and Sanitation for Health Facility Improvement Tool (WASH FIT) 2nd edition", "notes": "WASH FIT 2nd ed. Healthcare Waste Management indicators define the canonical set of final-disposal categories. The set is harmonized with WHO Safe Management of Waste from Health-care Activities (2014).", "uri": "https://www.who.int/publications/i/item/9789240043237"}, "values": [{"code": "incinerator_on_site", "definition": {"en": "Healthcare waste is incinerated in an incinerator located at the facility, typically operated by facility staff.", "es": "Los residuos sanitarios se incineran en un incinerador ubicado en el establecimiento, generalmente operado por el personal del mismo.", "fr": "Les d\u00e9chets de soins sont incin\u00e9r\u00e9s dans un incin\u00e9rateur situ\u00e9 \u00e0 l''\u00e9tablissement, g\u00e9n\u00e9ralement exploit\u00e9 par le personnel de l''\u00e9tablissement."}, "label": {"en": "On-site incinerator", "es": "Incinerador en el sitio", "fr": "Incin\u00e9rateur sur site"}}, {"code": "incinerator_off_site", "definition": {"en": "Healthcare waste is collected by an external service provider and transported to an off-site incinerator.", "es": "Los residuos sanitarios son recolectados por un proveedor externo y transportados a un incinerador fuera del sitio.", "fr": "Les d\u00e9chets de soins sont collect\u00e9s par un prestataire externe et transport\u00e9s vers un incin\u00e9rateur hors site."}, "label": {"en": "Off-site incinerator (collected and transported)", "es": "Incinerador fuera del sitio (recolectado y transportado)", "fr": "Incin\u00e9rateur hors site (collect\u00e9 et transport\u00e9)"}}, {"code": "pit_burial_protected", "definition": {"en": "Healthcare waste is buried in a dedicated pit that is fenced, covered, and protected per WHO Safe Management of Waste from Health-care Activities guidance.", "es": "Los residuos sanitarios se entierran en una fosa dedicada cercada, cubierta y protegida conforme a la gu\u00eda de la OMS sobre gesti\u00f3n segura de residuos de actividades sanitarias.", "fr": "Les d\u00e9chets de soins sont enfouis dans une fosse d\u00e9di\u00e9e cl\u00f4tur\u00e9e, couverte et prot\u00e9g\u00e9e conform\u00e9ment \u00e0 la directive de l''OMS sur la gestion s\u00fbre des d\u00e9chets d''activit\u00e9s de soins."}, "label": {"en": "Protected pit burial (fenced and covered)", "es": "Enterramiento en fosa protegida (cercada y cubierta)", "fr": "Enfouissement en fosse prot\u00e9g\u00e9e (cl\u00f4tur\u00e9e et couverte)"}}, {"code": "open_burning", "definition": {"en": "Healthcare waste is burned in the open without an incinerator. Explicit red flag per WASH FIT: produces toxic emissions and incomplete combustion; not an acceptable disposal method for infectious waste.", "es": "Los residuos sanitarios se queman al aire libre sin incinerador. Se\u00f1al de alerta expl\u00edcita para WASH FIT: produce emisiones t\u00f3xicas y combusti\u00f3n incompleta; no es un m\u00e9todo de eliminaci\u00f3n aceptable para residuos infecciosos.", "fr": "Les d\u00e9chets de soins sont br\u00fbl\u00e9s \u00e0 l''air libre sans incin\u00e9rateur. Signal d''alerte explicite pour WASH FIT : produit des \u00e9missions toxiques et une combustion incompl\u00e8te ; n''est pas une m\u00e9thode d''\u00e9limination acceptable pour les d\u00e9chets infectieux."}, "label": {"en": "Open burning (red flag)", "es": "Quema al aire libre (se\u00f1al de alerta)", "fr": "Br\u00fblage \u00e0 l''air libre (signal d''alerte)"}}, {"code": "collected_by_municipal_service", "definition": {"en": "Healthcare waste is placed into the general municipal waste stream. Acceptable only for non-infectious general waste; explicit red flag for infectious or sharps waste.", "es": "Los residuos sanitarios se colocan en el flujo de residuos municipales generales. Aceptable solo para residuos generales no infecciosos; se\u00f1al de alerta expl\u00edcita para residuos infecciosos o cortopunzantes.", "fr": "Les d\u00e9chets de soins sont plac\u00e9s dans le flux de d\u00e9chets municipaux g\u00e9n\u00e9raux. Acceptable uniquement pour les d\u00e9chets g\u00e9n\u00e9raux non infectieux ; signal d''alerte explicite pour les d\u00e9chets infectieux ou tranchants."}, "label": {"en": "Collected by municipal or general-waste service", "es": "Recolectado por el servicio municipal o de residuos generales", "fr": "Collect\u00e9 par le service municipal ou de d\u00e9chets g\u00e9n\u00e9raux"}}, {"code": "other", "definition": {"en": "A disposal method that does not fit any of the listed categories.", "es": "Un m\u00e9todo de eliminaci\u00f3n que no corresponde a ninguna de las categor\u00edas listadas.", "fr": "Une m\u00e9thode d''\u00e9limination qui ne correspond \u00e0 aucune des cat\u00e9gories list\u00e9es."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "no_system", "definition": {"en": "The facility has no defined healthcare-waste disposal system. Explicit red flag per WASH FIT.", "es": "El establecimiento no tiene un sistema definido de eliminaci\u00f3n de residuos sanitarios. Se\u00f1al de alerta expl\u00edcita para WASH FIT.", "fr": "L''\u00e9tablissement n''a aucun syst\u00e8me d\u00e9fini d''\u00e9limination des d\u00e9chets de soins. Signal d''alerte explicite pour WASH FIT."}, "label": {"en": "No disposal system (red flag)", "es": "Sin sistema de eliminaci\u00f3n (se\u00f1al de alerta)", "fr": "Aucun syst\u00e8me d''\u00e9limination (signal d''alerte)"}}]}'
      bibliography_refs: who-unicef-wash-fit-2022
  HerdTrend:
    title:
      en: Herd Trend
      fr: Tendance du troupeau
      es: Tendencia del rebaño
    description:
      en: Directional change in a pastoral household's total herd size since a reference event or the same season in the prior year. Used in IPC AFI pastoral annex (Section 4.2) as an IPC structural indicator for classifying pastoral livelihood zones. The reference period is defined in survey session metadata, not collected on the profile itself.
      fr: Changement directionnel dans la taille totale du troupeau d'un ménage pastoral depuis un événement de référence ou la même saison de l'année précédente. Utilisé dans l'annexe pastoraliste IPC AFI (Section 4.2) comme indicateur structurel IPC.
      es: Cambio direccional en el tamaño total del rebaño de un hogar pastoral desde un evento de referencia o la misma estación del año anterior. Utilizado en el anexo pastoralista IPC AFI (Sección 4.2) como indicador estructural IPC.
    enum_uri: aidops:HerdTrend
    permissible_values:
      significantly_increased:
        title:
          en: Significantly increased (more than 25%)
          fr: Considérablement augmenté (plus de 25%)
          es: Aumentó significativamente (más del 25%)
        description:
          en: Total herd size has grown by more than 25% since the reference period. Indicates herd rebuilding and recovery.
          fr: La taille totale du troupeau a augmenté de plus de 25% depuis la période de référence. Indique la reconstitution et la récupération du troupeau.
          es: El tamaño total del rebaño creció más del 25% desde el período de referencia. Indica reconstitución y recuperación del rebaño.
      slightly_increased:
        title:
          en: Slightly increased (10–25%)
          fr: Légèrement augmenté (10–25%)
          es: Aumentó ligeramente (10–25%)
        description:
          en: Moderate herd growth since the reference period; household recovering or maintaining stability.
          fr: Croissance modérée du troupeau depuis la période de référence ; ménage en convalescence ou stable.
          es: Crecimiento moderado del rebaño desde el período de referencia; hogar en recuperación o manteniendo estabilidad.
      stayed_same:
        title:
          en: Stayed about the same
          fr: Est resté à peu près le même
          es: Se mantuvo aproximadamente igual
        description:
          en: No significant change in herd size since the reference period.
          fr: Pas de changement significatif dans la taille du troupeau depuis la période de référence.
          es: Sin cambio significativo en el tamaño del rebaño desde el período de referencia.
      slightly_decreased:
        title:
          en: Slightly decreased (10–25%)
          fr: Légèrement diminué (10–25%)
          es: Disminuyó ligeramente (10–25%)
        description:
          en: Moderate herd attrition since the reference period; early stress signal.
          fr: Attrition modérée du troupeau depuis la période de référence ; signal de stress précoce.
          es: Desgaste moderado del rebaño desde el período de referencia; señal de estrés temprana.
      significantly_decreased:
        title:
          en: Significantly decreased (more than 25%)
          fr: Considérablement diminué (plus de 25%)
          es: Disminuyó significativamente (más del 25%)
        description:
          en: Major herd attrition since the reference period; acute stress. Triggers further investigation.
          fr: Attrition majeure du troupeau depuis la période de référence ; stress aigu.
          es: Desgaste mayor del rebaño desde el período de referencia; estrés agudo.
      total_loss:
        title:
          en: Total loss — herd wiped out
          fr: Perte totale — troupeau décimé
          es: Pérdida total — rebaño perdido por completo
        description:
          en: The household has lost all or virtually all of its livestock. IPC destitution indicator; household no longer classified as pastoral.
          fr: Le ménage a perdu la totalité ou la quasi-totalité de son bétail. Indicateur de dénuement IPC ; le ménage n'est plus classifié comme pastoral.
          es: El hogar perdió todo o prácticamente todo su ganado. Indicador de destitución IPC; el hogar ya no se clasifica como pastoral.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot estimate the direction of herd change since the reference period.
          fr: Le répondant ne peut pas estimer la direction du changement du troupeau depuis la période de référence.
          es: El encuestado no puede estimar la dirección del cambio del rebaño desde el período de referencia.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "vsf-belgium-tufts-pastoralist-tools-2019"], "definition": {"en": "Directional change in a pastoral household''s total herd size since a reference event or the same season in the prior year. Used in IPC AFI pastoral annex (Section 4.2) as an IPC structural indicator for classifying pastoral livelihood zones. The reference period is defined in survey session metadata, not collected on the profile itself.", "es": "Cambio direccional en el tama\u00f1o total del reba\u00f1o de un hogar pastoral desde un evento de referencia o la misma estaci\u00f3n del a\u00f1o anterior. Utilizado en el anexo pastoralista IPC AFI (Secci\u00f3n 4.2) como indicador estructural IPC.", "fr": "Changement directionnel dans la taille totale du troupeau d''un m\u00e9nage pastoral depuis un \u00e9v\u00e9nement de r\u00e9f\u00e9rence ou la m\u00eame saison de l''ann\u00e9e pr\u00e9c\u00e9dente. Utilis\u00e9 dans l''annexe pastoraliste IPC AFI (Section 4.2) comme indicateur structurel IPC."}, "id": "herd-trend", "label": {"en": "Herd Trend", "es": "Tendencia del reba\u00f1o", "fr": "Tendance du troupeau"}, "maturity": "draft", "values": [{"code": "significantly_increased", "definition": {"en": "Total herd size has grown by more than 25% since the reference period. Indicates herd rebuilding and recovery.", "es": "El tama\u00f1o total del reba\u00f1o creci\u00f3 m\u00e1s del 25% desde el per\u00edodo de referencia. Indica reconstituci\u00f3n y recuperaci\u00f3n del reba\u00f1o.", "fr": "La taille totale du troupeau a augment\u00e9 de plus de 25% depuis la p\u00e9riode de r\u00e9f\u00e9rence. Indique la reconstitution et la r\u00e9cup\u00e9ration du troupeau."}, "label": {"en": "Significantly increased (more than 25%)", "es": "Aument\u00f3 significativamente (m\u00e1s del 25%)", "fr": "Consid\u00e9rablement augment\u00e9 (plus de 25%)"}}, {"code": "slightly_increased", "definition": {"en": "Moderate herd growth since the reference period; household recovering or maintaining stability.", "es": "Crecimiento moderado del reba\u00f1o desde el per\u00edodo de referencia; hogar en recuperaci\u00f3n o manteniendo estabilidad.", "fr": "Croissance mod\u00e9r\u00e9e du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence ; m\u00e9nage en convalescence ou stable."}, "label": {"en": "Slightly increased (10\u201325%)", "es": "Aument\u00f3 ligeramente (10\u201325%)", "fr": "L\u00e9g\u00e8rement augment\u00e9 (10\u201325%)"}}, {"code": "stayed_same", "definition": {"en": "No significant change in herd size since the reference period.", "es": "Sin cambio significativo en el tama\u00f1o del reba\u00f1o desde el per\u00edodo de referencia.", "fr": "Pas de changement significatif dans la taille du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Stayed about the same", "es": "Se mantuvo aproximadamente igual", "fr": "Est rest\u00e9 \u00e0 peu pr\u00e8s le m\u00eame"}}, {"code": "slightly_decreased", "definition": {"en": "Moderate herd attrition since the reference period; early stress signal.", "es": "Desgaste moderado del reba\u00f1o desde el per\u00edodo de referencia; se\u00f1al de estr\u00e9s temprana.", "fr": "Attrition mod\u00e9r\u00e9e du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence ; signal de stress pr\u00e9coce."}, "label": {"en": "Slightly decreased (10\u201325%)", "es": "Disminuy\u00f3 ligeramente (10\u201325%)", "fr": "L\u00e9g\u00e8rement diminu\u00e9 (10\u201325%)"}}, {"code": "significantly_decreased", "definition": {"en": "Major herd attrition since the reference period; acute stress. Triggers further investigation.", "es": "Desgaste mayor del reba\u00f1o desde el per\u00edodo de referencia; estr\u00e9s agudo.", "fr": "Attrition majeure du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence ; stress aigu."}, "label": {"en": "Significantly decreased (more than 25%)", "es": "Disminuy\u00f3 significativamente (m\u00e1s del 25%)", "fr": "Consid\u00e9rablement diminu\u00e9 (plus de 25%)"}}, {"code": "total_loss", "definition": {"en": "The household has lost all or virtually all of its livestock. IPC destitution indicator; household no longer classified as pastoral.", "es": "El hogar perdi\u00f3 todo o pr\u00e1cticamente todo su ganado. Indicador de destituci\u00f3n IPC; el hogar ya no se clasifica como pastoral.", "fr": "Le m\u00e9nage a perdu la totalit\u00e9 ou la quasi-totalit\u00e9 de son b\u00e9tail. Indicateur de d\u00e9nuement IPC ; le m\u00e9nage n''est plus classifi\u00e9 comme pastoral."}, "label": {"en": "Total loss \u2014 herd wiped out", "es": "P\u00e9rdida total \u2014 reba\u00f1o perdido por completo", "fr": "Perte totale \u2014 troupeau d\u00e9cim\u00e9"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot estimate the direction of herd change since the reference period.", "es": "El encuestado no puede estimar la direcci\u00f3n del cambio del reba\u00f1o desde el per\u00edodo de referencia.", "fr": "Le r\u00e9pondant ne peut pas estimer la direction du changement du troupeau depuis la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
