 un mini-r\u00e9seau ou une autre source non solaire hors r\u00e9seau."}, "label": {"en": "Electricity (other source)", "es": "Electricidad (otra fuente)", "fr": "\u00c9lectricit\u00e9 (autre source)"}}, {"code": "kerosene_lamp", "definition": {"en": "A wick lamp, hurricane lamp, or pressure lamp burning kerosene. Associated with indoor air pollution and fire risk.", "es": "L\u00e1mpara de mecha, l\u00e1mpara de hurac\u00e1n o l\u00e1mpara de presi\u00f3n que quema queroseno. Asociada a la contaminaci\u00f3n del aire interior y al riesgo de incendio.", "fr": "Lampe \u00e0 m\u00e8che, lanterne temp\u00eate ou lampe \u00e0 pression fonctionnant au p\u00e9trole lampant. Associ\u00e9e \u00e0 la pollution de l''air int\u00e9rieur et au risque d''incendie."}, "label": {"en": "Kerosene lamp", "es": "L\u00e1mpara de queroseno", "fr": "Lampe \u00e0 p\u00e9trole"}}, {"code": "candle", "definition": {"en": "Wax or tallow candle as the primary lighting source.", "es": "Vela de cera o sebo como fuente principal de iluminaci\u00f3n.", "fr": "Bougie en cire ou en suif comme principale source d''\u00e9clairage."}, "label": {"en": "Candle", "es": "Vela", "fr": "Bougie"}}, {"code": "battery_powered_lamp", "definition": {"en": "Battery-powered flashlight, torch, or rechargeable lamp not connected to a solar system.", "es": "Linterna de pilas, antorcha o l\u00e1mpara recargable no conectada a un sistema solar.", "fr": "Lampe de poche, torche ou lampe rechargeable \u00e0 piles non raccord\u00e9e \u00e0 un syst\u00e8me solaire."}, "label": {"en": "Battery-powered lamp / torch", "es": "L\u00e1mpara a pilas / linterna", "fr": "Lampe \u00e0 piles / torche"}}, {"code": "wood_fire_torch", "definition": {"en": "Open wood fire or torch used for lighting. Highest indoor air pollution and fire risk.", "es": "Fuego de le\u00f1a abierto o antorcha usada para iluminaci\u00f3n. El mayor riesgo de contaminaci\u00f3n del aire interior e incendio.", "fr": "Feu de bois ouvert ou torche utilis\u00e9 pour l''\u00e9clairage. Risque de pollution de l''air int\u00e9rieur et d''incendie le plus \u00e9lev\u00e9."}, "label": {"en": "Wood fire / torch", "es": "Fuego de le\u00f1a / antorcha", "fr": "Feu de bois / torche"}}, {"code": "other", "definition": {"en": "A lighting source not covered by the other categories.", "es": "Una fuente de iluminaci\u00f3n no cubierta por las otras categor\u00edas.", "fr": "Une source d''\u00e9clairage non couverte par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
