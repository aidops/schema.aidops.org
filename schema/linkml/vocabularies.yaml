crisis
        (cuando la reducci\u00f3n compromete la escolarizaci\u00f3n) o en el nivel estr\u00e9s; las operaciones deben contextualizar la asignaci\u00f3n por pa\u00eds.", "fr": "Niveau LCS = crise. Les adaptations par pays varient sur le positionnement des r\u00e9ductions de d\u00e9penses d''\u00e9ducation au niveau crise (lorsque la r\u00e9duction compromet la scolarit\u00e9) ou au niveau stress ; les op\u00e9rations doivent contextualiser l''affectation par pays."}}, {"code": "consumed_seed_stock", "definition": {"en": "The household consumed seed stocks held for the next planting season. Crisis tier: compromises the next production cycle.", "es": "El hogar consumi\u00f3 reservas de semillas guardadas para la pr\u00f3xima siembra. Nivel crisis: compromete el pr\u00f3ximo ciclo productivo.", "fr": "Le m\u00e9nage a consomm\u00e9 les stocks de semences conserv\u00e9s pour la prochaine saison. Niveau crise : compromet le prochain cycle de production."}, "label": {"en": "Consumed seed stock", "es": "Consumi\u00f3 las reservas de semillas", "fr": "A consomm\u00e9 les stocks de semences"}, "notes": {"en": "LCS tier = crisis"}}, {"code": "harvested_immature_crops", "definition": {"en": "The household harvested crops before maturity. Crisis tier: reduces yield and compromises the current production cycle.", "es": "El hogar cosech\u00f3 cultivos antes de su madurez. Nivel crisis: reduce el rendimiento y compromete el ciclo productivo actual.", "fr": "Le m\u00e9nage a r\u00e9colt\u00e9 des cultures avant maturit\u00e9. Niveau crise : r\u00e9duit le rendement et compromet le cycle de production en cours."}, "label": {"en": "Harvested immature crops", "es": "Cosech\u00f3 cultivos inmaduros", "fr": "A r\u00e9colt\u00e9 des cultures immatures"}, "notes": {"en": "LCS tier = crisis"}}, {"code": "sold_house_or_land", "definition": {"en": "The household sold its house or land to meet food needs. Emergency tier: irreversible loss of productive or sheltering asset.", "es": "El hogar vendi\u00f3 su casa o tierra para cubrir las necesidades alimentarias. Nivel emergencia: p\u00e9rdida irreversible de activo productivo o de vivienda.", "fr": "Le m\u00e9nage a vendu sa maison ou sa terre pour couvrir ses besoins alimentaires. Niveau urgence : perte irr\u00e9versible d''un actif productif ou de logement."}, "label": {"en": "Sold house or land", "es": "Vendi\u00f3 la casa o la tierra", "fr": "A vendu la maison ou la terre"}, "notes": {"en": "LCS tier = emergency"}}, {"code": "migrated_whole_household", "definition": {"en": "The whole household migrated to find food or income. Emergency tier: distinct from normal seasonal labour migration, which is not coping.", "es": "El hogar entero migr\u00f3 para buscar alimentos o ingresos. Nivel emergencia: distinto de la migraci\u00f3n laboral estacional normal, que no constituye afrontamiento de crisis.", "fr": "Le m\u00e9nage entier a migr\u00e9 pour trouver de la nourriture ou un revenu. Niveau urgence : distinct de la migration de main-d''\u0153uvre saisonni\u00e8re normale, qui ne rel\u00e8ve pas de l''adaptation de crise."}, "label": {"en": "Migrated as a whole household", "es": "Migr\u00f3 como hogar entero", "fr": "A migr\u00e9 en tant que m\u00e9nage entier"}, "notes": {"en": "LCS tier = emergency"}}, {"code": "child_labor", "definition": {"en": "Household members, including children, engaged in exploitative or high-risk work to meet food needs. Emergency tier: long-term welfare harm, protection red flag.", "es": "Miembros del hogar, incluidos ni\u00f1os, recurrieron a trabajo de explotaci\u00f3n o de alto riesgo para cubrir las necesidades alimentarias. Nivel emergencia: da\u00f1o al bienestar de largo plazo, se\u00f1al de alerta de protecci\u00f3n.", "fr": "Des membres du m\u00e9nage, y compris des enfants, ont eu recours \u00e0 un travail exploitant ou \u00e0 haut risque pour couvrir les besoins alimentaires. Niveau urgence : pr\u00e9judice de bien-\u00eatre \u00e0 long terme, signal d''alerte en mati\u00e8re de protection."}, "label": {"en": "Engaged in child labour or high-risk work", "es": "Recurri\u00f3 al trabajo infantil o trabajo de alto riesgo", "fr": "A eu recours au travail des enfants ou au travail \u00e0 haut risque"}, "notes": {"en": "LCS tier = emergency"}}, {"code": "early_marriage", "definition": {"en": "The household arranged the early marriage of one or more members (typically a girl) to reduce household burden or obtain bride price. Emergency tier: long-term welfare harm, protection red flag.", "es": "El hogar concert\u00f3 el matrimonio precoz de uno o m\u00e1s miembros (t\u00edpicamente una ni\u00f1a) para reducir la carga familiar u obtener una dote. Nivel emergencia: da\u00f1o al bienestar de largo plazo, se\u00f1al de alerta de protecci\u00f3n.", "fr": "Le m\u00e9nage a organis\u00e9 le mariage pr\u00e9coce d''un ou plusieurs membres (typiquement une fille) pour all\u00e9ger la charge du m\u00e9nage ou obtenir une dot. Niveau urgence : pr\u00e9judice de bien-\u00eatre \u00e0 long terme, signal d''alerte en mati\u00e8re de protection."}, "label": {"en": "Arranged early marriage for a household member", "es": "Concert\u00f3 el matrimonio precoz de un miembro del hogar", "fr": "A organis\u00e9 un mariage pr\u00e9coce pour un membre du m\u00e9nage"}, "notes": {"en": "LCS tier = emergency"}}, {"code": "begging", "definition": {"en": "Household members begged for food or money. Emergency tier.", "es": "Miembros del hogar mendigaron comida o dinero. Nivel emergencia.", "fr": "Des membres du m\u00e9nage ont mendi\u00e9 de la nourriture ou de l''argent. Niveau urgence."}, "label": {"en": "Begged for food or money", "es": "Mendig\u00f3 comida o dinero", "fr": "A mendi\u00e9 de la nourriture ou de l''argent"}, "notes": {"en": "LCS tier = emergency"}}]}'
      bibliography_refs: wfp-lcs
  LightingSource:
    title:
      en: Lighting Source
      fr: Source d'éclairage
      es: Fuente de iluminación
    description:
      en: 'The primary source of lighting used in the household at night. Distinct from electricity source: a household with a solar home system may still use kerosene lamps for supplementary lighting. WHO Household Energy Database tracks lighting source separately from cooking fuel. DHS hv207 and MICS6 HC9 capture this item.'
      fr: 'La source principale d''éclairage utilisée par le ménage la nuit. Distincte de la source d''électricité : un ménage équipé d''un système solaire domestique peut encore utiliser des lampes à pétrole pour l''éclairage d''appoint. La base de données sur l''énergie domestique de l''OMS suit la source d''éclairage séparément du combustible de cuisson. DHS hv207 et MICS6 HC9 capturent cet item.'
      es: 'La fuente principal de iluminación utilizada en el hogar por la noche. Distinta de la fuente de electricidad: un hogar con un sistema solar doméstico puede seguir usando lámparas de queroseno para iluminación suplementaria. La base de datos de energía doméstica de la OMS rastrea la fuente de iluminación por separado del combustible de cocción. DHS hv207 y MICS6 HC9 capturan este ítem.'
    enum_uri: aidops:LightingSource
    permissible_values:
      electricity_grid:
        title:
          en: Electricity (national grid)
          fr: Électricité (réseau national)
          es: Electricidad (red nacional)
        description:
          en: Lighting from the national electricity grid.
          fr: Éclairage par le réseau électrique national.
          es: Iluminación de la red eléctrica nacional.
      electricity_solar:
        title:
          en: Electricity (solar system)
          fr: Électricité (système solaire)
          es: Electricidad (sistema solar)
        description:
          en: Lighting from a solar home system, solar lantern, or other solar electricity source.
          fr: Éclairage par un système solaire domestique, une lanterne solaire ou une autre source d'électricité solaire.
          es: Iluminación de un sistema solar doméstico, linterna solar u otra fuente de electricidad solar.
      electricity_other:
        title:
          en: Electricity (other source)
          fr: Électricité (autre source)
          es: Electricidad (otra fuente)
        description:
          en: Lighting from electricity generated by a generator, mini-grid, or other non-solar, non-grid source.
          fr: Éclairage par de l'électricité produite par un groupe électrogène, un mini-réseau ou une autre source non solaire hors réseau.
          es: Iluminación de electricidad generada por un generador, mini-red u otra fuente no solar y fuera de red.
      kerosene_lamp:
        title:
          en: Kerosene lamp
          fr: Lampe à pétrole
          es: Lámpara de queroseno
        description:
          en: A wick lamp, hurricane lamp, or pressure lamp burning kerosene. Associated with indoor air pollution and fire risk.
          fr: Lampe à mèche, lanterne tempête ou lampe à pression fonctionnant au pétrole lampant. Associée à la pollution de l'air intérieur et au risque d'incendie.
          es: Lámpara de mecha, lámpara de huracán o lámpara de presión que quema queroseno. Asociada a la contaminación del aire interior y al riesgo de incendio.
      candle:
        title:
          en: Candle
          fr: Bougie
          es: Vela
        description:
          en: Wax or tallow candle as the primary lighting source.
          fr: Bougie en cire ou en suif comme principale source d'éclairage.
          es: Vela de cera o sebo como fuente principal de iluminación.
      battery_powered_lamp:
        title:
          en: Battery-powered lamp / torch
          fr: Lampe à piles / torche
          es: Lámpara a pilas / linterna
        description:
          en: Battery-powered flashlight, torch, or rechargeable lamp not connected to a solar system.
          fr: Lampe de poche, torche ou lampe rechargeable à piles non raccordée à un système solaire.
          es: Linterna de pilas, antorcha o lámpara recargable no conectada a un sistema solar.
      wood_fire_torch:
        title:
          en: Wood fire / torch
          fr: Feu de bois / torche
          es: Fuego de leña / antorcha
        description:
          en: Open wood fire or torch used for lighting. Highest indoor air pollution and fire risk.
          fr: Feu de bois ouvert ou torche utilisé pour l'éclairage. Risque de pollution de l'air intérieur et d'incendie le plus élevé.
          es: Fuego de leña abierto o antorcha usada para iluminación. El mayor riesgo de contaminación del aire interior e incendio.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: A lighting source not covered by the other categories.
          fr: Une source d'éclairage non couverte par les autres catégories.
          es: Una fuente de iluminación no cubierta por las otras categorías.
    annotations:
