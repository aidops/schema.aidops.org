  VetAccessBarrier:
    title:
      en: Veterinary Services Access Barrier
      fr: Obstacle à l'accès aux services vétérinaires
      es: Barrera al acceso a servicios veterinarios
    description:
      en: 'Reasons preventing a pastoral household from accessing veterinary or animal health services when needed. Multi-select vocabulary used in PastoralFoodSecurityProfile `vet_access_barriers`. The taxonomy is pastoral-specific: it includes `vet_post_outside_migration_route` (services not accessible during migration movement) and `conflict_insecurity` (armed conflict blocking access), which are barriers characteristic of mobile herding households that are not present in equivalent AgricultureProfile items.'
      fr: 'Raisons empêchant un ménage pastoral d''accéder aux services vétérinaires ou de santé animale. Vocabulaire à sélection multiple. Taxonomie propre au pastoralisme : inclut `vet_post_outside_migration_route` et `conflict_insecurity`, caractéristiques des ménages d''élevage mobile.'
      es: 'Razones que impiden a un hogar pastoral acceder a servicios veterinarios o de salud animal. Vocabulario de selección múltiple. La taxonomía es específica del pastoralismo: incluye `vet_post_outside_migration_route` y `conflict_insecurity`, características de hogares de ganadería móvil.'
    enum_uri: aidops:VetAccessBarrier
    permissible_values:
      no_vet_post_nearby:
        title:
          en: No veterinary post or animal health worker nearby
          fr: Pas de poste vétérinaire ni d'agent de santé animale à proximité
          es: No hay puesto veterinario ni trabajador de salud animal cercano
        description:
          en: The nearest veterinary service is too far from the household's location or migration route to be practically accessible.
          fr: Le service vétérinaire le plus proche est trop éloigné de l'emplacement du ménage ou de sa route de migration pour être pratiquement accessible.
          es: El servicio veterinario más cercano está demasiado lejos de la ubicación del hogar o de su ruta de migración para ser accesible en la práctica.
      vet_post_outside_migration_route:
        title:
          en: Veterinary post not on migration route
          fr: Poste vétérinaire hors de la route de migration
          es: Puesto veterinario fuera de la ruta de migración
        description:
          en: Veterinary services are available in principle but not accessible during the household's migration movement; the post is located off the migration corridor.
          fr: Les services vétérinaires sont disponibles en principe mais pas accessibles pendant le déplacement de migration du ménage ; le poste est situé hors du couloir de migration.
          es: Los servicios veterinarios están disponibles en principio pero no son accesibles durante el movimiento de migración del hogar; el puesto está ubicado fuera del corredor de migración.
      cost_unaffordable:
        title:
          en: Cost of services too high
          fr: Coût des services trop élevé
          es: Costo de los servicios demasiado alto
        description:
          en: Household could not afford the cost of veterinary drugs, vaccines, or consultation fees.
          fr: Le ménage ne pouvait pas se permettre le coût des médicaments vétérinaires, des vaccins ou des frais de consultation.
          es: El hogar no podía costear los medicamentos veterinarios, vacunas o tarifas de consulta.
      drug_stockout:
        title:
          en: Drugs or vaccines out of stock
          fr: Médicaments ou vaccins en rupture de stock
          es: Medicamentos o vacunas agotados
        description:
          en: Veterinary services were available but the needed drugs, vaccines, or supplies were out of stock at the point of service.
          fr: Les services vétérinaires étaient disponibles mais les médicaments, vaccins ou fournitures nécessaires étaient en rupture de stock.
          es: Los servicios veterinarios estaban disponibles pero los medicamentos, vacunas o suministros necesarios estaban agotados en el punto de servicio.
      conflict_insecurity:
        title:
          en: Conflict or insecurity blocked access
          fr: Conflit ou insécurité a bloqué l'accès
          es: Conflicto o inseguridad bloqueó el acceso
        description:
          en: Armed conflict, insecurity, or movement restrictions prevented the household from reaching the veterinary service.
          fr: Un conflit armé, une insécurité ou des restrictions de mouvement ont empêché le ménage d'atteindre le service vétérinaire.
          es: Conflicto armado, inseguridad o restricciones de movimiento impidieron al hogar llegar al servicio veterinario.
      language_barrier:
        title:
          en: Language barrier
          fr: Barrière linguistique
          es: Barrera idiomática
        description:
          en: Veterinary services were not available in the household's primary language.
          fr: Les services vétérinaires n'étaient pas disponibles dans la langue principale du ménage.
          es: Los servicios veterinarios no estaban disponibles en el idioma principal del hogar.
      distrust_of_services:
        title:
          en: Distrust of services or treatments
          fr: Méfiance envers les services ou les traitements
          es: Desconfianza en los servicios o tratamientos
        description:
          en: Household did not trust the quality or safety of available veterinary services or treatments.
          fr: Le ménage n'avait pas confiance dans la qualité ou la sécurité des services vétérinaires ou traitements disponibles.
          es: El hogar no confiaba en la calidad o seguridad de los servicios veterinarios o tratamientos disponibles.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Barrier to veterinary access not listed in the codes above.
          fr: Obstacle à l'accès vétérinaire non répertorié dans les codes ci-dessus.
          es: Barrera al acceso veterinario no listada en los códigos anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-pastoral-monitoring-2020", "fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "rima-ii-fao-2016-pastoral"], "definition": {"en": "Reasons preventing a pastoral household from accessing veterinary or animal health services when needed. Multi-select vocabulary used in PastoralFoodSecurityProfile `vet_access_barriers`. The taxonomy is pastoral-specific: it includes `vet_post_outside_migration_route` (services not accessible during migration movement) and `conflict_insecurity` (armed conflict blocking access), which are barriers characteristic of mobile herding households that are not present in equivalent AgricultureProfile items.", "es": "Razones que impiden a un hogar pastoral acceder a servicios veterinarios o de salud animal. Vocabulario de selecci\u00f3n m\u00faltiple. La taxonom\u00eda es espec\u00edfica del pastoralismo: incluye `vet_post_outside_migration_route` y `conflict_insecurity`, caracter\u00edsticas de hogares de ganader\u00eda m\u00f3vil.", "fr": "Raisons emp\u00eachant un m\u00e9nage pastoral d''acc\u00e9der aux services v\u00e9t\u00e9rinaires ou de sant\u00e9 animale. Vocabulaire \u00e0 s\u00e9lection multiple. Taxonomie propre au pastoralisme : inclut `vet_post_outside_migration_route` et `conflict_insecurity`, caract\u00e9ristiques des m\u00e9nages d''\u00e9levage mobile."}, "id": "vet-access-barrier", "label": {"en": "Veterinary Services Access Barrier", "es": "Barrera al acceso a servicios veterinarios", "fr": "Obstacle \u00e0 l''acc\u00e8s aux services v\u00e9t\u00e9rinaires"}, "maturity": "draft", "values": [{"code": "no_vet_post_nearby", "definition": {"en": "The nearest veterinary service is too far from the household''s location or migration route to be practically accessible.", "es": "El servicio veterinario m\u00e1s cercano est\u00e1 demasiado lejos de la ubicaci\u00f3n del hogar o de su ruta de migraci\u00f3n para ser accesible en la pr\u00e1ctica.", "fr": "Le service v\u00e9t\u00e9rinaire le plus proche est trop \u00e9loign\u00e9 de l''emplacement du m\u00e9nage ou de sa route de migration pour \u00eatre pratiquement accessible."}, "label": {"en": "No veterinary post or animal health worker nearby", "es": "No hay puesto veterinario ni trabajador de salud animal cercano", "fr": "Pas de poste v\u00e9t\u00e9rinaire ni d''agent de sant\u00e9 animale \u00e0 proximit\u00e9"}}, {"code": "vet_post_outside_migration_route", "definition": {"en": "Veterinary services are available in principle but not accessible during the household''s migration movement; the post is located off the migration corridor.", "es": "Los servicios veterinarios est\u00e1n disponibles en principio pero no son accesibles durante el movimiento de migraci\u00f3n del hogar; el puesto est\u00e1 ubicado fuera del corredor de migraci\u00f3n.", "fr": "Les services v\u00e9t\u00e9rinaires sont disponibles en principe mais pas accessibles pendant le d\u00e9placement de migration du m\u00e9nage ; le poste est situ\u00e9 hors du couloir de migration."}, "label": {"en": "Veterinary post not on migration route", "es": "Puesto veterinario fuera de la ruta de migraci\u00f3n", "fr": "Poste v\u00e9t\u00e9rinaire hors de la route de migration"}}, {"code": "cost_unaffordable", "definition": {"en": "Household could not afford the cost of veterinary drugs, vaccines, or consultation fees.", "es": "El hogar no pod\u00eda costear los medicamentos veterinarios, vacunas o tarifas de consulta.", "fr": "Le m\u00e9nage ne pouvait pas se permettre le co\u00fbt des m\u00e9dicaments v\u00e9t\u00e9rinaires, des vaccins ou des frais de consultation."}, "label": {"en": "Cost of services too high", "es": "Costo de los servicios demasiado alto", "fr": "Co\u00fbt des services trop \u00e9lev\u00e9"}}, {"code": "drug_stockout", "definition": {"en": "Veterinary services were available but the needed drugs, vaccines, or supplies were out of stock at the point of service.", "es": "Los servicios veterinarios estaban disponibles pero los medicamentos, vacunas o suministros necesarios estaban agotados en el punto de servicio.", "fr": "Les services v\u00e9t\u00e9rinaires \u00e9taient disponibles mais les m\u00e9dicaments, vaccins ou fournitures n\u00e9cessaires \u00e9taient en rupture de stock."}, "label": {"en": "Drugs or vaccines out of stock", "es": "Medicamentos o vacunas agotados", "fr": "M\u00e9dicaments ou vaccins en rupture de stock"}}, {"code": "conflict_insecurity", "definition": {"en": "Armed conflict, insecurity, or movement restrictions prevented the household from reaching the veterinary service.", "es": "Conflicto armado, inseguridad o restricciones de movimiento impidieron al hogar llegar al servicio veterinario.", "fr": "Un conflit arm\u00e9, une ins\u00e9curit\u00e9 ou des restrictions de mouvement ont emp\u00each\u00e9 le m\u00e9nage d''atteindre le service v\u00e9t\u00e9rinaire."}, "label": {"en": "Conflict or insecurity blocked access", "es": "Conflicto o inseguridad bloque\u00f3 el acceso", "fr": "Conflit ou ins\u00e9curit\u00e9 a bloqu\u00e9 l''acc\u00e8s"}}, {"code": "language_barrier", "definition": {"en": "Veterinary services were not available in the household''s primary language.", "es": "Los servicios veterinarios no estaban disponibles en el idioma principal del hogar.", "fr": "Les services v\u00e9t\u00e9rinaires n''\u00e9taient pas disponibles dans la langue principale du m\u00e9nage."}, "label": {"en": "Language barrier", "es": "Barrera idiom\u00e1tica", "fr": "Barri\u00e8re linguistique"}}, {"code": "distrust_of_services", "definition": {"en": "Household did not trust the quality or safety of available veterinary services or treatments.", "es": "El hogar no confiaba en la calidad o seguridad de los servicios veterinarios o tratamientos disponibles.", "fr": "Le m\u00e9nage n''avait pas confiance dans la qualit\u00e9 ou la s\u00e9curit\u00e9 des services v\u00e9t\u00e9rinaires ou traitements disponibles."}, "label": 