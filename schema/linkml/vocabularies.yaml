: "lack_of_equipment", "definition": {"en": "The facility lacks essential medical equipment (e.g., autoclave, cold-chain refrigerator, delivery bed, diagnostic equipment).", "es": "El establecimiento carece de equipamiento m\u00e9dico esencial (p. ej., autoclave, refrigerador de cadena de fr\u00edo, cama de parto, equipos diagn\u00f3sticos).", "fr": "L''\u00e9tablissement manque d''\u00e9quipement m\u00e9dical essentiel (par exemple, autoclave, r\u00e9frig\u00e9rateur de cha\u00eene du froid, lit d''accouchement, \u00e9quipement de diagnostic)."}, "label": {"en": "Lack of equipment", "es": "Falta de equipamiento", "fr": "Manque d''\u00e9quipement"}}, {"code": "lack_of_electricity", "definition": {"en": "The facility does not have reliable electricity, preventing cold-chain storage, lighting, or equipment operation.", "es": "El establecimiento no tiene electricidad confiable, lo que impide el almacenamiento en cadena de fr\u00edo, la iluminaci\u00f3n o el funcionamiento de equipos.", "fr": "L''\u00e9tablissement n''a pas d''\u00e9lectricit\u00e9 fiable, ce qui emp\u00eache le stockage en cha\u00eene du froid, l''\u00e9clairage ou le fonctionnement de l''\u00e9quipement."}, "label": {"en": "Lack of electricity", "es": "Falta de electricidad", "fr": "Manque d''\u00e9lectricit\u00e9"}}, {"code": "lack_of_water", "definition": {"en": "The facility does not have reliable water for clinical use, hand hygiene, or sanitation.", "es": "El establecimiento no tiene agua confiable para uso cl\u00ednico, higiene de manos o saneamiento.", "fr": "L''\u00e9tablissement n''a pas d''eau fiable pour l''usage clinique, l''hygi\u00e8ne des mains ou l''assainissement."}, "label": {"en": "Lack of water", "es": "Falta de agua", "fr": "Manque d''eau"}}, {"code": "security_or_access", "definition": {"en": "The facility cannot operate or be reached due to insecurity, active conflict, checkpoints, or access restrictions.", "es": "El establecimiento no puede operar o ser alcanzado debido a inseguridad, conflicto activo, puntos de control o restricciones de acceso.", "fr": "L''\u00e9tablissement ne peut fonctionner ou \u00eatre atteint en raison de l''ins\u00e9curit\u00e9, d''un conflit actif, de points de contr\u00f4le ou de restrictions d''acc\u00e8s."}, "label": {"en": "Security or access barrier", "es": "Barrera de seguridad o acceso", "fr": "Barri\u00e8re de s\u00e9curit\u00e9 ou d''acc\u00e8s"}}, {"code": "occupied_by_armed_actors", "definition": {"en": "The facility is physically occupied or controlled by an armed actor (state or non-state), preventing civilian health service delivery.", "es": "El establecimiento est\u00e1 f\u00edsicamente ocupado o controlado por un actor armado (estatal o no estatal), impidiendo la prestaci\u00f3n de servicios de salud civiles.", "fr": "L''\u00e9tablissement est physiquement occup\u00e9 ou contr\u00f4l\u00e9 par un acteur arm\u00e9 (\u00e9tatique ou non \u00e9tatique), emp\u00eachant la prestation de services de sant\u00e9 civils."}, "label": {"en": "Occupied by armed actors", "es": "Ocupado por actores armados", "fr": "Occup\u00e9 par des acteurs arm\u00e9s"}}, {"code": "closed_by_authorities", "definition": {"en": "The facility has been closed by an administrative or governmental decision (e.g., health-sector restructuring, suspension).", "es": "El establecimiento ha sido cerrado por decisi\u00f3n administrativa o gubernamental (p. ej., reestructuraci\u00f3n del sector salud, suspensi\u00f3n).", "fr": "L''\u00e9tablissement a \u00e9t\u00e9 ferm\u00e9 par une d\u00e9cision administrative ou gouvernementale (par exemple, restructuration du secteur de la sant\u00e9, suspension)."}, "label": {"en": "Closed by authorities", "es": "Cerrado por las autoridades", "fr": "Ferm\u00e9 par les autorit\u00e9s"}}, {"code": "natural_disaster_damage", "definition": {"en": "The facility is non-functional due to damage from a natural hazard event such as an earthquake, flood, cyclone, or landslide.", "es": "El establecimiento no es funcional debido a da\u00f1os por un evento natural como un terremoto, inundaci\u00f3n, cicl\u00f3n o deslizamiento.", "fr": "L''\u00e9tablissement n''est pas fonctionnel en raison de dommages caus\u00e9s par un al\u00e9a naturel tel qu''un s\u00e9isme, une inondation, un cyclone ou un glissement de terrain."}, "label": {"en": "Natural-disaster damage", "es": "Da\u00f1os por desastre natural", "fr": "Dommages dus \u00e0 une catastrophe naturelle"}}, {"code": "other", "definition": {"en": "A non-functionality reason that does not fit any of the listed categories.", "es": "Un motivo de no funcionalidad que no corresponde a ninguna de las categor\u00edas listadas.", "fr": "Un motif de non-fonctionnalit\u00e9 qui ne correspond \u00e0 aucune des cat\u00e9gories list\u00e9es."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
  FamilyPlanningMethod:
    title:
      en: Family Planning Method
      fr: Méthode de planification familiale
      es: Método de planificación familiar
    description:
      en: Contraceptive method used to delay, space, or prevent pregnancy. Codes follow the canonical DHS-7/DHS-8 modern and traditional method classification. Used as a multi-select vocabulary for current use and past use questions. Shared between ReproductiveHealthProfile and MaternalNewbornHealthProfile (postpartum contraception).
      fr: Méthode contraceptive utilisée pour retarder, espacer ou prévenir une grossesse. Les codes suivent la classification canonique DHS-7/DHS-8 des méthodes modernes et traditionnelles. Utilisé comme vocabulaire à sélection multiple pour les questions sur l'utilisation actuelle et passée. Partagé entre ReproductiveHealthProfile et MaternalNewbornHealthProfile (contraception post-partum).
      es: Método anticonceptivo utilizado para retrasar, espaciar o prevenir el embarazo. Los códigos siguen la clasificación canónica de métodos modernos y tradicionales DHS-7/DHS-8. Se utiliza como vocabulario de selección múltiple para preguntas sobre uso actual y pasado. Compartido entre ReproductiveHealthProfile y MaternalNewbornHealthProfile (anticoncepción posparto).
    enum_uri: aidops:FamilyPlanningMethod
    permissible_values:
      female_sterilization:
        title:
          en: Female sterilization
          fr: Stérilisation féminine
          es: Esterilización femenina
        description:
          en: Permanent surgical method (tubal ligation). Modern method.
          fr: Méthode chirurgicale permanente (ligature des trompes). Méthode moderne.
          es: Método quirúrgico permanente (ligadura de trompas). Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      male_sterilization:
        title:
          en: Male sterilization
          fr: Stérilisation masculine
          es: Esterilización masculina
        description:
          en: Permanent surgical method (vasectomy). Modern method.
          fr: Méthode chirurgicale permanente (vasectomie). Méthode moderne.
          es: Método quirúrgico permanente (vasectomía). Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      pill:
        title:
          en: Oral contraceptive pill
          fr: Pilule contraceptive orale
          es: Píldora anticonceptiva oral
        description:
          en: Combined or progestin-only oral contraceptive pill. Modern method.
          fr: Pilule contraceptive orale combinée ou à base de progestatif uniquement. Méthode moderne.
          es: Píldora anticonceptiva oral combinada o solo progestina. Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      iud:
        title:
          en: IUD (intrauterine device)
          fr: DIU (dispositif intra-utérin)
          es: DIU (dispositivo intrauterino)
        description:
          en: Copper or hormonal intrauterine device. Modern method.
          fr: Dispositif intra-utérin en cuivre ou hormonal. Méthode moderne.
          es: Dispositivo intrauterino de cobre u hormonal. Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      injectable:
        title:
          en: Injectable
          fr: Contraceptif injectable
          es: Inyectable
        description:
          en: Hormonal injectable contraceptive (e.g., Depo-Provera, Sayana Press, Noristerat). Modern method.
          fr: Contraceptif injectable hormonal (p. ex. Depo-Provera, Sayana Press, Noristerone). Méthode moderne.
          es: Anticonceptivo inyectable hormonal (p. ej., Depo-Provera, Sayana Press, Noristerat). Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      implant:
        title:
          en: Implant
          fr: Implant
          es: Implante
        description:
          en: Subdermal hormonal implant (e.g., Norplant, Jadelle, Implanon, Nexplanon). Modern method.
          fr: Implant hormonal sous-cutané (p. ex. Norplant, Jadelle, Implanon, Nexplanon). Méthode moderne.
          es: Implante hormonal subdérmico (p. ej., Norplant, Jadelle, Implanon, Nexplanon). Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      male_condom:
        title:
          en: Male condom
          fr: Préservatif masculin
          es: Condón masculino
        description:
          en: Male latex or non-latex condom. Modern method; also provides STI/HIV protection.
          fr: Préservatif masculin en latex ou non-latex. Méthode moderne ; offre également une protection contre les IST/VIH.
          es: Condón masculino de látex o no látex. Método moderno; también protege contra ITS/VIH.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      female_condom:
        title:
          en: Female condom
          fr: Préservatif féminin
          es: Condón femenino
        description:
          en: Female (internal) condom. Modern method; also provides STI/HIV protection.
          fr: Préservatif féminin (interne). Méthode moderne ; offre également une protection contre les IST/VIH.
          es: Condón femenino (interno). Método moderno; también protege contra ITS/VIH.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      emergency_contraception:
        title:
          en: Emergency contraception
          fr: Contraception d'urgence
          es: Anticoncepción de emergencia
        description:
          en: Emergency contraceptive pills (levonorgestrel or ulipristal acetate) used after unprotected intercourse. Modern method.
          fr: Pilules contraceptives d'urgence (lévonorgestrel ou acétate d'ulipristal) utilisées après un rapport non protégé. Méthode moderne.
          es: Píldoras anticonceptivas de emergencia (levonorgestrel o acetato de ulipristal) utilizadas después de una relación sexual sin protección. Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      standard_days_method:
        title:
          en: Standard days method
          fr: Méthode des jours standard
          es: Método de días estándar
        description:
          en: Fertility awareness method using CycleBeads to identify fertile days (days 8-19 of a 26-32 day cycle). Modern method per DHS-7.
          fr: Méthode de sensibilisation à la fertilité utilisant les CycleBeads pour identifier les jours fertiles (jours 8 à 19 d'un cycle de 26 à 32 jours). Méthode moderne selon DHS-7.
          es: Método de conciencia de fertilidad que usa CycleBeads para identificar los días fértiles (días 8 al 19 de un ciclo de 26 a 32 días). Método moderno según DHS-7.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      lam:
        title:
          en: Lactational amenorrhea method (LAM)
          fr: Méthode de l'aménorrhée lactationnelle (MAMA)
          es: Método de la amenorrea de la lactancia (MELA)
        description:
          en: Temporary postpartum method for exclusively breastfeeding women with amenorrhea within the first six months after birth. Modern method.
          fr: Méthode temporaire post-partum pour les femmes qui allaitent exclusivement avec aménorrhée dans les six premiers mois suivant la naissance. Méthode moderne.
          es: Método temporal posparto para mujeres que amamantan exclusivamente con amenorrea dentro de los primeros seis meses después del parto. Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      rhythm_periodic_abstinence:
        title:
          en: Rhythm / periodic abstinence
          fr: Rythme / abstinence périodique
          es: Ritmo / abstinencia periódica
        description:
          en: Calendar-based fertility awareness method in which couples abstain during the estimated fertile days of the menstrual cycle. Traditional method.
          fr: Méthode de sensibilisation à la fertilité basée sur le calendrier dans laquelle les couples s'abstiennent pendant les jours fertiles estimés du cycle menstruel. Méthode traditionnelle.
          es: Método de conciencia de fertilidad basado en el calendario en el que las parejas se abstienen durante los días fértiles estimados del ciclo menstrual. Método tradicional.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = traditional"}}'
      withdrawal:
        title:
          en: Withdrawal
          fr: Retrait
          es: Coito interrumpido
        description:
          en: Coitus interruptus (withdrawal of the penis before ejaculation). Traditional method.
          fr: Coïtus interruptus (retrait du pénis avant l'éjaculation). Méthode traditionnelle.
          es: Coito interrumpido (retirada del pene antes de la eyaculación). Método tradicional.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = traditional"}}'
      other_modern:
        title:
          en: Other modern method
          fr: Autre méthode moderne
          es: Otro método moderno
        description:
          en: Any modern contraceptive method not listed above (e.g., diaphragm, spermicide, contraceptive patch or ring). Modern method.
          fr: Toute méthode contraceptive moderne non répertoriée ci-dessus (p. ex. diaphragme, spermicide, patch ou anneau contraceptif). Méthode moderne.
          es: Cualquier método anticonceptivo moderno no listado arriba (p. ej., diafragma, espermicida, parche o anillo anticonceptivo). Método moderno.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = modern"}}'
      other_traditional:
        title:
          en: Other traditional method
          fr: Autre méthode traditionnelle
          es: Otro método tradicional
        description:
          en: Any traditional method not listed above (e.g., herbs, abstinence based on perceived infertile period). Traditional method.
          fr: Toute méthode traditionnelle non répertoriée ci-dessus (p. ex. herbes, abstinence basée sur la période infertile supposée). Méthode traditionnelle.
          es: Cualquier método tradicional no listado arriba (p. ej., hierbas, abstinencia basada en el período infértil percibido). Método tradicional.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "DHS method_type = traditional"}}'
      none:
        title:
          en: Not using any method
          fr: N'utilise aucune méthode
          es: No utiliza ningún método
        description:
