inition": {"en": "Respondent is currently living together with the referent partner without legal marriage.", "es": "La encuestada vive actualmente con el compa\u00f1ero referente sin matrimonio legal.", "fr": "La r\u00e9pondante vit actuellement avec le partenaire r\u00e9f\u00e9rent sans mariage l\u00e9gal."}, "label": {"en": "Currently living together (not married)", "es": "Viviendo juntos actualmente (no casada)", "fr": "Cohabite actuellement (non mari\u00e9e)"}}, {"code": "separated", "definition": {"en": "Respondent is separated from the most recent partner.", "es": "La encuestada est\u00e1 separada del compa\u00f1ero m\u00e1s reciente.", "fr": "La r\u00e9pondante est s\u00e9par\u00e9e du partenaire le plus r\u00e9cent."}, "label": {"en": "Separated", "es": "Separada", "fr": "S\u00e9par\u00e9e"}}, {"code": "divorced", "definition": {"en": "Respondent is divorced from the most recent partner.", "es": "La encuestada est\u00e1 divorciada del compa\u00f1ero m\u00e1s reciente.", "fr": "La r\u00e9pondante est divorc\u00e9e du partenaire le plus r\u00e9cent."}, "label": {"en": "Divorced", "es": "Divorciada", "fr": "Divorc\u00e9e"}}, {"code": "widowed", "definition": {"en": "Respondent''s most recent partner has died.", "es": "El compa\u00f1ero m\u00e1s reciente de la encuestada ha fallecido.", "fr": "Le partenaire le plus r\u00e9cent de la r\u00e9pondante est d\u00e9c\u00e9d\u00e9."}, "label": {"en": "Widowed", "es": "Viuda", "fr": "Veuve"}}, {"code": "never_married_partnered", "definition": {"en": "Respondent has never been married but has had at least one intimate partner; eligible for the DV module under the DHS-8 extension. DHS-8 only.", "es": "La encuestada nunca se ha casado pero ha tenido al menos un compa\u00f1ero \u00edntimo; elegible para el m\u00f3dulo VD bajo la extensi\u00f3n DHS-8. Solo DHS-8.", "fr": "La r\u00e9pondante n''a jamais \u00e9t\u00e9 mari\u00e9e mais a eu au moins un partenaire intime; \u00e9ligible au module VD dans le cadre de l''extension DHS-8. DHS-8 uniquement."}, "label": {"en": "Never married, has had an intimate partner", "es": "Nunca casada, ha tenido un compa\u00f1ero \u00edntimo", "fr": "Jamais mari\u00e9e, a eu un partenaire intime"}}]}'
