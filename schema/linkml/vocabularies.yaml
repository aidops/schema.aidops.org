  EvictionRisk3:
    title:
      en: Eviction risk status (3-level)
      fr: Statut du risque d'expulsion (3 niveaux)
      es: Estado del riesgo de desalojo (3 niveles)
    description:
      en: Three-level scale distinguishing between households that have been evicted, households that have been threatened with eviction, and households with no eviction threat. Sphere Standard 6 HLP protection indicator. Distinguishing between actual eviction and threat allows for separate analysis of housing, land, and property vulnerability.
      fr: Échelle à trois niveaux distinguant les ménages expulsés, les ménages menacés d'expulsion et les ménages sans risque d'expulsion. Indicateur de protection HLP de la Norme Sphère 6. La distinction entre l'expulsion réelle et la menace permet une analyse séparée de la vulnérabilité en matière de logement, de terres et de propriété.
      es: Escala de tres niveles que distingue entre hogares que han sido desalojados, hogares que han sido amenazados con desalojo y hogares sin amenaza de desalojo. Indicador de protección VTP de la Norma Esfera 6. Distinguir entre el desalojo real y la amenaza permite un análisis separado de la vulnerabilidad en materia de vivienda, tierra y propiedad.
    enum_uri: aidops:EvictionRisk3
    permissible_values:
      yes_evicted:
        title:
          en: Yes — household was actually evicted
          fr: Oui — le ménage a été effectivement expulsé
          es: Sí — el hogar fue efectivamente desalojado
        description:
          en: The household was forcibly evicted from its shelter during the reference period.
          fr: Le ménage a été expulsé de force de son abri pendant la période de référence.
          es: El hogar fue desalojado forzosamente de su refugio durante el período de referencia.
      yes_threatened:
        title:
          en: Yes — household was threatened with eviction but not evicted
          fr: Oui — le ménage a été menacé d'expulsion mais n'a pas été expulsé
          es: Sí — el hogar fue amenazado con desalojo pero no desalojado
        description:
          en: The household received a threat of forced eviction during the reference period but was not actually evicted.
          fr: Le ménage a reçu une menace d'expulsion forcée pendant la période de référence mais n'a pas été effectivement expulsé.
          es: El hogar recibió una amenaza de desalojo forzado durante el período de referencia pero no fue efectivamente desalojado.
      'no':
        title:
          en: No — no eviction threat or event
          fr: Non — aucune menace ni événement d'expulsion
          es: No — sin amenaza ni evento de desalojo
        description:
          en: The household experienced no eviction threat or event during the reference period.
          fr: Le ménage n'a subi aucune menace ni événement d'expulsion pendant la période de référence.
          es: El hogar no experimentó ninguna amenaza ni evento de desalojo durante el período de referencia.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale distinguishing between households that have been evicted, households that have been threatened with eviction, and households with no eviction threat. Sphere Standard 6 HLP protection indicator. Distinguishing between actual eviction and threat allows for separate analysis of housing, land, and property vulnerability.", "es": "Escala de tres niveles que distingue entre hogares que han sido desalojados, hogares que han sido amenazados con desalojo y hogares sin amenaza de desalojo. Indicador de protecci\u00f3n VTP de la Norma Esfera 6. Distinguir entre el desalojo real y la amenaza permite un an\u00e1lisis separado de la vulnerabilidad en materia de vivienda, tierra y propiedad.", "fr": "\u00c9chelle \u00e0 trois niveaux distinguant les m\u00e9nages expuls\u00e9s, les m\u00e9nages menac\u00e9s d''expulsion et les m\u00e9nages sans risque d''expulsion. Indicateur de protection HLP de la Norme Sph\u00e8re 6. La distinction entre l''expulsion r\u00e9elle et la menace permet une analyse s\u00e9par\u00e9e de la vuln\u00e9rabilit\u00e9 en mati\u00e8re de logement, de terres et de propri\u00e9t\u00e9."}, "id": "eviction-risk-3", "label": {"en": "Eviction risk status (3-level)", "es": "Estado del riesgo de desalojo (3 niveles)", "fr": "Statut du risque d''expulsion (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_evicted", "definition": {"en": "The household was forcibly evicted from its shelter during the reference period.", "es": "El hogar fue desalojado forzosamente de su refugio durante el per\u00edodo de referencia.", "fr": "Le m\u00e9nage a \u00e9t\u00e9 expuls\u00e9 de force de son abri pendant la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Yes \u2014 household was actually evicted", "es": "S\u00ed \u2014 el hogar fue efectivamente desalojado", "fr": "Oui \u2014 le m\u00e9nage a \u00e9t\u00e9 effectivement expuls\u00e9"}}, {"code": "yes_threatened", "definition": {"en": "The household received a threat of forced eviction during the reference period but was not actually evicted.", "es": "El hogar recibi\u00f3 una amenaza de desalojo forzado durante el per\u00edodo de referencia pero no fue efectivamente desalojado.", "fr": "Le m\u00e9nage a re\u00e7u une menace d''expulsion forc\u00e9e pendant la p\u00e9riode de r\u00e9f\u00e9rence mais n''a pas \u00e9t\u00e9 effectivement expuls\u00e9."}, "label": {"en": "Yes \u2014 household was threatened with eviction but not evicted", "es": "S\u00ed \u2014 el hogar fue amenazado con desalojo pero no desalojado", "fr": "Oui \u2014 le m\u00e9nage a \u00e9t\u00e9 menac\u00e9 d''expulsion mais n''a pas \u00e9t\u00e9 expuls\u00e9"}}, {"code": "no", "definition": {"en": "The household experienced no eviction threat or event during the reference period.", "es": "El hogar no experiment\u00f3 ninguna amenaza ni evento de desalojo durante el per\u00edodo de referencia.", "fr": "Le m\u00e9nage n''a subi aucune menace ni \u00e9v\u00e9nement d''expulsion pendant la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "No \u2014 no eviction threat or event", "es": "No \u2014 sin amenaza ni evento de desalojo", "fr": "Non \u2014 aucune menace ni \u00e9v\u00e9nement d''expulsion"}}]}'
