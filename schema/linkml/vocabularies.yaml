  PostpartumStayDuration:
    title:
      en: Postpartum Facility Stay Duration
      fr: Durée du séjour en établissement après l'accouchement
      es: Duración de la estancia en el establecimiento posparto
    description:
      en: How long the woman stayed in the health facility after delivery. DHS-8 m61 categories. WHO PNC 2022 recommends at least 24 hours in a facility after birth for a normal vaginal delivery. Stays of less than 6 hours indicate early discharge and constitute a risk indicator. Only applicable when delivery occurred in a health facility.
      fr: Durée du séjour de la femme dans l'établissement de santé après l'accouchement. Catégories DHS-8 m61. L'OMS PNC 2022 recommande un séjour d'au moins 24 heures dans un établissement après la naissance pour un accouchement vaginal normal. Les séjours de moins de 6 heures indiquent une sortie précoce et constituent un indicateur de risque. Applicable uniquement lorsque l'accouchement a eu lieu dans un établissement de santé.
      es: Cuánto tiempo permaneció la mujer en el establecimiento de salud después del parto. Categorías DHS-8 m61. La OMS PNC 2022 recomienda al menos 24 horas en un establecimiento después del parto para un parto vaginal normal. Las estancias de menos de 6 horas indican alta temprana y constituyen un indicador de riesgo. Solo aplicable cuando el parto ocurrió en un establecimiento de salud.
    enum_uri: aidops:PostpartumStayDuration
    permissible_values:
      less_than_6_hours:
        title:
          en: Less than 6 hours
          fr: Moins de 6 heures
          es: Menos de 6 horas
        description:
          en: The woman left the facility within 6 hours of delivery. Indicates early discharge; risk indicator.
          fr: La femme a quitté l'établissement dans les 6 heures suivant l'accouchement. Indique une sortie précoce ; indicateur de risque.
          es: La mujer salió del establecimiento dentro de las 6 horas del parto. Indica alta temprana; indicador de riesgo.
      h6_to_11:
        title:
          en: 6 to 11 hours
          fr: 6 à 11 heures
          es: De 6 a 11 horas
        description:
          en: The woman stayed between 6 and 11 hours after delivery.
          fr: La femme est restée entre 6 et 11 heures après l'accouchement.
          es: La mujer permaneció entre 6 y 11 horas después del parto.
      h12_to_23:
        title:
          en: 12 to 23 hours
          fr: 12 à 23 heures
          es: De 12 a 23 horas
        description:
          en: The woman stayed between 12 and 23 hours after delivery. Within 24 hours but not early discharge.
          fr: La femme est restée entre 12 et 23 heures après l'accouchement. Dans les 24 heures mais pas une sortie précoce.
          es: La mujer permaneció entre 12 y 23 horas después del parto. Dentro de las 24 horas pero no alta temprana.
      d1_to_2:
        title:
          en: 1 to 2 days
          fr: 1 à 2 jours
          es: De 1 a 2 días
        description:
          en: The woman stayed 1 to 2 days after delivery. Meets the WHO PNC 2022 minimum for normal delivery.
          fr: La femme est restée 1 à 2 jours après l'accouchement. Satisfait au minimum OMS PNC 2022 pour un accouchement normal.
          es: La mujer permaneció de 1 a 2 días después del parto. Cumple con el mínimo OMS PNC 2022 para parto normal.
      d3_or_more:
        title:
          en: 3 or more days
          fr: 3 jours ou plus
          es: 3 días o más
        description:
          en: The woman stayed 3 or more days after delivery. Typical for cesarean sections or complicated deliveries.
          fr: La femme est restée 3 jours ou plus après l'accouchement. Typique pour les césariennes ou les accouchements compliqués.
          es: La mujer permaneció 3 días o más después del parto. Típico para cesáreas o partos complicados.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember how long she stayed.
          fr: La répondante ne sait pas ou ne se souvient pas de la durée de son séjour.
          es: La encuestada no sabe o no recuerda cuánto tiempo permaneció.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire", "who-pnc-2022"], "definition": {"en": "How long the woman stayed in the health facility after delivery. DHS-8 m61 categories. WHO PNC 2022 recommends at least 24 hours in a facility after birth for a normal vaginal delivery. Stays of less than 6 hours indicate early discharge and constitute a risk indicator. Only applicable when delivery occurred in a health facility.", "es": "Cu\u00e1nto tiempo permaneci\u00f3 la mujer en el establecimiento de salud despu\u00e9s del parto. Categor\u00edas DHS-8 m61. La OMS PNC 2022 recomienda al menos 24 horas en un establecimiento despu\u00e9s del parto para un parto vaginal normal. Las estancias de menos de 6 horas indican alta temprana y constituyen un indicador de riesgo. Solo aplicable cuando el parto ocurri\u00f3 en un establecimiento de salud.", "fr": "Dur\u00e9e du s\u00e9jour de la femme dans l''\u00e9tablissement de sant\u00e9 apr\u00e8s l''accouchement. Cat\u00e9gories DHS-8 m61. L''OMS PNC 2022 recommande un s\u00e9jour d''au moins 24 heures dans un \u00e9tablissement apr\u00e8s la naissance pour un accouchement vaginal normal. Les s\u00e9jours de moins de 6 heures indiquent une sortie pr\u00e9coce et constituent un indicateur de risque. Applicable uniquement lorsque l''accouchement a eu lieu dans un \u00e9tablissement de sant\u00e9."}, "id": "postpartum-stay-duration", "label": {"en": "Postpartum Facility Stay Duration", "es": "Duraci\u00f3n de la estancia en el establecimiento posparto", "fr": "Dur\u00e9e du s\u00e9jour en \u00e9tablissement apr\u00e8s l''accouchement"}, "maturity": "draft", "values": [{"code": "less_than_6_hours", "definition": {"en": "The woman left the facility within 6 hours of delivery. Indicates early discharge; risk indicator.", "es": "La mujer sali\u00f3 del establecimiento dentro de las 6 horas del parto. Indica alta temprana; indicador de riesgo.", "fr": "La femme a quitt\u00e9 l''\u00e9tablissement dans les 6 heures suivant l''accouchement. Indique une sortie pr\u00e9coce ; indicateur de risque."}, "label": {"en": "Less than 6 hours", "es": "Menos de 6 horas", "fr": "Moins de 6 heures"}}, {"code": "h6_to_11", "definition": {"en": "The woman stayed between 6 and 11 hours after delivery.", "es": "La mujer permaneci\u00f3 entre 6 y 11 horas despu\u00e9s del parto.", "fr": "La femme est rest\u00e9e entre 6 et 11 heures apr\u00e8s l''accouchement."}, "label": {"en": "6 to 11 hours", "es": "De 6 a 11 horas", "fr": "6 \u00e0 11 heures"}}, {"code": "h12_to_23", "definition": {"en": "The woman stayed between 12 and 23 hours after delivery. Within 24 hours but not early discharge.", "es": "La mujer permaneci\u00f3 entre 12 y 23 horas despu\u00e9s del parto. Dentro de las 24 horas pero no alta temprana.", "fr": "La femme est rest\u00e9e entre 12 et 23 heures apr\u00e8s l''accouchement. Dans les 24 heures mais pas une sortie pr\u00e9coce."}, "label": {"en": "12 to 23 hours", "es": "De 12 a 23 horas", "fr": "12 \u00e0 23 heures"}}, {"code": "d1_to_2", "definition": {"en": "The woman stayed 1 to 2 days after delivery. Meets the WHO PNC 2022 minimum for normal delivery.", "es": "La mujer permaneci\u00f3 de 1 a 2 d\u00edas despu\u00e9s del parto. Cumple con el m\u00ednimo OMS PNC 2022 para parto normal.", "fr": "La femme est rest\u00e9e 1 \u00e0 2 jours apr\u00e8s l''accouchement. Satisfait au minimum OMS PNC 2022 pour un accouchement normal."}, "label": {"en": "1 to 2 days", "es": "De 1 a 2 d\u00edas", "fr": "1 \u00e0 2 jours"}}, {"code": "d3_or_more", "definition": {"en": "The woman stayed 3 or more days after delivery. Typical for cesarean sections or complicated deliveries.", "es": "La mujer permaneci\u00f3 3 d\u00edas o m\u00e1s despu\u00e9s del parto. T\u00edpico para ces\u00e1reas o partos complicados.", "fr": "La femme est rest\u00e9e 3 jours ou plus apr\u00e8s l''accouchement. Typique pour les c\u00e9sariennes ou les accouchements compliqu\u00e9s."}, "label": {"en": "3 or more days", "es": "3 d\u00edas o m\u00e1s", "fr": "3 jours ou plus"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember how long she stayed.", "es": "La encuestada no sabe o no recuerda cu\u00e1nto tiempo permaneci\u00f3.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas de la dur\u00e9e de son s\u00e9jour."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
