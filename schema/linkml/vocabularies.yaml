  BirthCertificateStatus:
    title:
      en: Birth Certificate Status
      fr: Statut du certificat de naissance
      es: Estado del certificado de nacimiento
    description:
      en: MICS 6 BR1 response set. Captures both whether the child has a birth certificate and whether the enumerator verified it by sight. Distinct from document-type (which captures kind of identification) because this vocab encodes the verification dimension of the registration question.
      fr: Ensemble de réponses MICS 6 BR1. Indique si l'enfant a un certificat de naissance et si l'enquêteur l'a vérifié de vue. Distinct de document-type (qui capture le type d'identification) car ce vocabulaire encode la dimension de vérification de la question d'enregistrement.
      es: Conjunto de respuestas MICS 6 BR1. Captura si el niño tiene un certificado de nacimiento y si el encuestador lo verificó a la vista. Distinto de document-type (que captura el tipo de identificación) porque este vocabulario codifica la dimensión de verificación de la pregunta de registro.
    enum_uri: aidops:BirthCertificateStatus
    permissible_values:
      yes_seen:
        title:
          en: Yes, certificate seen by enumerator
          fr: Oui, certificat vu par l'enquêteur
          es: Sí, certificado visto por el encuestador
        description:
          en: The caregiver reports the child has a birth certificate AND the enumerator verified it by sight. MICS 6 BR1 = 1.
          fr: Le soignant déclare que l'enfant a un certificat de naissance ET l'enquêteur l'a vérifié de vue. MICS 6 BR1 = 1.
          es: El cuidador informa que el niño tiene un certificado de nacimiento Y el encuestador lo verificó a la vista. MICS 6 BR1 = 1.
      yes_not_seen:
        title:
          en: Yes, certificate reported but not seen
          fr: Oui, certificat déclaré mais non vu
          es: Sí, certificado declarado pero no visto
        description:
          en: The caregiver reports the child has a birth certificate but the enumerator could not verify it by sight. MICS 6 BR1 = 2.
          fr: Le soignant déclare que l'enfant a un certificat de naissance mais l'enquêteur n'a pas pu le vérifier de vue. MICS 6 BR1 = 2.
          es: El cuidador informa que el niño tiene un certificado de nacimiento pero el encuestador no pudo verificarlo a la vista. MICS 6 BR1 = 2.
      'no':
        title:
          en: No certificate
          fr: Pas de certificat
          es: Sin certificado
        description:
          en: The child does not have a birth certificate. MICS 6 BR1 = 3. Follow-up BR2 asked to determine whether the birth was otherwise registered.
          fr: L'enfant n'a pas de certificat de naissance. MICS 6 BR1 = 3. La question BR2 est posée pour déterminer si la naissance a été enregistrée autrement.
          es: El niño no tiene certificado de nacimiento. MICS 6 BR1 = 3. La pregunta BR2 se hace para determinar si el nacimiento fue registrado de otra manera.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The caregiver does not know whether the child has a birth certificate. MICS 6 BR1 = 8.
          fr: Le soignant ne sait pas si l'enfant a un certificat de naissance. MICS 6 BR1 = 8.
          es: El cuidador no sabe si el niño tiene un certificado de nacimiento. MICS 6 BR1 = 8.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["mics6-child-protection", "sdg-16-9-1-metadata"], "definition": {"en": "MICS 6 BR1 response set. Captures both whether the child has a birth certificate and whether the enumerator verified it by sight. Distinct from document-type (which captures kind of identification) because this vocab encodes the verification dimension of the registration question.", "es": "Conjunto de respuestas MICS 6 BR1. Captura si el ni\u00f1o tiene un certificado de nacimiento y si el encuestador lo verific\u00f3 a la vista. Distinto de document-type (que captura el tipo de identificaci\u00f3n) porque este vocabulario codifica la dimensi\u00f3n de verificaci\u00f3n de la pregunta de registro.", "fr": "Ensemble de r\u00e9ponses MICS 6 BR1. Indique si l''enfant a un certificat de naissance et si l''enqu\u00eateur l''a v\u00e9rifi\u00e9 de vue. Distinct de document-type (qui capture le type d''identification) car ce vocabulaire encode la dimension de v\u00e9rification de la question d''enregistrement."}, "id": "birth-certificate-status", "label": {"en": "Birth Certificate Status", "es": "Estado del certificado de nacimiento", "fr": "Statut du certificat de naissance"}, "maturity": "draft", "values": [{"code": "yes_seen", "definition": {"en": "The caregiver reports the child has a birth certificate AND the enumerator verified it by sight. MICS 6 BR1 = 1.", "es": "El cuidador informa que el ni\u00f1o tiene un certificado de nacimiento Y el encuestador lo verific\u00f3 a la vista. MICS 6 BR1 = 1.", "fr": "Le soignant d\u00e9clare que l''enfant a un certificat de naissance ET l''enqu\u00eateur l''a v\u00e9rifi\u00e9 de vue. MICS 6 BR1 = 1."}, "label": {"en": "Yes, certificate seen by enumerator", "es": "S\u00ed, certificado visto por el encuestador", "fr": "Oui, certificat vu par l''enqu\u00eateur"}}, {"code": "yes_not_seen", "definition": {"en": "The caregiver reports the child has a birth certificate but the enumerator could not verify it by sight. MICS 6 BR1 = 2.", "es": "El cuidador informa que el ni\u00f1o tiene un certificado de nacimiento pero el encuestador no pudo verificarlo a la vista. MICS 6 BR1 = 2.", "fr": "Le soignant d\u00e9clare que l''enfant a un certificat de naissance mais l''enqu\u00eateur n''a pas pu le v\u00e9rifier de vue. MICS 6 BR1 = 2."}, "label": {"en": "Yes, certificate reported but not seen", "es": "S\u00ed, certificado declarado pero no visto", "fr": "Oui, certificat d\u00e9clar\u00e9 mais non vu"}}, {"code": "no", "definition": {"en": "The child does not have a birth certificate. MICS 6 BR1 = 3. Follow-up BR2 asked to determine whether the birth was otherwise registered.", "es": "El ni\u00f1o no tiene certificado de nacimiento. MICS 6 BR1 = 3. La pregunta BR2 se hace para determinar si el nacimiento fue registrado de otra manera.", "fr": "L''enfant n''a pas de certificat de naissance. MICS 6 BR1 = 3. La question BR2 est pos\u00e9e pour d\u00e9terminer si la naissance a \u00e9t\u00e9 enregistr\u00e9e autrement."}, "label": {"en": "No certificate", "es": "Sin certificado", "fr": "Pas de certificat"}}, {"code": "dont_know", "definition": {"en": "The caregiver does not know whether the child has a birth certificate. MICS 6 BR1 = 8.", "es": "El cuidador no sabe si el ni\u00f1o tiene un certificado de nacimiento. MICS 6 BR1 = 8.", "fr": "Le soignant ne sait pas si l''enfant a un certificat de naissance. MICS 6 BR1 = 8."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
