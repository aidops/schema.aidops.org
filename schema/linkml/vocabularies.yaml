e abastece a mercados minoristas m\u00e1s peque\u00f1os y comerciantes. Caracterizado por un gran n\u00famero de vendedores, amplia gama de productos y grandes vol\u00famenes de comercio. Funciona como el nodo upstream en la cadena de suministro EMMA.", "fr": "Plaque tournante principale de collecte et de redistribution qui approvisionne les march\u00e9s de d\u00e9tail plus petits et les commer\u00e7ants. Caract\u00e9ris\u00e9 par un grand nombre de vendeurs, une large gamme de produits et des volumes d''\u00e9changes importants. Fonctionne comme le n\u0153ud amont dans la cha\u00eene d''approvisionnement EMMA."}, "label": {"en": "Central / wholesale market", "es": "Mercado central / mayorista", "fr": "March\u00e9 central / de gros"}}, {"code": "retail_periodic", "definition": {"en": "Opens on one or more fixed days per week; serves a defined catchment area and closes between trading days. Common in rural and semi-urban sub-Saharan Africa, the Sahel, and rural Asia. Periodic markets often draw vendors from surrounding villages.", "es": "Abre uno o m\u00e1s d\u00edas fijos a la semana; sirve a una zona de captaci\u00f3n definida y cierra entre los d\u00edas de comercio. Com\u00fan en el \u00c1frica subsahariana rural y semiurbana, el Sahel y Asia rural. Los mercados peri\u00f3dicos suelen atraer a vendedores de las aldeas circundantes.", "fr": "Ouvre un ou plusieurs jours fixes par semaine ; dessert une zone de chalandise d\u00e9finie et ferme entre les jours de n\u00e9goce. Courant en Afrique subsaharienne rurale et semi-urbaine, au Sahel et en Asie rurale. Les march\u00e9s p\u00e9riodiques attirent souvent des vendeurs des villages environnants."}, "label": {"en": "Periodic retail market", "es": "Mercado minorista peri\u00f3dico", "fr": "March\u00e9 de d\u00e9tail p\u00e9riodique"}}, {"code": "retail_permanent", "definition": {"en": "Open every day (or most days); fixed stalls or shops with permanent infrastructure. Common in urban and peri-urban settings. More resilient to one-day disruptions than periodic markets.", "es": "Abierto todos los d\u00edas (o la mayor\u00eda de los d\u00edas); puestos o tiendas fijos con infraestructura permanente. Com\u00fan en entornos urbanos y periurbanos. M\u00e1s resistente a las interrupciones de un d\u00eda que los mercados peri\u00f3dicos.", "fr": "Ouvert tous les jours (ou la plupart des jours) ; \u00e9tals ou boutiques fixes avec infrastructure permanente. Courant dans les contextes urbains et p\u00e9riurbains. Plus r\u00e9sistant aux perturbations d''un jour que les march\u00e9s p\u00e9riodiques."}, "label": {"en": "Permanent retail market", "es": "Mercado minorista permanente", "fr": "March\u00e9 de d\u00e9tail permanent"}}, {"code": "camp_or_displacement_site", "definition": {"en": "Market operating inside or immediately adjacent to an IDP or refugee camp, transit site, or other displacement settlement. Often informal; subject to site management rules and access constraints.", "es": "Mercado que opera dentro o inmediatamente adyacente a un campamento de PDI o refugiados, sitio de tr\u00e1nsito u otro asentamiento de desplazados. A menudo informal; sujeto a las reglas de gesti\u00f3n del sitio y restricciones de acceso.", "fr": "March\u00e9 op\u00e9rant \u00e0 l''int\u00e9rieur ou imm\u00e9diatement adjacent \u00e0 un camp de PDI ou de r\u00e9fugi\u00e9s, \u00e0 un site de transit ou \u00e0 un autre \u00e9tablissement de d\u00e9plac\u00e9s. Souvent informel ; soumis aux r\u00e8gles de gestion du site et aux contraintes d''acc\u00e8s."}, "label": {"en": "Displacement site / camp market", "es": "Mercado en sitio de desplazados", "fr": "March\u00e9 en site de d\u00e9plac\u00e9s / camp"}}, {"code": "informal_roadside", "definition": {"en": "Cluster of informal vendors at a roadside, junction, or non-designated location with no fixed market infrastructure. Common in peri-urban areas and immediately after displacement events before permanent markets re-establish.", "es": "Concentraci\u00f3