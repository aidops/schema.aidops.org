      publicschema_logical_document_json: '{"bibliography_refs": ["mics6-child-protection", "unfpa-fgm-compendium-2021"], "definition": {"en": "Type of person who performed the female genital mutilation / cutting on a daughter (FG18 in MICS 6 Women''s Questionnaire FG module). Distinguishes traditional practitioners from medical providers; used for the medicalization-of-FGM/C sub-indicator (share of cuttings performed by a health professional).", "es": "Tipo de persona que realiz\u00f3 la mutilaci\u00f3n genital femenina / ablaci\u00f3n a una hija (FG18 en el m\u00f3dulo FG del cuestionario de mujeres MICS 6). Distingue los profesionales tradicionales de los proveedores m\u00e9dicos; usado para el subindicador de medicalizaci\u00f3n de MGF/A (proporci\u00f3n de ablaciones realizadas por un profesional de salud).", "fr": "Type de personne ayant pratiqu\u00e9 la mutilation g\u00e9nitale f\u00e9minine / excision sur une fille (FG18 du module FG du questionnaire femme MICS 6). Distingue les praticiens traditionnels des prestataires m\u00e9dicaux ; utilis\u00e9 pour le sous-indicateur de m\u00e9dicalisation des MGF/E (part des excisions r\u00e9alis\u00e9es par un professionnel de sant\u00e9)."}, "id": "fgm-performer", "label": {"en": "FGM/C Performer", "es": "Ejecutor de MGF/A", "fr": "Ex\u00e9cutant de MGF/E"}, "maturity": "draft", "values": [{"code": "traditional_practitioner", "definition": {"en": "The cutting was performed by a traditional practitioner (traditional circumciser).", "es": "La ablaci\u00f3n fue realizada por un profesional tradicional (circuncidadora tradicional).", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par un praticien traditionnel (exciseuse traditionnelle)."}, "label": {"en": "Traditional practitioner / traditional circumciser", "es": "Profesional tradicional / circuncidadora tradicional", "fr": "Praticien traditionnel / exciseuse traditionnelle"}}, {"code": "traditional_birth_attendant", "definition": {"en": "The cutting was performed by a traditional birth attendant (TBA).", "es": "La ablaci\u00f3n fue realizada por una partera tradicional.", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par une accoucheuse traditionnelle."}, "label": {"en": "Traditional birth attendant", "es": "Partera tradicional", "fr": "Accoucheuse traditionnelle"}}, {"code": "doctor", "definition": {"en": "The cutting was performed by a medical doctor. Counts toward the medicalization-of-FGM/C sub-indicator.", "es": "La ablaci\u00f3n fue realizada por un m\u00e9dico. Cuenta para el subindicador de medicalizaci\u00f3n de MGF/A.", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par un m\u00e9decin. Compte pour le sous-indicateur de m\u00e9dicalisation des MGF/E."}, "label": {"en": "Doctor", "es": "M\u00e9dico", "fr": "M\u00e9decin"}}, {"code": "nurse_midwife", "definition": {"en": "The cutting was performed by a nurse or trained midwife. Counts toward the medicalization-of-FGM/C sub-indicator.", "es": "La ablaci\u00f3n fue realizada por una enfermera o partera capacitada. Cuenta para el subindicador de medicalizaci\u00f3n de MGF/A.", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par une infirmi\u00e8re ou une sage-femme form\u00e9e. Compte pour le sous-indicateur de m\u00e9dicalisation des MGF/E."}, "label": {"en": "Nurse or midwife", "es": "Enfermera o partera", "fr": "Infirmi\u00e8re ou sage-femme"}}, {"code": "other_health_worker", "definition": {"en": "The cutting was performed by another health worker not classified above. Counts toward the medicalization-of-FGM/C sub-indicator.", "es": "La ablaci\u00f3n fue realizada por otro trabajador de salud no clasificado anteriormente. Cuenta para el subindicador de medicalizaci\u00f3n de MGF/A.", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par un autre agent de sant\u00e9 non class\u00e9 ci-dessus. Compte pour le sous-indicateur de m\u00e9dicalisation des MGF/E."}, "label": {"en": "Other health worker", "es": "Otro trabajador de salud", "fr": "Autre agent de sant\u00e9"}}, {"code": "other", "definition": {"en": "The cutting was performed by someone else not captured above.", "es": "La ablaci\u00f3n fue realizada por otra persona no descrita anteriormente.", "fr": "L''excision a \u00e9t\u00e9 pratiqu\u00e9e par quelqu''un d''autre non d\u00e9crit ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know who performed the cutting.", "es": "La encuestada no sabe qui\u00e9n realiz\u00f3 la ablaci\u00f3n.", "fr": "La r\u00e9pondante ne sait pas qui a pratiqu\u00e9 l''excision."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
