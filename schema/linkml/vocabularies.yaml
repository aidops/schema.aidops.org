  HazardTypeClimate:
    title:
      en: Climate hazard type
      fr: Type d'aléa climatique
      es: Tipo de peligro climático
    description:
      en: 'Climate-relevant hazard types for ClimateAdaptationProfile. Narrower than any general hazard-type vocabulary: geophysical hazards (earthquake, volcanic eruption, tsunami), biological hazards (epidemic/pandemic), and technological hazards are excluded because they are not climate-driver hazards in the IPCC sense. Sources: IPCC AR6 WGII Chapter 16 key risks taxonomy; WMO hazard classification (climate hazards subset); IFRC PCVA hazard list; CARE CVCA community hazard matrix.'
      fr: 'Types d''aléas climatiques pour ClimateAdaptationProfile. Plus étroit que tout vocabulaire général de type d''aléa : les aléas géophysiques (séisme, éruption volcanique, tsunami), biologiques (épidémie/pandémie) et technologiques sont exclus car ils ne sont pas des aléas à pilote climatique au sens du GIEC. Sources : GIEC AR6 WGII Chapitre 16 ; WMO ; FICR PCVA ; CARE CVCA.'
      es: 'Tipos de peligros climáticos para ClimateAdaptationProfile. Más estrecho que cualquier vocabulario general de tipo de peligro: los peligros geofísicos (terremoto, erupción volcánica, tsunami), biológicos (epidemia/pandemia) y tecnológicos están excluidos porque no son peligros de tipo climático en el sentido del IPCC. Fuentes: IPCC AR6 WGII Capítulo 16; OMM; FICR PCVA; CARE CVCA.'
    enum_uri: aidops:HazardTypeClimate
    permissible_values:
      drought:
        title:
          en: Drought
          fr: Sécheresse
          es: Sequía
        description:
          en: A prolonged period of abnormally low rainfall that leads to water shortage, crop failure, or pasture degradation. Includes multi-year droughts and single poor-season dry spells significant enough to affect the household.
          fr: Une période prolongée de précipitations anormalement faibles entraînant une pénurie d'eau, une mauvaise récolte ou une dégradation des pâturages. Inclut les sécheresses pluriannuelles et les saisons sèches insuffisantes.
          es: Un período prolongado de precipitaciones anormalmente bajas que conduce a escasez de agua, pérdida de cosecha o degradación de pastizales. Incluye sequías plurianuales y temporadas de lluvias insuficientes.
      flood_riverine:
        title:
          en: Riverine flood
          fr: Crue fluviale
          es: Inundación fluvial
        description:
          en: Flooding caused by rivers or streams overflowing their banks, including slow-onset seasonal floods and rapid-onset flash floods.
          fr: Inondation causée par le débordement des rivières ou ruisseaux, y compris les crues saisonnières à début lent et les crues soudaines.
          es: Inundación causada por el desbordamiento de ríos o arroyos, incluidas inundaciones estacionales de inicio lento y de inicio rápido.
      flood_surface:
        title:
          en: Surface water or flash flood
          fr: Inondation de surface ou crue soudaine
          es: Inundación superficial o inundación repentina
        description:
          en: Flooding caused by heavy rainfall exceeding ground absorption capacity, or by a flash flood not primarily driven by river overflow. Includes urban pluvial flooding.
          fr: Inondation causée par des précipitations intenses dépassant la capacité d'absorption du sol, ou par une crue soudaine non principalement due au débordement d'une rivière. Inclut les inondations pluviales urbaines.
          es: Inundación causada por lluvias intensas que superan la capacidad de absorción del suelo, o por una inundación repentina no impulsada principalmente por el desbordamiento del río. Incluye inundaciones pluviales urbanas.
      coastal_flood_surge:
        title:
          en: Coastal flooding or storm surge
          fr: Inondation côtière ou onde de tempête
          es: Inundación costera o marejada ciclónica
        description:
          en: Flooding caused by elevated sea levels, storm surges, or wave action in coastal or delta areas.
          fr: Inondation causée par l'élévation du niveau de la mer, les ondes de tempête ou l'action des vagues dans les zones côtières ou deltaïques.
          es: Inundación causada por elevación del nivel del mar, marejadas ciclónicas o acción de las olas en zonas costeras o deltaicas.
      cyclone_tropical_storm:
        title:
          en: Cyclone, tropical storm, or typhoon
          fr: Cyclone, tempête tropicale ou typhon
          es: Ciclón, tormenta tropical o tifón
        description:
          en: A tropical rotating storm system with sustained high winds. Includes cyclone (Indian Ocean, South Pacific), typhoon (North Pacific), and hurricane (Atlantic, Caribbean, East Pacific).
          fr: Système tempêtueux tropical rotatif avec des vents soutenus élevés. Inclut le cyclone (océan Indien, Pacifique Sud), le typhon (Pacifique Nord) et l'ouragan (Atlantique, Caraïbes, Pacifique Est).
          es: Sistema de tormenta tropical rotatoria con vientos sostenidos altos. Incluye ciclón (océano Índico, Pacífico Sur), tifón (Pacífico Norte) y huracán (Atlántico, Caribe, Pacífico Oriental).
      heatwave:
        title:
          en: Heatwave
          fr: Vague de chaleur
          es: Ola de calor
        description:
          en: A prolonged period of abnormally high temperatures that poses health risks, reduces agricultural productivity, or strains water resources.
          fr: Une période prolongée de températures anormalement élevées qui pose des risques sanitaires, réduit la productivité agricole ou sollicite les ressources en eau.
          es: Un período prolongado de temperaturas anormalmente altas que representa riesgos para la salud, reduce la productividad agrícola o tensa los recursos hídricos.
      cold_wave_frost:
        title:
          en: Cold wave or frost
          fr: Vague de froid ou gel
          es: Ola de frío o helada
        description:
          en: A prolonged period of abnormally low temperatures including frost events that damage crops, livestock, or human health.
          fr: Une période prolongée de températures anormalement basses, y compris les épisodes de gel qui endommagent les cultures, le bétail ou la santé humaine.
          es: Un período prolongado de temperaturas anormalmente bajas, incluidos eventos de heladas que dañan cultivos, ganado o la salud humana.
      wildfire:
        title:
          en: Wildfire
          fr: Feu de brousse ou incendie de forêt
          es: Incendio forestal o de pastizal
        description:
          en: An uncontrolled fire in vegetation — grassland, savanna, woodland, or forest — whether started naturally or accidentally, where the extent and behavior is worsened by dry or hot climate conditions.
          fr: Incendie incontrôlé de végétation — prairie, savane, forêt ouverte ou forêt — démarré naturellement ou accidentellement, dont l'étendue et le comportement sont aggravés par des conditions climatiques sèches ou chaudes.
          es: Incendio incontrolado en vegetación — pastizal, sabana, bosque abierto o bosque — iniciado natural o accidentalmente, cuya extensión y comportamiento empeoran por condiciones climáticas secas o calurosas.
      landslide_climate:
        title:
          en: Landslide or mudslide (climate-triggered)
          fr: Glissement de terrain ou coulée de boue (déclenchement climatique)
          es: Deslizamiento de tierra o de lodo (desencadenado por el clima)
        description:
          en: A slope failure or mass movement triggered by extreme rainfall or soil erosion patterns associated with climate variability. Excludes earthquake-triggered landslides.
          fr: Rupture de pente ou mouvement de masse déclenché par des précipitations extrêmes ou des schémas d'érosion du sol associés à la variabilité climatique. Exclut les glissements de terrain déclenchés par des séismes.
          es: Falla de talud o movimiento en masa desencadenado por precipitaciones extremas o patrones de erosión del suelo asociados a la variabilidad climática. Excluye deslizamientos desencadenados por terremotos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022"], "definition": {"en": "Climate-relevant hazard types for ClimateAdaptationProfile. Narrower than any general hazard-type vocabulary: geophysical hazards (earthquake, volcanic eruption, tsunami), biological hazards (epidemic/pandemic), and technological hazards are excluded because they are not climate-driver hazards in the IPCC sense. Sources: IPCC AR6 WGII Chapter 16 key risks taxonomy; WMO hazard classification (climate hazards subset); IFRC PCVA hazard list; CARE CVCA community hazard matrix.\n", "es": "Tipos de peligros clim\u00e1ticos para ClimateAdaptationProfile. M\u00e1s estrecho que cualquier vocabulario general de tipo de peligro: los peligros geof\u00edsicos (terremoto, erupci\u00f3n volc\u00e1nica, tsunami), biol\u00f3gicos (epidemia/pandemia) y tecnol\u00f3gicos est\u00e1n excluidos porque no son peligros de tipo clim\u00e1tico en el sentido del IPCC. Fuentes: IPCC AR6 WGII Cap\u00edtulo 16; OMM; FICR PCVA; CARE CVCA.\n", "fr": "Types d''al\u00e9as climatiques pour ClimateAdaptationProfile. Plus \u00e9troit que tout vocabulaire g\u00e9n\u00e9ral de type d''al\u00e9a : les al\u00e9as g\u00e9ophysiques (s\u00e9isme, \u00e9ruption volcanique, tsunami), biologiques (\u00e9pid\u00e9mie/pand\u00e9mie) et technologiques sont exclus car ils ne sont pas des al\u00e9as \u00e0 pilote climatique au sens du GIEC. Sources : GIEC AR6 WGII Chapitre 16 ; WMO ; FICR PCVA ; CARE CVCA.\n"}, "id": "hazard-type-climate", "label": {"en": "Climate hazard type", "es": "Tipo de peligro clim\u00e1tico", "fr": "Type d''al\u00e9a climatique"}, "maturity": "draft", "values": [{"code": "drought", "definition": {"en": "A prolonged period of abnormally low rainfall that leads to water shortage, crop failure, or pasture degradation. Includes multi-year droughts and single poor-season dry spells significant enough to affect the household.", "es": "Un per\u00edodo prolongado de precipitaciones anormalmente bajas que conduce a escasez de agua, p\u00e9rdida de cosecha o degradaci\u00f3n de pastizales. Incluye sequ\u00edas plurianuales y temporadas de lluvias insuficientes.", "fr": "Une p\u00e9riode prolong\u00e9e de pr\u00e9cipitations anormalement faibles entra\u00eenant une p\u00e9nurie d''eau, une mauvaise r\u00e9colte ou une d\u00e9gradation des p\u00e2turages. Inclut les s\u00e9cheresses pluriannuelles et les saisons s\u00e8ches insuffisantes."}, "label": {"en": "Drought", "es": "Sequ\u00eda", "fr": "S\u00e9cheresse"}}, {"code": "flood_riverine", "definition": {"en": "Flooding caused by rivers or streams overflowing their banks, including slow-onset seasonal floods and rapid-onset flash floods.", "es": "Inundaci\u00f3n causada por el desbordamiento de r\u00edos o arroyos, incluidas inundaciones estacionales de inicio lento y de inicio r\u00e1pido.", "fr": "Inondation caus\u00e9e par le d\u00e9bordement des rivi\u00e8res ou ruisseaux, y compris les crues saisonni\u00e8res \u00e0 d\u00e9but lent et les crues soudaines."}, "label": {"en": "Riverine flood", "es": "Inundaci\u00f3n fluvial", "fr": "Crue fluviale"}}, {"code": "flood_surface", "definition": {"en": "Flooding caused by heavy rainfall exceeding ground absorption capacity, or by a flash flood not primarily driven by river overflow. Includes urban pluvial flooding.", "es": "Inundaci\u00f3n causada por lluvias intensas que superan la capacidad de absorci\u00f3n del suelo, o por una inundaci\u00f3n repentina no impulsada principalmente por el desbordamiento del r\u00edo. Incluye inundaciones pluviales urbanas.", "fr": "Inondation caus\u00e9e par des pr\u00e9cipitations intenses d\u00e9passant la capacit\u00e9 d''absorption du sol, ou par une crue soudaine non principalement due au d\u00e9bordement d''une rivi\u00e8re. Inclut les inondations pluviales urbaines."}, "label": {"en": "Surface water or flash flood", "es": "Inundaci\u00f3n superficial o inundaci\u00f3n repentina", "fr": "Inondation de surface ou crue soudaine"}}, {"code": "coastal_flood_surge", "definition": {"en": "Flooding caused by elevated sea levels, storm surges, or wave action in coastal or delta areas.", "es": "Inundaci\u00f3n causada por elevaci\u00f3n del nivel del mar, marejadas cicl\u00f3nicas o acci\u00f3n de las olas en zonas costeras o deltaicas.", "fr": "Inondation caus\u00e9e par l''\u00e9l\u00e9vation du niveau de la mer, les ondes de temp\u00eate ou l''action des vagues dans les zones c\u00f4ti\u00e8res ou delta\u00efques."}, "label": {"en": "Coastal flooding or storm surge", "es": "Inundaci\u00f3n costera o marejada cicl\u00f3nica", "fr": "Inondation c\u00f4ti\u00e8re ou onde de temp\u00eate"}}, {"code": "cyclone_tropical_storm", "definition": {"en": "A tropical rotating storm system with sustained high winds. Includes cyclone (Indian Ocean, South Pacific), typhoon (North Pacific), and hurricane (Atlantic, Caribbean, East Pacific).", "es": "Sistema de tormenta tropical rotatoria con vientos sostenidos altos. Incluye cicl\u00f3n (oc\u00e9ano \u00cdndico, Pac\u00edfico Sur), tif\u00f3n (Pac\u00edfico Norte) y hurac\u00e1n (Atl\u00e1ntico, Caribe, Pac\u00edfico Oriental).", "fr": "Syst\u00e8me temp\u00eatueux tropical rotatif avec des vents soutenus \u00e9lev\u00e9s. Inclut le cyclone (oc\u00e9an Indien, Pacifique Sud), le typhon (Pacifique Nord) et l''ouragan (Atlantique, Cara\u00efbes, Pacifique Est)."}, "label": {"en": "Cyclone, tropical storm, or typhoon", "es": "Cicl\u00f3n, tormenta tropical o tif\u00f3n", "fr": "Cyclone, temp\u00eate tropicale ou typhon"}}, {"code": "heatwave", "definition": {"en": "A prolonged period of abnormally high temperatures that poses health risks, reduces agricultural productivity, or strains water resources.", "es": "Un per\u00edodo prolongado de temperaturas anormalmente altas que representa riesgos para la salud, reduce la productividad agr\u00edcola o tensa los recursos h\u00eddricos.", "fr": "Une p\u00e9riode prolong\u00e9e de temp\u00e9ratures anormalement \u00e9lev\u00e9es qui pose des risques sanitaires, r\u00e9duit la productivit\u00e9 agricole ou sollicite les ressources en eau."}, "label": {"en": "Heatwave", "es": "Ola de calor", "fr": "Vague de chaleur"}}, {"code": "cold_wave_frost", "definition": {"en": "A prolonged period of abnormally low temperatures including frost events that damage crops, livestock, or human health.", "es": "Un per\u00edodo prolongado de temperaturas anormalmente bajas, incluidos eventos de heladas que da\u00f1an cultivos, ganado o la salud humana.", "fr": "Une p\u00e9riode prolong\u00e9e de temp\u00e9ratures anormalement basses, y compris les \u00e9pisodes de gel qui endommagent les cultures, le b\u00e9tail ou la sant\u00e9 humaine."}, "label": {"en": "Cold wave or frost", "es": "Ola de fr\u00edo o helada", "fr": "Vague de froid ou gel"}}, {"code": "wildfire", "definition": {"en": "An uncontrolled fire in vegetation \u2014 grassland, savanna, woodland, or forest \u2014 whether started naturally or accidentally, where the extent and behavior is worsened by dry or hot climate conditions.", "es": "Incendio incontrolado en vegetaci\u00f3n \u2014 pastizal, sabana, bosque abierto o bosque \u2014 iniciado natural o accidentalmente, cuya extensi\u00f3n y comportamiento empeoran por condiciones clim\u00e1ticas secas o calurosas.", "fr": "Incendie incontr\u00f4l\u00e9 de v\u00e9g\u00e9tation \u2014 prairie, savane, for\u00eat ouverte ou for\u00eat \u2014 d\u00e9marr\u00e9 naturellement ou accidentellement, dont l''\u00e9tendue et le comportement sont aggrav\u00e9s par des conditions climatiques s\u00e8ches ou chaudes."}, "label": {"en": "Wildfire", "es": "Incendio forestal o de pastizal", "fr": "Feu de brousse ou incendie de for\u00eat"}}, {"code": "landslide_climate", "definition": {"en": "A slope failure or mass movement triggered by extreme rainfall or soil erosion patterns associated with climate variability. Excludes earthquake-triggered landslides.", "es": "Falla de talud o movimiento en masa desencadenado por precipitaciones extremas o patrones de erosi\u00f3n del suelo asociados a la variabilidad clim\u00e1tica. Excluye deslizamientos desencadenados por terremotos.", "fr": "Rupture de pente ou mouvement de masse d\u00e9clench\u00e9 par des pr\u00e9cipitations extr\u00eames ou des sch\u00e9mas d''\u00e9rosion du sol associ\u00e9s \u00e0 la variabilit\u00e9 climatique. Exclut les glissements de terrain d\u00e9clench\u00e9s par des s\u00e9ismes."}, "label": {"en": "Landslide or mudslide (climate-triggered)", "es": "Deslizamiento de tierra o de lodo (desencadenado por el clima)", "fr": "Glissement de terrain ou coul\u00e9e de boue (d\u00e9clenchement climatique)"}}]}'
