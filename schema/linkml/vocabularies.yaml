fr": "Cuisine \u00e0 l''int\u00e9rieur du logement sans chemin\u00e9e, conduit ni ventilateur. La fum\u00e9e s''accumule \u00e0 l''int\u00e9rieur. Configuration la plus expos\u00e9e \u00e0 la pollution de l''air int\u00e9rieur."}, "label": {"en": "Indoors \u2014 no chimney or flue", "es": "Interior \u2014 sin chimenea ni conducto", "fr": "Int\u00e9rieur \u2014 sans chemin\u00e9e ni conduit"}}, {"code": "other", "definition": {"en": "Another cooking location, for example under a covered porch or in a partially enclosed space.", "es": "Otro lugar de cocci\u00f3n, por ejemplo bajo un porche cubierto o en un espacio parcialmente cerrado.", "fr": "Un autre lieu de cuisine, par exemple sous un porche couvert ou dans un espace partiellement ferm\u00e9."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
