      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale describing the working condition of a household''s primary cooking stove or fire arrangement, independent of stove technology category (which is covered by the stove-type vocabulary on EnergyAccessProfile). Used to flag stoves that need repair or replacement in NFI post-distribution monitoring and shelter-settlement needs assessments.", "es": "Escala de tres niveles que describe la condici\u00f3n de funcionamiento de la cocina principal o arreglo de fuego del hogar, independiente de la categor\u00eda tecnol\u00f3gica de la cocina (cubierta por el vocabulario stove-type en EnergyAccessProfile). Utilizada para se\u00f1alar cocinas que requieren reparaci\u00f3n o reemplazo en el monitoreo post-distribuci\u00f3n de ANF y las evaluaciones de necesidades de refugio y asentamiento.", "fr": "\u00c9chelle \u00e0 trois niveaux d\u00e9crivant l''\u00e9tat de fonctionnement du foyer de cuisson principal ou de l''arrangement de feu d''un m\u00e9nage, ind\u00e9pendamment de la cat\u00e9gorie technologique du foyer (couverte par le vocabulaire stove-type sur EnergyAccessProfile). Utilis\u00e9e pour signaler les foyers qui n\u00e9cessitent r\u00e9paration ou remplacement dans le suivi post-distribution des ANA et les \u00e9valuations des besoins en abri et habitat."}, "id": "stove-condition", "label": {"en": "Stove condition (3-level)", "es": "Condici\u00f3n de la cocina (3 niveles)", "fr": "\u00c9tat du foyer de cuisson (3 niveaux)"}, "maturity": "draft", "values": [{"code": "good_condition", "definition": {"en": "Stove is fully functional and in good repair; can be used safely for household cooking.", "es": "La cocina es plenamente funcional y est\u00e1 en buen estado; puede usarse de forma segura para la cocci\u00f3n del hogar.", "fr": "Le foyer est pleinement fonctionnel et en bon \u00e9tat ; peut \u00eatre utilis\u00e9 en toute s\u00e9curit\u00e9 pour la cuisson du m\u00e9nage."}, "label": {"en": "Good condition", "es": "Buena condici\u00f3n", "fr": "Bon \u00e9tat"}}, {"code": "needs_repair", "definition": {"en": "Stove is partially functional but requires maintenance, spare parts, or minor repair to operate safely or efficiently.", "es": "La cocina es parcialmente funcional pero requiere mantenimiento, piezas de repuesto o reparaci\u00f3n menor para operar de forma segura o eficiente.", "fr": "Le foyer est partiellement fonctionnel mais n\u00e9cessite un entretien, des pi\u00e8ces de rechange ou une r\u00e9paration mineure pour fonctionner de mani\u00e8re s\u00fbre ou efficace."}, "label": {"en": "Needs repair", "es": "Necesita reparaci\u00f3n", "fr": "N\u00e9cessite r\u00e9paration"}}, {"code": "not_working", "definition": {"en": "Stove is non-functional and cannot currently be used for cooking.", "es": "La cocina no es funcional y no puede usarse actualmente para la cocci\u00f3n.", "fr": "Le foyer est non fonctionnel et ne peut pas \u00eatre utilis\u00e9 actuellement pour la cuisson."}, "label": {"en": "Not working", "es": "No funciona", "fr": "Ne fonctionne pas"}}]}'
