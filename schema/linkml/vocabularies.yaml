exacte ; le p\u00e9trole lampant est polluant. Classification OMS : polluant."}, "label": {"en": "Liquid fuel stove", "es": "Cocina de combustible l\u00edquido", "fr": "R\u00e9chaud \u00e0 combustible liquide"}}, {"code": "manufactured_solid_fuel_stove", "definition": {"en": "Manufactured stove with grate and combustion chamber designed for solid fuels. May meet ISO Voluntary Performance Target (VPT) Tier 3 depending on laboratory testing. WHO classification: transitional or polluting depending on test results.", "es": "Cocina fabricada con rejilla y c\u00e1mara de combusti\u00f3n dise\u00f1ada para combustibles s\u00f3lidos. Puede cumplir los niveles ISO VPT seg\u00fan pruebas de laboratorio. Clasificaci\u00f3n OMS: de transici\u00f3n o contaminante seg\u00fan los resultados.", "fr": "Foyer fabriqu\u00e9 avec grille et chambre de combustion con\u00e7u pour les combustibles solides. Peut satisfaire aux niveaux ISO VPT selon les tests en laboratoire. Classification OMS : transitoire ou polluant selon les r\u00e9sultats des tests."}, "label": {"en": "Manufactured solid fuel stove", "es": "Cocina mejorada de combustible s\u00f3lido (fabricada)", "fr": "Foyer am\u00e9lior\u00e9 \u00e0 combustible solide (industriel)"}}, {"code": "traditional_solid_fuel_stove", "definition": {"en": "Ceramic or mud stove with enclosed firebox, used with solid fuels. WHO classification: polluting.", "es": "Cocina de cer\u00e1mica o barro con c\u00e1mara de combusti\u00f3n cerrada, usada con combustibles s\u00f3lidos. Clasificaci\u00f3n OMS: contaminante.", "fr": "Foyer en c\u00e9ramique ou en terre avec bo\u00eete \u00e0 feu ferm\u00e9e, utilis\u00e9 avec des combustibles solides. Classification OMS : polluant."}, "label": {"en": "Traditional solid fuel stove", "es": "Cocina tradicional de combustible s\u00f3lido", "fr": "Foyer traditionnel \u00e0 combustible solide"}}, {"code": "three_stone_open_fire", "definition": {"en": "Three stone fire or other open fire arrangement with no enclosed firebox. Most common in rural Sub-Saharan Africa and South Asia. WHO classification: polluting (highest PM2.5 emissions).", "es": "Fuego de tres piedras u otro arreglo de fuego abierto sin c\u00e1mara de combusti\u00f3n. El m\u00e1s com\u00fan en el \u00c1frica subsahariana rural y el sur de Asia. Clasificaci\u00f3n OMS: contaminante (emisiones de PM2,5 m\u00e1s altas).", "fr": "Feu \u00e0 trois pierres ou autre am\u00e9nagement de feu ouvert sans bo\u00eete \u00e0 feu. Le plus r\u00e9pandu en Afrique subsaharienne rurale et en Asie du Sud. Classification OMS : polluant (\u00e9missions PM2,5 les plus \u00e9lev\u00e9es)."}, "label": {"en": "Three stone fire / open fire", "es": "Fuego de tres piedras / fuego abierto", "fr": "Feu \u00e0 trois pierres / feu ouvert"}}, {"code": "other", "definition": {"en": "A cookstove type not covered by the other categories. Requires additional specification.", "es": "Un tipo de cocina no cubierto por las otras categor\u00edas. Requiere especificaci\u00f3n adicional.", "fr": "Un type de foyer de cuisson non couvert par les autres cat\u00e9gories. N\u00e9cessite une sp\u00e9cification suppl\u00e9mentaire."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
