  JusticeAccess3:
    title:
      en: Access to justice perception (6-level)
      fr: Perception de l'accès à la justice (6 niveaux)
      es: Percepción del acceso a la justicia (6 niveles)
    description:
      en: 'Household-perceived access to justice and redress mechanisms. Distinguishes five types of justice access failure: practical barriers (cost, distance), fear of reprisal (coercive environment), and complete absence of mechanisms — each with different programmatic implications and should not be collapsed to a binary. Based on OHCHR Rule-of-Law Indicators (2011) accessibility and impartiality dimension; GPC PAF Domain 2 (Rule of Law and Justice) Indicator 2.3; REACH Syria (2022) rule-of-law module.'
      fr: 'Perception par le ménage de l''accès à la justice et aux mécanismes de recours. Distingue cinq types de défaillance d''accès à la justice : obstacles pratiques (coût, distance), crainte de représailles (environnement coercitif) et absence totale de mécanismes — chacun ayant des implications programmatiques différentes et ne devant pas être réduit à un binaire. Fondé sur la dimension accessibilité et impartialité des Indicateurs d''état de droit HCDH (2011) ; Indicateur 2.3 du GPC PAF Domaine 2 (État de droit et justice) ; module état de droit REACH Syrie (2022).'
      es: 'Percepción del hogar sobre el acceso a la justicia y los mecanismos de reparación. Distingue cinco tipos de falla en el acceso a la justicia: barreras prácticas (costo, distancia), miedo a represalias (entorno coercitivo) y ausencia completa de mecanismos — cada uno con diferentes implicaciones programáticas y que no deben colapsarse en un binario. Basado en la dimensión de accesibilidad e imparcialidad de los Indicadores del Estado de Derecho del ACNUDH (2011); Indicador 2.3 del GPC PAF Dominio 2 (Estado de Derecho y Justicia); módulo de estado de derecho de REACH Siria (2022).'
    enum_uri: aidops:JusticeAccess3
    permissible_values:
      yes_formal:
        title:
          en: Yes — through a formal or customary mechanism
          fr: Oui — par un mécanisme formel ou coutumier
          es: Sí — a través de un mecanismo formal o consuetudinario
        description:
          en: Household believes it could seek and obtain redress through an accessible mechanism.
          fr: Le ménage croit pouvoir demander et obtenir réparation par un mécanisme accessible.
          es: El hogar cree que podría buscar y obtener reparación a través de un mecanismo accesible.
      yes_customary_only:
        title:
          en: Yes — but only through customary authority, not formal courts
          fr: Oui — mais uniquement par l'autorité coutumière, pas les tribunaux formels
          es: Sí — pero solo a través de autoridad consuetudinaria, no tribunales formales
        description:
          en: Formal courts are inaccessible or not trusted; customary authority is the only realistic option for redress.
          fr: Les tribunaux formels sont inaccessibles ou peu fiables ; l'autorité coutumière est la seule option réaliste pour obtenir réparation.
          es: Los tribunales formales son inaccesibles o no confiables; la autoridad consuetudinaria es la única opción realista para obtener reparación.
      no_practical_barriers:
        title:
          en: No — practical barriers prevent access
          fr: Non — des obstacles pratiques empêchent l'accès
          es: No — barreras prácticas impiden el acceso
        description:
          en: Cost, distance, lack of legal representation, language barriers, or other practical factors prevent access to justice.
          fr: Le coût, la distance, le manque de représentation juridique, les barrières linguistiques ou d'autres facteurs pratiques empêchent l'accès à la justice.
          es: El costo, la distancia, la falta de representación legal, las barreras idiomáticas u otros factores prácticos impiden el acceso a la justicia.
      no_fear_of_reprisal:
        title:
          en: No — fear of reprisal prevents seeking justice
          fr: Non — la crainte de représailles empêche de demander justice
          es: No — el miedo a represalias impide buscar justicia
        description:
          en: Household would not seek justice because of fear of retaliation by a powerful actor (armed group, authority, or influential community member).
          fr: Le ménage ne demanderait pas justice par crainte de représailles d'un acteur puissant (groupe armé, autorité ou membre influent de la communauté).
          es: El hogar no buscaría justicia por miedo a represalias de un actor poderoso (grupo armado, autoridad o miembro influyente de la comunidad).
      no_no_mechanism_exists:
        title:
          en: No — no functioning mechanism exists
          fr: Non — aucun mécanisme fonctionnel n'existe
          es: No — no existe ningún mecanismo funcional
        description:
          en: Household knows of no court, authority, or mechanism that could address the concern in the current context.
          fr: Le ménage ne connaît aucun tribunal, autorité ou mécanisme qui pourrait traiter le problème dans le contexte actuel.
          es: El hogar no conoce ningún tribunal, autoridad o mecanismo que pueda abordar el problema en el contexto actual.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess whether they could access justice.
          fr: Le répondant ne peut pas évaluer s'il pourrait accéder à la justice.
          es: El encuestado no puede evaluar si podría acceder a la justicia.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "ohchr-rule-of-law-indicators-2011", "reach-protection-monitoring-2022"], "definition": {"en": "Household-perceived access to justice and redress mechanisms. Distinguishes five types of justice access failure: practical barriers (cost, distance), fear of reprisal (coercive environment), and complete absence of mechanisms \u2014 each with different programmatic implications and should not be collapsed to a binary. Based on OHCHR Rule-of-Law Indicators (2011) accessibility and impartiality dimension; GPC PAF Domain 2 (Rule of Law and Justice) Indicator 2.3; REACH Syria (2022) rule-of-law module.", "es": "Percepci\u00f3n del hogar sobre el acceso a la justicia y los mecanismos de reparaci\u00f3n. Distingue cinco tipos de falla en el acceso a la justicia: barreras pr\u00e1cticas (costo, distancia), miedo a represalias (entorno coercitivo) y ausencia completa de mecanismos \u2014 cada uno con diferentes implicaciones program\u00e1ticas y que no deben colapsarse en un binario. Basado en la dimensi\u00f3n de accesibilidad e imparcialidad de los Indicadores del Estado de Derecho del ACNUDH (2011); Indicador 2.3 del GPC PAF Dominio 2 (Estado de Derecho y Justicia); m\u00f3dulo de estado de derecho de REACH Siria (2022).", "fr": "Perception par le m\u00e9nage de l''acc\u00e8s \u00e0 la justice et aux m\u00e9canismes de recours. Distingue cinq types de d\u00e9faillance d''acc\u00e8s \u00e0 la justice : obstacles pratiques (co\u00fbt, distance), crainte de repr\u00e9sailles (environnement coercitif) et absence totale de m\u00e9canismes \u2014 chacun ayant des implications programmatiques diff\u00e9rentes et ne devant pas \u00eatre r\u00e9duit \u00e0 un binaire. Fond\u00e9 sur la dimension accessibilit\u00e9 et impartialit\u00e9 des Indicateurs d''\u00e9tat de droit HCDH (2011) ; Indicateur 2.3 du GPC PAF Domaine 2 (\u00c9tat de droit et justice) ; module \u00e9tat de droit REACH Syrie (2022)."}, "id": "justice-access-3", "label": {"en": "Access to justice perception (6-level)", "es": "Percepci\u00f3n del acceso a la justicia (6 niveles)", "fr": "Perception de l''acc\u00e8s \u00e0 la justice (6 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_formal", "definition": {"en": "Household believes it could seek and obtain redress through an accessible mechanism.", "es": "El hogar cree que podr\u00eda buscar y obtener reparaci\u00f3n a trav\u00e9s de un mecanismo accesible.", "fr": "Le m\u00e9nage croit pouvoir demander et obtenir r\u00e9paration par un m\u00e9canisme accessible."}, "label": {"en": "Yes \u2014 through a formal or customary mechanism", "es": "S\u00ed \u2014 a trav\u00e9s de un mecanismo formal o consuetudinario", "fr": "Oui \u2014 par un m\u00e9canisme formel ou coutumier"}}, {"code": "yes_customary_only", "definition": {"en": "Formal courts are inaccessible or not trusted; customary authority is the only realistic option for redress.", "es": "Los tribunales formales son inaccesibles o no confiables; la autoridad consuetudinaria es la \u00fanica opci\u00f3n realista para obtener reparaci\u00f3n.", "fr": "Les tribunaux formels sont inaccessibles ou peu fiables ; l''autorit\u00e9 coutumi\u00e8re est la seule option r\u00e9aliste pour obtenir r\u00e9paration."}, "label": {"en": "Yes \u2014 but only through customary authority, not formal courts", "es": "S\u00ed \u2014 pero solo a trav\u00e9s de autoridad consuetudinaria, no tribunales formales", "fr": "Oui \u2014 mais uniquement par l''autorit\u00e9 coutumi\u00e8re, pas les tribunaux formels"}}, {"code": "no_practical_barriers", "definition": {"en": "Cost, distance, lack of legal representation, language barriers, or other practical factors prevent access to justice.", "es": "El costo, la distancia, la falta de representaci\u00f3n legal, las barreras idiom\u00e1ticas u otros factores pr\u00e1cticos impiden el acceso a la justicia.", "fr": "Le co\u00fbt, la distance, le manque de repr\u00e9sentation juridique, les barri\u00e8res linguistiques ou d''autres facteurs pratiques emp\u00eachent l''acc\u00e8s \u00e0 la justice."}, "label": {"en": "No \u2014 practical barriers prevent access", "es": "No \u2014 barreras pr\u00e1cticas impiden el acceso", "fr": "Non \u2014 des obstacles pratiques emp\u00eachent l''acc\u00e8s"}}, {"code": "no_fear_of_reprisal", "definition": {"en": "Household would not seek justice because of fear of retaliation by a powerful actor (armed group, authority, or influential community member).", "es": "El hogar no buscar\u00eda justicia por miedo a represalias de un actor poderoso (grupo armado, autoridad o miembro influyente de la comunidad).", "fr": "Le m\u00e9nage ne demanderait pas justice par crainte de repr\u00e9sailles d''un acteur puissant (groupe arm\u00e9, autorit\u00e9 ou membre influent de la communaut\u00e9)."}, "label": {"en": "No \u2014 fear of reprisal prevents seeking justice", "es": "No \u2014 el miedo a represalias impide buscar justicia", "fr": "Non \u2014 la crainte de repr\u00e9sailles emp\u00eache de demander justice"}}, {"code": "no_no_mechanism_exists", "definition": {"en": "Household knows of no court, authority, or mechanism that could address the concern in the current context.", "es": "El hogar no conoce ning\u00fan tribunal, autoridad o mecanismo que pueda abordar el problema en el contexto actual.", "fr": "Le m\u00e9nage ne conna\u00eet aucun tribunal, autorit\u00e9 ou m\u00e9canisme qui pourrait traiter le probl\u00e8me dans le contexte actuel."}, "label": {"en": "No \u2014 no functioning mechanism exists", "es": "No \u2014 no existe ning\u00fan mecanismo funcional", "fr": "Non \u2014 aucun m\u00e9canisme fonctionnel n''existe"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess whether they could access justice.", "es": "El encuestado no puede evaluar si podr\u00eda acceder a la justicia.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer s''il pourrait acc\u00e9der \u00e0 la justice."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
