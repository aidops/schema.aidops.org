ood-coping-strategy", "label": {"en": "Livelihood Coping Strategy", "es": "Estrategia de afrontamiento de medios de vida", "fr": "Strat\u00e9gie d''adaptation des moyens de subsistance"}, "maturity": "draft", "standard": {"name": "Synthesised from FAO RIMA-II coping subcomponent, LSMS-ISA coping module, and Sphere 2018 Livelihoods chapter", "notes": "Do not duplicate WFP LCS codes (captured by `lcs-strategy` vocabulary in FoodSecurityProfile)."}, "values": [{"code": "used_savings", "definition": {"en": "Drew down savings, sold financial assets, or liquidated mobile money.", "es": "Utiliz\u00f3 ahorros, vendi\u00f3 activos financieros o liquid\u00f3 dinero m\u00f3vil.", "fr": "A puis\u00e9 dans l''\u00e9pargne, vendu des actifs financiers ou liquid\u00e9 du mobile money."}, "label": {"en": "Used savings or sold financial assets", "es": "Uso de ahorros o venta de activos financieros", "fr": "Utilisation de l''\u00e9pargne ou vente d''actifs financiers"}}, {"code": "borrowed_from_family_community", "definition": {"en": "Took an interest-free or informal loan from relatives, neighbours, or a community savings group.", "es": "Tom\u00f3 un pr\u00e9stamo sin intereses o informal de familiares, vecinos o un grupo de ahorro comunitario.", "fr": "A pris un pr\u00eat sans int\u00e9r\u00eat ou informel aupr\u00e8s de parents, de voisins ou d''un groupe d''\u00e9pargne communautaire."}, "label": {"en": "Borrowed from family or community", "es": "Prestado de familia o comunidad", "fr": "Emprunt aupr\u00e8s de la famille ou de la communaut\u00e9"}}, {"code": "borrowed_formal_credit", "definition": {"en": "Took a loan from a bank, microfinance institution, or formal lender.", "es": "Tom\u00f3 un pr\u00e9stamo de un banco, instituci\u00f3n de microfinanzas o prestamista formal.", "fr": "A pris un pr\u00eat aupr\u00e8s d''une banque, d''une institution de microfinance ou d''un pr\u00eateur formel."}, "label": {"en": "Borrowed from formal credit source", "es": "Prestado de fuente de cr\u00e9dito formal", "fr": "Emprunt aupr\u00e8s d''une source de cr\u00e9dit formelle"}}, {"code": "sold_non_productive_asset", "definition": {"en": "Sold furniture, clothing, jewellery, electronics, or other consumer goods.", "es": "Vendi\u00f3 muebles, ropa, joyas, electr\u00f3nicos u otros bienes de consumo.", "fr": "A vendu des meubles, des v\u00eatements, des bijoux, de l''\u00e9lectronique ou d''autres biens de consommation."}, "label": {"en": "Sold non-productive household asset", "es": "Vendi\u00f3 activo del hogar no productivo", "fr": "Vente d''un actif m\u00e9nager non productif"}}, {"code": "sought_additional_work", "definition": {"en": "Took on extra labour, a second job, or sent additional household members to work.", "es": "Tom\u00f3 trabajo adicional, un segundo empleo o envi\u00f3 a miembros adicionales del hogar a trabajar.", "fr": "A pris un travail suppl\u00e9mentaire, un deuxi\u00e8me emploi ou envoy\u00e9 des membres suppl\u00e9mentaires du m\u00e9nage au travail."}, "label": {"en": "Sought or took additional work", "es": "Busc\u00f3 o tom\u00f3 trabajo adicional", "fr": "Recherch\u00e9 ou pris un emploi suppl\u00e9mentaire"}}, {"code": "received_assistance", "definition": {"en": "Received humanitarian assistance, government cash transfer, or community support.", "es": "Recibi\u00f3 asistencia humanitaria, transferencia monetaria gubernamental o apoyo comunitario.", "fr": "A re\u00e7u une aide humanitaire, un transfert mon\u00e9taire gouvernemental ou un soutien communautaire."}, "label": {"en": "Received assistance from programme or community", "es": "Recibi\u00f3 asistencia de programa o comunidad", "fr": "Aide re\u00e7ue d''un programme ou de la communaut\u00e9"}}, {"code": "reduced_nonfood_expenditure", "definition": {"en": "Cut spending on health, education, clothing, transport, or other non-food items.", "es": "Redujo el gasto en salud, educaci\u00f3n, ropa, transporte u otros art\u00edculos no alimentarios.", "fr": "A r\u00e9duit les d\u