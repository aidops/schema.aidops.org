      publicschema_logical_document_json: '{"bibliography_refs": ["wfp-fcs"], "definition": {"en": "The eight scored food groups used by the WFP Food Consumption Score (FCS), plus condiments as a non-scoring screener. Each group is scored by the number of days (0-7) the household consumed items from that group in the past seven days; the group''s weight converts days-of-consumption into the composite FCS. Meat, fish, and eggs form a single combined protein group in the standard WFP FCS questionnaire. The weights below are the WFP VAM 2008 weights and are treated as part of the instrument definition, not a programming decision.", "es": "Los ocho grupos alimentarios puntuados utilizados por el Puntaje de Consumo de Alimentos (FCS) del PMA, m\u00e1s los condimentos como \u00edtem de detecci\u00f3n no puntuado. Cada grupo se punt\u00faa por el n\u00famero de d\u00edas (0-7) que el hogar consumi\u00f3 alimentos de ese grupo durante los \u00faltimos siete d\u00edas; el peso del grupo convierte los d\u00edas de consumo en el FCS compuesto. La carne, el pescado y los huevos forman un \u00fanico grupo proteico combinado en el cuestionario FCS est\u00e1ndar del PMA. Los pesos abajo son los pesos VAM 2008 del PMA y se consideran parte de la definici\u00f3n del instrumento, no una decisi\u00f3n de programaci\u00f3n.", "fr": "Les huit groupes alimentaires not\u00e9s utilis\u00e9s par le Score de consommation alimentaire (FCS) du PAM, plus les condiments comme item de d\u00e9pistage non not\u00e9. Chaque groupe est not\u00e9 par le nombre de jours (0-7) de consommation par le m\u00e9nage durant les sept derniers jours ; le poids du groupe convertit les jours de consommation en FCS composite. La viande, le poisson et les \u0153ufs forment un seul groupe prot\u00e9ique combin\u00e9 dans le questionnaire FCS standard du PAM. Les poids ci-dessous sont les poids VAM 2008 du PAM et sont consid\u00e9r\u00e9s comme partie int\u00e9grante de la d\u00e9finition de l''instrument, non comme 