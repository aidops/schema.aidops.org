  TenureSecurity3:
    title:
      en: Tenure Security (perceived, 3-year horizon)
      fr: Sécurité foncière (perçue, horizon 3 ans)
      es: Seguridad de tenencia (percibida, horizonte de 3 años)
    description:
      en: 'Four-level subjective scale, plus a ''don''t know'' option, capturing the household''s perceived security of its right to continue using its agricultural land over the next three years. Based on LSMS-ISA subjective-tenure-security questions and the PRINDEX (Property Rights Index) methodology. The three-year horizon is intentionally short enough to be meaningful to respondents and long enough to capture practical planning uncertainty. Complements objective tenure arrangement (`land-tenure`): a household may hold land ''owned_with_title'' yet still feel insecure in a context of political instability, or hold land ''informal'' yet feel secure on customary grounds.'
      fr: 'Échelle subjective à quatre niveaux, plus une option « ne sait pas », saisissant la sécurité perçue par le ménage quant à son droit de continuer à utiliser sa terre agricole au cours des trois prochaines années. Basée sur les questions de sécurité foncière subjective du LSMS-ISA et la méthodologie PRINDEX (Indice des droits de propriété). L''horizon de trois ans est intentionnellement assez court pour être significatif pour les répondants et assez long pour saisir l''incertitude pratique de planification. Complète l''arrangement foncier objectif (`land-tenure`) : un ménage peut détenir une terre « owned_with_title » et pourtant se sentir en insécurité dans un contexte d''instabilité politique, ou détenir une terre « informal » et se sentir sécurisé pour des raisons coutumières.'
      es: 'Escala subjetiva de cuatro niveles, más una opción ''no sabe'', que captura la seguridad percibida por el hogar sobre su derecho a continuar usando su tierra agrícola durante los próximos tres años. Basada en las preguntas de seguridad subjetiva de tenencia del LSMS-ISA y la metodología PRINDEX (Índice de Derechos de Propiedad). El horizonte de tres años es intencionalmente lo suficientemente corto para ser significativo para los encuestados y lo suficientemente largo para capturar la incertidumbre práctica de planificación. Complementa el arreglo objetivo de tenencia (`land-tenure`): un hogar puede tener tierra ''owned_with_title'' y aun así sentirse inseguro en un contexto de inestabilidad política, o tener tierra ''informal'' y sentirse seguro por motivos consuetudinarios.'
    enum_uri: aidops:TenureSecurity3
    permissible_values:
      very_secure:
        title:
          en: Very secure
          fr: Très sécurisé
          es: Muy seguro
        description:
          en: Household feels very confident it will retain the right to use this land for the next 3 years.
          fr: Le ménage se sent très confiant qu'il conservera le droit d'utiliser cette terre au cours des 3 prochaines années.
          es: El hogar se siente muy confiado de que mantendrá el derecho a usar esta tierra durante los próximos 3 años.
      somewhat_secure:
        title:
          en: Somewhat secure
          fr: Assez sécurisé
          es: Algo seguro
        description:
          en: Household feels it will probably retain the right to use this land over the next 3 years but has some uncertainty.
          fr: Le ménage estime qu'il conservera probablement le droit d'utiliser cette terre au cours des 3 prochaines années mais avec une certaine incertitude.
          es: El hogar cree que probablemente mantendrá el derecho a usar esta tierra durante los próximos 3 años pero con cierta incertidumbre.
      somewhat_insecure:
        title:
          en: Somewhat insecure
          fr: Assez peu sécurisé
          es: Algo inseguro
        description:
          en: Household feels it may lose the right to use this land within the next 3 years.
          fr: Le ménage estime qu'il pourrait perdre le droit d'utiliser cette terre au cours des 3 prochaines années.
          es: El hogar cree que podría perder el derecho a usar esta tierra durante los próximos 3 años.
      very_insecure:
        title:
          en: Very insecure
          fr: Très peu sécurisé
          es: Muy inseguro
        description:
          en: Household feels it is likely to lose the right to use this land within the next 3 years.
          fr: Le ménage estime qu'il risque fortement de perdre le droit d'utiliser cette terre au cours des 3 prochaines années.
          es: El hogar cree que es probable que pierda el derecho a usar esta tierra durante los próximos 3 años.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Household cannot assess its tenure security. Retained as a distinct valid response and must not be re-coded as 'insecure' or missing.
          fr: Le ménage ne peut pas évaluer sa sécurité foncière. Conservée comme réponse valide distincte et ne doit pas être recodée comme « insécurisé » ou manquant.
          es: El hogar no puede evaluar su seguridad de tenencia. Se mantiene como respuesta válida distinta y no debe recodificarse como 'inseguro' o faltante.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Four-level subjective scale, plus a ''don''t know'' option, capturing the household''s perceived security of its right to continue using its agricultural land over the next three years. Based on LSMS-ISA subjective-tenure-security questions and the PRINDEX (Property Rights Index) methodology. The three-year horizon is intentionally short enough to be meaningful to respondents and long enough to capture practical planning uncertainty. Complements objective tenure arrangement (`land-tenure`): a household may hold land ''owned_with_title'' yet still feel insecure in a context of political instability, or hold land ''informal'' yet feel secure on customary grounds.", "es": "Escala subjetiva de cuatro niveles, m\u00e1s una opci\u00f3n ''no sabe'', que captura la seguridad percibida por el hogar sobre su derecho a continuar usando su tierra agr\u00edcola durante los pr\u00f3ximos tres a\u00f1os. Basada en las preguntas de seguridad subjetiva de tenencia del LSMS-ISA y la metodolog\u00eda PRINDEX (\u00cdndice de Derechos de Propiedad). El horizonte de tres a\u00f1os es intencionalmente lo suficientemente corto para ser significativo para los encuestados y lo suficientemente largo para capturar la incertidumbre pr\u00e1ctica de planificaci\u00f3n. Complementa el arreglo objetivo de tenencia (`land-tenure`): un hogar puede tener tierra ''owned_with_title'' y aun as\u00ed sentirse inseguro en un contexto de inestabilidad pol\u00edtica, o tener tierra ''informal'' y sentirse seguro por motivos consuetudinarios.", "fr": "\u00c9chelle subjective \u00e0 quatre niveaux, plus une option \u00ab ne sait pas \u00bb, saisissant la s\u00e9curit\u00e9 per\u00e7ue par le m\u00e9nage quant \u00e0 son droit de continuer \u00e0 utiliser sa terre agricole au cours des trois prochaines ann\u00e9es. Bas\u00e9e sur les questions de s\u00e9curit\u00e9 fonci\u00e8re subjective du LSMS-ISA et la m\u00e9thodologie PRINDEX (Indice des droits de propri\u00e9t\u00e9). L''horizon de trois ans est intentionnellement assez court pour \u00eatre significatif pour les r\u00e9pondants et assez long pour saisir l''incertitude pratique de planification. Compl\u00e8te l''arrangement foncier objectif (`land-tenure`) : un m\u00e9nage peut d\u00e9tenir une terre \u00ab owned_with_title \u00bb et pourtant se sentir en ins\u00e9curit\u00e9 dans un contexte d''instabilit\u00e9 politique, ou d\u00e9tenir une terre \u00ab informal \u00bb et se sentir s\u00e9curis\u00e9 pour des raisons coutumi\u00e8res."}, "id": "tenure-security-3", "label": {"en": "Tenure Security (perceived, 3-year horizon)", "es": "Seguridad de tenencia (percibida, horizonte de 3 a\u00f1os)", "fr": "S\u00e9curit\u00e9 fonci\u00e8re (per\u00e7ue, horizon 3 ans)"}, "maturity": "draft", "standard": {"name": "LSMS-ISA Agricultural Survey Design Guidebook / PRINDEX (Property Rights Index)", "notes": "Subjective tenure security captured through a categorical scale is the standard approach used by the World Bank LSMS-ISA and Prindex surveys. The four-band scale (very secure, somewhat secure, somewhat insecure, very insecure) is harmonised with Prindex reporting bands.", "uri": "https://www.prindex.net/"}, "values": [{"code": "very_secure", "definition": {"en": "Household feels very confident it will retain the right to use this land for the next 3 years.", "es": "El hogar se siente muy confiado de que mantendr\u00e1 el derecho a usar esta tierra durante los pr\u00f3ximos 3 a\u00f1os.", "fr": "Le m\u00e9nage se sent tr\u00e8s confiant qu''il conservera le droit d''utiliser cette terre au cours des 3 prochaines ann\u00e9es."}, "label": {"en": "Very secure", "es": "Muy seguro", "fr": "Tr\u00e8s s\u00e9curis\u00e9"}}, {"code": "somewhat_secure", "definition": {"en": "Household feels it will probably retain the right to use this land over the next 3 years but has some uncertainty.", "es": "El hogar cree que probablemente mantendr\u00e1 el derecho a usar esta tierra durante los pr\u00f3ximos 3 a\u00f1os pero con cierta incertidumbre.", "fr": "Le m\u00e9nage estime qu''il conservera probablement le droit d''utiliser cette terre au cours des 3 prochaines ann\u00e9es mais avec une certaine incertitude."}, "label": {"en": "Somewhat secure", "es": "Algo seguro", "fr": "Assez s\u00e9curis\u00e9"}}, {"code": "somewhat_insecure", "definition": {"en": "Household feels it may lose the right to use this land within the next 3 years.", "es": "El hogar cree que podr\u00eda perder el derecho a usar esta tierra durante los pr\u00f3ximos 3 a\u00f1os.", "fr": "Le m\u00e9nage estime qu''il pourrait perdre le droit d''utiliser cette terre au cours des 3 prochaines ann\u00e9es."}, "label": {"en": "Somewhat insecure", "es": "Algo inseguro", "fr": "Assez peu s\u00e9curis\u00e9"}}, {"code": "very_insecure", "definition": {"en": "Household feels it is likely to lose the right to use this land within the next 3 years.", "es": "El hogar cree que es probable que pierda el derecho a usar esta tierra durante los pr\u00f3ximos 3 a\u00f1os.", "fr": "Le m\u00e9nage estime qu''il risque fortement de perdre le droit d''utiliser cette terre au cours des 3 prochaines ann\u00e9es."}, "label": {"en": "Very insecure", "es": "Muy inseguro", "fr": "Tr\u00e8s peu s\u00e9curis\u00e9"}}, {"code": "dont_know", "definition": {"en": "Household cannot assess its tenure security. Retained as a distinct valid response and must not be re-coded as ''insecure'' or missing.", "es": "El hogar no puede evaluar su seguridad de tenencia. Se mantiene como respuesta v\u00e1lida distinta y no debe recodificarse como ''inseguro'' o faltante.", "fr": "Le m\u00e9nage ne peut pas \u00e9valuer sa s\u00e9curit\u00e9 fonci\u00e8re. Conserv\u00e9e comme r\u00e9ponse valide distincte et ne doit pas \u00eatre recod\u00e9e comme \u00ab ins\u00e9curis\u00e9 \u00bb ou manquant."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  TermsOfTradeTrend:
    title:
      en: Livestock-to-Cereal Terms of Trade Trend
      fr: Tendance des termes de l'échange bétail/céréales
      es: Tendencia de los términos de intercambio ganadería/cereales
    description:
      en: Perceived direction of the livestock-to-cereal price ratio relative to the same period in the prior year. Used in PastoralFoodSecurityProfile as a market perception indicator when objective price data are unavailable or cannot be compared to a baseline. Grounded in FEWSNET terms-of-trade monitoring methodology and IPC AFI pastoral annex market-access evidence requirements.
      fr: Direction perçue du ratio prix bétail/céréale par rapport à la même période de l'année précédente. Utilisé comme indicateur de perception du marché lorsque les données objectives de prix sont indisponibles. Fondé sur la méthodologie FEWSNET et les exigences de preuves d'accès au marché de l'annexe pastoraliste IPC AFI.
      es: Dirección percibida de la razón precio ganadería/cereal relativa al mismo período del año anterior. Usado como indicador de percepción del mercado cuando los datos objetivos de precios no están disponibles. Fundamentado en la metodología de monitoreo de FEWSNET y los requisitos de evidencia de acceso al mercado del anexo pastoralista IPC AFI.
    enum_uri: aidops:TermsOfTradeTrend
    permissible_values:
      much_better:
        title:
          en: Much better — can buy much more cereal for the same animal
          fr: Bien meilleur — peut acheter beaucoup plus de céréales pour le même animal
          es: Mucho mejor — puede comprar mucho más cereal por el mismo animal
        description:
          en: Livestock prices have risen significantly relative to cereal prices; pastoral purchasing power substantially improved compared to last year.
          fr: Les prix du bétail ont considérablement augmenté par rapport aux prix des céréales ; le pouvoir d'achat pastoral s'est nettement amélioré par rapport à l'année dernière.
          es: Los precios del ganado han aumentado significativamente relativo a los precios de los cereales; el poder adquisitivo pastoral ha mejorado sustancialmente respecto al año pasado.
      slightly_better:
        title:
          en: Slightly better
          fr: Légèrement meilleur
          es: Ligeramente mejor
        description:
          en: Marginal improvement in livestock-to-cereal purchasing power compared to the same period last year.
          fr: Amélioration marginale du pouvoir d'achat bétail/céréale par rapport à la même période l'année dernière.
          es: Mejora marginal en el poder adquisitivo ganadería/cereal comparado con el mismo período del año pasado.
      same:
        title:
          en: About the same
          fr: À peu près pareil
          es: Aproximadamente igual
        description:
          en: No significant change in livestock-to-cereal purchasing power compared to the same period last year.
          fr: Pas de changement significatif dans le pouvoir d'achat bétail/céréale par rapport à la même période l'année dernière.
          es: Sin cambio significativo en el poder adquisitivo ganadería/cereal comparado con el mismo período del año pasado.
      slightly_worse:
        title:
          en: Slightly worse
          fr: Légèrement pire
          es: Ligeramente peor
        description:
          en: Marginal deterioration in purchasing power; livestock prices declining relative to cereal prices.
          fr: Détérioration marginale du pouvoir d'achat ; les prix du bétail baissent par rapport aux prix des céréales.
          es: Deterioro marginal del poder adquisitivo; los precios del ganado declinan relativo a los precios de los cereales.
      much_worse:
        title:
          en: Much worse — can buy much less cereal for the same animal
          fr: Bien pire — peut acheter beaucoup moins de céréales pour le même animal
          es: Mucho peor — puede comprar mucho menos cereal por el mismo animal
        description:
          en: Significant deterioration in pastoral purchasing power; livestock prices have fallen sharply relative to cereal prices. Key stress indicator used in IPC pastoral analysis.
          fr: Détérioration significative du pouvoir d'achat pastoral ; les prix du bétail ont fortement baissé par rapport aux prix des céréales. Indicateur de stress clé utilisé dans l'analyse pastorale IPC.
          es: Deterioro significativo del poder adquisitivo pastoral; los precios del ganado han caído drásticamente relativo a los precios de los cereales. Indicador de estrés clave usado en el análisis pastoral IPC.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess the direction of change in livestock-to-cereal purchasing power.
          fr: Le répondant ne peut pas évaluer la direction du changement du pouvoir d'achat bétail/céréale.
          es: El encuestado no puede evaluar la dirección del cambio en el poder adquisitivo ganadería/cereal.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1"], "definition": {"en": "Perceived direction of the livestock-to-cereal price ratio relative to the same period in the prior year. Used in PastoralFoodSecurityProfile as a market perception indicator when objective price data are unavailable or cannot be compared to a baseline. Grounded in FEWSNET terms-of-trade monitoring methodology and IPC AFI pastoral annex market-access evidence requirements.", "es": "Direcci\u00f3n percibida de la raz\u00f3n precio ganader\u00eda/cereal relativa al mismo per\u00edodo del a\u00f1o anterior. Usado como indicador de percepci\u00f3n del mercado cuando los datos objetivos de precios no est\u00e1n disponibles. Fundamentado en la metodolog\u00eda de monitoreo de FEWSNET y los requisitos de evidencia de acceso al mercado del anexo pastoralista IPC AFI.", "fr": "Direction per\u00e7ue du ratio prix b\u00e9tail/c\u00e9r\u00e9ale par rapport \u00e0 la m\u00eame p\u00e9riode de l''ann\u00e9e pr\u00e9c\u00e9dente. Utilis\u00e9 comme indicateur de perception du march\u00e9 lorsque les donn\u00e9es objectives de prix sont indisponibles. Fond\u00e9 sur la m\u00e9thodologie FEWSNET et les exigences de preuves d''acc\u00e8s au march\u00e9 de l''annexe pastoraliste IPC AFI."}, "id": "terms-of-trade-trend", "label": {"en": "Livestock-to-Cereal Terms of Trade Trend", "es": "Tendencia de los t\u00e9rminos de intercambio ganader\u00eda/cereales", "fr": "Tendance des termes de l''\u00e9change b\u00e9tail/c\u00e9r\u00e9ales"}, "maturity": "draft", "values": [{"code": "much_better", "definition": {"en": "Livestock prices have risen significantly relative to cereal prices; pastoral purchasing power substantially improved compared to last year.", "es": "Los precios del ganado han aumentado significativamente relativo a los precios de los cereales; el poder adquisitivo pastoral ha mejorado sustancialmente respecto al a\u00f1o pasado.", "fr": "Les prix du b\u00e9tail ont consid\u00e9rablement augment\u00e9 par rapport aux prix des c\u00e9r\u00e9ales ; le pouvoir d''achat pastoral s''est nettement am\u00e9lior\u00e9 par rapport \u00e0 l''ann\u00e9e derni\u00e8re."}, "label": {"en": "Much better \u2014 can buy much more cereal for the same animal", "es": "Mucho mejor \u2014 puede comprar mucho m\u00e1s cereal por el mismo animal", "fr": "Bien meilleur \u2014 peut acheter beaucoup plus de c\u00e9r\u00e9ales pour le m\u00eame animal"}}, {"code": "slightly_better", "definition": {"en": "Marginal improvement in livestock-to-cereal purchasing power compared to the same period last year.", "es": "Mejora marginal en el poder adquisitivo ganader\u00eda/cereal comparado con el mismo per\u00edodo del a\u00f1o pasado.", "fr": "Am\u00e9lioration marginale du pouvoir d''achat b\u00e9tail/c\u00e9r\u00e9ale par rapport \u00e0 la m\u00eame p\u00e9riode l''ann\u00e9e derni\u00e8re."}, "label": {"en": "Slightly better", "es": "Ligeramente mejor", "fr": "L\u00e9g\u00e8rement meilleur"}}, {"code": "same", "definition": {"en": "No significant change in livestock-to-cereal purchasing power compared to the same period last year.", "es": "Sin cambio significativo en el poder adquisitivo ganader\u00eda/cereal comparado con el mismo per\u00edodo del a\u00f1o pasado.", "fr": "Pas de changement significatif dans le pouvoir d''achat b\u00e9tail/c\u00e9r\u00e9ale par rapport \u00e0 la m\u00eame p\u00e9riode l''ann\u00e9e derni\u00e8re."}, "label": {"en": "About the same", "es": "Aproximadamente igual", "fr": "\u00c0 peu pr\u00e8s pareil"}}, {"code": "slightly_worse", "definition": {"en": "Marginal deterioration in purchasing power; livestock prices declining relative to cereal prices.", "es": "Deterioro marginal del poder adquisitivo; los precios del ganado declinan relativo a los precios de los cereales.", "fr": "D\u00e9t\u00e9rioration marginale du pouvoir d''achat ; les prix du b\u00e9tail baissent par rapport aux prix des c\u00e9r\u00e9ales."}, "label": {"en": "Slightly worse", "es": "Ligeramente peor", "fr": "L\u00e9g\u00e8rement pire"}}, {"code": "much_worse", "definition": {"en": "Significant deterioration in pastoral purchasing power; livestock prices have fallen sharply relative to cereal prices. Key stress indicator used in IPC pastoral analysis.", "es": "Deterioro significativo del poder adquisitivo pastoral; los precios del ganado han ca\u00eddo dr\u00e1sticamente relativo a los precios de los cereales. Indicador de estr\u00e9s clave usado en el an\u00e1lisis pastoral IPC.", "fr": "D\u00e9t\u00e9rioration significative du pouvoir d''achat pastoral ; les prix du b\u00e9tail ont fortement baiss\u00e9 par rapport aux prix des c\u00e9r\u00e9ales. Indicateur de stress cl\u00e9 utilis\u00e9 dans l''analyse pastorale IPC."}, "label": {"en": "Much worse \u2014 can buy much less cereal for the same animal", "es": "Mucho peor \u2014 puede comprar mucho menos cereal por el mismo animal", "fr": "Bien pire \u2014 peut acheter beaucoup moins de c\u00e9r\u00e9ales pour le m\u00eame animal"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess the direction of change in livestock-to-cereal purchasing power.", "es": "El encuestado no puede evaluar la direcci\u00f3n del cambio en el poder adquisitivo ganader\u00eda/cereal.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la direction du changement du pouvoir d''achat b\u00e9tail/c\u00e9r\u00e9ale."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: agir-sahel-resilience-framework,fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1
  TetanusInjectionsReceived:
    title:
      en: Tetanus Injections Received During Pregnancy
      fr: Injections antitétaniques reçues pendant la grossesse
      es: Inyecciones antitetánicas recibidas durante el embarazo
    description:
      en: The number of tetanus toxoid or tetanus-diphtheria (Td) injections received during the most recent pregnancy, as reported by the woman. DHS-8 m1. This captures only injections during the current pregnancy; full neonatal tetanus protection (DHS rh_anc_neotet) requires cumulative lifetime dose history. WHO recommends at least 2 doses during pregnancy for women not previously immunized.
      fr: Le nombre d'injections de toxoïde tétanique ou tétanos-diphtérie (Td) reçues pendant la grossesse la plus récente, tel que rapporté par la femme. DHS-8 m1. Cela capture uniquement les injections pendant la grossesse en cours ; la protection néonatale complète contre le tétanos (DHS rh_anc_neotet) nécessite l'historique cumulé des doses à vie. L'OMS recommande au moins 2 doses pendant la grossesse pour les femmes non immunisées antérieurement.
      es: El número de inyecciones de toxoide tetánico o tétanos-difteria (Td) recibidas durante el embarazo más reciente, según lo reportado por la mujer. DHS-8 m1. Esto captura solo las inyecciones durante el embarazo actual; la protección neonatal completa contra el tétanos (DHS rh_anc_neotet) requiere el historial acumulado de dosis de por vida. La OMS recomienda al menos 2 dosis durante el embarazo para mujeres no immunizadas previamente.
    enum_uri: aidops:TetanusInjectionsReceived
    permissible_values:
      none:
        title:
          en: None
          fr: Aucune
          es: Ninguna
        description:
          en: No tetanus injection was received during this pregnancy.
          fr: Aucune injection antitétanique n'a été reçue pendant cette grossesse.
          es: No se recibió ninguna inyección antitetánica durante este embarazo.
      one:
        title:
          en: 1 injection
          fr: 1 injection
          es: 1 inyección
        description:
          en: One tetanus injection received during this pregnancy. DHS m1 = 1.
          fr: Une injection antitétanique reçue pendant cette grossesse. DHS m1 = 1.
          es: Una inyección antitetánica recibida durante este embarazo. DHS m1 = 1.
      two_or_more:
        title:
          en: 2 or more injections
          fr: 2 injections ou plus
          es: 2 inyecciones o más
        description:
          en: Two or more tetanus injections received during this pregnancy. Meets the minimum WHO recommendation for non-previously-immunized women. DHS m1 >= 2.
          fr: Deux injections antitétaniques ou plus reçues pendant cette grossesse. Satisfait au minimum recommandé par l'OMS pour les femmes non immunisées antérieurement. DHS m1 >= 2.
          es: Dos o más inyecciones antitetánicas recibidas durante este embarazo. Cumple la recomendación mínima de la OMS para mujeres no immunizadas previamente. DHS m1 >= 2.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember receiving tetanus injections.
          fr: La répondante ne sait pas ou ne se souvient pas d'avoir reçu des injections antitétaniques.
          es: La encuestada no sabe o no recuerda haber recibido inyecciones antitetánicas.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire"], "definition": {"en": "The number of tetanus toxoid or tetanus-diphtheria (Td) injections received during the most recent pregnancy, as reported by the woman. DHS-8 m1. This captures only injections during the current pregnancy; full neonatal tetanus protection (DHS rh_anc_neotet) requires cumulative lifetime dose history. WHO recommends at least 2 doses during pregnancy for women not previously immunized.", "es": "El n\u00famero de inyecciones de toxoide tet\u00e1nico o t\u00e9tanos-difteria (Td) recibidas durante el embarazo m\u00e1s reciente, seg\u00fan lo reportado por la mujer. DHS-8 m1. Esto captura solo las inyecciones durante el embarazo actual; la protecci\u00f3n neonatal completa contra el t\u00e9tanos (DHS rh_anc_neotet) requiere el historial acumulado de dosis de por vida. La OMS recomienda al menos 2 dosis durante el embarazo para mujeres no immunizadas previamente.", "fr": "Le nombre d''injections de toxo\u00efde t\u00e9tanique ou t\u00e9tanos-dipht\u00e9rie (Td) re\u00e7ues pendant la grossesse la plus r\u00e9cente, tel que rapport\u00e9 par la femme. DHS-8 m1. Cela capture uniquement les injections pendant la grossesse en cours ; la protection n\u00e9onatale compl\u00e8te contre le t\u00e9tanos (DHS rh_anc_neotet) n\u00e9cessite l''historique cumul\u00e9 des doses \u00e0 vie. L''OMS recommande au moins 2 doses pendant la grossesse pour les femmes non immunis\u00e9es ant\u00e9rieurement."}, "id": "tetanus-injections-received", "label": {"en": "Tetanus Injections Received During Pregnancy", "es": "Inyecciones antitet\u00e1nicas recibidas durante el embarazo", "fr": "Injections antit\u00e9taniques re\u00e7ues pendant la grossesse"}, "maturity": "draft", "values": [{"code": "none", "definition": {"en": "No tetanus injection was received during this pregnancy.", "es": "No se recibi\u00f3 ninguna inyecci\u00f3n antitet\u00e1nica durante este embarazo.", "fr": "Aucune injection antit\u00e9tanique n''a \u00e9t\u00e9 re\u00e7ue pendant cette grossesse."}, "label": {"en": "None", "es": "Ninguna", "fr": "Aucune"}}, {"code": "one", "definition": {"en": "One tetanus injection received during this pregnancy. DHS m1 = 1.", "es": "Una inyecci\u00f3n antitet\u00e1nica recibida durante este embarazo. DHS m1 = 1.", "fr": "Une injection antit\u00e9tanique re\u00e7ue pendant cette grossesse. DHS m1 = 1."}, "label": {"en": "1 injection", "es": "1 inyecci\u00f3n", "fr": "1 injection"}}, {"code": "two_or_more", "definition": {"en": "Two or more tetanus injections received during this pregnancy. Meets the minimum WHO recommendation for non-previously-immunized women. DHS m1 >= 2.", "es": "Dos o m\u00e1s inyecciones antitet\u00e1nicas recibidas durante este embarazo. Cumple la recomendaci\u00f3n m\u00ednima de la OMS para mujeres no immunizadas previamente. DHS m1 >= 2.", "fr": "Deux injections antit\u00e9taniques ou plus re\u00e7ues pendant cette grossesse. Satisfait au minimum recommand\u00e9 par l''OMS pour les femmes non immunis\u00e9es ant\u00e9rieurement. DHS m1 >= 2."}, "label": {"en": "2 or more injections", "es": "2 inyecciones o m\u00e1s", "fr": "2 injections ou plus"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember receiving tetanus injections.", "es": "La encuestada no sabe o no recuerda haber recibido inyecciones antitet\u00e1nicas.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas d''avoir re\u00e7u des injections antit\u00e9taniques."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: dhs-woman-questionnaire
  ThermalComfortAdequacy:
    title:
      en: Thermal comfort adequacy scale
      fr: Échelle d'adéquation du confort thermique
      es: Escala de adecuación del confort térmico
    description:
      en: Four-level scale for assessing whether a shelter provides adequate thermal comfort throughout the year, including the coldest or hottest season. Includes a 'don't know' option to capture seasonal uncertainty or recent occupancy. Based on Sphere Standard 3 guidance on thermal comfort for warm/humid and cold climates.
      fr: Échelle à quatre niveaux pour évaluer si un abri offre un confort thermique adéquat tout au long de l'année, y compris la saison la plus froide ou la plus chaude. Inclut une option 'ne sait pas' pour capturer l'incertitude saisonnière ou une occupation récente. Basée sur les orientations de la Norme Sphère 3 sur le confort thermique pour les climats chauds/humides et froids.
      es: Escala de cuatro niveles para evaluar si un refugio proporciona confort térmico adecuado durante todo el año, incluyendo la temporada más fría o más caliente. Incluye una opción 'no sabe' para capturar la incertidumbre estacional o la ocupación reciente. Basada en la orientación de la Norma Esfera 3 sobre el confort térmico para climas cálidos/húmedos y fríos.
    enum_uri: aidops:ThermalComfortAdequacy
    permissible_values:
      'yes':
        title:
          en: Yes — adequate in all seasons
          fr: Oui — adéquat en toutes saisons
          es: Sí — adecuado en todas las estaciones
        description:
          en: The shelter provides adequate warmth or cooling throughout the year, including in the coldest or hottest season.
          fr: L'abri fournit une chaleur ou une fraîcheur adéquate tout au long de l'année, y compris pendant la saison la plus froide ou la plus chaude.
          es: El refugio proporciona calor o frescura adecuados durante todo el año, incluyendo en la temporada más fría o más caliente.
      partial:
        title:
          en: Partial — adequate in some seasons but not all
          fr: Partiel — adéquat pour certaines saisons mais pas toutes
          es: Parcial — adecuado en algunas estaciones pero no en todas
        description:
          en: The shelter is thermally comfortable in some seasons but inadequate in at least one season (e.g., too cold in winter or too hot in summer).
          fr: L'abri est thermiquement confortable en certaines saisons mais inadéquat dans au moins une saison (p. ex., trop froid en hiver ou trop chaud en été).
          es: El refugio es térmicamente cómodo en algunas estaciones pero inadecuado en al menos una estación (p. ej., demasiado frío en invierno o demasiado caliente en verano).
      'no':
        title:
          en: No — not adequately warm or cool
          fr: Non — pas suffisamment chaud ou frais
          es: No — no suficientemente cálido o fresco
        description:
          en: The shelter does not provide adequate thermal comfort in any season.
          fr: L'abri ne fournit pas un confort thermique adéquat dans aucune saison.
          es: El refugio no proporciona confort térmico adecuado en ninguna estación.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent is unable to assess thermal comfort, typically because they have not occupied the shelter through all seasons.
          fr: Le répondant n'est pas en mesure d'évaluer le confort thermique, généralement parce qu'il n'a pas occupé l'abri pendant toutes les saisons.
          es: El encuestado no puede evaluar el confort térmico, generalmente porque no ha ocupado el refugio durante todas las estaciones.
