  ReasonForNonAttendance:
    title:
      en: Reason for Non-Attendance
      fr: Raison de non-fréquentation scolaire
      es: Razón de no asistencia escolar
    description:
      en: Barriers or reasons explaining why a school-age child is not currently attending school. Consolidated from MICS6 (CB10C school-age variant), UNESCO UIS out-of-school children analysis categories, INEE Standard 8 access barriers taxonomy, and IRC education assessment blocks. Used as the single source of truth for both single-select (main reason) and multi-select (all reasons) properties.
      fr: Obstacles ou raisons expliquant pourquoi un enfant en âge scolaire ne fréquente pas l'école actuellement. Consolidés à partir du MICS6 (variante scolaire CB10C), des catégories d'analyse des enfants non scolarisés de l'ISU de l'UNESCO, de la taxonomie des obstacles d'accès de la norme INEE 8 et des blocs d'évaluation éducative de l'IRC. Utilisé comme source unique de vérité pour les propriétés à sélection unique (raison principale) et à sélection multiple (toutes les raisons).
      es: Barreras o razones que explican por qué un niño en edad escolar no asiste actualmente a la escuela. Consolidado a partir de MICS6 (variante escolar CB10C), categorías de análisis de niños fuera de la escuela del IEU de la UNESCO, taxonomía de barreras de acceso de la norma INEE 8 y bloques de evaluación educativa de IRC. Utilizado como fuente única de verdad para las propiedades de selección única (razón principal) y selección múltiple (todas las razones).
    enum_uri: aidops:ReasonForNonAttendance
    permissible_values:
      too_expensive:
        title:
          en: School fees or costs are too high
          fr: Les frais ou coûts scolaires sont trop élevés
          es: Los gastos o costos escolares son demasiado altos
        description:
          en: 'Financial barrier: school fees, uniforms, learning materials, or transport costs are unaffordable.'
          fr: 'Obstacle financier : les frais de scolarité, les uniformes, le matériel pédagogique ou les frais de transport sont inabordables.'
          es: 'Barrera financiera: los aranceles escolares, uniformes, materiales de aprendizaje o costos de transporte son inasequibles.'
      too_far:
        title:
          en: School is too far away
          fr: L'école est trop loin
          es: La escuela está demasiado lejos
        description:
          en: 'Physical distance or access barrier: the nearest school is too far to attend regularly.'
          fr: 'Obstacle physique de distance ou d''accès : l''école la plus proche est trop loin pour une fréquentation régulière.'
          es: 'Barrera de distancia física o acceso: la escuela más cercana está demasiado lejos para asistir regularmente.'
      no_school_available:
        title:
          en: There is no school available nearby
          fr: Il n'y a pas d'école disponible à proximité
          es: No hay escuela disponible cerca
        description:
          en: 'Availability barrier: no school of any kind exists within a reachable distance.'
          fr: 'Obstacle de disponibilité : aucune école d''aucun type n''existe à une distance accessible.'
          es: 'Barrera de disponibilidad: no existe ninguna escuela de ningún tipo a una distancia alcanzable.'
      school_not_safe:
        title:
          en: School is not safe (insecurity, conflict)
          fr: L'école n'est pas sûre (insécurité, conflit)
          es: La escuela no es segura (inseguridad, conflicto)
        description:
          en: 'Safety barrier: violence, conflict, or insecurity makes attendance dangerous. Primary emergency-context indicator per INEE. Sensitive: may indicate exposure to conflict or displacement.'
          fr: 'Obstacle sécuritaire : la violence, le conflit ou l''insécurité rend la fréquentation dangereuse. Indicateur principal de contexte d''urgence selon l''INEE. Sensible : peut indiquer une exposition à un conflit ou un déplacement.'
          es: 'Barrera de seguridad: la violencia, el conflicto o la inseguridad hace que asistir sea peligroso. Indicador principal de contexto de emergencia según INEE. Sensible: puede indicar exposición a conflicto o desplazamiento.'
      school_damaged_destroyed:
        title:
          en: School building damaged or destroyed
          fr: Le bâtiment scolaire est endommagé ou détruit
          es: El edificio escolar está dañado o destruido
        description:
          en: 'Infrastructure barrier: the school building has been damaged or destroyed by a disaster or conflict.'
          fr: 'Obstacle infrastructurel : le bâtiment scolaire a été endommagé ou détruit par une catastrophe ou un conflit.'
          es: 'Barrera de infraestructura: el edificio escolar ha sido dañado o destruido por un desastre o conflicto.'
      child_needed_at_home:
        title:
          en: Child is needed at home for domestic work
          fr: L'enfant est nécessaire à la maison pour les travaux domestiques
          es: El niño es necesario en el hogar para el trabajo doméstico
        description:
          en: 'Demand-side barrier: child labour in the domestic sphere or caregiving responsibilities prevent attendance.'
          fr: 'Obstacle côté demande : le travail domestique ou les responsabilités de prise en charge empêchent la fréquentation.'
          es: 'Barrera de demanda: el trabajo doméstico o las responsabilidades de cuidado impiden la asistencia.'
      child_labour_outside:
        title:
          en: Child is working outside the home
          fr: L'enfant travaille en dehors du foyer
          es: El niño trabaja fuera del hogar
        description:
          en: 'Economic child labour barrier: the child is engaged in paid or productive work outside the household. Sensitive: indicates child labour situation.'
          fr: 'Obstacle du travail des enfants économique : l''enfant est engagé dans un travail rémunéré ou productif en dehors du ménage. Sensible : indique une situation de travail des enfants.'
          es: 'Barrera de trabajo infantil económico: el niño está empleado en trabajo remunerado o productivo fuera del hogar. Sensible: indica situación de trabajo infantil.'
      illness_disability:
        title:
          en: Child has illness or disability preventing attendance
          fr: L'enfant a une maladie ou un handicap empêchant la fréquentation
          es: El niño tiene una enfermedad o discapacidad que impide la asistencia
        description:
          en: 'Health or functional barrier: the child''s illness or disability prevents regular attendance. Sensitive: discloses health or disability status.'
          fr: 'Obstacle sanitaire ou fonctionnel : la maladie ou le handicap de l''enfant empêche une fréquentation régulière. Sensible : divulgue l''état de santé ou de handicap.'
          es: 'Barrera de salud o funcional: la enfermedad o discapacidad del niño impide la asistencia regular. Sensible: divulga el estado de salud o discapacidad.'
      marriage_pregnancy:
        title:
          en: Child is married or pregnant
          fr: L'enfant est marié(e) ou enceinte
          es: El niño/a está casado/a o embarazada
        description:
          en: 'Protection barrier: early marriage or pregnancy has led to school dropout. Sensitive: discloses marital or reproductive status. Disaggregate by sex.'
          fr: 'Obstacle de protection : le mariage précoce ou la grossesse a conduit à l''abandon scolaire. Sensible : divulgue le statut matrimonial ou reproductif. Désagréger par sexe.'
          es: 'Barrera de protección: el matrimonio precoz o el embarazo ha llevado al abandono escolar. Sensible: divulga el estado civil o reproductivo. Desagregar por sexo.'
      not_interested:
        title:
          en: Child or parents not interested in education
          fr: L'enfant ou les parents ne sont pas intéressés par l'éducation
          es: El niño o los padres no están interesados en la educación
        description:
          en: 'Demand-side barrier: low perceived value of education or motivational barrier.'
          fr: 'Obstacle côté demande : faible valeur perçue de l''éducation ou obstacle motivationnel.'
          es: 'Barrera de demanda: baja percepción del valor de la educación o barrera motivacional.'
      failed_exam_expelled:
        title:
          en: Child failed exams or was expelled
          fr: L'enfant a échoué aux examens ou a été expulsé
          es: El niño reprobó exámenes o fue expulsado
        description:
          en: 'Educational exclusion barrier: academic failure or disciplinary expulsion.'
          fr: 'Obstacle d''exclusion éducative : échec scolaire ou expulsion disciplinaire.'
          es: 'Barrera de exclusión educativa: fracaso académico o expulsión disciplinaria.'
      documents_missing:
        title:
          en: Child lacks required documents (birth certificate, etc.)
          fr: L'enfant manque des documents requis (acte de naissance, etc.)
          es: El niño carece de documentos requeridos (acta de nacimiento, etc.)
        description:
          en: 'Documentation barrier: the child cannot enroll because required civil or identity documents are unavailable.'
          fr: 'Obstacle documentaire : l''enfant ne peut pas s''inscrire parce que les documents civils ou d''identité requis sont indisponibles.'
          es: 'Barrera documental: el niño no puede inscribirse porque los documentos civiles o de identidad requeridos no están disponibles.'
      displaced_location:
        title:
          en: Household is displaced; school situation unclear
          fr: Le ménage est déplacé ; situation scolaire incertaine
          es: El hogar está desplazado; situación escolar incierta
        description:
          en: 'Displacement barrier: the household has been displaced and the child''s schooling situation has not yet been resolved. Sensitive: indicates displacement status.'
          fr: 'Obstacle du déplacement : le ménage a été déplacé et la situation scolaire de l''enfant n''a pas encore été résolue. Sensible : indique un statut de déplacement.'
          es: 'Barrera de desplazamiento: el hogar ha sido desplazado y la situación escolar del niño no se ha resuelto aún. Sensible: indica estado de desplazamiento.'
      other:
        title:
          en: Other reason (specify)
          fr: Autre raison (préciser)
          es: Otra razón (especificar)
        description:
          en: Reason for non-attendance not captured by any other category.
          fr: Raison de non-fréquentation non couverte par les autres catégories.
          es: Razón de no asistencia no contemplada en las demás categorías.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["inee-minimum-standards", "mics-education"], "definition": {"en": "Barriers or reasons explaining why a school-age child is not currently attending school. Consolidated from MICS6 (CB10C school-age variant), UNESCO UIS out-of-school children analysis categories, INEE Standard 8 access barriers taxonomy, and IRC education assessment blocks. Used as the single source of truth for both single-select (main reason) and multi-select (all reasons) properties.", "es": "Barreras o razones que explican por qu\u00e9 un ni\u00f1o en edad escolar no asiste actualmente a la escuela. Consolidado a partir de MICS6 (variante escolar CB10C), categor\u00edas de an\u00e1lisis de ni\u00f1os fuera de la escuela del IEU de la UNESCO, taxonom\u00eda de barreras de acceso de la norma INEE 8 y bloques de evaluaci\u00f3n educativa de IRC. Utilizado como fuente \u00fanica de verdad para las propiedades de selecci\u00f3n \u00fanica (raz\u00f3n principal) y selecci\u00f3n m\u00faltiple (todas las razones).", "fr": "Obstacles ou raisons expliquant pourquoi un enfant en \u00e2ge scolaire ne fr\u00e9quente pas l''\u00e9cole actuellement. Consolid\u00e9s \u00e0 partir du MICS6 (variante scolaire CB10C), des cat\u00e9gories d''analyse des enfants non scolaris\u00e9s de l''ISU de l''UNESCO, de la taxonomie des obstacles d''acc\u00e8s de la norme INEE 8 et des blocs d''\u00e9valuation \u00e9ducative de l''IRC. Utilis\u00e9 comme source unique de v\u00e9rit\u00e9 pour les propri\u00e9t\u00e9s \u00e0 s\u00e9lection unique (raison principale) et \u00e0 s\u00e9lection multiple (toutes les raisons)."}, "id": "reason-for-non-attendance", "label": {"en": "Reason for Non-Attendance", "es": "Raz\u00f3n de no asistencia escolar", "fr": "Raison de non-fr\u00e9quentation scolaire"}, "maturity": "draft", "standard": {"name": "MICS6 school-age non-attendance reason set; merged with UIS out-of-school children categories and INEE Standard 8", "notes": "MICS6 distinguishes early childhood (CB10C) and school-age reasons. This vocabulary covers the school-age set, incorporating emergency-context codes (school_not_safe, school_damaged_destroyed, displaced_location) from INEE and IRC tools.", "uri": "https://mics.unicef.org/tools"}, "values": [{"code": "too_expensive", "definition": {"en": "Financial barrier: school fees, uniforms, learning materials, or transport costs are unaffordable.", "es": "Barrera financiera: los aranceles escolares, uniformes, materiales de aprendizaje o costos de transporte son inasequibles.", "fr": "Obstacle financier : les frais de scolarit\u00e9, les uniformes, le mat\u00e9riel p\u00e9dagogique ou les frais de transport sont inabordables."}, "label": {"en": "School fees or costs are too high", "es": "Los gastos o costos escolares son demasiado altos", "fr": "Les frais ou co\u00fbts scolaires sont trop \u00e9lev\u00e9s"}}, {"code": "too_far", "definition": {"en": "Physical distance or access barrier: the nearest school is too far to attend regularly.", "es": "Barrera de distancia f\u00edsica o acceso: la escuela m\u00e1s cercana est\u00e1 demasiado lejos para asistir regularmente.", "fr": "Obstacle physique de distance ou d''acc\u00e8s : l''\u00e9cole la plus proche est trop loin pour une fr\u00e9quentation r\u00e9guli\u00e8re."}, "label": {"en": "School is too far away", "es": "La escuela est\u00e1 demasiado lejos", "fr": "L''\u00e9cole est trop loin"}}, {"code": "no_school_available", "definition": {"en": "Availability barrier: no school of any kind exists within a reachable distance.", "es": "Barrera de disponibilidad: no existe ninguna escuela de ning\u00fan tipo a una distancia alcanzable.", "fr": "Obstacle de disponibilit\u00e9 : aucune \u00e9cole d''aucun type n''existe \u00e0 une distance accessible."}, "label": {"en": "There is no school available nearby", "es": "No hay escuela disponible cerca", "fr": "Il n''y a pas d''\u00e9cole disponible \u00e0 proximit\u00e9"}}, {"code": "school_not_safe", "definition": {"en": "Safety barrier: violence, conflict, or insecurity makes attendance dangerous. Primary emergency-context indicator per INEE. Sensitive: may indicate exposure to conflict or displacement.", "es": "Barrera de seguridad: la violencia, el conflicto o la inseguridad hace que asistir sea peligroso. Indicador principal de contexto de emergencia seg\u00fan INEE. Sensible: puede indicar exposici\u00f3n a conflicto o desplazamiento.", "fr": "Obstacle s\u00e9curitaire : la violence, le conflit ou l''ins\u00e9curit\u00e9 rend la fr\u00e9quentation dangereuse. Indicateur principal de contexte d''urgence selon l''INEE. Sensible : peut indiquer une exposition \u00e0 un conflit ou un d\u00e9placement."}, "label": {"en": "School is not safe (insecurity, conflict)", "es": "La escuela no es segura (inseguridad, conflicto)", "fr": "L''\u00e9cole n''est pas s\u00fbre (ins\u00e9curit\u00e9, conflit)"}}, {"code": "school_damaged_destroyed", "definition": {"en": "Infrastructure barrier: the school building has been damaged or destroyed by a disaster or conflict.", "es": "Barrera de infraestructura: el edificio escolar ha sido da\u00f1ado o destruido por un desastre o conflicto.", "fr": "Obstacle infrastructurel : le b\u00e2timent scolaire a \u00e9t\u00e9 endommag\u00e9 ou d\u00e9truit par une catastrophe ou un conflit."}, "label": {"en": "School building damaged or destroyed", "es": "El edificio escolar est\u00e1 da\u00f1ado o destruido", "fr": "Le b\u00e2timent scolaire est endommag\u00e9 ou d\u00e9truit"}}, {"code": "child_needed_at_home", "definition": {"en": "Demand-side barrier: child labour in the domestic sphere or caregiving responsibilities prevent attendance.", "es": "Barrera de demanda: el trabajo dom\u00e9stico o las responsabilidades de cuidado impiden la asistencia.", "fr": "Obstacle c\u00f4t\u00e9 demande : le travail domestique ou les responsabilit\u00e9s de prise en charge emp\u00eachent la fr\u00e9quentation."}, "label": {"en": "Child is needed at home for domestic work", "es": "El ni\u00f1o es necesario en el hogar para el trabajo dom\u00e9stico", "fr": "L''enfant est n\u00e9cessaire \u00e0 la maison pour les travaux domestiques"}}, {"code": "child_labour_outside", "definition": {"en": "Economic child labour barrier: the child is engaged in paid or productive work outside the household. Sensitive: indicates child labour situation.", "es": "Barrera de trabajo infantil econ\u00f3mico: el ni\u00f1o est\u00e1 empleado en trabajo remunerado o productivo fuera del hogar. Sensible: indica situaci\u00f3n de trabajo infantil.", "fr": "Obstacle du travail des enfants \u00e9conomique : l''enfant est engag\u00e9 dans un travail r\u00e9mun\u00e9r\u00e9 ou productif en dehors du m\u00e9nage. Sensible : indique une situation de travail des enfants."}, "label": {"en": "Child is working outside the home", "es": "El ni\u00f1o trabaja fuera del hogar", "fr": "L''enfant travaille en dehors du foyer"}}, {"code": "illness_disability", "definition": {"en": "Health or functional barrier: the child''s illness or disability prevents regular attendance. Sensitive: discloses health or disability status.", "es": "Barrera de salud o funcional: la enfermedad o discapacidad del ni\u00f1o impide la asistencia regular. Sensible: divulga el estado de salud o discapacidad.", "fr": "Obstacle sanitaire ou fonctionnel : la maladie ou le handicap de l''enfant emp\u00eache une fr\u00e9quentation r\u00e9guli\u00e8re. Sensible : divulgue l''\u00e9tat de sant\u00e9 ou de handicap."}, "label": {"en": "Child has illness or disability preventing attendance", "es": "El ni\u00f1o tiene una enfermedad o discapacidad que impide la asistencia", "fr": "L''enfant a une maladie ou un handicap emp\u00eachant la fr\u00e9quentation"}}, {"code": "marriage_pregnancy", "definition": {"en": "Protection barrier: early marriage or pregnancy has led to school dropout. Sensitive: discloses marital or reproductive status. Disaggregate by sex.", "es": "Barrera de protecci\u00f3n: el matrimonio precoz o el embarazo ha llevado al abandono escolar. Sensible: divulga el estado civil o reproductivo. Desagregar por sexo.", "fr": "Obstacle de protection : le mariage pr\u00e9coce ou la grossesse a conduit \u00e0 l''abandon scolaire. Sensible : divulgue le statut matrimonial ou reproductif. D\u00e9sagr\u00e9ger par sexe."}, "label": {"en": "Child is married or pregnant", "es": "El ni\u00f1o/a est\u00e1 casado/a o embarazada", "fr": "L''enfant est mari\u00e9(e) ou enceinte"}}, {"code": "not_interested", "definition": {"en": "Demand-side barrier: low perceived value of education or motivational barrier.", "es": "Barrera de demanda: baja percepci\u00f3n del valor de la educaci\u00f3n o barrera motivacional.", "fr": "Obstacle c\u00f4t\u00e9 demande : faible valeur per\u00e7ue de l''\u00e9ducation ou obstacle motivationnel."}, "label": {"en": "Child or parents not interested in education", "es": "El ni\u00f1o o los padres no est\u00e1n interesados en la educaci\u00f3n", "fr": "L''enfant ou les parents ne sont pas int\u00e9ress\u00e9s par l''\u00e9ducation"}}, {"code": "failed_exam_expelled", "definition": {"en": "Educational exclusion barrier: academic failure or disciplinary expulsion.", "es": "Barrera de exclusi\u00f3n educativa: fracaso acad\u00e9mico o expulsi\u00f3n disciplinaria.", "fr": "Obstacle d''exclusion \u00e9ducative : \u00e9chec scolaire ou expulsion disciplinaire."}, "label": {"en": "Child failed exams or was expelled", "es": "El ni\u00f1o reprob\u00f3 ex\u00e1menes o fue expulsado", "fr": "L''enfant a \u00e9chou\u00e9 aux examens ou a \u00e9t\u00e9 expuls\u00e9"}}, {"code": "documents_missing", "definition": {"en": "Documentation barrier: the child cannot enroll because required civil or identity documents are unavailable.", "es": "Barrera documental: el ni\u00f1o no puede inscribirse porque los documentos civiles o de identidad requeridos no est\u00e1n disponibles.", "fr": "Obstacle documentaire : l''enfant ne peut pas s''inscrire
        parce que les documents civils ou d''identit\u00e9 requis sont indisponibles."}, "label": {"en": "Child lacks required documents (birth certificate, etc.)", "es": "El ni\u00f1o carece de documentos requeridos (acta de nacimiento, etc.)", "fr": "L''enfant manque des documents requis (acte de naissance, etc.)"}}, {"code": "displaced_location", "definition": {"en": "Displacement barrier: the household has been displaced and the child''s schooling situation has not yet been resolved. Sensitive: indicates displacement status.", "es": "Barrera de desplazamiento: el hogar ha sido desplazado y la situaci\u00f3n escolar del ni\u00f1o no se ha resuelto a\u00fan. Sensible: indica estado de desplazamiento.", "fr": "Obstacle du d\u00e9placement : le m\u00e9nage a \u00e9t\u00e9 d\u00e9plac\u00e9 et la situation scolaire de l''enfant n''a pas encore \u00e9t\u00e9 r\u00e9solue. Sensible : indique un statut de d\u00e9placement."}, "label": {"en": "Household is displaced; school situation unclear", "es": "El hogar est\u00e1 desplazado; situaci\u00f3n escolar incierta", "fr": "Le m\u00e9nage est d\u00e9plac\u00e9 ; situation scolaire incertaine"}}, {"code": "other", "definition": {"en": "Reason for non-attendance not captured by any other category.", "es": "Raz\u00f3n de no asistencia no contemplada en las dem\u00e1s categor\u00edas.", "fr": "Raison de non-fr\u00e9quentation non couverte par les autres cat\u00e9gories."}, "label": {"en": "Other reason (specify)", "es": "Otra raz\u00f3n (especificar)", "fr": "Autre raison (pr\u00e9ciser)"}}]}'
      bibliography_refs: inee-minimum-standards,mics-education
  ReconstructionIntent:
    title:
      en: Reconstruction Intent
      fr: Intention de reconstruction
      es: Intención de reconstrucción
    description:
      en: 'The household''s stated intent regarding the damaged dwelling: whether they plan to repair, rebuild in place, relocate, or are unable to act without external support. Used by recovery programming to target repair grants, reconstruction grants, and relocation assistance.'
      fr: 'L''intention déclarée du ménage concernant le logement endommagé : réparation prévue, reconstruction sur place, relocalisation ou incapacité à agir sans soutien extérieur. Utilisé par la programmation de relèvement pour cibler les subventions de réparation, les subventions de reconstruction et l''assistance à la relocalisation.'
      es: 'La intención declarada del hogar respecto a la vivienda dañada: reparación prevista, reconstrucción en el mismo sitio, relocalización, o incapacidad de actuar sin apoyo externo. Usado por la programación de recuperación para focalizar subvenciones de reparación, subvenciones de reconstrucción y asistencia de relocalización.'
    enum_uri: aidops:ReconstructionIntent
    permissible_values:
      repair_in_place:
        title:
          en: Repair in place
          fr: Réparer sur place
          es: Reparar en el mismo sitio
        description:
          en: Household intends to repair the damaged dwelling at its current location.
          fr: Le ménage compte réparer le logement endommagé à son emplacement actuel.
          es: El hogar tiene intención de reparar la vivienda dañada en su ubicación actual.
      rebuild_in_place:
        title:
          en: Rebuild in place
          fr: Reconstruire sur place
          es: Reconstruir en el mismo sitio
        description:
          en: Household intends to demolish the damaged dwelling and rebuild a new dwelling at the same location.
          fr: Le ménage compte démolir le logement endommagé et reconstruire un nouveau logement au même emplacement.
          es: El hogar tiene intención de demoler la vivienda dañada y reconstruir una nueva vivienda en el mismo lugar.
      relocate:
        title:
          en: Relocate to a different site
          fr: Se relocaliser sur un autre site
          es: Relocalizarse a otro sitio
        description:
          en: Household intends to move to a different location rather than repair or rebuild at the damaged site (for example, because the site is flood-prone or no longer accessible).
          fr: Le ménage compte s'installer ailleurs plutôt que de réparer ou reconstruire sur le site endommagé (par exemple, parce que le site est inondable ou n'est plus accessible).
          es: El hogar tiene intención de mudarse a otra ubicación en lugar de reparar o reconstruir en el sitio dañado (por ejemplo, porque el sitio es inundable o ya no es accesible).
      cannot_act_without_support:
        title:
          en: Cannot act without external support
          fr: Ne peut agir sans soutien extérieur
          es: No puede actuar sin apoyo externo
        description:
          en: Household has no plan to repair, rebuild, or relocate because it lacks the resources to do so without external assistance.
          fr: Le ménage n'a aucun plan de réparation, de reconstruction ou de relocalisation faute de ressources pour agir sans aide extérieure.
          es: El hogar no tiene plan de reparar, reconstruir o relocalizarse porque carece de recursos para hacerlo sin asistencia externa.
      undecided:
        title:
          en: Undecided
          fr: Indécis
          es: Indeciso
        description:
          en: Household has not yet decided how to respond to the damage.
          fr: Le ménage n'a pas encore décidé de sa réponse aux dommages.
          es: El hogar aún no ha decidido cómo responder a los daños.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "The household''s stated intent regarding the damaged dwelling: whether they plan to repair, rebuild in place, relocate, or are unable to act without external support. Used by recovery programming to target repair grants, reconstruction grants, and relocation assistance.", "es": "La intenci\u00f3n declarada del hogar respecto a la vivienda da\u00f1ada: reparaci\u00f3n prevista, reconstrucci\u00f3n en el mismo sitio, relocalizaci\u00f3n, o incapacidad de actuar sin apoyo externo. Usado por la programaci\u00f3n de recuperaci\u00f3n para focalizar subvenciones de reparaci\u00f3n, subvenciones de reconstrucci\u00f3n y asistencia de relocalizaci\u00f3n.", "fr": "L''intention d\u00e9clar\u00e9e du m\u00e9nage concernant le logement endommag\u00e9 : r\u00e9paration pr\u00e9vue, reconstruction sur place, relocalisation ou incapacit\u00e9 \u00e0 agir sans soutien ext\u00e9rieur. Utilis\u00e9 par la programmation de rel\u00e8vement pour cibler les subventions de r\u00e9paration, les subventions de reconstruction et l''assistance \u00e0 la relocalisation."}, "id": "reconstruction-intent", "label": {"en": "Reconstruction Intent", "es": "Intenci\u00f3n de reconstrucci\u00f3n", "fr": "Intention de reconstruction"}, "maturity": "draft", "values": [{"code": "repair_in_place", "definition": {"en": "Household intends to repair the damaged dwelling at its current location.", "es": "El hogar tiene intenci\u00f3n de reparar la vivienda da\u00f1ada en su ubicaci\u00f3n actual.", "fr": "Le m\u00e9nage compte r\u00e9parer le logement endommag\u00e9 \u00e0 son emplacement actuel."}, "label": {"en": "Repair in place", "es": "Reparar en el mismo sitio", "fr": "R\u00e9parer sur place"}}, {"code": "rebuild_in_place", "definition": {"en": "Household intends to demolish the damaged dwelling and rebuild a new dwelling at the same location.", "es": "El hogar tiene intenci\u00f3n de demoler la vivienda da\u00f1ada y reconstruir una nueva vivienda en el mismo lugar.", "fr": "Le m\u00e9nage compte d\u00e9molir le logement endommag\u00e9 et reconstruire un nouveau logement au m\u00eame emplacement."}, "label": {"en": "Rebuild in place", "es": "Reconstruir en el mismo sitio", "fr": "Reconstruire sur place"}}, {"code": "relocate", "definition": {"en": "Household intends to move to a different location rather than repair or rebuild at the damaged site (for example, because the site is flood-prone or no longer accessible).", "es": "El hogar tiene intenci\u00f3n de mudarse a otra ubicaci\u00f3n en lugar de reparar o reconstruir en el sitio da\u00f1ado (por ejemplo, porque el sitio es inundable o ya no es accesible).", "fr": "Le m\u00e9nage compte s''installer ailleurs plut\u00f4t que de r\u00e9parer ou reconstruire sur le site endommag\u00e9 (par exemple, parce que le site est inondable ou n''est plus accessible)."}, "label": {"en": "Relocate to a different site", "es": "Relocalizarse a otro sitio", "fr": "Se relocaliser sur un autre site"}}, {"code": "cannot_act_without_support", "definition": {"en": "Household has no plan to repair, rebuild, or relocate because it lacks the resources to do so without external assistance.", "es": "El hogar no tiene plan de reparar, reconstruir o relocalizarse porque carece de recursos para hacerlo sin asistencia externa.", "fr": "Le m\u00e9nage n''a aucun plan de r\u00e9paration, de reconstruction ou de relocalisation faute de ressources pour agir sans aide ext\u00e9rieure."}, "label": {"en": "Cannot act without external support", "es": "No puede actuar sin apoyo externo", "fr": "Ne peut agir sans soutien ext\u00e9rieur"}}, {"code": "undecided", "definition": {"en": "Household has not yet decided how to respond to the damage.", "es": "El hogar a\u00fan no ha decidido c\u00f3mo responder a los da\u00f1os.", "fr": "Le m\u00e9nage n''a pas encore d\u00e9cid\u00e9 de sa r\u00e9ponse aux dommages."}, "label": {"en": "Undecided", "es": "Indeciso", "fr": "Ind\u00e9cis"}}]}'
  ReferralTrust3:
    title:
      en: Referral mechanism trust (3-level)
      fr: Confiance dans le mécanisme de référence (3 niveaux)
      es: Confianza en el mecanismo de derivación (3 niveles)
    description:
      en: Five-code trust scale for protection referral mechanisms, distinguishing trust levels and the specific case of fear of reprisal. The fear_of_reprisal code indicates households in situations of coercive control and should be aggregated before reporting. Based on OHCHR Rule-of-Law Indicators (2011) legitimacy dimension; REACH Syria (2022) rule-of-law module.
      fr: Échelle de confiance à cinq codes pour les mécanismes d'orientation en matière de protection, distinguant les niveaux de confiance et le cas spécifique de la crainte de représailles. Le code fear_of_reprisal indique des ménages en situation de contrôle coercitif et doit être agrégé avant d'être communiqué. Fondé sur la dimension légitimité des Indicateurs d'état de droit HCDH (2011) ; module état de droit REACH Syrie (2022).
      es: Escala de confianza de cinco códigos para los mecanismos de derivación de protección, distinguiendo niveles de confianza y el caso específico del miedo a represalias. El código fear_of_reprisal indica hogares en situaciones de control coercitivo y debe agregarse antes de reportar. Basado en la dimensión de legitimidad de los Indicadores del Estado de Derecho del ACNUDH (2011); módulo de estado de derecho de REACH Siria (2022).
    enum_uri: aidops:ReferralTrust3
    permissible_values:
      trust_it_would_help:
        title:
          en: Trust it would help
          fr: Confiance que cela aiderait
          es: Confía en que ayudaría
        description:
          en: Household trusts the mechanism would be effective in addressing the protection concern.
          fr: Le ménage fait confiance au mécanisme pour être efficace dans le traitement du problème de protection.
          es: El hogar confía en que el mecanismo sería efectivo para abordar el problema de protección.
      some_trust_might_help:
        title:
          en: Some trust — might help
          fr: Un peu de confiance — pourrait aider
          es: Algo de confianza — podría ayudar
        description:
          en: Household is uncertain but believes the mechanism might help in some circumstances.
          fr: Le ménage est incertain mais croit que le mécanisme pourrait aider dans certaines circonstances.
          es: El hogar es incierto pero cree que el mecanismo podría ayudar en algunas circunstancias.
      no_trust:
        title:
          en: No trust in the mechanism
          fr: Aucune confiance dans le mécanisme
          es: Ninguna confianza en el mecanismo
        description:
          en: Household does not trust the mechanism to help or to be accessible.
          fr: Le ménage ne fait pas confiance au mécanisme pour aider ou être accessible.
          es: El hogar no confía en que el mecanismo ayude o sea accesible.
      fear_of_reprisal:
        title:
          en: Would not use it — fear of reprisal
          fr: Ne l'utiliserait pas par crainte de représailles
          es: No lo usaría por miedo a represalias
        description:
          en: Household knows of the mechanism but fears using it because of risk of retaliation by an armed actor, authority, or community member. Indicates coercive control environment; aggregate before reporting.
          fr: Le ménage connaît le mécanisme mais craint de l'utiliser en raison du risque de représailles de la part d'un acteur armé, d'une autorité ou d'un membre de la communauté. Indique un environnement de contrôle coercitif ; agréger avant de communiquer.
          es: El hogar conoce el mecanismo pero teme usarlo por riesgo de represalias de un actor armado, autoridad o miembro de la comunidad. Indica entorno de control coercitivo; agregar antes de reportar.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess the trustworthiness of the mechanism.
          fr: Le répondant ne peut pas évaluer la fiabilité du mécanisme.
          es: El encuestado no puede evaluar la fiabilidad del mecanismo.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "ohchr-rule-of-law-indicators-2011", "reach-protection-monitoring-2022"], "definition": {"en": "Five-code trust scale for protection referral mechanisms, distinguishing trust levels and the specific case of fear of reprisal. The fear_of_reprisal code indicates households in situations of coercive control and should be aggregated before reporting. Based on OHCHR Rule-of-Law Indicators (2011) legitimacy dimension; REACH Syria (2022) rule-of-law module.", "es": "Escala de confianza de cinco c\u00f3digos para los mecanismos de derivaci\u00f3n de protecci\u00f3n, distinguiendo niveles de confianza y el caso espec\u00edfico del miedo a represalias. El c\u00f3digo fear_of_reprisal indica hogares en situaciones de control coercitivo y debe agregarse antes de reportar. Basado en la dimensi\u00f3n de legitimidad de los Indicadores del Estado de Derecho del ACNUDH (2011); m\u00f3dulo de estado de derecho de REACH Siria (2022).", "fr": "\u00c9chelle de confiance \u00e0 cinq codes pour les m\u00e9canismes d''orientation en mati\u00e8re de protection, distinguant les niveaux de confiance et le cas sp\u00e9cifique de la crainte de repr\u00e9sailles. Le code fear_of_reprisal indique des m\u00e9nages en situation de contr\u00f4le coercitif et doit \u00eatre agr\u00e9g\u00e9 avant d''\u00eatre communiqu\u00e9. Fond\u00e9 sur la dimension l\u00e9gitimit\u00e9 des Indicateurs d''\u00e9tat de droit HCDH (2011) ; module \u00e9tat de droit REACH Syrie (2022)."}, "id": "referral-trust-3", "label": {"en": "Referral mechanism trust (3-level)", "es": "Confianza en el mecanismo de derivaci\u00f3n (3 niveles)", "fr": "Confiance dans le m\u00e9canisme de r\u00e9f\u00e9rence (3 niveaux)"}, "maturity": "draft", "values": [{"code": "trust_it_would_help", "definition": {"en": "Household trusts the mechanism would be effective in addressing the protection concern.", "es": "El hogar conf\u00eda en que el mecanismo ser\u00eda efectivo para abordar el problema de protecci\u00f3n.", "fr": "Le m\u00e9nage fait confiance au m\u00e9canisme pour \u00eatre efficace dans le traitement du probl\u00e8me de protection."}, "label": {"en": "Trust it would help", "es": "Conf\u00eda en que ayudar\u00eda", "fr": "Confiance que cela aiderait"}}, {"code": "some_trust_might_help", "definition": {"en": "Household is uncertain but believes the mechanism might help in some circumstances.", "es": "El hogar es incierto pero cree que el mecanismo podr\u00eda ayudar en algunas circunstancias.", "fr": "Le m\u00e9nage est incertain mais croit que le m\u00e9canisme pourrait aider dans certaines circonstances."}, "label": {"en": "Some trust \u2014 might help", "es": "Algo de confianza \u2014 podr\u00eda ayudar", "fr": "Un peu de confiance \u2014 pourrait aider"}}, {"code": "no_trust", "definition": {"en": "Household does not trust the mechanism to help or to be accessible.", "es": "El hogar no conf\u00eda en que el mecanismo ayude o sea accesible.", "fr": "Le m\u00e9nage ne fait pas confiance au m\u00e9canisme pour aider ou \u00eatre accessible."}, "label": {"en": "No trust in the mechanism", "es": "Ninguna confianza en el mecanismo", "fr": "Aucune confiance dans le m\u00e9canisme"}}, {"code": "fear_of_reprisal", "definition": {"en": "Household knows of the mechanism but fears using it because of risk of retaliation by an armed actor, authority, or community member. Indicates coercive control environment; aggregate before reporting.", "es": "El hogar conoce el mecanismo pero teme usarlo por riesgo de represalias de un actor armado, autoridad o miembro de la comunidad. Indica entorno de control coercitivo; agregar antes de reportar.", "fr": "Le m\u00e9nage conna\u00eet le m\u00e9canisme mais craint de l''utiliser en raison du risque de repr\u00e9sailles de la part d''un acteur arm\u00e9, d''une autorit\u00e9 ou d''un membre de la communaut\u00e9. Indique un environnement de contr\u00f4le coercitif ; agr\u00e9ger avant de communiquer."}, "label": {"en": "Would not use it \u2014 fear of reprisal", "es": "No lo usar\u00eda por miedo a represalias", "fr": "Ne l''utiliserait pas par crainte de repr\u00e9sailles"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess the trustworthiness of the mechanism.", "es": "El encuestado no puede evaluar la fiabilidad del mecanismo.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la fiabilit\u00e9 du m\u00e9canisme."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: gpc-paf-2021,ohchr-rule-of-law-indicators-2011,reach-protection-monitoring-2022
  ReturnBarrier:
    title:
      en: Return Barrier
      fr: Obstacle au retour
      es: Barrera al retorno
    description:
      en: An obstacle preventing a household from returning to its area of origin or achieving a durable solution. Corresponds to IASC Framework durable solutions criteria sub-domains. Multiple barriers may apply; collect via multi-select.
      fr: Un obstacle empêchant un ménage de retourner dans sa zone d'origine ou d'atteindre une solution durable. Correspond aux sous-domaines des critères de solutions durables du Cadre de l'IASC. Plusieurs obstacles peuvent s'appliquer ; collecter en sélection multiple.
      es: Un obstáculo que impide a un hogar retornar a su área de origen o alcanzar una solución duradera. Corresponde a los subdominios de los criterios de soluciones duraderas del Marco del IASC. Pueden aplicarse múltiples barreras; recopilar mediante selección múltiple.
    enum_uri: aidops:ReturnBarrier
    permissible_values:
      security_concerns:
        title:
          en: Security concerns
          fr: Problèmes de sécurité
          es: Preocupaciones de seguridad
        description:
          en: Ongoing armed conflict, violence, or threats prevent safe return. Corresponds to IASC criterion 1 (long-term safety and security).
          fr: Le conflit armé, la violence ou les menaces en cours empêchent un retour en toute sécurité. Correspond au critère 1 de l'IASC (sécurité à long terme).
          es: El conflicto armado, la violencia o las amenazas en curso impiden el retorno seguro. Corresponde al criterio 1 del IASC (seguridad a largo plazo).
      destroyed_damaged_home:
        title:
          en: Destroyed or damaged home
          fr: Logement détruit ou endommagé
          es: Vivienda destruida o dañada
        description:
          en: Original dwelling is destroyed or severely damaged and cannot be re-occupied. Corresponds to IASC criterion 4 (restitution or compensation of housing, land, and property).
          fr: Le logement d'origine est détruit ou gravement endommagé et ne peut pas être réoccupé. Correspond au critère 4 de l'IASC (restitution ou compensation du logement, des terres et des biens).
          es: La vivienda original está destruida o severamente dañada y no puede ser reocupada. Corresponde al criterio 4 del IASC (restitución o compensación de vivienda, tierra y propiedad).
      no_livelihood_opportunities:
        title:
          en: No livelihood opportunities
          fr: Absence de moyens de subsistance
          es: Sin oportunidades de medios de vida
        description:
          en: Lack of employment, income sources, or agricultural land at origin prevents sustainable return. Corresponds to IASC criterion 3 (access to livelihoods).
          fr: L'absence d'emploi, de sources de revenus ou de terres agricoles à l'origine empêche un retour durable. Correspond au critère 3 de l'IASC (accès aux moyens de subsistance).
          es: La falta de empleo, fuentes de ingresos o tierras agrícolas en el lugar de origen impide el retorno sostenible. Corresponde al criterio 3 del IASC (acceso a medios de vida).
      discrimination_ethnicity_religion:
        title:
          en: Discrimination or persecution
          fr: Discrimination ou persécution
          es: Discriminación o persecución
        description:
          en: 'Risk of discrimination, persecution, or targeted violence based on ethnicity, religion, or political affiliation in the area of origin prevents return. Note: properties referencing this code carry sensitivity: sensitive.'
          fr: Risque de discrimination, de persécution ou de violence ciblée fondée sur l'ethnicité, la religion ou l'appartenance politique dans la zone d'origine empêche le retour.
          es: Riesgo de discriminación, persecución o violencia dirigida por etnia, religión o afiliación política en el área de origen impide el retorno.
      hlp_dispute:
        title:
          en: Housing, land, or property dispute
          fr: Litige relatif au logement, aux terres ou aux biens
          es: Disputa de vivienda, tierra o propiedad
        description:
          en: Land or property is occupied by others, title documentation is lost, or a legal dispute over ownership prevents return. Corresponds to IASC criterion 4.
          fr: Les terres ou les biens sont occupés par d'autres, les documents de titre sont perdus, ou un litige juridique sur la propriété empêche le retour. Correspond au critère 4 de l'IASC.
          es: La tierra o propiedad está ocupada por otros, la documentación de titularidad está perdida, o una disputa legal sobre la propiedad impide el retorno. Corresponde al criterio 4 del IASC.
      lack_of_services:
        title:
          en: Inadequate access to services
          fr: Accès insuffisant aux services
          es: Acceso inadecuado a servicios
        description:
          en: Basic services such as health, education, and water are not available or functional at the area of origin. Corresponds to IASC criterion 2 (adequate standard of living).
          fr: Les services de base tels que la santé, l'éducation et l'eau ne sont pas disponibles ou fonctionnels dans la zone d'origine. Correspond au critère 2 de l'IASC (niveau de vie adéquat).
          es: Los servicios básicos como salud, educación y agua no están disponibles o funcionan en el área de origen. Corresponde al criterio 2 del IASC (nivel de vida adecuado).
      financial_means:
        title:
          en: Lack of financial means
          fr: Manque de moyens financiers
          es: Falta de medios económicos
        description:
          en: Household lacks the money to transport itself and its assets back to the area of origin.
          fr: Le ménage ne dispose pas de l'argent nécessaire pour se transporter et transporter ses biens vers la zone d'origine.
          es: El hogar carece del dinero para transportarse a sí mismo y sus bienes de regreso al área de origen.
      family_separation:
        title:
          en: Family members separated
          fr: Membres de la famille séparés
          es: Miembros de familia separados
        description:
          en: Household members are separated; return would further separate the family or cannot be coordinated without family reunification first. Corresponds to IASC criterion 6 (voluntary family reunification).
          fr: Les membres du ménage sont séparés ; le retour séparerait davantage la famille ou ne peut être coordonné sans réunification familiale préalable. Correspond au critère 6 de l'IASC (réunification familiale volontaire).
          es: Los miembros del hogar están separados; el retorno separaría aún más a la familia o no puede coordinarse sin reunificación familiar primero. Corresponde al criterio 6 del IASC (reunificación familiar voluntaria).
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Barrier to return not covered by other categories in this vocabulary.
          fr: Obstacle au retour non couvert par les autres catégories de ce vocabulaire.
          es: Barrera al retorno no cubierta por otras categorías de este vocabulario.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-durable-solutions-2010", "iom-dtm-methodology-2021"], "definition": {"en": "An obstacle preventing a household from returning to its area of origin or achieving a durable solution. Corresponds to IASC Framework durable solutions criteria sub-domains. Multiple barriers may apply; collect via multi-select.", "es": "Un obst\u00e1culo que impide a un hogar retornar a su \u00e1rea de origen o alcanzar una soluci\u00f3n duradera. Corresponde a los subdominios de los criterios de soluciones duraderas del Marco del IASC. Pueden aplicarse m\u00faltiples barreras; recopilar mediante selecci\u00f3n m\u00faltiple.", "fr": "Un obstacle emp\u00eachant un m\u00e9nage de retourner dans sa zone d''origine ou d''atteindre une solution durable. Correspond aux sous-domaines des crit\u00e8res de solutions durables du Cadre de l''IASC. Plusieurs obstacles peuvent s''appliquer ; collecter en s\u00e9lection multiple."}, "id": "return-barrier", "label": {"en": "Return Barrier", "es": "Barrera al retorno", "fr": "Obstacle au retour"}, "maturity": "draft", "standard": {"name": "IASC Framework on Durable Solutions for Internally Displaced Persons; Interagency Durable Solutions Indicator Library (JIPS/UNHCR/IOM/IDMC)", "notes": "Percentage citations in definitions are approximate figures from IOM DTM Iraq household surveys documented in country reports; they are illustrative, not normative thresholds.", "uri": "https://interagencystandingcommittee.org/other/iasc-framework-durable-solutions-internally-displaced-persons"}, "values": [{"code": "security_concerns", "definition": {"en": "Ongoing armed conflict, violence, or threats prevent safe return. Corresponds to IASC criterion 1 (long-term safety and security).", "es": "El conflicto armado, la violencia o las amenazas en curso impiden el retorno seguro. Corresponde al criterio 1 del IASC (seguridad a largo plazo).", "fr": "Le conflit arm\u00e9, la violence ou les menaces en cours emp\u00eachent un retour en toute s\u00e9curit\u00e9. Correspond au crit\u00e8re 1 de l''IASC (s\u00e9curit\u00e9 \u00e0 long terme)."}, "label": {"en": "Security concerns", "es": "Preocupaciones de seguridad", "fr": "Probl\u00e8mes de s\u00e9curit\u00e9"}}, {"code": "destroyed_damaged_home", "definition": {"en": "Original dwelling is destroyed or severely damaged and cannot be re-occupied. Corresponds to IASC criterion 4 (restitution or compensation of housing, land, and property).", "es": "La vivienda original est\u00e1 destruida o severamente da\u00f1ada y no puede ser reocupada. Corresponde al criterio 4 del IASC (restituci\u00f3n o compensaci\u00f3n de vivienda, tierra y propiedad).", "fr": "Le logement d''origine est d\u00e9truit ou gravement endommag\u00e9 et ne peut pas \u00eatre r\u00e9occup\u00e9. Correspond au crit\u00e8re 4 de l''IASC (restitution ou compensation du logement, des terres et des biens)."}, "label": {"en": "Destroyed or damaged home", "es": "Vivienda destruida o da\u00f1ada", "fr": "Logement d\u00e9truit ou endommag\u00e9"}}, {"code": "no_livelihood_opportunities", "definition": {"en": "Lack of employment, income sources, or agricultural land at origin prevents sustainable return. Corresponds to IASC criterion 3 (access to livelihoods).", "es": "La falta de empleo, fuentes de ingresos o tierras agr\u00edcolas en el lugar de origen impide el retorno sostenible. Corresponde al criterio 3 del IASC (acceso a medios de vida).", "fr": "L''absence d''emploi, de sources de revenus ou de terres agricoles \u00e0 l''origine emp\u00eache un retour durable. Correspond au crit\u00e8re 3 de l''IASC (acc\u00e8s aux moyens de subsistance)."}, "label": {"en": "No livelihood opportunities", "es": "Sin oportunidades de medios de vida", "fr": "Absence de moyens de subsistance"}}, {"code": "discrimination_ethnicity_religion", "definition": {"en": "Risk of discrimination, persecution, or targeted violence based on ethnicity, religion, or political affiliation in the area of origin prevents return. Note: properties referencing this code carry sensitivity: sensitive.", "es": "Riesgo de discriminaci\u00f3n, persecuci\u00f3n o violencia dirigida por etnia, religi\u00f3n o afiliaci\u00f3n pol\u00edtica en el \u00e1rea de origen impide el retorno.", "fr": "Risque de discrimination, de pers\u00e9cution ou de violence cibl\u00e9e fond\u00e9e sur l''ethnicit\u00e9, la religion ou l''appartenance politique dans la zone d''origine emp\u00eache le retour."}, "label": {"en": "Discrimination or persecution", "es": "Discriminaci\u00f3n o persecuci\u00f3n", "fr": "Discrimination ou pers\u00e9cution"}}, {"code": "hlp_dispute", "definition": {"en": "Land or property is occupied by others, title documentation is lost, or a legal dispute over ownership prevents return. Corresponds to IASC criterion 4.", "es": "La tierra o propiedad est\u00e1 ocupada por otros, la documentaci\u00f3n de titularidad est\u00e1 perdida, o una disputa legal sobre la propiedad impide el retorno. Corresponde al criterio 4 del IASC.", "fr": "Les terres ou les biens sont occup\u00e9s par d''autres, les documents de titre sont perdus, ou un litige juridique sur la propri\u00e9t\u00e9 emp\u00eache le retour. Correspond au crit\u00e8re 4 de l''IASC."}, "label": {"en": "Housing, land, or property dispute", "es": "Disputa de vivienda, tierra o propiedad", "fr": "Litige relatif au logement, aux terres ou aux biens"}}, {"code": "lack_of_services", "definition": {"en": "Basic services such as health, education, and water are not available or functional at the area of origin. Corresponds to IASC criterion 2 (adequate standard of living).", "es": "Los servicios b\u00e1sicos como salud, educaci\u00f3n y agua no est\u00e1n disponibles o funcionan en el \u00e1rea de origen. Corresponde al criterio 2 del IASC (nivel de vida adecuado).", "fr": "Les services de base tels que la sant\u00e9, l''\u00e9ducation et l''eau ne sont pas disponibles ou fonctionnels dans la zone d''origine. Correspond au crit\u00e8re 2 de l''IASC (niveau de vie ad\u00e9quat)."}, "label": {"en": "Inadequate access to services", "es": "Acceso inadecuado a servicios", "fr": "Acc\u00e8s insuffisant aux services"}}, {"code": "financial_means", "definition": {"en": "Household lacks the money to transport itself and its assets back to the area of origin.", "es": "El hogar carece del dinero para transportarse a s\u00ed mismo y sus bienes de regreso al \u00e1rea de origen.", "fr": "Le m\u00e9nage ne dispose pas de l''argent n\u00e9cessaire pour se transporter et transporter ses biens vers la zone d''origine."}, "label": {"en": "Lack of financial means", "es": "Falta de medios econ\u00f3micos", "fr": "Manque de moyens financiers"}}, {"code": "family_separation", "definition": {"en": "Household members are separated; return would further separate the family or cannot be coordinated without family reunification first. Corresponds to IASC criterion 6 (voluntary family reunification).", "es": "Los miembros del hogar est\u00e1n separados; el retorno separar\u00eda a\u00fan m\u00e1s a la familia o no puede coordinarse sin reunificaci\u00f3n familiar primero. Corresponde al criterio 6 del IASC (reunificaci\u00f3n familiar voluntaria).", "fr": "Les membres du m\u00e9nage sont s\u00e9par\u00e9s ; le retour s\u00e9parerait davantage la famille ou ne peut \u00eatre coordonn\u00e9 sans r\u00e9unification familiale pr\u00e9alable. Correspond au crit\u00e8re 6 de l''IASC (r\u00e9unification familiale volontaire)."}, "label": {"en": "Family members separated", "es": "Miembros de familia separados", "fr": "Membres de la famille s\u00e9par\u00e9s"}}, {"code": "other", "definition": {"en": "Barrier to return not covered by other categories in this vocabulary.", "es": "Barrera al retorno no cubierta por otras categor\u00edas de este vocabulario.", "fr": "Obstacle au retour non couvert par les autres cat\u00e9gories de ce vocabulaire."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
