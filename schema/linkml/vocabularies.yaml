 "fr": "Majoritairement op\u00e9rationnel"}}, {"code": "partially_operational", "definition": {"en": "Market is open some days but significantly less than normal. Vendor count substantially reduced (20\u201350% of pre-crisis level). Several critical goods are unavailable or very limited. Notable access constraints affecting part of the population.", "es": "El mercado est\u00e1 abierto algunos d\u00edas pero significativamente menos que lo normal. El n\u00famero de vendedores est\u00e1 sustancialmente reducido (20\u201350 % del nivel previo a la crisis). Varios bienes cr\u00edticos no est\u00e1n disponibles o est\u00e1n muy limitados. Restricciones de acceso notables que afectan a parte de la poblaci\u00f3n.", "fr": "Le march\u00e9 est ouvert certains jours mais de mani\u00e8re significativement inf\u00e9rieure \u00e0 la normale. Le nombre de vendeurs est substantiellement r\u00e9duit (20\u201350 % du niveau d''avant-crise). Plusieurs produits essentiels sont indisponibles ou tr\u00e8s limit\u00e9s. Contraintes d''acc\u00e8s notables affectant une partie de la population."}, "label": {"en": "Partially operational", "es": "Parcialmente operacional", "fr": "Partiellement op\u00e9rationnel"}}, {"code": "minimally_operational", "definition": {"en": "Market barely functioning: open only sporadically or for short hours. Very few vendors remain active (< 20% of pre-crisis count). Most critical goods unavailable. Severe access constraints.", "es": "El mercado apenas funciona: abierto solo espor\u00e1dicamente o por pocas horas. Muy pocos vendedores permanecen activos (< 20 % del conteo previo a la crisis). La mayor\u00eda de los bienes cr\u00edticos no est\u00e1n disponibles. Restricciones de acceso severas.", "fr": "Le march\u00e9 fonctionne \u00e0 peine : ouvert seulement de mani\u00e8re sporadique ou pendant de courtes heures. Tr\u00e8s peu de vendeurs restent actifs (< 20 % du nombre d''avant-crise). La plupart des produits essentiels sont indisponibles. Contraintes d''acc\u00e8s s\u00e9v\u00e8res."}, "label": {"en": "Minimally operational", "es": "M\u00ednimamente operacional", "fr": "Minimalement op\u00e9rationnel"}}, {"code": "closed", "definition": {"en": "Market is not open and no trade is occurring. Applies both to markets shut by authority (administrative closure, conflict, curfew) and to markets that have collapsed entirely.", "es": "El mercado no est\u00e1 abierto y no se produce ning\u00fan comercio. Se aplica tanto a los mercados cerrados por autoridad (cierre administrativo, conflicto, toque de queda) como a los mercados que han colapsado por completo.", "fr": "Le march\u00e9 n''est pas ouvert et aucun commerce n''a lieu. S''applique aussi bien aux march\u00e9s ferm\u00e9s par les autorit\u00e9s (fermeture administrative, conflit, couvre-feu) qu''aux march\u00e9s qui se sont effondr\u00e9s enti\u00e8rement."}, "label": {"en": "Closed", "es": "Cerrado", "fr": "Ferm\u00e9"}}, {"code": "dont_know", "definition": {"en": "Enumerator is unable to reliably assess operational status \u2014 for example, if the market was not accessible on the visit date.", "es": "El enumerador no puede evaluar de manera confiable el estado operacional \u2014 por ejemplo, si el mercado no era accesible en la fecha de visita.", "fr": "L''enqu\u00eateur est incapable d''\u00e9valuer de mani\u00e8re fiable le statut op\u00e9rationnel \u2014 par exemple, si le march\u00e9 n''\u00e9tait pas accessible \u00e0 la date de visite."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
