  ClimateTrendPerception:
    title:
      en: Perceived directional trend in a climate variable
      fr: Tendance directionnelle perçue d'une variable climatique
      es: Tendencia direccional percibida de una variable climática
    description:
      en: 'General perception of directional change in a climate variable over the respondent''s lifetime or the past 10–15 years. Used for climate_trend_perception_rainfall (G1), climate_trend_perception_temperature (G2), and climate_extreme_events_frequency_perception (G4). For temperature items, the directional labels read as hotter (much_increased) and cooler (much_decreased); Form Authors using XLSForm should apply item-level label overrides to display temperature-appropriate phrasing without creating a separate vocabulary. The ''more_variable_unpredictable'' code is a distinct and important category: IPCC AR6 WGII documents that variability increase is often perceived separately from a mean directional trend and is itself a programmatically significant signal. Sources: CARE CVCA historical timeline methodology; IFRC PCVA trend analysis; IPCC AR6 WGII Box 1.1; Oxfam adaptation toolkit community trend ranking; ASSAR community-level climate perception mapping.'
      fr: 'Perception générale du changement directionnel d''une variable climatique sur la durée de vie du répondant ou les 10 à 15 dernières années. Utilisé pour les items de tendance pluviométrique, de tendance des températures et de fréquence des événements extrêmes. Pour les items de température, les libellés directionnels se lisent comme plus chaud (much_increased) et plus frais (much_decreased) ; les auteurs de formulaires XLSForm doivent appliquer des remplacements d''étiquettes au niveau de l''item. Sources : CARE CVCA ; FICR PCVA ; GIEC AR6 WGII Encadré 1.1 ; Oxfam ; ASSAR.'
      es: 'Percepción general del cambio direccional de una variable climática durante la vida del encuestado o los últimos 10 a 15 años. Usado para los ítems de tendencia de lluvia, tendencia de temperatura y frecuencia de eventos extremos. Para ítems de temperatura, los códigos direccionales se leen como más caliente (much_increased) y más frío (much_decreased); los autores de formularios XLSForm deben aplicar reemplazos de etiquetas a nivel de ítem. Fuentes: CARE CVCA; FICR PCVA; IPCC AR6 WGII Recuadro 1.1; Oxfam; ASSAR.'
    enum_uri: aidops:ClimateTrendPerception
    permissible_values:
      much_increased:
        title:
          en: Much increased / much more often
          fr: Beaucoup augmenté / beaucoup plus souvent
          es: Mucho más / mucho más frecuente
        description:
          en: The respondent perceives a large increase in the variable — much more rainfall, much hotter temperatures, or extreme events much more frequent.
          fr: Le répondant perçoit une grande augmentation de la variable — beaucoup plus de précipitations, des températures beaucoup plus élevées ou des événements extrêmes beaucoup plus fréquents.
          es: El encuestado percibe un gran aumento en la variable — mucho más lluvia, temperaturas mucho más calientes o eventos extremos mucho más frecuentes.
      somewhat_increased:
        title:
          en: Somewhat increased / somewhat more often
          fr: Légèrement augmenté / un peu plus souvent
          es: Algo más / algo más frecuente
        description:
          en: The respondent perceives a moderate increase in the variable.
          fr: Le répondant perçoit une augmentation modérée de la variable.
          es: El encuestado percibe un aumento moderado en la variable.
      about_the_same:
        title:
          en: About the same
          fr: À peu près pareil
          es: Aproximadamente igual
        description:
          en: The respondent perceives no meaningful change in the variable over time.
          fr: Le répondant ne perçoit aucun changement significatif de la variable au fil du temps.
          es: El encuestado no percibe ningún cambio significativo en la variable a lo largo del tiempo.
      somewhat_decreased:
        title:
          en: Somewhat decreased / somewhat less often
          fr: Légèrement diminué / un peu moins souvent
          es: Algo menos / algo menos frecuente
        description:
          en: The respondent perceives a moderate decrease in the variable.
          fr: Le répondant perçoit une diminution modérée de la variable.
          es: El encuestado percibe una disminución moderada en la variable.
      much_decreased:
        title:
          en: Much decreased / much less often
          fr: Beaucoup diminué / beaucoup moins souvent
          es: Mucho menos / mucho menos frecuente
        description:
          en: The respondent perceives a large decrease in the variable — much less rainfall, much cooler temperatures, or extreme events much less frequent.
          fr: Le répondant perçoit une grande diminution de la variable — beaucoup moins de précipitations, des températures beaucoup plus fraîches ou des événements extrêmes beaucoup moins fréquents.
          es: El encuestado percibe una gran disminución en la variable — mucho menos lluvia, temperaturas mucho más frías o eventos extremos mucho menos frecuentes.
      more_variable_unpredictable:
        title:
          en: More variable or unpredictable than before
          fr: Plus variable ou imprévisible qu'avant
          es: Más variable o impredecible que antes
        description:
          en: The respondent perceives that the variable has become more erratic or unreliable rather than following a consistent directional trend. IPCC AR6 WGII documents that variability increase is often perceived separately from mean trend and is a distinct programmatically significant signal.
          fr: Le répondant perçoit que la variable est devenue plus erratique ou peu fiable plutôt que de suivre une tendance directionnelle constante. Le GIEC AR6 WGII documente que l'augmentation de la variabilité est souvent perçue séparément de la tendance moyenne et constitue un signal distinct significatif sur le plan programmatique.
          es: El encuestado percibe que la variable se ha vuelto más errática o poco confiable en lugar de seguir una tendencia direccional consistente. El IPCC AR6 WGII documenta que el aumento de variabilidad se percibe frecuentemente por separado de la tendencia media y es una señal programáticamente significativa distinta.
      dont_know:
        title:
          en: Don't know
          fr: Je ne sais pas
          es: No sé
        description:
          en: The respondent cannot judge whether or how the variable has changed.
          fr: Le répondant ne peut pas juger si ou comment la variable a changé.
          es: El encuestado no puede determinar si o cómo ha cambiado la variable.
