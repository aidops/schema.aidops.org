      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "reach-protection-monitoring-2022", "unhcr-protection-monitoring-2016"], "definition": {"en": "Household-perceived accessibility of civil document registration services. Distinguishes practical barriers (distance, cost, office closure, lack of information) from legal or discriminatory barriers (household is legally excluded or discriminated against). The distinction is important for programme response: practical barriers require outreach; legal barriers require advocacy. Based on GPC PAF Domain 2 documentation access indicator; UNHCR Protection Monitoring Framework (2016) civil documentation indicator; REACH Syria (2022) documentation module.", "es": "Accesibilidad percibida por el hogar de los servicios de registro de documentos civiles. Distingue las barreras pr\u00e1cticas (distancia, costo, cierre de oficinas, falta de informaci\u00f3n) de las barreras legales o discriminatorias (hogar legalmente excluido o discriminado). La distinci\u00f3n es importante para la respuesta program\u00e1tica: las barreras pr\u00e1cticas requieren actividades de divulgaci\u00f3n; las barreras legales requieren abogac\u00eda. Basado en el indicador de acceso a la documentaci\u00f3n del GPC PAF Dominio 2; indicador de documentaci\u00f3n civil del Marco de Monitoreo de Protecci\u00f3n del ACNUR (2016); m\u00f3dulo de documentaci\u00f3n de REACH Siria (2022).", "fr": "Accessibilit\u00e9 per\u00e7ue par le m\u00e9nage des services d''enregistrement des documents civils. Distingue les obstacles pratiques (distance, co\u00fbt, fermeture des bureaux, manque d''information) des obstacles juridiques ou discriminatoires (m\u00e9nage l\u00e9galement exclu ou discrimin\u00e9). La distinction est importante pour la r\u00e9ponse programmatique : les obstacles pratiques n\u00e9cessitent des activit\u00e9s de sensibilisation ; les obstacles juridiques n\u00e9cessitent du plaidoyer. Fond\u00e9 sur l''indicateur d''acc\u00e8s \u00e0 la documentation du GPC PAF Domaine 2 ; Cadre de suivi de la protection UNHCR (2016) indicateur de documentation civile ; module de documentation REACH Syrie (2022)."}, "id": "civil-registry-access", "label": {"en": "Civil registry access", "es": "Acceso al registro civil", "fr": "Acc\u00e8s \u00e0 l''\u00e9tat civil"}, "maturity": "draft", "values": [{"code": "yes_easily", "definition": {"en": "Household can access civil documentation services without significant difficulty.", "es": "El hogar puede acceder a los servicios de documentaci\u00f3n civil sin dificultad significativa.", "fr": "Le m\u00e9nage peut acc\u00e9der aux services de documentation civile sans difficult\u00e9 significative."}, "label": {"en": "Yes, easily accessible", "es": "S\u00ed, f\u00e1cilmente accesible", "fr": "Oui, facilement accessible"}}, {"code": "yes_with_difficulty", "definition": {"en": "Accessible but requires overcoming significant practical barriers (distance, cost, bureaucratic complexity).", "es": "Accesible pero requiere superar barreras pr\u00e1cticas significativas (distancia, costo, complejidad burocr\u00e1tica).", "fr": "Accessible mais n\u00e9cessite de surmonter des obstacles pratiques importants (distance, co\u00fbt, complexit\u00e9 bureaucratique)."}, "label": {"en": "Yes, but with difficulty", "es": "S\u00ed, pero con dificultad", "fr": "Oui, mais avec difficult\u00e9"}}, {"code": "no_practical_barriers", "definition": {"en": "Cannot access because of distance, cost, office closure, lack of information, or other practical constraints.", "es": "No puede acceder por distancia, costo, cierre de oficinas, falta de informaci\u00f3n u otras limitaciones pr\u00e1cticas.", "fr": "Impossible d''acc\u00e9der en raison de la distance, du co\u00fbt, de la fermeture des bureaux, du manque d''information ou d''autres contraintes pratiques."}, "label": {"en": "No \u2014 practical barriers prevent access", "es": "No \u2014 barreras pr\u00e1cticas impiden el acceso", "fr": "Non \u2014 des obstacles pratiques emp\u00eachent l''acc\u00e8s"}}, {"code": "no_legal_barriers", "definition": {"en": "Cannot access because the household is legally excluded, discriminated against, or the service is not accessible to persons of their status.", "es": "No puede acceder porque el hogar est\u00e1 legalmente excluido, discriminado, o el servicio no es accesible para personas de su condici\u00f3n.", "fr": "Impossible d''acc\u00e9der car le m\u00e9nage est l\u00e9galement exclu, fait l''objet de discrimination, ou le service n''est pas accessible aux personnes de leur statut."}, "label": {"en": "No \u2014 legal or discriminatory barriers prevent access", "es": "No \u2014 barreras legales o discriminatorias impiden el acceso", "fr": "Non \u2014 des obstacles juridiques ou discriminatoires emp\u00eachent l''acc\u00e8s"}}, {"code": "dont_know", "definition": {"en": "Respondent does not know whether civil document services are accessible.", "es": "El encuestado no sabe si los servicios de documentaci\u00f3n civil son accesibles.", "fr": "Le r\u00e9pondant ne sait pas si les services de documentation civile sont accessibles."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: gpc-paf-2021,reach-protection-monitoring-2022,unhcr-protection-monitoring-2016
  ClimateInfoSource:
    title:
      en: Climate or weather information source
      fr: Source d'information climatique ou météorologique
      es: Fuente de información climática o meteorológica
    description:
      en: 'Channels through which the household receives weather, seasonal, or climate advisory information for routine planning purposes. Used for climate_information_source. Distinct from warning-channel vocabularies (which are event-specific): this vocabulary captures regular information services accessed for agricultural and livelihood planning, not one-time hazard event warnings. Sources: UNFCCC NAP M&E information channel tracking; IFRC PCVA climate information module; LoCAL climate information module; Oxfam adaptation toolkit.'
      fr: 'Canaux par lesquels le ménage reçoit des informations météorologiques, saisonnières ou climatiques pour la planification routinière. Distinct des vocabulaires de canaux d''alerte (qui sont spécifiques aux événements) : ce vocabulaire capture les services d''information réguliers accessibles pour la planification agricole et des moyens de subsistance. Sources : CCNUCC PNA ; FICR PCVA ; LoCAL ; Oxfam.'
      es: 'Canales a través de los cuales el hogar recibe información meteorológica, estacional o climática para planificación rutinaria. Distinto de los vocabularios de canales de alerta (que son específicos de eventos): este vocabulario captura servicios de información regulares a los que se accede para planificación agrícola y de medios de vida. Fuentes: CMNUCC PNA; FICR PCVA; LoCAL; Oxfam.'
    enum_uri: aidops:ClimateInfoSource
    permissible_values:
      national_meteorological_service:
        title:
          en: National weather service broadcast
          fr: Service météorologique national
          es: Servicio meteorológico nacional
        description:
          en: Forecasts, seasonal outlooks, or climate advisories issued directly by the country's national meteorological and hydrological service (NMHS).
          fr: Prévisions, perspectives saisonnières ou avis climatiques émis directement par le service météorologique et hydrologique national (SMHN) du pays.
          es: Pronósticos, perspectivas estacionales o avisos climáticos emitidos directamente por el servicio meteorológico e hidrológico nacional (SMHN) del país.
      radio_weather_forecast:
        title:
          en: Radio weather forecast
          fr: Météo à la radio
          es: Pronóstico del tiempo por radio
        description:
          en: A regular weather forecast or agricultural advisory broadcast on national, regional, or community radio.
          fr: Une prévision météorologique régulière ou un avis agricole diffusé à la radio nationale, régionale ou communautaire.
          es: Un pronóstico del tiempo regular o aviso agrícola transmitido por radio nacional, regional o comunitaria.
      television_weather_forecast:
        title:
          en: Television weather forecast
          fr: Météo à la télévision
          es: Pronóstico del tiempo por televisión
        description:
          en: A regular weather forecast broadcast on national or regional television.
          fr: Une prévision météorologique régulière diffusée à la télévision nationale ou régionale.
          es: Un pronóstico del tiempo regular transmitido por televisión nacional o regional.
      sms_alert_subscription:
        title:
          en: SMS weather alert subscription
          fr: Abonnement aux alertes météo par SMS
          es: Suscripción a alertas meteorológicas por SMS
        description:
          en: A subscription-based or registered SMS service that sends weather forecasts or agricultural advisories to the household's mobile phone.
          fr: Un service SMS par abonnement ou enregistré qui envoie des prévisions météorologiques ou des avis agricoles au téléphone mobile du ménage.
          es: Un servicio de SMS por suscripción o registro que envía pronósticos del tiempo o avisos agrícolas al teléfono móvil del hogar.
      mobile_app_climate:
        title:
          en: Mobile weather or climate application
          fr: Application météo ou climatique sur mobile
          es: Aplicación meteorológica o climática para móvil
        description:
          en: A smartphone application providing weather forecasts, seasonal outlooks, or climate-smart agricultural guidance.
          fr: Une application pour téléphone intelligent fournissant des prévisions météorologiques, des perspectives saisonnières ou des orientations agricoles climato-intelligentes.
          es: Una aplicación de teléfono inteligente que proporciona pronósticos del tiempo, perspectivas estacionales u orientación agrícola climáticamente inteligente.
      extension_worker:
        title:
          en: Agricultural extension worker or adviser
          fr: Agent de vulgarisation agricole
          es: Extensionista agrícola
        description:
          en: A government or NGO agricultural extension worker, adviser, or technician who communicates seasonal forecasts or climate-smart practice guidance to the household.
          fr: Un agent de vulgarisation agricole gouvernemental ou d'ONG, conseiller ou technicien qui communique des prévisions saisonnières ou des conseils de pratiques climato-intelligentes au ménage.
          es: Un extensionista agrícola gubernamental o de ONG, asesor o técnico que comunica pronósticos estacionales o orientación sobre prácticas climáticamente inteligentes al hogar.
      community_leader_meeting:
        title:
          en: Community leader or community meeting
          fr: Chef de communauté ou réunion communautaire
          es: Líder comunitario o reunión comunitaria
        description:
          en: Information passed through a village elder, community leader, or community gathering about expected weather or climate conditions.
          fr: Information transmise par un ancien du village, un chef de communauté ou une réunion communautaire sur les conditions météorologiques ou climatiques attendues.
          es: Información transmitida a través de un anciano del pueblo, líder comunitario o reunión comunitaria sobre las condiciones meteorológicas o climáticas esperadas.
      ngo_programme_advisory:
        title:
          en: NGO or programme climate advisory
          fr: Avis climatique d'une ONG ou d'un programme
          es: Asesoría climática de ONG o programa
        description:
          en: Information provided by an NGO, UN agency, or development programme specifically about seasonal forecasts, drought early warning, or climate-smart practices.
          fr: Information fournie par une ONG, une agence des Nations Unies ou un programme de développement spécifiquement sur les prévisions saisonnières, l'alerte précoce à la sécheresse ou les pratiques climato-intelligentes.
          es: Información proporcionada por una ONG, agencia de la ONU o programa de desarrollo específicamente sobre pronósticos estacionales, alerta temprana de sequía o prácticas climáticamente inteligentes.
      farmer_network:
        title:
          en: Farmer group or cooperative
          fr: Groupe de fermiers ou coopérative
          es: Grupo de agricultores o cooperativa
        description:
          en: Information shared within a farmer group, water-user association, or agricultural cooperative about expected conditions.
          fr: Information partagée au sein d'un groupe d'agriculteurs, d'une association d'usagers de l'eau ou d'une coopérative agricole sur les conditions attendues.
          es: Información compartida dentro de un grupo de agricultores, asociación de usuarios de agua o cooperativa agrícola sobre las condiciones esperadas.
      religious_or_traditional:
        title:
          en: Religious or traditional knowledge
          fr: Connaissances religieuses ou traditionnelles
          es: Conocimiento religioso o tradicional
        description:
          en: Seasonal forecasts based on traditional ecological knowledge, religious calendars, or observations shared by elders, religious leaders, or traditional authorities.
          fr: Prévisions saisonnières basées sur les connaissances écologiques traditionnelles, les calendriers religieux ou les observations partagées par les anciens, les leaders religieux ou les autorités traditionnelles.
          es: Pronósticos estacionales basados en conocimientos ecológicos tradicionales, calendarios religiosos u observaciones compartidas por ancianos, líderes religiosos o autoridades tradicionales.
      internet_social_media:
        title:
          en: Internet or social media
          fr: Internet ou réseaux sociaux
          es: Internet o redes sociales
        description:
          en: Weather or climate information sourced from websites, Facebook, WhatsApp groups, Telegram channels, or other internet-based platforms.
          fr: Informations météorologiques ou climatiques provenant de sites web, Facebook, groupes WhatsApp, canaux Telegram ou d'autres plateformes Internet.
          es: Información meteorológica o climática obtenida de sitios web, Facebook, grupos de WhatsApp, canales de Telegram u otras plataformas de internet.
      other:
        title:
          en: Other source
          fr: Autre source
          es: Otra fuente
        description:
          en: Climate or weather information source not listed above.
          fr: Source d'information climatique ou météorologique non répertoriée ci-dessus.
          es: Fuente de información climática o meteorológica no listada anteriormente.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-pcva-2020", "local-uncdf-2020", "unfccc-nap-me-2022"], "definition": {"en": "Channels through which the household receives weather, seasonal, or climate advisory information for routine planning purposes. Used for climate_information_source. Distinct from warning-channel vocabularies (which are event-specific): this vocabulary captures regular information services accessed for agricultural and livelihood planning, not one-time hazard event warnings. Sources: UNFCCC NAP M&E information channel tracking; IFRC PCVA climate information module; LoCAL climate information module; Oxfam adaptation toolkit.\n", "es": "Canales a trav\u00e9s de los cuales el hogar recibe informaci\u00f3n meteorol\u00f3gica, estacional o clim\u00e1tica para planificaci\u00f3n rutinaria. Distinto de los vocabularios de canales de alerta (que son espec\u00edficos de eventos): este vocabulario captura servicios de informaci\u00f3n regulares a los que se accede para planificaci\u00f3n agr\u00edcola y de medios de vida. Fuentes: CMNUCC PNA; FICR PCVA; LoCAL; Oxfam.\n", "fr": "Canaux par lesquels le m\u00e9nage re\u00e7oit des informations m\u00e9t\u00e9orologiques, saisonni\u00e8res ou climatiques pour la planification routini\u00e8re. Distinct des vocabulaires de canaux d''alerte (qui sont sp\u00e9cifiques aux \u00e9v\u00e9nements) : ce vocabulaire capture les services d''information r\u00e9guliers accessibles pour la planification agricole et des moyens de subsistance. Sources : CCNUCC PNA ; FICR PCVA ; LoCAL ; Oxfam.\n"}, "id": "climate-info-source", "label": {"en": "Climate or weather information source", "es": "Fuente de informaci\u00f3n clim\u00e1tica o meteorol\u00f3gica", "fr": "Source d''information climatique ou m\u00e9t\u00e9orologique"}, "maturity": "draft", "values": [{"code": "national_meteorological_service", "definition": {"en": "Forecasts, seasonal outlooks, or climate advisories issued directly by the country''