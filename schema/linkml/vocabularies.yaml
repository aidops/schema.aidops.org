  MeasurementType:
    title:
      en: Measurement Type
      fr: Type de mesure
      es: Tipo de medición
    description:
      en: How length or height was measured on an anthropometric record. WHO protocols prescribe recumbent length for children under 24 months and standing height from 24 months onward; recording which was used allows downstream consumers to apply the small recumbent-to-standing correction where appropriate.
      fr: Comment la longueur ou la taille a été mesurée lors d'un enregistrement anthropométrique. Les protocoles de l'OMS prescrivent la longueur couchée pour les enfants de moins de 24 mois et la taille debout à partir de 24 mois ; enregistrer la méthode utilisée permet aux consommateurs en aval d'appliquer la petite correction couché-à-debout le cas échéant.
      es: Cómo se midió la longitud o la talla en un registro antropométrico. Los protocolos de la OMS prescriben longitud en decúbito para niños menores de 24 meses y talla de pie a partir de los 24 meses; registrar qué se utilizó permite a los consumidores posteriores aplicar la pequeña corrección decúbito-a-pie cuando corresponda.
    enum_uri: aidops:MeasurementType
    permissible_values:
      recumbent:
        title:
          en: Recumbent length
          fr: Longueur couchée
          es: Longitud en decúbito
        description:
          en: Subject measured lying down, typically on a measuring board. Standard for children under 24 months.
          fr: Sujet mesuré en position couchée, généralement sur une toise. Standard pour les enfants de moins de 24 mois.
          es: Sujeto medido acostado, típicamente sobre una tabla de medición. Estándar para niños menores de 24 meses.
      standing:
        title:
          en: Standing height
          fr: Taille debout
          es: Talla de pie
        description:
          en: Subject measured standing upright, typically on a stadiometer. Standard from 24 months onward.
          fr: Sujet mesuré debout, généralement sur un stadiomètre. Standard à partir de 24 mois.
          es: Sujeto medido de pie, típicamente sobre un estadiómetro. Estándar a partir de los 24 meses.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["smart-methodology", "who-child-growth-standards"], "definition": {"en": "How length or height was measured on an anthropometric record. WHO protocols prescribe recumbent length for children under 24 months and standing height from 24 months onward; recording which was used allows downstream consumers to apply the small recumbent-to-standing correction where appropriate.", "es": "C\u00f3mo se midi\u00f3 la longitud o la talla en un registro antropom\u00e9trico. Los protocolos de la OMS prescriben longitud en dec\u00fabito para ni\u00f1os menores de 24 meses y talla de pie a partir de los 24 meses; registrar qu\u00e9 se utiliz\u00f3 permite a los consumidores posteriores aplicar la peque\u00f1a correcci\u00f3n dec\u00fabito-a-pie cuando corresponda.", "fr": "Comment la longueur ou la taille a \u00e9t\u00e9 mesur\u00e9e lors d''un enregistrement anthropom\u00e9trique. Les protocoles de l''OMS prescrivent la longueur couch\u00e9e pour les enfants de moins de 24 mois et la taille debout \u00e0 partir de 24 mois ; enregistrer la m\u00e9thode utilis\u00e9e permet aux consommateurs en aval d''appliquer la petite correction couch\u00e9-\u00e0-debout le cas \u00e9ch\u00e9ant."}, "id": "measurement-type", "label": {"en": "Measurement Type", "es": "Tipo de medici\u00f3n", "fr": "Type de mesure"}, "maturity": "draft", "standard": {"name": "WHO Anthropometric Training Course (2008)", "notes": "WHO defines the recumbent-length and standing-height procedures and the small conversion factor used when one method substitutes for the other.", "uri": "https://www.who.int/toolkits/child-growth-standards/training"}, "values": [{"code": "recumbent", "definition": {"en": "Subject measured lying down, typically on a measuring board. Standard for children under 24 months.", "es": "Sujeto medido acostado, t\u00edpicamente sobre una tabla de medici\u00f3n. Est\u00e1ndar para ni\u00f1os menores de 24 meses.", "fr": "Sujet mesur\u00e9 en position couch\u00e9e, g\u00e9n\u00e9ralement sur une toise. Standard pour les enfants de moins de 24 mois."}, "label": {"en": "Recumbent length", "es": "Longitud en dec\u00fabito", "fr": "Longueur couch\u00e9e"}}, {"code": "standing", "definition": {"en": "Subject measured standing upright, typically on a stadiometer. Standard from 24 months onward.", "es": "Sujeto medido de pie, t\u00edpicamente sobre un estadi\u00f3metro. Est\u00e1ndar a partir de los 24 meses.", "fr": "Sujet mesur\u00e9 debout, g\u00e9n\u00e9ralement sur un stadiom\u00e8tre. Standard \u00e0 partir de 24 mois."}, "label": {"en": "Standing height", "es": "Talla de pie", "fr": "Taille debout"}}]}'
