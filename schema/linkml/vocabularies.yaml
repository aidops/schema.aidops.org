  MenstrualRegularity:
    title:
      en: Menstrual cycle regularity (4-level)
      fr: Régularité du cycle menstruel (4 niveaux)
      es: Regularidad del ciclo menstrual (4 niveles)
    description:
      en: Four-level classification of menstrual cycle regularity based on WHO reproductive health clinical guidance. Irregular or absent menses may indicate health conditions (PCOS, thyroid disorder, pregnancy). 'Does not menstruate' captures permanent or long-term amenorrhea (menopausal, hysterectomy) distinct from postpartum amenorrhea which is captured separately.
      fr: Classification à quatre niveaux de la régularité du cycle menstruel basée sur les recommandations cliniques de l'OMS en santé reproductive. Les règles irrégulières ou absentes peuvent indiquer des problèmes de santé (SOPK, troubles thyroïdiens, grossesse). 'Does not menstruate' capture l'aménorrhée permanente ou à long terme (ménopause, hystérectomie) distincte de l'aménorrhée post-partum qui est capturée séparément.
      es: Clasificación de cuatro niveles de la regularidad del ciclo menstrual basada en la guía clínica de salud reproductiva de la OMS. La menstruación irregular o ausente puede indicar condiciones de salud (SOP, trastorno tiroideo, embarazo). 'Does not menstruate' captura la amenorrea permanente o a largo plazo (menopáusica, histerectomía) distinta de la amenorrea posparto que se captura por separado.
    enum_uri: aidops:MenstrualRegularity
    permissible_values:
      regular:
        title:
          en: Regular
          fr: Régulier
          es: Regular
        description:
          en: Menstrual periods occur at predictable intervals (typically 21–35 days).
          fr: Les règles surviennent à intervalles prévisibles (généralement 21–35 jours).
          es: Los períodos menstruales ocurren a intervalos predecibles (típicamente 21–35 días).
      irregular:
        title:
          en: Irregular
          fr: Irrégulier
          es: Irregular
        description:
          en: Menstrual periods occur but at unpredictable intervals or with highly variable cycle lengths.
          fr: Les règles surviennent mais à intervalles imprévisibles ou avec des durées de cycle très variables.
          es: Los períodos menstruales ocurren pero a intervalos impredecibles o con duraciones de ciclo muy variables.
      absent:
        title:
          en: Absent (amenorrhea)
          fr: Absent (aménorrhée)
          es: Ausente (amenorrea)
        description:
          en: Menstrual periods are currently absent (amenorrhea), not due to permanent condition such as menopause or hysterectomy.
          fr: Les règles sont actuellement absentes (aménorrhée), non dues à une condition permanente telle que la ménopause ou l'hystérectomie.
          es: Los períodos menstruales están actualmente ausentes (amenorrea), no debido a una condición permanente como menopausia o histerectomía.
      does_not_menstruate:
        title:
          en: Does not menstruate (permanent)
          fr: Ne menstruate pas (permanent)
          es: No menstrúa (permanente)
        description:
          en: The respondent does not menstruate due to a permanent or long-term condition (menopausal, hysterectomy, or other permanent reason).
          fr: La répondante ne menstruate pas en raison d'une condition permanente ou à long terme (ménopause, hystérectomie ou autre raison permanente).
          es: La encuestada no menstrúa debido a una condición permanente o a largo plazo (menopáusica, histerectomía u otra razón permanente).
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-rh-indicators-2006"], "definition": {"en": "Four-level classification of menstrual cycle regularity based on WHO reproductive health clinical guidance. Irregular or absent menses may indicate health conditions (PCOS, thyroid disorder, pregnancy). ''Does not menstruate'' captures permanent or long-term amenorrhea (menopausal, hysterectomy) distinct from postpartum amenorrhea which is captured separately.", "es": "Clasificaci\u00f3n de cuatro niveles de la regularidad del ciclo menstrual basada en la gu\u00eda cl\u00ednica de salud reproductiva de la OMS. La menstruaci\u00f3n irregular o ausente puede indicar condiciones de salud (SOP, trastorno tiroideo, embarazo). ''Does not menstruate'' captura la amenorrea permanente o a largo plazo (menop\u00e1usica, histerectom\u00eda) distinta de la amenorrea posparto que se captura por separado.", "fr": "Classification \u00e0 quatre niveaux de la r\u00e9gularit\u00e9 du cycle menstruel bas\u00e9e sur les recommandations cliniques de l''OMS en sant\u00e9 reproductive. Les r\u00e8gles irr\u00e9guli\u00e8res ou absentes peuvent indiquer des probl\u00e8mes de sant\u00e9 (SOPK, troubles thyro\u00efdiens, grossesse). ''Does not menstruate'' capture l''am\u00e9norrh\u00e9e permanente ou \u00e0 long terme (m\u00e9nopause, hyst\u00e9rectomie) distincte de l''am\u00e9norrh\u00e9e post-partum qui est captur\u00e9e s\u00e9par\u00e9ment."}, "id": "menstrual-regularity", "label": {"en": "Menstrual cycle regularity (4-level)", "es": "Regularidad del ciclo menstrual (4 niveles)", "fr": "R\u00e9gularit\u00e9 du cycle menstruel (4 niveaux)"}, "maturity": "draft", "values": [{"code": "regular", "definition": {"en": "Menstrual periods occur at predictable intervals (typically 21\u201335 days).", "es": "Los per\u00edodos menstruales ocurren a intervalos predecibles (t\u00edpicamente 21\u201335 d\u00edas).", "fr": "Les r\u00e8gles surviennent \u00e0 intervalles pr\u00e9visibles 