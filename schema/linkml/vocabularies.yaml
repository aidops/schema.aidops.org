  LivelihoodChangeType:
    title:
      en: Livelihood Change Type
      fr: Type de changement de moyens de subsistance
      es: Tipo de cambio en los medios de vida
    description:
      en: How a household's primary livelihood has changed since a crisis or displacement event. Synthesised from LSMS-ISA livelihood change modules and the IOM DTM Multi-Sectoral Location Assessment. Used to characterise whether the household has lost, reduced, maintained, diversified, switched, or improved its main livelihood activity relative to its pre-crisis or pre-displacement baseline.
      fr: Comment l'activité principale de subsistance d'un ménage a changé depuis une crise ou un événement de déplacement. Synthétisé à partir des modules de changement de moyens de subsistance LSMS-ISA et de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM. Utilisé pour caractériser si le ménage a perdu, réduit, maintenu, diversifié, changé ou amélioré son activité principale par rapport à sa situation de référence avant la crise ou le déplacement.
      es: Cómo ha cambiado la actividad principal de subsistencia del hogar desde una crisis o evento de desplazamiento. Sintetizado a partir de los módulos de cambio de medios de vida LSMS-ISA y de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM. Se utiliza para caracterizar si el hogar ha perdido, reducido, mantenido, diversificado, cambiado o mejorado su actividad principal en relación con su situación previa a la crisis o al desplazamiento.
    enum_uri: aidops:LivelihoodChangeType
    permissible_values:
      lost_entirely:
        title:
          en: Lost entirely
          fr: Perdu entièrement
          es: Perdida totalmente
        description:
          en: The household can no longer practice the previous activity at all.
          fr: Le ménage ne peut plus du tout pratiquer l'activité antérieure.
          es: El hogar ya no puede practicar la actividad anterior en absoluto.
      significantly_reduced:
        title:
          en: Significantly reduced
          fr: Considérablement réduit
          es: Significativamente reducida
        description:
          en: The household still practices the activity but at greatly reduced scale or income.
          fr: Le ménage pratique encore l'activité mais à une échelle ou avec un revenu considérablement réduits.
          es: El hogar todavía practica la actividad pero a una escala o ingresos muy reducidos.
      slightly_reduced:
        title:
          en: Slightly reduced
          fr: Légèrement réduit
          es: Ligeramente reducida
        description:
          en: Minor reduction in scale or income; activity largely continues.
          fr: Réduction mineure d'échelle ou de revenus ; l'activité se poursuit largement.
          es: Reducción menor de escala o ingresos; la actividad continúa en gran medida.
      unchanged:
        title:
          en: Unchanged
          fr: Inchangé
          es: Sin cambios
        description:
          en: No material change since the crisis or displacement.
          fr: Aucun changement matériel depuis la crise ou le déplacement.
          es: Sin cambios materiales desde la crisis o el desplazamiento.
      diversified_new_activity:
        title:
          en: Diversified — new activity added
          fr: Diversifié — nouvelle activité
          es: Diversificada — nueva actividad
        description:
          en: Household has added a new livelihood activity to its previous portfolio.
          fr: Le ménage a ajouté une nouvelle activité de subsistance à son portefeuille antérieur.
          es: El hogar ha añadido una nueva actividad de subsistencia a su cartera anterior.
      switched_activity:
        title:
          en: Switched to a new activity
          fr: Changé d'activité
          es: Cambió a nueva actividad
        description:
          en: Household has replaced its former primary activity with a different one.
          fr: Le ménage a remplacé son activité principale antérieure par une autre.
          es: El hogar ha reemplazado su actividad principal anterior por otra diferente.
      improved:
        title:
          en: Improved
          fr: Amélioré
          es: Mejorada
        description:
          en: Household's livelihood situation has improved since the crisis.
          fr: La situation de subsistance du ménage s'est améliorée depuis la crise.
          es: La situación de subsistencia del hogar ha mejorado desde la crisis.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "definition": {"en": "How a household''s primary livelihood has changed since a crisis or displacement event. Synthesised from LSMS-ISA livelihood change modules and the IOM DTM Multi-Sectoral Location Assessment. Used to characterise whether the household has lost, reduced, maintained, diversified, switched, or improved its main livelihood activity relative to its pre-crisis or pre-displacement baseline.", "es": "C\u00f3mo ha cambiado la actividad principal de subsistencia del hogar desde una crisis o evento de desplazamiento. Sintetizado a partir de los m\u00f3dulos de cambio de medios de vida LSMS-ISA y de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM. Se utiliza para caracterizar si el hogar ha perdido, reducido, mantenido, diversificado, cambiado o mejorado su actividad principal en relaci\u00f3n con su situaci\u00f3n previa a la crisis o al desplazamiento.", "fr": "Comment l''activit\u00e9 principale de subsistance d''un m\u00e9nage a chang\u00e9 depuis une crise ou un \u00e9v\u00e9nement de d\u00e9placement. Synth\u00e9tis\u00e9 \u00e0 partir des modules de changement de moyens de subsistance LSMS-ISA et de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM. Utilis\u00e9 pour caract\u00e9riser si le m\u00e9nage a perdu, r\u00e9duit, maintenu, diversifi\u00e9, chang\u00e9 ou am\u00e9lior\u00e9 son activit\u00e9 principale par rapport \u00e0 sa situation de r\u00e9f\u00e9rence avant la crise ou le d\u00e9placement."}, "id": "livelihood-change-type", "label": {"en": "Livelihood Change Type", "es": "Tipo de cambio en los medios de vida", "fr": "Type de changement de moyens de subsistance"}, "maturity": "draft", "standard": {"name": "Synthesised from LSMS-ISA livelihood change modules and IOM DTM MSLA", "notes": "Used with a programme-level reference date for ''since the crisis'' / ''since displacement''."}, "values": [{"code": "lost_entirely", "definition": {"en": "The household can no longer practice the previous activity at all.", "es": "El hogar ya no puede practicar la actividad anterior en absoluto.", "fr": "Le m\u00e9nage ne peut plus du tout pratiquer l''activit\u00e9 ant\u00e9rieure."}, "label": {"en": "Lost entirely", "es": "Perdida totalmente", "fr": "Perdu enti\u00e8rement"}}, {"code": "significantly_reduced", "definition": {"en": "The household still practices the activity but at greatly reduced scale or income.", "es": "El hogar todav\u00eda practica la actividad pero a una escala o ingresos muy reducidos.", "fr": "Le m\u00e9nage pratique encore l''activit\u00e9 mais \u00e0 une \u00e9chelle ou avec un revenu consid\u00e9rablement r\u00e9duits."}, "label": {"en": "Significantly reduced", "es": "Significativamente reducida", "fr": "Consid\u00e9rablement r\u00e9duit"}}, {"code": "slightly_reduced", "definition": {"en": "Minor reduction in scale or income; activity largely continues.", "es": "Reducci\u00f3n menor de escala o ingresos; la actividad contin\u00faa en gran medida.", "fr": "R\u00e9duction mineure d''\u00e9chelle ou de revenus ; l''activit\u00e9 se poursuit largement."}, "label": {"en": "Slightly reduced", "es": "Ligeramente reducida", "fr": "L\u00e9g\u00e8rement r\u00e9duit"}}, {"code": "unchanged", "definition": {"en": "No material change since the crisis or displacement.", "es": "Sin cambios materiales desde la crisis o el desplazamiento.", "fr": "Aucun changement mat\u00e9riel depuis la crise ou le d\u00e9placement."}, "label": {"en": "Unchanged", "es": "Sin cambios", "fr": "Inchang\u00e9"}}, {"code": "diversified_new_activity", "definition": {"en": "Household has added a new livelihood activity to its previous portfolio.", "es": "El hogar ha a\u00f1adido una nueva actividad de subsistencia a su cartera anterior.", "fr": "Le m\u00e9nage a ajout\u00e9 une nouvelle activit\u00e9 de subsistance \u00e0 son portefeuille ant\u00e9rieur."}, "label": {"en": "Diversified \u2014 new activity added", "es": "Diversificada \u2014 nueva actividad", "fr": "Diversifi\u00e9 \u2014 nouvelle activit\u00e9"}}, {"code": "switched_activity", "definition": {"en": "Household has replaced its former primary activity with a different one.", "es": "El hogar ha reemplazado su actividad principal anterior por otra diferente.", "fr": "Le m\u00e9nage a remplac\u00e9 son activit\u00e9 principale ant\u00e9rieure par une autre."}, "label": {"en": "Switched to a new activity", "es": "Cambi\u00f3 a nueva actividad", "fr": "Chang\u00e9 d''activit\u00e9"}}, {"code": "improved", "definition": {"en": "Household''s livelihood situation has improved since the crisis.", "es": "La situaci\u00f3n de subsistencia del hogar ha mejorado desde la crisis.", "fr": "La situation de subsistance du m\u00e9nage s''est am\u00e9lior\u00e9e depuis la crise."}, "label": {"en": "Improved", "es": "Mejorada", "fr": "Am\u00e9lior\u00e9"}}]}'
