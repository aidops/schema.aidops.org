  LatrineSexSegregation:
    title:
      en: Latrine sex segregation status
      fr: Statut de ségrégation des latrines par sexe
      es: Estado de segregación de letrinas por sexo
    description:
      en: Whether the latrines or toilets used by the household are physically separated and marked for men and women. Based on Sphere 2018 WASH Standard 3.1 and IRC Safety Audit Tool (2013).
      fr: Si les latrines ou toilettes utilisées par le ménage sont séparées physiquement et indiquées pour les hommes et les femmes. Fondé sur la Norme WASH Sphère 2018 3.1 et l'outil d'audit de sécurité IRC (2013).
      es: Si las letrinas o baños utilizados por el hogar están física y claramente separados y señalizados para hombres y mujeres. Basado en la Norma WASH Esfera 2018 3.1 y la Herramienta de Auditoría de Seguridad del IRC (2013).
    enum_uri: aidops:LatrineSexSegregation
    permissible_values:
      'yes':
        title:
          en: Yes — communal latrines are sex-segregated
          fr: Oui — les latrines communales sont séparées par sexe
          es: Sí — las letrinas comunales están segregadas por sexo
        description:
          en: Communal or shared latrines are clearly marked and spatially separated by sex.
          fr: Les latrines communales ou partagées sont clairement signalisées et séparées physiquement par sexe.
          es: Las letrinas comunales o compartidas están claramente señalizadas y separadas físicamente por sexo.
      'no':
        title:
          en: No — communal latrines are not sex-segregated
          fr: Non — les latrines communales ne sont pas séparées par sexe
          es: No — las letrinas comunales no están segregadas por sexo
        description:
          en: Communal or shared latrines are not separated by sex.
          fr: Les latrines communales ou partagées ne sont pas séparées par sexe.
          es: Las letrinas comunales o compartidas no están separadas por sexo.
      household_private:
        title:
          en: Household has a private latrine
          fr: Le ménage dispose d'une latrine privée
          es: El hogar tiene una letrina privada
        description:
          en: Household has its own private latrine or toilet not shared with others; sex segregation is not applicable.
          fr: Le ménage dispose de ses propres latrines ou toilettes privées non partagées avec d'autres ; la ségrégation par sexe ne s'applique pas.
          es: El hogar tiene su propia letrina o baño privado no compartido con otros; la segregación por sexo no aplica.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent does not know whether the latrines are sex-segregated.
          fr: Le répondant ne sait pas si les latrines sont séparées par sexe.
          es: El encuestado no sabe si las letrinas están segregadas por sexo.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Whether the latrines or toilets used by the household are physically separated and marked for men and women. Based on Sphere 2018 WASH Standard 3.1 and IRC Safety Audit Tool (2013).", "es": "Si las letrinas o ba\u00f1os utilizados por el hogar est\u00e1n f\u00edsica y claramente separados y se\u00f1alizados para hombres y mujeres. Basado en la Norma WASH Esfera 2018 3.1 y la Herramienta de Auditor\u00eda de Seguridad del IRC (2013).", "fr": "Si les latrines ou toilettes utilis\u00e9es par le m\u00e9nage sont s\u00e9par\u00e9es physiquement et indiqu\u00e9es pour les hommes et les femmes. Fond\u00e9 sur la Norme WASH Sph\u00e8re 2018 3.1 et l''outil d''audit de s\u00e9curit\u00e9 IRC (2013)."}, "id": "latrine-sex-segregation", "label": {"en": "Latrine sex segregation status", "es": "Estado de segregaci\u00f3n de letrinas por sexo", "fr": "Statut de s\u00e9gr\u00e9gation des latrines par sexe"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "Communal or shared latrines are clearly marked and spatially separated by sex.", "es": "Las letrinas comunales o compartidas est\u00e1n claramente se\u00f1alizadas y separadas f\u00edsicamente por sexo.", "fr": "Les latrines communales ou partag\u00e9es sont clairement signalis\u00e9es et s\u00e9par\u00e9es physiquement par sexe."}, "label": {"en": "Yes \u2014 communal latrines are sex-segregated", "es": "S\u00ed \u2014 las letrinas comunales est\u00e1n segregadas por sexo", "fr": "Oui \u2014 les latrines communales sont s\u00e9par\u00e9es par sexe"}}, {"code": "no", "definition": {"en": "Communal or shared latrines are not separated by sex.", "es": "Las letrinas comunales o compartidas no est\u00e1n separadas por sexo.", "fr": "Les latrines communales ou partag\u00e9es ne sont pas s\u00e9par\u00e9es par sexe."}, "label": {"en": "No \u2014 communal latrines are not sex-segregated", "es": "No \u2014 las letrinas comunales no est\u00e1n segregadas por sexo", "fr": "Non \u2014 les latrines communales ne sont pas s\u00e9par\u00e9es par sexe"}}, {"code": "household_private", "definition": {"en": "Household has its own private latrine or toilet not shared with others; sex segregation is not applicable.", "es": "El hogar tiene su propia letrina o ba\u00f1o privado no compartido con otros; la segregaci\u00f3n por sexo no aplica.", "fr": "Le m\u00e9nage dispose de ses propres latrines ou toilettes priv\u00e9es non partag\u00e9es avec d''autres ; la s\u00e9gr\u00e9gation par sexe ne s''applique pas."}, "label": {"en": "Household has a private latrine", "es": "El hogar tiene una letrina privada", "fr": "Le m\u00e9nage dispose d''une latrine priv\u00e9e"}}, {"code": "dont_know", "definition": {"en": "Respondent does not know whether the latrines are sex-segregated.", "es": "El encuestado no sabe si las letrinas est\u00e1n segregadas por sexo.", "fr": "Le r\u00e9pondant ne sait pas si les latrines sont s\u00e9par\u00e9es par sexe."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
