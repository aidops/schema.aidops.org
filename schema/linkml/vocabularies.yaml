ssess trust.", "es": "El encuestado no puede evaluar la confianza.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la confiance."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
