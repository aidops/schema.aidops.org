  RouteSafety3:
    title:
      en: Route safety (3 levels)
      fr: Sécurité des itinéraires (3 niveaux)
      es: Seguridad de rutas (3 niveles)
    description:
      en: Three-level perceived safety scale for movement on routes to resource-collection points (water, firewood, fuel). Based on GBV AoR (2021) safety perception indicators and MSNA GBV module conventions. The 'dont_collect' code captures households that do not make the relevant trip.
      fr: Échelle de sécurité perçue à trois niveaux pour les déplacements sur les itinéraires vers les points de collecte des ressources (eau, bois, combustible). Fondée sur les indicateurs de perception de sécurité du GBV AoR (2021) et les conventions du module GBV pour les MSNA. Le code 'dont_collect' capture les ménages qui n'effectuent pas le déplacement concerné.
      es: Escala de seguridad percibida de tres niveles para el desplazamiento en rutas hacia puntos de recolección de recursos (agua, leña, combustible). Basada en los indicadores de percepción de seguridad del GBV AoR (2021) y las convenciones del módulo VBG para las MSNA. El código 'dont_collect' captura a los hogares que no realizan el viaje en cuestión.
    enum_uri: aidops:RouteSafety3
    permissible_values:
      generally_safe:
        title:
          en: Generally safe
          fr: Généralement sûre
          es: Generalmente segura
        description:
          en: Household members generally feel safe on this route; no or rare incidents reported in the community.
          fr: Les membres du ménage se sentent généralement en sécurité sur cet itinéraire ; aucun ou de rares incidents signalés dans la communauté.
          es: Los miembros del hogar generalmente se sienten seguros en esta ruta; no hay o son raros los incidentes reportados en la comunidad.
      sometimes_unsafe:
        title:
          en: Sometimes unsafe
          fr: Parfois peu sûre
          es: A veces insegura
        description:
          en: Household members sometimes feel unsafe; safety depends on time of day, number of people, or other factors.
          fr: Les membres du ménage se sentent parfois peu en sécurité ; la sécurité dépend de l'heure, du nombre de personnes ou d'autres facteurs.
          es: Los miembros del hogar a veces se sienten inseguros; la seguridad depende de la hora del día, el número de personas u otros factores.
      generally_unsafe:
        title:
          en: Generally unsafe
          fr: Généralement peu sûre
          es: Generalmente insegura
        description:
          en: Household members generally feel unsafe on this route; regular reports of threats or incidents in the community.
          fr: Les membres du ménage se sentent généralement peu en sécurité sur cet itinéraire ; rapports réguliers de menaces ou d'incidents dans la communauté.
          es: Los miembros del hogar generalmente se sienten inseguros en esta ruta; reportes regulares de amenazas o incidentes en la comunidad.
      dont_collect:
        title:
          en: Does not apply — household does not make this trip
          fr: Sans objet — le ménage n'effectue pas ce déplacement
          es: No aplica — el hogar no realiza este desplazamiento
        description:
          en: Household does not collect this resource (e.g., uses purchased water, receives distributed fuel). The route safety question is not applicable.
          fr: Le ménage ne collecte pas cette ressource (p. ex., utilise de l'eau achetée, reçoit du combustible distribué). La question de sécurité de l'itinéraire ne s'applique pas.
          es: El hogar no recolecta este recurso (p. ej., usa agua comprada, recibe combustible distribuido). La pregunta sobre seguridad de la ruta no aplica.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015", "irc-safety-audit-2013"], "definition": {"en": "Three-level perceived safety scale for movement on routes to resource-collection points (water, firewood, fuel). Based on GBV AoR (2021) safety perception indicators and MSNA GBV module conventions. The ''dont_collect'' code captures households that do not make the relevant trip.", "es": "Escala de seguridad percibida de tres niveles para el desplazamiento en rutas hacia puntos de recolecci\u00f3n de recursos (agua, le\u00f1a, combustible). Basada en los indicadores de percepci\u00f3n de seguridad del GBV AoR (2021) y las convenciones del m\u00f3dulo VBG para las MSNA. El c\u00f3digo ''dont_collect'' captura a los hogares que no realizan el viaje en cuesti\u00f3n.", "fr": "\u00c9chelle de s\u00e9curit\u00e9 per\u00e7ue \u00e0 trois niveaux pour les d\u00e9placements sur les itin\u00e9raires vers les points de collecte des ressources (eau, bois, combustible). Fond\u00e9e sur les indicateurs de perception de s\u00e9curit\u00e9 du GBV AoR (2021) et les conventions du module GBV pour les MSNA. Le code ''dont_collect'' capture les m\u00e9nages qui n''effectuent pas le d\u00e9placement concern\u00e9."}, "id": "route-safety-3", "label": {"en": "Route safety (3 levels)", "es": "Seguridad de rutas (3 niveles)", "fr": "S\u00e9curit\u00e9 des itin\u00e9raires (3 niveaux)"}, "maturity": "draft", "values": [{"code": "generally_safe", "definition": {"en": "Household members generally feel safe on this route; no or rare incidents reported in the community.", "es": "Los miembros del hogar generalmente se sienten seguros en esta ruta; no hay o son raros los incidentes reportados en la comunidad.", "fr": "Les membres du m\u00e9nage se sentent g\u00e9n\u00e9ralement en s\u00e9curit\u00e9 sur cet itin\u00e9raire ; aucun ou de rares incidents signal\u00e9s dans la communaut\u00e9."}, "label": {"en": "Generally safe", "es": "Generalmente segura", "fr": "G\u00e9n\u00e9ralement s\u00fbre"}}, {"code": "sometimes_unsafe", "definition": {"en": "Household members sometimes feel unsafe; safety depends on time of day, number of people, or other factors.", "es": "Los miembros del hogar a veces se sienten inseguros; la seguridad depende de la hora del d\u00eda, el n\u00famero de personas u otros factores.", "fr": "Les membres du m\u00e9nage se sentent parfois peu en s\u00e9curit\u00e9 ; la s\u00e9curit\u00e9 d\u00e9pend de l''heure, du nombre de personnes ou d''autres facteurs."}, "label": {"en": "Sometimes unsafe", "es": "A veces insegura", "fr": "Parfois peu s\u00fbre"}}, {"code": "generally_unsafe", "definition": {"en": "Household members generally feel unsafe on this route; regular reports of threats or incidents in the community.", "es": "Los miembros del hogar generalmente se sienten inseguros en esta ruta; reportes regulares de amenazas o incidentes en la comunidad.", "fr": "Les membres du m\u00e9nage se sentent g\u00e9n\u00e9ralement peu en s\u00e9curit\u00e9 sur cet itin\u00e9raire ; rapports r\u00e9guliers de menaces ou d''incidents dans la communaut\u00e9."}, "label": {"en": "Generally unsafe", "es": "Generalmente insegura", "fr": "G\u00e9n\u00e9ralement peu s\u00fbre"}}, {"code": "dont_collect", "definition": {"en": "Household does not collect this resource (e.g., uses purchased water, receives distributed fuel). The route safety question is not applicable.", "es": "El hogar no recolecta este recurso (p. ej., usa agua comprada, recibe combustible distribuido). La pregunta sobre seguridad de la ruta no aplica.", "fr": "Le m\u00e9nage ne collecte pas cette ressource (p. ex., utilise de l''eau achet\u00e9e, re\u00e7oit du combustible distribu\u00e9). La question de s\u00e9curit\u00e9 de l''itin\u00e9raire ne s''applique pas."}, "label": {"en": "Does not apply \u2014 household does not make this trip", "es": "No aplica \u2014 el hogar no realiza este desplazamiento", "fr": "Sans objet \u2014 le m\u00e9nage n''effectue pas ce d\u00e9placement"}}]}'
