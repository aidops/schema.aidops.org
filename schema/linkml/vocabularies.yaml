nfants non accompagn\u00e9s ou s\u00e9par\u00e9s (ENAS)"}}, {"code": "female_headed_households", "definition": {"en": "Households whose primary decision-maker or income-provider is a woman, typically due to widowhood, separation, or male absence.", "es": "Hogares cuya principal persona que toma decisiones o proveedora de ingresos es una mujer, t\u00edpicamente por viudez, separaci\u00f3n o ausencia masculina.", "fr": "M\u00e9nages dont la principale d\u00e9cideuse ou pourvoyeuse de revenu est une femme, g\u00e9n\u00e9ralement en raison du veuvage, de la s\u00e9paration ou de l''absence masculine."}, "label": {"en": "Female-headed households", "es": "Hogares encabezados por mujeres", "fr": "M\u00e9nages dirig\u00e9s par une femme"}}, {"code": "child_headed_households", "definition": {"en": "Households whose primary decision-maker is a person under 18.", "es": "Hogares cuya principal persona que toma decisiones es menor de 18 a\u00f1os.", "fr": "M\u00e9nages dont le principal d\u00e9cideur est une personne de moins de 18 ans."}, "label": {"en": "Child-headed households", "es": "Hogares encabezados por un menor", "fr": "M\u00e9nages dirig\u00e9s par un enfant"}}, {"code": "chronically_ill", "definition": {"en": "People with long-term illness (e.g., HIV, TB, diabetes, cancer) requiring continuous care.", "es": "Personas con enfermedades de larga duraci\u00f3n (por ejemplo, VIH, TB, diabetes, c\u00e1ncer) que requieren atenci\u00f3n continua.", "fr": "Personnes atteintes de maladies de longue dur\u00e9e (par exemple VIH, TB, diab\u00e8te, cancer) n\u00e9cessitant des soins continus."}, "label": {"en": "Chronically ill persons", "es": "Personas con enfermedades cr\u00f3nicas", "fr": "Personnes atteintes de maladies chroniques"}}, {"code": "displaced", "definition": {"en": "Internally displaced persons, refugees, or returnees living in the community.", "es": "Personas desplazadas internas, refugiadas o retornadas que viven en la comunidad.", "fr": "Personnes d\u00e9plac\u00e9es internes, r\u00e9fugi\u00e9s ou retourn\u00e9s vivant dans la communaut\u00e9."}, "label": {"en": "Displaced persons", "es": "Personas desplazadas", "fr": "Personnes d\u00e9plac\u00e9es"}}, {"code": "host_community_poor", "definition": {"en": "Low-income members of the host community affected by the crisis or by the cost of hosting displaced populations.", "es": "Miembros de bajos ingresos de la comunidad de acogida afectados por la crisis o por el costo de acoger a poblaciones desplazadas.", "fr": "Membres \u00e0 faible revenu de la communaut\u00e9 d''accueil affect\u00e9s par la crise ou par le co\u00fbt d''accueillir des populations d\u00e9plac\u00e9es."}, "label": {"en": "Poor host community members", "es": "Miembros pobres de la comunidad de acogida", "fr": "Membres pauvres de la communaut\u00e9 d''accueil"}}, {"code": "minority_group", "definition": {"en": "Members of a minority group facing discrimination or marginalisation in this community.", "es": "Miembros de un grupo minoritario que enfrentan discriminaci\u00f3n o marginaci\u00f3n en esta comunidad.", "fr": "Membres d''un groupe minoritaire confront\u00e9s \u00e0 la discrimination ou \u00e0 la marginalisation dans cette communaut\u00e9."}, "label": {"en": "Ethnic, religious, or linguistic minority", "es": "Minor\u00eda \u00e9tnica, religiosa o ling\u00fc\u00edstica", "fr": "Minorit\u00e9 ethnique, religieuse ou linguistique"}}, {"code": "returnees", "definition": {"en": "Persons who have recently returned after a period of displacement.", "es": "Personas que han regresado recientemente tras un per\u00edodo de desplazamiento.", "fr": "Personnes r\u00e9cemment retourn\u00e9es apr\u00e8s une p\u00e9riode de d\u00e9placement."}, "label": {"en": "Returnees", "es": "Retornados", "fr": "Retourn\u00e9s"}}, {"code": "other", "definition": {"en": "Priority group not covered by the above categories; use the associated free-text field to describe.", "es": "Grupo prioritario no cubierto por las categor\u00edas anteriores; utilizar el campo de texto libre asociado para describir.", "fr": "Groupe prioritaire non couvert par les cat\u00e9gories ci-dessus ; utiliser le champ en texte libre associ\u00e9 pour d\u00e9crire."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
