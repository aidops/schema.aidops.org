  HandwashingCriticalJuncture:
    title:
      en: Handwashing Critical Juncture
      fr: Moment critique pour le lavage des mains
      es: Momento crítico para el lavado de manos
    description:
      en: Self-reported moments at which household members wash their hands. Based on WHO/UNICEF five critical junctures for handwashing with soap. This is a self-reported indicator; the JMP treats it as a softer indicator than observed soap and water availability (H2 and H3). Subject to social desirability bias. Multi-select.
      fr: Moments déclarés par le ménage auxquels ses membres se lavent les mains. Basé sur les cinq moments critiques OMS/UNICEF pour le lavage des mains au savon. Il s'agit d'un indicateur auto-déclaré ; le JMP le considère comme un indicateur moins fiable que la disponibilité observée de savon et d'eau (H2 et H3). Sujet au biais de désirabilité sociale. Sélection multiple.
      es: Momentos autodeclarados en que los miembros del hogar se lavan las manos. Basado en los cinco momentos críticos de la OMS/UNICEF para el lavado de manos con jabón. Es un indicador autodeclarado; el JMP lo trata como un indicador más débil que la disponibilidad observada de jabón y agua (H2 y H3). Sujeto a sesgo de deseabilidad social. Selección múltiple.
    enum_uri: aidops:HandwashingCriticalJuncture
    permissible_values:
      before_preparing_food:
        title:
          en: Before preparing food
          fr: Avant de préparer les aliments
          es: Antes de preparar alimentos
        description:
          en: Household members report washing hands before preparing or handling food. One of the five WHO/UNICEF critical handwashing junctures.
          fr: Les membres du ménage déclarent se laver les mains avant de préparer ou manipuler des aliments. L'un des cinq moments critiques de lavage des mains OMS/UNICEF.
          es: Los miembros del hogar reportan lavarse las manos antes de preparar o manipular alimentos. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF.
      before_eating:
        title:
          en: Before eating
          fr: Avant de manger
          es: Antes de comer
        description:
          en: Household members report washing hands before eating. One of the five WHO/UNICEF critical handwashing junctures.
          fr: Les membres du ménage déclarent se laver les mains avant de manger. L'un des cinq moments critiques de lavage des mains OMS/UNICEF.
          es: Los miembros del hogar reportan lavarse las manos antes de comer. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF.
      after_using_toilet:
        title:
          en: After using the toilet
          fr: Après avoir utilisé les toilettes
          es: Después de usar el baño
        description:
          en: Household members report washing hands after using the toilet or latrine. One of the five WHO/UNICEF critical handwashing junctures.
          fr: Les membres du ménage déclarent se laver les mains après avoir utilisé les toilettes ou la latrine. L'un des cinq moments critiques de lavage des mains OMS/UNICEF.
          es: Los miembros del hogar reportan lavarse las manos después de usar el inodoro o la letrina. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF.
      after_cleaning_child:
        title:
          en: After cleaning a child who has defecated
          fr: Après avoir nettoyé un enfant qui a déféqué
          es: Después de limpiar a un niño que defecó
        description:
          en: Household members report washing hands after cleaning a child's bottom. One of the five WHO/UNICEF critical handwashing junctures.
          fr: Les membres du ménage déclarent se laver les mains après avoir nettoyé le derrière d'un enfant. L'un des cinq moments critiques de lavage des mains OMS/UNICEF.
          es: Los miembros del hogar reportan lavarse las manos después de limpiar las nalgas de un niño. Uno de los cinco momentos críticos de lavado de manos de la OMS/UNICEF.
      after_handling_garbage:
        title:
          en: After handling garbage or waste
          fr: Après avoir manipulé des ordures ou des déchets
          es: Después de manipular basura o residuos
        description:
          en: Household members report washing hands after handling garbage, refuse, or waste materials.
          fr: Les membres du ménage déclarent se laver les mains après avoir manipulé des ordures, des déchets ou des matières de rebut.
          es: Los miembros del hogar reportan lavarse las manos después de manipular basura, residuos o materiales de desecho.
      none_of_above:
        title:
          en: None of the above
          fr: Aucun des moments précités
          es: Ninguno de los anteriores
        description:
          en: Household members do not report handwashing at any of the critical junctures listed.
          fr: Les membres du ménage ne déclarent pas se laver les mains lors d'un des moments critiques mentionnés.
          es: Los miembros del hogar no reportan lavado de manos en ninguno de los momentos críticos mencionados.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Self-reported moments at which household members wash their hands. Based on WHO/UNICEF five critical junctures for handwashing with soap. This is a self-reported indicator; the JMP treats it as a softer indicator than observed soap and water availability (H2 and H3). Subject to social desirability bias. Multi-select.", "es": "Momentos autodeclarados en que los miembros del hogar se lavan las manos. Basado en los cinco momentos cr\u00edticos de la OMS/UNICEF para el lavado de manos con jab\u00f3n. Es un indicador autodeclarado; el JMP lo trata como un indicador m\u00e1s d\u00e9bil que la disponibilidad observada de jab\u00f3n y agua (H2 y H3). Sujeto a sesgo de deseabilidad social. Selecci\u00f3n m\u00faltiple.", "fr": "Moments d\u00e9clar\u00e9s par le m\u00e9nage auxquels ses membres se lavent les mains. Bas\u00e9 sur les cinq moments critiques OMS/UNICEF pour le lavage des mains au savon. Il s''agit d''un indicateur auto-d\u00e9clar\u00e9 ; le JMP le consid\u00e8re comme un indicateur moins fiable que la disponibilit\u00e9 observ\u00e9e de savon et d''eau (H2 et H3). Sujet au biais de d\u00e9sirabilit\u00e9 sociale. S\u00e9lection multiple."}, "id": "handwashing-critical-juncture", "label": {"en": "Handwashing Critical Juncture", "es": "Momento cr\u00edtico para el lavado de manos", "fr": "Moment critique pour le lavage des mains"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "WHO/UNICEF five critical junctures: before food preparation, before eating, after toilet use, after cleaning a child''s bottom, after handling garbage. Self-reported KAP indicator.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "values": [{"code": "before_preparing_food", "definition": {"en": "Household members report washing hands before preparing or handling food. One of the five WHO/UNICEF critical handwashing junctures.", "es": "Los miembros del hogar reportan lavarse las manos antes de preparar o manipular alimentos. Uno de los cinco momentos cr\u00edticos de lavado de manos de la OMS/UNICEF.", "fr": "Les membres du m\u00e9nage d\u00e9clarent se laver les mains avant de pr\u00e9parer ou manipuler des aliments. L''un des cinq moments critiques de lavage des mains OMS/UNICEF."}, "label": {"en": "Before preparing food", "es": "Antes de preparar alimentos", "fr": "Avant de pr\u00e9parer les aliments"}}, {"code": "before_eating", "definition": {"en": "Household members report washing hands before eating. One of the five WHO/UNICEF critical handwashing junctures.", "es": "Los miembros del hogar reportan lavarse las manos antes de comer. Uno de los cinco momentos cr\u00edticos de lavado de manos de la OMS/UNICEF.", "fr": "Les membres du m\u00e9nage d\u00e9clarent se laver les mains avant de manger. L''un des cinq moments critiques de lavage des mains OMS/UNICEF."}, "label": {"en": "Before eating", "es": "Antes de comer", "fr": "Avant de manger"}}, {"code": "after_using_toilet", "definition": {"en": "Household members report washing hands after using the toilet or latrine. One of the five WHO/UNICEF critical handwashing junctures.", "es": "Los miembros del hogar reportan lavarse las manos despu\u00e9s de usar el inodoro o la letrina. Uno de los cinco momentos cr\u00edticos de lavado de manos de la OMS/UNICEF.", "fr": "Les membres du m\u00e9nage d\u00e9clarent se laver les mains apr\u00e8s avoir utilis\u00e9 les toilettes ou la latrine. L''un des cinq moments critiques de lavage des mains OMS/UNICEF."}, "label": {"en": "After using the toilet", "es": "Despu\u00e9s de usar el ba\u00f1o", "fr": "Apr\u00e8s avoir utilis\u00e9 les toilettes"}}, {"code": "after_cleaning_child", "definition": {"en": "Household members report washing hands after cleaning a child''s bottom. One of the five WHO/UNICEF critical handwashing junctures.", "es": "Los miembros del hogar reportan lavarse las manos despu\u00e9s de limpiar las nalgas de un ni\u00f1o. Uno de los cinco momentos cr\u00edticos de lavado de manos de la OMS/UNICEF.", "fr": "Les membres du m\u00e9nage d\u00e9clarent se laver les mains apr\u00e8s avoir nettoy\u00e9 le derri\u00e8re d''un enfant. L''un des cinq moments critiques de lavage des mains OMS/UNICEF."}, "label": {"en": "After cleaning a child who has defecated", "es": "Despu\u00e9s de limpiar a un ni\u00f1o que defec\u00f3", "fr": "Apr\u00e8s avoir nettoy\u00e9 un enfant qui a d\u00e9f\u00e9qu\u00e9"}}, {"code": "after_handling_garbage", "definition": {"en": "Household members report washing hands after handling garbage, refuse, or waste materials.", "es": "Los miembros del hogar reportan lavarse las manos despu\u00e9s de manipular basura, residuos o materiales de desecho.", "fr": "Les membres du m\u00e9nage d\u00e9clarent se laver les mains apr\u00e8s avoir manipul\u00e9 des ordures, des d\u00e9chets ou des mati\u00e8res de rebut."}, "label": {"en": "After handling garbage or waste", "es": "Despu\u00e9s de manipular basura o residuos", "fr": "Apr\u00e8s avoir manipul\u00e9 des ordures ou des d\u00e9chets"}}, {"code": "none_of_above", "definition": {"en": "Household members do not report handwashing at any of the critical junctures listed.", "es": "Los miembros del hogar no reportan lavado de manos en ninguno de los momentos cr\u00edticos mencionados.", "fr": "Les membres du m\u00e9nage ne d\u00e9clarent pas se laver les mains lors d''un des moments critiques mentionn\u00e9s."}, "label": {"en": "None of the above", "es": "Ninguno de los anteriores", "fr": "Aucun des moments pr\u00e9cit\u00e9s"}}]}'
