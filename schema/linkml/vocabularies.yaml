  MuacBand:
    title:
      en: MUAC Band
      fr: Bande PB
      es: Banda PB
    description:
      en: The colour-coded MUAC screening band for children aged 6-59 months, derived from mid-upper arm circumference using WHO/UNICEF standard cutoffs.
      fr: La bande de dépistage du périmètre brachial codée par couleur pour les enfants de 6 à 59 mois, dérivée de la mesure du périmètre brachial selon les seuils standard OMS/UNICEF.
      es: La banda de tamizaje del perímetro braquial (PB) codificada por color para niños de 6 a 59 meses, derivada del perímetro braquial según los puntos de corte estándar OMS/UNICEF.
    enum_uri: aidops:MuacBand
    permissible_values:
      red:
        title:
          en: Red
          fr: Rouge
          es: Rojo
        description:
          en: MUAC < 115 mm. Severe acute malnutrition (SAM). Requires immediate referral for therapeutic treatment.
          fr: PB < 115 mm. Malnutrition aiguë sévère (MAS). Nécessite une orientation immédiate pour un traitement thérapeutique.
          es: PB < 115 mm. Desnutrición aguda grave (DAG). Requiere derivación inmediata para tratamiento terapéutico.
      yellow:
        title:
          en: Yellow
          fr: Jaune
          es: Amarillo
        description:
          en: MUAC 115-124 mm. Moderate acute malnutrition (MAM). Typically requires supplementary feeding.
          fr: PB 115-124 mm. Malnutrition aiguë modérée (MAM). Nécessite généralement une alimentation supplémentaire.
          es: PB 115-124 mm. Desnutrición aguda moderada (MAM). Generalmente requiere alimentación suplementaria.
      green:
        title:
          en: Green
          fr: Vert
          es: Verde
        description:
          en: MUAC >= 125 mm. Adequate nutritional status. No acute malnutrition detected.
          fr: PB >= 125 mm. État nutritionnel adéquat. Aucune malnutrition aiguë détectée.
          es: PB >= 125 mm. Estado nutricional adecuado. No se detecta desnutrición aguda.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-muac-cutoffs"], "definition": {"en": "The colour-coded MUAC screening band for children aged 6-59 months, derived from mid-upper arm circumference using WHO/UNICEF standard cutoffs.", "es": "La banda de tamizaje del per\u00edmetro braquial (PB) codificada por color para ni\u00f1os de 6 a 59 meses, derivada del per\u00edmetro braquial seg\u00fan los puntos de corte est\u00e1ndar OMS/UNICEF.", "fr": "La bande de d\u00e9pistage du p\u00e9rim\u00e8tre brachial cod\u00e9e par couleur pour les enfants de 6 \u00e0 59 mois, d\u00e9riv\u00e9e de la mesure du p\u00e9rim\u00e8tre brachial selon les seuils standard OMS/UNICEF."}, "id": "muac-band", "label": {"en": "MUAC Band", "es": "Banda PB", "fr": "Bande PB"}, "maturity": "draft", "standard": {"name": "WHO/UNICEF/WFP/UNSCN Joint Statement on Community-based Management of Acute Malnutrition (2007/2009)", "notes": "Cutoffs for children 6-59 months: red < 115 mm, yellow 115-124 mm, green >= 125 mm.", "uri": "https://www.who.int/publications/i/item/9789280641479"}, "values": [{"code": "red", "definition": {"en": "MUAC < 115 mm. Severe acute malnutrition (SAM). Requires immediate referral for therapeutic treatment.", "es": "PB < 115 mm. Desnutrici\u00f3n aguda grave (DAG). Requiere derivaci\u00f3n inmediata para tratamiento terap\u00e9utico.", "fr": "PB < 115 mm. Malnutrition aigu\u00eb s\u00e9v\u00e8re (MAS). N\u00e9cessite une orientation imm\u00e9diate pour un traitement th\u00e9rapeutique."}, "label": {"en": "Red", "es": "Rojo", "fr": "Rouge"}}, {"code": "yellow", "definition": {"en": "MUAC 115-124 mm. Moderate acute malnutrition (MAM). Typically requires supplementary feeding.", "es": "PB 115-124 mm. Desnutrici\u00f3n aguda moderada (MAM). Generalmente requiere alimentaci\u00f3n suplementaria.", "fr": "PB 115-124 mm. Malnutrition aigu\u00eb mod\u00e9r\u00e9e (MAM). N\u00e9cessite g\u00e9n\u00e9ralement une alimentation suppl\u00e9mentaire."}, "label": {"en": "Yellow", "es": "Amarillo", "fr": "Jaune"}}, {"code": "green", "definition": {"en": "MUAC >= 125 mm. Adequate nutritional status. No acute malnutrition detected.", "es": "PB >= 125 mm. Estado nutricional adecuado. No se detecta desnutrici\u00f3n aguda.", "fr": "PB >= 125 mm. \u00c9tat nutritionnel ad\u00e9quat. Aucune malnutrition aigu\u00eb d\u00e9tect\u00e9e."}, "label": {"en": "Green", "es": "Verde", "fr": "Vert"}}]}'
