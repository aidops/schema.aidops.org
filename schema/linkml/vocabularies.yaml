    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-fpma", "reach-jmmi", "wfp-mag-2021", "wfp-vam-monitoring"], "definition": {"en": "The fixed list of candidate commodity codes for which price and availability are collected on market monitoring visits. The basket composition is a survey design decision made at deployment time; typically 10\u201312 codes are selected for a given operational context. Core food basket of 10 items is recommended for food-security monitoring contexts. Additional context-specific codes are included for regional deployments. Sources: WFP VAM standard food basket, JMMI country commodity lists (Lebanon, Syria, Libya, Nigeria, Somalia, South Sudan), Sphere Handbook 2018 minimum food basket quantities, and FAO GIEWS FPMA commodity coverage.\n", "es": "La lista fija de c\u00f3digos de productos candidatos para los cuales se recopilan precios y disponibilidad en las visitas de monitoreo de mercados. La composici\u00f3n de la cesta es una decisi\u00f3n de dise\u00f1o de encuesta tomada en el momento del despliegue; normalmente se seleccionan 10 a 12 c\u00f3digos para un contexto operacional dado. Se recomienda una cesta alimentaria b\u00e1sica de 10 art\u00edculos para contextos de monitoreo de seguridad alimentaria. Fuentes: cesta alimentaria est\u00e1ndar WFP VAM, listas de productos JMMI por pa\u00eds, cantidades m\u00ednimas de la cesta alimentaria Sphere 2018 y cobertura de productos FAO GIEWS FPMA.\n", "fr": "La liste fixe de codes de produits candidats pour lesquels les prix et la disponibilit\u00e9 sont collect\u00e9s lors des visites de suivi des march\u00e9s. La composition du panier est une d\u00e9cision de conception d''enqu\u00eate prise au moment du d\u00e9ploiement ; g\u00e9n\u00e9ralement 10 \u00e0 12 codes sont s\u00e9lectionn\u00e9s pour un contexte op\u00e9rationnel donn\u00e9. Un panier alimentaire de base de 10 articles est recommand\u00e9 pour les contextes de suivi de la s\u00e9curit\u00e9 alimenta