  EoImpactType:
    title:
      en: Explosive ordnance impact type
      fr: Type d'impact des engins explosifs
      es: Tipo de impacto de artefactos explosivos
    description:
      en: Types of impact that explosive ordnance contamination has had on a household in the past 3 months. no_impact is mutually exclusive with all other codes. member_injured_killed should be recorded as a presence/absence flag only — do not capture count or names; detailed casualty data is the province of specialized mine action information systems (e.g., IMSMA). Based on IMAS EORE Guidance (2022); GICHD Mine Action Assessment Toolkit household module; UNMAS EORE household indicators.
      fr: Types d'impact que la contamination par des engins explosifs a eu sur un ménage au cours des 3 derniers mois. no_impact est mutuellement exclusif avec tous les autres codes. member_injured_killed doit être enregistré uniquement comme indicateur de présence/absence — ne pas capturer le nombre ou les noms ; les données détaillées sur les victimes relèvent des systèmes d'information spécialisés en action contre les mines (ex. IMSMA). Fondé sur les Directives EORE IMAS (2022) ; module ménage de la Boîte à outils d'évaluation des actions contre les mines GICHD ; indicateurs ménage EORE UNMAS.
      es: Tipos de impacto que la contaminación por artefactos explosivos ha tenido en un hogar en los últimos 3 meses. no_impact es mutuamente exclusivo con todos los demás códigos. member_injured_killed debe registrarse solo como indicador de presencia/ausencia — no capturar el recuento ni los nombres; los datos detallados sobre víctimas son competencia de sistemas especializados de información de acción contra minas (p. ej., IMSMA). Basado en la Guía EORE IMAS (2022); módulo de hogares del Kit de Herramientas de Evaluación de Acción contra Minas del GICHD; indicadores de hogar EORE del UNMAS.
    enum_uri: aidops:EoImpactType
    permissible_values:
      unable_to_cultivate_land:
        title:
          en: Unable to cultivate land
          fr: Incapable de cultiver la terre
          es: Imposibilitado de cultivar la tierra
        description:
          en: Explosive ordnance contamination prevents access to agricultural plots the household would otherwise farm.
          fr: La contamination par des engins explosifs empêche l'accès aux parcelles agricoles que le ménage cultiverait autrement.
          es: La contaminación por artefactos explosivos impide el acceso a parcelas agrícolas que el hogar de otro modo cultivaría.
      unable_to_access_water:
        title:
          en: Unable to access water source
          fr: Incapable d'accéder à une source d'eau
          es: Imposibilitado de acceder a una fuente de agua
        description:
          en: Explosive ordnance contamination blocks access to a water source (well, river, canal).
          fr: La contamination par des engins explosifs bloque l'accès à une source d'eau (puits, rivière, canal).
          es: La contaminación por artefactos explosivos bloquea el acceso a una fuente de agua (pozo, río, canal).
      cannot_use_route:
        title:
          en: Cannot use an important route
          fr: Impossible d'utiliser un itinéraire important
          es: Imposibilitado de usar una ruta importante
        description:
          en: Explosive ordnance contamination forces avoidance of a route needed for work, school, health services, or markets.
          fr: La contamination par des engins explosifs oblige à éviter un itinéraire nécessaire pour le travail, l'école, les services de santé ou les marchés.
          es: La contaminación por artefactos explosivos obliga a evitar una ruta necesaria para el trabajo, la escuela, los servicios de salud o los mercados.
      member_injured_killed:
        title:
          en: Member of household injured or killed
          fr: Un membre du ménage a été blessé ou tué
          es: Un miembro del hogar fue herido o muerto
        description:
          en: A household member suffered injury or death from an explosive ordnance incident in the past 3 months. Record as presence/absence only — do not capture count or names.
          fr: Un membre du ménage a subi des blessures ou a été tué lors d'un incident lié à des engins explosifs au cours des 3 derniers mois. Enregistrer uniquement comme présence/absence — ne pas capturer le nombre ou les noms.
          es: Un miembro del hogar sufrió heridas o murió en un incidente de artefactos explosivos en los últimos 3 meses. Registrar solo como presencia/ausencia — no capturar el recuento ni los nombres.
      member_avoided_area:
        title:
          en: Member avoids area out of fear
          fr: Un membre évite une zone par peur
          es: Un miembro evita una zona por miedo
        description:
          en: Household members proactively avoid a needed area because of known or suspected explosive ordnance contamination.
          fr: Les membres du ménage évitent de manière proactive une zone nécessaire en raison d'une contamination par des engins explosifs connue ou suspectée.
          es: Los miembros del hogar evitan proactivamente una zona necesaria por contaminación conocida o sospechada de artefactos explosivos.
      livestock_injured_killed:
        title:
          en: Livestock injured or killed
          fr: Bétail blessé ou tué
          es: Ganado herido o muerto
        description:
          en: Livestock were harmed by an explosive ordnance incident, affecting the household's assets and food security.
          fr: Le bétail a été blessé ou tué lors d'un incident lié à des engins explosifs, affectant les actifs et la sécurité alimentaire du ménage.
          es: El ganado fue dañado en un incidente de artefactos explosivos, afectando los activos y la seguridad alimentaria del hogar.
      no_impact:
        title:
          en: No specific impact
          fr: Aucun impact spécifique
          es: Sin impacto específico
        description:
          en: Household is aware of explosive ordnance in the area but has not experienced a specific impact. Mutually exclusive with all other codes in this vocabulary.
          fr: Le ménage est au courant de la présence d'engins explosifs dans la zone mais n'a pas subi d'impact spécifique. Mutuellement exclusif avec tous les autres codes de ce vocabulaire.
          es: El hogar está al tanto de artefactos explosivos en el área pero no ha experimentado un impacto específico. Mutuamente exclusivo con todos los demás códigos de este vocabulario.
