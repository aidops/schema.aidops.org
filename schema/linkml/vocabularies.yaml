  SanitationFacilityCondition:
    title:
      en: Sanitation Facility Condition
      fr: État de l'installation sanitaire
      es: Condición de la instalación sanitaria
    description:
      en: Observed condition of the toilet or latrine facility. Recorded by enumerator observation rather than self-report. Sphere minimum standards require that toilet facilities are clean, private, and safely sited. Condition assessment is used for WASH programme targeting and emergency response prioritization.
      fr: État observé des toilettes ou de la latrine. Enregistré par observation de l'énumérateur plutôt que par auto-déclaration. Les normes minimales Sphère exigent que les installations sanitaires soient propres, privées et situées en lieu sûr. L'évaluation de l'état est utilisée pour le ciblage des programmes WASH et la priorisation de la réponse aux urgences.
      es: Condición observada del inodoro o instalación de letrina. Registrada por observación del enumerador en lugar de autodeclaración. Los estándares mínimos de Esfera exigen que las instalaciones sanitarias estén limpias, sean privadas y estén ubicadas de forma segura. La evaluación de la condición se usa para la focalización de programas WASH y la priorización de respuesta a emergencias.
    enum_uri: aidops:SanitationFacilityCondition
    permissible_values:
      clean_and_functional:
        title:
          en: Clean and functional
          fr: Propre et fonctionnel
          es: Limpio y funcional
        description:
          en: The facility is structurally intact, in working order, and visibly clean with no significant odour or waste accumulation.
          fr: L'installation est structurellement intacte, en état de marche et visiblement propre, sans odeur significative ni accumulation de déchets.
          es: La instalación está estructuralmente intacta, en buen estado de funcionamiento y visiblemente limpia, sin olores significativos ni acumulación de residuos.
      functional_but_dirty:
        title:
          en: Functional but dirty
          fr: Fonctionnel mais sale
          es: Funcional pero sucio
        description:
          en: The facility is structurally intact and usable but is visibly soiled, has strong odour, or shows waste accumulation.
          fr: L'installation est structurellement intacte et utilisable, mais est visiblement souillée, dégage une forte odeur ou présente une accumulation de déchets.
          es: La instalación está estructuralmente intacta y es utilizable, pero está visiblemente sucia, tiene fuerte olor o muestra acumulación de residuos.
      functional_but_damaged:
        title:
          en: Functional but damaged
          fr: Fonctionnel mais endommagé
          es: Funcional pero dañado
        description:
          en: The facility is usable but has structural damage (broken slab, damaged door, leaking pipe) that requires repair.
          fr: L'installation est utilisable mais présente des dommages structurels (dalle brisée, porte endommagée, tuyau qui fuit) nécessitant une réparation.
          es: La instalación es utilizable pero tiene daños estructurales (losa rota, puerta dañada, tubería con fugas) que requieren reparación.
      non_functional:
        title:
          en: Non-functional (unusable)
          fr: Non fonctionnel (inutilisable)
          es: No funcional (inutilizable)
        description:
          en: The facility cannot be used due to structural collapse, full pit, broken flush mechanism, or other disabling condition.
          fr: L'installation ne peut pas être utilisée en raison d'un effondrement structurel, d'une fosse pleine, d'un mécanisme de chasse cassé ou d'une autre condition désactivante.
          es: La instalación no puede usarse debido a derrumbe estructural, fosa llena, mecanismo de descarga roto u otra condición que la inhabilita.
      unknown:
        title:
          en: Unknown / not observed
          fr: Inconnu / non observé
          es: Desconocido / no observado
        description:
          en: The condition of the facility could not be assessed because it was not accessible or observable at the time of the interview.
          fr: L'état de l'installation n'a pas pu être évalué car elle n'était pas accessible ou observable au moment de l'entretien.
          es: La condición de la instalación no pudo evaluarse porque no estaba accesible u observable en el momento de la entrevista.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Observed condition of the toilet or latrine facility. Recorded by enumerator observation rather than self-report. Sphere minimum standards require that toilet facilities are clean, private, and safely sited. Condition assessment is used for WASH programme targeting and emergency response prioritization.", "es": "Condici\u00f3n observada del inodoro o instalaci\u00f3n de letrina. Registrada por observaci\u00f3n del enumerador en lugar de autodeclaraci\u00f3n. Los est\u00e1ndares m\u00ednimos de Esfera exigen que las instalaciones sanitarias est\u00e9n limpias, sean privadas y est\u00e9n ubicadas de forma segura. La evaluaci\u00f3n de la condici\u00f3n se usa para la focalizaci\u00f3n de programas WASH y la priorizaci\u00f3n de respuesta a emergencias.", "fr": "\u00c9tat observ\u00e9 des toilettes ou de la latrine. Enregistr\u00e9 par observation de l''\u00e9num\u00e9rateur plut\u00f4t que par auto-d\u00e9claration. Les normes minimales Sph\u00e8re exigent que les installations sanitaires soient propres, priv\u00e9es et situ\u00e9es en lieu s\u00fbr. L''\u00e9valuation de l''\u00e9tat est utilis\u00e9e pour le ciblage des programmes WASH et la priorisation de la r\u00e9ponse aux urgences."}, "id": "sanitation-facility-condition", "label": {"en": "Sanitation Facility Condition", "es": "Condici\u00f3n de la instalaci\u00f3n sanitaria", "fr": "\u00c9tat de l''installation sanitaire"}, "maturity": "draft", "standard": {"name": "Sphere Handbook 2018 \u2014 Chapter 2: WASH", "notes": "Sphere guidance and ERWG WASH.HH.Sanitation module. Not a JMP standard vocabulary but used in operational assessments.", "uri": "https://spherestandards.org/handbook-2018/"}, "values": [{"code": "clean_and_functional", "definition": {"en": "The facility is structurally intact, in working order, and visibly clean with no significant odour or waste accumulation.", "es": "La instalaci\u00f3n est\u00e1 estructuralmente intacta, en buen estado de funcionamiento y visiblemente limpia, sin olores significativos ni acumulaci\u00f3n de residuos.", "fr": "L''installation est structurellement intacte, en \u00e9tat de marche et visiblement propre, sans odeur significative ni accumulation de d\u00e9chets."}, "label": {"en": "Clean and functional", "es": "Limpio y funcional", "fr": "Propre et fonctionnel"}}, {"code": "functional_but_dirty", "definition": {"en": "The facility is structurally intact and usable but is visibly soiled, has strong odour, or shows waste accumulation.", "es": "La instalaci\u00f3n est\u00e1 estructuralmente intacta y es utilizable, pero est\u00e1 visiblemente sucia, tiene fuerte olor o muestra acumulaci\u00f3n de residuos.", "fr": "L''installation est structurellement intacte et utilisable, mais est visiblement souill\u00e9e, d\u00e9gage une forte odeur ou pr\u00e9sente une accumulation de d\u00e9chets."}, "label": {"en": "Functional but dirty", "es": "Funcional pero sucio", "fr": "Fonctionnel mais sale"}}, {"code": "functional_but_damaged", "definition": {"en": "The facility is usable but has structural damage (broken slab, damaged door, leaking pipe) that requires repair.", "es": "La instalaci\u00f3n es utilizable pero tiene da\u00f1os estructurales (losa rota, puerta da\u00f1ada, tuber\u00eda con fugas) que requieren reparaci\u00f3n.", "fr": "L''installation est utilisable mais pr\u00e9sente des dommages structurels (dalle bris\u00e9e, porte endommag\u00e9e, tuyau qui fuit) n\u00e9cessitant une r\u00e9paration."}, "label": {"en": "Functional but damaged", "es": "Funcional pero da\u00f1ado", "fr": "Fonctionnel mais endommag\u00e9"}}, {"code": "non_functional", "definition": {"en": "The facility cannot be used due to structural collapse, full pit, broken flush mechanism, or other disabling condition.", "es": "La instalaci\u00f3n no puede usarse debido a derrumbe estructural, fosa llena, mecanismo de descarga roto u otra condici\u00f3n que la inhabilita.", "fr": "L''installation ne peut pas \u00eatre utilis\u00e9e en raison d''un effondrement structurel, d''une fosse pleine, d''un m\u00e9canisme de chasse cass\u00e9 ou d''une autre condition d\u00e9sactivante."}, "label": {"en": "Non-functional (unusable)", "es": "No funcional (inutilizable)", "fr": "Non fonctionnel (inutilisable)"}}, {"code": "unknown", "definition": {"en": "The condition of the facility could not be assessed because it was not accessible or observable at the time of the interview.", "es": "La condici\u00f3n de la instalaci\u00f3n no pudo evaluarse porque no estaba accesible u observable en el momento de la entrevista.", "fr": "L''\u00e9tat de l''installation n''a pas pu \u00eatre \u00e9valu\u00e9 car elle n''\u00e9tait pas accessible ou observable au moment de l''entretien."}, "label": {"en": "Unknown / not observed", "es": "Desconocido / no observado", "fr": "Inconnu / non observ\u00e9"}}]}'
