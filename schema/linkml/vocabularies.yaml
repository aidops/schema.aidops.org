en": "Selling productive assets", "es": "Venta de activos productivos", "fr": "Vente d''actifs productifs"}}, {"code": "migrate_for_work", "definition": {"en": "Individuals or families leaving the community to seek work elsewhere.", "es": "Personas o familias que salen de la comunidad para buscar trabajo en otro lugar.", "fr": "Individus ou familles quittant la communaut\u00e9 pour chercher du travail ailleurs."}, "label": {"en": "Migrating for work", "es": "Migraci\u00f3n por trabajo", "fr": "Migration pour le travail"}}, {"code": "remove_children_from_school", "definition": {"en": "Withdrawing children from school to save costs or to work.", "es": "Retiro de los ni\u00f1os de la escuela para ahorrar costos o para que trabajen.", "fr": "Retrait des enfants de l''\u00e9cole pour \u00e9conomiser ou pour qu''ils travaillent."}, "label": {"en": "Removing children from school", "es": "Retiro de los ni\u00f1os de la escuela", "fr": "Retrait des enfants de l''\u00e9cole"}}, {"code": "child_labour", "definition": {"en": "Children working to contribute to household income.", "es": "Ni\u00f1os que trabajan para contribuir al ingreso del hogar.", "fr": "Enfants travaillant pour contribuer au revenu du m\u00e9nage."}, "label": {"en": "Child labour", "es": "Trabajo infantil", "fr": "Travail des enfants"}}, {"code": "early_marriage", "definition": {"en": "Marriage of girls or boys under age 18 as a coping response.", "es": "Matrimonio de ni\u00f1as o ni\u00f1os menores de 18 a\u00f1os como respuesta de afrontamiento.", "fr": "Mariage de filles ou de gar\u00e7ons de moins de 18 ans comme r\u00e9ponse d''adaptation."}, "label": {"en": "Early marriage", "es": "Matrimonio precoz", "fr": "Mariage pr\u00e9coce"}}, {"code": "begging", "definition": {"en": "Asking for food, cash, or goods in public.", "es": "Pedir alimentos, dinero o bienes en p\u00fablico.", "fr": "Demander de la nourriture, de l''argent ou des biens en public."}, "label": {"en": "Begging", "es": "Mendicidad", "fr": "Mendicit\u00e9"}}, {"code": "risky_livelihoods", "definition": {"en": "Activities that put people at physical, legal, or social risk.", "es": "Actividades que ponen a las personas en riesgo f\u00edsico, legal o social.", "fr": "Activit\u00e9s exposant les personnes \u00e0 un risque physique, juridique ou social."}, "label": {"en": "Engaging in risky or illegal livelihoods", "es": "Realizaci\u00f3n de medios de vida riesgosos o ilegales", "fr": "Recours \u00e0 des moyens d''existence risqu\u00e9s ou ill\u00e9gaux"}}, {"code": "reduce_health_spending", "definition": {"en": "Foregoing medical visits or medicines.", "es": "Omisi\u00f3n de visitas m\u00e9dicas o medicamentos.", "fr": "Renoncement aux visites m\u00e9dicales ou aux m\u00e9dicaments."}, "label": {"en": "Reducing spending on health care", "es": "Reducci\u00f3n del gasto en atenci\u00f3n de salud", "fr": "R\u00e9duction des d\u00e9penses de sant\u00e9"}}, {"code": "share_housing", "definition": {"en": "Multiple households sharing a single dwelling.", "es": "Varios hogares comparten una sola vivienda.", "fr": "Plusieurs m\u00e9nages partagent un seul logement."}, "label": {"en": "Doubling up or sharing housing", "es": "Hacinamiento o compartir vivienda", "fr": "Cohabitation ou partage du logement"}}, {"code": "receive_remittances", "definition": {"en": "Relying on money sent by relatives outside the community.", "es": "Dependencia del dinero enviado por familiares fuera de la comunidad.", "fr": "D\u00e9pendance \u00e0 l''\u00e9gard de l''argent envoy\u00e9 par des proches hors de la communaut\u00e9."}, "label": {"en": "Depending on remittances", "es": "Dependencia de remesas", "fr": "D\u00e9pendance vis-\u00e0-vis des envois de fonds"}}, {"code": "community_solidarity", "definition": {"en": "Community or diaspora organising collective support.", "es": "Comunidad o di\u00e1spora que organiza apoyo colectivo.", "fr": "Communaut\u00e9 ou diaspora organisant un soutien collectif."}, "label": {"en": "Community solidarity / mutual aid", "es": "Solidaridad comunitaria / ayuda mutua", "fr": "Solidarit\u00e9 communautaire / entraide"}}, {"code": "none_observed", "definition": {"en": "No coping strategies observed or reported.", "es": "No se observan ni reportan estrategias de afrontamiento.", "fr": "Aucune strat\u00e9gie d''adaptation observ\u00e9e ou rapport\u00e9e."}, "label": {"en": "None of the above", "es": "Ninguna de las anteriores", "fr": "Aucune des strat\u00e9gies ci-dessus"}}, {"code": "dont_know", "definition": {"en": "The respondents do not know which coping strategies are in use. A valid response, not to be re-coded as ''none''.", "es": "Los encuestados no saben qu\u00e9 estrategias de afrontamiento est\u00e1n en uso. Respuesta v\u00e1lida que no debe recodificarse como \u00abninguna\u00bb.", "fr": "Les r\u00e9pondants ne savent pas quelles strat\u00e9gies d''adaptation sont utilis\u00e9es. R\u00e9ponse valide qui ne doit pas \u00eatre recod\u00e9e comme \u00ab aucune \u00bb."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
