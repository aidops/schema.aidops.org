  WeaiDecisionInput4:
    title:
      en: WEAI Decision Input Scale
      fr: Échelle de participation aux décisions WEAI
      es: Escala de participación en decisiones WEAI
    description:
      en: Four-point scale for the degree of input a respondent had in productive or income-use decisions, used in pro-WEAI Indicators B1 (input in productive decisions) and B4 (control over use of income). Adequacy for B1 requires code 3 (input into most or all decisions), or code 2 combined with high perceived capacity (Indicator B1, condition B). Adequacy for B4 requires code 2 or 3.
      fr: Échelle en quatre points pour le degré de participation du répondant aux décisions productives ou d'utilisation du revenu, utilisée dans les indicateurs B1 (participation aux décisions productives) et B4 (contrôle de l'utilisation du revenu) du pro-WEAI. L'adéquation pour B1 nécessite le code 3 (participation à la plupart ou à toutes les décisions), ou le code 2 combiné à une capacité perçue élevée (Indicateur B1, condition B). L'adéquation pour B4 nécessite le code 2 ou 3.
      es: Escala de cuatro puntos para el grado de participación de un encuestado en decisiones productivas o de uso de ingresos, utilizada en los indicadores B1 (participación en decisiones productivas) y B4 (control sobre el uso de ingresos) del pro-WEAI. La adecuación para B1 requiere el código 3 (participación en la mayoría o en todas las decisiones), o el código 2 combinado con alta capacidad percibida (Indicador B1, condición B). La adecuación para B4 requiere el código 2 o 3.
    enum_uri: aidops:WeaiDecisionInput4
    permissible_values:
      little_to_no_input:
        title:
          en: Little to no input
          fr: Peu ou pas de participation
          es: Poca o ninguna participación
        description:
          en: The respondent had little or no input in decisions about this activity or income. Code 1.
          fr: Le répondant a eu peu ou pas de participation aux décisions concernant cette activité ou ce revenu. Code 1.
          es: El encuestado tuvo poca o ninguna participación en las decisiones sobre esta actividad o ingreso. Código 1.
      input_some_decisions:
        title:
          en: Input into some decisions
          fr: Participation à certaines décisions
          es: Participación en algunas decisiones
        description:
          en: The respondent had input into some decisions but not most or all. Code 2. Meets B4 adequacy; meets B1 adequacy only if perceived capacity is also medium or high.
          fr: Le répondant a participé à certaines décisions mais pas à la plupart ou à toutes. Code 2. Satisfait à l'adéquation B4 ; satisfait à l'adéquation B1 seulement si la capacité perçue est également moyenne ou élevée.
          es: El encuestado tuvo participación en algunas decisiones pero no en la mayoría o todas. Código 2. Cumple adecuación B4; cumple adecuación B1 solo si la capacidad percibida también es media o alta.
      input_most_all_decisions:
        title:
          en: Input into most or all decisions
          fr: Participation à la plupart ou à toutes les décisions
          es: Participación en la mayoría o en todas las decisiones
        description:
          en: The respondent had input into most or all decisions about this activity or income. Code 3. Meets B1 and B4 adequacy.
          fr: Le répondant a participé à la plupart ou à toutes les décisions concernant cette activité ou ce revenu. Code 3. Satisfait à l'adéquation B1 et B4.
          es: El encuestado tuvo participación en la mayoría o en todas las decisiones sobre esta actividad o ingreso. Código 3. Cumple adecuación B1 y B4.
      not_applicable:
        title:
          en: Not applicable
          fr: Non applicable
          es: No aplica
        description:
          en: The activity was not undertaken or no income was generated; no decision existed. This response is excluded from the adequacy calculation for the activity.
          fr: L'activité n'a pas été entreprise ou aucun revenu n'a été généré ; aucune décision n'existait. Cette réponse est exclue du calcul de l'adéquation pour l'activité.
          es: La actividad no se realizó o no se generó ingreso; no existió ninguna decisión. Esta respuesta se excluye del cálculo de adecuación para la actividad.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Four-point scale for the degree of input a respondent had in productive or income-use decisions, used in pro-WEAI Indicators B1 (input in productive decisions) and B4 (control over use of income). Adequacy for B1 requires code 3 (input into most or all decisions), or code 2 combined with high perceived capacity (Indicator B1, condition B). Adequacy for B4 requires code 2 or 3.", "es": "Escala de cuatro puntos para el grado de participaci\u00f3n de un encuestado en decisiones productivas o de uso de ingresos, utilizada en los indicadores B1 (participaci\u00f3n en decisiones productivas) y B4 (control sobre el uso de ingresos) del pro-WEAI. La adecuaci\u00f3n para B1 requiere el c\u00f3digo 3 (participaci\u00f3n en la mayor\u00eda o en todas las decisiones), o el c\u00f3digo 2 combinado con alta capacidad percibida (Indicador B1, condici\u00f3n B). La adecuaci\u00f3n para B4 requiere el c\u00f3digo 2 o 3.", "fr": "\u00c9chelle en quatre points pour le degr\u00e9 de participation du r\u00e9pondant aux d\u00e9cisions productives ou d''utilisation du revenu, utilis\u00e9e dans les indicateurs B1 (participation aux d\u00e9cisions productives) et B4 (contr\u00f4le de l''utilisation du revenu) du pro-WEAI. L''ad\u00e9quation pour B1 n\u00e9cessite le code 3 (participation \u00e0 la plupart ou \u00e0 toutes les d\u00e9cisions), ou le code 2 combin\u00e9 \u00e0 une capacit\u00e9 per\u00e7ue \u00e9lev\u00e9e (Indicateur B1, condition B). L''ad\u00e9quation pour B4 n\u00e9cessite le code 2 ou 3."}, "id": "weai-decision-input-4", "label": {"en": "WEAI Decision Input Scale", "es": "Escala de participaci\u00f3n en decisiones WEAI", "fr": "\u00c9chelle de participation aux d\u00e9cisions WEAI"}, "maturity": "draft", "standard": {"name": "pro-WEAI User Guide v3 (IFPRI 2026)", "uri": "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"}, "values": [{"code": "little_to_no_input", "definition": {"en": "The respondent had little or no input in decisions about this activity or income. Code 1.", "es": "El encuestado tuvo poca o ninguna participaci\u00f3n en las decisiones sobre esta actividad o ingreso. C\u00f3digo 1.", "fr": "Le r\u00e9pondant a eu peu ou pas de participation aux d\u00e9cisions concernant cette activit\u00e9 ou ce revenu. Code 1."}, "label": {"en": "Little to no input", "es": "Poca o ninguna participaci\u00f3n", "fr": "Peu ou pas de participation"}}, {"code": "input_some_decisions", "definition": {"en": "The respondent had input into some decisions but not most or all. Code 2. Meets B4 adequacy; meets B1 adequacy only if perceived capacity is also medium or high.", "es": "El encuestado tuvo participaci\u00f3n en algunas decisiones pero no en la mayor\u00eda o todas. C\u00f3digo 2. Cumple adecuaci\u00f3n B4; cumple adecuaci\u00f3n B1 solo si la capacidad percibida tambi\u00e9n es media o alta.", "fr": "Le r\u00e9pondant a particip\u00e9 \u00e0 certaines d\u00e9cisions mais pas \u00e0 la plupart ou \u00e0 toutes. Code 2. Satisfait \u00e0 l''ad\u00e9quation B4 ; satisfait \u00e0 l''ad\u00e9quation B1 seulement si la capacit\u00e9 per\u00e7ue est \u00e9galement moyenne ou \u00e9lev\u00e9e."}, "label": {"en": "Input into some decisions", "es": "Participaci\u00f3n en algunas decisiones", "fr": "Participation \u00e0 certaines d\u00e9cisions"}}, {"code": "input_most_all_decisions", "definition": {"en": "The respondent had input into most or all decisions about this activity or income. Code 3. Meets B1 and B4 adequacy.", "es": "El encuestado tuvo participaci\u00f3n en la mayor\u00eda o en todas las decisiones sobre esta actividad o ingreso. C\u00f3digo 3. Cumple adecuaci\u00f3n B1 y B4.", "fr": "Le r\u00e9pondant a particip\u00e9 \u00e0 la plupart ou \u00e0 toutes les d\u00e9cisions concernant cette activit\u00e9 ou ce revenu. Code 3. Satisfait \u00e0 l''ad\u00e9quation B1 et B4."}, "label": {"en": "Input into most or all decisions", "es": "Participaci\u00f3n en la mayor\u00eda o en todas las decisiones", "fr": "Participation \u00e0 la plupart ou \u00e0 toutes les d\u00e9cisions"}}, {"code": "not_applicable", "definition": {"en": "The activity was not undertaken or no income was generated; no decision existed. This response is excluded from the adequacy calculation for the activity.", "es": "La actividad no se realiz\u00f3 o no se gener\u00f3 ingreso; no existi\u00f3 ninguna decisi\u00f3n. Esta respuesta se excluye del c\u00e1lculo de adecuaci\u00f3n para la actividad.", "fr": "L''activit\u00e9 n''a pas \u00e9t\u00e9 entreprise ou aucun revenu n''a \u00e9t\u00e9 g\u00e9n\u00e9r\u00e9 ; aucune d\u00e9cision n''existait. Cette r\u00e9ponse est exclue du calcul de l''ad\u00e9quation pour l''activit\u00e9."}, "label": {"en": "Not applicable", "es": "No aplica", "fr": "Non applicable"}}]}'
