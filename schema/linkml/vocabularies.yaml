  LcsBand:
    title:
      en: LCS Band
      fr: Niveau SCM
      es: Nivel EMV
    description:
      en: Four-level severity classification of household livelihood coping, derived from the WFP Livelihood Coping Strategies (LCS) module. The household is assigned the highest severity tier of any strategy it adopted (responded 'yes' or 'already exhausted'). If no strategy was adopted, the household is classified as 'none'.
      fr: Classification de sévérité à quatre niveaux des stratégies de moyens d'existence du ménage, dérivée du module Livelihood Coping Strategies (LCS) du PAM. Le ménage est classé au niveau de sévérité le plus élevé de toute stratégie adoptée (réponse « oui » ou « déjà épuisée »). Si aucune stratégie n'a été adoptée, le ménage est classé « aucune ».
      es: Clasificación de severidad de cuatro niveles de las estrategias de medios de vida del hogar, derivada del módulo Livelihood Coping Strategies (LCS) del PMA. El hogar se clasifica en el nivel de severidad más alto de cualquier estrategia adoptada (respuesta «sí» o «ya agotada»). Si no se adoptó ninguna estrategia, el hogar se clasifica como «ninguna».
    enum_uri: aidops:LcsBand
    permissible_values:
      none:
        title:
          en: No coping
          fr: Aucune stratégie
          es: Sin estrategia
        description:
          en: The household did not adopt any livelihood coping strategy in the reference period. All strategies were answered 'never' or 'not applicable'.
          fr: Le ménage n'a adopté aucune stratégie de moyens d'existence pendant la période de référence. Toutes les stratégies ont reçu la réponse « jamais » ou « non applicable ».
          es: El hogar no adoptó ninguna estrategia de medios de vida durante el período de referencia. Todas las estrategias recibieron la respuesta «nunca» o «no aplica».
      stress:
        title:
          en: Stress
          fr: Stress
          es: Estrés
        description:
          en: The household adopted at least one stress-tier strategy (spent savings, sold household items, reduced non-food expenses, borrowed money for food) but no crisis or emergency strategy. Stress strategies are reversible and do not erode future productive capacity.
          fr: Le ménage a adopté au moins une stratégie de niveau stress (dépense des économies, vente d'articles ménagers, réduction des dépenses non alimentaires, emprunt d'argent pour la nourriture) mais aucune stratégie de crise ou d'urgence. Les stratégies de stress sont réversibles et n'érodent pas la capacité productive future.
          es: El hogar adoptó al menos una estrategia de nivel de estrés (gasto de ahorros, venta de artículos del hogar, reducción de gastos no alimentarios, préstamo de dinero para alimentos) pero ninguna estrategia de crisis o emergencia. Las estrategias de estrés son reversibles y no erosionan la capacidad productiva futura.
      crisis:
        title:
          en: Crisis
          fr: Crise
          es: Crisis
        description:
          en: The household adopted at least one crisis-tier strategy (sold productive assets, withdrew children from school, reduced essential non-food expenditure) but no emergency strategy. Crisis strategies erode future productive capacity and are harder to reverse.
          fr: Le ménage a adopté au moins une stratégie de niveau crise (vente d'actifs productifs, retrait d'enfants de l'école, réduction de dépenses non alimentaires essentielles) mais aucune stratégie d'urgence. Les stratégies de crise érodent la capacité productive future et sont plus difficiles à inverser.
          es: El hogar adoptó al menos una estrategia de nivel de crisis (venta de activos productivos, retiro de niños de la escuela, reducción de gastos no alimentarios esenciales) pero ninguna estrategia de emergencia. Las estrategias de crisis erosionan la capacidad productiva futura y son más difíciles de revertir.
      emergency:
        title:
          en: Emergency
          fr: Urgence
          es: Emergencia
        description:
          en: The household adopted at least one emergency-tier strategy (consumed seed stock, harvested immature crops, sold house or land, whole-household migration, child labour, early marriage, begging). Emergency strategies represent irreversible depletion of assets or adoption of socially harmful practices.
          fr: Le ménage a adopté au moins une stratégie de niveau urgence (consommation des semences, récolte de cultures immatures, vente de la maison ou du terrain, migration de tout le ménage, travail des enfants, mariage précoce, mendicité). Les stratégies d'urgence représentent un épuisement irréversible des actifs ou l'adoption de pratiques socialement nuisibles.
          es: El hogar adoptó al menos una estrategia de nivel de emergencia (consumo de semillas, cosecha de cultivos inmaduros, venta de vivienda o tierra, migración de todo el hogar, trabajo infantil, matrimonio precoz, mendicidad). Las estrategias de emergencia representan un agotamiento irreversible de activos o la adopción de prácticas socialmente dañinas.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["wfp-lcs"], "definition": {"en": "Four-level severity classification of household livelihood coping, derived from the WFP Livelihood Coping Strategies (LCS) module. The household is assigned the highest severity tier of any strategy it adopted (responded ''yes'' or ''already exhausted''). If no strategy was adopted, the household is classified as ''none''.", "es": "Clasificaci\u00f3n de severidad de cuatro niveles de las estrategias de medios de vida del hogar, derivada del m\u00f3dulo Livelihood Coping Strategies (LCS) del PMA. El hogar se clasifica en el nivel de severidad m\u00e1s alto de cualquier estrategia adoptada (respuesta \u00abs\u00ed\u00bb o \u00abya agotada\u00bb). Si no se adopt\u00f3 ninguna estrategia, el hogar se clasifica como \u00abninguna\u00bb.", "fr": "Classification de s\u00e9v\u00e9rit\u00e9 \u00e0 quatre niveaux des strat\u00e9gies de moyens d''existence du m\u00e9nage, d\u00e9riv\u00e9e du module Livelihood Coping Strategies (LCS) du PAM. Le m\u00e9nage est class\u00e9 au niveau de s\u00e9v\u00e9rit\u00e9 le plus \u00e9lev\u00e9 de toute strat\u00e9gie adopt\u00e9e (r\u00e9ponse \u00ab oui \u00bb ou \u00ab d\u00e9j\u00e0 \u00e9puis\u00e9e \u00bb). Si aucune strat\u00e9gie n''a \u00e9t\u00e9 adopt\u00e9e, le m\u00e9nage est class\u00e9 \u00ab aucune \u00bb."}, "id": "lcs-band", "label": {"en": "LCS Band", "es": "Nivel EMV", "fr": "Niveau SCM"}, "maturity": "draft", "standard": {"name": "WFP CARI Guidelines (3rd edition, 2021)", "notes": "Section 3.3 Livelihood Coping Strategies. Strategies are grouped into three severity tiers (stress, crisis, emergency). The household classification is determined by the highest-severity strategy adopted.", "uri": "https://docs.wfp.org/api/documents/WFP-0000134704/download/"}, "values": [{"code": "none", "definition": {"en": "The household did not adopt any livelihood coping strategy in the reference period. All strategies were answered ''never'' or ''not applicable''.", "es": "El hogar no adopt\u00f3 ninguna estrategia de medios de vida durante el per\u00edodo de referencia. Todas las estrategias recibieron la respuesta \u00abnunca\u00bb o \u00abno aplica\u00bb.", "fr": "Le m\u00e9nage n''a adopt\u00e9 aucune strat\u00e9gie de moyens d''existence pendant la p\u00e9riode de r\u00e9f\u00e9rence. Toutes les strat\u00e9gies ont re\u00e7u la r\u00e9ponse \u00ab jamais \u00bb ou \u00ab non applicable \u00bb."}, "label": {"en": "No coping", "es": "Sin estrategia", "fr": "Aucune strat\u00e9gie"}}, {"code": "stress", "definition": {"en": "The household adopted at least one stress-tier strategy (spent savings, sold household items, reduced non-food expenses, borrowed money for food) but no crisis or emergency strategy. Stress strategies are reversible and do not erode future productive capacity.", "es": "El hogar adopt\u00f3 al menos una estrategia de nivel de estr\u00e9s (gasto de ahorros, venta de art\u00edculos del hogar, reducci\u00f3n de gastos no alimentarios, pr\u00e9stamo de dinero para alimentos) pero ninguna estrategia de crisis o emergencia. Las estrategias de estr\u00e9s son reversibles y no erosionan la capacidad productiva futura.", "fr": "Le m\u00e9nage a adopt\u00e9 au moins une strat\u00e9gie de niveau stress (d\u00e9pense des \u00e9conomies, vente d''articles m\u00e9nagers, r\u00e9duction des d\u00e9penses non alimentaires, emprunt d''argent pour la nourriture) mais aucune strat\u00e9gie de crise ou d''urgence. Les strat\u00e9gies de stress sont r\u00e9versibles et n''\u00e9rodent pas la capacit\u00e9 productive future."}, "label": {"en": "Stress", "es": "Estr\u00e9s", "fr": "Stress"}}, {"code": "crisis", "definition": {"en": "The household adopted at least one crisis-tier strategy (sold productive assets, withdrew children from school, reduced essential non-food expenditure) but no emergency strategy. Crisis strategies erode future productive capacity and are harder to reverse.", "es": "El hogar adopt\u00f3 al menos una estrategia de nivel de crisis (venta de activos productivos, retiro de ni\u00f1os de la escuela, reducci\u00f3n de gastos no alimentarios esenciales) pero ninguna estrategia de emergencia. Las estrategias de crisis erosionan la capacidad productiva futura y son m\u00e1s dif\u00edciles de revertir.", "fr": "Le m\u00e9nage a adopt\u00e9 au moins une strat\u00e9gie de niveau crise (vente d''actifs productifs, retrait d''enfants de l''\u00e9cole, r\u00e9duction de d\u00e9penses non alimentaires essentielles) mais aucune strat\u00e9gie d''urgence. Les strat\u00e9gies de crise \u00e9rodent la capacit\u00e9 productive future et sont plus difficiles \u00e0 inverser."}, "label": {"en": "Crisis", "es": "Crisis", "fr": "Crise"}}, {"code": "emergency", "definition": {"en": "The household adopted at least one emergency-tier strategy (consumed seed stock, harvested immature crops, sold house or land, whole-household migration, child labour, early marriage, begging). Emergency strategies represent irreversible depletion of assets or adoption of socially harmful practices.", "es": "El hogar adopt\u00f3 al menos una estrategia de nivel de emergencia (consumo de semillas, cosecha de cultivos inmaduros, venta de vivienda o tierra, migraci\u00f3n de todo el hogar, trabajo infantil, matrimonio precoz, mendicidad). Las estrategias de emergencia representan un agotamiento irreversible de activos o la adopci\u00f3n de pr\u00e1cticas socialmente da\u00f1inas.", "fr": "Le m\u00e9nage a adopt\u00e9 au moins une strat\u00e9gie de niveau urgence (consommation des semences, r\u00e9colte de cultures immatures, vente de la maison ou du terrain, migration de tout le m\u00e9nage, travail des enfants, mariage pr\u00e9coce, mendicit\u00e9). Les strat\u00e9gies d''urgence repr\u00e9sentent un \u00e9puisement irr\u00e9versible des actifs ou l''adoption de pratiques socialement nuisibles."}, "label": {"en": "Emergency", "es": "Emergencia", "fr": "Urgence"}}]}'
