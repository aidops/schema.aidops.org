  CareCoverageExtent:
    title:
      en: Care Coverage Extent
      fr: Étendue de la couverture des soins
      es: Alcance de la cobertura de la atención
    description:
      en: Three-level scale describing whether a household-level care or treatment outcome was achieved for all members who needed it, for some but not all members, or for none. Used by `hh_member_sought_care_30d` and `chronic_receiving_treatment` in HealthAccessProfile. 'yes_some' flags partial coverage within the household and is a distinct condition from both full coverage and complete failure to access care.
      fr: Échelle à trois niveaux décrivant si un résultat de soins ou de traitement au niveau du ménage a été obtenu pour tous les membres qui en avaient besoin, pour certains mais pas tous, ou pour aucun. Utilisée par `hh_member_sought_care_30d` et `chronic_receiving_treatment` dans HealthAccessProfile. « yes_some » signale une couverture partielle au sein du ménage et constitue une condition distincte à la fois d'une couverture complète et d'un échec total d'accès aux soins.
      es: Escala de tres niveles que describe si un resultado de atención o tratamiento a nivel del hogar se logró para todos los miembros que lo necesitaban, para algunos pero no todos, o para ninguno. Utilizada por `hh_member_sought_care_30d` y `chronic_receiving_treatment` en HealthAccessProfile. 'yes_some' señala una cobertura parcial dentro del hogar y constituye una condición distinta tanto de la cobertura completa como de la falta total de acceso a la atención.
    enum_uri: aidops:CareCoverageExtent
    permissible_values:
      yes_all:
        title:
          en: Yes, all members
          fr: Oui, tous les membres
          es: Sí, todos los miembros
        description:
          en: All household members who needed care or treatment received it.
          fr: Tous les membres du ménage qui avaient besoin de soins ou de traitement en ont reçu.
          es: Todos los miembros del hogar que necesitaban atención o tratamiento la recibieron.
      yes_some:
        title:
          en: Yes, some but not all
          fr: Oui, certains mais pas tous
          es: Sí, algunos pero no todos
        description:
          en: Some but not all of the household members who needed care or treatment received it. Flags partial unmet need within the household.
          fr: Certains mais pas tous les membres du ménage qui avaient besoin de soins ou de traitement en ont reçu. Signale un besoin non satisfait partiel au sein du ménage.
          es: Algunos, pero no todos los miembros del hogar que necesitaban atención o tratamiento la recibieron. Señala una necesidad insatisfecha parcial dentro del hogar.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: No household member received the needed care or treatment.
          fr: Aucun membre du ménage n'a reçu les soins ou le traitement nécessaires.
          es: Ningún miembro del hogar recibió la atención o el tratamiento necesarios.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-pvs-2023"], "definition": {"en": "Three-level scale describing whether a household-level care or treatment outcome was achieved for all members who needed it, for some but not all members, or for none. Used by `hh_member_sought_care_30d` and `chronic_receiving_treatment` in HealthAccessProfile. ''yes_some'' flags partial coverage within the household and is a distinct condition from both full coverage and complete failure to access care.", "es": "Escala de tres niveles que describe si un resultado de atenci\u00f3n o tratamiento a nivel del hogar se logr\u00f3 para todos los miembros que lo necesitaban, para algunos pero no todos, o para ninguno. Utilizada por `hh_member_sought_care_30d` y `chronic_receiving_treatment` en HealthAccessProfile. ''yes_some'' se\u00f1ala una cobertura parcial dentro del hogar y constituye una condici\u00f3n distinta tanto de la cobertura completa como de la falta total de acceso a la atenci\u00f3n.", "fr": "\u00c9chelle \u00e0 trois niveaux d\u00e9crivant si un r\u00e9sultat de soins ou de traitement au niveau du m\u00e9nage a \u00e9t\u00e9 obtenu pour tous les membres qui en avaient besoin, pour certains mais pas tous, ou pour aucun. Utilis\u00e9e par `hh_member_sought_care_30d` et `chronic_receiving_treatment` dans HealthAccessProfile. \u00ab yes_some \u00bb signale une couverture partielle au sein du m\u00e9nage et constitue une condition distincte \u00e0 la fois d''une couverture compl\u00e8te et d''un \u00e9chec total d''acc\u00e8s aux soins."}, "id": "care-coverage-extent", "label": {"en": "Care Coverage Extent", "es": "Alcance de la cobertura de la atenci\u00f3n", "fr": "\u00c9tendue de la couverture des soins"}, "maturity": "draft", "values": [{"code": "yes_all", "definition": {"en": "All household members who needed care or treatment received it.", "es": "Todos los miembros del hogar que necesitaban atenci\u00f3n o tratamiento la recibieron.", "fr": "Tous les membres du m\u00e9nage qui avaient besoin de soins ou de traitement en ont re\u00e7u."}, "label": {"en": "Yes, all members", "es": "S\u00ed, todos los miembros", "fr": "Oui, tous les membres"}}, {"code": "yes_some", "definition": {"en": "Some but not all of the household members who needed care or treatment received it. Flags partial unmet need within the household.", "es": "Algunos, pero no todos los miembros del hogar que necesitaban atenci\u00f3n o tratamiento la recibieron. Se\u00f1ala una necesidad insatisfecha parcial dentro del hogar.", "fr": "Certains mais pas tous les membres du m\u00e9nage qui avaient besoin de soins ou de traitement en ont re\u00e7u. Signale un besoin non satisfait partiel au sein du m\u00e9nage."}, "label": {"en": "Yes, some but not all", "es": "S\u00ed, algunos pero no todos", "fr": "Oui, certains mais pas tous"}}, {"code": "no", "definition": {"en": "No household member received the needed care or treatment.", "es": "Ning\u00fan miembro del hogar recibi\u00f3 la atenci\u00f3n o el tratamiento necesarios.", "fr": "Aucun membre du m\u00e9nage n''a re\u00e7u les soins ou le traitement n\u00e9cessaires."}, "label": {"en": "No", "es": "No", "fr": "Non"}}]}'
      bibliography_refs: who-pvs-2023
  CareSatisfaction5:
    title:
      en: Care Satisfaction (5-level)
      fr: Satisfaction à l'égard des soins (5 niveaux)
      es: Satisfacción con la atención (5 niveles)
    description:
      en: Four-point symmetric satisfaction scale plus 'don't know' used to rate the overall experience of care received by a household member. Used by `care_satisfaction` in HealthAccessProfile. Aligned with the WHO People's Voice Survey care-experience domain ('Overall, how would you rate the quality of health care you received?').
      fr: Échelle de satisfaction symétrique à quatre niveaux plus « ne sait pas » utilisée pour évaluer l'expérience globale des soins reçus par un membre du ménage. Utilisée par `care_satisfaction` dans HealthAccessProfile. Alignée sur le domaine « expérience de soins » de l'enquête People's Voice Survey de l'OMS (« Globalement, comment évalueriez-vous la qualité des soins de santé que vous avez reçus ? »).
      es: Escala de satisfacción simétrica de cuatro niveles más 'no sabe' utilizada para calificar la experiencia general de la atención recibida por un miembro del hogar. Utilizada por `care_satisfaction` en HealthAccessProfile. Alineada con el dominio 'experiencia de atención' de la People's Voice Survey de la OMS ('En general, ¿cómo calificaría la calidad de la atención de salud que recibió?').
    enum_uri: aidops:CareSatisfaction5
    permissible_values:
      very_satisfied:
        title:
          en: Very satisfied
          fr: Très satisfait(e)
          es: Muy satisfecho(a)
        description:
          en: The respondent was very satisfied with the care received.
          fr: Le répondant était très satisfait des soins reçus.
          es: El encuestado estaba muy satisfecho con la atención recibida.
      somewhat_satisfied:
        title:
          en: Somewhat satisfied
          fr: Plutôt satisfait(e)
          es: Algo satisfecho(a)
        description:
          en: The respondent was somewhat satisfied with the care received.
          fr: Le répondant était plutôt satisfait des soins reçus.
          es: El encuestado estaba algo satisfecho con la atención recibida.
      somewhat_dissatisfied:
        title:
          en: Somewhat dissatisfied
          fr: Plutôt insatisfait(e)
          es: Algo insatisfecho(a)
        description:
          en: The respondent was somewhat dissatisfied with the care received.
          fr: Le répondant était plutôt insatisfait des soins reçus.
          es: El encuestado estaba algo insatisfecho con la atención recibida.
      very_dissatisfied:
        title:
          en: Very dissatisfied
          fr: Très insatisfait(e)
          es: Muy insatisfecho(a)
        description:
          en: The respondent was very dissatisfied with the care received.
          fr: Le répondant était très insatisfait des soins reçus.
          es: El encuestado estaba muy insatisfecho con la atención recibida.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent cannot rate the care received. Valid response; must not be re-coded as missing.
          fr: Le répondant ne peut pas évaluer les soins reçus. Réponse valide ; ne doit pas être recodée comme manquante.
          es: El encuestado no puede calificar la atención recibida. Respuesta válida; no debe recodificarse como faltante.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-pvs-2023"], "definition": {"en": "Four-point symmetric satisfaction scale plus ''don''t know'' used to rate the overall experience of care received by a household member. Used by `care_satisfaction` in HealthAccessProfile. Aligned with the WHO People''s Voice Survey care-experience domain (''Overall, how would you rate the quality of health care you received?'').", "es": "Escala de satisfacci\u00f3n sim\u00e9trica de cuatro niveles m\u00e1s ''no sabe'' utilizada para calificar la experiencia general de la atenci\u00f3n recibida por un miembro del hogar. Utilizada por `care_satisfaction` en HealthAccessProfile. Alineada con el dominio ''experiencia de atenci\u00f3n'' de la People''s Voice Survey de la OMS (''En general, \u00bfc\u00f3mo calificar\u00eda la calidad de la atenci\u00f3n de salud que recibi\u00f3?'').", "fr": "\u00c9chelle de satisfaction sym\u00e9trique \u00e0 quatre niveaux plus \u00ab ne sait pas \u00bb utilis\u00e9e pour \u00e9valuer l''exp\u00e9rience globale des soins re\u00e7us par un membre du m\u00e9nage. Utilis\u00e9e par `care_satisfaction` dans HealthAccessProfile. Align\u00e9e sur le domaine \u00ab exp\u00e9rience de soins \u00bb de l''enqu\u00eate People''s Voice Survey de l''OMS (\u00ab Globalement, comment \u00e9valueriez-vous la qualit\u00e9 des soins de sant\u00e9 que vous avez re\u00e7us ? \u00bb)."}, "id": "care-satisfaction-5", "label": {"en": "Care Satisfaction (5-level)", "es": "Satisfacci\u00f3n con la atenci\u00f3n (5 niveles)", "fr": "Satisfaction \u00e0 l''\u00e9gard des soins (5 niveaux)"}, "maturity": "draft", "values": [{"code": "very_satisfied", "definition": {"en": "The respondent was very satisfied with the care received.", "es": "El encuestado estaba muy satisfecho con la atenci\u00f3n recibida.", "fr": "Le r\u00e9pondant \u00e9tait tr\u00e8s satisfait des soins re\u00e7us."}, "label": {"en": "Very satisfied", "es": "Muy satisfecho(a)", "fr": "Tr\u00e8s satisfait(e)"}}, {"code": "somewhat_satisfied", "definition": {"en": "The respondent was somewhat satisfied with the care received.", "es": "El encuestado estaba algo satisfecho con la atenci\u00f3n recibida.", "fr": "Le r\u00e9pondant \u00e9tait plut\u00f4t satisfait des soins re\u00e7us."}, "label": {"en": "Somewhat satisfied", "es": "Algo satisfecho(a)", "fr": "Plut\u00f4t satisfait(e)"}}, {"code": "somewhat_dissatisfied", "definition": {"en": "The respondent was somewhat dissatisfied with the care received.", "es": "El encuestado estaba algo insatisfecho con la atenci\u00f3n recibida.", "fr": "Le r\u00e9pondant \u00e9tait plut\u00f4t insatisfait des soins re\u00e7us."}, "label": {"en": "Somewhat dissatisfied", "es": "Algo insatisfecho(a)", "fr": "Plut\u00f4t insatisfait(e)"}}, {"code": "very_dissatisfied", "definition": {"en": "The respondent was very dissatisfied with the care received.", "es": "El encuestado estaba muy insatisfecho con la atenci\u00f3n recibida.", "fr": "Le r\u00e9pondant \u00e9tait tr\u00e8s insatisfait des soins re\u00e7us."}, "label": {"en": "Very dissatisfied", "es": "Muy insatisfecho(a)", "fr": "Tr\u00e8s insatisfait(e)"}}, {"code": "dont_know", "definition": {"en": "The respondent cannot rate the care received. Valid response; must not be re-coded as missing.", "es": "El encuestado no puede calificar la atenci\u00f3n recibida. Respuesta v\u00e1lida; no debe recodificarse como faltante.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer les soins re\u00e7us. R\u00e9ponse valide ; ne doit pas \u00eatre recod\u00e9e comme manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: who-pvs-2023
  CashModalityAcceptance:
    title:
      en: Cash Modality Acceptance
      fr: Acceptation de la modalité de paiement
      es: Aceptación de la modalidad de pago
    description:
      en: 'The proportion of active vendors at a market who accept a specified payment modality (physical cash or mobile money), expressed as an ordinal category. Used for both physical-cash acceptance (F1) and mobile money acceptance (F2) questions in the CBI feasibility module. Sources: CaLP MISMA Standard 2, JMMI cash acceptance variable, MARKit cash feasibility block. Potentially reusable in future VendorProfile or CashRecipientProfile contexts.'
      fr: 'La proportion des vendeurs actifs sur un marché qui acceptent une modalité de paiement spécifiée (espèces physiques ou mobile money), exprimée en catégorie ordinale. Utilisé pour les questions d''acceptation des espèces physiques (F1) et du mobile money (F2) dans le module de faisabilité CBI. Sources : Standard 2 CaLP MISMA, variable d''acceptation des paiements JMMI, bloc de faisabilité des espèces MARKit.'
      es: 'La proporción de vendedores activos en un mercado que aceptan una modalidad de pago especificada (efectivo físico o dinero móvil), expresada como categoría ordinal. Se utiliza para las preguntas de aceptación de efectivo físico (F1) y dinero móvil (F2) en el módulo de viabilidad CBI. Fuentes: Estándar 2 CaLP MISMA, variable de aceptación de pagos JMMI, bloque de viabilidad de efectivo MARKit.'
    enum_uri: aidops:CashModalityAcceptance
    permissible_values:
      all_vendors:
        title:
          en: All or nearly all vendors (>90%)
          fr: Tous ou presque tous les vendeurs (>90%)
          es: Todos o casi todos los vendedores (>90%)
        description:
          en: More than 90% of active vendors at this market accept this payment modality.
          fr: Plus de 90 % des vendeurs actifs de ce marché acceptent cette modalité de paiement.
          es: Más del 90 % de los vendedores activos en este mercado aceptan esta modalidad de pago.
      most_vendors:
        title:
          en: Most vendors (50–90%)
          fr: La plupart des vendeurs (50–90%)
          es: La mayoría de los vendedores (50–90%)
        description:
          en: Between 50% and 90% of active vendors accept this modality.
          fr: Entre 50 % et 90 % des vendeurs actifs acceptent cette modalité.
          es: Entre el 50 % y el 90 % de los vendedores activos aceptan esta modalidad.
      some_vendors:
        title:
          en: Some vendors (10–50%)
          fr: Certains vendeurs (10–50%)
          es: Algunos vendedores (10–50%)
        description:
          en: Between 10% and 50% of active vendors accept this modality.
          fr: Entre 10 % et 50 % des vendeurs actifs acceptent cette modalité.
          es: Entre el 10 % y el 50 % de los vendedores activos aceptan esta modalidad.
      no_vendors:
        title:
          en: No vendors or very few (<10%)
          fr: Aucun vendeur ou très peu (<10%)
          es: Ningún vendedor o muy pocos (<10%)
        description:
          en: Fewer than 10% of active vendors accept this modality.
          fr: Moins de 10 % des vendeurs actifs acceptent cette modalité.
          es: Menos del 10 % de los vendedores activos aceptan esta modalidad.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Enumerator cannot assess the proportion of accepting vendors.
          fr: L'enquêteur ne peut pas évaluer la proportion de vendeurs acceptant cette modalité.
          es: El enumerador no puede evaluar la proporción de vendedores que aceptan esta modalidad.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "calp-programme-quality-toolbox", "crs-markit-2023", "reach-jmmi"], "definition": {"en": "The proportion of active vendors at a market who accept a specified payment modality (physical cash or mobile money), expressed as an ordinal category. Used for both physical-cash acceptance (F1) and mobile money acceptance (F2) questions in the CBI feasibility module. Sources: CaLP MISMA Standard 2, JMMI cash acceptance variable, MARKit cash feasibility block. Potentially reusable in future VendorProfile or CashRecipientProfile contexts.\n", "es": "La proporci\u00f3n de vendedores activos en un mercado que aceptan una modalidad de pago especificada (efectivo f\u00edsico o dinero m\u00f3vil), expresada como categor\u00eda ordinal. Se utiliza para las preguntas de aceptaci\u00f3n de efectivo f\u00edsico (F1) y dinero m\u00f3vil (F2) en el m\u00f3dulo de viabilidad CBI. Fuentes: Est\u00e1ndar 2 CaLP MISMA, variable de aceptaci\u00f3n de pagos JMMI, bloque de viabilidad de efectivo MARKit.\n", "fr": "La proportion des vendeurs actifs sur un march\u00e9 qui acceptent une modalit\u00e9 de paiement sp\u00e9cifi\u00e9e (esp\u00e8ces physiques ou mobile money), exprim\u00e9e en cat\u00e9gorie ordinale. Utilis\u00e9 pour les questions d''acceptation des esp\u00e8ces physiques (F1) et du mobile money (F2) dans le module de faisabilit\u00e9 CBI. Sources : Standard 2 CaLP MISMA, variable d''acceptation des paiements JMMI, bloc de faisabilit\u00e9 des esp\u00e8ces MARKit.\n"}, "id": "cash-modality-acceptance", "label": {"en": "Cash Modality Acceptance", "es": "Aceptaci\u00f3n de la modalidad de pago", "fr": "Acceptation de la modalit\u00e9 de paiement"}, "maturity": "draft", "values": [{"code": "all_vendors", "definition": {"en": "More than 90% of active vendors at this market accept this payment modality.", "es": "M\u00e1s del 90 % de los vendedores activos en este mercado aceptan esta modalidad de pago.", "fr": "Plus de 90 % des vendeurs actifs de ce march\u00e9 acceptent cette modalit\u00e9 de paiement."}, "label": {"en": "All or nearly all vendors (>90%)", "es": "Todos o casi todos los vendedores (>90%)", "fr": "Tous ou presque tous les vendeurs (>90%)"}}, {"code": "most_vendors", "definition": {"en": "Between 50% and 90% of active vendors accept this modality.", "es": "Entre el 50 % y el 90 % de los vendedores activos aceptan esta modalidad.", "fr": "Entre 50 % et 90 % des vendeurs actifs acceptent cette modalit\u00e9."}, "label": {"en": "Most vendors (50\u201390%)", "es": "La mayor\u00eda de los vendedores (50\u201390%)", "fr": "La plupart des vendeurs (50\u201390%)"}}, {"code": "some_vendors", "definition": {"en": "Between 10% and 50% of active vendors accept this modality.", "es": "Entre el 10 % y el 50 % de los vendedores activos aceptan esta modalidad.", "fr": "Entre 10 % et 50 % des vendeurs actifs acceptent cette modalit\u00e9."}, "label": {"en": "Some vendors (10\u201350%)", "es": "Algunos vendedores (10\u201350%)", "fr": "Certains vendeurs (10\u201350%)"}}, {"code": "no_vendors", "definition": {"en": "Fewer than 10% of active vendors accept this modality.", "es": "Menos del 10 % de los vendedores activos aceptan esta modalidad.", "fr": "Moins de 10 % des vendeurs actifs acceptent cette modalit\u00e9."}, "label": {"en": "No vendors or very few (<10%)", "es": "Ning\u00fan vendedor o muy pocos (<10%)", "fr": "Aucun vendeur ou tr\u00e8s peu (<10%)"}}, {"code": "dont_know", "definition": {"en": "Enumerator cannot assess the proportion of accepting vendors.", "es": "El enumerador no puede evaluar la proporci\u00f3n de vendedores que aceptan esta modalidad.", "fr": "L''enqu\u00eateur ne peut pas \u00e9valuer la proportion de vendeurs acceptant cette modalit\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: calp-misma-2018,calp-programme-quality-toolbox,crs-markit-2023,reach-jmmi
  CesareanTiming:
    title:
      en: Cesarean Section Timing
      fr: Moment de la césarienne
      es: Momento de la cesárea
    description:
      en: Whether the cesarean section was performed before labor began (planned/elective) or after labor had already started (emergency). DHS-8 m17a. Only asked when delivery_cesarean_section = yes. Distinguishes elective from emergency cesareans, which have different clinical risk profiles.
      fr: Si la césarienne a été réalisée avant le début du travail (planifiée/élective) ou après le début du travail (urgence). DHS-8 m17a. Posé uniquement lorsque delivery_cesarean_section = oui. Distingue les césariennes électives des urgentes, qui ont des profils de risque clinique différents.
      es: Si la cesárea se realizó antes de que comenzara el trabajo de parto (planificada/electiva) o después de que el trabajo de parto ya había comenzado (emergencia). DHS-8 m17a. Solo se pregunta cuando delivery_cesarean_section = sí. Distingue las cesáreas electivas de las de emergencia, que tienen perfiles de riesgo clínico diferentes.
    enum_uri: aidops:CesareanTiming
    permissible_values:
      before_labor:
        title:
          en: Before labor started (planned / elective)
          fr: Avant le début du travail (planifiée / élective)
          es: Antes de que comenzara el trabajo de parto (planificada / electiva)
        description:
          en: The cesarean section was performed before labor began. Planned or elective cesarean.
          fr: La césarienne a été réalisée avant le début du travail. Césarienne planifiée ou élective.
          es: La cesárea se realizó antes de que comenzara el trabajo de parto. Cesárea planificada o electiva.
      after_labor_started:
        title:
          en: After labor had already started (emergency / intrapartum)
          fr: Après le début du travail (urgence / intrapartum)
          es: Después de que el trabajo de parto había comenzado (emergencia / intraparto)
        description:
          en: The cesarean section was performed after labor had begun. Emergency or intrapartum cesarean.
          fr: La césarienne a été réalisée après le début du travail. Césarienne d'urgence ou intrapartum.
          es: La cesárea se realizó después de que el trabajo de parto había comenzado. Cesárea de emergencia o intraparto.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember whether the cesarean was before or after labor.
          fr: La répondante ne sait pas ou ne se souvient pas si la césarienne a eu lieu avant ou après le début du travail.
          es: La encuestada no sabe o no recuerda si la cesárea fue antes o después del trabajo de parto.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire"], "definition": {"en": "Whether the cesarean section was performed before labor began (planned/elective) or after labor had already started (emergency). DHS-8 m17a. Only asked when delivery_cesarean_section = yes. Distinguishes elective from emergency cesareans, which have different clinical risk profiles.", "es": "Si la ces\u00e1rea se realiz\u00f3 antes de que comenzara el trabajo de parto (planificada/electiva) o despu\u00e9s de que el trabajo de parto ya hab\u00eda comenzado (emergencia). DHS-8 m17a. Solo se pregunta cuando delivery_cesarean_section = s\u00ed. Distingue las ces\u00e1reas electivas de las de emergencia, que tienen perfiles de riesgo cl\u00ednico diferentes.", "fr": "Si la c\u00e9sarienne a \u00e9t\u00e9 r\u00e9alis\u00e9e avant le d\u00e9but du travail (planifi\u00e9e/\u00e9lective) ou apr\u00e8s le d\u00e9but du travail (urgence). DHS-8 m17a. Pos\u00e9 uniquement lorsque delivery_cesarean_section = oui. Distingue les c\u00e9sariennes \u00e9lectives des urgentes, qui ont des profils de risque clinique diff\u00e9rents."}, "id": "cesarean-timing", "label": {"en": "Cesarean Section Timing", "es": "Momento de la ces\u00e1rea", "fr": "Moment de la c\u00e9sarienne"}, "maturity": "draft", "values": [{"code": "before_labor", "definition": {"en": "The cesarean section was performed before labor began. Planned or elective cesarean.", "es": "La ces\u00e1rea se realiz\u00f3 antes de que comenzara el trabajo de parto. Ces\u00e1rea planificada o electiva.", "fr": "La c\u00e9sarienne a \u00e9t\u00e9 r\u00e9alis\u00e9e avant le d\u00e9but du travail. C\u00e9sarienne planifi\u00e9e ou \u00e9lective."}, "label": {"en": "Before labor started (planned / elective)", "es": "Antes de que comenzara el trabajo de parto (planificada / electiva)", "fr": "Avant le d\u00e9but du travail (planifi\u00e9e / \u00e9lective)"}}, {"code": "after_labor_started", "definition": {"en": "The cesarean section was performed after labor had begun. Emergency or intrapartum cesarean.", "es": "La ces\u00e1rea se realiz\u00f3 despu\u00e9s de que el trabajo de parto hab\u00eda comenzado. Ces\u00e1rea de emergencia o intraparto.", "fr": "La c\u00e9sarienne a \u00e9t\u00e9 r\u00e9alis\u00e9e apr\u00e8s le d\u00e9but du travail. C\u00e9sarienne d''urgence ou intrapartum."}, "label": {"en": "After labor had already started (emergency / intrapartum)", "es": "Despu\u00e9s de que el trabajo de parto hab\u00eda comenzado (emergencia / intraparto)", "fr": "Apr\u00e8s le d\u00e9but du travail (urgence / intrapartum)"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember whether the cesarean was before or after labor.", "es": "La encuestada no sabe o no recuerda si la ces\u00e1rea fue antes o despu\u00e9s del trabajo de parto.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas si la c\u00e9sarienne a eu lieu avant ou apr\u00e8s le d\u00e9but du travail."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: dhs-woman-questionnaire
  ChangeDirection3:
    title:
      en: Change Direction (3-way)
      fr: Direction du changement (3 niveaux)
      es: Dirección del cambio (3 niveles)
    description:
      en: 'A generic three-way ordinal scale comparing a current measurement to a reference or baseline period: increased, stayed the same, or decreased. Used for "compared to before the crisis" questions across supply chain monitoring, vendor counts, transport costs, and other comparative items. Candidate for promotion to PublicSchema as a shared vocabulary.'
      fr: 'Une échelle ordinale générique à trois niveaux comparant une mesure actuelle à une période de référence ou de base : augmenté, resté stable ou diminué. Utilisé pour les questions « par rapport à avant la crise » dans le suivi de la chaîne d''approvisionnement, le comptage des vendeurs, les coûts de transport et d''autres éléments comparatifs. Candidat à la promotion dans PublicSchema en tant que vocabulaire partagé.'
      es: 'Una escala ordinal genérica de tres niveles que compara una medición actual con un período de referencia o línea base: aumentado, se mantuvo igual o disminuido. Se utiliza para preguntas de "en comparación con antes de la crisis" en el monitoreo de cadenas de suministro, conteo de vendedores, costos de transporte y otros ítems comparativos. Candidato a promoción en PublicSchema como vocabulario compartido.'
    enum_uri: aidops:ChangeDirection3
    permissible_values:
      increased:
        title:
          en: Increased
          fr: Augmenté
          es: Aumentado
        description:
          en: The measured quantity is higher than the reference period.
          fr: La quantité mesurée est plus élevée que la période de référence.
          es: La cantidad medida es mayor que el período de referencia.
      same:
        title:
          en: Stayed the same
          fr: Resté stable
          es: Se mantuvo igual
        description:
          en: No material change from the reference period.
          fr: Aucun changement significatif par rapport à la période de référence.
          es: Sin cambio material desde el período de referencia.
      decreased:
        title:
          en: Decreased
          fr: Diminué
          es: Disminuido
        description:
          en: The measured quantity is lower than the reference period.
          fr: La quantité mesurée est inférieure à la période de référence.
          es: La cantidad medida es menor que el período de referencia.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Informant cannot assess the direction of change.
          fr: L'informateur ne peut pas évaluer la direction du changement.
          es: El informante no puede evaluar la dirección del cambio.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "icrc-pcma-2014", "reach-jmmi"], "definition": {"en": "A generic three-way ordinal scale comparing a current measurement to a reference or baseline period: increased, stayed the same, or decreased. Used for \"compared to before the crisis\" questions across supply chain monitoring, vendor counts, transport costs, and other comparative items. Candidate for promotion to PublicSchema as a shared vocabulary.\n", "es": "Una escala ordinal gen\u00e9rica de tres niveles que compara una medici\u00f3n actual con un per\u00edodo de referencia o l\u00ednea base: aumentado, se mantuvo igual o disminuido. Se utiliza para preguntas de \"en comparaci\u00f3n con antes de la crisis\" en el monitoreo de cadenas de suministro, conteo de vendedores, costos de transporte y otros \u00edtems comparativos. Candidato a promoci\u00f3n en PublicSchema como vocabulario compartido.\n", "fr": "Une \u00e9chelle ordinale g\u00e9n\u00e9rique \u00e0 trois niveaux comparant une mesure actuelle \u00e0 une p\u00e9riode de r\u00e9f\u00e9rence ou de base : augment\u00e9, rest\u00e9 stable ou diminu\u00e9. Utilis\u00e9 pour les questions \u00ab par rapport \u00e0 avant la crise \u00bb dans le suivi de la cha\u00eene d''approvisionnement, le comptage des vendeurs, les co\u00fbts de transport et d''autres \u00e9l\u00e9ments comparatifs. Candidat \u00e0 la promotion dans PublicSchema en tant que vocabulaire partag\u00e9.\n"}, "id": "change-direction-3", "label": {"en": "Change Direction (3-way)", "es": "Direcci\u00f3n del cambio (3 niveles)", "fr": "Direction du changement (3 niveaux)"}, "maturity": "draft", "values": [{"code": "increased", "definition": {"en": "The measured quantity is higher than the reference period.", "es": "La cantidad medida es mayor que el per\u00edodo de referencia.", "fr": "La quantit\u00e9 mesur\u00e9e est plus \u00e9lev\u00e9e que la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Increased", "es": "Aumentado", "fr": "Augment\u00e9"}}, {"code": "same", "definition": {"en": "No material change from the reference period.", "es": "Sin cambio material desde el per\u00edodo de referencia.", "fr": "Aucun changement significatif par rapport \u00e0 la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Stayed the same", "es": "Se mantuvo igual", "fr": "Rest\u00e9 stable"}}, {"code": "decreased", "definition": {"en": "The measured quantity is lower than the reference period.", "es": "La cantidad medida es menor que el per\u00edodo de referencia.", "fr": "La quantit\u00e9 mesur\u00e9e est inf\u00e9rieure \u00e0 la p\u00e9riode de r\u00e9f\u00e9rence."}, "label": {"en": "Decreased", "es": "Disminuido", "fr": "Diminu\u00e9"}}, {"code": "dont_know", "definition": {"en": "Informant cannot assess the direction of change.", "es": "El informante no puede evaluar la direcci\u00f3n del cambio.", "fr": "L''informateur ne peut pas \u00e9valuer la direction du changement."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
