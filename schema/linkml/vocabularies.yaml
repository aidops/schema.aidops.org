  SchoolManagementType:
    title:
      en: School Management Type
      fr: Type de gestion scolaire
      es: Tipo de gestión escolar
    description:
      en: Classification of the institutional sector responsible for managing and funding a school. Based on the pragmatic six-code set used in MICS country implementations and EMIS data systems, drawing from UNESCO UIS ISCED-P 2011 institutional sector categories.
      fr: Classification du secteur institutionnel responsable de la gestion et du financement d'un établissement scolaire. Basée sur l'ensemble de six codes utilisé dans les implémentations MICS nationales et les systèmes EMIS, s'inspirant des catégories sectorielles institutionnelles de l'ISCED-P 2011 de l'ISU de l'UNESCO.
      es: Clasificación del sector institucional responsable de la gestión y financiamiento de una escuela. Basada en el conjunto pragmático de seis códigos utilizado en las implementaciones nacionales de MICS y los sistemas EMIS, derivada de las categorías del sector institucional de la CINE-P 2011 del IEU de la UNESCO.
    enum_uri: aidops:SchoolManagementType
    permissible_values:
      government:
        title:
          en: Government / public
          fr: Gouvernemental / public
