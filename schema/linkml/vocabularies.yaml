  AapYesnoDk:
    title:
      en: 'AAP: Yes / No / Don''t know / Prefer not to answer'
      fr: 'Redevabilité : Oui / Non / Ne sait pas / Préfère ne pas répondre'
      es: 'Rendición de cuentas: Sí / No / No sabe / Prefiere no responder'
    description:
      en: 'Four-code response scale used across binary awareness items in the AccountabilityToAffectedPopulationsProfile. Adds an explicit ''prefer not to answer'' code to the standard yes/no/don''t-know triad because AAP perception items (especially PSEA-adjacent ones) must permit non-response to reduce courtesy bias and fear-of-retaliation bias documented by Ground Truth Solutions. The distinction between ''don''t know'' and ''prefer not to answer'' must be preserved in analysis: ''don''t know'' signals an information gap, ''prefer not to answer'' signals a trust or safety concern.'
      fr: 'Échelle de réponse à quatre codes utilisée pour les items d''awareness binaires du Profil de redevabilité envers les populations affectées. Ajoute un code explicite « préfère ne pas répondre » à la triade standard oui/non/ne sait pas car les items de perception AAP (en particulier ceux liés à la PSEA) doivent permettre la non-réponse afin de réduire le biais de complaisance et le biais de peur de représailles documentés par Ground Truth Solutions. La distinction entre « ne sait pas » et « préfère ne pas répondre » doit être préservée dans l''analyse : « ne sait pas » signale une lacune d''information, « préfère ne pas répondre » signale une préoccupation de confiance ou de sécurité.'
      es: 'Escala de respuesta de cuatro códigos utilizada en los ítems binarios de conciencia del Perfil de Rendición de Cuentas a las Poblaciones Afectadas. Añade un código explícito «prefiere no responder» a la tríada estándar sí/no/no sabe porque los ítems de percepción AAP (especialmente los relacionados con PSEA) deben permitir la no respuesta para reducir el sesgo de cortesía y el sesgo de miedo a represalias documentados por Ground Truth Solutions. La distinción entre «no sabe» y «prefiere no responder» debe preservarse en el análisis: «no sabe» señala una brecha de información, «prefiere no responder» señala una preocupación de confianza o seguridad.'
    enum_uri: aidops:AapYesnoDk
    permissible_values:
      'yes':
        title:
          en: 'Yes'
          fr: Oui
          es: Sí
        description:
          en: The respondent confirms the condition or event.
          fr: Le répondant confirme la condition ou l'événement.
          es: El encuestado confirma la condición o el evento.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: The respondent denies the condition or event.
          fr: Le répondant nie la condition ou l'événement.
          es: El encuestado niega la condición o el evento.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know the answer. This is a valid response that signals an information gap and must not be re-coded as 'no' or missing.
          fr: Le répondant ne connaît pas la réponse. Il s'agit d'une réponse valide qui signale une lacune d'information et ne doit pas être recodée comme « non » ou manquante.
          es: El encuestado no sabe la respuesta. Esta es una respuesta válida que señala una brecha de información y no debe recodificarse como «no» o faltante.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: The respondent declines to answer. On sensitive AAP items, this is itself a programmatic signal and should be tracked separately from 'don't know' and from missingness.
          fr: Le répondant refuse de répondre. Sur les items AAP sensibles, il s'agit en soi d'un signal programmatique et doit être suivi séparément de « ne sait pas » et de la non-réponse.
          es: El encuestado se niega a responder. En los ítems AAP sensibles, esto constituye en sí mismo una señal programática y debe rastrearse por separado de «no sabe» y de la no respuesta.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-caap-2017", "iasc-reach-aap-menu-2018"], "definition": {"en": "Four-code response scale used across binary awareness items in the AccountabilityToAffectedPopulationsProfile. Adds an explicit ''prefer not to answer'' code to the standard yes/no/don''t-know triad because AAP perception items (especially PSEA-adjacent ones) must permit non-response to reduce courtesy bias and fear-of-retaliation bias documented by Ground Truth Solutions. The distinction between ''don''t know'' and ''prefer not to answer'' must be preserved in analysis: ''don''t know'' signals an information gap, ''prefer not to answer'' signals a trust or safety concern.", "es": "Escala de respuesta de cuatro c\u00f3digos utilizada en los \u00edtems binarios de conciencia del Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas. A\u00f1ade un c\u00f3digo expl\u00edcito \u00abprefiere no responder\u00bb a la tr\u00edada est\u00e1ndar s\u00ed/no/no sabe porque los \u00edtems de percepci\u00f3n AAP (especialmente los relacionados con PSEA) deben permitir la no respuesta para reducir el sesgo de cortes\u00eda y el sesgo de miedo a represalias documentados por Ground Truth Solutions. La distinci\u00f3n entre \u00abno sabe\u00bb y \u00abprefiere no responder\u00bb debe preservarse en el an\u00e1lisis: \u00abno sabe\u00bb se\u00f1ala una brecha de informaci\u00f3n, \u00abprefiere no responder\u00bb se\u00f1ala una preocupaci\u00f3n de confianza o seguridad.", "fr": "\u00c9chelle de r\u00e9ponse \u00e0 quatre codes utilis\u00e9e pour les items d''awareness binaires du Profil de redevabilit\u00e9 envers les populations affect\u00e9es. Ajoute un code explicite \u00ab pr\u00e9f\u00e8re ne pas r\u00e9pondre \u00bb \u00e0 la triade standard oui/non/ne sait pas car les items de perception AAP (en particulier ceux li\u00e9s \u00e0 la PSEA) doivent permettre la non-r\u00e9ponse afin de r\u00e9duire le biais de complaisance et le biais de peur de repr\u00e9sailles document\u00e9s par Ground Truth Solutions. La distinction entre \u00ab ne sait pas \u00bb et \u00ab pr\u00e9f\u00e8re ne pas r\u00e9pondre \u00bb doit \u00eatre pr\u00e9serv\u00e9e dans l''analyse : \u00ab ne sait pas \u00bb signale une lacune d''information, \u00ab pr\u00e9f\u00e8re ne pas r\u00e9pondre \u00bb signale une pr\u00e9occupation de confiance ou de s\u00e9curit\u00e9."}, "id": "aap-yesno-dk", "label": {"en": "AAP: Yes / No / Don''t know / Prefer not to answer", "es": "Rendici\u00f3n de cuentas: S\u00ed / No / No sabe / Prefiere no responder", "fr": "Redevabilit\u00e9 : Oui / Non / Ne sait pas / Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Non-response codes convention adopted across the IASC / REACH AAP menu for perception items.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "yes", "definition": {"en": "The respondent confirms the condition or event.", "es": "El encuestado confirma la condici\u00f3n o el evento.", "fr": "Le r\u00e9pondant confirme la condition ou l''\u00e9v\u00e9nement."}, "label": {"en": "Yes", "es": "S\u00ed", "fr": "Oui"}}, {"code": "no", "definition": {"en": "The respondent denies the condition or event.", "es": "El encuestado niega la condici\u00f3n o el evento.", "fr": "Le r\u00e9pondant nie la condition ou l''\u00e9v\u00e9nement."}, "label": {"en": "No", "es": "No", "fr": "Non"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know the answer. This is a valid response that signals an information gap and must not be re-coded as ''no'' or missing.", "es": "El encuestado no sabe la respuesta. Esta es una respuesta v\u00e1lida que se\u00f1ala una brecha de informaci\u00f3n y no debe recodificarse como \u00abno\u00bb o faltante.", "fr": "Le r\u00e9pondant ne conna\u00eet pas la r\u00e9ponse. Il s''agit d''une r\u00e9ponse valide qui signale une lacune d''information et ne doit pas \u00eatre recod\u00e9e comme \u00ab non \u00bb ou manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "The respondent declines to answer. On sensitive AAP items, this is itself a programmatic signal and should be tracked separately from ''don''t know'' and from missingness.", "es": "El encuestado se niega a responder. En los \u00edtems AAP sensibles, esto constituye en s\u00ed mismo una se\u00f1al program\u00e1tica y debe rastrearse por separado de \u00abno sabe\u00bb y de la no respuesta.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre. Sur les items AAP sensibles, il s''agit en soi d''un signal programmatique et doit \u00eatre suivi s\u00e9par\u00e9ment de \u00ab ne sait pas \u00bb et de la non-r\u00e9ponse."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
      bibliography_refs: iasc-caap-2017,iasc-reach-aap-menu-2018
  AdaptivePracticeBarrier:
    title:
      en: Barrier to adopting additional climate-adaptive practices
      fr: Obstacle à l'adoption de pratiques climato-adaptatives supplémentaires
      es: Barrera para adoptar prácticas adicionales de adaptación climática
    description:
      en: 'Primary barrier preventing the household from adopting additional climate-adaptive practices. Used for climate_adaptive_practice_barrier. Sources: IPCC AR6 WGII Chapter 17 (barriers to adaptation); World Bank CSA Country Profiles (barriers to CSA adoption); CARE CVCA barriers analysis; Oxfam adaptation toolkit barriers framework.'
      fr: 'Principal obstacle empêchant le ménage d''adopter des pratiques climato-adaptatives supplémentaires. Utilisé pour climate_adaptive_practice_barrier. Sources : GIEC AR6 WGII Chapitre 17 ; Profils pays CSA Banque mondiale ; CARE CVCA ; boîte à outils Oxfam.'
      es: 'Principal barrera que impide al hogar adoptar prácticas adicionales de adaptación climática. Usado para climate_adaptive_practice_barrier. Fuentes: IPCC AR6 WGII Capítulo 17; Perfiles de países CSA del Banco Mundial; CARE CVCA; kit de herramientas de adaptación de Oxfam.'
    enum_uri: aidops:AdaptivePracticeBarrier
    permissible_values:
      no_access_inputs:
        title:
          en: Cannot access the inputs or materials needed
          fr: Impossibilité d'accéder aux intrants ou matériaux nécessaires
          es: No puede acceder a los insumos o materiales necesarios
        description:
          en: Drought-tolerant seeds, irrigation equipment, or other needed inputs are not available locally or are too difficult to obtain.
          fr: Les semences résistantes à la sécheresse, l'équipement d'irrigation ou d'autres intrants nécessaires ne sont pas disponibles localement ou sont trop difficiles à obtenir.
          es: Las semillas tolerantes a la sequía, equipos de riego u otros insumos necesarios no están disponibles localmente o son demasiado difíciles de obtener.
      no_financial_resources:
        title:
          en: Cannot afford the cost
          fr: Coût trop élevé
          es: No puede costear el precio
        description:
          en: The household cannot pay for the seeds, equipment, labor, or other investments required to adopt the practice.
          fr: Le ménage ne peut pas payer pour les semences, l'équipement, la main-d'œuvre ou d'autres investissements nécessaires à l'adoption de la pratique.
          es: El hogar no puede pagar por las semillas, equipos, mano de obra u otras inversiones necesarias para adoptar la práctica.
      no_knowledge_training:
        title:
          en: Do not know how to use the practice
          fr: Méconnaissance de la pratique
          es: Desconoce cómo usar la práctica
        description:
          en: The household has not received information or training on how to implement the practice correctly.
          fr: Le ménage n'a pas reçu d'information ou de formation sur la manière de mettre en œuvre correctement la pratique.
          es: El hogar no ha recibido información o capacitación sobre cómo implementar la práctica correctamente.
      no_land_access:
        title:
          en: No secure access to land or water
          fr: Accès insuffisant à la terre ou à l'eau
          es: No tiene acceso seguro a la tierra o el agua
        description:
          en: Tenure insecurity or lack of access to land or water makes it impractical to invest in soil conservation, irrigation, or agroforestry.
          fr: L'insécurité foncière ou le manque d'accès à la terre ou à l'eau rend peu pratique l'investissement dans la conservation des sols, l'irrigation ou l'agroforesterie.
          es: La inseguridad de la tenencia o la falta de acceso a la tierra o al agua hace impracticable invertir en conservación de suelos, riego o agroforestería.
      not_suitable_for_context:
        title:
          en: Practice does not suit local conditions
          fr: Pratique inadaptée aux conditions locales
          es: La práctica no se adapta a las condiciones locales
        description:
          en: The practice is not appropriate for the household's soil type, altitude, climate zone, or crop system.
          fr: La pratique n'est pas appropriée pour le type de sol, l'altitude, la zone climatique ou le système de cultures du ménage.
          es: La práctica no es apropiada para el tipo de suelo, altitud, zona climática o sistema de cultivos del hogar.
      social_or_cultural_barriers:
        title:
          en: Social or cultural reasons
          fr: Raisons sociales ou culturelles
          es: Razones sociales o culturales
        description:
          en: Social norms, gender roles, religious practice, or community expectations prevent adoption.
          fr: Les normes sociales, les rôles de genre, la pratique religieuse ou les attentes de la communauté empêchent l'adoption.
          es: Las normas sociales, los roles de género, las prácticas religiosas o las expectativas comunitarias impiden la adopción.
      labor_constraint:
        title:
          en: Not enough labor available
          fr: Main-d'œuvre insuffisante
          es: No hay suficiente mano de obra disponible
        description:
          en: The household does not have enough available labor (family or hired) to implement labor-intensive practices.
          fr: Le ménage n'a pas suffisamment de main-d'œuvre disponible (familiale ou salariée) pour mettre en œuvre des pratiques à forte intensité de travail.
          es: El hogar no tiene suficiente mano de obra disponible (familiar o contratada) para implementar prácticas que requieren mucho trabajo.
      no_market_for_products:
        title:
          en: No market for the products of this practice
          fr: Absence de marché pour les produits de cette pratique
          es: No hay mercado para los productos de esta práctica
        description:
          en: Even if the household adopted the practice, there is no local market to sell the output.
          fr: Même si le ménage adoptait la pratique, il n'y a pas de marché local pour vendre les produits.
          es: Incluso si el hogar adoptara la práctica, no hay mercado local para vender los productos.
      no_barrier_satisfied_with_current:
        title:
          en: No barrier — satisfied with current practices
          fr: Pas d'obstacle — satisfait des pratiques actuelles
          es: Sin barrera — satisfecho con las prácticas actuales
        description:
          en: The household does not want to change its current practices.
          fr: Le ménage ne souhaite pas changer ses pratiques actuelles.
          es: El hogar no desea cambiar sus prácticas actuales.
      other:
        title:
          en: Other barrier
          fr: Autre obstacle
          es: Otra barrera
        description:
          en: Barrier not covered by the above categories.
          fr: Obstacle non couvert par les catégories ci-dessus.
          es: Barrera no cubierta por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "oxfam-adaptation-toolkit-2019", "world-bank-csa-profiles-2019"], "definition": {"en": "Primary barrier preventing the household from adopting additional climate-adaptive practices. Used for climate_adaptive_practice_barrier. Sources: IPCC AR6 WGII Chapter 17 (barriers to adaptation); World Bank CSA Country Profiles (barriers to CSA adoption); CARE CVCA barriers analysis; Oxfam adaptation toolkit barriers framework.\n", "es": "Principal barrera que impide al hogar adoptar pr\u00e1cticas adicionales de adaptaci\u00f3n clim\u00e1tica. Usado para climate_adaptive_practice_barrier. Fuentes: IPCC AR6 WGII Cap\u00edtulo 17; Perfiles de pa\u00edses CSA del Banco Mundial; CARE CVCA; kit de herramientas de adaptaci\u00f3n de Oxfam.\n", "fr": "Principal obstacle emp\u00eachant le m\u00e9nage d''adopter des pratiques climato-adaptatives suppl\u00e9mentaires. Utilis\u00e9 pour climate_adaptive_practice_barrier. Sources : GIEC AR6 WGII Chapitre 17 ; Profils pays CSA Banque mondiale ; CARE CVCA ; bo\u00eete \u00e0 outils Oxfam.\n"}, "id": "adaptive-practice-barrier", "label": {"en": "Barrier to adopting additional climate-adaptive practices", "es": "Barrera para adoptar pr\u00e1cticas adicionales de adaptaci\u00f3n clim\u00e1tica", "fr": "Obstacle \u00e0 l''adoption de pratiques climato-adaptatives suppl\u00e9mentaires"}, "maturity": "draft", "values": [{"code": "no_access_inputs", "definition": {"en": "Drought-tolerant seeds, irrigation equipment, or other needed inputs are not available locally or are too difficult to obtain.", "es": "Las semillas tolerantes a la sequ\u00eda, equipos de riego u otros insumos necesarios no est\u00e1n disponibles localmente o son demasiado dif\u00edciles de obtener.", "fr": "Les semences r\u00e9sistantes \u00e0 la s\u00e9cheresse, l''\u00e9quipement d''irrigation ou d''autres intrants n\u00e9cessaires ne sont pas disponibles localement ou sont trop difficiles \u00e0 obtenir."}, "label": {"en": "Cannot access the inputs or materials needed", "es": "No puede acceder a los insumos o materiales necesarios", "fr": "Impossibilit\u00e9 d''acc\u00e9der aux intrants ou mat\u00e9riaux n\u00e9cessaires"}}, {"code": "no_financial_resources", "definition": {"en": "The household cannot pay for the seeds, equipment, labor, or other investments required to adopt the practice.", "es": "El hogar no puede pagar por las semillas, equipos, mano de obra u otras inversiones necesarias para adoptar la pr\u00e1ctica.", "fr": "Le m\u00e9nage ne peut pas payer pour les semences, l''\u00e9quipement, la main-d''\u0153uvre ou d''autres investissements n\u00e9cessaires \u00e0 l''adoption de la pratique."}, "label": {"en": "Cannot afford the cost", "es": "No puede costear el precio", "fr": "Co\u00fbt trop \u00e9lev\u00e9"}}, {"code": "no_knowledge_training", "definition": {"en": "The household has not received information or training on how to implement the practice correctly.", "es": "El hogar no ha recibido informaci\u00f3n o capacitaci\u00f3n sobre c\u00f3mo implementar la pr\u00e1ctica correctamente.", "fr": "Le m\u00e9nage n''a pas re\u00e7u d''information ou de formation sur la mani\u00e8re de mettre en \u0153uvre correctement la pratique."}, "label": {"en": "Do not know how to use the practice", "es": "Desconoce c\u00f3mo usar la pr\u00e1ctica", "fr": "M\u00e9connaissance de la pratique"}}, {"code": "no_land_access", "definition": {"en": "Tenure insecurity or lack of access to land or water makes it impractical to invest in soil conservation, irrigation, or agroforestry.", "es": "La inseguridad de la tenencia o la falta de acceso a la tierra o al agua hace impracticable invertir en conservaci\u00f3n de suelos, riego o agroforester\u00eda.", "fr": "L''ins\u00e9curit\u00e9 fonci\u00e8re ou le manque d''acc\u00e8s \u00e0 la terre ou \u00e0 l''eau rend peu pratique l''investissement dans la conservation des sols, l''irrigation ou l''agroforesterie."}, "label": {"en": "No secure access to land or water", "es": "No tiene acceso seguro a la tierra o el agua", "fr": "Acc\u00e8s insuffisant \u00e0 la terre ou \u00e0 l''eau"}}, {"code": "not_suitable_for_context", "definition": {"en": "The practice is not appropriate for the household''s soil type, altitude, climate zone, or crop system.", "es": "La pr\u00e1ctica no es apropiada para el tipo de suelo, altitud, zona clim\u00e1tica o sistema de cultivos del hogar.", "fr": "La pratique n''est pas appropri\u00e9e pour le type de sol, l''altitude, la zone climatique ou le syst\u00e8me de cultures du m\u00e9nage."}, "label": {"en": "Practice does not suit local conditions", "es": "La pr\u00e1ctica no se adapta a las condiciones locales", "fr": "Pratique inadapt\u00e9e aux conditions locales"}}, {"code": "social_or_cultural_barriers", "definition": {"en": "Social norms, gender roles, religious practice, or community expectations prevent adoption.", "es": "Las normas sociales, los roles de g\u00e9nero, las pr\u00e1cticas religiosas o las expectativas comunitarias impiden la adopci\u00f3n.", "fr": "Les normes sociales, les r\u00f4les de genre, la pratique religieuse ou les attentes de la communaut\u00e9 emp\u00eachent l''adoption."}, "label": {"en": "Social or cultural reasons", "es": "Razones sociales o culturales", "fr": "Raisons sociales ou culturelles"}}, {"code": "labor_constraint", "definition": {"en": "The household does not have enough available labor (family or hired) to implement labor-intensive practices.", "es": "El hogar no tiene suficiente mano de obra disponible (familiar o contratada) para implementar pr\u00e1cticas que requieren mucho trabajo.", "fr": "Le m\u00e9nage n''a pas suffisamment de main-d''\u0153uvre disponible (familiale ou salari\u00e9e) pour mettre en \u0153uvre des pratiques \u00e0 forte intensit\u00e9 de travail."}, "label": {"en": "Not enough labor available", "es": "No hay suficiente mano de obra disponible", "fr": "Main-d''\u0153uvre insuffisante"}}, {"code": "no_market_for_products", "definition": {"en": "Even if the household adopted the practice, there is no local market to sell the output.", "es": "Incluso si el hogar adoptara la pr\u00e1ctica, no hay mercado local para vender los productos.", "fr": "M\u00eame si le m\u00e9nage adoptait la pratique, il n''y a pas de march\u00e9 local pour vendre les produits."}, "label": {"en": "No market for the products of this practice", "es": "No hay mercado para los productos de esta pr\u00e1ctica", "fr": "Absence de march\u00e9 pour les produits de cette pratique"}}, {"code": "no_barrier_satisfied_with_current", "definition": {"en": "The household does not want to change its current practices.", "es": "El hogar no desea cambiar sus pr\u00e1cticas actuales.", "fr": "Le m\u00e9nage ne souhaite pas changer ses pratiques actuelles."}, "label": {"en": "No barrier \u2014 satisfied with current practices", "es": "Sin barrera \u2014 satisfecho con las pr\u00e1cticas actuales", "fr": "Pas d''obstacle \u2014 satisfait des pratiques actuelles"}}, {"code": "other", "definition": {"en": "Barrier not covered by the above categories.", "es": "Barrera no cubierta por las categor\u00edas anteriores.", "fr": "Obstacle non couvert par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other barrier", "es": "Otra barrera", "fr": "Autre obstacle"}}]}'
      bibliography_refs: care-cvca-handbook-2019,oxfam-adaptation-toolkit-2019,world-bank-csa-profiles-2019
  AdaptivePracticeType:
    title:
      en: Adaptive practice type
      fr: Type de pratique d'adaptation climatique
      es: Tipo de práctica de adaptación climática
    description:
      en: 'Climate-smart and climate-adaptive practices adopted at household level. Used for climate_adaptive_practices_used. Sources: World Bank CSA Country Profiles methodology (CSA practices adoption module); IPCC AR6 WGII Chapter 5 (adaptation options in food systems); FAO EX-ACT household practice list; CARE CVCA adaptive practice inventory; IFRC PCVA practice adoption module. Note on ''improved_irrigation'': this is a domain term of art per the World Bank CSA Country Profiles and FAO EX-ACT, not an ''improved'' naming convention in the sense of a software feature label.'
      fr: 'Pratiques climato-intelligentes et d''adaptation climatique adoptées au niveau du ménage. Utilisé pour climate_adaptive_practices_used. Sources : Profils pays CSA Banque mondiale ; GIEC AR6 WGII Chapitre 5 ; FAO EX-ACT ; CARE CVCA ; FICR PCVA.'
      es: 'Prácticas climáticamente inteligentes y de adaptación climática adoptadas a nivel del hogar. Usado para climate_adaptive_practices_used. Fuentes: Perfiles de países CSA del Banco Mundial; IPCC AR6 WGII Capítulo 5; FAO EX-ACT; CARE CVCA; FICR PCVA.'
    enum_uri: aidops:AdaptivePracticeType
    permissible_values:
      drought_resistant_seeds:
        title:
          en: Drought-tolerant or early-maturing seed varieties
          fr: Semences résistantes à la sécheresse ou à maturation précoce
          es: Semillas tolerantes a la sequía o de maduración temprana
        description:
          en: Growing crop varieties specifically bred or selected to tolerate water stress or to mature before the peak dry period.
          fr: Cultures de variétés spécifiquement sélectionnées pour tolérer le stress hydrique ou mûrir avant la période sèche maximale.
          es: Cultivo de variedades específicamente seleccionadas para tolerar el estrés hídrico o madurar antes del período seco máximo.
      water_harvesting:
        title:
          en: Water harvesting or rainwater collection
          fr: Collecte des eaux de pluie ou captage des eaux de ruissellement
          es: Cosecha de agua o recolección de agua de lluvia
        description:
          en: Techniques to capture and store rainwater or surface runoff for agricultural or domestic use — including half-moon bunds, zaï pits, and rooftop collection.
          fr: Techniques de captage et stockage des eaux de pluie ou du ruissellement pour usage agricole ou domestique — y compris les demi-lunes, les puits zaï et la collecte en toiture.
          es: Técnicas para capturar y almacenar agua de lluvia o escorrentía superficial para uso agrícola o doméstico — incluidas medias lunas, pozos zaï y recolección en techos.
      agroforestry:
        title:
          en: Agroforestry (trees on farmland)
          fr: Agroforesterie (arbres sur terres agricoles)
          es: Agroforestería (árboles en tierras de cultivo)
        description:
          en: Integrating trees or shrubs into farming systems to improve water retention, reduce erosion, provide shade, and improve soil carbon.
          fr: Intégration d'arbres ou d'arbustes dans les systèmes agricoles pour améliorer la rétention d'eau, réduire l'érosion, fournir de l'ombre et améliorer le carbone du sol.
          es: Integración de árboles o arbustos en sistemas agrícolas para mejorar la retención de agua, reducir la erosión, proporcionar sombra y mejorar el carbono del suelo.
      soil_conservation_practices:
        title:
          en: Soil conservation or erosion control
          fr: Conservation du sol ou contrôle de l'érosion
          es: Conservación del suelo o control de la erosión
        description:
          en: Practices to maintain soil quality and reduce erosion — including mulching, cover crops, contour bunding, and terracing.
          fr: Pratiques de maintien de la qualité du sol et de réduction de l'érosion — y compris le paillage, les cultures de couverture, le billonnage en courbe de niveau et les terrasses.
          es: Prácticas para mantener la calidad del suelo y reducir la erosión — incluidos el acolchado, cultivos de cobertura, banquetas en curva de nivel y terrazas.
      improved_irrigation:
        title:
          en: Improved or supplemental irrigation
          fr: Irrigation améliorée ou complémentaire
          es: Riego mejorado o suplementario
        description:
          en: Installing or using drip, sprinkler, or small-scale supplemental irrigation to cope with unreliable rainfall. 'Improved' is a CSA domain term of art per World Bank CSA Country Profiles and FAO EX-ACT.
          fr: Installation ou utilisation de l'irrigation goutte à goutte, par aspersion ou d'appoint à petite échelle pour faire face aux précipitations peu fiables.
          es: Instalación o uso de riego por goteo, aspersión o suplementario a pequeña escala para hacer frente a lluvias poco confiables.
      diversified_crops:
        title:
          en: Crop diversification
          fr: Diversification des cultures
          es: Diversificación de cultivos
        description:
          en: Growing multiple crop types or varieties to reduce the risk that one crop failure eliminates all food or income.
          fr: Culture de plusieurs types ou variétés de cultures pour réduire le risque qu'une mauvaise récolte élimine toute la nourriture ou les revenus.
          es: Cultivo de múltiples tipos o variedades de cultivos para reducir el riesgo de que una pérdida de cosecha elimine todos los alimentos o ingresos.
      climate_smart_livestock:
        title:
          en: Climate-smart livestock practices
          fr: Pratiques d'élevage climato-intelligentes
          es: Prácticas ganaderas climáticamente inteligentes
        description:
          en: Adapting livestock management to heat or drought — including destocking before drought, shifting to heat-tolerant breeds, improving water access for animals, and providing shade structures.
          fr: Adaptation de la gestion du bétail à la chaleur ou à la sécheresse — y compris le déstockage avant la sécheresse, le passage à des races tolérantes à la chaleur, l'amélioration de l'accès à l'eau pour les animaux et la fourniture d'abris ombragés.
          es: Adaptación del manejo ganadero al calor o la sequía — incluidos el destock antes de la sequía, el cambio a razas tolerantes al calor, la mejora del acceso al agua para los animales y la provisión de estructuras de sombra.
      flood_defenses:
        title:
          en: Household flood defenses
          fr: Défenses contre les inondations au niveau du ménage
          es: Defensas contra inundaciones a nivel del hogar
        description:
          en: Measures taken by the household to protect its dwelling or productive assets from flood damage — including elevated floors, flood barriers, and sandbagging.
          fr: Mesures prises par le ménage pour protéger son logement ou ses actifs productifs contre les dommages liés aux inondations — y compris le rehaussement des planchers, les barrières anti-crue et les sacs de sable.
          es: Medidas tomadas por el hogar para proteger su vivienda o activos productivos de daños por inundación — incluidos pisos elevados, barreras contra inundaciones y sacos de arena.
      energy_efficient_cookstove:
        title:
          en: Energy-efficient or improved cookstove
          fr: Cuisinière économe en énergie ou cuisinière améliorée
          es: Cocina de bajo consumo energético o mejorada
        description:
          en: Using a fuel-efficient cookstove that reduces firewood collection needs and dependence on forest resources, relevant when deforestation is worsening local climate risks.
          fr: Utilisation d'une cuisinière économe en combustible qui réduit les besoins en bois de chauffe et la dépendance aux ressources forestières, pertinent lorsque la déforestation aggrave les risques climatiques locaux.
          es: Uso de una cocina eficiente en combustible que reduce las necesidades de recolección de leña y la dependencia de recursos forestales, relevante cuando la deforestación empeora los riesgos climáticos locales.
      renewable_energy:
        title:
          en: Renewable energy (solar, wind, biogas)
          fr: Énergie renouvelable (solaire, éolien, biogaz)
          es: Energía renovable (solar, eólica, biogás)
        description:
          en: Using solar panels, solar lanterns, solar water pumps, wind power, or biogas for energy needs, reducing climate vulnerability from energy price shocks or wood-fuel scarcity.
          fr: Utilisation de panneaux solaires, lanternes solaires, pompes à eau solaires, énergie éolienne ou biogaz pour les besoins énergétiques, réduisant la vulnérabilité climatique liée aux chocs de prix de l'énergie ou à la pénurie de bois.
          es: Uso de paneles solares, linternas solares, bombas de agua solares, energía eólica o biogás para necesidades energéticas, reduciendo la vulnerabilidad climática ante choques en precios de energía o escasez de leña.
      early_or_late_planting:
        title:
          en: Adjusted planting dates (early or late)
          fr: Dates de plantation ajustées (précoce ou tardive)
          es: Fechas de siembra ajustadas (temprana o tardía)
        description:
          en: Changing the timing of crop planting in response to observed shifts in seasonal rainfall onset or temperature patterns.
          fr: Modification du calendrier de plantation en réponse aux décalages observés dans l'onset des précipitations saisonnières ou les tendances de température.
          es: Cambio en el calendario de siembra en respuesta a cambios observados en el inicio de las lluvias estacionales o patrones de temperatura.
      post_harvest_storage:
        title:
          en: Improved post-harvest storage
          fr: Stockage post-récolte amélioré
          es: Almacenamiento post-cosecha mejorado
        description:
          en: Using hermetic bags, silos, or treated storage to reduce post-harvest crop losses, which are exacerbated by higher temperatures and humidity variability.
          fr: Utilisation de sacs hermétiques, silos ou stockage traité pour réduire les pertes post-récolte, aggravées par la hausse des températures et la variabilité de l'humidité.
          es: Uso de bolsas herméticas, silos o almacenamiento tratado para reducir las pérdidas post-cosecha, agravadas por el aumento de temperaturas y la variabilidad de la humedad.
      index_or_crop_insurance:
        title:
          en: Crop, livestock, or index insurance
          fr: Assurance récolte, bétail ou indicielle
          es: Seguro de cultivos, ganadería o índice
        description:
          en: Purchasing weather-index, area-yield, or livestock insurance products to manage climate-related production risk.
          fr: Achat de produits d'assurance indicielle météorologique, de rendement de zone ou de bétail pour gérer le risque de production lié au climat.
          es: Compra de productos de seguro de índice meteorológico, rendimiento por área o ganadería para gestionar el riesgo de producción relacionado con el clima.
      none_no_specific_practice:
        title:
          en: None of the above
          fr: Aucune de ces pratiques
          es: Ninguna de las anteriores
        description:
          en: The household has not adopted any specific climate-smart or climate-adaptive practice. Mutually exclusive with all other codes.
          fr: Le ménage n'a adopté aucune pratique climato-intelligente ou d'adaptation climatique spécifique. Mutuellement exclusif avec tous les autres codes.
          es: El hogar no ha adoptado ninguna práctica climáticamente inteligente o de adaptación climática específica. Mutuamente exclusivo con todos los demás códigos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["care-cvca-handbook-2019", "fao-ex-act-2021", "ifrc-pcva-2020", "ipcc-ar6-wg2-2022", "world-bank-csa-profiles-2019"], "definition": {"en": "Climate-smart and climate-adaptive practices adopted at household level. Used for climate_adaptive_practices_used. Sources: World Bank CSA Country Profiles methodology (CSA practices adoption module); IPCC AR6 WGII Chapter 5 (adaptation options in food systems); FAO EX-ACT household practice list; CARE CVCA adaptive practice inventory; IFRC PCVA practice adoption module. Note on ''improved_irrigation'': this is a domain term of art per the World Bank CSA Country Profiles and FAO EX-ACT, not an ''improved'' naming convention in the sense of a software feature label.\n", "es": "Pr\u00e1cticas clim\u00e1ticamente inteligentes y de adaptaci\u00f3n clim\u00e1tica adoptadas a nivel del hogar. Usado para climate_adaptive_practices_used. Fuentes: Perfiles de pa\u00edses CSA del Banco Mundial; IPCC AR6 WGII Cap\u00edtulo 5; FAO EX-ACT; CARE CVCA; FICR PCVA.\n", "fr": "Pratiques climato-intelligentes et d''adaptation climatique adopt\u00e9es au niveau du m\u00e9nage. Utilis\u00e9 pour climate_adaptive_practices_used. Sources : Profils pays CSA Banque mondiale ; GIEC AR6 WGII Chapitre 5 ; FAO EX-ACT ; CARE CVCA ; FICR PCVA.\n"}, "id": "adaptive-practice-type", "label": {"en": "Adaptive practice type", "es": "Tipo de pr\u00e1ctica de adaptaci\u00f3n clim\u00e1tica", "fr": "Type de pratique d''adaptation climatique"}, "maturity": "draft", "values": [{"code": "drought_resistant_seeds", "definition": {"en": "Growing crop varieties specifically bred or selected to tolerate water stress or to mature before the peak dry period.", "es": "Cultivo de variedades espec\u00edficamente seleccionadas para tolerar el estr\u00e9s h\u00eddrico o madurar antes del per\u00edodo seco m\u00e1ximo.", "fr": "Cultures de vari\u00e9t\u00e9s sp\u00e9cifiquement s\u00e9lectionn\u00e9es pour tol\u00e9rer le stress hydrique ou m\u00fbrir avant la p\u00e9riode s\u00e8che maximale."}, "label": {"en": "Drought-tolerant or early-maturing seed varieties", "es": "Semillas tolerantes a la sequ\u00eda o de maduraci\u00f3n temprana", "fr": "Semences r\u00e9sistantes \u00e0 la s\u00e9cheresse ou \u00e0 maturation pr\u00e9coce"}}, {"code": "water_harvesting", "definition": {"en": "Techniques to capture and store rainwater or surface runoff for agricultural or domestic use \u2014 including half-moon bunds, za\u00ef pits, and rooftop collection.", "es": "T\u00e9cnicas para capturar y almacenar agua de lluvia o escorrent\u00eda superficial para uso agr\u00edcola o dom\u00e9stico \u2014 incluidas medias lunas, pozos za\u00ef y recolecci\u00f3n en techos.", "fr": "Techniques de captage et stockage des eaux de pluie ou du ruissellement pour usage agricole ou domestique \u2014 y compris les demi-lunes, les puits za\u00ef et la collecte en toiture."}, "label": {"en": "Water harvesting or rainwater collection", "es": "Cosecha de agua o recolecci\u00f3n de agua de lluvia", "fr": "Collecte des eaux de pluie ou captage des eaux de ruissellement"}}, {"code": "agroforestry", "definition": {"en": "Integrating trees or shrubs into farming systems to improve water retention, reduce erosion, provide shade, and improve soil carbon.", "es": "Integraci\u00f3n de \u00e1rboles o arbustos en sistemas agr\u00edcolas para mejorar la retenci\u00f3n de agua, reducir la erosi\u00f3n, proporcionar sombra y mejorar el carbono del suelo.", "fr": "Int\u00e9gration d''arbres ou d''arbustes dans les syst\u00e8mes agricoles pour am\u00e9liorer la r\u00e9tention d''eau, r\u00e9duire l''\u00e9rosion, fournir de l''ombre et am\u00e9liorer le carbone du sol."}, "label": {"en": "Agroforestry (trees on farmland)", "es": "Agroforester\u00eda (\u00e1rboles en tierras de cultivo)", "fr": "Agroforesterie (arbres sur terres agricoles)"}}, {"code": "soil_conservation_practices", "definition": {"en": "Practices to maintain soil quality and reduce erosion \u2014 including mulching, cover crops, contour bunding, and terracing.", "es": "Pr\u00e1cticas para mantener la calidad del suelo y reducir la erosi\u00f3n \u2014 incluidos el acolchado, cultivos de cobertura, banquetas en curva de nivel y terrazas.", "fr": "Pratiques de maintien de la qualit\u00e9 du sol et de r\u00e9duction de l''\u00e9rosion \u2014 y compris le paillage, les cultures de couverture, le billonnage en courbe de niveau et les terrasses."}, "label": {"en": "Soil conservation or erosion control", "es": "Conservaci\u00f3n del suelo o control de la erosi\u00f3n", "fr": "Conservation du sol ou contr\u00f4le de l''\u00e9rosion"}}, {"code": "improved_irrigation", "definition": {"en": "Installing or using drip, sprinkler, or small-scale supplemental irrigation to cope with unreliable rainfall. ''Improved'' is a CSA domain term of art per World Bank CSA Country Profiles and FAO EX-ACT.", "es": "Instalaci\u00f3n o uso de riego por goteo, aspersi\u00f3n o suplementario a peque\u00f1a escala para hacer frente a lluvias poco confiables.", "fr": "Installation ou utilisation de l''irrigation goutte \u00e0 goutte, par aspersion ou d''appoint \u00e0 petite \u00e9chelle pour faire face aux pr\u00e9cipitations peu fiables."}, "label": {"en": "Improved or supplemental irrigation", "es": "Riego mejorado o suplementario", "fr": "Irrigation am\u00e9lior\u00e9e ou compl\u00e9mentaire"}}, {"code": "diversified_crops", "definition": {"en": "Growing multiple crop types or varieties to reduce the risk that one crop failure eliminates all food or income.", "es": "Cultivo de m\u00faltiples tipos o variedades de cultivos para reducir el riesgo de que una p\u00e9rdida de cosecha elimine todos los alimentos o ingresos.", "fr": "Culture de plusieurs types ou vari\u00e9t\u00e9s de cultures pour r\u00e9duire le risque qu''une mauvaise r\u00e9colte \u00e9limine toute la nourriture ou les revenus."}, "label": {"en": "Crop diversification", "es": "Diversificaci\u00f3n de cultivos", "fr": "Diversification des cultures"}}, {"code": "climate_smart_livestock", "definition": {"en": "Adapting livestock management to heat or drought \u2014 including destocking before drought, shifting to heat-tolerant breeds, improving water access for animals, and providing shade structures.", "es": "Adaptaci\u00f3n del manejo ganadero al calor o la sequ\u00eda \u2014 incluidos el destock antes de la sequ\u00eda, el cambio a razas tolerantes al calor, la mejora del acceso al agua para los animales y la provisi\u00f3n de estructuras de sombra.", "fr": "Adaptation de la gestion du b\u00e9tail \u00e0 la chaleur ou \u00e0 la s\u00e9cheresse \u2014 y compris le d\u00e9stockage avant la s\u00e9cheresse, le passage \u00e0 des races tol\u00e9rantes \u00e0 la chaleur, l''am\u00e9lioration de l''acc\u00e8s \u00e0 l''eau pour les animaux et la fourniture d''abris ombrag\u00e9s."}, "label": {"en": "Climate-smart livestock practices", "es": "Pr\u00e1cticas ganaderas clim\u00e1ticamente inteligentes", "fr": "Pratiques d''\u00e9levage climato-intelligentes"}}, {"code": "flood_defenses", "definition": {"en": "Measures taken by the household to protect its dwelling or productive assets from flood damage \u2014 including elevated floors, flood barriers, and sandbagging.", "es": "Medidas tomadas por el hogar para proteger su vivienda o activos productivos de da\u00f1os por inundaci\u00f3n \u2014 incluidos pisos elevados, barreras contra inundaciones y sacos de arena.", "fr": "Mesures prises par le m\u00e9nage pour prot\u00e9ger son logement ou ses actifs productifs contre les dommages li\u00e9s aux inondations \u2014 y compris le rehaussement des planchers, les barri\u00e8res anti-crue et les sacs de sable."}, "label": {"en": "Household flood defenses", "es": "Defensas contra inundaciones a nivel del hogar", "fr": "D\u00e9fenses contre les inondations au niveau du m\u00e9nage"}}, {"code": "energy_efficient_cookstove", "definition": {"en": "Using a fuel-efficient cookstove that reduces firewood collection needs and dependence on forest resources, relevant when deforestation is worsening local climate risks.", "es": "Uso de una cocina eficiente en combustible que reduce las necesidades de recolecci\u00f3n de le\u00f1a y la dependencia de recursos forestales, relevante cuando la deforestaci\u00f3n empeora los riesgos clim\u00e1ticos locales.", "fr": "Utilisation d''une cuisini\u00e8re \u00e9conome en combustible qui r\u00e9duit les besoins en bois de chauffe et la d\u00e9pendance aux ressources foresti\u00e8res, pertinent lorsque la d\u00e9forestation aggrave les risques climatiques locaux."}, "label": {"en": "Energy-efficient or improved cookstove", "es": "Cocina de bajo consumo energ\u00e9tico o mejorada", "fr": "Cuisini\u00e8re \u00e9conome en \u00e9nergie ou cuisini\u00e8re am\u00e9lior\u00e9e"}}, {"code": "renewable_energy", "definition": {"en": "Using solar panels, solar lanterns, solar water pumps, wind power, or biogas for energy needs, reducing climate vulnerability from energy price shocks or wood-fuel scarcity.", "es": "Uso de paneles solares, linternas solares, bombas de agua solares, energ\u00eda e\u00f3lica o biog\u00e1s para necesidades energ\u00e9ticas, reduciendo la vulnerabilidad clim\u00e1tica ante choques en precios de energ\u00eda o escasez de le\u00f1a.", "fr": "Utilisation de panneaux solaires, lanternes solaires, pompes \u00e0 eau solaires, \u00e9nergie \u00e9olienne ou biogaz pour les besoins \u00e9nerg\u00e9tiques, r\u00e9duisant la vuln\u00e9rabilit\u00e9 climatique li\u00e9e aux chocs de prix de l''\u00e9nergie ou \u00e0 la p\u00e9nurie de bois."}, "label": {"en": "Renewable energy (solar, wind, biogas)", "es": "Energ\u00eda renovable (solar, e\u00f3lica, biog\u00e1s)", "fr": "\u00c9nergie renouvelable (solaire, \u00e9olien, biogaz)"}}, {"code": "early_or_late_planting", "definition": {"en": "Changing the timing of crop planting in response to observed shifts in seasonal rainfall onset or temperature
        patterns.", "es": "Cambio en el calendario de siembra en respuesta a cambios observados en el inicio de las lluvias estacionales o patrones de temperatura.", "fr": "Modification du calendrier de plantation en r\u00e9ponse aux d\u00e9calages observ\u00e9s dans l''onset des pr\u00e9cipitations saisonni\u00e8res ou les tendances de temp\u00e9rature."}, "label": {"en": "Adjusted planting dates (early or late)", "es": "Fechas de siembra ajustadas (temprana o tard\u00eda)", "fr": "Dates de plantation ajust\u00e9es (pr\u00e9coce ou tardive)"}}, {"code": "post_harvest_storage", "definition": {"en": "Using hermetic bags, silos, or treated storage to reduce post-harvest crop losses, which are exacerbated by higher temperatures and humidity variability.", "es": "Uso de bolsas herm\u00e9ticas, silos o almacenamiento tratado para reducir las p\u00e9rdidas post-cosecha, agravadas por el aumento de temperaturas y la variabilidad de la humedad.", "fr": "Utilisation de sacs herm\u00e9tiques, silos ou stockage trait\u00e9 pour r\u00e9duire les pertes post-r\u00e9colte, aggrav\u00e9es par la hausse des temp\u00e9ratures et la variabilit\u00e9 de l''humidit\u00e9."}, "label": {"en": "Improved post-harvest storage", "es": "Almacenamiento post-cosecha mejorado", "fr": "Stockage post-r\u00e9colte am\u00e9lior\u00e9"}}, {"code": "index_or_crop_insurance", "definition": {"en": "Purchasing weather-index, area-yield, or livestock insurance products to manage climate-related production risk.", "es": "Compra de productos de seguro de \u00edndice meteorol\u00f3gico, rendimiento por \u00e1rea o ganader\u00eda para gestionar el riesgo de producci\u00f3n relacionado con el clima.", "fr": "Achat de produits d''assurance indicielle m\u00e9t\u00e9orologique, de rendement de zone ou de b\u00e9tail pour g\u00e9rer le risque de production li\u00e9 au climat."}, "label": {"en": "Crop, livestock, or index insurance", "es": "Seguro de cultivos, ganader\u00eda o \u00edndice", "fr": "Assurance r\u00e9colte, b\u00e9tail ou indicielle"}}, {"code": "none_no_specific_practice", "definition": {"en": "The household has not adopted any specific climate-smart or climate-adaptive practice. Mutually exclusive with all other codes.", "es": "El hogar no ha adoptado ninguna pr\u00e1ctica clim\u00e1ticamente inteligente o de adaptaci\u00f3n clim\u00e1tica espec\u00edfica. Mutuamente exclusivo con todos los dem\u00e1s c\u00f3digos.", "fr": "Le m\u00e9nage n''a adopt\u00e9 aucune pratique climato-intelligente ou d''adaptation climatique sp\u00e9cifique. Mutuellement exclusif avec tous les autres codes."}, "label": {"en": "None of the above", "es": "Ninguna de las anteriores", "fr": "Aucune de ces pratiques"}}]}'
