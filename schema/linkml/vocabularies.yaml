pondent confirms the event or condition did not occur.", "es": "El encuestado confirma que el evento o condici\u00f3n no ocurri\u00f3.", "fr": "Le r\u00e9pondant confirme que l''\u00e9v\u00e9nement ou la condition ne s''est pas produit."}, "label": {"en": "No", "es": "No", "fr": "Non"}}, {"code": "prefer_not_to_answer", "definition": {"en": "The respondent declines to provide an answer for this item. This is a valid response and must not be re-coded as missing.", "es": "El encuestado se niega a proporcionar una respuesta para este \u00edtem. Esta es una respuesta v\u00e1lida y no debe recodificarse como faltante.", "fr": "Le r\u00e9pondant refuse de fournir une r\u00e9ponse pour cet item. Il s''agit d''une r\u00e9ponse valide qui ne doit pas \u00eatre recod\u00e9e comme manquante."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
