  GbvPrevPartnerTiming:
    title:
      en: Timing of violence by previous partner
      fr: Moment des violences par un partenaire précédent
      es: Momento de la violencia por un compañero anterior
    description:
      en: Timing of violence experienced from a previous husband or partner relative to the interview date, corresponding to DHS DV15B. Used to distinguish recent from historical partner violence for respondents who report experiencing violence from a previous partner.
      fr: Moment des violences subies de la part d'un mari ou partenaire précédent par rapport à la date de l'entretien, correspondant au DHS DV15B. Utilisé pour distinguer les violences récentes des violences historiques d'un partenaire pour les répondantes qui signalent avoir subi des violences d'un partenaire précédent.
      es: Momento de la violencia experimentada de un marido o compañero anterior en relación con la fecha de la entrevista, correspondiente al DHS DV15B. Se usa para distinguir violencia de pareja reciente de la histórica.
    enum_uri: aidops:GbvPrevPartnerTiming
    permissible_values:
      within_12m:
        title:
          en: Within the last 12 months
          fr: Au cours des 12 derniers mois
          es: En los últimos 12 meses
        description:
          en: Violence by the previous partner occurred within the 12 months preceding the interview.
          fr: La violence du partenaire précédent s'est produite dans les 12 mois précédant l'entretien.
          es: La violencia del compañero anterior ocurrió en los 12 meses anteriores a la entrevista.
      over_12m_ago:
        title:
          en: 12 or more months ago
          fr: Il y a 12 mois ou plus
          es: Hace 12 o más meses
        description:
          en: Violence by the previous partner last occurred 12 or more months before the interview.
          fr: La violence du partenaire précédent s'est produite pour la dernière fois 12 mois ou plus avant l'entretien.
          es: La violencia del compañero anterior ocurrió por última vez 12 o más meses antes de la entrevista.
      dont_remember:
        title:
          en: Does not remember
          fr: Ne se souvient pas
          es: No recuerda
        description:
          en: The respondent cannot recall when the violence by the previous partner last occurred.
          fr: La répondante ne se souvient pas de la dernière occurrence de la violence du partenaire précédent.
          es: La encuestada no recuerda cuándo ocurrió por última vez la violencia del compañero anterior.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "definition": {"en": "Timing of violence experienced from a previous husband or partner relative to the interview date, corresponding to DHS DV15B. Used to distinguish recent from historical partner violence for respondents who report experiencing violence from a previous partner.", "es": "Momento de la violencia experimentada de un marido o compa\u00f1ero anterior en relaci\u00f3n con la fecha de la entrevista, correspondiente al DHS DV15B. Se usa para distinguir violencia de pareja reciente de la hist\u00f3rica.", "fr": "Moment des violences subies de la part d''un mari ou partenaire pr\u00e9c\u00e9dent par rapport \u00e0 la date de l''entretien, correspondant au DHS DV15B. Utilis\u00e9 pour distinguer les violences r\u00e9centes des violences historiques d''un partenaire pour les r\u00e9pondantes qui signalent avoir subi des violences d''un partenaire pr\u00e9c\u00e9dent."}, "id": "gbv-prev-partner-timing", "label": {"en": "Timing of violence by previous partner", "es": "Momento de la violencia por un compa\u00f1ero anterior", "fr": "Moment des violences par un partenaire pr\u00e9c\u00e9dent"}, "maturity": "draft", "standard": {"name": "dhs-domestic-violence-module-2022", "notes": "DV15B (timing of previous partner violence)", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}, "values": [{"code": "within_12m", "definition": {"en": "Violence by the previous partner occurred within the 12 months preceding the interview.", "es": "La violencia del compa\u00f1ero anterior ocurri\u00f3 en los 12 meses anteriores a la entrevista.", "fr": "La violence du partenaire pr\u00e9c\u00e9dent s''est produite dans les 12 mois pr\u00e9c\u00e9dant l''entretien."}, "label": {"en": "Within the last 12 months", "es": "En los \u00faltimos 12 meses", "fr": "Au cours des 12 derniers mois"}}, {"code": "over_12m_ago", "definition": {"en": "Violence by the previous partner last occurred 12 or more months before the interview.", "es": "La violencia del compa\u00f1ero anterior ocurri\u00f3 por \u00faltima vez 12 o m\u00e1s meses antes de la entrevista.", "fr": "La violence du partenaire pr\u00e9c\u00e9dent s''est produite pour la derni\u00e8re fois 12 mois ou plus avant l''entretien."}, "label": {"en": "12 or more months ago", "es": "Hace 12 o m\u00e1s meses", "fr": "Il y a 12 mois ou plus"}}, {"code": "dont_remember", "definition": {"en": "The respondent cannot recall when the violence by the previous partner last occurred.", "es": "La encuestada no recuerda cu\u00e1ndo ocurri\u00f3 por \u00faltima vez la violencia del compa\u00f1ero anterior.", "fr": "La r\u00e9pondante ne se souvient pas de la derni\u00e8re occurrence de la violence du partenaire pr\u00e9c\u00e9dent."}, "label": {"en": "Does not remember", "es": "No recuerda", "fr": "Ne se souvient pas"}}]}'
