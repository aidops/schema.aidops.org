  ProtectionReferralChannel:
    title:
      en: Protection referral channel
      fr: Canal de signalement de protection
      es: Canal de derivación de protección
    description:
      en: Types of protection complaint or referral mechanisms known to a household. Signals whether the household knows formal external mechanisms (which can address state or armed actor violations) or only informal/customary mechanisms (which may not). Based on GPC PAF Domain 2 (Rule of Law and Justice); Sphere Protection Principle 4 (Strengthen people's capacity to claim their rights); REACH Syria (2022) referral awareness module.
      fr: Types de mécanismes de signalement ou d'orientation en matière de protection connus d'un ménage. Indique si le ménage connaît des mécanismes formels externes (pouvant traiter les violations d'acteurs étatiques ou armés) ou uniquement des mécanismes informels/coutumiers (qui peuvent ne pas le faire). Fondé sur GPC PAF Domaine 2 (État de droit et justice) ; Sphère Principe de protection 4 (Renforcer la capacité des personnes à revendiquer leurs droits) ; REACH Syrie (2022) module de connaissance des mécanismes de référence.
      es: Tipos de mecanismos de denuncia o derivación en materia de protección conocidos por un hogar. Señala si el hogar conoce mecanismos formales externos (que pueden abordar violaciones de actores estatales o armados) o solo mecanismos informales/consuetudinarios (que pueden no hacerlo). Basado en GPC PAF Dominio 2 (Estado de Derecho y Justicia); Principio de Protección 4 de Esfera (Fortalecer la capacidad de las personas para reclamar sus derechos); módulo de conocimiento de mecanismos de derivación de REACH Siria (2022).
    enum_uri: aidops:ProtectionReferralChannel
    permissible_values:
      formal_police_justice:
        title:
          en: Police or formal justice system
          fr: Police ou système judiciaire formel
          es: Policía o sistema judicial formal
        description:
          en: Government police, courts, or prosecutorial authorities.
          fr: Police gouvernementale, tribunaux ou autorités de poursuite.
          es: Policía gubernamental, tribunales o autoridades fiscales.
      un_protection_cluster:
        title:
          en: UN or protection cluster actor
          fr: ONU ou acteur du cluster protection
          es: ONU o actor del clúster de protección
        description:
          en: UNHCR, OHCHR, or another UN or protection cluster agency with a complaints or referral function.
          fr: UNHCR, HCDH ou une autre agence des Nations Unies ou du cluster protection ayant une fonction de plaintes ou d'orientation.
          es: ACNUR, ACNUDH u otra agencia de la ONU o del clúster de protección con función de quejas o derivación.
      ngo_protection_actor:
        title:
          en: NGO protection service
          fr: Service de protection d'une ONG
          es: Servicio de protección de una ONG
        description:
          en: A non-governmental organization providing protection services, case management, or legal aid.
          fr: Une organisation non gouvernementale fournissant des services de protection, de gestion de cas ou d'aide juridique.
          es: Una organización no gubernamental que proporciona servicios de protección, manejo de casos o asistencia jurídica.
      community_structure:
        title:
          en: Community-based structure
          fr: Structure communautaire
          es: Estructura comunitaria
        description:
          en: A community committee, local council, or neighborhood-level body that handles complaints.
          fr: Un comité communautaire, un conseil local ou un organe de quartier qui traite les plaintes.
          es: Un comité comunitario, consejo local u organismo a nivel de barrio que maneja quejas.
      customary_authority:
        title:
          en: Customary or traditional authority
          fr: Autorité coutumière ou traditionnelle
          es: Autoridad consuetudinaria o tradicional
        description:
          en: A traditional chief, elder, or customary court.
          fr: Un chef traditionnel, un ancien ou un tribunal coutumier.
          es: Un jefe tradicional, anciano o tribunal consuetudinario.
      hotline:
        title:
          en: Hotline or phone-based complaint
          fr: Ligne d'assistance ou réclamation téléphonique
          es: Línea de atención o queja telefónica
        description:
          en: A telephone hotline for reporting protection concerns.
          fr: Une ligne téléphonique d'assistance pour signaler des préoccupations en matière de protection.
          es: Una línea telefónica de atención para reportar problemas de protección.
      dont_know_type:
        title:
          en: Knows mechanisms exist but not the type
          fr: Sait que des mécanismes existent mais pas leur nature
          es: Sabe que existen mecanismos pero no el tipo
        description:
          en: Respondent is aware that protection reporting is possible but cannot identify the type of mechanism.
          fr: Le répondant sait qu'il est possible de signaler des problèmes de protection mais ne peut pas identifier le type de mécanisme.
          es: El encuestado sabe que es posible reportar problemas de protección pero no puede identificar el tipo de mecanismo.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gpc-paf-2021", "reach-protection-monitoring-2022"], "definition": {"en": "Types of protection complaint or referral mechanisms known to a household. Signals whether the household knows formal external mechanisms (which can address state or armed actor violations) or only informal/customary mechanisms (which may not). Based on GPC PAF Domain 2 (Rule of Law and Justice); Sphere Protection Principle 4 (Strengthen people''s capacity to claim their rights); REACH Syria (2022) referral awareness module.", "es": "Tipos de mecanismos de denuncia o derivaci\u00f3n en materia de protecci\u00f3n conocidos por un hogar. Se\u00f1ala si el hogar conoce mecanismos formales externos (que pueden abordar violaciones de actores estatales o armados) o solo mecanismos informales/consuetudinarios (que pueden no hacerlo). Basado en GPC PAF Dominio 2 (Estado de Derecho y Justicia); Principio de Protecci\u00f3n 4 de Esfera (Fortalecer la capacidad de las personas para reclamar sus derechos); m\u00f3dulo de conocimiento de mecanismos de derivaci\u00f3n de REACH Siria (2022).", "fr": "Types de m\u00e9canismes de signalement ou d''orientation en mati\u00e8re de protection connus d''un m\u00e9nage. Indique si le m\u00e9nage conna\u00eet des m\u00e9canismes formels externes (pouvant traiter les violations d''acteurs \u00e9tatiques ou arm\u00e9s) ou uniquement des m\u00e9canismes informels/coutumiers (qui peuvent ne pas le faire). Fond\u00e9 sur GPC PAF Domaine 2 (\u00c9tat de droit et justice) ; Sph\u00e8re Principe de protection 4 (Renforcer la capacit\u00e9 des personnes \u00e0 revendiquer leurs droits) ; REACH Syrie (2022) module de connaissance des m\u00e9canismes de r\u00e9f\u00e9rence."}, "id": "protection-referral-channel", "label": {"en": "Protection referral channel", "es": "Canal de derivaci\u00f3n de protecci\u00f3n", "fr": "Canal de signalement de protection"}, "maturity": "draft", "values": [{"code": "formal_police_justice", "definition": {"en": "Government police, courts, or prosecutorial authorities.", "es": "Polic\u00eda gubernamental, tribunales o autoridades fiscales.", "fr": "Police gouvernementale, tribunaux ou autorit\u00e9s de poursuite."}, "label": {"en": "Police or formal justice system", "es": "Polic\u00eda o sistema judicial formal", "fr": "Police ou syst\u00e8me judiciaire formel"}}, {"code": "un_protection_cluster", "definition": {"en": "UNHCR, OHCHR, or another UN or protection cluster agency with a complaints or referral function.", "es": "ACNUR, ACNUDH u otra agencia de la ONU o del cl\u00faster de protecci\u00f3n con funci\u00f3n de quejas o derivaci\u00f3n.", "fr": "UNHCR, HCDH ou une autre agence des Nations Unies ou du cluster protection ayant une fonction de plaintes ou d''orientation."}, "label": {"en": "UN or protection cluster actor", "es": "ONU o actor del cl\u00faster de protecci\u00f3n", "fr": "ONU ou acteur du cluster protection"}}, {"code": "ngo_protection_actor", "definition": {"en": "A non-governmental organization providing protection services, case management, or legal aid.", "es": "Una organizaci\u00f3n no gubernamental que proporciona servicios de protecci\u00f3n, manejo de casos o asistencia jur\u00eddica.", "fr": "Une organisation non gouvernementale fournissant des services de protection, de gestion de cas ou d''aide juridique."}, "label": {"en": "NGO protection service", "es": "Servicio de protecci\u00f3n de una ONG", "fr": "Service de protection d''une ONG"}}, {"code": "community_structure", "definition": {"en": "A community committee, local council, or neighborhood-level body that handles complaints.", "es": "Un comit\u00e9 comunitario, consejo local u organismo a nivel de barrio que maneja quejas.", "fr": "Un comit\u00e9 communautaire, un conseil local ou un organe de quartier qui traite les plaintes."}, "label": {"en": "Community-based structure", "es": "Estructura comunitaria", "fr": "Structure communautaire"}}, {"code": "customary_authority", "definition": {"en": "A traditional chief, elder, or customary court.", "es": "Un jefe tradicional, anciano o tribunal consuetudinario.", "fr": "Un chef traditionnel, un ancien ou un tribunal coutumier."}, "label": {"en": "Customary or traditional authority", "es": "Autoridad consuetudinaria o tradicional", "fr": "Autorit\u00e9 coutumi\u00e8re ou traditionnelle"}}, {"code": "hotline", "definition": {"en": "A telephone hotline for reporting protection concerns.", "es": "Una l\u00ednea telef\u00f3nica de atenci\u00f3n para reportar problemas de protecci\u00f3n.", "fr": "Une ligne t\u00e9l\u00e9phonique d''assistance pour signaler des pr\u00e9occupations en mati\u00e8re de protection."}, "label": {"en": "Hotline or phone-based complaint", "es": "L\u00ednea de atenci\u00f3n o queja telef\u00f3nica", "fr": "Ligne d''assistance ou r\u00e9clamation t\u00e9l\u00e9phonique"}}, {"code": "dont_know_type", "definition": {"en": "Respondent is aware that protection reporting is possible but cannot identify the type of mechanism.", "es": "El encuestado sabe que es posible reportar problemas de protecci\u00f3n pero no puede identificar el tipo de mecanismo.", "fr": "Le r\u00e9pondant sait qu''il est possible de signaler des probl\u00e8mes de protection mais ne peut pas identifier le type de m\u00e9canisme."}, "label": {"en": "Knows mechanisms exist but not the type", "es": "Sabe que existen mecanismos pero no el tipo", "fr": "Sait que des m\u00e9canismes existent mais pas leur nature"}}]}'
