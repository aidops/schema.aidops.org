  ReturnIntention:
    title:
      en: Return Intention
      fr: Intention de retour
      es: Intención de retorno
    description:
      en: 'The household''s stated future preference regarding its place of residence, expressed in terms of the three durable solutions recognized by the IASC Framework: return to area of origin, local integration at current displacement location, or settlement elsewhere.'
      fr: 'La préférence future déclarée du ménage concernant son lieu de résidence, exprimée en termes des trois solutions durables reconnues par le Cadre de l''IASC : retour dans la zone d''origine, intégration locale au lieu de déplacement actuel ou installation ailleurs.'
      es: 'La preferencia futura declarada del hogar respecto a su lugar de residencia, expresada en términos de las tres soluciones duraderas reconocidas por el Marco del IASC: retorno al área de origen, integración local en el lugar de desplazamiento actual o asentamiento en otro lugar.'
    enum_uri: aidops:ReturnIntention
    permissible_values:
      intend_to_return_origin:
        title:
          en: Intend to return to area of origin
          fr: Intention de retourner dans la zone d'origine
          es: Intención de retornar al área de origen
        description:
          en: Household intends to return to the area from which it was displaced.
          fr: Le ménage a l'intention de retourner dans la zone d'où il a été déplacé.
          es: El hogar tiene la intención de retornar al área de la que fue desplazado.
      intend_to_relocate_elsewhere:
        title:
          en: Intend to relocate to a different area
          fr: Intention de se réinstaller dans une autre zone
          es: Intención de reubicarse en otra área
        description:
          en: Household intends to settle in a location other than its area of origin and different from its current displacement location.
          fr: Le ménage a l'intention de s'installer dans un lieu autre que sa zone d'origine et différent de son lieu de déplacement actuel.
          es: El hogar tiene la intención de establecerse en un lugar distinto de su área de origen y diferente de su ubicación de desplazamiento actual.
      intend_to_integrate_locally:
        title:
          en: Intend to integrate locally
          fr: Intention de s'intégrer localement
          es: Intención de integrarse localmente
        description:
          en: Household intends to remain and permanently integrate in the current location of displacement.
          fr: Le ménage a l'intention de rester et de s'intégrer définitivement dans son lieu de déplacement actuel.
          es: El hogar tiene la intención de permanecer e integrarse permanentemente en su ubicación de desplazamiento actual.
      undecided:
        title:
          en: Undecided
          fr: Indécis
          es: Indeciso
        description:
          en: Household has not yet decided on a durable solution preference.
          fr: Le ménage n'a pas encore décidé d'une préférence pour une solution durable.
          es: El hogar no ha decidido aún una preferencia de solución duradera.
      no_intention_to_return:
        title:
          en: No intention to return
          fr: Aucune intention de retour
          es: Sin intención de retornar
        description:
          en: Household has definitively decided not to return to its area of origin and is considering local integration or relocation elsewhere.
          fr: Le ménage a définitivement décidé de ne pas retourner dans sa zone d'origine et envisage une intégration locale ou une réinstallation ailleurs.
          es: El hogar ha decidido definitivamente no retornar a su área de origen y está considerando integración local o reubicación en otro lugar.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-durable-solutions-2010", "iom-dtm-methodology-2021"], "definition": {"en": "The household''s stated future preference regarding its place of residence, expressed in terms of the three durable solutions recognized by the IASC Framework: return to area of origin, local integration at current displacement location, or settlement elsewhere.", "es": "La preferencia futura declarada del hogar respecto a su lugar de residencia, expresada en t\u00e9rminos de las tres soluciones duraderas reconocidas por el Marco del IASC: retorno al \u00e1rea de origen, integraci\u00f3n local en el lugar de desplazamiento actual o asentamiento en otro lugar.", "fr": "La pr\u00e9f\u00e9rence future d\u00e9clar\u00e9e du m\u00e9nage concernant son lieu de r\u00e9sidence, exprim\u00e9e en termes des trois solutions durables reconnues par le Cadre de l''IASC : retour dans la zone d''origine, int\u00e9gration locale au lieu de d\u00e9placement actuel ou installation ailleurs."}, "id": "return-intention", "label": {"en": "Return Intention", "es": "Intenci\u00f3n de retorno", "fr": "Intention de retour"}, "maturity": "draft", "standard": {"name": "IASC Framework on Durable Solutions for Internally Displaced Persons; IOM DTM Return Intention component", "uri": "https://interagencystandingcommittee.org/other/iasc-framework-durable-solutions-internally-displaced-persons"}, "values": [{"code": "intend_to_return_origin", "definition": {"en": "Household intends to return to the area from which it was displaced.", "es": "El hogar tiene la intenci\u00f3n de retornar al \u00e1rea de la que fue desplazado.", "fr": "Le m\u00e9nage a l''intention de retourner dans la zone d''o\u00f9 il a \u00e9t\u00e9 d\u00e9plac\u00e9."}, "label": {"en": "Intend to return to area of origin", "es": "Intenci\u00f3n de retornar al \u00e1rea de origen", "fr": "Intention de retourner dans la zone d''origine"}}, {"code": "intend_to_relocate_elsewhere", "definition": {"en": "Household intends to settle in a location other than its area of origin and different from its current displacement location.", "es": "El hogar tiene la intenci\u00f3n de establecerse en un lugar distinto de su \u00e1rea de origen y diferente de su ubicaci\u00f3n de desplazamiento actual.", "fr": "Le m\u00e9nage a l''intention de s''installer dans un lieu autre que sa zone d''origine et diff\u00e9rent de son lieu de d\u00e9placement actuel."}, "label": {"en": "Intend to relocate to a different area", "es": "Intenci\u00f3n de reubicarse en otra \u00e1rea", "fr": "Intention de se r\u00e9installer dans une autre zone"}}, {"code": "intend_to_integrate_locally", "definition": {"en": "Household intends to remain and permanently integrate in the current location of displacement.", "es": "El hogar tiene la intenci\u00f3n de permanecer e integrarse permanentemente en su ubicaci\u00f3n de desplazamiento actual.", "fr": "Le m\u00e9nage a l''intention de rester et de s''int\u00e9grer d\u00e9finitivement dans son lieu de d\u00e9placement actuel."}, "label": {"en": "Intend to integrate locally", "es": "Intenci\u00f3n de integrarse localmente", "fr": "Intention de s''int\u00e9grer localement"}}, {"code": "undecided", "definition": {"en": "Household has not yet decided on a durable solution preference.", "es": "El hogar no ha decidido a\u00fan una preferencia de soluci\u00f3n duradera.", "fr": "Le m\u00e9nage n''a pas encore d\u00e9cid\u00e9 d''une pr\u00e9f\u00e9rence pour une solution durable."}, "label": {"en": "Undecided", "es": "Indeciso", "fr": "Ind\u00e9cis"}}, {"code": "no_intention_to_return", "definition": {"en": "Household has definitively decided not to return to its area of origin and is considering local integration or relocation elsewhere.", "es": "El hogar ha decidido definitivamente no retornar a su \u00e1rea de origen y est\u00e1 considerando integraci\u00f3n local o reubicaci\u00f3n en otro lugar.", "fr": "Le m\u00e9nage a d\u00e9finitivement d\u00e9cid\u00e9 de ne pas retourner dans sa zone d''origine et envisage une int\u00e9gration locale ou une r\u00e9installation ailleurs."}, "label": {"en": "No intention to return", "es": "Sin intenci\u00f3n de retornar", "fr": "Aucune intention de retour"}}]}'
      bibliography_refs: iasc-durable-solutions-2010,iom-dtm-methodology-2021
  ReturnTimeline:
    title:
      en: Return Timeline
      fr: Calendrier de retour
      es: Cronograma de retorno
    description:
      en: The household's estimated timeline for executing its stated return or relocation intention. Applies only when return_intention is intend_to_return_origin or intend_to_relocate_elsewhere.
      fr: Le calendrier estimé du ménage pour mettre en œuvre son intention déclarée de retour ou de réinstallation. S'applique uniquement lorsque return_intention est intend_to_return_origin ou intend_to_relocate_elsewhere.
      es: El cronograma estimado del hogar para ejecutar su intención declarada de retorno o reubicación. Se aplica solo cuando return_intention es intend_to_return_origin o intend_to_relocate_elsewhere.
    enum_uri: aidops:ReturnTimeline
    permissible_values:
      within_3_months:
        title:
          en: Within 3 months
          fr: Dans les 3 mois
          es: En los próximos 3 meses
        description:
          en: Household plans to move within the next 3 months.
          fr: Le ménage prévoit de se déplacer dans les 3 prochains mois.
          es: El hogar planea moverse en los próximos 3 meses.
      within_6_months:
        title:
          en: Within 6 months
          fr: Dans les 6 mois
          es: En los próximos 6 meses
        description:
          en: Household plans to move within the next 6 months.
          fr: Le ménage prévoit de se déplacer dans les 6 prochains mois.
          es: El hogar planea moverse en los próximos 6 meses.
      within_1_year:
        title:
          en: Within 1 year
          fr: Dans l'année
          es: En el próximo año
        description:
          en: Household plans to move within the next 12 months.
          fr: Le ménage prévoit de se déplacer dans les 12 prochains mois.
          es: El hogar planea moverse en los próximos 12 meses.
      more_than_1_year:
        title:
          en: More than 1 year
          fr: Plus d'un an
          es: Más de 1 año
        description:
          en: Household plans to move but not within the next year.
          fr: Le ménage prévoit de se déplacer mais pas dans l'année à venir.
          es: El hogar planea moverse pero no dentro del próximo año.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Household cannot estimate a timeline for its intended move.
          fr: Le ménage ne peut pas estimer un calendrier pour son déménagement prévu.
          es: El hogar no puede estimar un cronograma para su traslado previsto.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iom-dtm-methodology-2021"], "definition": {"en": "The household''s estimated timeline for executing its stated return or relocation intention. Applies only when return_intention is intend_to_return_origin or intend_to_relocate_elsewhere.", "es": "El cronograma estimado del hogar para ejecutar su intenci\u00f3n declarada de retorno o reubicaci\u00f3n. Se aplica solo cuando return_intention es intend_to_return_origin o intend_to_relocate_elsewhere.", "fr": "Le calendrier estim\u00e9 du m\u00e9nage pour mettre en \u0153uvre son intention d\u00e9clar\u00e9e de retour ou de r\u00e9installation. S''applique uniquement lorsque return_intention est intend_to_return_origin ou intend_to_relocate_elsewhere."}, "id": "return-timeline", "label": {"en": "Return Timeline", "es": "Cronograma de retorno", "fr": "Calendrier de retour"}, "maturity": "draft", "standard": {"name": "IOM DTM Intentions and Needs Survey (INS); IOM DTM South Sudan Rapid Intentions Survey", "uri": "https://dtm.iom.int/about/methodological-framework"}, "values": [{"code": "within_3_months", "definition": {"en": "Household plans to move within the next 3 months.", "es": "El hogar planea moverse en los pr\u00f3ximos 3 meses.", "fr": "Le m\u00e9nage pr\u00e9voit de se d\u00e9placer dans les 3 prochains mois."}, "label": {"en": "Within 3 months", "es": "En los pr\u00f3ximos 3 meses", "fr": "Dans les 3 mois"}}, {"code": "within_6_months", "definition": {"en": "Household plans to move within the next 6 months.", "es": "El hogar planea moverse en los pr\u00f3ximos 6 meses.", "fr": "Le m\u00e9nage pr\u00e9voit de se d\u00e9placer dans les 6 prochains mois."}, "label": {"en": "Within 6 months", "es": "En los pr\u00f3ximos 6 meses", "fr": "Dans les 6 mois"}}, {"code": "within_1_year", "definition": {"en": "Household plans to move within the next 12 months.", "es": "El hogar planea moverse en los pr\u00f3ximos 12 meses.", "fr": "Le m\u00e9nage pr\u00e9voit de se d\u00e9placer dans les 12 prochains mois."}, "label": {"en": "Within 1 year", "es": "En el pr\u00f3ximo a\u00f1o", "fr": "Dans l''ann\u00e9e"}}, {"code": "more_than_1_year", "definition": {"en": "Household plans to move but not within the next year.", "es": "El hogar planea moverse pero no dentro del pr\u00f3ximo a\u00f1o.", "fr": "Le m\u00e9nage pr\u00e9voit de se d\u00e9placer mais pas dans l''ann\u00e9e \u00e0 venir."}, "label": {"en": "More than 1 year", "es": "M\u00e1s de 1 a\u00f1o", "fr": "Plus d''un an"}}, {"code": "dont_know", "definition": {"en": "Household cannot estimate a timeline for its intended move.", "es": "El hogar no puede estimar un cronograma para su traslado previsto.", "fr": "Le m\u00e9nage ne peut pas estimer un calendrier pour son d\u00e9m\u00e9nagement pr\u00e9vu."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
