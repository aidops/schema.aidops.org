      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-health-insurance-as45"], "definition": {"en": "Type of health insurance or social health protection scheme that covers one or more household members. Multi-select: a single household may have members covered by different schemes. Types follow the WHO health financing taxonomy (prepaid public / private commercial / community / employer-based) and the DHS INSHHANY variable. Community-Based Health Insurance (CBHI, e.g., mutuelles de sant\u00e9) is a distinct category from national statutory schemes and is common in low-income settings.", "es": "Tipo de seguro de salud o esquema de protecci\u00f3n social en salud que cubre a uno o m\u00e1s miembros del hogar. Selecci\u00f3n m\u00faltiple: un mismo hogar puede tener miembros cubiertos por diferentes esquemas. Los tipos siguen la taxonom\u00eda de financiamiento en salud de la OMS (prepago p\u00fablico / aseguramiento comercial privado / comunitario / vinculado al empleador) y la variable INSHHANY del DHS. El Seguro de Salud de Base Comunitaria (CBHI, p. ej., mutuelles de sant\u00e9) es una categor\u00eda distinta a los esquemas estatutarios nacionales y es frecuente en contextos de bajos ingresos.", "fr": "Type d''assurance maladie ou de r\u00e9gime de protection sociale en sant\u00e9 qui couvre un ou plusieurs membres du m\u00e9nage. S\u00e9lection multiple : un m\u00eame m\u00e9nage peut avoir des membres couverts par diff\u00e9rents r\u00e9gimes. Les types suivent la taxonomie de financement de la sant\u00e9 de l''OMS (pr\u00e9paiement public / assurance commerciale priv\u00e9e / mutuelle communautaire / li\u00e9 \u00e0 l''employeur) et la variable INSHHANY du DHS. L''Assurance Maladie \u00e0 Base Communautaire (CBHI, par exemple les mutuelles de sant\u00e9) est une cat\u00e9gorie distincte des r\u00e9gimes statutaires nationaux et est courante dans les contextes \u00e0 faible revenu."}, "id": "health-insurance-type", "label": {"en": "Health Insurance Type", "es": "Tipo de seguro de salud", "fr": "Type d''assurance maladie"}, "maturity": "draft", "values": [{"code": "national_statutory", "definition": {"en": "A government-mandated health insurance or social health protection scheme covering the population by law (e.g., national health insurance scheme (NHIS), national social security health fund).", "es": "Un esquema de seguro de salud o protecci\u00f3n social en salud obligatorio por el gobierno que cubre a la poblaci\u00f3n por ley (p. ej., esquema nacional de seguro de salud (NHIS), caja nacional de seguridad social en salud).", "fr": "Un r\u00e9gime d''assurance maladie ou de protection sociale en sant\u00e9 impos\u00e9 par le gouvernement couvrant la population par la loi (par exemple, r\u00e9gime national d''assurance maladie (NHIS), caisse nationale de s\u00e9curit\u00e9 sociale en sant\u00e9)."}, "label": {"en": "National statutory scheme", "es": "Esquema estatutario nacional", "fr": "R\u00e9gime statutaire national"}}, {"code": "private_commercial", "definition": {"en": "A voluntary premium-based insurance product sold by a private or for-profit insurer.", "es": "Un producto de seguro voluntario basado en primas vendido por una aseguradora privada o con fines de lucro.", "fr": "Un produit d''assurance volontaire \u00e0 base de primes vendu par un assureur priv\u00e9 ou \u00e0 but lucratif."}, "label": {"en": "Private commercial insurance", "es": "Seguro comercial privado", "fr": "Assurance commerciale priv\u00e9e"}}, {"code": "community_based_mutualist", "definition": {"en": "A locally organized, member-financed mutual health insurance scheme not mandated by the state. Includes mutuelles de sant\u00e9 and community health funds.", "es": "Un esquema mutual de seguro de salud organizado localmente y financiado por los miembros, no obligatorio por el Estado. Incluye mutuelles de sant\u00e9 y cajas comunitarias de salud.", "fr": "Un r\u00e9gime d''assurance maladie mutualiste organis\u00e9 localement et financ\u00e9 par les membres, non impos\u00e9 par l''\u00c9tat. Inclut les mutuelles de sant\u00e9 et les caisses communautaires de sant\u00e9."}, "label": {"en": "Community-based or mutualist scheme", "es": "Esquema comunitario o mutualista", "fr": "Mutuelle communautaire"}}, {"code": "employer_based", "definition": {"en": "Health insurance provided as an employment benefit by a public or private employer.", "es": "Seguro de salud ofrecido como prestaci\u00f3n laboral por un empleador p\u00fablico o privado.", "fr": "Assurance maladie fournie comme avantage li\u00e9 \u00e0 l''emploi par un employeur public ou priv\u00e9."}, "label": {"en": "Employer-based scheme", "es": "Esquema vinculado al empleador", "fr": "R\u00e9gime li\u00e9 \u00e0 l''employeur"}}, {"code": "ngo_or_donor_subsidized", "definition": {"en": "Health coverage provided by an NGO, humanitarian organization, or donor program (e.g., free-care card, voucher scheme).", "es": "Cobertura sanitaria proporcionada por una ONG, organizaci\u00f3n humanitaria o programa de donante (p. ej., tarjeta de gratuidad, esquema de vales).", "fr": "Couverture sanitaire fournie par une ONG, une organisation humanitaire ou un programme de bailleur de fonds (par exemple, carte de gratuit\u00e9, programme de bons)."}, "label": {"en": "NGO or donor-subsidized coverage", "es": "Cobertura subvencionada por ONG o donante", "fr": "Couverture subventionn\u00e9e par une ONG ou un bailleur"}}, {"code": "other", "definition": {"en": "Another scheme type not captured above.", "es": "Otro tipo de esquema no cubierto anteriormente.", "fr": "Un autre type de r\u00e9gime non couvert ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
