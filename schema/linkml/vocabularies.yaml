  FertilityPreference:
    title:
      en: Fertility Preference Classification
      fr: Classification des préférences de fécondité
      es: Clasificación de preferencias de fecundidad
    description:
      en: Summary classification of a woman's reproductive intention, derived from her stated desire for children, current pregnancy status, and contraceptive use. Used as a programme planning indicator and as an input to the DHS unmet need algorithm.
      fr: Classification sommaire de l'intention reproductive d'une femme, dérivée de son désir déclaré d'enfants, de son statut de grossesse actuel et de son utilisation de contraceptifs. Utilisé comme indicateur de planification de programme et comme entrée dans l'algorithme DHS de besoin non satisfait.
      es: Clasificación resumida de la intención reproductiva de una mujer, derivada de su deseo declarado de tener hijos, su estado actual de embarazo y su uso de anticonceptivos. Se usa como indicador de planificación de programas y como entrada al algoritmo de necesidad insatisfecha del DHS.
    enum_uri: aidops:FertilityPreference
    permissible_values:
      wants_more_soon:
        title:
          en: Wants another child within 2 years
          fr: Souhaite un autre enfant dans les 2 ans
          es: Desea otro hijo en los próximos 2 años
        description:
          en: The woman wants another child (or a first child) within the next two years. Corresponds to the 'want soon' response on the desire_more_children question.
          fr: La femme souhaite un autre enfant (ou un premier enfant) dans les deux prochaines années. Correspond à la réponse 'want soon' de la question desire_more_children.
          es: La mujer desea otro hijo (o el primero) en los próximos dos años. Corresponde a la respuesta 'want soon' en la pregunta desire_more_children.
      want_to_space:
        title:
          en: Wants to space (2+ years)
          fr: Souhaite espacer (2 ans ou plus)
          es: Desea espaciar (2 años o más)
        description:
          en: The woman wants another child but wants to wait at least two years. Corresponds to the 'want later' response on desire_more_children.
          fr: La femme souhaite un autre enfant mais veut attendre au moins deux ans. Correspond à la réponse 'want later' de la question desire_more_children.
          es: La mujer desea otro hijo pero quiere esperar al menos dos años. Corresponde a la respuesta 'want later' en la pregunta desire_more_children.
      want_to_limit:
        title:
          en: Wants no more children
          fr: Ne veut plus d'enfants
          es: No desea más hijos
        description:
          en: The woman wants no more children (limiting). Corresponds to the 'wants no more' response on desire_more_children.
          fr: La femme ne veut plus d'enfants (limitation). Correspond à la réponse 'wants no more' de la question desire_more_children.
          es: La mujer no desea más hijos (limitación). Corresponde a la respuesta 'wants no more' en la pregunta desire_more_children.
      infecund:
        title:
          en: Infecund / sterilized
          fr: Inféconde / stérilisée
          es: Infecunda / esterilizada
        description:
          en: The woman is classified as infecund (unable to conceive) or voluntarily sterilized. She is outside the unmet need denominator.
          fr: La femme est classée comme inféconde (incapable de concevoir) ou stérilisée volontairement. Elle est en dehors du dénominateur de besoin non satisfait.
          es: La mujer es clasificada como infecunda (incapaz de concebir) o esterilizada voluntariamente. Está fuera del denominador de necesidad insatisfecha.
      undecided:
        title:
          en: Undecided / unsure
          fr: Indécise / incertaine
          es: Indecisa / no segura
        description:
          en: The woman is unsure about her reproductive intentions or gave an ambiguous response (e.g., 'up to God', 'don't know').
          fr: La femme est incertaine quant à ses intentions reproductives ou a donné une réponse ambiguë (p. ex. « c'est Dieu qui décide », « je ne sais pas »).
          es: La mujer está indecisa sobre sus intenciones reproductivas o dio una respuesta ambigua (p. ej., 'lo que Dios quiera', 'no sé').
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-family-planning"], "definition": {"en": "Summary classification of a woman''s reproductive intention, derived from her stated desire for children, current pregnancy status, and contraceptive use. Used as a programme planning indicator and as an input to the DHS unmet need algorithm.", "es": "Clasificaci\u00f3n resumida de la intenci\u00f3n reproductiva de una mujer, derivada de su deseo declarado de tener hijos, su estado actual de embarazo y su uso de anticonceptivos. Se usa como indicador de planificaci\u00f3n de programas y como entrada al algoritmo de necesidad insatisfecha del DHS.", "fr": "Classification sommaire de l''intention reproductive d''une femme, d\u00e9riv\u00e9e de son d\u00e9sir d\u00e9clar\u00e9 d''enfants, de son statut de grossesse actuel et de son utilisation de contraceptifs. Utilis\u00e9 comme indicateur de planification de programme et comme entr\u00e9e dans l''algorithme DHS de besoin non satisfait."}, "id": "fertility-preference", "label": {"en": "Fertility Preference Classification", "es": "Clasificaci\u00f3n de preferencias de fecundidad", "fr": "Classification des pr\u00e9f\u00e9rences de f\u00e9condit\u00e9"}, "maturity": "draft", "values": [{"code": "wants_more_soon", "definition": {"en": "The woman wants another child (or a first child) within the next two years. Corresponds to the ''want soon'' response on the desire_more_children question.", "es": "La mujer desea otro hijo (o el primero) en los pr\u00f3ximos dos a\u00f1os. Corresponde a la respuesta ''want soon'' en la pregunta desire_more_children.", "fr": "La femme souhaite un autre enfant (ou un premier enfant) dans les deux prochaines ann\u00e9es. Correspond \u00e0 la r\u00e9ponse ''want soon'' de la question desire_more_children."}, "label": {"en": "Wants another child within 2 years", "es": "Desea otro hijo en los pr\u00f3ximos 2 a\u00f1os", "fr": "Souhaite un autre enfant dans les 2 ans"}}, {"code": "want