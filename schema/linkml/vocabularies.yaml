  LivestockLossCause:
    title:
      en: Livestock Loss Cause
      fr: Cause de perte de bétail
      es: Causa de pérdida de ganado
    description:
      en: 'Primary cause of livestock deaths or losses in the recall period. Used alongside `livestock_losses_count_past_12mo` in PastoralFoodSecurityProfile to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Note: codes `raiding_theft` and `conflict_collateral` are partially sensitive and should be aggregated to community level before sharing with non-programme partners.'
      fr: Cause principale des décès ou pertes de bétail au cours de la période de rappel. Utilisé avec `livestock_losses_count_past_12mo` pour permettre l'analyse des causes d'attrition. Les codes `raiding_theft` et `conflict_collateral` sont partiellement sensibles.
      es: Causa principal de las muertes o pérdidas de ganado durante el período de recordatorio. Usado junto con `livestock_losses_count_past_12mo` para el análisis de causas de desgaste. Los códigos `raiding_theft` y `conflict_collateral` son parcialmente sensibles.
    enum_uri: aidops:LivestockLossCause
    permissible_values:
      drought_thirst_starvation:
        title:
          en: Drought, thirst, or starvation
          fr: Sécheresse, soif ou famine
          es: Sequía, sed o hambre
        description:
          en: Animals died as a result of inadequate water or pasture due to drought conditions.
          fr: Les animaux sont morts par manque d'eau ou de pâturage dû aux conditions de sécheresse.
          es: Los animales murieron como resultado de agua o pastos inadecuados debido a condiciones de sequía.
      disease_epidemic:
        title:
          en: Disease or epidemic
          fr: Maladie ou épidémie
          es: Enfermedad o epidemia
        description:
          en: Animals died or were culled due to infectious disease, including epizootic outbreaks.
          fr: Les animaux sont morts ou ont été abattus en raison d'une maladie infectieuse, y compris des épizooties.
          es: Los animales murieron o fueron sacrificados debido a enfermedades infecciosas, incluidos brotes epizoóticos.
      parasites:
        title:
          en: Parasites or ticks
          fr: Parasites ou tiques
          es: Parásitos o garrapatas
        description:
          en: Mortality or production loss due to internal or external parasites.
          fr: Mortalité ou perte de production due à des parasites internes ou externes.
          es: Mortalidad o pérdida de producción debida a parásitos internos o externos.
      raiding_theft:
        title:
          en: Raiding or theft
          fr: Razzia ou vol
          es: Rapiña o robo
        description:
          en: 'Animals stolen in a raid or by theft, including armed or inter-community raiding. Partially sensitive: aggregate to community level before sharing with non-programme partners.'
          fr: Animaux volés lors d'une razzia ou d'un vol, y compris des razzias armées ou intercommunautaires. Partiellement sensible.
          es: Animales robados en una rapiña o por robo, incluida la rapiña armada o intercomunal. Parcialmente sensible.
      natural_disaster_flood:
        title:
          en: Natural disaster (flood, sandstorm, or other acute event)
          fr: Catastrophe naturelle (inondation, tempête de sable ou autre événement aigu)
          es: Desastre natural (inundación, tormenta de arena u otro evento agudo)
        description:
          en: Animals lost due to flood, sandstorm, or other acute natural event not covered by the drought code.
          fr: Animaux perdus en raison d'une inondation, d'une tempête de sable ou d'un autre événement naturel aigu.
          es: Animales perdidos debido a inundación, tormenta de arena u otro evento natural agudo.
      conflict_collateral:
        title:
          en: Conflict-related — collateral loss
          fr: Lié au conflit — perte collatérale
          es: Relacionado con el conflicto — pérdida colateral
        description:
          en: 'Animals killed or lost as collateral damage during armed conflict. Partially sensitive: aggregate to community level before sharing with non-programme partners.'
          fr: Animaux tués ou perdus en dommages collatéraux lors d'un conflit armé. Partiellement sensible.
          es: Animales muertos o perdidos como daño colateral durante un conflicto armado. Parcialmente sensible.
      sold_distress:
        title:
          en: Sold under distress (not a death)
          fr: Vendus sous contrainte (pas un décès)
          es: Vendidos bajo estrés (no una muerte)
        description:
          en: Animals disposed of through distress sale rather than death; included for complete herd-attrition accounting.
          fr: Animaux cédés par vente de détresse plutôt que par décès ; inclus pour un bilan complet de l'attrition du troupeau.
          es: Animales desechados mediante venta de estrés en lugar de muerte; incluido para la contabilización completa del desgaste del rebaño.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Cause of livestock loss not listed in the codes above.
          fr: Cause de perte de bétail non répertoriée dans les codes ci-dessus.
          es: Causa de pérdida de ganado no listada en los códigos anteriores.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot identify the primary cause of livestock losses.
          fr: Le répondant ne peut pas identifier la cause principale des pertes de bétail.
          es: El encuestado no puede identificar la causa principal de las pérdidas de ganado.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "legs-3rd-edition-2023", "vsf-belgium-tufts-pastoralist-tools-2019"], "definition": {"en": "Primary cause of livestock deaths or losses in the recall period. Used alongside `livestock_losses_count_past_12mo` in PastoralFoodSecurityProfile to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Note: codes `raiding_theft` and `conflict_collateral` are partially sensitive and should be aggregated to community level before sharing with non-programme partners.", "es": "Causa principal de las muertes o p\u00e9rdidas de ganado durante el per\u00edodo de recordatorio. Usado junto con `livestock_losses_count_past_12mo` para el an\u00e1lisis de causas de desgaste. Los c\u00f3digos `raiding_theft` y `conflict_collateral` son parcialmente sensibles.", "fr": "Cause principale des d\u00e9c\u00e8s ou pertes de b\u00e9tail au cours de la p\u00e9riode de rappel. Utilis\u00e9 avec `livestock_losses_count_past_12mo` pour permettre l''analyse des causes d''attrition. Les codes `raiding_theft` et `conflict_collateral` sont partiellement sensibles."}, "id": "livestock-loss-cause", "label": {"en": "Livestock Loss Cause", "es": "Causa de p\u00e9rdida de ganado", "fr": "Cause de perte de b\u00e9tail"}, "maturity": "draft", "values": [{"code": "drought_thirst_starvation", "definition": {"en": "Animals died as a result of inadequate water or pasture due to drought conditions.", "es": "Los animales murieron como resultado de agua o pastos inadecuados debido a condiciones de sequ\u00eda.", "fr": "Les animaux sont morts par manque d''eau ou de p\u00e2turage d\u00fb aux conditions de s\u00e9cheresse."}, "label": {"en": "Drought, thirst, or starvation", "es": "Sequ\u00eda, sed o hambre", "fr": "S\u00e9cheresse, soif ou famine"}}, {"code": "disease_epidemic", "definition": {"en": "Animals died or were culled due to infectious disease, including epizootic outbreaks.", "es": "Los animales murieron o fueron sacrificados debido a enfermedades infecciosas, incluidos brotes epizo\u00f3ticos.", "fr": "Les animaux sont morts ou ont \u00e9t\u00e9 abattus en raison d''une maladie infectieuse, y compris des \u00e9pizooties."}, "label": {"en": "Disease or epidemic", "es": "Enfermedad o epidemia", "fr": "Maladie ou \u00e9pid\u00e9mie"}}, {"code": "parasites", "definition": {"en": "Mortality or production loss due to internal or external parasites.", "es": "Mortalidad o p\u00e9rdida de producci\u00f3n debida a par\u00e1sitos internos o externos.", "fr": "Mortalit\u00e9 ou perte de production due \u00e0 des parasites internes ou externes."}, "label": {"en": "Parasites or ticks", "es": "Par\u00e1sitos o garrapatas", "fr": "Parasites ou tiques"}}, {"code": "raiding_theft", "definition": {"en": "Animals stolen in a raid or by theft, including armed or inter-community raiding. Partially sensitive: aggregate to community level before sharing with non-programme partners.", "es": "Animales robados en una rapi\u00f1a o por robo, incluida la rapi\u00f1a armada o intercomunal. Parcialmente sensible.", "fr": "Animaux vol\u00e9s lors d''une razzia ou d''un vol, y compris des razzias arm\u00e9es ou intercommunautaires. Partiellement sensible."}, "label": {"en": "Raiding or theft", "es": "Rapi\u00f1a o robo", "fr": "Razzia ou vol"}}, {"code": "natural_disaster_flood", "definition": {"en": "Animals lost due to flood, sandstorm, or other acute natural event not covered by the drought code.", "es": "Animales perdidos debido a inundaci\u00f3n, tormenta de arena u otro evento natural agudo.", "fr": "Animaux perdus en raison d''une inondation, d''une temp\u00eate de sable ou d''un autre \u00e9v\u00e9nement naturel aigu."}, "label": {"en": "Natural disaster (flood, sandstorm, or other acute event)", "es": "Desastre natural (inundaci\u00f3n, tormenta de arena u otro evento agudo)", "fr": "Catastrophe naturelle (inondation, temp\u00eate de sable ou autre \u00e9v\u00e9nement aigu)"}}, {"code": "conflict_collateral", "definition": {"en": "Animals killed or lost as collateral damage during armed conflict. Partially sensitive: aggregate to community level before sharing with non-programme partners.", "es": "Animales muertos o perdidos como da\u00f1o colateral durante un conflicto armado. Parcialmente sensible.", "fr": "Animaux tu\u00e9s ou perdus en dommages collat\u00e9raux lors d''un conflit arm\u00e9. Partiellement sensible."}, "label": {"en": "Conflict-related \u2014 collateral loss", "es": "Relacionado con el conflicto \u2014 p\u00e9rdida colateral", "fr": "Li\u00e9 au conflit \u2014 perte collat\u00e9rale"}}, {"code": "sold_distress", "definition": {"en": "Animals disposed of through distress sale rather than death; included for complete herd-attrition accounting.", "es": "Animales desechados mediante venta de estr\u00e9s en lugar de muerte; incluido para la contabilizaci\u00f3n completa del desgaste del reba\u00f1o.", "fr": "Animaux c\u00e9d\u00e9s par vente de d\u00e9tresse plut\u00f4t que par d\u00e9c\u00e8s ; inclus pour un bilan complet de l''attrition du troupeau."}, "label": {"en": "Sold under distress (not a death)", "es": "Vendidos bajo estr\u00e9s (no una muerte)", "fr": "Vendus sous contrainte (pas un d\u00e9c\u00e8s)"}}, {"code": "other", "definition": {"en": "Cause of livestock loss not listed in the codes above.", "es": "Causa de p\u00e9rdida de ganado no listada en los c\u00f3digos anteriores.", "fr": "Cause de perte de b\u00e9tail non r\u00e9pertori\u00e9e dans les codes ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot identify the primary cause of livestock losses.", "es": "El encuestado no puede identificar la causa principal de las p\u00e9rdidas de ganado.", "fr": "Le r\u00e9pondant ne peut pas identifier la cause principale des pertes de b\u00e9tail."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
