\u00e9duction de la demande."}, "label": {"en": "Decreasing", "es": "En disminuci\u00f3n", "fr": "En baisse"}}, {"code": "sharply_decreasing", "definition": {"en": "Price fell more than 20% over the past 30 days. May indicate oversupply, market disruption, dumping, or food distribution that depressed market demand.", "es": "El precio cay\u00f3 m\u00e1s del 20 % en los \u00faltimos 30 d\u00edas. Puede indicar exceso de oferta, interrupci\u00f3n del mercado, dumping o distribuci\u00f3n de alimentos que deprimi\u00f3 la demanda del mercado.", "fr": "Le prix a baiss\u00e9 de plus de 20 % au cours des 30 derniers jours. Peut indiquer une offre exc\u00e9dentaire, une perturbation du march\u00e9, un dumping ou une distribution alimentaire qui a d\u00e9prim\u00e9 la demande du march\u00e9."}, "label": {"en": "Sharply decreasing", "es": "En fuerte disminuci\u00f3n", "fr": "En forte baisse"}}, {"code": "highly_volatile", "definition": {"en": "Large price fluctuations in both directions with no consistent trend. Often observed in conflict contexts with erratic supply.", "es": "Grandes fluctuaciones de precios en ambas direcciones sin tendencia consistente. A menudo observado en contextos de conflicto con suministro err\u00e1tico.", "fr": "Grandes fluctuations de prix dans les deux directions sans tendance coh\u00e9rente. Souvent observ\u00e9 dans les contextes de conflit avec un approvisionnement erratique."}, "label": {"en": "Highly volatile", "es": "Muy vol\u00e1til", "fr": "Tr\u00e8s volatil"}}, {"code": "dont_know", "definition": {"en": "Vendor informant cannot assess trend; insufficient data.", "es": "El informante vendedor no puede evaluar la tendencia; datos insuficientes.", "fr": "L''informateur vendeur ne peut pas \u00e9valuer la tendance ; donn\u00e9es insuffisantes."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
