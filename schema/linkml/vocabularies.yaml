      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire", "mics6-maternal-newborn"], "definition": {"en": "The time elapsed between birth and the first breastfeed, as reported by the mother in the MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. The Early Initiation of Breastfeeding (EIBF) threshold is within 1 hour of birth. This vocabulary uses DHS m4 groupings, which differ slightly from the WHO/UNICEF 2021 IYCF groupings used in iycf-breastfeeding-initiation: DHS distinguishes 1\u20133 days from more than 3 days, while the IYCF vocabulary collapses these to after_24_hours.", "es": "El tiempo transcurrido entre el parto y la primera lactancia, seg\u00fan lo reportado por la madre en el MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. El umbral de inicio temprano de la lactancia materna (EIBF) es dentro de la primera hora del parto. Este vocabulario utiliza las agrupaciones DHS m4, que difieren ligeramente de las agrupaciones OMS/UNICEF 2021 IYCF utilizadas en iycf-breastfeeding-initiation: DHS distingue 1\u20133 d\u00edas de m\u00e1s de 3 d\u00edas, mientras que el vocabulario IYCF colapsa estas en after_24_hours.", "fr": "Le d\u00e9lai entre la naissance et la premi\u00e8re t\u00e9t\u00e9e, tel que rapport\u00e9 par la m\u00e8re dans le MaternalNewbornHealthProfile. DHS-8 m4 / MICS6 MN13. Le seuil d''allaitement pr\u00e9coce (EIBF) est dans l''heure suivant la naissance. Ce vocabulaire utilise les regroupements DHS m4, qui diff\u00e8rent l\u00e9g\u00e8rement des regroupements OMS/UNICEF 2021 IYCF utilis\u00e9s dans iycf-breastfeeding-initiation : le DHS distingue 1\u20133 jours de plus de 3 jours, tandis que le vocabulaire IYCF regroupe ces deux cat\u00e9gories en after_24_hours."}, "id": "mnh-breastfeeding-initiation-timing", "label": {"en": "Breastfeeding Initiation Timing (MNH)", "es": "Momento de inicio de la lactancia materna (SMN)", "fr": "D\u00e9lai d''initiation \u00e0 l''allaitement (SMN)"}, "maturity": "draft", "standard": {"name": "DHS-8 Woman''s Questionnaire m4 (breastfeeding initiation timing)", "notes": "m4 = 1 (within 1 hour), 2 (1\u201323 hours), 3 (1\u20133 days), 4 (more than 3 days), 5 (never breastfed). EIBF = m4 = 1.", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}, "values": [{"code": "within_1_hour", "definition": {"en": "The baby was first put to the breast within one hour of birth. Meets the EIBF threshold. DHS m4 = 1.", "es": "El beb\u00e9 fue puesto al pecho por primera vez dentro de la primera hora del parto. Cumple el umbral EIBF. DHS m4 = 1.", "fr": "Le b\u00e9b\u00e9 a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois dans l''heure suivant la naissance. Atteint le seuil EIBF. DHS m4 = 1."}, "label": {"en": "Within 1 hour of birth", "es": "Dentro de la primera hora del parto", "fr": "Dans l''heure suivant la naissance"}}, {"code": "h1_to_23", "definition": {"en": "The baby was first put to the breast between 1 and 23 hours after birth. Does not meet EIBF threshold. DHS m4 = 2.", "es": "El beb\u00e9 fue puesto al pecho por primera vez entre 1 y 23 horas despu\u00e9s del parto. No cumple el umbral EIBF. DHS m4 = 2.", "fr": "Le b\u00e9b\u00e9 a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois entre 1 et 23 heures apr\u00e8s la naissance. Ne satisfait pas au seuil EIBF. DHS m4 = 2."}, "label": {"en": "1 to 23 hours after birth", "es": "De 1 a 23 horas despu\u00e9s del parto", "fr": "1 \u00e0 23 heures apr\u00e8s la naissance"}}, {"code": "d1_to_3", "definition": {"en": "The baby was first put to the breast 1 to 3 days after birth. DHS m4 = 3.", "es": "El beb\u00e9 fue puesto al pecho por primera vez de 1 a 3 d\u00edas despu\u00e9s del parto. DHS m4 = 3.", "fr": "Le b\u00e9b\u00e9 a \u00e9t\u00e9 mis au sein pour la premi\u00e8re fois 1 \u00e0 3 jours apr\u00e8s la naissance. DHS m4 = 3."}, "label": {"en": "1 to 3 days after birth", "es": "De 1 a 3 d\u00edas despu\u00e9s del parto", "fr": "1 \u00e