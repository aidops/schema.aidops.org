  AapSufficient4:
    title:
      en: 'AAP: Aid sufficiency (4 levels)'
      fr: 'Redevabilité : Suffisance de l''aide (4 niveaux)'
      es: 'Rendición de cuentas: Suficiencia de la ayuda (4 niveles)'
    description:
      en: 'Four-level perceived sufficiency scale for the quantity of aid received. Source: IASC / REACH Menu of AAP Questions 2018 and OCHA oPt MSNA quantity-satisfaction indicator. Boundary note: this measures the respondent''s perception of sufficiency; the objective measure (rations meeting Sphere calorie minima, shelter kits meeting Sphere completeness, WASH quantities meeting JMP) belongs to sector-specific profiles (FoodSecurityProfile, ShelterAdequacyProfile, WASHAssessmentProfile).'
      fr: 'Échelle de suffisance perçue à quatre niveaux pour la quantité d''aide reçue. Source : Menu de questions AAP IASC / REACH 2018 et indicateur OCHA oPt MSNA de satisfaction quantitative. Note de frontière : ceci mesure la perception de suffisance du répondant ; la mesure objective (rations atteignant les minima caloriques Sphère, kits abri atteignant la complétude Sphère, quantités EHA atteignant les JMP) appartient aux profils sectoriels spécifiques (Profil de sécurité alimentaire, Profil d''adéquation de l''abri, Profil d''évaluation EHA).'
      es: 'Escala de suficiencia percibida de cuatro niveles para la cantidad de ayuda recibida. Fuente: Menú de Preguntas AAP IASC / REACH 2018 e indicador de OCHA oPt MSNA de satisfacción con cantidad. Nota de frontera: esto mide la percepción de suficiencia del encuestado; la medida objetiva (raciones que cumplen con los mínimos calóricos de Esfera, kits de refugio que cumplen con la completitud de Esfera, cantidades WASH que cumplen con JMP) pertenece a los perfiles sectoriales específicos (Perfil de Seguridad Alimentaria, Perfil de Adecuación del Refugio, Perfil de Evaluación WASH).'
    enum_uri: aidops:AapSufficient4
    permissible_values:
      more_than_enough:
        title:
          en: More than enough
          fr: Plus qu'il n'en faut
          es: Más que suficiente
        description:
          en: The quantity of aid exceeded the household's need.
          fr: La quantité d'aide a dépassé le besoin du ménage.
          es: La cantidad de ayuda superó la necesidad del hogar.
      just_enough:
        title:
          en: Just enough
          fr: Juste assez
          es: Justo lo suficiente
        description:
          en: The quantity of aid met the household's need exactly.
          fr: La quantité d'aide a exactement répondu au besoin du ménage.
          es: La cantidad de ayuda cumplió exactamente con la necesidad del hogar.
      not_quite_enough:
        title:
          en: Not quite enough
          fr: Pas tout à fait assez
          es: No del todo suficiente
        description:
          en: The quantity of aid fell somewhat short of the household's need.
          fr: La quantité d'aide est restée quelque peu en deçà du besoin du ménage.
          es: La cantidad de ayuda quedó algo por debajo de la necesidad del hogar.
      far_too_little:
        title:
          en: Far too little
          fr: Beaucoup trop peu
          es: Muy poco
        description:
          en: The quantity of aid was far below the household's need.
          fr: La quantité d'aide était bien inférieure au besoin du ménage.
          es: La cantidad de ayuda estuvo muy por debajo de la necesidad del hogar.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess sufficiency.
          fr: Le répondant ne peut pas évaluer la suffisance.
          es: El encuestado no puede evaluar la suficiencia.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
