  GbvRelationshipStatus:
    title:
      en: Respondent's marital or union status with referent partner
      fr: Statut matrimonial ou d'union de la répondante avec le partenaire référent
      es: Estado civil o de unión de la encuestada con el compañero referente
    description:
      en: Current union or marital status of the respondent with the referent partner, used to contextualise the IPV battery in the DHS Domestic Violence module. Simplified version of standard DHS marital status coding. The 'never_married_partnered' code is a DHS-8 extension.
      fr: Statut d'union ou matrimonial actuel de la répondante avec le partenaire référent, utilisé pour contextualiser la batterie VPI du module DHS. Version simplifiée du codage du statut matrimonial DHS standard. Le code 'never_married_partnered' est une extension DHS-8.
      es: Estado de unión o civil actual de la encuestada con el compañero referente, utilizado para contextualizar la batería de VPI del módulo DHS. Versión simplificada del código estándar de estado civil DHS. El código 'never_married_partnered' es una extensión DHS-8.
    enum_uri: aidops:GbvRelationshipStatus
    permissible_values:
      currently_married:
        title:
          en: Currently married
          fr: Actuellement mariée
          es: Actualmente casada
        description:
          en: Respondent is currently married to the referent partner.
          fr: La répondante est actuellement mariée au partenaire référent.
          es: La encuestada está actualmente casada con el compañero referente.
      currently_cohabiting:
        title:
          en: Currently living together (not married)
          fr: Cohabite actuellement (non mariée)
          es: Viviendo juntos actualmente (no casada)
        description:
          en: Respondent is currently living together with the referent partner without legal marriage.
          fr: La répondante vit actuellement avec le partenaire référent sans mariage légal.
          es: La encuestada vive actualmente con el compañero referente sin matrimonio legal.
      separated:
        title:
          en: Separated
          fr: Séparée
          es: Separada
        description:
          en: Respondent is separated from the most recent partner.
          fr: La répondante est séparée du partenaire le plus récent.
          es: La encuestada está separada del compañero más reciente.
      divorced:
        title:
          en: Divorced
          fr: Divorcée
          es: Divorciada
        description:
          en: Respondent is divorced from the most recent partner.
          fr: La répondante est divorcée du partenaire le plus récent.
          es: La encuestada está divorciada del compañero más reciente.
      widowed:
        title:
          en: Widowed
          fr: Veuve
          es: Viuda
        description:
          en: Respondent's most recent partner has died.
          fr: Le partenaire le plus récent de la répondante est décédé.
          es: El compañero más reciente de la encuestada ha fallecido.
      never_married_partnered:
        title:
          en: Never married, has had an intimate partner
