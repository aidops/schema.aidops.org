ansporte de agua, habitualmente de 10 a 20 litros.", "fr": "R\u00e9cipient de stockage et de transport d''eau, g\u00e9n\u00e9ralement de 10 \u00e0 20 litres."}, "label": {"en": "Water container (jerrycan)", "es": "Bid\u00f3n de agua", "fr": "Jerrycan \u00e0 eau"}}, {"code": "clothing", "definition": {"en": "Culturally appropriate clothing; context-dependent sizing and composition.", "es": "Ropa culturalmente apropiada; dimensionamiento y composici\u00f3n seg\u00fan el contexto.", "fr": "V\u00eatements culturellement appropri\u00e9s ; dimensionnement et composition selon le contexte."}, "label": {"en": "Clothing", "es": "Ropa", "fr": "V\u00eatements"}}, {"code": "solar_lantern", "definition": {"en": "Solar-powered or battery lantern used for lighting when grid power is unavailable.", "es": "L\u00e1mpara solar o a bater\u00eda usada para iluminaci\u00f3n cuando no hay electricidad de la red.", "fr": "Lanterne \u00e0 \u00e9nergie solaire ou \u00e0 piles utilis\u00e9e pour l''\u00e9clairage en l''absence d''\u00e9lectricit\u00e9 du r\u00e9seau."}, "label": {"en": "Solar lantern", "es": "L\u00e1mpara solar", "fr": "Lanterne solaire"}}, {"code": "hygiene_kit", "definition": {"en": "Soap, sanitary items, toothbrush, and related hygiene supplies, composition per Sphere WASH standards.", "es": "Jab\u00f3n, art\u00edculos sanitarios, cepillo de dientes y suministros de higiene relacionados, composici\u00f3n seg\u00fan los est\u00e1ndares Esfera WASH.", "fr": "Savon, articles d''hygi\u00e8ne f\u00e9minine, brosse \u00e0 dents et fournitures d''hygi\u00e8ne connexes, composition selon les standards Sph\u00e8re WASH."}, "label": {"en": "Hygiene kit", "es": "Kit de higiene", "fr": "Kit d''hygi\u00e8ne"}}, {"code": "winterization_kit", "definition": {"en": "Context-specific cold-weather supplies (heaters, insulation, winter clothing, thermal blankets) for cold-climate or high-altitude deployments.", "es": "Suministros contextuales para climas fr\u00edos (calefactores, aislamiento, ropa de invierno, mantas t\u00e9rmicas) para despliegues en clima fr\u00edo o altura.", "fr": "Fournitures contextuelles pour le froid (chauffages, isolation, v\u00eatements d''hiver, couvertures thermiques) pour les d\u00e9ploiements en climat froid ou en haute altitude."}, "label": {"en": "Winterization kit", "es": "Kit de invernaci\u00f3n", "fr": "Kit d''hivernisation"}}, {"code": "cooking_pot", "definition": {"en": "Large cooking pot with handle and lid for household meal preparation. Used in NFIProfile unmet-needs reporting.", "es": "Olla grande con mango y tapa para la preparaci\u00f3n de comidas del hogar. Utilizada en el reporte de necesidades no satisfechas de NFIProfile.", "fr": "Grande marmite avec poign\u00e9e et couvercle pour la pr\u00e9paration des repas du m\u00e9nage. Utilis\u00e9e pour le signalement des besoins non satisfaits dans NFIProfile."}, "label": {"en": "Cooking pot", "es": "Olla", "fr": "Marmite"}}, {"code": "plate_or_bowl", "definition": {"en": "Dished plate or deep bowl for individual meal serving (Sphere Std 2: one per person).", "es": "Plato hondo o taz\u00f3n profundo para el servicio individual de las comidas (Norma Esfera 2: uno por persona).", "fr": "Assiette creuse ou bol profond pour le service individuel des repas (Norme Sph\u00e8re 2 : une par personne)."}, "label": {"en": "Plate or bowl", "es": "Plato o taz\u00f3n", "fr": "Assiette ou bol"}}, {"code": "cup_or_mug", "definition": {"en": "Drinking vessel (Sphere Std 2: one per person).", "es": "Recipiente para beber (Norma Esfera 2: uno por persona).", "fr": "R\u00e9cipient \u00e0 boire (Norme Sph\u00e8re 2 : un par personne)."}, "label": {"en": "Cup or mug", "es": "Taza o jarro", "fr": "Tasse ou mug"}}, {"code": "kitchen_knife", "definition": {"en": "Knife for food preparation (Sphere Std 2: one per household).", "es": "Cuchillo para la preparaci\u00f3n de alimentos (Norma Esfera 2: uno por hogar).", "fr": "Couteau pour la pr\u00e9paration des aliments (Norme Sph\u00e8re 2 : un par m\u00e9nage)."}, "label": {"en": "Kitchen knife", "es": "Cuchillo de cocina", "fr": "Couteau de cuisine"}}, {"code": "matches_or_lighter", "definition": {"en": "Ignition source for cooking stove or fire. UNHCR CRI: listed as a renewable NFI requiring regular resupply.", "es": "Fuente de ignici\u00f3n para la cocina o el fuego. ACNUR CRI: listado como un ANF renovable que requiere reabastecimiento regular.", "fr": "Source d''allumage pour le foyer de cuisson ou le feu. HCR CRI : list\u00e9e comme un ANA renouvelable n\u00e9cessitant un r\u00e9approvisionnement r\u00e9gulier."}, "label": {"en": "Matches or lighter", "es": "F\u00f3sforos o encendedor", "fr": "Allumettes ou briquet"}}, {"code": "mosquito_net", "definition": {"en": "Insecticide-treated mosquito net for sleeping protection. Sphere Std 1 key indicator in malaria-endemic settings.", "es": "Mosquitero tratado con insecticida para la protecci\u00f3n al dormir. Indicador clave de la Norma Esfera 1 en entornos de paludismo end\u00e9mico.", "fr": "Moustiquaire impr\u00e9gn\u00e9e d''insecticide pour la protection au couchage. Indicateur cl\u00e9 de la Norme Sph\u00e8re 1 dans les contextes d''end\u00e9mie palustre."}, "label": {"en": "Mosquito net (ITN/LLIN)", "es": "Mosquitero (MTI/MILD)", "fr": "Moustiquaire (MII/MIILDA)"}}, {"code": "clothing_adult", "definition": {"en": "Climate-appropriate clothing set for adult household members. Sphere Std 1: two full sets per person in the correct size.", "es": "Conjunto de ropa apropiada para el clima para los miembros adultos del hogar. Norma Esfera 1: dos juegos completos por persona de la talla correcta.", "fr": "Ensemble de v\u00eatements adapt\u00e9s au climat pour les membres adultes du m\u00e9nage. Norme Sph\u00e8re 1 : deux ensembles complets par personne \u00e0 la bonne taille."}, "label": {"en": "Clothing (adult)", "es": "Ropa (adulto)", "fr": "V\u00eatements (adulte)"}}, {"code": "clothing_child", "definition": {"en": "Climate-appropriate clothing set for
        child household members.", "es": "Conjunto de ropa apropiada para el clima para los miembros ni\u00f1os del hogar.", "fr": "Ensemble de v\u00eatements adapt\u00e9s au climat pour les membres enfants du m\u00e9nage."}, "label": {"en": "Clothing (child)", "es": "Ropa (ni\u00f1o)", "fr": "V\u00eatements (enfant)"}}, {"code": "shelter_repair_tools", "definition": {"en": "Hammer, nails, rope or equivalent shelter maintenance kit (Sphere Std 4 tools and equipment).", "es": "Martillo, clavos, cuerda o kit equivalente de mantenimiento de refugio (Norma Esfera 4 herramientas y equipos).", "fr": "Marteau, clous, corde ou kit \u00e9quivalent de maintenance d''abri (Norme Sph\u00e8re 4 outils et \u00e9quipements)."}, "label": {"en": "Shelter repair tools", "es": "Herramientas de reparaci\u00f3n de refugio", "fr": "Outils de r\u00e9paration d''abri"}}, {"code": "water_jerrycan", "definition": {"en": "Lidded water transport and storage container (10-20 litre). Overlaps with the generic jerrycan code; water_jerrycan is used in NFIProfile unmet-needs reporting when the specific use case is water-carrying rather than fuel storage.", "es": "Recipiente con tapa para el transporte y almacenamiento de agua (10-20 litros). Se superpone con el c\u00f3digo gen\u00e9rico jerrycan; water_jerrycan se usa en el reporte de necesidades no satisfechas de NFIProfile cuando el uso espec\u00edfico es el transporte de agua en lugar del almacenamiento de combustible.", "fr": "R\u00e9cipient \u00e0 couvercle pour le transport et le stockage d''eau (10-20 litres). Recoupe le code g\u00e9n\u00e9rique jerrycan ; water_jerrycan est utilis\u00e9 pour le signalement des besoins non satisfaits dans NFIProfile lorsque l''usage sp\u00e9cifique est le transport d''eau plut\u00f4t que le stockage de combustible."}, "label": {"en": "Water jerry can", "es": "Bid\u00f3n para agua", "fr": "Jerrican \u00e0 eau"}}, {"code": "other", "definition": {"en": "Other essential NFI not captured by the standard categories; narrative description expected at the record level.", "es": "Otros NFI esenciales no cubiertos por las categor\u00edas est\u00e1ndar; se espera descripci\u00f3n narrativa a nivel del registro.", "fr": "Autre NFI essentiel non couvert par les cat\u00e9gories standards ; une description narrative est attendue au niveau de l''enregistrement."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
