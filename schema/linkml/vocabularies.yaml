  SanitationEmptyingTiming:
    title:
      en: Sanitation Pit Emptying Timing
      fr: Calendrier de vidange de la fosse d'assainissement
      es: Momento de vaciado del pozo de saneamiento
    description:
      en: 'Time elapsed since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied or desludged. This is a proxy indicator for the safely managed sanitation rung: regular emptying and safe treatment of fecal sludge is required for the safely managed criterion. Based on MICS6 pilot question WS8A.'
      fr: 'Temps écoulé depuis le dernier vidange ou désodorisation du dispositif d''assainissement sur site (latrine à fosse, fosse septique ou toilettes à compostage). Il s''agit d''un indicateur proxy pour le niveau d''assainissement à gestion sécurisée : un vidange régulier et un traitement sûr des boues fécales sont nécessaires pour le critère de gestion sécurisée. Basé sur la question pilote MICS6 WS8A.'
      es: 'Tiempo transcurrido desde que se vació o desodorizó por última vez el contenedor de saneamiento en el sitio (letrina de fosa, fosa séptica o inodoro de compostaje). Es un indicador proxy para el peldaño de saneamiento con gestión segura: se requiere vaciado regular y tratamiento seguro de los lodos fecales para el criterio de gestión segura. Basado en la pregunta piloto MICS6 WS8A.'
    enum_uri: aidops:SanitationEmptyingTiming
    permissible_values:
      never:
        title:
          en: Never emptied
          fr: Jamais vidangée
          es: Nunca vaciada
        description:
          en: The pit, tank, or container has never been emptied since installation or since the household has been using it.
          fr: La fosse, le réservoir ou le récipient n'a jamais été vidangé depuis son installation ou depuis que le ménage l'utilise.
          es: La fosa, el depósito o el recipiente nunca ha sido vaciado desde su instalación o desde que el hogar lo usa.
      less_than_1_year_ago:
        title:
          en: Less than 1 year ago
          fr: Il y a moins d'un an
          es: Hace menos de 1 año
        description:
          en: The facility was last emptied within the past 12 months.
          fr: L'installation a été vidangée pour la dernière fois au cours des 12 derniers mois.
          es: La instalación fue vaciada por última vez en los últimos 12 meses.
      one_to_five_years_ago:
        title:
          en: 1 to 5 years ago
          fr: Il y a 1 à 5 ans
          es: Hace 1 a 5 años
        description:
          en: The facility was last emptied between 1 and 5 years ago.
          fr: L'installation a été vidangée pour la dernière fois entre 1 et 5 ans.
          es: La instalación fue vaciada por última vez entre 1 y 5 años atrás.
      more_than_5_years_ago:
        title:
          en: More than 5 years ago
          fr: Il y a plus de 5 ans
          es: Hace más de 5 años
        description:
          en: The facility was last emptied more than 5 years ago.
          fr: L'installation a été vidangée pour la dernière fois il y a plus de 5 ans.
          es: La instalación fue vaciada por última vez hace más de 5 años.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know when the facility was last emptied.
          fr: Le répondant ne sait pas quand l'installation a été vidangée pour la dernière fois.
          es: El encuestado no sabe cuándo fue vaciada la instalación por última vez.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Time elapsed since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied or desludged. This is a proxy indicator for the safely managed sanitation rung: regular emptying and safe treatment of fecal sludge is required for the safely managed criterion. Based on MICS6 pilot question WS8A.", "es": "Tiempo transcurrido desde que se vaci\u00f3 o desodoriz\u00f3 por \u00faltima vez el contenedor de saneamiento en el sitio (letrina de fosa, fosa s\u00e9ptica o inodoro de compostaje). Es un indicador proxy para el pelda\u00f1o de saneamiento con gesti\u00f3n segura: se requiere vaciado regular y tratamiento seguro de los lodos fecales para el criterio de gesti\u00f3n segura. Basado en la pregunta piloto MICS6 WS8A.", "fr": "Temps \u00e9coul\u00e9 depuis le dernier vidange ou d\u00e9sodorisation du dispositif d''assainissement sur site (latrine \u00e0 fosse, fosse septique ou toilettes \u00e0 compostage). Il s''agit d''un indicateur proxy pour le niveau d''assainissement \u00e0 gestion s\u00e9curis\u00e9e : un vidange r\u00e9gulier et un traitement s\u00fbr des boues f\u00e9cales sont n\u00e9cessaires pour le crit\u00e8re de gestion s\u00e9curis\u00e9e. Bas\u00e9 sur la question pilote MICS6 WS8A."}, "id": "sanitation-emptying-timing", "label": {"en": "Sanitation Pit Emptying Timing", "es": "Momento de vaciado del pozo de saneamiento", "fr": "Calendrier de vidange de la fosse d''assainissement"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "MICS6 pilot question WS8A. Used for safely managed sanitation determination in the JMP expanded monitoring framework.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "values": [{"code": "never", "definition": {"en": "The pit, tank, or container has never been emptied since installation or since the household has been using it.", "es": "La fosa, el dep\u00f3sito o el recipiente nunca ha sido vaciado desde su instalaci\u00f3n o desde que el hogar lo usa.", "fr": "La fosse, le r\u00e9servoir ou le r\u00e9cipient n''a jamais \u00e9t\u00e9 vidang\u00e9 depuis son installation ou depuis que le m\u00e9nage l''utilise."}, "label": {"en": "Never emptied", "es": "Nunca vaciada", "fr": "Jamais vidang\u00e9e"}}, {"code": "less_than_1_year_ago", "definition": {"en": "The facility was last emptied within the past 12 months.", "es": "La instalaci\u00f3n fue vaciada por \u00faltima vez en los \u00faltimos 12 meses.", "fr": "L''installation a \u00e9t\u00e9 vidang\u00e9e pour la derni\u00e8re fois au cours des 12 derniers mois."}, "label": {"en": "Less than 1 year ago", "es": "Hace menos de 1 a\u00f1o", "fr": "Il y a moins d''un an"}}, {"code": "one_to_five_years_ago", "definition": {"en": "The facility was last emptied between 1 and 5 years ago.", "es": "La instalaci\u00f3n fue vaciada por \u00faltima vez entre 1 y 5 a\u00f1os atr\u00e1s.", "fr": "L''installation a \u00e9t\u00e9 vidang\u00e9e pour la derni\u00e8re fois entre 1 et 5 ans."}, "label": {"en": "1 to 5 years ago", "es": "Hace 1 a 5 a\u00f1os", "fr": "Il y a 1 \u00e0 5 ans"}}, {"code": "more_than_5_years_ago", "definition": {"en": "The facility was last emptied more than 5 years ago.", "es": "La instalaci\u00f3n fue vaciada por \u00faltima vez hace m\u00e1s de 5 a\u00f1os.", "fr": "L''installation a \u00e9t\u00e9 vidang\u00e9e pour la derni\u00e8re fois il y a plus de 5 ans."}, "label": {"en": "More than 5 years ago", "es": "Hace m\u00e1s de 5 a\u00f1os", "fr": "Il y a plus de 5 ans"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know when the facility was last emptied.", "es": "El encuestado no sabe cu\u00e1ndo fue vaciada la instalaci\u00f3n por \u00faltima vez.", "fr": "Le r\u00e9pondant ne sait pas quand l''installation a \u00e9t\u00e9 vidang\u00e9e pour la derni\u00e8re fois."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
