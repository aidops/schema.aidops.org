  NfiSufficiency:
    title:
      en: NFI sufficiency for all household members (3-level)
      fr: Suffisance des ANF pour tous les membres du ménage (3 niveaux)
      es: Suficiencia de ANF para todos los miembros del hogar (3 niveles)
    description:
      en: Three-level scale for assessing whether a household has sufficient non-food items (NFIs) for all members. 'Yes_all' means every member has the required items. 'Yes_some' (partial) means the household has some items but at least one member lacks the minimum. 'No' means the household has none of the required items. Based on Sphere Standard 4 NFI minimum standards.
      fr: Échelle à trois niveaux pour évaluer si un ménage dispose d'articles non alimentaires (ANF) suffisants pour tous ses membres. 'Yes_all' signifie que chaque membre a les articles requis. 'Yes_some' (partiel) signifie que le ménage a certains articles mais qu'au moins un membre n'a pas le minimum requis. 'No' signifie que le ménage n'a aucun des articles requis. Basée sur les normes minimales d'ANF de la Norme Sphère 4.
      es: Escala de tres niveles para evaluar si un hogar tiene artículos no alimentarios (ANF) suficientes para todos sus miembros. 'Yes_all' significa que cada miembro tiene los artículos requeridos. 'Yes_some' (parcial) significa que el hogar tiene algunos artículos pero al menos un miembro carece del mínimo requerido. 'No' significa que el hogar no tiene ninguno de los artículos requeridos. Basada en los estándares mínimos de ANF de la Norma Esfera 4.
    enum_uri: aidops:NfiSufficiency
    permissible_values:
      yes_all:
        title:
          en: Yes — all household members have adequate items
          fr: Oui — tous les membres du ménage ont des articles adéquats
          es: Sí — todos los miembros del hogar tienen artículos adecuados
        description:
          en: Every household member has the minimum required items as specified by Sphere Standard 4.
          fr: Chaque membre du ménage a les articles minimaux requis selon la Norme Sphère 4.
          es: Cada miembro del hogar tiene los artículos mínimos requeridos según la Norma Esfera 4.
      yes_some:
        title:
          en: Partial — some members have adequate items but not all
          fr: Partiel — certains membres ont des articles adéquats mais pas tous
          es: Parcial — algunos miembros tienen artículos adecuados pero no todos
        description:
          en: The household has some of the required items but at least one member lacks the Sphere Standard 4 minimum.
          fr: Le ménage dispose de certains articles requis mais au moins un membre n'a pas le minimum de la Norme Sphère 4.
          es: El hogar tiene algunos de los artículos requeridos pero al menos un miembro carece del mínimo de la Norma Esfera 4.
      'no':
        title:
          en: No — no adequate items
          fr: Non — aucun article adéquat
          es: No — sin artículos adecuados
        description:
          en: The household has none of the required items.
          fr: Le ménage n'a aucun des articles requis.
          es: El hogar no tiene ninguno de los artículos requeridos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale for assessing whether a household has sufficient non-food items (NFIs) for all members. ''Yes_all'' means every member has the required items. ''Yes_some'' (partial) means the household has some items but at least one member lacks the minimum. ''No'' means the household has none of the required items. Based on Sphere Standard 4 NFI minimum standards.", "es": "Escala de tres niveles para evaluar si un hogar tiene art\u00edculos no alimentarios (ANF) suficientes para todos sus miembros. ''Yes_all'' significa que cada miembro tiene los art\u00edculos requeridos. ''Yes_some'' (parcial) significa que el hogar tiene algunos art\u00edculos pero al menos un miembro carece del m\u00ednimo requerido. ''No'' significa que el hogar no tiene ninguno de los art\u00edculos requeridos. Basada en los est\u00e1ndares m\u00ednimos de ANF de la Norma Esfera 4.", "fr": "\u00c9chelle \u00e0 trois niveaux pour \u00e9valuer si un m\u00e9nage dispose d''articles non alimentaires (ANF) suffisants pour tous ses membres. ''Yes_all'' signifie que chaque membre a les articles requis. ''Yes_some'' (partiel) signifie que le m\u00e9nage a certains articles mais qu''au moins un membre n''a pas le minimum requis. ''No'' signifie que le m\u00e9nage n''a aucun des articles requis. Bas\u00e9e sur les normes minimales d''ANF de la Norme Sph\u00e8re 4."}, "id": "nfi-sufficiency", "label": {"en": "NFI sufficiency for all household members (3-level)", "es": "Suficiencia de ANF para todos los miembros del hogar (3 niveles)", "fr": "Suffisance des ANF pour tous les membres du m\u00e9nage (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_all", "definition": {"en": "Every household member has the minimum required items as specified by Sphere Standard 4.", "es": "Cada miembro del hogar tiene los art\u00edculos m\u00ednimos requeridos seg\u00fan la Norma Esfera 4.", "fr": "Chaque membre du m\u00e9nage a les articles minimaux requis selon la Norme Sph\u00e8re 4."}, "label": {"en": "Yes \u2014 all household members have adequate items", "es": "S\u00ed \u2014 todos los miembros del hogar tienen art\u00edculos adecuados", "fr": "Oui \u2014 tous les membres du m\u00e9nage ont des articles ad\u00e9quats"}}, {"code": "yes_some", "definition": {"en": "The household has some of the required items but at least one member lacks the Sphere Standard 4 minimum.", "es": "El hogar tiene algunos de los art\u00edculos requeridos pero al menos un miembro carece del m\u00ednimo de la Norma Esfera 4.", "fr": "Le m\u00e9nage dispose de certains articles requis mais au moins un membre n''a pas le minimum de la Norme Sph\u00e8re 4."}, "label": {"en": "Partial \u2014 some members have adequate items but not all", "es": "Parcial \u2014 algunos miembros tienen art\u00edculos adecuados pero no todos", "fr": "Partiel \u2014 certains membres ont des articles ad\u00e9quats mais pas tous"}}, {"code": "no", "definition": {"en": "The household has none of the required items.", "es": "El hogar no tiene ninguno de los art\u00edculos requeridos.", "fr": "Le m\u00e9nage n''a aucun des articles requis."}, "label": {"en": "No \u2014 no adequate items", "es": "No \u2014 sin art\u00edculos adecuados", "fr": "Non \u2014 aucun article ad\u00e9quat"}}]}'
      bibliography_refs: sphere-2018
  Phq9Frequency4pt:
    title:
      en: PHQ-9 / GAD-7 Frequency (4-point)
      fr: Fréquence PHQ-9 / GAD-7 (4 niveaux)
      es: Frecuencia PHQ-9 / GAD-7 (4 niveles)
    description:
      en: A four-point frequency scale running from 'not at all' to 'nearly every day', used on every item of the PHQ-9 (Patient Health Questionnaire) and the GAD-7 (Generalized Anxiety Disorder) screeners. The standard scoring convention assigns ascending numeric values 0 through 3, where higher values indicate more frequent symptom occurrence (0 = not at all, 3 = nearly every day). The recall period is the last two weeks.
      fr: Une échelle de fréquence à quatre niveaux allant de « pas du tout » à « presque tous les jours », utilisée pour chaque item des dépistages PHQ-9 (Patient Health Questionnaire) et GAD-7 (trouble d'anxiété généralisée). La convention de notation standard attribue des valeurs numériques croissantes de 0 à 3, où les valeurs plus élevées indiquent une occurrence plus fréquente des symptômes (0 = pas du tout, 3 = presque tous les jours). La période de rappel est les deux dernières semaines.
      es: Una escala de frecuencia de cuatro niveles que va desde «en absoluto» hasta «casi todos los días», usada en cada ítem de los tamizajes PHQ-9 (Patient Health Questionnaire) y GAD-7 (Trastorno de Ansiedad Generalizada). La convención de puntuación estándar asigna valores numéricos ascendentes de 0 a 3, donde los valores más altos indican ocurrencia de síntomas más frecuente (0 = en absoluto, 3 = casi todos los días). El período de recordatorio es las últimas dos semanas.
    enum_uri: aidops:Phq9Frequency4pt
    permissible_values:
      not_at_all:
        title:
          en: Not at all
          fr: Pas du tout
          es: En absoluto
        description:
          en: 'The symptom did not occur at any point during the last two weeks. Scoring value: 0.'
          fr: 'Le symptôme ne s''est produit à aucun moment au cours des deux dernières semaines. Valeur de notation : 0.'
          es: 'El síntoma no ocurrió en ningún momento durante las últimas dos semanas. Valor de puntuación: 0.'
      several_days:
        title:
          en: Several days
          fr: Plusieurs jours
          es: Varios días
        description:
          en: 'The symptom occurred on several days (but less than half of the last two weeks). Scoring value: 1.'
          fr: 'Le symptôme s''est produit plusieurs jours (mais moins de la moitié des deux dernières semaines). Valeur de notation : 1.'
          es: 'El síntoma ocurrió durante varios días (pero menos de la mitad de las últimas dos semanas). Valor de puntuación: 1.'
      more_than_half_the_days:
        title:
          en: More than half the days
          fr: Plus de la moitié des jours
          es: Más de la mitad de los días
        description:
          en: 'The symptom occurred on more than half of the last two weeks. Scoring value: 2.'
          fr: 'Le symptôme s''est produit plus de la moitié des deux dernières semaines. Valeur de notation : 2.'
          es: 'El síntoma ocurrió más de la mitad de las últimas dos semanas. Valor de puntuación: 2.'
      nearly_every_day:
        title:
          en: Nearly every day
          fr: Presque tous les jours
          es: Casi todos los días
        description:
          en: 'The symptom occurred nearly every day of the last two weeks. Scoring value: 3.'
          fr: 'Le symptôme s''est produit presque tous les jours au cours des deux dernières semaines. Valeur de notation : 3.'
          es: 'El síntoma ocurrió casi todos los días de las últimas dos semanas. Valor de puntuación: 3.'
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["kroenke-phq9-2001", "spitzer-gad7-2006"], "definition": {"en": "A four-point frequency scale running from ''not at all'' to ''nearly every day'', used on every item of the PHQ-9 (Patient Health Questionnaire) and the GAD-7 (Generalized Anxiety Disorder) screeners. The standard scoring convention assigns ascending numeric values 0 through 3, where higher values indicate more frequent symptom occurrence (0 = not at all, 3 = nearly every day). The recall period is the last two weeks.", "es": "Una escala de frecuencia de cuatro niveles que va desde \u00aben absoluto\u00bb hasta \u00abcasi todos los d\u00edas\u00bb, usada en cada \u00edtem de los tamizajes PHQ-9 (Patient Health Questionnaire) y GAD-7 (Trastorno de Ansiedad Generalizada). La convenci\u00f3n de puntuaci\u00f3n est\u00e1ndar asigna valores num\u00e9ricos ascendentes de 0 a 3, donde los valores m\u00e1s altos indican ocurrencia de s\u00edntomas m\u00e1s frecuente (0 = en absoluto, 3 = casi todos los d\u00edas). El per\u00edodo de recordatorio es las \u00faltimas dos semanas.", "fr": "Une \u00e9chelle de fr\u00e9quence \u00e0 quatre niveaux allant de \u00ab pas du tout \u00bb \u00e0 \u00ab presque tous les jours \u00bb, utilis\u00e9e pour chaque item des d\u00e9pistages PHQ-9 (Patient Health Questionnaire) et GAD-7 (trouble d''anxi\u00e9t\u00e9 g\u00e9n\u00e9ralis\u00e9e). La convention de notation standard attribue des valeurs num\u00e9riques croissantes de 0 \u00e0 3, o\u00f9 les valeurs plus \u00e9lev\u00e9es indiquent une occurrence plus fr\u00e9quente des sympt\u00f4mes (0 = pas du tout, 3 = presque tous les jours). La p\u00e9riode de rappel est les deux derni\u00e8res semaines."}, "id": "phq9-frequency-4pt", "label": {"en": "PHQ-9 / GAD-7 Frequency (4-point)", "es": "Frecuencia PHQ-9 / GAD-7 (4 niveles)", "fr": "Fr\u00e9quence PHQ-9 / GAD-7 (4 niveaux)"}, "maturity": "draft", "standard": {"name": "Patient Health Questionnaire (PHQ-9) and Generalized Anxiety Disorder (GAD-7), Pfizer-sponsored distribution", "notes": "Shared response scale across PHQ-9 and GAD-7 items. Value assignments: not_at_all=0, several_days=1, more_than_half_the_days=2, nearly_every_day=3. PHQ-9 sum range 0-27; GAD-7 sum range 0-21.", "uri": "https://www.phqscreeners.com/"}, "values": [{"code": "not_at_all", "definition": {"en": "The symptom did not occur at any point during the last two weeks. Scoring value: 0.", "es": "El s\u00edntoma no ocurri\u00f3 en ning\u00fan momento durante las \u00faltimas dos semanas. Valor de puntuaci\u00f3n: 0.", "fr": "Le sympt\u00f4me ne s''est produit \u00e0 aucun moment au cours des deux derni\u00e8res semaines. Valeur de notation : 0."}, "label": {"en": "Not at all", "es": "En absoluto", "fr": "Pas du tout"}}, {"code": "several_days", "definition": {"en": "The symptom occurred on several days (but less than half of the last two weeks). Scoring value: 1.", "es": "El s\u00edntoma ocurri\u00f3 durante varios d\u00edas (pero menos de la mitad de las \u00faltimas dos semanas). Valor de puntuaci\u00f3n: 1.", "fr": "Le sympt\u00f4me s''est produit plusieurs jours (mais moins de la moiti\u00e9 des deux derni\u00e8res semaines). Valeur de notation : 1."}, "label": {"en": "Several days", "es": "Varios d\u00edas", "fr": "Plusieurs jours"}}, {"code": "more_than_half_the_days", "definition": {"en": "The symptom occurred on more than half of the last two weeks. Scoring value: 2.", "es": "El s\u00edntoma ocurri\u00f3 m\u00e1s de la mitad de las \u00faltimas dos semanas. Valor de puntuaci\u00f3n: 2.", "fr": "Le sympt\u00f4me s''est produit plus de la moiti\u00e9 des deux derni\u00e8res semaines. Valeur de notation : 2."}, "label": {"en": "More than half the days", "es": "M\u00e1s de la mitad de los d\u00edas", "fr": "Plus de la moiti\u00e9 des jours"}}, {"code": "nearly_every_day", "definition": {"en": "The symptom occurred nearly every day of the last two weeks. Scoring value: 3.", "es": "El s\u00edntoma ocurri\u00f3 casi todos los d\u00edas de las \u00faltimas dos semanas. Valor de puntuaci\u00f3n: 3.", "fr": "Le sympt\u00f4me s''est produit presque tous les jours au cours des deux derni\u00e8res semaines. Valeur de notation : 3."}, "label": {"en": "Nearly every day", "es": "Casi todos los d\u00edas", "fr": "Presque tous les jours"}}]}'
      bibliography_refs: kroenke-phq9-2001,spitzer-gad7-2006
  Phq9SeverityBand:
    title:
      en: PHQ-9 Severity Band
      fr: Niveau de sévérité PHQ-9
      es: Nivel de severidad PHQ-9
    description:
      en: 'The depression severity classification derived from the PHQ-9 total score using the Kroenke et al. (2001) cut-points. Five bands: none/minimal (0-4), mild (5-9), moderate (10-14), moderately severe (15-19), severe (20-27). A total score of 10 or higher is the widely used clinical screening cut-off for probable major depressive disorder.'
      fr: 'La classification de la sévérité de la dépression dérivée du score total PHQ-9 en utilisant les seuils de Kroenke et al. (2001). Cinq niveaux : aucun/minimal (0-4), léger (5-9), modéré (10-14), modérément sévère (15-19), sévère (20-27). Un score total de 10 ou plus est le seuil de dépistage clinique largement utilisé pour un épisode dépressif majeur probable.'
      es: 'La clasificación de severidad de la depresión derivada del puntaje total del PHQ-9 usando los puntos de corte de Kroenke et al. (2001). Cinco niveles: ninguno/mínimo (0-4), leve (5-9), moderado (10-14), moderadamente severo (15-19), severo (20-27). Un puntaje total de 10 o más es el punto de corte de tamizaje clínico ampliamente utilizado para un episodio depresivo mayor probable.'
    enum_uri: aidops:Phq9SeverityBand
    permissible_values:
      none_minimal:
        title:
          en: None / minimal
          fr: Aucune / minimale
          es: Ninguna / mínima
        description:
          en: PHQ-9 total score 0-4. None or minimal depressive symptoms.
          fr: Score total PHQ-9 de 0 à 4. Aucun ou des symptômes dépressifs minimaux.
          es: Puntaje total PHQ-9 de 0 a 4. Ningún síntoma depresivo o síntomas mínimos.
      mild:
        title:
          en: Mild
          fr: Légère
          es: Leve
        description:
          en: PHQ-9 total score 5-9. Mild depressive symptoms.
          fr: Score total PHQ-9 de 5 à 9. Symptômes dépressifs légers.
          es: Puntaje total PHQ-9 de 5 a 9. Síntomas depresivos leves.
      moderate:
        title:
          en: Moderate
          fr: Modérée
          es: Moderada
        description:
          en: PHQ-9 total score 10-14. Moderate depressive symptoms. Standard clinical cut-off (>=10) for probable major depressive disorder.
          fr: Score total PHQ-9 de 10 à 14. Symptômes dépressifs modérés. Seuil clinique standard (>=10) pour un épisode dépressif majeur probable.
          es: Puntaje total PHQ-9 de 10 a 14. Síntomas depresivos moderados. Punto de corte clínico estándar (>=10) para un episodio depresivo mayor probable.
      moderately_severe:
        title:
          en: Moderately severe
          fr: Modérément sévère
          es: Moderadamente severa
        description:
          en: PHQ-9 total score 15-19. Moderately severe depressive symptoms.
          fr: Score total PHQ-9 de 15 à 19. Symptômes dépressifs modérément sévères.
          es: Puntaje total PHQ-9 de 15 a 19. Síntomas depresivos moderadamente severos.
      severe:
        title:
          en: Severe
          fr: Sévère
          es: Severa
        description:
          en: PHQ-9 total score 20-27. Severe depressive symptoms.
          fr: Score total PHQ-9 de 20 à 27. Symptômes dépressifs sévères.
          es: Puntaje total PHQ-9 de 20 a 27. Síntomas depresivos severos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["kroenke-phq9-2001"], "definition": {"en": "The depression severity classification derived from the PHQ-9 total score using the Kroenke et al. (2001) cut-points. Five bands: none/minimal (0-4), mild (5-9), moderate (10-14), moderately severe (15-19), severe (20-27). A total score of 10 or higher is the widely used clinical screening cut-off for probable major depressive disorder.", "es": "La clasificaci\u00f3n de severidad de la depresi\u00f3n derivada del puntaje total del PHQ-9 usando los puntos de corte de Kroenke et al. (2001). Cinco niveles: ninguno/m\u00ednimo (0-4), leve (5-9), moderado (10-14), moderadamente severo (15-19), severo (20-27). Un puntaje total de 10 o m\u00e1s es el punto de corte de tamizaje cl\u00ednico ampliamente utilizado para un episodio depresivo mayor probable.", "fr": "La classification de la s\u00e9v\u00e9rit\u00e9 de la d\u00e9pression d\u00e9riv\u00e9e du score total PHQ-9 en utilisant les seuils de Kroenke et al. (2001). Cinq niveaux : aucun/minimal (0-4), l\u00e9ger (5-9), mod\u00e9r\u00e9 (10-14), mod\u00e9r\u00e9ment s\u00e9v\u00e8re (15-19), s\u00e9v\u00e8re (20-27). Un score total de 10 ou plus est le seuil de d\u00e9pistage clinique largement utilis\u00e9 pour un \u00e9pisode d\u00e9pressif majeur probable."}, "id": "phq9-severity-band", "label": {"en": "PHQ-9 Severity Band", "es": "Nivel de severidad PHQ-9", "fr": "Niveau de s\u00e9v\u00e9rit\u00e9 PHQ-9"}, "maturity": "draft", "standard": {"name": "Kroenke, Spitzer, and Williams (2001), ''The PHQ-9: Validity of a Brief Depression Severity Measure''", "notes": "Standard severity bands published with the original PHQ-9 validation. Sensitivity and specificity of the >=10 cut-off for major depression are both around 88% in primary-care samples.", "uri": "https://doi.org/10.1046/j.1525-1497.2001.016009606.x"}, "values": [{"code": "none_minimal", "definition": {"en": "PHQ-9 total score 0-4. None or minimal depressive symptoms.", "es": "Puntaje total PHQ-9 de 0 a 4. Ning\u00fan s\u00edntoma depresivo o s\u00edntomas m\u00ednimos.", "fr": "Score total PHQ-9 de 0 \u00e0 4. Aucun ou des sympt\u00f4mes d\u00e9pressifs minimaux."}, "label": {"en": "None / minimal", "es": "Ninguna / m\u00ednima", "fr": "Aucune / minimale"}}, {"code": "mild", "definition": {"en": "PHQ-9 total score 5-9. Mild depressive symptoms.", "es": "Puntaje total PHQ-9 de 5 a 9. S\u00edntomas depresivos leves.", "fr": "Score total PHQ-9 de 5 \u00e0 9. Sympt\u00f4mes d\u00e9pressifs l\u00e9gers."}, "label": {"en": "Mild", "es": "Leve", "fr": "L\u00e9g\u00e8re"}}, {"code": "moderate", "definition": {"en": "PHQ-9 total score 10-14. Moderate depressive symptoms. Standard clinical cut-off (>=10) for probable major depressive disorder.", "es": "Puntaje total PHQ-9 de 10 a 14. S\u00edntomas depresivos moderados. Punto de corte cl\u00ednico est\u00e1ndar (>=10) para un episodio depresivo mayor probable.", "fr": "Score total PHQ-9 de 10 \u00e0 14. Sympt\u00f4mes d\u00e9pressifs mod\u00e9r\u00e9s. Seuil clinique standard (>=10) pour un \u00e9pisode d\u00e9pressif majeur probable."}, "label": {"en": "Moderate", "es": "Moderada", "fr": "Mod\u00e9r\u00e9e"}}, {"code": "moderately_severe", "definition": {"en": "PHQ-9 total score 15-19. Moderately severe depressive symptoms.", "es": "Puntaje total PHQ-9 de 15 a 19. S\u00edntomas depresivos moderadamente severos.", "fr": "Score total PHQ-9 de 15 \u00e0 19. Sympt\u00f4mes d\u00e9pressifs mod\u00e9r\u00e9ment s\u00e9v\u00e8res."}, "label": {"en": "Moderately severe", "es": "Moderadamente severa", "fr": "Mod\u00e9r\u00e9ment s\u00e9v\u00e8re"}}, {"code": "severe", "definition": {"en": "PHQ-9 total score 20-27. Severe depressive symptoms.", "es": "Puntaje total PHQ-9 de 20 a 27. S\u00edntomas depresivos severos.", "fr": "Score total PHQ-9 de 20 \u00e0 27. Sympt\u00f4mes d\u00e9pressifs s\u00e9v\u00e8res."}, "label": {"en": "Severe", "es": "Severa", "fr": "S\u00e9v\u00e8re"}}]}'
