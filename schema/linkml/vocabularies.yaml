    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ifrc-fbf-ma-guide-2019", "paul-dutt-2010-cyclone-sidr", "roy-et-al-2015-odisha", "wmo-mhews-checklist-2018"], "definition": {"en": "The communication channel through which a household received an early warning or alert for a hazard event. Covers broadcast media (radio, television, newspaper), mobile and digital channels (SMS, app, phone call, social media), in-person and community channels (door-to-door, community meetings, religious leaders, neighbors), and public-address channels (loudspeaker, siren). Used both as a single-select ''first channel'' item and as a multi-select ''all channels'' item to support analysis of channel redundancy in warning dissemination.", "es": "El canal de comunicaci\u00f3n por el cual un hogar recibi\u00f3 una alerta temprana o aviso para un evento de peligro. Abarca medios de difusi\u00f3n (radio, televisi\u00f3n, peri\u00f3dico), canales m\u00f3viles y digitales (SMS, aplicaci\u00f3n, llamada telef\u00f3nica, redes sociales), canales presenciales y comunitarios (puerta a puerta, reuniones comunitarias, l\u00edderes religiosos, vecinos) y canales de megafon\u00eda p\u00fablica (altavoz, sirena). Utilizado tanto como \u00edtem de selecci\u00f3n \u00fanica \u00abprimer canal\u00bb como \u00edtem de selecci\u00f3n m\u00faltiple \u00abtodos los canales\u00bb para permitir el an\u00e1lisis de la redundancia de canales en la difusi\u00f3n de alertas.", "fr": "Le canal de communication par lequel un m\u00e9nage a re\u00e7u une alerte pr\u00e9coce ou un avertissement pour un \u00e9v\u00e9nement dangereux. Couvre les m\u00e9dias de diffusion (radio, t\u00e9l\u00e9vision, journal), les canaux mobiles et num\u00e9riques (SMS, application, appel t\u00e9l\u00e9phonique, r\u00e9seaux sociaux), les canaux en personne et communautaires (porte-\u00e0-porte, r\u00e9unions communautaires, chefs religieux, voisins) et les canaux de sonorisation publique (haut-parleur, sir\u00e8ne). Utilis\u00e9 \u00e0 la fois comme item \u00e0 s\u00e9lection unique \u00ab premier canal \u00bb et comme item \u00e0 s\u00e9lection multiple \u00ab tous les canaux \u00bb pour permettre l''analyse de la redondance des canaux dans la diffusion des alertes."}, "id": "warning-channel", "label": {"en": "Warning Channel", "es": "Canal de alerta", "fr": "Canal d''alerte"}, "maturity": "draft", "standard": {"name": "WMO Multi-Hazard Early Warning Systems Checklist (pillar 3, dissemination and communication); IFRC Forecast-based Financing post-distribution monitoring channel list", "notes": "Codes consolidate the channel taxonomy used in IFRC FbF PDM forms and country Red Cross anticipatory action country operations (Bangladesh, Mozambique, Philippines), cross-referenced with the academic literature on cyclone and flood warning reception (Paul & Dutt 2010; Roy et al. 2015).", "uri": "https://library.wmo.int/idurl/4/55893"}, "values": [{"code": "radio", "definition": {"en": "National, regional, or local radio broadcast (AM, FM, or shortwave).", "es": "Transmisi\u00f3n de radio nacional, regional o local (AM, FM u onda corta).", "fr": "Diffusion radio nationale, r\u00e9gionale ou locale (AM, FM ou ondes courtes)."}, "label": {"en": "Radio", "es": "Radio", "fr": "Radio"}}, {"code": "television", "definition": {"en": "National, regional, or local television broadcast.", "es": "Transmisi\u00f3n de televisi\u00f3n nacional, regional o local.", "fr": "Diffusion t\u00e9l\u00e9vis\u00e9e nationale, r\u00e9gionale ou locale."}, "label": {"en": "Television", "es": "Televisi\u00f3n", "fr": "T\u00e9l\u00e9vision"}}, {"code": "sms_text", "definition": {"en": "Mobile phone text message sent by an authority, telecom operator, or emergency service.", "es": "Mensaje de texto de tel\u00e9fono m\u00f3vil enviado por una autoridad, operador de telecomunicaciones o servicio de emergencia.", "fr": "Message texte de t\u00e9l\u00e9phone mobile envoy\u00e9 par une autorit\u00e9, un op\u00e9rateur t\u00e9l\u00e9com ou un service d''urgence."}, "label": {"en": "SMS or text message", "es": "SMS o mensaje de texto", "fr": "SMS ou message texte"}}, {"code": "mobile_app", "definition": {"en": "Push notification received via a smartphone application, such as a national weather application or a Red Cross application.", "es": "Notificaci\u00f3n push recibida a trav\u00e9s de una aplicaci\u00f3n para smartphone, como una aplicaci\u00f3n meteorol\u00f3gica nacional o una aplicaci\u00f3n de la Cruz Roja.", "fr": "Notification push re\u00e7ue via une application pour smartphone, telle qu''une application m\u00e9t\u00e9orologique nationale ou une application de la Croix-Rouge."}, "label": {"en": "Mobile application alert", "es": "Alerta de aplicaci\u00f3n m\u00f3vil", "fr": "Alerte d''application mobile"}}, {"code": "phone_call", "definition": {"en": "Direct voice call from an official, volunteer, or automated calling system.", "es": "Llamada de voz directa de un funcionario, voluntario o sistema de llamadas automatizadas.", "fr": "Appel vocal direct d''un responsable, d''un volontaire ou d''un syst\u00e8me d''appel automatis\u00e9."}, "label": {"en": "Voice phone call", "es": "Llamada telef\u00f3nica de voz", "fr": "Appel t\u00e9l\u00e9phonique vocal"}}, {"code": "loudspeaker_siren", "definition": {"en": "Public-address loudspeaker, fixed or mobile siren, or megaphone announcement in the community.", "es": "Altavoz de megafon\u00eda p\u00fablica, sirena fija o m\u00f3vil, o anuncio con meg\u00e1fono en la comunidad.", "fr": "Haut-parleur de sonorisation publique, sir\u00e8ne fixe ou mobile, ou annonce au m\u00e9gaphone dans la communaut\u00e9."}, "label": {"en": "Loudspeaker or siren", "es": "Altavoz o sirena", "fr": "Haut-parleur ou sir\u00e8ne"}}, {"code": "door_to_door_official", "definition": {"en": "In-person visit by a government official, police officer, or uniformed service member.", "es": "Visita en persona por un funcionario gubernamental, oficial de polic\u00eda o miembro uniformado de un servicio.", "fr": "Visite en personne par un agent gouvernemental, un policier ou un membre des services en uniforme."}, "label": {"en": "Door-to-door by official", "es": "Puerta a puerta por un funcionario", "fr": "Porte-\u00e0-porte par un agent officiel"}}, {"code": "door_to_door_volunteer", "definition": {"en": "In-person visit by a community volunteer, a Red Cross or Red Crescent volunteer, or an NGO worker.", "es": "Visita en persona por un voluntario comunitario, un voluntario de la Cruz Roja o de la Media Luna Roja, o un trabajador de ONG.", "fr": "Visite en personne par un volontaire communautaire, un volontaire de la Croix-Rouge ou du Croissant-Rouge, ou un travailleur d''ONG."}, "label": {"en": "Door-to-door by volunteer", "es": "Puerta a puerta por un voluntario", "fr": "Porte-\u00e0-porte par un volontaire"}}, {"code": "community_leader_meeting", "definition": {"en": "Announcement at a community gathering or by a village or neighborhood leader.", "es": "Anuncio en una reuni\u00f3n comunitaria o por un l\u00edder de aldea o de barrio.", "fr": "Annonce lors d''un rassemblement communautaire ou par un chef de village ou de quartier."}, "label": {"en": "Community meeting or leader announcement", "es": "Reuni\u00f3n comunitaria o anuncio de l\u00edder", "fr": "R\u00e9union communautaire ou annonce d''un chef"}}, {"code": "religious_leader", "definition": {"en": "Announcement by a religious leader or at a mosque, church, temple, or other place of worship.", "es": "Anuncio por un l\u00edder religioso o en una mezquita, iglesia, templo u otro lugar de culto.", "fr": "Annonce par un chef religieux ou dans une mosqu\u00e9e, une \u00e9glise, un temple ou un autre lieu de culte."}, "label": {"en": "Religious leader or place of worship", "es": "L\u00edder religioso o lugar de culto", "fr": "Chef religieux ou lieu de culte"}}, {"code": "neighbor_family", "definition": {"en": "Information passed informally by a neighbor, relative, or friend.", "es": "Informaci\u00f3n transmitida informalmente por un vecino, pariente o amigo.", "fr": "Information transmise de mani\u00e8re informelle par un voisin, un parent ou un ami."}, "label": {"en": "Neighbor or family member", "es": "Vecino o familiar", "fr": "Voisin ou membre de la famille"}}, {"code": "social_media", "definition": {"en": "Facebook, WhatsApp, Twitter or X, Telegram, or another social platform.", "es": "Facebook, WhatsApp, Twitter o X, Telegram u otra plataforma social.", "fr": "Facebook, WhatsApp, Twitter ou X, Telegram ou une autre plateforme sociale."}, "label": {"en": "Social media", "es": "Redes sociales", "fr": "R\u00e9seaux sociaux"}}, {"code": "newspaper_poster", "definition": {"en": "Print newspaper article, printed notice, or posted notice.", "es": "Art\u00edculo de peri\u00f3dico impreso, aviso impreso o cartel fijado.", "fr": "Article de journal imprim\u00e9, avis imprim\u00e9 ou affiche pos\u00e9e."}, "label": {"en": "Newspaper or poster", "es": "Peri\u00f3dico o cartel", "fr": "Journal ou affiche"}}, {"code": "other", "definition": {"en": "Channel not listed above.", "es": "Canal no listado arriba.", "fr": "Canal non r\u00e9pertori\u00e9 ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
