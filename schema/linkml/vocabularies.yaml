 menos preferidos o menos costosos", "fr": "A mang\u00e9 des aliments moins pr\u00e9f\u00e9r\u00e9s ou moins co\u00fbteux"}, "notes": {"en": "rCSI weight = 1"}}, {"code": "borrow_food", "definition": {"en": "Borrow food, or rely on help from friends or relatives. Severity weight: 2.", "es": "Pedir prestados alimentos o depender de la ayuda de amigos o familiares. Peso de gravedad: 2.", "fr": "Emprunter de la nourriture ou s''appuyer sur l''aide d''amis ou de proches. Poids de gravit\u00e9 : 2."}, "label": {"en": "Borrowed food or relied on help from friends or relatives", "es": "Pidi\u00f3 prestados alimentos o dependi\u00f3 de ayuda de amigos o familiares", "fr": "A emprunt\u00e9 de la nourriture ou s''est appuy\u00e9 sur l''aide d''amis ou de proches"}, "notes": {"en": "rCSI weight = 2"}}, {"code": "reduce_meal_size", "definition": {"en": "Limit portion size at mealtimes. Severity weight: 1.", "es": "Limitar el tama\u00f1o de las porciones en las horas de comida. Peso de gravedad: 1.", "fr": "Limiter la taille des portions aux heures de repas. Poids de gravit\u00e9 : 1."}, "label": {"en": "Limited portion size at mealtimes", "es": "Limit\u00f3 el tama\u00f1o de las porciones en las comidas", "fr": "A limit\u00e9 la taille des portions aux repas"}, "notes": {"en": "rCSI weight = 1"}}, {"code": "reduce_meal_number", "definition": {"en": "Reduce the number of meals eaten in a day. Severity weight: 1.", "es": "Reducir el n\u00famero de comidas consumidas en un d\u00eda. Peso de gravedad: 1.", "fr": "R\u00e9duire le nombre de repas pris dans une journ\u00e9e. Poids de gravit\u00e9 : 1."}, "label": {"en": "Reduced number of meals eaten in a day", "es": "Redujo el n\u00famero de comidas en el d\u00eda", "fr": "A r\u00e9duit le nombre de repas pris dans une journ\u00e9e"}, "notes": {"en": "rCSI weight = 1"}}, {"code": "restrict_adult_consumption", "definition": {"en": "Restrict consumption by adults in order for small children to eat. Severity weight: 3.", "es": "Restringir el consumo de los adultos para que los ni\u00f1os peque\u00f1os puedan comer. Peso de gravedad: 3.", "fr": "Restreindre la consommation des adultes afin que les jeunes enfants puissent manger. Poids de gravit\u00e9 : 3."}, "label": {"en": "Restricted adult consumption so children could eat", "es": "Restringi\u00f3 el consumo de adultos para que los ni\u00f1os pudieran comer", "fr": "A restreint la consommation des adultes pour que les enfants puissent manger"}, "notes": {"en": "rCSI weight = 3"}}]}'
