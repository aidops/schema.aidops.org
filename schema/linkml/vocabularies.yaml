  FpNonuseReason:
    title:
      en: Reason for Non-Use of Contraception
      fr: Raison de la non-utilisation de la contraception
      es: Razón de la no utilización de anticoncepción
    description:
      en: The main reason a woman in need of family planning gives for not using any contraceptive method. Based on DHS standard non-use questions. Enumerators record the spontaneous first response and probe for additional reasons; they do not prompt with option lists.
      fr: La principale raison invoquée par une femme ayant besoin de planification familiale pour ne pas utiliser de méthode contraceptive. Basé sur les questions standard DHS sur la non-utilisation. Les enquêteurs enregistrent la première réponse spontanée et cherchent des raisons supplémentaires ; ils ne suggèrent pas de listes d'options.
      es: La razón principal que da una mujer con necesidad de planificación familiar para no usar ningún método anticonceptivo. Basado en las preguntas estándar DHS sobre no uso. Los encuestadores registran la primera respuesta espontánea y buscan razones adicionales; no sugieren listas de opciones.
    enum_uri: aidops:FpNonuseReason
    permissible_values:
      not_having_sex:
        title:
          en: Not having sex
          fr: N'a pas de rapports sexuels
          es: No tiene relaciones sexuales
        description:
          en: The respondent is not currently having sexual intercourse and therefore does not feel she needs a method.
          fr: La répondante n'a actuellement pas de rapports sexuels et ne pense donc pas avoir besoin d'une méthode.
          es: La encuestada no tiene relaciones sexuales actualmente y por lo tanto no siente que necesita un método.
      not_married:
        title:
          en: Not married
          fr: Non mariée
          es: No casada
        description:
          en: The respondent is not married and cites marital status as the reason for non-use.
          fr: La répondante n'est pas mariée et cite son statut matrimonial comme raison de non-utilisation.
          es: La encuestada no está casada y cita el estado civil como razón de no uso.
      partner_away:
        title:
          en: Partner is away
          fr: Partenaire absent
          es: Pareja ausente
        description:
          en: The respondent's partner is away (e.g., migrant labor) and she therefore does not see a current need for contraception.
          fr: Le partenaire de la répondante est absent (p. ex. travail migrant) et elle n'estime donc pas avoir besoin de contraception pour le moment.
          es: La pareja de la encuestada está ausente (p. ej., trabajo migrante) y por lo tanto no ve necesidad actual de anticoncepción.
      infrequent_sex:
        title:
          en: Infrequent sex
          fr: Rapports sexuels peu fréquents
          es: Relaciones sexuales poco frecuentes
        description:
          en: The respondent has infrequent sexual intercourse and does not consider herself at risk of pregnancy.
          fr: La répondante a des rapports sexuels peu fréquents et ne se considère pas à risque de grossesse.
          es: La encuestada tiene relaciones sexuales poco frecuentes y no se considera en riesgo de embarazo.
      menopausal_or_hysterectomy:
        title:
          en: Menopausal / hysterectomy
          fr: Ménopausée / hystérectomie
          es: Menopáusica / histerectomía
        description:
          en: The respondent is menopausal or has had a hysterectomy and therefore does not need contraception.
          fr: La répondante est ménopausée ou a subi une hystérectomie et n'a donc pas besoin de contraception.
          es: La encuestada está menopáusica o ha tenido una histerectomía y por lo tanto no necesita anticoncepción.
      breastfeeding_or_ppa:
        title:
          en: Breastfeeding / postpartum amenorrhea
          fr: Allaitement / aménorrhée post-partum
          es: Lactancia / amenorrea posparto
        description:
          en: The respondent is currently breastfeeding or has postpartum amenorrhea and believes she is protected from pregnancy.
          fr: La répondante allaite actuellement ou présente une aménorrhée post-partum et pense être protégée contre la grossesse.
          es: La encuestada está lactando actualmente o tiene amenorrea posparto y cree estar protegida del embarazo.
      subfecund:
        title:
          en: Subfecund / infecund (self-reported)
          fr: Sous-féconde / inféconde (auto-déclarée)
          es: Subfecunda / infecunda (autodeclarada)
        description:
          en: The respondent believes she has difficulty conceiving or is infecund based on past experience.
          fr: La répondante estime avoir des difficultés à concevoir ou être inféconde sur la base de son expérience passée.
          es: La encuestada cree que tiene dificultades para concebir o es infecunda basándose en su experiencia pasada.
      fatalistic:
        title:
          en: Fatalistic attitude
          fr: Attitude fataliste
          es: Actitud fatalista
        description:
          en: The respondent expresses fatalistic or religiously motivated acceptance of pregnancy (e.g., 'what God gives us').
          fr: La répondante exprime une acceptation fataliste ou religieusement motivée de la grossesse (p. ex. « ce que Dieu nous donne »).
          es: La encuestada expresa una aceptación fatalista o religiosamente motivada del embarazo (p. ej., 'lo que Dios nos dé').
      side_effects_concern:
        title:
          en: Concerns about side effects
          fr: Préoccupations concernant les effets secondaires
          es: Preocupaciones sobre efectos secundarios
        description:
          en: The respondent does not use a method because she has experienced or fears side effects.
          fr: La répondante n'utilise pas de méthode car elle a subi ou craint des effets secondaires.
          es: La encuestada no usa un método porque ha experimentado o teme efectos secundarios.
      health_risk_concern:
        title:
          en: Concerns about health risks
          fr: Préoccupations concernant les risques pour la santé
          es: Preocupaciones sobre riesgos para la salud
        description:
          en: The respondent perceives a health risk from contraceptive use beyond specific side effects (e.g., cancer risk, infertility concerns).
          fr: La répondante perçoit un risque pour la santé lié à l'utilisation de contraceptifs au-delà des effets secondaires spécifiques (p. ex. risque de cancer, préoccupations concernant l'infertilité).
          es: La encuestada percibe un riesgo para la salud por el uso de anticonceptivos más allá de los efectos secundarios específicos (p. ej., riesgo de cáncer, preocupaciones sobre infertilidad).
      method_unavailable:
        title:
          en: Method not available
          fr: Méthode non disponible
          es: Método no disponible
        description:
          en: The respondent wants to use a method but it is not available in her area or at an accessible facility.
          fr: La répondante souhaite utiliser une méthode mais elle n'est pas disponible dans sa zone ou dans un établissement accessible.
          es: La encuestada desea usar un método pero no está disponible en su área o en una instalación accesible.
      cost:
        title:
          en: Too expensive
          fr: Trop cher
          es: Demasiado costoso
        description:
          en: The respondent does not use a method because she cannot afford the cost.
          fr: La répondante n'utilise pas de méthode car elle ne peut pas se permettre le coût.
          es: La encuestada no usa un método porque no puede pagar el costo.
      inconvenient:
        title:
          en: Inconvenient to use
          fr: Difficile à utiliser
          es: Inconveniente para usar
        description:
          en: The respondent finds using a contraceptive method inconvenient or difficult (e.g., access distance, need to take daily pills).
          fr: La répondante trouve l'utilisation d'une méthode contraceptive difficile ou peu pratique (p. ex. distance d'accès, nécessité de prendre des pilules quotidiennes).
          es: La encuestada encuentra inconveniente o difícil usar un método anticonceptivo (p. ej., distancia de acceso, necesidad de tomar píldoras diariamente).
      partner_opposition:
        title:
          en: Partner opposes use
          fr: Opposition du partenaire
          es: El compañero se opone al uso
        description:
          en: The respondent's partner or husband opposes the use of contraception.
          fr: Le partenaire ou le mari de la répondante s'oppose à l'utilisation de la contraception.
          es: La pareja o esposo de la encuestada se opone al uso de anticoncepción.
      religious_prohibition:
        title:
          en: Religious prohibition
          fr: Interdiction religieuse
          es: Prohibición religiosa
        description:
          en: The respondent does not use contraception due to her own religious beliefs.
          fr: La répondante n'utilise pas de contraception en raison de ses propres croyances religieuses.
          es: La encuestada no usa anticoncepción debido a sus propias creencias religiosas.
      family_opposition:
        title:
          en: Family opposes use
          fr: Opposition de la famille
          es: La familia se opone al uso
        description:
          en: The respondent does not use contraception due to opposition from other family members (not the partner).
          fr: La répondante n'utilise pas de contraception en raison de l'opposition d'autres membres de la famille (pas le partenaire).
          es: La encuestada no usa anticoncepción debido a la oposición de otros miembros de la familia (no la pareja).
      doesnt_know_method:
        title:
          en: Does not know any method
          fr: Ne connaît aucune méthode
          es: No conoce ningún método
        description:
          en: The respondent is unaware of any contraceptive method. Signals unmet information need.
          fr: La répondante n'est pas au courant de l'existence de méthodes contraceptives. Signale un besoin d'information non satisfait.
          es: La encuestada desconoce cualquier método anticonceptivo. Indica una necesidad de información insatisfecha.
      other:
        title:
          en: Other reason
          fr: Autre raison
          es: Otra razón
        description:
          en: Any reason not captured by the codes above.
          fr: Toute raison non couverte par les codes ci-dessus.
          es: Cualquier razón no cubierta por los códigos anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-family-planning"], "definition": {"en": "The main reason a woman in need of family planning gives for not using any contraceptive method. Based on DHS standard non-use questions. Enumerators record the spontaneous first response and probe for additional reasons; they do not prompt with option lists.", "es": "La raz\u00f3n principal que da una mujer con necesidad de planificaci\u00f3n familiar para no usar ning\u00fan m\u00e9todo anticonceptivo. Basado en las preguntas est\u00e1ndar DHS sobre no uso. Los encuestadores registran la primera respuesta espont\u00e1nea y buscan razones adicionales; no sugieren listas de opciones.", "fr": "La principale raison invoqu\u00e9e par une femme ayant besoin de planification familiale pour ne pas utiliser de m\u00e9thode contraceptive. Bas\u00e9 sur les questions standard DHS sur la non-utilisation. Les enqu\u00eateurs enregistrent la premi\u00e8re r\u00e9ponse spontan\u00e9e et cherchent des raisons suppl\u00e9mentaires ; ils ne sugg\u00e8rent pas de listes d''options."}, "id": "fp-nonuse-reason", "label": {"en": "Reason for Non-Use of Contraception", "es": "Raz\u00f3n de la no utilizaci\u00f3n de anticoncepci\u00f3n", "fr": "Raison de la non-utilisation de la contraception"}, "maturity": "draft", "values": [{"code": "not_having_sex", "definition": {"en": "The respondent is not currently having sexual intercourse and therefore does not feel she needs a method.", "es": "La encuestada no tiene relaciones sexuales actualmente y por lo tanto no siente que necesita un m\u00e9todo.", "fr": "La r\u00e9pondante n''a actuellement pas de rapports sexuels et ne pense donc pas avoir besoin d''une m\u00e9thode."}, "label": {"en": "Not having sex", "es": "No tiene relaciones sexuales", "fr": "N''a pas de rapports sexuels"}}, {"code": "not_married", "definition": {"en": "The respondent is not married and cites marital status as the reason for non-use.", "es": "La encuestada no est\u00e1 casada y cita el estado civil como raz\u00f3n de no uso.", "fr": "La r\u00e9pondante n''est pas mari\u00e9e et cite son statut matrimonial comme raison de non-utilisation."}, "label": {"en": "Not married", "es": "No casada", "fr": "Non mari\u00e9e"}}, {"code": "partner_away", "definition": {"en": "The respondent''s partner is away (e.g., migrant labor) and she therefore does not see a current need for contraception.", "es": "La pareja de la encuestada est\u00e1 ausente (p. ej., trabajo migrante) y por lo tanto no ve necesidad actual de anticoncepci\u00f3n.", "fr": "Le partenaire de la r\u00e9pondante est absent (p. ex. travail migrant) et elle n''estime donc pas avoir besoin de contraception pour le moment."}, "label": {"en": "Partner is away", "es": "Pareja ausente", "fr": "Partenaire absent"}}, {"code": "infrequent_sex", "definition": {"en": "The respondent has infrequent sexual intercourse and does not consider herself at risk of pregnancy.", "es": "La encuestada tiene relaciones sexuales poco frecuentes y no se considera en riesgo de embarazo.", "fr": "La r\u00e9pondante a des rapports sexuels peu fr\u00e9quents et ne se consid\u00e8re pas \u00e0 risque de grossesse."}, "label": {"en": "Infrequent sex", "es": "Relaciones sexuales poco frecuentes", "fr": "Rapports sexuels peu fr\u00e9quents"}}, {"code": "menopausal_or_hysterectomy", "definition": {"en": "The respondent is menopausal or has had a hysterectomy and therefore does not need contraception.", "es": "La encuestada est\u00e1 menop\u00e1usica o ha tenido una histerectom\u00eda y por lo tanto no necesita anticoncepci\u00f3n.", "fr": "La r\u00e9pondante est m\u00e9nopaus\u00e9e ou a subi une hyst\u00e9rectomie et n''a donc pas besoin de contraception."}, "label": {"en": "Menopausal / hysterectomy", "es": "Menop\u00e1usica / histerectom\u00eda", "fr": "M\u00e9nopaus\u00e9e / hyst\u00e9rectomie"}}, {"code": "breastfeeding_or_ppa", "definition": {"en": "The respondent is currently breastfeeding or has postpartum amenorrhea and believes she is protected from pregnancy.", "es": "La encuestada est\u00e1 lactando actualmente o tiene amenorrea posparto y cree estar protegida del embarazo.", "fr": "La r\u00e9pondante allaite actuellement ou pr\u00e9sente une am\u00e9norrh\u00e9e post-partum et pense \u00eatre prot\u00e9g\u00e9e contre la grossesse."}, "label": {"en": "Breastfeeding / postpartum amenorrhea", "es": "Lactancia / amenorrea posparto", "fr": "Allaitement / am\u00e9norrh\u00e9e post-partum"}}, {"code": "subfecund", "definition": {"en": "The respondent believes she has difficulty conceiving or is infecund based on past experience.", "es": "La encuestada cree que tiene dificultades para concebir o es infecunda bas\u00e1ndose en su experiencia pasada.", "fr": "La r\u00e9pondante estime avoir des difficult\u00e9s \u00e0 concevoir ou \u00eatre inf\u00e9conde sur la base de son exp\u00e9rience pass\u00e9e."}, "label": {"en": "Subfecund / infecund (self-reported)", "es": "Subfecunda / infecunda (autodeclarada)", "fr": "Sous-f\u00e9conde / inf\u00e9conde (auto-d\u00e9clar\u00e9e)"}}, {"code": "fatalistic", "definition": {"en": "The respondent expresses fatalistic or religiously motivated acceptance of pregnancy (e.g., ''what God gives us'').", "es": "La encuestada expresa una aceptaci\u00f3n fatalista o religiosamente motivada del embarazo (p. ej., ''lo que Dios nos d\u00e9'').", "fr": "La r\u00e9pondante exprime une acceptation fataliste ou religieusement motiv\u00e9e de la grossesse (p. ex. \u00ab ce que Dieu nous donne \u00bb)."}, "label": {"en": "Fatalistic attitude", "es": "Actitud fatalista", "fr": "Attitude fataliste"}}, {"code": "side_effects_concern", "definition": {"en": "The respondent does not use a method because she has experienced or fears side effects.", "es": "La encuestada no usa un m\u00e9todo porque ha experimentado o teme efectos secundarios.", "fr": "La r\u00e9pondante n''utilise pas de m\u00e9thode car elle a subi ou craint des effets secondaires."}, "label": {"en": "Concerns about side effects", "es": "Preocupaciones sobre efectos secundarios", "fr": "Pr\u00e9occupations concernant les effets secondaires"}}, {"code": "health_risk_concern", "definition": {"en": "The respondent perceives a health risk from contraceptive use beyond specific side effects (e.g., cancer risk, infertility concerns).", "es": "La encuestada percibe un riesgo para la salud por el uso de anticonceptivos m\u00e1s all\u00e1 de los efectos secundarios espec\u00edficos (p. ej., riesgo de c\u00e1ncer, preocupaciones sobre infertilidad).", "fr": "La r\u00e9pondante per\u00e7oit un risque pour la sant\u00e9 li\u00e9 \u00e0 l''utilisation de contraceptifs au-del\u00e0 des effets secondaires sp\u00e9cifiques (p. ex. risque de cancer, pr\u00e9occupations concernant l''infertilit\u00e9)."}, "label": {"en": "Concerns about health risks", "es": "Preocupaciones sobre riesgos para la salud", "fr": "Pr\u00e9occupations concernant les risques pour la sant\u00e9"}}, {"code": "method_unavailable", "definition": {"en": "The respondent wants to use a method but it is not available in her area or at an accessible facility.", "es": "La encuestada desea usar un m\u00e9todo pero no est\u00e1 disponible en su \u00e1rea o en una instalaci\u00f3n accesible.", "fr": "La r\u00e9pondante souhaite utiliser une m\u00e9thode mais elle n''est pas disponible dans sa zone ou dans un \u00e9tablissement accessible."}, "label": {"en": "Method not available", "es": "M\u00e9todo no disponible", "fr": "M\u00e9thode non disponible"}}, {"code": "cost", "definition": {"en": "The respondent does not use a method because she cannot afford the cost.", "es": "La encuestada no usa un m\u00e9todo porque no puede pagar el costo.", "fr": "La r\u00e9pondante n''utilise pas de m\u00e9thode car elle ne peut pas se permettre le co\u00fbt."}, "label": {"en": "Too expensive", "es": "Demasiado costoso", "fr": "Trop cher"}}, {"code": "inconvenient", "definition": {"en": "The respondent finds using a contraceptive method inconvenient or difficult (e.g., access distance, need to take daily pills).", "es": "La encuestada encuentra inconveniente o dif\u00edcil usar un m\u00e9todo anticonceptivo (p. ej., distancia de acceso, necesidad de tomar p\u00edldoras diariamente).", "fr": "La r\u00e9pondante trouve l''utilisation d''une m\u00e9thode contraceptive difficile ou peu pratique (p. ex. distance d''acc\u00e8s, n\u00e9cessit\u00e9 de prendre des pilules quotidiennes)."}, "label": {"en": "Inconvenient to use", "es": "Inconveniente para usar", "fr": "Difficile \u00e0 utiliser"}}, {"code": "partner_opposition", "definition": {"en": "The respondent''s partner or husband opposes the use of contraception.", "es": "La pareja o esposo de la encuestada se opone al uso de anticoncepci\u00f3n.", "fr": "Le partenaire ou le mari de la r\u00e9pondante s''oppose \u00e0 l''utilisation de la contraception."}, "label": {"en": "Partner opposes use", "es": "El compa\u00f1ero se opone al uso", "fr": "Opposition du partenaire"}}, {"code": "religious_prohibition", "definition": {"en": "The respondent does not use contraception due to her own religious beliefs.", "es": "La encuestada no usa anticoncepci\u00f3n debido a sus propias creencias religiosas.", "fr": "La r\u00e9pondante n''utilise pas de contraception en raison de ses propres croyances religieuses."}, "label": {"en": "Religious prohibition", "es": "Prohibici\u00f3n religiosa", "fr": "Interdiction religieuse"}}, {"code": "family_opposition", "definition": {"en": "The respondent does not use contraception due to opposition from other family members (not the partner).", "es": "La encuestada no usa anticoncepci\u00f3n debido a la oposici\u00f3n de otros miembros de la familia (no la pareja).", "fr": "La r\u00e9pondante n''utilise pas de contraception en raison de l''opposition d''autres membres de la famille (pas le partenaire)."}, "label": {"en": "Family opposes use", "es": "La familia se opone al uso", "fr": "Opposition de
        la famille"}}, {"code": "doesnt_know_method", "definition": {"en": "The respondent is unaware of any contraceptive method. Signals unmet information need.", "es": "La encuestada desconoce cualquier m\u00e9todo anticonceptivo. Indica una necesidad de informaci\u00f3n insatisfecha.", "fr": "La r\u00e9pondante n''est pas au courant de l''existence de m\u00e9thodes contraceptives. Signale un besoin d''information non satisfait."}, "label": {"en": "Does not know any method", "es": "No conoce ning\u00fan m\u00e9todo", "fr": "Ne conna\u00eet aucune m\u00e9thode"}}, {"code": "other", "definition": {"en": "Any reason not captured by the codes above.", "es": "Cualquier raz\u00f3n no cubierta por los c\u00f3digos anteriores.", "fr": "Toute raison non couverte par les codes ci-dessus."}, "label": {"en": "Other reason", "es": "Otra raz\u00f3n", "fr": "Autre raison"}}]}'
