  RangelandCondition:
    title:
      en: Rangeland Condition
      fr: Condition des pâturages
      es: Condición de los pastizales
    description:
      en: Household perception of current pasture (grass and browse) availability and quality in the current grazing area. Used in PastoralFoodSecurityProfile as a proxy for satellite NDVI data when remote sensing data are unavailable or when ground-truth triangulation is needed. Codes align with NDVI anomaly severity thresholds used in FAO GIEWS and FEWSNET early warning systems. FSNAU triangulates household-perception responses against NDVI data at livelihood-zone level.
      fr: Perception du ménage de la disponibilité et de la qualité actuelles des pâturages (herbe et broutage) dans la zone de pâturage actuelle. Utilisé comme proxy des données satellitaires NDVI. Les codes s'alignent sur les seuils de gravité des anomalies NDVI utilisés dans FAO GIEWS et FEWSNET.
      es: Percepción del hogar sobre la disponibilidad y calidad actuales de los pastos (hierba y ramoneo) en el área de pastoreo actual. Usado como proxy de los datos satelitales NDVI. Los códigos se alinean con los umbrales de gravedad de anomalías NDVI usados en FAO GIEWS y FEWSNET.
    enum_uri: aidops:RangelandCondition
    permissible_values:
      very_good:
        title:
          en: Very good — abundant pasture, green and sufficient
          fr: Très bon — pâturage abondant, vert et suffisant
          es: Muy bueno — pastos abundantes, verdes y suficientes
        description:
          en: Pasture is plentiful and of high quality; livestock body condition is likely improving.
          fr: Le pâturage est abondant et de haute qualité ; l'état corporel du bétail s'améliore probablement.
          es: Los pastos son abundantes y de alta calidad; la condición corporal del ganado probablemente está mejorando.
      good:
        title:
          en: Good — adequate pasture, mostly sufficient
          fr: Bon — pâturage adéquat, généralement suffisant
          es: Bueno — pastos adecuados, mayormente suficientes
        description:
          en: Pasture is adequate for herd needs; normal seasonal conditions.
          fr: Le pâturage est adéquat pour les besoins du troupeau ; conditions saisonnières normales.
          es: Los pastos son adecuados para las necesidades del rebaño; condiciones estacionales normales.
      fair:
        title:
          en: Fair — pasture is reduced but livestock can still graze
          fr: Passable — pâturage réduit mais le bétail peut encore pâturer
          es: Regular — los pastos son reducidos pero el ganado aún puede pastar
        description:
          en: Pasture is below normal; livestock are grazing but under some nutritional stress.
          fr: Le pâturage est inférieur à la normale ; le bétail pâture mais est sous un certain stress nutritionnel.
          es: Los pastos están por debajo de lo normal; el ganado pasta pero está bajo cierto estrés nutricional.
      poor:
        title:
          en: Poor — very limited pasture; livestock losing body condition
          fr: Mauvais — pâturage très limité ; bétail perdant de la condition corporelle
          es: Deficiente — pastos muy limitados; el ganado pierde condición corporal
        description:
          en: Severe pasture shortage; livestock are losing body condition rapidly. Early warning threshold.
          fr: Grave pénurie de pâturage ; le bétail perd rapidement de la condition corporelle. Seuil d'alerte précoce.
          es: Escasez severa de pastos; el ganado pierde condición corporal rápidamente. Umbral de alerta temprana.
      none:
        title:
          en: None — no usable pasture; bare ground
          fr: Aucun — aucun pâturage utilisable ; sol nu
          es: Ninguno — sin pastos utilizables; suelo desnudo
        description:
          en: Complete absence of usable pasture; herd survival at acute risk without emergency feed interventions.
          fr: Absence complète de pâturage utilisable ; la survie du troupeau est en danger aigu sans interventions d'urgence alimentaire.
          es: Ausencia completa de pastos utilizables; la supervivencia del rebaño está en riesgo agudo sin intervenciones de alimentación de emergencia.
      dont_know:
        title:
          en: Don't know / not applicable
          fr: Ne sait pas / sans objet
          es: No sabe / no aplica
        description:
          en: Respondent cannot assess rangeland condition, or the household's herd is not currently in a grazing area.
          fr: Le répondant ne peut pas évaluer la condition des pâturages, ou le troupeau du ménage n'est pas actuellement dans une zone de pâturage.
          es: El encuestado no puede evaluar la condición de los pastizales, o el rebaño del hogar no está actualmente en un área de pastoreo.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-giews-pastoral-monitoring-2020", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022", "ipc-afi-technical-manual-v3-1", "legs-3rd-edition-2023", "rima-ii-fao-2016-pastoral"], "definition": {"en": "Household perception of current pasture (grass and browse) availability and quality in the current grazing area. Used in PastoralFoodSecurityProfile as a proxy for satellite NDVI data when remote sensing data are unavailable or when ground-truth triangulation is needed. Codes align with NDVI anomaly severity thresholds used in FAO GIEWS and FEWSNET early warning systems. FSNAU triangulates household-perception responses against NDVI data at livelihood-zone level.", "es": "Percepci\u00f3n del hogar sobre la disponibilidad y calidad actuales de los pastos (hierba y ramoneo) en el \u00e1rea de pastoreo actual. Usado como proxy de los datos satelitales NDVI. Los c\u00f3digos se alinean con los umbrales de gravedad de anomal\u00edas NDVI usados en FAO GIEWS y FEWSNET.", "fr": "Perception du m\u00e9nage de la disponibilit\u00e9 et de la qualit\u00e9 actuelles des p\u00e2turages (herbe et broutage) dans la zone de p\u00e2turage actuelle. Utilis\u00e9 comme proxy des donn\u00e9es satellitaires NDVI. Les codes s''alignent sur les seuils de gravit\u00e9 des anomalies NDVI utilis\u00e9s dans FAO GIEWS et FEWSNET."}, "id": "rangeland-condition", "label": {"en": "Rangeland Condition", "es": "Condici\u00f3n de los pastizales", "fr": "Condition des p\u00e2turages"}, "maturity": "draft", "values": [{"code": "very_good", "definition": {"en": "Pasture is plentiful and of high quality; livestock body condition is likely improving.", "es": "Los pastos son abundantes y de alta calidad; la condici\u00f3n corporal del ganado probablemente est\u00e1 mejorando.", "fr": "Le p\u00e2turage est abondant et de haute qualit\u00e9 ; l''\u00e9tat corporel du b\u00e9tail s''am\u00e9liore probablement."}, "label": {"en": "Very good \u2014 abundant pasture, green and sufficient", "es": "Muy bueno \u2014 pastos abundantes, verdes y suficientes", "fr": "Tr\u00e8s bon \u2014 p\u00e2turage abondant, vert et suffisant"}}, {"code": "good", "definition": {"en": "Pasture is adequate for herd needs; normal seasonal conditions.", "es": "Los pastos son adecuados para las necesidades del reba\u00f1o; condiciones estacionales normales.", "fr": "Le p\u00e2turage est ad\u00e9quat pour les besoins du troupeau ; conditions saisonni\u00e8res normales."}, "label": {"en": "Good \u2014 adequate pasture, mostly sufficient", "es": "Bueno \u2014 pastos adecuados, mayormente suficientes", "fr": "Bon \u2014 p\u00e2turage ad\u00e9quat, g\u00e9n\u00e9ralement suffisant"}}, {"code": "fair", "definition": {"en": "Pasture is below normal; livestock are grazing but under some nutritional stress.", "es": "Los pastos est\u00e1n por debajo de lo normal; el ganado pasta pero est\u00e1 bajo cierto estr\u00e9s nutricional.", "fr": "Le p\u00e2turage est inf\u00e9rieur \u00e0 la normale ; le b\u00e9tail p\u00e2ture mais est sous un certain stress nutritionnel."}, "label": {"en": "Fair \u2014 pasture is reduced but livestock can still graze", "es": "Regular \u2014 los pastos son reducidos pero el ganado a\u00fan puede pastar", "fr": "Passable \u2014 p\u00e2turage r\u00e9duit mais le b\u00e9tail peut encore p\u00e2turer"}}, {"code": "poor", "definition": {"en": "Severe pasture shortage; livestock are losing body condition rapidly. Early warning threshold.", "es": "Escasez severa de pastos; el ganado pierde condici\u00f3n corporal r\u00e1pidamente. Umbral de alerta temprana.", "fr": "Grave p\u00e9nurie de p\u00e2turage ; le b\u00e9tail perd rapidement de la condition corporelle. Seuil d''alerte pr\u00e9coce."}, "label": {"en": "Poor \u2014 very limited pasture; livestock losing body condition", "es": "Deficiente \u2014 pastos muy limitados; el ganado pierde condici\u00f3n corporal", "fr": "Mauvais \u2014 p\u00e2turage tr\u00e8s limit\u00e9 ; b\u00e9tail perdant de la condition corporelle"}}, {"code": "none", "definition": {"en": "Complete absence of usable pasture; herd survival at acute risk without emergency feed interventions.", "es": "Ausencia completa de pastos utilizables; la supervivencia del reba\u00f1o est\u00e1 en riesgo agudo sin intervenciones de alimentaci\u00f3n de emergencia.", "fr": "Absence compl\u00e8te de p\u00e2turage utilisable ; la survie du troupeau est en danger aigu sans interventions d''urgence alimentaire."}, "label": {"en": "None \u2014 no usable pasture; bare ground", "es": "Ninguno \u2014 sin pastos utilizables; suelo desnudo", "fr": "Aucun \u2014 aucun p\u00e2turage utilisable ; sol nu"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess rangeland condition, or the household''s herd is not currently in a grazing area.", "es": "El encuestado no puede evaluar la condici\u00f3n de los pastizales, o el reba\u00f1o del hogar no est\u00e1 actualmente en un \u00e1rea de pastoreo.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la condition des p\u00e2turages, ou le troupeau du m\u00e9nage n''est pas actuellement dans une zone de p\u00e2turage."}, "label": {"en": "Don''t know / not applicable", "es": "No sabe / no aplica", "fr": "Ne sait pas / sans objet"}}]}'
      bibliography_refs: fao-giews-pastoral-monitoring-2020,fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022,ipc-afi-technical-manual-v3-1,legs-3rd-edition-2023,rima-ii-fao-2016-pastoral
  RcsiStrategy:
    title:
      en: rCSI Strategy
      fr: Stratégie rCSI
      es: Estrategia rCSI
    description:
      en: The five food-related coping behaviours measured by the WFP/CARE Reduced Coping Strategies Index (rCSI). Each strategy is asked as a count of days (0-7) in the past week and multiplied by a severity weight before summing to a composite index. Weights are part of the instrument definition.
      fr: Les cinq comportements d'adaptation alimentaire mesurés par l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE. Chaque stratégie est demandée en nombre de jours (0-7) au cours de la semaine écoulée et multipliée par un poids de gravité avant la sommation en un indice composite. Les poids font partie de la définition de l'instrument.
      es: Los cinco comportamientos de afrontamiento alimentario medidos por el Índice Reducido de Estrategias de Afrontamiento (rCSI) del PMA/CARE. Cada estrategia se pregunta como recuento de días (0-7) en la semana pasada y se multiplica por un peso de gravedad antes de sumar al índice compuesto. Los pesos son parte de la definición del instrumento.
    enum_uri: aidops:RcsiStrategy
    permissible_values:
      less_preferred_food:
        title:
          en: Ate less-preferred or less-expensive food
          fr: A mangé des aliments moins préférés ou moins coûteux
          es: Comió alimentos menos preferidos o menos costosos
        description:
          en: 'Rely on less preferred, less expensive food. Severity weight: 1.'
          fr: 'Recourir à des aliments moins préférés et moins coûteux. Poids de gravité : 1.'
          es: 'Recurrir a alimentos menos preferidos y menos costosos. Peso de gravedad: 1.'
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "rCSI weight = 1"}}'
      borrow_food:
        title:
          en: Borrowed food or relied on help from friends or relatives
          fr: A emprunté de la nourriture ou s'est appuyé sur l'aide d'amis ou de proches
          es: Pidió prestados alimentos o dependió de ayuda de amigos o familiares
        description:
          en: 'Borrow food, or rely on help from friends or relatives. Severity weight: 2.'
          fr: 'Emprunter de la nourriture ou s''appuyer sur l''aide d''amis ou de proches. Poids de gravité : 2.'
          es: 'Pedir prestados alimentos o depender de la ayuda de amigos o familiares. Peso de gravedad: 2.'
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "rCSI weight = 2"}}'
      reduce_meal_size:
        title:
          en: Limited portion size at mealtimes
          fr: A limité la taille des portions aux repas
          es: Limitó el tamaño de las porciones en las comidas
        description:
          en: 'Limit portion size at mealtimes. Severity weight: 1.'
          fr: 'Limiter la taille des portions aux heures de repas. Poids de gravité : 1.'
          es: 'Limitar el tamaño de las porciones en las horas de comida. Peso de gravedad: 1.'
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "rCSI weight = 1"}}'
      reduce_meal_number:
        title:
          en: Reduced number of meals eaten in a day
          fr: A réduit le nombre de repas pris dans une journée
          es: Redujo el número de comidas en el día
        description:
          en: 'Reduce the number of meals eaten in a day. Severity weight: 1.'
          fr: 'Réduire le nombre de repas pris dans une journée. Poids de gravité : 1.'
          es: 'Reducir el número de comidas consumidas en un día. Peso de gravedad: 1.'
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "rCSI weight = 1"}}'
      restrict_adult_consumption:
        title:
          en: Restricted adult consumption so children could eat
          fr: A restreint la consommation des adultes pour que les enfants puissent manger
          es: Restringió el consumo de adultos para que los niños pudieran comer
        description:
          en: 'Restrict consumption by adults in order for small children to eat. Severity weight: 3.'
          fr: 'Restreindre la consommation des adultes afin que les jeunes enfants puissent manger. Poids de gravité : 3.'
          es: 'Restringir el consumo de los adultos para que los niños pequeños puedan comer. Peso de gravedad: 3.'
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "rCSI weight = 3"}}'
    annotations:
