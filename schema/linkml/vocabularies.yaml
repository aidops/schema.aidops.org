  AapLikelihood4:
    title:
      en: 'AAP: Hypothetical likelihood (4 levels)'
      fr: 'Redevabilité : Probabilité hypothétique (4 niveaux)'
      es: 'Rendición de cuentas: Probabilidad hipotética (4 niveles)'
    description:
      en: Four-level hypothetical-likelihood scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how likely the respondent would be to take an action (use a complaint channel, report a safeguarding concern). The scale is directional with no neutral midpoint, following GTS HVI and IASC / REACH 2018 convention. The `not_applicable_no_channel` code captures the case where the respondent would be willing in principle but no channel exists; this distinction matters for programmatic response design.
      fr: Échelle de probabilité hypothétique à quatre niveaux utilisée dans le Profil de redevabilité envers les populations affectées pour les items qui demandent à quel point le répondant serait susceptible d'agir (utiliser un canal de plainte, signaler une préoccupation de sauvegarde). L'échelle est directionnelle sans milieu neutre, suivant la convention GTS HVI et IASC / REACH 2018. Le code `not_applicable_no_channel` capture le cas où le répondant serait disposé en principe mais aucun canal n'existe ; cette distinction est importante pour la conception de la réponse programmatique.
      es: Escala de probabilidad hipotética de cuatro niveles utilizada en el Perfil de Rendición de Cuentas a las Poblaciones Afectadas para los ítems que preguntan qué tan probable sería que el encuestado tomara una acción (utilizar un canal de queja, reportar una preocupación de salvaguardia). La escala es direccional sin punto medio neutro, siguiendo la convención GTS HVI e IASC / REACH 2018. El código `not_applicable_no_channel` captura el caso en el que el encuestado estaría dispuesto en principio pero no existe un canal; esta distinción importa para el diseño de la respuesta programática.
    enum_uri: aidops:AapLikelihood4
    permissible_values:
      very_likely:
        title:
          en: Very likely
          fr: Très probable
          es: Muy probable
        description:
          en: The respondent would take the action with high confidence.
          fr: Le répondant prendrait l'action avec une grande confiance.
          es: El encuestado tomaría la acción con alta confianza.
      somewhat_likely:
        title:
          en: Somewhat likely
          fr: Assez probable
          es: Algo probable
        description:
          en: The respondent would probably take the action.
          fr: Le répondant prendrait probablement l'action.
          es: El encuestado probablemente tomaría la acción.
      not_very_likely:
        title:
          en: Not very likely
          fr: Peu probable
          es: Poco probable
        description:
          en: The respondent would probably not take the action.
          fr: Le répondant ne prendrait probablement pas l'action.
          es: El encuestado probablemente no tomaría la acción.
      not_at_all_likely:
        title:
          en: Not at all likely
          fr: Pas du tout probable
          es: Nada probable
        description:
          en: The respondent would not take the action under any circumstances.
          fr: Le répondant ne prendrait pas l'action en aucune circonstance.
          es: El encuestado no tomaría la acción bajo ninguna circunstancia.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess likelihood.
          fr: Le répondant ne peut pas évaluer la probabilité.
          es: El encuestado no puede evaluar la probabilidad.
      not_applicable_no_channel:
        title:
          en: Not applicable — no channel exists
          fr: Non applicable — aucun canal n'existe
          es: No aplicable — no existe canal
        description:
          en: The hypothetical action presupposes a channel or mechanism that the respondent reports does not exist. Distinct from `not_at_all_likely`, which signals unwillingness given that a channel does exist.
          fr: L'action hypothétique présuppose un canal ou un mécanisme dont le répondant rapporte qu'il n'existe pas. Distinct de `not_at_all_likely`, qui signale une non-volonté alors qu'un canal existe.
          es: La acción hipotética presupone un canal o mecanismo que el encuestado reporta que no existe. Distinto de `not_at_all_likely`, que señala falta de disposición cuando sí existe un canal.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018"], "definition": {"en": "Four-level hypothetical-likelihood scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how likely the respondent would be to take an action (use a complaint channel, report a safeguarding concern). The scale is directional with no neutral midpoint, following GTS HVI and IASC / REACH 2018 convention. The `not_applicable_no_channel` code captures the case where the respondent would be willing in principle but no channel exists; this distinction matters for programmatic response design.", "es": "Escala de probabilidad hipot\u00e9tica de cuatro niveles utilizada en el Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas para los \u00edtems que preguntan qu\u00e9 tan probable ser\u00eda que el encuestado tomara una acci\u00f3n (utilizar un canal de queja, reportar una preocupaci\u00f3n de salvaguardia). La escala es direccional sin punto medio neutro, siguiendo la convenci\u00f3n GTS HVI e IASC / REACH 2018. El c\u00f3digo `not_applicable_no_channel` captura el caso en el que el encuestado estar\u00eda dispuesto en principio pero no existe un canal; esta distinci\u00f3n importa para el dise\u00f1o de la respuesta program\u00e1tica.", "fr": "\u00c9chelle de probabilit\u00e9 hypoth\u00e9tique \u00e0 quatre niveaux utilis\u00e9e dans le Profil de redevabilit\u00e9 envers les populations affect\u00e9es pour les items qui demandent \u00e0 quel point le r\u00e9pondant serait susceptible d''agir (utiliser un canal de plainte, signaler une pr\u00e9occupation de sauvegarde). L''\u00e9chelle est directionnelle sans milieu neutre, suivant la convention GTS HVI et IASC / REACH 2018. Le code `not_applicable_no_channel` capture le cas o\u00f9 le r\u00e9pondant serait dispos\u00e9 en principe mais aucun canal n''existe ; cette distinction est importante pour la conception de la r\u00e9ponse programmatique."}, "id": "aap-likelihood-4", "label": {"en": "AAP: Hypothetical likelihood (4 levels)", "es": "Rendici\u00f3n de cuentas: Probabilidad hipot\u00e9tica (4 niveles)", "fr": "Redevabilit\u00e9 : Probabilit\u00e9 hypoth\u00e9tique (4 niveaux)"}, "maturity": "draft", "standard": {"name": "Humanitarian Voice Index (Ground Truth Solutions)", "notes": "Likelihood scale convention used across GTS HVI and cross-referenced in IASC / REACH AAP menu 2018.", "uri": "https://humanitarianvoiceindex.org"}, "values": [{"code": "very_likely", "definition": {"en": "The respondent would take the action with high confidence.", "es": "El encuestado tomar\u00eda la acci\u00f3n con alta confianza.", "fr": "Le r\u00e9pondant prendrait l''action avec une grande confiance."}, "label": {"en": "Very likely", "es": "Muy probable", "fr": "Tr\u00e8s probable"}}, {"code": "somewhat_likely", "definition": {"en": "The respondent would probably take the action.", "es": "El encuestado probablemente tomar\u00eda la acci\u00f3n.", "fr": "Le r\u00e9pondant prendrait probablement l''action."}, "label": {"en": "Somewhat likely", "es": "Algo probable", "fr": "Assez probable"}}, {"code": "not_very_likely", "definition": {"en": "The respondent would probably not take the action.", "es": "El encuestado probablemente no tomar\u00eda la acci\u00f3n.", "fr": "Le r\u00e9pondant ne prendrait probablement pas l''action."}, "label": {"en": "Not very likely", "es": "Poco probable", "fr": "Peu probable"}}, {"code": "not_at_all_likely", "definition": {"en": "The respondent would not take the action under any circumstances.", "es": "El encuestado no tomar\u00eda la acci\u00f3n bajo ninguna circunstancia.", "fr": "Le r\u00e9pondant ne prendrait pas l''action en aucune circonstance."}, "label": {"en": "Not at all likely", "es": "Nada probable", "fr": "Pas du tout probable"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess likelihood.", "es": "El encuestado no puede evaluar la probabilidad.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer la probabilit\u00e9."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "not_applicable_no_channel", "definition": {"en": "The hypothetical action presupposes a channel or mechanism that the respondent reports does not exist. Distinct from `not_at_all_likely`, which signals unwillingness given that a channel does exist.", "es": "La acci\u00f3n hipot\u00e9tica presupone un canal o mecanismo que el encuestado reporta que no existe. Distinto de `not_at_all_likely`, que se\u00f1ala falta de disposici\u00f3n cuando s\u00ed existe un canal.", "fr": "L''action hypoth\u00e9tique pr\u00e9suppose un canal ou un m\u00e9canisme dont le r\u00e9pondant rapporte qu''il n''existe pas. Distinct de `not_at_all_likely`, qui signale une non-volont\u00e9 alors qu''un canal existe."}, "label": {"en": "Not applicable \u2014 no channel exists", "es": "No aplicable \u2014 no existe canal", "fr": "Non applicable \u2014 aucun canal n''existe"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
