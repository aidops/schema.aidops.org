  WarningSourceAuthority:
    title:
      en: Warning Source Authority
      fr: Autorité émettrice de l'alerte
      es: Autoridad emisora de la alerta
    description:
      en: The organization or authority that a household identifies as the issuer of an early warning for a hazard event. Covers national mandated institutions (national meteorological and hydrological services, national disaster management agencies), subnational government, United Nations and Red Cross Red Crescent actors, NGOs, religious and customary authorities, and private media. Includes a 'don't know' code because respondents frequently cannot identify the issuing body. Used to analyze the institutional reach of the early warning system and the public's attribution of authority.
      fr: L'organisation ou l'autorité qu'un ménage identifie comme l'émetteur d'une alerte précoce pour un événement dangereux. Couvre les institutions nationales mandatées (services météorologiques et hydrologiques nationaux, agences nationales de gestion des catastrophes), le gouvernement infranational, les acteurs des Nations Unies et du Mouvement de la Croix-Rouge et du Croissant-Rouge, les ONG, les autorités religieuses et coutumières ainsi que les médias privés. Inclut un code « ne sait pas » car les répondants ne peuvent souvent pas identifier l'organisme émetteur. Utilisé pour analyser la portée institutionnelle du système d'alerte précoce et l'attribution d'autorité par le public.
      es: La organización o autoridad que un hogar identifica como emisora de una alerta temprana para un evento de peligro. Abarca las instituciones nacionales con mandato (servicios meteorológicos e hidrológicos nacionales, agencias nacionales de gestión de desastres), el gobierno subnacional, actores de Naciones Unidas y del Movimiento de la Cruz Roja y la Media Luna Roja, ONG, autoridades religiosas y consuetudinarias, y medios privados. Incluye un código «no sabe» porque los respondientes con frecuencia no pueden identificar al organismo emisor. Se usa para analizar el alcance institucional del sistema de alerta temprana y la atribución de autoridad por parte del público.
    enum_uri: aidops:WarningSourceAuthority
    permissible_values:
      national_meteorological_agency:
        title:
          en: National meteorological or hydrological service
          fr: Service météorologique ou hydrologique national
          es: Servicio meteorológico o hidrológico nacional
        description:
          en: The country's official national meteorological or hydrological service (for example BMD, IMD, INAM, NMA).
          fr: Le service météorologique ou hydrologique national officiel du pays (par exemple BMD, IMD, INAM, NMA).
          es: El servicio meteorológico o hidrológico nacional oficial del país (por ejemplo BMD, IMD, INAM, NMA).
      national_disaster_agency:
        title:
          en: National disaster management agency
          fr: Agence nationale de gestion des catastrophes
          es: Agencia nacional de gestión de desastres
        description:
          en: The country's designated disaster management authority.
          fr: L'autorité nationale désignée pour la gestion des catastrophes.
          es: La autoridad nacional designada para la gestión de desastres.
      local_government:
        title:
          en: Local government
          fr: Gouvernement local
          es: Gobierno local
        description:
          en: Municipal, district, or provincial authority.
          fr: Autorité municipale, de district ou provinciale.
          es: Autoridad municipal, distrital o provincial.
      un_agency:
        title:
          en: UN agency
          fr: Agence des Nations Unies
          es: Agencia de las Naciones Unidas
        description:
          en: OCHA, WFP, UNICEF, WHO, IOM, or another United Nations entity.
          fr: OCHA, PAM, UNICEF, OMS, OIM ou une autre entité des Nations Unies.
          es: OCHA, PMA, UNICEF, OMS, OIM u otra entidad de las Naciones Unidas.
      red_cross_red_crescent:
        title:
          en: Red Cross or Red Crescent
          fr: Croix-Rouge ou Croissant-Rouge
          es: Cruz Roja o Media Luna Roja
        description:
          en: National Red Cross or Red Crescent Society, or the IFRC or ICRC.
          fr: Société nationale de la Croix-Rouge ou du Croissant-Rouge, ou la FICR ou le CICR.
          es: Sociedad Nacional de la Cruz Roja o de la Media Luna Roja, o la FICR o el CICR.
      ngo:
        title:
          en: Non-governmental organization
          fr: Organisation non gouvernementale
          es: Organización no gubernamental
        description:
          en: International or national non-governmental organization not part of the Red Cross movement.
          fr: Organisation non gouvernementale internationale ou nationale ne faisant pas partie du Mouvement de la Croix-Rouge.
          es: Organización no gubernamental internacional o nacional que no forma parte del Movimiento de la Cruz Roja.
      religious_community_body:
        title:
          en: Religious or community-based body
          fr: Organisme religieux ou communautaire
          es: Organismo religioso o comunitario
        description:
          en: Religious or community-based organization acting as an information relay.
          fr: Organisation religieuse ou communautaire agissant comme relais d'information.
          es: Organización religiosa o comunitaria que actúa como relevo de información.
      traditional_indigenous_authority:
        title:
          en: Traditional or indigenous authority
          fr: Autorité traditionnelle ou autochtone
          es: Autoridad tradicional o indígena
        description:
          en: Chief, elder, tribal council, or comparable customary authority.
          fr: Chef, ancien, conseil tribal ou autorité coutumière comparable.
          es: Jefe, anciano, consejo tribal u otra autoridad consuetudinaria comparable.
      private_media:
        title:
          en: Private media outlet
          fr: Média privé
          es: Medio privado
        description:
          en: Commercial radio, television, or online media without an official warning mandate.
          fr: Radio, télévision ou média en ligne commercial sans mandat officiel d'alerte.
          es: Radio, televisión o medio en línea comercial sin mandato oficial de alerta.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Source not listed above.
          fr: Source non répertoriée ci-dessus.
          es: Fuente no listada arriba.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent could not identify the issuing authority.
          fr: Le répondant n'a pas pu identifier l'autorité émettrice.
          es: El respondiente no pudo identificar a la autoridad emisora.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["crews-impact-based-forecasting-2021", "wmo-mhews-checklist-2018"], "definition": {"en": "The organization or authority that a household identifies as the issuer of an early warning for a hazard event. Covers national mandated institutions (national meteorological and hydrological services, national disaster management agencies), subnational government, United Nations and Red Cross Red Crescent actors, NGOs, religious and customary authorities, and private media. Includes a ''don''t know'' code because respondents frequently cannot identify the issuing body. Used to analyze the institutional reach of the early warning system and the public''s attribution of authority.", "es": "La organizaci\u00f3n o autoridad que un hogar identifica como emisora de una alerta temprana para un evento de peligro. Abarca las instituciones nacionales con mandato (servicios meteorol\u00f3gicos e hidrol\u00f3gicos nacionales, agencias nacionales de gesti\u00f3n de desastres), el gobierno subnacional, actores de Naciones Unidas y del Movimiento de la Cruz Roja y la Media Luna Roja, ONG, autoridades religiosas y consuetudinarias, y medios privados. Incluye un c\u00f3digo \u00abno sabe\u00bb porque los respondientes con frecuencia no pueden identificar al organismo emisor. Se usa para analizar el alcance institucional del sistema de alerta temprana y la atribuci\u00f3n de autoridad por parte del p\u00fablico.", "fr": "L''organisation ou l''autorit\u00e9 qu''un m\u00e9nage identifie comme l''\u00e9metteur d''une alerte pr\u00e9coce pour un \u00e9v\u00e9nement dangereux. Couvre les institutions nationales mandat\u00e9es (services m\u00e9t\u00e9orologiques et hydrologiques nationaux, agences nationales de gestion des catastrophes), le gouvernement infranational, les acteurs des Nations Unies et du Mouvement de la Croix-Rouge et du Croissant-Rouge, les ONG, les autorit\u00e9s religieuses et coutumi\u00e8res ainsi que les m\u00e9dias priv\u00e9s. Inclut un code \u00ab ne sait pas \u00bb car les r\u00e9pondants ne peuvent souvent pas identifier l''organisme \u00e9metteur. Utilis\u00e9 pour analyser la port\u00e9e institutionnelle du syst\u00e8me d''alerte pr\u00e9coce et l''attribution d''autorit\u00e9 par le public."}, "id": "warning-source-authority", "label": {"en": "Warning Source Authority", "es": "Autoridad emisora de la alerta", "fr": "Autorit\u00e9 \u00e9mettrice de l''alerte"}, "maturity": "draft", "standard": {"name": "WMO Multi-Hazard Early Warning Systems Checklist (pillar 1, institutional authority); CREWS Operational Framework on mandated issuing authority", "notes": "Categories align with the institutional mandate taxonomy used in WMO MHEWS and CREWS to classify authoritative versus unofficial warning sources.", "uri": "https://library.wmo.int/idurl/4/55893"}, "values": [{"code": "national_meteorological_agency", "definition": {"en": "The country''s official national meteorological or hydrological service (for example BMD, IMD, INAM, NMA).", "es": "El servicio meteorol\u00f3gico o hidrol\u00f3gico nacional oficial del pa\u00eds (por ejemplo BMD, IMD, INAM, NMA).", "fr": "Le service m\u00e9t\u00e9orologique ou hydrologique national officiel du pays (par exemple BMD, IMD, INAM, NMA)."}, "label": {"en": "National meteorological or hydrological service", "es": "Servicio meteorol\u00f3gico o hidrol\u00f3gico nacional", "fr": "Service m\u00e9t\u00e9orologique ou hydrologique national"}}, {"code": "national_disaster_agency", "definition": {"en": "The country''s designated disaster management authority.", "es": "La autoridad nacional designada para la gesti\u00f3n de desastres.", "fr": "L''autorit\u00e9 nationale d\u00e9sign\u00e9e pour la gestion des catastrophes."}, "label": {"en": "National disaster management agency", "es": "Agencia nacional de gesti\u00f3n de desastres", "fr": "Agence nationale de gestion des catastrophes"}}, {"code": "local_government", "definition": {"en": "Municipal, district, or provincial authority.", "es": "Autoridad municipal, distrital o provincial.", "fr": "Autorit\u00e9 municipale, de district ou provinciale."}, "label": {"en": "Local government", "es": "Gobierno local", "fr": "Gouvernement local"}}, {"code": "un_agency", "definition": {"en": "OCHA, WFP, UNICEF, WHO, IOM, or another United Nations entity.", "es": "OCHA, PMA, UNICEF, OMS, OIM u otra entidad de las Naciones Unidas.", "fr": "OCHA, PAM, UNICEF, OMS, OIM ou une autre entit\u00e9 des Nations Unies."}, "label": {"en": "UN agency", "es": "Agencia de las Naciones Unidas", "fr": "Agence des Nations Unies"}}, {"code": "red_cross_red_crescent", "definition": {"en": "National Red Cross or Red Crescent Society, or the IFRC or ICRC.", "es": "Sociedad Nacional de la Cruz Roja o de la Media Luna Roja, o la FICR o el CICR.", "fr": "Soci\u00e9t\u00e9 nationale de la Croix-Rouge ou du Croissant-Rouge, ou la FICR ou le CICR."}, "label": {"en": "Red Cross or Red Crescent", "es": "Cruz Roja o Media Luna Roja", "fr": "Croix-Rouge ou Croissant-Rouge"}}, {"code": "ngo", "definition": {"en": "International or national non-governmental organization not part of the Red Cross movement.", "es": "Organizaci\u00f3n no gubernamental internacional o nacional que no forma parte del Movimiento de la Cruz Roja.", "fr": "Organisation non gouvernementale internationale ou nationale ne faisant pas partie du Mouvement de la Croix-Rouge."}, "label": {"en": "Non-governmental organization", "es": "Organizaci\u00f3n no gubernamental", "fr": "Organisation non gouvernementale"}}, {"code": "religious_community_body", "definition": {"en": "Religious or community-based organization acting as an information relay.", "es": "Organizaci\u00f3n religiosa o comunitaria que act\u00faa como relevo de informaci\u00f3n.", "fr": "Organisation religieuse ou communautaire agissant comme relais d''information."}, "label": {"en": "Religious or community-based body", "es": "Organismo religioso o comunitario", "fr": "Organisme religieux ou communautaire"}}, {"code": "traditional_indigenous_authority", "definition": {"en": "Chief, elder, tribal council, or comparable customary authority.", "es": "Jefe, anciano, consejo tribal u otra autoridad consuetudinaria comparable.", "fr": "Chef, ancien, conseil tribal ou autorit\u00e9 coutumi\u00e8re comparable."}, "label": {"en": "Traditional or indigenous authority", "es": "Autoridad tradicional o ind\u00edgena", "fr": "Autorit\u00e9 traditionnelle ou autochtone"}}, {"code": "private_media", "definition": {"en": "Commercial radio, television, or online media without an official warning mandate.", "es": "Radio, televisi\u00f3n o medio en l\u00ednea comercial sin mandato oficial de alerta.", "fr": "Radio, t\u00e9l\u00e9vision ou m\u00e9dia en ligne commercial sans mandat officiel d''alerte."}, "label": {"en": "Private media outlet", "es": "Medio privado", "fr": "M\u00e9dia priv\u00e9"}}, {"code": "other", "definition": {"en": "Source not listed above.", "es": "Fuente no listada arriba.", "fr": "Source non r\u00e9pertori\u00e9e ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "Respondent could not identify the issuing authority.", "es": "El respondiente no pudo identificar a la autoridad emisora.", "fr": "Le r\u00e9pondant n''a pas pu identifier l''autorit\u00e9 \u00e9mettrice."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
