  WeaiParticipationCapacity4:
    title:
      en: WEAI Perceived Participation Capacity Scale
      fr: Échelle de capacité de participation perçue WEAI
      es: Escala de capacidad de participación percibida WEAI
    description:
      en: Four-point extent scale for perceived capacity to participate in a decision or access a resource, used across pro-WEAI Indicators B1 (productive decision capacity), B3 (credit access capacity), and C2 (group influence on community). Adequacy for B1 condition B and B3 condition B requires medium or high extent (codes 3 or 4).
      fr: Échelle en quatre points pour la capacité perçue à participer à une décision ou à accéder à une ressource, utilisée dans les indicateurs B1 (capacité de décision productive), B3 (capacité d'accès au crédit) et C2 (influence du groupe sur la communauté) du pro-WEAI. L'adéquation pour la condition B de B1 et la condition B de B3 nécessite une étendue moyenne ou élevée (codes 3 ou 4).
      es: Escala de cuatro puntos para la capacidad percibida de participar en una decisión o acceder a un recurso, utilizada en los indicadores B1 (capacidad de decisión productiva), B3 (capacidad de acceso al crédito) y C2 (influencia del grupo en la comunidad) del pro-WEAI. La adecuación para la condición B de B1 y la condición B de B3 requiere extensión media o alta (códigos 3 o 4).
