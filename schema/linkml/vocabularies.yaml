ada, aceite de palma rojo y otros alimentos ricos en vitamina A. Incluye las hortalizas de hoja verde oscuro en este marco de 8 grupos (a diferencia del marco MDD-W que las separa).", "fr": "Mangue m\u00fbre, papaye m\u00fbre, carotte, citrouille, patate douce \u00e0 chair orange, huile de palme rouge et autres aliments riches en vitamine A. Comprend les l\u00e9gumes-feuilles vert fonc\u00e9 dans ce cadre \u00e0 8 groupes (contrairement au cadre MDD-W qui les s\u00e9pare)."}, "label": {"en": "Vitamin-A-rich fruits and vegetables", "es": "Frutas y verduras ricas en vitamina A", "fr": "Fruits et l\u00e9gumes riches en vitamine A"}}, {"code": "other_veg_fruit", "definition": {"en": "Tomato, onion, eggplant, spinach (not vitamin-A-rich leafy vegetables), banana, apple, citrus, and other fruits and vegetables not captured in the vitamin-A-rich group.", "es": "Tomate, cebolla, berenjena, espinacas (no hortalizas de hoja rica en vitamina A), banano, manzana, c\u00edtricos y otras frutas y verduras no cubiertas por el grupo rico en vitamina A.", "fr": "Tomate, oignon, aubergine, \u00e9pinards (pas les l\u00e9gumes-feuilles riches en vitamine A), banane, pomme, agrumes et autres fruits et l\u00e9gumes non couverts par le groupe riche en vitamine A."}, "label": {"en": "Other fruits and vegetables", "es": "Otras frutas y verduras", "fr": "Autres fruits et l\u00e9gumes"}}]}'
