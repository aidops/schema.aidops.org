      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-reach-aap-menu-2018", "ocha-aap-msna-findings-2022"], "definition": {"en": "Four-level perceived sufficiency scale for the quantity of aid received. Source: IASC / REACH Menu of AAP Questions 2018 and OCHA oPt MSNA quantity-satisfaction indicator. Boundary note: this measures the respondent''s perception of sufficiency; the objective measure (rations meeting Sphere calorie minima, shelter kits meeting Sphere completeness, WASH quantities meeting JMP) belongs to sector-specific profiles (FoodSecurityProfile, ShelterAdequacyProfile, WASHAssessmentProfile).", "es": "Escala de suficiencia percibida de cuatro niveles para la cantidad de ayuda recibida. Fuente: Men\u00fa de Preguntas AAP IASC / REACH 2018 e indicador de OCHA oPt MSNA de satisfacci\u00f3n con cantidad. Nota de frontera: esto mide la percepci\u00f3n de suficiencia del encuestado; la medida objetiva (raciones que cumplen con los m\u00ednimos cal\u00f3ricos de Esfera, kits de refugio que cumplen con la completitud de Esfera, cantidades WASH que cumplen con JMP) pertenece a los perfiles sectoriales espec\u00edficos (Perfil de Seguridad Alimentaria, Perfil de Adecuaci\u00f3n del Refugio, Perfil de Evaluaci\u00f3n WASH).", "fr": "\u00c9chelle de suffisance per\u00e7ue \u00e0 quatre niveaux pour la quantit\u00e9 d''aide re\u00e7ue. Source : Menu de questions AAP IASC / REACH 2018 et indicateur OCHA oPt MSNA de satisfaction quantitative. Note de fronti\u00e8re : ceci mesure la perception de suffisance du r\u00e9pondant ; la mesure objective (rations atteignant les minima caloriques Sph\u00e8re, kits abri atteignant la compl\u00e9tude Sph\u00e8re, quantit\u00e9s EHA atteignant les JMP) appartient aux profils sectoriels sp\u00e9cifiques (Profil de s\u00e9curit\u00e9 alimentaire, Profil d''ad\u00e9quation de l''abri, Profil d''\u00e9valuation EHA)."}, "id": "aap-sufficient-4", "label": {"en": "AAP: Aid sufficiency (4 levels)", "es": "Rendici\u00f