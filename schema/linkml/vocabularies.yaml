    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018", "ifrc-cea-toolkit-2021"], "definition": {"en": "Multi-select typology of communication channels through which a household prefers to receive information about humanitarian assistance. Synthesised from the IASC / REACH Menu of AAP Questions 2018 communications preference section and the IFRC Community Engagement and Accountability Toolkit channel inventory. Used to measure information-receipt preferences and to design communications strategies aligned to how affected people actually wish to be reached.", "es": "Tipolog\u00eda de selecci\u00f3n m\u00faltiple de canales de comunicaci\u00f3n por los cuales un hogar prefiere recibir informaci\u00f3n sobre la asistencia humanitaria. Sintetizada a partir de la secci\u00f3n de preferencias de comunicaci\u00f3n del Men\u00fa de Preguntas AAP IASC / REACH 2018 y del inventario de canales del Kit de Herramientas de Participaci\u00f3n Comunitaria y Rendici\u00f3n de Cuentas de la FICR. Utilizada para medir las preferencias de recepci\u00f3n de informaci\u00f3n y para dise\u00f1ar estrategias de comunicaci\u00f3n alineadas con la forma en que las personas afectadas desean realmente ser alcanzadas.", "fr": "Typologie \u00e0 choix multiples des canaux de communication par lesquels un m\u00e9nage pr\u00e9f\u00e8re recevoir des informations sur l''aide humanitaire. Synth\u00e9tis\u00e9e \u00e0 partir de la section des pr\u00e9f\u00e9rences de communication du Menu de questions AAP IASC / REACH 2018 et de l''inventaire des canaux du Toolkit d''engagement communautaire et de redevabilit\u00e9 de la FICR. Utilis\u00e9e pour mesurer les pr\u00e9f\u00e9rences de r\u00e9ception d''information et pour concevoir des strat\u00e9gies de communication align\u00e9es sur la fa\u00e7on dont les personnes affect\u00e9es souhaitent r\u00e9ellement \u00eatre atteintes."}, "id": "aap-info-channel", "label": {"en": "AAP: Information channel", "es": "Rendici\u00f3n de cuentas: Canal de informaci\u00f3n", "fr": "Redevabilit\u00e9 : Canal d''information"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Channel typology is a merge of the IASC / REACH menu communications section with the IFRC CEA Toolkit channel inventory.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_questions_for_needs_assessments_june_2018.pdf"}, "values": [{"code": "in_person_community_meeting", "definition": {"en": "Collective face-to-face meeting at community level where aid providers share information with residents.", "es": "Reuni\u00f3n colectiva cara a cara a nivel comunitario donde los actores humanitarios comparten informaci\u00f3n con los residentes.", "fr": "R\u00e9union collective en face-\u00e0-face au niveau communautaire o\u00f9 les intervenants partagent l''information avec les r\u00e9sidents."}, "label": {"en": "In-person community meeting", "es": "Reuni\u00f3n comunitaria presencial", "fr": "R\u00e9union communautaire en personne"}}, {"code": "in_person_household_visit", "definition": {"en": "A staff member or volunteer visits the household directly to share information.", "es": "Un miembro del personal o voluntario visita directamente al hogar para compartir informaci\u00f3n.", "fr": "Un membre du personnel ou un volontaire rend visite directement au m\u00e9nage pour partager des informations."}, "label": {"en": "In-person household visit", "es": "Visita domiciliaria presencial", "fr": "Visite \u00e0 domicile en personne"}}, {"code": "phone_call", "definition": {"en": "Voice phone call.", "es": "Llamada telef\u00f3nica de voz.", "fr": "Appel t\u00e9l\u00e9phonique vocal."}, "label": {"en": "Phone call", "es": "Llamada telef\u00f3nica", "fr": "Appel t\u00e9l\u00e9phonique"}}, {"code": "sms_text", "definition": {"en": "Short message delivered to a mobile phone.", "es": "Mensaje corto entregado a un tel\u00e9fono m\u00f3vil.", "fr": "Message court d\u00e9livr\u00e9 \u00e0 un t\u00e9l\u00e9phone mobile."}, "label": {"en": "SMS / text message", "es": "SMS / mensaje de texto", "fr": "SMS / texto"}}, {"code": "whatsapp_or_messenger", "definition": {"en": "Instant-messaging application such as WhatsApp, Facebook Messenger, Telegram, Viber, or Signal.", "es": "Aplicaci\u00f3n de mensajer\u00eda instant\u00e1nea como WhatsApp, Facebook Messenger, Telegram, Viber o Signal.", "fr": "Application de messagerie instantan\u00e9e telle que WhatsApp, Facebook Messenger, Telegram, Viber ou Signal."}, "label": {"en": "WhatsApp or Messenger", "es": "WhatsApp o Messenger", "fr": "WhatsApp ou Messenger"}}, {"code": "radio", "definition": {"en": "Broadcast or community radio.", "es": "Radio difundida o comunitaria.", "fr": "Radio diffus\u00e9e ou communautaire."}, "label": {"en": "Radio", "es": "Radio", "fr": "Radio"}}, {"code": "tv", "definition": {"en": "Broadcast television.", "es": "Televisi\u00f3n difundida.", "fr": "T\u00e9l\u00e9vision diffus\u00e9e."}, "label": {"en": "Television", "es": "Televisi\u00f3n", "fr": "T\u00e9l\u00e9vision"}}, {"code": "poster_or_flyer", "definition": {"en": "Printed informational material posted in public spaces or distributed to households.", "es": "Material informativo impreso colocado en espacios p\u00fablicos o distribuido a los hogares.", "fr": "Mat\u00e9riel informatif imprim\u00e9 affich\u00e9 dans les espaces publics ou distribu\u00e9 aux m\u00e9nages."}, "label": {"en": "Poster or flyer", "es": "Cartel o volante", "fr": "Affiche ou d\u00e9pliant"}}, {"code": "social_media", "definition": {"en": "Public or semi-public social-media platforms such as Facebook, Twitter/X, Instagram, TikTok.", "es": "Plataformas de redes sociales p\u00fablicas o semip\u00fablicas como Facebook, Twitter/X, Instagram, TikTok.", "fr": "Plateformes de m\u00e9dias sociaux publiques ou semi-publiques telles que Facebook, Twitter/X, Instagram, TikTok."}, "label": {"en": "Social media", "es": "Redes sociales", "fr": "M\u00e9dias sociaux"}}, {"code": "community_leader_or_elder", "definition": {"en": "Information relayed through a traditional, customary, or civic community leader.", "es": "Informaci\u00f3n transmitida a trav\u00e9s de un l\u00edder comunitario tradicional, consuetudinario o c\u00edvico.", "fr": "Information relay\u00e9e par un leader communautaire traditionnel, coutumier ou civique."}, "label": {"en": "Community leader or elder", "es": "L\u00edder o anciano comunitario", "fr": "Leader ou a\u00een\u00e9 communautaire"}}, {"code": "religious_leader", "definition": {"en": "Information relayed through a religious leader or religious institution.", "es": "Informaci\u00f3n transmitida a trav\u00e9s de un l\u00edder religioso o una instituci\u00f3n religiosa.", "fr": "Information relay\u00e9e par un leader religieux ou une institution religieuse."}, "label": {"en": "Religious leader", "es": "L\u00edder religioso", "fr": "Leader religieux"}}, {"code": "aid_provider_help_desk", "definition": {"en": "Information desk staffed at a distribution site or at an agency office.", "es": "Mesa de informaci\u00f3n atendida por personal en un sitio de distribuci\u00f3n o en una oficina de la agencia.", "fr": "Bureau d''information tenu par du personnel sur un site de distribution ou dans un bureau d''agence."}, "label": {"en": "Aid provider help desk", "es": "Mesa de ayuda del actor humanitario", "fr": "Guichet d''aide de l''intervenant"}}, {"code": "other", "definition": {"en": "Information channel not covered by the listed codes.", "es": "Canal de informaci\u00f3n no cubierto por los c\u00f3digos listados.", "fr": "Canal d''information non couvert par les codes list\u00e9s."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
