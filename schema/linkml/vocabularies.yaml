  CommunityCopingStrategy:
    title:
      en: Community Coping Strategy
      fr: Stratégie d'adaptation au niveau de la communauté
      es: Estrategia de afrontamiento a nivel comunitario
    description:
      en: Community-reported coping strategies in use by households in a defined area at the time of a community-level assessment. Structurally adapted from the WFP reduced Coping Strategies Index (rCSI), the WFP Livelihoods Coping Strategies Index (LCSI), and ACAPS severity markers; reframed as community-level perception (informant-reported) rather than a household-level measurement. The overlap with household rCSI/LCSI items is deliberate and enables signal triangulation with household-level food-security profiles.
      fr: Stratégies d'adaptation rapportées au niveau de la communauté et utilisées par les ménages dans une zone définie au moment d'une évaluation communautaire. Structurellement adaptée de l'indice réduit des stratégies d'adaptation (rCSI) du PAM, de l'indice des stratégies d'adaptation aux moyens d'existence (LCSI) du PAM et des marqueurs de sévérité d'ACAPS ; reformulée comme perception au niveau communautaire (rapportée par les informateurs) plutôt que comme mesure au niveau des ménages. Le chevauchement avec les items rCSI/LCSI des ménages est délibéré et permet la triangulation des signaux avec les profils de sécurité alimentaire au niveau du ménage.
      es: Estrategias de afrontamiento reportadas a nivel comunitario, en uso por los hogares de un área definida al momento de una evaluación comunitaria. Estructuralmente adaptada del Índice Reducido de Estrategias de Afrontamiento (rCSI) del PMA, del Índice de Estrategias de Afrontamiento de Medios de Vida (LCSI) del PMA y de marcadores de severidad de ACAPS; reformulada como percepción a nivel comunitario (reportada por informantes) y no como medición a nivel del hogar. La superposición con ítems rCSI/LCSI de hogares es deliberada y permite la triangulación de señales con perfiles de seguridad alimentaria a nivel del hogar.
    enum_uri: aidops:CommunityCopingStrategy
    permissible_values:
      reduce_meals:
        title:
          en: Households reducing the number or size of meals
          fr: Ménages réduisant le nombre ou la taille des repas
          es: Hogares que reducen el número o tamaño de las comidas
        description:
          en: Households are skipping meals or reducing portions.
          fr: Les ménages sautent des repas ou réduisent les portions.
          es: Los hogares saltan comidas o reducen las porciones.
      borrow_food_or_cash:
        title:
          en: Borrowing food or cash
          fr: Emprunt de nourriture ou d'argent
          es: Préstamo de alimentos o dinero
        description:
          en: Borrowing from neighbours, relatives, or lenders.
          fr: Emprunt auprès de voisins, de proches ou de prêteurs.
          es: Préstamos de vecinos, familiares o prestamistas.
      sell_productive_assets:
        title:
          en: Selling productive assets
          fr: Vente d'actifs productifs
          es: Venta de activos productivos
        description:
          en: Selling livestock, tools, or other income-generating assets.
          fr: Vente de bétail, d'outils ou d'autres actifs générateurs de revenus.
          es: Venta de ganado, herramientas u otros activos generadores de ingresos.
      migrate_for_work:
        title:
          en: Migrating for work
          fr: Migration pour le travail
          es: Migración por trabajo
        description:
          en: Individuals or families leaving the community to seek work elsewhere.
          fr: Individus ou familles quittant la communauté pour chercher du travail ailleurs.
          es: Personas o familias que salen de la comunidad para buscar trabajo en otro lugar.
      remove_children_from_school:
        title:
          en: Removing children from school
          fr: Retrait des enfants de l'école
          es: Retiro de los niños de la escuela
        description:
          en: Withdrawing children from school to save costs or to work.
          fr: Retrait des enfants de l'école pour économiser ou pour qu'ils travaillent.
          es: Retiro de los niños de la escuela para ahorrar costos o para que trabajen.
      child_labour:
        title:
          en: Child labour
          fr: Travail des enfants
          es: Trabajo infantil
        description:
          en: Children working to contribute to household income.
          fr: Enfants travaillant pour contribuer au revenu du ménage.
          es: Niños que trabajan para contribuir al ingreso del hogar.
      early_marriage:
        title:
          en: Early marriage
          fr: Mariage précoce
          es: Matrimonio precoz
        description:
          en: Marriage of girls or boys under age 18 as a coping response.
          fr: Mariage de filles ou de garçons de moins de 18 ans comme réponse d'adaptation.
          es: Matrimonio de niñas o niños menores de 18 años como respuesta de afrontamiento.
      begging:
        title:
          en: Begging
          fr: Mendicité
          es: Mendicidad
        description:
          en: Asking for food, cash, or goods in public.
          fr: Demander de la nourriture, de l'argent ou des biens en public.
          es: Pedir alimentos, dinero o bienes en público.
      risky_livelihoods:
        title:
          en: Engaging in risky or illegal livelihoods
          fr: Recours à des moyens d'existence risqués ou illégaux
          es: Realización de medios de vida riesgosos o ilegales
        description:
          en: Activities that put people at physical, legal, or social risk.
          fr: Activités exposant les personnes à un risque physique, juridique ou social.
          es: Actividades que ponen a las personas en riesgo físico, legal o social.
      reduce_health_spending:
        title:
          en: Reducing spending on health care
          fr: Réduction des dépenses de santé
          es: Reducción del gasto en atención de salud
        description:
          en: Foregoing medical visits or medicines.
          fr: Renoncement aux visites médicales ou aux médicaments.
          es: Omisión de visitas médicas o medicamentos.
      share_housing:
        title:
          en: Doubling up or sharing housing
          fr: Cohabitation ou partage du logement
          es: Hacinamiento o compartir vivienda
        description:
          en: Multiple households sharing a single dwelling.
          fr: Plusieurs ménages partagent un seul logement.
          es: Varios hogares comparten una sola vivienda.
      receive_remittances:
        title:
          en: Depending on remittances
          fr: Dépendance vis-à-vis des envois de fonds
          es: Dependencia de remesas
        description:
          en: Relying on money sent by relatives outside the community.
          fr: Dépendance à l'égard de l'argent envoyé par des proches hors de la communauté.
          es: Dependencia del dinero enviado por familiares fuera de la comunidad.
      community_solidarity:
        title:
          en: Community solidarity / mutual aid
          fr: Solidarité communautaire / entraide
          es: Solidaridad comunitaria / ayuda mutua
        description:
          en: Community or diaspora organising collective support.
          fr: Communauté ou diaspora organisant un soutien collectif.
          es: Comunidad o diáspora que organiza apoyo colectivo.
      none_observed:
        title:
          en: None of the above
          fr: Aucune des stratégies ci-dessus
          es: Ninguna de las anteriores
        description:
          en: No coping strategies observed or reported.
          fr: Aucune stratégie d'adaptation observée ou rapportée.
          es: No se observan ni reportan estrategias de afrontamiento.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondents do not know which coping strategies are in use. A valid response, not to be re-coded as 'none'.
          fr: Les répondants ne savent pas quelles stratégies d'adaptation sont utilisées. Réponse valide qui ne doit pas être recodée comme « aucune ».
          es: Los encuestados no saben qué estrategias de afrontamiento están en uso. Respuesta válida que no debe recodificarse como «ninguna».
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-assessment-2014", "ifrc-vca-2020"], "definition": {"en": "Community-reported coping strategies in use by households in a defined area at the time of a community-level assessment. Structurally adapted from the WFP reduced Coping Strategies Index (rCSI), the WFP Livelihoods Coping Strategies Index (LCSI), and ACAPS severity markers; reframed as community-level perception (informant-reported) rather than a household-level measurement. The overlap with household rCSI/LCSI items is deliberate and enables signal triangulation with household-level food-security profiles.", "es": "Estrategias de afrontamiento reportadas a nivel comunitario, en uso por los hogares de un \u00e1rea definida al momento de una evaluaci\u00f3n comunitaria. Estructuralmente adaptada del \u00cdndice Reducido de Estrategias de Afrontamiento (rCSI) del PMA, del \u00cdndice de Estrategias de Afrontamiento de Medios de Vida (LCSI) del PMA y de marcadores de severidad de ACAPS; reformulada como percepci\u00f3n a nivel comunitario (reportada por informantes) y no como medici\u00f3n a nivel del hogar. La superposici\u00f3n con \u00edtems rCSI/LCSI de hogares es deliberada y permite la triangulaci\u00f3n de se\u00f1ales con perfiles de seguridad alimentaria a nivel del hogar.", "fr": "Strat\u00e9gies d''adaptation rapport\u00e9es au niveau de la communaut\u00e9 et utilis\u00e9es par les m\u00e9nages dans une zone d\u00e9finie au moment d''une \u00e9valuation communautaire. Structurellement adapt\u00e9e de l''indice r\u00e9duit des strat\u00e9gies d''adaptation (rCSI) du PAM, de l''indice des strat\u00e9gies d''adaptation aux moyens d''existence (LCSI) du PAM et des marqueurs de s\u00e9v\u00e9rit\u00e9 d''ACAPS ; reformul\u00e9e comme perception au niveau communautaire (rapport\u00e9e par les informateurs) plut\u00f4t que comme mesure au niveau des m\u00e9nages. Le chevauchement avec les items rCSI/LCSI des m\u00e9nages est d\u00e9lib\