  GbvPartnerType:
    title:
      en: IPV referent partner type
      fr: Type de partenaire référent pour la VPI
      es: Tipo de compañero referente para la VPI
    description:
      en: Relationship type of the referent intimate partner for IPV questions in the DHS Domestic Violence module. The referent partner is the current husband/partner for currently married or cohabiting women, and the most recent husband/partner for women who are divorced, separated, or widowed. DHS-8 extends this to never-married women who have had an intimate partner.
      fr: Type de relation du partenaire intime référent pour les questions de VPI du module DHS. Le partenaire référent est le mari ou partenaire actuel pour les femmes mariées ou en union libre, et le plus récent pour les femmes divorcées, séparées ou veuves. Le DHS-8 étend cela aux femmes jamais mariées ayant eu un partenaire.
      es: Tipo de relación del compañero íntimo referente para las preguntas de VPI del módulo DHS. El compañero referente es el marido o compañero actual para mujeres casadas o en unión libre, y el más reciente para divorciadas, separadas o viudas. El DHS-8 extiende esto a mujeres nunca casadas que han tenido un compañero íntimo.
    enum_uri: aidops:GbvPartnerType
    permissible_values:
      current_married:
        title:
          en: Current husband (married)
          fr: Mari actuel (marié)
          es: Marido actual (casado)
        description:
          en: Legally married, currently living together or separated temporarily.
          fr: Légalement marié, vivant actuellement ensemble ou séparé temporairement.
          es: Legalmente casado, viviendo actualmente juntos o separados temporalmente.
      current_cohabiting:
        title:
          en: Current cohabiting partner
          fr: Partenaire cohabitant actuel
          es: Compañero cohabitante actual
        description:
          en: Living together as partners without legal marriage.
          fr: Vivant ensemble en tant que partenaires sans mariage légal.
          es: Viviendo juntos como pareja sin matrimonio legal.
      former_partner:
        title:
          en: Former husband or partner
          fr: Ex-mari ou ex-partenaire
          es: Ex marido o ex compañero
        description:
          en: Divorced, separated, or widowed from most recent partner.
          fr: Divorcé, séparé ou veuf du partenaire le plus récent.
          es: Divorciado, separado o viudo del compañero más reciente.
      current_boyfriend:
        title:
          en: Current boyfriend (not cohabiting)
          fr: Petit ami actuel (sans cohabitation)
          es: Novio actual (sin cohabitar)
        description:
          en: Intimate partner not cohabiting; introduced in DHS-8 for never-married women. DHS-8 only.
          fr: Partenaire intime sans cohabitation; introduit dans le DHS-8 pour les femmes jamais mariées. DHS-8 uniquement.
          es: Compañero íntimo sin cohabitar; introducido en DHS-8 para mujeres nunca casadas. Solo DHS-8.
      former_boyfriend:
        title:
          en: Former boyfriend
          fr: Ex-petit ami
          es: Ex novio
        description:
          en: Former non-cohabiting intimate partner. DHS-8 only.
          fr: Ex-partenaire intime sans cohabitation. DHS-8 uniquement.
          es: Ex compañero íntimo sin cohabitar. Solo DHS-8.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-domestic-violence-module-2022"], "definition": {"en": "Relationship type of the referent intimate partner for IPV questions in the DHS Domestic Violence module. The referent partner is the current husband/partner for currently married or cohabiting women, and the most recent husband/partner for women who are divorced, separated, or widowed. DHS-8 extends this to never-married women who have had an intimate partner.", "es": "Tipo de relaci\u00f3n del compa\u00f1ero \u00edntimo referente para las preguntas de VPI del m\u00f3dulo DHS. El compa\u00f1ero referente es el marido o compa\u00f1ero actual para mujeres casadas o en uni\u00f3n libre, y el m\u00e1s reciente para divorciadas, separadas o viudas. El DHS-8 extiende esto a mujeres nunca casadas que han tenido un compa\u00f1ero \u00edntimo.", "fr": "Type de relation du partenaire intime r\u00e9f\u00e9rent pour les questions de VPI du module DHS. Le partenaire r\u00e9f\u00e9rent est le mari ou partenaire actuel pour les femmes mari\u00e9es ou en union libre, et le plus r\u00e9cent pour les femmes divorc\u00e9es, s\u00e9par\u00e9es ou veuves. Le DHS-8 \u00e9tend cela aux femmes jamais mari\u00e9es ayant eu un partenaire."}, "id": "gbv-partner-type", "label": {"en": "IPV referent partner type", "es": "Tipo de compa\u00f1ero referente para la VPI", "fr": "Type de partenaire r\u00e9f\u00e9rent pour la VPI"}, "maturity": "draft", "standard": {"name": "dhs-domestic-violence-module-2022", "notes": "Partner-type establishment at module opening (DHS-8 eligibility expansion)", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}, "values": [{"code": "current_married", "definition": {"en": "Legally married, currently living together or separated temporarily.", "es": "Legalmente casado, viviendo actualmente juntos o separados temporalmente.", "fr": "L\u00e9galement mari\u00e9, vivant actuellement ensemble ou s\u00e9par\u00e9 temporairement."}, "label": {"en": "Current husband (married)", "es": "Marido actual (casado)", "fr": "Mari actuel (mari\u00e9)"}}, {"code": "current_cohabiting", "definition": {"en": "Living together as partners without legal marriage.", "es": "Viviendo juntos como pareja sin matrimonio legal.", "fr": "Vivant ensemble en tant que partenaires sans mariage l\u00e9gal."}, "label": {"en": "Current cohabiting partner", "es": "Compa\u00f1ero cohabitante actual", "fr": "Partenaire cohabitant actuel"}}, {"code": "former_partner", "definition": {"en": "Divorced, separated, or widowed from most recent partner.", "es": "Divorciado, separado o viudo del compa\u00f1ero m\u00e1s reciente.", "fr": "Divorc\u00e9, s\u00e9par\u00e9 ou veuf du partenaire le plus r\u00e9cent."}, "label": {"en": "Former husband or partner", "es": "Ex marido o ex compa\u00f1ero", "fr": "Ex-mari ou ex-partenaire"}}, {"code": "current_boyfriend", "definition": {"en": "Intimate partner not cohabiting; introduced in DHS-8 for never-married women. DHS-8 only.", "es": "Compa\u00f1ero \u00edntimo sin cohabitar; introducido en DHS-8 para mujeres nunca casadas. Solo DHS-8.", "fr": "Partenaire intime sans cohabitation; introduit dans le DHS-8 pour les femmes jamais mari\u00e9es. DHS-8 uniquement."}, "label": {"en": "Current boyfriend (not cohabiting)", "es": "Novio actual (sin cohabitar)", "fr": "Petit ami actuel (sans cohabitation)"}}, {"code": "former_boyfriend", "definition": {"en": "Former non-cohabiting intimate partner. DHS-8 only.", "es": "Ex compa\u00f1ero \u00edntimo sin cohabitar. Solo DHS-8.", "fr": "Ex-partenaire intime sans cohabitation. DHS-8 uniquement."}, "label": {"en": "Former boyfriend", "es": "Ex novio", "fr": "Ex-petit ami"}}]}'
      bibliography_refs: dhs-domestic-violence-module-2022
  GbvPerpetratorType:
    title:
      en: GBV perpetrator type
      fr: Type d'auteur de VBG
      es: Tipo de perpetrador de VBG
    description:
      en: Category of perpetrator for violence during pregnancy (DHS DV21), non-partner sexual violence (DHS DV23), and other perpetrator-identity questions. Multiple codes may be selected where the instrument allows. Drawn from DHS DV21 and DV23 response options.
      fr: Catégorie d'auteur pour les violences pendant la grossesse (DHS DV21), les violences sexuelles non conjugales (DHS DV23) et autres questions d'identité de l'auteur. Plusieurs codes peuvent être sélectionnés si l'instrument le permet.
      es: Categoría de perpetrador para violencia durante el embarazo (DHS DV21), violencia sexual no conyugal (DHS DV23) y otras preguntas de identidad del perpetrador. Se pueden seleccionar varios códigos cuando el instrumento lo permite.
