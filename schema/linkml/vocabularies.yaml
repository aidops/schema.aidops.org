  RsdStatus:
    title:
      en: Refugee Status Determination Status
      fr: Statut de la détermination du statut de réfugié
      es: Estado de la determinación del estatuto de refugiado
    description:
      en: The current state of the refugee status determination (RSD) claim for a household whose members are of concern under the 1951 Refugee Convention or UNHCR mandate. Applies only when displacement_status is refugee or asylum_seeker; skip otherwise.
      fr: L'état actuel de la demande de détermination du statut de réfugié (DSR) pour un ménage dont les membres relèvent de la Convention de 1951 relative au statut des réfugiés ou du mandat du HCR. S'applique uniquement lorsque displacement_status est refugee ou asylum_seeker ; ignorer autrement.
      es: El estado actual de la solicitud de determinación del estatuto de refugiado (DER) para un hogar cuyos miembros son de preocupación bajo la Convención de Refugiados de 1951 o el mandato del ACNUR. Se aplica solo cuando displacement_status es refugee o asylum_seeker; omitir en caso contrario.
    enum_uri: aidops:RsdStatus
    permissible_values:
      recognized:
        title:
          en: Recognized refugee
          fr: Réfugié reconnu
          es: Refugiado reconocido
        description:
          en: Refugee status formally recognized by UNHCR under its mandate or by the national asylum authority.
          fr: Statut de réfugié formellement reconnu par le HCR dans le cadre de son mandat ou par l'autorité nationale d'asile.
          es: Estatuto de refugiado formalmente reconocido por el ACNUR bajo su mandato o por la autoridad de asilo nacional.
      pending:
        title:
          en: Claim pending
          fr: Demande en attente
          es: Solicitud pendiente
        description:
          en: Application for refugee status or asylum has been lodged and is awaiting determination.
          fr: La demande de statut de réfugié ou d'asile a été déposée et attend d'être examinée.
          es: La solicitud de estatuto de refugiado o asilo ha sido presentada y está pendiente de determinación.
      rejected:
        title:
          en: Claim rejected
          fr: Demande rejetée
          es: Solicitud rechazada
        description:
          en: Application was assessed and rejected; appeal or further proceedings may still be open.
          fr: La demande a été évaluée et rejetée ; un appel ou d'autres procédures peuvent encore être en cours.
          es: La solicitud fue evaluada y rechazada; pueden aún estar abiertas apelaciones u otros procedimientos.
      not_applied:
        title:
          en: Has not applied
          fr: N'a pas demandé
          es: No ha solicitado
        description:
          en: Person has not submitted a refugee status determination claim.
          fr: La personne n'a pas soumis de demande de détermination du statut de réfugié.
          es: La persona no ha presentado una solicitud de determinación del estatuto de refugiado.
      not_applicable:
        title:
          en: Not applicable
          fr: Sans objet
          es: No aplica
        description:
          en: RSD process does not apply to this household, for example when displacement_status is idp or resident.
          fr: Le processus de DSR ne s'applique pas à ce ménage, par exemple lorsque displacement_status est idp ou resident.
          es: El proceso de DER no aplica para este hogar, por ejemplo cuando displacement_status es idp o resident.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["unhcr-registration-guidance-2022"], "definition": {"en": "The current state of the refugee status determination (RSD) claim for a household whose members are of concern under the 1951 Refugee Convention or UNHCR mandate. Applies only when displacement_status is refugee or asylum_seeker; skip otherwise.", "es": "El estado actual de la solicitud de determinaci\u00f3n del estatuto de refugiado (DER) para un hogar cuyos miembros son de preocupaci\u00f3n bajo la Convenci\u00f3n de Refugiados de 1951 o el mandato del ACNUR. Se aplica solo cuando displacement_status es refugee o asylum_seeker; omitir en caso contrario.", "fr": "L''\u00e9tat actuel de la demande de d\u00e9termination du statut de r\u00e9fugi\u00e9 (DSR) pour un m\u00e9nage dont les membres rel\u00e8vent de la Convention de 1951 relative au statut des r\u00e9fugi\u00e9s ou du mandat du HCR. S''applique uniquement lorsque displacement_status est refugee ou asylum_seeker ; ignorer autrement."}, "id": "rsd-status", "label": {"en": "Refugee Status Determination Status", "es": "Estado de la determinaci\u00f3n del estatuto de refugiado", "fr": "Statut de la d\u00e9termination du statut de r\u00e9fugi\u00e9"}, "maturity": "draft", "standard": {"name": "UNHCR Guidance on Registration and Identity Management (2022); 1951 Refugee Convention", "uri": "https://www.unhcr.org/registration-guidance/"}, "values": [{"code": "recognized", "definition": {"en": "Refugee status formally recognized by UNHCR under its mandate or by the national asylum authority.", "es": "Estatuto de refugiado formalmente reconocido por el ACNUR bajo su mandato o por la autoridad de asilo nacional.", "fr": "Statut de r\u00e9fugi\u00e9 formellement reconnu par le HCR dans le cadre de son mandat ou par l''autorit\u00e9 nationale d''asile."}, "label": {"en": "Recognized refugee", "es": "Refugiado reconocido", "fr": "R\u00e9fugi\u00e9 reconnu"}}, {"code": "pending", "definition": {"en": "Application for refugee status or asylum has been lodged and is awaiting determination.", "es": "La solicitud de estatuto de refugiado o asilo ha sido presentada y est\u00e1 pendiente de determinaci\u00f3n.", "fr": "La demande de statut de r\u00e9fugi\u00e9 ou d''asile a \u00e9t\u00e9 d\u00e9pos\u00e9e et attend d''\u00eatre examin\u00e9e."}, "label": {"en": "Claim pending", "es": "Solicitud pendiente", "fr": "Demande en attente"}}, {"code": "rejected", "definition": {"en": "Application was assessed and rejected; appeal or further proceedings may still be open.", "es": "La solicitud fue evaluada y rechazada; pueden a\u00fan estar abiertas apelaciones u otros procedimientos.", "fr": "La demande a \u00e9t\u00e9 \u00e9valu\u00e9e et rejet\u00e9e ; un appel ou d''autres proc\u00e9dures peuvent encore \u00eatre en cours."}, "label": {"en": "Claim rejected", "es": "Solicitud rechazada", "fr": "Demande rejet\u00e9e"}}, {"code": "not_applied", "definition": {"en": "Person has not submitted a refugee status determination claim.", "es": "La persona no ha presentado una solicitud de determinaci\u00f3n del estatuto de refugiado.", "fr": "La personne n''a pas soumis de demande de d\u00e9termination du statut de r\u00e9fugi\u00e9."}, "label": {"en": "Has not applied", "es": "No ha solicitado", "fr": "N''a pas demand\u00e9"}}, {"code": "not_applicable", "definition": {"en": "RSD process does not apply to this household, for example when displacement_status is idp or resident.", "es": "El proceso de DER no aplica para este hogar, por ejemplo cuando displacement_status es idp o resident.", "fr": "Le processus de DSR ne s''applique pas \u00e0 ce m\u00e9nage, par exemple lorsque displacement_status est idp ou resident."}, "label": {"en": "Not applicable", "es": "No aplica", "fr": "Sans objet"}}]}'
      bibliography_refs: unhcr-registration-guidance-2022
  SafetyPerception3:
    title:
      en: Safety perception (3 levels)
      fr: Perception de sécurité (3 niveaux)
      es: Percepción de seguridad (3 niveles)
    description:
      en: Three-level perceived safety scale for movement within a site or at service points. Framing is gender-specific ('for women and girls') to capture gender-differentiated risk. Based on GBV AoR (2021) guidance on safety perception framing in humanitarian household surveys.
      fr: Échelle de sécurité perçue à trois niveaux pour les déplacements au sein d'un site ou aux points de service. La formulation est spécifique au genre ('pour les femmes et les filles') pour saisir le risque différencié selon le sexe. Fondée sur les orientations du GBV AoR (2021) sur la formulation de la perception de sécurité dans les enquêtes ménages humanitaires.
      es: Escala de seguridad percibida de tres niveles para el desplazamiento dentro de un asentamiento o en puntos de servicio. La formulación es específica por género ('para mujeres y niñas') para capturar el riesgo diferenciado por género. Basada en la orientación del GBV AoR (2021) sobre la formulación de percepción de seguridad en encuestas de hogares humanitarias.
    enum_uri: aidops:SafetyPerception3
    permissible_values:
      generally_safe:
        title:
          en: Generally safe
          fr: Généralement sûr
          es: Generalmente seguro
        description:
          en: Women and girls can generally move freely without concern in this context.
          fr: Les femmes et les filles peuvent généralement se déplacer librement sans crainte dans ce contexte.
          es: Las mujeres y niñas generalmente pueden moverse libremente sin preocupación en este contexto.
      sometimes_unsafe:
        title:
          en: Sometimes unsafe
          fr: Parfois peu sûr
          es: A veces inseguro
        description:
          en: Women and girls sometimes feel or are unsafe; depends on time, crowd, or specific locations within the context.
          fr: Les femmes et les filles se sentent ou sont parfois peu en sécurité ; dépend de l'heure, de la foule ou d'endroits spécifiques dans le contexte.
          es: Las mujeres y niñas a veces se sienten o están inseguras; depende de la hora, la multitud o ubicaciones específicas dentro del contexto.
      generally_unsafe:
        title:
          en: Generally unsafe
          fr: Généralement peu sûr
          es: Generalmente inseguro
        description:
          en: Women and girls generally cannot move freely without concern in this context.
          fr: Les femmes et les filles ne peuvent généralement pas se déplacer librement sans crainte dans ce contexte.
          es: Las mujeres y niñas generalmente no pueden moverse libremente sin preocupación en este contexto.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent does not know or cannot assess the safety situation for women and girls in this context.
          fr: Le répondant ne sait pas ou ne peut pas évaluer la situation de sécurité pour les femmes et les filles dans ce contexte.
          es: El encuestado no sabe o no puede evaluar la situación de seguridad para mujeres y niñas en este contexto.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["gbvaor-risk-analysis-2021", "iasc-gbv-guidelines-2015"], "definition": {"en": "Three-level perceived safety scale for movement within a site or at service points. Framing is gender-specific (''for women and girls'') to capture gender-differentiated risk. Based on GBV AoR (2021) guidance on safety perception framing in humanitarian household surveys.", "es": "Escala de seguridad percibida de tres niveles para el desplazamiento dentro de un asentamiento o en puntos de servicio. La formulaci\u00f3n es espec\u00edfica por g\u00e9nero (''para mujeres y ni\u00f1as'') para capturar el riesgo diferenciado por g\u00e9nero. Basada en la orientaci\u00f3n del GBV AoR (2021) sobre la formulaci\u00f3n de percepci\u00f3n de seguridad en encuestas de hogares humanitarias.", "fr": "\u00c9chelle de s\u00e9curit\u00e9 per\u00e7ue \u00e0 trois niveaux pour les d\u00e9placements au sein d''un site ou aux points de service. La formulation est sp\u00e9cifique au genre (''pour les femmes et les filles'') pour saisir le risque diff\u00e9renci\u00e9 selon le sexe. Fond\u00e9e sur les orientations du GBV AoR (2021) sur la formulation de la perception de s\u00e9curit\u00e9 dans les enqu\u00eates m\u00e9nages humanitaires."}, "id": "safety-perception-3", "label": {"en": "Safety perception (3 levels)", "es": "Percepci\u00f3n de seguridad (3 niveles)", "fr": "Perception de s\u00e9curit\u00e9 (3 niveaux)"}, "maturity": "draft", "values": [{"code": "generally_safe", "definition": {"en": "Women and girls can generally move freely without concern in this context.", "es": "Las mujeres y ni\u00f1as generalmente pueden moverse libremente sin preocupaci\u00f3n en este contexto.", "fr": "Les femmes et les filles peuvent g\u00e9n\u00e9ralement se d\u00e9placer librement sans crainte dans ce contexte."}, "label": {"en": "Generally safe", "es": "Generalmente seguro", "fr": "G\u00e9n\u00e9ralement s\u00fbr"}}, {"code": "sometimes_unsafe", "definition": {"en": "Women and girls sometimes feel or are unsafe; depends on time, crowd, or specific locations within the context.", "es": "Las mujeres y ni\u00f1as a veces se sienten o est\u00e1n inseguras; depende de la hora, la multitud o ubicaciones espec\u00edficas dentro del contexto.", "fr": "Les femmes et les filles se sentent ou sont parfois peu en s\u00e9curit\u00e9 ; d\u00e9pend de l''heure, de la foule ou d''endroits sp\u00e9cifiques dans le contexte."}, "label": {"en": "Sometimes unsafe", "es": "A veces inseguro", "fr": "Parfois peu s\u00fbr"}}, {"code": "generally_unsafe", "definition": {"en": "Women and girls generally cannot move freely without concern in this context.", "es": "Las mujeres y ni\u00f1as generalmente no pueden moverse libremente sin preocupaci\u00f3n en este contexto.", "fr": "Les femmes et les filles ne peuvent g\u00e9n\u00e9ralement pas se d\u00e9placer librement sans crainte dans ce contexte."}, "label": {"en": "Generally unsafe", "es": "Generalmente inseguro", "fr": "G\u00e9n\u00e9ralement peu s\u00fbr"}}, {"code": "dont_know", "definition": {"en": "Respondent does not know or cannot assess the safety situation for women and girls in this context.", "es": "El encuestado no sabe o no puede evaluar la situaci\u00f3n de seguridad para mujeres y ni\u00f1as en este contexto.", "fr": "Le r\u00e9pondant ne sait pas ou ne peut pas \u00e9valuer la situation de s\u00e9curit\u00e9 pour les femmes et les filles dans ce contexte."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: gbvaor-risk-analysis-2021,iasc-gbv-guidelines-2015
  SanitationEmptyingActor:
    title:
      en: Sanitation Pit Emptying Actor
      fr: Acteur du vidange de la fosse d'assainissement
      es: Actor del vaciado del pozo de saneamiento
    description:
      en: Who carried out the last emptying of the on-site sanitation containment and by what method. Mechanical emptying by a service provider is more likely to result in safe treatment of fecal sludge and thus contributes to the safely managed sanitation criterion. Based on MICS6 pilot question WS8B.
      fr: Qui a effectué le dernier vidange du dispositif d'assainissement sur site et par quelle méthode. Le vidange mécanique par un prestataire de services est plus susceptible d'aboutir à un traitement sûr des boues fécales et contribue ainsi au critère d'assainissement à gestion sécurisée. Basé sur la question pilote MICS6 WS8B.
      es: Quién realizó el último vaciado del contenedor de saneamiento en el sitio y por qué método. El vaciado mecánico por un proveedor de servicios es más probable que resulte en un tratamiento seguro de los lodos fecales y así contribuye al criterio de saneamiento con gestión segura. Basado en la pregunta piloto MICS6 WS8B.
    enum_uri: aidops:SanitationEmptyingActor
    permissible_values:
      by_household_manually:
        title:
          en: By household members (manually)
          fr: Par les membres du ménage (manuellement)
          es: Por miembros del hogar (manualmente)
        description:
          en: Household members emptied the pit or container manually. Carries higher risk of unsafe fecal sludge disposal.
          fr: Les membres du ménage ont vidangé la fosse ou le récipient manuellement. Comporte un risque plus élevé d'élimination non sûre des boues fécales.
          es: Los miembros del hogar vaciaron la fosa o recipiente manualmente. Conlleva mayor riesgo de eliminación insegura de lodos fecales.
      by_service_provider_mechanically:
        title:
          en: By service provider (mechanically / vacuum truck)
          fr: Par un prestataire de services (mécaniquement / camion de vidange)
          es: Por proveedor de servicios (mecánicamente / camión de vacío)
        description:
          en: A formal or informal service provider emptied the facility mechanically using a vacuum truck or pump. More likely to result in safe treatment. Contributes to the safely managed sanitation criterion.
          fr: Un prestataire de services formel ou informel a vidangé l'installation mécaniquement à l'aide d'un camion de vidange ou d'une pompe. Plus susceptible d'aboutir à un traitement sûr. Contribue au critère d'assainissement à gestion sécurisée.
          es: Un proveedor de servicios formal o informal vació la instalación mecánicamente usando un camión de vacío o bomba. Es más probable que resulte en un tratamiento seguro. Contribuye al criterio de saneamiento con gestión segura.
      by_service_provider_manually:
        title:
          en: By service provider (manually)
          fr: Par un prestataire de services (manuellement)
          es: Por proveedor de servicios (manualmente)
        description:
          en: A formal or informal service provider emptied the facility manually. The safety of fecal sludge disposal depends on how the provider handles and disposes of waste.
          fr: Un prestataire de services formel ou informel a vidangé l'installation manuellement. La sécurité de l'élimination des boues fécales dépend de la façon dont le prestataire gère et élimine les déchets.
          es: Un proveedor de servicios formal o informal vació la instalación manualmente. La seguridad de la eliminación de lodos fecales depende de cómo el proveedor maneja y elimina los residuos.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: The pit or container was emptied by another means not covered by the other categories.
          fr: La fosse ou le récipient a été vidangé par un autre moyen non couvert par les autres catégories.
          es: La fosa o recipiente fue vaciada por otro medio no cubierto por las otras categorías.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know how the facility was last emptied.
          fr: Le répondant ne sait pas comment l'installation a été vidangée pour la dernière fois.
          es: El encuestado no sabe cómo fue vaciada la instalación por última vez.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Who carried out the last emptying of the on-site sanitation containment and by what method. Mechanical emptying by a service provider is more likely to result in safe treatment of fecal sludge and thus contributes to the safely managed sanitation criterion. Based on MICS6 pilot question WS8B.", "es": "Qui\u00e9n realiz\u00f3 el \u00faltimo vaciado del contenedor de saneamiento en el sitio y por qu\u00e9 m\u00e9todo. El vaciado mec\u00e1nico por un proveedor de servicios es m\u00e1s probable que resulte en un tratamiento seguro de los lodos fecales y as\u00ed contribuye al criterio de saneamiento con gesti\u00f3n segura. Basado en la pregunta piloto MICS6 WS8B.", "fr": "Qui a effectu\u00e9 le dernier vidange du dispositif d''assainissement sur site et par quelle m\u00e9thode. Le vidange m\u00e9canique par un prestataire de services est plus susceptible d''aboutir \u00e0 un traitement s\u00fbr des boues f\u00e9cales et contribue ainsi au crit\u00e8re d''assainissement \u00e0 gestion s\u00e9curis\u00e9e. Bas\u00e9 sur la question pilote MICS6 WS8B."}, "id": "sanitation-emptying-actor", "label": {"en": "Sanitation Pit Emptying Actor", "es": "Actor del vaciado del pozo de saneamiento", "fr": "Acteur du vidange de la fosse d''assainissement"}, "maturity": "draft", "standard": {"name": "JMP Core Questions for Household Surveys (2018 Update)", "notes": "MICS6 pilot question WS8B. Mechanical emptying by service provider is a proxy for safe fecal sludge management.", "uri": "https://washdata.org/sites/default/files/documents/reports/2019-03/JMP-2018-core-questions-for-household-surveys.pdf"}, "values": [{"code": "by_household_manually", "definition": {"en": "Household members emptied the pit or container manually. Carries higher risk of unsafe fecal sludge disposal.", "es": "Los miembros del hogar vaciaron la fosa o recipiente manualmente. Conlleva mayor riesgo de eliminaci\u00f3n insegura de lodos fecales.", "fr": "Les membres du m\u00e9nage ont vidang\u00e9 la fosse ou le r\u00e9cipient manuellement. Comporte un risque plus \u00e9lev\u00e9 d''\u00e9limination non s\u00fbre des boues f\u00e9cales."}, "label": {"en": "By household members (manually)", "es": "Por miembros del hogar (manualmente)", "fr": "Par les membres du m\u00e9nage (manuellement)"}}, {"code": "by_service_provider_mechanically", "definition": {"en": "A formal or informal service provider emptied the facility mechanically using a vacuum truck or pump. More likely to result in safe treatment. Contributes to the safely managed sanitation criterion.", "es": "Un proveedor de servicios formal o informal vaci\u00f3 la instalaci\u00f3n mec\u00e1nicamente usando un cami\u00f3n de vac\u00edo o bomba. Es m\u00e1s probable que resulte en un tratamiento seguro. Contribuye al criterio de saneamiento con gesti\u00f3n segura.", "fr": "Un prestataire de services formel ou informel a vidang\u00e9 l''installation m\u00e9caniquement \u00e0 l''aide d''un camion de vidange ou d''une pompe. Plus susceptible d''aboutir \u00e0 un traitement s\u00fbr. Contribue au crit\u00e8re d''assainissement \u00e0 gestion s\u00e9curis\u00e9e."}, "label": {"en": "By service provider (mechanically / vacuum truck)", "es": "Por proveedor de servicios (mec\u00e1nicamente / cami\u00f3n de vac\u00edo)", "fr": "Par un prestataire de services (m\u00e9caniquement / camion de vidange)"}}, {"code": "by_service_provider_manually", "definition": {"en": "A formal or informal service provider emptied the facility manually. The safety of fecal sludge disposal depends on how the provider handles and disposes of waste.", "es": "Un proveedor de servicios formal o informal vaci\u00f3 la instalaci\u00f3n manualmente. La seguridad de la eliminaci\u00f3n de lodos fecales depende de c\u00f3mo el proveedor maneja y elimina los residuos.", "fr": "Un prestataire de services formel ou informel a vidang\u00e9 l''installation manuellement. La s\u00e9curit\u00e9 de l''\u00e9limination des boues f\u00e9cales d\u00e9pend de la fa\u00e7on dont le prestataire g\u00e8re et \u00e9limine les d\u00e9chets."}, "label": {"en": "By service provider (manually)", "es": "Por proveedor de servicios (manualmente)", "fr": "Par un prestataire de services (manuellement)"}}, {"code": "other", "definition": {"en": "The pit or container was emptied by another means not covered by the other categories.", "es": "La fosa o recipiente fue vaciada por otro medio no cubierto por las otras categor\u00edas.", "fr": "La fosse ou le r\u00e9cipient a \u00e9t\u00e9 vidang\u00e9 par un autre moyen non couvert par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know how the facility was last emptied.", "es": "El encuestado no sabe c\u00f3mo fue vaciada la instalaci\u00f3n por \u00faltima vez.", "fr": "Le r\u00e9pondant ne sait pas comment l''installation a \u00e9t\u00e9 vidang\u00e9e pour la derni\u00e8re fois."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
