  Agree4:
    title:
      en: Four-point agreement scale
      fr: Échelle d'accord à quatre points
      es: Escala de acuerdo de cuatro puntos
    description:
      en: 'Four-point Likert agreement scale without a neutral midpoint. The absence of a midpoint reduces fence-sitting and produces more differentiated responses for rule-of-law and fairness perception items. Introduced for rule_of_law_perception in ProtectionProfile (OQ-8 decision: weai-agree-5 is 5-point and WEAI-specific; a 4-point scale is appropriate for general fairness perception questions).'
      fr: 'Échelle d''accord de Likert à quatre points sans point médian neutre. L''absence de point médian réduit les réponses de compromis et produit des réponses plus différenciées pour les items de perception de l''état de droit et d''équité. Introduite pour rule_of_law_perception dans ProtectionProfile (décision OQ-8 : weai-agree-5 est à 5 points et spécifique au WEAI ; une échelle à 4 points est appropriée pour les questions générales de perception d''équité).'
      es: 'Escala de acuerdo de Likert de cuatro puntos sin punto medio neutral. La ausencia de punto medio reduce las respuestas intermedias y produce respuestas más diferenciadas para ítems de percepción del estado de derecho y equidad. Introducida para rule_of_law_perception en ProtectionProfile (decisión OQ-8: weai-agree-5 es de 5 puntos y específica de WEAI; una escala de 4 puntos es apropiada para preguntas generales de percepción de equidad).'
    enum_uri: aidops:Agree4
    permissible_values:
      strongly_agree:
        title:
          en: Strongly agree
          fr: Fortement d'accord
          es: Muy de acuerdo
        description:
          en: The respondent strongly agrees with the statement.
          fr: Le répondant est fortement d'accord avec l'affirmation.
          es: El encuestado está muy de acuerdo con la afirmación.
      agree:
        title:
          en: Agree
          fr: D'accord
          es: De acuerdo
        description:
          en: The respondent agrees with the statement.
          fr: Le répondant est d'accord avec l'affirmation.
          es: El encuestado está de acuerdo con la afirmación.
      disagree:
        title:
          en: Disagree
          fr: En désaccord
          es: En desacuerdo
        description:
          en: The respondent disagrees with the statement.
          fr: Le répondant est en désaccord avec l'affirmation.
          es: El encuestado está en desacuerdo con la afirmación.
      strongly_disagree:
        title:
          en: Strongly disagree
          fr: Fortement en désaccord
          es: Muy en desacuerdo
        description:
          en: The respondent strongly disagrees with the statement.
          fr: Le répondant est fortement en désaccord avec l'affirmation.
          es: El encuestado está muy en desacuerdo con la afirmación.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess. Valid response; must not be re-coded as disagree or missing.
          fr: Le répondant ne peut pas évaluer. Réponse valide ; ne doit pas être recodée comme en désaccord ou manquante.
          es: El encuestado no puede evaluar. Respuesta válida; no debe recodificarse como en desacuerdo o faltante.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Four-point Likert agreement scale without a neutral midpoint. The absence of a midpoint reduces fence-sitting and produces more differentiated responses for rule-of-law and fairness perception items. Introduced for rule_of_law_perception in ProtectionProfile (OQ-8 decision: weai-agree-5 is 5-point and WEAI-specific; a 4-point scale is appropriate for general fairness perception questions).", "es": "Escala de acuerdo de Likert de cuatro puntos sin punto medio neutral. La ausencia de punto medio reduce las respuestas intermedias y produce respuestas m\u00e1s diferenciadas para \u00edtems de percepci\u00f3n del estado de derecho y equidad. Introducida para rule_of_law_perception en ProtectionProfile (decisi\u00f3n OQ-8: weai-agree-5 es de 5 puntos y espec\u00edfica de WEAI; una escala de 4 puntos es apropiada para preguntas generales de percepci\u00f3n de equidad).", "fr": "\u00c9chelle d''accord de Likert \u00e0 quatre points sans point m\u00e9dian neutre. L''absence de point m\u00e9dian r\u00e9duit les r\u00e9ponses de compromis et produit des r\u00e9ponses plus diff\u00e9renci\u00e9es pour les items de perception de l''\u00e9tat de droit et d''\u00e9quit\u00e9. Introduite pour rule_of_law_perception dans ProtectionProfile (d\u00e9cision OQ-8 : weai-agree-5 est \u00e0 5 points et sp\u00e9cifique au WEAI ; une \u00e9chelle \u00e0 4 points est appropri\u00e9e pour les questions g\u00e9n\u00e9rales de perception d''\u00e9quit\u00e9)."}, "id": "agree-4", "label": {"en": "Four-point agreement scale", "es": "Escala de acuerdo de cuatro puntos", "fr": "\u00c9chelle d''accord \u00e0 quatre points"}, "maturity": "draft", "values": [{"code": "strongly_agree", "definition": {"en": "The respondent strongly agrees with the statement.", "es": "El encuestado est\u00e1 muy de acuerdo con la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant est fortement d''accord avec l''affirmation."}, "label": {"en": "Strongly agree", "es": "Muy de acuerdo", "fr": "Fortement d''accord"}}, {"code": "agree", "definition": {"en": "The respondent agrees with the statement.", "es": "El encuestado est\u00e1 de acuerdo con la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant est d''accord avec l''affirmation."}, "label": {"en": "Agree", "es": "De acuerdo", "fr": "D''accord"}}, {"code": "disagree", "definition": {"en": "The respondent disagrees with the statement.", "es": "El encuestado est\u00e1 en desacuerdo con la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant est en d\u00e9saccord avec l''affirmation."}, "label": {"en": "Disagree", "es": "En desacuerdo", "fr": "En d\u00e9saccord"}}, {"code": "strongly_disagree", "definition": {"en": "The respondent strongly disagrees with the statement.", "es": "El encuestado est\u00e1 muy en desacuerdo con la afirmaci\u00f3n.", "fr": "Le r\u00e9pondant est fortement en d\u00e9saccord avec l''affirmation."}, "label": {"en": "Strongly disagree", "es": "Muy en desacuerdo", "fr": "Fortement en d\u00e9saccord"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess. Valid response; must not be re-coded as disagree or missing.", "es": "El encuestado no puede evaluar. Respuesta v\u00e1lida; no debe recodificarse como en desacuerdo o faltante.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer. R\u00e9ponse valide ; ne doit pas \u00eatre recod\u00e9e comme en d\u00e9saccord ou manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
  AncFirstVisitTiming:
    title:
      en: ANC First Visit Trimester
      fr: Trimestre du premier contact prénatal
      es: Trimestre de la primera visita de APN
    description:
      en: 'The trimester in which the first antenatal care contact occurred, grouped from DHS-8 m13 (months pregnant at first ANC). WHO 2016 recommends the first contact in the first trimester (before 4 months). DHS-8 rh_anc_moprg groups: first trimester (<4 months), second trimester (4-6 months), third trimester (7+ months).'
      fr: 'Le trimestre au cours duquel le premier contact de soins prénataux a eu lieu, regroupé à partir du DHS-8 m13 (mois de grossesse au premier CPN). L''OMS 2016 recommande le premier contact au cours du premier trimestre (avant 4 mois). Groupes DHS-8 rh_anc_moprg : premier trimestre (< 4 mois), deuxième trimestre (4-6 mois), troisième trimestre (7 mois ou plus).'
      es: 'El trimestre en que ocurrió el primer contacto de atención prenatal, agrupado a partir de DHS-8 m13 (meses de embarazo en la primera APN). La OMS 2016 recomienda el primer contacto en el primer trimestre (antes de los 4 meses). Grupos DHS-8 rh_anc_moprg: primer trimestre (<4 meses), segundo trimestre (4-6 meses), tercer trimestre (7+ meses).'
    enum_uri: aidops:AncFirstVisitTiming
    permissible_values:
      first_trimester:
        title:
          en: First trimester (before 4 months)
          fr: Premier trimestre (avant 4 mois)
          es: Primer trimestre (antes de los 4 meses)
        description:
          en: First ANC contact occurred before 4 months of pregnancy. Meets the WHO 2016 recommendation for early initiation.
          fr: Le premier contact CPN a eu lieu avant 4 mois de grossesse. Satisfait à la recommandation OMS 2016 pour une initiation précoce.
          es: El primer contacto APN ocurrió antes de los 4 meses de embarazo. Cumple la recomendación OMS 2016 para inicio temprano.
      second_trimester:
        title:
          en: Second trimester (4 to 6 months)
          fr: Deuxième trimestre (4 à 6 mois)
          es: Segundo trimestre (4 a 6 meses)
        description:
          en: First ANC contact occurred between 4 and 6 months of pregnancy.
          fr: Le premier contact CPN a eu lieu entre 4 et 6 mois de grossesse.
          es: El primer contacto APN ocurrió entre los 4 y 6 meses de embarazo.
      third_trimester:
        title:
          en: Third trimester (7 months or later)
          fr: Troisième trimestre (7 mois ou plus)
          es: Tercer trimestre (7 meses o más)
        description:
          en: First ANC contact occurred at 7 or more months of pregnancy. Late initiation.
          fr: Le premier contact CPN a eu lieu à 7 mois de grossesse ou plus. Initiation tardive.
          es: El primer contacto APN ocurrió a los 7 o más meses de embarazo. Inicio tardío.
      no_anc:
        title:
          en: No ANC
          fr: Aucun CPN
          es: Sin APN
        description:
          en: No antenatal care was received during this pregnancy.
          fr: Aucun soin prénatal n'a été reçu pendant cette grossesse.
          es: No se recibió atención prenatal durante este embarazo.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know or does not remember when the first visit occurred.
          fr: La répondante ne sait pas ou ne se souvient pas du moment du premier contact.
          es: La encuestada no sabe o no recuerda cuándo ocurrió la primera visita.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire", "who-anc-2016"], "definition": {"en": "The trimester in which the first antenatal care contact occurred, grouped from DHS-8 m13 (months pregnant at first ANC). WHO 2016 recommends the first contact in the first trimester (before 4 months). DHS-8 rh_anc_moprg groups: first trimester (<4 months), second trimester (4-6 months), third trimester (7+ months).", "es": "El trimestre en que ocurri\u00f3 el primer contacto de atenci\u00f3n prenatal, agrupado a partir de DHS-8 m13 (meses de embarazo en la primera APN). La OMS 2016 recomienda el primer contacto en el primer trimestre (antes de los 4 meses). Grupos DHS-8 rh_anc_moprg: primer trimestre (<4 meses), segundo trimestre (4-6 meses), tercer trimestre (7+ meses).", "fr": "Le trimestre au cours duquel le premier contact de soins pr\u00e9nataux a eu lieu, regroup\u00e9 \u00e0 partir du DHS-8 m13 (mois de grossesse au premier CPN). L''OMS 2016 recommande le premier contact au cours du premier trimestre (avant 4 mois). Groupes DHS-8 rh_anc_moprg : premier trimestre (< 4 mois), deuxi\u00e8me trimestre (4-6 mois), troisi\u00e8me trimestre (7 mois ou plus)."}, "id": "anc-first-visit-timing", "label": {"en": "ANC First Visit Trimester", "es": "Trimestre de la primera visita de APN", "fr": "Trimestre du premier contact pr\u00e9natal"}, "maturity": "draft", "values": [{"code": "first_trimester", "definition": {"en": "First ANC contact occurred before 4 months of pregnancy. Meets the WHO 2016 recommendation for early initiation.", "es": "El primer contacto APN ocurri\u00f3 antes de los 4 meses de embarazo. Cumple la recomendaci\u00f3n OMS 2016 para inicio temprano.", "fr": "Le premier contact CPN a eu lieu avant 4 mois de grossesse. Satisfait \u00e0 la recommandation OMS 2016 pour une initiation pr\u00e9coce."}, "label": {"en": "First trimester (before 4 months)", "es": "Primer trimestre (antes de los 4 meses)", "fr": "Premier trimestre (avant 4 mois)"}}, {"code": "second_trimester", "definition": {"en": "First ANC contact occurred between 4 and 6 months of pregnancy.", "es": "El primer contacto APN ocurri\u00f3 entre los 4 y 6 meses de embarazo.", "fr": "Le premier contact CPN a eu lieu entre 4 et 6 mois de grossesse."}, "label": {"en": "Second trimester (4 to 6 months)", "es": "Segundo trimestre (4 a 6 meses)", "fr": "Deuxi\u00e8me trimestre (4 \u00e0 6 mois)"}}, {"code": "third_trimester", "definition": {"en": "First ANC contact occurred at 7 or more months of pregnancy. Late initiation.", "es": "El primer contacto APN ocurri\u00f3 a los 7 o m\u00e1s meses de embarazo. Inicio tard\u00edo.", "fr": "Le premier contact CPN a eu lieu \u00e0 7 mois de grossesse ou plus. Initiation tardive."}, "label": {"en": "Third trimester (7 months or later)", "es": "Tercer trimestre (7 meses o m\u00e1s)", "fr": "Troisi\u00e8me trimestre (7 mois ou plus)"}}, {"code": "no_anc", "definition": {"en": "No antenatal care was received during this pregnancy.", "es": "No se recibi\u00f3 atenci\u00f3n prenatal durante este embarazo.", "fr": "Aucun soin pr\u00e9natal n''a \u00e9t\u00e9 re\u00e7u pendant cette grossesse."}, "label": {"en": "No ANC", "es": "Sin APN", "fr": "Aucun CPN"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know or does not remember when the first visit occurred.", "es": "La encuestada no sabe o no recuerda cu\u00e1ndo ocurri\u00f3 la primera visita.", "fr": "La r\u00e9pondante ne sait pas ou ne se souvient pas du moment du premier contact."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
