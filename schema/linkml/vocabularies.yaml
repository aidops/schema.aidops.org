  FgmType:
    title:
      en: FGM/C Type
      fr: Type de MGF/E
      es: Tipo de MGF/A
    description:
      en: Classification of the type of female genital mutilation / cutting reported by a woman (FG6 / FG7 in MICS 6 Women's Questionnaire FG module). Maps approximately to the WHO FGM typology (Type I–IV). See UNFPA-UNICEF 2021 Compendium of Indicators for FGM Elimination.
      fr: Classification du type de mutilation génitale féminine / excision rapportée par une femme (FG6 / FG7 dans le module FG du questionnaire femme MICS 6). Correspond approximativement à la typologie MGF de l'OMS (Type I–IV). Voir le Compendium d'indicateurs pour l'élimination des MGF UNFPA-UNICEF 2021.
      es: Clasificación del tipo de mutilación genital femenina / ablación reportada por una mujer (FG6 / FG7 en el módulo FG del cuestionario de mujeres MICS 6). Corresponde aproximadamente a la tipología de MGF de la OMS (Tipo I–IV). Véase el Compendio de Indicadores para la Eliminación de MGF UNFPA-UNICEF 2021.
    enum_uri: aidops:FgmType
    permissible_values:
      nicked_no_flesh_removed:
        title:
          en: Nicked, no flesh removed
          fr: Entaillée, aucune chair retirée
          es: Cortada, sin tejido extraído
        description:
          en: The genital area was nicked but no flesh was removed. Approximately WHO Type IV (symbolic/ritual nicking).
          fr: La zone génitale a été entaillée mais aucune chair n'a été retirée. Correspond approximativement au Type IV OMS (entaille symbolique/rituelle).
          es: El área genital fue cortada pero no se extrajo tejido. Corresponde aproximadamente al Tipo IV OMS (corte simbólico/ritual).
      flesh_partially_removed:
        title:
          en: Flesh removed from the genital area
          fr: Chair retirée de la zone génitale
          es: Tejido extraído del área genital
        description:
          en: Flesh was removed. Approximately WHO Types I or II (partial/total removal of clitoris or labia minora).
          fr: De la chair a été retirée. Correspond approximativement aux Types I ou II OMS (ablation partielle/totale du clitoris ou des petites lèvres).
          es: Se extrajo tejido. Corresponde aproximadamente a los Tipos I o II OMS (extirpación parcial/total del clítoris o labios menores).
      genital_area_sewn_closed:
        title:
          en: Genital area sewn closed (infibulation)
          fr: Zone génitale cousue fermée (infibulation)
          es: Área genital cosida cerrada (infibulación)
        description:
          en: The genital area was sewn closed. Approximately WHO Type III (infibulation).
          fr: La zone génitale a été cousue fermée. Correspond approximativement au Type III OMS (infibulation).
          es: El área genital fue cosida cerrada. Corresponde aproximadamente al Tipo III OMS (infibulación).
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent does not know what was done or does not remember.
          fr: La répondante ne sait pas ce qui a été fait ou ne s'en souvient pas.
          es: La encuestada no sabe lo que se hizo o no lo recuerda.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["mics6-child-protection", "unfpa-fgm-compendium-2021"], "definition": {"en": "Classification of the type of female genital mutilation / cutting reported by a woman (FG6 / FG7 in MICS 6 Women''s Questionnaire FG module). Maps approximately to the WHO FGM typology (Type I\u2013IV). See UNFPA-UNICEF 2021 Compendium of Indicators for FGM Elimination.", "es": "Clasificaci\u00f3n del tipo de mutilaci\u00f3n genital femenina / ablaci\u00f3n reportada por una mujer (FG6 / FG7 en el m\u00f3dulo FG del cuestionario de mujeres MICS 6). Corresponde aproximadamente a la tipolog\u00eda de MGF de la OMS (Tipo I\u2013IV). V\u00e9ase el Compendio de Indicadores para la Eliminaci\u00f3n de MGF UNFPA-UNICEF 2021.", "fr": "Classification du type de mutilation g\u00e9nitale f\u00e9minine / excision rapport\u00e9e par une femme (FG6 / FG7 dans le module FG du questionnaire femme MICS 6). Correspond approximativement \u00e0 la typologie MGF de l''OMS (Type I\u2013IV). Voir le Compendium d''indicateurs pour l''\u00e9limination des MGF UNFPA-UNICEF 2021."}, "id": "fgm-type", "label": {"en": "FGM/C Type", "es": "Tipo de MGF/A", "fr": "Type de MGF/E"}, "maturity": "draft", "values": [{"code": "nicked_no_flesh_removed", "definition": {"en": "The genital area was nicked but no flesh was removed. Approximately WHO Type IV (symbolic/ritual nicking).", "es": "El \u00e1rea genital fue cortada pero no se extrajo tejido. Corresponde aproximadamente al Tipo IV OMS (corte simb\u00f3lico/ritual).", "fr": "La zone g\u00e9nitale a \u00e9t\u00e9 entaill\u00e9e mais aucune chair n''a \u00e9t\u00e9 retir\u00e9e. Correspond approximativement au Type IV OMS (entaille symbolique/rituelle)."}, "label": {"en": "Nicked, no flesh removed", "es": "Cortada, sin tejido extra\u00eddo", "fr": "Entaill\u00e9e, aucune chair retir\u00e9e"}}, {"code": "flesh_partially_removed", "definition": {"en": "Flesh was removed. Approximately WHO Types I or II (partial/total removal of clitoris or labia minora).", "es": "Se extrajo tejido. Corresponde aproximadamente a los Tipos I o II OMS (extirpaci\u00f3n parcial/total del cl\u00edtoris o labios menores).", "fr": "De la chair a \u00e9t\u00e9 retir\u00e9e. Correspond approximativement aux Types I ou II OMS (ablation partielle/totale du clitoris ou des petites l\u00e8vres)."}, "label": {"en": "Flesh removed from the genital area", "es": "Tejido extra\u00eddo del \u00e1rea genital", "fr": "Chair retir\u00e9e de la zone g\u00e9nitale"}}, {"code": "genital_area_sewn_closed", "definition": {"en": "The genital area was sewn closed. Approximately WHO Type III (infibulation).", "es": "El \u00e1rea genital fue cosida cerrada. Corresponde aproximadamente al Tipo III OMS (infibulaci\u00f3n).", "fr": "La zone g\u00e9nitale a \u00e9t\u00e9 cousue ferm\u00e9e. Correspond approximativement au Type III OMS (infibulation)."}, "label": {"en": "Genital area sewn closed (infibulation)", "es": "\u00c1rea genital cosida cerrada (infibulaci\u00f3n)", "fr": "Zone g\u00e9nitale cousue ferm\u00e9e (infibulation)"}}, {"code": "dont_know", "definition": {"en": "The respondent does not know what was done or does not remember.", "es": "La encuestada no sabe lo que se hizo o no lo recuerda.", "fr": "La r\u00e9pondante ne sait pas ce qui a \u00e9t\u00e9 fait ou ne s''en souvient pas."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: mics6-child-protection,unfpa-fgm-compendium-2021
  FloodRiskPerceived:
    title:
      en: Perceived flood risk (4-level)
      fr: Risque d'inondation perçu (4 niveaux)
      es: Riesgo de inundación percibido (4 niveles)
    description:
      en: 'Four-level household-perception scale for flood frequency at the shelter location. Recall period: past 12 months. Based on Sphere Standard 2 guidance on hazard-safe shelter siting. ''Regularly'' = 3 or more events; ''occasionally'' = 1–2 events in the recall period.'
      fr: 'Échelle de perception des ménages à quatre niveaux pour la fréquence des inondations à l''emplacement de l''abri. Période de rappel : 12 derniers mois. Basée sur les orientations de la Norme Sphère 2 sur l''emplacement des abris à l''abri des risques. ''Régulièrement'' = 3 événements ou plus ; ''occasionnellement'' = 1–2 événements pendant la période de rappel.'
      es: 'Escala de percepción del hogar de cuatro niveles para la frecuencia de inundaciones en la ubicación del refugio. Período de recordatorio: últimos 12 meses. Basada en la orientación de la Norma Esfera 2 sobre la ubicación del refugio libre de peligros. ''Regularmente'' = 3 o más eventos; ''ocasionalmente'' = 1–2 eventos en el período de recordatorio.'
    enum_uri: aidops:FloodRiskPerceived
    permissible_values:
      yes_regularly:
        title:
          en: Yes — floods regularly (3 or more times in past 12 months)
          fr: Oui — inonde régulièrement (3 fois ou plus au cours des 12 derniers mois)
          es: Sí — se inunda regularmente (3 veces o más en los últimos 12 meses)
        description:
          en: The shelter area flooded three or more times in the past 12 months as perceived by the household.
          fr: La zone de l'abri a inondé trois fois ou plus au cours des 12 derniers mois selon la perception du ménage.
          es: El área del refugio se inundó tres veces o más en los últimos 12 meses según la percepción del hogar.
      yes_occasionally:
        title:
          en: Yes — flooded occasionally (1–2 times in past 12 months)
          fr: Oui — a inondé occasionnellement (1–2 fois au cours des 12 derniers mois)
          es: Sí — se inundó ocasionalmente (1–2 veces en los últimos 12 meses)
        description:
          en: The shelter area flooded once or twice in the past 12 months as perceived by the household.
          fr: La zone de l'abri a inondé une ou deux fois au cours des 12 derniers mois selon la perception du ménage.
          es: El área del refugio se inundó una o dos veces en los últimos 12 meses según la percepción del hogar.
      'no':
        title:
          en: No — does not flood
          fr: Non — n'inonde pas
          es: No — no se inunda
        description:
          en: The household does not perceive their shelter area to be flood-prone.
          fr: Le ménage ne perçoit pas que la zone de leur abri est sujette aux inondations.
          es: El hogar no percibe que su área de refugio sea propensa a inundaciones.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The household is unable to assess flood risk at their shelter location, typically due to recent arrival.
          fr: Le ménage n'est pas en mesure d'évaluer le risque d'inondation à l'emplacement de son abri, généralement en raison d'une arrivée récente.
          es: El hogar no puede evaluar el riesgo de inundación en la ubicación de su refugio, generalmente debido a una llegada reciente.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Four-level household-perception scale for flood frequency at the shelter location. Recall period: past 12 months. Based on Sphere Standard 2 guidance on hazard-safe shelter siting. ''Regularly'' = 3 or more events; ''occasionally'' = 1\u20132 events in the recall period.", "es": "Escala de percepci\u00f3n del hogar de cuatro niveles para la frecuencia de inundaciones en la ubicaci\u00f3n del refugio. Per\u00edodo de recordatorio: \u00faltimos 12 meses. Basada en la orientaci\u00f3n de la Norma Esfera 2 sobre la ubicaci\u00f3n del refugio libre de peligros. ''Regularmente'' = 3 o m\u00e1s eventos; ''ocasionalmente'' = 1\u20132 eventos en el per\u00edodo de recordatorio.", "fr": "\u00c9chelle de perception des m\u00e9nages \u00e0 quatre niveaux pour la fr\u00e9quence des inondations \u00e0 l''emplacement de l''abri. P\u00e9riode de rappel : 12 derniers mois. Bas\u00e9e sur les orientations de la Norme Sph\u00e8re 2 sur l''emplacement des abris \u00e0 l''abri des risques. ''R\u00e9guli\u00e8rement'' = 3 \u00e9v\u00e9nements ou plus ; ''occasionnellement'' = 1\u20132 \u00e9v\u00e9nements pendant la p\u00e9riode de rappel."}, "id": "flood-risk-perceived", "label": {"en": "Perceived flood risk (4-level)", "es": "Riesgo de inundaci\u00f3n percibido (4 niveles)", "fr": "Risque d''inondation per\u00e7u (4 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_regularly", "definition": {"en": "The shelter area flooded three or more times in the past 12 months as perceived by the household.", "es": "El \u00e1rea del refugio se inund\u00f3 tres veces o m\u00e1s en los \u00faltimos 12 meses seg\u00fan la percepci\u00f3n del hogar.", "fr": "La zone de l''abri a inond\u00e9 trois fois ou plus au cours des 12 derniers mois selon la perception du m\u00e9nage."}, "label": {"en": "Yes \u2014 floods regularly (3 or more times in past 12 months)", "es": "S\u00ed \u2014 se inunda regularmente (3 veces o m\u00e1s en los \u00faltimos 12 meses)", "fr": "Oui \u2014 inonde r\u00e9guli\u00e8rement (3 fois ou plus au cours des 12 derniers mois)"}}, {"code": "yes_occasionally", "definition": {"en": "The shelter area flooded once or twice in the past 12 months as perceived by the household.", "es": "El \u00e1rea del refugio se inund\u00f3 una o dos veces en los \u00faltimos 12 meses seg\u00fan la percepci\u00f3n del hogar.", "fr": "La zone de l''abri a inond\u00e9 une ou deux fois au cours des 12 derniers mois selon la perception du m\u00e9nage."}, "label": {"en": "Yes \u2014 flooded occasionally (1\u20132 times in past 12 months)", "es": "S\u00ed \u2014 se inund\u00f3 ocasionalmente (1\u20132 veces en los \u00faltimos 12 meses)", "fr": "Oui \u2014 a inond\u00e9 occasionnellement (1\u20132 fois au cours des 12 derniers mois)"}}, {"code": "no", "definition": {"en": "The household does not perceive their shelter area to be flood-prone.", "es": "El hogar no percibe que su \u00e1rea de refugio sea propensa a inundaciones.", "fr": "Le m\u00e9nage ne per\u00e7oit pas que la zone de leur abri est sujette aux inondations."}, "label": {"en": "No \u2014 does not flood", "es": "No \u2014 no se inunda", "fr": "Non \u2014 n''inonde pas"}}, {"code": "dont_know", "definition": {"en": "The household is unable to assess flood risk at their shelter location, typically due to recent arrival.", "es": "El hogar no puede evaluar el riesgo de inundaci\u00f3n en la ubicaci\u00f3n de su refugio, generalmente debido a una llegada reciente.", "fr": "Le m\u00e9nage n''est pas en mesure d''\u00e9valuer le risque d''inondation \u00e0 l''emplacement de son abri, g\u00e9n\u00e9ralement en raison d''une arriv\u00e9e r\u00e9cente."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: sphere-2018
  FoodConsumptionGroup:
    title:
      en: Food Consumption Group
      fr: Groupe de consommation alimentaire
      es: Grupo de consumo alimentario
    description:
      en: The food consumption group derived from the Food Consumption Score (FCS) using WFP standard thresholds. Standard thresholds are 21 and 35; in high-sugar or high-oil dietary contexts, WFP recommends adjusted thresholds of 28 and 42.
      fr: Le groupe de consommation alimentaire dérivé du score de consommation alimentaire (FCS) selon les seuils standard du PAM. Les seuils standard sont 21 et 35 ; dans les contextes alimentaires à forte consommation de sucre ou d'huile, le PAM recommande des seuils ajustés de 28 et 42.
      es: El grupo de consumo alimentario derivado del puntaje de consumo alimentario (FCS) según los umbrales estándar del PMA. Los umbrales estándar son 21 y 35; en contextos dietéticos con alto consumo de azúcar o aceite, el PMA recomienda umbrales ajustados de 28 y 42.
    enum_uri: aidops:FoodConsumptionGroup
    permissible_values:
      poor:
        title:
          en: Poor
          fr: Pauvre
          es: Pobre
        description:
          en: FCS 0-21 (standard thresholds) or 0-28 (high-sugar/oil thresholds). Indicates an inadequate diet with very low frequency and diversity of food group consumption.
          fr: FCS 0-21 (seuils standard) ou 0-28 (seuils sucre/huile élevés). Indique un régime alimentaire inadéquat avec une fréquence et une diversité très faibles de la consommation par groupe alimentaire.
          es: FCS 0-21 (umbrales estándar) o 0-28 (umbrales alto azúcar/aceite). Indica una dieta inadecuada con muy baja frecuencia y diversidad de consumo por grupo alimentario.
      borderline:
        title:
          en: Borderline
          fr: Limite
          es: Límite
        description:
          en: FCS 21.5-35 (standard thresholds) or 28.5-42 (high-sugar/oil thresholds). Indicates a diet at risk, with limited frequency and diversity of food group consumption.
          fr: FCS 21,5-35 (seuils standard) ou 28,5-42 (seuils sucre/huile élevés). Indique un régime alimentaire à risque, avec une fréquence et une diversité limitées de la consommation par groupe alimentaire.
          es: FCS 21,5-35 (umbrales estándar) o 28,5-42 (umbrales alto azúcar/aceite). Indica una dieta en riesgo, con frecuencia y diversidad limitadas de consumo por grupo alimentario.
      acceptable:
        title:
          en: Acceptable
          fr: Acceptable
          es: Aceptable
        description:
          en: FCS above 35 (standard thresholds) or above 42 (high-sugar/oil thresholds). Indicates an adequate diet with sufficient frequency and diversity of food group consumption.
          fr: FCS supérieur à 35 (seuils standard) ou supérieur à 42 (seuils sucre/huile élevés). Indique un régime alimentaire adéquat avec une fréquence et une diversité suffisantes de la consommation par groupe alimentaire.
          es: FCS superior a 35 (umbrales estándar) o superior a 42 (umbrales alto azúcar/aceite). Indica una dieta adecuada con suficiente frecuencia y diversidad de consumo por grupo alimentario.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["wfp-fcs"], "definition": {"en": "The food consumption group derived from the Food Consumption Score (FCS) using WFP standard thresholds. Standard thresholds are 21 and 35; in high-sugar or high-oil dietary contexts, WFP recommends adjusted thresholds of 28 and 42.", "es": "El grupo de consumo alimentario derivado del puntaje de consumo alimentario (FCS) seg\u00fan los umbrales est\u00e1ndar del PMA. Los umbrales est\u00e1ndar son 21 y 35; en contextos diet\u00e9ticos con alto consumo de az\u00facar o aceite, el PMA recomienda umbrales ajustados de 28 y 42.", "fr": "Le groupe de consommation alimentaire d\u00e9riv\u00e9 du score de consommation alimentaire (FCS) selon les seuils standard du PAM. Les seuils standard sont 21 et 35 ; dans les contextes alimentaires \u00e0 forte consommation de sucre ou d''huile, le PAM recommande des seuils ajust\u00e9s de 28 et 42."}, "id": "food-consumption-group", "label": {"en": "Food Consumption Group", "es": "Grupo de consumo alimentario", "fr": "Groupe de consommation alimentaire"}, "maturity": "draft", "standard": {"name": "WFP VAM Food Consumption Score Technical Guidance Note (2015)", "notes": "Three consumption groups using standard 21/35 or high-sugar/oil 28/42 thresholds.", "uri": "https://www.wfp.org/publications/food-consumption-score-technical-guidance"}, "values": [{"code": "poor", "definition": {"en": "FCS 0-21 (standard thresholds) or 0-28 (high-sugar/oil thresholds). Indicates an inadequate diet with very low frequency and diversity of food group consumption.", "es": "FCS 0-21 (umbrales est\u00e1ndar) o 0-28 (umbrales alto az\u00facar/aceite). Indica una dieta inadecuada con muy baja frecuencia y diversidad de consumo por grupo alimentario.", "fr": "FCS 0-21 (seuils standard) ou 0-28 (seuils sucre/huile \u00e9lev\u00e9s). Indique un r\u00e9gime alimentaire inad\u00e9quat avec une fr\u00e9quence et une diversit\u00e9 tr\u00e8s faibles de la consommation par groupe alimentaire."}, "label": {"en": "Poor", "es": "Pobre", "fr": "Pauvre"}}, {"code": "borderline", "definition": {"en": "FCS 21.5-35 (standard thresholds) or 28.5-42 (high-sugar/oil thresholds). Indicates a diet at risk, with limited frequency and diversity of food group consumption.", "es": "FCS 21,5-35 (umbrales est\u00e1ndar) o 28,5-42 (umbrales alto az\u00facar/aceite). Indica una dieta en riesgo, con frecuencia y diversidad limitadas de consumo por grupo alimentario.", "fr": "FCS 21,5-35 (seuils standard) ou 28,5-42 (seuils sucre/huile \u00e9lev\u00e9s). Indique un r\u00e9gime alimentaire \u00e0 risque, avec une fr\u00e9quence et une diversit\u00e9 limit\u00e9es de la consommation par groupe alimentaire."}, "label": {"en": "Borderline", "es": "L\u00edmite", "fr": "Limite"}}, {"code": "acceptable", "definition": {"en": "FCS above 35 (standard thresholds) or above 42 (high-sugar/oil thresholds). Indicates an adequate diet with sufficient frequency and diversity of food group consumption.", "es": "FCS superior a 35 (umbrales est\u00e1ndar) o superior a 42 (umbrales alto az\u00facar/aceite). Indica una dieta adecuada con suficiente frecuencia y diversidad de consumo por grupo alimentario.", "fr": "FCS sup\u00e9rieur \u00e0 35 (seuils standard) ou sup\u00e9rieur \u00e0 42 (seuils sucre/huile \u00e9lev\u00e9s). Indique un r\u00e9gime alimentaire ad\u00e9quat avec une fr\u00e9quence et une diversit\u00e9 suffisantes de la consommation par groupe alimentaire."}, "label": {"en": "Acceptable", "es": "Aceptable", "fr": "Acceptable"}}]}'
      bibliography_refs: wfp-fcs
  FoodSafetyConcern:
    title:
      en: Food Safety Concern
      fr: Problème de sécurité alimentaire
      es: Problema de inocuidad alimentaria
    description:
      en: Specific food safety concerns observable by an enumerator at food stalls during a market visit, drawn from WFP MAG 2021 food quality dimensions, Sphere 2018 food security Essential standard 1, and ACAPS market assessment observation items. Multi-select; the code 'no_concerns_observed' is mutually exclusive with all other codes and must be enforced in XLSForm constraint logic.
      fr: Problèmes spécifiques de sécurité alimentaire observables par un enquêteur aux étals alimentaires lors d'une visite de marché, tirés des dimensions de qualité alimentaire du WFP MAG 2021, de la norme essentielle 1 de sécurité alimentaire du Sphere 2018 et des éléments d'observation ACAPS pour l'évaluation des marchés. Multi-sélection ; le code 'no_concerns_observed' est mutuellement exclusif avec tous les autres codes et doit être appliqué dans la logique de contrainte XLSForm.
      es: Problemas específicos de inocuidad alimentaria observables por un enumerador en los puestos de comida durante una visita al mercado, extraídos de las dimensiones de calidad alimentaria del WFP MAG 2021, la norma esencial 1 de seguridad alimentaria del Sphere 2018 y los ítems de observación ACAPS para evaluación de mercados. Selección múltiple; el código 'no_concerns_observed' es mutuamente exclusivo con todos los demás códigos y debe aplicarse en la lógica de restricción XLSForm.
    enum_uri: aidops:FoodSafetyConcern
    permissible_values:
      expired_goods_present:
        title:
          en: Expired goods observed
          fr: Produits périmés observés
          es: Productos vencidos observados
        description:
          en: Enumerator directly observes food products being sold at or past their expiry date or best-before date. Applies primarily to packaged and processed goods.
          fr: L'enquêteur observe directement des produits alimentaires vendus à ou après leur date de péremption ou de consommation optimale. S'applique principalement aux produits emballés et transformés.
          es: El enumerador observa directamente productos alimenticios que se venden en o después de su fecha de vencimiento o fecha de consumo preferente. Se aplica principalmente a productos envasados y procesados.
      poor_perishable_storage:
        title:
          en: Poor perishable food storage
          fr: Mauvaise conservation des denrées périssables
          es: Almacenamiento deficiente de alimentos perecederos
        description:
          en: Perishable foods (meat, fish, dairy, eggs) stored at ambient temperature without refrigeration, ice, or other appropriate cold-chain means. Flies, visible spoilage, or off-odors may be present.
          fr: Aliments périssables (viande, poisson, produits laitiers, œufs) stockés à température ambiante sans réfrigération, glace ou autre moyen de chaîne du froid approprié. Des mouches, une détérioration visible ou des odeurs anormales peuvent être présentes.
          es: Alimentos perecederos (carne, pescado, lácteos, huevos) almacenados a temperatura ambiente sin refrigeración, hielo u otro medio apropiado de cadena de frío. Pueden estar presentes moscas, deterioro visible o malos olores.
      absence_of_handwashing_facilities:
        title:
          en: No handwashing facilities at food stalls
          fr: Absence de dispositifs de lavage des mains aux étals alimentaires
          es: Sin instalaciones de lavado de manos en puestos de comida
        description:
          en: Food vendors have no access to soap and water or hand sanitizer in the food preparation or service area.
          fr: Les vendeurs de nourriture n'ont pas accès à de l'eau et du savon ou à un désinfectant pour les mains dans la zone de préparation ou de service alimentaire.
          es: Los vendedores de alimentos no tienen acceso a jabón y agua o desinfectante para manos en el área de preparación o servicio de alimentos.
      visible_pest_infestation:
        title:
          en: Visible pest infestation
          fr: Infestation visible de nuisibles
          es: Infestación visible de plagas
        description:
          en: Rodents, insects (flies, cockroaches), or other pests are visibly present near or on stored or displayed food.
          fr: Des rongeurs, des insectes (mouches, cafards) ou d'autres nuisibles sont visiblement présents à proximité ou sur des aliments stockés ou exposés.
          es: Roedores, insectos (moscas, cucarachas) u otras plagas están visiblemente presentes cerca o sobre alimentos almacenados o exhibidos.
      no_separation_raw_cooked:
        title:
          en: No separation of raw and cooked food
          fr: Absence de séparation entre aliments crus et cuits
          es: Sin separación entre alimentos crudos y cocidos
        description:
          en: Ready-to-eat or cooked food in direct contact with raw meat, fish, or other contamination risk (cross-contamination hazard).
          fr: Aliments prêts à consommer ou cuits en contact direct avec de la viande crue, du poisson ou d'autres risques de contamination (risque de contamination croisée).
          es: Alimentos listos para comer o cocidos en contacto directo con carne cruda, pescado u otro riesgo de contaminación (peligro de contaminación cruzada).
      open_sewage_near_food_stalls:
        title:
          en: Open sewage or solid waste near food stalls
          fr: Égout ouvert ou déchets solides à proximité des étals alimentaires
          es: Aguas residuales abiertas o residuos sólidos cerca de puestos de comida
        description:
          en: Open drainage channels, accumulations of garbage, or fecal matter within the food area of the market.
          fr: Canaux de drainage ouverts, accumulations d'ordures ou matières fécales dans la zone alimentaire du marché.
          es: Canales de drenaje abiertos, acumulaciones de basura o materia fecal dentro del área de alimentos del mercado.
      no_concerns_observed:
        title:
          en: No food safety concerns observed
          fr: Aucun problème de sécurité alimentaire observé
          es: No se observaron problemas de inocuidad alimentaria
        description:
          en: Enumerator did not observe any notable food safety concerns during this market visit. Mutually exclusive with all other codes — enforce in XLSForm constraint.
          fr: L'enquêteur n'a observé aucun problème notable de sécurité alimentaire lors de cette visite de marché. Mutuellement exclusif avec tous les autres codes — appliquer dans la contrainte XLSForm.
          es: El enumerador no observó ningún problema notable de inocuidad alimentaria durante esta visita al mercado. Mutuamente exclusivo con todos los demás códigos — aplicar en restricción XLSForm.
      other:
        title:
          en: Other food safety concern
          fr: Autre problème de sécurité alimentaire
          es: Otro problema de inocuidad alimentaria
        description:
          en: Concern observed that does not fit the codes above; enumerator should describe in form-local notes field.
          fr: Problème observé qui ne correspond à aucun des codes ci-dessus ; l'enquêteur doit décrire dans le champ de notes local au formulaire.
          es: Problema observado que no encaja en los códigos anteriores; el enumerador debe describir en el campo de notas local del formulario.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["acaps-market-assessment-2014", "wfp-mag-2021"], "definition": {"en": "Specific food safety concerns observable by an enumerator at food stalls during a market visit, drawn from WFP MAG 2021 food quality dimensions, Sphere 2018 food security Essential standard 1, and ACAPS market assessment observation items. Multi-select; the code ''no_concerns_observed'' is mutually exclusive with all other codes and must be enforced in XLSForm constraint logic.\n", "es": "Problemas espec\u00edficos de inocuidad alimentaria observables por un enumerador en los puestos de comida durante una visita al mercado, extra\u00eddos de las dimensiones de calidad alimentaria del WFP MAG 2021, la norma esencial 1 de seguridad alimentaria del Sphere 2018 y los \u00edtems de observaci\u00f3n ACAPS para evaluaci\u00f3n de mercados. Selecci\u00f3n m\u00faltiple; el c\u00f3digo ''no_concerns_observed'' es mutuamente exclusivo con todos los dem\u00e1s c\u00f3digos y debe aplicarse en la l\u00f3gica de restricci\u00f3n XLSForm.\n", "fr": "Probl\u00e8mes sp\u00e9cifiques de s\u00e9curit\u00e9 alimentaire observables par un enqu\u00eateur aux \u00e9tals alimentaires lors d''une visite de march\u00e9, tir\u00e9s des dimensions de qualit\u00e9 alimentaire du WFP MAG 2021, de la norme essentielle 1 de s\u00e9curit\u00e9 alimentaire du Sphere 2018 et des \u00e9l\u00e9ments d''observation ACAPS pour l''\u00e9valuation des march\u00e9s. Multi-s\u00e9lection ; le code ''no_concerns_observed'' est mutuellement exclusif avec tous les autres codes et doit \u00eatre appliqu\u00e9 dans la logique de contrainte XLSForm.\n"}, "id": "food-safety-concern", "label": {"en": "Food Safety Concern", "es": "Problema de inocuidad alimentaria", "fr": "Probl\u00e8me de s\u00e9curit\u00e9 alimentaire"}, "maturity": "draft", "values": [{"code": "expired_goods_present", "definition": {"en": "Enumerator directly observes food products being sold at or past their expiry date or best-before date. Applies primarily to packaged and processed goods.", "es": "El enumerador observa directamente productos alimenticios que se venden en o despu\u00e9s de su fecha de vencimiento o fecha de consumo preferente. Se aplica principalmente a productos envasados y procesados.", "fr": "L''enqu\u00eateur observe directement des produits alimentaires vendus \u00e0 ou apr\u00e8s leur date de p\u00e9remption ou de consommation optimale. S''applique principalement aux produits emball\u00e9s et transform\u00e9s."}, "label": {"en": "Expired goods observed", "es": "Productos vencidos observados", "fr": "Produits p\u00e9rim\u00e9s observ\u00e9s"}}, {"code": "poor_perishable_storage", "definition": {"en": "Perishable foods (meat, fish, dairy, eggs) stored at ambient temperature without refrigeration, ice, or other appropriate cold-chain means. Flies, visible spoilage, or off-odors may be present.", "es": "Alimentos perecederos (carne, pescado, l\u00e1cteos, huevos) almacenados a temperatura ambiente sin refrigeraci\u00f3n, hielo u otro medio apropiado de cadena de fr\u00edo. Pueden estar presentes moscas, deterioro visible o malos olores.", "fr": "Aliments p\u00e9rissables (viande, poisson, produits laitiers, \u0153ufs) stock\u00e9s \u00e0 temp\u00e9rature ambiante sans r\u00e9frig\u00e9ration, glace ou autre moyen de cha\u00eene du froid appropri\u00e9. Des mouches, une d\u00e9t\u00e9rioration visible ou des odeurs anormales peuvent \u00eatre pr\u00e9sentes."}, "label": {"en": "Poor perishable food storage", "es": "Almacenamiento deficiente de alimentos perecederos", "fr": "Mauvaise conservation des denr\u00e9es p\u00e9rissables"}}, {"code": "absence_of_handwashing_facilities", "definition": {"en": "Food vendors have no access to soap and water or hand sanitizer in the food preparation or service area.", "es": "Los vendedores de alimentos no tienen acceso a jab\u00f3n y agua o desinfectante para manos en el \u00e1rea de preparaci\u00f3n o servicio de alimentos.", "fr": "Les vendeurs de nourriture n''ont pas acc\u00e8s \u00e0 de l''eau et du savon ou \u00e0 un d\u00e9sinfectant pour les mains dans la zone de pr\u00e9paration ou de service alimentaire."}, "label": {"en": "No handwashing facilities at food stalls", "es": "Sin instalaciones de lavado de manos en puestos de comida", "fr": "Absence de dispositifs de lavage des mains aux \u00e9tals alimentaires"}}, {"code": "visible_pest_infestation", "definition": {"en": "Rodents, insects (flies, cockroaches), or other pests are visibly present near or on stored or displayed food.", "es": "Roedores, insectos (moscas, cucarachas) u otras plagas est\u00e1n visiblemente presentes cerca o sobre alimentos almacenados o exhibidos.", "fr": "Des rongeurs, des insectes (mouches, cafards) ou d''autres nuisibles sont visiblement pr\u00e9sents \u00e0 proximit\u00e9 ou sur des aliments stock\u00e9s ou expos\u00e9s."}, "label": {"en": "Visible pest infestation", "es": "Infestaci\u00f3n visible de plagas", "fr": "Infestation visible de nuisibles"}}, {"code": "no_separation_raw_cooked", "definition": {"en": "Ready-to-eat or cooked food in direct contact with raw meat, fish, or other contamination risk (cross-contamination hazard).", "es": "Alimentos listos para comer o cocidos en contacto directo con carne cruda, pescado u otro riesgo de contaminaci\u00f3n (peligro de contaminaci\u00f3n cruzada).", "fr": "Aliments pr\u00eats \u00e0 consommer ou cuits en contact direct avec de la viande crue, du poisson ou d''autres risques de contamination (risque de contamination crois\u00e9e)."}, "label": {"en": "No separation of raw and cooked food", "es": "Sin separaci\u00f3n entre alimentos crudos y cocidos", "fr": "Absence de s\u00e9paration entre aliments crus et cuits"}}, {"code": "open_sewage_near_food_stalls", "definition": {"en": "Open drainage channels, accumulations of garbage, or fecal matter within the food area of the market.", "es": "Canales de drenaje abiertos, acumulaciones de basura o materia fecal dentro del \u00e1rea de alimentos del mercado.", "fr": "Canaux de drainage ouverts, accumulations d''ordures ou mati\u00e8res f\u00e9cales dans la zone alimentaire du march\u00e9."}, "label": {"en": "Open sewage or solid waste near food stalls", "es": "Aguas residuales abiertas o residuos s\u00f3lidos cerca de puestos de comida", "fr": "\u00c9gout ouvert ou d\u00e9chets solides \u00e0 proximit\u00e9 des \u00e9tals alimentaires"}}, {"code": "no_concerns_observed", "definition": {"en": "Enumerator did not observe any notable food safety concerns during this market visit. Mutually exclusive with all other codes \u2014 enforce in XLSForm constraint.", "es": "El enumerador no observ\u00f3 ning\u00fan problema notable de inocuidad alimentaria durante esta visita al mercado. Mutuamente exclusivo con todos los dem\u00e1s c\u00f3digos \u2014 aplicar en restricci\u00f3n XLSForm.", "fr": "L''enqu\u00eateur n''a observ\u00e9 aucun probl\u00e8me notable de s\u00e9curit\u00e9 alimentaire lors de cette visite de march\u00e9. Mutuellement exclusif avec tous les autres codes \u2014 appliquer dans la contrainte XLSForm."}, "label": {"en": "No food safety concerns observed", "es": "No se observaron problemas de inocuidad alimentaria", "fr": "Aucun probl\u00e8me de s\u00e9curit\u00e9 alimentaire observ\u00e9"}}, {"code": "other", "definition": {"en": "Concern observed that does not fit the codes above; enumerator should describe in form-local notes field.", "es": "Problema observado que no encaja en los c\u00f3digos anteriores; el enumerador debe describir en el campo de notas local del formulario.", "fr": "Probl\u00e8me observ\u00e9 qui ne correspond \u00e0 aucun des codes ci-dessus ; l''enqu\u00eateur doit d\u00e9crire dans le champ de notes local au formulaire."}, "label": {"en": "Other food safety concern", "es": "Otro problema de inocuidad alimentaria", "fr": "Autre probl\u00e8me de s\u00e9curit\u00e9 alimentaire"}}]}'
