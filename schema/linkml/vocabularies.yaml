00f3 esta vacuna. Corresponde al c\u00f3digo DHS 8.", "fr": "Le soignant ne sait pas si ce vaccin a \u00e9t\u00e9 administr\u00e9. Correspond au code DHS 8."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
