  HygieneItemType:
    title:
      en: Hygiene Item Type
      fr: Type d'article d'hygiène
      es: Tipo de artículo de higiene
    description:
      en: Types of hygiene items currently available in the household. Based on the Sphere 2018 minimum Non-Food Item (NFI) hygiene package, which includes soap and sanitary items as minimum standards. Multi-select.
      fr: Types d'articles d'hygiène actuellement disponibles dans le ménage. Basé sur le paquet minimum d'articles non alimentaires (ANF) Sphère 2018, qui inclut le savon et les articles sanitaires comme normes minimales. Sélection multiple.
      es: Tipos de artículos de higiene disponibles actualmente en el hogar. Basado en el paquete mínimo de artículos no alimentarios (ANA) Esfera 2018, que incluye jabón y artículos sanitarios como estándares mínimos. Selección múltiple.
    enum_uri: aidops:HygieneItemType
    permissible_values:
      bar_soap:
        title:
          en: Bar soap or liquid soap
          fr: Savon en pain ou savon liquide
          es: Jabón en barra o jabón líquido
        description:
          en: Bar soap, liquid soap, or powder detergent available for personal hygiene. Bar and liquid soap qualify for JMP handwashing service observation.
          fr: Savon en pain, savon liquide ou lessive en poudre disponible pour l'hygiène personnelle. Le savon en pain et le savon liquide sont pris en compte pour l'observation du service de lavage des mains JMP.
          es: Jabón en barra, jabón líquido o detergente en polvo disponible para la higiene personal. El jabón en barra y el líquido califican para la observación del servicio de lavado de manos JMP.
      laundry_detergent:
        title:
          en: Laundry detergent or washing powder
          fr: Détergent à lessive ou lessive en poudre
          es: Detergente para ropa o polvo de lavado
        description:
          en: Laundry detergent or washing powder available for cleaning clothes. Distinct from soap used for personal hygiene.
          fr: Détergent à lessive ou lessive en poudre disponible pour le lavage des vêtements. Distinct du savon utilisé pour l'hygiène personnelle.
          es: Detergente para ropa o polvo de lavado disponible para lavar ropa. Distinto del jabón usado para la higiene personal.
      sanitary_napkins_or_pads:
        title:
          en: Sanitary napkins or pads (disposable)
          fr: Serviettes hygiéniques ou protège-slips (jetables)
          es: Toallas sanitarias o compresas (desechables)
        description:
          en: Disposable commercial sanitary napkins, pads, or pantyliners available in the household.
          fr: Serviettes hygiéniques commerciales jetables, protège-slips ou serviettes disponibles dans le ménage.
          es: Toallas sanitarias comerciales desechables, compresas o salvaslips disponibles en el hogar.
      reusable_menstrual_cloth:
        title:
          en: Reusable menstrual cloth or pad
          fr: Tissu ou serviette menstruelle réutilisable
          es: Paño o toalla menstrual reutilizable
        description:
          en: Reusable cloth pads or other reusable menstrual hygiene materials available in the household.
          fr: Serviettes hygiéniques en tissu réutilisables ou autres matériaux d'hygiène menstruelle réutilisables disponibles dans le ménage.
          es: Compresas de tela reutilizables u otros materiales de higiene menstrual reutilizables disponibles en el hogar.
      toothbrush:
        title:
          en: Toothbrush
          fr: Brosse à dents
          es: Cepillo de dientes
        description:
          en: A toothbrush available for dental hygiene.
          fr: Une brosse à dents disponible pour l'hygiène dentaire.
          es: Un cepillo de dientes disponible para la higiene dental.
      toothpaste:
        title:
          en: Toothpaste
          fr: Dentifrice
          es: Pasta de dientes
        description:
          en: Toothpaste available for dental hygiene.
          fr: Dentifrice disponible pour l'hygiène dentaire.
          es: Pasta de dientes disponible para la higiene dental.
      shampoo:
        title:
          en: Shampoo or hair washing product
          fr: Shampooing ou produit de lavage des cheveux
          es: Champú o producto para lavar el cabello
        description:
          en: Shampoo or other hair washing product available in the household.
          fr: Shampooing ou autre produit de lavage des cheveux disponible dans le ménage.
          es: Champú u otro producto para lavar el cabello disponible en el hogar.
      nail_clipper:
        title:
          en: Nail clipper or nail scissors
          fr: Coupe-ongles ou ciseaux à ongles
          es: Cortauñas o tijeras de uñas
        description:
          en: Nail cutting tool available for personal hygiene. Included in some NFI hygiene kits.
          fr: Outil de coupe des ongles disponible pour l'hygiène personnelle. Inclus dans certains kits d'hygiène ANF.
          es: Herramienta para cortar uñas disponible para la higiene personal. Incluida en algunos kits de higiene ANA.
      none:
        title:
          en: None of the above
          fr: Aucun des articles précités
          es: Ninguno de los anteriores
        description:
          en: No hygiene items from the list are currently available in the household.
          fr: Aucun article d'hygiène de la liste n'est actuellement disponible dans le ménage.
          es: No hay artículos de higiene de la lista disponibles actualmente en el hogar.
