  SocialCohesionTensionLevel:
    title:
      en: Social cohesion / tension level
      fr: Niveau de cohésion sociale / tension
      es: Nivel de cohesión social / tensión
    description:
      en: Community-perceived social cohesion and inter-group tension level, reported at community aggregate level. Used to flag relations between host and displaced populations, between ethnic, religious, or clan groups, or between residents and newcomers. The five substantive levels run from 'very good relations, no tension' to 'very tense, with frequent incidents'; explicit 'don't know' and 'prefer not to answer' codes are provided because the item is sensitive and may elicit non-response.
      fr: Niveau de cohésion sociale et de tension intergroupe tel que perçu par la communauté, rapporté au niveau agrégé communautaire. Utilisé pour signaler les relations entre populations d'accueil et déplacées, entre groupes ethniques, religieux ou claniques, ou entre résidents et nouveaux arrivants. Les cinq niveaux de fond vont de « très bonnes relations, sans tension » à « très tendues, avec des incidents fréquents » ; des codes explicites « ne sait pas » et « préfère ne pas répondre » sont prévus car l'item est sensible et peut susciter de la non-réponse.
      es: Nivel de cohesión social y tensión intergrupal percibido por la comunidad, reportado a nivel agregado comunitario. Utilizado para señalar las relaciones entre poblaciones de acogida y desplazadas, entre grupos étnicos, religiosos o clánicos, o entre residentes y recién llegados. Los cinco niveles sustantivos van de «muy buenas relaciones, sin tensión» a «muy tensas, con incidentes frecuentes»; se proporcionan códigos explícitos «no sabe» y «prefiere no responder» porque el ítem es sensible y puede generar falta de respuesta.
    enum_uri: aidops:SocialCohesionTensionLevel
    permissible_values:
      very_good_no_tension:
        title:
          en: Very good relations, no tension
          fr: Très bonnes relations, aucune tension
          es: Muy buenas relaciones, sin tensión
        description:
          en: Community perceives relations between groups as very good with no tension reported.
          fr: La communauté perçoit les relations entre groupes comme très bonnes, sans tension rapportée.
          es: La comunidad percibe las relaciones entre grupos como muy buenas, sin tensión reportada.
      generally_good_minor_tension:
        title:
          en: Generally good relations, minor tension
          fr: Relations généralement bonnes, tension mineure
          es: Relaciones generalmente buenas, tensión menor
        description:
          en: Community perceives relations as generally good with only minor, occasional friction.
          fr: La communauté perçoit des relations généralement bonnes avec seulement des frictions mineures et occasionnelles.
          es: La comunidad percibe las relaciones como generalmente buenas con solo fricciones menores y ocasionales.
      mixed:
        title:
          en: Mixed; depends on which groups
          fr: Mitigées ; cela dépend des groupes
          es: Mixtas; depende de qué grupos
        description:
          en: Community perceives relations as mixed — good with some groups, tense with others.
          fr: La communauté perçoit les relations comme mitigées — bonnes avec certains groupes, tendues avec d'autres.
          es: La comunidad percibe las relaciones como mixtas — buenas con algunos grupos y tensas con otros.
      tense_occasional_incidents:
        title:
          en: Tense, with occasional incidents
          fr: Tendues, avec des incidents occasionnels
          es: Tensas, con incidentes ocasionales
        description:
          en: Community perceives relations as tense, with occasional incidents of conflict between groups.
          fr: La communauté perçoit les relations comme tendues, avec des incidents occasionnels de conflit entre groupes.
          es: La comunidad percibe las relaciones como tensas, con incidentes ocasionales de conflicto entre grupos.
      very_tense_frequent_incidents:
        title:
          en: Very tense, with frequent incidents
          fr: Très tendues, avec des incidents fréquents
          es: Muy tensas, con incidentes frecuentes
        description:
          en: Community perceives relations as very tense, with frequent incidents of conflict between groups.
          fr: La communauté perçoit les relations comme très tendues, avec des incidents fréquents de conflit entre groupes.
          es: La comunidad percibe las relaciones como muy tensas, con incidentes frecuentes de conflicto entre grupos.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondents do not know how to characterise inter-group relations. A valid response, not to be re-coded as 'mixed' or missing.
          fr: Les répondants ne savent pas comment caractériser les relations intergroupes. Réponse valide qui ne doit pas être recodée comme « mitigées » ou manquante.
          es: Los encuestados no saben cómo caracterizar las relaciones intergrupales. Respuesta válida que no debe recodificarse como «mixtas» o faltante.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: The respondents prefer not to disclose their perception, typically because the topic is sensitive. A valid response, distinct from 'don't know'.
          fr: Les répondants préfèrent ne pas divulguer leur perception, généralement parce que le sujet est sensible. Réponse valide, distincte de « ne sait pas ».
          es: Los encuestados prefieren no divulgar su percepción, típicamente porque el tema es sensible. Respuesta válida, distinta de «no sabe».
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["undp-dppa-social-cohesion-2020"], "definition": {"en": "Community-perceived social cohesion and inter-group tension level, reported at community aggregate level. Used to flag relations between host and displaced populations, between ethnic, religious, or clan groups, or between residents and newcomers. The five substantive levels run from ''very good relations, no tension'' to ''very tense, with frequent incidents''; explicit ''don''t know'' and ''prefer not to answer'' codes are provided because the item is sensitive and may elicit non-response.", "es": "Nivel de cohesi\u00f3n social y tensi\u00f3n intergrupal percibido por la comunidad, reportado a nivel agregado comunitario. Utilizado para se\u00f1alar las relaciones entre poblaciones de acogida y desplazadas, entre grupos \u00e9tnicos, religiosos o cl\u00e1nicos, o entre residentes y reci\u00e9n llegados. Los cinco niveles sustantivos van de \u00abmuy buenas relaciones, sin tensi\u00f3n\u00bb a \u00abmuy tensas, con incidentes frecuentes\u00bb; se proporcionan c\u00f3digos expl\u00edcitos \u00abno sabe\u00bb y \u00abprefiere no responder\u00bb porque el \u00edtem es sensible y puede generar falta de respuesta.", "fr": "Niveau de coh\u00e9sion sociale et de tension intergroupe tel que per\u00e7u par la communaut\u00e9, rapport\u00e9 au niveau agr\u00e9g\u00e9 communautaire. Utilis\u00e9 pour signaler les relations entre populations d''accueil et d\u00e9plac\u00e9es, entre groupes ethniques, religieux ou claniques, ou entre r\u00e9sidents et nouveaux arrivants. Les cinq niveaux de fond vont de \u00ab tr\u00e8s bonnes relations, sans tension \u00bb \u00e0 \u00ab tr\u00e8s tendues, avec des incidents fr\u00e9quents \u00bb ; des codes explicites \u00ab ne sait pas \u00bb et \u00ab pr\u00e9f\u00e8re ne pas r\u00e9pondre \u00bb sont pr\u00e9vus car l''item est sensible et peut susciter de la non-r\u00e9ponse."}, "id": "social-cohesion-tension-level", "label": {"en": "Social cohesion / tension level", "es": "Nivel de cohesi\u00f3n social / tensi\u00f3n", "fr": "Niveau de coh\u00e9sion sociale / tension"}, "maturity": "draft", "standard": {"name": "UNDP-DPPA Social Cohesion Framework", "notes": "Tension-level scale informed by the UNDP-DPPA Social Cohesion Framework (horizontal, vertical, institutional cohesion), the UNHCR Peaceful Coexistence Framework, and Interpeace / Search for Common Ground conflict-sensitivity assessment templates.", "uri": "https://www.undp.org/publications/strengthening-social-cohesion-conceptual-framing-and-programming-implications"}, "values": [{"code": "very_good_no_tension", "definition": {"en": "Community perceives relations between groups as very good with no tension reported.", "es": "La comunidad percibe las relaciones entre grupos como muy buenas, sin tensi\u00f3n reportada.", "fr": "La communaut\u00e9 per\u00e7oit les relations entre groupes comme tr\u00e8s bonnes, sans tension rapport\u00e9e."}, "label": {"en": "Very good relations, no tension", "es": "Muy buenas relaciones, sin tensi\u00f3n", "fr": "Tr\u00e8s bonnes relations, aucune tension"}}, {"code": "generally_good_minor_tension", "definition": {"en": "Community perceives relations as generally good with only minor, occasional friction.", "es": "La comunidad percibe las relaciones como generalmente buenas con solo fricciones menores y ocasionales.", "fr": "La communaut\u00e9 per\u00e7oit des relations g\u00e9n\u00e9ralement bonnes avec seulement des frictions mineures et occasionnelles."}, "label": {"en": "Generally good relations, minor tension", "es": "Relaciones generalmente buenas, tensi\u00f3n menor", "fr": "Relations g\u00e9n\u00e9ralement bonnes, tension mineure"}}, {"code": "mixed", "definition": {"en": "Community perceives relations as mixed \u2014 good with some groups, tense with others.", "es": "La comunidad percibe las relaciones como mixtas \u2014 buenas con algunos grupos y tensas con otros.", "fr": "La communaut\u00e9 per\u00e7oit les relations comme mitig\u00e9es \u2014 bonnes avec certains groupes, tendues avec d''autres."}, "label": {"en": "Mixed; depends on which groups", "es": "Mixtas; depende de qu\u00e9 grupos", "fr": "Mitig\u00e9es ; cela d\u00e9pend des groupes"}}, {"code": "tense_occasional_incidents", "definition": {"en": "Community perceives relations as tense, with occasional incidents of conflict between groups.", "es": "La comunidad percibe las relaciones como tensas, con incidentes ocasionales de conflicto entre grupos.", "fr": "La communaut\u00e9 per\u00e7oit les relations comme tendues, avec des incidents occasionnels de conflit entre groupes."}, "label": {"en": "Tense, with occasional incidents", "es": "Tensas, con incidentes ocasionales", "fr": "Tendues, avec des incidents occasionnels"}}, {"code": "very_tense_frequent_incidents", "definition": {"en": "Community perceives relations as very tense, with frequent incidents of conflict between groups.", "es": "La comunidad percibe las relaciones como muy tensas, con incidentes frecuentes de conflicto entre grupos.", "fr": "La communaut\u00e9 per\u00e7oit les relations comme tr\u00e8s tendues, avec des incidents fr\u00e9quents de conflit entre groupes."}, "label": {"en": "Very tense, with frequent incidents", "es": "Muy tensas, con incidentes frecuentes", "fr": "Tr\u00e8s tendues, avec des incidents fr\u00e9quents"}}, {"code": "dont_know", "definition": {"en": "The respondents do not know how to characterise inter-group relations. A valid response, not to be re-coded as ''mixed'' or missing.", "es": "Los encuestados no saben c\u00f3mo caracterizar las relaciones intergrupales. Respuesta v\u00e1lida que no debe recodificarse como \u00abmixtas\u00bb o faltante.", "fr": "Les r\u00e9pondants ne savent pas comment caract\u00e9riser les relations intergroupes. R\u00e9ponse valide qui ne doit pas \u00eatre recod\u00e9e comme \u00ab mitig\u00e9es \u00bb ou manquante."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "prefer_not_to_answer", "definition": {"en": "The respondents prefer not to disclose their perception, typically because the topic is sensitive. A valid response, distinct from ''don''t know''.", "es": "Los encuestados prefieren no divulgar su percepci\u00f3n, t\u00edpicamente porque el tema es sensible. Respuesta v\u00e1lida, distinta de \u00abno sabe\u00bb.", "fr": "Les r\u00e9pondants pr\u00e9f\u00e8rent ne pas divulguer leur perception, g\u00e9n\u00e9ralement parce que le sujet est sensible. R\u00e9ponse valide, distincte de \u00ab ne sait pas \u00bb."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
