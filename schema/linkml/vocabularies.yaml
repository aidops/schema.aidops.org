  SeedSourceType:
    title:
      en: Seed Source Type
      fr: Type de source de semences
      es: Tipo de fuente de semillas
    description:
      en: 'Primary source of seed or planting material used by the household for its most important crop during the last completed agricultural season. Drawn directly from the FAO Standard Seed Security Assessment (SSA) Household Survey question ''What was your source of seed for the important CROP?''. Distinguishing own-saved seed, market-bought seed, agro-dealer seed, and humanitarian or government distributions is important for seed security analysis: own-saved and market-bought channels dominate in most smallholder contexts, while humanitarian or government distributions indicate prior seed shortage events.'
      fr: 'Principale source de semences ou de matériel de plantation utilisé par le ménage pour sa culture la plus importante au cours de la dernière saison agricole complète. Tirée directement de la question de l''Évaluation standard de la sécurité semencière (SSA) de la FAO : « Quelle était votre source de semences pour la CULTURE importante ? ». Distinguer les semences propres conservées, les semences achetées au marché, les semences achetées chez un revendeur agréé, et les distributions humanitaires ou gouvernementales est important pour l''analyse de la sécurité semencière : les semences propres et les achats au marché dominent dans la plupart des contextes de petits exploitants, tandis que les distributions humanitaires ou gouvernementales indiquent des événements antérieurs de pénurie de semences.'
      es: 'Fuente principal de semillas o material de siembra utilizado por el hogar para su cultivo más importante durante la última temporada agrícola completa. Tomada directamente de la pregunta de la Evaluación Estándar de Seguridad Semillera (SSA) de la FAO: ''¿Cuál fue su fuente de semilla para el CULTIVO importante?''. Distinguir semillas propias guardadas, semillas compradas en el mercado, semillas de agrodistribuidores, y distribuciones humanitarias o gubernamentales es importante para el análisis de seguridad semillera: las semillas propias y las compras en el mercado dominan en la mayoría de contextos de pequeños productores, mientras que las distribuciones humanitarias o gubernamentales indican eventos previos de escasez de semillas.'
    enum_uri: aidops:SeedSourceType
    permissible_values:
      own_saved:
        title:
          en: Own-saved seed
          fr: Semences propres conservées
          es: Semilla propia guardada
        description:
          en: Seed saved by the household from a previous harvest.
          fr: Semences conservées par le ménage à partir d'une récolte précédente.
          es: Semilla guardada por el hogar de una cosecha anterior.
      purchased_market:
        title:
          en: Purchased — open market or informal trader
          fr: Acheté — marché ouvert ou commerçant informel
          es: Comprado — mercado abierto o comerciante informal
        description:
          en: Seed bought from a local market or informal vendor without formal certification guarantee.
          fr: Semences achetées sur un marché local ou auprès d'un vendeur informel sans garantie de certification formelle.
          es: Semilla comprada en un mercado local o a un vendedor informal sin garantía de certificación formal.
      purchased_agro_dealer:
        title:
          en: Purchased — licensed agro-dealer or seed company
          fr: Acheté — revendeur agro-intrants agréé ou société semencière
          es: Comprado — agrodistribuidor autorizado o empresa semillera
        description:
          en: Seed bought from a certified agro-dealer or formal seed company.
          fr: Semences achetées auprès d'un revendeur agro-intrants certifié ou d'une société semencière formelle.
          es: Semilla comprada a un agrodistribuidor certificado o una empresa semillera formal.
      donor_ngo:
        title:
          en: Distributed by an NGO or humanitarian programme
          fr: Distribué par une ONG ou un programme humanitaire
          es: Distribuido por ONG o programa humanitario
        description:
          en: Seed received as in-kind assistance from an NGO or humanitarian agency.
          fr: Semences reçues en tant qu'assistance en nature d'une ONG ou d'une agence humanitaire.
          es: Semilla recibida como asistencia en especie de una ONG o agencia humanitaria.
      donor_government:
        title:
          en: Distributed by the government
          fr: Distribué par le gouvernement
          es: Distribuido por el gobierno
        description:
          en: Seed received through a government distribution or subsidy programme.
          fr: Semences reçues par le biais d'un programme de distribution ou de subvention gouvernemental.
          es: Semilla recibida a través de un programa de distribución o subsidio gubernamental.
      exchange_neighbor:
        title:
          en: Exchanged or received from neighbour / community
          fr: Échangé ou reçu d'un voisin ou de la communauté
          es: Intercambiado o recibido de vecino o comunidad
        description:
          en: Seed obtained through informal exchange or gift within the household's social network.
          fr: Semences obtenues par échange informel ou don au sein du réseau social du ménage.
          es: Semilla obtenida a través de intercambio informal o regalo dentro de la red social del hogar.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Seed source not covered by the other categories.
          fr: Source de semences non couverte par les autres catégories.
          es: Fuente de semillas no cubierta por las otras categorías.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Primary source of seed or planting material used by the household for its most important crop during the last completed agricultural season. Drawn directly from the FAO Standard Seed Security Assessment (SSA) Household Survey question ''What was your source of seed for the important CROP?''. Distinguishing own-saved seed, market-bought seed, agro-dealer seed, and humanitarian or government distributions is important for seed security analysis: own-saved and market-bought channels dominate in most smallholder contexts, while humanitarian or government distributions indicate prior seed shortage events.", "es": "Fuente principal de semillas o material de siembra utilizado por el hogar para su cultivo m\u00e1s importante durante la \u00faltima temporada agr\u00edcola completa. Tomada directamente de la pregunta de la Evaluaci\u00f3n Est\u00e1ndar de Seguridad Semillera (SSA) de la FAO: ''\u00bfCu\u00e1l fue su fuente de semilla para el CULTIVO importante?''. Distinguir semillas propias guardadas, semillas compradas en el mercado, semillas de agrodistribuidores, y distribuciones humanitarias o gubernamentales es importante para el an\u00e1lisis de seguridad semillera: las semillas propias y las compras en el mercado dominan en la mayor\u00eda de contextos de peque\u00f1os productores, mientras que las distribuciones humanitarias o gubernamentales indican eventos previos de escasez de semillas.", "fr": "Principale source de semences ou de mat\u00e9riel de plantation utilis\u00e9 par le m\u00e9nage pour sa culture la plus importante au cours de la derni\u00e8re saison agricole compl\u00e8te. Tir\u00e9e directement de la question de l''\u00c9valuation standard de la s\u00e9curit\u00e9 semenci\u00e8re (SSA) de la FAO : \u00ab Quelle \u00e9tait votre source de semences pour la CULTURE importante ? \u00bb. Distinguer les semences propres conserv\u00e9es, les semences achet\u00e9es au march\u00e9, les semences achet\u00e9es chez un revendeur agr\u00e9\u00e9, et les distributions humanitaires ou gouvernementales est important pour l''analyse de la s\u00e9curit\u00e9 semenci\u00e8re : les semences propres et les achats au march\u00e9 dominent dans la plupart des contextes de petits exploitants, tandis que les distributions humanitaires ou gouvernementales indiquent des \u00e9v\u00e9nements ant\u00e9rieurs de p\u00e9nurie de semences."}, "id": "seed-source-type", "label": {"en": "Seed Source Type", "es": "Tipo de fuente de semillas", "fr": "Type de source de semences"}, "maturity": "draft", "standard": {"name": "FAO Standard Seed Security Assessment \u2014 Household Survey", "notes": "FAO SSA 2015 Household Survey is the canonical instrument for seed source classification in humanitarian and development contexts.", "uri": "https://www.fao.org/fileadmin/user_upload/food-security-capacity-building/docs/Seeds/Training_Material/ParticipantsManual/Day_3/Day_3_-_S7-H1_Household_Survey.pdf"}, "values": [{"code": "own_saved", "definition": {"en": "Seed saved by the household from a previous harvest.", "es": "Semilla guardada por el hogar de una cosecha anterior.", "fr": "Semences conserv\u00e9es par le m\u00e9nage \u00e0 partir d''une r\u00e9colte pr\u00e9c\u00e9dente."}, "label": {"en": "Own-saved seed", "es": "Semilla propia guardada", "fr": "Semences propres conserv\u00e9es"}}, {"code": "purchased_market", "definition": {"en": "Seed bought from a local market or informal vendor without formal certification guarantee.", "es": "Semilla comprada en un mercado local o a un vendedor informal sin garant\u00eda de certificaci\u00f3n formal.", "fr": "Semences achet\u00e9es sur un march\u00e9 local ou aupr\u00e8s d''un vendeur informel sans garantie de certification formelle."}, "label": {"en": "Purchased \u2014 open market or informal trader", "es": "Comprado \u2014 mercado abierto o comerciante informal", "fr": "Achet\u00e9 \u2014 march\u00e9 ouvert ou commer\u00e7ant informel"}}, {"code": "purchased_agro_dealer", "definition": {"en": "Seed bought from a certified agro-dealer or formal seed company.", "es": "Semilla comprada a un agrodistribuidor certificado o una empresa semillera formal.", "fr": "Semences achet\u00e9es aupr\u00e8s d''un revendeur agro-intrants certifi\u00e9 ou d''une soci\u00e9t\u00e9 semenci\u00e8re formelle."}, "label": {"en": "Purchased \u2014 licensed agro-dealer or seed company", "es": "Comprado \u2014 agrodistribuidor autorizado o empresa semillera", "fr": "Achet\u00e9 \u2014 revendeur agro-intrants agr\u00e9\u00e9 ou soci\u00e9t\u00e9 semenci\u00e8re"}}, {"code": "donor_ngo", "definition": {"en": "Seed received as in-kind assistance from an NGO or humanitarian agency.", "es": "Semilla recibida como asistencia en especie de una ONG o agencia humanitaria.", "fr": "Semences re\u00e7ues en tant qu''assistance en nature d''une ONG ou d''une agence humanitaire."}, "label": {"en": "Distributed by an NGO or humanitarian programme", "es": "Distribuido por ONG o programa humanitario", "fr": "Distribu\u00e9 par une ONG ou un programme humanitaire"}}, {"code": "donor_government", "definition": {"en": "Seed received through a government distribution or subsidy programme.", "es": "Semilla recibida a trav\u00e9s de un programa de distribuci\u00f3n o subsidio gubernamental.", "fr": "Semences re\u00e7ues par le biais d''un programme de distribution ou de subvention gouvernemental."}, "label": {"en": "Distributed by the government", "es": "Distribuido por el gobierno", "fr": "Distribu\u00e9 par le gouvernement"}}, {"code": "exchange_neighbor", "definition": {"en": "Seed obtained through informal exchange or gift within the household''s social network.", "es": "Semilla obtenida a trav\u00e9s de intercambio informal o regalo dentro de la red social del hogar.", "fr": "Semences obtenues par \u00e9change informel ou don au sein du r\u00e9seau social du m\u00e9nage."}, "label": {"en": "Exchanged or received from neighbour / community", "es": "Intercambiado o recibido de vecino o comunidad", "fr": "\u00c9chang\u00e9 ou re\u00e7u d''un voisin ou de la communaut\u00e9"}}, {"code": "other", "definition": {"en": "Seed source not covered by the other categories.", "es": "Fuente de semillas no cubierta por las otras categor\u00edas.", "fr": "Source de semences non couverte par les autres cat\u00e9gories."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
  SelfMedicationFrequency:
    title:
      en: Self-Medication Frequency
      fr: Fréquence de l'automédication
      es: Frecuencia de la automedicación
    description:
      en: Four-level ordinal scale describing how often a household tries home remedies or self-medication before seeking formal health care. Used by `self_medication_first` in HealthAccessProfile. Self-medication as a first resort delays formal care-seeking and is a behavioral complement to the use of pharmacies recorded in `care-provider-type`.
      fr: Échelle ordinale à quatre niveaux décrivant la fréquence à laquelle un ménage essaie des remèdes maison ou l'automédication avant de chercher des soins formels. Utilisée par `self_medication_first` dans HealthAccessProfile. L'automédication comme premier recours retarde la recherche de soins formels et constitue un complément comportemental à l'utilisation des pharmacies enregistrée dans `care-provider-type`.
      es: Escala ordinal de cuatro niveles que describe con qué frecuencia un hogar prueba remedios caseros o automedicación antes de buscar atención formal. Utilizada por `self_medication_first` en HealthAccessProfile. La automedicación como primer recurso retrasa la búsqueda de atención formal y es un complemento conductual al uso de farmacias registrado en `care-provider-type`.
    enum_uri: aidops:SelfMedicationFrequency
    permissible_values:
      yes_always:
        title:
          en: Yes, always
          fr: Oui, toujours
          es: Sí, siempre
        description:
          en: The household always tries home remedies or self-medication before seeking formal care.
          fr: Le ménage essaie toujours des remèdes maison ou l'automédication avant de chercher des soins formels.
          es: El hogar siempre prueba remedios caseros o automedicación antes de buscar atención formal.
      yes_sometimes:
        title:
          en: Yes, sometimes
          fr: Oui, parfois
          es: Sí, a veces
        description:
          en: The household sometimes tries home remedies or self-medication before seeking formal care.
          fr: Le ménage essaie parfois des remèdes maison ou l'automédication avant de chercher des soins formels.
          es: El hogar a veces prueba remedios caseros o automedicación antes de buscar atención formal.
      rarely:
        title:
          en: Rarely
          fr: Rarement
          es: Raramente
        description:
          en: The household rarely resorts to home remedies or self-medication before seeking formal care.
          fr: Le ménage a rarement recours aux remèdes maison ou à l'automédication avant de chercher des soins formels.
          es: El hogar rara vez recurre a remedios caseros o automedicación antes de buscar atención formal.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: The household does not try home remedies or self-medication before seeking formal care.
          fr: Le ménage n'essaie pas de remèdes maison ou d'automédication avant de chercher des soins formels.
          es: El hogar no prueba remedios caseros o automedicación antes de buscar atención formal.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Four-level ordinal scale describing how often a household tries home remedies or self-medication before seeking formal health care. Used by `self_medication_first` in HealthAccessProfile. Self-medication as a first resort delays formal care-seeking and is a behavioral complement to the use of pharmacies recorded in `care-provider-type`.", "es": "Escala ordinal de cuatro niveles que describe con qu\u00e9 frecuencia un hogar prueba remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal. Utilizada por `self_medication_first` en HealthAccessProfile. La automedicaci\u00f3n como primer recurso retrasa la b\u00fasqueda de atenci\u00f3n formal y es un complemento conductual al uso de farmacias registrado en `care-provider-type`.", "fr": "\u00c9chelle ordinale \u00e0 quatre niveaux d\u00e9crivant la fr\u00e9quence \u00e0 laquelle un m\u00e9nage essaie des rem\u00e8des maison ou l''autom\u00e9dication avant de chercher des soins formels. Utilis\u00e9e par `self_medication_first` dans HealthAccessProfile. L''autom\u00e9dication comme premier recours retarde la recherche de soins formels et constitue un compl\u00e9ment comportemental \u00e0 l''utilisation des pharmacies enregistr\u00e9e dans `care-provider-type`."}, "id": "self-medication-frequency", "label": {"en": "Self-Medication Frequency", "es": "Frecuencia de la automedicaci\u00f3n", "fr": "Fr\u00e9quence de l''autom\u00e9dication"}, "maturity": "draft", "values": [{"code": "yes_always", "definition": {"en": "The household always tries home remedies or self-medication before seeking formal care.", "es": "El hogar siempre prueba remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal.", "fr": "Le m\u00e9nage essaie toujours des rem\u00e8des maison ou l''autom\u00e9dication avant de chercher des soins formels."}, "label": {"en": "Yes, always", "es": "S\u00ed, siempre", "fr": "Oui, toujours"}}, {"code": "yes_sometimes", "definition": {"en": "The household sometimes tries home remedies or self-medication before seeking formal care.", "es": "El hogar a veces prueba remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal.", "fr": "Le m\u00e9nage essaie parfois des rem\u00e8des maison ou l''autom\u00e9dication avant de chercher des soins formels."}, "label": {"en": "Yes, sometimes", "es": "S\u00ed, a veces", "fr": "Oui, parfois"}}, {"code": "rarely", "definition": {"en": "The household rarely resorts to home remedies or self-medication before seeking formal care.", "es": "El hogar rara vez recurre a remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal.", "fr": "Le m\u00e9nage a rarement recours aux rem\u00e8des maison ou \u00e0 l''autom\u00e9dication avant de chercher des soins formels."}, "label": {"en": "Rarely", "es": "Raramente", "fr": "Rarement"}}, {"code": "no", "definition": {"en": "The household does not try home remedies or self-medication before seeking formal care.", "es": "El hogar no prueba remedios caseros o automedicaci\u00f3n antes de buscar atenci\u00f3n formal.", "fr": "Le m\u00e9nage n''essaie pas de rem\u00e8des maison ou d''autom\u00e9dication avant de chercher des soins formels."}, "label": {"en": "No", "es": "No", "fr": "Non"}}]}'
  ServiceDisruptionType:
    title:
      en: Service Disruption Type
      fr: Type d'interruption de service
      es: Tipo de interrupción de servicio
    description:
      en: 'Essential services that may be disrupted in a post-shock context. Multi-select vocabulary: a record lists every service currently disrupted at the household''s dwelling. Codes cover both full interruption (service not functioning at all) and partial interruption such as intermittent supply or unsafe water, so a record can describe present-but-non-functional and present-but-contaminated cases in addition to complete outages. This captures functional status after the shock; the household''s usual service infrastructure type is recorded separately by water_source, sanitation_facility, and electricity_access.'
      fr: 'Services essentiels susceptibles d''être interrompus dans un contexte post-choc. Vocabulaire multi-sélection : un enregistrement liste chaque service actuellement interrompu au logement du ménage. Les codes couvrent l''interruption complète (service non fonctionnel) et l''interruption partielle telle qu''un approvisionnement intermittent ou une eau non potable, de sorte qu''un enregistrement peut décrire les cas présents-mais-non-fonctionnels et présents-mais-contaminés en plus des coupures totales. Ceci consigne l''état fonctionnel après le choc ; le type d''infrastructure de service habituel du ménage est consigné séparément par water_source, sanitation_facility et electricity_access.'
      es: 'Servicios esenciales que pueden interrumpirse en un contexto post-choque. Vocabulario de selección múltiple: un registro enumera cada servicio actualmente interrumpido en la vivienda del hogar. Los códigos cubren tanto la interrupción total (servicio que no funciona) como la interrupción parcial, como suministro intermitente o agua no apta, de modo que un registro puede describir casos presentes-pero-no-funcionales y presentes-pero-contaminados además de los cortes totales. Esto capta el estado funcional después del choque; el tipo de infraestructura de servicio habitual del hogar se registra por separado por water_source, sanitation_facility y electricity_access.'
    enum_uri: aidops:ServiceDisruptionType
    permissible_values:
      water:
        title:
          en: Water
          fr: Eau
          es: Agua
        description:
          en: Drinking-water supply is not functioning or not available.
          fr: L'approvisionnement en eau potable ne fonctionne pas ou n'est pas disponible.
          es: El suministro de agua potable no funciona o no está disponible.
      sanitation:
        title:
          en: Sanitation
          fr: Assainissement
          es: Saneamiento
        description:
          en: Sanitation facility (toilet, latrine, greywater disposal) is damaged or unusable.
          fr: L'installation d'assainissement (toilette, latrine, évacuation des eaux grises) est endommagée ou inutilisable.
          es: La instalación de saneamiento (inodoro, letrina, evacuación de aguas grises) está dañada o inutilizable.
      electricity:
        title:
          en: Electricity
          fr: Électricité
          es: Electricidad
        description:
          en: Grid or off-grid electricity supply is not functioning.
          fr: L'alimentation électrique du réseau ou hors réseau ne fonctionne pas.
          es: El suministro eléctrico de la red o fuera de red no funciona.
      telecommunications:
        title:
          en: Telecommunications
          fr: Télécommunications
          es: Telecomunicaciones
        description:
          en: Mobile or fixed-line telecommunications (voice, SMS, data) are not functioning.
          fr: Les télécommunications mobiles ou fixes (voix, SMS, données) ne fonctionnent pas.
          es: Las telecomunicaciones móviles o de línea fija (voz, SMS, datos) no funcionan.
      water_unsafe:
        title:
          en: Water present but unsafe
          fr: Eau disponible mais non potable
          es: Agua disponible pero no apta
        description:
          en: Drinking-water supply is physically available but contaminated or otherwise not safe to drink without further treatment (for example, visibly turbid, microbiologically unsafe, or mixed with sewage). Use alongside the water code when both outage and safety issues are relevant.
          fr: L'approvisionnement en eau potable est physiquement disponible mais contaminé ou non sûr à boire sans traitement supplémentaire (par exemple, visiblement trouble, microbiologiquement non sûr, ou mélangé aux eaux usées). À utiliser aux côtés du code water lorsque les deux problèmes de coupure et de salubrité sont pertinents.
          es: El suministro de agua potable está físicamente disponible pero contaminado o no es seguro para beber sin tratamiento adicional (por ejemplo, visiblemente turbio, microbiológicamente no seguro o mezclado con aguas residuales). Usar junto al código water cuando sean relevantes tanto la interrupción como los problemas de salubridad.
      water_intermittent:
        title:
          en: Water intermittent
          fr: Eau intermittente
          es: Agua intermitente
        description:
          en: Drinking-water supply is functioning only part of the time (scheduled rationing, pressure drops, or unreliable source), such that household access is not continuous.
          fr: L'approvisionnement en eau potable ne fonctionne qu'une partie du temps (rationnement programmé, baisses de pression ou source non fiable), de sorte que l'accès du ménage n'est pas continu.
          es: El suministro de agua potable funciona solo parte del tiempo (racionamiento programado, caídas de presión o fuente poco fiable), de modo que el acceso del hogar no es continuo.
      electricity_intermittent:
        title:
          en: Electricity intermittent
          fr: Électricité intermittente
          es: Electricidad intermitente
        description:
          en: Grid or off-grid electricity supply is functioning only part of the time (scheduled load shedding, partial-day outages, unreliable source), such that continuous household use is not possible.
          fr: L'alimentation électrique du réseau ou hors réseau ne fonctionne qu'une partie du temps (délestage programmé, coupures partielles de journée, source non fiable), de sorte qu'un usage domestique continu n'est pas possible.
          es: El suministro eléctrico de la red o fuera de red funciona solo parte del tiempo (cortes programados de carga, apagones parciales del día, fuente poco fiable), de modo que el uso continuo en el hogar no es posible.
      sanitation_overflowing:
        title:
          en: Sanitation overflowing or unsanitary
          fr: Assainissement débordant ou insalubre
          es: Saneamiento desbordado o insalubre
        description:
          en: Sanitation facility is physically present but overflowing, flooded, or otherwise in an unsanitary state that makes safe use impossible (e.g., a pit latrine inundated after flooding). Use alongside the sanitation code when both full breakdown and unsanitary state are relevant.
          fr: L'installation d'assainissement est physiquement présente mais débordante, inondée ou dans un état insalubre qui rend un usage sûr impossible (par exemple, une latrine à fosse inondée après une inondation). À utiliser aux côtés du code sanitation lorsque l'effondrement complet et l'état insalubre sont tous deux pertinents.
          es: La instalación de saneamiento está físicamente presente pero desbordándose, inundada o en un estado insalubre que hace imposible su uso seguro (por ejemplo, una letrina de pozo inundada tras una inundación). Usar junto al código sanitation cuando sean relevantes tanto la avería total como el estado insalubre.
      none:
        title:
          en: No service disruption
          fr: Aucune interruption de service
          es: Sin interrupción de servicio
        description:
          en: Recorded explicitly to distinguish from missing observation when the household reports that all services are currently functioning.
          fr: Consigné explicitement pour distinguer d'une observation absente lorsque le ménage rapporte que tous les services fonctionnent actuellement.
          es: Registrado explícitamente para distinguirse de una observación ausente cuando el hogar reporta que todos los servicios funcionan actualmente.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iasc-mira"], "definition": {"en": "Essential services that may be disrupted in a post-shock context. Multi-select vocabulary: a record lists every service currently disrupted at the household''s dwelling. Codes cover both full interruption (service not functioning at all) and partial interruption such as intermittent supply or unsafe water, so a record can describe present-but-non-functional and present-but-contaminated cases in addition to complete outages. This captures functional status after the shock; the household''s usual service infrastructure type is recorded separately by water_source, sanitation_facility, and electricity_access.", "es": "Servicios esenciales que pueden interrumpirse en un contexto post-choque. Vocabulario de selecci\u00f3n m\u00faltiple: un registro enumera cada servicio actualmente interrumpido en la vivienda del hogar. Los c\u00f3digos cubren tanto la interrupci\u00f3n total (servicio que no funciona) como la interrupci\u00f3n parcial, como suministro intermitente o agua no apta, de modo que un registro puede describir casos presentes-pero-no-funcionales y presentes-pero-contaminados adem\u00e1s de los cortes totales. Esto capta el estado funcional despu\u00e9s del choque; el tipo de infraestructura de servicio habitual del hogar se registra por separado por water_source, sanitation_facility y electricity_access.", "fr": "Services essentiels susceptibles d''\u00eatre interrompus dans un contexte post-choc. Vocabulaire multi-s\u00e9lection : un enregistrement liste chaque service actuellement interrompu au logement du m\u00e9nage. Les codes couvrent l''interruption compl\u00e8te (service non fonctionnel) et l''interruption partielle telle qu''un approvisionnement intermittent ou une eau non potable, de sorte qu''un enregistrement peut d\u00e9crire les cas pr\u00e9sents-mais-non-fonctionnels et pr\u00e9sents-mais-contamin\u00e9s en plus des coupures totales. Ceci consigne l''\u00e9tat fonctionnel apr\u00e8s le choc ; le type d''infrastructure de service habituel du m\u00e9nage est consign\u00e9 s\u00e9par\u00e9ment par water_source, sanitation_facility et electricity_access."}, "id": "service-disruption-type", "label": {"en": "Service Disruption Type", "es": "Tipo de interrupci\u00f3n de servicio", "fr": "Type d''interruption de service"}, "maturity": "draft", "values": [{"code": "water", "definition": {"en": "Drinking-water supply is not functioning or not available.", "es": "El suministro de agua potable no funciona o no est\u00e1 disponible.", "fr": "L''approvisionnement en eau potable ne fonctionne pas ou n''est pas disponible."}, "label": {"en": "Water", "es": "Agua", "fr": "Eau"}}, {"code": "sanitation", "definition": {"en": "Sanitation facility (toilet, latrine, greywater disposal) is damaged or unusable.", "es": "La instalaci\u00f3n de saneamiento (inodoro, letrina, evacuaci\u00f3n de aguas grises) est\u00e1 da\u00f1ada o inutilizable.", "fr": "L''installation d''assainissement (toilette, latrine, \u00e9vacuation des eaux grises) est endommag\u00e9e ou inutilisable."}, "label": {"en": "Sanitation", "es": "Saneamiento", "fr": "Assainissement"}}, {"code": "electricity", "definition": {"en": "Grid or off-grid electricity supply is not functioning.", "es": "El suministro el\u00e9ctrico de la red o fuera de red no funciona.", "fr": "L''alimentation \u00e9lectrique du r\u00e9seau ou hors r\u00e9seau ne fonctionne pas."}, "label": {"en": "Electricity", "es": "Electricidad", "fr": "\u00c9lectricit\u00e9"}}, {"code": "telecommunications", "definition": {"en": "Mobile or fixed-line telecommunications (voice, SMS, data) are not functioning.", "es": "Las telecomunicaciones m\u00f3viles o de l\u00ednea fija (voz, SMS, datos) no funcionan.", "fr": "Les t\u00e9l\u00e9communications mobiles ou fixes (voix, SMS, donn\u00e9es) ne fonctionnent pas."}, "label": {"en": "Telecommunications", "es": "Telecomunicaciones", "fr": "T\u00e9l\u00e9communications"}}, {"code": "water_unsafe", "definition": {"en": "Drinking-water supply is physically available but contaminated or otherwise not safe to drink without further treatment (for example, visibly turbid, microbiologically unsafe, or mixed with sewage). Use alongside the water code when both outage and safety issues are relevant.", "es": "El suministro de agua potable est\u00e1 f\u00edsicamente disponible pero contaminado o no es seguro para beber sin tratamiento adicional (por ejemplo, visiblemente turbio, microbiol\u00f3gicamente no seguro o mezclado con aguas residuales). Usar junto al c\u00f3digo water cuando sean relevantes tanto la interrupci\u00f3n como los problemas de salubridad.", "fr": "L''approvisionnement en eau potable est physiquement disponible mais contamin\u00e9 ou non s\u00fbr \u00e0 boire sans traitement suppl\u00e9mentaire (par exemple, visiblement trouble, microbiologiquement non s\u00fbr, ou m\u00e9lang\u00e9 aux eaux us\u00e9es). \u00c0 utiliser aux c\u00f4t\u00e9s du code water lorsque les deux probl\u00e8mes de coupure et de salubrit\u00e9 sont pertinents."}, "label": {"en": "Water present but unsafe", "es": "Agua disponible pero no apta", "fr": "Eau disponible mais non potable"}}, {"code": "water_intermittent", "definition": {"en": "Drinking-water supply is functioning only part of the time (scheduled rationing, pressure drops, or unreliable source), such that household access is not continuous.", "es": "El suministro de agua potable funciona solo parte del tiempo (racionamiento programado, ca\u00eddas de presi\u00f3n o fuente poco fiable), de modo que el acceso del hogar no es continuo.", "fr": "L''approvisionnement en eau potable ne fonctionne qu''une partie du temps (rationnement programm\u00e9, baisses de pression ou source non fiable), de sorte que l''acc\u00e8s du m\u00e9nage n''est pas continu."}, "label": {"en": "Water intermittent", "es": "Agua intermitente", "fr": "Eau intermittente"}}, {"code": "electricity_intermittent", "definition": {"en": "Grid or off-grid electricity supply is functioning only part of the time (scheduled load shedding, partial-day outages, unreliable source), such that continuous household use is not possible.", "es": "El suministro el\u00e9ctrico de la red o fuera de red funciona solo parte del tiempo (cortes programados de carga, apagones parciales del d\u00eda, fuente poco fiable), de modo que el uso continuo en el hogar no es posible.", "fr": "L''alimentation \u00e9lectrique du r\u00e9seau ou hors r\u00e9seau ne fonctionne qu''une partie du temps (d\u00e9lestage programm\u00e9, coupures partielles de journ\u00e9e, source non fiable), de sorte qu''un usage domestique continu n''est pas possible."}, "label": {"en": "Electricity intermittent", "es": "Electricidad intermitente", "fr": "\u00c9lectricit\u00e9 intermittente"}}, {"code": "sanitation_overflowing", "definition": {"en": "Sanitation facility is physically present but overflowing, flooded, or otherwise in an unsanitary state that makes safe use impossible (e.g., a pit latrine inundated after flooding). Use alongside the sanitation code when both full breakdown and unsanitary state are relevant.", "es": "La instalaci\u00f3n de saneamiento est\u00e1 f\u00edsicamente presente pero desbord\u00e1ndose, inundada o en un estado insalubre que hace imposible su uso seguro (por ejemplo, una letrina de pozo inundada tras una inundaci\u00f3n). Usar junto al c\u00f3digo sanitation cuando sean relevantes tanto la aver\u00eda total como el estado insalubre.", "fr": "L''installation d''assainissement est physiquement pr\u00e9sente mais d\u00e9bordante, inond\u00e9e ou dans un \u00e9tat insalubre qui rend un usage s\u00fbr impossible (par exemple, une latrine \u00e0 fosse inond\u00e9e apr\u00e8s une inondation). \u00c0 utiliser aux c\u00f4t\u00e9s du code sanitation lorsque l''effondrement complet et l''\u00e9tat insalubre sont tous deux pertinents."}, "label": {"en": "Sanitation overflowing or unsanitary", "es": "Saneamiento desbordado o insalubre", "fr": "Assainissement d\u00e9bordant ou insalubre"}}, {"code": "none", "definition": {"en": "Recorded explicitly to distinguish from missing observation when the household reports that all services are currently functioning.", "es": "Registrado expl\u00edcitamente para distinguirse de una observaci\u00f3n ausente cuando el hogar reporta que todos los servicios funcionan actualmente.", "fr": "Consign\u00e9 explicitement pour distinguer d''une observation absente lorsque le m\u00e9nage rapporte que tous les services fonctionnent actuellement."}, "label": {"en": "No service disruption", "es": "Sin interrupci\u00f3n de servicio", "fr": "Aucune interruption de service"}}]}'
      bibliography_refs: iasc-mira
  ShelterDamageLevel:
    title:
      en: Shelter Damage Level
      fr: Niveau de dommages à l'abri
      es: Nivel de daños al refugio
    description:
      en: Severity of physical damage to a dwelling observed in a post-shock assessment. The five-tier scale below follows IOM Displacement Tracking Matrix (DTM) labels and aligns with Sphere Handbook 2018 Chapter 4 damage categories. The Shelter Cluster's four-tier assessment (heavily / moderately / slightly damaged / no damage) maps onto this scale with the destroyed tier folded into heavily damaged; system_mappings records that crosswalk.
      fr: Gravité des dommages physiques à un logement observés lors d'une évaluation post-choc. L'échelle à cinq niveaux ci-dessous suit les libellés de la Displacement Tracking Matrix (DTM) de l'OIM et s'aligne sur les catégories de dommages du Manuel Sphère 2018 chapitre 4. L'évaluation à quatre niveaux du Shelter Cluster (gravement / modérément / légèrement endommagé / pas de dommages) se projette sur cette échelle en repliant le niveau détruit sur gravement endommagé ; system_mappings enregistre cette correspondance.
      es: Gravedad de los daños físicos a una vivienda observados en una evaluación post-choque. La escala de cinco niveles que figura abajo sigue las etiquetas de la Matriz de Seguimiento del Desplazamiento (DTM) de la OIM y se alinea con las categorías de daños del Manual Esfera 2018 capítulo 4. La evaluación de cuatro niveles del Shelter Cluster (gravemente / moderadamente / ligeramente dañado / sin daños) se asigna a esta escala plegando el nivel destruido sobre gravemente dañado; system_mappings registra ese cruce.
    enum_uri: aidops:ShelterDamageLevel
    permissible_values:
      destroyed:
        title:
          en: Destroyed
          fr: Détruit
          es: Destruido
        description:
          en: The structure is completely destroyed or collapsed; rebuilding from foundation is required. Not habitable under any condition.
          fr: La structure est complètement détruite ou effondrée ; une reconstruction depuis les fondations est requise. Non habitable sous aucune condition.
          es: La estructura está completamente destruida o colapsada; se requiere reconstrucción desde los cimientos. No habitable bajo ninguna condición.
      severely_damaged:
        title:
          en: Severely damaged
          fr: Gravement endommagé
          es: Gravemente dañado
        description:
          en: Major structural damage to load-bearing elements (walls, roof, foundation) rendering the dwelling unsafe. Extensive reconstruction is required before safe occupancy.
          fr: Dommages structuraux majeurs aux éléments porteurs (murs, toit, fondations) rendant le logement dangereux. Une reconstruction étendue est nécessaire avant toute occupation sûre.
          es: Daños estructurales mayores a los elementos portantes (muros, techo, cimientos) que hacen insegura la vivienda. Se requiere reconstrucción extensa antes de una ocupación segura.
      moderately_damaged:
        title:
          en: Moderately damaged
          fr: Modérément endommagé
          es: Moderadamente dañado
        description:
          en: Significant damage to non-structural elements (walls, openings, partitions) or limited structural damage. Major repairs are required; dwelling may be temporarily uninhabitable.
          fr: Dommages importants aux éléments non structuraux (murs, ouvertures, cloisons) ou dommages structuraux limités. Des réparations majeures sont nécessaires ; le logement peut être temporairement inhabitable.
          es: Daños significativos a elementos no estructurales (muros, vanos, tabiques) o daños estructurales limitados. Se requieren reparaciones mayores; la vivienda puede ser temporalmente inhabitable.
      minor_damage:
        title:
          en: Minor damage
          fr: Dommages mineurs
          es: Daños menores
        description:
          en: Minor cosmetic or surface damage (cracks, finishes, fixtures). Dwelling remains habitable; minor household-level repairs are sufficient.
          fr: Dommages cosmétiques ou de surface mineurs (fissures, finitions, équipements). Le logement reste habitable ; des réparations mineures au niveau du ménage suffisent.
          es: Daños cosméticos o de superficie menores (grietas, acabados, accesorios). La vivienda sigue siendo habitable; reparaciones menores a nivel del hogar son suficientes.
      undamaged:
        title:
          en: Undamaged
          fr: Non endommagé
          es: Sin daños
        description:
          en: No observable damage from the shock. Recorded to distinguish from missing observation.
          fr: Aucun dommage observable dû au choc. Enregistré pour distinguer de l'absence d'observation.
          es: Sin daños observables por el choque. Registrado para distinguirlo de la ausencia de observación.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["global-shelter-cluster", "iom-dtm", "undp-eu-wb-pdna"], "definition": {"en": "Severity of physical damage to a dwelling observed in a post-shock assessment. The five-tier scale below follows IOM Displacement Tracking Matrix (DTM) labels and aligns with Sphere Handbook 2018 Chapter 4 damage categories. The Shelter Cluster''s four-tier assessment (heavily / moderately / slightly damaged / no damage) maps onto this scale with the destroyed tier folded into heavily damaged; system_mappings records that crosswalk.", "es": "Gravedad de los da\u00f1os f\u00edsicos a una vivienda observados en una evaluaci\u00f3n post-choque. La escala de cinco niveles que figura abajo sigue las etiquetas de la Matriz de Seguimiento del Desplazamiento (DTM) de la OIM y se alinea con las categor\u00edas de da\u00f1os del Manual Esfera 2018 cap\u00edtulo 4. La evaluaci\u00f3n de cuatro niveles del Shelter Cluster (gravemente / moderadamente / ligeramente da\u00f1ado / sin da\u00f1os) se asigna a esta escala plegando el nivel destruido sobre gravemente da\u00f1ado; system_mappings registra ese cruce.", "fr": "Gravit\u00e9 des dommages physiques \u00e0 un logement observ\u00e9s lors d''une \u00e9valuation post-choc. L''\u00e9chelle \u00e0 cinq niveaux ci-dessous suit les libell\u00e9s de la Displacement Tracking Matrix (DTM) de l''OIM et s''aligne sur les cat\u00e9gories de dommages du Manuel Sph\u00e8re 2018 chapitre 4. L''\u00e9valuation \u00e0 quatre niveaux du Shelter Cluster (gravement / mod\u00e9r\u00e9ment / l\u00e9g\u00e8rement endommag\u00e9 / pas de dommages) se projette sur cette \u00e9chelle en repliant le niveau d\u00e9truit sur gravement endommag\u00e9 ; system_mappings enregistre cette correspondance."}, "id": "shelter-damage-level", "label": {"en": "Shelter Damage Level", "es": "Nivel de da\u00f1os al refugio", "fr": "Niveau de dommages \u00e0 l''abri"}, "maturity": "draft", "standard": {"name": "IOM Displacement Tracking Matrix (DTM) Shelter Damage Assessment", "notes": "IOM DTM''s post-disaster damage labels are the most widely reused operational taxonomy for this measurement; the Global Shelter Cluster''s four-tier version is the second-most common. Neither is a legal or engineering classification, and neither claims to be. Sphere 2018 Chapter 4 frames the operational use of these tiers for recovery programming.", "uri": "https://dtm.iom.int/"}, "system_mappings": {"shelter_cluster_4tier": {"note": "The Shelter Cluster four-tier tool does not carry a standalone ''destroyed'' code; in practice teams using that tool record destroyed structures as ''heavily damaged'' with a narrative note. Programs using this crosswalk should surface destroyed cases as a separate flag or in reporting narrative.", "unmapped_canonical": ["destroyed"], "values": [{"code": "heavily_damaged", "label": "Heavily damaged", "maps_to": "severely_damaged", "note": "Shelter Cluster does not split the destroyed tier from severe damage; publishers using this mapping must decide contextually how to distinguish total collapse from severe damage."}, {"code": "moderately_damaged", "label": "Moderately damaged", "maps_to": "moderately_damaged"}, {"code": "slightly_damaged", "label": "Slightly damaged", "maps_to": "minor_damage"}, {"code": "no_damage", "label": "No damage", "maps_to": "undamaged"}], "vocabulary_name": "Global Shelter Cluster four-tier assessment"}}, "values": [{"code": "destroyed", "definition": {"en": "The structure is completely destroyed or collapsed; rebuilding from foundation is required. Not habitable under any condition.", "es": "La estructura est\u00e1 completamente destruida o colapsada; se requiere reconstrucci\u00f3n desde los cimientos. No habitable bajo ninguna condici\u00f3n.", "fr": "La structure est compl\u00e8tement d\u00e9truite ou effondr\u00e9e ; une reconstruction depuis les fondations est requise. Non habitable sous aucune condition."}, "label": {"en": "Destroyed", "es": "Destruido", "fr": "D\u00e9truit"}}, {"code": "severely_damaged", "definition": {"en": "Major structural damage to load-bearing elements (walls, roof, foundation) rendering the dwelling unsafe. Extensive reconstruction is required before safe occupancy.", "es": "Da\u00f1os estructurales mayores a los elementos portantes (muros, techo, cimientos) que hacen insegura la vivienda. Se requiere reconstrucci\u00f3n extensa antes de una ocupaci\u00f3n segura.", "fr": "Dommages structuraux majeurs aux \u00e9l\u00e9ments porteurs (murs, toit, fondations) rendant le logement dangereux. Une reconstruction \u00e9tendue est n\u00e9cessaire avant toute occupation s\u00fbre."}, "label": {"en": "Severely damaged", "es": "Gravemente da\u00f1ado", "fr": "Gravement endommag\u00e9"}}, {"code": "moderately_damaged", "definition": {"en": "Significant damage to non-structural elements (walls, openings, partitions) or limited structural damage. Major repairs are required; dwelling may be temporarily uninhabitable.", "es": "Da\u00f1os significativos a elementos no estructurales (muros, vanos, tabiques) o da\u00f1os estructurales limitados. Se requieren reparaciones mayores; la vivienda puede ser temporalmente inhabitable.", "fr": "Dommages importants aux \u00e9l\u00e9ments non structuraux (murs, ouvertures, cloisons) ou dommages structuraux limit\u00e9s. Des r\u00e9parations majeures sont n\u00e9cessaires ; le logement peut \u00eatre temporairement inhabitable."}, "label": {"en": "Moderately damaged", "es": "Moderadamente da\u00f1ado", "fr": "Mod\u00e9r\u00e9ment endommag\u00e9"}}, {"code": "minor_damage", "definition": {"en": "Minor cosmetic or surface damage (cracks, finishes, fixtures). Dwelling remains habitable; minor household-level repairs are sufficient.", "es": "Da\u00f1os cosm\u00e9ticos o de superficie menores (grietas, acabados, accesorios). La vivienda sigue siendo habitable; reparaciones menores a nivel del hogar son suficientes.", "fr": "Dommages cosm\u00e9tiques ou de surface mineurs (fissures, finitions, \u00e9quipements). Le logement reste habitable ; des r\u00e9parations mineures au niveau du m\u00e9nage suffisent."}, "label": {"en": "Minor damage", "es": "Da\u00f1os menores", "fr": "Dommages mineurs"}}, {"code": "undamaged", "definition": {"en": "No observable damage from the shock. Recorded to distinguish from missing observation.", "es": "Sin da\u00f1os observables por el choque. Registrado para distinguirlo de la ausencia de observaci\u00f3n.", "fr": "Aucun dommage observable d\u00fb au choc. Enregistr\u00e9 pour distinguer de l''absence d''observation."}, "label": {"en": "Undamaged", "es": "Sin da\u00f1os", "fr": "Non endommag\u00e9"}}]}'
      bibliography_refs: global-shelter-cluster,iom-dtm,undp-eu-wb-pdna
  ShelterRepairKitCoverage:
    title:
      en: Shelter repair tool kit coverage (3-level)
      fr: Couverture du kit d'outils de réparation d'abri (3 niveaux)
      es: Cobertura del kit de herramientas de reparación de refugio (3 niveles)
    description:
      en: Three-level scale describing whether a household holds the Sphere-minimum shelter repair tool set (hammer or equivalent striking tool, nails, and rope or wire). Used as a binary adequacy proxy for Sphere NFI Standard 4 on tools and equipment, distinct from technical-assistance-type which captures the guidance received.
      fr: Échelle à trois niveaux décrivant si un ménage possède l'ensemble minimal Sphère d'outils de réparation d'abri (marteau ou outil de frappe équivalent, clous et corde ou fil de fer). Utilisée comme indicateur binaire d'adéquation pour la Norme Sphère 4 sur les outils et équipements, distincte de technical-assistance-type qui consigne les conseils reçus.
      es: Escala de tres niveles que describe si un hogar tiene el conjunto mínimo Esfera de herramientas de reparación de refugio (martillo o herramienta de golpeo equivalente, clavos y cuerda o alambre). Utilizada como indicador binario de adecuación para la Norma Esfera 4 sobre herramientas y equipos, distinta de technical-assistance-type que registra la orientación recibida.
    enum_uri: aidops:ShelterRepairKitCoverage
    permissible_values:
      yes_full_kit:
        title:
          en: Yes — full kit present
          fr: Oui — kit complet présent
          es: Sí — kit completo presente
        description:
          en: Household has a hammer (or equivalent striking tool), nails, and rope or wire — the Sphere-minimum shelter repair set.
          fr: Le ménage possède un marteau (ou un outil de frappe équivalent), des clous et de la corde ou du fil de fer — l'ensemble minimal Sphère de réparation d'abri.
          es: El hogar tiene un martillo (o herramienta de golpeo equivalente), clavos y cuerda o alambre — el conjunto mínimo Esfera de reparación de refugio.
      yes_partial:
        title:
          en: Partial — some tools present
          fr: Partiel — certains outils présents
          es: Parcial — algunas herramientas presentes
        description:
          en: Household has at least one shelter repair tool from the minimum set but not all components.
          fr: Le ménage possède au moins un outil de réparation d'abri du jeu minimal mais pas tous les composants.
          es: El hogar tiene al menos una herramienta de reparación de refugio del conjunto mínimo pero no todos los componentes.
      'no':
        title:
          en: No — no tools
          fr: Non — aucun outil
          es: No — sin herramientas
        description:
          en: Household has none of the basic shelter repair tools.
          fr: Le ménage ne possède aucun des outils de réparation d'abri de base.
          es: El hogar no tiene ninguna de las herramientas básicas de reparación de refugio.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level scale describing whether a household holds the Sphere-minimum shelter repair tool set (hammer or equivalent striking tool, nails, and rope or wire). Used as a binary adequacy proxy for Sphere NFI Standard 4 on tools and equipment, distinct from technical-assistance-type which captures the guidance received.", "es": "Escala de tres niveles que describe si un hogar tiene el conjunto m\u00ednimo Esfera de herramientas de reparaci\u00f3n de refugio (martillo o herramienta de golpeo equivalente, clavos y cuerda o alambre). Utilizada como indicador binario de adecuaci\u00f3n para la Norma Esfera 4 sobre herramientas y equipos, distinta de technical-assistance-type que registra la orientaci\u00f3n recibida.", "fr": "\u00c9chelle \u00e0 trois niveaux d\u00e9crivant si un m\u00e9nage poss\u00e8de l''ensemble minimal Sph\u00e8re d''outils de r\u00e9paration d''abri (marteau ou outil de frappe \u00e9quivalent, clous et corde ou fil de fer). Utilis\u00e9e comme indicateur binaire d''ad\u00e9quation pour la Norme Sph\u00e8re 4 sur les outils et \u00e9quipements, distincte de technical-assistance-type qui consigne les conseils re\u00e7us."}, "id": "shelter-repair-kit-coverage", "label": {"en": "Shelter repair tool kit coverage (3-level)", "es": "Cobertura del kit de herramientas de reparaci\u00f3n de refugio (3 niveles)", "fr": "Couverture du kit d''outils de r\u00e9paration d''abri (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_full_kit", "definition": {"en": "Household has a hammer (or equivalent striking tool), nails, and rope or wire \u2014 the Sphere-minimum shelter repair set.", "es": "El hogar tiene un martillo (o herramienta de golpeo equivalente), clavos y cuerda o alambre \u2014 el conjunto m\u00ednimo Esfera de reparaci\u00f3n de refugio.", "fr": "Le m\u00e9nage poss\u00e8de un marteau (ou un outil de frappe \u00e9quivalent), des clous et de la corde ou du fil de fer \u2014 l''ensemble minimal Sph\u00e8re de r\u00e9paration d''abri."}, "label": {"en": "Yes \u2014 full kit present", "es": "S\u00ed \u2014 kit completo presente", "fr": "Oui \u2014 kit complet pr\u00e9sent"}}, {"code": "yes_partial", "definition": {"en": "Household has at least one shelter repair tool from the minimum set but not all components.", "es": "El hogar tiene al menos una herramienta de reparaci\u00f3n de refugio del conjunto m\u00ednimo pero no todos los componentes.", "fr": "Le m\u00e9nage poss\u00e8de au moins un outil de r\u00e9paration d''abri du jeu minimal mais pas tous les composants."}, "label": {"en": "Partial \u2014 some tools present", "es": "Parcial \u2014 algunas herramientas presentes", "fr": "Partiel \u2014 certains outils pr\u00e9sents"}}, {"code": "no", "definition": {"en": "Household has none of the basic shelter repair tools.", "es": "El hogar no tiene ninguna de las herramientas b\u00e1sicas de reparaci\u00f3n de refugio.", "fr": "Le m\u00e9nage ne poss\u00e8de aucun des outils de r\u00e9paration d''abri de base."}, "label": {"en": "No \u2014 no tools", "es": "No \u2014 sin herramientas", "fr": "Non \u2014 aucun outil"}}]}'
