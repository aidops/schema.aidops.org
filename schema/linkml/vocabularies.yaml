  HandwashingFacilityLocation:
    title:
      en: Handwashing Facility Location
      fr: Emplacement du dispositif de lavage des mains
      es: Ubicación de la instalación para lavado de manos
    description:
      en: Location of the household's handwashing facility relative to the dwelling. Location affects accessibility and use at critical junctures. Relevant in displacement contexts where Sphere guidance recommends separate handwashing facilities near latrines.
      fr: Emplacement du dispositif de lavage des mains du ménage par rapport au logement. L'emplacement affecte l'accessibilité et l'utilisation aux moments critiques. Pertinent dans les contextes de déplacement où les directives Sphère recommandent des dispositifs de lavage des mains séparés près des latrines.
      es: Ubicación de la instalación para lavado de manos del hogar en relación con la vivienda. La ubicación afecta la accesibilidad y el uso en momentos críticos. Relevante en contextos de desplazamiento donde las directrices de Esfera recomiendan instalaciones separadas para lavado de manos cerca de las letrinas.
    enum_uri: aidops:HandwashingFacilityLocation
    permissible_values:
      inside_dwelling:
        title:
          en: Inside the dwelling
          fr: À l'intérieur du logement
          es: Dentro de la vivienda
        description:
          en: The handwashing facility is located inside the main dwelling structure.
          fr: Le dispositif de lavage des mains est situé à l'intérieur de la structure principale du logement.
          es: La instalación para lavado de manos está ubicada dentro de la estructura principal de la vivienda.
      in_yard_or_compound:
        title:
          en: In the yard or compound
          fr: Dans la cour ou l'enceinte
          es: En el patio o recinto
        description:
          en: The handwashing facility is located in the yard, courtyard, or compound controlled by the household, but outside the main dwelling.
          fr: Le dispositif de lavage des mains est situé dans la cour, le patio ou l'enceinte contrôlée par le ménage, mais à l'extérieur du logement principal.
          es: La instalación para lavado de manos está ubicada en el patio, corral o recinto controlado por el hogar, pero fuera de la vivienda principal.
      shared_outside_yard:
        title:
          en: Shared facility outside the yard
          fr: Installation partagée hors de la cour
          es: Instalación compartida fuera del patio
        description:
          en: The handwashing facility is shared with other households and located outside the household's own yard or compound.
          fr: Le dispositif de lavage des mains est partagé avec d'autres ménages et situé à l'extérieur de la cour ou de l'enceinte propre du ménage.
          es: La instalación para lavado de manos se comparte con otros hogares y está ubicada fuera del patio o recinto propio del hogar.
