  DisplacementReason:
    title:
      en: Displacement Reason
      fr: Raison de déplacement
      es: Razón de desplazamiento
    description:
      en: The primary cause or motivating factor behind a household's forced departure from its place of habitual residence. Records the displaced person's reported reason rather than a hazard classification; for hazard taxonomy see hazard-type. Multiple reasons may apply; collect via multi-select.
      fr: La cause principale ou le facteur déterminant du départ forcé d'un ménage de son lieu de résidence habituel. Consigne la raison déclarée par la personne déplacée plutôt qu'une classification des aléas ; pour la taxonomie des aléas, voir hazard-type. Plusieurs raisons peuvent s'appliquer ; collecter en sélection multiple.
      es: La causa principal o el factor motivador detrás de la salida forzada de un hogar de su lugar de residencia habitual. Registra la razón declarada por la persona desplazada en lugar de una clasificación de peligros; para la taxonomía de peligros véase hazard-type. Pueden aplicarse múltiples razones; recopilar mediante selección múltiple.
    enum_uri: aidops:DisplacementReason
    permissible_values:
      armed_conflict:
        title:
          en: Armed conflict
          fr: Conflit armé
          es: Conflicto armado
        description:
          en: Displacement caused by armed conflict between state and non-state actors, or between non-state actors, including civil war and interstate conflict.
          fr: Déplacement causé par un conflit armé entre acteurs étatiques et non étatiques, ou entre acteurs non étatiques, y compris la guerre civile et le conflit interétatique.
          es: Desplazamiento causado por conflicto armado entre actores estatales y no estatales, o entre actores no estatales, incluyendo guerra civil y conflicto interestatal.
      generalized_violence:
        title:
          en: Generalized violence
          fr: Violence généralisée
          es: Violencia generalizada
        description:
          en: Displacement caused by widespread, indiscriminate violence not amounting to armed conflict, such as gang violence or communal clashes.
          fr: Déplacement causé par une violence généralisée et indiscriminée ne constituant pas un conflit armé, comme la violence de gangs ou les affrontements communautaires.
          es: Desplazamiento causado por violencia generalizada e indiscriminada que no constituye conflicto armado, como violencia de pandillas o enfrentamientos comunitarios.
      human_rights_violations:
        title:
          en: Human rights violations
          fr: Violations des droits de l'homme
          es: Violaciones de derechos humanos
        description:
          en: Displacement caused by systematic violations of civil, political, economic, social, or cultural rights by state or non-state actors.
          fr: Déplacement causé par des violations systématiques des droits civils, politiques, économiques, sociaux ou culturels par des acteurs étatiques ou non étatiques.
          es: Desplazamiento causado por violaciones sistemáticas de derechos civiles, políticos, económicos, sociales o culturales por actores estatales o no estatales.
      persecution:
        title:
          en: Persecution
          fr: Persécution
          es: Persecución
        description:
          en: 'Displacement caused by targeted persecution based on race, religion, nationality, political opinion, or membership of a particular social group, aligning with the 1951 Refugee Convention grounds. Note: properties referencing this code carry sensitivity: sensitive.'
          fr: Déplacement causé par la persécution ciblée fondée sur la race, la religion, la nationalité, l'opinion politique ou l'appartenance à un groupe social particulier, conformément aux motifs de la Convention de 1951 relative au statut des réfugiés.
          es: Desplazamiento causado por persecución dirigida basada en raza, religión, nacionalidad, opinión política o pertenencia a un grupo social particular, alineado con los motivos de la Convención de Refugiados de 1951.
      natural_disaster:
        title:
          en: Natural disaster
          fr: Catastrophe naturelle
          es: Desastre natural
        description:
          en: Displacement triggered by a sudden-onset or slow-onset natural hazard, including flood, earthquake, cyclone, drought, or landslide.
          fr: Déplacement déclenché par un aléa naturel à déclenchement soudain ou lent, notamment inondation, tremblement de terre, cyclone, sécheresse ou glissement de terrain.
          es: Desplazamiento desencadenado por un peligro natural de inicio repentino o lento, incluyendo inundación, terremoto, ciclón, sequía o deslizamiento de tierra.
      climate_environment:
        title:
          en: Climate and environmental change
          fr: Changements climatiques et environnementaux
          es: Cambio climático y ambiental
        description:
          en: Displacement driven by progressive environmental degradation or climate change impacts such as sea-level rise, desertification, or land degradation, distinct from a discrete natural disaster event.
          fr: Déplacement entraîné par la dégradation progressive de l'environnement ou les impacts du changement climatique tels que la montée du niveau de la mer, la désertification ou la dégradation des terres, distinct d'un événement de catastrophe naturelle ponctuel.
          es: Desplazamiento impulsado por la degradación ambiental progresiva o los impactos del cambio climático como el aumento del nivel del mar, la desertificación o la degradación de la tierra, distinto de un evento de desastre natural discreto.
      economic_livelihood:
        title:
          en: Economic or livelihood crisis
          fr: Crise économique ou des moyens de subsistance
          es: Crisis económica o de medios de vida
        description:
          en: Displacement caused primarily by economic collapse, loss of livelihood, or extreme poverty with no accompanying protection-related cause.
          fr: Déplacement causé principalement par l'effondrement économique, la perte de moyens de subsistance ou l'extrême pauvreté sans cause liée à la protection.
          es: Desplazamiento causado principalmente por colapso económico, pérdida de medios de vida o pobreza extrema sin causa relacionada con la protección.
      development_project:
        title:
          en: Development project
          fr: Projet de développement
          es: Proyecto de desarrollo
        description:
          en: Displacement caused by a government or private infrastructure or development project such as a dam, road, or urban development initiative.
          fr: Déplacement causé par un projet d'infrastructure ou de développement gouvernemental ou privé, tel qu'un barrage, une route ou une initiative de développement urbain.
          es: Desplazamiento causado por un proyecto de infraestructura o desarrollo gubernamental o privado, como una presa, carretera o iniciativa de desarrollo urbano.
      gbv:
        title:
          en: Gender-based violence
          fr: Violence basée sur le genre
          es: Violencia basada en género
        description:
          en: 'Displacement caused by or in flight from gender-based violence, including domestic violence, sexual violence, forced marriage, or female genital mutilation and cutting. Note: properties referencing this code carry sensitivity: sensitive.'
          fr: Déplacement causé par ou en fuite d'une violence basée sur le genre, incluant la violence domestique, la violence sexuelle, le mariage forcé ou les mutilations génitales féminines.
          es: Desplazamiento causado por o en huida de violencia basada en género, incluyendo violencia doméstica, violencia sexual, matrimonio forzado o mutilación genital femenina.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Cause of displacement not covered by other categories in this vocabulary.
          fr: Cause de déplacement non couverte par les autres catégories de ce vocabulaire.
          es: Causa de desplazamiento no cubierta por otras categorías de este vocabulario.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iom-dtm-methodology-2021"], "definition": {"en": "The primary cause or motivating factor behind a household''s forced departure from its place of habitual residence. Records the displaced person''s reported reason rather than a hazard classification; for hazard taxonomy see hazard-type. Multiple reasons may apply; collect via multi-select.", "es": "La causa principal o el factor motivador detr\u00e1s de la salida forzada de un hogar de su lugar de residencia habitual. Registra la raz\u00f3n declarada por la persona desplazada en lugar de una clasificaci\u00f3n de peligros; para la taxonom\u00eda de peligros v\u00e9ase hazard-type. Pueden aplicarse m\u00faltiples razones; recopilar mediante selecci\u00f3n m\u00faltiple.", "fr": "La cause principale ou le facteur d\u00e9terminant du d\u00e9part forc\u00e9 d''un m\u00e9nage de son lieu de r\u00e9sidence habituel. Consigne la raison d\u00e9clar\u00e9e par la personne d\u00e9plac\u00e9e plut\u00f4t qu''une classification des al\u00e9as ; pour la taxonomie des al\u00e9as, voir hazard-type. Plusieurs raisons peuvent s''appliquer ; collecter en s\u00e9lection multiple."}, "id": "displacement-reason", "label": {"en": "Displacement Reason", "es": "Raz\u00f3n de desplazamiento", "fr": "Raison de d\u00e9placement"}, "maturity": "draft", "standard": {"name": "IOM Displacement Tracking Matrix Mobility Tracking methodology; Guiding Principles on Internal Displacement; IDMC GRID categories", "notes": "Partially overlaps hazard-type vocabulary; displacement-reason captures the displacement motivation as perceived by the affected household, while hazard-type classifies the triggering event objectively. The two are complementary. Persecution and GBV grounds align with the 1951 Refugee Convention Article 1A(2).", "uri": "https://dtm.iom.int/about/methodological-framework"}, "values": [{"code": "armed_conflict", "definition": {"en": "Displacement caused by armed conflict between state and non-state actors, or between non-state actors, including civil war and interstate conflict.", "es": "Desplazamiento causado por conflicto armado entre actores estatales y no estatales, o entre actores no estatales, incluyendo guerra civil y conflicto interestatal.", "fr": "D\u00e9placement caus\u00e9 par un conflit arm\u00e9 entre acteurs \u00e9tatiques et non \u00e9tatiques, ou entre acteurs non \u00e9tatiques, y compris la guerre civile et le conflit inter\u00e9tatique."}, "label": {"en": "Armed conflict", "es": "Conflicto armado", "fr": "Conflit arm\u00e9"}}, {"code": "generalized_violence", "definition": {"en": "Displacement caused by widespread, indiscriminate violence not amounting to armed conflict, such as gang violence or communal clashes.", "es": "Desplazamiento causado por violencia generalizada e indiscriminada que no constituye conflicto armado, como violencia de pandillas o enfrentamientos comunitarios.", "fr": "D\u00e9placement caus\u00e9 par une violence g\u00e9n\u00e9ralis\u00e9e et indiscrimin\u00e9e ne constituant pas un conflit arm\u00e9, comme la violence de gangs ou les affrontements communautaires."}, "label": {"en": "Generalized violence", "es": "Violencia generalizada", "fr": "Violence g\u00e9n\u00e9ralis\u00e9e"}}, {"code": "human_rights_violations", "definition": {"en": "Displacement caused by systematic violations of civil, political, economic, social, or cultural rights by state or non-state actors.", "es": "Desplazamiento causado por violaciones sistem\u00e1ticas de derechos civiles, pol\u00edticos, econ\u00f3micos, sociales o culturales por actores estatales o no estatales.", "fr": "D\u00e9placement caus\u00e9 par des violations syst\u00e9matiques des droits civils, politiques, \u00e9conomiques, sociaux ou culturels par des acteurs \u00e9tatiques ou non \u00e9tatiques."}, "label": {"en": "Human rights violations", "es": "Violaciones de derechos humanos", "fr": "Violations des droits de l''homme"}}, {"code": "persecution", "definition": {"en": "Displacement caused by targeted persecution based on race, religion, nationality, political opinion, or membership of a particular social group, aligning with the 1951 Refugee Convention grounds. Note: properties referencing this code carry sensitivity: sensitive.", "es": "Desplazamiento causado por persecuci\u00f3n dirigida basada en raza, religi\u00f3n, nacionalidad, opini\u00f3n pol\u00edtica o pertenencia a un grupo social particular, alineado con los motivos de la Convenci\u00f3n de Refugiados de 1951.", "fr": "D\u00e9placement caus\u00e9 par la pers\u00e9cution cibl\u00e9e fond\u00e9e sur la race, la religion, la nationalit\u00e9, l''opinion politique ou l''appartenance \u00e0 un groupe social particulier, conform\u00e9ment aux motifs de la Convention de 1951 relative au statut des r\u00e9fugi\u00e9s."}, "label": {"en": "Persecution", "es": "Persecuci\u00f3n", "fr": "Pers\u00e9cution"}}, {"code": "natural_disaster", "definition": {"en": "Displacement triggered by a sudden-onset or slow-onset natural hazard, including flood, earthquake, cyclone, drought, or landslide.", "es": "Desplazamiento desencadenado por un peligro natural de inicio repentino o lento, incluyendo inundaci\u00f3n, terremoto, cicl\u00f3n, sequ\u00eda o deslizamiento de tierra.", "fr": "D\u00e9placement d\u00e9clench\u00e9 par un al\u00e9a naturel \u00e0 d\u00e9clenchement soudain ou lent, notamment inondation, tremblement de terre, cyclone, s\u00e9cheresse ou glissement de terrain."}, "label": {"en": "Natural disaster", "es": "Desastre natural", "fr": "Catastrophe naturelle"}}, {"code": "climate_environment", "definition": {"en": "Displacement driven by progressive environmental degradation or climate change impacts such as sea-level rise, desertification, or land degradation, distinct from a discrete natural disaster event.", "es": "Desplazamiento impulsado por la degradaci\u00f3n ambiental progresiva o los impactos del cambio clim\u00e1tico como el aumento del nivel del mar, la desertificaci\u00f3n o la degradaci\u00f3n de la tierra, distinto de un evento de desastre natural discreto.", "fr": "D\u00e9placement entra\u00een\u00e9 par la d\u00e9gradation progressive de l''environnement ou les impacts du changement climatique tels que la mont\u00e9e du niveau de la mer, la d\u00e9sertification ou la d\u00e9gradation des terres, distinct d''un \u00e9v\u00e9nement de catastrophe naturelle ponctuel."}, "label": {"en": "Climate and environmental change", "es": "Cambio clim\u00e1tico y ambiental", "fr": "Changements climatiques et environnementaux"}}, {"code": "economic_livelihood", "definition": {"en": "Displacement caused primarily by economic collapse, loss of livelihood, or extreme poverty with no accompanying protection-related cause.", "es": "Desplazamiento causado principalmente por colapso econ\u00f3mico, p\u00e9rdida de medios de vida o pobreza extrema sin causa relacionada con la protecci\u00f3n.", "fr": "D\u00e9placement caus\u00e9 principalement par l''effondrement \u00e9conomique, la perte de moyens de subsistance ou l''extr\u00eame pauvret\u00e9 sans cause li\u00e9e \u00e0 la protection."}, "label": {"en": "Economic or livelihood crisis", "es": "Crisis econ\u00f3mica o de medios de vida", "fr": "Crise \u00e9conomique ou des moyens de subsistance"}}, {"code": "development_project", "definition": {"en": "Displacement caused by a government or private infrastructure or development project such as a dam, road, or urban development initiative.", "es": "Desplazamiento causado por un proyecto de infraestructura o desarrollo gubernamental o privado, como una presa, carretera o iniciativa de desarrollo urbano.", "fr": "D\u00e9placement caus\u00e9 par un projet d''infrastructure ou de d\u00e9veloppement gouvernemental ou priv\u00e9, tel qu''un barrage, une route ou une initiative de d\u00e9veloppement urbain."}, "label": {"en": "Development project", "es": "Proyecto de desarrollo", "fr": "Projet de d\u00e9veloppement"}}, {"code": "gbv", "definition": {"en": "Displacement caused by or in flight from gender-based violence, including domestic violence, sexual violence, forced marriage, or female genital mutilation and cutting. Note: properties referencing this code carry sensitivity: sensitive.", "es": "Desplazamiento causado por o en huida de violencia basada en g\u00e9nero, incluyendo violencia dom\u00e9stica, violencia sexual, matrimonio forzado o mutilaci\u00f3n genital femenina.", "fr": "D\u00e9placement caus\u00e9 par ou en fuite d''une violence bas\u00e9e sur le genre, incluant la violence domestique, la violence sexuelle, le mariage forc\u00e9 ou les mutilations g\u00e9nitales f\u00e9minines."}, "label": {"en": "Gender-based violence", "es": "Violencia basada en g\u00e9nero", "fr": "Violence bas\u00e9e sur le genre"}}, {"code": "other", "definition": {"en": "Cause of displacement not covered by other categories in this vocabulary.", "es": "Causa de desplazamiento no cubierta por otras categor\u00edas de este vocabulario.", "fr": "Cause de d\u00e9placement non couverte par les autres cat\u00e9gories de ce vocabulaire."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
      bibliography_refs: iom-dtm-methodology-2021
  ElectricityApplianceTier:
    title:
      en: Electricity Appliance Tier
      fr: Niveau d'appareils électriques
      es: Nivel de electrodomésticos eléctricos
    description:
      en: 'The highest tier of appliances the household can power simultaneously from its main electricity source. Used as a proxy for the MTF capacity attribute (peak power tier) when direct wattage measurement is not collected. ESMAP published appliance-tier crosswalk: phone charging plus 1 LED light = Tier 1 (3 W or more); multiple LED lights plus fan or small TV = Tier 2 (50 W or more); refrigerator = Tier 3 (200 W or more); multiple large appliances simultaneously = Tier 4 (800 W or more); full household demand including air conditioning = Tier 5 (2 kW or more).'
      fr: 'Le niveau le plus élevé d''appareils que le ménage peut alimenter simultanément depuis sa principale source d''électricité. Utilisé comme indicateur de remplacement de l''attribut de capacité MTF (niveau de puissance de crête) lorsque la mesure directe en watts n''est pas recueillie. Tableau de correspondance ESMAP entre niveaux d''appareils : recharge de téléphone + 1 ampoule LED = Niveau 1 (3 W ou plus) ; plusieurs ampoules LED + ventilateur ou petite TV = Niveau 2 (50 W ou plus) ; réfrigérateur = Niveau 3 (200 W ou plus) ; plusieurs gros appareils simultanément = Niveau 4 (800 W ou plus) ; demande totale du ménage incluant la climatisation = Niveau 5 (2 kW ou plus).'
      es: 'El nivel más alto de electrodomésticos que el hogar puede alimentar simultáneamente desde su fuente principal de electricidad. Se usa como indicador sustituto del atributo de capacidad MTF (nivel de potencia máxima) cuando no se recopila medición directa en vatios. Tabla de correspondencia de niveles de electrodomésticos de ESMAP: carga de teléfono más 1 bombilla LED = Nivel 1 (3 W o más); varias bombillas LED más ventilador o TV pequeña = Nivel 2 (50 W o más); refrigerador = Nivel 3 (200 W o más); varios electrodomésticos grandes simultáneamente = Nivel 4 (800 W o más); demanda total del hogar incluida la climatización = Nivel 5 (2 kW o más).'
    enum_uri: aidops:ElectricityApplianceTier
    permissible_values:
      phone_charging_only:
        title:
          en: Phone charging only
          fr: Recharge de téléphone uniquement
          es: Solo carga de teléfono
        description:
          en: Can power phone charging only. Approximate MTF capacity Tier 1 (3 W or more).
          fr: 'Peut alimenter uniquement la recharge de téléphone. Capacité MTF approximative : niveau 1 (3 W ou plus).'
          es: 'Puede alimentar solo la carga de teléfono. Capacidad MTF aproximada: Nivel 1 (3 W o más).'
      phone_and_led_lights:
        title:
          en: Phone charging and LED lights (1-3 bulbs)
          fr: Recharge de téléphone et ampoules LED (1 à 3)
          es: Carga de teléfono y bombillas LED (1 a 3)
        description:
          en: Can power phone charging and 1 to 3 LED bulbs simultaneously. Approximate MTF capacity Tier 1 (3 W or more).
          fr: 'Peut alimenter la recharge de téléphone et 1 à 3 ampoules LED simultanément. Capacité MTF approximative : niveau 1 (3 W ou plus).'
          es: 'Puede alimentar la carga de teléfono y 1 a 3 bombillas LED simultáneamente. Capacidad MTF aproximada: Nivel 1 (3 W o más).'
      fan_or_small_tv:
        title:
          en: Fan or small television
          fr: Ventilateur ou petite télévision
          es: Ventilador o televisión pequeña
        description:
          en: Can power a fan or small television in addition to lights and phone charging. Approximate MTF capacity Tier 2 (50 W or more).
          fr: 'Peut alimenter un ventilateur ou une petite télévision en plus des lumières et de la recharge de téléphone. Capacité MTF approximative : niveau 2 (50 W ou plus).'
          es: 'Puede alimentar un ventilador o una televisión pequeña además de luces y carga de teléfono. Capacidad MTF aproximada: Nivel 2 (50 W o más).'
      refrigerator:
        title:
          en: Refrigerator
          fr: Réfrigérateur
          es: Refrigerador
        description:
          en: Can power a refrigerator simultaneously with lights, fan, and phone charging. Approximate MTF capacity Tier 3 (200 W or more).
          fr: 'Peut alimenter un réfrigérateur simultanément avec les lumières, le ventilateur et la recharge de téléphone. Capacité MTF approximative : niveau 3 (200 W ou plus).'
          es: 'Puede alimentar un refrigerador simultáneamente con luces, ventilador y carga de teléfono. Capacidad MTF aproximada: Nivel 3 (200 W o más).'
      multiple_appliances_simultaneously:
        title:
          en: Multiple large appliances simultaneously (iron, rice cooker, power tools)
          fr: Plusieurs gros appareils simultanément (fer à repasser, cuiseur à riz, outils électriques)
          es: Varios electrodomésticos grandes simultáneamente (plancha, arrocera, herramientas eléctricas)
        description:
          en: Can power multiple large appliances such as an iron, rice cooker, or power tools at the same time. Approximate MTF capacity Tier 4 (800 W or more).
          fr: 'Peut alimenter plusieurs gros appareils tels qu''un fer à repasser, un cuiseur à riz ou des outils électriques en même temps. Capacité MTF approximative : niveau 4 (800 W ou plus).'
          es: 'Puede alimentar varios electrodomésticos grandes como una plancha, arrocera o herramientas eléctricas al mismo tiempo. Capacidad MTF aproximada: Nivel 4 (800 W o más).'
      full_household_demand:
        title:
          en: Full household demand including air conditioning
          fr: Demande totale du ménage incluant la climatisation
          es: Demanda total del hogar incluida la climatización
        description:
          en: Can power full household demand including air conditioning. Approximate MTF capacity Tier 5 (2 kW or more).
          fr: 'Peut alimenter la demande totale du ménage incluant la climatisation. Capacité MTF approximative : niveau 5 (2 kW ou plus).'
          es: 'Puede alimentar la demanda total del hogar incluida la climatización. Capacidad MTF aproximada: Nivel 5 (2 kW o más).'
