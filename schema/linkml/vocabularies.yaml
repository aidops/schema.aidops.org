  CookingMtfTier:
    title:
      en: Cooking MTF Tier
      fr: Niveau MTF de cuisson
      es: Nivel MTF de cocción
    description:
      en: 'The SE4All Multi-Tier Framework (MTF) tier for household cooking energy access, derived from the minimum tier across six attributes: PM2.5 emission rate, CO emission rate, cookstove efficiency, convenience (fuel collection time and stove preparation time), safety, affordability, and fuel availability. PM2.5 and CO tiers are assigned from the primary cooking fuel and stove type using published ESMAP/WHO emission factor crosswalk tables rather than direct measurement. The overall cooking tier is the minimum tier across all attributes. SDG 7.1.2 clean cooking standard corresponds to Tier 4 or above on all six attributes. Source: ESMAP Technical Report 008/15 (Bhatia and Angelou 2015).'
      fr: 'Le niveau du cadre multi-niveaux (MTF) SE4All pour l''accès du ménage à l''énergie de cuisson, dérivé du niveau minimum sur six attributs : taux d''émission de PM2,5, taux d''émission de CO, efficacité du foyer, commodité (temps de collecte du combustible et temps de préparation du foyer), sécurité, accessibilité financière et disponibilité du combustible. Les niveaux PM2,5 et CO sont attribués à partir du combustible de cuisson principal et du type de foyer à l''aide de tables de correspondance des facteurs d''émission publiées par l''ESMAP/OMS plutôt que par mesure directe. Le niveau de cuisson global est le niveau minimum de tous les attributs. La norme de cuisson propre ODD 7.1.2 correspond au niveau 4 ou supérieur pour les six attributs. Source : rapport technique ESMAP 008/15 (Bhatia et Angelou 2015).'
      es: 'El nivel del Marco de Múltiples Niveles (MTF) SE4All para el acceso energético de cocción del hogar, derivado del nivel mínimo entre seis atributos: tasa de emisión de PM2,5, tasa de emisión de CO, eficiencia de la cocina, conveniencia (tiempo de recolección de combustible y tiempo de preparación de la cocina), seguridad, asequibilidad y disponibilidad del combustible. Los niveles de PM2,5 y CO se asignan a partir del combustible de cocción principal y el tipo de cocina usando tablas de referencia de factores de emisión publicadas por ESMAP/OMS en lugar de medición directa. El nivel general de cocción es el nivel mínimo de todos los atributos. El estándar de cocción limpia ODS 7.1.2 corresponde al Nivel 4 o superior en los seis atributos. Fuente: Informe Técnico ESMAP 008/15 (Bhatia y Angelou 2015).'
    enum_uri: aidops:CookingMtfTier
    permissible_values:
      tier_0:
        title:
          en: Tier 0 — No access
          fr: Niveau 0 — Aucun accès
          es: Nivel 0 — Sin acceso
        description:
          en: Uses a three-stone fire, open fire, or other highly polluting solid-fuel arrangement without any emission reduction; or fuel availability is less than 80% of the year. PM2.5 exceeds 1030 mg/MJ delivered.
          fr: Utilise un feu à trois pierres, un feu ouvert ou un autre dispositif à combustible solide très polluant sans réduction des émissions ; ou la disponibilité du combustible est inférieure à 80 % de l'année. PM2,5 dépasse 1030 mg/MJ fourni.
          es: Usa un fuego de tres piedras, fuego abierto u otro arreglo de combustible sólido altamente contaminante sin reducción de emisiones; o la disponibilidad de combustible es inferior al 80% del año. PM2,5 supera los 1030 mg/MJ entregados.
      tier_1:
        title:
          en: Tier 1 — Very low access
          fr: Niveau 1 — Accès très faible
          es: Nivel 1 — Acceso muy bajo
        description:
          en: Basic improvement over Tier 0; some emission reduction but still highly polluting. PM2.5 at or below 1030 mg/MJ. Fuel available at least 80% of the year. Preparation time less than 15 minutes.
          fr: Amélioration de base par rapport au niveau 0 ; réduction des émissions mais encore très polluant. PM2,5 inférieur ou égal à 1030 mg/MJ. Combustible disponible au moins 80 % de l'année. Temps de préparation inférieur à 15 minutes.
          es: Mejora básica sobre el Nivel 0; cierta reducción de emisiones pero aún muy contaminante. PM2,5 igual o inferior a 1030 mg/MJ. Combustible disponible al menos el 80% del año. Tiempo de preparación inferior a 15 minutos.
      tier_2:
        title:
          en: Tier 2 — Low access
          fr: Niveau 2 — Accès faible
          es: Nivel 2 — Acceso bajo
        description:
          en: Moderate emission reduction; still above WHO guideline levels. PM2.5 at or below 481 mg/MJ. Fuel collection time less than 3 hours per week. Preparation time less than 10 minutes.
          fr: Réduction modérée des émissions ; encore au-dessus des niveaux recommandés par l'OMS. PM2,5 inférieur ou égal à 481 mg/MJ. Temps de collecte du combustible inférieur à 3 heures par semaine. Temps de préparation inférieur à 10 minutes.
          es: Reducción moderada de emisiones; aún por encima de los niveles recomendados por la OMS. PM2,5 igual o inferior a 481 mg/MJ. Tiempo de recolección de combustible inferior a 3 horas por semana. Tiempo de preparación inferior a 10 minutos.
      tier_3:
        title:
          en: Tier 3 — Medium access
          fr: Niveau 3 — Accès intermédiaire
          es: Nivel 3 — Acceso medio
        description:
          en: Emissions below MTF Tier 3 PM2.5 threshold (218 mg/MJ or less). Fuel available year-round. Fuel collection time less than 1.5 hours per week. No cooking-related accidents requiring professional medical care in the past 12 months.
          fr: Émissions inférieures au seuil PM2,5 du niveau 3 MTF (218 mg/MJ ou moins). Combustible disponible toute l'année. Temps de collecte du combustible inférieur à 1,5 heure par semaine. Aucun accident lié à la cuisine nécessitant des soins médicaux professionnels au cours des 12 derniers mois.
          es: Emisiones por debajo del umbral PM2,5 del Nivel 3 MTF (218 mg/MJ o menos). Combustible disponible todo el año. Tiempo de recolección de combustible inferior a 1,5 horas por semana. Sin accidentes relacionados con la cocina que requirieran atención médica profesional en los últimos 12 meses.
      tier_4:
        title:
          en: Tier 4 — High access
          fr: Niveau 4 — Accès élevé
          es: Nivel 4 — Acceso alto
        description:
          en: Meets ESMAP 'modern energy cooking service' criteria. PM2.5 at or below 62 mg/MJ. Fuel cost less than 5% of household income. Clean fuel (electricity, LPG, biogas, solar) or ISO VPT-verified clean cookstove. All convenience and safety criteria met.
          fr: Satisfait aux critères ESMAP de 'service moderne d'énergie de cuisson'. PM2,5 inférieur ou égal à 62 mg/MJ. Coût du combustible inférieur à 5 % du revenu du ménage. Combustible propre (électricité, GPL, biogaz, solaire) ou foyer propre vérifié ISO VPT. Tous les critères de commodité et de sécurité satisfaits.
          es: Cumple los criterios ESMAP de 'servicio moderno de energía de cocción'. PM2,5 igual o inferior a 62 mg/MJ. Costo del combustible inferior al 5% del ingreso del hogar. Combustible limpio (electricidad, GLP, biogás, solar) o cocina limpia verificada ISO VPT. Todos los criterios de conveniencia y seguridad cumplidos.
      tier_5:
        title:
          en: Tier 5 — Full access
          fr: Niveau 5 — Accès complet
          es: Nivel 5 — Acceso completo
        description:
          en: 'Cleanest fuels at highest efficiency: electricity, LPG, biogas, solar cooker. PM2.5 at or below 5 mg/MJ (WHO Tier 5 threshold). All attributes at their highest tier. Levelized cost of fuel plus stove amortization less than 5% of household income.'
          fr: 'Combustibles les plus propres à la plus haute efficacité : électricité, GPL, biogaz, cuiseur solaire. PM2,5 inférieur ou égal à 5 mg/MJ (seuil OMS niveau 5). Tous les attributs à leur niveau le plus élevé. Coût nivelé du combustible plus l''amortissement du foyer inférieur à 5 % du revenu du ménage.'
          es: 'Combustibles más limpios con mayor eficiencia: electricidad, GLP, biogás, cocina solar. PM2,5 igual o inferior a 5 mg/MJ (umbral OMS Nivel 5). Todos los atributos en su nivel más alto. Costo nivelado de combustible más amortización de la cocina inferior al 5% del ingreso del hogar.'
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf", "who-household-energy-database"], "definition": {"en": "The SE4All Multi-Tier Framework (MTF) tier for household cooking energy access, derived from the minimum tier across six attributes: PM2.5 emission rate, CO emission rate, cookstove efficiency, convenience (fuel collection time and stove preparation time), safety, affordability, and fuel availability. PM2.5 and CO tiers are assigned from the primary cooking fuel and stove type using published ESMAP/WHO emission factor crosswalk tables rather than direct measurement. The overall cooking tier is the minimum tier across all attributes. SDG 7.1.2 clean cooking standard corresponds to Tier 4 or above on all six attributes. Source: ESMAP Technical Report 008/15 (Bhatia and Angelou 2015).\n", "es": "El nivel del Marco de M\u00faltiples Niveles (MTF) SE4All para el acceso energ\u00e9tico de cocci\u00f3n del hogar, derivado del nivel m\u00ednimo entre seis atributos: tasa de emisi\u00f3n de PM2,5, tasa de emisi\u00f3n de CO, eficiencia de la cocina, conveniencia (tiempo de recolecci\u00f3n de combustible y tiempo de preparaci\u00f3n de la cocina), seguridad, asequibilidad y disponibilidad del combustible. Los niveles de PM2,5 y CO se asignan a partir del combustible de cocci\u00f3n principal y el tipo de cocina usando tablas de referencia de factores de emisi\u00f3n publicadas por ESMAP/OMS en lugar de medici\u00f3n directa. El nivel general de cocci\u00f3n es el nivel m\u00ednimo de todos los atributos. El est\u00e1ndar de cocci\u00f3n limpia ODS 7.1.2 corresponde al Nivel 4 o superior en los seis atributos. Fuente: Informe T\u00e9cnico ESMAP 008/15 (Bhatia y Angelou 2015).\n", "fr": "Le niveau du cadre multi-niveaux (MTF) SE4All pour l''acc\u00e8s du m\u00e9nage \u00e0 l''\u00e9nergie de cuisson, d\u00e9riv\u00e9 du niveau minimum sur six attributs : taux d''\u00e9mission de PM2,5, taux d''\u00e9mission de CO, efficacit\u00e9 du foyer, commodit\u00e9 (temps de collecte du combustible et temps de pr\u00e9paration du foyer), s\u00e9curit\u00e9, accessibilit\u00e9 financi\u00e8re et disponibilit\u00e9 du combustible. Les niveaux PM2,5 et CO sont attribu\u00e9s \u00e0 partir du combustible de cuisson principal et du type de foyer \u00e0 l''aide de tables de correspondance des facteurs d''\u00e9mission publi\u00e9es par l''ESMAP/OMS plut\u00f4t que par mesure directe. Le niveau de cuisson global est le niveau minimum de tous les attributs. La norme de cuisson propre ODD 7.1.2 correspond au niveau 4 ou sup\u00e9rieur pour les six attributs. Source : rapport technique ESMAP 008/15 (Bhatia et Angelou 2015).\n"}, "id": "cooking-mtf-tier", "label": {"en": "Cooking MTF Tier", "es": "Nivel MTF de cocci\u00f3n", "fr": "Niveau MTF de cuisson"}, "maturity": "draft", "values": [{"code": "tier_0", "definition": {"en": "Uses a three-stone fire, open fire, or other highly polluting solid-fuel arrangement without any emission reduction; or fuel availability is less than 80% of the year. PM2.5 exceeds 1030 mg/MJ delivered.", "es": "Usa un fuego de tres piedras, fuego abierto u otro arreglo de combustible s\u00f3lido altamente contaminante sin reducci\u00f3n de emisiones; o la disponibilidad de combustible es inferior al 80% del a\u00f1o. PM2,5 supera los 1030 mg/MJ entregados.", "fr": "Utilise un feu \u00e0 trois pierres, un feu ouvert ou un autre dispositif \u00e0 combustible solide tr\u00e8s polluant sans r\u00e9duction des \u00e9missions ; ou la disponibilit\u00e9 du combustible est inf\u00e9rieure \u00e0 80 % de l''ann\u00e9e. PM2,5 d\u00e9passe 1030 mg/MJ fourni."}, "label": {"en": "Tier 0 \u2014 No access", "es": "Nivel 0 \u2014 Sin acceso", "fr": "Niveau 0 \u2014 Aucun acc\u00e8s"}}, {"code": "tier_1", "definition": {"en": "Basic improvement over Tier 0; some emission reduction but still highly polluting. PM2.5 at or below 1030 mg/MJ. Fuel available at least 80% of the year. Preparation time less than 15 minutes.", "es": "Mejora b\u00e1sica sobre el Nivel 0; cierta reducci\u00f3n de emisiones pero a\u00fan muy contaminante. PM2,5 igual o inferior a 1030 mg/MJ. Combustible disponible al menos el 80% del a\u00f1o. Tiempo de preparaci\u00f3n inferior a 15 minutos.", "fr": "Am\u00e9lioration de base par rapport au niveau 0 ; r\u00e9duction des \u00e9missions mais encore tr\u00e8s polluant. PM2,5 inf\u00e9rieur ou \u00e9gal \u00e0 1030 mg/MJ. Combustible disponible au moins 80 % de l''ann\u00e9e. Temps de pr\u00e9paration inf\u00e9rieur \u00e0 15 minutes."}, "label": {"en": "Tier 1 \u2014 Very low access", "es": "Nivel 1 \u2014 Acceso muy bajo", "fr": "Niveau 1 \u2014 Acc\u00e8s tr\u00e8s faible"}}, {"code": "tier_2", "definition": {"en": "Moderate emission reduction; still above WHO guideline levels. PM2.5 at or below 481 mg/MJ. Fuel collection time less than 3 hours per week. Preparation time less than 10 minutes.", "es": "Reducci\u00f3n moderada de emisiones; a\u00fan por encima de los niveles recomendados por la OMS. PM2,5 igual o inferior a 481 mg/MJ. Tiempo de recolecci\u00f3n de combustible inferior a 3 horas por semana. Tiempo de preparaci\u00f3n inferior a 10 minutos.", "fr": "R\u00e9duction mod\u00e9r\u00e9e des \u00e9missions ; encore au-dessus des niveaux recommand\u00e9s par l''OMS. PM2,5 inf\u00e9rieur ou \u00e9gal \u00e0 481 mg/MJ. Temps de collecte du combustible inf\u00e9rieur \u00e0 3 heures par semaine. Temps de pr\u00e9paration inf\u00e9rieur \u00e0 10 minutes."}, "label": {"en": "Tier 2 \u2014 Low access", "es": "Nivel 2 \u2014 Acceso bajo", "fr": "Niveau 2 \u2014 Acc\u00e8s faible"}}, {"code": "tier_3", "definition": {"en": "Emissions below MTF Tier 3 PM2.5 threshold (218 mg/MJ or less). Fuel available year-round. Fuel collection time less than 1.5 hours per week. No cooking-related accidents requiring professional medical care in the past 12 months.", "es": "Emisiones por debajo del umbral PM2,5 del Nivel 3 MTF (218 mg/MJ o menos). Combustible disponible todo el a\u00f1o. Tiempo de recolecci\u00f3n de combustible inferior a 1,5 horas por semana. Sin accidentes relacionados con la cocina que requirieran atenci\u00f3n m\u00e9dica profesional en los \u00faltimos 12 meses.", "fr": "\u00c9missions inf\u00e9rieures au seuil PM2,5 du niveau 3 MTF (218 mg/MJ ou moins). Combustible disponible toute l''ann\u00e9e. Temps de collecte du combustible inf\u00e9rieur \u00e0 1,5 heure par semaine. Aucun accident li\u00e9 \u00e0 la cuisine n\u00e9cessitant des soins m\u00e9dicaux professionnels au cours des 12 derniers mois."}, "label": {"en": "Tier 3 \u2014 Medium access", "es": "Nivel 3 \u2014 Acceso medio", "fr": "Niveau 3 \u2014 Acc\u00e8s interm\u00e9diaire"}}, {"code": "tier_4", "definition": {"en": "Meets ESMAP ''modern energy cooking service'' criteria. PM2.5 at or below 62 mg/MJ. Fuel cost less than 5% of household income. Clean fuel (electricity, LPG, biogas, solar) or ISO VPT-verified clean cookstove. All convenience and safety criteria met.", "es": "Cumple los criterios ESMAP de ''servicio moderno de energ\u00eda de cocci\u00f3n''. PM2,5 igual o inferior a 62 mg/MJ. Costo del combustible inferior al 5% del ingreso del hogar. Combustible limpio (electricidad, GLP, biog\u00e1s, solar) o cocina limpia verificada ISO VPT. Todos los criterios de conveniencia y seguridad cumplidos.", "fr": "Satisfait aux crit\u00e8res ESMAP de ''service moderne d''\u00e9nergie de cuisson''. PM2,5 inf\u00e9rieur ou \u00e9gal \u00e0 62 mg/MJ. Co\u00fbt du combustible inf\u00e9rieur \u00e0 5 % du revenu du m\u00e9nage. Combustible propre (\u00e9lectricit\u00e9, GPL, biogaz, solaire) ou foyer propre v\u00e9rifi\u00e9 ISO VPT. Tous les crit\u00e8res de commodit\u00e9 et de s\u00e9curit\u00e9 satisfaits."}, "label": {"en": "Tier 4 \u2014 High access", "es": "Nivel 4 \u2014 Acceso alto", "fr": "Niveau 4 \u2014 Acc\u00e8s \u00e9lev\u00e9"}}, {"code": "tier_5", "definition": {"en": "Cleanest fuels at highest efficiency: electricity, LPG, biogas, solar cooker. PM2.5 at or below 5 mg/MJ (WHO Tier 5 threshold). All attributes at their highest tier. Levelized cost of fuel plus stove amortization less than 5% of household income.", "es": "Combustibles m\u00e1s limpios con mayor eficiencia: electricidad, GLP, biog\u00e1s, cocina solar. PM2,5 igual o inferior a 5 mg/MJ (umbral OMS Nivel 5). Todos los atributos en su nivel m\u00e1s alto. Costo nivelado de combustible m\u00e1s amortizaci\u00f3n de la cocina inferior al 5% del ingreso del hogar.", "fr": "Combustibles les plus propres \u00e0 la plus haute efficacit\u00e9 : \u00e9lectricit\u00e9, GPL, biogaz, cuiseur solaire. PM2,5 inf\u00e9rieur ou \u00e9gal \u00e0 5 mg/MJ (seuil OMS niveau 5). Tous les attributs \u00e0 leur niveau le plus \u00e9lev\u00e9. Co\u00fbt nivel\u00e9 du combustible plus l''amortissement du foyer inf\u00e9rieur \u00e0 5 % du revenu du m\u00e9nage."}, "label": {"en": "Tier 5 \u2014 Full access", "es": "Nivel 5 \u2014 Acceso completo", "fr": "Niveau 5 \u2014 Acc\u00e8s complet"}}]}'
      bibliography_refs: se4all-mtf,who-household-energy-database
  CostChangeRelative:
    title:
      en: Cost Change Relative to Seasonal Baseline
      fr: Variation du coût par rapport à la référence saisonnière
      es: Cambio de costo relativo a la línea base estacional
    description:
      en: Change in the cost of a purchased input (supplementary fodder, hay, straw, commercial feed) relative to the typical price for this time of year. Used in PastoralFoodSecurityProfile `fodder_cost_change` to capture supplementary feed cost burden on pastoral households when pasture is inadequate. The `not_applicable_did_not_purchase` code distinguishes households that did not need to buy supplementary fodder from those who could not afford it.
      fr: Variation du coût d'un intrant acheté (fourrage supplémentaire, foin, paille, aliments commerciaux) par rapport au prix habituel à cette période de l'année. Utilisé dans `fodder_cost_change` pour saisir la charge du coût des aliments supplémentaires sur les ménages pastoraux.
      es: Cambio en el costo de un insumo comprado (forraje suplementario, heno, paja, alimento comercial) relativo al precio típico para esta época del año. Usado en `fodder_cost_change` para capturar la carga del costo de alimento suplementario en hogares pastorales cuando los pastos son insuficientes.
    enum_uri: aidops:CostChangeRelative
    permissible_values:
      much_higher:
        title:
          en: Much higher than normal (more than 50% increase)
          fr: Bien plus élevé que la normale (plus de 50% de hausse)
          es: Mucho más alto que lo normal (más del 50% de aumento)
        description:
          en: Severe price spike; major financial burden on the pastoral household.
          fr: Forte hausse des prix ; charge financière majeure pour le ménage pastoral.
          es: Pico de precio severo; carga financiera mayor para el hogar pastoral.
      somewhat_higher:
        title:
          en: Somewhat higher than normal (10–50% increase)
          fr: Quelque peu plus élevé que la normale (10–50% de hausse)
          es: Algo más alto que lo normal (aumento del 10–50%)
        description:
          en: Moderate price increase; creating financial stress for the household.
          fr: Hausse modérée des prix ; crée un stress financier pour le ménage.
          es: Aumento moderado de precios; genera estrés financiero para el hogar.
      about_same:
        title:
          en: About the same as normal
          fr: À peu près le même qu'à la normale
          es: Aproximadamente igual que lo normal
        description:
          en: No significant price change compared to the seasonal baseline.
          fr: Pas de changement de prix significatif par rapport à la référence saisonnière.
          es: Sin cambio significativo de precio comparado con la línea base estacional.
      somewhat_lower:
        title:
          en: Somewhat lower than normal
          fr: Quelque peu plus bas que la normale
          es: Algo más bajo que lo normal
        description:
          en: Prices slightly below baseline; favorable conditions for households that need to purchase supplementary fodder.
          fr: Prix légèrement en dessous de la référence ; conditions favorables pour les ménages qui doivent acheter du fourrage supplémentaire.
          es: Precios ligeramente por debajo de la línea base; condiciones favorables para hogares que necesitan comprar forraje suplementario.
      not_applicable_did_not_purchase:
        title:
          en: Did not purchase — not applicable
          fr: N'a pas acheté — sans objet
          es: No compró — no aplica
        description:
          en: Household did not purchase supplementary fodder in the recall period; the cost-change question does not apply.
          fr: Le ménage n'a pas acheté de fourrage supplémentaire pendant la période de rappel ; la question sur la variation des coûts ne s'applique pas.
          es: El hogar no compró forraje suplementario durante el período de recordatorio; la pregunta sobre cambio de costo no aplica.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess whether supplementary fodder costs have changed relative to the seasonal baseline.
          fr: Le répondant ne peut pas évaluer si les coûts du fourrage supplémentaire ont changé par rapport à la référence saisonnière.
          es: El encuestado no puede evaluar si los costos del forraje suplementario han cambiado relativo a la línea base estacional.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["agir-sahel-resilience-framework", "fewsnet-hea-pastoral-baselines", "fsnau-seasonal-assessment-methodology-2022"], "definition": {"en": "Change in the cost of a purchased input (supplementary fodder, hay, straw, commercial feed) relative to the typical price for this time of year. Used in PastoralFoodSecurityProfile `fodder_cost_change` to capture supplementary feed cost burden on pastoral households when pasture is inadequate. The `not_applicable_did_not_purchase` code distinguishes households that did not need to buy supplementary fodder from those who could not afford it.", "es": "Cambio en el costo de un insumo comprado (forraje suplementario, heno, paja, alimento comercial) relativo al precio t\u00edpico para esta \u00e9poca del a\u00f1o. Usado en `fodder_cost_change` para capturar la carga del costo de alimento suplementario en hogares pastorales cuando los pastos son insuficientes.", "fr": "Variation du co\u00fbt d''un intrant achet\u00e9 (fourrage suppl\u00e9mentaire, foin, paille, aliments commerciaux) par rapport au prix habituel \u00e0 cette p\u00e9riode de l''ann\u00e9e. Utilis\u00e9 dans `fodder_cost_change` pour saisir la charge du co\u00fbt des aliments suppl\u00e9mentaires sur les m\u00e9nages pastoraux."}, "id": "cost-change-relative", "label": {"en": "Cost Change Relative to Seasonal Baseline", "es": "Cambio de costo relativo a la l\u00ednea base estacional", "fr": "Variation du co\u00fbt par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re"}, "maturity": "draft", "values": [{"code": "much_higher", "definition": {"en": "Severe price spike; major financial burden on the pastoral household.", "es": "Pico de precio severo; carga financiera mayor para el hogar pastoral.", "fr": "Forte hausse des prix ; charge financi\u00e8re majeure pour le m\u00e9nage pastoral."}, "label": {"en": "Much higher than normal (more than 50% increase)", "es": "Mucho m\u00e1s alto que lo normal (m\u00e1s del 50% de aumento)", "fr": "Bien plus \u00e9lev\u00e9 que la normale (plus de 50% de hausse)"}}, {"code": "somewhat_higher", "definition": {"en": "Moderate price increase; creating financial stress for the household.", "es": "Aumento moderado de precios; genera estr\u00e9s financiero para el hogar.", "fr": "Hausse mod\u00e9r\u00e9e des prix ; cr\u00e9e un stress financier pour le m\u00e9nage."}, "label": {"en": "Somewhat higher than normal (10\u201350% increase)", "es": "Algo m\u00e1s alto que lo normal (aumento del 10\u201350%)", "fr": "Quelque peu plus \u00e9lev\u00e9 que la normale (10\u201350% de hausse)"}}, {"code": "about_same", "definition": {"en": "No significant price change compared to the seasonal baseline.", "es": "Sin cambio significativo de precio comparado con la l\u00ednea base estacional.", "fr": "Pas de changement de prix significatif par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re."}, "label": {"en": "About the same as normal", "es": "Aproximadamente igual que lo normal", "fr": "\u00c0 peu pr\u00e8s le m\u00eame qu''\u00e0 la normale"}}, {"code": "somewhat_lower", "definition": {"en": "Prices slightly below baseline; favorable conditions for households that need to purchase supplementary fodder.", "es": "Precios ligeramente por debajo de la l\u00ednea base; condiciones favorables para hogares que necesitan comprar forraje suplementario.", "fr": "Prix l\u00e9g\u00e8rement en dessous de la r\u00e9f\u00e9rence ; conditions favorables pour les m\u00e9nages qui doivent acheter du fourrage suppl\u00e9mentaire."}, "label": {"en": "Somewhat lower than normal", "es": "Algo m\u00e1s bajo que lo normal", "fr": "Quelque peu plus bas que la normale"}}, {"code": "not_applicable_did_not_purchase", "definition": {"en": "Household did not purchase supplementary fodder in the recall period; the cost-change question does not apply.", "es": "El hogar no compr\u00f3 forraje suplementario durante el per\u00edodo de recordatorio; la pregunta sobre cambio de costo no aplica.", "fr": "Le m\u00e9nage n''a pas achet\u00e9 de fourrage suppl\u00e9mentaire pendant la p\u00e9riode de rappel ; la question sur la variation des co\u00fbts ne s''applique pas."}, "label": {"en": "Did not purchase \u2014 not applicable", "es": "No compr\u00f3 \u2014 no aplica", "fr": "N''a pas achet\u00e9 \u2014 sans objet"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess whether supplementary fodder costs have changed relative to the seasonal baseline.", "es": "El encuestado no puede evaluar si los costos del forraje suplementario han cambiado relativo a la l\u00ednea base estacional.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer si les co\u00fbts du fourrage suppl\u00e9mentaire ont chang\u00e9 par rapport \u00e0 la r\u00e9f\u00e9rence saisonni\u00e8re."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: agir-sahel-resilience-framework,fewsnet-hea-pastoral-baselines,fsnau-seasonal-assessment-methodology-2022
  CreditAccessLevel:
    title:
      en: Credit Access Level
      fr: Niveau d'accès au crédit
      es: Nivel de acceso al crédito
    description:
      en: Perceived or actual access to credit or borrowing available to the household if needed for a basic need or emergency. Synthesised from the FAO RIMA-II Access to Basic Services (ABS) pillar's financial inclusion subcomponent, the LSMS-ISA financial services module, and the MICS6 Household Questionnaire financial access questions. Captures availability of credit, not decision agency (which is covered separately by WEAI credit-decision items).
      fr: Accès perçu ou réel au crédit ou à l'emprunt disponible pour le ménage en cas de besoin fondamental ou d'urgence. Synthétisé à partir du sous-composant d'inclusion financière du pilier Accès aux services de base (ABS) de FAO RIMA-II, du module des services financiers LSMS-ISA et des questions d'accès financier du Questionnaire Ménage MICS6. Capture la disponibilité du crédit, pas l'agentivité décisionnelle (couverte séparément par les items WEAI de décision sur le crédit).
      es: Acceso percibido o real al crédito o préstamo disponible para el hogar en caso de necesidad básica o emergencia. Sintetizado a partir del subcomponente de inclusión financiera del pilar de Acceso a Servicios Básicos (ABS) de FAO RIMA-II, el módulo de servicios financieros LSMS-ISA y las preguntas de acceso financiero del Cuestionario de Hogar MICS6. Captura la disponibilidad de crédito, no la agencia de decisión (cubierta por separado por los ítems WEAI de decisión sobre crédito).
    enum_uri: aidops:CreditAccessLevel
    permissible_values:
      yes_formal:
        title:
          en: Yes — from a formal lender
          fr: Oui — auprès d'un prêteur formel
          es: Sí — de un prestamista formal
        description:
          en: Could borrow from a bank, microfinance institution, mobile money lender, or other formal source.
          fr: Pourrait emprunter auprès d'une banque, d'une institution de microfinance, d'un prêteur mobile money ou d'une autre source formelle.
          es: Podría pedir prestado de un banco, institución de microfinanzas, prestamista de dinero móvil u otra fuente formal.
      yes_informal_only:
        title:
          en: Yes — from informal sources only
          fr: Oui — auprès de sources informelles uniquement
          es: Sí — solo de fuentes informales
        description:
          en: Could borrow only from family, friends, community savings group, or local moneylender.
          fr: Pourrait emprunter uniquement auprès de la famille, d'amis, d'un groupe d'épargne communautaire ou d'un prêteur local.
          es: Podría pedir prestado solo de familia, amigos, grupo de ahorro comunitario o prestamista local.
      uncertain:
        title:
          en: Uncertain
          fr: Incertain
          es: Incierto
        description:
          en: Not sure whether credit would be available.
          fr: Incertain quant à la disponibilité du crédit.
          es: No está seguro de si habría crédito disponible.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: No credit or borrowing is accessible from any source.
          fr: Aucun crédit ou emprunt n'est accessible auprès d'aucune source.
          es: No hay crédito ni préstamo accesible de ninguna fuente.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "definition": {"en": "Perceived or actual access to credit or borrowing available to the household if needed for a basic need or emergency. Synthesised from the FAO RIMA-II Access to Basic Services (ABS) pillar''s financial inclusion subcomponent, the LSMS-ISA financial services module, and the MICS6 Household Questionnaire financial access questions. Captures availability of credit, not decision agency (which is covered separately by WEAI credit-decision items).", "es": "Acceso percibido o real al cr\u00e9dito o pr\u00e9stamo disponible para el hogar en caso de necesidad b\u00e1sica o emergencia. Sintetizado a partir del subcomponente de inclusi\u00f3n financiera del pilar de Acceso a Servicios B\u00e1sicos (ABS) de FAO RIMA-II, el m\u00f3dulo de servicios financieros LSMS-ISA y las preguntas de acceso financiero del Cuestionario de Hogar MICS6. Captura la disponibilidad de cr\u00e9dito, no la agencia de decisi\u00f3n (cubierta por separado por los \u00edtems WEAI de decisi\u00f3n sobre cr\u00e9dito).", "fr": "Acc\u00e8s per\u00e7u ou r\u00e9el au cr\u00e9dit ou \u00e0 l''emprunt disponible pour le m\u00e9nage en cas de besoin fondamental ou d''urgence. Synth\u00e9tis\u00e9 \u00e0 partir du sous-composant d''inclusion financi\u00e8re du pilier Acc\u00e8s aux services de base (ABS) de FAO RIMA-II, du module des services financiers LSMS-ISA et des questions d''acc\u00e8s financier du Questionnaire M\u00e9nage MICS6. Capture la disponibilit\u00e9 du cr\u00e9dit, pas l''agentivit\u00e9 d\u00e9cisionnelle (couverte s\u00e9par\u00e9ment par les items WEAI de d\u00e9cision sur le cr\u00e9dit)."}, "id": "credit-access-level", "label": {"en": "Credit Access Level", "es": "Nivel de acceso al cr\u00e9dito", "fr": "Niveau d''acc\u00e8s au cr\u00e9dit"}, "maturity": "draft", "standard": {"name": "Synthesised from FAO RIMA-II ABS pillar, LSMS-ISA financial services module, and MICS6"}, "values": [{"code": "yes_formal", "definition": {"en": "Could borrow from a bank, microfinance institution, mobile money lender, or other formal source.", "es": "Podr\u00eda pedir prestado de un banco, instituci\u00f3n de microfinanzas, prestamista de dinero m\u00f3vil u otra fuente formal.", "fr": "Pourrait emprunter aupr\u00e8s d''une banque, d''une institution de microfinance, d''un pr\u00eateur mobile money ou d''une autre source formelle."}, "label": {"en": "Yes \u2014 from a formal lender", "es": "S\u00ed \u2014 de un prestamista formal", "fr": "Oui \u2014 aupr\u00e8s d''un pr\u00eateur formel"}}, {"code": "yes_informal_only", "definition": {"en": "Could borrow only from family, friends, community savings group, or local moneylender.", "es": "Podr\u00eda pedir prestado solo de familia, amigos, grupo de ahorro comunitario o prestamista local.", "fr": "Pourrait emprunter uniquement aupr\u00e8s de la famille, d''amis, d''un groupe d''\u00e9pargne communautaire ou d''un pr\u00eateur local."}, "label": {"en": "Yes \u2014 from informal sources only", "es": "S\u00ed \u2014 solo de fuentes informales", "fr": "Oui \u2014 aupr\u00e8s de sources informelles uniquement"}}, {"code": "uncertain", "definition": {"en": "Not sure whether credit would be available.", "es": "No est\u00e1 seguro de si habr\u00eda cr\u00e9dito disponible.", "fr": "Incertain quant \u00e0 la disponibilit\u00e9 du cr\u00e9dit."}, "label": {"en": "Uncertain", "es": "Incierto", "fr": "Incertain"}}, {"code": "no", "definition": {"en": "No credit or borrowing is accessible from any source.", "es": "No hay cr\u00e9dito ni pr\u00e9stamo accesible de ninguna fuente.", "fr": "Aucun cr\u00e9dit ou emprunt n''est accessible aupr\u00e8s d''aucune source."}, "label": {"en": "No", "es": "No", "fr": "Non"}}]}'
