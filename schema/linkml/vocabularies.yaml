 beb\u00e9 naci\u00f3 vivo (mostr\u00f3 alg\u00fan signo de vida al nacer: respiraci\u00f3n, latido card\u00edaco, movimiento voluntario). DHS-8 m80 = 1.", "fr": "Le b\u00e9b\u00e9 est n\u00e9 vivant (a montr\u00e9 tout signe de vie \u00e0 la naissance : respiration, battements cardiaques, mouvement volontaire). DHS-8 m80 = 1."}, "label": {"en": "Live birth", "es": "Nacimiento vivo", "fr": "Naissance vivante"}}, {"code": "stillbirth", "definition": {"en": "The baby was born dead (showed no sign of life at birth). DHS-8 m80 = 3. Stillbirths are included in the DHS-8 ANC and maternal PNC denominators. Newborn-specific PNC items are skipped for stillbirths.", "es": "El beb\u00e9 naci\u00f3 muerto (no mostr\u00f3 ning\u00fan signo de vida al nacer). DHS-8 m80 = 3. Los mortinatos se incluyen en los denominadores de APN y PPN materna del DHS-8. Los \u00edtems de PPN espec\u00edficos del reci\u00e9n nacido se omiten para los mortinatos.", "fr": "Le b\u00e9b\u00e9 est n\u00e9 mort (n''a montr\u00e9 aucun signe de vie \u00e0 la naissance). DHS-8 m80 = 3. Les mortinaissances sont incluses dans les d\u00e9nominateurs ANC et PNC maternel du DHS-8. Les items PNC sp\u00e9cifiques au nouveau-n\u00e9 sont ignor\u00e9s pour les mortinaissances."}, "label": {"en": "Stillbirth", "es": "Mortinato", "fr": "Mortinaissance"}}]}'
