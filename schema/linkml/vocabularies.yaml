hold member.", "es": "P\u00e9rdida de ingresos debido a enfermedad, lesi\u00f3n o muerte de un miembro productivo del hogar.", "fr": "Perte de revenus due \u00e0 la maladie, \u00e0 une blessure ou au d\u00e9c\u00e8s d''un membre productif du m\u00e9nage."}, "label": {"en": "Serious illness, injury, or death of income earner", "es": "Enfermedad grave, lesi\u00f3n o muerte de un generador de ingresos", "fr": "Maladie grave, blessure ou d\u00e9c\u00e8s d''un actif"}}, {"code": "price_shock", "definition": {"en": "Income reduced because the price of goods sold fell sharply or input costs increased sharply.", "es": "Ingresos reducidos porque el precio de los bienes vendidos cay\u00f3 bruscamente o los costos de los insumos aumentaron bruscamente.", "fr": "Revenus r\u00e9duits parce que le prix des biens vendus a fortement chut\u00e9 ou que les co\u00fbts des intrants ont fortement augment\u00e9."}, "label": {"en": "Significant price change (food, inputs, or goods)", "es": "Choque de precios significativo (alimentos, insumos o bienes)", "fr": "Choc de prix significatif (nourriture, intrants ou biens)"}}, {"code": "job_or_market_loss", "definition": {"en": "Loss of employment or destruction of the market where the household sold products or labour.", "es": "P\u00e9rdida de empleo o destrucci\u00f3n del mercado donde el hogar vend\u00eda productos o trabajo.", "fr": "Perte d''emploi ou destruction du march\u00e9 o\u00f9 le m\u00e9nage vendait ses produits ou sa force de travail."}, "label": {"en": "Job loss or market collapse", "es": "P\u00e9rdida de empleo o colapso del mercado", "fr": "Perte d''emploi ou effondrement du march\u00e9"}}, {"code": "asset_theft_loss", "definition": {"en": "Productive or financial assets stolen, destroyed, or lost.", "es": "Activos productivos o financieros robados, destruidos o perdidos.", "fr": "Actifs productifs ou financiers vol\u00e9s, d\u00e9truits ou perdus."}, "label": {"en": "Theft or loss of assets", "es": "Robo o p\u00e9rdida de act