  ShelterTenureDocument:
    title:
      en: Shelter Tenure Document Type
      fr: Type de document d'occupation d'abri
      es: Tipo de documento de tenencia de refugio
    description:
      en: The type of agreement or document the household holds for the shelter it currently occupies. Based on Sphere Standard 6 security-of-tenure guidance and the UNHCR Housing, Land and Property (HLP) framework.
      fr: Le type d'accord ou de document que le ménage détient pour l'abri qu'il occupe actuellement. Basé sur les orientations de sécurité d'occupation de la Norme Sphère 6 et le cadre HLP du HCR (Logement, Terres et Propriété).
      es: El tipo de acuerdo o documento que el hogar posee para el refugio que ocupa actualmente. Basado en la orientación de seguridad de tenencia de la Norma Esfera 6 y el marco HLP del ACNUR (Vivienda, Tierra y Propiedad).
    enum_uri: aidops:ShelterTenureDocument
    permissible_values:
      written_formal_lease:
        title:
          en: Written formal lease or rental agreement
          fr: Bail formel écrit ou contrat de location
          es: Contrato de arrendamiento formal escrito
        description:
          en: Legally binding written agreement with a landlord or property owner, signed by both parties and potentially registered with authorities.
          fr: Accord écrit juridiquement contraignant avec un propriétaire, signé par les deux parties et éventuellement enregistré auprès des autorités.
          es: Acuerdo escrito legalmente vinculante con un arrendador o propietario, firmado por ambas partes y potencialmente registrado ante las autoridades.
      written_informal_agreement:
        title:
          en: Written informal agreement
          fr: Accord informel écrit
          es: Acuerdo informal escrito
        description:
          en: Written letter or agreement between the parties without formal legal registration.
          fr: Lettre ou accord écrit entre les parties sans enregistrement légal formel.
          es: Carta o acuerdo escrito entre las partes sin registro legal formal.
      verbal_agreement:
        title:
          en: Verbal agreement only
          fr: Accord verbal uniquement
          es: Acuerdo verbal únicamente
        description:
          en: Oral agreement between the household and a landlord, host, or authority with no written documentation.
          fr: Accord oral entre le ménage et un propriétaire, hôte ou autorité sans documentation écrite.
          es: Acuerdo oral entre el hogar y un arrendador, anfitrión o autoridad sin documentación escrita.
      customary_arrangement:
        title:
          en: Customary or community-based arrangement
          fr: Arrangement coutumier ou communautaire
          es: Arreglo consuetudinario o comunitario
        description:
          en: Tenure governed by community or customary norms without written documentation, recognised locally but not by formal legal systems.
          fr: Occupation régie par des normes communautaires ou coutumières sans documentation écrite, reconnue localement mais pas par les systèmes juridiques formels.
          es: Tenencia regida por normas comunitarias o consuetudinarias sin documentación escrita, reconocida localmente pero no por los sistemas jurídicos formales.
      programme_allocation:
        title:
          en: Programme allocation letter
          fr: Lettre d'attribution de programme
          es: Carta de asignación de programa
        description:
          en: Letter or document from a humanitarian agency or government programme allocating the shelter to the household for the duration of an assistance programme.
          fr: Lettre ou document d'une agence humanitaire ou d'un programme gouvernemental attribuant l'abri au ménage pour la durée d'un programme d'assistance.
          es: Carta o documento de una agencia humanitaria o programa gubernamental que asigna el refugio al hogar durante la duración de un programa de asistencia.
      ownership_document:
        title:
          en: Title deed or ownership document
          fr: Titre de propriété ou document de propriété
          es: Escritura de propiedad o documento de titularidad
        description:
          en: Formal title deed, certificate of ownership, or equivalent state-issued document proving the household's legal ownership of the shelter.
          fr: Titre de propriété formel, certificat de propriété ou document équivalent délivré par l'État prouvant la propriété légale de l'abri par le ménage.
          es: Escritura de propiedad formal, certificado de propiedad o documento equivalente emitido por el Estado que prueba la propiedad legal del refugio por parte del hogar.
      no_agreement:
        title:
          en: No agreement
          fr: Aucun accord
          es: Sin acuerdo
        description:
          en: The household occupies the shelter without any agreement, permission, or acknowledgement from a landlord or authority.
          fr: Le ménage occupe l'abri sans aucun accord, permission ou reconnaissance d'un propriétaire ou d'une autorité.
          es: El hogar ocupa el refugio sin ningún acuerdo, permiso o reconocimiento de un arrendador o autoridad.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Agreement or document type not covered by the above categories.
          fr: Type d'accord ou de document non couvert par les catégories ci-dessus.
          es: Tipo de acuerdo o documento no cubierto por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "The type of agreement or document the household holds for the shelter it currently occupies. Based on Sphere Standard 6 security-of-tenure guidance and the UNHCR Housing, Land and Property (HLP) framework.", "es": "El tipo de acuerdo o documento que el hogar posee para el refugio que ocupa actualmente. Basado en la orientaci\u00f3n de seguridad de tenencia de la Norma Esfera 6 y el marco HLP del ACNUR (Vivienda, Tierra y Propiedad).", "fr": "Le type d''accord ou de document que le m\u00e9nage d\u00e9tient pour l''abri qu''il occupe actuellement. Bas\u00e9 sur les orientations de s\u00e9curit\u00e9 d''occupation de la Norme Sph\u00e8re 6 et le cadre HLP du HCR (Logement, Terres et Propri\u00e9t\u00e9)."}, "id": "shelter-tenure-document", "label": {"en": "Shelter Tenure Document Type", "es": "Tipo de documento de tenencia de refugio", "fr": "Type de document d''occupation d''abri"}, "maturity": "draft", "standard": {"name": "Sphere Handbook 2018, Standard 6 \u2014 Security of Tenure", "uri": "https://spherestandards.org/handbook-2018/"}, "values": [{"code": "written_formal_lease", "definition": {"en": "Legally binding written agreement with a landlord or property owner, signed by both parties and potentially registered with authorities.", "es": "Acuerdo escrito legalmente vinculante con un arrendador o propietario, firmado por ambas partes y potencialmente registrado ante las autoridades.", "fr": "Accord \u00e9crit juridiquement contraignant avec un propri\u00e9taire, sign\u00e9 par les deux parties et \u00e9ventuellement enregistr\u00e9 aupr\u00e8s des autorit\u00e9s."}, "label": {"en": "Written formal lease or rental agreement", "es": "Contrato de arrendamiento formal escrito", "fr": "Bail formel \u00e9crit ou contrat de location"}}, {"code": "written_informal_agreement", "definition": {"en": "Written letter or agreement between the parties without formal legal registration.", "es": "Carta o acuerdo escrito entre las partes sin registro legal formal.", "fr": "Lettre ou accord \u00e9crit entre les parties sans enregistrement l\u00e9gal formel."}, "label": {"en": "Written informal agreement", "es": "Acuerdo informal escrito", "fr": "Accord informel \u00e9crit"}}, {"code": "verbal_agreement", "definition": {"en": "Oral agreement between the household and a landlord, host, or authority with no written documentation.", "es": "Acuerdo oral entre el hogar y un arrendador, anfitri\u00f3n o autoridad sin documentaci\u00f3n escrita.", "fr": "Accord oral entre le m\u00e9nage et un propri\u00e9taire, h\u00f4te ou autorit\u00e9 sans documentation \u00e9crite."}, "label": {"en": "Verbal agreement only", "es": "Acuerdo verbal \u00fanicamente", "fr": "Accord verbal uniquement"}}, {"code": "customary_arrangement", "definition": {"en": "Tenure governed by community or customary norms without written documentation, recognised locally but not by formal legal systems.", "es": "Tenencia regida por normas comunitarias o consuetudinarias sin documentaci\u00f3n escrita, reconocida localmente pero no por los sistemas jur\u00eddicos formales.", "fr": "Occupation r\u00e9gie par des normes communautaires ou coutumi\u00e8res sans documentation \u00e9crite, reconnue localement mais pas par les syst\u00e8mes juridiques formels."}, "label": {"en": "Customary or community-based arrangement", "es": "Arreglo consuetudinario o comunitario", "fr": "Arrangement coutumier ou communautaire"}}, {"code": "programme_allocation", "definition": {"en": "Letter or document from a humanitarian agency or government programme allocating the shelter to the household for the duration of an assistance programme.", "es": "Carta o documento de una agencia humanitaria o programa gubernamental que asigna el refugio al hogar durante la duraci\u00f3n de un programa de asistencia.", "fr": "Lettre ou document d''une agence humanitaire ou d''un programme gouvernemental attribuant l''abri au m\u00e9nage pour la dur\u00e9e d''un programme d''assistance."}, "label": {"en": "Programme allocation letter", "es": "Carta de asignaci\u00f3n de programa", "fr": "Lettre d''attribution de programme"}}, {"code": "ownership_document", "definition": {"en": "Formal title deed, certificate of ownership, or equivalent state-issued document proving the household''s legal ownership of the shelter.", "es": "Escritura de propiedad formal, certificado de propiedad o documento equivalente emitido por el Estado que prueba la propiedad legal del refugio por parte del hogar.", "fr": "Titre de propri\u00e9t\u00e9 formel, certificat de propri\u00e9t\u00e9 ou document \u00e9quivalent d\u00e9livr\u00e9 par l''\u00c9tat prouvant la propri\u00e9t\u00e9 l\u00e9gale de l''abri par le m\u00e9nage."}, "label": {"en": "Title deed or ownership document", "es": "Escritura de propiedad o documento de titularidad", "fr": "Titre de propri\u00e9t\u00e9 ou document de propri\u00e9t\u00e9"}}, {"code": "no_agreement", "definition": {"en": "The household occupies the shelter without any agreement, permission, or acknowledgement from a landlord or authority.", "es": "El hogar ocupa el refugio sin ning\u00fan acuerdo, permiso o reconocimiento de un arrendador o autoridad.", "fr": "Le m\u00e9nage occupe l''abri sans aucun accord, permission ou reconnaissance d''un propri\u00e9taire ou d''une autorit\u00e9."}, "label": {"en": "No agreement", "es": "Sin acuerdo", "fr": "Aucun accord"}}, {"code": "other", "definition": {"en": "Agreement or document type not covered by the above categories.", "es": "Tipo de acuerdo o documento no cubierto por las categor\u00edas anteriores.", "fr": "Type d''accord ou de document non couvert par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
