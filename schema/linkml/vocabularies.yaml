  WeaiCreditDecision:
    title:
      en: WEAI Credit Decision Participation
      fr: Participation à la décision de crédit WEAI
      es: Participación en decisión de crédito WEAI
    description:
      en: Three-code classification of a respondent's participation in a household credit or loan decision, used in pro-WEAI Indicator B3 (access to and decisions on financial services). Condition A adequacy requires yes_solely or yes_jointly.
      fr: Classification à trois codes de la participation du répondant à une décision de crédit ou de prêt du ménage, utilisée dans l'indicateur B3 du pro-WEAI (accès aux services financiers et décisions). L'adéquation de la condition A requiert yes_solely ou yes_jointly.
      es: Clasificación de tres códigos de la participación de un encuestado en una decisión de crédito o préstamo del hogar, utilizada en el indicador B3 del pro-WEAI (acceso a servicios financieros y decisiones). La adecuación de la condición A requiere yes_solely o yes_jointly.
    enum_uri: aidops:WeaiCreditDecision
    permissible_values:
      yes_solely:
        title:
          en: Yes, I decided alone
          fr: Oui, j'ai décidé seul(e)
          es: Sí, decidí solo/a
        description:
          en: The respondent was the sole decision-maker for obtaining the credit. Meets B3 condition A adequacy.
          fr: Le répondant était le seul décideur pour l'obtention du crédit. Satisfait à l'adéquation de la condition A de B3.
          es: El encuestado fue el único tomador de decisiones para obtener el crédito. Cumple la adecuación de la condición A de B3.
      yes_jointly:
        title:
          en: Yes, I participated jointly
          fr: Oui, j'ai participé conjointement
          es: Sí, participé conjuntamente
        description:
          en: The respondent participated in the credit decision jointly with a spouse or other household member. Meets B3 condition A adequacy.
          fr: Le répondant a participé à la décision de crédit conjointement avec un conjoint ou un autre membre du ménage. Satisfait à l'adéquation de la condition A de B3.
          es: El encuestado participó en la decisión de crédito conjuntamente con un cónyuge u otro miembro del hogar. Cumple la adecuación de la condición A de B3.
      'no':
        title:
          en: No, I did not participate
          fr: Non, je n'ai pas participé
          es: No, no participé
        description:
          en: The respondent did not participate in the credit decision. Does not meet B3 condition A adequacy.
          fr: Le répondant n'a pas participé à la décision de crédit. Ne satisfait pas à l'adéquation de la condition A de B3.
          es: El encuestado no participó en la decisión de crédito. No cumple la adecuación de la condición A de B3.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["pro-weai-2019"], "definition": {"en": "Three-code classification of a respondent''s participation in a household credit or loan decision, used in pro-WEAI Indicator B3 (access to and decisions on financial services). Condition A adequacy requires yes_solely or yes_jointly.", "es": "Clasificaci\u00f3n de tres c\u00f3digos de la participaci\u00f3n de un encuestado en una decisi\u00f3n de cr\u00e9dito o pr\u00e9stamo del hogar, utilizada en el indicador B3 del pro-WEAI (acceso a servicios financieros y decisiones). La adecuaci\u00f3n de la condici\u00f3n A requiere yes_solely o yes_jointly.", "fr": "Classification \u00e0 trois codes de la participation du r\u00e9pondant \u00e0 une d\u00e9cision de cr\u00e9dit ou de pr\u00eat du m\u00e9nage, utilis\u00e9e dans l''indicateur B3 du pro-WEAI (acc\u00e8s aux services financiers et d\u00e9cisions). L''ad\u00e9quation de la condition A requiert yes_solely ou yes_jointly."}, "id": "weai-credit-decision", "label": {"en": "WEAI Credit Decision Participation", "es": "Participaci\u00f3n en decisi\u00f3n de cr\u00e9dito WEAI", "fr": "Participation \u00e0 la d\u00e9cision de cr\u00e9dit WEAI"}, "maturity": "draft", "standard": {"name": "pro-WEAI User Guide v3 (IFPRI 2026)", "uri": "https://weai.ifpri.info/files/2026/01/Pro-WEAI-Guide-v3.pdf"}, "values": [{"code": "yes_solely", "definition": {"en": "The respondent was the sole decision-maker for obtaining the credit. Meets B3 condition A adequacy.", "es": "El encuestado fue el \u00fanico tomador de decisiones para obtener el cr\u00e9dito. Cumple la adecuaci\u00f3n de la condici\u00f3n A de B3.", "fr": "Le r\u00e9pondant \u00e9tait le seul d\u00e9cideur pour l''obtention du cr\u00e9dit. Satisfait \u00e0 l''ad\u00e9quation de la condition A de B3."}, "label": {"en": "Yes, I decided alone", "es": "S\u00ed, decid\u00ed solo/a", "fr": "Oui, j''ai d\u00e9cid\u00e9 seul(e)"}}, {"code": "yes_jointly", "definition": {"en": "The respondent participated in the credit decision jointly with a spouse or other household member. Meets B3 condition A adequacy.", "es": "El encuestado particip\u00f3 en la decisi\u00f3n de cr\u00e9dito conjuntamente con un c\u00f3nyuge u otro miembro del hogar. Cumple la adecuaci\u00f3n de la condici\u00f3n A de B3.", "fr": "Le r\u00e9pondant a particip\u00e9 \u00e0 la d\u00e9cision de cr\u00e9dit conjointement avec un conjoint ou un autre membre du m\u00e9nage. Satisfait \u00e0 l''ad\u00e9quation de la condition A de B3."}, "label": {"en": "Yes, I participated jointly", "es": "S\u00ed, particip\u00e9 conjuntamente", "fr": "Oui, j''ai particip\u00e9 conjointement"}}, {"code": "no", "definition": {"en": "The respondent did not participate in the credit decision. Does not meet B3 condition A adequacy.", "es": "El encuestado no particip\u00f3 en la decisi\u00f3n de cr\u00e9dito. No cumple la adecuaci\u00f3n de la condici\u00f3n A de B3.", "fr": "Le r\u00e9pondant n''a pas particip\u00e9 \u00e0 la d\u00e9cision de cr\u00e9dit. Ne satisfait pas \u00e0 l''ad\u00e9quation de la condition A de B3."}, "label": {"en": "No, I did not participate", "es": "No, no particip\u00e9", "fr": "Non, je n''ai pas particip\u00e9"}}]}'
