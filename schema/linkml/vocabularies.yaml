}, {"code": "undecided", "definition": {"en": "The woman is unsure or unable to express a clear preference (e.g., ''up to God'', ''as many as come'', ''don''t know'').", "es": "La mujer est\u00e1 indecisa o no puede expresar una preferencia clara (p. ej., ''lo que Dios quiera'', ''los que vengan'', ''no s\u00e9'').", "fr": "La femme est incertaine ou incapable d''exprimer une pr\u00e9f\u00e9rence claire (p. ex. \u00ab c''est Dieu qui d\u00e9cide \u00bb, \u00ab autant qu''il en vient \u00bb, \u00ab je ne sais pas \u00bb)."}, "label": {"en": "Undecided / unsure", "es": "Indecisa / no segura", "fr": "Ind\u00e9cise / incertaine"}}]}'
