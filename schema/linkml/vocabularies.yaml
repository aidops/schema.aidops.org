      publicschema_logical_document_json: '{"bibliography_refs": ["gsc-indicators-v2", "sphere-2018"], "definition": {"en": "The household''s primary method for disposing of solid waste (rubbish, garbage). Based on Sphere Standard 7 key action 3 on safe, timely, and environmentally sustainable solid waste management.", "es": "El m\u00e9todo principal del hogar para eliminar los residuos s\u00f3lidos (basura, desechos). Basado en la acci\u00f3n clave 3 de la Norma Esfera 7 sobre la gesti\u00f3n de residuos s\u00f3lidos de manera segura, oportuna y ambientalmente sostenible.", "fr": "La principale m\u00e9thode du m\u00e9nage pour \u00e9liminer les d\u00e9chets solides (ordures, d\u00e9tritus). Bas\u00e9 sur l''action cl\u00e9 3 de la Norme Sph\u00e8re 7 sur la gestion des d\u00e9chets solides de mani\u00e8re s\u00fbre, rapide et \u00e9cologiquement durable."}, "id": "solid-waste-disposal", "label": {"en": "Solid Waste Disposal Method", "es": "M\u00e9todo de eliminaci\u00f3n de residuos s\u00f3lidos", "fr": "M\u00e9thode d''\u00e9limination des d\u00e9chets solides"}, "maturity": "draft", "standard": {"name": "Sphere Handbook 2018, Standard 7 \u2014 Environmental Sustainability", "uri": "https://spherestandards.org/handbook-2018/"}, "values": [{"code": "communal_collection_service", "definition": {"en": "Household places waste at a designated collection point and it is collected by a municipal service or a humanitarian programme.", "es": "El hogar coloca los residuos en un punto de recolecci\u00f3n designado y son recogidos por un servicio municipal o un programa humanitario.", "fr": "Le m\u00e9nage d\u00e9pose les d\u00e9chets \u00e0 un point de collecte d\u00e9sign\u00e9 et ils sont collect\u00e9s par un service municipal ou un programme humanitaire."}, "label": {"en": "Communal collection service", "es": "Servicio de recolecci\u00f3n comunal", "fr": "Service de collecte communal"}}, {"code": "household_pit", "definition": {"en": "Household buries waste in a dedicated pit dug by or for the household on or near its plot.", "es": "El hogar entierra los residuos en una fosa dedicada excavada por o para el hogar en o cerca de su parcela.", "fr": "Le m\u00e9nage enfouit les d\u00e9chets dans une fosse d\u00e9di\u00e9e creus\u00e9e par ou pour le m\u00e9nage sur ou pr\u00e8s de sa parcelle."}, "label": {"en": "Household waste pit", "es": "Fosa de residuos dom\u00e9sticos", "fr": "Fosse \u00e0 d\u00e9chets m\u00e9nagers"}}, {"code": "burning", "definition": {"en": "Household burns waste in the open air or in a simple homemade incinerator without controlled combustion.", "es": "El hogar quema los residuos al aire libre o en un incinerador casero simple sin combusti\u00f3n controlada.", "fr": "Le m\u00e9nage br\u00fble les d\u00e9chets \u00e0 l''air libre ou dans un incin\u00e9rateur artisanal simple sans combustion contr\u00f4l\u00e9e."}, "label": {"en": "Open burning", "es": "Quema a cielo abierto", "fr": "Incin\u00e9ration \u00e0 ciel ouvert"}}, {"code": "open_dumping", "definition": {"en": "Household disposes of waste in an open area, field, waterway, or communal space without any treatment or designated containment.", "es": "El hogar elimina los residuos en un \u00e1rea abierta, campo, curso de agua o espacio comunal sin ning\u00fan tratamiento o contenci\u00f3n designada.", "fr": "Le m\u00e9nage \u00e9limine les d\u00e9chets dans un espace ouvert, un champ, un cours d''eau ou un espace commun sans aucun traitement ni confinement d\u00e9sign\u00e9."}, "label": {"en": "Open dumping", "es": "Vertido a cielo abierto", "fr": "D\u00e9charge \u00e0 ciel ouvert"}}, {"code": "communal_skip_or_bin", "definition": {"en": "Household deposits waste in a shared container (skip, bin, or drum) awaiting collection by a service.", "es": "El hogar deposita los residuos en un contenedor compartido (contenedor, cubo o tambor) a la espera de recogida por un servicio.", "fr": "Le m\u00e9nage d\u00e9pose les d\u00e9chets dans un conteneur partag\u00e9 (benne, poubelle ou f\u00fbt) en attente d''une collecte par un service."}, "label": {"en": "Communal skip or bin", "es": "Contenedor o cubo comunal", "fr": "Benne ou poubelle communale"}}, {"code": "recycling_or_composting", "definition": {"en": "Household separates waste for recycling, composting, or sale to recyclers, diverting it from disposal streams.", "es": "El hogar separa los residuos para reciclaje, compostaje o venta a recicladores, desvi\u00e1ndolos de los flujos de eliminaci\u00f3n.", "fr": "Le m\u00e9nage s\u00e9pare les d\u00e9chets pour le recyclage, le compostage ou la vente \u00e0 des recycleurs, les d\u00e9tournant des fili\u00e8res d''\u00e9limination."}, "label": {"en": "Recycling or composting", "es": "Reciclaje o compostaje", "fr": "Recyclage ou compostage"}}, {"code": "no_disposal", "definition": {"en": "The household has no regular method for disposing of solid waste; waste accumulates without management.", "es": "El hogar no tiene un m\u00e9todo regular para eliminar los residuos s\u00f3lidos; los residuos se acumulan sin gesti\u00f3n.", "fr": "Le m\u00e9nage n''a pas de m\u00e9thode r\u00e9guli\u00e8re pour \u00e9liminer les d\u00e9chets solides ; les d\u00e9chets s''accumulent sans gestion."}, "label": {"en": "No disposal practice", "es": "Sin pr\u00e1ctica de eliminaci\u00f3n", "fr": "Aucune pratique d''\u00e9limination"}}, {"code": "other", "definition": {"en": "Disposal method not covered by the above categories.", "es": "M\u00e9todo de eliminaci\u00f3n no cubierto por las categor\u00edas anteriores.", "fr": "M\u00e9thode d''\u00e9limination non couverte par les cat\u00e9gories ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
