  AapTrust4:
    title:
      en: 'AAP: Trust in aid providers (4 levels)'
      fr: 'Redevabilité : Confiance envers les intervenants (4 niveaux)'
      es: 'Rendición de cuentas: Confianza en los actores humanitarios (4 niveles)'
    description:
      en: 'Four-level trust scale used in the AccountabilityToAffectedPopulationsProfile for items about the respondent''s general trust in aid providers. Source: GTS HVI trust pillar (one of the four canonical GTS pillars alongside relevance, fairness, and agency/voice) and the OECD Guidelines on Measuring Trust (2017). Properties using this vocabulary are PSEA-adjacent and must be flagged `sensitivity: sensitive` because the act of expressing distrust could be sensitive in some contexts.'
      fr: 'Échelle de confiance à quatre niveaux utilisée dans le Profil de redevabilité envers les populations affectées pour les items concernant la confiance générale du répondant envers les intervenants. Source : pilier de confiance GTS HVI (l''un des quatre piliers canoniques de GTS aux côtés de la pertinence, de l''équité et de l''agentivité/voix) et Lignes directrices de l''OCDE sur la mesure de la confiance (2017). Les propriétés utilisant ce vocabulaire sont liées à la PSEA et doivent être marquées `sensitivity: sensitive` car l''expression de la méfiance pourrait être sensible dans certains contextes.'
      es: 'Escala de confianza de cuatro niveles utilizada en el Perfil de Rendición de Cuentas a las Poblaciones Afectadas para los ítems sobre la confianza general del encuestado en los actores humanitarios. Fuente: pilar de confianza de GTS HVI (uno de los cuatro pilares canónicos de GTS junto con relevancia, equidad y agencia/voz) y Directrices de la OCDE sobre la Medición de la Confianza (2017). Las propiedades que utilizan este vocabulario están relacionadas con PSEA y deben marcarse como `sensitivity: sensitive` porque el acto de expresar desconfianza podría ser sensible en algunos contextos.'
    enum_uri: aidops:AapTrust4
    permissible_values:
      trust_a_lot:
        title:
          en: Trust a lot
          fr: Fait beaucoup confiance
          es: Confía mucho
        description:
          en: Respondent reports a high level of trust in aid providers.
          fr: Le répondant rapporte un niveau de confiance élevé envers les intervenants.
          es: El encuestado reporta un alto nivel de confianza en los actores humanitarios.
      trust_somewhat:
        title:
          en: Trust somewhat
          fr: Fait assez confiance
          es: Confía algo
        description:
          en: Respondent reports a moderate level of trust in aid providers.
          fr: Le répondant rapporte un niveau de confiance modéré envers les intervenants.
          es: El encuestado reporta un nivel moderado de confianza en los actores humanitarios.
      trust_a_little:
        title:
          en: Trust a little
          fr: Fait un peu confiance
          es: Confía poco
        description:
          en: Respondent reports a low level of trust in aid providers.
          fr: Le répondant rapporte un faible niveau de confiance envers les intervenants.
          es: El encuestado reporta un bajo nivel de confianza en los actores humanitarios.
      do_not_trust:
        title:
          en: Do not trust
          fr: Ne fait pas confiance
          es: No confía
        description:
          en: Respondent reports no trust in aid providers.
          fr: Le répondant rapporte aucune confiance envers les intervenants.
          es: El encuestado reporta ninguna confianza en los actores humanitarios.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot assess trust.
          fr: Le répondant ne peut pas évaluer la confiance.
          es: El encuestado no puede evaluar la confianza.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: Respondent declines to answer.
          fr: Le répondant refuse de répondre.
          es: El encuestado se niega a responder.
