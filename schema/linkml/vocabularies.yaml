      publicschema_logical_document_json: '{"bibliography_refs": ["chs-2024", "chs-alliance-verification", "gts-hvi", "iasc-reach-aap-menu-2018"], "definition": {"en": "Five-level Likert satisfaction scale used in the AccountabilityToAffectedPopulationsProfile for items that ask how well aid met needs, how well consultation was reflected, and how satisfied the respondent is with complaint-response handling. This is the canonical AAP satisfaction measure in CHS Alliance auditor guidance, GTS HVI, and the IASC / REACH Menu of AAP Questions 2018. Distinct from `aap-agree-5` (same structure, different labels: agreement vs satisfaction). Includes non-substantive codes `dont_know`, `not_applicable`, and `prefer_not_to_answer`.", "es": "Escala de satisfacci\u00f3n de Likert de cinco niveles utilizada en el Perfil de Rendici\u00f3n de Cuentas a las Poblaciones Afectadas para los \u00edtems que preguntan qu\u00e9 tan bien la ayuda cumpli\u00f3 con las necesidades, qu\u00e9 tan bien se reflej\u00f3 la consulta, y qu\u00e9 tan satisfecho est\u00e1 el encuestado con el manejo de la respuesta a quejas. Es la medida can\u00f3nica de satisfacci\u00f3n AAP en las orientaciones de auditor\u00eda de CHS Alliance, GTS HVI y el Men\u00fa de Preguntas AAP IASC / REACH 2018. Distinto de `aap-agree-5` (misma estructura, etiquetas diferentes: acuerdo vs satisfacci\u00f3n). Incluye c\u00f3digos no sustantivos `dont_know`, `not_applicable` y `prefer_not_to_answer`.", "fr": "\u00c9chelle de satisfaction de Likert \u00e0 cinq niveaux utilis\u00e9e dans le Profil de redevabilit\u00e9 envers les populations affect\u00e9es pour les items qui demandent dans quelle mesure l''aide a r\u00e9pondu aux besoins, dans quelle mesure la consultation a \u00e9t\u00e9 refl\u00e9t\u00e9e, et \u00e0 quel point le r\u00e9pondant est satisfait de la gestion de la r\u00e9ponse aux plaintes. Il s''agit de la mesure de satisfaction AAP canonique dans les orientations des auditeurs de CHS Alliance, GTS HVI et le Menu de questions AAP IASC / REACH 2018. Distinct de `aap-agree-5` (m\u00eame structure, \u00e9tiquettes diff\u00e9rentes : accord vs satisfaction). Inclut des codes non substantiels `dont_know`, `not_applicable` et `prefer_not_to_answer`."}, "id": "aap-satisfaction-5", "label": {"en": "AAP: Satisfaction (5 levels)", "es": "Rendici\u00f3n de cuentas: Satisfacci\u00f3n (5 niveles)", "fr": "Redevabilit\u00e9 : Satisfaction (5 niveaux)"}, "maturity": "draft", "standard": {"name": "CHS Alliance Verification Scheme", "notes": "Satisfaction 5-point scale aligned with CHS Alliance auditor guidance and cross-referenced by GTS HVI.", "uri": "https://www.chsalliance.org/verify-performance/"}, "values": [{"code": "very_well", "definition": {"en": "The respondent reports the highest level of positive assessment.", "es": "El encuestado reporta el nivel m\u00e1s alto de evaluaci\u00f3n positiva.", "fr": "Le r\u00e9pondant rapporte le niveau le plus \u00e9lev\u00e9 d''\u00e9valuation positive."}, "label": {"en": "Very well / Very satisfied", "es": "Muy bien / Muy satisfecho", "fr": "Tr\u00e8s bien / Tr\u00e8s satisfait"}}, {"code": "somewhat_well", "definition": {"en": "The respondent reports a positive assessment.", "es": "El encuestado reporta una evaluaci\u00f3n positiva.", "fr": "Le r\u00e9pondant rapporte une \u00e9valuation positive."}, "label": {"en": "Somewhat well / Satisfied", "es": "Algo bien / Satisfecho", "fr": "Plut\u00f4t bien / Satisfait"}}, {"code": "neither", "definition": {"en": "The respondent is neutral.", "es": "El encuestado es neutral.", "fr": "Le r\u00e9pondant est neutre."}, "label": {"en": "Neither well nor poorly / Neutral", "es": "Ni bien ni mal / Neutral", "fr": "Ni bien ni mal / Neutre"}}, {"code": "somewhat_poorly", "definition": {"en": "The respondent reports a negative assessment.", "es": "El encuestado reporta una evaluaci\u00f3n negativa.", "fr": "Le r\u00e9pondant rapporte une \u00e9valuation n\u00e9gative."}, "label": {"en": "Somewhat poorly / Dissatisfied", "es": "Algo mal / Insatisfecho", "fr": "Plut\u00f4t mal / Insatisfait"}}, {"code": "not_at_all", "definition": {"en": "The respondent reports the highest level of negative assessment.", "es": "El encuestado reporta el nivel m\u00e1s alto de evaluaci\u00f3n negativa.", "fr": "Le r\u00e9pondant rapporte le niveau le plus \u00e9lev\u00e9 d''\u00e9valuation n\u00e9gative."}, "label": {"en": "Not at all / Very dissatisfied", "es": "Nada / Muy insatisfecho", "fr": "Pas du tout / Tr\u00e8s insatisfait"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot assess.", "es": "El encuestado no puede evaluar.", "fr": "Le r\u00e9pondant ne peut pas \u00e9valuer."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}, {"code": "not_applicable", "definition": {"en": "The question does not apply to the respondent''s situation (for example, no consultation took place, so consultation-reflection cannot be assessed).", "es": "La pregunta no se aplica a la situaci\u00f3n del encuestado (por ejemplo, no hubo consulta, por lo que el reflejo de la consulta no puede evaluarse).", "fr": "La question ne s''applique pas \u00e0 la situation du r\u00e9pondant (par exemple, aucune consultation n''a eu lieu, donc la r\u00e9flexion sur la consultation ne peut \u00eatre \u00e9valu\u00e9e)."}, "label": {"en": "Not applicable", "es": "No aplicable", "fr": "Sans objet"}}, {"code": "prefer_not_to_answer", "definition": {"en": "Respondent declines to answer.", "es": "El encuestado se niega a responder.", "fr": "Le r\u00e9pondant refuse de r\u00e9pondre."}, "label": {"en": "Prefer not to answer", "es": "Prefiere no responder", "fr": "Pr\u00e9f\u00e8re ne pas r\u00e9pondre"}}]}'
