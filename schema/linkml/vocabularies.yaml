", "fr": "Tous les l\u00e9gumes et feuilles vertes, y compris les feuilles cueillies dans la nature. Poids : 1."}, "label": {"en": "Vegetables and leaves", "es": "Verduras y hojas", "fr": "L\u00e9gumes et feuilles"}, "notes": {"en": "FCS weight = 1"}}, {"code": "fruit", "definition": {"en": "All fruits, including wild-gathered. Weight: 1.", "es": "Todas las frutas, incluidas las recolectadas silvestres. Peso: 1.", "fr": "Tous les fruits, y compris ceux cueillis dans la nature. Poids : 1."}, "label": {"en": "Fruit", "es": "Frutas", "fr": "Fruits"}, "notes": {"en": "FCS weight = 1"}}, {"code": "meat_fish_eggs", "definition": {"en": "Beef, goat, poultry, pork, bushmeat, fresh or dried fish and seafood, and eggs of any kind. Asked as a single combined protein question in the standard WFP FCS. Weight: 4.", "es": "Res, cabra, aves, cerdo, carne de monte, pescado y mariscos frescos o secos, y huevos de cualquier tipo. Preguntado como una \u00fanica pregunta combinada de prote\u00ednas en el FCS est\u00e1ndar del PMA. Peso: 4.", "fr": "B\u0153uf, ch\u00e8vre, volaille, porc, viande de brousse, poisson et fruits de mer frais ou s\u00e9ch\u00e9s, et \u0153ufs de toute sorte. Interrog\u00e9 comme une seule question prot\u00e9ique combin\u00e9e dans le FCS standard du PAM. Poids : 4."}, "label": {"en": "Meat, fish, and eggs", "es": "Carne, pescado y huevos", "fr": "Viande, poisson et \u0153ufs"}, "notes": {"en": "FCS weight = 4"}}, {"code": "dairy", "definition": {"en": "Milk, yogurt, cheese, and other dairy products consumed at meal-contributing quantities. Small quantities used only as condiments (e.g., tea whitener) are counted as condiments. Weight: 4.", "es": "Leche, yogur, queso y otros l\u00e1cteos consumidos en cantidades que contribuyen a la comida. Las cantidades peque\u00f1as usadas solo como condimento (por ejemplo, para aclarar el t\u00e9) se cuentan como condimentos. Peso: 4.", "fr": "Lait, yaourt, fromage et autres produits laitiers consomm\u00e9s en quantit\u00e9s contribuant au repas. Les petites quantit\u00e9s utilis\u00e9es uniquement comme condiments (par exemple, pour blanchir le th\u00e9) sont compt\u00e9es comme condiments. Poids : 4."}, "label": {"en": "Milk and dairy", "es": "Leche y l\u00e1cteos", "fr": "Lait et produits laitiers"}, "notes": {"en": "FCS weight = 4"}}, {"code": "fat_oil", "definition": {"en": "Cooking oils, butter, ghee, lard, and other fats. Weight: 0.5.", "es": "Aceites de cocina, mantequilla, ghee, manteca y otras grasas. Peso: 0,5.", "fr": "Huiles de cuisson, beurre, ghee, saindoux et autres mati\u00e8res grasses. Poids : 0,5."}, "label": {"en": "Fat and oil", "es": "Grasa y aceite", "fr": "Mati\u00e8re grasse et huile"}, "notes": {"en": "FCS weight = 0.5"}}, {"code": "sugar", "definition": {"en": "Sugar, honey, jam, cakes, candy, sweetened beverages. Weight: 0.5.", "es": "Az\u00facar, miel, mermelada, pasteles, dulces, bebidas azucaradas. Peso: 0,5.", "fr": "Sucre, miel, confiture, g\u00e2teaux, bonbons, boissons sucr\u00e9es. Poids : 0,5."}, "label": {"en": "Sugar and sweets", "es": "Az\u00facar y dulces", "fr": "Sucre et sucreries"}, "notes": {"en": "FCS weight = 0.5"}}, {"code": "condiments", "definition": {"en": "Salt, pepper, spices, tea, coffee, and other condiments used in small quantities to flavour food. Captured as a screener item: frequent consumption of only condiments is a warning signal even though this group does not contribute to the FCS composite. Weight: 0.", "es": "Sal, pimienta, especias, t\u00e9, caf\u00e9 y otros condimentos usados en peque\u00f1as cantidades para dar sabor a los alimentos. Capturado como \u00edtem de detecci\u00f3n: el consumo frecuente solo de condimentos es una se\u00f1al de alerta aunque este grupo no contribuya al FCS compuesto. Peso: 0.", "fr": "Sel, poivre, \u00e9pices, th\u00e9, caf\u00e9 et autres condiments utilis\u00e9s en petites quantit\u00e9s pour aromatiser les aliments. Saisi comme item de d\u00e9pistage : la consommation fr\u00e9quente de seuls condiments est un signal d''alerte m\u00eame si ce groupe ne contribue pas au FCS composite. Poids : 0."}, "label": {"en": "Condiments", "es": "Condimentos", "fr": "Condiments"}, "notes": {"en": "FCS weight = 0 (screener)"}}]}'
