m\u00e9nopause (cessation naturelle). Elle est inf\u00e9conde."}, "label": {"en": "Menopausal", "es": "Menop\u00e1usica", "fr": "M\u00e9nopaus\u00e9e"}}, {"code": "hysterectomy", "definition": {"en": "The woman has had a hysterectomy and cannot conceive. She is infecund.", "es": "La mujer ha tenido una histerectom\u00eda y no puede concebir. Es infecunda.", "fr": "La femme a subi une hyst\u00e9rectomie et ne peut pas concevoir. Elle est inf\u00e9conde."}, "label": {"en": "Hysterectomy", "es": "Histerectom\u00eda", "fr": "Hyst\u00e9rectomie"}}]}'
