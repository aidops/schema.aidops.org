  StressSaleReason:
    title:
      en: Stress Sale Reason
      fr: Raison de la vente de détresse
      es: Razón de la venta de estrés
    description:
      en: 'Primary reason the household sold livestock earlier than planned or at a lower price than usual. Used in PastoralFoodSecurityProfile to capture pastoral-specific stress-sale causes that are not captured by FoodSecurityProfile LCS-FS items. Note: the code `conflict_pre_emptive` is partially sensitive (implies knowledge of anticipated armed events); apply code-level suppression in external data shares.'
      fr: Raison principale pour laquelle le ménage a vendu du bétail plus tôt que prévu ou à un prix inférieur à la normale. Le code `conflict_pre_emptive` est partiellement sensible.
      es: Razón principal por la que el hogar vendió ganado antes de lo planificado o a un precio menor al normal. El código `conflict_pre_emptive` es parcialmente sensible.
    enum_uri: aidops:StressSaleReason
    permissible_values:
      food_purchase:
        title:
          en: To buy food
          fr: Pour acheter de la nourriture
          es: Para comprar alimentos
        description:
          en: Livestock liquidated to fund food purchases; direct food security coping strategy.
          fr: Bétail liquidé pour financer l'achat de nourriture ; stratégie d'adaptation directe à la sécurité alimentaire.
          es: Ganado liquidado para financiar compras de alimentos; estrategia de afrontamiento directa de seguridad alimentaria.
      water_or_pasture_shortage:
        title:
          en: Lack of water or pasture
          fr: Manque d'eau ou de pâturage
          es: Falta de agua o pastos
        description:
          en: Herd too large to sustain on available water and pasture resources; destocking to reduce pressure on the remaining animals and rangeland.
          fr: Troupeau trop important pour être maintenu avec les ressources disponibles en eau et pâturage ; déstockage pour réduire la pression sur les animaux restants.
          es: El rebaño es demasiado grande para sostenerse con los recursos disponibles de agua y pastos; reducción del rebaño para aliviar la presión sobre los animales restantes.
      debt_repayment:
        title:
          en: Debt repayment
          fr: Remboursement de dettes
          es: Pago de deudas
        description:
          en: Livestock sold to meet financial obligations to creditors.
          fr: Bétail vendu pour honorer des obligations financières envers des créanciers.
          es: Ganado vendido para cumplir obligaciones financieras con acreedores.
      medical_expenses:
        title:
          en: Medical or health expenses
          fr: Dépenses médicales ou de santé
          es: Gastos médicos o de salud
        description:
          en: Livestock sold to fund human health costs for household members.
          fr: Bétail vendu pour financer les coûts de santé humaine des membres du ménage.
          es: Ganado vendido para financiar costos de salud humana de los miembros del hogar.
      conflict_pre_emptive:
        title:
          en: Pre-emptive sale before anticipated conflict or raiding
          fr: Vente préventive avant un conflit ou une razzia anticipée
          es: Venta preventiva antes de conflicto o rapiña anticipada
        description:
          en: 'Livestock liquidated to prevent total loss from anticipated raiding or conflict. Partially sensitive: implies knowledge of an anticipated armed event; apply code-level suppression in external data shares and retain for internal programme analysis only.'
          fr: Bétail liquidé pour éviter la perte totale lors d'une razzia ou d'un conflit prévu. Partiellement sensible.
          es: Ganado liquidado para prevenir la pérdida total de rapiña o conflicto anticipado. Parcialmente sensible.
      animal_disease:
        title:
          en: Animal sick or at risk of disease
          fr: Animal malade ou à risque de maladie
          es: Animal enfermo o en riesgo de enfermedad
        description:
          en: Livestock sold because they were showing signs of disease or were at high risk of dying, to recoup value before death.
          fr: Bétail vendu parce qu'il présentait des signes de maladie ou était à haut risque de mort, pour récupérer de la valeur avant le décès.
          es: Ganado vendido porque mostraba señales de enfermedad o tenía alto riesgo de morir, para recuperar valor antes de la muerte.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Reason for stress sale not listed in the codes above.
          fr: Raison de la vente de détresse non répertoriée dans les codes ci-dessus.
          es: Razón de la venta de estrés no listada en los códigos anteriores.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent cannot identify the primary reason for the stress sale.
          fr: Le répondant ne peut pas identifier la raison principale de la vente de détresse.
          es: El encuestado no puede identificar la razón principal de la venta de estrés.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fsnau-seasonal-assessment-methodology-2022", "hea-feg-pastoral-methodology-2020", "legs-3rd-edition-2023"], "definition": {"en": "Primary reason the household sold livestock earlier than planned or at a lower price than usual. Used in PastoralFoodSecurityProfile to capture pastoral-specific stress-sale causes that are not captured by FoodSecurityProfile LCS-FS items. Note: the code `conflict_pre_emptive` is partially sensitive (implies knowledge of anticipated armed events); apply code-level suppression in external data shares.", "es": "Raz\u00f3n principal por la que el hogar vendi\u00f3 ganado antes de lo planificado o a un precio menor al normal. El c\u00f3digo `conflict_pre_emptive` es parcialmente sensible.", "fr": "Raison principale pour laquelle le m\u00e9nage a vendu du b\u00e9tail plus t\u00f4t que pr\u00e9vu ou \u00e0 un prix inf\u00e9rieur \u00e0 la normale. Le code `conflict_pre_emptive` est partiellement sensible."}, "id": "stress-sale-reason", "label": {"en": "Stress Sale Reason", "es": "Raz\u00f3n de la venta de estr\u00e9s", "fr": "Raison de la vente de d\u00e9tresse"}, "maturity": "draft", "values": [{"code": "food_purchase", "definition": {"en": "Livestock liquidated to fund food purchases; direct food security coping strategy.", "es": "Ganado liquidado para financiar compras de alimentos; estrategia de afrontamiento directa de seguridad alimentaria.", "fr": "B\u00e9tail liquid\u00e9 pour financer l''achat de nourriture ; strat\u00e9gie d''adaptation directe \u00e0 la s\u00e9curit\u00e9 alimentaire."}, "label": {"en": "To buy food", "es": "Para comprar alimentos", "fr": "Pour acheter de la nourriture"}}, {"code": "water_or_pasture_shortage", "definition": {"en": "Herd too large to sustain on available water and pasture resources; destocking to reduce pressure on the remaining animals and rangeland.", "es": "El reba\u00f1o es demasiado grande para sostenerse con los recursos disponibles de agua y pastos; reducci\u00f3n del reba\u00f1o para aliviar la presi\u00f3n sobre los animales restantes.", "fr": "Troupeau trop important pour \u00eatre maintenu avec les ressources disponibles en eau et p\u00e2turage ; d\u00e9stockage pour r\u00e9duire la pression sur les animaux restants."}, "label": {"en": "Lack of water or pasture", "es": "Falta de agua o pastos", "fr": "Manque d''eau ou de p\u00e2turage"}}, {"code": "debt_repayment", "definition": {"en": "Livestock sold to meet financial obligations to creditors.", "es": "Ganado vendido para cumplir obligaciones financieras con acreedores.", "fr": "B\u00e9tail vendu pour honorer des obligations financi\u00e8res envers des cr\u00e9anciers."}, "label": {"en": "Debt repayment", "es": "Pago de deudas", "fr": "Remboursement de dettes"}}, {"code": "medical_expenses", "definition": {"en": "Livestock sold to fund human health costs for household members.", "es": "Ganado vendido para financiar costos de salud humana de los miembros del hogar.", "fr": "B\u00e9tail vendu pour financer les co\u00fbts de sant\u00e9 humaine des membres du m\u00e9nage."}, "label": {"en": "Medical or health expenses", "es": "Gastos m\u00e9dicos o de salud", "fr": "D\u00e9penses m\u00e9dicales ou de sant\u00e9"}}, {"code": "conflict_pre_emptive", "definition": {"en": "Livestock liquidated to prevent total loss from anticipated raiding or conflict. Partially sensitive: implies knowledge of an anticipated armed event; apply code-level suppression in external data shares and retain for internal programme analysis only.", "es": "Ganado liquidado para prevenir la p\u00e9rdida total de rapi\u00f1a o conflicto anticipado. Parcialmente sensible.", "fr": "B\u00e9tail liquid\u00e9 pour \u00e9viter la perte totale lors d''une razzia ou d''un conflit pr\u00e9vu. Partiellement sensible."}, "label": {"en": "Pre-emptive sale before anticipated conflict or raiding", "es": "Venta preventiva antes de conflicto o rapi\u00f1a anticipada", "fr": "Vente pr\u00e9ventive avant un conflit ou une razzia anticip\u00e9e"}}, {"code": "animal_disease", "definition": {"en": "Livestock sold because they were showing signs of disease or were at high risk of dying, to recoup value before death.", "es": "Ganado vendido porque mostraba se\u00f1ales de enfermedad o ten\u00eda alto riesgo de morir, para recuperar valor antes de la muerte.", "fr": "B\u00e9tail vendu parce qu''il pr\u00e9sentait des signes de maladie ou \u00e9tait \u00e0 haut risque de mort, pour r\u00e9cup\u00e9rer de la valeur avant le d\u00e9c\u00e8s."}, "label": {"en": "Animal sick or at risk of disease", "es": "Animal enfermo o en riesgo de enfermedad", "fr": "Animal malade ou \u00e0 risque de maladie"}}, {"code": "other", "definition": {"en": "Reason for stress sale not listed in the codes above.", "es": "Raz\u00f3n de la venta de estr\u00e9s no listada en los c\u00f3digos anteriores.", "fr": "Raison de la vente de d\u00e9tresse non r\u00e9pertori\u00e9e dans les codes ci-dessus."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}, {"code": "dont_know", "definition": {"en": "Respondent cannot identify the primary reason for the stress sale.", "es": "El encuestado no puede identificar la raz\u00f3n principal de la venta de estr\u00e9s.", "fr": "Le r\u00e9pondant ne peut pas identifier la raison principale de la vente de d\u00e9tresse."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: fsnau-seasonal-assessment-methodology-2022,hea-feg-pastoral-methodology-2020,legs-3rd-edition-2023
  StructuralSafetyTag:
    title:
      en: Structural Safety Tag
      fr: Étiquette de sécurité structurale
      es: Etiqueta de seguridad estructural
    description:
      en: 'Safe-to-occupy tag assigned to a structure by a qualified engineer or trained shelter assessor during a rapid post-disaster assessment, using the green/yellow/red taxonomy codified by ATC-20 and adopted by many national building-safety authorities. This is optional in a humanitarian administration: a household enumerator is not expected to assign a structural safety tag.'
      fr: 'Étiquette de sûreté d''occupation attribuée à une structure par un ingénieur qualifié ou un évaluateur abri formé lors d''une évaluation rapide post-catastrophe, en utilisant la taxonomie vert/jaune/rouge codifiée par ATC-20 et adoptée par de nombreuses autorités nationales de sécurité des bâtiments. Optionnel dans une administration humanitaire : un enquêteur de ménage n''est pas censé attribuer une étiquette de sécurité structurale.'
      es: 'Etiqueta de seguridad de ocupación asignada a una estructura por un ingeniero calificado o un evaluador de refugio capacitado durante una evaluación rápida post-desastre, usando la taxonomía verde/amarillo/rojo codificada por ATC-20 y adoptada por muchas autoridades nacionales de seguridad de edificios. Opcional en una administración humanitaria: un encuestador del hogar no se espera que asigne una etiqueta de seguridad estructural.'
    enum_uri: aidops:StructuralSafetyTag
    permissible_values:
      safe:
        title:
          en: Safe (green tag)
          fr: Sûr (étiquette verte)
          es: Seguro (etiqueta verde)
        description:
          en: Building is structurally safe to occupy; no restrictions identified.
          fr: Le bâtiment est structurellement sûr à occuper ; aucune restriction identifiée.
          es: El edificio es estructuralmente seguro para ocupar; no se identifican restricciones.
      restricted_use:
        title:
          en: Restricted use (yellow tag)
          fr: Usage restreint (étiquette jaune)
          es: Uso restringido (etiqueta amarilla)
        description:
          en: Building has identified hazards that restrict occupancy to specific areas or conditions; detailed evaluation required before full reoccupation.
          fr: Le bâtiment présente des dangers identifiés qui restreignent l'occupation à des zones ou conditions spécifiques ; une évaluation détaillée est requise avant toute réoccupation complète.
          es: El edificio presenta peligros identificados que restringen la ocupación a áreas o condiciones específicas; se requiere evaluación detallada antes de una reocupación completa.
      unsafe:
        title:
          en: Unsafe (red tag)
          fr: Dangereux (étiquette rouge)
          es: Inseguro (etiqueta roja)
        description:
          en: Building poses imminent risk of collapse or is otherwise unsafe to occupy; entry is prohibited pending engineering intervention.
          fr: Le bâtiment présente un risque imminent d'effondrement ou est par ailleurs dangereux à occuper ; l'entrée est interdite en attendant une intervention d'ingénierie.
          es: El edificio presenta riesgo inminente de colapso o es de otro modo inseguro para ocupar; se prohíbe la entrada en espera de intervención de ingeniería.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["atc-20"], "definition": {"en": "Safe-to-occupy tag assigned to a structure by a qualified engineer or trained shelter assessor during a rapid post-disaster assessment, using the green/yellow/red taxonomy codified by ATC-20 and adopted by many national building-safety authorities. This is optional in a humanitarian administration: a household enumerator is not expected to assign a structural safety tag.", "es": "Etiqueta de seguridad de ocupaci\u00f3n asignada a una estructura por un ingeniero calificado o un evaluador de refugio capacitado durante una evaluaci\u00f3n r\u00e1pida post-desastre, usando la taxonom\u00eda verde/amarillo/rojo codificada por ATC-20 y adoptada por muchas autoridades nacionales de seguridad de edificios. Opcional en una administraci\u00f3n humanitaria: un encuestador del hogar no se espera que asigne una etiqueta de seguridad estructural.", "fr": "\u00c9tiquette de s\u00fbret\u00e9 d''occupation attribu\u00e9e \u00e0 une structure par un ing\u00e9nieur qualifi\u00e9 ou un \u00e9valuateur abri form\u00e9 lors d''une \u00e9valuation rapide post-catastrophe, en utilisant la taxonomie vert/jaune/rouge codifi\u00e9e par ATC-20 et adopt\u00e9e par de nombreuses autorit\u00e9s nationales de s\u00e9curit\u00e9 des b\u00e2timents. Optionnel dans une administration humanitaire : un enqu\u00eateur de m\u00e9nage n''est pas cens\u00e9 attribuer une \u00e9tiquette de s\u00e9curit\u00e9 structurale."}, "id": "structural-safety-tag", "label": {"en": "Structural Safety Tag", "es": "Etiqueta de seguridad estructural", "fr": "\u00c9tiquette de s\u00e9curit\u00e9 structurale"}, "maturity": "draft", "standard": {"name": "ATC-20 Post-Earthquake Safety Evaluation of Buildings", "notes": "The three-tag taxonomy is standard in rapid structural assessment across earthquake-prone jurisdictions and has been adopted for post-cyclone and post-flood assessments.", "uri": "https://www.atcouncil.org/pdfs/ATC-20overview.pdf"}, "values": [{"code": "safe", "definition": {"en": "Building is structurally safe to occupy; no restrictions identified.", "es": "El edificio es estructuralmente seguro para ocupar; no se identifican restricciones.", "fr": "Le b\u00e2timent est structurellement s\u00fbr \u00e0 occuper ; aucune restriction identifi\u00e9e."}, "label": {"en": "Safe (green tag)", "es": "Seguro (etiqueta verde)", "fr": "S\u00fbr (\u00e9tiquette verte)"}}, {"code": "restricted_use", "definition": {"en": "Building has identified hazards that restrict occupancy to specific areas or conditions; detailed evaluation required before full reoccupation.", "es": "El edificio presenta peligros identificados que restringen la ocupaci\u00f3n a \u00e1reas o condiciones espec\u00edficas; se requiere evaluaci\u00f3n detallada antes de una reocupaci\u00f3n completa.", "fr": "Le b\u00e2timent pr\u00e9sente des dangers identifi\u00e9s qui restreignent l''occupation \u00e0 des zones ou conditions sp\u00e9cifiques ; une \u00e9valuation d\u00e9taill\u00e9e est requise avant toute r\u00e9occupation compl\u00e8te."}, "label": {"en": "Restricted use (yellow tag)", "es": "Uso restringido (etiqueta amarilla)", "fr": "Usage restreint (\u00e9tiquette jaune)"}}, {"code": "unsafe", "definition": {"en": "Building poses imminent risk of collapse or is otherwise unsafe to occupy; entry is prohibited pending engineering intervention.", "es": "El edificio presenta riesgo inminente de colapso o es de otro modo inseguro para ocupar; se proh\u00edbe la entrada en espera de intervenci\u00f3n de ingenier\u00eda.", "fr": "Le b\u00e2timent pr\u00e9sente un risque imminent d''effondrement ou est par ailleurs dangereux \u00e0 occuper ; l''entr\u00e9e est interdite en attendant une intervention d''ing\u00e9nierie."}, "label": {"en": "Unsafe (red tag)", "es": "Inseguro (etiqueta roja)", "fr": "Dangereux (\u00e9tiquette rouge)"}}]}'
      bibliography_refs: atc-20
  Suitability5Level:
    title:
      en: Suitability (5-level with don't know)
      fr: Adéquation (5 niveaux avec « ne sait pas »)
      es: Adecuación (5 niveles con 'no sabe')
    description:
      en: Four-point suitability scale plus 'don't know' used for perceived-adequacy questions where a bivalent yes/no collapses important middle ground. Used by `facility_open_hours_suitable` in HealthAccessProfile. 'mostly_yes' and 'mostly_no' allow respondents to signal partial adequacy (for example, the facility is open during the day but not at night).
      fr: Échelle d'adéquation à quatre niveaux plus « ne sait pas » utilisée pour les questions d'adéquation perçue où un oui/non binaire efface un juste milieu important. Utilisée par `facility_open_hours_suitable` dans HealthAccessProfile. « mostly_yes » et « mostly_no » permettent aux répondants de signaler une adéquation partielle (par exemple, l'établissement ouvre la journée mais pas la nuit).
      es: Escala de adecuación de cuatro niveles más 'no sabe' utilizada para preguntas de adecuación percibida donde un sí/no binario elimina un punto intermedio importante. Utilizada por `facility_open_hours_suitable` en HealthAccessProfile. 'mostly_yes' y 'mostly_no' permiten a los encuestados señalar una adecuación parcial (por ejemplo, el establecimiento abre durante el día pero no en la noche).
    enum_uri: aidops:Suitability5Level
    permissible_values:
      'yes':
        title:
          en: 'Yes'
          fr: Oui
          es: Sí
        description:
          en: Fully suitable.
          fr: Entièrement adéquat.
          es: Totalmente adecuado.
      mostly_yes:
        title:
          en: Mostly yes
          fr: Plutôt oui
          es: Mayormente sí
        description:
          en: Suitable most of the time or for most needs, with minor gaps.
          fr: Adéquat la plupart du temps ou pour la plupart des besoins, avec des lacunes mineures.
          es: Adecuado la mayor parte del tiempo o para la mayoría de las necesidades, con lagunas menores.
      mostly_no:
        title:
          en: Mostly no
          fr: Plutôt non
          es: Mayormente no
        description:
          en: Not suitable most of the time or for most needs, with occasional adequacy.
          fr: Inadéquat la plupart du temps ou pour la plupart des besoins, avec une adéquation occasionnelle.
          es: Inadecuado la mayor parte del tiempo o para la mayoría de las necesidades, con adecuación ocasional.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: Not suitable.
          fr: Inadéquat.
          es: No adecuado.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent cannot say. Valid response; must not be re-coded as missing or 'no'.
          fr: Le répondant ne peut pas répondre. Réponse valide ; ne doit pas être recodée comme manquante ou « non ».
          es: El encuestado no puede responder. Respuesta válida; no debe recodificarse como faltante o 'no'.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-pvs-2023"], "definition": {"en": "Four-point suitability scale plus ''don''t know'' used for perceived-adequacy questions where a bivalent yes/no collapses important middle ground. Used by `facility_open_hours_suitable` in HealthAccessProfile. ''mostly_yes'' and ''mostly_no'' allow respondents to signal partial adequacy (for example, the facility is open during the day but not at night).", "es": "Escala de adecuaci\u00f3n de cuatro niveles m\u00e1s ''no sabe'' utilizada para preguntas de adecuaci\u00f3n percibida donde un s\u00ed/no binario elimina un punto intermedio importante. Utilizada por `facility_open_hours_suitable` en HealthAccessProfile. ''mostly_yes'' y ''mostly_no'' permiten a los encuestados se\u00f1alar una adecuaci\u00f3n parcial (por ejemplo, el establecimiento abre durante el d\u00eda pero no en la noche).", "fr": "\u00c9chelle d''ad\u00e9quation \u00e0 quatre niveaux plus \u00ab ne sait pas \u00bb utilis\u00e9e pour les questions d''ad\u00e9quation per\u00e7ue o\u00f9 un oui/non binaire efface un juste milieu important. Utilis\u00e9e par `facility_open_hours_suitable` dans HealthAccessProfile. \u00ab mostly_yes \u00bb et \u00ab mostly_no \u00bb permettent aux r\u00e9pondants de signaler une ad\u00e9quation partielle (par exemple, l''\u00e9tablissement ouvre la journ\u00e9e mais pas la nuit)."}, "id": "suitability-5-level", "label": {"en": "Suitability (5-level with don''t know)", "es": "Adecuaci\u00f3n (5 niveles con ''no sabe'')", "fr": "Ad\u00e9quation (5 niveaux avec \u00ab ne sait pas \u00bb)"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "Fully suitable.", "es": "Totalmente adecuado.", "fr": "Enti\u00e8rement ad\u00e9quat."}, "label": {"en": "Yes", "es": "S\u00ed", "fr": "Oui"}}, {"code": "mostly_yes", "definition": {"en": "Suitable most of the time or for most needs, with minor gaps.", "es": "Adecuado la mayor parte del tiempo o para la mayor\u00eda de las necesidades, con lagunas menores.", "fr": "Ad\u00e9quat la plupart du temps ou pour la plupart des besoins, avec des lacunes mineures."}, "label": {"en": "Mostly yes", "es": "Mayormente s\u00ed", "fr": "Plut\u00f4t oui"}}, {"code": "mostly_no", "definition": {"en": "Not suitable most of the time or for most needs, with occasional adequacy.", "es": "Inadecuado la mayor parte del tiempo o para la mayor\u00eda de las necesidades, con adecuaci\u00f3n ocasional.", "fr": "Inad\u00e9quat la plupart du temps ou pour la plupart des besoins, avec une ad\u00e9quation occasionnelle."}, "label": {"en": "Mostly no", "es": "Mayormente no", "fr": "Plut\u00f4t non"}}, {"code": "no", "definition": {"en": "Not suitable.", "es": "No adecuado.", "fr": "Inad\u00e9quat."}, "label": {"en": "No", "es": "No", "fr": "Non"}}, {"code": "dont_know", "definition": {"en": "The respondent cannot say. Valid response; must not be re-coded as missing or ''no''.", "es": "El encuestado no puede responder. Respuesta v\u00e1lida; no debe recodificarse como faltante o ''no''.", "fr": "Le r\u00e9pondant ne peut pas r\u00e9pondre. R\u00e9ponse valide ; ne doit pas \u00eatre recod\u00e9e comme manquante ou \u00ab non \u00bb."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: who-pvs-2023
  SupplyChainStatus:
    title:
      en: Supply Chain Status
      fr: Statut de la chaîne d'approvisionnement
      es: Estado de la cadena de suministro
    description:
      en: The overall functional state of the supply and transport chains feeding a market, as assessed by key vendor informants. A five-level scale from fully functional to non-functional, aligned with the EMMA Toolkit v2 supply chain analysis, ICRC RAM 2014, and WFP MAG 2021. Potential for reuse in future LogisticsProfile or supply-chain monitoring contexts.
      fr: L'état fonctionnel global des chaînes d'approvisionnement et de transport alimentant un marché, tel qu'évalué par les informateurs clés vendeurs. Échelle à cinq niveaux allant de pleinement fonctionnel à non fonctionnel, alignée sur l'analyse de la chaîne d'approvisionnement de l'EMMA Toolkit v2, l'ICRC RAM 2014 et le WFP MAG 2021.
      es: El estado funcional general de las cadenas de suministro y transporte que alimentan a un mercado, según la evaluación de informantes clave vendedores. Escala de cinco niveles desde completamente funcional hasta no funcional, alineada con el análisis de cadena de suministro del EMMA Toolkit v2, ICRC RAM 2014 y WFP MAG 2021.
    enum_uri: aidops:SupplyChainStatus
    permissible_values:
      fully_functional:
        title:
          en: Fully functional
          fr: Pleinement fonctionnel
          es: Completamente funcional
        description:
          en: Goods arriving through all normal supply and transport channels without significant delay, route change, or cost increase. Supply chain actors (wholesalers, transporters, intermediaries) operating normally.
          fr: Marchandises arrivant par tous les circuits d'approvisionnement et de transport habituels sans délai significatif, changement d'itinéraire ou augmentation des coûts. Acteurs de la chaîne d'approvisionnement (grossistes, transporteurs, intermédiaires) fonctionnant normalement.
          es: Los bienes llegan a través de todos los canales normales de suministro y transporte sin retrasos significativos, cambios de ruta o aumentos de costos. Los actores de la cadena de suministro (mayoristas, transportistas, intermediarios) operan con normalidad.
      mostly_functional_minor_delays:
        title:
          en: Mostly functional — minor delays
          fr: Majoritairement fonctionnel — délais mineurs
          es: Mayormente funcional — retrasos menores
        description:
          en: Primary supply routes intact; some alternative routes being used due to minor disruptions. Supply arriving with modest delays (1–3 days beyond normal) or small cost increases (<20% transport cost increase). Stock replenishment somewhat slower than normal.
          fr: Routes d'approvisionnement principales intactes ; certaines routes alternatives sont utilisées en raison de perturbations mineures. Approvisionnement arrivant avec des délais modestes (1 à 3 jours au-delà du normal) ou de légères augmentations des coûts (<20 % d'augmentation des coûts de transport). Réapprovisionnement des stocks légèrement plus lent que la normale.
          es: Rutas de suministro principales intactas; se usan algunas rutas alternativas debido a interrupciones menores. El suministro llega con retrasos modestos (1–3 días más de lo normal) o pequeños aumentos de costos (<20 % de aumento de costo de transporte). Reabastecimiento de stock algo más lento que lo normal.
      partially_functional_major_disruptions:
        title:
          en: Partially functional — major disruptions
          fr: Partiellement fonctionnel — perturbations majeures
          es: Parcialmente funcional — interrupciones mayores
        description:
          en: One or more major supply routes are blocked, inaccessible, or very costly. Supply arriving through limited alternative channels at significantly higher cost (>20% transport increase) or with delays of more than one week. Visible reduction in stock diversity or depth.
          fr: Une ou plusieurs routes d'approvisionnement principales sont bloquées, inaccessibles ou très coûteuses. Approvisionnement arrivant par des canaux alternatifs limités à un coût significativement plus élevé (>20 % d'augmentation du transport) ou avec des délais de plus d'une semaine. Réduction visible de la diversité ou de la profondeur des stocks.
          es: Una o más rutas de suministro principales están bloqueadas, inaccesibles o muy costosas. El suministro llega a través de canales alternativos limitados a un costo significativamente mayor (>20 % de aumento de transporte) o con retrasos de más de una semana. Reducción visible en la diversidad o profundidad del stock.
      non_functional:
        title:
          en: Non-functional
          fr: Non fonctionnel
          es: No funcional
        description:
          en: Supply chains have collapsed. Goods are not arriving through any normal or alternative channel. Market may be drawing down on pre-positioned stock only; replenishment expected to cause market failure within days to weeks.
          fr: Les chaînes d'approvisionnement se sont effondrées. Les marchandises n'arrivent par aucun canal normal ou alternatif. Le marché peut utiliser uniquement des stocks pré-positionnés ; le réapprovisionnement devrait provoquer une défaillance du marché dans les jours à semaines.
          es: Las cadenas de suministro han colapsado. Los bienes no llegan a través de ningún canal normal o alternativo. El mercado puede estar agotando solo stock preposicionado; se espera que el reabastecimiento cause una falla del mercado en días a semanas.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Vendor informants unable to assess supply chain status; enumerator cannot determine from observation.
          fr: Les informateurs vendeurs sont incapables d'évaluer le statut de la chaîne d'approvisionnement ; l'enquêteur ne peut pas le déterminer à partir de l'observation.
          es: Los informantes vendedores no pueden evaluar el estado de la cadena de suministro; el enumerador no puede determinarlo a partir de la observación.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["calp-misma-2018", "emma-toolkit-v2-2017", "icrc-ram-2014", "wfp-mag-2021"], "definition": {"en": "The overall functional state of the supply and transport chains feeding a market, as assessed by key vendor informants. A five-level scale from fully functional to non-functional, aligned with the EMMA Toolkit v2 supply chain analysis, ICRC RAM 2014, and WFP MAG 2021. Potential for reuse in future LogisticsProfile or supply-chain monitoring contexts.\n", "es": "El estado funcional general de las cadenas de suministro y transporte que alimentan a un mercado, seg\u00fan la evaluaci\u00f3n de informantes clave vendedores. Escala de cinco niveles desde completamente funcional hasta no funcional, alineada con el an\u00e1lisis de cadena de suministro del EMMA Toolkit v2, ICRC RAM 2014 y WFP MAG 2021.\n", "fr": "L''\u00e9tat fonctionnel global des cha\u00eenes d''approvisionnement et de transport alimentant un march\u00e9, tel qu''\u00e9valu\u00e9 par les informateurs cl\u00e9s vendeurs. \u00c9chelle \u00e0 cinq niveaux allant de pleinement fonctionnel \u00e0 non fonctionnel, align\u00e9e sur l''analyse de la cha\u00eene d''approvisionnement de l''EMMA Toolkit v2, l''ICRC RAM 2014 et le WFP MAG 2021.\n"}, "id": "supply-chain-status", "label": {"en": "Supply Chain Status", "es": "Estado de la cadena de suministro", "fr": "Statut de la cha\u00eene d''approvisionnement"}, "maturity": "draft", "values": [{"code": "fully_functional", "definition": {"en": "Goods arriving through all normal supply and transport channels without significant delay, route change, or cost increase. Supply chain actors (wholesalers, transporters, intermediaries) operating normally.", "es": "Los bienes llegan a trav\u00e9s de todos los canales normales de suministro y transporte sin retrasos significativos, cambios de ruta o aumentos de costos. Los actores de la cadena de suministro (mayoristas, transportistas, intermediarios) operan con normalidad.", "fr": "Marchandises arrivant par tous les circuits d''approvisionnement et de transport habituels sans d\u00e9lai significatif, changement d''itin\u00e9raire ou augmentation des co\u00fbts. Acteurs de la cha\u00eene d''approvisionnement (grossistes, transporteurs, interm\u00e9diaires) fonctionnant normalement."}, "label": {"en": "Fully functional", "es": "Completamente funcional", "fr": "Pleinement fonctionnel"}}, {"code": "mostly_functional_minor_delays", "definition": {"en": "Primary supply routes intact; some alternative routes being used due to minor disruptions. Supply arriving with modest delays (1\u20133 days beyond normal) or small cost increases (<20% transport cost increase). Stock replenishment somewhat slower than normal.", "es": "Rutas de suministro principales intactas; se usan algunas rutas alternativas debido a interrupciones menores. El suministro llega con retrasos modestos (1\u20133 d\u00edas m\u00e1s de lo normal) o peque\u00f1os aumentos de costos (<20 % de aumento de costo de transporte). Reabastecimiento de stock algo m\u00e1s lento que lo normal.", "fr": "Routes d''approvisionnement principales intactes ; certaines routes alternatives sont utilis\u00e9es en raison de perturbations mineures. Approvisionnement arrivant avec des d\u00e9lais modestes (1 \u00e0 3 jours au-del\u00e0 du normal) ou de l\u00e9g\u00e8res augmentations des co\u00fbts (<20 % d''augmentation des co\u00fbts de transport). R\u00e9approvisionnement des stocks l\u00e9g\u00e8rement plus lent que la normale."}, "label": {"en": "Mostly functional \u2014 minor delays", "es": "Mayormente funcional \u2014 retrasos menores", "fr": "Majoritairement fonctionnel \u2014 d\u00e9lais mineurs"}}, {"code": "partially_functional_major_disruptions", "definition": {"en": "One or more major supply routes are blocked, inaccessible, or very costly. Supply arriving through limited alternative channels at significantly higher cost (>20% transport increase) or with delays of more than one week. Visible reduction in stock diversity or depth.", "es": "Una o m\u00e1s rutas de suministro principales est\u00e1n bloqueadas, inaccesibles o muy costosas. El suministro llega a trav\u00e9s de canales alternativos limitados a un costo significativamente mayor (>20 % de aumento de transporte) o con retrasos de m\u00e1s de una semana. Reducci\u00f3n visible en la diversidad o profundidad del stock.", "fr": "Une ou plusieurs routes d''approvisionnement principales sont bloqu\u00e9es, inaccessibles ou tr\u00e8s co\u00fbteuses. Approvisionnement arrivant par des canaux alternatifs limit\u00e9s \u00e0 un co\u00fbt significativement plus \u00e9lev\u00e9 (>20 % d''augmentation du transport) ou avec des d\u00e9lais de plus d''une semaine. R\u00e9duction visible de la diversit\u00e9 ou de la profondeur des stocks."}, "label": {"en": "Partially functional \u2014 major disruptions", "es": "Parcialmente funcional \u2014 interrupciones mayores", "fr": "Partiellement fonctionnel \u2014 perturbations majeures"}}, {"code": "non_functional", "definition": {"en": "Supply chains have collapsed. Goods are not arriving through any normal or alternative channel. Market may be drawing down on pre-positioned stock only; replenishment expected to cause market failure within days to weeks.", "es": "Las cadenas de suministro han colapsado. Los bienes no llegan a trav\u00e9s de ning\u00fan canal normal o alternativo. El mercado puede estar agotando solo stock preposicionado; se espera que el reabastecimiento cause una falla del mercado en d\u00edas a semanas.", "fr": "Les cha\u00eenes d''approvisionnement se sont effondr\u00e9es. Les marchandises n''arrivent par aucun canal normal ou alternatif. Le march\u00e9 peut utiliser uniquement des stocks pr\u00e9-positionn\u00e9s ; le r\u00e9approvisionnement devrait provoquer une d\u00e9faillance du march\u00e9 dans les jours \u00e0 semaines."}, "label": {"en": "Non-functional", "es": "No funcional", "fr": "Non fonctionnel"}}, {"code": "dont_know", "definition": {"en": "Vendor informants unable to assess supply chain status; enumerator cannot determine from observation.", "es": "Los informantes vendedores no pueden evaluar el estado de la cadena de suministro; el enumerador no puede determinarlo a partir de la observaci\u00f3n.", "fr": "Les informateurs vendeurs sont incapables d''\u00e9valuer le statut de la cha\u00eene d''approvisionnement ; l''enqu\u00eateur ne peut pas le d\u00e9terminer \u00e0 partir de l''observation."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: calp-misma-2018,emma-toolkit-v2-2017,icrc-ram-2014,wfp-mag-2021
  TechnicalAssistanceType:
    title:
      en: Technical Assistance Type
      fr: Type d'assistance technique
      es: Tipo de asistencia técnica
    description:
      en: The type of shelter-related technical assistance or guidance the household received. Based on Sphere Standard 5 guidance and Global Shelter Cluster 5W reporting categories.
      fr: Le type d'assistance technique ou d'orientation liée à l'abri reçue par le ménage. Basé sur les orientations de la Norme Sphère 5 et les catégories de rapport 5W du Cluster Abri Mondial.
      es: El tipo de asistencia técnica o orientación relacionada con el refugio que recibió el hogar. Basado en la orientación de la Norma Esfera 5 y las categorías de reporte 5W del Clúster Global de Refugio.
    enum_uri: aidops:TechnicalAssistanceType
    permissible_values:
      construction_training:
        title:
          en: Construction training
          fr: Formation en construction
          es: Capacitación en construcción
        description:
          en: Training in safe building practices, use of tools, or construction techniques for shelter repair or improvement.
          fr: Formation aux pratiques de construction sécurisée, à l'utilisation des outils ou aux techniques de construction pour la réparation ou l'amélioration de l'abri.
          es: Capacitación en prácticas de construcción segura, uso de herramientas o técnicas de construcción para la reparación o mejora del refugio.
      design_planning:
        title:
          en: Design or site planning support
          fr: Appui à la conception ou à la planification du site
          es: Apoyo en diseño o planificación del sitio
        description:
          en: Technical support for shelter design, layout planning, or site planning, including advice on structural form, orientation, or space allocation.
          fr: Appui technique pour la conception de l'abri, la planification de l'aménagement ou la planification du site, incluant des conseils sur la forme structurale, l'orientation ou l'allocation d'espace.
          es: Apoyo técnico para el diseño del refugio, planificación del diseño o planificación del sitio, incluidos consejos sobre la forma estructural, orientación o asignación de espacio.
      damage_assessment:
        title:
          en: Structural damage assessment
          fr: Évaluation des dommages structurels
          es: Evaluación de daños estructurales
        description:
          en: Professional assessment of the structural safety of the household's existing dwelling by a qualified engineer or trained shelter assessor.
          fr: Évaluation professionnelle de la sécurité structurale du logement existant du ménage par un ingénieur qualifié ou un évaluateur abri formé.
          es: Evaluación profesional de la seguridad estructural de la vivienda existente del hogar por un ingeniero calificado o evaluador de refugio capacitado.
      material_provision:
        title:
          en: Construction material provision
          fr: Fourniture de matériaux de construction
          es: Provisión de materiales de construcción
        description:
          en: Supply of building materials to the household accompanied by technical guidance on how to use them correctly and safely.
          fr: Fourniture de matériaux de construction au ménage accompagnée d'une orientation technique sur la manière de les utiliser correctement et en toute sécurité.
          es: Suministro de materiales de construcción al hogar acompañado de orientación técnica sobre cómo usarlos correcta y seguramente.
      cash_with_guidance:
        title:
          en: Cash or voucher with technical guidance
          fr: Argent liquide ou bon avec orientation technique
          es: Efectivo o cupón con orientación técnica
        description:
          en: Cash transfer or voucher for shelter construction or repair, paired with technical advisory support to ensure appropriate use.
          fr: Transfert monétaire ou bon pour la construction ou la réparation de l'abri, associé à un appui consultatif technique pour assurer une utilisation appropriée.
          es: Transferencia de efectivo o cupón para construcción o reparación del refugio, combinado con apoyo de asesoría técnica para garantizar el uso apropiado.
      quality_monitoring:
        title:
          en: Quality monitoring visits
          fr: Visites de suivi de la qualité
          es: Visitas de monitoreo de calidad
        description:
          en: Visits by technical programme staff to inspect and advise on the quality of shelter construction or repair work in progress or completed.
          fr: Visites de personnel technique du programme pour inspecter et conseiller sur la qualité des travaux de construction ou de réparation d'abri en cours ou achevés.
          es: Visitas del personal técnico del programa para inspeccionar y asesorar sobre la calidad de los trabajos de construcción o reparación del refugio en curso o completados.
      legal_tenure_support:
        title:
          en: Legal or tenure support
          fr: Appui juridique ou foncier
          es: Apoyo legal o de tenencia
        description:
          en: Legal advice or documentation support related to housing, land and property rights, including assistance securing tenure documents.
          fr: Conseil juridique ou appui à la documentation liés aux droits relatifs au logement, aux terres et à la propriété, y compris l'assistance pour l'obtention de documents fonciers.
          es: Asesoría legal o apoyo de documentación relacionado con los derechos de vivienda, tierra y propiedad, incluida la asistencia para obtener documentos de tenencia.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Type of technical assistance not covered by the above categories.
          fr: Type d'assistance technique non couvert par les catégories ci-dessus.
          es: Tipo de asistencia técnica no cubierto por las categorías anteriores.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["iom-dtm-shelter-companion"], "definition": {"en": "The type of shelter-related technical assistance or guidance the household received. Based on Sphere Standard 5 guidance and Global Shelter Cluster 5W reporting categories.", "es": "El tipo de asistencia t\u00e9cnica o orientaci\u00f3n relacionada con el refugio que recibi\u00f3 el hogar. Basado en la orientaci\u00f3n de la Norma Esfera 5 y las categor\u00edas de reporte 5W del Cl\u00faster Global de Refugio.", "fr": "Le type d''assistance technique ou d''orientation li\u00e9e \u00e0 l''abri re\u00e7ue par le m\u00e9nage. Bas\u00e9 sur les orientations de la Norme Sph\u00e8re 5 et les cat\u00e9gories de rapport 5W du Cluster Abri Mondial."}, "id": "technical-assistance-type", "label": {"en": "Technical Assistance Type", "es": "Tipo de asistencia t\u00e9cnica", "fr": "Type d''assistance technique"}, "maturity": "draft", "standard": {"name": "Sphere Handbook 2018, Standard 5 \u2014 Technical Assistance and Shelter Support", "uri": "https://spherestandards.org/handbook-2018/"}, "values": [{"code": "construction_training", "definition": {"en": "Training in safe building practices, use of tools, or construction techniques for shelter repair or improvement.", "es": "Capacitaci\u00f3n en pr\u00e1cticas de construcci\u00f3n segura, uso de herramientas o t\u00e9cnicas de construcci\u00f3n para la reparaci\u00f3n o mejora del refugio.", "fr": "Formation aux pratiques de construction s\u00e9curis\u00e9e, \u00e0 l''utilisation des outils ou aux techniques de construction pour la r\u00e9paration ou l''am\u00e9lioration de l''abri."}, "label": {"en": "Construction training", "es": "Capacitaci\u00f3n en construcci\u00f3n", "fr": "Formation en construction"}}, {"code": "design_planning", "definition": {"en": "Technical support for shelter design, layout planning, or site planning, including advice on structural form, orientation, or space allocation.", "es": "Apoyo 