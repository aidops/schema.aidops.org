  HumanitarianAssistanceReliance:
    title:
      en: Humanitarian Assistance Reliance
      fr: Dépendance à l'aide humanitaire
      es: Dependencia de la asistencia humanitaria
    description:
      en: 'Degree to which the household depends on humanitarian assistance (food, cash, non-food items, or services from NGOs or UN agencies) as a source of income or food. Synthesised from the Sphere 2018 Livelihoods chapter, the IOM DTM Multi-Sectoral Location Assessment assistance reliance indicator, and the LSMS-ISA government transfer module. Distinct from `social_transfers` in the PS `income-source` vocabulary (which covers government programmes): this vocabulary specifically flags humanitarian-actor assistance, relevant for exit-strategy analysis.'
      fr: 'Degré auquel le ménage dépend de l''aide humanitaire (nourriture, espèces, articles non alimentaires ou services d''ONG ou d''agences de l''ONU) comme source de revenus ou de nourriture. Synthétisé à partir du chapitre Moyens de subsistance de Sphère 2018, de l''indicateur de dépendance à l''aide de l''Évaluation multisectorielle de localisation (MSLA) de la DTM de l''OIM et du module des transferts gouvernementaux LSMS-ISA. Distinct de `social_transfers` dans le vocabulaire `income-source` de PublicSchema (qui couvre les programmes gouvernementaux) : ce vocabulaire signale spécifiquement l''aide d''acteurs humanitaires, pertinent pour l''analyse de la stratégie de sortie.'
      es: 'Grado en que el hogar depende de la asistencia humanitaria (alimentos, efectivo, artículos no alimentarios o servicios de ONG o agencias de la ONU) como fuente de ingresos o alimentos. Sintetizado a partir del capítulo de Medios de Vida de Esfera 2018, el indicador de dependencia de asistencia de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM y el módulo de transferencias gubernamentales LSMS-ISA. Distinto de `social_transfers` en el vocabulario `income-source` de PublicSchema (que cubre programas gubernamentales): este vocabulario marca específicamente la asistencia de actores humanitarios, relevante para el análisis de estrategia de salida.'
    enum_uri: aidops:HumanitarianAssistanceReliance
    permissible_values:
      yes_primary_source:
        title:
          en: Yes — primary source
          fr: Oui — source principale
          es: Sí — fuente principal
        description:
          en: Humanitarian assistance is the household's main source of food or income.
          fr: L'aide humanitaire est la principale source de nourriture ou de revenus du ménage.
          es: La asistencia humanitaria es la principal fuente de alimentos o ingresos del hogar.
      yes_supplementary:
        title:
          en: Yes — supplementary
          fr: Oui — complémentaire
          es: Sí — complementaria
        description:
          en: Household receives assistance but also has other livelihood income sources.
          fr: Le ménage reçoit une aide mais dispose également d'autres sources de revenus de subsistance.
          es: El hogar recibe asistencia pero también tiene otras fuentes de ingresos de subsistencia.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: Household does not currently receive humanitarian assistance.
          fr: Le ménage ne reçoit pas actuellement d'aide humanitaire.
          es: El hogar no recibe actualmente asistencia humanitaria.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "definition": {"en": "Degree to which the household depends on humanitarian assistance (food, cash, non-food items, or services from NGOs or UN agencies) as a source of income or food. Synthesised from the Sphere 2018 Livelihoods chapter, the IOM DTM Multi-Sectoral Location Assessment assistance reliance indicator, and the LSMS-ISA government transfer module. Distinct from `social_transfers` in the PS `income-source` vocabulary (which covers government programmes): this vocabulary specifically flags humanitarian-actor assistance, relevant for exit-strategy analysis.", "es": "Grado en que el hogar depende de la asistencia humanitaria (alimentos, efectivo, art\u00edculos no alimentarios o servicios de ONG o agencias de la ONU) como fuente de ingresos o alimentos. Sintetizado a partir del cap\u00edtulo de Medios de Vida de Esfera 2018, el indicador de dependencia de asistencia de la Evaluaci\u00f3n Multisectorial de Ubicaci\u00f3n (MSLA) de la DTM de la OIM y el m\u00f3dulo de transferencias gubernamentales LSMS-ISA. Distinto de `social_transfers` en el vocabulario `income-source` de PublicSchema (que cubre programas gubernamentales): este vocabulario marca espec\u00edficamente la asistencia de actores humanitarios, relevante para el an\u00e1lisis de estrategia de salida.", "fr": "Degr\u00e9 auquel le m\u00e9nage d\u00e9pend de l''aide humanitaire (nourriture, esp\u00e8ces, articles non alimentaires ou services d''ONG ou d''agences de l''ONU) comme source de revenus ou de nourriture. Synth\u00e9tis\u00e9 \u00e0 partir du chapitre Moyens de subsistance de Sph\u00e8re 2018, de l''indicateur de d\u00e9pendance \u00e0 l''aide de l''\u00c9valuation multisectorielle de localisation (MSLA) de la DTM de l''OIM et du module des transferts gouvernementaux LSMS-ISA. Distinct de `social_transfers` dans le vocabulaire `income-source` de PublicSchema (qui couvre les programmes gouvernementaux) : ce vocabulaire signale sp\u00e9cifiquement l''aide d''acteurs humanitaires, pertinent pour l''analyse de la strat\u00e9gie de sortie."}, "id": "humanitarian-assistance-reliance", "label": {"en": "Humanitarian Assistance Reliance", "es": "Dependencia de la asistencia humanitaria", "fr": "D\u00e9pendance \u00e0 l''aide humanitaire"}, "maturity": "draft", "standard": {"name": "Synthesised from Sphere 2018 Livelihoods chapter, IOM DTM MSLA, and LSMS-ISA"}, "values": [{"code": "yes_primary_source", "definition": {"en": "Humanitarian assistance is the household''s main source of food or income.", "es": "La asistencia humanitaria es la principal fuente de alimentos o ingresos del hogar.", "fr": "L''aide humanitaire est la principale source de nourriture ou de revenus du m\u00e9nage."}, "label": {"en": "Yes \u2014 primary source", "es": "S\u00ed \u2014 fuente principal", "fr": "Oui \u2014 source principale"}}, {"code": "yes_supplementary", "definition": {"en": "Household receives assistance but also has other livelihood income sources.", "es": "El hogar recibe asistencia pero tambi\u00e9n tiene otras fuentes de ingresos de subsistencia.", "fr": "Le m\u00e9nage re\u00e7oit une aide mais dispose \u00e9galement d''autres sources de revenus de subsistance."}, "label": {"en": "Yes \u2014 supplementary", "es": "S\u00ed \u2014 complementaria", "fr": "Oui \u2014 compl\u00e9mentaire"}}, {"code": "no", "definition": {"en": "Household does not currently receive humanitarian assistance.", "es": "El hogar no recibe actualmente asistencia humanitaria.", "fr": "Le m\u00e9nage ne re\u00e7oit pas actuellement d''aide humanitaire."}, "label": {"en": "No", "es": "No", "fr": "Non"}}]}'
      bibliography_refs: fao-rima-2016
  HwfPresenceObservation:
    title:
      en: Handwashing facility presence — enumerator observation (3-level)
      fr: Présence d'un dispositif de lavage des mains — observation de l'enquêteur (3 niveaux)
      es: Presencia de instalación para lavado de manos — observación del encuestador (3 niveles)
    description:
      en: Three-level enumerator-observation scale for JMP H1. Distinguishes between facilities directly observed by the enumerator, facilities reported by the household but not observed, and absence of a facility. The JMP-recommended method is to ask to see the handwashing facility; direct observation is more reliable than self-report. Based on JMP Core Questions 2018, indicator H1.
      fr: Échelle d'observation de l'enquêteur à trois niveaux pour le JMP H1. Distingue les dispositifs directement observés par l'enquêteur, les dispositifs signalés par le ménage mais non observés, et l'absence de dispositif. La méthode recommandée par le JMP est de demander à voir le dispositif de lavage des mains ; l'observation directe est plus fiable que l'auto-déclaration. Basée sur les Questions de base du JMP 2018, indicateur H1.
      es: Escala de observación del encuestador de tres niveles para JMP H1. Distingue entre instalaciones directamente observadas por el encuestador, instalaciones reportadas por el hogar pero no observadas, y ausencia de instalación. El método recomendado por el JMP es pedir ver la instalación de lavado de manos; la observación directa es más confiable que la autodeclaración. Basada en las Preguntas Básicas del JMP 2018, indicador H1.
    enum_uri: aidops:HwfPresenceObservation
    permissible_values:
      yes_observed:
        title:
          en: Yes — facility seen by enumerator
          fr: Oui — dispositif vu par l'enquêteur
          es: Sí — instalación vista por el encuestador
        description:
          en: The enumerator directly observed a place where hands can be washed (fixed or mobile).
          fr: L'enquêteur a directement observé un endroit où les mains peuvent être lavées (fixe ou mobile).
          es: El encuestador observó directamente un lugar donde se pueden lavar las manos (fijo o móvil).
      yes_not_observed_but_reported:
        title:
          en: Yes — household reports facility but enumerator could not observe it
          fr: Oui — le ménage déclare un dispositif mais l'enquêteur n'a pas pu l'observer
          es: Sí — el hogar reporta instalación pero el encuestador no pudo observarla
        description:
          en: The household reports having a handwashing facility but the enumerator could not observe it directly (e.g., located elsewhere, in use, or not shown).
          fr: Le ménage déclare disposer d'un dispositif de lavage des mains mais l'enquêteur n'a pas pu l'observer directement (p. ex., situé ailleurs, en cours d'utilisation ou non montré).
          es: El hogar reporta tener una instalación para lavado de manos pero el encuestador no pudo observarla directamente (p. ej., ubicada en otro lugar, en uso o no mostrada).
      'no':
        title:
          en: No — no handwashing facility
          fr: Non — pas de dispositif de lavage des mains
          es: No — sin instalación para lavado de manos
        description:
          en: The household has no place where hands can be washed.
          fr: Le ménage n'a pas d'endroit où les mains peuvent être lavées.
          es: El hogar no tiene un lugar donde se puedan lavar las manos.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Three-level enumerator-observation scale for JMP H1. Distinguishes between facilities directly observed by the enumerator, facilities reported by the household but not observed, and absence of a facility. The JMP-recommended method is to ask to see the handwashing facility; direct observation is more reliable than self-report. Based on JMP Core Questions 2018, indicator H1.", "es": "Escala de observaci\u00f3n del encuestador de tres niveles para JMP H1. Distingue entre instalaciones directamente observadas por el encuestador, instalaciones reportadas por el hogar pero no observadas, y ausencia de instalaci\u00f3n. El m\u00e9todo recomendado por el JMP es pedir ver la instalaci\u00f3n de lavado de manos; la observaci\u00f3n directa es m\u00e1s confiable que la autodeclaraci\u00f3n. Basada en las Preguntas B\u00e1sicas del JMP 2018, indicador H1.", "fr": "\u00c9chelle d''observation de l''enqu\u00eateur \u00e0 trois niveaux pour le JMP H1. Distingue les dispositifs directement observ\u00e9s par l''enqu\u00eateur, les dispositifs signal\u00e9s par le m\u00e9nage mais non observ\u00e9s, et l''absence de dispositif. La m\u00e9thode recommand\u00e9e par le JMP est de demander \u00e0 voir le dispositif de lavage des mains ; l''observation directe est plus fiable que l''auto-d\u00e9claration. Bas\u00e9e sur les Questions de base du JMP 2018, indicateur H1."}, "id": "hwf-presence-observation", "label": {"en": "Handwashing facility presence \u2014 enumerator observation (3-level)", "es": "Presencia de instalaci\u00f3n para lavado de manos \u2014 observaci\u00f3n del encuestador (3 niveles)", "fr": "Pr\u00e9sence d''un dispositif de lavage des mains \u2014 observation de l''enqu\u00eateur (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_observed", "definition": {"en": "The enumerator directly observed a place where hands can be washed (fixed or mobile).", "es": "El 