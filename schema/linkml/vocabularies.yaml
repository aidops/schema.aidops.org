  HhsCategory:
    title:
      en: Household Hunger Scale Category
      fr: Catégorie de l'échelle de la faim des ménages
      es: Categoría de la Escala de Hambre del Hogar
    description:
      en: The household hunger category derived from the Household Hunger Scale (HHS) score. Four categories using FANTA standard thresholds.
      fr: La catégorie de faim du ménage dérivée du score de l'échelle de la faim des ménages (HHS). Quatre catégories selon les seuils standard de FANTA.
      es: La categoría de hambre del hogar derivada del puntaje de la Escala de Hambre del Hogar (HHS). Cuatro categorías según los umbrales estándar de FANTA.
    enum_uri: aidops:HhsCategory
    permissible_values:
      little_to_none:
        title:
          en: Little to no hunger
          fr: Peu ou pas de faim
          es: Poca o ninguna hambre
        description:
          en: HHS score 0-1. Household experiences little to no hunger.
          fr: Score HHS 0-1. Le ménage connaît peu ou pas de faim.
          es: Puntaje HHS 0-1. El hogar experimenta poca o ninguna hambre.
      moderate:
        title:
          en: Moderate hunger
          fr: Faim modérée
          es: Hambre moderada
        description:
          en: HHS score 2-3. Household experiences moderate hunger.
          fr: Score HHS 2-3. Le ménage connaît une faim modérée.
          es: Puntaje HHS 2-3. El hogar experimenta hambre moderada.
      severe:
        title:
          en: Severe hunger
          fr: Faim sévère
          es: Hambre grave
        description:
          en: HHS score 4-5. Household experiences severe hunger.
          fr: Score HHS 4-5. Le ménage connaît une faim sévère.
          es: Puntaje HHS 4-5. El hogar experimenta hambre grave.
      very_severe:
        title:
          en: Very severe hunger
          fr: Faim très sévère
          es: Hambre muy grave
        description:
          en: HHS score 6. Household experiences very severe hunger.
          fr: Score HHS 6. Le ménage connaît une faim très sévère.
          es: Puntaje HHS 6. El hogar experimenta hambre muy grave.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fanta-hhs"], "definition": {"en": "The household hunger category derived from the Household Hunger Scale (HHS) score. Four categories using FANTA standard thresholds.", "es": "La categor\u00eda de hambre del hogar derivada del puntaje de la Escala de Hambre del Hogar (HHS). Cuatro categor\u00edas seg\u00fan los umbrales est\u00e1ndar de FANTA.", "fr": "La cat\u00e9gorie de faim du m\u00e9nage d\u00e9riv\u00e9e du score de l''\u00e9chelle de la faim des m\u00e9nages (HHS). Quatre cat\u00e9gories selon les seuils standard de FANTA."}, "id": "hhs-category", "label": {"en": "Household Hunger Scale Category", "es": "Categor\u00eda de la Escala de Hambre del Hogar", "fr": "Cat\u00e9gorie de l''\u00e9chelle de la faim des m\u00e9nages"}, "maturity": "draft", "standard": {"name": "FANTA Household Hunger Scale: Indicator Definition and Measurement Guide (2010, revised 2017)", "notes": "Four-level categorical scale derived from the sum of three recoded HHS frequency questions.", "uri": "https://www.fantaproject.org/monitoring-and-evaluation/household-hunger-scale-hhs"}, "values": [{"code": "little_to_none", "definition": {"en": "HHS score 0-1. Household experiences little to no hunger.", "es": "Puntaje HHS 0-1. El hogar experimenta poca o ninguna hambre.", "fr": "Score HHS 0-1. Le m\u00e9nage conna\u00eet peu ou pas de faim."}, "label": {"en": "Little to no hunger", "es": "Poca o ninguna hambre", "fr": "Peu ou pas de faim"}}, {"code": "moderate", "definition": {"en": "HHS score 2-3. Household experiences moderate hunger.", "es": "Puntaje HHS 2-3. El hogar experimenta hambre moderada.", "fr": "Score HHS 2-3. Le m\u00e9nage conna\u00eet une faim mod\u00e9r\u00e9e."}, "label": {"en": "Moderate hunger", "es": "Hambre moderada", "fr": "Faim mod\u00e9r\u00e9e"}}, {"code": "severe", "definition": {"en": "HHS score 4-5. Household experiences severe hunger.", "es": "Puntaje HHS 4-5. El hogar experimenta hambre grave.", "fr": "Score HHS 4-5. Le m\u00e9nage conna\u00eet une faim s\u00e9v\u00e8re."}, "label": {"en": "Severe hunger", "es": "Hambre grave", "fr": "Faim s\u00e9v\u00e8re"}}, {"code": "very_severe", "definition": {"en": "HHS score 6. Household experiences very severe hunger.", "es": "Puntaje HHS 6. El hogar experimenta hambre muy grave.", "fr": "Score HHS 6. Le m\u00e9nage conna\u00eet une faim tr\u00e8s s\u00e9v\u00e8re."}, "label": {"en": "Very severe hunger", "es": "Hambre muy grave", "fr": "Faim tr\u00e8s s\u00e9v\u00e8re"}}]}'
      bibliography_refs: fanta-hhs
  HhsFrequency:
    title:
      en: HHS Frequency
      fr: Fréquence HHS
      es: Frecuencia HHS
    description:
      en: Four-tier frequency scale used by the FANTA Household Hunger Scale. For each of the three HHS items, the respondent reports how often in the past 30 days the condition occurred. The scoring rule collapses this scale into a 0-2 count (never = 0; rarely/sometimes = 1; often = 2) before summing the three items into an HHS score of 0-6.
      fr: Échelle de fréquence à quatre niveaux utilisée par l'Échelle de la faim du ménage de FANTA. Pour chacun des trois items HHS, le répondant indique à quelle fréquence, au cours des trente derniers jours, la condition s'est produite. La règle de notation réduit cette échelle en un compte 0-2 (jamais = 0 ; rarement/parfois = 1 ; souvent = 2) avant de sommer les trois items en un score HHS de 0 à 6.
      es: Escala de frecuencia de cuatro niveles usada por la Escala de Hambre del Hogar de FANTA. Para cada uno de los tres ítems HHS, el respondiente reporta con qué frecuencia ocurrió la condición en los últimos treinta días. La regla de puntuación colapsa esta escala en un recuento 0-2 (nunca = 0; rara vez/a veces = 1; a menudo = 2) antes de sumar los tres ítems en un puntaje HHS de 0 a 6.
    enum_uri: aidops:HhsFrequency
    permissible_values:
      never:
        title:
          en: Never
          fr: Jamais
          es: Nunca
        description:
          en: The condition did not occur at all in the past 30 days. Scored 0.
          fr: La condition ne s'est pas produite au cours des trente derniers jours. Noté 0.
          es: La condición no ocurrió en los últimos treinta días. Puntuado 0.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "HHS scored 0"}}'
      rarely:
        title:
          en: Rarely (1-2 times)
          fr: Rarement (1 à 2 fois)
          es: Rara vez (1 a 2 veces)
        description:
          en: The condition occurred one or two times in the past 30 days. Scored 1.
          fr: La condition s'est produite une ou deux fois au cours des trente derniers jours. Noté 1.
          es: La condición ocurrió una o dos veces en los últimos treinta días. Puntuado 1.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "HHS scored 1"}}'
      sometimes:
        title:
          en: Sometimes (3-10 times)
          fr: Parfois (3 à 10 fois)
          es: A veces (3 a 10 veces)
        description:
          en: The condition occurred between three and ten times in the past 30 days. Scored 1.
          fr: La condition s'est produite entre trois et dix fois au cours des trente derniers jours. Noté 1.
          es: La condición ocurrió entre tres y diez veces en los últimos treinta días. Puntuado 1.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "HHS scored 1"}}'
      often:
        title:
          en: Often (more than 10 times)
          fr: Souvent (plus de 10 fois)
          es: A menudo (más de 10 veces)
        description:
          en: The condition occurred more than ten times in the past 30 days. Scored 2.
          fr: La condition s'est produite plus de dix fois au cours des trente derniers jours. Noté 2.
          es: La condición ocurrió más de diez veces en los últimos treinta días. Puntuado 2.
        annotations:
          publicschema_pv_extras_json: '{"notes": {"en": "HHS scored 2"}}'
    annotations:
