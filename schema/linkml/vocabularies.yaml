  MhmPrivacyAccess:
    title:
      en: MHM — private place for menstrual hygiene (3-level)
      fr: GHM — lieu privé pour l'hygiène menstruelle (3 niveaux)
      es: MHM — lugar privado para la higiene menstrual (3 niveles)
    description:
      en: Three-level scale for assessing whether a woman or girl had access to a private place to wash during her last menstrual period. Distinguishes between access to a private toilet or bathroom and access to another private space. Based on JMP/MICS expanded MHM module (MICS Belize pilot indicator UN14). Relevant to SDG 6.2 which explicitly references women's and girls' hygiene needs.
      fr: Échelle à trois niveaux pour évaluer si une femme ou une fille avait accès à un lieu privé pour se laver pendant ses dernières règles. Distingue l'accès à des toilettes ou une salle de bain privée et l'accès à un autre espace privé. Basée sur le module MHM élargi JMP/MICS (indicateur pilote MICS Belize UN14). Pertinent pour l'ODD 6.2 qui fait explicitement référence aux besoins en matière d'hygiène des femmes et des filles.
      es: Escala de tres niveles para evaluar si una mujer o niña tuvo acceso a un lugar privado para lavarse durante su último período menstrual. Distingue entre acceso a un inodoro o baño privado y acceso a otro espacio privado. Basada en el módulo MHM ampliado JMP/MICS (indicador piloto MICS Belice UN14). Relevante para los ODS 6.2 que hacen referencia explícita a las necesidades de higiene de mujeres y niñas.
    enum_uri: aidops:MhmPrivacyAccess
    permissible_values:
      yes_toilet_or_bathroom:
        title:
          en: Yes — private toilet or bathroom
          fr: Oui — toilettes ou salle de bain privée
          es: Sí — inodoro o baño privado
        description:
          en: The respondent had access to a private toilet or bathroom to wash during her last menstrual period.
          fr: La répondante avait accès à des toilettes ou une salle de bain privée pour se laver pendant ses dernières règles.
          es: La encuestada tuvo acceso a un inodoro o baño privado para lavarse durante su último período menstrual.
      yes_elsewhere:
        title:
          en: Yes — private space but not a toilet or bathroom
          fr: Oui — espace privé mais pas de toilettes ni de salle de bain
          es: Sí — espacio privado pero no inodoro ni baño
        description:
          en: The respondent had access to a private space for washing but not a toilet or bathroom specifically.
          fr: La répondante avait accès à un espace privé pour se laver mais pas à des toilettes ou une salle de bain spécifiquement.
          es: La encuestada tuvo acceso a un espacio privado para lavarse pero no específicamente a un inodoro o baño.
      'no':
        title:
          en: No — no private space available
          fr: Non — aucun espace privé disponible
          es: No — sin espacio privado disponible
        description:
          en: The respondent had no private space available to wash during her last menstrual period.
          fr: La répondante n'avait aucun espace privé disponible pour se laver pendant ses dernières règles.
          es: La encuestada no tuvo ningún espacio privado disponible para lavarse durante su último período menstrual.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Three-level scale for assessing whether a woman or girl had access to a private place to wash during her last menstrual period. Distinguishes between access to a private toilet or bathroom and access to another private space. Based on JMP/MICS expanded MHM module (MICS Belize pilot indicator UN14). Relevant to SDG 6.2 which explicitly references women''s and girls'' hygiene needs.", "es": "Escala de tres niveles para evaluar si una mujer o ni\u00f1a tuvo acceso a un lugar privado para lavarse durante su \u00faltimo per\u00edodo menstrual. Distingue entre acceso a un inodoro o ba\u00f1o privado y acceso a otro espacio privado. Basada en el m\u00f3dulo MHM ampliado JMP/MICS (indicador piloto MICS Belice UN14). Relevante para los ODS 6.2 que hacen referencia expl\u00edcita a las necesidades de higiene de mujeres y ni\u00f1as.", "fr": "\u00c9chelle \u00e0 trois niveaux pour \u00e9valuer si une femme ou une fille avait acc\u00e8s \u00e0 un lieu priv\u00e9 pour se laver pendant ses derni\u00e8res r\u00e8gles. Distingue l''acc\u00e8s \u00e0 des toilettes ou une salle de bain priv\u00e9e et l''acc\u00e8s \u00e0 un autre espace priv\u00e9. Bas\u00e9e sur le module MHM \u00e9largi JMP/MICS (indicateur pilote MICS Belize UN14). Pertinent pour l''ODD 6.2 qui fait explicitement r\u00e9f\u00e9rence aux besoins en mati\u00e8re d''hygi\u00e8ne des femmes et des filles."}, "id": "mhm-privacy-access", "label": {"en": "MHM \u2014 private place for menstrual hygiene (3-level)", "es": "MHM \u2014 lugar privado para la higiene menstrual (3 niveles)", "fr": "GHM \u2014 lieu priv\u00e9 pour l''hygi\u00e8ne menstruelle (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_toilet_or_bathroom", "definition": {"en": "The respondent had access to a private toilet or bathroom to wash during her last menstrual period.", "es": "La encuestada tuvo acceso a un inodoro o ba\u00f1o privado para lavarse durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante avait acc\u00e8s \u00e0 des toilettes ou une salle de bain priv\u00e9e pour se laver pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "Yes \u2014 private toilet or bathroom", "es": "S\u00ed \u2014 inodoro o ba\u00f1o privado", "fr": "Oui \u2014 toilettes ou salle de bain priv\u00e9e"}}, {"code": "yes_elsewhere", "definition": {"en": "The respondent had access to a private space for washing but not a toilet or bathroom specifically.", "es": "La encuestada tuvo acceso a un espacio privado para lavarse pero no espec\u00edficamente a un inodoro o ba\u00f1o.", "fr": "La r\u00e9pondante avait acc\u00e8s \u00e0 un espace priv\u00e9 pour se laver mais pas \u00e0 des toilettes ou une salle de bain sp\u00e9cifiquement."}, "label": {"en": "Yes \u2014 private space but not a toilet or bathroom", "es": "S\u00ed \u2014 espacio privado pero no inodoro ni ba\u00f1o", "fr": "Oui \u2014 espace priv\u00e9 mais pas de toilettes ni de salle de bain"}}, {"code": "no", "definition": {"en": "The respondent had no private space available to wash during her last menstrual period.", "es": "La encuestada no tuvo ning\u00fan espacio privado disponible para lavarse durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante n''avait aucun espace priv\u00e9 disponible pour se laver pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "No \u2014 no private space available", "es": "No \u2014 sin espacio privado disponible", "fr": "Non \u2014 aucun espace priv\u00e9 disponible"}}]}'
