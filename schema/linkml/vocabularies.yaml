is militarized or dangerous to cross because of active armed conflict.", "es": "El \u00e1rea est\u00e1 militarizada o es peligrosa de cruzar debido al conflicto armado activo.", "fr": "La zone est militaris\u00e9e ou dangereuse \u00e0 traverser en raison d''un conflit arm\u00e9 actif."}, "label": {"en": "Proximity to active conflict front line", "es": "Proximidad a una l\u00ednea de frente activa", "fr": "Proximit\u00e9 d''une ligne de front active"}}, {"code": "eo_contamination", "definition": {"en": "Routes are impassable because of known or suspected explosive hazards. See also eo_contamination_known for the broader EO exposure indicator.", "es": "Las rutas son intransitables por peligros explosivos conocidos o sospechados. Ver tambi\u00e9n eo_contamination_known para el indicador m\u00e1s amplio de exposici\u00f3n a AE.", "fr": "Les itin\u00e9raires sont impraticables en raison de risques explosifs connus ou suspect\u00e9s. Voir aussi eo_contamination_known pour l''indicateur plus large d''exposition aux EE."}, "label": {"en": "Explosive ordnance contamination on routes", "es": "Contaminaci\u00f3n por artefactos explosivos en rutas", "fr": "Contamination par engins explosifs sur les itin\u00e9raires"}}, {"code": "route_unsafe_general", "definition": {"en": "Route is unsafe to use because of general insecurity not specifically attributed to a specific actor or explosive ordnance.", "es": "La ruta es insegura por inseguridad general no atribuida espec\u00edficamente a un actor o artefactos explosivos.", "fr": "L''itin\u00e9raire est dangereux \u00e0 emprunter en raison d''une ins\u00e9curit\u00e9 g\u00e9n\u00e9rale non sp\u00e9cifiquement attribu\u00e9e \u00e0 un acteur particulier ou \u00e0 des engins explosifs."}, "label": {"en": "Route generally unsafe (insecurity)", "es": "Ruta generalmente insegura (inseguridad)", "fr": "Itin\u00e9raire globalement dangereux (ins\u00e9curit\u00e9)"}}, {"code": "discriminatory_restriction", "definition": {"en": "Household memb