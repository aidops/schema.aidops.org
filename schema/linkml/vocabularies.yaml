  HygieneServiceLevel:
    title:
      en: Hygiene Service Level
      fr: Niveau de service d'hygiène
      es: Nivel de servicio de higiene
    description:
      en: WHO/UNICEF JMP classification of household hygiene service level, derived from enumerator observation of handwashing facility presence, water availability, and soap availability. This is a three-rung ladder; the JMP does not yet define a 'safely managed' rung for household hygiene. The basic level is the SDG 6.2.1 target threshold.
      fr: Classification JMP OMS/UNICEF du niveau de service d'hygiène des ménages, dérivée de l'observation par l'énumérateur de la présence d'un dispositif de lavage des mains, de la disponibilité de l'eau et du savon. Il s'agit d'une échelle à trois niveaux ; le JMP ne définit pas encore de niveau 'gestion sécurisée' pour l'hygiène des ménages. Le niveau de base est le seuil cible de l'ODD 6.2.1.
      es: Clasificación JMP OMS/UNICEF del nivel de servicio de higiene del hogar, derivada de la observación por el enumerador de la presencia de instalación para lavado de manos, disponibilidad de agua y disponibilidad de jabón. Es una escala de tres peldaños; el JMP aún no define un peldaño de 'gestión segura' para la higiene del hogar. El nivel básico es el umbral objetivo de los ODS 6.2.1.
    enum_uri: aidops:HygieneServiceLevel
    permissible_values:
      basic:
        title:
          en: Basic hygiene service
          fr: Service d'hygiène de base
          es: Servicio de higiene básico
        description:
          en: A handwashing facility is present with soap and water available at the time of observation. Meets the JMP SDG 6.2.1 basic hygiene service threshold.
          fr: Un dispositif de lavage des mains est présent avec du savon et de l'eau disponibles au moment de l'observation. Satisfait au seuil de service d'hygiène de base JMP ODD 6.2.1.
          es: Hay una instalación para lavado de manos con agua y jabón disponibles en el momento de la observación. Cumple el umbral de servicio de higiene básico JMP ODS 6.2.1.
      limited:
        title:
          en: Limited hygiene service
          fr: Service d'hygiène limité
          es: Servicio de higiene limitado
        description:
          en: A handwashing facility is present but either water or soap (or both) is not available at the time of observation.
          fr: Un dispositif de lavage des mains est présent mais l'eau ou le savon (ou les deux) n'est pas disponible au moment de l'observation.
          es: Hay una instalación para lavado de manos pero no hay agua o jabón (o ambos) disponibles en el momento de la observación.
      no_facility:
        title:
          en: No hygiene facility
          fr: Aucune installation d'hygiène
          es: Sin instalación de higiene
        description:
          en: No handwashing facility of any kind is present on the household premises.
          fr: Aucun dispositif de lavage des mains n'est présent dans les locaux du ménage.
          es: No hay ninguna instalación para lavado de manos en las instalaciones del hogar.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "WHO/UNICEF JMP classification of household hygiene service level, derived from enumerator observation of handwashing facility presence, water availability, and soap availability. This is a three-rung ladder; the JMP does not yet define a ''safely managed'' rung for household hygiene. The basic level is the SDG 6.2.1 target threshold.", "es": "Clasificaci\u00f3n JMP OMS/UNICEF del nivel de servicio de higiene del hogar, derivada de la observaci\u00f3n por el enumerador de la presencia de instalaci\u00f3n para lavado de manos, disponibilidad de agua y disponibilidad de jab\u00f3n. Es una escala de tres pelda\u00f1os; el JMP a\u00fan no define un pelda\u00f1o de ''gesti\u00f3n segura'' para la higiene del hogar. El nivel b\u00e1sico es el umbral objetivo de los ODS 6.2.1.", "fr": "Classification JMP OMS/UNICEF du niveau de service d''hygi\u00e8ne des m\u00e9nages, d\u00e9riv\u00e9e de l''observation par l''\u00e9num\u00e9rateur de la pr\u00e9sence d''un dispositif de lavage des mains, de la disponibilit\u00e9 de l''eau et du savon. Il s''agit d''une \u00e9chelle \u00e0 trois niveaux ; le JMP ne d\u00e9finit pas encore de niveau ''gestion s\u00e9curis\u00e9e'' pour l''hygi\u00e8ne des m\u00e9nages. Le niveau de base est le seuil cible de l''ODD 6.2.1."}, "id": "hygiene-service-level", "label": {"en": "Hygiene Service Level", "es": "Nivel de servicio de higiene", "fr": "Niveau de service d''hygi\u00e8ne"}, "maturity": "draft", "standard": {"name": "WHO/UNICEF JMP Service Ladder (SDG 6.2.1 \u2014 Hygiene)", "notes": "Derived from JMP H1 (handwashing facility), H2 (water observed), H3 (soap observed). Basic = facility + water + soap observed. Limited = facility + water or soap but not both. No facility = no handwashing facility on premises.", "uri": "https://washdata.org/monitoring/hygiene"}, "values": [{"code": "basic", "definition": {"en": "A handwashing facility is present with soap and water available at the time of observation. Meets the JMP SDG 6.2.1 basic hygiene service threshold.", "es": "Hay una instalaci\u00f3n para lavado de manos con agua y jab\u00f3n disponibles en el momento de la observaci\u00f3n. Cumple el umbral de servicio de higiene b\u00e1sico JMP ODS 6.2.1.", "fr": "Un dispositif de lavage des mains est pr\u00e9sent avec du savon et de l''eau disponibles au moment de l''observation. Satisfait au seuil de service d''hygi\u00e8ne de base JMP ODD 6.2.1."}, "label": {"en": "Basic hygiene service", "es": "Servicio de higiene b\u00e1sico", "fr": "Service d''hygi\u00e8ne de base"}}, {"code": "limited", "definition": {"en": "A handwashing facility is present but either water or soap (or both) is not available at the time of observation.", "es": "Hay una instalaci\u00f3n para lavado de manos pero no hay agua o jab\u00f3n (o ambos) disponibles en el momento de la observaci\u00f3n.", "fr": "Un dispositif de lavage des mains est pr\u00e9sent mais l''eau ou le savon (ou les deux) n''est pas disponible au moment de l''observation."}, "label": {"en": "Limited hygiene service", "es": "Servicio de higiene limitado", "fr": "Service d''hygi\u00e8ne limit\u00e9"}}, {"code": "no_facility", "definition": {"en": "No handwashing facility of any kind is present on the household premises.", "es": "No hay ninguna instalaci\u00f3n para lavado de manos en las instalaciones del hogar.", "fr": "Aucun dispositif de lavage des mains n''est pr\u00e9sent dans les locaux du m\u00e9nage."}, "label": {"en": "No hygiene facility", "es": "Sin instalaci\u00f3n de higiene", "fr": "Aucune installation d''hygi\u00e8ne"}}]}'
      bibliography_refs: jmp-core
  IncomeSeasonalityPattern:
    title:
      en: Income Seasonality Pattern
      fr: Schéma de saisonnalité des revenus
      es: Patrón de estacionalidad de ingresos
    description:
      en: Household-level assessment of income stability across the year. Synthesised from the LSMS-ISA seasonal module and the Sphere 2018 Livelihoods chapter's seasonal vulnerability calendar concept. Used to characterise whether household income is stable, moderately variable, strongly seasonal, or unpredictable, to identify households whose income is seasonally precarious.
      fr: Évaluation au niveau du ménage de la stabilité des revenus à travers l'année. Synthétisé à partir du module saisonnier LSMS-ISA et du concept de calendrier de vulnérabilité saisonnière du chapitre Moyens de subsistance de Sphère 2018. Utilisé pour caractériser si le revenu du ménage est stable, modérément variable, fortement saisonnier ou imprévisible, afin d'identifier les ménages dont le revenu est saisonnièrement précaire.
      es: Evaluación a nivel del hogar de la estabilidad de los ingresos a lo largo del año. Sintetizado a partir del módulo estacional LSMS-ISA y el concepto de calendario de vulnerabilidad estacional del capítulo de Medios de Vida de Esfera 2018. Se utiliza para caracterizar si el ingreso del hogar es estable, moderadamente variable, fuertemente estacional o impredecible, para identificar hogares cuyo ingreso es estacionalmente precario.
    enum_uri: aidops:IncomeSeasonalityPattern
    permissible_values:
      stable_year_round:
        title:
          en: Stable year-round
          fr: Stable toute l'année
          es: Estable todo el año
        description:
          en: Income is relatively constant throughout the year with no significant seasonal fluctuation.
          fr: Le revenu est relativement constant tout au long de l'année, sans fluctuation saisonnière significative.
          es: El ingreso es relativamente constante durante todo el año sin fluctuación estacional significativa.
      mostly_stable_minor_fluctuation:
        title:
          en: Mostly stable — minor seasonal variation
          fr: Principalement stable — légère variation saisonnière
          es: Principalmente estable — variación estacional menor
        description:
          en: Income fluctuates seasonally but the household can meet needs in all months.
          fr: Le revenu fluctue selon les saisons mais le ménage peut couvrir ses besoins tous les mois.
          es: El ingreso fluctúa estacionalmente pero el hogar puede cubrir sus necesidades todos los meses.
      seasonal_major_fluctuation:
        title:
          en: Seasonal — major fluctuation
          fr: Saisonnier — fluctuation majeure
          es: Estacional — fluctuación mayor
        description:
          en: Income varies significantly by season; there are months when income is insufficient to meet basic needs.
          fr: Le revenu varie significativement selon la saison ; certains mois, le revenu est insuffisant pour couvrir les besoins de base.
          es: El ingreso varía significativamente por temporada; hay meses en los que el ingreso es insuficiente para cubrir las necesidades básicas.
      highly_irregular:
        title:
          en: Highly irregular — unpredictable
          fr: Très irrégulier — imprévisible
          es: Muy irregular — impredecible
        description:
          en: Income has no predictable seasonal pattern and can drop to near zero at any time.
          fr: Le revenu n'a pas de schéma saisonnier prévisible et peut tomber à presque zéro à tout moment.
          es: El ingreso no tiene un patrón estacional predecible y puede bajar a casi cero en cualquier momento.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["fao-rima-2016"], "definition": {"en": "Household-level assessment of income stability across the year. Synthesised from the LSMS-ISA seasonal module and the Sphere 2018 Livelihoods chapter''s seasonal vulnerability calendar concept. Used to characterise whether household income is stable, moderately variable, strongly seasonal, or unpredictable, to identify households whose income is seasonally precarious.", "es": "Evaluaci\u00f3n a nivel del hogar de la estabilidad de los ingresos a lo largo del a\u00f1o. Sintetizado a partir del m\u00f3dulo estacional LSMS-ISA y el concepto de calendario de vulnerabilidad estacional del cap\u00edtulo de Medios de Vida de Esfera 2018. Se utiliza para caracterizar si el ingreso del hogar es estable, moderadamente variable, fuertemente estacional o impredecible, para identificar hogares cuyo ingreso es estacionalmente precario.", "fr": "\u00c9valuation au niveau du m\u00e9nage de la stabilit\u00e9 des revenus \u00e0 travers l''ann\u00e9e. Synth\u00e9tis\u00e9 \u00e0 partir du module saisonnier LSMS-ISA et du concept de calendrier de vuln\u00e9rabilit\u00e9 saisonni\u00e8re du chapitre Moyens de subsistance de Sph\u00e8re 2018. Utilis\u00e9 pour caract\u00e9riser si le revenu du m\u00e9nage est stable, mod\u00e9r\u00e9ment variable, fortement saisonnier ou impr\u00e9visible, afin d''identifier les m\u00e9nages dont le revenu est saisonni\u00e8rement pr\u00e9caire."}, "id": "income-seasonality-pattern", "label": {"en": "Income Seasonality Pattern", "es": "Patr\u00f3n de estacionalidad de ingresos", "fr": "Sch\u00e9ma de saisonnalit\u00e9 des revenus"}, "maturity": "draft", "standard": {"name": "Synthesised from LSMS-ISA seasonal module and Sphere 2018 Livelihoods chapter"}, "values": [{"code": "stable_year_round", "definition": {"en": "Income is relatively constant throughout the year with no significant seasonal fluctuation.", "es": "El ingreso es relativamente constante durante todo el a\u00f1o sin fluctuaci\u00f3n estacional significativa.", "fr": "Le revenu est relativement constant tout au long de l''ann\u00e9e, sans fluctuation saisonni\u00e8re significative."}, "label": {"en": "Stable year-round", "es": "Estable todo el a\u00f1o", "fr": "Stable toute l''ann\u00e9e"}}, {"code": "mostly_stable_minor_fluctuation", "definition": {"en": "Income fluctuates seasonally but the household can meet needs in all months.", "es": "El ingreso fluct\u00faa estacionalmente pero el hogar puede cubrir sus necesidades todos los meses.", "fr": "Le revenu fluctue selon les saisons mais le m\u00e9nage peut couvrir ses besoins tous les mois."}, "label": {"en": "Mostly stable \u2014 minor seasonal variation", "es": "Principalmente estable \u2014 variaci\u00f3n estacional menor", "fr": "Principalement stable \u2014 l\u00e9g\u00e8re variation saisonni\u00e8re"}}, {"code": "seasonal_major_fluctuation", "definition": {"en": "Income varies significantly by season; there are months when income is insufficient to meet basic needs.", "es": "El ingreso var\u00eda significativamente por temporada; hay meses en los que el ingreso es insuficiente para cubrir las necesidades b\u00e1sicas.", "fr": "Le revenu varie significativement selon la saison ; certains mois, le revenu est insuffisant pour couvrir les besoins de base."}, "label": {"en": "Seasonal \u2014 major fluctuation", "es": "Estacional \u2014 fluctuaci\u00f3n mayor", "fr": "Saisonnier \u2014 fluctuation majeure"}}, {"code": "highly_irregular", "definition": {"en": "Income has no predictable seasonal pattern and can drop to near zero at any time.", "es": "El ingreso no tiene un patr\u00f3n estacional predecible y puede bajar a casi cero en cualquier momento.", "fr": "Le revenu n''a pas de sch\u00e9ma saisonnier pr\u00e9visible et peut tomber \u00e0 presque z\u00e9ro \u00e0 tout moment."}, "label": {"en": "Highly irregular \u2014 unpredictable", "es": "Muy irregular \u2014 impredecible", "fr": "Tr\u00e8s irr\u00e9gulier \u2014 impr\u00e9visible"}}]}'
      bibliography_refs: fao-rima-2016
  IncomeShareBand:
    title:
      en: Income Share Band
      fr: Tranche de part du revenu
      es: Banda de participación en el ingreso
    description:
      en: 'Banded estimate of a household expenditure item as a share of monthly household income. Used for both cooking fuel cost and electricity cost in the MTF affordability attribute assessment. The three-band structure captures the MTF Tier 4-5 affordability threshold (less than 5% of income) without requiring precise income and expenditure data. Source: MTF household survey affordability module; WHO/World Bank harmonized questionnaire Q9.'
      fr: 'Estimation par tranche d''un poste de dépense du ménage en pourcentage du revenu mensuel du ménage. Utilisé à la fois pour le coût du combustible de cuisson et le coût de l''électricité dans l''évaluation de l''attribut d''accessibilité financière MTF. La structure à trois tranches capture le seuil d''accessibilité financière MTF des niveaux 4 à 5 (moins de 5 % du revenu) sans nécessiter de données précises sur les revenus et les dépenses. Source : module d''accessibilité financière du sondage ménage MTF ; question Q9 du questionnaire harmonisé OMS/Banque mondiale.'
      es: 'Estimación por bandas de un gasto del hogar como porcentaje del ingreso mensual del hogar. Se usa tanto para el costo del combustible de cocción como para el costo de la electricidad en la evaluación del atributo de asequibilidad MTF. La estructura de tres bandas captura el umbral de asequibilidad MTF de los Niveles 4 a 5 (menos del 5% del ingreso) sin requerir datos precisos de ingresos y gastos. Fuente: módulo de asequibilidad de la encuesta de hogares MTF; pregunta Q9 del cuestionario armonizado OMS/Banco Mundial.'
    enum_uri: aidops:IncomeShareBand
    permissible_values:
      less_than_5_pct:
        title:
          en: Less than 5%
          fr: Moins de 5 %
          es: Menos del 5%
        description:
          en: Expenditure is less than 5% of monthly household income. Meets the MTF Tier 4-5 affordability criterion.
          fr: La dépense représente moins de 5 % du revenu mensuel du ménage. Satisfait au critère d'accessibilité financière MTF des niveaux 4 à 5.
          es: El gasto es menos del 5% del ingreso mensual del hogar. Cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.
      five_to_10_pct:
        title:
          en: 5-10%
          fr: 5 à 10 %
          es: 5 a 10%
        description:
          en: Expenditure is between 5% and 10% of monthly household income. Does not meet the MTF Tier 4-5 affordability criterion.
          fr: La dépense représente entre 5 % et 10 % du revenu mensuel du ménage. Ne satisfait pas au critère d'accessibilité financière MTF des niveaux 4 à 5.
          es: El gasto está entre el 5% y el 10% del ingreso mensual del hogar. No cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.
      more_than_10_pct:
        title:
          en: More than 10%
          fr: Plus de 10 %
          es: Más del 10%
        description:
          en: Expenditure exceeds 10% of monthly household income. Does not meet the MTF Tier 4-5 affordability criterion.
          fr: La dépense dépasse 10 % du revenu mensuel du ménage. Ne satisfait pas au critère d'accessibilité financière MTF des niveaux 4 à 5.
          es: El gasto supera el 10% del ingreso mensual del hogar. No cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: Respondent is unable to estimate the expenditure share.
          fr: Le répondant n'est pas en mesure d'estimer la part des dépenses.
          es: El respondente no puede estimar la participación del gasto.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["se4all-mtf"], "definition": {"en": "Banded estimate of a household expenditure item as a share of monthly household income. Used for both cooking fuel cost and electricity cost in the MTF affordability attribute assessment. The three-band structure captures the MTF Tier 4-5 affordability threshold (less than 5% of income) without requiring precise income and expenditure data. Source: MTF household survey affordability module; WHO/World Bank harmonized questionnaire Q9.\n", "es": "Estimaci\u00f3n por bandas de un gasto del hogar como porcentaje del ingreso mensual del hogar. Se usa tanto para el costo del combustible de cocci\u00f3n como para el costo de la electricidad en la evaluaci\u00f3n del atributo de asequibilidad MTF. La estructura de tres bandas captura el umbral de asequibilidad MTF de los Niveles 4 a 5 (menos del 5% del ingreso) sin requerir datos precisos de ingresos y gastos. Fuente: m\u00f3dulo de asequibilidad de la encuesta de hogares MTF; pregunta Q9 del cuestionario armonizado OMS/Banco Mundial.\n", "fr": "Estimation par tranche d''un poste de d\u00e9pense du m\u00e9nage en pourcentage du revenu mensuel du m\u00e9nage. Utilis\u00e9 \u00e0 la fois pour le co\u00fbt du combustible de cuisson et le co\u00fbt de l''\u00e9lectricit\u00e9 dans l''\u00e9valuation de l''attribut d''accessibilit\u00e9 financi\u00e8re MTF. La structure \u00e0 trois tranches capture le seuil d''accessibilit\u00e9 financi\u00e8re MTF des niveaux 4 \u00e0 5 (moins de 5 % du revenu) sans n\u00e9cessiter de donn\u00e9es pr\u00e9cises sur les revenus et les d\u00e9penses. Source : module d''accessibilit\u00e9 financi\u00e8re du sondage m\u00e9nage MTF ; question Q9 du questionnaire harmonis\u00e9 OMS/Banque mondiale.\n"}, "id": "income-share-band", "label": {"en": "Income Share Band", "es": "Banda de participaci\u00f3n en el ingreso", "fr": "Tranche de part du revenu"}, "maturity": "draft", "values": [{"code": "less_than_5_pct", "definition": {"en": "Expenditure is less than 5% of monthly household income. Meets the MTF Tier 4-5 affordability criterion.", "es": "El gasto es menos del 5% del ingreso mensual del hogar. Cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.", "fr": "La d\u00e9pense repr\u00e9sente moins de 5 % du revenu mensuel du m\u00e9nage. Satisfait au crit\u00e8re d''accessibilit\u00e9 financi\u00e8re MTF des niveaux 4 \u00e0 5."}, "label": {"en": "Less than 5%", "es": "Menos del 5%", "fr": "Moins de 5 %"}}, {"code": "five_to_10_pct", "definition": {"en": "Expenditure is between 5% and 10% of monthly household income. Does not meet the MTF Tier 4-5 affordability criterion.", "es": "El gasto est\u00e1 entre el 5% y el 10% del ingreso mensual del hogar. No cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.", "fr": "La d\u00e9pense repr\u00e9sente entre 5 % et 10 % du revenu mensuel du m\u00e9nage. Ne satisfait pas au crit\u00e8re d''accessibilit\u00e9 financi\u00e8re MTF des niveaux 4 \u00e0 5."}, "label": {"en": "5-10%", "es": "5 a 10%", "fr": "5 \u00e0 10 %"}}, {"code": "more_than_10_pct", "definition": {"en": "Expenditure exceeds 10% of monthly household income. Does not meet the MTF Tier 4-5 affordability criterion.", "es": "El gasto supera el 10% del ingreso mensual del hogar. No cumple el criterio de asequibilidad MTF de los Niveles 4 a 5.", "fr": "La d\u00e9pense d\u00e9passe 10 % du revenu mensuel du m\u00e9nage. Ne satisfait pas au crit\u00e8re d''accessibilit\u00e9 financi\u00e8re MTF des niveaux 4 \u00e0 5."}, "label": {"en": "More than 10%", "es": "M\u00e1s del 10%", "fr": "Plus de 10 %"}}, {"code": "dont_know", "definition": {"en": "Respondent is unable to estimate the expenditure share.", "es": "El respondente no puede estimar la participaci\u00f3n del gasto.", "fr": "Le r\u00e9pondant n''est pas en mesure d''estimer la part des d\u00e9penses."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
      bibliography_refs: se4all-mtf
  InsurancePracticalAccess:
    title:
      en: Insurance Practical Access
      fr: Accès pratique à l'assurance
      es: Acceso práctico al seguro
    description:
      en: Three-level scale plus 'don't know' describing how easily a household member could actually use their health insurance when needed. Used by `insurance_practical_access` in HealthAccessProfile. Distinguishes insurance on paper from insurance that functions in practice. Drawn from the WHO People's Voice Survey affordability-confidence domain and commonly reported gaps in community-based and donor-subsidized schemes.
      fr: Échelle à trois niveaux plus « ne sait pas » décrivant avec quelle facilité un membre du ménage pourrait réellement utiliser son assurance maladie en cas de besoin. Utilisée par `insurance_practical_access` dans HealthAccessProfile. Distingue l'assurance sur papier de l'assurance qui fonctionne en pratique. Dérivée du domaine « confiance dans l'abordabilité » de l'enquête People's Voice Survey de l'OMS et des écarts couramment signalés dans les régimes communautaires et subventionnés par des bailleurs.
      es: Escala de tres niveles más 'no sabe' que describe con cuánta facilidad un miembro del hogar podría usar realmente su seguro de salud cuando lo necesite. Utilizada por `insurance_practical_access` en HealthAccessProfile. Distingue el seguro en papel del seguro que funciona en la práctica. Derivada del dominio 'confianza en la asequibilidad' de la People's Voice Survey de la OMS y de brechas comúnmente reportadas en esquemas comunitarios y subvencionados por donantes.
    enum_uri: aidops:InsurancePracticalAccess
    permissible_values:
      yes_easily:
        title:
          en: Yes, easily
          fr: Oui, facilement
          es: Sí, fácilmente
        description:
          en: Services covered by the insurance can be accessed without difficulty.
          fr: Les services couverts par l'assurance sont accessibles sans difficulté.
          es: Los servicios cubiertos por el seguro se pueden obtener sin dificultad.
      yes_with_some_difficulty:
        title:
          en: Yes, with some difficulty
          fr: Oui, avec quelques difficultés
          es: Sí, con alguna dificultad
        description:
          en: Services can be accessed but only with procedural delays, extra costs, or partial coverage.
          fr: Les services sont accessibles mais seulement avec des retards de procédure, des frais supplémentaires ou une couverture partielle.
          es: Los servicios se pueden obtener pero solo con retrasos burocráticos, costos adicionales o cobertura parcial.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: Services covered on paper cannot be accessed in practice when needed.
          fr: Les services couverts sur papier ne sont pas accessibles en pratique lorsqu'ils sont nécessaires.
          es: Los servicios cubiertos en papel no se pueden obtener en la práctica cuando se necesitan.
      dont_know:
        title:
          en: Don't know
          fr: Ne sait pas
          es: No sabe
        description:
          en: The respondent cannot say. Valid response; must not be re-coded as missing or 'no'.
          fr: Le répondant ne peut pas répondre. Réponse valide ; ne doit pas être recodée comme manquante ou « non ».
          es: El encuestado no puede responder. Respuesta válida; no debe recodificarse como faltante o 'no'.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["who-pvs-2023"], "definition": {"en": "Three-level scale plus ''don''t know'' describing how easily a household member could actually use their health insurance when needed. Used by `insurance_practical_access` in HealthAccessProfile. Distinguishes insurance on paper from insurance that functions in practice. Drawn from the WHO People''s Voice Survey affordability-confidence domain and commonly reported gaps in community-based and donor-subsidized schemes.", "es": "Escala de tres niveles m\u00e1s ''no sabe'' que describe con cu\u00e1nta facilidad un miembro del hogar podr\u00eda usar realmente su seguro de salud cuando lo necesite. Utilizada por `insurance_practical_access` en HealthAccessProfile. Distingue el seguro en papel del seguro que funciona en la pr\u00e1ctica. Derivada del dominio ''confianza en la asequibilidad'' de la People''s Voice Survey de la OMS y de brechas com\u00fanmente reportadas en esquemas comunitarios y subvencionados por donantes.", "fr": "\u00c9chelle \u00e0 trois niveaux plus \u00ab ne sait pas \u00bb d\u00e9crivant avec quelle facilit\u00e9 un membre du m\u00e9nage pourrait r\u00e9ellement utiliser son assurance maladie en cas de besoin. Utilis\u00e9e par `insurance_practical_access` dans HealthAccessProfile. Distingue l''assurance sur papier de l''assurance qui fonctionne en pratique. D\u00e9riv\u00e9e du domaine \u00ab confiance dans l''abordabilit\u00e9 \u00bb de l''enqu\u00eate People''s Voice Survey de l''OMS et des \u00e9carts couramment signal\u00e9s dans les r\u00e9gimes communautaires et subventionn\u00e9s par des bailleurs."}, "id": "insurance-practical-access", "label": {"en": "Insurance Practical Access", "es": "Acceso pr\u00e1ctico al seguro", "fr": "Acc\u00e8s pratique \u00e0 l''assurance"}, "maturity": "draft", "values": [{"code": "yes_easily", "definition": {"en": "Services covered by the insurance can be accessed without difficulty.", "es": "Los servicios cubiertos por el seguro se pueden obtener sin dificultad.", "fr": "Les services couverts par l''assurance sont accessibles sans difficult\u00e9."}, "label": {"en": "Yes, easily", "es": "S\u00ed, f\u00e1cilmente", "fr": "Oui, facilement"}}, {"code": "yes_with_some_difficulty", "definition": {"en": "Services can be accessed but only with procedural delays, extra costs, or partial coverage.", "es": "Los servicios se pueden obtener pero solo con retrasos burocr\u00e1ticos, costos adicionales o cobertura parcial.", "fr": "Les services sont accessibles mais seulement avec des retards de proc\u00e9dure, des frais suppl\u00e9mentaires ou une couverture partielle."}, "label": {"en": "Yes, with some difficulty", "es": "S\u00ed, con alguna dificultad", "fr": "Oui, avec quelques difficult\u00e9s"}}, {"code": "no", "definition": {"en": "Services covered on paper cannot be accessed in practice when needed.", "es": "Los servicios cubiertos en papel no se pueden obtener en la pr\u00e1ctica cuando se necesitan.", "fr": "Les services couverts sur papier ne sont pas accessibles en pratique lorsqu''ils sont n\u00e9cessaires."}, "label": {"en": "No", "es": "No", "fr": "Non"}}, {"code": "dont_know", "definition": {"en": "The respondent cannot say. Valid response; must not be re-coded as missing or ''no''.", "es": "El encuestado no puede responder. Respuesta v\u00e1lida; no debe recodificarse como faltante o ''no''.", "fr": "Le r\u00e9pondant ne peut pas r\u00e9pondre. R\u00e9ponse valide ; ne doit pas \u00eatre recod\u00e9e comme manquante ou \u00ab non \u00bb."}, "label": {"en": "Don''t know", "es": "No sabe", "fr": "Ne sait pas"}}]}'
