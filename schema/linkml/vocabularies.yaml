  BirthMultiplicity:
    title:
      en: Birth Multiplicity
      fr: Multiplicité de la naissance
      es: Multiplicidad del parto
    description:
      en: 'Whether the most recent birth was a singleton or a multiple birth (twins, triplets or more). DHS birth history variable b0: 0 = singleton, 1/2 = first/second of twins, etc. Multiple births affect birthweight and newborn care interpretation.'
      fr: 'Si la naissance la plus récente était unique ou multiple (jumeaux, triplés ou plus). Variable d''historique de naissance DHS b0 : 0 = naissance unique, 1/2 = premier/deuxième de jumeaux, etc. Les naissances multiples affectent l''interprétation du poids de naissance et des soins au nouveau-né.'
      es: 'Si el parto más reciente fue de un solo bebé o múltiple (gemelos, trillizos o más). Variable de historial de nacimientos DHS b0: 0 = nacimiento único, 1/2 = primero/segundo de gemelos, etc. Los partos múltiples afectan la interpretación del peso al nacer y la atención al recién nacido.'
    enum_uri: aidops:BirthMultiplicity
    permissible_values:
      singleton:
        title:
          en: Singleton
          fr: Naissance unique
          es: Nacimiento único
        description:
          en: A single baby was born. DHS b0 = 0.
          fr: Un seul bébé est né. DHS b0 = 0.
          es: Nació un solo bebé. DHS b0 = 0.
      twins:
        title:
          en: Twins
          fr: Jumeaux
          es: Gemelos
        description:
          en: Two babies were born from the same pregnancy. DHS b0 = 1 or 2.
          fr: Deux bébés sont nés de la même grossesse. DHS b0 = 1 ou 2.
          es: Dos bebés nacieron del mismo embarazo. DHS b0 = 1 o 2.
      triplets_or_more:
        title:
          en: Triplets or more
          fr: Triplés ou plus
          es: Trillizos o más
        description:
          en: Three or more babies were born from the same pregnancy. DHS b0 = 3 or higher.
          fr: Trois bébés ou plus sont nés de la même grossesse. DHS b0 = 3 ou plus.
          es: Tres o más bebés nacieron del mismo embarazo. DHS b0 = 3 o más.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-woman-questionnaire"], "definition": {"en": "Whether the most recent birth was a singleton or a multiple birth (twins, triplets or more). DHS birth history variable b0: 0 = singleton, 1/2 = first/second of twins, etc. Multiple births affect birthweight and newborn care interpretation.", "es": "Si el parto m\u00e1s reciente fue de un solo beb\u00e9 o m\u00faltiple (gemelos, trillizos o m\u00e1s). Variable de historial de nacimientos DHS b0: 0 = nacimiento \u00fanico, 1/2 = primero/segundo de gemelos, etc. Los partos m\u00faltiples afectan la interpretaci\u00f3n del peso al nacer y la atenci\u00f3n al reci\u00e9n nacido.", "fr": "Si la naissance la plus r\u00e9cente \u00e9tait unique ou multiple (jumeaux, tripl\u00e9s ou plus). Variable d''historique de naissance DHS b0 : 0 = naissance unique, 1/2 = premier/deuxi\u00e8me de jumeaux, etc. Les naissances multiples affectent l''interpr\u00e9tation du poids de naissance et des soins au nouveau-n\u00e9."}, "id": "birth-multiplicity", "label": {"en": "Birth Multiplicity", "es": "Multiplicidad del parto", "fr": "Multiplicit\u00e9 de la naissance"}, "maturity": "draft", "values": [{"code": "singleton", "definition": {"en": "A single baby was born. DHS b0 = 0.", "es": "Naci\u00f3 un solo beb\u00e9. DHS b0 = 0.", "fr": "Un seul b\u00e9b\u00e9 est n\u00e9. DHS b0 = 0."}, "label": {"en": "Singleton", "es": "Nacimiento \u00fanico", "fr": "Naissance unique"}}, {"code": "twins", "definition": {"en": "Two babies were born from the same pregnancy. DHS b0 = 1 or 2.", "es": "Dos beb\u00e9s nacieron del mismo embarazo. DHS b0 = 1 o 2.", "fr": "Deux b\u00e9b\u00e9s sont n\u00e9s de la m\u00eame grossesse. DHS b0 = 1 ou 2."}, "label": {"en": "Twins", "es": "Gemelos", "fr": "Jumeaux"}}, {"code": "triplets_or_more", "definition": {"en": "Three or more babies were born from the same pregnancy. DHS b0 = 3 or higher.", "es": "Tres o m\u00e1s beb\u00e9s nacieron del mismo embarazo. DHS b0 = 3 o m\u00e1s.", "fr": "Trois b\u00e9b\u00e9s ou plus sont n\u00e9s de la m\u00eame grossesse. DHS b0 = 3 ou plus."}, "label": {"en": "Triplets or more", "es": "Trillizos o m\u00e1s", "fr": "Tripl\u00e9s ou plus"}}]}'
