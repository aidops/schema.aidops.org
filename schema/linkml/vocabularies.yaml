  FacilityManagingAuthority:
    title:
      en: Facility Managing Authority
      fr: Autorité gestionnaire de l'établissement
      es: Autoridad gestora del establecimiento
    description:
      en: The entity that owns or operates a health facility, used as a stratifier for all downstream service-availability and readiness analyses. Codes distinguish public (ministry of health and other ministries), NGO (national and international), faith-based, private (for-profit and non-profit), UN-agency, and mixed public-private arrangements. Aligned with WHO SARA/HHFA managing-authority classification and with HeRAMS facility typology used in humanitarian crisis monitoring.
      fr: L'entité qui possède ou exploite un établissement de santé, utilisée comme stratificateur pour toutes les analyses de disponibilité et de capacité opérationnelle des services qui en découlent. Les codes distinguent le public (ministère de la santé et autres ministères), les ONG (nationales et internationales), confessionnel, privé (à but lucratif et à but non lucratif), agences des Nations Unies et arrangements public-privé mixtes. Aligné sur la classification de l'autorité gestionnaire SARA/HHFA de l'OMS et sur la typologie des établissements HeRAMS utilisée dans le suivi des crises humanitaires.
      es: La entidad que posee u opera un establecimiento de salud, utilizada como estratificador para todos los análisis posteriores de disponibilidad y capacidad operativa de servicios. Los códigos distinguen público (ministerio de salud y otros ministerios), ONG (nacionales e internacionales), confesional, privado (con y sin fines de lucro), agencias de Naciones Unidas y arreglos público-privados mixtos. Alineado con la clasificación de autoridad gestora SARA/HHFA de la OMS y con la tipología de establecimientos HeRAMS utilizada en el monitoreo de crisis humanitarias.
    enum_uri: aidops:FacilityManagingAuthority
    permissible_values:
      government_moh:
        title:
          en: Government - Ministry of Health
          fr: Gouvernement - Ministère de la Santé
          es: Gobierno - Ministerio de Salud
        description:
          en: Facility owned and operated by the national or sub-national Ministry of Health.
          fr: Établissement possédé et exploité par le Ministère de la Santé national ou infranational.
          es: Establecimiento de propiedad y operado por el Ministerio de Salud nacional o subnacional.
      government_other_ministry:
        title:
          en: Government - other ministry or agency
          fr: Gouvernement - autre ministère ou agence
          es: Gobierno - otro ministerio u organismo
        description:
          en: Facility owned and operated by a government body other than the Ministry of Health, such as defence, interior, or social-protection ministries.
          fr: Établissement possédé et exploité par un organisme gouvernemental autre que le Ministère de la Santé, tel que la défense, l'intérieur ou les ministères de la protection sociale.
          es: Establecimiento de propiedad y operado por un organismo gubernamental distinto del Ministerio de Salud, como defensa, interior o ministerios de protección social.
      ngo_national:
        title:
          en: NGO - national
          fr: ONG - nationale
          es: ONG - nacional
        description:
          en: Facility operated by a national non-governmental organization.
          fr: Établissement exploité par une organisation non gouvernementale nationale.
          es: Establecimiento operado por una organización no gubernamental nacional.
      ngo_international:
        title:
          en: NGO - international
          fr: ONG - internationale
          es: ONG - internacional
        description:
          en: Facility operated by an international non-governmental organization, including international humanitarian agencies such as MSF, IRC, or Save the Children.
          fr: Établissement exploité par une organisation non gouvernementale internationale, y compris des agences humanitaires internationales telles que MSF, IRC ou Save the Children.
          es: Establecimiento operado por una organización no gubernamental internacional, incluidas agencias humanitarias internacionales como MSF, IRC o Save the Children.
      faith_based:
        title:
          en: Faith-based organization
          fr: Organisation confessionnelle
          es: Organización confesional
        description:
          en: Facility operated by a religious organization, mission, or faith-based health network (e.g., Christian Health Association).
          fr: Établissement exploité par une organisation religieuse, une mission ou un réseau de santé confessionnel (par exemple, une association chrétienne de santé).
          es: Establecimiento operado por una organización religiosa, misión o red de salud confesional (por ejemplo, una asociación cristiana de salud).
      private_for_profit:
        title:
          en: Private - for profit
          fr: Privé - à but lucratif
          es: Privado - con fines de lucro
        description:
          en: Facility owned and operated by a commercial private-sector entity.
          fr: Établissement possédé et exploité par une entité privée à but lucratif.
          es: Establecimiento de propiedad y operado por una entidad privada con fines de lucro.
      private_non_profit:
        title:
          en: Private - non-profit (non-faith-based)
          fr: Privé - à but non lucratif (non confessionnel)
          es: Privado - sin fines de lucro (no confesional)
        description:
          en: Facility owned and operated by a non-profit private entity that is not a faith-based organization, such as a philanthropic foundation or cooperative.
          fr: Établissement possédé et exploité par une entité privée à but non lucratif qui n'est pas une organisation confessionnelle, telle qu'une fondation philanthropique ou une coopérative.
          es: Establecimiento de propiedad y operado por una entidad privada sin fines de lucro que no es una organización confesional, como una fundación filantrópica o cooperativa.
      un_agency:
        title:
          en: United Nations agency
          fr: Agence des Nations Unies
          es: Agencia de las Naciones Unidas
        description:
          en: Facility operated by a United Nations agency (e.g., UNHCR, UNICEF, WHO) or by a UN-funded partner, common in refugee and IDP operations.
          fr: Établissement exploité par une agence des Nations Unies (par exemple HCR, UNICEF, OMS) ou par un partenaire financé par l'ONU, courant dans les opérations auprès des réfugiés et des PDI.
          es: Establecimiento operado por una agencia de las Naciones Unidas (p. ej., ACNUR, UNICEF, OMS) o por un socio financiado por la ONU, común en operaciones con refugiados y PDI.
      mixed_public_private:
        title:
          en: Mixed public-private
          fr: Public-privé mixte
          es: Mixto público-privado
        description:
          en: Facility operated under a formal public-private partnership or similar arrangement that shares management responsibility across public and non-public actors.
          fr: Établissement exploité dans le cadre d'un partenariat public-privé formel ou d'un arrangement similaire qui partage la responsabilité de gestion entre acteurs publics et non publics.
          es: Establecimiento operado bajo una asociación público-privada formal o arreglo similar que comparte la responsabilidad de gestión entre actores públicos y no públicos.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: Managing authority that does not fit any of the listed categories.
          fr: Autorité gestionnaire qui ne correspond à aucune des catégories listées.
          es: Autoridad gestora que no corresponde a ninguna de las categorías listadas.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-spa-revised-2022", "who-hhfa-2022"], "definition": {"en": "The entity that owns or operates a health facility, used as a stratifier for all downstream service-availability and readiness analyses. Codes distinguish public (ministry of health and other ministries), NGO (national and international), faith-based, private (for-profit and non-profit), UN-agency, and mixed public-private arrangements. Aligned with WHO SARA/HHFA managing-authority classification and with HeRAMS facility typology used in humanitarian crisis monitoring.\n", "es": "La entidad que posee u opera un establecimiento de salud, utilizada como estratificador para todos los an\u00e1lisis posteriores de disponibilidad y capacidad operativa de servicios. Los c\u00f3digos distinguen p\u00fablico (ministerio de salud y otros ministerios), ONG (nacionales e internacionales), confesional, privado (con y sin fines de lucro), agencias de Naciones Unidas y arreglos p\u00fablico-privados mixtos. Alineado con la clasificaci\u00f3n de autoridad gestora SARA/HHFA de la OMS y con la tipolog\u00eda de establecimientos HeRAMS utilizada en el monitoreo de crisis humanitarias.\n", "fr": "L''entit\u00e9 qui poss\u00e8de ou exploite un \u00e9tablissement de sant\u00e9, utilis\u00e9e comme stratificateur pour toutes les analyses de disponibilit\u00e9 et de capacit\u00e9 op\u00e9rationnelle des services qui en d\u00e9coulent. Les codes distinguent le public (minist\u00e8re de la sant\u00e9 et autres minist\u00e8res), les ONG (nationales et internationales), confessionnel, priv\u00e9 (\u00e0 but lucratif et \u00e0 but non lucratif), agences des Nations Unies et arrangements public-priv\u00e9 mixtes. Align\u00e9 sur la classification de l''autorit\u00e9 gestionnaire SARA/HHFA de l''OMS et sur la typologie des \u00e9tablissements HeRAMS utilis\u00e9e dans le suivi des crises humanitaires.\n"}, "id": "facility-managing-authority", "label": {"en": "Facility Managing Authority", "es": "Autoridad gestora del establecimiento", "fr": "Autorit\u00e9 gestionnaire de l''\u00e9tablissement"}, "maturity": "draft", "standard": {"name": "WHO Service Availability and Readiness Assessment (SARA) Reference Manual v2.2", "notes": "SARA and HHFA use managing authority as a primary stratifier for service-availability and readiness analyses. HeRAMS applies a similar typology in humanitarian contexts, adding UN-agency and NGO-international distinctions relevant to crisis-response facility ownership.", "uri": "https://www.who.int/publications/i/item/WHO-HIS-HSI-2014.5-Rev.1"}, "values": [{"code": "government_moh", "definition": {"en": "Facility owned and operated by the national or sub-national Ministry of Health.", "es": "Establecimiento de propiedad y operado por el Ministerio de Salud nacional o subnacional.", "fr": "\u00c9tablissement poss\u00e9d\u00e9 et exploit\u00e9 par le Minist\u00e8re de la Sant\u00e9 national ou infranational."}, "label": {"en": "Government - Ministry of Health", "es": "Gobierno - Ministerio de Salud", "fr": "Gouvernement - Minist\u00e8re de la Sant\u00e9"}}, {"code": "government_other_ministry", "definition": {"en": "Facility owned and operated by a government body other than the Ministry of Health, such as defence, interior, or social-protection ministries.", "es": "Establecimiento de propiedad y operado por un organismo gubernamental distinto del Ministerio de Salud, como defensa, interior o ministerios de protecci\u00f3n social.", "fr": "\u00c9tablissement poss\u00e9d\u00e9 et exploit\u00e9 par un organisme gouvernemental autre que le Minist\u00e8re de la Sant\u00e9, tel que la d\u00e9fense, l''int\u00e9rieur ou les minist\u00e8res de la protection sociale."}, "label": {"en": "Government - other ministry or agency", "es": "Gobierno - otro ministerio u organismo", "fr": "Gouvernement - autre minist\u00e8re ou agence"}}, {"code": "ngo_national", "definition": {"en": "Facility operated by a national non-governmental organization.", "es": "Establecimiento operado por una organizaci\u00f3n no gubernamental nacional.", "fr": "\u00c9tablissement exploit\u00e9 par une organisation non gouvernementale nationale."}, "label": {"en": "NGO - national", "es": "ONG - nacional", "fr": "ONG - nationale"}}, {"code": "ngo_international", "definition": {"en": "Facility operated by an international non-governmental organization, including international humanitarian agencies such as MSF, IRC, or Save the Children.", "es": "Establecimiento operado por una organizaci\u00f3n no gubernamental internacional, incluidas agencias humanitarias internacionales como MSF, IRC o Save the Children.", "fr": "\u00c9tablissement exploit\u00e9 par une organisation non gouvernementale internationale, y compris des agences humanitaires internationales telles que MSF, IRC ou Save the Children."}, "label": {"en": "NGO - international", "es": "ONG - internacional", "fr": "ONG - internationale"}}, {"code": "faith_based", "definition": {"en": "Facility operated by a religious organization, mission, or faith-based health network (e.g., Christian Health Association).", "es": "Establecimiento operado por una organizaci\u00f3n religiosa, misi\u00f3n o red de salud confesional (por ejemplo, una asociaci\u00f3n cristiana de salud).", "fr": "\u00c9tablissement exploit\u00e9 par une organisation religieuse, une mission ou un r\u00e9seau de sant\u00e9 confessionnel (par exemple, une association chr\u00e9tienne de sant\u00e9)."}, "label": {"en": "Faith-based organization", "es": "Organizaci\u00f3n confesional", "fr": "Organisation confessionnelle"}}, {"code": "private_for_profit", "definition": {"en": "Facility owned and operated by a commercial private-sector entity.", "es": "Establecimiento de propiedad y operado por una entidad privada con fines de lucro.", "fr": "\u00c9tablissement poss\u00e9d\u00e9 et exploit\u00e9 par une entit\u00e9 priv\u00e9e \u00e0 but lucratif."}, "label": {"en": "Private - for profit", "es": "Privado - con fines de lucro", "fr": "Priv\u00e9 - \u00e0 but lucratif"}}, {"code": "private_non_profit", "definition": {"en": "Facility owned and operated by a non-profit private entity that is not a faith-based organization, such as a philanthropic foundation or cooperative.", "es": "Establecimiento de propiedad y operado por una entidad privada sin fines de lucro que no es una organizaci\u00f3n confesional, como una fundaci\u00f3n filantr\u00f3pica o cooperativa.", "fr": "\u00c9tablissement poss\u00e9d\u00e9 et exploit\u00e9 par une entit\u00e9 priv\u00e9e \u00e0 but non lucratif qui n''est pas une organisation confessionnelle, telle qu''une fondation philanthropique ou une coop\u00e9rative."}, "label": {"en": "Private - non-profit (non-faith-based)", "es": "Privado - sin fines de lucro (no confesional)", "fr": "Priv\u00e9 - \u00e0 but non lucratif (non confessionnel)"}}, {"code": "un_agency", "definition": {"en": "Facility operated by a United Nations agency (e.g., UNHCR, UNICEF, WHO) or by a UN-funded partner, common in refugee and IDP operations.", "es": "Establecimiento operado por una agencia de las Naciones Unidas (p. ej., ACNUR, UNICEF, OMS) o por un socio financiado por la ONU, com\u00fan en operaciones con refugiados y PDI.", "fr": "\u00c9tablissement exploit\u00e9 par une agence des Nations Unies (par exemple HCR, UNICEF, OMS) ou par un partenaire financ\u00e9 par l''ONU, courant dans les op\u00e9rations aupr\u00e8s des r\u00e9fugi\u00e9s et des PDI."}, "label": {"en": "United Nations agency", "es": "Agencia de las Naciones Unidas", "fr": "Agence des Nations Unies"}}, {"code": "mixed_public_private", "definition": {"en": "Facility operated under a formal public-private partnership or similar arrangement that shares management responsibility across public and non-public actors.", "es": "Establecimiento operado bajo una asociaci\u00f3n p\u00fablico-privada formal o arreglo similar que comparte la responsabilidad de gesti\u00f3n entre actores p\u00fablicos y no p\u00fablicos.", "fr": "\u00c9tablissement exploit\u00e9 dans le cadre d''un partenariat public-priv\u00e9 formel ou d''un arrangement similaire qui partage la responsabilit\u00e9 de gestion entre acteurs publics et non publics."}, "label": {"en": "Mixed public-private", "es": "Mixto p\u00fablico-privado", "fr": "Public-priv\u00e9 mixte"}}, {"code": "other", "definition": {"en": "Managing authority that does not fit any of the listed categories.", "es": "Autoridad gestora que no corresponde a ninguna de las categor\u00edas listadas.", "fr": "Autorit\u00e9 gestionnaire qui ne correspond \u00e0 aucune des cat\u00e9gories list\u00e9es."}, "label": {"en": "Other", "es": "Otro", "fr": "Autre"}}]}'
      bibliography_refs: dhs-spa-revised-2022,who-hhfa-2022
  FacilityNonFunctionalityReason:
    title:
      en: Facility Non-Functionality Reason
      fr: Motif de non-fonctionnalité de l'établissement
      es: Motivo de no funcionalidad del establecimiento
    description:
      en: 'Reason(s) a health facility is only partially functioning or is not functioning at all, recorded alongside the HeRAMS functionality status for partial-functioning or non-functioning facilities. Multi-select: the same facility may be partially functioning due to a combination of reasons (e.g., damaged building plus lack of staff). Aligned with the HeRAMS facility-reporting non-functionality reason set used across crisis deployments.'
      fr: 'Raison(s) pour lesquelles un établissement de santé n''est que partiellement fonctionnel ou n''est pas du tout fonctionnel, enregistrée à côté du statut de fonctionnalité HeRAMS pour les établissements partiellement fonctionnels ou non fonctionnels. Sélection multiple : un même établissement peut être partiellement fonctionnel en raison d''une combinaison de raisons (par exemple, bâtiment endommagé plus manque de personnel). Aligné sur l''ensemble des motifs de non-fonctionnalité HeRAMS utilisé dans les déploiements de crise.'
      es: 'Razón(es) por las que un establecimiento de salud solo funciona parcialmente o no funciona en absoluto, registrada junto al estado de funcionalidad HeRAMS para establecimientos parcialmente funcionales o no funcionales. Selección múltiple: el mismo establecimiento puede funcionar parcialmente por una combinación de razones (por ejemplo, edificio dañado más falta de personal). Alineado con el conjunto de motivos de no funcionalidad HeRAMS utilizado en los despliegues de crisis.'
    enum_uri: aidops:FacilityNonFunctionalityReason
    permissible_values:
      damaged_building:
        title:
          en: Damaged or destroyed building
          fr: Bâtiment endommagé ou détruit
          es: Edificio dañado o destruido
        description:
          en: The physical structure of the facility is damaged or destroyed, preventing normal operation.
          fr: La structure physique de l'établissement est endommagée ou détruite, empêchant le fonctionnement normal.
          es: La estructura física del establecimiento está dañada o destruida, impidiendo el funcionamiento normal.
      lack_of_staff:
        title:
          en: Lack of qualified staff
          fr: Manque de personnel qualifié
          es: Falta de personal calificado
        description:
          en: The facility does not have enough qualified clinical staff on duty to deliver normal services.
          fr: L'établissement ne dispose pas de suffisamment de personnel clinique qualifié de service pour fournir des services normaux.
          es: El establecimiento no tiene suficiente personal clínico calificado de servicio para prestar servicios normales.
      lack_of_medicines:
        title:
          en: Lack of medicines or commodities
          fr: Manque de médicaments ou de produits
          es: Falta de medicamentos o insumos
        description:
          en: The facility lacks essential medicines, tracer commodities, or medical supplies required for service delivery.
          fr: L'établissement manque de médicaments essentiels, de produits traceurs ou de fournitures médicales nécessaires à la prestation de services.
          es: El establecimiento carece de medicamentos esenciales, insumos trazadores o suministros médicos necesarios para la prestación de servicios.
      lack_of_equipment:
        title:
          en: Lack of equipment
          fr: Manque d'équipement
          es: Falta de equipamiento
        description:
          en: The facility lacks essential medical equipment (e.g., autoclave, cold-chain refrigerator, delivery bed, diagnostic equipment).
          fr: L'établissement manque d'équipement médical essentiel (par exemple, autoclave, réfrigérateur de chaîne du froid, lit d'accouchement, équipement de diagnostic).
          es: El establecimiento carece de equipamiento médico esencial (p. ej., autoclave, refrigerador de cadena de frío, cama de parto, equipos diagnósticos).
      lack_of_electricity:
        title:
          en: Lack of electricity
          fr: Manque d'électricité
          es: Falta de electricidad
        description:
          en: The facility does not have reliable electricity, preventing cold-chain storage, lighting, or equipment operation.
          fr: L'établissement n'a pas d'électricité fiable, ce qui empêche le stockage en chaîne du froid, l'éclairage ou le fonctionnement de l'équipement.
          es: El establecimiento no tiene electricidad confiable, lo que impide el almacenamiento en cadena de frío, la iluminación o el funcionamiento de equipos.
      lack_of_water:
        title:
          en: Lack of water
          fr: Manque d'eau
          es: Falta de agua
        description:
          en: The facility does not have reliable water for clinical use, hand hygiene, or sanitation.
          fr: L'établissement n'a pas d'eau fiable pour l'usage clinique, l'hygiène des mains ou l'assainissement.
          es: El establecimiento no tiene agua confiable para uso clínico, higiene de manos o saneamiento.
      security_or_access:
        title:
          en: Security or access barrier
          fr: Barrière de sécurité ou d'accès
          es: Barrera de seguridad o acceso
        description:
          en: The facility cannot operate or be reached due to insecurity, active conflict, checkpoints, or access restrictions.
          fr: L'établissement ne peut fonctionner ou être atteint en raison de l'insécurité, d'un conflit actif, de points de contrôle ou de restrictions d'accès.
          es: El establecimiento no puede operar o ser alcanzado debido a inseguridad, conflicto activo, puntos de control o restricciones de acceso.
      occupied_by_armed_actors:
        title:
          en: Occupied by armed actors
          fr: Occupé par des acteurs armés
          es: Ocupado por actores armados
        description:
          en: The facility is physically occupied or controlled by an armed actor (state or non-state), preventing civilian health service delivery.
          fr: L'établissement est physiquement occupé ou contrôlé par un acteur armé (étatique ou non étatique), empêchant la prestation de services de santé civils.
          es: El establecimiento está físicamente ocupado o controlado por un actor armado (estatal o no estatal), impidiendo la prestación de servicios de salud civiles.
      closed_by_authorities:
        title:
          en: Closed by authorities
          fr: Fermé par les autorités
          es: Cerrado por las autoridades
        description:
          en: The facility has been closed by an administrative or governmental decision (e.g., health-sector restructuring, suspension).
          fr: L'établissement a été fermé par une décision administrative ou gouvernementale (par exemple, restructuration du secteur de la santé, suspension).
          es: El establecimiento ha sido cerrado por decisión administrativa o gubernamental (p. ej., reestructuración del sector salud, suspensión).
      natural_disaster_damage:
        title:
          en: Natural-disaster damage
          fr: Dommages dus à une catastrophe naturelle
          es: Daños por desastre natural
        description:
          en: The facility is non-functional due to damage from a natural hazard event such as an earthquake, flood, cyclone, or landslide.
          fr: L'établissement n'est pas fonctionnel en raison de dommages causés par un aléa naturel tel qu'un séisme, une inondation, un cyclone ou un glissement de terrain.
          es: El establecimiento no es funcional debido a daños por un evento natural como un terremoto, inundación, ciclón o deslizamiento.
      other:
        title:
          en: Other
          fr: Autre
          es: Otro
        description:
          en: A non-functionality reason that does not fit any of the listed categories.
          fr: Un motif de non-fonctionnalité qui ne correspond à aucune des catégories listées.
          es: Un motivo de no funcionalidad que no corresponde a ninguna de las categorías listadas.
    annotations:
      publicschema_logical_document_json: '{"definition": {"en": "Reason(s) a health facility is only partially functioning or is not functioning at all, recorded alongside the HeRAMS functionality status for partial-functioning or non-functioning facilities. Multi-select: the same facility may be partially functioning due to a combination of reasons (e.g., damaged building plus lack of staff). Aligned with the HeRAMS facility-reporting non-functionality reason set used across crisis deployments.\n", "es": "Raz\u00f3n(es) por las que un establecimiento de salud solo funciona parcialmente o no funciona en absoluto, registrada junto al estado de funcionalidad HeRAMS para establecimientos parcialmente funcionales o no funcionales. Selecci\u00f3n m\u00faltiple: el mismo establecimiento puede funcionar parcialmente por una combinaci\u00f3n de razones (por ejemplo, edificio da\u00f1ado m\u00e1s falta de personal). Alineado con el conjunto de motivos de no funcionalidad HeRAMS utilizado en los despliegues de crisis.\n", "fr": "Raison(s) pour lesquelles un \u00e9tablissement de sant\u00e9 n''est que partiellement fonctionnel ou n''est pas du tout fonctionnel, enregistr\u00e9e \u00e0 c\u00f4t\u00e9 du statut de fonctionnalit\u00e9 HeRAMS pour les \u00e9tablissements partiellement fonctionnels ou non fonctionnels. S\u00e9lection multiple : un m\u00eame \u00e9tablissement peut \u00eatre partiellement fonctionnel en raison d''une combinaison de raisons (par exemple, b\u00e2timent endommag\u00e9 plus manque de personnel). Align\u00e9 sur l''ensemble des motifs de non-fonctionnalit\u00e9 HeRAMS utilis\u00e9 dans les d\u00e9ploiements de crise.\n"}, "id": "facility-non-functionality-reason", "label": {"en": "Facility Non-Functionality Reason", "es": "Motivo de no funcionalidad del establecimiento", "fr": "Motif de non-fonctionnalit\u00e9 de l''\u00e9tablissement"}, "maturity": "draft", "standard": {"name": "WHO Health Resources and Services Availability Monitoring System (HeRAMS)"