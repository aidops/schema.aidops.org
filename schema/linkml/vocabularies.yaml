  Whom5Frequency6pt:
    title:
      en: WHO-5 Frequency (6-point)
      fr: Fréquence WHO-5 (6 niveaux)
      es: Frecuencia WHO-5 (6 niveles)
    description:
      en: A six-point frequency scale running from 'at no time' to 'all of the time', used on the five items of the WHO-5 Well-Being Index. The WHO-5 scoring convention assigns ascending numeric values 0 through 5, where higher values indicate better well-being (5 = all of the time, 0 = at no time).
      fr: Une échelle de fréquence à six niveaux allant de « à aucun moment » à « tout le temps », utilisée pour les cinq items de l'Indice de bien-être WHO-5. La convention de notation WHO-5 attribue des valeurs numériques croissantes de 0 à 5, où les valeurs plus élevées indiquent un meilleur bien-être (5 = tout le temps, 0 = à aucun moment).
      es: Una escala de frecuencia de seis niveles que va desde «en ningún momento» hasta «todo el tiempo», usada en los cinco ítems del Índice de Bienestar WHO-5. La convención de puntuación WHO-5 asigna valores numéricos ascendentes de 0 a 5, donde los valores más altos indican mejor bienestar (5 = todo el tiempo, 0 = en ningún momento).
    enum_uri: aidops:Whom5Frequency6pt
    permissible_values:
      at_no_time:
        title:
          en: At no time
          fr: À aucun moment
          es: En ningún momento
        description:
          en: 'The feeling or experience was not present at any point during the last two weeks. WHO-5 scoring value: 0.'
          fr: 'Le sentiment ou l''expérience n''a été présent à aucun moment au cours des deux dernières semaines. Valeur de notation WHO-5 : 0.'
          es: 'El sentimiento o experiencia no estuvo presente en ningún momento durante las últimas dos semanas. Valor de puntuación WHO-5: 0.'
      some_of_the_time:
        title:
          en: Some of the time
          fr: Une partie du temps
          es: Parte del tiempo
        description:
          en: 'The feeling or experience was present some of the time during the last two weeks. WHO-5 scoring value: 1.'
          fr: 'Le sentiment ou l''expérience a été présent une partie du temps au cours des deux dernières semaines. Valeur de notation WHO-5 : 1.'
          es: 'El sentimiento o experiencia estuvo presente parte del tiempo durante las últimas dos semanas. Valor de puntuación WHO-5: 1.'
      less_than_half_the_time:
        title:
          en: Less than half of the time
          fr: Moins de la moitié du temps
          es: Menos de la mitad del tiempo
        description:
          en: 'The feeling or experience was present less than half of the last two weeks. WHO-5 scoring value: 2.'
          fr: 'Le sentiment ou l''expérience a été présent moins de la moitié des deux dernières semaines. Valeur de notation WHO-5 : 2.'
          es: 'El sentimiento o experiencia estuvo presente menos de la mitad de las últimas dos semanas. Valor de puntuación WHO-5: 2.'
      more_than_half_the_time:
        title:
          en: More than half of the time
          fr: Plus de la moitié du temps
          es: Más de la mitad del tiempo
        description:
          en: 'The feeling or experience was present more than half of the last two weeks. WHO-5 scoring value: 3.'
          fr: 'Le sentiment ou l''expérience a été présent plus de la moitié des deux dernières semaines. Valeur de notation WHO-5 : 3.'
          es: 'El sentimiento o experiencia estuvo presente más de la mitad de las últimas dos semanas. Valor de puntuación WHO-5: 3.'
      most_of_the_time:
        title:
          en: Most of the time
          fr: La plupart du temps
          es: La mayor parte del tiempo
        description:
          en: 'The feeling or experience was present most of the last two weeks. WHO-5 scoring value: 4.'
          fr: 'Le sentiment ou l''expérience a été présent la plupart des deux dernières semaines. Valeur de notation WHO-5 : 4.'
          es: 'El sentimiento o experiencia estuvo presente la mayor parte de las últimas dos semanas. Valor de puntuación WHO-5: 4.'
      all_of_the_time:
        title:
          en: All of the time
          fr: Tout le temps
          es: Todo el tiempo
        description:
          en: 'The feeling or experience was present throughout the last two weeks. WHO-5 scoring value: 5.'
          fr: 'Le sentiment ou l''expérience a été présent tout au long des deux dernières semaines. Valeur de notation WHO-5 : 5.'
          es: 'El sentimiento o experiencia estuvo presente durante toda las últimas dos semanas. Valor de puntuación WHO-5: 5.'
