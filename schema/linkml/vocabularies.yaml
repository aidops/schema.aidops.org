  FpDemandSatisfied:
    title:
      en: FP demand satisfied with modern methods - derived (3-level)
      fr: Demande PF satisfaite par des méthodes modernes - dérivée (3 niveaux)
      es: Demanda PF satisfecha con métodos modernos - derivada (3 niveles)
    description:
      en: Three-level derived indicator for SDG 3.7.1 - Proportion of women of reproductive age (15–49 years) who have their need for family planning satisfied with modern methods. 'Not in need' captures women excluded from the denominator (infecund, not sexually active, or wanting a birth within 2 years). Derived from fp_unmet_need classification and fp_method_is_modern.
      fr: Indicateur dérivé à trois niveaux pour l'ODD 3.7.1 - Proportion de femmes en âge de procréer (15–49 ans) dont le besoin en planification familiale est satisfait par des méthodes modernes. 'Not in need' capture les femmes exclues du dénominateur (infécondes, non sexuellement actives ou souhaitant une naissance dans les 2 ans). Dérivé de la classification fp_unmet_need et fp_method_is_modern.
      es: Indicador derivado de tres niveles para el ODS 3.7.1 - Proporción de mujeres en edad reproductiva (15–49 años) que tienen su necesidad de planificación familiar satisfecha con métodos modernos. 'Not in need' captura las mujeres excluidas del denominador (infecundas, no sexualmente activas o que desean un nacimiento en los próximos 2 años). Derivado de la clasificación fp_unmet_need y fp_method_is_modern.
    enum_uri: aidops:FpDemandSatisfied
    permissible_values:
      'yes':
        title:
          en: Yes - demand satisfied with modern method
          fr: Oui - demande satisfaite par une méthode moderne
          es: Sí - demanda satisfecha con método moderno
        description:
          en: The woman is in need of family planning and is using a modern contraceptive method.
          fr: La femme a besoin de planification familiale et utilise une méthode contraceptive moderne.
          es: La mujer tiene necesidad de planificación familiar y está usando un método anticonceptivo moderno.
      'no':
        title:
          en: No - demand not satisfied with modern method
          fr: Non - demande non satisfaite par une méthode moderne
          es: No - demanda no satisfecha con método moderno
        description:
          en: The woman is in need of family planning but is not using a modern contraceptive method (unmet need).
          fr: La femme a besoin de planification familiale mais n'utilise pas de méthode contraceptive moderne (besoin non satisfait).
          es: La mujer tiene necesidad de planificación familiar pero no está usando un método anticonceptivo moderno (necesidad insatisfecha).
      not_in_need:
        title:
          en: Not in need - excluded from SDG 3.7.1 denominator
          fr: Sans besoin - exclue du dénominateur ODD 3.7.1
          es: Sin necesidad - excluida del denominador ODS 3.7.1
        description:
          en: The woman is not in the family planning need group (infecund, not sexually active in last 4 weeks, or wants a birth within 2 years) and is excluded from the SDG 3.7.1 denominator.
          fr: La femme n'appartient pas au groupe ayant besoin de planification familiale (inféconde, non sexuellement active au cours des 4 dernières semaines ou souhaitant une naissance dans les 2 ans) et est exclue du dénominateur ODD 3.7.1.
          es: La mujer no pertenece al grupo con necesidad de planificación familiar (infecunda, no sexualmente activa en las últimas 4 semanas o que desea un nacimiento en los próximos 2 años) y está excluida del denominador ODS 3.7.1.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["dhs-unmet-need-as25", "sdg-3-7-1-metadata", "who-rh-indicators-2006"], "definition": {"en": "Three-level derived indicator for SDG 3.7.1 - Proportion of women of reproductive age (15\u201349 years) who have their need for family planning satisfied with modern methods. ''Not in need'' captures women excluded from the denominator (infecund, not sexually active, or wanting a birth within 2 years). Derived from fp_unmet_need classification and fp_method_is_modern.", "es": "Indicador derivado de tres niveles para el ODS 3.7.1 - Proporci\u00f3n de mujeres en edad reproductiva (15\u201349 a\u00f1os) que tienen su necesidad de planificaci\u00f3n familiar satisfecha con m\u00e9todos modernos. ''Not in need'' captura las mujeres excluidas del denominador (infecundas, no sexualmente activas o que desean un nacimiento en los pr\u00f3ximos 2 a\u00f1os). Derivado de la clasificaci\u00f3n fp_unmet_need y fp_method_is_modern.", "fr": "Indicateur d\u00e9riv\u00e9 \u00e0 trois niveaux pour l''ODD 3.7.1 - Proportion de femmes en \u00e2ge de procr\u00e9er (15\u201349 ans) dont le besoin en planification familiale est satisfait par des m\u00e9thodes modernes. ''Not in need'' capture les femmes exclues du d\u00e9nominateur (inf\u00e9condes, non sexuellement actives ou souhaitant une naissance dans les 2 ans). D\u00e9riv\u00e9 de la classification fp_unmet_need et fp_method_is_modern."}, "id": "fp-demand-satisfied", "label": {"en": "FP demand satisfied with modern methods - derived (3-level)", "es": "Demanda PF satisfecha con m\u00e9todos modernos - derivada (3 niveles)", "fr": "Demande PF satisfaite par des m\u00e9thodes modernes - d\u00e9riv\u00e9e (3 niveaux)"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "The woman is in need of family planning and is using a modern contraceptive method.", "es": "La mujer tiene necesidad de planificaci\u00f3n familiar y est\u00e1 usando un m\u00e9todo anticonceptivo moderno.", "fr": "La femme a besoin de planification familiale et utilise une m\u00e9thode contraceptive moderne."}, "label": {"en": "Yes - demand satisfied with modern method", "es": "S\u00ed - demanda satisfecha con m\u00e9todo moderno", "fr": "Oui - demande satisfaite par une m\u00e9thode moderne"}}, {"code": "no", "definition": {"en": "The woman is in need of family planning but is not using a modern contraceptive method (unmet need).", "es": "La mujer tiene necesidad de planificaci\u00f3n familiar pero no est\u00e1 usando un m\u00e9todo anticonceptivo moderno (necesidad insatisfecha).", "fr": "La femme a besoin de planification familiale mais n''utilise pas de m\u00e9thode contraceptive moderne (besoin non satisfait)."}, "label": {"en": "No - demand not satisfied with modern method", "es": "No - demanda no satisfecha con m\u00e9todo moderno", "fr": "Non - demande non satisfaite par une m\u00e9thode moderne"}}, {"code": "not_in_need", "definition": {"en": "The woman is not in the family planning need group (infecund, not sexually active in last 4 weeks, or wants a birth within 2 years) and is excluded from the SDG 3.7.1 denominator.", "es": "La mujer no pertenece al grupo con necesidad de planificaci\u00f3n familiar (infecunda, no sexualmente activa en las \u00faltimas 4 semanas o que desea un nacimiento en los pr\u00f3ximos 2 a\u00f1os) y est\u00e1 excluida del denominador ODS 3.7.1.", "fr": "La femme n''appartient pas au groupe ayant besoin de planification familiale (inf\u00e9conde, non sexuellement active au cours des 4 derni\u00e8res semaines ou souhaitant une naissance dans les 2 ans) et est exclue du d\u00e9nominateur ODD 3.7.1."}, "label": {"en": "Not in need - excluded from SDG 3.7.1 denominator", "es": "Sin necesidad - excluida del denominador ODS 3.7.1", "fr": "Sans besoin - exclue du d\u00e9nominateur ODD 3.7.1"}}]}'
