  LcsFrequency:
    title:
      en: LCS Adoption Frequency
      fr: Fréquence d'adoption LCS
      es: Frecuencia de adopción LCS
    description:
      en: Four-tier frequency response scale used by the WFP Livelihood Coping Strategies module to ask whether, and how often, a household has adopted each strategy in the past 30 days. Under CARI, a household is considered to have adopted a strategy if the response is anything other than 'never'.
      fr: Échelle de réponse de fréquence à quatre niveaux utilisée par le module Livelihood Coping Strategies du PAM pour demander si et à quelle fréquence un ménage a adopté chaque stratégie au cours des trente derniers jours. Sous CARI, un ménage est considéré comme ayant adopté une stratégie si la réponse est autre que « jamais ».
      es: Escala de respuesta de frecuencia de cuatro niveles utilizada por el módulo Livelihood Coping Strategies del PMA para preguntar si un hogar ha adoptado cada estrategia en los últimos treinta días y con qué frecuencia. Bajo CARI, un hogar se considera que ha adoptado una estrategia si la respuesta es cualquier cosa distinta de «nunca».
    enum_uri: aidops:LcsFrequency
    permissible_values:
      never:
        title:
          en: Never
          fr: Jamais
          es: Nunca
        description:
          en: The household did not adopt this strategy in the past 30 days because it did not need to.
          fr: Le ménage n'a pas adopté cette stratégie au cours des trente derniers jours parce qu'il n'en avait pas besoin.
          es: El hogar no adoptó esta estrategia en los últimos treinta días porque no fue necesario.
      no_longer_can:
        title:
          en: No longer applicable (already exhausted)
          fr: Plus applicable (déjà épuisée)
          es: Ya no aplica (agotada)
        description:
          en: The household adopted this strategy in the past but has exhausted it, so it is no longer available as a coping option. Under CARI, this is treated as adoption for tier purposes.
          fr: Le ménage a adopté cette stratégie par le passé mais l'a épuisée, de sorte qu'elle n'est plus disponible comme option d'adaptation. Sous CARI, cela est traité comme une adoption pour les niveaux.
          es: El hogar adoptó esta estrategia en el pasado pero la ha agotado, por lo que ya no está disponible como opción de afrontamiento. Bajo CARI, se trata como adopción para los niveles.
      yes_adopted:
        title:
          en: Yes, adopted in the past 30 days
          fr: Oui, adoptée au cours des trente derniers jours
          es: Sí, adoptada en los últimos treinta días
        description:
          en: The household adopted this strategy at least once in the past 30 days.
          fr: Le ménage a adopté cette stratégie au moins une fois au cours des trente derniers jours.
          es: El hogar adoptó esta estrategia al menos una vez en los últimos treinta días.
      not_applicable:
        title:
          en: Not applicable to the household
          fr: Non applicable au ménage
          es: No aplica al hogar
        description:
          en: The strategy is not applicable to this household (for example, the household has no children to withdraw from school, no land to sell). Under CARI, treated as not adopted.
          fr: La stratégie n'est pas applicable à ce ménage (par exemple, le ménage n'a pas d'enfants à retirer de l'école, pas de terre à vendre). Sous CARI, traité comme non adopté.
          es: La estrategia no es aplicable a este hogar (por ejemplo, el hogar no tiene niños que retirar de la escuela, no tiene tierra que vender). Bajo CARI, se trata como no adoptada.
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["wfp-lcs"], "definition": {"en": "Four-tier frequency response scale used by the WFP Livelihood Coping Strategies module to ask whether, and how often, a household has adopted each strategy in the past 30 days. Under CARI, a household is considered to have adopted a strategy if the response is anything other than ''never''.", "es": "Escala de respuesta de frecuencia de cuatro niveles utilizada por el m\u00f3dulo Livelihood Coping Strategies del PMA para preguntar si un hogar ha adoptado cada estrategia en los \u00faltimos treinta d\u00edas y con qu\u00e9 frecuencia. Bajo CARI, un hogar se considera que ha adoptado una estrategia si la respuesta es cualquier cosa distinta de \u00abnunca\u00bb.", "fr": "\u00c9chelle de r\u00e9ponse de fr\u00e9quence \u00e0 quatre niveaux utilis\u00e9e par le module Livelihood Coping Strategies du PAM pour demander si et \u00e0 quelle fr\u00e9quence un m\u00e9nage a adopt\u00e9 chaque strat\u00e9gie au cours des trente derniers jours. Sous CARI, un m\u00e9nage est consid\u00e9r\u00e9 comme ayant adopt\u00e9 une strat\u00e9gie si la r\u00e9ponse est autre que \u00ab jamais \u00bb."}, "id": "lcs-frequency", "label": {"en": "LCS Adoption Frequency", "es": "Frecuencia de adopci\u00f3n LCS", "fr": "Fr\u00e9quence d''adoption LCS"}, "maturity": "draft", "standard": {"name": "WFP CARI Guidelines (3rd edition, 2021)", "uri": "https://docs.wfp.org/api/documents/WFP-0000134704/download/"}, "values": [{"code": "never", "definition": {"en": "The household did not adopt this strategy in the past 30 days because it did not need to.", "es": "El hogar no adopt\u00f3 esta estrategia en los \u00faltimos treinta d\u00edas porque no fue necesario.", "fr": "Le m\u00e9nage n''a pas adopt\u00e9 cette strat\u00e9gie au cours des trente derniers jours parce qu''il n''en avait pas besoin."}, "label": {"en": "Never", "es": "Nunca", "fr": "Jamais"}}, {"code": "no_longer_can", "definition": {"en": "The household adopted this strategy in the past but has exhausted it, so it is no longer available as a coping option. Under CARI, this is treated as adoption for tier purposes.", "es": "El hogar adopt\u00f3 esta estrategia en el pasado pero la ha agotado, por lo que ya no est\u00e1 disponible como opci\u00f3n de afrontamiento. Bajo CARI, se trata como adopci\u00f3n para los niveles.", "fr": "Le m\u00e9nage a adopt\u00e9 cette strat\u00e9gie par le pass\u00e9 mais l''a \u00e9puis\u00e9e, de sorte qu''elle n''est plus disponible comme option d''adaptation. Sous CARI, cela est trait\u00e9 comme une adoption pour les niveaux."}, "label": {"en": "No longer applicable (already exhausted)", "es": "Ya no aplica (agotada)", "fr": "Plus applicable (d\u00e9j\u00e0 \u00e9puis\u00e9e)"}}, {"code": "yes_adopted", "definition": {"en": "The household adopted this strategy at least once in the past 30 days.", "es": "El hogar adopt\u00f3 esta estrategia al menos una vez en los \u00faltimos treinta d\u00edas.", "fr": "Le m\u00e9nage a adopt\u00e9 cette strat\u00e9gie au moins une fois au cours des trente derniers jours."}, "label": {"en": "Yes, adopted in the past 30 days", "es": "S\u00ed, adoptada en los \u00faltimos treinta d\u00edas", "fr": "Oui, adopt\u00e9e au cours des trente derniers jours"}}, {"code": "not_applicable", "definition": {"en": "The strategy is not applicable to this household (for example, the household has no children to withdraw from school, no land to sell). Under CARI, treated as not adopted.", "es": "La estrategia no es aplicable a este hogar (por ejemplo, el hogar no tiene ni\u00f1os que retirar de la escuela, no tiene tierra que vender). Bajo CARI, se trata como no adoptada.", "fr": "La strat\u00e9gie n''est pas applicable \u00e0 ce m\u00e9nage (par exemple, le m\u00e9nage n''a pas d''enfants \u00e0 retirer de l''\u00e9cole, pas de terre \u00e0 vendre). Sous CARI, trait\u00e9 comme non adopt\u00e9."}, "label": {"en": "Not applicable to the household", "es": "No aplica al hogar", "fr": "Non applicable au m\u00e9nage"}}]}'
