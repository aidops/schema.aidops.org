  MhmMaterialsAccess:
    title:
      en: MHM — menstrual materials access type (5-level)
      fr: GHM — type d'accès aux matériaux menstruels (5 niveaux)
      es: MHM — tipo de acceso a materiales menstruales (5 niveles)
    description:
      en: Five-level scale for assessing access to and type of menstrual hygiene materials during the last menstrual period. Distinguishes between disposable materials (commercial pads, tampons), reusable materials (cloth pads, menstrual cup), both types, no access, and respondents who do not currently menstruate. Based on MICS MHM module and MICS Belize pilot indicator UN15.
      fr: Échelle à cinq niveaux pour évaluer l'accès aux matériaux d'hygiène menstruelle et leur type pendant les dernières règles. Distingue les matériaux jetables (serviettes commerciales, tampons), les matériaux réutilisables (serviettes en tissu, coupe menstruelle), les deux types, l'absence d'accès et les répondantes qui ne menstruent pas actuellement. Basée sur le module MHM MICS et l'indicateur pilote MICS Belize UN15.
      es: Escala de cinco niveles para evaluar el acceso a materiales de higiene menstrual y su tipo durante el último período menstrual. Distingue entre materiales desechables (compresas comerciales, tampones), materiales reutilizables (compresas de tela, copa menstrual), ambos tipos, sin acceso y encuestadas que no menstrúan actualmente. Basada en el módulo MHM de MICS y el indicador piloto MICS Belice UN15.
    enum_uri: aidops:MhmMaterialsAccess
    permissible_values:
      yes_disposable:
        title:
          en: Yes — had disposable materials (pads, tampons)
          fr: Oui — avait des matériaux jetables (serviettes, tampons)
          es: Sí — tenía materiales desechables (compresas, tampones)
        description:
          en: The respondent had access to disposable menstrual materials (commercial pads or tampons) during her last menstrual period.
          fr: La répondante avait accès à des matériaux menstruels jetables (serviettes hygiéniques commerciales ou tampons) pendant ses dernières règles.
          es: La encuestada tuvo acceso a materiales menstruales desechables (compresas comerciales o tampones) durante su último período menstrual.
      yes_reusable:
        title:
          en: Yes — had reusable materials (cloth pads, menstrual cup)
          fr: Oui — avait des matériaux réutilisables (serviettes en tissu, coupe menstruelle)
          es: Sí — tenía materiales reutilizables (compresas de tela, copa menstrual)
        description:
          en: The respondent had access to reusable menstrual materials (cloth pads or menstrual cup) during her last menstrual period.
          fr: La répondante avait accès à des matériaux menstruels réutilisables (serviettes en tissu ou coupe menstruelle) pendant ses dernières règles.
          es: La encuestada tuvo acceso a materiales menstruales reutilizables (compresas de tela o copa menstrual) durante su último período menstrual.
      yes_both:
        title:
          en: Yes — had both disposable and reusable materials
          fr: Oui — avait des matériaux jetables et réutilisables
          es: Sí — tenía materiales desechables y reutilizables
        description:
          en: The respondent had access to both disposable and reusable menstrual materials during her last menstrual period.
          fr: La répondante avait accès à la fois à des matériaux menstruels jetables et réutilisables pendant ses dernières règles.
          es: La encuestada tuvo acceso tanto a materiales menstruales desechables como reutilizables durante su último período menstrual.
      no_access:
        title:
          en: No — had no access to materials
          fr: Non — n'avait pas accès aux matériaux
          es: No — no tenía acceso a materiales
        description:
          en: The respondent had no access to any menstrual hygiene materials during her last menstrual period.
          fr: La répondante n'avait accès à aucun matériau d'hygiène menstruelle pendant ses dernières règles.
          es: La encuestada no tuvo acceso a ningún material de higiene menstrual durante su último período menstrual.
      does_not_menstruate:
        title:
          en: Does not currently menstruate
          fr: Ne menstruate pas actuellement
          es: No menstrúa actualmente
        description:
          en: The respondent does not currently menstruate (e.g., menopausal, pregnant, breastfeeding with amenorrhea, or other medical reason).
          fr: La répondante ne menstruate pas actuellement (p. ex., ménopausée, enceinte, allaitante avec aménorrhée ou autre raison médicale).
          es: La encuestada no menstrúa actualmente (p. ej., menopáusica, embarazada, lactante con amenorrea u otra razón médica).
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["jmp-core"], "definition": {"en": "Five-level scale for assessing access to and type of menstrual hygiene materials during the last menstrual period. Distinguishes between disposable materials (commercial pads, tampons), reusable materials (cloth pads, menstrual cup), both types, no access, and respondents who do not currently menstruate. Based on MICS MHM module and MICS Belize pilot indicator UN15.", "es": "Escala de cinco niveles para evaluar el acceso a materiales de higiene menstrual y su tipo durante el \u00faltimo per\u00edodo menstrual. Distingue entre materiales desechables (compresas comerciales, tampones), materiales reutilizables (compresas de tela, copa menstrual), ambos tipos, sin acceso y encuestadas que no menstr\u00faan actualmente. Basada en el m\u00f3dulo MHM de MICS y el indicador piloto MICS Belice UN15.", "fr": "\u00c9chelle \u00e0 cinq niveaux pour \u00e9valuer l''acc\u00e8s aux mat\u00e9riaux d''hygi\u00e8ne menstruelle et leur type pendant les derni\u00e8res r\u00e8gles. Distingue les mat\u00e9riaux jetables (serviettes commerciales, tampons), les mat\u00e9riaux r\u00e9utilisables (serviettes en tissu, coupe menstruelle), les deux types, l''absence d''acc\u00e8s et les r\u00e9pondantes qui ne menstruent pas actuellement. Bas\u00e9e sur le module MHM MICS et l''indicateur pilote MICS Belize UN15."}, "id": "mhm-materials-access", "label": {"en": "MHM \u2014 menstrual materials access type (5-level)", "es": "MHM \u2014 tipo de acceso a materiales menstruales (5 niveles)", "fr": "GHM \u2014 type d''acc\u00e8s aux mat\u00e9riaux menstruels (5 niveaux)"}, "maturity": "draft", "values": [{"code": "yes_disposable", "definition": {"en": "The respondent had access to disposable menstrual materials (commercial pads or tampons) during her last menstrual period.", "es": "La encuestada tuvo acceso a materiales menstruales desechables (compresas comerciales o tampones) durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante avait acc\u00e8s \u00e0 des mat\u00e9riaux menstruels jetables (serviettes hygi\u00e9niques commerciales ou tampons) pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "Yes \u2014 had disposable materials (pads, tampons)", "es": "S\u00ed \u2014 ten\u00eda materiales desechables (compresas, tampones)", "fr": "Oui \u2014 avait des mat\u00e9riaux jetables (serviettes, tampons)"}}, {"code": "yes_reusable", "definition": {"en": "The respondent had access to reusable menstrual materials (cloth pads or menstrual cup) during her last menstrual period.", "es": "La encuestada tuvo acceso a materiales menstruales reutilizables (compresas de tela o copa menstrual) durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante avait acc\u00e8s \u00e0 des mat\u00e9riaux menstruels r\u00e9utilisables (serviettes en tissu ou coupe menstruelle) pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "Yes \u2014 had reusable materials (cloth pads, menstrual cup)", "es": "S\u00ed \u2014 ten\u00eda materiales reutilizables (compresas de tela, copa menstrual)", "fr": "Oui \u2014 avait des mat\u00e9riaux r\u00e9utilisables (serviettes en tissu, coupe menstruelle)"}}, {"code": "yes_both", "definition": {"en": "The respondent had access to both disposable and reusable menstrual materials during her last menstrual period.", "es": "La encuestada tuvo acceso tanto a materiales menstruales desechables como reutilizables durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante avait acc\u00e8s \u00e0 la fois \u00e0 des mat\u00e9riaux menstruels jetables et r\u00e9utilisables pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "Yes \u2014 had both disposable and reusable materials", "es": "S\u00ed \u2014 ten\u00eda materiales desechables y reutilizables", "fr": "Oui \u2014 avait des mat\u00e9riaux jetables et r\u00e9utilisables"}}, {"code": "no_access", "definition": {"en": "The respondent had no access to any menstrual hygiene materials during her last menstrual period.", "es": "La encuestada no tuvo acceso a ning\u00fan material de higiene menstrual durante su \u00faltimo per\u00edodo menstrual.", "fr": "La r\u00e9pondante n''avait acc\u00e8s \u00e0 aucun mat\u00e9riau d''hygi\u00e8ne menstruelle pendant ses derni\u00e8res r\u00e8gles."}, "label": {"en": "No \u2014 had no access to materials", "es": "No \u2014 no ten\u00eda acceso a materiales", "fr": "Non \u2014 n''avait pas acc\u00e8s aux mat\u00e9riaux"}}, {"code": "does_not_menstruate", "definition": {"en": "The respondent does not currently menstruate (e.g., menopausal, pregnant, breastfeeding with amenorrhea, or other medical reason).", "es": "La encuestada no menstr\u00faa actualmente (p. ej., menop\u00e1usica, embarazada, lactante con amenorrea u otra raz\u00f3n m\u00e9dica).", "fr": "La r\u00e9pondante ne menstruate pas actuellement (p. ex., m\u00e9nopaus\u00e9e, enceinte, allaitante avec am\u00e9norrh\u00e9e ou autre raison m\u00e9dicale)."}, "label": {"en": "Does not currently menstruate", "es": "No menstr\u00faa actualmente", "fr": "Ne menstruate pas actuellement"}}]}'
