      publicschema_logical_document_json: '{"bibliography_refs": ["gts-hvi", "iasc-reach-aap-menu-2018"], "definition": {"en": "Four-level scale for the respondent''s perception of whether aid arrived when it was needed. Source: IASC / REACH Menu of AAP Questions 2018 and GTS HVI timeliness indicator. This measures the respondent''s subjective experience; the objective measure (actual days between request/eligibility and delivery) belongs to operational M&E data rather than to this profile.", "es": "Escala de cuatro niveles para la percepci\u00f3n del encuestado sobre si la ayuda lleg\u00f3 cuando se necesitaba. Fuente: Men\u00fa de Preguntas AAP IASC / REACH 2018 e indicador de oportunidad de GTS HVI. Esto mide la experiencia subjetiva del encuestado; la medida objetiva (d\u00edas reales entre la solicitud/elegibilidad y la entrega) pertenece a los datos operativos de seguimiento y evaluaci\u00f3n en lugar de a este perfil.", "fr": "\u00c9chelle \u00e0 quatre niveaux pour la perception du r\u00e9pondant sur le fait que l''aide soit arriv\u00e9e au moment o\u00f9 elle \u00e9tait n\u00e9cessaire. Source : Menu de questions AAP IASC / REACH 2018 et indicateur de rapidit\u00e9 GTS HVI. Ceci mesure l''exp\u00e9rience subjective du r\u00e9pondant ; la mesure objective (jours r\u00e9els entre la demande/admissibilit\u00e9 et la livraison) appartient aux donn\u00e9es op\u00e9rationnelles de suivi-\u00e9valuation plut\u00f4t qu''\u00e0 ce profil."}, "id": "aap-timeliness-4", "label": {"en": "AAP: Aid timeliness (4 levels)", "es": "Rendici\u00f3n de cuentas: Oportunidad de la ayuda (4 niveles)", "fr": "Redevabilit\u00e9 : Opportunit\u00e9 de l''aide (4 niveaux)"}, "maturity": "draft", "standard": {"name": "IASC / REACH Menu of AAP Questions for Needs Assessments 2018", "notes": "Timeliness 4-level scale as used in IASC / REACH menu and GTS HVI.", "uri": "https://interagencystandingcommittee.org/sites/default/files/migrated/2018-06/reach_iasc_aap_psea_task_team_menu_of_aap_qu