  HazardousWorkType:
    title:
      en: Hazardous Work Type
      fr: Type de travail dangereux
      es: Tipo de trabajo peligroso
    description:
      en: Enumeration of hazard exposure types in MICS 6 CL6 A–X response options, used in the hazardous-work branch of the ILO/UNICEF 2020 child-labour definition. A child is considered exposed to hazardous work if any one of these conditions applies during economic activity in the past week. Reusable for adult occupational-safety analyses in a future decent-work profile.
      fr: Énumération des types d'exposition aux dangers dans les options de réponse MICS 6 CL6 A–X, utilisée dans la branche travail dangereux de la définition OIT/UNICEF 2020 du travail des enfants. Un enfant est considéré exposé à un travail dangereux si l'une de ces conditions s'applique pendant l'activité économique de la semaine écoulée. Réutilisable pour des analyses de santé et sécurité au travail adultes dans un futur profil travail décent.
      es: Enumeración de los tipos de exposición a peligros en las opciones de respuesta MICS 6 CL6 A–X, usada en la rama de trabajo peligroso de la definición OIT/UNICEF 2020 de trabajo infantil. Un niño se considera expuesto a trabajo peligroso si se aplica alguna de estas condiciones durante actividad económica en la semana pasada. Reutilizable para análisis de salud y seguridad ocupacional en adultos en un futuro perfil de trabajo decente.
    enum_uri: aidops:HazardousWorkType
    permissible_values:
      dust_fumes_gas:
        title:
          en: Dust, fumes, or gas
          fr: Poussière, fumées ou gaz
          es: Polvo, humos o gas
        description:
          en: Exposure to dust, fumes, or gas. MICS 6 CL6 A.
          fr: Exposition à la poussière, aux fumées ou au gaz. MICS 6 CL6 A.
          es: Exposición a polvo, humos o gas. MICS 6 CL6 A.
      extreme_temperature_humidity:
        title:
          en: Extreme cold, heat, or humidity
          fr: Froid, chaleur ou humidité extrêmes
          es: Frío, calor o humedad extremos
        description:
          en: Exposure to extreme cold, heat, or humidity. MICS 6 CL6 B.
          fr: Exposition au froid, à la chaleur ou à l'humidité extrêmes. MICS 6 CL6 B.
          es: Exposición a frío, calor o humedad extremos. MICS 6 CL6 B.
      noise_vibration:
        title:
          en: Loud noise or vibration
          fr: Bruit fort ou vibration
          es: Ruido fuerte o vibración
        description:
          en: Exposure to loud noise or vibration. MICS 6 CL6 C.
          fr: Exposition à un bruit fort ou à une vibration. MICS 6 CL6 C.
          es: Exposición a ruido fuerte o vibración. MICS 6 CL6 C.
      work_at_heights:
        title:
          en: Work at heights
          fr: Travail en hauteur
          es: Trabajo en altura
        description:
          en: Work at heights. MICS 6 CL6 D.
          fr: Travail en hauteur. MICS 6 CL6 D.
          es: Trabajo en altura. MICS 6 CL6 D.
      chemicals_pesticides_explosives:
        title:
          en: Chemicals, pesticides, or explosives
          fr: Produits chimiques, pesticides ou explosifs
          es: Productos químicos, pesticidas o explosivos
        description:
          en: Work with chemicals (pesticides, glues, etc.) or explosives. MICS 6 CL6 E.
          fr: Travail avec des produits chimiques (pesticides, colles, etc.) ou des explosifs. MICS 6 CL6 E.
          es: Trabajo con productos químicos (pesticidas, pegamentos, etc.) o explosivos. MICS 6 CL6 E.
      other_unsafe_condition:
        title:
          en: Other unsafe condition
          fr: Autre condition non sécuritaire
          es: Otra condición insegura
        description:
          en: Other things, processes, or conditions bad for health or safety. MICS 6 CL6 X (catch-all).
          fr: Autres choses, processus ou conditions mauvais pour la santé ou la sécurité. MICS 6 CL6 X (catégorie résiduelle).
          es: Otras cosas, procesos o condiciones malos para la salud o seguridad. MICS 6 CL6 X (categoría residual).
    annotations:
      publicschema_logical_document_json: '{"bibliography_refs": ["ilo-unicef-child-labour-estimates-2020", "mics6-child-protection"], "definition": {"en": "Enumeration of hazard exposure types in MICS 6 CL6 A\u2013X response options, used in the hazardous-work branch of the ILO/UNICEF 2020 child-labour definition. A child is considered exposed to hazardous work if any one of these conditions applies during economic activity in the past week. Reusable for adult occupational-safety analyses in a future decent-work profile.", "es": "Enumeraci\u00f3n de los tipos de exposici\u00f3n a peligros en las opciones de respuesta MICS 6 CL6 A\u2013X, usada en la rama de trabajo peligroso de la definici\u00f3n OIT/UNICEF 2020 de trabajo infantil. Un ni\u00f1o se considera expuesto a trabajo peligroso si se aplica alguna de estas condiciones durante actividad econ\u00f3mica en la semana pasada. Reutilizable para an\u00e1lisis de salud y seguridad ocupacional en adultos en un futuro perfil de trabajo decente.", "fr": "\u00c9num\u00e9ration des types d''exposition aux dangers dans les options de r\u00e9ponse MICS 6 CL6 A\u2013X, utilis\u00e9e dans la branche travail dangereux de la d\u00e9finition OIT/UNICEF 2020 du travail des enfants. Un enfant est consid\u00e9r\u00e9 expos\u00e9 \u00e0 un travail dangereux si l''une de ces conditions s''applique pendant l''activit\u00e9 \u00e9conomique de la semaine \u00e9coul\u00e9e. R\u00e9utilisable pour des analyses de sant\u00e9 et s\u00e9curit\u00e9 au travail adultes dans un futur profil travail d\u00e9cent."}, "id": "hazardous-work-type", "label": {"en": "Hazardous Work Type", "es": "Tipo de trabajo peligroso", "fr": "Type de travail dangereux"}, "maturity": "draft", "values": [{"code": "dust_fumes_gas", "definition": {"en": "Exposure to dust, fumes, or gas. MICS 6 CL6 A.", "es": "Exposici\u00f3n a polvo, humos o gas. MICS 6 CL6 A.", "fr": "Exposition \u00e0 la poussi\u00e8re, aux fum\u00e9es ou au gaz. MICS 6 CL6 A."}, "label": {"en": "Dust, fumes, or gas", "es": "Polvo, humos o gas", "fr": "Poussi\u00e8re, fum\u00e9es ou gaz"}}, {"code": "extreme_temperature_humidity", "definition": {"en": "Exposure to extreme cold, heat, or humidity. MICS 6 CL6 B.", "es": "Exposici\u00f3n a fr\u00edo, calor o humedad extremos. MICS 6 CL6 B.", "fr": "Exposition au froid, \u00e0 la chaleur ou \u00e0 l''humidit\u00e9 extr\u00eames. MICS 6 CL6 B."}, "label": {"en": "Extreme cold, heat, or humidity", "es": "Fr\u00edo, calor o humedad extremos", "fr": "Froid, chaleur ou humidit\u00e9 extr\u00eames"}}, {"code": "noise_vibration", "definition": {"en": "Exposure to loud noise or vibration. MICS 6 CL6 C.", "es": "Exposici\u00f3n a ruido fuerte o vibraci\u00f3n. MICS 6 CL6 C.", "fr": "Exposition \u00e0 un bruit fort ou \u00e0 une vibration. MICS 6 CL6 C."}, "label": {"en": "Loud noise or vibration", "es": "Ruido fuerte o vibraci\u00f3n", "fr": "Bruit fort ou vibration"}}, {"code": "work_at_heights", "definition": {"en": "Work at heights. MICS 6 CL6 D.", "es": "Trabajo en altura. MICS 6 CL6 D.", "fr": "Travail en hauteur. MICS 6 CL6 D."}, "label": {"en": "Work at heights", "es": "Trabajo en altura", "fr": "Travail en hauteur"}}, {"code": "chemicals_pesticides_explosives", "definition": {"en": "Work with chemicals (pesticides, glues, etc.) or explosives. MICS 6 CL6 E.", "es": "Trabajo con productos qu\u00edmicos (pesticidas, pegamentos, etc.) o explosivos. MICS 6 CL6 E.", "fr": "Travail avec des produits chimiques (pesticides, colles, etc.) ou des explosifs. MICS 6 CL6 E."}, "label": {"en": "Chemicals, pesticides, or explosives", "es": "Productos qu\u00edmicos, pesticidas o explosivos", "fr": "Produits chimiques, pesticides ou explosifs"}}, {"code": "other_unsafe_condition", "definition": {"en": "Other things, processes, or conditions bad for health or safety. MICS 6 CL6 X (catch-all).", "es": "Otras cosas, procesos o condiciones malos para la salud o seguridad. MICS 6 CL6 X (categor\u00eda residual).", "fr": "Autres choses, processus ou conditions mauvais pour la sant\u00e9 ou la s\u00e9curit\u00e9. MICS 6 CL6 X (cat\u00e9gorie r\u00e9siduelle)."}, "label": {"en": "Other unsafe condition", "es": "Otra condici\u00f3n insegura", "fr": "Autre condition non s\u00e9curitaire"}}]}'
