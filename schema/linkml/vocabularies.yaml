      publicschema_logical_document_json: '{"bibliography_refs": ["sphere-2018"], "definition": {"en": "Three-level adequacy scale used for shelter and environmental condition assessments where ''partial'' captures situations that meet standards in some respects but not all. Used across Sphere Standard 2, 3, and 7 adequacy indicators.", "es": "Escala de adecuaci\u00f3n de tres niveles utilizada para evaluaciones de condiciones de refugio y ambientales donde ''parcial'' captura situaciones que cumplen los est\u00e1ndares en algunos aspectos pero no en todos. Utilizada en los indicadores de adecuaci\u00f3n de las Normas Esfera 2, 3 y 7.", "fr": "\u00c9chelle d''ad\u00e9quation \u00e0 trois niveaux utilis\u00e9e pour les \u00e9valuations des conditions de l''abri et de l''environnement, o\u00f9 ''partiel'' capture les situations qui r\u00e9pondent aux normes sous certains aspects mais pas tous. Utilis\u00e9e pour les indicateurs d''ad\u00e9quation des Normes Sph\u00e8re 2, 3 et 7."}, "id": "yes-no-partial", "label": {"en": "Yes / No / Partial adequacy scale", "es": "Escala de adecuaci\u00f3n S\u00ed / No / Parcial", "fr": "\u00c9chelle d''ad\u00e9quation Oui / Non / Partiel"}, "maturity": "draft", "values": [{"code": "yes", "definition": {"en": "The condition is fully adequate.", "es": "La condici\u00f3n es plenamente adecuada.", "fr": "La condition est pleinement ad\u00e9quate."}, "label": {"en": "Yes", "es": "S\u00ed", "fr": "Oui"}}, {"code": "partial", "definition": {"en": "The condition partially meets adequacy standards \u2014 some dimensions are acceptable but at least one falls below the minimum.", "es": "La condici\u00f3n cumple parcialmente con los est\u00e1ndares de adecuaci\u00f3n \u2014 algunas dimensiones son aceptables pero al menos una est\u00e1 por debajo del m\u00ednimo.", "fr": "La condition r\u00e9pond partiellement aux normes d''ad\u00e9quation \u2014 certaines dimensions sont acceptables mais au moins une est en dessous du minimum."}, "label": {"en": "Partial \u2014 adequate in some respects but not all", "es": "Parcial \u2014 adecuado en algunos aspectos pero no en todos", "fr": "Partiel \u2014 ad\u00e9quat \u00e0 certains \u00e9gards mais pas \u00e0 tous"}}, {"code": "no", "definition": {"en": "The condition does not meet adequacy standards.", "es": "La condici\u00f3n no cumple con los est\u00e1ndares de adecuaci\u00f3n.", "fr": "La condition ne r\u00e9pond pas aux normes d''ad\u00e9quation."}, "label": {"en": "No", "es": "No", "fr": "Non"}}]}'
      bibliography_refs: sphere-2018
  YesNoPnta:
    title:
      en: Yes / No / Prefer not to answer
      fr: Oui / Non / Préfère ne pas répondre
      es: Sí / No / Prefiere no responder
    description:
      en: Three-level response scale for sensitive health questions where respondents may decline to answer. Used for HIV testing history and STI symptom and care-seeking questions. The 'prefer not to answer' option is essential for sensitive topics to avoid forced disclosure and reduce item non-response from refusal-to-end-interview.
      fr: Échelle de réponse à trois niveaux pour les questions de santé sensibles où les répondants peuvent refuser de répondre. Utilisée pour les questions sur l'historique des tests VIH et les symptômes des IST et la recherche de soins. L'option 'préfère ne pas répondre' est essentielle pour les sujets sensibles afin d'éviter la divulgation forcée et réduire la non-réponse aux items par refus d'arrêter l'entretien.
      es: Escala de respuesta de tres niveles para preguntas de salud sensibles donde los encuestados pueden negarse a responder. Utilizada para preguntas sobre historial de pruebas de VIH y síntomas de ITS y búsqueda de atención. La opción 'prefiere no responder' es esencial para temas sensibles para evitar la divulgación forzada y reducir la no respuesta a ítems por negativa a terminar la entrevista.
    enum_uri: aidops:YesNoPnta
    permissible_values:
      'yes':
        title:
          en: 'Yes'
          fr: Oui
          es: Sí
        description:
          en: The respondent confirms the event or condition occurred.
          fr: Le répondant confirme que l'événement ou la condition s'est produit.
          es: El encuestado confirma que el evento o condición ocurrió.
      'no':
        title:
          en: 'No'
          fr: Non
          es: 'No'
        description:
          en: The respondent confirms the event or condition did not occur.
          fr: Le répondant confirme que l'événement ou la condition ne s'est pas produit.
          es: El encuestado confirma que el evento o condición no ocurrió.
      prefer_not_to_answer:
        title:
          en: Prefer not to answer
          fr: Préfère ne pas répondre
          es: Prefiere no responder
        description:
          en: The respondent declines to provide an answer for this item. This is a valid response and must not be re-coded as missing.
          fr: Le répondant refuse de fournir une réponse pour cet item. Il s'agit d'une réponse valide qui ne doit pas être recodée comme manquante.
          es: El encuestado se niega a proporcionar una respuesta para este ítem. Esta es una respuesta válida y no debe recodificarse como faltante.
