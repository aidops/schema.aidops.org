id: post_harvest_storage_type
maturity: draft
label:
  en: "Type(s) of post-harvest storage used by the household"
  fr: "Type(s) de stockage post-récolte utilisé(s) par le ménage"
  es: "Tipo(s) de almacenamiento poscosecha utilizado(s) por el hogar"

definition:
  en: "Type or types of post-harvest storage used by the household during the last completed agricultural season. Multi-select from vocabulary `post-harvest-storage-type` (traditional_granary, metal_silo, plastic_drum_container, hermetic_bag, ordinary_bag_no_treatment, community_warehouse, other) because a household may combine several methods (e.g., hermetic bags for maize and ordinary bags for beans). Drawn from the FAO Post-Harvest Losses guidelines and the LSMS-ISA post-harvest module. Asked only when `post_harvest_storage_access` is `yes`."
  fr: "Type ou types de stockage post-récolte utilisé(s) par le ménage au cours de la dernière saison agricole complète. Sélection multiple dans le vocabulaire `post-harvest-storage-type` (traditional_granary, metal_silo, plastic_drum_container, hermetic_bag, ordinary_bag_no_treatment, community_warehouse, other) car un ménage peut combiner plusieurs méthodes (par exemple, sacs hermétiques pour le maïs et sacs ordinaires pour les haricots). Tiré des directives Pertes Post-Récolte de la FAO et du module post-récolte du LSMS-ISA. Posée uniquement lorsque `post_harvest_storage_access` est `yes`."
  es: "Tipo o tipos de almacenamiento poscosecha utilizados por el hogar durante la última temporada agrícola completa. Selección múltiple del vocabulario `post-harvest-storage-type` (traditional_granary, metal_silo, plastic_drum_container, hermetic_bag, ordinary_bag_no_treatment, community_warehouse, other) porque un hogar puede combinar varios métodos (por ejemplo, sacos herméticos para el maíz y sacos ordinarios para los frijoles). Tomado de las directrices de Pérdidas Poscosecha de la FAO y del módulo poscosecha de LSMS-ISA. Se pregunta solo cuando `post_harvest_storage_access` es `yes`."

type: string
cardinality: multiple
core: false
vocabulary: post-harvest-storage-type
references: null
category: context
sensitivity: sensitive
