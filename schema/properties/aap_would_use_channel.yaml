label:
  en: "AAP: Would use complaint channel (derived)"
  fr: "Redevabilité : Utiliserait un canal de plainte (dérivé)"
  es: "Rendición de cuentas: Usaría un canal de quejas (derivado)"
definition:
  en: "Derived household-level boolean: true if `aap_complaint_channel_known = yes` AND `aap_complaint_would_use IN (very_likely, somewhat_likely)`. GTS HVI 'meaningful access' indicator — combines channel awareness with stated willingness to use the channel."
  fr: "Booléen dérivé au niveau ménage : vrai si `aap_complaint_channel_known = yes` ET `aap_complaint_would_use IN (very_likely, somewhat_likely)`. Indicateur d'« accès significatif » de GTS HVI — combine la connaissance du canal avec la volonté déclarée de l'utiliser."
  es: "Booleano derivado a nivel de hogar: verdadero si `aap_complaint_channel_known = yes` Y `aap_complaint_would_use IN (very_likely, somewhat_likely)`. Indicador de «acceso significativo» de GTS HVI — combina la conciencia del canal con la disposición declarada a utilizarlo."
