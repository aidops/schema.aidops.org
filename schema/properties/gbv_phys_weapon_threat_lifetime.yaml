id: gbv_phys_weapon_threat_lifetime
maturity: draft
label:
  en: "Physical IPV (lifetime): threatened with knife, gun, or other weapon"
  fr: "VPI physique (vie entière) : menacée avec un couteau, une arme à feu ou une autre arme"
  es: "VPI física (de por vida): amenazada con cuchillo, arma de fuego u otra arma"

definition:
  en: >
    Whether the referent partner has ever threatened to attack the respondent with a knife, gun,
    or any other weapon. DHS instrument item DV05A-vii. Lifetime reference period (ever). This is
    classified as a 'severe' physical IPV act in the DHS severity typology. If true, the follow-up
    12-month frequency property gbv_phys_weapon_threat_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais menacé d'attaquer la répondante avec un couteau, une arme
    à feu ou toute autre arme. Item DHS DV05A-vii. Période de référence : à vie. Acte de VPI
    physique 'grave'. Si vrai, gbv_phys_weapon_threat_12m_freq est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez amenazó con atacar a la encuestada con un cuchillo,
    arma de fuego u otra arma. Ítem DHS DV05A-vii. Período de referencia: de por vida. Acto de
    VPI física 'grave'. Si verdadero, se pregunta gbv_phys_weapon_threat_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_physical_ipv
core: false
sensitivity: restricted
