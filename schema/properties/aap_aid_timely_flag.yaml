id: aap_aid_timely_flag
maturity: draft
label:
  en: "AAP: Aid arrived on time (derived)"
  fr: "Redevabilité : Aide arrivée à temps (dérivé)"
  es: "Rendición de cuentas: Ayuda llegó a tiempo (derivado)"
definition:
  en: "Derived household-level boolean: true if `aap_aid_timely = yes_on_time`. Maps to CHS 2024 Commitment 2 and to GTS HVI timeliness pillar. Directly aggregates to the OCHA HNO indicator '% of households reporting that aid arrived on time'."
  fr: "Booléen dérivé au niveau ménage : vrai si `aap_aid_timely = yes_on_time`. Correspond à l'Engagement 2 de la CHS 2024 et au pilier de rapidité GTS HVI. S'agrège directement à l'indicateur OCHA HNO « % de ménages rapportant que l'aide est arrivée à temps »."
  es: "Booleano derivado a nivel de hogar: verdadero si `aap_aid_timely = yes_on_time`. Corresponde al Compromiso 2 de la CHS 2024 y al pilar de oportunidad de GTS HVI. Se agrega directamente al indicador OCHA HNO «% de hogares que reportan que la ayuda llegó a tiempo»."
type: boolean
cardinality: single
