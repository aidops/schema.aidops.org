id: lcs_early_marriage
maturity: draft
label:
  en: "LCS early marriage"
  fr: "SCM mariage précoce"
  es: "EMV matrimonio temprano"

definition:
  en: "Frequency with which the household arranged the early marriage of a member (typically a girl) to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, emergency tier. Protection red flag: affirmative responses warrant referral to the relevant child protection and gender-based violence actors."
  fr: "Fréquence à laquelle le ménage a organisé le mariage précoce d'un membre (typiquement une fille) pour répondre aux besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau d'urgence. Signal d'alerte en matière de protection : les réponses affirmatives justifient une orientation vers les acteurs de protection de l'enfance et de lutte contre les violences basées sur le genre concernés."
  es: "Frecuencia con la que el hogar concertó el matrimonio precoz de un miembro (típicamente una niña) para cubrir las necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de emergencia. Señal de alerta de protección: las respuestas afirmativas justifican la derivación a los actores de protección infantil y de violencia de género pertinentes."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [wfp_lcs, wfp_cari]
