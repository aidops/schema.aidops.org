id: wdds_meat_poultry_fish_consumed
maturity: draft
label:
  en: "WDDS meat, poultry and fish consumed"
  fr: "WDDS viande, volaille et poisson consommés"
  es: "WDDS carne, aves y pescado consumidos"

definition:
  en: "Whether the woman consumed an item from the meat, poultry, and fish food group in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé un aliment du groupe de la viande, de la volaille et du poisson au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió un alimento del grupo de carne, aves y pescado en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

