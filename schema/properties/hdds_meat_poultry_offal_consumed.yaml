id: hdds_meat_poultry_offal_consumed
maturity: draft
label:
  en: "HDDS meat, poultry and offal consumed"
  fr: "SDAM viande, volaille et abats consommés"
  es: "EDDA carne, aves y vísceras consumidas"

definition:
  en: "Whether any member of the household consumed an item from the meat, poultry, and offal food group in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe de la viande, de la volaille et des abats au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de carnes, aves y vísceras en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
