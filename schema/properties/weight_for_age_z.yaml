id: weight_for_age_z
maturity: draft
label:
  en: "Weight-for-age z-score (WAZ)"
  fr: "Score z poids-pour-âge (WAZ)"
  es: "Puntaje z peso-para-edad (WAZ)"

definition:
  en: "The weight-for-age z-score (WAZ) derived from the raw weight measurement against the declared growth reference. Values below -2 indicate underweight; below -3 indicate severe underweight under the WHO 2006 standard."
  fr: "Le z-score poids-pour-âge (WAZ) dérivé de la mesure brute de poids par rapport à la référence de croissance déclarée. Les valeurs inférieures à -2 indiquent une insuffisance pondérale ; inférieures à -3 indiquent une insuffisance sévère selon la norme OMS 2006."
  es: "El puntaje z peso-para-edad (WAZ) derivado de la medición bruta de peso respecto a la referencia de crecimiento declarada. Valores inferiores a -2 indican bajo peso; inferiores a -3 indican bajo peso grave bajo el estándar OMS 2006."

type: decimal
