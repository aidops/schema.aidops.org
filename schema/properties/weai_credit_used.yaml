id: weai_credit_used
maturity: draft
label:
  en: "WEAI credit — household obtained credit"
  fr: "WEAI crédit — le ménage a obtenu un crédit"
  es: "WEAI crédito — el hogar obtuvo crédito"

definition:
  en: "Whether the household obtained credit or a loan from any source in the past 12 months. Gate question for pro-WEAI Indicator B3 (access to and decisions on financial services). If 'no', skip weai_credit_decision. If 'yes', ask weai_credit_decision to assess Condition A adequacy."
  fr: "Si le ménage a obtenu un crédit ou un prêt de quelque source que ce soit au cours des douze derniers mois. Question filtre pour l'indicateur B3 du pro-WEAI (accès aux services financiers et décisions). Si 'non', ignorer weai_credit_decision. Si 'oui', poser weai_credit_decision pour évaluer l'adéquation de la condition A."
  es: "Si el hogar obtuvo crédito o un préstamo de cualquier fuente en los últimos 12 meses. Pregunta de filtro para el Indicador B3 del pro-WEAI (acceso a servicios financieros y decisiones). Si 'no', omitir weai_credit_decision. Si 'sí', preguntar weai_credit_decision para evaluar la adecuación de la Condición A."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
