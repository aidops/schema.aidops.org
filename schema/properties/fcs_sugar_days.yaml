id: fcs_sugar_days
maturity: draft
label:
  en: "FCS sugar days"
  fr: "SCA jours sucre"
  es: "PCA días azúcar"

definition:
  en: "Number of days in the past seven during which any member of the household consumed sugar, honey, and sweet foods. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé du sucre, du miel ou des aliments sucrés. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió azúcar, miel y alimentos dulces. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
