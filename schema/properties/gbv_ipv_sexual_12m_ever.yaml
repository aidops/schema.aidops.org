id: gbv_ipv_sexual_12m_ever
maturity: draft
label:
  en: "Derived: experienced sexual IPV in past 12 months"
  fr: "Dérivé : a subi une VPI sexuelle au cours des 12 derniers mois"
  es: "Derivado: experimentó VPI sexual en los últimos 12 meses"

definition:
  en: >
    Derived boolean indicator: true if the respondent experienced at least one sexual IPV act in
    the past 12 months. Formula: TRUE if any of gbv_sex_forced_intercourse_12m_freq,
    gbv_sex_forced_other_acts_12m_freq, or gbv_sex_forced_with_threats_12m_freq = 'often' or
    'sometimes'. SDG 5.2.1-adjacent (sexual IPV component).
    Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.
  fr: >
    Indicateur booléen dérivé : vrai si la répondante a subi au moins un acte de VPI sexuelle
    au cours des 12 derniers mois. Formule : VRAI si l'un des 3 items de fréquence 12m de VPI
    sexuelle = 'souvent' ou 'parfois'. SDG 5.2.1 (composante sexuelle). Dérivé, non posé.
  es: >
    Indicador booleano derivado: verdadero si la encuestada experimentó al menos un acto de VPI
    sexual en los últimos 12 meses. Fórmula: VERDADERO si alguno de los 3 ítems de frecuencia
    12m de VPI sexual = 'often' o 'sometimes'. SDG 5.2.1 (componente sexual). Derivado, no preguntado.

type: boolean
cardinality: single
vocabulary: null
references: null
category: scores
core: false
sensitivity: restricted
