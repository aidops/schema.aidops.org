id: hhs_score
maturity: draft
label:
  en: "HHS score"
  fr: "Score HHS"
  es: "Puntaje HHS"

definition:
  en: "The Household Hunger Scale score for this administration, calculated by recoding the three HHS frequency questions and summing. Recoding per FANTA HHS Indicator Guide: never = 0, rarely (1-2 times) = 1, sometimes (3-10 times) or often (> 10 times) = 2. Range 0-6. Higher scores indicate greater household hunger."
  fr: "Le score de l'échelle de la faim des ménages (HHS) pour cette passation, calculé en recodant les trois questions de fréquence HHS et en sommant. Recodage selon le Guide des indicateurs HHS de FANTA : jamais = 0, rarement (1-2 fois) = 1, parfois (3-10 fois) ou souvent (> 10 fois) = 2. Plage 0-6. Des scores plus élevés indiquent une faim plus importante du ménage."
  es: "El puntaje de la Escala de Hambre del Hogar (HHS) para esta aplicación, calculado recodificando las tres preguntas de frecuencia HHS y sumando. Recodificación según la Guía de indicadores HHS de FANTA: nunca = 0, raramente (1-2 veces) = 1, a veces (3-10 veces) o frecuentemente (> 10 veces) = 2. Rango 0-6. Puntajes más altos indican mayor hambre del hogar."

type: integer
cardinality: single
