id: wdds_pulses_consumed
maturity: draft
label:
  en: "WDDS pulses consumed"
  fr: "WDDS légumineuses consommées"
  es: "WDDS legumbres consumidas"

definition:
  en: "Whether the woman consumed an item from the pulses food group in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé un aliment du groupe des légumineuses au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió un alimento del grupo de las legumbres en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

type: boolean
cardinality: single
