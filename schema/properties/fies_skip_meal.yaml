id: fies_skip_meal
maturity: draft
label:
  en: "FIES skipped meal"
  fr: "FIES repas sauté"
  es: "FIES saltó comida"

definition:
  en: "Whether, at any time during the FIES reference period, the household had to skip a meal because of lack of resources. One of eight experience-based items in the FAO Food Insecurity Experience Scale (FIES); the reference period is recorded in recall_period_days."
  fr: "Si, à un moment quelconque de la période de référence FIES, le ménage a dû sauter un repas par manque de ressources. L'un des huit items expérientiels de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO ; la période de référence est enregistrée dans recall_period_days."
  es: "Si en algún momento durante el período de referencia FIES, el hogar tuvo que saltarse una comida por falta de recursos. Uno de los ocho ítems basados en experiencia de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO; el período de referencia se registra en recall_period_days."

type: boolean
cardinality: single
