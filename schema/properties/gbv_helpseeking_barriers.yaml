id: gbv_helpseeking_barriers
maturity: draft
label:
  en: "Help-seeking: barriers to seeking help after partner violence"
  fr: "Recherche d'aide : obstacles à la recherche d'aide après violences conjugales"
  es: "Búsqueda de ayuda: barreras para buscar ayuda tras violencia de pareja"

definition:
  en: >
    Reasons the respondent did not seek help after experiencing partner violence. Multi-select;
    record all mentioned. Skip logic: asked only if gbv_helpseeking_attempted = false. Based on
    DHS country questionnaire barrier batteries and WHO Multi-Country Study (Garcia-Moreno et al.,
    2005). Understanding barriers is essential for programme design and referral pathway
    strengthening. Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Raisons pour lesquelles la répondante n'a pas cherché d'aide à la suite de violences
    conjugales. Sélection multiple; noter toutes les raisons mentionnées. Posée uniquement si
    gbv_helpseeking_attempted = faux. Basé sur les batteries DHS et l'Étude multi-pays de l'OMS.
  es: >
    Razones por las que la encuestada no buscó ayuda tras la violencia de pareja. Selección
    múltiple; registrar todas las mencionadas. Se pregunta solo si gbv_helpseeking_attempted =
    falso. Basado en baterías DHS y Estudio multipaís OMS.

type: string
cardinality: multiple
vocabulary: gbv-helpseeking-barriers
references: null
category: gbv_help_seeking
core: false
sensitivity: restricted
