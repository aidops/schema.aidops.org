id: protection_referral_channel_known
maturity: draft
label:
  en: "Protection referral channel known"
  fr: "Type de mécanisme de signalement de protection connu"
  es: "Canal de derivación de protección conocido"

definition:
  en: "The type of mechanism the household knows about for reporting protection concerns. Asked only when protection_referral_aware = yes. The type of mechanism is an important programmatic indicator: households knowing only informal/customary mechanisms may not be protected against state or armed actor violations. Based on GPC PAF Domain 2; Sphere Protection Principle 4; REACH Syria (2022) referral awareness module. Note: this vocabulary partially overlaps with gbv-service-type (GBVRiskProfile) — general referral channel vs. GBV-specific service type. Consolidation opportunity flagged for a future batch; keep separate for now."
  fr: "Le type de mécanisme que le ménage connaît pour signaler des problèmes de protection. Posée uniquement lorsque protection_referral_aware = oui. Le type de mécanisme est un indicateur programmatique important : les ménages qui ne connaissent que des mécanismes informels/coutumiers peuvent ne pas être protégés contre les violations d'acteurs étatiques ou armés. Fondé sur GPC PAF Domaine 2 ; Sphère Principe de protection 4 ; REACH Syrie (2022) module de connaissance des mécanismes de référence. Remarque : ce vocabulaire chevauche partiellement gbv-service-type (GBVRiskProfile) — canal de signalement général vs. type de service spécifique VBG. Opportunité de consolidation signalée pour un futur lot ; conserver séparément pour l'instant."
  es: "El tipo de mecanismo que el hogar conoce para reportar problemas de protección. Se pregunta solo cuando protection_referral_aware = sí. El tipo de mecanismo es un indicador programático importante: los hogares que solo conocen mecanismos informales/consuetudinarios pueden no estar protegidos contra violaciones de actores estatales o armados. Basado en GPC PAF Dominio 2; Principio de Protección 4 de Esfera; módulo de conocimiento de mecanismos de derivación de REACH Siria (2022). Nota: este vocabulario se superpone parcialmente con gbv-service-type (GBVRiskProfile) — canal de derivación general vs. tipo de servicio específico de VBG. Oportunidad de consolidación señalada para un lote futuro; mantener separado por ahora."

type: string
cardinality: single
