id: iycf_animal_milk_yesterday
maturity: draft
label:
  en: "Animal milk received yesterday"
  fr: "Lait animal reçu hier"
  es: "Leche animal recibida ayer"

definition:
  en: "Whether the child received animal milk (cow, goat, or other animal milk) yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): 'Yesterday, did (NAME) receive animal milk (cow, goat, or other animal milk)?' Counted as a milk feed for the Minimum Milk Feeding Frequency (MMFF) indicator for non-breastfed children."
  fr: "Indique si l'enfant a reçu du lait animal (lait de vache, de chèvre ou d'un autre animal) hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier, (PRÉNOM) a-t-il/elle reçu du lait animal (lait de vache, de chèvre ou d'un autre animal) ? » Comptabilisé comme un repas lacté pour l'indicateur MMFF des enfants non allaités."
  es: "Indica si el niño recibió leche animal (leche de vaca, cabra u otro animal) ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): 'Ayer, ¿recibió (NOMBRE) leche animal (leche de vaca, cabra u otro animal)?' Se contabiliza como una toma de leche para el indicador MMFF de los niños no amamantados."

type: boolean
cardinality: single
core: false
