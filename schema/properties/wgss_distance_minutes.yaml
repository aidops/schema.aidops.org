id: wgss_distance_minutes
maturity: draft
label:
  en: "Walking time to nearest Women and Girls Safe Space (minutes, one way)"
  fr: "Temps de marche jusqu'à l'espace sûr pour femmes et filles le plus proche (minutes, sens unique)"
  es: "Tiempo de caminata hasta el espacio seguro para mujeres y niñas más cercano (minutos, ida)"

definition:
  en: "Time in minutes to walk from the household to the nearest Women and Girls Safe Space (WGSS), one way. A value of 0 means the WGSS is on premises or immediately adjacent. Asked only when wgss_presence_known = yes. Physical proximity to a WGSS is a service accessibility indicator; distance is a barrier to utilisation. Based on the UNFPA Minimum Standards (2019) and GBV AoR AAAQ framework (the 'accessibility' dimension)."
  fr: "Temps en minutes pour marcher du ménage à l'espace sûr pour femmes et filles (ESFMF) le plus proche, sens unique. Une valeur de 0 signifie que l'ESFMF est sur place ou immédiatement adjacent. Posée uniquement lorsque wgss_presence_known = oui. La proximité physique d'un ESFMF est un indicateur d'accessibilité des services ; la distance est un obstacle à l'utilisation. Fondé sur les Normes minimales UNFPA (2019) et le cadre AAAQ du GBV AoR (dimension 'accessibilité')."
  es: "Tiempo en minutos para caminar desde el hogar hasta el Espacio Seguro para Mujeres y Niñas (ESMN) más cercano, en un sentido. Un valor de 0 significa que el ESMN está en las instalaciones o inmediatamente adyacente. Se pregunta solo cuando wgss_presence_known = sí. La proximidad física a un ESMN es un indicador de accesibilidad a los servicios; la distancia es una barrera para la utilización. Basado en los Estándares Mínimos de UNFPA (2019) y el marco AAAQ del GBV AoR (dimensión 'accesibilidad')."

type: integer
cardinality: single
