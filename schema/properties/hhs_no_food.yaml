label:
  en: "HHS no food in household"
  fr: "EFM aucune nourriture dans le ménage"
  es: "EHH sin alimentos en el hogar"

definition:
  en: "Frequency with which, in the past 30 days, there was no food of any kind in the household because of lack of resources. One of three items in the FANTA Household Hunger Scale."
  fr: "Fréquence à laquelle, au cours des 30 derniers jours, il n'y avait aucune nourriture d'aucune sorte dans le ménage par manque de ressources. L'un des trois items de l'Échelle de la faim du ménage (HHS) de FANTA."
  es: "Frecuencia con la que, en los últimos 30 días, no hubo ningún tipo de comida en el hogar por falta de recursos. Uno de los tres ítems de la Escala de Hambre del Hogar (HHS) de FANTA."

