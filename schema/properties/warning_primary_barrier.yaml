id: warning_primary_barrier
maturity: draft
label:
  en: "Primary barrier to protective action"
  fr: "Obstacle principal à l'action de protection"
  es: "Barrera principal a la acción de protección"

definition:
  en: "The single biggest obstacle that prevented the household from taking protective action. Single-select from the warning-action-barrier vocabulary. Applicable when warning_action_barriers has any non-'no_barrier' value. Sensitivity: inherits the same partial-sensitivity handling as warning_action_barriers when the selected code is 'permission_denied_household_member' or 'permission_denied_community_authority'; see the parent item definition and the vocabulary entries for those codes."
  fr: "L'obstacle unique le plus important ayant empêché le ménage de prendre des actions de protection. Sélection unique dans le vocabulaire warning-action-barrier. Applicable si warning_action_barriers contient une valeur autre que « no_barrier ». Sensibilité : hérite du même traitement à sensibilité partielle que warning_action_barriers lorsque le code sélectionné est « permission_denied_household_member » ou « permission_denied_community_authority » ; voir la définition de l'item parent et les entrées de vocabulaire pour ces codes."
  es: "El obstáculo único más grande que impidió al hogar tomar acción de protección. Selección única del vocabulario warning-action-barrier. Aplicable cuando warning_action_barriers contiene un valor distinto de «no_barrier». Sensibilidad: hereda el mismo tratamiento de sensibilidad parcial que warning_action_barriers cuando el código seleccionado es «permission_denied_household_member» o «permission_denied_community_authority»; véase la definición del ítem padre y las entradas del vocabulario para esos códigos."

type: string
cardinality: single
