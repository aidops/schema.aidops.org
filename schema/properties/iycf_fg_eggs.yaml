id: iycf_fg_eggs
maturity: draft
label:
  en: "MDD-C food group 6: eggs"
  fr: "Groupe alimentaire MDD-C 6 : œufs"
  es: "Grupo alimentario MDD-C 6: huevos"

definition:
  en: "Whether the child ate any egg in the previous 24 hours. Food group 6 of the 8-group MDD-C framework (WHO/UNICEF 2021). Includes eggs from any bird. Published wording: 'Yesterday during the day or at night, did (NAME) eat/drink any [eggs]?'"
  fr: "Indique si l'enfant a mangé un œuf au cours des 24 heures précédentes. Groupe alimentaire 6 du cadre MDD-C à 8 groupes (OMS/UNICEF 2021). Comprend les œufs de toute volaille."
  es: "Indica si el niño comió algún huevo en las 24 horas anteriores. Grupo alimentario 6 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Incluye huevos de cualquier ave."

type: boolean
cardinality: single
