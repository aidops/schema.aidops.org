id: technical_assistance_type
maturity: draft
label:
  en: "Type of technical assistance received"
  fr: "Type d'assistance technique reçue"
  es: "Tipo de asistencia técnica recibida"

definition:
  en: "The type or types of shelter-related technical assistance the household received since displacement or in the past 12 months. Multi-select. Ask only if technical_assistance_received is true. Based on Sphere Standard 5 guidance and Global Shelter Cluster 5W reporting categories."
  fr: "Le ou les types d'assistance technique liée à l'abri reçus par le ménage depuis le déplacement ou au cours des 12 derniers mois. Sélection multiple. Poser uniquement si technical_assistance_received est vrai. Basé sur les orientations de la Norme Sphère 5 et les catégories de rapport 5W du Cluster Abri Mondial."
  es: "El tipo o tipos de asistencia técnica relacionada con el refugio que el hogar recibió desde el desplazamiento o en los últimos 12 meses. Selección múltiple. Preguntar solo si technical_assistance_received es verdadero. Basado en la orientación de la Norma Esfera 5 y las categorías de reporte 5W del Clúster Global de Refugio."

type: string
cardinality: multiple
vocabulary: technical-assistance-type
references: null
category: shelter
core: false
sensitivity: standard
valid_instruments: [sphere_shelter_adequacy, gsc_standardised]
