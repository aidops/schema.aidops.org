definition:
  en: "Count of drinking cups or mugs currently held by the household. Sphere Standard 2: one drinking vessel per person. Together with household size, derives a per-person ratio."
  fr: "Nombre de tasses ou mugs actuellement détenus par le ménage. Norme Sphère 2 : un récipient à boire par personne. Combiné à la taille du ménage, permet de dériver un ratio par personne."
  es: "Cuenta de tazas o jarros para beber que tiene actualmente el hogar. Norma Esfera 2: un recipiente para beber por persona. Junto con el tamaño del hogar, deriva una razón por persona."

