id: ari_care_sought
maturity: draft
label:
  en: "Care sought for ARI"
  fr: "Soins recherchés pour l'IRA"
  es: "Atención buscada por IRA"

definition:
  en: "Whether the caregiver sought advice or treatment for the child's cough or breathing problem from anyone. Published wording: 'Did you seek advice or treatment for the cough or breathing problem from anyone?' Gateway to ari_care_source. Ask only if ari_symptom_classification is true. DHS code h32 (care-seeking gateway); MICS code ARI4."
  fr: "Si le soignant a recherché des conseils ou un traitement auprès de quelqu'un pour la toux ou les difficultés respiratoires de l'enfant. Formulation publiée : « Avez-vous cherché des conseils ou un traitement auprès de quelqu'un pour la toux ou les difficultés respiratoires ? » Passerelle vers ari_care_source. Posez uniquement si ari_symptom_classification est vrai. Code DHS h32 (passerelle de recours aux soins) ; code MICS ARI4."
  es: "Si el cuidador buscó consejo o tratamiento para la tos o el problema respiratorio del niño de alguna persona. Redacción publicada: '¿Buscó consejo o tratamiento para la tos o el problema respiratorio de alguna persona?' Puerta de entrada a ari_care_source. Preguntar solo si ari_symptom_classification es verdadero. Código DHS h32 (puerta de búsqueda de atención); código MICS ARI4."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: ari
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
