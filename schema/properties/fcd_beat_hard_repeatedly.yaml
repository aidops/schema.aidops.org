id: fcd_beat_hard_repeatedly
maturity: draft
label:
  en: "Discipline — beat up as hard as possible"
  fr: "Discipline — battu aussi fort que possible"
  es: "Disciplina — golpeó lo más fuerte posible"
definition:
  en: "Whether any adult in the household beat the selected child up, meaning hit them over and over as hard as one could, in the past month. MICS 6 FCD2 item K. Severe physical punishment category. Included in the CP.3 violent-discipline composite and the severe-physical sub-indicator."
  fr: "Si un adulte du ménage a battu l'enfant sélectionné, c'est-à-dire l'a frappé à plusieurs reprises aussi fort que possible, au cours du mois écoulé. MICS 6 FCD2 item K. Catégorie de punition physique sévère. Inclus dans le composite CP.3 de discipline violente et le sous-indicateur de punition physique sévère."
  es: "Si algún adulto del hogar golpeó al niño seleccionado, es decir, lo golpeó repetidamente lo más fuerte que pudo, en el último mes. MICS 6 FCD2 ítem K. Categoría de castigo físico severo. Incluido en el compuesto CP.3 de disciplina violenta y en el subindicador de castigo físico severo."
type: boolean
cardinality: single
core: false
