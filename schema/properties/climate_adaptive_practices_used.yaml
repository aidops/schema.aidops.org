id: climate_adaptive_practices_used
maturity: draft
label:
  en: "Climate-adaptive or climate-smart practices used in the past 12 months"
  fr: "Pratiques d'adaptation climatique ou climato-intelligentes utilisées au cours des 12 derniers mois"
  es: "Prácticas de adaptación climática o climáticamente inteligentes usadas en los últimos 12 meses"

definition:
  en: >
    Multi-select item asking which climate-smart or climate-adaptive practices
    the household has used in the past 12 months to adapt to changes in weather
    or climate. The primary climate-adaptive practice indicator for this profile.
    Boundary with AgricultureProfile: the items in this property are framed as
    climate-adaptation responses, not as routine agricultural extension questions.
    AgricultureProfile owns extension visit counts and general good-agricultural-
    practice adoption. This property owns the climate-specific practice adoption
    inventory (drought-resistant seeds, water harvesting, agroforestry, etc.).
    When both profiles are collected, the Form Author should coordinate to avoid
    double-asking; a note in the question ("practices you have started or changed
    specifically because of climate variability") helps differentiate.
  fr: >
    Item à sélection multiple demandant quelles pratiques climato-intelligentes
    ou d'adaptation climatique le ménage a utilisées au cours des 12 derniers
    mois pour s'adapter aux changements météorologiques ou climatiques.
    Indicateur principal des pratiques adaptatives climatiques de ce profil.
    Frontière avec AgricultureProfile : ce profil est propriétaire des inventaires
    de pratiques spécifiques à l'adaptation climatique ; AgricultureProfile est
    propriétaire des comptages de visites d'extension.
  es: >
    Ítem de selección múltiple que pregunta qué prácticas climáticamente
    inteligentes o de adaptación climática ha usado el hogar en los últimos
    12 meses para adaptarse a los cambios en el tiempo o el clima. El indicador
    principal de prácticas adaptativas climáticas de este perfil. Límite con
    AgricultureProfile: este perfil es propietario de los inventarios de
    prácticas de adaptación climática; AgricultureProfile es propietario de
    los conteos de visitas de extensión.

type: string
cardinality: multiple
core: true
vocabulary: adaptive-practice-type
references: null
category: climate
sensitivity: standard
