definition:
  en: "Whether the household sold livestock at a below-normal price, or sold animals that would not normally have been sold, because of food shortage, debt, or other hardship during the past 12 months. Drawn from the LSMS-ISA livestock module (distress selling) and FAO LCS-related items. Overlaps conceptually with `lcs_sold_productive_assets` in `FoodSecurityProfile` (general coping behaviour) but is livestock-specific and captures both below-market price and unusual selection of animals sold; both items can coexist with a form-layer hint noting the difference. `dont_know` is retained as a distinct valid response. Asked only when `hh_owns_livestock` is `yes`."
