id: weai_ipv_burns_food
maturity: draft
label:
  en: "WEAI IPV attitude — wife burns food"
  fr: "WEAI attitude VPI — femme brûle les aliments"
  es: "WEAI actitud VPI — esposa quema la comida"

definition:
  en: "Whether the respondent believes a husband is justified in hitting or beating his wife if she burns the food. One of five DHS-validated IPV attitude scenarios in pro-WEAI Indicator A3. Adequacy requires response 'no'. Adequacy for Indicator A3 requires 'no' for all five scenarios."
  fr: "Si le répondant croit qu'un mari est justifié de frapper ou de battre sa femme si elle brûle les aliments. L'un des cinq scénarios d'attitudes VPI validés par DHS dans l'indicateur A3 du pro-WEAI. L'adéquation nécessite la réponse 'non'. L'adéquation pour l'indicateur A3 nécessite 'non' pour les cinq scénarios."
  es: "Si el encuestado cree que un marido está justificado en golpear o pegar a su esposa si ella quema la comida. Uno de los cinco escenarios de actitud sobre VPI validados por DHS en el indicador A3 del pro-WEAI. La adecuación requiere respuesta 'no'. La adecuación para el Indicador A3 requiere 'no' para los cinco escenarios."

type: boolean
cardinality: single
core: true
