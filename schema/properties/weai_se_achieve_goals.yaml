id: weai_se_achieve_goals
maturity: draft
label:
  en: "WEAI self-efficacy — obtain important outcomes"
  fr: "WEAI auto-efficacité — obtenir des résultats importants"
  es: "WEAI autoeficacia — obtener resultados importantes"

definition:
  en: "NGSE item 3: 'In general, I think that I can obtain outcomes that are important to me.' One of eight items in the New General Self-Efficacy Scale (NGSE) used in pro-WEAI Indicator A2. Scored 1 (strongly disagree) to 5 (strongly agree). Adequacy for A2 requires sum of all eight NGSE items ≥ 32."
  fr: "Item NGSE 3 : 'En général, je pense que je peux obtenir les résultats qui sont importants pour moi.' L'un des huit items de la Nouvelle échelle générale d'auto-efficacité (NGSE) utilisée dans l'indicateur A2 du pro-WEAI. Noté de 1 (fortement en désaccord) à 5 (fortement d'accord). L'adéquation pour A2 nécessite que la somme des huit items NGSE soit ≥ 32."
  es: "Ítem NGSE 3: 'En general, creo que puedo obtener resultados que son importantes para mí.' Uno de los ocho ítems de la Nueva Escala General de Autoeficacia (NGSE) utilizada en el indicador A2 del pro-WEAI. Puntuado de 1 (muy en desacuerdo) a 5 (muy de acuerdo). La adecuación para A2 requiere que la suma de los ocho ítems NGSE sea ≥ 32."

type: string
cardinality: single
core: false
vocabulary: weai-agree-5
references: null
category: intrinsic_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
