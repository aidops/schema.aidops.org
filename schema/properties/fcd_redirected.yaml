label:
  en: "Discipline — gave something else to do"
  fr: "Discipline — donné autre chose à faire"
  es: "Disciplina — dio otra cosa que hacer"
definition:
  en: "Whether any adult in the household gave the selected child something else to do as a redirecting/distraction discipline method, in the past month. MICS 6 FCD2 item E. Non-violent discipline method."
  fr: "Si un adulte du ménage a donné à l'enfant sélectionné autre chose à faire comme méthode de discipline de redirection/distraction, au cours du mois écoulé. MICS 6 FCD2 item E. Méthode de discipline non violente."
  es: "Si algún adulto del hogar le dio al niño seleccionado otra cosa que hacer como método de disciplina de redirección/distracción, en el último mes. MICS 6 FCD2 ítem E. Método de disciplina no violento."
