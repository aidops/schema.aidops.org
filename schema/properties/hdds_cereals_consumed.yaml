id: hdds_cereals_consumed
maturity: draft
label:
  en: "HDDS cereals consumed"
  fr: "SDAM céréales consommées"
  es: "EDDA cereales consumidos"

definition:
  en: "Whether any member of the household consumed an item from the cereals and grain products food group (bread, pasta, rice) in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des céréales et produits céréaliers (pain, pâtes, riz) au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de cereales y productos de granos (pan, pasta, arroz) en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
