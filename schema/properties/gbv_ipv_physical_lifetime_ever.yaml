id: gbv_ipv_physical_lifetime_ever
maturity: draft
label:
  en: "Derived: ever experienced physical IPV (lifetime)"
  fr: "Dérivé : a jamais subi une VPI physique (vie entière)"
  es: "Derivado: alguna vez experimentó VPI física (de por vida)"

definition:
  en: >
    Derived boolean indicator: true if the respondent reported at least one lifetime physical IPV
    act. Formula: TRUE if any of gbv_phys_push_shake_throw_lifetime, gbv_phys_slap_lifetime,
    gbv_phys_twist_arm_pull_hair_lifetime, gbv_phys_punch_lifetime,
    gbv_phys_kick_drag_beat_lifetime, gbv_phys_choke_burn_lifetime, or
    gbv_phys_weapon_threat_lifetime = true. Corresponds to the DHS tabulation 'percentage of women
    who have ever experienced physical violence by husband/partner.' DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.
  fr: >
    Indicateur booléen dérivé : vrai si la répondante a signalé au moins un acte de VPI physique
    à vie. Formule : VRAI si l'un quelconque des 7 items de VPI physique à vie = vrai. Correspond
    au tableau DHS 'pourcentage de femmes ayant subi des violences physiques du partenaire'.
    Dérivé, non posé.
  es: >
    Indicador booleano derivado: verdadero si la encuestada reportó al menos un acto de VPI física
    de por vida. Fórmula: VERDADERO si cualquiera de los 7 ítems de VPI física de por vida =
    verdadero. Corresponde a la tabulación DHS. Derivado, no preguntado.

type: boolean
cardinality: single
vocabulary: null
references: null
category: scores
core: false
sensitivity: restricted
