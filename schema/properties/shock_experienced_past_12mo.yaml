id: shock_experienced_past_12mo
maturity: draft
label:
  en: "Shocks experienced in past 12 months"
  fr: "Chocs subis au cours des 12 derniers mois"
  es: "Choques experimentados en los últimos 12 meses"

definition:
  en: "Types of shocks that have affected the household in the past 12 months. Multi-select across natural, economic, conflict-related, and health shocks. Drawn from the FAO RIMA-II shock module, the LSMS-ISA shocks and coping module, the INFORM Risk Index typology, and the IOM DTM Multi-Sectoral Location Assessment shock component. Used alongside `shock_coping_strategy_used` to construct vulnerability and resilience profiles. Distinct from the crisis or displacement reference event captured in `livelihood_change_since_crisis`, which covers the full crisis period."
  fr: "Types de chocs ayant affecté le ménage au cours des 12 derniers mois. Sélection multiple couvrant les chocs naturels, économiques, liés au conflit et sanitaires. Tirée du module de chocs FAO RIMA-II, du module chocs et adaptation LSMS-ISA, de la typologie de l'Indice de risque INFORM et de la composante chocs de l'Évaluation multisectorielle de localisation (MSLA) de la DTM de l'OIM. Utilisée avec `shock_coping_strategy_used` pour construire des profils de vulnérabilité et de résilience. Distincte de l'événement de référence de crise ou de déplacement saisi dans `livelihood_change_since_crisis`, qui couvre l'ensemble de la période de crise."
  es: "Tipos de choques que han afectado al hogar en los últimos 12 meses. Selección múltiple que abarca choques naturales, económicos, relacionados con conflictos y de salud. Tomados del módulo de choques FAO RIMA-II, el módulo de choques y afrontamiento LSMS-ISA, la tipología del Índice de Riesgo INFORM y el componente de choques de la Evaluación Multisectorial de Ubicación (MSLA) de la DTM de la OIM. Utilizados junto con `shock_coping_strategy_used` para construir perfiles de vulnerabilidad y resiliencia. Distinto del evento de referencia de crisis o desplazamiento capturado en `livelihood_change_since_crisis`, que cubre todo el período de crisis."

type: string
cardinality: multiple
core: false
