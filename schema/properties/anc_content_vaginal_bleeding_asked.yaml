id: anc_content_vaginal_bleeding_asked
maturity: draft
label:
  en: Vaginal bleeding asked about during ANC
  fr: "Saignements vaginaux demandés lors des CPN"
  es: "Se preguntó sobre sangrado vaginal durante la APN"
definition:
  en: "Whether a health worker asked the woman about vaginal bleeding during antenatal care. DHS-8 m42i. Danger sign assessment; vaginal bleeding can indicate placenta previa, abruption, or miscarriage risk. Only asked if anc_any_visit = yes."
  fr: "Si un agent de santé a interrogé la femme sur les saignements vaginaux lors des soins prénataux. DHS-8 m42i. Évaluation des signes de danger ; les saignements vaginaux peuvent indiquer un risque de placenta prævia, d'hématome rétroplacentaire ou de fausse couche. Posé uniquement si anc_any_visit = oui."
  es: "Si un trabajador de salud preguntó a la mujer sobre el sangrado vaginal durante la atención prenatal. DHS-8 m42i. Evaluación de señales de peligro; el sangrado vaginal puede indicar placenta previa, desprendimiento placentario o riesgo de aborto. Solo se pregunta si anc_any_visit = sí."
type: boolean
cardinality: single
core: false
