id: stove_preparation_time_minutes
maturity: draft
label:
  en: "Stove preparation time (minutes)"
  fr: "Temps de préparation du foyer (minutes)"
  es: "Tiempo de preparación de la cocina (minutos)"

definition:
  en: "Minutes it usually takes to prepare the stove before cooking can start (for example, to light the fire, add fuel, or turn on the stove). MTF cooking convenience attribute — stove preparation time tier thresholds: less than 2 min = Tier 4-5; less than 5 min = Tier 3; less than 10 min = Tier 2; less than 15 min = Tier 1; 15 or more min = Tier 0. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q8."
  fr: "Minutes qu'il faut habituellement pour préparer le foyer avant de commencer à cuisiner (par exemple, allumer le feu, ajouter du combustible ou allumer le réchaud). Attribut de commodité de cuisson MTF — seuils de niveau pour le temps de préparation du foyer : moins de 2 min = niveaux 4-5 ; moins de 5 min = niveau 3 ; moins de 10 min = niveau 2 ; moins de 15 min = niveau 1 ; 15 min ou plus = niveau 0. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q8."
  es: "Minutos que normalmente toma preparar la cocina antes de poder comenzar a cocinar (por ejemplo, encender el fuego, agregar combustible o encender la cocina). Atributo de conveniencia de cocción MTF: umbrales de nivel para el tiempo de preparación de la cocina: menos de 2 min = Niveles 4-5; menos de 5 min = Nivel 3; menos de 10 min = Nivel 2; menos de 15 min = Nivel 1; 15 min o más = Nivel 0. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q8."

