id: fcd_spanked
maturity: draft
label:
  en: "Discipline — spanked, hit, or slapped on the bottom with bare hand"
  fr: "Discipline — fessée, frappé ou giflé sur les fesses à main nue"
  es: "Disciplina — nalgada, golpeó o abofeteó en las nalgas a mano abierta"
definition:
  en: "Whether any adult in the household spanked, hit, or slapped the selected child on the bottom with a bare hand, in the past month. MICS 6 FCD2 item F. Physical punishment (non-severe) category. Included in the CP.3 violent-discipline composite."
  fr: "Si un adulte du ménage a donné une fessée, frappé ou giflé l'enfant sélectionné sur les fesses à main nue, au cours du mois écoulé. MICS 6 FCD2 item F. Catégorie de punition physique (non sévère). Inclus dans le composite CP.3 de discipline violente."
  es: "Si algún adulto del hogar le dio nalgadas, golpeó o abofeteó al niño seleccionado en las nalgas a mano abierta, en el último mes. MICS 6 FCD2 ítem F. Categoría de castigo físico (no severo). Incluido en el compuesto CP.3 de disciplina violenta."
