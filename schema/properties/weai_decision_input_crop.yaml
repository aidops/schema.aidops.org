id: weai_decision_input_crop
maturity: draft
label:
  en: "WEAI decision input — crop production"
  fr: "WEAI participation décisionnelle — production agricole"
  es: "WEAI participación en decisiones — producción de cultivos"

definition:
  en: "How much input the respondent had in making decisions about crop production activities (choice of crops, planting time, inputs, harvesting). One item in the pro-WEAI Indicator B1 (input in productive decisions) series. Adequacy condition A: code input_most_all_decisions. Condition B: code input_some_decisions AND perceived capacity is medium or high extent."
  fr: "Dans quelle mesure le répondant a participé aux décisions concernant les activités de production agricole (choix des cultures, calendrier de semis, intrants, récolte). Un item de la série de l'indicateur B1 du pro-WEAI (participation aux décisions productives). Condition d'adéquation A : code input_most_all_decisions. Condition B : code input_some_decisions ET capacité perçue moyenne ou élevée."
  es: "En qué medida el encuestado tuvo participación en las decisiones sobre actividades de producción de cultivos (elección de cultivos, tiempo de siembra, insumos, cosecha). Un ítem de la serie del Indicador B1 del pro-WEAI (participación en decisiones productivas). Condición de adecuación A: código input_most_all_decisions. Condición B: código input_some_decisions Y capacidad percibida media o alta."

type: string
cardinality: single
core: true
vocabulary: weai-decision-input-4
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
