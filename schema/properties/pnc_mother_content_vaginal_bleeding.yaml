label:
  en: Vaginal bleeding discussed during postnatal check
  fr: "Saignements vaginaux discutés lors du contrôle postnatal"
  es: "Sangrado vaginal discutido durante la revisión posnatal"
definition:
  en: "Whether a health worker discussed vaginal bleeding with the woman during her postnatal check. DHS-8 m78g. New in DHS-8. Danger sign for postpartum hemorrhage. WHO PNC 2022 recommendation. Only asked if pnc_mother_any_check = yes."
  fr: "Si un agent de santé a discuté des saignements vaginaux avec la femme lors de son contrôle postnatal. DHS-8 m78g. Nouveau dans le DHS-8. Signe de danger d'hémorragie du post-partum. Recommandation OMS PNC 2022. Posé uniquement si pnc_mother_any_check = oui."
  es: "Si un trabajador de salud habló sobre el sangrado vaginal con la mujer durante su revisión posnatal. DHS-8 m78g. Nuevo en DHS-8. Señal de peligro de hemorragia posparto. Recomendación OMS PNC 2022. Solo se pregunta si pnc_mother_any_check = sí."
