id: warning_reception_gender_gap
maturity: draft
label:
  en: "Warning reception gender gap"
  fr: "Écart de genre dans la réception des alertes"
  es: "Brecha de género en la recepción de alertas"

definition:
  en: "Whether every adult member of the household received or heard about the warning, or only some. Captured on a five-level scale: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non-sensitive at household level; downstream analysis should be attentive to protection implications when combined with other indicators. Informs IFRC PGI-in-AA and IASC Gender Handbook analysis of gendered information access."
  fr: "Indique si chaque membre adulte du ménage a reçu ou entendu parler de l'alerte, ou seulement certains. Capté sur une échelle à cinq niveaux : all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. Non sensible au niveau du ménage ; l'analyse en aval devrait être attentive aux implications de protection lorsqu'elle est combinée à d'autres indicateurs. Alimente l'analyse IFRC PGI-in-AA et du Manuel Genre IASC sur l'accès genré à l'information."
  es: "Indica si cada miembro adulto del hogar recibió o escuchó sobre la alerta, o solo algunos. Capturado en una escala de cinco niveles: all_adults_received, only_men_received, only_women_received, only_head_received, dont_know. No sensible a nivel del hogar; el análisis posterior debe ser atento a las implicaciones de protección cuando se combina con otros indicadores. Alimenta el análisis IFRC PGI-in-AA y del Manual de Género IASC sobre el acceso a la información por género."

