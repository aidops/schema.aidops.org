id: cl_hazard_chemicals
maturity: draft
label:
  en: "Work with chemicals or explosives"
  fr: "Travail avec des produits chimiques ou explosifs"
  es: "Trabajo con productos químicos o explosivos"
definition:
  en: "Whether the child performed economic activity involving chemicals (pesticides, glues, etc.) or explosives in the past 7 days. MICS 6 CL6 E. Asked only if any of the CL1 economic-activity items is yes. A yes flags hazardous work under the ILO/UNICEF 2020 child-labour definition."
  fr: "Si l'enfant a exercé une activité économique impliquant des produits chimiques (pesticides, colles, etc.) ou des explosifs au cours des 7 derniers jours. MICS 6 CL6 E. Posé uniquement si l'un des items CL1 d'activité économique est oui. Un oui signale un travail dangereux selon la définition OIT/UNICEF 2020 du travail des enfants."
  es: "Si el niño realizó actividad económica que involucraba productos químicos (pesticidas, pegamentos, etc.) o explosivos en los últimos 7 días. MICS 6 CL6 E. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Un sí señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
