id: fies_raw_score
maturity: draft
label:
  en: "FIES raw score"
  fr: "Score brut FIES"
  es: "Puntaje bruto FIES"

definition:
  en: "The raw Food Insecurity Experience Scale score for this administration, calculated as the count of affirmative responses to the eight FIES items. Range 0-8. The Rasch-model-adjusted FIES scale score used for population-level prevalence estimation (SDG 2.1.2) requires calibration data and is not a per-record field; it belongs on a ScoringEvent."
  fr: "Le score brut de l'échelle d'expérience de l'insécurité alimentaire (FIES) pour cette passation, calculé comme le décompte des réponses affirmatives aux huit items FIES. Plage 0-8. Le score ajusté par modèle de Rasch utilisé pour l'estimation de la prévalence au niveau de la population (ODD 2.1.2) nécessite des données de calibrage et n'est pas un champ par enregistrement ; il relève d'un ScoringEvent."
  es: "El puntaje bruto de la Escala de Experiencia de Inseguridad Alimentaria (FIES) para esta aplicación, calculado como el conteo de respuestas afirmativas a los ocho ítems FIES. Rango 0-8. El puntaje ajustado por modelo Rasch usado para la estimación de prevalencia poblacional (ODS 2.1.2) requiere datos de calibración y no es un campo por registro; corresponde a un ScoringEvent."

type: integer
cardinality: single
