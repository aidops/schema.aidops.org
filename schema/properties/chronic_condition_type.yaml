id: chronic_condition_type
maturity: draft
label:
  en: "Type(s) of chronic condition present in the household"
  fr: "Type(s) d'affection chronique présente dans le ménage"
  es: "Tipo(s) de condición crónica presente en el hogar"

definition:
  en: "Type(s) of diagnosed chronic condition present among household members, drawn from the `chronic-condition-type` vocabulary that covers NCDs (hypertension, diabetes, cardiovascular, chronic respiratory, cancer, chronic mental illness, epilepsy) plus chronic communicable diseases (HIV, tuberculosis). Multi-select because a household may have members with different conditions, or one member with co-morbidities. Sensitive because chronic condition status can be stigmatizing. Ask only if `chronic_condition_in_hh` is `yes`."
  fr: "Type(s) d'affection chronique diagnostiquée présente chez les membres du ménage, tirés du vocabulaire `chronic-condition-type` qui couvre les maladies non transmissibles (hypertension, diabète, cardiovasculaire, respiratoire chronique, cancer, maladie mentale chronique, épilepsie) ainsi que les maladies transmissibles chroniques (VIH, tuberculose). Sélection multiple car un ménage peut avoir des membres atteints d'affections différentes, ou un membre avec plusieurs co-morbidités. Sensible parce que le statut de maladie chronique peut être stigmatisant. Ne poser que si `chronic_condition_in_hh` est `yes`."
  es: "Tipo(s) de condición crónica diagnosticada presente entre los miembros del hogar, tomados del vocabulario `chronic-condition-type` que cubre ENT (hipertensión, diabetes, cardiovascular, respiratoria crónica, cáncer, enfermedad mental crónica, epilepsia) y enfermedades transmisibles crónicas (VIH, tuberculosis). Selección múltiple porque un hogar puede tener miembros con distintas condiciones, o un miembro con co-morbilidades. Sensible porque el estado de enfermedad crónica puede ser estigmatizante. Preguntar solo si `chronic_condition_in_hh` es `yes`."

type: string
cardinality: multiple
