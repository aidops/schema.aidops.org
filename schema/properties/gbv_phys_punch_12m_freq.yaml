id: gbv_phys_punch_12m_freq
maturity: draft
label:
  en: "Physical IPV (12m frequency): punched"
  fr: "VPI physique (fréquence 12m) : frappée avec le poing"
  es: "VPI física (frecuencia 12m): golpeada con el puño"

definition:
  en: >
    Frequency of partner punching the respondent in the past 12 months. DHS instrument item
    DV05B for act DV05A-iv. Asked only if gbv_phys_punch_lifetime = true (skip logic: if
    lifetime = false, this property is not asked). DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des coups de poing du partenaire sur la répondante au cours des 12 derniers mois.
    Item DHS DV05B pour DV05A-iv. Posée uniquement si gbv_phys_punch_lifetime = vrai.
    Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero golpee a la encuestada con el puño en los últimos 12 meses.
    Ítem DHS DV05B para DV05A-iv. Se pregunta solo si gbv_phys_punch_lifetime = verdadero.
    Compatible DHS-7+.

type: string
cardinality: single
