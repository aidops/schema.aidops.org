id: aap_psea_integrity_breach_reported
maturity: draft
label:
  en: "AAP: PSEA-adjacent integrity breach reported (derived canary)"
  fr: "Redevabilité : Atteinte à l'intégrité liée à la PSEA signalée (dérivé sentinelle)"
  es: "Rendición de cuentas: Violación de integridad relacionada con PSEA reportada (derivado centinela)"
definition:
  en: "Derived household-level boolean canary indicator: true if `aap_no_one_asked_for_payment = no` (meaning someone DID ask the household or someone they know for payment, unpaid work, goods, or personal favours in exchange for aid or registration). Maps to IASC PSEA Minimum Operating Standard and to CHS 2024 Commitments 8 and 9. Elevated community-level rates must trigger programmatic review. Classified `sensitive` because true values indicate a suspected integrity breach. Does NOT record perpetrator details; those belong to a specialist case-management protocol."
  fr: "Indicateur booléen dérivé sentinelle au niveau ménage : vrai si `aap_no_one_asked_for_payment = no` (ce qui signifie que quelqu'un A demandé au ménage ou à une personne qu'il connaît un paiement, un travail non rémunéré, des biens ou des faveurs personnelles en échange d'aide ou d'inscription). Correspond à la Norme minimale opérationnelle PSEA IASC et aux Engagements 8 et 9 de la CHS 2024. Des taux élevés au niveau communautaire doivent déclencher une révision programmatique. Classé `sensitive` car les valeurs vraies indiquent une atteinte à l'intégrité présumée. N'enregistre PAS les détails sur l'auteur ; ceux-ci appartiennent à un protocole spécialisé de gestion de cas."
  es: "Indicador booleano derivado centinela a nivel de hogar: verdadero si `aap_no_one_asked_for_payment = no` (lo que significa que alguien SÍ pidió al hogar o a una persona que conoce un pago, trabajo no remunerado, bienes o favores personales a cambio de ayuda o registro). Corresponde a la Norma Mínima Operativa PSEA de IASC y a los Compromisos 8 y 9 de la CHS 2024. Tasas comunitarias elevadas deben desencadenar una revisión programática. Clasificado como `sensitive` porque los valores verdaderos indican una violación de integridad sospechada. NO registra detalles del perpetrador; estos pertenecen a un protocolo especializado de gestión de casos."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: scores
sensitivity: sensitive
