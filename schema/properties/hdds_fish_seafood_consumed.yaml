id: hdds_fish_seafood_consumed
maturity: draft
label:
  en: "HDDS fish and seafood consumed"
  fr: "SDAM poisson et fruits de mer consommés"
  es: "EDDA pescado y mariscos consumidos"

definition:
  en: "Whether any member of the household consumed an item from the fish and seafood food group in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe du poisson et des fruits de mer au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de pescado y mariscos en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

