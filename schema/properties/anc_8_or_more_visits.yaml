id: anc_8_or_more_visits
maturity: draft
label:
  en: Received 8 or more ANC contacts (derived)
  fr: "A reçu 8 contacts prénataux ou plus (dérivé)"
  es: Recibió 8 o más contactos de APN (derivado)
definition:
  en: "Derived indicator: true if anc_visits_count = 8_or_more. The WHO 2016 recommended minimum of 8 antenatal contacts for a positive pregnancy experience. Less universally tracked in routine monitoring than 4+ but increasingly used as the primary coverage numerator in DHS-8."
  fr: "Indicateur dérivé : vrai si anc_visits_count = 8_or_more. Le minimum recommandé par l'OMS 2016 de 8 contacts prénataux pour une expérience de grossesse positive. Moins universellement suivi dans le suivi routinier que 4+ mais de plus en plus utilisé comme numérateur de couverture principal dans le DHS-8."
  es: "Indicador derivado: verdadero si anc_visits_count = 8_or_more. El mínimo recomendado por la OMS 2016 de 8 contactos prenatales para una experiencia positiva del embarazo. Menos universalmente rastreado en el monitoreo rutinario que 4+ pero cada vez más utilizado como numerador de cobertura principal en DHS-8."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: derived_mnh
age_applicability:
  - adult
sensitivity: sensitive
