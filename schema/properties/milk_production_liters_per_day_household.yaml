id: milk_production_liters_per_day_household
maturity: draft
label:
  en: "Average daily milk production (liters) — all animals, last 7 days"
  fr: "Production laitière quotidienne moyenne (litres) — tous animaux, 7 derniers jours"
  es: "Producción diaria promedio de leche (litros) — todos los animales, últimos 7 días"

definition:
  en: "Average daily milk production in liters from all of the household's animals (camels, cattle, goats, sheep) over the last 7 days. The 7-day recall is recommended by FSNAU over a 24-hour recall to reduce measurement error from single-day variation — milk production varies dramatically with season, lactation stage, and water availability. Allow decimal values (0.5-liter increments for enumerator prompts); use 0.0 when animals produced no milk. In contexts where liters are unfamiliar, enumerators may prompt with cup equivalents (1 cup = approximately 0.25 liters). This is the primary food-source indicator for pastoral households — it is wholly absent from FoodSecurityProfile (which captures only whether dairy was consumed in HDDS/FCS, not household production volume). Caloric contribution can be estimated post-hoc at analysis time using FAO food composition values (camel milk ~610 kcal/liter, cattle milk ~650 kcal/liter, goat milk ~690 kcal/liter). Grounded in FSNAU seasonal assessment milk production items (primary canonical source for Horn of Africa), HEA pastoral baseline milk production module, LEGS 3rd edition Chapter 4, IPC AFI pastoral annex Section 4.3, and FEWSNET Livelihoods Monitoring Framework."
  fr: "Production laitière quotidienne moyenne en litres de tous les animaux du ménage (chameaux, bovins, caprins, ovins) au cours des 7 derniers jours. Le rappel de 7 jours est recommandé par FSNAU par rapport à un rappel de 24 heures pour réduire l'erreur de mesure due à la variation journalière. Autoriser les valeurs décimales (incréments de 0,5 litre pour les invites de l'énumérateur) ; utiliser 0,0 lorsque les animaux n'ont pas produit de lait. Il s'agit de l'indicateur principal de source alimentaire pour les ménages pastoraux — totalement absent du FoodSecurityProfile (qui ne capture que si des produits laitiers ont été consommés dans HDDS/FCS, pas le volume de production du ménage)."
  es: "Producción diaria promedio de leche en litros de todos los animales del hogar (camellos, bovinos, caprinos, ovinos) durante los últimos 7 días. El recordatorio de 7 días es recomendado por FSNAU sobre el recordatorio de 24 horas para reducir el error de medición por variación diaria. Permitir valores decimales (incrementos de 0.5 litros para indicaciones del enumerador); usar 0.0 cuando los animales no producen leche. Es el indicador principal de fuente alimentaria para hogares pastorales — completamente ausente del FoodSecurityProfile (que solo captura si se consumieron lácteos en HDDS/FCS, no el volumen de producción del hogar)."

