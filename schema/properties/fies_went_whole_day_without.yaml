id: fies_went_whole_day_without
maturity: draft
label:
  en: "FIES whole day without food"
  fr: "FIES journée entière sans nourriture"
  es: "FIES día entero sin comer"

definition:
  en: "Whether, at any time during the FIES reference period, a member of the household went without eating for a whole day because of lack of resources. One of eight experience-based items in the FAO Food Insecurity Experience Scale (FIES); the reference period is recorded in recall_period_days."
  fr: "Si, à un moment quelconque de la période de référence FIES, un membre du ménage est resté toute une journée sans manger par manque de ressources. L'un des huit items expérientiels de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO ; la période de référence est enregistrée dans recall_period_days."
  es: "Si en algún momento durante el período de referencia FIES, algún miembro del hogar pasó un día entero sin comer por falta de recursos. Uno de los ocho ítems basados en experiencia de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO; el período de referencia se registra en recall_period_days."

type: boolean
cardinality: single
