id: handwashing_facility_present
maturity: draft
label:
  en: "Handwashing facility present"
  fr: "Présence d'un dispositif de lavage des mains"
  es: "Instalación para lavado de manos presente"

definition:
  en: "Whether the household has a place where hands can be washed, and whether it was directly observed by the enumerator. JMP H1 (enumerator observation). The JMP-recommended method is to ask to see the handwashing facility; direct observation is more reliable than self-report. A handwashing facility may be fixed (sink with tap) or mobile (tippy-tap, bucket with tap, designated jug or basin). Codes: yes_observed = facility seen by enumerator; yes_not_observed_but_reported = household reports facility but enumerator could not observe; no = no facility."
  fr: "Si le ménage dispose d'un endroit pour se laver les mains, et si cela a été directement observé par l'énumérateur. JMP H1 (observation de l'énumérateur). La méthode recommandée par le JMP est de demander à voir le dispositif de lavage des mains ; l'observation directe est plus fiable que l'auto-déclaration. Un dispositif de lavage des mains peut être fixe (évier avec robinet) ou mobile (tippy-tap, seau avec robinet, cruche ou bassine désignée). Codes : yes_observed = dispositif vu par l'énumérateur ; yes_not_observed_but_reported = le ménage déclare disposer d'un dispositif mais l'énumérateur n'a pas pu l'observer ; no = aucun dispositif."
  es: "Si el hogar tiene un lugar donde se pueden lavar las manos, y si fue directamente observado por el enumerador. JMP H1 (observación del enumerador). El método recomendado por el JMP es pedir ver la instalación de lavado de manos; la observación directa es más confiable que la autodeclaración. Una instalación para lavado de manos puede ser fija (fregadero con grifo) o móvil (tippy-tap, cubo con grifo, jarra o palangana designada). Códigos: yes_observed = instalación vista por el enumerador; yes_not_observed_but_reported = el hogar reporta instalación pero el enumerador no pudo observarla; no = sin instalación."

type: string
cardinality: single
core: true
vocabulary: hwf-presence-observation
references: null
category: hygiene
valid_instruments: [jmp_household_survey, mics6, mics7]
