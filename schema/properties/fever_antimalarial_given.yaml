id: fever_antimalarial_given
maturity: draft
label:
  en: "Antimalarial given for fever"
  fr: "Antipaludéen administré pour la fièvre"
  es: "Antipalúdico administrado para la fiebre"

definition:
  en: "Whether the child was given any medicine for malaria or fever — an antimalarial drug. Published wording: 'Was (name) given any medicine for malaria or fever — an antimalarial drug?' Key indicator for malaria-endemic settings. Ask only if fever_last_2wks is true. DHS code h24; MICS code ML4."
  fr: "Si l'enfant a reçu un médicament contre le paludisme ou la fièvre — un antipaludéen. Formulation publiée : « (Prénom) a-t-il/elle reçu un médicament contre le paludisme ou la fièvre — un antipaludéen ? » Indicateur clé pour les contextes d'endémie palustre. Posez uniquement si fever_last_2wks est vrai. Code DHS h24 ; code MICS ML4."
  es: "Si al niño se le administró algún medicamento para la malaria o la fiebre — un antipalúdico. Redacción publicada: '¿Se le administró a (nombre) algún medicamento para la malaria o la fiebre — un antipalúdico?' Indicador clave para entornos endémicos de malaria. Preguntar solo si fever_last_2wks es verdadero. Código DHS h24; código MICS ML4."

type: boolean
cardinality: single
core: true
