id: weai_group_influential
maturity: draft
label:
  en: "WEAI group influence on community decisions"
  fr: "WEAI influence du groupe sur les décisions communautaires"
  es: "WEAI influencia del grupo en decisiones comunitarias"

definition:
  en: "To what extent a group the respondent belongs to influences community decisions or resources. Asked for each group the respondent is an active member of. Part of pro-WEAI Indicator C2 (membership in influential groups), an optional indicator. Adequacy requires at least one group rated medium_extent or high_extent."
  fr: "Dans quelle mesure un groupe auquel appartient le répondant influence-t-il les décisions ou les ressources communautaires. Posée pour chaque groupe dont le répondant est un membre actif. Fait partie de l'indicateur C2 du pro-WEAI (appartenance à des groupes influents), un indicateur facultatif. L'adéquation nécessite qu'au moins un groupe soit évalué medium_extent ou high_extent."
  es: "En qué medida un grupo al que pertenece el encuestado influye en las decisiones o recursos de la comunidad. Se pregunta para cada grupo del que el encuestado es miembro activo. Parte del Indicador C2 del pro-WEAI (membresía en grupos influyentes), un indicador opcional. La adecuación requiere al menos un grupo calificado como medium_extent o high_extent."

type: string
cardinality: single
core: false
vocabulary: weai-participation-capacity-4
references: null
category: collective_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
