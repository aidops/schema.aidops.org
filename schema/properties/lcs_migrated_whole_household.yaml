id: lcs_migrated_whole_household
maturity: draft
label:
  en: "LCS migrated whole household"
  fr: "SCM migration totale du ménage"
  es: "EMV migración del hogar completo"

definition:
  en: "Frequency with which the whole household migrated to meet food needs in the past 30 days, distinct from seasonal or individual labour migration. Part of the WFP Livelihood Coping Strategies (LCS) module, emergency tier."
  fr: "Fréquence à laquelle l'ensemble du ménage a migré pour répondre à ses besoins alimentaires au cours des trente derniers jours, à distinguer de la migration saisonnière ou individuelle pour le travail. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau d'urgence."
  es: "Frecuencia con la que todo el hogar migró para cubrir sus necesidades alimentarias en los últimos treinta días, distinto de la migración estacional o individual por trabajo. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de emergencia."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
