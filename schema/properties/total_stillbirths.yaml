id: total_stillbirths
maturity: draft
label:
  en: Total pregnancies ending in stillbirth
  fr: "Total de grossesses se terminant par une mortinaissance"
  es: Total de embarazos que terminaron en mortinato
definition:
  en: "The number of pregnancies that ended in a stillbirth (baby born dead). DHS-8 v228 (terminated pregnancies); MICS6 CM8. Brief summary count only; a full pregnancy loss history belongs in a future MortalityProfile. Needed to complete the ANC and PNC denominator per DHS-8 convention (both live births and stillbirths are included in the recall-period denominator)."
  fr: "Le nombre de grossesses qui se sont terminées par une mortinaissance (bébé né mort). DHS-8 v228 (grossesses terminées) ; MICS6 CM8. Compte sommaire uniquement ; un historique complet des pertes de grossesse appartient à un futur MortalityProfile. Nécessaire pour compléter le dénominateur CPN et SPN selon la convention DHS-8 (les naissances vivantes et les mortinaissances sont incluses dans le dénominateur de la période de rappel)."
  es: "El número de embarazos que terminaron en mortinato (bebé nacido muerto). DHS-8 v228 (embarazos terminados); MICS6 CM8. Solo recuento resumido; un historial completo de pérdidas de embarazo pertenece a un futuro MortalityProfile. Necesario para completar el denominador de APN y PPN según la convención DHS-8 (tanto los nacimientos vivos como los mortinatos se incluyen en el denominador del período de recordatorio)."
type: integer
cardinality: single
core: false
vocabulary: null
references: null
category: pregnancy_history
age_applicability:
  - adult
sensitivity: sensitive
