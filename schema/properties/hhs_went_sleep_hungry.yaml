id: hhs_went_sleep_hungry
maturity: draft
label:
  en: "HHS went to sleep hungry"
  fr: "EFM s'est couché affamé"
  es: "EHH se fue a dormir con hambre"

definition:
  en: "Frequency with which, in the past 30 days, any household member went to sleep at night hungry because there was not enough food. One of three items in the FANTA Household Hunger Scale."
  fr: "Fréquence à laquelle, au cours des 30 derniers jours, un membre du ménage s'est couché le soir affamé parce qu'il n'y avait pas assez de nourriture. L'un des trois items de l'Échelle de la faim du ménage (HHS) de FANTA."
  es: "Frecuencia con la que, en los últimos 30 días, algún miembro del hogar se fue a dormir por la noche con hambre porque no había suficiente comida. Uno de los tres ítems de la Escala de Hambre del Hogar (HHS) de FANTA."

type: string
cardinality: single
vocabulary: hhs-frequency
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [fanta_hhs]
