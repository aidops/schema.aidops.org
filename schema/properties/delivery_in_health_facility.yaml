id: delivery_in_health_facility
maturity: draft
label:
  en: Delivery in a health facility (derived)
  fr: "Accouchement dans un établissement de santé (dérivé)"
  es: Parto en un establecimiento de salud (derivado)
definition:
  en: "Derived indicator: true if delivery_place is any facility code (public_hospital, public_health_centre, public_health_post, private_hospital_clinic, or ngo_facility). False if delivery_place is home_own, home_other, or other. SDG 3.1.2-adjacent indicator; used as denominator for some skilled birth attendance analyses."
  fr: "Indicateur dérivé : vrai si delivery_place est un code d'établissement (public_hospital, public_health_centre, public_health_post, private_hospital_clinic ou ngo_facility). Faux si delivery_place est home_own, home_other ou other. Indicateur adjacent à l'ODD 3.1.2 ; utilisé comme dénominateur pour certaines analyses de l'assistance qualifiée à l'accouchement."
  es: "Indicador derivado: verdadero si delivery_place es cualquier código de establecimiento (public_hospital, public_health_centre, public_health_post, private_hospital_clinic o ngo_facility). Falso si delivery_place es home_own, home_other u other. Indicador adyacente al ODS 3.1.2; utilizado como denominador para algunos análisis de asistencia calificada al parto."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: derived_mnh
age_applicability:
  - adult
sensitivity: sensitive
