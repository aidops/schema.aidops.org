id: aap_aid_quantity_sufficient
maturity: draft
label:
  en: "AAP: Aid quantity perceived sufficient"
  fr: "Redevabilité : Quantité d'aide perçue comme suffisante"
  es: "Rendición de cuentas: Cantidad de ayuda percibida como suficiente"

definition:
  en: "Household's perception of whether the quantity of aid received was enough for its needs. Perception-based: the objective measure (rations meeting Sphere calorie minima, shelter kits meeting Sphere completeness) belongs to sector profiles (FoodSecurityProfile, ShelterAdequacyProfile, WASHAssessmentProfile) and can be triangulated. Source: IASC / REACH Menu 2018; OCHA oPt MSNA quantity-satisfaction indicator."
  fr: "Perception du ménage quant à savoir si la quantité d'aide reçue était suffisante pour ses besoins. Fondé sur la perception : la mesure objective (rations atteignant les minima caloriques Sphère, kits abri atteignant la complétude Sphère) appartient aux profils sectoriels (Profil de sécurité alimentaire, Profil d'adéquation de l'abri, Profil d'évaluation EHA) et peut être triangulée. Source : Menu IASC / REACH 2018 ; indicateur de satisfaction quantitative OCHA MSNA oPt."
  es: "Percepción del hogar sobre si la cantidad de ayuda recibida era suficiente para sus necesidades. Basado en percepción: la medida objetiva (raciones que cumplen con los mínimos calóricos de Esfera, kits de refugio que cumplen con la completitud de Esfera) pertenece a los perfiles sectoriales (Perfil de Seguridad Alimentaria, Perfil de Adecuación del Refugio, Perfil de Evaluación WASH) y puede triangularse. Fuente: Menú IASC / REACH 2018; indicador de satisfacción con cantidad de OCHA MSNA oPt."

