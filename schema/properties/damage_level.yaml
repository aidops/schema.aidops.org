id: damage_level
maturity: draft
label:
  en: "Damage level"
  fr: "Niveau de dommage"
  es: "Nivel de daño"

definition:
  en: "Severity of physical damage to the assessed dwelling, observed during a post-shock structural assessment. Recorded against a standardized five-tier scale aligned with IOM Displacement Tracking Matrix labels."
  fr: "Gravité des dommages physiques au logement évalué, observée lors d'une évaluation structurelle post-choc. Consignée selon une échelle standardisée à cinq niveaux alignée sur les libellés de la Displacement Tracking Matrix de l'OIM."
  es: "Gravedad de los daños físicos a la vivienda evaluada, observada durante una evaluación estructural post-choque. Registrada en una escala estandarizada de cinco niveles alineada con las etiquetas de la Matriz de Seguimiento del Desplazamiento de la OIM."

type: string
cardinality: single
