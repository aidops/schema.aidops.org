id: gbv_ctrl_controls_money
maturity: draft
label:
  en: "Controlling behavior: does not trust with money (financial control)"
  fr: "Comportement de contrôle : ne lui fait pas confiance avec l'argent"
  es: "Comportamiento controlador: no le confía el dinero (control financiero)"

definition:
  en: >
    Whether the referent partner does not or did not trust the respondent with money, exercising
    financial control. DHS instrument item DV03f. Reference period: ever (relationship pattern).
    Response options use the yes-no-dk vocabulary. Note: DV03f is part of the extended DHS
    controlling-behavior battery; surveys running only the minimal 5-item battery (DV03a-e) may
    omit this item. DHS-7+ compatible where included. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent ne fait pas ou ne faisait pas confiance à la répondante avec
    l'argent, exerçant un contrôle financier. Item DHS DV03f. Période de référence : toujours.
    Item de la batterie étendue DHS; peut être absent dans les enquêtes utilisant seulement les
    5 items canoniques (DV03a-e). Compatible DHS-7+ si inclus.
  es: >
    Si el compañero referente no confía o no confiaba a la encuestada el dinero, ejerciendo
    control financiero. Ítem DHS DV03f. Período de referencia: alguna vez. Ítem de la batería
    extendida DHS; puede estar ausente en encuestas que usan solo los 5 ítems canónicos (DV03a-e).
    Compatible DHS-7+ cuando se incluye.

type: string
cardinality: single
vocabulary: yes-no-dk
references: null
category: gbv_controlling
core: false
sensitivity: restricted
