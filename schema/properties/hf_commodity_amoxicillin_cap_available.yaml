label:
  en: "Amoxicillin capsule/tablet available and within expiry"
  fr: "Amoxicilline en capsule/comprimé disponible et non périmée"
  es: "Amoxicilina en cápsula/tableta disponible y vigente"

definition:
  en: "Whether amoxicillin capsule or tablet (250 mg or 500 mg, adult formulation) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA tracer (M2); WHO EML. Extended (non-core). Sensitive: stock-out reporting is politically sensitive."
  fr: "Si l'amoxicilline en capsule ou comprimé (250 mg ou 500 mg, formulation adulte) est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA (M2) ; EML de l'OMS. Étendu (non-core). Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si la amoxicilina en cápsula o tableta (250 mg o 500 mg, formulación adulta) está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA (M2); EML de la OMS. Extendido (no-core). Sensible: el reporte de desabastecimientos es políticamente sensible."

