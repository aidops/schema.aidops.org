id: gbv_phys_push_shake_throw_12m_freq
maturity: draft
label:
  en: "Physical IPV (12m frequency): pushed, shaken, or had something thrown"
  fr: "VPI physique (fréquence 12m) : poussée, secouée ou objet lancé"
  es: "VPI física (frecuencia 12m): empujada, sacudida o le lanzaron algo"

definition:
  en: >
    Frequency of partner pushing, shaking, or throwing something at the respondent in the past
    12 months. DHS instrument item DV05B for act DV05A-i. Asked only if
    gbv_phys_push_shake_throw_lifetime = true (skip logic: if lifetime = false, this property
    is not asked and should be recorded as missing). DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des actes de pousser, secouer ou lancer un objet sur la répondante au cours des
    12 derniers mois. Item DHS DV05B pour l'acte DV05A-i. Posée uniquement si
    gbv_phys_push_shake_throw_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero empuje, sacuda o lance algo a la encuestada en los últimos
    12 meses. Ítem DHS DV05B para el acto DV05A-i. Se pregunta solo si
    gbv_phys_push_shake_throw_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_physical_ipv
core: false
sensitivity: restricted
