id: wdds_other_fruits_consumed
maturity: draft
label:
  en: "WDDS other fruits consumed"
  fr: "WDDS autres fruits consommés"
  es: "WDDS otras frutas consumidas"

definition:
  en: "Whether the woman consumed other fruits (not vitamin-A-rich) in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé d'autres fruits (non riches en vitamine A) au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió otras frutas (que no sean ricas en vitamina A) en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

