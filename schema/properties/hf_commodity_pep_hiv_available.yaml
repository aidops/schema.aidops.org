id: hf_commodity_pep_hiv_available
maturity: draft
label:
  en: "HIV post-exposure prophylaxis (PEP) available and within expiry"
  fr: "Prophylaxie post-exposition au VIH (PPE) disponible et non périmée"
  es: "Profilaxis post-exposición al VIH (PEP) disponible y vigente"

definition:
  en: "Whether HIV post-exposure prophylaxis (PEP) is available today on the shelf and within valid expiration date for use within 72 hours of exposure (including following sexual assault). Observed by the enumerator. MISP Objective 2 tracer. Sensitive: SGBV-service and HIV availability are politically and culturally sensitive."
  fr: "Si la prophylaxie post-exposition au VIH (PPE) est disponible aujourd'hui en rayon et dans son délai de péremption pour utilisation dans les 72 heures suivant l'exposition (y compris après une agression sexuelle). Observé par l'enquêteur. Indicateur traceur MISP Objectif 2. Sensible : la disponibilité des services VBG et VIH est politiquement et culturellement sensible."
  es: "Si la profilaxis post-exposición al VIH (PEP) está disponible hoy en estantería y dentro de fecha de vencimiento válida para uso dentro de 72 horas de la exposición (incluso tras agresión sexual). Observado por el enumerador. Indicador trazador MISP Objetivo 2. Sensible: la disponibilidad de servicios VBG y VIH es política y culturalmente sensible."

type: boolean
cardinality: single
core: true
