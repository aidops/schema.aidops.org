id: cl_hazard_temperature
maturity: draft
label:
  en: "Exposure to extreme cold, heat, or humidity"
  fr: "Exposition au froid, à la chaleur ou à l'humidité extrêmes"
  es: "Exposición a frío, calor o humedad extremos"
definition:
  en: "Whether the child was exposed to extreme cold, heat, or humidity while performing economic activity in the past 7 days. MICS 6 CL6 B. Asked only if any of the CL1 economic-activity items is yes. A yes flags hazardous work under the ILO/UNICEF 2020 child-labour definition."
  fr: "Si l'enfant a été exposé au froid, à la chaleur ou à l'humidité extrêmes pendant son activité économique au cours des 7 derniers jours. MICS 6 CL6 B. Posé uniquement si l'un des items CL1 d'activité économique est oui. Un oui signale un travail dangereux selon la définition OIT/UNICEF 2020 du travail des enfants."
  es: "Si el niño estuvo expuesto a frío, calor o humedad extremos mientras realizaba actividad económica en los últimos 7 días. MICS 6 CL6 B. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Un sí señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
