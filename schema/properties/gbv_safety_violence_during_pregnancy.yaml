id: gbv_safety_violence_during_pregnancy
maturity: draft
label:
  en: "Safety signal: physical violence during pregnancy"
  fr: "Signal de sécurité : violence physique pendant la grossesse"
  es: "Señal de seguridad: violencia física durante el embarazo"

definition:
  en: >
    Whether anyone has ever hit, slapped, kicked, or done anything else to physically hurt the
    respondent while she was pregnant. DHS instrument item DV20. Lifetime reference period (ever,
    any pregnancy). Note: this item uses broader 'anyone' framing rather than partner-only; it is
    a proxy safety signal and reproductive-health IPV indicator, not a distinct domain.
    Perpetrator identity is captured in gbv_safety_violence_preg_perpetrator. If true,
    gbv_safety_violence_preg_perpetrator is asked. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si quelqu'un a jamais frappé, giflé, donné des coups de pied ou fait autre chose pour blesser
    physiquement la répondante pendant qu'elle était enceinte. Item DHS DV20. Période de référence :
    à vie (toute grossesse). Formulation large 'quelqu'un'. Si vrai, gbv_safety_violence_preg_perpetrator
    est posée.
  es: >
    Si alguien alguna vez golpeó, abofeteó, pateó o hizo algo para lastimar físicamente a la
    encuestada mientras estaba embarazada. Ítem DHS DV20. Período de referencia: de por vida
    (cualquier embarazo). Formulación amplia 'alguien'. Si verdadero, se pregunta
    gbv_safety_violence_preg_perpetrator.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_safety_signals
core: false
sensitivity: restricted
