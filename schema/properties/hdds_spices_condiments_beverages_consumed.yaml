id: hdds_spices_condiments_beverages_consumed
maturity: draft
label:
  en: "HDDS spices, condiments and beverages consumed"
  fr: "SDAM épices, condiments et boissons consommés"
  es: "EDDA especias, condimentos y bebidas consumidos"

definition:
  en: "Whether any member of the household consumed an item from the spices, condiments, and beverages food group (FAO group 12) in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des épices, condiments et boissons (groupe FAO 12) au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de especias, condimentos y bebidas (grupo FAO 12) en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
