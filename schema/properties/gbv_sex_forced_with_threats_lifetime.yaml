id: gbv_sex_forced_with_threats_lifetime
maturity: draft
label:
  en: "Sexual IPV (lifetime): forced to perform sexual acts through threats or other means"
  fr: "VPI sexuelle (vie entière) : forcée par des menaces ou autres moyens à accomplir des actes sexuels"
  es: "VPI sexual (de por vida): forzada mediante amenazas u otros medios a realizar actos sexuales"

definition:
  en: >
    Whether the referent partner has ever forced the respondent to perform sexual acts through
    threats, intimidation, or any other means (not restricted to physical force). DHS instrument
    item DV05A-x. Lifetime reference period (ever). This item captures coerced sex beyond direct
    physical force; it is always classified as severe sexual IPV. If true, the follow-up 12-month
    frequency property gbv_sex_forced_with_threats_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais forcé la répondante à accomplir des actes sexuels par des
    menaces, intimidations ou tout autre moyen. Item DHS DV05A-x. Période de référence : à vie.
    Toujours classé comme VPI sexuelle grave. Si vrai, gbv_sex_forced_with_threats_12m_freq est
    posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez forzó a la encuestada a realizar actos sexuales mediante
    amenazas, intimidación u otros medios. Ítem DHS DV05A-x. Período de referencia: de por vida.
    Siempre clasificado como VPI sexual grave. Si verdadero, se pregunta
    gbv_sex_forced_with_threats_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
