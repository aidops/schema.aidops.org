id: wdds_nuts_seeds_consumed
maturity: draft
label:
  en: "WDDS nuts and seeds consumed"
  fr: "WDDS noix et graines consommées"
  es: "WDDS nueces y semillas consumidas"

definition:
  en: "Whether the woman consumed an item from the nuts and seeds food group in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé un aliment du groupe des noix et graines au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió un alimento del grupo de nueces y semillas en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

type: boolean
