id: livestock_loss_cause
maturity: draft
label:
  en: "Primary cause of livestock losses in the last 12 months"
  fr: "Cause principale des pertes de bétail au cours des 12 derniers mois"
  es: "Causa principal de las pérdidas de ganado en los últimos 12 meses"

definition:
  en: "The primary cause of the livestock deaths or losses recorded in `livestock_losses_count_past_12mo`, captured as a single-select code from vocabulary `livestock-loss-cause`. Asked alongside the loss count to enable attrition-cause analysis for IPC classification and LEGS emergency response categorization. Where multiple causes contributed, respondent selects the cause responsible for the majority of losses. Note: responses with code `raiding_theft` and `conflict_collateral` should be treated as partially sensitive (see sensitivity field) and aggregated to community level before sharing with non-programme partners. Recall period: 12 months."
  fr: "La cause principale des décès ou pertes de bétail enregistrés dans `livestock_losses_count_past_12mo`, capturée comme code de sélection unique dans le vocabulaire `livestock-loss-cause`. Posée en parallèle du comptage des pertes pour permettre l'analyse des causes d'attrition pour la classification IPC et la catégorisation de la réponse d'urgence LEGS. Lorsque plusieurs causes ont contribué, le répondant sélectionne la cause responsable de la majorité des pertes. Note : les réponses avec le code `raiding_theft` et `conflict_collateral` doivent être traitées comme partiellement sensibles et agrégées au niveau communautaire avant tout partage avec des partenaires non-programme. Période de rappel : 12 mois."
  es: "La causa principal de las muertes o pérdidas de ganado registradas en `livestock_losses_count_past_12mo`, capturada como código de selección única del vocabulario `livestock-loss-cause`. Se pregunta junto con el conteo de pérdidas para permitir el análisis de causas de desgaste para la clasificación IPC y la categorización de respuesta de emergencia LEGS. Cuando múltiples causas contribuyeron, el encuestado selecciona la causa responsable de la mayoría de las pérdidas. Nota: las respuestas con código `raiding_theft` y `conflict_collateral` deben tratarse como parcialmente sensibles y agregarse al nivel comunitario antes de compartir con socios fuera del programa. Período de recordatorio: 12 meses."

type: string
cardinality: single
core: true
vocabulary: livestock-loss-cause
references: null
category: pastoral_herd
sensitivity: sensitive
