id: vacc_ipv
maturity: draft
label:
  en: "IPV (inactivated polio vaccine) vaccination status"
  fr: "Statut vaccinal VPI (vaccin antipoliomyélitique inactivé)"
  es: "Estado de vacunación VPI (vacuna antipoliomielítica inactivada)"

definition:
  en: "Whether the child received the inactivated polio vaccine (IPV) injection. Published recall wording: 'Was an IPV injection given — an injectable polio vaccine?' Single dose; increasingly added to national EPI schedules alongside OPV3 per the WHO global polio eradication strategy. Country-specific — not universal. DHS code h9a; MICS code IM_IPV."
  fr: "Si l'enfant a reçu l'injection du vaccin antipoliomyélitique inactivé (VPI). Formulation de rappel publiée : « Une injection de VPI a-t-elle été administrée — un vaccin antipoliomyélitique injectable ? » Dose unique ; de plus en plus ajoutée aux calendriers EPI nationaux parallèlement au VPO3 conformément à la stratégie mondiale d'éradication de la polio de l'OMS. Spécifique au pays — non universel. Code DHS h9a ; code MICS IM_IPV."
  es: "Si el niño recibió la inyección de vacuna antipoliomielítica inactivada (VPI). Redacción de recordatorio publicada: '¿Se administró una inyección de VPI — una vacuna antipoliomielítica inyectable?' Dosis única; cada vez más añadida a los calendarios EPI nacionales junto con VPO3 según la estrategia mundial de erradicación de la polio de la OMS. Específica por país — no universal. Código DHS h9a; código MICS IM_IPV."

type: string
cardinality: single
core: false
vocabulary: vacc-status
references: null
category: vaccination
sensitivity: sensitive
age_applicability:
