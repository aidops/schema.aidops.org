id: fies_hungry
maturity: draft
label:
  en: "FIES hungry"
  fr: "FIES faim ressentie"
  es: "FIES tuvo hambre"

definition:
  en: "Whether, at any time during the FIES reference period, a member of the household was hungry but did not eat because of lack of resources. One of eight experience-based items in the FAO Food Insecurity Experience Scale (FIES); the reference period is recorded in recall_period_days."
  fr: "Si, à un moment quelconque de la période de référence FIES, un membre du ménage a eu faim mais n'a pas mangé par manque de ressources. L'un des huit items expérientiels de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO ; la période de référence est enregistrée dans recall_period_days."
  es: "Si en algún momento durante el período de referencia FIES, algún miembro del hogar tuvo hambre pero no comió por falta de recursos. Uno de los ocho ítems basados en experiencia de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO; el período de referencia se registra en recall_period_days."

type: boolean
cardinality: single
