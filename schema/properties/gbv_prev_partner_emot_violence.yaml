id: gbv_prev_partner_emot_violence
maturity: draft
label:
  en: "Previous partner: ever experienced emotional violence"
  fr: "Partenaire précédent : a jamais subi de violences émotionnelles"
  es: "Compañero anterior: alguna vez experimentó violencia emocional"

definition:
  en: >
    Whether any previous husband or partner ever emotionally harmed the respondent. DHS instrument
    item DV15A (emotional violence component). Lifetime reference period (ever, from any previous
    partner). Secondary item; the primary battery addresses the referent partner. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si un mari ou partenaire précédent a jamais maltraité émotionnellement la répondante. Item DHS
    DV15A (composante violence émotionnelle). Période de référence : à vie. Item secondaire.
    Compatible DHS-7+.
  es: >
    Si algún marido o compañero anterior alguna vez maltrato emocionalmente a la encuestada. Ítem
    DHS DV15A (componente violencia emocional). Período de referencia: de por vida. Ítem secundario.
    Compatible DHS-7+.

type: boolean
cardinality: single
