id: wdds_other_vegetables_consumed
maturity: draft
label:
  en: "WDDS other vegetables consumed"
  fr: "WDDS autres légumes consommés"
  es: "WDDS otras verduras consumidas"

definition:
  en: "Whether the woman consumed other vegetables (not dark green leafy or vitamin-A-rich) in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé d'autres légumes (ni légumes-feuilles vert foncé ni riches en vitamine A) au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió otras verduras (que no sean de hoja verde oscuro ni ricas en vitamina A) en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

type: boolean
cardinality: single
