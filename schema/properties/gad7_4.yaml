definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by trouble relaxing. GAD-7 item 4, measuring difficulty relaxing. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par des difficultés à se détendre. GAD-7 item 4, mesurant la difficulté à se détendre. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por dificultades para relajarse. Ítem 4 del GAD-7, que mide la dificultad para relajarse. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

