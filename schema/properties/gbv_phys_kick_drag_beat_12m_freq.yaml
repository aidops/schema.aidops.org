id: gbv_phys_kick_drag_beat_12m_freq
maturity: draft
label:
  en: "Physical IPV (12m frequency): kicked, dragged, or beaten up"
  fr: "VPI physique (fréquence 12m) : frappée à coups de pied, traînée ou rouée de coups"
  es: "VPI física (frecuencia 12m): pateada, arrastrada o golpeada"

definition:
  en: >
    Frequency of partner kicking, dragging, or beating up the respondent in the past 12 months.
    DHS instrument item DV05B for act DV05A-v. Asked only if gbv_phys_kick_drag_beat_lifetime =
    true (skip logic: if lifetime = false, this property is not asked). DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des actes de frapper à coups de pied, traîner ou rouer de coups la répondante au
    cours des 12 derniers mois. Item DHS DV05B pour DV05A-v. Posée uniquement si
    gbv_phys_kick_drag_beat_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero patee, arrastre o golpee a la encuestada en los últimos
    12 meses. Ítem DHS DV05B para DV05A-v. Se pregunta solo si
    gbv_phys_kick_drag_beat_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_physical_ipv
core: false
sensitivity: restricted
