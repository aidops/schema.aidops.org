id: blankets_count
maturity: draft
label:
  en: "Number of usable blankets"
  fr: "Nombre de couvertures utilisables"
  es: "Número de frazadas utilizables"

definition:
  en: "Count of usable blankets or thick sleeping covers currently held by the household, for all members combined. Sphere Standard 1 key indicator: minimum one blanket and bedding per person. Together with household size, derives a per-person ratio that can be compared against the Sphere threshold."
  fr: "Nombre de couvertures ou couvertures de couchage épaisses utilisables actuellement détenues par le ménage, pour tous les membres confondus. Indicateur clé de la Norme Sphère 1 : minimum une couverture et literie par personne. Combiné à la taille du ménage, permet de dériver un ratio par personne comparable au seuil Sphère."
  es: "Cuenta de frazadas o cubiertas gruesas para dormir utilizables que tiene actualmente el hogar, para todos los miembros combinados. Indicador clave de la Norma Esfera 1: mínimo una frazada y ropa de cama por persona. Junto con el tamaño del hogar, deriva una razón por persona comparable con el umbral Esfera."

type: integer
cardinality: single
