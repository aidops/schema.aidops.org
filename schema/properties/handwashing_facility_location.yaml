id: handwashing_facility_location
maturity: draft
label:
  en: "Handwashing facility location"
  fr: "Emplacement du dispositif de lavage des mains"
  es: "Ubicación de la instalación para lavado de manos"

definition:
  en: "Location of the handwashing facility relative to the dwelling. Asked only when handwashing_facility_present is not 'no'. Location affects accessibility and use at critical junctures. Sphere guidance recommends handwashing facilities near latrines in displacement settings."
  fr: "Emplacement du dispositif de lavage des mains par rapport au logement. Demandé uniquement quand handwashing_facility_present n'est pas 'no'. L'emplacement affecte l'accessibilité et l'utilisation aux moments critiques. Les directives Sphère recommandent des dispositifs de lavage des mains près des latrines dans les contextes de déplacement."
  es: "Ubicación de la instalación para lavado de manos en relación con la vivienda. Preguntado solo cuando handwashing_facility_present no es 'no'. La ubicación afecta la accesibilidad y el uso en momentos críticos. Las directrices de Esfera recomiendan instalaciones para lavado de manos cerca de las letrinas en entornos de desplazamiento."

type: string
cardinality: single
core: false
