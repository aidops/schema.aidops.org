id: gad7_sum
maturity: draft
label:
  en: "GAD-7 total score"
  fr: "Score total GAD-7"
  es: "Puntaje total GAD-7"

definition:
  en: "The GAD-7 total anxiety severity score, calculated as the sum of the numeric values of items 1 through 7 (each 0-3). Range 0-21. A score of 10 or higher is the standard screening cut-off for probable generalized anxiety disorder."
  fr: "Le score total de sévérité de l'anxiété GAD-7, calculé comme la somme des valeurs numériques des items 1 à 7 (chacun de 0 à 3). Plage 0 à 21. Un score de 10 ou plus est le seuil de dépistage standard pour un trouble d'anxiété généralisée probable."
  es: "El puntaje total de severidad de ansiedad del GAD-7, calculado como la suma de los valores numéricos de los ítems 1 a 7 (cada uno de 0 a 3). Rango 0 a 21. Un puntaje de 10 o más es el punto de corte de tamizaje estándar para un trastorno de ansiedad generalizada probable."

