id: hf_commodity_oxytocin_available
maturity: draft
label:
  en: "Injectable oxytocin available and within expiry"
  fr: "Ocytocine injectable disponible et non périmée"
  es: "Oxitocina inyectable disponible y vigente"

definition:
  en: "Whether injectable oxytocin (5 or 10 IU) is available today, stored under refrigeration, and within valid expiration date. Observed by the enumerator. SARA (M-OB1); MISP Objective 4; WHO EML. Required for active management of third stage of labour. `not_applicable` when the facility offers no delivery services. Requires a functioning cold chain. Sensitive: stock-out reporting is politically sensitive."
  fr: "Si l'ocytocine injectable (5 ou 10 UI) est disponible aujourd'hui, stockée sous réfrigération et dans son délai de péremption. Observé par l'enquêteur. SARA (M-OB1) ; MISP Objectif 4 ; EML de l'OMS. Requise pour la gestion active de la troisième période de l'accouchement. `not_applicable` lorsque l'établissement n'offre pas de services d'accouchement. Nécessite une chaîne du froid fonctionnelle. Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si la oxitocina inyectable (5 o 10 UI) está disponible hoy, almacenada bajo refrigeración y dentro de fecha de vencimiento válida. Observado por el enumerador. SARA (M-OB1); MISP Objetivo 4; EML de la OMS. Requerida para el manejo activo del alumbramiento. `not_applicable` cuando el establecimiento no ofrece servicios de parto. Requiere cadena de frío funcional. Sensible: el reporte de desabastecimientos es políticamente sensible."

type: string
cardinality: single
core: true
vocabulary: yes-no-na
references: null
category: classification
sensitivity: sensitive
