id: livestock_losses_count_past_12mo
maturity: draft
label:
  en: "Total livestock losses in the last 12 months"
  fr: "Pertes totales de bétail au cours des 12 derniers mois"
  es: "Pérdidas totales de ganado en los últimos 12 meses"

definition:
  en: "Total number of animals the household lost due to any cause (drought, disease, raiding, natural disaster, conflict, or other) in the last 12 months. An integer count of all livestock deaths and disappearances regardless of species. Species-disaggregated losses are analytically preferable (LEGS recommends reporting camels and cattle separately from small ruminants) but are often too burdensome in rapid assessments; form authors can add a repeat group for species-disaggregated losses when time allows. The companion property `livestock_loss_cause` captures the primary cause code. Recall period: 12 months, consistent with LEGS initial assessment standards and HEA herd-attrition module. Grounded in LEGS 3rd edition initial assessment mortality items, FSNAU loss items, FEWSNET attrition analysis, HEA herd attrition module, and IPC AFI pastoral annex."
  fr: "Nombre total d'animaux perdus par le ménage pour toute cause (sécheresse, maladie, razzia, catastrophe naturelle, conflit ou autre) au cours des 12 derniers mois. Effectif entier de tous les décès et disparitions d'animaux indépendamment de l'espèce. Les pertes désagrégées par espèce sont analytiquement préférables (LEGS recommande de déclarer chameaux et bovins séparément des petits ruminants) mais souvent trop contraignantes dans les évaluations rapides. La propriété associée `livestock_loss_cause` capture le code de la cause principale. Période de rappel : 12 mois, conformément aux normes d'évaluation initiale LEGS et au module d'attrition du troupeau HEA."
  es: "Número total de animales que el hogar perdió por cualquier causa (sequía, enfermedad, rapiña, desastre natural, conflicto u otro) en los últimos 12 meses. Conteo entero de todas las muertes y desapariciones de animales independientemente de la especie. Las pérdidas desagregadas por especie son analíticamente preferibles (LEGS recomienda reportar camellos y bovinos separados de pequeños rumiantes) pero suelen ser demasiado onerosas en evaluaciones rápidas. La propiedad asociada `livestock_loss_cause` captura el código de la causa principal. Período de recordatorio: 12 meses, conforme a los estándares de evaluación inicial de LEGS y el módulo de desgaste del rebaño HEA."

type: integer
cardinality: single
core: true
