id: weai_account_access
maturity: draft
label:
  en: "WEAI financial account access"
  fr: "WEAI accès à un compte financier"
  es: "WEAI acceso a cuenta financiera"

definition:
  en: "Whether the respondent has access to a savings or bank account, including mobile money accounts, bank accounts, cooperative accounts, and informal group accounts. Part of pro-WEAI Indicator B3 Condition C: adequacy requires yes_solely or yes_jointly."
  fr: "Si le répondant a accès à un compte d'épargne ou bancaire, y compris les comptes de monnaie mobile, les comptes bancaires, les comptes coopératifs et les comptes de groupes informels. Fait partie de la condition C de l'indicateur B3 du pro-WEAI : l'adéquation nécessite yes_solely ou yes_jointly."
  es: "Si el encuestado tiene acceso a una cuenta de ahorro o bancaria, incluidas cuentas de dinero móvil, cuentas bancarias, cuentas cooperativas y cuentas de grupos informales. Parte de la Condición C del Indicador B3 del pro-WEAI: la adecuación requiere yes_solely o yes_jointly."

type: string
cardinality: single
core: true
vocabulary: weai-credit-decision
references: null
