id: cooking_fuel_cost_share
maturity: draft
label:
  en: "Cooking fuel cost as share of income"
  fr: "Coût du combustible de cuisson en part du revenu"
  es: "Costo del combustible de cocción como porcentaje del ingreso"

definition:
  en: "Banded estimate of the share of monthly household income spent on cooking fuel and stove costs. MTF cooking affordability attribute: Tier 4-5 criterion is met when fuel cost is less than 5% of household income, corresponding to the 'less_than_5_pct' band. Source: MTF household survey; WHO/World Bank harmonized questionnaire Q9."
  fr: "Estimation par tranche de la part du revenu mensuel du ménage consacrée au combustible de cuisson et aux coûts du foyer. Attribut d'accessibilité financière de cuisson MTF : le critère des niveaux 4 à 5 est satisfait lorsque le coût du combustible est inférieur à 5 % du revenu du ménage, correspondant à la tranche 'less_than_5_pct'. Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q9."
  es: "Estimación por bandas de la proporción del ingreso mensual del hogar gastada en combustible de cocción y costos de la cocina. Atributo de asequibilidad de cocción MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo del combustible es inferior al 5% del ingreso del hogar, correspondiendo a la banda 'less_than_5_pct'. Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q9."

type: string
cardinality: single
core: false
vocabulary: income-share-band
references: null
