id: electricity_evening_hours
maturity: draft
label:
  en: "Electricity available in evenings"
  fr: "Électricité disponible en soirée"
  es: "Electricidad disponible por las tardes"

definition:
  en: "Whether electricity is available in the evenings (between sunset and 10 pm) in the household. Evening supply is a separate MTF duration sub-attribute: Tier 1 and above require evening supply. Night and evening supply determines which productive activities, safety behaviors, and household tasks are supported. Source: MTF household survey."
  fr: "Si l'électricité est disponible en soirée (entre le coucher du soleil et 22 h) dans le ménage. L'alimentation en soirée est un sous-attribut distinct de la durée MTF : les niveaux 1 et supérieurs exigent une alimentation en soirée. L'alimentation nocturne et en soirée détermine les activités productives, les comportements de sécurité et les tâches ménagères qui sont pris en charge. Source : enquête ménage MTF."
  es: "Si la electricidad está disponible por las tardes (entre la puesta del sol y las 22 h) en el hogar. El suministro vespertino es un subatributo de duración MTF separado: el Nivel 1 y superiores requieren suministro vespertino. El suministro nocturno y vespertino determina qué actividades productivas, comportamientos de seguridad y tareas del hogar son posibles. Fuente: encuesta de hogares MTF."

type: boolean
cardinality: single
core: true
