id: diarrhea_ort_achieved
maturity: draft
label:
  en: "ORT achieved during diarrhea"
  fr: "TRO atteint pendant la diarrhée"
  es: "TRO alcanzado durante la diarrea"

definition:
  en: "Derived indicator: whether the child received oral rehydration therapy (ORT) during the diarrhea episode. True if diarrhea_ors_given is true, or diarrhea_rhf_given is true, or diarrhea_fluids_increased is true. Composite WHO/UNICEF joint indicator for appropriate diarrhea management. Computed in-form via a calculate field."
  fr: "Indicateur dérivé : si l'enfant a reçu une thérapie de réhydratation orale (TRO) pendant l'épisode de diarrhée. Vrai si diarrhea_ors_given est vrai, ou diarrhea_rhf_given est vrai, ou diarrhea_fluids_increased est vrai. Indicateur composite conjoint OMS/UNICEF pour la prise en charge appropriée de la diarrhée. Calculé dans le formulaire via un champ calculate."
  es: "Indicador derivado: si el niño recibió terapia de rehidratación oral (TRO) durante el episodio de diarrea. Verdadero si diarrhea_ors_given es verdadero, o diarrhea_rhf_given es verdadero, o diarrhea_fluids_increased es verdadero. Indicador compuesto conjunto OMS/UNICEF para el manejo apropiado de la diarrea. Calculado en el formulario mediante un campo calculate."

type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: diarrhea
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
