id: wdds_grains_consumed
maturity: draft
label:
  en: "WDDS grains consumed"
  fr: "WDDS céréales consommées"
  es: "WDDS cereales consumidos"

definition:
  en: "Whether the woman consumed an item from the grains, white roots and tubers, and plantains food group in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé un aliment du groupe des céréales, racines et tubercules blancs et plantains au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió un alimento del grupo de cereales, raíces y tubérculos blancos y plátanos en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

