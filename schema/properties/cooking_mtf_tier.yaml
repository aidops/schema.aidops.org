id: cooking_mtf_tier
maturity: draft
label:
  en: "Cooking MTF tier"
  fr: "Niveau MTF de cuisson"
  es: "Nivel MTF de cocción"

definition:
  en: "The derived SE4All Multi-Tier Framework (MTF) tier for household cooking energy access. Computed as the minimum tier across six attributes: PM2.5 emission rate (derived from primary_cooking_stove_type and cooking_fuel via ESMAP/WHO crosswalk under the default ventilation scenario, adjusted by cooking_stove_has_chimney and cooking_location), CO emission rate (same derivation), cookstove efficiency (derived from stove type), convenience (from fuel_collection_time_hours_per_week and stove_preparation_time_minutes), safety (from cooking_accident_past_12_months), affordability (from cooking_fuel_cost_share), and fuel availability (from cooking_fuel_availability_months). The default ventilation scenario applies when cooking_location is indoor_without_chimney; improved ventilation thresholds apply for outdoor or indoor_with_chimney configurations. A ScoringEvent provides the authoritative computation including the PM2.5/CO crosswalk logic."
  fr: "Le niveau dérivé du cadre multi-niveaux (MTF) SE4All pour l'accès du ménage à l'énergie de cuisson. Calculé comme le niveau minimum sur six attributs : taux d'émission de PM2,5 (dérivé de primary_cooking_stove_type et cooking_fuel via le tableau de correspondance ESMAP/OMS dans le scénario de ventilation par défaut, ajusté par cooking_stove_has_chimney et cooking_location), taux d'émission de CO (même dérivation), efficacité du foyer (dérivée du type de foyer), commodité (à partir de fuel_collection_time_hours_per_week et stove_preparation_time_minutes), sécurité (à partir de cooking_accident_past_12_months), accessibilité financière (à partir de cooking_fuel_cost_share) et disponibilité du combustible (à partir de cooking_fuel_availability_months). Le scénario de ventilation par défaut s'applique lorsque cooking_location est indoor_without_chimney ; les seuils de ventilation améliorée s'appliquent pour les configurations extérieures ou indoor_with_chimney. Un ScoringEvent fournit le calcul de référence incluant la logique de tableau de correspondance PM2,5/CO."
  es: "El nivel derivado del Marco de Múltiples Niveles (MTF) SE4All para el acceso energético de cocción del hogar. Calculado como el nivel mínimo entre seis atributos: tasa de emisión de PM2,5 (derivada de primary_cooking_stove_type y cooking_fuel mediante la tabla de referencia ESMAP/OMS bajo el escenario de ventilación por defecto, ajustada por cooking_stove_has_chimney y cooking_location), tasa de emisión de CO (misma derivación), eficiencia de la cocina (derivada del tipo de cocina), conveniencia (de fuel_collection_time_hours_per_week y stove_preparation_time_minutes), seguridad (de cooking_accident_past_12_months), asequibilidad (de cooking_fuel_cost_share) y disponibilidad del combustible (de cooking_fuel_availability_months). El escenario de ventilación por defecto se aplica cuando cooking_location es indoor_without_chimney; los umbrales de ventilación mejorada se aplican para configuraciones exteriores o indoor_with_chimney. Un ScoringEvent proporciona el cálculo autoritativo incluyendo la lógica de tabla de referencia PM2,5/CO."

