label:
  en: "GAD-7 item 5: restlessness"
  fr: "GAD-7 item 5 : agitation"
  es: "GAD-7 ítem 5: inquietud"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by being so restless that it is hard to sit still. GAD-7 item 5, measuring motor restlessness. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par une agitation telle qu'il est difficile de rester assis·e sans bouger. GAD-7 item 5, mesurant l'agitation motrice. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por estar tan inquieta que le resulta difícil quedarse sentada sin moverse. Ítem 5 del GAD-7, que mide la inquietud motora. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

