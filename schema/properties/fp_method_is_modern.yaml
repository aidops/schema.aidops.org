id: fp_method_is_modern
maturity: draft
label:
  en: "Currently using a modern contraceptive method (derived)"
  fr: "Utilise actuellement une méthode contraceptive moderne (dérivée)"
  es: "Actualmente usa un método anticonceptivo moderno (derivado)"

definition:
  en: "Derived boolean: true if the woman is currently using at least one method classified as modern in the family-planning-method vocabulary (female_sterilization, male_sterilization, pill, iud, injectable, implant, male_condom, female_condom, emergency_contraception, standard_days_method, lam, other_modern). Numerator for SDG indicator 3.7.1 and the modern contraceptive prevalence rate (mCPR). Not directly asked."
  fr: "Booléen dérivé : vrai si la femme utilise actuellement au moins une méthode classée comme moderne dans le vocabulaire family-planning-method (female_sterilization, male_sterilization, pill, iud, injectable, implant, male_condom, female_condom, emergency_contraception, standard_days_method, lam, other_modern). Numérateur pour l'indicateur ODD 3.7.1 et le taux de prévalence des contraceptifs modernes (mCPR). Non directement demandé."
  es: "Booleano derivado: verdadero si la mujer está usando actualmente al menos un método clasificado como moderno en el vocabulario family-planning-method (female_sterilization, male_sterilization, pill, iud, injectable, implant, male_condom, female_condom, emergency_contraception, standard_days_method, lam, other_modern). Numerador para el indicador ODS 3.7.1 y la tasa de prevalencia anticonceptiva moderna (mTPC). No se pregunta directamente."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: family_planning
sensitivity: sensitive
age_applicability:
  - adult
