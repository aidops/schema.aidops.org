id: lcs_borrowed_money_food
maturity: draft
label:
  en: "LCS borrowed money or food"
  fr: "SCM emprunt d'argent ou nourriture"
  es: "EMV préstamo de dinero o alimentos"

definition:
  en: "Frequency with which the household borrowed money or bought food on credit to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, stress tier."
  fr: "Fréquence à laquelle le ménage a emprunté de l'argent ou acheté de la nourriture à crédit pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de stress."
  es: "Frecuencia con la que el hogar pidió dinero prestado o compró alimentos a crédito para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de estrés."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
