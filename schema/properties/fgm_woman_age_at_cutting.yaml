definition:
  en: "The woman's reported age in years at the time she was circumcised / cut. MICS 6 FG5. Integer years; the special code 95 represents 'during infancy' (under 1 year); 98 represents don't know. Asked only if fgm_woman_cut = yes."
  fr: "Âge rapporté de la femme en années au moment de son excision / coupure. MICS 6 FG5. Années entières ; le code spécial 95 représente « pendant la petite enfance » (moins de 1 an) ; 98 représente ne sait pas. Posé uniquement si fgm_woman_cut = oui."
  es: "Edad reportada de la mujer en años al momento de la circuncisión / corte. MICS 6 FG5. Años enteros; el código especial 95 representa «durante la infancia» (menos de 1 año); 98 representa no sabe. Se pregunta solo si fgm_woman_cut = sí."
