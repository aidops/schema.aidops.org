id: weai_childcare_secondary_hours
maturity: draft
label:
  en: "WEAI work balance — secondary childcare hours"
  fr: "WEAI équilibre travail — heures de garde secondaire"
  es: "WEAI equilibrio laboral — horas de cuidado infantil secundario"

definition:
  en: "Number of hours the respondent spent on childcare while simultaneously doing other activities (childcare as a secondary activity). One-half of this value is added to the primary work and domestic hours for the pro-WEAI Indicator B5 (work balance) total. Skip if no children are in the household."
  fr: "Nombre d'heures que le répondant a consacrées à la garde des enfants tout en effectuant simultanément d'autres activités (garde en tant qu'activité secondaire). La moitié de cette valeur est ajoutée aux heures de travail primaire et domestiques pour le total de l'indicateur B5 du pro-WEAI (équilibre travail). Ignorer si aucun enfant n'est présent dans le ménage."
  es: "Número de horas que el encuestado dedicó al cuidado de niños mientras realizaba simultáneamente otras actividades (cuidado como actividad secundaria). La mitad de este valor se suma a las horas de trabajo primario y doméstico para el total del Indicador B5 del pro-WEAI (equilibrio laboral). Omitir si no hay niños en el hogar."

type: decimal
cardinality: single
core: true
vocabulary: null
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
