id: rcsi_less_preferred_food_days
maturity: draft
label:
  en: "rCSI less preferred food days"
  fr: "Jours rCSI aliments moins préférés"
  es: "rCSI días alimentos menos preferidos"

definition:
  en: "Number of days in the past seven during which the household relied on less preferred or less expensive food. Part of the WFP/CARE Reduced Coping Strategies Index (rCSI)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels le ménage a eu recours à des aliments moins préférés ou moins chers. Fait partie de l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE."
  es: "Número de días en los últimos siete en que el hogar recurrió a alimentos menos preferidos o menos costosos. Forma parte del Índice de Estrategias de Afrontamiento Reducido (rCSI) del PMA/CARE."

type: integer
cardinality: single
