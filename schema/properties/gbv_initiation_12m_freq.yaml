id: gbv_initiation_12m_freq
maturity: draft
label:
  en: "Respondent-initiated physical act (optional): frequency in past 12 months"
  fr: "Acte physique initié par la répondante (optionnel) : fréquence au cours des 12 derniers mois"
  es: "Acto físico iniciado por la encuestada (opcional): frecuencia en los últimos 12 meses"

definition:
  en: >
    Frequency of the respondent hitting, slapping, kicking, or physically hurting her partner
    (when he was not already hurting her) in the past 12 months. DHS instrument item DV10. Skip
    logic: asked only if gbv_initiation_ever = true. OPTIONAL module item; see gbv_initiation_ever
    definition. DHS-7+ compatible where included. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des actes physiques initiés par la répondante contre son partenaire au cours des
    12 derniers mois. Item DHS DV10. Posée uniquement si gbv_initiation_ever = vrai. Item OPTIONNEL.
    Compatible DHS-7+.
  es: >
    Frecuencia de que la encuestada golpee, abofetee, patee o lastime físicamente a su compañero
    en los últimos 12 meses. Ítem DHS DV10. Se pregunta solo si gbv_initiation_ever = verdadero.
    Ítem OPCIONAL. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_safety_signals
core: false
sensitivity: restricted
