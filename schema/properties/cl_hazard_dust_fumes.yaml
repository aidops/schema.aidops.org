id: cl_hazard_dust_fumes
maturity: draft
label:
  en: "Exposure to dust, fumes, or gas"
  fr: "Exposition à la poussière, aux fumées ou au gaz"
  es: "Exposición a polvo, humos o gas"
definition:
  en: "Whether the child was exposed to dust, fumes, or gas while performing economic activity in the past 7 days. MICS 6 CL6 A. Asked only if any of the CL1 economic-activity items is yes. A yes flags hazardous work under the ILO/UNICEF 2020 child-labour definition."
  fr: "Si l'enfant a été exposé à la poussière, aux fumées ou au gaz pendant son activité économique au cours des 7 derniers jours. MICS 6 CL6 A. Posé uniquement si l'un des items CL1 d'activité économique est oui. Un oui signale un travail dangereux selon la définition OIT/UNICEF 2020 du travail des enfants."
  es: "Si el niño estuvo expuesto a polvo, humos o gas mientras realizaba actividad económica en los últimos 7 días. MICS 6 CL6 A. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Un sí señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
