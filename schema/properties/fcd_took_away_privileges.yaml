id: fcd_took_away_privileges
maturity: draft
label:
  en: "Discipline — took away privileges"
  fr: "Discipline — retiré des privilèges"
  es: "Disciplina — quitó privilegios"
definition:
  en: "Whether any adult in the household took away privileges, forbade something the selected child aged 1-14 liked, or did not allow the child to leave the house, in the past month. MICS 6 FCD2 item A. Non-violent discipline method. Used in the MICS CP.3 tabulation as part of the non-violent-only denominator."
  fr: "Si un adulte du ménage a retiré des privilèges, interdit quelque chose que l'enfant sélectionné âgé de 1 à 14 ans aimait, ou empêché l'enfant de quitter la maison au cours du mois écoulé. MICS 6 FCD2 item A. Méthode de discipline non violente. Utilisé dans la tabulation MICS CP.3 comme partie du dénominateur non violent uniquement."
  es: "Si algún adulto del hogar quitó privilegios, prohibió algo que el niño seleccionado de 1 a 14 años disfrutaba, o no le permitió salir de casa, en el último mes. MICS 6 FCD2 ítem A. Método de disciplina no violento. Usado en la tabulación MICS CP.3 como parte del denominador solo no violento."
type: boolean
cardinality: single
core: false
