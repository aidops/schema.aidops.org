label:
  en: "Discipline — shook the child"
  fr: "Discipline — secoué l'enfant"
  es: "Disciplina — sacudió al niño"
definition:
  en: "Whether any adult in the household shook the selected child as a form of discipline in the past month. MICS 6 FCD2 item C. Physical punishment (non-severe) category. Included in the CP.3 violent-discipline composite."
  fr: "Si un adulte du ménage a secoué l'enfant sélectionné comme forme de discipline au cours du mois écoulé. MICS 6 FCD2 item C. Catégorie de punition physique (non sévère). Inclus dans le composite CP.3 de discipline violente."
  es: "Si algún adulto del hogar sacudió al niño seleccionado como forma de disciplina en el último mes. MICS 6 FCD2 ítem C. Categoría de castigo físico (no severo). Incluido en el compuesto CP.3 de disciplina violenta."
