id: weight_for_height_z
maturity: draft
label:
  en: "Weight-for-height z-score (WHZ)"
  fr: "Score z poids-pour-taille (WHZ)"
  es: "Puntaje z peso-para-talla (WHZ)"

definition:
  en: "The weight-for-height z-score (WHZ) derived from the raw weight and height measurements against the declared growth reference. Values below -2 indicate wasting; below -3 indicate severe wasting under the WHO 2006 standard."
  fr: "Le z-score poids-pour-taille (WHZ) dérivé des mesures brutes de poids et de taille par rapport à la référence de croissance déclarée. Les valeurs inférieures à -2 indiquent une émaciation ; inférieures à -3 indiquent une émaciation sévère selon la norme OMS 2006."
  es: "El puntaje z peso-para-talla (WHZ) derivado de las mediciones brutas de peso y talla respecto a la referencia de crecimiento declarada. Valores inferiores a -2 indican emaciación; inferiores a -3 indican emaciación grave bajo el estándar OMS 2006."

type: decimal
cardinality: single
