id: oop_expenditure_hospital
maturity: draft
label:
  en: "Out-of-pocket expenditure on hospitalization (12 months)"
  fr: "Dépenses à la charge du ménage pour l'hospitalisation (12 mois)"
  es: "Gasto de bolsillo en hospitalización (12 meses)"

definition:
  en: "Portion of out-of-pocket health expenditure spent on inpatient hospitalization fees (ward, surgery, diagnostics, inpatient drugs) over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo`. Hospital episodes are the most common trigger of catastrophic health expenditure."
  fr: "Part des dépenses de santé à la charge du ménage consacrée aux frais d'hospitalisation (séjour, chirurgie, examens, médicaments en hospitalisation) au cours des 12 derniers mois, en monnaie locale. Composante désagrégée de `oop_health_expenditure_12mo`. Les épisodes hospitaliers sont le déclencheur le plus fréquent de dépenses catastrophiques de santé."
  es: "Parte del gasto de bolsillo en salud dedicada a hospitalización (estadía, cirugía, diagnósticos, medicamentos hospitalarios) en los últimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo`. Los episodios hospitalarios son el desencadenante más frecuente de gasto catastrófico en salud."

type: decimal
cardinality: single
core: false
vocabulary: null
references: null
category: health_access_oop
sensitivity: sensitive
