id: highest_level_completed
maturity: draft
label:
  en: Highest level completed
  fr: "Niveau le plus élevé achevé"
  es: "Nivel más alto completado"
definition:
  en: "Whether the child successfully completed (passed) the highest grade or year they ever attended. Binary yes/no. Together with highest_education_level and child age, this field supports SDG 4.1.2 completion rate derivation. Ask only if ever_attended_school is Yes. Source: MICS6 CB6."
  fr: "Si l'enfant a réussi (obtenu) la classe ou l'année la plus élevée qu'il ait jamais fréquentée. Binaire oui/non. Avec highest_education_level et l'âge de l'enfant, ce champ soutient la dérivation du taux d'achèvement ODD 4.1.2. À poser uniquement si ever_attended_school est Oui. Source : MICS6 CB6."
  es: "Si el niño completó exitosamente (aprobó) el grado o año más alto al que alguna vez asistió. Binario sí/no. Junto con highest_education_level y la edad del niño, este campo apoya la derivación de la tasa de finalización del ODS 4.1.2. Preguntar solo si ever_attended_school es Sí. Fuente: MICS6 CB6."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: education
age_applicability:
  - child_5_17
