id: mahfp_months_adequate
maturity: draft
label:
  en: "MAHFP months adequate"
  fr: "MAHFP mois d'approvisionnement adéquat"
  es: "MAHFP meses de aprovisionamiento adecuado"

definition:
  en: "The number of months, in the past 12, during which the household had enough food to meet its needs. Integer 0-12 (not schema-enforced). Output of the FANTA Months of Adequate Household Food Provisioning (MAHFP) indicator."
  fr: "Le nombre de mois, parmi les 12 derniers, pendant lesquels le ménage a eu suffisamment de nourriture pour couvrir ses besoins. Entier de 0 à 12 (non imposé par le schéma). Résultat de l'indicateur MAHFP de FANTA (Mois d'approvisionnement alimentaire adéquat du ménage)."
  es: "El número de meses, en los últimos 12, durante los cuales el hogar tuvo suficiente comida para satisfacer sus necesidades. Entero 0-12 (no impuesto por el esquema). Resultado del indicador MAHFP de FANTA (Meses de Aprovisionamiento Alimentario Adecuado del Hogar)."

type: integer
cardinality: single
