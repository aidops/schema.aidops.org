id: hdds_score
maturity: draft
label:
  en: "HDDS score"
  fr: "Score HDDS"
  es: "Puntaje HDDS"

definition:
  en: "The Household Dietary Diversity Score for this administration, calculated as the simple count of food groups consumed during the recall period. Range 0-12. Categorical interpretation (bands) is program-specific and not standardized by FAO or FANTA; programs that apply thresholds should record the result via ScoringEvent."
  fr: "Le score de diversité alimentaire des ménages (HDDS) pour cette passation, calculé comme le décompte simple des groupes alimentaires consommés pendant la période de rappel. Plage 0-12. L'interprétation catégorielle (bandes) est spécifique au programme et non standardisée par la FAO ou FANTA ; les programmes appliquant des seuils doivent enregistrer le résultat via ScoringEvent."
  es: "El puntaje de diversidad dietética del hogar (HDDS) para esta aplicación, calculado como el conteo simple de grupos alimentarios consumidos durante el período de recordatorio. Rango 0-12. La interpretación categórica (bandas) es específica del programa y no está estandarizada por la FAO ni FANTA; los programas que apliquen umbrales deben registrar el resultado mediante ScoringEvent."

type: integer
cardinality: single
