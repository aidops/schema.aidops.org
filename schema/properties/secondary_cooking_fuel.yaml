id: secondary_cooking_fuel
maturity: draft
label:
  en: "Secondary cooking fuel"
  fr: "Combustible de cuisson secondaire"
  es: "Combustible de cocción secundario"

definition:
  en: "The other fuel or energy source the household also uses for cooking (fuel stacking). Fuel stacking — using multiple fuels — is common in low-income settings and affects actual household air pollution (HAP) exposure and energy transition dynamics. Uses the same vocabulary as primary cooking fuel (PS cooking-fuel). Source: WHO/World Bank harmonized questionnaire Q4; MTF household survey."
  fr: "L'autre combustible ou source d'énergie que le ménage utilise aussi pour cuisiner (empilement de combustibles). L'empilement de combustibles — l'utilisation de plusieurs combustibles — est courant dans les ménages à faible revenu et affecte l'exposition réelle aux polluants atmosphériques intérieurs (HAP) et la dynamique de transition énergétique. Utilise le même vocabulaire que le combustible de cuisson principal (PS cooking-fuel). Source : questionnaire harmonisé OMS/Banque mondiale Q4 ; enquête ménage MTF."
  es: "El otro combustible o fuente de energía que el hogar también usa para cocinar (apilamiento de combustibles). El apilamiento de combustibles — el uso de múltiples combustibles — es común en entornos de bajos ingresos y afecta la exposición real a la contaminación del aire interior (HAP) y la dinámica de transición energética. Usa el mismo vocabulario que el combustible de cocción principal (PS cooking-fuel). Fuente: cuestionario armonizado OMS/Banco Mundial Q4; encuesta de hogares MTF."

