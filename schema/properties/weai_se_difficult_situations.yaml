id: weai_se_difficult_situations
maturity: draft
label:
  en: "WEAI self-efficacy — perform well in tough situations"
  fr: "WEAI auto-efficacité — bien fonctionner dans des situations difficiles"
  es: "WEAI autoeficacia — desempeñarse bien en situaciones difíciles"

definition:
  en: "NGSE item 8: 'Even when things are tough, I can perform quite well.' One of eight items in the New General Self-Efficacy Scale (NGSE) used in pro-WEAI Indicator A2. Scored 1 (strongly disagree) to 5 (strongly agree). Adequacy for A2 requires sum of all eight NGSE items ≥ 32."
  fr: "Item NGSE 8 : 'Même quand les choses sont difficiles, je peux m'en sortir assez bien.' L'un des huit items de la Nouvelle échelle générale d'auto-efficacité (NGSE) utilisée dans l'indicateur A2 du pro-WEAI. Noté de 1 (fortement en désaccord) à 5 (fortement d'accord). L'adéquation pour A2 nécessite que la somme des huit items NGSE soit ≥ 32."
  es: "Ítem NGSE 8: 'Incluso cuando las cosas son difíciles, puedo desempeñarme bastante bien.' Uno de los ocho ítems de la Nueva Escala General de Autoeficacia (NGSE) utilizada en el indicador A2 del pro-WEAI. Puntuado de 1 (muy en desacuerdo) a 5 (muy de acuerdo). La adecuación para A2 requiere que la suma de los ocho ítems NGSE sea ≥ 32."

type: string
cardinality: single
core: false
vocabulary: weai-agree-5
references: null
category: intrinsic_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
