id: aap_aid_relevant_flag
maturity: draft
label:
  en: "AAP: Aid perceived relevant to priority needs (derived)"
  fr: "Redevabilité : Aide perçue pertinente aux besoins prioritaires (dérivé)"
  es: "Rendición de cuentas: Ayuda percibida relevante a necesidades prioritarias (derivado)"
definition:
  en: "Derived household-level boolean: true if `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Maps to CHS 2024 Commitments 2 and 7 and to GTS HVI relevance pillar. Directly aggregates to the OCHA HNO indicator '% of households reporting that aid met priority needs'."
  fr: "Booléen dérivé au niveau ménage : vrai si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Correspond aux Engagements 2 et 7 de la CHS 2024 et au pilier de pertinence GTS HVI. S'agrège directement à l'indicateur OCHA HNO « % de ménages rapportant que l'aide a répondu aux besoins prioritaires »."
  es: "Booleano derivado a nivel de hogar: verdadero si `aap_aid_met_priority_needs IN (very_well, somewhat_well)`. Corresponde a los Compromisos 2 y 7 de la CHS 2024 y al pilar de relevancia de GTS HVI. Se agrega directamente al indicador OCHA HNO «% de hogares que reportan que la ayuda cumplió con las necesidades prioritarias»."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: scores
sensitivity: standard
