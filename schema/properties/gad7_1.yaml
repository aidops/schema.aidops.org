id: gad7_1
maturity: draft
label:
  en: "GAD-7 item 1: nervous, anxious, or on edge"
  fr: "GAD-7 item 1 : nerveux·se, anxieux·se ou à cran"
  es: "GAD-7 ítem 1: nervioso, ansioso o al borde"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by feeling nervous, anxious, or on edge. GAD-7 item 1, measuring general anxiety/nervousness. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un sentiment de nervosité, d'anxiété ou d'être à cran. GAD-7 item 1, mesurant l'anxiété ou la nervosité générale. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por sentirse nerviosa, ansiosa o al borde. Ítem 1 del GAD-7, que mide la ansiedad o nerviosismo general. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

