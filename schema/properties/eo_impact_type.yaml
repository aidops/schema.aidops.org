id: eo_impact_type
maturity: draft
label:
  en: "Explosive ordnance impact type (household)"
  fr: "Type d'impact des engins explosifs (ménage)"
  es: "Tipo de impacto de artefactos explosivos (hogar)"

definition:
  en: "Ways in which explosive hazards have affected the household in the past 3 months. Asked only when eo_contamination_known = yes (or universally if contamination is widespread). no_impact is mutually exclusive with all other codes. member_injured_killed should be captured as a flag only; do not capture the count or names — detailed casualty data is the province of specialized mine action information systems (e.g., IMSMA). Based on IMAS EORE Guidance (2022); GICHD household survey tools; UNMAS EORE indicators."
  fr: "Façons dont les risques explosifs ont affecté le ménage au cours des 3 derniers mois. Posée uniquement lorsque eo_contamination_known = oui (ou universellement si la contamination est répandue). no_impact est mutuellement exclusif avec tous les autres codes. member_injured_killed doit être capturé uniquement comme indicateur ; ne pas capturer le nombre ou les noms — les données détaillées sur les victimes relèvent des systèmes d'information spécialisés en action contre les mines (ex. IMSMA). Fondé sur les Directives EORE IMAS (2022) ; outils d'enquête ménage GICHD ; indicateurs EORE UNMAS."
  es: "Formas en que los peligros explosivos han afectado al hogar en los últimos 3 meses. Se pregunta solo cuando eo_contamination_known = sí (o universalmente si la contaminación es generalizada). no_impact es mutuamente exclusivo con todos los demás códigos. member_injured_killed debe capturarse solo como indicador; no capturar el recuento ni los nombres — los datos detallados sobre víctimas son competencia de sistemas especializados de información de acción contra minas (p. ej., IMSMA). Basado en la Guía EORE IMAS (2022); herramientas de encuesta de hogares del GICHD; indicadores EORE del UNMAS."

type: string
cardinality: multiple
vocabulary: eo-impact-type
references: null
