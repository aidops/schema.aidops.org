id: vacc_penta1
maturity: draft
label:
  en: "DTP-HepB-Hib dose 1 (Penta1) vaccination status"
  fr: "Statut vaccinal DTP-HepB-Hib dose 1 (Penta1)"
  es: "Estado de vacunación DTP-HepB-Hib dosis 1 (Penta1)"

definition:
  en: "Whether the child received the first dose of the pentavalent (DTP-HepB-Hib) or DTP vaccine at approximately 6 weeks of age. Published recall wording: 'Has (name) ever been given a DPT injection — an injection in the thigh or buttocks — to prevent against tetanus, whooping cough, and diphtheria? (1st dose).' Penta = DTP + hepatitis B + Hib combined. DHS h3 records DPT1; when Penta is the national vaccine, DPT1 captures the Penta dose. DHS code h3; MICS code IM4a."
  fr: "Si l'enfant a reçu la première dose du vaccin pentavalent (DTP-HepB-Hib) ou DTP à environ 6 semaines. Formulation de rappel publiée : « (Prénom) a-t-il/elle déjà reçu une injection DTC — une injection dans la cuisse ou les fesses — pour prévenir le tétanos, la coqueluche et la diphtérie ? (1re dose). » Penta = DTP + hépatite B + Hib combiné. Le code DHS h3 enregistre le DTC1 ; lorsque le Penta est le vaccin national, DTC1 capture la dose Penta. Code DHS h3 ; code MICS IM4a."
  es: "Si el niño recibió la primera dosis de la vacuna pentavalente (DTP-HepB-Hib) o DTP a aproximadamente 6 semanas de edad. Redacción de recordatorio publicada: '¿Alguna vez recibió (nombre) una inyección DPT — una inyección en el muslo o las nalgas — para prevenir el tétanos, la tos ferina y la difteria? (1.a dosis).' Penta = DTP + hepatitis B + Hib combinado. El código DHS h3 registra DPT1; cuando Penta es la vacuna nacional, DPT1 captura la dosis Penta. Código DHS h3; código MICS IM4a."

