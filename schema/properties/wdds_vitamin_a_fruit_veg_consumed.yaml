id: wdds_vitamin_a_fruit_veg_consumed
maturity: draft
label:
  en: "WDDS vitamin A fruits and veg consumed"
  fr: "WDDS fruits et légumes riches en vitamine A consommés"
  es: "WDDS frutas y verduras con vitamina A consumidas"

definition:
  en: "Whether the woman consumed other vitamin-A-rich fruits and vegetables (orange-fleshed sweet potato, mango, papaya, carrot, pumpkin) in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé d'autres fruits et légumes riches en vitamine A (patate douce à chair orange, mangue, papaye, carotte, citrouille) au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió otras frutas y verduras ricas en vitamina A (batata de pulpa naranja, mango, papaya, zanahoria, calabaza) en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

type: boolean
