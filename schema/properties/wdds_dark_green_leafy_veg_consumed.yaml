label:
  en: "WDDS dark green leafy veg consumed"
  fr: "WDDS légumes-feuilles vert foncé consommés"
  es: "WDDS verduras de hoja verde oscuro consumidas"

definition:
  en: "Whether the woman consumed dark green leafy vegetables in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé des légumes-feuilles vert foncé au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió hortalizas de hoja verde oscuro en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

