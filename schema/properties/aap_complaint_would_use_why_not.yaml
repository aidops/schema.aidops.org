id: aap_complaint_would_use_why_not
maturity: draft
label:
  en: "AAP: Reasons for not using a complaint channel"
  fr: "Redevabilité : Raisons de ne pas utiliser un canal de plainte"
  es: "Rendición de cuentas: Razones para no usar un canal de quejas"

definition:
  en: "Main reason(s) the respondent would not use a complaint channel. Multi-select. Asked only when `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Classified as `sensitive` because the barrier codes `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community`, and `dont_trust_aid_providers` are PSEA- and safeguarding-adjacent proxy indicators: elevated rates should trigger a programmatic review of the PSEA framework. Source: IASC / REACH Menu 2018 and GTS 'Listening is Not Enough' (2022)."
  fr: "Principale(s) raison(s) pour lesquelles le répondant n'utiliserait pas un canal de plainte. Sélection multiple. Demandé uniquement si `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Classé comme `sensitive` car les codes d'obstacle `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` et `dont_trust_aid_providers` sont des indicateurs indirects liés à la PSEA et à la sauvegarde : des taux élevés devraient déclencher une révision programmatique du cadre de PSEA. Source : Menu IASC / REACH 2018 et « Listening is Not Enough » de GTS (2022)."
  es: "Razón(es) principal(es) por las que el encuestado no utilizaría un canal de quejas. Selección múltiple. Se pregunta solo cuando `aap_complaint_would_use IN (not_very_likely, not_at_all_likely)`. Clasificado como `sensitive` porque los códigos de barrera `fear_of_retaliation_from_staff`, `fear_of_retaliation_from_community` y `dont_trust_aid_providers` son indicadores indirectos relacionados con PSEA y salvaguardia: tasas elevadas deberían desencadenar una revisión programática del marco de PSEA. Fuente: Menú IASC / REACH 2018 y «Listening is Not Enough» de GTS (2022)."

type: string
cardinality: multiple
