id: anc_first_visit_gestational_age_months
maturity: draft
label:
  en: Gestational age at first ANC contact (months)
  fr: "Âge gestationnel au premier contact CPN (mois)"
  es: "Edad gestacional en el primer contacto APN (meses)"
definition:
  en: "How many months pregnant the woman was when she first received antenatal care for the most recent pregnancy. DHS-8 m13; MICS6 MN3. Grouped as first_trimester (<4 months), second_trimester (4–6 months), third_trimester (7+ months). Drives the derived indicator anc_first_trimester_initiation. Only asked if anc_any_visit = yes."
  fr: "Combien de mois enceinte était la femme lors de son premier contact de soins prénataux pour la grossesse la plus récente. DHS-8 m13 ; MICS6 MN3. Regroupé comme first_trimester (< 4 mois), second_trimester (4–6 mois), third_trimester (7 mois ou plus). Génère l'indicateur dérivé anc_first_trimester_initiation. Posé uniquement si anc_any_visit = oui."
  es: "Cuántos meses de embarazo tenía la mujer cuando recibió por primera vez atención prenatal para el embarazo más reciente. DHS-8 m13; MICS6 MN3. Agrupado como first_trimester (<4 meses), second_trimester (4-6 meses), third_trimester (7+ meses). Genera el indicador derivado anc_first_trimester_initiation. Solo se pregunta si anc_any_visit = sí."
type: string
cardinality: single
core: true
vocabulary: anc-first-visit-timing
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
