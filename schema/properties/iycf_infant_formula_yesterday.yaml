id: iycf_infant_formula_yesterday
maturity: draft
label:
  en: "Infant formula received yesterday"
  fr: "Lait maternisé reçu hier"
  es: "Fórmula infantil recibida ayer"

definition:
  en: "Whether the child received infant formula yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): 'Yesterday during the day or at night, did (NAME) receive infant formula?' Used to count milk feeds for non-breastfed children in the Minimum Milk Feeding Frequency (MMFF) indicator."
  fr: "Indique si l'enfant a reçu du lait maternisé hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier dans la journée ou la nuit, (PRÉNOM) a-t-il/elle reçu du lait maternisé ? » Utilisé pour compter les repas lactés des enfants non allaités dans l'indicateur de fréquence minimale des repas lactés (MMFF)."
  es: "Indica si el niño recibió fórmula infantil ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): 'Ayer durante el día o la noche, ¿recibió (NOMBRE) fórmula infantil?' Se utiliza para contar las tomas de leche de los niños no amamantados en el indicador de Frecuencia Mínima de Alimentación con Leche (MMFF)."

type: boolean
cardinality: single
core: false
