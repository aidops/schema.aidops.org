id: mk_commodity_price_reference
maturity: draft
label:
  en: Reference (pre-crisis) commodity price (local currency)
  fr: Prix de référence (avant-crise) du produit (monnaie locale)
  es: Precio de referencia (pre-crisis) del producto (moneda local)

definition:
  en: "Pre-crisis or reference-period price for the commodity per reference unit in local currency. For repeat monitoring visits, this value is pre-populated from the monitoring database (locked for editing, shown as read-only). For the first visit to a market, collected from key vendor informants and cross-referenced with published WFP/GIEWS price data if available. Decimal ≥ 0; use -1 for not available. WFP MAG 2021 recommends using a 3- or 5-year seasonal average for the same calendar month as the reference, rather than a single pre-crisis observation."
  fr: "Prix d'avant-crise ou de la période de référence pour le produit par unité de référence en monnaie locale. Pour les visites de suivi répétées, cette valeur est pré-remplie à partir de la base de données de suivi (verrouillée pour modification, affichée en lecture seule). Pour la première visite d'un marché, collectée auprès des informateurs clés vendeurs et recoupée avec les données de prix WFP/GIEWS publiées si disponibles."
  es: "Precio anterior a la crisis o del período de referencia para el producto por unidad de referencia en moneda local. Para visitas de monitoreo repetidas, este valor se pre-puebla desde la base de datos de monitoreo (bloqueado para edición, mostrado como solo lectura). Para la primera visita a un mercado, recopilado de informantes clave vendedores y contrastado con datos de precios WFP/GIEWS publicados si están disponibles."

type: decimal
cardinality: single
core: true
vocabulary: null
references: null
category: market_price_basket
sensitivity: standard
