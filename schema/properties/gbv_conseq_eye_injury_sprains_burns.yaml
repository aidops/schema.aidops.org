id: gbv_conseq_eye_injury_sprains_burns
maturity: draft
label:
  en: "Physical consequence: eye injuries, sprains, dislocations, or burns"
  fr: "Conséquence physique : blessures oculaires, entorses, luxations ou brûlures"
  es: "Consecuencia física: lesiones oculares, esguinces, dislocaciones o quemaduras"

definition:
  en: >
    Whether the respondent has ever had eye injuries, sprains, dislocations, or burns as a result
    of partner violence. DHS instrument item DV08b. Lifetime reference period (ever, as a result
    of violence by the referent partner). Asked only of respondents who reported at least one
    physical or sexual IPV act. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si la répondante a jamais eu des blessures oculaires, entorses, luxations ou brûlures à la
    suite de violences conjugales. Item DHS DV08b. Période de référence : à vie.
  es: >
    Si la encuestada alguna vez tuvo lesiones oculares, esguinces, dislocaciones o quemaduras
    como resultado de violencia de pareja. Ítem DHS DV08b. Período de referencia: de por vida.

type: boolean
