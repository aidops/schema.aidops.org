label:
  en: "PHQ-9 item 4: fatigue or low energy"
  fr: "PHQ-9 item 4 : fatigue ou manque d'énergie"
  es: "PHQ-9 ítem 4: fatiga o poca energía"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by feeling tired or having little energy. PHQ-9 item 4, measuring fatigue. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un sentiment de fatigue ou un manque d'énergie. PHQ-9 item 4, mesurant la fatigue. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por sentirse cansada o tener poca energía. Ítem 4 del PHQ-9, que mide la fatiga. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

