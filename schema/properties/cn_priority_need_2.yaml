  es: "La segunda necesidad humanitaria más urgente a nivel comunitario, identificada por la propia comunidad. Se pregunta solo cuando se ha proporcionado una necesidad de rango 1. Codificada con un código de la taxonomía priority-need-category. Véase cn_priority_need_1 para la nota metodológica completa."

