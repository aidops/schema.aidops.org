id: hdds_vegetables_consumed
maturity: draft
label:
  en: "HDDS vegetables consumed"
  fr: "SDAM légumes consommés"
  es: "EDDA verduras consumidas"

definition:
  en: "Whether any member of the household consumed an item from the vegetables food group, including dark green leafy vegetables, in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des légumes, y compris les légumes-feuilles vert foncé, au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de verduras, incluidas las hortalizas de hoja verde oscuro, en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
vocabulary: null
references: null
category: food_security
valid_instruments: [fao_hdds]
