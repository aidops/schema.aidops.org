label:
  en: "LCS sold house or land"
  fr: "SCM vente de maison ou de terre"
  es: "EMV venta de vivienda o tierra"

definition:
  en: "Frequency with which the household sold the house or land to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, emergency tier."
  fr: "Fréquence à laquelle le ménage a vendu sa maison ou sa terre pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau d'urgence."
  es: "Frecuencia con la que el hogar vendió la vivienda o la tierra para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de emergencia."

type: string
cardinality: single
