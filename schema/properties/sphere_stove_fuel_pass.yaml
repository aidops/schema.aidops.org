label:
  en: "Sphere Standard 3 (stoves, fuel, lighting) pass"
  fr: "Norme Sphère 3 (foyers, combustible, éclairage) satisfaite"
  es: "Norma Esfera 3 (cocinas, combustible, iluminación) cumplida"

definition:
  en: "Whether the household meets the Sphere Standard 3 (stoves, fuel, lighting) minimum threshold. Derived as: has_functional_stove = true AND matches_or_lighter_available = true. Objective-threshold enumerator-observation score, distinct from the self-report stove_fuel_lighting_sufficient item."
  fr: "Si le ménage satisfait au seuil minimal de la Norme Sphère 3 (foyers, combustible, éclairage). Dérivé comme : has_functional_stove = vrai ET matches_or_lighter_available = vrai. Score d'observation de l'enquêteur au seuil objectif, distinct de l'item auto-déclaré stove_fuel_lighting_sufficient."
  es: "Si el hogar cumple con el umbral mínimo de la Norma Esfera 3 (cocinas, combustible, iluminación). Derivado como: has_functional_stove = verdadero Y matches_or_lighter_available = verdadero. Puntaje de observación del encuestador al umbral objetivo, distinto del ítem auto-reportado stove_fuel_lighting_sufficient."

