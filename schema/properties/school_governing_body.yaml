id: school_governing_body
maturity: draft
label:
  en: School has parent governing body
  fr: "L'école dispose d'un organe de gestion parental"
  es: "La escuela tiene un órgano de gobierno parental"
definition:
  en: "Whether the child's school has a governing body in which parents can participate, such as a parent-teacher association (PTA) or school management committee. Ask only if attended_current_year is Yes. If Yes, caregiver_attended_meeting applies. Source: MICS6 PR7."
  fr: "Si l'école de l'enfant dispose d'un organe de gestion auquel les parents peuvent participer, tel qu'une association de parents d'élèves (APE) ou un comité de gestion scolaire. À poser uniquement si attended_current_year est Oui. Si Oui, caregiver_attended_meeting s'applique. Source : MICS6 PR7."
  es: "Si la escuela del niño tiene un órgano de gobierno en el que los padres pueden participar, como una asociación de padres de familia (APF) o un comité de gestión escolar. Preguntar solo si attended_current_year es Sí. Si Sí, se aplica caregiver_attended_meeting. Fuente: MICS6 PR7."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: education
age_applicability:
  - child_5_17
