id: mdd_w_score
maturity: draft
label:
  en: "MDD-W score"
  fr: "Score MDD-W"
  es: "Puntaje MDD-W"

definition:
  en: "The Minimum Dietary Diversity for Women score for this administration, calculated as the count of food groups consumed out of the 10 MDD-W food groups during the recall period. Range 0-10."
  fr: "Le score de diversité alimentaire minimum des femmes (MDD-W) pour cette passation, calculé comme le décompte des groupes alimentaires consommés parmi les 10 groupes alimentaires MDD-W pendant la période de rappel. Plage 0-10."
  es: "El puntaje de diversidad dietética mínima para mujeres (MDD-W) para esta aplicación, calculado como el conteo de grupos alimentarios consumidos de los 10 grupos alimentarios MDD-W durante el período de recordatorio. Rango 0-10."

type: integer
cardinality: single
