id: cn_social_cohesion_level
maturity: draft
label:
  en: "Social cohesion level"
  fr: "Niveau de cohésion sociale"
  es: "Nivel de cohesión social"

definition:
  en: "Community-perceived level of social cohesion or inter-group tension over the past 90 days, encoded on the social-cohesion-tension-level vocabulary (very good no tension; generally good, minor tension; mixed; tense, occasional incidents; very tense, frequent incidents; don't know; prefer not to answer). Captures relations between host and displaced populations, between ethnic, religious, or clan groups, or between residents and newcomers. SENSITIVE: identifies ethnic, political, or religious fault lines and can expose minority groups to retaliation if disclosed without aggregation. Must be reported only at aggregated (programme-area or higher) level. Derived from the UNDP-DPPA Social Cohesion Framework, the UNHCR Peaceful Coexistence Framework, and Interpeace/Search for Common Ground conflict-sensitivity assessment guidance."
  fr: "Niveau de cohésion sociale ou de tension intergroupe perçu par la communauté au cours des 90 derniers jours, codé sur la taxonomie social-cohesion-tension-level (très bonnes relations, aucune tension ; généralement bonnes, tension mineure ; mitigées ; tendues, incidents occasionnels ; très tendues, incidents fréquents ; ne sait pas ; préfère ne pas répondre). Saisit les relations entre populations d'accueil et déplacées, entre groupes ethniques, religieux ou claniques, ou entre résidents et nouveaux arrivants. SENSIBLE : identifie les lignes de fracture ethnique, politique ou religieuse et peut exposer les groupes minoritaires à des représailles si divulguées sans agrégation. Doit être rapportée uniquement à un niveau agrégé (zone de programme ou supérieur). Tiré du Cadre de cohésion sociale PNUD-DPPA, du Cadre de coexistence pacifique du HCR et des orientations d'évaluation de sensibilité au conflit d'Interpeace / Search for Common Ground."
  es: "Nivel de cohesión social o tensión intergrupal percibido por la comunidad en los últimos 90 días, codificado en la taxonomía social-cohesion-tension-level (muy buenas relaciones, sin tensión; generalmente buenas, tensión menor; mixtas; tensas, incidentes ocasionales; muy tensas, incidentes frecuentes; no sabe; prefiere no responder). Capta las relaciones entre poblaciones de acogida y desplazadas, entre grupos étnicos, religiosos o clánicos, o entre residentes y recién llegados. SENSIBLE: identifica líneas de fractura étnica, política o religiosa y puede exponer a grupos minoritarios a represalias si se divulga sin agregación. Debe reportarse solo a nivel agregado (área de programa o superior). Derivado del Marco de Cohesión Social PNUD-DPPA, del Marco de Coexistencia Pacífica del ACNUR y de las orientaciones de evaluación de sensibilidad al conflicto de Interpeace / Search for Common Ground."

