id: gbv_ctrl_discriminates_spending
maturity: draft
label:
  en: "Controlling behavior: discriminates in spending on her vs. himself"
  fr: "Comportement de contrôle : discrimine dans les dépenses pour elle et lui"
  es: "Comportamiento controlador: discrimina en el gasto hacia ella vs. él"

definition:
  en: >
    Whether the referent partner discriminates or discriminated in spending on the respondent
    compared to himself or the household (unequal resource allocation). DHS instrument item DV03g.
    Reference period: ever (relationship pattern). Response options use the yes-no-dk vocabulary.
    Note: DV03g is part of the extended DHS controlling-behavior battery; surveys running only the
    minimal 5-item battery (DV03a-e) may omit this item. DHS-7+ compatible where included.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent fait ou faisait une discrimination dans les dépenses pour la
    répondante par rapport à lui-même ou au ménage. Item DHS DV03g. Période de référence :
    toujours. Item de la batterie étendue DHS; peut être absent dans les enquêtes limitées à
    5 items. Compatible DHS-7+ si inclus.
  es: >
    Si el compañero referente discrimina o discriminaba en el gasto hacia la encuestada comparado
    con él mismo o el hogar. Ítem DHS DV03g. Período de referencia: alguna vez. Ítem de la
    batería extendida DHS; puede estar ausente en encuestas con solo 5 ítems canónicos.
    Compatible DHS-7+ cuando se incluye.

type: string
cardinality: single
vocabulary: yes-no-dk
references: null
category: gbv_controlling
core: false
sensitivity: restricted
