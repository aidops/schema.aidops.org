id: current_shelter_type
maturity: draft
label:
  en: "Current shelter type"
  fr: "Type d'abri actuel"
  es: "Tipo de refugio actual"

definition:
  en: "Type of shelter arrangement the household is currently occupying at the time of assessment. Complements dwelling_type (which records the household's usual dwelling) by recording where the household is actually living now, particularly when the original dwelling is damaged, inaccessible, or vacated."
  fr: "Type d'arrangement d'abri actuellement occupé par le ménage au moment de l'évaluation. Complète dwelling_type (qui consigne le logement habituel du ménage) en consignant où le ménage vit réellement maintenant, particulièrement lorsque le logement d'origine est endommagé, inaccessible ou quitté."
  es: "Tipo de arreglo de refugio que el hogar ocupa actualmente al momento de la evaluación. Complementa dwelling_type (que registra la vivienda habitual del hogar) al registrar dónde vive realmente el hogar ahora, particularmente cuando la vivienda original está dañada, inaccesible o desocupada."

type: string
cardinality: single
vocabulary: shelter-situation-type
references: null
category: habitability
sensitivity: sensitive
valid_instruments: [iom_dtm_household, shelter_cluster_rna, reach_msna, pdna_housing]
