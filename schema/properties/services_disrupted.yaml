id: services_disrupted
maturity: draft
label:
  en: "Services disrupted"
  fr: "Services perturbés"
  es: "Servicios afectados"

definition:
  en: "Essential services (water, sanitation, electricity, telecommunications) that are currently degraded at the household's dwelling after the shock. Multi-select. Codes cover both full outage and partial-function cases: water may be absent, intermittent, or present-but-unsafe; sanitation may be unusable or present-but-overflowing; electricity may be absent or intermittent. Distinct from the household's baseline service infrastructure type, which is recorded by water_source, sanitation_facility, and electricity_access."
  fr: "Services essentiels (eau, assainissement, électricité, télécommunications) actuellement dégradés au logement du ménage après le choc. Sélection multiple. Les codes couvrent à la fois la coupure complète et les cas de fonctionnement partiel : l'eau peut être absente, intermittente ou présente mais non potable ; l'assainissement peut être inutilisable ou présent mais débordant ; l'électricité peut être absente ou intermittente. Distinct du type d'infrastructure de service habituel du ménage, consigné par water_source, sanitation_facility et electricity_access."
  es: "Servicios esenciales (agua, saneamiento, electricidad, telecomunicaciones) que actualmente están degradados en la vivienda del hogar después del choque. Selección múltiple. Los códigos cubren tanto el corte total como los casos de función parcial: el agua puede estar ausente, intermitente o presente pero no apta; el saneamiento puede ser inutilizable o estar presente pero desbordándose; la electricidad puede estar ausente o intermitente. Distinto del tipo de infraestructura de servicio habitual del hogar, registrado por water_source, sanitation_facility y electricity_access."

type: string
cardinality: multiple
