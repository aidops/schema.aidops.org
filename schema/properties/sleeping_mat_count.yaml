id: sleeping_mat_count
maturity: draft
label:
  en: "Number of sleeping mats"
  fr: "Nombre de nattes de couchage"
  es: "Número de esteras para dormir"

definition:
  en: "Count of sleeping mats, floor mats, or mattresses currently held by the household, for all members combined. Sphere Standard 1 key indicator: minimum one blanket and bedding (floor mat, mattress, or sheeting) per person. Together with household size, derives a per-person ratio."
  fr: "Nombre de nattes de couchage, tapis de sol ou matelas actuellement détenus par le ménage, pour tous les membres confondus. Indicateur clé de la Norme Sphère 1 : minimum une couverture et literie (tapis de sol, matelas ou drap) par personne. Combiné à la taille du ménage, permet de dériver un ratio par personne."
  es: "Cuenta de esteras para dormir, esteras de piso o colchones que tiene actualmente el hogar, para todos los miembros combinados. Indicador clave de la Norma Esfera 1: mínimo una frazada y ropa de cama (estera de piso, colchón o sábana) por persona. Junto con el tamaño del hogar, deriva una razón por persona."

