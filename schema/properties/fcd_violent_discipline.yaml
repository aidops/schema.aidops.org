id: fcd_violent_discipline
maturity: draft
label:
  en: "Violent discipline experienced (derived)"
  fr: "Discipline violente subie (dérivé)"
  es: "Disciplina violenta experimentada (derivado)"
definition:
  en: "Derived per-selected-child boolean: true if the randomly selected child aged 1-14 experienced any psychological aggression (fcd_shouted OR fcd_name_called) OR any physical punishment (fcd_shook OR fcd_spanked OR fcd_hit_body OR fcd_hit_head OR fcd_hit_limb OR fcd_beat_hard_repeatedly) in the past month. Maps to the MICS CP.3 / SDG 16.2.1 violent-discipline indicator. Aggregates at population level to the proportion of children 1-14 who experienced violent discipline in the past month."
  fr: "Booléen dérivé par enfant sélectionné : vrai si l'enfant tiré au sort âgé de 1 à 14 ans a subi une agression psychologique (fcd_shouted OU fcd_name_called) OU une punition physique (fcd_shook OU fcd_spanked OU fcd_hit_body OU fcd_hit_head OU fcd_hit_limb OU fcd_beat_hard_repeatedly) au cours du mois écoulé. Correspond à l'indicateur MICS CP.3 / ODD 16.2.1 de discipline violente. Agrégé au niveau de la population à la proportion d'enfants 1-14 ayant subi une discipline violente au cours du mois écoulé."
  es: "Booleano derivado por niño seleccionado: verdadero si el niño seleccionado aleatoriamente de 1 a 14 años experimentó alguna agresión psicológica (fcd_shouted O fcd_name_called) O algún castigo físico (fcd_shook O fcd_spanked O fcd_hit_body O fcd_hit_head O fcd_hit_limb O fcd_beat_hard_repeatedly) en el último mes. Corresponde al indicador MICS CP.3 / ODS 16.2.1 de disciplina violenta. Agregado a nivel poblacional a la proporción de niños 1-14 que experimentaron disciplina violenta en el último mes."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: derived_child_protection
age_applicability:
  - child_2_4
  - child_5_17
sensitivity: restricted
