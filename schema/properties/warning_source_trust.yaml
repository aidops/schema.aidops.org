id: warning_source_trust
maturity: draft
label:
  en: "Trust in warning source"
  fr: "Confiance dans la source de l'alerte"
  es: "Confianza en la fuente de la alerta"

definition:
  en: "How much the respondent trusted the source of the warning. Captured on a four-point Likert scale (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) plus a dont_know code. Applicable only when warning_received is yes. Trust in the issuing authority is a WMO MHEWS pillar-3 prerequisite for action and, in the cyclone warning literature (Bangladesh, Odisha), the single strongest predictor of evacuation compliance. The 'somewhat' and 'mostly' levels are analytically distinct for AA program design and should not be collapsed."
  fr: "Mesure dans laquelle le répondant a fait confiance à la source de l'alerte. Capté sur une échelle de Likert à quatre points (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) plus un code dont_know. Applicable uniquement si warning_received est oui. La confiance dans l'autorité émettrice est un prérequis à l'action selon le pilier 3 du WMO MHEWS, et, dans la littérature cyclonique (Bangladesh, Odisha), le prédicteur unique le plus fort de la conformité à l'évacuation. Les niveaux « somewhat » et « mostly » sont analytiquement distincts pour la conception de programmes d'action anticipatoire et ne doivent pas être regroupés."
  es: "Cuánto confió el respondiente en la fuente de la alerta. Capturado en una escala Likert de cuatro puntos (fully_trusted, mostly_trusted, somewhat_trusted, did_not_trust) más un código dont_know. Aplicable solo cuando warning_received es sí. La confianza en la autoridad emisora es un prerrequisito para la acción según el pilar 3 del MHEWS de la OMM y, en la literatura sobre ciclones (Bangladesh, Odisha), el predictor único más fuerte del cumplimiento de la evacuación. Los niveles «somewhat» y «mostly» son analíticamente distintos para el diseño de programas de acción anticipatoria y no deben combinarse."

