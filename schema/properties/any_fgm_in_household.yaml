id: any_fgm_in_household
maturity: draft
label:
  en: "Any FGM/C experienced in household (derived)"
  fr: "MGF/E subie par au moins une personne du ménage (dérivé)"
  es: "MGF/A experimentada por alguna persona del hogar (derivado)"
definition:
  en: "Derived household-level boolean: true if the woman respondent has been cut (fgm_woman_cut = yes) OR any of her daughters has been cut (fgm_any_daughter_cut = yes). Computed only when the FGM module is enabled (x_fgm_module_applicable is yes). Does not replace the per-woman and per-daughter indicators; serves as a household-level summary for reporting."
  fr: "Booléen dérivé au niveau ménage : vrai si la femme répondante a été excisée (fgm_woman_cut = oui) OU si l'une de ses filles a été excisée (fgm_any_daughter_cut = oui). Calculé uniquement lorsque le module MGF est activé (x_fgm_module_applicable est oui). Ne remplace pas les indicateurs par femme et par fille ; sert de synthèse au niveau ménage pour le reporting."
  es: "Booleano derivado a nivel de hogar: verdadero si la mujer encuestada fue cortada (fgm_woman_cut = sí) O alguna de sus hijas ha sido cortada (fgm_any_daughter_cut = sí). Se calcula solo cuando el módulo MGF está habilitado (x_fgm_module_applicable es sí). No reemplaza los indicadores por mujer y por hija; sirve como síntesis a nivel de hogar para el reporte."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: derived_child_protection
sensitivity: restricted
