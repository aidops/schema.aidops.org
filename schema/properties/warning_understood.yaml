id: warning_understood
maturity: draft
label:
  en: "Warning understood"
  fr: "Alerte comprise"
  es: "Alerta comprendida"

definition:
  en: "Whether the respondent understood what the warning was telling them about the expected hazard event. Captured on a four-level scale: fully_understood, partially_understood, did_not_understand, dont_remember. Applicable only when warning_received is yes. Comprehension is a key WMO MHEWS pillar-3 quality criterion (warnings should be clear and understandable) and an IFRC FbF MEAL standard indicator."
  fr: "Indique si le répondant a compris ce que l'alerte disait de l'événement dangereux attendu. Capté sur une échelle à quatre niveaux : fully_understood, partially_understood, did_not_understand, dont_remember. Applicable uniquement si warning_received est oui. La compréhension est un critère qualité clé du pilier 3 du WMO MHEWS (les alertes doivent être claires et compréhensibles) et un indicateur standard du MEAL FbF de la FICR."
  es: "Indica si el respondiente comprendió lo que la alerta le decía sobre el evento de peligro esperado. Capturado en una escala de cuatro niveles: fully_understood, partially_understood, did_not_understand, dont_remember. Aplicable solo cuando warning_received es sí. La comprensión es un criterio clave de calidad del pilar 3 de MHEWS de la OMM (las alertas deben ser claras y comprensibles) y un indicador estándar del MEAL FbF de la FICR."

type: string
cardinality: single
core: true
