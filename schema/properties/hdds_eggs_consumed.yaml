id: hdds_eggs_consumed
maturity: draft
label:
  en: "HDDS eggs consumed"
  fr: "SDAM œufs consommés"
  es: "EDDA huevos consumidos"

definition:
  en: "Whether any member of the household consumed an item from the eggs food group in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des œufs au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de los huevos en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
