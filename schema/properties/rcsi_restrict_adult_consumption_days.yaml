id: rcsi_restrict_adult_consumption_days
maturity: draft
label:
  en: "rCSI restrict adults days"
  fr: "Jours rCSI restriction adultes"
  es: "rCSI días restricción adultos"

definition:
  en: "Number of days in the past seven during which the household restricted consumption by adults so that small children could eat. Part of the WFP/CARE Reduced Coping Strategies Index (rCSI)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels le ménage a restreint la consommation des adultes pour que les jeunes enfants puissent manger. Fait partie de l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE."
  es: "Número de días en los últimos siete en que el hogar restringió el consumo de los adultos para que los niños pequeños pudieran comer. Forma parte del Índice de Estrategias de Afrontamiento Reducido (rCSI) del PMA/CARE."

type: integer
cardinality: single
vocabulary: null
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [wfp_rcsi, wfp_cari]
