id: weai_work_domestic_hours
maturity: draft
label:
  en: "WEAI work balance — domestic activity hours"
  fr: "WEAI équilibre travail — heures d'activités domestiques"
  es: "WEAI equilibrio laboral — horas de actividades domésticas"

definition:
  en: "Number of hours the respondent spent on domestic activities in a typical day (cooking, cleaning, fetching water, fuel collection). Included in the primary activity count for the pro-WEAI Indicator B5 (work balance) calculation. Adequacy: total work burden (primary + domestic + 0.5 × secondary childcare) < 10.5 hours."
  fr: "Nombre d'heures que le répondant a consacrées aux activités domestiques lors d'une journée type (cuisine, nettoyage, collecte d'eau, collecte de combustible). Inclus dans le comptage des activités primaires pour le calcul de l'indicateur B5 du pro-WEAI (équilibre travail). Adéquation : charge de travail totale (primaire + domestique + 0,5 × garde secondaire) < 10,5 heures."
  es: "Número de horas que el encuestado dedicó a actividades domésticas en un día típico (cocinar, limpiar, buscar agua, recoger combustible). Incluido en el conteo de actividades primarias para el cálculo del Indicador B5 del pro-WEAI (equilibrio laboral). Adecuación: carga de trabajo total (primario + doméstico + 0,5 × cuidado infantil secundario) < 10,5 horas."

type: decimal
cardinality: single
core: true
vocabulary: null
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
