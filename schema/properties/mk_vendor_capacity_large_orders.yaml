id: mk_vendor_capacity_large_orders
maturity: draft
label:
  en: Vendor capacity for large coordinated orders
  fr: Capacité des vendeurs pour les commandes coordonnées importantes
  es: Capacidad de los vendedores para pedidos coordinados grandes

definition:
  en: "Enumerator assessment of whether vendors at this market have sufficient stock depth and replenishment capacity to absorb a large coordinated order — for example, to supply a cash-based intervention program reaching many beneficiaries simultaneously. This must remain a market-aggregate assessment synthesized from 2–3 vendor informants; no per-vendor capacity data should be captured. Codes: yes_easily, yes_with_advance_notice, unlikely, no, dont_know."
  fr: "Évaluation par l'enquêteur de la capacité des vendeurs de ce marché à absorber une commande coordonnée importante — par exemple, pour approvisionner un programme de transfert monétaire atteignant de nombreux bénéficiaires simultanément. Doit rester une évaluation globale au niveau du marché, synthétisée à partir de 2 à 3 informateurs vendeurs ; aucune donnée de capacité par vendeur ne doit être saisie."
  es: "Evaluación del enumerador sobre si los vendedores en este mercado tienen suficiente profundidad de stock y capacidad de reabastecimiento para absorber un pedido coordinado grande — por ejemplo, para abastecer un programa de transferencia monetaria que atiende a muchos beneficiarios simultáneamente. Debe permanecer como una evaluación agregada a nivel de mercado sintetizada de 2 a 3 informantes vendedores; no se deben capturar datos de capacidad por vendedor."

type: string
cardinality: single
core: true
vocabulary: null
references: null
category: market_cbi_feasibility
sensitivity: standard
