id: gbv_sex_forced_other_acts_lifetime
maturity: draft
label:
  en: "Sexual IPV (lifetime): physically forced to perform other sexual acts"
  fr: "VPI sexuelle (vie entière) : forcée physiquement à accomplir d'autres actes sexuels"
  es: "VPI sexual (de por vida): forzada físicamente a realizar otros actos sexuales"

definition:
  en: >
    Whether the referent partner has ever physically forced the respondent to perform any other
    sexual acts she did not want to perform. DHS instrument item DV05A-ix. Lifetime reference
    period (ever). If true, the follow-up 12-month frequency property
    gbv_sex_forced_other_acts_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais forcé physiquement la répondante à accomplir d'autres
    actes sexuels qu'elle ne souhaitait pas. Item DHS DV05A-ix. Période de référence : à vie.
    Si vrai, gbv_sex_forced_other_acts_12m_freq est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez forzó físicamente a la encuestada a realizar otros actos
    sexuales que ella no quería. Ítem DHS DV05A-ix. Período de referencia: de por vida.
    Si verdadero, se pregunta gbv_sex_forced_other_acts_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_sexual_ipv
core: false
sensitivity: restricted
