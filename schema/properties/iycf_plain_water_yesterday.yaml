id: iycf_plain_water_yesterday
maturity: draft
label:
  en: "Plain water received yesterday"
  fr: "Eau nature reçue hier"
  es: "Agua sola recibida ayer"

definition:
  en: "Whether the child received plain water yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): 'Yesterday during the day or at night, did (NAME) receive plain water?' Used as one of the conditions for computing the Exclusive Breastfeeding (EBF) indicator: EBF requires no plain water received."
  fr: "Indique si l'enfant a reçu de l'eau nature hier dans la journée ou la nuit (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier dans la journée ou la nuit, (PRÉNOM) a-t-il/elle reçu de l'eau nature ? » Utilisé comme l'une des conditions pour calculer l'indicateur d'allaitement maternel exclusif (ALM) : l'ALM exige qu'aucune eau nature n'ait été reçue."
  es: "Indica si el niño recibió agua sola ayer durante el día o la noche (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): 'Ayer durante el día o la noche, ¿recibió (NOMBRE) agua sola?' Se utiliza como una de las condiciones para calcular el indicador de Lactancia Materna Exclusiva (LME): la LME requiere que no se haya recibido agua sola."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: nutrition
age_applicability:
  - infant_0_1
valid_instruments: [who_iycf_2021]
