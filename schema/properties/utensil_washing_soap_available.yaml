id: utensil_washing_soap_available
maturity: draft
label:
  en: "Soap or detergent available for washing utensils"
  fr: "Savon ou détergent disponible pour le lavage des ustensiles"
  es: "Jabón o detergente disponible para lavar utensilios"

definition:
  en: "Whether the household currently has soap or detergent available for washing cooking and eating utensils. Sphere Standard 2 guidance on utensil hygiene; Sphere WASH Standard 1 (hygiene promotion) on soap availability. UNHCR CRI catalogue includes soap as a standard item."
  fr: "Si le ménage dispose actuellement de savon ou de détergent pour laver les ustensiles de cuisine et de repas. Orientation de la Norme Sphère 2 sur l'hygiène des ustensiles ; Norme Sphère WASH 1 (promotion de l'hygiène) sur la disponibilité du savon. Le catalogue HCR CRI inclut le savon comme article standard."
  es: "Si el hogar tiene actualmente jabón o detergente disponible para lavar utensilios de cocina y de comer. Orientación de la Norma Esfera 2 sobre higiene de utensilios; Norma Esfera WASH 1 (promoción de la higiene) sobre disponibilidad de jabón. El catálogo ACNUR CRI incluye el jabón como artículo estándar."

