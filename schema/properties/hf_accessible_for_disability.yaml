id: hf_accessible_for_disability
maturity: draft
label:
  en: "Physically accessible for persons with disabilities"
  fr: "Physiquement accessible aux personnes en situation de handicap"
  es: "Físicamente accesible para personas con discapacidad"

definition:
  en: "Whether the facility is physically accessible for persons with mobility impairments: ramp or step-free entry and accessible latrine. Three-level response: `yes` (fully accessible on both counts), `partial` (one criterion met but not both), `no` (neither). Observed by the enumerator. Sphere 2018 inclusion standards; WASH FIT inclusiveness indicator; aligned with Washington Group inclusion framing used in FunctioningProfile."
  fr: "Si l'établissement est physiquement accessible aux personnes à mobilité réduite : entrée avec rampe ou sans marche et latrine accessible. Réponse à trois niveaux : `yes` (pleinement accessible selon les deux critères), `partial` (un critère rempli mais pas les deux), `no` (aucun). Observé par l'enquêteur. Normes d'inclusion de Sphère 2018 ; indicateur d'inclusivité WASH FIT ; aligné sur le cadrage d'inclusion du Washington Group utilisé dans FunctioningProfile."
  es: "Si el establecimiento es físicamente accesible para personas con discapacidad motora: entrada con rampa o sin escalones y letrina accesible. Respuesta de tres niveles: `yes` (plenamente accesible en ambos criterios), `partial` (un criterio cumplido pero no ambos), `no` (ninguno). Observado por el enumerador. Normas de inclusión de Esfera 2018; indicador de inclusividad WASH FIT; alineado con el marco de inclusión del Grupo de Washington usado en FunctioningProfile."

type: string
cardinality: single
core: true
vocabulary: yes-no-partial
references: null
category: habitability
sensitivity: standard
