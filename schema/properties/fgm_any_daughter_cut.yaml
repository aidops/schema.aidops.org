id: fgm_any_daughter_cut
maturity: draft
label:
  en: "Any daughter has been circumcised / cut"
  fr: "Une fille a été excisée / coupée"
  es: "Alguna hija ha sido circuncidada / cortada"
definition:
  en: "Whether any of the woman's daughters has been circumcised / cut. MICS 6 FG14. Asked only of women with living daughters when the FGM module is enabled. Household-level aggregate of per-daughter cut status; a yes triggers per-daughter detail items (age at cutting, performer)."
  fr: "Si l'une des filles de la femme a été excisée / coupée. MICS 6 FG14. Posé uniquement aux femmes ayant des filles vivantes lorsque le module MGF est activé. Agrégat au niveau ménage du statut d'excision par fille ; un oui déclenche les items détaillés par fille (âge à l'excision, exécutant)."
  es: "Si alguna de las hijas de la mujer ha sido circuncidada / cortada. MICS 6 FG14. Se pregunta solo a mujeres con hijas vivas cuando el módulo MGF está habilitado. Agregado a nivel de hogar del estado de corte por hija; un sí desencadena los ítems detallados por hija (edad al corte, ejecutor)."
