id: care_satisfaction
maturity: draft
label:
  en: "Satisfaction with the care received"
  fr: "Satisfaction à l'égard des soins reçus"
  es: "Satisfacción con la atención recibida"

definition:
  en: "Overall satisfaction of the household member with the care received during the recent 30-day care-seeking episode, rated on a symmetric four-point scale plus don't know (`care-satisfaction-5`). Aligned with the WHO People's Voice Survey care-experience domain ('Overall, how would you rate the quality of health care you received?'). Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`."
  fr: "Satisfaction globale du membre du ménage à l'égard des soins reçus lors de l'épisode récent (30 jours) de recours aux soins, évaluée sur une échelle symétrique à quatre niveaux plus « ne sait pas » (`care-satisfaction-5`). Alignée sur le domaine « expérience de soins » de l'enquête People's Voice Survey de l'OMS (« Globalement, comment évalueriez-vous la qualité des soins de santé que vous avez reçus ? »). Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`."
  es: "Satisfacción general del miembro del hogar con la atención recibida durante el episodio reciente (30 días) de búsqueda de atención, calificada en una escala simétrica de cuatro niveles más 'no sabe' (`care-satisfaction-5`). Alineada con el dominio 'experiencia de atención' de la People's Voice Survey de la OMS ('En general, ¿cómo calificaría la calidad de la atención de salud que recibió?'). Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`."

type: string
cardinality: single
