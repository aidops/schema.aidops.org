id: gbv_ipv_emotional_12m_ever
maturity: draft
label:
  en: "Derived: experienced emotional IPV in past 12 months"
  fr: "Dérivé : a subi une VPI émotionnelle au cours des 12 derniers mois"
  es: "Derivado: experimentó VPI emocional en los últimos 12 meses"

definition:
  en: >
    Derived boolean indicator: true if the respondent experienced at least one emotional IPV act
    in the past 12 months. Formula: TRUE if any of gbv_emot_humiliate_12m_freq,
    gbv_emot_threaten_harm_12m_freq, or gbv_emot_insult_12m_freq = 'often' or 'sometimes'.
    Sensitivity: restricted. Minimum aggregate n=30 before publication. Derived, not asked.
  fr: >
    Indicateur booléen dérivé : vrai si la répondante a subi au moins un acte de VPI émotionnelle
    au cours des 12 derniers mois. Formule : VRAI si l'un des 3 items de fréquence 12m de VPI
    émotionnelle = 'souvent' ou 'parfois'. Dérivé, non posé.
  es: >
    Indicador booleano derivado: verdadero si la encuestada experimentó al menos un acto de VPI
    emocional en los últimos 12 meses. Fórmula: VERDADERO si alguno de los 3 ítems de frecuencia
    12m de VPI emocional = 'often' o 'sometimes'. Derivado, no preguntado.

type: boolean
cardinality: single
vocabulary: null
references: null
category: scores
core: false
sensitivity: restricted
