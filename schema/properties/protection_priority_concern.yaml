id: protection_priority_concern
maturity: draft
label:
  en: "Priority protection concern (self-reported, household)"
  fr: "Préoccupation de protection prioritaire (auto-déclarée, ménage)"
  es: "Preocupación de protección prioritaria (auto-reportada, hogar)"

definition:
  en: "The most serious protection concern the household currently faces, self-identified by the respondent. This is a prioritization question — it does not replace the specific module items, but allows respondents to flag their own priority concern, which may surface protection dimensions not captured by the module structure. Useful for qualitative reporting and participatory feedback. The vocabulary mirrors the profile's module structure. prefer_not_to_say is a valid response and must not be re-coded as missing. Based on UNHCR Participatory Assessment Guidance (2006); GPC PAF all three domains; REACH Protection Monitoring generic tool; Sphere Protection Principle 1."
  fr: "La préoccupation de protection la plus grave à laquelle le ménage est actuellement confronté, auto-identifiée par le répondant. Il s'agit d'une question de priorisation — elle ne remplace pas les items spécifiques des modules, mais permet aux répondants de signaler leur propre préoccupation prioritaire, ce qui peut faire remonter des dimensions de protection non capturées par la structure du module. Utile pour les rapports qualitatifs et les retours participatifs. Le vocabulaire reflète la structure des modules du profil. prefer_not_to_say est une réponse valide et ne doit pas être recodée comme manquante. Fondé sur les Directives d'évaluation participative UNHCR (2006) ; GPC PAF les trois domaines ; outil générique de suivi de la protection REACH ; Sphère Principe de protection 1."
  es: "El problema de protección más grave al que se enfrenta actualmente el hogar, auto-identificado por el encuestado. Esta es una pregunta de priorización — no reemplaza los ítems específicos de los módulos, sino que permite a los encuestados señalar su propia preocupación prioritaria, lo que puede revelar dimensiones de protección no capturadas por la estructura del módulo. Útil para informes cualitativos y retroalimentación participativa. El vocabulario refleja la estructura de módulos del perfil. prefer_not_to_say es una respuesta válida y no debe recodificarse como faltante. Basado en la Guía de Evaluación Participativa del ACNUR (2006); GPC PAF los tres dominios; herramienta genérica de monitoreo de protección de REACH; Principio de Protección 1 de Esfera."

type: string
cardinality: single
