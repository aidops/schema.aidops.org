id: climate_primary_livelihood_climate_dependent
maturity: draft
label:
  en: "Primary livelihood is climate-dependent"
  fr: "Le principal moyen de subsistance est dépendant du climat"
  es: "El principal medio de vida es dependiente del clima"

definition:
  en: >
    Single-select sensitivity indicator asking whether the household's primary
    source of income or food is mainly dependent on rainfall, temperature, or
    seasonal patterns — for example, crop farming, livestock herding, fishing,
    or rain-fed pastoralism. This is a sensitivity indicator in the IPCC
    tripartite framework: a household whose primary livelihood is fully
    climate-dependent has intrinsically higher sensitivity regardless of other
    adaptive factors. Coordination note: the livelihood activity type itself is
    captured on LivelihoodProfile using main_livelihood_activity and the
    livelihood-activity-category vocabulary. This property asks only about
    climate dependence, not about the activity type. The `climate_` prefix
    signals that this sensitivity item belongs to the climate adaptation
    profile, not to RIMA-II.
  fr: >
    Indicateur de sensibilité à sélection unique demandant si la principale
    source de revenus ou de nourriture du ménage dépend principalement des
    précipitations, de la température ou des cycles saisonniers — par exemple,
    l'agriculture vivrière, l'élevage, la pêche ou le pastoralisme pluvial.
    Il s'agit d'un indicateur de sensibilité dans le cadre tripartite du GIEC :
    un ménage dont le principal moyen de subsistance est entièrement dépendant
    du climat présente intrinsèquement une sensibilité plus élevée,
    indépendamment des autres facteurs adaptatifs.
  es: >
    Indicador de sensibilidad de selección única que pregunta si la principal
    fuente de ingresos o alimentos del hogar depende principalmente de las
    lluvias, la temperatura o los ciclos estacionales — por ejemplo, la
    agricultura de secano, la ganadería, la pesca o el pastoreo. Es un
    indicador de sensibilidad en el marco tripartito del IPCC: un hogar cuyo
    principal medio de vida depende totalmente del clima tiene intrínsecamente
    mayor sensibilidad independientemente de otros factores adaptativos.

type: string
cardinality: single
core: true
