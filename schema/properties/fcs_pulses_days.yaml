id: fcs_pulses_days
maturity: draft
label:
  en: "FCS pulses days"
  fr: "SCA jours légumineuses"
  es: "PCA días legumbres"

definition:
  en: "Number of days in the past seven during which any member of the household consumed pulses, legumes, or nuts (including groundnuts, cashews, and other nuts). Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé des légumineuses ou des noix (y compris arachides, noix de cajou et autres noix). Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió legumbres, leguminosas o frutos secos (incluidos cacahuetes, anacardos y otros frutos secos). Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
core: true
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_fcs, wfp_cari]
