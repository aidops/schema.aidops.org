id: newborn_birth_weight_kg
maturity: draft
label:
  en: Birth weight (kilograms)
  fr: "Poids de naissance (kilogrammes)"
  es: "Peso al nacer (kilogramos)"
definition:
  en: "The baby's weight at birth in kilograms, as measured or recalled. DHS-8 m19. Low birthweight threshold: <2.5 kg (WHO). The decimal value is recorded when available; the form may group responses into less_than_2500g / 2500g_or_more / not_weighed / dont_know for respondents who only recall a category. Derives newborn_low_birth_weight. Only asked if newborn_weighed_at_birth = yes."
  fr: "Le poids du bébé à la naissance en kilogrammes, tel que mesuré ou rappelé. DHS-8 m19. Seuil de faible poids à la naissance : < 2,5 kg (OMS). La valeur décimale est enregistrée lorsqu'elle est disponible ; le formulaire peut regrouper les réponses en less_than_2500g / 2500g_or_more / not_weighed / dont_know pour les répondants qui ne se souviennent que d'une catégorie. Génère newborn_low_birth_weight. Posé uniquement si newborn_weighed_at_birth = oui."
  es: "El peso del bebé al nacer en kilogramos, tal como fue medido o recordado. DHS-8 m19. Umbral de bajo peso al nacer: <2,5 kg (OMS). El valor decimal se registra cuando está disponible; el formulario puede agrupar las respuestas en less_than_2500g / 2500g_or_more / not_weighed / dont_know para los encuestados que solo recuerdan una categoría. Deriva newborn_low_birth_weight. Solo se pregunta si newborn_weighed_at_birth = sí."
type: decimal
cardinality: single
core: true
