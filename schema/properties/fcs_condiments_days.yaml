id: fcs_condiments_days
maturity: draft
label:
  en: "FCS condiments days"
  fr: "SCA jours condiments"
  es: "PCA días condimentos"

definition:
  en: "Number of days in the past seven during which any member of the household consumed condiments, salt, spices, tea, or coffee used in small quantities. This is a screener item with FCS weight 0: frequent consumption of only condiments signals severe diet narrowing even though this group does not contribute to the composite score. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé des condiments, du sel, des épices, du thé ou du café en petites quantités. Il s'agit d'un item de dépistage de poids FCS 0 : la consommation fréquente de seuls condiments signale un rétrécissement sévère du régime alimentaire, même si ce groupe ne contribue pas au score composite. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió condimentos, sal, especias, té o café en pequeñas cantidades. Es un ítem de detección con peso FCS 0: el consumo frecuente solo de condimentos señala un empobrecimiento severo de la dieta aunque este grupo no contribuya al puntaje compuesto. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
core: true
