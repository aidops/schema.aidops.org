id: pnc_mother_content_family_planning
maturity: draft
label:
  en: Family planning discussed during postnatal check
  fr: "Planification familiale discutée lors du contrôle postnatal"
  es: "Planificación familiar discutida durante la revisión posnatal"
definition:
  en: "Whether a health worker discussed family planning methods with the woman during her postnatal check. DHS-8 m78h. New in DHS-8. Owned by MaternalNewbornHealthProfile as a PNC service quality indicator. ReproductiveHealthProfile owns subsequent contraceptive outcome (method adopted, current use). Only asked if pnc_mother_any_check = yes."
  fr: "Si un agent de santé a discuté des méthodes de planification familiale avec la femme lors de son contrôle postnatal. DHS-8 m78h. Nouveau dans le DHS-8. Appartient au MaternalNewbornHealthProfile comme indicateur de qualité du service SPN. Le ReproductiveHealthProfile est propriétaire du résultat contraceptif ultérieur (méthode adoptée, utilisation actuelle). Posé uniquement si pnc_mother_any_check = oui."
  es: "Si un trabajador de salud discutió métodos de planificación familiar con la mujer durante su revisión posnatal. DHS-8 m78h. Nuevo en DHS-8. Pertenece al MaternalNewbornHealthProfile como indicador de calidad del servicio PPN. El ReproductiveHealthProfile es propietario del resultado anticonceptivo posterior (método adoptado, uso actual). Solo se pregunta si pnc_mother_any_check = sí."
type: boolean
cardinality: single
