  en: Vendor count change vs. pre-crisis
  fr: Évolution du nombre de vendeurs par rapport à avant la crise
  es: Cambio en el conteo de vendedores vs. antes de la crisis

definition:
  en: "Whether the number of vendors at this market has increased, stayed the same, or decreased compared to before the current crisis, as reported by key vendor informants. Uses the change-direction-3 vocabulary."
  fr: "Indique si le nombre de vendeurs sur ce marché a augmenté, est resté stable ou a diminué par rapport à avant la crise actuelle, tel que rapporté par les informateurs clés vendeurs. Utilise le vocabulaire change-direction-3."
  es: "Si el número de vendedores en este mercado ha aumentado, se ha mantenido igual o ha disminuido en comparación con antes de la crisis actual, según lo reportado por informantes clave vendedores. Usa el vocabulario change-direction-3."

