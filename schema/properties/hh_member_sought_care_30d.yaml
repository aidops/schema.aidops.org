id: hh_member_sought_care_30d
maturity: draft
label:
  en: "Household member(s) who needed care actually sought or received care"
  fr: "Le(s) membre(s) du ménage ayant eu besoin de soins en a/ont effectivement recherché ou reçu"
  es: "El/los miembro(s) del hogar que necesitaba(n) atención efectivamente la buscó/buscaron o recibió/recibieron"

definition:
  en: "Whether household member(s) who needed care in the last 30 days actually sought or received that care, captured as an all/some/none extent (`care-coverage-extent`). `yes_some` indicates partial unmet need (some but not all members who needed care received it) and is a distinct condition from both full access and complete failure to access care. Ask only if `hh_member_needed_care_30d` is true."
  fr: "Si le(s) membre(s) du ménage ayant eu besoin de soins au cours des 30 derniers jours en a/ont effectivement recherché ou reçu, saisi comme une étendue tous/certains/aucun (`care-coverage-extent`). `yes_some` indique un besoin non satisfait partiel (certains mais pas tous les membres qui avaient besoin de soins en ont reçu) et constitue une condition distincte à la fois d'un accès complet et d'un échec total d'accès aux soins. Ne poser que si `hh_member_needed_care_30d` est vrai."
  es: "Si el/los miembro(s) del hogar que necesitaba(n) atención en los últimos 30 días efectivamente la buscó/buscaron o recibió/recibieron, capturado como un alcance todos/algunos/ninguno (`care-coverage-extent`). `yes_some` indica una necesidad insatisfecha parcial (algunos pero no todos los miembros que necesitaban atención la recibieron) y es una condición distinta tanto del acceso completo como de la falta total de acceso a la atención. Preguntar solo si `hh_member_needed_care_30d` es verdadero."

type: string
cardinality: single
core: true
vocabulary: care-coverage-extent
references: null
category: health_access_unmet_need
sensitivity: sensitive
