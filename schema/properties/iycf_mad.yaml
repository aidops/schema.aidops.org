id: iycf_mad
maturity: draft
label:
  en: "Minimum Acceptable Diet (MAD) achieved"
  fr: "Alimentation minimale acceptable (MAD) atteinte"
  es: "Dieta Mínima Aceptable (MAD) alcanzada"

definition:
  en: "Derived boolean: whether the child achieved the Minimum Acceptable Diet (MAD) in the previous 24 hours. Applies to children 6–23 months. Formula (WHO/UNICEF 2021): breastfed children: iycf_mdd_c = true AND iycf_mmf = true; non-breastfed children: iycf_mdd_c = true AND iycf_mmf = true AND iycf_mmff = true. MAD is a composite proxy for diet quality."
  fr: "Booléen dérivé : indique si l'enfant a atteint l'alimentation minimale acceptable (MAD) au cours des 24 heures précédentes. S'applique aux enfants de 6 à 23 mois. Formule (OMS/UNICEF 2021) : enfants allaités : iycf_mdd_c = vrai ET iycf_mmf = vrai ; enfants non allaités : iycf_mdd_c = vrai ET iycf_mmf = vrai ET iycf_mmff = vrai. Le MAD est un indicateur composite de la qualité de l'alimentation."
  es: "Booleano derivado: indica si el niño alcanzó la Dieta Mínima Aceptable (MAD) en las 24 horas anteriores. Se aplica a niños de 6–23 meses. Fórmula (OMS/UNICEF 2021): niños amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero; niños no amamantados: iycf_mdd_c = verdadero Y iycf_mmf = verdadero Y iycf_mmff = verdadero. El MAD es un indicador compuesto de la calidad de la dieta."

type: boolean
cardinality: single
core: true
