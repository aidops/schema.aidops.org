id: pnc_mother_any_check
maturity: draft
label:
  en: Mother received any postnatal health check
  fr: "La mère a reçu un contrôle de santé postnatal"
  es: La madre recibió alguna revisión de salud posnatal
definition:
  en: "Whether the woman received a postnatal health check from any health worker after the most recent delivery. DHS-8: derived from the m70/m74/m76 series. MICS6 postnatal section. Gateway for PNC mother content items. WHO PNC 2022 recommends at least 4 contacts for mother and newborn; the minimum first contact should be within 24 hours in a facility. Asked regardless of birth outcome."
  fr: "Si la femme a reçu un contrôle de santé postnatal de la part d'un agent de santé après le dernier accouchement. DHS-8 : dérivé de la série m70/m74/m76. Section postnatale MICS6. Seuil pour les items de contenu PNC mère. L'OMS PNC 2022 recommande au moins 4 contacts pour la mère et le nouveau-né ; le premier contact minimum doit avoir lieu dans les 24 heures dans un établissement. Posé indépendamment de l'issue de la naissance."
  es: "Si la mujer recibió una revisión de salud posnatal de algún trabajador de salud después del parto más reciente. DHS-8: derivado de la serie m70/m74/m76. Sección posnatal de MICS6. Puerta de entrada para los ítems de contenido de PPN materna. La OMS PNC 2022 recomienda al menos 4 contactos para la madre y el recién nacido; el primer contacto mínimo debe ser dentro de las 24 horas en un establecimiento. Se pregunta independientemente del resultado del parto."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: postnatal_care
age_applicability:
  - adult
sensitivity: sensitive
