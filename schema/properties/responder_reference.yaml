id: responder_reference
maturity: draft
label:
  en: "Responder reference (optional scope)"
  fr: "Référence de l'intervenant (portée facultative)"
  es: "Referencia del actor humanitario (alcance opcional)"

definition:
  en: "Optional free-text identifier for a specific humanitarian responder (agency name or response pillar) that the AccountabilityToAffectedPopulationsProfile record is asking about. By default, AAP items are asked generically ('aid providers', 'the assistance you received') following the IASC / REACH Menu 2018 convention, keeping the profile at `sensitivity: sensitive`. When this property is populated with a specific agency or pillar name, the items' scope becomes agency-specific and the overall profile sensitivity escalates to `restricted` because naming a specific responder alongside a negative perception is reputationally sensitive. Null or absent means the default generic scope applies."
  fr: "Identifiant en texte libre facultatif pour un intervenant humanitaire spécifique (nom d'agence ou pilier de réponse) sur lequel porte l'enregistrement du Profil de redevabilité envers les populations affectées. Par défaut, les items AAP sont posés de manière générique (« intervenants », « l'aide que vous avez reçue ») selon la convention du Menu IASC / REACH 2018, gardant le profil à `sensitivity: sensitive`. Lorsque cette propriété est renseignée avec un nom d'agence ou de pilier spécifique, la portée des items devient spécifique à l'agence et la sensibilité globale du profil s'élève à `restricted` car nommer un intervenant spécifique en parallèle d'une perception négative est sensible sur le plan réputationnel. Nul ou absent signifie que la portée générique par défaut s'applique."
  es: "Identificador de texto libre opcional para un actor humanitario específico (nombre de agencia o pilar de respuesta) sobre el cual el registro del Perfil de Rendición de Cuentas a las Poblaciones Afectadas está indagando. Por defecto, los ítems AAP se hacen de manera genérica («actores humanitarios», «la ayuda que recibió») siguiendo la convención del Menú IASC / REACH 2018, manteniendo el perfil en `sensitivity: sensitive`. Cuando esta propiedad se completa con un nombre de agencia o pilar específico, el alcance de los ítems se vuelve específico de la agencia y la sensibilidad general del perfil se eleva a `restricted` porque nombrar a un actor específico junto con una percepción negativa es sensible en términos reputacionales. Nulo o ausente significa que se aplica el alcance genérico por defecto."

type: string
cardinality: single
