id: iycf_fg_pulses_nuts
maturity: draft
label:
  en: "MDD-C food group 3: pulses, nuts, and seeds"
  fr: "Groupe alimentaire MDD-C 3 : légumineuses, noix et graines"
  es: "Grupo alimentario MDD-C 3: legumbres, nueces y semillas"

definition:
  en: "Whether the child ate any food from the pulses, nuts, and seeds group in the previous 24 hours. Food group 3 of the 8-group MDD-C framework (WHO/UNICEF 2021). Example foods: beans, lentils, peas, groundnuts, peanut butter, sesame, seeds. Published wording: 'Yesterday during the day or at night, did (NAME) eat/drink any [pulses, nuts and seeds]?'"
  fr: "Indique si l'enfant a mangé un aliment du groupe légumineuses, noix et graines au cours des 24 heures précédentes. Groupe alimentaire 3 du cadre MDD-C à 8 groupes (OMS/UNICEF 2021). Exemples d'aliments : haricots, lentilles, pois, arachides, beurre d'arachide, sésame, graines."
  es: "Indica si el niño comió algún alimento del grupo de legumbres, nueces y semillas en las 24 horas anteriores. Grupo alimentario 3 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Ejemplos de alimentos: frijoles, lentejas, guisantes, maní, mantequilla de maní, sésamo, semillas."

type: boolean
cardinality: single
core: true
