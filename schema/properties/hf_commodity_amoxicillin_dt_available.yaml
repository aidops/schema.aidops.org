id: hf_commodity_amoxicillin_dt_available
maturity: draft
label:
  en: "Amoxicillin dispersible tablet available and within expiry"
  fr: "Amoxicilline en comprimé dispersible disponible et non périmée"
  es: "Amoxicilina en tableta dispersable disponible y vigente"

definition:
  en: "Whether amoxicillin dispersible tablet (125 mg or 250 mg) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA tracer (M33); WHO EML AWaRe Access; WHO-recommended pediatric pneumonia treatment. Sensitive: stock-out reporting is politically sensitive."
  fr: "Si l'amoxicilline en comprimé dispersible (125 mg ou 250 mg) est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA (M33) ; EML AWaRe Access de l'OMS ; traitement pédiatrique recommandé par l'OMS pour la pneumonie. Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si la amoxicilina en tableta dispersable (125 mg o 250 mg) está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA (M33); EML AWaRe Access de la OMS; tratamiento pediátrico recomendado por la OMS para la neumonía. Sensible: el reporte de desabastecimientos es políticamente sensible."

