id: weai_mobility_family
maturity: draft
label:
  en: "WEAI mobility — visits family or friends"
  fr: "WEAI mobilité — visites à la famille ou amis"
  es: "WEAI movilidad — visitas a familiares o amigos"

definition:
  en: "How often the respondent visits family members or friends outside their household. One of five mobility items in pro-WEAI Indicator B6 (visiting important locations). Contributes to Condition A adequacy: at least two of (city/town, market, family/friends) visited at weekly frequency or more."
  fr: "À quelle fréquence le répondant rend-il visite à des membres de sa famille ou à des amis en dehors de son ménage. L'un des cinq items de mobilité de l'indicateur B6 du pro-WEAI (visite de lieux importants). Contribue à l'adéquation de la condition A : au moins deux parmi (ville, marché, famille/amis) visités au moins une fois par semaine."
  es: "Con qué frecuencia el encuestado visita a familiares o amigos fuera de su hogar. Uno de los cinco ítems de movilidad del Indicador B6 del pro-WEAI (visita a lugares importantes). Contribuye a la adecuación de la Condición A: al menos dos de (ciudad/pueblo, mercado, familia/amigos) visitados con frecuencia semanal o más."

type: string
cardinality: single
core: true
vocabulary: weai-frequency-7
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
