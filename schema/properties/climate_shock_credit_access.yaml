id: climate_shock_credit_access
maturity: draft
label:
  en: "Perceived ability to access credit following a major climate disaster"
  fr: "Capacité perçue à accéder à un crédit après une catastrophe climatique majeure"
  es: "Capacidad percibida para acceder a crédito tras un desastre climático mayor"

definition:
  en: >
    Single-select item asking whether the household believes it could access a
    loan or credit to help recover if hit by a major drought, flood, or other
    climate disaster. A perceived/hypothetical credit-access item specifically
    framed for climate shocks. RIMA-II overlap: LivelihoodProfile.access_to_credit
    asks about general credit access for emergencies. This property adds a
    climate-disaster trigger specifier ("if a major climate disaster hit
    tomorrow") that captures a distinct dimension — households may have access
    to credit in theory but not specifically for climate recovery. When both
    profiles are collected, this item can be asked as a conditional follow-up
    ("specifically for a climate disaster...") rather than a standalone.
    Reuses the credit-access-level vocabulary codes (yes_formal_source /
    yes_informal_only / uncertain / no).
  fr: >
    Item à sélection unique demandant si le ménage pense qu'il pourrait accéder
    à un prêt ou à un crédit pour faciliter sa reprise si une grande sécheresse,
    inondation ou autre catastrophe climatique le frappait. Chevauchement avec
    LivelihoodProfile.access_to_credit (accès général au crédit). Cette
    propriété ajoute un déclencheur spécifique aux catastrophes climatiques.
    Réutilise les codes du vocabulaire credit-access-level.
  es: >
    Ítem de selección única que pregunta si el hogar cree que podría acceder a
    un préstamo o crédito para recuperarse si fuera afectado mañana por una
    gran sequía, inundación u otro desastre climático. Superposición con
    LivelihoodProfile.access_to_credit (acceso general al crédito). Esta
    propiedad añade un detonador específico para desastres climáticos. Reutiliza
    los códigos del vocabulario credit-access-level.

type: string
cardinality: single
core: false
vocabulary: credit-access-level
references: null
category: climate
sensitivity: sensitive
