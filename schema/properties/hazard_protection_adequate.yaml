id: hazard_protection_adequate
maturity: draft
label:
  en: "Shelter protection from hazards adequate"
  fr: "Protection de l'abri contre les risques adéquate"
  es: "Protección del refugio ante peligros adecuada"

definition:
  en: "Whether the household feels its shelter adequately protects it from local environmental hazards such as flooding, landslides, extreme heat, or strong winds. Relates to Sphere Standard 2 key indicator: percentage of shelters located in areas with no or minimal known natural or man-made threats, risks and hazards."
  fr: "Si le ménage estime que son abri le protège adéquatement des risques environnementaux locaux tels que les inondations, glissements de terrain, chaleur extrême ou vents forts. Lié à l'indicateur clé de la Norme Sphère 2 : pourcentage d'abris situés dans des zones sans menaces, risques et dangers naturels ou d'origine humaine connus ou minimaux."
  es: "Si el hogar siente que su refugio lo protege adecuadamente de peligros ambientales locales como inundaciones, deslizamientos de tierra, calor extremo o vientos fuertes. Relacionado con el indicador clave de la Norma Esfera 2: porcentaje de refugios ubicados en áreas con ninguna o mínima amenaza natural o antrópica conocida, riesgos y peligros."

type: string
cardinality: single
vocabulary: yes-no-partial
references: null
category: shelter
core: false
sensitivity: standard
valid_instruments: [sphere_shelter_adequacy, reach_msna]
