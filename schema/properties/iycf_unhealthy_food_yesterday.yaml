id: iycf_unhealthy_food_yesterday
maturity: draft
label:
  en: "Unhealthy food consumed yesterday"
  fr: "Aliment non sain consommé hier"
  es: "Alimento no saludable consumido ayer"

definition:
  en: "Whether the child ate any sentinel unhealthy food yesterday (24-hour recall). Published wording (WHO/UNICEF 2021): 'Yesterday, did (NAME) eat any of the following snack or packaged foods: chips/crisps, cookies/biscuits, chocolate or candy, instant noodles, or other sweet or salty packaged snacks?' Applies to children 6–23 months. Numerator item for the Unhealthy Food Consumption indicator, a new indicator in the 2021 update."
  fr: "Indique si l'enfant a mangé un aliment non sain hier (rappel sur 24 heures). Formulation publiée (OMS/UNICEF 2021) : « Hier, (PRÉNOM) a-t-il/elle mangé l'un des aliments de grignotage ou emballés suivants : chips/biscuits salés, biscuits/cookies, chocolat ou bonbons, nouilles instantanées ou autres snacks sucrés ou salés emballés ? » S'applique aux enfants de 6 à 23 mois. Item du numérateur pour l'indicateur de consommation d'aliments non sains, nouvel indicateur dans la mise à jour 2021."
  es: "Indica si el niño comió algún alimento no saludable centinela ayer (recordatorio de 24 horas). Redacción publicada (OMS/UNICEF 2021): 'Ayer, ¿comió (NOMBRE) alguno de los siguientes alimentos de botana o empaquetados: papas fritas, galletas/galletas dulces, chocolate o dulces, fideos instantáneos u otros botanas empaquetadas dulces o saladas?' Se aplica a niños de 6–23 meses. Ítem numerador para el indicador de Consumo de Alimentos No Saludables, un nuevo indicador en la actualización de 2021."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: nutrition
age_applicability:
  - infant_0_1
valid_instruments: [who_iycf_2021]
