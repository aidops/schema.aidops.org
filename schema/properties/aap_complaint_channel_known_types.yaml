id: aap_complaint_channel_known_types
maturity: draft
label:
  en: "AAP: Known complaint channel types"
  fr: "Redevabilité : Types de canaux de plainte connus"
  es: "Rendición de cuentas: Tipos de canales de quejas conocidos"

definition:
  en: "The channel(s) the respondent names as available for contacting aid providers. Multi-select. Asked only when `aap_complaint_channel_known = yes`. The enumerator does not read the list; the respondent's spontaneous recall is recorded. Informs feedback-mechanism design (IFRC CEA Toolkit channel typology). Source: IASC / REACH Menu 2018."
  fr: "Le(s) canal(ux) que le répondant nomme comme disponible(s) pour contacter les intervenants. Sélection multiple. Demandé uniquement si `aap_complaint_channel_known = yes`. L'enquêteur ne lit pas la liste ; c'est le rappel spontané du répondant qui est enregistré. Informe la conception des mécanismes de retour d'information (typologie de canaux du Toolkit CEA de la FICR). Source : Menu IASC / REACH 2018."
  es: "El/los canal(es) que el encuestado nombra como disponibles para contactar a los actores humanitarios. Selección múltiple. Se pregunta solo cuando `aap_complaint_channel_known = yes`. El encuestador no lee la lista; se registra el recuerdo espontáneo del encuestado. Informa el diseño del mecanismo de retroalimentación (tipología de canales del Kit de Herramientas CEA de la FICR). Fuente: Menú IASC / REACH 2018."

type: string
cardinality: multiple
vocabulary: aap-feedback-channel
references: null
category: aap_feedback
core: false
sensitivity: standard
