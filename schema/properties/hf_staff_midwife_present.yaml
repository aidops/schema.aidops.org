id: hf_staff_midwife_present
maturity: draft
label:
  en: "Qualified midwife on duty today"
  fr: "Sage-femme qualifiée de service aujourd'hui"
  es: "Partera calificada de servicio hoy"

definition:
  en: "Whether at least one qualified midwife is on duty at the facility on the observation date. 'Qualified' means holding a nationally recognized midwifery qualification. Reported and observed. Critical for MISP Objective 4 (prevent excess maternal and newborn mortality) and for SARA ANC/delivery service availability."
  fr: "Si au moins une sage-femme qualifiée est de service à l'établissement à la date d'observation. « Qualifiée » signifie titulaire d'une qualification nationalement reconnue en obstétrique. Rapporté et observé. Critique pour l'Objectif 4 du MISP (prévenir l'excès de mortalité maternelle et néonatale) et pour la disponibilité SARA des services CPN/accouchement."
  es: "Si al menos una partera calificada está de servicio en el establecimiento en la fecha de observación. «Calificada» significa titular de una cualificación de obstetricia reconocida nacionalmente. Reportado y observado. Crítico para el Objetivo 4 del MISP (prevenir exceso de mortalidad materna y neonatal) y para la disponibilidad SARA de servicios ACP/parto."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: governance
sensitivity: standard
