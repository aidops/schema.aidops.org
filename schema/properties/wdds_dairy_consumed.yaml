id: wdds_dairy_consumed
maturity: draft
label:
  en: "WDDS dairy consumed"
  fr: "WDDS produits laitiers consommés"
  es: "WDDS lácteos consumidos"

definition:
  en: "Whether the woman consumed dairy products at meal-contributing quantities in the past 24 hours. One of ten food groups in the FAO Minimum Dietary Diversity for Women (MDD-W) indicator."
  fr: "Si la femme a consommé des produits laitiers en quantités contribuant à un repas au cours des dernières 24 heures. L'un des dix groupes alimentaires de l'indicateur de Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO."
  es: "Si la mujer consumió productos lácteos en cantidades que contribuyen a una comida en las últimas 24 horas. Uno de los diez grupos alimentarios del indicador de Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO."

type: boolean
