id: electricity_cost_share
maturity: draft
label:
  en: "Electricity cost as share of income"
  fr: "Coût de l'électricité en part du revenu"
  es: "Costo de electricidad como porcentaje del ingreso"

definition:
  en: "Banded estimate of the share of monthly household income spent on electricity. MTF electricity affordability attribute: Tier 4-5 criterion is met when the cost of 365 kWh per year is less than 5% of household income, corresponding to the 'less_than_5_pct' band. The three-band response captures this threshold without requiring exact income and expenditure data. Source: MTF household survey."
  fr: "Estimation par tranche de la part du revenu mensuel du ménage consacrée à l'électricité. Attribut d'accessibilité financière de l'électricité MTF : le critère des niveaux 4 à 5 est satisfait lorsque le coût de 365 kWh par an est inférieur à 5 % du revenu du ménage, correspondant à la tranche 'less_than_5_pct'. La réponse à trois tranches capture ce seuil sans nécessiter de données précises sur les revenus et les dépenses. Source : enquête ménage MTF."
  es: "Estimación por bandas de la proporción del ingreso mensual del hogar gastada en electricidad. Atributo de asequibilidad de electricidad MTF: el criterio de los Niveles 4 a 5 se cumple cuando el costo de 365 kWh por año es inferior al 5% del ingreso del hogar, correspondiendo a la banda 'less_than_5_pct'. La respuesta de tres bandas captura este umbral sin requerir datos precisos de ingresos y gastos. Fuente: encuesta de hogares MTF."

type: string
cardinality: single
core: false
vocabulary: income-share-band
references: null
category: energy
sensitivity: standard
