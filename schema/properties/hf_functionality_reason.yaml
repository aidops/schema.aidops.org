id: hf_functionality_reason
maturity: draft
label:
  en: "Facility non-functionality reason(s)"
  fr: "Motif(s) de non-fonctionnalité de l'établissement"
  es: "Motivo(s) de no funcionalidad del establecimiento"

definition:
  en: "Reason(s) the facility is only partially functioning or is not functioning at all. Multi-select: damaged building, lack of staff, lack of medicines, lack of equipment, lack of electricity, lack of water, security/access, occupied by armed actors, closed by authorities, natural-disaster damage, other. Ask only when `hf_functionality_status` is not `fully_functioning`. Extended (non-core). Reported. Politically sensitive in conflict contexts."
  fr: "Raison(s) pour lesquelles l'établissement n'est que partiellement fonctionnel ou n'est pas du tout fonctionnel. Sélection multiple : bâtiment endommagé, manque de personnel, manque de médicaments, manque d'équipement, manque d'électricité, manque d'eau, sécurité/accès, occupé par des acteurs armés, fermé par les autorités, dommages dus à une catastrophe naturelle, autre. Ne poser que lorsque `hf_functionality_status` n'est pas `fully_functioning`. Étendu (non-core). Rapporté. Politiquement sensible en contextes de conflit."
  es: "Razón(es) por las que el establecimiento solo funciona parcialmente o no funciona en absoluto. Selección múltiple: edificio dañado, falta de personal, falta de medicamentos, falta de equipamiento, falta de electricidad, falta de agua, seguridad/acceso, ocupado por actores armados, cerrado por autoridades, daños por desastre natural, otro. Preguntar solo cuando `hf_functionality_status` no es `fully_functioning`. Extendido (no-core). Reportado. Políticamente sensible en contextos de conflicto."

type: string
cardinality: multiple
core: false
vocabulary: facility-non-functionality-reason
references: null
category: context
sensitivity: sensitive
