label:
  en: "LCS begging"
  fr: "SCM mendicité"
  es: "EMV mendicidad"

definition:
  en: "Frequency with which the household begged for food or money to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, emergency tier."
  fr: "Fréquence à laquelle le ménage a mendié de la nourriture ou de l'argent pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau d'urgence."
  es: "Frecuencia con la que el hogar mendigó alimentos o dinero para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de emergencia."

