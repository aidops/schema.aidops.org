id: phq9_3
maturity: draft
label:
  en: "PHQ-9 item 3: sleep disturbance"
  fr: "PHQ-9 item 3 : trouble du sommeil"
  es: "PHQ-9 ítem 3: alteración del sueño"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by trouble falling or staying asleep, or sleeping too much. PHQ-9 item 3, measuring sleep disturbance. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par des difficultés à s'endormir, à rester endormi·e, ou par un sommeil excessif. PHQ-9 item 3, mesurant les troubles du sommeil. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por dificultades para conciliar el sueño, permanecer dormida, o por dormir demasiado. Ítem 3 del PHQ-9, que mide la alteración del sueño. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

