id: fies_ran_out
maturity: draft
label:
  en: "FIES ran out of food"
  fr: "FIES manque de nourriture"
  es: "FIES se quedó sin alimentos"

definition:
  en: "Whether, at any time during the FIES reference period, the household ran out of food because of lack of resources. One of eight experience-based items in the FAO Food Insecurity Experience Scale (FIES); the reference period is recorded in recall_period_days."
  fr: "Si, à un moment quelconque de la période de référence FIES, le ménage s'est retrouvé à court de nourriture par manque de ressources. L'un des huit items expérientiels de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO ; la période de référence est enregistrée dans recall_period_days."
  es: "Si en algún momento durante el período de referencia FIES, al hogar se le acabó la comida por falta de recursos. Uno de los ocho ítems basados en experiencia de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO; el período de referencia se registra en recall_period_days."

type: boolean
cardinality: single
