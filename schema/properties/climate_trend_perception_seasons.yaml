id: climate_trend_perception_seasons
maturity: draft
label:
  en: "Perceived shift in rainy or growing season timing compared to 10–15 years ago"
  fr: "Décalage perçu du début de la saison des pluies ou de croissance par rapport à il y a 10–15 ans"
  es: "Cambio percibido en el inicio de la temporada de lluvias o cultivo comparado con hace 10–15 años"

definition:
  en: >
    Single-select item asking whether the respondent perceives the rainy season
    or growing season now starts at a different time of year than it used to,
    compared to when they were growing up or 10–15 years ago. Season-onset shift
    is one of the most consistently reported perceived climate changes in tropical
    agricultural settings (IPCC AR6 WGII Chapter 5) and is highly actionable —
    a confirmed shift can motivate adoption of early or late planting varieties
    captured in climate_adaptive_practices_used. This item uses season-shift
    codes specific to its timing question rather than the generic
    climate-trend-perception vocabulary, because the relevant dimension
    is timing rather than direction of change. Valid codes:
    starts_much_later / starts_somewhat_later / about_same_timing /
    starts_somewhat_earlier / starts_much_earlier / timing_unpredictable /
    dont_know.
  fr: >
    Item à sélection unique demandant si le répondant perçoit que la saison des
    pluies ou de croissance commence maintenant à une période différente de
    l'année par rapport à son enfance ou il y a 10 à 15 ans. Le décalage de
    l'onset saisonnier est l'un des changements climatiques perçus les plus
    systématiquement rapportés dans les contextes agricoles tropicaux (GIEC
    AR6 WGII Chapitre 5).
  es: >
    Ítem de selección única que pregunta si el encuestado percibe que la
    temporada de lluvias o de cultivo ahora comienza en un momento diferente
    del año comparado con cuando era joven o hace 10 a 15 años. El cambio en
    el inicio estacional es uno de los cambios climáticos percibidos más
    consistentemente reportados en contextos agrícolas tropicales (IPCC AR6
    WGII Capítulo 5).

type: string
cardinality: single
