definition:
  en: "Whether anyone in the household has actually contacted aid providers with a question, suggestion, or complaint in the past 6 months. Recall: past 6 months. Source: IASC / REACH Menu 2018."
  fr: "Si un membre du ménage a effectivement contacté les intervenants avec une question, une suggestion ou une plainte au cours des 6 derniers mois. Rappel : 6 derniers mois. Source : Menu IASC / REACH 2018."
  es: "Si algún miembro del hogar ha contactado efectivamente a los actores humanitarios con una pregunta, sugerencia o queja en los últimos 6 meses. Recordatorio: últimos 6 meses. Fuente: Menú IASC / REACH 2018."

