id: climate_adaptive_practice_barrier
maturity: draft
label:
  en: "Most important barrier to adopting more climate-adaptive practices"
  fr: "Principal obstacle à l'adoption de davantage de pratiques climato-adaptatives"
  es: "Principal barrera para adoptar más prácticas de adaptación climática"

definition:
  en: >
    Single-select item asking for the most important barrier preventing the
    household from using more climate-smart practices. Applies when fewer than
    3 practices are selected in climate_adaptive_practices_used; high-adoption
    households need not be asked about barriers. Aligns with IPCC AR6 WGII
    Chapter 17 barriers-to-adaptation framework and World Bank CSA Country
    Profile barriers-to-CSA-adoption analysis.
  fr: >
    Item à sélection unique demandant quel est l'obstacle le plus important
    empêchant le ménage d'utiliser davantage de pratiques climato-intelligentes.
    S'applique lorsque moins de 3 pratiques sont sélectionnées dans
    climate_adaptive_practices_used. S'aligne sur le cadre des obstacles à
    l'adaptation du GIEC AR6 WGII Chapitre 17.
  es: >
    Ítem de selección única que pregunta cuál es la barrera más importante que
    impide al hogar usar más prácticas climáticamente inteligentes. Aplica cuando
    menos de 3 prácticas están seleccionadas en climate_adaptive_practices_used.
    Se alinea con el marco de barreras para la adaptación del IPCC AR6 WGII
    Capítulo 17.

type: string
cardinality: single
core: false
vocabulary: adaptive-practice-barrier
references: null
category: climate
sensitivity: standard
