id: aap_opinion_taken_into_account
maturity: draft
label:
  en: "AAP: Opinion taken into account by aid providers"
  fr: "Redevabilité : Opinion prise en compte par les intervenants"
  es: "Rendición de cuentas: Opinión tenida en cuenta por los actores humanitarios"

definition:
  en: "Whether the respondent feels that aid providers take the household's opinion into account when making decisions that affect them. GTS HVI canonical 'agency / voice' indicator, asked in every major GTS deployment since 2017. Maps to CHS 2024 Commitment 1."
  fr: "Si le répondant estime que les intervenants tiennent compte de l'opinion du ménage lorsqu'ils prennent des décisions qui le concernent. Indicateur canonique d'« agentivité / voix » de GTS HVI, posé dans tous les principaux déploiements GTS depuis 2017. Correspond à l'Engagement 1 de la CHS 2024."
  es: "Si el encuestado siente que los actores humanitarios tienen en cuenta la opinión del hogar al tomar decisiones que lo afectan. Indicador canónico de «agencia / voz» del GTS HVI, preguntado en todos los despliegues principales de GTS desde 2017. Corresponde al Compromiso 1 de la CHS 2024."

