id: fcd_shouted
maturity: draft
label:
  en: "Discipline — shouted, yelled, or screamed at the child"
  fr: "Discipline — crié, hurlé ou crié contre l'enfant"
  es: "Disciplina — gritó o chilló al niño"
definition:
  en: "Whether any adult in the household shouted, yelled, or screamed at the selected child, in the past month. MICS 6 FCD2 item D. Psychological aggression category. Included in the CP.3 violent-discipline composite."
  fr: "Si un adulte du ménage a crié, hurlé ou crié contre l'enfant sélectionné, au cours du mois écoulé. MICS 6 FCD2 item D. Catégorie d'agression psychologique. Inclus dans le composite CP.3 de discipline violente."
  es: "Si algún adulto del hogar le gritó, chilló o gritó al niño seleccionado, en el último mes. MICS 6 FCD2 ítem D. Categoría de agresión psicológica. Incluido en el compuesto CP.3 de disciplina violenta."
