id: anc_content_fetal_heartbeat
maturity: draft
label:
  en: Fetal heartbeat listened to during ANC
  fr: "Battements cardiaques du fœtus écoutés lors des CPN"
  es: "Latidos cardíacos fetales escuchados durante la APN"
definition:
  en: "Whether a health worker listened to the baby's heartbeat (fetal heart rate auscultation) during antenatal care for the most recent pregnancy. DHS-8 m42f. Standard clinical ANC assessment. Only asked if anc_any_visit = yes."
  fr: "Si un agent de santé a écouté le cœur du bébé (auscultation de la fréquence cardiaque fœtale) lors des soins prénataux pour la grossesse la plus récente. DHS-8 m42f. Évaluation clinique CPN standard. Posé uniquement si anc_any_visit = oui."
  es: "Si un trabajador de salud escuchó los latidos del corazón del bebé (auscultación de la frecuencia cardíaca fetal) durante la atención prenatal para el embarazo más reciente. DHS-8 m42f. Evaluación clínica estándar de APN. Solo se pregunta si anc_any_visit = sí."
