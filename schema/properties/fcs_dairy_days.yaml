id: fcs_dairy_days
maturity: draft
label:
  en: "FCS dairy days"
  fr: "SCA jours produits laitiers"
  es: "PCA días lácteos"

definition:
  en: "Number of days in the past seven during which any member of the household consumed milk and dairy at meal-contributing quantities (NOT small amounts used as condiments). Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé du lait ou des produits laitiers en quantités contribuant au repas (et non en petites quantités utilisées comme condiment). Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió leche y lácteos en cantidades que contribuyen a la comida (NO pequeñas cantidades usadas como condimento). Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
core: true
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_fcs, wfp_cari]
