id: gad7_3
maturity: draft
label:
  en: "GAD-7 item 3: worrying too much about different things"
  fr: "GAD-7 item 3 : se préoccuper excessivement de différentes choses"
  es: "GAD-7 ítem 3: preocuparse demasiado por diferentes cosas"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by worrying too much about different things. GAD-7 item 3, measuring excessive worry. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par des préoccupations excessives concernant différentes choses. GAD-7 item 3, mesurant les préoccupations excessives. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por preocuparse demasiado por diferentes cosas. Ítem 3 del GAD-7, que mide la preocupación excesiva. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

