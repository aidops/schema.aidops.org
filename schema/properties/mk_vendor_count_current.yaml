id: mk_vendor_count_current
maturity: draft
label:
  en: Active vendor count (current)
  fr: Nombre de vendeurs actifs (actuel)
  es: Conteo de vendedores activos (actual)

definition:
  en: "Enumerator estimate of the number of active vendor stalls or vendors currently operating at the market on the day of this visit. Integer 0–9999; use -1 for don't know. This is an aggregate estimate from direct observation, not a census. No individual vendor is identified. Contributes to market depth assessment and CBI feasibility."
  fr: "Estimation par l'enquêteur du nombre d'étals de vendeurs actifs ou de vendeurs opérant actuellement sur le marché le jour de cette visite. Entier 0–9999 ; utiliser -1 pour ne sait pas. Il s'agit d'une estimation globale par observation directe, pas d'un recensement. Aucun vendeur individuel n'est identifié."
  es: "Estimación del enumerador del número de puestos de vendedores activos o vendedores que operan actualmente en el mercado en el día de esta visita. Entero 0–9999; usar -1 para no sabe. Esta es una estimación agregada por observación directa, no un censo. No se identifica a ningún vendedor individual."

type: integer
cardinality: single
core: true
