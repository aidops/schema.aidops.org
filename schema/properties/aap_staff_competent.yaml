id: aap_staff_competent
maturity: draft
label:
  en: "AAP: Staff perceived as competent"
  fr: "Redevabilité : Personnel perçu comme compétent"
  es: "Rendición de cuentas: Personal percibido como competente"

definition:
  en: "Whether the respondent agrees that aid providers seem to know what they are doing when working with their community. GTS HVI competence indicator. Maps to CHS 2024 Commitment 8 ('respectful, competent, and well-managed')."
  fr: "Si le répondant est d'accord sur le fait que les intervenants semblent savoir ce qu'ils font lorsqu'ils travaillent avec sa communauté. Indicateur de compétence de GTS HVI. Correspond à l'Engagement 8 de la CHS 2024 (« respectueux, compétents et bien encadrés »)."
  es: "Si el encuestado está de acuerdo en que los actores humanitarios parecen saber lo que están haciendo cuando trabajan con su comunidad. Indicador de competencia de GTS HVI. Corresponde al Compromiso 8 de la CHS 2024 («respetuosos, competentes y bien gestionados»)."

type: string
cardinality: single
