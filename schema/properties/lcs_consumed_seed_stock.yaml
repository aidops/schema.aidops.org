id: lcs_consumed_seed_stock
maturity: draft
label:
  en: "LCS consumed seed stock"
  fr: "SCM consommation de semences"
  es: "EMV consumo de semillas"

definition:
  en: "Frequency with which the household consumed seed stocks held for the next planting season to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier."
  fr: "Fréquence à laquelle le ménage a consommé des stocks de semences conservés pour la prochaine saison pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise."
  es: "Frecuencia con la que el hogar consumió reservas de semillas guardadas para la próxima siembra para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
