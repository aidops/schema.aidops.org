id: return_intention
maturity: draft
label:
  en: "Return intention"
  fr: "Intention de retour"
  es: "Intención de retorno"

definition:
  en: "The household's stated future preference regarding its place of residence, expressed in terms of the three IASC durable solutions: return to origin, local integration, or settlement elsewhere. Applies when displacement_status is idp, refugee, or asylum_seeker."
  fr: "La préférence future déclarée du ménage concernant son lieu de résidence, exprimée en termes des trois solutions durables de l'IASC : retour à l'origine, intégration locale ou installation ailleurs. S'applique lorsque displacement_status est idp, refugee ou asylum_seeker."
  es: "La preferencia futura declarada del hogar respecto a su lugar de residencia, expresada en términos de las tres soluciones duraderas del IASC: retorno al origen, integración local o asentamiento en otro lugar. Aplica cuando displacement_status es idp, refugee o asylum_seeker."

