id: rcsi_score
maturity: draft
label:
  en: "rCSI score"
  fr: "Score rCSI"
  es: "Puntaje rCSI"

definition:
  en: "The reduced Coping Strategies Index score for this administration, calculated as the weighted sum of five coping strategy frequency days. Range 0-56. Higher scores indicate greater food insecurity. The canonical scoring uses WFP standard weights (1, 2, 1, 1, 3)."
  fr: "Le score de l'indice réduit des stratégies d'adaptation (rCSI) pour cette passation, calculé comme la somme pondérée des jours de fréquence de cinq stratégies d'adaptation. Plage 0-56. Des scores plus élevés indiquent une insécurité alimentaire plus grande. La notation canonique utilise les poids standard du PAM (1, 2, 1, 1, 3)."
  es: "El puntaje del Índice Reducido de Estrategias de Afrontamiento (rCSI) para esta aplicación, calculado como la suma ponderada de los días de frecuencia de cinco estrategias de afrontamiento. Rango 0-56. Puntajes más altos indican mayor inseguridad alimentaria. La puntuación canónica usa los pesos estándar del PMA (1, 2, 1, 1, 3)."

