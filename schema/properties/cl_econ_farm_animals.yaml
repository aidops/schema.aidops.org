id: cl_econ_farm_animals
maturity: draft
label:
  en: "Child worked on farm / animals in past 7 days"
  fr: "L'enfant a travaillé sur la ferme / animaux dans les 7 derniers jours"
  es: "El niño trabajó en granja / animales en los últimos 7 días"
definition:
  en: "Whether the selected child aged 5-17 did any work or helped on the household's or family's plot, farm, food garden, or looked after animals in the past 7 days. MICS 6 CL1a. Counted toward economic activity for the CL hours computation. Even one hour counts."
  fr: "Si l'enfant sélectionné âgé de 5 à 17 ans a effectué un travail ou aidé sur la parcelle, la ferme, le jardin vivrier du ménage ou de la famille, ou s'est occupé d'animaux au cours des 7 derniers jours. MICS 6 CL1a. Comptabilisé dans l'activité économique pour le calcul des heures CL. Même une heure compte."
  es: "Si el niño seleccionado de 5 a 17 años hizo algún trabajo o ayudó en la parcela, granja, huerto de alimentos del hogar o de la familia, o cuidó animales en los últimos 7 días. MICS 6 CL1a. Se cuenta dentro de la actividad económica para el cálculo de horas CL. Incluso una hora cuenta."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
