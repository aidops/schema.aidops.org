id: hf_service_sti_syndromic
maturity: draft
label:
  en: "Provides syndromic management of STIs"
  fr: "Fournit la prise en charge syndromique des IST"
  es: "Presta manejo sindrómico de ITS"

definition:
  en: "Whether the facility provides syndromic management of sexually transmitted infections, including treatment for gonorrhoea, chlamydia, and syphilis. Reported by the facility in-charge. MISP Objective 3. Extended (non-core)."
  fr: "Si l'établissement fournit la prise en charge syndromique des infections sexuellement transmissibles, y compris le traitement de la gonorrhée, de la chlamydia et de la syphilis. Rapporté par le responsable de l'établissement. MISP Objectif 3. Étendu (non-core)."
  es: "Si el establecimiento presta el manejo sindrómico de infecciones de transmisión sexual, incluido el tratamiento de gonorrea, clamidia y sífilis. Reportado por el responsable del establecimiento. MISP Objetivo 3. Extendido (no-core)."

