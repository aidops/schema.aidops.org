id: lcs_reduced_nonfood_expenses
maturity: draft
label:
  en: "LCS reduced non-essential non-food spending"
  fr: "SCM réduction dépenses non alimentaires non essentielles"
  es: "EMV reducción de gastos no alimentarios no esenciales"

definition:
  en: "Frequency with which the household reduced non-essential non-food spending, such as recreation or non-urgent purchases, to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, stress tier. Country adaptations vary on whether reductions in education spending sit here (stress) or in the crisis tier; operations should contextualise the tier assignment per country."
  fr: "Fréquence à laquelle le ménage a réduit ses dépenses non alimentaires non essentielles, telles que les loisirs ou les achats non urgents, pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de stress. Les adaptations par pays varient sur le positionnement des réductions de dépenses d'éducation ici (stress) ou au niveau crise ; les opérations doivent contextualiser l'affectation par pays."
  es: "Frecuencia con la que el hogar redujo gastos no alimentarios no esenciales, como recreación o compras no urgentes, para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de estrés. Las adaptaciones por país varían sobre si las reducciones del gasto en educación se ubican aquí (estrés) o en el nivel crisis; las operaciones deben contextualizar la asignación por país."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
