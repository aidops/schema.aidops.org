id: age_at_menarche_years
maturity: draft
label:
  en: "Age at menarche (years)"
  fr: "Âge aux premières règles (années)"
  es: "Edad en la menarquía (años)"

definition:
  en: "The woman's age (in completed years) when she had her first menstrual period (DHS optional; WHO). Ask only when program interest warrants it (e.g., adolescent health programs). Record integer age; record null for 'cannot recall'. Average age at menarche has nutritional and health implications. Not a standard DHS or MICS survey question."
  fr: "L'âge de la femme (en années révolues) lors de ses premières règles (DHS optionnel ; OMS). Demander uniquement lorsque l'intérêt du programme le justifie (p. ex. programmes de santé des adolescentes). Enregistrer l'âge entier ; enregistrer null pour 'ne se souvient pas'. L'âge moyen aux premières règles a des implications nutritionnelles et sanitaires. Ce n'est pas une question standard des enquêtes DHS ou MICS."
  es: "La edad de la mujer (en años cumplidos) cuando tuvo su primer período menstrual (DHS opcional; OMS). Preguntar solo cuando el interés del programa lo justifique (p. ej., programas de salud adolescente). Registrar edad entera; registrar null para 'no puede recordar'. La edad promedio en la menarquía tiene implicaciones nutricionales y de salud. No es una pregunta estándar de las encuestas DHS o MICS."

type: integer
cardinality: single
core: false
