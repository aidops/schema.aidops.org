id: hiv_received_results
maturity: draft
label:
  en: "Received results of last HIV test"
  fr: "A reçu les résultats du dernier test VIH"
  es: "Recibió los resultados de la última prueba de VIH"

definition:
  en: "Whether the woman received the results of her most recent HIV test (DHS). Ask only if hiv_tested_last_12_months = 'yes'. Knowing one's result is a distinct service quality indicator from being tested; the gap between testing and result receipt signals counselling failures."
  fr: "Si la femme a reçu les résultats de son test VIH le plus récent (DHS). Demander uniquement si hiv_tested_last_12_months = 'yes'. Connaître son résultat est un indicateur de qualité de service distinct du simple fait d'être testé ; l'écart entre le test et la réception du résultat signale des défaillances de conseil."
  es: "Si la mujer recibió los resultados de su prueba de VIH más reciente (DHS). Preguntar solo si hiv_tested_last_12_months = 'yes'. Conocer el propio resultado es un indicador de calidad de servicio distinto del simple hecho de hacerse la prueba; la brecha entre la prueba y la recepción del resultado señala fallas en el asesoramiento."

type: string
cardinality: single
core: false
vocabulary: yes-no-pnta
references: null
category: sti_hiv
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [dhs_women]
