id: mosquito_net_count
maturity: draft
label:
  en: "Number of insecticide-treated mosquito nets"
  fr: "Nombre de moustiquaires imprégnées d'insecticide"
  es: "Número de mosquiteros tratados con insecticida"

definition:
  en: "Count of insecticide-treated mosquito nets (ITNs or LLINs) currently held by the household. Collected only in malaria-endemic or mosquito-borne-disease contexts; omitted in non-endemic settings via deployment-level configuration. Sphere Standard 1: access to long-lasting insecticide-treated bed nets where needed. UNHCR CRI: listed as a defined core relief item."
  fr: "Nombre de moustiquaires imprégnées d'insecticide (MII ou MIILDA) actuellement détenues par le ménage. Collecté uniquement dans les contextes d'endémie palustre ou des maladies à transmission vectorielle ; omis dans les contextes non endémiques via la configuration au niveau du déploiement. Norme Sphère 1 : accès aux moustiquaires imprégnées d'insecticide à longue durée d'action lorsque nécessaire. HCR CRI : listé comme un article de secours essentiel défini."
  es: "Cuenta de mosquiteros tratados con insecticida (MTI o MILD) que tiene actualmente el hogar. Recopilado solo en contextos de paludismo endémico o enfermedades transmitidas por mosquitos; omitido en entornos no endémicos mediante la configuración a nivel del despliegue. Norma Esfera 1: acceso a mosquiteros tratados con insecticida de larga duración donde sean necesarios. ACNUR CRI: listado como un artículo central de socorro definido."

type: integer
cardinality: single
vocabulary: null
references: null
category: nfi
core: false
sensitivity: standard
