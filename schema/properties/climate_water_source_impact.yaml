id: climate_water_source_impact
maturity: draft
label:
  en: "Climate change impact on household water source reliability"
  fr: "Impact du changement climatique sur la fiabilité de la source d'eau du ménage"
  es: "Impacto del cambio climático en la fiabilidad de la fuente de agua del hogar"

definition:
  en: >
    Single-select item asking whether the household's main water source has
    become less reliable or stopped working altogether in the past five years
    due to changes in rainfall or temperature — for example, a borehole drying
    up, a river or spring drying out, or a seasonal source becoming
    unpredictable. This is a climate-trend reliability indicator, not a
    water-source characterization item. Boundary with WASHAssessmentProfile:
    that profile owns water source type (borehole, river, etc.) and service
    level. This property asks only whether climate-related change has reduced
    reliability. When both profiles are collected in the same survey, the form
    can display the previously collected water_source code in the question stem
    for respondent clarity, without re-asking the source type.
  fr: >
    Item à sélection unique demandant si la principale source d'eau du ménage
    est devenue moins fiable ou a complètement cessé de fonctionner au cours
    des cinq dernières années en raison de changements dans les précipitations
    ou la température. Il s'agit d'un indicateur de fiabilité tendancielle lié
    au climat, et non d'un item de caractérisation de la source d'eau. Frontière
    avec WASHAssessmentProfile : ce profil est propriétaire du type de source
    d'eau et du niveau de service. Cette propriété demande uniquement si le
    changement climatique a réduit la fiabilité.
  es: >
    Ítem de selección única que pregunta si la fuente de agua principal del
    hogar se ha vuelto menos confiable o ha dejado de funcionar por completo
    en los últimos cinco años debido a cambios en las lluvias o la temperatura.
    Es un indicador de confiabilidad tendencial climática, no un ítem de
    caracterización de la fuente de agua. Límite con WASHAssessmentProfile:
    ese perfil es propietario del tipo de fuente de agua y nivel de servicio.
    Esta propiedad pregunta solo si el cambio climático ha reducido la
    confiabilidad.

type: string
cardinality: single
core: false
