id: climate_migration_adaptation_intent
maturity: draft
label:
  en: "Household has seriously considered relocating due to climate-related problems"
  fr: "Le ménage a sérieusement envisagé de se déplacer en raison de problèmes climatiques"
  es: "El hogar ha considerado seriamente reubicarse debido a problemas relacionados con el clima"

definition:
  en: >
    Single-select item asking whether the household has seriously considered
    moving to a different area in the next few years because of climate-related
    problems such as worsening drought, floods, or declining water access. This
    captures planned or anticipated climate-motivated migration (adaptation
    intent), not current displacement. Boundary with DisplacementProfile: current
    displacement is recorded there. Boundary with
    climate_distress_migration_past_event: that item captures past forced
    displacement as a maladaptation signal; this item captures future-oriented
    voluntary planned relocation as an adaptive strategy.
    Sensitivity: set to sensitive as the baseline. In conflict-affected contexts,
    relocation plans may intersect with protection concerns and should be asked
    using protective framing. Programs in non-conflict contexts may document a
    justified downgrade to standard sensitivity.
    Valid codes: yes_definite_plans / yes_considering_actively /
    yes_thought_about_but_unlikely / no_not_considered /
    already_relocated_climate / dont_know.
  fr: >
    Item à sélection unique demandant si le ménage a sérieusement envisagé de
    s'installer dans une autre zone au cours des prochaines années en raison
    de problèmes climatiques tels que l'aggravation de la sécheresse, les
    inondations ou la diminution de l'accès à l'eau. Capture la migration
    planifiée motivée par le climat (intention d'adaptation), pas le déplacement
    actuel. Sensibilité : fixée à sensible comme référence de base.
  es: >
    Ítem de selección única que pregunta si el hogar ha considerado seriamente
    mudarse a una zona diferente en los próximos años debido a problemas
    relacionados con el clima como sequías que empeoran, inundaciones o
    disminución del acceso al agua. Captura la migración planificada motivada
    por el clima (intención adaptativa), no el desplazamiento actual. Sensibilidad:
    establecida como sensible como base. En contextos afectados por conflicto,
    los planes de reubicación pueden intersectar con preocupaciones de protección.

type: string
cardinality: single
core: false
vocabulary: null
references: null
category: climate
sensitivity: sensitive
