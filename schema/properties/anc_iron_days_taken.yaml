id: anc_iron_days_taken
maturity: draft
label:
  en: Days of iron supplementation taken during pregnancy
  fr: "Jours de supplémentation en fer pris pendant la grossesse"
  es: "Días de suplementación con hierro tomados durante el embarazo"
definition:
  en: "Approximately how many days the woman took iron tablets or syrup during the most recent pregnancy, grouped per DHS-8 m46 categories. WHO recommends 90 or more days. Only asked if anc_iron_supplementation = yes."
  fr: "Environ combien de jours la femme a pris des comprimés de fer ou du sirop pendant la grossesse la plus récente, regroupé selon les catégories DHS-8 m46. L'OMS recommande 90 jours ou plus. Posé uniquement si anc_iron_supplementation = oui."
  es: "Aproximadamente cuántos días tomó la mujer tabletas de hierro o jarabe durante el embarazo más reciente, agrupados según las categorías DHS-8 m46. La OMS recomienda 90 días o más. Solo se pregunta si anc_iron_supplementation = sí."
