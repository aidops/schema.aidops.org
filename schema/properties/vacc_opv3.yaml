id: vacc_opv3
maturity: draft
label:
  en: "OPV dose 3 vaccination status"
  fr: "Statut vaccinal VPO dose 3"
  es: "Estado de vacunación VPO dosis 3"

definition:
  en: "Whether the child received the third dose of oral polio vaccine (OPV3) at approximately 14 weeks of age. Published recall wording: 'Was a third dose of polio drops given at around 14 weeks?' OPV3 is the dose used for the 'fully vaccinated basic antigens' calculation — OPV0 is excluded. DHS code h9; MICS code IM3d."
  fr: "Si l'enfant a reçu la troisième dose du vaccin antipoliomyélitique oral (VPO3) à environ 14 semaines. Formulation de rappel publiée : « Une troisième dose de gouttes contre la polio a-t-elle été administrée vers 14 semaines ? » VPO3 est la dose utilisée pour le calcul des « antigènes de base vaccinés complètement » — VPO0 en est exclu. Code DHS h9 ; code MICS IM3d."
  es: "Si el niño recibió la tercera dosis de vacuna antipoliomielítica oral (VPO3) a aproximadamente 14 semanas de edad. Redacción de recordatorio publicada: '¿Se administró una tercera dosis de gotas contra la polio alrededor de las 14 semanas?' VPO3 es la dosis usada para el cálculo de 'completamente vacunado con antígenos básicos' — VPO0 queda excluido. Código DHS h9; código MICS IM3d."

type: string
cardinality: single
core: true
