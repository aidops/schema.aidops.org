id: school_type
maturity: draft
label:
  en: School type
  fr: "Type d'école"
  es: "Tipo de escuela"
definition:
  en: "The educational format and inclusion design of the school the child currently attends. Ask only if attended_current_year is Yes. Distinct from school_management_type (who runs the school) — this property describes the educational format. Source: MICS6 SP5A, expanded with non-formal category for emergency/displacement contexts."
  fr: "Le format éducatif et la conception inclusive de l'école que l'enfant fréquente actuellement. À poser uniquement si attended_current_year est Oui. Distinct de school_management_type (qui gère l'école) — cette propriété décrit le format éducatif. Source : MICS6 SP5A, élargi avec la catégorie non formelle pour les contextes d'urgence/déplacement."
  es: "El formato educativo y diseño inclusivo de la escuela a la que el niño asiste actualmente. Preguntar solo si attended_current_year es Sí. Distinto de school_management_type (quién dirige la escuela): esta propiedad describe el formato educativo. Fuente: MICS6 SP5A, ampliado con categoría no formal para contextos de emergencia/desplazamiento."
type: string
cardinality: single
core: true
vocabulary: school-type
references: null
category: education
age_applicability:
  - child_5_17
