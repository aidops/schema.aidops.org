id: vacc_pcv3
maturity: draft
label:
  en: "PCV dose 3 vaccination status"
  fr: "Statut vaccinal VPC dose 3"
  es: "Estado de vacunación VPC dosis 3"

definition:
  en: "Whether the child received the third dose of pneumococcal conjugate vaccine (PCV3) at approximately 14 weeks or as a booster at 9–15 months depending on the national schedule. Published recall wording: '(Name) received a 3rd pneumococcal injection?' Country-specific. DHS code h_pn3; MICS code IM8c."
  fr: "Si l'enfant a reçu la troisième dose du vaccin antipneumococcique conjugué (VPC3) à environ 14 semaines ou en rappel à 9–15 mois selon le calendrier national. Formulation de rappel publiée : « (Prénom) a-t-il/elle reçu une 3e injection antipneumococcique ? » Spécifique au pays. Code DHS h_pn3 ; code MICS IM8c."
  es: "Si el niño recibió la tercera dosis de vacuna antineumocócica conjugada (VPC3) a aproximadamente 14 semanas o como refuerzo entre los 9 y 15 meses según el calendario nacional. Redacción de recordatorio publicada: '¿Recibió (nombre) una 3.a inyección antineumocócica?' Específica por país. Código DHS h_pn3; código MICS IM8c."

type: string
cardinality: single
core: false
vocabulary: vacc-status
references: null
category: vaccination
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
