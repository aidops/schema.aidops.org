id: cl_econ_other_income
maturity: draft
label:
  en: "Child engaged in other income activity in past 7 days"
  fr: "L'enfant a exercé une autre activité rémunérée dans les 7 derniers jours"
  es: "El niño realizó otra actividad remunerada en los últimos 7 días"
definition:
  en: "Whether the selected child aged 5-17 engaged in any other activity in return for income in cash or in kind (not captured by the farm, business, or produce items) in the past 7 days. MICS 6 CL1X. Even one hour counts. Counted toward economic activity for the CL hours computation."
  fr: "Si l'enfant sélectionné âgé de 5 à 17 ans a exercé une autre activité en contrepartie d'un revenu en espèces ou en nature (non capturée par les items ferme, entreprise ou production) au cours des 7 derniers jours. MICS 6 CL1X. Même une heure compte. Comptabilisé dans l'activité économique pour le calcul des heures CL."
  es: "Si el niño seleccionado de 5 a 17 años realizó cualquier otra actividad a cambio de ingreso en efectivo o en especie (no capturada por los ítems de granja, negocio o producción) en los últimos 7 días. MICS 6 CL1X. Incluso una hora cuenta. Se cuenta dentro de la actividad económica para el cálculo de horas CL."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
