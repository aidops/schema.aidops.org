id: aap_trust_in_providers
maturity: draft
label:
  en: "AAP: Trust in aid providers"
  fr: "Redevabilité : Confiance envers les intervenants"
  es: "Rendición de cuentas: Confianza en los actores humanitarios"

definition:
  en: "How much the respondent trusts aid providers to act in the best interests of their community. GTS HVI canonical 'trust' pillar (one of the four canonical GTS pillars alongside relevance, fairness, and agency). Classified as `sensitive` because expressing distrust could itself be sensitive in some contexts (retaliation fear, or programme-reputational). Maps to CHS 2024 Commitment 8."
  fr: "Dans quelle mesure le répondant fait confiance aux intervenants pour agir dans l'intérêt de sa communauté. Pilier « confiance » canonique de GTS HVI (l'un des quatre piliers canoniques de GTS aux côtés de la pertinence, l'équité et l'agentivité). Classé comme `sensitive` car l'expression de la méfiance pourrait elle-même être sensible dans certains contextes (peur de représailles ou réputation du programme). Correspond à l'Engagement 8 de la CHS 2024."
  es: "Cuánto confía el encuestado en que los actores humanitarios actúen en el mejor interés de su comunidad. Pilar canónico de «confianza» de GTS HVI (uno de los cuatro pilares canónicos de GTS junto con relevancia, equidad y agencia). Clasificado como `sensitive` porque expresar desconfianza podría ser sensible en algunos contextos (miedo a represalias o reputación del programa). Corresponde al Compromiso 8 de la CHS 2024."

type: string
cardinality: single
