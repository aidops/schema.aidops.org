id: climate_extreme_events_frequency_perception
maturity: draft
label:
  en: "Perceived change in frequency of extreme weather events over the past 10–15 years"
  fr: "Changement perçu dans la fréquence des phénomènes météorologiques extrêmes au cours des 10–15 dernières années"
  es: "Cambio percibido en la frecuencia de eventos meteorológicos extremos durante los últimos 10–15 años"

definition:
  en: >
    Single-select item asking whether the respondent perceives extreme weather
    events — very heavy rains, very long dry spells, very hot days, or very
    strong winds — to happen more often, less often, or about the same compared
    to when they were growing up or 10–15 years ago. Complements
    climate_hazard_frequency_trend_perception (which asks about a named specific
    hazard) and climate_hazard_severity_trend_perception by asking about extreme
    events in general — a broader perceived-change signal that captures the
    IPCC AR6 WGII Chapter 11 compound and extreme events dimension.
  fr: >
    Item à sélection unique demandant si le répondant perçoit que les
    phénomènes météorologiques extrêmes — pluies très fortes, longues périodes
    de sécheresse, journées très chaudes ou vents très forts — se produisent
    plus souvent, moins souvent ou à peu près autant par rapport à son enfance
    ou il y a 10 à 15 ans. Complète les items A2 et A3 en posant la question
    sur les événements extrêmes en général.
  es: >
    Ítem de selección única que pregunta si el encuestado percibe que los eventos
    meteorológicos extremos — lluvias muy intensas, períodos de sequía muy
    prolongados, días muy calurosos o vientos muy fuertes — ocurren más seguido,
    menos seguido o aproximadamente igual comparado con cuando era joven o hace
    10 a 15 años. Complementa los ítems A2 y A3 preguntando sobre eventos
    extremos en general.

type: string
cardinality: single
core: false
vocabulary: climate-trend-perception
references: null
category: climate
sensitivity: standard
