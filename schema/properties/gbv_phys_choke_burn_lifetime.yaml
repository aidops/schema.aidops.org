id: gbv_phys_choke_burn_lifetime
maturity: draft
label:
  en: "Physical IPV (lifetime): tried to choke or burn on purpose"
  fr: "VPI physique (vie entière) : tenté de l'étrangler ou de la brûler intentionnellement"
  es: "VPI física (de por vida): intentó ahogarla o quemarla intencionalmente"

definition:
  en: >
    Whether the referent partner has ever tried to choke the respondent or burn her on purpose.
    DHS instrument item DV05A-vi. Lifetime reference period (ever). This is classified as a
    'severe' physical IPV act in the DHS severity typology. If true, the follow-up 12-month
    frequency property gbv_phys_choke_burn_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais tenté d'étrangler la répondante ou de la brûler
    intentionnellement. Item DHS DV05A-vi. Période de référence : à vie. Acte de VPI physique
    'grave'. Si vrai, gbv_phys_choke_burn_12m_freq est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez intentó ahogar a la encuestada o quemarla intencionalmente.
    Ítem DHS DV05A-vi. Período de referencia: de por vida. Acto de VPI física 'grave'.
    Si verdadero, se pregunta gbv_phys_choke_burn_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_physical_ipv
core: false
sensitivity: restricted
