id: gbv_phys_slap_12m_freq
maturity: draft
label:
  en: "Physical IPV (12m frequency): slapped"
  fr: "VPI physique (fréquence 12m) : giflée"
  es: "VPI física (frecuencia 12m): bofeteada"

definition:
  en: >
    Frequency of partner slapping the respondent in the past 12 months. DHS instrument item
    DV05B for act DV05A-ii. Asked only if gbv_phys_slap_lifetime = true (skip logic: if
    lifetime = false, this property is not asked and should be recorded as missing).
    DHS-7+ compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des gifles du partenaire sur la répondante au cours des 12 derniers mois. Item DHS
    DV05B pour DV05A-ii. Posée uniquement si gbv_phys_slap_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero abofetee a la encuestada en los últimos 12 meses. Ítem DHS
    DV05B para DV05A-ii. Se pregunta solo si gbv_phys_slap_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
