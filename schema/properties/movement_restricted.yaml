id: movement_restricted
maturity: draft
label:
  en: "Freedom of movement restricted (household)"
  fr: "Liberté de mouvement restreinte (ménage)"
  es: "Libertad de movimiento restringida (hogar)"

definition:
  en: "Whether any household member was unable to move freely to access services, markets, work, or other needed places because of security conditions, checkpoints, permits, curfews, or restrictions by authorities or armed groups in the past 3 months. Distinct from displacement push factors (past, in DisplacementProfile) and from GBV-specific movement restrictions (GBVRiskProfile). JIAF 2.0 Protection Indicator P2; GPC PAF Domain 1 Indicator 1.2. Skip logic: if no, skip movement_restriction_types and movement_restriction_impact."
  fr: "Si un membre du ménage a été incapable de se déplacer librement pour accéder aux services, aux marchés, au travail ou à d'autres lieux dont il avait besoin en raison de conditions sécuritaires, de points de contrôle, de permis, de couvre-feux ou de restrictions imposées par des autorités ou des groupes armés au cours des 3 derniers mois. Distinct des facteurs de départ liés au déplacement (passé, dans DisplacementProfile) et des restrictions de mouvement spécifiques à la VBG (GBVRiskProfile). Indicateur de protection JIAF 2.0 P2 ; GPC PAF Domaine 1 Indicateur 1.2. Logique de saut : si non, passer movement_restriction_types et movement_restriction_impact."
  es: "Si algún miembro del hogar no pudo moverse libremente para acceder a servicios, mercados, trabajo u otros lugares que necesitaba debido a condiciones de seguridad, controles, permisos, toques de queda o restricciones impuestas por autoridades o grupos armados en los últimos 3 meses. Distinto de los factores de expulsión del desplazamiento (pasado, en DisplacementProfile) y de las restricciones de movimiento específicas de VBG (GBVRiskProfile). Indicador de Protección JIAF 2.0 P2; GPC PAF Dominio 1 Indicador 1.2. Lógica de salto: si no, omitir movement_restriction_types y movement_restriction_impact."

type: string
cardinality: single
vocabulary: yes-no-pnta
references: null
category: freedom_of_movement
core: true
sensitivity: sensitive
