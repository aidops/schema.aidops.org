id: iycf_fg_grains
maturity: draft
label:
  en: "MDD-C food group 2: grains, roots, tubers, and plantains"
  fr: "Groupe alimentaire MDD-C 2 : céréales, racines, tubercules et bananes plantains"
  es: "Grupo alimentario MDD-C 2: cereales, raíces, tubérculos y plátanos"

definition:
  en: "Whether the child ate any food from the grains, roots, tubers, and plantains group in the previous 24 hours. Food group 2 of the 8-group MDD-C framework (WHO/UNICEF 2021). Example foods: porridge, bread, rice, pasta, millet, white potato, cassava, yam, plantain. Published wording: 'Yesterday during the day or at night, did (NAME) eat/drink any [grains, roots, tubers and plantains]?'"
  fr: "Indique si l'enfant a mangé un aliment du groupe céréales, racines, tubercules et bananes plantains au cours des 24 heures précédentes. Groupe alimentaire 2 du cadre MDD-C à 8 groupes (OMS/UNICEF 2021). Exemples d'aliments : bouillie, pain, riz, pâtes, mil, pomme de terre blanche, manioc, igname, banane plantain."
  es: "Indica si el niño comió algún alimento del grupo de cereales, raíces, tubérculos y plátanos en las 24 horas anteriores. Grupo alimentario 2 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Ejemplos de alimentos: gachas, pan, arroz, pasta, mijo, papa blanca, yuca, ñame, plátano."

type: boolean
