id: cn_informant_group_men
maturity: draft
label:
  en: "Informants included men"
  fr: "Informateurs comprenant des hommes"
  es: "Informantes incluyeron hombres"

definition:
  en: "Whether men were among the participants in this community-level assessment session. Paired with cn_informant_group_women to flag gender representativeness of the informant group per MIRA §3.3 informant-diversity guidance."
  fr: "Indique si des hommes figuraient parmi les participants à cette séance d'évaluation au niveau communautaire. Associé à cn_informant_group_women pour signaler la représentativité de genre du groupe d'informateurs, conformément aux orientations du § 3.3 de MIRA sur la diversité des informateurs."
  es: "Indica si hubo hombres entre los participantes en esta sesión de evaluación a nivel comunitario. Se vincula con cn_informant_group_women para señalar la representatividad de género del grupo de informantes, conforme a la orientación del § 3.3 de MIRA sobre diversidad de informantes."

