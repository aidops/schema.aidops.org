id: gbv_conseq_sought_medical_care
maturity: draft
label:
  en: "Physical consequence: sought medical care for injury from partner violence"
  fr: "Conséquence physique : a cherché des soins médicaux pour une blessure due à la violence"
  es: "Consecuencia física: buscó atención médica por lesión de violencia de pareja"

definition:
  en: >
    Whether the respondent sought medical care after being injured by partner violence. Derived
    from help-seeking sources: true if gbv_helpseeking_sources includes 'medical_personnel' and
    gbv_conseq_cuts_bruises_aches or gbv_conseq_eye_injury_sprains_burns or
    gbv_conseq_serious_injury is true. May also be collected as a direct question in some
    country adaptations of the DHS module. Sensitivity: restricted.
    Minimum aggregate n=30 before publication. Derived, not always directly asked.
  fr: >
    Si la répondante a cherché des soins médicaux après avoir été blessée par des violences
    conjugales. Dérivé des sources de recours : vrai si gbv_helpseeking_sources inclut
    'medical_personnel' et qu'au moins une conséquence physique est vraie. Peut aussi être
    collecté comme question directe dans certaines adaptations nationales du module DHS.
  es: >
    Si la encuestada buscó atención médica tras ser lesionada por violencia de pareja. Derivado
    de las fuentes de ayuda: verdadero si gbv_helpseeking_sources incluye 'medical_personnel' y
    al menos una consecuencia física es verdadera. También puede recogerse como pregunta directa
    en algunas adaptaciones nacionales del módulo DHS.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_consequences
core: false
sensitivity: restricted
