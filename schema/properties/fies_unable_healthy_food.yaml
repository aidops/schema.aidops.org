id: fies_unable_healthy_food
maturity: draft
label:
  en: "FIES unable to eat healthy food"
  fr: "FIES incapacité à manger sainement"
  es: "FIES no pudo comer alimentos saludables"

definition:
  en: "Whether, at any time during the FIES reference period, the household was unable to eat healthy and nutritious food because of lack of resources. One of eight experience-based items in the FAO Food Insecurity Experience Scale (FIES); the reference period is recorded in recall_period_days."
  fr: "Si, à un moment quelconque de la période de référence FIES, le ménage a été incapable de manger des aliments sains et nutritifs par manque de ressources. L'un des huit items expérientiels de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO ; la période de référence est enregistrée dans recall_period_days."
  es: "Si en algún momento durante el período de referencia FIES, el hogar no pudo comer alimentos saludables y nutritivos por falta de recursos. Uno de los ocho ítems basados en experiencia de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO; el período de referencia se registra en recall_period_days."

type: boolean
cardinality: single
vocabulary: null
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [fao_fies]
