id: care_not_sought_primary_reason
maturity: draft
label:
  en: "Primary reason care was not sought or received"
  fr: "Principale raison pour laquelle les soins n'ont pas été recherchés ou reçus"
  es: "Razón principal por la que no se buscó o no se recibió atención"

definition:
  en: "Single most important reason care was not sought or received, drawn from the same `care-access-barrier` vocabulary used for the multi-select. Ask only if more than one code was selected in `care_not_sought_reason`. Allows forced ranking where the multi-select produces ambiguity and enables single-reason analyses."
  fr: "Raison unique la plus importante pour laquelle les soins n'ont pas été recherchés ou reçus, issue du même vocabulaire `care-access-barrier` que la sélection multiple. Ne poser que si plus d'un code a été sélectionné dans `care_not_sought_reason`. Permet un classement forcé lorsque la sélection multiple produit une ambiguïté et rend possibles les analyses à raison unique."
  es: "Única razón más importante por la que no se buscó o no se recibió atención, tomada del mismo vocabulario `care-access-barrier` utilizado para la selección múltiple. Preguntar solo si se seleccionó más de un código en `care_not_sought_reason`. Permite un ordenamiento forzado cuando la selección múltiple produce ambigüedad y habilita análisis de razón única."

type: string
cardinality: single
core: false
vocabulary: care-access-barrier
references: null
category: health_access_unmet_need
