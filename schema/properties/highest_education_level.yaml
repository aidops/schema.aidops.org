id: highest_education_level
maturity: draft
label:
  en: Highest education level (ISCED)
  fr: "Niveau d'éducation le plus élevé (CITE)"
  es: "Nivel de educación más alto (CINE)"
definition:
  en: "The ISCED 2011 level corresponding to the highest level the child has ever attended. This is a derived or directly captured field using the PS education-level vocabulary. Where country-specific grade codes are collected in highest_grade_completed_local, this ISCED level is the mapped output used for SDG 4.1.2 indicator calculation. Ask only if ever_attended_school is Yes."
  fr: "Le niveau CITE 2011 correspondant au niveau le plus élevé que l'enfant ait jamais fréquenté. Il s'agit d'un champ dérivé ou directement capturé utilisant le vocabulaire education-level de PS. Lorsque des codes de niveau nationaux sont collectés dans highest_grade_completed_local, ce niveau CITE est le résultat mappé utilisé pour le calcul de l'indicateur ODD 4.1.2. À poser uniquement si ever_attended_school est Oui."
  es: "El nivel CINE 2011 correspondiente al nivel más alto al que el niño ha asistido alguna vez. Se trata de un campo derivado o directamente capturado utilizando el vocabulario education-level de PS. Cuando se recopilan códigos de grado específicos del país en highest_grade_completed_local, este nivel CINE es el resultado mapeado utilizado para el cálculo del indicador ODS 4.1.2. Preguntar solo si ever_attended_school es Sí."
type: string
cardinality: single
core: true
vocabulary: education-level
references: null
category: education
age_applicability:
  - child_5_17
