id: mk_commodity_available
maturity: draft
label:
  en: Commodity availability today
  fr: Disponibilité du produit aujourd'hui
  es: Disponibilidad del producto hoy

definition:
  en: "Whether the commodity identified by mk_commodity_code is currently available for purchase at this market today, as assessed by enumerator direct observation confirmed with key vendor informants. Codes: yes_stocked (available and adequately stocked), yes_limited_stock (available but stock is low or restricted), not_available (not present at any stall), dont_know. Used in basket availability rate calculation and CBI feasibility assessment."
  fr: "Si le produit identifié par mk_commodity_code est actuellement disponible à l'achat sur ce marché aujourd'hui, tel qu'évalué par l'observation directe de l'enquêteur confirmée auprès des informateurs clés vendeurs. Codes : yes_stocked (disponible et bien approvisionné), yes_limited_stock (disponible mais stock faible ou restreint), not_available (absent de tout étal), dont_know."
  es: "Si el producto identificado por mk_commodity_code está actualmente disponible para compra en este mercado hoy, según la evaluación por observación directa del enumerador confirmada con informantes clave vendedores. Códigos: yes_stocked (disponible y bien abastecido), yes_limited_stock (disponible pero con stock bajo o restringido), not_available (no presente en ningún puesto), dont_know."

type: string
cardinality: single
core: true
vocabulary: null
references: null
category: market_price_basket
sensitivity: standard
