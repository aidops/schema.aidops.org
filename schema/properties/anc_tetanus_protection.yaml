id: anc_tetanus_protection
maturity: draft
label:
  en: Tetanus injections received during pregnancy
  fr: "Injections antitétaniques reçues pendant la grossesse"
  es: "Inyecciones antitetánicas recibidas durante el embarazo"
definition:
  en: "The number of tetanus toxoid or tetanus-diphtheria injections received during the most recent pregnancy. DHS-8 m1. Not conditional on an ANC visit (tetanus can be given at any health contact). Records injections during this pregnancy only; full neonatal protection status (rh_anc_neotet) requires cumulative lifetime doses tracked separately."
  fr: "Le nombre d'injections de toxoïde tétanique ou de tétanos-diphtérie reçues pendant la grossesse la plus récente. DHS-8 m1. Non conditionné à une visite CPN (le tétanos peut être administré lors de tout contact de santé). Enregistre uniquement les injections pendant cette grossesse ; le statut de protection néonatale complet (rh_anc_neotet) nécessite le suivi cumulé des doses à vie."
  es: "El número de inyecciones de toxoide tetánico o tétanos-difteria recibidas durante el embarazo más reciente. DHS-8 m1. No está condicionado a una visita de APN (el tétanos puede administrarse en cualquier contacto de salud). Registra solo las inyecciones durante este embarazo; el estado de protección neonatal completa (rh_anc_neotet) requiere el seguimiento acumulado de dosis de por vida."
type: string
cardinality: single
core: true
vocabulary: tetanus-injections-received
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
