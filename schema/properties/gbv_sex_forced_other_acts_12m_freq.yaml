id: gbv_sex_forced_other_acts_12m_freq
maturity: draft
label:
  en: "Sexual IPV (12m frequency): physically forced to perform other sexual acts"
  fr: "VPI sexuelle (fréquence 12m) : forcée physiquement à accomplir d'autres actes sexuels"
  es: "VPI sexual (frecuencia 12m): forzada físicamente a realizar otros actos sexuales"

definition:
  en: >
    Frequency of partner physically forcing the respondent to perform other sexual acts in the
    past 12 months. DHS instrument item DV05B for act DV05A-ix. Asked only if
    gbv_sex_forced_other_acts_lifetime = true (skip logic: if lifetime = false, this property
    is not asked). DHS-7+ compatible. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des actes de contrainte physique à accomplir d'autres actes sexuels dans les
    12 derniers mois. Item DHS DV05B pour DV05A-ix. Posée uniquement si
    gbv_sex_forced_other_acts_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero fuerce físicamente a la encuestada a realizar otros actos
    sexuales en los últimos 12 meses. Ítem DHS DV05B para DV05A-ix. Se pregunta solo si
    gbv_sex_forced_other_acts_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_sexual_ipv
core: false
sensitivity: restricted
