id: hf_commodity_stockout_14d
maturity: draft
label:
  en: "Any tracer commodity stock-out in past 14 days"
  fr: "Rupture de stock d'au moins un produit traceur au cours des 14 derniers jours"
  es: "Desabastecimiento de al menos un insumo trazador en los últimos 14 días"

definition:
  en: "Whether there has been a stock-out of at least one of the tracer commodities in the past 14 days. Reported by the pharmacy/stores officer. Summary flag across the tracer set; may be computed from the individual commodity items or asked directly. HHFA and SARA tracer methodology. Sensitive: chronic stock-out reporting can be politically damaging to the ministry, and facilities may under-report."
  fr: "S'il y a eu une rupture de stock d'au moins un produit traceur au cours des 14 derniers jours. Rapporté par le responsable pharmacie/stocks. Signal synthétique sur l'ensemble traceur ; peut être calculé à partir des items produits individuels ou demandé directement. Méthodologie traceur HHFA et SARA. Sensible : le reporting de ruptures de stock chroniques peut être politiquement dommageable pour le ministère, et les établissements peuvent sous-déclarer."
  es: "Si ha habido un desabastecimiento de al menos uno de los insumos trazadores en los últimos 14 días. Reportado por el responsable de farmacia/almacén. Indicador resumen sobre el conjunto trazador; puede calcularse a partir de los ítems individuales de insumos o preguntarse directamente. Metodología trazador HHFA y SARA. Sensible: el reporte de desabastecimientos crónicos puede ser políticamente dañino para el ministerio, y los establecimientos pueden sub-reportar."

type: boolean
cardinality: single
core: true
