id: whom5_index
maturity: draft
label:
  en: "WHO-5 Well-Being Index (0-100)"
  fr: "Indice de bien-être WHO-5 (0 à 100)"
  es: "Índice de Bienestar WHO-5 (0 a 100)"

definition:
  en: "The WHO-5 percentage-score well-being index, calculated as the raw sum of items 1-5 (each 0-5) multiplied by 4, producing a 0-100 scale where 0 represents the worst possible well-being and 100 represents the best possible well-being. Per the WHO-5 user guide, a score below 50 flags reduced well-being and may indicate that a full depression screen (e.g., PHQ-9) is warranted; a score of 28 or lower is often cited as a stronger indicator of likely clinical depression."
  fr: "L'indice de bien-être en pourcentage WHO-5, calculé comme la somme brute des items 1 à 5 (chacun de 0 à 5) multipliée par 4, produisant une échelle de 0 à 100 où 0 représente le pire bien-être possible et 100 le meilleur bien-être possible. Selon le guide utilisateur du WHO-5, un score inférieur à 50 signale un bien-être réduit et peut indiquer qu'un dépistage complet de dépression (par exemple, PHQ-9) est justifié ; un score de 28 ou moins est souvent cité comme un indicateur plus fort de dépression clinique probable."
  es: "El índice de bienestar en porcentaje WHO-5, calculado como la suma bruta de los ítems 1 a 5 (cada uno de 0 a 5) multiplicada por 4, produciendo una escala de 0 a 100 donde 0 representa el peor bienestar posible y 100 el mejor bienestar posible. Según la guía de usuario del WHO-5, un puntaje inferior a 50 señala bienestar reducido y puede indicar que se justifica un tamizaje completo de depresión (por ejemplo, PHQ-9); un puntaje de 28 o menos se cita a menudo como un indicador más fuerte de depresión clínica probable."

