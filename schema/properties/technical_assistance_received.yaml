id: technical_assistance_received
maturity: draft
label:
  en: "Technical assistance received"
  fr: "Assistance technique reçue"
  es: "Asistencia técnica recibida"

definition:
  en: "Whether the household has received any technical assistance or guidance related to the construction, repair, or improvement of its shelter since displacement or in the past 12 months. Sphere Standard 5 key indicator: percentage of households that report having received appropriate technical assistance and guidance."
  fr: "Si le ménage a reçu une assistance technique ou des orientations liées à la construction, la réparation ou l'amélioration de son abri depuis le déplacement ou au cours des 12 derniers mois. Indicateur clé de la Norme Sphère 5 : pourcentage de ménages déclarant avoir reçu une assistance technique et des orientations appropriées."
  es: "Si el hogar ha recibido asistencia técnica u orientación relacionada con la construcción, reparación o mejora de su refugio desde el desplazamiento o en los últimos 12 meses. Indicador clave de la Norma Esfera 5: porcentaje de hogares que reportan haber recibido asistencia técnica y orientación apropiadas."

type: boolean
cardinality: single
vocabulary: null
references: null
category: shelter
core: false
sensitivity: standard
valid_instruments: [sphere_shelter_adequacy, gsc_standardised]
