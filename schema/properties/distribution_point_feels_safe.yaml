id: distribution_point_feels_safe
maturity: draft
label:
  en: "Distribution point feels safe for women and girls"
  fr: "Le point de distribution semble sûr pour les femmes et les filles"
  es: "El punto de distribución se percibe seguro para mujeres y niñas"

definition:
  en: "Household-reported perception of whether the aid distribution point (food, NFIs, or other items) feels safe for women and girls. Recall period: past month. Skip if the household does not participate in distributions. Aid distribution points are documented GBV risk locations, particularly during food distributions where crowd management is poor (IASC GBV Guidelines 2015; WFP/GBV AoR joint guidance). Safety at distribution points is a Food Security cluster cross-cutting GBV indicator. The safety-perception-3 vocabulary applies; if the household does not receive distributions, use 'dont_know' or apply skip logic."
  fr: "Perception déclarée par le ménage si le point de distribution d'aide (vivres, ANAs ou autres articles) semble sûr pour les femmes et les filles. Période de rappel : le mois dernier. Ignorer si le ménage ne participe pas aux distributions. Les points de distribution d'aide sont des lieux de risque VBG documentés, notamment lors des distributions alimentaires avec une mauvaise gestion des foules. La sécurité aux points de distribution est un indicateur VBG transversal du cluster Sécurité alimentaire."
  es: "Percepción reportada por el hogar sobre si el punto de distribución de ayuda (alimentos, ANF u otros artículos) se percibe como seguro para mujeres y niñas. Período de recuerdo: último mes. Omitir si el hogar no participa en distribuciones. Los puntos de distribución de ayuda son lugares de riesgo VBG documentados, especialmente durante distribuciones de alimentos con manejo deficiente de multitudes. La seguridad en los puntos de distribución es un indicador VBG transversal del clúster de Seguridad Alimentaria."

type: string
cardinality: single
vocabulary: safety-perception-3
references: null
category: gbv_safety_perception
core: false
