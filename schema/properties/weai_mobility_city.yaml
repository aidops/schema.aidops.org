id: weai_mobility_city
maturity: draft
label:
  en: "WEAI mobility — visits city or town"
  fr: "WEAI mobilité — visites en ville"
  es: "WEAI movilidad — visitas a ciudad o pueblo"

definition:
  en: "How often the respondent goes to a city or town. One of five mobility items in pro-WEAI Indicator B6 (visiting important locations). Contributes to Condition A adequacy: at least two of (city/town, market, family/friends) visited at weekly frequency or more."
  fr: "À quelle fréquence le répondant se rend-il dans une ville. L'un des cinq items de mobilité de l'indicateur B6 du pro-WEAI (visite de lieux importants). Contribue à l'adéquation de la condition A : au moins deux parmi (ville, marché, famille/amis) visités au moins une fois par semaine."
  es: "Con qué frecuencia el encuestado va a una ciudad o pueblo. Uno de los cinco ítems de movilidad del Indicador B6 del pro-WEAI (visita a lugares importantes). Contribuye a la adecuación de la Condición A: al menos dos de (ciudad/pueblo, mercado, familia/amigos) visitados con frecuencia semanal o más."

type: string
cardinality: single
core: true
vocabulary: weai-frequency-7
references: null
category: instrumental_agency
valid_instruments: [pro_weai]
age_applicability:
  - adult
