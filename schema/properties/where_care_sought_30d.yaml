id: where_care_sought_30d
maturity: draft
label:
  en: "Where the household member(s) went for care"
  fr: "Où le(s) membre(s) du ménage s'est/se sont rendu(s) pour les soins"
  es: "Adónde fue/fueron el/los miembro(s) del hogar para recibir atención"

definition:
  en: "Type(s) of provider or facility the household member(s) visited for the recent care-seeking episode(s) in the last 30 days. Multi-select: one household may involve more than one provider type across different members or episodes. Reuses the `care-provider-type` vocabulary shared with ChildHealthProfile, MaternalNewbornHealthProfile, and ReproductiveHealthProfile. Ask only if `hh_member_sought_care_30d` is `yes_all` or `yes_some`."
  fr: "Type(s) de prestataire ou d'établissement consulté par le(s) membre(s) du ménage lors de/des épisode(s) récent(s) de recours aux soins au cours des 30 derniers jours. Sélection multiple : un même ménage peut impliquer plus d'un type de prestataire pour différents membres ou épisodes. Réutilise le vocabulaire `care-provider-type` partagé avec ChildHealthProfile, MaternalNewbornHealthProfile et ReproductiveHealthProfile. Ne poser que si `hh_member_sought_care_30d` est `yes_all` ou `yes_some`."
  es: "Tipo(s) de proveedor o establecimiento visitado por el/los miembro(s) del hogar durante el/los episodio(s) reciente(s) de búsqueda de atención en los últimos 30 días. Selección múltiple: un mismo hogar puede involucrar más de un tipo de proveedor en diferentes miembros o episodios. Reutiliza el vocabulario `care-provider-type` compartido con ChildHealthProfile, MaternalNewbornHealthProfile y ReproductiveHealthProfile. Preguntar solo si `hh_member_sought_care_30d` es `yes_all` o `yes_some`."

type: string
cardinality: multiple
core: true
vocabulary: care-provider-type
references: null
category: health_access_unmet_need
sensitivity: sensitive
