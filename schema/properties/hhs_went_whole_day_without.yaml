id: hhs_went_whole_day_without
maturity: draft
label:
  en: "HHS whole day without food"
  fr: "EFM journée entière sans manger"
  es: "EHH día entero sin comer"

definition:
  en: "Frequency with which, in the past 30 days, any household member went a whole day and night without eating because there was not enough food. One of three items in the FANTA Household Hunger Scale."
  fr: "Fréquence à laquelle, au cours des 30 derniers jours, un membre du ménage a passé une journée et une nuit entières sans manger parce qu'il n'y avait pas assez de nourriture. L'un des trois items de l'Échelle de la faim du ménage (HHS) de FANTA."
  es: "Frecuencia con la que, en los últimos 30 días, algún miembro del hogar pasó un día y una noche enteros sin comer porque no había suficiente comida. Uno de los tres ítems de la Escala de Hambre del Hogar (HHS) de FANTA."

type: string
cardinality: single
vocabulary: hhs-frequency
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [fanta_hhs]
