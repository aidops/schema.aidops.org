id: anc_visits_count
maturity: draft
label:
  en: Number of antenatal care visits (grouped)
  fr: "Nombre de visites prénatales (regroupé)"
  es: "Número de visitas de atención prenatal (agrupado)"
definition:
  en: "The number of antenatal care contacts received during the most recent pregnancy, grouped per DHS-8 m14 categories. WHO 2016 recommends 8 or more contacts; the SDG and HMIS threshold is 4 or more. The raw integer count is not recorded; the grouped code is used for international comparability. Derives anc_4_or_more_visits and anc_8_or_more_visits."
  fr: "Le nombre de contacts de soins prénataux reçus pendant la grossesse la plus récente, regroupé selon les catégories DHS-8 m14. L'OMS 2016 recommande 8 contacts ou plus ; le seuil ODD et HMIS est de 4 ou plus. Le nombre entier brut n'est pas enregistré ; le code regroupé est utilisé pour la comparabilité internationale. Dérive anc_4_or_more_visits et anc_8_or_more_visits."
  es: "El número de contactos de atención prenatal recibidos durante el embarazo más reciente, agrupado según las categorías DHS-8 m14. La OMS 2016 recomienda 8 o más contactos; el umbral de ODS y HMIS es 4 o más. El recuento entero bruto no se registra; se utiliza el código agrupado para la comparabilidad internacional. Deriva anc_4_or_more_visits y anc_8_or_more_visits."
type: string
cardinality: single
core: true
vocabulary: anc-visit-count-group
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
