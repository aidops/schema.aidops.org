id: malaria_test_done
maturity: draft
label:
  en: "Malaria test done"
  fr: "Test de paludisme effectué"
  es: "Prueba de malaria realizada"

definition:
  en: "Whether a malaria test — either a rapid diagnostic test (RDT) or a blood slide — was done for the child during the fever episode. Published wording: 'Was a malaria test done — either a rapid diagnostic test (RDT) or a blood slide?' Ask only if fever_last_2wks is true. Gateway to malaria_test_result. Not in all DHS rounds; increasingly added in malaria-endemic settings. MICS code ML2."
  fr: "Si un test de paludisme — test de diagnostic rapide (TDR) ou frottis sanguin — a été effectué pour l'enfant pendant l'épisode de fièvre. Formulation publiée : « Un test de paludisme a-t-il été effectué — un test de diagnostic rapide (TDR) ou un frottis sanguin ? » Posez uniquement si fever_last_2wks est vrai. Passerelle vers malaria_test_result. Non inclus dans tous les cycles DHS ; de plus en plus ajouté dans les contextes d'endémie palustre. Code MICS ML2."
  es: "Si se realizó una prueba de malaria — ya sea una prueba de diagnóstico rápido (PDR) o un frotis de sangre — para el niño durante el episodio febril. Redacción publicada: '¿Se realizó una prueba de malaria — ya sea una prueba de diagnóstico rápido (PDR) o un frotis de sangre?' Preguntar solo si fever_last_2wks es verdadero. Puerta de entrada a malaria_test_result. No en todas las rondas DHS; cada vez más añadido en entornos endémicos de malaria. Código MICS ML2."

type: string
cardinality: single
core: false
vocabulary: malaria-test-type
references: null
category: fever
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
