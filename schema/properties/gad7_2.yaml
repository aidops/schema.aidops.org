id: gad7_2
maturity: draft
label:
  en: "GAD-7 item 2: unable to stop or control worrying"
  fr: "GAD-7 item 2 : incapable d'arrêter ou de contrôler les soucis"
  es: "GAD-7 ítem 2: no poder detener o controlar las preocupaciones"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by not being able to stop or control worrying. GAD-7 item 2, measuring worry control. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par l'incapacité d'arrêter ou de contrôler ses préoccupations. GAD-7 item 2, mesurant le contrôle des préoccupations. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por no poder detener o controlar sus preocupaciones. Ítem 2 del GAD-7, que mide el control de la preocupación. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

