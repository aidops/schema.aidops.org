id: aap_treated_with_respect
maturity: draft
label:
  en: "AAP: Treated with respect by aid providers"
  fr: "Redevabilité : Traité avec respect par les intervenants"
  es: "Rendición de cuentas: Tratado con respeto por los actores humanitarios"

definition:
  en: "How often the respondent has felt treated with respect in interactions with aid providers. Maps to CHS 2024 Commitment 8 and the Sphere Humanitarian Charter's right to assistance with dignity. GTS HVI respect indicator (the GTS Nigeria 2021 report 'Respected but uninformed' explicitly centres this dimension). Source: IASC / REACH Menu 2018 staff-behaviour section; IFRC CEA Toolkit."
  fr: "À quelle fréquence le répondant s'est senti traité avec respect lors des interactions avec les intervenants. Correspond à l'Engagement 8 de la CHS 2024 et au droit à l'assistance avec dignité de la Charte humanitaire Sphère. Indicateur de respect de GTS HVI (le rapport GTS Nigeria 2021 « Respected but uninformed » centre explicitement cette dimension). Source : Menu IASC / REACH 2018, section comportement du personnel ; Toolkit CEA de la FICR."
  es: "Con qué frecuencia el encuestado se ha sentido tratado con respeto en las interacciones con los actores humanitarios. Corresponde al Compromiso 8 de la CHS 2024 y al derecho a la asistencia con dignidad de la Carta Humanitaria de Esfera. Indicador de respeto de GTS HVI (el informe GTS Nigeria 2021 «Respected but uninformed» centra explícitamente esta dimensión). Fuente: Menú IASC / REACH 2018, sección comportamiento del personal; Kit de Herramientas CEA de la FICR."

type: string
cardinality: single
vocabulary: aap-frequency-5
references: null
category: aap_respect
core: false
sensitivity: standard
