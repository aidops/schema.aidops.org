id: hf_service_emergency_care
maturity: draft
label:
  en: "Has dedicated emergency care capacity"
  fr: "Dispose d'une capacité dédiée de soins d'urgence"
  es: "Cuenta con capacidad dedicada de atención de emergencia"

definition:
  en: "Whether the facility has dedicated emergency care capacity: a designated emergency unit, triage system, or designated on-call emergency team. Reported by the facility in-charge. Not every primary facility will have this; hospitals generally will. Sphere 2018; ECAT/HEAT top-level presence indicator (full signal-function assessment is out of scope)."
  fr: "Si l'établissement dispose d'une capacité dédiée de soins d'urgence : unité d'urgence désignée, système de triage ou équipe d'urgence d'astreinte désignée. Rapporté par le responsable de l'établissement. Tous les établissements primaires ne l'auront pas ; les hôpitaux l'auront généralement. Sphère 2018 ; indicateur de présence de haut niveau ECAT/HEAT (l'évaluation complète des fonctions signal est hors périmètre)."
  es: "Si el establecimiento cuenta con capacidad dedicada de atención de emergencia: unidad de emergencia designada, sistema de triaje o equipo de emergencia de guardia designado. Reportado por el responsable del establecimiento. No todo establecimiento primario lo tendrá; los hospitales generalmente sí. Esfera 2018; indicador de presencia de alto nivel ECAT/HEAT (la evaluación completa de funciones señal está fuera de alcance)."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: classification
sensitivity: standard
