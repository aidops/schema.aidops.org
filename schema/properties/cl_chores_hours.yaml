id: cl_chores_hours
maturity: draft
label:
  en: "Hours on household chores (past 7 days)"
  fr: "Heures consacrées aux tâches ménagères (7 derniers jours)"
  es: "Horas en tareas del hogar (últimos 7 días)"
definition:
  en: "Total hours the selected child aged 5-17 spent on household chores (shopping, cooking, washing dishes, laundry, cleaning, caring for children, caring for the sick or elderly) in the past 7 days. MICS 6 CL11-CL13 summed per the MICS tabulation plan. Integer hours. Combined with cl_fetch_water_hours and cl_collect_firewood_hours to form total household services used in the 21-hour threshold for ages 5-14."
  fr: "Total d'heures que l'enfant sélectionné âgé de 5 à 17 ans a consacrées aux tâches ménagères (faire les courses, cuisiner, faire la vaisselle, la lessive, le ménage, s'occuper d'enfants, s'occuper des malades ou personnes âgées) au cours des 7 derniers jours. MICS 6 CL11-CL13 additionnés selon le plan de tabulation MICS. Heures entières. Combiné avec cl_fetch_water_hours et cl_collect_firewood_hours pour former le total des services domestiques utilisé dans le seuil de 21 heures pour 5-14 ans."
  es: "Total de horas que el niño seleccionado de 5 a 17 años dedicó a tareas del hogar (compras, cocinar, lavar platos, lavar ropa, limpiar, cuidar niños, cuidar enfermos o ancianos) en los últimos 7 días. MICS 6 CL11-CL13 sumados según el plan de tabulación MICS. Horas enteras. Combinado con cl_fetch_water_hours y cl_collect_firewood_hours para formar el total de servicios domésticos usado en el umbral de 21 horas para 5-14 años."
type: integer
cardinality: single
core: true
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
