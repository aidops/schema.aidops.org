id: livestock_counts
maturity: draft
label:
  en: "Livestock counts by species"
  fr: "Effectifs de bétail par espèce"
  es: "Conteos de ganado por especie"

definition:
  en: "Current count of animals owned by the household, one integer value per livestock-type code (cattle, sheep, goats, pigs, chickens, other_poultry, horses, donkeys_mules, camels, rabbits, beehives, other_livestock — see PS vocabulary `livestock-type`). Recorded as a repeat group or grid in the form with one row per species; `0` is a valid count when the species is not kept. Drawn from DHS-8 `hv246a`–`hv246k`, the LSMS-ISA livestock module, and FAO WCA 2020 livestock items. Feeds the TLU calculation (see `tlu_total`). Asked only when `hh_owns_livestock` is `yes`. In polygamous households, LSMS-ISA recommends interviewing the household member responsible for livestock separately; this is a form-implementation note, not a schema constraint."
  fr: "Effectif actuel d'animaux détenus par le ménage, une valeur entière par code livestock-type (bovins, ovins, caprins, porcins, poulets, autre volaille, chevaux, ânes_mulets, chameaux, lapins, ruches, autre bétail — voir vocabulaire PS `livestock-type`). Enregistré en tant que groupe de répétition ou grille dans le formulaire avec une ligne par espèce ; `0` est un effectif valide lorsque l'espèce n'est pas élevée. Tiré de `hv246a`–`hv246k` du DHS-8, du module bétail du LSMS-ISA et des items bétail du WCA 2020 de la FAO. Alimente le calcul de TLU (voir `tlu_total`). Posé uniquement lorsque `hh_owns_livestock` est `yes`. Dans les ménages polygames, LSMS-ISA recommande d'interroger séparément le membre responsable du bétail ; il s'agit d'une note de mise en œuvre du formulaire, et non d'une contrainte du schéma."
  es: "Conteo actual de animales poseídos por el hogar, un valor entero por código livestock-type (bovinos, ovinos, caprinos, porcinos, pollos, otras aves, caballos, burros_mulas, camellos, conejos, colmenas, otro ganado — ver vocabulario PS `livestock-type`). Registrado como grupo de repetición o cuadrícula en el formulario con una fila por especie; `0` es un conteo válido cuando la especie no se tiene. Tomado de `hv246a`–`hv246k` del DHS-8, del módulo de ganado del LSMS-ISA y de los ítems de ganado del WCA 2020 de la FAO. Alimenta el cálculo de TLU (ver `tlu_total`). Se pregunta solo cuando `hh_owns_livestock` es `yes`. En hogares polígamos, LSMS-ISA recomienda entrevistar por separado al miembro responsable del ganado; esta es una nota de implementación del formulario, no una restricción del esquema."

type: integer
cardinality: multiple
