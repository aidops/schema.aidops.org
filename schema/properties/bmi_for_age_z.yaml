id: bmi_for_age_z
maturity: draft
label:
  en: "BMI-for-age z-score"
  fr: "Z-score IMC-pour-âge"
  es: "Puntaje z IMC-para-edad"

definition:
  en: "The BMI-for-age z-score (BAZ) derived from height and weight against the declared growth reference. Used under the WHO 2007 reference for school-age children and adolescents (5-19 years) in place of weight-for-height, which does not apply in that age range."
  fr: "Le z-score IMC-pour-âge (BAZ) dérivé de la taille et du poids par rapport à la référence de croissance déclarée. Utilisé selon la référence OMS 2007 pour les enfants d'âge scolaire et adolescents (5-19 ans) à la place du poids-pour-taille, qui ne s'applique pas dans cette tranche d'âge."
  es: "El puntaje z IMC-para-edad (BAZ) derivado de la talla y el peso respecto a la referencia de crecimiento declarada. Utilizado bajo la referencia OMS 2007 para niños en edad escolar y adolescentes (5-19 años) en lugar del peso-para-talla, que no aplica en ese rango de edad."

type: decimal
cardinality: single
