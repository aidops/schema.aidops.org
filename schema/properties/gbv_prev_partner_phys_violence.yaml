id: gbv_prev_partner_phys_violence
maturity: draft
label:
  en: "Previous partner: ever experienced physical violence"
  fr: "Partenaire précédent : a jamais subi de violences physiques"
  es: "Compañero anterior: alguna vez experimentó violencia física"

definition:
  en: >
    Whether any previous husband or partner ever physically harmed the respondent. DHS instrument
    item DV15A (physical violence component). Lifetime reference period (ever, from any previous
    partner). This is a secondary item; the primary IPV battery (Sections 5.2-5.4 in the research
    document) addresses the referent (current or most recent) partner. Timing of most recent
    episode from previous partner is captured in gbv_prev_partner_timing. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si un mari ou partenaire précédent a jamais blessé physiquement la répondante. Item DHS DV15A
    (composante violence physique). Période de référence : à vie (tout partenaire précédent).
    Item secondaire. Compatible DHS-7+.
  es: >
    Si algún marido o compañero anterior alguna vez lastimó físicamente a la encuestada. Ítem
    DHS DV15A (componente violencia física). Período de referencia: de por vida (cualquier
    compañero anterior). Ítem secundario. Compatible DHS-7+.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_safety_signals
core: false
sensitivity: restricted
