id: hf_commodity_insulin_available
maturity: draft
label:
  en: "Regular human insulin available and within expiry"
  fr: "Insuline humaine régulière disponible et non périmée"
  es: "Insulina humana regular disponible y vigente"

definition:
  en: "Whether regular human insulin (100 IU/ml, 10 ml vial) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA NCD tracer; WHO EML. `not_applicable` when the facility offers no NCD services or referral. Extended (non-core). Sensitive: stock-out reporting is politically sensitive."
  fr: "Si l'insuline humaine régulière (100 UI/ml, flacon de 10 ml) est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA MNT ; EML de l'OMS. `not_applicable` lorsque l'établissement n'offre pas de services MNT ni de référence. Étendu (non-core). Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si la insulina humana regular (100 UI/ml, vial de 10 ml) está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA ENT; EML de la OMS. `not_applicable` cuando el establecimiento no ofrece servicios ENT ni referencia. Extendido (no-core). Sensible: el reporte de desabastecimientos es políticamente sensible."

type: string
cardinality: single
core: false
vocabulary: yes-no-na
references: null
category: classification
sensitivity: sensitive
