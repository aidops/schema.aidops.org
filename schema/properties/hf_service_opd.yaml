id: hf_service_opd
maturity: draft
label:
  en: "Offers general outpatient (OPD) services"
  fr: "Offre des services de consultation externe (OPD)"
  es: "Ofrece servicios de consulta externa (OPD)"

definition:
  en: "Whether the facility offers general outpatient (OPD) services. Reported by the facility in-charge. OPD is the floor of primary care and is typically present at every facility at or above health-post level. SARA service-availability tracer; Sphere 2018."
  fr: "Si l'établissement offre des services généraux de consultation externe (OPD). Rapporté par le responsable de l'établissement. OPD est le plancher des soins primaires et est généralement présent dans tout établissement au niveau poste de santé ou au-dessus. Indicateur traceur SARA de disponibilité des services ; Sphère 2018."
  es: "Si el establecimiento ofrece servicios generales de consulta externa (OPD). Reportado por el responsable del establecimiento. OPD es el piso de la atención primaria y suele estar presente en todo establecimiento al nivel de puesto de salud o superior. Indicador trazador SARA de disponibilidad de servicios; Esfera 2018."

type: boolean
cardinality: single
core: true
