id: mk_functionality_score
maturity: draft
label:
  en: Market functionality score
  fr: Score de fonctionnalité du marché
  es: Puntaje de funcionalidad del mercado

definition:
  en: >
    Derived integer 0–4 index of market functionality, computed from
    mk_market_operational_status as the primary input. Primary derivation maps
    status codes to scores: fully_operational=4, mostly_operational=3,
    partially_operational=2, minimally_operational=1, closed=0, dont_know=null.
    Adjusted derivation: when mk_functional_days_pre_crisis is known and
    mk_functional_days_per_week / mk_functional_days_pre_crisis < 0.5, the
    score is reduced by one level (minimum 0). Aligned with the CaLP MISMA
    functionality spectrum and WFP MAG 2021 market functionality score
    methodology. Implemented as an XLSForm calculate field. Core output for
    market monitoring dashboards and JIAF 2.0 food security severity
    classification.
  fr: >
    Indice entier dérivé 0–4 de la fonctionnalité du marché, calculé à partir
    de mk_market_operational_status comme entrée principale. La dérivation
    primaire mappe les codes de statut sur des scores :
    fully_operational=4, mostly_operational=3, partially_operational=2,
    minimally_operational=1, closed=0, dont_know=null. Dérivation ajustée :
    lorsque mk_functional_days_pre_crisis est connu et que
    mk_functional_days_per_week / mk_functional_days_pre_crisis < 0,5, le
    score est réduit d'un niveau (minimum 0).
  es: >
    Índice entero derivado 0–4 de funcionalidad del mercado, calculado a partir
    de mk_market_operational_status como entrada principal. La derivación
    primaria mapea los códigos de estado a puntajes:
    fully_operational=4, mostly_operational=3, partially_operational=2,
    minimally_operational=1, closed=0, dont_know=null. Derivación ajustada:
    cuando mk_functional_days_pre_crisis es conocido y
    mk_functional_days_per_week / mk_functional_days_pre_crisis < 0.5, el
    puntaje se reduce un nivel (mínimo 0).

type: integer
cardinality: single
core: true
vocabulary: null
references: null
category: market_functionality
sensitivity: standard
