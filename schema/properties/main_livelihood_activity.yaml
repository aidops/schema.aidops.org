id: main_livelihood_activity
maturity: draft
label:
  en: "Main livelihood activity"
  fr: "Activité principale de subsistance"
  es: "Actividad principal de subsistencia"

definition:
  en: "The single primary activity on which the household relies as its main source of income or food. Drawn from the LSMS-ISA core livelihood module, the MICS6 Household Questionnaire income module, and the Sphere 2018 Livelihoods chapter on livelihood strategy classification. Captures the household's dominant livelihood strategy at the time of assessment, for a current (no recall period) reference frame."
  fr: "L'unique activité principale sur laquelle le ménage s'appuie comme source principale de revenus ou de nourriture. Tirée du module principal des moyens de subsistance LSMS-ISA, du module revenus du Questionnaire Ménage MICS6 et du chapitre Moyens de subsistance de Sphère 2018 sur la classification des stratégies de subsistance. Capture la stratégie de subsistance dominante du ménage au moment de l'évaluation, dans un cadre de référence actuel (sans période de rappel)."
  es: "La única actividad principal en la que el hogar se apoya como su fuente principal de ingresos o alimentos. Tomada del módulo central de medios de vida de LSMS-ISA, el módulo de ingresos del Cuestionario de Hogar MICS6 y el capítulo de Medios de Vida de Esfera 2018 sobre clasificación de estrategias de subsistencia. Captura la estrategia de subsistencia dominante del hogar al momento de la evaluación, en un marco de referencia actual (sin período de recordatorio)."

type: string
cardinality: single
core: true
