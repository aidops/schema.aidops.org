id: iycf_ebf
maturity: draft
label:
  en: "Exclusive breastfeeding (EBF)"
  fr: "Allaitement maternel exclusif (ALM)"
  es: "Lactancia materna exclusiva (LME)"

definition:
  en: "Derived boolean: whether the child was exclusively breastfed yesterday. Applies to children 0–5 months. Formula: iycf_breastfed_yesterday = true AND iycf_plain_water_yesterday = false AND iycf_other_liquids_yesterday = false AND iycf_solid_food_yesterday = false. Numerator for the Exclusive Breastfeeding under 6 Months indicator (WHO/UNICEF 2021)."
  fr: "Booléen dérivé : indique si l'enfant a été exclusivement allaité hier. S'applique aux enfants de 0 à 5 mois. Formule : iycf_breastfed_yesterday = vrai ET iycf_plain_water_yesterday = faux ET iycf_other_liquids_yesterday = faux ET iycf_solid_food_yesterday = faux. Numérateur de l'indicateur d'allaitement maternel exclusif avant 6 mois (OMS/UNICEF 2021)."
  es: "Booleano derivado: indica si el niño fue amamantado exclusivamente ayer. Se aplica a niños de 0–5 meses. Fórmula: iycf_breastfed_yesterday = verdadero Y iycf_plain_water_yesterday = falso Y iycf_other_liquids_yesterday = falso Y iycf_solid_food_yesterday = falso. Numerador para el indicador de Lactancia Materna Exclusiva en menores de 6 meses (OMS/UNICEF 2021)."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: nutrition
age_applicability:
  - infant_0_1
valid_instruments: [who_iycf_2021]
