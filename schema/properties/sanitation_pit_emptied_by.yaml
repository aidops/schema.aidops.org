id: sanitation_pit_emptied_by
maturity: draft
label:
  en: "Who emptied the pit/tank and how"
  fr: "Qui a vidangé la fosse/le réservoir et comment"
  es: "Quién vació la fosa/el depósito y cómo"

definition:
  en: "Who carried out the last emptying of the on-site sanitation containment and by what method. Asked only when sanitation_pit_last_emptied is not 'never'. Mechanical emptying by a service provider is more likely to result in safe fecal sludge treatment and thus contributes to the safely managed sanitation criterion. Based on MICS6 pilot question WS8B."
  fr: "Qui a effectué le dernier vidange du dispositif d'assainissement sur site et par quelle méthode. Demandé uniquement quand sanitation_pit_last_emptied n'est pas 'never'. Le vidange mécanique par un prestataire de services est plus susceptible d'aboutir à un traitement sûr des boues fécales et contribue ainsi au critère d'assainissement à gestion sécurisée. Basé sur la question pilote MICS6 WS8B."
  es: "Quién realizó el último vaciado del contenedor de saneamiento en el sitio y por qué método. Preguntado solo cuando sanitation_pit_last_emptied no es 'never'. El vaciado mecánico por un proveedor de servicios es más probable que resulte en un tratamiento seguro de los lodos fecales y así contribuye al criterio de saneamiento con gestión segura. Basado en la pregunta piloto MICS6 WS8B."

type: string
cardinality: single
core: false
vocabulary: sanitation-emptying-actor
references: null
category: sanitation
valid_instruments: [mics6, mics7]
