id: specific_need_elderly_at_risk
maturity: draft
label:
  en: "Specific need flag: elderly person at risk"
  fr: "Indicateur de besoin spécifique : personne âgée à risque"
  es: "Indicador de necesidad específica: persona mayor en riesgo"

definition:
  en: "Screening flag indicating that the household includes an elderly person at heightened risk due to displacement. Corresponds to the UNHCR Standardized Specific Needs Code elderly-at-risk category."
  fr: "Indicateur de dépistage signalant que le ménage comprend une personne âgée à risque accru en raison du déplacement. Correspond à la catégorie personne âgée à risque des Codes de besoins spécifiques standardisés du HCR."
  es: "Indicador de cribado que señala que el hogar incluye una persona mayor con mayor riesgo debido al desplazamiento. Corresponde a la categoría anciano en riesgo de los Códigos de Necesidades Específicas Estandarizados del ACNUR."

type: boolean
cardinality: single
