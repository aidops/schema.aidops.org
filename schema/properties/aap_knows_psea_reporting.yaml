  es: "Booleano derivado a nivel de hogar: verdadero si `aap_psea_reporting_channel_known = yes`. Corresponde a la Norma Mínima Operativa PSEA de IASC y a los Compromisos 5 y 8 de la CHS 2024. Indicador PSEA principal de OCHA HNO."
