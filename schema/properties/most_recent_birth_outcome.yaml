id: most_recent_birth_outcome
maturity: draft
label:
  en: Most recent birth outcome
  fr: "Issue de la naissance la plus récente"
  es: Resultado del parto más reciente
definition:
  en: "Whether the most recent birth in the recall period was a live birth or a stillbirth. DHS-8 m80: 1 = live birth, 3 = stillbirth. All ANC and maternal PNC items are asked regardless of outcome. Newborn-specific items (skin-to-skin, birth weight, EIBF, newborn PNC) are skipped if outcome = stillbirth."
  fr: "Si la naissance la plus récente dans la période de rappel était une naissance vivante ou une mortinaissance. DHS-8 m80 : 1 = naissance vivante, 3 = mortinaissance. Tous les items CPN et SPN maternel sont posés indépendamment du résultat. Les items spécifiques au nouveau-né (peau à peau, poids de naissance, EIBF, SPN du nouveau-né) sont ignorés si résultat = mortinaissance."
  es: "Si el parto más reciente en el período de recordatorio fue un nacimiento vivo o un mortinato. DHS-8 m80: 1 = nacimiento vivo, 3 = mortinato. Todos los ítems de APN y PPN materna se preguntan independientemente del resultado. Los ítems específicos del recién nacido (piel a piel, peso al nacer, EIBF, PPN del recién nacido) se omiten si el resultado = mortinato."
type: string
cardinality: single
core: true
vocabulary: pregnancy-outcome
references: null
category: pregnancy_history
age_applicability:
  - adult
sensitivity: sensitive
