id: hf_commodity_amlodipine_available
maturity: draft
label:
  en: "Amlodipine available and within expiry"
  fr: "Amlodipine disponible et non périmée"
  es: "Amlodipino disponible y vigente"

definition:
  en: "Whether amlodipine (5 mg tablet) or an equivalent calcium-channel blocker is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA NCD tracer (M56); WHO EML. Core tracer for hypertension management. Extended (non-core). Sensitive: stock-out reporting is politically sensitive."
  fr: "Si l'amlodipine (comprimé de 5 mg) ou un inhibiteur calcique équivalent est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA MNT (M56) ; EML de l'OMS. Indicateur traceur central pour la prise en charge de l'hypertension. Étendu (non-core). Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si el amlodipino (tableta de 5 mg) o un bloqueador de canales de calcio equivalente está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA ENT (M56); EML de la OMS. Indicador trazador central para el manejo de hipertensión. Extendido (no-core). Sensible: el reporte de desabastecimientos es políticamente sensible."

type: boolean
cardinality: single
