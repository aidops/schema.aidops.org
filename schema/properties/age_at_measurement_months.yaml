id: age_at_measurement_months
maturity: draft
label:
  en: "Age at measurement (months)"
  fr: "Âge à la mesure (mois)"
  es: "Edad en la medición (meses)"

definition:
  en: "The subject's age in completed months at the time the measurement was taken. Required for under-five anthropometry because WHO 2006 z-scores are a function of age, sex, and reference population; age now is not interchangeable with age at measurement when the measurement is historical."
  fr: "L'âge du sujet en mois révolus au moment de la prise de mesure. Requis pour l'anthropométrie des moins de cinq ans, car les z-scores OMS 2006 sont fonction de l'âge, du sexe et de la population de référence ; l'âge actuel n'est pas interchangeable avec l'âge à la mesure lorsque la mesure est ancienne."
  es: "La edad del sujeto en meses cumplidos al momento de tomar la medición. Requerido para antropometría en menores de cinco años porque los z-scores OMS 2006 son función de la edad, el sexo y la población de referencia; la edad actual no es intercambiable con la edad al momento de medición cuando la medición es histórica."

type: integer
cardinality: single
core: true
