id: productive_asset_types_owned
maturity: draft
label:
  en: "Productive asset types owned or accessed"
  fr: "Types d'actifs productifs possédés ou accessibles"
  es: "Tipos de activos productivos poseídos o accedidos"

definition:
  en: "Categories of productive assets the household owns or has regular access to, from the `livelihood-asset-type` vocabulary. Multi-select, category-only (no quantities or values): the coarse-grained capture keeps the item at `sensitivity: sensitive` rather than `restricted`, while preserving the FAO RIMA-II Assets, Productive Tools, and Technology (APT) pillar signal. Drawn from the LSMS-ISA asset roster, the FAO RIMA-II APT pillar, and the FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT). Distinct from the PS `household-asset` vocabulary (consumer durables / wealth proxies)."
  fr: "Catégories d'actifs productifs que le ménage possède ou auxquels il a un accès régulier, issues du vocabulaire `livelihood-asset-type`. Sélection multiple, catégorie uniquement (sans quantité ni valeur) : la saisie grossière maintient l'item à `sensitivity: sensitive` plutôt que `restricted`, tout en préservant le signal du pilier Actifs, outils productifs et technologie (APT) de FAO RIMA-II. Tirée du registre des actifs LSMS-ISA, du pilier APT de FAO RIMA-II et des Directives volontaires de la FAO pour une gouvernance responsable des régimes fonciers (VGGT). Distincte du vocabulaire PublicSchema `household-asset` (biens de consommation durables / indicateurs indirects de richesse)."
  es: "Categorías de activos productivos que el hogar posee o a los que tiene acceso regular, del vocabulario `livelihood-asset-type`. Selección múltiple, solo categoría (sin cantidades ni valores): la captura gruesa mantiene el ítem en `sensitivity: sensitive` en lugar de `restricted`, mientras preserva la señal del pilar Activos, Herramientas Productivas y Tecnología (APT) de FAO RIMA-II. Tomada del inventario de activos LSMS-ISA, el pilar APT de FAO RIMA-II y las Directrices Voluntarias de la FAO sobre la Gobernanza Responsable de la Tenencia (VGGT). Distinta del vocabulario PublicSchema `household-asset` (bienes de consumo duraderos / indicadores indirectos de riqueza)."

type: string
cardinality: multiple
core: false
vocabulary: livelihood-asset-type
references: null
category: context
sensitivity: sensitive
