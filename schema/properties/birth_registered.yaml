id: birth_registered
maturity: draft
label:
  en: "Birth registered with civil authority"
  fr: "Naissance enregistrée auprès de l'autorité civile"
  es: "Nacimiento registrado con la autoridad civil"
definition:
  en: "Whether the birth of the child under 5 has been registered with the civil authority. MICS 6 BR2. Asked only when birth_certificate_seen is 'no' or 'dont_know'. The SDG 16.9.1 numerator is satisfied when either birth_certificate_seen is yes_seen / yes_not_seen OR birth_registered is yes. Derived aggregate cp1_birth_registered flags registration at the individual-child level."
  fr: "Si la naissance de l'enfant de moins de 5 ans a été enregistrée auprès de l'autorité civile. MICS 6 BR2. Posé uniquement lorsque birth_certificate_seen est 'no' ou 'dont_know'. Le numérateur ODD 16.9.1 est satisfait lorsque birth_certificate_seen est yes_seen / yes_not_seen OU birth_registered est yes. L'agrégat dérivé cp1_birth_registered marque l'enregistrement au niveau de l'enfant."
  es: "Si el nacimiento del niño menor de 5 años fue registrado con la autoridad civil. MICS 6 BR2. Se pregunta solo cuando birth_certificate_seen es 'no' o 'dont_know'. El numerador ODS 16.9.1 se satisface cuando birth_certificate_seen es yes_seen / yes_not_seen O birth_registered es yes. El agregado derivado cp1_birth_registered marca el registro a nivel individual del niño."
type: string
cardinality: single
core: true
vocabulary: yes-no-dk
references: null
category: birth_registration
age_applicability:
  - infant_0_1
  - child_2_4
sensitivity: sensitive
