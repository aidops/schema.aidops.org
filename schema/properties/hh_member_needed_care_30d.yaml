id: hh_member_needed_care_30d
maturity: draft
label:
  en: "Household member needed health care in the last 30 days"
  fr: "Un membre du ménage a eu besoin de soins de santé au cours des 30 derniers jours"
  es: "Algún miembro del hogar necesitó atención de salud en los últimos 30 días"

definition:
  en: "Whether any member of the household needed health care, medical advice, or treatment for an illness or injury in the 30 days preceding the interview. Gateway item for the unmet-need module. The 30-day recall period aligns with the PAHO Americas household survey approach and the WHO People's Voice Survey. DHS uses 2 weeks for child-specific illness recall; 30 days is appropriate for the generic household-level assessment."
  fr: "Si un membre du ménage a eu besoin de soins de santé, de conseils médicaux ou d'un traitement pour une maladie ou une blessure au cours des 30 jours précédant l'entretien. Question porte d'entrée du module « besoin non satisfait ». La période de rappel de 30 jours s'aligne sur l'approche de l'enquête auprès des ménages PAHO des Amériques et sur l'enquête People's Voice Survey de l'OMS. Le DHS utilise 2 semaines pour le rappel des maladies infantiles ; 30 jours conviennent à l'évaluation générique au niveau du ménage."
  es: "Si algún miembro del hogar necesitó atención de salud, consejo médico o tratamiento por una enfermedad o lesión en los 30 días previos a la entrevista. Ítem de entrada del módulo de necesidad insatisfecha. El período de recordatorio de 30 días está alineado con el enfoque de la encuesta de hogares PAHO de las Américas y con la People's Voice Survey de la OMS. El DHS usa 2 semanas para el recordatorio de enfermedad infantil específica; 30 días es apropiado para la evaluación genérica a nivel del hogar."

type: boolean
cardinality: single
core: true
