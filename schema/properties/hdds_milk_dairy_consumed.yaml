id: hdds_milk_dairy_consumed
maturity: draft
label:
  en: "HDDS milk and dairy consumed"
  fr: "SDAM lait et produits laitiers consommés"
  es: "EDDA leche y lácteos consumidos"

definition:
  en: "Whether any member of the household consumed an item from the milk and dairy products food group in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe du lait et des produits laitiers au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de leche y productos lácteos en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
cardinality: single
