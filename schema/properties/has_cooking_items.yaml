id: has_cooking_items
maturity: draft
label:
  en: "Has adequate cooking items"
  fr: "Dispose d'articles de cuisine adéquats"
  es: "Tiene artículos de cocina adecuados"

definition:
  en: "Whether the household has the basic cooking items it needs: a cooking pot, plates, eating utensils, and a drinking vessel for each person. Sphere Standard 4 key indicator specifies two family-sized cooking pots, one basin, one kitchen knife, and per person: one dished plate, one set of eating utensils, and one drinking vessel."
  fr: "Si le ménage dispose des articles de cuisine de base nécessaires : une marmite, des assiettes, des ustensiles de repas et un récipient à boire pour chaque personne. L'indicateur clé de la Norme Sphère 4 spécifie deux marmites de taille familiale, une bassine, un couteau de cuisine et par personne : une assiette, un ensemble d'ustensiles de repas et un récipient à boire."
  es: "Si el hogar tiene los artículos básicos de cocina que necesita: una olla, platos, utensilios para comer y un recipiente para beber para cada persona. El indicador clave de la Norma Esfera 4 especifica dos ollas de tamaño familiar, una palangana, un cuchillo de cocina y por persona: un plato, un conjunto de utensilios para comer y un recipiente para beber."

type: string
cardinality: single
