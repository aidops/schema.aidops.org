id: protection_referral_aware
maturity: draft
label:
  en: "General protection referral awareness (household)"
  fr: "Connaissance des mécanismes de signalement de protection (ménage)"
  es: "Conocimiento de mecanismos de derivación de protección (hogar)"

definition:
  en: "Whether the household knows of a place, organization, or person they could contact to report a protection problem or seek help — such as violence, detention, a property dispute, or discrimination. This is the general protection mechanism, distinct from GBV-specific referral awareness (GBVRiskProfile.gbv_referral_services_known). Enumerator must NOT show a list of services — this is an awareness test, not a service-mapping question. Based on GPC PAF Domain 2 (Rule of Law and Justice); UNHCR Protection Mainstreaming Framework (2016); Sphere Protection Principle 4 (Strengthen people's capacity to claim their rights); REACH Syria (2022)."
  fr: "Si le ménage connaît un endroit, une organisation ou une personne à contacter pour signaler un problème de protection ou demander de l'aide — comme des violences, une détention, un litige foncier ou de la discrimination. Il s'agit du mécanisme de protection général, distinct de la connaissance des mécanismes de signalement spécifiques à la VBG (GBVRiskProfile.gbv_referral_services_known). L'enquêteur ne doit PAS montrer une liste de services — il s'agit d'un test de connaissance, pas d'une question de cartographie des services. Fondé sur GPC PAF Domaine 2 (État de droit et justice) ; Cadre de protection intégrée UNHCR (2016) ; Sphère Principe de protection 4 (Renforcer la capacité des personnes à revendiquer leurs droits) ; REACH Syrie (2022)."
  es: "Si el hogar conoce algún lugar, organización o persona a quien contactar para reportar un problema de protección o buscar ayuda — como violencia, detención, disputa de propiedad o discriminación. Este es el mecanismo de protección general, distinto del conocimiento de mecanismos de derivación específicos de VBG (GBVRiskProfile.gbv_referral_services_known). El encuestador NO debe mostrar una lista de servicios — esta es una prueba de conocimiento, no una pregunta de mapeo de servicios. Basado en GPC PAF Dominio 2 (Estado de Derecho y Justicia); Marco de Protección Integral del ACNUR (2016); Principio de Protección 4 de Esfera (Fortalecer la capacidad de las personas para reclamar sus derechos); REACH Siria (2022)."

type: string
cardinality: single
vocabulary: yes-no-dk
