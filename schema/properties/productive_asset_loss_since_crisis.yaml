id: productive_asset_loss_since_crisis
maturity: draft
label:
  en: "Productive asset loss since crisis or displacement"
  fr: "Perte d'actifs productifs depuis la crise ou le déplacement"
  es: "Pérdida de activos productivos desde la crisis o desplazamiento"

definition:
  en: "Whether the household has lost or had to sell any productive assets since a crisis or displacement event. Asked only when `main_livelihood_activity` is not `aid_dependent`. Drawn from the FAO RIMA-II APT pillar, the LSMS-ISA asset change module, and the Sphere 2018 Livelihoods chapter on productive-asset protection. Distinct from `lcs_sold_productive_assets` in FoodSecurityProfile: that item asks about selling productive assets to meet food needs over the past 30 days; this item asks about broader loss or forced sale over the full crisis period, across all productive assets."
  fr: "Si le ménage a perdu ou a dû vendre des actifs productifs depuis une crise ou un événement de déplacement. Posé uniquement lorsque `main_livelihood_activity` n'est pas `aid_dependent`. Tiré du pilier APT de FAO RIMA-II, du module de changement d'actifs LSMS-ISA et du chapitre Moyens de subsistance de Sphère 2018 sur la protection des actifs productifs. Distinct de `lcs_sold_productive_assets` dans FoodSecurityProfile : cet item interroge la vente d'actifs productifs pour couvrir les besoins alimentaires sur les 30 derniers jours ; cet item interroge une perte plus large ou une vente forcée sur l'ensemble de la période de crise, pour tous les actifs productifs."
  es: "Si el hogar ha perdido o ha tenido que vender activos productivos desde una crisis o evento de desplazamiento. Se pregunta solo cuando `main_livelihood_activity` no es `aid_dependent`. Tomado del pilar APT de FAO RIMA-II, el módulo de cambio de activos LSMS-ISA y el capítulo de Medios de Vida de Esfera 2018 sobre protección de activos productivos. Distinto de `lcs_sold_productive_assets` en FoodSecurityProfile: ese ítem pregunta sobre la venta de activos productivos para satisfacer necesidades alimentarias en los últimos 30 días; este ítem pregunta sobre la pérdida más amplia o venta forzada durante todo el período de crisis, para todos los activos productivos."

type: string
cardinality: single
core: false
vocabulary: yes-no-na
references: null
category: context
sensitivity: sensitive
