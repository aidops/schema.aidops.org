id: mk_commodity_price_change_pct
maturity: draft
label:
  en: Commodity price change vs. reference (percent)
  fr: Variation du prix du produit par rapport à la référence (pourcent)
  es: Cambio de precio del producto vs. referencia (porcentaje)

definition:
  en: >
    Derived percentage price change for a commodity versus the reference period
    price. Formula: ((mk_commodity_price_local_currency -
    mk_commodity_price_reference) / mk_commodity_price_reference) * 100.
    Null when either input is null, -1, or -2, or when mk_commodity_available =
    not_available. WFP MAG 2021 and FAO GIEWS alert thresholds: +15% attention,
    +30% alert, +50% emergency. Implemented as an XLSForm calculate field
    displayed to the enumerator as a real-time quality check.
  fr: >
    Variation en pourcentage du prix d'un produit par rapport au prix de la
    période de référence (dérivée). Formule : ((mk_commodity_price_local_currency
    - mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Null
    lorsque l'une ou l'autre des entrées est null, -1 ou -2, ou lorsque
    mk_commodity_available = not_available.
  es: >
    Variación porcentual del precio de un producto respecto al precio del período
    de referencia (derivada). Fórmula: ((mk_commodity_price_local_currency -
    mk_commodity_price_reference) / mk_commodity_price_reference) * 100. Nulo
    cuando cualquiera de los insumos es nulo, -1 o -2, o cuando
    mk_commodity_available = not_available.

type: decimal
cardinality: single
core: true
vocabulary: null
references: null
category: market_price_basket
sensitivity: standard
