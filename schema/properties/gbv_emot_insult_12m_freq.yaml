id: gbv_emot_insult_12m_freq
maturity: draft
label:
  en: "Emotional IPV (12m frequency): insulted or made to feel bad about herself"
  fr: "VPI émotionnelle (fréquence 12m) : insultée ou amenée à se sentir mal dans sa peau"
  es: "VPI emocional (frecuencia 12m): insultada o hecha sentir mal consigo misma"

definition:
  en: >
    Frequency of partner insulting the respondent or making her feel bad about herself in the
    past 12 months. DHS instrument item DV04B for act DV04A-c (d103c). Asked only if
    gbv_emot_insult_lifetime = true (skip logic: if lifetime = false, this property is not asked).
    DHS-7+ compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des insultes ou des actes visant à faire sentir la répondante mal dans sa peau au
    cours des 12 derniers mois. Item DHS DV04B pour DV04A-c (d103c). Posée uniquement si
    gbv_emot_insult_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero insulte o haga sentir mal a la encuestada en los últimos
    12 meses. Ítem DHS DV04B para DV04A-c (d103c). Se pregunta solo si
    gbv_emot_insult_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_emotional_ipv
core: false
sensitivity: restricted
