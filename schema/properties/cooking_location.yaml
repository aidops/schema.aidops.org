id: cooking_location
maturity: draft
label:
  en: "Cooking location"
  fr: "Lieu de cuisson"
  es: "Lugar de cocción"

definition:
  en: "Where the household usually cooks. Cooking location is required to apply the MTF cooking exposure attribute: indoor cooking without a chimney is the highest indoor air pollution exposure configuration. The default ventilation scenario for PM2.5 tier crosswalk applies when cooking location is indoors without chimney; improved ventilation thresholds apply for outdoor or indoor-with-chimney configurations. Source: WHO/World Bank harmonized questionnaire Q5; MTF household survey."
  fr: "L'endroit où le ménage cuisine habituellement. Le lieu de cuisson est nécessaire pour appliquer l'attribut d'exposition MTF de cuisson : cuisiner à l'intérieur sans cheminée est la configuration présentant la plus forte exposition aux HAP. Le scénario de ventilation par défaut pour le tableau de correspondance des niveaux PM2,5 s'applique lorsque le lieu de cuisson est intérieur sans cheminée ; les seuils de ventilation améliorée s'appliquent aux configurations extérieures ou intérieures avec cheminée. Source : questionnaire harmonisé OMS/Banque mondiale Q5 ; enquête ménage MTF."
  es: "Donde el hogar cocina habitualmente. El lugar de cocción es necesario para aplicar el atributo de exposición de cocción MTF: cocinar en interiores sin chimenea es la configuración de mayor exposición a la contaminación del aire interior. El escenario de ventilación por defecto para la tabla de referencia de niveles PM2,5 se aplica cuando el lugar de cocción es interior sin chimenea; los umbrales de ventilación mejorada se aplican para configuraciones exteriores o interiores con chimenea. Fuente: cuestionario armonizado OMS/Banco Mundial Q5; encuesta de hogares MTF."

