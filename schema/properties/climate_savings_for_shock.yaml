id: climate_savings_for_shock
maturity: draft
label:
  en: "Household has savings available for a climate shock"
  fr: "Le ménage dispose d'épargne disponible pour un choc climatique"
  es: "El hogar tiene ahorros disponibles para un choque climático"

definition:
  en: >
    Single-select item asking whether the household has savings or money set
    aside that it could use specifically in the event of a drought, flood, or
    other climate-related disaster. Valid codes: yes_formal_savings /
    yes_informal_savings / yes_both / no_insufficient / no_none.
    RIMA-II overlap: LivelihoodProfile.has_savings asks whether the household
    has any savings at all (a general financial buffer indicator). This property
    specifically asks about savings available for climate shocks. When both
    profiles are collected in the same survey, the Form Author should branch:
    ask has_savings on LivelihoodProfile first; if 'yes', ask this item for
    climate-shock specificity rather than re-asking the baseline savings
    question. If LivelihoodProfile.has_savings = 'no', this item may be
    pre-populated as 'no_none'. The `climate_` prefix signals that this is a
    climate-specific framing, distinct from the RIMA-II general savings signal.
  fr: >
    Item à sélection unique demandant si le ménage dispose d'économies ou
    d'argent mis de côté qu'il pourrait utiliser spécifiquement en cas de
    sécheresse, d'inondation ou d'une autre catastrophe liée au climat.
    Chevauchement RIMA-II : LivelihoodProfile.has_savings demande si le ménage
    a des économies en général. Cette propriété demande spécifiquement si des
    économies sont disponibles pour des chocs climatiques. Lorsque les deux
    profils sont collectés ensemble, le formulaire devrait utiliser une
    ramification pour éviter de poser la même question deux fois.
  es: >
    Ítem de selección única que pregunta si el hogar tiene ahorros o dinero
    reservado que podría usar específicamente en caso de sequía, inundación u
    otro desastre relacionado con el clima. Superposición con RIMA-II:
    LivelihoodProfile.has_savings pregunta si el hogar tiene algún ahorro en
    general. Esta propiedad pregunta específicamente sobre ahorros disponibles
    para choques climáticos. Cuando ambos perfiles se recopilan en la misma
    encuesta, el formulario debería usar ramificación para evitar preguntar
    lo mismo dos veces.

type: string
cardinality: single
core: true
vocabulary: null
references: null
category: climate
sensitivity: sensitive
