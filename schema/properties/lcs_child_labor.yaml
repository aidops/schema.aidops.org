id: lcs_child_labor
maturity: draft
label:
  en: "LCS child labor"
  fr: "SCM travail des enfants"
  es: "EMV trabajo infantil"

definition:
  en: "Frequency with which household members, including children, engaged in exploitative or high-risk work to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, emergency tier. Protection red flag: affirmative responses warrant referral to the relevant child protection actors."
  fr: "Fréquence à laquelle des membres du ménage, y compris des enfants, ont eu recours à un travail exploitant ou à haut risque pour répondre aux besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau d'urgence. Signal d'alerte en matière de protection : les réponses affirmatives justifient une orientation vers les acteurs de protection de l'enfance concernés."
  es: "Frecuencia con la que miembros del hogar, incluidos niños, recurrieron a trabajo de explotación o de alto riesgo para cubrir las necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de emergencia. Señal de alerta de protección: las respuestas afirmativas justifican la derivación a los actores de protección infantil pertinentes."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
sensitivity: sensitive
valid_instruments: [wfp_lcs, wfp_cari]
