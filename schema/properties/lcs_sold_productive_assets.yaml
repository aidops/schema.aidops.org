id: lcs_sold_productive_assets
maturity: draft
label:
  en: "LCS sold productive assets"
  fr: "SCM vente d'actifs productifs"
  es: "EMV venta de activos productivos"

definition:
  en: "Frequency with which the household sold productive assets (tools, sewing machine, livestock) to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier."
  fr: "Fréquence à laquelle le ménage a vendu des actifs productifs (outils, machine à coudre, bétail) pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise."
  es: "Frecuencia con la que el hogar vendió activos productivos (herramientas, máquina de coser, ganado) para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis."

