id: phq9_7
maturity: draft
label:
  en: "PHQ-9 item 7: concentration difficulty"
  fr: "PHQ-9 item 7 : difficulté de concentration"
  es: "PHQ-9 ítem 7: dificultad para concentrarse"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by trouble concentrating on things, such as reading the newspaper or watching television. PHQ-9 item 7, measuring concentration difficulty. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par des difficultés à se concentrer sur des choses comme lire le journal ou regarder la télévision. PHQ-9 item 7, mesurant les difficultés de concentration. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por dificultades para concentrarse en cosas como leer el periódico o ver la televisión. Ítem 7 del PHQ-9, que mide la dificultad para concentrarse. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

