label:
  en: "PHQ-9 item 5: appetite change"
  fr: "PHQ-9 item 5 : modification de l'appétit"
  es: "PHQ-9 ítem 5: cambio en el apetito"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by poor appetite or overeating. PHQ-9 item 5, measuring appetite change. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un manque d'appétit ou au contraire un excès d'appétit. PHQ-9 item 5, mesurant les modifications de l'appétit. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por falta de apetito o por comer en exceso. Ítem 5 del PHQ-9, que mide el cambio en el apetito. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

