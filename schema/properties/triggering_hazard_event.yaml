id: triggering_hazard_event
maturity: draft
label:
  en: "Triggering hazard event"
  fr: "Événement déclencheur"
  es: "Evento de peligro desencadenante"

definition:
  en: "The hazard event that triggered this record. On DwellingDamageProfile the referenced HazardEvent identifies the flood, earthquake, cyclone, drought, conflict event, or other shock the post-shock assessment is responding to. A record may omit this property when the damage is chronic or not attributable to a single event."
  fr: "L'événement dangereux qui a déclenché cet enregistrement. Sur DwellingDamageProfile, le HazardEvent référencé identifie l'inondation, le séisme, le cyclone, la sécheresse, l'événement de conflit ou autre choc auquel répond l'évaluation post-choc. Un enregistrement peut omettre cette propriété lorsque les dommages sont chroniques ou non attribuables à un événement unique."
  es: "El evento de peligro que desencadenó este registro. En DwellingDamageProfile, el HazardEvent referenciado identifica la inundación, sismo, ciclón, sequía, evento de conflicto u otro choque al que responde la evaluación post-choque. Un registro puede omitir esta propiedad cuando el daño es crónico o no atribuible a un único evento."

type: concept:HazardEvent
cardinality: single
vocabulary: null
references: HazardEvent
category: hazard_event
sensitivity: sensitive
valid_instruments: [iasc_mira, iom_dtm_household, shelter_cluster_rna, reach_msna, pdna_housing]
