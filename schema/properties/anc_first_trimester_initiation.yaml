id: anc_first_trimester_initiation
maturity: draft
label:
  en: First ANC contact in the first trimester (derived)
  fr: "Premier contact CPN au premier trimestre (dérivé)"
  es: "Primer contacto APN en el primer trimestre (derivado)"
definition:
  en: "Derived indicator: true if anc_first_visit_gestational_age_months = first_trimester (before 4 months gestation). WHO 2016 recommends that the first antenatal contact occur in the first trimester for early risk identification and intervention."
  fr: "Indicateur dérivé : vrai si anc_first_visit_gestational_age_months = first_trimester (avant 4 mois de grossesse). L'OMS 2016 recommande que le premier contact prénatal ait lieu au premier trimestre pour une identification et une intervention précoces des risques."
  es: "Indicador derivado: verdadero si anc_first_visit_gestational_age_months = first_trimester (antes de los 4 meses de gestación). La OMS 2016 recomienda que el primer contacto prenatal ocurra en el primer trimestre para la identificación temprana de riesgos e intervención."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: derived_mnh
age_applicability:
  - adult
sensitivity: sensitive
