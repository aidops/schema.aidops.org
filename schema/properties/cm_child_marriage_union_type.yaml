definition:
  en: "Optional refinement of cm_children_under_18_married. Asked only when cm_children_under_18_married is yes, to distinguish formal marriage from informal union. Both forms count toward SDG 5.3.1; this property only disaggregates."
  fr: "Raffinement facultatif de cm_children_under_18_married. Posé uniquement lorsque cm_children_under_18_married est oui, pour distinguer le mariage formel de l'union informelle. Les deux formes comptent pour l'ODD 5.3.1 ; cette propriété ne fait que désagréger."
  es: "Refinamiento opcional de cm_children_under_18_married. Se pregunta solo cuando cm_children_under_18_married es sí, para distinguir el matrimonio formal de la unión informal. Ambas formas cuentan para ODS 5.3.1; esta propiedad solo desagrega."
