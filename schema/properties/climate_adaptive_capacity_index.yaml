id: climate_adaptive_capacity_index
maturity: draft
label:
  en: "Adaptive capacity index (0–9)"
  fr: "Indice de capacité d'adaptation (0–9)"
  es: "Índice de capacidad de adaptación (0–9)"

definition:
  en: >
    Derived integer 0–9 count of positive adaptive capacity signals, computable
    in XLSForm using calculate fields for rapid in-field triage. Uses equal
    weights (1 point per signal); program-specific weighting is a configuration
    decision, not a schema decision. Formula: (1 if climate_info_services_access
    = 'yes') + (1 if climate_information_trust IN ('fully_trusted',
    'mostly_trusted')) + (1 if climate_insurance_coverage_type does NOT include
    'none') + (1 if climate_insurance_paid_out_past_event IN ('yes_paid_in_full',
    'yes_paid_partially', 'no_claim_made_but_covered')) + (1 if
    climate_savings_for_shock IN ('yes_formal_savings', 'yes_informal_savings',
    'yes_both')) + (1 if climate_shock_credit_access IN ('yes_formal_source',
    'yes_informal_only')) + (1 if count-selected(climate_adaptive_practices_used)
    >= 2 AND NOT('none_no_specific_practice' IN climate_adaptive_practices_used))
    + (1 if climate_livelihood_diversification_intent IN ('yes_concrete_plan',
    'yes_interested_but_no_plan')) + (1 if climate_safety_net_access = 'yes').
    Threshold guidance (IPCC AR6 WGII Chapter 17 framing): 0–2 = low adaptive
    capacity (high vulnerability); 3–5 = moderate; 6–9 = high. This is a rapid
    in-form screening proxy, not a calibrated composite index. Derived, not asked.
  fr: >
    Entier dérivé 0–9 comptant les signaux positifs de capacité d'adaptation,
    calculable dans XLSForm à l'aide de champs de calcul pour un triage rapide
    sur le terrain. Utilise des pondérations égales (1 point par signal) ; la
    pondération spécifique au programme est une décision de configuration, pas
    une décision de schéma. Formule documentée dans la définition anglaise.
    Seuils : 0–2 = faible capacité d'adaptation ; 3–5 = modérée ; 6–9 = élevée.
    Dérivé, non demandé.
  es: >
    Entero derivado 0–9 que cuenta las señales positivas de capacidad de
    adaptación, calculable en XLSForm usando campos de cálculo para triaje
    rápido en campo. Usa pesos iguales (1 punto por señal); la ponderación
    específica del programa es una decisión de configuración, no del esquema.
    La fórmula está documentada en la definición en inglés. Umbrales: 0–2 =
    baja capacidad de adaptación; 3–5 = moderada; 6–9 = alta. Derivado, no
    preguntado.

type: integer
cardinality: single
core: false
vocabulary: null
references: null
category: scores
sensitivity: standard
