id: oop_expenditure_consultations
maturity: draft
label:
  en: "Out-of-pocket expenditure on consultations (12 months)"
  fr: "Dépenses à la charge du ménage pour les consultations (12 mois)"
  es: "Gasto de bolsillo en consultas (12 meses)"

definition:
  en: "Portion of out-of-pocket health expenditure spent on provider consultations and visit fees over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo` following the WHO health-accounts functional categories. Helps distinguish access-to-provider barriers from medicines or hospital barriers."
  fr: "Part des dépenses de santé à la charge du ménage consacrée aux consultations et aux frais de visite chez les prestataires au cours des 12 derniers mois, en monnaie locale. Composante désagrégée de `oop_health_expenditure_12mo` selon les catégories fonctionnelles des comptes de la santé de l'OMS. Permet de distinguer les obstacles d'accès aux prestataires de ceux liés aux médicaments ou à l'hospitalisation."
  es: "Parte del gasto de bolsillo en salud dedicada a consultas y honorarios de visita al proveedor en los últimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo` siguiendo las categorías funcionales de cuentas de salud de la OMS. Permite distinguir las barreras de acceso al proveedor de las relacionadas con medicamentos o atención hospitalaria."

type: decimal
cardinality: single
core: false
vocabulary: null
references: null
category: health_access_oop
sensitivity: sensitive
