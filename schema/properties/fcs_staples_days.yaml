id: fcs_staples_days
maturity: draft
label:
  en: "FCS staples days"
  fr: "SCA jours céréales de base"
  es: "PCA días alimentos básicos"

definition:
  en: "Number of days in the past seven during which any member of the household consumed staple cereals, roots, and tubers. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé des céréales de base, des racines ou des tubercules. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió cereales básicos, raíces y tubérculos. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
