id: eore_received
maturity: draft
label:
  en: "EORE received (household)"
  fr: "EORE reçue (ménage)"
  es: "EORE recibida (hogar)"

definition:
  en: "Whether any household member has received information, training, or education about how to stay safe around explosive hazards (Explosive Ordnance Risk Education — EORE). Recall period is programme choice: ever (lifetime) or past 12 months. The binary received / not received is the minimum indicator; programme evaluations may add more detailed questions (source, content retained, behavioural adoption). The binary is adequate for MSNA / HNO use. A negative result in areas of known contamination indicates a programme gap requiring priority outreach. Based on IMAS EORE Guidance (2022); UNMAS EORE household indicators; GICHD EORE impact assessment framework."
  fr: "Si un membre du ménage a reçu des informations, une formation ou un enseignement sur la manière de rester en sécurité face aux risques explosifs (Éducation à la réduction des risques liés aux engins explosifs — EORE). La période de rappel est un choix de programme : jamais (durée de vie) ou 12 derniers mois. Le binaire reçu / non reçu est l'indicateur minimum ; les évaluations de programme peuvent ajouter des questions plus détaillées (source, contenu retenu, adoption comportementale). Le binaire est adéquat pour une utilisation MSNA / HNO. Un résultat négatif dans les zones de contamination connue indique un déficit de programme nécessitant une priorité de sensibilisation. Fondé sur les Directives EORE IMAS (2022) ; indicateurs ménage EORE UNMAS ; Cadre d'évaluation de l'impact EORE GICHD."
  es: "Si algún miembro del hogar ha recibido información, capacitación o educación sobre cómo mantenerse seguro frente a peligros explosivos (Educación para la Reducción del Riesgo de Artefactos Explosivos — EORE). El período de recordatorio es elección del programa: alguna vez (de por vida) o últimos 12 meses. El binario recibida / no recibida es el indicador mínimo; las evaluaciones de programa pueden agregar preguntas más detalladas (fuente, contenido retenido, adopción conductual). El binario es adecuado para uso MSNA / HNO. Un resultado negativo en áreas de contaminación conocida indica una brecha programática que requiere atención prioritaria. Basado en la Guía EORE IMAS (2022); indicadores de hogar EORE del UNMAS; Marco de evaluación del impacto EORE del GICHD."

