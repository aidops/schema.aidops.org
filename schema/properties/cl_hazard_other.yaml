id: cl_hazard_other
maturity: draft
label:
  en: "Other unsafe condition at work"
  fr: "Autre condition non sécuritaire au travail"
  es: "Otra condición insegura en el trabajo"
definition:
  en: "Whether the child was exposed to other things, processes, or conditions bad for health or safety during economic activity in the past 7 days. MICS 6 CL6 X. Asked only if any of the CL1 economic-activity items is yes. Catch-all hazard type. A yes flags hazardous work under the ILO/UNICEF 2020 child-labour definition."
  fr: "Si l'enfant a été exposé à d'autres choses, processus ou conditions mauvais pour la santé ou la sécurité pendant son activité économique au cours des 7 derniers jours. MICS 6 CL6 X. Posé uniquement si l'un des items CL1 d'activité économique est oui. Type de danger résiduel. Un oui signale un travail dangereux selon la définition OIT/UNICEF 2020 du travail des enfants."
  es: "Si el niño estuvo expuesto a otras cosas, procesos o condiciones malos para la salud o seguridad durante actividad económica en los últimos 7 días. MICS 6 CL6 X. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Tipo de peligro residual. Un sí señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
