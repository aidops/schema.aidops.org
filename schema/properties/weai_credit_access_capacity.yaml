label:
  en: "WEAI credit — perceived capacity to access credit"
  fr: "WEAI crédit — capacité perçue d'accès au crédit"
  es: "WEAI crédito — capacidad percibida para acceder a crédito"

definition:
  en: "To what extent the respondent could get credit if they needed it. Part of pro-WEAI Indicator B3 Condition B: adequacy requires medium_extent or high_extent (codes 3 or 4)."
  fr: "Dans quelle mesure le répondant pourrait-il obtenir un crédit s'il en avait besoin. Fait partie de la condition B de l'indicateur B3 du pro-WEAI : l'adéquation nécessite medium_extent ou high_extent (codes 3 ou 4)."
  es: "En qué medida el encuestado podría obtener crédito si lo necesitara. Parte de la Condición B del Indicador B3 del pro-WEAI: la adecuación requiere medium_extent o high_extent (códigos 3 o 4)."

