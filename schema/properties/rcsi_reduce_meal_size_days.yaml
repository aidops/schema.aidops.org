id: rcsi_reduce_meal_size_days
maturity: draft
label:
  en: "rCSI reduce portion days"
  fr: "Jours rCSI portions réduites"
  es: "rCSI días porciones reducidas"

definition:
  en: "Number of days in the past seven during which the household limited portion sizes at mealtimes. Part of the WFP/CARE Reduced Coping Strategies Index (rCSI)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels le ménage a réduit la taille des portions lors des repas. Fait partie de l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE."
  es: "Número de días en los últimos siete en que el hogar redujo el tamaño de las porciones en las comidas. Forma parte del Índice de Estrategias de Afrontamiento Reducido (rCSI) del PMA/CARE."

type: integer
cardinality: single
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_rcsi, wfp_cari]
