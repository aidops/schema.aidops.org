id: diarrhea_ors_given
maturity: draft
label:
  en: "ORS given for diarrhea"
  fr: "SRO administrés pour la diarrhée"
  es: "SRO administrados para la diarrea"

definition:
  en: "Whether the child was given oral rehydration salts (ORS) from a sachet or pre-packaged solution to treat the diarrhea. Published wording: 'Was (name) given oral rehydration salts — ORS — from a sachet or packet to treat the diarrhea?' Key WHO/UNICEF joint indicator for appropriate diarrhea management (ORS + zinc). Ask only if diarrhea_last_2wks is not false. DHS code h13; MICS code CD5."
  fr: "Si l'enfant a reçu des sels de réhydratation orale (SRO) issus d'un sachet ou d'une solution préemballée pour traiter la diarrhée. Formulation publiée : « (Prénom) a-t-il/elle reçu des sels de réhydratation orale — SRO — issus d'un sachet ou d'un paquet pour traiter la diarrhée ? » Indicateur conjoint clé OMS/UNICEF pour la prise en charge appropriée de la diarrhée (SRO + zinc). Posez uniquement si diarrhea_last_2wks est vrai. Code DHS h13 ; code MICS CD5."
  es: "Si al niño se le administraron sales de rehidratación oral (SRO) de un sobre o solución preenvasada para tratar la diarrea. Redacción publicada: '¿Se le administraron a (nombre) sales de rehidratación oral — SRO — de un sobre o paquete para tratar la diarrea?' Indicador conjunto clave OMS/UNICEF para el manejo apropiado de la diarrea (SRO + zinc). Preguntar solo si diarrhea_last_2wks es verdadero. Código DHS h13; código MICS CD5."

type: boolean
cardinality: single
