definition:
  en: "The main obstacles preventing the household from returning to its place of origin or achieving a durable solution. Multi-select. Applies when return_intention is no_intention_to_return or undecided, or as a standalone barriers item in durable solutions assessments."
  fr: "Les principaux obstacles empêchant le ménage de retourner dans son lieu d'origine ou d'atteindre une solution durable. Sélection multiple. S'applique lorsque return_intention est no_intention_to_return ou undecided, ou comme élément autonome dans les évaluations de solutions durables."
  es: "Los principales obstáculos que impiden al hogar retornar a su lugar de origen o alcanzar una solución duradera. Selección múltiple. Aplica cuando return_intention es no_intention_to_return o undecided, o como ítem independiente en evaluaciones de soluciones duraderas."

