id: total_live_births
maturity: draft
label:
  en: Total children ever born alive
  fr: "Total d'enfants nés vivants"
  es: Total de hijos nacidos vivos
definition:
  en: "The total number of children the woman has ever given birth to who were born alive, regardless of whether they are still living. DHS-8 v201; MICS6 CM2. Screener: if 0 (and no recent stillbirth), the MaternalNewbornHealthProfile is not applicable."
  fr: "Le nombre total d'enfants que la femme a mis au monde nés vivants, qu'ils soient encore en vie ou non. DHS-8 v201 ; MICS6 CM2. Filtre : si 0 (et pas de mortinaissance récente), le MaternalNewbornHealthProfile n'est pas applicable."
  es: "El número total de hijos que la mujer ha dado a luz y que nacieron vivos, independientemente de si aún viven. DHS-8 v201; MICS6 CM2. Filtro: si 0 (y no hay mortinato reciente), el MaternalNewbornHealthProfile no es aplicable."
