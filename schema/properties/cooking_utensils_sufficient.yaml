id: cooking_utensils_sufficient
maturity: draft
label:
  en: "Cooking and eating utensils are sufficient"
  fr: "Ustensiles de cuisine et de repas suffisants"
  es: "Utensilios de cocina y de comer suficientes"

definition:
  en: "Household self-report of whether it currently has enough cooking and eating utensils for all members. Self-report proxy complementing the objective count items under Sphere Standard 2. Discordance between this item and the computed sphere_cooking_pass derived score indicates under- or over-reporting of need."
  fr: "Auto-déclaration du ménage sur le fait de disposer actuellement d'ustensiles de cuisine et de repas suffisants pour tous les membres. Indicateur auto-déclaré complémentant les items objectifs de dénombrement de la Norme Sphère 2. Une discordance entre cet item et le score dérivé sphere_cooking_pass indique une sous- ou sur-déclaration des besoins."
  es: "Auto-reporte del hogar sobre si tiene actualmente utensilios de cocina y de comer suficientes para todos los miembros. Indicador auto-reportado que complementa los ítems objetivos de conteo de la Norma Esfera 2. Una discordancia entre este ítem y el puntaje derivado sphere_cooking_pass indica subreporte o sobrerreporte de necesidades."

type: string
cardinality: single
