label:
  en: "GAD-7 item 7: feeling afraid something awful might happen"
  fr: "GAD-7 item 7 : peur que quelque chose de terrible arrive"
  es: "GAD-7 ítem 7: sentir miedo de que algo terrible vaya a suceder"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by feeling afraid, as if something awful might happen. GAD-7 item 7, measuring apprehensive expectation. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un sentiment de peur, comme si quelque chose de terrible pouvait arriver. GAD-7 item 7, mesurant l'anticipation anxieuse. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por sentir miedo, como si algo terrible fuera a suceder. Ítem 7 del GAD-7, que mide la expectativa aprensiva. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

