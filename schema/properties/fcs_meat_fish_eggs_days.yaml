id: fcs_meat_fish_eggs_days
maturity: draft
label:
  en: "FCS meat, fish and eggs days"
  fr: "SCA jours viande, poisson et œufs"
  es: "PCA días carne, pescado y huevos"

definition:
  en: "Number of days in the past seven during which any member of the household consumed meat, fish, or eggs (beef, goat, poultry, pork, bushmeat, fresh or dried fish and seafood, eggs of any kind). Part of the WFP Food Consumption Score (FCS); the standard FCS questionnaire asks this as a single combined protein question."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé de la viande, du poisson ou des œufs (bœuf, chèvre, volaille, porc, viande de brousse, poisson et fruits de mer frais ou séchés, œufs de toute sorte). Fait partie du Score de consommation alimentaire (FCS) du PAM ; le questionnaire FCS standard pose cette question comme une seule question protéique combinée."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió carne, pescado o huevos (res, cabra, aves, cerdo, carne de monte, pescado y mariscos frescos o secos, huevos de cualquier tipo). Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA; el cuestionario FCS estándar formula esta pregunta como una única pregunta combinada de proteínas."

type: integer
cardinality: single
core: true
