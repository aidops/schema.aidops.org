id: fp_sexually_active_last_4_weeks
maturity: draft
label:
  en: "Sexually active in the last 4 weeks"
  fr: "Sexuellement active au cours des 4 dernières semaines"
  es: "Sexualmente activa en las últimas 4 semanas"

definition:
  en: "Whether the woman has had sexual intercourse in the last 4 weeks (DHS unmet need algorithm, V525 proxy). Ask all non-pregnant, non-using women 15–49. Skip if currently pregnant (handled by pregnancy_status). Denominator filter for unmet need among unmarried women. DHS uses 30-day activity. Enumerators must use local culturally appropriate terms."
  fr: "Si la femme a eu des rapports sexuels au cours des 4 dernières semaines (algorithme DHS de besoin non satisfait, proxy V525). Demander à toutes les femmes non enceintes et non utilisatrices de 15 à 49 ans. Ignorer si actuellement enceinte (géré par pregnancy_status). Filtre de dénominateur pour le besoin non satisfait chez les femmes non mariées. Le DHS utilise l'activité sur 30 jours. Les enquêteurs doivent utiliser des termes locaux culturellement appropriés."
  es: "Si la mujer ha tenido relaciones sexuales en las últimas 4 semanas (algoritmo de necesidad insatisfecha DHS, proxy V525). Preguntar a todas las mujeres no embarazadas y que no usan métodos de 15–49 años. Omitir si está actualmente embarazada (manejado por pregnancy_status). Filtro denominador para la necesidad insatisfecha entre mujeres solteras. El DHS usa actividad de 30 días. Los encuestadores deben usar términos culturalmente apropiados locales."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: unmet_need
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [dhs_women]
