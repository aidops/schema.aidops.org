id: weai_se_overcome_challenges
maturity: draft
label:
  en: "WEAI self-efficacy — overcome difficult tasks"
  fr: "WEAI auto-efficacité — surmonter les tâches difficiles"
  es: "WEAI autoeficacia — superar tareas difíciles"

definition:
  en: "NGSE item 2: 'When facing difficult tasks, I am certain that I will accomplish them.' One of eight items in the New General Self-Efficacy Scale (NGSE) used in pro-WEAI Indicator A2. Scored 1 (strongly disagree) to 5 (strongly agree). Adequacy for A2 requires sum of all eight NGSE items ≥ 32."
  fr: "Item NGSE 2 : 'Face aux tâches difficiles, je suis certain(e) que je les accomplirai.' L'un des huit items de la Nouvelle échelle générale d'auto-efficacité (NGSE) utilisée dans l'indicateur A2 du pro-WEAI. Noté de 1 (fortement en désaccord) à 5 (fortement d'accord). L'adéquation pour A2 nécessite que la somme des huit items NGSE soit ≥ 32."
  es: "Ítem NGSE 2: 'Cuando me enfrento a tareas difíciles, estoy seguro/a de que las lograré.' Uno de los ocho ítems de la Nueva Escala General de Autoeficacia (NGSE) utilizada en el indicador A2 del pro-WEAI. Puntuado de 1 (muy en desacuerdo) a 5 (muy de acuerdo). La adecuación para A2 requiere que la suma de los ocho ítems NGSE sea ≥ 32."

type: string
cardinality: single
core: false
