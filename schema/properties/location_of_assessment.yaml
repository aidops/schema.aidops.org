id: location_of_assessment
maturity: draft
label:
  en: "Location of assessment"
  fr: "Lieu de l'évaluation"
  es: "Lugar de la evaluación"

definition:
  en: "The physical location where the post-shock assessment was carried out, typically the location of the assessed dwelling. Distinct from Household.location (which is the household's registered administrative or coordinate location): the two may differ if the household has displaced, relocated, or is temporarily sheltering elsewhere while the assessed structure remains at its registered site."
  fr: "Emplacement physique où l'évaluation post-choc a été effectuée, typiquement l'emplacement du logement évalué. Distinct de Household.location (emplacement administratif ou géographique enregistré du ménage) : les deux peuvent différer si le ménage s'est déplacé, a été relocalisé ou s'abrite temporairement ailleurs tandis que la structure évaluée demeure sur son site enregistré."
  es: "Ubicación física donde se realizó la evaluación post-choque, típicamente la ubicación de la vivienda evaluada. Distinta de Household.location (la ubicación administrativa o geográfica registrada del hogar): las dos pueden diferir si el hogar se ha desplazado, relocalizado o se refugia temporalmente en otro lugar mientras la estructura evaluada permanece en su sitio registrado."

type: concept:Location
cardinality: single
