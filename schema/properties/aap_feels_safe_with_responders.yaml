id: aap_feels_safe_with_responders
maturity: draft
label:
  en: "AAP: Feels safe in interactions with aid providers"
  fr: "Redevabilité : Se sent en sécurité dans les interactions avec les intervenants"
  es: "Rendición de cuentas: Se siente seguro en las interacciones con los actores humanitarios"

definition:
  en: "Household-reported perceived safety in interactions with aid providers. Maps to CHS 2024 Commitment 8 ('Interact with staff and volunteers that are respectful, competent, and well-managed') and to IASC CAAP 2017 protection dimension. PSEA-adjacent: elevated 'not safe' rates should trigger programmatic review of staff behaviour and PSEA framework. Source: IASC / REACH Menu 2018 staff-behaviour section and GTS HVI safety indicator."
  fr: "Sécurité perçue déclarée par le ménage lors des interactions avec les intervenants. Correspond à l'Engagement 8 de la CHS 2024 (« Interagir avec un personnel et des volontaires respectueux, compétents et bien encadrés ») et à la dimension protection de la CAAP IASC 2017. Lié à la PSEA : des taux élevés de « pas en sécurité » devraient déclencher une révision programmatique du comportement du personnel et du cadre PSEA. Source : Menu IASC / REACH 2018, section comportement du personnel, et indicateur de sécurité GTS HVI."
  es: "Seguridad percibida reportada por el hogar en las interacciones con los actores humanitarios. Corresponde al Compromiso 8 de la CHS 2024 («Interactuar con personal y voluntarios respetuosos, competentes y bien gestionados») y a la dimensión de protección de la CAAP IASC 2017. Relacionado con PSEA: tasas elevadas de «no seguro» deberían desencadenar una revisión programática del comportamiento del personal y del marco PSEA. Fuente: Menú IASC / REACH 2018, sección comportamiento del personal, e indicador de seguridad de GTS HVI."

type: string
cardinality: single
