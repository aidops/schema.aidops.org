id: gbv_safety_violence_preg_perpetrator
maturity: draft
label:
  en: "Safety signal: perpetrator of violence during pregnancy"
  fr: "Signal de sécurité : auteur de la violence pendant la grossesse"
  es: "Señal de seguridad: perpetrador de la violencia durante el embarazo"

definition:
  en: >
    Who perpetrated physical violence against the respondent during pregnancy. DHS instrument item
    DV21. Multi-select; record all perpetrators mentioned. Skip logic: asked only if
    gbv_safety_violence_during_pregnancy = true. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Qui a exercé des violences physiques contre la répondante pendant sa grossesse. Item DHS DV21.
    Sélection multiple; noter tous les auteurs mentionnés. Posée uniquement si
    gbv_safety_violence_during_pregnancy = vrai.
  es: >
    Quién ejerció violencia física contra la encuestada durante el embarazo. Ítem DHS DV21.
    Selección múltiple; registrar todos los perpetradores mencionados. Se pregunta solo si
    gbv_safety_violence_during_pregnancy = verdadero.

type: string
cardinality: multiple
