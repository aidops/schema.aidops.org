id: oop_expenditure_transport
maturity: draft
label:
  en: "Out-of-pocket expenditure on health-related transport (12 months)"
  fr: "Dépenses à la charge du ménage pour le transport lié à la santé (12 mois)"
  es: "Gasto de bolsillo en transporte relacionado con salud (12 meses)"

definition:
  en: "Portion of out-of-pocket health expenditure spent on transport to reach health care (ambulance, taxi, motorbike, fuel) over the last 12 months, in local currency. Disaggregated component of `oop_health_expenditure_12mo`. Transport cost is an often overlooked but documented access barrier, especially in rural and conflict-affected areas."
  fr: "Part des dépenses de santé à la charge du ménage consacrée au transport pour accéder aux soins (ambulance, taxi, moto, carburant) au cours des 12 derniers mois, en monnaie locale. Composante désagrégée de `oop_health_expenditure_12mo`. Le coût du transport est un obstacle d'accès souvent négligé mais documenté, en particulier dans les zones rurales et affectées par les conflits."
  es: "Parte del gasto de bolsillo en salud dedicada al transporte para acceder a la atención (ambulancia, taxi, moto, combustible) en los últimos 12 meses, en moneda local. Componente desagregado de `oop_health_expenditure_12mo`. El costo del transporte es una barrera de acceso a menudo pasada por alto pero documentada, especialmente en zonas rurales y afectadas por conflictos."

type: decimal
cardinality: single
core: false
vocabulary: null
references: null
category: health_access_oop
sensitivity: sensitive
