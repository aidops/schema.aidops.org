id: skilled_birth_attendance
maturity: draft
label:
  en: Skilled birth attendance (derived)
  fr: "Assistance qualifiée à l'accouchement (dérivé)"
  es: Asistencia calificada al parto (derivado)
definition:
  en: "Derived indicator: true if delivery_attendant_type is doctor, nurse_midwife, or auxiliary_midwife. SDG indicator 3.1.2 proxy (proportion of births attended by skilled health personnel). WHO and DHS-8 skilled provider definition: physician, nurse/midwife, and auxiliary midwife trained to manage normal deliveries. Interoperable with DHS-8 rh_del_pvskill."
  fr: "Indicateur dérivé : vrai si delivery_attendant_type est médecin, nurse_midwife ou auxiliary_midwife. Proxy de l'indicateur ODD 3.1.2 (proportion d'accouchements assistés par du personnel de santé qualifié). Définition OMS et DHS-8 de prestataire qualifié : médecin, infirmière/sage-femme et sage-femme auxiliaire formés pour gérer les accouchements normaux. Interopérable avec DHS-8 rh_del_pvskill."
  es: "Indicador derivado: verdadero si delivery_attendant_type es médico, nurse_midwife o auxiliary_midwife. Proxy del indicador ODS 3.1.2 (proporción de partos atendidos por personal de salud calificado). Definición de proveedor calificado de la OMS y DHS-8: médico, enfermera/partera y partera auxiliar capacitados para manejar partos normales. Interoperable con DHS-8 rh_del_pvskill."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: derived_mnh
age_applicability:
  - adult
sensitivity: sensitive
