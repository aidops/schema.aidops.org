id: rcsi_reduce_meal_number_days
maturity: draft
label:
  en: "rCSI reduce meals days"
  fr: "Jours rCSI repas réduits"
  es: "rCSI días comidas reducidas"

definition:
  en: "Number of days in the past seven during which the household reduced the number of meals eaten per day. Part of the WFP/CARE Reduced Coping Strategies Index (rCSI)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels le ménage a réduit le nombre de repas pris par jour. Fait partie de l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE."
  es: "Número de días en los últimos siete en que el hogar redujo el número de comidas por día. Forma parte del Índice de Estrategias de Afrontamiento Reducido (rCSI) del PMA/CARE."

type: integer
cardinality: single
