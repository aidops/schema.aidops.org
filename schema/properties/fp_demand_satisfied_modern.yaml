id: fp_demand_satisfied_modern
maturity: draft
label:
  en: "Demand for family planning satisfied with modern methods (derived)"
  fr: "Demande de planification familiale satisfaite par des méthodes modernes (dérivée)"
  es: "Demanda de planificación familiar satisfecha con métodos modernos (derivada)"

definition:
  en: "Derived indicator: SDG 3.7.1. True if the woman is using a modern contraceptive method (fp_method_is_modern = true). Numerator: women using modern methods. Denominator: all women with a need for family planning (fp_unmet_need in: met_need_spacing, met_need_limiting, unmet_need_spacing, unmet_need_limiting, spacing_failure, limiting_failure). Women in wants_birth_within_2_years, infecund, not_sexually_active, never_had_sex are excluded from the denominator."
  fr: "Indicateur dérivé : ODD 3.7.1. Vrai si la femme utilise une méthode contraceptive moderne (fp_method_is_modern = vrai). Numérateur : femmes utilisant des méthodes modernes. Dénominateur : toutes les femmes ayant un besoin en planification familiale (fp_unmet_need parmi : met_need_spacing, met_need_limiting, unmet_need_spacing, unmet_need_limiting, spacing_failure, limiting_failure). Les femmes dans wants_birth_within_2_years, infecund, not_sexually_active, never_had_sex sont exclues du dénominateur."
  es: "Indicador derivado: ODS 3.7.1. Verdadero si la mujer usa un método anticonceptivo moderno (fp_method_is_modern = verdadero). Numerador: mujeres que usan métodos modernos. Denominador: todas las mujeres con necesidad de planificación familiar (fp_unmet_need en: met_need_spacing, met_need_limiting, unmet_need_spacing, unmet_need_limiting, spacing_failure, limiting_failure). Las mujeres en wants_birth_within_2_years, infecund, not_sexually_active, never_had_sex se excluyen del denominador."

type: string
cardinality: single
core: true
# Allowed values: yes / no / not_in_need
vocabulary: null
references: null
category: unmet_need
sensitivity: sensitive
age_applicability:
  - adult
