id: phq9_8
maturity: draft
label:
  en: "PHQ-9 item 8: psychomotor change"
  fr: "PHQ-9 item 8 : changement psychomoteur"
  es: "PHQ-9 ítem 8: cambio psicomotor"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by moving or speaking so slowly that other people could have noticed, or conversely by being so fidgety or restless that they have been moving around a lot more than usual. PHQ-9 item 8, measuring psychomotor retardation or agitation. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par le fait de bouger ou de parler si lentement que d'autres personnes auraient pu le remarquer, ou à l'inverse par une agitation ou un besoin de bouger plus que d'habitude. PHQ-9 item 8, mesurant le ralentissement ou l'agitation psychomotrice. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por moverse o hablar tan lentamente que otras personas hayan podido notarlo, o al contrario por estar tan inquieta que se ha movido mucho más de lo habitual. Ítem 8 del PHQ-9, que mide el retardo o la agitación psicomotora. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

