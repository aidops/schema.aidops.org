id: has_functional_stove
maturity: draft
label:
  en: "Household has a functional cooking stove"
  fr: "Le ménage dispose d'un foyer de cuisson fonctionnel"
  es: "El hogar tiene una cocina funcional"

definition:
  en: "Whether the household currently has a functional cooking stove or fire arrangement that it can use to prepare meals. Sphere Standard 3 guidance on availability and options for cooking facilities. This item is orthogonal to stove type (covered by EnergyAccessProfile stove_type): it establishes equipment availability, not technology category."
  fr: "Si le ménage dispose actuellement d'un foyer de cuisson fonctionnel ou d'un arrangement de feu utilisable pour préparer les repas. Orientation de la Norme Sphère 3 sur la disponibilité et les options des installations de cuisson. Cet item est orthogonal au type de foyer (couvert par EnergyAccessProfile stove_type) : il établit la disponibilité de l'équipement, pas la catégorie technologique."
  es: "Si el hogar tiene actualmente una cocina o arreglo de fuego funcional que pueda usar para preparar comidas. Orientación de la Norma Esfera 3 sobre disponibilidad y opciones de instalaciones de cocción. Este ítem es ortogonal al tipo de cocina (cubierto por EnergyAccessProfile stove_type): establece la disponibilidad del equipo, no la categoría tecnológica."

type: boolean
cardinality: single
vocabulary: null
references: null
category: nfi
core: true
sensitivity: standard
