id: access_to_credit
maturity: draft
label:
  en: "Household access to credit"
  fr: "Accès du ménage au crédit"
  es: "Acceso del hogar al crédito"

definition:
  en: "Whether the household has practical access to borrow money or goods on credit, and through what type of source. Captures credit availability as a coping and investment channel, not current debt level. Drawn from the LSMS-ISA credit module, the FAO RIMA-II Access to Basic Services (ABS) pillar, the CGAP financial inclusion core indicators, and the Sphere 2018 Livelihoods chapter on financial services. Distinct from `has_savings` (financial buffer stock) and from shock-driven borrowing in `shock_coping_strategy_used`."
  fr: "Si le ménage a un accès pratique pour emprunter de l'argent ou des biens à crédit, et par quel type de source. Capture la disponibilité du crédit comme canal d'adaptation et d'investissement, et non le niveau d'endettement actuel. Tiré du module crédit LSMS-ISA, du pilier Accès aux services de base (ABS) de FAO RIMA-II, des indicateurs de base d'inclusion financière du CGAP et du chapitre Moyens de subsistance de Sphère 2018 sur les services financiers. Distinct de `has_savings` (stock tampon financier) et des emprunts liés aux chocs dans `shock_coping_strategy_used`."
  es: "Si el hogar tiene acceso práctico para pedir prestado dinero o bienes a crédito, y a través de qué tipo de fuente. Captura la disponibilidad de crédito como canal de afrontamiento e inversión, no el nivel de deuda actual. Tomado del módulo de crédito LSMS-ISA, el pilar Acceso a Servicios Básicos (ABS) de FAO RIMA-II, los indicadores básicos de inclusión financiera del CGAP y el capítulo de Medios de Vida de Esfera 2018 sobre servicios financieros. Distinto de `has_savings` (reserva de amortiguación financiera) y del endeudamiento por choque en `shock_coping_strategy_used`."

type: string
cardinality: single
