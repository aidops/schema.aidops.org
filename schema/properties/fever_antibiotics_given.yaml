id: fever_antibiotics_given
maturity: draft
label:
  en: "Antibiotics given for fever"
  fr: "Antibiotiques administrés pour la fièvre"
  es: "Antibióticos administrados para la fiebre"

definition:
  en: "Whether the child was given antibiotics for the fever or illness episode (separately from any antibiotic given for ARI). Published wording: 'Was (name) given antibiotics for the fever or illness?' Relevant in non-malaria febrile illness; potential indicator of antibiotic overuse. Ask only if fever_last_2wks is true. DHS code h25."
  fr: "Si l'enfant a reçu des antibiotiques pour l'épisode de fièvre ou de maladie (indépendamment de tout antibiotique administré pour l'IRA). Formulation publiée : « (Prénom) a-t-il/elle reçu des antibiotiques pour la fièvre ou la maladie ? » Pertinent dans les maladies fébriles non palustres ; indicateur potentiel du mésusage des antibiotiques. Posez uniquement si fever_last_2wks est vrai. Code DHS h25."
  es: "Si al niño se le administraron antibióticos para el episodio de fiebre o enfermedad (por separado de cualquier antibiótico administrado para la IRA). Redacción publicada: '¿Se le administraron a (nombre) antibióticos para la fiebre o la enfermedad?' Relevante en enfermedades febriles no palúdicas; indicador potencial del uso excesivo de antibióticos. Preguntar solo si fever_last_2wks es verdadero. Código DHS h25."

type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: fever
sensitivity: sensitive
