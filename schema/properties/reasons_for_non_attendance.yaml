id: reasons_for_non_attendance
maturity: draft
label:
  en: All reasons for non-attendance
  fr: "Toutes les raisons de non-fréquentation"
  es: "Todas las razones de no asistencia"
definition:
  en: "All barriers contributing to the child not attending school in the current school year. Multi-select extension of non_attendance_reason. Captures compound barriers common in crisis contexts per IRC and REACH education assessment practice. Ask if attended_current_year is No or ever_attended_school is No. This property uses the same reason-for-non-attendance vocabulary as non_attendance_reason."
  fr: "Tous les obstacles contribuant à la non-fréquentation scolaire de l'enfant pendant l'année scolaire en cours. Extension multi-sélection de non_attendance_reason. Capture les obstacles composites courants dans les contextes de crise selon la pratique d'évaluation éducative de l'IRC et de REACH. À poser si attended_current_year est Non ou ever_attended_school est Non. Cette propriété utilise le même vocabulaire reason-for-non-attendance que non_attendance_reason."
  es: "Todas las barreras que contribuyen a que el niño no asista a la escuela en el año escolar actual. Extensión de selección múltiple de non_attendance_reason. Captura las barreras compuestas comunes en contextos de crisis según la práctica de evaluación educativa de IRC y REACH. Preguntar si attended_current_year es No o ever_attended_school es No. Esta propiedad usa el mismo vocabulario reason-for-non-attendance que non_attendance_reason."
type: string
cardinality: multiple
core: false
vocabulary: reason-for-non-attendance
references: null
category: education
age_applicability:
  - child_5_17
