id: iycf_milk_feed_count
maturity: draft
label:
  en: "Number of milk feeds yesterday (non-breastfed)"
  fr: "Nombre de repas lactés hier (enfants non allaités)"
  es: "Número de tomas de leche ayer (no amamantados)"

definition:
  en: "The number of times the child received infant formula, animal milk, or other milk drinks (not breast milk) yesterday during the day or at night (24-hour recall). Published wording (WHO/UNICEF 2021): 'How many times yesterday did (NAME) receive infant formula, animal milk, or other milk drinks (not breast milk)?' Ask for non-breastfed children 6–23 months. Used to compute the Minimum Milk Feeding Frequency (MMFF) indicator (threshold: at least 2 milk feeds)."
  fr: "Le nombre de fois que l'enfant a reçu du lait maternisé, du lait animal ou d'autres boissons lactées (hors lait maternel) hier dans la journée ou la nuit (rappel sur 24 heures). À poser pour les enfants non allaités de 6 à 23 mois. Utilisé pour calculer l'indicateur MMFF (seuil : au moins 2 repas lactés)."
  es: "El número de veces que el niño recibió fórmula infantil, leche animal u otras bebidas lácteas (no leche materna) ayer durante el día o la noche (recordatorio de 24 horas). Preguntar para niños no amamantados de 6–23 meses. Utilizado para calcular el indicador MMFF (umbral: al menos 2 tomas de leche)."

type: integer
cardinality: single
core: true
vocabulary: null
references: null
category: nutrition
age_applicability:
  - infant_0_1
valid_instruments: [who_iycf_2021]
