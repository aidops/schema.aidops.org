label:
  en: "WEAI credit — participated in decision to obtain credit"
  fr: "WEAI crédit — participé à la décision d'obtenir un crédit"
  es: "WEAI crédito — participó en decisión de obtener crédito"

definition:
  en: "Whether and how the respondent participated in the decision to obtain household credit or a loan. Asked only when weai_credit_used is true. Part of pro-WEAI Indicator B3 Condition A: adequacy requires yes_solely or yes_jointly."
  fr: "Si et comment le répondant a participé à la décision d'obtenir un crédit ou un prêt pour le ménage. Posée uniquement lorsque weai_credit_used est vrai. Fait partie de la condition A de l'indicateur B3 du pro-WEAI : l'adéquation nécessite yes_solely ou yes_jointly."
  es: "Si y cómo el encuestado participó en la decisión de obtener crédito o préstamo para el hogar. Se pregunta solo cuando weai_credit_used es verdadero. Parte de la Condición A del Indicador B3 del pro-WEAI: la adecuación requiere yes_solely o yes_jointly."

