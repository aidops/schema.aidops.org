id: phq9_6
maturity: draft
label:
  en: "PHQ-9 item 6: worthlessness or guilt"
  fr: "PHQ-9 item 6 : sentiment de dévalorisation ou culpabilité"
  es: "PHQ-9 ítem 6: sensación de inutilidad o culpa"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by feeling bad about themselves, or feeling that they are a failure or have let themselves or their family down. PHQ-9 item 6, measuring worthlessness or guilt. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par un sentiment de mal-être par rapport à elle·lui-même, ou l'impression d'être un échec ou d'avoir déçu sa famille. PHQ-9 item 6, mesurant la dévalorisation ou la culpabilité. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por sentirse mal con sí misma, por la sensación de ser un fracaso o de haber decepcionado a su familia. Ítem 6 del PHQ-9, que mide la sensación de inutilidad o culpa. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

