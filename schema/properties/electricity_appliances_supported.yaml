id: electricity_appliances_supported
maturity: draft
label:
  en: "Appliances supported by electricity source"
  fr: "Appareils alimentés par la source d'électricité"
  es: "Electrodomésticos admitidos por la fuente de electricidad"

definition:
  en: "The highest tier of appliances the household can power simultaneously from its main electricity source. Used as a proxy for the MTF electricity capacity attribute when direct wattage measurement (electricity_capacity_watts) is not collected. The ESMAP published appliance-tier crosswalk assigns approximate capacity tiers based on the appliance mix the household reports being able to power at the same time. Source: MTF household survey (appliance proxy for capacity tier)."
  fr: "Le niveau le plus élevé d'appareils que le ménage peut alimenter simultanément depuis sa principale source d'électricité. Utilisé comme indicateur de remplacement de l'attribut de capacité MTF lorsque la mesure directe en watts (electricity_capacity_watts) n'est pas recueillie. Le tableau de correspondance des niveaux d'appareils publié par l'ESMAP attribue des niveaux de capacité approximatifs en fonction du panel d'appareils que le ménage déclare pouvoir alimenter simultanément. Source : enquête ménage MTF (procuration par les appareils pour le niveau de capacité)."
  es: "El nivel más alto de electrodomésticos que el hogar puede alimentar simultáneamente desde su fuente principal de electricidad. Se usa como indicador sustituto del atributo de capacidad MTF cuando no se recopila la medición directa en vatios (electricity_capacity_watts). La tabla de correspondencia de niveles de electrodomésticos publicada por ESMAP asigna niveles de capacidad aproximados basados en la combinación de electrodomésticos que el hogar reporta poder alimentar al mismo tiempo. Fuente: encuesta de hogares MTF (proxy de electrodomésticos para el nivel de capacidad)."

type: string
cardinality: single
core: false
