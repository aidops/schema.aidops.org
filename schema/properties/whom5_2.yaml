label:
  en: "WHO-5 item 2: calm and relaxed"
  fr: "WHO-5 item 2 : calme et détendu"
  es: "WHO-5 ítem 2: tranquilo y relajado"

definition:
  en: "Frequency with which the respondent has felt calm and relaxed over the last two weeks. Item 2 of the WHO-5 Well-Being Index. Higher response values indicate better well-being (0 = at no time, 5 = all of the time)."
  fr: "Fréquence à laquelle la répondant·e s'est senti·e calme et détendu·e au cours des deux dernières semaines. Item 2 de l'Indice de bien-être WHO-5. Des valeurs de réponse plus élevées indiquent un meilleur bien-être (0 = à aucun moment, 5 = tout le temps)."
  es: "Frecuencia con la que la persona encuestada se ha sentido tranquila y relajada durante las últimas dos semanas. Ítem 2 del Índice de Bienestar WHO-5. Valores de respuesta más altos indican mejor bienestar (0 = en ningún momento, 5 = todo el tiempo)."

