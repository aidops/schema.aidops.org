id: sphere_tools_pass
maturity: draft
label:
  en: "Sphere Standard 4 (tools and equipment) pass"
  fr: "Norme Sphère 4 (outils et équipement) satisfaite"
  es: "Norma Esfera 4 (herramientas y equipo) cumplida"

definition:
  en: "Whether the household meets the Sphere Standard 4 (tools and equipment) minimum threshold. Derived as: shelter_repair_tool_kit_present = yes_full_kit AND water_jerrycan_count >= 1. Objective-threshold enumerator-observation score, distinct from the self-report tools_equipment_sufficient item."
  fr: "Si le ménage satisfait au seuil minimal de la Norme Sphère 4 (outils et équipement). Dérivé comme : shelter_repair_tool_kit_present = yes_full_kit ET water_jerrycan_count >= 1. Score d'observation de l'enquêteur au seuil objectif, distinct de l'item auto-déclaré tools_equipment_sufficient."
  es: "Si el hogar cumple con el umbral mínimo de la Norma Esfera 4 (herramientas y equipo). Derivado como: shelter_repair_tool_kit_present = yes_full_kit Y water_jerrycan_count >= 1. Puntaje de observación del encuestador al umbral objetivo, distinto del ítem auto-reportado tools_equipment_sufficient."

type: boolean
cardinality: single
vocabulary: null
references: null
category: scores
core: false
sensitivity: standard
