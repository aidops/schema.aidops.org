id: malaria_test_result
maturity: draft
label:
  en: "Malaria test result"
  fr: "Résultat du test de paludisme"
  es: "Resultado de la prueba de malaria"

definition:
  en: "The result of the malaria test performed during the fever episode. Ask only if malaria_test_done is not 'no'. A positive RDT result indicates confirmed malaria and shifts treatment from presumptive to test-based. MICS code ML2b."
  fr: "Le résultat du test de paludisme effectué lors de l'épisode de fièvre. Posez uniquement si malaria_test_done n'est pas 'no'. Un résultat TDR positif indique un paludisme confirmé et fait passer le traitement du présomptif au traitement basé sur le test. Code MICS ML2b."
  es: "El resultado de la prueba de malaria realizada durante el episodio febril. Preguntar solo si malaria_test_done no es 'no'. Un resultado PDR positivo indica malaria confirmada y cambia el tratamiento de presuntivo a basado en prueba. Código MICS ML2b."

type: string
cardinality: single
core: false
