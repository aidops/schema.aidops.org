id: terms_of_trade_goat_cereal
maturity: draft
label:
  en: "Livestock-to-cereal terms of trade — kg of staple cereal per goat, last 30 days"
  fr: "Termes de l'échange bétail/céréales — kg de céréale de base par chèvre, 30 derniers jours"
  es: "Términos de intercambio ganadería/cereales — kg de cereal básico por cabra, últimos 30 días"

definition:
  en: "Approximate kilograms of the local staple cereal (sorghum, maize, or millet, as contextually appropriate) that the household could obtain for one goat at the local market in the last 30 days. Decimal value. The goat-to-cereal ratio is the canonical FEWSNET and HEA pastoral market-access indicator used across both the Sahel and the Horn of Africa because goats are the most liquid livestock asset in most pastoral zones. In camel-dominant zones (northeast Somalia, Puntland, Somaliland, northern Kenya Turkana and Marsabit), the camel-to-cereal ratio is the FEWSNET standard; form authors in these contexts should note this item and consider an additional companion item. The baseline ratio (same season prior year or five-year average from FEWSNET Livelihood Zone Profiles) is held in programme metadata, not collected on this profile. The derived indicator (ratio of current to baseline) is computed at analysis time per Section 5.3 of the research instrument. FEWSNET IPC classification thresholds: >= 1.0 favorable or neutral; 0.75–0.99 below normal (early stress); 0.50–0.74 significantly below normal (crisis); < 0.50 severely below normal (IPC Phase 3+ pastoral signal). Grounded in FEWSNET Livelihood Monitoring Framework (canonical pastoral ToT metric), FSNAU market monitoring, IPC AFI pastoral annex Section 4.4, HEA exchange ratio module, and AGIR Sahel resilience framework market indicators. Recall: last 30 days."
  fr: "Kilogrammes approximatifs de la céréale de base locale (sorgho, maïs ou mil, selon le contexte) que le ménage pourrait obtenir pour une chèvre sur le marché local au cours des 30 derniers jours. Valeur décimale. Le ratio chèvre/céréale est l'indicateur canonique FEWSNET et HEA d'accès au marché pastoral utilisé dans le Sahel et la Corne de l'Afrique. La valeur de référence (même saison l'année précédente ou moyenne sur cinq ans des Profils de Zone de Moyens d'Existence FEWSNET) est conservée dans les métadonnées du programme. L'indicateur dérivé (ratio actuel/référence) est calculé lors de l'analyse. Rappel : 30 derniers jours."
  es: "Kilogramos aproximados del cereal básico local (sorgo, maíz o mijo, según corresponda al contexto) que el hogar podría obtener por una cabra en el mercado local en los últimos 30 días. Valor decimal. La razón cabra/cereal es el indicador canónico de acceso al mercado pastoral de FEWSNET y HEA utilizado tanto en el Sahel como en el Cuerno de África. El valor de línea base (misma estación del año anterior o promedio de cinco años de los Perfiles de Zona de Medios de Vida de FEWSNET) se mantiene en los metadatos del programa. El indicador derivado (razón actual/línea base) se calcula en el análisis. Recordatorio: últimos 30 días."

