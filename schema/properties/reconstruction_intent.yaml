id: reconstruction_intent
maturity: draft
label:
  en: "Reconstruction intent"
  fr: "Intention de reconstruction"
  es: "Intención de reconstrucción"

definition:
  en: "The household's stated intent regarding the damaged dwelling: repair in place, rebuild in place, relocate, unable to act without external support, or undecided. Used by recovery programming to target repair grants, reconstruction grants, and relocation assistance."
  fr: "Intention déclarée du ménage concernant le logement endommagé : réparer sur place, reconstruire sur place, se relocaliser, incapable d'agir sans soutien extérieur, ou indécis. Utilisé par la programmation de relèvement pour cibler les subventions de réparation, les subventions de reconstruction et l'assistance à la relocalisation."
  es: "Intención declarada del hogar respecto a la vivienda dañada: reparar en el mismo sitio, reconstruir en el mismo sitio, relocalizarse, no puede actuar sin apoyo externo, o indeciso. Usado por la programación de recuperación para focalizar subvenciones de reparación, subvenciones de reconstrucción y asistencia de relocalización."

type: string
cardinality: single
