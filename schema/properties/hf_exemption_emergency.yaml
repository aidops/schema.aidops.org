id: hf_exemption_emergency
maturity: draft
label:
  en: "Emergency cases exempted from user fees"
  fr: "Cas d'urgence exemptés des frais d'utilisation"
  es: "Casos de emergencia exentos de tarifas al usuario"

definition:
  en: "Whether emergency cases are exempted from user fees (or have fee-waivers applied at the point of care) at this facility. Three-level response: `yes` (full exemption or waiver for all emergency cases), `partial` (exemption for some emergency cases only), `no` (no exemption). Asked only when `hf_user_fee_charged` is not `no`; leave null when user fees are not charged at all. Reported by the facility in-charge. Sphere 2018 Health Action; ECAT. Extended (non-core). Sensitive: fee-waiver policy is politically sensitive."
  fr: "Si les cas d'urgence sont exemptés des frais d'utilisation (ou bénéficient d'une dispense de frais appliquée au point de soins) dans cet établissement. Réponse à trois niveaux : `yes` (exemption ou dispense complète pour tous les cas d'urgence), `partial` (exemption pour certains cas d'urgence seulement), `no` (aucune exemption). À poser uniquement lorsque `hf_user_fee_charged` n'est pas `no` ; laisser à null lorsqu'aucun frais n'est facturé. Rapporté par le responsable de l'établissement. Sphere 2018 Action Santé ; ECAT. Étendu (non-core). Sensible : la politique d'exemption de frais est politiquement sensible."
  es: "Si los casos de emergencia están exentos de tarifas al usuario (o cuentan con exención de tarifas aplicada en el punto de atención) en este establecimiento. Respuesta de tres niveles: `yes` (exención completa para todos los casos de emergencia), `partial` (exención solo para algunos casos de emergencia), `no` (sin exención). Preguntar solo cuando `hf_user_fee_charged` no sea `no`; dejar nulo cuando no se cobren tarifas. Reportado por el responsable del establecimiento. Esfera 2018 Acción de Salud; ECAT. Extendido (no-core). Sensible: la política de exención de tarifas es políticamente sensible."

type: string
cardinality: single
core: false
vocabulary: yes-no-partial
references: null
category: governance
sensitivity: sensitive
