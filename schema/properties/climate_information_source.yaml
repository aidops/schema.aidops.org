id: climate_information_source
maturity: draft
label:
  en: "Sources of climate or weather information"
  fr: "Sources d'information climatique ou météorologique"
  es: "Fuentes de información climática o meteorológica"

definition:
  en: >
    Multi-select item asking where the household gets its climate or weather
    information. Applies when climate_info_services_access = 'yes'. Boundary
    with WarningResponseProfile.warning_channel_primary: that item captures
    the channel through which a specific hazard event warning was received.
    This item asks about routine climate or weather information services the
    household regularly accesses for planning purposes — a distinct adaptive
    capacity dimension. Distinct from event-specific warning channels.
  fr: >
    Item à sélection multiple demandant où le ménage obtient ses informations
    climatiques ou météorologiques. S'applique lorsque
    climate_info_services_access = 'yes'. Frontière avec
    WarningResponseProfile.warning_channel_primary : cet item capture le canal
    par lequel une alerte d'événement dangereux spécifique a été reçue.
    Cet item pose la question sur les services d'information routiniers
    auxquels le ménage accède régulièrement à des fins de planification.
  es: >
    Ítem de selección múltiple que pregunta de dónde obtiene el hogar su
    información climática o meteorológica. Aplica cuando
    climate_info_services_access = 'yes'. Límite con
    WarningResponseProfile.warning_channel_primary: ese ítem captura el canal
    por el que se recibió la alerta de un evento de peligro específico. Este
    ítem pregunta sobre los servicios de información rutinaria que el hogar
    accede regularmente para planificación.

type: string
cardinality: multiple
core: false
vocabulary: climate-info-source
references: null
category: climate
sensitivity: standard
