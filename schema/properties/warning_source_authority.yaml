id: warning_source_authority
maturity: draft
label:
  en: "Warning source authority"
  fr: "Autorité émettrice de l'alerte"
  es: "Autoridad emisora de la alerta"

definition:
  en: "The organization or authority the respondent identifies as the issuer of the warning. Applicable only when warning_received is yes. Values drawn from the warning-source-authority vocabulary, covering national meteorological and disaster agencies, local government, UN agencies, the Red Cross Red Crescent movement, NGOs, religious and customary authorities, private media, and a 'don't know' code for respondents who cannot identify the issuer."
  fr: "L'organisation ou l'autorité que le répondant identifie comme l'émetteur de l'alerte. Applicable uniquement si warning_received est oui. Valeurs issues du vocabulaire warning-source-authority, couvrant les agences météorologiques et de gestion des catastrophes nationales, les autorités locales, les agences des Nations Unies, le Mouvement de la Croix-Rouge et du Croissant-Rouge, les ONG, les autorités religieuses et coutumières, les médias privés, et un code « ne sait pas » pour les répondants qui ne peuvent identifier l'émetteur."
  es: "La organización o autoridad que el respondiente identifica como emisora de la alerta. Aplicable solo cuando warning_received es sí. Valores tomados del vocabulario warning-source-authority, que abarca agencias meteorológicas y de gestión de desastres nacionales, gobierno local, agencias de las Naciones Unidas, el Movimiento de la Cruz Roja y la Media Luna Roja, ONG, autoridades religiosas y consuetudinarias, medios privados, y un código «no sabe» para respondientes que no pueden identificar al emisor."

type: string
cardinality: single
core: false
