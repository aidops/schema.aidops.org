id: cooking_accident_past_12_months
maturity: draft
label:
  en: "Cooking accident in past 12 months"
  fr: "Accident lié à la cuisine au cours des 12 derniers mois"
  es: "Accidente de cocción en los últimos 12 meses"

definition:
  en: "Whether any household member was burned, injured, or had a respiratory illness requiring professional medical care due to the cooking stove or fuel in the past 12 months. MTF cooking safety attribute: if any such accident occurred, the safety tier is Tier 0-2 (failing the Tier 3 or above safety criterion). Source: MTF household survey; WHO/World Bank harmonized questionnaire Q10."
  fr: "Si un membre du ménage a été brûlé, blessé ou a souffert d'une maladie respiratoire nécessitant des soins médicaux professionnels en raison du foyer de cuisson ou du combustible au cours des 12 derniers mois. Attribut de sécurité de cuisson MTF : si un tel accident s'est produit, le niveau de sécurité est de 0 à 2 (ne satisfaisant pas au critère de sécurité du niveau 3 ou supérieur). Source : enquête ménage MTF ; questionnaire harmonisé OMS/Banque mondiale Q10."
  es: "Si algún miembro del hogar resultó quemado, herido o tuvo una enfermedad respiratoria que requirió atención médica profesional debido a la cocina o el combustible en los últimos 12 meses. Atributo de seguridad de cocción MTF: si ocurrió algún accidente de este tipo, el nivel de seguridad es Nivel 0-2 (no cumple el criterio de seguridad del Nivel 3 o superior). Fuente: encuesta de hogares MTF; cuestionario armonizado OMS/Banco Mundial Q10."

type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: energy
sensitivity: standard
