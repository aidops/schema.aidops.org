id: extension_provider_type
maturity: draft
label:
  en: "Extension provider type (past 12 months)"
  fr: "Type de prestataire de vulgarisation (12 derniers mois)"
  es: "Tipo de proveedor de extensión (últimos 12 meses)"

definition:
  en: "Type(s) of organisation or individual that provided agricultural extension or advisory services to the household during the past 12 months. Multi-select from vocabulary `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) because a household may receive advice from more than one channel. Drawn from the LSMS-ISA extension module and FAO WCA 2020 Theme 06. Asked only when `extension_visit_past_12mo` is `yes`."
  fr: "Type(s) d'organisation ou d'individu ayant fourni des services de vulgarisation agricole ou de conseil au ménage au cours des 12 derniers mois. Sélection multiple dans le vocabulaire `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) car un ménage peut recevoir des conseils de plus d'un canal. Tiré du module de vulgarisation du LSMS-ISA et du Thème 06 du WCA 2020 de la FAO. Posée uniquement lorsque `extension_visit_past_12mo` est `yes`."
  es: "Tipo(s) de organización o individuo que proporcionó servicios de extensión agrícola o asesoramiento al hogar durante los últimos 12 meses. Selección múltiple del vocabulario `extension-provider-type` (government_ministry, ngo_ingo, input_dealer_private, farmer_cooperative, peer_farmer_lead, research_institution, other) porque un hogar puede recibir asesoramiento de más de un canal. Tomado del módulo de extensión de LSMS-ISA y del Tema 06 del WCA 2020 de la FAO. Se pregunta solo cuando `extension_visit_past_12mo` es `yes`."

type: string
cardinality: multiple
