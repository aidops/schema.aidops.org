id: aap_informed_hh
maturity: draft
label:
  en: "AAP: Informed household (derived)"
  fr: "Redevabilité : Ménage informé (dérivé)"
  es: "Rendición de cuentas: Hogar informado (derivado)"
definition:
  en: "Derived household-level boolean: true if `aap_info_received = yes` AND `aap_info_eligibility_clear IN (very_clear, somewhat_clear)` AND `aap_info_distribution_timing_clear IN (very_clear, somewhat_clear)`. Maps to CHS 2024 Commitment 4 and to the OCHA HNO indicator '% of households adequately informed about assistance'."
  fr: "Booléen dérivé au niveau ménage : vrai si `aap_info_received = yes` ET `aap_info_eligibility_clear IN (very_clear, somewhat_clear)` ET `aap_info_distribution_timing_clear IN (very_clear, somewhat_clear)`. Correspond à l'Engagement 4 de la CHS 2024 et à l'indicateur OCHA HNO « % de ménages adéquatement informés sur l'aide »."
  es: "Booleano derivado a nivel de hogar: verdadero si `aap_info_received = yes` Y `aap_info_eligibility_clear IN (very_clear, somewhat_clear)` Y `aap_info_distribution_timing_clear IN (very_clear, somewhat_clear)`. Corresponde al Compromiso 4 de la CHS 2024 y al indicador OCHA HNO «% de hogares adecuadamente informados sobre la asistencia»."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: scores
sensitivity: standard
