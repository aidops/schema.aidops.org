id: climate_livelihood_diversification_intent
maturity: draft
label:
  en: "Plans to diversify livelihood specifically to reduce climate risk"
  fr: "Projets de diversification des moyens de subsistance spécifiquement pour réduire le risque climatique"
  es: "Planes para diversificar medios de vida específicamente para reducir el riesgo climático"

definition:
  en: >
    Single-select item asking whether the household is planning to add a new
    income activity or food source in the next 12 months to reduce dependence
    on activities affected by drought, floods, or other climate hazards. Captures
    future-oriented adaptive intent with a climate-risk motivation. Boundary
    with LivelihoodProfile.secondary_livelihood_activities: that property
    captures what the household currently does; this property captures planned
    climate-motivated diversification. Boundary with
    LivelihoodProfile.livelihood_diversity_count: that is a current measure;
    this is a forward-looking intent with an explicit climate-risk frame.
    Valid codes: yes_concrete_plan / yes_interested_but_no_plan /
    no_satisfied_with_current / no_no_options_available / dont_know.
  fr: >
    Item à sélection unique demandant si le ménage prévoit d'ajouter une
    nouvelle activité génératrice de revenus ou source de nourriture au cours
    des 12 prochains mois pour réduire sa dépendance aux activités affectées
    par la sécheresse, les inondations ou d'autres aléas climatiques. Capture
    l'intention adaptative prospective avec une motivation de réduction du
    risque climatique. Frontière avec LivelihoodProfile : ce profil capture ce
    que le ménage fait actuellement ; cette propriété capture l'intention
    future motivée par le risque climatique.
  es: >
    Ítem de selección única que pregunta si el hogar planea agregar una nueva
    actividad de ingresos o fuente de alimentos en los próximos 12 meses para
    reducir la dependencia de actividades afectadas por sequía, inundaciones u
    otros peligros climáticos. Captura la intención adaptativa prospectiva con
    motivación de reducción del riesgo climático. Límite con LivelihoodProfile:
    ese perfil captura lo que el hogar actualmente hace; esta propiedad captura
    la intención futura motivada por el riesgo climático.

type: string
cardinality: single
core: false
vocabulary: null
references: null
category: climate
sensitivity: standard
