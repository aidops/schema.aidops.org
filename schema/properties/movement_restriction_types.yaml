id: movement_restriction_types
maturity: draft
label:
  en: "Movement restriction types"
  fr: "Types de restrictions aux déplacements"
  es: "Tipos de restricciones de movimiento"

definition:
  en: "Types of restrictions that prevented household members from moving freely in the past 3 months. Asked only when movement_restricted = yes. Allow respondent to select all that apply; do not probe for names of armed actors. The vocabulary codes are functional categories, not actor-naming. discriminatory_restriction indicates the household is restricted because of ethnicity, religion, or another protected characteristic — an important indicator for the justice module. Based on GPC PAF Domain 1; REACH Syria (2022) and Ukraine (2023) protection monitoring tools; IOM DTM Protection Monitoring."
  fr: "Types de restrictions ayant empêché les membres du ménage de se déplacer librement au cours des 3 derniers mois. Posée uniquement lorsque movement_restricted = oui. Permettre au répondant de sélectionner tout ce qui s'applique ; ne pas demander les noms des acteurs armés. Les codes du vocabulaire sont des catégories fonctionnelles, pas des désignations d'acteurs. discriminatory_restriction indique que le ménage est restreint en raison de son origine ethnique, de sa religion ou d'une autre caractéristique protégée — un indicateur important pour le module justice. Fondé sur GPC PAF Domaine 1 ; outils de suivi de la protection REACH Syrie (2022) et Ukraine (2023) ; Suivi de la protection DTM de l'OIM."
  es: "Tipos de restricciones que impidieron que los miembros del hogar se desplazaran libremente en los últimos 3 meses. Se pregunta solo cuando movement_restricted = sí. Permitir al encuestado seleccionar todas las que correspondan; no indagar sobre nombres de actores armados. Los códigos del vocabulario son categorías funcionales, no identificación de actores. discriminatory_restriction indica que el hogar está restringido por etnia, religión u otra característica protegida — un indicador importante para el módulo de justicia. Basado en GPC PAF Dominio 1; herramientas de monitoreo de protección de REACH Siria (2022) y Ucrania (2023); Monitoreo de Protección DTM de la OIM."

type: string
cardinality: multiple
vocabulary: movement-restriction-type
references: null
category: freedom_of_movement
core: false
sensitivity: sensitive
