id: anc_iron_supplementation
maturity: draft
label:
  en: Iron tablets or syrup taken during pregnancy
  fr: "Comprimés de fer ou sirop pris pendant la grossesse"
  es: "Tabletas de hierro o jarabe tomados durante el embarazo"
definition:
  en: "Whether the woman took iron tablets or iron syrup during the most recent pregnancy. DHS-8 m45; MICS6 captures iron supplement receipt. WHO ANC 2016 recommends daily iron-folic acid supplementation throughout pregnancy. Gate item for anc_iron_days_taken."
  fr: "Si la femme a pris des comprimés de fer ou du sirop de fer pendant la grossesse la plus récente. DHS-8 m45 ; MICS6 capture la réception de suppléments de fer. L'OMS ANC 2016 recommande une supplémentation quotidienne en fer et acide folique tout au long de la grossesse. Item de seuil pour anc_iron_days_taken."
  es: "Si la mujer tomó tabletas de hierro o jarabe de hierro durante el embarazo más reciente. DHS-8 m45; MICS6 captura la recepción de suplementos de hierro. La OMS ANC 2016 recomienda la suplementación diaria de hierro y ácido fólico durante todo el embarazo. Ítem de puerta para anc_iron_days_taken."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
