id: climate_hazards_experienced_past_5_years
maturity: draft
label:
  en: "Climate hazards experienced in the past 5 years"
  fr: "Aléas climatiques subis au cours des 5 dernières années"
  es: "Peligros climáticos experimentados en los últimos 5 años"

definition:
  en: >
    Multi-select item recording which climate-related hazards have directly
    affected the household in the past five years. 'Affected' means the hazard
    caused damage, loss of harvest, displacement, water shortage, or any other
    tangible impact on the household — not merely that it occurred in the area.
    The five-year window is the recommended minimum for hazard trend analysis
    per IPCC AR6 WGII methodological guidance. Boundary with
    LivelihoodProfile.shock_experienced_past_12mo: that item covers a 12-month
    recall for livelihood-coping purposes; this item covers a 5-year exposure
    window as a climate-trend indicator. Boundary with WarningResponseProfile:
    this item records hazard type exposure trends, not the event-level
    warning-reception and protective-action chain. When both profiles are
    collected in the same survey, coordinate with AgricultureProfile to avoid
    asking the respondent about hazard history twice.
  fr: >
    Item à sélection multiple enregistrant quels aléas climatiques ont
    directement affecté le ménage au cours des cinq dernières années.
    « Affecté » signifie que l'aléa a causé des dommages, une perte de récolte,
    un déplacement, une pénurie d'eau ou tout autre impact tangible sur le
    ménage — pas simplement qu'il s'est produit dans la zone. La fenêtre de cinq
    ans est la durée minimale recommandée pour l'analyse des tendances des aléas
    selon les orientations méthodologiques du GIEC AR6 WGII.
  es: >
    Ítem de selección múltiple que registra qué peligros relacionados con el
    clima han afectado directamente al hogar en los últimos cinco años.
    «Afectado» significa que el peligro causó daños, pérdida de cosecha,
    desplazamiento, escasez de agua u otro impacto tangible sobre el hogar,
    no solo que ocurrió en el área. La ventana de cinco años es el mínimo
    recomendado para el análisis de tendencias de peligros según las
    orientaciones metodológicas del IPCC AR6 WGII.

type: string
cardinality: multiple
