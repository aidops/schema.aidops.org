id: hdds_oils_fats_consumed
maturity: draft
label:
  en: "HDDS oils and fats consumed"
  fr: "SDAM huiles et matières grasses consommées"
  es: "EDDA aceites y grasas consumidos"

definition:
  en: "Whether any member of the household consumed an item from the oils and fats food group in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des huiles et matières grasses au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de aceites y grasas en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

