id: cl_econ_produce_sell
maturity: draft
label:
  en: "Child produced or sold articles in past 7 days"
  fr: "L'enfant a produit ou vendu des articles dans les 7 derniers jours"
  es: "El niño produjo o vendió artículos en los últimos 7 días"
definition:
  en: "Whether the selected child aged 5-17 produced or sold articles, handicrafts, clothes, food, or agricultural products in the past 7 days. MICS 6 CL1c. Counted toward economic activity for the CL hours computation."
  fr: "Si l'enfant sélectionné âgé de 5 à 17 ans a produit ou vendu des articles, de l'artisanat, des vêtements, de la nourriture ou des produits agricoles au cours des 7 derniers jours. MICS 6 CL1c. Comptabilisé dans l'activité économique pour le calcul des heures CL."
  es: "Si el niño seleccionado de 5 a 17 años produjo o vendió artículos, artesanías, ropa, alimentos o productos agrícolas en los últimos 7 días. MICS 6 CL1c. Se cuenta dentro de la actividad económica para el cálculo de horas CL."
type: boolean
cardinality: single
