id: birth_registration_knowledge
maturity: draft
label:
  en: "Knowledge of birth registration process"
  fr: "Connaissance de la procédure d'enregistrement"
  es: "Conocimiento del proceso de registro"
definition:
  en: "Whether the caregiver knows how to register the child's birth. MICS 6 BR3. Asked only when birth_registered is 'no' or 'dont_know'. Captures the caregiver's knowledge-of-process gap, distinct from access or legal barriers. Not part of the SDG 16.9.1 numerator."
  fr: "Si le soignant sait comment enregistrer la naissance de l'enfant. MICS 6 BR3. Posé uniquement lorsque birth_registered est 'no' ou 'dont_know'. Capture le déficit de connaissance du processus par le soignant, distinct des barrières d'accès ou juridiques. Ne fait pas partie du numérateur ODD 16.9.1."
  es: "Si el cuidador sabe cómo registrar el nacimiento del niño. MICS 6 BR3. Se pregunta solo cuando birth_registered es 'no' o 'dont_know'. Captura la brecha de conocimiento del proceso por parte del cuidador, distinto de barreras de acceso o legales. No forma parte del numerador ODS 16.9.1."
