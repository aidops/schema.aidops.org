id: structural_safety_assessment
maturity: draft
label:
  en: "Structural safety assessment"
  fr: "Évaluation de la sécurité structurale"
  es: "Evaluación de seguridad estructural"

definition:
  en: "Optional structural safety tag assigned by a qualified engineer or trained shelter assessor, using the ATC-20 green/yellow/red taxonomy. Frequently null: a household enumerator is not expected to assign a structural safety tag, and many post-shock administrations do not include a structural inspector visit."
  fr: "Étiquette de sécurité structurale optionnelle attribuée par un ingénieur qualifié ou un évaluateur abri formé, selon la taxonomie ATC-20 vert/jaune/rouge. Souvent nulle : un enquêteur de ménage n'est pas censé attribuer une étiquette de sécurité structurale, et de nombreuses administrations post-choc ne comportent pas de visite d'inspecteur structurel."
  es: "Etiqueta opcional de seguridad estructural asignada por un ingeniero calificado o evaluador de refugio capacitado, usando la taxonomía ATC-20 verde/amarillo/rojo. Frecuentemente nula: un encuestador del hogar no se espera que asigne una etiqueta de seguridad estructural, y muchas administraciones post-choque no incluyen una visita de inspector estructural."

type: string
cardinality: single
vocabulary: structural-safety-tag
references: null
category: shelter
valid_instruments: [shelter_cluster_rna, pdna_housing]
