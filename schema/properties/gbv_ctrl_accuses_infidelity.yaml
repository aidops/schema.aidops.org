id: gbv_ctrl_accuses_infidelity
maturity: draft
label:
  en: "Controlling behavior: frequently accuses of infidelity"
  fr: "Comportement de contrôle : accusations fréquentes d'infidélité"
  es: "Comportamiento controlador: acusa con frecuencia de infidelidad"

definition:
  en: >
    Whether the referent partner frequently accuses or accused the respondent of being unfaithful.
    DHS instrument item DV03b. Reference period: ever (relationship pattern). Response options
    use the yes-no-dk vocabulary. DHS-7+ compatible. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent accuse ou accusait fréquemment la répondante d'infidélité.
    Item DHS DV03b. Période de référence : toujours (schéma relationnel). Options de réponse :
    vocabulaire yes-no-dk. Compatible DHS-7+.
  es: >
    Si el compañero referente acusa o acusaba con frecuencia a la encuestada de ser infiel.
    Ítem DHS DV03b. Período de referencia: alguna vez (patrón relacional). Opciones de respuesta:
    vocabulario yes-no-dk. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: yes-no-dk
references: null
category: gbv_controlling
core: false
sensitivity: restricted
