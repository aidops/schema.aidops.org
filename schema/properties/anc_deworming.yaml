id: anc_deworming
maturity: draft
label:
  en: Deworming medicine taken during pregnancy
  fr: "Médicament antiparasitaire (vermifuge) pris pendant la grossesse"
  es: "Medicamento antiparasitario (desparasitante) tomado durante el embarazo"
definition:
  en: "Whether the woman took any medicine to treat intestinal parasites (deworming tablets) during the most recent pregnancy. DHS-8 m60. WHO ANC 2016 recommends preventive deworming in high-burden areas from the second trimester. Only applicable in contexts with high helminth prevalence."
  fr: "Si la femme a pris des médicaments pour traiter les parasites intestinaux (comprimés vermifuges) pendant la grossesse la plus récente. DHS-8 m60. L'OMS ANC 2016 recommande le déparasitage préventif dans les zones à forte charge à partir du deuxième trimestre. Applicable uniquement dans les contextes à forte prévalence d'helminthes."
  es: "Si la mujer tomó algún medicamento para tratar parásitos intestinales (tabletas antiparasitarias) durante el embarazo más reciente. DHS-8 m60. La OMS ANC 2016 recomienda la desparasitación preventiva en áreas de alta carga desde el segundo trimestre. Solo aplicable en contextos con alta prevalencia de helmintos."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
