id: water_availability_reliable
maturity: draft
label:
  en: "Water source available when needed"
  fr: "Source d'eau disponible quand nécessaire"
  es: "Fuente de agua disponible cuando se necesita"

definition:
  en: "Whether water is always available from the main drinking water source when the household needs it. Reliable availability is one of three criteria for the safely managed water service level (JMP W5 expanded). If the respondent answers 'no', ask water_availability_days_per_week to characterize the unreliability."
  fr: "Si l'eau est toujours disponible à la principale source d'eau potable quand le ménage en a besoin. La disponibilité fiable est l'un des trois critères pour le niveau de service en eau à gestion sécurisée (JMP W5 élargi). Si le répondant répond 'non', demander water_availability_days_per_week pour caractériser le manque de fiabilité."
  es: "Si el agua está siempre disponible en la principal fuente de agua potable cuando el hogar la necesita. La disponibilidad confiable es uno de los tres criterios para el nivel de servicio de agua con gestión segura (JMP W5 ampliado). Si el encuestado responde 'no', preguntar water_availability_days_per_week para caracterizar la falta de confiabilidad."

type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: water
valid_instruments: [jmp_household_survey, mics7]
