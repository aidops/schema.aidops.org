id: hf_staff_md_present
maturity: draft
label:
  en: "Medical doctor on duty today"
  fr: "Médecin de service aujourd'hui"
  es: "Médico de servicio hoy"

definition:
  en: "Whether at least one medical doctor (MD or equivalent generalist physician) is on duty and serving patients at the facility on the observation date. Reported by the facility in-charge and verified by the enumerator through direct observation where possible. SARA health-worker density proxy at facility level; MISP Obj 4 tracer. Presence today is the crisis-relevant variable."
  fr: "Si au moins un médecin (MD ou médecin généraliste équivalent) est de service et prend en charge des patients à l'établissement à la date d'observation. Rapporté par le responsable de l'établissement et vérifié par l'enquêteur par observation directe lorsque possible. Proxy de densité de personnel de santé SARA au niveau de l'établissement ; indicateur traceur MISP Objectif 4. La présence aujourd'hui est la variable pertinente en contexte de crise."
  es: "Si al menos un médico (MD o médico generalista equivalente) está de servicio y atendiendo pacientes en el establecimiento en la fecha de observación. Reportado por el responsable del establecimiento y verificado por el enumerador mediante observación directa cuando sea posible. Proxy de densidad de personal sanitario SARA a nivel de establecimiento; indicador trazador MISP Objetivo 4. La presencia hoy es la variable relevante en contexto de crisis."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: governance
sensitivity: standard
