id: hf_electricity_reliable
maturity: draft
label:
  en: "Electricity reliably available"
  fr: "Électricité disponible de manière fiable"
  es: "Electricidad disponible de manera confiable"

definition:
  en: "Whether electricity is available at least 90% of working hours during the past month, or is otherwise reliable enough for normal service delivery (SARA functioning-and-majority threshold). Reported by the facility in-charge. `dont_know` is retained as a distinct response."
  fr: "Si l'électricité est disponible pendant au moins 90 % des heures de travail au cours du mois écoulé, ou si elle est par ailleurs suffisamment fiable pour la prestation normale de services (seuil SARA : fonctionnel et majoritairement disponible). Rapporté par le responsable de l'établissement. `dont_know` est conservé comme réponse distincte."
  es: "Si la electricidad está disponible al menos el 90% de las horas de trabajo durante el mes pasado, o es de otra forma suficientemente confiable para la prestación normal de servicios (umbral SARA: funcional y mayoritariamente disponible). Reportado por el responsable del establecimiento. `dont_know` se mantiene como respuesta distinta."

type: string
cardinality: single
core: true
