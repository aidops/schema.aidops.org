id: gbv_sex_forced_intercourse_12m_freq
maturity: draft
label:
  en: "Sexual IPV (12m frequency): physically forced to have sexual intercourse"
  fr: "VPI sexuelle (fréquence 12m) : forcée physiquement à avoir des rapports sexuels"
  es: "VPI sexual (frecuencia 12m): forzada físicamente a tener relaciones sexuales"

definition:
  en: >
    Frequency of partner physically forcing the respondent to have sexual intercourse in the past
    12 months. DHS instrument item DV05B for act DV05A-viii. Asked only if
    gbv_sex_forced_intercourse_lifetime = true (skip logic: if lifetime = false, this property
    is not asked). DHS-7+ compatible. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Fréquence des actes de contrainte physique à avoir des rapports sexuels dans les 12 derniers
    mois. Item DHS DV05B pour DV05A-viii. Posée uniquement si
    gbv_sex_forced_intercourse_lifetime = vrai. Compatible DHS-7+.
  es: >
    Frecuencia de que el compañero fuerce físicamente a la encuestada a tener relaciones sexuales
    en los últimos 12 meses. Ítem DHS DV05B para DV05A-viii. Se pregunta solo si
    gbv_sex_forced_intercourse_lifetime = verdadero. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: ipv-freq-3
references: null
category: gbv_sexual_ipv
core: false
sensitivity: restricted
