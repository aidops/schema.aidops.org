id: vacc_opv1
maturity: draft
label:
  en: "OPV dose 1 vaccination status"
  fr: "Statut vaccinal VPO dose 1"
  es: "Estado de vacunación VPO dosis 1"

definition:
  en: "Whether the child received the first dose of oral polio vaccine (OPV1) at approximately 6 weeks of age. Published recall wording: 'Were drops given in the mouth — a first dose of oral polio vaccine — at around 6 weeks of age?' Co-administered with Penta1 in most national EPI schedules. DHS code h7; MICS code IM3b."
  fr: "Si l'enfant a reçu la première dose du vaccin antipoliomyélitique oral (VPO1) à environ 6 semaines. Formulation de rappel publiée : « Des gouttes ont-elles été données par voie orale — une première dose de vaccin antipoliomyélitique oral — à environ 6 semaines ? » Coadministré avec Penta1 dans la plupart des calendriers EPI nationaux. Code DHS h7 ; code MICS IM3b."
  es: "Si el niño recibió la primera dosis de vacuna antipoliomielítica oral (VPO1) a aproximadamente 6 semanas de edad. Redacción de recordatorio publicada: '¿Se dieron gotas por vía oral — una primera dosis de vacuna antipoliomielítica oral — alrededor de las 6 semanas de edad?' Co-administrada con Penta1 en la mayoría de los calendarios EPI nacionales. Código DHS h7; código MICS IM3b."

type: string
cardinality: single
core: true
