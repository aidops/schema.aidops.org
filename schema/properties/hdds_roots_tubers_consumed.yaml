id: hdds_roots_tubers_consumed
maturity: draft
label:
  en: "HDDS roots and tubers consumed"
  fr: "SDAM racines et tubercules consommés"
  es: "EDDA raíces y tubérculos consumidos"

definition:
  en: "Whether any member of the household consumed an item from the white roots and tubers food group (white potato, white yam, cassava) in the past 24 hours. One of twelve food groups used by the FAO Household Dietary Diversity Score (HDDS)."
  fr: "Si un membre du ménage a consommé un aliment du groupe des racines et tubercules blancs (pomme de terre blanche, igname blanc, manioc) au cours des dernières 24 heures. L'un des douze groupes alimentaires utilisés par le Score de diversité alimentaire du ménage (HDDS) de la FAO."
  es: "Si algún miembro del hogar consumió un alimento del grupo de raíces y tubérculos blancos (papa blanca, ñame blanco, yuca) en las últimas 24 horas. Uno de los doce grupos alimentarios del Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO."

type: boolean
