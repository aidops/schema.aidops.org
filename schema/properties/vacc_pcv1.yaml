id: vacc_pcv1
maturity: draft
label:
  en: "PCV dose 1 vaccination status"
  fr: "Statut vaccinal VPC dose 1"
  es: "Estado de vacunación VPC dosis 1"

definition:
  en: "Whether the child received the first dose of pneumococcal conjugate vaccine (PCV1) at approximately 6 weeks of age. Published recall wording: 'Has (name) ever been given a pneumococcal vaccine injection (PCV) — 1st dose?' Country-specific — not in all national EPI schedules. DHS code h_pn1; MICS code IM8a."
  fr: "Si l'enfant a reçu la première dose du vaccin antipneumococcique conjugué (VPC1) à environ 6 semaines. Formulation de rappel publiée : « (Prénom) a-t-il/elle déjà reçu une injection de vaccin antipneumococcique (VPC) — 1re dose ? » Spécifique au pays — non inclus dans tous les calendriers EPI nationaux. Code DHS h_pn1 ; code MICS IM8a."
  es: "Si el niño recibió la primera dosis de vacuna antineumocócica conjugada (VPC1) a aproximadamente 6 semanas de edad. Redacción de recordatorio publicada: '¿Alguna vez recibió (nombre) una inyección de vacuna antineumocócica (VPC) — 1.a dosis?' Específica por país — no incluida en todos los calendarios EPI nacionales. Código DHS h_pn1; código MICS IM8a."

type: string
cardinality: single
core: false
vocabulary: vacc-status
references: null
category: vaccination
sensitivity: sensitive
