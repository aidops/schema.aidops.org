id: hf_commodity_rdt_malaria_available
maturity: draft
label:
  en: "Malaria rapid diagnostic test (RDT) available and within expiry"
  fr: "Test de diagnostic rapide (TDR) du paludisme disponible et non périmé"
  es: "Prueba diagnóstica rápida (PDR) de malaria disponible y vigente"

definition:
  en: "Whether a malaria rapid diagnostic test (RDT) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA malaria tracer. `not_applicable` only for non-malaria-endemic areas. Extended (non-core). Sensitive: stock-out reporting is politically sensitive."
  fr: "Si un test de diagnostic rapide (TDR) du paludisme est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA paludisme. `not_applicable` uniquement pour les zones non endémiques. Étendu (non-core). Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si una prueba diagnóstica rápida (PDR) de malaria está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA malaria. `not_applicable` solo para zonas no endémicas. Extendido (no-core). Sensible: el reporte de desabastecimientos es políticamente sensible."

type: string
cardinality: single
core: false
vocabulary: yes-no-na
references: null
category: classification
sensitivity: sensitive
