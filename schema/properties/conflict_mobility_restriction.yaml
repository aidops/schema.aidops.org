id: conflict_mobility_restriction
maturity: draft
label:
  en: "Conflict or insecurity directly prevented herd movement — last 30 days"
  fr: "Un conflit ou une insécurité a directement empêché le déplacement du troupeau — 30 derniers jours"
  es: "Conflicto o inseguridad impidió directamente el movimiento del rebaño — últimos 30 días"

definition:
  en: "Whether conflict or insecurity directly prevented the household from moving its herd to better water or pasture areas in the last 30 days. Yes / No / Don't know (`yes-no-dk` vocabulary). Sensitivity: this item is HIGHLY SENSITIVE (maps to the AidOps `restricted` tier). Direct disclosure that armed actors have prevented household movement may endanger the respondent if data reach armed actors. In contexts where enumerators operate in conflict zones (Somalia, Mali, Sudan, South Sudan), even aggregate data showing conflict-induced mobility restrictions in a specific area may constitute useful intelligence for armed groups. Required data-handling mitigations: (1) do not retain GPS coordinates of the interview location alongside this item in any shared dataset; (2) aggregate responses to livelihood-zone level before sharing with any non-humanitarian partner; (3) apply IDP protection confidentiality standards; (4) consider omitting this item entirely from surveys conducted in areas where enumerators are co-located with or monitored by armed actors. Despite the sensitivity, this item is `core: true` because conflict-induced mobility restriction is one of the IPC criteria for crisis-phase classification in pastoral livelihood zones, and its omission systematically understates pastoral food insecurity in conflict-affected zones. Grounded in LEGS 3rd edition, IPC AFI pastoral annex, FSNAU conflict-mobility items, and FEWSNET conflict-pastoralism interaction monitoring."
  fr: "Si un conflit ou une insécurité a directement empêché le ménage de déplacer son troupeau vers de meilleures zones d'eau ou de pâturage au cours des 30 derniers jours. Oui / Non / Ne sait pas (vocabulaire `yes-no-dk`). Sensibilité : cet item est HAUTEMENT SENSIBLE (niveau `restricted` AidOps). La divulgation directe que des acteurs armés ont empêché le déplacement du ménage peut mettre en danger le répondant si les données atteignent des groupes armés. Mesures requises : (1) ne pas conserver de coordonnées GPS avec cet item ; (2) agréger au niveau de la zone de moyens d'existence ; (3) appliquer les normes de confidentialité de protection des PDI. `core: true` car la restriction de mobilité induite par le conflit est un critère IPC pour la classification de crise dans les zones pastorales."
  es: "Si el conflicto o la inseguridad impidió directamente al hogar mover su rebaño a mejores áreas de agua o pasto en los últimos 30 días. Sí / No / No sabe (vocabulario `yes-no-dk`). Sensibilidad: este ítem es MUY SENSIBLE (nivel `restricted` de AidOps). La divulgación directa de que actores armados han impedido el movimiento del hogar puede poner en peligro al encuestado si los datos llegan a grupos armados. Mitigaciones requeridas: (1) no retener coordenadas GPS con este ítem; (2) agregar al nivel de zona de medios de vida; (3) aplicar estándares de confidencialidad de protección de PDI. `core: true` porque la restricción de movilidad inducida por el conflicto es un criterio IPC para la clasificación de crisis en zonas pastorales."

type: string
cardinality: single
core: true
vocabulary: yes-no-dk
references: null
category: pastoral_mobility
sensitivity: restricted
