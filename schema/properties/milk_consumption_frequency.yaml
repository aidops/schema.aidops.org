id: milk_consumption_frequency
maturity: draft
label:
  en: "Days household consumed own-animal milk or dairy products — last 7 days"
  fr: "Jours où le ménage a consommé du lait ou des produits laitiers de ses propres animaux — 7 derniers jours"
  es: "Días que el hogar consumió leche o productos lácteos de sus propios animales — últimos 7 días"

definition:
  en: "Number of days in the last 7 days on which the household consumed fresh milk, fermented milk (including soured milk or yogurt), or other milk products from its own animals. Integer 0–7. This is a pastoral-specific diet quality indicator that is structurally distinct from the FoodSecurityProfile `hdds_milk_dairy_consumed` item: HDDS captures a 24-hour recall binary (whether any dairy was consumed, from any source); this item captures frequency of own-animal production consumption over 7 days. The two items are complementary, not redundant. In pastoral households with camels, this item functions as a proxy for camel milk availability which is the primary food source for many Horn of Africa households (Somalia, northern Kenya). Grounded in FSNAU dietary diversity module — milk consumption frequency (adapted), LEGS 3rd edition (milk consumption as food security indicator), and IPC AFI pastoral annex (milk availability as dietary indicator). Recall: last 7 days."
  fr: "Nombre de jours au cours des 7 derniers jours où le ménage a consommé du lait frais, du lait fermenté (y compris du lait aigre ou du yaourt) ou d'autres produits laitiers de ses propres animaux. Entier 0–7. Il s'agit d'un indicateur de qualité alimentaire propre au contexte pastoral, structurellement distinct de `hdds_milk_dairy_consumed` du FoodSecurityProfile : HDDS capture un binaire de rappel de 24 heures (si des produits laitiers ont été consommés, quelle que soit la source) ; cet item capture la fréquence de consommation de lait de propres animaux sur 7 jours. Fondé sur le module de diversité alimentaire FSNAU — fréquence de consommation de lait (adapté), LEGS 3e éd. et l'annexe pastoraliste IPC AFI. Rappel : 7 derniers jours."
  es: "Número de días en los últimos 7 días en los que el hogar consumió leche fresca, leche fermentada (incluida leche agria o yogur) u otros productos lácteos de sus propios animales. Entero 0–7. Es un indicador de calidad dietética específico del contexto pastoral, estructuralmente distinto del ítem `hdds_milk_dairy_consumed` de FoodSecurityProfile: HDDS captura un binario de recordatorio de 24 horas (si se consumió algún lácteo, de cualquier fuente); este ítem captura la frecuencia de consumo de leche de animales propios durante 7 días. Ambos son complementarios, no redundantes. Recordatorio: últimos 7 días."

type: integer
cardinality: single
