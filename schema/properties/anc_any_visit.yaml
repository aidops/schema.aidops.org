id: anc_any_visit
maturity: draft
label:
  en: Received any antenatal care
  fr: "A reçu des soins prénataux"
  es: Recibió atención prenatal
definition:
  en: "Whether the woman received any antenatal care from any provider during the most recent pregnancy. DHS-8: derived from m14 (visit count > 0) or the m2 series (any provider seen). MICS6 MN2. Gateway item: if no or don't know, skip ANC provider type and all ANC content items (blood pressure, urine, blood sample, etc.). DHS-8 denominator: all births (live and stillbirth) in the 24 months preceding the survey."
  fr: "Si la femme a reçu des soins prénataux de la part d'un quelconque prestataire pendant la grossesse la plus récente. DHS-8 : dérivé de m14 (nombre de visites > 0) ou de la série m2 (prestataire vu). MICS6 MN2. Item de seuil : si non ou ne sait pas, ignorer le type de prestataire CPN et tous les items de contenu CPN (tension artérielle, urine, prise de sang, etc.). Dénominateur DHS-8 : toutes les naissances (vivantes et mortinaissances) dans les 24 mois précédant l'enquête."
  es: "Si la mujer recibió atención prenatal de algún proveedor durante el embarazo más reciente. DHS-8: derivado de m14 (conteo de visitas > 0) o de la serie m2 (cualquier proveedor visto). MICS6 MN2. Ítem de puerta: si no o no sabe, omitir el tipo de proveedor APN y todos los ítems de contenido de APN (presión arterial, orina, muestra de sangre, etc.). Denominador DHS-8: todos los partos (vivos y mortinatos) en los 24 meses anteriores a la encuesta."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
