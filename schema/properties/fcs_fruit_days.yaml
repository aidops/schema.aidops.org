definition:
  en: "Number of days in the past seven during which any member of the household consumed fruit. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé des fruits. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió frutas. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

