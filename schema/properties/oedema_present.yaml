id: oedema_present
maturity: draft
label:
  en: "Oedema present"
  fr: "Présence d'œdème"
  es: "Presencia de edema"

definition:
  en: "Whether bilateral pitting oedema was observed at the time of measurement. Required for wasting classification under SMART and CMAM protocols: bilateral pitting oedema indicates severe acute malnutrition regardless of MUAC or weight-for-height z-score."
  fr: "Indique si un œdème bilatéral prenant le godet a été observé au moment de la mesure. Requis pour la classification de l'émaciation selon les protocoles SMART et PCIMA : un œdème bilatéral prenant le godet indique une malnutrition aiguë sévère indépendamment du périmètre brachial ou du z-score poids-pour-taille."
  es: "Indica si se observó edema bilateral con fóvea al momento de la medición. Requerido para la clasificación de emaciación según los protocolos SMART y CMAM: el edema bilateral con fóvea indica desnutrición aguda grave independientemente del perímetro braquial o del puntaje z peso-para-talla."

type: boolean
cardinality: single
vocabulary: null
references: null
valid_instruments: [smart]
