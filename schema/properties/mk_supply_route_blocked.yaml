id: mk_supply_route_blocked
maturity: draft
label:
  en: Supply route blocked or severely restricted
  fr: Route d'approvisionnement bloquée ou sévèrement restreinte
  es: Ruta de suministro bloqueada o severamente restringida

definition:
  en: "Whether any key supply routes to this market are currently blocked or severely restricted, as reported by key vendor informants. Boolean: yes / no / dont_know. The yes/no flag is non-sensitive and appears in standard market monitoring reports. Do not record specific route names, checkpoint locations, or armed actor identities in connection with this field — narrative details should go to secure incident reporting channels."
  fr: "Si des routes d'approvisionnement clés vers ce marché sont actuellement bloquées ou sévèrement restreintes, tel que rapporté par les informateurs clés vendeurs. Booléen : oui / non / ne sait pas. L'indicateur oui/non est non sensible et figure dans les rapports standard de suivi des marchés. Ne pas enregistrer les noms de routes spécifiques, les emplacements des points de contrôle ou les identités des acteurs armés en lien avec ce champ."
  es: "Si alguna ruta clave de suministro a este mercado está actualmente bloqueada o severamente restringida, según lo reportado por informantes clave vendedores. Booleano: sí / no / no sabe. La bandera sí/no no es sensible y aparece en los informes estándar de monitoreo de mercados. No registrar nombres de rutas específicas, ubicaciones de puntos de control o identidades de actores armados en relación con este campo."

type: string
cardinality: single
core: true
vocabulary: null
references: null
category: market_supply_chain
sensitivity: standard
