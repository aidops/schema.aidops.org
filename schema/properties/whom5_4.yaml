label:
  en: "WHO-5 item 4: woke up feeling fresh and rested"
  fr: "WHO-5 item 4 : réveillé·e frais·che et reposé·e"
  es: "WHO-5 ítem 4: despertar sintiéndose fresco y descansado"

definition:
  en: "Frequency with which the respondent woke up feeling fresh and rested over the last two weeks. Item 4 of the WHO-5 Well-Being Index. Higher response values indicate better well-being (0 = at no time, 5 = all of the time)."
  fr: "Fréquence à laquelle la répondant·e s'est réveillé·e en se sentant frais·che et reposé·e au cours des deux dernières semaines. Item 4 de l'Indice de bien-être WHO-5. Des valeurs de réponse plus élevées indiquent un meilleur bien-être (0 = à aucun moment, 5 = tout le temps)."
  es: "Frecuencia con la que la persona encuestada despertó sintiéndose fresca y descansada durante las últimas dos semanas. Ítem 4 del Índice de Bienestar WHO-5. Valores de respuesta más altos indican mejor bienestar (0 = en ningún momento, 5 = todo el tiempo)."

