id: iycf_fg_flesh
maturity: draft
label:
  en: "MDD-C food group 5: flesh foods"
  fr: "Groupe alimentaire MDD-C 5 : aliments carnés"
  es: "Grupo alimentario MDD-C 5: alimentos cárnicos"

definition:
  en: "Whether the child ate any flesh food in the previous 24 hours. Food group 5 of the 8-group MDD-C framework (WHO/UNICEF 2021). Example foods: chicken, beef, pork, organ meat (liver, kidney), fish, shellfish, and other flesh foods. Published wording: 'Yesterday during the day or at night, did (NAME) eat/drink any [flesh foods]?'"
  fr: "Indique si l'enfant a mangé un aliment carné au cours des 24 heures précédentes. Groupe alimentaire 5 du cadre MDD-C à 8 groupes (OMS/UNICEF 2021). Exemples d'aliments : poulet, bœuf, porc, abats (foie, rein), poisson, crustacés et autres aliments carnés."
  es: "Indica si el niño comió algún alimento cárnico en las 24 horas anteriores. Grupo alimentario 5 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Ejemplos de alimentos: pollo, carne de res, cerdo, vísceras (hígado, riñón), pescado, mariscos y otros alimentos cárnicos."

type: boolean
cardinality: single
core: true
