id: climate_insurance_coverage_type
maturity: draft
label:
  en: "Types of insurance covering climate-related losses"
  fr: "Types d'assurance couvrant les pertes liées au climat"
  es: "Tipos de seguro que cubren pérdidas relacionadas con el clima"

definition:
  en: >
    Multi-select item asking whether the household currently holds any form of
    insurance that would cover losses or damage from climate-related hazards
    such as drought, flood, or extreme weather. Includes 'none' as a mutually
    exclusive option. Insurance is an adaptive capacity indicator in the IPCC
    AR6 WGII Chapter 17 and a required GCF results framework risk-transfer
    indicator. Sensitivity: financial product ownership is modestly sensitive.
    Apply sensitivity: sensitive in line with LivelihoodProfile financial items.
  fr: >
    Item à sélection multiple demandant si le ménage détient actuellement une
    forme d'assurance qui couvrirait les pertes ou dommages liés à des aléas
    climatiques tels que la sécheresse, les inondations ou les phénomènes
    météorologiques extrêmes. Inclut 'none' comme option mutuellement exclusive.
    L'assurance est un indicateur de capacité d'adaptation (GIEC AR6 WGII
    Chapitre 17) et un indicateur obligatoire de transfert de risque du cadre
    de résultats FVC.
  es: >
    Ítem de selección múltiple que pregunta si el hogar tiene actualmente algún
    tipo de seguro que cubra pérdidas o daños por peligros relacionados con el
    clima como sequía, inundaciones o fenómenos meteorológicos extremos. Incluye
    'none' como opción mutuamente excluyente. El seguro es un indicador de
    capacidad de adaptación (IPCC AR6 WGII Capítulo 17) e indicador obligatorio
    de transferencia de riesgo del marco de resultados del FVC.

type: string
cardinality: multiple
core: true
vocabulary: climate-insurance-type
references: null
category: climate
sensitivity: sensitive
