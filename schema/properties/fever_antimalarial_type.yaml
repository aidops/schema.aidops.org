id: fever_antimalarial_type
maturity: draft
label:
  en: "Antimalarial drug type given for fever"
  fr: "Type d'antipaludéen administré pour la fièvre"
  es: "Tipo de antipalúdico administrado para la fiebre"

definition:
  en: "The type(s) of antimalarial medicine given to the child for the fever or malaria episode. Published wording: 'What medicine was (name) given for malaria or fever? (Select all that apply).' Enumerator instruction: ask to see the medicine packet or bottle; if unidentifiable, show a visual prompt card of common antimalarials. Multi-select. Ask only if fever_antimalarial_given is true. MICS codes ML5/ML7; DHS ML_drug variable."
  fr: "Le(s) type(s) d'antipaludéen administré(s) à l'enfant pour l'épisode de fièvre ou de paludisme. Formulation publiée : « Quel médicament (prénom) a-t-il/elle reçu pour le paludisme ou la fièvre ? (Sélectionnez tout ce qui s'applique). » Instruction à l'enquêteur : demander à voir le sachet ou le flacon du médicament ; si non identifiable, montrer une carte visuelle des antipaludéens courants. Sélection multiple. Posez uniquement si fever_antimalarial_given est vrai. Codes MICS ML5/ML7 ; variable DHS ML_drug."
  es: "El(los) tipo(s) de medicamento antipalúdico administrado(s) al niño para el episodio de fiebre o malaria. Redacción publicada: '¿Qué medicamento se le administró a (nombre) para la malaria o la fiebre? (Seleccione todo lo que corresponda).' Instrucción al encuestador: pedir ver el paquete o frasco del medicamento; si no se puede identificar, mostrar una tarjeta visual de antipalúdicos comunes. Selección múltiple. Preguntar solo si fever_antimalarial_given es verdadero. Códigos MICS ML5/ML7; variable DHS ML_drug."

type: string
cardinality: multiple
core: false
