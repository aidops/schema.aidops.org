id: newborn_weighed_at_birth
maturity: draft
label:
  en: Newborn weighed at birth
  fr: "Nouveau-né pesé à la naissance"
  es: "Recién nacido pesado al nacer"
definition:
  en: "Whether the baby was weighed at or shortly after birth. DHS-8 m19a (distinguishes measured weight from recalled/estimated weight). Core indicator. Drives newborn_birth_weight_kg and newborn_low_birth_weight. Only asked if most_recent_birth_outcome = live_birth. This is the single weighing question for the delivery section; the PNC newborn signal function item (pnc_newborn_signal_weighed) is suppressed if this item is yes, to avoid double-counting."
  fr: "Si le bébé a été pesé à la naissance ou peu après. DHS-8 m19a (distingue le poids mesuré du poids rappelé/estimé). Indicateur central. Génère newborn_birth_weight_kg et newborn_low_birth_weight. Posé uniquement si most_recent_birth_outcome = live_birth. Il s'agit de la question de pesée unique pour la section accouchement ; l'item de fonction signal SPN nouveau-né (pnc_newborn_signal_weighed) est supprimé si cet item est oui, pour éviter le double comptage."
  es: "Si el bebé fue pesado al nacer o poco después. DHS-8 m19a (distingue el peso medido del peso recordado/estimado). Indicador central. Genera newborn_birth_weight_kg y newborn_low_birth_weight. Solo se pregunta si most_recent_birth_outcome = live_birth. Esta es la única pregunta de pesaje para la sección de parto; el ítem de función de señal PPN del recién nacido (pnc_newborn_signal_weighed) se suprime si este ítem es sí, para evitar el doble conteo."
type: boolean
cardinality: single
core: true
