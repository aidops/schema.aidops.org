id: shock_coping_strategy_used
maturity: draft
label:
  en: "Main coping strategy used in response to shocks"
  fr: "Principale stratégie d'adaptation utilisée en réponse aux chocs"
  es: "Principal estrategia de afrontamiento utilizada en respuesta a los choques"

definition:
  en: "The most important strategy the household used to cope with shocks reported in `shock_experienced_past_12mo`. Single-select from the `livelihood-coping-strategy` vocabulary, covering livelihood-level coping (asset sales, migration, skipping meals at the coarse level, borrowing, reducing non-food expenditure, etc.). Asked only when `shock_experienced_past_12mo` is non-empty. Drawn from the FAO RIMA-II coping module, the LSMS-ISA shocks and coping module, and the WFP Livelihood Coping Strategies (LCS) conceptual framework. Distinct from FoodSecurityProfile `lcs_*` items, which score the standard food-specific LCS set on a 30-day recall; this item captures the broader livelihood coping response over 12 months."
  fr: "La stratégie la plus importante que le ménage a utilisée pour faire face aux chocs signalés dans `shock_experienced_past_12mo`. Sélection unique dans le vocabulaire `livelihood-coping-strategy`, couvrant l'adaptation au niveau des moyens de subsistance (vente d'actifs, migration, réduction grossière de la consommation, emprunt, réduction des dépenses non alimentaires, etc.). Posée uniquement lorsque `shock_experienced_past_12mo` n'est pas vide. Tirée du module d'adaptation FAO RIMA-II, du module chocs et adaptation LSMS-ISA et du cadre conceptuel des stratégies d'adaptation des moyens de subsistance (LCS) du PAM. Distincte des items `lcs_*` de FoodSecurityProfile qui notent l'ensemble standard LCS spécifique à l'alimentation sur un rappel de 30 jours ; cet item saisit la réponse d'adaptation des moyens de subsistance plus large sur 12 mois."
  es: "La estrategia más importante que el hogar utilizó para hacer frente a los choques reportados en `shock_experienced_past_12mo`. Selección única del vocabulario `livelihood-coping-strategy`, que abarca el afrontamiento a nivel de medios de vida (venta de activos, migración, reducción gruesa del consumo, endeudamiento, reducción del gasto no alimentario, etc.). Se pregunta solo cuando `shock_experienced_past_12mo` no está vacío. Tomada del módulo de afrontamiento FAO RIMA-II, el módulo de choques y afrontamiento LSMS-ISA y el marco conceptual de Estrategias de Afrontamiento de Medios de Vida (LCS) del PMA. Distinta de los ítems `lcs_*` de FoodSecurityProfile, que puntúan el conjunto estándar LCS específico de alimentos en un recuerdo de 30 días; este ítem captura la respuesta de afrontamiento de medios de vida más amplia en 12 meses."

type: string
cardinality: single
