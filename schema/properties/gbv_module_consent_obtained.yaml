id: gbv_module_consent_obtained
maturity: draft
label:
  en: "GBV module: consent obtained"
  fr: "Module VBG : consentement obtenu"
  es: "Módulo VBG: consentimiento obtenido"

definition:
  en: >
    Boolean flag indicating whether the respondent provided informed consent to proceed with the
    GBV/Domestic Violence module after hearing the retraumatization-warning consent introduction.
    This is an additional consent step beyond the household-level consent obtained at the start of
    the survey; it supplements rather than replaces that consent. If false, all subsequent module
    properties must be recorded as missing (not as 'no'): a refusal to consent must never be
    miscoded as 'no violence experienced'. The consent introduction must include: (a) that the
    questions concern potentially distressing past experiences; (b) that the respondent may decline
    any question or stop at any time without explanation; (c) a safe-word or nonverbal signal option;
    (d) that answers will not be shared with the partner, household members, or any other person.
    Operational prerequisite: a pre-mapped referral pathway must exist before this module is fielded.
    DHS-8 DV module compatible. Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Indicateur booléen indiquant si la répondante a donné son consentement éclairé pour poursuivre
    le module VBG/Violence domestique après avoir entendu l'introduction de consentement avertissant
    du risque de retraumatisation. Si faux, toutes les propriétés du module doivent être enregistrées
    comme manquantes (pas comme 'non') : un refus de consentir ne doit jamais être recodé comme
    'aucune violence subie'. Compatible avec le module VD DHS-8.
  es: >
    Indicador booleano que indica si la encuestada dio su consentimiento informado para proceder
    con el módulo VBG/Violencia doméstica tras escuchar la introducción de consentimiento con
    advertencia de retraumatización. Si es falso, todas las propiedades del módulo deben registrarse
    como faltantes (no como 'no'): un rechazo a consentir nunca debe recodificarse como 'sin
    violencia experimentada'. Compatible con el módulo DV DHS-8.

type: boolean
cardinality: single
