id: gbv_phys_slap_lifetime
maturity: draft
label:
  en: "Physical IPV (lifetime): slapped"
  fr: "VPI physique (vie entière) : giflée"
  es: "VPI física (de por vida): bofeteada"

definition:
  en: >
    Whether the referent partner has ever slapped the respondent. DHS instrument item DV05A-ii.
    Lifetime reference period (ever). If true, the follow-up 12-month frequency property
    gbv_phys_slap_12m_freq is asked. DHS-7+ compatible. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais giflé la répondante. Item DHS DV05A-ii. Période de
    référence : à vie. Si vrai, gbv_phys_slap_12m_freq est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez abofeteó a la encuestada. Ítem DHS DV05A-ii. Período
    de referencia: de por vida. Si verdadero, se pregunta gbv_phys_slap_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
