id: fcs_fat_oil_days
maturity: draft
label:
  en: "FCS fat and oil days"
  fr: "SCA jours matières grasses"
  es: "PCA días grasas y aceites"

definition:
  en: "Number of days in the past seven during which any member of the household consumed cooking oil, butter, ghee, and other fats. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé de l'huile de cuisson, du beurre, du ghee ou d'autres matières grasses. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió aceite de cocina, mantequilla, ghee u otras grasas. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
core: true
