id: iycf_fg_dairy
maturity: draft
label:
  en: "MDD-C food group 4: dairy"
  fr: "Groupe alimentaire MDD-C 4 : produits laitiers"
  es: "Grupo alimentario MDD-C 4: lácteos"

definition:
  en: "Whether the child ate or drank any dairy product in the previous 24 hours. Food group 4 of the 8-group MDD-C framework (WHO/UNICEF 2021). Includes infant formula, animal milk (cow, goat, or other), yogurt, and cheese. Published wording: 'Yesterday during the day or at night, did (NAME) eat/drink any [dairy]?'"
  fr: "Indique si l'enfant a mangé ou bu un produit laitier au cours des 24 heures précédentes. Groupe alimentaire 4 du cadre MDD-C à 8 groupes (OMS/UNICEF 2021). Comprend le lait maternisé, le lait animal (vache, chèvre ou autre), le yaourt et le fromage."
  es: "Indica si el niño comió o bebió algún producto lácteo en las 24 horas anteriores. Grupo alimentario 4 del marco MDD-C de 8 grupos (OMS/UNICEF 2021). Incluye fórmula infantil, leche animal (vaca, cabra u otra), yogur y queso."

type: boolean
