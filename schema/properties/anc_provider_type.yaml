id: anc_provider_type
maturity: draft
label:
  en: ANC provider type (highest qualified)
  fr: "Type de prestataire CPN (le plus qualifié)"
  es: "Tipo de proveedor APN (más calificado)"
definition:
  en: "The category of the highest-qualified provider who delivered antenatal care during the most recent pregnancy. DHS-8 m2a–m2n series; MICS6 MN2. When multiple provider types were seen, the highest-qualified is recorded (doctor > nurse/midwife > auxiliary midwife > CHW > TBA > other). Only asked if anc_any_visit = yes. Derives anc_skilled_provider."
  fr: "La catégorie du prestataire le plus qualifié ayant dispensé les soins prénataux pendant la grossesse la plus récente. Série DHS-8 m2a–m2n ; MICS6 MN2. Lorsque plusieurs types de prestataires ont été consultés, le plus qualifié est enregistré (médecin > infirmière/sage-femme > sage-femme auxiliaire > ASC > accoucheuse traditionnelle > autre). Posé uniquement si anc_any_visit = oui. Dérive anc_skilled_provider."
  es: "La categoría del proveedor más calificado que brindó atención prenatal durante el embarazo más reciente. Serie DHS-8 m2a–m2n; MICS6 MN2. Cuando se consultaron múltiples tipos de proveedores, se registra el más calificado (médico > enfermera/partera > partera auxiliar > ASC > partera tradicional > otro). Solo se pregunta si anc_any_visit = sí. Deriva anc_skilled_provider."
type: string
cardinality: single
core: true
vocabulary: maternity-care-provider
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
