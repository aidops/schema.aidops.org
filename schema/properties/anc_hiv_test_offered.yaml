id: anc_hiv_test_offered
maturity: draft
label:
  en: HIV test offered during ANC
  fr: "Test VIH proposé lors des CPN"
  es: "Prueba de VIH ofrecida durante la APN"
definition:
  en: "Whether the woman was offered an HIV test during antenatal care for the most recent pregnancy. DHS-8 country-specific HIV testing at ANC variables; MICS6 MN4–MN5. Elimination of mother-to-child transmission (EMTCT) indicator. Ethically sensitive: include only where HIV testing at ANC is programmatic and appropriate per country and programme context. Suppress in low-prevalence settings without a PMTCT programme. Only asked if anc_any_visit = yes."
  fr: "Si la femme s'est vu proposer un test de dépistage du VIH lors des soins prénataux pour la grossesse la plus récente. Variables de dépistage VIH lors des CPN spécifiques au pays DHS-8 ; MICS6 MN4–MN5. Indicateur d'élimination de la transmission mère-enfant (ETME). Sensible sur le plan éthique : à inclure uniquement là où le test VIH lors des CPN est programmatique et approprié selon le contexte du pays et du programme. Supprimer dans les contextes à faible prévalence sans programme PTME. Posé uniquement si anc_any_visit = oui."
  es: "Si se le ofreció a la mujer una prueba de VIH durante la atención prenatal para el embarazo más reciente. Variables de prueba de VIH en APN específicas por país de DHS-8; MICS6 MN4–MN5. Indicador de eliminación de la transmisión materno-infantil (ETMI). Éticamente sensible: incluir solo donde la prueba de VIH en APN sea programática y apropiada según el contexto del país y del programa. Suprimir en entornos de baja prevalencia sin programa PTMI. Solo se pregunta si anc_any_visit = sí."
type: boolean
cardinality: single
core: false
