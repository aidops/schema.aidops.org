id: sanitation_pit_last_emptied
maturity: draft
label:
  en: "When pit/tank last emptied"
  fr: "Quand la fosse/le réservoir a été vidangé pour la dernière fois"
  es: "Cuándo fue vaciada la fosa/el depósito por última vez"

definition:
  en: "Time since the on-site sanitation containment (pit latrine, septic tank, or composting toilet) was last emptied. Asked only for on-site sanitation types: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Regular emptying and safe treatment is a criterion for the safely managed sanitation rung. Based on MICS6 pilot question WS8A."
  fr: "Temps écoulé depuis le dernier vidange du dispositif d'assainissement sur site (latrine à fosse, fosse septique ou toilettes à compostage). Demandé uniquement pour les types d'assainissement sur site : flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. Un vidange régulier et un traitement sûr sont un critère pour le niveau d'assainissement à gestion sécurisée. Basé sur la question pilote MICS6 WS8A."
  es: "Tiempo transcurrido desde que se vació el contenedor de saneamiento en el sitio (letrina de fosa, fosa séptica o inodoro de compostaje). Preguntado solo para tipos de saneamiento en el sitio: flush_to_septic_tank, flush_to_pit_latrine, ventilated_improved_pit, pit_latrine_with_slab, pit_latrine_without_slab, composting_toilet. El vaciado regular y el tratamiento seguro es un criterio para el peldaño de saneamiento con gestión segura. Basado en la pregunta piloto MICS6 WS8A."

type: string
cardinality: single
core: false
vocabulary: sanitation-emptying-timing
references: null
category: sanitation
valid_instruments: [mics6, mics7]
