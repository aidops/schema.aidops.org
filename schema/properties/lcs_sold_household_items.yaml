label:
  en: "LCS sold household items"
  fr: "SCM vente de biens ménagers"
  es: "EMV venta de artículos del hogar"

definition:
  en: "Frequency with which the household sold household items (furniture, radio, jewellery) to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, stress tier."
  fr: "Fréquence à laquelle le ménage a vendu des biens ménagers (meubles, radio, bijoux) pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de stress."
  es: "Frecuencia con la que el hogar vendió artículos del hogar (muebles, radio, joyas) para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de estrés."

