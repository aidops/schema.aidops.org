id: ari_symptom_classification
maturity: draft
label:
  en: "ARI symptoms present"
  fr: "Symptômes d'IRA présents"
  es: "Síntomas de IRA presentes"

definition:
  en: "Derived indicator: whether the child meets the DHS/MICS definition of ARI (acute respiratory infection) symptoms — cough accompanied by fast or difficult breathing that is chest-related. True when ari_cough_last_2wks is true AND (ari_fast_breathing is true OR ari_difficult_breathing is true). This is a caregiver-reported proxy for pneumonia, not a clinical diagnosis. Used as the denominator filter for ARI care-seeking and antibiotic use indicators. Computed in-form via a calculate field."
  fr: "Indicateur dérivé : si l'enfant satisfait à la définition DHS/MICS des symptômes d'IRA (infection respiratoire aiguë) — toux accompagnée d'une respiration rapide ou difficile d'origine thoracique. Vrai lorsque ari_cough_last_2wks est vrai ET (ari_fast_breathing est vrai OU ari_difficult_breathing est vrai). Il s'agit d'un indicateur proxy rapporté par le soignant pour la pneumonie, et non d'un diagnostic clinique. Utilisé comme filtre de dénominateur pour les indicateurs de recours aux soins pour l'IRA et d'utilisation des antibiotiques. Calculé dans le formulaire via un champ calculate."
  es: "Indicador derivado: si el niño cumple la definición DHS/MICS de síntomas de IRA (infección respiratoria aguda) — tos acompañada de respiración rápida o dificultosa de origen torácico. Verdadero cuando ari_cough_last_2wks es verdadero Y (ari_fast_breathing es verdadero O ari_difficult_breathing es verdadero). Este es un indicador proxy reportado por el cuidador para neumonía, no un diagnóstico clínico. Usado como filtro de denominador para los indicadores de búsqueda de atención por IRA y uso de antibióticos. Calculado en el formulario mediante un campo calculate."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: ari
sensitivity: sensitive
