id: rope_or_fastening_present
maturity: draft
label:
  en: "Rope or fastening materials available"
  fr: "Corde ou matériaux de fixation disponibles"
  es: "Cuerda o materiales de fijación disponibles"

definition:
  en: "Whether the household has rope, wire, or fastening materials available for shelter maintenance. Sphere Standard 4; corresponds to the rope_fixings code in the nfi-item-type vocabulary (rope, wire, nails or similar fixings required to erect emergency shelter)."
  fr: "Si le ménage dispose de corde, de fil de fer ou de matériaux de fixation pour l'entretien de l'abri. Norme Sphère 4 ; correspond au code rope_fixings du vocabulaire nfi-item-type (corde, fil de fer, clous ou fixations similaires nécessaires à l'érection d'un abri d'urgence)."
  es: "Si el hogar tiene cuerda, alambre o materiales de fijación disponibles para el mantenimiento del refugio. Norma Esfera 4; corresponde al código rope_fixings del vocabulario nfi-item-type (cuerda, alambre, clavos o fijaciones similares necesarias para erigir un refugio de emergencia)."

