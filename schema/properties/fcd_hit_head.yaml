id: fcd_hit_head
maturity: draft
label:
  en: "Discipline — hit or slapped on face, head, or ears"
  fr: "Discipline — frappé ou giflé sur le visage, la tête ou les oreilles"
  es: "Disciplina — golpeó o abofeteó en cara, cabeza u orejas"
definition:
  en: "Whether any adult in the household hit or slapped the selected child on the face, head, or ears, in the past month. MICS 6 FCD2 item I. Severe physical punishment category. Included in the CP.3 violent-discipline composite and the severe-physical sub-indicator."
  fr: "Si un adulte du ménage a frappé ou giflé l'enfant sélectionné sur le visage, la tête ou les oreilles, au cours du mois écoulé. MICS 6 FCD2 item I. Catégorie de punition physique sévère. Inclus dans le composite CP.3 de discipline violente et le sous-indicateur de punition physique sévère."
  es: "Si algún adulto del hogar golpeó o abofeteó al niño seleccionado en la cara, cabeza u orejas, en el último mes. MICS 6 FCD2 ítem I. Categoría de castigo físico severo. Incluido en el compuesto CP.3 de disciplina violenta y en el subindicador de castigo físico severo."
type: boolean
cardinality: single
