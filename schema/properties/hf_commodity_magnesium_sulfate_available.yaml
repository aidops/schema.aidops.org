id: hf_commodity_magnesium_sulfate_available
maturity: draft
label:
  en: "Injectable magnesium sulfate available and within expiry"
  fr: "Sulfate de magnésium injectable disponible et non périmé"
  es: "Sulfato de magnesio inyectable disponible y vigente"

definition:
  en: "Whether injectable magnesium sulfate (50%, 10 ml vial) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA tracer; MISP; WHO EML. First-line treatment for eclampsia. `not_applicable` when the facility does not manage obstetric emergencies. Sensitive: stock-out reporting is politically sensitive."
  fr: "Si le sulfate de magnésium injectable (50 %, flacon de 10 ml) est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA ; MISP ; EML de l'OMS. Traitement de première ligne de l'éclampsie. `not_applicable` lorsque l'établissement ne prend pas en charge les urgences obstétricales. Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si el sulfato de magnesio inyectable (50%, vial de 10 ml) está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA; MISP; EML de la OMS. Tratamiento de primera línea para eclampsia. `not_applicable` cuando el establecimiento no maneja emergencias obstétricas. Sensible: el reporte de desabastecimientos es políticamente sensible."

type: string
cardinality: single
core: true
vocabulary: yes-no-na
