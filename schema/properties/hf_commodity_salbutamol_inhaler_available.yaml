id: hf_commodity_salbutamol_inhaler_available
maturity: draft
label:
  en: "Salbutamol inhaler available and within expiry"
  fr: "Inhalateur de salbutamol disponible et non périmé"
  es: "Inhalador de salbutamol disponible y vigente"

definition:
  en: "Whether a salbutamol inhaler (100 mcg/dose) is available today on the shelf and within valid expiration date. Observed by the enumerator. SARA NCD tracer; WHO EML. Core tracer for asthma and COPD management. Extended (non-core). Sensitive: stock-out reporting is politically sensitive."
  fr: "Si un inhalateur de salbutamol (100 mcg/dose) est disponible aujourd'hui en rayon et dans son délai de péremption. Observé par l'enquêteur. Indicateur traceur SARA MNT ; EML de l'OMS. Indicateur traceur central pour la prise en charge de l'asthme et de la BPCO. Étendu (non-core). Sensible : le reporting des ruptures de stock est politiquement sensible."
  es: "Si un inhalador de salbutamol (100 mcg/dosis) está disponible hoy en estantería y dentro de fecha de vencimiento válida. Observado por el enumerador. Indicador trazador SARA ENT; EML de la OMS. Indicador trazador central para el manejo de asma y EPOC. Extendido (no-core). Sensible: el reporte de desabastecimientos es políticamente sensible."

