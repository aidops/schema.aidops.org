id: fp_reason_not_using
maturity: draft
label:
  en: "Main reason for not using any contraceptive method"
  fr: "Principale raison de ne pas utiliser de méthode contraceptive"
  es: "Razón principal para no usar ningún método anticonceptivo"

definition:
  en: "The main reason the woman is not using any contraceptive method (DHS non-use questions). Ask only if fp_using_any_method = false AND woman is in the need group (fecund, sexually active, not wanting a pregnancy soon). Enumerators do not prompt with response options; they record the spontaneous first response, then ask 'any other reason?'"
  fr: "La principale raison pour laquelle la femme n'utilise pas de méthode contraceptive (questions DHS sur la non-utilisation). Demander uniquement si fp_using_any_method = faux ET la femme fait partie du groupe ayant besoin (féconde, sexuellement active, ne souhaitant pas de grossesse prochainement). Les enquêteurs ne suggèrent pas d'options de réponse ; ils enregistrent la première réponse spontanée, puis demandent « Y a-t-il une autre raison ? »"
  es: "La razón principal por la que la mujer no usa ningún método anticonceptivo (preguntas DHS de no uso). Preguntar solo si fp_using_any_method = falso Y la mujer está en el grupo con necesidad (fecunda, sexualmente activa, no quiere un embarazo pronto). Los encuestadores no sugieren opciones de respuesta; registran la primera respuesta espontánea, luego preguntan '¿alguna otra razón?'"

type: string
cardinality: single
core: false
vocabulary: fp-nonuse-reason
references: null
category: unmet_need
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [dhs_women]
