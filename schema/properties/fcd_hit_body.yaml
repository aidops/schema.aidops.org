id: fcd_hit_body
maturity: draft
label:
  en: "Discipline — hit with object (belt, hairbrush, stick)"
  fr: "Discipline — frappé avec un objet (ceinture, brosse à cheveux, bâton)"
  es: "Disciplina — golpeó con un objeto (cinturón, cepillo, palo)"
definition:
  en: "Whether any adult in the household hit the selected child on the bottom or elsewhere on the body with something like a belt, hairbrush, stick, or other hard object, in the past month. MICS 6 FCD2 item G. Severe physical punishment category. Included in the CP.3 violent-discipline composite and the severe-physical sub-indicator."
  fr: "Si un adulte du ménage a frappé l'enfant sélectionné sur les fesses ou ailleurs sur le corps avec quelque chose comme une ceinture, une brosse à cheveux, un bâton ou un autre objet dur, au cours du mois écoulé. MICS 6 FCD2 item G. Catégorie de punition physique sévère. Inclus dans le composite CP.3 de discipline violente et dans le sous-indicateur de punition physique sévère."
  es: "Si algún adulto del hogar golpeó al niño seleccionado en las nalgas o en otra parte del cuerpo con algo como un cinturón, cepillo, palo u otro objeto duro, en el último mes. MICS 6 FCD2 ítem G. Categoría de castigo físico severo. Incluido en el compuesto CP.3 de disciplina violenta y en el subindicador de castigo físico severo."
type: boolean
cardinality: single
