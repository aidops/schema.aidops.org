id: lcs_reduced_essential_nonfood
maturity: draft
label:
  en: "LCS reduced essential non-food spending"
  fr: "SCM réduction dépenses non alimentaires essentielles"
  es: "EMV reducción de gastos no alimentarios esenciales"

definition:
  en: "Frequency with which the household reduced essential non-food spending, specifically health care, preventing access to needed treatment in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier. Country adaptations vary on whether reductions in education spending sit here (crisis, when the reduction compromises schooling) or in the stress tier; operations should contextualise the tier assignment per country."
  fr: "Fréquence à laquelle le ménage a réduit ses dépenses non alimentaires essentielles, plus précisément les soins de santé, empêchant l'accès aux traitements nécessaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise. Les adaptations par pays varient sur le positionnement des réductions de dépenses d'éducation ici (crise, lorsque la réduction compromet la scolarité) ou au niveau stress ; les opérations doivent contextualiser l'affectation par pays."
  es: "Frecuencia con la que el hogar redujo gastos no alimentarios esenciales, específicamente la atención sanitaria, impidiendo el acceso al tratamiento necesario en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis. Las adaptaciones por país varían sobre si las reducciones del gasto en educación se ubican aquí (crisis, cuando la reducción compromete la escolarización) o en el nivel estrés; las operaciones deben contextualizar la asignación por país."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
