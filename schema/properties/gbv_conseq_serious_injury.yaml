id: gbv_conseq_serious_injury
maturity: draft
label:
  en: "Physical consequence: deep wounds, broken bones, broken teeth, or other serious injury"
  fr: "Conséquence physique : blessures profondes, fractures, dents cassées ou autre blessure grave"
  es: "Consecuencia física: heridas profundas, huesos rotos, dientes rotos u otra lesión grave"

definition:
  en: >
    Whether the respondent has ever had deep wounds, broken bones, broken teeth, or any other
    serious injury as a result of partner violence. DHS instrument item DV08c. Lifetime reference
    period (ever, as a result of violence by the referent partner). Asked only of respondents who
    reported at least one physical or sexual IPV act. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si la répondante a jamais eu des blessures profondes, fractures, dents cassées ou toute autre
    blessure grave à la suite de violences conjugales. Item DHS DV08c. Période de référence : à vie.
  es: >
    Si la encuestada alguna vez tuvo heridas profundas, huesos rotos, dientes rotos u otra lesión
    grave como resultado de violencia de pareja. Ítem DHS DV08c. Período de referencia: de por vida.

type: boolean
cardinality: single
