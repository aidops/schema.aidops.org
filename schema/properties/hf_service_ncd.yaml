id: hf_service_ncd
maturity: draft
label:
  en: "Offers routine care for at least one major NCD"
  fr: "Offre des soins de routine pour au moins une MNT majeure"
  es: "Ofrece atención de rutina para al menos una ENT mayor"

definition:
  en: "Whether the facility offers routine care for at least one major non-communicable disease: hypertension, diabetes, asthma or COPD, or epilepsy. Reported by the facility in-charge. SARA and HHFA NCD readiness tracers. Extended (non-core)."
  fr: "Si l'établissement offre des soins de routine pour au moins une maladie non transmissible majeure : hypertension, diabète, asthme ou BPCO, ou épilepsie. Rapporté par le responsable de l'établissement. Indicateurs traceurs SARA et HHFA de préparation MNT. Étendu (non-core)."
  es: "Si el establecimiento ofrece atención de rutina para al menos una enfermedad no transmisible mayor: hipertensión, diabetes, asma o EPOC, o epilepsia. Reportado por el responsable del establecimiento. Indicadores trazadores SARA y HHFA de preparación ENT. Extendido (no-core)."

type: boolean
cardinality: single
