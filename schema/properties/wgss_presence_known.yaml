id: wgss_presence_known
maturity: draft
label:
  en: "Women and Girls Safe Space: presence known"
  fr: "Espace sûr pour femmes et filles : présence connue"
  es: "Espacio seguro para mujeres y niñas: presencia conocida"

definition:
  en: "Whether the household head or adult member is aware of a Women and Girls Safe Space (WGSS) within the site or accessible to the household. Asks about awareness of presence and accessibility from the household's perspective (distance, whether women are permitted to attend). Does NOT ask about use. WGSS are a UNFPA Minimum Standard (Standard 7) and a GBV AoR core indicator; they serve as the primary entry point for GBV survivors to access services without formal disclosure."
  fr: "Si le chef de ménage ou un adulte du ménage a connaissance d'un Espace sûr pour femmes et filles (ESFMF) au sein du site ou accessible au ménage. Porte sur la connaissance de la présence et de l'accessibilité du point de vue du ménage (distance, si les femmes sont autorisées à y assister). Ne pose PAS de questions sur l'utilisation. Les ESFMF sont une Norme minimale UNFPA (Norme 7) et un indicateur central du GBV AoR ; ils constituent le principal point d'entrée pour les survivant·es VBG pour accéder aux services sans divulgation formelle."
  es: "Si la persona jefa del hogar o un adulto del hogar tiene conocimiento de un Espacio Seguro para Mujeres y Niñas (ESMN) dentro del sitio o accesible para el hogar. Pregunta sobre el conocimiento de la presencia y accesibilidad desde la perspectiva del hogar (distancia, si se permite asistir a las mujeres). NO pregunta sobre el uso. Los ESMN son un Estándar Mínimo de UNFPA (Estándar 7) e indicador central del GBV AoR; sirven como punto de entrada principal para que sobrevivientes de VBG accedan a servicios sin divulgación formal."

type: string
cardinality: single
vocabulary: yes-no-dk
references: null
category: gbv_services
core: false
sensitivity: sensitive
