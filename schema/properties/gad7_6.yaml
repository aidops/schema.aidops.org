id: gad7_6
maturity: draft
label:
  en: "GAD-7 item 6: easily annoyed or irritable"
  fr: "GAD-7 item 6 : facilement contrarié·e ou irritable"
  es: "GAD-7 ítem 6: fácilmente molesto o irritable"

definition:
  en: "Frequency with which, over the last two weeks, the respondent has been bothered by becoming easily annoyed or irritable. GAD-7 item 6, measuring irritability. Scoring value 0 (not at all) to 3 (nearly every day)."
  fr: "Fréquence à laquelle, au cours des deux dernières semaines, la répondant·e a été gêné·e par le fait d'être facilement contrarié·e ou irritable. GAD-7 item 6, mesurant l'irritabilité. Valeur de notation : 0 (pas du tout) à 3 (presque tous les jours)."
  es: "Frecuencia con la que, durante las últimas dos semanas, la persona encuestada ha sido molestada por estar fácilmente molesta o irritable. Ítem 6 del GAD-7, que mide la irritabilidad. Valor de puntuación: 0 (en absoluto) a 3 (casi todos los días)."

