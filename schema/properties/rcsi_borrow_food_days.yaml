id: rcsi_borrow_food_days
maturity: draft
label:
  en: "rCSI borrow food days"
  fr: "Jours rCSI emprunt alimentaire"
  es: "rCSI días préstamo de alimentos"

definition:
  en: "Number of days in the past seven during which the household borrowed food or relied on help from friends or relatives. Part of the WFP/CARE Reduced Coping Strategies Index (rCSI)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels le ménage a emprunté de la nourriture ou a compté sur l'aide d'amis ou de proches. Fait partie de l'Indice réduit des stratégies d'adaptation (rCSI) du PAM/CARE."
  es: "Número de días en los últimos siete en que el hogar pidió alimentos prestados o dependió de la ayuda de amigos o familiares. Forma parte del Índice de Estrategias de Afrontamiento Reducido (rCSI) del PMA/CARE."

type: integer
cardinality: single
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_rcsi, wfp_cari]
