id: whom5_1
maturity: draft
label:
  en: "WHO-5 item 1: cheerful and in good spirits"
  fr: "WHO-5 item 1 : joyeux et de bonne humeur"
  es: "WHO-5 ítem 1: alegre y de buen ánimo"

definition:
  en: "Frequency with which the respondent has felt cheerful and in good spirits over the last two weeks. Item 1 of the WHO-5 Well-Being Index. Higher response values indicate better well-being; the numeric value assigned by the WHO-5 scoring card ranges from 0 (at no time) to 5 (all of the time)."
  fr: "Fréquence à laquelle la répondant·e s'est senti·e joyeux·se et de bonne humeur au cours des deux dernières semaines. Item 1 de l'Indice de bien-être WHO-5. Des valeurs de réponse plus élevées indiquent un meilleur bien-être ; la valeur numérique attribuée par la grille de notation WHO-5 va de 0 (à aucun moment) à 5 (tout le temps)."
  es: "Frecuencia con la que la persona encuestada se ha sentido alegre y de buen ánimo durante las últimas dos semanas. Ítem 1 del Índice de Bienestar WHO-5. Valores de respuesta más altos indican mejor bienestar; el valor numérico asignado por la tarjeta de puntuación WHO-5 va de 0 (en ningún momento) a 5 (todo el tiempo)."

