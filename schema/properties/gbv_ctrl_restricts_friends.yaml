id: gbv_ctrl_restricts_friends
maturity: draft
label:
  en: "Controlling behavior: does not permit meeting female friends"
  fr: "Comportement de contrôle : interdit de rencontrer des amies"
  es: "Comportamiento controlador: no permite ver amigas"

definition:
  en: >
    Whether the referent partner does not or did not permit the respondent to meet her female
    friends. DHS instrument item DV03c. Reference period: ever (relationship pattern). Response
    options use the yes-no-dk vocabulary. DHS-7+ compatible. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent ne permet pas ou ne permettait pas à la répondante de rencontrer
    ses amies. Item DHS DV03c. Période de référence : toujours (schéma relationnel). Options de
    réponse : vocabulaire yes-no-dk. Compatible DHS-7+.
  es: >
    Si el compañero referente no permite o no permitía a la encuestada ver a sus amigas.
    Ítem DHS DV03c. Período de referencia: alguna vez (patrón relacional). Opciones de respuesta:
    vocabulario yes-no-dk. Compatible DHS-7+.

type: string
cardinality: single
vocabulary: yes-no-dk
references: null
category: gbv_controlling
core: false
sensitivity: restricted
