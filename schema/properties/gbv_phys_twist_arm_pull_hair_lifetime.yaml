id: gbv_phys_twist_arm_pull_hair_lifetime
maturity: draft
label:
  en: "Physical IPV (lifetime): arm twisted or hair pulled"
  fr: "VPI physique (vie entière) : bras tordu ou cheveux tirés"
  es: "VPI física (de por vida): brazo torcido o cabello jalado"

definition:
  en: >
    Whether the referent partner has ever twisted the respondent's arm or pulled her hair.
    DHS instrument item DV05A-iii. Lifetime reference period (ever). If true, the follow-up
    12-month frequency property gbv_phys_twist_arm_pull_hair_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais tordu le bras de la répondante ou tiré ses cheveux. Item
    DHS DV05A-iii. Période de référence : à vie. Si vrai, gbv_phys_twist_arm_pull_hair_12m_freq
    est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez torció el brazo de la encuestada o jaló su cabello.
    Ítem DHS DV05A-iii. Período de referencia: de por vida. Si verdadero, se pregunta
    gbv_phys_twist_arm_pull_hair_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
