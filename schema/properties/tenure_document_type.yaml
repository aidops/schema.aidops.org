id: tenure_document_type
maturity: draft
label:
  en: "Tenure document type"
  fr: "Type de document d'occupation"
  es: "Tipo de documento de tenencia"

definition:
  en: "The type of agreement or document the household holds for the shelter it currently occupies. Sphere Standard 6 key indicator: percentage of shelter recipients that have an appropriate agreement for security of tenure for their shelter option. Based on Sphere Standard 6 guidance and the UNHCR Housing, Land and Property (HLP) framework."
  fr: "Le type d'accord ou de document que le ménage détient pour l'abri qu'il occupe actuellement. Indicateur clé de la Norme Sphère 6 : pourcentage de bénéficiaires d'abri ayant un accord approprié pour la sécurité d'occupation de leur option d'abri. Basé sur les orientations de la Norme Sphère 6 et le cadre HLP du HCR."
  es: "El tipo de acuerdo o documento que el hogar posee para el refugio que ocupa actualmente. Indicador clave de la Norma Esfera 6: porcentaje de receptores de refugio que tienen un acuerdo apropiado para la seguridad de tenencia de su opción de refugio. Basado en la orientación de la Norma Esfera 6 y el marco HLP del ACNUR."

type: string
cardinality: single
vocabulary: shelter-tenure-document
references: null
category: shelter
core: true
sensitivity: sensitive
valid_instruments: [sphere_shelter_adequacy, unhcr_nare, gsc_standardised]
