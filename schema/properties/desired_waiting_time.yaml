id: desired_waiting_time
maturity: draft
label:
  en: "Desired waiting time before next birth (months)"
  fr: "Délai d'attente souhaité avant la prochaine naissance (mois)"
  es: "Tiempo de espera deseado antes del próximo nacimiento (meses)"

definition:
  en: "How long the woman would like to wait from now before the birth of her next child, recorded in months. Ask only if desire_more_children = 'want_later'. Capture the unit stated (months or years) and convert to months internally. DHS codes non-numeric responses ('up to God', 'as many as come') separately in ideal_number_of_children; here record only if a numeric duration is given."
  fr: "Combien de temps la femme souhaiterait attendre à partir de maintenant avant la naissance de son prochain enfant, enregistré en mois. Demander uniquement si desire_more_children = 'want_later'. Capturer l'unité déclarée (mois ou années) et convertir en mois en interne. Le DHS code séparément les réponses non numériques dans ideal_number_of_children ; ici, enregistrer uniquement si une durée numérique est donnée."
  es: "Cuánto tiempo desearía esperar la mujer desde ahora antes del nacimiento de su próximo hijo, registrado en meses. Preguntar solo si desire_more_children = 'want_later'. Capturar la unidad declarada (meses o años) y convertir a meses internamente. El DHS codifica las respuestas no numéricas por separado en ideal_number_of_children; aquí registrar solo si se da una duración numérica."

type: integer
cardinality: single
core: false
vocabulary: null
references: null
category: fertility_preferences
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [dhs_women]
