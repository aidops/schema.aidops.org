id: recall_period_days
maturity: draft
label:
  en: "Recall period days"
  fr: "Jours de période de rappel"
  es: "Días del período de referencia"

definition:
  en: "Number of days of recall for instrument items that allow a variable reference period, primarily FIES (commonly 30 or 365 days) and HDDS/WDDS variants. May be omitted when the reference period is fixed by the instrument protocol, but populating it explicitly is valid and can aid data quality verification. Canonical recall periods by instrument: FCS 7 days, rCSI 7 days, HDDS 1 day, MDD-W 1 day, FIES 30 days (operational monitoring) or 365 days (SDG 2.1.2), HHS 30 days, LCS 30 days, MAHFP 12 months. Multi-instrument profiles pick one value, typically the longest."
  fr: "Nombre de jours de rappel pour les items d'instruments permettant une période de référence variable, principalement FIES (couramment 30 ou 365 jours) et les variantes HDDS/MDD-W. Peut être omis lorsque la période de référence est fixée par le protocole de l'instrument, mais le renseigner explicitement est valide et peut faciliter la vérification de la qualité des données. Périodes de rappel canoniques par instrument : FCS 7 jours, rCSI 7 jours, HDDS 1 jour, MDD-W 1 jour, FIES 30 jours (suivi opérationnel) ou 365 jours (ODD 2.1.2), HHS 30 jours, LCS 30 jours, MAHFP 12 mois. Les profils multi-instruments choisissent une valeur, généralement la plus longue."
  es: "Número de días de recordatorio para los ítems de instrumentos que permiten un período de referencia variable, principalmente FIES (comúnmente 30 o 365 días) y variantes HDDS/MDD-W. Puede omitirse cuando el período de referencia está fijado por el protocolo del instrumento, pero registrarlo explícitamente es válido y puede facilitar la verificación de calidad de datos. Períodos de recordatorio canónicos por instrumento: FCS 7 días, rCSI 7 días, HDDS 1 día, MDD-W 1 día, FIES 30 días (monitoreo operativo) o 365 días (ODS 2.1.2), HHS 30 días, LCS 30 días, MAHFP 12 meses. Los perfiles multi-instrumento eligen un valor, generalmente el más largo."

type: integer
cardinality: single
