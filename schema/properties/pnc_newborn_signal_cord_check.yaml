id: pnc_newborn_signal_cord_check
maturity: draft
label:
  en: "Newborn PNC signal: umbilical cord examined"
  fr: "Signal PNC nouveau-né : cordon ombilical examiné"
  es: "Señal PPN recién nacido: cordón umbilical examinado"
definition:
  en: "Whether the health worker examined the baby's umbilical cord during the check in the first 2 days after birth. DHS-8 m78a. Newborn signal function 1 of 5. Only asked if pnc_newborn_any_check = yes and pnc_newborn_timing is within 2 days. Per DHS-8 convention, signal functions are only asked for checks occurring within the first 2 days."
  fr: "Si l'agent de santé a examiné le cordon ombilical du bébé lors du contrôle dans les 2 premiers jours suivant la naissance. DHS-8 m78a. Fonction signal nouveau-né 1 sur 5. Posé uniquement si pnc_newborn_any_check = oui et pnc_newborn_timing est dans les 2 jours. Selon la convention DHS-8, les fonctions signal ne sont posées que pour les contrôles effectués dans les 2 premiers jours."
  es: "Si el trabajador de salud examinó el cordón umbilical del bebé durante la revisión en los primeros 2 días después del parto. DHS-8 m78a. Función de señal del recién nacido 1 de 5. Solo se pregunta si pnc_newborn_any_check = sí y pnc_newborn_timing está dentro de los 2 días. Según la convención DHS-8, las funciones de señal solo se preguntan para revisiones que ocurren dentro de los primeros 2 días."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: postnatal_care
age_applicability:
  - adult
sensitivity: sensitive
