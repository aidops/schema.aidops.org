id: fcs_vegetables_days
maturity: draft
label:
  en: "FCS vegetables days"
  fr: "SCA jours légumes"
  es: "PCA días verduras"

definition:
  en: "Number of days in the past seven during which any member of the household consumed vegetables and green leaves. Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé des légumes et des feuilles vertes. Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió verduras y hojas verdes. Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_fcs, wfp_cari]
