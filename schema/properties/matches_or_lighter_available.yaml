label:
  en: "Matches or lighter available"
  fr: "Allumettes ou briquet disponibles"
  es: "Fósforos o encendedor disponibles"

definition:
  en: "Whether the household currently has matches or a lighter to ignite the cooking stove or fire. Sphere Standard 3 guidance on ignition consumables. UNHCR CRI: matches are listed as a renewable NFI requiring regular resupply."
  fr: "Si le ménage dispose actuellement d'allumettes ou d'un briquet pour allumer le foyer de cuisson ou le feu. Orientation de la Norme Sphère 3 sur les consommables d'allumage. HCR CRI : les allumettes sont listées comme un ANA renouvelable nécessitant un réapprovisionnement régulier."
  es: "Si el hogar tiene actualmente fósforos o un encendedor para encender la cocina o el fuego. Orientación de la Norma Esfera 3 sobre consumibles de ignición. ACNUR CRI: los fósforos están listados como un ANF renovable que requiere reabastecimiento regular."

