id: books_at_home
maturity: draft
label:
  en: Books available at home for child
  fr: "Livres disponibles à domicile pour l'enfant"
  es: "Libros disponibles en el hogar para el niño"
definition:
  en: "The number of books available at home for the child to read, excluding school textbooks and holy books. Collected as an ordinal count: 0 (none), 1-9 (one to nine), 10+ (ten or more). Ask only if attended_current_year is Yes. Source: MICS6 PR3."
  fr: "Le nombre de livres disponibles à domicile pour que l'enfant lise, à l'exclusion des manuels scolaires et des livres saints. Collecté comme un décompte ordinal : 0 (aucun), 1-9 (un à neuf), 10+ (dix ou plus). À poser uniquement si attended_current_year est Oui. Source : MICS6 PR3."
  es: "El número de libros disponibles en el hogar para que el niño lea, excluyendo los libros de texto escolares y los libros sagrados. Recopilado como un conteo ordinal: 0 (ninguno), 1-9 (uno a nueve), 10+ (diez o más). Preguntar solo si attended_current_year es Sí. Fuente: MICS6 PR3."
type: integer
cardinality: single
core: false
