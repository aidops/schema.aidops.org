id: vacc_opv0
maturity: draft
label:
  en: "OPV birth dose (OPV0) vaccination status"
  fr: "Statut vaccinal VPO dose de naissance (VPO0)"
  es: "Estado de vacunación VPO dosis neonatal (VPO0)"

definition:
  en: "Whether the child received the oral polio vaccine birth dose (OPV0) at birth or in the first week of life. Published recall wording: 'Were drops given in the mouth at birth or in the first week of life to protect against polio?' OPV0 is distinct from the subsequent OPV1/2/3 primary series; it is excluded from the 'fully vaccinated basic antigens' indicator but is included in the WHO EPI schedule as a birth dose. DHS code h6; MICS code IM3a."
  fr: "Si l'enfant a reçu la dose de naissance du vaccin antipoliomyélitique oral (VPO0) à la naissance ou dans la première semaine de vie. Formulation de rappel publiée : « Des gouttes ont-elles été données par voie orale à la naissance ou dans la première semaine de vie pour protéger contre la polio ? » Le VPO0 est distinct de la série primaire VPO1/2/3 ; il est exclu de l'indicateur « antigènes de base vaccinés complètement » mais est inclus dans le calendrier EPI de l'OMS comme dose de naissance. Code DHS h6 ; code MICS IM3a."
  es: "Si el niño recibió la dosis neonatal de vacuna antipoliomielítica oral (VPO0) al nacer o en la primera semana de vida. Redacción de recordatorio publicada: '¿Se dieron gotas por vía oral al nacer o en la primera semana de vida para proteger contra la polio?' El VPO0 es distinto de la serie primaria VPO1/2/3; está excluido del indicador de 'completamente vacunado con antígenos básicos' pero está incluido en el calendario EPI de la OMS como dosis neonatal. Código DHS h6; código MICS IM3a."

