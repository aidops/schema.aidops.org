id: hh_owns_livestock
maturity: draft
label:
  en: "Household owns livestock, poultry, or other farm animals"
  fr: "Le ménage possède du bétail, de la volaille ou d'autres animaux de ferme"
  es: "El hogar posee ganado, aves de corral u otros animales de granja"

definition:
  en: "Whether the household currently owns any livestock, poultry, or other farm animals. Gateway item for the livestock block; livestock_counts, livestock_stress_sale_past_season, and livestock_vet_access skip when this is `no` or `dont_know`. Wording drawn from DHS-8 `hv246` ('Does your household own any livestock, herds, or farm animals?'). `dont_know` is retained as a distinct valid response."
  fr: "Si le ménage possède actuellement du bétail, de la volaille ou d'autres animaux de ferme. Question porte d'entrée du bloc bétail ; livestock_counts, livestock_stress_sale_past_season et livestock_vet_access sont sautés lorsque cette réponse est `no` ou `dont_know`. Formulation tirée de l'item `hv246` du DHS-8 (« Votre ménage possède-t-il du bétail, des troupeaux ou des animaux de ferme ? »). `dont_know` est conservé comme réponse valide distincte."
  es: "Si el hogar posee actualmente ganado, aves de corral u otros animales de granja. Ítem de entrada al bloque de ganado; livestock_counts, livestock_stress_sale_past_season y livestock_vet_access se omiten cuando esta respuesta es `no` o `dont_know`. Formulación tomada del ítem `hv246` del DHS-8 ('¿Su hogar posee ganado, rebaños o animales de granja?'). `dont_know` se mantiene como respuesta válida distinta."

type: string
cardinality: single
