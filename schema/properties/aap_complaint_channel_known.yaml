id: aap_complaint_channel_known
maturity: draft
label:
  en: "AAP: Complaint channel awareness"
  fr: "Redevabilité : Connaissance du canal de plainte"
  es: "Rendición de cuentas: Conciencia del canal de quejas"

definition:
  en: "Whether the respondent knows how to contact aid providers to ask a question, make a suggestion, or raise a complaint. The single most frequently reported AAP indicator across global MSNAs 2018–2024: OCHA oPt MSNA 2022 found 4% awareness; CAR MSNA 2023 found 27%; Global MSNA 2022 showed persistently low awareness across 14 operations. Maps to CHS 2024 Commitment 5 ('Can safely report concerns and complaints and get them addressed')."
  fr: "Si le répondant sait comment contacter les intervenants pour poser une question, faire une suggestion ou déposer une plainte. L'indicateur AAP le plus fréquemment rapporté dans les MSNAs globales 2018–2024 : l'OCHA MSNA oPt 2022 a trouvé 4 % de connaissance ; MSNA RCA 2023 a trouvé 27 % ; MSNA global 2022 a montré une faible connaissance persistante à travers 14 opérations. Correspond à l'Engagement 5 de la CHS 2024 (« Peut signaler en toute sécurité des préoccupations et des plaintes et obtenir des réponses »)."
  es: "Si el encuestado sabe cómo contactar a los actores humanitarios para hacer una pregunta, una sugerencia o presentar una queja. El indicador AAP más frecuentemente reportado en las MSNAs globales 2018–2024: la MSNA OCHA oPt 2022 encontró 4% de conciencia; MSNA RCA 2023 encontró 27%; MSNA global 2022 mostró una conciencia persistentemente baja en 14 operaciones. Corresponde al Compromiso 5 de la CHS 2024 («Puede denunciar de forma segura inquietudes y quejas y obtener respuestas»)."

type: string
cardinality: single
