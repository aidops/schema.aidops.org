id: cl_hazardous_heavy_loads
maturity: draft
label:
  en: "Activity required carrying heavy loads"
  fr: "L'activité exigeait de porter de lourdes charges"
  es: "La actividad requería cargar pesos pesados"
definition:
  en: "Whether the child's economic activity required carrying heavy loads in the past 7 days. MICS 6 CL4. Asked only if any of the CL1 economic-activity items is yes. A yes on this item flags hazardous work under the ILO/UNICEF 2020 child-labour definition regardless of age or hours."
  fr: "Si l'activité économique de l'enfant exigeait de porter de lourdes charges au cours des 7 derniers jours. MICS 6 CL4. Posé uniquement si l'un des items CL1 d'activité économique est oui. Un oui à cet item signale un travail dangereux selon la définition OIT/UNICEF 2020 du travail des enfants, quel que soit l'âge ou les heures."
  es: "Si la actividad económica del niño requería cargar pesos pesados en los últimos 7 días. MICS 6 CL4. Se pregunta solo si alguno de los ítems CL1 de actividad económica es sí. Un sí en este ítem señala trabajo peligroso bajo la definición OIT/UNICEF 2020 de trabajo infantil, independiente de edad u horas."
type: boolean
cardinality: single
core: false
vocabulary: null
references: null
category: child_labour
age_applicability:
  - child_5_17
sensitivity: sensitive
