id: gbv_conseq_cuts_bruises_aches
maturity: draft
label:
  en: "Physical consequence: cuts, bruises, or aches from partner violence"
  fr: "Conséquence physique : coupures, contusions ou douleurs dues à la violence conjugale"
  es: "Consecuencia física: cortes, moretones o dolores por violencia de pareja"

definition:
  en: >
    Whether the respondent has ever had cuts, bruises, or aches as a result of partner violence.
    DHS instrument item DV08a. Lifetime reference period (ever, as a result of violence by the
    referent partner). Asked only of respondents who reported at least one physical or sexual IPV
    act. Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si la répondante a jamais eu des coupures, contusions ou douleurs à la suite de violences
    conjugales. Item DHS DV08a. Période de référence : à vie. Posée uniquement aux répondantes
    ayant signalé au moins un acte de VPI physique ou sexuelle.
  es: >
    Si la encuestada alguna vez tuvo cortes, moretones o dolores como resultado de violencia de
    pareja. Ítem DHS DV08a. Período de referencia: de por vida. Se pregunta solo a encuestadas
    que reportaron al menos un acto de VPI física o sexual.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_consequences
core: false
sensitivity: restricted
