definition:
  en: "Frequency with which the household harvested crops before maturity to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier."
  fr: "Fréquence à laquelle le ménage a récolté des cultures avant maturité pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise."
  es: "Frecuencia con la que el hogar cosechó cultivos antes de su madurez para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis."

