id: hiv_ever_tested
maturity: draft
label:
  en: "Ever tested for HIV"
  fr: "A déjà subi un test de dépistage du VIH"
  es: "Alguna vez se hizo la prueba de VIH"

definition:
  en: "Whether the woman has ever been tested for HIV (DHS HIV testing section). Ask only if the optional STI/HIV block is enabled and a separate consent step has been obtained beyond the general interview consent. This block carries high stigma and disclosure risk; it must be administered with additional safeguards."
  fr: "Si la femme a déjà subi un test de dépistage du VIH (section DHS sur le dépistage du VIH). Demander uniquement si le bloc facultatif IST/VIH est activé et qu'une étape de consentement distincte a été obtenue au-delà du consentement général de l'entretien. Ce bloc comporte un risque élevé de stigmatisation et de divulgation ; il doit être administré avec des garanties supplémentaires."
  es: "Si la mujer alguna vez se ha hecho la prueba de VIH (sección de pruebas de VIH del DHS). Preguntar solo si el bloque opcional de ITS/VIH está habilitado y se ha obtenido un paso de consentimiento separado más allá del consentimiento general de la entrevista. Este bloque conlleva un alto riesgo de estigma y divulgación; debe administrarse con salvaguardias adicionales."

type: string
cardinality: single
core: false
vocabulary: yes-no-pnta
