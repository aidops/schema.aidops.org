id: fever_care_sought
maturity: draft
label:
  en: "Care sought for fever"
  fr: "Soins recherchés pour la fièvre"
  es: "Atención buscada por fiebre"

definition:
  en: "Whether the caregiver sought advice or treatment for the child's fever from anyone. Published wording: 'Did you seek advice or treatment for the fever from anyone?' Gateway to fever_care_source. Ask only if fever_last_2wks is true. DHS code h23 (gateway); MICS code ML3 gateway."
  fr: "Si le soignant a recherché des conseils ou un traitement auprès de quelqu'un pour la fièvre de l'enfant. Formulation publiée : « Avez-vous cherché des conseils ou un traitement auprès de quelqu'un pour la fièvre ? » Passerelle vers fever_care_source. Posez uniquement si fever_last_2wks est vrai. Code DHS h23 (passerelle) ; passerelle code MICS ML3."
  es: "Si el cuidador buscó consejo o tratamiento para la fiebre del niño de alguna persona. Redacción publicada: '¿Buscó consejo o tratamiento para la fiebre de alguna persona?' Puerta de entrada a fever_care_source. Preguntar solo si fever_last_2wks es verdadero. Código DHS h23 (puerta); puerta de código MICS ML3."

type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: fever
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
