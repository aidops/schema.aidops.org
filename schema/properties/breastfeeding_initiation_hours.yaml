id: breastfeeding_initiation_hours
maturity: draft
label:
  en: Time from birth to first breastfeed
  fr: "Délai entre la naissance et la première tétée"
  es: Tiempo desde el parto hasta la primera lactancia
definition:
  en: "How long after birth the mother first put the index baby to the breast, grouped per DHS-8 m4 / MICS6 MN13 categories. DHS m4 = 1 (within 1 hour), 2 (1–23 hours), 3 (1–3 days), 4 (more than 3 days), 5 (never breastfed). Drives breastfeeding_early_initiation. Owned by MaternalNewbornHealthProfile; NutritionPracticesProfile references breastfeeding_early_initiation but does not re-collect this item. Only asked if breastfeeding_ever_initiated = yes."
  fr: "Combien de temps après la naissance la mère a mis l'enfant index au sein pour la première fois, regroupé selon les catégories DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dans l'heure), 2 (1–23 heures), 3 (1–3 jours), 4 (plus de 3 jours), 5 (jamais allaité). Génère breastfeeding_early_initiation. Appartient au MaternalNewbornHealthProfile ; le NutritionPracticesProfile référence breastfeeding_early_initiation mais ne re-collecte pas cet item. Posé uniquement si breastfeeding_ever_initiated = oui."
  es: "Cuánto tiempo después del parto la madre puso al bebé índice al pecho por primera vez, agrupado según las categorías DHS-8 m4 / MICS6 MN13. DHS m4 = 1 (dentro de la primera hora), 2 (1–23 horas), 3 (1–3 días), 4 (más de 3 días), 5 (nunca amamantó). Genera breastfeeding_early_initiation. Pertenece al MaternalNewbornHealthProfile; el NutritionPracticesProfile referencia breastfeeding_early_initiation pero no recopila este ítem. Solo se pregunta si breastfeeding_ever_initiated = sí."
type: string
cardinality: single
core: true
