id: fgm_intend_to_continue
maturity: draft
label:
  en: "Belief — FGM/C practice should continue"
  fr: "Croyance — la pratique des MGF/E devrait se poursuivre"
  es: "Creencia — la práctica de MGF/A debería continuar"
definition:
  en: "Whether the woman believes that the practice of FGM/C should be continued, or should be stopped. MICS 6 FG22. Attitudinal item used for the UNFPA continuation-attitudes indicator. Accepted responses: continued / stopped / depends / dont_know. Cross-reference: also measured in GenderEmpowermentProfile attitudes batteries where applicable; check for overlap before collecting a second time."
  fr: "Si la femme croit que la pratique des MGF/E devrait se poursuivre ou devrait cesser. MICS 6 FG22. Item attitudinal utilisé pour l'indicateur UNFPA d'attitudes de continuation. Réponses acceptées : continued / stopped / depends / dont_know. Référence croisée : également mesuré dans les batteries d'attitudes du GenderEmpowermentProfile le cas échéant ; vérifier le chevauchement avant de collecter une seconde fois."
  es: "Si la mujer cree que la práctica de MGF/A debería continuar o detenerse. MICS 6 FG22. Ítem actitudinal usado para el indicador UNFPA de actitudes de continuación. Respuestas aceptadas: continued / stopped / depends / dont_know. Referencia cruzada: también se mide en las baterías de actitudes del GenderEmpowermentProfile cuando aplica; verificar superposición antes de recoger por segunda vez."
type: string
cardinality: single
core: false
vocabulary: fgm-continuation-belief
references: null
category: fgm
age_applicability:
  - adult
sensitivity: restricted
