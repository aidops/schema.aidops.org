id: anc_content_urine_sample
maturity: draft
label:
  en: Urine sample taken during ANC
  fr: "Échantillon d'urine prélevé lors des CPN"
  es: "Muestra de orina tomada durante la APN"
definition:
  en: "Whether the woman gave a urine sample during antenatal care for the most recent pregnancy. DHS-8 m42d; MICS6 MN3c. Core ANC content item. Urine testing enables detection of proteinuria (pre-eclampsia risk), urinary tract infections, and gestational diabetes. Only asked if anc_any_visit = yes."
  fr: "Si la femme a donné un échantillon d'urine lors des soins prénataux pour la grossesse la plus récente. DHS-8 m42d ; MICS6 MN3c. Item de contenu CPN central. L'analyse des urines permet de détecter la protéinurie (risque de pré-éclampsie), les infections urinaires et le diabète gestationnel. Posé uniquement si anc_any_visit = oui."
  es: "Si la mujer dio una muestra de orina durante la atención prenatal para el embarazo más reciente. DHS-8 m42d; MICS6 MN3c. Ítem central de contenido de APN. El análisis de orina permite detectar proteinuria (riesgo de preeclampsia), infecciones del tracto urinario y diabetes gestacional. Solo se pregunta si anc_any_visit = sí."
type: boolean
cardinality: single
core: true
vocabulary: null
references: null
category: antenatal_care
age_applicability:
  - adult
sensitivity: sensitive
