id: vacc_hepb_birth
maturity: draft
label:
  en: "Hepatitis B birth dose vaccination status"
  fr: "Statut vaccinal hépatite B dose de naissance"
  es: "Estado de vacunación hepatitis B dosis neonatal"

definition:
  en: "Whether the child received the hepatitis B birth dose within 24 hours of birth. Published recall wording: 'Was (name) given a hepatitis B injection within 24 hours of birth?' Recommended by WHO within 24 hours of birth to prevent perinatal transmission. Country-specific — not in all national EPI schedules. DHS code h0 (DHS-7+); MICS code IM_HepB0."
  fr: "Si l'enfant a reçu la dose de naissance du vaccin contre l'hépatite B dans les 24 heures suivant la naissance. Formulation de rappel publiée : « (Prénom) a-t-il/elle reçu une injection contre l'hépatite B dans les 24 heures suivant la naissance ? » Recommandée par l'OMS dans les 24 heures suivant la naissance pour prévenir la transmission périnatale. Spécifique au pays — non incluse dans tous les calendriers EPI nationaux. Code DHS h0 (DHS-7+) ; code MICS IM_HepB0."
  es: "Si el niño recibió la dosis neonatal de hepatitis B dentro de las 24 horas del nacimiento. Redacción de recordatorio publicada: '¿Recibió (nombre) una inyección contra la hepatitis B dentro de las 24 horas del nacimiento?' Recomendada por la OMS dentro de las 24 horas del nacimiento para prevenir la transmisión perinatal. Específica por país — no incluida en todos los calendarios EPI nacionales. Código DHS h0 (DHS-7+); código MICS IM_HepB0."

type: string
cardinality: single
core: true
vocabulary: vacc-status
references: null
category: vaccination
sensitivity: sensitive
age_applicability:
  - infant_0_1
  - child_2_4
valid_instruments: [dhs_8, mics6]
