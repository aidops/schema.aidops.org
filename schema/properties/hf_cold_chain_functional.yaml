id: hf_cold_chain_functional
maturity: draft
label:
  en: "Functioning cold chain on-site"
  fr: "Chaîne du froid fonctionnelle sur site"
  es: "Cadena de frío funcional en el sitio"

definition:
  en: "Whether the facility has a functioning cold chain on-site: a refrigerator operating at 2-8 degrees Celsius with a functioning thermometer for vaccine storage. Observed by the enumerator (thermometer reading). `not_applicable` only when the facility does not offer immunization services at all (should be consistent with `hf_service_child_immunization`). SARA service-specific tracer for immunization; WHO EPI standards."
  fr: "Si l'établissement dispose d'une chaîne du froid fonctionnelle sur site : un réfrigérateur fonctionnant entre 2 et 8 degrés Celsius avec un thermomètre en état de marche pour le stockage des vaccins. Observé par l'enquêteur (lecture du thermomètre). `not_applicable` uniquement lorsque l'établissement ne propose pas de services de vaccination (devrait être cohérent avec `hf_service_child_immunization`). Indicateur traceur SARA pour la vaccination ; normes PEV de l'OMS."
  es: "Si el establecimiento tiene una cadena de frío funcional en el sitio: un refrigerador operando a 2-8 grados Celsius con un termómetro funcional para almacenamiento de vacunas. Observado por el enumerador (lectura del termómetro). `not_applicable` solo cuando el establecimiento no ofrece servicios de inmunización (debe ser coherente con `hf_service_child_immunization`). Indicador trazador SARA para inmunización; estándares PAI de la OMS."

type: string
cardinality: single
core: true
vocabulary: yes-no-na
references: null
category: energy
sensitivity: standard
