id: gbv_phys_punch_lifetime
maturity: draft
label:
  en: "Physical IPV (lifetime): punched with fist or with something that could hurt"
  fr: "VPI physique (vie entière) : frappée avec le poing ou un objet blessant"
  es: "VPI física (de por vida): golpeada con el puño o algo que pudiera lastimar"

definition:
  en: >
    Whether the referent partner has ever punched the respondent with his fist or with something
    that could hurt her. DHS instrument item DV05A-iv. Lifetime reference period (ever). If true,
    the follow-up 12-month frequency property gbv_phys_punch_12m_freq is asked. DHS-7+ compatible.
    Sensitivity: restricted. Minimum aggregate n=30 before publication.
  fr: >
    Si le partenaire référent a jamais frappé la répondante avec son poing ou quelque chose qui
    pourrait lui faire mal. Item DHS DV05A-iv. Période de référence : à vie. Si vrai,
    gbv_phys_punch_12m_freq est posée. Compatible DHS-7+.
  es: >
    Si el compañero referente alguna vez golpeó a la encuestada con el puño o con algo que pudiera
    lastimarla. Ítem DHS DV05A-iv. Período de referencia: de por vida. Si verdadero, se pregunta
    gbv_phys_punch_12m_freq. Compatible DHS-7+.

type: boolean
cardinality: single
vocabulary: null
references: null
category: gbv_physical_ipv
core: false
sensitivity: restricted
