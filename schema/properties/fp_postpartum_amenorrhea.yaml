id: fp_postpartum_amenorrhea
maturity: draft
label:
  en: "Postpartum amenorrhea (period returned after last pregnancy)"
  fr: "Aménorrhée post-partum (retour des règles après la dernière grossesse)"
  es: "Amenorrea posparto (regreso del período menstrual después del último embarazo)"

definition:
  en: "Whether the woman's menstrual period has returned since her last pregnancy ended (DHS V405 proxy). Ask only if fp_using_any_method = false AND there was a recent birth within 2 years. DHS-8 change: postpartum amenorrhea classification is based on the last pregnancy, not the last birth. PPA + not wanting the last pregnancy = unmet need to limit in the DHS algorithm."
  fr: "Si les règles de la femme sont revenues depuis la fin de sa dernière grossesse (proxy DHS V405). Demander uniquement si fp_using_any_method = faux ET il y a eu une naissance récente dans les 2 ans. Changement DHS-8 : la classification de l'aménorrhée post-partum est basée sur la dernière grossesse, non le dernier accouchement. AMP + ne pas vouloir la dernière grossesse = besoin non satisfait de limitation dans l'algorithme DHS."
  es: "Si el período menstrual de la mujer ha regresado desde que terminó su último embarazo (proxy DHS V405). Preguntar solo si fp_using_any_method = falso Y hubo un parto reciente en los últimos 2 años. Cambio DHS-8: la clasificación de amenorrea posparto se basa en el último embarazo, no en el último parto. AMP + no querer el último embarazo = necesidad insatisfecha de limitación en el algoritmo DHS."

type: string
cardinality: single
core: false
# Allowed values: yes / no / no_last_pregnancy
vocabulary: null
references: null
category: unmet_need
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [dhs_women]
