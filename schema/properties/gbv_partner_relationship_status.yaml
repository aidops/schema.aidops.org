id: gbv_partner_relationship_status
maturity: draft
label:
  en: "Relationship status with referent partner"
  fr: "Statut de relation avec le partenaire référent"
  es: "Estado de relación con el compañero referente"

definition:
  en: >
    Current marital or union status of the respondent with the referent partner, providing
    context for the IPV battery. Simplified version of standard DHS marital status coding
    specific to the Domestic Violence module context. The 'never_married_partnered' code
    applies only to the DHS-8 extension for never-married women with an intimate partner.
    Where possible, derive from marital_status data already collected rather than re-asking.
    DHS-8 only for 'never_married_partnered'. Sensitivity: restricted.
    Minimum aggregate n=30 before publication.
  fr: >
    Statut matrimonial ou d'union actuel de la répondante avec le partenaire référent,
    fournissant le contexte pour la batterie VPI. Version simplifiée du codage du statut
    matrimonial DHS standard. Le code 'never_married_partnered' s'applique uniquement à
    l'extension DHS-8. Dériver du statut matrimonial déjà collecté si possible. DHS-8 uniquement
    pour 'never_married_partnered'.
  es: >
    Estado civil o de unión actual de la encuestada con el compañero referente, proporcionando
    contexto para la batería de VPI. Versión simplificada del código estándar de estado civil DHS.
    El código 'never_married_partnered' se aplica solo a la extensión DHS-8. Derivar del estado
    civil ya recopilado cuando sea posible. Solo DHS-8 para 'never_married_partnered'.

type: string
cardinality: single
vocabulary: gbv-relationship-status
references: null
category: gbv_module_admin
core: false
sensitivity: restricted
