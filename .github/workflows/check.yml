name: Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Vendor PublicSchema schema/ for cross-schema resolution
      - uses: actions/checkout@v4
        with:
          repository: PublicSchema/publicschema.org
          path: .publicschema
          sparse-checkout: schema

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Fetch vendored PublicSchema
        run: uv run python -m build.fetch_dependency --local .publicschema/schema

      - name: Validate schema
        run: uv run python -m build.validate

      - name: Lint schema content
        run: uv run python -m build.lint

      - name: Run tests
        run: uv run pytest

      - name: Build vocabulary data
        run: uv run python -m build.build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build
