# AidOps project configuration
# This file configures the AidOps build pipeline and its dependency on PublicSchema.

publicschema:
  # Pin the PublicSchema version used for cross-schema resolution.
  # Bump deliberately: change the pin, run `just fetch-publicschema`, run tests.
  version: "0.2.0"

  # Local path to PS schema/ directory (for development).
  # Used by `just fetch-publicschema` in --local mode.
  local_path: "../v2/schema"

base_uri: "https://schema.aidops.org/"
