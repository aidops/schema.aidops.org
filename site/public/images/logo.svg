<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0a7a6f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Three graph edges from A crossbar area -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.35">
    <line x1="300" y1="175" x2="380" y2="130"/>
    <line x1="310" y1="220" x2="400" y2="215"/>
    <line x1="300" y1="270" x2="375" y2="330"/>
    <line x1="380" y1="130" x2="400" y2="215"/>
  </g>

  <!-- Three satellite nodes -->
  <g fill="white">
    <circle cx="380" cy="130" r="15"/>
    <circle cx="400" cy="215" r="12"/>
    <circle cx="375" cy="330" r="11"/>
  </g>

  <!-- Bold letter A -->
  <text x="185" y="375" text-anchor="middle" dominant-baseline="auto"
        font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="340" fill="white">A</text>
</svg>
