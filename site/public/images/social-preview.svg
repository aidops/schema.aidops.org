<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0a7a6f"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Logo: letter A with graph nodes -->
  <g transform="translate(180, 120)">
    <!-- Graph edges -->
    <g stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4">
      <line x1="230" y1="110" x2="320" y2="65"/>
      <line x1="240" y1="155" x2="340" y2="150"/>
      <line x1="230" y1="205" x2="310" y2="270"/>
      <line x1="320" y1="65" x2="340" y2="150"/>
    </g>
    <!-- Nodes -->
    <g fill="white">
      <circle cx="320" cy="65" r="16"/>
      <circle cx="340" cy="150" r="13"/>
      <circle cx="310" cy="270" r="12"/>
    </g>
    <!-- Letter A -->
    <text x="120" y="310" text-anchor="middle" dominant-baseline="auto"
          font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="340" fill="white">A</text>
  </g>

  <!-- Text -->
  <text x="620" y="260" text-anchor="start"
        font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="72" fill="white">AidOps</text>
  <text x="620" y="340" text-anchor="start"
        font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="32" fill="rgba(255,255,255,0.75)">Shared definitions for humanitarian aid</text>
  <text x="620" y="400" text-anchor="start"
        font-family="'IBM Plex Mono', 'Menlo', monospace"
        font-weight="400" font-size="26" fill="rgba(255,255,255,0.5)">schema.aidops.org</text>
</svg>
